l_english:
 zaradyrra.0.title:0 "Being an Ashhana"
 zaradyrra.0.desc:0 "The Blood Curse and how to control it is central to the identity of all Ashhana lizardfolk. The main methods of control have solidified into two distinct factions, Canvas and Claw.\n\nCanvas relies on artful expression to control the curse; from intricate dances and expressive music to colourful painting and exquisite sculpture. While very effective for keeping control over the Blood Curse, however, Canvas is generally reserved for the elite. For commoners, Canvas will generally mean consuming rather than creating art.\n\nClaw, meanwhile, relies on more primal arts: War chants, bloodletting, and near-indiscriminate violence, primarily against outsiders. The Claw faction is as such responsible for the more fearsome reputation of the Ashhana, and while Canvas regards this as distasteful, there is no denying that Claw is more effective for commoners for keeping the Blood Curse at bay."
 zaradyrra.0.a:0 "It ain't gonna be easy. Choose wisely."
 zaradyrra.0.a.tt:0 "You must increase §YControl§!, but every time you do, either the §oClaw§! or §MCanvas§! faction will increase in strength. More details can be seen in the tooltip of the government mechanic."

 zaradyrra.1.t:0 "Invite a scholar"
 zaradyrra.1.d:0 "It is customary that Zaradyrra rulers invite revered figures from schools that are not their own. Ashhana courts will often host bards from the Soul Song School or the Blade and Needle School, craftspeople from the humble zeal school, sculptors from the Great Cycle School, and artists from the Colors of Life school."
 zaradyrra.1.a:0 "Blade and Needle School"
 zaradyrra_invite_blade_and_needle_scholar_tt:0 "\nInviting a Scholar from the §YBlade and Needle School§! will give us:"
 zaradyrra.1.b:0 "Great Cycle School"
 zaradyrra_invite_great_cycle_scholar_tt:0 "\nInviting a Scholar from the §YGreat Cycle School§! will give us:"
 zaradyrra.1.c:0 "Humble Zeal School"
 zaradyrra_invite_humble_zeal_scholar_tt:0 "\nInviting a Scholar from the §YHumble Zeal School§! will give us:"
 zaradyrra.1.dd:0 "Soul Song School"
 zaradyrra_invite_soul_song_scholar_tt:0 "\nInviting a Scholar from the §YSoul Song School§! will give us:"
 zaradyrra.1.e:0 "Colors of Life School"
 zaradyrra_invite_colors_of_life_scholar_tt:0 "\nInviting a Scholar from the §YColors of Life School§! will give us:"

 zaradyrra.2.t:0 "Choosing a Story"
 zaradyrra.2.d:0 "The hours pass and the performance ends. A decision confronts our [Root.Monarch.GetTitle]: we must put the best of our talents to use to further our redemption through art. It is time for us to tell a new story. The question is very simple: which story will we tell this time?"
 zaradyrra.2.a:0 "That of the Mistake is for the best."
 zaradyrra.2.b:0 "The Onslaught is what is worth telling."
 zaradyrra.2.c:0 "O storyteller! Tell me about the Bard."
 zaradyrra.2.dd:0 "Let all rise and hear of the Rising."

 zaradyrra.10.title:0 "Performance: Embroidery"
 zaradyrra.10.desc:0 "Foreigners might look at an Ashhana’s embroidery and scoff. How does this do anything more than calm one person’s soul, they say? Well, those in these lands that perform embroidery have been shrugging off such questions for a long time. Working almost in a blur of limbs, string, and needles, the artisans compose any design the audience or scholars can think of. Is a tree desired? It will be made. What of something more solemn? It too can be embroidered. Unless it fails to calm the soul or worsens the Blood Curse, no demand is too great, nor is any prompt infeasible.\n\n[GetZaradyrraDeityText]"
 zaradyrra.10.a:0 "How can we not be inspired?"

 zaradyrra.11.title:0 "Performance: Weapon Demonstration"
 zaradyrra.11.desc:0 "The Ashhana know well that at times war is a necessity. They do not dare sit in complacency or accept a lack of preparation. The crafting of weapons through metalwork is thus one of the sacred Hundred Petals. Confident in the virtue of their task, blacksmiths prepare their weapons with humble devotion. They are paired with warriors known for their restraint and patience, who then test the forged weapons for all to witness. The audience watches and learns. When such a display comes to the village, one or two youths are inevitably inspired to work as blacksmiths themselves.\n\n[GetZaradyrraDeityText]"
 zaradyrra.11.a:0 "How can we not be inspired?"
 
 zaradyrra.12.title:0 "Performance: Rhythmic Blade Dance"
 zaradyrra.12.desc:0 "Our finest warriors stand to arms as the [Root.Monarch.GetTitle] watches with rapt attention, refusing to be distracted by the muttering of distant scholars, always in dispute as to whether the Blood Curse is actually being helped at all by performances such as these. Drawing their blades, the warriors dance in ever-more complex formations, sometimes treading carefully as if on quicksand, sometimes rampaging in memory and condemnation of the worst excesses of the Blood Curse. Calming their souls and fortifying the resolve of those they defend, the soldiers - nay, artists - turn their blades into extensions of themselves. \n\n[GetZaradyrraDeityText]"
 zaradyrra.12.a:0 "How can we not be inspired?"
 
 zaradyrra.13.title:0 "Performance: Sand Mandala"
 zaradyrra.13.desc:0 "The tradition of the Colors of Life finds a great and truly noble manifestation when it is brought to life in a manner truly befitting the Great Cycle. On a patch of sand, what a foreigner might call “mandala” takes shape. Flower petals and natural paints, the gifts of Zakytzkaras, lend color to what might otherwise be a simple feat of geometry. Thus the Great Cycle blooms in the minds of those that watch. \n\n[GetZaradyrraDeityText]"
 zaradyrra.13.a:0 "How can we not be inspired?"
 
 zaradyrra.14.title:0 "Performance: Tool Decoration Ceremony"
 zaradyrra.14.desc:0 "The complaint is simple: the tools look drab and uninspired. Once they had surely been elegant in their simplicity, but the fact is that as they are they are no fit manifestation of the Zakytzkaras.\n\nAn artist, guided by the joint efforts of scholars of the Humble Zeal and the Colors of Life, assumes responsibility for fixing this problem. With a mix of solemnity and great joy, artist and audience join in a cacophony of voices, figuring out together what the colors of the tools shall be, and what ornamentation shall adorn them.\n\n[GetZaradyrraDeityText]"
 zaradyrra.14.a:0 "How can we not be inspired?"
 
 zaradyrra.15.title:0 "Performance: Creating Tools, Then Using Them"
 zaradyrra.15.desc:0 "One by one the petitioners – civilians, merchants, soldiers, nobles – are brought forward to speak to the artisans and their scholarly advisors. Some of their needs are met by that which has already been made; some the scholars of the Humble Zeal and the Great Cycle see a need to devise a tool anew. But to the wonderment of the audience, no problem proves too great or too petty to have a tool made. As each tool is refined and put to use by their new owners, inspiration spreads. \n\n[GetZaradyrraDeityText]"
 zaradyrra.15.a:0 "How can we not be inspired?"
 
 zaradyrra.16.title:0 "Performance: Music from Natural Instruments"
 zaradyrra.16.desc:0 "Which Ashhana dares forget what saved us from the demonic hags and their vile blood curse, breaking us from our cycle of darkness? It was the music of nature - the soul song brought about by natural music backing the desperate voice of a lone war-bard. Today we bring that venerable tradition to life: today we show forth that even the stones will cry out the glory of the Zakytzkaras. And amidst their song and the Great Cycle, we will build the 333rd Empire in this, our beloved land.\n\n[GetZaradyrraDeityText]"
 zaradyrra.16.a:0 "How can we not be inspired?"
 
 zaradyrra.17.title:0 "Performance: Synchronized Smithing"
 zaradyrra.17.desc:0 "So often the creation of art requires the humility to admit that one cannot go it alone, that one needs others around to produce something truly worthy. There is no greater manifestation of this humility than in the tradition of synchronised smithing. The smiths in a given province begin their work all at once, and time their strikes and labour with one another, creating a hymn out of what the unenlightened would merely call cacophony. They begin together and complete their art together, creating metalwork without pareil in its beauty and sacredness.\n\n[GetZaradyrraDeityText]"
 zaradyrra.17.a:0 "How can we not be inspired?"
 
 zaradyrra.18.title:0 "The Crazed Few"
 zaradyrra.18.desc:0 "Some Ashhana take a foul, sadomasochistic joy in the Bloodcurse. In the throes of their depravity, they seek to destroy all means to free ourselves from the disease. They infiltrate ritual bleedings and slaughter participants just as readily as they massacre artisans and burn workshops.\n\nMany advocate that we hunt down these deviants and put an end to their reign of terror. Others theorize that these behaviors may be the symptoms of a more advanced form of the Bloodcurse, and with adequate treatment these loathsome creatures may yet become sane once more."
 zaradyrra.18.a:0 "Put down these animals. Blood begets blood."
 zaradyrra.18.b:0 "They can be saved."
 
 zaradyrra.19.title:0 "Amongst the Strife"
 zaradyrra.19.desc:0 "As territorial control has waned due to our infighting, agitators for independence have come to the conclusion there’s no better time to push to expand their powers than now. It’s easy to surmise why: with our society still reeling from the desertion of so many, enormous vacuums exist in our leadership. Perhaps worse still, what limited martial resources we have preserved currently find themselves occupied in our efforts to quell this uprising.\n\nConsequently, the representatives for liberation efforts have found the temerity to approach us with an ultimatum: cede control to them, or else."
 zaradyrra.19.a:0 "Make some concessions; we have more urgent problems."
 zaradyrra.19.a.tt:0 "§Y3§! random owned provinces with separatism receive the following:"
 zaradyrra.19.b:0 "We are not so distracted we cannot crack down."
 zaradyrra.19.c:0 "Use them in our rites."
 zaradyrra.19.c.tt:0 "We will gain a random §YZaradyrra Festival§! modifier we don't already have"
 
 zaradyrra.20.title:0 "If You Long for Peace"
 zaradyrra.20.desc:0 "Caught between the opposing sects of Claw and Canvas, a sizable portion of the population simply seeks a reprieve from the Bloodcurse and the cessation of hostilities. Pariahs of both the Canvas and the Claw, these moderates do seem to desire nothing more than to simply acquire self-control, however they can.\n\nThese solace-seekers find little harbor in any social circle, feared as they are among Canvas adherents for their scars and mocked for their creative pursuits by Claw believers. However, they need not be outcasts today."
 zaradyrra.20.a:0 "Seek their support."
 zaradyrra.20.b:0 "Let them keep their own mind."
 zaradyrra.20.c:0 "True creative freedom comes only in peace."
 
 zaradyrra.21.title:0 "Savagery and Serendipity"
 zaradyrra.21.desc:0 "The local leading the patrol came to a sudden halt amidst a circle of carnage, disturbing the warleader. She swiftly approached their guide.\n\n“I thought you said you were leading us where highwaymen had set camp.”\n\nThe young lizard girl gave the captain a dumbfounded look, and slowly nodded her head.\n\n“Right. And I said some Claw chaps were gonna fight ‘em. See what’s left?”\n\nThe warleader swiveled her head. She’d dealt with her fair share of battlefields, and the sight before her stretched well beyond the necessities of battle into pure sadism. Whatever remained of the foreigners couldn’t be distinguished from the general red blotch covering the space."
 zaradyrra.21.a:0 "They were thieves, not innocents. We can allow this for now."
 zaradyrra.21.b:0 "Foul deeds were committed here. Stop them."
 
 zaradyrra.22.title:0 "Blood on the Canvas"
 zaradyrra.22.desc:0 "The two hunters stood side-by-side, marveling at the blood-splashed statue of a regal lizardfolk before them. One removed the ponderous hand from his chin to address the other.\n\n“Is it truly ‘defaced,’ or do you think the blood may symbolize that underpinning even the most noble Canvas adherent is a cavalier attitude towards collateral damage which perpetuates our civil war?”\n\nThe second hunter turned to his companion with an incredulous expression upon his face.\n\n“Do you wax poetic about the smell of your own excrement?”"
 zaradyrra.22.a:0 "“We should not police expression!”"
 zaradyrra.22.b:0 "“This isn’t art!”"
 
 zaradyrra.23.title:0 "Material Malfeasance"
 zaradyrra.23.desc:0 "“Dear Chieftain,\n\nI regret to inform you that sabotage efforts have disrupted our supply lines as we move to suppress the rebels. Claw sympathizers have destroyed at least sixty drums, four crates of paints, and three pottery wheels. Without these essential supplies, it’s possible our soldiers may fall into a berserker state and disrupt our ranks; opportunities for self-expression are limited in the field, so having materials on-hand is critical for minimizing regrettable lapses in self-control. Awaiting your recommendation for a course of action.”"
 zaradyrra.23.a:0 "“Make do without.”"
 zaradyrra.23.b:0 "Purchase more from foreign merchants"
 zaradyrra.23.c:0 "“Purchase more from foreign merchants.”"
 
 zaradyrra.24.title:0 "Bad Press or Bad Business?"
 zaradyrra.24.desc:0 "There’s no denying the Canvas Sect enjoys preferential treatment from traveling merchants. Claw advocates claim their traders are vilified in rumors and backroom slander, while non-Ashhana merchants increasingly eschew trade with the sect out of safety concerns stemming from what they describe as “hostile rhetoric.”\n\nThe commercial preference has progressed to where Canvas middlelizards have shoehorned out Claw traders. Claw representatives accuse them of scalping goods required by Claw commonfolk. Canvas representatives counter that this disparity is the natural consequence of the Claw’s supremacist antagonism, and if the Claw wished, they could “reassess their beliefs.”"
 zaradyrra.24.a:0 "Favoritism isn’t illegal. We can allow this for now."
 zaradyrra.24.b:0 "Squeezing the most economically vulnerable is immoral. Stop them."
 
 zaradyrra.25.title:0 "Aesthetic Elitism"
 zaradyrra.25.desc:0 "As ritual bloodletting becomes more culturally accepted in society, Claw Ashhana have taken to conducting the ceremonies in more public places. However, some Claw Ashhana have suggested moving these rituals behind closed doors, lest the shows scare young children away from the sect or give travelers the wrong impression. Worse, these displays have received significant pushback from Canvas Ashhana, who break up the rituals and decry them as perversions of the concept of “art.”\n\nScuffles with Canvas adherents have reduced the safety of public bloodletting; an errant blow can push a ritual knife deeper than intended into the flesh, and dowsing the cauterization flames can increase the risk of infection."
 zaradyrra.25.a:0 "Let them get it out of their system."
 zaradyrra.25.b:0 "If they’re looking for a fight, they can have one. Stop them."
 
 zaradyrra.26.title:0 "Monotony of Expression"
 zaradyrra.26.desc:0 "“Do you ever think our city is… dismal?”\n\nThe town guard turned to his peer, confused.\n\n“What? What do you mean?”\n\n“Well, when the envoys’ caravan broke camp today, one of them called our city dangerous - and yes, I know, that’s nothing new - but then another envoy said ‘Worse: this town is boring.’ I just can’t shake those words. They went on and on about how the city feels shabby and sad.”\n\n“Oh, ignore them. They’re foreigners, so of course they wouldn’t know what the best parts of town are! For example, we have a thrilling gladiatorial scene.”\n\n“I know! It’s just… I only ever see locals attend their shows.”\n\n“Oh…yeah. Huh.”\n\n“...are we just too bleak?”"
 zaradyrra.26.a:0 "“Perhaps we ought to be less hardline.”"
 zaradyrra.26.b:0 "“Bah, what do they know?”"
 zaradyrra.26.c:0 "“We have art, too!”"
 
 zaradyrra.27.title:0 "The Enemy Within"
 zaradyrra.27.desc.claw:0 "“Captain, it strikes me that morale among the troops must be extremely high.”\n\nWhile ostensibly the observation described a positive phenomenon, Nikzarak clocked the tone of her General as brimming with hostility, and consequently elected to play ignorant.\n\n“How so, ma’am?”\n\n“Well, the regiments were so enthusiastic in their songs and battlecries during today’s march that they were mistaken for Canvas troops. Friendly fire nearly broke out. I had not realized your soldiers were so thoroughly drilled in the art of performance.”\n\nNikzarak tried her best to reveal no expression at this news, even as she inwardly cursed. Nevertheless, silence wasn’t an option.\n\n“I suppose so, ma’am.”\n\n“‘Suppose,’ do you? Their pageantry struck me as rather obvious. I’m sure every Canvas regiment in forty furlongs overheard their war chants. And likely our movements.”\n\n“...I will immediately see to correcting that error, General Zundara. It’s unacceptable conduct.”\n\n“Oh Captain, there’s no need to be so hasty. In fact, I would prefer to hear the song of your troops as you continue your march. Tonight.”\n\n“Come again?”\n\n“Your troops, Captain. I want them to sing as they march to a new position tonight, and thus draw attention away from the bulk of our forces.”\n\n“But…why? We’re already encamped! I know permitting these excesses was inadvisable, but they’re merely trying to exert some control over themselves–”\n\n“And I cannot fault them for the desire, but we are at war and pragmatism demands greater self-discipline than they have exhibited. Through their frivolous displays, they’ve compromised the stealth of our entire advance, so they must take responsibility to restore some measure of safety. Or is there an alternative course of action you’d recommend to address this merry-making, Captain? Do you find this lack of professionalism acceptable?”"
 zaradyrra.27.desc.canvas:0 "“Sergeant Hanonik, what is the meaning of this? Not two hours ago you gave a smoke signal saying your position was under attack.”\n\nSergeant Hanonik gulped. Chieftess Songik wore a dangerous expression upon her face, one that battled between the impulse to free his head from his neck and barely-mustered self-discipline.\n\n“Chieftess, ma’am, we won. We got ‘em all. I thought you’d be happy.”\n\n“Sergeant, I would be more receptive to that claim if– after our breakneck sprint to reinforce your position– we did not discover your squad wasting what precious few art supplies we have left without a body to be seen.” A freshly-carved flute rested on the stump where Hanonik had been sitting.\n\n“I– I wasn’t wasting nothing! Not time nor supplies, Chieftess! We’re just resting, is all. After we won the fight, we had to clear bodies, or the carrion-birds would give away our camp for weeks. Was a lot of work, and we needed a breather. And I didn’t steal any art supplies! We scavenged these.”\n\nSongik faltered for a moment. Hanonik had decent instincts, and she felt a bit of professional pride at her junior’s responsibility. Still, something tugged at the edges of her attention.\n\n“Sergeant, when would you have had time to scavenge while burying–”\n\n“Didn’t bury nobody. Beasts would smell that.” Hanonik looked down.\n\nSongik looked once more at the flute. The bone-white flute.\n\n“Sergeant, don’t tell me you…”\n\nHanonik couldn’t meet his chieftess’s gaze, so he stared firmly at the ground.\n\n“When’d you think we sent you the smoke signal? ‘Slike you said, Chieftess. We’ve been running out of art supplies, and who knows when a shipment can reach us out here. All the front-line squads do the same,” Hanonik choked up a bit, “It’s– it’s not like what the Claw do. I promise.”"
 zaradyrra.27.a:0 "It’s a disturbing revelation. Root out the offenders."
 zaradyrra.27.b:0 "Let’s not be crazy."
 zaradyrra.27.c:0 "So long as they fight for us. War necessitates flexibility."
 
 zaradyrra.28.title:0 "What We Become"
 zaradyrra.28.desc:0 "A snake eating its own tail.\n\nKhun stared at the specimen in front of her. As a girl, she’d listened to her elders’ tales of the natural world in the hope of one day becoming a scholar, though as her scales rustled against her war-leathers, that era of stories and youth seemed terribly distant.\n\nShe had learned. She had learned plenty, but the demand for able-bodies surpassed the need for scholars nowadays. Nowadays, no one could appreciate her knowledge of reptiles. They cared far more about her skills in combat than her knowledge of oddities like the snake in front of her.\n\nThe snake eating its own tail. She knew from her upbringing that snakes only attempted to eat themselves under extreme duress. At times, when the critters were confused or distressed, they’d forget who their tails belonged to, and they’d start eating themselves, as though some way, somehow, the act would make their problems go away. No healthy snake made the mistake, yet nevertheless, the phenomenon had been described by many scholars. Even though a snake could not survive eating itself.\n\nKhun could sympathize. She’d killed another boaga earlier that day.\n\nIt wasn’t even in battle; he’d been bathing. She remembered how frightening it was; even though she wasn’t in the throes of the Bloodcurse, she’d gratefully watched the life leak out of his twitching body. Maybe, in another life, he might have appreciated her insight into snake behavior. Maybe instead of slaying one-another, they could share a moment of silence to mourn the animal twisted in death before them. Instead, she felt sickened. The Bloodcure’s violence was involuntary; she had chosen to murder today.\n\nIn many cultures, the snake eating its own tail represented infinity. It symbolized endless cycles. Khun wondered if the people who’d dreamt up that metaphor understood snake behavior. She wondered if they knew how afraid and pained the snake must be. How totally out of control it must feel, as it choked on itself."
 zaradyrra.28.a:0 "Our curse persists."
 zaradyrra.28.b:0 "But as long as the tail isn’t ours, we’re free to bite."
 zaradyrra.28.c:0 "We may yet still release ourselves from this trap."
 zaradyrra.28.d:0 "We can envision a different future."
 
 zaradyrra.29.title:0 "Bands of Bards"
 zaradyrra.29.desc:0 "The composing chambers sat empty, save for the frustrated scrawling noises of the central figure in the room, hunched over a conductor’s pedestal as they scratched a handful of unsatisfying notes onto a music staff. Kuyata cracked the joints in his fingers, slumped back onto a stool, and considered what work he could neglect.\n\nFive– no, six– battle hymns left. Those were essential. It would be a disaster to lose control of a vital position due to a mid-operation Curse-flare. A well-sung verse could trigger the Bloodcurse in the enemy while keeping one’s own soldiers sane. Ten marching lullabies. Not optional if as long as the troops intended to go anywhere. They had to be quiet enough to avoid notice, but strong enough that some halfwit in the rearguard wouldn’t fall asleep. Nineteen training chants. Self-explanatory. Couldn’t slack on those without ruining the next crop of recruits. Six songs of soothing. The most important work of all. Without their influence, an Ashhana was lower than an animal. What use is a person who has ceased to be a person? Skimping on variety wasn’t an option, either. Too much monotony allowed the Curse to creep in and set hold on the unsuspecting.\n\nNo cuts to writing then, and Kuyata would still need to train his musicians to play the songs…\n\nOutside the window, the sound of drums rose into the air. There was an existing supply of ready musicians. Kuyata walked over to the balcony window and disdainfully peered down into the town below, where a small troupe of bards played their instruments in the central square. It seemed to Kuyata that every week the bards donned yet more colorful clothes and longer belts. At a time when every purse was shallow, you could reliably identify bards by the jingle of coins in their pockets. Hiring those vultures would cost a fortune, Kuyata thought bitterly.\n\nThey still may be worth the price."
 zaradyrra.29.a:0 "Going without is not an option. Give them their money."
 zaradyrra.29.b:0 "Is creative freedom not payment enough?"
 zaradyrra.29.c:0 "Come now, surely this isn't needed?"
 zaradyrra.29.d:0 "Incorporate them into the state"
 
 zaradyrra.30.title:0 "Rampaging Ashhana Hordes"
 zaradyrra.30.desc:0 "The first reports coming from [This.GetName] speak of disorder and violence. Ashhana provinces have never been easy to hold, due the population living under the constant strain of the Blood Curse. As their communal ties loosen under non-Ashhana rule, many Ashhana tribesmen drift into roaming war bands, striking without strategy or demands. They attack farms, roads, and isolated garrisons alike, then scatter, driven by the searing impulse of their curse.\n\nIt will take time for Ashhana to regain their equilibrium and reduce the number of Blood Curse incidents in [This.GetName]. Until that happens, local villagers will fear for their life and the infrastructure will be left to deteriorate among the rampaging Ashhana Lizardfolk."
 zaradyrra.30.a:0 "This is truly worrying"
 zaradyrra.30.a.tt:0 "Conquering a province of §YAshhana Lizardfolk§! culture in the §YAge of Monsters§! gives the province '§YRampaging Ashhana Hordes§!' for §Y30 years§!, giving the following effects:\nLocal Unrest: §R+5.00§!\nMonthly Devastation: §R+0.25§!"

 zaradyrra.101.title:0 "The Rage Within"
 zaradyrra.101.desc:0 "Ptwang.\n\nA pair of elbows desperately dig in against the stained mud, and the ragged sound of uneven heaving is only interrupted by the occasional thrumming pluck piercing through the night rain. Amidst a foul pile of offal, a massive, contorted Ashhana fights full-body convulsions while their tail twists in agony. A guttural crocodilian hiss escapes their maw as their teeth attempt to refrain from nipping at the carcasses surrounding them. Pink mucus drips from the end of their lacerated snout while thick fluid trickles from their bloodshot eyes. Just as the convulsions threaten to overrun the prone lizardfolk, a single clawed finger caresses a length of sinew, and pulls.\n\nPtwang.\n\nIt could not be called an instrument. It could hardly be called music at all. Yet for a moment in the rain, the Ashhana’s convulsions subside as a single note cuts through the dark. Whatever reprieve could be found from the madness depended on this single, fragile string.\n\nPtwang.\n\nWhat a miserable savior, some soggy piece of tendon. How long can it withstand the force of its harper? When this sorry ligament snaps, will the musician as well?\n\nPtwang.\n\nWhen the song ends, how does it restart? How does the rage abate?"
 zaradyrra.101.a:0 "I know where to find sinew. Sate the rage preemptively with blood."
 zaradyrra.101.b:0 "Better learn to play gently. Prevent the bloodshed."

 zaradyrra.102.title:0 "The Art of Violence"
 zaradyrra.102.desc:0 "“Even if I could waste the effort on paints, if I wasted time filling a canvas, my livelihood would rot on the hook. Besides, I find beauty in this.”\n\nA calloused hand guided a deft cleaver-strike as it opened the sow from shoulder to groin, and the butcher turned to her benefactor.\n\n“What meaningful difference exists between the arc of this knife and the path of a brush?”\n\nThe patron held a fan in front of her face, seemingly in a gesture of disdain. The pig had been wriggling upon the hook until just a moment ago.\n\n“Well, usually my canvases aren’t screaming in pain when I set them upon my easel. I find that meaningful. It was my understanding most butchers killed their animals before cutting. Doesn’t your approach toughen the meat?”\n\nThe butcher glowered at her employer. The fingers holding the fan looked so soft. They were the hands of someone who had seldom needed to perform actual work to survive– the hands of someone who believed that pissing away an afternoon coloring paper was no different in merit than carving food for people to eat. The butcher turned once more to the pig.\n\n“Well, the cuts take more skill the way I do it. Am I not allowed to flourish and flaunt my talents, as you do? Or would you have me wallow in the throes of madness until I could produce a spoonful of lilac?”\n\n“Don’t pretend as though you can’t find a viable alternative! You could explore the culinary world with your leftovers. You could carve sculptures with your blades. You could attempt leatherworking with the skins. You’ve chosen to live for sadism!”\n\nLeatherworking, eh? The butcher wondered if the patron knew soft skin made the finest leather. If only she could afford a tannery."
 zaradyrra.102.a:0 "Each finds control in their own way"
 zaradyrra.102.b:0 "Blood begets only blood"

 zaradyrra.103.title:0 "The Rage Between"
 zaradyrra.103.desc:0 "“Nazinay, I am trying to understand you. I really am. I’m trying to connect with my boy. I… I could turn my gaze away from the animals. What’s a bird here and there? You’re my son all the same. But… this? Carving into yourself? It scares me. You know that. I would never want to see you hurt. And now, Hatiss down the road has been saying some awful things, Nazinay. Things I can’t really believe, but I still can’t ignore. You haven’t– you wouldn’t… you’ve never done this to someone else, have you?”\nNazinay could barely meet his father’s gaze. The old lizard looked sick with concern, and his voice was cracking.\n    “Father, I’m sorry to worry you, and I shouldn’t have kept secrets from you. But you should know everyone involved was consenting–”\n“That’s not the issue, Nazinay! It’s the harm! It’s madness–”\n    “It’s the opposite, Father, it’s clarity!”\n“Is it? What’s the difference between your cure and the curse? It looks as though you still wake in pools of blood, all the same as if you’d succumbed to the illness!”\n    “But we’re in control! We can choose when the violence happens!”\n“And the nazhyn addict can choose when they smoke!”\n    “And the nazhyn addict smokes because they can’t afford medicine!”\n“They could afford to sing! What does your voice cost you? You could afford to dance! Your feet still touch the ground, don’t they? You could afford to tell stories! Don’t you recall how the village children would laugh at your wonderful tales? I am not rich, but I find means of self-expression even without a full purse.”\n    “It’s not merely the deed that fulfills the urge, Father, and you know it! Finding peace in a song requires instruction, talent, and years of practice–”\n“Oh, so the problem is merit, then? Tell me, Nazinay, what is the merit in your rituals? You’re right: excellence takes years of practice, but the years will pass one way or another no matter how you choose to spend them. You seem to practice mutilation enthusiastically enough.”\n  “You’re not wrong, Father, and I do so because our people are sick today.”"
 zaradyrra.103.a:0 "“And with your plan, they’ll be sick tomorrow.”"

 zaradyrra.104.title:0 "Hearts Asunder"
 zaradyrra.104.desc:0 "The elder sat slumped in his chair, one hand cradling his eyes, pinched in scowl.\n“The details again, please.”\nThe young naga dug through his pack and unfurled a scroll.\n    “No less than a dozen ritually-scarred pavers were occupied in the…badgering of the merchant convoy. Three eyewitnesses reported observing what they referred to as a ‘shakedown’ of the caravan leader. Detained members of the outfit insisted they were merely collecting a local toll funding their pay, an account which the local elder later verified. The caravan leader refused compensation–”\n“Of course.”\n    “–to which the posse reacted… negatively. Reports suggest a scuffle ensued.”\nThe young naga shifted uncomfortably and coughed before proceeding.\n    “Witnesses then say a bard stepped out of his place in the convoy, and declared that he would ‘serenade the beasts to their senses’ –we have more than ten accounts of that phrasing– which seemed to irk the road workers. Upon the realization of this intent, the posse leader claimed she ‘offered to involve the bard in a performance of their own,’ after which the… incident occurred.”\nThe elder waved a hand to cut off his junior.\n“Hold on, the lout really called them ‘beasts’?”\nThe young naga sucked air between his teeth for a moment before commenting, as if to build the courage to speak.\n    “Well, eyewitnesses attest to something similar to that phrasing, though it seems the exact terminology was more candidly unflattering. Perhaps this could partially be attributed to the youth of the bard in question–”\n“Wait, wait, wait, wait. We don’t have his story? What happened? We have a story from every other party.”\n    “Sir, our physicians said the knife wounds reached the vocal cords.”\n“A written testimony, then. He’s a bard, no? He must write.”\n    “Sir, following the events of the ‘blood ritual,’ he is unlikely to keep his hands or voice, assuming he ever recovers.”\nThe old minister let a sigh escape from the depths of his heart before he replied."
 zaradyrra.104.a:0 "“Some fools spin their own downfall. Their anger was righteous.”"
 zaradyrra.104.b:0 "“Toll notwithstanding, such unthinkable violence must be condemned.”"

 zaradyrra.105.title:0 "The Sound of Two Souls"
 zaradyrra.105.desc:0 "“Chaki, what is this I hear about a summit with the Canvas chiefs? You can’t seriously trust them to treat with us?”\nAs Zazunta raced into the room, he noticed the empty basin and clean knife on the pedestal near the mirror. Across the space, Chakiata straddled the balcony railing, and did not avert her gaze from the stars even as Zazunta slowed his gait.\n“Chaki, you’re undressed, you still haven’t let blood, and our tribe needs answ– what are you doing?”\nChaki wistfully broke her observation of the sky, and spoke almost absentmindedly.\n    “Zazzy, what stories do you know of King Aguntat the First?”\nThe question hit Zazunta like a shovel to the face, but Chaki’s musing was unwise to ignore.\n“Uh– erm… I mean, converted to Zaradyrra from Anzalkatsa, made a confidant of his would-be conqueror Nukzhat with song– what is this really about?”\nChakiata turned once more to the sky.\n    “Long ago, our gods worked together to create this world, and Aguntat argued that divine collaboration ‘erodes whatever flimsy barriers one seeks to erect between the various peoples of Taneyas, encouraging… a recognition of our shared identity.’” She chuckled softly. “It’s also said that in his jealousy of Naga-katesh and Ashak Tishin creating the lizardfolk, Raka Drakt never quite allowed birds to reach his domain in the far sky.” Chakiata looked out at the town lights.\n    “Zazzy, the Canvas sect… well, just as you and I are not the warlords of a rabid mod, so too do I suspect their failings have been exaggerated. They are not all uncaring, cloud-headed idealists. They suffer the same ailments as us. Some even listen to reason. I’m amenable to entertaining their fair criticism– I said fair, don’t give me that look– if they are able to hear ours. Or alternatively, in our jealousy of what they have made together, we could ensure their birds never reach us.”\n“They’ll slit your throat as revenge for that bard boy, Chaki.”\n    “Perhaps. Or…”"
 zaradyrra.105.a:0 "“…perhaps we can coexist.”"

 zaradyrra.106.title:0 "The Colours We See"
 zaradyrra.106.desc:0 "“What’s the state of the discussion, currently?”\n\n“Well, today Elder Nazyla opened the floor by naming her opposition cowards and false-dealers, and then the assembled delegates broke into a brief scuffle. Once order had been regained, Chiefs Tyra and Adze spent a little under an hour indissuadably arguing who would beat who in a knife fight, until Elder Trazuk added to the state of disorder by crapping on the dais, which led to him getting dragged out of the assembly hall. Fortunately, all sides then agreed to a recess to formulate arguments about whether this deed was committed in earnest distress or if the gesture was a satirical protest. I think both Chiefs Tyra and Adze were receptive to that argument. Chief Radara, too, until Elder Tikhida reminded everyone of Elder Trazuk’s incontinence.”\n\n“Hmm…no casualties? Maybe negotiations are growing more civil now that we’ve hit the fifth week. Did Elder Tikhida say more?”\n\n“No, but she did spend quite a while making a show of flexing and hollering at the audience, in what I believe was an attempt to drum up supporters for the scheduled afternoon brawl.”\n\n“I thought the afternoon brawl was last week.”\n\n“Oh, it was, but six days ago the council unanimously voted to hold tri-daily brawls under medicine-lizard supervision in an effort to reduce the number of after-hour brawls between tribal delegations.”\n\n“Brilliant. The tribes really are sending their best diplomats. Has the measure worked?”\n\n“Not at all. In fact, the medicine lizards are now fighting too, but the decision remains the most popular vote so far, so everyone is in a good mood.”\n\n“Well, it’s the thought that counts. We’re beginning to find common ground. Our time slot is next, yes?”"
 zaradyrra.106.a:0 "Advocate for the Claw."
 zaradyrra.106.b:0 "Advocate for the Canvas."

 zaradyrra.107.title:0 "The Only Path"
 zaradyrra.107.desc:0 "“Council approaching unacceptable outcome. Purge opposition.”\n\nAztalak gazed dumbfounded at the slip of paper. His chieftain had palmed the instructions into his hands after the day’s negotiations without batting an eye. Aztalak grappled with the ramifications of the order.\n\nSix words. Six words that would start a civil war.\n\nAztalak felt betrayed. After so many sleepless nights and so much talk of unity, six words would tear apart the Ashhana? How many millions of words had been exchanged already to avoid more bloodshed? How many dozens of conversations had each humble soul exchanged with their peers and loved ones in the barest hope of a breakthrough? How many lofty speeches had conniving chieftains delivered to weld together some semblance of hope for parlay? Countless words had spilled forth from the mouths of star-crossed lovers and broken-hearted friends. Words beyond number had been spent in the effort to remember the bonds holding society together. When Raka Drakt, Naga-katesh, and Ashak Tishin birthed infinity, implicit in their cooperation was the wish for the wholeness of existence.\n\nHere six words would rebel against all divinity.\n\nFor all their talk of restraint and control, for all the lines in their poetry and plays, for all the enormous breadth of vocabulary within a nation, all it would take to spill the blood of children in the streets and starve to death one’s countryfolk were six words. Aztalak visibly floundered in an unheard scream, silent because language did not exist in all creation to convey the heaven-ripping injustice of the six words delivered to him.\n\nPerhaps the most venomously insidious aspect of this call to massacre was its inevitability. If Aztalak brought this order to the council chambers, surely all he would change is the side firing the first shot. And if he chose to keep these words secret, his hide would be a rug come morn as some other warrior eagerly helmed a purge for a feather in their cap. Oh yes, Aztalak’s hands would tear asunder an entire people, one way or another, at the behest of six unstoppable words."
 zaradyrra.107.a:0 "Here are my six: salvation now lies within embracing ourselves."
 zaradyrra.107.a.tt:0 "Support the §oClaw§! faction. After §Y2§! years, the §MCanvas§! faction will revolt, but only if there has been no revolt for any Ashhana nation already."
 zaradyrra.107.b:0 "Here are my six: unfettered creativity will unshackle our people."
 zaradyrra.107.b.tt:0 "Support the §MCanvas§! faction. After §Y2§! years, the §oClaw§! faction will revolt, but only if there has been no revolt for any Ashhana nation already."

 zaradyrra.201.title:0 "The Revolt!"
 zaradyrra.201.desc.claw:0 "At first, their presence went by unnoticed; members of the Canvas faction had always occupied positions of privilege compared to their Claw counterparts, so their stranglehold on the entrenched institutions of our nation was no surprise. However, as time pressed on, rogue Canvas officials enacted harsher and harsher restrictions limiting Claw self-expression on a regional level. Initially, Claw advocates who were caught participating in violent crime started to receive far harsher sentencing than their non-Claw peers. Then duels were outlawed, lethal and otherwise. Then any form of art dubbed as “self-mutilation” became a criminal act, beginning with ritual-bloodletting, but eventually progressing to scale-notching, tattoos, and even piercings.\n\nBy this point, countless individuals were bestowed with the “Claw” label, even if they had no direct ties to the movement, for acts committed long before Claw and Canvas were even concepts. Great swathes were apprehended, Claw and neutral parties alike. Innumerable “felons” were publicly beheaded for “corrupting morals” and “glorifying the Bloodcurse.” Those who sought to protest these changes were deemed sympathizers and summarily executed too.\n\nWhen finally the Canvas shadow-government announced their presence, the news was mostly formality. The coup officially began with Canvas-majority provinces barring individuals with scars from high ranking positions within our government, as scarring was associated with Claw practices. While ostensibly an anti-Claw violence measure, in truth the deed simply offered pretense for Canvas officials to replace anyone in the government with loyalists. Immediately, the act ousted countless generals, craftsmasters, and most Ashhana of humble background; who hadn’t received a scar in battle, or cut themself while training as an apprentice, or scrapped for food as an impoverished child?\n\nUpon our condemnation of these deeds, the Claw network declared the legitimate government to be condoning violence and the propagation of the Bloodcurse, accused the critique as an attack on peace, and announced their cessation in order to “organize self-defense against violent oppressors.”"
 zaradyrra.201.desc.canvas:0 "The Claw advance is not announced with fanfare. Its arrival is heralded with the silencing of laughter, the flaying of sculptors, and the ash of books. The ragged wake of its path lies fringed with the broken bodies of jesters, half-cannibalized chefs, and the smell of carrion on the wind.\n\nIf the greatest performers of our people offered the finest operas of our playwrights, the Claw would complain about the noise before slitting the singer’s throat. If sat before the finest masterworks of our painters, the Claw would tear the canvas for bog roll. If presented with the liquid vitae of creation in a bowl, the Claw would quaff the lot of it, if only for the chance to piss on the ruined corpse of all that was beautiful in the universe.\n\nThis is their only culture.\n\nIf they merely cared about beating away the call of the Bloodcurse, they would not take pains to raze the homes of every sculptor, singer, and storyteller in our lands. They cannot recognize harm, except to themselves, and if that is untrue it is merely because the Claw take perverse satisfaction in cruelty. They burn and destroy all the little joys which make life worth living because the only spectacle that can capture their hollow attention is misery. They cannot love. They cannot reflect. They cannot comprehend aiding another. They are barely sentient.\n\nWorse, their unending spite infects the land. When faced with lethal force, what options does a rational individual have other than to take up arms and respond in kind? Our people are not lambs waiting for slaughter. Across the countryside, in order to install some form of order, warlords rise to oppose the Claw, and clash for territory, slowly whittling each other down until only the most ruthless heads of the movement remain. And what does war do, except drain a person’s humanity? How many dead children and red rivers can one witness before they lose all ability to find joy in the world? How many defiled corpses does it take to smother the last embers of mercy towards one’s enemy? How many campaigns does it take for even the most unblemished Canvas paragons to begin behaving as the Claw?\n\nPiece by piece, their empty souls create the blood meritocracy of Shyarayan."
 zaradyrra.201.a:0 "At last the pretense drops and their naked loathing shines."
 zaradyrra.201.a.tt:0 "Adzalan will receive a percentage of your development based on the ratio of [Root.canvas_strength.GetName] and [Root.claw_strength.GetName]. They receive manpower, cash, and land units corresponding to their size when released.\n\n§gIn order to end the war and the disaster, we must achieve §Y90%§! warscore again §YAdzalan§!.\nIf the war is still going after §Y5§! years, the side with the higher warscore will win and §Yannex§! the loser.§!"
 zaradyrra.201.b:0 "You need not show empathy. They won’t."
 zaradyrra.201.b.tt:0 "Shyarayan will receive a percentage of your development based on the ratio of [Root.claw_strength.GetName] and [Root.canvas_strength.GetName]. They receive manpower, cash, and land units corresponding to their size when released.\n\n§gIn order to end the war and the disaster, we must achieve §Y90%§! warscore again §YShyarayan§!.\nIf the war is still going after §Y5§! years, the side with the higher warscore will win and §Yannex§! the loser.§!"

 zaradyrra.202.title:0 "The Disaster is over!"
 zaradyrra.202.desc.claw.win:0 "Having defeated the traitors in battle several times, we have finally cornered and captured the leaders of the revolt. With all of them executed, Adzalan has functionally ceased to be, as most of their supporters have either surrendered in return for clemency, or quietly deserted and returned to their old lives. While the struggle to suppress any new Canvas activity will certainly last a while longer yet, the time when they would pose any threat to the state has now passed."
 zaradyrra.202.desc.claw.lose:0 "With the situation becoming ever more dire as the rebels won victory after victory, many of our supporters have now deserted us or even changed sides to join Adzalan. While we had long long ignored the pleas within our court to open negotiations with the rebels, it seems we have run out of options beyond surrender."
 zaradyrra.202.desc.canvas.win:0 "Having defeated the traitors in battle several times, we have finally cornered and captured the leaders of the revolt. With all of them executed, Shyarayan has functionally ceased to be, as most of their supporters have either surrendered in return for clemency, or quietly deserted and returned to their old lives. While the struggle to suppress any new violent Claw activities will certainly last a while longer yet, the time when they would pose any threat to the state has now passed."
 zaradyrra.202.desc.canvas.lose:0 "With the situation becoming ever more dire as the rebels won victory after victory, many of our supporters have now deserted us or even changed sides to join Shyarayan. While we had long long ignored the pleas within our court to open negotiations with the rebels, it seems we have run out of options beyond surrender."
 zaradyrra.202.a:0 "For Claw!"
 zaradyrra.202.b:0 "Canvas is ascendant!"
 zaradyrra.202.c:0 "All is lost."
 zaradyrra.202.d:0 "All is lost."

 zaradyrra.203.title:0 "A Whimper"
 zaradyrra.203.desc.claw:0 "With no clear path to success and exhaustion setting in, many of the Adzalan rebels had started to desert. Their leaders had nothing to offer them but a stalemate, as the war had taken too great a toll and offered little hope for the future. With their forces depleted, the rebel leaders have now offered us their surrender in return for some minor assurances. While the struggle to suppress any new Canvas activity will certainly last a while longer yet, the time when they would pose any threat to the state has now passed."
 zaradyrra.203.desc.canvas:0 "With no clear path to success and exhaustion setting in, many of the Shyarayan rebels had started to desert. Their leaders had nothing to offer them but a stalemate, as the war had taken too great a toll and offered little hope for the future. With their forces depleted, the rebel leaders have now offered us their surrender in return for some minor assurances. While the struggle to suppress any new violent Claw activities will certainly last a while longer yet, the time when they would be any threat to the state has now passed."
 zaradyrra.203.a:0 "For Claw!"
 zaradyrra.203.b:0 "Canvas is ascendant!"

 zaradyrra_performance_mistake:0 "The mindful, considered twists and turns of the ritual performance, instantaneously accounting for unexpected problems and fixing them in real time, show forth the preparation and competence of the artist. The audience is inspired to go out and make beauty out of their own errors."
 zaradyrra_performance_onslaught:0 "An onslaught of problems beleaguers the performance. Perhaps the artists came somewhat unprepared; perhaps some fool gave in to the Beast Soul and sabotaged the artists’ work. But the audience’s help and forgiveness salvage the performance, inspiring those who were watching to further the virtues of forgiveness and self-reform."
 zaradyrra_performance_bard:0 "As in the tale of the Bard, watching the artwork take its shape fills the attending populace with hope. Uplifted to a higher plane of consciousness through the completion of the art, the attendees think on how to spread the hope they have received to their surroundings."
 zaradyrra_performance_rising:0 "As if physically marching uphill towards the attainment of the 333rd Empire through beauty and striving, the ritual artwork inspires and incites its viewers. As the performance draws to its end, younger citizens are heard muttering, “There must be more than this!” They think about how to convert their dreams and ambitions into action."
 zaradyrra_deity_tt:0 "Effects of the §CPerformance§! change according to the selected §YDeity§!.\n\nA new §YDeity§! may be selected after the §CPerformance§! concludes.\n"

