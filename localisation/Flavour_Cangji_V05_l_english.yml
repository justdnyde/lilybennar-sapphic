l_english:
 estate_church_monastic_schism: "Interfaith Dialogue"
 estate_church_monastic_schism_desc: "Talking with leaders of other faiths has proven to be difficult, but nevertheless we continue to learn about the many traditions of our people."
 estate_church_V05_interfaith_dialogue_effect_tooltip_cangji: "Every owned province of §YLevaajan§! faith gains:\nLocal Missionary Strength: §R-100%§!\nLocal Religious Unity Contribution: §G-100%§!\nLocal Tolerance of Heathens: §G+3§!"
 estate_church_V05_interfaith_dialogue_revoke_effect_tooltip: "The modifier §Y'Interfaith Teachings'§! is removed from all owned provinces"
 estate_church_V05_syncretic_monasteries_effect_tooltip_cangji: "Every owned province of §YLevaajan§! faith gains:\nLocal Missionary Strength: §R-100%§!\nLocal Religious Unity Contribution: §G-100%§!\nLocal Tolerance of Heathens: §G+3§!"
 estate_church_V05_syncretic_monasteries_revoke_effect_tooltip: "The modifier §Y'Interfaith Teachings'§! is removed from all owned provinces"
 estate_church_V05_syncretic_society_effect_tooltip_cangji: "Every owned province of §YLevaajan§! faith gains:\nLocal Missionary Strength: §R-100%§!\nLocal Religious Unity Contribution: §G-100%§!\nLocal Tolerance of Heathens: §G+3§!"
 estate_church_V05_syncretic_society_revoke_effect_tooltip: "The modifier §Y'Interfaith Teachings'§! is removed from all owned provinces"
 V05_peak_embers_title: "Embers of the Peaks" 
 V05_peak_embers_desc: "With the success of the Eternal Cinder Monasteries, Gozengun's rugged and dangerous terrain may now be exploited with ease. Now possessing a central point of magical power, the Ashen Soul can instead focus on building their strength and developing new methods of spiritfire projection, so they may rise from the lonely peaks as great towers of flame.\n\nTo do this, we need data, and to get data we must experiment. Elementals must be drawn from the brazier's flame, soldiers must be trained in the art of spiritfire warfare, and the network must be expanded to facilitate greater use of mana. The fire within our hearts grows ever stronger as we thunder towards the light of progress!" 
 V05_space_beyond_title: "The Space Beyond" 
 V05_space_beyond_desc: "In all of Gozengun, there is nowhere more strange than the rift in reality found in the center of Nomsyulhan. A dark, hungry portal to somewhere strange and alien, it sits in the middle of the desert like a tear in a sheet of parchment. Yet somehow the mages of the Ashen Soul have peered into the yawning abyss, and felt…something on the other side, pouring mana through the gap. Whatever lies beyond the portal, we will not be able to determine from intuition alone. The mages need space, resources, and time, and only then we can determine what inhabits the space beyond reality." 
 V05_eagle_secrets_title: "Secrets of the Eagles" 
 V05_eagle_secrets_desc: "“The Eagle Hobgoblins of Nomsyulhan have taught us much on the nature of order and chaos, using their magic to control the flow of what they believe to be just and right. From this, we have applied their concepts of order to the magic commonly used by members of the Ashen Soul. Spiritfire represents order, and within its searing tendrils lies the key to dispelling the chaotic entropy of the Facestealer. Perhaps, with more investigation, we can achieve order within our bodies themselves. Who knows what we could accomplish then?”\n\n-Clawmage Zhang Hao, “The Meaning of Order and the Mastery of Fire”" 
 V05_against_the_beyond_title: "Cosmic Calling" 
 V05_against_the_beyond_desc: "We’ve investigated the strange portal in the middle of the wastes for long enough to gain some understanding of its unnatural function, and through this research we have uncovered something catastrophic. Something stirs in the depths of the Nomsyulhan rift, a slumbering ancient thing that breathes confusion and consumes reality. We don't know what exactly it is, but its dreams are poison to our fire and its murmurs cause quakes that shake the earth. Leaving this presence untouched cannot stand, for the threat it poses to us if we continue to delve the rift is far too great. For our research to continue, it must be destroyed."
 V05_blazing_forge_title: "The Blazing Forge" 
 V05_blazing_forge_desc: "In the depths of the void, we slew the Astral Beast, thus ending the threat of awakening. From its gargantuan hide, we have retrieved what appear to be scales, although they seem to swallow light itself and reflect any magical energies back towards the source. The pyremages of Bazuneizar heard of this material, and quickly became enthralled with designing a new machine to make use of these strange properties.\n\nBy lining the inside of a blast furnace with Astral Scales, the structure is able to withstand the scorching heat of spiritfire without splitting the stone exterior. Thus, new channelling braziers can be fashioned out of the very substance they seek to control, causing them to become substantially more powerful. This forge will prove very useful in our coming battles - all that is left is to build it." 
 V05_korashi_menace_title: "The Korashi Menace" 
 V05_korashi_menace_desc: "To a mage, there is nothing that grips the soul with terror quite like korashi.\n\nFirst created by the oni for use by the hobgoblin Command, this vile crystal absorbs all magic that it contacts, and deadens the magical ability of nearby mages. The Command has shackled others with the material for years, enslaving and persecuting them for the crime of existence. To ensure this evil resource never again exists in this world, it falls to us to crush their producers and destroy all korashi once and for all.\n\nTo do this, we must study the dread stone, and test its mettle against our light in the darkness of magical ignorance–the spiritfire that guided us out of Gozengun. Time is short, for the longer we delay the more mages have to suffer this evil creation." 
 V05_breaking_chains_title: "Breaking the Chains" 
 V05_breaking_chains_desc: "A common sight among the hobgoblin masters of the Command are collars and shackles produced from korashi. These jet-black instruments of torture and punishment render a mage completely helpless to any who wish to bring them harm, causing them to become the main tool used by the warmongers to persecute mages throughout Shamakhad. With this terrifying power at their disposal, the Command has long seen mages as little more than a smear on the larger canvas of the world.\n\nBut we know better. We have seized the sources of korashi from the hills of Azjakuma, and after painstaking experimentation and countless failures, our triumph lies just beyond the horizon. Let the Command believe that they alone control the fetters of magic–it will make it all the better when we break their chains." 
 V05_ashen_soul_title: "The Ashen Soul"
 V05_ashen_soul_desc: "In isolation, there is little to do beside cultivate the self, and so the Ashwoven Harimari who make up the Ashen Soul quickly turned to cultivation of their innate magical prowess. With an affinity for fire and water woven into their storm-grey fur, the monastic order developed a multitude of techniques used to create, control, and destroy their foes.\n\nRumours tell of a way to exterminate Facestealers, using the combined power of the Ashen Arts and the cleansing heat of spiritfire. This claim has been tested before, and ended with the tragic loss of many harimari on the edges of the plateau. However, there is still hope–the monks were able to hold their own much longer than the conscripted Rukunai. These rumours may yet hold water, but to confirm them, the Ashen Soul must do what it does best–think."
 V05_ignite_flame_title: "Ignite the Flame"
 V05_ignite_flame_desc: "Bazuneizar is known to hold many treasures within, on account of inscrutable artifacts from an empire long past that litter the surrounding terrain. These relics of power have long since turned inert, but their innate magical energy provides something that the Ashen Soul has been missing for centuries–a way to amplify the light of spiritfire, and project it across the land.\n\nDesigns are drawn up, and a structure is planned: a giant brazier, placed on top of the fortress of Bazuneizar, and a portion of the Undying Flame laid inside. With enough mana, and the right adjustments, it's possible that this invention could soothe the lands of Gozengun for miles. With the hope of their land's rejuvenation fueling their every move, the mages gather the builders and begin to work."
 V05_tame_monsters_title: "Tame the Monstrous"
 V05_tame_monsters_desc: "As we expand our influence throughout Khaashalg, the pull of the wastes in Nomsyulhan have drawn our attention into this forgotten area of the valley. Populated with a variety of different monstrous nations, we have heard tales of the wonders and dangers present in the region, while the land remained shrouded in mystery due to our isolation. Now we have a chance to explore the land for ourselves - the only obstacle in our way is the monsters who currently haunt the lands." 
 V05_waste_spirits_title: "Spirits of the Waste" 
 V05_waste_spirits_desc: "In our expeditions into Nomsyulhan, we have discovered that the land we once believed to be barren and strange has become much more familiar. The ogre and harpy inhabitants of Nomsyulhan follow a rich history of religion and philosophy, overcoming their past limitations and ascending into something greater - much like the harimari once did long ago. Their relationship with the land and its history is one we could stand to learn, as the harsh environments are no match for the resolve of the waste’s inhabitants. By nurturing the lands of Nomsyulhan, perhaps we too can weather the brutal desert and learn of the ancient history of Nomsyulhan." 
 V05_eagles_flight_title: "The Eagle’s Flight" 
 V05_eagles_flight_desc: "Forced over the Godswall with the rise of the Harimraj, the Eagle Hobgoblins of Nomsyulhan have proven to be difficult thorns to remove from our side. As a continuation of Harimar’s legacy, we in many ways represent the ultimate chaos which displaced them from their homes and caused them to flee into the wastes. But with time, we have grown to understand the culture of these proud people, fighting against the harsh environment they were thrust into and soaring higher than ever before. Perhaps if we can show that we are not the second coming of Harimar, but something far more understanding, we can learn their ways and be allowed into their skies." 
 V05_heart_of_flame_title: "The Heart of the Flame" 
 V05_heart_of_flame_desc: "Just as we found trust and harmony with the people of Gozengun, the opportunity presents itself to do the same with those of Yanshen. The Yan in distant times were subjects of the Harimraj, but time and isolation has transformed the region beyond our understanding. The traditions of Harimar no longer hold true, and instead the people of Yanshen have forged new identities for themselves and their fierce regional personas. The Yan deserved to be acknowledged as the mighty people they have grown into, and with time and understanding, they will see how strong we have become in kind." 
 V05_coast_power_title: "Chasing Tails" 
 V05_coast_power_desc: "Down the coast of Yanshen, countless rivers run into the sea like the many tails of a herd of cats. These rivers and the ocean they connect to hold much value to us, as well as holding the jewel of Yanshen in the city of Tianlou. Should we seek to push back against greater enemies who luck past the horizon, the power of trade is one which we should seek to fully harness. Down the coast we shall travel, and chase the tails towards an ocean of prosperity." 
 V05_drive_out_oni_title: "Drive Out the Oni"
 V05_drive_out_oni_desc: "As we push further west into Haless, the rumours we have heard of the Command continue to ring true - mages shackled with korashi, the most vile material we have ever seen, rendering them helpless in the face of the hobgoblin slavers. The source of this evil mineral, the oni of the Demon Hills, have enabled the enslavement of countless of our brethren. This aberration of the soul cannot continue, and so korashi, with the oni in turn, must be destroyed."
 V05_reclaim_dragonlands_title: "Reclaim the Dragonlands" 
 V05_reclaim_dragonlands_desc: "For many years, Upper Yanshen has been largely controlled by the Dragon Kings of Bianfang, but long ago these lands too were under the control of the Harimraj. While we have eschewed our claim as the Harimraj reborn, our legacy as their successors still grants us divine right to take these lands into the fold. Greater still is its tactical importance, for beyond Yanshen lies a nation whose victims can only utter its name in sheer terror - the Command. If these tales of the hobgoblin’s conquests hold true, then we will need many resources to prepare for their arrival. All of Yanshen must be ours." 
 V05_shackled_no_more_title: "Shackled No More" 
 V05_shackled_no_more_desc: "Long have the mages of Shamakhad been stifled and imprisoned within dread korashi shackles. But as our research approaches a new zenith, we have discovered a way to destabilize and ultimately render korashi inert, making these restraints little more than decorative bracelets. The time has come for our brethren to be freed, and for us to descend onto Shamakhad once and for all. As long as we walk the earth of Haless, this will hold true: no mage will be shackled ever again." 
 V05_rising_tiger_title: "Rise of the Tiger" 
 V05_rising_tiger_desc: "For 1200 years, Cangyuan has served as a bastion of enlightenment in the remote hills of Gozengun. The administrators of Cangji ruled from their secluded temples, rarely seen among the Rukunai in more secluded regions of the plateau. We had found peace, for a time. But all a blaze needs is a single spark, and the name of this spark was Abatai.\n\nPosing as a foreign student, Abatai entered the secret archives of Cangyuan and stole off with the knowledge of spiritfire, even taking an ember of the Undying Flame as he fled. Soon after, Abatai killed a Facestealer with this power, and the Runsukhi exploded in their adoration for him. This transgression has flung the Ashen Soul into chaos, for they believed it their sacred duty to bring the Facestealers to heel. With Abatai's following growing every day, inaction is no longer acceptable–sleeping tigers must deign to rise." 
 V05_claim_the_peaks_title: "Claim the Peaks" 
 V05_claim_the_peaks_desc: "In order to move against Abatai, we must first secure our own lands from the probing fingers of Hakuukulga. Would-be thieves who have skirmished with us in border disputes for many years, Hakuukulga is a nation of opportunists who would seize our land the moment they observe a weakness where they may strike. Beginning a campaign into the desert with them at our flank could lead to a devastating counter-assault of which we cannot defend against. The thorn in our side must be removed, and Hakuukulga must be conquered before we press on." 
 V05_master_runsukhi_title: "Coal and Cinder" 
 V05_master_runsukhi_desc: "Abatai’s legacy of treachery and deceit has caused the Runsukhi of Gozengun to revere him as their saviour from the threat of the Facestealers. Their fanatical zeal has led them to believe only spiritfire can save them from the looming dangers in the wastes, and the only way to obtain spiritfire is to take Cangyuan for themselves. This cannot be allowed to pass, lest the last embers of the Undying Flame be extinguished in their haste. We must fight back before all is lost, to ensure the safety of our nation and the secrets of the Ashen Soul." 
 V05_conquer_khudi_title: "Conquer the Khudi" 
 V05_conquer_khudi_desc: "Oinukhudi is one of the eminent powers in Gozengun, possessing large swathes of territory in the frozen north. These pastoral nomads have grown to become the stewards of a civilization built upon the backs of their geomancers and empowered by their dealings with elemental spirits. Their awesome strength, greater even than Guwaamud of old, has struck worry through the hearts of the Ashen Soul. How will we defend our legacy in the aftermath of Abatai’s betrayal if Oinukhudi continues to plague our borders? Gozengun must be wholly ours to secure our reputation, and so Oinukhudi must fall." 
 V05_birdriders_fall_title: "The Birdrider’s Fall" 
 V05_birdriders_fall_desc: "With our dominion over the rest of Gozengun secure, there is only one way left to travel - towards the south, and our ancestral homelands. Yanshen was our birthplace, and while the valley will forever be our domain, reclaiming what was once ours is paramount to secure the remains of our legacy. The terror-bird warriors of the Shuvüüsh stand in the way, and if left alone will drain our fledgling nation of resources until they swoop in and shatter us to pieces. To secure our future, in the valley and beyond, the birdriders must be conquered." 
 V05_frost_lotus_blooms_title: "The Frost Lotus Blooms" 
 V05_frost_lotus_blooms_desc: "While we first ventured down from the mountaintops in a desperate fit of jealousy and outrage, we now find ourselves as the stewards of not just the Runsukhi but all of Gozengun. Long have we considered ourselves heirs of the Harimraj, destined to reclaim what was lost when it fell from grace. But looking out at the expanse of cultures, religions, and races under our care, it has become clear that our future no longer lies within the past. Now we stand on the precipice of our triumph over Gozengun, and with it rises a question that will shape the way forward as the flow of water shapes the banks of a river - what does it truly mean to rule?" 
 V05_beyond_the_stone_gate_title: "Beyond the Stone Gate" 
 V05_beyond_the_stone_gate_desc: "Standing at the foothills of Nomsyulhan, the Stone Gate serves as the barrier between the Forbidden Plains and Gozengun, keeping the centaurs at bay with its imposing walls and unforgiving terrain. The passes into this region of the world have served us well as we grew into the state we are today, but now the time comes where we must leave the comforts of our nation's youth behind. We've heard of great wonders in the rolling fields of the plains, and if we wish to see their splendor we must venture beyond [Root.GetName]’s cradle." 
 V05_yarikhoi_ambitions_title: "Yarikhoi Ambitions" 
 V05_yarikhoi_ambitions_desc: "From the lips of centaur merchants we have discovered a great power lying to our west, in the form of the Yarikhoi Lake Federation. Kalsyto is a powerful military force, but they also hold massive disdain for mages like ourselves. Having such a power pressing against our backs as we march into Shamakhad is not something we can allow to come to pass. But before we can strike at a union of nations as powerful as Kalsyto, we shall need a foothold to launch our grand campaign. The vast Forbidden Plains hold many advantages to us, and will serve well as the beginnings of Kalsyto’s end." 
 V05_unravel_kalsyto_title: "Unravel Kalsyto" 
 V05_unravel_kalsyto_desc: "With the support of Sunijalla, who languished under the democratic barriers present in Kalsyto, we have begun our campaign to bring the Lake Federation to heel. Their legacy of oppressing those who share our magical aptitude is one that has stained all accomplishments in the black aura of evil, and so we have made clear our intentions to right their wrongs. Magecraft has brought our citizens from fear and isolation into pride and unity, and those who turn against it put themselves at odds with the very spirit of our nation. Today, Kalsyto will be corrected." 
 V05_kaylins_spirit_title: "The Spirit of Kalyin" 
 V05_kaylins_spirit_desc: "With magic restored within the lakes of Yarikhoi, officials of [Root.GetName] now turn away from squashing dissidents to understanding the people of Kalsyto. The three goddesses of the Lake Federation each prove to be thrilling objects of scrutiny, but the most enthralling of all is their united incarnation; Kalyin, spirit of the world. As we dig deeper into the faith of Kalyin, we begin to glean astounding insights on Kalsyto and her people. Our scholars continue to search the tomes of her worship, with one question haunting their every move: what will they find at the bottom?" 
 V05_fire_frost_and_spirit_title: "Fire, Frost, and Soul" 
 V05_fire_frost_and_spirit_desc: "Our people have conquered the cold, mastered the flame, and tamed the spirit. We have come far from our humble beginnings, as small monasteries secluded from the world. Now we stand as masters of Haless, and our world has expanded to scales never before dreamed. But what of those who still live on the small scale; what can we do to celebrate the people?" 
 V05_ghosts_title: "Ghosts in the Hills" 
 V05_ghosts_desc: "Spirits are a natural part of life within Gozengun. Permeating the fabric of many day-to-day activities, the population that live within these lands have a storied history of interaction with spirits, both good and bad. Cangyuan, and the harimari within, share a different relationship with the spiritual, as the Undying Flame and various other charms they wear ward away spirits from their lands, both good and bad.\nThis lack of understanding is a major proponent of the schism within Cangji. Those who instruct the Rukunai of the Levaajan faith believe the harimari do not care to grasp their local ways, and instead sit within their monasteries and study the High Philosophy. To begin mending the rift, we must first understand the ghosts that wander the hills." 
 V05_facestealers_foe_title: "Facestealer’s Foe" 
 V05_facestealers_foe_desc: "Even with our lack of knowledge on the local spirits of Gozengun, one particular type of spirit is impossible to forget - the Facestealers. Monstrous beings assembled from the stolen faces of the dead, Facestealers have plagued Gozengun for many centuries, killing countless people and striking fear into the heart of even the strongest warriors.\nThis changed when Abatai stole our magical techniques and used them to slay one of the monsters. Now, we see that the Facestealers can be defeated with our powers, even if the theft that led to this discovery was a heinous act. It is no longer possible to ignore this fact, and the Levaajan priests know this well. But by extending an olive branch to them, and beginning to share our knowledge with the priesthood, perhaps we can grow ever closer to mending the schism of faith." 
 V05_shelter_from_sands_title: "Hearth and Home" 
 V05_shelter_from_sands_desc: "As we continue to grow the dialogue between human and harimari, it’s clear that the Levaajan priesthood holds more value than was previously considered. With their knowledge of local spiritual practices, and their many years of experience dealing with the fickle attitudes of spirits, there is a great deal of knowledge hidden within their archives. They have proven themselves to be useful, perhaps even equal to the great High Philosophy monasteries that dot the plateau. With more resources, we can enable them to accomplish even more, and cement the friendship between our very different races." 
 V05_gozenguns_finest_title: "Gozengun’s Finest" 
 V05_gozenguns_finest_desc: "Although the harimari of Cangyuan make up the bulk of our fighting force, time and again the human population of Khaashalg has proven themselves to be invaluable on the battlefield, either directly on the front lines or in supporting roles for our infantry. This show of bravery, prowess and tactical ability runs adjacent to an issue that grows more dire the further we expand. The harimari of our lands are a minority, and we cannot field an army composed mainly of harimari warriors for much longer. With this issue in our minds, and the aptitude of the humans on the field, the solution to this problem is clear. All that is left is to prepare the humans for the coming tide." 
 V05_fivefold_compass_title: "The Fivefold Compass" 
 V05_fivefold_compass_desc: "The Khudi, and their Un Khudai faith, are more in tune with the elements than any other people in Gozengun. Every aspect of their society reflects its elemental origins, strengthening their connection to the natural world around them. The Ashen Soul too represents a strong connection to fire and water, and follows many of the tenants seen in the lands of the Khudi. Following this connection could link our two faiths together, and bring our twin understanding of the Supreme Spirit together in harmony." 
 V05_topple_the_crane_throne_title: "Topple the Crane Throne" 
 V05_topple_the_crane_throne_desc: "The Sage Kings of Gowon have held great power in both Gozengun and Yanshen for generations, ruling over Danggun from the heights of the Crane Throne. Now their empires have fallen and they have slowly waned into decline, their influence on the region growing smaller by the day. Gowon is a spiritually rich land, and would finally allow for us to journey to the sea.\nMost importantly, it sits next to our final prize: Jiantsiang, and the temple within. We will venture to the land of the Sage Kings, and with its capture gain a foothold to our blessed restoration." 
 V05_seat_of_the_tiger_title: "The Seat of the Tiger" 
 V05_seat_of_the_tiger_desc: "We have found new purpose in our rule of Gozengun, but even with the enlightenment that comes with spiritual clarity, one thing remains immutable. Jiantsiang, and the Temple of Undying Flame, stands as our ancestral birthplace and the origin of the wondrous energies of spiritfire. Both of these factors make the region destined to be brought into the fold of [Root.GetName], and freed from the shackles of the many squabbling states and scheming eunuchs which plague Yanshen. We will claim our homeland and bring spiritual teachings to those who dwell within it, and through mastery of the temple’s power grow to better understand our greatest gift." 
 V05_beneath_the_sands_title: "Beneath the Sands" 
 V05_beneath_the_sands_desc: "Long ago, before we arrived in the northern wastes of Gozengun, ancient Levaajan cities dotted the landscape, towering monuments to the resplendance of their civilization. These spectacles of man have long since disappeared beneath the deserts of Khaashalg, and many Levaajan in Gozengun await their return with baited breath. Now that we have gained control of the main source of the Undying Flame, perhaps we may use it to hasten their return, and deliver the Levaajan who buoyed us to triumph their greatest wish." 
 V05_when_nations_fall_title: "When Nations Fall" 
 V05_when_nations_fall_desc: "With painstaking effort, we have uncovered the ruins of the Levaajan cities of old. These empty relics of the past have had an adverse effect on the followers of Levaajan beliefs in Gozengun; instead of euphoric joy, they wallow in the despair of their ancient glory truly being lost forever. But this need not always be the case, as we have learned to be the stewards of many different peoples and places. Perhaps we can be the keepers of the Levaajan past as well. But what does it mean to preserve a nation that has already fallen?" 
 V05_far_temples_title: "The Far Temples" 
 V05_far_temples_desc: "Beyond the mountains leading to the Forbidden Plains, pockets of Levaajan scholars and priests cling to temples pressed against the granite walls of the peaks. Scattered throughout the lands of Nuzurbokh, these scholars have learned many things from the inhabitants of the plains, from the centaurs to the rare ogres who appear from Salvation’s Promise. These people have much to teach us, and learning from them would serve us well to understand the lands, and those who taught them in kind." 
 V05_lonely_seat_title: "The Lonely Seat" 
 V05_lonely_seat_desc: "Isolation from the rest of the Harimraj has led Cangji, and Cangyuan within, to take up the mantle of the Lotus Seat, keeping the standard of Harimar aloft in the frozen north of Gozengun. In truth, the position of Cangyuan atop the mountains with few allies or resources has caused it to gain a different nickname from the locals, snickered within temples and homes; the Lonely Seat of the Harimraj. \nWe may be cut off from our homelands, and our resources few and far between, but with distant threats growing closer by the day we can no longer settle for survival. We shall turn from the Lonely Seat to the Resolute Seat, strong in our convictions and unwilling to be content with simply living; instead, we shall thrive." 
 V05_cultivate_desert_title: "Dune Flowers" 
 V05_cultivate_desert_desc: "As we came down from our plateau in the clouds, we began to see the conditions of those who remain tied to the earth. The deserts of Gozengun are harsh, with little shelter and fewer sustenance found among the dunes. We have become stewards of the land, and as such it falls to us to turn it from inhospitable wasteland to somewhere our people can call home. With time, perhaps we may even turn the withered sands into verdant grassland, and bring blossoming flowers to the untamed wilds." 
 V05_wasteland_markets_title: "Wasteland Markets" 
 V05_wasteland_markets_desc: "Cangyuan, now the centre of a burgeoning state, has greatly benefitted from our recent expansions. No longer the Lonely Seat, wasting away on the mountaintops, it has turned instead to a bustling hub of scholars, merchants, soldiers, and more. Citizens of [Root.GetName] flock to the Low Temple, gazing in awe on the fragment of spiritfire used in our warding brazier. However, due to its elevated position, Cangyuan still languishes under the weight of these new visitors. By reinforcing our trade in Gozengun, we open a new line of support to the capital, using the markets of the wasteland to let the seat of power thrive." 
 V05_fire_everlasting_title: "Fire Everlasting" 
 V05_fire_everlasting_desc: "Returning at last to the source of the Undying Flame, Jiantsiang stands as the seat of our new empire within Yanshen. Standing proud on the shore of the Sea of Spears, spiritfire now lines the streets of the city, enveloping the area with a soft, blue-pink glow. As we continue to expand throughout Yanshen, the city in turn grows strong and proud to mirror our growth, and rises to new heights while blazing with eternal glory." 
 V05_dislodge_eunuchs_title: "Dislodging the Eunuchs" 
 V05_dislodge_eunuchs_desc: "Ever since the fall of the Harimraj, Yanshen has been infested with a group who have tightly grasped regional power in their fists; the Eunuchs. Rooted deep within the bureaucracy of every nation within the region, their continued control of much of Yanshen’s political and economic power will lead to destabilization and rebellion if we do not address it. We must show the people that a new power has come, releasing them from the usurpers who swarmed across the land when the Harimraj was destroyed, freeing us of the snake that lies in the grass of our newfound territory." 
 V05_trade_unfrozen_title: "Defrosted Trade" 
 V05_trade_unfrozen_desc: "With the Eunuchs expelled from Yanshen, we now stand on the precipice of new heights in our economic power. Trade in Gozengun, while bolstered by our efforts in Cangyuan, is languid compared to the bustling ports of Yanshen. Now, with the opportunity to expand our trade power throughout our rich new territory, we may finally realize the power of trade, bolstered through magical prowess in spiritfire-powered junks and river manipulation. Free of the frost of the north, our trade will be unfrozen in turn!" 
 V05_mend_the_rending_title: "Mend the Rending" 
 V05_mend_the_rending_desc: "Deep within the High Temples of Yanshen, spirits of unimaginable power were sealed away through the power of strong warding magic cast millennia before even Harimar walked the lands. This magic has weakened, and the spirits have begun to run free throughout Haless. We have spent many long years understanding how to deal with spirits, and although these beings greatly differ in power, they are spirits nonetheless. With all of our knowledge combined, we shall deliver our people from destruction and stitch the tatters of reality back together." 
 V05_nomsyulhan_title: "Seeking the Past"
 V05_nomsyulhan_desc: "With the eastern pass now open to us, the ancient lands of Nomsyulhan lay ripe for exploration and discovery. Marked by countless relics from civilizations who no longer walk the earth and strange cultures with alien beliefs, such a fascinating land cannot simply stand empty of curious minds who seek to expand the knowledge of all. We shall make our way down the valley and establish the beginning of our research outposts - once the ogres who stubbornly bar the way have been dealt with."
 flavor_cangji.1.t: "Undying Light"
 flavor_cangji.1.d: "Since the founding of Cangji, our small ember of the Undying Flame has warded us against harmful spirits and sheltered us from the cold of the mountains. Now, as we find ourselves threatened by enemies on all sides, scholars and monks have been praying before the flame, hoping for deliverance from that which troubles them. \n\nA smaller cohort also huddles around the flame, muttering amongst each other and frantically moving back and forth between a variety of scrolls. These are the pyremages of Cangyuan, a smaller sect of the Ashen Soul specializing in the manipulation of spiritfire. They scribble mysterious schematics onto neverending sheets of paper, until they frantically rush inside the temple with scrolls streaming from their eager arms.\n\nFor seven days and seven nights the pyremages worked within the temple's walls, isolated from the rest of Cangyuan. When they finally emerged, they carried with them a massive brazier strapped to a shoulder-mounted platform. One of the mages put it on his back, concentrated very hard, and soon spiritfire filled the brazier and flew into his hands with a pink-blue glow. The onlookers cheered; they finally had made spiritfire– which before had required a stationary burner– fully portable. The fight against the facestealers begins today!"
 flavor_cangji.1.a: "May the flame burn bright against the soul."
 flavor_cangji.2.t: "Fire of the Soul"
 flavor_cangji.2.d: "Atop the castle of Bazuneizar, a massive brazier of steel and gold rises from the mountain peaks, intricately inlaid with gold and silver trim. This behemoth vessel was constructed by the pyremages, with help from craftsmen in Bazuneizar as well as the ancient artifacts discovered within cobwebbed halls. Ten of these mages now gather in a central courtyard, pink flames dancing between their fingertips, as the air around the brazier begins to rapidly expel water vapour. By superheating the surrounding atmosphere, the pyremages are better able to conduct the next step. And as one, they do, thrusting their hands forward in an intricate dance as fire shoots from their palms.\n\nTrails of flame arc into the massive brazier, filling it with octarine light, before the embers catch alight with a dramatic surge of fire. A collective breath enters the lungs of the pyremages, and remains held as the artifact inlays begin to glow. With the right mixture of artifact, spiritfire, and magical force, the pyremages have theorized that they can create localized, near-perfect copies of the Undying Flame. This theory has not been tested until today, and so the mages watch on in anticipation, fearing their research soon to be squandered.\n\nAll are silent as the kindling burns. \n\nSuddenly, a second rush occurs, more powerful than the first, and the brazier instantly turns a brilliant blue as the flame is made eternal. \n\nAs the spiritfire takes hold and begins its neverending blaze, all present for the event begin to cheer. For the first time in history, they have created a copy of the Undying Flame. The wastes are no match against the purifying heat of our ultimate triumph!"
 flavor_cangji.2.a: "On wings of fire we soar to new heights!"
 flavor_cangji.3.t: "Up the Giant Steps"
 flavor_cangji.3.d: "Time and again we have discovered rich cultures where we once believed there was only savagery and unenlightenment. Our excursion into Nomsyulhan has proven no different, as those living within the mythical valley have shown themselves to be sophisticated people beneath their monstrous visage. In particular, the Soulseeker ogres are a people with a deep understanding of the spiritual, and what it means to push yourself beyond your limitations. For this reason, [Root.Monarch.GetName] finds [Root.Monarch.GetHerselfHimself] at the base of a massive staircase cut into the side of a mountain, accompanied by an ogre monk from the foothills of Nomsyulhan.\n\n“In Nomsyulhan, what seems to be poverty is truly an abundance of knowledge from those who came before,” the monk explains as the two climb the steps. “Spirits and artifacts guide us through times of scarcity, and through these things we may achieve enlightenment.” \n\nThe two finally reach the top of the steps, and [Root.Monarch.GetName] is awestruck by the sight before [Root.Monarch.GetHerHim]: massive statues of giant figures carved into the walls of a mountain pass, extending out into an endless grassy plain.\n\n“Salvation’s Promise,” the ogre solemnly intones. “A monument created by our Sandmaw brethren when they fled across the steppe and into Nomsyulhan.” The ogre walks towards the edge of the mountainside, taking in the giant statues. “Many of the statues were present when they arrived, but they expanded on their ancestor's visage to create something truly wonderful. We continue this tradition, honouring the spirits of our land and tempering our souls to better serve our communities. Is that not so different from how you serve yours with purifying flames?”\n\n[Root.Monarch.GetName] contemplates the ogre's words, then after a few breathtaking moments gazing into the infinite grassland, turns to the monk and says:"
 flavor_cangji.3.a: "I now see how close we are to each other."
 flavor_cangji.4.t: "Teachings of the Rukunai"
 flavor_cangji.4.d: "Since its founding as the Lotus Seat of the Harimraj, Cangji has stood as a bastion of High Philosophy teachings among the frozen peaks of Gozengun. Little have we considered the value of the knowledge that could be learned from the Rukunai; how could these humans, who have little magical prowess, offer us any knowledge that we have not already gleaned? This dismissal led to tensions rising between our two faiths, nearly reaching a schism as we fought with one another.\n\nNow, as we descend from the mountains of Cangyuan and spread throughout Gozengun, it's clear that the Rukunai have amassed a significant amount of knowledge pertaining to the spirits that inhabit these lands. Any spiritual presence that tries to approach Cangyuan is warded off by the Undying Flame, and so dealing with the local spirits is a foreign concept to our priests and administrators. Perhaps it is worth trying to bridge the gap between our faiths, and mend the centuries of conflict that permeates the two clergies. Maybe then we can finally understand how the Rukunai have lived out in the wilds."
 flavor_cangji.4.a: "Perhaps I treated them too harshly"
 flavor_cangji.5.t: "The True Spirit of the Waste"
 flavor_cangji.5.d: "In the wastes of Khaashalg, it has become a common practice to burn a small slip of paper in a slim furnace in prayer to the spirits of the world. These flames are tinted blue by a special powder sold by harimari merchants, connecting the humans of Cangji to the spiritfire which allows them to live in this desolate land.\n\nNow, within the largest regimental camp of the [Root.GetAdjective] military, hundreds of these furnaces blaze with the prayers of the Rukunai and Rünsukhi alike as a human general meets with the harimari commanding officer. Both sides exchange greetings and offer each other gifts of incense, livestock, and clothing, before sitting together on two pillows within the commander’s tent.\n\nThey discuss for a long time, day passing to dusk. When the sun finally sets on the horizon, both emerge from the tent and look out across the camp, the crowd of human and harimari teeming with anticipation.\n\n“We have come too far to not acknowledge the outstanding bravery of our human compatriots,” the harimari commander declares to the audience. “They have given up their homes, their families, and put their lives on the line to defend their country. Although they do not fight, we would surely have lost many battles without them.”\n\nHe gestures to the human at his side as he continues. “No longer shall humanity be limited to a supporting role in the epic of Cangji. We shall honour you and your service, while amending any dishonours previously given out.” He stands to the crowd, arms raised in exultation, as he finishes the declaration. “Humans are the lifeblood of the wastes of Gozengun, and we shall recognize their critical importance…”"
 flavor_cangji.5.a: " “By allowing them to finally serve on the battlefield.”"
 flavor_cangji.5.b: "“By learning from them their many tactics of war.”"
 flavor_cangji.6.t: "Spiritual Guidance"
 flavor_cangji.6.d: "The spirits of Danggun have been adamant in their resistance to our expansion, as the harmful effects of spiritfire on spirits of many types is becoming more problematic in areas such as Gowon, where spirits hold important administrative duties. Like many problems, this issue was eventually solved through the joint effort of Danggun’s spiritual advisors and the pyremages of the Ashen Soul. Slightly tweaking the inlays of the braziers, the flames can be calibrated to allow for spirits of a certain pattern to be unaffected by the repelling heat, allowing the spirits of Gowon to continue their duties without being harmed. With this rift between our cultures healed, we may now finally understand their teachings of the spirits."
 flavor_cangji.6.a: "Splendid work, everyone!"
 flavor_cangji.7.t: "The Northern Raj"
 flavor_cangji.7.d: "After many long years of consolidating our power, we have at last extinguished all threats to our state and gained control of their lands in return. We now stand as the rulers of all Gozengun, from the ancient lands of Nomsyulhan to the thriving societies of Khaashalg and Gowon. Even the harsh lands of Moduk and the fearsome birdriders of Shuvuush were no match for our magical prowess and military might. But as we celebrate the triumph of our order against those who wish to break it, another feeling is present among those who made Cangji truly great.\n\nMany new peoples and societies have been integrated into our lands, bringing us true understanding of what it means to worship the spirits and commune with the other side. These cultures have given us magical secrets, economic practices, construction techniques, and military tactics we could not dream of imagining from the quiet halls of our mountain temples. This may be the zenith of Cangji, but we would not have climbed to this peak without the steps carved by the many races of Gozengun.\n\nIn times like these we must not consider ourselves conquerors of the hapless unenlightened of the valley, but the new stewards of their lands, taking on the responsibility of other nations who came before us. This task is a heavy burden to bear, but now we know we need not bear it alone. Let us walk forward together, leaving our old history of domination behind and entering a new era of co-operative growth!"
 flavor_cangji.7.a: "The people of Gozengun stand united as one!"
 flavor_cangji.7.b: "The people of Cangji stand united as one!"
 flavor_cangji.8.t: "Something in the Stars"
 flavor_cangji.8.d: "Plumbing the depths of the Nomsyulhan rift is not an expedition taken by the faint of heart. Dangers within this otherworldly portal are often deadly, and cannot be fully comprehended by our mortal minds. Still, the Ashen Soul explores the other side of the rift with trepidation, in their efforts to try and locate the beast which slumbers on the other side.\n\nToday, the expeditionaries find themselves in an underground cave system, stretching through the darkness for an unknowable distance. The brave mages walk through the caverns, searching for signs of life, when they suddenly hear a sound similar to that of a crystal shattering into miniscule fragments. Slowly, they look around, and in the blackness they spot two glowing eyes, shining a curious blend of gold and silver. Suddenly, the twin metallic lights surge forward, and from the black emerges a terrifying creature of scale and claw, seemingly some sort of gigantic reptilian tiger. The mages scramble, flinging spiritfire across the cavern while monks wreathe their swords in pink-blue flames. The creature races forward, and within moments is upon them.\n\nOn the other side of the portal, mages of harimari, hobgoblin, and human descent work to hold the rift open, while ogres commune with spirits surrounding the complex who act as scouts within the rift. These managers of the other side soon begin to feel large spikes in magical energy emanating from the portal, and just as they evacuate the immediate area titanic jets of blue flame shoot into the sky. Soon after, one lone harimari mage emerges from the rift, covered in red and blue blood. She raises her hand, and slowly from within the void a gargantuan corpse emerges into the desert. She places it into the sand, and collapses to the ground."
 flavor_cangji.8.a: "What sort of monster could live beyond reality?"
 flavor_cangji.9.t: "Homecoming"
 flavor_cangji.9.d: "Our history has long since divorced from our past beneath Lianzhou and the Harimraj, but it is impossible to ignore the connection we share with the northern regions of Yanshen. This was the cradle of our fledgling nation, and within its central city of Jiantsiang lies the ultimate link in the chain of our past; the Temple of the Undying Flame.\n\nStanding within the temple’s halls, countless pyremages of all skins and stripes look upon the massive conflagration in utter devotion, either throwing themselves to the ground in reverence or frantically scribbling onto scrolls and tomes. This great beacon of neverending light is the origin of our understanding of spiritfire and its reclamation by us can only be seen as an event of utmost significance. Long have we survived on the fading embers of its divine warmth, but with the source in our hands, the possibilities of magical growth are endless.\n\nAll at once, the pyremages infuse their own magic into the temple’s brazier, causing the newly installed inlays to glow a brilliant white. Soon, the Undying Flame begins to shift and crackle, until it finally bursts into a pillar of fire, blasting through an opening hastily cut into the rooftop and forming a beacon that extends far into the night sky. The mages cheer, and the Ashen Soul weeps in euphoria. Finally, they have returned home."
 flavor_cangji.9.a: "Glory to the Undying Flame! We shall stand eternal!"
 flavor_cangji.10.t: "Sewn Discord"
 flavor_cangji.10.d: "The Yarikhoi people stand at the head of a terrifying monolith known as Kalsyto, but they are not a people who can easily co-exist with one another. As word of our expansion into the mountains of Gozengun reaches the lakes, and tales of our strength passes through traders braving the plains, tensions within Kalsyto have begun to rise. Arguments between fellow states, disputes about how to handle the growing threat, and the scheming of those who believe democracy to be nothing more than a farce grows throughout the lakes.\n\nWord has come back that Kalsyto struggles underneath the pressure. Their fear of magic has spurred them to rash decisions and risky political gambits, destabilizing the region overall and causing each region to trust their neighbours less and less. Soon, the time will be right for us to stop Kalsyto and their magical oppression for good!"
 flavor_cangji.10.a: "Magic will be free, no matter the cost."
 flavor_cangji.11.t: "Dividing the Lakes"
 flavor_cangji.11.d: "As we continue to march towards the lakes of Kalsyto, we have received multiple correspondences from a region of the lakes known as Sunijalla. Languishing under the yoke of democracy, Sunijalla wishes to break free from Kalsyto and instead serve under our banner. Allies in the region are few and far between, and we have seen what democracy does to the magically inclined. We send them our acceptance of their terms as we continue towards the lakes.\n\nPyremages, now reinforced by all the magical techniques they have learned throughout Gozengun, reinforce our soldiers with fiery weapons and shimmering veils of water. Kalsyto has long oppressed those with magical gifts such as ours, and so the only way we can truly defeat them is to show them why oppression cannot lead to a sustainable country. The ways of Kalsyto will be corrected, and magic will flourish in the lake federation once more!"
 flavor_cangji.11.a: "Onward, to Kalsyto!"
 flavor_cangji.12.t: "For Those Who Come After"
 flavor_cangji.12.d: "Digging in the ancient sites of Levaajan cities has been a painstaking process, requiring multiple teams of ogres, humans, hobgoblins, and many others to move the earth from the ruined structures we found beneath the desert. From our production centers within the wastes of Gozengun, excavation equipment and archaeological offices handled the preservation effort of the ruins they discovered, bringing all texts back to monasteries to be studied and recorded for future use. As more of these texts were uncovered in the sand, we began to see the true marvel that was hiding from us in the relics of the past; not a grand mystery of the universe, but the humble reality of being alive.\n\nRecords of merchants selling goods in marketplaces. Administrative accounts of supplies needed for carrying out martial campaigns. Stories and tales of wonder and enchantment, written to excite and mystify. Even artwork, from the grandest piece of artistic achievement to the simple drawings of a child. Time and again these pieces of history were uncovered, and our memory of the Levaajan of old became ever more personal.\n\nThese were not simply majestic cities of an empire long past; they were homes for thousands of people, each with their own stories to tell. In this revelation, our effort to steward the cultures who now live within our lands becomes ever more important. Who will tell the stories of these people when they’re gone, and who will preserve these stories so they continue to exist throughout all time? As long as we hold their lands, the answer to these questions is clear. This is our duty, and we will gladly accept it."
 flavor_cangji.12.a: "When one falls, we continue."
 flavor_cangji.13.t: "The Mage’s Decree"
 flavor_cangji.13.d: "Within the borders of the hobgoblin Command, mages have been oppressed for the crime of existence, and treated as untrustworthy and dangerous. Long has this oppression gone unchecked as the Command spread across Haless like a cancer. No longer will the Command freely oppress our brethren, beating them into submissions and shackling them with korashi chains!\n\nThe word has spread through Shamakhad of our inevitable assault, and our quest to free the mages from their shackles. As we make our declaration of war, many prisoners within the Command follow suit and begin to rebel against their hobgoblin masters. They have been assailed on two sides; we shall use this opportunity to strike, and win freedom for all mages within the Command!"
 flavor_cangji.13.a: "Forward march!"
 flavor_cangji.14.t: "The Grand Festival of Jiantsiang"
 flavor_cangji.14.d: "It is quiet throughout the streets of Jiantsiang, as a vast crowd of citizens gather along the shores of the Sea of Spears. Hundreds of blue lotus flowers have been released into the water, floating along the surface like frozen shards of pure ice. This is the beginning of the Grand Festival of Jiantsiang, a celebration of the coming year and all the fortune it will bring. This festival in particular is special, for it is the first festival conducted after the Rending had been beaten back from [Root.GetAdjective] lands. Countless people wait in silence as the flowers drift out to sea, awestruck by their beauty.\n\nAs the blooms begin to leave the sanctity of Jiantsiang’s harbour, mages lined along docks and piers begin to channel magical power into the flowers. As they do, wondrous beams of light shoot from the center of the petals, illuminating the night sky with a spectacle of hues that shower the harbour in colour. The citizens burst into celebration, both for the festival and for their guaranteed safety from the spirits that have caused them so much grief. Music begins to play, and the people move away from the harbour’s shores to begin the true festivities."
 flavor_cangji.14.a: "May Jiantsiang stand eternal as a beacon against the night!"
 flavor_cangji.15.t: "The Study of Kalyin"
 flavor_cangji.15.d: "Much of what we've learned about Levaajan beliefs includes stories of the Supreme Spirit, the central figure of their faith who split his soul into fragments in order to create the world. These teachings are shared with religions such as Umun Omi of the Besholgi, a common faith among the people of Moduk. But as we continue to explore the archives and religious texts of Kalsyto, we've begun to uncover some older texts relating to the three goddesses of the lakes, and their fused incarnation known as Kalyin.\n\nIn the teachings of those who follow Kalyin, the primary tenet of their beliefs is that everything in the world originated from Kalyin as part of her creation. This central axiom is eerily similar to those shared by the followers of the Supreme Spirit, and by tracing this shared belief down the annals of history we have discovered that the two entities are nearly identical in their respective religions. Shocking the clergy when first discovered, with time this revelation began to lead to Levajaan and High Philosophy scholars alike flocking to Yarikhoi, where they studied the faith of the lakes and how it relates to what we understand.\n\nIn our haste to obliterate the magical discrimination present in Kalsyto, we failed to realize how similar these people were to our own citizens. After meeting with officials of the faith of Kalyin, our two cultures quickly began to form a camaraderie now that our image was not that of tyrannical mages. We learn more from our people every day, and our foray into the lakes has proven to not be an exception."
 flavor_cangji.15.a: "Faith guides us all, no matter the form."
 flavor_cangji.16.t: "Magical Freedom"
 flavor_cangji.16.d: "As we move across the last battlefield of Shamakhad, we gather the few korashi manacles that were recovered from the hobgoblin commanders and place them together into a meagre pile. Spiritfire monks channel their flames into the restraints, and after absorbing the energy the shackles detonate into a shower of glittering black dust. All our soldiers simultaneously cheer, for they know that at last the final menaces of magekind have been obliterated, and they are truly free.\n\nWe have fought to bring our people together, and now we have fought to save those who are our people only in ability, nothing more. The cruelty of the Command has been broken, and we have forged an everlasting bond with mages not just of Shamakhad, but of all Haless. With our new position as the defender of magic, mages flock to our nation to give us their skills and knowledge. Who knows what the future holds in store for us, except the fact that we will stand as the bastion of magical freedom from now until we fall to dust."
 flavor_cangji.16.a: "Free at last, forevermore."
 flavor_cangji.17.t: "The Blue Lotus Field"
 flavor_cangji.17.d: "Against monumental odds, the people of [Root.GetName] have pushed beyond their limits and achieved something few would scarce believe when we began our existence many centuries ago. But now, as monks and pyremages gather in monasteries across Haless, we choose to not focus on our own glory and how we achieved it. Instead, we turn to the land of our origin, and the people who allowed our nation to blossom into the ultimate ruler of the north.\n\nMages channel their magic and monks manage the pyres all across our lands, and simultaneously a gout of brilliant blue flame erupts from the braziers of the monasteries like a stream of pure water. This fire splits into countless sparks, all settling upon the ground, where they suddenly begin to burrow into the terrain. With a blast of blue light, these sparks erupt into millions of blue lotus flowers, the colour of the oldest glaciers in Gozengun. All the lands around the monasteries are transformed into majestic fields of beauty, and our citizens cheer as we conclude our celebrations of triumph.\n\nTruly, our own path is much like that of the deserts of Gozengun. Once fraught and full of peril, with time, care, and the help of those around us, we have grown into a state of knowledge, magic, and camaraderie. Even in the coldest depths imaginable, something beautiful can still bloom."
 flavor_cangji.17.a: "I think I'll just sit here for a while…"
 flavor_cangji.24.d: "Held on special occasions gathered around the brazier within the Low Temple, the Ashen Soul tests candidates for leadership with a series of trials, both intellectual and magical. Written exams, magical demonstrations, and philosophical studies all make up parts of the testing process, and at the end only one candidate remains. This time, after many trials and tribulations, the final candidate remaining is…"
 flavor_cangji.18.t: ""
 flavor_cangji.18.d: ""
 flavor_cangji.18.a: ""
 flavor_cangji.19.t: "The Treasure Fleet Reignited"
 flavor_cangji.19.d: "Travelling from Yarikhoi to Jiantsiang, the treasure fleet of the Lake Federation has been reborn with the magical forces of [Root.GetName] bolstering its speed and efficiency. Great sails billow with mystic heat as pyremages use spiritfire to move the vessels along even in the most dead of waters. Truly magic has innovated in this field in a wondrous way indeed!"
 flavor_cangji.19.a: "Money is magic after all!"
 flavor_cangji.20.t: "Psychic Elongation"
 flavor_cangji.20.d: "Bolstered by the power of our monasteries, the Shigrii continue to be augmented by spiritfire, allowing them to produce goods in their increased capacity for a period much longer than those which do not bathe in the cleansing flames."
 flavor_cangji.20.a: "Thank the fires!"
 flavor_cangji.21.t: "Burning Questions"
 flavor_cangji.21.d: "The harimari of Cangji have been our rivals for many centuries, vying to seize total control of the plateau and the Rukunai population in return. We have traded blows for generations, never managing to bring each other low and bring the entire region into the fold. But something is stirring within Cangyuan - our spies tell us that monks are gathering en masse within the temple, and the warrior-caste of the Ashen Soul mobilizes arms in greater numbers than ever before. The threat to our nation is clear. Who else would they attack except their hated rivals of old?\n\nThese outsiders sit in their reclusive temples, hiding away from the world, and expect us to give in to their bids for power? The ridiculousness of the situation nearly outweighs the gravity of existence. We cannot sit by and let them attack us; we must strike first."
 flavor_cangji.21.a: "We cannot let them gain more power. Begin the assault."
 flavor_cangji.21.b: "Not yet...we must prepare."
 flavor_cangji.22.t: "The Spark"
 flavor_cangji.22.d: "Word has come from our borders to the south, as fields burn and roads are barred. The knights of Hakuukulga, who have languished under the yoke of their vile Oni masters, have noticed our growing strength and now seek to put an end to our nation just as we plan to re-enter the wider world. They seek to strike us when they think we're weak, and snuff out our light before we eclipse them in our radiance. We will not tolerate those who wish to see us dead; let them see that we still possess teeth."
 flavor_cangji.22.a: "Rally the troops!"
 frost_lotus_court_reform: "Frost Lotus Court"
 frost_lotus_court_reform_desc: "With the territory of the Ashen Soul growing ever larger, primogeniture alone is no longer acceptable for selecting our rulers. Instead, the Ashen Soul internally tests candidates and selects the most competent to become the head of state."
 frost_lotus_court_reform_2: "Frost Lotus Court"
 frost_lotus_court_reform_2_desc: "With the territory of the Ashen Soul growing ever larger, primogeniture alone is no longer acceptable for selecting our rulers. Instead, the Ashen Soul internally tests candidates and selects the most competent to become the head of state."
