 V05_stewards_of_past_1: "Stewards of the Past"
 desc_V05_stewards_of_past_1: "Ancient artifacts excavated from Khaashalg have taught us that we are not simply rulers, but protectors of our people's history. Let us cherish the history we can learn from these relics, and discover the future of our people within the past.\n\n§GLevel 1§!\nFor every §Y500§! §TMana§! spent on §MConjuration§! spells, you gain an additional §G-5% Tech Cost§! until you research your next technology"
 estate_church_V05_interfaith_teachings_1: "Interfaith Teachings"
 estate_church_V05_interfaith_teachings_2: "Interfaith Teachings"
 estate_church_V05_interfaith_teachings_3: "Interfaith Teachings"
 V05_rukunai_philosophers: "Rukunai Philosophers"
 V05_rukunai_philosophers_desc: "Word of our mission to understand the Levaajan tradition has spread, and philosophers flock from all corners of our nation."
 V05_magical_irrigation: "Magical Irrigation"
 V05_magical_irrigation_desc: "Warming lanterns lit with spiritfire melt snow on the peaks of mountains near Cangyuan, allowing water to flow to the land beneath."
 V05_anti_spirit_construction: "Anti-Spirit Construction"
 V05_anti_spirit_construction_desc: "Facestealers roam the wastes of the Rünsukhi, and so buildings must be constructed with specific measures to ward them away."
 V05_way_of_the_wastes: "Way of the Wastes"
 V05_way_of_the_wastes_desc: "The races of Nomsyulhan have adapted to the harsh climate, from ogrish hide to harpy feather. From them, we have learned how to navigate through hostile territory."
 V05_eagles_talon: "Eagle's Talon"
 V05_eagles_talon_desc: "The hobgoblins of Nomsyulhan teach us many things, but one stands out among the lessons: chaos must be crushed as soon as possible."
 V05_spiritual_uproar: "Spiritual Uproar"
 V05_spiritual_uproar_desc: "The spirits of Danggun are deeply connected to the land. The repelling effects of spiritfire on their bodies has caused them to grow irate."
 V05_return_of_ash: "Return of Ash"
 V05_return_of_ash_desc: "We have long been isolated on our mountaintops, but today we return to our ancestral home."
 V05_power_consolidated: "Power Consolidated"
 V05_power_consolidated_desc: "With the Eunuchs removed from their seat of power, the internal strife that has plagued Yanshen for years has finally been quashed."
 V05_psychic_production: "Psychic Production"
 V05_psychic_production_desc: "Harnessing the Shirgrii from their old masters, the Demon Hills now produce magical armaments with the aid of conjuration masters."
 V05_harimari_officers: "Harimari Officers"
 V05_harimari_officers_desc: "With humans becoming the main fighting force of [Root.GetName], the harimari in the military have stepped back into command roles. The commanders of human companies still hold great influence within the military, but the high command consists mostly of the silver-furred members of the Ashen Soul."
 V05_tiger_strike: "Tiger Strike"
 V05_tiger_strike_desc: "We no longer fight for the sake of the Ashen Soul. We stand instead as the defenders of Gozengun, now until our last breath."
 V05_the_distant_schools: "The Distant Schools"
 V05_the_distant_schools_desc: "The monasteries of the plains have been isolated for many years, and have learned to be hardy in the face of all-encompassing danger."
 V05_blazing_glory: "Blazing Glory"
 V05_blazing_glory_desc: "Braziers burn with a kaleidoscope of colour as the people of [Root.GetName] welcome a new era in Haless with open arms."
 V05_city_of_light: "City of Everlasting Light"
 V05_city_of_light_desc: "The Temple of Undying Flame burns bright and beautiful as we celebrate our eternal transcendence through spiritfire."
 V05_spiritfire_junks: "Spiritfire Junks"
 V05_spiritfire_junks_desc: "Billowing sails of trade ships are carried along by spiritfire as pyremages conjure hot air to transport their cargo across the sea."
 V05_gozengun_bazaar: "The Gozengun Bazaar"
 V05_gozengun_bazaar_desc: "Colourful tents line the streets of Cangyuan as it fills with trade and traders, marking the land as a hub for commerce in Gozengun."
 V05_sputtering_flames_effect: "Sputtering Flames"
 V05_sputtering_flames_effect_desc: "Fire spews from the monastery as the spirits of Haless fight to retain their sapience."
