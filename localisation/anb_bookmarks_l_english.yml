 CANNOR_NAME:0 "ÂŁbookmark_cannorÂŁ"
 CANNOR_DESC:0 "Cannor                                                                                                ÂŁicon_new_playerÂŁ Â§GRecommended for players who are new to the setting.Â§! \n\nÂŁbookmark_race_humanÂŁÂŁbookmark_race_elvenÂŁÂŁbookmark_race_half_elvesÂŁÂŁbookmark_race_halflingÂŁÂŁbookmark_race_dwarvenÂŁÂŁbookmark_race_gnomishÂŁÂŁbookmark_race_koboldÂŁÂŁbookmark_race_trollÂŁÂŁbookmark_race_gnollishÂŁ\n    ÂŁbookmark_separatorÂŁ\nA year has passed since the end of the Lilac Wars, a dynastic war of succession between the imperial Grand Duchy of Dameria and its neighbour, the Kingdom of Lorent. Lorent stands tired yet victorious, due to the betrayal of their Damerian enemies by their imperial allies like the Grand Duke of Wex, whom now holds the imperial seat. The balance of power is broken and new challenges will arise, but will the dream of Anbennar (unity) finally be achieved or will Cannor once again descend into chaos?"

 ESCANN_NAME:0 "ÂŁbookmark_escannÂŁ"
 ESCANN_DESC:0 "Escann                                                                       ÂŁicon_veteranÂŁ Â§YRecommended for EU4 veterans who are looking for something unique.Â§!\n\nÂŁbookmark_race_humanÂŁÂŁbookmark_race_orcishÂŁÂŁbookmark_race_goblinÂŁÂŁbookmark_race_elvenÂŁÂŁbookmark_race_dwarvenÂŁÂŁbookmark_race_halflingÂŁ\n    ÂŁbookmark_separatorÂŁ\nFor 20 years, the orc clans ravaged the land of Escann, destroying the chivalric kingdoms that succeeded old Castanor, the greatest human empire. Now with the death of Korgus, the orc chieftain, a new era has begun, with adventurers from all of Cannor roaming Escann in search of wealth, fame, and adventure, inspired by Corin, the adventurer-turned goddess that defeated the orcish warlord. Will the kingdoms of old arise once more, or will the lands of Castanor become the birthplace of new kingdoms, both human and orc?"

 DWAROVAR_NAME:0 "ÂŁbookmark_serpentspineÂŁ"
 DWAROVAR_DESC:0 "The Serpentspine                                                         ÂŁicon_veteranÂŁ Â§YRecommended for EU4 veterans who are looking for something unique.Â§!\n\nÂŁbookmark_race_dwarvenÂŁÂŁbookmark_race_goblinÂŁÂŁbookmark_race_orcishÂŁÂŁbookmark_race_koboldÂŁÂŁbookmark_race_ogreÂŁÂŁbookmark_race_trollÂŁÂŁbookmark_race_harimariÂŁ\n    ÂŁbookmark_separatorÂŁ\nThe Greentide was a disaster for Escann, but for the dwarves and goblins of the Western Serpentspine it presented a unique opportunity. With so many orcs leaving for the surface, a power vacuum has been created in the Dwarovar. Goblins cast off the shackles of their former orcish slave masters, and dwarves from both surface and remnant holds seek to reclaim what they lost long ago. In the east, goblins carve out their domains in the Tree of Stone, in the shadow of the powerful hobgoblin Command."

 BULWAR_NAME:0 "ÂŁbookmark_bulwarÂŁ"
 BULWAR_DESC:0 "Bulwar\n\nÂŁbookmark_race_elvenÂŁÂŁbookmark_race_humanÂŁÂŁbookmark_race_gnollishÂŁÂŁbookmark_race_harpyÂŁÂŁbookmark_race_goblinÂŁÂŁbookmark_race_dwarvenÂŁ\n    ÂŁbookmark_separatorÂŁ\nDarkness spreads over the land of the Sun, as the Sun Elven kingdoms are too weak to defend their lands from the renewed attack from old and new enemies: The demon-worshiping gnolls invade from the desert, the restored harpy queendoms lurk from the hills and the goblin tribes swarm from the mountains. Amidst the chaos, their human subjects start questioning their ability, while a new faith arises in the eastern sands. Will the Sun Elves manage to restore the Phoenix Empire? or a new empire will rise from the ashes?"
 
 RAHEN_NAME:0 "ÂŁbookmark_rahenÂŁ"
 RAHEN_DESC:0 "Rahen\n\nÂŁbookmark_race_hobgoblinÂŁÂŁbookmark_race_harimariÂŁÂŁbookmark_race_humanÂŁÂŁbookmark_race_orcishÂŁ\n    ÂŁbookmark_separatorÂŁ\nOnce inhabited only by humans, the tigerlike harimari have ruled Rahen since their ascension on the Day of Ashen Skies, their empire interrupted only briefly by the conquests of Jaher. Native rule was reestablished under the Dhenijanraj, now a waning power whose vassals such as Rabaghekhur and Buhaanjirghal strain against their rule. To the north, Rajnadhaga stands against the invasion of the hobgoblin Command while the reclusive ogres of Azjakuma plot how best to exploit Rahen's chaos. Further east, Jianglusi, nominal leader of the Xia monks, and the Dragon King of Bianfang turn their gazes towards a battle for their very survival."
 
 HALESS_NAME:0 "ÂŁbookmark_halessÂŁ"
 HALESS_DESC:0 "Haless\n\nÂŁbookmark_race_humanÂŁÂŁbookmark_race_harimariÂŁÂŁbookmark_race_koboldÂŁÂŁbookmark_race_dwarvenÂŁÂŁbookmark_race_harpyÂŁÂŁbookmark_race_ogreÂŁÂŁbookmark_race_trollÂŁÂŁbookmark_race_elvenÂŁÂŁbookmark_race_half_elvesÂŁ\n    ÂŁbookmark_separatorÂŁ\nThe days of the Phoenix have long since passed, and the Warlords of Haless thrive in the vacuous chaos that remains. The many human and harimari kingdoms of Yanshen prosper in a brief peace, unaware of the rising threat of the Faceless Queen and her hordes of terror birds emerging from the northern steppes. To the west, the secluded monastaries of the Xia recoil after a crushing defeat at the hands of the hobgoblins, looking for any hope to resist the oncoming threat of the Great Command. And to the south lies the shattered empire of Baihon Xinh, failing to unite the Kai people and embroiled in civil war."

 FORBIDDEN_PLAINS_NAME:0 "ÂŁbookmark_forbidden_plainsÂŁ"
 FORBIDDEN_PLAINS_DESC:0 "The Forbidden Plains\n\nÂŁbookmark_race_centaurÂŁÂŁbookmark_race_ogreÂŁÂŁbookmark_race_humanÂŁ\n    ÂŁbookmark_separatorÂŁ\nA failed invasion has resulted in the centaur race scattered in hordes across the plains, the human republics united in cause upon the lakes, and the ogre clans preparing to reassert themselves from within their valley. Fragmented they are forgotten to the world, but consolidated they could make it tremble."

 NORTH_AELANTIR_NAME:0 "ÂŁbookmark_north_aelantirÂŁ"
 NORTH_AELANTIR_DESC:0 "North Aelantir\n\nÂŁbookmark_race_ruinbornÂŁ\n    ÂŁbookmark_separatorÂŁ\nThe Day of Ashen Skies obliterated the old home of the elves. The mutated survivors, the ruinborn elves, now walk among the hostile ruins of a magical halcyon era. From the fey-touched realms of Eordand, to the feudal knights of the Ynn, to the sandworm riders facing mouthless horrors in Haraf, to the tribes eking out an existence on the haunted shores of the Ruined Sea, only time will tell if the ruinborn will weather the coming apocalypse from the east, or if they will join their ancestors in annihilation."
 
 SOUTH_AELANTIR_NAME:0 "ÂŁbookmark_south_aelantirÂŁ"
 SOUTH_AELANTIR_DESC:0 "South Aelantir\n\nÂŁbookmark_race_ruinbornÂŁ\n    ÂŁbookmark_separatorÂŁ\nFate's cruel indifference spared the elves of South Aelantir from the worst of the Day of Ashen Skies. The survivors emerged into a new, inhospitable nightmare. Mana-infused winds inflict ruinous cancer in the west, while the sentient Effelai jungleâ€™s alluring songs enslave minds in the east, and festering ambitions drive them to endless war in the south. Will the ruinborn elves be able to build a home for themselves in this brave new world, or will they burn it all down to claim the ashes as their sole birthright?"
 
 WEST_SARHAL:0 "ÂŁbookmark_west_sarhalÂŁ"
 WEST_SARHAL_DESC:0 "West Sarhal\n\nÂŁbookmark_race_humanÂŁÂŁbookmark_race_gnollishÂŁÂŁbookmark_race_halflingÂŁÂŁbookmark_race_elvenÂŁ\n    ÂŁbookmark_separatorÂŁ\nThe age of gnolls is at hand. Kheterata is a state of ruin, split in two by the legendary pack leader Grizaka and the forces of Gnollakaz. To the west lie the remnants of the once great Fangaula empire, rival of Kheterata, who too have felt the wrath of the gnoll hordes. For some though, the collapse of the old empires represents opportunity. The Vyzemby halflings on the island of Fahvanosy eye the coastal Ananoma forts on the mainland they abandoned long ago. The former subjects of Kheterata find themselves independent and free to pursue their own futures. Will they rebuild the great empires of yore, or forge a future of their own?"
 
 EAST_SARHAL:0 "ÂŁbookmark_east_sarhalÂŁ"
 EAST_SARHAL_DESC:0 "East Sarhal\n\nÂŁbookmark_race_humanÂŁÂŁbookmark_race_lizardfolkÂŁÂŁbookmark_race_trollÂŁÂŁbookmark_race_harpyÂŁÂŁbookmark_race_harimariÂŁÂŁbookmark_race_gnollishÂŁ\n    ÂŁbookmark_separatorÂŁ\nIt is a dark age for eastern Sarhal. The Dakinshi warlords are locked in a brutal civil war, the lizardfolk empire is stagnant with its collapse inevitable, and Rahen colonisers have taken the northern coast looking for riches and slaves. The greatest evil of all lurks beneath the monochrome mangroves of the Shadow Swamp where the Shadow Hags reside. Yet beyond this darkness there is hope. The Ashhana lizardfolk, cursed by the Shadow Swamp's foul magic, have found refuge through the songs of their faith. The Baashidi people to the south are in their golden age, keen to explore the oceans and expand their borders. "

 KANOLOWELE: "ÂŁbookmark_kanoloweleÂŁ"
 KANOLOWELE_DESC: "Kanolowele\n\nÂŁbookmark_race_humanÂŁÂŁbookmark_race_ogreÂŁ\n    ÂŁbookmark_separatorÂŁ\nSatria the Lesser is dead, and his heirs rage over the remnants of Satrialaam. Chief amongst these is the upstart Ahetl Mulyatl and their rival, Maulu. In the archipelago's centre, the Second Consensus and their Dragon Turtle advisors solidify their newfound legitimacy despite threats of without and within. Further east, Pelemakina declares a Magmatic Crusade against the heartland of Speaking Memory, but Pukamana stands in their way. An egg is discovered on Halia, heralding the birth of the first new-born Dragon Turtle, and their Pohaimeli overlords reckon with their longstanding hatred of the mainland's hinuifauna."

 MAINLAND_INSYAA: "ÂŁbookmark_mainland_insyaaÂŁ"
 MAINLAND_INSYAA_DESC: "Mainland Insyaa                                                          ÂŁicon_veteranÂŁ Â§YRecommended for EU4 veterans who are looking for something unique.Â§!\n\nÂŁbookmark_race_humanÂŁÂŁbookmark_race_koboldÂŁÂŁbookmark_race_mechanimÂŁÂŁbookmark_race_ogreÂŁ\n    ÂŁbookmark_separatorÂŁ\nThe mechanim stir, awoken by the passing of the Oracle's Eye. Missing the memories of their former lives, they have united into clans that dot the Titanolands, migrating towards the pillars that dot Insyaa in search of resources and their past, reckoning with sharing territory with the Holohana. High above, the Charkuchin settle beyond the safety of their citadels, and the nations of the Plateau prepare to break the long peace between them. West of the mountains, the Yenbenmirra quest to collect the Children of Fire in the name of Danguranga, their mother-goddess, whilst the Taga'ala mangrove republics seek to reunify their holdings along the coast."
 
 SPAWNABLES_NAME:0 "ÂŁbookmark_spawnablesÂŁ"
 SPAWNABLES_DESC:0 "Spawnables\n\n    ÂŁbookmark_separatorÂŁ\nIndependent ventures often shaped history, be they headed by adventurers like Corin or visionaries like Castan the Progenitor. Between rumors that the famed elven homeland of Aelantir may be within reach after all, or realizations that most orcs leaving the Serpentspine during the Greentide also means an opportunity to reclaim the ancestral dwarven home, many entities are drafting their own plans. Mercenary companies, holy orders, refugees, trade companies and idealistic settlers are planning to head west, while dwarven champions start travelling eastward for the first time in generations..."
 