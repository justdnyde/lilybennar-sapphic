l_english:
 I27_a_lakeside_visit_title: "A Lakeside Visit"
 I27_a_lakeside_visit_desc: "Three times already Bricena had sent letters to her father Galyndor in Elynáile, requesting that he rally the Myna Elders that were able to fight back to their home grove. But several months had passed, and no response had come from the old 'Fox of the Mountain'. Finally, not intending to be ignored any longer, Bricena has decided to gather travelling companions and make the journey to the Silent Lake herself, and make the elders answer to her in person."

 I27_refugee_sallas_title: "Refugee Salla"
 I27_refugee_sallas_desc: "With Ciranmyna being considered one of the safest places in the Deepwoods, no small number of refugees from the eastern groves have come to the Mountain Grove. Until now, their presence has been a burden we have carried out of duty, but now, they may be our salvation. If we can convince the refugees of Ahain and Scotha that we can aid them in the reclamation of their groves if they aid us in the reclamation of ours, we can use them to supplement our meagre numbers."

 I27_inlaws_title: "In-laws"
 I27_inlaws_desc: "Before the Conclave of Elynáile, Bricena wasn't sure she'd ever speak to her father-in-law again. His betrayal when her people had needed him most was not something she would ever forget. But during the Conclave, surrounded by others seeking unity and truth, she found it in herself to forgive him. The Greentide had forced many elves into impossible choices, and Cinrthir's had been worse than most. Though the Greentide is finally broken, the threat of the orcs is far from gone. The Deepwoods have no place for pointless grudges between kin."

 I27_our_mountain_our_woods_title: "Our Mountain, Our Woods"
 I27_our_mountain_our_woods_desc: "It has been decades since the first orcish warband entered the Mountain Grove. From battle to siege to battle again, we have never stopped fighting them. It is finally time to banish them from our grove for good. This is our mountain. These are our woods. They will sully it no more."

 I27_fresh_arms_title: "Fresh Arms"
 I27_fresh_arms_desc: "During the siege of Ciranmyna, we were unable to reach the various mines located around the mountain. And though we pride ourselves on the durability of our craftsmanship, no weapon or armour lasts forever, especially not in war. It is high time that we reopen the mines, light the fires in the foundries and forges, and get back to making our weapons of war."

 I27_gateways_to_escann_title: "Gateways to Escann"
 I27_gateways_to_escann_desc: "With the direct threat vanquished, it is time we peer out into the world beyond the Deepwoods that has opened up to us. Vyr Selohtyd and Vyr Tyrnn have brought the orcish invaders to our lands, and Corin left through them, with goblins and elves in tow. Through these twin gateways, we shall explore these unknown lands, so that we may be better prepared for any future threats."

 I27_moonmoss_introduction_title: "Moonmoss Introduction"
 I27_moonmoss_introduction_desc: "With the vyr to the Thorn Grove open, we may be able to get the help we need to restore the natural balance of the Mountain Grove. If Narawen Drennen can put us into contact with the Moonmoss Circle of Druids, they might be able to perform the rituals necessary to put the animals of the grove at ease, and let them return to their own hunting grounds. Not the Great Hawks, though… Bricena has other plans for them."

 I27_promises_made_title: "Promises Made"
 I27_promises_made_desc: "The swell of auxiliaries provided by the refugees of Salla Scotha and Salla Ahain has given us both momentum and initiative. While some in our clan are eager to leverage this to only Myna's advantage, [Root.Monarch.GetName] remembers well the promises made to anxious auxiliaries. Not is the time for promises made to be promises kept. The River Grove and Flower Grove must be liberated."

 I27_two_sallas_one_family_title: "Two Salla, One Family"
 I27_two_sallas_one_family_desc: "The loss of Farwen has been a hard one for both clans. It has even been harder on Cinrthir Elyn. We must rise to meet this grief, not just for the sake of our alliance but for the sake of both our salla. Only then can both Myna and Elyna find a way to move forward… together."

 I27_steel_and_sustenance_title: "Steel and Sustenance"
 I27_steel_and_sustenance_desc: "There is much to gleam from our returning rangers and their reports about the lands beyond the forestline. It is a shattered place not like our forest, burdened by roving bands of oricsh invaders. It is also a realm of heroic adventurer bands, who fight to liberate as we do. They carry with them not only a common cause but also material we could use to further our own cause. Let us exchange words and goods with the enemy of our enemies."

 I27_the_first_steps_title: "The First Steps"
 I27_the_first_steps_desc: "While the druids have aided us in restoring most wildlife to their rightful places within the Mountain Grove, the peaks of Ciranmyna remain rife with kettles of Great Hawks per the orders of the [Root.Monarch.GetTitle]. Instead, [Root.Monarch.GetName] wishes for the durids to convince the hawks to work with the elves of Myna. While... unorthodox, the druids appear willing to try."

 I27_a_sliver_of_river_silver_title: "A Sliver of River Silver"
 I27_a_sliver_of_river_silver_desc: "Before the Greentide brought ruin and misery to the River Grove, the Mines of Yfelorr provide a humble but endless stream of silver. With the grove and Salla Ahain restored, the time is right to explore expanding that stream into a proper river of wealth. Wealth that could feed both the coffers of Salla Myna and Ahain."

 I27_selling_not_just_buying_title: "Selling, Not Just Buying"
 I27_selling_not_just_buying_desc: "What started as simple trades of pragmatic necessity with the Escanni has now become a flurry of haggling and exchanges. Steel, grain, gems, salts, and of course feytouched timber now relentlessly flow through the Twin Gateways. If our clan is continue enjoying this boon, we must ensure that our lands' infrastructure can keep pace with demand."

 I27_new_thoughts_title: "New Thoughts"
 I27_new_thoughts_desc: "Constant contact with adventurers in Escann has brought more than news, it has also brought ideas. While the Elders of the clan are wary (or even decry) these new concepts, not all are so opposed. As for our [Root.Monarch.GetTitle]? Their mind is more focused on how or what might benefit Salla Myna's standing with the other clans."

 I27_softly_spoken_words_title: "Softly Spoken Words"
 I27_softly_spoken_words_desc: "The elves of Salla Fealgarn have always been impetuous braggarts. Compared to their [I30.Monarch.GetTitle] [I30.Monarch.GetName], however, one would mistake them as demure listeners. And given his latest responses there is little doubt that getting him to aid our Great Hawk endevours will only end disappointment and headache.\n\nHowever, all is not lost. [I30.Monarch.GetName] may be the greatest general of Verdant Pact, but he is inarguably the most incompetent diplomat in living Wood Elven history. Let us see how his tone changes when he faces not war front but a diplomatic one."

 I27_a_center_of_revitalization_title: "A Center of Revitalization"
 I27_a_center_of_revitalization_desc: "Ciranmyna has been cultural center of all elven peoples in these woods ever since the day our collective forbearers, Ceannasai Liandel Speardancer and her troops, first made camp up on the mountains' heights. It glimmers with the gems and craftselveship of a dozen generations, shining as a beacon to all within the grove. And despite this, our capital could be so much more, not just a beacon of beauty but also the herald of a new era.\n\n If we truly wish this, though, we will need to expand Ciranmyna. An undertaking that, despite our great skill and wealth, is beyond even us. We will need to bring together all of the clans of the Verdant Pact. A demanding ask, but one that must be answered - for the good of all elves."

 I27_bricena_hawkrider_title: "Bricena, Hawkrider"
 I27_bricena_hawkrider_desc: "Refined. Dignified. Deliberate. That was the reputation our [Root.Monarch.GetTitle] has cultivated amongst our clan. So why does [Root.Monarch.GetSheHe] pursue the Great Hawks with such fervor? The druids of Moonmoss, the bonding ritual of Salla Fealgarn, and years simply living near the hawks, all of this for this one moment. Whatever the answer, our clan's rangers and various clanselves gather with bated breath to see the outcome."

 I27_a_home_for_hawks_too_title: "A Home for Hawks, Too"
 I27_a_home_for_hawks_too_desc: "As part of her negotiations with the Great Hawks - a sentence that sounds strange even to [Root.Monarch.GetName] herself - it was agreed that in addition to providing aviaries for the hawks to roost in, Salla Myna would also provide ample food for growing kettle of hawks. While we are used to providing for our own people, providing for the hawks is a new experience. But if it is what it takes to have them as allies, then so be it."

 I27_visits_far_title: "Visits Far"
 I27_visits_far_desc: "Even before the ruin brought to the Deepwoods by the invaders, the Bone Grove was a contested land where goblin clans and fey monstrousity roamed and reaved. Unlike our own clan, the clanselves of Salla Cenag had not citadel upon the mountains to take refuge in. Their only reprieve was their kith and kin. It would do us well to show that though our lands and bloodties are are distant, the elves of Myna stand with them all the same."

 I27_repaying_the_hunter_title: "Repaying the Hunter"
 I27_repaying_the_hunter_desc: "Had [I30.Monarch.GetName] simply accepted the offer to share the means to the Ritual of Bonding in return for our immediate aid in reconquering the Hunter's Grove, [Root.Monarch.GetName] would have accepted. Sadly, gestures of good will did not come easily to the stubborn elf. So let us take this opportunity to demonstrate how good begets good... and while we are at it, our hawk riders."

 I27_liandrels_heir_title: "Liandrel's Heir"
 I27_liandrels_heir_desc: "Though every cean and ceanna's authority stems from the first and only Ceannacai (Commander) of the Elves, none have ever been able to match, much less command, the respect and loyalty of elvenkind within the woods like Liandrel Speardancer. Far from it, in fact. Squabbles between these leaders and their clans were a regular occurence even after the orcs threatened total destruction. The cost of this division was was decades of struggle, tribulation, and sacrifice. And while the Deepwoods are l1iberated and the clans restored, it is clear issue of division remains. It is an issue [Root.Monarch.GetName] intends to solve, once in for all."

 I27_ciranmyna_upgrade_1_title: "A Shared Endeavour"
 I27_ciranmyna_upgrade_1_desc: "We knew the effort would be great, the cost high, yet incredibly the clans have come together meet both demands. There is a lesson here, one we can ponder after begin work in earnest. For now, let us mark this moment as the start of a new beginning, for elvenkind and the Deepwoods."

 I27_ciranmyna_upgrade_2_title: "A City for All Wood Elves"
 I27_ciranmyna_upgrade_2_desc: "For generations, we have called our capital "the Shimmering City", believing what we had built alone to beyond resplindent. Only now do we realize how small-minded we were. Along, our clanselves had crafted something worthy of respect. Together, we and our fellow salla have crafted somethign worthy of awe."

 flavour_salla_myna.0.t: "Nature, Disturbed"
 flavour_salla_myna.0.d: "It had not taken long since the arrival of the great host of the Greentide for Ciranmyna to become a haven for refugees. Elves from the eastern groves, as well as satyrs, fairies and other fey folk arrived in great numbers, all seeking shelter and safety under the shadow of the great mountain. But as the years of war dragged on, even animals began to migrate away from the fires and axes of the orcs.\n\nOur druids have not been able to assuage the fears of our people as all manner of wild beasts have started hunting closer and closer to our settlements, and the number of great hawks nesting on the mountain of Ciranmyna has more than quadrupled. To restore the balance of the grove, the druids say, they will need the aid of the Moonmoss Circle. And even then, any ritual performed while the orcs still control the eastern part of the grove would be futile, as the animals would not have their old hunting grounds to return to."
 flavour_salla_myna.0.a: "We have work to do."

 flavour_salla_myna.1.t: "Lakeside Visit"
 flavour_salla_myna.1.d: "Galyndor did not look up from his game of Fídhe as Bricena entered the room. She recognized his opponent, one of her father's old brothers in arms. Galyndor had clearly been expecting her. Three folded letters were neatly laid out on the table, their white wax seals unbroken. An irritating statement. Well, she could be stubborn too. Wordlessly, she sat down at his table, watching him move his pieces. She could tell her reciprocal silence annoyed him; he was making mistakes.\n\nFinally, having lost his game, Galyndor turned towards her. "Speak your piece." Bricena took one of the letters from the table, broke the seal, and began to read him the letter she had written him months ago. When she was finished, her father shook his head. "I am no longer of the Salla, Bri. None of the elders here are. You know that. You are my daughter, but you are not my Ceanna. This is your fight now.\n\nBricena scoffed. "Do not pretend as if the Mountain Grove is no longer your home. Well, your home burns. The Fox of the Mountain, they called you! Tell me father, what do they say of old foxes? Is that a lie?"\n\nHer father avoided her gaze. She noticed a slight tremble in his hand as he reset the pieces of the Fídhe game to their starting position. A silence fell over the room.\n\n"This place has taken hold of you," Bricena said softly. "Much faster than I had feared." She rose to leave, and left her father behind.\n\nShe was already outside when her father's opponent caught up with her. "Ceanna… This place has never agreed with me. I will return to Ciranmyna with you…""
 flavour_salla_myna.1.a: ""...If you would have me, that is.""

 flavour_salla_myna.2.t: "The Newest Myna"
 flavour_salla_myna.2.d: "Galyndor showing up in Ciranmyna to meet his grandchild and spend a bit of time with his daughter, and offering to handle matters of state for a bit of time, while Bricena recovers from childbirth and allowing her to spend time with her daughter."
 flavour_salla_myna.2.a: "TODO:Disabled for now"

 flavour_salla_myna.3.t: "Retaking the Reins"
 flavour_salla_myna.3.d: "Bricena returning as full-time ruler... to much relief among her subjects. Though Gylandor might be a legendary general, he is a far less talented administrator and diplomat, and has managed to insult foreign dignitaries and alienate members of the Minor Salla."
 flavour_salla_myna.3.a: "TODO:Disabled for now"

 flavour_salla_myna.4.t: "Broken Promise (hidden helper)"
 flavour_salla_myna.4.d: "Filler text."
 flavour_salla_myna.4.a: "Click"

 flavour_salla_myna.5.t: "Broken Promise"
 flavour_salla_myna.5.d: "We have failed to make good on our promise to see Salla Ahain and Scotha returned to their groves and restored. Regardless of reason or excuse, this failure has not only lost us potential allies but also ruined our standing with the clans of the Verdant Pact. Setbacks are inevitable, but this one will take time to overcome."
 flavour_salla_myna.5.a: "We will see Ahain and Scotha rise again… one day."

 flavour_salla_myna.6.t: "The Victory Feast"
 flavour_salla_myna.6.d: ""Disbelief. Shock. Denial. Grief. A tear slowly streaked down Bricena's cheek as she stared at the lifeless elf before her. Her eyes fixed on the ruby that hung around the fallen elf's neck as a single question echoed in her head - why?\n\nThe affair had begun cordially, perfectly even. The fruits of her and her clan spending the better part of two months preparing to receive Cinrthir and his entourage of Elyn clanselves. When they arrived at the base Ciranmyna, the two greatest elven clans of the Deepwoods exchanged polite smiles, kind words, and generous gifts. The ease of the exchanges weren't just the politics of necessity, but also genuine connection. In those opening moments, she had allowed herself an indulgent smile. This was the first step to securing the future for both clans.\n\nFor the remainder of the day, they had slowly winded their way up the mountain. They stopped at the shrine to Liandiel Speardancer, the first and only Ceannassai of the Elves. Next, Bricena brought them to her clan's fabled gem caverns and presented the finest ruby of her people to her fiér'ionn, sister-in-law and future ceanna of Salla Elyn - Farwen. Then finally, they arrived within Ciranmyna proper and settled in the Hall of Heroes for dinner.\n\nThat was where it all fell apart.\n\nHer focus had been spent roaming the halls entertaining guests and kin. And as she gave a laugh, a struggling cough went unnoticed. While she refilled a drink, a desperate beat of the chest was missed. Then a sudden crash.\n\nDisbelief. Shock. Denial. Grief. That was what washed over Bricena as she powerlessly watched Farwen choke on an olive. A feyscorned olive…"
 flavour_salla_myna.6.a: "The best laid plans of mice and elves oft go awry…"

 flavour_salla_myna.7.t: "Fresh Arms"
 flavour_salla_myna.7.d: "The reopening of our mines is bearing fruit. With the forges working at all times, we have been able to produce more weapons and armour than we need to arm our own warriors. We could use the surplus to replace older weapons among our forces, but our Verdant Pact allies could perhaps put it to even better use."
 flavour_salla_myna.7.a: "Keep it for our own soldiers."
 flavour_salla_myna.7.I26: "Let us aid [I26.GetName]."
 flavour_salla_myna.7.I28: "Let us aid [I28.GetName]."
 flavour_salla_myna.7.I29: "Let us aid [I29.GetName]."
 flavour_salla_myna.7.I30: "Let us aid [I30.GetName]."
 flavour_salla_myna.7.I33: "Let us aid [I33.GetName]."


 flavour_salla_myna.8.t: "Rangers Return"
 flavour_salla_myna.8.d: "Rangers returning from Escann, telling of a land teeming with orcs and goblins, but also human bands. Lingual drift made communication somewhat difficult, but the rangers swiftly bonded with a group of humans over killing orcs. They mention how the humans possessed an astonishing quantity and quality of weapons, and also relay many stories and ideas told to them by their newfound friends."
 flavour_salla_myna.8.a: "We have much to learn from them."

 flavour_salla_myna.10.t: "A Verdant Union"
 flavour_salla_myna.10.d: "Bricena found herself tongue tied. Words alone did not fail her, though. Even her thoughts had ground to a halt. It was a strange and terrible state of being. Especially for one who always had a plan and a retort for every moment. Every moment but this one it seemed.\n\n\"Father, surely the Elders would prefer another to lead?\" Arfil asked, filling the rare silence left by Bricena.\n\nCinrthir gave a small, sad smile, \"Perhaps, but I prefer no other.\"\n\nArfil looked down in thought, leaving a pregnant pause. All the while, the gears turned in her mind. When she finally met her oath-father's eyes, Bricena found him waiting and ready.\n\n\"This may make our clans inseparable,\" Bricena started slowly.\n\n\"It may.\"\n\n\"There is no precedent.\"\n\n\"These are unprecedented times.\"\n\nShe nodded slowly as her thoughts finally clicked into place. "Áthyr'ionn, do you believe the clans become one once more?\"\n\nThe elderly elf's face brightened ever so slightly. He reached into his cloak and produced an envelope.\n\n\"I do.\"\n\nBricena's eyes darted to the envelope before looking toward her husband. Their marriage had begun in politics, but now rested on something far stronger. Could the same be done beyond just two elves?\n\n\"Arfil, do you think the same?\"\n\nArfil turned to her, his face clouded by a struggle of doubt. They both knew he wasn't a gifted commander. Nor was he an astute mind or a consummate politician. Yet, when he met her gaze, she saw a strength that went beyond any of that. A strength had turned a political marriage into something more.\n\nWith a firm voice, he answered."
 flavour_salla_myna.10.a: "“I do.”"
 flavour_salla_myna.10.tooltip: "Arfil will become ceann of Salla Elyn forming a personal union between the two clans."

 flavour_salla_myna.11.t: "Strangers"
 flavour_salla_myna.11.d: "The wooshing reverberations of wings filled the mountaintop once again. The air breezed about as the gusting noises crescendoed. Then, it slowly gave way as did any sight of the once resting Giant Hawks. The Moonmoss druid turned to face the ceanna, shoulders slumped.\n\n“My apologies,” they started, “I’ve met amany stubborn creature, but none so prideful as these birds.”\n\nBricena nodded, her face a calm facade, “I see.”\n\n“Ceanna, I do not wish to continue with the poor news but…” The druid paused.\n\nShe gave a fleeting glance to the hanging sun. A bit past midday. While no expert, three days of failure had engrained her the odds of spotting another nest and approaching any hawks today. Unlikely. Still, Bricena knew better than to assume information. Especially when others were in the midst of providing it.\n\n“...we are unlikely to have another opportunity today.”\n\nJust as she had thought. Pushing aside bitter disappointment, Bricena drew a slow breath and considered her next words. Slowly, they coalesced into a question, “Is there not another approach to consider?”\n\n“We could use magics to charm the birds. It won’t last long, but they aren’t as resistant as the forest bears, so it should be enough for them to get used to us. At least while the spell remains.”\n\nA temporary solution. Hardly acceptable for her plans. But, there was something valuable that had caught her ear.\n\n“Would you kindly explain what you mean by ‘get used to us’?”\n\nThe druid’s face scrunched in thought for a moment, “The best way to describe it is how you might consider another elf you’ve never met. They’re nothing but a stranger to you.”\n\n“Hmm,” Bricena acknowledged, trying to buy time to process the information. It was just enough time for an idea to click. “Given time, any stranger can become a friend.”\n\n“I suppose,” the druids agreed hesitantly. “Though it is sure to take time. Especially if that ‘friend’ is a hawk.”"
 flavour_salla_myna.11.a: "“Then it would be best not to waste a moment.”"

 flavour_salla_myna.12.t: "The Fealgarn Negotiations"
 flavour_salla_myna.12.d: "“It’s utter foolishness.”\n\n“Of course.”\n\n“Nothing but brazen buffonery.\n\n“No doubt.”\n\n“To think, Arfil! He would have us shed blood and sweat for his lands. Mind you I would abide as per the Pact.”\n\nArfil nodded, knowing whatever words he spoke would be lost. Especially given that Bricena’s back and forth pacing reached a rather aggressive pace.\n\n“But to demand Myna be directly under his command? In exchange for considering questions about the Ritual of Bonding?” She stopped abruptly and turned to face him properly. “By the Unseelie, Oberon’s a bloody twa-!”\n\nFor a moment Arfil was almost surprised, but Bricena stopped herself. Because of course, she did. \n\n“He’s a twit. A bloody twit.”\n\n“Language.”\n\nBricena gave him a scolding look, “Not. Funny.”\n\nHe let a light laugh out, “Bri, it’s alright to call the elf with the biggest stick stuck up his ass a bloody twat.”\n\nDespite her best effort, Bricena snorted."
 flavour_salla_myna.12.a: "“You’re right, but I won’t sully my tongue with such words. A proper elf speaks with dignity.”"

 flavour_salla_myna.13.t: "Mountaintop Troubles"
 flavour_salla_myna.13.d: "Bricena had known her plan to spend her days administrating the clan atop the mountains near the nests would not be a popular choice. The “advisor”, some distant cousin with more connections than merit,  before her was just the latest proof of that.\n\n“Ceanna, I mean no disrespect, but perhaps-”\n\n“CAW!”\n\nA sudden shrill shriek cut the advisor off without warning. With a yelp, the advisor jumped with a start, their painfully obvious suggestion lost. At least temporarily.\n\nShe forced herself to give a pleasant smile as the elf before her scanned the skies. It was a scene she had witnessed more than enough times. Unseelie willing, it was also a window to address these concerns without having to hear more obtuse words. Again.\n\n“I always appreciate the conce-”\n\n“CAW?”\n\nBricena felt her eye twitch. Midday upon the clifftops was always like this. A cacophony fledglings wailing for food and their parents swooping to address those needs. It had been endearing to hear at first, a sign that her continued presence had become less of an issue to the hawks. Now? Far far far less so.\n\n“As I was saying, I al-”\n\n“CAW!”\n\n“-ways appre-”\n\n“CAW?”\n\nShe opened her mouth to-\n\n“CAW!”\n\nA flush of heat rose to her face as Bricena, threw her chair back and turned to the distant hawks, “FUCK OFF, YOU DAMN BIRDS!”\n\nEven yelling, her voice had never been a loud one. Atop the mountain, though, it boomed as echoes carried her words. A hurried flutter of wings soon sounded out. They carried not only the fleeing hawks, but also a realization. Months of progress, lost. All because these idiots would not leave her alone. Slowly, she turned to face the elf once more, a very very tight smile formed on her face. Perhaps it was time she was a little bit more clear."
 flavour_salla_myna.13.a: "“I *always* appreciate the concerns of my clan, but…”"

 flavour_salla_myna.14.t: "Irate Advisors"
 flavour_salla_myna.14.d: "Advisors pleading with Bricena to start doing her paperwork back in her mansion where it's nice and warm and comfortable, rather than forcing them to travel to where she has taken her desk.\n\nAfter failing to persuade the advisors that her circumstances aren't so bad - and look, isn't that great hawk hatchling cute? - she realizes that she'll have to offer them some additional incentives to stay on as advisors until the hawks have gotten used to her."
 flavour_salla_myna.14.a: "TODO:Disabled for now"

 flavour_salla_myna.15.t: "Habituation"
 flavour_salla_myna.15.d: "Bricena and Arfil having a picnic together atop the Ciranmyna peak, with great hawks being far more willing to tolerate their presence than a year ago. Use conversation to show that the populace of Ciranmyna are starting to lose their reservation about the great hawks.\n\nAlso have a fledgling/juvenile great hawk sneak up on Bricena and Arfil and steal some of their food before flying off, to much laughter from the pair."
 flavour_salla_myna.15.a: "TODO:Disabled for now"

 flavour_salla_myna.16.t: "Steady Progress"
 flavour_salla_myna.16.d: "Since her picnic with Arfil a year ago, Bricena has taken to taking 'naps' while at her table... while making sure to leave plenty of food out on the table. It has ensured that the newest generation of great hawks have started getting comfortable taking food from her desk so long as she's still."
 flavour_salla_myna.16.a: "TODO:Disabled for now"

 flavour_salla_myna.17.t: "New Thoughts"
 flavour_salla_myna.17.d: "Upon the table was a map, a glaive, and a missive. Daughter stood patiently, while father sat quietly.\n\nThe map was unfurled, at its top in large elegant text were the words “Escann and Its Surrounds”. Below it illustrated the chaotic borders of adventurer companies, orcish clans, and, curiously, those of the elven salla within the Deepwoods. Admittedly, much of the woods was colored by fanciful pictures that covered areas the maker clearly was uncertain of. Still, it was proof of growing connections. Greater than she could have ever considered.\n\nThe glaive gleamed, catching her eye next. While the traditional weapon of the Wood Elves, it had not been made by any clan within the forest. Its shaft was that of a mundane, if quality, wood. Its blade shined with the silver-grey color of Cannorian steel. Its origin was none other than the distant city of Castanoth.\n\nFinally, there was the missive, written by her own hand. Its clean and concise letters hiding away its dozens of ill-worded predecessors. \n\n“I’d hoped that you would at least entertain this, father,” she sighed. “Am I not even worthy of your thoughts now?”\n\nShe felt her heart tighten as silence returned to the room. Stubbornness had slowly been worn to dejection. Bricena considered leaving her father once more in disappointment. Then, Glayndor’s eyes, now clouded with age, met her own. \n\n“I’ve little to give.”\n\n“It is quality not quantity that the heart cherishes,” she replied, reciting the words he spoke so often to her in childhood. \n\nThe slight jape earned her a sigh in return before a proper response followed.\n\n“I’m not fond of it,” he started stiffly. ”It is clear that the lands beyond provide valuable trade and knowledge.” \n\nGalyndor’s hand brushed up glaive from shaft to blade. \n\n“I told you once, I am no longer part of the Salla. In truth, I am no longer truly part of this world. The old has given way to something more, greater than I could imagine.”\n\n“I see,” Bricena replied, uncertain of how to take in her father’s words.\n\nGalyndor responded with a certain thin smile; one she had learned to give to mask her true thoughts."
 flavour_salla_myna.17.a: "“Good. Then, you must not require this old elf any longer.”"

 flavour_salla_myna.18.t: "Negotiations Reconsidered"
 flavour_salla_myna.18.d: "Bricena had only just managed to suppress her smile as Oberon entered the hall. The normally gruff and stern Ceann of Salla Fealgarn was as close to a whipped puppy as Bricena had ever seen him. She gestured for her attendants to leave her, and offered him a seat.\n\n"So, you need my help," Bricena said after a short exchange of pleasantries. Oberon sighed. "I do. I appear to have… overstepped somewhat with Irvah and Alara. I cannot afford to lose their support, not now." Bricena clicked her tongue. "You certainly have a talent for that. First you rile up the eastern Salla at Elynaíle, and now the south. Are you intent on turning the whole Deepwoods against you?" Oberon gave her a foul look "Oh, I am aware, thank you. Look, let us keep this simple. You can help me, and I have something you want."\n\nBricena had to suppress a smile again. She had him. "And that thing is?" Oberon was quiet for a moment. Bricena shook her head. "No, none of this. I need to hear you say it."\n\nClearly pained, Oberon brought his hand to his heart, then stretched out his palm. "The Ritual of Bonding. If you help me, you will have it. With no further demands."\n\nSmiling gracefully, Bricena copied his gesture, and took his hand."
 flavour_salla_myna.18.a: "Then we have a deal."

 flavour_salla_myna.19.t: "The Ritual"
 flavour_salla_myna.19.d: "“Which one?” the Fealgarn clanself, Meldayr, asked tartly.\n\nThe giddy whirl of anticipation within her briefly fell flat as a tick of annoyance crossed Bricena. Despite the numerous times crossing paths with the salla at notable clan gatherings, countless letters and meetings with their “great” leader, and a decade of lessons in proper etiquette, Bricena still could not find it in herself to understand how seemingly every Fealgarn elf  lacked even an iota of tact. \n\nSuppressing the shake of her head like she usually did in this recurring instance, Bricena focused her attention toward the Great Hawk nearest to them, “This one.”\n\n“You are certain? An elf may only Bind once.”\n\n“Yes,” Bricena replied firmly. She had read Oberon’s writing on the ritual a dozen times over. Every detail, every vagary, every risk, she had committed to heart. Like every choice, this had been done deliberately.\n\nWith an indifferent gaze, Meldayr reached into his pack and pulled out a bumpy, handsized purple fruit shaped almost like a gourd. \n\n“Eat this. Close your eyes. Focus.”\n\nBricena took the fruit without pause, though her mind was frantically considering any omitted details from the writings.\n\n“Most do not need it,” Meldayr continued, waiting for Bricena to bite the fruit. “Only the weaker or clumsier of the clan.”\n\nTactless twits was all she could think as Bricena bit into the fruit. The salty sweet juices dribbling down her mouth were forgotten in an instant as the world began to swirl and warp. Nausea began to claim her.\n\n“Close. Your. Eyes.”\n\nShe closed her eyes. Her world steadied and soon the familiar sensation of nearing fey portals and magics began to tingle. The darkness began to fill with a criss-cross of floating strings of every color, each leading to… something. Steadily, yet without warning, it became blinding.\n\n“Focus. Find your Binding.”\n\nFor a moment she felt lost. No, worse, she was drowning in a sea of color. Yet, as she focused, they each began to dull till only one could truly catch her eye. Like finding a friend in a crowd. She called out. Not with words, but with something more than thoughts. There was a reply. A question. Bricena replied. There was an eager swelling within her. The response that came back brought her to the point of bursting. She ran forward, eyes closed, path clear. When she opened them, she saw the Great Hawk… no."
 flavour_salla_myna.19.a: "When she opened them, she saw Meras standing right before her, waiting to take flight."

 # If possible, please look to the HTTYD flight scene for inspitation here.
 flavour_salla_myna.20.t: "The First Flight"
 flavour_salla_myna.20.d: "Bricena could feel Meras' muscles coil through its feathers as she climbed on its back. For a moment, she could feel his thoughts, feeling it readjust its stance to account for her weight. Then, with a powerful thrust of its wings, they lifted off, soaring high above the emerald sprawl of the Deepwoods. Then immediately, the hawk dived.\n\nPanicked, Bricena dug her fingers into the hawk's feathers.\n\nThey approached the canopy at breakneck speed, only for Meras to adjust its direction again right before colliding with the upper branches.\n\nBricena felt the wind whip through her hair and scream in her ears as the treetops turned into a blur beneath them. It was terrifying. It was liberating.\n\nAs the flight continued and her nerves and excitement died down, however, Bricena regained control of her thoughts. In the clearings below her, she saw figures looking up at her, as ants to her. She would be well out of arrowshot of them, yet had she her bow with her they would be at her utter mercy. With this speed, this height—Salla Myna could be unstoppable. She tugged on Meras' shoulder, and wheeled back toward Ciranmyna. In the distance, she saw dozens of great hawks take flight from the slopes of Ciranmyna. Every single one carrying a figure on its back."
 flavour_salla_myna.20.a: "The sky is ours."

 flavour_salla_myna.21.t: "Visits Far"
 flavour_salla_myna.21.d: "Arfil telling Bricena that they need to be in Salla Cenag urgently, then the two of them hopping on hawk riders and riding off, with some guards following them, of course.\n\nWhen they get there, there's no emergency... but the Ceanna Cenag plays dumb for a minute, asking how they could know that he had asked them to meet him. Surely, his letter could not have arrived more than a few days ago, but they are already here!\n\nIn other words, setting some hawks aside for diplomats would be a major diplomatic boon."
 flavour_salla_myna.21.a: "TODO:Disabled for now"

 flavour_salla_myna.22.t: "The Hunter and the Archer"
 flavour_salla_myna.22.d: "During victory celebrations in Fealgarn capital, Oberon offers a few tips as to how the Hawk Riders could be better deployed against the Goblins and Orcs. Somehow, news of this reaches Ayethstir, as Elaria shows up not long after, glaring daggers at Oberon and having every intention of showing him up.\n\nThe impromptu competition between them results in the development of the so-called "Arrowstorm Doctrine" by combining the ideas of the two military masterminds."
 flavour_salla_myna.22.a: "TODO:Disabled for now"

 flavour_salla_myna.23.t: "Ceannasai"
 flavour_salla_myna.23.d: "As Meras gracefully swooped down, the gathered ceanns and ceannas of the Great Salla could not help but gawk. It was a gaudy entrance. An obvious showing to truly paint a picture of Salla Myna’s prestige and power. However, it was necessary political manoeuvring and social grandstanding.\n\nDismounting, Bricena took advantage of being center stage and slowly made her way around, greeting each leader. Happily or not, each had taken the time to travel and meet. An acknowledgement of her achievement and earned respect. However, that alone was not enough. Not to her. She had seen what laid beyond the woods. The clans divided would not survive.\n\nThus, with all eyes still on her, Bricena began her gambit, “A thousand years ago, our forebears were lost to these woods. They would have been damned and doomed were it not for Liandrel Speardancer. Under her command, our ancestors stood united and carved a home for themselves and their children.”\n\nThere were a few nods, a few grunts.\n\n“Since her passing, we have drifted from each other. Divided ourselves. And in doing so, nearly embraced the fate Liandrel fought so hard to defy,” she paused. “I am not Liandrel. I am no great general. I did not win a great victory to reclaim the eastern groves for Ahain and Scotha.”\n\nThe clan heads of the two mentioned salla perked their heads up. \n\n“Nor did I personally lead my clanselves to aid Salla Drennen. In fact, it was their aid that I needed to bring the creatures of the Mountain Grove to peace.”\n\nBricena caught Narawen giving a smile to her. She returned it before moving to the hardest part of her speech.\n\n“And despite all my efforts, were it not for Salla Fealgarn, I could not have ever hoped to have rode upon Meras. The skies would have remained unclaimed.”\n\nOberon cocked an eyebrow, then, after some obvious consideration, slowly nodded.\n\n“The strength you see here, did not come from any one clan’s effort. Liandrel saw this. I see this,” Bricena spoke slowly, emphasizing each sentence. “I am not Liandrel.”\n\nShe let the sentence hang. This was the moment.\n\n“But, with your support, I can be Liandrel’s heir.”\n\nSilence hung in the air. Had she over played her hand? Missed her one chance? Bricena felt a thin smile form as she waited. Then, she heard it."
 flavour_salla_myna.23.a: "“Aye.”"

 flavour_salla_myna.24.t: "The Unification"
 flavour_salla_myna.24.d: "Negotiating the finer terms of the Deepwoods unification took time, of course. Different Ceanna had conditions they wished to be met for their grove, asked for specific court position, and so on, and even after that had been settled, there were ceremonies and - of course - a parade, to mark that the Wood Elves were united once more.\n\nBricena had not slept so little since the siege at the start of her reign, but after a month her new position was finally firmly established, and she could take the time to visit her father."
 flavour_salla_myna.24.a: "TODO:Disabled for now"

 flavour_salla_myna.25.t: "A Father's Pride"
 flavour_salla_myna.25.d: "Bricena being dropped off on her father's lake boat by her hawk, eager to see him after having united the Deepwoods.\n\nAnd she sees him. Sitting still in his favorite chair, a serene smile on his face... but his eyes are closed and he does not draw breath. Lying in front of him is an open leather-bound journal. Bricena begins crying immediately, of course, and only more so when she gathers herself enough to read the page.\n\nMourn me not, my darling daughter. Always have I known that you would lead our Salla to greatness. However, when I retired, I did not even have the fantasy to imagine that you might do what you did.\n\nYou, Bricena, have proven yourself a far greater leader than I ever was or could have been, and I die a happy man, knowing that you have done what I once thought impossible: uniting our fragmented people.\n\nStand tall, my daughter, and know that no man could be prouder of his child than I am of you, and that seeing you far exceed the hopes I have had for you has allowed me to die a happy man.\n\n- Your loving father"
 flavour_salla_myna.25.a: "TODO:Disabled for now"

 flavour_salla_myna.26.t: "Ciranmyna Contributions"
 flavour_salla_myna.26.d: "Allied Sallas with sufficiently high trust + subjects contributing towards increasing the splendor of Ciranmyna, since it's the cultural center of the Wood Elf culture."
 flavour_salla_myna.26.a: "Their contributions will be appreciated."
 flavour_salla_myna.26.b: "Do not bother me with this again."
 flavour_salla_myna.27.t: "Ciranmyna Contributions"
 flavour_salla_myna.27.d: "We may view the status of the current contributions here, as well as adding more funds, should we wish to do so."
 flavour_salla_myna.27.a: "See last contributions."
