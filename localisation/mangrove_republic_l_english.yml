# gov reforms
 mangrove_republic: "Mangrove Republic"
 mangrove_republic_desc: "Once a unified nation, corruption has placed more and more autonomy in the hands of the great cities of Taga’ala. Even now, they consider themselves one people, siblings divided, but each contests who should lead the union. Before any of that consolidation may occur, though, the cities must band together to reunify their country and undo the ecological pillaging of the last seventy years.”
 mechanic_mangrove_republic_yes: "Can place and upgrade §GBiological Infrastructure§! on hinuimangrove provinces.\nMoving capitals is disabled."
 mangrove_dictatorship: "Mangrove Dictatorship"
 mangrove_dictatorship_desc: "Once a unified nation, corruption has placed more and more autonomy in the hands of the great cities of Taga’ala. Even now, they consider themselves one people, siblings divided, but each contests who should lead the union. Before any of that consolidation may occur, though, the cities must band together to reunify their country and undo the ecological pillaging of the last seventy years."
 mangrove_theocracy: "Shoal Theocracy"
 mangrove_theocracy_desc: "Once a unified nation, corruption has placed more and more autonomy in the hands of the great cities of Taga’ala. Even now, they consider themselves one people, siblings divided, but each contests who should lead the union. Before any of that consolidation may occur, though, the cities must band together to reunify their country and undo the ecological pillaging of the last seventy years."
 NO_CAPITAL_MOVE_MANGROVE: "A Mangrove Republic will not abandon their home."

# country modifiers
 mangrove_republic_relations: "Mangrove Republic Relations"
 mangrove_peace: "The Long Quiet"
 mangrove_peace_desc: "The separate leaders of the Taga’ala have been forced together not by a desire to cooperate, but by a pressing need to unite to save the degradation of the very land they walk on. These leaders have sworn to not wage wars of conquests on one another.\n\nRegular conquest is disabled. Mangrove Conflict, Trade Wars and Humiliation are the only valid casus belli."
 mangrove_colonizing: "Beyond the Mangroves"
 mangrove_colonizing_desc: "Change in the Taga'ala. Uma Laa’ow is reborn. And the rest of Insyaa now lies before us."
 mangrove_punia_logi_cooldown: "Construct Punia Logi Cooldown"
 mangrove_punia_logi_cooldown_tt: "We have not constructed §YPunia Logi§! recently"

