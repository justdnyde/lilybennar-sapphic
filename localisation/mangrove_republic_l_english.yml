# events
 mangrove.0.t: "The Taga'ala Mangrove Republics"
 mangrove.0.d: "In the time before the Day of Ashen Skies, nations in the Ten Thousand Islands attempted to dig their roots deep into the slick muddy soil of Taga’ala. In the wake of that calamity, those colonies - later known as the Mangrove Republics - banded together and enjoyed mutual peace and increasing wealth from the Century of Storms to this very day, as our ancestors found our niche within the great interconnected web of life that are the Hinuimangrove forests. The gigantic life endemic to the swamps proved to be the essential foundation of our nation’s wealth and influence, leading to the development and proliferation of the biological infrastructure that is now so characteristic of our republics. Consequently, through the years, a talent for environmental stewardship became synonymous with access to leadership and riches.\n\nHowever, in the last half century, the grand republic of Uma Laa’ow had begun to fray, its overseers became increasingly obsessed with maintaining their iron grip on power and upholding the appearance of grandeur more so than actually devoting themselves to ruling efficiently. Even the Soulgarden of Fave Tasaai languished, as its amber exhibits were pilfered. The hinterland provinces between the great cities themselves have fallen into total destitution, turning into administrative voids, and the land reels from the harmful consequences of short-sighted profiteering schemes. For us, whose lives are irrevocably intertwined with these groves, the division of our bonds has proven disastrous, creating a perverse and artificial distinction between nature, one another, and the state. For nature IS the state. We are all Taga’alan."
 mangrove.0.a: "Once we were as one, and as one we shall be again!"

 mangrove.2.t: "The Long Quiet"
 mangrove.2.d: "The mangroves do not appreciate your attempt to circumvent the restrictions of conquest."
 mangrove.2.a: "Stick to the restricted casus belli. Report on Discord if this is a bug."

 mangrove.3.t: "Doing Our Part"
 mangrove.3.d: "Reclaiming the hinterlands after they’ve been so devastated is no mean feat. The most recent area in need of reclamation, [mangrove_target_province.GetName] requires the aid of the remaining republics. This is a good chance to increase our standing with a significant donation."
 mangrove_donate_tt: "\nEvery 3 donations will increase the §Ystarting development§! of the Reclamation Site province. Donations will also increase §GMangrove Influence§!. The Republics have currently donated §Y[mangrove_target_province.mangrove_donations.GetValue] time(s)§!.\n\nOur Current Mangrove Influence: §G[Root.mangrove_influence.GetValue]§!\nMost Influential Mangrove Republic other than ourselves: §G[mangrove_highest_other.GetName]§!\nTheir Mangrove Influence: §G[mangrove_highest_other.mangrove_influence.GetValue]§!"
 mangrove.3.a: "Increase Development Efforts"
 mangrove.3.b: "Send Settlers and Scholars"
 mangrove.3.e: "Donate Money"
 mangrove.3.f: "Back Out"
 mangrove_donate_manpower_tt: "Lose §R-[Root.mangrove_manpower_check.GetValue]000§! Manpower."
 mangrove_donate_money_tt: "Lose §R-[Root.mangrove_money_check.GetValue]§! Crowns."

 mangrove.5.t: "You Must Construct Additional Punia Logi"
 mangrove.5.d: "For centuries, those who wish to rule in Taga’ala have pursued power by crafting self-sustaining terrariums and aquariums sealed in amber, symbols of their scholastic prowess and the value of their promises. These Punia Logi, or Sealed Worlds, test the crafter’s ability to create infinity - ideally, they serve as perpetually self-regulating and -sustaining ecological machines.\n\nIf you want to craft one yourself, you must understand the environment you wish to mimic, the process of crafting, and the value and importance of your promises. Those who have the wherewithal to study the world, the networks to consult the knowledgeable, or the mind to spend hours in careful observation are those most naturally given to receive the people’s trust, and by extension, a leadership role."
 mangrove_punia_logi_compare_info_tt: "Our Punia Logi: §G[Root.mangrove_punia_logi.GetValue]§!\nMangrove Republic with most Punia Logi other than ourselves: §G[mangrove_highest_other.GetName]§!\nTheir Punia Logi: §G[mangrove_highest_other.mangrove_punia_logi.GetValue]§!"
 mangrove.5.a: "This is going to cost us."
 mangrove.5.b: "Our allies stay loyal by our side."
 mangrove.5.c: "Biological Infrastructure serves as a fine foundation."
 mangrove.5.e: "Back Out"

 mangrove.101.t: "The Focus of Our Reclamation"
 mangrove_vote_tt: "Voting Power is §GMangrove Influence + 4 * Diplomatic Reputation§!.\nCurrent Voting Power: §G[Root.mangrove_true_influence.GetValue]§!"
 mangrove.101.d: "It’s the season. As the reclamation efforts continue, a decision must be made as to which grove receives our efforts this time. As one of the remaining republics we get a say in this as well."
 mangrove.101.a: "Toe Afe Matagi"
 mangrove.101.b: "Faugulalu"
 mangrove.101.c: "Lele La'au"
 mangrove.101.e: "Vasanifo"
 mangrove.101.f: "Tatau"
 mangrove.101.g: "La 'imo'imo"
 mangrove.101.h: "A'au Lafiga"

 mangrove.1020.t: "The Means of Production"
 mangrove.1020.d:  "The reclamation is going well, and so many turn their attention towards the future. The mangroves hold countless wonders, but setting up the infrastructure to produce them will take up limited land and require the consultation of armies of scholars, architects, craftspeople, and perhaps even a knowledge of botany and animal husbandry."
 mangrove.1020.a: "It is worth the investment."
 mangrove.1020.b: "Just harvest whatever the land provides."
 mangrove_high_investment_tt: "The mangrove will produce more valuable trade goods."
 mangrove_low_investment_tt: "The mangrove will produce less valuable trade goods."

 mangrove.1021.t: "Deadlock in the Mangroves"
 mangrove.1021.d: "The reclamation site is almost finished and soon ready to begin production. However, the Mangrove Republics cannot agree on which resource the reclaimed mangrove should produce. They refuse to send their workers unless they can have input on the production method. If we do not wish to bow to the whims of our kin, we could divert our settlers to man the production facilities ourselves."
 mangrove.1021.a: "Salt"
 mangrove.1021.b: "Pearls and Amber"
 mangrove.1021.c: "Ivory"
 mangrove.1021.e: "Dyes"
 mangrove.1021.f: "Fish"
 mangrove.1021.g: "Naval Supplies"
 mangrove.1021.h: "Lumber"
 mangrove.1021.i: "Heed our kin."

 mangrove.103.t: "A New Reclamation Target"
 mangrove.103.d: "The votes have been tallied and the result is in. By the will of the republics, our siblings, [mangrove_target_province.GetName] is the next mangrove to be reclaimed!"
 mangrove.103.a: "The Reclamation begins anew."
 mangrove_reclamation_tt: "§G[mangrove_leader.GetName]§! is the most influential and will hold the province. Changing leaders will change ownership of the province.\n\n§GReclamation will last for 5 years.§!"

 mangrove.105.t: "[mangrove_reclaimed_permanently.GetName] Reclaimed"
 mangrove.105.d: "[mangrove_reclaimed_permanently.GetName] has been fully reclaimed from the wilds. Its biomes know balance and its occupants form a true community once more. Recovering from the resettlement efforts, the republics now focus inwards."
 mangrove.105.a: "The hour for mutual aid and effort will return soon enough."
 mangrove_inward_focus_tt: "§G[mangrove_reclaimed_permanently.Owner.GetName]§! loses §Y10§! Mangrove Influence and will maintain permanent ownership of this province. The Reclamation has ended and now we focus inwards.\n\n§GInward Focus§! will last for 2 years. You may shorten this period by taking the decision §GShift Focus.§!"

 mangrove.107.t: "Outward Focus"
 mangrove.107.d: "The age of recovery and inward focus is at an end. Too long have we spent concerned on internal affairs, and now the time comes to share our prosperity. Like shoots in the shadow of a treefall, we are ready to promote new growth once more and rectify the mistakes of the past."
 mangrove.107.a: "About time."

 mangrove.109.t: "Vying For Dominance"
 mangrove.109.d: "The Taga'ala mangroves have been fully reclaimed, and the echoes of Uma Laa’ow resonate once more as prosperity returns to the realm.\n\nHere, where once the amber-gold paths of ships danced betwixt the waves, commerce flows once more. The children of Taga’ala know each other as kin again, and the hearts of every citizen is soothed by this long overdue mending of family ties. Yet for many years our peoples lived their existence walled off from each other; the task of restoring those bonds and breaking through those walls will not prove easy. Some argue the leader of Uma Laa’ow should be reelected in the traditional manner - via a test of scholastic craftsmanship. Others argue the corrupt elements of society must be cut out more vigorously, like lancing pus from a suppurating wound.\n\nThe question of consolidation has been raised among the republics. Amongst the murmurs in the leaves, we have caught wind of their intentions. [mangrove_vying_custom_loca]"
 mangrove_vying_custom_loca_dip: "The republics plan on unifying diplomatically."
 mangrove_vying_custom_loca_mil: "The republics plan on unifying militarily."
 mangrove.109.a: "This is fine."
 mangrove.109.b: "Maybe the others will accept a different path..."
 mangrove_largest_tag_explain_tt: "We will follow the path chosen by the §Ylargest republic§!."
 mangrove_dip_vying_pre_explain_tt: "We will have §Y10§! years to build the most beautiful §YPunia Logi§!. This will require §Ymoney§!, §YBiological Infrastructure§!, and §Yalliances§!. The winner will §Yintegrate§! the others."
 mangrove_mil_vying_pre_explain_tt: "We will fight against the republic with the §Ymost development§!. There will be a §Y3§! year period to convince the other republics to join a side. Increase their §Gopinion§! and §Gtrust§! to convince them."
 mangrove_vying_swap_dip_tt: "We will pivot to the §YDiplomatic§! path of §YVying for Dominance§!."
 mangrove_vying_swap_mil_tt: "We will pivot to the §YMilitary§! path of §YVying for Dominance§!."

 mangrove.111.t: "Vying for Dominance Commences!"
 mangrove.111.d.dip: "The Vying for Dominance has officially begun.\n\nLong ago, the potential Grovewardens of Uma Laa’ow would attempt to prove their mettle to a triumvirate of judges chosen from a selection of scholars, craftspeople, and diplomats. Using all their knowledge of Taga’ala, these candidates would raise natural marvels - shimmering aquariums, bonsai specimens, tanks of animals - and enclose these miniature wonders in amber glass, a vessel known as a Punia Logi, or Sealed Worlds. If the challenger created an improper balance of life within the glass, their efforts would quickly run afoul of the consequences of their carelessness as the environment within died. However, if the candidate was wise in the ways of life, their creations would persist for as long as sunlight pierced the glass. The maker’s ability to produce thriving worlds within a realm of scarcity displayed diligence and creativity.\n\nThe candidates would then present their creations to the entire nation, symbolized by the triumvirate of judges. Moving a heavy vessel of glass is no easy task, so caution had to be taken during the transportation to the judgement grounds in the Soulgarden. If a vessel cracked, it was proof of the carelessness of the bearer. If the candidate lacked friends to aid the journey, it revealed the flaws of their character. No one unfocused or isolated had the strength to be a great leader.\n\nSet before the judges on pedestals of marble, these creations offered windows into the souls of their makers. Some held fish, or flowers, or flies. Some were simple, stable, and spartan. Others were ambitious, artistic, and asinine. But each and every single one was utterly unique. There, with the products of their hearts on display, the candidates would wait as the Judges weighed the value of their efforts. One of the Punia Logi would be selected to be enshrined in the Soulgarden - an open-air exhibition free for all Taga’alans to visit - and its maker would reign so long as the world inside remained intact. If a Grovewarden died before their Punia Logi, they joined the pantheon of great leaders who continued their reign from beyond the grave.\n\nThe Republics have chosen the diplomatic path to unification, and return to the Rites of Punia Logi once more."
 mangrove.111.d.mil: "The Vying for Dominance has officially begun. When Uma Laa’ow first began to sicken, its illness spread through the veins of our community by means of backroom exchange of riches and the corruption of traditions. No longer were the Rites of Punia Logi a meritocratic process to select the most suitable candidate; they had become a ritual of bribery and blackmail.\n\nThose rites became a contest of wealth and cruelty as those too principled to accept the perversion of these sacred acts were slaughtered, quietly and quickly, but without exception. And for what? For the noble creatures who have guided our people for generations to be slaughtered for foreigners! For the generous groves who have offered us haven in the hours of greatest need to be sacked! And wearing the stolen products of this realm, our corrupted leaders have sought to claim the mantle of stewardship! NEVER AGAIN! To this day they have rested on their ill-gotten riches in peace, fat off the sacrifice of all else in the world. May their lips never touch fruit again. May the rain never cool their face. May the glimmer of bouquets never grace their eyes.\n\nIt was not too long ago we were whole, and the barbarians amongst us who despoiled our homeland still live. It is not too late to give them their just desserts. Today we may shed our siblings’ blood, but it will be in service of the most noble goal to ensure that we will never have to shed their blood ever again.\n\nThe Republics have chosen the Military path."
 mangrove.111.a: "Let the others witness our mighty and pure vision of Uma Laa’ow!"
 mangrove_dip_vying_tt: "We have §Y10§! years to build the most beautiful §YPunia Logi§!. This will require §Ymoney§!, §YBiological Infrastructure§!, and §Yalliances§!. The winner will §Yintegrate§! the others.\n§YPunia Logi§! can be seen in the §GMangrove Influence§! decision."
 mangrove_mil_vying_tt: "§G[mangrove_side_1.GetName]§! will be fighting against §G[mangrove_side_2.GetName]§!. There will be a §Y3§! year period to convince the other republics to join a side. Increase their §Gopinion§! and §Gtrust§! to convince them."

 mangrove.114.t: "Reaching for Uma Laa’ow"
 mangrove.114.d: "Over the past few years, the different republics of the Taga’ala people have been jostling for supremacy, trying to prove that they are the only choice for the future. In the end, we have shown ourselves to be the best contender, though the upstart fools of {other Taga’ala contender} have decided to impinge upon our primacy. The rest of the Mangrove Republics have now made their positions clear, and to resolve this issue, we must put these pretenders in their place!"
 mangrove.114.a: "When the next monsoon comes, only we shall remain."
 mangrove_unification_war_tt: "We have §Y7§! years to prove our dominance and §YUnify the Mangroves§!. If time runs out, the country with §Yhigher warscore§! will claim victory."

 mangrove.115.t: "The Taga'ala Mangrove Republics United!"
 mangrove.115.d: "The opposition has been felled, with all of the Mangrove Republics bearing witness to our ascendancy, and bowing to our might. No longer shackled by those who’d keep us down, we now may look beyond our home to the rest of Insyaa with assured eyes."
 mangrove.115.a: "The old chronicle reaches its last word. Tomorrow, we begin anew."
 mangrove_vying_mil_reward_tt: "Gain §Y1§! §Gfree Biological Infrastructure upgrade§! on all provinces from the republics swayed before the war."

 mangrove.117.t: "An Inconclusive Competition"
 mangrove.117.d: "There is no conclusive winner among the Mangrove Republics. The trees whisper of complaints and the people question the indecisiveness of the ruling. The conclusion to this competition has been pushed back two years. It will not be pushed back again."
 mangrove.117.a: "The end is close."
 mangrove_punia_logi_warning_tt: "We will convene in §Y2§! years. If there is a tie again, the republics will §Ychoose randomly§! from the tied."

 mangrove.118.t: "The Taga'ala Mangrove Republics United!"
 mangrove.118.d: "We have built the greatest masterwork Punia Logi, and their beauty and glory now shimmer within the Soulgarden as a testament to our influence and devotion to our duty. Our mandate stands uncontested, and the mangroves have been united under our control. The limitations regarding war and conquest beyond the mangroves have been lifted. Now, we turn our focus to the rest of Insyaa."
 mangrove.118.a: "A new age begins!."
 mangrove_vying_dip_reward_tt: "Gain §Y1§! §Gfree Biological Infrastructure upgrade§! on all annexed provinces."

 mangrove.120.t: "The Splitting of the Mangroves"
 mangrove.120.d: "We have reached an undesirable and uneasy understanding with our foes, with the mangroves cleaved in the wake of our infighting. Hopes for Uma Laa’ow seem further away than before, and the status quo does not promise an easy path ahead."
 mangrove.120.a: "Tragic we could not force our siblings to our side."

 mangrove.122.t: "An Outsider has Encroached on the Mangroves"
 mangrove.122.d: "To the dismay of all Taga’ala, the target of our reclamation efforts have been occupied by interlopers. They have no respect for the laws of the republic, nor concern for the land, and they’re now in a position to exercise full coercive power in the grove."
 mangrove.122.a: "In time, this error will be corrected."

 mangrove.123.t: "Taking Root in the Mangroves"
 mangrove.123.d: "[mangrove_leader.GetName] is now the new leader of the mangroves. A tree is nourished by many roots. The prominence of one is not to the detriment of others, but there is always potential for one to serve the tree the most. As we reach out to the fertile lands around us and heal the wounds we find there, the efforts of one have risen to be felt strongest. By taking control of the reclamation effort, it is unquestioned that this territory will necessarily become a part of this new leader's realm should it eventually be restored to Uma Laa’ow."
 mangrove.123.a: "Strong roots feed many leaves."
 mangrove.123.b: "A root is nothing if I cut down the tree."
 mangrove_disable_new_leader_event_tt: "Disable this event from popping up again."

 mangrove.201.t: "Death of an Old Tree"
 mangrove.201.d: "In our quest to heal the natural biological infrastructure in one of our mangroves, we have come across an old and seemingly rotting tree. Thinking to use it as fuel for new growth, we encouraged saplings to sprout in and around it.\n\nThis however was a mistake. The tree was not dead, but was instead covered in a strange moss that gave it the appearance of rot. In disturbing it, we have killed this tree and set back out efforts to preserve the local ecosystem."
 mangrove.201.a: "What were we supposed to do? Check its pulse?"

 mangrove.202.t: "Green Water"
 mangrove.202.d: "It is no understatement that the water of the Mangroves is just as important as the flora and fauna that live in it to us. Which is why this latest mishap is so distressing. A misplaced but good intentioned young mage has caused an explosion of growth in the native vines and the resulting growth has turned the water a sickly green. Beyond this, the vines choke and restrict native life, and are an uncontested burden on the ecosystem. They will need to be removed before they deplete the soil and die, causing further problems."
 mangrove.202.a: "How did I get tangled up in this?"

 mangrove.203.t: "Too Few Fish"
 mangrove.203.d: "Something we have done has caused a collapse of the local fish population. Where when we arrived the mangrove knees once hid whole schools of fish now their numbers deplete by the day and the corpses of the dead bob on the surface of the water. As the only change that has taken place here recently was our efforts to heal the biological infrastructure, the only reasonable conclusion we can come to is this is somehow our doing."
 mangrove.203.a: "Is it something in the water?"

 mangrove.204.t: "Music of the Mangroves"
 mangrove.204.d: "An unintended side effect of our reclamation efforts has been the increase of song birds chirping in the mangrove branches. Their music is not only sweet and beautiful but signals the health and positivity of our efforts. As small creatures like these return to the mangroves we can expect larger creatures to follow. And with enough patience and effort, eventually people, like us, will join them too."
 mangrove.204.a: "Sing for me, birds of paradise."

 mangrove.205.t: "Nature's Call"
 mangrove.205.d: "Some things are simply naturally beautiful. Without any help from us nature is able to make things we can only stare at in awe, and one such marvel has been revealed to us. Our Chroniclers have remarked on the cascading water, the unique tree trunk shapes and even the beauty of the very stone and earth. By exposing this place of natural beauty and connecting it to our current efforts of refurbishment, we have surely contributed to the health of the mangroves as a whole."
 mangrove.205.a: "This, is what we're working towards."

 mangrove.206.t: "Smells of Nature"
 mangrove.206.d: "A healthy ecosystem smells different from a sick one, and while someone inexperienced with nature may struggle to identify or describe it our efforts have produced a notably different olfactory sensation when walking the mangroves. The earthy, soft aroma is pleasant to experience and while it is perhaps not to the taste of someone who prefers floral or sweeter scents for those inclined to travel our reclamation effort, it is a welcome addition."
 mangrove.206.a: "What a breath of fresh air."

 mangrove.207.t: "Overzealous Chronicler"
 mangrove.207.d: "While there are few rules or restrictions on the practice of chronicling or who can participate, there are a few requirements that need to be adhered to. In general, it is not a productive endeavor to have a young chronicler blindly redo the work of a more experienced elder. Yet that is exactly what has happened here, the younger man having wasted weeks of time reworking old ideas and the elder insulted his work has been ignored and disagreed with."
 mangrove.207.a: "We might need to get rid of both of them."

 mangrove.208.t: "False Chronicle"
 mangrove.208.d: "It has come to our attention that a chronicler has been falsifying information in order to benefit themselves in their native community. Caught accepting a bribe to positively mention the efforts of a specific individual, he was summarily taken off of all tasks he was working to complete. But even with no new bad information coming in, it might take months to find all of the papers he worked on and cull them from the main body of work."
 mangrove.208.a: "This would be a lot easier if we didn't have so many."

 mangrove.209.t: "Honest Mistake"
 mangrove.209.d: "As accurate as chroniclers strive to be, sometimes human error prevents the collection of accurate information. In this case, a superstitious belief from a Chronicler's native community bled into their work and caused them to falsely report a danger that did not actually exist. While this information has not harmed anyone it has informed our decisions for quite some time and set us back by making our resource allocation poorer than it could have been."
 mangrove.209.a: "What do you mean he thought those plants were carnivorous!?"

 mangrove.210.t: "Thorough Chronicles"
 mangrove.210.d: "The benefit of allowing many different people to practice chronicling is the wash of perspectives and mindsets that can contribute their points of view. Where one chronicler may excel in very fine details another may have a larger picture or long term viewpoint that provides two very different explanations of the same thing or event. We are currently experiencing a surge in these similar but different reports, allowing us even greater understanding."
 mangrove.210.a: "You can never know too much."

 mangrove.211.t: "Who Chronicles the Chroniclers?"
 mangrove.211.d: "A strangely unique Chronicler has become known to us, traveling the land and observing other Chroniclers while chronicling their actions and work. Unsurprisingly, he has found one of our chroniclers to be amongst the greatest of the Taga'ala and is planning on recording several of her great works she has participated in for posterity. Naturally this has brought much added acclaim to our nation for hosting such a well record chronicler."
 mangrove.211.a: "I hope they don't write down how much I pay them..."

 mangrove.212.t: "Poetry in Paragraphs"
 mangrove.212.d: "As a general rule, poetry does not have rules. The value of the artform is in the artistic expression afforded to the author when composing it and that includes spelling, grammar, word spacing and all other parts of the writing process. But when an author can make poetry even with all the rules of language that is truly a rare and beautiful thing. One such person has taken up the mantle of chronicling for us here and we have come to respect him greatly for his accuracy, thoroughness, and art."
 mangrove.212.a: "Like music for the eyes."

