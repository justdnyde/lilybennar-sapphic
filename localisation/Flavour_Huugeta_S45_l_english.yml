 S45_church_over_officers_bypass_tt:0 "We favoured the §YChurch§! in the mission §YCollect the Wanderers§!"
 S45_vassalize_mengi_tt:0 "We will vassalize §YMengi§! countries with no more than §Y100§! development."
 S45_mercenary_excellence_3_tt:0 "Our §YMercenary Excellence§! modifier is at least tier §Y3§!."
 S45_more_fierce_negotiator_tt:0 "The §YFierce Negotiator§! personality will become twice as common for our rulers and heirs."
 S45_mercenary_enterprise_tt:0 "We will gain access to the §YMercenary Enterprise§! system while we own the §YBlood-Spurs' Home Province§!. Through various actions, we will gain §YMomentum§!, representing the strength and popularity of our sellswords. Every §Y10§! years, momentum resets, and we can choose a reward.\n\nAt certain breakpoints we will upgrade our §YMercenary Excellence§! modifier.\n"
 S45_logistics_of_a_state_effect_tt:0 "If we complete the mission by granting a monopoly on §YSlaves§!, our §Y[Root.GetAdventurersName]§! will grow more §YPowerful§!.\n\nOtherwise, our monopoly on §YGlass§! will grant §G+1§! §YDiplomatic Reputation§!, our monopoly on §YCloth§! will grant §G+5%§! §YMorale§! and neither will reduce our §YMaximum Absolutism§!."
 S45_horns_and_trumpets_effect_tt:0 "If we complete the mission by granting the §YFree Company Rosters§! privilege, our §Y[Root.GetAdventurersName]§! will grow more §YPowerful§!.\n\nOtherwise, the §YBattlemage Academies§! privilege will no longer cost §YArmy Tradition§! or reduce §YMaximum Absolutism§!"
 S45_aristocrats_and_officers_effect_tt:0 "If we complete the mission by granting the §YCourtiers of Adventure§! and §YEnnoblement of Adventurers§! privileges, our §Y[Root.GetAdventurersName]§! will grow more §YPowerful§!.\n\nOtherwise, the §YAristocratic Counselors§! privilege will no longer increase §YStability Cost Modifier§! or reduce §YMaximum Absolutism§!\n\n§REmpowering our [Root.GetAdventurersName] will grant significant rewards, but they won't materialise until the end of the Mission Tree.§!"
 S45_collect_the_wanderers_effect_tt:0 "If we complete the mission by granting the §YGenerous Quest Rewards§! privilege, our §Y[Root.GetAdventurersName]§! will grow more §YPowerful§!.\n\nOtherwise, the §YReligious Culture§! privilege will grant an additional §G+1§! §YTolerance of the True Fatih§! and no longer reduce §YMaximum Absolutism§!"
 S45_foreign_fodder_effect_tt:0 "If we complete the mission by choosing a §YNon-Human Military Reform§!, our §Y[Root.GetAdventurersName]§! will grow more §YPowerful§!.\n\nOtherwise:"
 S45_merchants_of_death_tt:0 "Using the §YSlander Merchants§! covert action allows us to apply §R-5%§! §YMorale§!, §R-10%§! §YArtillery Combat Ability§! or §R-10%§! §YInfantry and Cavalry Combat Ability§! to the target for §Y5 Years§!"
 S45_mercenary_chapter_tt:0 "Any current and future §YMercenary Home Province§! with a §YManpower Building§!, §YFort§! and §Y5 Base Manpower§! will also receive this modifier."
 S45_telekenid_wars_tt:0 "Our §YCondottieri§! or §YMercenaries§! from our lands were §YVictorious§! in §Y3§! wars between countries holding land in the §YTelekenid§! region. Currently: §Y[Root.telekenidWars.GetValue]§!"
