l_english:
 S45_finish_the_job_title:0 "Finish the Job"
 S45_finish_the_job_desc:0 "When we first founded our capital, the lord of Mukis felt he had a royal right to our lands. But without the strength of arms to back up his claim, all he achieved was making an enemy out of us. That led to a century of raids and skirmishes between us.\n\nOur late Mezhi Kojo V had his rule cut short when the villains of Mukis stooped so low as to slay our monarch with vile hag sorcery. In turn, our honest steel cut their realm down to a rump state, though they were saved by the wiles of their spymasters. These schemers devised a plot that fooled even our own and saved Mukis from the ruin they deserved. When we finally conquer our hated foe, we should integrate their spies into the Tamanyouchu, who will be instrumental in securing victories to come.\n\nNow let us end this rivalry the way it started: with military might triumphant over delusions of royal right."

 S45_take_the_whole_house_title:0 "Take the Whole House"
 S45_take_the_whole_house_desc:0 "The rulers of Fuulmana once had the gall to accuse Kojo VI of leading a smuggling operation in their city, back when he was still a prince apprenticed to one of our diplomats there. A slanderous claim, but it has given rise to an interesting idea.\n\nOur capital still lacks a prosperous industry, but it is wedged between the two famed centres of glassmaking in Madriamilak. All that beautiful glasswork simply isn't safe in Dugiti and Fuulmana. Their glassmen will be relocated to Huugeta, where their craft can safely bloom and generate wealth for our realm."

 S45_heirs_of_the_dragon_title:0 "Heirs of the Dragon"
 S45_heirs_of_the_dragon_desc:0 "[Root.GetHeirsOfTheDragonDescription]"
 S45_heirs_of_the_dragon_desc_default:0 "If we are to usher in a second Melakmengi, we must pay our respects to the first. Zenidir's legacy lives on in the many nobles of the realm that trace their ancestry back to his faithful servants. Conquest will not suffice to win their approval; we will need to rebuild the ruins of old Melakmengi and demonstrate our capacity for prudent stewardship. Only then will the ancient houses deign to serve us as they did Zenidir. The empire will rise again on their backs, adorned in the symbols of the dragon."
 S45_heirs_of_the_dragon_desc_alt:0 "A baffling number of Mengi lords try to derive legitimacy from some real or imagined connection to old Melakmengi and the legacy of Zenidir. How ironic, since the dragon himself won his throne through sheer might and endless wars of conquest, just as we are doing in the present.\n\nOnly those who triumph on the field and beat their adversaries into submission as he did can truly claim the First Emperor's mantle."

 S45_tap_new_markets_title:0 "Tap New Markets"
 S45_tap_new_markets_desc:0 "The prosperity of our state hinges on the success of the Blood-Spurs. While our most prolific customers in the Pechuketema league have declared us obsolete, there is always bloodshed to be found somewhere. We shall tap new markets, so that blood and coin may keep flowing."

 S45_repay_the_betrayal_title:0 "Repay the Betrayal"
 S45_repay_the_betrayal_desc:0 "Mercenaries we may be, yet we have always considered a loyal client akin to a friend. We've bled in the service of our northern neighbours in countless battles, against bandits, trolls, and war-mongering neighbours. Now, they've decided they don't need us anymore, even with Simegasa breathing down their necks.\n\nThe Pechuketema league has betrayed our bonds, and we will not take this slight lying down. They will soon realise their folly when they find themselves at the end of the blades they spurned."

 S45_seize_the_golden_valley_title:0 "Seize the Golden Valley"
 S45_seize_the_golden_valley_desc:0 "Just to our east lies the most prosperous region in all of Madriamilak: the Golden Valley of the Yet. We will secure the ample supply of grain and gold found there by marching east until we dominate the riverbanks.\n\nAnd there is more than just material wealth in those lands. The king of Werikgeta boasts command over a legion of spies, with a reputation in league with that of our Tamanyouchu. Once we shatter their realm, we should integrate their remnants as we did before in Mukis. No other realm will ever be able to match the combined cunning of spies from three nations."

 S45_logistics_of_a_state_title:0 "Logistics of a State"
 S45_logistics_of_a_state_desc:0 "A state is a mighty beast that needs to be kept fed. Our generals always roar hungrily for more. More supplies, more arms, more men. At the same time, our wealthiest subjects whine for luxuries, like textiles and glass.\n\nWe will have to make choices. We can strive to produce highly valuable luxuries, let our merchants amass great fortunes, and feed the treasury on tariffs. Or we could favour the production of more essential goods. Slaves to fill the gaps in our ranks, steel to arm them, and grain to feed them. Which path will serve us best?"

 S45_the_lustre_of_coin_title:0 "The Lustre of Coin"
 S45_the_lustre_of_coin_desc:0 "[Root.GetTheLustreOfCoinDescription]"
 S45_the_lustre_of_coin_desc_default:0 "So far, it was steel that has carried us forward, but it is not the only mighty metal. Silver and gold provide great leverage to a cunning monarch, securing friends and soldiers in great numbers. As we grow our realm to its intended size, we must not forget to strengthen our economic position, for the sinews of war are infinite coin."
 S45_the_lustre_of_coin_desc_alt:0 "Our detractors think our endless violence will drain our coffers and make our realm collapse. They hope that once we can no longer afford to pay our soldiers or secure allies with gifts of gold, our ambitions will collapse under their own weight.\n\nBut these hopes are in vain, for the wars we wage are a boon to our treasury rather than a drain on it. Through reinvestment of our mercenary earnings and the plunder from our foes, our realm grows more prosperous with every drop of blood we shed."

 S45_expand_the_family_title:0 "Expand the Family"
 S45_expand_the_family_desc:0 "Once again, gold and blood flow in equal measure. Our reputation as excellent fighters has secured new clients to such an extent that we need more manpower to meet the demand for our services.\n\nThe Deathsworn, orphans turned troll hunters, would be an excellent addition to our enterprise. Many of them already lead a mercenary lifestyle, so it should be easy to integrate them. The fight against the trolls is never-ending, so the Deathsworn's skills will provide us with an infinite supply of gold."

 S45_horns_and_trumpets_title:0 "Horns and Trumpets"
 S45_horns_and_trumpets_desc:0 "Our realm and enterprise have grown considerably, and mercenaries beyond our borders are clamouring to be accepted into it. The Death Trumpets, with their magic horns, will tear down the walls of our foes, and the Rhino Riders will trample them beneath their magnificent beasts."

 S45_war_in_the_north_title:0 "War in the North"
 S45_war_in_the_north_desc:0 "We make good coin by exploiting every little raid, skirmish, and border conflict, but the situation up north provides an opportunity of a completely different calibre. It's not some local struggle between two Mezhi, or a bandit infestation that can be cleared in a few months. We're looking at a sustained invasion of Madriamilak by several foreign powers, starting war after war after war. The Ofehibi and Metobesebi defenders of the coast will certainly pay up to stay in control of their homes.\n\nAnd if they refuse our services, surely the Raheni will like to employ us instead."

 S45_ambition_given_form_title:0 "Ambition Given Form"
 S45_ambition_given_form_desc:0 "Once, we were content to sell our swords and live lives of wealth and glory. Then, we decided warriors as glorious as us should have a realm of their own and command the respect of nations. That respect was not granted easily; it took a lot of rolling heads for the Mezhi to look past our humble origins. But now, those looking to keep their heads are starting to bow.\n\nTheir deference, while welcome, will not dissuade us from pursuing more. Taking what we want has whetted our appetite, and all of Madriamilak will be needed to slake it. Send word to the Tamanyouchu that we have embedded far and wide inside our neighbours' realms. Let them prepare for our arrival, for we come to make the land of the Mengi whole again, by force."

 S45_look_to_us_title:0 "Look to Us"
 S45_look_to_us_desc:0 "[Root.GetLookToUsDescription]"
 S45_look_to_us_desc_default:0 "Listen to the wise words of the Semayebaka, children of Amilak. They know that the Father in the heavens smiles upon us. You think us war-mongers, but we raise temples to his glory and bring his teachings to the wayward. None can deny our devotion to God, and none should resist our efforts to glorify him."
 S45_look_to_us_desc_alt:0 "The Holy Land is always under threat. Trolls, gnolls, Raheni, shifters, they all threaten the pious children of Amilak. Why then do our brothers resist our ambitions when we are clearly the ones with the strength to protect the faithful? They must still doubt our power in the face of danger. But we can eradicate that doubt, along with the faithless hordes of Yrilak."

 S45_no_one_left_to_deny_us_title:0 "No One Left to Deny Us"
 S45_no_one_left_to_deny_us_desc:0 "[Root.GetNoOneLeftToDenyUsDescription]"
 S45_no_one_left_to_deny_us_desc_default:0 "Our [Root.Monarch.GetTitle] comes from a long line of self-made men. Relying ever on the strength of their sword arm, they carved out a place in the world for this unique realm, where mercenary captains enjoy a great deal of power and respect.\n\nBut their martial prowess has not made them blind to other facets of rulership. They have weighed the interests and skills of noble lords and enterprising merchants, dealt fairly with mages and clergymen, and determined the proper balance between our Mengi brethren and local minorities.\n\nSo when we unify Madriamilak, there will be no one who wishes to oppose us, for they would be opposing their own prosperous future."
 S45_no_one_left_to_deny_us_desc_alt:0 "The great Mezhi, the pious Semayebaka, the wealthy merchants. All doubted us. But those that are left are forced to acknowledge our achievements. We started as sellswords, and we still are. We did not leave behind our way of life, but rather forced the 'civilised' world to accept it.\n\nAll are now forced to accept that power does not stem from crowns, coin, or prayers. The supreme authority from which all others are derived, is violence, and it is wielded by men with swords."

 S45_aristocrats_and_officers_title:0 "Aristocrats and Officers"
 S45_aristocrats_and_officers_desc:0 "It's been a hundred years since we began the transformation from a company to a country. The officers who supported Kojo I in this endeavour have long since passed, and now their descendants are styling themselves as nobles of the realm.\n\nThere may be benefits to a traditional nobility, but is it truly our way? Can we not forge a new path on which heritage does not supersede skill? Should the blood in their veins propel men to power? Or should it be the blood they spill in battle?"

 S45_collect_the_wanderers_title:0 "Collect the Wanderers"
 S45_collect_the_wanderers_desc:0 "Aside from a handful of established and famed mercenary companies, Madriamilak also houses throngs of wandering fighters, the Riyitewag. Driven by gold, faith, and a hundred reasons more, they ply the same trade as us and could be a useful addition to our workforce. How shall we corral these roaming bands to join our service? Do we promise them generous pay and glory? Or do we follow the path that most Mezhi do and have our holy men spin them tales of absolution and Amilak's favour?"

 S45_foreign_fodder_title:0 "Foreign Fodder"
 S45_foreign_fodder_desc:0 "Many Mengi bands, named or nameless, have joined our enterprise. But beyond Madriamilak, more mercenaries ply their trade and could be made to work for us. We'll never say no to more fighters, but some are saying we should draw a line somewhere.\n\nThese foreign bands may serve us, but being allowed into the ranks of the Blood-Spurs should be an honour reserved for stalwart Mengi men. Others yet decry this conservative outlook, saying we would be wasting skilful soldiers and leaving money on the table for nothing but misplaced chauvinism."

 S45_our_favoured_peddlers_title:0 "Our Favoured Peddlers"
 S45_our_favoured_peddlers_desc:0 "There was a fair share of grumbling when we made Yetmesira bend the knee. More than one proud Mezhi denounced our 'traitorous ploy'. To make sure the city and especially its traders do not get caught up in some sort of grudge, we should make sweeping investments to guarantee their loyalty and the flow of slaves."

 S45_enduring_partnership_title:0 "Enduring Partnership"
 S45_enduring_partnership_desc:0 "Many of our allies have forsaken us, but not all. In Yetmesira, they know our worth. They value our skill at arms, now just as much as during the Rabble-Rouser invasion. And we value the slaves they have on offer. Most of them are just fodder, useful to slow down a troll for a few moments. But some prove their worth and rise through our ranks or are sold back to the Flesh-Peddlers at an incredible profit."

 S45_learn_from_our_partners_title:0 "Learn from our Partners"
 S45_learn_from_our_partners_desc:0 "Shameful as it is, our realm is wet behind the ears. The recent struggle between nobility and officers shows we need to work on the state apparatus. Institutions shall arise in time, codifying the structure of our society. Perhaps some great thinkers from our friends on the eastern coast would be interested in working for us to realise these dreams?"

 S45_surpassed_title:0 "Surpassed"
 S45_surpassed_desc:0 "Our partnership with the slave port of Yetmesira has been fruitful, providing us with a stable flow of coin and 'recruits'. Their philosophers and bureaucrats helped transform us from a backwater into a modern state with unique mercenary characteristics.\n\nBut times change, and while we still wish to trade with them, we no longer need to look to them for guidance. In fact, they should look to us for protection! If they know what's good for them, they'll be amenable to some renegotiating."

