 S45_mercenary_excellence_desc:0 "Our current §YMercenary Momentum§! is §Y[Root.mercenaryMomentum.GetValue]§!.\n\nActions that generate §YMercenary Momentum§!:\n\nBuildings:\n Manpower and Force Limit Buildings (+1): §Y[Root.mercActionValue_building.GetValue]§!\n Weapons Manufactories and Soldier's Households (+5): §Y[Root.mercActionValue_manufactory.GetValue]§!\nEvery 5 Base Manpower Development (+1): §Y[Root.mercActionValue_dev.GetValue]§!\nOur Manpower Traded for Favours (+2): §Y[Root.mercActionValue_favors.GetValue]§!\n[Root.GetAdventurersName] Agendas Completed (+10): §Y[Root.mercActionValue_estate.GetValue]§!\nMilitary Advisor Hired (+5): §Y[Root.mercActionValue_advisor.GetValue]/5§!\nTook Mil Tech Ahead of Time (+10): §Y[Root.mercActionValue_tech.GetValue]§!\nCondottieri Rented From Us:\n  Won a War (+10): §Y[Root.mercActionValue_condottieri_victory.GetValue]§!\n  Won a Battle (+1): §Y[Root.mercActionValue_condottieri_battle.GetValue]/20§!\n  Won a Siege (+2): §Y[Root.mercActionValue_condottieri_siege.GetValue]/20§!\nOur Mercenaries Hired by Others:\n  Won a War (+10): §Y[Root.mercActionValue_mercenary_victory.GetValue]§!\n  Won a Battle (+1): §Y[Root.mercActionValue_mercenary_battle.GetValue]/20§!\n  Won a Siege (+2): §Y[Root.mercActionValue_mercenary_siege.GetValue]/20§!\nEvents: §Y[Root.mercActionValue_event.GetValue]§!\n\n§YBase Momentum§!: §Y[Root.baseMercenaryMomentum.GetValue]§!"
