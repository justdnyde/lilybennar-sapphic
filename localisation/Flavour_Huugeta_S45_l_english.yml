 S45_unlock_lion_warriors_tt:0 "We will be able to hire the §YLion Warriors§! mercenary company."
 S45_own_important_madriamilak_parts_tt:0 "We own every §YCentre of Trade§!, §YMercenary Home Province§!, and §YGreat Project§! in §YMainland Madriamilak§! (§YDenibari, Yetefesefi, Telekenid§!)."
