 S45_poison_their_hearts_tt:0 "When we declare war on a country in which we have a spynetwork of size §Y50§!, we fire the event §YPoison Their Hearts§!, either turning their ruler §YCraven§!, removing a random §YGeneral§! or applying §R-10%§! §YMorale Recovery Speed§! for §Y5§! years."
