 S45_replenish_depleted_mercs_tt:0 "§YHired Mercenaries§! that currently have less than §Y50%§! of their §YManpower§! will replenish §G50%§!."
 S45_has_no_non_humans_tt:0 "Has no §YNon-Human Minorities§!."
 S45_has_accepted_non_humans_tt:0 "Has any §GCoexisting§! or §TIntegrated§! §YNon-Human Minority§!."
 S45_free_company_rosters_upgrade_tt:0 "The privilege §YFree Company Rosters§! no longer reduces §YMaximum Absolutism§!"
 S45_unlock_plutocratic_ideas_tt:0 "Allow §YPlutocratic§! Idea Group."
 S45_yetmesiran_advisor_tt:0 "Depending on our §YNational Focus§! we will gain a §YPhilosopher§!, §YStatesman§!, or §YArmy Reformer§!."
 S45_yetmesira_vassalize_tt:0 "If §YYetmesira§! has no more than §Y100§! development, we will §YVassalise§! them. Otherwise, we gain a §YSubjugation Casus Belli§! against them."
 S45_slaves_manpower_tt:0 "We gain §G3§! §YBase Manpower§! in every province producing §YSlaves§!."
 merc_blood_spurs:0 "Blood-Spurs"
 S45_human_t5_tt:0 "Has enacted Government Reform §YBlackpowder Innovation§! or §YUnfaltering Tradition§!"
 S45_non_human_t5_tt:0 "Has enacted any §YNon-Human§! military government reform."
 S45_tamanyouchu_sabotage:0 "Tamanyouchu Sabotage"
 S45_tamanyouchu_sabotage_desc:0 "Unseen and unheard, our spies did their clandestine work in enemy lands. Now that we've declared war on our foes, our operatives have leveraged every bit of preparation to pave the way for our troops."
 S45_acquired_glassmakers:0 "Indentured Glassmakers"
 S45_acquired_glassmakers_desc:0 "The great glassmen of Dugiti and Fuulmana now labour in our capital under the watchful eyes of loyal guards. The fruits of their labour will repay their slights against our nation."
 S45_shadow_crown:0 "The Shadow Crown"
 S45_shadow_crown_desc:0 "Our [Root.Monarch.GetTitle] wears a magnificent crown at court, displaying our might to all who seek audience. He also wears a crown of shadows, hidden to all, signifying his dominion over the clandestine. In that realm, the Tamanyouchu are his people, their ranks bolstered with the conquered spies of Mukis and Werikgeta."
 S45_superlative_slave_port:0 "Superlative Slave Port"
 S45_superlative_slave_port_desc:0 "The port of Yetmesira is a fat cat indeed, grown wealthy on the bulk of the slave trade in Madriamilak. Ships of flesh come and go, supplying clients across the gulf, while a never-ending chain of caravans meets the city's demand with captives from the far south and west."
 S45_annointed_by_amilak:0 "Annointed by Amilak"
 S45_annointed_by_amilak_desc:0 "The Father in the heavens favours the mighty who fight in His name. Thus, it is no wonder that the Semayebaka of the realm unanimously proclaim [Root.Monarch.GetName] to be the most righteous of all [Root.Monarch.GetTitle]."
 S45_entrenched_officer_class:0 "Entrenched Officer Class"
 S45_entrenched_officer_class_desc:0 "We've favoured our [Root.GetAdventurersName] at every turn, advancing their interests over those of all other estates. As a result, they have grown powerful and now hold great sway in our nation. This path has made them exceedingly loyal, so the [Root.Monarch.GetTitle] can always count on their support when it comes to running the realm and the enterprise."
 S45_mengi_together_strong:0 "The Right to Serve"
 S45_mengi_together_strong_desc:0 "To serve with the Blood-Spurs is a privilege only afforded to our trusted kin. No matter which corner of the realm we hail from, no matter our dialect or regional peculiarities, we Mengi band together."
 S45_mercenary_chapter:0 "Mercenary Chapter"
 S45_mercenary_chapter_desc:0 "A branch of the Huugetan Mercenary Enterprise has its seat in this province. A grand fortress with extensive military training facilities dominates the locality, nurturing the local company of sellswords."
 S45_mercenary_workforce_1:0 "Mercenary Workforce I"
 S45_mercenary_workforce_1_desc:0 "With the Shadowmarked Deathsworn joining our ranks, we can serve more clients than ever before."
 S45_mercenary_workforce_2:0 "Mercenary Workforce II"
 S45_mercenary_workforce_2_desc:0 "Our ranks have been supplemented with two companies of excellent shock troops. The Rhino Riders from beyond the Keygas will dominate the savannas atop their mighty steeds, and the dreaded call of the Death Trumpets will shatter walls and nerves alike."
 S45_mercenary_workforce_3:0 "Mercenary Workforce III"
 S45_mercenary_workforce_3_desc:0 "With the addition of the Skybows and the Lion Warriors, our enterprise now governs every mercenary company of note in Madriamilak. Throngs of sellswords are ready to descend on the foes of the highest bidder at a moment's notice."
 S45_meritocratic_advancement:0 "Meritocratic Advancement"
 S45_meritocratic_advancement_desc:0 "Any mercenary can spin a tall tale and loudly boast of their skill and bravery. But we have learned how to judge them by their proven accomplishments, and can now surround ourselves with the most accomplished tacticians and strategists."
 S45_poisoned_hearts:0 "Poisoned Hearts"
 S45_poisoned_hearts_desc:0 ""
 S45_turning_blood_to_gold:0 "Turning Blood to Gold"
 S45_turning_blood_to_gold_desc:0 "We have engineered our war machine to be a self-sustaining beast. Feeding on the gold of foes and clients, it bolsters itself in preparation for the next bloody conflict."
 S45_yetmesiran_political_thought:0 "Yetmesiran Political Thought"
 S45_yetmesiran_political_thought_desc:0 "A regiment of Yetmesiran thinkers has been assembled at our court. They advise our [Root.Monarch.GetTitle] on how to deal with the estates and shape the institutions of our nation."
 estate_officers:0 "Blood-Spur Officers"
 estate_officers_desc:0 "Huugeta, country in name, but mercenary company at heart. Here, the officers of the Blood-Spur company hold considerable sway over affairs of the realm."
 huugeta.1.t:0 "Enterprise Yields"
 huugeta.1.d:0 "Another decade of bloodshed and gainful employment has concluded. It is time to take stock of our coffers and balance sheets and see how our enterprise has performed.\n\nNow, we need to choose how to profit from our honest labour. Gold, experienced officers, hard-won lessons from the battlefield, each of these could be a worthwhile way of cashing in."
 huugeta.1.a:0 "Take our share in gold!"
 huugeta.1.b:0 "Promote proven field officers!"
 huugeta.1.c:0 "Let the veterans instruct the state's troops!"
 huugeta.2.t:0 "Poison Their Hearts"
 huugeta.2.d:0 "The Tamanyouchu, our hidden blade, holds great potential, moving unseen among our foes. But a blade need not cut to harm. Let it flash a smile at its victims, poisoning their hearts with fear."
 huugeta.2.a:0 "Let their [s45_poison_their_hearts_target.Monarch.GetTitle] know fear."
 huugeta.2.b:0 "Let their generals know fear."
 huugeta.2.c:0 "Let their soldiers know fear."
 huugeta.2.e:0 "Let the blade stay sheathed for now."
 huugeta.3.t:0 "Buying and Selling"
 huugeta.3.d:0 "Accompanied by the cacophony of rattling wheels and clanking chains, a slaver's caravan arrives in Huugeta. Through repeated cracks of the whip, the Yetmesirans line up their goods for the Blood-Spur sergeant.\n\n“A hardy bunch of Dasmati is what I have for you. I'm told they put up quite the fight against their gnollish captors, so I expect a proper price for them.”\n\nIn return, the sergeant gestures at two towering figures behind him, their skin generously battle-marked and their eyes steely.\n\n“These two proved a great investment. Did a lot of fine work against the trolls since we bought them from you. Accomplished warriors now, so I think that tips the scales in my favour.”\n\nThe flesh-peddler smirks.\n\n“And yet, you're looking to sell, not keep them. That tells me all I need to know.”"
 huugeta.3.a:0 "A few minutes of haggling later, both masters are satisfied, and the slaves change hands."
 huugeta.4.t:0 "Dawn of an Empire"
 huugeta.4.d:0 "[Root.GetDawnOfAnEmpireDescription]"
 huugeta.4.d.default:0 "A grand ceremony was held today in [Root.Capital.GetName]. An endless procession of [Root.GetNobilityName], [Root.GetClergyName], [Root.GetBurghersName], and [Root.GetAdventurersName] walked solemnly through the royal palace, each kneeling before the [Root.Monarch.GetTitle] and uttering oaths of fealty.\n\nIt marked the dawn of a new era for all Mengi, an era of unity under a strong ruler. A [Root.Monarch.GetTitle] who had dominated Madriamilak through strength but also built a stable realm, taking the ancient rights and interests of the estates into account."
 huugeta.4.d.alt:0 "A grand ceremony was held today in [Root.Capital.GetName]. An endless procession of  [Root.GetNobilityName], [Root.GetClergyName], and [Root.GetBurghersName] walked solemnly through the royal palace, kneeling before the [Root.Monarch.GetTitle] and the [Root.GetAdventurersName] arrayed about [Root.Monarch.GetHerHim].\n\nThe ceremony marked the dawn of a new age. An age in which neither heritage, nor piety, nor gold can grant legitimacy. Only power, wielded ruthlessly, has that right."
 huugeta.4.a:0 "[Root.GetDawnOfAnEmpireOptionA]"
 huugeta.4.a.default:0 "A strong [Root.GovernmentName] with stable foundations."
 S45_no_officer_power_reward_tt: "§RSince we never favoured our [Root.GetAdventurersName], they cannot provide us with any boons!§!"
 huugeta.4.a.alt:0 "No more pretence. It is swordsmen who rule."
 huugeta.101.t:0 "Arming the Blood-Spurs"
 huugeta.101.d:0 "The Blood-Spurs are the core of our mercenary enterprise, and should always be well-supplied and armed to the teeth. The quartermasters have petitioned the [Root.Monarch.GetTitle] for additional funds to procure weaponry."
 huugeta.101.a:0 "They must make do with what they have."
 huugeta.101.b:0 "We shall divert funds to the quartermasters."
 huugeta.101.c:0 "Perhaps we can turn some ploughshares into swords?"
 huugeta.102.t:0 "Small-Time Clients"
 huugeta.102.d:0 "It's not just states that hire our men. Local lords, merchants and townships make up a significant part of our enterprise's revenue. Sometimes they get left behind when our focus lies abroad."
 huugeta.102.a:0 "Our grand ambitions are more important."
 huugeta.102.b:0 "We must continue to serve the smaller clients."
 huugeta.102.c:0 "Divert some men right away!"
 huugeta.103.t:0 "Family Matters"
 huugeta.103.d:0 "Traditionally, the Deathsworn are composed of orphans left behind by trollish raids, motivated by fiery vengeance. The captain in Kadmuduuk has informed us that these traditional recruits are now in short supply. He seemed happy about it, but our enterprise will suffer if there are fewer Deathsworn."
 huugeta.103.a:0 "It is what it is."
 huugeta.103.b:0 "Surely we can find some motivated lads with parents."
 huugeta.103.c:0 "There must be plenty of orphans in our newly acquired lands."
 huugeta.104.t:0 "Target Practice"
 huugeta.104.d:0 "The Skybows pride themselves on being excellent marksmen, able to pick off any foe at great distances, even a nimble harpy. But boasts need to be backed up with action, and skill has to be continuously honed through practice."
 huugeta.104.a:0 "They can decide their own training regimen."
 huugeta.104.b:0 "We've got some lighting-fast guinea fowl they can practice on."
 huugeta.104.c:0 "Practice should reflect reality."
 huugeta.105.t:0 "Magical Maintenance"
 huugeta.105.d:0 "The horns of blasting used by the Death Trumpets are an incredible weapon, sending powerful shockwaves at hostile fortifications and the men that cower behind them. But they are also expensive to craft and maintain, requiring a steady supply of the precious damestear."
 huugeta.105.a:0 "The Trumpets should learn to swing a sword."
 huugeta.105.b:0 "Force our mages to give us some blue rocks."
 huugeta.105.c:0 "Let's open up some mines in [damestear_province.GetName]"
 huugeta.106.t:0 "Everything the Lion Touches"
 huugeta.106.d:0 "The Lion Warriors consider themselves proud Metobesebi champions and are always clamouring in our ear to support their kin's communities in the Telekenid. Now they're demanding to be paid in land for their services to the company."
 huugeta.106.a:0 "You get coin, just like everyone."
 huugeta.106.b:0 "We can help expand some settlements."
 huugeta.106.c:0 "You can have [foreign_province.GetName]"
 huugeta.107.t:0 "A Rider and His Rhino"
 huugeta.107.d:0 "When you're riding a beast that can trample a small army or gore a troll on its horn, it is only logical to develop a strong bond with your mount. The Rhino Riders have taken this notion to heart, opting to let the steed choose its riders and developing a near-religious reverence for these animals. These traditions are quaint, but when the company needs their services, we cannot wait for a rhinoceros to make up its mind."
 huugeta.107.a:0 "Traditions are a mercenary's birth right."
 huugeta.107.b:0 "Their customs should be streamlined."
 huugeta.107.c:0 "Threaten their precious rhinos to get their asses in gear."
 huugeta.108.t:0 "A Poor Reputation"
 huugeta.108.d:0 "The gnolls in our enterprise are a rowdy lot, even for mercenaries. Overcoming the distrust between Mengi and gnolls is tricky to begin with, and the Sellclaws' behaviour does little to endear them to potential employers."
 huugeta.108.a:0 "They fight well, that's all we care about."
 huugeta.108.b:0 "We can invest in some public relations."
 huugeta.108.c:0 "They can make up the difference through copious looting."
 huugeta.109.t:0 "Clients Below the Waves"
 huugeta.109.d:0 "The aquatic shifters in the Lodge of the Brave maintain good relations with the merfolk living off the coast. They wish to pledge their service to the merfolk, but there are many issues with logistics, communication and diplomacy to make it work."
 huugeta.109.a:0 "Our enterprise will remain landlocked."
 huugeta.109.b:0 "We can make this opportunity work!"
 huugeta.109.c:0 "We crave the treasures of the deep!"
 huugeta.110.t:0 "Bandits in Name and Deed"
 huugeta.110.d:0 "While the Blood-Spurs are a shining example of professional conduct, some other mercenary bands are not as trustworthy. In some cases, such as with the Dakinshi in our employ, the line between mercenary and bandit is blurred beyond recognition, hurting their standing with prospective clients."
 huugeta.110.a:0 "But we don't mind a bit of grey."
 huugeta.110.b:0 "We need to legitimise them in the eyes of potential clients."
 huugeta.110.c:0 "We need to fire the worst of them."
 S45_spawn_bandits_tt:0 "The former mercenaries will turn into an §YAdventurers Wanted§! bandit infestation!"
 huugeta.111.t:0 "Faith of the Shifters"
 huugeta.111.d:0 "The Tanizu power and practice of shifting into animal form is strongly linked to their native religion. Normally, we would enforce worship of Amilak in our lands, but if done carelessly, it could cause the Leopard Warband to leave or disband. Still, the Semayebaka urge us to send missionaries to preach in Sakuibiryo."
 huugeta.111.a:0 "Worship of Amilak is non-negotiable."
 huugeta.111.b:0 "A bit of syncretism never hurt anyone."
 huugeta.111.c:0 "Give the locals full religious freedom."
 huugeta.112.t:0 "The Model of a Modern Mercenary"
 huugeta.112.d:0 "Mercenaries across the world are adapting to a new way of war, trading traditional weapons for firearms. Within our enterprise, there are shining examples and regrettable stragglers. The Thunder Runners belong to the former, while members of the latter are causing trouble out of resentment."
 huugeta.112.a:0 "It'll all work itself out"
 huugeta.112.b:0 "We'll grease the wheels to calm them."
 huugeta.112.c:0 "We favour the vanguard of a new age."
