 U39_silverspite_can_die_tt: "§R\nMillions still resist him. Many more still despise him. But no matter the dissent, Elrandar Silverspite's domination of the Oren Nayiru is now complete.\n\nWith this final victory, the indominable will that has been holding the Kamrayakval's shattered body together for almost a century begins to ebb.\n\nIt may be years, it may be decades, but soon Nayiru-Reborn will ascend back to the heavens from whence he came. From there, he shall see his great task fulfilled at last.§!"