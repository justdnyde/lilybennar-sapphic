 #Church Aspects
 OREN_NAYIRU_ASPECTS_LONG: "Oren Nayiru Tenet"
 OREN_NAYIRU_ASPECTS_SHORT: "Tenet"
 monasticist_the_fortress_of_light: "The Fortress of Light"
 desc_monasticist_the_fortress_of_light: "There are threats around every corner - rather than seeking them out and potentially bringing them to the faith's lands, the faith needs to take a defensive stance.\n--------------\n\nThe §YMonasticists§! Estate gains §G10§! loyalty"
 monasticist_empire_as_archipelago: "Empire-as- Archipelago"
 desc_monasticist_empire_as_archipelago: "Rather than a single big community, the Oren Nayiru should be an archipelago of self-sufficient communes, in support of, but not dependent on, each other.\n--------------\n\nThe §YMonasticists§! Estate gains §G10§! loyalty"
 monasticist_suspended_in_twilight: "§OSuspended in Twilight§!"
 desc_monasticist_suspended_in_twilight: "The Dawn has not yet come - when it does, Nayiru will bring light to all by themselves. Therefore, the faith must focus on living true to Nayiru's will, and bringing the Light of Dhivumanhu to their slice of the world - while they await the end of the rest of it.\n--------------\n\nThe §YMonasticists§! Estate gains §G20§! loyalty\nThe §YKamrayakvalists§! Estate loses §R10§! loyalty\nThe §YKavalalists§! Estate loses §R10§! loyalty"

 kavalalist_suspensive_pragmatism: "Suspensive Pragmatism"
 desc_kavalalist_suspensive_pragmatism: "To properly guide and protect the faith, the High Kavalali must be able to reserve the right to "suspend" strict religious idealism in order to pursue pragmatic politics and calm tensions.\n--------------\n\nThe §YKavalalists§! Estate gains §G10§! loyalty"
 kavalalist_perpetual_evolution: "Perpetual Evolution"
 desc_kavalalist_perpetual_evolution: "The truth of Nayiru is not always clear, nor static, and so the Kavalali must constantly investigate, debate and test the tenets of their faith, to identify, then carry out, Nayiru's will.\n--------------\n\nThe §YKavalalists§! Estate gains §G10§! loyalty"
 kavalalist_wisdom_in_hierarchy: "§OWisdom in Hierarchy§!"
 desc_kavalalist_wisdom_in_hierarchy: "The Kavalali were appointed by Nayiru for a reason, and in turn they appointed the High Kavalali for a reason too. They are the utmost protectors, guides, and experts of the faith - their authority must be respected, and their remit expanded, for the faith to truly flourish.\n--------------\n\nThe §YKavalalists§! Estate gains §G20§! loyalty\nThe §YMonasticists§! Estate loses §R10§! loyalty\nThe §YKamrayakvalists§! Estate loses §R10§! loyalty"

 kamrayakvalist_head_and_helm_of_dawn: "Head and Helm of Dawn"
 desc_kamrayakvalist_head_and_helm_of_dawn: "The Kamrayakval must be empowered so that he can guide the decentralised military of the faith under one direction, on and off the field.\n--------------\n\nThe §YKamrayakvalists§! Estate gains §G10§! loyalty"
 kamrayakvalist_the_moral_imperative: "The Moral Imperative"
 desc_kamrayakvalist_the_moral_imperative: "It is a moral imperative to free those living under tyranny or slavery wherever they can be found - it is the faithful's duty to give their lives in service to that.\n--------------\n\nThe §YKamrayakvalists§! Estate gains §G10§! loyalty"
 kamrayakvalist_the_emminent_sentence: "§OThe Emminent Sentence§!"
 desc_kamrayakvalist_the_emminent_sentence: "The permanent liberation of new territories must be assured at all costs. "Trials" are wasted on enemies of the darkness - taking up arms against the faith, engaging in slavery, supporting tyranny - these are emminent crimes, and they carry an emminent sentence.\n--------------\n\nThe §YKamrayakvalists§! Estate gains §G20§! loyalty\nThe §YMonasticists§! Estate loses §R10§! loyalty\nThe §YKavalalists§! Estate loses §R10§! loyalty"

 #Estate Names
 estate_kavalalists: "Kavalalists"
 estate_kamrayakvalists: "Kamrayakvalists"
 estate_monasticists: "Monasticists"

 #Government Reforms
 U39_kavalali_theo_democracy: "Kavalali Theo-Democracy"
 U39_kavalali_theo_democracy_desc: "Influenced by the ancient warrior-circles of the Taychendi, the state assemblies of the Kheionai, and the religious conclaves of the Bulwari, the Kavalakuttam originated from the faith’s days in shadow, when a hidden network of energetic correspondence connected the disparate Kavalali together.\n\nThe modern chamber serves the same purpose, holding Orenvalyam’s leaders to account, and permitting constant debate, discussion… and division. Left to its own devices, the million voices within would squabble ad nauseam – instead, the Kamrayakval presides over argument and channels it into action. It is legislature and supreme judiciary and ecumenical council all in one – the instrument and interpreter of Nayiru’s will on Halann."
 mechanic_disable_most_tier_10_theocracy_reforms_yes: "\nDisable all §YTier 10§! Theocracy reforms except '§YClerical Commission§!' and '§YDivine Guidance§!'\n"
 mechanic_has_orenvalyam_parliament_yes: "Parliament Seats cannot be bribed\n\nHas unique Parliament Issues: §ZKamrayakvalist§!, §yKavalalist§!, §TMonasticist§!, and Agnostic\n\nThe §YClergy§! is renamed to the §YKavalalists§!\nThe §YNobility§! is renamed to the §YKamrayakvalists§!\nThe §YBurghers§! is renamed to the §YMonasticists§!\n"

 #Estate Privileges
 estate_burghers_U39_monasticist_faction: "Monasticist Faction"
 estate_burghers_U39_monasticist_faction_desc: "The Monasticist Faction, so-named for their preference for isolated communities, are guided by their belief that Dawn can be truly brought only by Nayiru’s personal intervention, and so they abhor Orenvalyam’s liberative conquests into other territories.\n\nMonasticists are pro-decentralisation, rejecting the Kavalakuttam’s authority to intervene in their affairs. The Kavalali they send to the body are not representatives but delegates, the voice of – not speaker for – their flock."
 estate_burghers_U39_monasticist_faction_tt: "§GWhen Loyal (above 60%)§!:\nUntil revoked, Orenvalyam gets Parliament Debate Backing Chance: §G+30.0%§!\n\n§YWhen Neutral (between 30% and 60%)§!:\nUntil revoked, Orenvalyam gets Parliament Debate Backing Chance: §G+15.0%§!\n\n§RWhen Disloyal (under 30%)§!:\nUntil revoked, Orenvalyam gets Parliament Debate Backing Chance: §Y+0.0%§!"
 estate_church_U39_kavalalist_faction: "Kavalalist Faction"
 estate_church_U39_kavalalist_faction_desc: "The Kavalalist Faction holds that the wise, pragmatic, judicious governance of their leaders, the High Kavalali, is needed to shepherd Orenvalyam into Dawn. Hierarchical, conservative, conciliatory, unlike the Kamrayakvalists they prefer debate and discussion over militaristic force, and unlike the Monasticists they prefer pragmatic expansion over defencist isolationism.\n\nThe Kavalalists chart the middle course – and are willing to take on any allies that may help them navigate it."
 estate_nobles_U39_kamrayakvalist_faction: "Kamrayakvalist Faction"
 estate_nobles_U39_kamrayakvalist_faction_desc: "The Kamrayakvalists, harkening back to Taychend’s heroic past, believes that the strong decisive leadership of the Kamrayakval – Orenvalyam’s executive and commander-in-chief – is the only thing that can both safeguard Dawn, and bring it beyond Orenvalyam’s borders.\n\nZealous and uncompromising, they scoff at both the Monasticists’ defencist isolationism, which they see as cowardly, and the Kavalalist’s conciliatory pragmatism, which they see as ineffective. To the Kamrayakvalists, no price is too high for Dawn."
 estate_adventurers_U39_order_of_exemplars: "Order of Exemplars"
 estate_adventurers_U39_order_of_exemplars_desc: "The Order of Exemplars, alongside the various other holy orders that once comprised Rezankand’s Conclave of Dawn, have been allowed to continue to exist under Orenvalyam’s dominance, albeit without state support and under strict supervision.\n\nConstantly looked over to ensure they are not breaking the fundamental tenets of the Oren Nayiru (or, really, doing anything that the Kavalakuttam would prefer they didn’t) the Exemplars are determined to continue their sacred mission in Aelantir – being the Light, providing an example to all, and helping those who cannot help themselves."
 estate_mages_U39_the_dawn_paradigm: "The Dawn Paradigm"
 estate_mages_U39_the_dawn_paradigm_desc: "There is such a thing as morality in magic. Unfortunately, the Slaver-Nobles did not understand this, and since the Ruin the emulation of their arcane “might” has plagued Taychend: necromancy to desecrate the dead, enchantment to enthrall the mind, conjuration to make fell pacts with foul masters. Under Dawn’s Paradigm, this will not stand. We will chart a different course.\n\nBut that means steering clear of the wrecks our ancestors left behind. The relics of our ancestors must be cordoned off, studied, understood, and used only when necessary, for to enjoy the products of slavery is to forge the chain yourself."
 estate_mages_U39_the_pan_aelantiri_paradigm: "The Pan-Aelantiri Paradigm"
 estate_mages_U39_the_pan_aelantiri_paradigm_desc: "There is such a thing as morality in magic – unfortunately, this was not something that the Precursors understood. They toyed with the fundamental forces of the universe, and in so doing affronted all that was right with the legacy of their fell deeds, their “relics” proof of their crimes.\n\nBut not all the disparate peoples of Aelantir encountered these crimes in the same way, felt their consequences in the same form. An Eordan knows nothing of the sacrifice of Kannalulthe, or the horrors of the Orphan King. We must adapt our thinking – Dawn’s Paradigm must be Aelantir’s Paradigm."

