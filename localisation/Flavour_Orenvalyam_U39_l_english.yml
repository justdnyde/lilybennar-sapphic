 U39_thank_you_for_playing: "\n§gThank you for playing Orenvalyam!\n\nThe Oren Nayiru has been a real labour of love for me since I started in Taychend, and at last the Orenvalyam story is finally complete, and in game - I hope you have enjoyed it!\n\nThank you also to all who reviewed the tree, and an extra special thanks to Blaziy, who coded this tree, and Taychend Empire, and half the rest of Taychend to boot - none of what I've done in Taychend would have been possible without you!\n\nAfter so long, Dawn has arrived. Is it how you like it?§!\n - Takasaki"
 U39_silverspite_dies_elrandar_event_tt: "\n\nHis great task complete, §YNayiru-Reborn§! will §Rdie§!.\n\nFrom a steel tomb on the periphery of Taychend to conqueror of all Hallann in 100 years. Congratulations to YOU on your amazing achievement and make sure to tell people how awesome you are!"

 #Flavor Tooltips
 U39_sil_protector_flavour_tt: "§RElrandar Silverspite is renowned in many different ways. To the soldiers, he is their commander. To the freed slaves and serfs, he is their emancipator. To the Taychendi that suffered for so long under Interlopers, he is their liberator. How could anyone justify standing against him?§!\n"
 U39_sil_inheritor_flavour_tt: "§RThey say the Kamrayakval is often given to doubt, to dour moods – that he had been long before he began his ascent. The Kavalakuttam whisper that some of his more disregarding behaviour towards them has been caused by this. But his mercy is still evident – what do they truly have to worry about?§!\n"
 U39_sil_commander_flavour_tt: "§RPurification.\n\nThe pardon was permission: the military took the gloves off. The Kavalakuttam didn’t like it. But the Kamrayakval was the supreme commander, the soldiery his domain – and the soldiers themselves knew it as well as the Kavalali who ostensibly led them. The officers of Silverspite’s Company soon became the officers of the faith itself. They knew what they had to do, and did it well. After all… killing, when done righteously, is a chore like any other.§!\n"
 U39_sil_traitor_flavour_tt: "§RTo most ordinary people, the Kamrayakval’s actions were as shocking to them as Velara’s murder. It was understandable… comprehensible, with all he’d talked down the Kavalakuttam. But to violate its sanctity, without evidence, without charge? Was Silverspite really so rash? So wrathful? The soldiers, of course, didn’t care. What was wrong with putting the weaklings in the Kavalakuttam in their place? What was wrong with vengeance?§!\n"
 U39_sil_avatar_flavour_tt: "§RFor most of Orenvalyam, their shining liberator had been replaced by a grim instrument of either Nayiru’s will, or a darker force. They rarely saw him out of his Armour, anymore, without his twin blades in his hands, annihilating, punishing, conquering. To so many, it was sickening. To the soldiers? It was exhilarating.\n\nHark, the Dragon comes! The maelstrom-that-follows, the hound-that-chases, the wrought-iron storm that will see Dawn through! Why wouldn’t they give everything to follow it to victory?§!"
 U39_sil_murderer_flavour_tt: "§RA shifting-void in a woman’s shape watched the fight from one of the chamber seats, hands in her lap, watching, judging, waiting. The Darkness, come to claim the killer below. Silverspite scowled, when he looked upon it. His time was not done. He still had work to do.\n\nThe Kamrayakvalists did not bat an eye when they heard what Ceboranbu had done. They simply marked him as another dead traitor, and buried him with the rest. Their master had no friends, any more – no partners, no confidants – but that was fine. He had them.§!\n"
 U39_sil_world_ender_flavour_tt: "§RCan you hear that? That roar of scraping metal and shrieking steel? Watch out! The Dragon cometh, and its rider void-clad. A Dwarovar-train of sword and steam, gathering momentum, gathering speed, never stopping, never letting up.\n\nNo hesitation, no limitations, no mercy, no weakness. The shadows gather, and the Kamrayakval casts them aside. The traitors rear their heads, and the Kamrayakval cuts them down. There are no lines they will not cross, no depths they will not tread. And at the end of the tracks…?\n\nApocalypse.§!"
 U39_sil_will_of_one_flavour_tt: "§RUntold thousands gathered round, soldier and civilian both, enraptured in the ringing metal, the dance of wrought-black and pale gold, the clash of bright magic and silver-steel. The honed killer, aggression incarnate, a whirling dervish, darting and diving; the stalwart paladin, defensive, driving back and lunging forwards.\n\nNone could say for how long the duel lasted – minutes, hours. It was over in ten seconds.§!\n"
 U39_sil_the_stand_flavour_tt: "The screams, the fear, the wrath, the ruin. Metal crashed, bones broke. Ears bled from the murdering-sound. And yet, despite the din, above the slaughter, a chorus… and from the fury, arose these broken words.\n\n§OWhat have they done?§! §RWe are the Dead!§!\n§OWhat will they do?§! §RWe are the Dead!§!\n§OWhere will they turn?§! §RWe are the Dead!§!\n§OIs there nothing I can do?§! §RWe are the Dead!§!\n§OHow did it come to this?§! §RWe are the Dead!§!\n§OHow did I go so wrong?§! §RWe are the Dead!§!\n§OMother– what have I done–?!§! §RWe are the Dead!§!\n§OI am the§!       §RWe are the§!\n"
 U39_sil_the_fall_flavour_tt: "§YNanru Nakar§! burnt around him. Blood flowed through the streets. His soldiers killed thousands – and as the orders spread like lightning across §YOrenvalyam§!, hundreds of thousands. Anyone within reach his followers deemed an enemy of Dawn was slaughtered. Along with their families, along with their friends, along with anyone who got in the way. And yet, that night, §YElrandar Silverspite§! sat there silently, by Ecaris’ body. He had only one thought in his mind:\n\n§RI won.§!\n"
 U39_heralds_silverspite_tt: "§R(Although he cannot discard the Kavalakuttam’s decision to integrate the Exemplars, Silverspite has accrued enough power to prevent the process from going any further)§!\n"
