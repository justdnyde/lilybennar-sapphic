 #Holy Orders
 U39_order_of_judges_order: "The Order of Judges"
 U39_order_of_judges_order_desc: "The ancient Judges of Bulwar work as independent wandering sages of law. They work to settle disputes and to ensure that justice is done."
 U39_sundancers_order: "Order Of The Sundancers"
 U39_sundancers_order_desc: "Mysterious and secretive guardians of the treasures we have gathered from our ancestors. The Sundancers are not only tasked with preventing any relic found in these lands from falling into the wrong hands, but also to study them and uncover the arcane secrets of the Precursors, so that their awesome might may further our divine mission here in Zenzarkand and beyond."
 U39_avengers_order: "Order Of The Avengers"
 U39_avengers_order_desc: "Valiant and implacable enemies of the malign entity infesting the sweltering jungles to the north of our newfound home, the Avengers are tasked with preventing any incursions of the Effelai into our lands and in due time cleansing this jungle realm from the pervasive influence of the Malevolent Dark."

