 #Missions
 U39_1_1_the_interloper_heroes_title: "The Interloper Heroes"
 U39_1_1_the_interloper_heroes_desc: "The Jaherian Exemplars – the Heralds of Nayiru – helped rouse the truth of Surael from the first Kavalali at Uesrennu. And yet, as time passed, our relations with the heroes of the east has grown strained. Many Taychendi were enchanted by their gleaming armour, but many Kavalali came to see the taint of darkness hiding beneath their Sunplate – their disdain for Taychendi history, their arrogance, love of order, of folding all into their ideology.\n\nWhile the Kavalalists want to integrate them into Orenvaylam's government to harness their power, the Kamrayakvalists and Monasticists are each internally split as to whether we ought to purge the "errant heralds", or merely tolerate them and their divergent beliefs. The Kavalakuttam must decide what to do with these “Interloper Heroes”."
 U39_1_2_legacy_of_the_heralds_title: "Legacy of the Heralds"
 U39_1_2_legacy_of_the_heralds_desc: "Once, the coming of the Exemplars struck in all fear and awe. Whether the sign was a colossal blade of light wielded by a hero of legend, or machines of metal and magic, or else relics of servitude twisted to a supposedly righteous cause, where the Exemplars went, the enemies of their Darkness were felled by their Light.\n\nAnd yet, was their Darkness Nayiru’s darkness? Was their Light Nayiru’s light? What will their place be in our new world? What will become of those we once proclaimed Heralds of the Apocalypse?"
 U39_1_3_spears_of_nayiru_title: "Spears of Nayiru"
 U39_1_3_spears_of_nayiru_desc: "One can say many things about the Jaherian Exemplars, but one cannot say they did not know how to fight. Unparalleled discipline and warrior acumen, centuries of experience within every soldier, armour that would put the smiths of Kherka and Banderuttai to shame: through the trial of the Remnant Fleet that abandoned us, the memories of a lifespan lost to us, and the arcane traditions of a place foreign to us, they became a perfect meld of physical and magical might.\n\nMany of these advantages can’t be replicated, but in one crucial area, we can not only match but overcome them: firearms. Such weapons are a manifestation of the lightbringing fury of Nayiru, and with the spirit of the faithful we can mass produce these arms. In conjunction with arcane power, the armies of Orenvalyam will bring an unstoppable inferno!"
 U39_1_4_liberation_of_the_effelai_title: "Liberation of the Effelai"
 U39_1_4_liberation_of_the_effelai_desc: "There was never any doubt, not really. In the Effelai we face a colossal beast, its tendrils spreading across half a continent, ready at a moment’s notice to enslave the very people which revere it, lashing out against the civilisations around it, against the agents of Nayiru’s will; how could it ever simply be left alone? It would be a dereliction of duty – and we are ever the dutiful.\n\nBy flame, by blood, by steel and arcane might, the Effelai will burn. The Taychendi will see it done!"
 U39_1_4_salvation_of_the_effelai_title: "Salvation of the Effelai"
 U39_1_4_salvation_of_the_effelai_desc: "The difficult path is not always the right one. The strange solution is not always inferior to the straightforward. The first glance is not always the true picture. We marched north with the words of the Exemplars in our ears – but their view of the Singing Jungle was tainted by their theology, their ideology. Our own was tainted in turn by the histories of Taychend.\n\nBut we’ve had the strength to look past it, and heed the call of those who live beneath the Effelai’s ‘aegis’, however foreboding. It is our duty to make this place bearable – it is our duty to be not the harbinger of the Effelai’s destruction, but its salvation."
 U39_1_5_sugar_vats_and_shacked_seas_title: "Sugar-Vats and Shackled Seas"
 U39_1_5_sugar_vats_and_shacked_seas_desc: "The Ruin Sea is sick with slavery. Like the ill-brewed concoctions of Mykx, the rot of bondage has seeped into the islands’ soil, brought aboard Cannorian ships laden with personed “cargo”. Every shackle must be broken, every orcish slave freed, every sugar vat toppled and manor house burnt.\n\nWe will make sure the Cannorians do not forget what they have done to us – and that the enslaved do not forget what we have done for them."
 U39_1_7_oathbreaker_title: "Oathbreaker"
 U39_1_7_oathbreaker_desc: "Not all shackles are cast in iron. We saw this with Ameion, which used ideas of "tutelage" and economic confinement to turn free peoples into serfs – slaves by another name. This practice is endemic to the Ynn: serf toils for knight, knight toils for master, each bound in turn by oath and religious fealty. Even the arrival of the Cannorians couldn’t shake the system, not entirely – the Ynnics have ever since been locked in a brutal battle between reformers and traditionalists.\n\nNot for much longer, though, for we will not reform the system, but rend it apart: when we climb the Cliffs of Ruin, the sabres of Orenvalyam shall break their oaths once and for all!"
 U39_1_8_sunrise_over_the_ynn_title: "The Ynnic Heresy"
 U39_1_8_sunrise_over_the_ynn_desc: "What is Nayiru? To the Taychendi and most of the faith, he is the greatest still-living god, soul, spirit. To the Kheionai, it is the supreme philosophical concept from which all others must stem. To the Amadians, they are Ñawsayachaer redefined, great god of not just time, but the Cycle of Time, guarded by the visage Ñawach-Nayiru, who holds the sun. See the dissimilarities? And yet, to all of these groups, Nayiru is supreme.\n\nBut the Ynnic Kavalali disagree: to them, in theology, society and governance, the beliefs of the Oren Nayiru must stand equal to those of old Ynnic religion. The Ynn, see, is also a surviving Elusive One, who returned over a thousand years prior at the start of what the Taychendi know as the Cycle of Glory. The Ynn is therefore Nayiru’s equal.\n\nSee the dissimilarity? See how one could call this heresy, but not the others? Good. Then you’ll understand the furore that is about to unfold…"
 
 U39_2_1_relics_of_servitude_title: "Relics of Servitude"
 U39_2_1_relics_of_servitude_desc: "During the last Cycle, the insidious Slaver-Nobles used foul magics to enslave the world. Just as their gleaming slave collars, extracted from their crumbling ruins, have been repurposed by Taychend’s slavers, so too have weapons forged from the fruits of slavery been reused by the great tyrants of this cycle. In the new age, we will not make the same mistake.\n\nThe relics of servitude must be collected and confined, used only when most necessary – and the sort of magic that created them must be shunned forever! The Nila Tenvach (‘Blue House’) of Nagar Vyechei is the heart of this arcane rot. In our holy endeavour, we must begin there."
 U39_2_2_cash_crops_no_longer_title: "Cash Crops No Longer"
 U39_2_2_cash_crops_no_longer_desc: "The Oren Nayiru is an agrarian faith: to cultivate the fruits of the soil in rural harmony is a virtuous thing. And yet, we recognise how many slaves have toiled in brutal subjection to extract those fruits. In the Cannorian Interlopers’ grim plantations, we see the darkest manifestation of that yet.\n\nAnd still, we’ve come to realize that it is not solely the slaver that dictates the methods of cultivation. The goods produced by these plantations, in the quantities needed to be ‘profitable’, demand these horrific practices. Each person, free or slave, that dies boiled alive in the sugar-vat, dies in darkness. First in our lands, and then in Aelantir, we will make them desist. "
 U39_2_3_into_the_jungle_title: "Into the Jungle"
 U39_2_3_into_the_jungle_desc: "For years, we heard of the vast rainforest to the north only in whispers, third-hand accounts from mountain tribals high up in the Veyii Sikarha, hunters from Vettakaramai, or exiles from the Dugui’hi. None of the stories were good – and the tales of the Jaherian Exemplars, who figured the Effelai as a malevolent manifestation of the Malevolent Dark, did nothing to help its image.\n\nIndeed, as we march north, most of our armies do so with torch in hand, ready to burn out the rot at the heart of the continent. And yet, some of our Kavalali grow uneasy. Why do some of the tribals plead for us to stop? Why should we so blindly follow the Exemplars’ lead? Maybe there is another way to deal with the Singing Jungle?"
 U39_2_4_spectres_of_revolution_title: "Spectres of Revolution"
 U39_2_4_spectres_of_revolution_desc: "Across Aelantir, the people cry out for the flame of the Oren Nayiru. In Ozgarom, we found a strange new people, not native to this place, but immediately we saw them for what they were: kindred spirits. In slavery, they suffered – from slavery, they rose.\n\nAlongside his companions, Bramash Breaker-of-Chains shattered their shackles and struck terror in the hearts of the Ruin Sea slavers. With the aid of the Oren Neraghul, the fire of revolution will burn bright once more. In the captain’s cabins of the slave ships, in the colonial palace and the plantation manor, those who hold others in bondage will never rest easy again!"
 U39_2_5_not_lost_but_stolen_title: "Not Lost, but Stolen"
 U39_2_5_not_lost_but_stolen_desc: "The Cannorians have carved up Aelantir, waging war against the native Ruinborn, exploiting them where possible and massacring them when not. They have stolen Aelantir from us, but in our hearts the memory of better days persists – and can be made reality. And yet, how? By doing unto the colonists what they have done to us? Are we to massacre women and children too? Uproot people from their homes, no matter how they gained them?\n\nSo far, we have been able to push that question further and further back – but in Endralliande, we find a place where the question grows too complex for autonomy. The Kavalakuttam must deliberate; the fate of millions of Cannorians, and the very idea of justice, is on the line."
 U39_2_6_cut_the_throat_of_slavery_title: "Cut the Throat of Slavery"
 U39_2_6_cut_the_throat_of_slavery_desc: "The most insidious thing about Cannorian slavery is how little it troubles the minds of those who profit from it. The Cannorians sup on the fruits of injustice, oblivious to the monstrous crimes  committed to bring such delights to table. Does the baker ask where his sugar comes from? Do the “enlightened men” in their coffee houses know the blood price of their petty delights? Does the trader bat an eye when he sees a shipping crate stamped by the VG or CLSTC?\n\nWhen we seize the last bastion of colonial trade in Noruin, and cut the throat of slavery once and for all, they will know – and they will fear. For they shall understand we have never lived in ignorance, and that we shall not extend our mercy to those who clutch at it as their shroud!"
 U39_2_7_campurana_corintar_title: "Campurana Corintar"
 U39_2_7_campurana_corintar_desc: "Corin: a name that has long been a constant companion on our periphery, Exemplars and adventurers alike bringing  the fragments of her memory with them to Taychend. Now, of course, we know her better. We know how her legacy has been used to inspire justice… and to justify heinous crimes. Slavery-as-justice, colonisation-as-adventure.\n\nBut there are those who still uphold the ideas of the hero, the god, not the faith that followed her. Once our relationship with the Cannorians is settled, perhaps it will be time to settle our relationship with their greatest hero?"
 U39_2_9_in_heavens_image_title: "In Heaven's Image"
 U39_2_9_in_heavens_image_desc: "To the Monasticists, the entire purpose of their hill-top communities was to emulate the bounty and prosperity of Dawn in peace, tranquility and security. After all, why wage war, destroy, devastate, when you can remain at home and toil and actually improve yourselves?\n\nWhy indeed – at last, the Monasticists have gotten their way. As Orenvalyam settles into dominion over Aelantir, the time has come to till the soil, to tend to nature, to build, secure, consolidate, develop. To carve from exploited fields a paradise, in Heaven’s Image, in our time."
 
 U39_3_1_kan_oren_dan_manhu_title: "Kan Oren Dan Manhu!"
 U39_3_1_kan_oren_dan_manhu_desc: "No one elf can be the master of the land!\n\nThroughout the years, various warlords and foreign invaders have tried to steal the very fields people work from under them. Doing away with the Attemutil city-state, the traditional mode of land ownership in Taychend whereby land, even if dominated by a single political figure, is worked in common by all, the interlopers impose private estates, and vast serf and slave economies.\n\nThe Oren Nayiru will not abide this. We are an agrarian movement at our heart, and the farm and ranchlands of Taychend will never be shackled to the great cities – the Attemutil communes, now led by the Kavalali, shall become the foundation upon which we build a new world!"
 U39_3_2_from_shadows_title: "From Shadows"
 U39_3_2_from_shadows_desc: "For centuries, we lived in the shadows – but in those centuries, we learnt how to use the darkness, and when to strike out from it. Though victory raised us from the underground, we haven’t forgotten these lessons – and neither have the Oren Neraghul.\n\nUnseen they shall be heroes. By illusion and trickery they shall elucidate Nayiru’s truth. From shadows they shall light up the night. Their warriors, the Vairaghul, shall be a constant threat, a constant fear. Against the enemies of Nayiru they will be the hidden blade, and the slavers and tyrants of Aelantir will never feel safe in Darkness again."
 U39_3_4_empire_as_archipelago_title: "Empire-As- Archipelago"
 U39_3_4_empire_as_archipelago_desc: "There is a dream of Orenvalyam, in which a hundred million Attemutil, spread across the breadth of Halann, each live in perfect harmony and yet may each pursue the truth of Nayiru, the promise of the Oren Nayiru, in their own way. There is a dream in which every people might display and live proudly by their ancient histories, might carry forwards the right-thinking aspects of their culture into the new Cycle.\n\nThis dream is of a chaotic world. An incomprehensible world, once you look past the shared faith in Nayiru that is held by all. But in chaos, what else do we find but freedom? And in that freedom, the light of the divine. Brilliant and colourful, we will spread this light to all."
 U39_3_5_the_twilight_approach_title: "The Twilight Approach"
 U39_3_5_the_twilight_approach_desc: "From the Tenets of those in Uesrennu who first spied Nayiru’s light through the cracks of intolerable servitude, we understand that the coming of the Dawn will be one of violence and upheaval, chaos in its rawest, most destructive form. And lo, just as we have proved Dawn’s mercy, Dawn’s promise, Dawn’s justice, so too have we proved its fury.\n\nNow, the North shall know it too. If we must, then the blinding rays of the Oren Nayiru shall rend the continent asunder! Be warned, colonial-slavers and oath-binding lords – the twilight of your Cycle approaches!"
 U39_3_7_against_all_tyrants_title: "Against All Tyrants"
 U39_3_7_against_all_tyrants_desc: "Aelantir is nearly ours. Our forces advance on all fronts, and everywhere the Interlopers are driven out. But in Cannor, they wash their hands of their crimes, eager to begin a new chapter of insular tyranny. They think they can escape our wrath. They think they can escape Dawn’s justice. They are wrong.\n\nThe Oren Neraghul have put together a plan, incredible in its scope, irresistible in its goal! Damn the unsteady foundations, the strategic complications– from shadows, we will strike, and the courts of the colonisers will know fear! From shadows, we will rise, and every tyrant in the world will know that their day is done!"
 U39_3_8_terminus_title: "Terminus"
 U39_3_8_terminus_desc: "Can you feel it in your bones? The Faith tires. Once, there was a dream… the Oren Nayiru would simply sweep over the world, as day conquers night, the terminal-line moving unchallenged, unbowed. And yet, the challenges mount. The faith bows.\n\nBut still, our work lies unfinished, does it not? Only half the world has been liberated! Cannor, Bulwar, Haless… how many tyrants, how many slavers, how many Interlopers have gone unpunished? We must push onwards. No matter the cost, no matter the price, Dawn must come!\n\nThe obvious question lies unspoken, of course: what if the price of victory is Dawn itself?\n\nPerhaps it is time to ask."
 U39_3_9_the_sabre_of_dawn_title: "The Sabre of Dawn"
 U39_3_9_the_sabre_of_dawn_desc: "The Vaikaranayiru project was drawn up by a group of High Kavalali long ago, though it was then quickly disregarded – why erect a tower for defending Aelantir, when Orenvalyam was always on the offensive? When Orenvalyam’s enemies in Cannor and elsewhere would soon be fighting on their home territory?\n\nAnd yet, we now know this is folly. The cradle of Dawn must forever be defended… and for that purpose, we shall establish a colossal ritual matrix through which our mages can channel the power of Nayiru himself– the concentrated power of the sun, bearing down upon our enemies! At the isle the Cannorians called Verten, we shall build this weapon’s heart."
 U39_3_10_apocalypse_nigh_title: "Apocalypse Nigh"
 U39_3_10_apocalypse_nigh_desc: "Do you hear that?\n\nIt is the singing of the birds, the playing of the children. The busy hum of a land in blissful peace. It is the prayer, not of desperate intercession, but of pious gratitude. It is the hymn of an end, and of a beginning.\n\nThrough righteous liberation, through technicolour prosperity, through chaotic diversity, the end of the world-that-was draws near. And when it arrives, Aelantir will know at last what Dawn means."
 U39_3_9_the_apocalypse_title: "The Apocalypse"
 U39_3_9_the_apocalypse_desc: "Do you hear that?\n\nIt is the flame – it is the fury. The metallic roar of ancient power. It is pact – it is penance.\n\nIn wrought-iron, in rage, in ruin, the end of the world draws near. And when it arrives, Halcann will know at last what vengeance means."
 U39_3_10_dawn_title: "Dawn"
 U39_3_10_dawn_desc: "For Restitution. For Retribution. For Renewal.\n\nWalk like the Apocalypse. Bring Light to Dark. Finish what was started."
 
 U39_4_1_pray_for_day_war_for_dawn_title: "Pray for Day, War for Dawn"
 U39_4_1_pray_for_day_war_for_dawn_desc: "When you see a slaver going about his ‘business’, or you see an Interloper desecrating your land, it is natural to be overcome with righteous fury – but not all channel that fury in the same way. Some prefer to call on Nayiru for the quick coming of the Dawn as they gaze down on the Darkness from their hill-top monasteries. Others draw the sword, and do his work themselves.\n\nMaybe there is place for mercy – but it is not here, and it is not now. The Cycle of Dawn will be born in a great war of blood and fire, first against Ameion, and then the world. We will be the instrument of the Apocalypse.\n\nAfter all, we can’t expect Nayiru to do all the work."
 U39_4_2_kheion_litea_kavalal_title: "Kheion, Litea, & Kavalal"
 U39_4_2_kheion_litea_kavalal_desc: "As Orenvalyam has advanced west, we have received our first true Kheionai converts – even if they are not very orthodox. Instead of worshipping Nayiru as a god, they instead seem to be framing him and his ideals as some sort of overriding philosophical concept – not a figure of worship, but a framework for the world and all in it. A guide, one by which politics, philosophy and society may be organised.\n\nWith this new interpretation comes a new perspective – and new illumination. In the Kavalakuttam’s constitution, the Kheionai do not see the foundation of a mighty and powerful state… they see no foundation at all. Perhaps, after Devand is consolidated, it is time to pay attention to the issues that may arise from these implications?"
 U39_4_3_prisoners_no_longer_title: "Prisoners No Longer"
 U39_4_3_prisoners_no_longer_desc: "We marched west with hate in our hearts. The Kheionai had come to our shores, scorned our faith, imposed their order on us in the guise of ‘civilisation’, and tried to tear down our culture – how could we not? And yet, the further we went, the more we were forced to understand: the Kheionai are a people like any others. Tyrants stand above; the oppressed masses lie below and dream of liberation.\n\nAnd so, we come to Alecand. Here lie the great prison-cities, built by the malevolent masters of the old Cycle. It is time to break the chains of our great foes and bring them into the fold once and for all."
 U39_4_4_warded_against_ruin_title: "Warded Against Ruin"
 U39_4_4_warded_against_ruin_desc: "Despite the depths of their depravity, our Precursor ancestors certainly did know how to make things which last. For a millennium and more, the Kheions have stood tall against Ruin, Kaydhano, and crisis. In that time, they guarded tyranny, inequality, slavery – and yet they also cultivated a proud culture of philosophers and artists, rich in achievement.\n\nNo wonder the Kheionai took to the Monasticists. In their unbreakable bastions, they have eternity to improve themselves – and engage in the debates they so love. We could certainly learn a thing or two from this growing “philomonosophist” movement – if we can bear to suffer through their lectures, of course."
 U39_4_5_the_definition_of_necessity_title: "The Definition of Necessity"
 U39_4_5_the_definition_of_necessity_desc: "The criminal shadows of a dread civilisation, turned to the whims of first mage-slavers, and now colonisers and techno-warlords, and now destined to be cast aside for good; an evil tool used for righteous deeds, for justified killing and the exactment of vengeance, to be wielded without fear so long as they are wielded in the name and goal of Nayiru; open questions, around whom the judgement of necessity is to be poked and prodded the same way that an artificer would prod the item itself.\n\nTo the myriad perspectives of Orenvalyam, the relics of the Precursors cast myriad shadows, some jagged and frightening, others mighty and tempting. Total consensus may never be reached… but it is the duty of the Kavalakuttam to channel debate into action. Perhaps, for however a short time, they may carve one of these shadows from the wall, and channel the definition of necessity itself?"
 U39_4_6_the_solar_hexarchy_title: "The Solar Hexarchy"
 U39_4_6_the_solar_hexarchy_desc: "The smallfolk Interlopers of Harafe had such big ideas. Equality amongst themselves – but where are the Kooras? Power through artificery – but at what cost? Unravelling the unknown, questioning the nature of the world in which we live – but what questions have they asked about their own condition, their own actions?\n\nWe are not afraid to ask those questions; to judge the cost, to make right the position of the Ruinborn. If at one time the Triarchy believed themselves the crucible of innovation in an Aelantir of colonisation and “adventure”, then our new Hexarchy shall be the crucible of innovation in the New Aelantir – in Dawn’s Aelantir."
 U39_4_7_an_elemental_force_title: "An Elemental Force"
 U39_4_7_an_elemental_force_desc: "The experience of the Haraf'ne and Eordan ruinborn with elemental energy and extraplanar beings has challenged Orenvalyam's previous ideas about the conjuration magic that may summon them. In Taychend, it has long been seen as an evil art, most infamously used by the Cennayakuta to oppress the slaves - in the climactic final years of the Death Throes of Gophira, the lover-tyrants Ulwathi & Lanahasha used the arts to conduct one of the largest mass sacrifices ever seen on Halann.\n\nBut in Haraf, and now Eordand, the advance guard of Dawn has encountered undeniable proof that the energies of other planes can be used not just for evil, but good. This shakes the Paradigm at a fundamental level… but when challenged, the faith does not break, it bends. We must investigate, and deliberate, and decide."
 U39_4_8_metal_bodies_kindred_spirits_title: "Metal Bodies, Kindred Spirits"
 U39_4_8_metal_bodies_kindred_spirits_desc: "It is said that the southern Slaver-Nobles were, as their name suggests, the only Precursor Elves to engage in slavery. That, however, is not exactly true – for on the continent of Insyaa, which the Precursors tore apart through their vile experiments, they attempted to create slaves of a different sort: the Mechanim.\n\nThe discovery of these people – living, moving relics – has reinvigorated Orenvalyam’s opposition to the use of Precursor artefacts and towards artificery. After all, look what they did with their capturing, enslaving magic! Look what artificers could do too, if they were left unchecked! But the question remains… what about the Mechanim themselves? Can they know our united Aelantir as more than the descendants of their creator-enslavers?"
 U39_4_9_justices_long_shadow_title: "Justice's Long Shadow"
 U39_4_9_justices_long_shadow_desc: "The grim aftermath of the Dovesday Massacre led many in the Oren Neraghul and Kavalakuttam to question the faith’s attitude to the lands outside it, and the enemies of Dawn. Now, with mass conquest overseas halted, it is time to re-evaluate our relationship and the Oren Neraghul’s role.\n\nShould they turn their blades inwards, defending Orenvalyam while interfacing with new allies and partners overseas, beacon-heroes of hope, not of vengeance? Or should they keep their blades facing out, a constant threat to the tyrants and slavers of the world, righteous hunters wielding the sword of Dawn?\n\nWe must choose carefully. This will have ramifications far beyond just the shadow-heroes themselves: our relationship with the outside world is in question."
 
 U39_5_1_the_cradle_of_freedom_title: "The Cradle of Freedom"
 U39_5_1_the_cradle_of_freedom_desc: "Even in Taychend, the slaves spoke his name in hushed tones, the legend of liberation kept alive by its evocation: Munakles, bearer of the Green-Flamed Sword.\n\nBut in the west, his name and blade were no legend – among the Chendhyans, the flame of freedom roared across the steppe, the jaguar-riders of the plains sometimes bringing the inferno east in full-force. How can we call any of the children of Munakles anything other than brother-peoples?\n\nTo make war on them would be a travesty. Instead, let us bring them into the fold, and turn their fury outwards once more."
 U39_5_3_liberators_not_interlopers_title: "Liberators, Not Interlopers"
 U39_5_3_liberators_not_interlopers_desc: "As the Oren Nayiru integrate the centralised communities of the Devandic peoples, we find ourselves skirmishing with peoples who see us exactly as we once saw the Interlopers – Ameion, Rezankand, the Cannorians. But we are different – we must be. Every effort must be expended to bring these people into Nayiru’s light, without tyranny or servitude-by-another-name.\n\nThere are doubts that such a thing is even possible… but Nayiru would not have given us this mission were it not. We must trust in ourselves – Aelantir awaits our arrival."
 U39_5_4_in_their_own_way_title: "In their Own Way"
 U39_5_4_in_their_own_way_desc: "Like us, the Amadians too have been ravaged by Interlopers. Centuries ago the Kheionai landed on their shores, seizing a wealth of silver and damestear, though far more destructive has been the arrival of the Cannorians. The native peoples of the region have been pushed entirely out of many parts of their homeland, as the Cannorians justify atrocity by the ‘dangers of Amadian wild magic’.\n\nA thin excuse, and one we will shatter. The time to liberate Amadia has come – and we will not ignore the Amadians’ gifts while we do so. This time, they will gain their freedom in their own way."
 U39_5_6_the_chaotic_good_title: "The Chaotic Good"
 U39_5_6_the_chaotic_good_desc: "And yet, “their own way” is never so simple. We came to Amadia intent on liberating the native Amadians from Cannorian subjugation, and uplifting them and their culture, celebrating the chaotic fury of Wild Magic. Yet as we have learnt more of Amadian history and attitudes and raised Kavalali from each of the region’s cultures, we have discovered that like our own faith, they differ greatly on their approach to that chaotic substance which has for so long dominated their lives.\n\nSo, the time has come to take a step back, and let our new brothers in the faith decide for themselves their future. We wouldn’t have the right to do otherwise now, would we?"
 U39_5_8_the_new_paradigm_title: "The New Paradigm"
 U39_5_8_the_new_paradigm_desc: "It has taken generations for the Taychendi to lose this debate. For so long, they ignored the groan when they brought up their experiences of the Slaver-Nobles as if they were present throughout all Aelantir, disregarded the demonstrations in Eordand and Haraf of how magics thought immoral could be used for good and prosperity.\n\nBut Orenvalyam is not a Taychendi state – and so, the Oren Nayiru can ignore and disregard this no longer. As Eordan and Amadian and Haraf’ne and Boek attain ever more vital roles in the Kavalakuttam, they have finally elucidated the truth: the Taychendi way of thinking has simply been disproven. We need a New Paradigm, a new understanding of magic drawn from all Ruinborn. Only then can Orenvalyam truly be said to have united Aelantir."
 
 #Events
 orenvalyam_events.0.t: "The Rise of Silverspite"
 orenvalyam_events.0.d: "The High Kavalali eyed the armoured elf warily as he stood in judgement before them. Elrandar Silverspite, born to a Taychendi mother and a Sun Elven father, had risen up quickly through the ranks of the Oren Nayiru, fought for the cause well, and given much in service to it. It was said he had a great mind, for tactics and strategy – but all in the chamber knew what had truly propelled him to greatness.\nElrandar Silverspite wore the Armour of Yodhan. A suit of hulking, blackened armour, it was a menacing sight, with harsh lines and jagged edges. Black-iron scales, interwoven with steel-like plate, heaved alongside Silverspite’s breathing. The Warlord-Emperor Yodhan had wore this armour, 1500 years ago, and used its strength and durability and command over gravity itself to conquer all of Taychend. It was said its wielder could fly through the air as fast as one could fall, turn themselves into spinning, bladed hurricanes of destruction, annihilate entire battlelines with a single devastating charge.\nThough It was said the suit was powered by a dragon’s soul, a far more compelling explanation was that the armour was actually the body of a dragon, its shapeshifting abilities manipulated into plate and scale. Silverspite was clad in Sedamurax, the Iron Maw.\nHe was power incarnate – and he had certainly found his purpose, fighting for the Oren Nayiru. But there were problems, challenges with his ascent. Firstly, he held some vague but evident hatred for the Exemplars, caused by his relationship with his father – there were some in the Oren Nayiru who held the Sun Elves in some regard. Secondly, there were fears that to appoint him as Kamrayakval would be to essentially hand over the entire Oren Nayiru faith to one elf. Thirdly – perhaps most importantly… there were whispers, rumours, conjecture by scholars and contemporaries. They say that the dragon that composed the Armour of Yodhan was not dead, nor dormant, nor docile. They said it made one mad. That Yodhan’s Sickness was not an affliction purely of his character, but that he was poisoned by the very thing that empowered him.\nBut there were his supporters too – those who said Silverspite could give the faith the determined direction, focus and strength it needed to truly fulfil Nayiru’s desires. And, of course, his personal power. To say it was immense would be an understatement – he could likely kill everyone in the room should he decide to turn against them. He wouldn’t be so bold as to do so now, should they reject him – after all, he would still need a faith to rule over. But if the High Kavalali reject him, the masses of the faithful may not."
 orenvalyam_events.0.a: "Crown Silverspite as Kamrayakval"
 orenvalyam_events.0.b: "Reject Him"
 
 orenvalyam_events.1.t: "Orenvalyam Set Up Event - orenvalyam_events.1"
 orenvalyam_events.1.d: "§BYou shouldn't be seeing this, if you are, please report it to your nearest discord thread titled "(Content) Oren Nayiru and Kamrayakval's War§!"
 orenvalyam_events.1.a: "Oh"
 
 orenvalyam_events.2.t: "The Silverspite Company"
 orenvalyam_events.2.d: "Silverspite felt a surge of pride as he watched his old mercenary company arrayed before him. They were an eclectic mix, he had to admit, but diversity was one of their strengths. Beside him stood his closest officers – the Damerian adventurer Lianne; the Orcish twins, Orthog and Mogru, escaped slaves both; the Violetblood scion Andrellaran; Hackett, the Gnomish tinkerer; the thunderous Dhalikar – and, of course, the Exemplar turncloak, his second in command, his Velara. In the ranks he could see people from across Taychend, Andeios, South Aelantir and beyond. Exiles and adventurers and soldiers of fortune.\nHe had built them from nothing – a small band of adventurers that grew into a force to be reckoned with, and then the advance guard of his united Orenvalyam. With his position of the Kamrayakval came resources he’d never had available to him before – a good amount of them had gone into improving his company’s weapons and armour. While he soared through the air, they would be his sword on the ground.\nSilverspite turned to his second-in-command, Velara. She had founded the company with him – he trusted her more than any other. “Are we ready to march?”\nThe Sun Elven woman nodded, looking over a bunch of papers in her hand. “Our men have settled into their new equipment well, and we’ve got enough supplies to last us a very long one indeed. We’re as ready as we’ll ever be, El.” Silverspite raised an eyebrow at the use of his old nickname – Velara blushed at her mistake. “I– I mean Kamrayakval, my… uh… my lord. Apologies.”\nSilverspite sighed, though he couldn’t stop a smirk creeping up at the corner of his lips. “Don’t bother. El works just fine.” Her, of all people, didn’t need to call him “my lord”. She didn’t believe in the Oren Nayiru anyway – most of those assembled before him didn’t. They were loyal to him alone – and that served him just fine. They would follow him into the infernal planes themselves, if he ordered it. A part of him told himself that he may have done exactly that."
 orenvalyam_events.2.a: "A useful weapon in the fight to come"

 orenvalyam_events.10.t: "A Kavalal’s Guide to Theo-Democracy"
 orenvalyam_events.10.desc: "“The Kavalakuttam, the heart of Orenvalyam’s Theocratic Democracy, is quite complicated. Why? It is DIVIDED! Three factions dominate the body, and are associated with a relevant estate – the Monasticists, associated with the Burghers Estate, the Kavalalists, associated with the Clergy Estate, and the Kamrayakvalists, associated with the Nobles Estate. In Orenvalyam, Parliamentary Seats are only moved by the loyalty of these Estates – except in truly exceptional circumstances, you cannot bribe Parliament Seats! Instead, you must build up enough Backing Chance to sway seats and win votes, with each Ambivalent estate (30% to 59% loyalty, marked as yellow in the Estates tab) providing +15% Backing Chance, or Loyal (>60% loyalty, marked as green in the Estates tab) providing +30% Backing Chance. Don’t worry – Backing Chance is additive!\n\nFor most votes, you will only need to secure around 45% backing chance to guarantee a victory. However, should you receive the votes of a supermajority of seats in Parliament, the vote will auto-complete, giving you a free vote, and halving the time it takes to gain a bonus from Parliament! Whether an Estate is Loyal, Neutral or Ambivalent also affects which Parliamentary Issues you have access to in Parliament.\n\nThere are tools to help you manage Estate Loyalty. The Estate of your Ruler and Heir gives you +10% Loyalty Equilibrium with those Estates (which can stack!) – the Estate of your Ruler is especially important, as you will have double the backing chance when trying to pass Issues belonging to your Ruler’s faction! Furthermore, Oren Nayiru Church Aspects are also assigned an associated faction – choosing one of them, and swapping them out, will give you a temporary boost in Estate Loyalty! There may also be some special issues available to help you manage unruly Estates… or unruly Rulers.\n\nNow armed with this knowledge, I am sure you can conquer Aelantir while staying true to the faith’s ideals! Good luck!” – A Kavalal’s Guide to Theo-Democracy, pg. 1/1 (Abridged Version)."
 orenvalyam_events.10.a: "Um… thank you, suspiciously knowledgeable Kavalal…?"

 orenvalyam_events.11.t: "The Dumruktams"
 orenvalyam_events.11.desc: "Since the days of the famous lover-warlords Elashok and Elajith, the Gold and the Violet, the Dumruktam Dynasty that descends from them have been "enlightened" rulers of Sthanan ith Vussam, their name synonymous with culture, righteousness, mercy. Good things indeed, despite their position as warlords and their inability and unwillingness to stamp out slavery. Instead, the diarchy focused on fighting bandits and cultivating the arts.\n\nWhen Orenvalyam rose, the Dumruktams went into hiding, fearing reprisal not from the denizens of their own city but the many-faced armies of Dawn, teeming as they were with those who would seek to right the wrongs of the dynasty’s past in the only way they deem fit. Still, in the shadows the Dumruktams have come to earnestly admire our faith, and they have emerged from hiding to plead for induction into the ranks of the Kavalali, that they might help guide their ancestral city once more.\n\nTheir influence and notoriety will probably continue to dominate Sthanan ith Vussam if we accept their request. But, if they are kept in rigorous check by the other Kavalali, and they are not the only Kavalali in Sthanan, can they really be called tyrants then? Is any sort of hereditary transfer of power tyranny?"
 orenvalyam_events.11.a: "They have served Taychend before, and they may do so again!"
 orenvalyam_events.11.b: "Deny their request – but they can do what they will, as private citizens."
 orenvalyam_events.11.c: "Really? “No, it’s ok, we only did a LITTLE slavery”? Destroy them!"

 orenvalyam_events.12.t: "The Mudaliars"
 orenvalyam_events.12.desc: "The Mudaliars are an ancient family, one of the only known to be directly descended from Precursor nobility. Since Liandarha struck down the Slaver-Nobles of old Aercel and liberated those within Nanru Nakar, they have had an iron grip on the hearts of the great city’s people – and yet, as the years went by, and their power, prestige and prosperity grew beyond imagining, the Mudaliars became just like any other warlords. Nanru Nakar filled with slaves, while the Kings within the towering Vanetavanem palace ruled tyrant-like over the upper Kalavend.\n\nWhen Nanru Nakar came under our control, the Mudaliars did what they have done many times through the city’s history – they fled. Not to the foothills, or overseas, but down into the vast Nakari underground. However, the remnants of their influence can still be felt throughout the city, revered as they are by those Nakari who are not descended from slaves. \n\nThese fleeing Mudaliars have changed themselves, however. Harkening back to Liandarha’s original chain-breaking feats, some of their own have adopted the Oren Nayiru faith, and desire to be named Kavalali so they can lead their city once more. If their request is accepted, they will almost certainly become the most conservative of the Kavalalists – so conservative that one may doubt they are truly “faithful” at all."
 orenvalyam_events.12.a: "Their wise rule – confined, as they once confined others – is welcome."
 orenvalyam_events.12.b: "We will not burn the Nakari’s history away, but they cannot hold power."
 orenvalyam_events.12.c: "The taint of tyranny must be scoured from Nanru Nakar, root and branch!"

 orenvalyam_events.13.t: "Key Debate: Fate of the Heralds"
 orenvalyam_events.13.descSilverspite: "Elrandar Silverspite – dragon-armoured – found the elf in a side-room of the Kavalakuttam, clad in gleaming pale-gold, engraved with arcane script. He’d thought he’d be preparing for his speech, before the vote on the future of the Jaherian Exemplars. Instead, Ecaris Ecarizuir, Herald of Example, companion of Corin, was meditating silently, his Wishblade Dazinkion laid across his lap. Silverspite called, curtly: “Interloper!”\n\nEcaris opened his eyes – chuckled, softly. “I did not expect to see you, Kalinzuir.”\n\nSilverspite’s fists clenched, knuckles white. “That’s not my name,” he snarled.\n\n“Then what should I call you? You deny the Exemplars’ influence everywhere you see it. In your faith, in your history… in your name. But it’s there. I won’t let you forget it.”\n\nThe Kamrayakval found himself trembling– not nerves, but a rising rage. He fought it. “Right. Because that would be so easy…” And failed. “You think I’d forget the sound of my mother’s screams? The walls of my hiding place crowding in… the heat through the iron, the jeers of that mob shaking the steel– you think I’d forget how I prayed for you–? How the Exemplars did not answer?! How your false-Dawn turned to ash, and I had to sift through it to find her corpse?!”\n\nThe Herald grimaced – but his eyes still burnt with that self-righteous fire. “And how many have you forced to do the same? How many will you fail? I can see it through that visor, Kalinzuir. The Dark’s iron-claw tightens its grip around your heart – and one day, it will pull you into the abyss. I can’t let that happen.”\n\nA pause, as the two squared off – then realization, and the Kamrayakval cut through it. “But it’s not up to you, is it? That sword couldn’t save Taychend, or Bulwar, or Corin, or Rezankand, and it can’t save you. The Exemplars are irrelevant, doomed, useless… a whisper on the wind, ready to blow away. Whether that vote goes your way or doesn’t… the Oren Nayiru are all that matter now.” The Kamrayakval turned, stepped towards the door – glanced back. “I believe in the Kavalakuttam – I won’t influence its decision. It’s up to you to save your people. Try not to fail at that too.”"
 orenvalyam_events.13.descElse: "Ecaris Ecarizuir stood before the Kavalakuttam, clad in pale gold – he calmed his nerves, took a deep breath. Tried not to make the mistake Corin had at at Elynaile. “When we came here,” he paused deliberately, counted to three. “...… we saw a desolate land, shattered by centuries of strife. We knew our duty, our purpose. We took steps not everyone here agrees with, but we fought for what we – what so many of you! – believe is right! An end to slavery. Justice and order!”\n\nOne of the Kamrayakvalists interrupted. “And the obliteration of our culture! Our traditions!” A  furor of support and calls for silence. “You were INTERLOPERS!” He cried. The Herald grimaced; it was not time to mince words. “What does it matter?!” He called. “So what?! If I see a starving child on the street, must he be of my blood to take him to temple? If I see a broken land, must it be the land of my birth for me to try and heal it?! I can’t deny that it was with Bulwari arms and doctrine that my order tried to save your people – yet how many Taychendi took up those arms? In the truth of Surael is a truth universal! Why should I apologize for acting upon that truth, for trying to teach others that truth? Is that not what you do, with Nayiru’s teachings?”\n\n“Indeed it is!” called a Monasticist, standing from his bench. “And yet, you should STILL apologize, because it was wrong when you did it, and it is wrong when WE do it!” Ecaris noted the groans across the chamber, even from the Monasticist’s own benches. “Your Order goes against everything we should stand for! Interfering where you are not wanted, harnessing slavery’s relics with that sun-plate of yours– blasting past any native disagreement by pointing to any lone scrap of support! FORCING people to conform to your path! And if you are not amongst the faithful, and you are not native to this land, and you are intent on your errant ways, I say get off this continent!”\n\nThere! An opening! “And so you’d EXPEL us by force too?!” Ecaris called. The Monasticist shot back a “you came here by force!”, but the Kavalalists now jeered him quiet. Ecaris pushed through the reprieve: “By Surael, the fate of my people is at stake! YES we have made mistakes, YES we have differed – but if you hold any true belief in your ‘chaotic form of Light’, then you will know that to err is natural, and to DIFFER IS IN YOUR DAWN’S BLOOD!”"
 orenvalyam_events.13.a: "The Kavalakuttam decided to integrate the Exemplars into government."
 orenvalyam_events.13.b: "The Kavalakuttam decided to tolerate the Exemplars – at arms length."
 orenvalyam_events.13.c: "The Kavalakuttam decided to and expel the Exemplars from Aelantir."

 orenvalyam_events.14.t: "Legacy"
 orenvalyam_events.14.descIntegrate: "The mood in the Conclave of Dawn, the Herald-leaders of Rezankand’s myriad holy orders, was grave. That caught Ecaris by surprise, at first. He thought he had won the Exemplar’s influence, a hand in keeping this strange experiment on the righteous path. But some of the other Heralds… they were not so enthused.\n\n“Ecaris,” the Herald of Purification plead, “our issue is not that they have shown grace to us… it is just that we do not believe in the same things as them! I mean, chaos as a good–! As if it were not the theological antithesis of civilisation itself! They are at turns radical and then reluctant– they shift in belief as shadows flee the sun, the endless wittering of a council without end.” The Herald of Law agreed. “And now we are to enact their Kavalakuttam’s inane declarations? Act as an organ of their nebulous and mystical state? Fight for them? Die for them?”\n\nEcaris just sighed. “Do you think I cared about Corin’s faith, or Dominic’s incomprehensible theological theories? Do you think I could not see them as warriors that shared my goal? Worthy of respect?” Purification bit back: “But they do not share our goal!” The Herald of Flame countered: “Hatred for slavery, a longing for just and righteous governance?“ Service tapped a finger of his prosthetic arm on the table. “And what am I to them? A wielder of slavery, because I suffered wounds and decided I could fight more still?”\n\nAnd then Karodir spoke with a monarch’s voice: “Action, over belief. Decision, over doctrine.” The words settled the room. “I’m not even an Exemplar, and I know these words. I believe in them.” Ecaris nodded – looked to Service. “How do you know they would not treat your case kindly?” To Law. “We can take part in their deliberations. We can help steer their state, their laws, their institutions.” To Purification. “Difference IS their doctrine. You think we cannot reinterpret it?” To Flame. “Yes, we share the same enemies.” To Vengeance. “And with their strength, we may yet vanquish them. So yes…”"
 orenvalyam_events.14.descTolerate: "Ecaris Ecarizuir sat back in his chair, looking out past the gardens of Rezankaz to the blue bay beyond. Karodir had a commanding, beautiful view in his apartments up here; Ecaris’ own quarters near the barracks weren’t nearly so spacious. Given how much the old mage was complaining, of course, Ecaris figured the superior view was balanced out well enough by Karodir’s grander troubles.\n\n“And now we’re just– adventurers! Hunting monsters here, dealing with disputes there… outside the coast, they treat us like we’re judges with fancy swords! And don’t get me started on the armour–” Ecaris glanced over, Karodir was practically pouting between sips of his tea. “Back to gilded steel, after all these years. They react to seeing Sun-Plate like they’re getting exorcised! I can’t even mess with a relic without one of their priests breathing down my neck– and–”\n\nEcaris let out a dry laugh. Shook his head. “Karodir… if you don’t like it… tough! This is just how it is now. We argue for what we can get, where we can find it – and thank Surael for their love of arguing… but on a certain level, we gave the Taychendi a choice: the Dark, the Oren Nayiru, or us.” He looked back to the bay – somber, now. “That choice did not go in our favour. Not one bit. Chaos over order…”\n\nHe still doubted it. Often. Whether this “experiment” could really cultivate Light. At any moment, he expected Orenvalyam to collapse in on itself, for the Malevolent Dark’s tendrils to sprout up from the cracks between the cells, Effelai-like. For all their work to amount to nothing.\n\nKarodir gave a dejected sigh, looked out over the bay himself. The two sat in silence for a while, contemplating, reflecting. Eventually, Karodir spoke, in barely a whisper. “...we gave them a choice.” As if he shied from the very question. “Do you think that was a mistake?”"
 orenvalyam_events.14.descVelaraSilverspite: "Velara stood reflexively as Ecaris entered her office. “Herald–” she started, almost forgetting she had turned her cloak long ago. But he dismissed her with a wave. He wasn’t dressed in his usual gleaming Sunplate but an officer’s uniform, neatly cut, and in his hands was Dazinkion, sheathed. Velara couldn’t keep her eyes off it as she sat back down. “What did you wish to discuss…?”\n\nThe Last Companion of Corin stared down, gaze fixed on the blade. “I… want to give you this.” “Herald–” Velara sputtered, standing again, shocked, “Ecaris, you can’t mean–!” “Oh but I do, Exemplar.” “I’m not one– you know I’m not–! That sword is for the Herald of Example, the Order’s leader!” “So it is,” the older elf said, simply. “So it was.” And Velara understood.\n\nEcaris Ecarizuir shook his head, somberly. Bitterly. “Everything has changed.” He looked up, eyes weary, full of sorrow and regret. “Our mission is changing. Our order is changing. And it has left me behind…” A pause, for a moment – then a sudden shift. “I remember you, you know.” Velara felt a tear at the corner of her eye: “I was so young, when we left Elizna.” Ecaris smiled, warmly. “So you were. When I saw you with Kalinzuir, I thought: where did we go so wrong, that some of our finest would desert us?” “That’s not El’s name.” “I know. And I’ve realized that he discarded it because I failed him. Failed all of us. And you haven’t. And you won’t.”\n\nHe offered the blade completely now. “You are the New Example, for a new time, a new faith. I see in your eyes pure and bright what in the mirror I see tarnished, faded.” Velara placed her hands on the scabbard – felt the radiant heat beneath. The power of not just the Wish, but of Surael. “And I know, when Dawn is tested… you will be there. With this weapon, you will not fail as I did.”\n\nShe contemplated for what seemed an age. Eventually, Velara Denazuir looked up, and smiled. “I disagree entirely.” And then she refused. “We don’t need weapons to be heroes. We don’t need to win, to set an example.” Her hands moved to cradle his, that held Dazinkion. “And above all others, you, favourite of Sarnagir, must know…"
 orenvalyam_events.14.descPurgeSilverspite: "Ecaris Ecarizuir raised Dazinkion high, and wrought Dawn’s edge upon the Darkness.\n\nA colossal blade of light erupted from the Wishblade – Orenvalyam’s surging troops cried out, shielded their eyes against the burst of Surael’s power, the sun-that-should-not-be. Then the blade pulled down and across, and cut across the enemy line. Dazinkion’s power simply annihilated most of those it touched, blasted them into ashen-nothing. The rest caught alight. The heat burned them alive.\n\nThere were no survivors. The Herald had slain thousands with a single blow.\n\n“ECARIS!” The cry came from up and behind. Ecaris turned to see Karodir, standing upon the deck of the departing evacuation ship, only now letting falter the great wards he had cast to protect them. “We are LEAVING, brother! Quickly now, join us– before more come!”\n\nHe looked into Karodir’s eyes, then, saw the great sick sorrow of their failure, saw two homes lost, old and new, two burning shores growing distant. He wondered if Karodir could see in Ecaris’ eyes Castonath on fire, a lifeless hero resting on a broken shield. Ecaris could see the old elf’s rage, too – perhaps directed at those who had rejected the ones who would be their saviours. Ecaris need not guess what Karodir saw. He knew he raged at himself.\n\nAelantir had chosen a different saviour, a different hero. Their champion was clad in wrought-iron, shrouded in black-scale as if he wore the Dark as a cloak. And it was Ecaris’ fault, of course. He didn’t know how, why, to what extent. Didn’t know what he’d done to deserve this grim fate… but he still had time to find out. He would not shirk his duty. He had made a vow.\n\n“I’m sorry, my friend,” he said, as he sheathed his blade. “But I still have work to do.”"
 orenvalyam_events.14.descPurgeElse: "“And anyway–” one of the Kavalali asked, exasperated. “Why are we not having this discussion on the chamber floor?!” A groan from another. “We will… in due time! This is just– setting the agenda!” “You say that like it’s a small thing. You know just as well as I do that what winds up on the agenda is half the fight!” “Well, I–“\n\nThe most senior among them – High Kavalal of Macriavolo – cut the junior Kavalal off. “May I remind you all… this meeting concerns the Kavalakuttam’s statement on the departures of the last Dawn Elven exiles. That is all. But yes… our decision will have certain ramifications for future discussion, so let’s come to it honestly. Now… are we going to include the name “Surael” on line five, or not? How much more is there to discuss?! It’s been four hours, for Rasahtal’s sake!”\n\n“Why would we not?! Did the Heralds not inspire our knowledge of Nayiru through that name? Yes they strayed… yes we came to blows… yes, they were expelled from our continent, as was our right, as was their punishment. But still – we cannot just rewrite history. It is in every version of the tenets: His name is Nayiru, his name is Surael also. So it must be.”\n“Alright, great, now you’re both just going to restate your arguments. Fantastic. I love this council.”\n“The entire point of our faith,” the other Kavalal reiterated, again, again, again, “is that it is not a single static thing. Our understanding of Nayiru shifts and changes through argument, through renewing our understanding! When we cut through the Exemplars’ blinding self-righteousness, we saw them for what they were… and understood what we were in relation for them. This is their final great lie. Our Nayiru is not their Surael!”\n\nThe other priest, bright red, opened his mouth to speak - the presiding High Kavalal shot him down with a glare. [Root.Monarch.GetName] He was done going in circles – and his vote was the tie-breaker anyway."
 orenvalyam_events.14.a: "“...I would fight for them. And I would die for them, too”"
 orenvalyam_events.14.b: "Ecaris did not answer."
 orenvalyam_events.14.c: "Ecaris turned away, and marched back into the swirling embers."
 orenvalyam_events.14.d: "“His name is Nayiru, not Surael!”"
 orenvalyam_events.14.e: "“His name is Surael also!”"
 orenvalyam_events.14.f: "“... a tarnished blade may gleam again.”"

 orenvalyam_events.15.t: "Relics of Servitude"
 orenvalyam_events.15.desc: "The High Kavalal watched in stunned silence as the colossal limbs of a dismembered Challúmaton dragon were dragged from the stone tower’s entrance. The process of scouring the now-scorched and derelict Nila Tenvach - the famous ‘Blue House’ - had taken weeks, in many ways more costly than the initial assault. Each new disturbing experiment, devious design or dangerous relic they uncovered was but more proof of the crimes of the Slaver Nobles – and of the follies of repeating them. The priest turned to his colleague, who had been in charge of the effort. “And you are sure this is the last of their… collection?”\n\nThe other High Kavalal nodded, a flick of her wrist carving arcane script onto a nearby scroll. “Here? Yes. This was the most well-guarded of the Uyasmarai’s secrets… in this facility, at least. Perhaps more lie in others. But the spine of the old paradigm is broken.” The Nila Tenvach had been the great inheritor and imitator of the arcane techniques of the Slaver-Nobles, obsessed with unravelling the secrets of their relics and deploying the power of their magics – the enchantment of mind and metal alike most of all.\n\nBut the Oren Nayiru knew the nature of such craft: the relics of the Precursors were above all else the products of slavery, by arcane means or otherwise, of the living or the dead. The High Kavalal looked to the faux-dragon before them – he grimaced as the necromantic energies that once powered it reactivated, and attempted to bind the bone-white frame back together. A nearby exorcist, her counter-magic clamping tight, ensured that didn’t happen.\n\nThings would be different, now. Better. A new age of magic was dawning – one of respect, both for the victims of crimes past, and those who might be claimed by them in future. Maybe relics would need to be used out of necessity… for the people, for the faith. But the Kavalali were not warlords, or Exemplars: the road the Slaver-Nobles once walked was not one the Oren Nayiru would ever follow. The past would stay where it was, buried below the earth, entombed in the ashes of cycles past."
 orenvalyam_events.15.a: "And in the present, Dawn’s Paradigm would be forged."

 orenvalyam_events.16.t: "From Shadows"
 orenvalyam_events.16.desc: "The Governor sank back into his chair, kicking his boots up onto the desk. He poured himself a glass of wine, and tried to ignore the growing unease in his stomach. Mysterious disappearances, ominous warnings, whispers of discontent. He mulled over old enemies, possible culprits, this or that political rival or domestic troublemaker.\n\nThen a voice from the shadows – sharp, venomous, a bomb in the quiet office: “Corruption”, the voice judged. “Murder. Extortion. Exploitation.” The Governor jumped out of his seat, trembling in primal terror. “Tyranny!”\n\n“W-Who is–?!” The Governor remembered the pistol in his desk, rushed to open the draw – gasped when he found it empty. “How?!” A grim chuckle – and then the distinctive point of a sabre, jabbing into his back. The Governor yelped as he twirled around– and a grinning, bearded elf stood tall over him. He tried to scream for his guards – the Taychendi didn’t let him.\n\nA thwack with the butt of the Taychendi’s sword, and the Cannorian was clutching his jaw, tumbling backwards over his desk, crashing to the floor, writhing in pain – the assassin turned him over with his boot, steadied him, then thrust his sabre forwards. “You’re guilty of many crimes, Governor… and unfortunately for you, the bayonets of your soldiers will not save you from answering for them.” The Cannorian paled, his fate finally settling in. “I hear you are a fan of public executions – would you like to be know what that feels like?”\n———\nHalf an hour later, everywhere there was panic and pandemonium. The militia rushed out of their barracks to the square, the source of it, pushed through a crowd of gasping, gossiping onlookers, then joined them, when they laid eyes on it. Their Governor was strung up on the temple gate, terror written on his pallid face, and the bladed sun of the Oren Nayiru carved into his chest.\n\nA message: for while the Oren Neraghul may strike from shadow, the cause they serve – justice, freedom, vengeance – will never be thrust into the dark again."
 orenvalyam_events.16.a: "They say Placidineus wailed as he was dragged through the streets."

 orenvalyam_events.17.t: "The Technicolour Rays of Dawn"
 orenvalyam_events.17.desc: "To Ameion and Rezankand, victory meant order. It meant safe roads and a calm society. It meant discipline in governance – it meant the bringing of “civilisation”. To the Kheionai, this also meant obliteration – of bharbhen law, society, culture. The traditionalist Taychendi would have scoffed at this, of course. To them, victory meant strife and success in equal measure – the raising up of great cities, magnificent artworks, vainglorious heroes… and the tearing down of greater numbers of people. Of course, they would all compete in the same way, for the same Emperor.\n\nBut to Orenvalyam, what is victory? What is Dawn?\n\nThe only possible answer, of course, is that there is no one answer.\n\nIn the Kheions, the Kavalali are elected by the masses, vetted for candidacy by a tribunal of "impartial" religious scholars (read: lawyers wearing different hats). Among the Devandics, the shamans espouse both the myriad paths to Dawn and some of their old ideas – Munazhlan is worshipped as one of Nayiru’s greatest champions. To the Advakhalla, the Kavalali are delegate priests, utterly beholden to their faithful flock in all manners except religious ones. In Sthanan ith Vussam and Nanru Nakar, their High Kavalali – ancient families, adopting new ways – are more like theocratic kings... but not tyrants, kept in rigorous check as they are by both their subjects and fellow Kavalali. In Uesrennu and Rakkabuttai, the most zealous soldiers return home to take the rites by popular acclimation and military experience, and return to lead their troops in the matchlock-and-mage banners that guard Orenvalyam’s advance, each with their own tradition, history, designs and desires.\n\nIn Orenvalyam, the rays of Dawn shine in a million fantastic colours... some dimmer, some brighter, some agreeable, some downright strange, some perfectly sensible, some odd and self-contradictory. But they all shine."
 orenvalyam_events.17.a: "As in chaos, comes true freedom."

 orenvalyam_events.18.t: "The Interloper's Sentence"
 orenvalyam_events.18.desc: "[Root.Monarch.GetName] [Root.Monarch.GetDynasty] called on the final High Kavalal in the columned hall – a hand rose in favour, and the vote was done. The leaders of the faith had gathered in the ruins of Ameion’s great Synkletos, to decide not just the future of the city, but of the continent. The verdict?\n\n“So it is decreed.” The Kamrayakval announced. “The Cycle of Dawn has not yet come… the liberation of the world will come by storm and steel – by the hands of the Oren Nayiru alone. Ameion shall be but the first target of our cleansing flame… and Aelantir shall shudder at our approach.” It was the only outcome, really. This vote was just making it official.\n\nAnd yet, it was not unanimous. “A dark day… an infamous day…” An elderly High Kavalal, first among the Monasticists, rose on shaking legs – though he trembled not from frailty, but righteous indignation. “Do you know, Kamrayakval, the cost of this… game? You see bodies as meat, burnt cities naught but broken brick – but wailing atop each corpse are five kith and kin whom they loved… atop each ruin are five-score who knew its history, and now mourn its loss.  Will these fell deeds bring Dawn? Or will they only invite the scourge of Darkness, first under ash-choked clouds, and then into our hearts?” Most of the High Kavalali simply glared at the old elf, in silent admonishment of what they perceived as cowardice – he didn’t care. “Only Nayiru can bring Dawn. If you think you can emulate him, then you shall be the first to burn under his awesome power. We hold no shame in watching your folly from the shade!”\n\nThere were cries of “traitors!” and “fools!” across the hall. The Kamrayakval merely rose, shook [Root.Monarch.GetHerHis] head. “You worry about the cost. Worry about the coming of Darkness. Worry about our destruction.” [Root.Monarch.GetSheHeCap] gestured at the broken columns. “We stand amidst the ruin of our greatest foe – were we cast into shadow by striking down those who tried to wipe our people out? Did fighting for justice– for vengeance– invite our destruction, or herald our enemies’? Do what you will – we will not stop you…”"
 orenvalyam_events.18.a: "“But we are Taychendi – to shy away from a fight is not our nature!”"

 orenvalyam_events.19.t: "Negotiating Liberty"
 orenvalyam_events.19.desc: "Today, the Kavalakuttam assembled on the plains of the Chendhya.\n\nThere were thousands of Taychendi there, as well as many Devandics from the Guaraddhi – still, even with their soil-and-flame banners dancing in the wind, the assembled leaders of Taychend could not hope to match the display of the Chendhyans. Atop their jaguar mounts they rode at the head of a great delegation with the bearing of an army – proud and equal, in a way they had been to no Taychendi realm before.\n\nThis was not empty rhetoric. The Chendhyans – alongside delegations from the Mteibhar, steel clad, and the Basobhar, dressed in Kheionai cloth – had come to negotiate their new place in the world, their power and their liberty within a new age.\n\nIt would be tough talking. There would be difficult choices, necessary concessions; barring an Intercession from Nayiru or Munakles themselves, not all the Devandics would bow to the results. To those assembling on the steppe, however, the attempt was worth it – who could deny, after all, that the children of Munakles were the friends of freedom? That they had fought for Dawn, even if obscured, at times when no Taychendi had?\n\nThe first day set the tone. After the pleasantries were exchanged, the Chendhyan tribal leaders, the Adezhegs, set forwards their first demand: that the Kavalakuttam would respect their nomadic way of life, and set the title of Adezheg apart from that of Kavalali-priest – likewise, this would mean that High Kavalali would not be needed here. This would not be a deal-breaker if denied – after all, the transition to a priestly role was not such a difficult one for an already pious and strong Chendhyan leader. Still, the Chendhyans were proud of their historical ways of life…"
 orenvalyam_events.19.a: "A natural request, easily accepted!"
 orenvalyam_events.19.b: "The High Kavalali are pillars of the faith - they cannot be dispensed with."

 orenvalyam_events.20.t: "Negotiating Vengeance"
 orenvalyam_events.20.desc: "The High Kavalal of Rakkabuttai shook his head, as indignant as he was incredulous. “I can’t believe we’re even considering this! How long has it been since the Bloodcloaks were dispersed?! How long since the garrison at Kannagarendi was dissolved?! We’ve made peace with the Chendhyans around us – half of this lot have never even met a Yodhanpir of my city!”\n\nA Durasyar delegate, whose ancestors were renowned for fighting the Gophirans, rose alongside his jaguar mount, a staunch and powerful Tydhzegaeda. “On the stones on which you walk, Chendhyan slaves were once carted in bondage! From the stables once rode blood-cloaked riders, terrorizers against our people! Only by returning these places of shame to us may the wrongs of the past be righted!”\n\nMore shouting, and arguing, and debating. The conclave was dominated by discussions of punishment and restitution, of vengeance and reconciliation. In Taychend’s past, many empires had settled the steppe with frontier cities – the great ones, Oremvand, Rakkabuttai, and Kannagarendi (though the latter had fallen far since the Second Gophiran Empire) were, to many, mere reminders of the bloody history of Taychendi-Chendhyan relations. The Kheionai’s Empkeios, too, was targeted, though for now discussion of that city was one of intent, of future retribution.\n\nThings have changed much since the Oren Nayiru arrived in the Guaraddhi. Taychendi and Chendhyan slaves alike have mixed with the old Yodhanpir warriors of Rakkabuttai, and the Thekvrystana merchants of Oremvand – more agreeable in the past, even though to their shame they had still trafficked non-Chendhyan slaves – had made notable efforts to make peace with their immediate Chendhyan neighbours. Do these places deserve to be punished for the fell deeds of their ancestors?"
 orenvalyam_events.20.a: "Well, the Bloodcloaks did commit some truly wicked crimes…"
 orenvalyam_events.20.b: "A petty grudge, no more! They must put aside their enmity for Dawn."

 orenvalyam_events.21.t: "Negotiating Zealotry"
 orenvalyam_events.21.desc: "“And how different are we, really?” The Chendhyan priest asked. “You know that we aren’t slavers. We are the children of Munazhlan– you know we won’t fall to Darkness.” They had sequestered themselves into a side chamber of the conclave, due to the discussion’s sensitivity – still, the debate would not hold here for long: many Chendhyans and Mteibhar were asking for religious autonomy. In essence, to reject Nayiru as a being of worship.\n\n“Honoured Sadaun, surely you understand,” the High Kavalal of Sthanan began. “Nayiru’s word – his role in the world, in the cycles of history, in Dawn– it is what has guided us all. There are many ways of interpreting his nature. We would allow you to pursue them. But, without his guiding frame…” The Taychendi just struggled to comprehend. “I mean, how could we live in Dawn, when you do not? It makes no sense.”\n\n“Maybe to you,” the Chendhyan replied. “The Kheionai can pretend they see Nayiru as some sort of philosophical concept all they want – but we know things of this type can exist unseen. But to raise this being– of great Aed, soul, no doubt – to the role of god? It is just not in our nature.” “And,” his Mteibhar counterpart added, “I know on our part, you say that we can still worship our Nahrei, but surely you know what your request sounds like? You are asking us to raise your god to the same status as our great guide, our protector!”\n\n“What if,” the High Kavalal of Royakottar offered, “Nayiru and Nahrei were the same thing?” The Mteibhar delegate just sputtered a laugh – quickly fading, of course, as he shook his head dismissively, half-astonished.\n\n“I don’t even– you can’t just say that! It’s not some negotiation point! Our understanding of the world is not some sort of incomplete answer, ready and waiting to be filled in by your own! You say you are not ‘Interlopers’ – why, then, do you seem to hold your own conceptions of the world so highly?”"
 orenvalyam_events.21.a: "Why indeed… perhaps it is better to let them believe what they will?"
 orenvalyam_events.21.b: "We just can’t compromise. If Nayiru’s truth is negotiable, what isn’t?"

 orenvalyam_events.22.t: "From Words to Action"
 orenvalyam_events.22.desca: "The Kavalali watched the Chendhyan host recede into the distance. The negotiations were certainly a success – vast swathes of the Chendhyan steppe would now answer to Orenvalyam, the children of Munazhlan standing side by side with the descendants of those against whom he had once rebelled. There was no better sign of the changing time – of the coming Dawn.\n\nOf course, there were those who disagreed: Adezheg chieftains who would go back to their tribes and speak of the Oren Nayiru’s intransigence, how they were just the same old Taychendi empire come again to crush their ancient way of life. They would have to be convinced in time – but there was no better way to convince them than to prove them wrong.\n\nOrenvalyam would not conquer the tribes, would not colonise them. Instead they would bring them into the fold in their time, by their choice. And when the Kheionai or the Exemplars or the Cannorians said thereafter that there was no choice but to bring civilisation to their frontiers by force, Orenvalyam would stand as the proof of the hollowness of their words.\n\nThis was the first test of a principle, and it would be the greatest example. Under Orenvalyam, with the concessions the Kavalakuttam made to them enacted, the Chendhya would prosper. And now, with the Agotham river now open to Taychendi forces, the gateway to Devand and the Cleaved Sea beyond – to the liberation of Andeios – is finally close at hand."
 orenvalyam_events.22.descb: "It was a grim sight, watching the great Chendhyan host recede. The jaguar-riders expected no great invasion – and thank Nayiru and all the lesser gods they didn’t, or else the entire Kavalakuttam might have been cut down on the steppe – but still, they had heard what their supposed brothers had to say, judged them, and found them wanting. The children of Munakles the Liberator, wielder of the Green-Flamed Sword, had rejected the Oren Nayiru.\n\nThere was a general dejection in the crowd – a dour silence, a dark and heavy cloud of disappointment that smothered most there. They had hoped this would be simple. They would come in, elucidate their faith to the western peoples, and the Devandics would welcome them with open arms.\n\nBut the Kavalali were too closed-minded… and, of course, the Kavalakuttam was too stubborn. They just couldn’t compromise.\n\nThe Kamrayakval was just as grim-faced as the rest of them when the High Kavalal of Zaernmaera approached, patting [Root.Monarch.GetHerHim] on the shoulder. “There are still Chendhyans who believe in the faith,” she said. “We just have to bring the others into the fold, and they can be convinced in time.”\n\nEthanan, standing nearby, just chuckled. “A very exemplary way of seeing things, don’t you think?”"
 orenvalyam_events.22.a: "First the Chendhya, next all Andeios."

 orenvalyam_events.23.t: "A Question of Priority"
 orenvalyam_events.23.desc: "The last true meeting of the conclave, entirely unofficial, took place some time after it had actually ended. In a tavern in the nearest city, the High Kavalal of Clemetar took a sip of his Pheni, shrugged at the question posed to him. “Well, we hold the vote in the Kavalakuttam, on whether to undertake an expansion effort first – if it passes, the sub-council is formed… by volunteers alone first, then we whittle the numbers down by voting, if there are too many. I always volunteer… and believe me, there are never too many. Then, in closed discussion, we decide on the area.”\n\nThe Mteibhar and Basobhar delegates who had asked – friends to Orenvalyam, and not afraid to engage in the ‘process’ of Dawn – nodded along to his answer. After, their Mteibhar ringleader asked another question: “And… how much influence do you, personally, have on which target is chosen?”\n\nThe High Kavalal began to understand what the Mteibhar was getting at; smirked, held up a finger. “Steady, now– I will answer your question in three stages. First, you must know I do not take bribes. Second, I have considerable influence over this matter, though it is not absolute. Third… to a Kavalal, an undefeatable argument is just as good as gold. Convince me, and I will convince my colleagues. You will be brought into the fold in no time.”\n\nThe Mteibhar returned the priest’s smile. “Alright then. Do you want it in writing?”\n\n“And save me having to draft a speech?” The High Kavalal toasted his glass. “By all means, be my guest!”"
 orenvalyam_events.23.a: "And what a list it was! Who knew they had so many precious gems?"
 orenvalyam_events.23.b: "…but they are quite the backwater in other ways, aren’t they?"

 orenvalyam_events.24.t: "Key Debate: Questions of Constitution"
 orenvalyam_events.24.desc: "It is a truth not often admitted in the more chauvinistic parts of the Kavalakuttam, but the Kheionai are master debaters. Better than us, in fact. And despite their history of slavery,  inequality, colonisation and exploitation, they know more than any how to build a strong, stable and legally secure civic state. No wonder, then, that as soon as Kheionai Kavalali were admitted to the Kavalakuttam, they blew apart Orenvalyam’s constitutional foundations in an instant: essentially, they claimed that there really weren’t any.\n\nIn many places, this dynamic foundation for our state is not an issue per se – a future vote can simply undo what a prior vote commanded. However, in the realm of regional governance, things are quite different. Because the members of the Kavalakuttam are selected from the Kavalali of defined geographical areas (historical ‘Cells’ and Attemutil communities in Taychend, and a variety of different organisational arrangements elsewhere), should a powerful group gain powers over how these areas are defined and run, that would give them an implicit sort of power over the Kavalali of those areas… and an implicit sort of power over how those Kavalali are selected.\n\nIt would be very difficult for the Kavalali to undo such a change – they could face removal, or censure, both on the chamber floor and outside it. It would permanently advantage whoever first claimed this responsibility.\n\nAnd so, a great debate has emerged. The Monasticists are calling this tyranny by other means, and say that the sanctity and autonomy of Cells and other sorts of regional government must be respected. The Kamrayakvalists and Kavalalists, meanwhile, argue that their leader and the High Kavalali respectively should possess this right, in order to safeguard their position. Whatever is decided, it will likely define Orenvalyam’s politics for centuries to come…"
 orenvalyam_events.24.a: "The Kamrayakval has supremacy over the regional Kavalali!"
 orenvalyam_events.24.b: "The Kamrayakval should stay out of local politics completely."
 orenvalyam_events.24.c: "The High Kavalali must take the reigns of local government."

 orenvalyam_events.25.t: "Key Debate: Souls of the Singing Jungle"
 orenvalyam_events.25.desc: "Much of Orenvalyam followed the Herald’s descriptions of the vast jungle to the north as a manifestation of the Malevolent Dark. The Effe’i Chieftess stood before the Kavalakuttam to give a different perspective.\n\n“I know our Goddess is intimidating… that the Blooming is a dire threat,” she began, “but please, you must understand her– understand us! She only resorts to these measures because of how the outsiders have encroached upon her! You have not travelled through our home, seen the beauty beneath the canopy. It is a rich tapestry, unending in its complexity and brilliance. Yes, the Goddess sends its trials, its terrors… but not without also rewarding us! Invigorating water suddenly springing from the ground, the succulent fruits of the jungle suddenly blooming at your approach! You would slay that which has given us life, and reduce our home to a charred waste like the Desecration!”\n\nEcaris Ecarizuir, also brought in as an expert, had been listening with a muted incredulity. “I can’t believe this… that beast of the Dark may give life, but how many has it taken it from in turn? And my home, the Dry Coast, cultivated and prosperous, a ‘Desecration’!?” The Chieftess shot back: “Your people do not know what was lost!” But Ecaris just scoffed. “Did the Orwai’i not know the Effelai from within? And what about the Dugui’hi, chased from their home by the Effelai’s agents?” “And,” spoke a Kamrayakvalist High Kavalal, in unlikely alliance, “what of the Seedthralls, their corpses quite literally enslaved?”\n\n“And so…?” But a Monasticist, an archmage of renown, now too spoke up. “We burn down this woman’s home, destroy that which is so vital to them, and then…? Her people will hate us, so do we convert them by the sword? Or do you not expect them to survive the process?” The Kamrayakvalist just shrugged: “how else could we break the tyrant-jungle’s hold over them?” The Chieftess cried out, indignant: “We are not Seedthralls! Our Goddess is not a tyrant!” The Monasticist followed: “And perhaps… there may be a way to show this Goddess that she does not rule alone?”"
 orenvalyam_events.25.descElse: "Much of Orenvalyam still followed the Herald’s descriptions of the vast jungle to the north as a manifestation of the Dark. The Effe’i Chieftess stood before the Kavalakuttam to give a different perspective.\n\n“I know our Goddess is intimidating… that the Blooming is a dire threat,” she began, “but please, you must understand her– understand us! She only resorts to these measures because of how the outsiders have encroached upon her! You have not travelled through our home, seen the beauty beneath the canopy. It is a rich tapestry, unending in its complexity and brilliance. Yes, the Goddess sends its trials, its terrors… but not without also rewarding us! Invigorating water suddenly springing from the ground, the succulent fruits of the jungle suddenly blooming at your approach! You would slay that which has given us life, and reduce our home to a charred waste!”\n\nA Kamrayakvalist just shook his head, disbelieving. “I have heard other stories, too– of how the Thavoi’i were constantly tested by the jungle, and the Lai’i sent on withering hunts. What tests have you suffered compared to them?” The Chieftess shot back: “Your people do not know what was lost!” But a Kavalalist now joined in as well. “How could we, when if we tried we’d be torn apart by a jungle beast? And, also, did the Orwai’i not know what they were ‘losing’? Did the Dugui’hi, chased from their home by the Effelai’s agents, not lose themselves?” “And,” added the Kamrayakvalist, “those Seedthralls… have their corpses not also quite literally been enslaved?”\n\n“The plight of the Seedthralls is a terrible one, yes.” But a Monasticist, an archmage of renown, now too spoke up. “But must we then burn down this woman’s home too, destroy that which is so vital to her? And then what? Her people will hate us, so do we convert them by the sword? Or do you not expect them to survive the process?” The Kamrayakvalist just shrugged: “how else could we break the tyrant-jungle’s hold over them?” The Chieftess cried out, indignant: “We are not Seedthralls! Our Goddess is not a tyrant!” The Monasticist followed: “And perhaps… there may be a way to show this Goddess that she does not rule alone?”"
 orenvalyam_events.25.a: "The lives and traditions of the junglefolk must be respected."
 orenvalyam_events.25.b: "Within the eye, you cannot feel the storm. No, the Jungle must be vanquished!"

 orenvalyam_events.27.t: "Chasing Spectres"
 orenvalyam_events.27.desc: "The Ozgar Orc, Khaara, crouched in a line of foliage on the outskirts of the CLSTC plantation house’s trading pens. It was night, but there were still a lot of slavers ahead of her. More slaves. Khaara glanced at Camnata, her mentor – the Taychendi gave her a nod. She was to become a Vairaghul, an elite member of the Oren Neraghul, and this would be her final test. A deep breath, then she drew her axes, stood, and advanced.\n\nThe slavers noticed Khaara’s approach quickly, and attacked, and called more in. Then she was upon them and in between them, hacking, dodging, dancing, a storm of axes and arcane trickery. One diversion of two. Suddenly, the plantation house burst into a roaring conflagration – Khaara smirked as heads turned, and disappeared into invisibility again. Let the slavers think themselves smart for casting aside her “diversion” for the “real attack”. When they’d run off, she went around and broke open the slave pens. Now, Camnata just needed to distract the slavers until the slaves were free.\nBut he didn’t – instead, he fought them, and slaughtered them. Not part of the plan, but Camnata never passed up an opportunity for retribution.\n\nThere was a reason why some accused the Oren Neraghul of being too “flashy”. Once little more than the faith’s internal security, now they chased the spectre of Darkness across Aelantir… and caused damage along the way. She couldn’t help but think of the Greentide – the orcs campaigned with a supposedly righteous cause, and killed millions for it. Yet after the Dookanson fell, their fantasy fell apart. Then, all they had was the destruction and the consequences.\n\n“Vairaghul methods” troubled Khaara, sometimes. If Orenvalyam was halted, reversed, would history look kindly on the Oren Neraghul, who had turned from protectors to destroyers? But could she really shy away from doing what must be done right now, because of some hypothetical future?\n\nAfter they’d guided the freed slaves to a waiting boat on the shore, a blood-spattered Camnata turned to her, beaming, proud. “Your plan was perfect, and you fought bravely. I am honoured to have taught the first orcish Vairaghul.” He offered a hand. “Together, we shall achieve great things.”"
 orenvalyam_events.27.a: "After a moment, Khaara shook Camnata’s hand. “I hope so,” she said."

 orenvalyam_events.28.t: "The Twilight Approach"
 orenvalyam_events.28.desc: "A reticent young Kavalal looked out from the Soruinic shore, at the peaceful waves of the Ruin Sea… and the continent beyond. “There you are!” Came a voice from behind – a significantly more stalwart Kavalal, as Taychendi as he was. “You’re currently missing a meeting, you know!” The Reticent Kavalal glanced behind him, smiled weakly, turned back.\n\n“You know… there are some who say that the Oren Nayiru is… redemptionary.” The Reticent Kavalal said. “I think that’s rubbish. I think that we Taychendi are simply proving a power we always possessed. There have always been slave revolts… a desire for freedom.”\n\nThe Stalwart Kavalal couldn’t help but laugh – his friend always monologued like it was his calling – “Vehasha, Vherenar, yes yes I know. What’s your point?”\n\nThe Reticent Kavalal shrugged: “My favourite story is that of the Battle of the Phenied Cloth. Kadradar Blood-Hand’s forces were unstoppable, and with mists of magic plague he had laid waste to all Andeios. Everyone banded together to defeat him – the warlords and their retinues, of course… but also the commonfolk. The peasants, the bereaved, hundreds of thousands charging forth into certain death, to buy that elite fist enough time to slay the Relic-Lord. Most of them died… but they did enough. Their sacrifice meant something.”\n“And you think,” the Stalwart Kavalal said, trying to guess his point, “that we will not find many of these sorts of battles in the north?”\nThe Reticent Kavalal nodded. “I want that lack of complication… an evil villain to be slain, an oath simply fulfilled. But there is no simplicity, anymore. Perhaps there never was. And perhaps it is not just the Taychendi that cannot claim it, but all people. For those in the north… twilight approaches. But the light dims at dusk as well.”\n\nThe Stalwart Kavalal understood perfectly, now. “Our cause is a just one. A righteous one. You must trust in that.”\nThe Reticent Kavalal shook his head, turned back to his comrade with a somber tone. “How many others have answered the same?”\nAnd the Stalwart Kavalal just smiled, and answered one question with another."
 orenvalyam_events.28.a: "“When twilight approaches, how many others do you think have asked?”"

 orenvalyam_events.29.t: "Vindicator"
 orenvalyam_events.29.desc: "Elrandar Kalinzuir winced as his mother pressed the cold cloth to the cut. “Easy, jaguar,” she said, smiling. “It won’t hurt less than the beating you got!” El just pouted, turned away, let her tend his bruises. Earlier, he’d seen a boy from the village getting picked on for one of his toys. Something expensive. He’d rushed in to save him… and then the bullies had beat the Light out of him, and the boy, and they took the toy anyway. All that pain, and for what?\n\nHis mother sighed. “I know you’re kicking yourself over this…” she chuckled at El’s somehow even harder pout. r. “Why shouldn’t I?!” He bit back. “Because I’m proud of you anyway.” That silenced him for good. “Even if you should learn how to punch better.” Another wince, as she tended to a big purple patch on his arm. “You can’t win all the time, you know. Sometimes things just don’t turn out your way. But you’ve got to pick yourself up, and fight on. Never compromise your ideals. That’s what a hero does– that’s what your father is doing!” “I know…” But El still didn’t understand: “It’s just– what’s the point of fighting on if… if nothing’s changed?”\n\nHis mother just shrugged. "I bet those two bullies feel great, with their shiny new toy. They won't feel so great when I come round with my soldiers, and make them give it back. Sometimes, your means prevent your ends. What are they left with, now? A few beaten kids, and no toy. You might think you got nothing by fighting… that nothing changed… but that's wrong. You got that boy's respect. And mine, too. And the world will care. That’s the point."\n———\nElrandar Silverspite opened his eyes – basked in the glow of the sun rising over the Soruinic shore. That memory pained him more than most. He’d seen those same bullies two months later, in the mob that had murdered his mother. He knew she would hate what he’d become; that everything he had done in the name of avenging her death would have shattered her respect. That he was no hero, just a dragon, burning the world for Dawn.\n\nBut with all South Aelantir secured? Slavery annihilated across half the continent? The Interlopers routed? How could you argue against that? How could you stand and deny Dawn’s awesome power? Elrandar was sure of it now. Orenvalyam would liberate the world. Dawn had triumphed. He had won.\n" # that \n is needed to make it not overflow
 orenvalyam_events.29.a: "And when all is said and done, that is all that truly matters."

 orenvalyam_events.30.t: "Key Debate: Fate of the Colonisers"
 orenvalyam_events.30.desc: "From the 1500s onwards, Aelantir’s native elves were expelled, eradicated and exploited. But so much land has been lost that now Cannorian settlers long divorced from the crimes of their ancestors call Aelantir their home. The question of what to do with these peoples has divided the Kavalakuttam into two broad camps.\n\nThe Reclamation group is comprised of the Kamrayakvalist faction and much of the Kavalalists. They argue that we should make a determined effort to resettle the displaced Ruinborn, and give them their lost lands wherever possible. Not to do so would simply be rewarding the Cannorians for displacement and colonisation, after all, and would ensure that in places like Noruin, Harafe or the Epednar Expanse the natives would forevermore be in an inferior position to those who invaded them.\n\n[Root.U39ExemplarsIntegrated]\n\nOf course, there are nuances – the Kavalalists would say that we would simply not touch them, or we would move them to another part of Aelantir, the once-uninhabited islands, perhaps. The Monasticists retort that this would place millions of free souls at the Kavalakuttam’s mercy (and, through the weight of its power, Taychend’s mercy), and in so doing subjugate them.[Root.U39SilverspiteLeaderYes]"
 U39ExemplarsIntegratedYes: "The Reshaping group, on the other hand, is comprised of Monasticists and the Kavalalists closely aligned with the Exemplars, who of course are descended from outsiders who “migrated” to Aelantir. This group argues that the process of land reclamation would in fact simply repeat the Cannorians’ crimes in reverse. What does past injustice matter to a human child as they and their family are expelled from their home? And where would the Zanlibi or Corinsfielder who had fled persecution in their old homeland go?"
 U39ExemplarsIntegratedNo: "The Reshaping group, on the other hand, is comprised mostly of Monasticists. Many of them do not even want to be up here in North Aelantir – but even so, they argue that the process of land reclamation would in fact simply repeat the Cannorians’ crimes in reverse. What does past injustice matter to a human child as they and their family are expelled from their home? And where would the Zanlibi or Corinsfielder who had fled persecution in their old homeland go?"
 U39SilverspiteLeaderYes: "\n\nAnd of course, there are those who reject that nuance. Those who say that their crimes far outweigh any “mitigating circumstances” – as if one could even think such a thing could apply to genocide! To these Kamrayakvalists, the humans must simply be driven away from Aelantir. Root and branch, the legacy of their influence must be burnt out." #<- The enters have to be at the end here not in the main desc
 orenvalyam_events.30.a: "We must encourage resettlement and reclamation wherever possible."
 orenvalyam_events.30.b: "What's done in the past is done, in the future, Dawn will come for all."
 orenvalyam_events.30.c: "Their crimes are unforgivable. They must be driven from Aelantir."

 orenvalyam_events.31.t: "Offer From Valorpoint"
 orenvalyam_events.31.desc: "Seeing Orenvalyam's decision not to expel the Cannorians, Valorpoint have reached out to secure an alliance. They share similar stances with us on slavery, and are generally pro-Ruinborn – in fact, many of them seem to have Boek blood, with their leaders having encouraged intermarriage with the natives. Although many members of both factions initially wanted a more stringent policy against the Cannorians, now that the Kavalakuttam’s policy is set, the Kavalalists very much want to sign, while the Kamrayakvalists are quite interested in the Valorborn’s military strength and zeal.\n\nBut, as some Monasticists have been pointing out, the Exemplars too intermarried with the Ruinborn, and it did not magically remove their Interloper status. Unlike the Ozgar, the Valormen came to colonize Aelantir of their own free will. Could not the efforts to integrate with the Boek be seen as just a method of control? A far cry from free unions, surrounded as the native people were by foreign force.\n\nThe Monasticists already see the campaigns in North Aelantir as a dangerous provocation – to this group of the faction, diluting the faith's ideals by officially sanctioning such behaviour would be a step too far for some."
 orenvalyam_events.31.a: "Accept the offer."
 orenvalyam_events.31.b: "Reject them!"

 orenvalyam_events.32.t: "Moral and Meaning"
 orenvalyam_events.32.desc: "Zuhrah blinked madly as her brother shook her awake – panic setting in, as she registered the sounds of battle around them… and confusion, as she felt the shackles around her ankles click open. “Come, sister!” Mkwayo urged. “There are– are–” He gave an exasperated sigh, pointed to a dark-skinned, big-bearded… elf?! He was standing in the entrance to their cage, brandishing a sabre, glancing over. “We are being rescued! Don’t ask questions! We must go!”\n\nThat was all Zuhrah needed to hear. Mkwayo led her and the others in their cage out, closely following the elf that had freed them – though he hadn’t enough time to untie the shackles around her hands.\n\nZuhrah couldn’t help but look around as they ran. The elves were still fighting the gnolls – had killed half of the slavers, though there seemed only slightly fewer elven bodies around as well. Zuhrah heard the crack of a whip, and her gaze snapped up to the big platform that overlooked their cages. A lance of energy that might be justice surged through her chest, as she beheld an armoured elf dodging the lash, and severing their gnollish overseer’s head in a single flourish of his blade.\n\nSoon enough, they were down in a ditch outside the slaver camp, guarded here by fellow Fangaulans she did not recognise, ready to ferry their own people to freedom. The bearded elf that guided them checked that the group were all accounted for, gave a satisfied nod, then turned away – but Zuhrah rushed up, cried “Wait!” And he turned, brow arched. “Why?! Why are you doing this?!” They were from half a world away, if the stories she remembered her mother telling her were true.\n\nThe elf stared, dumbfounded for a moment, uncomprehending– but a Fangaulan warrior soon translated. The elf laughed, then held the chains around Zuhrah’s wrists aloft. With a single, powerful blow from the hilt of his sabre, he shattered the wrought iron."
 orenvalyam_events.32.a: "“Taychendi!” He said, beating his chest with a hearty grin. “Taychendi!”"

 orenvalyam_events.33.t: "Key Debate: Whims of the Wild"
 orenvalyam_events.33.desc: "The Amadians held their Conclave at Cara Lafquén. Once, this had been the heart of the old Onisqado Federation, had cradled Lake Chakantu in prosperous harmony. But the Onisqado Federation had fallen, torn apart when the whims of Wild Magic coincided with unwise elves, who harnessed it to fight their conflicts and doomed themselves in the process.\n\n[Root.U39QuchamarFaalte]\n\n[Root.U39ChaqanelQuruwei]\n\n[Root.U39ChamullachBanche]\n\nAfter each group had given their argument, the Conclave voted, and made it’s choice."
 U39QuchamarFaalteYes: "That was the crux of the Quchamar and Faalte’s arguments. The former were descended from the Onisqado’s leaders, the latter had traded so much with them. Yes, Wild Magic was a manifestation of chaos, liberty in its purest form, but so was the warlordism of the Taychendi. Yes, the whims of Wild Magic was an intrinsic part of Amadian history and identity – physiology! But that did not mean the Oren Nayiru couldn’t tame and control it! If they didn’t, the brilliance of prismatic light would blind Amadia, and leave them in Darkness."
 U39QuchamarFaalteNo: "That would have been the crux of the Quchamar and Faalte’s argument. But Lake Chakantu’s cities had been crushed by the rush for silver, relics, damestear, and the Faalte’s river stolen for ranching land. They had no Kavalali to attend the meeting, and so their voice went unspoken."
 U39ChamullachBancheYes: "The Baanche, Amadia’s great traders and travellers, and the Challumach, hunters of the cloud jungle, had a more nuanced take. Wild Magic had its place – the Baanche, for one, could use it empower their birdspeech, and the Challumach’s great hero Arapache had attempted to wield it to secure food and land for his people. Yet the Challumach knew Arapache’s cause had shattered just as it swelled, and the Baanche had heard a thousand opinions on Wild Magic in their travels – why prescribe one? Let each keep to their own ideals."
 U39ChamullachBancheNo: "The Baanche and Challumach would now speak for nuance and moderation, for all Amadians to keep their own ways. But the Arapache had been expelled from their clouded home, and the Baanche betrayed, cheated, and decimated by those they thought they had entered into fair contracts with. They had no Kavalali to attend the meeting, and so their voice went unspoken."
 U39ChaqanelQuruweiYes: "The Quruwei, who in their highland home had learned to harness Wild Magic for industry and creation, and the Chaqanel, whose heroes harnessed it first to raid, and then to fight the Cannorians, had a different idea. Wild Magic was not only an intrinsic aspect of Amadian identity, but actually a gift from Dawn, that should be used to the fullest extent – not just by the Amadians, but all Orenvalyam! It could be a weapon, to drive the colonizers back from all Aelantir! It could be a tool, to break open the world’s riches!"
 U39ChaqanelQuruweieNo: "Next, the Quruwei and Chaqanel would have argued that Wild Magic was a gift from Dawn, that ought to be wielded by all Orenvalyam. But the plateau had been colonized for its mineral wealth, and the plains transformed by plantations and fenced-in pastures. They had no Kavalali to attend the meeting, and so their voice went unspoken."
 orenvalyam_events.33.a: "We should aid efforts to manage wild magic."
 orenvalyam_events.33.b: "Amadians who embrace wild magic should be allowed to."
 orenvalyam_events.33.c: "We should embrace wild magic ourselves!"

 orenvalyam_events.34.t: "The True Heirs of Corin"
 orenvalyam_events.34.desc: "The integration of so many Cannorians into Orenvalyam has led to the tales of Corin, their recently ascended war-god, to spread throughout the faithful. While many still look to her worship as having justified countless atrocities and colonial invasions, it is difficult to deny the achievements and righteous qualities of the goddess herself. Through a great act of sacrifice, she slew the tyrannical Dookanson, and through hope and good morals, inspired many to the cause of true justice.\n\nSome Oren Nayiru (mostly of Cannorian origin), calling themselves the KCampurana Corintar, or Sect of the Corintar, are saying that they wish to form a new knightly order of crusaders, not fighting for bloodthirst or base ambition, but for Dawn, which they believe Corin was aligned with. While the Kavalalists support it, the Monasticists warn that they would still be too close to retreading the example of the Exemplars and Istralorians. Instead, they say Corin should be worshipped for her shield, not her sword."
 orenvalyam_events.34.a: "Clad in steel, this new Circle will fight for justice once more!"
 orenvalyam_events.34.b: "Corin’s sword ravaged half of Aelantir. Best leave it in the sheathe."

 orenvalyam_events.35.t: "Day of the Dove"
 orenvalyam_events.35.desc: "In the heart of Anbenncóst, the Empire of Anbennar gathered before the Dove Throne. The Emperor, flanked by Orda Aldresia guards, watched as the Princes filtered in – eyed those who had enriched themselves off of the suffering of others. Glanced up, sometimes, to check if all was well. Eventually, when all had arrived, he stood.\n“I know what you are all concerned about.” He said, with as much a monarch’s voice as he could muster. “The assassinations across our realm and beyond – the chaos in Lorent and the Dragon Coast… but let me reassure all of you – there is nothing to fear!” That was why this meeting had been called, after all. “Because even if we all drop dead tomorrow, WE ALL DESERVE IT!”\n\nSome shock, some concern. Mostly disbelief. The Emperor clenched his fist tight. “Who amongst us, after all, has not abused our power? Wielded the forces of magic to crush dissent?” Laughter. They must have thought he was joking. “Who has not drained the world of it’s resources? Exploited, colonised?” He turned back, to the Dove banner above. But the sorrow in his voice was not a joke – and gradually, the Princes realised. “Where is unity, when we squabble amongst ourselves? Where is equality, when it comes to the orcs and the Ruinborn, brutally subjected…?”\n\nNobody was laughing, anymore. “Madness!” A Prince called. The Emperor chuckled as he turned towards the voice. “Mad? You hear those words, and think madness. Are they mad to the subjugated Amadian, or the Vanburian slave? To those trafficked through Vertesk, or shipped to Silverforge? You, my friends…” He looked around the chamber hall. “You are the mad. You are the blind. And today, I will open your eyes.” The Emperor snapped his fingers, and he was the Emperor no more.\n\nThey could have heard the surprised cries back in Taychend. For above the Dove Throne, Emperor Galien I’s lifeless body lay tangled in the banners, the spear-shafted banner of Orenvalyam driven through his heart. The Taychendi below, armoured in black-and-gold, smiled as he threw off his glamour and drew his sword – the “Orda knights” lining the walls did the same. The Vairaghul called to the crowd once more:"
 orenvalyam_events.35.a: "“BEHOLD, TYRANTS–! THE DAY OF THE DOVE IS OVER! JUSTICE HAS COME!”"

 orenvalyam_events.36.t: "And the Days of Blood"
 orenvalyam_events.36.desc: "There hadn’t been many survivors from the Throne Room. They’d cut down as many as they could, of course – exacted righteous vengeance on those that had presided over such Darkness. But when the real Orda knights came, and the mage-princes made their stand, there was little the Oren Neraghul could do. Ebenatam, the operation’s leader, had prepared them well of course. They all knew it would be a one-way trip.\n\nHonestly, it had been a miracle that Iserdana had survived at all, managed to escape to the Ruinborn quarter in Anbenncóst. Still, she could report their great stand to the Kavalakuttam herself, commend their bravery. The dead deserved that much.\n\nThen she heard a cry, from outside the district. Then, the mob. Then, the flame.\n\nIserdana never made it back to Taychend. She saved a family, or two, though, and that was what she was most proud of, as the crowd killed her.\n———\nEverywhere in Orenvalyam, it was the same. One day, the ships would come with news of the Dovesday Massacre – righteous justice, a glorious victory. Then the next day, more news would come: of how Anbennar reacted to it. Rather than inspiring the serfs and peasantry to overthrow their masters, the massacre was taken as a heinous attack by a foreign power, and a wave of anti-Ruinborn sentiment swept not just Anbennar, but Cannor. Vicious pogroms from Westport to Nathalaire were carried out not only by vengeful nobles, but lowly peasants and labourers.\n\nAnd that is what has unsettled both the Oren Neraghul and the Kavalakuttam the most. As a new Emperor of Anbennar is elected and a wave of patriotism allows the aggrieved princedoms to persevere, many questions are being asked. All this, for a taste of vengeance, vapid and transitory? Who approved the attack? Why didn’t it trigger what was hoped? Why did anyone think it would?"
 orenvalyam_events.36.a: "Was it even worth it?"

 orenvalyam_events.37.t: "Ideals Overstretched"
 orenvalyam_events.37.desc: "Two High Kavalali – one Kheionai, the other Taychendi – looked out over the ruins of the Tunnels of Renewal. Once, elemental energy had coursed through the tunnels: earth to steady the world, air to clear foul winds, fire to push back nature, but most importantly water, to give life where there was none. Imarchend was the first to turn: he spoke to his guide: the High Kavalal of Nani Kiin. “The histories say these were the works of those who came before.”\n\nNani Kiin nodded. “So they do. But for so long we did not know them for that. As we emerged into a world scorched by fire, these tunnels were what gave many of us life. Our first great city arose from one of its reservoirs.” The Haraf’ne frowned. “And… yes, it was destroyed by another would wielded the power of planes beyond our own. Xogareil, who made pact with the fire wyrm Bai’ikunail.” Imarchend shook his head: “so how is this different than–” And Arpedifér turned now, too, a smirk on her lips: “Than the Lover-Tyrants, Ulwathi and Lanahasha, who burnt away Kannalulthe?” A scoff from Imarchend: “my people suffered for a millennium and more under the Cennayakuta’s power!” Arpedifér shook her head – “we are not in Imarchend, my friend.”\n\nThe Taychendi sighed, as Nani Kiin spoke up once more. “Day by day, I hear more of how the mages of Orenvalyam make wonders, push the boundaries of the Arcane in so many places.” He gestured to the Tunnels beyond. “And yet here, because of your history, you are too scared to tread. But our history is different. With our guidance, we can ensure you do not repeat your own mistakes… and with your power, bring water to the desert once more.”\n\nImarchend looked back out over the tunnels, imagined a vibrant world where now he saw a parched savanna. Was that not the embodiment of Dawn’s promise? He turned back to the Haraf’ne. “Once, our ideals seemed so unshakable. But as we advance north, the paradigm seems to strain. I will speak to my colleagues…”"
 orenvalyam_events.37.a: "“...and with any luck, these Tunnels will renew more than just the desert.”"

 orenvalyam_events.38.t: "Key Debate: The Ynnic Heresy"
 orenvalyam_events.38.desc: "The Kavalakuttam is normally forgiving about divergences of theological opinion – so long as the political ramifications aren’t too severe. The publishing of a new religious text from the Ynn, however, has passed the threshold – dubbed “The Ynnic Heresy”, many theologians state that this simply goes too far. The Ynn equal to Nayiru? An Elusive One herself? The Ynn presiding over the Cycle of Glory… what does this mean for the Ynnic Empire – is it now a realm sanctioned by Nayiru? Think of the implications!\n\nThe Kavalali have, and it has not been an enjoyable experience. The consensus in most of South Aelantir is that it is an attempt to subvert the ideals of Dawn throughout the entire western hemisphere – if this belief spreads, it would create a rival centre of power to the Kamrayakval and Kavalakuttam, which are alone the instruments of Nayiru in statecraft. Such a rival centre would raise the status of the Ynnic clergy beyond belief – perhaps eventually above even Taychend’s own.\n\nThe Kavalalists and Kamrayakvalists are both in agreement that something must be done. This new heresy must be combatted. Of course they disagree on how. The Kavalalists turn to debate, as they always have – the Ynnic Kavalali are within their right to diverge on theology, after all. The Kamrayakvalists take a more hardline approach, as they see befits this potentially treasonous threat – they say the Ynnic Kavalali must be arrested and replaced.\n\nAnd the Monasticists, of course, say this is madness. If what the Ynnics say is true, then it will be revealed when Nayiru descends from Dhivumanhu and tells everyone his Truth! And even disregarding that, how many other divergent doctrines and beliefs through Orenvalyam could you finger as treasonous or dangerous? And, and, and, so what if the Ynnic clergy are powerful? We are not a Taychendi realm, but an Aelantiri one! To the Monasticists, this whole debate is just outrage for the sake of it – why restrict their freedom to sate it?"
 orenvalyam_events.38.a: "First one's heart strays, then one's actions - this must be surpressed as a threat to Dawn"
 orenvalyam_events.38.b: "We must protect the intentions of Nayiru as we understand it, but do so through debate"
 orenvalyam_events.38.c: "Who cares about their theology, so long as they align with our ideals?"

 orenvalyam_events.39.t: "The Dragon Kavalal?"
 orenvalyam_events.39.desc: "When the Oren Nayiru captured the prisoner, the Kavalakuttam’s intention was that he would be imprisoned in sparse austerity. Now, as the green-haired Rzentur ‘elf’ stood watching through the barred window, hands clasped behind his back, the Kamrayakval looked around a cell that was decidedly more lounge-like. “You were warned”, the Rzentur said, doubtlessly smiling.\n\nAnd so he had, but the Kavalakuttam had not listened, and when they acquiesced and allowed his old subjects to send gifts, the room was redecorated over night. Rich furniture and banners and quilts of green cloth, emblazoned with bladed suns and sun-orange trim. A message. “We make mistakes,” the Kamrayakval [Root.Monarch.GetDynasty] said with a shrug, ”and we learn from them.” And so can he.\n\nVarlengielt turned, cracked a smile. “The stories filtered north, over the years. Such mighty mistakes. Such… excellent learning. The courtiers worried of you. Me?” He looked back over his homeland. “There could be worse empires. Subjugators.” “Like the domain of the dragons?” The Kamrayakval offered. The dragon-prince frowned: “yes, like them. Do you think you look upon their ilk? Their legacy, unknown to me, hidden in the myths of a dead continent?” The Kamrayakval shrugged in response – “to some it is not myth, but history.” And many considered Varlengielt the last remnant of it – a tyrant by faith, not by iron.\n\nThe dragon-in-elven-shape frowned. “Yes… they read of dragons past, and so judge me. My people…?” He sighed, turned to one of the banners – a green dragon dancing with the sun. “Do you know how they named me?” The Kamrayakval shook his head. “In my youth, I used to raid the kitchens of the palace.” A sly smile. “Nobody could stop me…!” He raised his arms, flexed them as if they were wings outstretched, with jest and hidden might. “The cooks named me: Varlengielt! GREEN TERROR!”\n\nThe Kamrayakval couldn’t stop [Root.Monarch.GetHerselfHimself] from laughing. The dragon-prince turned, grinning. “They loved me. Shaped me. A god, see, does not rule over a realm of slaves, nor a domain of the dead. They rule over soul and heart, faith and conviction.” And now, to his real point. He looked back to the banner. “A guide. A beacon. Isn’t that how your priests lead? How you lead?” And turned back at last. “Do you really think I cannot do the same?”"
 orenvalyam_events.39.a: "Perhaps, as a Kavalal, Varlengielt may continue to guide his people?"
 orenvalyam_events.39.b: "There is difference between being a priest, and being a god."

 orenvalyam_events.40.t: "The Living Relics"
 orenvalyam_events.40.desc: "“By Nayiru– “ The High Kavalal of Royakottar nearly jumped out of his seat, when the High Kavalal of Oktikheion welcomed in the Mechanim. “It’s one of–?”\n“This is the Insyaan leader I was telling you about,” Oktikheion said. It looked like a bulky elf, only built of rippling silver-steel. A living relic, standing before them!\n“Greetings,” it said, in a toneless voice, offering a hand. “My name is quite long, I have therefore shortened it: you may call me Roaring-Defiant-Against-My-Makers.” The Kavalali rose, giddily accepted it. What a brilliant name!\nRoyakottar turned to Oktikheion. “This is just incredible!” He exclaimed. “I mean, it can speak!”\n“Slightly offended: I can speak,” the Mechanim replied, “but I am not an ‘it’.”\n“They have a strong sense of self,” Oktikheion added.\nRoyakottar rubbed at his beard: “I have to wonder how this fits doctrine… if they’re a Precursor relic, are they not a product of–” Then, epiphany. “By Nayiru, this doesn’t contradict– it proves…!” He fell deep into thought.\n\nRoaring-Defiant turned to the Kheionai – “Confused: your colleague speaks,” they said, “and I do not comprehend.” Oktikheion chuckled, then explained: “The Elvenness of Relics. Our belief that magic is a living thing, and the process of relic creation entraps it – just note how similar the enchantment of objects and people is, for instance – and that artificery simply prolongs that grim practice. Who knows what living energies you’re enslaving in your ‘new relics’, after all. You can’t ask them.”\n\n“But what if we could…” Royakottar whispered, as his mind unravelled the future. “Flesh of iron, hands of steel… and with these hands that will not break…”\nThe Mechanim backed away. “Remembering: I have heard that sentiment before.”\nOktikheion chuckled, nervously. “Come now, my friend,” he said to Royakottar, “you know the history.”\n“Bitter: I lived it.”\nBut Royakottar just looked up, eyes of guilt, eyes of hope: “But we won’t make the same mistake again!” He turned to Roaring-Defiant. “As equals... as partners… we could build Dawn, together! You could be heroes!”"
 orenvalyam_events.40.a: "Astounded: you have changed your morals. Wary: but not your ambition."
 U39_living_relics_tt: "§TWhen they returned to Insyaa, Roaring-Defiant argued against the agreement with Orenvalyam. In the Kavalal’s eyes, they saw the glint of world-changing ambition that had once created them as tools, not people.\n\nBut their brethren judged the Oren Nayiru differently. If the descendants of their creators truly had vanquished slavery, truly did believe the Mechanim to be equal… how could it hurt, to give those that had come so far the benefit of the doubt?§!\n"

 orenvalyam_events.41.t: "Answer Me These Questions Three"
 orenvalyam_events.41.desc: "Into the Domandrod, three High Kavalali advanced. Bramashdar, of the Kamrayakvalists. Cara Lafquén, of the Kavalalists. Lokemeion, of the Monasticists. Some time after they had entered, the lords of the Domandrod made their move. Vines sprouted, trees twisted, and the Kavalali were soon separated, entrapped within a judgement-court, a brilliant chorus, the seasons assembled. To each priest, a million different voices spoke, in swirling union: “We look out as Dawn advances–” “And worry how your cause denounces!” “For even as you speak for day–” “For fire-flame your soldiers pray!” “Now answer us, these questions three–” “So we may see sincerity!”\n\n“What do you value most?” Bramashdar: “Liberty!” Lokemeion: “Peace!” Cara Lafquén: “Whatever the Kavalakuttam decides I must!”\n“Why do you spill blood?” Cara Lafquén: “For justice!” Bramashdar: “For vengeance!” Lokemeion: “Because we are fools, who do not know better!”\n“How can we trust you?” Lokemeion: “I hold no ill intent!” Cara Lafquén: “My peers guide my actions!” Bramashdar: “You can’t! If I had my way, I’d burn you to the ground!\nAt each answer, the Fey chorus chattered amongst itself, pixie against faerie, nymph against dryad. And at each difference, at every contradiction, the forest’s song grew more discordant, more divided. The Domandrod descended into delirium. It stayed there for hours, before the Kavalali realised they could not make up their mind.\n\nAnd so they gave their own chorus’ pact: approved by the Chamber, benches packed. They spoke as three, but dealt as one – “you have naught to fear, when we are done!” “For we are legally obligated to state: we cannot act without debate!” “Thus we offer you a shield – and where you forbid, we will not build!” “So let us preach, and let us proffer – we have yet gifts, to fill your coffer!”"
 orenvalyam_events.41.a: "Another hour of mad wittering later, the Fey agreed."
 orenvalyam_events.41.b: "Another hour of mad wittering later, the Fey agreed."
 U39_riddles_three_tt: "§TAnd thank Nayiru they did – it took eighteen votes, five sub-committees, six months and seven mental breakdowns to come up with a pact that rhymed!§!\n"

 orenvalyam_events.42.t: "Terminus"
 orenvalyam_events.42.desc: "[Root.U39FinalStep]"
 U39NoFinalStepYes: "[Root.Monarch.GetName] [Root.Monarch.GetDynasty] shuffled through [Root.Monarch.GetHerHis] papers, listening as [Root.Monarch.GetHerHis] allies addressed the Kavalakuttam. [Root.Monarch.GetHerHisCap] stomach was turning over as [Root.Monarch.GetSheHe] read over [Root.Monarch.GetHerHis] notes… regretted some of the lines [Root.Monarch.GetSheHe]’d crossed out. But this vote was the most important in Orenvalyam’s history – if it went [Root.Monarch.GetHerHis] way, they would invade Halcann before the end of the century. They’d win before… no. [Root.Monarch.GetSheHeCap] didn’t want to think about that. If [Root.Monarch.GetSheHe] did, [Root.Monarch.GetSheHe] might vote against it too. This was the only way.\n\nEventually, the Kamrayakval rose to speak. But a reticent High Kavalal beat [Root.Monarch.GetHerHim] to it… and did so waving papers eerily similar to his own. “My colleagues, my comrades–!” the Reticent Kavalal began. “Before we vote, there is something you must know!” The Kamrayakval could have stopped him. [Root.Monarch.GetSheHeCap] couldn’t bring himself to. “What I have in my hands is information that has been OBSCURED from you! The true cost of the Kamrayakval’s invasion!” A pit grew in his stomach as the Reticent Kavalal read [Root.Monarch.GetHerHis] leaked notes. “Millions to be drafted… simultaneous attacks on Fangaula and Lencenor… a war across the world! And how long will this take?” And then the lines he had crossed out. “By their estimates? 300 YEARS of mass-scale combat! 500 YEARS of suppression, of fighting against partisans! AND THE COST?!” The Kavalakuttam sat on the precipice – worried looks, rising fury. “1000 YEARS OF RECOVERY – AND 200 MILLION DEAD TO GET THERE!”\n\nAnd then the chamber exploded. Half the Kavalali rose insulted, the other with indignation. There were accusations of slander, and treason, and mass-murder, and inaction, and cowardice. [Root.U39EcarisLives]"
 U39EcarisLivesYes: "Ecaris Ecarizuir, watching in the crowd, stood up, cried “How is this news to you all?!” Someone shot back: “As if you wouldn’t do the same!”\n\nThe Kamrayakval just watched the chaos. [Root.Monarch.GetSheHe] couldn’t bring [Root.Monarch.GetHerselfHimself] to join in the debate. Necessary losses… that was what [Root.Monarch.GetSheHe] had dismissed the death toll as, when [Root.Monarch.GetSheHe]’d read it first. Unfortunate casualties, on the long, long road to Dawn. Was that really true, though?"
 U39EcarisLivesNo: "The three factions were at each others’ throats – not just set against each other, but against themselves. Only the Monasticists were united against the plan.\n\nThe Kamrayakval just watched the chaos. [Root.Monarch.GetSheHe] couldn’t bring [Root.Monarch.GetHerselfHimself] to join in the debate. Necessary losses… that was what [Root.Monarch.GetSheHe] had dismissed the death toll as, when [Root.Monarch.GetSheHe]’d read it first. Unfortunate casualties, on the long, long road to Dawn. Was that really true, though?"
 U39FinalStepYes: "The Kamrayakval shuffled through [Root.Monarch.GetHerHis] papers, listening as [Root.Monarch.GetHerHis] allies addressed the Kavalakuttam. [Root.Monarch.GetSheHeCap] grimaced as [Root.Monarch.GetSheHe] read through [Root.Monarch.GetHerHis] speech… noted the lines [Root.Monarch.GetSheHe]’d crossed out. But this vote was the most important in Orenvalyam’s history. [Root.Monarch.GetSheHeCap] couldn’t afford the weak-willed bowing out before the final hurdle. They couldn’t handle knowing the cost – so [Root.Monarch.GetSheHe] would make sure they didn’t.\n\nEventually, the Kamrayakval rose to speak. But one of the High Kavalali beat him to it… and did so waving papers eerily similar to [Root.Monarch.GetHerHis] own. “My colleagues, my comrades–!” the High Kavalal began. “Before we vote, there is something you must know!” The Kamrayakval frowned. Maybe the issue would be forced. “What I have in my hands is information that has been OBSCURED from you! The true cost of the Kamrayakval’s invasion!” And now [Root.Monarch.GetSheHe] grimaced. [Root.Monarch.GetSheHeCap] looked to one of his allies, a hardliner – arched an eyebrow when he gave [Root.Monarch.GetHerHim] a reassuring look. “Millions to be drafted… simultaneous attacks on Fangaula and Lencenor… a war across the world! And how long will this take?” The High Kavalal read the lines [Root.Monarch.GetSheHe] had crossed out, now. “A CENTURY of mass-scale combat, by their estimates! Double that of suppression, of fighting against partisans! And the cost?!” The Kavalakuttam watched, with bated breath. “1000 YEARS OF RECOVERY – AND 200 MILLION DEAD TO GET THERE!”\n\nHushed outrage, from the Monasticists. Isolated gasps, from the Kavalalist and Kamrayakvalist benches. But it was all dissolute… ineffectual. One of the Monasticists rose, cried - “this is an outrage!” One of the Kamrayakvalists: “this is Dawn!” And the murmurs agreed with him. The cost of victory had already been priced in. Of course, the Monasticists couldn’t bare it… but that was fine. They could watch from Aelantir, while the faith swept over the rest of the world.\n\nThe Kamrayakval smiled weakly at the reticent High Kavalal, who still stood, looking desperately around the chamber, as if he was the only person in the world who could see how all this was wrong, so unnecessary."
 orenvalyam_events.42.a: "And maybe he was. The vote passed easily."
 orenvalyam_events.42.b: "And were the dead the only thing that they would be losing?"

 orenvalyam_events.43.t: "The Last Interlopers"
 orenvalyam_events.43.desc: "The arguing continued for three hours, before the Kamrayakval found something that might break it. A promising High Kavalal – Stalwart in his beliefs – stood calmly, waiting to speak. The Kamrayakval hushed the Chamber so that he could do so. “My brethren… my siblings,” the Stalwart Kavalal began. “I’ve thought about this for a long time… we all have, haven’t we? We’ve been confronted by the limits of our understanding– we’ve felt as Interlopers. Been forced to open ourselves to new ideas, uncomfortable possibilities!”\n\nHe gestured to his Reticent friend, sitting across the Chamber. “If what my colleague says is true– if our future is to campaign for centuries overseas, to bring Dawn to even more people who don’t understand what it means… how long we believe we can go, before we do not only feel like Interlopers but BECOME Interlopers!?” A glance at the Monasticists. “There are those who say we already are…”\n\nA Kamrayakvalist stood up, now, outraged. “So you say we shy away from our duty!? That we leave the slavers and tyrants overseas alone– let hundreds of millions toil in Darkness forevermore? ABANDON DAWN?!”\nThe Stalwart Kavalal just shook his head. “Dawn is not conquest…” He looked to the Monasticists. “Dawn is prosperity, and autonomy.” To the Kavalists. “Dawn is judiciousness, and reflection.” To the Kamrayakvalists. “Dawn is justice, and liberation.” And to the invasion plans in his hands. “What must we do, to achieve this goal? Stand above a broken, battered world, enforce a stringent doctrine on others by the sword, in the name of security refuse those we conquer freedom? That is not prosperity, or reflection, or liberation.” He looked around the chamber. “That is not Dawn!”\n\n“We could recover.” The Kamrayakvalist argued, defiant as the Kavalakuttam’s mood turned at last. “Mend our frayed ideals!” Desperate, disbelieving. “Rebuild Dawn anew, after we burn the world down!”\nBut his Kamrayakval just sighed, stood, and spoke at last. “And why must we burn the world, when we can change it on our terms? Why must we rebuild Dawn, when we never took the time to build it in the first place?”"
 orenvalyam_events.43.a: "[Root.Monarch.GetHerHisCap] intervention was the final nail. The invasion was voted down."
 U39_last_interlopers_tt: "§TThe vote was firm in favour of cancelling the invasion – but it was not unanimous. Across Orenvalyam, Nayiru’s faithful breathed a sigh of relief at the news, wary of war; Nayiru’s faithful raged at the betrayal, at the cowardice of the Kavalakuttam; Nayiru’s faithful learned for the first time there was going to be an invasion at all.\n\nBut the fight is not over. There is still poverty, there is still inequality. The enemies of Orenvalyam still gather on the periphery. Evil and injustice still exists overseas. If Dawn is still possible, we must strive for it.§!\n"

 orenvalyam_events.44.t: "The Last Step"
 orenvalyam_events.44.descSilverspite: "The Kamrayakval strode into the chamber, twin-bladed, wrought-armoured. There were a scattered few High Kavalali here… though not many. The seats were still packed, though. For now, the Chamber seats filled with his warriors. His officers, the elite of his company, the generals and bannermen that had carried Dawn to victory over Aelantir.\n\nElf and Dragon looked around them, gazed at the diversity of Dawn arrayed on the benches. The greater part Taychendi, of course… but the teal of Kheionai alongside them, the seasons of Eordand, the long-eared Harafics, Prism-scarred Amadians and tattoo’d Boek. Who else could have done this? Elrandar Silverspite was like Venaan reborn… unifier of Elvenkind.\n\nA flash of anger from the iron. Right. Not exactly like Venaan. After all, the Kamrayakval fought for something different… and he wouldn’t stop at Aelantir. Just one last step now. One final preparation.\n\n“WARRIORS!” Called the voice from the metal. “Did I not promise you this day?! Did I not promise that we would rise?! That we would not furrow the fields with the blood of Dawn’s enemies?!” The chamber rose as one, called with might and fury– “A PROMISE FULFILLED! A RISE UNSHAKEN! A VENDETTA WELL SATISFIED!”\n\n“And now, for the last promise–” A gauntlet-draconic raised the sword it gripped skywards. “TO SWEEP OVER THE WORLD–” The warriors finished his sentence. “LIKE SUN CONQUERS NIGHT!” And a satisfied grin beneath the visor– triumphant, victorious: “SO WHAT DO WE DECLARE?!”"
 orenvalyam_events.44.descElse: "When the vote passed, the Chamber erupted into cheers: “For Dawn!” “For Nayiru!” “For the Kamrayakval!” “For the Silverspite!” Even the guards thumped their ceremonial spears against the marble floor. The Kamrayakval looked out over the Kavalali, at last doing their duty to Dawn with pride – and eyed those few who still could not bear the brilliant light.\n\nWhen the cries died down, the Kamrayakval stood again – though [Root.Monarch.GetSheHe] did not speak from the benches. [Root.Monarch.GetSheHeCap] crossed the chamber floor, to the Reticent High Kavalal, sitting dejected, despondent. Placed a hand on [Root.Monarch.GetHerHis] shoulder. “You don’t understand, now. You won’t for a while yet, I fear. But believe me… it will be worth it.” The Kamrayakval turned to the Kavalakuttam. “One day… far in the future, maybe… there will be a moment– a great invisible line in the history of all things.”\n\n[Root.Monarch.GetSheHeCap] stepped to the centre of the round-chamber. “And what is this moment? It is the instant, where there are no more tyrants. Where there is no slavery. Where there is no Darkness. And the ashes of the Interlopers are but food for the luscious soil, and the anguished cries of Nayiru’s enemies a whisper on the wind.” [Root.Monarch.GetSheHeCap] raised a fist. “This moment is Dawn.”\n\nThe Kamrayakval turned back, to the High Kavalal. “From that day on… all will have been made right. From that day on, we can put down the sword. But not now.” A smirk. “Not yet. There is one last step we must take – for before the Cycle’s beginning…”"
 orenvalyam_events.44.a: "[Root.U39LastStepOption]"
 U39LastStepOptionSilverspite: "And “WAR!” came the cry of the crowd. “WAR FOR THE DEATH OF DARKNESS! WAR FOR DAWN!”"
 U39LastStepOptionElse: "“...comes the Apocalypse.”"

 orenvalyam_events.45.t: "The End of the World, Part I"
 orenvalyam_events.45.desc: "[Root.U39AmadiaEndings]\n\n[Root.U39EffelaiEndings]\n\n[Root.U39OrcEndings]\n\n[Root.U39ExemplarEndings]"
 
 U39AmadiaEndingsEmbrace: "Guided by the Chaqanel and Quruwei, Amadia leads all Orenvalyam in embracing Wild Magic. Prismatic Damestear crystals become a common sight throughout Aelantir, and the Oren Nayiru eventually learn to harness the force of Wild Magic productively… if not safely. Even as Amadia suffers under the continued ravages of Wild Magic storms, exacerbated by their newly uninhibited approach, the rest of Aelantir looks to the children of Poqi with great respect – and for many, that more than makes up for it.\n———"
 U39AmadiaEndingsTolerate: "Following the opinions of the Challumach and Baanche, Orenvalyam takes no single approach to the effects of Wild Magic. Life largely continues as it had before the arrival of the Interlopers. Each Amadian people chooses how they wished to approach the force that has dominated their peoples’ history for so long, now with the peace and interconnectivity provided by a united Aelantir… and the opportunity to boisterously debate those approaches between themselves.\n———"
 U39AmadiaEndingsSuppressElse: "Understanding the legacy of the Onisqado Federation’s fall, the Amadians aim to suppress Wild Magic through arcane means. Prismatic Damestear is systematically neutered, and new institutions are established to prevent disputes and monitor Wild Magic storms. Eventually, Wild Magic becomes an inconvenience, an annoyance, and Amadia, increasingly dominated by the Quchamar’s great Lake Cities, prospers.\n———"
 U39AmadiaEndingsSuppressExemplars: "Understanding the legacy of the Onisqado Federation’s fall, the Amadians aim to suppress Wild Magic. Prismatic Damestear is systematically neutered to reduce Wild Magic storms, while, aided by the Order of Exemplars, powerful magics greatly lessen the effects of Wild Magic on individual Amadians. Eventually, Wild Magic becomes seen as little more than an affliction, that had done damage but has now been cured. Amadia, increasingly dominated by the Quchamar’s great Lake Cities and Exemplar outreach operations, prospers.\n———"

 U39EffelaiEndingsBurned: "In the wake of the burning of the Effelai, the jungle’s former inhabitants struggle to survive. Many flee, and those who remain in the ashen fields of their old home are only able to re-establish themselves with difficulty, despite the Kavalakuttam’s support. Even as many thank Orenvalyam for freeing them from the jungle’s grip, many more shy away from the faith – mourning what once was, however fraught with danger and strife it may have been.\n———"
 U39EffelaiEndingsSavedElse: "By arcane means, the Effelai is calmed, and settlement in the jungle halted and restricted. As the jungle’s volatile nature settles ever-so slightly, and aid arrives from the Kavalakuttam, the native Effelai ruinborn continue their old lives, full of hardship and toil as they were. Largely disconnected from the rest of Aelantir, most of the people of Orenvalyam simply forget about the Effelai – it fades into the background, a nature reserve, an empty space on maps.\n———"
 U39EffelaiEndingsSavedExemplars: "By arcane means, the Effelai is calmed, and settlement in the jungle halted and restricted. As the jungle’s volatile nature settles ever-so slightly, and aid arrives from the Kavalakuttam, the native Effelai ruinborn continue their old lives, full of hardship and toil as they were. However, there are those who never forget what the Effelai is or had done, and from the Dry Coast, the Exemplars keep a vigilant eye on the jungle to their north.\n———"
 U39EffelaiEndingsSavedYnnicHeresy: "By arcane means, the Effelai is calmed, and settlement in the jungle halted and restricted. As the jungle’s volatile nature settles ever-so slightly, and aid arrives from the Kavalakuttam, the native Effelai ruinborn continue their old lives, full of hardship and toil as they were. Over time, many sect-cults across Orenvalyam arise worshipping the Effelai, viewing the tempestuous life in the jungle as a perfect representation of chaos-in-order. Many of these cultists go to live under their new goddess’ aegis – few are heard of again.\n———"

 U39ReshapingEffelaiSaved: "The Ozgar Orcs, who had suffered so much under bondage, and done so much to break their chains, take up a place of great respect in Orenvalyam, equal to the Ruinborn. With the Effelai standing tall, it is the former plantations of Endralliande and the Ruin Sea that form the new heartland of the orcish people. In time, orcs once more journey across the Lament – this time not as slaves, but in search of a better life.\n———"
 U39ReshapingEffelaiBurned: "The Ozgar Orcs, who had suffered so much under bondage, and done so much to break their chains, take up a place of great respect in Orenvalyam, equal to the Ruinborn. As the Effelai is consumed by flame, the Ozgar of Soruin expand to the south, cultivating the ash fields of the old jungle. The haven founded by Bramash becomes a new heartland for the orcish people, and many flock there from Escann and the Dwarovar in search of a better life.\n———"
 U39VassalReclamation: "As Cannorian influence is rolled back, the Ozgar Orcs are a key beneficiary. Pleading the injustices done to them by the colonisers, orcs take charge of the islands and Endralliander plantations they had been shipped to so long ago. There are some who questioned their advance – Ruinborn nativists who see them as transgressors, and Cannorians who deny their claims – but few pay them mind. The orcs had proved their place in Dawn many times over.\n———"
 U39Revengeance: "The Ozgar Orcs, pleading the injustices done to them by the Cannorains, secure for themselves restitution in the lands of the displaced colonisers. Still, despite their service to Orenvalyam, there are those who do not look on them fondly – Ruinborn nativists, who question how an orc transgressing Aelantiri land is different to a human doing so. As memories of the Ozgar fighting at the forefront of Dawn recede, this view, and the resulting discrimination, becomes increasingly common.\n———"
 U39OzgaromIntegratedRevengeance: "The Ozgar Orcs had been liberated by Dawn’s mercy – but still, they were not native to Aelantir. Many Ruinborn look on their claims to land in the Ruined Sea and Endralliande as simple landgrabs, not true restitution, and in time see the orcs as Interlopers themselves. It takes a very long time – many contentious votes, many riots, many rebellions – but eventually, the Kavalakuttam do to the orcs what they did to the Cannorians. By a slim majority, they are expelled from Aelantir.\n———"

 U39IntegrateNoSilverspite: "Just as their arrival had once spurred the faith into creation, the continued service of the Jaherian Exemplars and their brother-orders spur it to greater heights. They have their doctrinal disagreements – promoting order over chaos, measured action over heated debate – but under the continued direction of the Heralds, they dedicate themselves to Dawn’s mission. The Dry Coast flourishes under their direction, a blend of Bulwar and Taychend, old and new, Ruinborn and Fleet-elven: the two Sun-Cults in harmony at last."
 U39IntegrateEcarisKillSilvespite: "As the years passed, the Jaherian Exemplars continue to be faithful to the Kavalakuttam, and integral servants of Dawn. Even as they carry out the Kavalali’s will, however, they never forget their ideals – nor how, in the Oren Nayiru’s darkest hour, it had been one of their own who had helped return their brother-elves to the Light. For their part, Ecaris Ecarizuir and Velara Denazuir are revered as true Exemplars, who had sacrificed their lives for justice. No matter what it takes, their Order will not allow the faith to falter again."
 U39TolerateNoSilverspite: "The Holy Orders of Rezankand, now under the watchful eye of the Oren Nayiru, continue to carry out their duties to the best of their abilities – staying true to the Light, and fighting the Dark wherever it may be. Though they struggle under the restrictions of the faith, guided by their Heralds they continue to make their mark in an Orenvalyam increasingly alien to them, and become renowned as expert adventurers, lawbringers, and monster-hunters."
 U39TolerateEcarisKillSilvespiteWithDuskbringer: "The Holy Orders of Rezankand, now under the watchful eye of the Oren Nayiru, continue to carry out their duties to the best of their abilities. Though they chafe under the restrictions of the faith, Ecaris Ecarizuir’s stand against Elrandar Silverspite at Nanru Nakar, so integral to his removal, showed their commitment to its base ideals. While the Kamrayakvalists continue to decry the Exemplars as Interlopers, and Ecaris as a murderer, the Order has more than enough support to continue their activities."
 U39TolerateTheLastOne: "For many years, the Exemplars attempted to carry out their duties, even as they chafed under the restrictions of the faith. However, the shadow of Elrandar Silverspite’s death at the hands of Ecaris Ecarizuir continued to follow them, with many seeing the act as confirmation of the Exemplars’ Interloper nature – a dark murder at the hands of foreign forces. Over the years, the Order continues to wither under these attacks, and they are eventually forced to disband."
 U39PurgeNoSilverspiteNayiru: "The Jaherian Exemplars are scattered in their exile. Many go back to Bulwar, while Ecaris leads some to Anbenncóst and Cannor, hoping to use his comparisonship with Corin to secure safe harbour. The organisation never recovers from their losses. In Aelantir, they are gradually reduced to a mere footnote in the faith’s memory. Histories marginalise their importance, and Bulwari influences on the Oren Nayiru are either erased, or reinterpreted. Where the Exemplars are mentioned, it is as Interlopers and colonizers, and little more."
 U39PurgeNoSilverspiteRecognition: "The Jaherian Exemplars are scattered in their exile. Many go back to Bulwar, while Ecaris leads some to Anbenncóst and Cannor, hoping to use his comparisonship with Corin to secure safe harbour. The organisation never recovered from their losses. In Aelantir, however, the memory of their influence on the faith is kept alive. The Exemplars are regarded as misguided Interlopers, but still dedicated to their beliefs, and worthy of, at least, some modicum of respect."
 U39PurgeEcarisKillsSilverspite: "In the aftermath of Elrandar Silverspite’s death at the hands of Ecaris Ecarizuir, the Exemplars were blamed by the Kavalakuttam as the sole force behind his removal. Seen squarely now as foreign Interlopers, who traded on popular discontent to enforce their own influence over Orenvalyam, the memory of the Jaherian Exemplars is damned by the faith. Their descendants in Aelantir are harassed, and any surviving members the Kamrayakvalists can get their hands on are executed in retribution."

 orenvalyam_events.45.a: "..."

 orenvalyam_events.46.t: "The End of the World, Part II"
 orenvalyam_events.46.desc: "[Root.U39YnnEndings]\n\n[Root.U39OrenvalyamEndings]\n\n[Root.U39CannorianEndings]\n\n[Root.U39SilverspiteEndings]"
 U39MonasticistKamKav: "With the Kavalakuttam choosing to permit the Ynnic Kavalali’s new doctrine, the Ynn leads a new era of theological diversity across Aelantir, and, though still rooted in the fundamental ideals of the Oren Nayiru, many new interpretations of the faith’s tenets emerge. Nonetheless, the Kavalakuttam is able to hold the faith itself together, ensuring that, despite their differing beliefs, the million disparate cells of Orenvalyam answer to [Root.Capital.GetName] – and each other – in the end.\n———"
 U39MonasticistMon: "With the Kavalakuttam choosing to permit the Ynnic Kavalali’s new doctrine, the Ynn leads a new era of theological diversity across Aelantir, and, though still rooted in the fundamental ideals of the Oren Nayiru, many new interpretations of the faith’s tenets emerge. With the Kavalakuttam able to exert little control over the million disparate cells of Orenvalyam, no two peoples or regions live in the same way. At last, the tapestry of Aelantir truly embodies the faith’s chaotic nature.\n———"
 U39JKavalalistKam: "With the Kavalakuttam choosing to confront the Ynnic Heresy through debate alone, a new era of theological discussion and division descends over Aelantir. The Ynnic Kavalali take up the cause of religious diversity, while those of Taychend argue for the wisdom of orthodoxy. Yet, in the end, it is the strength of the Kamrayakval that tips the balance in the Kavalakuttam’s favour. The strength of words, after all, could only be secondary to the strength of office.\n———"
 U39JKavalalistKav: "With the Kavalakuttam choosing to confront the Ynnic Heresy through debate alone, a new era of theological discussion divides Aelantir. With the High Kavalali of both theological diversity and orthodoxy commanding the resources of their domains, the theological debate shifts into one of dominance… and, as both sides consolidated, of party politics. The old factions became secondary to the ever-shifting fight over policy and theology, intertwined. Eventually, Orenvalyam became a true parliamentary democracy.\n———"
 U39JKavalalistMon: "With the Kavalakuttam choosing to confront the Ynnic Heresy through debate alone, a new era of theological discussion divides Aelantir. The Ynnic priests take up the cause of religious diversity, while their opponents argue for the wisdom of orthodoxy. With the High Kavalali of both groups masters of their respective domains, the fight is evenly matched… and never really ends. The divisions shift, the debate evolves. But, ultimately, that is fair enough. What is argument and evolution, after all, if not Dawn?\n———"
 U39KamrayakvalistKavMon: "With the Kavalakuttam choosing to confront the Ynnic Heresy through governmental force, the Ynn is quickly returned to the orthodox fold – after decades of fruitless unrest and revolts, the lingering resentment from the Kavalakuttam’s actions eventually fade. While Orenvalyam’s constitution prevents the Kamrayakval from truly becoming a force of orthodoxy and central control, there remains the silent acknowledgement that while Orenvalyam may value diversity, there is only so much one may rightfully diverge…\n———"
 U39KamrayakvalistKam: "With the Kamrayakvalists confronting the Ynnic Heresy through governmental force, the Ynn is quickly returned to the orthodox fold, and eventually – despite the lingering resentment, the unrest, the riots – they mostly accept central control. Though still kept in check by the Kavalakuttam, using the significant powers available to them the Kamrayakval becomes the pillar of orthodoxy, and the ultimate leader in both governance and theology: a true Emperor, successor to Venaan, Arethon and Aldan.\n———"

 U39InwardsReshapingMonasticist: "The Monasticists, forced for centuries to watch as Orenvalyam advanced-as-Interlopers, use the momentum of the Oren Neraghul’s retreat inwards to ensure the faith does not do so again. Orenvalyam largely shuts themselves off from the Darkness of the outside world, as they begin a Second Age of Reflection, peacefully trading with outsiders, but not much more. When the oppressed overseas cry out for the Oren Nayiru’s aid, the Kavalakuttam does not answer – that is Nayiru’s job, after all.\n———"
 U39InwardsElse: "As the Oren Neraghul abandon their prior mission of overseas vengeance, Orenvalyam itself turns inwards as well. The days of heroic bravado long gone, although they keep an ear out for the plight of the oppressed the Kavalakuttam does not dare intervene directly across the Lament, instead focusing on justice at home, and in supporting the faith’s allies. Over time, secure diplomatic relations are established with most of Halann. United, Aelantir becomes a peaceful and prosperous economic superpower.\n———"
 U39OutwardsElse: "With the Oren Neraghul taking a belligerent tone towards the Darkness overseas, Orenvalyam too continues to look outwards. Though the Kavalakuttam set aside the dream of global liberation, by stealth, subterfuge, and audacious military expeditions, the Oren Neraghul work in conjunction with local forces to free slaves and serfs alike, topple tyrannical leaders, and make Dawn’s presence known. Across Halann, the enemies of Orenvalyam keep one eye on the shadows… and wait for the day vengeance will come.\n———"
 U39OutwardsIntegrateExemplars: "With the Oren Neraghul taking a belligerent tone towards the Darkness overseas, Orenvalyam too continues to look outwards. Though the Kavalakuttam set aside the dream of global liberation, by stealth, subterfuge, and audacious military expeditions, the Oren Neraghul work in conjunction with the Jaherian Exemplars and local forces to free slaves and serfs alike, topple tyrannical leaders, and aid the allies of Dawn. Across Halann, the agents of Darkness keep one eye on the shadows… and wait for the day justice will come.\n———"
 U39OutwardsReclamation: "Though Dawn’s advance had been halted by the Kavalakuttam, there were always those who thought it a mistake. As the years advance, and Orenvalyam continues to grow in strength, the voices arguing for the Oren Neraghul’s activity overseas to be expanded grow with it – and as tales of the Dark outside Aelantir begin to contrast even more starkly against the faith’s light, the arguments turn to action. It takes many years… but one day, the armies of Nayiru march forth for Dawn once more.\n———"

 U39ReshapingNoValor: "The Cannorians, the right to their new homes guaranteed by the Kavalakuttam, continue to prosper in the unified and interconnected Aelantir. Their Kavalali become integral and loyal members of the faith, and continue to argue for their flocks as best they can. The dream of substantial land redistribution or reclamation dies quickly – in much of their former lands, the Epednar, Haraf’ne and Noruinic Ruinborn are largely marginalised, remaining poorer and less numerous compared to those that displaced them."
 U39ReshapingYesValor: "The right to their new homes guaranteed by the Kavalakuttam, the Cannorians continue to prosper in the unified and interconnected Aelantir. Their Kavalali become integral and loyal members of the faith, and continue to argue for their flocks as best they can. Inspired by the example of Valorpoint and their Corinite ideals, the Cannorian priesthood try their best to support and integrate the Ruinborn they had previously displaced. To many Epednar, Haraf’ne and Boek, it is too little, too late."
 U39ReshapingPurge: "Although the Kavalakuttam confirmed the Cannorians’ right to their lands, Orenvalyam did not forget the crimes they committed. Guided by the Kamrayakval, the Kavalakuttam rigorously interfere in the Cannorian cells, ensuring that the Ruinborn who had been displaced receive preferential treatment and support. Although this breeds resentment among the still-powerful Cannorians, to the Ruinborn they had displaced it proves some modicum of justice – though it cannot be undone, their suffering will not be forgotten."
 U39ReclamationOutwards: "In an attempt to turn back Cannorian colonisation, and punish the descendants of the colonists, Orenvalyam enacts a rigorous and harsh policy of resettlement, restitution, and land redistribution. As the displaced Ruinborn move back into their old lands, the Kavalakuttam exacts heavy taxes on the now-overcrowded coasts to fund their recovery. While the Cannorians chafe under heavy redistributive taxes, in time the newly subsidised interiors of Noruin, Haraf and the Expanse recover, and finally prosper."
 U39ReclamationInwards: "In an attempt to mend the scars of Cannorian colonisation, Orenvalyam enacts a rigorous but measured policy of resettlement, restitution, and land redistribution. As the displaced Ruinborn move back into their old lands, the Kavalakuttam exert great effort to heal the bad blood between these areas and the newly-resettled Cannorians. In time, they make peace once more, the bitterness of land reclamation eventually passing, and groups like the Boek, Haraf’ne and Epednar beginning at last to recover their former strength."
 U39ReclamationIntegrate: "In an attempt to heal the damages of Cannorian colonisation, Orenvalyam pursues a measured policy of resettlement and restitution. Inspired and aided by the Exemplars, they attempt to encourage co-existence and co-prosperity whenever possible, guiding displaced Ruinborn back to their old homes without expelling their new Cannorian neighbours. While results are mixed, and in some places violence and disagreement results in the entrenchment or eviction of Cannorian settlers, in much of the Aelantiri interior the Ruinborn once more regain their prominence."
 U39RevengeanceCannor: "With the Cannorians expelled, vast quantities of destitute refugees flee back to their home continent. However, the Ruinborn they once displaced, now with wide swathes of cultivated land, prosper in the resettled Aelantiri interior, and Boek, Haraf’ne and Veykodan alike become powerful constituents of Orenvalyam. Meanwhile, Ynnic, Kheionai and Taychendi migrants flock to the abandoned coastal cities of Noruin, Harafe and Endralliande, forming a new, cosmopolitan culture in the heart of Aelantir… built as it is on the ruins of another people."

 U39DuskbringerWin: "———\nThe tragic hero, the great villain, the emancipator and the destroyer, a slave to the Dragon, a servant of a bloodied Dawn – and yet, above all else, Elrandar Silverspite is seen as a dour failure: to Nayiru, to the Kavalakuttam, to the faith’s ideals, and to himself. But, by the priests and people united, the damage that the First Kamrayakval did to the faith has healed – and Orenvalyam will never allow another like him to seize the Oren Nayiru again."
 U39SicknessEightElse: "———\nElrandar Silverspite’s great crusade carried Orenvalyam across South Aelantir, even as his transgressions and his crimes caused his downfall. And yet, even now there are Kamrayakvalists who see him not as some mad villain, but as a martyr and a warrior, who fought for Dawn and nothing else. His chapter is closed, his style of rule ended – but even now, the descendants of his followers maintain his statues, and worship their god, and keep the memory of his victories alive…"
 U39SicknessEightPurgeElse: "———\nElrandar Silverspite may have died beneath the Vanetavanem – murdered by the Interloper Ecaris – but his ideals did not die with him. Despite what people think of the First Kamrayakval, his mark on Orenvalyam is undeniable. His statues still abound, his apologists still defend him, his Kamrayakvalists still argue in his name. The Relic-Lord’s chapter is over, but the Oren Nayiru would not forget what he did for them… nor the methods he used to do so."
 U39SicknessEightFullPurge: "———\nElrandar Silverspite may have died beneath the Vanetavanem, but his ideals did not die with him. The state he created – hardened, imperial, militaristic – rules a united Aelantir cleansed of the Darkness by flame and blood, equal in might and power to the Precursor Empire of old. At the final hurdle, the Kavalakuttam balked – they did not think they could finish what Silverspite started. Maybe they were right… but as the centuries progress, and Orenvalyam only strengthens and bolsters itself, the faithful take a different opinion.\n\nIt’s only a matter of time. One day, the Dragon’s final pact will be fulfilled. One day, the Apocalypse will come."

 orenvalyam_events.46.a: "..."

 orenvalyam_events.47.t: "The End of the World, Part III" # The End of the WOrld
 orenvalyam_events.47.desc: "The two elderly High Kavalali, both Taychendi, sat silently as they watched the Kalavend. The smell of spice and Kotakompu steaks in the air, the barges sailing full in the still water, the children at play around their mothers and fathers as they tended to the fields, free, prosperous... it was beautiful. Idyllic. War had left Taychend long ago.\n\nSuddenly, the Reticent Kavalal spoke, eyes on the glistening river beyond. “Do you wonder what our descendants will think of us, after we’re gone? Those of us who… finished the job. Liberated Aelantir, but went no further.”\n\nThere was a pause as the Stalwart Kavalal thought over his answer. He had a monologue in his mind, just on the cusp of being perfect… but with a sigh, he discarded it: “I don’t know, brother… and I’m not sure I care too much that I don’t. There will be arguments… denouncing histories and accusatory narratives… and questions. So many questions…”\nThe Reticent Kavalal finished his sentence. “But that’s what it’s all about, isn’t it?” A nod, and the two returned to watching the sights once more.\n\nIt was a while before the Stalwart Kavalal spoke again. “There may be another turn…”\nA glance from his Reticent friend, reassuring: “they will argue against it.”\n“And yet they might not,” the Stalwart Kavalal said, shrugging. “They might pick the old crusade back up, try and conquer the world.” He sighed. “But I don’t think that matters either.”\nA pause– then the Reticent Kavalal grinned, and laughed: “there’s that stubbornness again!”\n“Hah– maybe this is stubbornness!” The Stalwart Kavalal replied. “An old man, defending the indefensible right up until he drops dead and can defend it no more. But this…?”\n\nHe gestured to the river… the tranquility. “The liberation of all Aelantir, the turning of the Cycle, the End of the World… If this is not Dawn… I don’t know what is.” The Stalwart Kavalal turned to his friend. “And I think, in my heart-of-hearts, that we made it happen. That we did something good… and that we did it by giving our all and then some. No matter the hardship, no matter the doubt, no matter our fear. What is that, if not something to be proud of?”\nAnd the Reticent Kavalal just smiled, and answered one question with another."
 orenvalyam_events.47.a: "“It’s the Taychendi way, isn’t it?”"

 orenvalyam_events.48.t: "The Rumbling"
 orenvalyam_events.48.descelse: "War was Aelantir. Crucibles from across the continent produced en masse blade and matchlock and spell-staff alike. The shipyards of Noruin and the Cleaved Sea assembled an armada in a day, raised the vessels that would carry them across the sea. The troops trained, and drilled, and hardened themselves for Dawn.\n\nOn the day of the invasion, as the armies and fleets of Orenvalyam gathered before him, the Kamrayakval was brought a container-cast-in-steel… warded, protected, guarded. Within was a simple collar, wrought-iron. But this was no slave collar: it was the instrument of the End. The weapon that would see their task through. And at last, the faith needed it once more.\n\nThere would be no slow-coaxing into Dawn’s project, this time. No struggle for control between weapon and wielder. No descent, no fall – merely ascension. This time, the Dragon knew what must be done. The Dragon had made his pact. Today, his new wearer was merely renewing it.\n\nThe Kamrayakval lifted the collar, and clicked it around his neck. And then, the rumbling.\n\nAn explosion of steam and smoke, seen by millions, felt by all Halann. A roaring-scream of scraping metal and ancient fury, primordial, ear-splitting, soul-piercing. And from the mist, arose a Dragon-in-Armour-Form. An eclipse-against the sun, twin-bladed, single purposed.\n\nThere was a knowing, an understanding – from the fey-forests of Eordand to the depths of Nanru Nakar, from the slave-markets of Fangaula to the High Temples of Haless, from the poorest beggar to the richest king – that the end of their world was nigh."
 orenvalyam_events.48.descSilverspite: "War was Aelantir. Crucibles from across the continent produced en masse blade and matchlock and spell-staff alike. The shipyards of Noruin and the Cleaved Sea assembled an armada in a day, raising the vessels that would carry them across the sea. The troops trained, and drilled, and hardened themselves for Dawn.\n\nOn the day of the invasion, as the armies and fleets of Orenvalyam gathered before him, Elrandar Silverspite stood before them – unarmoured. A rarity these days.\n\nHow long had it taken, to get to this point? How many sacrifices had he made? How many challengers defeated… detractors and dissenters eradicated. Half the world turned to one single purpose, by his will, his design. And now the machine he’d built waited for his order to conquer the other half. Just one campaign of many, to them.\n\nSilverspite frowned. A short, sharp pang of guilt, for not giving them a chance to rest, to enjoy even a taste of the paradise that they would buy with their blood. The thought passed, though. It was not for his time to rest, to wait, to stop and think. They still had a job to do.\n\nWith a semi-conscious thought, the Kamrayakval donned his Armour. And then, the rumbling.\n\nAn explosion of steam and smoke, seen by millions, felt by all Halann. A roaring-scream of scraping metal and ancient fury, primordial, ear-splitting, soul-piercing. And from the mist, arose a Dragon-in-Armour-Form. An eclipse-against the sun, twin-bladed, single purposed.\n\nThere was a knowing, an understanding – from the fey-forests of Eordand to the depths of Nanru Nakar, from the slave-markets of Fangaula to the High Temples of Haless, from the poorest beggar to the richest king – that the end of their world was nigh."
 orenvalyam_events.48.a: "That the Apocalypse had begun."

 orenvalyam_events.49.t: "Dawn"
 orenvalyam_events.49.desc: "In Cannor, the Kamrayakvalists repay the ravages visited on Aelantir by the Cannorians ten-fold. The great ports are shattered, stolen wealth and stolen relics sent back to whence they came. Anyone with a connection to the old colonies is considered a criminal, alongside the cities they made their homes, and are treated as such. But after the blood of the tyrants furrows the fields, the continent begins its long road to recovery – the peasantry and urban poor now on top. Some modicum of revolution, otf justice, sprouts amongst the bitter retribution. And the Apocalypse advances.\n\nIn Sarhal it is grim, tough work. The Khet – decadent slavers, by shackle or doctrine – turn the river itself against the Oren Nayiru, and yet fire can boil water away, and nothing is truly invincible, and they are exterminated. The Shadow Swamp too is scoured, the Swamp Trolls destroyed, hags slaughtered, vast incursions led into the Shadow Plane. And the Naga are overthrown. And the Gnoll packs are taught their lessons. And the Mengi chastened for their warlordism and slavery, as the warlords of Taychend once had been. And the Apocalypse advances.\n\nFrom there, Elven armies retrace the steps of their ancestors. In the Dwarovar, Orenvalyam brings Light to Dark. In Bulwar, the faith settles their doctrinal differences and fulfills their vows once and for all. In Haless, Orenvalyam empowers the Praxis, shatters the caste system, destroys the Eunuchs, sunders the Command and any who dares laud it, slaughters any Oni who will not kneel before justice. And yet the legacy of the Precursors still shackled the land – so the Oren Nayiru breaks the chains. The Rending kills many, before all, dead or living, are freed. And the Apocalypse advances.\n\nThe predictions are right. The Apocalypse is bloody. The Apocalypse is long. Arduous, torturous. Hundreds of years of death and loss and conquest and suppression. Hundreds of millions dead. Suffering unimaginable. And yet, it ends. Over the next thousand years and longer still, atop scorched plains and broken cities, atop the Dead, the forgotten, flowers bloom over the ashes of the old world. Remade, renewed. And the sun rises… and Dawn.\n\nCan you close your eyes, and place yourself there, so far in the future? Can you look around? Ask the people there it was worth it?"
 orenvalyam_events.49.a: "Can you find someone still alive who would say no?"
 
 orenvalyam_events.50.t: "Elrandar"
 orenvalyam_events.50.desc: "[Root.U39ThisHappenedALongTimeAgo]Elrandar Silverspite sat against his chair, struggled to stay awake, struggled to keep breathing, breaths jagged, pain coursing through his body. He was dying. This was it. So much left to do, but… even the Dragon knew his time was come. Was that sorrow, through the iron? Or pity? Or just… comprehension?\n\nThe Kamrayakval closed his eyes.\n\nAnd El woke up. There was no collar around his neck. There was peace… quiet. No rage, no wrath. A field of grass dotted with flowers, floating in a white void, an island in the sky. Dhivumanhu…or a dream, a hallucination before the end, and uncertainty. Probably the latter. But El liked his lies, his fictions. What was one more?\n\nA voice, familiar, from behind. Ceboranbu stood there, leaning on his staff, eyes stern. El frowned, said softly: “It’s you...” Turned back. Dejected. “It’s just… you.” The bearded Warden shook his head. “Do you really think, after all you’ve done, that she would want to see your face?” And the once-Kamrayakval just sighed, and understood. Elrandar rose to his feet, looked into the eyes of Ceboranbu, who before he murdered him had been his friend. “Everything I did… every terrible crime… it was for a reason. There was purpose. Would you tell her that?”\n\nCeboranbu frowned – his voice was grave. “Perhaps I may. Perhaps you would tell Velara yourself, one day…” He tapped his staff against the grass. A void-door opened behind him. “After all, you are now as the Dawn you think you won. You have forever to change, to reflect, to atone.” Ceboranbu the Warden looked to the grass around. “Or maybe you are satisfied with how it all turned out.” And then back to the person who had killed him. “I suppose it is your decision. You have that power, now.”\n\nEl stared into the void. Enjoyed weighing the possibilities. “Did I not, always?”"
 U39ThisHappenedALongTimeAgoYES: "This happened a long time ago.\n———\n"
 orenvalyam_events.50.a: "And so, for the first or final time, Elrandar Silverspite made his choice."

 ##### BOTTOM OF MT EVENTS #####

 orenvalyam_events.100.t: "The Kamrayakval's Heir" # Orenvalyam Election Event
 orenvalyam_events.100.desc: "The Kamrayakval is the leader of the Oren Nayiru faith, and the commander of Orenvalyam’s military forces. Though the Kamrayakval is technically first amongst equals, they are ultimately the last word, the last judgement, the last recourse. But no one person can rule alone – and what better trusted lieutenant than the one who would succeed them?\n\nNaturally, the character of whomever takes up the title of heir is of the utmost importance – and with their character, comes their politics.\n\nThe Monasticists, Kavalalists, and Kamrayakvalists have each rallied around their own candidate for the position, which will not only dictate the future leadership of the faith when [Root.Monarch.GetName] dies, but also bolster their faction’s power in the short term.\n\nWho will prevail? Who will one day lead the Oren Nayiru?"
 orenvalyam_events.100.a: "Choose a Monasticist"
 orenvalyam_events.100.b: "Choose a Kavalalist"
 orenvalyam_events.100.c: "Choose a Kamrayakvalist"

 orenvalyam_events.101.t: "Sword of Dawn, Voice of Reason"
 orenvalyam_events.101.desc: "At [Root.Capital.GetName], [Root.Monarch.GetName] [Root.Monarch.GetDynasty] was crowned Kamrayakval – Priest-Emperor of the Oren Nayiru. The High Kavalali of all the great cities of Orenvalyam, of both Taychend and the many lands beyond, each blessed the crown held aloft over his head – each took a word of the sacred mission they charged him with.\n\nAhead of [Root.Monarch.GetHerHim], the new Kamrayakval faces difficult choices, factional intrigues, war and conflict at home and abroad. It will not be an easy task, nor will it be a pleasant one – but in the end, they did not vie to be selected for the role, and prepare for so long to take up the mantle, for an easy nor pleasant life.\n\nOnly one question remains…"
 orenvalyam_events.101.a: "…now that [Root.Monarch.GetSheHe] has power, what shall [Root.Monarch.GetSheHe] do with it?"

 orenvalyam_events.200.t: "Protector"
 orenvalyam_events.200.desc: "Ranbu gave a yell as he fell back. They’d valiantly charged the breach, but the attack on the Kheionai fort was faltering. He threw an arm out as he saw a blade raised high, and prayed for Intercession.\nThen a storm of black and streaks-of-steel, crashing meteor-like from the sky. Ranbu stared wide-eyed as his executioner was eviscerated, annihilated – and the Kamrayavkal, wrought-armoured, emerged from the bloody mist. “Are you injured?” He asked, calmly. Ranbu shook his head. “Good. I’ve got a fortress to take.”\n———\nElrandar Silverspite, still clad in his armour, toured the ruins of the fort – returned the grateful soldiery’s gestures of faith and thanks, even as his mind wandered. Eventually, he came across the fool-Kavalal that had commanded the assault, talking with the Kamrayakval’s most trusted advisors, who had arrived after the battle – his Velara to one side and the High-Kavalal Ceboranbu the Warden, loyal since he had judged him at Uesrennu, to the other. “It was an incredible display!” the commander boasted. “Together, we attacked the breach– put the rebels to rout! It was–”\n\n“A slaughter? A near failure?” The Kavalal paled as Silverspite called across the yard. “Because you did not wait for me? Because you valued your own glory over Dawn? Over your warriors’ lives?” The Kavalal trembled like a terrified child at the oncoming storm – the soldiers around just grinned. “Or am I mistaken?” A tense pause – broken by Ceboranbu’s bellowing laugh, as he understood the situation: “Perhaps it would be wise for our friend to see what it is like to be first into the breach? The forlorn hope suits his courage, I think!” Silverspite grimaced beneath his helmet, paused: “...so it does. See to it, Velara.”\n———\nThat night Elrandar sat silently, picking at his food, collar uncomfortable around his neck. The Dawn Elf sitting across smiled pitifully. “You saved those soldiers, El,” Velara said, “and they love you for it. The deaths in the assault… they aren’t on you…”\nShe was right. “No. They’re not.” But she didn’t understand. He thought of that Kavalal’s face – the collar tightened. “They’re all on him.”"
 orenvalyam_events.200.a: "“And I should have killed him for it.”"

 orenvalyam_events.201.t: "Inheritor" # Formerly Emancipator
 orenvalyam_events.201.desc: "Elrandar Silverspite let the sights and sounds of the village wash over him. Ceboranbu the Warden waited patiently behind, ever-dutiful, ever-loyal. The birds sung alongside the children, prayer hummed faintly and the smell of Macriavolo spice and roasting Kotakompu steaks hung in the air.\n\n“The Interlopers, the warlords… they all wanted this. Could have had it, maybe.” Elrandar turned to the High Kavalal behind him. “But keep it? Blinded by their hubris, self-righteousness, hunger for glory… it would have slipped right through their fingers.”\n\nCeboranbu smiled warmly. “We will be different, my friend. You will be different.”\nBut Silverspite could only feel the iron-collar tighten, the pit in his stomach grow. A momentary glance at the village – a crack in his voice. “What if I’m not?” He turned back – faced what he’d tried to put off. “Tell me… what happened to my father.”\n\n“He lives – and we found him.” And the pit opened to a maw. “A recluse, a drunk. Hiding in some forgotten hole on the Dry Coast.” Silverspite remembered– an elven battle-mage, shimmering in pale-gold, holding his mothers’ hand, promising a return that would not come. Cloaked in false-Dawn. With each image Silverspite could feel the wrought-fingers of anger and vengeance claw at his neck. “Elrandar?” Ceboranbu roused him from his rising anger. “Do you want to confront him?”\n\nSilverspite answered with an explosion of steam and smoke. He stood suddenly, turned away, now-armoured hands held to his helm, claw-taut but trembling. Confront him?! Silverspite wanted to hold his father by the neck and slam his gauntlet into his face– beat him until he cried out that he was a fraud and a failure, just as his mother had screamed his name in terror as the mob tore her apart! Too miserable to even finish himself off! Well– he’d finish the job– he had too– he was the only one– and– and–\n\nSunlight cleaved through the mist. Silverspite whipped his head around to see, gasped as the village emerged from the parted smoke. A whisper-in-awe in reply, inaudible: “Dawn…?”\nAnd Elrandar Silverspite understood. The weight of his armour eased. No… he would not be blinded by his hunger for vengeance – he couldn’t afford to be. And so, he lied."
 orenvalyam_events.201.a: "“I don’t care what happens to him. To me, he died the day my mother did.”"

 orenvalyam_events.202.t: "Commander" # Formerly Liberator
 orenvalyam_events.202.desc: "Silverspite stood, his face a mask – a stark contrast to his Velara, who trembled with a righteous fury as she beheld the charred remains before them. Ambhen Kheionai rebels and their families, butchered by Oren Nayiru troops. “We were supposed to be better than them…” Velara whispered, temper simmering. “how could we have let this happen…?”\nThe Kamrayakval grimaced: “What would you have me do?”\n“What do you think?!” Velara turned quickly, fury blooming to flame. “Hang the ones who did it– dismiss those that stood by! This is a murderer’s work, not Dawn’s. Teach them that!”\n———\nSome weeks later Silverspite stood before his armies, arrayed before him. The troops that had committed the massacre stood to one side in ordered ranks, unarmed, guarded. The Kamrayakval’s eyes flickered through the condemnation in his hands once again – then glanced at those it condemned. He saw their crime in their expression… the blood they had shed. But he saw the loyalty too. To Dawn – to him. If he told them they’d done wrong, they’d submit to execution willingly.\n\nThe armour on his shoulders grew heavier again, the iron-grip tightening… the Dragon’s claws digging in. Could he see that same loyalty in those vipers in the Kavalakuttam? Would those guarding the condemned deny dreaming of doing the exact same thing? Would those who had been trodden under Ameion’s hobnailed boot call this killing a monstrous crime, or justice for a greater one?\n\nAnd yet… he looked back, to Velara. Her rage morphed to a pleading confusion as her elven instinct guessed at his intention. “El?” She asked, with quiet worry. So long ago, Silverspite had watched a different pyre – seen a different body burnt before it. He would be different – that was the vow he made. He turned to the soldiers again. There was more to that vow, of course.\n\nNo matter what he felt, no matter the cost, he would not fail. And If the price was blood, and flame, and ruin… then what choice did he have? Silverspite discarded Velara’s condemnation, and gave Nayiru’s commendation instead."
 orenvalyam_events.202.a: "For the soldiers, a pardon. For, Velara, betrayal. And for Dawn’s enemies?"

 orenvalyam_events.203.t: "Tragedy at the Fateweaver!"
 orenvalyam_events.203.desc: "The news struck Orenvalyam like lightning.\n\nThere had been an assassination attempt against the Kamrayakval at Korrimutren – the Fateweaver, which had given the gift of prophecy to so many, had been torn to shreds by an explosion of unimaginable power. The Threadbearer had been killed, alongside the Chamber guards. Their names were forgotten the moment anyone heard the other casualty, though.\n\nNot the Kamrayakval, of course – his armour, scorched-black and battered, had withstood the flame – but the next worst possibility. Velara Denazuir, Elrandar Silverspite’s partner, confidant and second-in-command - the last  voice of moderation and morality in his coterie - had been slain.\n\nThey say Silverspite was found cradling her heat-battered body in his arms, trembling in silent grief and fury."
 orenvalyam_events.203.a: "And they say the Kavalakuttam had something to do with it."

 orenvalyam_events.204.t: "Traitor"
 orenvalyam_events.204.desc: "Don’t hold back. Don’t think about her. Do what you have to do and don’t look back. They took her from you. They all deserve what you’re going to give them and more. They murdered her. Don’t think about her. They’ve only got themselves to blame. They murdered her. Don’t think–\n\nElrandar Silverspite burst into the Kavalakuttam chamber. The assembled Kavalali gasped. Some rose, probably to offer meaningless condolences. Thinking on their feet – nobody thought he’d be here, now, so soon, so-armoured. Even so, they probably thought he’d stop at the centre, talk talk talk. Silverspite was done talking.\nThe Kamrayakval marched to the front row of benches, to a High Kavalal with a braided-beard. The Kavalali gasped again, when Silverspite grabbed the high priest by the forehead and slammed the Traitor’s head into the marble chamber floor – shrunk back, at the metallic, primordial growl that emanated from the Kamrayakval’s armour as he did it. Today, the Dragon shared his pain.\n\nSilverspite hoisted the Traitor Kavalal up. Ok. Time to talk. The visor snapped around. “WHO ELSE?!” The voice from beneath seemed clad in iron, inhuman. The Kavalakuttam were stunned silent. Not good enough. Silverspite twisted his body, and slammed the Traitor Kavalal’s head against the ground again. Another draconic-snarl as he dragged the priest up. The near-corpse issued a pitiful half-conscious whimper. “WHO ELSE BETRAYED ME?!” No answer.\n\nThe rumbling laugh surprised even Silverspite. “So that’s how it is…?” He searched the rows of warlord-priests. “Every day I come in here… schemes and plots, dissent and discontent… and for what? Who do you think you serve…?” Another laugh, dry, grim. Obliterated by sudden rage. “MY WILL IS NAYIRU’S! MY MISSION DIVINE! AND WHAT,” he looked to the Kavalal, “IS THE PUNISHMENT FOR BLASPHEMY?!”\n\nAnd then he thought about her. Velara’s voice cut through the Dragon’s vice-grip, a phantom-pain. For an instant, the abyss opened up beneath him once more. Then “Elrandar!” came a cry from the crowd. Silverspite turned, smiled weakly as he saw Ceboranbu looking down horrified, saw the innocent loyalty, and the foolish concern. The Kamrayakval didn’t want to hear the latter. Instead, he turned away – back to the Traitor.\n\nShe was loyal, too."
 orenvalyam_events.204.a: "Silverspite crushed the Traitor Kavalal’s head like an overripe fruit."

 orenvalyam_events.205.t: "Avatar"
 orenvalyam_events.205.desc: "The ground shook as Silverspite struck the ground. He rose from the dust and debris, strode towards the centre of camp. “Company!” He commanded. “Attend me!” His officers followed without complaint… as did thousands of soldiers, watching from shattered buildings. Forget the Kavalakuttam, vipers and vermin – these were the warriors.\n\nIn a makeshift map scrawled into the dirt, his officers had devised a plan. They took turns to explain – the Kamrayakval would strike at a breach in the wall, where the rebels expected a frontal assault. The army would sneak through a set of hidden drainpipes, and catch them unawares. Total surprise, total annihilation.\nSilverspite cracked a smile – gave a curt nod. “We strike at dusk.”\nThe officers thumped their chests: “no mercy!” The soldiers roared approval: “NO WEAKNESS!”\n\nAnd from Dhivumanhu, a dead woman’s taunt. “I didn’t know this was strength, El!” Silverspite looked up from the map, searched the crowd. His soldiers thought he was regarding them – replied with beaming faces. Eventually, he found Velara’s spectre, a shifting void. A common hallucination, these days. Shadow-tears dripped down the phantom’s face: “You’ve fallen so far… how did it get to this? What have you become?”\n\nBut he knew, now. So he turned away, and told his warriors the truth.\n\n“I am among brothers!” It had been a long time coming. “I am among my faithful!” Through every rebellion and plot, every once-friend he slew. “The bearers of my divine mission!” Every glimpse at the shadow of his regret. “Those who view snivelling dissent for what it is!” And that dread realisation, that heavy burden? “Treachery! Cowardice!” That he alone could secure Dawn? That it would shatter like glass on his demise?! “But you are the BRAVE!” He knew it was the Dragon’s gift. “AND THEY ARE THE DEAD!” And he didn’t care one bit, anymore. “AND I KNOW NOW, BY WHAT RIGHT WE JUDGE THEM!”\nThe Kamrayakval turned the world. “I AM THE LIGHT IN THE DARKNESS!” The soldiers watched enraptured as he rose. “I AM THE SCALED-SWORD OF DAWN!” His wrought-black form an eclipse against the sun. Void-clad. Ray-crowned. “I AM NAYIRU REBORN!”"
 orenvalyam_events.205.a: "And so they hailed him their god, and they showed weakness no more."

 orenvalyam_events.2060.t: "The Watchman"
 orenvalyam_events.2060.desc: "For years, Ceboranbu the Warden had grown distant, cold. Now, he’d sent a sudden request for an urgent meeting in the Kavalakuttam chamber – just the two of them. The Kamrayakval strode wrought-armoured into the vast chamber. Ceboranbu was waiting, countenance dark and foreboding. “I could just have you killed.” Silverspite said. “But your service has bought you this courtesy. Make the most of it.”\n“Service.” Ceboranbu scoffed, the old elf looking over Silverspite’s armour with a disgusted look. “Is that all our friendship is to you now? First the Dragon corrupts your vision, your values, and now even your memories!”\n\n“Corrupted?” Silverspite felt muscle and scale tense in anger. “No–” He pounded his chest. “PURIFIED!” SIlverspite looked to the seats around them. “I see it all so clearly, now! Cowardice– weakness–” The shadows themselves seemed to shift. Illusion magic. Silverspite shot back a glare. “Betrayal.”\n“If my betrayal is all you see,” Ceborabu said, “then no. You do not see clearly. You do not see the faithful who recoil in rejection of all you do. The farmers who starve so that your soldiers may be fed! Millions are dead, Elrandar! Mothers, children– MILLIONS! Do you know?! Do you care?!”\n\n“You think I don’t know the cost?!” Silverspite cried, indignant. “Their blood buys VICTORY! That is all that matters–” He drew his arm back, clawed at his chest. “–That is all WE care about!”\n“WE–?! By the gods– I thought we judged our saviour, at Uesrennu,” Ceboranbu stepped back, astonished, “but we judged a slave! To his past, to his power– unwitting, unworthy!”\n“Unwitting…? You think I don’t know what the Dragon is doing to me?! Oh, believe me, I know it–” Silverspite rattled a laugh with iron-force, voice mocking, metallic. “I ALLOW IT! Let my bones be iron, my skin steel-scale– let my sabres be my claws and my armies be dragonfire! I AM your saviour! The Herald of Apocalypse– NAYIRU REBORN! And I’m done fighting what I am!”\n\n“You are not Nayiru Reborn.” Ceboranbu replied, simply. “You are Taychendi – the fight ends when you’re dead.”"
 orenvalyam_events.2060.a: "Then shock, and silence. Because Silverspite had heard those words before."

 orenvalyam_events.206.t: "Murderer"
 orenvalyam_events.206.desc: "“Velara…” Elrandar Silverspite said, mournfully, as he realised. “She told me the same thing...” Silverspite felt the Dragon recoil at the memory – his absence drained the rage, and left the dread. So Silverspite turned away. Remembered.\n\n“When I visited the Fateweaver… the Priestess gave me a prophecy.” Memories decades old flashed through Silverspite’s mind. “I couldn’t understand it. Needed to see myself. So I did.” Raw magic surging through him – the armour splitting, tearing at the arcane might. “The Dragon roared at the intrusion… but Fate told me plain.” A throne of the dead and dying. A lone warrior trudging towards him. Body of light, armour of bronze, a cape of flowing blood. Silverspite grimaced. “I didn’t like what she said.”\n“Elrandar…” Ceboranbu asked, grave, voice trembling. “What did you do?”\nA dead rattle of a laugh. “What do you think?” The Kamrayakval stared off into the past. “I destroyed the Fateweaver. Killed all who tried to stop me.” But that wasn’t what he was asking. “And then Velara arrived… saw. And she’d had enough. Said that I was weak, an eclipse against Dawn… that I’d damned us all…” The words nearly caught in his throat. “That my mother would be ashamed of me… that I had failed her just as my father had.” He shook his head, quickly. “And I just couldn’t take it.” And he couldn’t take it back, any more. “So I killed her.”\n\nDisbelief. Dour silence. “I covered my tracks well – obscuring steam, scorching smoke. Convinced myself that she’d been tricked by traitors, and the Dragon forced my hand. All lies. Doesn’t matter. Because you know what? Everything she said was true… everything you’ve said, has been true. Save one thing.” El turned at last to his once-friend. “I am not Taychendi, anymore. I am Nayiru reborn. I must be…” The metal cracked, for just a moment: “How else could I have done all this?”\nCeboranbu stared vacant. Whispered quiet: “Weak… so weak…”\nSilverspite smirked, so slightly: “Velara had that look too. Alone, the hatred. The pity.”\nBut the High Kavalal just shook his head, and drew his sword with a trembling hand. “No… not pity.” The Kamrayakval saw the shadows shift around him – the Oren Neraghul, come to slay a tyrant. “It is the courage. And in that, she will never be alone.”"
 orenvalyam_events.206.a: "They stood no chance. They drew no blood. Still, they fought to the end."

 orenvalyam_events.207.t: "World-Ender" # formerly Elrandar
 orenvalyam_events.207.desc: "The Kamrayakval trudged through the ashen ruins of his birthplace, wrought-armoured. The wind howled around him, a dry storm. The Armour didn’t recognise this place, and Silverspite knew it. “Do you see?” He whispered, tongue metallic. “This was home. You had one, didn’t you?” He passed the ruins of his old house – a flare of anger. “I know. They took mine from me too.” He found his hiding place nearby, some steel tomb of arcane purpose. Memories flashed. The metal walls closing around him, the heat nearly cooking him. The Armour didn’t like it. “It isn’t a good feeling, is it? Can you believe that I know?”\n\nSilverspite turned – noticed shifting shadows emerge from old houses, one by one. Phantoms, memories, hallucinations, fragments of the Dark… whatever they were, he cast them aside. “Tell me… do you hate me?” He asked, as he marched on, towards the hill that overlooked the village. “Or do you hate the world…?”\nThe shadows followed him. He recognised the faces in the crowd but cast them aside, scowling. Ceboranbu stepped out from the Dead chorus: “You failed us all!”\nElrandar ignored the voice– the voices- spoke past them to the Dragon instead: “Because I do…” His father stood out next: “We aren’t so different!” “Full of slavery, suffering, violence and vengeance…” Then a dead False-Traitor: “You were not worthy!” “And we’ve both made it worse, haven’t we…?” A Kheionai girl, innocent, half-charred: “We died for nothing!” “And I bet you feel like that’s your right, with all you suffered.” And his mother: “I was so proud of you!” “But that’s not enough… it’s never been enough.”\n\nAnd at last Silverspite came to where he’d buried her. The last time he’d been here, he’d brought a different companion with him – Velara’s spectre stood behind a grave not her own, despondent. She spoke with sorrow, with bitter disappointment: “You could have been so much more…”\n\nAnd the Kamrayakval replied, “I know.” He turned at last to the shadowed spectres that watched below. There were millions of them. The Armour fell silent at the sight. “But we still can be more. Both of us… together…” They looked out over the Dead. “We can make all this mean something.” And the iron-wrought wrath returned, cold, cautious. “So I’ll ask again: do you hate the world?” And then bold, ablaze."
 orenvalyam_events.207.a: "“Good.” Elrandar smiled. “Then let’s burn it down.”"

 orenvalyam_events.210.t: "Purification"
 orenvalyam_events.210.desc: "When the armies of the Kamrayakval conquer a new territory, the first thing they do is smash any remaining obvious resistance. Captured fighters are executed immediately, their corpses thrown into mass graves. Rebellious civilians are not being killed systematically yet, but they will be eventually. Old elites are judged by officers, killed or imprisoned as a rule.\nThen comes reorganization. If there are slaves, or serfs, they are freed – given a sword and sabre, and a position of authority over their old “masters.” Private estates are ransacked, land and wealth redistributed to the peasantry or sent back to Taychend to fuel the war effort. Everything changes. The world turns.\n\nThis causes upheaval, of course. Many die, many suffer. There is disruption, confusion – and the process often creates more enemies than allies. And yet, that is simply the cost of Dawn. To delay and dither trying to find a morally satisfying solution is the Exemplar way, not Silverspite’s. And so the faith advances.\n\nFrom now on, and while Silverspite still rules, provinces conquered by Orenvalyam will receive devastation, and as the faith grows increasingly radical, will eventually also suffer development loss. However, each conquered province will also prove Silverspite’s worth to the faith, increasing devotion – as ideals of the Oren Nayiru once thought unshakable are questioned and tested by the Kamrayakval’s continued rule, this will become very important indeed.\n\nAll that matters is victory, after all. What would it mean if the Kamrayakval could not secure it?"
 orenvalyam_events.210.a: "Keep me informed of the soldiery’s progress."
 orenvalyam_events.210.b: "The officers will do as they must. I have no need to know the specifics."

 orenvalyam_events.211.t: "A Line in Scorching Sand"
 orenvalyam_events.211.desc: "The mood was as grim as it could be. Each High Kavalal sliced their hand, let their blood drip into a bowl in the table centre – an oath of silence. Necessary security, considering one of those who might have taken it was currently being mopped up off the Kavalakuttam chamber floor.\n\n“This has gone too far…” the High Kavalal of Katelperai began. “Executing a High Kavalal in cold blood, no matter what he did?” “IF he even did it,” Ethanan interjected, “which we don’t know.” Nakar Mlerek: “And Velara?” Kriadvai: “The one source of moderation around the Kamrayakval…” Kilaiek: “Dead – and he fingers us for it!” Tirsin scoffed at that: “To be fair, we are currently scheming against him.” Katelperai shook his head: “Not scheming… discussing. As is our right – no matter what the Kamrayakval says. How has it gotten to this…?” “It’s the Armour,” Sthanan replied, “Yodhan suffered the same – getting madder by the year, corrupted by his draconic-plate.”\n\n“What sort of mad?” Asked Rakkabuttai. “He still seems sharp to me. And the soldiers still love him.” Tirsin: “My flock would revolt if he went.” Ethanan cut in: “And what of the farmer who tires of war? And the newly liberated, fingered for rebellion and treason, harassed and slaughtered?! They’d revolt if he didn’t!” Mlerek gave a gruff nod: “It’s him or Dawn. We simply must remove him.” But Rakkabuttai shot back: “And you think he will go along with it?! Vote against him, and you will end up like Sadarzhil!” Orenkoraim: “then we defend ourselves! Ecaris could have the power.” Kilaiek: “You’re not putting that damned colonizer anywhere near our sacred mission–!” But Vettakaramai broke the news. “You couldn’t even if you wanted too. He’s gone. Disappeared.”\n\nSilence followed – Katelperai cut through it with a sigh. “Still… we need a weapon. The longer the Kamrayavkal has control of the faith, the more his ways will take root. We tried to raise a hero to lead our faith, and he has spurned us…”"
 orenvalyam_events.211.a: "“...perhaps only an equivalent force can reverse this mistake?”"

 orenvalyam_events.212.t: "The Duskbringer Conspiracy"
 orenvalyam_events.212.desc: "Elrandar Silverspite – once, he was the shining future of not just the faith, not just Orenvalyam, but the world itself. Harbinger of the new cycle, Herald of the Apocalypse. But those dreams turned to blackened ashes in the fires of his crusades.\n\nMassacres, purges, bloody retribution. The faith has been plunged into a vicious cycle of revolt, reprisal, and recrimination. And with each burning city, every murdered priest, every subjugated people whose shackles were not broken but replaced under the name of “security”, the flame of righteous rage grows ever hotter in the hearts of Orenvalyam’s masses.\n\nThe Kavalali, of course, are the voice of the people. They cannot ignore the words of their flocks any longer – even as the soldiery, increasingly radicalised by the Kamrayakval’s campaigns, agitate themselves for his continued ascent. If Silverspite is to be removed from power, then every effort must be expended to convince the Kavalakuttam to stay the course…"
 orenvalyam_events.212.a: "…before it is too late."

 orenvalyam_events.213.t: "The Light Dims At Dusk"
 orenvalyam_events.213.desc: "Yesterday, three-thousand people died. Aging elves were dragged out of their homes and butchered before their families, and anyone tangentially related to them were rounded up and executed. Usually, that included their families too. In some places, attempts were made to resist. That resistance did not last long, even though so many fought bitterly for their lives, desperately holding on even past the point all seemed lost.\n\nEven Eldandar Silverspite made his appearance. In Ahartadyam yesterday morning, the city’s High Kavalal was having tea, unaware that the great conspiracy he’d found himself at the heart of had unravelled. The Kamrayakval suddenly crashed through the wall of his manse, grabbed him by the head, and leapt off into the night. They found his shattered corpse splayed on the ground a few miles away.\n\nThree hours later, he appeared again in Enlarmai to slaughter a high priest, his guards and his family and any who dared defend him. Five hours after that, in Kattisangamar. Early this morning, in Marhed Rayodana.\n\nThe High Kavalali have all gone to ground. Even those not involved in the conspiracy have retreated to the shadows. Yesterday, three-thousand people died, and in the end it will not matter, and they will try again, and they will not make the same mistakes.\n\nAnd yet, still, success. Because Elrandar Silverspite has bought himself time."
 orenvalyam_events.213.a: "And he needs all the time he can get."

 orenvalyam_events.214.t: "Grim Betrayal"
 orenvalyam_events.214.desc: "Twenty floors above the darkened streets of the city, the High Kavalali met once more. They were signing their death warrants just by doing so – someone would notice one of them enter, someone would tell. Then the Kamrayakval would come down to Nanru Nakar, and slaughter them all for their insolence. Today, though, they didn’t care. Because when he did, it would be the end of him. Katelperai had set a trap.\n\nEthanan: “And so we’ve agreed.” Royakottar: “Once he’s gone, we will be able to reassert control. The Kavalakuttam… what is left of it… is on our side.” Sthanan: “And we can raise enough troops to dissuade their forces.” “Even if we cannot assure their loyalty…” added Sibisimra. “But that doesn’t matter,” replied Katelperai. “Because the soldiers’ time is done. We will break their shackle-hold over us.” But his words were met with grim faces – by design, the means of execution had been obscured. At this meeting, it would be illuminated.\n\n“The method cannot implicate us, lest we be merely despised as murderers.” Katelperai stated. “The weapon cannot shatter against his armour, lest we be left defenceless.” He paused for a moment, remembered a time long past – when they had turned to a similar tool, and it had left them ensnared in the Dark. “But the flame must burn bright, so all may see the true reason this was done.”\n\n“And what is this method?” Asked Mlerek, hesitant. “This weapon of flame?”\n\nThe High Kavalal of Katelperai took a final breath. He consigned his fate to a Hero once again, and called his answer out clear: “INTERLOPER!”"
 orenvalyam_events.214.a: "And Ecaris Ecarizuir stepped out of the shadows."

 orenvalyam_events.2140.t: "The Will of One"
 orenvalyam_events.2140.desc: "Ecaris Ecarizuir, last Companion of Corin, Herald of Example, marched through the streets of Nanru Nakar. A thunderstorm raged, rain lashing against his Sunplate. Every flash of lightning illuminated the watching faces around him: hope, confusion, dread, anger. Still, the last Interloper marched, and raised his eyes to the Vanetavanem towering above – to the black shadow that thrust from the city’s cracked grey-stone. When the shadow disappeared, Ecaris halted, readied himself – he drew the Wishblade hanging on his back.\n\nA crack of thunder – an explosion of debris from behind him. The Kamrayakval fell from on high, an onslaught-in-wrought-iron, shattering the ground as he struck it. There was a primordial, metallic roar – as Ecaris turned to face him, Silverspite emerged from the dust, unbothered despite the Dragon’s rage, blades hung low, murder in his stance. “So it begins…!” He voice was Mechanim-like, strangely discordant. “Fate has shown me this moment– and lo–!” Silverspite gestured to the empty street. “YOU STAND ALONE! This is where your failures have taken you!”\n\n“Alone?” Beyond the duelling ground, Ecaris saw the wrath of the Dead beyond, gathering strength. He smiled, weak. “You will see there are yet heroes left, Kamryakaval.” But it faded in an instant. “The other thing, though…? Sure. My failures have taken me here. I remember looking out over Corin’s corpse, an age ago… each of the Circle felt it their own fault. But you know what? I was different than them.” He tightened his grip on Dazinkion, as the wrath crept into his voice. “Because if it had been me, standing before Korgus?” The next words were half a snarl. “I would have cleaved him in two!” Half a vow. “Kalinzuir, you will not escape my blade as he did!”\n\n“Not my name!” Silverspite rattled a laugh fused with rage. “But who cares? It DIES with you!” A sword struck out. “We will annihilate you so completely… bury the sickening taint of your self-righteousness, and your weakness, and your FAILURE…! And all the world will know, from the Cliffs of Ruin to the shores of the Suran, from the break of Dawn until the dying of the Light, that what I did was necessary!” The Kamrayakval turned the world, rose against the rain – “That what I did was RIGHT!” – and charged."
 orenvalyam_events.2140.a: "And so they fought, the Hero and the Dragon, at the end of the world."
 
 orenvalyam_events.215.t: "The Sons of Fate" # Dour Failure
 orenvalyam_events.215.desc: "A charge at terminal velocity, a dancing dodge, counter-strike and riposte. Not enough – another go. Skill and experience met vicious spite and older hatred. Both of them were exhausted, shattered. Still, they fought. Still, the crowd grew.\n\nEcaris broke Silverspite’s assault, sent him retreating into a burst of steam and smoke. Ecaris advanced, cautious– then an explosion of untrained magic from a hidden figure. Ecaris raised his blade, but another roiling blast sent him reeling. Then the Dragon twirled out of the mist, whirlwind lunging high, crashing down. Ecaris’ guard shattered, as his foe landed and lunged, twin-blades ready to gore. A quick-cast batted one away. The other pierced his gut.\nEcaris staggered backwards, disbelieving– the Kamrayakval made to step away. Then a false memory: Corin standing before Korgus, apocalypse nigh. To the end, a hero. Beyond it, an example. The weakest smile, then grim determination. Hope did not ride alone. In one, sudden movement, Ecaris drove his Wishblade high – cried “DAZINKION!” – and wrought Dawn’s Edge upon the Darkness.\n\nThe Kamrayakval did not expect it. Full strength, point-blank, the sheer power of the Wish crushed him. His draconic plate warped and cracked, split and rebound itself and split again. Hidden fire shifted beneath the scales. Ribs shattered. Lungs collapsed. Ecaris fell, mortally wounded. As Silverspite dropped to a knee, the Dragon roared – an overpowering scream of scraping metal and ancient fury. But through it all, a staggered, rasping sound broke through. A broken laugh, terrible and triumphant. He had–\n\nA thrown brick smashed the reverie. Silverspite crashed to his side, glanced up to see some petty labourer in the street. Eyes of hate. Eyes of courage. The Kamrayakval dragged himself up, half dead– snarled a gritted “Insolence–!” as he moved to kill. He did. And the Dead advanced despite it. “W-What?” He sputtered, as the crowd closed in. “Why…?!” And then surged, suddenly, a flood. “But I–?!” Shock. “I WON?!” Then murder. Silverspite killed hundreds as he lashed out. “I WON?!” But they didn’t stop. He tried to turn the world and rise, flee. They just pulled him down. “I’D WON–!” Pinned him down. “I’D–!” the Dragon seized him, suddenly– roared, writhed, raged, as the crowd pummelled its broken, battered scales."
 orenvalyam_events.215.a: "The Dragon tried to claw its way out. The Dead made sure it didn’t."

 orenvalyam_events.216.t: "The Heroes" # Foul Murder
 orenvalyam_events.216.desc: "Kriadvai threw up at the sight. Katelperai paled at the carnage, obscured as it was by the grey stormclouds above. After Ecaris had raised his Wishblade Dazinkion, [the x] and the watching, raging, desperate crowd had piled in, the Kamrayakval’s soldiers had tried to cut their way to their master themselves. But even as they were massacred from the rear, cut down in waves by shot and sabre, the crowd had not broken – the Taychendi people had climbed over their mutilated comrades to finish what was started. Now, the dead piled high in the streets, blood washing away with the rain. “There must be thousands of them...” Royakottar trembled, incredulous. “By all the gods, tens of thousands!” “Quickly, now.” An armoured Mlerek said, as he brought his own troops up. “We must secure the body.”\n\nSilverspite lay lifeless in his scorched and broken Armour, covered in gore, the murder weapon – a work tool, a long chisel – still rammed through his visor. Beside him lay a broken thing of flesh, slashed with pale gold: Ecaris, trampled beyond recognition. The Kamrayakvalists did not care about the Sun Elf, though – instead they stood over their master’s lifeless body, shocked silent, trembling with sorrow and trepidation. Some wept. When the High Kavalali arrived, one of the officers rounded on him, enraged. “Traitors!” He called. “You sicced the coloniser on him! We should cut you down!” But they didn’t. The rest of the Kamrayakvalists just watched. Their spirits had been broken by their failure.\n\n“He acted alone.” Katelperai lied, simply. “But it doesn’t matter. Silverspite ruled as a tyrant. Desecrated the sanctity of the Kavalakuttam. Defied Nayiru’s will.” The Kamrayakvalists merely shrank at the denunciation – outside the city, their comrades would not be so ashamed. “But this is the beginning of a new age – one where Orenvalyam is carried on the shoulders of all, not one!” A nod to Mlerek, and Katelperai brought the troops up, to take possession of Ecaris and Silverspite’s bodies alike, consigning both to history where they belonged.\n\nThe High Kavalal of Katelperai watched them work in grim silence. Then, high above, a shifting void in a person’s shape caught the corner of his eye. He turned to look, confused – but after a blink, he could see her no more."
 orenvalyam_events.216.a: "And as the last wisps of shadow faded, the sun broke through the storm."

 orenvalyam_events.217.t: "The Fall" # Victor
 orenvalyam_events.217.desc: "A charge at terminal velocity, a dancing dodge, a counter-strike, perfect. Not enough – another go. Skill and experience met vicious spite and older hatred. Both of them were exhausted, shattered. Still, they fought. Still, the crowd grew. The Dead watched their own execution.\n\nEcaris broke the Kamrayakval’s assault, sent him retreating into a burst of steam and smoke. Ecaris advanced, cautious– then an explosion of untrained magic from a hidden figure. Ecaris raised his blade, but another roiling blast sent him reeling. Then the Dragon twirled out of the mist, whirlwind lunging high, crashing down. Ecaris’ guard shattered; his foe landed and lunged, twin-blades ready to gore. A quick-cast batted one blade away. The other pierced his gut.\n\nEcaris staggered backwards, disbelieving, as the Kamrayakval made to step away. Then a false memory: Corin standing before Korgus, apocalypse nigh. To the end, a hero. Beyond it, an example. The weakest smile, then grim determination. Hope did not ride alone. In one, sudden movement, Ecaris drove his Wishblade high. Silverspite’s eyes went wide, as for an instant he understood.\n\nThen, the crack of gunfire cut through the storm. A shudder ran through Ecaris, choked his last Wish. His body crumpled. Silverspite dropped his last blade, caught Ecaris. Glancing down, Silverspite saw the ruin of Ecaris’ spine where the bullet had struck – glancing back up, he saw a simple soldier in the crowd, matchlock raised. One by one, the civilians in the crowd dispersed, faded away, phantom-like. They left only the soldiers.\nA small, sputtered cough, full of blood, was all that announced Ecaris’ survival, rapidly fading. The Kamrayakval laid him across the ground. A vacant whisper, from beneath the bloodied pale gold of Ecaris’ helmet. “Why…?” He whispered, looking high in the sky. Silverspite silently followed his gaze. “Why, Sarnagir…?” But the Phoenix was not there. Elrandar turned back, cried a whisper, almost giddy: “Now you know! Now you know…!” And the Herald’s eyes hollowed, and Ecaris died.\n\nThe soldiers approached their master, eventually. Wrath was written clear in their expressions. The Kamrayakval gave them the only orders they needed, whispered quiet as he stared down at the body beside him. They understood it completely nonetheless."
 orenvalyam_events.217.a: "“Kill them all. Be fast. Be thorough.”"

 orenvalyam_events.218.t: "Messiah"
 orenvalyam_events.218.desc: "Devand: A soldier pulls the writhing prisoner up, drags his blade across their throat. They struggle for a moment, before they die. He throws the corpse into the mass grave, and moves on to the next.\nVerten: An orc works at her farm in peace, the scars from the shackles once placed on her finally healing. Her child runs past her, waves. For the first time in so long, she feels hope.\nKatelperai: A girl tries to quiet her sobs in her hiding place. Above, the soldiers are hacking her mother apart – the woman’s last cry is for her dead husband. The girl prays for the Kamrayakval to save her. She doesn’t know he ordered it.\nTirsin: An aged veteran gathers his grandchildren around him. They love to hear Old Ranbu’s stories. This time, he tells them of how the Kamrayakval had personally saved his life, so long ago. How, side by side, they had fought for Dawn. For a better world.\n———\nElrandar Silverspite was in Nanru Nakar, again, sitting on the throne of the old Mudaliars. He stared down at the helmet in his hands. A face he hardly recognised was reflected in the pale gold – eyes darkened, iron-slag creeping across his skin, filling his scars. He did not often wear the Armour in its collared form, now; the Dragon was a second skin. That was true in more ways than one these days. He turned the helmet– noticed the shifting shadow watching from behind the throne. A grimace, then an explosion of steam and smoke. When it cleared, the Kamrayakval held only the crumpled remnant of a vanquished enemy. How it should be.\n\nSilverspite stood, walked through the vast throne room, towards the waiting city. He passed his guards, his Company, still loyal after all these years. A rarity, of course. They saluted him as he marched by – a smile passed his lips. At last, Silverspite stepped into the day, to his army arrayed before him, hundreds of thousands filling the street where he had won his greatest victory. To them, he was no villain… he was their saviour. Not just the Herald of Apocalypse, but of Dawn. He liked that. They both did."
 orenvalyam_events.218.a: "And so they raised their blade, and the crowd hailed them: “MESSIAH”"

 orenvalyam_events.219.t: "Condemner"
 orenvalyam_events.219.desca: "Nobody saw the Kamrayakval die, nor knew how it’d happened. He’d been fighting on the frontlines for a century – one of the wounds he’d received was bound to kill him eventually. They’d found him watching the sky through one of the windows of his palace, the collar of his Armour fixed around his neck. A click, and it came off, so easily.\n\nImmediately, the panic begun. His loyal and fanatical officers – not the High Kavalali, of course, whose remaining number had been thoroughly beaten into submission by the military that ostensibly served them – were the ones to re-establish order.\n\nIt was to some surprise, then, that when they opened the Kamrayakval’s will, they discovered it was not actually their job to. Nayiru-Reborn had ordered the Armour secured until it was needed once more, and the Kavalakuttam’s normal functions restored, and the most hardened policies of his reign – the mass executions, the uncompromising redistribution and harrowing retribution – set aside. There was a caveat to all of it, of course: when the invasion of Halcann came, when Dawn finally swept over the rest of the world, all of it would be needed again.\n\nThere was a muted surprise, at first. Some of the officers thought the words forged, but the old members of the Kamrayakval’s Company knew his handwriting well, and it wasn’t. They all understood eventually, though. When Dawn came at last, they could not live forever as if they were in Darkness. And besides… the Kamrayakval was not a fool. He knew the military could keep their relevance no matter what. He knew his people would not shy away from what needed to be done. He knew that he had made his mark. That his actions had locked-in-flame the destiny of Halann."
 orenvalyam_events.219.descb: "Nobody saw Elrandar Silverspite die, nor knew how it’d happened. He’d been fighting on the frontlines for a century – one of the wounds he’d received was bound to kill him eventually. They’d found him watching the sky through one of the windows of his make-shift headquarters, the collar of his Armour fixed around his neck.\n\nOne would have thought there would be panic. A struggle for succession, maybe. That was what Dawn’s enemies were banking on, as Orenvalyam continued it’s grim advance across Halcann.\n\nBut there was no such thing. Silverspite had told them clear what was to happen – take the collar, give it to [Root.Heir.GetName]... and finish what was started.\n\nAnd so they did. The collar came off so easily from Silverspite’s neck. It clicked so easily around the new Kamrayakval’s.\n\nImmediately, there was a roar– piercing metallic, as the Armour adjusted to its new wearer from within the burst of steam and smoke. But then a jagged figure arose from the mist… and with a gauntlet taut, clawed, smiled beneath their visor. There would be no slow slip into hardened rule – no slow coaxing into Dawn’s project… the Dragon knew what must be done. It had signed a pact, after all."
 orenvalyam_events.219.a: "And who could stop them now?"
 orenvalyam_events.219.b: "And so the Kamrayakval rose once more. And the Apocalypse continued."

 orenvalyam_events.300.t: "Monasticists Refuse to Fight"
 orenvalyam_events.300.desc: "The Monasticists have always despised Orenvalyam’s wars of expansion. They see them as a pointless waste of life, needless in the face of Nayiru’s eventual true return, when he, by his own overwhelming power, will sweep aside the enemies of Dawn and reshape the world.\n\nStill, even their hill-top monasteries have their obligations, as do Monasticists who live outside them. But with the Kamrayakval’s wars growing increasingly destructive, the monasteries  are beginning to shirk their levy dues. Unless we crack down, we are likely to lose a lot of potential soldiers."
 orenvalyam_events.300.a: "Who cares? They are cowards, not fit to fight anyway!"
 orenvalyam_events.300.b: "Crack down – they fight as faithful, or die as traitors!"

 orenvalyam_events.301.t: "Soldiers turn to Loot and Plunder"
 orenvalyam_events.301.desc: "Orenvalyam tries to hold itself to a higher ideal than other realms – its warriors are the agents of justice and liberation, not brutality and devastation. Yet as the Kamrayakval’s wars turn to maelstroms of blood and destruction and the fabric of the faith frays at the seams, this ideal too had been ensnared by Darkness.\n\nBanditry and brigandage, looting and plunder – the soil-and-flame banners of Dawn have been tarnished by the crimes of those who carry it. And yet… even as they commit these fell deeds, they still advance Orenvalyam’s frontiers, and win their Kamrayakval victories. Should we steer our armies back to the righteous path?"
 orenvalyam_events.301.a: "Don’t bother. They’re targeting Dawn’s enemies anyway."
 orenvalyam_events.301.b: "Hang anyone caught doing this!"

 orenvalyam_events.302.t: "Ideals Fracture"
 orenvalyam_events.302.desc: "Dawn is a place of high morality, of justice, equality, freedom, righteousness. And yet, with the ideals of the faith in tatters, the moral degradation of this dream is increasingly evident. Society has become increasingly corrupt, some Kavalali have even turned to accepting bribes, and everywhere merchants and traders have begun to take advantage of the cracks in Orenvalyam to further their own economic interests. If something is not done, this will only get worse."
 orenvalyam_events.302.a: "A worrying trend, to be sure."

 orenvalyam_events.303.t: "Outrage Spreads"
 orenvalyam_events.303.desc: "Once, the news of a victory over Dawn’s enemies was met with joy and celebration. Now, however, as many see the enemies of Orenvalyam increasingly divorced from the enemies of Dawn, every report of glory on the battlefield or the fall of a city is met with revulsion and outrage. The popularity of the Kamrayakval’s banners is in serious question."
 orenvalyam_events.303.a: "It is still glorious to fight for Orenvalyam though, isn’t it?"

 orenvalyam_events.304.t: "Opposition in the Kavalakuttam"
 orenvalyam_events.304.desc: "As the ideals of the faith have fractured, the Kavalakuttam – supposedly the beating heart of the faith, where all of the priestly Kavalali can share power equally amongst themselves – has been increasingly mistreated by the Kamrayakval.\n\nDisplays of intimidation, infringement on their rights and privileges, speeches denouncing the body’s members; the Kamrayakval is openly contemptuous of their indecisiveness, their constant debate and discussion. With the very ideals of the Kavalakuttam called into question, its members are naturally growing increasingly opposed to the Kamrayakval. What should be done about it?"
 orenvalyam_events.304.a: "To show discontent is their right – nothing can be done about it."
 orenvalyam_events.304.b: "A clear sign of their treason – we must bring them back in line!"

 orenvalyam_events.401.t: "Assassination Success!"
 orenvalyam_events.401.desc: "A storm of steel and illusion in the night, blades flashing, poison trickling, black cloaks fluttering. Were one lucky enough to spot them before they struck, they could not tell where they came from. After?\n\nWell, the Oren Neraghul makes sure to leave a message – let them know that their time has come, and that there is nowhere to run.\n\nLast night, death came for an agent of Darkness. Soon enough, Dawn will come for the rest."
 orenvalyam_events.401.a: "Justice and Vengeance go hand-in-hand."

 orenvalyam_events.402.t: "Orenvalyam Assassinates Our Ruler!"
 orenvalyam_events.402.desc: "Nobody saw them come in, but now all the guards and servants swear up and down that they saw a shimmer in the dark, a Taychendi nightblade shrouded in shadow and magic. They are only saying they were Taychendi, of course, because the assassin left a bladed-sun carved on the chest of our late ruler. A note, pinned with a dagger through their eye.\n\n“Justice knows no borders. Vengeance knows no sanctuary. Dawn knows no truce. This was the work of NAYIRU. Remember your crimes. We have not forgotten.”\n\nFury and outrage, chaos and pandaemonium – the shock of succession doubled under the rage and confusion. For decades Orenvalyam has slowly spread, a cancer on Aelantir, but to be so bold, so insolent, as to strike at the heart of our nation? Claiming justice, claiming righteousness?\n\nFor now, we deal with the aftermath of our late leader’s death. When we collect ourselves once more, however?"
 orenvalyam_events.402.a: "We will teach them the meaning of vengeance!"

 orenvalyam_events.403.t: "Assassination Failure!"
 orenvalyam_events.403.desc: "Even for a Taychendi nightblade of the highest calibre, not every operation goes smoothly. You might be discovered, or your weapon of choice – steel or poison or tight-wound cord – may not prove as effective as you’d hoped. Sometimes they fight back. Those are the trickiest nights of ones’ career.\n\nThe Oren Neraghul are an order of assassins, nightblades and shadow-walkers, however. They do not punish failure – they adapt, and learn, and try again.\n\nIn the end, this is merely a stay of execution…"
 orenvalyam_events.403.a: "Nayiru, after all, has already given his judgement."

 orenvalyam_events.404.t: "Embrace the Dawn?"
 orenvalyam_events.404.desc: "How long has it been, since we first heard the whispers of Orenvalyam? A great peasant and slave revolt sweeping across a land mostly unknown to us. Then approaching, slowly, surely, unimpeachably.\n\nThey say that in Orenvalyam, all know prosperity. That even the lowliest farmer lives as well as any trader or landowner in other lands, and that they justly and wisely rule themselves, without the need for arbitrary kings.\n\nThey also say that the Oren Nayiru’s armies number in the hundreds of thousands. That they surge forwards with matchlock-and-magic, obliterating their enemies with the righteous fury of liberation. They do not surrender and they never halt an attack.\n\nAnd now, Orenvalyam speaks for itself – and they ask us to join them, they ask us to place ourselves under their protection."
 orenvalyam_events.404.a: "How can we say no?"
 orenvalyam_events.404.b: "But could we live with ourselves if we said yes?"

