 # Gov reforms
 republic_of_free_peoples:0 "Republic of Free Peoples"
 republic_of_free_peoples_desc:0 "“By the grace of the Khet, divine and supreme, and by the power entrusted upon the common folk of Samsumbat, this glorious edict is proclaimed to all that reside within the borders of the realm. All cities and common dwellings of the realm shall hold the right to election and sanction their own leaders. Upon the burghers and peasants is entrusted the right of revolt when deemed appropriate.”"
 citizens_khet_steward_united:0 "Boundless Democracy"
 citizens_khet_steward_united_desc:0 "“Within the designated borders of the Republic, or within any of the realms associated with the Republic, all forms of indentured servitude, both of temporary or permanent nature, are banned. Citizens, residents and foreigners are all protected against enslavement or forced service, no matter race, occupation or creed.”\n\nWhen we took over the Stewardship, we outlawed slavery. Though our own laws forbade it, enforcing it upon our new denizens and subjects had until recently proven difficult. This now changes with the complete and binding codification of our anti-slavery laws into the constitution.\nAll races that live under the Republic are by default free within the bounds of the law.\nThe institution of slavery, which had for eons been an everyday part of life, has been banned and our people, alongside those who travel inside our borders, are guaranteed their freedom in perpetuity. Some interpretations of the constitution even claim that foreign slaves who visit our shores are free by default and that their contracts are immediately declared null and void."

 # Estate privileges
 estate_church_soldiers_of_freedom:0 "Soldiers of Freedom"
 estate_church_soldiers_of_freedom_desc:0 "Many of our soldiers were slaves, and they now fight all the harder to release others from their bondage, to rid the world of the slavers who would drag them back into darkness. This selfsame passion will lead to unrest if they see in their leaders a lack of will to spread freedom. There cannot be peace with our neighbours who engage in such vile trade."
 estate_ahati_pilgrim_guardians:0 "Pilgrim Guardians"
 estate_ahati_pilgrim_guardians_desc:0 "If one were to go on a pilgrimage from the coastal delta near Koroshesh to the vast basin of Lake Nirakhet, one would be exposed not only to sun and sand, but to more sentient dangers as well. From human bandits to gnollish raiders, from wild beasts to malignant apparitions, the pilgrim would encounter many a danger along the way. To guard them, the Ahati will be called upon - to maintain the forts and rest houses along the route and regularly patrol for dangers. As servants of the Mother Of All, the Ahati will hold fast in their duty as Her sword and shield, protecting the weak."
 estate_church_no_slaves_in_the_clergy:0 "No Slaves in the Clergy"
 estate_church_no_slaves_in_the_clergy_desc:0 "While the clergy did not employ many slaves for manual labour in the former empire, their presence was seen as a necessity. Carrying supplies, making records, appeasing the Khet - jobs that now require proper wages and recognition. The clergy of Nirakhet are going through some difficult adjustments, and who knows how understanding the Khet will be."
 estate_burghers_no_slaves_in_the_economy:0 "No Slaves in the Economy"
 estate_burghers_no_slaves_in_the_economy_desc:0 "Once, slavery was regarded as an everyday fact of life. Slaves did the jobs no free man or woman would want to do. In the mines, they carried the stones and the ores, on the farms, they cut the canes. For the most spoiled of men, they taught their children and in the warehouses, they kept the neverending records complete and accurate. Yet when we gave them their freedom, they did not outright abandon these jobs. Instead they demanded fair compensation and hours, and rightfully so. But without these indentured workers, our planters, merchants, and nobles need to adjust, the money they spend on wages increasing and their potential for investment temporarily hampered. But we will rise out of this period stronger than ever, an economy that creates opportunity for all!"
 estate_burghers_no_slaves_in_the_military:0 "No Slaves in the Military"
 estate_burghers_no_slaves_in_the_military_desc:0 "Slaves did much of the manual labour in the military - carrying supplies, building ships, caring for livestock, and so on. With their new freedom and demand for safety and equality, our military is going through some difficult adjustments."
 estate_mages_no_slaves_in_the_mages_guild:0 "No Slaves in the Mages' Guild"
 estate_mages_no_slaves_in_the_mages_guild_desc:0 "Record keepers, objects of experimentation, and even occasional novices - the role of slaves in the Mages' Guild of Kheterata was as diverse and dangerous as the other segments of society. After the great liberation, there is a need for new ways of studying magic and using it for the good of all, and the Mages' Guild is going through some difficult adjustments."

 # Steward reforms
 abolition_of_slavery_reform_title:0 "Abolition of Slavery @F60"
 abolition_of_slavery_reform_emperor:0 "Abolition of Slavery"
 abolition_of_slavery_reform_desc:0 "The institution of slavery has been a part of life on the banks of the Sorrow for as long as written history. But times change, as do our perceptions on the concept of “owning” another sentient being. Henceforth, slavery and all other forms of forced servitude will be abolished. This offers those in chains a new opportunity in life and ensures that all that live in the Republic are free from servitude or forced labor."

 joint_military_training_reform_title:0 "§MThree Sword Army§! @F60"
 joint_military_training_reform_emperor:0 "Three Sword Army"
 joint_military_training_reform_desc:0 "As the lands of the Sorrow are united, so too must be those that defend it. If we want to defend the Khet, the people and our republic, then unity amongst the ranks must be prioritized. All who have been recruited, whether by the Steward, the Ahati, or the Satrapies, will from now on train together in mixed groupings and participate in joint exercises. They will stand shoulder to shoulder, to ensure that they do so in combat as well. Officers and regulars alike will receive their training in central academies and camps, without any segregation by race, origin or social standing."
 streamline_trade_reform_title:0 "§MStreamline Trade§! @F60"
 streamline_trade_reform_emperor:0 "Streamline Trade"
 streamline_trade_reform_desc:0 "All are equal under the law, no matter their origin. This must then also apply to our trade. Before, all tariffs, taxes and other dues were regulated by the individual Satrapies that controlled the trade routes, which has led to a stark difference in pricing and regulation. To improve the trade network of the realm and its subjects as a whole, all forms of taxation and dues will be decided by the Republic and enforced on all who associate with it. Merchants can henceforth expect to pay the same duties in all corners of the lands of the Khet"
 intellectual_councils_reform_title:0 "§MIntellectual Councils§! @F60"
 intellectual_councils_reform_emperor:0 "Intellectual Councils"
 intellectual_councils_reform_desc:0 "All ideas are created equal, we say. All who are rulers or leaders within these lands are elected by the people, and through this, they decide which ideas of governance dominate and which do not. So why not apply this principle to the sciences as well? Are scientists, philosophers and engineers not also men of ideas? Perhaps not ideas of rule, but certainly of progress, of the mind and of technology. Must they not also abide by the will of the people in how and for what they conduct their research and experiments? To ensure a true democracy, those who work on its future must do so in the name of and by order of the people!"
 rights_of_the_labourer_reform_title:0 "§MRights of the Labourer§! @F60"
 rights_of_the_labourer_reform_emperor:0 "Rights of the Labourer"
 rights_of_the_labourer_reform_desc:0 "While we preach freedom for all, there is still a large section of the population who are, while legally free, still unable to go wherever and whenever they desire. Many peasants live under the enforced rule of large estate owners and are, by contract or sheer necessity, unable to move without the consent of the landowner. This practice, while technically not enslavement, must be abolished and rooted out, as no man or woman can be held against their will. All will be free to stay or leave as they desire, and none will have the right to force another to remain bound to their location."
 republicanism_steward_reform_title:0 "§MRepublicanism§! @F60"
 republicanism_steward_reform_emperor:0 "Republicanism"
 republicanism_steward_reform_desc:0 "In recent decades, we have been successful in enshrining republican, democratic and liberty loving principles into the cultures of the Sorrow. Having established this powerbase, we can finally expand our culture of just and honorable rule amongst our subjects. Not only will this ensure continued democratic rule in all corners of the realm, but it will also make our subjects easier to manage and integrate into our ever expanding state."
 inaugurate_pilgrimage_reform_title:0 "§JInaugurate the Pilgrimage§!@F60"
 inaugurate_pilgrimage_reform_emperor:0 "Inaugurate the Pilgrimage"
 inaugurate_pilgrimage_reform_desc:0 "Elikhet rules, Aakhet conquers, but only Nirakhet cares. Our republic is intrinsically linked to Nirakhet. As She cares for the common folk of the realm, so do we. As She wishes prosperity and freedom upon those living on the green banks of the Sorrow, so do we. We must thank the Mother for Her blessing and for Her continued care. Let us promote and facilitate pilgrimages to Niramit, and continue to thank Nirakhet for the ever growing prosperity and peace She has bestowed upon the lands we call home. Caravans filled with pilgrims will depart for the origin of the Sorrow and thousands will offer their gratitude to the great Mother who cares for all of us."
 hospitaller_brotherhood_reform_title:0 "§JHospitaller Brotherhood§! @F60"
 hospitaller_brotherhood_reform_emperor:0 "Hospitaller Brotherhood"
 hospitaller_brotherhood_reform_desc:0 "The Ahati were for a long time feared as rabid militants, hellbent on conquest and glory. Not only that, they were seen as untrustworthy and arrogant - how justified these fears turned out to be! Yet even their authoritarian revolt could not break the Republic. Their armies crushed and their spirits broken, they now kneel before us, begging for forgiveness. And forgiveness we will give, though we will not forget. They will be reformed to align with our principles and creed, a brotherhood not of conquerors but of caretakers. They will manage not only forts, but infirmaries as well. They will take care of not only enemies, but of the sick as well. Their swords will not only cut into hostile flesh, but cut away wounded flesh too. No longer will the Ahati only war with those they deem enemies, now they will fight hunger, disease and suffering!"

