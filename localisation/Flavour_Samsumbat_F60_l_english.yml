 # Rebels
 F60_agitator_rebel_effect_tributary_tt:0 "Become a §YTributary§! of §Y[This.GetName]§! and gain §G+50§! opinion of §Y[This.GetName]§!"
 F60_agitator_rebel_effect_satrapy_tt:0 "Become a §YSatrapy§! of §Y[This.GetName]§!\n"
 F60_agitator_lose_subjects_tt:0 "Every subject will gain independence"
 samsumbat_slave_agitators_name:0 "Slave Agitators"
 samsumbat_slave_agitators_army:0 "Army of Liberation"
 samsumbat_slave_agitators_desc:0 "These rebels are no simple mindless mob, they are slaves and agitators who yearn for freedom! They will not back down or lay down their arms, for death is preferable to servitude. They sing songs of freedom and yell cries of liberty!"
 samsumbat_slave_agitators_demand:0 "Freedom for all oppressed"
 samsumbat_slave_agitators_demand_desc:0 "This band of liberated slaves demands our current government steps down so a new peasant's republic can be installed, under the protection of Samsumbat."
