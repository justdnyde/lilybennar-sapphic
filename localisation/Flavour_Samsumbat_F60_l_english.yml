l_english:
 # Missions
 F60_guild_support_title:0 "Guild Support"
 F60_guild_support_desc:0 "“Of course we want what is good for our republic, but we mustn’t be hasty. All of the guilds are of one accord in this matter, [Root.Monarch.GetTitle]. We have all seen much change in recent years. Your government needs to demonstrate that you are willing to do the right thing, and not simply repeat the patterns of the past with new justifications.”"

 F60_the_first_amendment_title:0 "The First Amendment"
 F60_the_first_amendment_desc:0 "“The army has done very well, and Marshal Hazan deserves his place here in the People’s Council. As success follows success, we must decide now how best the military can serve the people. Should the lawfully elected [Root.Monarch.GetTitle] have decisive power in times of war? Or is it time to set up a sub-council to oversee the army? I think the debate will be interesting, to say the least.”"

 F60_the_fifth_amendment_title:0 "The Fifth Amendment"
 F60_the_fifth_amendment_desc:0 "“They certainly make one a little uncomfortable, no? How many humans have been killed by their claws and their knives, I wonder?”\n\n“And are we any better? How many humans have been killed by other humans, Pralup? We’re not here to debate whether they make you comfortable - we are here to decide if they can be allowed to live alongside us as equals.”\n\n“Why should they? What have they done for us? Have they fought for our freedom? No! They are the ones enslaving us! Keep them in their place, I say.”\n\n“If a person’s value depends on the actions of their entire race, well then, we might need to excuse ourselves, hmm? If we do not extend to them the same rights we humans enjoy, can we truly say we are liberators, or just another kind of oppressor?”\n\n“You go too far, councillor Huraam. They are nothing like us.”"

 F60_subsidise_freehold_farmers_title:0 "The New Smallholders"
 F60_subsidise_freehold_farmers_desc:0 "“I’m going, ma. I’ve made up my mind.”\n\n“Amina, you don’t know the first thing about farming. Why on earth do you want to travel so far? We’ve been miners for generations, and it’s a good, solid calling. What about your friends?”\n\n“Remember what you told me that time when I was ten and we saw that kid tormented? You said we all need to do our part to help others. Well, this is how I’m going to help. We all need food, ma, and they say things are much better than they used to be out there. I know I can make a difference in Kubaci, out west. I’m not little anymore.”\n\n“...don’t do anything stupid, okay? Your mother and I will miss you.”"

 F60_reform_the_economy_title:0 "Reform the Economy"
 F60_reform_the_economy_desc:0 "“You owe me ten crowns, Keta. I told you things would be worse. These southerners thought they could just come here, dethrone the rightful Steward, make some nice speeches, turn the economy upside down, and we’d be happy? Prices are up, lazy ex-slaves are loafing about everywhere, and young Benak who helps at the shop had the gall to ask to be paid more. I’m sure it’s even worse in the capital - Kheterat, the real capital.”\n\n“You complain far too much, old man. You just don’t like change. I’ve just come back from there and it’s not too bad. The government is paying to fix some of the roads, and I heard there’s a new shipyard under construction. The economy is–”\n\n“Are you listening to yourself, girl? What happened to the pride of the Hapremiti? Mark my words, no good will come of setting slaves free. It is not the will of the Khet.”"

 F60_reorganise_the_satrapies_title:0 "Reorganise the Satrapies"
 F60_reorganise_the_satrapies_desc:0 "“With this Act, by the power vested in this office of [Root.Monarch.GetTitle] as elected by the people, and with the consent of this august council, I hereby inaugurate a new body, the House of Equals, and welcome its first members. Its purpose henceforth is to provide equal representation for each of our constituent Satrapies and Medasi, regardless of their size or population. Each jurisdiction will select two representatives in a manner of their choosing. The specifics of their responsibilities is detailed in the bill that you have all read.\n\nThe Stewards of [Root.GetName] have never sought mere tributaries as our predecessors once did. My goal, and the goal of every [Root.Monarch.GetTitle], has always been the liberation of the common people, giving them a voice. The creation of the House of Equals is a great step forward towards that goal.”\n\n- [Root.Monarch.GetTitle] [Root.Monarch.GetName], Inaugural Address to the House of Equals, [Root.Capital.GetCapitalName]"

 F60_taafi_agitators_title:0 "Taafi Agitators"
 F60_taafi_agitators_desc:0 "“My friend, please, sit. Join us for a meal. You have travelled far.”\n\n“What makes you say that?”\n\n“Come now. You think we Taafi haven’t heard what is happening, that we don’t recognise the way you walk and talk? You should be glad we found you before someone else did. Not all of our…cousins…are as happy about what you are doing as my people are. We, on the other hand, would be very glad to see you succeed. I know you desire to see all enslaved people set free, and every tyrant toppled; we have the same goals. Our god Makan desires all to be free and happy, and to think I could see it in my lifetime…we can be your mouthpieces: messages of hope, messages of righteous vengeance. We can be your tools: distractions along the borders, disruptions to trade routes. If the Steward is who we think, then, please, let us help you.”\n\n“Well, many hands make light work. Alright, here’s the plan…”"

 F60_iron_trees_iron_chains_title:0 "Iron Trees, Iron Chains"
 F60_iron_trees_iron_chains_desc:0 "“The time has come. For generations, our tribe swam against the tide of the surrounding cultures, shunning the slave trade that defines so many of our people. With the ascendency of this new Steward of the Sorrow, we are close to seeing our dream realised. Our warriors, Taafi and [Root.GetAdjective] together, are poised to free those trapped in the most inhumane environments. The work done in the next few days will ensure that our children’s children can grow up in a world without the fear of being kidnapped, forced to toil in the cruel mines until an early death - a fate many of our kin have seen. So, brothers and sisters, put on your armour, take up your sword, and fight with me!”"

 F60_a_great_union_of_states_title:0 "A Great Union of States"
 F60_a_great_union_of_states_desc:0 "“...did you hear? Seems we’re all citizens of [Root.GetName] now…”\n\n“...I still don’t trust those humans, but they have kept their promise of stability they made to us…”\n\n“...things do seem to be more stable in Fangaula since the unification….”\n\n“...not just a gnoll, thank you very much, but I am [Root.GetAdjective] first of all, same as you…”\n\n“...these politicians think they’ve done so well, but we’ll see how it lasts…”\n\n“...we’ve shown the world that we don’t need kings or emperors. By the grace of the Khet, we have risen to the challenge of a new world order…”"

 F60_build_the_resistance_title:0 "Build the Resistance"
 F60_build_the_resistance_desc:0 "“We cannot fight alone, my lord-”\n\n“Must I keep reminding you not to use that title, Councillor Noratemin?”\n\n“My apologies, [Root.Monarch.GetTitle] [Root.Monarch.GetName]. As I was saying, we need allies. We may not agree with their policies, but if we are to free our enslaved brothers and sisters, rather than be ground into the dust at the outset, we need to make overtures to the neighbouring leaders to build our own coalition. We cannot allow our dream to be suffocated by stubbornness.”"

 F60_humble_the_slavers_title:0 "Humble the Slavers"
 F60_humble_the_slavers_desc:0 "“I couldn’t believe my eyes. I’d heard rumours of the army, coming from the south, freeing slaves instead of taking prisoners, but to actually witness it…my old master, curse his name, tried to fight, but his little band of thugs and the Medaka’s watchmen were no match for those warriors with fire in their bellies and hope in their heart. Despite the rumours, I still expected to simply be taken as spoils, but as I knelt in the dust, the captain himself came up to me, gave me a sack of supplies, and said I was free. So I came here, hoping to find my family after all these years, sir. I give thanks to mother Nirakhet every morning I wake up no longer a slave.”"

 F60_we_can_free_them_all_title:0 "We Can Free Them All"
 F60_we_can_free_them_all_desc:0 "“Mark my words, friends, it will come to a violent end. These Tijarikheti think they can march up here from their lake and just free slaves left and right? They have no idea of the damage they are doing. Besides, I treat my slaves pretty well. Only one of them died last year.”\n\n“You talk like they are going to be here in Kaa Hava tomorrow, Ntomsa”\n\n“Damn right. The other Medasi are falling like flies, though I don’t really understand how a bunch of freed slaves are so good at war. They’ll be here soon, upend our whole society, and if we’re still alive we’ll be cleaning up the mess. Hopefully I’ve still got a shop by then. I wouldn’t want to be a slave trader right now.”"

 F60_cast_down_the_hunters_title:0 "Cast Down the Hunters"
 F60_cast_down_the_hunters_desc:0 "“These cowards think they can challenge us? My five year old daughter fights better than these cave-dwelling worms. For generations we have shown we are the mightiest of the Sarhaly, enslaving the weak as is our right. They think they can upend the natural order of things with such carelessness? Freeing these slaves makes them soft. Let us show these cat-worshippers what happens when little lambs walk among the lions. We are Ndurubu! We hunt!”"

 F60_formalise_satrapies_title:0 "Formalise the Satrapies"
 F60_formalise_satrapies_desc:0 "“I believe it is time for a new committee, one dedicated to advising this government on how best to integrate our new neighbours. Whilst they are not tributaries in the traditional sense, that existing diplomatic framework is a satisfactory starting point. Our republic has already had a greatly positive impact in Horashesh, Fangaula, and of course Kheterata herself, but we need more structure. Councillor Nasuh, I charge you to assemble such a group, and as your first order of business to draft new laws for the better co-operation and co-prosperity of our states”"

 F60_reform_the_ahati_title:0 "Reform the Ahati"
 F60_reform_the_ahati_desc:0 "“If we are going to give the Ahati Brotherhood official status in the government, we must be prepared for all possible consequences. Yes, they have helped us immensely in toppling the corrupt Steward and keeping order in the aftermath, and their meritocratic processes are admirable. However, I am concerned about the strength of their dedication to Aakhet. I’m no priest, but it borders on heresy.”\n\n“Let the priesthood and the religious minister worry about that. I’m sure they are as devoted to Nirakhet as you and I. I’m telling you, we will need them - a force outside of the government to hold it accountable. As long as there are measures to prevent them accruing too much power, it could ensure future generations don’t fall under the same tyranny we worked so hard to escape.”\n\n- Excerpt, Minutes of the 17th Constitutional Session of the People’s Council"

 F60_dragonsworns_disgrace_title:0 "Dragonsworn's Disgrace"
 F60_dragonsworns_disgrace_desc:0 "“The Ahati were given power outside of the normal structure of government, partly due to respect for tradition, and partly to act as a check against corruption in the elected officials. Unfortunately, the hope that they would prove less corruptible than politicians was ill-founded, as their great rebellion has shown us. Despite swearing allegiance to our Mother Nirakhet and vowing to abandon their former bloodthirsty ways, the Ahati too proved fallible. We needed a new structure. Decentralisation of power has remained a priority, and so a new group of judges has been appointed.\n\nMy colleagues and I stand before you to fulfil that role with humility. Together, the [Root.Monarch.GetTitle], the People’s Council, the House of Equals, and now the Chamber of Justice shall keep our state on the right path, greater than the sum of its parts.”\n\n- High Magistrate Nilmira, Inaugural Address to the Chamber of Justice"

 F60_reform_the_navy_title:0 "Reform the Navy"
 F60_reform_the_navy_desc:0 "“To all who want to protect their families! To all who cherish the freedom we have fought for! To all who feel the call of the sea! As Grand Admiral I make this charge to you: join me in keeping our land safe from envious kings over land and sea. As our grand navy takes shape, we need brave men and women to play their part in protecting our shores. I know we are a people more comfortable with solid ground under our feet, but the world is changing, and we need to adapt. If you can dig, you can row! If you can fight, you can sail! For honour and for liberty, to all who would take courage and fight on a new battlefield, I say: to me!”"

 F60_liberate_the_old_colonies_title:0 "Liberate the Old Colonies"
 F60_liberate_the_old_colonies_desc:0 "“Those Kheteratans are an odd lot, aren’t they? I’m seeing more and more of them at the markets, yammering about ‘freedom this’ and ‘limits of government that’. I’ve seen a few arrested for causing a ruckus down by the port. Apparently they used to own this island or something. I don’t know about that - I was told even my grandaddy’s grandaddy didn’t know a time before our family came here.”\n\n“I actually went there on a trade run last month, to Sarhal. Laín, it was amazing - people debating in the streets about some new law, and no-one getting arrested. The architecture is so different to what I thought - I always imagined that place being very backwards, stuck in the past, but since that revolution they had…”\n\n“You don’t think it’s good, do you, Celia? You think a bunch of nobodies like us can run a country better than the king?”\n\n“Hard to really say, my friend. The world is changing, that’s for sure. I think things are going to change here in Jurith, too.”"

 F60_republican_agitators_title:0 "Republican Agitators"
 F60_republican_agitators_desc:0 "“Good people of Muhaqaar! It is time to stand up! These tyrants cannot hold you down. [Root.GetName] is ready to support you - do not give up hope! We have shown the world that kings, emperors, even mages most wise, are no better than the rest of us - that the people are more than capable of ruling themselves. The same freedom is possible for you. Our armies are ready and our will is unbreakable. Rise and fight with us! They will arrest me, they will silence me, but our struggle will go on!”"

 F60_liberate_the_lake_title:0 "Liberate the Lake"
 F60_liberate_the_lake_desc:0 "“Magic has been given to us for the good of all, not only those who directly wield its power. Many of my brothers learned their craft in that Tower, and we look back with shame at the things we did. Honourable councillors, you must act! We all understand the curse of slavery, and every day that we tarry, more cruelty is enforced on the enslaved families under that cursed spire. I know well how men fear the mages of the tower, but take heart - know that my guild will fight for Samsumbat. I give my word as Magister. The Tower of Muhaqaar must be liberated, and the lake of our mother Nirakhet along with it.”"

 F60_prepare_to_unite_the_sorrow_title:0 "Sorrow’s End"
 F60_prepare_to_unite_the_sorrow_desc:0 "“[Root.Monarch.GetTitle] [Root.Monarch.GetName], I speak for the whole council when I say that the time to liberate the Mother’s Sorrow is nigh. We have seen much success during our campaigns in Horashesh and Kubaci, yet the oppressed still cry out for release from their bondage to the corrupt Steward.”\n\n“I agree, Councillor for War. Unless any of the other members have any objections?”\n\n“…”\n\n“You have my authority to begin preparations. Send out our spies. Begin sharing the message that liberation is coming. Make sure the army is ready. They will all see that we will not give up and will not be stopped. Soon, we march, and the enslaved will be set free.”"

 F60_burn_it_down_title:0 "Burn  It Down!"
 F60_burn_it_down_desc:0 "“Fear not, brethren! Revolution is coming. The strong arm of Samsumbat, liberators of Kheterata, bends to break your bonds…”\n\n“...our agents have done their work, sir. Large groups of former slaves have been armed and are waiting for our banners on the horizon. They won’t know what hit them…”\n\n“...and so, forget not why you fight, men! That fear you feel, the tension, the righteous anger - use it! The men, women, and children of the Sorrow will look to you as heroes…”\n\n“...but don’t overlook how much disruption there will be, sir. Upending a hundred generations of slavery in a day will not be simple.”\n\n“No. But it is right.”"

 F60_a_new_steward_title:0 "A New Steward"
 F60_a_new_steward_desc:0 "“Put your backs into it! You’re not getting paid to have fun! This pier needs to be repaired before the next grain shipment comes from downriver. After that, the warehouse needs fixing, and then we’ve got some homesteads to rebuild. The Liberation War might’ve only lasted half a year but it’s going to take a bit longer than that to fix the place up. What do you think we did all this for, huh?”\n\n“Well, technically–”\n\n“Don’t you ‘technically’ me, Samir! The [Root.Monarch.GetTitle] is doing a pretty good job at making things better and we all need to do our part!”"

 F60_gold_and_iron_title:0 "Stormbreaker"
 F60_gold_and_iron_desc:0 "“We found something, master archivist. We’ve been cataloguing the records in the libraries at the old capital - it’s amazing how far they go back - and there are actually eyewitness accounts of Elikhet as he fought the Storm Queen! It says here he actually made a vow that the people of Akasik would never be enslaved. Later Stewards seem to have conveniently ignored it after he fell.\n\nI’ve spoken to my fellows who have travelled the region, and this incident has been passed down in the Akasi religion ever since. I know we have many priorities, but I really think this is urgent. Past Stewards, the gnolls, and the Cannorians have been oppressing them despite Elikhet’s command! We must help them, and soon. We must show them that we haven't forgotten them, that things can be better. Our people understand the despair that comes from slaving away in the mines.”"

 F60_reform_the_army_title:0 "Reform the Army"
 F60_reform_the_army_desc:0 "“I’ve been in the army my whole life, son - trust me when I say it could be a lot worse than this. Endless drills? Polishing your armour until it gleams? Getting shouted at again and again? You’re lucky - when I was your age, my family lived in one room, all twenty-six of us, with no furniture. I would get up before dawn every day, trudge a mile uphill in winter’s chill, train for hours, then be thankful for some tea in a cracked cup. This is luxury in comparison, so chin up. You’ll be thankful for the drills when you’re facing down an army trying to kill you. The new commandant knows his stuff.”"

 F60_knocking_at_their_door_title:0 "Knocking at their Door"
 F60_knocking_at_their_door_desc:0 "“Soldiers of the Akal, attention! There are more and more reports of hostile agents among the populace, inciting rebellion against their lawful liege, chosen by Surael. The so-called Steward thinks to cow us with some sabre-rattling and harsh words. We are to increase patrols to remind our people who they owe their loyalty to, who protects them, and that Surael’s light exposes evil deeds in the dark. If the river-worshippers want violence, then violence is what they shall-”\n\n“NOW!”\n…\n…\n…\n“Alright, that’s another squad dealt with. Good work, all of you. The army is on its way, and soon another tyrant in Bulwar will fall.”"

 F60_topple_the_phoenix_kings_title:0 "Topple the Phoenix Kings"
 F60_topple_the_phoenix_kings_desc:0 "“Finally, we’re to be rid of these vainglorious kings, little Zifa. I’m sick of coughing up gold for their wars and only getting paid back pennies. The elves have been telling us they are our protectors for generations, and what do we have to show for it? Squabbling nobles, gaudy palaces, and an economy no better than the human kingdoms across the Divenhal.”\n\n“I can’t believe you would say that. Does our position in this city mean nothing to you?”\n\n“Well, I didn’t mean it like that. It’s just…the [Root.GetAdjective] [Root.GovernmentName] pays its debts, and seems to care about people outside the palace. Don’t you think things could be better? Don’t you think an elected council would be more reasonable than the Akal?”\n\n“Melkaz, I love you, but I think you need to keep these opinions to yourself. You start calling for revolution in the marketplace, you see how quickly our family is reduced to penury”"

 F60_the_old_republic_title:0 "The Old Republic"
 F60_the_old_republic_desc:0 "“We stand here at the crossroads of our destiny. If we head down one path, we turn inwards. Satisfied with our work, we may rest and reassess, develop our industry, and improve the lives of our citizens. We can rightly be proud of the changes we have brought to Sarhal.\n\nThe other path, though…my friends, down the other path, we forge ahead. We do not rest, thinking our work is done. Down that path, we listen to the cries of those who still remain chained. With eyes wide open, with Nirakhet watching over us, with fire in our hearts, we keep marching! We cannot rest! I look to the north, and I see an empire that crushes its people. Before that empire, there was a republic. Before the emperor, there was a senate. Before the tyrants, there were statesmen. Once again we have shown the world that the people’s rule is inevitable. No more will the citizens of Anbennar be slaves to despots. No more will they toil for nobles who care more for the purity of their bloodline than feeding their people. No more! I know you will choose the right path.\n\nThe fire of this revolution will burn down every state that oppresses its people!”\n\n- [Root.Monarch.GetTitle] [Root.Monarch.GetName], Record of [Root.Monarch.GetHerHis] Final Address to the House of Equals and People’s Council"

 F60_phoenix_agitators_title:0 "Phoenix Agitators"
 F60_phoenix_agitators_desc:0 "“Crathánor has always been at risk of being swallowed by the kingdoms that surround us. Everyone here knows how many smaller states have been engulfed by these Phoenix Kingdoms in recent decades. Our money can only protect us for so long - eventually, some king or another will decide it’s better to take it by force. I firmly believe this is the time to join forces with other states who have the same attitude towards government that we do. Mayor Lucián, you’ve seen what the [Root.GetAdjective] have achieved in Sarhal. Their agitators are already making their influence known in Bulwar. Let us not be left behind.”"

 F60_unite_the_mountain_splinter_states_title:0 "Unite the Splinter States"
 F60_unite_the_mountain_splinter_states_desc:0 "“We are all brothers and sisters. We have all been abandoned by the decadent kings of Kheterata, those who style themselves gods. If we are to survive the coming decades, surrounded by the remains of power-hungry empires, we must be united. As fellow worshippers of Nirakhet, I beseech you on the behalf of the people of [Root.GetName] - stand with us. We do not need more war. Know this, however - we are ready to back diplomacy with force. Sarhal will be liberated from the chains of tyranny, one way or the other.”\n\n- Yinhunya, Ambassador to [F62.GetName], Record of First Audience with [F62.Monarch.GetTitle] [F62.Monarch.GetName]"

 F60_help_them_rebuild_title:0 "The Iron Makers"
 F60_help_them_rebuild_desc:0 "“Lawuli! You old coot! I never thought I’d see you again. It’s been decades! It’s a pity we ended up on different sides of the border. Seems that your king-”\n\n“He’s not a king, actually. We voted for [Root.Monarch.GetHerHim]. [Root.Monarch.GetHerHisCap] title is [Root.Monarch.GetTitle]”\n\n“...huh. [Root.Monarch.GetTitle] then. Anyway, seems [Root.Monarch.GetSheHe] has some drive, and looks like [Root.Monarch.GetHerHis] army fights well. I thought we’d be seeing the farm pillaged, but it’s not been too bad. Some of your soldiers are there now, fixing the fence they knocked down during the battle. They’ve started calling them the Ba-Temin - you know, iron nails for fixing, iron swords for killing. I’m impressed, actually…”\n\n“I’m telling you, Tem, this place is different. We’ve all wanted freedom, real freedom, for so long, and we’re finally doing something about it. We need to help each other now, ‘cause those other kings aren’t going to like what’s going on here…”"

 F60_show_them_the_way_title:0 "Show Them the Way"
 F60_show_them_the_way_desc:0 "“The great Elikhet saw the equal worth of every person, no matter their birth, yet his successors set themselves above others, enslaving their brothers and sisters, corrupting his teachings and those of his mother, Nirakhet. We are all of us Her children, and She welcomes you with open arms. Come, walk away from your misguided worship. You have been led astray by clerics more concerned with power than righteousness. Here, on the shore of the sacred lake, together, we can build a new future.”\n\n- Nyadwa, Collected Teachings, Volume 1"

 F60_reform_the_clergy_title:0 "Reform the Clergy"
 F60_reform_the_clergy_desc:0 "“You cannot simply tear down an institution that has stood for over a thousand years and expect things to keep working smoothly, [Root.Monarch.GetTitle] [Root.Monarch.GetName]! We have served the Khet and protected Elikhet’s scripture from corruption since before you-”\n\n“Enough, Hierophant! You forget your place. I am the Steward, not you. We have a mandate from Nirakhet herself, Mother Of All, and we will see every slave free. Your order needs to adapt.”\n\n“It is far from simple. Centuries of tradition, uprooted. Myriad holy orders thrown into disarray by this brash proclamation. We could have moved a bit carefully-”\n\n“What’s done is done, Waset. The world is changing for the better. I suggest you get used to it.”\n\n“...Yes, my Steward. May Elikhet watch over us.”"

 F60_convert_horashesh_title:0 "Convert Horashesh"
 F60_convert_horashesh_desc:0 "“I am hopeful about things here, your eminence, though there are still challenges. The locals are responding more than I’ve seen before, and I feel more connected to the Horasheshi. However some of my colleagues continue to rail against the changes they have been forced to endure recently, insistent that they cannot perform Her work without body slaves and scribes. Personally, I think the work [Root.GetName] has done to improve the lot of the commoner and care for the temples here has been a boon. Perhaps a little more time to adjust would have been helpful, however.”\n\n“You are not alone in that sentiment, brother Zimudar. It has been a trying time for our entire order. Continue your good work here in Horashesh, and Mother Nirakhet will reward you.”"

 F60_the_eleventh_amendment_title:0 "The Eleventh Amendment"
 F60_the_eleventh_amendment_desc:0 "“Politicians are all the same, son. Big promises, then once they’re in, perks for their mates, and us little people are left with the scraps. I’m not sure the [Root.Monarch.GetTitle] is better than a king, personally. Someone ought to shake things up over there. But what do I know? I’m just a farmer. Maybe if those self-important peacocks knew what it was like to work with their hands, they’d have a different attitude towards power.”"

 F60_a_new_constitution_title:0 "A New Constitution"
 F60_a_new_constitution_desc:0 "“They've been in there for weeks, friend, just arguing it seems. One hundred delegates from around the republic, trying to agree on a new constitution. The old one seemed fine to me but I guess with all these new states it needed some polishing. My daughter works in the kitchen, you know, and she tells me she’s been run off her feet, catering for the debates that go into the night. I pray the end result is worth it. I’ve seen enough change in my life to know it’s always a bit messy.”"

 F60_invest_in_infrastructure_title:0 "Built in Brick, not Blood"
 F60_invest_in_infrastructure_desc:0 "“Da! Da, look! They are knocking down the old palace! And over there! A new building! Wow, it looks so big. Are you going to help build it? Can we watch, da? I want to be a builder when I grow up. I'm strong. Watch me pick up this big stone…”\n\n“I’m sure you’ll be a great builder one day, son, just like your grandfather. I think there are going to be new buildings for a long time.”"

 F60_improve_mine_safety_title:0 "Reinforce our Domain"
 F60_improve_mine_safety_desc:0 "“Every child knows we came from the mines, where our former masters drove us to work and die. Never shall we see the value of life debased like that again. I charge you, Nahaab, as Chief Engineer of the realm, to place this matter at the front of your mind. We must have more efficient machines, safer foundations, better medical care - whatever it takes, whatever it costs - to keep our brave miners safe. If we cannot protect our own people, how can we claim to protect others?”"

 F60_the_great_library_title:0 "The Great Library"
 F60_the_great_library_desc:0 "“Wow, I’ve never been inside a library before. I never dreamed there were so many things to read - and there are so many people!”\n\n“Past rulers restricted this place to only the elite, did you know that, little Ziya? Though I suppose you’re too young to really understand. Only important people used to come here. There are new rules now. They say knowledge is for everyone, and there are special people travelling all over Sarhal to get even more things for people to read and bring them here. They are going to make the library even bigger and even better.”\n\n“Why did things change, uncle Raadin?”\n\n“Well, it all started with a great man named Maracout…”"

 F60_reform_the_mages_guild_title:0 "Reform the Mages' Guild"
 F60_reform_the_mages_guild_desc:0 "“Let me put this question to you, my fellow mages of the council - are we children? We can find a solution to any problem, a way around any obstacle. It’s time to stop complaining about the lack of indentured labour our order enjoyed in the past. Slavery has been outlawed, and I will not see this institution’s reputation dragged through the mud by some grumbling traditionalists. You must know that the new Minister for Infrastructure has informed me of his pledge to renovate the Tower of Muhaqaar, giving us more facilities and more capacity for training and growing our knowledge. We have been given a responsibility and an opportunity, and I’ll be damned if we squander it.”"

 F60_invest_in_education_title:0 "Invest in Education"
 F60_invest_in_education_desc:0 "“Let us establish the Ministry for Education, headed by the honourable Ziyanto, a council member I know we all trust. For generations, the rulers of these lands have taken advantage of their subjects’ lack of education to suppress them, limiting the spread of new information, new ideas, and new technology, lest the common people realise their power. We cannot simply topple dictators - we must give our citizens the tools to resist oppression whenever it may rear its head. Children and adults both will have the opportunity to learn about the world, to advance our collective wisdom, and I know our state will be all the greater for it.”\n\n- [Root.Monarch.GetTitle] [Root.Monarch.GetName], Address upon the Ratification of the Universal Education Act"

 F60_better_mining_techniques_title:0 "Dwarf Mining Guidance"
 F60_better_mining_techniques_desc:0 "“I’m quite impressed, Dajasti. You’ve done well, for a human. Of course, my ancestors were using these sorts of machines centuries ago…”\n\n“I would not dream of comparing our mines to those of your people, Magûn. Still, we humans do what we can, and I certainly enjoy learning and trying new things”\n\n“That is quite apparent. I have been thinking about your proposal, and I did bring it to the clan council. As expected, there are many traditionalists who see no value in sharing ideas with humans…”\n\n“...but…?”\n\n“Hmph. Not everyone is a traditionalist. I hope you brought some writing materials…”"

 # Events
 flavour_samsumbat.0.title: "A New Republic"
 flavour_samsumbat.0.desc: "The square in front of the council hall is bustling on market day; merchants compete for customers, children run amongst the stalls, and the few guards posted to keep the peace chuckle as they watch two ornery fishmongers nearly come to blows as they've done every week for the past five years.\n\nFive years: the amount of time since Maracout led his people in an uprising against their tyrannical overlords; the amount of time since a new government was set up to provide better representation via the councils; the amount of time many people have been asking themselves what is to come next. The Samsumbati are happy, despite the natural tension between different groups that any country needs must overcome. Yet fear still bubbles beneath the surface for many, knowing that Maracout will not always be in charge, that before long, envious neighbours will turn their gaze towards the riches of the mountains.\n\nThe governing structures are still immature, the army is still a volunteer militia, and despite five years of hard work by the national council, Samsumbat still has no formal allies. The councillors, the citizens, and the guilds know they will need to work together like never before if they are to see the state survive, let alone flourish. One day, the world will be shown the light of liberty, but for now, Samsumbat must survive."
 flavour_samsumbat.0.a: "We will not see our dream crushed without a fight"
 flavour_samsumbat.1.title: "The Constitution"
 flavour_samsumbat.1.desc: "Crafting a founding document for a new state cut off from its heritage is a challenging task. Yet after years of debate and months of co-operation, the councillors of Samsumbat are nearing the end of their work. The powers of the mayor and the council, the protections of the common citizen, and the limits on guild authority have all been inked in iron. Only one major aspect remains: the balance of economic power between the central and provincial governments. Some argue that greater power to levy taxes gives Samsumbat the resources it needs to defend against enemies that will inevitably march against its people. Others avow that centralisation leads to the corruption that they shed so much blood to overthrow, that increased regional autonomy of resource distribution gives the people more room to grow.\n\nIt is a decision that will reverberate for many years, and both options have their advantages. After a final debate that finished well past midnight, the majority decided that..."
 flavour_samsumbat.1.a: "...without proper resources, the state cannot defend its people"
 flavour_samsumbat.1.b: "...we must fight against the concentration of power"
 flavour_samsumbat.2.title: "Guild Support"
 flavour_samsumbat.2.desc: "The [Root.Monarch.GetTitle] stood before the representatives from each of the guilds, some more pleased than others. After explaining the measures the government had taken in recent months to address points of dissent between the growing Mountain and House factions, the work done to invest in the security of the realm, how taxes on the mines were being restructured, and his personal support for the new temple in the city, he sat to give them time to discuss among themselves for a while. He then explained that after much discussion in the council, they had decided that working closely with one of the guilds to ensure the security and prosperity of Samsumbat was the most effective way forward.\n\nAs the representatives fell silent, each wondering if they were to be given the opportunity to influence policy in the coming years, he made the council's choice clear, explaining that..."
 flavour_samsumbat.2.a: "...the [Root.GetAdventurersOrFallbackName] have the contacts and experience we need right now"
 flavour_samsumbat.2.b: "...our people hold the [Root.GetChurchOrFallbackName] in great esteem, making them the best choice"
 flavour_samsumbat.2.c: "...the [Root.GetMagesOrFallbackName] insights and power are what the state needs"
 flavour_samsumbat.2.d: "...without the economic foresight of the [Root.GetBurghersOrFallbackName] Guild, we will fail"
 flavour_samsumbat.3.title: "Republican Agitators"
 flavour_samsumbat.3.desc: "It did not take long to find a willing audience for the teams of agents sent out to the surrounding Khetist splinter states. Even the merchants of Samsumbat played their part as they plied their wares in foreign cities. The people within were downcast, seeing one far-off absolute ruler replaced by another who was simply closer by. While the memory of their liberation from Kheterata is still fresh, the flames of rebellion were fanned into white-hot anger. Demagogues roused the downtrodden both in secret and in public. Agitators organised protests, giving the local nobles a chance to show their true attitude towards the poor. Smugglers brought in weapons, arming the most courageous of the populace.\n\nThe preparations are ready. These corrupt governments are teetering on the edge, ready for us to join hands with the common people, and together deliver the final blow against their overlords."
 flavour_samsumbat.3.a: "We will show them how strong their people really are"
 flavour_samsumbat.4.title: "The First Amendment"
 flavour_samsumbat.4.desc: "Despite the best efforts of the original writers of the constitution, not every situation can be foreseen, but it is not a bad thing that our state is being refined in the crucible of the harsh reality outside the council chambers. The power of the elected mayor and the council during times of war was one such situation, with ambiguity in the constitution leading to great tension and factionalisation in the council. Thankfully, after the [Root.Monarch.GetTitle] had tested the limits of his power, and the council forced through some of its own reforms, a balance had been decided upon, giving future governments a precedent for interpreting our founding document. We know that war requires both decisiveness and restraint, and this is best served by the military ultimately answering to..."
 flavour_samsumbat.4.a: "...the lawfully elected [Root.Monarch.GetTitle], guided by Nirakhet's wisdom"
 flavour_samsumbat.4.b: "...the sub-council of war, to prevent too much power in one office"
 flavour_samsumbat.5.title: "The Fifth Amendment"
 flavour_samsumbat.5.desc: "The question of citizenship was another that threatened to weaken the foundation upon which our laws were built. When Samsumbat was founded, gnolls were synonymous with slavers, lizardfolk were violent monsters from the jungle, and trolls were so rarely encountered so as to be thought myth. No-one had considered that our influence would expand to encompass these races, thus triggering another round of virulent arguments from different factions. Thankfully, reason prevailed in the end, though a few councillors nearly came to blows. With due consideration given to our diverse population and some lectures from some well-known philosophers, the decision for how to treat these so-called \"monstrous races\" was to..."
 flavour_samsumbat.5.a: "...acknowledge their natural differences to humans run too deep"
 flavour_samsumbat.5.b: "...give them full rights as citizens and people, as is equitable"
 flavour_samsumbat.6.title: "We Can Free Them All"
 flavour_samsumbat.6.desc: "Our beginnings were humble - the liberation of a group of mining slaves under Maracout, determined to establish self-rule. From those beginnings, we knew the slavers to the northwest would see an opportunity - a young state, unable to defend itself, would be an easy source of profit. Or so they thought. We have dealt a fatal blow to the chieftains of Saqraxat, but not only that, we also see how narrow our vision was. Slavery is not just a problem here, in the former lands of Kheterata. No, our work is far from complete."
 flavour_samsumbat.6.a: "We must free them all!"
 flavour_samsumbat.8.title: "Arrogant Mages"
 flavour_samsumbat.8.desc: "The mages of Muhaqaar grew arrogant, even before fate handed them lordship over the lake. They looked down upon their people from their tower, convinced their work was for the greater good. Despite their lofty message, like all who rule through power, their actions belied their words. Using their spellcraft to bind their slaves' minds, robbing them of their will? Could any action against another human be so base? Despicable.\n\nBy strength of arm, strength of will, and strength of spell, we have liberated those chained in Muhaqaar. The research and academic resources they amassed in the tower will be freely distributed, giving our people the freedom and resources they need to study magic for the better of all. It also puts an end to their unholy desire to see Elikhet raised in a new, artificial, inferior body. Let not what is gifted by Mother Nirakhet be so easily disregarded."
 flavour_samsumbat.8.a: "The sacred lake, once more cared for by the faithful"
 flavour_samsumbat.8.a.tt:0 "Every province in the §YLeta Muhaqaar§! or §YShena Muhaqaar§! areas that are not §YNirakhetist§! gain:"
 flavour_samsumbat.9.title: "Show Them The Way"
 flavour_samsumbat.9.desc: "Sermons praising Nirakhet are once more heard upon the shores of the lake. The new temple stands at the mouth of the river, a symbol of our unity and devotion. Reflections from the water undulate across the beautiful facade as crowds gather to hear the message of hope. Those that remained faithful to Her through the generations come forward with joy, and those led astray by corrupt teachers are coming to accept the truth - the truth that Mother Nirakhet cares for all and weeps for all. Her priests play their part in lifting up the downtrodden, and the world is a little better for it."
 flavour_samsumbat.9.a: "We are all Her children"
 flavour_samsumbat.9.a.tt.1: "The §YDevelopment of Temples§! clergy privilege now gives §G+3%§! Local Missionary Strength for §YTemples§! and §YCathedrals§!"
 flavour_samsumbat.9.a.tt.2: "The §YReligious Culture§! clergy privilege now gives §G+3%§! Local Missionary Strength for §YTemples§! and §YCathedrals§!"
 flavour_samsumbat.10.title: "Improved Mine Safety"
 flavour_samsumbat.10.desc: "Our heritage - toiling in the mines for our Kheteratan masters, cruel overlords with no regard for the loss of life in the dangerous pits and tunnels. Many children lost their parents far too early, and many mothers, their sons. No more. We do not forget what we learnt from generations of digging, but this knowledge will be applied with a mind to the wellbeing of our brave miners, rather than purely for profit. New equipment, new procedures, new support for each other - we will all play our part to make Samsumbat both safe and prosperous"
 flavour_samsumbat.10.a: "Even a dwarf would be impressed"
 flavour_samsumbat.10.a.tt.1: "Every owned §YCopper§!, §YIron§!, or §YGems§! province gains:"
 flavour_samsumbat.10.a.tt.2: "From now on, any §YCopper§!, §YIron§!, or §YGems§! province that has had development increased §Ytwice§! will gain §YImproved Mine Safety§!"
 flavour_samsumbat.11.title: "The Emancipation Proclamation"
 flavour_samsumbat.11.desc: "\"With the authority vested in me by the citizens of [Root.GetName], the People's Council, and the Khet, I hereby proclaim that on this day of the month of [GetMonth], in the year [GetYear], that all persons held as slaves or in any form of forced servitude anywhere within the jurisdiction of the Republic shall be henceforward and forever free. The government and military will recognise and maintain the freedom of such persons, and any efforts to repress the freedom of such persons will be treated as a criminal act.\"\n\nThus it was spoken on the banks of the Sorrow by the new Steward. The old symbols and laws of oppression have been swept away, though not without consequence. Even as a group of former slaves are symbolically given a set of new clothes for their new life, many in the crowd are grumbling. The people from the south may have been fighting for this, but for those who have lived for generations in the great northern cities, relying on slave labour for religious rituals, farming, and education for their children, this decree represents great disruption.\n\nTime will tell if the predicted chaos can be overcome, or if the upending of centuries of traditions leads [Root.GetName] to a violent end."
 flavour_samsumbat.11.a: "Freedom is worth any price"
 flavour_samsumbat.11.a.tt: "§Y9§! random provinces will gain §Y1§! random development\n"
 flavour_samsumbat.12.title: "The New Steward's Authority"
 flavour_samsumbat.12.desc: "No more will we suffer at the hands of the corrupt kings of Kheterata, setting themselves up as Stewards of the Sorrow yet barely able to keep their own house in order. Together with the Republic of [Root.GetName] we have torn out the rotting foundation and replaced it with something new.\n\nHowever, not all in our court are convinced that the [F60.Monarch.GetTitle] will do a much better job than the previous Stewards. This has been a point of contention during the whole campaign, but now that the goal has been achieved, the matter must be resolved: how will we respond to this new Steward of the Sorrow? Have they earned our trust and loyalty, or are we better served parting ways from here?"
 flavour_samsumbat.12.a: "[From.GetName] has earned our trust and loyalty, and we will bend the knee"
 flavour_samsumbat.12.b: "We have come to see the truth in the message of Mother Nirakhet"
 flavour_samsumbat.12.c: "The institution is fundamentally flawed. We must pursue our own path."
 flavour_samsumbat.13.title: "Elikhet's Promise"
 flavour_samsumbat.13.desc: "Generations of injustice have been resolved. A promise made thousands of years ago has been fulfilled. The son of Mother Nirakhet made an oath to the Akasi, and their trust in the Steward of the Sorrow was broken once he fell, and they did not forget.\n\nNow, as our victorious troops march through Akasik, as the soldier-builders get to work in rebuilding what was damaged, and as the [Root.Monarch.GetTitle] meets with the local rulers, the Akasi people know that we have come to honour Elikhet's vow. Prosperity and freedom will once more be part of the thread of life in the land of the storm."
 flavour_samsumbat.13.a: "Nirakhet smiles upon us all, and the land will heal"
 flavour_samsumbat.14.title: "The New Smallholders"
 flavour_samsumbat.14.desc: "Our heritage is in the mines and the mountains, an identity which has gone from a point of shame to one of pride since [Root.GetName]'s independence. Yet there are those who longed for a new life, away from the reminders of servitude. This desire, along with our expanding influence in the savannahs in the west, and a decision to diversify our food production away from crops on the banks of the Sorrow, provided an excellent opportunity. With investment from the government and co-operation with the local Fangaulans, large groups of people have moved west to expand the farming and grazing opportunities there. While there will be a small loss of production in the mines, the long-term benefits outweigh the costs."
 flavour_samsumbat.14.a: "Miners, soldiers, governors, farmers - we rely on each other"
 flavour_samsumbat.14.a.tt.1: "Each of our §YLivestock§! provinces with §YSavannah§! terrain in the §YKubaci§! region will change to our §Yprimary culture§! and gain §Y2§! random development"
 flavour_samsumbat.14.a.tt.2: "For §Yeach§! of those provinces, one of our provinces producing §YCopper§!, §YIron§!, or §YGems§! will lose §Y1§! random development"
 flavour_samsumbat.15.title: "Reorganise the Satrapies"
 flavour_samsumbat.15.desc: "Many diplomatic ministers dreamed of this day, when the great Satrapy reform was complete. It has never been about tributaries paying protection money, but the cooperation of states for the benefit of the common citizens. Councillors and guildmasters alike have seen the outcomes of the reforms, and many of our Satrapies have been re-organised into Medasi with even greater integration with [Root.GetName], leading to economic prosperity for their people and greater safety for all of our realms. Soon we will see all of our republican allies working as closely with our Grand Republic, and people across Sarhal will reap the benefits. The whole is now truly greater than the sum of its parts."
 flavour_samsumbat.15.a: "To our mutual prosperity!"
 flavour_samsumbat.16.title: "Formalised Satrapies"
 flavour_samsumbat.16.desc: "Ever since Maracout led the first rebellion in the mountains of Samsubmat, outsiders have feared that a violent wave of liberation would lead to the destruction of their societies, anarchy in their cities, and a breakdown of their economies. We come to bring freedom and change, yes, but utilising constructive avenues is far preferable to change at the point of a spear. As Steward of the Sorrow, we have inherited a tradition of Satrapies, designed to extract tribute to enrich Kheterata, but we have been able to repurpose this diplomatic structure for better ends.\n\nWith new reforms passed in the council of the Steward, and a number of allies who we have persuaded to adopt this new relationship, we have seen the positive outcomes of greater co-operation in both our own republic and that of our Satrapies. There are, of course, those who resist these changes throughout the region, but the results speak for themselves - greater economic prosperity, improved military effectiveness, and an increase in engineering innovation. There is no reason not to continue developing this system across the entire continent."
 flavour_samsumbat.16.a: "Long live the Republic!"
 flavour_samsumbat.17.title: "Horashesh Converted"
 flavour_samsumbat.17.desc: "For too long the clerics of Kheterata relied on their slaves for every menial task they could think of, believing they could not possibly do the gods' work without them. What they did not realise, apart from the inhumanity of the system, was that this put a barrier between them and those they were trying to minister to. It is no wonder that worship of Nirakhet and Her son never took hold in this part of the empire.\n\nWhile there is still resistance to the message in Horashesh, and many traditionalist holdouts in the clergy, the reforms of [Root.GetName] have resulted in great progress in the region. Many have seen the new humility of the priests of Nirakhet and have come to honour Her as we do. Such change is painful, yes, but it is clear that greater liberty for the people is healthy for the mind, body, and soul."
 flavour_samsumbat.17.a: "Sometimes, destruction is required before growth"
 flavour_samsumbat.18.title: "The Eleventh Amendment"
 flavour_samsumbat.18.desc: "Many years have passed since the first words of the constitution were penned. There have been many debates and elections, laws written and amended, and new cultures assimilated. The machinery of government is becoming smooth and the various structures find their place in the Great Republic. Learning how to work with the Khet while electing a new leader every few years has taken some time, with many mistakes along the way as they and we adjust to new ways of governance. However, this adaptation has had an interesting consequence - the hedonistic ways of the Khet are beginning to have an influence on some of the ministers and elected [Root.Monarch.GetTitle]s.\n\nThis has not yet had catastrophic consequences, but there have been some disturbing cases of the [Root.Monarch.GetTitle] using their power for personal gain - misappropriating funds, neglecting diplomatic duties, and keeping their family members in power. Two proposals have been put forward to reverse this moral turpitude - establishing a new Corruption Oversight Board from among the most trusted councillors, with the power to prosecute the [Root.Monarch.GetTitle], or requiring every elected official to serve as a manual labourer for a year after their term in order to ensure their humility.\n\nThere are advantages and disadvantages of both proposals, and the debate in the council chamber was lively, but in the end it was decided the best path forward for Samsmbat was..."
 flavour_samsumbat.18.a: "...to establish the Corruption Oversight Board as another safeguard"
 flavour_samsumbat.18.b: "...a reminder that the [Root.Monarch.GetTitle] serves in many ways, even by digging"
 flavour_samsumbat.19.title: "The New Constitution"
 flavour_samsumbat.19.desc: "The crowd stood silent. Rumours had been swirling for days that the delegates had come to the end of their deliberations. The servants who moved to and from the house had not said anything to outsiders for a week, obviously sworn to secrecy, but this served to only pique everyone's interest further. On this day, the streets were packed for several blocks as everyone with time to spare from the day's labour awaited the announcement of their new constitution.\n\nAn hour later, the big doors at the front ponderously opened. The murmuring stopped. Inorkan, Minister for Infrastructure, well known in the city for his tireless advocacy for public works, stepped forth. Behind him, another dozen councillors came to occupy the threshold. He pulled a sheaf of papers from his satchel, and raised his voice:\n\n\"Citizens of [Root.GetName]! Today, in the year [GetYear] and month [GetMonth], it is decreed that a new constitution be enacted! By the authority of the [Root.Monarch.GetTitle], rightful Steward of the Sorrow, the People's Council, and the House of Equals, let the first constitution be rendered void, acknowledging the good purpose it has served us all. By that same authority, let the new constitution come into force.\" With that, he fell silent, and turned back inside to organise the other delegates to return to their usual occupations.\n\nSome in the crowd whispered to their companions, asking what the big deal was with a piece of paper. From various small gatherings, though, a great cheer rose up, and it caught on and spread like wildfire through the crowd. Many understood what this meant: A great step forward for the Republic, a binding document that properly enshrined their paramount rights and freedoms, fulfilling the dream of Maracout for every citizen in the prosperous years to come."
 flavour_samsumbat.19.a: "We stand on the shoulders of giants"
 flavour_samsumbat.20.title: "The Old Colonies Liberated"
 flavour_samsumbat.20.desc: "Millennia ago, the influence of the Mother Of All and Her son Elikhet stretched across the Divenhal Sea to Eborthil and Businor. Sadly, later governors saw the rule of the Steward not as a gift, but as a burden, declaring their independence and imposing their own will on the good citizens there. Some of the rich and powerful saw this as a good thing, but as always the voice of the common people was silenced.\n\nHowever, today is a great day indeed, as once more the hand of Nirakhet reaches Her wayward children, and the people of these great cities can live with their voices heard by the government. There will be no more kings in the north.\n\nOur message to the kings and emperors in the rest of Cannor is clear: take heed! The people will not stand meek and silent as they see their liberation approaching."
 flavour_samsumbat.20.a: "Our dream is one step closer to fulfillment"
 flavour_samsumbat.20.a.tt: "Gain the §YLiberation of the Oppressed§! Casus Belli against every monarchy with a capital in §YEscann§! or §YWestern Cannor§! for the next §Y200§! years.\nThis casus belli §Rdisables§! taking land, but makes it §G50% cheaper§! to §Yrelease nations§! and §Ychange government§!"
 flavour_samsumbat.21.title: "Iron Trees, Iron Chains"
 flavour_samsumbat.21.desc: "The sound of drumming filled the air as hundreds of festival-goers danced, laughed, and ate. \"These Taafi certainly know how to celebrate,\" [Root.Monarch.GetTitle] [Root.Monarch.GetName] thought, \"and it's certainly the time for it.\" The freedom of their cousins was a dream of generations of Taafi that had now been realised, and [Root.Monarch.GetName], as Steward of the Sorrow and Liberator, was the guest of honour. At some point [Root.Monarch.GetSheHe] made a short speech about us all being one family, but it's hard to say who was really listening. [Root.Monarch.GetSheHeCap] didn't mind.\n\nThere were displays of strength and agility, cooking contests as people competed to come up with the most elaborate dish, and drumming - lots and lots of drumming. The Taafi Chief announced early in the evening that they were feting [Root.Monarch.GetTitle] [Root.Monarch.GetName] as the avatar of their god Makan who had come to make their people free and happy. Someone had to quietly explain to [Root.Monarch.GetName] that Makan was most often depicted playing drums, hence the overabundance of percussion.\n\nThe celebrations went long into the night; a microcosm of Sarhal at large, [Root.Monarch.GetName] thought. Liberty has come, and the people react with joy, knowing their children will grow up in a brighter world."
 flavour_samsumbat.21.a: "This is what we are fighting for"
 flavour_samsumbat.21.a.tt: "Each of our §YMedasi§! gains a Cultural Union with the §YWest Sarhaly§! culture group"
 flavour_samsumbat.22.title: "A Great Union of States"
 flavour_samsumbat.22.desc: "Maracout had a dream - a dream to see all slaves freed from their chains, to see every person given the chance to live their life without oppression. With a new vision for the Steward of the Sorrow, we marched north from the mountains around the holy lake, tore down the symbols of oppression, and built something new. Corrupt systems of government that serve to enrich those at the top have been shattered, and together with our Medasi states we have created a great republic where Maracout's dream has been realised.\n\nIt has not been a journey without cost or struggle. Many kingdoms on the continent took exception to our success, fearing unrest and economic destruction. Traditionalists in many spheres of our republic found themselves dealing with upended traditions, pushing back against reforms, and facing difficult choices as their society and religion changed around them. People fear change, this we know. They were not wrong to be afraid, but the costs are worth it. We have made a better world - our republic is strong, our citizens are free, and our diverse government gives us strength.\n\nWith this decree of the Great Union of States, all of our people can now be assured they are equal, their voice is heard, and they are part of a grand republic like no other."
 flavour_samsumbat.22.a: "We are one, but we are many. Liberty will spread like fire!"
 flavour_samsumbat.22.a.tt: "Each of our §YMedasi§! gains the same modifier"
 flavour_samsumbat.23.title: "The Old Republic"
 flavour_samsumbat.23.desc: "The bells toll across Anbenncóst, as they do each day. The Imperial Palace, normally a hub of administrative and political activity, stands quiet, solemn. In contrast, the city gates are a flurry of activity, as [Root.Monarch.GetTitle] [Root.Monarch.GetName] delivers, for the third time, his speech to the variegated inhabitants of City of the World's Desire. He speaks of the dream of Maracout, to see all who are oppressed set free. He speaks of the greed of tyrants, that would grind people into the dust for the pleasure of the rich. He speaks of the changes [Root.GetName] has brought to the world, liberty, wellbeing, and free ideas flourishing.\n\nMost of all, though, he speaks of the Republic of Dameria. With passion in his voice that can be felt even at the edges of the crowd, he speaks of the ideals of that ancient state, to bring light to a dark world. He speaks of the honour of the old senate, giving representation of the people so that no one man could impose his will. He speaks of the perfidiousness that led to its collapse, leaving the tattered remains of a failed dream that is now being given new life by the Great Republic of [Root.GetName].\n\nOver the coming weeks, a new government takes shape, taking the choice elements from the old republic and the new. The newly-revived Republic of Dameria is given a special place in the grand republic of [Root.GetName], with jurisdiction over all of Cannor, its own House of Equals and armed forces, yet sharing the foreign policy and ideals of their brothers and sisters. The former Imperial Palace is emptied of its treasures, most sold off to fund the new government, with a select few left as museum pieces. The palace itself is left empty, a testament left to the kings of the old order - an opulent facade possessing no true substance. A reminder of the past that has been left behind.\n\nA new era is dawning on Halann. While slaves still toil, despots still oppress, and people cry out for change, the work of Maracout continues."
 flavour_samsumbat.23.a: "Yet the future is bright"
 flavour_samsumbat.23.a.tt.1: "Gain the §YLiberation of the Oppressed§! Casus Belli against §Yevery country in the world§! for the next §Y200§! years.\nThis casus belli §Rdisables§! taking land, but makes it §G50% cheaper§! to §Yrelease nations§! and §Ychange government§!"
 flavour_samsumbat.23.a.tt.2: "Every province in §YEmpire of Anbennar§! @Z01 will gain:"
 flavour_samsumbat.24.title: "The Spear of Elikhet"
 flavour_samsumbat.24.desc: "Surveying, cataloguing, and processing the official records of a millennia-old government is a long and monumental task, one that will continue for years. Yet it is necessary work if we are to fully understand what came before and build something greater. As part of this task, one team of scribes came across a collection of eyewitness accounts of Elikhet's battle with the Storm Queens of Akasik, including an incredible story of one Daviros Stormbreaker. The accounts tells us that at one point of the battle, one of the genies had the upper hand over our Lord, and at the moment before she could deal a deadly blow, Daviros took up his spear and thrust it into her back, providing a distraction at great cost to himself as the magical feedback coursed through his body. Thanks to his bravery, Elikhet was able to recover and lead the army to victory.\n\nAfter the battle, as Daviros lay in agony, Elikhet healed him and named him Stormbreaker, and proclaimed in front of all that this mortal saved his life. He cried out that this demonstrated that humans can stand proud as equals to himself, and that his empire must treat all as having the same worth, from the meekest to the mightiest.\n\nThis account has been very encouraging to the government, reading the words of Elikhet that accord so strongly with our ideals. Better yet, by tracing further records we have discovered that the spear of Daviros Stormbreaker has been kept by the Order of the Stormbreakers, founded that day, until the present time. This relic is a mighty symbol of our cause, and would be better served out in the world than kept in a secretive vault. Some argue for it to be carried by our highest ranking general to inspire the troops further as they fight for the cause. Others claim it should be kept in the capital, freely on display for all citizens to behold and be reminded of the tale of Daviros. Where will it best serve the [Root.Owner.GetAdjective] people?"
 flavour_samsumbat.24.a: "War is not our purpose - it will be kept on display for all"
 flavour_samsumbat.24.b: "A spear is a weapon, and this one will once again smite tyrants"

 # Event Insight tooltips
 F60_event_insight_2_tt:0 "The §YClergy§! could inspire more §Yvolunteers§! for the army\nThe §YMerchants§! could give the government favourable §Yloans§!\nThe §YAdventurers§! could help us negotiate with local §Ymercenaries§!\nThe Mages might spare an experienced §Ymage§! for our council."
 F60_event_insight_4_tt:0 "Our mayor showing [Root.Monarch.GetHerHis] courage could inspire other §Ygenerals§!\nA proper military council could §Yreassure§! the guilds"
 F60_event_insight_5_tt:0 "Exploting these monsters could make it easier to §Yreplace§! them with our own people\nAccepting them as people could inspire them to §Yjoin§! in our fight"
 F60_event_insight_6_tt:0 "We cannot stop until every enslaved person is free"
 F60_event_insight_7_tt:0 "Our agents in other countries will agitate for the freedom of the slaves"
 F60_event_insight_8_tt:0 "Our study of magic and religion in the area will be more effective"
 F60_event_insight_9_tt:0 "The §Yclergy§! will be able to more effectively spread their message"
 F60_event_insight_10_tt:0 "Our §Ycopper§!, §Yiron§!, and §Ygemstone§! mines will be safer for all"
 F60_event_insight_11_tt:0 "§WThe enslaved will be free, §Yno matter the cost§!...§!"
 F60_event_insight_14_tt:0 "More of our people will move from the §Ymines§! to the §Yfarms§! in §YFangaula§!"
 F60_event_insight_13_tt:0 "Our people in §YAkasik§! will be free, knowing we kept Elikhet's promise"
 F60_event_insight_15_tt:0 "Our §YMedasi§! will become further integrated into §Y[Root.GetName]§!"
 F60_event_insight_16_tt:0 "We will be able to better implement our §Ydiplomatic policies§!"
 F60_event_insight_17_tt:0 "The clergy will finally understand the new order of things"
 F60_event_insight_18_tt:0 "A proper council in place could reduce the chance of §Ycorruption§! in our elected leader\nIf the guilds have enough influence, they may take a hand in enforcing the §Ystability§! of our realm"
 F60_event_insight_19_tt:0 "Our new government will be the foundation of a great future"
 F60_event_insight_20_tt:0 "We will be able to liberate everyone under the thumb of a monarch in §YCannor§!"
 F60_event_insight_21_tt:0 "As we celebrate the liberation of Fangaula, every §YWestern Sarhali§! will be kin"
 F60_event_insight_22_tt:0 "Those who join our great state will be even more welcome"
 F60_event_insight_23_tt:0 "The old republic will live again, and together we will liberate §Yall Halann§!"

