 # Modifiers
 F60_new_republic:0 "New Republic"
 F60_new_republic_desc:0 "Our new government is still in its infancy, with many structures and responsibilities still to be worked out."
 F60_moderate_constitution:0 "Moderate Constitution"
 F60_moderate_constitution_desc:0 "We have seen first hand the danger inherent in delegating too much power to easily corrupted bureaucrats. The primacy of the mayor is core to our founding document."
 F60_radical_constitution:0 "Radical Constitution"
 F60_radical_constitution_desc:0 "We have seen first hand the danger inherent in giving one leader too much power, even an elected one. Decentralising of authority is core to our founding document."
 F60_moderate_first_amendment:0 "Moderate First Amendment"
 F60_moderate_first_amendment_desc:0 "In times of war, extraordinary military power is justified."
 F60_radical_first_amendment:0 "Radical First Amendment"
 F60_radical_first_amendment_desc:0 "Even in times of war, we must guard against centralisation of power."
 F60_moderate_fifth_amendment:0 "Moderate Fifth Amendment"
 F60_moderate_fifth_amendment_desc:0 "Untold centuries of conflict cannot be extirpated in a day. It will be some time before gnolls, lizardfolk, and their ilk are given full citizenship rights."
 F60_radical_fifth_amendment:0 "Radical Fifth Amendment"
 F60_radical_fifth_amendment_desc:0 "Despite their appearance, these \"monsters\" are people just as much as any human, elf, or halfling, and will be given the same rights."
 F60_moderate_eleventh_amendment:0 "Moderate Eleventh Amendment"
 F60_moderate_eleventh_amendment_desc:0 "Sadly, we cannot trust every future elected official to have the best interests of the republic at heart. A small committee to oversee their conduct will limit the opportunities for corruption."
 F60_radical_eleventh_amendment:0 "Radical Eleventh Amendment"
 F60_radical_eleventh_amendment_desc:0 "What use is amassing wealth if one must give it up? A stint of honest labour after a term in office will keep our leaders humble."
 F60_adventurer_support:0 "Adventurer Support"
 F60_adventurer_support_desc:0 "Whilst co-operation with all the guilds is important, the Adventurers have provided the best support for our government to ensure the safety of our citizens."
 F60_clergy_support:0 "Clergy Support"
 F60_clergy_support_desc:0 "Whilst co-operation with all the guilds is important, the Clergy have provided the best support for our government to ensure the unwavering will to fight for our citizens."
 F60_merchant_support:0 "Merchant Guild Support"
 F60_merchant_support_desc:0 "Whilst co-operation with all the guilds is important, the Merchant Guilds have provided the best support for our government to ensure the prosperity of our citizens."
 F60_slavers_humbled:0 "Slavers Humbled"
 F60_slavers_humbled_desc:0 "With the fall of Saqraxat, whose values were the complete antithesis of our own, our soldiers stand taller and fight more courageously, knowing our moral will shall not falter."
 F60_show_them_the_way:0 "Show Them The Way"
 desc_F60_show_them_the_way:0 "Mother Nirakhet embraces all of Her children, and our clergy are shepherding the people of the lake away from their misguided worship of other gods."
 F60_strength_of_lions:0 "Strength Of Lions"
 F60_strength_of_lions_desc:0 "The fiercest of the Ndurubu oppressors have fallen, and our people fight all the fiercer, knowing our cause is just and our arm is mighty."
 F60_slave_uprising:0 "Slave Uprising"
 F60_slave_uprising_desc:0 "Our country was founded on the strength of the slaves who rose up together to throw off the yoke of Kheterata. We will make use of this experience to build support among the downtrodden people of our neighbouring realms and together we will spread the revolt."
 F60_slave_agitators_capital:0 "Slave Agitators"
 F60_slave_agitators_capital_desc:0 "Foreign interference is fomenting dissent and unrest among our people. While the impact is minimal so far, one area affected is the army as they find it more difficult to maintain supply lines. The contagion has not spread too far, but if we are not careful, the situation might escalate."
 F60_republic_uprising:0 "Republic Uprising"
 F60_republic_uprising_desc:0 "We have not forgotten how to stir up people against their overlords, whether they are slaves or free. The people of Bulwar have lived under arrogant kings for too long - we will support them as they rise up and demand a more just government."
 F60_republic_agitators_capital:0 "Republic Agitators"
 F60_republic_agitators_capital_desc:0 "Foreign interference is fomenting dissent and unrest among our people. While the impact is minimal so far, one area affected is the economy as manual labourers and transport drivers begin to agitate for changes. The contagion has not spread too far, but if we are not careful, the situation might escalate."
 F60_arrogant_mages:0 "Arrogant Mages"
 F60_arrogant_mages_desc:0 "The sacred lake, once more cared for by the faithful. The locals have been shown the truth of the mages' power and arrogance, that it is nothing compared to Mother Nirakhet's embrace."
 F60_democratic_magic_study:0 "Democratic Magic Study"
 F60_democratic_magic_study_desc:0 "Since the field of magic study has been opened up to anyone with talent, research into its mysteries has progressed much faster."
 F60_unite_the_sorrow:0 "Unite the Sorrow"
 F60_unite_the_sorrow_desc:0 "The seeds have been sown; the people will rise up, and the Sorrow will be liberated!"
 F60_infrastructure_focus:0 "A Future in Brick, not Blood"
 F60_infrastructure_focus_desc:0 "Our state is in its infancy. If we are to survive, we must focus on efforts on strong foundations before we look outwards."
 F60_improved_mine_safety:0 "Improved Mine Safety"
 F60_improved_mine_safety_desc:0 "Our people came from the mines, and we will never forget the lives callously discarded for the sake of riches. Never again."
 F60_elikhets_promise:0 "Elikhet's Promise"
 F60_elikhets_promise_desc:0 "Elikhet made an oath to the last Storm Queen that as long as he lived, no Akasi would be enslaved by his people. They remember. We honour that promise."
 F60_military_reform:0 "Military Reform"
 F60_military_reform_desc:0 "After many trials as well as victories, the military has been reforged and stands ready to march for freedom."
 F60_economic_reform:0 "Economic Reform"
 F60_economic_reform_desc:0 "Despite the disruption from the great emancipation, our economy has recovered and continues to grow. The future looks bright."
 F60_magic_reform:0 "Magic Reform"
 F60_magic_reform_desc:0 "It took some time for the mages to adapt to a lack of slaves, but it was for the best. With renewed vigour and innovation they use their powers for good."
 F60_clerical_reform:0 "Clerical Reform"
 F60_clerical_reform_desc:0 "There was grumbling among the senior priests, but relying on slaves had dulled their piety. Now, with true worship and true humility, they spread the message of Nirakhet."
 F60_formal_subject_statutes:0 "Formal Subject Statutes"
 F60_formal_subject_statutes_desc:0 "Our relationship with our Satrapies is one of first among equals, and our diplomatic apparatus is well integrated with their own governments."
 F60_education_entrenched:0 "Education Entrenched"
 F60_education_entrenched_desc:0 "With the right resources invested in the education of our citizens, no matter their social position, we have created a pool of skilled advisors to help the government."
 F60_education_entrenched_university:0 "Education Entrenched at University"
 F60_education_entrenched_university_desc:0 "With the right resources invested in the education of our citizens, no matter their social position, local universities provide their students with exposure to new ideas and the intellectual tools to improve their society."
 F60_education_entrenched_university_artillery:0 "Military Education Entrenched"
 F60_education_entrenched_university_artillery_desc:0 "Most universities specialise in a certain branch of education, and here it is the study of military engineering that is the focus. Bright minds from the surrounding area come to study mathematics, test new mechanical models, and improve the effectiveness of our army."
 F60_implementing_mine_safety:0 "Implementing Mine Safety"
 F60_implementing_mine_safety_desc:0 "While there will be temporary disruption to production from the engineering works in the mine here, the two years of work will provide this location with greatly increased efficiency in the years to come."
 F60_improved_mining_technology:0 "Improved Mining Technology"
 F60_improved_mining_technology_desc:0 "With the combination of generations of experience, a focus on education, and a strategic friendship with the dwarves, we have devised more effective methods for extracting and smelting ore from this location."
 F60_naval_reform:0 "Naval Reform"
 F60_naval_reform_desc:0 "The sea has always held some fear for our people, being born in the highlands of the south, more comfortable underground than on the deck of a ship. Times change. If we are to liberate the people under the thumb of the Empire of Anbennar, we must become seafarers."
 F60_old_colonies_liberated:0 "Old Colonies Liberated"
 F60_old_colonies_liberated_desc:0 "A thousand years ago, the influence of Elikhet reached across the Divenhal. We have reclaimed these borders and now the truth of our cause is spreading. Soon, all of Cannor will understand the lies they have been told by their leaders, and the people will welcome us."
 F60_great_union_of_states:0 "Great Union of States"
 F60_great_union_of_states_desc:0 "Our great republic is a strong and diverse place. Many peoples and many states, united by a dedication to protect the rights of our citizens. Some see us as conquerors, but when the dust settles and we extend our helping hand, they will see that our efforts will lift us all."
 F60_the_sun_bows_to_the_mother:0 "The Sun Bows to the Mother"
 F60_the_sun_bows_to_the_mother_desc:0 "The Sun Elves thought themselves chosen, blessed, superior. Their lies to themselves and their subjects have been exposed, and now all in Bulwar flourish under the care of republic governments and Mother Nirakhet."
 F60_spear_of_elikhet_on_display:0 "Spear of Elikhet on Display"
 F60_spear_of_elikhet_on_display_desc:0 "This great spear is housed in a public museum, alongside other artifacts that remind us of our history, as a testament to the willpower of Daviros Stormbreaker. Everyone who beholds it, be they citizen or foreigner, cannot help but praise Elikhet for what he did that day."
 F60_spear_of_elikhet_wielded:0 "Spear of Elikhet Wielded"
 F60_spear_of_elikhet_wielded_desc:0 "The great spear is not collecting dust in a museum but wielded according to its noble purpose. As Daviros Stormbreaker smote the enemies of Elikhet the Liberator, so too will our most distinguished generals strike down those who would oppress us - and the hearts of the troops shall sing."
 F60_republic_of_dameria_loyalty:0 "Republic of Dameria Loyalty"
 F60_republic_of_dameria_loyalty_desc:0 "The old republic has been rebuilt as a symbol of our restoration of the whole world. Given a special place in our grand republic, the reborn Dameria will bring an era of peace and prosperity to a continent that has suffered for too long under a despotic empire."
 F60_eoa_uprisings:0 "The Free Heart of Dameria"
 F60_eoa_uprisings_desc:0 "With the restoration of the old republic from the heart of the empire, suddenly the legitimacy of Anbennar has been called into question by every one of our citizens. They cry out for independence once more, and our government is struggling to contain the uprisings."
 F60_ahati_centralisation_moderate:0 "Ahati Centralisation"
 F60_ahati_centralisation_moderate_desc:0 "In times of peace, habits are formed that serve just as well in combat as in haggling. With a centralised authority structure, all Ahati are used to following orders and trusting their superiors without hesitation."
 F60_ahati_centralisation_radical:0 "Ahati Decentralisation"
 F60_ahati_centralisation_radical_desc:0 "The dangers of a central authority with too much power are just as pertinent in the Ahati as our republic. The local chapters have been given more freedom to make their own decisions and handle their own recruitment."
 F60_ahati_command_moderate:0 "Ahati General Command"
 F60_ahati_command_moderate_desc:0 "In times of war, leaders must be decisive, and though it may have a cost, the military results are worth it. As the Ahati are commanded without hesitation or debate, they strike their enemies with great force."
 F60_ahati_command_radical:0 "Ahati Council Command"
 F60_ahati_command_radical_desc:0 "Prudence is just as important as violence in times of war, strategy as important as any weapon. With a council of military minds to command the Ahati, every maneuver is deliberate and effective."
 F60_ahati_meritocracy_moderate:0 "Ahati Traditional Recruitment"
 F60_ahati_meritocracy_moderate_desc:0 "Despite many changes to the organisation of the Ahati, some traditions are worth keeping. By keeping recruitment limited yet still meritocratic, the cohesion of the Ahati regiments is strengthened."
 F60_ahati_meritocracy_radical:0 "All Serve in the Ahati"
 F60_ahati_meritocracy_radical_desc:0 "With a new organisation of the Ahati comes changes to tradition. Since all sapient beings are given equal say in our republic, it is only right that all may join the brotherhood."
 F60_ahati_pilgrim_guardians:0 "Ahati Pilgrim Guardians"
 F60_ahati_pilgrim_guardians_desc:0 "The Ahati maintain the forts and rest houses along the various pilgrimage routes to lake Nirakhet, from the delta in the north, the coast of Horashesh, and even from the jungles of Fangaula. They will not step back while there are innocents to defend."

