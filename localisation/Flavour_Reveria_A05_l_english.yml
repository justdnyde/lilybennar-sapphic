l_english:
 #Missions
 A05_a_new_capital_title: "A New Capital"
 A05_a_new_capital_desc: "With the provinces of the Drekiríki kingdom firmly in our grasp, it has become even more evident what a true marvel of architecture the old capital, Fetaginbaia, is compared to our wooden lodgings in [Root.Capital.GetName]. It’s surrounded by farmlands, with ample space for us to grow, and most of the buildings present are made from stone. Plus, it’s established on the Oddanroy Estuary, a key location for trade. Our military advisors also counsel that its deep position in our territory makes it much more defensible against both the Lencori and the Alenics. Let us drive the kobolds out and resettle it to prepare the city as our new capital."

 A05_reaver_industry_title: "Reaver Industry"
 A05_reaver_industry_desc: "Before us, this land was crawling with useless kobolds and the Cliff Gnomes that were so dedicated to survival that they had no time to develop it. Now, under our occupation and with the Gnomes under our control, the ground pulses with energy, entire forests are cleared for manufacturing and the making of ships, new mines are opened, and novel industries of all types open daily that mix the intelligence and dedication of the Gnomes with the strength and resilience of our Reaver heritage."

 A05_damestear_demands_title: "Damestear Demands"
 A05_damestear_demands_desc: "Gnomes used to mock mages: claiming that their need for damestear was ridiculous, that gnomish artificery was much more efficient. Now those same gnomes are begging on their knees for any scraps of damestear we have; the supply cannot meet internal demands. We should develop the industry of Baycodds to increase its production and seek out more sources of damestear elsewhere. No matter how, we need to get more damestear for our nascent artificery - for once, the mages agree with the gnomes."

 A05_reaver_reunion_title: "The Reaver Reunion"
 A05_reaver_reunion_desc: "With the Storm Isles under our control, it’s finally possible and realistic to re-establish contact with our Gerudian brethren. To [Root.GetRulerTitleAndNameOrRegencyCap]'s surprise, a Reverian merchant brings us a letter from [Z08.GetRulerTitleAndNameOrRegencyCap] and a deluge of information from our old realm, which will take some time to digest. At the moment, the communication is nothing more than a formal greeting, but we could turn it into a real proposal of friendship. We could also just collect the information and prepare for an invasion; the options are open."

 A05_reavers_and_the_mother_bear_title: "Reavers and the Bear"
 A05_reavers_and_the_mother_bear_desc: "While much has changed since our departure, we have managed to establish a beachhead on the foreign diplomatic theater of our Gerudian cousins. With snow and rugged land to farm, even our modest riches impress them.  A mixture of strength and etiquette has carried us through the halls of power; despite all their talk, the old lands don’t have much wealth.\nA question has started to appear to our royal family: Was the move away from the Skaldhyrric faith the right choice? Yes, the Regent Court has allowed us to adapt, but now, with all that has happened with Corin and the revelations of Aelantir, should we continue? Despite our cousins' poor and humble origins, they stay committed to their faith. Maybe we should return to our roots?"

 A05_home_of_old_title: "Home of Old"
 A05_home_of_old_desc: "Many years ago, our great-grandfathers left Gerudia to chase glory far beyond. They sought new lands to conquer, to plunder, new markets to settle, and new people to subjugate. Along the way, they realized they did not need to return to the northern hearth when they could establish a new home, on a new, rich land.\nNow that we have expanded our kingdom and returned to meet with our long-lost kin, it is time to establish our power on Gerudia."

 A05_remind_them_title: "Remind Them"
 A05_remind_them_desc: "For a long time, the Cannorians thought that our conversion to their faith and settling on the land meant the age of plunder and pillaging was over.  They believe the peace is about religion, after all, why would fellow collegionaries of the Regent Court attack each other? It isn’t; it’s about power, those who have it, and those who don’t.\nLet us make them all understand that they are ones without. Let us remind them why they should fear the Reavers."

 A05_RGAO_of_revrhavn_title: "R.G.A.O. of Revrhavn"
 A05_RGAO_of_revrhavn_desc: "The creation of the Reverian-Gnome Artificery Organization was a huge success, speeding up our research and prestige among our peers. It has put our realm and our lands on the cutting edge of artificery. Now, our subjects and allies in Gerudia are asking us to open a branch there. They claim that the soil, air, and resources there could accommodate novel inquiries. They are also interested in eating the fruits of having such a famous organization there. It will require some hefty investment, but the rewards will be immeasurable."

 A05_reclaim_drekiriki_title: "Reclaim Drekiríki"
 A05_reclaim_drekiriki_desc: "The ancient Reaver Kingdom of Drekiríki, our brother to the north, once stood beside us, from 803 to 901 A.A, but disgusting kobolds overran them during a moment of weakness; many of the Drekiriki fled to our kingdom, and none of those that attempted to hold fast were spared.\nTheir descendants still remember the shame of losing their home and carry the torch of vengeance. With our military on the rise, they are pleading for a reconquest. These kobolds’ days are numbered. We will return and take what is ours."

 A05_secure_the_spine_title: "Secure the Spine"
 A05_secure_the_spine_desc: "Our conquest is almost finished. The kobold tribes are on their last legs, but we cannot stop now. As long as they exist on the Spine, they will pose a threat to us. We must finish what we started and conquer the entire coast. Only when our flag flies over all corners and every kobold lies dead or has been expelled, will we know our work is done."

 A05_the_way_to_coddorran_title: "The Way to Coddorran"
 A05_the_way_to_coddorran_desc: "Across the Sea of Broken Ice lies the great settlement of Coddorran, a key to control the entrance to the Spine and to the entrance of Gerudia. Before, we would simply raid the land, but now we are looking for a more permanent powerhold; the city is more useful not turned to ashes. It also holds the last remnants of the kobold presence in the region. If we are to conquer it and establish a power base, having a land connection would be prudent."

 A05_secure_the_dragon_mines_title: "Secure the Dragon Mines"
 A05_secure_the_dragon_mines_desc: "The Dragon Mines are the last corner of the Dragon Coast, where the kobolds still inhabit their proper caves. Historically, they have held a great advantage in these caves. It will be a long and bloody campaign, but it’s the only way to ensure their presence is forever gone. One last push, and the Coast will belong to us."

 A05_slayer_of_the_dragon_title: "Slayer of the Dragon"
 A05_slayer_of_the_dragon_desc: "Dragon Coast is not a name we use with pride, for too long the little lizards have caused terror and brought havoc to our settlements, bringing down Drekiríki, and crushing our gnomes' subjects. Due to the region's instability and their endless numbers, no one had managed to bring them down, but we are not the Drekiríki nor the gnomes; we are better than all of them, we will slay the so-called “Dragon Servants” and have our vengeance."

 A05_the_reaver_crown_title: "The Reaver Crown"
 A05_the_reaver_crown_desc: "Times are changing; the great powers of Western Cannor are no longer content with playing in their spheres of influence. Lorent is settling its vassals and unifying the land; Gawed is seeking to consolidate its power base in the North. Our position of playing between these behemoths is coming to an end. When they finish their affairs, they will start looking at their neighboring lands in search of conquest, and Reveria finds itself at its weakest.\nStill, our recent victory against the gnomes has proven that there is still something of the old Reaver Kings in our realm, but how long can we continue like this? We are on borrowed time, so we must grow or be eaten in the future."

 A05_restore_venail_title: "Restore Venáil"
 A05_restore_venail_desc: "With the outpost of Venáil conquered, we can begin preparing for our true objective. Yes, the wine lord coasts are rich and bountiful for pillaging, still, we should not be distracted and look at our true aim—the vast amounts of wealth in the Dameshead Sea. Lands that have been safe for centuries, wealth that accumulated for almost a millennium, those ports and riches are our target.\nFor that, we should seek to develop our outpost on Venáil into an actual hub to use as a staging ground to conquer the entrance to the Dameshead Sea, the Moonisle. We must make extensive preparations and hope the Emperor is busy."

 A05_build_moonisle_title: "Build Moonisle"
 A05_build_moonisle_desc: "With Moonisle taken, the riches of the southern half of the Dameshead Sea are ours for the taking. During every raiding trip, our ships return swamped with bounty, nearly sinking. We need a better base; we should transform Moonisle into a proper port, enacting tolls and pirating ships entering the Dameshead.\nWith this new conquest, the possibilities are endless. Some advisors have already whispered about expanding our plunder by taking the Magister Isle of Adráil, but that is in the future. Let us settle and transform Moonisle, then we can look ahead."

 A05_capture_adrial_title: "Capture Adríal"
 A05_capture_adrial_desc: "Adráil is an insignificant island, but its geography is critical; it is located in the center of the northern Damesear. If turned to a real raiding port, we would have the capacity to raid the entire Dameshead coast; for that, we need to conquer it and settle it.\nOne last push, and the richest coast of Halann will belong to us. Not even the Emperor can stop us now."

 A05_reconquer_gnomish_pass_title: "Reconquer Gnomish Pass"
 A05_reconquer_gnomish_pass_desc: "We have held these lands for centuries, but in 1396 A.A. they were unlawfully wrested from our control by the Cliff Gnomes of Nimscodd, who were at the time being assisted by the Gawedis. Now, both the Reverian minorities in the region and local Cliffs still loyal to the rightful rulers of the Gnomish Pass are being oppressed by the Nimscodd Hierarchy, who wrongly claim to represent all Cliff Gnomes. With the Gaweds no longer supporting the Hierarchy, we have an opportunity. We should reconquer the Gnomish Pass and show all of gnomekind, but especially those damn Nimscodds, that we are the ones who represent the Cliff Gnomes."

 A05_shattered_agreements_title: "Shattered Agreements"
 A05_shattered_agreements_desc: "In times past, we agreed with Lorent that we would never cross the river and threaten Portnamm, that the city was to stay neutral in our relations. We made that pact out of fear; we were weak, and Lorent used that to ensure we would sign the deal. But now we are strong enough to handle Lorent, and they are distracted. The city is wide open for our taking."

 A05_citzenship_for_gnomes_title: "Citizenship for Gnomes"
 A05_citzenship_for_gnomes_desc: "The gnomes were part of our realm before, but never as true Reverians. The previous Reaver Kingdoms treated them not quite like second-class citizens but not as equals to the other human members of our domains; that was a mistake. We waste so much talent and power, and for what reason? A bigoted view that gnomes could never be equal to humans due to their size and complexion? What a terrible mistake we made.\nIt is time to fix our mistakes, ensure they are equal to all others, and make them feel like a true part of Reveria. Despite complaints of our own nobility, the rising tide of the gnomes will lift all, from priests to nobles. We will not commit the same mistakes as before; we will be a realm of humans and gnomes, side by side."

 A05_gnomes_in_the_army_title: "Gnomes in the Army"
 A05_gnomes_in_the_army_desc: "It is time for the gnomes to find their place in our fearsome ranks. They have proven themselves knowledgeable on all matters regarding artillery and gunpowder. As such, every artillery, sharpshooting, and engineering regiment shall henceforth be at least partly manned by gnomes. They are already drafting new designs for guns and cannons that look expensive and... incomprehensible. But prototype testing has proven incredibly deadly."

 A05_found_the_RGAO_title: "Found the R.G.A.O."
 A05_found_the_RGAO_desc: "Long ago, the Gommo of Artificers ruled over Technocratic activities in the Dragon Coast. However, they left after their relations with Nimscodd deteriorated after a dispute over the control of information, technology, and the role of it; there also appeared to have been controversy between different organizational philosophies about the role of artificers. A list of grievances between them has been disseminated that would make a Dwarf blush.\nDue to this giant schism and bad blood between Nimscodd and the Gommo Artificers, and the fact that we have inherited, more or less, Nimscodd's position as the Western Gnomes, it doesn’t appear we can, in fact, bring the Gommo back. Still, to become the bastion of technology in the region, we must create a new organization of our own: The Reverian-Gnomish Artificers Organization. R.G.A.O"

 A05_RGAO_expansion_title: "R.G.A.O. Expansion"
 A05_RGAO_expansion_desc: "The R.G.A.O. has been a success, but we must not rest; there is still so much to do, the organization is still small, and we must seek to expand it to other cities across the Dragon Coast. We need more investments, more infrastructure, we must expand, until the entire peninsula is covered with the R.G.A.O."

 A05_precursor_relics_title: "Precursor Relics"
 A05_precursor_relics_desc: "As soon as the first expeditions to Aelantir brought precursor relics back to Cannor, word spread like wildfire. Before, finding one was as rare as a comet, now they are arriving in tons to the shores of Cannor. The artificers and mages have tried to purchase them for study, but the countries that brought them weren’t selling, since they were seen as state assets by the backers. If we want our artificers and mages to stay ahead of the curve, we must go get them ourselves."

 A05_modernized_reaverkin_title: "Modernized Reaverkin"
 A05_modernized_reaverkin_desc: "Before, being a Reaver was all about being strong, true to his word, and brave; now, with the integration of the gnomes, that has changed. A Reaver should also be inquisitive, intelligent, and industrious. Our Reavers now will raid in the morning, work in the afternoon, and research at night.\nYes, we raid and pillage, but when we return to our lands, we use those riches to improve scientific inquiries and the richness of our lands. The old Reaver Kingdoms decayed and collapsed because they focused only on one aspect of strength: the physical. We must also hone our minds.\nAn Axe-Pistol in one hand, a treatise on artificery in the other, that is what the new Reaver is."

 A05_land_of_the_reaverqueen_title: "Land of the Reaverqueen"
 A05_land_of_the_reaverqueen_desc: "With the land of the Reaverqueen in our domain and her citizens part of our realm, we should show them we are the same people. We should incorporate some suitable ornaments into our Reaver Crown, adding Derannic blue and green gems to our regalia. It may appear to be a superfluous act, but the commoners and some Derannic nobles would appreciate the gesture. We are the Kingdom of all Reavers, and we should show it."

 A05_henriks_bloodline_title: "Henrik's Bloodline"
 A05_henriks_bloodline_desc: "Henrik Divenscourge founded the Kingdom of Pearlsedge in 879 A.A. after conquering part of the Tretunic Kingdom, and his Reaver blood still flows through the veins of the nobility of Pearlsedge. So while we have a justification to claim their land and enter into a personal union, the real problem would be the Emperor.\nYes, if we are to claim [A11.GetRulerTitleAndNameOrRegencyCap]'s throne in the name of Henrik, we must gain supporters among the nobility to smooth the arrival of our administration, but we should prepare for a conflict with the Empire of Anbennar. It won’t be an easy fight."

 A05_divenscourge_pearls_title: "Divenscourge Pearls"
 A05_divenscourge_pearls_desc: "With the fourth Reaver throne now under [Root.GetRulerTitleAndNameOrRegencyCap]'s control, it is time to decorate the regalia with some Pearlsedger white pearls as we did with the Deranics, to show we are the Reaver Realm of all, and Divenscourge's heritage lives on in us."

 A05_the_furthest_realm_title: "The Furthest Realm"
 A05_the_furthest_realm_desc: "Long ago, before the era of the Ebonfrost, a realm went so far south-east as to even meet Bulwar. Although the great Kingdom of the Divenhal did not stay united for long, its heirs still survive in the Kingdom of Eborthil, ruled by a dynasty of outsiders. With our successes and expansions, some of their nobles and merchants have been whispering about a transition to the old royal family, governed by us.\nWe shouldn’t let those whisperers and secret meetings go for nothing. We should liberate our estranged family members and place a worthy dynasty on the throne of Eborthil. A Reaver’s Dynasty."

 A05_unfinished_business_title: "Unfinished Business"
 A05_unfinished_business_desc: "The Kingdom of the Divenhal did not manage to secure many of the islands it claimed to possess, despite being said to be the rulers of them all. Having now assumed the mantle of that Kingdom, we want to surpass them and thus we must finish their work and conquer the islands, giving us control of a rich trade area and showing our legitimacy as the Kingdom of all Reavers."

 A05_ruin_of_the_seas_title: "Ruin of the Seas"
 A05_ruin_of_the_seas_desc: "Our name is known and feared far and wide in Cannor, our raiders have claimed many shores and even more loot. And yet, we have not fully proven ourselves heirs to the significant era of the Old Reavers. There appears to be something missing; they fear us, they tremble at our name, but they still believe that we are a storm that will pass. Didn’t the Era of Ebonfrost end? Why shouldn’t ours then, our enemies claim.\nThat will change very, very soon. They will understand that we will not pass, we are not the storm, we are the sea, a constant presence at their shores. Then, they shall speak our name like that of the great Reaver Kings and Queens of old."

 A05_reaver_empire_title: "Reaver Empire"
 A05_reaver_empire_desc: "Towns set ablaze, kings scramble to assemble futile defences as we fill our warchests with their heirlooms. We are truly the most remarkable Reaver Kingdom ever to be. Still, our ancestors have done what we are doing; they pillaged, burned, and razed the entirety of Cannor. Still, we wallow under their shadow. If we are to immortalize ourselves as even more prestigious Emperors than those of the Ebonfrost, we must first claim a prize unclaimed by all. Pride of Cannor, Jewel of many Empires, the City of the World’s Desire.\n\nThe Great Reaver Empire shall be born on the Ashes of Anbenncóst."

 A05_the_reaver_fleet_title: "The Reaver Fleet"
 A05_the_reaver_fleet_desc: "The navies of our ancestors were once the scourge of the Westcoast. We must first expand our navy to bring about a new age of Reverian naval dominance. We will need ships, sailors, and admirals. Cannor had better prepare, the Reavers are back on the sea, and this time, no one will stop us."

 A05_westward_winds_title: "Westward Winds"
 A05_westward_winds_desc: "The winds of the Westcoast usually blow westwards. With the discovery of Lonely Isle, we should take it as our own and use it as a supply depot to explore further with the winds at our backs. According to rumours and old books, the elven homeland is supposed to be in the west. Some of our sailors reported seeing signs of land when they went west: birds, small branches of trees we had never seen before, and even rotten fruit that nobody could identify. We must send expeditions, and for that we need the Lonely Isle."

 A05_nostalgic_cold_title: "Nostalgic Cold"
 A05_nostalgic_cold_desc: "The cold in this area that our people have begun to call Dalyre reminds us of the cold our Gerudian cousins endure. However, the land is kinder to their attempts to farm, and there is much more space to expand and settle cities. The news of the land and our attempts to colonize it have attracted many seeking to venture out to those lands, an act now called "Dalyring". We must thoroughly manage these ventures so they don’t succumb to the frost, the dangers of the land, and the deformed elves that we have begun calling ‘ruinborn.’"

 A05_prepare_logistics_title: "Prepare Logistics"
 A05_prepare_logistics_desc: "It had become clear to us that the small rivers we found are of mild strategic interest; they help with communication, but nothing major. However, that changed when we found the Ynn. The local ruinborn believe this river is of sacred importance, and we can understand why. It’s key for the entire region, easy to navigate, and provides food and riches for all the realms that border it. We must prepare a logistical network to influence this grand river."

 A05_damned_dam_title: "Damned Dam"
 A05_damned_dam_desc: "Our first Ynnic raid was a bit of a disappointment, partially due to the hostile monsters in these rivers, partially due to our ignorance of the land, but largely due to that damned dam. We now understand how wars and conflict work in this land: the one that controls the dams has a clear advantage, so we must seek to conquer this dam and prepare another raid."

 A05_last_dragon_of_aelantir_title: "Last Dragon of Aelantir"
 A05_last_dragon_of_aelantir_desc: "A dragon still lives? If we are to find this dragon, we must gain control of the local area and search all temples, hills, caves, and forests. Dragons are supposed to be legends; our ancestors in Gerudia sing to ensure Elkaesal the White still slumbers. We will prove that we don’t need songs; with steel, gunpowder, artificery, and magic, we will go to any lengths to slay this monster. The Age of Dragons is over; now is the Age of the Reavers."

 A05_subjugation_of_the_ynn_title: "Subjugation of the Ynn"
 A05_subjugation_of_the_ynn_desc: "With the dams of the Ynn in our hands, the natives have no choice but to interact with us. If they want to send their caskets down the river, they need to ask our permission; if they're going to travel along the river, they need to talk to us; if they want to stop the floods, it’s us that they need to deal with. Our control of the region is already secure with the dams under our control, but some small enclaves still refuse to submit. We must conquer them, so the entire breadbasket of the Ynn can be ours forever."

 A05_second_age_of_black_ice_title: "Second Age of Black Ice"
 A05_second_age_of_black_ice_desc: "Not even in the wildest dreams of [Root.GetRulerTitleAndNameOrRegencyCap]'s ancestors could they have imagined such an incredible Reaver fleet wreaking such an outstanding havoc on these coasts. Our realm stretches beyond what was supposed to be possible, a union of all previous Reaver Realms under one crown; We have control of the seas, our technology is superior to all our enemies, our weapons are of the highest quality, our soldiers are the envy of all Cannor. It is truly the Second Age of Black Ice."

 A05_those_who_went_south_title: "Those Who Went South"
 A05_those_who_went_south_desc: "When Drekiríki met its first defeat, many left the realm seeking to claim their own legacy. They would go on to forge the great Reaver realms that populated and terrorized Cannor during the Age of Black Ice. But now, many of those realms have long abandoned their Reaver heirdom; they’ve grown lazy, apathetic to war, fat from the gifts of their lands, and they became just like the people they sought to raid.  Our southern neighbor, Deranne, is one such example. We should remind them of what they lost. If they are not Reavers anymore, then they will be our prey."

 A05_southward_winds_title: "Southward Winds"
 A05_southward_winds_desc: "With the rediscovery of Aelantir and its subsequent colonization, vast amounts of wealth have started to pour into the Cannorian coast. Piracy has never been this profitable, and some merchants have even begun to privateer the Westcoast. It has now become apparent that with our superior navy and Reaver history, we are in a unique position to attempt to begin a second Age of Reavers. If we are to do so, we need to establish a base further south, so we can reach the Bay of Wines, where the big pickings are."

 A05_picking_up_the_pieces_title: "Picking Up the Pieces"
 A05_picking_up_the_pieces_desc: "Long gone are the days of the great Kingdom of the Pearls, a realm that could pose a threat and dominate the waters of the lower Damesear. Now, its descendants are weak, vassals of the Emperor of Anbennar, embroiled in petty disputes with their neighbors in Verne. This is not a kingdom to be proud of, they are a shame to our Reaver ancestors, but we will wipe out that shame by rebuilding it in the true Reaver ways."

 A05_dominion_of_divenhal_title: "Dominion of Divenhal"
 A05_dominion_of_divenhal_desc: "Island by island, we have restored Reaver rule to the Divenhal. The locals now understand who the seas belong to. Not to the Copper Dwarves, not the Sun Elves of Elizna, not even the Viakkoc pirates or any other pretenders on the sea, it belongs to us. But to ensure this is permanent, we must build up our settlements, harbours, docks, and castles to secure the dominion of the Divenhal."

 A05_ruined_sea_raiding_title: "Ruined Sea Raiding"
 A05_ruined_sea_raiding_desc: "Stories of a sea with islands so numerous one can hardly count them have arrived in [Root.GetRulerTitleAndNameOrRegencyCap]'s court. And on those islands? Myriad riches that can be farmed, and more that can be taken by force. Surely these islands would be great assets to privateers at the center of all this newfound wealth in Aelantir. We can also build plantations and farms there for the new crops of this new world. We should prepare an expedition and settle our claims on the region."

 A05_king_of_trolling_title: "King of Trolling"
 A05_king_of_trolling_desc: "Whenever a new destination becomes commonplace for our people, it becomes a verb. One goes "Dalyring" when they seek to expand in the wild and settle it. One goes "Ruining" when he sails to the Ruined Sea to privateer from The Thousand Ports. Now, a new verb is being uttered by our people: "Trolling," sailing to the rich Trollsbay to plunder the local shipments. It is time for our navy to try this "Trolling."

 A05_the_fate_of_the_dome_title: "The Fate of the Dome"
 A05_the_fate_of_the_dome_desc: "Our conquest of the Ynn is almost over; we just need to end any pretenses of independence in the region. It is time we wrest control of the castle of Stanyrhrada out of the hands of the Ynnics and into ours. Then, we can decide what to do with this so-called Dome, which is claimed to be one of Ynn's most prized possessions."

 A05_remake_the_seascourge_title: "Remake the Seascourge"
 A05_remake_the_seascourge_desc: "We have heard tales of the gnolls. Brutal corsairs who terrorize the seas of the Divenhal and strike deals with their demon in pursuit of power. When we met them, their domain was a shadow of itself. We cannot lie, although we might not share their demon worshiping ways, we Reavers see ourselves reflected in their people. But while we grew, adopted new techniques, and brought new people into our realm, those gnolls stuck to their own ways, raiding and privatizing. They raided the coasts of Cannor, and what did they have to show for it? Where are the palaces? Where are the arts, the cultures, the technology? They squandered all of it; the land they rule continues to be a poor backwater.\nOnce, Reavers invaded Akasik to forge a kingdom of their own, but now we invade to remake one for the other folk. We will give the land back to the human inhabitants. The gnolls have shown that they can’t be trusted to rule their own realm."

 A05_home_far_from_home_title: "Home Far From Home"
 A05_home_far_from_home_desc: "Across Ueloses sea we find lands ripe for the taking; the location and climate are perfect for a new settlement. We must take what we can from these people, then build up the region in our image. They don’t appear strong enough to hold these lands; if they were, they would have triumphed over us."

 #Events
 reveria.6.t: "The Reverian Feast"
 reveria.6.d: "With the Reaver Reunion as nothing more than a distant memory, it was time for [Root.GetRulerTitleAndNameOrRegencyCap] to host a feast of [Root.Monarch.GetHerHis] own and invite Gerudian Konungr, Jarls, and Skalds. The first guests have already arrived, and the mood is exactly as [Root.GetRulerTitleAndNameOrRegencyCap] planned for. Even those who have proven enemies of the house have been invited, so no one can say the Reverians aren’t magnanimous towards their nemeses. Nonetheless, they didn’t come. As such, the halls of the Castle of [Root.Capital.GetName] were full with Gerudians. They tasted Lencori wine for the first time and enjoyed our short friends' entertainment more than the Reverians could have anticipated. The Skalds sing ancient Tales of Reavers during the Era of Black Ice that captivate the entirety of the court, including [Root.GetRulerTitleAndNameOrRegencyCap]. Many Tales and facts lost to the Reverians have been meticulously handed down by generations of Skalds. As the evening sets and our guests go out to "explore" the various noteworthy establishments in [Root.Capital.GetName] or return to their ships, they all thank [Root.GetRulerTitleAndNameOrRegencyCap] for [Root.Monarch.GetHerHis] hospitality. A successful feast, it seems."
 reveria.6.a: "Great people host Great Feasts"
 reveria.7.t: "Dome of Stanyrhrada Exported"
 reveria.7.d: "The vile Reverians have plundered our river settlements, our temples, our relics, and our honour. We fought them on the Ynn, on the land, in the forbidden lands, and at every step, we fought and resisted them. Successive generations of our people have died against their blades - yet that was not enough for them; now they have taken the Dome of Stanyrhrada all the way back to their distant Cannor. We will never forgive them. As long as the Ynn flows, our hatred for the Reverians will continue too."
 reveria.7.a: "Never Forgive, Never Forget"
 reveria.8.t: "Researcher Expedition to Gerudia"
 reveria.8.d: "[A05.GetRulerTitleAndNameOrRegencyCap] has sent an expedition of chroniclers to the Skalds of Gerudia to document all matters related to the Reavers' bloodlines. The lineages of the Reaver Kingdoms of Reveria, Deranne, and Pearlsedge have been carefully documented and brought back to court. Despite long debates, it was decided that we could lay claim to the lineages, given the tenuous connections. But why not invoke one of the oldest laws of the Reavers? Might makes right, and all Reaver Kingdoms except ours are gone. If Deranne and Pearlsedge cannot rebuff our forces, then they aren’t rightful heirs of the Reaver Kingdoms; if they can, then we are not a true Reaver Kingdom.\n\nLet us announce our claims, that all Cannor know that we are the Reaver Kingdom and that we seek to restore what is ours."
 reveria.8.a: "The Weak Submit, the Strong Rule"
 reveria.9.t: "The Reaver Crown"
 reveria.9.d: ""The crown is finally here!" A servant exclaims as he storms into [A05.GetRulerTitleAndNameOrRegencyCap]'s courtroom. A minute later, a box carried by the [Root.GetRulerTitleOrRegency]'s most trusted men is opened, and a beautiful crown is revealed. A Reverian White crown with Drekiríki Red ornaments, it is truly a new height for the regalia collection of Reveria. The old crown is quickly handed away to a servant and the [Root.GetRulerTitleOrRegency] dons the Crown."
 reveria.9.a: "A Reaver Crown"
 reveria.10.t: "The Fate of the Border"
 reveria.10.d: "With the recognition of the Small Country state and the formalization of our alliance, a small but vital discussion between diplomats has ensued over the fate of Turnwell and Manerd, two provinces which some claim belong to the Small Country. We should handle this issue before tension arises."
 reveria.10.a: "Cede the provinces and move all non-halflings to our capital"
 reveria.10.b: "Let the halflings leave, compensate them and the state"
 reveria.10.c: "Manerd and Turnwell are not part of our domain"
 reveria.11.t: "Formalize Artificery in Reveria"
 reveria.11.d: "The Artificery Guild is not a plan or saying, it’s already a reality. Several cities already have research centers, and our artisans, farmers, sailors, and soldiers use their inventions. It has spread and touched every aspect of our society; even if we wanted to, we likely couldn’t dissociate the Reavers from Artificery. What is needed now, is the official confirmation that Magic isn’t the only avenue of research and discovery. Thanks to the Gnomes and our investments, we have created a new scientific sector for our country. What is needed now is just the signatures and…"
 reveria.11.a: "These documents always require way too many signatures"
 reveria.12.t: "A New Capital?"
 reveria.12.d: "With the conquest of Oddansbay behind us, several interest groups have mentioned both the necessity of developing Oddansbay and the possibility of it one day becoming our new capital. Proponents of the move advocate that it would be a more defensible location and that the Oddanroy estuary, paired with the ancient foundations built by the gnomes, will make these stone ruins a better capital than our current one."
 reveria.12.a: "We’ll need to clear out the kobolds and repair vital parts of the city"
 reveria.13.t: "A New capital!"
 reveria.13.d: "The city of Oddansbay has been prepared for our government. The streets of [Root.Capital.GetName] now overflow with the carts of migrating Reverians, while the docks are brown with ships carrying far too much cargo aboard. Across the entire state, people are migrating to Oddansbay to claim a piece of their new home."
 reveria.13.a: "It may be a step forward, but I'll miss it here"
 reveria.15.t: "'But We Don't Have Darkvision!'"
 reveria.15.d: "The gem industry of [Root.Capital.GetName], has proven lucrative; however, the meager supply of raw gems is seriously hampering the economy, according to a prominent Cliff Gnome industry representative. Presenting documents showing ancient expeditions into the kobold caves that revealed plenty of gems, he urges [Root.GetRulerTitleAndNameOrRegencyCap] to conquer the caves so the economy can be bolstered with gems and metals. His arguments are sound and so [Root.GetRulerTitleAndNameOrRegencyCap] begins planning, even if [Root.Monarch.GetSheHe] is worried about the implications of fighting kobolds with darkvision in their dark hovels."
 reveria.15.a: "Let us conquer these caves"
 reveria.16.t: "A Realm of Gears and Axes"
 reveria.16.d: ""You see, your math is quite good, but you committed a mistake. I believe because you have not read the recent book of Elmiphi Hepplewopple regarding static tension in springs.”\n\n“I personally dislike Elmiphi's work, as I believe her mathematical proofs are not strong enough, so I mostly used the works of Felbis Rarkase regarding iron resistance and put the springs as a constant variable for my calculations.”\n\nThe terrified merchant, thanks to years in his profession, knew the language of the Reverian raiders. But he didn’t know whether he was supposed to be scared or confused by what the two burglars were talking about.\nThe short one pointed his axe at the merchant: "Show all your valuables, or we will take your life." Before returning without a moment of hesitation to talking to the other Reaver, a taller woman: “Yes, but you need to understand that the field of static tension in springs is still quite new. I am finishing a paper about this I can lend to you that would help with your equations.”\n\nThe Women Reaver laughed as she counted all the possessions of the merchant, who was nervously giving everything he had,“Can you believe it? You, writing about springs. You always complained on the ships about the difficulty of calculating spring tension, and now you are the expert. But I will take a look, since I quite liked your work on calculating the sea tides in relation to the moon's ascension.”\n\nWhen the merchant returned home, bereft of his belongings, he had a new piece of knowledge of the Reverians: it appears that all the Reavers now were quite dedicated to the sciences.”"
 reveria.16.a: "At least his possessions will be used for the advance of science"
 reveria.18.t: "The First Ynnic Raid"
 reveria.18.d: "The conquest of the dam of Bosancovac is completed. The time has finally come for the first raid. The fleet has been preparing to ensure this one is successful. Our crews are bolstered by Ruinborn Ynnics who know these waters well. Our boats now sail closer together so that the soldiers aboard them can support one another. With these strategies in place, along with a dozen more precautions, the raid appears to be going splendidly. As the raiders pillage the various estuaries before continuing southwards, they find themselves blocked by the Vels Bacar dam. The fleet turns around and takes a different route, north. Many more days of raiding go by, and eventually, another dam is reached, the Mocbarja dam. With all of their opportunities exhausted, the fleet decides to head back to Bosancovac. This raid was a resounding success; some ruinborn settlements were too well fortified to plunder, and some beasts too fierce to kill, but in the end, the Reavers returned victorious, for they got information. And besides a lot of gold, that is the most important trophy for a raider."
 reveria.18.a: "Time to conquer some more dams"
 reveria.19.t: "The Southern Ynnic Raid"
 reveria.19.d: "With the Vels Bacar Dam in our domain, our Ynnic Reaver fleet can raid the southern reaches of this subcontinent. At this point, the logistics of our raids are honed to near perfection, so each raid goes rather smoothly, but the southern Ynnics put up a valiant fight in some of the more developed settlements. When our men sail towards the fiefdom of Stanyrhrada, a marvelous golden gleam blinds them as the sun reflects off a great golden dome atop the city's castle. It has now become clear that the domes seen in other Ynnic settlements were mere imitations. Under duress, the locals tell us it is a magical dome from a bygone era that allegedly casts a spell of good fortune over the region. Sadly, due to the castle's extensive fortifications, our raiders cannot take it… yet. It is as desirable as it is out of reach; we simply must come back for this dome."
 reveria.19.a: "We'll be back, for that dome"
 reveria.20.t: "The Northern Raid"
 reveria.20.d: "With the Mocbarja Dam securely in our grip, the men are restless, and the treasury could use some fattening; it is time for the Northern Raid. Our men set out from Mocbarja and raided several areas over the following days, the most profitable being the dense city of Svemel. A curious detail about this place is that these people do not worship the Ynn; they instead appear to worship dragons. As such, much of the loot comes in the form of dragonic art: pots painted with dragons, glass or iron dragon figurines, and relics from bygone eras. The raid went well, with minimum casualties, and now it is time to head back to Mocbarja..."
 reveria.20.a: "Nothing can stop us"
 reveria.21.t: "Dragonsbain"
 reveria.21.d: "As the boats sail downstream back to Mocbarja, a dragon is spotted in the distant sky, approaching fast. In the blink of an eye, the fleet is set ablaze by this fearsome green beast. Reavers jump into the water, preferring sea serpents or any other monster than a literal Dragon. Our troops hopelessly pelt it with projectiles as the dragon comes back for a second fly-by, and then a third, before deciding it has had enough and begins to fly off. Most of our fleet was burning down; the captain of the expedition had to be removed from the ship by force and he unfortunately lost his leg, but he kept shouting to the Dragon in the distance:"
 reveria.21.a: "I'll hunt you to the ends of the earth. I will have my revenge!"
 reveria.23.t: "Transporting the Dome"
 reveria.23.d: "Now that the dome is in our possession, we must figure out how we are moving this humongous relic back to [Root.Capital.GetName]."
 reveria.23.a: "With enough workers and ships, anything is possible"
 reveria.24.t: "Selling the dome?"
 reveria.24.d: "Now that we have the dome in [Root.Capital.GetName], some of our advisors are saying we should keep it and display it in our capital. But a minority says that a relic such as this would be worth its weight in gold, and that we need not display opulence when we can finance our troops and acquire even more opulence. The decision is yours."
 reveria.24.a: "Incorporate it into [Root.Capital.GetName]'s castle"
 reveria.24.b: "Sell it to the highest bidder"
 reveria.25.t: "Reaver Reunion"
 reveria.25.d: "The merchants of Reveria have intensified contact with our markets after their conquest of the Storm Isles. [Z08.GetRulerTitleAndNameOrRegencyCap] and [A05.The [GetRulerTitleAndNameOrRegencyCap] of Reveria have since been exchanging letters, and slowly, an idea for a feast has been forming in their heads. A feast to celebrate the return of the Reavers. [Z08.GetRulerTitleAndNameOrRegencyCap] will indeed host one."
 reveria.25.a: "[Z08.GetRulerTitleAndNameOrRegencyCap] is looking forward to it"
 reveria.34.t: "Reverian Diplomacy"
 reveria.34.d: "The Reverians offered us an alliance in our time of need, bringing much-needed support to our war effort. As our diplomats discussed the fate of the historically halfling provinces of Turnwell and Manerd with them, it was decided that Reveria would extract the non-halfling people from the land and then hand it over to us, the rightful owners. What a trustworthy people."
 reveria.34.a: "We could not ask for better allies"
 reveria.35.t: "Reverian Diplomacy"
 reveria.35.d: "The Reverians offered us an alliance in our time of need, bringing much-needed support to our war effort. As our diplomats were discussing the fate of the historically halfling provinces of Turnwell and Manerd with them, it was decided that Reveria would compensate for the extraction of the local halflings and pay a hefty sum of gold for the Small Country to relinquish their claims to it."
 reveria.35.a: "We really needed the crowns"
 reveria.37.t: "Gnomes in the government?"
 reveria.37.d: "The gnomes of the realm have been taking up exceedingly vital positions recently, and they hold those positions well. Their administrative skill is undeniable, and their innovativeness is unrivaled in the realm. Gnomes are petitioning for more government positions and want gnomish personnel to assist them. Should we embed the gnomes deeply in our government, or try to retain a [Root.Culture.GetName] monolingual government?"
 reveria.37.a: "Let the gnomes fuse with our government"
 reveria.37.b: "The government is functional as is"

 #Winebox Event Chain
 reveria.42.t: "Wine for Lothane III"
 reveria.42.d: "With the new alliance between Lorent and the Wexonard king Lothane III, the pressure of the Emperor is off of Lorent's back. If this is to be kept that way, he should remain pleased. Perhaps a gift is in order."
 reveria.42.a: ""Herald, send our best wine to Lothane III""
 reveria.42.b: ""I have no time for this""
 reveria.43.t: "Lorent Sends Wine"
 reveria.43.d: "[A01.GetRulerTitleAndNameOrRegencyCap] of Lorent has gifted Lothane III some fine Lencori Wine. Perhaps Lothane III should send something back?"
 reveria.43.a: ""Herald, commission [A01.GetRulerTitleAndNameOrRegencyCap] a sword from Ironhill steel""
 reveria.43.b: ""Considerate, but I have no time for this""
 reveria.44.t: "Rogue Rouge Wine"
 reveria.44.d: "[A01.GetRulerTitleAndNameOrRegencyCap] of Lorent has sent a box of fine Lorentish rouge wine to Lothane III, but upon reading the letter attached to it, it has become clear that due to a misunderstanding, it has arrived at the court of Lothane III of Reveria instead of the court of Lothane III of Wex. What shall be done with this rogue bottle?"
 reveria.44.a: "Call the herald and have him return the wine to Lorent."
 reveria.44.b: ""I love Lencori rouge wine!""
 reveria.45.t: "Wex Returns Gesture"
 reveria.45.d: "Lothane III of Wex has returned the gesture and has bestowed the Lorentish court with a decorative sword forged from Ironhill steel."
 reveria.45.a: "What a pleasant man."
 reveria.46.t: "Unrequited Gift"
 reveria.46.d: "It's been a while and Lothane III hasn't sent anything back, this seems rather rude."
 reveria.46.a: ""Alenic culture has once again been proven to be an oxymoron.""
 reveria.47.t: "The Mix Up"
 reveria.47.d: "The herald sent to deliver the wine to Lothane III of Wex has misunderstood and delivered it to Lothane III of Reveria. Accidents happen, but to [A01.GetRulerTitleAndNameOrRegencyCap]'s dismay, Lothane III of Reveria is refusing to return the wine!"
 reveria.47.a: ""This is a huge insult""
 reveria.47.b: ""I'll send another bottle""
 reveria.48.t: "The Mix Up"
 reveria.48.d: "The herald sent to deliver the wine to Lothane III of Wex has misunderstood and delivered it to Lothane III of Reveria. Accidents happen, and to [A01.GetRulerTitleAndNameOrRegencyCap]'s relief, Lothane III of Reveria has sent the herald back with the wine."
 reveria.48.a: ""What a pleasant man, now deliver it to his namesake in Wex""
 reveria.48.b: ""What a pleasant man, send both Lothane IIIs a bottle!""
 reveria.49.t: ""The Second Bottle""
 reveria.49.d: "[A01.GetRulerTitleAndNameOrRegencyCap] of Lorent was so pleased with the returning of the misplaced bottle that they have decided to send us a bottle as well."
 reveria.49.a: ""Let's send [A01.GetRulerTitleAndNameOrRegencyCap] some delicious Reverian fish.""
 reveria.49.b: ""I guess both Lothane IIIs will be getting drunk tonight.""
 reveria.50.t: "Reverian Fish"
 reveria.50.d: "[A05.GetRulerTitleAndNameOrRegencyCap] of Reveria was so pleased with out second bottle, that they decided to send some of their famous Dragon Coast saltwater fish, how very considerate. And it's cooled with ice too!"
 reveria.50.a: ""Perhaps the Portroy Agreement will hold after all.""
 #Chain End

 reveria.51.t: "Friends in Small Places"
 reveria.51.d: "With relative peace returned to the region, relations between the Small Country and Reveria are beginning to take form in other ways than just a military alliance. As Viswall dye is imported to improve Reverian clothing, Reverian fish is exported to fill halfling bellies. As the Reverian boatsmiths aid the halfling merchants in making their ships extra fit to trade on the Middanroy, Small Country advisors aid the Reverians in striking good deals with mercenaries."
 reveria.51.a: "An alliance to last the ages"
 reveria.52.t: "Friends on the Dragon Coast"
 reveria.52.d: "With relative peace returned to the region, relations between the Small Country and Reveria are beginning to take form in other ways than just a military alliance. As Viswall dye is exported to improve Reverian clothing, Reverian fish is imported to fill halfling bellies. As the Reverian boatsmiths aid the halfling merchants in making their ships extra fit to trade on the Middanroy, Small Country advisors aid the Reverians in striking good deals with mercenaries."
 reveria.52.a: "An alliance to last the ages"
 reveria.53.t: "Reveria Demands Unification"
 reveria.53.d: "The Kingdom of Reveria, which claims to be the rulers of all Reavers, has seen the death of the Bera Crown and has come to us with a less than humble proposition. They also sent a list about the disposition of their armies, navy and the strength of their allies, it’s quite obvious what this implies."
 reveria.53.a: "Do we even have a choice?"
 reveria.53.b: "They can hardly call themselves kings of anything!"
 reveria.54.t: "The Roots of our Kind"
 reveria.54.d: "We have done much research on our ancestry. It is now time we decide how much we want to re-assamble the reavers of old."
 reveria.54.a: "Use the local folks name for our land"
 reveria.54.b: "Embrace our Hereditage"
 reveria.54.c: "Actually, theres someone i must meet first"
 reveria.54.e: "We are fine as we are"
 reveria.55.t: "A Name Not Yet Lost"
 reveria.55.d: "Our [Root.GetRulerTitleAndNameOrRegencyCap]'s recent travels to Gerudia to meet the Heritage scholars have brought some news. They claim that they have stumbled upon a child of surviving Askelings, heirs to Askel, the founder of Reveria. It’s of a distant branch but still from the founders of our Nation. We could name the young child of the family as heir, or we could just ignore them as it’s a distant branch."
 reveria.55.a: "So, Son of Askel, shall we march home?"
 reveria.56.t: "The Right to the Land"
 reveria.56.d: "Now that we have begun reconquering land in the Dragon Coast, we must decide how it will be divided amongst us and the gnomes. We will take this decision now to facilitate the land split as we conquer. Both sides present their arguments as they are the rightful owners of the land. Still, the situation could be boiled down: the Reavers represent most of our soldiers and generals, and the gnomes our advisors and researchers. Which side should we favor?"
 reveria.56.a: "Favor the Reavers"
 reveria.56.b: "Favor the Gnomes"
 reveria.58.t: "The Future of the Crown"
 reveria.58.d: "Ages have passed, and time has struck us like waves against a rock. At the moment, we are Reveria, the last remaining of the Reaver kingdoms. Deveria abandoned that tradition, Pearlsedge currently cares more about the Empire, and Eborthil has moved to embrace trade, not raiding. We are the last ones. If we are to endure, we must rebuild our realm. We call upon the old Reavers amongst the nobility to take their advice."
 reveria.58.a: "And so we shall endure"
 reveria.59.t: "The Gnomish Reforms"
 reveria.59.d: "At this moment, we can say without a doubt that we are a human army with gnomish artillery. We have not just integrated it into our army and navy, we have melded it completely; human gunners use gnomish methods for the making of gunpowder, and even for the calculation of the cannons. That has turned our backlines incredibly deadly, and our soldiers now speak with a mixture of Reaver and Gnome slang."
 reveria.59.a: "The best of both worlds, Reaver and Gnomes."
 reveria.60.t: "REAVER INVASION"
 reveria.60.d: "The reavers have come, and they don’t care about anything but to rob us blind and destroy all that they see. We must rally our defenses and push them back."
 reveria.60.a: "Oh no!"
 reveria.61.t: "The Fire of Yore"
 reveria.61.d: "The destruction of [Emperor.Capital.GetName] and Anbennar wasn’t just burning down the buildings, stealing what was valuable, and leaving. It wasn’t destruction for profit, it was destruction with a goal: the complete and total destruction of both cities. The stones of houses and roads were removed; no building was left standing, no marker, statue, or signifier remained. The cities weren’t simply demolished, they were ended. The population enslaved, killed, or fled, for the only thing left of Anbennar and the Emperor's Capital was the charred ground filled with ashes.\n\nThat was a sign to the entirety of Cannor and Halann: a new age had started. May the gods have mercy on us all”"
 reveria.61.a: "Ur askan återföds Reaverkin"
 reveria.62.t: "Color on the Maps"
 reveria.62.d: "With the advance of our Realm, a question presents itself: what color shall we paint our Great Empire in our maps?"
 reveria.62.a: "Keep Current Color"
 reveria.62.b: "Option 1"
 reveria.62.c: "Option 2"
 reveria.62.e: "Option 3"
 reveria.62.f: "Option 4"
 reveria.63.t: "Dominion"
 reveria.63.d: "They say that actions matter more than words, and we, the Reavers, have done it all on the seas. We didn’t proclaim the seas were ours; we showed the world that the water belonged to the Reavers. Any ship in the ocean that belonged to us had to have our authorization to sail, and we sank any power that refused our merciful edict. We raided every coastline, then we demanded tribute, or we would raid them again.\nWe didn’t write nor proclaim anything; we just did what we wanted. Now, it all belongs to us. And so, the time has come..."
 reveria.63.a: "...To Proclaim a New Era of Black Ice"
 reveria.63.b: "...To Proclaim an Eternal Golden Age"
 reveria.64.t: "Reaver Restoration"
 reveria.64.d: "Despite the mixture with the Gnomes and the influences of the other people of the Dragon Coast, we Reverians endure, and our cultural influence is felt far away from our homeland. It not only has endured but it has extended itself."
 reveria.64.a: "We Remain"
 reveria.65.t: "Revenant No Longer"
 reveria.65.d: "Castellos is dead. We find ourselves again on the realization that the gods we thought reincarnated are now falling apart, as our ancestors once did. We abandoned our Gerudian practices, believing the gods of the Regent Court were reborn gods of old. If Castellos is dead, what about the others? What about Nerat? ‘How can we even be sure that any of the Regent Court are alive,’ claim the proponents of the return to the Skald Faith as they seek to return to our traditions.\n\nStill, there are two other groups: one that claims the Gnomes could be the way; despite all their losses and destruction, they have lasted for centuries thanks to The Thought. Now that we have integrated them into our realm, why not also incorporate their “religion”? The second option is even more fringe, whispers in the dark and rumours, but if we are a people of the sea, why not turn to Uelos?\n\nWhat should we do?"
 reveria.65.a: "We are still loyal"
 reveria.65.b: "Return to the Old Faith"
 reveria.65.c: "The Gnomes have some interesting ideas"
 reveria.65.e: "I hear the call of Uelos"
 reveria.66.t: "The Chance of a Century"
 reveria.66.d: "The halflings have risen up! Now is the time to break the false dichotomy: we are not either puppets of Lorent or Gawed! We can be masters of our own fate, together with others brave enough to resist, and those others have just shown themselves! We go to war! For Small Country! For Reveria!"
 reveria.66.a: "To War!"
 reveria.66.b: "Well, perhaps not"


