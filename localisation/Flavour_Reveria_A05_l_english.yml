 reveria_innovativeness.tt: "Every §G10§! §YInnovativeness§! will remove §Y100§! admin from the cost, at §G40§! §YInnovativeness§! the mission §Gwill not cost any points§!"
 reveria_precursor_relic_buff.tt: "Said §Y2§! provinces will gain the province modifier §YFeed the Experiments§! for the rest of the game, giving the following effects:\nLocal Development Cost: §R+20.0%§!\nLocal Goods Produced Modifier: §G+20.0%§!"
 reveria_unlocked_artifice_invention_reaver_axe_rifle.tt: "Unlock the Unique Artificery Invention §TReaver Axe-Rifle§!"
 reveria_spy_network_or_advisor.tt: "Has §Y50% Spy Network§! on owner or overlord OR has §Y30% Spy Network§! and a §YSpymaster Advisor§!"
 reveria_divenhal_sea_claims.tt: "§Y[Root.GetName]§! gains a permanent claim on all §YEast Divenhal Sea§! Islands"
 reveria_divenhal_sea_owns.tt: "East Divenhal Sea Islands:\n   Owned by §Y[Root.GetName]§!"
 reveria_divenhal_sea_cede.tt: "Cede most of the §YEast Divenhal Islands§! to our closest §YReaver Kingdom§!"
 reveria_ruin_of_cannor.tt: "§RWe will bring ruin to the Divenhal§!\n\nOur people will begin §Rransacking coasts§! across §YCannor§!, §YBulwar§! and §YNorthern Salahad§!, increasing §Ydevastation§! and §Ylooting§! the provinces in our name.\nSome may choose to stay, changing the §Tculture§! and §Treligion§! of those provinces, the owners of this province will gain the country modifier §YREAVER INVASION!!!§! for 25 years, giving the following effects:\nStability Cost Modifier: §R+50.0%§!\nManpower Recovery Speed: §R-25.0%§!\nGlobal Unrest: §R+4.00§!\nGlobal Monthly Devastation: §R+0.50§!\n\nUp to §G5§! of this provinces will become §Towned by us§!\n"
 reveria_fire_of_yore.tt: "Every §YPersonal Union§! will get the country modifier §YThe Age of Ice and Fire§! for the rest of the game, giving the following effect:\nShock Damage: §G+15.0%§!\nLoot Amount: §G+100.0%§!\n\nEvery Country with its capital in §YWestern§! and §YEastern Cannor§! gain the country modifier §YTerror Anew§! for 25 years, giving the following effect:\nGlobal Unrest: §R+2.00§!\nMorale of Armies: §R-15.0%§!"
 reveria_finalreward.tt: "\n§YBecause of our choice of faith we will get:§!"
 reveria_skald_final_reward.tt: "Gain the Ability to §YSwitch Tales§! once a year"
 reveria_the_thought_final_reward.tt: "Raiding provinces above §Y24§! development will grant us §G20§! §YReform Progress§! and §G2§! §YInnovativeness§!"
 reveria_uelos_cult_final_reward.tt: "Gain §TWoe of Madness§! religious action, allowing us to host §GSea Hunts§! and improve the stats of our ruler or heir"
 reveria_generic_final_reward.tt: "Raiding province of a §Ydifferent religious group§! will grant us §G-10%§! §YLiberty Desire Based on Subject Development§!, stacking up to §G3§! times"
 reveria_change_religion.tt: "§gWe will lose these bonuses if we change religions§!"
 reveria_change_between_group.tt: "Changing between §TRegent Court§!, §RInfernal Court§!, §rCorinite§!, §ODalccaba§! or §gRavelianism§! will NOT remove this reward"
 reveria_nostalgic_cold.tt: "Colonies in the §YDalaire§! or §YBroken Sea§! Colonial Regions will gain the province modifier §YNostalgic Cold§! until its finished, giving the following effect:\nLocal Settler Chance: §G+10.0%§!\nLocal Settler Increase: §G+20.00§!"
 reveria_gnomes_on_ice.tt: "§pGnomish Minorities§! now have a chance to be added when colonising provinces in the §YDalaire§! and §YBroken Sea Colonial Regions§!"
 reveria_upper_ynn_raid.tt: "§R[Root.GetName] and subjects will raid Dolindha§!"
 reveria_lower_ynn_raid.tt: "§R[Root.GetName] and subjects will raid Sarda§!"
 reveria_north_ynn_raid.tt: "§R[Root.GetName] and subjects will raid Rzenta§!"
 reveria_ynnic_takeover.tt: "§Y[Root.GetName]§! will gain all §TRuinborn§! owned land in §YUpper Ynn§!"
 reveria_ruined_sea_save.tt: "In the event that we establish a §YColonial Nation§! in the §YRuined Isles§! it will gain the country modifier §YRuined Sea Reavers§! for the rest of the game, giving the following effects:\nMay Raid Coasts, including coasts of countries with the same religion\nCostal Raid Range: §G+1.00§!\nPrivateering Efficiency: §G+25.0%§!"
 reveria_religious_chaos.tt: "§RThe Faith of the Reaver People will be submerged into Chaos§!"
 reveria_gain_raid_bonus.tt: "§YKingdom of Reavers§! reform is §Yupgraded§!, now grants the following effect:\n§YRaiding Coasts§! will grant us §G2§! §YSplendor§! and §G1§! §YNavy Tradition§!"
 reveria_remake_the_seascourge_trigger.tt: "Deshak, Khasa and Ekha:\nOwned by §Y[Root.GetName]§! or its non-Tributary Subjects.\nHas a §YShipyard§! or a §YGrand Shipyard§! buildings.\nHas a §YDock§! or §YDrydock§! buildings.\nHas a §YBarracks§! or §YTranining Fields§! buildings."
 reveria_dominion_of_divenhal_effect.tt: "New Tefkora, Annailsub and Bus-Akasu gets '§YReaver Settlement§!' until the end of the game, giving the following effect:\nLocal Construction Cost: §G-20.0%§!\nLocal Construction Time: §G-20.0%§!\nLocal Trade Power: §G+5.00§!\nSailor Increase: §G+500§!\n\nCulture in §YNew Tefkora§!, §YAnnailsub§!, §YGemisle§! and §YPir-Ail§! will become §YReaver Tefori§!.\nCulture in §YBus-Akasu§! will become §YReaver Akasik§!.\n\nReligion in §YNew Tefkora§!, §YAnnailsub§!, §YGemisle§!, §YPir-Ail§! and §YBus-Akasu§! will become §Y[Root.Religion.GetName]§!."
 reveria_lose_if_not_human.tt: "§YWe will §rlose§! this modifier if our military is not primarily human§!"
 reveria_dragon_coast_trade_goods.tt: "Up to §Y10§! provinces in the Dragon Coast producing §YWool§! or §YFish§! will receive new §GTrade Goods§!"
 reveria_hears_the_sea.tt: "If our faith is ever put to question, we may answer the §BCall of the Seas§!"
 reveria_is_human.tt: "§gIf we have §YHuman Military§! we will gain an event giving us various Gnomish bonuses for our military§!"
 reveria_owns_cores.tt: "All Core Provinces:\n   Owned by §Y[Root.GetName]§!"
 reveria_cede_akasik.tt: "Every owned province in the §YAkasik region§! will be ceded to §Y[Root.GetName]§!"
