 mechanim_formable_desc_custom_tooltip_null: "You cannot settle in this region, travel further to find permanent settlement"
 mechanim_formable_desc_custom_tooltip_kiretua: "We have wandered the Hinuilands for long, traversing and learning from its life. In the end, what has captivated our minds the most is that which we may never achieve in its true form: death.\nFor long we have wondered what is the end, what comes after especially to us whom most would see as not part of the natural order. We have tried to find answers in this land yet none seem to satisfy us.\n\nPerhaps our answer just isn't here.\n\nSo it is then that we seek to reach beyond, to cross the seas and find the answers to our questions. We are united not in what we are but what we seek! We are the sailors of doubt; we are Kiretua."
 mechanim_formable_desc_custom_tooltip_rangitema: "Insyaa was scarred.\nFrom the first day we walked into this land we have been beset by untold horrors. Monsters far surpassing the height of anything else, fauna and flora of ravenous hunger, treacherous land seeking to open up beneath your feet and end you. A continent once so beautiful was turned into a land of horrors by those who made us.\nYet, Insyaa is still a haven.\nBreak the chains, protect the weak, fight the monsters, and what are you left with? Humans, ogres and kobolds all free, a society of color and warmth. Even in its darkest moments Insyaa is a land of hope.\nThat is a hope we will fight for.\nFrom this valley we will build every technique and technology we will need to invent and employ so that our struggles to heal this tormented land will not be in vain. Our tribe will reforge itself completely into warriors of this land.\nMark our words, the words of exalted Rangitema: Insyaa will be healed, and no one will ever hurt her and her people ever again."
 mechanim_formable_desc_custom_tooltip_anahira: "“I always wondered how it would feel to fly,\nto open your wings and soar across the skies.\nA land like Insyaa, so cruel and so beautiful, is something that must be seen from the heavens.\nAnd yet, such is our fate to be stranded on the earth forever.\n\nMy ideas seem to have captivated the tribesfolk. I've seen the more curious among us craft wings with leaves in an attempt to imitate the birds they see above. Even though we have among our tribes those born with the bodies needed to soar across the heavens our people are not content using them as mounts. It is not enough to fly: one has to be the one doing it, to be truly free.\nWe have done so well; we have found a place to call our own here where one of the great pillars lies. To see them grow as more than just wanderers, to see them imagine and create... my little Angels, I see it in your eyes! One day you will reach the skies.”\n- Extracts from the Secret Diary of the Canary King"
 mechanim_formable_desc_custom_tooltip_pa_aroha: "The Hinuilands are a hellish place.\nInhabited by brutal titans that pierce the heavens and flora with a taste for everything that moves, you would not be questioned for being content with survival and nothing more.\nHidden under the rough edges and the constant roarings there is a beauty that lies waiting to be captured. For those with an eye for art this place can be a muse, a canvas to create works of art that might change people like the poet once changed us.\nIn the end, this all is because of him.\n\nAmong our tribe many have taken upon the idea of following his steps, of re-inventing our kin like he once did. A pair in particular have come up with an idea that has captivated our attention. We are in a position to see it become real; Pa-Aroha, a city on the coast of the Great Beast Spire built to become a haven of art, love and peace in the middle of the jungle!"
 mechanim_formable_desc_custom_tooltip_rakauma: "To walk the Hinuilands is to meet nature at its rawest.\nWe have wandered across this land seeking answers to questions that, ironically, we ourselves never asked. We have met many other groups of mechanim that have spoken of their ideas and visions of the future. They speak of Kings rising above guiding them to some mythical vision of greatness, collectives elected by words of eras gone, a prophet awaiting deeper...\nWhy is it that they seek the chains that will bind them? Why do they walk the path of the entrapped?\nThey are so focused on finding what they seek that they do not realise that not all those who wander are lost.\n\nWe do not want this outcome; we need no crown or lord. No, we seek to build a society for the free, for those who see movement as the way of life and for those who see nature as the only law.\nNo chains. No masters. No fears. The children of the white trees march as one, in harmony with the land they walk."
 mechanim_formable_desc_custom_tooltip_taikatanga: "Fleeting memories of what once was remain in our hearts. We see a land shattered into pieces, a people that saw to meet and have peace. A golden age, times of love and the arts.\nWhere has this world gone? Does nothing remain of what we once knew?\nNo, something remains. We remain, and the desire for a better tomorrow remains in us.\n\nWe have the memories and the will, so we must see it reborn. Kanolowele can be restored to its former glory, to the beauty we left behind that day.\nUnder our care, under a consensus made and guided by us, we can begin to rebuild what once was and bring a new Golden Age to Kanolowele!"
 mechanim_formable_desc_custom_tooltip_motu_ahi: "There is a saying among our people: “To wander is to wonder”. We live by these words. Our many years walking the lands have shown us many things that have made our minds soar with wonder of what is and what could be, but nothing has ever piqued our imagination like magic.\nA natural body's capability to create sparks and create with one's own cultivated talent ... in truth, it is something we envy. We have been told many times that it is impossible for our kin to do magic. For as much we have tried we simply lack the spark that allows others to cast magnificent spells.\n\nBut that answer is simply not good enough. Here in Kanolowele lies the answer, the fire that can ignite the spark in our people and we will find it.\nTo this extent and in light of our tribe's recent ascension as a dominant force in the western isles we have come up with a plan. We shall engineer a realm like no other engineered to learn and test everything with the end goal of finding the spark of magic in our people. We shall rule over an island of fire, which we shall call Motu-Ahi!"
 mechanim_formable_desc_custom_tooltip_wairuakore: "Since our arrival at the Great Plateau many of the beliefs of our tribe have been put to question. What is a Mechanim's place in this world? As creations of artifice it is hard to find the words that define us, what makes our souls, or just what role we play. The Utubodi believe in the Infinite Self, of the great cycle and the spirits placed on it; as we learn from them we fail to find how we connect to it...\n\n... but perhaps that is not a bad thing?\n\nIn truth we do not have all the answers, but what we do have is the desire to learn. Having wandered the land and carved our place on the plateau we think it is time for us to settle down here so we can continue to learn of our nature and learn what we can from the local people."
 mechanim_formable_desc_custom_tooltip_i_numbe: "Deep into the darkness we sank.\nLost between the hellscape of hungering mushrooms and horrible creatures we found the place to which a voice was guiding us.\nWhy were we here? Who was this voice? Why did we answer?\nWe sought the allure of safety, the promise of protection, the ideas of something better.\n\nIn the heart of the beast is where we found a place to belong;in reaching the voice we found a guide to follow.\nHis wisdom, his ideas, his guidance: we must realise them.\nIt is clear to us now that this is what we woke for. For the first time in centuries we have an objective, a glorious goal to follow. In service to his vision, it is our duty to make the will of the Foundation known across Insyaa!"
 mechanim_formable_desc_custom_tooltip_haeta: "The lands of Insyaa are haunted.\nDevouring fauna, animals the size of buildings and walking mountains engineered to bring ruin: clearly this is not a land for the frail.\nThere are those who seek to escape and find a place away from nature, there are those who seek to be at peace with the monsters: all of them fall prey to their hunters in the end.\nThey fail to understand that even prey has a choice; either give up, or give chase. Those who choose the chase, those who choose to survive rather than chase a faint hope of “thriving”, are the ones that adapt and make it out in the end.\n\nWe are one such group, here at the edges of the jungle we have found a place to be... and yet there is something calling us back.\nWhen prey makes it out, when prey survives, when prey adapts... only then can they turn the tables and hunt the hunters. We made it out but now we have to earn our name among the tribes of the west; we shall do so by bringing down the walking mountains of Insyaa.\nThe greater they are the louder they fall shall be, loud enough for all of Insyaa to hear of our deeds!"
 mechanim_formable_desc_custom_tooltip_kaikoura: "Ever since we walked into this land we have been enamored by what we see.\nThe Taga'ala peoples way of life and tradition have inspired our people greatly, we have learned to ride their shrimp, learned their ways of hunting seabeasts and have communed with their spiritual leaders.\nThis land has truly charmed our people, but it has revealed a hidden truth.\nThe great mangroves are home to a system of decadent republics, uneasy alliances and politicking that has done nothing but hurt its inhabitants.\n\nAnd so, we have taken it upon ourselves to change this status quo. We lead the cause of unity and now seek to bring the wetlands together under one fair realm for Tag'alans, Loa'Set and Mechanim!"
 mechanim_formable_desc_custom_tooltip_tokara: "“What is it that we seek?”\nThis has been a common question among the mechanim of our tribe. We have walked far and wide across the lands of Insyaa just to end at its most desolated point. Here in the frontiers of the great Ekyunimoy desert there is a place, a strip of sand protected by mountains where the dunes are more gentle. Few would dare to call it pleasant; fewer still would choose to live here.\n\nAnd yet.\n\nWe first arrived at this land seeking the riches of damestear and the potential allies we could find among the Children of Water that inhabit this place.\nNow, this land of emptiness is calling us, a land filled with nothing but opportunity - raw potential.\nTogether we can turn this place into a paradise that rises from the sands, a land of wonders to fill this emptiness!"
 mechanim_formable_desc_custom_tooltip_tiauna: "In ages gone three peoples inhabited this land.\nThe Children of Water; Humans from the lowlands, travelers of the land like us.\nThe Children of Stone; the kobolds of the hills, the builders, the dreamers.\nAnd last, the Children of Fire; us the Mechanim, long gone from this place.\n\nThis is the tale as we have managed to collect it from the various tribes we have met in our travels through this land.\nSince our slumber much has changed, our brothers have collected our sleeping selves in hopes our return would herald a new age for this land. With our awakening we have come to learn much of what we are and where we come from, all that remains is forging our future.\nThe time has come then, we must unite our brothers to create a land for all children of Danguranga!"
 mechanim_formable_desc_custom_tooltip_maniakoura: "The question of the self is one that has captivated the mind of many across the ages: what defines the individual? We mechanim have long wondered about our nature, seeking desperately to understand our form. To many our artificial construct is a fact of shame; such fools say that we are beings born against the natural order and that this origin deprives us of much of what makes life so beautiful.\n\nWe are unburdened by such delusions.\n\nThere is a beauty to our artificial selves, for our bodies are filled with potential yet to be explored. Wandering the land and learning of our origin has only made us want to explore this nature even further. Now we have the chance to do so.\nHere, where the mountains and rivers come together to form a lush greenland, is the place we have set aside for ourselves. A place that can become a home for all those who seek to explore the limits of one's physical self: Maniakoura of the Form Surpassed!"
