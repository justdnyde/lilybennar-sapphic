 mechanim_tolerance_events.1.t:0 "Mechanim Minorities Demand Representation"
 mechanim_tolerance_events.1.d:0 "The mechanim minorities in the province of [racial_pop_province_target.GetName] have petitioned for greater representation for their peoples and more autonomy in their rights and actions."
 mechanim_tolerance_events.1.a:0 "Granted!"
 mechanim_tolerance_events.1.b:0 "Make some concessions"
 mechanim_tolerance_events.1.c:0 "No. Haven't we given them enough?!"
 mechanim_tolerance_events.1.e:0 "Make empty promises"

 mechanim_tolerance_events.2.t:0 "Increase of Mechanim Tolerance"
 mechanim_tolerance_events.2.d:0 "Either through policies and rule or simply a prospering country, our time with the mechanim minorities of our nation has led to natural learning and understanding of each other's customs. [Root.GetName]'s tolerance for the mechanim race has increased."
 mechanim_tolerance_events.2.a:0 "Good for them"

 mechanim_tolerance_events.3.t:0 "Decrease of Mechanim Tolerance"
 mechanim_tolerance_events.3.d:0 "No one is sure what happened, whether it be troubles with war, the economy or just plain incompatibility, but one thing is for certain: [Root.GetName]'s tolerance for the mechanim race has decreased."
 mechanim_tolerance_events.3.a:0 "That's unfortunate"

 mechanim_tolerance_events.4.t:0 "Strange Students"
 mechanim_tolerance_events.4.d:0 "While paying a visit to the Silmuna School of the Arts in Anbenncóst, [Root.Monarch.GetName] notices a group of strange creatures standing in a dimly lit corner of the library. It's difficult to see them clearly, but [Root.Monarch.GetSheHe] can swear their skin has a soft metallic glow.\n“Ah, my [Root.Monarch.GetTitle], - [Root.Monarch.GetName] hears the voice of the Head Librarian behind [Root.Monarch.GetHerHim]. - It seems you've taken an interest in our new students. I assume you've never seen a mechanim before?”\nThe librarian beckons the [Root.Monarch.GetTitle] to follow and starts walking towards the group. The mechanim look like they are arguing, but [Root.Monarch.GetSheHe] cannot hear a single sound. However as [Root.Monarch.GetSheHe] approaches, they stop immediately and turn to [Root.Monarch.GetHerHim].\n“Let me introduce them. This is Ebbed Mist, a scholar from Insyaa. I’m not quite sure what exactly their area of expertise is, but I seem to recall something about foresight and population patterns.”\nA thin mechanim bows, instantly reminding [Root.Monarch.GetName] of one of [Root.Monarch.GetHerHis] court advisors. His orange robe is tattered from what looks like close encounters with a thousand blades.\n“This one is Bell-Chains. It was them who managed to safely navigate the treacherous titanoflora jungle and lead these mechanim to safety.”\nThe [Root.Monarch.GetTitle] looks at the large mechanim, which barely grunts a response. A military man, not unlike the generals in [Root.GetAdjective] army.\n“And my name is Prime-Pale-Fear,” - interrupts the last one. “I’m just a simple merchant that tagged along, so I fear I will be of no use to you. My companions, however, are very capable and I’m sure their services will prove invaluable in making whatever your plans might be come to fruition.”"
 mechanim_tolerance_events.4.a:0 "Foresight, you say..."
 mechanim_tolerance_events.4.b:0 "Have they fought a titan?"
 mechanim_tolerance_events.4.c:0 "[Root.Monarch.GetName] would love to learn more..."
 mechanim_tolerance_events.4.e:0 "A brazen offer, but I don't think so"
 mechanim_tolerance_events.4_advisor_tt:0 "Gain §YEbbed-Mist§! as a §Gdiscounted§! skill §Y3§! Advisor"
 mechanim_tolerance_events.4_general_tt:0 "Gain §YBell-Chains§! as a General with §Y75§! tradition"

 mechanim_tolerance_events.5.t:0 "Second Foundation"
 mechanim_tolerance_events.5.d:0 "The sun has already sunk beneath the horizon, when [Root.Monarch.GetName] finishes reading the book on divination magic. [Root.Monarch.GetSheHeCap] lifts [Root.Monarch.GetHerHis] eyes to see the library completely empty, except for a single mechanim sitting a few tables away.\n“This is an interesting tome you’ve been reading. I never quite understood the subject myself.”\nThe mechanim leaves their seat and approaches the [Root.Monarch.GetTitle]. [Root.Monarch.GetName] studies the mechanim - their clothes are simple, but there are golden stars embroidered at the edges. They do not seem taller than an average human, but [Root.Monarch.GetName] still feels a commanding presence.\n“Heart-Seldom-Sees-The-Future,” - they reach out their hand. “Professor of Mathematics here at Anbenncóst.”\nThe mechanim sits in front of the [Root.Monarch.GetTitle] and picks up the book, rotating it in their metallic hands.\n“I’m sure you’ve heard of my people in Insyaa. Many of them are lost, aimless, especially after the demise of Golodh and the fall of their Foundation. They lack purpose or a ‘Grand Plan’, as I like to call it. Some may have found solace in the Poet and some… some are like me.”\nThere is a tiny spark in their eyes, as they calculate their next words:\n“I may have a proposition for you, [Root.Monarch.GetTitle]. You see, me and my colleagues have been working on a separate field of studies that we call ‘probability theory’. It assumes that everything can be predicted through numbers, without the use of magic. Our research is still in its early stages, but the results are promising and we’d like to establish a new Foundation here. Of course, we’d need some funds and privileges, but I’m sure with your support we can figure something out.”"
 mechanim_tolerance_events.5.a:0 "How curious. Provide some funds for the research!"
 mechanim_tolerance_events.5.b:0 "Truly fascinating! Provide them with all they need for their research!"
 mechanim_tolerance_events.5.c:0 "A second Foundation? One was more than enough! Banish that professor!"
 mechanim_foundation_fund_the_research:0 "Research Probability Theory"
 mechanim_foundation_embrace_the_research:0 "Embrace Probability Theory"
