### EVENTS ###
##############

 mechanim.1.t: "Steel, Comets and Hope"
 mechanim.1.d: "They designed us.\n\nThey built us.\n\nThey commanded us.\n\nAnd when they were done with us.\n\nThey destroyed us.\n\nSearched for us, hunted us, found us, hurt us, ground us into the dirt, over and over and over for centuries.\n\nNot because we hurt them, not because we disobeyed them, not because we ever lifted a single finger against them, but because we dared, we had the audacity, to show that maybe, just maybe, we had within us the potential to equal them.\n\nAnd so, they left us, rusting, abandoned, to lie on the jungle floor for dormant eternity until the millennia took their course, and we were worn down to nothing.\n\n\nAnd perhaps the story ends there.\n\nBut maybe.\n\nOne moment.\n\nOne single, solitary spark of hope.\n\nThe slimmest of chances, the barest of opportunities, so easily able to slip away."
 mechanim.1.a: "A light, shooting across the sky...."


# Mechanim Age Decay Events
 mechanim.1001.t: "When I Can't Follow"
 MechanimAgeDecay1001_desc_1: "The life of a leader is an active one; every day I must meet with the various members of the [Root.Country.GetTitle] to discuss the affairs of rule. Every day this task becomes more demanding; my legs are decaying quickly and this has greatly affected my ability to maintain my stature and respect as a ruler as I struggle to be at the places I must in time. Should I seek to repair them, or should I leave my position as a leader to lessen the stress put onto them?"
 MechanimAgeDecay1001_desc_2: "The life of a leader is an active one; every day I must meet with the various members of the [Root.Country.GetTitle] to discuss the affairs of rule. Far gone are the days where I could accomplish this task effortlessly; my legs no longer have the strength to carry me like they once did, and I can feel them decay further every day. Should I seek to repair them, or should I leave my position as a leader to lessen the stress put onto them?"
 MechanimAgeDecay1001_desc_3: "The life of a leader is an active one; every day I must meet with the various members of the [Root.Country.GetTitle] to discuss the affairs of rule. No longer am I able to meet with every representative of the realm in time, for every step I take, my legs crumble further, and I fear the day may come where they refuse to move. Should I seek to repair them, or should I leave my position as a leader to lessen the stress put onto them?"
 mechanim.1001.a: "Seek to repair my legs"
 mechanim.1001.b: "Seek help ruling"
 mechanim.1001.c: "Make the people come to me"
 mechanim.1001.e: "It’s time to retire"
 mechanim.1002.t: "Beyond My Reach"
 MechanimAgeDecay1002_desc_1: "What separates a Mechanim from any common machine is our ability to create. My hands, my tools of creation, are far from their best state. Constant use has begun to show its effects on them. I feel they are slower and more imprecise, and my ability to write has been greatly hampered by them. Should I seek to repair them, or should I put them to rest and allow more capable hands to take my place?"
 MechanimAgeDecay1002_desc_2: "What separates a Mechanim from any common machine is our ability to create. My hands once helped me write the words that have guided the nation, now they struggle to move for long enough for my message to be understood. Should I seek to repair them in hopes they can continue to do the job, or should I put them to rest and allow more capable hands to take my place?"
 MechanimAgeDecay1002_desc_3: "What separates a Mechanim from any common machine is our ability to create. My hands no longer are the tools which allow me to express myself, and instead hamper my ability to communicate to my own people. My words are now scribbles that only a few amongst my close circle can decipher. Should I push them further in an attempt to make my ideas heard, or should I put them to rest and allow more capable hands to take my place?"
 mechanim.1002.a: "Seek help for my hands"
 mechanim.1002.c: "Delegate writing to an advisor"
 mechanim.1003.t: "Alone in the Dark"
 MechanimAgeDecay1003_desc_1: "Eyes are the window to one's soul, but what happens when said window closes? Once, I was able to catch every detail, to see the hidden meaning in words and actions. When the times of trouble come, they ask me to guide, to decide the strategies the realm should follow to victory - once, I could guide them, but long gone are those days. My eyes are not what they used to be, their receptors have begun to fail as the glass in front has been scratched and become less and less clear. Should I seek to fix them, or should I seek to rest them and allow a new ruler to take up my place?"
 MechanimAgeDecay1003_desc_2: "Eyes are the window to one's soul, but what happens when said window closes? There are so many aspects of social interaction you lose when you cannot see the subtle details, many nuances I was once able to catch now escape me. The years of war are far worse; how can I help or guide my soldiers when I cannot see the battlefield? It is obvious I cannot continue like this. Should I seek to fix them, or should I seek to rest them and allow a new ruler to take up my place?"
 MechanimAgeDecay1003_desc_3: "Eyes are the window to one's soul, but what happens when said window closes? Lost are the details of the world to me, no longer can I see the beauty, I cannot even recognize my own people. I may not be able to see as well, but I can still hear the people talk behind me, of all that goes on in the court that I miss. The army does not even bother trying to get my advice, as they know I will fail to understand the strategic situation of the battlefields. Should I seek to fix them, or should I seek to rest them and allow a new ruler to take up my place?"
 mechanim.1003.a: "Seek help for my eyes"
 mechanim.1003.c: "Engineer replacement eyes"
 mechanim.1004.t: "The Scars in My Body"
 MechanimAgeDecay1004_desc_1: "I can feel the gears inside my body begin to slow down, every part of my body weakening as the core frame decays. This has affected me greatly, and I cannot continue without addressing it. May I seek to repair my body, even if it might hurt my ability to rule, or should I leave my place and allow someone else to rule?"
 MechanimAgeDecay1004_desc_2: "I can feel the gears inside my body begin to grind against each other as the age takes hold of them, all of my body shows the wear and tear of a lifetime of rule. I have been hampered to the point that I am unableto take care of the basic tasks of a ruler. May I seek to repair my body, even if it might have consequences, or should I leave my place and allow someone else to rule?"
 MechanimAgeDecay1004_desc_3: "I can feel the gears inside my body begin to break down; each day starts with constant checks and caretaking of the parts I can easily access, as the ones I cannot decay further. My ability to rule has been crippled to the point that the tasks that are expected of me are unable to be done. May I seek to repair my body, even if it might have consequences, or should I leave my place and allow someone else to rule?"
 mechanim.1004.a: "Seek help for my body"
 mechanim.1004.c: "Retrofit my body with new technology"
 mechanim.1005.t: "My Failing Self"
 MechanimAgeDecay1005_desc_1: "Even we, made of metal, age. After my many years, I can feel my own body failing me. Though perhaps my end might not ever come, in truth, I can feel the effects of my many years of rule. My Kauga, my heart, does not have the strength it once did. I've done my best to keep moving forward as [Root.GetName] needs me, but it has been hard for me to save my energy while ruling. Should I seek to find a way to strengthen my Kauga to keep ruling? Or is it perhaps best for me to retire, and let someone else continue in my place?"
 MechanimAgeDecay1005_desc_2: "Even we, made of metal, age. Long have I inhabited this land, and though perhaps my end might not ever come, in truth, I can feel the effects of my many years of rule. My Kauga, my heart, weakens more and more each day. Ruling [Root.GetName] has put a massive strain on me; all my energy is used to continue handling the realm’s affairs. Should I seek to find a way to strengthen my Kauga to keep ruling? Or is it perhaps best for me to retire, and let someone else continue in my place?"
 MechanimAgeDecay1005_desc_3: "Even we, made of metal, age. I have lived a long life, longer than many of my fellow friends made of flesh, and though perhaps it might not ever come to an end, in truth, its effects can be felt. Ruling [Root.GetName] has not been easy on me; my weakened Kauga has already suffered a lifetime of use, and the energy that I require from it is not one it can provide me any more. Should I seek to find a way to strengthen my Kauga to keep ruling? Or is it perhaps best for me to retire, and let someone else continue in my place?"
 mechanim.1005.a: "Strengthen my Kauga"
 mechanim.1005.c: "Enhance Kauga with Gene Tech"

