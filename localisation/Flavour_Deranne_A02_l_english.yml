 #Estate 
 estate_deranne_dtc:0 "D.T.C"
 estate_deranne_dtc_desc:0 "The Deranne Trade Company is a trading company originally founded by a number of early Derannic trade-settlements in North Aelantir. Since then, the company has rapidly expanded its influence with aid from Lencenor and is now one of the key competitiors within the Aelantiri market. The D.T.C has also expanded its operations in Sarhal, seeking to control the main trade routes flowing into and out of Cannor and to take part in the continents rich markets. Although mainly composed of a wide array of merchants and artisans, the D.T.C is also largely influenced by the Derannic nobility whom hold a large amount of stock in the company, and who wishes to further their own financial interests. While the two factions aren't always aligned, they lead an uneasy peace."

 estate_nobles_deranne_rogue_vassal:0 "The Rogue Vassal"
 estate_nobles_deranne_rogue_vassal_desc:0 "For centuries, our dukes have been forced to swear fealty to the kings of Lorent, reducing our realm to nought but puppets of the Ruby Crown, as with most other winelords. Although we managed to escape our bonds during the Lilac Wars, the defeat of the Moon Party leaves us in a precarious position. The world now turns a blind eye to the affairs of Lencenor, and Lorentainé seeks to reaffirm its authority. Somehow, we must persevere."

 estate_nobles_deranne_lorentish_resistance:0 "Lorentish Resistance"
 estate_nobles_deranne_lorentish_resistance_desc:0 "The entrenched Lorentish nobility was always a theater of its own, with its constant internal bickering and the endless intrigue only controlled by the most deft of kings. After the Derannic conquest, however, the blood of Lorenan has chosen to make an uneasy truce to achieve a single goal: the expulsion of those they deem illegitimate."

 estate_nobles_deranne_lorentish_resistance_2:0 "Lorentish Resistance"
 estate_nobles_deranne_lorentish_resistance_2_desc:0 "The entrenched Lorentish nobility was always a theater of its own, with its constant internal bickering and the endless intrigue only controlled by the most deft of kings. After the Derannic conquest, however, the blood of Lorenan has chosen to make an uneasy truce to achieve a single goal: the expulsion of those they deem illegitimate."

 estate_burghers_deranne_compromise_with_priestess:0 "Compromise with the Priestess"
 estate_burghers_deranne_compromise_with_priestess_desc:0 "Instead of caving to the ridiculous demands of the High Priestess of Lélanan, the D.T.C.. governor for the Fahvanosy Isles has managed to land something of a compromise with The Sisterhood. In exchange for continued Derannic stewardship, The Sisterhood has been granted considerable autonomy throughout the Island for a minimum of 50 years."

 estate_church_deranne_seaflower_skalds:0 "The Seaflower Skalds"
 estate_church_deranne_seaflower_skalds_desc:0 "The tradition of tale and song has remained since the early days of our reaver ancestors, and has made Deranne a center of Bardic Magic in Lencenor, hosting a variety of troubadours and other artists that channel their magic through the beauty of the performance."

 deranne_estate_nobles_power_and_grace:0 "Power and Grace"
 deranne_estate_nobles_power_and_grace_desc:0 "While the presence of Elves was more common in eastern Lencenor than on the western shores, their role in Lorentish society cannot be understated. They have influential positions as craftsmen, advisors, diplomats and more, and to exclude them from our court would be foolish if we truly wish to rule Lencenor in more than name."

 deranne_estate_nobles_court_of_lencenor:0 "Court of Lencenor"
 deranne_estate_nobles_court_of_lencenor_desc:0 "It is evident that Lencenor has gone from a brutal battleground to a land of arts, innovation and splendor, and all peoples of the Seaflower – Humans, Elves, Dwarves, Halflings, even Gnomes – have a right to partake in the stewardship of this prospering land, under the benevolent watch of the [Root.Monarch.GetTitle]."

