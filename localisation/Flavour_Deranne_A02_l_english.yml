 flavour_deranne.31.a:0 "Well you don't get to keep the trade now do you?" 

 flavour_deranne.32.t:0 "Last Knight of the Seaflower"
 flavour_deranne.32.d:0 "“Have you heard the tale of the last Knight of the Seaflower? Yes, yes, I know that there are those who would still give themselves that title, for legacy’s sake. Officers and generals that serve on both land and sea in honor of the old order. But I mean the last true knight, a man of chivalry and courage, who fought with sword in hand long after his peers had thrown theirs away.\n\n“I hear his last mission was on the seas, when he singlehandedly saved a group of hostages from pirates. As the story follows, he swam for miles in the darkest of night all the way to the ship’s hull, then hoisted himself to the deck up using a hook. From there, while suffering a mortal wound, the knight slayed each of the twenty pirates on his own and freed the hostages. It is said that when the last of the hostages’ bonds were cut, the knight limped up onto deck, and threw himself down into the ocean, his last words a vow to challenge Uelos himself.”" 
 flavour_deranne.32.a:0 "Such was the spirit of a Seaflower Knight." 

