 deranne_sisterhood.tt:0 "Every owned province in the §YFahvanosy§! region, with the exception of §YAdinonosy§! and §YVelanynosy§! gets '§YInfluence of the Sisterhood§!', giving the following effects:\nLocal Unrest: §R+3.00§!\nLocal Trade Power Modifier: §R-30.0%§!\nLocal Production Efficiency: §R-40.0%§!\nLocal Goods Produced Modifier: §R-25.0%§!"
 deranne_agreed_priestess_ultimatum.tt:0 "All '§YInfluence of the Sisterhood§!' province modifiers will be removed\n\n§YThe Sisterhood will stay out of our affairs for now. After the island is fully conquered, we will comply to split Fahvanosy between a number of Halfling vassal states.§!"
 deranne_compromise_priestess.tt:0 "All '§YInfluence of the Sisterhood§!' province modifiers will be removed\n\n§YCompromise with the Priestess§! will be granted to the §YD.T.C§! which does the following:\nEvery owned province in §YFahvanosy§! gets §Y'Influence of the Sisterhood'§!, giving the following effects:\nLocal Unrest: §R+1.00§!\nLocal Trade Power Modifier: §R-20.0%§!\nLocal Production Efficiency: §R-15.0%§!\nLocal Goods Produced Modifier: §R-15.0%§!\n\n§YCannot be revoked for 50 years§!"
 deranne_deny_priestess.tt:0 "NOTHING STANDS IN THE WAY OF PROFIT!\n\nEvery owned province in §YFahvanosy§! gets §Y'War for Fahvanosy§!, giving the following effects:\nLocal Unrest: §R+6.00§!\nLocal Trade Power Modifier: §R-30.0%§!\nLocal Production Efficiency: §R-50.0%§!\nLocal Goods Produced Modifier: §R-30.0%§!"
 deranne_land_of_every_trade.tt:0 "Every owned province in §YLencenor§! fulfilling these conditions:\n §YEither:§!\n    Producing §YWine§!\n §YOr:§!\n    Producing one of the following: §YGlass§!, §YPaper§!, or §YSilk§!\n    Has a §YProduction Manufactory§! and §Y25§! development\n\nGet '§YLencori Manufactoring§!', giving the following effects:\nLocal Production Efficiency: §G+10.0%§!\nTrade Value Modifier: §G+20.0%§!\nExpand Infrastructure Cost Modifier: §G-25.0%§!\n\nIf the '§YAge of Wine§!' Price Change has not yet happened — fire it, increasing the price of §YWine§! by §G+30.00%§!\nIf it has already fired, gain §G1000§! Crowns."
