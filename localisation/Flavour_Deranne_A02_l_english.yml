 flavour_deranne.23.t:0 "Investing in the Ynnic Dams"
 flavour_deranne.23.desc:0 "In order to solidify our dominance over the Aelantiri trade routes, we must secure our standing in the Ynn. As an alternative to simply marching our armies on the great river civilization, we can gain the favor and loyalty of its many lords through more peaceful means; by investing in its long dilapidated dams." 
