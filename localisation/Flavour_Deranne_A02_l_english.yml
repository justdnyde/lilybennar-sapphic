l_english:

 #Missions
 deranne_vengeance_of_tomorrow_title:0 "Vengeance of Tomorrow"
 deranne_vengeance_of_tomorrow_desc:0 "These are dark days for Lencenor. The Moon Party, once a proud and triumphant coalition, has fallen to splinters. Dameria is gone, its capital sacked and the slaughter of the last Silmunas a grim marker of the end of the Fourth Lilac War. Now, we linger in a precarious situation. As one of the last realms resisting Lorentish domination, it will not be long before the Rose recovers from the destruction caused by the Lilac Wars and sets out to enforce our loyalty.\n\nWe cannot allow this to happen. We must use the shattered map of Lencenor to our advantage and pick up the pieces. Our first obstacle lies right across our eastern border: the Ordings. Ever since Derhilde set foot upon Lencori soil and destroyed the horseriders, they have limped on in a pitiful state, reminiscing about grander days. It is time we put them out of their misery once and for all."

 deranne_the_final_swing_title:0 "The Final Swing"
 deranne_the_final_swing_desc:0 "With the Ordings once again subjugated beneath Derannic rule, we may set our sights on our true goal: the fall of Lorentainé. The final confrontation is soon upon us, and if fate wills it, we will avenge the fallen and topple the Lorentish tyranny. Yet while our will is strong and our armies lust for vengeance, we must not rush in like fools.The Lorentish, while weakened, are still powerful. Their lands are vast, their allies strong, and while inferior to our Seaflower Knights, the Knights of the Rose are renowned across Cannor.\n\nThankfully, the Siloriels have many enemies, both within and outside their realm. A grand coalition should be formed, one powerful enough to cast down the Lorentish hegemony and usher in a new age for the Lencori. We wield the sword of justice and its final swing will shear off the heads of the tyrants who have had it long coming."

 deranne_docks_of_westport_title:0 "The Docks of Westport"
 deranne_docks_of_westport_desc:0 "Ever since the landing of Derhilde’s host in what is now called Westport, the small coastal town has grown immensely. From rich fishing activity to its grand harbor hosting our ducal vessels, its importance in this maritime age only grows as more and more ships fare out onto the high sea. Now that our warhorses are galloping east once more, our grand warships shall surely follow, and as such it is time we expand our fleet to a size unrivaled."

 deranne_a_withered_rose_title:0 "A Withered Rose"
 deranne_a_withered_rose_desc:0 "Long ago, towards the end of the last century, Lorentish armies disgracefully marched upon Deranne and laid waste to countless villages, pillaging the countryside and rendering our realm a land of ash and fire. Now, as we march through the tattered gates of Lorentainé, we will finally have our vengeance. The Lorentish rose wilts as our armies march upon the grand city, ready to deliver justice to those who have for so long managed to avoid it. The time of retribution is here, and the Lorentish tyrants will fear our wrath."

 deranne_consulting_the_smiths_title:0 "Consulting the Smiths"
 deranne_consulting_the_smiths_desc:0 "The Daromsforge, one of Lencenor’s finest wonders. Once a fortress constructed by the ancient Damerians to oversee its western holdings, it is now not only an important fortification, but also host to a massive complex of magically-enhanced forges producing the finest weapons Lencenor has to offer. While we have long benefited from the forge’s output, it is time we used the place to its full potential. Let us consult the smiths of the great forge; let the fires roar like never before as we prepare for a great march east."

 deranne_the_western_haven_title:0 "The Western Haven"
 deranne_the_western_haven_desc:0 "As our conquests of Lencenor continue and we push our frontier ever forward, our homeland lies far away from the destruction of war. Without the worries of armies ravaging our countryside, Deranne prospers. The vast fields are lush and green and the cities bustle, as forge and marketplace alike resound with the clinking of coin and plate. Let this prosperity continue, and let us further bolster our homeland so that it may support the costly efforts of war."

 deranne_rivers_of_wine_title:0 "Rivers of Wine"
 deranne_rivers_of_wine_desc:0 "The rich lands of the Bay of Wines have long been coveted by regional powers, serving as a battleground for the armies of the Lorentish and Anbennarians. Despite this, the Winelords continue to enrich themselves upon vast fields of vineyards and the local trade they support. Although the Winelords must fall, the valour they showed during the Lilac Wars as they fought at our side has not been forgotten, and we would value their support in our necessary conquest of Lencenor."

 deranne_dwarves_of_the_ruby_title:0 "Dwarves of the Ruby"
 deranne_dwarves_of_the_ruby_desc:0 "The Dwarves of Rubyhold were for ages the most prestigious and influential people in Lencenor, manipulating the region's politics and effectively helping build the Lorentish realm as it stands today. However, with the arrival of the elves this era of domination ended, and the Dwarves have since been cast aside as simple lapdogs of the Lorentish court.\n\nNow the tides are shifting, and as we continue our conquest, the King of the Mountain may stand in our way. While we could simply march upon and lay siege to their precious hold, there may be an opportunity for us to exploit the bitterness toward their old allies that has simmered in the Ruby Dwarves' hearts for centuries, and turn them to our side. Regardless, their fate now lies in our hands."

 deranne_song_to_the_moon_title:0 "A Song to the Moon"
 deranne_song_to_the_moon_desc:0 "The Derannics have always been a seafaring people. We have plied the waves since the long journey of Derhilde and her host, calling back to the days when we pierced the cold breeze of Gerudian waters and landed on the warm shores of Lencenor's western coast . Yet, while our people have always sailed the western seas, there was always a question simmering in our minds; what lies beyond the mists? The elves who first arrived on Cannor’s shores spoke of a homeland lost, destroyed in a great calamity now known as the Day of Ashen Skies. Surely it can be rediscovered once again. It is time we set out on a voyage of discovery, and see how much was truly lost the day Halann itself trembled."

 deranne_into_sornhills_title:0 "Into the Sornhills"
 deranne_into_sornhills_desc:0 "The Sornósti, once a thriving people strong in their own right, eventually became lapdogs of the Lorentish and came to be our adversaries in battle after battle. While their old allegiance to Lorent may have faltered, retribution still awaits. And as we deliver justice, gaining control over the vast wine-production of the southern hills would be a great boon to our efforts."

 deranne_march_north_title:0 "The March North"
 deranne_march_north_desc:0 "With the Lorentish heartland and the Ruby Mountains under our control, our gaze turns to our frontiers. In the north, wine-lords stake their claims as the old order collapses, each desperately seeking allies to save themselves from our advance. They will not succeed. Deep within the magical forest of the Redglades, its elven inhabitants hide in isolation. They too must proclaim their allegiance to us, but may see reason to save their glades from bloodshed. No matter the means, if we seek to proclaim ourselves as the new Lencori hegemon, these scattered states must bend the knee."

 deranne_traditions_of_old_title:0 "Traditions of Old"
 deranne_traditions_of_old_desc:0 "It is well known that our origins lie not in the vast plains of western Lencenor, but rather in the harsh, frozen lands of the far north – Gerudia. While the people who immediately descended from these hardened reavers quickly adapted themselves to the culture of this land's inhabitants, old customs remained. Though our most obvious inheritance lies in our reputation as exceptional seafarers, the Skaldhyrric tradition of the far north has also left its most subtle marks on our ways.\n\nThe tradition of tale and song has remained since Derhilde’s landing, and has made Deranne a center of Lencori Bardic Magic, hosting a variety of troubadours and other artists that channel their magic through the beauty of performance. As our realm expands, we should strive to foster this tradition, spreading it throughout Lencenor to strengthen the unity of our state while binding the church, magic and people together."

 deranne_shrouded_island_title:0 "The Shrouded Island"
 deranne_shrouded_island_desc:0 "Just off the Lencori coast, beyond the misted waters of the western channel, lies Venaíl, an island inhabited by elves. While their kind are a common sight on Lencori soil, the people of Venaíl have long isolated themselves on their island, interacting little with outsiders except for the occasional merchant vessel.\n\nWhile they are seemingly of little threat, and most people on the mainland have been content to leave them alone in their silent affairs, some are nervous of their position and ability to disrupt our newfound expeditions to the west, where their focus seems to lie. Additionally of interest: the Venaíli elves are quite renowned for their artisanry, specifically within the trades of glass and paper. If we could inspect their work in order to learn and foster their techniques, it could benefit us greatly."

 deranne_handling_dissenters_title:0 "Handling the Dissenters"
 deranne_handling_dissenters_desc:0 "Ever since our conquest of the Lorentish heartland, its inhabitants have resisted our rule at every step. Spiteful ever since their fall from grace, the old nobility has proven averse to our rule, continuing with their petty schemes despite Lorent’s downfall. Ultimately, they aim to loosen our firm hand and reinstall one of their own as king. Foolish dreams of course, yet an obstruction to our efforts. Every day the Lorentish go unpunished for their disobedience, our rule appears less legitimate, and if we ever intend to rightly wear the Ruby Crown, every remnant of the old order must fall in line. It is time we deal with this pest, one way or another."

 deranne_power_and_grace_title:0 "Power and Grace"
 deranne_power_and_grace_desc:0 "The elves. A people who came far and rose even higher. Nobody can doubt the influence wielded by the elves across Cannor, nor how fast they came to obtain it. When Derhilde conquered this land long ago, she encountered little but humans and dwarves; yet this is a new age, and since Ioriel arrived at the Lorentish court in the eleventh century, the elves have wielded immense power throughout the land. While they were less prominent on the Derannic shores, we cannot deny that to rule Lencenor without elven favour wouldn’t truly be to rule. Now that we stand in the place of the old Lorentish kings we must use their old allies, and we should approach the elven strongholds and seek to gain their support."

 deranne_home_of_tales_and_piety_title:0 "Home of Tales and Piety"
 deranne_home_of_tales_and_piety_desc:0 "In the days when our Gerudian ancestors were first integrating themselves into Lencori society, the gradual conversion of the Skaldhyrric faith into the worship of the Regent Court was not a total one. In line with the works of the Skald-priests of Gerudia, the emerging Derannic clergy started to compose tales of various Cannorian gods, including Castellos, Minara, and most notably Adean, swiftly becoming devoted followers of the Whiterose court.\n\nYet tales have not only been composed to prove our devotion to the gods. From generation to generation, tales and lore of Derhilde and her host recall the origin of our people and preserve her legacy. Likewise, stories of the chivalric battles of the Lilac Wars and the love between Lady Calassa from Deranne and the last Duke of Dameria, Adénn Skylance, are told fervently across the realm. Let us encourage this tradition, so that it may continue to bolster our national mythos. "

 deranne_westport_voyage_title:0 "The Westport Voyage"
 deranne_westport_voyage_desc:0 "In the far west, across the great ocean once thought to be greater, land has been found. We now stand at the precipice of the long abandoned elven homeland, the fields upon the vast islands lush and untouched for more than a thousand years. We fulfilled a dream when we crossed the sea, and this is certainly a time to celebrate, yet we cannot rest. While we are situated quite closely to the rediscovered land of Aelantir, and briefly carry the upper hand, competition will surely not take long to follow. Already bands of adventurers make the great voyage to the west in great numbers, and as the news spreads other realms keenly eye the newfound opportunity. Let us not waste any time. Upon the first sight of land, our competitors will see our flag flying proudly on the horizon."

 deranne_under_our_guidance_title:0 "Under our Guidance"
 deranne_under_our_guidance_desc:0 "As our war for justice approaches its resolution, we now find ourselves in control of nearly the entire region. The old tyrants of Lorentainé have been cast down, never to find footing again. Indeed, as the few remaining lords and dukes swear fealty to our [Root.Monarch.GetTitle], it is time for us to manifest our victory and take the mantle of the Ruby Crown as rulers of all Lencenor.\n\nBut first we must solidify our conquests, strengthening new and old fortresses to protect from outside foes, as our rule lays the path for a new era of Lencori prosperity."

 deranne_derhildes_will_title:0 "Derhilde's Will"
 deranne_derhildes_will_desc:0 "Long ago, after her father’s death at the hand of the Ordings, a young woman born in the remote hills of Gerudia led one of the greatest reaver hosts that was ever seen on a long, cold voyage south. Across a great sea her people followed, all the way to the lush grasslands of Lencenor – for while vengeance was the quest, there was promise of much more. A promise that Derhilde Reaverqueen would guide her people through a new era, a new land. And guide she did, change she brought – change that would forge a legacy to last centuries.\n\nWhile we may have had different motivations than our reaver ancestors, the path was all the same: All throughout Lencenor, the Derannic banner flies true. Upon a mighty throne, our monarch proudly wears the Ruby Crown, its gems a mark of our splendor and its weight of our responsibility. As the bloodstained sword upon the ravaged battlefield shines in the light of sunrise, Lencenor openly faces the new dawn. A dawn guided once more by our hand, as was Derhilde’s will."

 deranne_establishing_dominion_title:0 "Establishing a Dominion"
 deranne_establishing_dominion_desc:0 "Each day the docks bustle as hundreds of men, women and children of every class and background journey across the ocean to chase the dream of a new start. Already, settlements establish themselves right the way along the coast of Aelantir, venturing further and further into the great unknown. While there is still much to be explored, the vast islands of Endralliande seem peaceful and close enough to Lencenor to pose little risk to new settlers. If we wish to expand our Aelantiri influence, controlling these islands will be vital."

 deranne_fall_upon_eastern_winebay_title:0 "Fall Upon the Winebay"
 deranne_fall_upon_eastern_winebay_desc:0 "While the majority of Lencenor now lies firmly within our grasp, the territories at the borders of our domain are still of great interest. Notably, just south of Lorentaíné lies the trade center of the Eastern Winebay, and at its heart Toarnaire, the renowned City of Thorns.\n\nMen hailing from lands of winelords to the distant borderlands of the Anbennarians alike have lost their lives fighting endlessly over this stretch of land. Each day, merchant vessels and caravans transporting wine aplenty leave the harbor and gates of the City of Thorns, which ever serves as a vital point of export to the Imperial market. By fully securing the Winebay we can establish a solid frontier against any Anbennarian threats, while simultaneously strengthening our hold of the wine trade. "

 deranne_the_derannport_title:0 "The Derannport"
 deranne_the_derannport_desc:0 "As our colonies across Aelantir steadily develop, ships filled to the brim with goods ranging from tools and textiles to luxuries like tobacco criss-cross Uelos’ Lament between the great ports of Cannor and Aelantir. But as the Aelantiri trade routes continue to expand, it is clear we need to establish a grand entrepôt to strengthen our control over the flow of goods. This coincides with the interests of the Deranne Trading Company, who have petitioned the [Root.Monarch.GetTitle] to invest in the development of a port in the Silsensald Isles, from which they can conveniently oversee their Aelantiri affairs. Let us grant their wish."

 deranne_derannic_behemoths_title:0 "The Derannic Behemoths"
 deranne_derannic_behemoths_desc:0 "‘The skies rumbled as rain showered upon the seas, the pitch dark of the ocean lit only by the brief cracks of lightning. Within the storm, the crews of five warships desperately fought its fierce waves to keep from being consumed by the waters they sailed. Yet to their minds, the tempest was a comfort compared to what once sailed behind them, the wrath of what they hoped was lost in the night.\n\nAs the sailors at last cleared the worst of the storm's fury, what should have been a time for relief was instead filled with eerie silence, until the barrelmen cried out and pointed back into the storm. Within the darkness, a terrifying silhouette could be seen, glimpsed intermittently in flashes of lightning, and as the behemoth emerged through the stormwall, it was apparent it had as many gunports as a citadel had arrowslits. The crewmen could do nothing but leap overboard as the enormous hull lit up the night, the ships they had once sailed proudly ruthlessly torn apart. And as the men slowly sunk to the cold depths, they thought they could hear Uelos weep, for he knew his domain was challenged.’\n\n  -“The Tale of the Behemoth”"

 deranne_rending_of_reavers_title:0 "Rending of Reavers"
 deranne_rending_of_reavers_desc:0 "In The Era of Black Ice, Derhilde and her host were not the only Gerudians who dared make an arduous voyage so far across Cannor’s shores. Aye, many a reaver crossed the great ocean in search of plunder and glory. Some returned with great renown, many never got to touch the riches they seeked. Most are not remembered save for a passing remark in the history books, others created legacies that are spoken of even today, like ours. Among them stands Reveria.\n\nThough our kinship with the Reverians was strong during the founding of our realms, we have long since grown disillusioned. They desperately cling to their guardian origins as a lifeline, a source of old glory and pride. Yet their refusal to adapt with the times has helped them little, as all know they are but a shadow of what they claim to be. We will teach them that there is no virtue in denying change. "

 deranne_looking_to_bay_title:0 "Looking to the Bay"
 deranne_looking_to_bay_desc:0 "Nestled deep along Aelantir’s inner coast, split by the width of the Ynn River running down the cliffs of ruin from the land of its namesake, lies the Trollsbay. At the heart of the unraveling continent, it already provides a vital connection to the Ruinborn civilization of the Ynn and a center of all affairs within the Ruined Sea. Almost as soon as the Trollbay was discovered, opportunistic adventurer bands eagerly journeyed to the lands to settle its deep forests, and now exert great influence over the passing trade. If we wish to further dominate the Ruined Sea, it is time we send our Behemoths into its richest bay."

 deranne_dalairey_lumber_title:0 "Dalairey Lumber"
 deranne_dalairey_lumber_desc:0 "A great fleet requires much timber. For most of Deranne’s existence upon the Lencori coast, our land’s oak was all that was needed for maintenance of a fleet composed of little but fishing boats. As our dominion has grown, however, so has the need for a grander navy. Lencenor, for all its vast expanses of vineyards and lush grasslands, is not known for its grand forests, apart from the Redglade. But alas, as the fey of the elven forest would be likely to retaliate were to encroach on their valued forest, we must look for a cheap source of timber elsewhere. In the far north of Aelantir’s reach lies a vast forest with trees to rival those which grow by the Alen. Investing in great lumbermills in these snowy lands would surely let us sustain our fleet of warships as easily as our ancestors did theirs."
 
 deranne_the_world_shipyard_title:0 "The World Shipyard"
 deranne_the_world_shipyard_desc:0 "When it comes to the art of a ship’s construction, few hands are as deft as a Derannic’s. Our shipyards are places of sense impression: the hard first working of the timber, the precise carving of the wood so as to make the hull light yet sturdy, the taste of salt as toil in such damp heat sends ripples of sweat running down the brow, the smell of the sea over it all.\n\nAye, few would doubt the skills of a Derannic shipwright and the prowess of his craft. Yet as our armada expands, the boatyards of the Derannic coast no longer suffice. Let us expand the industry our great warships are built upon, raising large shipyards across Lencenor’s shore in every port of significance. Experienced Derannic shipwrights will be sent to teach the untutored, and when we are done, the finest ships to roam the sea will be of nothing but Lencori making."

 deranne_riches_of_the_trollsbay_title:0 "Riches of the Trollsbay"
 deranne_riches_of_the_trollsbay_desc:0 "The Trollsbay continues to be Aelantir’s center of affairs. Day and night, ships from all corners of the world sail to Trollsbayer harbors to haul goods and people alike off or on deck, each docking bringing the sight of a city much expanded since the last. As we continue to seek control of the Aelantiri markets, it has become clear that the struggle for influence within the bay is of utmost priority, for us as well as our rivals. Of course, we could simply overwhelm the rising powers of the Trollsbay before they outgrow their cradle. However, some advisors argue for a more peaceful way – let the Trollsbayers keep their pretty lands as we control the true riches at sea. Using our influences and good graces we can ensure that we control trade whilst never putting our feet outside a port city. Whatever the means, the Trollsbay must be ours."

 deranne_terror_upon_uelos_title:0 "Terror Upon Uelos"
 deranne_terror_upon_uelos_desc:0 " ‘The storms cower and wars pause as a Behemoth crosses the sea.’ A Derannic saying not far from the truth, for the sea truly must bend before our maritime might. It doesn’t take a sharp eye to see that every ship-captain fears the Derannic banner enough to silence their guns when near, for rousing the attention of a Behemoth is a sure promise of death. A man forced to battle a Behemoth is sure of his, and says his final goodbyes before he boards the doomed ship. With such wonders, we have achieved something no one has since the precursors: complete domination of the sea.\n\nThe thought that it was a mere drunk outburst that inspired the magnificent work of the Veline brothers so long ago is enough to startle a man. It surely speaks to the quality of Lencori wine."

 deranne_beating_heart_title:0 "The Beating Heart"
 deranne_beating_heart_desc:0 "Since the time of Lorenan the Great, Lorentainé had remained the heart of Lencenor, serving as the seat of the Lorentish monarchs. No longer. Since we cast down the unrighteous Lorentish from the throne they had always taken for granted, Lencenor's true power has begun to shift west. Instead of groveling before the kings and queens of Lorent, winelords now swear fealty to the throne of Deranne.\n\nNow, with the arrival of the prosperous trade from Aelantir in Westport and the surrounding region, Lencenor’s wealth has inexorably shifted to Deranne itself. As the growing center of Cannor and Alentir, let the true heart of Lencenor be known."

 deranne_merchants_of_the_seaflower_title:0 "Merchants of the Seaflower"
 deranne_merchants_of_the_seaflower_desc:0 "The might of the Behemoths is not the only force of the Seaflower to be reckoned with, for the brokering of our merchants can be just as fierce in its own way. In every major port city bordering Uelos’ Lament, a Derannic tradesman bargaining over prices is as sure a sight as the sun rising in the east every morning.\n\nOur merchant class is a powerful one, with the organization of the D.T.C. and the wealth of the trade across the Lament greatly strengthening their influence. Yet, where others might have attempted to curtail their power, we embrace it. By instead granting special privileges to the merchants – such as the protection of convoys at the expense of the royal treasury, or the allocation of crownlands to the wealthiest of traders – we may easily gain their favour, ensuring a mutually beneficial relationship between the crown and the strongest guilds of the realm."

 deranne_ironwood_coast_title:0 "The Ironwood Coast"
 deranne_ironwood_coast_desc:0 "While it is easy to get lost in the reverie of discovery and wealth that has come from our affairs in Aelantir, it is well to remember that it is not the only land from which goods flow. Far to the south, discovered by ship beyond the great deserts that lay even beyond the well-known hills of Akasik, lies a land strange enough to rival the Redglades.\n\nGreat, dilapidated fortresses - halfling creations, we are told - loom above the coast of Fangaula. Further inland, a thick jungle of trees, their trunks hard as iron, covers the landscape. While these are certainly phenomena to explore further, the most important thing currently is to secure a holding along the coast of Sarhal, so we can venture further south and uncover what the continent has to offer."

 deranne_up_the_great_waterfall_title:0 "Up the Great Waterfall"
 deranne_up_the_great_waterfall_desc:0 "Up the Great Waterfall"

 deranne_onto_the_island_title:0 "Onto the Island"
 deranne_onto_the_island_desc:0 "Beyond the Trollsbay, across the great cliffs of ruin, a massive civilization of Ruinborn stretches out around the great river of which it is named, the Ynn. Here, a plethora of native petty nobles squabble over scanty fiefs and cities whose golden age seems long past. Yet something we cannot deny is that it is a wealthy land, its enormous river flowing through a fertile and lush land, even if its violent flows periodically cause great destruction. \n\nIf we wish to further enrich our Aelantiri trade, the Ynn must prosper. And if we wish to profit, we need influence. The D.T.C. has proposed a bold plan: by aiding the repair of the great dams that seem to have once tamed the great river, we can surely acquire the good graces of the Ynnic lords and earn some helpful privileges. A long and costly affair, but in the end we may be able to steer the Ynn without needing to resort to the trumpets of war. "

 deranne_tremendous_firepower_title:0 "Tremendous Firepower"
 deranne_tremendous_firepower_desc:0 " Little strikes fear into a sailor’s heart more than the thought of standing within a Behemoth’s line of fire. A hundred flashing lights of death, cannonballs the size of boulders sweeping across the waters, heralding destruction - it is enough to weaken the bladder. Indeed, the ferocity of Derannic firepower is quite renowned. In the Daromsforge, the smiths continue to work their wonders, a cacophony of hammers and anvils ringing to the tune of war.\n\nYet we strive for innovation, for if we content ourselves with the domination of the present, then we surely do the same for defeat in the future. The fine metal of our forges is increasingly mundane in a world where new wonders are discovered each year. Within the Fangaulan jungles, organic iron sprouts, quite literally, in the form of trees. Due to the abundance of the metal, the land’s people have perfected the craft of its working, as seen with the forge-priests of the Dendugma Monastery. Many terrifying weapons have come of this hidden forge – let us convince the smiths to make them for us. "

 deranne_to_aelantirs_end_title:0 "To Aelantirs End"
 deranne_to_aelantirs_end_desc:0 "It has been long since we first arrived in the lost lands of Aelantir, and we have come far.\n\nThe flow of trade surges from the farthest lands of the continent through our funnels across the Lament, and people all across know the rippling banner of the Seaflower intimately, through commerce, war or both. And yet there are still those who resist our complete domination of the continent. Filthy pirates and greedy Cannorian competitors of the D.T.C. are but a few, lurking within their hideouts and distant islands, leeching off descent trade to fill their pockets. No longer will we put up with this insolence; the Ruined Isles will be scoured, our competitors made irrelevant, and all will be brought under our mercantile hegemony."

 deranne_great_path_east_title:0 "Path to the Great East"
 deranne_great_path_east_desc:0 "Many years ago we set our ships out to explore the unknown reaches past the Salahad desert. After all, our discoveries in Aelantir had brought great wealth from the west; surely some measure of riches existed in the south just the same? In that, we were right.\n\nFrom the Ironwood of Fangaula to the spices and magnificent ports of Fahvanosy and prosperous cities of the Lizardfolk, goods flow in abundance through the veins of trade. Now, we look towards Ardimya, and what lies beyond. With Sarhal’s tail firmly within our control, our domination of the routes leading from the great east around the continent would be complete."

 deranne_land_of_every_trade_title:0 "The Land of Every Trade"
 deranne_land_of_every_trade_desc:0 "Within the secluded woods of the Redglades, a wizened Elven artisan meticulously works his spinning wheel, weaving the fabric as he has so many times before to make silk famed across Cannor for both its softness and strength.\n\nIn the Glasslord Refuge of Bottlepoint, a Dwarven glassblower sits within her own workshop, carefully blowing small puffs of air into the glass. From the resulting cavity, she fine tunes the patterns and intricate details for which her community is so renowned.\n\nThe fires of the forge soar as the master craftsman teaches his pupils to operate the magical smithies of Darom. The pupils are not young, nor inexperienced in the works of metal, but the craft of the Daromsforge is an art in of itself, one seldom mastered. And so they watch keenly as the teacher weaves the enhancing magic between each stroke of the hammer, eager to become one of the esteemed forgemasters."

 deranne_center_of_three_worlds_title:0 "Center of Three Worlds"
 deranne_center_of_three_worlds_desc:0 " Centuries ago, Westport was little but a small fishing town on Deranne’s western shore. A proud town, as one of the first settlements of Derhilde’s reavers and the famed location of their landing, yet merely a tight-knitted community of fishers and the occasional merchant. Certainly nothing to compare to the magnificent cities of the east.\n\nNow, however, the city’s humble beginnings are hard to believe. Bolstered by trade from all across the world, from the distant reaches of Haless to the once mythical lands of Aelantir, Westport now stands as a true Metropolis. Where once stood a small harbor sprawls an endless profusion of docklands, the air filled with the scents of exotic spices from Fahvanosy and incense from the far east. Day and night the merchants bargain over prices, puffing on fine Aelantiri tobacco and wearing luxurious coats of Bulwari silk. And as the wind blows through the vibrant, busy streets of the inner districts, all see the Seaflower banner flying proudly, laying claim to one of the world’s greatest cities."

 deranne_seaflower_blossom_title:0 "The Seaflower Blossom"
 deranne_seaflower_blossom_desc:0 "Among a garden of wilted flowers a lone blossom stood defiant. Strong and unyielding, it held through the most desperate of times and managed to usher in a new era of prosperity, a radiant light spreading through the field of shadows. \n\nNow Lencenor blooms under our supervision, a flowering bastion of Cannor, a beating heart of commerce and culture. Where once we struggled to unite the divided winelords in the aftermath of the Lilac Wars, now the different peoples of our lands now accept our authority and stewardship. Where once Lencenor was a land of strife and devastation, of schemes and rotten nobility, now we have welded together the disparate factions and made them function in unison. And as prosperity stretches from the Sórncosti hills to the Elven glades, from Venaíli mists to Ruby depths, all live under the peace of the Seaflower blossom. "

 deranne_skalds_at_heart_title:0 "Skalds at Heart"
 deranne_skalds_at_heart_desc:0 "Where kingdoms lie and old trees grow\nWhere no man steps and riches flow\nVillage roost to city bell\nMountain peak to Uelos’ dwell\n\nFrom knightly virtue to merchant’s greed\nFrom lowly beggar to prince’s deed\nIn the acceptance of the stubborn, In the mind of the fool\nThere is no doubt who upon the high seas rule.\n\nWhen the Seaflower stands triumphant."

 deranne_increasing_lumber_production_title:0 "Demands of the Sea"
 deranne_increasing_lumber_production_desc:0 "Our operations in Dalaire have been quite successful, with the vast, thick forests of the cold north providing the vast and good-quality supply of lumber required to maintain our dominance upon the seas. Yet more is better, and with the employment of ever more advanced Behemoths upon the waves, it is prudent that we continue to invest within this sector, lest we be forced to import timber from the lands of the Alen. The D.T.C. has offered to sponsor these efforts if we help them kickstart the construction of sawmills across the land."

 deranne_city_never_sleeps_title:0 "The City That Never Sleeps"
 deranne_city_never_sleeps_desc:0 "It has been some time since the first adventurers stepped foot onto the soil of the Trollsbay. What were once loosely connected settlements and fledging bands of men seeking out the mysteries of newfound Aelantir have become true nations with their own cities and armies, turning the region into a bastion of civilization on the continent.\n\nThe greatest of these cities, or at least the one with the most potential, is the one which lies upon Isobel Island. First founded by adventurers from Toarnaire guided by the Lady Isobel, Port Isobel has grown into the financial center of the Trollsbay, with some claiming that it promises one day to match the magnificence of Westport itself. While this is utter fancy, it cannot be denied that establishing a twin city on the other side of the Lament can only strengthen our contact with the Trollsbayers, and allow us to profit off of our mutual cooperation."

 deranne_great_derannport_title:0 "The Great Derannport"
 deranne_great_derannport_desc:0 "When the Derannport was first established, it was little more than an outpost made into a small hub for the up-and-coming Deranne Trading Company to gather and organize their affairs more efficiently. Now, the D.T.C. wields influence those first merchants could never have dreamed of, with outposts in most port cities facing the lament. With the D.T.C.. having much outgrown their humble beginnings, why shouldn’t the Derannport? Officials of the company have now approached us with an offer to buy all the Silsensald Isles, with plans to expand their complexes; by the time they’re done, the competing ports in Aelantir will seem like pitiful things."

 deranne_greatest_behemoth_title:0 "The Greatest Behemoth"
 deranne_greatest_behemoth_desc:0 " During the Landing, when the first elven Migrant Ships came to herald the Remnant Fleet, the people who welcomed them could only gaze in awe at the majestic creations engineered by the Precursors of old. Making all other vessels seem like rafts by comparison, the Migrant Ships reached to the skies, loaded with terrible weapons that could level cities with ease.\n\nWhile the day we can finally claim to match the wonders of the Precursors is far off yet, our warships dominate the seas as the ancient elves once did. Now, inspired by the old Migrant Ships that reached Cannor’s shores long ago, our engineers seek to improve the Behemoths by magical means. They wish to fit each Behemoth with a core mass of damestear, serving as a source of power administered by a mage to enhance the firepower of the numerous cannons onboard, as well as emitting a protective shield around the hull of the ship. The Veline, it shall be called, and may it tame the seas with its might."

 deranne_good_samaritans_title:0 "Good Samaritans"
 deranne_good_samaritans_desc:0 "It is done. The great dams taming the furious river of the Ynn have – with our humble assistance – been rebuilt to match or even exceed the splendor they once wielded. Now, the lands and people of the Ynn can truly prosper, and bring even greater wealth to the surrounding markets. Of course, in return for our kind patronship we have secured many graces and privileges from the Ynnic lords regarding matters of trade, meaning much of this wealth can conveniently trickle into the hands of our eager merchants without much trouble."

 deranne_conquer_summer_isles_title:0 "Conquer the Summer Isles"
 deranne_conquer_summer_isles_desc:0 "Now that we have established a foothold in the very northern lands of Fahvanosy, securing the valuable possession of Lélanan, the remaining halflings to the south may think that we are content to leave their lands alone. They do not know what is coming. What appeared harmless merchant vessels, looking to take part in the lucrative trade of Cloves and other spices, have in reality been scouting the halfling defenses on our behalf. Sarhaly commerce has proven quite profitable, and if we wish to expand our operations on the vast continent, what center could be better than an impregnable island fortress? Surely the Vyzemby would prosper further under our administration."

 deranne_port_of_teramzadai_title:0 "The Port of Teramzadai"
 deranne_port_of_teramzadai_desc:0 "As the sight of the seaflower banner upon Sarhaly waters becomes ever more common and we bring more of Vyzemby into the fold, the need for a more central base of operations has become clear. In the southern reaches of the Summer Isles, the sweet scent of cloves fills the air of Teramzadai – a city of both lizardfolk and halfling make, with a market bustling enough to attract merchants from Ardimya and Fangaula alike. WIth the greatest port of Fahvanosy prosperous and safe under the watch of the D.T.C. administration, none may contest our control of the Sarhaly markets."

 deranne_ramping_up_clove_production_title:0 "Cloves and Riches"
 deranne_ramping_up_clove_production_desc:0 "“HOLD HER STEADY LADS!” As the rain poured onto deck and the great waves crashed against the hull, the captain bellowed commands at the ship crew, working tirelessly to keep the merchant vessel from going under. Aye, two days ago he had emptied his flaming pockets getting this trade, and he would be damned if a storm made him lose a single ounce of his cargo. Cloves: the simple, sweet smell of them is enough to make any merchant’s skin prickle and the promise of profit ring in his ears.\n\nHe had heard rumors of the D.T.C. planning to expand upon the production of these addicting, beautiful spices. That would surely attract merchants from Sarhal all the way to the flaming Trollsbay, and soon he would be seeing a hundred ships like his sailing with the stuff aboard. Be it as it may, he had a headstart on the fools — if only he could keep his bottom out of the sharks’ maws before he finished his trade."

 deranne_contact_with_lizardfolk_title:0 "Contact with the Lizardfolk"
 deranne_contact_with_lizardfolk_desc:0 "Upon further exploration along the Sarhaly coast and expeditions further inland, we have discovered what seem to be vast civilizations of lizardfolk, sapient reptiles native to Sarhal’s southern jungles. Certainly strange in appearance, their vocals even more so, yet they have been distantly hospitable to our hesitant merchants travelling to their cities for trade.\n\nThey are a proud and haughty folk who speak fervently of prophecies regarding a ‘333rd Empire’, which they say will unite all lizardfolk and ensure their everlasting prosperity, after their 332 previous empires apparently failed to do so. Our merchants were sure they misunderstood at first, but after some more questioning across the land they found it a persistent belief, leaving them even more confused. Strange people indeed, these lizardfolk, but as long as they continue to trade with us fairly, we can pleasantly nod along to their odd superstitions."

 deranne_depths_of_new_hooksfield_title:0 "Depths of New Hooksfield"
 deranne_depths_of_new_hooksfield_desc:0 "Every time we think we have the lizardfolk figured out, we continue to make discoveries that completely change our perspective. Throughout Sarhal, though mainly in the jungle of Taneyas, we have uncovered gigantic dark spires standing at almost a thousand feet. Made of no material native to Halann, the spires are apparently of great religious and cultural significance to the lizardfolk, who call the structures ‘Zatsaryas’.\n\nWithin an old Vyzemby settlement north of Fahvanosy emerges one of these very spires, far away from the lizardfolk homeland where most of them lie. Remarkably, only the top of this great spire we know to be called Kazakesh can be seen, leading to a great surge of interest for what lies within its hidden layers: we welcome such exploration with open arms."

 #Events
 flavour_deranne.1.t:0 "The Western Twilight"
 flavour_deranne.1.d:0 "Standing upon a steep cliff, a gust of wind blowing back his long, dark hair, Adénn looked across the vast ocean to the western horizon. The sea had always been the dominion of Deranne, a force of nature adapted to by centuries of tradition, dating back to the Derhilde and the Era of Black Ice. Despite its dangers, the ocean continued to be a haven for all Derannics, its desolation granting a sense of peaceful solitude.\n\nAdénn unsheathed his sword, its steel glistening with the light of the setting sun. It was bestowed to him by his father during his final breaths, fatally wounded in his final battle against the Lorentish just a few years before. The throne was left to young Adénn, and with the realm in chaos and the army in disarray, he could do nothing but sue for peace. Dameria fell only a year later.\n\nAdénn turned east, towards Lorentainé, with hatred in his eyes. The Moon Party had lost, and the traitors and usurpers of the Rose would now lavish in their victory, Adénn’s fallen brothers and sisters forgotten in the annals of history. No, he would not accept this fate. Dameria was gone, the old order shattered, but his heart glimmered with hope still. The Lorentish were weak and exhausted, their vassals unruly, and it was commonly known that the man on their throne was a fool, his victory handed to him with little effort of his own. Adénn held up his sword once more before he sheathed it; justice would be delivered - Deranne would not cower.\n\nAnd so, with a sense of resolution, he mounted his steed and took one last look upon the western twilight, before he rode east."
 flavour_deranne.1.a:0 "Our war is not over."

 flavour_deranne.2.t:0 "Reverie of Retribution"
 flavour_deranne.2.d:0 "A wrong righted.\n\nThe scent of smoke was strong as [Root.Monarch.GetName] rode through the Petal Gate of Lorentainé, a relatively undamaged section of the wall that now masked the chaos beyond. [Root.Monarch.GetSheHe] was welcomed by the cheers of soldiers, those who refrained or were otherwise satisfied from the spoils of the broken city. \n\nJustice served.\n\nAs the [Root.Monarch.GetTitle] moved through the rubble that once made up the city’s streets, the thick smell of death mixed with that of the burning buildings. A siege like this was never clean, and nowhere was that as evident as the place where men had fought amid their homes. Blood ran over the cobblestones.\n\nWhat had to be done.\n\nIt was a quiet procession that rode down with the [Root.Monarch.GetTitle] to the main square, for amid the sounds of eager looting and songs of the victors were the hushed cries of the innocent - those huddled together in the shadows to shelter against the raging flames, sobbing for lost ones. Some of them stared hollowly at [Root.Monarch.GetName]. Good, they needed to see their conqueror. The Lorentish had inflicted the same agony upon countless lives, and now fate had paid them back in kind.\n\nSo let the voiceless sing and the tearless weep..."
 flavour_deranne.2.a:0 "...for now the Rose has fallen"

 flavour_deranne.3.t:0 "A Crown Among Ruins"
 flavour_deranne.3.d:0 "Light streamed through the tall, ornamented glass windows at the side of the throne room, faintly illuminating the grand pillars spread throughout the vast chamber. There was a sense of abandonment about the place. In a way this was true, as it was unlikely it would be used for the same purpose ever again; but it could earn another.. \n\nWalking down the central pathway to the throne itself, [Root.Monarch.GetName] gazed at the massive map of Lencenor placed atop a larger table in [Root.Monarch.GetHerHis] way, surrounded by clerks, servants and generals in discussion. Stopping short, the [Root.Monarch.GetTitle] looked upon the very north of the map, at the Small Country and the elven sanctuary of the Redglades. Many Lorentish loyalists had fled their stronghold in the north, protected by loyal subjects and the Elfrealm. Perhaps accommodation could be sought with the elves, the offer of a stronger protector. Yet as with the Ruby Dwarves, [Root.Monarch.GetSheHe] would not hesitate to bring them to heel through force.\n\nMoving further down the map, [Root.Monarch.GetSheHe] fixed [Root.Monarch.GetHerHis] eyes upon the southern winelords. A pragmatic folk of rich lands, having built up immense wealth through trade with the Anbennarians. They had fought with the Moon, but were unlikely to submit to Derannic rule without conflict. To the very south lay the duchy Sornóst, dogs of the Siloriels. They would fall last.\n\nFinally, [Root.Monarch.GetName] walked up to the throne and turned upon the dais, looking across the map ahead, visible in full now as torches were lit around the room. Lencenor would know war."
 flavour_deranne.3.a:0 "But in the end, there would be a new spring."

 flavour_deranne.4.t:0 "A Question of Legitimacy"
 flavour_deranne.4.d:0 "Trust is a fragile thing, and deceit all too tempting.\n\nWhen we replaced the Lorentish banner with the one of the Seaflower to fly high in the winds above Lorentainé, we knew the fight wasn’t over. The armies of the Rose may have been scattered and their leadership broken, but the spirit and disobedience of its people simmered beneath. Nowhere is that as evident as with the entrenched nobility.\n\nScheming, cliques and knives in the dark abound; people who fear the prospect of new masters, others who see the chaos as a way to climb the ladder of thorns. Questioning our right to the Ruby Crown, they undermine our very authority, and thus threaten the stability of the realm."
 flavour_deranne.4.a:0 "We will endure."

 flavour_deranne.5.t:0 "An Offer of Prosperity"
 flavour_deranne.5.d:0 "Emissaries from Deranne have come to us with an offer: We may be able to avoid ourselves of the ruthless march of the Seaflower's armies if we agree to submit ourselves to ultimate Derannic rule, while maintaining our previously granted autonomy. "
 flavour_deranne.5.a:0 "Submit"
 flavour_deranne.5.b:0 "Nonsense, let them come if they dare!"

 flavour_deranne.6.t:0 "Dealing with the Sorncósti"
 flavour_deranne.6.d:0 "“I once walked the blistering vineyards of the Sorncósti hills to see the origins of the famed liquor for myself. Of course, no Lencori man reaches adulthood without tasting its pristine flavour, and wine only matures over time, but there was something unique about strolling through those fields.\n\nI talked to the owner, a gentle old vintner who told me the fields had been passed through his family generation after generation, and that they would continue to be after his passing. Indeed, I learned a lot about the ways of the Sorncósti while I was there. People like to lump the Lencori people together, call them either Lorentish or Derannic, but the differences are obvious if you just look a little closer. There was a sense of stability to the land, like you could feel the ancient ties that have persevered for a thousand years while the rest of Lencenor moved on. Did you know some Sorncósti still believe in the old gods of the Eidoueni?\n\nRegardless, the Sorncósti are a strong people, even when subjugated to the whims of outside powers. They stood alone against the Entebeni horselords, survived the War of the Sorcerer-King unscathed, and fought tooth and nail when the Derannics came to secure the southern hills. You almost have to admire their ferocity, and it is no wonder the Seaflower…"
 flavour_deranne.6.a:0 "largely let them be.”"
 flavour_deranne.6.b:0 "taught them a lesson.”"

 flavour_deranne.7.t:0 "How Hard it is to Kneel"
 flavour_deranne.7.d:0 "Before every farmer stands a plowing, before every merchant a bargain, before every soldier a battle and before every [Root.Monarch.GetTitle] a decree. \n\n[Root.Monarch.GetName], standing upon the balcony outside [Root.Monarch.GetHerHis] chambers, studies the nightingales singing their morning song in the courtyard below. Beside [Root.Monarch.GetHerHim] stand two great men, advising the [Root.Monarch.GetTitle] upon the matters of the old Lorentish nobility, who continue to undermine the authority of the crown at every turn. To [Root.Monarch.GetHerHis] right stands such a noble, though one having long since thrown his lot in with his new suzerain, for Énri síl Rhúmidaire has a favorable position in the Derannic court. Opposite Énri stands a grizzled old general, Artus Revaíne. Not a conventional man to ask for advice on courtly intrigue, but the [Root.Monarch.GetTitle] will value bluntness today.\n\n“Reason can be made with the wounded man, for he fights to live,” Énri pleads. “But strike a fatal blow and the man will spend his final breaths to claw you down with him. These nobles will come around, but force their hand as you suggest and they will go down in a torrent of flame and ash.”\n\n“When you find a sick crop, do you let the disease spread across the field?” Artus counters. “Do you refrain from cutting off a hand in the hopes the infection doesn’t fester? If we put up with this disobedience, what precedent does it establish? Their nobility has bickered and disrupted order like petty children for long enough, and if they go down screaming, so be it.”\n\nA sudden gust of wind sweeps through the courtyard as the [Root.Monarch.GetTitle] makes [Root.Monarch.GetHerHis] decision."
 flavour_deranne.7.a:0 "Keep a tight leash, but leave them to their squabbling."
 flavour_deranne.7.b:0 "Then let the torrent come. "

 flavour_deranne.9.t:0 "In Her Footsteps"
 flavour_deranne.9.d:0 "“See, there are many stories of what happened that day within the royal palace, but I shall tell you the common tale. It was the anniversary of the coronation of the first Derannic king, and the first after the last holdouts of resistance against Derannic hegemony had been crushed. And so the [Root.Monarch.GetTitle] decided to hold a grand feast in celebration of the newfound peace. All powerful noble houses were invited, and bountiful foods as well as the finest Sorncósti wine were provided for all guests. \n\nAfter drinking an unknown – and fervently debated – amount of alcohol, it is said the [Root.Monarch.GetTitle] retired alone to the palace gardens, where [Root.Monarch.GetSheHe] stayed until twilight. When [Root.Monarch.GetSheHe] returned, [Root.Monarch.GetSheHe] gathered all guests in the main hall and announced that the spirit of Derhilde herself had spoken to [Root.GetHerHim], and that [Root.Monarch.GetSheHe] was to follow in her footsteps. When asked to elaborate, [Root.Monarch.GetSheHe] simply left for their bedchamber. “\n\n“Wish I could get that drunk,” came a grumble from the back of the tavern.\n\n“The next morning,” the Bard continued, “the [Root.Monarch.GetTitle] set out by foot from the gates of the palace with an honor guard of four; a messenger, two knights and a common hunter. And from Deranne they travelled east across barren plains, through dense woods and sunlit vineyards, along the very same path Derhilde once took. The [Root.Monarch.GetTitle] talked with many strangers, from lowly peasant to powerful lord, blacksmith to merchant, human, elf, dwarf and halfling. The hunter fetched food where it could not be bought, the knights scared off bandits, and the messenger noted down decrees shaped on morning strolls.\n\nWhen at last the party arrived at Derhilde’s place of coronation, Redfort, the gathered host could scarcely believe their eyes. The [Root.Monarch.GetTitle] wore a simple pair of breeches and a ragged cloak, unkempt hair flowing freely in the wind, and yet [Root.Monarch.GetSheHe] gleamed with a royal presence that spoke of a newfound calm, and wisdom. Deranne had walked the path of Derhilde twice; once for war, and once for peace.”"
 flavour_deranne.9.a:0 "“And thus ended this tale, but there is always another to tell.”"

 flavour_deranne.10.t:0 "Gateway to the West"
 flavour_deranne.10.d:0 "“I once travelled to the gates of Westport, eager to see the prized jewel of the Seaflower with my own eyes. Every Derannic hears about the wonders of Westport as a child, like the monolith of Derhilde’s Gateway, overlooking the City’s massive harbor frilled to the brim with vessels from all over the world. I came in anticipation of the Festival of the Landing, when the City’s streets bustle – even more than usual – for a day and a night to celebrate the day of the arrival of Derhilde’s host long ago. Hundreds of ships lit up the sky in tandem with the City’s many lanterns, and food was provided for all. Children raced down the streets, and men and women danced, clad in special garments embroidered with flowers, laughter ringing throughout the night. It truly was breathtaking. \n\nI spoke with many souls that day, all with different backgrounds and aspirations. Merchants who had come just in time to make their trade before the festival, migrants who came to Westport to find a better life across the ocean, villagers who, like me, wished to see the the marvellous city for themselves, and, of course, locals who simply looked forward to that day every year.”" 
 flavour_deranne.10.a:0 "“Hard to believe that it was once nothing more than a humble fishing town.”" 

 flavour_deranne.11.t:0 "A Thundering Entrance"
 flavour_deranne.11.d:0 "“Aye, I once saw a Behemoth up close, during my time in Westport. Towering beasts, they are. So large that you had to leave that section of the docks entirely to even see the sunset on the horizon, and I believe I witnessed only a smaller ship! I remember I attempted to count the number of cannons, then next thing I knew I was dozing off in its shade. I believe I got to eighty, and I wasn't even halfway through. Just the thought is enough to make a man weep.\n\n“And so I wonder what the Trollsbayers thought, when they saw an armada of them outside their bay.”" 
 flavour_deranne.11.a:0 "The ocean is a domain, and we are its masters." 

 flavour_deranne.12.t:0 "Establishment of the Deranne Trade Company"
 flavour_deranne.12.d:0 "“During my travels throughout the Ruined Sea, I met a Seaflower merchant at an inn in Port Isobel’s Tower Street. Arlaín was his name, a rich and portly man, who I quickly learned was of high standing within the Deranne Trading Company. He even owned an estate in Brunvern that had been passed through his family since the Conference at Columnshaven. Now, just as any good Derannic, I am quite fond of the [Root.Monarch.GetTitle], and so I made my leave as I sensed the topic of conversation was moving to more royal matters. I’m not one for getting into brawls, after all.” The Bard nervously scanned the tavern's patrons.\n\n“So yes, while relations are generally cordial, it's evident that ever since that day in Columshaven, a wedge was driven between Crown and Trade.”" 
 flavour_deranne.12.a:0 "Thus dawns the hegemony of the Deranne Trading Company."

 flavour_deranne.14.t:0 "The Sisterhood"
 flavour_deranne.14.d:0 "The Halflings of Fahvanosy worship a pantheon called the “Great Family”, where gods are associated with domains and affinities not unlike those of the Regent Court. Yet, while Castellos was universally regarded as the head of the Regent Court, there is no such figure among the halfling pantheon. In Lélanan, however, it is the goddess of life, love, and water – Lel – who is believed to have this mantle, and the city’s ruling elite, The Sisterhood, consists of priestesses who dedicate their lives to her rites.\n\nIn the aftermath of our conquest of the city and our continuing campaigns on the Island, the Sisterhood have established themselves as an authority beyond Lélanan’s borders, using the opportunity to strengthen their power over the temples and pantheon as well as their hold over the people’s hearts. After the fall of previous governments, they are seen as the last true leaders of the opposition to Derannic rule, and are using their newfound influence to effectively incite rebellion among the masses." 
 flavour_deranne.14.a:0 "What a nuisance." 

 flavour_deranne.15.t:0 "The Priestess's Ultimatum"
 flavour_deranne.15.d:0 "“Have you heard of the Halfling Priestess’ ultimatum? It is said that the High Priestess of the Sisterhood of Lélanan – and by that point essentially the leader of all Fahvanosy resistance – walked with her retinue right into the halls of the great headquarters of the D.T.C. in Fahvanosy, the residence of the governor in the city of Teramzadai. Now, do remember that this procession was made up of halflings, so it's not as if this should have made a very imposing sight.” The Bard shot an apologetic glance toward the halflings among the patrons. “And yet I hear it was. The High Priestess, clad in her elaborate attire, through a stately posture and a truly serene face, managed to emit an air of authority that towered above all else.\n\n“And so, she put forth an ultimatum. The Derannics were struggling in their attempt to hold fast to the isles, and the priestess promised worse if her demands were not heard. The Derannics were to keep all jurisdiction over local trade, but Fahvanosy was to be divided into Halfling states, with considerable autonomy, their governing bodies, laws and armies and so on.\n\nFor the governor and his associates, the experience was truly shocking. And in the end, they…" 
 flavour_deranne.15.a:0 "Agreed to the demands"
 flavour_deranne.15.b:0 "Managed to land a compromise"
 flavour_deranne.15.c:0 "Braced themselves for war."

 flavour_deranne.18.t:0 "The End of Tales"
 flavour_deranne.18.d:0 "“To my sorrow, my friends, that last tale was the last I had for you.” announced the Bard as the final chords echoed, before stilling both sound and strings through a gesture of magic. He lifted his gaze, “And so, I must finally take my leave.”\n\nWhen the Bard had told his first tale at the Swaying Rose, only a handful of patrons had been there to listen. Yet as word spread of the stranger with unlimited stories to tell, the tavern had quickly filled up with ears eager to hear the Bard’s tunes. Now, with every bench taken, the room carrying a strong scent of pipe and ale, the Bard’s announcement filled it with a collective sigh.\n\nFinally Varil, a dockworker at one of the front tables, slammed his burly arms on the wood. “You’re leaving already? Surely you’ve another tale in you, yet.” Hums of agreement rippled through the tavern.\n\nStrapping his lute across his back, the Bard winced. “I have told you of the tales of the Seaflower, of its struggles and triumphs, of its kings to its lowliest farmer. So, while there are always more tales to tell, I have errands I must attend to. Surely you all do as well, and you must tire of my voice.”\n\nFrom the back came the loud grunt of a dwarf. “Best part of my day, this.” And with that, the tavern erupted in a roar of assent, the thudding of tankards and chants for yet another tale drowning out the Bard’s wilting protests. \n\n“By Derhilde’s sodden boots!” exclaimed the Bard, sliding the lute down his shoulder and settling back in his chair - and yet a tiny smile tugged at his lips. “Alright, alright! I suppose I have one more tale to spin for you. But that is the last one, you hear me?”\n\nAnd so, shaking his head, with the deafening cheers of the crowd heralding a new beginning, the Bard began to play his strings once more." 
 flavour_deranne.18.a:0 "“Have you ever heard of the Derannic who sailed all the way to Moduk?”"

 flavour_deranne.19.t:0 "Tales of Deranne"
 flavour_deranne.19.desc:0 "The tavern called The Swaying Rose was quiet as the Bard played the last somber tunes upon his lute. The tankards upon the tables were empty, the serving girls clearing the empty trays of food, and yet the patrons still watched the Bard with attentive eyes, anticipating the words to come.\n\n“And thus ended this tale, but as many tales came before and many tales are still to come, there are always more to tell. So refill your cups and listen close, for you shall hear another!”\n\nAs the entire tavern cheered, the Bard began to tell..." 
 flavour_deranne.19.a:0 "Go Back"
 flavour_deranne.19.b:0 "the Tale of Derhilde"
 flavour_deranne.19.c:0 "the Tale of the Lilac Wars"
 flavour_deranne.19.d:0 "the Tale of the Withered Roses"
 flavour_deranne.19.e:0 "the Tale of the D.T.C."
 flavour_deranne.19.f:0 "the Tale of the Rosepeace"
 flavour_deranne.19.g:0 "the Tale of Westport"

 flavour_deranne.20.t:0 "Dominance in Aelantir"
 flavour_deranne.20.d:0 "As a result of our efforts, the D.T.C has greatly increased their influence and profits on the Aelantiri continent."
