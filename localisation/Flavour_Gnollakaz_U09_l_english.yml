#Missions
 U09_blood_gold_for_the_empire_title:0 "Blood Gold"
 U09_blood_gold_for_the_empire_desc:0 "The city of Golkora is not just a border fortress, marking the boundary between the rump state of Kheterata and our ascendant gnollish realm. The territory it guards is no mere stretch of land along the Mother’s Sorrow, but home to the largest gold deposits in all of western Sarhal. For centuries, the many mines of Golkora reliably produced the precious metal that was turned into an instrument of imperial control and grandeur by the Kheteratan imperial mint.\nBut now, all that wealth is in our hands, ready to fund our campaigns, pay our armies and be turned into glittering adornments for the pack mistresses, chieftains and warlords of our realm. All that is required for the gold to flow into our coffers are the blood, sweat and tears of countless miners. Luckily for us, we never lack warm bodies to send down into the mines, be they captives of our latest raids, disobedient slaves or would-be dissidents against our rule. Their blood is a cheap price to pay for the near-infinite riches buried beneath the ground."

 U09_finish_what_we_started_title:0 "Finish What we Started"
 U09_finish_what_we_started_desc:0 "When Grizaka united the quarrelsome Pyreclaw packs under her, they called her the mayfly pack mistress. When Grizaka brought the proud Irsmahapans to heel at the battle of Masiluri, they called her a barbarian who could only hope to triumph against feeble provincials. When Grizaka shattered the ambitions of that bloodthirsty scoundrel Viakkoc in sight of hoary Kheterat itself, they called her a brash fool who spilled gnollish blood for Kheterata’s benefit.\nYet who holds in her mighty paw the lives of all who live along the Sorrow, from Lake Nirakhet to Golkora? Who is the mightiest pack mistress of her generation? Who has time and again proven her superior cunning and martial prowess? It is high time we knock these delusionally arrogant Kheteratans from their high perch and finish what we started."

 U09_administrative_synthesis_title:0 "A Blended Administration"
 U09_administrative_synthesis_desc:0 "The human inhabitants of Kheterata exhibit many despicable traits, frankly too many to list them in a single lifetime, but one thing for which they have shown a certain aptitude is the administration of a farflung empire. For all the vicissitudes suffered by the empire of Kheterata over the millennia, it never truly lost its iron grip over the people within its borders, and has proven capable of restoring said grip over any territory temporarily lost to hostile neighbours.\nIt would be the utmost level of foolishness to discard their hard-won experience merely because we bested them in battle. Let them serve us as they have served their imperial masters in the past. And while we gnolls may not have such a storied legacy of imperial grandeur, the flexible, if cutthroat, meritocracy at the heart of our cultural traditions will be a grand boon, whether it comes to the prevention of nepotistic corruption within the administration or the integration of a newly conquered people into the empire."

 U09_acknowledge_reality_title:0 "Facing the Facts"
 U09_acknowledge_reality_desc:0 "The title of Steward of the Sorrow carries with it an undeniable weight of authority and prestige. It is bestowed upon rulers of the lands along the Sorrow who have been deemed worthy by the Khetarch, the leader of the Khet.\nThis mysterious race of godlings, whose very existence has been inextricably intertwined with the Mother’s Sorrow since the times of dread Elikhet, has but one glaring weakness. They are utterly pampered creatures, accustomed to fawning worship and an endless deluge of luxuries, be they exotic delicacies or valuables of exquisite craftsmanship.\nIf we can prove our worth as the new rulers of Kheterata and replace the foolish Crodamos dynasty as the premier supplier of these amenities, the Khetarch will surely be swayed by our righteous claim to all the lands along the Sorrow. Granting us the Stewardship would only acknowledge the new reality and, by thus legitimising our conquests, prevent futile uprisings and unnecessary bloodshed."

 U09_birth_of_an_empire_title:0 "Birth of an Empire"
 U09_birth_of_an_empire_desc:0 "The Mother’s Sorrow is the lifeline for a multitude of provinces, cities and hamlets along its banks. From grand Lake Nirakhet with its bustling city of Niramit all the way downriver to the magnificent port city of Koroshesh nestled amidst the vast river delta, an immeasurably vast number of humans and gnolls, and even the occasional gnome or elf, spend their entire existence nourished and sheltered by the hallowed river.\nAnd all these masses now bow to but one [Root.Monarch.GetTitle]. All the lands along the Sorrow and beyond, from the coastal deserts of the Shasourans to the hazy Gol savanna, are united as one resplendent empire. Even beyond the lifegiving waters of the Mother’s Sorrow, many packs, tribes and kingdoms owe their fealty to us, all of them bowing before the throne in [Root.Capital.GetName].\nYet this is not the culmination of Grizaka’s grand vision, it is merely the beginning. All Gnollkind awaits a most glorious destiny; never again shall we be reduced to mere raiders and scavengers, but we shall persist, the rulers of an empire the likes of which the world has never before seen."

 U09_all_shall_bow_title:0 "All Shall Bow"
 U09_all_shall_bow_desc:0 "The vast savanna of the Gol has been the home of countless gnoll packs, coalescing around ambitious pack mistresses or pack lords and collapsing just as swiftly after their demise. But every once in a while a particularly charismatic leader emerges and unites not just a single pack, but many packs under their banner.\nGrizaka is just such a blessed individual, and amongst those pack mistresses who chose to follow her lead was Rakkaz, first of her name. She earned the moniker Slayer-of-Slayers during her years of service as general to Grizaka, yet fate decreed that she should fall at the battle of Kheterat.\nUnfortunately for all involved, her daughter, Rakkaz II, has proven to be a craven oathbreaker, defiling the memory of her mother by turning her back on Grizaka and seeking refuge in the remote highlands near the Shadow Swamp.\nSuch a heinous betrayal shall not be tolerated any longer. Rakkaz and her pack will bow low once more, whether or not their heads are still attached to their necks when they do so."

 U09_no_quarter_for_traitors_title:0 "No Quarter Given"
 U09_no_quarter_for_traitors_desc:0 "Grizaka’s chosen moniker - Empress-of-Gnollkind - is neither empty boast nor wishful thinking. It is a promise, both to the many loyal packs that have already bound their fate to that of Grizaka, and to those pack mistresses and pack lords looking on from the outside, who stubbornly refuse to put their own ambitions aside and join Gnollakaz for the greater glory of Gnollkind.\nAnd while the vacillating attitude of these independent packs, with their shortsighted refusal to commit themselves to Grizaka’s grand vision, does not endear them to our glorious [Root.Monarch.GetTitle], it is the pack that broke its sacred oaths of allegiance for whom she reserves her most ardent ire.\nNow, with the former lands of Rakkaz firmly subjugated once more, an example has to be made of that treacherous viper Rakkaz II, to warn all others away from repeating her fatal mistake. Her agonies shall put even the most sadistic imaginations of a devout Xhazobkultist to shame. And once she has been granted the release of death, her carcass will be left for the wild animals to devour. Not one sliver of her rotten meat is worthy to touch the lips of her betters. She, her foul deeds and fleeting ambitions will be forgotten, all turned into so much scavenger refuse."

 U09_a_worthy_army_title:0 "A Worthy Army"
 U09_a_worthy_army_desc:0 "We gnolls as a people are not averse to combat, whether to advance our place in the pack, raid a prosperous settlement or defend our pack against rivals and intruders. But fighting as small roving bands of raiders is a different beast entirely to the coordinated march in imperial battle formation now required from us.\nIf we want to stand a chance to keep our conquests in the years to come, we need to build up an army worthy of our empire, an army capable of shattering all enemies who may dare challenge us in the years to come. The heart of our nascent imperial army will be the Empire’s Flame, an elite formation whose fiery touch will scorch all before them.\nAnd as for those who cover beneath our shadow, having sworn oaths of fealty in return for our magnanimous protection? They will send us their most accomplished warriors to serve in our wars, each and every one adding to our martial prowess and superior discipline.\n"

 U09_from_where_to_dictate_title:0 "From Whence Orders Hail"
 U09_from_where_to_dictate_desc:0 "A budding empire requires a proper capital, a seat of power where all threads of governance convene, a place where the tedious yet oh-so-necessary machinery of state can turn mere orders into the march of whole armies, into the requisition and redistribution of entire harvests, into lasting changes that will affect the future of entire peoples.\nIt is thus the will of Grizaka that Ilzin Grizaka shall be transformed into just such an exalted locale. It will no longer be merely the camp of Grizaka, but instead Gnollakaz, the Fortress of Gnolls, a mighty citadel to secure our hold over the lands of Gol for centuries to come. The earth itself shall tremble beneath the stride of our troops whenever its gates open.\nAnd around this cornerstone of our empire, in time a magnificent metropolis shall arise, where merchants from all corners of the continent shall gather to sell their luxuries to the imperial elite and have their pick of the most exotic goods found anywhere in Sarhal."

#Events
 flavour_gnollakaz.1.t:0 "Grizaka, Empress-of-Gnollkind"
 flavour_gnollakaz.1.d:0 "Gaudy tapestries flowed with the desert breeze; the sunlight danced across innumerable gilded artifacts and sparkling gemstones scattered haphazardly across the floor, throwing up coloured light, lasting evidence of a hundred plundered cities and towns.\n‘As if a frenzied magpie horde had been given free reign to decorate the room in accordance with their proclivities… a sign of gluttonous greed? For sure. But maybe, just maybe, a sign of ambition, as well… a hunger for more than what we were, a hunger that can be channeled and shaped, which can build an empire!’\nSuch were the thoughts of Grizaka, sitting on her throne, lost in one of her contemplative moods.\nBarely noticed beneath her introspective gaze, her assembled court was busy with their own dealings. Avaricious Krah traders were tallying the profits of the last slave auctions, the more ambitious amongst their ranks attempting to persuade the tribal warlords and -ladies of Grizaka’s war council of the merit of a particular conquest target, rich in potential merchandise.\nZealous Xhazobkult shamans quarrelled with courtiers, now accustomed to a pampered existence surrounded by servants; they passionately disputed the proper number of slaves required to be earmarked as sacrifices.\nAll in all, a rather sordid state of affairs, yet glorious empires had been raised from far more humble origins. All that was needed was an iron will to create a lasting legacy, a firm hand to rein in the baser instincts and an ambitious vision to lead the pack into a bright future. And Grizaka? She possessed all of that, and more to spare. Soon, the world would learn to tremble at the mention of her name!"
 flavour_gnollakaz.1.a:0 "All hail Grizaka, Vanquisher-of-Foes!"
 flavour_gnollakaz.1.b:0 "All hail Grizaka, Empress-of-Gnollkind!"

 flavour_gnollakaz.2.t:0 "A Meeting with the Khetarch"
 flavour_gnollakaz.2.1.d:0 "The river glistened in the sunlight; a balmy breeze blew across the water. In the shade of silken canopies on his personal pleasure barque, Khetarch Baqtkhet II silently bemoaned his all-encompassing ennui. It was a perfectly lovely day, with perfectly lovely delicacies fed to him by perfectly lovely attendants while he reclined on a perfectly lovely divan, but so had been the day before, and the day before that.\nImagine his surprise when the tedious routine was interrupted by the unscheduled approach of a supply boat. Aboard were not the expected crates and barrels to resupply the ever-dwindling stock of the barque, but what appeared to be a delegation, with a decidedly more hirsute appearance than he was used to from his usual human devotees. A closer glance revealed them to be gnolls, whose presence seemed to cause some concern amongst his alarmed attendants.\nOne of the gnolls, of proud bearing and richly adorned, swiftly strode forward to stand before Baqtkhet, ignoring all ineffectual attempts to bar [Root.Monarch.GetHerHis] way.\n“I, [Root.Monarch.GetTitle] [Root.Monarch.GetName] stand before you, o mighty Khetarch, to claim what is mine by right of conquest. I request that you recognize my righteous claim to the Stewardship of the Sorrow. For I swear I will raise these lands under your care to heights never before seen if you do so. I solemnly promise to…”\n“Yes, yes, you are certainly grand and mighty and all that, but what about the grapes?”\n“I.. the grapes?!” A look of utter consternation crossed across the gnoll’s mien.\n“Yes! The grapes! I have been expecting a shipment of Bahari grapes for the entire last week! They are my favourite post-nap snack and I am starting to feel well and truly annoyed by their continued absence!”\n“Well... I am sure something can be arranged to expedite the replenishment of your grape stock. As long as a mutually acceptable agreement regarding the Stewardship can be reached. Surely you must recognize that the time of the craven Crodamos has passed and it is time for a new, ambitious Steward!”\nAn expectant silence spread across the pleasure barque, as the Khetarch, after a suitably dramatic pause, languidly waved a hand in disinterested assent: “Whatever you say, new Steward. Just make sure that me and my kin are no longer subjected to such a deplorable lack of amenities. It is simply an unconscionable state of affairs!"
 flavour_gnollakaz.2.2.d:0 "The river glistened in the sunlight; a balmy breeze blew across the water. In the shade of silken canopies on his personal pleasure barque, Khetarch Baqtkhet II silently bemoaned his all-encompassing ennui. It was a perfectly lovely day, with perfectly lovely delicacies fed to him by perfectly lovely attendants while he reclined on a perfectly lovely divan, but so had been the day before, and the day before that.\nImagine his surprise when the tedious routine was interrupted by the unscheduled approach of a supply boat. Aboard were not the expected crates and barrels to resupply the ever-dwindling stock of the barque, but what appeared to be a delegation, with a decidedly more hirsute appearance than he was used to from his usual human devotees. A closer glance revealed them to be gnolls, whose presence seemed to cause some concern amongst his alarmed attendants.\nOne of the gnolls, of proud bearing and richly adorned, swiftly strode forward to stand before Baqtkhet, ignoring all ineffectual attempts to bar [Root.Monarch.GetHerHis] way.\n“I, [Root.Monarch.GetTitle] [Root.Monarch.GetName] stand before you, o mighty Khetarch, to claim what is mine by right of conquest. Bestow the Stewardship of the Sorrow upon me and I swear I will raise these lands under your care to heights never before seen. I solemnly promise to…”\n“Yes, yes, you are certainly grand and mighty and all that, but what about the grapes?”\n“I.. the grapes?!” A look of utter consternation crossed across the gnoll’s mien.\n“Yes! The grapes! I have been expecting a shipment of Bahari grapes for the entire last week! They are my favourite post-nap snack and I am starting to feel well and truly annoyed by their continued absence!”\n“Well... I am sure something can be arranged to expedite the replenishment of your grape stock. As long as a mutually acceptable agreement regarding the Stewardship can be reached. Surely you must recognize that the time of the craven Crodamos has passed and it is time for a new, ambitious Steward!”\nAn expectant silence spread across the pleasure barque, as the Khetarch, after a suitably dramatic pause, languidly waved a hand in disinterested assent: “Whatever you say, new Steward. Just make sure that me and my kin are no longer subjected to such a deplorable lack of amenities. It is simply an unconscionable state of affairs!"
 flavour_gnollakaz.2.a:0 "All hail [Root.Monarch.GetName], Steward of the Sorrow!"

 flavour_gnollakaz.3.t:0 "A True Gnollish Empire"
 flavour_gnollakaz.3.d:0 "The ancient land along the Sorrow, created by Elikhet for his people, has seen more than its fair share of ambitious gnollish invaders. From bloodthirsty Rakhor to the first Xhazobine and the Twin Xhaz, to name just some of the most notorious raiders, many have tainted the waters of the Sorrow with blood over the centuries, taking innumerable Kheteratans from their homes as krah tributes or sacrificial victims.\nYet they all came as opportunistic raiders, demented marauders or savage fanatics, craving the bounty of the river for their own depraved purposes, but never attempting to leave a lasting legacy behind.\nSuch times are over. No longer shall gnollkind be banished to the desert wastelands, destined forever to crave the verdant paradise along the river, yet never truly achieving their heart’s desire, never truly sating their hunger with the cornucopia that is Kheterata. For now, at long last, Grizaka’s audacious vision has come true!\nThe once haughty inhabitants of Kheterata bow to gnollish masters, their fecund lands feed our armies, their tributes fill our vaults. The boastful Ahati, ever so sure in their assumption of victory over our kind, have learned to kneel when their true masters speak, by word or by whip.\nAnd even the Khet, aloof and fickle creatures that they are, have acknowledged our rightful claim of dominion over all the lands along the Mother’s Sorrow and beyond.\nIn the fertile soil of this ancient land, we have planted the seed of a new, a true gnollish empire - destined to stand the test of time. O, what a glorious sight it is to see [Root.Monarch.GetTitle] [Root.Monarch.GetName] firmly seated on [Root.Monarch.GetHerHis] throne, surrounded by innumerable courtiers, priests and dignitaries, all desperately vying for an iota of [Root.Monarch.GetHerHis] fleeting favour. Who is left to challenge [Root.Monarch.GetHerHis] rule? Who would dare to deny the righteous might of [Root.Monarch.GetName]?\nAll that remains to be seen is if the reformers gathered under the banner of Grizaka and her daring yet enticing visions will prevail, and usher in a new era of an enduring harmonious coexistence between gnollish rulers and human servants. Or if the hidebound old guard, those clinging to the old ways of fury, sacrifice and pillage will triumph and subject the inhabitants of fallen Kheterata to an eternity of their depraved desires."
 flavour_gnollakaz.3.a:0 "A new empire requires a new vision for gnollkind - Konolkhatep!"

