 flavour_zena.27.t:0 "Blueprints of Tomorrow"
 flavour_zena.27.d:0 "After the War for Zena, housing demands skyrocketed in Bivuzena. We gathered notes on Vyzemby relics, and while our initial attempts at replicating the stacking of the Ananoma in our domiciles failed, with the assistance of brilliant architect Azaly Stonecarver, we have at last managed to design a stable vertical layout to make use of our limited space.\n\nHowever, with our lands now expanding beyond Bivuzena’s walls and immigrants flocking to our ports, Azaly has proposed a new initiative, which our [Root.Monarch.GetTitle] has eagerly approved: global expeditions to search for unique constructions, materials, and city planning methods to keep Bivuzena at the forefront of architectural design. Whether through diplomacy or espionage, we intend to study the construction secrets of Halann from snow to sand and adapt them to our needs - provided we can secure the necessary materials. Where should Azaly and his apprentices go?"
