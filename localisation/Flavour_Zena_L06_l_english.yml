 flavour_zena.55.t:0 "The Drakons of the Dwarovar"
 flavour_zena.55.d:0 "“My trip into the Dwarovar was a lonely one, for Kiusz had other business to attend to and could not accompany me. I’d heard tales of the beasts within the caverns of the Serpentspine in my travels to Bulwar, but the one that I felt would’ve been most exciting was the drakon. Long, slender beasts with the ability to climb walls and occasionally breathe fire would certainly be a hit at the Menagerie. The Skewered Drake clan were the most well-known of the drakon-riders, having bred and tamed them within the Hold of Gor Vazumbrog.\n\nMy first attempt, as always, was diplomacy. The orcish drakon-riders did not take my queries about taking one of their mounts for myself well, and my propensity for battle was tested. As was my even stronger propensity for running away from unwinnable odds. I thought all hope was lost, and I would have to settle for a giant spider until I happened to meet a strangely cheerful kobold with dark red scales who offered me assistance in my search for a wild drakon. She was looking for artifacts that could help her revive her dead God, and it seemed as though we would both get further working together than continuing on our own.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 4"
 flavour_zena.55.a:0 "Dangerous creatures are dangerous. Who knew?"
 flavour_zena.62.t:0 "The Hunt"
 flavour_zena.62.d:0 "“The little kobold had more guts than I did. Rather than lie in wait for a wild drakon to be sleeping, she simply threw a rock at one to agitate it. The creature was faster than we could’ve imagined, and quickly our hunt turned to, once more, a retreat. The caverns of the Serpentspine are difficult to navigate at the best of times, let alone when one is attempting to escape the talons of a ceiling-crawling creature happy to rend you limb from limb.\n\nThus, I didn’t blame her for leading us into what I believed to be a dead end. As I heard the clack of the talons against the stone wall, I brought my head against the wall and made a fist, brought it to my heart, and moved it in a small circle, thinking of my partner who might never know what had happened to me. “End of the road.” I whispered.\n\n“But, not the end of the line!” The kobold quipped, standing proud as the drakon rushed towards us. The beast stomped on a pressure plate, and a metal-reinforced net swung down from the ceiling, pinning it instantly. I stood agape, then quickly applied the sleeping tonic. As I left her with the Drakon in tow, I wished her luck reviving her red dragon, Nimrith\n\n“Thanks! If we do it, I’ll make sure you’re the first to know!”\n\nI doubt she intended that to be as terrifying as it sounded.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 4"
 flavour_zena.62.a:0 "At least the Serpentspine is pretty far from Horashesh…"
