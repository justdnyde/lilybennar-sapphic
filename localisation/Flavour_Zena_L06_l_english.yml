 flavour_zena.11.t:0 "Sunshine Manors"
 flavour_zena.11.d:0 "There are many who believe Bulwar to be an arid land filled with nothing but dry plains and deserts. However, this does not tell the entire tale of this ancient land. Within Bulwar are some of the most verdant plains and fertile farmlands found in all of Halcann. The Sunshine Manors of the Sun Elven nobility control vast swathes of this farmland, and are veritable palaces surrounded by vast gardens and filled with exquisite works of art. It would be quite beneficial to acquire a sample of the artistic tradition born from the marriage of Bulwari, Halessi, and Sun Elven techniques to exhibit within Medaka’s Exceptional Treasures, granting us legitimacy in the eyes of our far neighbors to the north."
 flavour_zena.11.a:0 "We can purchase whatever we need."

 flavour_zena.12.t:0 "The Statues of the Sun Elves"
 flavour_zena.12.d:0 "Our curators have travelled to one of the Sunshine Manors in Sareyand, interested in seeing which striking piece of art would be most desirable to add to Medaka’s Exceptional Treasures. Immediately, their eyes are drawn to the statues within the Sunshine Manor. Expertly crafted out of marble, many depict Sun Elves in moments of triumph or contemplation. Statues of Jaher ta'Diranhriá are most common, and one of him kneeling in contemplation was from a story we people of [Root.GetName] knew well from our former Kheteratan overlord. It was said that Jaher, who could not just be offered the Stewardship, was willing to trade all the sand on a beach for it. Of course, the veracity of that story is dubious, but it does track with the inept governance of the Khetarchs. This statue would certainly make a wonderful addition to the museum."
 flavour_zena.12.a:0 "Purchase it."
 flavour_zena.12.c:0 "Perhaps an acquisition for another time."
 zena_sunshine_manor_statue:0 "Sunshine Manor Statue"

 flavour_zena.13.t:0 "The Amadian Lake"
 flavour_zena.13.d:0 "The people around the grand amadian lake Chakantu beyond the Effelai jungle are hospitable and kind, with scarred bodies and an innate magical talent that they must suppress for fear of the wild and unpredictable effects their magic can cause – a curse, or gift, they carry ever since the Day of Ashen Skies and which they see as coming from the fragmentation of their great god of time, Ñawsayachaer. Azaly Stonecarver, [Root.GetName]’s most prominent architect, has made plans to travel there to study their dams, as they have developed a mastery of hydrotechnical engineering in order to farm the snowless mountain slopes, and built great levees and floating gardens to draw sustenance from lake Chakantu. He hopes to bring this advanced knowledge back to Zena, and potentially have an exhibit in Medaka’s Exceptional Treasures to teach children about the scientific advances of the people of the Onisqado Confederation."
 flavour_zena.13.a:0 "He can surely pay for such precious knowledge."

 flavour_zena.14.t:0 "Prismatic Damestear"
 flavour_zena.14.d:0 "Azaly arrived in Amadia, and what he found was far more fascinating than mere hydrotechnical advances. Translucent, pale blue, or pale pink opals that refract the light are found in abundance in Amadia, a kind of Damestear, but more. Prismatic Damestear it is called, which could be used as a source of Wild Magic. It is thought to have been created after absorbing the energies from the mages who protected themselves from the Day of Ashen Skies. Its brilliant colours and potential research applications have left Azaly eager for a sample, although the amadians are anxious about the potential dangers of giving it away to outsiders who may not be aware of the risk – and even more anxious about drawing additional attention to their homeland’s riches, already coveted by far too many."
 flavour_zena.14.a:0 "Surely there is something that we can trade in exchange?"
 flavour_zena.14.c:0 "We can always come back later."
 zena_prismatic_damestear:0 "Prismatic Damestear"

 flavour_zena.15.t:0 "The Craftsmen of the Ynn"
 flavour_zena.15.d:0 "In the northwest reaches of the Ynn river lies the region of Rzenta, a cultural melting pot of Old Rzentan culture and the scions of the Vareynn Empire. While rightfully famed for their skill as fur trappers, another precious commodity comes out of these lands thanks to the skill of Rzentan craftsmen: stained glass. Stained glass from Pomvasonn adorns temples and churches up and down the river. We have reached out to a [zena_ynnic_glass_holder.GetAdjective] artist to create a piece that represents the Ynn for an exhibit in Medaka’s Exceptional Treasures, and will sail to [zena_ynnic_glass_province.GetName] in several years to acquire it."
 flavour_zena.15.a:0 "We shall begin saving up for the purchase."

 flavour_zena.16.t:0 "Ynnic Stained Glass"
 flavour_zena.16.d:0 "We have travelled to Rzenta to acquire the stained glass piece that we commissioned several years prior. As expected, it is truly beautiful. The Ynn is represented with brilliant blue shards, the Cliffs of Ruin cutting across it in gray. To the east, the autumnal forests of the Cursed Ones are represented in orange and reds, and in the west, green grass and brown sands mirror the Epednan Expanse. It is a gorgeous piece, and will surely be well received within Medaka’s Exceptional Treasures!"
 flavour_zena.16.a:0 "Pay the artist their due!"
 flavour_zena.16.c:0 "The artist seems saddened to lose it. We will simply come back later."
 zena_ynnic_glass:0 "Ynnic Stained Glass"

 flavour_zena.17.t:0 "Calasandur the Magnificent"
 flavour_zena.17.d:0 "Calasandur was known as one of the greatest builders and craftsmen of his time. He founded the House of Silcalas, and built the three masterwork elven castles of Aelcandar, Escandar and Calascandar. While Azaly Stonecarver, our most prominent Vyzemby architect, grumbles that he was a hack and that the Cannorian ‘masterpieces’ do not even remotely compare to the halfling Ananomas or lizardfolk spires in Sarhal, we have it on good authority that several of his old blueprints have been uncovered. These blueprints could be a wonderful addition to Medaka’s Exceptional Treasures."
 flavour_zena.17.a:0 "We can attempt to purchase some blueprints they are finished with."

 flavour_zena.18.t:0 "Calasandur’s Legacy"
 flavour_zena.18.d:0 "We have arrived in [zena_calasandur_excerpt_holder.GetName], ready to view these famed blueprints. After making sure that we were not agents of their enemies, intent on probing for weaknesses, they allowed us to look. The splendour of Calasandur’s work was evident on the pages, and they contained several improvements that we could adapt for the sake of Bivuzena. Slyly, we have queried if there are any blueprints they are either uninterested in or finished with, to see if we can hold them in our museum for a time before returning them."
 flavour_zena.18.a:0 "A steep price, but we will pay."
 flavour_zena.18.c:0 "We may return when they have finished with all of them."
 zena_calasandur_excerpt:0 "Excerpt From Calasandur's Archives"

 flavour_zena.19.t:0 "Ovdal Lodhum"
 flavour_zena.19.d:0 "Azaly Stonecarver, our most prominent architect and researcher, is an ardent admirer of the Dwarven Holds. He has travelled to the hold of Ovdal Lodhum, to inspect their pitch-rigged railways, partake in their wine, and study their archives of romantic poems and songs, finding inspiration for our griots. One of his most startling discoveries was the fact that the glowing stones of Ovdal Lodhum were no mere tale. He has since begun to study their nature more extensively."
 flavour_zena.19.a:0 "How fascinating."

 flavour_zena.20.t:0 "Glowing Garnets"
 flavour_zena.20.d:0 "The glowing gems of Ovdal Lodhum are unique. Stories say that they were once broken in halves, and paired between spouses and lovers to symbolize their enduring bond. But they can also be set to more utilitarian purposes, placed in lanterns as sources of light within the tunnels of the Dwarovar. Azaly Stonecarver is interested in acquiring a sample for Medaka’s Exceptional Initiative, and potentially researching and replicating the glowing effect on the streets of Bivuzena."
 flavour_zena.20.a:0 "We will purchase a gem from the honourable [zena_glowing_stone_holder.Monarch.GetName]."
 flavour_zena.20.c:0 "Azaly will have to return at another time."
 zena_glowing_stone:0 "Glowing Stones of Ovdal Lodhum"

 flavour_zena.21.t:0 "The Irdukhuga School"
 flavour_zena.21.d:0 "There are many misconceptions about centaur society. One of the most persistent ones is that the sole focus of their existence is vengeance, death, and battle. While there are some that believe that, notably those of the Filustkhuga sect, the centaurs are varied and diverse. One such sect that diverges from this stereotype is the Irdukhuga Sect, emerging roughly 800 years ago during the rule of the Egoirlust Caehnate. They focus on honouring Irdaeos’ Gift by enjoying life’s pleasures and partaking in hospitality, kindness, and virtue. One of Azaly Stonecarver’s apprentices, a mage and musician by trade, has travelled to [zena_fp_music_holder.GetName] and is studying with them for the moment."
 flavour_zena.21.a:0 "We shall fund her excursion."

 flavour_zena.22.t:0 "A Unique Music Box"
 flavour_zena.22.d:0 "Azaly’s apprentice has spent the last year studying with the centaurs, and has crafted a magnificent gift. Working with the mages of [zena_fp_music_holder.GetName], she has developed a music box, capable of playing a recording of a song that she has learned on the steppes. With instruments made from animals and their natural gifts, the centaurs have fashioned a rousing ballad filled with throat singing and the percussive thundering of hooves. While she desires to remain with the centaurs for the moment, Azaly’s apprentice has offered this unique piece for Medaka’s Exceptional Treasures - in return for the funds needed to extend her stay on the steppes."
 flavour_zena.22.a:0 "Well done!"
 flavour_zena.22.c:0 "We may be interested at a later time."
 zena_fp_music:0 "Irdukhugan Music Box"

 flavour_zena.23.t:0 "The Dangers of the Lone Lotus Seat"
 flavour_zena.23.d:0 "Deep within Haless lie the glistening sands of the Rünsukhi plateau. Home to Facestealers, evil and dangerous spirits, the Ashwoven Harimari were trapped there amongst the Rünsukhi people due to a war between the Kingdoms of Guwaamud and Lianzhou in 282 AA. However, in their many years of involuntary exile they have managed to ward off the malign spirits of the land due to the use of spiritfire. If we are to visit the plateau, it might be worth having their protection."
 flavour_zena.23.a:0 "We may need to purchase protection for safe passage."

 flavour_zena.24.t:0 "The Heaven’s Beads"
 flavour_zena.24.d:0 "We have learned through our expedition to the Rünsukhi plateau that the Divine Agate, which was formerly mined there for jewelry and meagre decor, has special properties. Capable of storing and releasing chi, sufficiently empowered agate can offer effective protection against the adverse spirits of the plateau when worn. Amidst the treacherous wastes of Gozengun, these gems have been crafted into charms known as Tian Zhu, and are a popular source of protection. When sufficiently infused with power, they even glow with a soft orange gleam, making them a wonderful exhibit at Medaka’s Exceptional Treasures."
 flavour_zena.24.a:0 "We shall commission an expertly crafted bracelet."
 flavour_zena.24.c:0 "We will return once we have attained balance."
 zena_haless_tian_zhu:0 "Tian Zhu"

 flavour_zena.25.t:0 "The Central Plateau"
 flavour_zena.25.d:0 "The fall of the stormwall has revealed many wonderful and frightful new vistas for us to explore. One of the most mysterious destinations is the Central Insyaan Plateau, mostly due to the high elevation and ecology incapable of sustaining hinuifauna or holohana long-term, making it relatively safe compared to the rest of the continent’s interior. The many Precursor artifacts and ruins within Insyaa are the primary goal of our expeditions, for hidden within them surely must be many unique artifacts to add to Medaka’s Exceptional Treasures."
 flavour_zena.25.a:0 "If the locals have anything interesting to offer, we will pay our way."

 flavour_zena.26.t:0 "The Spiral Darts"
 flavour_zena.26.d:0 "It was a surprise when one of the most interesting relics we found was not a Precursor artifact, but a new invention born from Insyaan ingenuity. Developed by a team of kobolds and ogres, the Sirimadsik Spiral Darts are a novel weapon, designed primarily to be used against mechanim, although equally dangerous to biological targets. Crafted with a spiral design etched in evocation glyphs, when they make contact with a target, the enchantments activate and cause a small explosion. Although the people of the Plateau have vowed not to use the darts unless confronted with an extreme threat, they would be willing to allow us to have a single dart with the enchantments disarmed."
 flavour_zena.26.a:0 "The weapons of another place are always interesting!"
 flavour_zena.26.c:0 "Explosions? Take more time to disable the enchantments, please."
 zena_insyaa_spiral_dart:0 "Sirimad Spiral-Darts"

