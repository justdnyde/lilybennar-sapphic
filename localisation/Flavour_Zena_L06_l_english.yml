 flavour_zena.56.t:0 "Tlalusks of Yyl Möitsä"
 flavour_zena.56.d:0 "“Kiusz made it damn clear that he wasn’t happy about going back north, and I agreed with him. The forests above the Ogre Valley are cold, desolate, and entirely inhospitable. Now, the few locals that live there believe that spirits inhabit everything in the forest, from rocks to trees. I can’t imagine the tree spirits feeling too good when they get ripped in half by a Tlalusk - giant wooly nightmares, nearly fifteen feet tall and with six legs.\n\nSimilar to the elephants back home but far more ornery, they graze on lichens and shrubs for sustenance. Getting in their way is a good way to get impaled by their tusks, and that’s if you survive the roar, which can rupture eardrums and knock a grown man flat on his ass. Best of all? Damn roar alerts every Tlalusk for miles to come in and help their friend. So we knew we were gonna have to pull out all the stops on this one.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 9."
 flavour_zena.56.a:0 "These things could even sate an ogre’s hunger!"
 flavour_zena.63.t:0 "The Wylderwood Firbolgs"
 flavour_zena.63.d:0 "“As you know, I ain’t above calling in a favor or trying to fish for help when I required it, which was sorely needed here. Kiusz, for once, agreed with me instead of being an obstinate bastard, which I could just about kiss him for. So we went to the Kukatodic peoples and asked around, trying to figure out the best way to get some of the prize pachyderm for ourselves. Ideally alive, so we could show ‘em off at the Menagerie.\n\nThey told us of some nearby giantkin, which to me sounded like more trouble than it was worth. But apparently these guys, the Wylderwood Firbolgs, were nice enough neighbors and lived in harmony with nature. Their druids’ power could help us tame the beasts. Anyway, we went to them - three meter high blue-skinned, elf-like figures. I tried my best not to need a change of pants, and we bartered some of Bivuzena’s famed blue roses; given that they were sourced from a fey portal somewhere else, I think they reminded them of the fey they were close to. They eventually agreed to help us ensnare two beasts, and offered to trade more interesting and dangerous local megafauna if we came back with better trades.\n\nKiusz kindly let them know that anything more dangerous would probably scare the children, and we went on our way with two big wooly beasts in tow. Led the creatures back through the Serpent’s Pass to Bivuzena, Azaly constructed a soundproof barrier for the enclosure, and voila. Big, six-legged wooly assholes were now friendly exhibits. Everyone goes home happy.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 9."
 flavour_zena.63.a:0 "A genuine mammoth for the menagerie. Fascinating."
