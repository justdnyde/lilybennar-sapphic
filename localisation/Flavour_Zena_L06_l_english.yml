 flavour_zena.57.t:0 "The Terror-Birds of Shuvüüshdi"
 flavour_zena.57.d:0 "“The first time I saw one of the damn birds, I nearly passed out. With thicker legs than a bull, brown-bronze feathers, and a massive white plume, the thing was nearly my height, and Kiusz was only barely taller. Even more terrifying was the rider atop it, brandishing a bow and yelling at us.\n\nIt took some explaining, but eventually cooler heads prevailed and we calmed him down. Explained our situation here in the steppes. We had gotten off the boat in Onman looking for some of the unique creatures rumored to roam across the northern continent and I quickly found one. Of course, the Yomod Rüsh, those that maintain and breed the birds, weren’t going to let go of their prize mounts easily…”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 7."
 flavour_zena.57.a:0 "Big bird!"
 flavour_zena.64.t:0 "A Small Favor for a Big Bird"
 flavour_zena.64.d:0 "“My first thought was to just nab a wild one, but that plan was dashed immediately. Apparently they’re some sort of invasive species, not meant to be here, and get out-competed by the local wildlife something fierce without the protection of the Shuvüüsh. Worse, their eggs need the heat of a massive bonfire to hatch, and on the treeless steppes, firewood is more precious than gold, since they don’t occur naturally in the cold climate.\n\nWell, in Horashesh and the nearby Fangaula, we’ve got plenty of wood. So Kiusz and I made some promises, greased some palms, and sailed back to Bivuzena. When we returned with our cargo full of timber, to help them with their breeding, they were ecstatic. Rewarding us for our efforts, they gifted us several birds, female only, for apparently male birds are a big deal to these folks. We can always come back with more gifts, though. They were well-trained, meaning we could easily set up an exhibit at the Menagerie where we let kids ride ‘em, I thought. Apparently [Root.Monarch.GetName] thought that was ‘too risky’ and ‘children would get injured.’ Still fuming about that one.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 7."
 flavour_zena.64.a:0 "They did do terror-bird riding shows, however."
