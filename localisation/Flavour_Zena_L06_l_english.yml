 flavour_zena.32.t:0 "Lessons of the Aksa Sanuyego"
 flavour_zena.32.d:0 "In Haless, many of the legacies of the Sun Elves have been left crumbling and forgotten, weathered relics of the eternal wax and wane of empires. But rising tall within a natural harbor on the western tip of the Lupulan Rainforest lies the great naval fortress of Aksa Sanuyego. Also known as the Citadel of the Flaming Leaf, this great citadel was the primary anchor point for maritime  trade in the eastern Phoenix Empire, its construction ordered by Jaher himself.\n\nBut the old Phoenix Empire is no more, and Azaly has petitioned the new owners to study the citadel. Refurbished by the current holders after centuries of habitation, the fortress is built bordering the jungle on one side, and the sea on the other - much like Bivuzena itself. It contains a massive naval infrastructure but is designed with a narrow, defensible front against land attacks. If it is possible to use this construction to enhance Bivuzena’s walls, as well as guide the construction of new jungle settlements that border the sea, it would be an enormous boon. Several Kelino artisans, who had assisted in restoring the citadel to a state that would make Jaher himself proud, have travelled to Bivuzena with Azaly to assist with our planned modifications."
 flavour_zena.32.a:0 "This will help secure our trade dominance!"
 zena_aksa_tt:0 "Up to §Y5§! random owned or subject §YCoastal§! provinces with §YJungle§! terrain gain:"
 zena_aksa_trigger_tt:0 "Any known country:\n Has the Great Project §YAksa Sanuyego§! at §YNoteworthy§! or above\n One of the following must be true:\n    The primary culture is in the §YKelino§! culture group!\n   Any member of the §YKelino§! culture group is an accepted culture\n   Any owned province:\n     The culture is in the §YKelino§! culture group"

 flavour_zena.33.t:0 "Grombari Glassworks"
 flavour_zena.33.d:0 "When the gray orcs of Grombar left the Serpentspine and began to settle the surface, they faced different challenges than their green kin, being both fewer in number and faced with a more hostile environment. In order to surmount them, they mingled more readily with the locals than their kin in Escann. As their power in the region grew, state incentives and the promise of dynastic alliances encouraged human nobles to take orcish wives and husbands as a sign of loyalty to the Warlord Brasûr Frozenmaw, leading to a new generation of half-orcish children. With the combination of rugged Gerudian ingenuity and orcish discipline, Grombar saw rapid developments in architectural utility and aesthetics.\n\nWhile initially visiting to learn of the resource-efficient Tarugs of the northern pass, fortified settlements in arctic conditions, Azaly was instead enamored by something else: The Grombari Glassworks. Utilizing several large sand deposits likely left by ancient glaciers, the Grombari people are one of the prime exporters of glass within Cannor - capable of casting incredible sculptures and weather-resistant structures in their foundries. Azaly has recruited prominent glass-blowers to join him on his return to Bivuzena, intent on creating public works for our streets. Several Grombari soldiers have also accompanied their artisans for protection and to test their mettle against the jungles of Sarhal."
 flavour_zena.33.a:0 "Their strength, bravery, and skill will be a boon to [Root.GetName]."
 zena_glass_tt:0 "Every owned or subject province that produces §YGlass§! gains:"
 zena_glass_trigger_tt:0 "Any known country:\n One of the following must be true:\n    The primary culture is §YGray Orc§!, §YGrombari Orc§! or §YGrombari Half-Orc§!\n   §YGray Orc§!, §YGrombari Orc§! or §YGrombari Half-Orc§! are accepted cultures"

 flavour_zena.34.t:0 "The Dwarven Holds"
 flavour_zena.34.d:0 "The ancient dwarves have fashioned many marvels of engineering, but to Azaly, none compare to the Holds. Dug deep into the mountains, these fortified metropolises took millennia to complete, requiring complex ventilation, water distribution, and waste removal systems to support populations in the millions. Each hold extends many levels down, like several cities stacked upon one another, with every deepening layer costing exponentially more to construct and maintain - a cost offset only by the veins of precious minerals found deep within the Serpentspine.\n\nThere is little that impresses Azaly Stonecarver, a scholar of the Ananoma. Yet the Holds have always been of particular interest to him. Bivuzena’s horizontal limits have always challenged us to build up, but has anyone ever thought to build down? Visiting [zena_hold_true.Owner.GetName], Azaly took extensive notes on structural integrity and discussed with the [zena_hold_true.Owner.GetAdjective] engineers how they could adapt similar designs within the root-thick jungle soil of Horashesh. He returned with a gleam in his eye and a retinue of eager [zena_hold_true.Owner.GetRacialAdminAdjective] apprentices, ready to expand Bivuzena downwards and revolutionize the mines of [Root.GetName]."
 flavour_zena.34.a:0 "Rock and stone!"
 zena_hold_tt:0 "Up to §Y5§! random owned or subject provinces that produce §YIron§!, §YMithril§!, §YCoal§!, or §YGems§! gain:"
 zena_hold_trigger_tt:0 "Any known country:\n Has a §YSurface Hold§! or §YDwarven Hold§! of at least dig level 3: Cavernous Hold"

 flavour_zena.35.t:0 "Harpy Roosts"
 flavour_zena.35.d:0 "Near the peaks of some of Halann’s highest mountains, one can find the Roosts. The traditional capitals of a region’s harpy flocks, they are a large collection of nests, with small-scale artisan shops, minor trading stations, gardens, public parks, and baths. Functionally cities atop the world, they are protected from invasion by the sheer verticality of the cliffs and the harpies' natural ability for flight.\n\nAzaly’s interest in the roosts began after considering the amount of wasted space on the rooftops of Bivuzena. If harpy society could create entire civilizations atop mountains, surely his architectural genius could manage a neighborhood atop the city skyline. While the specific materials and methods of construction were not viable for his purposes, he still sought out the Riaveltu of [zena_harpy_capital_true.Owner.GetName] and travelled to the roost. Listening to the wisdom of their ancestors, he began to understand their philosophy of freedom and the wind. Mercurial as always, several harpies returned with him, curious to see the wonders of Bivuzena and if Azaly would manage to capture the feeling of the open air within a city of walls. [Root.Monarch.GetName] has offered them residence within the mountainous areas of [Root.GetName] if they so desire."
 flavour_zena.35.a:0 "Their wings and songs will fill the sky."
 zena_harpy_tt:0 "Up to §Y3§! random owned or subject provinces with §YMountains§!, §YHighlands§!, or §YHills§! terrain gain:"
 zena_harpy_trigger_tt:0 "Any known country:\n One of the following must be true:\n   All of the following must be true:\n     Has §YHarpy Administration§! and at least §Y1§! §YRoost§!\n   Is @F62 Duwarkani"

 flavour_zena.36.t:0 "Kobold Ceiling Camps"
 flavour_zena.36.d:0 "Within the winding tunnels of the Serpentspine, any advantage one can amass is worth its weight in gold. Space is at a premium, and a safe space where one can sleep even more so, as the floors of the caverns are crawling with minotaurs, ettins, orcs and worse. The Darkscale Kobolds, pushed to the fringes of the Serpentspine after the death of their dragon god Nimrith, have mastered the ability to build into the ceilings, with winding towns and camps built upside-down between the thick stalactites of the caverns, invisible to the monsters below.\n\nFacing Bivuzena’s crowding, Azaly believes that these methods could be replicated in the narrow alleyways between buildings. Having arrived with a gift for their meagre hoard, the naturally distrustful kobolds gladly invited him into their camp, as they believe that once Nimrith’s hoard has grown enough, he will return to the world of the living to guide them once more. Over a dinner of cavern mushrooms, Azaly studied and discussed how they anchor their belongings to the stone and traverse the ceiling with ease. With said knowledge obtained, Azaly bid his hosts farewell and returned to Bivuzena, alongside a retinue of Darkscales who are eager to see the world and scour it to bring back wealth to the hoard. Azaly drily mentions to the guards to watch them particularly carefully within Medaka’s Exceptional Treasures, before beginning to draw up plans for hanging shops and suspension-apartments in the alleyways of the Nyanza Market."
 flavour_zena.36.a:0 "There is much to learn from their asymmetrical constructions."
 zena_ceiling_trigger_tt:0 "Any known country:\n One of the following must be true:\n    The primary culture is §YDarkscale Kobold§!\n   §YDarkscale Kobold§! is an accepted culture\n   Any owned province:\n     The culture is §YDarkscale Kobold§!"
 zena_kobold_traps_lvl_3: "Kobold Traps: Massive (3)"
 zena_kobold_traps_lvl_3_desc: "A fireball explodes from a pinprick embrasure. Poisonous gases are pumped in by metal pipes and draconic sorcerers. The kobold defenses grow."
 zena_kobold_traps_lvl_4: "Kobold Traps: Labyrinthine (4)"
 zena_kobold_traps_lvl_4_desc: "Drakes prowl the perimeter, searching for their quarry. Camouflaged batteries hide kobolds behind every corner. The province is run as a defensive machine, and all attackers shall fall before its might."

 flavour_zena.37.t:0 "Charkuchin Citadels"
 flavour_zena.37.d:0 "The Great Insyaan Range is the second largest mountain range on Halann, dwarfed only by the mighty Serpentspine; it is theorized to contain a graveyard of Precursor facilities shattered by the Day of Ashen Skies. It is believed to have been wracked by numerous volcanic eruptions during the cataclysm, causing several of these facilities to break open, and the kobolds inside to be set free. Unfortunately, freedom does not equal safety in the wilds of Insyaa, and the kobolds were quickly routed back to their broken homes by the predatory carnivorous hinuibirds that hunt along the range.\n\nThe fall of the stormwall has opened this continent to Azaly’s apprentices. Initially planned as a venture to learn more about the architecture of the Precursors, the improvements to their mountain homes that the kobolds have made quickly caught the eye of the group, and they spent the rest of the trip focusing on these instead. Using a combination of kobold ingenuity and engineering and magical geomancy, the kobolds had built the facilities upward into the mountainside, creating highly dense, fortified and urbanised citadel-cities. This was necessary because the underground containment and research wings were no longer habitable. In order to communicate without the threat of being picked off by carnivorous birds, they have developed a series of magic-infused smoke signals to communicate and mark safe trails. Azaly’s apprentices believe they can adapt these for use within Bivuzena’s dense cityscape, allowing the government to quickly disseminate information to the citizens. Several Charkuchin Kobolds joined the trip back, both to safely guide the apprentice expedition back to the shore of the Yanacotle where their boats were docked, but also because they were eager to experience a life where birds do not eat people. Upon arrival in Bivuzena, they have been overheard remarking that compared to the fauna of their homeland, they find the selection within Medaka’s Magnificent Menagerie quite tame."
 flavour_zena.37.a:0 "The apprentices only got almost eaten three times!"
 zena_citadel_tt:0 "Every owned or subject province that produces §YPrecursor Relics§! gains:"
 zena_citadels_trigger_tt:0 "Any known country:\n Owns a §YCharkuchin Citadel§! - §Y[6474.GetName]§!, §Y[6443.GetName]§!, §Y[6455.GetName]§!, §Y[6394.GetName]§!, §Y[6425.GetName]§!, §Y[6380.GetName]§!, OR §Y[6345.GetName]§!"

 flavour_zena.38.t:0 "Gene Pillar Studies"
 flavour_zena.38.d:0 "The fall of the stormwall has revealed not only a vast new continent, but also a new people unlike any we have encountered before. The mechanim, believed to be originally built by the Precursors as a labor caste, had been dormant for untold centuries before being awakened several hundred years ago by the passing of the Oracle’s Eye Comet. Beings made of metal, they tell us that they were cast out by the Precursors after gaining sentience, abandoned by their creators. Given the disappearance of the Precursors, they are now the de facto authority on the Gene PIllars, vast facilities that stretch over a kilometer into the sky. These are veritable troves of Precursor artifacts, full of ancient designs and research experiments.\n\nAzaly’s brightest apprentices have been sent to explore the Gene Pillar in [zena_gene_pillar_province_true.GetName], accompanied by several mechanim guides paid in damestear. Their goal: to study the ancient internal teleportation network that has been used to traverse the nearly unnavigable structures and see if they could determine how to replicate it within Bivuzena. Battling ancient defense systems gone haywire, they gathered notes, studied glyphs, and returned to Bivuzena with several mechanim eager to assist with their research. While the specifics of the full network have yet to be uncovered, small-scale temporary teleportation gates powered by mages have been successfully tested - a step in the right direction. The mechanim who returned with the apprentices have integrated well into the city, and several of their poetry pieces are proudly displayed within Medaka’s Exceptional Treasures."
 flavour_zena.38.a:0 "It is a shame so many of their kin were destroyed."
 zena_gene_pillar_tt:0 "Every owned or subject province with a §YMage Tower§! gains:"
 zena_gene_pillar_trigger_tt:0 "Any known country:\n Owns a §YGene Pillar§! - §Y[3415.GetName]§!, §Y[3376.GetName]§!, §Y[3551.GetName]§!, §Y[6962.GetName]§!, §Y[6386.GetName]§!, §Y[3329.GetName]§!, §Y[6950.GetName]§!, §Y[3153.GetName]§!, OR §Y[3173.GetName]§!"

 flavour_zena.39.t:0 "Underwater Oshikogo"
 flavour_zena.39.d:0 "The merfolk of Sarhal are easily recognized by their half-humanoid, half-fish bodies. From the waist down, merfolk possess long fish-like tails that allow for unrivaled swift movement underwater. They also possess gills that give them the ability to live and thrive in subaquatic environments, while also retaining lungs that allow them to breathe air, though their ability to move beyond the sea is severely hampered due to their skin requiring constant rehydration.\n\nBivuzena’s position on the Horashesh coast offers an unorthodox solution to our overcrowding: the sea. Merfolk civilizations are experts in subaquatic architecture, with a penchant for intricately designed architecture. Unfortunately, the merfolk are quite standoffish, having little regard for outsiders.\n\nAzaly Stonecarver, however, has never let a "Keep Out" sign stop him. The brilliant scholar dedicated a year to study with the Baashidi merfolk experts, and learned the merfolk language of Oshiloka. Taking a breathing apparatus, he then dived down into one of the merfolk kingdoms, and learned of their damestear powered pillars and domes, known as Oshikogo, which enhanced the security and stability of merfolk settlements without requiring constant efforts from their mages. He joined forces with a merfolk scientist to propose an inversion of the process, creating a section of Bivuzena that despite being above ground, was entirely underwater, with airlocks allowing passage to the rest of the Nyanza Market. Meanwhile, the traditional Oshikogo were used to develop a new, smaller settlement off the coast of Bivuzena, with the domes intentionally designed to crest the sea-level in such a manner that they could be built upon for the air-breathing inhabitants of the city. Thus, a two-tiered district was created, a unique society where land and sea mingle freely through Azaly’s glass and stone."
 flavour_zena.39.a:0 "Wouldn't they love, love to explore that world up above?"
 zena_merfolk_trigger_tt:0 "Either own or have a subject that owns OR Any known country:\n Any owned province:\n    Has any §YOffcoast Merfolk Settlement§!"

 flavour_zena.40.t:0 "Oni Shirgrii"
 flavour_zena.40.d:0 "The Oni of Haless are feared by their neighbors, due to the fell chi rites that they perform to survive. Their society is organised around four Shirgrii, ancient monastic fortresses and libraries, home to the Oni castes of scholars, monks, and warriors. These citadels are home to immense knowledge, and it is said that their walls once held back even the Precursors.\n\nAzaly, long disappointed by the woeful state of the municipal library in Bivuzena, has travelled to the Demon Hills to see the Shirgrii for himself. While bristling at only being allowed access to a small selection of the grand temple in [Province.GetName], his genuine appreciation for the Oni’s immense scholarship and knowledge has gained him some favour, and he has drawn up several notes on how the academic structures in Bivuzena could be improved. He has also convinced several Oni scholars and mages to return with him, in order to teach classes to aspiring academics, in return for steering trade their way to keep them safe from the Hobgoblin Command, the Shuvüüshudi tribes, and the lords of Bianfang."
 flavour_zena.40.a:0 "If only we could learn all their knowledge."
 zena_oni_tt:0 "Every owned or subject province that produces §YDamestear§! gains:"
 zena_oni_trigger_tt:0 "Any known country:\n Any owned province is one of the four starting §YShirgrii§! - §Y[4831.GetName]§!, §Y[5430.GetName]§!, §Y[4828.GetName]§!, OR §Y[4829.GetName]§!\n One of the following must be true:\n    §YHorned Ogre§! is an accepted culture\n    Primary culture is §YHorned Ogre§!"

 flavour_zena.41.t:0 "Mirror the Everglow Halls"
 flavour_zena.41.d:0 "The Everglow Halls within Elynáile are the location of the first steps of elven unity, undertaken when the Wood Elven clans formed the Verdant Pact in response to the Greentide. Within its Luminous Archive many chronicles of Wood Elven history and knowledge can be found. Built upon the shores of the Silent Lake in the Deepwoods, it stands as a shining beacon of elven unity and a treasure trove of research.\n\nAzaly does not travel to Elynáile to study their tomes and scrolls, however. What he is interested in is the eponymous Halls themselves. The name ‘Everglow’ was given due to the affixture of the vayt-bulbs that were plucked and grafted into the walls, coaxed carefully to glow brightly at all times. He spent countless hours in discussion with prominent elven botanists and fey researchers on how to care for the plants within a different climate, and how to best create a familiarity to the fey-linked woods, given the proximity of much of Sarhal to other planes. Upon his return, he put his theories into practice within Medaka’s Exceptional Treasures, with several wood elven rangers accompanying him to ensure that nothing dangerous from the feyrealm crossed over when he lit up the museum. He is currently planning on expanding the vayt-bulb network throughout the city."
 flavour_zena.41.a:0 "Bivuzena, see how she gleams!"
 zena_everglow_tt:0 "Up to §Y5§! random owned or subject provinces that produce §YPaper§! or §YSilk§! gain:"
 zena_everglow_trigger_tt:0 "Any known country:\n Owns §Y[3004.GetName]§!\n One of the following must be true:\n    §YWood Elf§! is an accepted culture\n    Primary culture is §YWood Elf§!"

 flavour_zena.42.t:0 "Silkstone Construction"
 flavour_zena.42.d:0 "Deep in the Serpentspine, the Spiderwretch goblins have carved out a niche by mastering the arachnid beasts they ride. From the massive spiders they mount, they harvest silk to create armor, venom, and, most surprisingly, pavement.\n\nThis was news to Azaly, who happened upon a batch of Spidersilk Crawlers as he was searching for dwarven holds near the Ogre Valley. Accompanying them to their camp, he marvelled at their paved roads, created by binding stones with web-silk. Hard and durable but soft on the feet, he has returned with several of the goblin’s premier weavers to see if they can replicate this with other silks to pave the streets of Bivuzena, knowing that the people may be less than enthused about walking on spiderwebs."
 flavour_zena.42.a:0 "As strong as stone, but as soft as clouds!"
 zena_silkstone_tt:0 "Every owned or subject province that produces §YSilk§! gains:"
 zena_silkstone_trigger_tt:0 "Any known country:\n Any owned province produces §YSilk§!\n One of the following must be true:\n    §YCrawler Goblin§! is an accepted culture\n    Primary culture is §YCrawler Goblin§!"

 flavour_zena.43.t:0 "Kelaktar Fortifications"
 flavour_zena.43.d:0 "Within the Ogre Valley, Fathide Ogre society is organized around Kelaktars, fortified settlements characterized by an encircling wall typically made of stone. This forms the basic unit of administration, allowing animal herds to graze out in the land surrounding a kelaktar, and then be brought back in to be butchered or otherwise processed. Some are legendary, like the cloud-giant ruins of Maghargma or the bronze-plated walls of Rijansvi.\n\nAzaly’s main challenge in the Ogre Valley was not to understand architectural peculiarities, but to charm its inhabitants. The Fathides have embraced their constant hunger, and believe in Iskerag Vulshor, where they partake in ritualistic feasts, maintaining that consuming something allows you to inherit some of its traits. Realizing the best way to the heart is through the stomach, Azaly has purchased a vast amount of delicacies in the Serpent Gift as his caravan travelled north from Bulwar, and hosted a grand feast for the ogres in [zena_kelektar_capital_true.GetName]. Between courses, he studied their agricultural defense networks, planning on adapting the designs for the outlying hamlets of Bivuzena. Several ogres have returned with him, willing to provide labour for the opportunity to sample novel Sarhaly cuisine."
 flavour_zena.43.a:0 "You’re not you when you’re hungry…"
 zena_kelektar_tt:0 "Up to §Y5§! random owned or subject provinces that produce §YLivestock§! gain:"
 zena_kelaktar_trigger_tt:0 "Any known country:\n One of the following must be true:\n    §YFathide Ogre§! is an accepted culture\n    Primary culture is §YFathide Ogre§!"
 
 flavour_zena.44.t:0 "Street Food Festivals"
 flavour_zena.44.d:0 "The cave trolls of Grizehûd are much like ourselves, desiring peace between neighbors and working alongside each other in harmony. Goblins, dwarves, kobolds, trolls, and orcs, once bitter enemies fighting for the gold of the caverns, now all banter, trade, and cohabit in peace. This melting pot of cultures has produced a unique culinary fusion, mixing and matching the best of each to create something wholly new - and utterly delicious. Nowhere is this better seen than on Feast Day, a celebration occurring every four days. Culinary experts flock together and prepare vast mountains of food, full of gastronomic masterpieces. They then distribute these to the entire community, ensuring the needy are fed and communal bonds are forged.\n\nOne of Azaly’s apprentices, more chef than architect, spent months with the trolls of Grizehûd, learning from their most acclaimed cooks and sauciers. Inspired by their generosity and concerned for the refugees still finding their footing after the War for Zena, she has envisioned a similar "Street Food Festival" for Bivuzena. With several troll chefs who are eager to expand their gastronomic repertoire, she has put together a proposal for a network of food banks and public feasts to alleviate the hunger of the people of Bivuzena."
 flavour_zena.44.a:0 "Who knew mushroom soup could taste so good?"
 zena_street_food_tt:0 "Up to §Y5§! random owned or subject provinces that produce §YGold§!, §YSerpentbloom§!, §YSpices§!, or §YCloves§! gain:"
 zena_street_food_trigger_tt:0 "Any known country:\n One of the following must be true:\n    The primary culture is §YCave Troll§!\n   §YCave Troll§! is an accepted culture\n   Any owned province:\n     The culture is §YCave Troll§!"

 flavour_zena.45.t:0 "Ice-Steel Orv Zana"
 flavour_zena.45.d:0 "Ice-Steel. The hold of Krakdhûmvror’s most impressive magical alloy is a versatile metal imbued with the characteristics of ice and freezing water. This is especially exotic to the people of Horashesh’s steamy climate. Their sacred and secret Icecraft is used within Frozen Forges to channel the biting cold of the northern winds into a magical energy that allows the hold's Ice-Smiths to create Ice-Steel. With swords that cause frostbite, armour that can unfreeze and flow like water, arrows that shatter into rending shrapnel on impact, the applications are endless.\n\nAzaly is interested in using Ice-Steel for a more utilitarian purpose, a concept that the dwarves of Krakdhûmvror much appreciate. Compared to the grand marvels of the rest of Dwarovar, the halls of the Frozen Hold contain little pomp and circumstance. This particular style of architecture is known as Orv Zana, or ‘Cold Stone,’ allowing buildings to focus on defense and survival. As [Root.GetName] expands to the northern deserts of the Salahad and her colonies closer to the arctic south, the ability to combine Ice-Steel to buildings to both cool and insulate is a challenge the Quartz Dwarves are eager to meet."
 flavour_zena.45.a:0 "What’s cooler than cool? Ice cold Ice-Steel!"
 zena_orvzana_tt:0 "Every owned or subject province with the §YArctic§! Climate gains:"
 zena_orvzana_trigger_tt:0 "Any known country:\n One of the following must be true:\n    The primary culture is §YQuartz Dwarf§!\n   §YQuartz Dwarf§! is an accepted culture\n   Any owned province:\n     The culture is §YQuartz Dwarf§!"

 flavour_zena.46.t:0 "Gommo Branch Office"
 flavour_zena.46.d:0 "The Gommo is the largest gnomish guild and patron of inventors and scientists across Halann. Within Bivuzena are many scientists, both gnomish and not, who are researchers, artificers, and of course, architects. By opening a Gommo branch office within Bivuzena, we will not only gain access to scientific marvels from all over the world, but become a privileged part of their vaunted network of scientific correspondence. In one fell swoop, Bivuzena might easily become the most advanced city in Horashesh, should the Gommo accept our invitation."
 flavour_zena.46.a:0 "Their inventions will help propel [Root.GetName] to a better future!"
 zena_gommo_trigger_tt2:0 "Any known country:\n   Has §YGommo Branch Office§! in any province.\n   One of the following must be true:\n    §YGnomish§! Tolerance Level is §TIntegrated§! or §MPrimary§!\n   §YGnomish§! Tolerance Level is §GCoexistence§!"

 flavour_zena.47.t:0 "Haless Temple Complexes"
 flavour_zena.47.d:0 "Dotted across Haless are the High Temples, symbols of worship for followers of High Philosophy. Their exact date of construction is unknown, but they have shaped the religion as it exists today. The Raheni believe these High Temples to be structures left behind by their gods, and consequently have turned them into centers of reverence. This concept of the temples being structures left by the gods was brought to the forefront of the religion by Harimar the Great. Harimar sought to both expand his empire and seek out all the High Temples left behind by the gods. Seeking to emulate these High Gods, Harimar considered the temples sacred structures containing divine revelations. By studying the temples the philosopher-priests of Haless sought to uncover the path towards spiritual unity as ordained by the High Gods. Ultimately Harimar, after conquering nearly the entirety of Haless, would enter the High Temple of Tianlou in 79 AA and never be seen again.\n\nWhile the Noukahi Pantheon cares more for heroes and epic stories than abject reverence of the gods, Azaly believes that he can fashion a better home for the griots by referencing the architectural design of the High Temples. In this endeavour, he was assisted by Harimari guides eager to follow in the path of the High Gods. The temple structures themselves extend both deep below ground and up towards the heavens, and are non-uniform in their distribution throughout Haless. Within, he studied the etchings, murals, and friezes depicting the High Gods in various scenes, noting how the scale could be adapted to tell the stories of Noukahi heroes. He has returned alongside several Harimari artists, who will help him ensure that the temples he builds within Bivuzena are created with a suitably inspiring art style and spark lively philosophical discussion about divinity and heroism."
 flavour_zena.47.a:0 "Their compassion and care will certainly lead them to Purtara."
 zena_temple_complex:0 "§OTemple Complex§!"
 zena_temple_complex_desc:0 "The lands of Haless are dotted with High Temples, and Azaly Stonecarver has built this temple in Bivuzena to reflect them. Covered in murals of the tales of the heroes of the Noukahi Pantheon, this is a place of pilgrimage, veneration, and wonder."
 zena_temple_complex_trigger_tt:0 "Any known country:\n Owns any §YTemple Complex§!"

 flavour_zena.48.t:0 "A Good Start"
 flavour_zena.48.d:0 "We have begun to alleviate the stress on the city of Bivuzena caused by the First Kuiika War. Azaly and his apprentices have brought several innovative pieces of architectural research from across Halann to bear on the problem. Our griots have begun singing songs about the wonders of Bivuzena, but there is still much work to be done!"
 flavour_zena.48.a:0 "Let’s get back to it, then!"
 zena_griot_empowerment:0 "Griot Empowerment"
 zena_griot_empowerment_desc:0 "[Root.GetName]'s griots' songs have been spread throughout Halann due to the large amount of people within Bivuzena!"

 flavour_zena.49.t:0 "Wonder of Sarhal"
 flavour_zena.49.d:0 "Bivuzena is a wonder of Sarhal. Thanks to the skill of  Azaly and his apprentices, we have transformed the city from refugee slum to tourist wonderland. Filled with pieces of architecture from across Halann, alongside Medaka's Exceptional Treasures and Majestic Menagerie, people flock to see the splendor of Bivuzena!"
 flavour_zena.49.a:0 "Wonderful!"
 
 flavour_zena.50.t:0 "The Collectors Cache"
 flavour_zena.50.d:0 "The city of Bivuzena has become a microcosm of Medaka's Exceptional Treasures. Filled with various pieces of innovative architecture enriching the lives of the citizenry from the world over, it is inarguably one of the most multicultural and beautiful places to live. Collectors from across Halann have been eager to assist in acquiring more pieces for our galleries, and more amenities for our citizens."
 flavour_zena.50.a:0 "Splendid!"
 zena_blueprints_fiften_tt:0 "§YRelic Acquisition§! will now always be free!"

 flavour_zena.51.t:0 "The City, Complete"
 flavour_zena.51.d:0 "Bivuzena buzzes with activity. Within the concentric walls of the city, vayt-bulbs light the streets with kobold-designed apartments hanging off of them. In the Nyanza Market, a salesman cajoles onlookers to purchase cooled treats from a cart made of dwarven Ice-Steel at a food festival. Elsewhere, merfolk and land-dwellers interact across glass paneling, as glyph-magic holds foul weather at bay. The entire metropolis is a marvel of engineering, ingenuity, and most of all, cooperation from many different people hailing from all across Halann."
 flavour_zena.51.a:0 "This is the Bivuzena we always dreamed of."
 zena_blueprints_complete_tt:0 "§GAll§! §YMenagerie Buffs§! will be §GUpgraded!§!"

