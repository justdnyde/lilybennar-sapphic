l_english:
 ### Missions! 
 #Column 1
 L06_root_of_universe_title:0 "The Root of the Universe"
 L06_root_of_universe_desc:0 "“Beyond the Seahorse Sea, beyond the Vyzemby islands, we have heard from merchants of a vast maelstrom, a giant whirlpool that descends down to the bottom of the ocean which takes sailors and ships alike, with no regard to which flag is flown. Yet our mariners are of a different breed, and our people need to believe us capable of doing the impossible. [Root.Monarch.GetTitle] [Root.Monarch.GetName] will sail out tomorrow, in search of this wonder of the world, this ‘Root of the Universe’ and acquire sketches to demonstrate that the navy of Zena will not be conquered by man nor nature. There is much to explore, and the tribes beyond the Vyzemby may have knowledge that can be used to expand Bivuzena. Worry not. Our [Root.Monarch.GetTitle] will return triumphant, and all of Horashesh will marvel at our glory.”\n\n    - Pamphlet attached to the door of the government hall to explain its temporary closure."
 zena_the_infinite_west_plus:0 "The Infinite West"
 zena_the_infinite_west:0 "The Infinite West"
 zena_beyond_saltwater_horizon:0 "Beyond The Saltwater Horizon"

 L06_a_new_people_title:0 "A New People"
 L06_a_new_people_desc:0 "“The interesting thing about the islands near the Root of the Universe is that for every one you visited, the tribes there would tell you of yet another farther west. Naturally, [Root.Monarch.GetName] was eager to explore every island we could, gradually picking up halfling mariners as we went, which is why the trip took several months longer than originally planned. Eventually, we came upon a group of islands with no inhabitants, but in the distance, we saw what seemed to be a larger landmass, the large canopy of a jungle just barely visible over the horizon. When we landed on the sandy coast, the dense trees towering above us in the distance, we were stopped by a group of - well, elves, but not quite. With dark skin and black and white dyed hair, they vehemently cautioned us against going further; with our supplies dwindling, we heeded their warning, though I’m sure [Root.Monarch.GetName] will be preparing another expedition soon, to explore this uncharted territory.”\n\n    - Excerpt from the notes of halfling explorer Felana Quillweaver."
 zena_one_pilgrimage_tt:0 "Have gone on at least §Y1§! §GSuccessful§! Pilgrimage"
 zena_unwritten_atlas:0 "The Unwritten Atlas"
 zena_unwritten_atlas_desc:0 "The world is so much more vast than we ever imagined. We would be the greatest historians in Horashesh if we were to document it all!"

 L06_roots_beyond_root_title:0 "Roots Beyond the Root"
 L06_roots_beyond_root_desc:0 "“Once more to strange new shores. [Root.Monarch.GetName] has wisely heeded the advice of the locals in sticking to the coast. The jungle, allegedly, is dangerous far beyond just its beasts or strange flora, and the burnt remnants of the roots of the trees that the Oono’i people show us are still dangerous, requiring rituals and songs to keep the power of the forest at bay. Those that are willing to talk, advised us to sail along the rivers and avoid setting foot on land. Some have heard whispers of a people called the Parura, who might be willing to trade with us, and teach those of us they deem worthy how to traverse the jungle. As for the coasts, the Medaka has allowed for some of the people, those driven from their homesteads by the War for Zena, to set up new camps and towns there and learn from the Oono’i - with a warning to not venture any deeper into the verdant hinterlands.”\n\n    - Excerpt from the notes of halfling explorer Felana Quillweaver."
 zena_roots_beyond_halfling_tt:0 "Up to §Y5§! random provinces in your §YColonial Nation§! in the §YColonial Lai Peninsula§! will §GAdd/Increase§! §YHalfling Minority Size§! and get '§YHorashesh Outreach§!' for §Y40 years§!, giving the following effects: \nInstitution Spread: §G+10.0%§! \nLocal Trade Power: §G+20.0%§!"
 zena_horashesh_outreach:0 "Horashesh Outreach"
 zena_horashesh_outreach_desc:0 "The halflings who were driven from their home during the War for Zena have travelled far to find a new place to call their own."
 zena_opinion_horashesh_branches:0 "Horashesh Outreach"

 L06_deeper_into_effelai_title:0 "Deeper Into The Effelai"
 L06_deeper_into_effelai_desc:0 "“Our great expedition sailed up the labyrinthine river network of the Effelai, as that vast jungle is called, heeding the warning we received and taking great care to not set foot in the jungle beyond, despite a great desire from myself and others to explore. What we discovered at the end of the river, however, was more than breathtaking enough. A floating city in the swamp, swarming with activity, a mirror image of our Nyanza Market. [Root.Monarch.GetName] stepped aboard, and as always, quickly began making friends. An agreement has been reached between us and the Parura people - as long as we restrict ourselves to these floating trade platforms and the rivers and coasts, we are permitted to stay. And anyone willing to learn their rituals, hunt their beasts, and convert to their faith, is welcome to explore the depths of the jungle with them - for the Parura are also on their own quest and great journey. I must admit, their ways, despite their strangeness, have an allure to them… regardless, our Medaka smiled, strong in his conviction, kind and tolerant to all beliefs, and shook hands with the chieftain of their tribe. And so began a prosperous partnership.”\n\n    - Excerpt from the notes of halfling explorer Felana Quillweaver."
 zena_chahinanito_provinces_tt:0 "Every province of this colonial nation changes religion to §YChahinanito§!"
 COLONIAL_LAI_PENINSULA_Etvaelany:0 "Etvaelany" #New Outpost
 COLONIAL_LEECHDEN_Nioruni:0 "Nioruni" #Wetwood

 L06_radiant_fleet_title:0 "The Radiant Fleet"
 L06_radiant_fleet_desc:0 ""Today, I saw the most amazing thing! A whole bunch of ships were sailing by, right outside our home and they were shining! They were brighter than the sun! Mama said that this is the ‘Radiant Fleet’ and they have gold on their hulls, and their job is to protect all of us from any people who might try to hurt us or our friends in the Effelai. I think that means they must be good people! I told mama I wanted to be one of the people on one of the ships one day. I also said I wanted dessert for dinner. She said one of those two things might be possible. It’s so hard to choose!!!"\n\n    - Diary of an unidentified young child from Timberpoint."
 zena_radiant_fleet_tt:0 "[Root.GetName] has at least §Y20 Light Ships§! in any §YProvince§! belonging to any of the Trade Nodes §YDry Coast§!, §YEast Effelai§!, §YKalavend§!, or §YLeechdens§!"
 zena_force_draft_improved_tt:0 "Strengthen the '§Y[Root.GetBurghersName] Force Draft§!' Privilege of the §Y[Root.GetBurghersName]§!, §Gupgrading§! the Decision '§Y[Root.GetBurghersName]: Draft Ships for War§!' build §Gdouble§! the §YHeavy Ships§!."
 zena_naval_schools_improved_tt:0 "Strengthen the '§Y[Root.GetBurghersName] Naval School Rights§!' Privilege of the §Y[Root.GetBurghersName]§!, granting §Gtriple§! the §YPrestige from Naval Battles§!."
 zena_radiant_fleet_protectorate_upgrade_tt:0 "Your §YTrade Protectorates§! gain §G+10.0%§! Production Efficiency, §G+10.0%§! National Manpower Modifier, and §G+10.0%§! Manpower Recovery Speed.\nYour §YTrade Protectorates§! now grant the overlord §G-75.0%§! Reduced Trade Penalty on Non Main Trade Node, §G+10.0%§! Trade Efficiency, §G+1.0§! Diplomatic Reputation, and §G+5.0%§! Naval Force Limit."
 zena_radiant_fleet_overlord_bonus:0 "The Radiant Fleet"
 zena_radiant_fleet_subject_bonus:0 "The Radiant Fleet"

 L06_floating_jewel_of_west_title:0 "Floating Jewel of the West"
 L06_floating_jewel_of_west_desc:0 "“The partnership with Sel’Parura has brought massive boons to both of us. But the amount of new people from Zena now residing within the jungles has begun to make [G15.Monarch.GetName] nervous, doubtful if we are still following their rules, nervous about the dangers of the Effelai to those untrained, and [G15.Monarch.GetHerHis] has let the Medaka know of these worries. A lesser man would rage, or wage war for such an implicit insult to the honour of his people. But our [Root.Monarch.GetTitle] is no lesser [Root.Monarch.GetWomanMan]. [Root.Monarch.GetSheHeCap] understands mercy, kindness, and most of all, understands the value of an ally who is in your debt. To this end, [Root.Monarch.GetSheHe] wrote a charter - all people of Zena not following the Chahinanito rites are to leave the mainland of South Aelantir, and the floating cities at the coasts will remain as the physical tether between the two nations. Now, thanks to our [Root.Monarch.GetTitle]’s diplomatic cunning, a bond stronger than steel has been forged between the two nations.” \n\n    - Excerpt from the notes of halfling explorer Felana Quillweaver."
 zena_effelai_forward_base:0 "Effelai Trading Company Forward Base"
 zena_effelai_forward_base_desc:0 "This forward base has been set up to encourage the trade between Horashesh and the Effelai. In addition, it serves as the launchpoint for the Radiant Fleet, a navy containing ships adorned with gold decor with the task of protecting the Effelai from outside invaders."
 zena_cede_south_aelantir_tt:0 "\nYou will §Rcede§! all land held by you or your subjects within Mainland South Aelantir to @G15§YSel'parura§!. Both countries will gain bonuses depending on the number of provinces you and your subjects and @G15§YSel'parura§! hold on Mainland South Aelantir. This §Gexcludes§! the §YTurtleback§!, §YSevered Coast§!, §YTor Nayyi§!, §YRuined Isles§!, and §YRavenous Isle§! Regions. Breakpoints are at §Y30§!, §Y100§!, §Y200§!, and §Y300§! provinces. \n§GCurrent Rewards§!:"
 zena_chosen_not_alone_max:0 "Chosen, Not Alone (V)"
 zena_chosen_not_alone_four:0 "Chosen, Not Alone (IV)"
 zena_chosen_not_alone_three:0 "Chosen, Not Alone (III)"
 zena_chosen_not_alone_two:0 "Chosen, Not Alone (II)"
 zena_chosen_not_alone_min:0 "Chosen, Not Alone (I)"
 zena_jungle_song_heard_max:0 "Heroes of the Effelai (V)"
 zena_jungle_song_heard_four:0 "Heroes of the Effelai (IV)"
 zena_jungle_song_heard_three:0 "Heroes of the Effelai (III)"
 zena_jungle_song_heard_two:0 "Heroes of the Effelai (II)"
 zena_jungle_song_heard_min:0 "Heroes of the Effelai (I)"

 #Column 2
 L06_faith_in_foundations_title:0 "Faith in Foundations"
 L06_faith_in_foundations_desc:0 "“Mark my words, mark them well, good people of Zena. Yes, we may be at our lowest point. Yes, Kuiika and Zuvavim press against the great city of Bivuzena on each side. Yes, the Kheteratan Empire to the north hungers for our riches, while the Medawor never lifted a manicured finger to help us in our time of need. But as any of our good sailors know: for every trough, there is a crest! We will, no, we must rise again! Trust in me, and trust in the Efergezmu. We will ascend to our rightful place, a shining beacon upon the Seahorse Coast once more.\n\nWe will find new allies: Iqhekabi already saved us once, and like us surely desires to fix the current imbalance of power in Horashesh. The Vyzemby across the water hold many construction secrets that will aid the rebuilding of our city. Even the aloof lizardfolk to the east could be turned to our side, as some of their kin have been forced to become refugees within our walls. Join hands with me, and let us promise each other to have faith. Faith in the nation of Zena, and her ability to rise once more!”\n\n    - Speech given by [Root.Monarch.GetName], distributed throughout all boroughs of Bivuzena."

 L06_bivuzena_unbroken_title:0 "Bivuzena, Unbroken"
 L06_bivuzena_unbroken_desc:0 "“Once again, and I can’t believe I have to put out ANOTHER notice about this, but please do not harass our halfling coworkers. Yes, I know they’re short. Yes, I know they have stinky feet. But when it comes to construction matters, they have knowledge and abilities that put most of you to shame. Not only that, but several of them lost their families and livelihoods during the war, so maybe try having a little empathy. It’s frankly admirable that they’re willing to pick up hammer and nails to build a better Bivuzena alongside us. [Root.Monarch.GetTitle] has made our open door policy clear, and we need to all work together if we want Zena to become great again. Please don’t make me have to start docking anyone’s pay, or worse, cancel Friday card night.”\n\n    - Note from the supervisor of an Efergezmu construction crew."
 bivuzena_random_dev_races_tt:0 "§YBivuzena§! will gain §G+1§! Random §YDevelopment§! for each unique §GCoexisting§! or §TIntegrated§! non-human pop in our own or our subjects’ lands."

 L06_ananoma_secrets_title:0 "Ananoma Secrets"
 L06_ananoma_secrets_desc:0 "“Zena engineers did not account for increased structural strain on tiers with increased height compared to halfling models. Sloppy. \n\nHexagons require different angles for adequate beehive aesthetics in accordance with cohabitation. Difficult challenge. Refreshing. \n\nExtra focus on interior and exterior design for decorations, with focus on floral and piscine artwork. Somewhat incongruous with ‘fortress’ design. I suppose living quarters more important for morale. \n\nNo, the walls are not built out of honey. What a ridiculous assertion. No wonder previous stacking experiments failed.”\n\n    - Notes from renowned Vyzemby engineer and Ananoma scholar, Azaly Stonecarver."
 zena_blueprints_of_tomorrow_unlock_tt:0 "Unlock the §YBlueprints of Tomorrow§! Decision System"
 zena_ananoma_human_tt:0 "Up to §Y3§! random provinces owned by you or your subjects without a §YLarge Human Minority§! or §YMajority§! will §GAdd/Increase§! §YHuman Minority Size§!"

 L06_adventure_to_masses_title:0 "Adventure For the Masses"
 L06_adventure_to_masses_desc:0 "“Yes, come one, come all! The Majestic Menagerie is open to any, all for just the price of a small donation. It is men’s instinct to be lovers, hunters, fighters, and letting all of these instincts out to play by watching our cadre of beasts is what we do within the Menagerie! Have all the wilderness escapades you could dream of, right inside the comfort of Bivuzena’s wall. With food, entertainment, and all ornaments and novelties you can dream of, it’s a family-friendly adventure for even the young ones! Yes, here in Bivuzena we have made adventure available to the masses, so whether you’re just a merchant sailor taking leave or a permanent resident, please come visit while you’re here!”\n\n    - Advertisement for Medaka’s Majestic Menagerie."
 bivuzena_prodtax_dev_races_tt:0 "§YBivuzena§! will gain §G+1§! Random §YBase Production§! or §YBase Tax§! for each unique §GCoexisting§! or §TIntegrated§! non-human pop in our own or our subjects’ lands."
 zena_hunted_south_ael_fauna_tt:0 "Have caught the §YSouth Aelantiri§! §OCheetah§! and are holding it within §YMedaka's Majestic Menagerie§!"
 zena_medakas_majestic_menagerie_level_two:0 "Medaka's Majestic Menagerie (II)"
 zena_medakas_majestic_menagerie_level_two_desc:0 "This menagerie has many interesting creatures, and has begun to attract visitors from across Sarhal! As our famed fauna hunters go out in the world and capture more animals, we shall spread the word across Halann!"
 zena_trade_power:0 "Zena Trade Influence"

 L06_parura_partnership_title:0 "Parura Partnership"
 L06_parura_partnership_desc:0 "“The trade partnership with the Parura people is beyond profitable. Their wood, fish, gold, sugar, and cocoa are exchanged with our paper, cloves, silk and wool for mutual benefit. More and more of our merchant princes visit the main trading platform in [G15.Capital.GetName] every year, and the trade of goods and ideas flows freely between the two nations. To strengthen this connection, let us negotiate a treaty to bind us even closer together. There are others arriving on your shores from across Halcann who we know greedily covet your lands, and will not respect your ways or the Effelai the way we do. If you are amenable to this, our fleets will protect you from these invaders, and both our nations will continue to profit.”\n\n    - Declaration of the Parura-Zena Alliance by [Root.Monarch.GetTitle] [Root.Monarch.GetName]."
 zena_medakas_favour:0 "Medaka's Favour"
 flavour_zena.7.insight:0 "\n§GEvent Insight:§!\n\n§YSel'Parura§! will see the benefit in becoming our trade protectorate."

 L06_mushroom_mythos_title:0 "Mushroom Mythos"
 L06_mushroom_mythos_desc:0 "“While there are those that abandoned their old homes in Bivuzena to live amongst the Paruran people, they have never abandoned their old friends. Aboard the floating trade cities, we swap stories, share meals, and keep up with news from both sides of the world. As well, some of the first people to convert have had children with the people of Sel’Parura, and those children sometimes have the desire to come back with us to Bivuzena, to learn more about the other half of their heritage and to see more of the world than the forest. Our Medaka, of course, welcomes them with open arms. As for me, the forest is a whole world unto itself. In our last expedition, we discovered mushrooms that were literally made of gold. Actual, real, gold. The Effelai truly never ceases to surprise.” \n\n    - Excerpt from the notes of halfling explorer Felana Quillweaver."
 zena_shrooms_to_gold_tt:0 "Up to §Y4§! random provinces owned by you or your subjects in the §YLeechdens§! or §YMushroom Forest§! regions that do not produce §YGold§! will Change Trade Goods to §YGold§!."
 zena_tales_of_gold_fungi:0 "Tales of the Gold-Plated Fungi"
 zena_cheetahs_upgrade_tt:0 "Your §OCheetahs§! will be §GUpgraded§! when chosen as the §YMarquee Animal§! within §YMedaka's Majestic Menagerie§!, now granting:"
 zena_mushroom_subjects_tt:0 "Every subject country:"
 
 L06_memories_in_heart_title:0 "Memories in the Heart"
 L06_memories_in_heart_desc:0 "“To all our glorious farmers, fishers, and ranchers. We need more food to feed the wonderful creatures in the Menagerie in Bivuzena! Your Medaka is announcing a competition - the delegation of the city with the greatest harvest produced will be given an all expenses paid trip to Bivuzena, with the ability to visit the Majestic Menagerie where their work is being put to excellent use, as well as Medaka’s Exceptional Treasures! Will your town be the lucky ones? With your greatly appreciated labor, it just might be!”\n\n    - Advertisement to encourage increased food production."
 zena_medakas_majestic_menagerie_level_four:0 "Medaka's Majestic Menagerie (IV)"
 zena_medakas_majestic_menagerie_level_four_desc:0 "The menagerie is a massive spectacle of both our prowess as hunters and caretakers. Blue roses litter the large fenced fields where the animals play and live for the entertainment of citizens who come from all across Halann. Hawkers give concessions to children who gawk at the creatures from all over the world. Special exhibits come and go, with encampments perfect for each animal's environment constructed masterfully by Azaly Stonecarver and his apprentices. Truly, it is an attraction to wow the world."
 zena_feeding_menagerie:0 "Feeding the Menagerie"
 zena_feeding_menagerie_desc:0 "The demands for food for Medaka's Majestic Menagerie has brought this province's production into overdrive."
 zena_feeding_menagerie_tt:0 "Every province owned by you or your subjects that produces §YFish§!, §YGrain§!, or §YLivestock§!:"

 #Column 3

 L06_curated_grandeur_title:0 "Curated Grandeur"
 L06_curated_grandeur_desc:0 "“To further the end of expanding the knowledge of our great nation, and to learn of the wonders of other people all across the world, I declare the grand opening of an awe-inspiring collection of works. Unique and exotic goods, acquired through diplomacy abroad, our skillful trade within the Nyanza Market, and of course, the use of Nozipo Gappah’s discreet trade network will be gathered here, in Medaka's Exceptional Treasures. Across Sarhal, across Halann, people will flock to see what we have acquired, with a rotating selection so that no one ever may get bored. And each of those people will arrive with a small donation to elevate the city of Bivuzena, and enrich the lives of each and every one of our citizens. So please, come in, and enjoy!”\n\n    - Speech given by [Root.Monarch.GetName] on the opening of Medaka’s Exceptional Treasures, framed in the lobby."
 zena_medakas_exceptional_treasures_level_one:0 "Medaka's Exceptional Treasures (I)"
 zena_medakas_exceptional_treasures_level_one_desc:0 "Our Medaka has begun the collection for unique and exotic goods within our museum. As we develop our repository of relics, the Medaka's Exceptional Treasures will expand."
 zena_unlock_relics_tt:0 "Unlock §YRelic Acquisition Events§! for §YMedaka's Exceptional Treasures§!. These events have a chance of firing every §Y5§! years, increased with a higher level of §YMedaka's Exceptional Treasures§!. Explore the world for the opportunity to acquire more relics!"

 L06_wharfs_second_sunrise_title:0 "The Wharf's Second Sunrise"
 L06_wharfs_second_sunrise_desc:0 "“A sketch done by renowned artist Idai Nororebi during his apprenticeship. One of his earliest preserved works, this charcoal on paper sketch of the Nyanza Market at sunrise illustrates the wharf’s reemergence as a center of culture and commerce after the Second War for Zena. Notable of course, is the variety of races present in the sketch, as halfling, human, elf, harpy, and gnoll merchants begin setting up their stalls for a day of hawking their wares. His use of alternating thin and thick lines to add more depth to the piece, a practice he would later effortlessly master, is evident in the Vyzemby islands in the background, easily recognisable despite being clearly so far away.”\n\n    - Medaka’s Exceptional Treasures, Vurebindu Artists Exhibition."
 zena_wharf_bivuzena_pops_tt:0 "At least §Y3§! unique §RNon-Human§! §GCoexisting§! or §TIntegrated§! racial majorities or minorities in this province"
 zena_nyanza_market_level_two:0 "The Nyanza Market (II)"
 zena_nyanza_market_level_two_desc:0 "We have begun to improve the living situations of the people displaced by the War for Zena, and the Nyanza Market, although filled with scrupulous characters, has begun seeing business once more. \n\nAs an independent Bivuzena recovers, the Nyanza Market may be restored to her former glory."
 bivuzena_racial_increase_effect_tt:0 "§GLarge Tolerance Increase§! for you and your subjects for every racial majority or minority pop in Bivuzena"
 zena_wharf_allies_subjects_tolerance_boost_effect_tt:0 "§GMedium Tolerance Increase§! for every racial pop in your lands, your subjects lands, or your allies lands not represented in Bivuzena"

 L06_pushing_papers_title:0 "Pushing Papers"
 L06_pushing_papers_desc:0 "“Paper. The ideas they carry. The history that is written within. When we had nothing left but pulp and quill, we took our skills and made do, rising up in the process. But there is only so much pulp to be had, and we need more if we are to continue documenting our stories, crafting treatises, and selling our pristine parchment to others. To this end, I am instituting new quotas to those in charge of sourcing our wood. We need more, and they will be well-compensated for the production. For Bivuzena.” \n\n    - Declaration of the Paper Production Act by [Root.Monarch.GetTitle] [Root.Monarch.GetName]."
 zena_paper_production_quotas:0 "Paper Production Quotas"
 zena_paper_production_quotas_desc:0 "The wood production of this province has skyrocketed due to quotas set by [Owner.Monarch.GetTitle] [Owner.Monarch.GetName] to produce more paper for the sake of trade and diplomacy in the capital."
 zena_pushing_papers_tt:0 "Up to §Y5§! random provinces owned by you, your subjects or your colonies producing §YExotic Wood§!:"
 zena_extension_effect_15_tt:0 "Any Country Modifiers from acquiring relics or Medaka's Majestic Menagerie will be extended for §G15§! years"

 L06_bounties_blue_roses_title:0 "Bounties and Blue Roses"
 L06_bounties_blue_roses_desc:0 "“Initially only this single brilliant blue rose was recovered from another plane. Placed in glass and put on display within the museum as the Medaka’s favourite item, it came as a surprise when suddenly the planter next to it began to sprout blue roses as well. This caused more and more people to come and see the miraculous plants, and before long, the city of Bivuzena, and many other cities in Zena and her colonies in Aelantir, were full of blue roses. It is hypothesized that our attention is part of their natural life cycle now that they are here on this plane, and they are equipped with a somewhat captivating allure in furtherance of that end. Fortunately, with the awareness divided amongst all the roses in the city, the growth has slowed to a manageable rate.” \n\n    - Plaque on the first Blue Rose of Bivuzena, Medaka’s Exceptional Treasures, Floriculture Exhibit."
 bivuzena_prodman_dev_races_tt:0 "§YBivuzena§! will gain §G+1§! Random §YBase Production§! or §YBase Manpower§! for each unique §GCoexisting§! or §TIntegrated§! non-human pop in our own or our subjects’ lands."
 zena_medakas_exceptional_treasures_level_two:0 "Medaka's Exceptional Treasures (II)"
 zena_medakas_exceptional_treasures_level_two_desc:0 "The museum has expanded, with many wings and exhibits. Art, architecture, archeaology, and more can all be found within its walls. As we develop our repository of relics, the Medaka's Exceptional Treasures will expand."

 L06_lessons_of_effelai_title:0 "Lessons of the Effelai"
 L06_lessons_of_effelai_desc:0 "“The [Root.Monarch.GetTitle] has been resolute. No man or woman from Zena is to step foot in the jungle without the express permission of the Paruran people. Fortunately, in the time that I have been here, there has been no shortage of volunteers, whether they be refugees, thrill-seekers, or treasure hunters, willing to undergo the harsh trials and convert to the Chahinanito faith. As they come back, I always stare at them, wistfully, asking as many questions as I can while I write their words down in my journal. But my dear Nulri, the jungle is just so enchanting. I wish to experience it for myself, rather than through second-hand accounts! There are so many lessons that we can learn from its song. Perhaps I will ask [G15.Monarch.GetName] if I may attempt the trials myself.” \n\n    - Letter from halfling explorer Felana Quillweaver to her fiancée, Nulri Imbiswa."
 zena_lessons_effelai_reward_tt1:0 "[G15.Capital.GetName] will become a repeatable §Ypilgrimage site§! for Noukahi Pantheon."
 zena_lessons_effelai_reward_tt2:0 "[2378.GetName] will become a repeatable §Ypilgrimage site§! for Noukahi Pantheon" 
 zena_two_pilgrimage_tt:0 "Have gone on at least §Y2§! Unique §GSuccessful§! Pilgrimages"
 zena_np_effelai_pilgrimage_tt:0 "The song of the §vEffelai§! has touched our heart."
 noukahi_effelai_tooltip_cryptic_effect_tooltip:0 "A journey to the Effelai will allow us to partake and learn of new rituals and magical practices, granting a boon whose nature will be revealed after the first successful pilgrimage to this location."
 noukahi_effelai_tooltip_full_effect_tooltip:0 "A journey to the Effelai will allow us to partake and learn of new rituals and magical practices, granting §G+20.0%§! Ruler Magic Experience Modifier until ruler death."
 zena_repilgrimage:0 "Our [Root.Monarch.GetTitle] will be able to go on §Ganother§! pilgrimage"

 L06_giant_of_griots_tales_title:0 "Giant of Our Griot's Tales"
 L06_giant_of_griots_tales_desc:0 "“From humble roots our Medaka did rise\nto build a realm where golden fortunes gleam.\nBeneath the watch of vast and verdant skies,\nThey forged a truth out of a dreamer's dream.\n\nNo borders bar the kin of scale or fin\nnor those who walk on two legs or on four;\nLet every stranger find a home within,\nand leave their weary burdens at the door.\n\nCome witness now the relics we hold dear,\nthe markets vast where endless wonders dwell.\nFrom lands afar the travelers gather here,\nTo buy, to trade, to barter, and to sell.\n\nSo let our griot’s tale be loudly told,\nOf Zena’s heart, more precious far than gold.\n\n    - Song about Bivuzena, sung by a griot”"
 zena_giant_pilgrim_tt:0 "Have Successfully completed a §YPilgrimage§! to the §vEffelai§!"
 zena_medakas_exceptional_treasures_level_three:0 "Medaka's Exceptional Treasures (III)"
 zena_medakas_exceptional_treasures_level_three_desc:0 "The museum is grand. From all across Halann, people come to see our famed exhibits. Our relics are sourced from every nation under the sun."
 zena_medakas_majestic_menagerie_level_three:0 "Medaka's Majestic Menagerie (III)"
 zena_medakas_majestic_menagerie_level_three_desc:0 "Our menagerie has critters from all over Halann. There are opportunities for children to ride animals and eat food sourced from creatures across the world. All animals are treated humanely and given the utmost respect."
 zena_extension_effect_25_tt:0 "Any Country Modifiers from acquiring relics or Medaka's Majestic Menagerie will be extended for §G25§! years"
 giant_griots_tales_trigger_tt:0 "Currently benefiting from any Marquee Bonus from Medaka's Majestic Menagerie"
 zena_menagerie_level_three_tt:0 "You can now choose 2 Marquee Animals simultaneously within Medaka's Majestic Menagerie!"

 L06_vyzemby_skylines_realized_title:0 "The Skylines, Realized"
 L06_vyzemby_skylines_realized_desc:0 "“One of my greatest inspirations was my years living in Bivuzena. In one apartment complex, you could live with neighbors hailing from all corners of Halann; orcs, hobgoblins, gnolls, gnomes, and many more. You could go down to the docks and swim with the merfolk or run with a centaur along the beachfront. Every street was a medley of different architectural styles, from the classic Zuvunwa masonry to the Ananoma-inspired beehive buildings to elven-style buildings made with wood that had been decorated by Nomsyulhani Dragonnel fire. Across the Seahorse Sea, you could see the islands of the Vyzemby, glittering in the distance. There was so much life to live, and so many different perspectives and people to learn from.” \n\n    - Famous Lencori playwright Alisanne síl Elwyn."
 zena_nyanza_market_level_four:0 "The Nyanza Market (IV)"
 zena_nyanza_market_level_four_desc:0 "The Nyanza Market is grander than it has ever been in Bivuzena's history. The myriad constructions surrounding it, built by Azaly Stonecarver and his apprentices, are wonders from all corners of Halann, adapted for use in this great city. People of all races and walks of life can be found within our walls and between our stalls, and the trade flows without turbulence - bringing prosperity and beauty to the city."

 L06_jewel_of_tanib_dajek_title:0 "The Jewel of Tanib-Dajek"
 L06_jewel_of_tanib_dajek_desc:0 "“I look out from the floating city at the end of the swamp towards the east, and I swear I can see you, my love. I see her walls, gleaming in the sunlight. I see you toiling in the bakery, making the rolls that I adore. The ships coming and going, the many people in the Nyanza Market. It is enough to make me wish to come back more often. But there is so much to do in the jungle. Its song is so alluring, and the Paruran people are still looking for a place at the hidden center of the jungle, a place for us to construct a great temple for the Goddess so the forest will bloom forevermore. But I will see you soon, my dear. The city shines in my mind, covered in Her leaves.” \n\n    - Letter from halfling explorer Felana Quillweaver to her wife, Nulri Imbiswa."
 flavour_zena.9.insight:0 "\n§GEvent Insight:§!\n\nAll is well in Bivuzena. Thank you for playing!"

 #Column 4
 L06_end_of_second_kuiika_war_title:0 "End of The Kuiika Wars"
 L06_end_of_second_kuiika_war_desc:0 "“For many of you, all your lives you have known war. Watching us declare war, destroying ourselves and our fields, which lately even reached out to devastate your people and caused them to be refugees within the walls of Bivuzena as well. And you yourselves are no strangers to war, against us humans and amongst yourselves for centuries.. But if we know anything about the lizardfolk, it is that you are capable of adaptation. That you can change. Having taken our land back from Kuiika, we in Zena are also tired of war. We see the people of Isagumze to your north, plotting to hunt you and your people. We extend a hand of peace, a shield of protection against the Ikilshebe. Would not the ideal of Khatalashya be one where all races stand side by side? Prosperity and peace can be achieved, if we work with one another. Together, we might even restore the zatsarya at Gamyi. Please, let us come together in dialogue, rather than on the fields of war.”\n\n    - Flyers written in Hatatsashtu, distributed in coastal Bivirir and Porhonozy."
 zena_ikilshebe_protection:0 "Ikilshebe Protection"
 zena_ikilshebe_protection_desc:0 "We have pledged to protect the lizardfolk from the Ikilshebe hunters of Isagumze."

 L06_jungle_guides_title:0 "Jungle Guides"
 L06_jungle_guides_desc:0 "“Isn’t the [Root.Monarch.GetTitle] incredible? Every leader in Horashesh must be jealous, seeing that [Root.GetName] is the nation that has bridged centuries of hatred to join hands with the lizardfolk. They are pretty smart too - they’ve been drilling us on how to fight and traverse in the jungle the way they do. It is difficult to communicate with ‘em since they can’t speak our language well, but I’ve been instructing one of the more curious ones, his name is Kiusz, to communicate using our hands; just the way you taught me after grandpa lost his hearing, ma. In return, he’s been teaching me how to write in their language, the nine-colours. I put a little bit at the bottom of this letter, but I’m not all that good at it yet. Hope to see you all soon!”\n\n    - Letter from a soldier in Igazimpa, uncredited."

 L06_elephants_for_menagerie_title:0 "Elephants for the Menagerie"
 L06_elephants_for_menagerie_desc:0 "“When the Medaka came to us and spoke of his grand idea to add a menagerie of animals as a separate part of the Exceptional Treasures, we were all a little skeptical. Sure, seeing a real life creature moving about is far more interesting than a couple of books or a statue, but someone has to keep those critters fed, keep ‘em healthy, and entertained as well. Worst of all, someone has to go and find said critters. And of course, that responsibility fell to me.\n\nI felt even more skeptical about the whole thing arriving at the court of Iqhekabi asking for permission to take and train one of their sacred elephants, with everyone glaring at Kiusz standing next to me. Sure, we in Zena had made peace with the lizardfolk, but the rest of Horashesh has been slow to follow. But, as always, gold prevailed, and they taught us how to care for the great and wise beasts before we took one of them back to the new ‘Majestic Menagerie’. Never expected it to be so popular. Or expected the adventures Kiusz and I would go on in search of animals to fill its ever-expanding enclosures.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Prologue."
 zena_unlock_fauna_tt:0 "Unlock §YFauna Hunt Events§! for §YMedaka's Majestic Menagerie§!"
 zena_unlock_menagerie_tt:0 "Unlock §YMedaka's Majestic Menagerie§! in §Y[5847.GetName]§!, which can be accessed through the §YExpanded Province UI§!. The §YElephants§! have already been unlocked for you to select as your §YMarquee Animal§!. As you capture animals through the §YFauna Hunt Events§!, they will populate the Menagerie, and you will gain access to a wider variety of potential buffs to select from."
 zena_medakas_majestic_menagerie_level_one:0 "Medaka's Majestic Menagerie (I)"
 zena_medakas_majestic_menagerie_level_one_desc:0 "A humble start, but this menagerie of critters will surely grow in time as our famed fauna hunters go out in the world and capture more animals!"
 zena_elephants_for_menagerie_trust_tt:0 "One of the following must be true:\n   §YIqhekabi§! exists, and has Trust of at least §Y85§!\n   §YIqhekabi§! does NOT exist, and we or a subject own an §YIvory§!-producing province with at least §Y10§! development."

 L06_haven_for_all_halann_title:0 "Haven for All Halann"
 L06_haven_for_all_halann_desc:0 "“Elsewhere in Aelantir, orcs are expected to till soil and plant crops until their backs break as penitence for what their father’s fathers did in Escann. Is that fair?\n\nIn Bulwar, there are those that would have the gnolls chased into the depths of the desert wastes, never to reemerge. Is that fair?\n\nIn the east, in the lands of the Mengi and Tanizu, every troll, no matter how pure their heart and good their deeds, is seen as a malign emissary of the hags of the shadow swamp. Is that fair?\n\nEverywhere, there are people who will judge you for what you look like, where you came from, factors outside your control. Is that fair?\n\nTo that I say, nay. It is not fair. But you WILL be treated fairly in Bivuzena. Within the gleaming city of Tanib-Dajek, home of the famed Nyanza market, all are welcome to come and find their new home where they might make their livelihood, free of oppression, free of judgement, free of the hated stares of those who cannot understand the power of unity in diversity. With new constructions purpose-built for all races arising every day, do not miss out on your chance!”\n\n    - Advertisement for a multi-race building complex in Bivuzena, distributed throughout Sarhal and Aelantir."
 zena_nyanza_market_level_three:0 "The Nyanza Market (III)"
 zena_nyanza_market_level_three_desc:0 "The Nyanza Market is as it ever was. The ring of ships coming into harbor, the shouts of hawkers at all times of day and night. The many new apartment buildings and constructions that have been put together by Azaly Stonecarver are a wonder to behold. The citizenry is content. But there is still work to be done. \n\nAs an independent Bivuzena resurges, the Nyanza Market may become even more glorious."

 L06_worlds_collection_title:0 "The World's Collection"
 L06_worlds_collection_desc:0 "“Now, if Verne is a clumsy city, fifteen things at once, I’d say Bivuzena is the only one that comes close to matching her gaudiness with all the different people there. Almost as keen to boast as well, that’s a good spirit they’ve got. And while they haven’t got half the good shit we have there, their ‘Exceptional Initiative’ has quite a few interesting relics. No good moustaches to be found there, the bloody rascals, but the blue roses in the planters are lovely. But it all of course pales in comparison to our Vernissage. How do I explain… I need another drink anyway, let me grab some more cups!”\n\n    - Boasts from an unnamed Vernman in a tavern."
 zena_medakas_exceptional_treasures_level_four:0 "Medaka's Exceptional Treasures (IV)"
 zena_medakas_exceptional_treasures_level_four_desc:0 "The entranceway of Medaka's Exceptional Treasure's has tens of thousands names engraved into the entryway, in every language across Halann. The curators tirelessly travel across the world to find new works to exhibit, and all manner of relics, magics, and art have found their way into the halls. Each is commemorated with a plaque explaining the culture that it came from as well as its importance, and they are all returned to their owners once their time is up. This way, the museum continues a rotating collection that allows return visitors to find new joys each time they come."
 zena_cheaper_relics_tt:0 "Future §YRelics§! will be §Gcheaper§!"

 #Column 5
 L06_elephants_memory_title:0 "An Elephant's Memory"
 L06_elephants_memory_desc:0 "“They say elephants have long memories. And Iqhekabi knows the elephants best in all of Horashesh, and value their immense wisdom and noble nature more than most. Our [Root.Monarch.GetTitle] is petitioning Iqhekabi right this moment - to think of that wisdom, to remember the times before. Do they think Kuiika will stop their brutal expansion at the gates of Bivuzena, or will their eyes turn north? Do they believe Zuvavim will continue to allow the riches of the Dao Nako trade to flow inland, or rather keep their wealth to themselves? We will stand with them against the Kheteratan Empire, if they join with us to restore the borders as they were before the debacle of 1442. If you have family, friends, anyone you know within the borders of Iqhekabi, petition them to plead to their rulers to right this imbalance, and join hands with us, the good people of [Root.GetName].”\n\n    - Brochures distributed to households during the negotiations for the Zena-Iqhekabi alliance."
 zena_flavour.2.insight:0 "\n§GEvent Insight:§!\n\n@L05§YIqhekabi§! will see the benefit in an alliance with us. \n\n§RWARNING!§! A §Yplayer Iqhekabi§! will have the option to §Rvassalize§! you. A later mission §cwill§! cause you to go to §Rwar§! against each other. This is §cinevitable§!."
 zena_saltwater_horizon:0 "The Saltwater Horizon"
 zena_saltwater_horizon_desc:0 "For years, the people of Bivuzena have stared out into the saltwater horizon of the Seahorse Sea, and the Vyzemby Islands beyond it. We will not be pushed to escape to that endless blue. Our ships will hold their ground here. Horashesh is our home."
 zena_noble_elephants_shadow:0 "Noble Elephant's Shadow"

 L06_bonds_against_khet_title:0 "Pact Against the Khet"
 L06_bonds_against_khet_desc:0 "“Dear [L05.Monarch.GetName], our campaigns together have proved fruitful. Your wisdom is as grand as the elephants you revere, unrelenting and far-reaching. We have righted the wrongs of the prior war, and Horashesh is as it was before. But the balance of power is still unstable. The Kheteratan Empire to the north still stands, and we would finally rectify our error of refusing to join you in battle against them for all these many years. Let us convene in Foloyaman at the summer solstice once more, to reignite the heart of the confederation, and declare to the Kheteratans - enough is enough. No more tribute. No more fealty. For an independent Horashesh!”\n\n    - Correspondence from [Root.Monarch.GetName] to [L05.Monarch.GetName]."
 zena_bonds_sands_tt:0 "All of our and Iqhekabi's owned or subject provinces with §YMountains§!, §YHighlands§!, or §YHills§! terrain will gain:"
 zena_stand_against_sands:0 "Stand Against the Sands" 
 zena_stand_against_sands_desc:0 "We say no more to the influence of Kheterat on our nation. We make our stand here. They will not get past the sands."
 zena_khet_war_won_tt:0 "At least §Y1§! war won against any nation with the §YKheteratan§! culture group."

 L06_stand_together_not_at_all_title:0 "Together, or Not At All"
 L06_stand_together_not_at_all_desc:0 "“It is a joyous day! Our allies in Iqhekabi have seen the glory of our Medaka, and chosen to truly join forces once and for all. Zena will soon rule over all Horashesh, with equal attention and kindness for all citizens! Soon we will be free from the yoke of the Kheteratan oppressors! Rise up, my friends, and celebrate! For we stand together with the tribes, and we will be the heroes that are sung of in tales for years to come!”\n\n    - Transcribed from a speech made by an unidentified town crier."
 zena_stand_together:0 "Stand Together"
 zena_stand_together_rebels_tt:0 "This will occur on up to §Y3§! other eligible provinces"
 zena_flavour.3.insight_tt:0 "\n§GEvent Insight:§!\n\nWith our former allies of @L05§YIqhekabi§! gone, it is clear that we deserve the claim to unite Horashesh, alone."
 zena_flavour.4_5.insight_tt:0 "\n§GEvent Insight:§!\n\nOur alliance with @L05§YIqhekabi§! has served us well, but its time is now at a close. Only one of us can claim the honour of being the true heirs of an Independent Horashesh. We prepare. In §Y3§! months, §Rwar§!. The victor will take all of the lands of the vanquished and get §Y'Quest for a United Horashesh'§! for §Y20 years§!, giving the following effects: \nDiscipline: §G+5.0%§! \nShip Durability: §G+5.0%§! \nProvince War Score Cost: §G-5.0%§!"
 zena_bivuzena_trading:0 "Bivuzena Insider Trading"
 zena_bivuzena_trading_overlord:0 "Bivuzena Insider Trading"
 zena_together_effects_tt:0 "§GMission Insight:§!\n\nThe rewards of this mission will differ depending on the route you take with @L05§YIqhekabi§!\n"
 #zena_not_at_all_iqhekabi_dead_tt:0 "\nIf @L05§YIqhekabi§! does not exist:"
 #zena_not_at_all_iqhekabi_ally_tt:0 "\nIf @L05§YIqhekabi§! is your ally:"
 #zena_not_at_all_iqhekabi_vassal_tt:0 "\nIf @L05§YIqhekabi§! is your vassal:"
 #zena_not_at_all_zena_vassal_tt:0 "\nIf you are a vassal of @L05§YIqhekabi§!:"
 #zena_not_at_all_both_players_tt:0 "\nIf both you and @L05§YIqhekabi§! are players:"

 L06_end_of_the_medasi_system_title:0 "End of the Medasi System"
 L06_end_of_the_medasi_system_desc:0 "“We declare independence from the Medawor and from Kheterat. From the traitorous Kheteratan Empire. We are the tribes, united! We are Horashesh, united! So come, if you dare. Your decadent river has made your men and women soft, while we have been hardened by centuries of conflict. But we are torn asunder by conflict no more. Under one banner, we will triumph. And your aptly named river will serve to drown the tears of your sorrow!” \n\n    - Declaration from [Root.Monarch.GetTitle] [Root.Monarch.GetName] on the end of the Medasi Compromise."
 zena_iqhekabi_integrate_tt:0 "We will §GAnnex§! @L05§YIqhekabi§!.\nLose §R2§! £dip£ per unit of their development.\nGain §YCores§! on their land."
 zena_end_medasi_system_tt:0 "All future wars against any country with any §YKheteratan§! Culture Group will grant:"
 zena_tears_drown_sorrow_tt:0 "Until the end of the war"
 zena_tears_drown_sorrow:0 "Let Their Tears Drown The Sorrow"
 zena_tears_drown_sorrow_desc:0 "Never again will we be brought to heel by the decadant rulers of Kheterat."
 zena_elephant_upgrade_tt:0 "Your §dElephants§! will be §GUpgraded§! when chosen as the §YMarquee Animal§! within §YMedaka's Majestic Menagerie§!, now granting:"

 ### Mission Events

 flavour_zena.1.t:0 "The Toll of War"
 flavour_zena.1.d:0 "It was Truefrost in Bivuzena. For three years, the season had been marked by a dry, gritty wind that tasted of the desert and carried an uncommon chill, even for the season. Tazeiko Imbiswa walked down the once-familiar streets of the Nyanza Market. The air was thick with a fine, ochre dust that coated the empty stalls and dimmed the light of dawn.\n\nShe looked out to the wharfs, once bustling with stalls and hawkers, the jetties lacking the usual throng of incoming ships. They were now empty, save for refugee tents and sleeping figures huddling on the ground. The port was still, the docks clear. The saltwater horizon was a blur, the islands of Vyzemby not just distant, but swallowed by the pale, dusty haze.\n\nShe passed one of the Efergezmu worker crews. Human and halfling men were shouting at each other over a broken wall, the prototype honeycomb assembly clearly unstable. As she neared her shop, she passed the old smuggling tunnel she’d played in as a child. It was boarded up. Three young lizardfolk children sat before it with bowls. A passing patrol looked at them, and one spat before the other two dragged him away. Even from this distance, she could see tears in the eyes of the waifs.\n\nShe arrived at her shop, unlocked the door, and, as she had for years, began working the heavy millet dough. With movements practiced by decades of work, tutored by parents who were tutored by theirs, her dark hands shaping the small, flat, clove-spiced loaves that used to sell out by noon, and carried it to the hearth-oven, the clay-mouth radiating warmth. But the people who frequented her shop were fewer each day. Ever since Kuiika had taken the farmland, refugees had flooded the city with no way to make a living.\n\nAs dusk fell, she thought back. Five years ago, they were all so hopeful. Before the traitorous defeat of the lazy Chibuswa. Before Aramoole reigned in Gomuvuri. Before Kuiika took field after field, stopping only at the gates of Bivuzena itself. They were only saved by Iqhekabi’s wisdom and Zuvavim’s jealousy. The markets were full of ghosts from those days, and the Medawor had done nothing.\n\nShe locked up her shop and slogged back to her abode, her pack on her shoulder. As she passed the old smuggling hole, she kneeled beside the lizardfolk, who cowered. She held out a wizened hand. In it were several pieces of spiced bread that had not been sold."
 flavour_zena.1.a:0 "If we are to survive, we will have to do it together."
 zena_nyanza_market_level_one:0 "The Nyanza Market (I)"
 zena_nyanza_market_level_one_desc:0 "As of now, the once-bustling Nyanza Market has been reduced to a shantytown full of refugee tents and sleeping figures, with guards patrolling often. \n\nAs an independent Bivuzena recovers, the Nyanza Market may be restored to her former glory."

 flavour_zena.2.t:0 "Restoration of Balance"
 flavour_zena.2.d:0 "A letter has come to your court, from [From.Monarch.GetTitle] [From.Monarch.GetName]. You open it, and read:\n\n“It is with a heavy heart that I write to you, [Root.Monarch.GetName]. I know that your wise words stayed the hand of Kuiika at the gates of Bivuzena. I appeal to you in the hope that wisdom will prevail again. The balance of power in Horashesh has been broken. Do you believe Kuiika will stop their brutal expansion at the gates of Bivuzena, or will their eyes inevitably turn north? Do you believe Zuvavim will allow the wealth of the Dao Nako trade to flow from the sea inland, or will they hoard their wealth to themselves? I say to you, down with the Medawor! We will stand with you against the Kheteratan Empire, if you join with us to restore our borders to their rightful state. I implore you, let us form an alliance, and begin walking on the road to the Horashesh we deserve to live in.”\n\nHow shall you respond?"
 flavour_zena.2.a:0 "Yes, we will stand together."
 flavour_zena.2.b:0 "Yes, we will work together. But you will bend the knee first."

 flavour_zena.3.t:0 "The Lone Inheritors of Horashesh"
 flavour_zena.3.d:0 "Our potential allies in Iqhekabi have been vanquished. The nobles of distant Kheterat… I know they are aware of the goings-on here in Horashesh, despite their weakened hold on our lands. The spies of the Kheteratan Empire are numerous, and despite my best efforts, the Medawor still hold some sway. They are nervous, scared. Kuiika and Zuvavim have seen what we are capable of when we are cornered, and are rightfully terrified. A Horashesh made up not of squabbling independent tribes, but unified and led by a glorious leader, the kind the griots sing of? It is their worst nightmare. Very well. I shall become that nightmare. We will stand triumphant over the entirety of Horashesh, and declare the rebirth of our confederation - a united Horashesh once more! And if any dare to stand in our way?"
 flavour_zena.3.a:0 "They will surrender, or feel our wrath."
 zena_quest_for_united_horashesh:0 "Quest for a United Horashesh"

 flavour_zena.4.t:0 "Not At All"
 flavour_zena.4.d:0 "Unity. We know better than any the meaning of the word. We have made a lasting peace with the lizardfolk, which no other people in Horashesh have managed. We have built our cities with the ancient knowledge of the halflings and filled it with relics from across Sarhal. Our streets are paved by hands that were willing to pitch in when they had lost everything but their own ability to work. And now Iqhekabi believes they are more deserving than us to be in charge? What have they done to prove their aptitude for leadership, other than failing to hold back the tyrants of Kheterata? The Irsukuba people were defeated by the Zuvunwa once, and they will be again. They think us weak? No. This alliance has served its purpose. Enough is enough."
 flavour_zena.4.a:0 "You underestimate my power!"
 flavour_zena.4.war_tt:0 "In §Y3§! months, begin a §Rwar§! against @L05§YIqhekabi§!. The victor will take all of the lands of the vanquished and get §Y'Quest for a United Horashesh'§! for §Y20 years§!, giving the following effects: \nDiscipline: §G+5.0%§! \nShip Durability: §G+5.0%§! \nProvince War Score Cost: §G-5.0%§!"

 flavour_zena.5.t:0 "Not At All"
 flavour_zena.5.d:0 "Our impudent ‘allies’ to the south believe they deserve the honour of being called the true heirs of an independent Horashesh. Who was it that has fought for years against the Kheteratan Empire? Who was it that fought against the lizardfolk? It was not Zena. It was us. This alliance served us well for a time, but that time is over. For all their silver-tongued words, we knew it would come to this eventually."
 flavour_zena.5.a:0 "It’s over! I have the high ground!"
 zena_iqhekabi_war_soon_tt:0 "§YZena§! will declare §Rwar§! on us within §Y2§! months! The victor will take all of the lands of the vanquished and get §Y'Quest for a United Horashesh'§! for §Y20 years§!, giving the following effects: \nDiscipline: §G+5.0%§! \nShip Durability: §G+5.0%§! \nProvince War Score Cost: §G-5.0%§!"

 flavour_zena.6.t:0 "War Against Iqhekabi"
 flavour_zena.6.d:0 "This should be hidden! If you are seeing this and didn't just load your save, please make a bug report on the discord!"
 flavour_zena.6.a:0 "<3"

 flavour_zena.7.t:0 "Partnership with Zena"
 flavour_zena.7.d:0 "The [S15.Monarch.GetTitle] is meeting with the [FROM.Monarch.GetTitle] of Zena aboard one of our floating cities. He has made the long journey to our shores in the hope of negotiating a stronger trade partnership with us:\n\n“Our partnership with your people is beyond profitable. Your wood, fish, gold, sugar, and cocoa are exchanged for our paper, cloves, silk and wool to our mutual profit. More and more of our merchant princes visit the main trading platform in [G15.Capital.GetName] every year, and the trade of goods and ideas flows freely between our two realms. To strengthen this connection, let us negotiate a treaty to bind us even closer together. There are others arriving on your shores from across Halcann who we know greedily covet your lands, and will not respect your ways or the Effelai the way we do. If you are amenable to this, we will protect you from these invaders, and both our nations will continue to profit.”\n\nWhat should we reply to this unprecedented offer?"
 flavour_zena.7.a:0 "As Chahinanito’s Chosen, we would be honoured!"
 flavour_zena.7.b:0 "The current status is sufficient for our needs."

 flavour_zena.9.t:0 "The Longest Distance Between Two Places"
 flavour_zena.9.d:0 "The sun of a new dawn shone brightly on Bivuzena, as a sea breeze carried the scent of salt into the slitted nostrils of Nulri Imbiswa. She hurried down the streets of the Nyanza Market, her bag clutched in a scaled hand, a smile playing across her face as she double-checked for the key to the bakery. She looked at the gold and orange drapery gleaming from the honeycomb constructions of the Skyline, the blue roses in planters, and took a deep breath of gratitude. She dodged out of the way of a goldscaled kobold child, who was pointing and laughing at the elephant horn bellowing from the Menagerie. His parents desperately tried to follow.\n\nThe air was full with the hum of countless conversations. She looked out towards the Vyzemby islands beyond the Seahorse Sea, and the empty blue expanse behind them, and she could swear she saw in her mind's eye her wife, a diminutive halfling figure, standing proudly on a large wooden platform sailing along a river, the jungle singing around her, comparing notes with the dark-skinned, blue-and-turquoise-haired Paruran elves and other old friends who had joined the Chahinanito faith.\n\nAs her gaze fell closer to the shore, she saw an orc sailor sitting on the dock, playing a game of chess with one of the merfolk, the elven half of their body propped up by their elbows, intently studying the game. The patter of hooves broke her contemplative streak as she stepped off of the stoneway, nodding towards a group of centaurs on the street, headed towards the Medaka’s Exceptional Treasures. She continued on her way, passing by an old smuggling hole. A lifetime ago, she had cowered there with her siblings, bowls empty and bellies aching. But now, the boards had been removed, and the walls were teeming with artwork. A ginger harimari and a grey-furred gnoll with paint buckets were discussing how repainting the tunnels was both a way of increasing Chi and honouring Kvanga.\n\nShe hurried to the shop left to her by her adoptive mother, who had no children of her own. And as she was taught by her, and she was taught by her parents, began shaping the small, flat, clove-spiced loaves and carried them to the hearth-oven, the clay-mouth radiating warmth.\n\nAnd the loaves sold out by noon. And there was no sign of the Khet’s influence over the city. And the people were together."
 flavour_zena.9.a:0 "And Bivuzena was an inspiration to all of Tanib-Dajek."
 zena_jewel_tanib_dajek:0 "The Jewel of Tanib-Dajek"
 zena_jewel_tanib_dajek_desc:0 "We hold [5847.GetName], a shining city full of wonders. We are truly the envy of all within Tanib-Dajek!"
 zena_colonial_race_spreading_tt:0 "All Pops with Large Minority in Bivuzena: \n  Every §YColonial Nation§! Capital: \n   §GAdds/Increases§! §YMinority Size§!"
