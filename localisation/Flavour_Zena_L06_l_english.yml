 zena_blorc_trophy2:0 "Trophy Pile"

 flavour_zena.31.t:0 "Nuzurbokhian Crofters"
 flavour_zena.31.d:0 "Nuzurbokh. Beyond the Serpentspine lies the home of the centaur Tempestcallers. Through magic, they found communion with their deity Irdaeos and mastered the elements of wind and lightning, one of the many dangers of the region. The strongest of these were the Storm Kings - powerful shamans who give up their name to become the next in a line of Storm Kings when they are chosen by the Stormbringer, a roc with unparalleled mastery over lightning. In a land dotted with many rivers, the centaurs of Nuzurbokh have taken advantage of the terrain and created small, semi-permanent shelters on the water, where they are safe from the storms and ready to be mobilized for war.\n\nAzaly visited one of these villages, keen to find methods to protect Bivzuena from coastal monsoons. Small segments of arable land with simple houses made of wood and stone, designed to be quickly assembled and disassembled in times of war, were not anything particularly impressive, but what did surprise him was their revolutionary use of geoglyphs. By infusing these patterns, physically carved into the plains to honour Irdaeos, with a precise combination of evocation and transmutation magic, they could protect their settlements from natural disasters, just as if a Tempestcaller was always present. Azaly requested a delegation from the Conclave of Tempestcallers to come to Bivuzena to exchange knowledge; now, new settlements can be established on our river tributaries, littered with patterns carved into stone and soil, warding off storms and floods."
 flavour_zena.31.a:0 "These Storm Kings must have many tales for our griots to learn!"
