 flavour_zena.53.t:0 "The Landfish of Randrunnse"
 flavour_zena.53.d:0 "“The temperate forests and plains of Eordand are pretty damn weird, even before you factor in the influence of the Fey. The druidic magic there means you can walk ten paces and step into an entirely different season. I grew up in Bivuzena, fishing the coast, so imagine my surprise when Kiusz and I happened upon several small, shark-like creatures with greenish-brown scales and ethereal purple underbellies floating in the air, munching on the leaves of trees.\n\nThinking that we’d found an easy dinner, it was fortunate that we were being tailed by several of the Gelcollers. They stopped and warned us that if we caught and ate them without properly preparing them first, we’d be vomiting in hours, and dead within days. Kiusz didn’t think much of it, figuring his lizard gut could handle it, and signed several colourful phrases about the natives trying to prevent him from having dinner. But I didn’t have lizard guts, now did I? So I thought I’d go with ‘em and ask how exactly they eat the damn things.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 3."
 flavour_zena.53.a:0 "How peculiar."
 flavour_zena.60.t:0 "A Fermented Preparation"
 flavour_zena.60.d:0 "“Turns out, you gotta wait weeks to make these landfish edible. Something in those float-sacs is poisonous, but they can get rid of it. Now, they call it a delicacy, but I’ll be honest, when they handed me a cube of the stuff, it smelled like the backend of a corpse. And I’ve smelled plenty.\n\nBut, when you eat it, it’s sweet, nutty and only faintly fishy. After a couple of ‘em, they weren’t too bad. Kiusz chowed down with gusto, signing an apology to me for underestimating the fish. The process to prepare them is a damn nightmare, though. After catching them with nets attached to long poles - an easy task, considering the things are docile as cows -, the Gelcoller Ruinborn would place it in a hole filled with sand and brine, then cover it in more sand and gravel to press the poison out for a couple weeks. After that, you pull it out, cut it in pieces, and hang it to dry for several months. I don’t want to think about how many people died figuring out exactly how long they needed to wait for each step. Anyway, we figured floating fish would be a hit at the Menagerie, and we could always have adventurous visitors try the fermented meat at concession stands, as well. Catching the landfish was easy. Keeping them on the boat without floating away on the way back to Bivuzena was the hard part.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 3."
 flavour_zena.60.a:0 "How… delicious?"
 zena_landfish_province:0 "Landfish School"
 zena_landfish_province_desc:0 "Floating in the air in droves, this province is home to a vast quantity of landfish"
 zena_landfish_marquee:0 "Marquee Animal: Landfish"
 zena_landfish_marquee_desc:0 "The floating Landfish of North Aelantir are currently the marquee animal of Medaka's Majestic Menagerie"
 zena_landfish_upgraded_marquee:0 "Marquee Animal: Landfish"
 zena_landfish_upgraded_marquee_desc:0 "The floating Landfish of North Aelantir are currently the marquee animal of Medaka's Majestic Menagerie"

 flavour_zena.54.t:0 "The Naugsvoler Varghunda"
 flavour_zena.54.d:0 "“The cold winters of Gerudia are a damn sight different from the heat of Zena. Kiusz complained more than anyone about the chill, likely due to his cold blood. Well, nothing better to warm you up than a good dog.\n\nThe northerners are well-accustomed to the climate, as are their animals. With cattle bred to survive the harsh frosty winters, they needed herders that could chase off the dangerous creatures of the ice. Enter the Varghund. Once simple working dogs, they have been cross-bred with the Snow Wargs of the Gray Orcs to create massive beasts - capable of herding and protecting their charges and fiercely loyal to their owners. With grey-white fur and brilliant blue eyes, we even heard tavern tales of them following berserkers into battle, fangs bared. The only question was: how exactly were we supposed to steal a dog that can bite through plate mail and bring it back to the Menagerie?”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 5."
 flavour_zena.54.a:0 "Big dog!"
 flavour_zena.61.t:0 "Winter Hunt"
 flavour_zena.61.d:0 "“Kiusz thought that we should just find some ‘damaged goods’ or rejects from a breeder and ask for them, which I waved off. No, we needed the real deal here. Fortunately, there were occasionally wild Varghunda packs formed by runaways or dogs whose masters had died.\n\nWe took to the hunt, looking for tracks and signs of their meals, and following them to a den. Taking on the whole pack would’ve amounted to suicide, even for hunters as skilled as us. We laid in the snow for days on lookout, staying downwind, constantly observing. Finally, one broke off from the pack, and we managed to tag it with a sleeping concoction and haul it aboard our ship waiting in port in Naugsvol. It caused a fair share of trouble on the voyage back to Bivuzena, almost breaking a mast with its powerful frame, but it eventually settled into its enclosure - an artificial meadow filled with blue roses in the Menagerie. I marked the location of the den on the map just in case we ever need more.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 5."
 flavour_zena.61.a:0 "Truly man’s best friend."
 zena_varghund_province:0 "Varghunda"
 zena_varghund_province_desc:0 "Once simple working dogs, the people of Naugsvol have cross-bred with Snow-Wargs to create behemoth herding companions"
