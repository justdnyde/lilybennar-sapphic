 flavour_zena.58.t:0 "Kanolowele Ghosts"
 flavour_zena.58.d:0 "“My ancestors hunted beasts once. Through blade and banter, they acquired several astounding creatures for the Menagerie. I unfortunately lack their rugged constitution, but in a new world, Bivuzena requires new skills. My botanical studies have led me beyond the stormwall, called the Kiamoa by the locals inside, to the land of Kanolowele, an archipelago in the north of this newfound continent.\n\nI have taken up residence with the Maxkanil Momi, masters of the coral reefs. Their songs are uplifting as I continue my research, and their stewardship of the ocean is astounding. They speak of entire islands made of corals in the south of Insyaa, and preserve colonies of polyps from there, colored a pale blue-white like ghosts. I desire to study these colony organisms further, hoping to begin an underwater segment of the Medaka’s Magnificent Menagerie - a gift for the Merfolk who call our lands home.”\n\n    - Notes from Field Researcher Anase Kazuru."
 flavour_zena.58.a:0 "What’s a zoo without an aquarium?"
 flavour_zena.65.t:0 "The Sum of Many Waves"
 flavour_zena.65.d:0 "“I am truly impressed by the rigor of the people of Maxkanil Momi. Unlike many of their peers in the archipelago, they do not have a Dragon Turtle of their own to carry their memories. Instead, they travel the floating corals, gathering up the stories, dreams, and hopes of all the people of the Insyaan coasts. This dedication to diversity reminds me much of Bivuzena herself, and I can’t wait to bring back all the stories I’ve heard and written down.\n\nThis peculiar lifestyle is also mirrored by the Ghost Corals. As I studied them further, I discovered that they have a dualistic life-cycle; they spend part of their lives as standard coral, and part of their lives as free floating polyps. Eventually, they settle down, find their right home, and begin a chain reaction of linking with others, creating the artificial islands I mentioned before. With enough skill, one can even manipulate them into polyp form early, then reconstitute them back into their coral form, creating miniature islands of any shape. This is a time-consuming and delicate process, however. Go too quick, try to take a shortcut, and the entire thing falls apart. I have spent months nurturing one colony, and my hope is to take it back to Bivuzena, and have them thrive in their new home. Through gentle coaxing, patience, and good old-fashioned kindness, I hope to fashion a place for a new life form.”\n\n    - Notes from Field Researcher Anase Kazuru."
 flavour_zena.65.a:0 "All wayward souls are welcome to find their homes in Bivuzena"
 zena_ghost_coral_province:0 "Ghost Corals"
 zena_ghost_coral_province_desc:0 "The stark-white coral reefs of this province are painstakingly taken care of"
