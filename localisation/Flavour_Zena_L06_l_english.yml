 flavour_zena.28.t:0 "Toxasag-Akaz Oases"
 flavour_zena.28.d:0 "Built by the Brrtekuh pack, the gnollish Life-Giver Fortresses are scattered throughout the Western Krahway. Made of stone and enclosed by concentric walls that rise in height towards the center, they break the harsh winds and sands of the Salahad, protecting the invaluable oases contained within their ramparts. Not only does this design allow the inhabitants of the fortress to tame the dangers of the desert, it also gives a strategic edge over rivals, forcing them to either scale the formidable walls and capture the oases or to take a different, often longer and deadlier route through the Salahad.\n\nWhile the desert is not a danger within the walls of Bivuzena, this design can be repurposed to protect from the harsh winds of the monsoons that occasionally crash down from the Seahorse Sea, as well as increasing protection from any who would attempt to siege our city. During a diplomatic mission to a clan inhabiting a Toxasag-Akaz, Azaly noted that an improvement could be made on the design by introducing miniscule gaps within the stonework such that a small portion of the wind could be allowed through, reducing turbulence by letting the air currents merge more gently on the other side. A Rram Zelag and their apprentices have traveled with Azaly to Bivuzena to oversee the implementation of these experimental modifications, and determine if they can be of use back in their arid home."
 flavour_zena.28.a:0 "Our city, an oasis to all who live there!"
 zena_toxasag_akaz_tt:0 "Every owned or subject province with the §YArid§! Climate gains:"
 zena_toxasag_akaz_trigger_tt:0 "Any known country:\n   Has at least §Y1§! Gnollish Minority or Majority"

 flavour_zena.29.t:0 "Dragonnel Woodworking"
 flavour_zena.29.d:0 "The myriad alien wildlife in Nomsyulhan is infamously impossible to tame, which is why it was so impressive when several centuries after the Day of Ashen Skies, the hobgoblins of the Tearing Talon clan managed to secure a batch of Dragonnel eggs, raise them by hand, and domesticate them over several generations. While many Eagle Hobgoblin clans use them for the sake of warfare, with mages and warlords breeding ever more ferocious varieties, certain tribes have turned their noble beasts to a more domestic use.\n\nAzaly travelled through the ancient forests of the Green Vale with members of the Nunsan Banbe, who had revolted against Nutean Kezen, a brutal and despicable clan, in 1432 AA. With the massive precursor structure of the Garden Spire looming in the distance, the hobgoblins and Nuzenapu harpies that were his guides showed him how the forest's trees were infused with magic, regenerating lost bark and limbs at unnatural speeds. The comparisons to the Effelai that Azaly knew well were met with uncomprehending shrugs. Azaly was bid to watch as a hobgoblin carved a pattern into the wood, then had his dragonnel mount lightly scorch the surface with its breath, cauterizing the design and thus preventing the tree's regeneration, leaving a purple-blue glowing artwork. After bringing back several of these wood carvings to the Medaka’s Exceptional Initiative, the [Root.Monarch.GetTitle] has has invited members of the Nunsan Banbe to Bivuzena to source more of this Dragonnel-fired wood, as well as to see if they can replicate this art within the jungles of the Effelai. However, our request for dragonnel eggs to raise within the Menagerie was politely, but firmly, denied."
 flavour_zena.29.a:0 "Do the forests of Nomsyulhan sing as well?"
 zena_dragonnel_woodworking_tt:0 "Every owned or subject province that produces §YExotic Wood§! or with §YAncient Woods§! terrain gains:"
 zena_dragonnel_woodworking_trigger_tt:0 "Any known country:\n Owns any province with §YAncient Forest§! Terrain\n One of the following must be true:\n    The primary culture is §YEagle Hobgoblin§!\n   §YEagle Hobgoblin§! is an accepted culture\n   Any owned province:\n     The culture is §YEagle Hobgoblin§!"

 flavour_zena.30.t:0 "Legends of the Kol Doukang"
 flavour_zena.30.d:0 "The line between bravery and stupidity is often a thin one. Both are quite close to insanity as well, which may be what protected Azaly as he walked right through the throng of Highhold Orcs into the great assembly hall of Amlharaz with the goal of studying its architecture as well as the remaining records left from the dwarves of old. With a ceiling that almost seemed to disappear into the sky, especially to his diminutive halfling form, and a table filled with great feasts, scattered gems, weapons, and loot that may as well have been a city unto itself, the Kol Doukang - Hall of War - was an impressive sight. Once the greatest of the great halls of the ancient Dwarovar, it had become a chaotic mix of a war room, a fighting pit, and a tavern for the carousing orcs of the Shattered Crown clan.\n\nWhile we generally prefer the quill to the sword, it is inevitable that we protect our borders, and of course fight against the Kheteratan Empire who still desires to reestablish their control over Horashesh. After returning to Bivuzena alongside several orcs who were fascinated by the inquisitive halfling, the Kol Doukang and the likely exaggerated legends of the loot within have been used as a model for a command center within the governmental structure of Bivuzena. This will allow generals to gather with the rulers of our nation to plan battles - and soldiers to feast in victory."
 flavour_zena.30.a:0 "To [Root.GetName]! To triumph! To victory!"
