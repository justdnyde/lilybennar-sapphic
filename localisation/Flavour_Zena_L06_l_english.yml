 flavour_zena.52.t:0 "The Cheetahs of Chendhya"
 flavour_zena.52.d:0 "“Now, I wasn’t about to convert to the Chahinanito faith anytime soon, and neither was Kiusz. So when [Root.Monarch.GetName] told us to fetch an animal for the Menagerie in this new continent while the jungles of the Effelai were off-limits, well, we thought we were done for.\n\nBut as luck would have it, if you sailed all the damn way around, you’d come across a nice little forest and lake, and deeper inland, a plain with some nice beauties. Now, these critters weren’t anywhere near as exotic as the stuff Kiusz and I found later in our travels, but they were good starting points. We found several tribes in Chendhya who rode jaguars, some powerful and mighty, but some sleek, speedy beasts with bright blue eyes: the Apaxagaeda. The Kaeorg tribe was chief among these riders, and, despite their initial hesitation given Kiusz’ scaled hide, were noble folks. We lived among them for years, learning their customs and faith. They considered themselves the most devout of the Chendhyans, and Kiusz and I regularly hunted with them and partook in their rituals.\n\nUpon the slaughter of the various big game in the plains it was customary to honor their sacrifice and assist the liberation of their souls. We sat around their fires and discovered the stories of their past from their Sadaun, or priests, and shared the stories of our Noukahi heroes. Near the end of our time with them, they were even debating whether to teach us how to ride their Apaxagaeda. But some secrets are far too precious to share within these pages.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 2."
 flavour_zena.52.a:0 "Bloody big cats!"
 flavour_zena.59.t:0 "The Lame Cubs"
 flavour_zena.59.d:0 "“Now, I won’t lie. When Kiusz signed to me several years down the line, asking how we planned on getting one of the Keorg’s sacred mounts, I didn’t have a damn clue. But, luck always finds a way for us two.\n\nTurned out one of their females had a litter of cubs, and two of ‘em were runts. Well, that wouldn’t do for the Chendhyans, who needed to ride them, but me and my bleeding heart spoke up, especially considering what we had learned about their culture. Said that I was willing to take ‘em off their hands. After all, nobody back home would know they were runts, and I’d hate to see the little guys put down or released into the wild to starve. We spoke to the Udmanaebeg of the tribe, and convinced them that we could nurture their spirits, and strengthen their souls, or Aed. That they would find more freedom in life, entertaining droves of folks back home in a wide open encampment. They acquiesced, and the little guys ended up curling in our laps the whole ship ride home. And that is how we acquired our first ‘catch.’ Sheer dumb luck, and the appreciation of a new people’s faith.”\n\n    - The Autobiography of Fauna Hunter Bastirai Kazuru, Chapter 2."
 flavour_zena.59.a:0 "To the Menagerie!"
 zena_cheetahs_province:0 "Cheetah Pack"
 zena_cheetahs_province_desc:0 "This province has a large amount of Apaxagaeda residing within its borders"
 zena_cheetahs_marquee:0 "Marquee Animal: Cheetahs"
 zena_cheetahs_marquee_desc:0 "The Apaxagaeda of South Aelantir are currently the marquee animal of Medaka's Majestic Menagerie"
