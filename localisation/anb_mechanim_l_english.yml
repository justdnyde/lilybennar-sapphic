 mycobiological_holohana_wards:0 "Mycobiological Holohana Wards"
 mycobiological_holohana_wards_desc:0 "The wards here are gross perversions of conventional ones, created by grim experimentation with the Holohana-devouring fungi of Vandamalos. They maintain the autonomy of the warded land and will dissolve if the territory ever changes hands."

 golodh_vision_ai:0 "Golodh's Vision"
 golodh_vision_ai_desc:0 "Golodh will see all Insyaa under his control, and all Mechanim brought to the truth of what they are: mere tools in his hand."

 i_numbe_conversion_conquest:0 "Recovering from I-Numbe"
 i_numbe_conversion_conquest_desc:0 "Recovering from I-Numbe's grotesque rule, the mechanim here are shattered. It will be easier than usual to bring the province under our control."

