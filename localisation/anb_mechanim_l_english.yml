 mechanim_spawn_coming_tt:0 "Over the next §Y25§! years, wandering Mechanim tribes will start to settle near the §YGene Pillars§!."

 mechanim_events.101.t:0 "Mechanim Settlement Event"
 mechanim_events.101.d:0 "Mechanim settle."
 mechanim_events.101.a:0 "Good."

 mechanim_events.102.t:0 "The Mushroom Forest Succumbs"
 mechanim_events.102.d:0 "I Numbe has taken over even more of the Mushroom Forest that is Vandamalos! A dread land now has been drawn even further into darkness."
 mechanim_events.102.a:0 "And only deeper horrors lay ahead..."

