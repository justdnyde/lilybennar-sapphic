 AYN_qeyikul_desc_no_owned_warband_guryadagga_tt:0 "If we fight a §YSmall Warband§! we will get\n§G+5 Prestige\n+1 Qeyikul Reputation§!\nIf we fight a §YMedium Warband§! we will get\n§G+10 Prestige\n+1 Qeyikul Reputation\n+25 Opinion with Guryadaggan Nations\n+50 Crowns\nOne 33.0% Cheaper Migration\n-25.0% Add Tribal Land Cost in Current Capital§!\n and if we fight a §YLarge Warband§! we will get\n§G+15 Prestige\n+2 Qeyikul Reputation\n+50 Opinion with Guryadaggan Nations\n+75 Crowns\n+5.0% Discipline\n+5 Trust with all Guryadaggan Nations\n-50 Devastation in Capital\nMake Current Province Tribal Land§!\n\n However if we lose we will gain §RDevastation in the target province\nLose Qeyikul Reputation\nMil power\nOur Subjects will become Disloyal\nAnd Lose Prestige§!\ndepending on the size of the §YWarband§!"

