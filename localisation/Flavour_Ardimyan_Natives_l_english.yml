 ### Generic Mission locs
 AYN_1_2_title:0 "Eternal Enemies"
 AYN_1_2_desc:0 "Ever since the Dissipation our lands have been plagued by the Qeyikul. Creatures from the infernal plane summoned via a gaping hole in the desert, studded by tall finger-like rock stacks, ripped open by Alahmar the Crimson and Almadhab the Golden in their treacherous rebellion against our Empress-that-was - their exalted mother, Ardimya the Great. \n\nMerely laying eyes upon them elicits a deep sense of revulsion, with their bloated heads sporting undersized, yet bulging eyes, pupils constantly refocusing as they strain to find life to rip asunder. A cavernous mouth studded with fleshly horns and razor-sharp teeth, coated with strips of human flesh. A plethora of wings, seemingly grafted on, clump to their back, twisting and being degloved and torn out as the monsters fly. Their chests torn, leaving a hole in place of a heart. Four disproportionate arms, skin stretched thin over the muscles and spikes sprouting out of their wrists and elbows. Small clawed legs, strong enough to pull the intestines out of a man.\n\nMore so than anything sentient, those things are our enemies. We have dedicated lifetimes to this endless struggle, chaining countless souls to a shared regret. For the war has not been won."

 AYN_1_3_title:0 "Military Innovations"
 AYN_1_3_desc:0 "We have fought the Qeyikul for countless years, and over time our people have gradually developed tactics to defeat these brainless, unchanging brutes. One, primarily employed in the southern plains, involves the massed use of the Ardimyan Warbow.  Each is a weapon around the height of a man, taking years if not decades to master, but with a well placed shot, they pack enough power to take out a Qeyikul from a reasonable distance. Along with this, all across the Jasiir Doog, a rather odd tactic we employ is the Quub Sembara or Safety Dance, a rhythmical synchronised movement. When performed perfectly it renders the dancers difficult to detect by the Qeyikul. The Quub Sembara is primarily used by noncombatants to stay hidden while the warriors fight against the demons. Like the warbow this skill takes a lifetime to learn, and few have ever been known to master both. Herein lies the problem with our war on terror: the skill involved in fighting the Qeyikul requires too much time. Even if most warriors were to slay fifty Qeyikul each, with the last breath of our people the Qeyikul would still reign over the lands of Ardimya."

 AYN_1_4_title:0 "Pillage Non-Believers"
 AYN_1_4_desc:0 "The gashinma, or savages, who live on the Jasiir Doog, the old core territories of the Sultanate which are no longer populated by ‘civilised’ nations, should disgust any sane person who sees them. These traitors who turned their backs on the djinn and now worship local spirits and fickle gods. However, much as it pains us, they are also scions of Ardimya and we cannot kill them indiscriminately. Instead we shall demand a tribute from them for the privilege of living in our tribal land, and offer them more protection and less tribute obligations if they decide to join us in the worship of our great Empress-That-Was Ardimya."

 AYN_2_5_title:0 "Ardmiyan Prosperity"
 AYN_2_5_desc:0 "As we vanquish the hordes of Qeyikul from our lands, these lands begin to bloom anew. Dotting the lands of Ardimya are farms and homesteads, filled with friendly faces cultivating and selling balsam, goats, sorghum and more goods for us to enjoy. Along with this, our way of life has become more lavish, changing as our people become more acquainted with foreign traders. Daring traders have begun to visit our lands, bringing their wares and stories with them. From Dakinshi gems and gold, which are used to decorate gers and saddles, grains from the Mengi and silks from Haless, all manner of foreign goods have arrived at our shores. And how our people now lead their lives is nearly unrecognisable to the growing number of elders who remember the old ways."

 AYN_3_2_title:0 "Convene A Council"
 AYN_3_2_desc:0 "Ardimya cannot be ruled by a single person, it is simply too vast and empty.  Messages take weeks, if not months, to reach their destination. All this means that we must not attempt to rule absolutely but trust our brothers to rule their tribes skillfully whilst we take on a more comprehensive perspective and prepare for the time where we can truly reunify the tribes and rebuild our fallen empire.\n\nWe have sent out our representatives and we have received messages from the largest tribes roaming Ardimya that they will attend our firepit and listen to our bold proposal to ensure our continued existence."

 AYN_3_3_title:0 "Walaalay Bonds"
 AYN_3_3_desc:0 "Despite the squabbling and disputes between the tribes, all who live in the ruins of the old Jinnakah Vizierate are brethren, or Walaalay, and all Walaalay know that no matter what animosities might arise between them, should even one Qeyikul be sighted they will stand side by side to defeat the demon spawn. This understanding between us has allowed our people to survive during this millennium of suffering. We might well seize the opportunity provided by our recent successes and turn this accord into a deeper bond between the tribes, designed to bring them peacefully under our suzerainty. Alternatively, we could burn these bridges with our kin and use the chaos to force the other tribes under our rule, whether they want to or not."

 AYN_3_4_title:0 "Utter Domination"
 AYN_3_4_desc:0 "We have brought the continent under our dominion, establishing secure routes between each of our tribes’ domains, creating a new system to communicate whilst avoiding the Qeyikul, and uniting the Guryadaggans like no-one else has done since the fall of the Jinnakah Vizierate.\n\nOur goal now must be to strengthen and reinvigorate the lands we own instead of rushing to open new frontiers in the still untamed wilderness around us. And ultimately, we shall delve into the secrets of our past and return the Vizierate back to its former glory."

 AYN_3_6_title:0 "The-Empire- That-Was"
 AYN_3_6_desc:0 "Grand waterways snaking through the land bring life to the sandy soil. Golden cities that rise high above the ground, in which walk the wise and the faithful, protected from the ravages of desert and foes alike by the arcane marvels wrought by lost wish magic. Relics full of splendour and secret powers, which create truth from desire. All men are one under her peace and her plenty.\nAll these things are whispered of in our stories.\nAnd a thousand years we have dreamed of these glories.\nSoon, at last, Jinnakah will no longer be The-Empire-That-Was"

 AYN_4_1_title:0 "Reaching Out"
 AYN_4_1_desc:0 "This land we used to call ours is now a desolate wasteland, only sparsely inhabited due to the chaos that followed Ardimya’s dissipation and the depredations of the Qeyikul. We know of a few larger tribes, like ourselves, who also roam the old domains of Jinnakah aimlessly. However, the time for change is now. The neighboring Baashidi grow increasingly decadent whilst our civilization is forsaken and our faith abandoned. This must change, we have to reach out to the rest of the survivors around Ardimya and forge strong bonds to help pull ourselves into this new era."

 S85_4_2_title:0 "The Genie Lovers"
 S85_4_2_desc:0 "After the Collapse of the Sultanate, our ancestors did not stay complacent. The Vizierate still expanded, bringing stories of the Genies to new lands, where among some they are still kept in high regard. While this respect however does not lead to many fellow worshippers of the Genies, it still creates a special relationship between our peoples, those who still reside in the Seat of the Djinn, and those who still respect the Vizierate and our stories of the Djinn.\n\nIn the first Vizierate colony amongst the Dakinshi, Kaziradoka, Genie Cultists remain not uncommon. We should capitalise on this and formalise a bilateral treaty between our two peoples, with our recognition as the keepers of the Seat of the Djinn elevating their prestige above their bellicose neighbours, and us benefiting from their experience in warfare which we shall put to good use in the struggle to unite our brothers, whether through peaceful means or war."

 S85_5_2_title:0 "The Dead City"
 S85_5_2_desc:0 "For centuries we have struggled to survive in the ruins of once great Ardim Qarast. We have walked every inch of its ruined halls in search of some ancient remnant that would save us. And we have long wished for this once grand city to return to its former glory, but alas, it has only continued to waste away. Most have given up hope and begun to wander the sands like the rest of our Guryadagga brethren. \n\nBut now, something momentous has changed, for the mages of our tribe have made a discovery, a hidden merfolk settlement under our city, found by chance by mages divining for clean water. The settlement surrounded the half-submerged bottom half of an old mechanism of the Jinnakah Sultanate. The air filled top half of the cavernous space was laced with gold and arcane carvings, its access routes long sealed off from the surface by an unfortunate building collapse. By utilising the arcane might remaining in this artifact, we may be able to slowly revitalise the city, or so say our mages.\n\nWe must pounce on this opportunity with utmost haste. Ardimya's great city cannot be allowed to rot any further! "

 S85_5_3_title:0 "A Magical Land"
 S85_5_3_desc:0 "Since the rediscovery of the ancient mechanism beneath our home, much work has been done to clear a path to the surface, and subsequently we have spent long days and nights attempting to decipher its secrets. Alas, the mechanism was not meant to create clean fresh water to refill the empty canals of the city, but it turned out to be instead the source of the city's invisibility ward, which once upon a time protected it from invaders and privateers alike.\n\nYet this insight has allowed us to make a breakthrough, as we have learnt how to copy the ancient enchantment of invisibility, albeit far weaker than it originally was and now only capable of obscuring the forms of around four people. Regardless, this ability could still prove useful and allow us to perform some nefarious acts without fear of detection."

 S86_4_2_title:0 "Defending Our Borders"
 S86_4_2_desc:0 "This land belongs to the children of Ardimya, and these fools who have settled in Baashi Badda do not recognise this truth, instead slowly pushing their settlements ever closer to our Djinnsland. Perhaps it is time to remind them that, despite their deep pockets, it is us, the battle-hardened people of Ardimya, who own the land they now claim and it is us who protect their lands from the infernal menace. We shall give them a small taste of what we go through each and every day. And while we are at it we might as well tear up their delicate garments and melt down their golden crowns."

 S86_5_2_title:0 "Honour Our Ancestors"
 S86_5_2_desc:0 "We are the heirs of traitors. This bitter truth lingers in the hearts of all Wattoi.\n\nWhen Ardimya’s reign was under threat from Alahmar and Almadhab our forefathers sided with the traitor brothers. For this we have ever since attempted to repent, considering our suffering as just punishment for the sins of our fathers. But we cannot grow if we remain fixated on past misdeeds. If we do not find a way to look at our past with pride, acknowledging both its triumphs and its sins we will be doomed to be wanderers forever more. Even if the other Guryadagga tribes might condemn us for our lack of remorse, we cannot let this deter us from embarking on a path towards a brighter future for our people.\n\nArdimya, oh Empress, your prodigal sons have returned to your arms, wiser for their folly."

 S86_5_3_title:0 "The Ancestors Path"
 S86_5_3_desc:0 "Ardimya is a vast landmass, with varied, often inhospitable, terrain where little safety can be found if one journeys across its wasteland. Throughout history this has hindered any would-be invaders but at the same time it has made it impossible to rule the vast realm of the Sultanate without powerful Genie magicks. The journey from the capital in Ardim Qarast to any of the Sultanate's southern cities took weeks by boat and months by foot.\n\nTo combat this our ancestors created and maintained long corridors within the sands and mountains of inner Ardimya, enchanted by Djinn magics to ward and expedite the travels of any who walk them. These enchanted pathways are nearly untraceable save for the eyes of trained sorcerers. If we could rediscover these routes, we may be able to restore their function, and maybe even use the existing ones as templates for new pathways, so that one day we will be able to rule the vast expanse of our homeland just as our ancestors once did."

 S87_4_2_title:0 "Relic Powers"
 S87_4_2_desc:0 "The Faasas, a flaming battleaxe burning green through genie magic, was found by our tribe wandering the ruins of our lost empire. To our people, it is a symbol of our legitimacy and our destiny to one day restore the grand Vizierate of our ancestors. For we do not have enough history to fill one scroll, let alone a library, as our tribe, unlike some of the others, does not descend from a former noble house of the empire, but was born from an alliance of the troops of several generals of the Vizierate who led their people through the chaotic aftermath of its downfall.\n\nThis means that if we ever are to ever take up the mantle of the Vizierate we have to cultivate and expand the powers of our great relic, which clearly has been granted to us as a sign of favour by our great Empress-That-Was. With its might we shall vanquish the Qeyikul pests who have spread across the Jasiir Doog since her disappearance."

 S87_5_2_title:0 "Changing Warfare"
 S87_5_2_desc:0 "As the tide of our endless struggle against the Qeyikul ever so slowly turns in our favour we have to rely on traditional ways of warfare less and less. Instead of tailoring our army to counter the Qeyikul threat, we can now use it to ‘persuade’ our brothers to join the quest to restore the Vizierate under our banner.\n\nThrough discipline and unity we will create an indestructible source of strength for our tribe, preventing us from falling to natural disasters and devastating losses alike. The magic slowly returning to Ardimya will further empower the martial prowess of our tribe through our mages, and with it we will easily be able to dominate the golden sands and fallow fields of our homeland."

 S87_5_3_title:0 "Peace and War"
 S87_5_3_desc:0 "War, what would we be without it? Through war our people have survived, as years and years of endless war have been the only path available to our people. War against the Qeyikul, war against our brothers, war against the will of fate. We would not be here were we not willing to fight. But war is a heavy burden, it robs men of the brightness of their soul, turning them all into hollow voids filled with aching darkness.\n\nThus on this day, the time has at long last come for us to renounce our endless war, and for our warriors to lay down their arms. So they may build and sow, and love and dance."

 S88_4_2_title:0 "Emulating The Mer"
 S88_4_2_desc:0 "Our tribe has always been attuned to the ever-shifting ocean. We have migrated through the lands of eastern Ardimya for generations naming each of the shifting sand dunes, celebrating and mourning, trading and fighting, on, under and around them; however in the waters surrounding our homeland another people lead their existence beneath the waves.\n\nThe Merfolk. Half man, Half fish. Skeptical of land dwellers and isolated, some of our brethren further inland might doubt their existence, but we know the truth. We have sailed our ships over their parades, met under the dark skies and traded despite our  innate differences. They are the masters of the ocean and if we desire to expand our dominion over the sapphire seas further we must listen, learn and adapt to the ways of those who know this fluid realm best."

 S88_5_2_title:0 "Forgotten Isles"
 S88_5_2_desc:0 "‘Far to the east, across the waves, there are lands, warm and fertile, where neither war nor the flames of the Qeyikul can reach.’\n\nThis is a mantra, recited by many about the fabled islands on the edge of Ardimya's old domain, half forgotten by our people and shrouded in myth and legend. Gaalal’s tales of exploring far off realms beyond the sea have been taken by some to be tales of the islands just off our coasts, inspiring much interest in their exploration. With our new fleet ready to set sail and filled with the spirit of exploration most of our tribe wants to explore and claim these lands for Rijalsahil."

 S88_5_3_title:0 "Rule The Waves"
 S88_5_3_desc:0 "Our ships have been improved, and our resolve has been strengthened, and after many tribulations our tribe has faced migrating to and from the islands we have dispelled the myths surrounding them. All this has strengthened our belief in Gaalal’s sailing ability and our tribe's connection to the waters.\n\nOur tribe has managed to extend our domains through the many islands and deep seas of Ardimya. We have managed to weather storms and shipwrecks, pirates and privateers. Through skill and determination we have fought off enemies with far greater ships and fiercer weapons. Alongside the merfolk we now rule the waves of Ardimya."

 AYN_4_3_title:0 "Future Plans"
 AYN_4_3_desc:0 "We have manoeuvred our tribe into the position it needs to be able to conquer the lands of Ardimya. The first and most important step will be to turn our fellow tribes from fickle allies into loyal vassals to secure our dominance over the still inhabited parts of our desolate homeland.\n\nIf we are to reach even greater heights and bring back the Jinnakah Vizierate there is still a lot more to do to bring our civilization back. However, right now the first steps are small, focused, aimed at forging the tribes of the Jasiir Doog into a united force, stronger and more powerful than any state seen in centuries."

 AYN_4_4_title:0 "Fellow Survivors"
 AYN_4_4_desc:0 "The devastated lands of Ardimya have long been abandoned by most mortals. Cities decayed, filled with crumbling ruins and covered in draughts of sands, deprived of life-giving water. The remnants of fallow fields can be seen criss-crossing this kingdom of nothing, but we remained, and we are not alone. After the devastation of the Dissipation this kingdom found new life, not on its land, shackled as we are by the Qeyikul, but under the waters surrounding it, a blossoming of Merfolk realms, their states numerous and mighty.\n\nA human alone cannot control the tides. They are too vast, too powerful. Even if you command them, even if you chain them, they will not listen. However as we control the earth with our ploughs and picks, the merfolk control the seas in turn. Together we can rise to greater heights, commanding both land and sea in harmonious coexistence."

 AYN_4_5_title:0 "Baraheri ya Ardimya"
 AYN_4_5_desc:0 "From centuries of stagnation to unity and dominance over all of the Jasiir Doog in only a few short years, the success our tribe has seen is nothing short of miraculous.\n\nThis has caused some amongst our ranks to call us ‘Baraheri ya Ardimya’, Blessed by Ardimya, those destined to bring back the Vizierate and maybe even return the might of the genies back into our world. Yet we cannot rest on our laurels, and instead must continue on this perilous path we have chosen. Only if we work tirelessly we might succeed in restoring the glories of ancient Jinnakah, and perhaps even be blessed once more by the sacred presence of genies, perchance even exalted Ardimya, in our midst."

