 ### Event Locs

 flavour_AYN.101.t:0 "Meeting of Ardimyan Tribes"
 flavour_AYN.101.desc:0 "In the beginning there was but a small trickle of people, a few representatives bearing the seals of the largest tribes roaming across the Jasiir Doog. A handful of people trickled in. The weeks dragged on. The sun beat down and the attendees got restless, believing no others would come. Finally, as threats to leave from those few who were already assembled started to grow numerous, a date for the meeting was set, a week's time from now.\nThen as the grass grew higher, a drumming could be heard. Many tensed, ready to begin the Quub Sembara, believing it was a vast warband, however as the drumming increased in volume, people started to arrive. Full tribes, harried somewhat by the vast distances travelled, arrived all together, their elders claiming their seats in our longhouse, now appearing pitifully small. The doors were ripped off and the windows enlarged to allow for everyone to hear the first true debate of all the Guryadaggans, one to be remembered. A turning point for our people.\nFirst our leader, [Root.Monarch.GetName] spoke, talking about the benefits to working together, the stability we could achieve, the settlements we could create and protect if only the thousands of us chose to act as one, united under a central leadership and pursuing one shared goal.\nA second of silence, then outrage, followed [Root.Monarch.GetHerHis] speech. Hundreds of voices blended together in vocal opposition, while an equal number shouted back in agreement. [Root.Monarch.GetName] covered [Root.Monarch.GetHerHis] face with [Root.Monarch.GetHerHis] hands and directed [Root.Monarch.GetHerHis] gaze towards the sky, the bags under [Root.Monarch.GetHerHis] eyes prominent. In this moment, [Root.Monarch.GetHerHis] age and the weariness [Root.Monarch.GetHerHis] lofty position brought with it was laid bare, yet few among the assembled tribesmen noticed, enchanted as they were by the cacophony of voices. Why do debates of the commonfolk always turn out like this?\n\nA Djinn could sort this out, why can’t [Root.Monarch.GetSheHe]?"
 flavour_AYN.101.a:0 "[Root.Monarch.GetSheHeCap] speaks in a loud, clear, voice."
 flavour_AYN.101.b:0 "‘Komba!’ [Root.Monarch.GetSheHeCap] shouts back insults"

 flavour_AYN.300.t:0 "Wattoi raids our territory"
 flavour_AYN.300.desc:0 "Concerning reports crowded the desk of the [Root.Monarch.GetTitle]. Villages burnt, foodstores ransacked and arrows sprouting from the backs of anyone who attempted to flee the raids. Despite leaving little trace of their identity the [Root.Monarch.GetTitle] knew who was responsible. Reports had reached the court that the tribe of the Wattoi had settled in Djinnsland not too long ago. The reason for their migration to our borders had been unknown at the time, but now it was clear. They obviously intended to take what was not theirs and disappeared, untrackable, back into their vast homeland.\n\nThe Guryadaggans of Wattoi have always been a threat despite their meager weaponry and primitive tactics, but their century-long struggle with the Qeyikul had hardened them into worthy warriors, easily able to take down forces twice their size, and even three times their size if they chose the terrain to fight in!\n\nThe question remains; what to do next? For while their raids will not last forever these incursions might still last a while, causing significant damage in the process. If we decide to fight back, to reclaim our possessions and push out the destitute tribe back into the wilderness, our lands in Dagaalsh Baashi might still be saved, the fields ready to be harvested in autumn, however, this will require the costly deployment of a considerable amount of our troops. Yet if we decide to wait them out, these lands might take years to recover, requiring tax exemptions and investments to return to their former productive state."
 flavour_AYN.300.a:0 "Chase them back into the desert!"
 flavour_AYN.300.b:0 "Eh, it is not worth it to waste our efforts on a quarrel with them."

 flavour_AYN.400.t:0 "Where to Migrate Overseas to"
 flavour_AYN.400.desc:0 "We will migrate across the sea, and retain our tribal lands. Where should we migrate to?"
 flavour_AYN.400.a:0 "§YHwasadaa§!"
 flavour_AYN.400.b:0 "§YBadda Caagah§!"
 flavour_AYN.400.c:0 "§YBorkor Badda§!"
 flavour_AYN.400.d:0 "§YHabrabadda§!"
 flavour_AYN.400.e:0 "§YBadda ya Muuqaka§!"
 flavour_AYN.400.f:0 "Return to §YAwliyo Aadan§!"
 flavour_AYN.400.g:0 "Nevermind, lets stay where we"

 flavour_AYN.401.t:0 "The Island Qeyikul"
 flavour_AYN.401.desc:0 "Originally we thought that Qeyikul could not spread across large bodies of water, as flying is enormously taxing on their energy stores and further compounded by their lack of experience on the material plane. This meant that Qeyikul attempting to fly across the sea or lake Ronolos culminated in their eventual downfall and drowning in a watery grave, a fact we have used to lure tens of thousands of them to their deaths since the fall of Jinnakah. Baiting them and then sailing away on our canoes and catamarans away from the safety of the shore has been a staple of our tactics for centuries. Yet to our unmitigated alarm, as our tribe decided to flee the devastation on the mainland for the relative safety of the island of Hwasadaa, our scouts encountered a Qeyikul horde on the isle.\n\nThis has caused our Longhouse to be filled to capacity with debaters, scholars, and everyday people attempting to find a reasonable explanation for this unprecedented discovery. Have the Qeyikul evolved? Did the party get lost at sea and accidentally washed ashore on the mainland? After a week of long days filled with debate, our people could grant their hoarse throats some respite, for [ROOT.Monarch.GetName] has devised a possible explanation that is, if not entirely satisfying, at least acceptable for most. [ROOT.Monarch.GetSheHeCap] is convinced that the Qeyikul we encountered must have originated from a group of them that managed to catch up to one of our boats during a previous attempt to lure the demonspawn out to sea. In their brainless state they simply let the currents carry them towards Hwasadaa once the crew of the boat had been massacred, which explains their presence on the island.\n\nWhatever the truth behind their presence might be, we must eradicate these Qeyikul if we wish the island to become a sanctuary for our people once more. A concerted shipbuilding effort has been undertaken and nearly three-quarters of the tribe’s warriors have decided to join the effort to kill these menaces."
 flavour_AYN.401.a:0 "I will lead them myself, ready my bow!"

 flavour_AYN.1000.t:0 "Which Qeyikul Warband should we fight?"
 flavour_AYN.1000.desc:0 "We have encountered reports of more than one Qeyikul Warband in our territory, but we cannot fight them all at once. Which one should our brave warriors attack?"
 flavour_AYN.1000.a:0 "Fight the horde in [fight_qeyikul_warband_target_1.GetName]"
 flavour_AYN.1000.b:0 "Fight the horde in [fight_qeyikul_warband_target_2.GetName]"
 flavour_AYN.1000.c:0 "Fight the horde in [fight_qeyikul_warband_target_3.GetName]"
 flavour_AYN.1000.d:0 "Never mind, we will leave them be for now."

 flavour_AYN.1004.t:0 "Reports of Qeyikul"
 flavour_AYN.1004.desc:0 "Our colonial administrators in Ardimya have reported that many of the frontier settlements have gone missing, their inhabitants not starved or fled, but just gone, with even their makeshift houses being scattered to the winds. This has caused a sharp decline in pioneers willing to establish new settlements in our new holdings on the subcontinent. More money and manpower than one would like to admit has been poured into Ardimya to find the cause of this debacle, yet until recently everyone sent out onto the plains has vanished without a trace, never to return.\n\nUntil one day, not too long ago, a group of natives approached one of our remaining settlements. The colonists immediately suspected the disappearances to be their doing, but fearing such a fate might befall themselves if they attacked, opted for a diplomatic approach.\n\nWhen we brought in their chief and asked him why they had destroyed our settlements, he was confused and asked for clarification. We told him of the disappearances and he merely laughed. According to him they were not the work of any Guryadaggan tribe but of a far more dangerous threat. With his mood turning black, he told us about the devils they call Qeyikul. They consider the Qeyikul to be demons from the infernal plane summoned here by the traitorous sons of the great Djinn Ardimya: Alahmar the Crimson and Almadhab the Golden. These beings were then banished from Halann by their Empress-that-was until the Day of Ashen Skies tore open the gateway to the infernal planes hidden deep within the deserts of Ardimya once again. Since then, the Queyikul have spilled forth from this portal, infesting these arid lands and harassing their mortal inhabitants.  Ever since the Dissipation of the genies the Qeyikul, with their tendency to attack any living thing they see have been locked in a dangerous dance with the Guryadaggans, or “those who stayed” and, have been pillaging and devastating the former lands of the Ardimyan Sultanate, killing untold numbers of its inhabitants and leaving only a few disparate tribes to wander through the desolation that was left of their former empire."

 flavour_AYN.1004.a:0 "Scary Monsters! We will fight them ourselves"
 AYN_1004_manual_fight_tt:0 "We will choose to §Rfight§! the §YQeyikul Warbands§! in §YArdimya§! ourselves, gaining access to the '§YFight Qeyikul Warband§!' decision.\nIf we defeat them while the province is a §Ycolony§!, we will gain §G3.0%§! §YSettler Chance§! for that province proportional to the size of the Warband"

 flavour_AYN.1004.b:0 "Too scary, let the Guryadaggans fight them"
 AYN_1004_automatic_fight_tt:0 "We will choose to §Rfight§! the §YQeyikul Warbands§! in §YArdimya§! automatically, meaning that any warband we colonise will be automatically cleared for §R+25 Local Autonomy§!, §Y+20.0% Local Culture Convertion Cost§!, and its culture being swapped to §YGuryadaggan§!"

 flavour_AYN.1202.t:0 "The Approach of Another Tribe"
 flavour_AYN.1202.desc:0 "The Jasiir Doog is generally unchanging. The eternal war against the Qeyikul needs fighting. The Gers need packing. The animals need feeding. No one from the outside world gives us much mind, for they simply do not see the need to fight the Qeyikul with us, so they generally leave us alone. Some people from foreign lands have on occasion committed some of their troops to the fight, to increase their prestige and demonstrate the might of their army, but such boons are given rarely, and haven't been seen in generations.\n\nHowever, the tedium of survival was interrupted today by the arrival of two refugees, initially thought to belong to the Gashinma as they approached with their hands in the air; yet we were proven wrong. They greeted us with a customary praise to Ardimya and, after exchanging a series of ritual greetings, we were convinced by their claim to belong to another Guryadaggan tribe. They told us that their tribe had been subjugated by an outside power, one intent on exploiting them, and in an act of desperation, their tribe had chosen to sell their powerful Genie relics to us instead of letting it fall into the hands of their new overlords. They were understandably tight-lipped about the exact location of their tribe’s relic stash, and said that they would give up the location to us only if we paid them enough to ensure a future for whatever remnants of their tribe they could save from a fate of servitude. They appear utterly devoted to their mission and accepting their terms seems to be the only way for us to acquire their relics and carry them in their stead."
 flavour_AYN.1202.a:0 "Buy the relic, we cannot risk losing it amongst the sands!"
 flavour_AYN.1202.b:0 "Do not buy the relic. We have to trust that we will find it again."

 flavour_AYN.1203.t:0 "You Found a Legacy"
 flavour_AYN.1203.desc:0 "Ever since the fall of the Sultanate, and the collapse of the Vizierate which followed it, genie relics have been lost, found and lost again in the deep sands and long grasses of Ardimya. Now this cycle continues with the discovery of what appears as an unremarkable old brass item in the dirt.\n\nEvery old metal artifact is treated as a potential relic by our people, and unlike the plethora of other metal items given to the mages of our tribes in the vain hope of uncovering a genuine relic, this one hummed when empowered with magical energy. As news of this discovery spread through the camp of our tribe, spontaneous frenzied celebrations erupted. At long last, we had discovered a genuine genie relic."
 flavour_AYN.1203.a:0 "Nyo-ho! Ardimya be Praised"

 flavour_AYN.1204.t:0 "The Mysteries of Ardimya"
 flavour_AYN.1204.desc:0 "Ardimya. Both the name of our homeland and the name of our Empress-that-was. A djinn who disappeared with the rest of her exalted kin during the Dissipation, when all the genies on Halann, some of whom had ruled over the lands they had claimed for millennia, all disappeared in a matter of months. After our beloved Empress-that-was vanished, her Sultanate was no more, yet our ancestors did not give in to despair. Instead they founded the Jinnakah Vizierate on the ruins of Ardimya’s Sultanate, a most noble endeavour founded on the desperate hope that She might one day return to us.\n\nThus these lands, now called the Jasiir Doog, have been given to us as their stewards. Yet to our everlasting regret, they have remained ravaged and in utter disarray for far too many centuries. Our tribes have been scattered ever since the Jinnakah Vizierate fall almost 800 years ago, due to the last remnants of a once elaborate Genie-wrought irrigation network collapsing, leaving its former subjects alone to wander the vast former territories alone. In doing so, our forebears unwittingly mirrored the exodus of our distant ancestors, who followed Ardimya in the Great Procession out of another wartorn land of sand and prosperity to these promised lands so many millennia ago.\n\nHowever, our homeland, once seen as the salvation for our people, has been plagued by the unrelenting threat of the Qeyikul. These dangerous creatures from the Infernal plane were summoned long ago by treacherous sons of Ardimya and with their unrelenting attacks have contributed to the downfall of the Jinnakah Vizierate.\n\nWhile most gifts of the genies were lost just as they themselves disappeared, their relics, some still imbued with their power, lay in wait for us to find. Hidden deep within the sands of the Jasiir Doog lay relics, most as useless as slag iron, but some as rare, and as powerful as damestear."
 flavour_AYN.1204.a:0 "We must defend our relic and seek out others!"
 flavour_AYN.1204.b:0 "We must take the first steps to reclaim our former glories!"

