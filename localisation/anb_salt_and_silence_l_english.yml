l_english:

incident_salt_and_silence:0 "Salt and Silence"
incident_salt_and_silence_member_alert:0 "The Borders have always been a chaotic region; one that has been darkening in recent years. From whispers of monsters in the night to increasingly arrogant imperial princes and bold foreign adversaries, there is little imperial authority visible in the salt rich region and her mines. Since the end of the Lilac Wars and the new precedent of might makes right, a rising power in The Borders seeks to capitalize on the path that Emperor Lothane fought into existence.\n\nImperial princes have been ignoring the summons of [Emperor.Monarch.GetName]. They instead seek audiences with this new growing authority, whether out of fear or opportunity. The Imperial Parliament sees this as unacceptable and has convened a session to reign in the belligerent region. Some advocate to show them the Empire’s strength, others regard this as a delicate diplomatic chess game to be played.\n\nSilence falls along The Borders. Will the Emperor unleash discord?"
incident_salt_and_silence_emperor_alert:0 "The Borders have always been a chaotic region; one that has been darkening in recent years. From whispers of monsters in the night to increasingly arrogant imperial princes and bold foreign adversaries, there is little imperial authority visible in the salt rich region and her mines. Since the end of the Lilac Wars and the new precedent of might makes right, a rising power in The Borders seeks to capitalize on the path that Emperor Lothane fought into existence.\n\nImperial princes have been ignoring the summons of [Emperor.Monarch.GetName]. They instead seek audiences with this new growing authority, whether out of fear or opportunity. The Imperial Parliament sees this as unacceptable and has convened a session to reign in the belligerent region. Some advocate to show them the Empire’s strength, others regard this as a delicate diplomatic chess game to be played.\n\nSilence falls along The Borders. Will the Emperor unleash discord?"

flavor_salt_silence_incident.1.t:0 "Lines in the Salt"
flavor_salt_silence_incident.1.d:0 "The brightness of the Imperial Crown dims as our ascendancy continues undiminished. They call The Borders a backwater, a place where storybook monsters like vampires go bump in the night and disloyal vassals disappear into lavish castles. Let them stay ignorant; our challenge to them will come swift and unrelenting.\n\nIn a few years, the Emperor and Empire must face the song we sing. If they do not allow us to sing solo or join us in a duet, we will create a discord and ring out louder than any other.\n\nThe ancestors of The Borders were Kings of Salt and Darkness. Let us remind them who we descended from."
flavor_salt_silence_incident.1.a:0 "We are Kings of Salt and Darkness."
flavor_salt_silence_incident.1.a_tt:0 "\n\nA game of diplomacy for The Borders has now begun, for the next §Y15§! years the Emperor and [salt_and_silence_giant.GetName] will vie for the support of the Imperial Princes. Borders princes with an §Yalliance§! or §Y100+ relation§! are more than likely to support us. Though we must not forget to soothe the other imperial princes, for they hold the key to the Parliament, which will likely decide our fate."

flavor_salt_silence_incident.2.t:0 "Salt and Silence"
flavor_salt_silence_incident.2.d:0 "Our armies stand tall and shining outside our capital. Diplomats arrive every day from neighboring princes seeking alliances and discussing the oncoming maelstrom. While the Empire sleeps at the stroke of midnight, spurred by our lullabies, we prepare to sing another type of song:\n\nOne of confrontation, of dominance, of boldness. We have sent a messenger to the Imperial Court, demanding privileges to become King of Salt and establish our superiority of The Borders. When they wake up, they will choose the melody they wish us to sing.\n\nOne of harmonic triumph, or one of strident war."
flavor_salt_silence_incident.2.a:0 "Ready the war bards"

flavor_salt_silence_incident.3.t:0 "Salt and Silence"
flavor_salt_silence_incident.3.d:0 "§YThe Empire is presented with a difficult symphony to join.§! Depending on the Parliament’s choices, all Imperial princes of The Borders may §Rsecede§! and Emperor will have to achieve §Ydiplomatic superiority§! or §Ymilitary success§! over the powerful rival to regain them.\n\n§TPath of Salt:§! The Emperor must have §Y150+ relations§! or §Y100+ relations§! a §Yroyal marriage§!, and an §Yalliance§! with an imperial prince in The Borders.\n\n§VPath of Silence:§! The Emperor and their electors will fight a §Rwar§! against §Y[salt_and_silence_giant.GetName]§! and force all princes to choose sides in the conflict.\n\n§GVictory§! results in a total Imperial reclamation, §Rdefeat§! results in the loss of The Borders."
flavor_salt_silence_incident.3.a:0 "Call for Obediance"
flavor_salt_silence_incident.3.b:0 "Crown of Salt"
flavor_salt_silence_incident.3.c:0 "Cry for War"

path_of_silence_tt:0 "This choice follows the §VPath of Silence§!\n\nThe Insolence of the Imperial Princes of §YThe Borders§! will not be tolerated, they will renege their titles or be forced to do so.\n\n§Y[salt_and_silence_giant.GetName]§! will either be dismantled or a §Rwar§! encompassing the whole of the Borders will erupt.\n"
path_of_salt_tt:0 "This choice follows the §TPath of Salt§!\n\nThe Imperial Princes of §YThe Borders§! will be called to obey their fealty to the Emperor.\n\nAny Prince in the Borders without either more than §Y150+ relations§! or an §Yalliance§!, a §Yroyal marriage§! and §Y100+ relations§! opinion of the Emperor may leave the Empire. If no princes other than §Y[salt_and_silence_giant.GetName]§! leave the Empire then §Y[salt_and_silence_giant.GetName]§! will back down, otherwise §Ronly the sword§! will bring them back in line.\n"
path_of_nothing_tt:0 "This choice allows [salt_and_silence_giant.GetName] to establish their superiority over The Borders."
war_of_salt_time_limit_ten:0 "You have §R10 Years§! to win a war against [salt_and_silence_giant.GetName] and restablish authority."
war_of_salt_time_limit_five:0 "You have §5 Years§! to win a war against [salt_and_silence_giant.GetName] and restablish authority."
war_of_salt_back_down:0 "You will §Yrelease§! any territory of §YThe Borders§! to its original owners and if you are §Ynot§! a part of the EoA, any §Ypersonal union§! you have with an EoA member will §Ybreak§!!"

flavor_salt_silence_incident.4.t:0 "Echo of Authority"
flavor_salt_silence_incident.4.d:0 "A silence like the quiet that meets a hunter in the forest falls across The Borders. Neighboring imperial princes meekly make way for [salt_and_silence_giant.GetName]’s surging rise as onlookers outside of the Empire take note of our growing strength.\n\n[salt_and_silence_giant.Monarch.GetTitle] [salt_and_silence_giant.Monarch.GetName] summits a large hill beneath the region’s cloudy skies. The wind is still and the downpours lull, as even the elements bow to [salt_and_silence_giant.GetName]’s strength. Today the [salt_and_silence_giant.Monarch.GetTitle] has called a council amongst the powerbrokers of the realm to consider the next steps in our endless ambition.\n\nAs noble, clergy, and merchants bicker around the well furnished and well attended outdoor table, a crack of lightning snaps everyone’s attention to the western horizon. A pale blur speeds toward them. Footmen scramble for their sheaths and archers ready their bows as the [salt_and_silence_giant.Monarch.GetTitle] steps forward to meet this being, but they stop ten yards before [salt_and_silence_giant.Monarch.GetHerHim].\n\nBefore the crowd stands a witch of the Magisterium, adorned in silver robes and insignias denoting them as a representative of the Empire. Her green eyes hardened and skin weather beaten, an accomplished war mage stands before [salt_and_silence_giant.Monarch.GetName]\n\nThe mage snarls: ‘Bend the knee, [salt_and_silence_giant.Monarch.GetTitle]. Or the Emperor will let loose the dogs of war.’\n\nThe [salt_and_silence_giant.Monarch.GetTitle] grimaces as they consider their options."
flavor_salt_silence_incident.4.a:0 "Fortune Favors the Bold"
flavor_salt_silence_incident.4.b:0 "We want peace"

flavor_salt_silence_incident.5.t:0 "Crown of Salt"
flavor_salt_silence_incident.5.d:0 "It is a sight to see a fully armored Aldresian Retinue marching across the horizon. A thousand of these glinting blue armored knights have shattered countless armies ten times their size for their Emperor in the Lilac Wars. These Aldresians held the Empire’s answer to [salt_and_silence_giant.Monarch.GetTitle] [salt_and_silence_giant.Monarch.GetName]’s ambitions. Within the hour our capital would burn, or we would attain an unthinkable ascendancy.\n\nAt the head of the retinue is an older man with a gunblade in hand and a dark blue plume on his helmet. He stirs his horse as it gallops ahead of his army and stands at our gate waiting for [salt_and_silence_giant.Monarch.GetName]. The [salt_and_silence_giant.Monarch.GetTitle] steadies the bodyguards around them and steps out from the gate.\n\n‘[salt_and_silence_giant.Monarch.GetTitle] [salt_and_silence_giant.Monarch.GetName]. You… have been formally recognized as King of The Borders and Salt within the Empire. The Emperor expects gratitude.’ The Knight Commander announces."
flavor_salt_silence_incident.5.a:0 "We are Kings of Salt and Stone!"
flavor_salt_silence_incident.5.b:0 "Must I remind you that I am your Emperor now?"

flavor_salt_silence_incident.6.t:0 "A Rising Overture"
flavor_salt_silence_incident.6.d:0 "It is dawn when the servants screams echo throughout the hall. Even [salt_and_silence_giant.Monarch.GetTitle] [salt_and_silence_giant.Monarch.GetName] is stirred awake as courtiers and soldiers alike storm downstairs to confront the commotion.\n\nA wave of gasps follow as [salt_and_silence_giant.Monarch.GetName] pushes open the door to the balcony of the courtyard. On the crimson stained pavement below are the headless bodies of a dozen of our diplomats, arranged in the shape of an imperial dove.\n\nKnights push past our [salt_and_silence_giant.Monarch.GetTitle], desperately rushing to secure the grounds as [salt_and_silence_giant.Monarch.GetName] contemplates a decision."
flavor_salt_silence_incident.6.a:0 "Back Down"
flavor_salt_silence_incident.6.b:0 "War it is"
flavor_salt_silence_incident.6.b_tt:0 "The Emperor will not take kindly to this, §Rwar§! will come to us."



flavor_salt_silence_incident.7.t:0 "A Symphony of War"
flavor_salt_silence_incident.7.d:0 "For the first time in decades, Imperial Armies march east toward the darkening skies of The Borders.  The Electors rally to us, their armies joining ours while our war bards sing songs of battle in our wake. [salt_and_silence_giant.Monarch.GetTitle] [salt_and_silence_giant.Monarch.GetName] claims to be the King of Salt and Darkness and their lands fell silent in submission to their rise.\n\nThey are nothing more than an upstart ruler who wishes to challenge Imperial authority. It is time we correct them on a few matters. They mistake our indifference for weakness."
flavor_salt_silence_incident.7.a:0 "A King of Peasants and Cowards"

flavor_salt_silence_incident.8.t:0 "Cry Havok"
flavor_salt_silence_incident.8.d:0 "A dove and a crow, each with royal missives, arrive at our court. One bears the seal of the Empire of Anbennar, proud and decadent. The other bears the seal of [salt_and_silence_giant.GetName], confident and simple.\n\nThe crow chirps that a new epoch is beginning. One led not by monarchs in Anbenncost but by powers closer to home. The dove warns against the crow, claiming it is a trick to sow discord and spread chaos.\n\nAnd our advisors? They growl of opportunity. A side must be picked. How will we be remembered in history?"
flavor_salt_silence_incident.8.a:0 "Grow the Discord"
flavor_salt_silence_incident.8.b:0 "Silence the Chaos"

flavor_salt_silence_incident.9.t:0 "War of Salt and Silence"
flavor_salt_silence_incident.9.d:0 "The Imperial Banner marches proudly along the quiet meadow. Only the sound of hoofbeats, soldiers marching along the road, and the errant clattering of steel from tired arms permeate the soundscape.\n\nThe Emperor leads the army, [Emperor.Monarch.GetHerHis] armor spotless. No traitorous imperial prince or upstart king comes to greet the gallant host. A bee buzzes up toward the imperial army, bobbing up and down lazily as it passes by a horse and heads off to find an open flower.\n\n‘Well, my liege?’ A tired captain asks the Emperor who raises a hand, halting the column abruptly.\n\nThe Emperor gazes across the green meadow and exhales."
flavor_salt_silence_incident.9.a:0 "Peacefully quiet, at last."

flavor_salt_silence_incident.10.t:0 "The Empire and The Borders"
flavor_salt_silence_incident.10.d:0 "§YThe Empire is presented with a difficult symphony to join.§! Depending on the Parliament’s choices, all Imperial princes of The Borders may §Rsecede§! and Emperor will have to achieve §Ydiplomatic superiority§! or §Ymilitary success§! over the powerful rival to regain them.\n\n§TPath of Salt:§! The Emperor must have §Y150+ relations§! or §Y100+ relations§! a §Yroyal marriage§!, and an §Yalliance§! with an imperial prince in The Borders after §Y20 years§! to automatically reintroduce them into the Empire.\n\n§VPath of Silence:§! The Emperor and their electors will fight a war against [salt_and_silence_giant.GetName]  and force all princes to choose sides in the conflict.\n\n§GVictory§! results in a total Imperial reclamation, §Rdefeat§! results in the loss of The Borders."
flavor_salt_silence_incident.10.a:0 "Their rowdiness knows no bounds."
flavor_salt_silence_incident.10.a_tt:0 "\nWe have §Y15§! years to reign in the imperial princes of The Borders by either having an §YAlliance§! a §YMarriage§! and §Y100§! opinion of us or §Y150§! opinion of us."

flavor_salt_silence_incident.11.t:0 "War of Salt and Silence"
flavor_salt_silence_incident.11.d:0 "Dark skies cover the once pale blue horizon of The Borders. A troop of soldiers hailing from [salt_and_silence_giant.GetName] rest at a nearby lake, making camp as the winds of war die down. To their left is a field scattered with the remains of a slain Imperial Army. To their right are silent forests judging every step.\n\n‘Sarjen’, Didya hear iv we cot the Emporuh?’ The footman prepping the beef stew asked as his companions set up tents for the night.\n\n‘[Emperor.Monarch.GetHerHisCap] Imperial Majesty escaped back to Anbenncost. Good riddance, my ears nearly bled from his impotent shouting.’ The Sarjent responded, stepping toward the tranquil lake.\n\nThe Sarjent winced in pain as he met the water’s edge, his right arm in a sling after barely surviving an Aldresian Knight’s blade. But discomfort subsided just as quickly as it came.\n\n‘The silence, its… soothing.’\n\n‘Whar?’\n\n‘Just, enjoy the fucking moment will you?’"
flavor_salt_silence_incident.11.a:0 "Peacefully quiet, at last."

