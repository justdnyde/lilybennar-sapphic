 #Events
 flavour_bonecarver.0.t:0 "Spat by Venom"
 flavour_bonecarver.0.d:0 "“Grgh, this is hopeless! For all we know, his bloody corpse has already been torn apart by the wolves!"\n\nNeevnûz shouted, before splatting onto the wet ground. Around her lay dozens of corpses of humans and orcs alike. The sound of high-pitched squeals, crunching, and grinding of bones being carved fill the otherwise tranquil swamp.\n\n“Be resilient, my kin. There are only so many bodies and so much swampland, we will find him eventually. You may take a break if you’d like, you’ve done well.”\n\nAzukor responded, his face stoic as he spoke, steadily identifying more corpses.\n\n“I’m tired of it all, tired of this passivity, tired of this accursed swamp and these puke green mosquito bites. I do not desire rest, I desire battle, Azukor, I desire to fight and die besides the Dookanson, not to some lowly disease!” Neevnûz barked in response, eyebrows furrowing at the young chieftain, as if threatening to challenge him to Ozarm’Chadash.\n\n“I understand, Neevnûz. But the Dookanson does not require our assistance, he has probably beaten the adventurers at Castonath and is marching back west as we speak. So-”\n\nBefore Azukor could finish his sentence, another group of orcs on wargback, decorated with green warpaint, approached, emanating a clearly hostile aura reminding him of the Venomtooth clan.\n\n“The hell are you freaks doing in my swamp? This is what your lot have been doing instead of fighting in Castonath? Cowering and playing with dead muddy bodies?” A tall and lean female orc shouted in anger and mockery with a glare of disgust.\n\n“No, Aâdga. We simply are searching for my father’s corpse. Surely you did not need our help in Castonath, Dookanson is marching right behind you for the next campaign is he not?” Azukor responded with a hint of frustration in his tone, yet wished not to escalate.\n\n“He’s dead, you tot! All because of you, the clans are scattered and the humans are coming for our heads!” Aâdga shouted angrily, gripping her weapon tightly, restraining herself from the urge to swing it at Azukor’s neck. Azukor was speechless and so was his entire clan, some showed anger and sorrow while some showed no emotions at all.\n\n“Luckily for you, me and my boys need time to recover from battle, unlike you cowards. So tell your goons to pack it up and get out of my swamp and we’ll settle this another day… Unless you want it to be today, perhaps show us you have some honor left in your veins?”"
 flavour_bonecarver.0.a:0 "This can't be..."
 flavour_bonecarver.11.t:0 "Continuing His Deed"
 flavour_bonecarver.11.d:0 "The longhouse was decorated with a variety of scrimshaws. Many are merely finely carved pieces of bones, made by novice scrimshanders, depicting great battles and warriors, yet some stand out as a piece created with full skeletons, each joint intricately connected through carvings and paint to depict a grand story of fine art, with each crack, each bruise given new purpose in the grand canvas. To many, this would appear to be some horrific trophy gallery to assert dominance and inspire fear. Yet in actuality, the orcs of Bonecarver have shrined this grand building a temple to commemorate the dead, whether it be humans or orcs. For all warriors deserve commemoration, where their vessels are given new artful purposes and release the soul within to reincarnate.\n\nAtop a small podium surrounded by finely decorated bones and skulls, a young orc chief calls out:\n“Warriors of Dookan, the time for mourning shall end soon! Tonight, we shall feast with the souls of our kin and ancestors. Tomorrow, we shall march to Rottenstep to liberate the rest of our brethren trapped within its mires and break the fangs of the Venomtooth so they can never spit their venomous lies again! We alone shall carry the burning embers of the Dookanson, Dookan Dul!”"
 flavour_bonecarver.11.a:0 "DOOKAN DUL!"
 flavour_bonecarver.21.t:0 "Defanged"
 flavour_bonecarver.21.d:0 "The Venomtooth clan claims that they’re faithless, that they only follow those who have proven their strength. Yet this whole notion was shattered today, as droves of spineless orcs surrendered in Venomfen, preferring to keep their necks over any beliefs of prideful domination they held before, while Dookanist slaves were liberated from the bindings that mocked the chained god. Aâdga herself at least was saved from such humiliation, having her brain punctured by shards of stone debris from a shaman’s explosion. Azukor, the son of Aâdga, was adopted into our clan, too young and weak to be a meaningful option as the successor of the clan. Without a leader or purpose to string them together, the rest of the clan fell into violent infighting soon after, spurred on by an orc’s sole greed to prove their strength and dominance over mutual interest. Now, it was only a matter of time before each of these nascent upstart clans would fall."
 flavour_bonecarver.21.a:0 "They want to find out who's the strongest? We'll give it to them"
 flavour_bonecarver.2.t:0 "Terror Outside the Frozen Fort"
 flavour_bonecarver.2.d:0 "Bal Vroren, The most far northern Castanorian Citadel, built by the god Balgar himself to withstand the might of the biggest and strongest races on Halann, the giants and their kin, played a crucial role in the Giant’s War a thousand years ago. For months, it was put to the test again, not only by strength this time, but by our determination and devotion as well. Even through freezing nights, disease, hunger and wild trolls, we persevered knowing our cause was just.\n\nAt dawnbreak, the siege proved too much to the gray orcs family who hid within. Food was running out, wood was running out, and diseases were running rampant with no medicine nor physicians left to treat them. And so, we proved our will to be stronger, to be the ones who were favored by Dookan in the end after all as the white flag was raised."
 flavour_bonecarver.2.a:0 "May even Dookan have mercy on strayed souls."
 flavour_bonecarver.3.t:0 "True End of A Life"
 flavour_bonecarver.3.a:0 "He’s home now"
 flavour_bonecarver.3.b:0 "Welcome home, father… I’ll carry on your legacy"
 flavour_bonecarver.3.d:0 "“RAAAAAAAGH!!”\n\nNeevnûz cried aloud as she slashed an undead orc, causing it to fall and splash on the wet ground. Around her was a party of a mere thousand orcs.\n\n“This is hopeless! Thousands have died to zombies and the plague, how much more must fall for ya ta turn back?!!”\n\n\nOne orc suddenly cried out in protest, sickly with bags clearly visible under his eyes. His words rang out in silence, with only frogs responding for a good minute. Then after a time of staring, several orcs started to walk, threatening to turn back even without Neevnûz’s allowance.\n\n“And what? Return to the chief and tell ‘im ya scurried away like cowards, disappoint the onlooking deadmen hoping to not die in vain? Be my guest, but I do not fear death, my soul shall live on, reincarnating and dying, and I intend for each death to be a valorous one. I too understand the frustration, the hopelessness, but I was given a duty by the chief and I do not intend to dishonor him and Brasul, who have built our clan from the ground up to be one of the strongest of the tide. I- no, we WILL find him and we will burn every tree and zombie in this backwater if we have to.”\n\nOnce again, croaking silence filled the swamp, but eventually, all of the orcs nodded in unison and marched on.\n\nThree days later, under the canopies of charcoal trees, gurgling undead, and buzzing mosquitos, one decorated corpse was found, somehow still freshly preserved and intact even after what was supposed to be years of decay: the body of the most devoted follower of Dookan."
 flavour_bonecarver.4.t:0 "Dethroning a Tyrant"
 flavour_bonecarver.4.a:0 "Let Dookan judge his soul, if he has one in the first place"
 flavour_bonecarver.4.d:0 "Grom had thought the White Walls were impenetrable both inside and outside. He believed that he could safely tuck himself within the bricks of the old Castanorian castles. Yet perhaps this idea of safety was the most damning evidence of his lack of faith most of all, for he had forgotten that decades ago, it was his grand prophet that breached the White Walls of Castanor. And soon, his most devout followers were coming back to break them once more.\n\nAt the dead of night, howls and mortar shells reverberated against the stone cold walls, letting droves of orcs pour in like a tide, all shouting one sentence in clear harmony even while brutally fighting the well-armored guards of Severed Ear.\n\n“Ozgar Urakan, Ozgar Dookan!”\n\nWhat would have been a sight of fear and terror to most clansmen was instead a sign of coming liberation to the peasants, serfs and slaves of the oppressive clan, all grabbing whatever they could to use as a weapon and running out of their ghettos, also shouting.\n\n“Ozgar Urakan, Ozgar Dookan! Ozgar Urakan, Ozgar Dookan! Ozgar Urakan, Ozgar Dookan!”\n\nAs the call for freedom rumbled the walls of the citadel, the Severed Ear guardsmen would drop their weapons out of submission, wishing to not cause any more needless bloodshed against an uphill battle, especially against their own kin. As for Grom himself…"
 flavour_bonecarver.9.t:0 "Successful Ritual?"
 flavour_bonecarver.9.a:0 "We are not yet forsaken. Dookan be praised!"
 flavour_bonecarver.9.d:0 "After being given the blessings of the elder shamans, several brave orcish warriors, including the one who first raised their voice to the shamans’ judgement of the beasts, have elected to be willingly infected with lycanthropy.\n\nThe full moon hangs in the air like the eye of a judgemental god. And judge he does. One by one, these brave orcs drink from a chalice of werewolf blood, eager to redeem us of sin, to be found worthy by our God.\n\nMost are not judged so, keeling over in screams and anguish as the transformation takes hold of them. Agonizing bawls turn into bloodthirsty howls as they begin to lunge at the guards proceeding the ceremony. Several of the creatures tear through those observing the ritual, those that don’t, flee into the night, determined to rampage through our tribe, transforming even more orcs. Horrified by such a savage sight, one of the elder shamans cries out, “Look at these men! Dookanson is clearly displeased with us, to see orcs tear apart orcs with such savagery? Not have I seen this since before Dookanson rallied us all! This damnable curse will be our ruin!”\n\nAs the disparate shouts of the shamans turn into a unifying tide of agreement, a werewolf makes his way past the shamans’ guards. “Dookan forgive us!” a shaman cries, believing himself to be at the end of his life, believing his clan forsaken by their God, yet as the beast pounces upon its prey a flash of fur and fang knocks it to the ground: a wolf-man standing taller, nobler than the rest. Getting up to attack again, the beast attempts to defend itself, slicing at the attacker with a vicious claw. The attending shamans are stunned into silence, capable only of staring wide-eyed as the feral wolf is killed. Grabbing its lifeless corpse, the victorious werewolf does not howl, he speaks:\n“Warriors! Shamans! Look upon me, judge me, as Dookan has! Find me worthy, as He has! He has spoken to me and He has decreed so! Only the pure of sin and savage of heart will survive His trials!”\n\nOne of the elder shamans contemplates this event, lost in thought for what feels like eons, until he finally speaks."
 flavour_bonecarver.6.t:0 "Shamans Gathering"
 flavour_bonecarver.6.a:0 "I am honoured to gain your trust"
 flavour_bonecarver.6.d:0 "No orc with valor would admit defeat unless their ankles had been cracked, that was until this day. The outside war was alien from the spine, it was full of enemies in the boundless horizons, polishing their blades and polearms in preparation to fight back. Even if all the adventurers had been destroyed, there are yet more human realms to fight against. For the first time in perhaps millennia, the clans had to think strategically, no longer could they settle squabbles with wars and rely on their own strengths to assert their will. They had to do all they could to survive the onslaught after their own.\n\nAs the shamans discussed these matters within our prestigious halls, bickering and whispering over the specific details, they came to an agreement. For the survival and continuation of the orcish race and its descendants, it was hereby declared that Bonecarver shall be the guardian of all Dookandom from henceforth."
 flavour_bonecarver.7.t:0 "High Tide"
 flavour_bonecarver.7.a:0 "Cannor shall crumble soon enough"
 flavour_bonecarver.7.d:0 "The Greentide was perhaps one of the greatest feats of orcish martiality in history. In it, many clans rose and fell, with only the greatest rising to the top as the home of the temple of Castellos fell to the might of Dookan’s creations. It was a war of valor, of proving and of faith. It gave the orcs the new home of lush fields and ever blue skies that was promised to them by the gods. It was not an invasion, it was a simple, righteous reclamation of what was already promised to the orcs.\n\nNow though, with our clan atop all others, dominating both orc and human, it was time for another tide to start. Many new young orcs are eager to carve new clans for themselves, joining our army for a chance to own a piece of land for themselves, while other clans have bowed before us in total recognition of our holiness. Meanwhile, the human kingdoms have stopped dusting their armor and sharpening their weapons. No… They have begun arming themselves and forcing their peasants into the army, clearly in preparation to take our home away from us again.\n\nThe flames were stoked within the halls of our clan, housing all of the clan chiefs once more. With an enthusiastic roar in unison, all have agreed to our call for another tide, offering their utmost promise to join us in the next crusade."
 flavour_bonecarver.13.t:0 "A Warband Returns"
 flavour_bonecarver.13.a:0 "Bring them back! Alive!"
 flavour_bonecarver.13.d:0 "The latest warband sent to the territory of Alenor returned a success, bragging of retribution and destruction, of killing in the Dookanson’s name. It is only the next full moon that the consequences of our actions bares their fangs. Awakening in the night to a mixture of screams and howls, Azukor grabs the nearest axe and leaps to his feet. Expecting a vengeful raiding party outside, he's met with a sight no orc could have been prepared to face. Kneeling over an orcish body in the muddy ground, half lit by a nearby torch, a creature of unnatural visage rises to meet Azukor's challenge, towering over him, closer to a warg or wolf than any man, with tusks larger than a dagger and claws sharper than any weapon he's seen forged. The beast roars, lunging at Azukor's throat, but a swift dodge makes the creature slam into the wall nearby, and a yet faster hammering of his axe into its neck spells its doom.\n\n‘These damn Alenics must have invoked the woods against us!’ He thinks to himself, quickly rushing through the chaos to where a few prisoners from the last raid were kept, determined to end whatever foul ritual of the regent court has spawned these monsters. Yet he finds no ritual, instead he finds one of few orcs who speaks the human tongue interrogating a terrified man of Alenor. "You!" he barks at the interrogator, "What have they done!? Where are these beasts coming from!" The younger orc rises to his feet, somber in tone and contemplating whatever bad news this man departed unto him. "Chieftain," he replies slowly, "He says prisoners weren't the only thing we brought back. Werewolves, he calls them. Says our men were afflicted with the curse and have turned against us."\n\n"What!? These things are our own men?" Azukor responds, “After them! Quickly!”"
 flavour_bonecarver.8.t:0 "Cornered Wolves"
 flavour_bonecarver.8.a:0 "Sound the horns, alert the others of our capture!"
 flavour_bonecarver.8.d:0 "As the last vestige of sunfall faded, what remained was only the ethereal glow of the full, silver moon in the indigo heavens. The faint luminous blue light beamed through the canopies of the Greatwoods. For a moment, the woods were illuminated in a beautiful tranquility, undisturbed and peaceful. Yet that was broken by distant violent howling, more vicious and feral than even that of wild wargs with a disturbing distinct human tone to it.\n\nIn a nearby temporary camp of makeshift tents, lit by a humble campfire, a scarred orc sat staring at the flames with the eye he had left, aging yet full of vigor and determined to fulfill his duties that night. Huntmaster Zûka murmured “The time has come…\n\nThe continued howling was broken up by the sound of battlehorns, alerting all the orcish hunter camps. “Careful men, even the savagest beasts hunt with dire cunning.” Zûka shouted out to his camp before dispersing.\n\nAs Zûka quickened his wargs, crashing through branches and hopping through boulders along the way, suddenly his eye fixed upon a pack of werewolves, gargling on fresh and succulent meat from a recent hunt, a herd of deer. The scars, the broken tusk, and the lumbering frame. It was undeniable, Zûka could not be mistaken, this was the one that took his eye when Tenefor first suffered Dookanson’s wrath.\n\nHe held his hand out, urging his men to remain calm and silent. A morbid tranquility followed, filled by snarling and hungry gurgling. The wargs lunged forth, surprising the werewolves who were still gnawing on flesh and bone.\n\nBattle ensued, warriors and wargs against werewolves. The werewolves had a clear advantage with their ferocity, size and strength, tearing limbs and cracking skulls, barely flinching at the slicing of axes and spear. But Zûka’s tactics prevailed, forcing the pack into a corner against the cliffside. An elderly shaman stepped forth, murmuring and asking for Dookan’s blessings before shouting “Oh great spirits of the wild, bind these savage creatures defiling your domain!”\n\nThe earth rumbled and cracked beneath the feet of the werewolves, causing them to fall into a deep ledge. Even more hardened compressed earth broke off and fell upon them, incapacitating the beasts in the process, yet still keeping them alive." Azukor responds, “After them! Quickly!”"
 flavour_bonecarver.5.t:0 "The Thunderdove Pact"
 flavour_bonecarver.5.a:0 "URAK DUL!"
 flavour_bonecarver.5.d:0 "After months of clever diplomacy, careful negotiations, and the odd threat here and there, the Grand Hall is filled with orcish heroes, dead and alive, in the flesh and bones. Many stared at each other with disdain, fueled by ageless old and newly forged rivalries, while others happily boasted to each other of their great feats in battle.\n\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] stepped upon the grand podium, before [Root.Monarch.GetHerHim] the chiefs of Escann. It was a grand sight to behold, never had so many been in one place since the Greentide. [Root.Monarch.GetSheHe] coughed lightly before speaking.\n\n“We have fought each other for too long, while the adventurers have banded together for our destruction, while the rest of Cannor has been stabilizing and slowly preparing to return to Escann. Is this what you would call honor? Is this what the Dookanson wished? No, my kin. We must band together. Whatever disputes or ambitions you hold currently, I ask you to forfeit them, for yourself, for your clan and for orckind. Urak Dul!”\n\nThe entire hall, moved by the convincing words of the chief, started cheering in unison.\n\n“URAK DUL! URAK DUL! URAK DUL!”\n\nFor the first time in a long time, it seems orcs are united once again."
 flavour_bonecarver.12.t:0 "Stormy Eye"
 flavour_bonecarver.12.a:0 "THEY DID WHAT?"
 flavour_bonecarver.12.d:0 "“The Eye is mine, Gahahahah!” Thrâl growled in victory, accidentally stumbling into the chamber where the sought after treasure was sealed, unknowingly alerting his entire party to his discovery.\n\n“O’ Clouded Eye, show me how I can m’self find buncha gold!” Thrâl asked the crystal as he held it tight, saliva dripping from his mouth.\n\nThe crystal lit up, showing him a treasure chest hidden beneath a pile of bones. Before Thrâl could register the location, he was met with a punch straight to his jaw.\n\n“Gimme that, ya git!” Voltga snatched the crystal from his hands, infuriated yet hungry for its power. “O’ Clouded Eye, show me how I can get a clan of ma-” Before she could finish her sentence, another orc kicked her liver. “Dat’s for me!” Zugor shouted in anger and snatched the glimmering artifact.\n\nA brawl ensued, each orc fighting one another just for a chance to be blessed by the eye of Dookan, yet none quite getting their wish fulfilled. The crystal grew brighter and brighter, taking on a noticeable red hue. Suddenly it ruptured with a blinding flash and deafening boom that put all the orcs to a halt.\n\nWhen their senses returned, the orcs found the pieces of the Clouded Eye scattered on the ground. They were left with nothing besides shattered glass, bruises, and broken bones. Before they could fully grieve their loss, they noticed a clear image imprinted on the walls, a map of Castanor, with a location distinctly marked in shimmering green. Could this be where the corpse of the Dookanson rests?"
 flavour_bonecarver.14.t:0 "Another Normal Day"
 flavour_bonecarver.14.a:0 "The Dookanson shall return when we have proven ourselves!"
 flavour_bonecarver.14.b:0 "He’s not coming back, Dookan is dead. We shall carry on his teaching."
 flavour_bonecarver.14.d:0 "It was another peaceful day in Bonecarver, the sky was a radiant blue, golden wheat aplenty was ready for harvest, children were laughing and playing in the fields while helping their family with work.\n\nBack in the grand temple, [Root.Monarch.GetTitle] [Root.Monarch.GetName] sat in front of a roundtable, surrounded by [Root.Monarch.GetHerHis] most elite shamans, all had a clearly frustrated look on their face given the lack of thundering skies and rupturing ground they had expected.\n\n“THIS IS TERRIBLE!”\n\nOne shouted in anger, releasing the built up tension in the room.\n\n“A year has passed, and no sign, no traces of the Dookanson’s return!"\n\nThere was no clever retort, no reassurance. There had been too many before. The other shamans all just stared at the shaman who made an outburst, looking with disapproval yet also subtly agreeing. Then all suddenly stared at [Root.Monarch.GetName], seeking [Root.Monarch.GetHerHis] final say regarding the matter. It was clear that there was no more waiting, no more calling for patience. They needed an answer here and now."
 flavour_bonecarver.142.t:0 "An Abnormal Day"
 flavour_bonecarver.142.a:0 "He has returned! We are redeemed!"
 flavour_bonecarver.142.d:0 "It was a strange day in [Root.GetName], the sky was a crimson red, gray wheat was wilting and drowning in the fields, children were crying in terror and hiding in the cabins in the protective embrace of their families.\n\nBack in the grand temple, [Root.Monarch.GetTitle] [Root.Monarch.GetName] sat in front of a roundtable, surrounded by his most elite shamans, all had a clearly excited look on their faces with the sounds of violent thunder and bloody downpour hitting the roof.\n\n“THIS IS WONDERFUL!”\n\nOne shouted in joy, releasing the built up excitement in the room.\n\n“Many years have passed, and we have gotten a sign of the Dookanson’s return! Clearly he had been planning the invasion of the heavens themselves all this time!”\n\nThere were plenty of joyful, victorious celebrations and reassurance of faith from the other shamans, who cheered on, even lifting the orc up in unison shouting “URAK DUL!” through the sound of thunder, screams of anguish and terror and floodborns drowning outside mixed with celebrations of other, more faithful Dookanists."
 flavour_bonecarver.15.t:0 "Death and Dishonour"
 flavour_bonecarver.15.a:0 "We know what we must do…"
 flavour_bonecarver.15.d:0 "The silver city, they called it. A once shining example of human civilization in Cannor, the centre of a great empire, the engineering peak of human and dwarven collaboration, created under the supervision of a god himself. Now, the ashened gray walls remembered only death and decay. The entire city stunk as sewage and corpses piled everywhere and miasma filled every nook and cranny. This was not what [Root.Monarch.GetTitle] [Root.Monarch.GetName] expected, [Root.Monarch.GetSheHe] thought of grand celebrations, of orcs cheering, of Korgus Dookanson. Yet none of this can [Root.Monarch.GetSheHe] find.\n\nA creeping feeling ran up [Root.Monarch.GetHerHis] back, one that had been there all this time yet [Root.Monarch.GetSheHe] had refused to acknowledge. It passed the tipping point as it crept up to [Root.Monarch.GetHerHis] heart, causing [Root.Monarch.GetHerHis] knees to let up and [Root.Monarch.GetHerHis] mouth to scream out in anguish. There was nothing to deny anymore. Even without seeing the corpse, the remnants of battle are clear: Korgus Dookanson is dead…"
 flavour_bonecarver.100.t:0 "Anguish Increases"
 flavour_bonecarver.100.a:0 "ARGGGH"
 flavour_bonecarver.100.d:0 "Our people are growing more anguish over the supposed death of Korgus Dookanson..."
 flavour_bonecarver.16.t:0 "Dookan Dul!"
 flavour_bonecarver.16.a:0 "We open our hearts to all, to a Dookanist kingdom!"
 flavour_bonecarver.16.d:0 "All religious activity was halted throughout the entire realm for a month as all shamans, from grand to still-in-training, gathered at the grand temple. They locked themselves within the building stocked full of food and water, with only their endless sounds of discussion being evidence of their existence to the outside world. \n\nThe shamans ceaselessly discussed the matters of the realm, the law and the faith, preparing for a radical transformation of their government and society to both better worship Dookan and spread his teachings. The old clan ways was thoroughly squashed, leaving behind only remnants of it within familial structures and words that have shifted in meaning. Instead, important successions were now matters of the shamans, even of the chief to ensure that no longer can corrupt and unfaithful chieftains like those of the gray orcs, Venomtooth and Severed Ear would rise ever again.\n\nMost importantly of all though, it was put forth that this was not any simple country, it was declared to be a nation ruled by Dookan himself, with the shamans ruling in his exiled stead as a court of regents.\n\nAs the writings were finalized and approved by the highest shamans, [Root.Monarch.GetName] congratulated all his kin of faith in their work and dedication, all utterly satisfied with the growth of their clan over decades."
 flavour_bonecarver.17.t:0 "Communing with the Werewolf Soul"
 flavour_bonecarver.17.a:0 "AWOOOOOOOOOOOOOOOOOOOOOOOOOO!"
 flavour_bonecarver.17.d:0 "Lupine spirits shifted as the shaman raised his hands and continued his chant. The spirits embalm the orcs with their own form, releasing the inner, ferocious orcish soul within each of them. Then it begins, a quick yet violent transformation: a werewolf raises his claws, howls out and is followed by the rest of his pack."
 flavour_bonecarver.18.t:0 "The Fall of Hideguzzler"
 flavour_bonecarver.18.a:0 "Excellent"
 flavour_bonecarver.18.d:0 "The Hideguzzler Clan had only recently escaped from our grasp, fleeing to the rugged mountains of Gulletspeak to build a stronghold for themselves. However, they seem to have forgotten who we are: the orcs who broke the mountains of the Dwarovar long ago. Crushing the relatively puny heights of Gulletspeak proved to be a swift matter for our clan. Now, with their leaders executed for their betrayal, the goblins can only do one thing: accept the rule of our clan once more."
 flavour_bonecarver.93.t:0 "Bonecarver demands conversion"
 flavour_bonecarver.93.a:0 "So be it"
 flavour_bonecarver.93.b:0 "Who gives a hoot what they think?"
 flavour_bonecarver.93.d:0 "The Bonecarver Clan has demanded that we adopt similar beliefs to them regarding the death of Dookan."
#Other
 B27_gorg_asgudan:0 "Gorg-Asgudan"
 B27_gorg_asgudan_desc:0 "The high echelon of this theocracy dedicated to Dookan is made almost entirely of wise lycanthropes who have dedicated their lives, bodies, and souls in the service of Dookan. Unlike the clergy of other faiths who distance themselves from battle for safety, every cleric has a duty to bravely join their fellow warriors in battle, utilizing their powerful form and shamanistic magic to further empower the armies they lead."
 PEACE_anb_enforce_dookanist_protectorate:0 "Enforce Dookanist Protectorate"
 anb_enforce_dookanist_protectorate_desc:0 "5 random provinces are converted to our religion and gain §YReligious Zeal§!. Then, if the majority of their country is of our religion, they'll convert to it."
