l_english:
 #Missions
 B27_divine_right_title:0 "Divine Right"
 B27_divine_right_desc:0 "Orckind and goblinkind, eternally bound and eternally hounding. Since time far gone, Dookan subjugated one by one the goblin gods festering Halann’s caverns, gaining total control over the pantheon and subsequently goblinkind. While the status of these gods have been of much debate with Dookan’s imprisonment, it can’t be argued that we have inherited a part of Dookan’s divinity. As such, we must once again tame the wild goblin clans skirmishing with us to the west and north and supervise them. In addition, while many orcish clans prefer to leave the goblins to their own faith, we shall instill upon them a sense of equal devotion to Dookan, the god who subjugated their gods long ago."

 B27_beyond_the_tide_title:0 "Beyond the Tide"
 B27_beyond_the_tide_desc:0 "Unlike our old chief Brasul, Brasur was a idiotic coward who not only refused to see Dookanson’s divinity, but did something far worse - he ran away, didn’t even have enough of a spine to stay back and die with honour while he still had some left. The Dookanson was assured that the wilds of the Northern Pass, the trolls, ogres, and freezing cold would all claim him and his men eventually. Yet  none of these things killed him, and he even carved a realm of his own in the far north. Rumors have it that his clan has been mingling with the humans, adopting their twisted beliefs and practices, straying away from Dookan altogether. We need to end this now before they get a chance to consolidate their realm."

 B27_thaw_the_maw_title:0 "Thaw the Maw"
 B27_thaw_the_maw_desc:0 "The Frozenmaw clan likes to boast of their strength and conquests. Yet this cannot be further from the truth. Internally the clan is divided, chieftains already straying from Brasur to form new independent clans of their own while their so-called loyal human subjects sharpen blades in the dark, plotting to betray their master at any moment and an upstart foreign noble has even been gathering an army of his own to reclaim the lost kingdom of Vrorenmarch. But this petty politics of fools does not matter to us, we shall settle our disputes over who Dookan truly favours the old-fashioned way, the orcish way, a good fight!"

 B27_big_boned_title:0 "Big Boned"
 B27_big_boned_desc:0 "We thought the frozen wastes of the north were devoid of value, a land of little crop and little opportunity besides woods and game. We were mostly correct, yet we were surprised by the one treasure it has that everywhere else lacks - mammoths. More than just giant walking castles of meat and fur, their ivory has many uses, creating beautiful artifacts and scrimshaws like none other. In addition, ivory seems to possess special magical properties such as enhancing spells cast using staves made from it. Many of our gray kin simply wish to hunt these majestic beasts to extinction, but we are far wiser than that. Our best handlers have already created large mammoth enclosures, slowly domesticating them with great results. Should we provide them with enough land and resources in the right climate, they believe they can give us a steady source of ivory delivered right to our doorstep."

 B27_scrimshander_guilds_title:0 "Scrimshander Guilds"
 B27_scrimshander_guilds_desc:0 "Scrimshaws, so important to us that they gave us our name as the Bonecarver clan, have become an ever increasingly important part of society as our tribe expands. The art of ritualistic carving on bones used to be a diverse practice, varied in its implementation from orc to orc, with techniques passed down orally from elder to apprentice. Now, however, the abundance of bone and ivory has allowed us to use them to inscribe our knowledge, creating a uniquely orcish script both in writing and instruments.\n\nThis has led to a boom in both scrimshaw quality and production, used for religious ceremonies, burial rituals, inscription and even trade! Soon the name Bonecarver will be known all over Cannor as our Scrimshaw practice circulates."

 B27_monuments_to_korgus_title:0 "Monuments to Korgus"
 B27_monuments_to_korgus_desc:0 "Despite the millenniums orcs have walked Halann, very few grand structures and great works of art were left behind by our ancestors. Perhaps generations from now, those of another time shall marvel at the great orcish renaissance that has been ongoing in our clan, where culture and religion prosper like never before, leaving great artifacts of beauty behind. While it is truly incredible to imagine that we are on the precipice of a new age of culture, we must still focus on what all of this art is dedicated to in the end: the great hero and prophet, the Dookanson, may he march on."
 

 B27_where_the_soul_is_title:0 "Where The Soul Is"
 B27_where_the_soul_is_desc:0 "In our clan, each honourable death is both mourned and cherished. For it is proof of a selfless gift, of selfless devotion to Dookan and the clan. Instead of hauling our loved ones away to rot and be eaten by worms like those barbaric surface-dwellers, we give back to them and thank them for their life and death by creating a heartfelt and artistic scrimshaw out of their bones, ensuring they can give us one last gift even from the beyond. As in truth, the orcish soul is distinct from any other mortal’s, for it carries a shred of Dookan’s shed divinity, and thus like the gods, it is in a sense immortal, meaning no orc is truly gone forever. By our careful craftsmanship, we can allow them safe and secure passage to another life, another incarnation."

 B27_searing_dogma_title:0 "Searing Dogma"
 B27_searing_dogma_desc:0 "Great Dookanism is still quite a nascent movement, with its own developing doctrines, theology and organizations. It is a broad faith united only through the mutual desire to destroy the Cannorian Pantheon. While this worked well when we had the Dookanson to guide us, his absence has caused each of the clans with drastically different views on orcish theology to fight each other over minor religious squabbles. It is time for a change to this, starting right at home. No more shall religious inconsistencies be tolerated. Our shamans shall gather tonight to reach a mutual consensus on what being a devoted follower of the Dookanson truly means, and each orc within our clan shall be taught to comply with these teachings, lest they wish to be deemed heretics."

 B27_humans_with_a_soul_title:0 "Humans With a Soul"
 B27_humans_with_a_soul_desc:0 "On the borders of the Alenic Reach, south of what was once Vrorenmarch, humans who wander too far into Western Castanor would encounter a strange sight - Dookanist missionaries. Unlike the usual warband, these orcs did not seek loot, plunder, or death, but rather a moment of their time. Often trying to win over converts through theological debates, they appealed to Dookan’s betrayal in an otherwise fair deal and the crimes and neglect of a distant court in favour of a more direct god. While loud and threatening, these orcs possess no murderous malice, less than happy to let wanderers walk past them but restrained nonetheless, believing it honourless and nonsensical to force Dookan’s faith upon those unwilling and peaceful.\n\nIndeed, Brasul Bonecarver was not like the other orc chiefs who believed wholeheartedly in the destruction of the Cannorian Pantheon and its followers. Instead, he was on the same side as the humans, believing Korgus Dookanson was a maniacal false prophet. And yet, he became the most devoted follower after one fateful encounter with the son of Dookan himself. As such, he too believed that the weak humans could be freed from the trappings of the Regent Court should they open their hearts to Dookan and be made strong through guidance. Preferring to convert their hearts rather than slay them, he believed that the Pantheon can only be destroyed by exposing its lies and corruption that led so many to suffer and be wrongfully punished."

 B27_creations_of_agrados_title:0 "Creations of Agrados"
 B27_creations_of_agrados_desc:0 "Mankind and orckind were relative strangers not but a century ago. Yet we’ve found that we are much alike, even capable of creating viable offspring with each other, something not found within either orcish or human societies since the arrival of the elves. Even more so, humans were created by Agrados as a means of upheaving the gods during the Gods’ War, the same as how Dookan created orcs. Many artists and philosophers have already begun creating great pieces of art to emphasize this unlikely kinship. For this reason, it has been all the easier to integrate humans in our realm, and many have already begun creating households with orcs."

 B27_a_generation_of_union_title:0 "A Generation of Union"
 B27_a_generation_of_union_desc:0 "Half-orcs are famously without a true home. On the borders of orcs and humans, they never quite fit either. One views them as weak and defective half-breeds, the other as an abomination of barbarism and civilization. Yet in our society, where all who join the righteous cause of Dookan can find acceptance and prosperity, they have found refuge, not as a tolerated presence, but as equals. Their unique synthesis of both humans and orcs have also contributed greatly to our military, ushering in new ideas that still fit within the frame of orcish grand stratagem."

 B27_searching_once_more_title:0 "Searching Once More"
 B27_searching_once_more_desc:0 "Brasul Bonecarver, formerly Brasul Swallowed Tongue, founder of Clan Bonecarver, Dookanson’s Dearest Devotee and the one who brought the light of Dookanson upon many of us. He served dutifully as a chieftain and head shaman, virtuous in his brutality and cunning, yet always had a heart for even weaklings, for he believed all could gain the strength to accept Dookan into their hearts, even those fetid by the corruptions of the Cannorian Gods. He died the way he wanted, in a grand battle serving Dookanson. Yet this is not the end of his life, for a life only ends when another begins. With his skeleton trapped beneath the plagued mires of Rottenstep, we must rescue his soul and allow it to reincarnate once more by carving a holy grand scrimshaw."

 B27_boneless_blasphemy_title:0 "Boneless Blasphemy"
 B27_boneless_blasphemy_desc:0 "The practice of enslavement of orcs is truly barbaric, an antithesis to Dookan himself, a chained god that created us to liberate him from his loathsome shackles. Yet our kin would abandon their way for coins. No more is this apparent than the Severed Ear clan; with a long tradition of enslaving orcs through force and terror, they have abandoned the desires of the tide altogether, preferring to stay behind well-shielded white walls and break the backs of their own kind. Horrific stories from refugees tell of tight, disease ridden gallows, butchered limbs for daring to defy authority… It is becoming increasingly clear that the clan will only stray further if left to its own devices. We must contain it now."

 B27_a_shaman_among_clans_title:0 "A Shaman Among Clans"
 B27_a_shaman_among_clans_desc:0 "While orcs are famous for their often violent internal disputes, most rational clansmen would agree that a strong and secure clan is one with all of its people fully intact. As such, shamans were often tasked as mediators of internal disputes within the clan. However, the wider geopolitics between clans lack such a mediator, meaning clan-to-clan disputes have a very high chance to result in bloodshed until either clan is subjugated or both are worn out from war.  As the adventurers create tight alliances and mutual defensive federations, these conflicts have only made the position of the orcs of Escann more precarious. With our authority asserted over the criminals in Severed Ear, some clans have already treated us as the de facto mediator and overseer of all faithful matters. By leveraging this reputation, we might ensure a time of peace for all orcs so that they can once again band together towards overthrowing the Cannorian gods."

 B27_convene_dookandom_title:0 "Convene Dookandom"
 B27_convene_dookandom_desc:0 "Piety, Power and Valor. There is nothing our clan lacks, a nation built in the image of Dookan. Many should look up to us as a prime example of a developing orcish state, one slowly unraveling the old threads of entrenched tribalism and traditionalism to weave a new, greater, stronger society. Perhaps in time the rest of the orcs shall learn, lest they wish to dwell in the unenlightened path and be shredded by mortar shells.\n\nIn the meantime, the orcish clans clearly cannot be expected to survive with the advancements in human technology. As such, we shall call all the shamans of the Greentide to gather in [Root.Capital.GetName] to discuss what needs to be done to ensure the survival of the clans."

 B27_dookan_dul_title:0 "Dookan Dul!"
 B27_dookan_dul_desc:0 "“From the shadows of the Greatwoods, besieged by adventurers, werewolves, goblins, gray orcs, and plenty of threats stalking beneath the canopy, one clan emerged through the pure gilding light of their faith: the Bonecarver clan. Looking back, could you say this is a miracle or preordained? No matter, I simply wish for the prosperity of our clan from now on and for us to not forget the continuing war against the hostile gods. I wish you victory, my many kin of one God." - Parting words of Korgar, Grand Shaman"

 B27_a_worthy_exemplar_title:0 "A Worthy Exemplar"
 B27_a_worthy_exemplar_desc:0 "We are not merely the Defender of Dookandom, we are also its blade, its wake, and its beacon. Other orcs have marveled more and more at our great warriors, our field breaking generals, and our earth rumbling shamans. Many of these clans are eager to join our glorious battles, mesmerized by our romantic tales of the bygone tide. A new tide is on the horizon…"

 B27_a_second_chaining_title:0 "A Second Chaining"
 B27_a_second_chaining_desc:0 "Terrible rumours have run amok our clan: stories of humans brutally chaining orcs, eerily reminiscent of the gods chaining Dookan, stripping our kin of warrior valor and replacing it with endless fruitless toil at gunpoint. Even worse, it seems the Venomtooth and Severed Ear clans neighboring us are participating in this practice, let alone doing anything to end it under humans. We stand alone as true orcs, a race inherently created to liberate and avenge, and so we shall march forth and free our kin from the clutches of the faithless adventurers."

 B27_scour_the_woods_title:0 "Scour the Woods"
 B27_scour_the_woods_desc:0 "“Do not let them escape! Send out the wargs and find them, scour every canopy and root if you have to. I saw it in his eyes, the burning rage of Dookan. This is no merely normal curse, it is a blessing, surely one given to his most devout! Yet Dookan is not like the docile Cannorian Gods; he gives his subjects a proper challenge to test the worthy, and so we shall conquer these lycanthropes and give his blessing to all the worthies of our clan.”"

 B27_curse_or_blessing_title:0 "A Curse or A Blessing?"
 B27_curse_or_blessing_desc:0 "A few of these “werewolves” have been captured by our men after turning during the last moon. Encaged in a fighters pit, they display savagery unseen since the earliest days of the Greentide. Stronger than 5 men and greater in size than even the largest orc in the Bonecarver tribe, they seem to have no instincts beyond predation, and no appetite beyond blood. An elder of the tribe points towards the caged beast, “Look upon it! Such a vile creature! To think, that is one of us!? Dookan must be punishing us for abandoning his chosen son at Castonath!”\n\n“Hmph!” Snorts one of the younger warriors, “but consider its strength. Its power! This beast killed 6 of the best warriors I knew before it was subdued, made us look like children playing where we don't belong.” The warrior contemplates for a second, the rest of the men present waiting for his proclamation. “Dookan may be punishing us, yes. But if we can overcome this trial, just as our ancestors overcame many in the great caves of the Serpentspine, perhaps this curse is the edge we need to continue Dookanson’s holy work.””"

 B27_long_night_title:0 "After a Long Night"
 B27_long_night_desc:0 "The first time we tried making our own werewolves was a failure. Dookan turned his wrathful gaze on our men and many became feral, little more than slobbering beasts. Yet, the strongest and most fervent of these men were found worthy in Dookans eyes and blessed with the name Gorgtamiz. Having tamed the curse, they show great promise. Possibly even capable of helping other Aspirants pass Dookans trials. Many brave warriors have volunteered to take the curse within them and undertake the ritual.\n\nHaving been given a special place in our clan, the wolf warriors strong enough to have passed Dookan’s trials before now oversee the other Aspirants, many of whom are inspired by the strength of will showcased by these model orcs. Dookan willing, our ranks will swell with blessed wolf warriors."

 B27_shamanistic_rule_title:0 "Expand Shaman Rule"
 B27_shamanistic_rule_desc:0 "Though we rightfully despise the religious practices of humans, there is something to appreciate and learn from the fruits of their nation building. Every facet of society is neatly organized through law and learned authority. The structure of most orcish clans already has similar practices in place, though they are often overruled by might makes right. Our powerful new lycanthropic shamans could prove to be very useful in solving this however. Both wise and strong, they can enforce the will of the shamans throughout our clan. In fact, many small communities already have more advanced theocratic structures, with shamans taking the role of lawmakers and enforcers."

 B27_wayward_shamans_title:0 "Wayward Shamans"
 B27_wayward_shamans_desc:0 "This world is too large, too large even for us orcs to fully grasp. For the millennia the Regent Court has existed, it has festered and entrenched itself over all the world, even spreading beyond the high seas to the rumored homelands of the elves. Simple conquest and subjugation can never reach these lands, at least not without massive costs. Instead we must send out our most charismatic shamans, appeal to each human, halfling, and elf the liberation Dookan offers. For Dookan offers not a regent, but a war, a war against the kings and tyrants of Cannor, and one day we shall be victorious in this war and break the chains that bind us all."

 B27_dookan_devout_title:0 "Dookan's Devout"
 B27_dookan_devout_desc:0 "Our clan puts much more emphasis on the worship and spread of Dookanism than any other clan, yes, but Dookanism is still a faith of strength and valor at its core. What is zeal without the strength to back it up, after all? For this reason, warriors and berserkers who have proven their strength within our clan have earned great reverence and support. Now, with so many worthy examples within our borders, they have requested a keep of their own to organize themselves from, promising to not serve our clan but Dookan himself."

 B27_seize_the_eye_title:0 "Seize the Eye"
 B27_seize_the_eye_desc:0 "Bonecarver isn’t the only Clan ruled by wise shamans. For millennia, the Clouded Eye clan was famed for its wise leaders, chosen not by strength but by elder wisdom, becoming an integral part of the Dookanson’s ascension to a prophet of orcdom. Yet, with the last wise chief Grama dead, the clan has starkly lost its way, electing Arosha, a young riled up orc who would stray from Dookan to pursue the favours of the fallen Corin.\n\nWhile this is hardly out of the ordinary, for many orcs have already been straying from Dookan in favour of the Cannorian gods, the Clouded Eye clan holds a powerful magical relic known as the “Clouded Eye”, a shimmering crystal giving the wielder knowledge of both past and future. Not only will such an artifact allow us to locate Dookanson’s desecrated corpse, it will also impart on our clan boundless wisdom should it be in our hands. However, it seems the Clouded Eye clan doubts our devotion, unwilling to let one of our own touch it. With a recent incident where one of our shaman envoys were executed for merely being an annoyance, our options are narrowing down to a single, bloody, straightforward one."

 B27_lie_title:0 "It's all a lie!"
 B27_lie_desc:0 "Aâdga may have shocked us with the supposed news of the Dookanson’s death, but let us not kid ourselves, her clan is one made up of opportunistic outlaws and faithless bounty seekers, a clan hardly famous for their honesty and faithfulness. This is most likely a simple ploy to usurp  the Dookanson as Aâdga began rallying orcs to her with her false lies. But we see the truth, we faithfully put our trust in the divine presence of the son of Dookan, that he is still alive and shall return. Naive, they say. Devoted, we retort. Thus, we shall rightfully take upon ourselves to be the most faithful of Dookan in the West, shielding it from heresy and further heathenistic incursions."

 B27_good_dookanist_title:0 "Good Dookanists"
 B27_good_dookanist_desc:0 "The chieftains hall is filled with myriad voices shouting, arguing, dismaying even, over the supposed death of Korgus Dookanson. Azukor rises from his seat and quiets the disparate orcs with a mighty slam of his fist onto hard wood. “Warriors! Brothers! Sisters!” he bellows, louder than many have ever heard him. “Lesser orcs proclaim the Dookanson dead! Say he was slain by some fire haired wretch!” Many of the orcs present hold their heads low in shame. “But do we believe a vile Venomtooth when they spit bile from their godless throat? No! We must go ourselves! To Castonath! To see Korgus’s inevitable victory and the corpses of our enemies strung high on its charred white walls!” Cheers echo out through the hall and into the rest of the village. “To Castonath!” some of the most zealous orcs reply in unison.\n\nAzukor holds out his hand, one foot on his war table, quieting the cheers as easily as he quieted the dissent. “Prepare a war party! We go to see the Dookanson and his holy victory at Castonath. And from there, where he goes? We follow!” Azukor turns to an orc closer to him, speaking in a softer tone. “Bring me my mount, I will lead this band, as I should have to begin with. From this day forth, the Bonecarvers will not abandon him again.”"

 B27_may_he_rise_again_title:0 "May He Rise Again"
 B27_may_he_rise_again_desc:0 "Dookanson shall rise again, just like that upstart redhead once did! The Eye showed it to the Grama and showed it to me, a future where orckind roams free in the land promised to them, a future where Dookan is free and oversees his faithful children, a future where the tyrannical pantheon bleeds from the heavens. It simply cannot be wrong, that is utter absurdity! All we need now is to create a scrimshaw from the Dookanson’s blessed bones, then his great soul shall finally be allowed to reincarnate and return to us once more to usher in a new age of orcish prosperity."

 B27_spreading_his_roars_title:0 "Spreading His Roars"
 B27_spreading_his_roars_desc:0 "The Dookanson might not be coming back anytime soon, but we, his devoted followers, still remember him and his teachings and we shall ensure his wisdom shall not die with him. Our clan has grown more powerful, gaining more clout among the other clans, even managing to convert many heretics and heathens to the true faith. Yet much still needs to be done; without a central religious figure to oversee all practice of the proper ways, it won’t be long until all stray from Dookan once again. Thus, with more than enough military might to back it up, we have humbly taken on the burden of being on eternal watch for all of Dookandom, guarding both internal and external threats."
