 magic_project_esthil_necronomics.1.t: "Necronomic Experiments"
 magic_project_esthil_necronomics.1.d: "While the pinnacle of Necromancy is Morgurax's Lichdom ritual, the most iconic spell is Animate Dead, which has its roots in ancient and revered Milcorissia. While Morgurax himself reworked what was once an elaborate and time-consuming ritual into a spell that could be cast in a minute or two by even a middling mage, he did not change the core application: reanimating a humanoid corpse, most generally by binding the soul that originally inhabited the body. Since then, necromancers have frequently found themselves hunted by the ignorant and narrow-minded, and so relied on the knowledge passed down by Morgurax to create bodyguards to protect themselves.\n\nHowever, here in Esthíl, we have the luxury to consider what purposes the spell can be put to other than bodyguards. Already, there have been discussions as to what labor could instead be performed by untiring and compliant undead. A few initial experiments have been carried out in fields, such as making skeletons pull ploughs in the place of oxen, but several skeletons were required to replace even a single beast.\n\nThis inspired a question: what if we could bind orc souls to animal corpses, such as oxen or horses? In theory, such bodies should have greater strength, and while they would be unable to use tools, their bodies should be more suitable for a great deal of work, whether that be pulling ploughs, hauling carts, or even just being used as pack animals. The necromancers are eager to experiment with this idea, and have asked for plenty of souls to be made available for these experiments.\n\n- Monthly report of the Black Sepulcher, [GetMonthName] of [GetYear]"
 magic_project_esthil_necronomics.1.a: "Make do with what you have."
 magic_project_esthil_necronomics.1.b: "You shall have them."
 magic_project_esthil_necronomics.1.c: "You shall have what you ask for, and more."
 magic_project_esthil_necronomics.2.t: "Beastly Souls for Beast Bodies"
 magic_project_esthil_necronomics.2.d: "As expected when breaking new ground, experiments yielded not only expected results, but also unexpected ones. Among the expected results is that while the animal bodies are indeed more suitable for labor, it seems that the souls of orcs are not as well-suited to being bound to beasts as they are to humanoids. This results in their souls unravelling faster than if they were simply bound to orc or even goblin bodies, and also makes them noticeably less responsive. This is fortunately not an issue for most straight-forward tasks, such as simply pulling a plough or cart, but anything more complex than that is infeasible.\n\nOne unexpected result is that while all souls used in necromantic spells suffer for it, this suffering seems to be significantly amplified when they are bound to bodies different from those they inhabited in life. When interrogating them, significantly more pain is required to compel them to stop bemoaning their suffering and answer questions.\n\nIt is naturally difficult to quantify exact levels of pain, but by inflicting a standardized and significant level of suffering upon orcs before they are executed and used for reanimation, it has been discovered that souls bound to animal bodies suffer roughly four times as much pain as if they were simply bound to their own bodies. For the sake of curiosity, orc souls were bound to goblin bodies and vice versa, leading to, on average, goblins suffering half again as much as if bound to their own bodies, while orcs suffered twice as much.\n\nWork continues apace, with the latter discovery viewed as good tidings, for it meant greater suffering for the orcs and goblins in retaliation for the devastation they have wrought upon Escann.\n\n- Monthly report of the Black Sepulcher, [GetMonthName] of [GetYear]"
 magic_project_esthil_necronomics.2.a: "Carry on the good work."
 magic_project_esthil_necronomics.2.b: "Bring the head researcher to court."
 magic_project_esthil_necronomics.3.t: "Prototypes ready"
 magic_project_esthil_necronomics.3.d: "One of the benefits of undead labor is that they will untiringly heed any commands... that they can carry out. This latter point is an important distinction. Simple commands like 'pick up that sword and hack at that orc' will work. However, any tasks requiring intricate work are infeasible, as the souls are not responsive enough to be able to carry out such tasks.\n\nAll of this is complicated further when dealing with humanoid souls bound to animal corpses, as while these souls do know how to move a body, the body the soul is used to is different from the one it becomes bound to. Thus, the movements of such undead are frequently jerky and uncoordinated. While this is not an issue so long as the task is simple and the field is level - such as hauling a cart on a road - the attempts at ploughing an abandoned nearby field have shown that its unevenness will cause the reanimated oxen to frequently stumble and fall. This not only slows down the overall process, but also risks damaging the plough.\n\nTo ameliorate this issue, testing will need to be conducted on different fields with different levels of unevenness, as well as with a variety of plough, to determine whether solving this problem is present feasible, or if - as some within the Sepulcher are insisting - the focus should be put on more simple usages.\n\n- Monthly report of the Black Sepulcher, [GetMonthName] of [GetYear]"
 magic_project_esthil_necronomics.3.a: "You will have to find more abandoned fields."
 magic_project_esthil_necronomics.3.b: "The state will requisition a few fields for you."
 magic_project_esthil_necronomics.3.c: "Force entire provinces to be a testing ground."
 magic_project_esthil_necronomics.4.t: "Deadstock"
 magic_project_esthil_necronomics.4.d: ""As you see, My Lady, the souls you have entrusted to us have been put to good use," said the lead researcher, a not-at-all subtle tilt to his lips as he gestured to a reanimated horse pulling a cart. Varina shared in his amusement, as seeing the invaders bound to the bodies of mere animals felt quite appropriate. If the orcs wished to act like mindless beasts, it was only fitting that they be put to work as such.\n\n"While many of us had high hopes that the Deadstock would be able to greatly speed up ploughing and harvesting fields, the results have been... underwhelming," he continued, but stopped at a glance from Varina.\n\n"Deadstock?" she repeated, as if tasting the word, then chuckled. "An apt description. Carry on."\n\n"While the results when it comes to field work have been underwhelming, we realized that so long as they were only required to perform simple tasks, Deadstock could functionally be used by regular people." He nodded at the dead horse hauling a cart, before waving for Varina to follow him into a building, where four reanimated oxen were walking in circles, turning a millstone. "All in all, these advances means that it will not only be easier to bring goods to new and existing settlements, but new mills can be set up without the need for them to be powered by wind or water, which should help with productively cultivating lands that would otherwise be too far from a regular mill to be viable.""
 magic_project_esthil_necronomics.4.a: "Orc souls put to good use."

 magic_project_esthil_necronomics.5.t: "Death Wards"
 magic_project_esthil_necronomics.5.d: "The art of Necromancy is, fundamentally, the manipulation of life energy. The most well-known example is draining a soul to animate a corpse, but it is also possible to manipulate life directly. A skilled necromancer can snuff out unprotected souls given a captive victim, though the mana required to do so could fuel several fireballs, and simply slitting the throat is faster and requires no mana at all. As such, direct killing using Necromancy is a rather underdeveloped field.\n\nHowever, a promising young necromancer - taught without having Magisterial propaganda shoved down his throat before he cast his first cantrip - proposed a novel idea; creating a ward calibrated to eventually kill rats, rather than trying to kill fully grown men instantaneously. Initial experiments indicate that the premise is sound, with rats thrown into the prototype wards perishing within a dozen seconds. Exposing living orcs and goblins to the ward resulted in them suffering a moderate - but not incapacitating - pain, with actual death taking a while to occur. A starved goblin perished after an hour or two, while healthy orcs lasted a day or two before succumbing.\n\nHowever, multiple issues lie between theory and actual implementation:\n- The first issue is that grain is even more vulnerable to the death ward than vermin. In theory, this could be solved by only making small death wards covering the entrance to granaries, but doing so would mean that cracks or other small openings missed while setting up death wards would leave otherwise protected granaries vulnerable.\n- The second issue is that the mana required for even a vermin-killing ward are relatively high, with souls used to power them being consumed within days, making wide-scale deployment impractical.\n- Third, while vermin are indeed killed, the presence of their corpse might very well cause grain to rot, even if the grain itself was protected from the effects of the ward.\n\nDespite these issues, the leadership at the Black Sepulcher believe this line of inquiry promising. To investigate this, a series of granaries to perform field tests would be appreciated. See the appendix for further resource requests.\n\n- Monthly report of the Black Sepulcher, [GetMonthName] of [GetYear]"
 magic_project_esthil_necronomics.5.a: "A few decrepit granaries will be made available."
 magic_project_esthil_necronomics.5.b: "Dozens of active granaries will be commandeered for this."
 magic_project_esthil_necronomics.5.c: "Food security is secondary."
 magic_project_esthil_necronomics.6.t: "On the Pain of... Pain"
 magic_project_esthil_necronomics.6.d: "For almost a year, steady - if slow - progress was being made to the Death Wards. The efficiency of the ritual was increased, with the duration of the ward while being powered by an average orc soul being extended from mere days to several weeks. However, when setting up the wards on actual granaries, the predicted issues arose: extending the ward over grain would make it wither within minutes, while trying to simply cover the entrances to granaries was better than nothing, but would sometimes lead to vermin getting in through cracks and other small openings, whereupon they would spoil the grain.\n\nAfter much contemplation, it was realized that inflicting death upon vermin was not actually necessary to protect the grain: a ward to deter vermin from entering the granaries would be sufficient. Thus, the focus of the project changed from 'Death Ward' to 'Pain Ward'.\n\nEvne the initial, fumbling attempts at creating such Pain Wards showed great promise: the fact that they deterred vermin rather than killing them prevented carcasses from accumulating near grain, and the duration of these wards was higher than even the best-performing Death Wards. However, secondary to these improvements is the fact that it does not harm grain stored within it.\n\nThere is still much work to be done in the way of prolonging the duration of a Pain Ward before the soul powering it expires, but the project is now on a much more promising track. To ensure that progress continues smoothly, the leadership at the Sepulcher requests that a plentitude of souls to be made available so that theories for variants of wards can be easily put to the test to speed up Pain Ward development.\n\n- Monthly report of the Black Sepulcher, [GetMonthName] of [GetYear]"
 magic_project_esthil_necronomics.6.a: "The state cannot spare anything."
 magic_project_esthil_necronomics.6.b: "Allocate some Souls to ease testing."
 magic_project_esthil_necronomics.7.t: "Maximizing Suffering, not Complexity"
 magic_project_esthil_necronomics.7.d: "Since the initial status report on Pain Wards, a great number of variants on the ritual have been tested. The initial version simply siphoned the life energy from the soul powering the ward to create a field of pain in a straight-forward but inefficient manner. Iteration upon the core concept swiftly led to increases in duration, but the most promising innovation was made by another promising young necromancer, unburdened by Magisterial norms and propaganda. It was realized early on that the Pain Ward does not actually need to generate pain from nothing, as it can simply project the pain that the soul powering it is already suffering.\n\nHowever, this line of research was discarded, as initial experiments showed that this projected pain was not sufficient to deter determined vermin. The innovation laid in deliberately mangling the process of binding the soul to the granary, while still just barely succeeding. Doing so significantly increased the pain suffered by the soul and projected by the ward.\n\nWhile this process does speed up the unravelling of the soul - and is thus usually undesirable, even for orc souls - wards simply projecting the pain felt by such souls last two to three times as long as souls siphoning life energy and turning that into pain.\n\nWhile it will likely take decades before the ritual is considered perfected, the lead Necromancers reckon that a few more years of testing and iteration should be sufficient to make the Pain Ward a viable option for wide-scale deployment. Of course, this timetable could be sped up, were additional resources diverted.\n\n- Monthly report of the Black Sepulcher, [GetMonthName] of [GetYear]"
 magic_project_esthil_necronomics.7.a: "Carry on, as you are."
 magic_project_esthil_necronomics.7.b: "Very well, you shall have what you ask for."
 magic_project_esthil_necronomics.8.t: "Pain Wards"
 magic_project_esthil_necronomics.8.d: "Varina stared at the demonstration unfolding before her eyes, fighting the urge to wince. It was not the sight of an orc being ritually sacrificed and his soul brought under control that did this. No, it was the quality - or lack thereof - of the Necromancy that followed that brought the grimace to her face. Words almost slurred rather than spoken, gestures choppy rather than fluid and graceful, and the soul almost being allowed to escape before being yanked back under control.\n\nInstincts built over decades of honing her skills as a necromancer screamed at her to intervene, to correct the mistakes, but she refrained, for she knew that it served a purpose, and consoled herself with the thought that while this felt like a crime against Morgurax's art, it not only brought orcs more pain for their transgressions, but also served a greater purpose: harnessing that pain.\n\nWhen the ritual completed, Varina felt an echo of that pain, but forced her face to remain impassive. Others were less restrained, with the necromancer that had performed the ritual swiftly scampering out of its range, while many other Lodge members here to witness the demonstration similarly made quick retreats out of the radius. Only after several seconds of stoically enduring it did Varina sedately follow their lead.\n\n"As you can see, My Lady, the Pain Ward lives up to its name," said one of the researchers, pride in her tone. "While a determined thief could stomach it for some time, it is more than effective at deterring vermin, all without causing any damage to the grain. Those who deposit or withdraw grain from the granary will admittedly have to endure the pain, but that should be a small price to pay for the knowledge that said grain will be safe without needing to resort to the tricks that peasants usually need to do so."\n\nVarina nodded, satisfied. She regularly received petitions from this or that community to provide aid after pests had spoiled the grain they had stored, and this would mitigate that. And other than that... well, she always enjoyed it when orcs were put to use ensuring the prosperity of the lands they sought to destroy."
 magic_project_esthil_necronomics.8.a: "A fitting punishment for their sins."

 magic_project_esthil_necronomics.9.t: "A Curious Discovery"
 magic_project_esthil_necronomics.9.d: "There are, naturally, a great many experiments running at the Black Sepulcher at any given time. The prevailing fascination for the past few months has been trying to create combat-viable Death Wards. However, these experiments invariably run into the same problem: making a ward powerful enough to kill soldiers would drain a soul in a matter of seconds, making it impractical for field usage.\n\nA few enterprising youngsters, however, have asked whether soldiers really need to be killed within moments or even killed at all, as simply causing prolonged low-level harm to enemies of the state would be just as effective. As such, they applied a Death Ward with significantly reduced strength to one of the holding cells, and then extracted a few orcs every day to determine whether there was a gradual decrease in their fighting strength. Unfortunately, no such decrease was observed.\n\nThat experiment might very well have ended there, if not for the fact that a few of the orcs were slain, reanimated as zombies, and set to guard their former kin as warnings to the other subjects to behave. Normally, the flesh of a zombie begins to visibly decay and begin rotting within a few days, but the necromancers realized that the zombies they had created and left within the effect of the Death Ward showed no decay at all!\n\nIt is not yet clear what is causing it, but exposing zombies to Death Wards have shown that the phenomenon is consistent, and that the decay of zombies ceases while within such wards. Given the greater strength of zombies compared to skeletons, it is believed that this discovery could be of great use for fieldwork, since the usage of zombies for such purposes has until now been inhibited by the fact that their rotting flesh would risk spoiling crops. To speed up these investigations, a healthy supply of souls and prisoners would be required.\n\n- Monthly report of the Black Sepulcher, [GetMonthName] of [GetYear]"
 magic_project_esthil_necronomics.9.a: "Nothing can be spared."
 magic_project_esthil_necronomics.9.b: "Your request for resources has been approved."
 magic_project_esthil_necronomics.10.t: "Initial successes"
 magic_project_esthil_necronomics.10.d: "Initial investigations into the phenomenon labelled as 'undecaying zombies' were focused on trying to determine why, exactly, the zombies were not rotting. The first experiments carried out were to place newly raised zombies into Death Wards of differing power. In these experiments, every single Death Ward proved strong enough to stave off decay, though no matter the strength of the ward, the zombies still suffered from decay after being removed from them, albeit at a slower rate than regular zombies.\n\nThe next steps taken were to produce even weaker Death Wards, an effort that was surprisingly difficult due to the level of care needed to produce such a minimal effect. In addition to simply putting less power into the ritual, several steps were also deliberately performed shoddily, as to weaken the effect further. The result of this was a dozen Death Wards of decreasing power. Even the strongest of these were unable to kill simple flies, but still served to stave off the decay of zombies. All but the weakest two were also capable of preventing decay from occurring, though those two still slowed down the process significantly.\n\nEfforts to determine why this is the case have been unsuccessful in anything but provoking arguments between the researchers. The leading theory is that some kind of animal too small to perceive is responsible for the decay and is killed by any but the very weakest of Death Wards, though there are several competing theories. Regardless, the phenomenon is consistent and repeatable, and so the focus has shifted to figuring out how to use a soul already powering an Animate Dead spell to simultaneously power a Death Ward, as to permit the creation of zombie laborers who do not decay, so that their strength can be harnessed for field work. To this end, an allocation of magical resources would be appreciated.\n\n- Monthly report of the Black Sepulcher, [GetMonthName] of [GetYear]"
 magic_project_esthil_necronomics.10.a: "No such resources are available."
 magic_project_esthil_necronomics.10.b: "They shall be allocated."
 magic_project_esthil_necronomics.11.t: "The Undecaying Dead"
 magic_project_esthil_necronomics.11.d: "The first steps towards deployment of Undecaying Zombies was, naturally, to establish a baseline for efficiency. Thus, a series of weak souls were used to power both the classical Animate Dead, as well as a Death Ward just strong enough to produce the phenomenon. While the specifics varied a bit from soul to soul, the general trend was that doing so reduced the time taken for the soul to unravel by approximately a third. Far from a negligible decrease, and if it was the best that could have been achieved, it might have called into question whether the increased strength was worth the reduced time of activity. Fortunately, as noted, this was simply done to determine the baseline that future iterations would be judged against. To try to improve these results, a variety of experiments were conducted, with most researchers adhering to one of two camps.\n\nThe first sought to create a ritual combining both the animation of the corpse and the creation of the ward, hoping that the two effects had resonances and redundancies that would lead to a combined ritual being less draining on the soul.\n\nThe second camp, meanwhile, observed that the fields created by basic Death Wards are spherical and that trying to change this would decrease efficiency, while humanoid and animals are shaped more like cylinders. One of their proposed 'solutions' was to make humanoid zombies crouch perpetually, which would significantly reduce the area that the Death Ward needed to cover to stave off decay. While the sight of orc zombies crouching and crawling around was quite satisfying to witness, their labor effectiveness was significantly reduced. A more promising solution was to not create one large Death Ward capable of covering the entire zombie, but rather to distribute several smaller wards at different parts of the body, reducing wasted coverage.\n\nFortunately, it was possible to combine the two approaches, with the final result being a ritual that only reduces the expected duration of a soul by a tenth. The next stage is field testing, which would be simplified by a stipend to ensure cooperation from peasants.\n\n- Monthly report of the Black Sepulcher, [GetMonthName] of [GetYear]"
 magic_project_esthil_necronomics.11.a: "Make do with what you have."
 magic_project_esthil_necronomics.11.b: "Funds will be made available."
 magic_project_esthil_necronomics.12.t: "Undecaying Zombies"
 magic_project_esthil_necronomics.12.d: "It was eerie, looking at the undecaying zombie. Had it worn regular clothes, Varina might have mistaken it for a living being... if not for the fact that she was looking into its eyes, and found them utterly lifeless. "Most of the farmers find them quite unnerving, apparently," reports one of the aides, shrugging. "They say that it's one thing to see skeletons constantly and untiringly pulling ploughs or swinging scythes, but seeing something with flesh do the same is apparently too much for them. I don't see the fuss myself."\n\nRather than dwelling on that, the aide continued. "The results are very promising, though. While there are some tasks that skeletons do just as well, such as the afore-mentioned scythe-swinging, the greater strength of the zombies helps in other areas." The aide barks a command, and the undecaying zombie Varina had been watching starts moving, picking up a small plough and starting to pull it across the field. Simultaneously, a single skeleton begins to do the same, but soon finds itself significantly outpaced by its counterpart. "As you can see, the zombies are better at anything that requires raw strength, such as ploughing. On average, you need half as many zombies as you do skeletons to pull a plough, with many other tasks enjoying similar benefits of using zombies over skeletons," she reports, handing Varina a sheet of paper, outlining a variety of tasks and the relative efficiency of skeletons and zombies for them.\n\nWhile there were some that the skeletons were actually better at, the overall result was while this would require a greater investment in terms of souls to truly harness the benefits, the overall efficiency of the Reapfields should greatly increase, producing even more grain than they currently do, and making it far easier to feed the population." 
 magic_project_esthil_necronomics.12.a: "The Reapfields shall reap the benefits of this discovery."

