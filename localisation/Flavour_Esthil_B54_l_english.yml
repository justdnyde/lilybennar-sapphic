 # Modifiers
 B54_cmod_canrecs_texts: "Canrec's Texts"
 desc_B54_cmod_canrecs_texts: "The collected written works of Canrec the Defiler, containing useful, if highly forbidden, knowledge about the nature of nigh all things Necromancy."
 B54_cmod_want_not: "Want Not"
 desc_B54_cmod_want_not: "To ensure their efficiency is maintained, the Necrocrats have been provided with infrastructure and logistical support for their magic."
 B54_cmod_well_of_souls: "Well of Souls"
 desc_B54_cmod_well_of_souls: "The souls of Drowned mages are a powerful resource, so to ensure they are not wasted, a scrying network has been set up to detect Drownings, so that the souls of those that undergo it can be harvested... no matter whether the Drowned survives."
 B54_cmod_everliving_lieutenants: "Everliving Lieutenants"
 desc_B54_cmod_everliving_lieutenants: "The most trusted and capable of Esthil's mages have been granted a lesser version of immortality through Undeath, so that they may serve Varina eternally."
 B54_cmod_food_scarcity_1: "Mild Food Scarcity"
 desc_B54_cmod_food_scarcity_1: "Food has become hard to come by. The ordinary people must scrape together what they can, and even the wealthy are complaining about the high prices."
 B54_cmod_food_scarcity_2: "Moderate Food Scarcity"
 desc_B54_cmod_food_scarcity_2: "The people of Esthil are teetering on the edge of starvation. There is little food to be found, and many have been reduced to spending their days hunting for what scraps of food they can find."
 B54_cmod_food_scarcity_3: "Major Food Scarcity"
 desc_B54_cmod_food_scarcity_3: "Esthil's food supplies have totally collapsed. Starvation and panic are widespread across the land. Even the Patricians are struggling to put food on the table."
 B54_cmod_nobles_angry: "Alienated Nobility"
 desc_B54_cmod_nobles_angry: "Varina has denied the nobility their ancient rights, seeing them as a roadblock to her magocratic dreams, leaving the nobles angered and resentful."
 B54_cmod_nobles_happy: "Pleased Nobility"
 desc_B54_cmod_nobles_happy: "To ensure their cooperation, Variana acknowledged the ancient land claims of the Escanni nobility, garnering their support for her regime."
