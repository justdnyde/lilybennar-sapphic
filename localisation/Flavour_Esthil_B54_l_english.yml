 B54_rmod_lichqueen_of_escann_8: "Lich Queen of Escann"
 desc_B54_rmod_lichqueen_of_escann_8: "Varina Escer, the Lich Queen of Escann, is an ascendant star of magic. A master of all schools of magic, she is a force of nature unto herself, bending reality to her whims. None on Halann shall stand in her way, lest they be swept aside."

 B54_pmod_esthil: "Esthíl"
 desc_B54_pmod_esthil: "The Magisterium divides itself into districts known as towers. Here, far from their oppressive watch, we have established a tower of our own: Esthíl, the Eastern Tower. It shall be a shining beacon of unfettered arcane research, a true home to those cast out by the magisterial fools."
 B54_pmod_esthil_academy_of_magic: "Esthíli Academy of Magic"
 desc_B54_pmod_esthil_academy_of_magic: "The Esthíli Academy is where the future of Esthil is trained, teaching magic free of the Magisterial shackles holding back all other Cannorian centers of magical learning."
 B54_pmod_within_white_walls: "Within White Walls"
 desc_B54_pmod_within_white_walls: "These lands are within the White Walls of Castonath and thus safe from any threats due to Esthil's vigilant stewardship of the ancient defences."
 B54_pmod_the_black_sepulcher: "The Black Sepulcher"
 desc_B54_pmod_the_black_sepulcher: "The Black Sepulchre is the destination for any necromancer who wishes to prove themselves and rise within the ranks of the Lodge of Necromancers, for it is here that research into undeath and the soul is pursued without limits, allowing the mages within to advance the collective understanding of necromancy even further."
 B54_pmod_castonath_academy: "Castonath Academy"
 desc_B54_pmod_castonath_academy: "A country cannot be run by mages alone. As such, the disparate ancient institutions of Castonath have been combined into a new grand academy that will attract bright minds to Esthil."
 B54_pmod_skull_keep: "Skull Keep"
 desc_B54_pmod_skull_keep: "Once known as the Ardent Keep, it has now been repurposed into a prison for dissidents and saboteurs. Corinie zealots, orc sympathizers, and anti-undead saboteurs all languish within its depths, where they may contribute to society by serving as ready source of subjects for the Lodge of Necromancers."
 B54_pmod_gulenhyl_mint: "The Gulenhyl Mint"
 desc_B54_pmod_gulenhyl_mint: "The ability to mint the locally mined gold plays a crucial role in Esthil's economy, with the liquid capital helping to ease commerce and subsidize the price of grain."
 B54_pmod_necrocratic_administration: "Necrocratic Administration"
 desc_B54_pmod_necrocratic_administration: "This area is governed by a Necrocrat, a skilled necromancer capable of single-handedly controlling vast numbers of undead while being advised by skilled deceased spirits, making them a key linchpin in administering the undead labor pool of their assigned territory."
 B54_pmod_esthil_manufactory_bonus: "Magic for Manual Work"
 desc_B54_pmod_esthil_manufactory_bonus: "The necromancers of the mage towers and the laborers in the fields and manufactories are all part of a grand necronomic chain, with the mages helping enhance the effectiveness of the manual labor."
 B54_pmod_noble_autonomy_1: "Limited Noble Rights"
 desc_B54_pmod_noble_autonomy_1: "A compromise between the Varina's magocratic ambitions and the ancients claims of the Escanni nobility has led to the restoration of some of their ancient privileges."
 B54_pmod_noble_autonomy_2: "Extensive Noble Rights"
 desc_B54_pmod_noble_autonomy_2: "Despite the magocratic ambitions of Esthil, most of the ancient privileges of the Escanni nobility have been recognized, granting them significant autonomy here."
 B54_pmod_sapphire_eye_hq: "Sapphire Eye Headquarters"
 desc_B54_pmod_sapphire_eye_hq: "Once the grandest of the Escanni Chivalric orders, the Order of the Sapphire Eye failed in its goal of maintaining peace in Escann. Now refounded within Esthil, perhaps it will have a second chance at redemption."
 B54_pmod_morgurax_dread: "Cowed from the Skies"
 desc_B54_pmod_morgurax_dread: ""Have you lost your damn mind, I ain't going out there! There's a giant fortress floating overhead and you'd be a bloody fool to draw the attention of anyone who can control that stone monstrosity!""
 B54_pmod_deadmines_active_1: "Early Deadmines"
 desc_B54_pmod_deadmines_active_1: "A rudimentary operation, where zombies and skeletons are equipped with primitive tools and sent into the depths to mine, giving us a workforce that needs neither rest nor recompense."
 B54_pmod_deadmines_active_2: "Established Deadmines"
 desc_B54_pmod_deadmines_active_2: "[dyn_loc_B54_deadmines_2]"
 dyn_loc_B54_deadmines_2_steel: "The undead are now equipped with Steelhyl forged tools and given local logistical support, and as such, the deadmines are running more efficiently than ever."
 dyn_loc_B54_deadmines_2_magic: "The Deadmines are now supported by trained divination mages capable of identifying the location of ore deposits, allowing the undead miners to be better directed by their Necrocrat overseers."
 B54_pmod_deadmines_active_3: "Extensive Deadmines"
 desc_B54_pmod_deadmines_active_3: "The Deadmines are the most efficient and productive mining operation in Cannor. Equipped with high-quality steel tools and directed by the divinations of academy-trained mages, the undead work day and night, pulling vast amounts of ore from the earth."
 B54_pmod_deadmines_inactive_1: "Early Deadmines (Inactive)"
 desc_B54_pmod_deadmines_inactive_1: "§gA rudimentary operation, where zombies and skeletons are equipped with primitive tools and sent into the depths to mine, giving us a workforce that needs neither rest nor recompense.§!"
 B54_pmod_deadmines_inactive_2: "Established Deadmines (Inactive)"
 desc_B54_pmod_deadmines_inactive_2: "§g[dyn_loc_B54_deadmines_2]§!"
 B54_pmod_deadmines_inactive_3: "Extensive Deadmines (Inactive)"
 desc_B54_pmod_deadmines_inactive_3: "§gThe Deadmines are the most efficient and productive mining operation in Cannor. Equipped with high-quality steel tools and directed by the divinations of academy-trained mages, the undead work day and night, pulling vast amounts of ore from the earth.§!"
 B54_pmod_reapfields_active_1: "Early Reapfields"
 desc_B54_pmod_reapfields_active_1: "These fields are filled with undead laborers, deadstock and skeletons assisting providing the majority manual labor involved, with farming, such as ploughing, seeding, and harvesting."
 B54_pmod_reapfields_active_2: "Established Reapfields"
 desc_B54_pmod_reapfields_active_2: "[dyn_loc_B54_reapfields_2]"
 dyn_loc_B54_reapfields_2_project: "Zombies possess greater physical strength than skeletons, and now a solution has been found to their unsanitary rotting flesh, allowing their use in tending to the Reapfields."
 dyn_loc_B54_reapfields_2_magic: "Undead labor is the most important aspect of the reapfields, but Esthil is a hub for all magical research, not simply necromancy. As such mages capable of casting plant growth have been assigned to supplement the output of the fields."
 B54_pmod_reapfields_active_3: "Extensive Reapfields"
 desc_B54_pmod_reapfields_active_3: "The reapfields are now the apex of magically assisted farming. The fields are filled with toiling zombies and tireless deadstock, and the crops grow larger and healthier than ever thanks to the support of mages trained in transmutation."
 B54_pmod_reapfields_inactive_1: "Early Reapfields (Inactive)"
 desc_B54_pmod_reapfields_inactive_1: "§gThese fields are filled with undead laborers, deadstock and skeletons assisting providing the majority manual labor involved, with farming, such as ploughing, seeding, and harvesting.§!"
