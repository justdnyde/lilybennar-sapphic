 # Missions
 B54_mission_gather_canrecs_texts_title: "Gather Canrec's Texts"
 B54_mission_gather_canrecs_texts_desc: ""Canrec the Defiler they called him, a visionary that lost himself and brought about the White Pestilence only when Aldresia and her army cornered him like the mad dogs they were. For this folly she was rewarded with an entire order, now following her blind stupor, while Canrec’s work was locked away. But from the small fragment I chanced to find in a fallen tower, it is obvious that there was much more to his machinations than mindless evil.\n\nThe Aldresians would never willingly part with Canrec's work, and if the rumors are true, they never managed to destroy it. Perhaps it is time for a kindred spirit to liberate what was once thought lost to time?"\n\nThe Diary of Varina"

 B54_mission_lodge_of_necromancers_title: "Lodge of Necromancers"
 B54_mission_lodge_of_necromancers_desc: ""Cortaz visited me again today, to discuss the logistics of the upcoming exam. While our territory grows, so too does the size of the invaders within our borders. It is a welcome respite when I see Cortaz's face and I find someone who agrees on what must be done. When he mentioned that many more than I thought possible shared my sentiment, it gave me an idea.\n\nTomorrow we will prepare for the first Esthili Evaluation of The Lodge, to find those mages who possess the ability and will to orchestrate our Necronomics."\n\nThe Diary of Varina"

 B54_mission_in_morgurax_footsteps_title: "In Morgurax' Footsteps"
 B54_mission_in_morgurax_footsteps_desc: ""To 'Follow in Morgurax’ Footsteps requires utmost devotion to what comes next. Ideally one should treat it with as much venerance as one's own funeral, a passing from life to unlife. Care must be taken in every aspect, especially when fashioning the Phylactery: It is to be the home of your spirit, and thus must resemble it in the moment of transfer, else it will feel like an irritating itch for the rest of time. Shamefully, I know this from experience. Curse you, Venac, and your jokes, the spiting joviality is gnawing at the base of my skull, even as I write this."\n\nA treatise on Ascension, by Canrec the Carrion Lord"

 B54_mission_a_source_of_power_title: "A Source of Power"
 B54_mission_a_source_of_power_desc: "While it’s obvious that Necromancy is the finest school of magic - for what other school bestows mastery over life and death, which ultimately allows mastery of all that follows? - the other branches of magic still have their merit, even when it comes to Necronomics. For while Necromancy is the only school that can allow one to create an untiring, unceasing workforce from the ceaseless bodies produced by the Greentide, the others cannot be disregarded.\n\nNo, for the Deadmines and Reapfields to reach their full potential, they should be augmented by the powers found within Divination and Transmutation. Of course, utilizing magic at the scale required to adequately support the Necronomic apparatus is no small feat, and but one which will require a significant amount of magical infrastructure in place... which will not only allow said spells to be deployed at the necessary scale, but also aid our necromancers in improving their skills in the lesser schools of magic."

 B54_mission_the_invaders_title: "The Invaders"
 B54_mission_the_invaders_desc: "According to reports from what envoys still arrive at our court, the question of what to do with the orcs is causing discord in other Escanni realms. Apparently, some foolish individuals are preaching that orcs can be rehabilitated, pointing to examples of orcs that have been cowed into existing alongside humans, but disregarding the fact that these monsters would happily slaughter those humans, if given even half the chance. Others with a modicum of sense warn them of their folly, but whether due to weakness or misplaced sympathy merely advocate for deportation of the monstrous races.\n\nBut expulsion is not good enough for the orcs and goblins. They are nothing more than invaders, and had their numbers allowed it, they would happily have swept across Cannor and continued into Bulwar, leaving nothing but death and devastation in their wake. No, they must be hunted down and killed... but why stop there? Let us reanimate them and put them to work, fixing the damage they have wrought, whether that be by swinging pickaxes in mines or pulling ploughs in fields."

 B54_mission_breaking_new_ground_title: "Breaking New Ground"
 B54_mission_breaking_new_ground_desc: ""It turns out that the undead Orcs and goblins aren't as efficient at ploughing as oxen. Complaints are streaming in from farms, complaining their harvests aren't as bountiful as they used to be, that their new servants are 'scaring the children'. Can't they see that we are helping them get back to their peaceful lives, where the heavy burdens of manual labour will be relegated to the dead, so they may be spared broken bones and bent backs?\n\nI am seeing Cortaz tomorrow. He said that he knew just how to cheer me up, and that he has an idea on how to solve these problems."\n\nThe Diary of Varina "

 B54_mission_necrocrats_title: "Necrocrats"
 B54_mission_necrocrats_desc: "In Anbennar, it is accepted 'wisdom' that mages are unable to effectively govern much in the way of land without compromising their magical studies, needing to rely either on bureaucrats or petty nobles. Yet that need not be the case in Esthil. For where mages elsewhere might find themselves unable to dedicate themselves adequately to statecraft without lagging behind in magical studies, we can easily call on…assistants to speed their progress along.\n\nExperienced necromancers can simply summon souls of those who know how to rule and harness the knowledge they garnered in life, rather than needing to spend years upon years honing their own administrative skills. Let us empower those experienced in the school of Necromancy, giving them parcels of land to rule from mage towers, and letting them govern by calling upon the expertise of a retinue of bound spirits to advise them on mundane matters. This will allow these Necrocrats to not only rule well, but also do so without inhibiting their magical studies."

 B54_mission_reapfields_title: "Reapfields"
 B54_mission_reapfields_desc: "While the Deadmines were an immediate success, our efforts at similarly augmenting agriculture with undead labor saw more mixed results. Regular livestock seemed to recoil from the undead, and most farmers were similarly averse to the skeletons that had been sent to toil at their fields; they believed farming required more hands-on expertise than simply telling a zombie to swing a scythe.\n\nWith our Necrocrats established, however, we can devote entire parcels of land to cultivation by the dead, and if the farmers nearby are unwilling to be reduced to oversee and guide while the dead do the labor in the fields? Why, it is fortunate that there are plenty of spirits for the Necrocrats to call back to serve those roles instead. These farms, dubbed the Reapfields, will help us ensure that Esthil will never again be at the risk of starvation due to the narrow-mindedness of others."

 B54_mission_the_eastern_tower_title: "The Eastern Tower"
 B54_mission_the_eastern_tower_desc: ""To many the White towers of the Magisterium are seen as a comforting ‘beacon of hope’. But in reality it is blinding, burning to those who do not fall in line with the mantra of the Magisterium. At every floor sits a jailer, watching over those below, just as they have jailers above them, all to the very top, where an old fool sits as the ultimate warden of his little tower. Books are hauled higher and higher, so that no one can read and learn from them without enslaving themselves to this very system.\n\nBut I will build my own tower, black as the shade that provides comfort and respite to those fleeing the burning sun. A place that welcomes all creeds to coexist and study, with no oppressive, shortsighted authority determining what can and cannot be studied."\n\nThe Diary of Varina"

 B54_mission_the_castonath_academy_title: "The Castonath Academy"
 B54_mission_the_castonath_academy_desc: "A state cannot be built by mages alone. As such, we have begun the process of rebuilding the disparate educational facilities of Castonath, now to be unified under the banner of the Castonath Academy.\n\nThis institution will be a haven for those deemed too radical by the change-fearing lackwits who deem themselves 'orthodox' - in other words, those who simply fear that change will see their pathetic shreds of power stripped from them, and so hold back the betterment of mankind for their own agenda. But for those radicals, those who dare question the status quo? We shall reach out to them and shelter them, so that they may in turn help us prosper."

 B54_mission_the_esthil_academy_of_magic_title: "An Academy of Magic"
 B54_mission_the_esthil_academy_of_magic_desc: "Even here in Escann, some mages seem unwilling to free themselves from the shackles forced onto them by the magisterium and explore magic without any inhibitions. Perhaps they fear that the magisterium could reach them even here? A foolish notion, of course, but not everyone is made for the work that must be done. Let us establish an Academy where such mages can teach what magic they do know to new and less fettered generations."

 B54_mission_castonath_restored_title: "Castonath, Restored"
 B54_mission_castonath_restored_desc: "To rule Castonath is to be the true ruler of Escann. The city is the heart and throne of the region, making its state of disrepair even more of a blight. The enormity of Balgar's edifices make any repairs prohibitively labor-intensive. Fortunately, we happen to have a ready source of labor available in the orcish invaders.\n\nThey shall be put to work restoring what they ruined, carrying out the shattered stones their kind left behind, and ensuring that Castonath is once again the envy of all Escann."

 B54_mission_necronomic_theory_title: "Necronomic Theory"
 B54_mission_necronomic_theory_desc: "At the invitation of the Estil Academy, I have undertaken an examination of a question ignored by the contemporaries of our age: whether the labor of the dead may, with firm direction, be rendered conducive to the prosperity of the living.\n\nIt is granted that the undead require neither sustenance, rest, nor recompense, and thus may be employed by industry both rural and urban in perpetuity. In this we are presented with a new species of labor hitherto unexamined, whose introduction into a system of commerce must therefore alter the customary relations of production and exchange.\n\nIt is my firm belief that such an alteration will create a newfound prosperity for the common man, but more study is required to ensure it does not result in a disruption of the social order. So I beseech you my friend, travel to Esthil and lend your expertise to this grand endeavour.\n\n- Excerpt from a letter sent by Artur Ritach, former priest of Ara"

 B54_mission_from_souls_to_steel_title: "From Souls to Steel"
 B54_mission_from_souls_to_steel_desc: "Smoothly transitioning to a new system of labor allocation requires the preempting of any bottlenecks that might disrupt the flow of goods. Professor Ritach has already identified one such issue which would hinder the expansion of our mining operations if left unaddressed: a lack of adequate tooling. The dead cannot simply pry ore from the ground, and must be furnished with picks and shovels, our supply of which is being stretched thin by the influx of new labor.\n\nConsequently, a deal has been struck with the Steelhyl scions, assisting them with the restoration of their ruined foundries in exchange for them prioritizing the forging of new and better tools, as well as the establishment of a network of smaller foundries around the Deadmines that shall provide local support with production and repairs."

 B54_mission_the_practice_of_necronomics_title: "The Practice of Necronomics"
 B54_mission_the_practice_of_necronomics_desc: "The implementation of our necronomic programs has, upon the whole, advanced with a great degree of success. The enterprises of extraction, or more boorishly the Deadmines, are already operating at considerable scale, and the accounts of the overseers, corroborated of course by our own auditors, attest to a steady augmentation of output.\n\nIn the cultivation of the land, progress has been more gradual. Certain prejudices among the husbandmen have slowed the adoption of undead labor, but after that dreadful revolt over the new tax was put down, such resistance has dropped to a tolerable degree. The use of deadstock is now the standard across the nation. Thus, with the principal arrangements established, all that remains is to assess the yield of the coming harvest.\n\n- Excerpt from a report to Varina Escer by Artur Ritach, Head of the Necronomics Department at the Castonath Academy"

 B54_mission_the_deadmines_title: "The Deadmines"
 B54_mission_the_deadmines_desc: "It has long been observed that the work of the miner is mayhaps the most dangerous of the common occupations, second only to the soldier in times of conflict. The strains and hazards of such work consume the strength and, in time, the life of the miner at a prodigious rate. Thus, it is an optimal candidate for the introduction of undead labor, as in addition to the general benefits of a tireless and disposable workforce, the details of which I have already expounded at length, the consumed labor of the miners may be redirected to other, less individually destructive pursuits.\n\n- Excerpt from 'On the Productive Employment of Undead Labor' by Artur Ritach. The text was swiftly banned throughout the Empire of Anbennar, and Ritach was stripped of his position as a priest of Ara."

 B54_mission_dealing_with_saboteurs_title: "Dealing with Saboteurs"
 B54_mission_dealing_with_saboteurs_desc: "Despite the explanations for the necessity of the Death Tax and the benefits it would bring, revolts against the state have broken out, and attempts at halting Necronomic activities have become wide-spread. While these rebels and saboteurs must be dealt with, it would be a waste to simply kill them.\n\nBy standing in the way of Varina's vision, they have marked themselves as narrow-minded, regressive fools, and while it would be an exaggeration to say that they were little better than orcs, their actions if left unchecked would inhibit Varina's attempt at bringing utopia to Escann. As such, when a request arrives from the Black Sepulcher to turn Ardent Keep into a prison for dissidents, orc apologists, and other blights upon society so that they can serve as a supply of more varied souls for the Lodge's experiments... why, Varina sees no reason not to deny the request."

 B54_mission_legitimize_our_rule_title: "Legitimize Our Rule"
 B54_mission_legitimize_our_rule_desc: ""My Dear Varina, I write to inform you of the success of our meetings with the representatives of the Patricians within Castanor. At your behest I employed the enchanted honey cakes to great effect. I expected the Patricians to have been more suspicious after all these years under siege of Orcs, but as it turns out it never struck their mind that we would use enchantment magic to tip the scales in our favour. Or perhaps it was desperation for decadent treats after all this time having been cut off?\n\nAlas, they return to their families with gift baskets and more treats to mull over the deal. We have their full support, even if it feels a bit too easy. We will keep a watchful eye on them.\n\nYours truly\nCortaz""

 B54_mission_within_white_walls_title: "Within White Walls"
 B54_mission_within_white_walls_desc: "'Even white walls cast dark shadows, son... Remember that before you venture into Escann these days.'\n - Retired adventurer, now Tavernkeep from Menibór\n\nTo ensure the peace, freedom, justice and security of our new empire, we need protection. Protection from orcish filth that still remains outside of our borders. Protection from foolhardy would-be reclaimers that would thwart Varina's ambitions. And, of course, protection from the backwater fools in the Magisterium when they inevitably descend from their Ivory Towers and attempt to impose their narrow-minded ways upon us. What would serve this purpose better than the legendary White Walls of Castanor, ripe for the taking?"

 B54_mission_order_of_the_sapphire_eye_title: "Order of the Sapphire Eye"
 B54_mission_order_of_the_sapphire_eye_desc: "It seems our growing importance in the region did not go unnoticed; the chivalric Order of the Sapphire Eye has reached out to us with a missive.\n\n'For the greater good...' '...united and in the spirit of chivalry...' '...overjoyed at the news of recent victories...'\n\nAll Varina could think about these lofty declarations was reduced down to a single word - weak. The Order ultimately failed to protect Escann, having promoted a naive practice of resolving conflict through trial-by-combat instead of waging wars. This left the land peaceful, but weak and vulnerable to the Greentide and its devastation.\n\nDespite the surviving members of the Order being vain and naive fools clinging to the past, they somehow still enjoy a high standing and prestige, given their long chivalric tradition. While Varina herself is busy carving out the future, catering to such relics and those that admire them could help improve Esthil's image, even if associating with such fools is distasteful."

 B54_mission_inviting_claimants_title: "Inviting Claimants"
 B54_mission_inviting_claimants_desc: "While we have established ourselves as the foremost power in Escann, we cannot stop there. If we are to not just last, but prosper, we have to expand lest we perish like the many kingdoms that came before us. However, rapid and unjustified expansion would bring unwelcome attention, given the biases acting against us. We are in luck, though, for there are many displaced nobles, heirs, landowners and the like that saw their lands lost in the Greentide.\n\nIf we invite these these claimants and conquer not for ourselves, but for the 'noble' reason of returning the stolen lands to their rightful owners, we can paint ourselves as liberators,even if these claimants then turn around and swear fealty to Varina.\n\nAnd as it happens, the Order of the Sapphire Eye and the Patricians are well-suited for this task, and willing to lend their aid. Their reputations and prestige, paired with our strong and increasingly stable position, shall create an irresistible lure for those whose claims we wish to... co-opt."

 B54_mission_needs_must_title: "Needs Must"
 B54_mission_needs_must_desc: "The grain situation has become an issue we can no longer ignore. Until we can manage a more permanent solution, we are reliant on foreign merchants who are all too happy to gouge us on prices. What's more, the lack of internal gold supply forces us to rely on foreign merchants for bullion, harming our economy by leaving us at the whim of greedy opportunists.\n\nVarina can tolerate this state of affairs no longer. Fortunately, a solution might be at hand: were we to seize the rich gold mines of Gulenhyl and put our untiring labors to work there, we shall have plenty of gold. This will allow us to not only reliably mint our own coins, but also permit the state to subsidize the import of grain, to offset the harm that the extortionate prices charged by foreign merchants is doing to our realm."

 B54_mission_gleam_no_more_title: "Gleam No More"
 B54_mission_gleam_no_more_desc: "Calindal, the gleaming blade, remains a relic of an older order, one that places legitimacy beyond our control; one that was used against us once, and cannot be allowed to do so again. As long as it endures in its current form, so too does the authority it represents. Its current wielder stood among the coalition that rose against us, their presence lending strength and resolve at a critical moment. So long as such symbols can be turned against us, the blade remains a threat beyond mere steel.\n\nBy dismantling the enchantments bound within Calindal and reforging its essence into a sceptre, we will transform a symbol of judgment into an instrument of rule. One that will grant Varina the focus of power she needs, while shattering the legacy that once inspired our enemies.\n\nAnd the hero that led these backwater fools in resistance against our rise? He shall march again against our enemies, with no mind to think, no will to break, no voice to cry suffering. Born of death and suffering, he will return as a hollow knight, demoralizing those he once emboldened."

 B54_mission_putting_down_zealots_title: "Putting Down Zealots"
 B54_mission_putting_down_zealots_desc: "Zealots of Corin have been a thorn in Varina's side ever since the inception of our fledgling state. But what can you expect from a group of half-witted vagabonds led by a lowly half-orc spawn? Lothane Silmuna... "Bluetusk," they call him. What a sad and ironic state of affairs it is for a heroine who led all of us in the killing of orcs to be represented by one of them in the end, and for a noble line such as the notorious Silmunas to be sullied with orcish blood.\n\nRegardless of what delusional fanatic they elect to lead them, however, the time has come to finally put this nuisance to an end, once and for all. Their actions pose a real threat to the stability of Varina's rule, and while there is nothing worse than the accursed, backwater fools in the Magisterium, the equally backwater fools with delusions of grandeur from Corintar could give them a run for their money.\n\nAs such, If Varina is to succeed, if Esthil is to succeed...\n\nThe Corintar. Must. Fall. "

 B54_mission_zaamalot_title: "Zaamalot"
 B54_mission_zaamalot_desc: ""The archetypal black dragon, Zaamalot the Black, was the very pinnacle of cruelty and malevolence. Incredibly sadistic, (...) he was said to thrive in chaos, for it allowed him to dominate those beneath him as an apex predator. (...) At times, as in his one-sided battle against Alos the Copper, he would allow his prey to flee - whether so he might torment them again later, or so that they might remind others of his terrible deeds."\n- Encyclopedia Draconika, Kromwell Print\n\nAccording to the Patricians, the corpse of Zaamalot the Black can be found deep beneath Castanor - but unearthing the fallen dragon will not be easy. While catacombs and a few hastily dug tunnels allowed the Patricians to verify the presence of the corpse, much more digging will need to be done if Zaamalot is to be used against anything but ancient debris and walls of earth.\n\nAlready, Varina can imagine the glorious sight it would be for it to tear its way free and roam the skies once more, putting the backwater past behind us and paving the way to the future."

 B54_mission_rule_from_the_skies_title: "Rule from the Skies"
 B54_mission_rule_from_the_skies_desc: ""Pack your things - only what’s important - now! We are leaving for our family in Anbenncost."\n\n"But mom... why do we have to leave? I thought the orcs were defeated?"\n\n"Don't ask questions and do as I say! Gods, the age of darkness is upon us..."\n\n- Unnamed family fleeing a village near Escinn.\n\nDespite the oppressive Magisterium, despite the ignorant Corinites, and despite the shortsighted ambitions of other adventuring kingdoms, Esthil has prevailed, and the hour of our triumph is nigh.\n\nWith our opposition beaten back, all that remains is for Varina to extend her reach across Escann, and with Zaamalot acting as her steed and Calindal reforged as her Sceptre, any who would stand in her way will meet a swift death.\n\nAnd should the embers of rebellion simmer after she has left? Why, the dread citadel of Morgurax - the greatest feat of magical engineering Cannor has ever seen - can be deployed to remind the people of why defying Varina's rule is a great folly.\n\nFinally, Varina is positioned to usher in a new, enlightened age. The Age of Esthil. The Age of Varina."

 B54_mission_the_traitors_due_title: "The Traitor's Due"
 B54_mission_the_traitors_due_desc: "Despite the enemies already arrayed against Esthil, the so-called Floodborn Council have struck at Varina and failed to kill her, though not for lack of trying. For this brazen treason, Varina would dearly love to see them consigned to a slow and tortuous existence until their souls - nay, their very selves - are entirely spent after decades of immense suffering.\n\nUnfortunately, indulging in such gratification would be a waste of resources. No, while these traitors must be dealt with, their punishment will be to act as the catalyst in a great ritual that shall enable the state to turn the tides against those who stand against us. Of course, they do need to die to power the ritual, but the manner of said death? Why, it being immensely painful will hardly detract from rite."
 flavor_esthil.23.insight: "\n§GEvent Insight:§!\nThe soul of a singular Mage is strong. Hundreds of Floodborn souls? With that sort of power... the dead may turn back our enemies."

 B54_mission_morgurax_title: "Morgurax"
 B54_mission_morgurax_desc: "As our territory expands, alongside Varina's ever-growing list of plans and ambitions, it is becoming increasingly tiresome to dwell on petty unrest and the opposition of the narrow-minded within our realm.\n\nA host of solutions has been proposed by numerous talented individuals vying for Varina's favor - including, but not limited to, conventional torture, paying henchmen, or using petty enchantment spells - but she already has her eyes set on another, much more ambitious feat that would allow her to send a message to all dissidents that the righteousness of her reign is not to be questioned.\n\nThat feat of magical engineering is Morgurax - an imposing flying fortress that could be stationed at any place in Esthil that currently requires some additional "persuasion".\n\nThe Northern Citadel, one of the most iconic symbols of old times in Escann, shall serve as the basis for this impressive project, so that this crumbling carcass of architecture from the past shall serve as a foundation for Varina's future."

 B54_mission_black_empire_rising_title: "Black Empire Rising"
 B54_mission_black_empire_rising_desc: "Had she been allowed, Varina would have been content letting time spread her utopia across Escann and, eventually, the rest of Cannor. If left to prosper for decades, exporting an enormous amount of ore and grain, the rest of Cannor would have been forced to acknowledge her ideals as the future... but that had not come to pass.\n\nNo, Cannor had made it clear that if she wanted to realize her dream of a society where only the dead needed toil and do hard labor - the one she had shared with Cortaz so long ago - she would need to do so at the head of what the rest of Cannor would label a 'Black Empire'. Already, she knew what people called her when they thought her agents weren't listening. In the future, she would be known as the visionary who brought upon a golden age where the dead toiled so that the living might prosper. But for now? Let Escann know her by one dread moniker..."

 B54_mission_let_the_drowned_serve_title: "Let the Drowned Serve"
 B54_mission_let_the_drowned_serve_desc: "If one good thing came of the War of the Black Tower, it was that the Floodborn showed their hand. Had they waited for decades, amassing more experience and skill to go with their great potential for raw magic, their attempt at usurping leadership would likely have been successful... and Varina has no intention of permitting another generation of Floodborn to learn from the mistakes of their predecessors and succeed where the Floodborn Council failed.\n\nThus, a vast network of Mage Towers must be set up across Escann and combined with great prowess in Divination to detect when Drownings occur, and ensure that those who survive it are slain soon after. Of course, it would be wasteful to simply let their souls pass on, so the Mage Towers will serve not only to detect Drownings, but also act as a node in a great network directing these souls to Castonath, where they will be trapped in a Well of Souls and used for the benefit of the state."

 B54_mission_inner_circle_everliving_title: "Inner Circle, Everliving"
 B54_mission_inner_circle_everliving_desc: "With every new mage born within Escann subject to Drownings, and thus ultimately either a liability or a resource to be harvested, the future of the Lodge of Necromancers is in a precarious position. While Esthil does regularly grant refuge to mages wanting to flee the oppressive rules and regulations laid down by the Magisterium, relying solely on this to replace aging members of the Lodge of Necromancers is not sustainable.\n\nThus, Varina must ensure that the aging members of the Lodge of Necromancers need no longer suffer from said aging. Though Varina is unwilling to share the full secrets of the Lichdom ritual, she is willing to share a pared-down version of it with trusted members of the Lodge of Necromancers, so that they may share in immortality, though unlike Varina they will perish if their physical form is slain."

 ## Events
 # Regular Events
 flavor_esthil.2.t: "An Ambitious Plan"
 flavor_esthil.2.d: "Canrec the Defiler, acolyte of the Sorcerer-King and architect of the White Pestilence. While the name might strike fear or anger into some, for Varina, it held neither. A certain amount of healthy respect, of course, but in truth, she would have loved to have met the man in his time.\n\nInstead, she has settled for reading his works. Copied by the furtive hands of acolytes and poseurs who wished to emulate him or keep his knowledge in circulation, pages and documents written by the man have survived in secret places. But while the collection she holds in her hands now is great, perhaps greater than any before, it is not enough. Key texts are missing, and the only place in the world they might rest is in the original copy of Canrec's biography: the §OGrimoire of the Defiler§!, which lies in the hands of the Orda Aldresia who defeated Canrec so long ago.\n\nThe only way forward is to take what they have locked away."
 flavor_esthil.2.a: "It shall be done."

 flavor_esthil.3.t: "The Question of Agents"
 flavor_esthil.3.d: "While the Orda Aldresia is but a shadow of its renowned past, relegated to being ceremonial bodyguards of the Emperor of Anbennar, directly attacking the Orda Aldresia is still out of the question. The only reasonable solution is to take by stealth what cannot be taken by force. To that end, Varina considers her options carefully. A single professional thief could get the job done, but would be expensive. Some of the locals of the Order's territory may be bribable, and that would be cheap, but how effective could they really be?\n\nAnother possibility is the use of not one professional, but a band of them. Such a group would almost certainly be able to finish the job, but would be much more expensive.\n\nOf course, Varina could always put her trust in her magical skills."
 flavor_esthil.3.a: "Let us hire a true professional. A master thief."
 flavor_esthil.3.b: "A group of local thugs will do. The Order doesn't rule well."
 flavor_esthil.3.c: "Only the best of the best will do. Where one thief might fail, five shall not."
 flavor_esthil.3.e: "Only the best of the best will do... luckily I have just the spell!"

 flavor_esthil.4.t: "A Way In"
 flavor_esthil.4.d: "With the choice made, the agents must come up with a plan to get through the front door of the castle-monastery; this is made more difficult by the fact that the Orda Aldresia is designed, by its very nature, to be paranoid of upstart mages attempting just what Varina is. Every armor has a weak-point, however.\n\nThe most straightforward solution would be to try and breach Arca Aldresia by night. If successful, perhaps no one would ever know they were there at all.\n\nA less parsimonious action might be to simply bribe the custodian in charge of the vault. A small fortune for the man should make him forget any vows he had, especially if we are vague about why exactly we want to get in. The Order has become infamous for corruption, but even that goes only so far.\n\nWhere stealth and bribery may fail, guile may win out. Esthíl is a legitimate state, after all, and such states often send out diplomatic missions; most diplomats double as spies, and everyone does it anyway. A delegation sent under the guise of official business could easily be left to their own devices for a few hours ...."
 flavor_esthil.4.a: "Let none know you were there; sneak in at nightfall."
 flavor_esthil.4.b: "We shall bribe the Order custodians. All things glitter."
 flavor_esthil.4.c: "Perhaps a disguise would be best. Ready the documents!"

 flavor_esthil.5.t: "The Vault"
 flavor_esthil.5.d: "The Vault is no mere room for storage; instead it is a complex of individual cells and storage areas, meant to contain a mixture of magical items, both rare and highly dangerous. Individual cells can themselves be a complex, and Varina's agents find themselves faced a labyrinthian maze made all the more dangerous by various traps.\n\nThe only way forward is through the traps; several solutions offer themselves, but only three allow for speed. Setting off the traps from a safe vantage point might do it, but could be very loud and potentially fatal. Disabling or moving through them safely must be an option, or else the Orda could not check on their charges; and at first glance, there are many magical artifacts that could very well disable, or at least nullify, the traps."
 flavor_esthil.5.a: "Discharge them - hopefully this won't be too loud."
 flavor_esthil.5.b: "No system is perfect; they can find a way through, silently."
 flavor_esthil.5.c: "Perhaps we can use one of the other stored items to get rid of the traps?"

 flavor_esthil.6.t: "In Our Grasp"
 flavor_esthil.6.d: "The final lock is as mundane as could be - complex, but normal all the same. Near silence fills the otherwise empty vault as clothed hands carefully manipulate tumblers, until the lock releases with a soft click.\n\nInside the box, so carefully warded and protected, is a plain looking leather journal. Was this it? The infamous §O(Grimoire of the Defiler)§!? To the eyes of the agents it would be as indiscernible from any other tome, but somehow they knew that they now possessed their prize. All that remained was to extract the item, hopefully without being found out."
 flavor_esthil.6.a: "It is ours, and with it, knowledge"
 flavor_esthil.6.b: "Our getaway was not as clean as we had hoped; the world trembles in anger and fear"

 flavor_esthil.7.t: "The Assembly"
 flavor_esthil.7.d: "At long last, the Iron Sceptre has achieved its goals; through conquest, diplomacy, and adventuring, the ragged band of former magisters, adventurers, and explorers is now in position to stake a claim - not merely as a company, but as a country. Houses replace tents; warcamps become forts; and forage land becomes farmland.\n\nWith their end goal clearly in sight, a great assembly is called of various influential company members, captains, explorers, magisters, and settler-folk with no less a goal then the establishing of a new Escanni nation. One of the first, but most important decisions, is who will lead them in the coming years."
 flavor_esthil.7.a: "Let us hope for a swift decision."

 flavor_esthil.8.t: "The Deadlock"
 flavor_esthil.8.d: "After days of arguments, negotiations, votes, and decisions, it all ends in a deadlock.\n\nOn one side sits Ardor. An old hand in the company, and a former professor from the Magisterium, he is well known amongst the veterans and seems to have the vote of many of the more conservative elements of the company. The Iron Sceptre has flourished under men like him, and many members who have served alongside him spread talk of the celebrations which were held after victories. His opponents vary in opinion, from those who simply find him too conservative, to those who dislike his tendency to meddle and enter choleric tempers, while some of the older members of the company recall the rumors of abuse of his substantial skill in enchantment.\n\nOn the other sits Varina. A relative newcomer to the company, she has nonetheless shown competence in leadership and strategy. While many of the more conservative members of the Iron Sceptre remain ill at ease with her methods, her ability cannot be denied. A necromancer of exceptional talent, her actions on the field have led to more than one victory. She is ruthless to her enemies, and holds a burning hatred of the orcs occupying the land, which is no penalty amongst the Iron Sceptre. Her base is largely composed of the young, the radical, and those truly seeking to break the chains that held magic back for so long. Had her mindset been allowed, they argue, perhaps the Greentide would have failed.\n\nWith a hush, the final voter raises their voice, and calls out for..."
 flavor_esthil.8.a: "Varina. Her ideas will lead us through a new age."

 flavor_esthil.9.t: "A New Dawn"
 flavor_esthil.9.d: "After the initial cheering ended, Varina gracefully rose and took her place at the center of the assembly. A hush fell over the crowd as the young woman began to speak, her voice distant, but full of conviction. "My people. I have my thanks to give, but most of all a promise - I swear on this day you have chosen a brighter future, where we will prove the Magisterium wrong, and show them that what they label as dark magic is not only useful, but crucial for building a prosperous society in these lands."\n\n"We will not merely survive away from the Magisterium and the fetters they would force upon us, but thrive. From the ashes of the old world, from the ruins left by the Greentide, a new order shall arise, one wrought by our hands... and by those of the orcs." Varina paused, seeing confusion spread in the crowd as they parse her words. The orcs would help build this new order? Of course, those who know her well already know where this was going, but the rest? Theirs were the faces torn with confusion.\n\n"We all know that it would be folly to expect the orcs to apologize and attempt to atone for the death and devastation they have caused, but fortunately... we have no need of their agreement. Only their souls and bodies." And then, realization - and in the case of many, approval - bloomed within the faces in the crowd, though reservations were still writ large upon others.\n\n"The Magisterium claims that necromancy is inherently evil, and most of Cannor consider the suffering it brings to souls unforgiveable, claiming that nobody but Nerat has the right to judge the dead... But where were they when the Greentide washed across Escann?" Anger bled through Varina's voice, "They were caught up in pretty squabbles while orcs ravaged these lands, committing unspeakable, unforgivable atrocities every minute of every day! I promise that I will never inflict the pain of undeath upon any civilized race, but the orcs?"\n\n"As recompense for the damage they have done to Escann, I hereby sentence every single Orc within these lands to undeath. They shall be slain, their souls harvested, and their bodies put to work!"
 flavor_esthil.9.a: "Long Live Varina!"

 flavor_esthil.10.t: "Reactions Abroad"
 flavor_esthil.10.d: "Not even a month had passed since Varina was elected, and already, the adventurers of Escann have begun to denounce her. Her open use of necromancy was apparently too much for them, despite their long history of fighting together against the orcish threat.\n\nVarina had hoped they were more enlightened, but was not surprised that they could not look past Magisterial propaganda. None would have ever admitted that necromancy was the key factor in staving off the worst of the Greentide, lest it shatter their delusions that they, personally, were the most crucial of the Marcher Lords . Now that it was no longer seen as necessary to work together, their fellow adventurers abandoned any pretense of cooperation. The Corintar have gone so far as to label her "the greatest evil in Escann."\n\nHave they forgotten the evil Corin fought against, the orcs and goblins who laid waste to all of Escann?"
 flavor_esthil.10.a: "Unlike them, we remember that the true enemies are the orcs."

 flavor_esthil.11.t: "Fleeing Peasants, Rising Prices"
 flavor_esthil.11.d: "Reports of farmsteads left abandoned have become more common as of late. Unsettled by the use of undead in the labor force, many cannot stomach working alongside them and have fled to neighboring kingdoms for fear that they may be next. Despite these rumors being untrue, mass hysteria is starting to spread even beyond our neighbors, prompting many merchants to refuse to do business with us. This has caused grain prices to soar, and while this is a boon for the peasants who have stayed, it is causing significant hardship for our city-dwelling subjects who are struggling to pay the higher prices."
 flavor_esthil.11.a: "One day the dead will work their fields!"

 flavor_esthil.12.t: "Noble Demands"
 flavor_esthil.12.d: "When Varina had negotiated with the Patricians, she had been pleasantly surprised. For while they made it clear that their support was contingent on Castonath - and by extension, themselves - being enriched, a shared hatred of orcs and wariness of the threat they posed had seen the Patricians end up being far easier to deal with than expected.\n\nSo when a representative of some of the surviving noble families that once called Inner Castanor their home asked for an audience, Varina had found herself cautiously optimistic that they might be reasonable. After all, the scions of such families would either have seen their ancestral holdings burned, fled from the Greentide, or grown up in exile, all too aware of what had caused the current misfortunes of their houses.\n\nThose hopes had been naive, to say the least.\n\n"My Grand Magister, if it was not made ever so clear in our previous correspondence, we are appreciative of the work of you and your... associates, in dealing with the orcish invasion of our rightful holdings," said the envoy. "Now that order has been restored, the families I represent have agreed upon the proposal now presented to you, formally enshrining the rights that are ours by birth, while deferring... some control to your domain. Surely, someone as wise as you could see how generous a proposal this is, and would agree to these terms to foster continued amicable relations between the state and the nobility. What say you?""
 flavor_esthil.12.a: "What say I? Piss off."
 flavor_esthil.12.b: "A compromise can be struck."
 flavor_esthil.12.c: "Those leechess will have their so-called 'rights'."

 flavor_esthil.13.t: "Where Few Dare Tread"
 flavor_esthil.13.d: "By now, Varina had lost count of how many orcs and goblins she had personally dispatched. Hundreds, easily. Thousands? Probably. So why was she hesitating? Why had she not already slit the throat of the immobilized goblin in front of her and fed it to her phylactery?\n\nShe knew why.\n\nWhile this creature would be the first of an endless stream of its misbegotten kind to fuel her immortality, it was not the first victim of her immortality.\n\nDecades ago, he had promised Varina his heart and had stood steadfastly by her side ever since, even as the world turned against her. And for that...\n\nFor that, she had... She had claimed his heart. She had thanked her Cortaz that fateful day. Had kissed him gently, had caressed his face, had lulled him to sleep with his face in her lap, a small, content smile dancing on his lips.\n\nShe had tried to make it painless. She had. But any magic would have interfered with the process, and the sedatives she had slipped into his meal had not been strong enough to counteract the pain as she opened his chest and carved out his still-beating heart.\n\nHer skin was still a few days away from sloughing off, so she could yet close her eyes as she remembered his expression as he bled out. Oh, if only she could have eased the process, but no... she was forced to watch the life fade from his eyes, her voice quivering as she promised that she would create a new and better world, as they had always dreamed of doing.\n\nAnd then... she had had to violate him further still. Not only had she needed to craft the potion vessel from his heart, the only way to guarantee success had been to use all of Cortaz's being for the spells, to use up not only the heart but his very soul as well.\n\nWith a snarl, she broke out of her reverie and slit the throat of the goblin, then ended the spell that kept it paralyzed. With grim satisfaction, she watched it grasp at its throat, futilely trying to stem the bleeding before it dropped, letting her claim its soul and feed it to her phylactery.\n\nCortaz was gone, but so long as she lived, their shared dreams and hopes lived on through her. Compared to that, what did the life of a single goblin matter?"
 flavor_esthil.13.a: "And if a million more must follow, so be it."

 flavor_esthil.14.t: "The Restoration"
 flavor_esthil.14.d: ""Oh, Ana dear, look," said Bea, pointing out the window of her newly renovated mansion, interrupting her friend to gesture towards a group of skeletal orcs lugging a finely cut stone slab through the street. "The floor at the theatre is finally getting replaced properly. It was so shameful seeing those Seinathil bards perform on a wooden floor."\n\n"I would rather not, Bea," came Ana's curt response. "Could you shut the curtains, actually? I'd rather not see them. Orcs they may be, but... it is cruel."\n\n"Cruel?" repeated Bea, angrily. "I'll tell you what's cruel. Upending society, destroying our homes, and slaughtering our families. I still wake up screaming, remembering hiding in a cupboard when the beasts murdered my brother and sister!" A minute ago, the mood had been warm and companionable as two childhood friends enjoyed lunch. Now? It was something altogether more icy.\n\n"I'm not saying they don't deserve death," Ana reassured her friend, before visibly hesitating, her voice becoming a whisper as she continued. "I... asked my uncle why the Magisterium is so firmly against necromancy, and... he told me that while they may be dead, they are suffering. Immensely. Constantly. The kind of excruciating pain that would make you beg for death if you could."\n\n"Good. I hope the beasts that killed my family suffer that way." Usually, Bea put great stock in appearing aloof and unruffled, but right now? Her face was a rictus of hatred.\n\n"I don't begrudge you that, dear, but..." Ana took a deep breath, then looked out the window, peering at the laboring skeletons, and then pointed at one - a small skeleton, struggling to pull a wooden beam. "Look, Bea. Really look. The orcs that murdered your family would deserve such treatment, but... I don't think that skeleton was a goblin. I think it was an orc child."\n\nBea's expression wavered at that, conflict and uncertainty playing out across her face over several seconds, before settling on a resolute expression. "It would have grown up to be a monster. Better to kill it and put it to use atoning for the sins of its people, before it murders someone.""
 flavor_esthil.14.a: "Soon, Castonath will be restored to its former glory."

 flavor_esthil.15.t: "Craven Merchants"
 flavor_esthil.15.d: "To anyone with sense, the restoration of Castonath should have marked a turning point, should have been proof of Varina's vision, for what could be more just than forcing the orcs to rebuild what they had destroyed?\n\nYet, rather than receiving admiring and congratulatory missives from Cannorian rulers for such foresight, she received nothing at all. Not only was there a lack of letters or envoys, but an absence of merchants as well. It was not total, of course, as coin is a powerful motivator, but that simply meant that those merchants who were willing to ply their trade in Castonath were the greediest of an already selfish bunch, and so they were perfectly willing to raise their prices well beyond what was reasonable.\n\nThis has prompted the Patricians to send scions or affiliates into neighboring realms or down the Alen to buy up grain, while enterprising Esthíli merchants attempted to do the same. But as soon as their allegiances were discovered, they were priced out or outright banished. And when they try to buy grain from within the White Walls, they similarly find themselves overcharged, as the peasants who have settled the lands seize upon the present crisis to enrich themselves."
 flavor_esthil.15.a: "Our elites are clamoring for a solution."

 flavor_esthil.16.t: "The Theory of Necronomics"
 flavor_esthil.16.d: "Varina drummed her fingers as she and the upper echelons of the Lodge listened to the thesis of the exiled Aramari priest. While she failed to fully understand every argument, the conclusion was clear: unless the state was willing to keep a massive breeding stock of orcs and goblins alive within its borders, they would sooner or later exhaust their populations within Escann. More could be found by attacking the Gray Orcs to the north or the Black Orcs within the Serpentspine, but doing so was not only an uncertain prospect, but would also require more resources.\n\nThis threatened Varina's vision of a society where the living were freed from the burdens of hard labor. If she wished to make this dream a lasting reality... she would have to break her prior promises.\n\nThe Lodge members immediately sprang into debate. Some argued that to change course now would show the world that they were right to fear Esthil's use of necromancy. Many would have never supported Varina's rise, given this possibility, and it would cause widespread revolt, they claimed.\n\nOthers posited that Esthil must change because their understanding of the capabilities of necromancy has also changed. Yes, inflicting undeath upon their subjects would make them suffer, but would doing such be any worse than demanding taxes or ordering soldiers to war? To live meant occasionally being in pain, so would it truly be that outrageous to ask their subjects to contribute in death, if they were carefully raised and only kept around for a limited period, as to minimize the pain and soul degradation they would suffer?\n\nUltimately, the decision was left up to Varina. She had barely moved an inch, lost in thought, as she weighed her promise to never inflict the pain of undeath upon humans against being forced to give up on her dream. Finally, she came to a conclusion. "If we are going to do it, we will need to do it right. Figure out how much the pain be lessened, determine how to ensure that too much of the self is not used up, but...""
 flavor_esthil.16.a: ""... We must adapt, for the greater good.""

 flavor_esthil.17.t: "Death Tax"
 flavor_esthil.17.d: "After the initial pleasantries, the senior-most Lodge member spread out a parchment, containing a plethora of diagrams and notes. One side denoted the "average suffering" value an individual experiences throughout life, increasing sharply with age. The other side compares that suffering with the intrinsic value of the soul and how much it could provide those who still live, taking into account those magically gifted and those who aren't, or those who die young or die of old age. Varina's expression remained blank.\n\n"We have found that the sense of self is remarkably resilient, and that most memories a person has are... quite expendable. It is perfectly possible to go days, weeks, or even months without creating a truly important memory, once adulthood has been reached. While it is difficult to determine exactly how much is left of a soul, our estimate is that the majority of adult souls remain recognizably themselves so long as a third of the soul is left, rising to virtually all at around half of the soul still remaining."\n\n"Furthermore, while it takes more time and more expensive materials than regular reanimation, it is possible to perform what we have labelled 'gentle' reanimation, where the souls raised do not suffer..." here the researcher paused for a moment, before continuing, "significantly more pain than what they might suffer from simply living with, for example, a broken arm or some other ailment."\n\nThe silence after that stretched for several seconds, before Varina broke it. "And you say this can be translated into a tax system?"\n\n"Precisely, Miss. The soul of the average man or woman might very well be able to animate a corpse for as much as a decade before suffering unacceptable degradation, with as much as two decades for the elderly. The value of this labor can then be calculated, and if their family does not wish their relative to contribute to society in death, they can pay this sum, which would help pay for the material costs of gentle reanimations for those less selfish."\n\nA look around told Varina that few of the gathered Lodge members were entirely comfortable with this, knowing very well that even 'gentle' reanimation would still be painful, but..."
 flavor_esthil.17.a: "What choice do we have?"

 flavor_esthil.18.t: "Death Tax Revolt"
 flavor_esthil.18.d: "The Death Tax was not simply instituted without any explanations, of course. Varina had personally explained the details and necessity of the policy on several occasions in Castonath, and had ensured that officials proclaiming the policies throughout her realm had been accompanied by members of the Lodge of Necromancers, who could similarly explain why this was required for the perpetuation of the state, and what measures were being taken to minimize the pain caused during the reanimation process.\n\nSome displeasure had been expected, but it appeared that Varina and her inner circle had overestimated their subjects. Rather than grumbling but accepting the necessity, revolts have broken out, with uneducated yokels brainwashed by the Magisterium claiming that this is merely the last straw in a long list of "moral depravities" inflicted upon them."
 flavor_esthil.18.a: "Fools, one and all."

 flavor_esthil.19.t: "Theft within the Vaults"
 flavor_esthil.19.d: "The Custodian of the Vaults went about his grim business, his underlings bringing him a steady string of reports from the vault beneath as they checked the security systems. Someone had broken through, and now came the audit, to find what was taken.\n\nWith a falling silence echoing up the corridor, the custodian looked up to see one of the young members of the order, his face drained of all blood. The Custodian looked at him, then down at the great ledger, his hand trembling as he traced his finger down to the one item unaccounted for.\n\nThe Grimoire of the Defiler, the personal research notes of Canrec the Defiler, was gone."
 flavor_esthil.19.a: "We must prepare for the worst."

 flavor_esthil.21.t: "Death Descending"
 flavor_esthil.21.d: "Varina delved into the excavation site, her acolytes beside her. It was a long journey, far down into Castonath's twisting undercity. The Castans had cause to dig so deep, but so did she. Varina turned to one of her necromancers as they descended, a skittish little man, but great in power. "You said everything is ready." A warning implicit.\n\nThe acolyte let out a nervous chuckle. "Heh, well, y-yes! As ready as it could be!" They did not have much time. "We've been dragging Damestear down here to fuel the reanimation, t-there should be more than enough to..."\n\nA disparaging glare from Varina, and the acolyte stammered silent. More than enough... as if anyone could be sure. No sycophantic overpromises could make Varina forget how mad this was, how great the task, how dour the price of failure. This would be the greatest feat of necromancy since the casting of the Pestilence. The greatest feat of arcane might since the enthrallment of Anbenncóst. And who was the target?\n\nAt last, the party of mages entered the excavated chamber. Buried still half in the dirt, maw obscured, were the remains of Zaamalot the Black. An ancient dragon, frame jagged and menacing even in death... so colossal as to give even Varina pause. Zaamalot, see, was no ordinary dragon. He was malevolence incarnate, more a black manifestation of cruelty than a thinking being. A void of sadistic savagery, a torturer and a terrorizer. A psychotic maniac, who existed only to invoke fear and suffering in those unfortunate enough to exist while he did.\n\nIn the Dragonwake, he had razed Castonath, Bal Mire, the Westgate, and two legions and an Emperor at Burnoll Field. They had thought him possessed, afflicted with the same enraging Waking Sickness that had gripped Nimrith and Tayekan and all the others. Then at Damenath, they realised that Zaamalot had not been 'enraged'... he had been dulled. And then a cackling, psychotic laugh... and all Cannor understood the true depths of his depravity."
 flavor_esthil.21.a: "And in death, he shall serve Varina."

 flavor_esthil.22.t: "The Lich-Queen of Escann"
 flavor_esthil.22.d: "TODO"
 flavor_esthil.22.a: "This is a good end, right?"

 flavor_esthil.23.t: "The Traitor's Due"
 flavor_esthil.23.d: "One by one, the Floodborn and traitor Patricians are brought into the grand chamber. Per Varina's orders, most of them have been beaten, broken, and tortured until nary a single one of them are capable of walking under their own power, but are instead dragged painfully across the floor by zombies. Such is the price for their crimes, and even then, it is too merciful. Lining the walls of the chamber are most of the surviving senior members of the Lodge of Necromancers as well as a collection of acolytes and aides, here to aid Varina in the upcoming rite\n\n"Begin the sacrifices," Varina instructs, and the acolytes step up to the bound Floodborn and begin slitting their throats, allowing Varina to ensnare their souls as they detach from their bodies. She pauses for a moment as she feels the sheer power contained by even a single Floodborn soul. Oh, the things she will be able to do with this.\n\nRather than casting a spell immediately, Varina simply keeps the souls contained, anchored, as more and more join. At a nod to the Lodge members, they soon take over that work, making sure that the Floodborn souls remain placid, as Varina turns her attention to the traitor Patricians. "Proceed," she orders the acolytes, and the turncoats die shortly after. This time, however, the slash is far more violent, eliciting a splurt of blood.\n\nHowever, it never hits the flood, but instead drains…and drains…and drains as it gathers in the middle of the room.\n\nThe blood of Patricians, of old Castanor... There is a sympathetic link between the Patricians and the land. A resonance that can be exploited, here within the heart of old Castanor, within the White Walls. And together with the oh so powerful souls of the Floodborn?\n\nShe can feel it. Feel the dead across the lands, feel how they fall within her grasp, within her power. "Now!" she cries, and as one, the Lodge members shed the souls of the Floodborn. It is wasteful, admittedly, and much energy is lost compared to what could be achieved by slowly draining them, but Varina does not need a steady stream of energy over decades; she needs a great plume of might. A burst that allows her to reach out to the cemeteries and corpses within the White Walls, and give a single command."
 flavor_esthil.23.a: "Rise, zombies!"
 flavor_esthil.23.b: "Rise, skeletons!"

 flavor_esthil.24.t: "Malevolence Cascading"
 flavor_esthil.24.d: "Reclamation of the soul, reanimation of the body, reimposition of authority. All key to a successful resurrection. When the ritual began - Varina as the main caster, her acolytes beside her - it was obvious that all three would be difficult. In the first instant, they spent the energies of a hundred souls, despite the inherent waste of draining souls in such a way, with every second seeing more souls wastefully turned into energies to fuel the grand ritual.\n\nReclamation failed almost instantly, even if it should have been the simplest part. Varina could feel Zaamlot's soul cloud around them - a riotous storm of cruel sadistic fury, lingering and defiant even a thousand years after his death. And so Varina called on it. And it refused.\n\n"Why isn't it working?!" one acolyte cried out, as the pain and the stress and the strain tore through their minds. One of them let out a scream sudden-cut, as the toll ripped their brain apart. Varina clenched a skeletal fist as she redoubled her effort, searched, sought - and then staggered, as she felt Zaamalot's unconscious fury turn to... curiosity? The dragon's frame twitched. A storm of arcane energy, mana-blue and dead-violet, swirled around the chamber. Varina could feel it now, know it now... that long smothered hunger for fear and suffering and virulent vengeance... overpowering, overwhelming. A pang of pain... of recognition. In her heart, she knew that feeling well. Varina raised her hand, and did not command... but communed.\n\nReanimation. A flash of light, then a thunderous sound of blasting dirt and scraping bone. In one violent movement Zaamalot's corpse pulled itself from the earth, its half-hidden maw lunging back into the air with a mighty roar. The acolytes could not believe it - could not comprehend what had changed. Varina smiled, dully satisfied, as she thought she understood."
 flavor_esthil.24.a: "And then, through the ashen storm, the dragon turned its gaze."

 flavor_esthil.25.t: "Zaamalot Rising"
 flavor_esthil.25.d: "Even in undeath, Zaamalot's visage was frightful. The jagged bone, the twisting, piercing horns, and the taut rictus grin. All-together, a sight inspiring not just awe, but also fear overwhelming. The acolytes simply shattered at the sight, while even some seasoned necromancers were reduced to jibbering children as screams filled the air. Varina was stronger, better... but even then, she found that she had backed away slightly without realizing it. But somehow... she sensed that the dread dragon was amused, pleased at that reception.\n\nVarina cycled enough power through her to incinerate a city... and thus, tried to impose her authority. An open hand held high turned to a fist. "OBEY ME!"\n\nAnd to her astonishment, the dragon complied. Simply. Easily. The corpse turned its frame around, crashing against the walls of the great chamber as it did, dread-wings flexing, claws tearing. Anything unlucky enough to get in the way disintegrated under his draconic power. At last, Zaamalot rose boldly before the one who had reanimated him. He stared at Varina, for a moment... and then he bowed down, low.\n\nThere was a sick, sinking feeling in Varina's soul - a realisation that maybe, just maybe, Zaamalot didn't mind he was a necromantic thrall. That even as his dread master shredded the fibre of his being, he saw through the pain another opportunity to make people suffer, to inflict fear, to maim, ruin, and slaughter. Once, that realisation - the idea that she would unleash such a monster - would have made Varina sick. Now? The days she could afford to be righteous were long gone. And so, she commanded once more. "ZAAMALOT - RISE!"\n\n— — —\n\nAshan had not slept well since he'd helped give the black dragon's location to the necromancers. It had seemed such a good idea at the time... and yet, now he spent every night waiting, dreading. When Castonath itself began to tremble - when the rumble turned to a roar - the Patrician knew at once what had happened.\n\nAshan reached his roof just in time to see the jet of flame against the night, cutting through the explosion of dust and smoke and debris. Just in time to see the skeletal form of Zaamalot the Black burst from the depths of Halann. Just in time to hear, above the din of his ascent, the terror and the death and the devastation. Castonath burned. A hundred thousand screams melted together.\n\nAshan could only muster a whisper. "What have we done?""
 flavor_esthil.25.a: "Varina shall ride him into battle!"
 flavor_esthil.25.b: "Varina shall ride him into battle!"
 flavor_esthil.25.c: "Should Varina take to the field, it will be atop Zamalot."

 flavor_esthil.50.t: "Floodborn Potential"
 flavor_esthil.50.d: "Since the start of the Crimson Deluge, a strange phenomenon has occurred. Namely, dead bodies were found, having seemingly drowned on dry land, and soon, the cause became clear: an affliction known as 'The Drowning' began to affect mages born within Escann, since the start of the Crimson Deluge. Mages suffering from it would go unconscious, frequently when heavy rains occurred, and their lungs and body would soon be filled up with water or other fluids. Though family or even kind strangers might try to help them, such interventions seldom ended well for anyone involved.\n\nNo, if these people, these Floodborn mages wanted to survive, they would need to rely on their willpower and innate magic to keep themselves alive, even when unconscious. Considering that this affliction began during childhood, however? Most that hold the Spark within the next generation have perished. Ordinarily, this would be a disaster for the state, but...\n\nThose who survive the experience have proven themselves to have an incredible potential for magic, exhibiting raw, magical power that even Archmages might be hard pressed to match. While they do still need to study to truly reach their potential, the Floodborn that have begun their studies have already shown themselves to be significant assets to the state, with their capacity for channeling magic permitting rituals and applications of magic that would otherwise be infeasible, removing several obstacles to some of the plans to elevate Necronomics even further."
 flavor_esthil.50.a: "Excellent."

 flavor_esthil.51.t: "Death of a Dream"
 flavor_esthil.51.d: "Varina has died, and though her achievements will remain, the rulers that come after her share neither the dream nor the drive to drive [B54.GetName] to the same heights as Varina would have done."
 flavor_esthil.51.a: "A tragic end."

 # War of the Black Tower buildup
 flavor_esthil.30.t: "The Fruits of Undead Labor"
 flavor_esthil.30.d: "Varina pored over the ledgers she had asked for, scanning in particular one table: yields. She compared the harvest of this year to those of decades prior, and the results showed massive increases in yield per acre, to levels unheard of. Without a need to eat or sleep, undead labor had led to a massive increase in grain surplus.\n\nWhat followed was the sheer supply leading to a collapse in prices that Varina had envisioned so many times. At the height of Esthil's food shortages, a laborer might need to spend eight in ten or even nine in ten of every coin feeding himself and his family. Now? One out of every ten coins made by a laborer would suffice, while even relatively modest merchants or professionals found basic food costing a fraction of a fraction of their income.\n\nWith so much food to go around, merchants had even begun exporting it abroad, starting along the Alen, but finding that they had to go further to actually sell all that Esthil was producing, with the Esmar, the Luna, and even Anbenncóst soon finding their grain prices declining sharply.\n\nVarina leaned back on her chair, as though she could still feel the wind through her long-gone hair. Now, they would see that her methods were sound. Now, they would cease their screams and shouts and jeers."
 flavor_esthil.30.a: ""...I feel like I should be smiling.""

 flavor_esthil.31.t: "Milling Around"
 flavor_esthil.31.d: "Ormac rolled his wagon down to the next village over, stopping outside the square near a tavern. There, he hitched up his horse and entered. He had what he always had: wheat, rye, and other cereal grains. At the height of the food shortages, he would have been swarmed before he had even come to a stop.\n\nBut now? He had spent an entire day simply standing around looking like a fool at the prior village, vainly trying to persuade people to buy his grain. He thought that his luck had finally turned when Aril, the local tavern-keeper, came over. They'd dealt with each other for years, so Ormac figured that he'd be able to finally sell his grain.\n\n"Sorry, Orm," said Aril after hearing his prices, "you may have to halve your prices."\n\nOrmac sputtered. "Again?"\n\n"I know, but with the Reapfields producing so much grain that they've begun selling it abroad, I haven't seen anyone buy grain at your current rates for a few months. " Aril laughed. "Used to be that I'd spend half the coins I earned on grain, but these days it's a pittance! Frankly, it's been a bit of a miracle for me.""
 flavor_esthil.31.a: "Yes... a miracle..."

 flavor_esthil.32.t: "The Death Tax"
 flavor_esthil.32.d: "Long ago, before Ormac could even walk, his mother had been buried up the hill. Even before passing the farm down to Ormac, his father had gone up to the grave once a day, come hail or rain. Ever since his health took a turn for the worse, Ormac's father had spent practically every waking hour by the grave, simply talking.\n\nEven yesterday, when he had been too weak to stand, Ottrac had asked Ormac to carry him up there, and when they finally returned in the evening, Ottrac had whispered that he was afraid that Marila might not recognize him, after the necromancers used him... If they left enough of his soul to pass on to the afterlife, that is.\n\nHe had passed away that night, and in the morning, Ormac found himself paralyzed. According to the law, they were to bring Ottrac to a nearby village, where a necromancer would pass by once a week to reanimate the newly deceased while returning corpses that had "served their time".\n\nHad this been a few years ago, Ormac would have been able to pay the Death Tax, with some of the money still left over from those golden years, but those had been spent last year on new livestock and steel tools. But that money was spent, with little in return, and now... even if he scraped together every coin he had and sold off what he could, he would still be short of the money needed to pay the necromancers' Tax.\n\nMaybe he could bury his father in secret, somewhere far away. Perhaps in the foothills of the near Serpentspine, perhaps in some cave or ravine. Yet, he knew that his father would rather risk being used up by the necromancers than being buried anywhere but next to his beloved wife.\n\nHe could try to beg his neighbors for the coin he needed to pay for the death tax, but with the fallen grain prices, he could scarcely afford to pay back such a debt, and his father had always told him never to take money from your community you could not pay back.\n\nHis musings were interrupted by a knock, and Ormac found his hands shaking as he opened the door, afraid that the necromancers had somehow detected his father's passing, and had decided to come to collect early."
 flavor_esthil.32.a: "But when he opened the door, it was no necromancer."

 flavor_esthil.33.t: "Old Comrades"
 flavor_esthil.33.d: ""Lothane, we face an evil even worse than the Greentide. They, at least, only killed their victims. Esthíl, meanwhile…" Dominic shook his head, trying to put the horrors wrought by the necromancers into words. "It is Nerat's responsibility to judge souls, but Esthíl traps the souls of slain orcs and goblins, then consumes them utterly to power their fell works, and treats its own citizens only slightly better."\n\n"What would you have us do, my friend? We are old," stated Lothane, gesturing at the mantle behind him. There, the sword he had wielded during the Greentide rested... rust set upon it. "I am no warrior anymore, nor do I command armies. All I do is write about more heroic days, waiting for death to claim me."\n\nTo call the half-orc wizened would be an understatement. His skin was wrinkled, his hair a stark white, and his movements slow. Dominic knew he was little different. As a young man, he had sometimes caught himself indulging in vanity, but now he was more prune than man. One hundred and... something.\n\nHe should have died years ago, withered away from old age like so many of his friends or peers, but Nerat seemed to favor him.. and Lothane too. Dominic had no other way to explain their age, advanced well beyond what should have been possible for them.\n\n"These are dark, dreary days. Escer's forces have swept across much of Escann, smothering opposition. The people do not need a warrior, not even a commander... they need someone to inspire them." Dominic's smile turned wry. "Founder of the Faith I might be, but your writings always resonated more with the people."\n\n"But what more is there to write? Your memoirs are already a cornerstone of the Faith. Would you add 'Musings of an Old Man, Waiting for Death', to the scripture?" Dominic's words were mocking, but if that was what it took to rouse his friend, so be it. "Rally the people, Lothane. You think the Circle chose you to lead the Corintar because you were closest to Corin? No, you were always the best of us, that's why. So my friend, rally, and prove to the world once more that you are the Hand of Corin. Call upon the faithful to rally, and remind them of her mission: To fight evil."\n\nSeconds trickled by, and just as Dominic feared that he had failed, Lothane rose, glancing back at the rusted sword on the mantle. "I shall need a new weapon.""
 flavor_esthil.33.a: ""You know where to find one to inspire the people, and a shield too.""

 flavor_esthil.34.t: "Silmuna Solidarity"
 flavor_esthil.34.d: "Borian síl Canterway rode down the eastward road, feeling the wind in his hair and taking in the open land ahead of him, not yet scoured by the shadow of the black tower's empire. Behind him rode his squire, Cressen, a small and swarthy boy he had picked up from a port town some months ago.\n\n"Ser, why are we fighting Easthill?"\n\n"Esthíl," Corrected Borian, "And it is because it is right and proper. Our forefathers - well, mine anyway - were Damerians who carved out their own Kingdom here, where the true loyalists of the Silmunas could rule free. And we did this thanks to Lothane Silmuna-"\n\n"Bluetusk?" The boy interjected. "The man who wrote the memoir I see those Greaves carrying?"\n\n"First of all, do not interrupt me, boy." He was not going to have his squire become some rude gremlin, like he were a Gawedi. "Second of all, you should refer to him by his proper name. He is a Silmuna, scions of a god and an avatar, a lineage we have served since elder days. My great-grandfather earned a lordship fighting for the Silmunas."\n\n"Will I earn a lordship?"\n\n"Not if you keep distracting me from my point, boy. Unless you want a clout in the ear." Borian calmed a little. "The point is that we do this because it is right, not because it is an easy way to win glory or fame. We will be fighting the undead, a dark and cruel enemy. And when we do that, you will be scared. And I will need you to remember one thing."\n\nAnd as they approached the woods, beyond which lay the military camp where they would face their final rest before battle, the knight-at-arms heard his squire answer. "And what's that?""
 flavor_esthil.34.a: "Remember your vows - defend the innocent and fight for justice."
 flavor_esthil.34.b: "Remember your vows - defend the innocent and fight for justice."

 flavor_esthil.35.t: "Chivalric Resistance"
 flavor_esthil.35.d: ""Greetings,\n\nMy name is Ser Clotaire of Eswall, Knight-Commander of the Order of the Sapphire Eye. I have dispatched these messages to every lord in the land still standing to warn you: The Dead are marching. Even now, the vile necromancers of Esthíl are gathering all the bodies they can, performing sickening rituals, and raising them as undead legions. Some of you may have already seen what they are capable of. If not, you have been lucky, but your luck will not hold.\n\nWar is inevitable, but we need not face it alone. We are calling all banners to march as one and stand against the darkness arrayed before us. Like the War of the Sorcerer-King and the Aldresian Crusade, we must unite, strike down evil, and shield the realms of men.\n\nI know many of you are scared to do so. Doing what is right is never easy, especially when the world stands at a precipice such as this. But remember: they will come for you. If we stand together, they will fall. If we stand alone, then hope is lost.\n\nStand against Esthíl, against necromancy and defilement, against evil."\n\n- Letter later found on the persons of several noble rebels."
 flavor_esthil.35.a: "They are fools, one and all."

 flavor_esthil.36.t: "The Breach of Skull Keep"
 flavor_esthil.36.d: "The holy fire receded as the charred remains of the necromancers and their undead warriors clattered to the floor.\n\nDominic turned to give his companions orders. "Scour the bedchambers and see if you can find any keys or notes. You know which to give to me and which to burn." After they nodded and marched off, he walked over to the large tome on the altar. It was an ominous thing: black with speckled star-shaped diamonds, and letters on the front in Milcori. Luckily, he knew the necromancer's tongue from his days in service of Nerat, and so he turned the page and began reading.\n\nExperiments, sickening and terrible. Transferring souls from man to animal, turning hallowed dead into abominations unspeakable. Dominic almost could hear the wailing of the dead as their souls were tortured, used for whatever foul, twisted purpose the necromancers devised. As he skimmed the text, he felt bile creeping into his throat, and it was not until after he snapped his fingers and set the tome alight with holy fury that he remembered that they were here to gather evidence. Fortunately, there were far more tomes scattered about for him to gather and throw into a bag.\n\nYet, he knew that the worst was yet to come: the dungeons where the actual experiments had been carried out.\n\nHe had to step around vomit from his companions as he entered, closing his eyes as the wailing turned from imaginary to all too real. It was much too late to shield these poor people from harm, but he could grant them peace... and ensure that the evil responsible for their suffering was vanquished."
 flavor_esthil.36.a: "The Skull Keep has fallen."

 flavor_esthil.37.t: "The War of the Black Tower"
 flavor_esthil.37.d: "In the past few years, it had been rare for Varina to truly, strongly feel anything. Yet, as the reports of realm after realm denouncing her as the second coming of Nichtmer or Canrec, she felt rage rising within her.\n\nVarina knew that the mortals were foolish, with irrationality reigning over reason, but could they not see what she had wrought? Did they not realize that the suffering they accused her of gleefully heaping upon the dead was but a shadow of what a common farmer or miner might feel, as they spent a mere third of their day working, when a zombie or skeleton could do the same job better and unceasingly?\n\nShe felt her jaw falling slightly, as if to sigh. Without any lungs or even the need to breathe, it had little effect, except to remind Varina of what she was: an immortal Lich, untethered by the shackles of morality, unblinded by Magisterial propaganda.\n\nA year ago, she had thought that the world would slowly accept and ultimately even embrace her methods, after Esthil proved that a utopia for the living could be achieved by putting the dead to work, but it was now clear that she had been naive. Nobles, priests, and mages of the Magisterium all benefited from the current status quo.\n\nAnd when she had proved that a society wherein their powers and privileges were curtailed and where the common people could prosper? They could not stomach the thought that they might one day become obsolete, and so banded together and made the common people believe that Varina was their true enemy, when they were the ones leeching off of peasants, petty burghers, and peddlers of goods.\n\nIt was clear that the powers that be would never allow Esthil's methods to peacefully disperse, and so if she wanted to spread her utopia, it would need to be by force.\n\nSo be it. She would embrace the title of Sorcerer-Queen in the present, knowing that it would pave the way for a brighter future."
 flavor_esthil.37.a: "It begins."

 flavor_esthil.38.t: "Magisterial Intervention"
 flavor_esthil.38.d: "Celadora, one of the youngest Magisters Wesdam had ever seen, was ecstatic to finally be setting sail for Escann. Many of her peers were worried by the declaration of war against Esthíl, or their undead hordes, but she was hopeful she would finally be done with the hustle and bustle that came with Towers. It was soul-shredding, having to teach brain-dead acolytes when all she wanted to do was magic; real, genuine magic, as opposed to the flashy stuff used to charm nobles like jangling toys in front of babies.\n\nShe had even managed to negotiate with her superiors to allow her to bring her acolytes along for educational purposes. To her, it was far more important that they gain real, practical experience over magic than whether they can remember all the leylines or the pronunciation of spells. Magic was best learned on the field, and even better in a life-or-death situation. She did not want her acolytes wasting their potential and growing lazy or entitled.\n\nYes, there was the danger of the necromancers and their shambling atrocities. But her arrival may do some good for them, too; they would finally see a REAL master of the arcane at work."
 flavor_esthil.38.a: "Uhh, Magistress, I am not filled with confidence..."

 flavor_esthil.39.t: "Magister-Militant Mobilization"
 flavor_esthil.39.d: "Magister Raucard síl Themarenn tore his gaze from the latest and most disturbing record of Esthili activities, and instead focused on his soldiers. Young men and women trained in the arcane arts of war, unloading from their ships. They had just landed in Balgarton and would soon depart into Escann proper, marching ever eastward to face the dark empire of the black tower.\n\nHe once again glanced at the report, hoping that useful information was hidden within, but it continued in the same vein for a while: just the mad ramblings from the broken survivors. While he did not believe in fairy tales, he knew that this danger was not to be trifled with. Unlike the White Pestilence, the necromancers had yet to field hordes of shambling dead… but were happy to unleash other horrors of necromancy, whether those be plague, pestilence, or simply draining life from men fully clad in armor.\n\nHowever, while some of his colleagues - such as a certain magistress he HEAVILY advised against promoting - were gleeful about finally getting to see some action, Raucard was worried. Thousands upon thousands had already been displaced, killed, or worse; how bad was it going to get before Varina would be brought down?\n\nHe shook his head. There was no use dwelling on that when he needed to organize his troops. Some of them were already eyeing the liquor rations."
 flavor_esthil.39.a: "Hey! Get away from the drink, or I'll make the necromancers look kind!"

 flavor_esthil.41.t: "Floodborn Betrayal"
 flavor_esthil.41.d: "It was supposed to be a normal meeting. For decades, the Floodborn had become an increasingly powerful and influential group of mages; unstable, sure, and ambitious too, but their raw power more than made up for it. And so, when several notable Floodborn had requested a meeting to discuss the war, Varina had not thought much of it.\n\nThe meeting had been going oddly, with the Floodborn seeming absent-minded, until someone crashed through the roof of the estate and threw a bolt of lightning at her. Of course, her wards had stopped it, but now the attacker had stepped forward to strike her again. He was a young man, unskilled as he drew up his hands, and with neither wand nor stave lashed raw magical power forward.\n\nVarina sidestepped his spell, threw up fog to disorient him, and sent a shard of ice through his eye and into his brain. A shame, given he fought like a man with a reason, yet she never found out what.\n\nShe scarcely had time to wonder who had sent the young man before the answer presented itself, as the Floodborn she had been meeting with attacked her en masse. Swiftly, she threw up a barrier to block the worst of it before retaliating. Her guards naturally came rushing.\n\n"Surrender now, you old pack of bones, and the Floodborn Council might just spare you!" yelled one of them as he dispatched half his guards with a single, oppressively powerful fireball.\n\nBut while he and his fellows might have power to spare, that was no true substitute for actual skill, experience, and having fought a hundred life-or-death skirmishes. One by one, they fell. A shield raised a moment too late, a spell fumbled as the user had never before tried to cast it in anger, and failed to realize that even a spell that seemingly missed could still be deadly. By the end, Varina had exhausted her bag of tricks, but the would-be assassins were dead.\n\nWhile they could have acted alone... it was not likely that they had done so. And if they struck at her, they would know to also strike at..."
 flavor_esthil.41.a: "Her phylactery!"

 flavor_esthil.42.t: "The Vault"
 flavor_esthil.42.d: "All liches faced the issue of where to put their phylactery.\n\nCanrec's writing had speculated about putting it somewhere no one would find it, whether atop stark mountains or buried within desolate deserts, and hoping that obscurity would save them. But Varina preferred to keep her literal life-essence as guarded as possible, rather than fearing that any moment could be the one where some adventurer stumbled across her phylactery.\n\nAnd so, she had ordered a great vault built in the catacombs of Castonath, guarded by skeletons with orders to attack anyone but her most loyal mages.\n\nAs she arrived, she found stone scorched, passageways blocked, and a battle raging on as insurgent Floodborn tried to batter down her guards and defenses. In time, they would likely have prevailed, but Varina was able to slay several of them before the Floodborn realized that their fellows had failed to kill her. Even then, the devastation they had wrought meant that they found themselves pinned in, and within mere minutes, the Floodborn had been killed to a man.\n\nYet that was not the end of Varina's troubles, for hardly had she begun discussing what had happened with the Lodge members tasked with defending the Vault before another member came running, a small, spindly man with dark skin trailing behind her; a Patrician.\n\n"Ma'am, some of my kin have allied with the self-proclaimed Floodborn Council and seized much of the City of Stone!" As she stared at him, he nervously continued. "H-however, many of us remain loyal to you, and will aid you with knowledge of the tunnel system Balgar built. With that, you can take the city back and spare Castonath much of the slaughter!"\n\nVarina felt a flicker of amusement. Oh, Castonath would see plenty of slaughter, but... well, she had something in mind for the Floodborn Council, and those that sided with them."
 flavor_esthil.42.a: "Take the traitors alive, if possible. I have... plans."

 flavor_esthil.43.t: "Floodborn Betrayal"
 flavor_esthil.43.d: ""It was supposed to be a normal meeting. For decades, the Floodborn had become an increasingly powerful and influential group of mages; unstable, sure, and ambitious too, but their raw power more than made up for it. And so, when several notable Floodborn had requested a meeting to discuss the war, Varina had not thought much of it.\n\nThe meeting had been going oddly, with the Floodborn seeming absent-minded, until someone crashed through the roof of the estate and threw a bolt of lightning at her. Of course, her wards had stopped it, but now the attacker had stepped forward to strike her again. He was a young man, unskilled as he drew up his hands, and with neither wand nor stave lashed raw magical power forward.\n\nVarina sidestepped his spell, threw up fog to disorient him, and sent a shard of ice through his eye and into his brain. A shame, given he fought like a man with a reason, yet she never found out what.\n\nShe scarcely had time to wonder who had sent the young man before the answer presented itself, as the Floodborn she had been meeting with attacked her en masse. Swiftly, she threw up a barrier to block the worst of it before retaliating. Her guards naturally came rushing.\n\n"Surrender now, you old pack of bones, and the Floodborn Council might just spare you!" yelled one of them as he dispatched half his guards with a single, oppressively powerful fireball.\n\nVarina found herself targeted next, with spell after spell battering at her barriers, and eventually... breaking them. She managed to kill a few in retaliation, but their reserves and sheer power meant that her chances to strike back were few and far between, and when she tried to retreat, a Floodborn created a barrier of ice covering the window Varina had tried to flee through.\n\nUltimately, she found herself bested, beaten, and with one thought on her mind: while they could have acted alone... it was not likely that they had done so. And if they struck at her, they would know to also strike at..."
 flavor_esthil.43.a: "Her... phylactery..."

 flavor_esthil.44.t: "The Flight"
 flavor_esthil.44.d: "When Varina's consciousness had faded as her physical body was destroyed, she had thought that it would be it; the assassins would kill her, then strike at her phylactery. She thought this would be the end of her, and with her, the utopia she was building.\n\nAnd yet, she found her soul roused from within its phylactery and guided to a corpse. As she came to, she tried to rise, but staggered, both from the unfamiliar body, shock, and a wave of relief that her phylactery was somehow unharmed.\n\n"Mistress!" She heard Yorick yell as he moved to aid her. He had been a small boy when Varina had found him and inducted him into the ranks of the Lodge, and he had been a loyal and faithful servant ever since, and had been charged with guarding her Phylactery. "Castonath has fallen. Traitors calling themselves the Floodborn Council have allied with some of the Patricians, and proclaim themselves the true rulers of Esthil."\n\nAs she looked around, she realized that they were not within the Vault where her phylactery was hidden. Instead... they were in Esthil. The tower, the one Varina had ordered built not long after being made leader. "How are we alive?" she asked, frankly.\n\n"Floodborn tried to seize your phylactery and slew most of the defenders, but I and a few others managed to escape the Vault with your Phylactery. We eventually managed to escape the city with the aid of some Patricians who remained loyal, despite many of their kin siding with the Floodborn Council."\n\nCombined with losses from the fall of Skull Keep, this meant that most of the senior members of the Lodge of Necromancers would be dead. If she wanted to turn the tide of the war, she would need something major. Fortunately, she had just the thing in mind, as well as the way to accomplish it.\n\n"Round up the surviving senior members of the Lodge. They will soon be needed to win this war.""
 flavor_esthil.44.a: ""Of course, Mistress.""

 flavor_esthil.45.t: "Let There Be Light"
 flavor_esthil.45.d: "On Tifdeyn Hill, a few rows of pikes and muskets were all that stood between the few ragged survivors of the now desolated towns and villages below, and the army of the dead. The horde shambled up the hill in waves, pressing against the lines of militiamen and probing for weakness or fatigue.\n\nRobert - once a brother and a son a few hours ago, and now merely another man to hold a pike - did not know how much longer he could hold out. He jabbed his weapon again and again, shattering the ribs of one rotting foe after another as he heard the commander behind him yell for them to "Stay in formation!", as though he could speak discipline into thin air.\n\nLight. He saw light emerging from another hill nearby, as bright as the sun, despite it emerging from the west in the dead of night. He turned his gaze to shield his eyes, while still the light grew brighter by the second. Soon, he heard the thunder of horses and the yelling of battlecries- "The light has come! Evil shall be vanquished!" And Robert realized that whatever was holding the light was coming their way, fast.\n\nThe dead began pulling back, but soon found themselves pinned between the militia and the horsemen. Robert and his fellows charged the horde, and soon found themselves standing on a hill littered with bones. He was the first to approach the horsemen; several hooded figures, with one seeming to wield a blade forged from the sun itself, glowing even as he sheathed it. "Who are you people?"\n\n"We," came the wielder of this blade, "Are the last of the Blademarches, returned to see the evil of black tower put to rest, as we did in the time of the Sorcerer King and the White Pestilence." As the man pulled down his hood, Robert could not tell whether he were orc or elf, for he had features of both. But he knew this man spoke the truth."
 flavor_esthil.45.a: "Calindal has a new wielder! Hail Elrac of Dustandar, King of the Blademarches!"

 # Necronomics notification events
 flavor_esthil.101.t: "Toiling Souls Depleted"
 flavor_esthil.101.d: "For the Deadmines and Reapfields to function, new Toiling Souls are required every month to replace those that have been used up. However, this was not possible this month, and so the Deadmines and Reapfields have fallen silent, until the state can once more devote the souls required to keep them running."
 flavor_esthil.101.a: "Duly noted."
 flavor_esthil.101.b: "Do not bother me with this in the near future."
 flavor_esthil.101.c: "Never bother me about this again."

 flavor_esthil.102.t: "Toiling Souls Depleted"

 flavor_esthil.103.t: "Toiling Souls Depleted"
 flavor_esthil.103.d: "To aid in construction, Toiling Souls are required. However, in the most recent project the state tried to allocate more Toiling Souls than it had, leading to the project being cancelled and further construction support through Necronomic means being disabled until further notice."
 flavor_esthil.103.a: "Duly noted."
 flavor_esthil.103.b: "Do not bother me with this in the near future."
 flavor_esthil.103.c: "Never bother me about this again."

 flavor_esthil.106.t: "Toiling Souls Depleted"
 flavor_esthil.106.d: "There are many Necronomic means through which the state can aid in developing or expanding settlements. Yet, they all require Toiling Souls, and with the state finding itself short on this vital resource, efforts at supporting development have been halted."
 flavor_esthil.106.a: "Duly noted."
 flavor_esthil.106.b: "Do not bother me with this in the near future."
 flavor_esthil.106.c: "Never bother me about this again."

