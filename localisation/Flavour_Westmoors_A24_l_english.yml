 moor_lords_reform:0 "Lords of the Moors"
 moor_lords_reform_desc:0 "Defined by powerful Moor Lords, the newly established Kingdom of the Westmoors relies heavily on consensus amongst the clans to get any real work done. The king must work closely with his nobility and balance the frequent and often intense disputes and rivalries between them. Commonly this is done in a quid pro quo manner, with every major clan getting some kind of direct assistance from the crown in exchange for increased taxes, levies, and other obligations."
