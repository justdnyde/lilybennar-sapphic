#Missions
 A24_sea_of_storms_title:0 "Sea of Storms"
 A24_sea_of_storms_desc:0 "\"In the middle of the tempests and the monsters within the Sea of Storms, stands the Storm Isles. There, the local gnomes have been hampering our trade efforts by refusing to let our ships into port and sometimes even attacking fishermen who 'poach in their waters'. Preposterous!\n\n I say we give them a piece of our mind. Gather our ships and our numbers, storm the isles, and if they are lucky, we will give them mercy they never gave us. As well, we should set our sights on the Frostbridges, the isles separating Bjarnrik from the Reach. With those under our belt, we'll control all trade in and out of the Giant's Grave Sea.\" - A rant delivered in the same room as the [Root.Monarch.GetTitle], by Teagan Brontay"
 A24_the_western_ports_title:0 "The Western Ports"
 A24_the_western_ports_desc:0 "\"Ah, yes, the coast of the Westmoors, prime port material there… Is what I would say if I were the same idiotic, moronic half wit as half the bloody clan-meet! It's wetter than the damn sea it faces, crawling with all sorts of lowlifes, and anything that's built in it sinks into the mire!\n\n But, if we somehow overcome these issues, I cannot deny it would certainly turn one of our greatest weaknesses into a boon, while supporting the most populous part of our lands.\" - Vernon Moorton"
 A24_leap_across_the_lament_title:0 "Leap Across the Lament"
 A24_leap_across_the_lament_desc:0 "“Aelantir is found! I 'eard it from a mate down in Brontay, who 'eard it from a mate down in Aelvar, who 'eard if from a mate down in Sorncóst who was on the expedition that found it. It's mostly still there, 'e says!\n\n Now, most of them southrons are heading to the warmer places, like Endralliande, or the Trollsbay, but I'd reckon we go a bit more north. Sure, it's cold, dark, and filled with hostile natives, but there's no competition yet!\" - A tavernside discussion in Leapdon."
 A24_the_northern_elves_title:0 "The Northern Elves"
 A24_the_northern_elves_desc:0 "\"Celmaldor, great port of the north, scions of Maldorian and his spite-driven expedition to the Reach. These elves have been a major pain, given their clans give ours insane tariffs to cut into our profits, and give one another special rates, as to drive us out of more northerly business.\n\n No longer! I have put forward a plan to put things in our favor: Take the city. We march by sea and land upon it, storm their manses, and either appoint yours truly to the city's lordship, or negotiate with one of the elven houses. Genius plan, if I do say so myself.\" - Deranged proposal, by Austin Fenway"
 A24_northern_frontier:0 "Northern Frontier"
 A24_foothold_on_the_forest_title:0 "A Foothold On The Forest"
 A24_foothold_on_the_forest_desc:0 "\"We've managed to begin the settlement of Dalaire, but it hasn't been easy. The cold and the dark have been our main threats, though the bloody natives seem to want their own claim to that title. Even worse are the… reports, of strange disappearances and figures in the forests, but we have established some kind of order.\n\n I am writing to you, cousin, to request our colonies here be reinforced. To protect against raids and monster attacks, we need fortifications beyond blockhouses and flimsy walls. Beyond the necessities of survival, the ports need to be expanded if we want to export our lumber and metals back to the homeland. And for the gods' sakes, send people capable of making beer that doesn't make me want to throw myself into the sea.\" - Letter to Clan Cottersea, by Brandon Cottersea"
 A24_land_of_winter_title:0 "The Land of Winter"
 A24_land_of_winter_desc:0 "\"Westward from the Broken Sea, we've encountered a land somehow more cold and bitter than even the highest moorland peaks. The people here seem locked in eternal war with themselves and their neighbors. At first me and the other explorers assumed this was yet another cold, damn, snowy rock we'd stumbled upon. And then we saw the riches.\n\n Artifacts of the precursors, laying in ancient elven ruins, are just sitting there. If we could perhaps make connections in this westernmost land, we could put an end to these petty conflicts, and then the vast riches of these forlorn cities would be finally tapped to their true potential. Under our watch, of course.\" - Report by Robert Saltstrider, captain of 'The Sunset Maiden', on the nature of Eordan."
 A24_the_rose_and_the_hound_title:0 "The Rose And The Hound"
 A24_the_rose_and_the_hound_desc:0 "It has been over two hundred years since our proud and noble people fell to the Gawedi aggression, forced to pay their tributes and fight their wars, and all for what? So they can still end up as some backwater of the north, while their rivals are poised to tear them limb from limb? It is high time we seize our own destiny, and that begins by putting pen to parchment, and making it clear to the rest of Cannor, that the hound still has its bite!” - Lord Devan Cottersea, 1444, in an address to the gathered Moor Lords"
 A24_the_roses_support:0 "The Roses Support"
 A24_great_lords_disapproval:0 "Great Lords Disapproval"
 A24_freedom_title:0 "Freedom!"
 A24_freedom_desc:0 "\"I marched along the moors, down the gates of the west,\n Down to the Alen river, to show the eagle our best.\n\n The battle was bloody and fierce, and many a friend lost their life,\n And I'd do it all again, if it meant an end to the strife.\n\n And I've seen the depths of slavery, and I've seen the petty Kings, \n But I know in my heart of hearts the joys of freedom bring.\" - Joys of Freedom, by Deris Beron."
 A24_beyond_stormy_seas:0 "Beyond Stormy Seas"
 A24_across_the_highlands_title:0 "Across The Heights"
 A24_across_the_highlands_desc:0 "\"I have received credible reports from my local tavern that the kobolds are amassing great sums of warbands, and are planning on raiding across the border, possibly even striking our burgeoning cities and townships.\n\n To protect our people and our independence, we MUST strike before they have a chance, and behead the serpent which long has sought to gnaw upon our own industry and providence! And though the more deluded clans may cry mercy, I say this: The Eaglecresters were right!\" - One of many letters from Toman Henby, a recluse from Moorton"
 A24_the_thaw_fleet_title:0 "The Thaw Fleet"
 A24_the_thaw_fleet_desc:0 "\"In ages past, it was the armies of Cannor which earned the realms their pride. Knights in shining armor, warriors with gleaming blades. And now, in this age of discovery and adventure, it is the navies. Lorent has its Rose fleet, which dominates the waves of central Aelantir. Busilar has its Lion fleet, which secures the southern seas of Sarhal under their dominion.\n\n Should we not have our Thaw fleet? A great wooden wall to smash any who would dare question our grasp over the frigid seas of the north? Not only would it allow us to enforce our claims properly, but it would be a test Gawed could never do: Rule the waves.\" - Anonymous yet suspiciously well written appeal to the [Root.Monarch.GetTitle]"
 A24_severing_the_second_head_title:0 "Severing The Second Head"
 A24_severing_the_second_head_desc:0 "“These lands were once the home of the Gnomish Hierarchy, which ruled the seas of the west and north. Then came the kobolds and the lands have been mired in war ever since. And yet we have overcome the Greenscales to our north, while the so called 'hierarchy' in Nimscodd struggles even with their doodads and other such muck.\n\n I say we take the Redscales and Bluescales on ourselves, crush them with the might of our clans, and secure our borders once and for all! And maybe, as a bonus, we take the gnomes' land too. We'd put it to better use, I'd say.\" - Spoken by Edward Farford during a casual conversation"
 A24_enable_braving_north_naval_doctrine:0 "We can use the Braving North Naval Doctrine"
 A24_beyond_the_forest_title:0 "Beyond The Forest"
 A24_beyond_the_forest_desc:0 "\"It's real. I know this all seems the tales of money-hungry adventurers, but it really is: The Dragon Empire. We had to hike for a hundred or more miles up highlands, and fight our way through forests black and savage, but we have found the northernmost reaches of the Ynn Valley. Here, atop a dominion which rules over the vast riverlands, sits Varlengeilt, the supposed 'Last Dragon of Aelantir' and god to the Rzentur people.\n\n This empire, as of now, is far too strong for us to fight directly with the resources our colonies have. However, I suspect this great tower has cracks we can slip into. Surely, there are factions who greatly covet the goods of Cannor, factions who would love to be the new rulers of this great realm. If only they had a benefactor willing to payroll the shiny toys necessary to achieve this goal.\" - Report by Henric Darkwood, commander of the Moorman expedition to Svemel, on the situation in Rzenta. "
 A24_reach_of_our_own_title:0 "Reach Of Our Own"
 A24_reach_of_our_own_desc:0 "\"Our lands beyond the Northern Thaw are transforming. No longer are they mere damp rocks populated by tens or hundreds eeking out a living, we have towns of thousands, shipping tonnes of ores, lumber, and crops back to the homeland and receiving fine crafts and wars in return. With all this prosperity, a new idea has arisen amongst the Clans of Aelantir: Unification.\n\n A separate, western Clanmeet electing a governor who rules in the [Root.Monarch.GetTitle]'s name. This allows increased centralization and therefore effectiveness of the colonial administration. Beyond that, this will soothe any calls for autonomy or independence by the western clans, keeping them under the reins of greater clans like Darkwood and Saltstrider and keeping the sons of Gerrac Mooring under the reins of the [Root.Monarch.GetTitle].” - Walter Saltstrider, in 'Westward Sons', a plea to the great clans for reform in the colonies following agitation for independence."
 A24_ruinous_scheme_title:0 "Ruinous Scheme"
 A24_ruinous_scheme_desc:0 "\"People of Brontay, do you like Crowns? I have a proposal for you, about a new venture I am undertaking. Trade in the Ruined Seas is booming due to the import of slaves and the export of plantation goods, and yet our realm takes little to no part in this lucrative market… for now!\n\n I am proposing the acquisition of various lands within the seas to build ports and plantations of our own. At last, we shall have great trade fleets pouring the riches of Aelantir back into our coffers, like in Lorent or Busilar! Join me, my countrymen, and we shall all be rich as kings!\" - Investment proposal nailed to every pub and outhouse in Brontay Point"
 A24_garthland_administration:0 "Garthland Administration"
 A24_garthland_condolidated:0 "Garthland Consolidated"
 A24_new_brontay_title:0 "New Brontay"
 A24_new_brontay_desc:0 "\"You know, one of the main issues I've seen as a sailor is the long voyages. Our great homeland, while all well and good, is on the arse end of the world, meaning it takes bloody forever to get from the colonies and back to home. This either means we destroy the morale of our sailors, or we give them disastrous amounts of leave.\n\n So, what do we do about this? Well, perhaps if we can't have the sailors go far to visit their families, we have the families closer by? With a lot of our reach expanding southwards, a more southerly port to center a lot of our operations there would be great. And as a first pick, I would recommend somewhere along the coast of Fangaula. Its prime position at the end of the Sarhaly trade network would both allow us to control both the massive networks of trade at its bottleneck, but also provide us a place to expand operations into the southern seas.\"- An anonymous suggestion to Admiral Edric Fouler"
 A24_across_the_southern_seas_title:0 "Across The Southern Seas"
 A24_across_the_southern_seas_desc:0 "\"Everyone talks about Noruin and its idyllic hills and valleys, and perfect climate for growing cash crops, and yet no one talks about Soruin, and for good reason; it's a horrid, festering sore on Aelantir. It has tropical storms, tropical diseases, and a tropical climate that seemingly only grows parasitic insects, trees, and more parasitic insects.\n\n However, no one owns it! It is so horrid that its true value lies entirely untapped. Sweep away those jungles, add some *minor* barricades, and you're left with prime real estate for plantations. And, to sweeten the deal, my cousin, I shall personally chip into the project using my share of the clan's wealth. In exchange, I make the request to do an… expedition, into the heart of the Effelai.\" - Teagan Cottersea, in an appeal to his cousin, the [Root.Monarch.GetTitle]."
 A24_new_brontay_trading_company:0 "New Brontay Trading Company"
 A24_tip_of_the_jungle_title:0 "Tip of the Jungle"
 A24_tip_of_the_jungle_desc:0 "\"Rounding Ardimya, our ships ventured through the eastern seas, battling pirates, storms, and strange magics until we came upon our grand prize: Haless, envy of the west. Things Cannorians pay mountains of gold and silver for seem to grow on trees in this most exotic land. Now, the slight issue is that we do not speak the language, nor do we have any territory of which to call our base of operations. This means we're currently middlemen in the system.\n\n But, let's say there was a group of likeminded Halessi who needed a bit of extra help to achieve their goals, one who we could supply with guns and in exchange act as our foothold in the east. I think we will, with this plan of mine, be able to finally extend our power to the last of the known continents.\" - Marlen Derisson, after his expedition to Haless."
 A24_land_of_genies_title:0 "Land of Genies"
 A24_land_of_genies_desc:0 "\"They say Ardimya is the land of a Genie Queen, that some disaster shattered the landscape and brought forth creatures of darkness. They say a lot of things, first and foremost that no one has ever managed to subjugate this place or its people. Not even the merchant-philosophers which hug the isthmus to the north.\n\n Well I say they are just not trying hard enough! The land, at least part of it, is temperate and well suited to cash crops, as well as being a fine port for the lads who want a go at taking the eastern route to Haless.\" - Conversation overheard at a pub in New Brontay"
 A24_to_bite_ones_master_title:0 "To Bite One's Master"
 A24_to_bite_ones_master_desc:0 "\"I don't care what your complaints are, the Cotterseas are right: The so-called 'King' in Gaweton may be a boy of half our blood, but soon enough he will be a man. And then what? We must act while the 'Great Lords' bicker and fight amongst themselves and the crown, and seize the moment. Gather your clan, your friends, damn near everyone who owes you a favor or a pint, and march east! \n\n And if we don't earn our independence, we'll at least make them earn our submission by the elder right, of iron and blood.\" - A letter to many of the minor Clans across the Westmoors, by Alric Fouler"
 A24_to_bite_ones_master_mod:0 "To Bite One's Master"
 A24_meet_with_the_shires_title:0 "Meet With The Shires"
 A24_meet_with_the_shires_desc:0 "\"While we are no doubt the mightiest of Gawed's caged beasts, there are others of a… different nature. While the halflings are not exactly known for their combat prowess, they have numbers we lack. Combined, we could deal a blow to this eagle, and become our own masters.\" - Heathcliff Wuther \n\n In its long history, Gawed's talons have sunk into many people, and none have suffered more than the halflings. Alone we are unlikely to last, but together we can make a difference. Or at the very least, Gawed will be more distracted fighting in the Small Country, and we can make gains in the north."
 A24_appease_the_heartlands_title:0 "Appease The Heartlands"
 A24_appease_the_heartlands_desc:0 "\"Despite containing much of our countrymen, the heart of our country is not exactly comparable to the Bloodwine, the Alen, or Damesear. It is, and always has been, a soggy rock. It is a soggy rock we deeply enjoy but it does not make it any less soggy, or any less a rock.\n\n Now it is high time we change that! Clan Cottersea, your faithful cousins, have pledged full support behind the new crown. In exchange, we require… favors. Advisors to manage the wealth of our heartland, perhaps some upgrades to the manor and its surrounding townships. Do all that, and you'll have our vote.\" - A salt-stained letter to the [Root.Monarch.GetTitle], by Rodger Cottersea"
 A24_magnate_clan_manor_construction:0 "When there are §Y3§! buildings including a §YMarketplace§!, a Clan Manor will be completed"
 A24_development_projects:0 "Development Projects"
 desc_A24_development_projects:0 "Development in Clan lands is underway."
 A24_placate_the_clans_title:0 "Placate The Clans"
 A24_placate_the_clans_desc:0 "\"Another Clan-meet? Bloody hell, we better double the watch! Last one ended with dozens of injuries, five deaths, and a rumored case of cannibalism. And by the gods, there's the drinking… my men are **not** prepared for that.\n\n At the very least, I hope the work that the [Root.Monarch.GetTitle] has put into herding the Moor Lords will result in more civil outcomes… yeah, probably not.\" - Overheard from the head of the guard, Brontay Point"
 A24_pluck_the_eagle_title:0 "Pluck The Eagle"
 A24_pluck_the_eagle_desc:0 "\"Years ago, we made the bold decision to take an axe to our old masters in Gaweton, and found our own Kingdom! But now it is time to ensure the Gawedi, with their Great Lords and greater hosts, dare never again to march upon the moors. Because we are going to march on them first.\n\n Let no one say the Moormen, proud sons of Gerrac, who obey a king born and bred amongst them, will ever again submit to the lowlanders! We shall burn their fields, raze their 'great works', and forevermore let the Southrons know with no doubt who is master and who is servant!\" - Speech made by the [Root.Monarch.GetTitle] to the assembled clans of the Westmoors."
 A24_ruinous_success:0 "Ruinous Success"
 A24_upon_foul_waters_title:0 "Upon Foul Waters"
 A24_upon_foul_waters_desc:0 "\"They always talk about Brontay Bay and the Sea of Storms, but they never talk about the *real* greatest waters of the Westmoors: The River Foul. While some deride our river, it is the link between the moors and the Alen, and it has long been neglected by the Gawedi. The waters are choked with weeds and without proper protections against flooding, the farmlands which are some of the most fertile in the north are either left to forever fallow or worked beyond the bone.\n\n But I have grander plans than the ones my cousins desire, I see the opportunity to bind the populous and industrious Gawed to the heartland of our Kingdom and its western colonies: A road, the likes of the Godracsway or the Castanorian Legionways, stretching from the Alen to Brontay Point.\" - Alvor Fouler, 'The High Way', an appeal to the Clans on a new infrastructure project."
 A24_conq_in_the_effelai:0 "A Conquistador has begun exploring the Effelai Jungle."
 A24_add_new_cot_to_ardimya:0 "A new Center of Trade will be placed in the highest development province in the §YArdimya§! trade node."
 A24_ardimya_new_CoT_1:0 "ardimya cot"
 A24_into_the_highlands_title:0 "Into The Highlands"
 A24_into_the_highlands_desc:0 "\"While the west is where most of our people reside, it is in the Moorhills where you can find our soul. Ancient highlands and moors, pocked with the ruins of our ancestors and of other mysterious inhabitants. Tis a sight that has made many a poet, and where our only liege lord prior to you was crowned.\n\n But we cannot remain in the past forever. My clan requests aid in building up our manor, as well as helping bring industry to the surrounding area. Our land is rich in ore, and the constant rain means our land is fertile with enough effort. In exchange, we offer our full support to the [Root.Monarch.GetTitle].\" - A carefully written letter to the [Root.Monarch.GetTitle], by Anders Fouler"
 A24_clerical_clan_manor_construction:0 "When there are §Y3§! buildings including a §YChurch§!, a Clan Manor will be completed"
 A24_through_to_the_frontier_title:0 "Through The Frontier"
 A24_through_to_the_frontier_desc:0 "\"Since our near two hundred year bout under the Gawedi boot, our beloved Beronmoors have become disarmed from their past, losing the vast holdfasts and redoubts which were once famed across the moorlands! With the fighting done, and the Gawedi on the backfoot, we think it time for a return.\n\n Clan Moorton humbly requests the march be refortified and prepared in case our lowland cousins get any ideas. As well, many of our lads are bored from the lack of fighting, so much so that feuds have reignited in recent months. Perhaps with investments we could get them out of each other's hair and into your armies?\" - A soot-stained letter to the [Root.Monarch.GetTitle], by Robin Moorton"
 A24_clan_manor:0 "Clan Manor"
 A24_sharpen_the_spears_title:0 "Sharpen The Spears"
 A24_sharpen_the_spears_desc:0 "“As our empire grows across the northern seas, we cannot forget our enemies at home. Our former masters in Gaweton are surely salty about not only losing their vassals, but now with the discovery of Aelantir, losing all easy ports to the west. We can only assume they're preparing invasions as we speak.\n\n We must form a true host, not merely the gathering of clans, but one in emulation of the southron states, forged with the courage of our sons and the wealth of our people. With such a force, none could DARE call us the 'wayward dogs' of some lowland prick!\" - Hareton Woldenmarck"
 A24_dispatch_the_parchment_title:0 "Dispatch The Parchment"
 A24_dispatch_the_parchment_desc:0 "\"It has become sorely apparent that while we consider ourselves to be the best damn thing to happen to the north since Castanor was sent back to Escann, the rest of the continent don't see it the same way. To the Southron powers, we are either a rogue vassal of the eagle, or unimportant highlanders.\n\n If we are to end the threat of Gawed once and for all, we need their support, and if we are to earn their support, we have to start making promises. First and foremost is this: Though we may be the new great kingdom of the north, we are not going to march south any time soon.\" - Ricard Cockerwall, in a letter of advice to the [Root.Monarch.GetTitle]"
 A24_BROKEN_EAGLE_INSIGHT:0 "§GEvent Insight:§!\nThe war will end in favorable terms."
 A24_the_high_way:0 "The High Way"
 A24_tower_to_mire_title:0 "From The Tower To The Mire"
 A24_tower_to_mire_desc:0 "\"Bal Vertesk and Bal Mire are, in many ways, twins. They are both fortresses forged to contain the Alenic people, and they both have failed in their duty. Vertesk was once the capital of the Gawedi Kingdom, and Bal Mire has changed hands so many times its hard to keep count.\n\n But never before have the two fortresses fallen at once to an Alenic power, at least not yet. Such an achievement would both cement our control over the Alenic frontier, but also demonstrate our might for all of Cannor. That the two fortresses of the frontier were taken not by the eagle, but the hound.\" - A rather manic proposal, allegedly by warmonger and enemy of the peace Lockwood Marner."
 A24_lords_of_the_alen:0 "Lords of the Alen"
 A24_allow_use_of_bal_mire:0 "This will allow us to use §YBal Mire§!."
 A24_proving_the_point_title:0 "Proving The Point"
 A24_proving_the_point_desc:0 "\"Brontay Point is meant to be the center of the great Northern Empire, which stretches from the Broken Sea to The Soruin, from the Alenic Reach to Ardimya. Our realm is worldwide, and yet our capital does not reflect this; everyone knows about Lorentainé or Anbenncóst, few know of Brontay Point to the extent that many maps of the Westmoors lack its distinctive peninsula which gives it its name.\n\n Renovations must begin immediately, the marshes and fens must be tamed and built upon with modern streets and districts. The people of our empire would do well to fuel this urban expansion, and we would do well to consolidate colonial power in the heartland, where we can see it.\" - Alfred Pike, mayor of Brontay Point, in a meeting with the [Root.Monarch.GetTitle]"
 A24_the_northern_cities_title:0 "The Northern Cities"
 A24_the_northern_cities_desc:0 "\"The Southrons say the Alenic Reach is a slice of the southern civility in a sea of northern barbarism, and they're half right; They're a bunch of pansies. Long they have mocked us for our highland ways, while they live in rich cities ruled by merchant-lords. But now Gawed is gone, and we rule the north, and all their gold and all their ships won't keep us out.\" - Cathy Leapdon, in her statement titled 'We should conquer the Reach'"
 A24_clan_capital:0 "Clan Capital"
 A24_lords_of_the_north_title:0 "Lords Of The North"
 A24_lords_of_the_north_desc:0 "\"My people, it has been a long journey. We were once isolated clans in the shadow of the Gawedi Kingdom, oft left off of the maps and chronicles of history. But no longer! Our ancient enemy in Gawed has been broken and made to bend the knee. Our reach extends from the tundra of North Aelantir, to the sweltering jungles of the south, to the rich east and the mysterious lands of Ardimya. And the other empires of Cannor recognize us as what we are: The Northern Empire.\n\n And for this, I proclaim that we must have a new name, for we are merely the Westmoors no longer. May our empire last until the seas boil and the moors erode into sands!\" -  [Root.Monarch.GetTitle]’s address to the people of the Westmoors"
 A24_noble_clan_manor_construction:0 "When there are §Y2§! buildings including a §YBarracks§!, a Clan Manor will be completed"
 A24_forcing_the_knee_title:0 "Forcing The Knee"
 A24_forcing_the_knee_desc:0 "\"'Great Lords', what a joke! These men, who ruled lands most would call kingdoms, who could summon hosts tens of thousands strong, fell to us. Are we not greater then? Are we not the new lords of the Alen? And yet the lesser lords defy us, claiming mantles of boars and bears and whatnot, and act as if we are merely a foreign power soon to be overthrown.\n\n We shall summon hosts of our own, march into their 'mighty' keeps and holdfasts, and demand oaths of fealty the same that their great lords and kings demanded of them in years past. Those who accept shall be clans like us, and shall retain their lands and peasantry. Those who refuse… shall be dealt with, and their holdings given to lesser clansmen as to wrestle control into the hands of our own. At last, the 'sons of Godrac' will know servitude and obedience.\""
 A24_frostbridges_toll_allowed:0 "This will allow us to enforce the Frostbridges Toll"

 #Events
 westmoors.1.t:0 "Lords of the Moors"
 westmoors.1.d:0 "The sun shone greyly upon the hithering of the moors, as the lords gathered on a lonely hill, too barren and bereft for even shepherds or bandits to make use of it. There stood Clan Cottersea, with their hair damp with seasalt, eyes like lantern lights as they laughed and sang and slung back ale after ale. There stood Clan Beron, dark eyed and tall, speaking to one another in ancient dialects long predating the Alenic arrival to the land. There stood Clan Cockerwall, hair auburn-wild, hands on their swords and axes as they jeered and yelled to the other clans. Here, [Root.Monarch.GetName] decided, would the fate of the Westmoors be forever changed.\n\n Unfortunately, the others disagreed, as a Cockerwall shouting had soon turned to shoving Lord Beron and making a remark about his wife. This, of course, led to the good Lord Beron punching him in the face, causing both clans to begin beating each other senseless. As the [Root.Monarch.GetTitle] stood observing the bedlam, [Root.Monarch.GetSheHe] had but one thought."
 westmoors.1.a:0 "We are now stuck, without outside enemy, with ourselves."
 westmoors.2.t:0 "War, On Our Terms"
 westmoors.2.d:0 "Alan Leapdon sat in the near empty tavern at dusk, facing the man he was trying to get info out of, but who unfortunately seemed more interested in devouring cakes and pies like he were starved. Maybe he was, the Broken Seas weren't exactly overflowing with arable land.\n\n Finally, mercifully, Robert Saltstrider looked up to face him, eyes pincer sharp. \"Forgive me, lad, it has been a long journey. Lets discuss Eordand, at last.\"\n\n Nodding, Alan began his questions. \"What's the political situation?\"\n\n \"Fractured. The various tribes of Eordand are fighting, as far as I can tell its religious disputes. Crusades, counter-crusades, and the like.\"\n\n \"It's like we never left Cannor.\" Leapdon laughed. “Anyone in particular we should worry about?\"\n\n \"Not from what I can tell. I've heard… whispers, of some particularly powerful mages, but nothing specifically. And nothing we can't deal with.\"\n\n \"Wonderful. Now, any specific landing spot?\"\n\n Hearing this, Robert pulled a map out, and pointed. \"The northern tip of the region. It's cold, but the locals know me and I've made sure any landing wouldn't be opposed on the beaches there.\""
 westmoors.2.a:0 "Thank you for your service yet again, Saltstrider."
 westmoors.3.t:0 "The Shadow Of The Dragon"
 westmoors.3.d:0 "Alan Leapdon found him in a townhouse: Henric Darkwood, captain of the Ynn Expedition. \"Do you have your report?\"\n\n \"Aye, one moment.\" Henric fished through a pocket and snatched a journal. Opening it, he gestured for Alan to ask his questions.\n\n \"What's the political situation?\"\n\n \"In the north, we have fighting between folks worshiping the River Ynn, and a dragon cult, dedicated to a god named Varlengeilt.\" Dragon cults were not an unfamiliar concept to the Moormen, given the constant raids by the fanatical kobolds for their hoards. But to see a \"civilized\" people worship a dragon, a living one, that was a strange thing indeed for Alan.\n\n \"Interesting. Any weaknesses?\"\n\n \"Varlengeilt is powerful but vain. He will not see us as a threat if we do not give him reason. If we strike hard and fast, we could secure Svemel before while his forces are busy with rebellions and the rest of the Ynnic elves. Then, once we have the city, put down this dragon. The River Worshipers will be much more willing to work with us after that.\""
 westmoors.3.a:0 "Thank you for your service, Darkwood"
 A24_belly_of_the_beast:0 "The Underbelly of the Beast"
 A24_occupying_svemel_occupies_upper_ynn_tt:0 "When we occupy [1191.GetName], we will also occupy every province in the colonial region."
 westmoors.4.t:0 "The Clans Call"
 westmoors.4.d:0 "[Root.Monarch.GetTitle], a letter has arrived from the court of the Westmoors, seeking aid. They plan on war with Gawed, to finally destroy them once and for all."
 westmoors.4.a:0 "And we will answer!"
 westmoors.4.b:0 "Whatmoors?"
 refused_clan_call:0 "Refused the Clans' Call"
 westmoors.5.t:0 "And They Answer"
 westmoors.5.d:0 "[Root.Monarch.GetTitle], our letters across the rest of Cannor have not gone unnoticed, and the great powers rivalling the eagle have sent their answers!"
 westmoors.5.a:0 "Splendid"
 westmoors.6.t:0 "The Broken Eagle"
 westmoors.6.d:0 "Great Lord Marlen Dire felt his stomach drop as the news was given to him: The King of Gawed was no more; they found his body floating down the Alen, and had buried him not in the Kingscrypt as was tradition, but a small hill known only to the royal family as to protect him from desecration. “So what now?” He asked, in a meeting with the other Great Lords of Gawed. His father had always spoke highly of his peers; the protectors of the Kingdom’s traditions and honour, he called them.\n\n“The Moormen have seized the capital, Rathroost is currently holding a feast for its new overlord.” Brasslance spat. “No matter, we’ll not give up our land so easy.”\n\n“But what I meant was,” Dire looked around the room, at each of the men wearing black rings engraved with oaths they swore to a dead man, “Who is the new King of Gawed?”\n\nThey all looked like they had something terrible to tell him, that they had all known for some time. “There won’t be one.” Spoke Ginnfield.\n\n“What?”\n\n“The capital is gone. The Gerwick line sundered, and the Moormen will see any election of a new king as a the summoning of a new warhost. Our people are tired, Dire. I know you are young and eager to fight for the people, but they need time. Go home, lick your wounds, and continue the fight later.” And with that, the lords departed, leaving Marlen alone with his thoughts."
 westmoors.6.a:0 "“For the first time in a thousand years… there is no Gawed.”"
 westmoors.7.t:0 "Great Lords Brought Low"
 westmoors.7.d:0 "They were made to kneel upon the hillock, knees damp with mud-water as the sunrise made the Alen glow like pyre-fire. But they were not to be burned. Instead, the moor lords brought several stones to the hillock, and when put together they were large enough for a kneeling man to lay his head on them, and not roll off when the claymore made contact. Lesser men would run, or beg, or weep, but they were Great Lords. Last of the ancient companions of Godrac, last of the lords of iron, last children of the Alen-\n\n Their thoughts were cut off by one of the lords, one with reddish hair and a smug grin, a Cockerwall, tapping his sword as he spoke. \"For refusing to bend the knee to the true lords of the north, the Kingdom of the Westmoors.\" He emphasized that last part in a manner the Gawedi felt cruel, \"You shall be sentenced to death.\"\n\n \"And some of you may notice that only half of you are here.\" Spoke another lord, a somber man with dark hair and eyes, and a more spindly appearance. A Fouler, no doubt. \"Not all of you were so… eager, to follow your leal-lord to your graves. As such, many of your holdings and titles will be given to those Gawedi which bent the knee and swore oaths to our [Root.Monarch.GetTitle] -\"\n\n \"And where is this Moor [Root.Monarch.GetTitle]?\" Asked one of the Great Lords, a young man, heir to his recently slain father. \"The only one I remember, Gerrac Mooring, was gored and made into a cloak by Ulric the Eagle?\"\n\n The Cockerwall paused, before breaking out in laughter. \"Stand up, my boy.\" As the young lord did, he was cut down as the Cockerwall removed his head from his shoulders, prompting gasps from the rest of the Gawedi. \"This isn't a debate or a trial, and I don't know why we're shocked! You're all getting shaved, it's just that this young man wanted it down sooner rather than later!\""
 westmoors.7.a:0 "They will be our servants in time, but for now are simply our subjects."
 A24_moorman_yoke_on_gawedi_cores_tt:0 "Every owned §YGawed§! core province gains:"
 A24_moorman_yoke:0 "Moorman Yoke"
