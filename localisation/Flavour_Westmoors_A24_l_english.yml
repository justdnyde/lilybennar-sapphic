 A24_estate_nobles_development_of_castle_clan_manor_tt:0 "Every owned province with §YClan Manor§! gains the following bonus:"
 A24_estate_nobles_development_of_castle_clan_manor_rt:0 "The modifier '§YExpand the Clan Manor§!' is removed from all provinces with a §YClan Manor§!."
 A24_expand_clan_manor:0 "Expand the Clan Manor"
 desc_A24_expand_clan_manor:0 "This province is seeing financial support from the local nobility, making the fortifications in this area better maintained compared to other defensive buildings."
 westmoors.39.t:0 "Cottersea Expedition Departs"
 westmoors.39.d:0 "HIDDEN EVENT"
 westmoors.39.a:0 "We'll see what discoveries he can make"
 westmoors.8.t:0 "The Cottersea Expedition"
 westmoors.8.d:0 "\"Day… I don't know anymore, if I am being honest. The last few weeks have been me merely guessing the days, but today I have decided to do away with the charade. They're all dead. Everyone except me and Darran. I sent him back with this log so there is a record of the expedition, and because he was afraid. I'm not.\n\n This whole jungle, it's alive. The entire Effelai is some kind of… I don't know what to call it; a massive network controlled by a single being far grander than even the dragons of yore. Perhaps even the gods, if there are any anymore. It controls- helps people, more strongly the closer you are to its heart, and its origin… its a fallen city, sunken into the ground, roots shattering through the roofs live daggers- like it's reaching out to help.\n\n It's beautiful, really. A sea of gemstone-glimmering plants. But you must stay away. This jungle doesn't like outsiders. I want you to stay away. I need you to stay away. Please. Darran, if you read this, keep going until you reach the sea, and book a ship back to Brontay IMMEDIATELY. The King- Queen- WHOEVER is in charge must know that it is NOT safe. It will never be safe. Not for a colony or for any other expedition. You know what happened to the others, I'm sure from the other logs you'll be descriptive in your retelling of their fates.\"\n\n - Final log of the Cottersea Expedition, by Teagan Cottersea."
 westmoors.8.a:0 "Probably going to just ignore that…"
 westmoors.9.t:0 "Mister Marlen in Mangayan"
 westmoors.9.d:0 "\"What brings you to my estate, Cannorian?\" King Eolar Szil Arawkelin sat upon a hill, under the shade of a peach tree, as servants fanned him and served him chilled wine. Meanwhile, the Cannorian knelt on one knee, as his men held crates.\n\n \"A business opportunity. My name is Marlen Moorton, and I have been sent by the Kingdom of the Westmoor, the great kingdom of Northern Cannor.\"\n\n \"I see, and what is this opportunity?\"\n\n \"My people have a great admiration for your civility in a sea of these… barbarians. In all of Haless, only Arawkelin’s people are the equal of the Cannorian. My offer is: in exchange for joining our empire, you gain the power you need to dominate Vimdatrong once and for all, and bring the light of your culture and civilization to the jungle.\"\n\n The King raised his brow. Bending the knee to some other realm far across the sea? It wouldn’t be popular amongst his people, especially the nobles. \"And what could that possibly be?\"\n\n Grinning, Marlen nodded to one of his men, who handed him a crate. \"Your people have honor and dignity, your grace, but they lack a great power of our people, that has aided us on our adventures.\"\n\n \"And that is..?\"\n\n \"With a sword or spear, you gain respect and authority, but…\" Mr. Marlen opened the crate, and the sight of muskets drew gasps from the courtiers. \"But with guns, you can get anything you want.\""
 westmoors.9.a:0 "Dignity for power, a trade worth taking."
 westmoors.9.b:0 "We admire the Cannorians, but we are their equal, not their subjects." #notexist??
 westmoors.10.t:0 "Weathering Heights"
 westmoors.10.d:0 "The manor at Brontay Point was alive with laughter and music. Lords of every clan, as well as merchants and guests danced, joked, and talked amongst one another, unlike the old days where clans dared not associate.\n\n The Cotterseas regaled everyone with their tales of adventure and danger. The Foulers spoke of their loyal contributions and faith. The Cockerwalls dueled with all manner of weapons, and dared any to challenge them. The Berons spoke of their ancient culture and traditions, and mostly took the Cockerwalls up on their offer. The Moortons tried to pitch people on their investment schemes, and showed off their most prestigious heirlooms. The clans of Haighbobben, the Storm Isles, and Celmaldor looked mostly grateful to be there, and spoke of the ever prosperous Northern Thaw trade. And of course, Darkwood and Saltstrider, the two main clans of Aelantir, spoke of the success of their now united colony, and its ever increasing taming of the west.\n\n As the [Root.Monarch.GetTitle] looked upon the clans, who once warred for a thousand years over scraps of grazing land, who butchered each other over cycles of revenge, who were now finally getting along, they smiled. They were, at last, the better of Gerrac Mooring, who in ancient times had led them westward to a new life. And now the sons and daughters of the Greatmoors would get it."
 westmoors.10.a:0 "Today, I am within sight of my heaven."
 A24_upgraded_clan_manor:0 "Clan Manor"

 westmoors.20.t:0 "Clan Cottersea"
 westmoors.20.d:0 "Rodger Cottersea, cousin to the [Root.Owner.Monarch.GetTitle], stepped off onto the docks, grinning as he dug through the damp pockets of his coat, as he greeted his cousin. \"Good afternoon to you, [Root.Owner.Monarch.GetName]!\" He called out, though he gestured instead to the newly built houses and streets of Cottersea. \"I have to thank you for your work here. Good to see our royal cousins have not forgotten where they came from.\"\n\n He finally fished out what he had been looking for, a similarly damp piece of parchment, and bent the knee. \"And of course, the price is still agreed upon. For your work, I, Rodger of Clan Cottersea, Lord of our ancient seat, pledge my support to you, cousin.\""
 westmoors.20.a:0 "The Sons of the Sea are united once more."
 westmoors.21.t:0 "Clan Fouler"
 westmoors.21.d:0 "Peasants toiled in the hilly fields as Heathcliff Fouler sat in his study, reading over parchments and papers about the goings on in his lands. Finally, after some time, his foggy eyes drifted upwards to the [Root.Owner.Monarch.GetTitle]. \"Your Grace,\" he murmurs, \"you have done well, restoring prosperity to this forlorn third of your realm. How many previous lords have forgotten it? Many.\"\n\n He then laughed, \"Ah, but I'm rambling now. You are here for our support.\" He stood, old knees shaking as he then approached and knelt. \"I, Heathcliff of Clan Fouler, Lord of the Foul river, pledge the support of my Clan to you, [Root.Owner.Monarch.GetTitle] of the Westmoors.\""
 westmoors.21.a:0 "The Lords of the Foul are necessary to rally the midlanders."
 westmoors.22.t:0 "Clan Cockerwall"
 westmoors.22.d:0 "\"You know this was not easy for us.\" Spoke the raspy voice of Lockwood Cockerwall, a large man with dark blue eyes, his hand on his claymore as he stared from the battlements to the moors. \"We are good-cousins to the Gerwicks, fighting them on the fields was akin to kinslaying for many of us. But we did so because we had faith in you, that you would see this realm united after a thousand years - what our Clan failed to do.\" And at a sudden, he smiled, and laughed. “And you did, you did good, [Root.Owner.Monarch.GetName]. And for that…” He knelt, and produced a piece of parchment. “I, Lockwood of Clan Cockerwall, pledge my sword to you. I shall fight your battles and shield you from any danger, and always serve the Kingdom of the Westmoors.\""
 westmoors.22.a:0 "The sons of Colm bend the knee at last."
 westmoors.23.t:0 "Clan Beron"
 westmoors.23.d:0 "In the highest peaks of the Westmoors, straddling the northern border, stood an ancient, weathered set of stones the locals still stubbornly called a 'holdfast'. Standing in front of it was a man of short stature but great shadow; Dominic Beron. \"My people have been in these lands before Gerrac, first King of these lands, led the Alenics westward beyond the Alen. Ever since, we have fought against all who would seek to subjugate us, every king and emperor. Until now.\"\n\n He snapped his fingers, and a servant brought forth a dagger, black and bright, from which Lord Beron cut his hand and let the blood drip onto the shallow grass of the moor. \"Clan Beron is yours, my [Root.Owner.Monarch.GetTitle].\""
 westmoors.23.a:0 "The eldest sons of the Moors acknowledge our might."
 westmoors.24.t:0 "Clan Morton"
 westmoors.24.d:0 "Moorton, moreso than ever, hustled and bustled with the life of commerce and opportunity. Its foundations had been expanded, roads and wells built, and people from all over flocked to live in the gleaming light of the Beronmoors. In a townhouse by the market square sat Lord Marcan Moorton. \"I have been told many things about how strange it is to rule from a city instead of a castle or holdfast. But they don't think the coin I have is very strange, and I doubt you do, [Root.Owner.Monarch.GetTitle].\"\n\n He then stood, and picked up a fine piece of parchment, carefully written and sealed. \"For your help in bolstering our interests, I shall help you. You shall find your treasuries a little heavier from now on, should you continue to support us.\""
 westmoors.24.a:0 "More mercantile minds would certainly be welcome."
 westmoors.25.t:0 "Clan Icewind"
 westmoors.25.d:0 "Cold winds blew out to the Thaw as [Root.Owner.Monarch.GetTitle] ascended the carved stone steps of Celmaldor's central palace, white as if hewn from a thousand thousand harvested pearls. In a room overlooking the city and the forest beyond sat Prince Arfil Icewind, the current leader of the Icewind Clan - due to everyone higher in line to the seat deserting the city as it was taken by Moorman forces.\n\n \"So, you are my suzerain.\" He was clearly trying to sound professional, but his trembling hands and gaze focused on the armed guards said something else entirely. \"In its over four centuries of history, Celmaldor has always stood independent of the powers that surrounded it. Until now. I cannot know the future of my people, but for their sake, I offer the city to you, my liege.\" He shakily handed over a parchment, “I only ask for the Icewinds who stayed within the city in its final hours of siege to remain in charge, to lead the city in this new age.\""
 westmoors.25.a:0 "Elven clans? A strange thing. Still, useful."
 westmoors.26.t:0 "Clan Korlak"
 westmoors.26.d:0 "The highlands north of the Westmoors rose high into the air, rivaled only by the Dragonheights. Towards the top of the heights stood a cave, and just outside, perched comically, was a table and a matching set of chairs. There the [Root.Owner.Monarch.GetTitle] sat, as a procession of small green creatures crawled forth from the cave, led by a slightly taller kobold by the name of Korlak, chin raised high in pride.\n\n Sitting at the table, the kobold lord huffed. \"It brings me no pleasure to be here today. But though we have resisted your people for a thousand years, we know better than anyone else when it's time to change strategy.\" The kobold, somehow, produced a parchment, presumably seized from…somewhere. On it was a crude copy of a seal, along with scrawling writing that refused to stay in line. \"I believe this is how your people swear oaths, right?\""
 westmoors.26.a:0 "While I'm sure many of our lords are scoffing, this kobold clan will surely show its quality in time."
 westmoors.27.t:0 "Clan Toncodd"
 westmoors.27.d:0 "Rain battered the miserable, depressing island of Toncodd, which in truth was more a rock the gods had scattered in the sea, forlorning it to a fate of storms. But its position in this Sea of Storms had a great advantage for those seeking travel westward through the Lament or Thaw. In a surprisingly dry and warm fort sat an armored gnome with an eyepatch and an intricate clockwork harpoon; Todrick Toncodd, lord of the isle of the same name.\n\n \"You're lucky I called this meeting on honest terms; some of my brethren wanted to blast your ship, but I knew we would fall to the oncoming storm if that were the case.\" He glared at another gnome to hand him a parchment, to which he doodled his name on the front, spat on it, and passed it to the [Root.Owner.Monarch.GetTitle]. \"Choke on it, Your Grace.\""
 westmoors.27.a:0 "They're actually one of the BETTER behaved clans."
 westmoors.28.t:0 "Clan Darkwood"
 westmoors.28.d:0 "The night was dark and full of terrors, as Alfred Darkwood sat on the porch of his hut, sharpening his axe as his wife prepared his poisons and potions. Scouts had found tracks, and butchered animals, and sighted something moving at the edges of the forests. Whatever it was, it needed to be put down. As he sharpened, he looked out to the small burgeoning settlement. Once just a few shacks down by the coast, it had been expanded to be nigh on self sufficient, importing only guns and other finished goods.\n\n Tomorrow, he knew there would be battle, and that he, as a woodsman, would be at the forefront of this. To push back the darkness, vanquish the beast, slay the enemy, that was the vow his fathers had kept for centuries. But tonight, he and his people would feast, they would sing and dance, and they would either celebrate his return, or bury his body if there was one. Such was life, even across the world."
 westmoors.28.a:0 "Good to see our colonies are defended by the bravest amongst us."
 westmoors.29.t:0 "Clan Saltstrider"
 westmoors.29.d:0 "'The Sunset Maiden', as her crew called her, was ironically a ship built for the ice and rocky outposts rather than for sunny weather or warm sandy ports. Robert Saltstrider, captain of this fine vessel, was a man often considered mad. Not in the Cottersea sense; the fools who oft laughed as stormwinds and rogue waves lashed their ships. No, this was a quiet kind of madness. He had intense, dark eyes like the depths he and his crew traversed, which followed you everywhere you went. He had hair dark as iron and skin like beaten leather, scarred and worn from his battles against monsters, men, and things unnamable that only Aelantir could throw at a man.\n\n But he was not unkind, nor was he of the kind to accept casualty. One time during a brutal storm, he had dragged a crewman from certain death. Another time he had speared a dozen Ice Sleepers as they crawled from the cold onto the deck, oily blood staining the steps as he kicked them back into the sea. And so his crew had grown to respect him, and so did the Broken Sea as a whole, as his clan bound the disparate ports together, allowing them to flourish even at the end of the world."
 westmoors.29.a:0 "“At the ends of the world, it seems madmen are the most reliable."

 westmoors.40.t:0 "Moor Lords Pulse Manager"
 westmoors.40.d:0 "THIS EVEMT IS HIDDEN"
 westmoors.41.t:0 "Cattle Raid"
 westmoors.41.d:0 "\"I don't know what you're complaining about, given I did all the bleeding fighting.” Laughed Marric as they marched side by side along the moors, back to their lord's keep.\n\n \"Well maybe it's because, oh, I don't know, I'M THE ONE WHO GOT SHOT WITH AN ARROW?” Garth said, glaring at his brother, \"Maybe I have a right to complain.\"\n\n \"Alright, alright, stop yelling, you'll make me as deaf as Uncle Marlen. Let's keep watch of cattle we just rustled, like we're supposed to.\" There were around fifty of them, all from the same or neighboring villages, who together had seized nearly a hundred heads of cattle, all without any deaths. Though from Garth's hollering you would have assumed the arrow in his arm was in his eye. With this many, the lord was sure to reward them handsomely."
 westmoors.41.a:0 "This will all stop on its own. Probably."
 westmoors.41.b:0 "More arrows in arms will surely stop this nonsense."
 westmoors.42.t:0 "Blood on the Moors"
 westmoors.42.d:0 "\"TEAGAN.\" Boomed the man in the doorway of the manor, the rattling rain outside blanketing all but the noises at least his volume. His eyes were bloodshot and red around the rims, and he had his hand beneath his greatcoat. \"You know why I'm here.\" And though he stood before the lord of this manor, his gaze was fixed purely on the son who hid behind his father.\n\n The lord looked at him and sighed. \"Alric. I know things have gotten out of hand, but my clan has enough coin to pay-\"\n\n \"Payment?\" Alric laughed almost as much as he cried, \"You think you can clap a pile of coins in my hand and send me on my way? My son is dead, Teagan.\" He pointed at the young man behind Lord Teagan, \"My only son, slaughtered by that bastard right there.\"\n\n \"It is the law, Alric. I'll use a favor with the crown, get you your son's weight in silver, and the debt will be paid-\"\n\n \"TO HELL WITH THE LAW!\" Alric drew from his greatcoat a dagger, flickering in the lamplight, and reflecting the light off of the several armed men he had brought with him. \"We do this the old way, the true way. Eye for an eye, son for a son. Step aside, \"\n\n Teagan drew his axe and yelled for his guards. \"You will not take my son from me.\"\n\n \"Then I will take another. At least you have other sons.\""
 westmoors.42.a:0 "Pay him the money, and send some soldiers to make sure this doesn't happen again!"
 westmoors.42.b:0 "It is the old way. The true way."
 westmoors.43.t:0 "Border Skirmish"
 westmoors.43.d:0 "\"Again?\" The Lord shook his head, glaring at his son, who nursed a broken nose with a cold cloth, \"How does this happen every time I let you out of my sight?\"\n\n \"In my defence, father, those pricks started it-\"\n\n \"What? Each of the five clans you've scrapped with, and every time you've sent them home with broken bones? Are you trying to start a war?\"\n\n \"Father, those lands have belonged to us for centuries-\"\n\n \"And I'd rather lose the lands, than a son, my boy.\""
 westmoors.43.a:0 "Eh, they'll stop eventually."
 westmoors.43.b:0 "Side with one of them, and remove the hands of the other."
 westmoors.44.t:0 "Clan-Crossed Lovers"
 westmoors.44.d:0 "\"Are you sure they…?\" Asked the lord.\n\n \"Aye.\" Nodded the guard. \"We interrogated the priest and he said he had married them, on the hillock by the river.\" \n\n \"Gods be good, and he didn't think it strange the girl had no father or brothers at the wedding? And neither did the boy?\" The Lord knew his daughter could get into trouble, and that they had never been as close as when she was little, but this? This was absurd, and he knew this would take years for it to stop being a stain on his clan's name.\n\n \"The priest said his job was to marry couples, not judge their history.\"\n\n The Lord's face was red. \"Did he at least tell us where they ran off to?\"\n\n \"Aye, sir.\" The soldier's hands trembled as he hesitated to continue, until the Lord's glare was so great he could no longer bear it. \"They went to Brontay Point, to beg the [Root.Owner.Monarch.GetTitle] for sanctuary.\""
 westmoors.44.a:0 "Absolutely not. Dissolve this marriage at once and send both of them home."
 westmoors.44.b:0 "Last time I checked, it's the gods that decide a true marriage, not some lord who cannot control his children."
 westmoors.45.t:0 "Tax Collectors Attacked"
 westmoors.45.d:0 "\"Milord, if you could just-\"\n\n \"A TRUE son of the moors NEVER pays his taxes!\" The man said, holding aloft a large rock from atop his battlements.\n\n \"But milord-\"\n\n \"SILENCE!\" The man yelled and chucked his rock, and it flew and hit the first tax collector square in the head, killing him immediately.\n\n\"GODS BE GOOD!\" Screamed the second tax collector, now covered in red, \"Ok, ok, I'll leave!\"\n\n \"WHAT?\" The man said, already chucking a second, larger boulder."
 westmoors.45.a:0 "Flee, you fools!"
 westmoors.45.b:0 "Tax him for everything he's got, and break his knees."

