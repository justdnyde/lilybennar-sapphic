 #Disaster Events

 tsukqiao.1000.t: "The Throne Collapses!"
 tsukqiao.1000.d: "How many centuries did we waste bowing and scraping to this degenerate princeling we called our [Root.Monarch.GetTitle] when [Root.Monarch.GetSheHe] was nothing more than a fraud? Just like all of [Root.Monarch.GetHerHis] gods-be-damned ancestors, [Root.Monarch.GetName] was nothing more than a worthless liar with our blood on [Root.Monarch.GetHerHis] hands. There can be no doubt that this usurper is illegitimate and unsuited to rule our glorious realm; accordingly, we shall do away with [Root.Monarch.GetHerHim] and take over the reins of power ourselves!\n\nThis we, the people of our great nation, declare. May all the world tremble at our resolve now and forevermore!"
 tsukqiao.1000.a: "What can we do, then, but fall to ruin?"

 tsukqiao.1001.t: "Hidden event error!"
 tsukqiao.1001.d: "This event is hidden. If you can see it and you haven't just loaded a save, there's a problem." #Hidden Event
 tsukqiao.1001.a: "Please make a bug report on the Discord server. Thank you very much!"

 tsukqiao.1002.t: "To Rule Anew"
 tsukqiao.1002.da: "Some ... doubts were entertained about our legitimacy, especially once our former [Root.Monarch.GetTitle] abdicated the throne amidst the chaos. There were those that dared to question our rule, and engaged in abominable, unpardonable offenses against the empire and its sovereign. They led our people astray and committed atrocities across the land, to the point where even we had to entertain doubts that this realm would survive.\n\nYet in the end, after taking things into our own hands, we have overcome this crisis as we have . The people have been assured and convinced, if you will, of the veracity of our claim to rule. Long live the [Root.Monarch.GetTitle], the sole guarantor of peace and order, the preserver of the realm. Against all odds, we remain."
 tsukqiao.1002.db: "The Empire has been broken, collapsing under the weight of its own follies. The lies that allowed the [Root.Monarch.GetTitle] to engage in whatever degeneracy and oppression [Root.Monarch.GetSheHe] pleased have been shattered. Alas, the cost has been terrible, as the people of what is left of this empire are desperate and confused, crying out for stability.\n\nThe accursed, worthless Xion dynasty betrayed the realm and therefore has been overthrown, but things may yet spiral out of control. To prevent further chaos, we must purge the entire Xion dynasty and whomever amongst their loyalists do not immediately recant their allegiances. If we manage to do this, despite everything, one thing will be quite clear: \n\nAgainst all odds, we remain."
 tsukqiao.1002.a: "Whatever comes, we endure."


