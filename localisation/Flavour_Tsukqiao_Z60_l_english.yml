 tsukqiao_arena_fight_1_2.tt: "£yes£§G(Agility: 103/80)§! We quickly move behind the enemy and hit him in the back of the neck\n\n§Y[Root.GetRulerTitleAndNameOrRegencyCap]§! gains §G+7§! §YAgility Points§!\n\n§YChallenge 'Like the Wind' Progression: £yes£ §G15§!/§G15§! Enemies Defeated with One Single Hit§!\n§GReward: Unlock '§OGrace of the Winds§!' move, allowing you to perform glorykills on unsuspecting enemies§!"
 tsukqiao_arena_fight_1_3.tt: "£yes£§G(Has Perk: Trained by the Old Masters)§! §RYour enemy never saw it coming§!\n\n§YThe Audience Will Remember this§!"
 tsukqiao_arena_fight_2_1.tt: "£yes£§G(Perception: 89/70)§! We bait in an attack and all 4 fall for it\n\n§Y[Root.GetRulerTitleAndNameOrRegencyCap]§! gains §G+5§! §YPerception Points§!\n\n§GThanks to the Perk 'Divine Eye' we gain an extra §G+5§! §YPerception Points§!§!"
 tsukqiao_arena_fight_2_2.tt: "£yes£§G(Agility: 110/105)§! We move in and out of the fight, picking them off one by one\n\n§Y[Root.GetRulerTitleAndNameOrRegencyCap]§! gains §G+7§! §YAgility Points§!"
 tsukqiao_arena_fight_2_3.tt: "£yes£§G(Has Perk: Eyes of the Beyonder)§! §RThey crawl away in pure fear§!\n\n§YEnemy combatants have a 1/4 chance to gain the modifier 'Unfortunate Accident' for 10 minutes§!"
 tsukqiao_arena_fight_3_1.tt: "£yes£§G(Strenght: 92/90)§! We overpower the beast\n\n§Y[Root.GetRulerTitleAndNameOrRegencyCap]§! gains §G+10§! §YStrength Points§!\n\n§YChallenge 'Break the Weak' Progression: £no£ §R108§!/§G120§! Enemies Defeated with Hand-to-Hand Combat§!"
 tsukqiao_arena_fight_3_2.tt: "£yes£§G(Endurance: 70/60)§! We move around the beast until it gets tired \n\n§Y[Root.GetRulerTitleAndNameOrRegencyCap]§! gains §G+3§! Endurance Points§!"
 tsukqiao_arena_fight_3_3.tt: "£yes£§G(Has Perk: God of the Beasts)§! §RWe take of our robes and turn them into a playball for the tiger§!\n\n§YCuteness: +50 XP Points§!"



 ###Others###
 #Reforms
 mandate_of_tiaochi_reform: "Mandate of Tiaochi"
 mandate_of_tiaochi_reform_desc: "The Mandate of Tiaochi outlines a highly decentralised system of governance. Since the Xion dynasty struggles to rule its own land due to the lack of sufficient manpower, they depend on the eunuch administrators to help govern the land.\n\nDue to the decentralised nature of the realm, the court of Tsukqiao moves across its holdings in order to collect the tribute it is owed."
 DISORGANISED_PROVINCE: "Disorganised Province"

 tsukqiao_throne_of_lies_reform: "The Throne of Lies"
 tsukqiao_throne_of_lies_reform_desc: "If we are to truly create a realm mighty enough to outlast our enemies we must make sure our dynasty is as inviolate and enduring as the empire itself."

 mechanic_can_have_broken_lies_disaster_yes: "Enables the disaster '§YThe Broken Lies§!'."
 mechanic_tsuqkiao_of_might_and_right_yes: "Enables the '§YOf Might and Right§!' Government Mechanic."

 tsukqiao_the_humble_domain_reform: "The Humbled Domain"
 tsukqiao_the_humble_domain_reform_desc: "The empire has been humbled, the Xion dynasty has been put down and we can no longer entertain their lies.\n\nThe state has been humiliated, and will likely never be able to recover from this monumental deceit.\n\nWe now seek to keep what we have, as we have been thoroughly humbled by our people."

 mechanic_free_inwards_perfection_yes: "No Stability Cost when §YDeclaring Wars§! from §YInwards Perfection§! estate privilege."

 #Privileges
 estate_eunuchs_anb_tiaochi_compact: "The Tiaochi Compact"
 estate_eunuchs_anb_tiaochi_compact_desc: "Due to their limited ability to effectively rule their own land, the members of the Xion dynasty have invited and made use of the eunuch class of Yanshen to help rule where they cannot. These eunuchs are collectively known under the title of ’The Tiaochi Compact’ named after the settlement from where they rule.\n\nThis has allowed them a great deal of influence over the government, and in exchange they diligently administer the land."
 estate_burghers_league_of_xiongxiap: "The League of Xiongxiap"
 estate_burghers_league_of_xiongxiap_desc: "The Princely League of Xiongxiap was born from the downfall of Lanqiu so many years ago and since then they have been an influential mercantile institution that has helped the Beikling people remain relevant even while they languished under the rule of foreign tyrants.\n\nNow they have been unified with our nascent realm, they have been granted a privileged position amongst our traders in exchange for their support of our rule."
 estate_nobles_doctrines_of_war_privilege: "Doctrines of War"
 estate_nobles_doctrines_of_war_privilege_desc: "Our nobility are loyal followers of the mask of might, for they have learned of the true heights of power one might reach."
 estate_eunuchs_anb_royal_recordkeepers: "Royal Recordkeepers"
 estate_eunuchs_anb_royal_recordkeepers_desc: "If we are to truly found an empire that shall never fall we must make sure that the achievements of our dynasty are known far and wide."
 estate_eunuchs_anb_mountain_architecture: "Mountain Architecture"
 estate_eunuchs_anb_mountain_architecture_desc: "The Beikling homeland is characterised by its mountainous terrain. Most would not even consider establishing the seat of their power in a place like this, yet we, like our ancestors before us, do so without hesitation."


