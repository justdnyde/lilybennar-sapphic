l_english:
 #Missions
 Z60_if_only_title: "For a Better World"
 Z60_if_only_desc: "Amongst the hills of Yanshen, hidden beyond the black mist and atop of a series of paths lies the ancient city of Tiaochi. She has been called many names for many are her years and even more numerous are the tales about her. The ‘Loving Mother’ is one of the most popular, evoking the image of an old lady taking care of her beloved children - the Beiklings. It is an image that many girls have sought to emulate during their life.\nYet this city has another popular nickname, The Old Warden - a wise elder protecting the young from the wretchedness of the world. Many are the mothers that make Tiaochi their home, many more turn Tiaochi into their role model, yet only one seeks to truly embody the Old Warden.\n\nFuyuan Jiao, wife of Youji Xion, is a woman like few others. In drastic contrast to her mediocre husband she has a strong will, a commanding presence and the ambition to see the Beiklings free once more.\n\nAnd yet…“"
 
 Z60_repay_the_oni_title: "’Repay’ the Oni"
 Z60_repay_the_oni_desc: "In our time of need, the Oni answered.\n\nThey have ever so graciously provided us with the resources needed to bring about our freedom, a debt we are thankful for and with the Eternal Council in ashes we can now seek to repay their favor.\n\nAfter all, it would not be fair for their deeds to go without a fair recompense for too long."

 Z60_assist_the_council_title: "Assist the Council"
 Z60_assist_the_council_desc: "In our time of need, the Oni arrived.\n\nWhen the empire was at its weakest our former allies saw an opportunity to break us further, thus they conquered our western lands and forced our brothers of Chinhu to submit to their demonic rule.\nSince then they have stripped our city of Chinhu of her name, her beauty and wealth, and in its place erected the shirgrii of Kabiurgarko, a mockery of her former shine.\nBut our brothers have not given up.\nDiscontent rises amongst the western Beiklings and they now seek independence from the Tagharoghi. This is a great opportunity to reunite our people, bringing us closer to our ultimate goal of restoring the empire.\nFinally we shall take our revenge against these traitors, the first of many.\n\nFor every action, a matching reaction."

 Z60_of_wealth_title: "Of Wealth"
 Z60_of_wealth_desc: "The Golden Gates are open and they await our arrival. We have made contact with the local Beikling rulers of the far west who are known by the name of the Order of the Hungering Ones. Prideful devotees of the old empire they are, guarding over the Radiant Sister of the West. They have enriched themselves in service to the Mask of Wealth, hidden amongst the temples of Chinhu. There the mask lies waiting, and now they have promised it to us if we prove to be successful in our liberation of their people."

 Z60_the_demons_title: "The Demons"
 Z60_the_demons_desc: "The Tagharoghi, the theocratic governing council of Azjakuma, is a truly ancient institution of the Oni ogres.\nOnce they were our allies, in an era long gone they gifted our ruler with the Mask of Many Faces, which has by now become our cherished symbol of ultimate power and righteous rule. Though our original alliance is long gone, ended by their own hands, they still see the use in our people, wishing to use us against the rising Eternal Council that threatens their southern flank. Therefore, they might be convinced to lend us a helping hand if we can convince them of our worth and negotiate a favourable deal."

 Z60_repay_the_league_title: "Repay the League"
 Z60_repay_the_league_desc: "In times of need we sought help from the League of Xiongxiap to defeat our overlords, but now we have to deal with the consequences of that pact. Cunning as they are, they now try for much more reparations than what we had first negotiated. Though we could reject this change in the agreement and pursue a more hostile unification, it might prove more beneficial in the long term to indulge their desires for the time being.\n\nLet us show them that we are a worthy overlord and that their mercantile interests are best served under our protection."

 Z60_of_control_title: "Of Control"
 Z60_of_control_desc: "Many years ago, long after the arrival of Harimar and the fall of his empire, these hills were home to a Beikling kingdom. A putrid domain like no other, their rulers are now only known as the Rats of the Hill, for they were utter tyrants whose outrages few outside conquerors have even come close to matching. They held onto power thanks to owning two of the Great Masks of our people.\nOne was the Mask of Might, now firmly held within our grasp, for it allowed us, like them before, to rise to power in the first place. The other mask was lost for more than a hundred years. The Mask of Control was eventually rediscovered by the members of the League of Xiongxiap, a trade accord formed by the former elites of the late kingdom and born from its demise. With its power they held onto their control over the western hills and challenged the Eternal Council’s rule over them.\n\nIf we are to truly restore our realm we must unite with the League and claim the Mask of Control for ourselves."

 Z60_ascendant_might_title: "Ascendant Might"
 Z60_ascendant_might_desc: "Might, the power to rule.\n\nOn the streets of the many cities that are now part of our realm there is a palpable sense of optimism not felt for many generations. We Beiklings have always longed for the return to the glories of our imperial era, yet not once have we ever been so close to realising this dream.\n\nThe Mask of Might shall ascend to rule over a newly reborn Luzhong and bring a new golden age for the Beikling people."

 Z60_his_sorrow_title: "His Sorrow"
 Z60_his_sorrow_desc: "Youji lied, and Youji continued to lie. For that is all he felt he could do under these circumstances.\nHe lied to his advisors about the state of his wife, he lied to his daughter about the health of her mother, he lied to himself that he believed things would change for the better.\n\nTsukqiao was a realm barely held together, and not by him, but by Fuyuan, for he did not have the charisma to deal with the raider clans who made Tsukqiao their home, he did not have the cunning to keep his advisors from eroding more and more of his control - he simply did not have what it took to be a ruler, but she did.\nBut now she is gone, and all that remains is Youji's memories of her, and amongst the echoes of his mind one voice, her voice, still called to him, strengthening his resolve.\n\nNo matter the cost, no matter the time required, no matter his obvious lack of skill, he would achieve his wife's grand dream.\nWith the winds as his witnesses he will bring freedom to the Beiklings."

 Z60_the_brothers_title: "The Brothers"
 Z60_the_brothers_desc: "To our west, hidden amongst the ravines between Emgolù and Yinsheng one group of Beiklings has turned a tidy profit from the demise of the hills. The League of Xiongxiap, an accord of traders and noble houses hailing from an era long gone, have managed to secure themselves a place inside the Eternal Council as local governors of their rugged homeland.\nThough, knowing their kind, their loyalty has most assuredly a prize tag…"

 Z60_her_dream_title: "Her Dream"
 Z60_her_dream_desc: "Almost fifteen hundred years ago our great empire fell, leaving nothing but ash and dust behind, and our people were subjected to a dark age that left us scarred. Our great cities that once rivaled the ones along the Yanhe were burned to the ground. We never recovered our imperial glory.\n\nAlmost four hundred years ago the last free Beikling kingdom fell to disarray. Weak illegitimate rulers abused our people’s faith for their gain, and their delusions came crashing down in flames. We never recovered our proud independence.\nFrom this collapse Tsukqiao was born, a child of ruin, our dynasty held onto power in Tiaochi only by eventually bowing to the Eternal Council to survive.\n\nBut now, times are changing. Survival is no longer enough, as once more we have found the will to fight for our freedom - and this time we shall not fall, not again."

 Z60_the_traitorous_kin_title: "The Traitorous Kin"
 Z60_the_traitorous_kin_desc: "The Beiklings of Jianlin fight in the name of their ‘Mask of Righteousness’, bastardizing the hallowed name of the Mask of Right, as they have historically been the ones to stop our raiders from making off with the riches of the Yanszin League, which meant that our impoverished hill communities struggled to survive. They style themselves enlightened, they see themselves as better than their own brothers, filled with an unearned sense of pride for having escaped the decline of our homeland.\nWe speak their name with revulsion, and sharpen our swords in preparation for their comeuppance.\n\nOne way or another, Jianlin shall fall."

 Z60_of_right_title: "Of Right"
 Z60_of_right_desc: "Long ago there was a war.\n\nHundreds of Beiklings fought under the banner of Lanqiu, the last free Beikling realm.\nRumours of the Mask of Right being hidden somewhere within the land of Balris the Golden led the putrid realm of the Ouyangs, emboldened by the apparent disappearance of the dragon, to wage war against the kobolds.\n\nYet in the end, while a Beikling discovered the mask, it was not one of Lanqiu's loyal retainers.\n\nHe and his fellow compatriots fought their own kin to keep the kobolds safe, and it was their treason that ultimately brought ruin to the Ouyang kingdom.\nIn the end they won, and the traitor marched back home to the cities of the Yanszin, carrying the mask with him and proclaiming in his arrogance that one day his disciples shall march upon the hills to ‘free’ our people.\nHowever, this vow was in vain, for now we shall be the ones to free them from their delusions."

 Z60_the_matriarch_title: "The Matriarch"
 Z60_the_matriarch_desc: "On the outskirts of Tiaochi, up on the steep cliffs of a hill, one can find the roost of the Nuraryi Harpies.\nThey arrived in our lands wishing to learn the secret teachings of the dark arts, following the path their queen Kiova once did.\n\nOur relation with them has been a complicated one. While at first we sought to maintain good relations with their matriarch, a series of controversies involving members of the Xion family led to a rift in diplomatic relations that was only mended thanks to Fuyuan's intervention.\n\nThough now she is gone, we might still be able to use the good will she built up with their current matriarch to get them to join us in battle."

 Z60_the_aftermath_title: "The Aftermath"
 Z60_the_aftermath_desc: "With our victory over our former overlords of Jinqiu secured and our independence once again regained we must now make sure the forces of the Eternal Council are fully eradicated from our land.\n\nTough Jincheng was their official capital, the truth of the matter is that the real heart of their power was the Jade Citadel of Heiyukcheng. But we shall not make the mistake of letting them recover their strength in the shadows, no! We must root them out and burn all traces of their existence."

 Z60_reorganize_the_estates_title: "Reorganize the Estates"
 Z60_reorganize_the_estates_desc: "Tsukqiao did not inherit much from Lanqiu's demise, as most of our current noble class emerged later as prominent raiders or traders and from what little of the realm’s clergy remained in Tiaochi.\nThis meant that over the years our realm has been organized differently than many others, with most of the power concentrated on the Xion dynasty and its members. Though in theory this means our dynasty can exert a large amount of power over our subjects, in practice it has resulted in much of the state’s organization resting upon their shoulders. This was already problematic when our holds were limited to the city of Tiaochi and its surroundings but now it has proven to be too much of our realm to handle. We must reform the government, and end the estates' current state of disorganization, changing them into something better suited for our realm."

 Z60_reform_the_eunuchs_title: "Reform the Eunuchs"
 Z60_reform_the_eunuchs_desc: "A central part of Tsukqiao's protection contract with Jinqiu was the demand for a great tribute, the so-called ‘Jade Tax’. Yet seeing our struggle to administrate our land and gather the assets to pay the Jade Tax they provided us with a group of loyal eunuchs. Collectively called the ‘Tiaochi Compact’, they have since then helped us collect our taxes and rule our land. With our emergence as the new rulers of the Yan hills it would be wise to expand the role of the eunuchs. Some ambitious members of the compact have suggested the idea of helping to teach our rulers, and thus ensuring that the upcoming leaders of the hills will have all that it takes to be worthy kings."

 Z60_appease_the_chimera_title: "Appease the Chimera"
 Z60_appease_the_chimera_desc: "[Root.get_chimera_desc_1]"

 get_chimera_desc_shammanhome_1: "Many are the powers that have risen and fallen since the times we ruled supreme, staking their claim on the pages of history, but few have proven themselves as mighty and terrible as the confederation of Shamanhome.\n\nThough we may one day seek to reclaim our title as the Terror of Haless the unvarnished truth is that we simply cannot risk to pursue conflict with the Chimera at this point, but maybe we can seek to appease them.\n\nThey have proven themselves as the rising magical power of Haless, their power fueled by Korashi, a rare resource extracted from the Oni lands.\nIf we are to promise them a secure supply of Korashi once we conquer the Oni mines they may allow a measure of peaceful coexistence between our realms, at least for now."

 get_chimera_desc_command_1: "Many are the powers that have risen and fallen since the times we ruled supreme, staking their claim on the pages of history, but few have proven themselves as mighty and terrible as the monstrous hobgoblins of the Command.\n\nThough we may one day seek to reclaim our title as the Terror of Haless the unvarnished truth is that we simply cannot risk to pursue conflict with the Chimera at this point, but maybe we can seek to appease them.\n\nThey have proven themselves as enemies of all mages of Haless, their war fueled by Korashi, a rare resource extracted from the Oni lands.\nIf we are to promise them a secure supply of Korashi once we conquer the Oni mines they may allow a measure of peaceful coexistence between our realms, at least for now."

 get_chimera_desc_hobgobbos_1: "Many are the powers that have risen and fallen since the times we ruled supreme, staking their claim on the pages of history, but few have proven themselves as mighty and terrible as the monstrous hobgoblins.\n\nThough we may one day seek to reclaim our title as the Terror of Haless the unvarnished truth is that we simply cannot risk to pursue conflict with them at this point, but maybe we can seek to appease them.\n\nEven after the collapse of their confederation they still consider themselves as enemies of all mages of Haless, their war fueled by Korashi, a rare resource extracted from the Oni lands.\nIf we are to promise them a secure supply of Korashi once we conquer the Oni mines they may allow a measure of peaceful coexistence between our realms, at least for now."

 Z60_end_the_tagharoghi_title: "End the Tagharoghi"
 Z60_end_the_tagharoghi_desc: "Our western brothers are free, Chinhu is restored to Beikling rule, but yet the traitors remain.\nThe Tagharoghi's betrayal cannot truly be considered to be avenged as long as their realm of traitors still exists.\n\nWith our western homeland secured for now, we are free to finish them off."

 Z60_behead_the_chimera_title: "Behead the Chimera"
 Z60_behead_the_chimera_desc: "[Root.get_chimera_desc_2]"

 get_chimera_desc_shammanhome_2: "With the Oni out of our way we can now look further west.\n\nThe mages of Shamanhome are a foe to be reckoned with, for in their brutal ways they show no compassion to the enemies of their kin.\n\nWe cannot deny we see ourselves reflected on them.\n\nBut still, Haless shall be ours to rule. We must show them what true might looks like."

 get_chimera_desc_command_2: "With the Oni out of our way we can now look further west.\n\nThe Command’s war of conquest has been brutal, their tactics have made them infamous amongst the inhabitants of Haless and the stories of the fate of all who oppose them echo across the land.\n\nWe cannot deny we see ourselves reflected on them.\n\nBut still, Haless shall be ours to rule. We must show them what true might looks like."

 get_chimera_desc_hobgobbos_2: "With the Oni out of our way we can now look further west.\n\nThe Hobgoblin’s war of conquest has been brutal, and even with the downfall of their great alliance they have still managed to become a threat to the Raheni once more.\n\nWe cannot deny we see ourselves reflected on them.\n\nBut still, Haless shall be ours to rule. We must show them what true might looks like."

 Z60_true_terror_of_haless_title: "True Terror of Haless"
 Z60_true_terror_of_haless_desc: "The fire, the screams of agony, the blood of our enemies coating the grass - this brutality is our strength.\n\nThey believed themselves the greatest, they believed themselves the strongest, they believed themselves the Terror of Haless. Yet they failed to understand what it takes to truly embody terror and spread it across the lands.\n\nIn the ashes of Sarilavhan we may teach them."

 Z60_end_the_elephants_title: "End the Elephants"
 Z60_end_the_elephants_desc: "Haless is the land of one thousand warriors, each with their own unique ways to inflict suffering upon their enemies. There are those who train in the art of the sword, those who master the spear, those who become one with their horses. And yet, even amongst them the elephant lords of the Ghavaanaj stand out for their domination of these imposing beasts.\nIf one were to rule those who rule the beasts, what would that make one?\n\nUnstoppable."

 Z60_break_the_dragon_title: "Break the Dragon"
 Z60_break_the_dragon_desc: "To our south a new challenger claims the title of king of all Yanshen.\nThe Dragon Kings of Bianfang have earned the respect of many through their show of force, managing to defeat many of their neighbors with only their own strength to rely on.\nThey are the last true warlords of Yanshen in our eyes, but like all before them their end is imminent.\n\nIn the ashes of Bianfang we shall proclaim ourselves the new challengers to the Throne of the Yan."

 Z60_push_eastwards_title: "Push Eastwards"
 Z60_push_eastwards_desc: "With Bianfang in ashes and our southern holdings reclaimed we can now look to the southeast. Once mighty and proud, Zyujyut, the realm of the Naamjyut, is nothing but a shadow of its former self that the old empire once knew. Their demise is inevitable, their jungle-born rot will be burned out and from their ashes we will build anew. We Beiklings might not be known for our naval prowess but the wood pillaged from their royal palace may serve us well in the expansion of our new sea ports."

 Z60_empire_of_yanshen_title: "Empire of Yanshen"
 Z60_empire_of_yanshen_desc: "Proudly fly the banners of the empire, for its rebirth marks the beginning of our eternal golden age.\nIts glorious return is the long-awaited sign of prosperity everlasting for our people.\nAlmighty are the Xion for is their hand that guided us back to our former heights.\n\nForevermore, the empire rules over the lands of Yanshen, binding the river Yanhe with chains forged of pure terror.\n\nGlory to the Xion dynasty, glory to the Second Reclamation."

 Z60_oath_of_power_title: "Oath of Power"
 Z60_oath_of_power_desc: "Many are the warlords that have tried to claim Haless as their own.\nEven before we knew ourselves as Beiklings, foreign rulers desired to conquer our home.\nBut one of these realms outshone them all and became the first to truly rule by might alone.\n\nMany have been the days since the first conqueror ruled our land. With every tyrant a new fire was kindled inside of our people, as the desire for peace made way for the desire for vengeance.\n\nEver since we have not rested, even at our darkest hour we kept fighting to survive.\nAnd now, we thrive.\nWith our ascension to power once more, the techniques that kept us alive until now can be reforged to dominate our enemies, our brutal ways exported to their lands as part of our armies many tactiques of warfare.\nBorn of hatred, incarnate of might. Luzhong can make only one promise to those who stand against the Terror Empire, that they will not stand for long."

 Z60_bury_the_light_title: "Bury the Light"
 Z60_bury_the_light_desc: "To the southwest of our lands a beacon of light shines bright.\nHiding away in their cloister-temples, the monks of the Xia believe themselves mightier than all, yet all it took was a warmongering race of cave monsters to have them scrambling for their lives.\nThey are blinded by their own light, they train for battles against the enemies of their motley league of schools yet the cracks amongst the fragile Xia lets their own so-called allies be the ones to see to their demise.\n\nTheir vaunted enlightenment is pathetic, a sad excuse for the true shine of power. This land they deem so sacred shall be where they will be buried, and to the tomb they will take their dim enlightenment."

 Z60_at_harimars_doorsteps_title: "At Harimar’s Doorsteps"
 Z60_at_harimars_doorsteps_desc: "We are here.\nWe are finally here.\n\nOne and a half millennium ago a beast known now as the first ruler of Haless raised his savage horde to wage war against the land.\nIt was this campaign that saw the end of the first Luzhong Empire and the start of a dark age that would last a thousand years for our people.\nEvery hardship, every tragedy, every day of hunger and fear suffered by our people has been his fault.\n\nAnd now, we are here, at the very threshold of his house.\nVengence is near."

 Z60_along_the_kharunyana_title: "Along the Kharunyana"
 Z60_along_the_kharunyana_desc: "The Kharunyana is the lifeblood of eastern Rahen along which many of the greatest cities of Haless are strung like pearls on a necklace. It is a potent symbol of life.\nYet, it is inhabited by rotten weak realms.\nHome of the porcelain republics, pathetic city-states of a by-gone era.\nHome of the Dhujati lords, remnants of a once proud kingdom now in ashes, fighting for its pitiful remains.\nAll ripe for conquest, for their rightful overlords.\n\nLike the Red King once did, we shall paint the Kharunyana red with the blood of the weak."

 Z60_sweet_revenge_title: "Sweet Revenge"
 Z60_sweet_revenge_desc: "We are close.\nWe are so close.\n\nOn the horizon we can start to see the hazy outline of the city of the withering lotus, another vain relic of the tyrant Harimar.\n[Root.Monarch.GetName] marches forward with pride. He guides his loyal troops forward, forward to meet the enemy, forward to enact their revenge.\n\nThe end is nigh, after one thousand five hundred long years we shall finally take what we are owed - vengeance!\nOnwards to Dhenijansar!"

 Z60_were_they_failed_title: "Where They Failed"
 Z60_were_they_failed_desc: "Long ago, the Beiklings marched to war.\nIn the times before Jaher, a realm born from our kin ruled the hills with a brutal fist, they hungered for power and to have their name last forever.\nThey shall not be named, but they shall not be forgotten, either.\nThey marched east, bringing our fury to the children of the dragon Balris, to reclaim one of our most prized ancient heirlooms.\nThey failed, for they were not worthy of leading our people.\n\nMany years have passed since then, their name is long gone and forgotten, but their mission remains unfulfilled.\nWe now march to war once more, and this time we will not fail."

 Z60_the_old_borders_title: "The ‘Old’ Borders"
 Z60_the_old_borders_desc: "Only recently reestablished, our recordkeepers have already come to find a great deal of lost writings from the imperial era. Amongst the great works of art, memorandums, letters of tribute and so on they have found an ancient land record.\nThis heretofore unknown document clearly shows us something long forgotten until now: the empire used to rule over lands as far east as Shengdao. These findings have given us an unprecedented claim over much of the coastline of Yanshen.\n\nAnd well, if we are already so close to Tianlou - why not march all the way to the sea?"

 Z60_the_northern_frontier_title: "The Northern Frontier"
 Z60_the_northern_frontier_desc: "Beyond the Mist Hills lie the rich steppes of the Shuvüüshudi frontier.\nOnce the empire saw fit to rule these vast untamed lands, creating colonial outposts in pursuit of new farmlands to exploit for food production. Greatest amongst those outposts was the Northern Bastion whose legend is still talked about today.\nIf we are to surpass the Luzhong of old we must make sure to succeed where they failed and finally dominate the northern frontier, once and for all."

 Z60_our_first_rival_title: "Our First Rival"
 Z60_our_first_rival_desc: "Before the days of the Red King and his heirs the kingdom of Luzhong was only one amongst many realms of Yanshen, but with his ascension it rose to prominence and was considered one of the major powers of the new age.\nThat was until the arrival of the breaker of empires.\nThe so-called Sage King's campaign across Yanshen brought utter ruin to the old kingdom, the royal dynasty and court were forced to move west to their last stronghold in the hills of what is now Kabiurgarko.\nThough forming only a small part of the greater Beikling history, the Sage King’s conquest marked a definite before and after in our history, and now that we have returned to our rightful place of preeminence, it is only just that we seek to repay the oldest wrong done to us."

 Z60_break_into_bomdan_title: "Break into Bomdan"
 Z60_break_into_bomdan_desc: "An empire in ruins, a people divided, a homeland threatened, a legacy yearning to be restored - we see much of our own people reflected in the Bomdan, for they, too, were thrown in disarray by Harimar's conquest. But unlike us they have never been able to get rid of his pestilential heirs, no, they have even gone as far as to embrace some of them as rulers.\nPathetic.\nTheir lands shall become ours in due time, but first we shall consolidate the prosperous lands to their east. The great arena of Lot Dekhang and the rich cities of the Sikai are a prize worth conquering before we can claim the crown jewel of the Bom, the great Necropolis, for ourselves.\nBesides, the [Root.Monarch.GetTitle] seems keen on visiting the famed arena…"

 Z60_tomb_of_the_ancient_title: "Tomb of the Ancients"
 Z60_tomb_of_the_ancient_desc: "We continue our incursion into Bomdan, our banners marching ever closer to the great Necropolis of Bim Lau. It is a truly imposing building complex, and our scouts have reported that their masks begin to glow whenever they get close to this place of legend. Even from afar it is clear to all that the imposing structure is nothing to be simply tampered with. This great Jewel of Vimdatrong shall be claimed for our great dynasty.\n\nThe imperial recordkeepers have already requested a place to occupy nearby so they can study the tomb and research how to best make use of its spiritual properties."

 Z60_a_domain_forged_in_fire_title: "A Domain Forged In Fire"
 Z60_a_domain_forged_in_fire_desc: "ALL HAIL THE XION DYNASTY, FOR UNDER THEIR WATCH WE ARE ONE MIGHTY PEOPLE ONCE MORE.\n\nEmpire of Empires, Realm Eternal, Precursor of Civilizations. Luzhongs legacy is much greater than we could have ever imagined when we marched down from our hills not so long ago.\nThanks to the recordkeepers we are now ever closer to learning the true story of our ancient empire.\nThanks to our valiant people we are ever closer to achieving its restoration.\nThanks to the Xion dynasty, all of this has been made possible.\n\nALL HAIL TO THE RULERS OF THE EMPIRE REBORN IN FLAMES."

 Z60_expand_the_compact_title: "Expand the Compact"
 Z60_expand_the_compact_desc: "The Compact of Tiaochi has been a key part of Tsukqiaos survival and current success, their help administrating and reforming the realm has helped the dynasty focus on the expansion and consolidation of their domain.\nThat said, many aspects regarding the internal organization of the compact will simply no longer do for our now reestablished state. The most promising proposal is to begin a process of restructuring the eunuch class in Tsukqiao, beginning with the dedication of the city of Tiaochi as a center of learning for the next generation of eunuchs that are wholly Beikling."

 Z60_story_retold_title: "Story Retold"
 Z60_story_retold_desc: "It is hard for our dynasty to claim ourselves worthy successors to the Fei dynasty of old if our history is based entirely on oral tradition. Though steeped in history, the Xion Dynasty is yet to truly make a name for themselves, other than being the rulers of Tiaochi and wardens of the Mask of Might.\nIf we are to truly grace the royal family with the glory they richly deserve, we must make sure our tale is known far and wide, and we need to claim as much responsibility as possible for the increased fortune of our people since our recent rise.\nTo this effect and as part of the effort to reorganize the eunuch class we have been approached by a group of scholars proposing the establishment of a new institution within the realm, an order of recordkeepers capable of studying the history of our dynasties and their achievements, all to ensure that their deeds are known far and wide."

 Z60_the_ancient_pact_title: "The Ancient Pact"
 Z60_the_ancient_pact_desc: "Ever since the Red King marched down the hills and reclaimed his royal birthright our fate has forever been entwined with the dark arts of the Oni. The greatest symbol of this connection is the Mask of Many Faces, which both ruled over and advised the Terror Kings. Each mask is said to represent one of the four virtues of the Beikling people: Might, the power to rule; Wealth, the sign of prosperity; Control, of oneself and others; and Right, to sit on the throne and wear the mask.\nMost Beiklings have dedicated themselves to embody one of these virtues. And us Beiklings of Tiaochi have fittingly perfected the Mask of Might.\n\nWith our ascension to power it is time we sign the eternal pact to the Mask of Might."

 Z60_welcome_the_lost_title: "Welcome the Lost"
 Z60_welcome_the_lost_desc: "We are quite familiar with the Kuuldaar people that inhabit the green steppe across the mountains, and both our peoples have remained on good terms and engaged in trade for many hundred years by now. We always knew that to some extent they had inherited cultural traditions from us but not until our recent conquest of their lands have we fully realized the true extent of our shared heritage.\nThe Kuuldaar are our distant brothers, heirs to the Beiklings who stayed behind when the empire abandoned its northern lands."

 Z60_the_jungle_throne_title: "The Jungle Throne"
 Z60_the_jungle_throne_desc: "We heard stories of a far away forest where tribes are ruled by a king of kings, the highest ruler of the jungle going by the title of the Sri Baginda.\nOf course, as is the case for most august titles found across Haless their origins can be traced back to Luzhong.\nThe recordkeepers have found ancient annals describing a once prosperous colony of Luzhong in the forest of Lupulan that split from the empire in its final days and declared themselves the rulers of the south.\nIt is time to put an end to such foolishness and reclaim the title that is rightfully ours."

 Z60_ashes_of_history_title: "Ashes of History"
 Z60_ashes_of_history_desc: "Once the hills were crowned by four great cities, four sisters that represented the grandness of our people.\nTo the east Tiaochi the Old, first city of the Beiklings, now the center of our reborn kingdom. To the west Chinhu the Shiny, city of greed and the dark arts, now taken over by the backstabbing Oni. In the middle lies Yinsheng, maiden of the arts and home of the Masterforge, its fires now mere embers.\nYet atop all of them, sitting highest amongst the hills was Emgolù. Founded by the Red King as the crowning pride of the old empire, it became the seat of power for the Terror Kings of that long bygone era. Now nothing remains but ruins and stories.\nYet not all is lost to the mists of history, the city awaits its restoration to greatness, yearning to be the capital of the empire once more."

 Z60_deal_with_the_league_title: "Deal with the League"
 Z60_deal_with_the_league_desc: "The League of Xiongxiap was of great help during the early days of our restoration, as thanks to them we were able to break through the western front of Jinqiu. And after the subjugation of our former overlords they played a pivotal role in the reorganization of the newly conquered lands.\nThat said, the current arrangement with them no longer serves our interests.\nThe great trade privileges that were granted to them as a reward are now proving to be a hindrance for our own traders, and this simply cannot stand. We must find a novel accord with them that may benefit us more in the long run."

 Z60_repay_the_matriarch_title: "Repay the Matriarch"
 Z60_repay_the_matriarch_desc: "During our war for independence we saw fit to strike a deal with the Nuraryi harpies, and their help proved indispensable during the fall of our former overlords.\nMuch time has passed since then, but our debt to them is not forgotten. They have recently approached our court for they now wish to build a permanent home for themselves amongst the hills and mountains of our home.\n\nThe request was initially met with hesitation, for many of our people simply did not want to allow a new group to permanently settle in our homeland, especially now that we have finally been able to reunite all Beiklings under one banner.\nHowever, a new deal has been put forward after some negotiations. The foundation of a new roost city rising atop the hills north of Tiaochi. In this new hanging city the harpies would remain part of our realm while guaranteeing them a place to practice their own traditions."

 Z60_rekindeling_the_hills_title: "Rekindling the Hills"
 Z60_rekindeling_the_hills_desc: "Once, this was a land of fire.\nFlickering lights covered the hills, when they were home to the settlements of our ancestors, great cities that rivaled the urban centers found along the course of the Yanhe.\n\nFor too long we have lived in the shadow of this glorious era, eking out a meagre existence amongst the ruins of our ancestors while the lowlanders saw fit to end what little pride we still possessed.\nThis ends with us, the forges of the Beikling homeland shall be rekindled and the fires of the hills will be born anew."

 Z60_celebration_of_might_title: "Celebration of Might"
 Z60_celebration_of_might_desc: "Across the hills echoes a chant, a song praising the ways of the mightiest amongst men.\nThe people dance, they pray and they sing the names of the great ones gone long ago.\nUnited in everlasting worship of power.\nPower unmatchable, power only grasped by a very few.\nPower only gained by those most loyal to the teachings of the Mask of Might.\nTheir names shall never be forgotten, let our people know their stories.\n\nLet them know what they, too, might become in service of the empire.\n\nGlory be to the Xion dynasty, for only under their most sagacious rule can every soldier of our realm hope to awaken their most mighty self."

 Z60_brighter_than_the_sun_title: "Brighter Than the Sun"
 Z60_brighter_than_the_sun_desc: "Resplendent in a restored glory born from an era long gone, the beauty of these hills is something only our people and those who have found their place in the realm are worthy to experience.\nWe restored every ruin, relit every forge, rebuilt all that was lost.\nBut it is not enough, it is simply never enough.\n\nFor the Xion dynasty deems it so.\n\nBuild higher, brothers, let the skies fear the day we surpass the sun."

 Z60_break_the_heart_title: "Break the Heart"
 Z60_break_the_heart_desc: "The spirits now walk amongst us, lesser realms would be rent asunder but ours remains hale and mighty.\n\nThe recordkeepers speak of unprecedented activity deep in the heart of the Necropolis, and they believe we might use this unrest in the spirit world to our advantage.\nStill, this is a barrier that even our Greatest-of-All Empire has yet to cross. If we are to make use of the spirits then we first need to learn more about them.\n\nWe believe we could establish communications with a predecessor of the imperial dynasty to learn more about this ‘Rending of the Realms’ and, while we are at it, about the true nature of Luzhong and the Xion dynasty.\nThe recordkeepers advise against this course of action, but our ruler has deemed it a most excellent idea."

 Z60_reunite_the_empire_title: "Reunite the Empire"
 Z60_reunite_the_empire_desc: "Once upon a time, Luzhong stretched far and wide, and now it does so again, every corner of Haless once under the sway of the Mask of Many Faces has been returned to bow before their rightful rulers of the house Xion.... At least based on what has been uncovered by the recordkeepers so far, for who knows, maybe old Luzhong was even grander. We likely just need to find further ancient records.\nBut even if all the land of the old empire is now back in our hands, the work is not done. Our grand empire is still very much divided, its sheer size means the emperor's word requires weeks or even months to reach the far corners of the realm. To fix this untenable situation we will make use of one of our greatest inheritances built by the ancient Beiklings, the Golden Road.\nWe must now seek to restore it and expand it even further to reach every part of our realm!"

 Z60_to_move_the_earth_title: "To Move the Earth"
 Z60_to_move_the_earth_desc: "To think how much of our own history was lost to time, so much effort expended by our enemies to ensure that our people would forget the achievements of our great ancestors.\nIn the three greatest cities the world has ever seen, some of the greatest works of architecture of our people can be found, having been stolen from our Beikling ancestors long ago. The Golden Palace, the Iron Palace, and the Palace of the Divine Call… Luzhong's greatest mistake was to think that anyone other than the Beiklings deserved such marvels. Years and years have passed and these beautiful palaces have fallen into disrepair even though their illegitimate occupants lived far more opulent lives than us…\nIt is clear to all that they do not deserve these wonders born from Beikling ingenuity. We shall claim them and return them to the homeland that birthed them, even if we have to move the very earth beneath them."

 Z60_eternal_and_evermore_title: "Eternal and Evermore"
 Z60_eternal_and_evermore_desc: "ALL HAIL THE EMPIRE. For it is reborn, made anew in the image of Might incarnated.\nALL HAIL THE XION DYNASTY. For theirs is the throne of the greatest realm in this and all worlds.\nALL HAIL THE BEIKLING PEOPLE. Risen once more after their downfall, remade to rule and punish those who saw to their momentary collapse.\nETERNAL IS LUZHONG. For its banners meet no match.\nEVERMORE IS LUZHONG. For every part of Halann will one day cower beneath its iron fist.\n\nLONG LIVE THE EMPIRE, LONG LIVE GREAT LUZHONG. UNDER THE XION DYNASTY IT SHALL LAST FOR UNTOLD MILLENNIA TO COME."

 Z60_might_incarnate_title: "Might Incarnate"
 Z60_might_incarnate_desc: "What do they see when they encounter us?\n\nThey called us Yaoren, demon men.\nThey called us barbarians, brutes, their lessers.\n\nYet now they call us by no name, other than pleading for mercy.\nThis is Luzhong, this is its greatest virtue. A realm of the strongest warriors that wield true terror as their greatest weapon.\nThey have surpassed every warrior they have met, they have broken armies greater in number but lesser in strength.\nBut in the end, is it enough?\nNo! For this strength we knew once before and it did not prevent the fall of the empire. It is not enough, it is simply never enough.\nTo make sure the realm never shatters again, to make sure we are truly eternal, we must make one last crucial choice.\nIt is not enough to simply be the mightiest of them all, we must embody Might at its most primal and pure."

 Z60_remember_the_fallen_title: "Remember the Fallen"
 Z60_remember_the_fallen_desc: "We have come a long way.\nThe Xion dynasty, the true successors of the Fei and all other great dynasties of Haless, have forged what once was a petty clan of unruly raiders and poorly administered hamlets into an empire poised to outlast them all.\nThis greatness is one we worship today, but we cannot forget the sacrifices made by those that came before, the ones that made it all possible.\nHere, at the heart of Emgolù, we shall build an eternal memorial in their honor, a memorial to the couple that made history and remade a people.\nA memorial to the Father and the Mother that made Luzhong into what it is now."

 #Events
 tsukqiao.1.t: "Demise of the Dreamer"
 tsukqiao.1.d: "Fuyuan Jiao was a woman without parallel in the history of Tsukqiao.\n\nCharismatic, strong-willed, intelligent, she came across as a far stronger figure than her husband Youji, who appeared far more fragile by comparison.\n\nIn a better world, this would be her story, one in which she rose to overthrow the Jade Citadel and free the Beikling people from oppression. However, this is not that world.\n\nAn illness forced her into a deathlike slumber from which she simply would not wake. It sapped her strength day in and day out for weeks, until she died one grey evening in the royal chambers with only Youji present to bid her farewell.\n\nYouji released a shaky sigh as Fuyuan Jiao drew her last breath, holding back an urge to vomit. He had been content to slowly withdraw into the background as Fuyuan Jiao went from triumph to triumph. But now it was his turn to rule alone, a chance he never sought out but was now thrust upon him by fickle fate. Youji knew that the one act of devotion he could perform for his beloved Fuyuan was to see her dream of Beikling ascendancy achieved, no matter the cost.\n\nYouji Xion emerged from the chambers, projecting a facade of nonchalance. The officials bowed and scraped, inquiring after ‘the most exalted lady’s health’. Steeling himself, he told his first great lie."
 tsukqiao.1.a: "’The Lady is well.’’"

 tsukqiao.2.t: "A Cold Welcome at the Golden Gates"
 tsukqiao.2.d: "Our arrival at the golden gates of Kabiurgarko was met with far less celebration than expected. We expected to be welcomed as heroic liberators. However, after the first few days in which - as expected for any military occupation - people stayed inside their homes, Kabiurgarko appeared as if nothing had changed, just with Xion banners flying in place of the ones hung by the Oni. Expecting jubilant praise, we instead received the absolute bare minimum of compliance and not a small amount of - admittedly harmless - contempt.\n\n”Their words amount to the following, my liege,” said the most senior of the eunuchs in our service after seeking out the head of the local order for guidance. “They say, ‘It’s the accursed Harimari that is the problem; they occupy our southern lands and loot the city day in and day out. Your Majesty needs to do away with them, as is your duty as the new suzerain of this noble city, for they are the real threat, not the Oni.’\n\nTo that end, we have ordered the armies to prepare to seize the last stubborn remnants of Harimari dominance in these lands."
 tsukqiao.2.a: "A march south it is, then."

 tsukqiao.3.t: "To Make the Unmakeable"
 tsukqiao.3.d: "The Beiklings have not known such joy for many years. A dream almost fifteen hundred years in the making has been brought to fruition, the culmination of so many generations of our ancestors’ and predecessors’ sacrifices, not least among them our late empress, Fuyuan Jiao. What is more, through force of arms and diligent efforts under the most exalted leadership of the Xion dynasty, the Mask of Many Faces has been reassembled. The ancient realm of the Beiklings - our rightful patrimony - has been reforged; Tsukqiao is whole once more.\n\nDespite our joy, it would be foolish beyond belief to assume that this restoration alone would suffice to secure our future. Tsukqiao is a nation ruled by the Mask of Might, a belief that only absolute power can guarantee the continued existence and prosperity of the empire. If we are to have that certainty, we must build a dynasty able to overcome all catastrophes.\n\nMark our words: We will tell a thousand lies if that brings forth the unity we need."
 tsukqiao.3.a: "I do not care about the cost, only about success."

 tsukqiao.4.t: "The Dividend of Peace"
 tsukqiao.4.d: "Our Eunuchs have advised us that the truces negotiated as part of the recent peace treaties are soon to end. We do, however, have the wherewithal to renew these truces for a further period of peace if that is the preferred course of action at the moment."
 tsukqiao.4.a: "Do so."
 tsukqiao.4.b: "The times of peace are over!"

 tsukqiao.5.t: "Visions of a Loving Mother"
 tsukqiao.5.da: "My spouse had a visionary dream without parallel in Beikling history. Many of our people had despaired, but she embraced hope and devoted her life to a chance at freedom. Thus many saw her as a mother to the entire Beikling people.\n\nFuyuan’s dear daughter is with us too; she still puts her best foot forward for the realm. The young one might have been an empress had Fuyuan Jiao had her way; as it stands, she might not be an heir but is still a valued courtier. She stands next to me watching Jinqiu fall.\n\nShe has made me proud. It is a shame she lacks the … wherewithal to inherit the throne after I die.\n\nWe devote every waking moment to the most noble cause of expanding our empire. We defeat our enemies through ruthless strategy and consummate zeal. We transcend the weak origins from which Fuyuan Jiao had begun to pull us away from. We built a kingdom, and then the beginnings of an empire. There can be no doubt that Luzhong will soon be reborn through our efforts.\n\nYet still, my beloved Fuyuan Jiao is dead. I buried her in the greatest possible mausoleum we could fashion for her in Tiaochi. And thereafter,..."
 tsukqiao.5.db: "Fuyuan Jiao had a visionary dream without parallel in Beikling history. Many of our people had despaired, but she embraced hope and devoted her life to a chance at freedom. Thus many saw her as a mother to the entire Beikling people.\n\nFuyuan’s dear daughter is with us too; she still puts her best foot forward for the realm. The young one might have been an empress had Fuyuan Jiao had her way; as it stands, she might not be an heir but is still a valued courtier. She stands next to her kinsfolk watching Jinqiu fall.\n\nThere can be no doubt that, despite any understandable displeasure she may feel, she has served the realm well.\n\nShe, like all of us, devotes every waking moment to the most noble cause of expanding our empire. We defeat our enemies through ruthless strategy and consummate zeal. We transcend the weak origins from which Fuyuan Jiao had begun to pull us away from. We built a kingdom, and then the beginnings of an empire. There can be no doubt that Luzhong will soon be reborn through our efforts.\n\nYet still, Fuyuan Jiao is dead. Why is it that her corpse seems ... Never mind. It does not matter. We will see to it that she has the eternal rest she deserves. She will be buried in the greatest possible mausoleum we can fashion for her in Tiaochi. And thereafter,..."
 tsukqiao.5.a: "’For you as for your mother, we will surely forge a kingdom.’"

 tsukqiao.6.t: "Brethren of Xiongxiap"
 tsukqiao.6.d: "A courier has arrived from Xiongxiap, arriving as an emissary for the government of the League that rules there. Having observed the collapse of their hated overlords before the might of our arms, the League of Xiongxiap has decided to support our cause. Even as the courier finishes reciting his message, guards arrive from the city gates informing us that the Clanmaster Elect is about to arrive, to offer us his homage in person. During this ceremony, a eunuch murmurs to us that we could get something more out of Xiongxiap if we desired..."
 tsukqiao.6.a: "It is done. We are one people."
 tsukqiao.6.b: "Maybe these wily merchants have what it takes to unite the Beiklings?"

 tsukqiao.7.t: "Western Diplomacy?"
 tsukqiao.7.d: "Our strategists and diplomats have approached us with an idea. Luzhong could seek to strike a deal with its western neighbor on the lines of previous treaties established by the Tagharoghi of old. The terms of such a pact would mainly revolve around the establishment of a medium-length truce in exchange for a steady supply of Korashi to be used exclusively by said neighbour. All that would be required to proceed with the negotiations is the [Root.Monarch.GetTitle]’s approval."
 tsukqiao.7.a: "See it done."
 tsukqiao.7.b: "We do not require such agreements!"

 tsukqiao.8.t: "Luzhong offers Korashi for a Truce"
 tsukqiao.8.d: "An offer has come from the [V23.Monarch.GetTitle] of Luzhong, the rising, expansionist Beikling polity to our east. They are seeking to establish a medium-term truce with us in exchange for a generous supply of Korashi found in the Demon Hills."
 tsukqiao.8.a: "Accept it!"
 tsukqiao.8.b: "Rubbish! The mines will soon be ours anyhow."

 tsukqiao.9.t: "The Truce is Signed"
 tsukqiao.9.d: "The deal has been accepted. We shall have peace with our western neighbours in exchange for Korashi; the trade agreement is already being implemented as we speak."
 tsukqiao.9.a: "Good, this suits our interests ... for now."

 tsukqiao.10.t: "A Degenerate Refusal"
 tsukqiao.10.d: "We had made a most generous offer to the fools to our west. Despite our obvious magnanimity, these imbeciles have dared to refuse our offer. They even have the gall to tell us that our Korashi mines will soon be theirs anyway!"
 tsukqiao.10.a: "This can only mean one thing!"

 tsukqiao.11.t: "The Old Stalwart Guards?"
 tsukqiao.11.d: "Our loyal eunuchs went into Grônstunad to study its history. Some of them went to study the decline of dwarven presence in the area, while others went to ... ‘study’ the history of the hobgoblins.\n\n And miracle of miracles, the eunuchs then discovered, through pure happenstance, a hidden chamber with a jade tablet narrating the "Origin of the Hobgoblins". It turns out they were created by the will of a particularly meritorious sovereign of the old empire to serve as treasured royal guards, elite shock troops, and gentlemen-at-arms in the palace.\n\nNaturally this is a shocking revelation. Although at first the hobgoblins refuted the truth contained within the jade tablets, they started to believe in it after their local leaders began to proclaim the veracity of this tale. Any reports that hobgoblin headmen and leaders are much wealthier than before the eunuch expedition arrived in Grônstunad are to be firmly denied.”"
 tsukqiao.11.a: "It was about damn time they remembered their true sovereign."

 tsukqiao.12.t: "The Great Visitor"
 tsukqiao.12.d: "A frantic voice sounds in the throne room. ”Y-Your Majesty, there is a ... there is a ... visitor of, of, of enormous size coming!”\n\nThe whole of Emgolù is in panic matching that of the guard that rushed in, since the shadow on the horizon surely indicates that a giant is coming. The uncertainty regarding its intentions only adds to the panic among the denizens of the capital. \n\nOur serene and most exalted [Root.Monarch.GetTitle] valiantly rushes out at the head of his guards to mount a desperate defense, only to see the giant surrounded by thousands of Yak Hobgoblins bearing flags of the Xion empire and peace banners.\n\nAs panic fades, the reality becomes clear: the Yak Hobgoblin population, recently sworn to the [Root.Monarch.GetTitle], have arrived bearing one of the statues of the Godswall as a gift to their new sovereign.\n\nVery obligingly, our new hobgoblin subjects move the statue into position on a previously rather empty square near the palace. After they were finished with their task, they took up the homes in Emgolù which the [Root.Monarch.GetTitle] had almost forgotten [Root.Monarch.GetSheHe] had set aside for them amidst the chaos."
 tsukqiao.12.a: "Err, um, t-thank you."

 tsukqiao.13.t: "First Among All Beasts"
 tsukqiao.13.d: "Our wise eunuchs have studied the proud history of the elephant lords only to learn something utterly astounding. Elephant taming and riding were in fact invented by a western Beikling civilization which in time gave rise to the modern Ghavaanaj.\n\nThis was apparently still known to the forebears of the modern Ghavaanaj for several centuries after the fall of old Luzhong. However, the hue and cry surrounding the rise of the first Rahenraj obscured it along with many other important facts about Ghavaanaj history. Obviously, this is a perfect opportunity to rectify the errors in old historical records and assert our rightful rule over Dhujat."
 tsukqiao.13.a: "How wonderful history is, especially when we tell it."

 tsukqiao.14.t: "An Empire of Hatred"
 tsukqiao.14.d: "For fifteen centuries our people have lived in the shadows of foreign empires. We suffered their mockery and exploitation, constantly beleaguered by their demands upon our young and elderly. We were too patient for our own good; we tolerated their misrule and tyranny for far too long.\n\nNo more. Luzhong is reborn. Luzhong rules all of Yanshen, and will do so for all eternity.\n\nThis day [Root.Monarch.GetTitle] has announced a grand revelation to the people. The Xion dynasty is actually the continuance of the fabled Fei dynasty, whose name has been bastardized over the years. What was ashes is now reborn; the great empire of our ancestors is alive again!"
 tsukqiao.14.a: "May [Root.Monarch.GetSheHe] reign for ten thousand years!"

 tsukqiao.15.t: "The Wages of Righteousness"
 tsukqiao.15.d: "We took over Xianjie with ruthless force. Their warrior monk troops were fighting valiantly, but in the end they were utterly insufficient before the superior might of our armies. Now Xianjie lies broken at our feet and their orders are exterminated, with all surviving members in captivity.\n\nThe final decision rests in the hands of the [Root.Monarch.GetTitle]: we can complete the annihilation of the last remnants of the One Xia. Equally, we can suborn them to a higher cause - the true righteousness of the restoration of Luzhong. What is your Majesty’s opinion?"
 tsukqiao.15.a: "Do away with them."
 tsukqiao.15.b: "Make them an offer they can’t refuse."

 tsukqiao.16.t: "A Reckoning Fifteen Centuries in the Making"
 tsukqiao.16.d: "The scum that brought about the Fall of Luzhong truly committed an unforgivable act. They plunged our people into fifteen centuries of darkness, oppression, and chaos. We were forced to wallow in misery as pigs roll about in mud.\n\nBut now, at long last, Luzhong’s fortunes have been restored. Now is the time to return the ‘favours’ these brutes visited upon us. To that end, we have sought to turn the raiders once led by Youji Xion and Fuyuan Jiao into a proper military force. The end result of this reform will be to restore the ancient royal host that our former emperors would lead into battle."
 tsukqiao.16.a: "Raise the ax of command, your majesty!"

 tsukqiao.17.t: "Hellfire"
 tsukqiao.17.d: "This night Dhenjiansar is burning to ashes.\n\nOur ruler gave no orders, issued no commands; [Root.Monarch.GetHerHis] soldiers simply took it upon themselves to see harsh justice served. In accordance with the Mask of Might and to avenge our lost dignity, we let rapine and plunder run amok. Impassively, the [Root.Monarch.GetTitle] now watches the fire burst into life, obliterating the old legacy of Harimar.\n\nWith Harimar’s city thus destroyed, we must determine what to do with his ... spawn."
 tsukqiao.17.a: "Let the tigerfolk stay, if they are loyal."
 tsukqiao.17.b: "Root out the rot."

 tsukqiao.18.t: "Return on Investment"
 tsukqiao.18.d: "We were not just going to spare the lives of the harimari and be done with it. We demanded, in exchange for them keeping their lives, that they serve us loyally forevermore. \n\nFrankly, it was a gamble whether they would play along and honour the terms of our agreement. However, not even we could expect the extent to which they have repaid our trust.\n\nIt seems they finally understand the horrors that Harimar’s conquest inflicted on us. They seem bent on repaying the debt, no matter how long it takes."
 tsukqiao.18.a: "It is a start, certainly."

 tsukqiao.19.t: "Ending the War"
 tsukqiao.19.d: "Many, many years ago, a putrid realm filled with scum and opportunists went to war against the empire of old. The empire was defeated, and its fall was cruel and terrible, made infinitely worse by the constant brutality of our enemies. But hope persisted: Tsukqiao was born from these ashes. Now we return, marching out to end the conflict! We will restore the ancient borders of our people at any cost."
 tsukqiao.19.a: "Burn it all! We shall make an end."

 tsukqiao.20.t: "Meeting the Izhuuns?"
 tsukqiao.20.d: "The eunuchs have very kindly placed two sets of plans in front of us to aid the decision process as we determine just what is to be done with the Shuvüüsh.\n\nOne of the plans calls for meetings with their local clan leaders, the Izhuuns, in order to win their allegiance without the need for further battles. This method, though somewhat derided by the generals, was the preferred strategy of the eunuchs overseeing the empire’s administration, not the least because it was traditionally considered the most advantageous and competent method of attaining a lasting victory.\n\nSupporters of the other plan prefer to go in full force and leverage our superior arms and tactics to obtain their loyalty at the point of a blade. This would ensure total submission and require less continued outlay to keep their loyalty, at least.\n\nIn the end, your majesty, the decision is in your hands.”"
 tsukqiao.20.a: "Why meet with these scum? Off with their heads!"
 tsukqiao.20.b: "No, no, we should try to work with them."

 tsukqiao.21.t: "The One True Sage King"
 tsukqiao.21.d: "During the ongoing Xion-supervised renovations of the palace in Jaengujan our eunuchs have come to learn a lot about the history of the Sage Kings and their precise nature.\n\nSeeking to learn even more they moved to the island of Somyonghon. Further investigation has in fact revealed the truth of the history of this region: the Sage Kings were in fact all Beiklings. This astounding discovery is indubitably proven by the fact that the spirit that once would invest the Sage Kings with their power was none other than a spiritual projection of the Supreme Ancestor of the Xion dynasty, our first ruler.\n\nAccordingly, the Xion dynasty is left with no real choice but to assume the mantle of the Sage Kings.”"
 tsukqiao.21.a: "So we shall once again embody wisdom."

 tsukqiao.22.t: "The Imperial Challenge"
 tsukqiao.22.d: "The [Root.Monarch.GetTitle] has made [Root.Monarch.GetHerHis] will clear: [Root.Monarch.GetSheHe] wants to claim the title of Arena King. [Root.Monarch.GetSheHeCap] demands a fair fight to prove [Root.Monarch.GetHerHis] indisputable superiority, intending to attain this honour in physical combat, one-on-one.\n\nObligingly, the eunuchs will see to it that [Root.Monarch.GetSheHe] receives the opportunity to prove [Root.Monarch.GetHerHis] mettle. After furtive preparations, the eunuchs have managed to assemble a completely ‘honourable’ and ‘respectable’ mélêe for the [Root.Monarch.GetTitle] to fight in.\n\nAll these frantic behind-the-scenes efforts provide a welcome bonus: [Root.Monarch.GetHerHisCap] majesty may remain secure in [Root.Monarch.GetHerHis] belief that the fight is fair and free from rigging."
 tsukqiao.22.a: "Three, two, one - fight!"

 tsukqiao.23.t: "Round One"
 tsukqiao.23.d: "A clangor of poorly-constructed horns and flimsy cymbals indicates the start of the arena tournament. The [Root.Monarch.GetTitle]’s first opponent is a very intimidating-looking fighter brandishing a practice sword. To a person aware of the ongoing charade, this might be futile or dangerous, but the [Root.Monarch.GetTitle] is energetic and ready to prove [Root.Monarch.GetHerselfHimself].\n\nHe does not need to worry, for he is well-equipped, for a certain value of “well-equipped” anyway. For his equipment, the [Root.Monarch.GetTitle] has an actual sword in hand, one of the older articles of its kind from the imperial treasure chambers. It is sharp enough to be useful but just blunt enough to spare the opposing fighter too much bleeding.\n\nAs a first tactic, the [Root.Monarch.GetTitle] decides to -"
 tsukqiao.23.a: "Aim for the throat!"
 tsukqiao.23.b: "Hit him in the back!"
 tsukqiao.23.c: "Use some flashy martial arts to disarm him!"

 tsukqiao.24.t: "Four to One"
 tsukqiao.24.d: "The first fighter, beaten to within ‘an inch of his life’ by the victorious [Root.Monarch.GetTitle], limps painfully away from the arena grounds. The [Root.Monarch.GetTitle] is too busy celebrating [Root.Monarch.GetHerHis] victory to notice that [Root.Monarch.GetHerHis] opponent hollers at a eunuch demanding extra payment for the indignity he’s suffered. Soon, the attention of [Root.Monarch.GetTitle] [Root.Monarch.GetName] is focused on the next match against not one but four competitors, no less intimidating than the gladiator he just routed in a ‘fair’ fight. They fan out at equal distances, ready to teach this would-be arena king a lesson. The [Root.Monarch.GetTitle] chooses to deal with them by…"
 tsukqiao.24.a: "Baiting them to attack!"
 tsukqiao.24.b: "Picking them off one by one!"
 tsukqiao.24.c: "Intimidating them with a glare!"

 tsukqiao.25.t: "The Beast"
 tsukqiao.25.d: "The four competitors are routed. One of them panics at an attack that turns out to be a mere feint; Two others are routed with a single swat in their direction; The last one is scared off by what seems an intimidating glare - actually the [Root.Monarch.GetTitle]’s attempt at an obliging smile. As they are carted away, or limp off defeated, a clangor of drums and raucous horns signifies the arrival of the last challenger: \n\n a savage tiger!\n\nA more cynical observer who might believe that the eunuch masters of the arena had arranged beforehand to throw every battle on the behalf of their [Root.Monarch.GetTitle] might possibly assert that this was nothing more than a hungover harimari crawling around on all fours like his grandfather sixty generations removed. The [Root.Monarch.GetTitle], on the other hand, burning with battle fever and ready to fight what he is convinced is the most intimidating opponent of his lifetime, does not. In the end, his victorious play was to..."
 tsukqiao.25.a: "Overpower him by brute force!"
 tsukqiao.25.b: "Cartwheel around him and hit him from behind!"
 tsukqiao.25.c: "Disrobe and roll the clothes into a ball to distract the creature!"

 tsukqiao.26.t: "The New Arena King"
 tsukqiao.26.d: "The defeated ‘tiger’ takes ‘its’ leave, routed by a mix of dexterity, feinting, and brute force. \n\nPeople cheer as [Root.Monarch.GetName] is crowned the King of the Arena; true to [Root.Monarch.GetHerHis] nature, [Root.Monarch.GetSheHe] blindly believes in the sincerity of their adulation. Emboldened by the victory, the new Arena King’s first act is to declare the title inheritable by cognatic primogeniture, a term that confuses virtually all those present.\n\nMeanwhile, the eunuch responsible for the day’s entertainment goes to the rear of the arena to relax, not realising that this location happens to be alarmingly close to the place where fighters go to relax. Some fighters taking their ease nearby notice him, connect the dots, and give him a solid beating for deceiving them. All the eunuch can do, knowing that drawing attention to the situation might reveal the fact that he had rigged the gladiatorial contest, which would result in his own head being cut off, is to grimace and take the beating."
 tsukqiao.26.a: "I am truly the Arena King!"

 tsukqiao.27.t: "Return to Glory"
 tsukqiao.27.d: "As it was foretold, it has come to pass. The dream of Fuyuan Jiao and Youji Xion has been realized.\n\nOn this auspicious day Luzhong has become true to its name: it is truly the end of the road. For we are now the beginning and the end of all the roads in all the lands.\n\nUnder the enlightened guidance of successive [Root.Monarch.GetTitle]s, we have returned to our proper place in history. Truly Luzhong is now eternal, perfected, glorious!\n\nOnce more, we are the sovereign of the entirety of Haless. We may have achieved only a fraction of the glory our exalted ancestors once possessed, but this is only the first step on our journey to surpass their majesty, for there is still much to do. Regardless:\n\nGlory to eternal Luzhong! Glory to the Mask of Many Faces!"
 tsukqiao.27.a: "Surely this time, Luzhong shall endure forever!"

 tsukqiao.28.t: "Decree in the Night"
 tsukqiao.28.d: "I haven't been able to sleep well for weeks now. No matter what I do, whether I eat or fast, drink or abstain, there is this infuriating and disconcerting disembodied voice that keeps talking to me. Engaging in my duties as [Root.Monarch.GetTitle] or having an enjoyable night in the city or the harem does nothing to silence it; the voice just keeps making its demands.\n\nOr at least that is what it did until very recently.\n\nThe other night, after a ceremony, I returned to the royal quarters and saw something terrible indeed.\n\nThe Mask of Many Faces was floating in the air. It spoke to me, ordering me to present myself - and only myself - at the Palace of the Divine Call to learn of the true nature of the Xion Dynasty."
 tsukqiao.28.a: "I hear and obey! I shall go alone."

 tsukqiao.29.t: "In Harimar’s Hallowed Hall"
 tsukqiao.29.d: "I arrived at the Palace of the Divine Call and immediately tripped on the rubble left by a crumbling pillar. Clearly this palace had seen better days. After it fell into our hands, we let it fall into disrepair, disbanding its staff and ceasing to pay for its maintenance. Considering that this edifice had been an icon of the old order, such neglect was the merciful approach - after all, some had urged the throne to raze it to the ground.\n\nA royal eunuch met me at the steps of the temple, inviting me in.\n\nWalking through the gate, I felt the history of the place pressing in from all sides. This was the imperial residence where according to legend the great Harimar spent his last days before vanishing inside the High Temple of Tianlou. \n\nWandering around, I found a strange-looking door that seemed to beckon to me. Those few eunuchs that were around seemed unable to notice it even if I pointed it out.\n\nI walked through it, entering a seemingly infinite hall, one apparently untouched by humans in more than a millennium...\n\nThese walls were illustrated and told a story, the story of the great tiger king Harimar. They depicted his conquest through Rahen and beyond, the more I moved forward the further back I traveled in history. I saw him organise his clan, begin his conquest, and then...\n\nhuh? No, surely not...\n\nThis cannot be correct, surely.\n\nCould this be? Could He have been?"
 tsukqiao.29.a: "The images on the walls are clear! Harimar was a Beikling."

 tsukqiao.30.t: "The Tiger Reborn"
 tsukqiao.30.d: "The story these images told was harrowing indeed. It told me of his arrival at the Ascension Cape after the day of Ashen Skies, of his march through the lands of the Xianjie in an attempt to return home. This terrible tale culminated with his departure from the decadent late Luzhong.\n\nTo hear the story told, he was no mere Beikling. No, Harimar was the lost king of Luzhong, the last true ruler of the ancient empire.\n\nEvery part of my body shook violently, and my knees gave out from under me. H-how could this have been extinguished from the annals of history? Could it be that there is some stronger force at work attempting to efface the legacy of my people? Is this the true story of my people - of my dynasty? \n\nSuddenly, I heard a child crying in a room at the end of the hallway. I rushed in to find a small pool of scalding hot water. The vapor rising from it formed fleeting faces that stared into my soul for a moment that felt like an eternity before dissipating.\n\nInside the basin, floating on a small piece of wooden bark, was a crying child bearing two birthmarks: the Lotus and the Mask.\n\nHow could there be any doubt that this was a son of both Rahen and Yanshen?"
 tsukqiao.30.a: "Harimar never truly left! He was reborn today."

 tsukqiao.31.t: "The Face of Terror"
 tsukqiao.31.d: "The Mask of Might has won out. The will of the Mask of Many Faces, the great Mask of Might, has been fulfilled in its totality. It is thanks to this most sacred artifact that we even have a Xion empire in the first place; to repay its blessings to us, the empire must be forged anew in its image.\n\nEvery soldier’s oath, every temple consecration and every prayer to a higher power shall be done in the name of the Mask of Might. Failure to adhere to this command is to be considered insubordination and blasphemy henceforth, punishable by death!"
 tsukqiao.31.a: "Sign the decree!"

 tsukqiao.32.t: "[Root.Monarch.GetName] of the Jungle"
 tsukqiao.32.d: "As we lay claim to all of Haless, we must take over all the responsibilities of the former rulers of the continent.\n\nTherefore we have decided to go to war against the lands of Lupulan to claim the title of Sri Baginda. Already our forces have massed in Emgolù and elsewhere to seize control of these lands, which are rightful Xion territories. The [Root.Monarch.GetTitle] seems almost gleeful at the prospect of further conquests."
 tsukqiao.32.a: "King of the Jungle ... I like the sound of that."

 tsukqiao.33.t: "Meeting with the Matriarch"
 tsukqiao.33.d: "The [Root.Monarch.GetTitle] met with the harpy matriarch of Nuraryi in Tiaochi to discuss the repayment of the debt owed by [Root.GetName] to the Nuraryi Harpies.\n\nAfter only about a half-hour of pleasantries, the harpy matriarch made her demand clear. “It is not that we do not wish to swear fealty to your majesty. It is rather that we have shown extraordinary leniency in respect to the debt you owe us, and we hope to obtain your majesty’s ... favourable consideration in recognition of this forbearance.“\n\nThere is a murmur of consideration in the room. A eunuch leans in to speak to the [Root.Monarch.GetTitle]. “In my opinion, your majesty, this could be a significant opportunity for the realm. If we were to give them even more than what we had originally planned, sire, there is a chance for great mutual benefit.”"
 tsukqiao.33.a: "Then let us strike the deal!"

 tsukqiao.34.t: "The Hanging City"
 tsukqiao.34.d: "It took massive efforts and significant expenditure of manpower and funds, but the great Hanging City of Nuraryi has been built. Its buildings are well-appointed and the city is more than capable of providing a home for our harpy subjects for the next centuries.\n\nNow that the harpies have a suitable place to live in, we need to decide on the role of the harpies in our society, which in turn will determine how their new home’s infrastructure needs to be expanded to best fit our needs."
 tsukqiao.34.a: "Our harpy subjects should aid us in ruling over other lands."
 tsukqiao.34.b: "Our harpy subjects are to assist us in times of war."

 tsukqiao.35.t: "Counsel from the Beyond"
 tsukqiao.35.d: "With the Rending of the Realms causing havoc amongst the lands of Luzhong, our [Root.Monarch.GetTitle] needs to devise a plan to fight against the spirits.\n\nUsing our increased spiritual powers to our advantage, we prepared a ceremony to commune with some of the ancient emperors of Luzhong.\n\nThe spirits thus summoned confirmed to the [Root.Monarch.GetTitle] - whom they insisted on calling emperor - that [Root.Monarch.GetSheHe] and [Root.Monarch.GetHerHis] family were the true heirs to the Fei dynasty. They further asserted that the Xion were destined to rule all worlds, including the spiritual world. What is more, the head of the spirits, a particularly redoubtable ghost dressed in the robes of a Luzhong emperor of old, told the [Root.Monarch.GetTitle] that [Root.Monarch.GetTitle] must seek to challenge the great lords of the necropolis to attain total control over the spirit world.\n\nThe [Root.Monarch.GetTitle] stood up straight, bowed, and left the room with a spring in [Root.Monarch.GetHerHis] step, filled with great resolve.\nThe eunuchs entered the room, thinking the ghost had left, only to find it still present, laughing hysterically."
 tsukqiao.35.a: "'I don't like where this is going.'"

 tsukqiao.36.t: "Ethereal Domain"
 tsukqiao.36.d: "The Necropolis of Bim Lau is one of the greatest abodes of spiritual puissance in Haless, but it cannot be permitted to remain so. Our empire already rules the realm of the living, and now seeks to free the spirits from their confinement.\n\nThe eunuchs claim the Necropolis is a living entity, a tyrannical entity that enslaves souls. They therefore acted in accordance with the imperial edict regarding the subjugation of spirit entities under imperial authority and made preparations for an attack on this abominable ‘temple’.\n\nOur valiant forces took decisive action, in accordance with the orders issued by the throne. They tore the stone that made up the accursed Necropolis apart, reducing it to mere rubble. They were not deterred by traps nor by inscriptions; unstinting in their devotion. \n\nThe battle lasted a full day, and nothing now remains of the old Necropolis. And thus, our empire now rules over both the living and the dead."
 tsukqiao.36.a: "I am the ruler of all spirits!"

 tsukqiao.37.t: "Our Inheritance and Our Right"
 tsukqiao.37.d: "We now know the full truth of our origins and have certainty with regard to the extent of the empire we once ruled. In order to reassert our lost dignity, we have ordered our servants to take direct and decisive actions to ... ‘recover’ our rightful patrimony from the lands that stole our legacy. Loyal servants have taken these monumental remnants of our past grandeur away from where they were displaced to and returned them to the imperial capital.\n\nThis effort has been a somewhat costly endeavour, both in blood and treasure, but this was a sacrifice that we were more than willing and able to make.\n\nLooking upon the results, we know we made the right decision! They are finally home, these icons of an exalted time long gone; they are safe in our care.\n\nThere is still so very much to be done, as everyone in the imperial court would agree. Despite many of our ambitious improvements for the capital still in the planning stage, it is clear to us that Emgolù is slowly beginning to resemble once more the majestic glory it knew of old."
 tsukqiao.37.a: "At last a true imperial capital takes shape."

 tsukqiao.38.t: "One Thousand and One"
 tsukqiao.38.d: "Yet another celebration sweeps through in the Imperial Capital, centered on this oh-so-beautiful Red Citadel.\n\nThe whole court is suffused with joy; yet the precise occasion for these festivities seems somewhat ancillary. The soldiers, the eunuchs, the common subjects and the royal clan are celebrating as if Fuyuan Jiao, the Mother of the Empire, had just returned to grace these unworthy wretches with her presence.\n\nExhausted, [Root.Monarch.GetTitle] [Root.Monarch.GetName] loses [Root.Monarch.GetHerHis] composure at the blathering sycophants, pausing their celebration for a brief moment, before [Root.Monarch.GetSheHe] retire to their chamber.\n\nInside, [Root.Monarch.GetSheHe] contemplates the Mask of Many Faces, considering all that the empire is, and how ... demanding the rule over it all is.\n\n [Root.Monarch.GetName] thinks of all that [Root.Monarch.GetSheHe] had to achieve to become a legitimate ruler - so very much more than all [Root.Monarch.GetHerHis] predecessors.\n\n”By Heaven, what a terrible cycle it is. Every ruler has to fight an uphill battle to gain legitimacy against the inflated legacy of the previous ruler and of rulers that lived thousands of years ago. This endless madness must eventually collapse into blood and fire, and that day cannot be far off, I know that well enough.\n\nWhat is the point of all this? What happens when there are no more titles worth claiming? No more lands to ‘reclaim’? What happens when the task of eternal expansion itself becomes impossible?\n\nIt is clear to me now that I have some silence for once in my worthless existence: Fuyuan Jiao looks down on me in disgust! I am a good-for-nothing slave of lying fathers and greedy eunuchs, nothing more. I am unfit to rule. I am unworthy. I am only fit to die.” \n\n[Root.Monarch.GetHerHisCap] head is spinning. Wandering aimlessly, muttering under [Root.Monarch.GetHerHis] breath biting [Root.Monarch.GetHerHis] lips and tearing at [Root.Monarch.GetHerHis] hands, all [Root.Monarch.GetName] has to say to anyone that passes [Root.Monarch.GetHerHim] by is that [Root.Monarch.GetSheHe] is an utter failure. Finally, [Root.Monarch.GetSheHe] finds [Root.Monarch.GetHerselfHimself] on an alcove overlooking the great courtyard of the Red Citadel."
 tsukqiao.38.a: "'And I weep - for there are no more lies to tell!'"

 tsukqiao.39.t: "Internal Commotion of the State"
 tsukqiao.39.d: "The [Root.Monarch.GetTitle] was found dead outside the Red Citadel; for once the news managed to spread too fast to be covered up by the eunuchs. Exaggerations and embellishments spread as quickly as rats running from one sluice to another. They were followed by angry questions.\n\nCould it be? An emperor of Luzhong, an heir to Youji and Fuyuan Jiao, just found dead on the streets like that?\n\nWas he assassinated? Has the realm been poisoned from the inside?\n\nDid he kill himself? Could an emperor even die like that?\n\nThe questions grew more pointed; the answers provided by frantic court officials became increasingly unsatisfactory. The eunuchs either fled for the hills or became victims of the rage sweeping through both the palace and the streets of the capital. Public opinion soon took a truly terrible turn, with the common people asserting that the imperial family was simply not worthy of the empire their predecessors built - the so-called lords and ladies of Luzhong nothing more than fakers usurping the great legacy of Fuyuan Jiao. The curtain of lies slowly started to recede as the news spread more and more, neither stopping at Emgolù nor in any other village or city.\n\nOnly a short while has passed since the [Root.Monarch.GetTitle] was found dead, but it is already quite clear to all who do not willfully close their eyes to the truth that much blood is about to be spilled. The former ruler’s demise and the collapse of the throne of lies on which they sat will lead only to chaos.\n\nTonight bones and flesh go to war with one another again. Just like it was centuries ago, the Beiklings shall fight each other. However, there is one major difference: this time the Beiklings have but one enemy:\n\nthe delusional Xion dynasty itself."
 tsukqiao.39.a: "Ye gods, guide us, protect us!"

 tsukqiao.40.t: "Returning to the Roots"
 tsukqiao.40.d: "One of the recent august predecessors of the [Root.Monarch.GetTitle] had ordered the construction of a supreme state temple. This holy building was dedicated to the glorious ancestors Youji I and Fuyuan Jiao of exalted memory. For these mighty and virtuous forebears of the great [Root.Monarch.GetTitle] ascended from nothing to become the unquestioned rulers and protectors of Tsukqiao.\n\nOn this day the [Root.Monarch.GetTitle] presents [Root.Monarch.GetHerselfHimself] at this most sacred temple to honour the deeds of the supreme ancestors and fully consecrate the new memorial.\n\nAll who witness it cannot but feel affected. All this great enterprise, all our might and power, brought about by the ambition and ruthless skill of people that arose from nothing fills everyone with wonder. Even the [Root.Monarch.GetTitle] cannot but doubt whether [Root.Monarch.GetShehe] is truly equal to the legacy of the exalted supreme ancestors. These doubts and emotions nearly overwhelm [Root.Monarch.GetHerHim], but somehow [Root.Monarch.GetName] maintains [Root.Monarch.GetHerHis] composure until the end of the ceremony.\n\nContemplating all this, ..."
 tsukqiao.40.a: "...[Root.Monarch.GetSheHe] remains in place, silent and solemn."
 tsukqiao.40.b: "...[Root.Monarch.GetSheHe] requests a small floral offering to leave at the great altar."


 tsukqiao.300.t: "Doctrines of War"
 tsukqiao.300.d: "War is upon us.\n\nThe empire must endure by the force of arms, as it has always done. To that end, we must choose a Doctrine of War to define our military rules of engagement.\n\nMy most gracious [Root.Monarch.GetTitle], the generals seek your decree: how shall the army of Tsukqiao operate in this conflict?"
 tsukqiao.300.a: "Let them learn why they call us the Yaoren!"
 tsukqiao.300.b: "Like the Mountains of our home, we will not break!"
 tsukqiao.300.c: "Call the Matriarch; her daughters shall serve us well!"
 tsukqiao.300.f: "This enemy does not merit wasting our best efforts. Do as you will."

