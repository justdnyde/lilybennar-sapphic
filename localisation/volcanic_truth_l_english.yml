 #Events
 volcanic_truth.5.title:0 "[Root.vt_incident_start_event_title_custom_loc]"
 volcanic_truth.5.a.1:0 "Convene the council of the Volcanic Truth"
 volcanic_truth.5.a.1.tt:0 "We will determine our vote for the active Volcanic Truth incident in §Y7 and a half§! years.\nHaving a higher §YDiplomatic Reputation§! means our vote will count for more.\nNon-Player §YVolcanic Truth§! countries are more likely to vote for the same option as us if we're their ally or they have a high opinion of us.\nThe result will be known in §Y10§! years."
 volcanic_truth.5.title.1:0 "Organizational Crisis: Beginning"
 volcanic_truth.5.desc.1:0 "For the longest time, the order of things was simple: the Twin Gods oversaw all, and Maulu and Xihatele oversaw the Twin Gods, ensuring that they were happy, both with the state of the world and with developments of the faith. Now, external forces have arranged themselves such that the old order has been disrupted, and the old system of communion with the volcanoes has been disrupted with it.\n\nAnd yet, Muatlaqua and Quahopilo were there before the Cuahu Teotlehu, and they will remain here after them. Even if the Cuahu Teotlehu are no more, we need not necessarily restore them. The faith faces a core question: if not the Cuahu Teotlehu, who will interpret the will of the Twin Gods?"
 volcanic_truth.5.title.2:0 "Taga'Ala Influence: Beginning"
 volcanic_truth.5.desc.2:0 "As we continue to spread our creed of change throughout the world, Volcanic Truth traders have reached down the coast of the continent to trade with the Taga'Ala. Their ways are at once familiar and archaic: they worship the Endless Ocean, like some stubborn remnants of the past still do in Kanolowele, and organize themselves under small councils tasked with making their political decisions.\n\nMore concerning is the Taga'Ala's expertise in seafaring. They are a mercantile people, and if they were to leave their mangroves they could begin to spread the old ways into the lands of the Volcanic Truth once more. They appear content for now, but unless we take measures to stop them, their foreign customs could soon reach beyond their borders. We must decide if the beliefs of the Taga'Ala are a threat to the Volcanic Truth, and if so, what must be done about them."
 volcanic_truth.5.title.3:0 "Mass Eruption of the Twin Gods: Beginning"
 volcanic_truth.5.desc.3:0 "The magmascryers are crucial to our faith, but we hardly need magmascryers to tell us what the Twin Gods demand of us now. They have erupted into great plumes of fire, and devastated the lands around them. The elders cannot think of a time in the long history of Kanolowele when both of the Twins showed such wrath, and this is an obvious indication that we have grown stagnant. The Twin Gods are attempting to reshape the world in fire, and if we do not wish to be consumed by it, we will have to follow their commands. Everything associated with the old ways must be torn down: the fires of change will spare no one and nothing.\n\nWhat will reemerge from the devastation shall be glorious, but in order for that to happen we must burn for a time."
 volcanic_truth.5.a.3:0 "Change or die!"
 volcanic_truth.5.a.3.tt:0 "In approximately §Y1 year§! the Twin Gods will demand change"
 volcanic_truth.5.title.4:0 "Weakening of the Kiamoa: Beginning"
 volcanic_truth.5.desc.4:0 "The great stormwall of the Kiamoa has weakened. Although we can now journey through it to explore what lies beyond, it is now also possible for what is beyond the Kiamoa to enter Insyaa. Was the Kiamoa a prison or a refuge? We cannot say, at least not yet.\n\nWhat does this fundamental change mean for the lands of the Volcanic Truth? Are the Twin Gods aware of what lies outside the Kiamoa? How will we as a faith respond to it? These are questions beyond our ability to answer alone. We must call together the great synod of the Volcanic Truth, and go to ask the Twin Gods."
 volcanic_truth.5.title.5:0 "The Molten Eternity: Beginning"
 volcanic_truth.5.desc.5:0 "None of the magmascryers are quite sure what to make of the new creed called the Molten Eternity. On one hand, they share our values. They believe that change is necessary in all things, and that it is the duty of all to strive towards that change. On the other hand, they believe that there is a point when that change will inevitably stop. A culmination of all change means that there will eventually be a point when the world is stagnant, once their promised deity comes.\n\nThe Volcanic Truth teaches us that the only constant are the Twin Gods, but the Molten Eternity do not even care about their proclamations. And yet, more and more of the faithful turn to the Molten Eternity, and their ways of changing the world grow more and more prominent. If our faith is to survive, we will have to figure out the Molten Eternity's relation to the Volcanic Truth, and whether it is compatible with our beliefs or if it poses a danger to us."
#  volcanic_truth.5.title.6:0 "A Dragon Turtle's Place: Beginning"
#  volcanic_truth.5.desc.6:0 "Dragon Turtle" #placeholder
 volcanic_truth.5.title.7:0 "Mechanim Awakening: Beginning"
 volcanic_truth.5.desc.7:0 "As more and more of the beings who call themselves mechanim spread across Insyaa and Kanolowele, it is the task of the faithful to determine the significance of their arrival to the Volcanic Truth.\n\nOn one hand, they represent a great opportunity. They are powered by the fire within their veins, and they bring great change by their very presence. Their stories of the Hinuilands where our people dare not go as well as their stories of days past could help our faith gain a greater understanding of the world. Their presence brings change, and as we know, change is the will of the Twin Gods.\n\nOn the other hand, we have encountered the mechanim prior to their current bout of activity: they have lain dormant in forgotten places for millennia. They speak of things far in the past, and if we were to change to accommodate them, would that not be undoing the change that has occurred since then? Perhaps their ways are a danger to the faith of the Volcanic Truth, and their revelations threaten to lead the faithful astray.\n\nIn either case, the answer to this question is not for us alone to decide. We must assemble the great synod of the Volcanic Truth to answer this question, for the good of both ourselves and of the mechanim."
 volcanic_truth.10.title:0 "Council"
 volcanic_truth.10.desc.1:0 "We have convened a great synod, and its task is now to determine what shall be done about the matter of the Cuahu Teotlehu. We have assembled beneath one of the Twin Gods, the guides of our faith. The magmascryers have brought us to the caldera of Muatlaqua, the guide of change, to show us the way forward.\n\nThe dance of the magmascryers begins. They draw forth from burning rock visions of a free Volcanic Truth, one which heeds no far away masters who stand between us and our gods. A new era dawns: rock shifts into shapes beyond our imagination. The motions of the magmascryers are flowing and free. Their eyes burn a brilliant amber.\n\nBut as their fire burns across our eyes, it soon begins to multiply, and change into terrible forms. We see visions of a Volcanic Truth rife with division. Everyone will think the Twin Gods' will means something different. What will happen if we divorce ourselves from the wisdom to chart a path forward for the faith? What will happen if we divorce ourselves from the force of vision we need to bring forth change?\n\nWithin the caldera, the fire of the magmascryers begins to fade. They stand within the lava, their dance complete. Which of their visions was true? The path forward is unclear, and the council must decide what is to be done. How shall we vote?"
 volcanic_truth.10.desc.2:0 "We have convened a great synod to determine what shall be done about the matter of the Taga'Ala. We have assembled beneath one of the Twin Gods, the guides of our faith.The magmascryers have brought us to the caldera of Quahopilo, the bringer of change by force, to show us the way forward.\n\nThe magmascryers begin their dance, and work together as one to bring forth visions of change. The lava bursts forth, and from it comes a vision of Taga'Ala ships. They have assembled a mighty fleet, but their holds are filled with cargo: they have come to trade. They sail forth on seas of lava to lands of ash, and bring tales of the Volcanic Truth to their people at home, who are ignorant of the commandments of the Twin Gods.\n\nBut then the magmascryers shift away from each other, and their movements become solitary and forceful. The lava bursts forth, higher than before: it shows visions of ships. They are our ships, come to show the Taga'Ala the meaning of our Truth. Mangrove trees turn into ash, but from the ash comes new life. The Taga'Ala have been reborn in fire. Great plumes of lava explode into the air, and from them arise visions of change.\n\nAs these visions fade, the magmascryers stand within the flames. Their work is done, but the path forward is unclear. It falls to the council to decide: are the people of the mangroves friends or foes? How shall we bring about change? How shall we vote?"
 # No desc.3 on purpose
 volcanic_truth.10.desc.4:0 "We have convened a great synod to determine what the implications of the Kiamoa's fall truly are. We have assembled beneath one of the Twin Gods, the guides of our faith. The magmascryers have brought us to the caldera of Quahopilo, the bringer of change by force, to show us the way forward.\n\nThe magmascryers begin their dance. Within the lava, we see ourselves trapped in a cage of another's design. The magmascryers rage. They direct the fire of the Volcanic Truth against the bars of our prison. They move with purpose and their fire boils over with passion, and yet we remain trapped.\n\nAnd then, a bar of the cage collapses in on itself. It is not much, but it might be enough for some of our bravest to crawl through the gap into the world beyond. From this single crack in our prison, the magmascryers focus on what they might see. In the lava beyond, we can see swirling shapes which fade too quickly to truly grasp - we see sparse glimpses of grand structures and great ships. And most importantly, we see nothing of the Volcanic Truth.\n\nAt last, the visions within the lava fade, and the magmascryers complete their dance. The world beyond is still unclear and unknown, but we know that it is coming to Insyaa. Will its presence here be a threat or an opportunity? Can the Volcanic Truth flourish beyond the Kiamoa? What will this change mean? Not just for us, but for all of Insyaa? How shall we vote?"
 volcanic_truth.10.desc.5:0 "We have convened a great synod to determine what shall be done about the matter of faith of the Molten Eternity. We have assembled beneath one of the Twin Gods, the guides of our faith The magmascryers have brought us to the caldera of Muatlaqua, the guide of change, to show us the way forward.\n\nThe magmascryers draw forth lava from the great caldera, and within its flows we see a vision. A great volcano erupts in the lava, and from the fires of that volcano emerge more flames. They spread across the molten surface of Muatlaqua, and their fire merges into one. All the world around us burns as a single, undying flame. The flame is entrancing. It is beautiful.\n\nThe magmascryers devote more and more of their attention to the single flame. The lava beneath their feet begins to recede. The council cries out, but the magmascryers do not listen to the cries of the faithful. All that matters to the magmascryers is the flame, and the flame is unchanging. The volcano that once roared so proudly is now dormant. The flame is entrancing. It is terrible.\n\nBut eventually, the flame itself begins to sputter, and the magmascryers tear their attention away. They stand in the cooling lava with wondering eyes. Their dance is done, but we still know so little of the Molten Eternity. Yet we must decide: is beauty worth stagnation? What have the Twin Gods told us? How shall we vote?"
#  volcanic_truth.10.desc.6:0 "Dragon Turtle" #placeholder
 volcanic_truth.10.desc.7:0 "We have convened a great synod to determine what shall be done about the matter of the mechanim. We have assembled beneath one of the Twin Gods, the guides of our faith. The magmascryers have brought us to the caldera of Muatlaqua, the guide of change, to show us the way forward.\n\nThe magmascryers begin their dance. We see them moving in precise ways: they are drawing the parts of the lava apart from each other. We see the lava swirling on the surface, and in the lava we see metal, which burns with a fire we knew not it could hold. What a natural pairing fire and metal are! If a fire burns within all of us, perhaps it could burn yet hotter inside these mechanim, whose very movements are guided by the lightning in their veins. If their fire could be directed to enact change, we might be able to accomplish wonderful things.\n\nBut as the council agrees that the mechanim will be welcomed into the Volcanic Truth, the magmascryers continue their dance. The metal that burned so brightly submerges into the lava, and the magmascryers keep chanting. On the surface, the Volcanic Truth continues its change: centuries live and die before our very eyes. But beneath it all is the metal. Its fire is gone. It sits stagnant, rusting. It is a millstone of the past, and the change the future will bring cannot slip its grasp, no matter how hard it tries. The magmascryers burst into forceful, desperate movements, but their dance cannot escape its patterns, and the metal continues to rust.\n\nThe dance of the magmascryers finishes its course. The council is ashamed for its haste - we see now that metal can conduct great heat, but if the Volcanic Truth does not proceed with full awareness of the mechanim's past, we cannot hope to change their future. But the question remains: are the mechanim defined by what they are or what they could be? Are they agents of change or stagnation? What point of view shall the Volcanic Truth take? How shall we vote?"
 volcanic_truth.10.a:0 "[Root.vt_incident_option_1_custom_loc]"
 volcanic_truth.10.b:0 "[Root.vt_incident_option_2_custom_loc]"
 volcanic_truth.10.c:0 "[Root.vt_incident_option_3_custom_loc]"
 volcanic_truth.10.a.1:0 "The fire is within each of us: we need no overseers."
 volcanic_truth.10.b.1:0 "Each realm's magmascryers will take the place of the Cuahu Teotlehu."
 volcanic_truth.10.c.1:0 "Without the instruction of the Cuahu Teotlehu, our faith will crumble!"
 volcanic_truth.10.a.2:0 "Our traders will teach the Taga'Ala about the Volcanic Truth."
 volcanic_truth.10.b.2:0 "The Taga'Ala may do as they please, but we must proceed with caution."
 volcanic_truth.10.c.2:0 "We will force the Taga'Ala to become our brothers in faith."
 # No c.3 on purpose
 volcanic_truth.10.a.4:0 "If we are to weather the collapse of the Kiamoa, we must focus within."
 volcanic_truth.10.b.4:0 "The world outside is tempting, but safety must remain paramount."
 volcanic_truth.10.c.4:0 "The world outside knows not of the Volcanic Truth, and that must change!"
 volcanic_truth.10.a.5:0 "The goal of change is perfection: the Molten Eternity shares our goals."
 volcanic_truth.10.b.5:0 "Molten Eternity is different, but they are still a source of change."
 volcanic_truth.10.c.5:0 "Molten Eternity is a threat which must be destroyed for the good of all."
#  volcanic_truth.10.c.6:0 "Dragon Turtle" # placeholder
 volcanic_truth.10.a.7:0 "The mechanim are people like any other, and can change as they awaken."
 volcanic_truth.10.b.7:0 "The mechanim are heralds of change! We will welcome and exalt them."
 volcanic_truth.10.c.7:0 "The mechanim are stuck in their ways, and this is why they need the Volcanic Truth."

 #The conclusion events all use the same titles and option text on purpose
 volcanic_truth.21.title:0 "[Root.vt_incident_end_option_1_title_custom_loc]"
 volcanic_truth.21.title.1:0 "Organizational Crisis: Conclusion"
 volcanic_truth.21.title.2:0 "Taga'Ala Influence: Conclusion"
 volcanic_truth.21.title.4:0 "Weakening of the Kiamoa: Conclusion"
 volcanic_truth.21.title.5:0 "The Molten Eternity: Conclusion"
 volcanic_truth.21.title.7:0 "Mechanim Awakening: Conclusion"
 # These are for option A winning
 volcanic_truth.21.desc.1:0 "The matter of the Cuahu Teotlehu is decided.\n\nA new era of liberty will bloom: we will decide how to carry out the will of the Twin Gods for ourselves. Each of the orders of the Volcanic Truth has a vision for how the world should be, and as we interpret the fire of those visions through eyes newly opened, their light will refract in new and beautiful ways.\n\nThe magmascryers have shown our council the way forward, and now the foremost duty of the faithful is to continue along their path. A great change is coming, but the Volcanic Truth has never feared change."
 volcanic_truth.21.desc.2:0 "The matter of the Taga'Ala is decided.\n\nWe may worship fire, but we must not burn down all that others hold dear. If the Taga'Ala worship the ocean, let them do so: we will bring the Volcanic Truth to their lands as diplomats and traders. Their trees are submerged in water, but growth is a kind of change, as well. We will teach them that their mangroves and their love of life are already elements of the Volcanic Truth, and in due time we will call each other friends\n\nAs the Volcanic Truth spreads to new lands, the Taga'Ala will take a glowing ember of Truth from it and make it their own. This is what change means."
 volcanic_truth.21.desc.4:0 "The matter of the Kiamoa is decided.\n\nThe visions of the magmascryers were terrifying. The advances of the outside world are far beyond our own, and we know that their ships will soon sail to our islands. We know nothing about what they might want - even if the others come in peace, we must assume the worst. The Twin Gods will protect us, but we must protect ourselves as well! The era after the fall of the Kiamoa will be one of introspection and cautious outreach.\n\nThe Volcanic Truth teaches that nothing is constant. Even the mighty Kiamoa was destined to fade one day, and that day has arrived.  Now that our faith has decided on the proper path forward, we can begin to move towards a new world, with all its mysteries and terrors."
 volcanic_truth.21.desc.5:0 "The matter of the Molten Eternity is decided.\n\nLike us, the Molten Eternity understands the value of change. By learning what they have from the other faiths of Insyaa, they have made their faith stronger. They may have abandoned the worship of the Twin Gods, but we need not repeat their mistakes. So long as we can incorporate what is good about their faith, it will allow us to synthesise their beliefs with our own. Synthesis is a form of change as well.\n\nWe could not expect the religious landscape of Insyaa to remain constant forever. If there is one thing the Volcanic Truth knows all too well, it is change, and that is why we will prevail against all challengers."
 volcanic_truth.21.desc.7:0 "The matter of the mechanim is decided.\n\nThe mechanim may come from a past long faded into obscurity, but their future is theirs to decide. We must engage with the mechanim in a spirit of open inquiry, so that the change they bring is not overshadowed by our preconceptions. They may live in our communities as kin. We will share the history of Kanolowele with them so that they may teach it to others of their kind.\n\nBut now that we have decided what to think of the mechanim's past, the Volcanic Truth must look now to the future. The mechanim have a place within Insyaa, now and forever, and thus they shall live beneath the gaze of the Twin Gods just as we do. They will work towards change within themselves and within the wider world, as is their duty."
 volcanic_truth.21.a:0 "This is the will of the Twin Gods."
 # These are for option B winning
 volcanic_truth.22.title:0 "[Root.vt_incident_end_option_1_title_custom_loc]"
 volcanic_truth.22.desc.1:0 "The matter of the Cuahu Teotlehu is decided.\n\nThe magmascryers of all lands must be given the freedom to commune with the Twin Gods. Organization is necessary, but the Cuahu Teotlehu hoarded what is the birthright of all magmascryers for themselves. They grew fat and greedy. This is why the Cuahu Teotlehu fell, and this is why they must be replaced by a new order of interpreters. By broadening access to the Twin Gods, we will chart a path between liberty and order, and gain the benefits of both.\n\nThe magmascryers have shown our council the way forward, and now the foremost duty of the faithful is to continue along their path. A great change is coming, but the Volcanic Truth has never feared change."
 volcanic_truth.22.desc.2:0 "The matter of the Taga'Ala is decided.\n\nThe Taga'Ala have sailed to the Kiamoa where they send their dead. They knew not to sail beyond, and there is wisdom in this: they stuck to what they knew, even as they explored what might be. The Taga'Ala may be agents of change, but the Volcanic Truth teaches that we must direct change in accordance with the will of the Twin Gods. We will impose restrictions on their trade, and send missionaries in the hopes that one day they will embrace the Volcanic Truth as well.\n\nAs the Volcanic Truth spreads to new lands, the Taga'Ala will take a glowing ember of Truth from it and make it their own. This is what change means."
 volcanic_truth.22.desc.4:0 "The matter of the Kiamoa is decided.\n\nOnly a fool embarks on a journey without a map. The visions of the world beyond the Kiamoa were wondrous, but if we do not prepare for the arrival of those dwelling beyond the Kiamoa, we might not survive the encounter. We will focus on protecting ourselves, and only then will we send our ambitious, our courageous, and our daring to the lands beyond Insyaa, so that they might share the Volcanic Truth.\n\nThe Volcanic Truth teaches that nothing is constant. Even the mighty Kiamoa was destined to fade one day, and that day has arrived.  Now that our faith has decided on the proper path forward, we can begin to move towards a new world, with all its mysteries and terrors."
 volcanic_truth.22.desc.5:0 "The matter of the Molten Eternity is decided.\n\nThe Molten Eternity is dangerous, it is true, but their presence does bring benefits for the faith. Our holy orders have united against an external enemy, and the faithful are full of zeal against the Molten Eternity. We will unite against the Molten Eternity, and they will see that the Volcanic Truth will not be so easily vanquished. We will weather this challenge, just as we did all others before it.\n\nWe could not expect the religious landscape of Insyaa to remain constant forever. If there is one thing the Volcanic Truth knows all too well, it is change, and that is why we will prevail against all challengers."
 volcanic_truth.22.desc.7:0 "The matter of the mechanim is decided.\n\nChange burns within the mechanim! They are suffused with the same holy fire that lives within the Twin Gods, and the Twin Gods' mandate is clear: the mechanim shall be given roles in the faith as avatars of sacred change, so that the future of the Volcanic Truth will be as long-lasting as they have proven themselves to be. The mechanim shall travel across the lands of Insyaa as traders and emissaries, so that their holy change may spread across the continent like the lava of a volcanic eruption.\n\nBut now that we have decided what to think of the mechanim's past, the Volcanic Truth must look now to the future. The mechanim have a place within Insyaa, now and forever, and thus they shall live beneath the gaze of the Twin Gods just as we do. They will work towards change within themselves and within the wider world, as is their duty."
 volcanic_truth.22.a:0 "This is the will of the Twin Gods."
 # These are for option C winning
 volcanic_truth.23.title:0 "[Root.vt_incident_end_option_1_title_custom_loc]"
 volcanic_truth.23.desc.1:0 "The matter of the Cuahu Teotlehu is decided.\n\nWe must restore the Cuahu Teotlehu. The will of gods is not to be taken lightly, and the cost of missteps is great. The Volcanic Truth demands change, but if every person pulls in a different direction we will be held in place, unable to move towards our destiny. Demands must be made of the interlopers who control the slopes of the Twin Gods: if they continue along their current path, they will be consumed by the fire of our faith. This is the only path forward.\n\nThe magmascryers have shown our council the way forward, and now the foremost duty of the faithful is to continue along their path. A great change is coming, but the Volcanic Truth has never feared change."
 volcanic_truth.23.desc.2:0 "The matter of the Taga'Ala is decided.\n\nThe Taga'Ala live beyond the Twin Gods. While the Twin Gods show us the way forward, they live a meaningless, static existence in their mangrove forests, refusing to adapt to the world around them. Leaving them in this state would not be a kindness, it would be an act of cruelty - it is the task of the Volcanic Truth to show the Taga'Ala how deprived they are. They will fight our invasion, but the will of the Twin Gods is immutable, and the change we bring will one day help them blossom in new and beautiful ways.\n\nAs the Volcanic Truth spreads to new lands, the Taga'Ala will take a glowing ember of Truth from it and make it their own. This is what change means."
 volcanic_truth.23.desc.4:0 "The matter of the Kiamoa is decided.\n\nThe lands beyond the Kiamoa may be great and powerful, but they have a weakness of which they know not. The visions of the magmascryers tell us that the lands beyond know nothing of the Volcanic Truth, and this is intolerable. Imagine what we could achieve with the marvels of these foreign lands! Imagine the grand change we could enact in Insyaa. Imagine how we could bring change to the lands beyond the Kiamoa, if only they knew of the Volcanic Truth! We will not hoard our visions to ourselves. We will go beyond the Kiamoa, and we will bring the Volcanic Truth there - with words or with swords.\n\nThe Volcanic Truth teaches that nothing is constant. Even the mighty Kiamoa was destined to fade one day, and that day has arrived.  Now that our faith has decided on the proper path forward, we can begin to move towards a new world, with all its mysteries and terrors."
 volcanic_truth.23.desc.5:0 "The matter of the Molten Eternity is decided.\n\nThe Molten Eternity may cloak themselves in lies about how they value change, but there will come a day when they will expect all to become unchanging and eternal. They do not share our values. They seek to eradicate us. We must kill them in their cradle. The Volcanic Truth will declare a great crusade against the Molten Eternity, and the Molten Eternity will pay dearly for their attempt to mislead the faithful.\n\nWe could not expect the religious landscape of Insyaa to remain constant forever. If there is one thing the Volcanic Truth knows all too well, it is change, and that is why we will prevail against all challengers."
 volcanic_truth.23.desc.7:0 "The matter of the mechanim is decided.\n\nThe mechanim might be an asset to the Volcanic Truth, but we must be wary: they know nothing of the new Insyaa, and if we allow them to follow their nostalgic whims blindly, they will undo centuries upon centuries of change. The only way to prevent this is to teach them thoroughly about the doctrines of the Volcanic Truth as they awaken, so that they may understand the importance of embracing the changes that have occurred while they have lain dormant. Once they have come to know the Truth, they can go forth and share it with others.\n\nBut now that we have decided what to think of the mechanim's past, the Volcanic Truth must look now to the future. The mechanim have a place within Insyaa, now and forever, and thus they shall live beneath the gaze of the Twin Gods just as we do. They will work towards change within themselves and within the wider world, as is their duty."
 volcanic_truth.23.a:0 "This is the will of the Twin Gods."

 volcanic_truth.101.title:0 "An Eruption of Discontent"
 volcanic_truth.101.desc:0 "We have done all we could to influence their decision, but the synod of the Volcanic Truth has reached a foolish decision: our hold over their most sacred lands is an affront to the dignity of the Twin Gods. A religious delegation arrived in our capital today to inform us that we must either restore the Cuahu Teotlehu to their place atop the Twin Gods or be declared an enemy of the Volcanic Truth."
 volcanic_truth.101.a:0 "We must concede to their demands."
 volcanic_truth.101.b:0 "We can guard their Truth just as well."
 volcanic_truth.101.c:0 "This is a change they must learn to accept."
 volcanic_truth.101.c.tt:0 "Every §YVolcanic Truth§! country will gain §R50.00§! aggressive expansion against §Y[Root.GetName]§!"
 volcanic_truth.102.title:0 "Rumblings of Discontent"
 volcanic_truth.102.desc:0 "We are attempting to forge an empire for ourselves in Kanolowele, but our conquests now stretch across lands of great significance to the Volcanic Truth. The two most sacred volcanoes in the faith were once held by the Cuahu Teotlehu, who are the only acceptable custodians of these sacred volcanoes in the doctrine of the Volcanic Truth. \n\nWith our recent conquests, we have displaced them, and now the adherents of the Volcanic Truth are convening to determine exactly what should be done about this matter. Their synod has not yet come to a decision, but should they demand the restoration of the Cuahu Teotlehu and we refuse, it will have a tremendous adverse impact on our relationship with the faith."
 volcanic_truth.102.a:0 "Good to know."
 volcanic_truth.200.title:0 "Fire and Water"
 volcanic_truth.200.desc:0 "The Volcanic Truth is decided: the conquest of the Taga'Ala is the mandate of the Twin Gods. They are worshippers of the Endless Ocean, but their folk traditions quail in the face of the Volcanic Truth, and we have gone there to teach them the Truth. \n\nAlready, the holy orders of the faith are changing the world around them through force of will and devout zeal, and although the Taga'Ala are fearfully clinging to their old ways, they will soon acknowledge the superiority of the Volcanic Truth. Once they are reborn in fire, their mangroves will serve as the harbors from which yet more missionaries of the Volcanic Truth depart to spread the faith."
 volcanic_truth.200.a:0 "Change is coming."
 volcanic_truth.200.a.tt:0 "We need to own the entire §YTaga'Ala Mangroves§! region and place a §YHoly Order§! in each area there to reap the reward"
 volcanic_truth.201.title:0 "Victory of the Twin Gods"
 volcanic_truth.201.desc:0 "At long last, change has come. Fire sings through the lands of the mangrove trees, and the Taga'Ala now see the world through new eyes. The placid follies of the Endless Ocean have been cast off: what few of its traditions the Taga'Ala still practice have taken their rightful place beneath the rites of the Volcanic Truth.\n\nThe Twin Gods are most pleased. We, their most devout servants, have done well. It was our perseverance and our force of will that made this great change possible, and our brothers in faith consider our great conquest as a sign of the Twin Gods working through us."
 volcanic_truth.201.a:0 "The Twin Gods knew this change would come."
 volcanic_truth.301.title:0 "Mass Eruption of the Twin Gods: Change in Leadership"
 volcanic_truth.301.desc:0 "The people cry out: the world is not changing quickly enough. The Twin Gods see us destroy and build and destroy again, yet things remain constant: the land beneath us, the sky above us, the sea beyond all refuse to give up their forms.\n\nWhat might change instead, an increasing number of our people think, is the one overseeing all this change. Perhaps another ruler might change things faster. Perhaps a change in leadership is a change in itself, and the Twin Gods will be happy if the ones who oversaw the stagnation of before are sacrificed to them."
 volcanic_truth.301.a:0 "Change or die!"
 volcanic_truth.301.b:0 "We must hold fast!"
 volcanic_truth.302.title:0 "Mass Eruption of the Twin Gods: Change in Government"
 volcanic_truth.302.desc:0 "As everything changes around us, the implementation of change within our realm remains disturbingly bound to established institutions. Mechanisms for change are proposed and discussed in the same hallowed halls which have housed our government for many years, enacted by the same legislative procedures devised by our ancestors, and approved by the same people who have always made the decisions. Can this truly be called change?\n\nIf there truly is to be a genuine change in the lands of the Volcanic Truth, the methods by which we change the world around us must change as well. We must experiment with new and radical forms of decision-making, so that the very direction we change in is itself in constant flux."
 volcanic_truth.302.a:0 "Change or die!"
 volcanic_truth.302.b:0 "We must hold fast!"
 volcanic_truth.303.title:0 "Mass Eruption of the Twin Gods: Change in Culture"
 volcanic_truth.303.desc:0 "The world may be changing in new and unfathomable ways, but the way we live remains the same. After the people of our realm spend their day attempting to change the world, they return to homes built by their ancestors, where they speak a language that has been spoken since time immemorial and interact with one another the same way their grandparents did.\n\nWe do not need a mere change in norms: we must change everything about the way we live. There are new and interesting ideas we could adopt from cultural minorities and people who came here from abroad. If we were to restructure our lives in accordance with their ways and invite more newcomers to our lands, it would destroy centuries of stagnant tradition in a single fell swoop."
 volcanic_truth.303.a:0 "Change or die!"
 volcanic_truth.303.b:0 "We must hold fast!"
 volcanic_truth.304.title:0 "Mass Eruption of the Twin Gods: Change in Faith"
 volcanic_truth.304.desc:0 "The Volcanic Truth is changing as quickly as it can, but the clergy has always been clear that even if change is paramount, it is merely a means to an end, all in the service of what might come after. The role of the Volcanic Truth has always been to change the world in service of the Twin Gods, rather than change merely for the sake of change.\n\nAnd yet, this is the way it has always been. The Twin Gods erupted in anger that we refused to change the world around us. The new faith of the Molten Eternity has swept across Kanolowele in a short time, bringing with it radical new ways of thinking. It is undeniable that they have served as a potent source of change. While everything else has changed around us, the one source of constancy remaining has been our faith.\n\nCould the final command of the Twin Gods be to forsake them?"
 volcanic_truth.304.a:0 "We must give up everything that we are! Change or die!"
 volcanic_truth.304.b:0 "This is a change too far."
 volcanic_truth.305.title:0 "Mass Eruption of the Twin Gods: Change in Command"
 volcanic_truth.305.desc:0 "We have changed the ways in which we interact and live. We have even changed our deepest moral foundations to fulfil the mandate of the Twin Gods. What we have not yet changed is the ways in which we enforce change abroad.\n\nA military, at its core, is merely a tool of inducing change by force in lands that lie beyond our borders. It was once a priority whether these changes were beneficial to our realm or not, but we now live in a time of change for change's sake. And yet, while they have changed their stratagems and battle formations, the commanders of our troops remain securely in their posts. Perhaps this is no longer enough. We need to remove the people in charge of the military in order to increase the pace of change."
 volcanic_truth.305.a:0 "Change or die!"
 volcanic_truth.305.a.tt:0 "Up to §Y3§! of your §YAdmirals§! and up to §Y3§! of your §YGenerals§! will be killed"
 volcanic_truth.305.b:0 "We must hold fast!"
 volcanic_truth.306.title:0 "Mass Eruption of the Twin Gods: Change in Fealty"
 volcanic_truth.306.desc:0 "In ordinary times, the clergy of the Volcanic Truth is focused on changing the world within our borders with easily envisionable ends in mind. However, we find ourselves in extraordinary times, and we have already changed much of the world within our borders. As we change and change again, it has occurred to the magmascryers that we also hold overlordship over countries beyond ours, and that allowing them to go free would both change our relationship with them and free them to change themselves in swift and unpredictable ways.\n\nThis would be a change to our detriment, but all that matters right now is that we change, not whether the results of this change are beneficial."
 volcanic_truth.306.a:0 "Change or die!"
 volcanic_truth.306.b:0 "We must hold fast!"
 volcanic_truth.307.title:0 "Mass Eruption of the Twin Gods: Change of Everything"
 volcanic_truth.307.desc:0 "We have changed everything we can think of, and yet the Twin Gods are not satisfied. It must be the case that there is still more that needs to be changed: nothing is too insignificant or impractical to be considered. \n\nWe must change the routes of our roads, and the positions of the buildings along them. We must change the structure of our language, and the very concepts it means to express. Then we must change it all again, until the Twin Gods are satisfied."
 volcanic_truth.307.a:0 "Change or die!"
 volcanic_truth.307.a.tt:0 "Every owned province:"
 volcanic_truth.307.b:0 "We must hold fast!"
 volcanic_truth.308.title:0 "Mass Eruption of the Twin Gods: Conclusion"
 volcanic_truth.308.desc:0 "We have endured our rebirth in the fires of change, and now the zeal of our people is satisfied. The world we inhabit would be unrecognizable to the one our predecessors lived in before the mandate of the Twin Gods, and both magmascryers and the common people agree that, at long last, enough change has been wrought upon the world.\n\nEven if the process of change was long and arduous, we now stand to benefit from the results our work has yielded. Even if we did not have a specific goal in mind as we changed, we have metamorphosed, and our experiences during our flurry of change have taught us something about discipline and the endurance of hardship.\n\nAs we move forward, it is important that we do not forget what we have learned from the Twin Gods during this trying time. Perhaps one last change is warranted - if we change the orders that spread the Volcanic Truth throughout our land, we can ensure that we carry these lessons into the future."
 volcanic_truth.308.a:0 "This is the will of the Twin Gods."
 volcanic_truth.311.title:0 "Mass Eruption of the Twin Gods: Change in Fealty"
 volcanic_truth.311.desc:0 "In ordinary times, the clergy of the Volcanic Truth is focused on changing the world within our borders with easily envisionable ends in mind. However, we find ourselves in extraordinary times, and we have already changed much of the world within our borders. As we change and change again, it has occurred to the magmascryers that we also hold overlordship over countries beyond ours, and that allowing them to go free would both change our relationship with them and free them to change themselves in swift and unpredictable ways.\n\nThis would be a change to our detriment, but all that matters right now is that we change, not whether the results of this change are beneficial."
 volcanic_truth.311.a:0 "Change or die!"
 volcanic_truth.311.b:0 "We must hold fast!"
 
 #Holy Order
 yollonana_order:0 "Yollonana Order"
 yollonana_order_desc:0 "Change can come from the outside world, but the Order of Yollonana believes that the best change is the change that grows from within. This order sees their highest duty as organizing the aid, resources, and volunteers to help communities change their surroundings and ways of life for the better. After all, sometimes people need a little help if they are to embrace what they know they can become."
 yectlamo_order:0 "Yectlamo Order"
 yectlamo_order_desc:0 "When a volcano erupts, it draws on all the power of the earth to change the world around it. The Order of Yectalmo believes that if the Volcanic Truth is to change the world, it must be able to draw upon the full support of the government. Their self-appointed task is to serve as the conduit between the faith and the state. Through their efforts all within the realm may live in accordance with the sacred truth, even those living in far-off rural corners of the country, where the faith's teachings might otherwise not reach."
 liztialoli_order:0 "Liztialoli Order"
 liztialoli_order_desc:0 "Lava does not care what it scorches, only that it burns. The Order of Liztialoli sees it as their sacred duty to make sure that the burning lava within the souls of the followers of the Volcanic Truth is directed towards appropriate ends. In this way, the Volcanic Truth can create a world that is always in flux. Lava may burn away the old, reshape what is already present, or create new wonders, but it must never be allowed to cool."
 tlanhau_order:0 "Tlanhau Order"
 tlanhau_order_desc:0 "When the eruption of a volcano ends, the proper response is not grief, but celebration, for out of what has been lost beneath the fires something new and wonderful will emerge. The Order of Tlanhau dedicate themselves to providing aid to the victims of devastation, whether from natural disasters, war, or Holohana attacks. In this way, the Order of Tlanhau brings beauty from ruin."
 molomoa_order:0 "Molomoa Order"
 molomoa_order_desc:0 "The Twin Gods are great and terrible, but if it were not for the sea around them, their great eruptions would not birth new land. This is why the Order of Molomoa values the mutable sea just as they do the firm ground, and it is unsurprising that their number is made up mainly by the merchants and sailors of Kanolowele. The members of the Order of Molomoa tend to be an independent bunch, and worship change through solitary voyages of exploration, discovery, and veneration of the sea through Wavesong."
 cuauholoi_order:0 "Cuauholoi Order"
 cuauholoi_order_desc:0 "What good is change if we cannot recognize it, and continue on the same path as we always have? The Order of Cuauholoi believe that self-improvement is a type of change in and of itself, and devote themselves to change through introspection and service to others. The Order of Cuauholoi also believes that only by spending time in isolated surroundings which allow for an undisturbed look deep within oneself can one master the change within. They often serve as mariners and sailors, as they consider sea voyages such a form of meditative seclusion."
 hueiala_order:0 "Hueiala Order"
 hueiala_order_desc:0 "A volcano is good to its friends, but terrible to its enemies. The same soil at the foot of the volcano that grows the tallest crops will kill those who stand there when the volcano erupts. Similarly, the Order of Hueiala is good to its friends, but terrible to its enemies - they may maintain the roads in peace, but when war comes they will be the first to kill any enemy troops who dare to walk them."
 hakumaco_order:0 "Hakumaco Order"
 hakumaco_order_desc:0 "The volcano is the unquestioned master over its domain, for it uses the fire within itself to change the world how it sees fit. The Order of Hakumaco also believes that each person has a fire within them that they must stoke to fuel change. There are many different kinds of change, however, and the Order of Hakumaco is just as likely to encourage its members to serve in the army as it is to encourage them to dedicate themselves to their religious duties."
 tzohanu_order:0 "Tzohanu Order"
 tzohanu_order_desc:0 "Change is a good thing, but without the Volcanic Truth there can be no true understanding of how this change reshapes the world. This is why the Order of Tzohanu devote themselves to the eternal struggle against all that oppose righteous change, both within their order and the world beyond. They believe that if you have not fed everything you are to the fire within, it does not yet burn hot enough."
