l_english:

 #Incidents
 incident_volcanic_organizational_crisis_title:0 "Organizational Crisis"
 incident_volcanic_organizational_crisis_desc:0 "The Cuahu Teotlehu served as sacred interpreters and priests to the Twin Gods for generations, but recent changes in the control over access to the Twin Gods have led to their displacement. The faithful of the Volcanic Truth placed great stock in their guidance, but without access to the volcanoes their proclamations carry little importance. The Volcanic Truth must determine who the Twin Gods truly wish to commune with, their stance on the displacement of the Cuahu Teotlehu, and what these changes will mean for the realms of Kanolowele."
 incident_volcanic_taga_ala_influence_title:0 "Taga'Ala Influence"
 incident_volcanic_taga_ala_influence_desc:0 "More and more, our traders are coming into contact with the people of the mangroves, who call themselves Taga'Ala. As their merchants travel along our trade routes and their goods flood our markets, we have acquired familiarity with their culture, and have discovered to our dismayed surprise that they know nothing of the Volcanic Truth. Their presence has forged ties which now present an opportunity for us to bring the Volcanic Truth to their homeland."
 incident_volcanic_mass_eruption_of_the_twin_gods_title:0 "Mass Eruption of the Twin Gods"
 incident_volcanic_mass_eruption_of_the_twin_gods_desc:0 "An eruption of either Muatlaqua or Quahopilo is a significant event in the Volcanic Truth, and traditionally triggers a wave of religious fervor among the magmascryers and the people as they struggle to determine what request the erupting Twin God is conveying. Now, both Twin Gods have erupted simultaneously. This time, there is no need to debate what the Twin Gods ask of us, for we already know. Everything must change."
 incident_volcanic_weakening_of_the_kiamoa_title:0 "Weakening of the Kiamoa"
 incident_volcanic_weakening_of_the_kiamoa_desc:0 "The lands within the Kiamoa might change and evolve through the spread of new ideas, but the Kiamoa itself has always been a constant, until now. The Kiamoa is noticeably lessening in strength, and it is now even possible to sail sturdy ships through it. This unprecedented change to the Kiamoa will bring great change to Insyaa in turn, to be sure, but what will that change mean for us?"
 incident_volcanic_the_molten_eternity_title:0 "The Molten Eternity"
 incident_volcanic_the_molten_eternity_desc:0 "Across lands that once followed the Volcanic Truth, something new has emerged: they call it the Molten Eternity. Even the wisest elders and most learned magmascryers do not know what to make of these beliefs. Are they an evolution of the Volcanic Truth, a needed change in accordance with the will of the Twin Gods, or a dangerous heresy that must be destroyed for change to truly flourish? We do not know the answer, but we must decide quickly: the Molten Eternity is spreading across the land like a lava flow."
 incident_volcanic_a_dragon_turtles_place_title:0 "A Dragon Turtle's Place"
 incident_volcanic_a_dragon_turtles_place_desc:0 "Until recently, we had only sparse contact with a few select Dragon Turtles. We knew the legends: it is said that the elders of our elders many generations ago were great friends with the Dragon Turtles, but that all changed when they were taken from us. Since then much has changed, and over time, the remaining Dragon Turtles have once again become a common sight in the lands of the Volcanic Truth. Now we must determine what that change means for us. We must decide: are the Dragon Turtles allies or enemies? Would we serve change best by reconciling with the Dragon Turtles, or would it be our undoing?"
 incident_volcanic_mechanim_awakening_title:0 "Mechanim Awakening"
 incident_volcanic_mechanim_awakening_desc:0 "Mechanical beings are emerging from the Hinuilands. We have seen their inanimate bodies before, but until now their eyes were devoid of life and we knew little of them. Now, the mechanicals are awakening more and more of their kind across the isles of Kanolowele, and the faithful are unsure what this change portents. But we as the leaders of the Volcanic Truth cannot cower in fear: this is a great change, and change is at the heart of our faith. We must determine who these “Mechanim” are, what changes they bring, and what this change means for the Volcanic Truth."
 
 
 #Estate
 estate_church_molten_eternity_guaranteed_autonomy:0 "Kindle New Fires"
 estate_church_molten_eternity_guaranteed_autonomy_desc:0 "Even the Volcanic Truth can grow stagnant if we let it. The creed of the Molten Eternity may be misguided, but we must not stand in its way. Their practices will add new and interesting ideas to the Volcanic Truth, and in this way help us to change."
 estate_church_volcanic_truth_mechanim_diplomats:0 "Volcanic Truth Mechanim Diplomats"
 estate_church_volcanic_truth_mechanim_diplomats_desc:0 "With the mechanim joining our communities, their awakening represents an opportunity for change across Insyaa. Making them part of our diplomatic corps will allow them to participate in society more fully. As long as Mechanim are §Tintegrated§!, we gain §G+1§! diplomat" #CHECK
 estate_church_volcanic_truth_mechanim_merchants:0 "Volcanic Truth Mechanim Merchants"
 estate_church_volcanic_truth_mechanim_merchants_desc:0 "The mechanim are heralds of change, and giving them the tools to spread their ways through trade will help the Volcanic Truth change alongside them. As long as Mechanim are §Tintegrated§!, we gain §G+1§! merchant" #CHECK
 estate_church_volcanic_truth_mechanim_missionaries:0 "Volcanic Truth Mechanim Missionaries"
 estate_church_volcanic_truth_mechanim_missionaries_desc:0 "Teaching the mechanim the Volcanic Truth will help them change alongside us, and in turn this will also help us spread the faith. Equipping their number with the tools to bring the Volcanic Truth to others will be a beneficial change for both us and them. As long as Mechanim are §Tintegrated§!, we gain §G+1§! missionary" #CHECK

