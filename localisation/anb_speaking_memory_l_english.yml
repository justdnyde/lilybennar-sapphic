 #Abilities
 speaking_memory_aspect_listen_to_dragon_turtle:0 "Listen to a Dragon Turtle"
 desc_speaking_memory_aspect_listen_to_dragon_turtle:0 "The Dragon Turtles have unparalleled knowledge of the past and its people. If we were to take the time to listen to them, their knowledge could become ours as well.\n--------------\nRandom owned Dragon Turtle province gains\n'§YListening to Stories§!' for 5 years, giving the following effect:\nMinimum Local Autonomy: §R+50.00§!\n\nGain §G5%§! Memory if we are §Gfriendly or above§! with that provinces Dragon Turtle. Otherwise gain §G2.5%§! Memory."
 speaking_memory_aspect_record_ancestral_tales:0 "Record Ancestral Tales"
 desc_speaking_memory_aspect_record_ancestral_tales:0 "The keepers of the Speaking Memory are living repositories of all the tales of the living and the dead, but if they are to remember the information, it must be tied into kipu for them. The lay clergy of the Speaking Memory are traditionally the ones to undertake this task, and at times a large part of the clergy are relieved of their normal duties to solely record tales for a while.\n--------------\nGain '§YRecording Tales§!' for 10 years, giving the following effects:\nNational Tax Modifier: §R-25.0%§!\n\nIf §YClergy§! Estate loyalty is §Y60§! or more gain §G10%§! Memory\nIf §YClergy§! Estate loyalty is NOT §Y60§! or more gain §G5%§! Memory instead."
 speaking_memory_aspect_cultural_exchange:0 "Cultural Exchange"
 desc_speaking_memory_aspect_cultural_exchange:0 "If a story is held by one person it dies with them, but if it is held by many people it lives on forever. This is why Speaking Memory adherents sometimes spread stories across cultural lines, to ensure their safety even in the event of a disaster.\n--------------\nGain '§YCultural Exchange§!' for 10 years, giving the following effects:\nMissionary Strength: §R-5.0%§!\nTolerance of Heretics: §G+2.00§!\nTolerance of Heathens: §G+2.00§!\nCulture Conversion Cost: §R+100.0%§!\nCulture Conversion Time: §R+100.0%§!\nPromote Culture cost: §G-50.0%§!\n\nGain §G5%§! Memory + an additional §G1%§! Memory per §Y5§! non-Primary Accepted culture province we own."
 speaking_memory_aspect_defend_ancestral_sites:0 "Defend Ancestral Sites"
 desc_speaking_memory_aspect_defend_ancestral_sites:0 "A monument is a memory written in stone, and this is why the Speaking Memory places great emphasis on protecting the works of the ancestors. By sending some soldiers to protect these monuments, a Speaking Memory nation can protect its legacy and encourage others to do the same.\n--------------\nGain '§YGuarding Ancestral Sites§!' for 10 years, giving the following effects:\nManpower Recovery Speed: §R-15.0%§!\n\nIf we have at least §Y50%§! Manpower or more gain §G10%§! Memory\nIf we DON'T have at least §Y50%§! Manpower or more we gain §G5%§! Memory instead.\nLose §R-1000§! Manpower."
 speaking_memory_aspect_ancestral_emulation:0 "Ancestral Emulation"
 desc_speaking_memory_aspect_ancestral_emulation:0 "All the people of the Speaking Memory faith are remembered through the Dragon Turtles, but the line of a ruler is especially august and important. Rulers of the Speaking Memory sometimes withdraw from the world to learn from and reflect on their ancestors in hopes of keeping their memory alive and carrying their wisdom forward into the future.\n--------------\nGain '§YRuler Emulating Ancestors§!' for 6 months, giving the following effects:\nMonthly Administrative Power: §R-1§!\nMonthly Diplomatic Power: §R-1§!\nMonthly Military Power: §R-1§!\n\nAfter §Y6§! months our ruler will gain §G+1§! in Administrative, Diplomatic or Military.\nIf this improves Administrative, Diplomatic or Military to §Y4§! or higher we lose Memory. \n§Y4§!: §R-5%§! Memory | §Y5§!: §R-10%§! Memory | §Y6§!: §R-15%§! Memory"
 speaking_memory_aspect_recruit_from_the_keepers:0 "Recruit from the Keepers"
 desc_speaking_memory_aspect_recruit_from_the_keepers:0 "The keepers of the Speaking Memory are chosen carefully for their intellect by the clergy, and it is frowned upon to recruit them for other tasks besides the honoring of legacy. All the same, sometimes a keeper comes along with talents so valuable that they must be pulled away from their duties, despite their importance.\n--------------\nWe lose §R5%§! Memory.\n\nWe gain a random skill §Y1§! advisor that is §G50%§! cheaper for your country to employ.\nWe may spend an additional §R5%§! Memory to choose what type of advisor we gain."
 speaking_memory_aspect_heroes_tale_kanolowele:0 "Hero's Tale"
 desc_speaking_memory_aspect_heroes_tale_kanolowele:0 "The heroes of the Speaking Memory faith are crucial to its legacy, and on occasion the clergy of the Speaking Memory will go forth into the broader world to spread their tales. The people have heard most of the tales before, of course, but the experience of hearing the tales again is often just as treasured as the tales themselves, as is the storytelling skill involved. The clergy tell all the heroes’ tales they know, but it is often the case that one of them resonates more than the others.\n--------------\nWe gain a §GRandom Country Modifier§! based on one of the Heroes of Kanolowele for §Y10§! years at the cost of §R5%§! Memory.\nWe may spend an additional §R5%§! Memory to empower the modifier."
 speaking_memory_aspect_seek_a_dragon_turtles_expertise:0 "Seek a Dragon Turtle's Expertise"
 desc_speaking_memory_aspect_seek_a_dragon_turtles_expertise:0 "The Dragon Turtles are not just repositories of past lives, but great sources of wisdom on every topic imaginable. By going to the Dragon Turtles and asking them questions about their experiences and fields of expertise, a Speaking Memory nation can reap some of the benefits of their knowledge.\n--------------\nWe lose §R5%§! Memory.\n\nRandom owned Dragon Turtle province gains\n'§YAsking Expertise§!' for 5 years, giving the following effect:\nMinimum Local Autonomy: §R+50.00§!\nWe then get to choose one of two §Gbonuses§! based on that §YDragon Turtle's§! personality."
 speaking_memory_aspect_landslide_heroes:0 "Landslide Heroes"
 desc_speaking_memory_aspect_landslide_heroes:0 "The strength of combat units comes from the individuals within it, this much is true, but what is often overlooked is that once an individual becomes part of a unit, that unit takes on the story of that person forever. The unit and that person, become the same. And all who join it after take on the mantle of those great deeds.\n--------------\nWe lose §R10%§! Memory.\n\n§YLandslide Infantry§! gain: \n§G+10%§! Morale of Armies\n§R+25%§! Unit Maintenance\nfor §Y10§! years."

 #Events
 flavour_speaking_memory.1.t:0 "Loss of Memory"
 flavour_speaking_memory.1.d:0 "Our Memory Speaker priests have a sacred duty to remember the stories of every member of our tribe, so that the dead may live forever so long as someone remembers them. Now, something terrible has happened - one of our priests has begun to lose their memory while still in the prime of life. Worse, it has been many years since they most recently went on a pilgrimage to tell their stories to the Dragon Turtles, whose immortality and perfect memories ensure that none whose tales are told to them will ever be lost. While senility is always a terrible tragedy, we now risk losing the stories of many of our recently deceased; consigning them to oblivion if we do not act fast."
 flavour_speaking_memory.1.a:0 "Speakers trade stories regularly. Gather and reconstruct what we can."
 flavour_speaking_memory.1.b:0 "If we hurry, we can tell the Turtles our stories before it's too late."
 flavour_speaking_memory.1.c:0 "The sky carries every story ever told, and we know how to listen."
 flavour_speaking_memory.1.e:0 "Our speakers now write their stories, to ensure that none are lost."
 
 flavour_speaking_memory.2.t:0 "Vagaries of Memory"
 flavour_speaking_memory.2.d:0 "We hold regular festivals in conjunction with our neighbors to exchange the stories of the dead and ensure that none are lost. During a recent festival with [speaking_memory_argument.GetName], one of our Memory Speakers was telling a great tale about one of our distant ancestors when they were interrupted by a [speaking_memory_argument.GetAdjective] Memory Speaker. The foreign Speaker claims that our story is false - that they know it with critically different details. An argument ensued, and the festival ended on a sour note. This is a serious problem, since carrying the memories of the fallen is the greatest duty of our faith. So long as we remember them, they are safe from oblivion, but what happens if they are not remembered accurately? If we have misremembered this... what else might we have misremembered?"
 flavour_speaking_memory.2.a:0 "They are lying. They must be."
 flavour_speaking_memory.2.b:0 "Perhaps our version is wrong. Now that we know, we can correct it."
 flavour_speaking_memory.2.c:0 "Surely the Dragon Turtles remember the correct version. Ask them."
 flavour_speaking_memory.2.e:0 "Truth lies in the space between the tales. Together we shall find it."
 flavour_speaking_memory.2.f:0 "So long as we hold the essence of their memories they will live on."
 
 speaking_memory_argument:0 "Speaking Memory Argument"
 speaking_memory_insult:0 "Speaking Memory Insult"
 speaking_memory_reconciliation:0 "Speaking Memory Argument Resolved"
 
 flavour_speaking_memory.3.t:0 "The Dragon Turtles Respond"
 flavour_speaking_memory.3.d.1:0 "The expedition we sent to the Dragon Turtles regarding our argument with [speaking_memory_argument.GetName] has responded with their answer!\nBoth stories are correct. There were two unrelated people who happened to have the same name and similar lives."
 flavour_speaking_memory.3.d.2:0 "The expedition we sent to the Dragon Turtles regarding our argument with [speaking_memory_argument.GetName] has responded with their answer!\nThe [speaking_memory_argument.GetAdjective] version of the story is correct. One of our ancestors must have corrupted the story..."
 flavour_speaking_memory.3.d.3:0 "The expedition we sent to the Dragon Turtles regarding our argument with [speaking_memory_argument.GetName] has responded with their answer!\nOur version of the story is correct. One of their ancestors must have corrupted the story. "
 flavour_speaking_memory.3.d.4:0 "The expedition we sent to the Dragon Turtles regarding our argument with [speaking_memory_argument.GetName] has responded with their answer!\nBoth versions are mostly correct. Minor details have shifted over time, but nothing that threatens the core truth."
 flavour_speaking_memory.3.d.5:0 "The expedition we sent to the Dragon Turtles regarding our argument with [speaking_memory_argument.GetName] has responded with their answer!\nThe Dragon Turtles have no memory of this story. Did some long lost Memory Speaker fail to pass the story on to them? Was the story created from nothing? Can the Turtles... forget? Surely not. Certainly not."
 flavour_speaking_memory.3.a:0 "Now we know the truth."
 flavour_speaking_memory.3.b:0 "We may never know the truth."
 flavour_speaking_memory.3.b.tt:0 "Every owned §!Speaking Memory§! province will gain §R+5§! unrest."
 
 speaking_memory_funny_coincidence:0 "Speaking Memory Friendly Coincidence"
 
 flavour_speaking_memory.4.t:0 "A Hero of Kanolowele?"
 flavour_speaking_memory.4.d.1:0 "One of our people's favorite stories is that of Mokai, a great hero who lived long before the Day of Ashen Skies. Known for having once wrestled a storm into submission to avert a flood, he serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if he actually existed. Is it really possible for a human to slay a Holohana? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Mokai, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.2:0 "One of our people's favorite stories is that of Keala, a great hero who lived long before the Day of Ashen Skies. Known for having memorized the dying stories of a Dragon Turtle and transferred them to another, in order that none would be lost, she serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if she actually existed. Is it really possible for a human to stay awake for twenty one days and nights? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Keala, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.3:0 "One of our people's favorite stories is that of Malie, a great hero who lived long before the Day of Ashen Skies. Known for having crafted the first common code of laws across all Kanolowele, she serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if she actually existed. Is it really possible for a human to be as wise a judge as a Dragon Turtle? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Keala, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.4:0 "One of our people's favorite stories is that of Kaimana Mano, a great hero who lived long before the Day of Ashen Skies. Known for having turned into the first shark to pursue justice forever, he serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if he actually existed. Is it really possible for a human to shatter an island into three parts without magic? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Kaimana Mano, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.5:0 "One of our people's favorite stories is that of Kaikal€, Mother of Stars, a great hero who lived long before the Day of Ashen Skies. Known for having learned the songs of the winds, tides, and stars, she serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if she actually existed. Is it really possible for a human to have sung to the stars with such compassion that the agreed to descend upon Halann and live beneath the waves? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Kaikal€, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.6:0 "One of our people's favorite stories is that of Ula'ahi, a great hero who lived long before the Day of Ashen Skies. Known for having braved a volcano's wrath to convince three Dragon Turtles to flee the incoming eruption, he serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if he actually existed. Is it really possible for a human to survive being caught in volcanic fire? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Ula'ahi, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.7:0 "One of our people's favorite stories is that of Pure Liko, a great hero who lived long before the Day of Ashen Skies. Known for having adventured across Kano'lowele with a pure heart in order to find the cure to a terrible sickness, he serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if he actually existed. Is it really possible for a human to have appeased the voracious Serpent Queen with nothing but a white flower and an innocent spirit? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Liko, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.8:0 "One of our people's favorite stories is that of Kaleo of Mokulali, a great hero who lived long before the Day of Ashen Skies. Known for having ruled the legendary island of Mokulali with great wisdom, he serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if he actually existed. Is it really possible for a human to have protected the entire population of his island from the Day of Ashen Skies? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Kaleo, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.9:0 "One of our people's favorite stories is that of Kau’i’noe of Kuahoi’i, a great hero who lived long before the Day of Ashen Skies. Known for having sailed into the Kiamoa on a vessel of living metal, he serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if he actually existed. Is it really possible for a human to survive sailing into that terrible storm? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Kau'i'noe, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.10:0 "One of our people's favorite stories is that of Silakai Sealkin, a great hero who lived long before the Day of Ashen Skies. Known for having been raised by a famile of hinuiseals, he serves as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if he actually existed. Is it really possible for a humanh to pull the ocean floor to the surface using a seal fishook? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Silakai, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.d.11:0 "One of our people's favorite stories is that of Mahteemahteemowtoomowtoo Kykahpay Haupookarry 'Cleftclaw Outruns the Wind', a great hero who lived long before the Day of Ashen Skies. Known for having outrun the wind to bring warning of a terrible storm, they serve as an inspiration to our people - a model of what a good life looks like. Recently, though, some of our people have started to doubt if they actually existed. Is it really possible for a mechanim to run faster than sound itself? How can we know the truth about events that happened so terribly long ago? We already sent an expedition to ask the Dragon Turtles, of course, but they refused to answer any questions about Mahteemowtoo, or even to explain why they abstained. It appears that we must solve this problem ourselves."
 flavour_speaking_memory.4.a:0 "Of course the stories are true. Doubt is a threat to our faith."
 flavour_speaking_memory.4.a.tt:0 "Every owned §YSpeaking Memory§! province will gain §G-2§! unrest."
 flavour_speaking_memory.4.b:0 "These stories are told across Kanolowele. We can’t all be wrong."
 flavour_speaking_memory.4.c:0 "The Turtles are wise. Perhaps we were not meant to know."
 flavour_speaking_memory.4.e:0 "These stories are true, regardless of if they actually happened."
 flavour_speaking_memory.4.f:0 "Many Mechanim were created long ago, perhaps some still remember?"
 flavour_speaking_memory.4.g:0 "Truth matters less than what the people believe to be true."
 flavour_speaking_memory.4.g.tt:0 "Every owned §YSpeaking Memory§! province will gain §G-5§! unrest."
 
 flavour_speaking_memory.100.t:0 "Listening to Dragon Turtle Stories"
 flavour_speaking_memory.100.d:0 "The Dragon Turtle reclined in their lair. “When your predecessor left off, we were in the 600s. Would you like to continue on from that point, or are there other gaps in the record that need filling?” The scribe looked up at him. “I think it’s best if we continue on from the stopping point, so that nobody gets missed.”\n\n”Very well, then.” The Dragon Turtle cleared their massive throat, and began to speak. “Kanoa, son of Nalu. Malea, daughter of Nalu. Anela, daughter of Nalu. Mahina, daughter of Nalu. Mano, son of Liko. Keanu, son of Liko. Liko, son of Liko. Kailani, daughter of Liko…”\n\nAs the scribe knotted each name down, his lips moved to repeat them."
 flavour_speaking_memory.100.a:0 "Anela, daughter of Liko. Kaimana, son of Tama. Raku, son of Tama..."
 flavour_speaking_memory.101.t:0 "Recording Tales of our Ancestors"
 flavour_speaking_memory.101.d:0 "The space around the bonfire was full to bursting, and yet more songsmiths and writers crammed around it. Each held court in a different section of the fire, and so the ancestors’ tales bled together into a sort of reverent cacophony. But at each corner of the fire there were people listening, and ideas for how to spread these tales beyond the bonfire began to bloom in each mind.\n\nThere were tales of famine, hardship, prosperity, knowledge gained, and love lost. Each of those tales was a memory, but it was a person too, whose afterlife depended on spreading their memories far and wide. As the bonfire wore down across a long night, tales were set to music, intertwined with one another, and renewed for generations to come."
 flavour_speaking_memory.101.a:0 "This is how the afterlife is secured."
 flavour_speaking_memory.102.t:0 "Promoting Cultural Exchange"
 flavour_speaking_memory.102.d:0 "“At this point the field was more tent than field, and yet people kept coming. One such person arrived on the very edge of the chaos, and pitched his tent next to an empty space, which was promptly filled by a kobold with a wooden flute strapped to her chest. \n\nHe gawked for a bit: this was unexpected. Was she some sort of lizard?\n\n”Hello,” he said, providing an opportunity to begin conversation. The woman didn’t look up, and began playing a tune on her flute as she sat atop some crates. He decided to try again. “Would you like to hear the story of-”\n\nShe played on, and at once the rocks around her space began to shape themselves into a very nice house, complete with a small pool and a wooden fence. She looked at him with an irritating grin. “Would you like to hear the story of me? I came here to tell it.”\n\nThe man looked out across the field, which was already beginning to smell like cooking fires. The echo of hundreds and hundreds of tales of all the different parts of Insyaa formed a great low murmur, all being told at once. And yet, the tales out there couldn’t turn stones into wood, and they weren’t told by people as interesting as this one. He looked back at the kobold. “If you buy us dinner.””"
 flavour_speaking_memory.102.a:0 "All stories have to start somewhere."
 flavour_speaking_memory.103.t:0 "Support Ancestral Site Defense"
 flavour_speaking_memory.103.d:0 "The soldiers couldn’t help but feel a bit silly marching around the ruins on the first day. There wasn’t an enemy to fight besides some enterprising vandals, and even those came infrequently and could be dealt with by a stern talking-to. There were only ten or so of them, and they were marching around the fallen stone in their nicest uniforms. Their bright attire flashed against the sun-bleached stone. If real invaders came, who were bent on destroying the ancestral sites, all they’d have to do is walk right on in.\n\nOn the second day, some people came to watch. The soldiers marched a bit straighter, and took their corners at a sharper angle. On the third day, the spectators brought friends, and one of them was an artist. A scene was painted of the day, and it was given to the soldiers to hang in the ruins themselves. Things continued on like this for a while. By the end of the first month, the soldiers had the best assignment in [Root.GetName], and the ruins had been painted to look new again."
 flavour_speaking_memory.103.a:0 "People had remembered."
 flavour_speaking_memory.104.t:0 "[Root.Monarch.GetName] Reminiscing on Ancestors"
 flavour_speaking_memory.104.d:0 "For the first time since [Root.Monarch.GetName] stepped outside the gates of the palace, [Root.Monarch.GetSheHe] began to feel unsure. Could [Root.Monarch.GetSheHe] really become a better ruler, just by contemplating the records of [Root.Monarch.GetHerHis] ancestors? It had seemed so simple when the advisors proposed it, but now that the reality of study away from warm baths and hot food was beginning to sink in, [Root.Monarch.GetSheHe] was beginning to feel unsure.\n\nIf there was a benefit to this new seclusion, it was getting away from the petitioners. And the diets. And the reports. [Root.Monarch.GetName] clutched [Root.Monarch.GetHerHis] scrolls a bit closer. Whatever was in them, surely it would be more interesting than the day to day duties of rulership. Perhaps, [Root.Monarch.GetName] thought, that was what the ancestors thought when they embarked on their periods of contemplation."
 flavour_speaking_memory.104.a:0 "[Root.Monarch.GetSheHeCap] was feeling closer to them already."
 flavour_speaking_memory.105.t:0 "[Root.Monarch.GetName] has found Clarity"
 flavour_speaking_memory.105.d:0 "[Root.Monarch.GetName] ran as quickly as [Root.Monarch.GetHerHis] feet could carry [Root.Monarch.GetHerHim]. There was so much to do, and the ancestors had ideas about all of it. The realm’s tax issues were nothing compared to taming the waves, and if the Holohana came again, [Root.GetName] could deal with them just as they had so many years ago, with only the wisdom of the ancestors and the grit of their troops keeping the realm safe.\n\nAs [Root.Monarch.GetSheHe] ran, [Root.Monarch.GetSheHe] reflected: it seemed mundane at first, but the only thing separating [Root.Monarch.GetHerHim] from [Root.Monarch.GetHerHis] ancestors was time: [Root.Monarch.GetSheHe] held all the power and wisdom that [Root.Monarch.GetSheHe] had read about in those ancient scrolls, and all [Root.Monarch.GetSheHe] had to do was apply it. All the people across all the land had tales from their ancestors, and those were the very things that made today possible. And if there still was a today, it fell on everyone in that palace, all the people that [Root.Monarch.GetName] had taken for granted, to make sure that there was a tomorrow."
 flavour_speaking_memory.105.a:0 "The ancestors live within every one of us, as long as we remember!"
 flavour_speaking_memory.106.t:0 "Recruiting a Keeper"
 flavour_speaking_memory.106.d:0 "The room of the keeper was sparse. It had to be, to fit all the sheer number of kipu in it. In the middle of all of them was the keeper himself, who was running his hands over the kipu and mouthing names at an imperceptible speed. Five men with important badges stepped into the room.\n\nThe keeper looked up- he was no longer alone. “Do you need to be remembered?” He asked. “What are your names?”\n\n”I’m afraid we need something else from you,” their leader said. He gestured around at the kipu. “The rooms of the other keepers are not nearly as full, and that is because their memories are not the equal of yours. We have a task for a mind as sharp as a sword, and it is only you that can fulfil it.”\n\nThe keeper sat, and thought for a while. “May I bring my kipu with me? Surely I will have time to myself wherever it is that I am being sent. Surely-” his voice began to crack. “Surely there will be time to remember.”\n\n”Others will remember for you, and you will keep what you have already read in your mind.” The leader gestured to the keeper again. “It’s time to go.”\n\nSo with a last look back at his names, the keeper went."
 flavour_speaking_memory.106.a:0 "Looks like the government has some new Administrative talent!"
 flavour_speaking_memory.106.b:0 "We need to take a closer look at this Administrative talent."
 flavour_speaking_memory.106.c:0 "Looks like the government has some new Diplomatic talent!"
 flavour_speaking_memory.106.e:0 "We need to take a closer look at this Diplomatic talent."
 flavour_speaking_memory.106.f:0 "Looks like the government has some new Militaristic talent!"
 flavour_speaking_memory.106.g:0 "We need to take a closer look at this Militaristic talent."
 flavour_speaking_memory.107.t:0 "Recruiting an Administrative Keeper."
 flavour_speaking_memory.107.d:0 "The ex-keeper sat in the middle of a musty room, reading reports about increases and decreases in settlement taxation across [Root.GetName]. The kipu were no less numerous here, but somehow, this just felt less important. Money was temporary, but the afterlife was (or should be) forever. If no one was reading the scrolls, the afterlife would be temporary. With a sigh, the keeper returned to reading, and making notes to himself every now and then."
 flavour_speaking_memory.107.a:0 "Despite the Artistry. He missed his names."
 flavour_speaking_memory.107.b:0 "Despite the Faith. He missed his names."
 flavour_speaking_memory.107.c:0 "Despite the experiments. He missed his names."
 flavour_speaking_memory.107.e:0 "Despite the thinking. He missed his names."
 flavour_speaking_memory.107.f:0 "Despite the debates. He missed his names."
 flavour_speaking_memory.107.g:0 "Despite the magic. He missed his names."
 flavour_speaking_memory.108.t:0 "Recruiting a Dimplomatic Keeper."
 flavour_speaking_memory.108.d:0 "The ex-keeper sat in the middle of a lavishly furnished soiree, where his powerful memory was now being turned to the task of remembering factoids about foreign dignitaries. As he idly munched on the finest new innovations in Seacrest Ogre cuisine, his mind turned to his rapid change in careers. He was working with people, sure, but he was working with people before. Weren’t these diplomats already assured a place in the afterlife? Everyone needs someone to remember them, the keeper thought, but now all he could do was remember what he had already read. He returned to listing the names of the deceased in the back of his mind, not paying much conscious attention to the latest developments in Kanolowele trade."
 flavour_speaking_memory.108.a:0 "Despite the parties. He missed his names."
 flavour_speaking_memory.108.b:0 "Despite the reforms. He missed his names."
 flavour_speaking_memory.108.c:0 "Despite the secrets. He missed his names."
 flavour_speaking_memory.108.e:0 "Despite the state. He missed his names."
 flavour_speaking_memory.108.f:0 "Despite the money. He missed his names."
 flavour_speaking_memory.109.t:0 "Recruiting a Militaristic Keeper."
 flavour_speaking_memory.109.d:0 "The ex-keeper sat in the middle of a command center, where he had been tasked with directing logistics shipments to and fro. Apparently only his memory could handle so many shipments at once, and so he had been torn away from his room, which was so comfortable and had such important work in it. Down his aisle came the general, who had apparently decided that now was the time to ask him about the status of the fourth shipment, which he knew the status of. He knew the status of all of the shipments. But shipments didn’t have afterlives, the keeper thought, and people do. He put his latest bank of reports to be taken away by military staff, and reflected on how sad it was that he hadn’t been assigned to memorize troop shipments instead."
 flavour_speaking_memory.109.a:0 "Despite the reforms. He missed his names."
 flavour_speaking_memory.109.b:0 "Despite the command. He missed his names."
 flavour_speaking_memory.109.c:0 "Despite the troops. He missed his names."
 flavour_speaking_memory.109.e:0 "Despite the recruits. He missed his names."
 flavour_speaking_memory.109.f:0 "Despite the forts. He missed his names."
 flavour_speaking_memory.109.g:0 "Despite the barracks. He missed his names."
 flavour_speaking_memory.110.t:0 "A Hero's Tale"
 flavour_speaking_memory.110.d1:0 "In the lands that would become the Mokaika Islands, there was once born a boy named Mokai. He was a hearty, healthy boy, and his mother was exhausted after giving birth to him. So Mokai picked her up, and he carried her home. Mokai soon grew up. In each of his muscles he had the strength of twenty men, but also the wisdom to know when to use it. He travelled across the land for two and twenty years setting wrongs to rights, until a band of raiders came to his home. Mokai was a strong swimmer, and the raiders were not: Mokai knew this. So he brought down his fists, and he parted the land with his strength. The raiders drowned, and from then on Mokai swam from village to village instead of walking.\n\nEventually, Mokai swam to the Hinuilands, which were plagued by a race of monsters called the Holohana. The people there feared one Holohana most of all, which leapt across the land in great bounds and crushed the forests beneath it. Mokai knew this could not stand, so he ran across the Hinuilands for days and days until he came across the creature, which was leaping towards a village which would be its next meal. Mokai went to the village, and the next time the beast leapt up, it had a passenger. With each bound the beast took, Mokai crept closer to its face, until, while hanging off one of its eyelids, Mokai swung his fist with all his might. The beast bled geysers from its eye, but Mokai crept in through the wound and punched his way out of its skull! The beast did not threaten any more villages after that."
 flavour_speaking_memory.110.d2:0 "Many years ago, a great cataclysm came to the lands of Kanolowele, and it was so great that it destroyed the Dragon Turtles as well. Meteors came to earth, and one such meteor disturbed a mountain, and this mountain fell on the Dragon Turtle Kaumomoku, the Great Strategist. Kaumomoku protected the homes of the people of Kanolowele, and one of his greatest friends was Keala, a village girl with whom he played his favorite games of strategy. Keala’s family was scared, but when she saw her friend trapped under the rocks all she could do was run to help.\n\nThose rocks could not be moved by a Dragon Turtle, much less a human, but Keala stayed with Kaumomoku to give him comfort. And as the rocks crushed his bones, Kaumomoku told her everything he knew, of all the people who he had kept alive in the afterlife. Keala stayed awake with him for seven days and nights, listening, until Kaumomoku went to the afterlife and she could listen no more. With those memories in her mind, Keala sailed across fire and ash for seven more sleepless days and nights to the Dragon Turtle Naauao the Listener, whose mind could hold the legacies Kaumomoku had given to her. She recounted all she had heard to Naauao, and she did not forget a single word. Then she collapsed from exhaustion, and she went to the afterlife with her friend Kaumomoku, where they play their games together to this day."
 flavour_speaking_memory.110.d3:0 "In the days before the Century of Storms, there was a woman named Malie, who was blessed with a peaceful nature and great wisdom from an early age. She became known by her village as a great resolver of disputes, but what she truly loved was the freedom of the open waves. She loved her people and her freedom both, and she thought to take a bit of each for her life by becoming a wayfinder, so she could sail from her island but always stay close to home. She found a man she loved named Tako, and the two of them went voyaging in the day and returned home together in the night.\n\nAnd things would have stayed this way, were it not for a raid on the home of Malie and Tako by an enemy village. Malie managed to hide, but the raiders killed Tako, and the enemy lived beyond the reach of the tribe’s justice. So Malie took her boat which she once used for navigating, and she travelled across the islands of Kanolowele to the other tribes and the Dragon Turtles. She spoke to them about creating a great system of laws, which all the tribes would create together and enforce together. She encountered derision at first, but the Dragon Turtles came to agree, and soon when she sailed between the islands the Dragon Turtles followed her. This system of laws became the First Consensus of Kanolowele, and Malie sat as a judge for the Consensus with the Dragon Turtles until she died. The First Consensus continued on without her, but at each of its sessions until its end, next to the place where the judges sat, there was left an empty chair."
 flavour_speaking_memory.110.d4:0 "Long ago, three islands were once one. On this island lived the fisherman Kaimana Mano, who lived a simple life in a powerful tribe, bringing forth the bounty of the sea to feed his countrymen. Kaimana Mano was simple, and he had simple pleasures: his favorite thing to do was walk along the beach, and display the things he found as treasures of the sea. The sea saw him do this all the while, and one day it decided to give him a true treasure besides seashells and driftwood. So as Kaimana Mano walked along the sea, in one of the tidepools he saw a great club, made of wood but with the heft of iron. It had holes in it, but through these holes the sweet sound of the ocean whistled. When Kaimana Mano picked the club up, he heard this sound.\n\nFrom that day forward he knew the deepest secrets of Wavesong, and he left his life as a fisherman to become a wandering hero all about Kanolowele, slaying monsters and forging peace from war. One day, he grew tired of his travels and sang his ship towards home, where he was received warmly by the tribe chief, next to whom stood the most beautiful woman in Kanolowele. That woman was the daughter of the chief, and she and Kaimana Mano were quickly inseparable. After a period of courtship he asked for her hand in marriage, and all she could say was yes.\n\nBut at their wedding feast, evildoers who feared the politics of their union poisoned Kaimana Mano’s wine. They did not foresee that he would swap cups with his wife as in tradition, and she drank the poisoned wine and died. Now the plotters were faced with the terrible rage they sought to avoid by poisoning Kaimana Mano. He stalked the island for a year and a day until each of the conspirators was dead, and then he lifted his club, and with a powerful swing he broke the island as his own union was broken. Kaimana Mano still was not satisfied, and he walked into the water and declared his intention to hunt evildoers forever more. The sweet sound of the ocean heard him again and Kaimana Mano’s form began to twist, until he swam off into the sea as the first shark."
 flavour_speaking_memory.110.d5:0 "In the days before the Kiamoa, there was not yet a reason to fear the sea beyond its terrible vastness. People would sail into the sea and never return, for these were also the days before we knew how to use the stars to find our way. And although the stars ached to help us, we did not know how to ask them. But among the people was a woman named Kaikala, who sang such sweet music that the people came to her with a task. If she could sing the music of the stars, perhaps they would drift down from heaven to guide the ships of Kanolowele.\n\nKaikala was kind-hearted, so she could not help but say yes. On three different nights, she drifted farther and farther away from her island, so she could look up at the sky and listen to its music. On the first night she was lost. On the second night, she did not understand. But on the third night, she heard the music of the stars. She stood alone on her ship and sang to the night, and she moved her feet with a grace the sky had never seen before. The stars were overjoyed that someone finally had the words to ask them for help. They drifted down from the sky, and for one magic night, they swirled around the boat of Kaikala Mother of Stars, and danced in the patterns she sang. And when the sun rose and their dance was done, the stars were so happy that they agreed to stay under the sea and help Kaikala’s people find the way, as long as they remembered the words to sing."
 flavour_speaking_memory.110.d6:0 "Before even the Century of Storms, there was still great peril that could come to Dragon Turtles. The Dragon Turtles even in those days held the memories of many within their minds, and the death of even one would have terrible consequences for those in the afterlife. So when the volcano Muatlaqua erupted on an island where three Dragon Turtles stood and the Speaking Memory faithful saw, all they could do was weep.\n\nAll of them, that is, except for Ula’ahi, who was possessed of the brand of foolish bravery that would lead men in future times to explore across the continent of Insyaa. When Ula’ahi saw the eruption of the volcano, he ran towards it with a speed he did not know he possessed. The lava was flowing towards the three Dragon Turtles, and all Ula’ahi could do was scream at them to move out of the way. But the Dragon Turtles were having a fascinating discussion about a topic that today is remembered by no one but them, and they refused to move out of the way of their impending doom.\n\nFortunately, lava is quite slow to move, so Ula’ahi stood there for days in an attempt to persuade them. He exhausted every trick of reason he knew until finally the lava was almost next to them, and all Ula’ahi could do was scoop up the molten rocks next to the lava flow, and burn himself with them so the Dragon Turtles could finally see the danger.\n\nThey moved after that, with all the help that Ula’ahi could provide them in his agonizing pain. Ula’ahi eventually recovered from his burns, but the scars of his bravery were marked on his face until the day he died."
 flavour_speaking_memory.110.d7:0 "In the days of the Sickness that swept across Kanolowele, there was a great hero, and his name was Nakoa. He quested in search of a powerful stone he had heard tell of called the Pearl of Life, which could cure the Sickness when held by the pure of heart. He sought power and glory. Behind him, there was a boy named Liko, who had also heard the story of the Pearl of Life, and set out on a journey of his own behind the hero Nakoa. He sought to cure his mother.\n\nGlorious Nakoa first went to the Isle of the Serpents, where he sacrificed his companion Ailani to pass through the Serpents’ Den. Behind him was Liko, who gave the Serpents a flower, that they might see his love for his mother. The Serpents let him pass.\n\nPowerful Nakoa then was forced to travel through the storms of Kanolowele, and he and his companions lashed themselves to the hull of their ship and forced their way through. His companion Ikaika was thrown overboard, but Nakoa did not stop. Behind him sailed Liko, who moved with the storm, and was guided instead of hindered by its winds.\n\nConquering Nakoa then arrived at the island of the Pearl, and slashed his way through the trees to its resting place. The trees whispered to him of the treachery of his last companion Haukea. The trees whispered lies. And yet, Haukea did not survive. Behind Bloody Nakoa, Liko did not travel through the trees to the Pearl - he trusted the sea, as he always had. The trees were outraged.\n\nLonely Nakoa emerged victorious with a pearl in the end, but the land withdrew from him. He was stranded on the sea. Desperate Nakoa lay starving and thirsty beneath the sun. Weak Nakoa whispered to the pearl to heal him. The pearl did not listen. Dead Nakoa slumped over on his ship. Glory rolled out of his grasp.\n\nAnd behind him was Liko, who was given the true Pearl by a friendly shark. Liko was guided home by the sea, and he used the Pearl of Life to cure his mother and his people. And when he was done, he returned the Pearl to the ocean."
 flavour_speaking_memory.110.d8:0 "There are as many different stories of Kaleo of Mokulali as there are islands in the sea. This is but one of them, but if Kaleo had a favorite it would be this one.\n\nKaleo was born on the island of Mokulali, which was not an island of any note or distinction. The people there lived out their lives, and traded with the other islands sometimes. But as Kaleo grew, Mokulali noticed how the things he told them came true, as surely as the sun setting would rise again tomorrow. When Kaleo grew to be a man, he gathered all his guests at his coming-of-age ceremony, and he told them that the island of Mokulali would one day move across the ocean just as a ship would. The people believed him.\n\nSoon after that, the chieftain of Mokulali died, and there was only one choice to replace him. Kaleo guided the island with a wisdom that never steered it wrong, and soon Mokulali grew to be very rich. With those riches, Kaleo built a school. He selected a boy and a girl from the children born in Mokulali each year to go to this school, and the people trusted Kaleo so much that each one of them did. They did not see their parents again until they were grown men and women, and then they came back to their villages with a portion of the sight of Kaleo.\n\nKaleo trained more and more of these seers, and they took on the work of governing as Kaleo withdrew to within his school. He was not seen for many years, until he emerged on the rooftop of the highest part of his school. He raised his hands above his head, and there was a great rumbling in the sand: the island had slipped its bounds, and was moving across the ocean. It was moving towards the Kiamoa.\n\nSoon after, the Century of Storms engulfed Kanolowele, but not Mokulali, for there was no longer an island of Mokulali in Kanolowele. But there is still a Kaleo, and he and his people live on in Mokulali Distant, an island unravaged by time."
 flavour_speaking_memory.110.d9:0 "It is as hard to believe there was a time before Wavesong as to believe there was a time before waves, and yet there was. This was the time of Namauhi, who was once a simple sailor. He had a voice to coax a pearl from an oystershell, and he loved to sing as he worked. But while the other sailors sang in coarse, chorusing voices, Namauhi sang of quiet loss in haunting tones. When he sang, all the others listened.\n\nAs Namauhi grew older, his songs only grew more mournful. More and more migrated to his lands from the south, and soon the fish that had once fed everyone grew harder and harder to catch. Namauhi’s own family died of starvation. He sang each of them off. Namauhi had by this time become captain of his own vessel, but he grew more distant from his crew with his family dead. He withdrew to the most remote of caverns, but even with nobody around to hear him, he spent most of his time sailing on the open waves, singing of his loss.\n\nOne night alone on his ship with only the stars to keep him company, Namauhi began to compose a new song to honor all the dead of Kanolowele, and to condemn the injustice of famine. His song echoed low and quiet across the Sunlight Reef, but every syllable rang out with passion, and soon the waves were bearing him across the sea to the tune of his song. Namauhi was shocked, and stopped singing, so the waves stopped. Then he began again, and the waves started again. He grew louder, and the very sea yielded to his command, so strong were his words. So Namauhi told the sea to bear him back home, where he taught all the other sailors the secrets of Wavesong. Soon, the sea itself carried fish to the shores of Kanolowele."
 flavour_speaking_memory.110.d10:0 "There have been many chieftains of the islands of Kanolowele, but none are as fascinating as Kau’i’noe, who tried to sail beyond the edge of the world. Kau’i’noe was not born a chieftain’s son, or even to a family of standing. What he was born with was a bravery that none could match, and from the moment he was grown he fought across Kanolowele for wealth and the glory of his people in many foreign wars. He soon amassed wealth to match his courage, and then returned home to become chief of his people.\n\nKau’i’noe had many friends across the land, and his tribe soon grew rich from trade. But something ate at Kau’i’noe. He had travelled far, but there were lands he had not yet been to beyond the Kiamoa. If he died he could not return home, so he had to journey to those lands while he still lived. So Kau’i’noe took all of his riches, and he built a ship as large as one hundred ships to withstand the Kiamoa and sail beyond it. He departed with the love of his people, and he stayed at sea for four years. But on the fifth, just when it was feared he would never return, a whale as black as night came to Kanolowele, and it spit up Kau’i’noe on the shores of his village. He would not talk about what had happened or what he had seen, and he was a solitary man from then on."
 flavour_speaking_memory.110.d11:0 "Long ago, before the cities rose, Anakue was an island much smaller than it is today. It was an island of prosperous people, who fished it in its waters and used its land to grow great bounties of fruit. All that changed when the Eel Serpent Puhiloa arrived. She was as long as a hundred boats, and in her cruelty, she began to eat all of the fish in the sea to starve the island of Anakue. It was then that a baby boy was born. He was the fourth of quadruplets, and he was a tiny, runty thing. His parents loved him dearly, but they were already starving, and he would never be able to work on a farm. So they cast him into the sea.\n\nBut then, a miracle happened! The boy was saved by a mother Hinuiseal named Kupamakua, and she and her eleven children taught him the ways of the sea. He learned to outspeed Puhiloa, and soon he was known by his seal family and by Anakue as Silakai Sealkin.\n\nSilakai travelled with his family for a while, but when they came back to Anakue the island was on the brink of famine. Silakai could not watch them starve, and he and his family tried to help Anakue as best as they could. One day, Silakai’s youngest sister, named G’uwai, was killed by Puhiloa as retribution. In his grief Silakai attempted to recover her body, but all he could find was one of her ribs. Silakai knew then that Puhiloa had to die. He fashioned his sister’s rib into a great hook, and Silakai dug that hook into the seabed and rode on his mother’s back around Anakue. His siblings pushed on the seabed with all their might, and soon the seabed  began to rise, and Puhiloa in her arrogance was trapped on it. She drowned to death in the air, and Silakai carved the flesh off her bones and fed it to the people of Anakue.\n\nThis is why Anakue is now a great island, and it is also why the island of Anakue still remembers the mighty deeds of Silakai Sealkin."
 flavour_speaking_memory.110.d12:0 "When Satria was a mere pirate sailing the seas of Kanolowele, he had an ambition: to found himself a grand city to retire in. But as Satria raided across more and more of the sea, his ambitions began to grow. What if instead, Satria thought, he founded himself an empire? Soon, on one of his voyages, he came across the Dragon Turtle Vea. Vea knew much of the empires of the past, and she thought that this dream of Satria’s was a grand one. So she took to following the pirate fleet of Satria across the sea, and when his prey saw a Dragon Turtle behind him they gave him whatever they pleased.\n\nAfter a long time at sea, Satria came across the city of Donyatabraken, which was founded near the remains of a Dragon Turtle who perished in the Century of Storms. Donyatabraken was a rich and mighty place, and the people loved their city dearly. So did Satria, but perhaps he loved the city in a different way. Satria amassed the mercenaries of all of Kanolowele to raid that city, and the blood of its waters ran red that day. In the end, all of the guards of Donyatabraken were dead, but so were the mercenaries, and Satria did not have to pay their corpses.\n\nSo Satria went to the center square of the city, and with his crew and the Dragon Turtle Vea behind him, he declared that there would be a new guard of the city. He declared the empire of Satrialaam, and that one day all of Kanolowele would unite under its flag. Satria the Great is dead now, but the story of Satrialaam has persisted for hundreds of years."
 flavour_speaking_memory.110.d13:0 "Years and years ago, the Hinuiplants were simply something to be feared. The communities bordering the Hinuiplants erected great barriers of salt to protect against their growth, while they themselves sought to coax out meager growths from meager plants, which were weak and ill-suited to feed anyone, but at least were trustworthy. Into one of these villages was born the girl then known as Lilinoe.\n\nShe saw the potential of the Hinuiplants, and one day she crept beyond the barrier of salt to retrieve the saplings of the Hinuiplants, which she brought back home to grow. Her father who worked the salt was furious. Her mother who worked the soil was afraid. But Lilinoe grew those plants with the ambition and wisdom of an empress, and soon her empire of domesticated Hinuiplants stretched out before her. Then she began selling the plants to the villages beyond, and her empire stretched across islands.\n\nOne fateful voyage, Lilinoe went on an expedition to the Taga’Ala mangroves, where she sought to spread more of her wondrous and life-giving plants. A kraken attacked the ship, and all aboard would have died were it not for Lilinoe, who knew just as much of plants of death as she did of plants of life. She withdrew a vine from her pocket, and it grew up to the kraken. The vine thrived on its blood, and toppled the dying kraken from the ship into the open sea.\n\nThe ship made it to the Taga’Ala mangroves, and then home again. And when the sailors stumbled back to their homes with thankful legs, the one they praised for their salvation was Waiko’lilinoe, the Great Gardener."
 flavour_speaking_memory.110.d14:0 "There are many heroes who have passed on, or who we cannot reach. Cleftclaw-Outruns-the-Winds used to be one of these heroes, but he is no longer: the mechanim awakened him again, and now he dashes across the lands of Kanolowele with a frightening speed. But if the pace at which he moves is terrifying, Cleftclaw is not. He is a biologist, and there could hardly be anything less scary than that. He spends much of his time in contemplation of the natural world, standing perfectly still. He loves these times: when he is still, he can almost imagine that he is viewing nature as it would be if he was not there.\n\nBut on occasion, a village in Kanolowele will see a vast beetle made of metal barrelling towards them at blinding speed. It is Cleftclaw-Outruns-the-Winds, who has come to warn them of danger and take them to safety. On other occasions, a mechanim standing alone in the deepest parts of the wilds will encounter Cleftclaw, who stops just long enough to give them his observation journals, so that everyone might benefit from his discoveries. Then he speeds off again, for there is yet more to observe.\n\nThe wilds of Kanolowele are full of terrifying things. But they also hold Cleftclaw-Outruns-the-Winds, and knowing that makes them seem less fearsome, somehow."
 flavour_speaking_memory.110.d15:0 "Long ago there were people who lived in the desert, and they were ruled by the wind. The wind blew past their homes but never harmed them, and though the desert had little to eat, the people had tools of bronze and houses of stone, and were rich and happy. An’adira Zephyr-Born ruled these people, and with her father’s power and her own wisdom the people of the desert prospered for many years.\n\nIt was then that the dogs of the desert attacked. An’adira and her father fought with the power of the earth, the water, and the wind, but they were no match for the dogs, whose green flames held such power that the elements themselves could not extinguish them. Eventually even her father abandoned her and An’adira was forced back, and then she made a desperate cry to a spirit of the desert to save her people. But the spirit was capricious, and it took her away from the desert just when she was most needed.\n\nAn’adira awoke in a fishers’ village in the Sunlight Reef, and the air was still around her for the first time. For many days and many nights she cried for her people, but these fishers needed leadership as well. An’adira taught them to forge weapons of bronze and to play the music of her people, but eventually the day came when she and the fishers heard word of ruins in the desert far to the south. An’adira knew then that she had to return.\n\nShe assembled a mighty expedition to sail to the south, but what happened on that voyage no one lived to tell. Some say she found her people, and that she lives there still with them in a place beyond the sky. Others say she died in the sands of the south, and that her spirit wanders the ruins, weeping for her people until justice is done."
 flavour_speaking_memory.110.d16:0 "In the days before the First Consensus, there were heroes and horrors in plenty. The hero Kaiko Ikaika lived in Kanolowele in those days, and he, his magic spear, and his great companion beast were the only defense against the hinuibeasts, which stole the people of Kanolowele away to the hinuilands where the grass was as tall as houses.\n\nKaiko Ikaika fought for the people and mourned for each he could not save, but one day his love was stolen away, and this was something he could not endure. He left Kanolowele and journeyed to the hinuilands with his spear and his beast to retrieve his beloved. She was locked within a great tower, which was ruled by a ghostly and terrible King who held power over life and death. So Kaiko Ikaika begged the King for the life of his beloved. The King agreed, if Kaiko Ikaika was willing to destroy the twelve locks of his tower so that he could roam the land for himself. Kaiko Ikaika was afraid of the King, but he did not care for the consequences so long as his love could live again. He agreed.\n\nEach of those twelve locks was kept in place by means both magical and mundane, and it took all of Kaiko Ikaika’s strength and wit to undo them. And as he did he felt a piece of himself fall away each time, but he had resolved to press on regardless of the cost.\n\nBut as the twelfth lock fell away, Kaiko Ikaika fell with it. Each of those locks had held a piece of the King within them too, and now the King could be whole again within the body of Kaiko Ikaika. Kaiko Ikaika dissolved, but he felt a sense of completion: he had done what he set out to do.\n\nWith his bargain complete, Kaiko Ikaika’s love awoke by the place where the man who was once Kaiko Ikaika once stood. She saw the man who was once Kaiko Ikaika. She loved him, but she loved the world more, and for the world’s sake the King could not leave the tower. So she took Kaiko Ikaika’s spear, and she hurled it at the King with all her might. Everything broke: spear, King, and Kaiko Ikaika.\n\nKaiko Ikaika’s love then found his beast, and flew back to the lands of Kanolowele on its wings. And all the way, she wept: for herself, for Kanolowele, and for a man who was foolish enough to bargain with death."
 flavour_speaking_memory.110.a:0 "We remember."
 flavour_speaking_memory.110.b:0 "We must remember!"
 flavour_speaking_memory.111.t:0 "Asking a Dragon Turtle!"
 flavour_speaking_memory.111.d:0 "[asking_dragon_turtle_target.dragon_turtle_from_province]"
 flavour_speaking_memory.111.a:0 "Jovial"
 flavour_speaking_memory.111.b:0 "Nurturing"
 flavour_speaking_memory.111.c:0 "Monumentalist"
 flavour_speaking_memory.111.e:0 "Calculating"
 flavour_speaking_memory.111.f:0 "Humanitarian"
 flavour_speaking_memory.111.g:0 "Traveler"
 flavour_speaking_memory.111.h:0 "Historian"
 flavour_speaking_memory.111.i:0 "Scholar"
 flavour_speaking_memory.111.j:0 "Judge"
 flavour_speaking_memory.111.k:0 "Warrior"
 flavour_speaking_memory.112.t:0 "Landslide Heroes"
 flavour_speaking_memory.112.d:0 "On the battlefields between two armies lives were lost in flashes and single movements. Distractions, mistakes, and momentary lapses reduce to bodies what was once living soldiers. Every soldier had a moment they were vulnerable to being snuffed out, when their back was turned and their mind clouded. But when the Landslide Infantry faught under the command of Holnepuala, it was as if their entire unit were immune to death. They may not have been literally immortal, and in battle it was known that some had fallen before, but a soldier would be forgiven if they could not imagine how.\n\nWeapons that make contact with their molten armor melted, flesh that touched them burned, fires erupted where they stepped and formations parted as easily as air in the face of their flame. Their could be no serious threat to their inferno. But flame is not an impossible opponent, in fact, its weakness was well known. The cool and life giving water that flowed through the jungle and fell from the sky extinguished every flame it touched, so too it was though it would wash away Holnepuala's Landslide.\n\nAs battles raged and wars dragged on many would try to snuff out Holnepuala. With buckets and torrents and whole streams of water they would wash over the men with lava for skin and their glowing commander. But so much steam was not enough to quell the blaze, and as lava hardened to obsidian it made the Landslide infantry of  Holnepuala all the deadlier with their unending firestorm within. The landslide infantry were not simply a force of nature but a roaring beacon that symbolized the hope and spirit of its members and its army. Holnepuala an inspiration to those they faught beside."
 flavour_speaking_memory.112.a:0 "We remember Holnepuala and his Landslide Infantry for the hope and warmth they gave us."


