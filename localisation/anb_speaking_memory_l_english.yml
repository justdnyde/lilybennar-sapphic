 #Dragon Turtles
 dragon_turtle_province_group:0 "Dragon Turtle Provinces"
 dragon_turtle_from_province_kealakys:0 "Hello, hello! I say, these snacks you’ve brought me are wonderful! How did you know how to fry the palm fronds like this? The last time I had a snack like this must have been centuries ago. Whoever the keeper responsible for that one was, give them a pat on the back and some of these palm fronds. Anyway, if you’ve come here, I have to imagine you’d like to hear something about the natural world. I can tell you so much!\n\n…”and as for the trees with the striped bark, I first began noticing them a thousand or so years ago. I think they split off from the white-leaved ones, because in those days there was a plague of beetles that began stripping all the bark off those trees. Strangle beetles, but one of the carpenters of the island came to me then and gave me a sample of the striped bark, and sure enough the bark on those trees was toxic to the beetles! He brought me breadfruit and locusts that time. Bring me some breadfruit next time you come around, won’t you? Anyway, we were talking about the white-leaved trees. My theory on the white-leaved trees is that they themselves are descended from the saplings the first settlers of the island brought…”"
 dragon_turtle_from_province_maxele_iron_hearted:0 "I would exchange pleasantries with you, but I scarcely think it necessary, given that your lives are too short for the pleasantries to be worth much of anything. If you have questions, ask them.\n\n...”And the days after the Century of Storms were ruled by Lakomele the Mighty with an iron fist. He sought my counsel on many things: war plans, information on the surrounding tribes, what to do about political opponents, so on and so forth. I almost grew to like him, in the end. Of all the triumphs of those days, I think the greatest is what he did to Kanolo. His name is not spoken much these days, and there is a reason for this.\n\nKanolo was king of the island to the north, and his trade ships were outcompeting the fleets of Lakomele. And Kanolo’s ships were many, but he had assembled men around him who cared for nothing but coin. So Lakomele bribed a few of them, and the next time they went ashore to bring a share of the profit to Kanolo, they also brought him five knives, each of which they inserted into a different part of Kanolo’s spine. And they were promised pay for their task, so they went back to Lakomele, and he killed them in the exact same way they had killed Kanolo. He couldn’t have the word getting out, you see. From then on, the traders dealt with Lakomele alone.\n\nIt really was quite a clever trick.”"
 dragon_turtle_from_province_kalei:0 "Hello! I’m excited to see you, because there’s so much to be excited about! I’ve been talking to the other Dragon Turtles about what it means to be excited, exactly, and they all told me different things, except for Maxele. I think she didn’t want to talk. They all told me that it’s important to speak about traditions and things that happened in the past, too, but I don’t know much about any of that yet. I think that someday the present will be the past, and I know a lot about the present, so maybe I’ll be able to talk to you about the past when that happens! Would you like to talk about my friend Keanu instead?\n\n…”When I was three, I was just learning to walk around, and everything seemed so far away. Do you ever get the feeling that everything you want to do is just out of reach? Well I did back then, but Keanu came up with an idea, and he put my favorite ball across the beach. And I didn’t want to move, but I wanted my ball, so I started pushing my way across the beach, and it was really boring. The sand was hot, too, so my flippers felt really hot, but eventually I reached the ball! And Keanu gave me a hug, and we rolled the ball across the beach for a while, and sometimes I went to go get it when it got stuck in the seaweed. That was a good day.”"
 dragon_turtle_from_province_vea:0 "Have you come to hear stories of the past from me? I can tell you whatever you please, but I ask that you keep the subject matter interesting: battles, treaties, trade pacts, so on and so forth. The others just tell tales of people, and not even in a political context. It can grow tiresome, listening to them ramble on. Anyway, let’s begin.\n\n…”Be careful to distinguish the political characteristics of the Kanolowele Consensus of the ancient days from the Consensus of 1409. I’ve talked with many who see the mere surface trappings - the Council of Judges, the veneration of past deeds, the criteria for membership as outlined in both the organizational legal code and centuries of tradition - and conclude that they are, at least in some respects, the same political entity. That’s lazy historiography, frankly. Now, the ‘Second’ Kanolowele Consensus first established itself as a centralizing entity in 1415, when Satria VI the Lesser ascended to the throne of the Satrialaam Empire. By this point, I knew and had known for a long time that Satrialaam was doomed. There had been a succession of idiots on that throne since Satria III with the exception of Satria V, and even he thought to purchase internal stability by paying off the empire’s powerful landholders with money and political privileges, including the right to collect taxes directly from citizens of Satrialaam without any form of internal controls or a unifying principle by which taxes should be collected. So by Satria VI’s rule, the commonfolk were migrating around to find the best deal on their taxes, there wasn’t enough money to pay off the landholders anymore, and all of the failed military interventions of three soft-brained Satrias seeking to recapture some fraction of the glory of Satria I had created an army on the brink of revolt. And revolt they did, along with each of the at that point fully-formed pretender states that had sprung up across Satrialaam. They had been using their own currency for decades. They had their own national anthems. If any one of those Satrias had come to me and asked me what to do I could have told them, but by that point it was far too late. But the story of the decline of the Satrialaam Empire in fact begins much earlier, at the siege of Suryakutha. Let me recount that siege for you. Satria III had brought 4,846 men, in 67 ships. And this likely would have been enough, were it not for the captain of the 34th ship, and his propensity for drink, and his inability to keep that quiet…”"
 dragon_turtle_from_province_monzaketzya:0 "Get over here, and start talking. I don’t have the time to listen to you ramble on about you and your father and your father’s father or whatever garbage you have to talk to me about today. I have a fortress to build. You can work as you talk. Do you see those foreman reports, on the other side of the workbench? Pick the top one up, and read off the code on the beginning of the page to me. Be quick about it. Every second you dawdle is a second that the fortress is not being built at maximum efficiency. You are delaying eternal safety with every one of your coughs and stutters. Be QUICK about it. You may listen to me tell you about the fortress as you do.\n\n…”The fortress will be perfect. When I say ‘perfect’, I do not mean that it will be impregnable from the outside, although it will be. It will also be impregnable from the inside. The ruling class of this fortress will get all of their instructions directly from me, and they will rule for eternity with absolute wisdom. There will be no famine, or plague, or destruction, or war. All of that is for outside the fortress. Inside the fortress, those imperfections will be burned away, and all that will be left will be the security that is unachievable anywhere except inside the fortress. The fortress will be completely self-sustaining. We will bring all the crops and materials we need to build a society inside the fortress with us, so there need not be ‘supply expeditions’ and ‘cultural missions’ that would require opening the fortress. The fortress does not need to open, it needs to be safe. It needs to be so safe that nobody inside the fortress will ever get hurt again.”"
 dragon_turtle_from_province_nalopuukani:0 "I am surprised that you made it through the mists around my island- if I had known I would have visitors I would have drawn them down, but regardless you are here now. You must have had quite a skilled seafarer, to make it through those mists. If they know something about Wavesong, perhaps we might talk for a while. In the meantime, I will tell you of the songs I have been composing, and you may tell me of whatever you like.\n\n…”I do not often leave my isle, but I did once a few decades ago. The water rippled around me, and I took the opportunity to look out to sea. I saw an island not so far away, and on that island was a fisherman’s shack. He looked to live all alone, and that day he was gathering the fronds of palms to weave himself a mat. Beyond that, I saw the ocean. If we could look beyond the Kiamoa, what do you think we would see? The believers in the Endless Ocean would tell you that the afterlife is somewhere out there, and I think that’s a romantic notion. Imagine, if you sing across the waves for far enough, that it might be heard by all those we have lost. I think that fisherman is likely dead after these years have passed, but I have been thinking about his mat, and the easy way he wove what nature gave him into something of his own. I have been making a song about the fisherman. I hope he can hear me.”"
 dragon_turtle_from_province_grandfather_moss:0 "It’s good to see newcomers, especially given that I can’t quite get out of this lagoon as well as I used to. The joints, you see- they’re acting up again. That’s all right, though: my gardeners can tend to most of the plants on land, and all that leaves me to do is work in the sea, where I can swim easier than walking and the cool flow soothes my aches. If you haven’t come to tell me tales, I have to assume you’d like to hear about what I’ve been up to.\n\n…”And the most recent strain of taro isn’t growing quite as well as we hoped, but I’ve been considering putting it in the more acidic soil, up to the north. But all the same, we’ll have to see what the yield is out of water. Did you know that you can eat the flowers of the taro plant? They tend to be quite bitter, but I’ve been considering adding them to the seed stocks anyway, if only for the nutrients. If we were to manage to remove the taro from the flooded portion of the gardens, that would leave us with more room for the rice, but there are always tradeoffs to be considered. It’s all about crop yield, really. Now let me tell you of the way you want to tend the soil around those taro plants..."
 dragon_turtle_from_province_maruvarax:0 "Hey, wow! It’s been a while since I’ve gotten anyone down here, but I wouldn’t say no to some company! Make yourself comfortable. Sit anywhere you like, really. Except by those wooden carvings- I’ve had them for centuries, and I dropped one into the water recently. It’s been such grief getting it back that I don’t think I’m going to touch them for a while. The guy who made them for me was an alright enough carpenter, but he should have been a cook! Never knew anyone better with a barbecue, and I’ve been alive for millennia. I’d let him ride around on my back sometimes, and he’d be grilling up there, and all we needed then was someone to play the music! Great, great times. What did you want to talk about?\n\n…”Before the war, I had this great lagoon that I set up all my parties at. You would have loved the place. It was shaped like a bowl so you could see the whole thing from the cliffs around it, water was so clear you could see clear down to the bottom, rocks for the humans to jump off of into the sea, the whole deal. And one week a year for decades, I’d get a bunch of guys to haul beer out there, and a bunch more to bring some torches and the food, and all the villages in the west would come out for the best time you’ve ever seen. Took a crazy amount of palm wine, really, but it’s always better to overshoot on that stuff. And I’d be out in the middle of the lagoon with a bunch of people decorating my shell, and everyone would be having fun on the beach, and it would be so loud that everyone was shouting to hear each other. That just made it louder! Man, I miss those guys. I miss that place. I wonder what happened to it after the war."
 dragon_turtle_from_province_naauao:0 "Please, come a bit closer. My eyesight will not return to me anytime soon, and I’d like to be able to talk with you about whatever affairs you’ve brought to me today. I hope to be able to talk, but there are a great number of cases to examine, and the work of the Consensus isn’t going to stop just because I indulge myself with visitors. It’s strange what makes its way to the Consensus- even the smallest cases can set great precedents when examined at the highest levels, so it’s important to treat everything with a seriousness that might bely the facts of the case. Let me tell you something about what I’ve been working on.\n\n…”Ownership of property may sound like a simple matter, but it’s anything but. How can we ensure that property is passed down legitimately from person to person? What happens if property is abandoned? The answer, as with anything in the Consensus, is precedent. When two petitioners come before the Consensus, I have already personally selected their case for factual coherence and determination value to the overall Consensus. Usually, we are clarifying some anomalous case of existing law, such as a provision that, when interpreted in a certain way, would defy good sense or cultural tradition. This can especially be the case when working with ownership of property, and this is why codification is essential - both of ownership records and of the proceedings of the Consensus. I have sent emissaries to some of the surrounding nations, asking them to improve their titling procedures. Not much has come of it yet, but I’m optimistic about the proceedings…”"
 dragon_turtle_from_province_moiokalakupua:0 "Hello, and welcome. You have not come to study, have you? If not, please make sure to avoid my pupils in the main building- I have been teaching them stealth and grappling techniques, and I fear they’re more eager to test them out than usual. I’ll have to have a talk with them about keeping their spiritual training sharp as well, but I can hardly blame them for some good natured exuberance. I can talk further with you in the outlying areas of the academy. I don’t want to disrupt the operation of the ferries: I’ve never been one to make waves.\n\n…”The core of spear tactics is drilling and discipline, and a good commander must make sure each of the spearmen in his line knows exactly how to respond to his commands. Especially when using two-handed spears, the line is vulnerable, and if your soldiers have not been appropriately trained they may crumple and die separately where unity would have saved them. Make sure they maintain this unity, and are trained well: doing right by your troops is the duty of every commander. They have signed up to die, it is true, but they must only die in the service of one another and their nation. The path to clearing the mind and soul is long, but a leader must walk it so their troops can follow their example.”"
 dragon_turtle_from_province_haomake:0 "I see you have finally come to consult the wisest of the Consensus’ judges. You might wish to hear a long-winded explanation of why that is, but I can tell you in one word: deterrence. A punishment is just as much for the society around a wrongdoer as it is for the miscreant himself. Once a criminal is in jail or has been executed, all they can do is regret, but if their tale is tragic enough it might sway others from the same path. This is why we have law, and this is how we have built civilization atop that law. And I know more than anyone: the alternative to civilization is chaos and death. There are different types of death. But the death that seeks each of us out at the end of our days should come as an old friend, to release us of our burdens. Death from chaos is death brought forward to people before their time. This is why we must uphold the law with everything we have: this is the importance of the Consensus. Let us speak of the Consensus now.\n\n…”The design of a good prison must also hew to the principle of deterrence. Prisoners must be treated with dignity, but not well: if they are treated well then prison becomes a reward rather than a punishment. There are many ways to ensure prisoners see the experience as punishment, but my favorite is prison labor. It is easy to break something but not so easy to restore it, and there is a sense of justice in prisoners repaying their debts to those they have wronged across years and years of hard work. In this way, even society’s worst might find a way to benefit the whole. This punishment reduces recidivism, as well. As to recidivism, let us now return to the topic of prison structure, and how it can encourage repentance...”"
 dragon_turtle_from_province_makaoioi:0 "It is good to see you, and some company would serve as a welcome respite to what I’m working on. A lot of the busywork for the Consensus tends to fall on me, and although I understand why it can be wearying at times. I’ve been going through some cases we have yet to determine, and it’s saddening to see so many people in such desperate straits. Nauuao listens but does not hear, and Haomake tends not to listen at all. I love them and the talks we have together, but I do wish that the end result of Consensus was not so often compromise. But I did not mean to burden you with my troubles. Let us discuss other things.\n\n…”My students in Kanolowele have been hard at work restructuring the jurisdictions of the Consensus. A question that has plagued us recently is whether jurisdiction should be determined by geographical or cultural factors: we’ve decided many times, but I fear that we have to keep deciding again and again. The land is mostly immutable, but should borders or people within it change, it could also prove inflexible in response to needed changes. On the other hand, cultural borders prove at times too vulnerable to change, and indeed difficult to even define. Cultures blend and mix, and when selecting juries in culture-based jurisdictions, an accused might be judged by a jury made of what are, to the accused, foreigners. We must weigh the decision of jurisdictions carefully before acting, especially given the importance of precedent by jurisdiction. Let us talk about the appeals process as well..."
 dragon_turtle_from_province_kahuzaie:0 "Hello, and welcome. If you’ve come to ask me questions, speak quickly. Time is money, or rather the opportunity cost of time spent dallying is production, whether of goods or of stories. Decreased production leads to decreased consumption. The depressive effects of decreased consumption on projections used to make future decisions can lead to decreased investment, which leads once again to decreased production, and you get the idea from there. I don’t say this to be dramatic, but to illustrate the importance to you of wise cost accounting, whether financial or spiritual. What did you want to talk about?\n\n…”And as for wise management of a basket of investments, the most important thing to keep in mind is your overall exposure to broader market forces. Heavy investment in a single sector, even spread across firms, heavily exposes you to idiosyncratic risk, which it should be the goal of any wise manager to reduce or even eliminate entirely. This is why it can on occasion even be a good idea to make investments which you think will decline, if you also think they will do well when the rest of your investments do poorly. Remember that leverage is a tool, but it can also be your undoing: if you aren’t accounting for tail risks you’re investing wrong. And on the topic of tail risks, let’s talk about options, and the wonderful things you can do with them. We’ll begin by making some market assumptions..."
 dragon_turtle_from_province_hokieal:0 "Ha! I do not know how you have found me, but it is brave of you to disturb a Dragon Turtle in her lair, while she prepares for another expedition into the beyond. I like bravery! I do not know whether or not I like you, but that is something I can easily determine. Ask me your questions, and we will see how well you absorb my lessons.\n\n…”The Kiamoa is weakest close to the Sunlight Sea, so if you want your craft to pick up its winds to speed its progress, that is the place to learn. The crucial thing is to look at the swirling of the clouds- the faster they move, the faster the winds will be, which will guide your ship on its way like an arrow, so long as you are careful to avoid being torn apart by the shearing edge. Never sail directly into the Kiamoa. My shell can handle it, but your tiny ships would either be blown backwards or dashed into pieces, neither of which you want to happen. As the clouds of the Kiamoa swell, the sharks and stingrays will often flee directly away from it. If a shark runs into your boat, it might find itself a snack it wasn’t anticipating, or else capsize your boat entirely. I would invite you out so you can see for yourself, but there is always a risk of death near the Kiamoa. You must remember that. That is why I love it so.”"
 dragon_turtle_from_province_iehu:0 "What is it that you want, exactly? Many have come here in search of my secrets of flamedance, and many have been turned away: it is better for us both that I not take on the task of teaching more pupils to die. I will teach you anything you like of peace, but I only teach the good and the would-be great my secrets of war, and I am afraid I cannot make an exception even for a king. If you would like to talk despite this, then let us talk.\n\n…”If you want to achieve peace in the world around you, then you must first achieve peace within yourself. Find a place that is quiet, and sit with your mistakes for a while. Dwell on them. You likely do not remember your mistakes with perfect clarity, but find what you can, and consider what you have done to fix them. If you have done nothing, then at least you have a plan to make the world better. If you have done something, consider the effects of your actions, and the effects of those effects. Consider that the future has yet to be written, and that you may act upon it with a wisdom you did not have in the past. Then go forth and achieve peace.”"
