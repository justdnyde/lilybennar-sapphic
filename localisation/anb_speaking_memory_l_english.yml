 speaking_memory_ancestory_text_desc:0 "Memory represents how well a Speaking Memory nation is upholding the legacy of their ancestors, and ensuring their place in the afterlife.\n--------------\nMemory provides the following effects based on your §Y%§!:\n§Y90%+§!: Development Cost: §G-5.0%§!, National Tax Modifier: §G+20.0%§!, Tolerance of the True Faith: §G+2.00§!, Diplomatic Reputation: §G+2.00§!\n§Y80-89%§!: National Tax Modifier: §G+15.0%§!, Tolerance of the True Faith: §G+1.50§!, Diplomatic Reputation: §G+1.00§!\n§Y70-79%§!: National Tax Modifier: §G+10.0%§!, Tolerance of the True Faith: §G+1.50§!\n§Y50-69%§!: National Tax Modifier: §G+5.0%§!, Tolerance of the True Faith: §G+1.00§!\n§Y30-49%§!: Idea Cost: §R+5.0%§!\n§Y10-29%§!: Idea Cost: §R+10.0%§!, Tolerance of the True Faith: §R-0.50§!\n§Y9%-§!: Idea Cost: §R+15.0%§!, Tolerance of the True Faith: §R-1.00§!\n--------------\nMemory is gained/lost in the following ways:\n§R-1.0§! per year\n§R-0.2§! per year per 20% §YReligious Unity§! below 100%\n§G+0.1§! per year per §YDragon Turtle§! province we own\n§G+§!/§R-§! via Memory Rituals\n§G+§!/§R-§! via Events"

