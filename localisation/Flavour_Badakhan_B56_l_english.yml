 #events
 flavour_badakhan.100.t:0 "A New Arrival Cometh"
 flavour_badakhan.100.d:0 "It is a strange thing, when the heavens bear gifts for Halann. Like a comet she descends, a trail of light in her passage as it falls with the stars. An angel, of outer planes borne, come to walk amongst the orcs of this new nation. So small in stature, so serene, as she lands in a quiet forest clearing. A soft wind blowing through the grass as her feet greet the ground, as if these inanimate things show fealty to her grace.\n\nAmriel walks, her decision to fully reveal herself one long in the making. She is the closest thing to a rebel amongst the celestial hosts, a diplomat and trickster. She had long observed the progress of the world and always taken such an interest in the potential of the orcs — engineered as they had been, and yet so much more than what their loathsome creator had intended. This new nation and the process by which it came to be had fully roused her, piqued her interest where she’d already had a soft spot.\n\nAs she arrived in [From.Capital.GetCapitalName], passing through the outer walls, she slowly let her power become apparent. Let her aura radiate more and more—she was not one who could slay tyrants or dragons, those who had plagued this land many times before, but hers was still a power that would help these people overcome differences. To chart a new path forward in this age with the promise of this nation; to lift them up further, to help them where before they had been scorned.\n\nHer progress had drawn attention, but the nature of her power meant that she was safe from mobbing as she made her way to the ruler’s palace. As she approached, the guards moved aside—it seemed she was invited, and an audience awaited. She wished to introduce herself, and to begin offering her judicious advice in the affairs of state, and of a people’s soul.\n\nAs she entered the room of council and counsel, she merely smiled at the gathered leaders of Badakhan. She smiled widely and bowed in greeting. There was much to be done with the best laid plans of orcs and angels."
 flavour_badakhan.100.a:0 "By my troth, something blessed this way comes."
 
 flavour_badakhan.101.t:0 "The Khugsroad Proclamation"
 flavour_badakhan.101.d:0 "Along the Khugsroad lay a country manor, of grounds new and old. It had been parcelled up countless times: since the time of ancient Castanor, feudal Castellyr, in the wake of the Greentide, and now it was administered according to Badak law. It was home to an older family, some of the first orcs to settle down and take ownership of this green land to match their new skin. The manor itself had similarly old foundations, said to have been laid by Balgar himself, or so the Patrician claimed to his unlikeliest of green inheritors.\n\nThat had been a century and more ago; these days it had seen generations of new owners. Green their skin remained, but they had learnt the responsibilities that came with old homes and how best to maintain them, and the social order of servants and staff needed below their owners in turn. Today it hosted a large social gathering that on the surface seemed like it would have been like any other: families from all other Badakhan coming together to soiree and hobnob amongst themselves. The orcs who inherited Escann.\n\nBut as many of them looked up to the mountains, the memory of physical captivity that the Serpentspine filled them with loomed larger than it might have on other days. For these were strange days. An angel had revealed herself: she’d chosen them and them alone of all Halann and come to help guide this new nation. And yet that felt like it might be a gilded cage on the promise of following her advice. She had yet to nary give something as direction and yet her personage was so powerful and her ability to influence so complete. Raw magnetism, as if by compulsion for those who lacked willpower.\n\nIt was not even that she gave bad advice, or sought to lead them consciously down dark paths. Far from it, she was most adept and this was clear as various guests shared their own disparate stories. But it was precisely this that was a worry—Badakhan was a new home, and part of this promise was that the Badak people would direct their own destiny.\n\nAnd so, slowly, as the shadow of the mountain loomed, in drawing rooms and while out on hunts, these conspirators drew their plans against her. Hers was a gentle tyranny and so it would be resisted with words, diplomacy, and deeds, so as to challenge Amriel without ruining Badakhan in the process. An agenda finalised, they made their oath and made to depart."
 flavour_badakhan.101.a:0 "So say we all."
 
 flavour_badakhan.110.t:0 "Amriel Departs"
 flavour_badakhan.110.d:0 "Across the nation it was clear that the silent war had been won. Or perhaps lost for the one who stood, the closest an angel could be to morosity, on the capital's parapets. Across pamphlets, books and coffee shops it was clear that the Badak people felt that she was a more malign influence, even unintentionally, and that the promise of their future was best fulfilled solely by their own hands. She was hamstrung by her own decision to not actively fight back, but she felt that such a choice would have been a sure path to her imposing even without intent.\n\nNo, it was clear that it was best for her to depart. Given the nature of their disagreements it was hardly as if those who’d acted against her would undo all the good she’d brought about; that they’d hound those who had acceded to her wisdom. Badakhan would still be in good hands and it would still be a nation she’d be proud to watch, even if only from above. Perhaps avoiding her negligence there would be better for her, too.\n\nBut first, a visit was owed, to give homage to the victors. And so she flew.\n\nThey had gathered in that Khugsroad manor once, their toasts in much higher spirits and their congratulations to each well earned, Amriel felt. So she took her time to speak to them all individually. Congratulating them for arguments well made and conceding that she might be wrong, in this instance at least. That the conditions were different, that the time was not right, when the Badak people still had so much to do by their own merits alone.\n\nAs she left, she thought still about how many had thanked her despite everything. That they had been foes on this field of struggle and yet how her very existence and intervention had helped them, crystalised what it meant for them to be a Badak citizen where others might have subjects or serfs. How her absence in their conceptualisations still owed itself a great deal to her and the aid she had brought with her when she came.\n\nAs she flew and continued to go up, it was hard not to bask in the sky as she did so. For it was a bright sunny day and the sun continued to shine upon her, upon those she had been challenged by, upon her task and upon all of Badakhan and indeed Halann."
 flavour_badakhan.110.a:0 "Gifting congratulations amidst fractal tears."
 
 flavour_badakhan.200.t:0 "This Should be Hidden"
 flavour_badakhan.200.d:0 "This is a hidden effect that mananges the uber-heir effects. If you can see this it means something has gone wrong."
 flavour_badakhan.200.a:0 "Please report this on the discord if you see this!"

 flavour_badakhan.201.t:0 "Sidereally Exalted"
 flavour_badakhan.201.d:0 ""The thread of fate is fickle, and balances on the razor's edge between the sublime and the eternal. Fickle, are the vagaries of destiny. A chosen regent of Halann. Who he is, I do not know, but the stars foretell that a man born to a royal house on this day, shall one day be the ruler of a mighty kingdom." Thus the astrologer spoke. Today, the Queen gave birth to a child."
 flavour_badakhan.201.a:0 "His eyes are a cold blue, shining with intellect."
 flavour_badakhan.201.b:0 "His eyes are a comforting green, full of empathy."
 flavour_badakhan.201.c:0 "His eyes are a bright red, burning with desire."

 flavour_badakhan.202.t:0 "Princess of Stardust"
 flavour_badakhan.202.d:0 "The birth of an heir draws nearer, and the astrologer has just completed his work. He proclaims that a child born to a royal house on this day shall rule a mighty kingdom and is about to continue when the feeble sound of a newborn's first scream is heard. 'A daughter,' the midwife announces, 'You have a healthy, sturdy daughter, my [Root.Monarch.GetTitle].'"
 flavour_badakhan.202.a:0 "Her eyes are golden, glowing with talent and ambition."

