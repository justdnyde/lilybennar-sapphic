l_english:
 xiaken_fires_rebellion_title:0 "Fires of Rebellion"
 xiaken_fires_rebellion_desc:0 "“...right and proper we have deemed it to remain a thousand temples, a thousand places and traditions united by affinity alone in the many-hued hills of Xianjie; but the rule of time is change, and it is not the way of the Accretive or Transmutative Paths to remain deaf to fate. Whether by acceptance or transformation, we must meet the moment.\n\nIn the city of Sir a rebellion is brewing that will undo the hated Command, the greatest scourge upon Haless in living memory. Light the signal fires - let every temple glimpse the glow of the next. The people of Sir will not fight alone.”"
 xiaken_fires_rebellion_trigger_tt:0 "Chose to aid §YSir§! in their §YRevolt§!"

 xiaken_back_foothills_title:0 "Back to the Foothills"
 xiaken_back_foothills_desc:0 "“...we find that as our Siri allies fight, they become less and less disposed to any form of peace. We, who cosseted scholars dismiss as warmongering adventurists, find ourselves in the strange position of counselling caution. So often in the distant past we agitated to act, and act now, and yet...”\n“The strange wisdoms of war, perhaps, which make the bellicose gentle?”\n“I would not go so far as gentle, Master. We still intend to bleed the bastards against the Serpentspine.”"
 xiaken_back_foothills_effect_tt:0 "§YSir§! will no longer accept white peace with §YThe Command§!"

 xiaken_true_skill_title:0 "True Skill"
 xiaken_true_skill_desc:0 "“...a  test of wisdom, of the prowess which our temple-bound monks have always claimed to possess. If we had failed in Sir, in Shamakhad, in the myriad places that the Command ravaged, we would have made a mockery of centuries of martial teaching. We would have undermined the very basis of our martial monasticism forever, and before the world gravely shamed the venerable traditions of Xianjie…”\n\n“Mm. Good thing we didn’t.”"
 xiaken_true_skill_effect_tt:0 "Every ally of §YSir§! gains §G5,000§! Manpower."

 xiaken_trisect_chimera_title:0 "Trisect the Chimera"
 xiaken_trisect_chimera_desc:0 "“But the Falling Water technique, master, it-”\n“It does not draw back as this does, correct. This is an alteration, something new.”\n“...yes, master.”\n“It will conserve your energy; over hours, over days. It will make possible what must be done, again and again. When an enemy resurfaces; when you must maintain peace, not merely win it.”\n“And the Falling Water, master?”\n“Not without merit. Merely superceded.”"

 xiaken_one_many_title:0 "One Amongst Many"
 xiaken_one_many_desc:0 "[GetXiakenOneManyDesc]"
 xiaken_one_many_ap_desc:0 "Why do we spar? What do we learn?\n\nIt is an accusation long-levelled against at least some of the monks of Xianjie - that we relish violence, that our philosophy is a mere fig leaf for our bloodlust. But the body is the self and the self is the body - to forge oneself is a mental and a physical process. The well-muscled porter who never rises to Master is foolish; equally so is the flabby scholar. And as we test ourselves in such a way, we must test others. It is our duty to the collective Xia, to the slowly accreting strength which such tests bring."
 xiaken_one_many_tp_desc:0 "It is a sometimes harsh logic - those who adapt most readily to chi are those who wield it best. So many temples in this ancient and storied land have followed our same path, and still do; they seek a rapprochement with all things, a final spiritual ceasefire between the struggle of the conscious mind and the seemingly unfeeling clamour of chi. But the universe is alive, and the last thing it feels for us is nothing.\n\nOut of the endless confusion of the universe, we will find peace - the right behaviour, the everlasting action. We will adapt to the changes which have come to Xianjie, and perfect ourselves in the process."
 xiaken_one_many_effect_tt:0 "Gain a §Yclaim§! on all neighboring PROVINCES in the §YXia§!\nGain a §Yclaim§! on all PROVINCES owned by §YXiaken§! we are at war with"
 xiaken_one_many_effect_2_tt:0 "Gain a §Ycore§! on all neighboring PROVINCES in the §YXia§!"

 ap_xiaken_xianjie_rise_title:0 "Xianjie, Rise!"
 ap_xiaken_xianjie_rise_desc:0 "The accretive perspective is one which acknowledges when the state of things has changed - when one must reshape oneself in response. That time is upon us. We cannot continue to organise ourselves in the way we did before the Command came; the nature of history is the emergence of such threats and the response they engender, and our time is one of consolidation, of great Empires emerging from entropy. Realms which place themselves in opposition to the cultivation of wisdom and the pursuit of ascension will be made to change, as all must change.\n\nA state is rising in Haless, one which will reforge the chi of a continent. And then…?"
 tree_ends_here_for_now:0 "§TThe new content ends here for now! Form §YOne Xia§! to do the old mission tree§!"

 ap_xiaken_again_again_title:0 "Again, Again, Again!"
 ap_xiaken_again_again_desc:0 "The young initiate Wen had the task of sweeping the storehouse floor. One day, as her temple prepared for war, she announced to her master that she could not go. “There is more to learn from sweeping the floor,” she said, and her master saw this was true, and bade her continue.\n\nTwenty years later, the monk Wen’s temple again prepared for war. But she announced to the new master that she could not go. “There is more to learn from sweeping the floor,” she said, and her master saw this was true, and bade her continue.\n\nSixty years later, Master Wen’s temple once again prepared for war. But she announced to her apprentices that she could not go. “There is more to learn from sweeping the floor,” she said, and her apprentices looked askance at their cowardly master, and left to fight.\n\nA day later, Master Wen died."
 ap_xiaken_again_again_effect_tt:0 "Gain a §Ycore§! on all neighboring AREAS in the §YXia§!"
 ap_xiaken_again_again_effect_2_tt:0 "Gain a §Yclaim§! on all neighboring AREAS in the §YXia§!"

 ap_xiaken_first_many_title:0 "First Among Many"
 ap_xiaken_first_many_desc:0 "We judge the merits of a philosophy in the fruit of its wisdom - in how it leads one to live, in what it brings about. In this sense, our doctrine - The [GetXiaPath] - has proven itself tenfold. A plurality of the monastic traditions of Xianjie recognise the righteousness of our philosophy and the discipline with which we have refined our chi, and we are rapidly rising to a position of outright leadership among the temples. As we shape the self, we shape the state."

 ap_xiaken_temple_grounds_title:0 "Temple Grounds"
 ap_xiaken_temple_grounds_desc:0 "“You’re sure of the tiered design, Master? It limits the extent of each parade square, and the vi-”\n“Metaphors, architect. We do not organise our initiates so rigidly because we have an inherent love of hierarchy. We do so because ascension is a climb. The initiate hall lies at the very base of the slope, its residents climbing each year to the accommodations at the very top… and yet, as one rises, one has further to climb each day…\n\n“ …well, you see what I mean. Worry not, we will pay. We who dream of ascension value such metaphors very highly.”"
 ap_xiaken_temple_grounds_effect_tt:0 "§YTemples§! and §YCathedrals§! now provide §G+15.0%§! Local Manpower"

 tp_xiaken_xianjie_rise_hash_conflict_title:0 "Xianjie, Rise!"
 tp_xiaken_xianjie_rise_hash_conflict_desc:0 "The transmutative perspective is one which accepts the malleability of existence, which understands that the self must continually accord to its environment.  Such a time is upon us now. We cannot continue to organise ourselves in the way we did before the Command came; the nature of history is the emergence of such threats and the response they engender, and our time is one of consolidation, of great Empires emerging from entropy. Just as the perfect self, once achieved, may reincarnate in the same form forever and ever, so can the perfected state.\n\nThis is the claim of the restored One Xia, the first truly enlightened state in Haless. First, we will perfect a continent. And then…?"

 tp_xiaken_no_boundary_title:0 "No Boundary"
 tp_xiaken_no_boundary_desc:0 "A single drop of water in a river became conscious. He looked around at all of his fellows and was quite distraught; he had not made anything of his life, had done nothing special. So he struggled his way against the dense crowd, pushed himself through, and hauled himself up onto the riverbank.\n\nUnsure where he was and unable to see over anything around him, he pulled himself onto the very tip of a blade of grass, the last of his strength leaving as he reached his perch. From there he watched as the river formed a mighty waterfall, crashing down towards the nearby farmlands. A gust of wind blew over the grass, and he was instantly dispersed."

 tp_xiaken_first_many_title:0 "First Amongst Many"
 tp_xiaken_first_many_desc:0 "We judge the merits of a philosophy in the fruit of its wisdom - in how it leads one to live, in what it brings about. In this sense, our doctrine - The [GetXiaPath] - has proven itself tenfold. A plurality of the monastic traditions of Xianjie recognise the righteousness of our philosophy, the deftness with which we have met our changing times and been changed in turn, and we are rapidly rising to a position of outright leadership among the temples. As we are shaped by fate, so we shape fate."

 tp_xiaken_bathed_chi_title:0 "Bathed in Chi"
 tp_xiaken_bathed_chi_desc:0 "Imagine the transmutative master. No doubt you see a simple man, cross-legged in a grove somewhere, a man at peace with himself and his surroundings. Better to imagine a man wrestling a bear. Wellsprings of chi are not steamy baths - they are violent surges of energy and life, not easily made to submit.\n\nIndeed, even the desire to sit stoically unmoving is misguided. To understand and manipulate the wellsprings of existence, one must learn to dance with them, to be moved by them. Only in so doing can one hope to move them in turn."
 tp_xiaken_bathed_chi_effect_tt:0 "§YChi Wellsprings§! now provide §G-10.0%§! Local Development Cost"

 ### EVENTS
 xiaken.1.t:0 "The Hero"
 xiaken.1.d:0 "The Hero is not carved away to nothing by war; this is the first surprise.\n\nBarrel-chested and proud, the Hero’s belly is still soft despite his obvious strength. The Hero is a little shorter than Gao expected, and he does not swagger as the heroes from stories do; indeed, there is a melancholy to him, even as the iron discipline of his movements demands the same in response. The initiates dance the practice steps of battle under the Hero’s watchful eye, the stance and the sweep and the jab.\n\nGao is not a Hero. He has never been especially exceptional. He is a mage, which marks him out somewhat, but his only real affinity therein is to the manipulation of soil, the growing of plants. He stammers over combat mantras and has never successfully cast Ironskin in the heat of combat.  Such a pacifism is the preserve of the sages, so his friends reassure him, but it counts for little when he is scolded for his weak guard. Indeed, the only special courage Gao has ever shown is that he is the first to approach the Hero, two gruelling weeks in.\n\n“You fought in Shamakhad?” Gao asks.\nThe Hero nods.\n“My friends are eager to go,” Gao says, carefully.\n“Important for most soldiers to feel that way,” the Hero replies.\n\n“What about cowards?” Gao asks. He cannot help but read the Hero’s eyes closely; he has come here for forgiveness, after all. Nothing in Gao’s life seems as important as to have this man specifically absolve him.\n\n“They survive no less often,” the Hero says, not unkindly. “And no more.”"
 xiaken.1.a:0 "“...would you like some tea, master?”"

 xiaken.2.t:0 "The Warcamp"
 xiaken.2.d:0 "“Forgive us, but it is the way of sages to consider the unthinkable.”\n“Unthinkable indeed! You would leave a pack of beasts injured and feral at our doorstep, not yours! It is not the temple-realms that would border such a rump Command…”\n“And the cause of peace?”\n“A false peace!” The Siri delegate slams a flat palm on the table, but that is the terrible thing with the monks - they never fucking startle. He takes a long, low breath.[GetXiaken2WolfReq][GetXiaken2BoarReq][GetXiaken2LionReq]\n\nThe delegate turns from general to general, Wulin to Righteous Master.  The entire future of the Siri Republic rests momentarily on his shoulders."
 xiaken.2.dwolf:0 "\n\n“All around us lie the ruins of Sarilavhan, most ancient of cities, the place which the Command dared to make its capital under Moguwon. Telling, no,  that unable to build a civilisation of their own, they have merely squatted in our ancient palaces! This is but one of the grave insults borne by our people and our realm, and it cannot be merely undone - it must be punished.\n“We have decapitated the Command, at least temporarily, have surged deep into their territory and deprived them of the Wolf, their officers and logisticians - but we must not underestimate their resolve. This single chance we have to defeat them forever, to eradicate the Command root and branch - we cannot squander it!”"
 xiaken.2.dboar:0 "\n\n“Witness the unparalleled beauty of the Serpentspine, roof of the world! Here at Tamvihar two rivers meet; here at Tamvihar the hobgoblins spilled forth into Shamakhad and brought only ruin in their wake. It is a warning. Stop here, ignore the mountains, and wait a generation or two. The Command, or something like it, will return.\n“We have robbed the hobgoblins of the Boar, their greatest warrior vanguard, but the Command is not just a structure of the moment - it is an attitude, deeply held, which left to fester will one day threaten us again. It must be wiped out completely; we must leave nothing behind us.”"
 xiaken.2.dlion:0 "\n\n“Our voices echo through the cavernous halls of the ancient Dwarovar, overrun as the Command also sought to overrun us. By rearguard action bold and decisive, we have robbed the Command of their interlocutors and interpreters, the Lion which roars and soothes in equal measure. No doubt it is a terror for them that we have managed to reach so far into their territory, into their origins - but we cannot stop here.\n“The Command is not a mere polity - it is a philosophy, and one which will resurface again and again if we allow it to remain. Having torn out the throat, we must stay to bleed the corpse, or all of us will live to regret it. We can accept nothing but the Command’s complete annihilation.”"
 xiaken.2.a:0 "The monks merely nod in response. Maddening."

 xiaken.3.t:0 "Master Wen"
 xiaken.3.d:0 "“I find her absurd, master.”\n\n“Explain.”\n\n“I understand the wisdom in seeking to excel at one’s tasks - that is the cultivation of the self, of one’s inner chi. But to make no use of any of it in the end… one reads of such physical activities hiding a secret movement in battle, and so on, but Wen never went to war. She shied away from battle and then died anyway…”\n\n“But she perfected the sweeping, didn’t she?” Another student, normally quiet in such sessions.\n“So? To what end?”\n“Well… her chi, no? The building of her chi?”\n“But she didn’t do anything with it!”\n\n“She withstood the pressure of others; she offered an example of pacifism and peace, apparently important to her. I don’t think she was a coward at all - three times she had to speak against her whole temple. She whittled her chi as she saw fit, pursued her goals with determination.”\n\n“What goals?”\n\n“I think the point is that they remain esoteric to us!” The timid student’s voice quavers, but she holds her ground. “We need not understand to what purpose she carved her chi, merely admire the totality and discipline with which she carved it. I-I think.”\n\n“I don’t see anything to admire in what she did. Even her students rejected her in the end.”\n“Are we students always wise? Do we grasp everything?”\n“We have eyes like anyone else.”"
 xiaken.3.a:0 "“Master, what do you think?”"

 xiaken.4.t:0 "The Drop of Water"
 xiaken.4.d:0 "“I found the tale terribly sad, master.”\n\n“Explain.”\n\n“The little water drop is as the one who works against the flow of chi. He fears the totality of chi, the idea that he is carried through life as part of something greater. He works against this totality and his nature,  and weakens himself. As part of the river, embracing the ever-transmutative nature of chi, he could have been a great waterfall; instead he is wicked away into nothing.”\n\n“I- but-” A second student speaks.\n\n“Go on,” says the master.\n\n“Could he have understood anything about himself - about the world, achieved any perspective, if he had not left the river and embraced another part of the world? Is the grass not also part of everything, part of chi? Did he not use the riverbank’s stability, the grass’s height, to reach an understanding no other water drop had? He took on their characteristics, transformed his position, and existed in harmony with a new part of chi.”\n\n“But he was wicked away immediately, mere vapour -” began the first student.\n\n“As are we all, in not so many years! And he was wicked away, as you say, into the air, whence he could see everything, see a great deal more than his kin. Is it not right that some are vapour and some are river? Is it not also transmutative to take on the nature of air, in accordance with one’s goals and one’s nature?”"
 xiaken.4.a:0 "“Master, what do you think?”"

 ### MODIFIERS
 xiaken_prowess_proven:0 "Prowess Proven"
 xiaken_prowess_proven_desc:0 "“The monk learns from her first fourteen battles how chi moves and where it goes.”"
 xiaken_surge_confidence:0 "Surge of Confidence"
 xiaken_surge_confidence_desc:0 "“Is bloodlust any less a quiver of chi than laughter? How can untested men be wise?”"
 xiaken_north_subdued:0 "North Subdued"
 xiaken_north_subdued_desc:0 "“Unprismed moonlight crests upon the mountains at Maruvad\npeaceful as the sea.\nI sit with the peaks and they with me.”"
 xiaken_perfection_practice:0 "Perfection in Practice"
 xiaken_perfection_practice_desc:0 "“In the thousandth cut dwells the fourth.”"
 xiaken_perfection_place:0 "Perfection in Place"
 xiaken_perfection_place_desc:0 "“The drop of water is the river; the river is every drop of water.”"
 xiaken_temple_grounds_mod:0 "Temple Grounds"
 xiaken_bathed_chi_mod:0 "Bathed in Chi"

