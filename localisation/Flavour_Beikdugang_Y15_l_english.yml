 #Events
 flavor_beikdugang.1.t: "Contact"
 flavor_beikdugang.1.d1: "After months of sailing and years of preparation, the vision of Admiral Targuun has been realized. The flag of the Violet Dawn meets its counterpart in Zhuhan for the first time in her own waters. Word spreads quickly across their Federation, as this is the first time formal contact has been made with a civilization beyond their lakes. While many had heard stories from the Treasure Fleet about our way of life, many nonetheless clamored to hear of our spiritual practices, to which they have likened to the Kukatodic people to their North."
 flavor_beikdugang.1.d2: "After months of sailing and years of preparation, the vision of Admiral Targuun has been realized. The flag of the Violet Dawn meets its counterpart in Zhuhan for the first time in her own waters. Word spreads quickly across their Federation, as this is the first time formal contact has been made with a civilization beyond their lakes. While many had heard stories from the Treasure Fleet about our way of life, many nonetheless clamored to hear of our spiritual practices, to which they have likened to the Kukatodic people to their North.\n\nHouzhao Targuun, now beginning to reach his middle age, has decided to retire from his service in the navy. He will be spending the rest of his days in the lands of his childhood wonder, giving back to the people stories the likes of which inspired him to venture forth beyond the horizon."
 flavor_beikdugang.1.a: "Twin Ports, far apart by sea but close in spirit."
 Y15_discover_forbidden: "The §YForbidden Lands§! superegion will be discovered by us, and the Triunic nations with a capital there will discover us."
 
 flavor_beikdugang.2.t: "Fall of Tianlou"
 flavor_beikdugang.2.d: "Tianlou, the Jewel of Yanshen, is now in our grasp. The wealth generated by this historic city shall now go to the coffers of the more worthy [Root.GetName]. Our scholars will gladly study the High Temples present there. The question is not if we shall take from Tianlou, but how much?"
 flavor_beikdugang.2.a: "Exact Tribute from the wealthy city."
 flavor_beikdugang.2.b: "Plunder the excessive city!"
 flavor_beikdugang.2.c: "Raze the city, set smoke beyond the gate."
 
 flavor_beikdugang.3.t: "Houzhao Targuun"
 flavor_beikdugang.3.d: "Even as a young boy, Houzhao Targuun was a common sight when the Zhuhan Fleet came to our ports. The son of admiralty, he always had a fascination with the sea and what went across it. He spent days on end asking the merchants of Zhuhan about their legendary homeland, hearing folklore of their goddesses and tales of frightening human-horse hybrids. When they set sail again, he had spoken to every last person on each ship at least once.\n\nBy the time of the Fleet's next visit, Houzhao was a teenager, and by this point had made a point of tracing his lineage back to the forefathers from Zhuhan (or Zurkanrek as they called it), and could even hold a conversation in their native tongue, albeit with some difficulty. While his child-like wonder for their homeland had diminished, he was nonetheless enthusiastic to spend his days in the markets with them, only to join them later in dining among the merchants and admirals that comprise the upper echelon of Beikdugang. When the Fleet left for other shores, it took considerable effort to convince him not to abandon his life here and join them. After their departure, Houzhao spent several nights on the balcony of his family's estate looking out to the sea, being roused only by the realization that by following in his family's footsteps and becoming an admiral himself, he could sail alongside the foreign fleet that had captured his heart.\n\nBy the time of the Fleet's third visit in his life, Houzhao had graduated from his studies at Nanxin Naval Academy unparalleled in his knowledge of all things nautical. While many of those he spoke to as a child had retired from the fleet, those who knew him were astonished by his immaculate knowledge of the weather patterns, and of every sea creature that could be eaten along their routes in the event of an emergency. Much of this information they did not even know themselves. Those who did not know him thought he was the very [Root.Monarch.GetTitle] of Beikdugang due to the level of formality to which he presented himself to them, and the banquet he hosted in their honor. When Houzhao, now Admiral Targuun, offered to muster a few ships and escort the Trade Fleet for the rest of their time along the Eastern Halessi coasts, they were delighted to let the flag of Beikdugang fly alongside that of the Rising Sun. Over half a year later he would return to his home port, sated for the time being but nonetheless determined in his life's quest to sail to their port himself.\n\nThis vision of his is a catalyst for a greater destiny for Beikdugang, one that sees the flag of the Violet Dawn in ports that cannot even be conceived in the minds of those in the era he lives in. This destiny calls to us, much like how the sea calls to her sailors. Our path is to answer this call, and venture forth across the endless seas."
 flavor_beikdugang.3.a: "Destiny Calls!"
 
 flavor_beikdugang.4.t: "Northern Route Relic Monopoly"
 flavor_beikdugang.4.d: "Our significant control over the transportation of Precursor Relics out of Aelantir to Halcann has given us noticeable leverage over the sale of these goods due to our ability to essentially choose our buyer. With demand ever increasing due to Artificers in Cannor, the Route of Northern Lights has become one of the few methods of purchasing them."
 flavor_beikdugang.4.a: "They compete for scraps, or buy from us."
 beikdugang_monopoly: "Relic Monopoly"
 
 flavor_beikdugang.5.t: "Equinox Accord"
 flavor_beikdugang.5.d: "There are two primary methods we can employ to keep our holdings in Eordand in line.\n\nThe first method involves the different types of ruinborn in the area. While the seasonal sects have more in common with each other than with us, keeping these sects at odds with each other would keep their focus away from us.\n\nThe second is to allow the colony to be fully self-governing, rendering it almost entirely independent. Our only tax upon the colony would be the continued access to the Relics within the lands. This would calm any independance sentiment in the short term, but the authority may eventually cause them to wonder why they are a subject in the first place.\n\nThe choice is ultimately ours, and fortune favors those who plan before they act."
 flavor_beikdugang.5.a: "Keep them Divided."
 flavor_beikdugang.5.b: "Grant them Self Rule."
 
 flavor_beikdugang.7.t: "Kaashaalg Expedition"
 flavor_beikdugang.7.d: "Our interactions with the locals have proven fruitful. They have told us of how the land was once prosperous with multiple rivers giving rise to various cities, each with their own culture.\nThey have also pointed out that the Shuvüüsh also originated from these lands, and departed east at the same time as the Khamgunai fled west during the Ashen Skies.\nThe lifestyle here is very simple, largely subsisting off of what rivers survived the Ash and avoiding local spirits known as Facestealers, all while hoping for rain that never comes and to find the ruins of their cities under the sands.\n\nWith this knowledge, our scholars have likened the ancient Rünsukhi cities to the city-states that the Khamgunai founded after their departure from the region, and many find our alleged common ancestry with the Bird Riders to be disturbing.\n\nThere is also interest in studying these Facestealers the natives speak of, but they have warned this could prove dangerous. They have offered to guide a small number of observers to see one in exchange for a shipment of food and water."
 flavor_beikdugang.7.a: "Accept their offer."
 flavor_beikdugang.7.b: "We'll take a look ourselves."
 
 flavor_beikdugang.8.t: "Facestealers"
 flavor_beikdugang.8.d1: "Horror.\n\nThat is the only word to describe the bloodbath that beset our expedition. Our men encountered the faceless creature near the edge of the mountain sides, and as soon as they began to murmur among themselves about it the creature seemed to become enraged and changed into the form of a whirlwind. The soldiers prepared a defensive line but it ultimately proved worthless. Seemingly from nowhere several more of the spirits had emerged from behind the terrain and our forces were beset on multiple sides.\n\nWhat followed was utterly gruesome, the vast majority of those on the expedition were slaughtered, with many dying from having their face ripped off of their body by the wrathful spirits. What few returned have warned all who would listen to never venture into those cursed lands.\n\nMany have regarded this expedition as a disaster."
 flavor_beikdugang.8.d2: "A few of our men follow the Rünsukhi guides towards the mountain sides, and are quickly hushed under what cover the terrain provides. There they witness through the eyeholes of provided masks a faceless creature meandering about, seemingly looking around despite the lack of eyes. The Rünsukhi are still until one among them notices and points out a face plastered on the mountainside on a vantage point. The others immediately gesture for our men to get away from the area, and the group promptly leaves.\n\nUpon reaching safety, the guides explain the Facestealers can use the faces they harvest as sentries, allowing them to see out of their lifeless eyes. Had the group not been careful, the spirit could have spotted them from a long distance and prepared an ambush. After stopping to record this encounter, our men re-joined the expedition and departed for home.\n\nThis peculiar encounter has left many in [Root.GetName] curious about the oddities of the region, but the potential danger has deterred any further adventures.\n\nMany have regarded the expedition as a success, and the trinkets collected or traded for now sit proudly in a museum."
 flavor_beikdugang.8.a: "What a foul fate in our ancestral lands."
 flavor_beikdugang.8.b: "What interesting history our ancestral lands hold!"

 flavor_beikdugang.9.t: "Leader of Tomorrow"
 flavor_beikdugang.9.d: "The world will change, it is inevitable. The backwards ways of yesterday are gone and people have said that soon the new world will come. Well we say that we will make soon now! We shall pick up the torch of the revolution and shed its light across the world. Already many are joining us in this endeavor including our brothers and sisters in Yarikhoi and those closer to home in Haless. And we have a leader too, Weizhen Bodojiin, a true man of tomorrow. Powerful with magic and a champion of the people, tyrants of the world beware!"
 flavor_beikdugang.9.a: "Who thought a mage would lead this effort?"
 
 flavor_beikdugang.10.t: "The Federation Unites"
 flavor_beikdugang.10.d: "After much deliberation, the peoples of the Federation have united under one banner at last. In the eyes of many Triunics, this prosperity may have never been possible if not for the efforts of [Root.GetName].\n\nJust as unity has been proclaimed across the lakes, it too has been proclaimed between the lakes and the seas. None within the Federation could fathom the idea of conflict between our nations."
 flavor_beikdugang.10.a: "Bodojiin shall lead us to victory!"


 flavor_beikdugang.11.t: "Refugees from Yarikhoi"
 flavor_beikdugang.11.d: "Some Refugees have arrived from Yarikhoi due to the ongoing crisis."
 flavor_beikdugang.11.a: "Let them in"

 flavor_beikdugang.12.t: "Beikdugang Proclamation"
 flavor_beikdugang.12.d: "With the aid of representatives from the Lake Federation, members of every section of the Beikdugang government have come together to write a new constitution for the republic. One with no place for conniving eunuchs or autocrats, led and represented by the people. It’s a new constitution for a new age of the world, one respecting the past but willing to break with ideas that have lost relevance in the changing times. A new system and a new way of doing things, this is our age. The age of the republic and the union of the lake and sea!"
 flavor_beikdugang.12.a: "The dawn of the New Republic"

 flavor_beikdugang.13.t: "No More Eunuchs"
 flavor_beikdugang.13.d: "Beikdugang is asking us to throw the Eunuchs out of government."
 flavor_beikdugang.13.a: "No balls and now no government"
 flavor_beikdugang.13.b: "No I NEED the Eunuchs to run my government"

 flavor_beikdugang.14.t: "One People"
 flavor_beikdugang.14.d: "With the relations between Beikdugang and the Triunics strengthening our people have begun to reclaim their ancient heritage. Triunic language and holidays have become more popular than Yansheni ones. Our people have long seen themselves as Triunics and now so does the world. Though it was just a year ago that we created our new constitution the people cry for one simple amendment, to abandon the name of Beikdugang and embrace a new name more fitting of our Triunic nature, Kuldozein! This all can agree to, but we can take it even further. We can embrace the faith of the Triunics, the worship of Kalyin, to show the unity between our people and between all things."
 flavor_beikdugang.14.a: "For the one goddess!"
 flavor_beikdugang.14.b: "Our ways have served us fine"

 flavor_beikdugang.15.t: "Decadent Caste"
 flavor_beikdugang.15.d: "It seems the tides of fate are changing. The ancient institution of the eunuchs is under attack all across Yanshen. It seems they are on the way out. If there was ever a moment to rid the nation of eunuchs as an institution, now would be it, and we’d score favor with a rising power at the same time. Still men are often mistaken about matters of fate, perhaps the age of the eunuch is not over yet."
 flavor_beikdugang.15.a: "Purge the Eunuchs"
 flavor_beikdugang.15.b: "Don’t"

 flavor_beikdugang.16.t: "The Many Colors of Gold"
 flavor_beikdugang.16.d: "As we’ve conquered and expanded our ports in East Sarhal, we’ve always had one objective in mind:  control of the markets of coffee and dye. Still, even we couldn’t have predicted the effect we’d have on the lives of the people living here. The Dakinshi and Tanizu lands have seen an economic shift, now more focused on meeting the demands of our traders than making goods for their own consumption. With all this it seems we really have no need for land in Sarhal beyond our ports."
 flavor_beikdugang.16.a: "Sell our other land, just focus on the trade."
 flavor_beikdugang.16.b: "Don't, we stick with what we claimed"

 flavor_beikdugang.17.t: "Across the Waves" 
 flavor_beikdugang.17.d: "Our people are descendents of the Triunics, from far to the northwest  across the vast ocean. We are proud of the traditions we’ve inherited from them; we have no tortured, perfidious eunuchs like in Tianlou and we love the sea, which brings us its bounty and wealth. However we cannot enjoy the sea because Danggun stole our northern coast. They still cling to our stolen lands, but they are vulnerable now. Danggun is wracked with instability and now our long humiliation shall come to an end."
 flavor_beikdugang.17.a: "Now we beat the drums of war"
 
 flavor_beikdugang.18.t: "Wonders of the Lost"
 flavor_beikdugang.18.d: "The genie’s relics are truly fascinating. We’ve been studying them for quite a while now but it’s clear we still have so much to learn. So much, in fact, that we won’t make much progress unless we focus our efforts in one specific area. Just what area should that be?"
 flavor_beikdugang.18.a: "Their Magical Prowess"
 flavor_beikdugang.18.b: "Their History"
 flavor_beikdugang.18.c: "Their Administrative Skills"

 flavor_beikdugang.19.t: "Synthetic Life"
 flavor_beikdugang.19.d: "The existence of mechanim has set the scientific community on fire. They’re an incredible new kind of thing, never before seen in Hallan. The biggest initial debate was whether they were truly alive. It was a troubling question, undoubtedly they don’t share many of the traditional characteristics of life. They don’t grow or age, they can’t reproduce, they don’t eat or breathe. Still many have pushed on to see if that was the end of it, they looked to see if they could think, if they could make something new, if they could feel. After a great long time we’re now certain, they can, they are alive and it’s a new wondrous form of life. After this declaration mechanim from Insyaa have begun migrating to our lands en masse and we’ve started to create new mechanim who will grow up with our ways as part of our people."
 flavor_beikdugang.19.a: "To our metal brethren"

 flavor_beikdugang.20.t: "Against the Light of Evil"
 flavor_beikdugang.20.d: "Alefisol, less of a country and more of a threat to all we hold dear. Led by a mad half genie who took control of the infernal forces he was supposed to be imprisoned with, he has spread an evil across the land hitherto inconceivable. He burns the land with infernal fire, spreading a wicked light almost as a challenge to our light of freedom. But men once free shall never be slaves, the Baashidi yearn for freedom and they do not fight alone."
 flavor_beikdugang.20.a: "Alefisol will be no more"

 flavor_beikdugang.21.t: "To the Shadows Whence You Came"
 flavor_beikdugang.21.d: "The armies of the infernal have been soundly defeated. Their half genie leader has been sent back to the hell he crawled from and this time he’s never coming back. The grateful Baashidi now stand as our firm allies in Sarhal. We have shown the world the power of the revolution. If our armies can force the powers of the infernal to turn back then petty tyrants have no chance at resisting us."
 flavor_beikdugang.21.a: "Evil flees where good rears its head"

 flavor_beikdugang.22.t: "From the Sands of Time"
 flavor_beikdugang.22.d: "[Y15SandsOfTime]"
 Y15_sands_of_time_magic: "When one thinks of a genie they think of the incredible magic power in their possession. By merely uttering words they can reshape reality. Their artifacts have given us an insight into how they used this in their daily lives. Many in Sarhal used to worship them as gods and it’s easy to see why. To speak and make the world obey, it certainly seems like the power of a god. And now we understand that power a little bit better."
 Y15_sands_of_time_history: "Throughout most of Sarhal’s history before the day of ashen skies it was the power of genies that ruled the lands. Mostly it was genies themselves who did the ruling but even in Bulwar it was god kings ruling with powers from bound genies that controlled the land. We’ve learned about how fragile it was to rely on overwhelming power to keep realms together. Sure people won’t be eager to rebel against a person who can kill them with a word but once that power is gone if there’s nothing else binding the realm it will die."
 Y15_sands_of_time_architecture: "The genies certainly have a distinctive style of architecture even if it’s not the first thing you think about when you hear about them. The fact that their ruins have survived so long isn’t a property of magic, but their ingenious building techniques. Perhaps it is because they are creatures of the elements themselves that they understand how to make the elements work together so well."
 flavor_beikdugang.22.a: "Genies are Divine"
 flavor_beikdugang.22.b: "Genies are Empire Makers"
 flavor_beikdugang.22.c: "Genies are Architects"

 flavor_beikdugang.100.t: "Our Shine Across The World"
 flavor_beikdugang.100.d: "The east is not enough. The revolution shall never be complete until every corner of Halann knows freedom and justice. For this cause, brothers from across the world flock to our aid. Our nation is mighty, they know victory is possible. No matter how suffocating the darkness may seem when exposed to light all darkness shall flee. Though this work shall be great we shall drive darkness from every corner of the land."
 flavor_beikdugang.100.a: "To arms citizens! Form your battalions"
 flavor_beikdugang.100.b: "The work is done."

 flavor_beikdugang.101.t: "Light at Worlds End"
 flavor_beikdugang.101.d: "We did it. The whole world is now in the hands of the children of the revolution. Tyranny has been vanquished everywhere, not even the smallest hold out of it remains. There is no place where our light ends, it meets in every corner of the world. And as darkness lies vanquished the sun rises on a grateful world."
 flavor_beikdugang.101.a: "The land of the free and the home of the brave"

 flavor_beikdugang.300.t: "Treasure Fleet Dividends"
 flavor_beikdugang.300.d: "The §mTreasure Fleet§! has arrived in §Y[From.GetName]§! and brought us the money."
 flavor_beikdugang.300.a: "My favorite"
 flavor_beikdugang.300.b: "My favorite, but stop bugging me about it"
 
 flavor_beikdugang.301.t: "Treasure Fleet Dividends"
 flavor_beikdugang.301.d: "The §mTreasure Fleet§! has arrived in §Y[From.GetName]§! and brought us the kobolds" 

 flavor_beikdugang.400.t: "Artificer Flamekeepers?"
 flavor_beikdugang.400.d: "Gnome-like individuals have taken over the Flamekeepers"
 flavor_beikdugang.400.a: "Cool I Guess"


 #Government
 beikdugang_plutocracy_reform: "Constitutional Plutocracy"
 beikdugang_plutocracy_reform_desc: "While power is still largely in the hands of the mercantile class, the constitution maintains the framework of the government and keeps the influence of said class in bounds. The constitution also dictates the rights of individual citizens, and allows the establishment of policies on time sensitive matters within the legal framework."
 beikdugang_regional_reform: "Regional Policies"
 beikdugang_regional_reform_desc: "The outposts of Beikdugang are geographically and culturally distant from one another. Those who trade with the Federation and those in Eordand have very different experiences, but both work under the flag of the Violet Dawn. By allowing flexible policy making on a post-to-post basis, they may work under whichever basis works best for them."
 beikdugang_revolutionary_thalassocracy_reform: "Revolutionary Thalassocracy"
 beikdugang_revolutionary_thalassocracy_reform_desc: "The revolutionary thalassocracy represents the government of the nation of a maritime-oriented executive consisting of former mercantile leaders who have adopted the ideals of the revolution and seek to spread them across the seas. The use of maritime and economic power to spread the revolution is preferred to mere conquest of existing nations."
 
