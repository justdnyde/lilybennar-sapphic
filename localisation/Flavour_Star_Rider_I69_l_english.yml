 flavour_star_rider.8.t: "To be Virtuous in Life"
 flavour_star_rider.8.de: "‘The fundamental nature of this conclave is to question the foundations of the faith so that we attain its pure, unfiltered essence.’\n‘It is instrumental that we do not stubbornly cling to false or inaccurate preconceptions of what our worship entails!’\n\n$MONARCH$ $DYNASTY$ should be ecstatic.The discourse dominating the conclave has been more streamlined in these past few months, and the $MONARCHTITLE$’s influence is unmatched.\nYet [Root.Monarch.GetSheHe] feels something bubbling up. A feeling, long buried, yet resurfacing. Unable to be placated until it shines for all to see. A behated truth, coalescing into a singular sentence:\n‘This is not how my faith was taught to me, is it? Surely, certainly not. Right?’\n\n‘We do not serve Irdaeos to be rewarded in this life. He has given us gifts, but only through hardship can we demonstrate our virtue to him! Well, $MONARCHTITLE$, tell us! WHAT ARE THESE VIRTUES?’\n\n[Root.Monarch.GetSheHeCap] answers, compelled by the fervent crowd, despite realizing [Root.Monarch.GetHerHis] own inadequacy.\n\nTo be faithful is to adhere to limitations. What is a religion if not a shared boundary in which you agree to live? To adhere to a rule set, despite the restrictions it may place on you?\n Do you work your body to the bone, do you lose yourself in adoration and deference towards those who appear to interpret the worship better than you?\n Are you selfless, and help a stranger in need if he requires it?\nOr are you bound towards the pursuit of an afterlife to such an extent that a swift death seems the most agreeable course?\nWhat does it mean to be a virtuous follower of Irdaeos?"
 flavour_star_rider.8.a: ""To persevere and endure hardship!""
 flavour_star_rider.8.b: ""To revere those who wield magic!""
 flavour_star_rider.8.c: ""To be gregarious and hospitable!""
 flavour_star_rider.8.d: ""To find glorious death in battle!""
 
