l_english:
 #Missions
 I69_caillumh_ughea_title: "Caillumh Ughea"
 I69_caillumh_ughea_desc: ""Those of you born before the Incursion, I ask of you: Do you remember? 10, 20, 30 years ago now. That steep, narrow path along the mountainside. A geoglyph etched into the stone. The place where the magic happened, Caillumh Ughea. Do you remember being brought up there? The shamans divining your star sign, telling you what your purpose in life would be? I try to dream of it every single night. I try to remember the stones I passed when walking up that path, I try to remember what that bitter smell was, how the wind sounded in that particular, most important place. Inevitably, I fail.\nMake no mistake, this is not your fault, it is ours. That place has seen us fall into irrelevancy, bereft of those who can tend to it. It is up to us to reclaim that which was lost!\nDo only that and our birthright will return to us!”"

 I69_caillumh_ughea_tt: "Gain the modifier §YStarstruck Observatory§! in the province fulfilling the requirements."

 I69_interpreting_the_signs_title: "Interpreting the Signs"
 I69_interpreting_the_signs_desc: "“‘But what of the other sects? What are your intentions with them?’ I hear you cry.\nListen. The other sects clearly do not understand certain virtues. Their devotion is split between halanni and divine matters. Their essence - their core - is pure, however. It is up to us to unravel that essence, to nurture and to polish it until it shines like we do.\nWe might force them to listen to our words, but our words themselves will convince them, as we have listened to their sermons and understood their ways.\nThe shamans of old would have told us of the signs of the sky now, to explain their reasoning.\n‘Gaze upon the Scale, telling us to judge fairly and evenly.’\n’Our cause is just; witness the sky weep in anticipation, shedding its blue tears amongst our lands!’”"

 I69_interpreting_the_signs_tt: "We will be able to cast each §Treligious action§! without having their §Yreligious school§! invited after holding a §TMalukhuga Communion§!, also ignoring their cooldown §Yonce§!.\n\nWe will gain §YEnforce Tributary§! war goals on any nation following the §Yreligious school§! that we have done the §Treligious action§! of."


 I69_presents_for_the_faithful_title: "Flowing Tears"
 I69_presents_for_the_faithful_desc: "All is well.\nI am reminded of my proclamation years and years ago. That the sky would weep for our success. That the future would be given to us if we were faithful. \nIt seems that my words rang true. The shamans are more powerful than before the incursion, their capabilities far exceeding mine. I see children being taught the various star signs that many of us were no longer adept at reading. The centaurs of the plains stretch their neck in silence as they see a singular tear sweep across the sky.\nAll is well."

 I69_comet_tt: "\n§GEvent Insight§!\nWitnessing a comet is a monumental occasion for our nation! It will henceforth give §G+50§! §YReligious Power§! and §M+100§! §MMana§!!\n\nWe will also gain a §Mpermanent damestear deposit§! on our §YStarstruck Observatory§! the next time we cast §YTearfall§!."


 I69_mountainborne_ghanzamh_title: "Desertborn Malukhuga"
 I69_mountainborne_ghanzamh_desc: "“Us Ghanzamh, we are a hardy people. We trample along the paths of Nuzurbokh again and again and again. We bring our livestock with us, let them feast on the little vegetation that sprouts in these deserts and move on.\nLet us channel that very spirit then! Take a clan as tribute, then another! Make them teach us our ways again. Such traditions will then spread amongst the plains, perpetuating HIS glory and HIS splendor. Each caehnate, each shamanic splinter a shard of the whole that is the Worship of Irdaeos!\nTo be devoted is to follow this path. To be devoted is to reach for this star, as difficult or impossible this journey might seem. Have faith, for we have become devout once again!”"

 I69_I49_subjugation: "We must have §Ytributized§! the lands of §YThunderborn§! or their owner is not neighboring us."
 
 I69_I56_subjugation: "We must have §Ytributized§! the lands of §YLightning Wielder§! or their owner is not neighboring us."

 I69_mountainborne_ghanzamh_tt: "We will gain §G25§! §YReligious Power§! when making an §YIrdaeos Worship§! nation a tributary, and additional §G25§! §YReligious Power§! if that nation is following the §YMalukhuga Sect§!.\nHolding a §TMalukhuga communion§! will grant us §G10§! §MMana§! and §Y20% Mage Estate Influence§! for 30 years as long as we have the Mage Estate Privilege §YDecimated Shamans§!"


 I69_burying_our_relatives_title: "Burying our Brethren"
 I69_burying_our_relatives_desc: "“I remember my Father. He was a stern centaur with an even sterner look. A clansman and fighter called Gezrilk Bouldershield, his last name shared with his father before him.\nI don’t remember what he sounded like. I don’t remember the last words that he told me. I saw them as irrelevant at the time, due to my youthful naivete.\nNone of us were able to say goodbye. I want that to change, even if we need to scour the coast hundreds of times. It is only right to do so.\nWe will enlist the help of those whom we have helped to see the truth. The faithful stand as one, united in sorrow.""

 I69_any_ongoing_celebration: "Has any ongoing §TMalukhuga Communion§!."

 I69_coastline: "Province is bordering the eastern lakes of Keyalhkho, Oriolg, Oritsukh or Koverek."

 I69_I70_subjugation: "We must have §Ytributized§! the lands of §YCrashing Wave§!."

 I69_temple_1_tt: "Gain access to the §YEmbolden Shamanic Fervour§! §Tcustom diplomatic action§!, allowing you to improve the loyalty of your subjects every 3 years at the cost of crowns, among other benefits."


 I69_reversing_negeal_title: "Reversing Negeal"
 I69_reversing_negeal_desc: "“Now, let me set something straight:\nI shall give no quarter towards those who simply wish to build their empire, their own personal, ambitious project. The nature of Irdaeos is all-encompassing, and we need to attain all viewpoints on it. Every single one. From the highest of shamans to the lowliest of herders.\nWe will break their caehnates, we will reinstate those who have been forced to submit. And the plains and valley will thank us, and cheer our names, for we are their saviours.""

 I69_reversing_negeal_tt: "All subjects fulfilling the requirements §Rwill be shattered§!, releasing all nations, those becoming our tributaries.\nThe §YEmbolden Shamanic Fervour§! §Tcustom diplomatic action§! will now do the same at the cost of §R+5%§! §YLiberty Desire§! and §R-25§! §YSpy Network§! in the broken caehnate.\n\nWe have additionally outlawed §Yany and all wars§! between our tributaries! We §Ywill§! reach a consensus that benefits all!"


 I69_the_ram_title: "The Tlalusk"
 I69_the_ram_desc: ""The Tlalusk, a massive, wooly creature that is greater than most. Its horns a testament to its tenacity, forever fixed in the autumn sky. Two stars to mark its tusks, another two to mark its antlers. Then a fifth, representing its face. A heavenly visage of a beast, never relaxing, never content;\nA sign for those who call themselves part of the oldest sect of the plains. Irritable, but passive. Strong but uncaring. Not surrendering to the elements, but thriving in them.\n‘To struggle is to live, to fast is to remind ourselves of our heritage,’ as they say.\n\nWell then, fast! Show us your ways, for we shall add them to our own. The Malukhuga of the east are eager to understand.""

 I69_any_maslekhuga_aspect: "Has any Maslekhuga aspect from a §YMaslekhuga Religious Action§! active."
  
 I69_the_ram_subjects_tt: "Every country following the §YMaslekhuga sect§!:\n        Is a Tributary State of Star Rider.\n        Opinion of §YStar Rider§! is at least §Y100§!."

 I69_the_ram_tt: "Transfer §Y5%§! crownland from the §YMonstrous Tribes§! to the §YMages§!.\nAll subjects that follow the §YMaslekhuga School§! will lose §G50%§! §YLiberty Desire§!."


 I69_faint_and_far_title: "Faint and Far"
 I69_faint_and_far_desc: "How long will it go on for? This darkness, strangling me? I flail and flail, but nothing comes of it. I dream of the stars, but am the lowliest of that which crawls on earth. Am I not devout enough? Am I faltering in my belief?\n\nI did not believe that I would make it this far. The Star Riders ascendant, the shamans reborn. A people gazing towards the heavens. The night sky, once so impenetrably overcast, now shining ever so brilliantly.\nThe unreachable star at my fingertips.\nA prayer is in order."

 I69_faint_and_far_50_tt: "\n§GEvent Insight§!\nWe will reclaim that faint and distant star and overcome the decimation of our mages.\n£no£ Greater Rewards at §Y75% Mage Estate Influence§!.\n£no£ Greatest Rewards at §Y100% Mage Estate Influence§!.\n\n§GInherit§! all Malukhuga sect subjects at a rate of §Y6 diplomatic power§! per inherited development\n...among other benefits"

 I69_faint_and_far_75_tt: "\n§GEvent Insight§!\nWe will reclaim that faint and distant star and overcome the decimation of our mages.\n£yes£ Greater Rewards at §Y75% Mage Estate Influence§!.\n£no£ Greatest Rewards at §Y100% Mage Estate Influence§!.\n\n§GInherit§! all Malukhuga sect subjects at a rate of §Y3 diplomatic power§! per inherited development\n...among other benefits"

 I69_faint_and_far_100_tt: "\n§GEvent Insight§!\nWe will reclaim that faint and distant star and overcome the decimation of our mages. It is time to seize our future!\n\n§GInherit§! all Malukhuga sect subjects for free\n...among other benefits"


 I69_the_tent_title: "The Dmarvuks"
 I69_the_tent_desc: ""The Dmarvuk, a small, insignificant rodent-like creature with wings, most commonly known for their obsession with sweets. A constellation first visible in summer, depicting dozens of these critters as they devour their prey: an apple, fermented and half-rotten, brimming with alcohol;\nA sign for those unbothered by the cruelties of the world, drifting along meaninglessly. They, the Irdukhuga, who drown themselves in the pleasures that life gifts them, forgetting all else.\n\nBut who is to say that pleasure is necessarily bad? Their belief, their way of life is not shared by us, but it is a shard of our faith regardless! Hold your celebration then, show us how to properly indulge in that which is without inherent meaning!""

 I69_any_irdukhuga_aspect: "Has any Irdukhuga aspect from an §YIrdukhuga Religious Action§! active."

 I69_the_tent_subjects_tt: "Every country following the §YIrdukhuga sect§!:\n        Is a Tributary State of Star Rider.\n        Opinion of §YStar Rider§! is at least §Y100§!."

 I69_the_tent_tt: "Lose §G30%§! §Ydevastation§! and gain §G80%§! §Yprosperity§! in every state\nTransfer §Y5%§! crownland from the §YMonstrous Tribes§! to the §YMages§!.\nAll subjects that follow the §YIrdukhuga School§! will lose §G50%§! §YLiberty Desire§!."


 I69_the_roc_title: "The Roc"
 I69_the_roc_desc: ""The resplendent roc, soaring the skies.\nThe resplendent Stormbringer, circling atop the clouds above us. No matter the season, no matter the weather. No, forever!\nWhat is a Tlalusk, if not lesser than it? For it gazes up, but sees a sky unreachable.\nWhat is a Dmorvak, if not an impulsive rat before it?\nWhat is a plains drake, if not its prey?\n\nThis is our sign. The sign of those who see the world for what it is and what it should be. This is our path, which we have attained through sight beyond sight.\nThe conclave is upon us.\nConsensus is here.""

 I69_the_roc_tt: "\n§GEvent Insight§!\nWe will create a great Conclave of Shamans, in order to discuss the future of our faith, in addition to the future of these lands that we have grown old in.\n§YIt will go exactly as planned§!."


 I69_tithing_their_shamans_title: "To Serve the Stars"
 I69_tithing_their_shamans_desc: "“And as I look towards the north and feel that cold breeze upon my mane, I shiver. It is not fear that compels me to do so - no, it is excitement. Shamanic lineages that have remained intact and untouched by the great failure of the incursion onto the lakes. Beyond the great mass of shamans still living among the Great Storm, we hear tales of a mere boy of sixteen years or so, as proficient in magic as mere mortals could ever hope to be, though sadly bound by the nefarious pact of the Green Flame.\nSuch folk call themselves servants to Irdaeos, but it is clear that their worship is only skin-deep. More concerned are they about earthly matters, and the worship of their one, singular, unquestionable caehn. It is only a time until the folly of our late leader, who turned against the advice of the stars themselves, returns within them, and it is our divine purpose to prevent it. They will come to see the wisdom of avoiding such folly, and in their regret will, repay us in their own unique ways. Serving the Stars in the one way they can.”"

 I69_I80_subjugation: "We must have §Ytributized§! the lands of §YGreat Storm§! or their owner is not neighboring us."

 I69_I81_subjugation: "We must have §Ytributized§! the lands of §YGreen Flame§! or their owner is not neighboring us."

 I69_tithing_their_shamans_tt: "\n§GEvent Insight§!\nWe will remind the caehnates of the north of their loyalty. They shall serve us as we serve them.\n\nGain §Y10% Mage Estate Influence§! and §G+1§! §YLand Forcelimit§! for every tributary that we have as long as we have granted the estate privilege §YDecimated Shamans§!.\nWe will additionally gain §YForce Tributary§! war goals on all centaur caehnates that own land in Nuzurbokh\n...among other benefits."


 I69_consensus_of_the_eastern_tribes_title: "Consensus of the East"
 I69_consensus_of_the_eastern_tribes_desc: ""To reach a consensus is to reach divinity.\nI do not mean a consensus forced by a single person, no, but a genuine understanding of each other, driven by the genuine desire to better all our lives. This does not mean that one is forbidden from convincing one’s opponent though, however. And we will need to convince the Malukhuga of the east strongly indeed!\nIt is my goal to establish a concord in these lands, an understanding of how we should rule and what we need to do to facilitate that goal.""

 I69_consensus_east_tt: "\n§GEvent Insight§!\nWe will establish §MMagical Feudalism§! to the great §Rhappiness§! of our subjects.\n\nTributized nations will now pay in §Mmagical experience§!\n...among other benefits."

 I69_the_crow_title: "The Plains Drake"
 I69_the_crow_desc: ""The Plains Drake, a predator nesting within the central valley, endangering all living things there. Its posture upright in its constellation, towering threateningly above those it wishes to kill in the deep winter. Twelve stars, shining with the same cold each year;\nA sign for those driven by bloodlust and the intrinsic desire to die in combat. The perpetrators of the incursion, those who have led our kind to death. Those who have led our fathers to their watery demise.\n\nAnd yet, it would be wrong to hate them. Their ruthlessness and bloodlust is without equal amongst our people. Their existence proves its meaning! A part of our whole, an interpretation so unique that few would even come to such extreme conclusions, but yet so influential. This proves the drake’s worth!""
 
 I69_any_filustkhuga_aspect: "Has any Filustkhuga aspect from a §YFilustkhuga Religious Action§! active."

 I69_the_crow_subjects_tt: "Every country following the §YFilustkhuga sect§!:\n        Is a Tributary State of Star Rider.\n        Opinion of §YStar Rider§! is at least §Y100§!."

 I69_the_crow_tt: "Transfer §Y5%§! crownland from the §YMonstrous Tribes§! to the §YMages§!.\nAll subjects that follow the §YFilustkhuga School§! will lose §G50%§! §YLiberty Desire§!."


 #Events
 flavour_star_rider.1.t: "Torn apart"
 flavour_star_rider.1.d: "‘We are the ones left behind.\nWhen the Wild Hunt came to ask for our assistance it was our finest that left towards the cities of the humans; we who were too infirm remained, a motley assortment.\nWe asked the stars, divined on the mountains back then. We were warned. Dissent spread.\nBut our caehn, he enforced his consensus back then. His conclusion. And then they rode out.\nA year passed. Then another. Mothers lost their eyesight. Children grew into adolescence without remembering their father’s face. We were forgotten.\n\n“Every day that passes is a reminder of that which we have lost. Moving on is…difficult. What else could it be if not that? We have forgotten the wisdom that our shamans have divined. We are unable to wield magic, the most important gift that Irdaeos has given the shamans, because they are all dead!\n\nAnd now we waste away, hoping so desperately that our fallen brothers, sons and fathers will return. This stagnancy, this ongoing paralysis must end!\n\n“Our clan is not yet dead, my people. We may be disfavoured, disgraced – whatever else you want to call us – but we are not yet dead. Great Storm might believe itself to be the heir to the Storm King, but we know better. Green Flame will try to break us and sacrifice our souls to whichever vile patron they have made a pact with, but they will fail!\nWe must prevail, for we are the only ones capable of ending strife among the centaurs once and for all!’\n\n-Mainde Bouldershield, Speech held as Claimant of the Title of Caehn, 1444"


 flavour_star_rider.1.a: "The scars run deep."

 I69_starting_situation_tt: "Our shamans are dead, without exception. It is imperative that we bring them back by finishing the mission §TFaint and Far§!.\nIn the meantime, our mage estate will be effectively worthless.\nTrust the path the caehn has laid out and let magic return!"


 flavour_star_rider.2.t: "Recreating the Constellation"
 flavour_star_rider.2.d: "’The waves. He wishes to hear the waves, ordsiwyn.’\n\n‘Tell him that there are no waves here. Only stars.’\n\n‘He weeps, ordsiwyn. He asks you to let him go back.’\n\n‘He has all that he wishes to have. Food, drinks, the most comfortable lodgings, the faithful, listening to his every word. Tell him to forget his old life.’\n\n‘He can’t, ordsiwyn. We are not his people. He misses his child.’\n\n‘He will get over it. He teaches his first apprentice tomorrow – inform him of this.’"


 flavour_star_rider.2.a: "10 shamans every year, given as tribute by each clan."

 I69_mage_tithe_tt: "Every Tributary will add §Y10% Mage Estate Influence§! and §G+1§! §YLand Forcelimit§! to us as long as we have granted the mage privilege §YDecimated Shamans§!.\nTributizing a nation will increase our §Mmana§! by §G2§!.\nOur current subjects will gain §R10%§! §YLiberty Desire§! as they are very §Rhappy§! about this development.\n\nWe gain the §YForce Tributary§! war goal on any centaur caehnate holding land in Nuzurbokh.\n\nOur tributaries will not be able to attack new subjects instantly, but we'll need to §YReverse Negeal§! to ensure permanent peace."


 flavour_star_rider.3.t: "Tethering the Separated"
 flavour_star_rider.3.d: "‘The Star Riders have gone mad, spouting vague falsehoods in their attempts to appear devout! Laymen, interpreting a faith in ways that should never be. And yet…’, says the broken, lying bereft at the shore of the sea.\n\n‘They can not keep this up for long. They have nothing. They produce nothing. Such a society can not survive for long. It is impossible. We just need to hold out. A few more years. Just a few years more,’ says the traitor, waiting for a moment that will not come.\n\n‘All voices of the conclave have decided as such: To pay tribute to the Star Riders is your divine duty.\nFor it is us who will bring peace to the plains.\nFor it is us who will find a consensus in which every voice is heard.\nFor it is us who will unite this faith, and wield the magic that binds us.’\n\nThe chains are fastened, the strings applied. They twist the flesh and cut into it.\nThis is our penance. That which we broke will be made whole again."


 flavour_star_rider.3.a: "Implement this new practice."

 I69_magical_feudalism_tt: "We will establish §MMagical Feudalism§!:\nWe will gain §G20§! §Mmagical experience§! and §Y1% Feudalism§! progress in our capital per tributary. This effect will also apply §Ywhenever§! we tributize a new nation.\nEvery paid tribute will grant us §G2§! §Mmagical experience§!, this effect halving in effectiveness with each level of §YMagical Infrastructure§!. It additionally grants §Y1% Feudalism§! progress in our capital if the tributized nation is below §Y25% Liberty Desire§!.\n\nOur subjects gain §R10%§! §YLiberty Desire§! as they are very §Rpleased§! about their research being reappropriated."


 flavour_star_rider.4.t: "Twinkle and Shine, My Star"
 flavour_star_rider.4.d: "‘I have done what you wished me to do, my light.\nI have returned my caehnate to your fold. I have made them faithful once more.\nOur neighbors claimed me mad when I instituted practices unseen in the plains before, but the only madness was their own. Do not punish them, for they understand now. They called me cruel, but they will come to realize that this “cruelty” was benevolence.\n\nYour light now shines on all of Nuzurbokh, but I ask of you, what now?’\n\n[Root.Monarch.GetSheHeCap] knows. [Root.Monarch.GetSheHeCap] asks regardless.This enlightenment has to be shared amongst all of centaurkind. The shamans of each sect, united, understanding the worship of Irdaeos in all its facets, splinters, shards - all witnessing HIS brilliance. A consensus, not just of the east, but of the entirety of the plains. Born of understanding and comprehension. A singular interpretation that will last until all things end.\n\nThe tenacious Maslekhuga, the gregarious Irdukhuga and the warmongering Filustkhuga; We will bring our faith to them, as they share theirs with us.\n\n‘Be our star in the darkness, which we will never forsake again.’"

 flavour_star_rider.4.a: "Never again"
 flavour_star_rider.4.b: "Never again"
 flavour_star_rider.4.c: "Never again"

 I69_faint_and_far_50: "We will acquire the Mage Estate Organization §YReligious Organization§!.\nWe will inherit every subject of the §YMalukhuga sect§! at a cost of §R6§! diplomatic points per development."

 I69_faint_and_far_75: "We will acquire the Mage Estate Organization §YReligious Organization§!.\nWe will inherit every subject of the §YMalukhuga sect§! at a cost of §R3§! diplomatic points per development."

 I69_faint_and_far_100: "We will acquire the Mage Estate Organization §YReligious Organization§!.\nWe will inherit every subject of the §YMalukhuga sect§! at no cost."
 
 I69_festival_tt: "Holding an §YIrdaeos Worship Festival§! while this modifier is active will increase our §MMana§! by §G10§! and our §YMage Estate influence§! by §Y15%§! for 30 years."


 flavour_star_rider.5.t: "The Conclave of Shamans"
 flavour_star_rider.5.d: "The $MONARCHTITLE$ looks towards the bustling city of tents in $CAPITAL$. Such a sight was scarcely seen before in the plains. Impossible to know so many would come yet [Root.Monarch.GetSheHe] was utterly certain of it far in advance. [Root.Monarch.GetSheHeCap] spots an unlikely pair in those streets, a Maslekhuga and Irdukhuga shaman, united in their appreciation for a bit of Shadhavar cheese, knowing that they speak as equals and friends. Precious potential. Potential that, in many ways, exemplifies the purpose of this conclave.\n\nAn assembly of shamans of Irdaeos’ Worship is not so uncommon an occurrence, but not to this extent. Thousands upon thousands of shamans have arrived, a people tethered by those fateful strings that we have established.\n\nThey eagerly anticipate the codification of faith, the promise that every single shaman’s voice will be heard in this assembly. It is a chance to mend the squabbling sects of the plains for the first and final time.\n\nDo our past hardships matter in the face of this excitement? Was the suffering that we have endured in the years after the incursion a necessary prerequisite for the glory of this moment? $MONARCH$ watches the crowd shuffle and ignore [Root.Monarch.GetHerHim].  [Root.Monarch.GetSheHeCap] watches their faces and all are content. And so was [Root.Monarch.GetSheHe].That which the incursion tore apart has been mended, made more beautiful than before. It matters not that we have dominated the plains through bloodshed, that we are overlords receiving gifts and tribute; such is the language of the plains we have been forced to speak. No, today we are all simply followers of Irdaeos."

 flavour_star_rider.5.a: "The fulfillment of our purpose draws near, attained by foresight."

 I69_consensus_start: "This is a pivotal moment. You'll gain multiple events that will influence the estate privilege that you will get by the end of this.\nChoosing §Yone issue§! from a sect will decrease the §YLiberty Desire§! of all followers of that sect by §G25%§!, choosing §Ytwo issues§! will allow us to integrate them for 5 diplomatic points per development integrated. Choosing §Ythree issues§! will integrate the followers of that sect for no cost.\nThere are §Yfour issues§! in total. Do §Rnot§! count on the last one to go your way."

 I69_answer_maslekh: "The Maslekhuga delegation stomps their hooves in agreeance."
 I69_answer_malekh: "The Malukhuga delegation hums a celebratory tune."
 I69_answer_irdu: "The Irdukhuga delegation cheers happily."
 I69_answer_filust: "The Filustkhuga delegation fills the assembly with war cries."

 flavour_star_rider.6.t: "The Gifts That We've Been Given"
 flavour_star_rider.6.de: "All are well fed. All have been given gifts for attending this conclave.\nWhy does one give gifts? Is it an instrument to further one's own influence? Is it a token of friendship? Is it-\n\nThe $MONARCHTITLE$ perks up. [Root.Monarch.GetSheHeCap] remembers this. This was an important argument where he had to intervene. This argument would inevitably turn out to be about the role of Irdaeos, and the gifts that he has given the centaurs. Arguments yet unsaid swirled in [Root.Monarch.GetHerHis] head.\nIt helps that there is no need for further thought, as his mind has been made up months and months ago. Why listen if the point has already been made?\nFour interpretations, of course. Each corresponding to its own sect. Each one fundamental in its approach and the future nature of our faith.\nThe question? The nature of the gifts that Irdaeos has blessed us with. The answer was clear, and there was no doubt in $MONARCH$’s heart. The stars look down favourably on the assembly, and [Root.Monarch.GetSheHe] would not disappoint them.\n\nThis particular debate pertains to the nature of Irdaeos’ gift when he granted us entry to his domain all those years ago. He admired our tenacity, our unyielding will to live and thus allowed us to roam in his domain. Irdülhain, the forbidden plains in our tongue. All of us can agree on this, at the very least. But there have been more signs of Irdaeos’ benevolence than just this single gift, and the importance of each one is up to debate! Is the magic that he has given our shamans the most important aspect? Were we given these lands to enjoy life to the fullest extent in them? Was that the veiled meaning of that initial gift? Or do earthly matters not matter at all? Are these plains just a place to honour Irdaeos in order to gain access to the true paradise, Ik Magthaal, the heavenly domain of the Storm God?"

 flavour_star_rider.6.a: "We've only been given these Plains, brimming with magic."
 flavour_star_rider.6.b: "Magic is his first and foremost gift. There is no alternative."
 flavour_star_rider.6.c: "To enjoy life in all its facets. To have our life be filled with light."
 flavour_star_rider.6.d: "To die and reawaken in Ik Magthaal. To be guided there by HIS star."

 I69_answer_maslekh_1: "Codifying this as our consensus will give us §G-2§! §YGlobal Unrest§! scaling with §YMage Estate Loyalty§!."
 I69_answer_malekh_1: "Codifying this as our consensus will give us §G+1§! §MMagical Experience§! scaling with §YMage Estate Loyalty§!."
 I69_answer_irdu_1: "Codifying this as our consensus will give us §G-10%§! §YDevelopment Cost§! scaling with §YMage Estate Loyalty§!."
