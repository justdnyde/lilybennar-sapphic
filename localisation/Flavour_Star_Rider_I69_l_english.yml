 flavour_star_rider.7.t: "The Ways of our Rituals"
 flavour_star_rider.7.de: "Months have passed, but the conclave still drones on, with only minor breaks between debates.\n\nThe end will likely not be in sight for another year or so. There is excitement still, but it seems the task of codifying this consensus was severely underestimated. It has proven rather difficult to codify all the various and partially incompatible myths of each sect into one coherent understanding of the faith. Foresight, it seems, can only help to a certain degree.\n\nBut it certainly has helped. The orators have become more refined as time goes on, and the conclave’s conclusion might have run against the wishes of the Star Riders if we had not planned for dissent, weighted the dice, guided the course of the debate, with our foresight.\n\nA pause, then reflection. What role does $MONARCH$ play here, [Root.Monarch.GetSheHe] asks himself.\n\nA result against us would not be unacceptable, of course. Just less than ideal. We respect the wishes of the conclave, no matter from where His divine wind blows.\n\nBut for now, we decide the direction. The current debate? The nature of how we celebrate our faith, now and forever.\n\nDo we push ourselves to our limits? Undergo the rites of Maslekh, be it through pilgrimage, survival or strength, to understand what it means to suffer, so we might find compassion for all our peers?\nDo we embrace our magical heritage and use our unique understanding of magic to bless our lands and people?\nOr shall we make these conclaves a common occurrence, to enjoy life as it has been given to us, to sing and dance until our voices turn rough and our legs grow weak?\nOr is it competition we seek, to test our brawn again and again against one another? All in a quest of proving and improving ourselves?\nWhat is to be the true purpose of future assemblies of the clans?"

 flavour_star_rider.7.a: "A period of fasting to strengthen ourselves. Commemorate our exodus!"
 flavour_star_rider.7.b: "To ruminate and commune with Irdaeos' messengers, rocs or shamans!"
 flavour_star_rider.7.c: "To enjoy all that the plains give to us! A festival neverending!"
 flavour_star_rider.7.d: "To test our mettle in valorous competition!"
 
