 flavour_star_rider.9.t: "Consensus"
 flavour_star_rider.9.de1: "This was foreseen.\nIt was fated to happen.\nThe happiest day in all of centaur history. That dreaded day, which $MONARCH$ was once looking forward to. A day brought about by the most egregious misinterpretation of the faith to date.\nIt was not willful. An honest mistake born of desperation. Was it not apparent that we were punished for our misdeeds? But yet, this interpretation is disavowed by all others. It is only we Star Riders who acted in accordance with that doctrine. Driven by my speeches towards a twisted path.\n\nI have no choice but to attend the conclusion. I wish I did not have to.\nWhat matters is the conclave. The codification of our faith, the promise of every single shaman’s voice being allowed to speak in this assembly. A chance to mend the rifts between our people, to truly unite the sects of the plains for the first and final time. And when the time comes, and they try to crown me as caehn of the plains, as future Storm King ruling over centaurkind? I will refuse.\nWe may have paved the way towards the present, but only the shamans can lead us.\nThis was always bound to happen.\nMy choice regarding who will rule us is set."

 flavour_star_rider.9.de2: "This was foreseen.\nIt was fated to happen.\nThe happiest day in all of centaur history. That dreaded day, which $MONARCH$ was once looking forward to. A day brought about by the most egregious misinterpretation of the faith to date.\nWere those insights shared in the speeches of my predecessor genuine? Or just an elaborate hoax to goad our people towards a brighter future? Is such a thing even justifiable?\n\nI have no choice but to attend the conclusion. I wish I did not have to.\nWhat matters is the conclave. The codification of our faith, the promise of every single shaman’s voice being allowed to speak in this assembly. A chance to mend the rifts between our people, to truly unite the sects of the plains for the first and final time. And when the time comes, and they try to crown me as caehn of the plains, as future Storm King ruling over centaurkind? I will refuse.\nWe may have paved the way towards the present, but only the shamans can lead us.\nThis was always bound to happen.\nMy choice regarding who will rule us is set."


 flavour_star_rider.9.a: ""A strong figure, to keep our traditions alive!""
 flavour_star_rider.9.b: ""The shamans must guide us, as they have done before.""
 flavour_star_rider.9.c: ""No one centaur can rule alone! We are a people!""
 flavour_star_rider.9.d: ""Revenge guides us. There is no need for fancy organization.""
 
