 flavour_star_rider.12.t: "Eyeing the New Arrivals"
 flavour_star_rider.12.d: "‘Huh.’\n\n‘Hmmmm.’\n\n‘You can speak our language?’\n\n‘A bit. Well, I do. Your kind is not unknown to us, centaur.’\n\n‘Why are you here with your kin, cyclops?’\n\n‘Tales of your clan travels far, Star Rider. The centaurs of the west speak of your name in many ways. Some with fear, some with anticipation. But all know of your fascination with the stars, fellow. Would you believe us if we said that we shared that same fascination?’\n\n‘What is your favorite constellation, then?’\n\n‘The three-headed dragon is a personal favorite of mine.’\n\n‘I fear I do not know that one.’\n\n‘Seems like we can teach you a bit about stargazing then! Ha!’"

 flavour_star_rider.12.a: "‘Just make sure to only use your eyes when observing the night sky!’"

