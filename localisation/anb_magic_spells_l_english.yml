 enchantment_0_enchanting_envoy_spell:0 "Enchanting Envoy"
 enchantment_0_enchanting_envoy_spell_2:0 "" #UI line 2
 enchantment_0_enchanting_envoy_spell_desc:0 "§gEnchantment is a delicate instrument, whose subtle song is better heard by intimate audiences than large crowds. Therefore, the personalized use of magic directed at a single influential individual best suits the tool.§!"
 enchantment_1_heartstring_spell:0 "Heartstring"
 enchantment_1_heartstring_spell_2:0 "War Magic" #UI line 2
 enchantment_1_heartstring_spell_desc:0 "§gThe Charm spell makes its target broadly receptive to the caster's words and actions, in whatever fashion meets least resistance. The simplicity of this effect scales readily; skillfully wrought auras of Charm can affect entire buildings and beyond.§!"
 enchantment_1_command_animals_spell:0 "Command Animals"
 enchantment_1_command_animals_spell_2:0 "" #UI line 2
 enchantment_1_command_animals_spell_desc:0 "§gMany a Cannorian princess retreats daily to the forested areas of her family's estate, attracting a flock of small woodland creatures to her side. Those in the know understand this is her practicing Enchantment magic.§!"
 enchantment_2_thoughtweave_spell:0 "Thoughtweave"
 enchantment_2_thoughtweave_spell_2:0 "War Magic" #UI line 2
 enchantment_2_thoughtweave_spell_desc:0 "§gA powerful Enchanter can plumb the depths of their target's mind, allowing them even to rewrite memories. Continual use of this power weakens self-identity in the target, creating a blank slate for the caster to reshape.§!"
 enchantment_2_enchanting_embassy_spell:0 "Enchanting Embassy"
 enchantment_2_enchanting_embassy_spell_2:0 "" #UI line 2
 enchantment_2_enchanting_embassy_spell_desc:0 "§gThe levels of Enchantment are as follows: a suggestion, a geas (or compulsion), and an enthrallment (or domination). True mastery is defined by the careful usage of all three types of Enchantment, allowing the caster to pace themselves.§!"
 enchantment_3_dominate_to_surrender_spell:0 "Dominate to Surrender"
 enchantment_3_dominate_to_surrender_spell_2:0 "Siege Spell" #UI line 2
 enchantment_3_dominate_to_surrender_spell_desc:0 "§gEnchantment is a clash of personalities in which the stronger mind completely overtakes the weaker. The right caster can force a thousand men to lay down their arms, so long as their will is stronger.§!"

