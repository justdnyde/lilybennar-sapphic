 magic_spell.800.t:0 "The Golden Child"
 magic_spell.800.d:0 "There has always been controversy around the performance of Rites of Conception, owing in part to the great regional variation that accompanies the practice. In some cultures, the rites extend to the imbibing of certain potions and the inhalation of special smokes by the pregnant party. In others, the rites require the conceiving of twins, one of whom must kill the other in the womb. In the years to come, there will be rumors about the nature of this one's conception and birth. There will be no question, however, as to their magical talent. From a golden-colored pool, the child emerges. Their eyes are already open, peering curiously at you with preternatural sight."
 magic_spell.800.a:0 "This child is our new heir!"
 magic_spell.800.b:0 "I've changed my mind. Our existing heir will serve well."
 magic_estate_magical_elite_heir:0 "We will disinherit our current heir, [Root.Heir.GetName]. Due to the Magical Elite government reform, this will not cost us anything."
 magic_estate_disinherit_heir:0 "We will disinherit our current heir, [Root.Heir.GetName]."
 homunculus_consort_bonus:0 "\nThe §Y[Root.GetHomunculusConsortName]§! will guide this one well:\nIncrease all heir skills by §Y1§!"

 magic_spell.801.t:0 "The Laughing Magician"
 magic_spell.801.d:0 "Oh dear. Something has gone wrong with this one, surely. No child of yours could be so difficult on the eyes, so sickly in their cough, so feeble in their countenance. It is as though their life is a grotesque parody of the one they were meant to live. Some cultures practice the Rite of Conception by conceiving twins and having one kill the other. In this case, it seems the wrong child survived.\n\nThe babe stares one wicked eye at you, and emits a brutish, hacking laugh. My magic was stronger, they seem to say. My magic survived."
 magic_spell.801.a:0 "This is my child. Who said those things? Banish them."
 magic_spell.801.b:0 "There must have been some mistake! We should start over."
 powerful_mage_bonus_legendary:0 "They are a §YPowerful Mage§! with an additional §yLegendary§! school."

 magic_spell.802.t:0 "Complications During Childbirth..."
 magic_spell.802.d:0 "Twins! The very word brings fear to the mind of [Root.Monarch.GetName]. Twins represent a much harder birth, a contested succession, and in some cultures, an ill omen. Twin mages--the air crackles at the thought. Would their sibling squabbles mean the end of the palace grounds, owing to some stray fireball or earthquake?\n\nAs their two heads crest, the tension reaches a fever pitch. The Rite of Conception, intended to bring forth only one child, grows unstable. The energies of two children clash, savage and uncontrolled, flowing in and out of each other in violent streaks of purple. One child is scarred by the conflict, their skin lightly smoldering as arcs of lightning burn blooming patterns into their flesh. The other remains beautiful, serene through the conflict--yet if nothing is done, they shall soon both be dead!\n\nThe wild-eyed midwife turns to [Root.Monarch.GetName], gripping her knife tight. One must be sacrificed, she screams. The ritual was not made for two. She is kind--she does not ask you for your hands, only your word. One phrase, and she will do what a parent cannot."
 magic_spell.802.a:0 "I choose to save the beautiful child."
 magic_spell.802.b:0 "I choose to save the twisted child."
 golden_child_tt:0 "This is a 5/5/5 §YPowerful Mage§!."
 laughing_magician_tt:0 "This is a 3/3/3 §YPowerful Mage§! with one additional §yLegendary§! school."
 other_child_becomes_magical_abom:0 "\n§RThe will to live is strong, even in the sacrificed child...§!"

 magic_spell.803.t:0 "Power Overwhelming"
 magic_spell.803.d:0 "(Placeholder) Tughayasa enters inside you and grants you immesurable magic power"
 magic_spell.803.a:0 "Yippee!"
 #magic_spell.804.t:0 "An Abomination!"
 #magic_spell.804.d:0 "Our pursuit of magic has borne poisonous fruit. Our rites must have been done improperly, or perhaps they were tainted from the start--is it any great surprise that of the many ancient flesh-rituals we followed, one of them might have been aimed towards unseemly ends? All matter of unguents were applied to the [Root.Consort.GetTitle], flesh grafted and rituals spoken that even we half-understood. Now here are the effects of it all: on the date of the birth, when celebrations were being prepared just downstairs, the child delivered itself via bisection, and crawled out of its mother's throat fully-grown.\n\nIt has eyes where it ought to have teeth, and teeth where it ought to have hair. Not a single person present to witness the delivery survived, and the guards are still unable to bring it down."
 #magic_spell.804.a:0 "Grieve violently."

 magic_spell.804.t:0 "Fort Besieged by Giants!"
 magic_spell.804.desc:0 "Our castle at [mass_enlarge_province.GetName] now faces a new kind of foe: giants! By some trick of transmutation, our enemies have sent waves of larger and larger men to our doorstep, kicking in walls and stepping on defenders. We will surely fall to an assault of this magnitude!"
 magic_spell.804.a:0 "How long can this go on?"

