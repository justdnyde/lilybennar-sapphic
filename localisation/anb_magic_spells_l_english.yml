 magic_spell.300.title:0 "Eye for Talent"
 magic_spell.300.desc:0 "The stars were right. The bones held true. The doves were numbered correctly, and the micidorian count came back off the charts: this figure was undeniably the Chosen One spoken of in prophecy. Upon hearing the news, they dropped whatever they were previously doing and traveled to [Root.Capital.GetName], accepting their heroic destiny serving their [Root.Monarch.GetTitle]. There are lots of prophecies, of course, and therefore many Chosen Ones. Seems like there's a new one every day, eager to prove their heroic service to the [Root.GovernmentName]. Which one shall we select?"
 magic_spell.300.a:0 "I'll take... this one."
 magic_spell.300.b:0 "...No, this one!"
 magic_spell.300.c:0 "Wait, actually, this one!"
 magic_spell.300.d:0 "I like the look of this one..."
 magic_spell.300.e:0 "How did they grow a beard like that?"
 magic_spell.300.f:0 "How did they grow NOSE HAIR like that?"
 magic_spell.300.g:0 "Is that a third arm? These Chosen Ones are weird people."
 magic_spell.300.h:0 "We're looking for an administrator."
 magic_spell.300.i:0 "Who here has the most charisma?"
 magic_spell.300.j:0 "We need a military leader!"
 eye_for_talent_adm_advisors_tt:0 "Choose from an assortment of §YAdministrative§!£adm£ advisors.\n§Y[Root.Adm_Advisor.GetName]§! will be dismissed from our court to make way for this new hire."
 eye_for_talent_dip_advisors_tt:0 "Choose from an assortment of §YDiplomatic§!£dip£ advisors.\n§Y[Root.Dip_Advisor.GetName]§! will be dismissed from our court to make way for this new hire."
 eye_for_talent_mil_advisors_tt:0 "Choose from an assortment of §YMilitary§!£mil£ advisors.\n§Y[Root.Mil_Advisor.GetName]§! will be dismissed from our court to make way for this new hire."

