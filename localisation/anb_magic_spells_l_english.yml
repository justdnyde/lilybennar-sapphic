 magic_spell.700.t:0 "Chronophage: The Reaper's Due"
 magic_spell.700.d:0 "Time is a precise clockwork, a mechanism of springs and gears and escapements. The meek mage dares not touch it, overprecious as he is about the continuity of existence. You know better: for one year, one bright, glorious, shining year, you put your finger on the clock hand, halting its cycle—nay, winding it back. Your features smoothed and softened. You knew no consequences for your actions. The lethargy you possessed was exchanged for an anxiety for action. But the mainspring did not stop: it uncoiled further, the tension building and building, your finger slipping off the hand—until it shot forward, clockwork roaring back to life, the clock-hand tracing a year of rotations in a second of movement.\n\nYou lie awake in your bed, the unsuffered consequences of the past year arriving all at once. How many nights did you forget to sleep, on how many meals did you gorge yourself? You are vomiting it up, the fruit of time: its initial sweetness forgotten under a surge of stinging bile.\n\nYou will not open your eyes for the next two days. You will not leave this bed for a week. You will stare at all the lovely people, doing things you once had done, and know in your heart that you will never do them again."
 magic_spell.700.a:0 "Time's Up."

 #magic_spell.702.t:0 "Out of Control Undead Army!"
 #magic_spell.702.d:0 "The recent death of our ruler has seen the undead servants of our realm falter and lose their minds, attacking and eating other subjects of the realm!\nThankfully the magic that keeps them unliving will soon wane, but gods know when that will happen. If we don't do anything our country will be left to the hands of the hungering dead!"
 #magic_spell.702.a:0 "We've lost control! Aaaagh!"
 #magic_spell.702.b:0 "Bring them under my will!"
 #magic_spell.702.c:0 "The Necromancers remain in control."
 #undead_army_becomes_threat_tt:0 "Where once armies stood, wandering zombies will threaten the countryside!"

 #magic_spell.704.t:0 "Undead Army Annihilated!"
 #magic_spell.704.desc:0 "The slow, shambling forces of the dead do not feel fear, and thus will never properly retreat. A recent battle has resulted in the total loss of all necromantic agents, and enemy armies have prevented our necromancers from reaching the battlefield to salvage forces."
 #magic_spell.704.a:0 "Let us survey the damage."
 #magic_spell.704.b:0 "I don't want to hear about this again! (Hide pop-ups)."

 magic_spell.702.t: "Dispute over our Undead Doctrine"
 magic_spell.702.desc: "With our newfound mastery of the necromantic arts, a protracted debate over the form of our undead legions has divided the council. Our mages argue that future wars must be approached in terms of raw numbers. Any future conquests will see us facing vast armies of enemy infantry, providing us in turn with an endless supply of humanoid corpses to throw at our foes.\n\nHowever, such a sudden shift to an infantry-focused army would be difficult, to say the least. We have always fought as cavalry, leveraging speed and size to outflank and overpower our foes. To abandon centuries of tactical and strategic experience is a bitter brew to swallow, and one many of our ordsikars argue is not worth the cost."
 magic_spell.702.a: "It would be wasteful not to raise the enemy dead."
 magic_spell.702.b: "Centaur cavalry reigned supreme in life, and shall now do so in death."
 necromancy_undead_cavalry_mod: "Undead Cavalry"
 necromancy_undead_cavalry_duration: "until §YRacial Military§! changes"
 necromancy_undead_cavalry_hint: "§GEvent Insight§!:\nAs we have §YCentaur Military§!, we will get the choice between keeping §YFull Cavalry Armies§! or gaining §YUndead Units§!\n"
 necromancy_undead_cavalry_units: "Unit Types stay as §YCentaur§!\n"

 magic_spell.710.t:0 "Magical Contagion!"
 magic_spell.710.desc:0 "A ghastly sight awaits us in [contagion_province.GetName]. Our enemies have set a necromantic plague upon their own province, blighting the land and infecting the people with an incurable disease. These villains would sooner bring death upon their own than see us seize control of even a single tract of their land!"
 magic_spell.710.a:0 "Damnation!"

