 magic_spell.401.t:0 "Enchantment Spell Hysteria"
 magic_spell.401.d:0 "Rumours have reached our advisors that the seeds of mass-hysteria have begun to fester. Wide-scale paranoia has spread across the populace, who fear that their minds may not have been their own for a long time, and that [Root.Monarch.GetName] and [Root.Monarch.GetHerHis] gang of [Root.GetMagesName] are the cause of it!"
 magic_spell.401.a:0 "We maintain the masquerade."
 magic_spell.401.b:0 "Deny such accusations!"
 magic_enchantment_hysteria:0 "Enchantment Spell Hysteria"
 
 magic_spell.402.t:0 "$ESTATE_MAGES$ Blackmail Over Enchantment"
 magic_spell.402.d:0 "The disloyal $ESTATE_MAGES$ of our realm have accused [Root.Monarch.GetName] of wide-scale Enchantment, accusing [Root.Monarch.GetHerHim] of being Nichmer the Sorcerer-King reincarnate!\n\nThey do however, understand our concerns, and for a meagre donation to their institutions will keep this incident quiet."
 magic_spell.402.dloyal:0 "The $ESTATE_MAGES$ of our realm have accused [Root.Monarch.GetName] of wide-scale Enchantment, accusing [Root.Monarch.GetHerHim] of being Nichmer the Sorcerer-King reincarnate!\n\nThey do however, understand our concerns, and for a meagre donation to their institutions will keep this incident quiet."
 magic_spell.402.a:0 "Bribe the $ESTATE_MAGES$"
 magic_spell.402.b:0 "Refuse!"
 magic_spell.402.c:0 "Punish them for disloyalty"
 EST_VAL_MAGES_PUNISHED:0 "Mages Punished: §Y$VAL$%§!"

 magic_spell.405.t:0 "Fort Dominated to Surrender!"
 magic_spell.405.desc:0 "The minds of lesser men are ever susceptible to the whims of the mighty, and our soldiers are no exception. Our foes' mages have unleashed terrible arts of enchantment upon the once-stalwart defenders of [dominated_province.GetName], seizing their minds and subverting their loyalties in an instant. Convinced they had no other choice, our own garrison threw wide the gates and invited their enemies inside! The siege ended without so much as a sortie."
 magic_spell.405.a:0 "Damnation!"

