 divination_0_guidance_spell:0 "Guidance"
 divination_0_guidance_spell_2:0 "" #UI line 2
 divination_0_guidance_spell_desc:0 "§gThe primary skill of Divination is to know something one oughtn't know, to know it without explanation and cause. This first manifests only as a gut feeling, yet it is trust in that feeling which defines the Diviner.§!"
 divination_1_deposit_divination_spell:0 "Deposit Divination"
 divination_1_deposit_divination_spell_2:0 "" #UI line 2
 divination_1_deposit_divination_spell_desc:0 "§gThe importance of what is inside the earth varies by location. Aul-Dwarov sought out mithril ("True-steel"), whereas Mašnsih "World-Gardeners" find underground reservoirs in the dry lands. In Vimdatrong, "dragon lines" are identified as suitable places for new chi wellsprings.§!"
 divination_1_eye_for_talent_spell:0 "Eye for Talent"
 divination_1_eye_for_talent_spell_2:0 "" #UI line 2
 divination_1_eye_for_talent_spell_desc:0 "§gThrough prophecy or coincidence, Diviners occasionally pick out certain individuals set apart from the rest. These so-called "chosen ones" are rarely fated heroes, but they are useful nevertheless.§!"
 divination_2_scry_spell:0 "Scry"
 divination_2_scry_spell_2:0 "" #UI line 2
 divination_2_scry_spell_desc:0 "§gCause and effect can propagate impossibly across space, even backwards through time. Scrying is the recognition of this fact, reading the future in tongues of fire, seeing distant lands in the organs of pigeons.§!"
 divination_2_manipulated_fortune_spell:0 "Manipulated Fortune"
 divination_2_manipulated_fortune_spell_2:0 "War Magic" #UI line 2
 divination_2_manipulated_fortune_spell_desc:0 "§gA Diviner cannot force the hand of fate, but neither is she bound to it. Through careful action, an outcome that was always possible can be made almost certain. To the outside world, it often appears as though the Diviner simply has better luck.§!"
 divination_3_foresight_spell:0 "Foresight"
 divination_3_foresight_spell_2:0 "" #UI line 2
 divination_3_foresight_spell_desc:0 "§gThe gift of Foresight is unlike prophesy, giving one the ability to see the near future rather than predict distant posterity. A wise ruler accepts the trade, knowing that today is but kindling for a brighter tomorrow.§!"

