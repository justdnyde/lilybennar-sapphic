 conjuration_0_summon_familiars_spell:0 "Summon Familiars"
 conjuration_0_summon_familiars_spell_2:0 "" #UI line 2
 conjuration_0_summon_familiars_spell_desc:0 "§gAll Conjuration is fundamentally summoning, the calling of what is currently elsewhere. In so doing, the caster can manifest objects across great distances, or even across planes. The first thing most novices conjure is a friend.§!"
 conjuration_1_summon_animals_spell:0 "Summon Animals"
 conjuration_1_summon_animals_spell_2:0 "" #UI line 2
 conjuration_1_summon_animals_spell_desc:0 "§gThe easiest act of conjuration is to summon what already exists, by tugging it first to another plane and then to you. A proficient Conjurer, for instance, may surprise the enemy by the sudden arrival of several dozen feral hogs.§!"
 conjuration_1_conjure_supplies_spell:0 "Conjure Supplies"
 conjuration_1_conjure_supplies_spell_2:0 "" #UI line 2
 conjuration_1_conjure_supplies_spell_desc:0 "§gThe journeyman conjures by using reality as a map, studying physical objects closely and summoning a copy of them. The master relies instead on his mind and imagination, making real the fantastic, summoning from planes of sheer possibility.§!"
 conjuration_2_summon_elementals_spell:0 "Summon Elementals"
 conjuration_2_summon_elementals_spell_2:0 "" #UI line 2
 conjuration_2_summon_elementals_spell_desc:0 "§gElementals are beings of "characteristic energy" pulled from conceptual planes to temporarily serve a master in our world. They tend to be pre-sentient, only partially physical in nature, and extremely upset.§!"
 conjuration_2_aid_construction_spell:0 "Aid Construction"
 conjuration_2_aid_construction_spell_2:0 "" #UI line 2
 conjuration_2_aid_construction_spell_desc:0 "§gThrough the power of the mind, many mages find work in the laborious task of construction. Conjuration can act as a unique form of transportation, enabling building techniques that would otherwise be impossible.§!"
 conjuration_3_extraplanar_contact_spell:0 "Extraplanar Contact"
 conjuration_3_extraplanar_contact_spell_2:0 "" #UI line 2
 conjuration_3_extraplanar_contact_spell_desc:0 "§gOccasionally, Conjuration spells go awry, resulting in the summoning not of beings, but thoughts--perhaps memories. Vistas of the space between planes, knowledge that never was. Were you wise, you'd ignore it. How unfortunate.§!"

