 magic_spell.600.t:0 "Shadows in the Night..."
 magic_spell.600.desc:0 "Movement in the corner of the eye, a figure always just beyond the periphery of sight; these visions and more plague our men every night, disrupting morale and spreading a sense of constant anxiety amongst the troops. Though we are almost certain this is merely the trickery of enemy Illusionists, our myriad reassurances have been unable to completely quell our soldiers’ misgivings."
 magic_spell.600.a:0 "Damnation!"

 magic_spell.601.t:0 "[Root.GetFearAndLoathingName]"
 magic_spell.601.t1:0 "Fear and Loathing in [Root.Capital.GetName]!"
 magic_spell.601.desc:0 "Madness, disorder, rioting in the streets! The hearts of our citizens have been turned against their fellow countrymen, spreading chaos and sparking revolts in our capital. Our mages tell us this must be the result of enemy spellcraft, damnable Illusion magic that muddles the senses with lies and deceit. Only a sufficient show of force will wipe clean the streets of [Root.Capital.GetName] now."
 magic_spell.601.a:0 "Damnation!"

