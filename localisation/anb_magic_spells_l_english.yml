 necromancy_0_false_life_spell:0 "False Life"
 necromancy_0_false_life_spell_2:0 "" #UI line 2
 necromancy_0_false_life_spell_desc:0 "§gTo deal with life is to deal with death. Most novice Necromancers stumble onto their expertise in frustrated attempts to create healing magic. Artificial animation is the first step on their journey.§!"
 necromancy_1_steal_vitality_spell:0 "Steal Vitality"
 necromancy_1_steal_vitality_spell_2:0 "" #UI line 2
 necromancy_1_steal_vitality_spell_desc:0 "§gEventually, each novice Necromancer discovers the same truth: life cannot be created, only transferred. There are alternatively noble and selfish distributions, but to be a necromancer is to decide who deserves to live.§!"
 necromancy_1_contagion_spell:0 "Contagion"
 necromancy_1_contagion_spell_2:0 "Anti-Siege Spell" #UI line 2
 necromancy_1_contagion_spell_desc:0 "§gTo survive, a creature may kill another. Plague is a living being, growing and feasting and dying. Therefore, it is no sin for plague to kill a man to sustain itself. Nor is it a sin to father disease, raise it to maturity, and set it loose.§!"
 necromancy_2_speak_with_dead_spell:0 "Speak with Dead"
 necromancy_2_speak_with_dead_spell_2:0 "" #UI line 2
 necromancy_2_speak_with_dead_spell_desc:0 "§gIn 1751, the Rending of Realms brought ghosts of Halessi ancestors back to the Prime Material. Efforts to measure the casualties were all futile: what is a casualty, after all, besides an arbitrary distinction between living and dead?§!"
 necromancy_2_remove_pain_spell:0 "Remove Pain"
 necromancy_2_remove_pain_spell_2:0 "" #UI line 2
 necromancy_2_remove_pain_spell_desc:0 "§g"In their twos the men arose, stiffly and ungainly from their sick-beds. They gathered up matériel and broke camp, harsh moonlight glancing off rusty fauchards and glassy eyes alike. Unwearily they trudged back to the front lines, the sound of broken bones splintering softly underfoot."\n--Tales from The War of the Sorcerer-King§!"
 necromancy_3_chronophage_spell:0 "Chronophage"
 necromancy_3_chronophage_spell_2:0 "" #UI line 2
 necromancy_3_chronophage_spell_desc:0 "§gHow sweet the supple flesh of unripened youth. How bitter the rind of senescence! The goal of every necromancer is to borrow time--to steal it from others, to take it from one's own future. A binge, followed by a purge. This is health!§!"

