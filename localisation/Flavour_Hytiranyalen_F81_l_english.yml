 EST_VAL_HYTI_SAGE:0 "Approached Lahmaš: §G$VAL$§!"

 MARBLE_MATRIARCHY:0 "Marble Matriarchy"
 MARBLE_QUEENDOM:0 "Marble Queendom"

 estate_hyti_dreamers:0 "Isun Kes"
 unlock_privilege_estate_artificers_hyti_peace_tt:0 "Unlock §Y[Root.GetArtificersName]§! estate privilege §YIdealistic Artificery§!"
 unlock_privilege_estate_artificers_hyti_labs_tt:0 "Unlock §Y[Root.GetArtificersName]§! estate privilege §YWell-equipped Labs§!"
 estate_artificers_hyti_labs:0 "Well-equipped Labs"
 estate_artificers_hyti_labs_desc:0 "From raw materials to tools of all kinds, from ancient pieces of relics to magic scrolls from across Halann, our laboratories have everything that could be possibly needed for researching, and more. Rats included."
 estate_artificers_hyti_peace:0 "Idealistic Artificery"
 estate_artificers_hyti_peace_desc:0 "Few good dreams are had under cannonfire. While there will be times when reality forces our hand, we'll always strive for our Wishcrafting to bring about peace."
 hyti_peace_tt:0 "Increase Artifice Capacity by §G+25%§!."
 hyti_positive_arty_multiplier:0 "§G+25%§! - Idealistic Artificery\n"
 artifice_invention_hyti_magiwind:0 "Magiwind Tunnel"
 artifice_invention_hyti_magiwind_desc:0 "Magic can make even the most insane idea reality. Praise the winds."
 hyti_turn_wind_on_tt:0 "All §Ycavern§! provinces will lose §YState Subsidized§! while the invention is active.\nEvery owned province with §YAdvanced Dwarovar Rail§! will get:"
 estate_artificers_hyti_circle:0 "Research Club"
 estate_artificers_hyti_circle_desc:0 "No matter how much Lady Thiuivene lobby for it in the court, the Isun Kes remains a small circle of like-minded friends, with a limited influence in the realm magical affairs."

 hyti.1.t:0 "Goblin Backstabbery"
 hyti.1.d:0 ""Matriarch! Matriarch!" a breathless harpy shouted to [Root.Monarch.GetName] "the goblins are leaving!"\n"What do you mean leaving? Perzuk's avant-garde just baited the enemy in, I can see the fighting from here"\n"Their main army! That should be on the Ayarelleni flank! It never engaged the enemy, they just went away!"\nA string of curses, to make any goblin's ear in Bulwar ring. "Order our swiftest, most agile warriors to harass the banners in front of us - retreat if they charge! - the rest, with me! We'll fly around and try to save our goblin allies. If we lose Perzuk's men as well, this war is lost."\n\nBallads would be composed of this day, the heroism of the goblins defending against countless aerial assaults, led by Perzuk's example, shining in his white armour; the whole force resisting until finally, in the nick of time, the valorous Matriarch and her harpies swooped them up to safety.\n\n"Well, that wasn't fun."\n[Root.Monarch.GetName] rounded on him. "Not fun?! We got out by the skin of our talons! If it wasn't for our enemy's supreme incompetence we'd be all dead! Perzuk, why the fuck did your soldiers shoot my people, we all wore purple to prevent this shit! And where have the rest of the goblins gone?""
 hyti.1.a:0 ""Back home, to happily report my "death" to Idrarseff, I assume.""

 hyti.2.t:0 "In the Lab"
 hyti.2.d:0 ""For [Root.Monarch.GetName].\n\nI'm growing tired of my advisor job, it eats away from my study time. I'm retiring, effective immediately. Might take up the mantle again in the future, maybe. Best regards, Nyamau."\n\nA polite closing… the Matriarch will be surprised reading that from me. Maybe she won't try to drag me back to the throne room immediately. Now, where was I? Divide the terms by the odd numbers, add the odd rank terms, subtract the even ranked ones… Right, just inscribe the words of power on the arc obtained, then test...\n\nRotten egg! Tauhun the 6th - or are you the 7th? Darned memory… Whatever! What are you doing there, shoo! Stupid cat, always sleeping in my silk hat…"
 hyti.2.a:0 ""Arrogant… Does she think we can't make do without her?""

 hyti.0.t:0 "[Root.GetHytiTitle]"
 hyti.0.t1:0 "The Dream Lives On"
 hyti.0.t2:0 "Even the Skies"
 hyti.0.d1:0 "“Good people, I bear the saddest of news: Nyamau Thiuivene made her final landfall. She died tonight, catching us all unprepared. Yesterday morning she was looking her usual spry self, nagging me for having reordered the escritoire, as per usual. She died doing what she loved - tinkering away in the lab. I was even able to nag her to come to bed one last time… sorry, just a moment… she didn't listen that time either, of course.\n\n“We haven't just lost our brightest mind, a teacher, a friend - Nyamau was a visionary, the herald of a bright future only she could see. She was a harpy ahead of her time.\n\n“But thanks to her lifelong effort we can finally see her vision as well; we need now only to pick up her mantle. Nyamau might be dead, and her loss leaves a huge wound in everybody she was close to, but her legacy lives on.”"
 hyti.0.d2:0 ""Good people, we're here to hold the wake for Hytiranya's greatest heir: Nyamau Thiuivene made her final landfall. She died in her bed, finally peaceful after the long illness. Even if her mind failed her in those last years, even if she couldn't recognize friends and family, even… sorry, just a moment… I hope you'll be able to remember her as the brilliant soul that she always was.\n\n“We haven't just lost our brightest mind, a teacher, a friend - Nyamau was a visionary, the herald of a bright future only she could see. She was a harpy ahead of her time.\n\n“And she dragged our whole nation with her towards this light, changing the life of every Hytiranyaleni, no matter their power, their wealth, or their race. Everyone starred in her dream, and she made it a reality."\n\nThe plaza was packed full for the funeral,  yet no sound could be heard."
 hyti.0.a:0 "The dream won't die unless we let it."
 hyti.0.b:0 "Only the pounding of the downpour."

 hyti.3.t:0 "A Dreamer"
 hyti.3.d:0 "The roost has changed.  The winding road to the palace is familiar, killing my legs once more, and the food stalls along it will soon make me fat again.I see scars from a siege around… and yet the people are not scarred. If anything, many seem to have a new twinkle in their eyes, walking around with a newfound pride. And the sheer number of harpies! Hytiranyalen wasn't so bustling when I left. The market plaza is full of hagglers begging the vendors for discounts - harpies not of our flock, the lot of them. And many merchants peddling luxury wares, a rare sight in my memories. They all have plenty of clients too!\n\nAnd yet the residence of the Vetaunyar next to the palace is unchanged. The queue of hopefuls outside of it is as long as it always was, all praying to find a mage willing to listen to their requests, hopefully without having to sell all their jewelry to pay for it.\n\nWell, now that I'm back this won't continue for long. Everybody should be able to experience the joy and the wonder of using magic - and I KNOW there must be a way of doing that.\n\nLook at me Bulwar, for even the Kurešim of old will pale in comparison to what the future is gonna bring!"
 hyti.3.a:0 ""Nyamau is back! As an apprentice of Lahmaš itself!""

 hyti.4.t:0 "A Day in the Eka-Idulnazzar"
 hyti.4.d:0 ""A beloved face". Peh! That's what I get for trying to use divination, can't even help me find a few book sources. Useless magic…\nOh well, exploring a library is always fun, losing myself in the books will be…\n"Miss! Miss! Lady Harpy!"\nWhere…? Oh! How tiny! "Hello there! Are you a student here? I thought everyone ran when we won the field."\n"No no no, I wish! I'm just a cleaning lady. When Karodir lifted the ban on human magic I came here with a bit of hope, but… I'm not just a human, but also a woman, and worse yet, I don't have money. But I did manage to listen to lessons while working, and look at the books a lot! Do you need help?"\n\nShe's still there, staring at me… Creepy. But these books are a rarity - some of them are ancient! - focus on them.\n\n"Yes! This is what I needed!"  - oops, that was a bit loud. The natural world is the answer, I knew it! We channel a minuscule amount of its total energy; properly done, I can take so much more. And it has been done before, even! Quick, back home, need to test.\n"Are you going?"\nSkies. "Yes, I'm returning to Hytiranyalen. Your help was invaluable, thank you miss…?"\n"Nairia! Miss Harpy, do you think I could maybe come with you?"\nGirl. Be realistic. "Listen, I'm sorry…"\n"Please! You have to understand, I have always been fascinated by flight, even more than magic! If I can stay in a roost for a while I can study how it works, the physics of it, your movements, your anatomy…"\nNow she's blushing.\n\n"Fine, you can come." How could I say no to a fellow scientist?"
 hyti.4.a:0 ""Name's Nyamau, by the way. Miss Harpy is weird.""

 hyti.5.t:0 "Ceremony at Aqatbar"
 hyti.5.d:0 "[Root.Monarch.GetName] was the one who first hit on the idea of a public marriage: one big show to demonstrate to the people that we were not foreign conquerors, but allies come to right a great injustice. Perzuk, the victim of said injustice, was therefore put in the spotlight at all times, with the Matriarch one step behind him.\n\nIt worked very well. The ceremonial plaza where the parade ended was packed to the brim of people of all races. Conquerors and conquered, humans, harpies, elves. And goblins. So many goblins, going utterly wild: whistling, hooting, doing weird group dances.\n\n[Root.Monarch.GetName] turned to Perzuk, murmuring.\n"Look at them - they were fighting us less than a month ago, now they seem overjoyed by our presence. I'll be honest, such two-faced opportunism is unpleasant to me."\n"It's not like that, really. They're genuine, mostly. Us goblins, we're used to abrupt changes. This makes us take things as they come, and enjoy the present if we can. Today's a party, so they're gonna party hard. And, well… many goblins have a… let's say, idealized view of harpies."\n"Thanks for sparing me the details. Good. It means this political marriage is working."\n\nThe culmination of the day, after many shamanic rites, long tired smiles, solemn discourses, was the officiation of the marriage with the exchanging of gifts between the spouses: a branch of a Sycamore from [Root.Monarch.GetName], representing unity, a marble brick from Perzuk to build a new life. Between the two an exchange of vows passed, supposedly that only they should hear:\n\n"Dear wife, I intend for this marriage to be more than a political one. Will you allow me to woo you in the coming months?""
 hyti.5.a:0 ""Oh. Oh! Well, you're free to try at least.""
 hyti_gobbo_dad_tt:0 "Expulsion and purging of §Ygoblins§! will be forbidden.\nOur heirs will have a higher chance of having a goblin father.\nThe meeting of the heir and their father will always have a positive outcome if the father is a goblin."
 hyti_remove_opinion_vassal:0 "Removes relation penalty from §Yforced vassalization§!."

 hyti.6.t:0 "Cotton, a Goat and Cannons"
 hyti.6.d:0 ""Your Majesty, I can proudly proclaim the experiment a resounding success! The concoction proved to be an extremely effective accelerant, and mixing some drops of it together with black powder showed a demonstrable increase in our firearms range and stopping power. I'm sure many civilian applications of the compound will soon be found, also!\n\nBut more than that, I personally learned much from looking at the goblin tinkerers’ approach to research and magic: I now believe that integrating their methods - with some adjustments, to be sure - is paramount to speeding up all of our projects. It's by embracing their wild approach to science that I thought of sousing cotton with caprine saliva, after all!"\n\n"Nyamau, if you and your goblin clique don't rebuild the left wing of my palace by next week, and cleanse the garden of the goat entrails DOWN TO THE VERY LAST PEBBLE by tomorrow, I will torch every feather of your very large behind, then parade you upside-down across the entire realm! Now, OUT!""
 hyti.6.a:0 ""Went better than expected!""
 hyti_lose_arti:0 "§YHytiranyalen§! loses §R10§! units of §Yartillery§!"

 hyti.7.t:0 "The Mountain Calling"
 hyti.7.d:0 "Right from the very first day we took residence in the Summer Palace, it caught my attention. Ruined, the stone carrying no trace of the gleam held by the brick Perzuk gifted me, I nonetheless could not take my eyes off it: the Marble Gate of Shazsundihr.\n\nNot even a shadow of its former glory is left, in truth: the great doors opening onto the mountainside are half-rotted away, all decorations long gone. And yet I keep meandering around it during our hunts.\n\nWhat could be hidden inside? How glorious must be the great rooms chiseled out of the stone? The goblins tell me only ruin and death is left in those halls, but they just didn't have the aptitude for it when they invaded the hold - they only sought treasures.\n\nThe architecture, the machinery, the thousand years old science must be there, or at least some traces of it, waiting to be rediscovered. Never mind the darkness, the mountain's calling me in."
 hyti.7.a:0 "Is Nyamau rubbing off on me…?"

 hyti.8.t:0 "Whence They Came"
 hyti.8.d:0 "Shazstundihr hadn't seen so many goblins since the Exodus.\n\nA mass of down-at-heel goblins, slowly trudging across the Marble Gate, the underbelly of Aqatbar moving out as one to new pastures. Not greener ones, either, as was clearly shown in the migrants’ expressions - a mixture of resignation and despair was stamped across their faces.\n\n"The first time I felt the sun on my skin is still one of my happiest memories - and yet I'm going back down again… fuck my life."\n\nIn the time of Exodus it was an entire people on the move, the children, the women, the elderly all searching for a place to finally be free of the orcs. That wasn't the case now; you'd see very few families among the crowd. Nobody wanted their child to grow up in the caverns.\n\n"They say there's gonna be new opportunities inside the mountains, with free gold given by the Harpy Queen… And I believe them, I won't miss going to bed hungry - still, I hate it."\n\nSticking out like a sore thumb, a handful of bright-eyed harpies were also marching downwards, earning sneering looks from everyone present. A betting group was quickly formed; no goblin wagered on any harpy resisting more than 2 months underground, no matter the payout."
 hyti.8.a:0 "The first Dwarovar settling expedition has been launched!"
 hyti_surf_hold1_tt:0 "We are now able to build §YFledgling Roosts§! in §Ysurface holds§!.\nEstablishing §YFledgling Roosts§! in §Ydamaged surface holds§! will also give:"
 hyti_gobbo_hates_caves_tt:0 "Every province we own or will own in the §YSerpentspine§! will gain:"

 hyti.9.t:0 "Luxury Inside and Outside"
 hyti.9.d:0 "What we expected: ruins of complex machinery of obscure operating principles, made up of thousands upon thousands of ruined little parts, a puzzle from hell that would take decades to solve. What we got: water! Water and pipes, water and hoists, water and slopes. Water as a counterweight, water as a transport, water as a storage of energy.\n\nIt's clear there were also advanced machines connected to the hydraulic system of Hul-Jorkad, exploiting its power or/and helping make it run more efficiently, but nothing survived the fall of the hold. It doesn't matter, though; the genius of it is in the skeleton of the system, the myriad applications and sheer size.\n\nWe've reconstructed what we could, and will substitute what we don’t with magic instead. There's still old power in the system, the memory of water flowing here for thousands of years.\n\nWe have flowing water going from the foot of the mountains down in its depths and up along its face, bringing luxury in the homes of goblins and harpies alike. Hul-Jorkad will become a dual city, wonderful above and below, with the two halves mingling during the day and sleeping peacefully at night."
 hyti.9.a:0 "Fit for a Mountain Queen!"
 hyti_surf_hold2_tt:0 "\nWe are now able to build §YFlourishing Roosts§! in §Ysurface holds§!.\nOnce built, the province will also get the §YDual City§! modifier, to offset the §YNon-Subterranean Race§! malus."
 hyti_can_dam_tt:0 "We accrued experience enough to start the §YJorkad Dam§! project. Hydropawah!"
 hyti_build_watercourse:0 "\nThe uses of water are endless, we need a new project to refine what we've learned here - the §YOld Bulwari Canals§! are a nice challenge. After that, who knows, we might think even bigger."

 hyti.10.t:0 "Sing the Future"
 hyti.10.d1:0 "It seemed all the hatchlings of Mišarallen were out in the streets, busy running after their new toys, a cart fueled by its little owner's singing… no matter how out of tune. The resulting cacophony was deafening the whole city, Songhouse included. It didn't do anything to smother the joyful atmosphere; on the contrary, the din fueled more jokes and happiness:\n\n"With great power comes great responsibility, and we gave a minute amount of power to the most irresponsible beings on Halann!"\n"We were so preoccupied with whether or not we could, we didn't stop to think if we should!"\n\nThe festive mood was well deserved: the Song stubbornly resisted many attempts of reproduction because both the sound and the magic needed to be recorded, and recorded together. Otherwise one was left with a sad magic scroll that any race could write,  a song doodled on the side.\n\nIn the end, the answer to the riddle was in looking at sound as vibrations. And, you know, adding damestear.\n\nFinely cut crystals of damestear in a very specific shape, arranged along thin metal threads, resonated to the Song, storing its magical energy. Then, a harpy - and only a harpy - could sing close to it to release its power again.\n\nI always paid too little attention to the Song, focused as I was on Inscription first, and all kinds of magic later - it was just one craft among many.\n\nBut those last years of focused study made me fall in love with it; not just the magic, but the music as well. It is incredible. Beautiful math made sound.\n\nHa. Look at me, finally re-discovering my roots as a decrepit hag… I’ve become a cliché. And I'm gonna force everybody else to humor me in the process – tomorrow I'm gonna sing what I've composed!"
 hyti.10.d2:0 "It seemed all the hatchlings of Mišarallen were out in the streets, busy running after their new toys, a cart fueled by its little owner's singing… no matter how out of tune. The resulting cacophony was deafening the whole city, Songhouse included. It didn't do anything to smother the joyful atmosphere; on the contrary, the din fueled more jokes and happiness:\n\n"With great power comes great responsibility, and we gave a minute amount of power to the most irresponsible beings on Halann!"\n"We were so preoccupied with whether or not we could, we didn't stop to think if we should!"\n\nThe festive mood was well deserved: the Song stubbornly resisted many attempts of reproduction because both the sound and the magic needed to be recorded, and recorded together. Otherwise one was left with a sad magic scroll that any race could write,  a song doodled on the side.\n\nIn the end, the answer to the riddle was in looking at sound as vibrations. And, you know, adding damestear.\n\nFinely cut crystals of damestear in a very specific shape, arranged along thin metal threads, resonated to the Song, storing its magical energy. Then, a harpy - and only a harpy - could sing close to it to release its power again."
 hyti.10.a:0 "Making people happy is what Wishcrafting should always be about."
 hyti_can_slowly_research:0 "We can now research new §Yartificer inventions§!, but the research will take §Rtwice as long§!."

 hyti.11.t:0 "Endless Run"
 hyti.11.d:0 "Light and darkness are fighting above me\nCutting through the plumage and mind.\nFor those who do not know magic,\nWho couldn't understand its sound\n\nI am calling, calling now\nWinds rise, stop falling\nTo stay myself longer…\nCalling, calling, in the depth of longing\nTo stay myself longer…\n\nEndless run…\nWhile I'm alive, I can strive to keep flying\nTo learn the dream… to pass it on\nEndless run…\n\nCalling, calling, for the place of knowing\nThere's more than what can be wished\nCalling, calling now, never will I look away\nFor what life has left for me\n\nYearning, yearning, for what's left of my bearings\nTo stay myself longer…\nCalling, calling now, winds rise, stop falling\nTo stay myself longer…\n\n\n"Lady Thiuivene, you were amazing last night! Such a moving set of songs… How can you also sing well, it's unfair for everyone else if you can do everything!"\n"I’m sorry, who are you…?""
 hyti.11.a:0 ""Oh. A bad day today then...""

 hyti.12.t:0 "A Harem of Knowledge"
 hyti.12.d:0 ""On second thought, why employ all these incredibly smart people merely as advisors? Let's introduce them to the harem instead! And in the future, build the harem around them! The harem already often doubles as an advisory council; we might as well formalize this function, grabbing two Gelkaris with a goat!\n\n“And the Firanyan flock always boasted the strength they got by constantly mating with their orcs: even if intelligence is not so directly passed between parent and child, our heirs always having brilliant fathers will still count for something right?"\n\n"...the half-elf from Cannor sure is cute, isn't he?"\n\n"Right?! And the Kheteratan woman is breathtaking!"\n\n"..."\n\n"...\nWell, it's not just that. I had the most interesting conversation with her last evening, she's well-versed in all kinds of…""
 hyti.12.a:0 ""Matriarch, please stop digging.""
 hyti_advisors:0 "Gain §Y3§! random advisors from Koroshesh, Konwell and Giberd."

 hyti.13.t:0 "Something's Missing"
 hyti.13.d:0 "A sharp ripping crunch reverberates through the caverns. Yet another train gone.\n\nThe physics behind it is sound. The magic is working, too well even. There's so much power inside the tunnels when the pylons activate - much more than what we anticipated. It's a wonder that the whole mountain doesn't come crashing down on our heads.\n\nThe problem is in the engineering, the materials! Our trains simply can't handle the pressure, they crack like eggs.\n\nWe need to look back at the source; we might still have something to learn from the old masters."
 hyti.13.a:0 "And get better materials!"

 hyti.14.t:0 "Soaring Underground"
 hyti.14.d:0 ""All aboard the MagiWind Express! The Shazstundihr-Orlghelovar train is about to depart!"\n\nA hurried movement, all the stragglers rushing to the doors. The carriage section was full to bursting; nobody that counted for anything in the realm wanted to miss the inaugural trip. Of course the real first trip had happened months ago, with an empty train, and many more followed, daily test drives to check everything was in order.\n\nThe caution was well warranted - to call this feat futuristic would still not capture the reality: inside the closed tunnel, the carefully inscribed pylons were making air disappear in front of the locomotive, for just an instant, and reappear behind it, thus propelling the train forward. To resist the energies involved, the train itself looked like something out of a dwarven tale of  golden Aul-Dwarov: a single bulky vehicle, entirely coated in mithril.\n\nShazstundihr-Orlghelovar in one hour flat."
 hyti.14.a:0 "Choo-choo!"
 hyti_magic_trains_tt:0 "The dwarven rails between §YShazstundihr§! and §YOrlghelovar§! will be upgraded.\nFrom now on, all provinces with §YAdvanced Dwarovar Rail§! will also gain:"
 hyti_magic_trains_tt2:0 "Unlocks the §YMagiwind§! invention, which activates all the §YMagiwind Tunnels§!, giving the following to the rails:"
 hyti_cave_mod_reduction:0 "The §YState Subsidized§! modifier will be reduced in the caverns.\nWhile §YMagiwind§! is active, the modifier will be removed altogether."

 hyti.15.t:0 "A Waking Dream"
 hyti.15.d:0 "The air of a whole nation was vibrating as one, taut with excitement. To celebrate the opening of the Isun Kes lodges to the general population, all who visited were presented with a choice of useful trinkets from which to select their gift.\n\nThe sharp deviation from the one-time spells they were used to was evident: Wishcrafting manufacts, once sole appannage of the richest, had finally reached the everyharpy. Less powerful, yes, lasting for a limited number of uses yes, but cheap. All who were handed an inscribed tool could feel a new era beginning: magic at their disposal, to be used whenever they felt like it, several times. Magic in one’s pocket.\n\nThe happiness of a little goblin receiving the most amazing gift, already plotting mischief with it; the expression of wonder of an old harpy who thought they had seen everything; the straightening back and newfound surety of a poor man, who could for once feel some power in his hands – this was it.\n\nThe joy of making new discoveries was a reward in itself, of course, but this? The feeling of having just improved the life of a whole nation? For everyone that had worked on the laquieti Ištaror, it was the pinnacle of their career, something they'd fantasized about during hard days in the lab. But what they were experiencing now surpassed their own hopes.\n\nWaking up, and realizing that the dream is real."
 hyti.15.a:0 "The future is now."
 hyti_odd_hunt_tt:0 "Researching an §Yartificer invention§! will now take the standard amount of years\nUsing §YSeek What You Will§! while we're researching an invention will reduce the research time by §G1 year§!.\nThe §YLawaššari Zamukaraš§! [Root.GetMagesName] privilege will now give a bonus to artificery regiments in place of the one for the Zamukaras regiments."

 hyti.16.t:0 "The Aim of a Life"
 hyti.16.d:0 ""Nyamau! Look who came to visit! It's your friends and colleagues from the Isun Kes! They have big news!"\n\n"Greetings Lady Thiuivene! We all came as soon as we could; everybody wanted to be here to report it. We've finally opened the lodges to the public, and gave everyone who came their first inscribed item!\nThe first realization of your vision, the future you were always painting to us to drive us forward! Isn't it amazing?"\n\nNyamau Thiuivene did not respond, nor show signs of understanding; a constant, in the last couple of months. Over  the last year, the vagueness and absent-mindedness had claimed more and more of her, gradually consuming the harpy that was.\n\n"Look! Look! She smiled! You understood, didn't you, Nyamau? Oh thank you, good people. Even if she doesn't show it, she must be beaming inside. And you've brightened my evening as well!"\n\n"I don't… Of course, I'm sure she understood. I'm happy we could relay the good news. We're going now, we wouldn't want to tire Lady Thiuivene. Good night, milady.""
 hyti.16.a:0 ""I saw her looking! I swear I did!""

 hyti.17.t:0 "A Prophecy"
 hyti.17.d:0 "Even though Hytiranyalen had now complete control of Vainviria, this didn't mean the Nansaleni queen lost all her power - she was still the leader of her flock, her voice something we couldn't completely discard, even if we wanted to.\n\nFor this reason, [Root.Monarch.GetName] was meeting the dethroned harpy, dragging yours truly along. Mindnumbingly boring hours of politics ensued, with scant few rejoinders to keep me entertained. Even the two monarchs couldn't really handle the tedium, and breaks were numerous; during one of those I was approached by the Nansaleni Matriarch.\n\n"Dreamer. You are known to me." - yeah, she really talked like that - "Your ideal might be noble, but you're soaring too high. The gift has shown what awaits you. Failure. You'll fail, again and again and again."\nFantastic, I thought, the diviner was here.\n\nDivination - the realm of charlatans and scammers. If you can predict the future, tell me the date of my death, then maybe I'll believe you once I make the final landfall. Of course I couldn't tell her that, but - big surprise - I didn't stay silent either.\n\n"Your gift isn't telling me anything new, my lady. I know I will fail. Uncountable times. Until I discover something new. And then do it again. Upon those failures, I'll build a new world.""
 hyti.17.a:0 "The diviners will be encouraged to direct their efforts to useful magic."

 hyti.18.t:0 "Old Debts"
 hyti.18.d:0 "The goblins have a terrible reputation in Bulwar. "Thieves and pillagers, they are!" "They bring only ruin!"\nThey have done all that, of course, and many of them are even proud of it! The Exodus was an invasion from Bahar’s point of view, with all the death and destruction that followed. But they are much more than that, capable of incredible feats, accepting of people of all kinds and races, open to every new thing. Yet the men and elves don't see those facets.\n\nWhen it comes to orcs, then, watch as the goblins act exactly as the stereotypes depict them. Considering their history, their fathers and grandfathers slaving away under the orcs, it's understandable. Even so, seeing the ferocity and wickedness they show towards any orc is disturbing.\n\nAnd now they're asking to administer the orc communities around Lake Jorkad."
 hyti.18.a:0 "Ominous. No."
 hyti.18.b:0 "We're not the Firanyan, let them do as they see fit."

 hyti.19.t:0 "Kindred Souls"
 hyti.19.d:0 "There are misguided harpies that believe science and culture stand in opposition. The cold and rigid mathematical nature of natural sciences versus the flighty and romantic nature of cultural studies.\n\nFools.\n\nEverybody that has dedicated their life to either discipline knows that science is part of, and inspires, every kind of art - and, as a mirror, science has elements of art, poetry, music inside it.\n\nThus no flock is closer to us in spirit than the Mišaralleni. Bards, sculptors, vetaunyar studying the magic of the Song – there's no facet of harpy culture this flock doesn't excel in. Let's focus on what we have in common, forging a bond linked by our love of knowledge."
 hyti.19.a:0 "Arts elevate the harpy to upper skies."
 hyti.19.b:0 "Focus on our purpose. We're most interested in the Song."

 hyti.21.t:0 "When I was Young..."
 hyti.21.d:0 "A preacher is making waves in [angy_province.GetName], holding sermons against the Laquieti Ištaror. They exhort that it will ruin the harpy spirit, make them rely on a tool instead of themselves; "the future harpy will be a weak one" they swear, "if we don't halt this group now."\n\nMisguided as this preacher is, they're no doubt very charismatic, and many people in the area have already been swayed by their words."
 hyti.21.a:0 "Endure misunderstanding upon the Hunt."

 hyti.22.t:0 "Jobs at Risk"
 hyti.22.d:0 ""We, representatives of the guilds of Hytiranyalen, are writing to issue a formal protest against the diffusion of cheap inscribed tools. After inspecting some initial designs, we fear a future where these objects will make mass producing low quality versions of our artisanal products far too easy. And many of our members and their workers fear for their jobs. This is to say nothing of the safety issues - our merchandise is guaranteed by a crafting expertise spanning generations, while one in ten of their tools ends up malfunctioning in some way.\n\nWe implore the Matriarch to put a stop to this foolishness; we have been able to assuage their worries until now, but without good news we probably won't be able to for much longer.""
 hyti.22.a:0 "The march of progress slows for no one."
 hyti.22.b:0 "Promise some compensations."

 hyti.23.t:0 "Magical Strike"
 hyti.23.d:0 ""This is a direct challenge to the Vetaunyar! I've read that harpy’s writings – she especially calls out the magical establishment, and would love nothing more than to see us completely replaced by inanimate objects!"\n\nThe incensed old harpy’s voice filled the throne room. The Venerable Elder, wearing a title given to the oldest of those Born from the Song, was known for their outbursts of anger; yet acting like that in front of the Matriarch was unprecedented even for a firebrand like this.\n\n"I hereby proclaim that the mages of this realm will refuse to act in service of the crown until this attack is over! I won't allow our members to be slandered!""
 hyti.23.a:0 ""Is she wrong though?""
 hyti.23.b:0 "Acquiesce to their demands."
 hyti_magistrike:0 "§RDisallow§! §Yspellcasting§! unless the ruler or the heir is a §YPowerful Mage§!."

 hyti.24.t:0 "No Reins"
 hyti.24.d:0 "Many goblins, by now completely assimilated into our society, have found jobs inside the workshops that have started popping up around the realm. Their sleight of hand, so often decried by those who believe them to all be thieves, allows them to be more productive with complex machinery than any other race of the realm.\n\nThe most enterprising among them have managed to negotiate better pay, thanks to the odd ingenious improvement to production methods they have come up with. It's not rare that the innovation is a bit too wild though, and many owners have been forced to request a meeting with members of the Isun Kes to solicit a second opinion, fearing the proposed "improvement" to actually be a hazard.\n\nToday brings one such case, and a magnate from [boom_province.GetName] has arrived for a consultation."
 hyti.24.a:0 "Maybe not this time."
 hyti.24.b:0 "Do you even have to ask?"

 hyti.25.t:0 "Dreamer Heir"
 hyti.25.d:0 "With Nyamau's constant breaches of protocol, is no surprise that many young impressionable harpies of the court end up fascinated by the misfit. It often doesn't last long, thanks to the wishcrafter's grating personality, but still a handful of them end up orbiting in her circle, and making research their main interest.\n\nThis time the captivated soul happens to be the favorite heir of [Root.Monarch.GetName]. While study of nature and magic is considered a very worthy endeavour in our nation, an heir to the throne should still be focusing their time on a varied education to be ready to lead once they ascend to the throne."
 hyti.25.a:0 "Remind them of their responsibilities."
 hyti.25.b:0 "Science is what we do. Why wouldn't [Root.Heir.GetName] be allowed to do that?"

 hyti.26.t:0 "Fly with Me"
 hyti.26.d:0 "A few of the newcomers in our roosts migrated here with a very specific goal in mind: these unfortunate earth-bounds long for our ability to fly. For such fixated individuals, riding Zamukaraš or being transported by one of us is not enough – they want to feel like they themselves are flying.\nThis obsessive trait is often found in otherwise brilliant minds, so much that some of them even gain a position as court advisors. And yet, even prestige and power won't distract from the goal.\n\nSo here we are, our court advisor inside some complex machinery that they believe "will for sure function this time"; several harpies are ready to attempt a save once the great invention inevitably fails. But grabbing a body is one thing… a big vehicle is another."
 hyti.26.a:0 "Let's hope for the best..."

 hyti.27.t:0 "Fumes Abroad"
 hyti.27.d:0 "In our quest to find the best substrate for inscription spells, we haven't given much thought to what it takes to get there - only how well it works has traditionally mattered.\n\nIt seems the way we currently smelt the Anniwan alloy produces an enormous amount of smoke; so much that we have started to receive indignant protest letters from neighboring countries, whose border folk fear the fumes’ impact and resent the stench and the haze on the horizon.\n\nWe can't change the production method now – it will take us back years – Is there some other way we can get them off our case?"
 hyti.27.a:0 "But it's the scent of the future!"
 hyti.27.b:0 "Pay some reparations."
 hyti_gain_badboy:0 "Every neighboring country will gain §R10§! aggressive expansion towards us."

 hyti.28.t:0 "Rogue Experimentation"
 hyti.28.d:0 "Sadly not every scientist respects protocols, follows safety measures, or researches with the wellbeing of other people in mind. Such amoral artificers pursue a path towards power and glory at any cost, with no respect for the purity of science.\n\nThe worst of them work in secrecy, using toxic drugs and even mages' blood as components for their trinkets and concoctions. Some go as far as to use live, intelligent beings as test subjects. When they succeed, they know someone as morally bankrupt as them will pay handsomely for the innovative discovery."
 hyti.28.a:0 "Evil!"

 hyti.29.t:0 "Scientists in the Deep"
 hyti.29.d:0 "There's no place as opposed to harpy wellbeing as the Dwarovar. No space to maneuver, no light to see, no wind to invoke.\n\nAnd yet the call of the unknown coming from below the mountains has continued to ensnare the scientific and adventuring types. Whether they hope for material gains, for ancient dwarven knowledge, or are just in it for the thrill, every year a handful of them organize an expedition for the caverns.\n\nIt doesn't matter that many never return.\n\nNews from the latest one of those, a scientifically focused endeavour this time, just reached the surface."
 hyti.29.a:0 "Party wiped!"
 hyti.29.b:0 "Ancient dwarven tech found!"

 hyti.30.t:0 "Yet Another Project"
 hyti.30.d:0 ""Your majesty, I got my talons on a new book - it's so interesting, you should read it! Look at this passage here, no, there - it details a procedure I’ve never heard of before!"\nThe skeptical expression on [Root.Monarch.GetName] quickly morphs into outright exasperation.\n"Another side project? It must be the fifteenth time this year! Shouldn't you focus on your main objective for once? And I assume you're wanting funds for this…"\n"Matriarch, continuously hopping between several projects is how I keep myself interested in all of them. If I had to just look at one thing I'd get bored – my head wouldn't be in it!""
 hyti.30.a:0 "Fine."
 hyti.30.b:0 ""Not this time, we need the gold.""

