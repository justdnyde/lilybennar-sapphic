# Events
flavor_parusahan_saya.1.t: "Borrowing Blades"
flavor_parusahan_saya.1.d: "We've received a call to action from Parusahan Saya, one of our subjects within the heartlands of Rahen. The lands of Kramitra and Satarsaya have recently fallen under their control, and the new powers of the land have struggled to rein in the rebellious old powers who still run rampant within the territory. They've petitioned for a contingent of the palace guard to be dispatched so they may better exert control over the region and get back to producing more food for the rest of the Raj. This state has helped us before in the past, and have proven to be loyal to the Raj in many other cases. Perhaps this has earned them a token of our respect?"
flavor_parusahan_saya.1.a: "Send them our best!"
flavor_parusahan_saya.1.b: "Send them some reserves."

flavor_parusahan_saya.111.t: "Response of the Raja"
flavor_parusahan_saya.111.d: "The Raja has sent us their best! Golden-armored guards flood the streets, assisting in maintaining order of our new holdings."
flavor_parusahan_saya.112.d: "The Raja has sent us a handful of fresh recruits accompanied by a regiment of drafted peasants. This is not ideal, but we will make use of what has been provided."
flavor_parusahan_saya.111.a: "Wonderful!"
flavor_parusahan_saya.112.a: "Not Entirely Unexpected."

flavor_parusahan_saya.2.t: "The Secret Heirs of Acay The Younger"
flavor_parusahan_saya.2.d: "The Hall of Endless Debate has been up in arms ever since the conquests of Parusahan Saya began to expand. Loyalists to the Raj cry foul, worrying as to the true extent of the rising nation's dreams of conquest. Defenders of the new power in Rahen claim that the land seized is better served by them, and the foolish masters who once controlled it are better off holding nothing at all. None of these voices are louder than the resounding call of Vallasenar of the Dancing Stalk, a young upstart who has made it his life's work to extoll the virtues of Parusahan Saya. But today the agrarian scholar is nowhere to be seen, and those within the Hall breathe a sigh of relief at the thought of avoiding one of his fanatical exultations.\n\nInstead, a harimari has taken to the central dais of the debate chamber, and as he stands the sound within the room seems to completely drain away, drawn into him through his grandiosity. \"Hear me!, he roars and all eyes turn towards the declaration. \"Many have sought to disparage the great state of Parusahan Saya! They claim our blood is weak, that we are not fit to rule such large swaths of land! But they are WRONG!\"\n\nHe jabs a claw towards himself, and a wicked smile flashes across his face. \"I am Golpalar III, long lost heir of Acay The Younger, and a true successor to the Lotus Throne of the Second Harimraj!\" He gestures into the crowd, and a familiar face walks from the group of shocked academics - Vallasenar, draped in a robe of green and gold. \"And my brother, Hemantsen I, shares the same claim to this powerful dynasty! We are no simple upstarts vying for fleeting power - we are the future, come to claim our destiny!\"\n\nThe scholars explode into heated debate, with Golpalar and Hemantsen being ushered out before the situation becomes truly untenable. The argument rages on for days, and through it all one question lays heavy on the minds of the detractors:"
flavor_parusahan_saya.2.a: "\"What do we do now?\""
flavor_parusahan_saya.2_tt1: "The Vizier's allies lose §r30§! Trust with the Vizier and gain §v30§! Trust with us."

flavor_parusahan_saya.3.t: "A Desperate Attempt"
flavor_parusahan_saya.3.d: "The meteoric rise of [Root.Monarch.GetName] has shaken the Raja to their core. Alliances shift and new powers consolidate as Parusahan Saya seeks to claim the second most powerful office in all of Rahen. This is not something which can be allowed to come to pass, even if it means the very foundations of the Raj will be turned to rubble and smoke.\n\nThe missive arrives mere days after the war is declared; the Raja has forsaken the sacred oath of the Senapti and is now rising in direct opposition to our rule. The Vizier has been bolstered by the snivelling cowardice of our overlord, and now stands as a much harder obstacle to overcome than what was previously envisioned. But this is no matter, for now we may strike the corruption of the Lotus Court at its very center, and scour Rahen of the perverse influence of the Raja once and for all."
flavor_parusahan_saya.3.a: "Bring it on!"

flavor_parusahan_saya.4.t: "A Lotus In Chains"
flavor_parusahan_saya.4.d: "With the fall of both the offices of Vizier and Raja, no power is left which can question the ascendancy of [Root.GetName]. In the streets of Dhenijansar, people cheer as our glorious host parades through the streets, celebrating their liberation from the corrupt ways of their old masters. The court trembles at our approach, titanic footsteps of steel and stone marching to claim what is rightfully ours. For we are no longer a humble breadbasket serving the people, but a radiant host of valiant warriors, defending Rahen from all who seek to weaken us. We are the true guardians of the Raheni - we are the true Raj."
flavor_parusahan_saya.4.a: "A new dawn rises on the fields of Rahen."
flavor_parusahan_saya.4_tt1: "Take the Inner Rahen area from the Raja and usurp their throne!"

flavor_parusahan_saya.400.t: "The Raj Reforged"
flavor_parusahan_saya.400.d: "Golpalar III has succeeded in his rise against the craven and corrupt Raj of the past, and Parusahan Saya is now free to set the stage for the next chapter of the history of Rahen. But not all obstacles can be overcome, and history turns on even the slightest moments. This would prove to remain the case in a most tragic fashion, as Golpalar III is struck down with a wasting sickness mere days before his coronation as the Raj.\n\nHemantsen, Golpalar's brother, now stands in Dhenijansar in the place of his older sibling. A firebrand in both the debate halls and the battlefield, he has served his nation in many different areas and is seen by many as the perfect fit to rule. But still, doubt clouds his vision. Will he truly be able to carry on the legacy of his brother, who set the stage for the cleansing of the Raj of all remaining evils?\n\nJust then, Jira enters his chambers, and all doubt washes from his mind. He approaches her, taking her paw in the affectionate way he always does. \"We now stand ready to make all our dreams come true. His dreams.\" He looks away for a moment, remembering the ideals his brother had taught him many years ago.\n\nJira smiles, placing a paw against his face. \"He may be gone, but we remain, Hema. We will carry on his legacy, and make the Raj into something truly wonderful.\" She turns to leave, motioning for Hemantsen to follow her into their future together. \"We'll make sure we succeed. For Golpalar.\"\n\nHemantsen looks into her eyes, and finally lets himself smile."
flavor_parusahan_saya.400.a: "\"For Golpalar.\""

flavor_parusahan_saya.5.t: "The Farrum Arcanum Decree"
flavor_parusahan_saya.5.d: "All throughout Rahen forges begin to emerge with a curious new contingent working within; the Farrum Arcanum, metallurgists working with mages to create iron and steel in levels never before imagined by the citizens of the Raj. The Rakhadeshi highlands are especially flooded with this new order, as countless new sources of metal are discovered within the hills. Day after day, diviners locate rich new deposits in the hills, and miners excavate the materials used in the forges in the valleys of the region. There, teams of pyromancers and blacksmiths melt, forge, and temper the iron at blazing speeds, and soon the market is flooded with new metals unlike any have ever seen before.\n\nHemantsen and Rani Jira smile as the reports return of their successful plans, with Jira especially pleased to hear her connections have served them well in their endeavors. The royal couple returns to their work, arguing over vast tables scattered with maps of Rahen. This is one project that has proven a success, but the work continues all the same."
flavor_parusahan_saya.5.a: "And progress waits for no-one."
flavor_parusahan_saya.5_tt1: "All owned highland provinces in the Rakhadesh Region change their Trade Good to Iron and gain 50 Devastation. The denizens will not appreciate this."
flavor_parusahan_saya.5_tt2: "All owned Iron provinces in Rahen get §yRune Crucibles§! until the end of the game, giving the following effects:\n Local Goods Produced: §v+0.50§!\nLocal Regiment Cost: §v-20.0%§!\n"

flavor_parusahan_saya.6.t: "The Logistics Division Decree"
flavor_parusahan_saya.6.d: "Dividing up power within the nobility is not something that can be bluntly done, lest the entire nation splinter into madness. Thus, the first of Hemantsen's reforms seek to take a measured approach, with the announcement of a new branch of the government: the logistics division. Placed in charge of managing critical infrastructure, this new administrative body seeks to bring [Root.GetName] into the future, modernizing old systems into ones that serve the nations of today.\n\nOf course, much of this power was previously held by the nobility, who had total control over infrastructure in their domains. But with the advent of the Golden Highway, the roads of [Root.GetName] are now a national issue. The lords of the countryside grumble quietly about the injustice, but ultimately allow the logistics division to work in peace. This reform has proven to be a successful one- will we be able to say the same in the future?"
flavor_parusahan_saya.6.a: "We can only hope."
flavor_parusahan_saya.6_tt1: "Lose §r-562§! Crowns.\nLose §r50§! Administrative Power.\nBegin construction of the Rahen Coast Golden Highway\n"

flavor_parusahan_saya.7.t: "The Tilling Decree"
flavor_parusahan_saya.7.d: "Hemantsen and Rani Jira once again find themselves in audience with the lords of the Rahen Coast, each desperately pleading their case to the royal couple. Shouts ring across the royal chamber, each more shrill than the last. One noble finally stands taller than the rest, and marches to the front of the crowd. \"But Raja, you cannot be serious! If our fields no longer grow cotton, we will lose our economic hold over trade within the Gulf! You seek to ruin us with this new decree!\"\n\nHemantsen hears this, and with a single motion of his paw casts the room into a deathly silence. \"You say that the loss of your cotton fields will cripple your estates,\" the Raja extolls, \"But what of the children who go hungry in your streets? What of the elderly who slave away their weakened bodies to earn whatever meagre wage will feed their families?\" Hemantsen sweeps his arm across the room, his expression filled with nobility and pride. \"You do not serve your wallets - you serve the people. And the people cannot eat cotton.\" With that, Hemantsen sits, and with a final nod the audience is over. The nobles file out of the chamber, each more distraught and vengeful than the last.\n\nWhen they finally find themselves alone, Hemantsen slumps in his throne as he leans against his wife for support. \"Every day, they test my patience. How much longer can we survive before these craven fools bring the world down around us?\"\n\nJira laughs and smiles at Hemantsen as she helps him from his seat. \"We've faced grander challenges than a few upstart nobles, Hema.\""
flavor_parusahan_saya.7.a: "\"We will weather this gathering storm.\""
flavor_parusahan_saya.7_tt1: "All owned Cotton provinces in Rahen Coast change their Trade Good to Grain and gain 50 Devastation. §rThe denizens will not appreciate this.§!\n"
flavor_parusahan_saya.7_tt2: "All owned Grain provinces in the Rahen Coast Region get §yEndless Fields§! until the end of the game, giving the following effects:\nLocal Goods Produced: §v+0.50§!\nLocal Manpower Modifier: §v+20.0%§!\n"

flavor_parusahan_saya.8.t: "The Barons' Revolt"
flavor_parusahan_saya.8.d: "The sweeping reforms imposed by Hemantsen I and Rani Jira left many of the barons in the Raj with nothing but their anger. Nobles who had lorded over vast empires of industry have had their estates brought low, forced to compete with the likes of the common smith or farmer. Treacherous thoughts fill their minds; how can they serve a master who does not care if they live or die? And so, secret dealings begin, forces amass, and the countryside erupts in rebellion as the barons take to the field.\n\nThe plight of the barons has been a truly bothersome thorn in [Root.Monarch.GetName]'s side. Now, with the court up in arms, it can no longer go unanswered. The time has come to bring the nobility back in line, and show them why they serve their masters."
flavor_parusahan_saya.8.a: "Rally the troops. Prepare for war!"
flavor_parusahan_saya.8_tt1: "Every owned province gains §r+30§! Autonomy."
flavor_parusahan_saya.8_tt2: "Every owned province gains §r+20§! Autonomy."
flavor_parusahan_saya.8_tt3: "Every owned province gains §r+10§! Autonomy."
flavor_parusahan_saya.8_tt4: "§rTheir response is more severe based on how many Decree maluses we have active.§!"

flavor_parusahan_saya.9.t: "Hemantsen's Ambition"
flavor_parusahan_saya.9.d: "With the corruption at the heart of the Raj finally excised, the administration of Rahen should now be freed of the shackles of old, no longer serving greedy masters but instead acting on the will of the people. But parasites tend to burrow deep into their hosts, and do not wish to go quietly when discovered. Soon after he had taken the throne, Hemantsen discovered that multiple industries still work at the behest of corrupt masters, taking profits from the people and hoarding it for themselves.\n\nThis blatant exploitation of the people and the Raj was the exact reason Hemantsen rallied against the old ways. It cannot be allowed to fester any longer, lest the nation fall into turmoil soon after he departs from rulership. Rahen will be brought to heel - it is up to the cravens to choose if they will face the pen or the sword."
flavor_parusahan_saya.9.a: "The campaign begins once again."

flavor_parusahan_saya.10.t: "The Praxic Seek Shelter"
flavor_parusahan_saya.10.d: "Hemantsen's face becomes a mask of confusion as he listens to the intentions of Rani Jira. After a moment to process the declaration, he finally responds, his voice coloured by incredulity. \"You wish to create entire cities of heretics? What madness has come over you, my wife?\"\n\nRani Jira takes his paw, guiding him to a nearby window. \"Husband, you must understand,\" she pleads, eyes soft as she soothes Hemantsen's temper. \"The Praxic are not just heretics, they are people! Do you truly wish for citizens of the Raj to suffer persecution and injustice simply because their beliefs differ from yours?\" She strokes his arm as they watch the court continue arguing over the schism below. \"You have accepted my faith in good strides. Surely you can find it within you to accept theirs too?\"\n\nHemantsen's brow furrows, his gaze drawn towards the distant horizon. \"You are correct that they do not deserve to suffer,\" he says while staring into the distance, \"But the court is already at a breaking point. How will we be able to control them if we let the Praxic live freely within our borders, and flaunt the traditions many of the lords hold dear?\" Hemantsen's expression grows darker as his mind fills with visions of the worst.\n\nBut then Jira squeezes his paw, and the fear of the possible fades away, leaving only the horizon in his view. \"The same way we handle all of our problems, Hema.\""
flavor_parusahan_saya.10.a: "\"We do it together.\""
flavor_parusahan_saya.10_tt1: "Every Suhan's Praxis country with under §y100§! development and over §y150§! opinion of us will join the Raj.\n"
flavor_parusahan_saya.10_tt2: "Gain a permanent claim on every province in Rahen that has/had a Suhan's Praxis Reformation Center.\n"

flavor_parusahan_saya.13.t: "The Decline of Hemantsen I"
flavor_parusahan_saya.13.d: "She is carried through the streets of [Root.Capital.GetName], her body draped in brilliant blues and radiant golds. Countless people of all walks of life gather along the path of the procession, somberly watching the royal entourage march through the streets. They walk for hours, quietly remembering their fallen Rani, until they reach a mausoleum newly erected for her entombment. Marble spires pierce the sky, veins of lapis lazuli and garnet running through the stone to give the impression of clouds bursting with light. At the foot of the tomb, the party finally stops, and Hemantsen turns to address the people of [Root.GetName].\n\n\"You have known her by many names, and have witnessed her many accomplishments,\" the great harimari intones, his voice grand but without colour. \"You knew her as Rani, a friend of the people, and a brilliant mind always seeking the way forward in the world of science and mystery.\" Hemantsen turns, looking down at her form draped in its shroud. \"But to me, she will always be Jira, a kind woman who stood by my side no matter the trials we faced together.\"\n\n\"We bury her in this place today,\" proclaims Hemantsen, as his voice cracks and his eyes water, \"But we do not bury all she has done for us. She lives on in the schools, the reforms, and the people which she inspired to achieve greatness, and for that I am forever thankful.\" Hemantsen gathers himself, and turns once more to the crowd, eyes clear with steely resolve. \"of all the women in the world, there is no other who could have done the work she did, and I am forever proud to call her my wife.\"\n\nThe ceremony continues, and eventually Rani Jira is placed within the mausoleum to rest eternal. As the tomb was sealed from the outside, those still present watched Hemantsen, and saw his posture change while the builders worked; he almost seemed to shrink, his shoulders slumped low in anguish. He seemed so small at that moment."
flavor_parusahan_saya.13.a: "Or perhaps the world itself had grown smaller without her."
flavor_parusahan_saya.13_tt1: "Hemantsen is likely to die of a broken heart."

flavor_parusahan_saya.14.t: "Hemantsen I Dies"
flavor_parusahan_saya.14.d: ""
flavor_parusahan_saya.14.a: "Onward we must go..."

flavor_parusahan_saya.15.t: "The High Augur"
flavor_parusahan_saya.15.d: "Deep in the bowels of Tughayasa, an ancient scholar sits motionless among piles of forgotten tomes. His eyes remain closed, but still he sees [Root.Monarch.GetName] enter into the chamber, and the wizened man cracks a toothless smile at [Root.Monarch.GetHerHis] arrival.\n\n\"Ahh, at last. I nearly wondered if my visions were finally failing me,\" croaked the seer as he stood for the first time in centuries. \"You have done well to find me, child. I have seen visions of the fate of the Harimraj, and you stand on the brink of their doomed path.\" The High Augur extends a withered hand, looking in [Root.Monarch.GetName]'s direction while still keeping his eyes shut. \"If you wish to avoid their fate, then I shall pass these omens on to you.\"\n\nVisions flood into [Root.Monarch.GetName]'s mind, horrible flashes of death and destruction. Three images emerge from the fog of the apocalypse, burning bright against the dark. A yawning chasm cutting the earth in two, a black shadow engulfing a nation, and fire raining from the sky...\n\nThe High Augur breaks the connection, now much more lively despite his old age. \"I saw it within your spirit,\" he intones in his rasping voice, \"The conviction of those who will build empires that will last generations. You wish to take the mantle from those who have fallen before you?\""
flavor_parusahan_saya.15.a: "\"Then rise, and claim your destiny.\""
flavor_parusahan_saya.15_tt1: "We are no longer unworthy of his empire."

flavor_parusahan_saya.16.t: "Rise of an Iron Raj"
flavor_parusahan_saya.16.d: "The ideals which we once held have been shattered, brittle steel against the hard carapace of reality. We believed that to be worthy was to take on some grand purpose, to don the mantle of those who came before. Now we know that our predecessors' fate could be changed, and so we now must work to change it. History need not be static, echoing forever in an endless cycle. With force of will and determination, it can be reforged into whatever form you desire.\n\nGray banners descend across [Root.Capital.GetName] as officers bedecked in gunmetal sashes line the streets. Men, women, and children all raise their voice in a rallying cry as our nation hardens into one which can withstand the onslaught of the future. This is no longer a land of the weak, often divided by faith or culture. We are united, solidified, and bent towards glorious purpose. We are the forefront of the next chapter of Rahen and all Haless combined.\n\nWe are the Iron Raj."
flavor_parusahan_saya.16.a: "Unyielding, unrelenting, unbreakable."
flavor_parusahan_saya.16_tt1: "The Ministries will be renamed to §yOffices§!.\n"
flavor_parusahan_saya.16_tt2: "Our ambitions will decrease as our rulers die.\n"

flavor_parusahan_saya.17.t: "The Case of The Vizierate"
flavor_parusahan_saya.17.d: "After a string of tense missives sent back and forth between parties, it seems that negotiations with the Vizier may finally reach a common ground. [Root.Dip_Advisor.GetName] sets out personally to deliver the final treaty, and the court within [Root.GetName] breathes a collective sigh of relief as the nightmare of diplomatic tension looks to come to an end.\n\nTwo days later, [Root.Dip_Advisor.GetName]'s head is returned to us in a burlap sack.\n\nWe have tried to be reasonable. It appears this will no longer be possible"
flavor_parusahan_saya.17.a: "It's time to end these games, once and for all."
flavor_parusahan_saya.17_tt1: "Vizier Loyalists are rising up all over our country!\n"
flavor_parusahan_saya.17_tt2: "The Vizier Declares Independence! Enforce §rRein In The Vizierate§! on the Vizier to end their independence movement."

flavor_parusahan_saya.18.t: "Tightening The Reins"
flavor_parusahan_saya.18.d: "At long last, the Vizierate is broken on the spears of our soldiers, and resistance within [Root.GetName] has been annihilated. With the disgusting betrayal of the Vizier still fresh in the mind of [Root.Monarch.GetName], it's clear that the office no longer serves its intended purpose. It must be removed.\n\nNew councils are drawn up, each handpicked by [Root.Monarch.GetName] [Root.Monarch.GetHerselfHimself]. These loyal advisors will serve in the same capacity as the Vizierate, providing guidance and assistance in times of need, but without the independence that coloured the corruption of the previous incarnation. With control over our right hand finally restored, we are truly a united Raj, a sight unseen since the dawn of Harimar himself. Is there truly any doubt of our legacy now?"
flavor_parusahan_saya.18.a: "Good riddance."
flavor_parusahan_saya.18_tt1: "Inherit the Vizier.\n\nThe position of §yVizier§! is removed from the Raj.\n"
flavor_parusahan_saya.18_tt2: "We can no longer trigger the Court And Country disaster."

flavor_parusahan_saya.19.t: "Break The Blood Lotus"
flavor_parusahan_saya.19.d: "With the defeat of the Blood Lotus, fear now runs rampant through the people and nobles, even as far as [Root.Monarch.GetName] [Root.Monarch.GetHerselfHimself]. How can we say we are truly united if uprisings of this scale can cripple our nation? We cannot stand by and let doubt and terror rule the hearts of our citizens; something must give. How can we change the structure of [Root.GetName] to ensure this never happens again?"
flavor_parusahan_saya.19.a: "The harimari must assume further control."
flavor_parusahan_saya.19.b: "Try to ease tensions between the races."
flavor_parusahan_saya.19.c: "The era of humans is now upon us."
flavor_parusahan_saya.19_tt1: "§y10§! random owned provinces lose a Human Minority, gain a Harimari Minority, and get 2 Production Development."
flavor_parusahan_saya.19_tt2: "§y5§! random owned provinces gain a Human Minority and a Harimari Minority, and get 2 Manpower Development."
flavor_parusahan_saya.19_tt3: "§y10§! random owned provinces lose a Harimari Minority, gain a Human Minority, and get 2 Tax Development."

flavor_parusahan_saya.101.t: "Delusions of Grandeur"
flavor_parusahan_saya.101.d: "Long have we toiled in our efforts to unite this disparate land under one banner, but through it all a grand question has hung over the heads of the Raj. When we've finished our epic task of forging a nation anew, what do we do next?\n\nThis final problem has gnawed at the minds of the greatest scholars [Root.GetName] has ever known, and with our task rapidly approaching completion it has become all too real. But there is one possible path which we may follow, one that has not been taken in over a thousand years- the reclamation of destiny and the rise of the first Harimraj reborn.\n\nBut the Harimraj was built off the backs of the nobility, and we have just stripped them of their powers and left them a shadow of their former selves. In our haste to unite Rahen under one nation, have we already forsaken the ultimate path to destiny? This quiet terror stalks the court in the quiet hours, and a shadow of doubt passes over the halls of [Root.Capital.GetName]."
flavor_parusahan_saya.101.a: "Perhaps we are unworthy..."
flavor_parusahan_saya.101_tt1: "§rThe Dissolution of the Raj must not trigger, or there will be nothing left to save!§!"

flavor_parusahan_saya.102.t: "The Great Scouring"
flavor_parusahan_saya.102.d: "For three months the specter of uncertainty has haunted [Root.GetName], filling the heads of our advisors with doubt and fear. If we continue on this path, the only thing awaiting us is a long slump into eventual destruction. This cannot come to pass; we will not allow it.\n\nWhile the tales of the past were mostly kept within the nobility, records of the first Harimraj must surely have survived in one of the many archives and libraries found throughout Rahen. If we have to dig up the entire continent to find the key to our salvation, we will do so. This is more than a simple realization of our purpose, but the binding force which joins our state together, and as such we must find it no matter the cost.\n\nScholars, nobles, ministers and clergy are dispatched far and wide, each given a single task: find the history, return to [Root.Capital.GetName], and save us all from the clutches of damnation."
flavor_parusahan_saya.102.a: "And so the hunt begins."

flavor_parusahan_saya.103.t: "Unveiling The Missive"
flavor_parusahan_saya.103.d: "Countless hours have been spent digging through the history of Rahen, looking for anything that will give [Root.GetName] guidance on our destiny. Archives have been upended, libraries have been ransacked, even personal collections of minor nobles have been extensively catalogued. Still, nothing has been found. The labours almost seem hopeless, and many of the scholars give up their quest and return home empty-handed. Even in Dhenijansar, nearly all scholars have abandoned the search. All except one: Jira of the Rising Moon.\n\nJira has been running through Dhenijansar like a woman possessed, tearing apart any collection of books she can find no matter how small. No place is safe from her unending thirst for knowledge, from the halls of nobility to the streets of the slums. It is in these slums where she currently searches, chasing reports of a lost cache of scrolls hoarded by a local madman.\n\nLooking throughout the abandoned building, Jira upends everything that isn't nailed down trying to find the hidden texts. She spends nearly four hours looking for it before the sun begins to set, and exhaustion runs through her bones. She sits on the rotten planks, ready to call off the search, when she spies something peculiar she only noticed at eye level: a loose brick, hanging from the wall.\n\nLightly tugging at the stonework, Jira finally wrenches the brick free of its earthen prison, and with a thundering roar the rest of the wall quickly falls with it. Jira ducks for cover, and when the dust settles she stands and peers into the new space revealed. Inside is a treasure trove of knowledge, centuries old scrolls filling baskets across the room. And sitting on a nearby table, haphazardly strewn among other documents, lies a missive from the Harimraj requesting an audience with the Oracles of Tughayasa. Jira's face lights up, and she grabs the scroll and sprints out of the building."
flavor_parusahan_saya.103.a: "It was foretold... we must go."

flavor_parusahan_saya.201.t: "Investigate The Reformation"
flavor_parusahan_saya.201.d: "In order to gauge the impact the ideas of Suhan has had on the populace, Hemantsen agrees to send Jira and a cohort of advisors to a hotspot of Praxic activity. Walking the streets allows Jira to see all kinds of new sights, as people listen to preachers on the street and scripture is handed out by passing scholars. She obtains one such scroll, and begins to read it to better understand the beliefs these people now follow. Within, she finds not just knowledge of the new faith, but conviction within herself she didn't realize existed. \n\nWithin the scripture of the Praxis she found a core value that resonated within Jira's chest; the Long Path, which the Praxic believe is the only way through which Purtara can be achieved. She reflected on her life as she spent hours pouring over the scroll, often burning through several lamps reading into the night. All of her struggles with the Starry Eye as one of the few women who were members of the school; her driving desire to improve the lives of those around her through knowledge; her incessant pining after a young Hemantsen until he finally acquiesced to marrying her. All of these things she pursued not out of a duty to the world, but to prove to herself that she could accomplish whatever she set her mind to. Was this not the ultimate expression of the Long Path?\n\nIt wasn't long before her coterie of advisors noticed Jira's incessant dissection of Praxic texts, and how her usual debates on spiritual beliefs took a greater slant towards the new faith. Whispers began, which became mumblings, which grew further still to rumors. And the wife of the Raj converting to the Praxis is a dangerous rumor indeed."
flavor_parusahan_saya.201.a: "We must watch the situation carefully."

flavor_parusahan_saya.202.t: "Unwavering Loyalty"
flavor_parusahan_saya.202.d: "Hemantsen I looks out into the garden from his chambers, where even now angry shouts are exchanged between the two faiths. Furrowing his great brow, he turns to Rani Jira with a look of confusion.\n\"Jira... is it true?\" he asks, voice wavering with uncertainty. \"Have you converted to this new faith which seems poised to tear the Raj apart?\"\n\nJira takes his paw in hers, squeezing it in the familiar way she always does. \"Hema...it's true, yes.\" She looks away, tears welling in her eyes. \"But you must understand- I never meant for tensions to reach such a fever pitch! I only wished to follow the path which reflected myself so strongly.\"\n\nHemantsen brings both paws up to clasp Jira's, his face softening as he hears her confession. \"You are my wife, and I will never fault you for choosing to be who you truly are.\" His expression darkens, his paws clenching hers harder by the moment. \"But still, we cannot split the state by adopting this new faith. The High Philosophy must remain in its position of power, or the entire country will take up arms.\"\n\nJira looks towards Hemantsen, and sees an emotion cross his face that has not appeared since the night of their marriage: fear. \"What are we going to do, Hema?\"\n\nHemantsen looks back to his wife's worried face, and all uncertainty fades from his mind. \"I don't know if we will choose the best path,\" he says as he brings his paw up to cup her face. \"But no matter what, we will do it together.\"\n\nLater that day, Hemantsen announced Jira's conversion to Suhan's Praxis, and defended the right of both her and his followers to autonomy of faith. The court hears this, and a fire is lit in the hearts of the zealots."
flavor_parusahan_saya.202.a: "No turning back now."
flavor_parusahan_saya.202_tt1: "A random advisor leaves our court."
flavor_parusahan_saya.202_tt2: "§PIt would be wise to remain High Philosophy upon taking this stance.§!\n"

flavor_parusahan_saya.203.t: "The Boiling Point"
flavor_parusahan_saya.203.d: "In the audience chamber of [Root.Capital.GetName], countless zealots on both sides of the faith shout and argue with each other as they plead their case to the Raja. Each declaration of Praxic disruption is countered with screams of persecution and assault. Within the chaos, Hemantsen sits on his throne and watches the proceedings with an unmistakable sense of dread.\n\n\"The heretics seek to destroy us!\" cries a High Philosophy scholar, red in the face from screaming. \"Every day they subvert the Raj, and move to make themselves stronger! We must end this farce before our way of life is destroyed!\"\n\nA Praxic guru rushes to the center of the room, blind with rage. \"You cry sedition, but even now your thugs beat us in the streets! Do you seek to kill the faith, or the followers?!\"\n\n\"The Rani is not fit to govern!\" shrieks a noble, a former magistrate who left the court in a fury when Jira's conversion was revealed. \"She waits like a viper in the heart of the Raj, and will soon poison its very heart! We must cut off the head of the snake before it's too late!\"\n\nMore accusations and insults are hurled throughout the room, until finally Hemantsen stands, his face a monolith of anger. \"ENOUGH!\"\n\nThe room falls silent.\n\nThe Raj points to the door, his expression contorted into snarling fury. \"Out! All of you! I will not have you sully this place with your squabbling!\"\n\nAs the crowd dissipates, Hemantsen slumps back into his throne, his mind a whirl of anxiety and doubt. This cannot continue, that much is obvious. But how can he resolve a problem which has split the very land in two?"
flavor_parusahan_saya.203.a: "He knows only one answer: with his wife."
flavor_parusahan_saya.203_tt1: "The Philosophers have gone to war with each other!"

flavor_parusahan_saya.301.t: "Searching Sir"
flavor_parusahan_saya.301.d: "With a new quest on the horizon, efforts have begun to locate the final throne of the Harimraj. Along the fault lines of Shamakhad lie many different candidates, one of the more promising being the city of Sir. Home of many ruins due to its long history of conquest, it's entirely possible the throne of Harimar is hidden within the ancient structures which dot the landscape.\n\nUnfortunately, our search has come up short. Ruins all across Sir have been explored, the city nearly turned upside-down in our fervor, but still no trace of the throne was found. Luckily, this is only one possible location, and we have many more to explore. We continue now towards the sea, in hopes of finally discovering the location of the ancient throne."
flavor_parusahan_saya.301.a: "We march onward!"

flavor_parusahan_saya.302.t: "Searching Semphrerong"
flavor_parusahan_saya.302.d: "Continuing down the banks of the Kharunyana, we find ourselves within the lands of Sempherong and her fellow Porcelain Cities. This land is one of great importance, as the birthplace of porcelain marks it as a standout economic region compared to its neighbours. Perhaps this was so profound that Harimar chose to erect his throne here, near the greatest treasure of the land?\n\nNearby caves have been said to contain some kind of ruins, weird structures that the locals cannot understand. The underground chambers are scoured for weeks, but ultimately we arrive at the same conclusion we reached in Sir; the throne is not here, and we must continue.\n\nThe old specter of doubt begins to creep its way into the hearts of the surveyors, as they trudge along the Kharunyana towards the end of their journey. Options are running low, and soon there will be none left at all. What will we do then?"
flavor_parusahan_saya.302.a: "Pray we never find out."

flavor_parusahan_saya.303.t: "Searching Sarisung"
flavor_parusahan_saya.303.d: "The search for the throne has culminated in our final obstacle- Sarisung, heart of Rahen. Filled with an uncountable number of souls, a city this large should surely contain the throne of Harimar. But desperation clouds the minds of the scholars as they begin their search. They know they've reached the end of the line, and past this point there is nowhere left to go.\n\nThe survey corps scatters throughout the city streets, winding through the slums like rats in a maze. The desperate attempt to find the throne is about to come to a close, but the odds of locating our prize grow smaller with each passing day. Do we even have anything left to hope for?"
flavor_parusahan_saya.303.a: "It's best not to think about it."

flavor_parusahan_saya.304.t: "The Final Throne"
flavor_parusahan_saya.304.d: "Deep in the sprawl of Sarisung's rundown neighbourhoods, the final contingent of the survey corps desperately searches for the final throne of the Harimraj. All other squadrons have returned home, given the order to call off the search. These few soldiers instead chose to ignore it, effectively deserting from the army to continue the search, clinging to whatever hope they may have left. They've arrived at their final section, a bundle of houses so obscure that not even the paupers live within their walls. Here they look for a sign that the throne lies within, the last spark of hope slowly fading into nothingness.\n\nSuddenly, a shout echoes off the cramped walls of the dwellings. A soldier frantically runs from a house, waving his arms in unrestrained excitement. He turns and the corps follows, rushing over piles of rubble and rotting wood until they arrive at the source of his alarm. One wall of the building he was searching has a door cut into the side, seemingly extending into the side of a sheer rock face, and faintly emblazoned above the portal is a purple lotus in full bloom.\n\nThe men stumble over each other as they rush down the tunnel, a glint of light visible at the very end. Finally, they all emerge together, and what they find sucks the air from their very lungs.\n\nA simple throne, carved from granite and placed on a dais, sits within the center of the room, illuminated by a single beam of light. Upon further inspection, they see that the rock is not just cut into the shape of the throne, but adorned with ornamental details so small they seem impossible. All at once, they shout with glee, and begin sprinting out of the chamber to return to their commanders. Against all odds, they've finally done it. The final throne of Harimar has been reclaimed."
flavor_parusahan_saya.304.a: "An impossible task, finally complete."

flavor_parusahan_saya.1001.t: "A Pathetic display"
flavor_parusahan_saya.1001.d: "Crumbling under the weight of it all, our inferiority is maddening."
flavor_parusahan_saya.1001.a: "If only we could try again..."

flavor_parusahan_saya.1002.t: "The Trap Is Set"
flavor_parusahan_saya.1002.d: "We've pushed the Raja far enough. This next step will snap the foundations of the Raj. We must ensure we are ready."
flavor_parusahan_saya.1002.a: "We shall be the bait."
flavor_parusahan_saya.1002_tt1: "We may now declare the Vizier Promotion war in the Raj panel!"

flavor_parusahan_saya.1003.t: "Philosophies Clash"
flavor_parusahan_saya.1003.d: "As tensions flare, the philosophers take up arms, leaving bodies in the streets and the issue unsolved."
flavor_parusahan_saya.1003.a: "Can't we all just get along?"
flavor_parusahan_saya.1003_tt1: "High Philosophy and Suhans Praxis rebels rise up in one of our provinces."

R54_not_ready_tt: "§RThe trap is not yet set, we must wait to declare this war.§!"
