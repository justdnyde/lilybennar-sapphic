l_english:

# Missions
R54_mystic_ministers_title: "Mystic Ministers"
R54_mystic_ministers_desc: "After the shocking revelations we exposed, new players have stepped onto the stage. One such player is Rani Jira, a talented advisor married to our heir. With a glint in her eye that can either be called genius or madness, Jira has begun to introduce new reforms into our government, including working with the Starry Eye to allow mages into the ministries. It may be a radical idea, but the benefits are difficult to ignore."

R54_from_the_depths_title: "From The Depths"
R54_from_the_depths_desc: "200 years have passed since the rise of the Dhenijanraj, and in this time we have seen both its meteoric rise and its gradual decline. Corruption, schism, and in particular famine - which we as the breadbasket have staved off for the rest of the Senaptia many times before - have coloured the most recent period of history in Rahen, an era lived beneath the purple banners of our current master.\n\nThrough these times, we have gained the trust and respect of many of our neighbours as we provided them with the food they needed to survive. We are seen as an essential piece of the greater empire, and our absence would surely lead to its total collapse. Perhaps we can use this influence to begin new works, and expand our influence across the Raj like vines across a trellis."
R54_from_the_depths_tt1: "One of the following must be true:\n  The §CRaja§! has an Improved Relations modifier of §y+50§! from us.\n  The §CRaja§! has §y150§! opinion of us."
R54_from_the_depths_tt2: "This modifier will be removed if we fall below §y20%§! Crownland§!."

R54_staple_diplomacy_title: "Staple Diplomacy"
R54_staple_diplomacy_desc: "As our capacity for crop production expands, the Senaptia with whom we deal have increased their demands in turn. Merchants and diplomats arrive in Parusahan Saya daily, each asking for a share of the bounty we now possess. A lesser state would comply and hand out their treasures, but we are smarter than that. If the other powers of the Harimraj deign to deal with us, then we will use their greed to our advantage. Through shrewd business and careful planning, we will bind them to us through their stomachs and keep their promised favours close to our chest."
R54_staple_diplomacy_tt1: "Have the §yEstablish Communities§! Trade Policy active in at least 2 Raj trade nodes."
R54_staple_diplomacy_tt2: "Every allied senapti gains §y2§! years of Manpower and §y1§! Stability. In exchange, they each owe us §v+20§! Favors and gain §v+10§! Trust with us.\n\nAll §yRaj§! nations gain a quickly decaying §v+50§! opinion of us."

R54_the_new_wave_title: "The New Wave"
R54_the_new_wave_desc: "The Senapti have become more dependent on our constant supply of grain than ever before. On every corner in every city, a baker hawks bread produced with crops from our vast plantations. With our influence reaching heights never before seen, the time has come to tighten the screws. Those who stand with us will receive bounties they could never have imagined, holding fast against the tide of hunger. Our detractors and rivals will be crushed by our crippling embargoes, left in the cold to starve. We will not let ourselves freeze in the barrens of the past, for we are the ones who control the light of the future."
R54_the_new_wave_tt1: "Each Non-Allied Senapti has been Insulted by us."
R54_the_new_wave_tt2: "Each Rival has an advisor §ydefect to us§! for §v50%§! cheaper and gets '§yCourt Defectors§!' for §y10 years§!, reducing their Global Spy Defence by §R-30%§!."

R54_reveal_your_hand_title: "Reveal Your Hand"
R54_reveal_your_hand_desc: "We have argued for our supremacy for countless hours in debate, and have proven our worth in both battle and trade. But the world does not revolve around prowess alone, for blood connects us all to the land on which we dwell. The Raja and their cronies have pushed back against our ambition due to our perceived weakness of blood descent, leaving our more lofty goals out of reach. This will not be the case for much longer."

R54_the_frontrunner_title: "The Frontrunner"
R54_the_frontrunner_desc: "\"To my fellow scholars, I ask you this: whence does the right to rule emerge? Is it the divine will that pushes us into our positions of superiority? I think not; we rule our lands through expressions of power. Through force, knowledge, and influence, power stems from those with great resources to wield it. And what greater power exists than that of the power over life? Without the breadbasket of Parusahan Saya, many of you would have starved! Who is better fit to govern the growth of these crops than the masters of grain themselves?\"\n\n-Vallasenar of the Dancing Stalk, farmer-philosopher of Parusahan Saya, Address To The Hall On The Eve of The Reaping."

R54_borrowing_blades_title: "Borrowing Blades"
R54_borrowing_blades_desc: "The bounteous lands of Kramitra and the Dhenbasana have become ours by right, but the local populace remains irate over our claims and the change in governance. Quelling the resistance in this area is difficult, for the Raheni are nothing if not proud. But we need not squash this resistance alone; our role as saviour to the Raj has caused us to gain a positive reputation with the Raja. We can convince them to assist us in our efforts to control the area, be it through our excellent diplomatic skills or through more covert operations."
R54_borrowing_blades_tt1: "Petition the Raja to send us soldiers from the Golden Palace to assist us in making use of our new lands."

R54_the_first_step_title: "The First Step"
R54_the_first_step_desc: "\"Again, I ask of you all, who is the most fit to rule? I have argued that the strength of Parusahan Saya in both the fields of growth and battle marks it as the rightful claimant of the territories we now control, and now the time has come to examine this right to rule once more. Our farms produce more food than ever before, with the people of the Raj indebted to our wondrous stockpiles of grain. We are more than the breadbasket of the empire; we are protectors of the land, guarding it against those who would subvert it for their own personal gain. We fight for the Raj above all else, and is there any cause which is more noble?\"\n\n-Vallasenar of the Dancing Stalk, farmer-philosopher of Parusahan Saya, Address To The Hall For The Festival of Plenty."

R54_mutual_beneficiaries_title: "Mutual Beneficiaries"
R54_mutual_beneficiaries_desc: "The Raja continues to fall further out of favour, as the Prabhi grow to doubt the cohesion of the Raj more with each passing day. Growing distrust leads the Raja to growing more desperate, and this is where we may step in to fill the void. As the controllers of the Ruby Gardens, we can offer the Raja a simple trade; they assist us in our efforts to improve the gardens, and we use our sway among the Senapti to keep the subjects in line. With the fate of the Raj at stake, how could they refuse?"
R54_mutual_beneficiaries_tt1: "§y1000§! crowns (every §y10§! favors you have with the §CRaja§! will have the §CRaja§! pay §y100§! of this cost for you, up to §y50§! favors)."
R54_mutual_beneficiaries_tt2: "One of the following must be true:\n  The §CRaja§! has an Improved Relations modifier of §y+100§! from you.\n  The §CRaja§! has §y200§! opinion of you."
R54_mutual_beneficiaries_tt3: "If the §yRuby Gardens§! are already at §yTier 1§! or higher, §yFlower Power§! Becomes permanent. Otherwise, upgrade the §yRuby Gardens§! by 1 Tier."

R54_the_breaking_point_title: "The Breaking Point"
R54_the_breaking_point_desc: "There are no questions among those loyal to the banner of Parusahan Saya, for they all know the truth; the Raj is weak, and has rotted from the inside out. The decadence of the Raja and Vizier have been known to all for many years, but the status quo has kept a strong cohort of sycophants at their gate to protect them from consequence. But now the wind has changed, and we stand at the turning point of history. The corruption of the Vizier will be rooted out by force, and the Raja will swiftly follow."
R54_the_breaking_point_tt1: "The capitals of the Raja and Vizier are controlled by us or our allies."
R54_the_breaking_point_tt2: "Have at least §y50%§! Warscore against the Vizier."

R54_the_iron_heart_title: "The Iron Heart"
R54_the_iron_heart_desc: "The old order is dead, and a new one rises from the ashes. But not all has been set right, and many members of the court continue to scheme and plot in secret. This cannot continue. There will be change, and it will be swift and terrible for those who threaten the security of the Raj. No longer shall we be delicate flowers picked at by insects. We are iron, strong and proud, and no corrosion or rot will break our lands ever again."
R54_the_iron_heart_tt1: "§yRule of The Iron Raja§! will remain active while you have Hemantsen I's dynasty.\n"
R54_the_iron_heart_tt2: "We may no longer form any nation other than the §cHarimraj§!."

# --------------------

R54_a_daughters_benefactor_title: "A Daughter's Benefactor"
R54_a_daughters_benefactor_desc: "While production and growth have fueled our desires for expansion, there are times where other motives pierce through the titanic wall of our resolve and give us pause in our goals. This has never been more true than in Parusad Bhola, where our seizure of the land brings a truly magnificent wonder into the fold: the Ruby Gardens. The jungles and springs of the complex stand as a reminder of the great Harimar and his descendants, and we would be fools not to honour this beautiful tribute to growth and verdancy. We will tirelessly work to maintain these lands, as a tribute to the past and a monument to life itself."

R54_the_unsworn_title: "The Unsworn"
R54_the_unsworn_desc: "The roots of change press onward, claiming more land as we sweep across the battlefield as a gale force wind shakes the fields of wheat. Maharaaja and Dhenbensana stand before us, ours for the taking, but the Raja is desperately trying to pull back against our meteoric rise. We can nudge them past the tipping point, bringing others into the fold as we prepare to ask the ultimate question. With a little help from our loyalists, the Raj will surely be strained beyond its limits."
R54_the_unsworn_tt1: "A §ySpymaster§! of Skill §y2 or above§! is currently employed by us."
R54_the_unsworn_tt2: "A §yMilitary Advisor§! of Skill §y2 or above§! is currently employed by us."

R54_divisions_of_the_iron_stripe_title: "Divisions of The Iron Stripe"
R54_divisions_of_the_iron_stripe_desc: "Our ambitions are vast, but to support them we will need armies not of flesh, but of immovable iron. Composed of veterans from our previous battles, the Iron Stripe represents this goal, unbreakable warriors who give no ground on the field of battle. Such military prowess will eventually lead to our triumph, but small scale displays of martial technique are not enough to guarantee it. The Iron Stripe will be employed in the officer corps, and will temper our soldiers into battle-ready blades."

R54_the_consorts_cause_title: "The Consort's Cause"
R54_the_consorts_cause_desc: "As mages continue to pile into the ministries, Jira's machinations grow into a nation-spanning ideal of magic within the Raj. Magical colleges and libraries begin to be erected in all corners of the land, filling Rahen with the sights and sounds of mystical energy. The adoption of this new magical architecture may be slow for some of the more conservative nations under our control, but with diplomacy and a little charm we can bring our subjects into a new era of magic and wonder."
R54_the_consorts_cause_tt1: "All Raj subjects get:\n  §v+100§! §MMana§!\n  A §v50%§! cheaper §yCourt Mage§! Advisor\n  A §MSpecial Infrastructure Requirement§! for Magical Infrastructure lv1"

R54_we_require_more_minerals_title: "We Require More Minerals"
R54_we_require_more_minerals_desc: "The Raj grows day after day, but this growth cannot be sustained forever. Iron and steel reserves have grown close to depletion from the vast demands of arms and industry Hemantsen's reign has produced. Luckily, Jira has a solution to Hemantsen's problems; the Farrum Arcanum, a state-sponsored forge which would span the Rakhadesh highlands, sourcing more iron from the region than ever thought possible. The couple schemes together for a fortnight, and then begins to set their plans in motion."

R54_the_iron_mind_title: "The Iron Mind"
R54_the_iron_mind_desc: "Rani Jira, in her infinite machinations, now stands at the precipice of achieving her ultimate goal. The magical estate of the Raj has been expanded, allowing the mystic arts to flourish within Rahen, but magic remains composed of the patriarchal, insular, and highly paranoid few. In order for magic to expand to the many, these shackles must be broken and the common folk allowed into their sanctuaries. People from all walks of life will come together in a central hub of knowledge and learning, and together they will forge their minds into iron as they harness the power of magic for the commonfolk."

R54_plight_of_the_barons_title: "Plight of The Barons"
R54_plight_of_the_barons_desc: "The meteoric rise of Parusahan Saya and Hemantsen I have not been well received by all members of the Raj. Some of the Prabhi worry about this upstart ruler who has taken the helm of their empire; is he driven by the impulses of youth, setting out to steal glory and driving the rest of them to ruin in the process? To quell these concerns, tact and grace must be employed to soothe the emotions of the more flighty subjects. After all, a Raj divided is no Raj at all."
R54_plight_of_the_barons_tt1: "Hemantsen has announced his intentions."

R54_green_giants_title: "The Green Giants"
R54_green_giants_desc: "We may have risen to the peak of the Raj, but we will never forget our roots. Before we ruled, we tended the gardens of Rahen, and gave its people bountiful harvests for generations. But the gardens of the Raj have turned away from feeding the people, and instead produce cotton in an attempt to appeal to merchants travelling west.\n\nWe cannot feed a nation on coin and greed, and so fields of white must be replaced with gold. There will be pushback from those who stand to profit the most from the cotton trade, but we must stand our ground. They only concern themselves - we carry the concerns of a nation."

R54_the_iron_spirit_title: "The Iron Spirit"
R54_the_iron_spirit_desc: "More power is stripped from the robber barons of the Raj by the day, and this has made them grow irate and seditious. Minor nobles across Rahen now rally their peasants to arms, intent on breaking away from the great state. But these fools have forgotten that we are iron, forged in the strongest flame imaginable. They will not break us, but instead will shatter upon our soldiers as we pave the way for the future of the Raj, the bones of rebels ground into road-mortar."
R54_the_iron_spirit_tt1: "The consequences of the decrees have passed and the Barons have been dealt with."
R54_the_iron_spirit_tt2: "Up to §y10§! provinces with manufactories gain 2 production development."

R54_iron_footfalls_golden_paths_title: "Iron Footfalls, Golden Paths"
R54_iron_footfalls_golden_paths_desc: "The Raj expands, and as it grows so too does our infrastructure. With more troops crossing Rahen than ever before, a new roadway is needed to make their journeys swift and timely. The Golden Highway, a shining monument to our newfound resolve, will form this new road. Stretching down to the coast of Rahen, our influence will soon spread throughout the south as we establish the Raj as the new power in the region and campaign against our foes with ironclad resolve."
R54_iron_footfalls_golden_paths_tt1: "The Rahen Coast Golden Highway has been finished."
R54_iron_footfalls_golden_paths_tt2: "Tactical Maneuver: §yRegroup§! is active."
R54_iron_footfalls_golden_paths_tt3: "If all nations required for this mission are our subjects, we will inherit all provinces in §yRahen§! from our §ylargest subject§! with their capital in these areas. They will cease to be our subject and grant us §r-1§! Diplomatic Reputation for §y10 years§!.\n\nOtherwise, gain permanent claims on the §yAvhavubhiya§!, §ySarkhashabid§!, and §yAscension Cape§! areas."
R54_iron_footfalls_golden_paths_tt4: "All countries with their capitals in the §yAvhavubhiya§!, §ySarkhashabid§!, and §yAscension Cape§! areas either have §y20§! Spy Network from us or are our subjects."

R54_burning_the_black_flags_title: "Burning The Black Flags"
R54_burning_the_black_flags_desc: "Securing the Rahen Coast has been a significant boon for trade within the Raj, but its acquisition brings with it problems never before considered by the court of [Root.GetName]. Across the sea, the black flag of piracy runs rampant as trading ships are looted and their crews slaughtered. We have bested the great armies of Rahen in battle, and now these upstarts believe they can plunder us and go unsullied? They will learn the consequences of their actions soon enough."

R54_the_pride_of_the_gulf_title: "The Pride of The Gulf"
R54_the_pride_of_the_gulf_desc: "Azure waters stretch into the infinite horizon of the Gulf of Rahen as countless trade vessels crest the waves and venture into lands unknown. Flying the flag of [Root.GetName] as they travel from port to port, our merchants spread our influence far and wide and return with riches never before seen. The many port cities along the water grow resplendent and awe-inspiring as wealth brushes the very roads like golden stalks of wheat, and through these riches they transform into the crown jewels of [Root.GetName], shining bright in all their glory."
R54_the_pride_of_the_gulf_tt1: "Every owned Center of Trade in the §yRahen Coast§! Region gets '§yHeart of the Empire§!' until the end of the game, giving the following effects:\nLocal Trade Power Modifier: §v+25.0%§!\nLocal Goods Produced Modifier: §v+10.0%§!"
R54_the_pride_of_the_gulf_tt2: "Upgrade 10 Galleys in Sramaya into §yGalleasses§!\n"

R54_worthiness_title: "Worthiness"
R54_worthiness_desc: "So much has changed since the ascendancy of [Root.GetName]. Magic flourishes under our guiding hand; trade routes never before explored have become the lifeblood of our ever-expanding empire; soldiers train in multitudes, the ultimate fighting force in Rahen. Yet even having come so far, something gnaws at the back of the mind, leaving us shaken and disturbed. All this time we sought to prove our worth, but the question still remains - what does it mean to be truly worthy?"
R54_worthiness_tt1: "Have we finally proven ourselves?"

R54_meeting_the_oracle_title: "Meeting The Oracle"
R54_meeting_the_oracle_desc: "From the mysterious missive we excavated from ancient archives of the Harimraj, a new path has been discovered for the future of [Root.GetName]. In Tughayasa, the oracles await, having met with the Raja many centuries ago. They know we are coming.\n\nWhat secrets lurk below the surface of Rahen, desperate to be revealed? The only thing we can do is seek them out, and discover the truth once and for all."
R54_meeting_the_oracle_tt1: "Has opinion modifier Sent Gift of §y+25§!."
R54_meeting_the_oracle_tt2: "The Raj remains united."

R54_the_iron_raj_rises_title: "The Iron Raj Rises"
R54_the_iron_raj_rises_desc: "In shining suits of silver and gold, the million men of [Root.GetName] march across the world, claiming our dominance across the land. We have proven to all that we are truly the rightful rulers of Rahen, and we now stake our claim for ever further beyond. We are more than a nation; we are iron, unbreakable and unstoppable. The Raj of old is no more, replaced with something new, and it will stand for a thousand years as the supreme power of all Haless."

R54_the_schism_title: "The Schism"
R54_the_schism_desc: "With the rise of Suhan and his teachings within Rahen, we have traded a schism of country for one of faith. Scholars and clergy bicker endlessly, with tensions between the two beliefs growing larger with each passing day. We cannot sit idle as our faith is torn in two, but forcing one faith onto the other would only lead to growing animosity. We must handle this situation with grace, and reunite the schools of thought."
R54_the_schism_tt1: "Reformation tensions have been raging for 5 years."
R54_the_schism_tt2: "At least 2 Reformation Centers are in Rahen."
R54_the_schism_tt3: "Lowers Reformation Tensions."
R54_the_schism_tt4: "Bhuvauri's soldiers flee to your lands. Suhan's Praxis nations under 100 development with 150 opinion of you will join the Raj."

R54_placate_the_praxic_title: "Placate The Praxic"
R54_placate_the_praxic_desc: "Though Hemantsen bristles against Jira's openness to the Praxic, it's clear that these people are not enemies of the Raj. The followers of Suhan may go against the wishes of the state, but did he not do the same when he freed Rahen from the shackles of corruption? Persecution is not the answer, for even if he does not believe in the Praxis, Hemantsen shares a core ideal with many of its followers; the loyalty to the Raj. Besides, fractures in the faith make our nation brittle - if we wish to grow to new heights, we must be unbreakable. The Praxic will be welcomed, and given freedom of religion and worship."
R54_placate_the_praxic_tt1: "All provinces that have/had Suhan's Praxis Reformation Centers in Rahen are owned by you."
R54_placate_the_praxic_tt2: "\n§yPhilosophies Clash§! no longer converts provinces to Suhan's Praxis.\n"
R54_placate_the_praxic_tt3: "All §yReformation Centers§! in §yRahen§! will disappear.\n\nUp to §y3§! owned §ySuhan's Praxis§! provinces in §yRahen§! get '§yPraxis Havens§!' until the end of the game, giving the following effects:\nLocal Unrest: §v-3§!\nMonthly Splendor: §v+1§!\nLocal Missionary Strength: §r-100%§!\nLocal Religious Unity Contribution: §v-100%§!"

R54_release_the_reactionaries_title: "Release The Reactionaries"
R54_release_the_reactionaries_desc: "As the Praxis begins to integrate further into the Raj, many of the more stalwart members of the clergy have grown increasingly irate. How can these people claim to be devout if the teachings they follow cannot be true? This angers Hemantsen and Jira alike, as the sacrifices they made to allow diversity of thought to flourish now stand threatened by those trapped in the past. Together they will move forward into the future, and the Raj will be bolstered by the many different perspectives of its people. Only in this way will the great debates of the court truly stand as gatherings of the highest echelon of intelligent thought."
R54_release_the_reactionaries_tt1: "We have invited at least 3 §ydifferent§! scholars."
R54_release_the_reactionaries_tt2: "\n§yPhilosophies Clash§! no longer causes devastation.\n"

R54_the_iron_soul_title: "The Iron Soul"
R54_the_iron_soul_desc: "As the dust settles in the wake of religious schism, [Root.GetName] now stands united in faith once more. The teachings and guidance of the Praxic ring out in the halls of debate, free for all to hear and judge for themselves. Meanwhile, the scholars of the High Philosophy continue their work as administrators, arguing philosophy with their ideological rivals in between bouts of rulership and guidance. The foundations of our grand state now stand together, an alloyed whole that is stronger than ever before."
R54_the_iron_soul_tt1: "Reformation Tensions have gone."
R54_the_iron_soul_tt2: "\nThe Philosophers have reached a hesitant peace.\n"

R54_white_spears_of_rahen_title: "White Spears of Rahen"
R54_white_spears_of_rahen_desc: "Across all Haless, the High Temples stand proud like white spears of stone planted into the earth. These temples are sacred to our culture and the many cultures of the Raj, and as such must be defended with zealous discipline. Luckily for us, many of the temples also feature infrastructure which would serve well as part of military fortifications. We can solve two problems with one strike by turning these lands of faith into stalwart shields against our foes."
R54_white_spears_of_rahen_tt1: "Gain a unique province button, granting the ability to §yBuild Temple Outposts§! on repaired §yHigh Temple Complexes§! in §yRahen§!."

R54_reasoned_warfare_title: "Reasoned Warfare"
R54_reasoned_warfare_desc: "We have argued and debated the change of many different aspects of society, and war must be no exception to this. Combat is seen by many officers as nigh-sacred, and battle traditions rob our soldiers of the chance to be forged into a force fit for the modern day. Iron is strong, but it may also be shaped into forms which better serve the wielder; as such, we shall shape our armies into the final form which will step into the light of tomorrow."
R54_reasoned_warfare_tt1: "Upgrade our Tactical Maneuvers."

# -------------------------------

R54_the_map_to_hope_title: "The Map To Hope"
R54_the_map_to_hope_desc: "The ruins of Shamakhad once held more than the strife which tore Rahen in two. Hiding within the cities of the past is the rumored location of the Final Throne, the seat of Harimar himself. Securing this ancient seat of honour will not only legitimize us in the eyes of the world, but connect us to our past and allow us to truly say we are the Harimraj reborn. Time is of the essence; we must move quickly to find it."

R54_throne_war_and_sisters_title: "Sisters, Wars, And The Lost"
R54_throne_war_and_sisters_desc: "The first omen of the Harimraj was one of schism and strife. The great empire was warned of a terrible rift that would form on the fault lines of the nation. This tale of an empire split in twain perfectly mirrors our control of western Rahen versus the unfortunate chaos of the eastern lands. These lands have been revealed to be ours by right, and so we must reclaim them to restore the Raj to its most venerable glory."
R54_throne_war_and_sisters_tt1: "Tactical Maneuver: §yOverwhelm§! is active."
R54_throne_war_and_sisters_tt2: "For 100 years, gain a unique '§yThe Iron March§!' Casus Belli to conquer provinces in §yRahen§! at a heavily reduced cost.\n"
R54_throne_war_and_sisters_tt3: "We've insulted a nation with their capital in §yShamakhad§! that isn't our subject.\nWe've insulted a nation with their capital in §yDhujat§! that isn't our subject."

R54_gods_pillars_and_end_title: "Gods, Pillars, And The End"
R54_gods_pillars_and_end_desc: "The third omen of the Harimraj was one of death and destruction. Shrouded in images of smoke and ruin, the Raj heard that the world would one day end in a catastrophic fashion. The source of this calamity is unknown to even the oracles, but one thing is known for certain; whatever happens, the gods will not come to save us.\n\nIf there was ever any motivation that spurred us forward, it is this one. We now know we live on borrowed time, and we must move quickly lest the world fall down around us."
R54_gods_pillars_and_end_tt1: "Tactical Maneuver: §yOutlast§! is active."
R54_gods_pillars_and_end_tt2: "Enable the §yGodswall Tunnel§! monument."

R54_an_army_worthy_of_harimar_title: "A Force For His Will"
R54_an_army_worthy_of_harimar_desc: "There has always been a spectre hanging over Haless like fog on a misty day, and the very name of this shadow sends shivers down the spines of even the most battle-hardened veterans; the Command. The hobgoblins are disciplined, well-trained, but most importantly share a deep bond with each other, familial ties running deep through their entire society. Much like the teachings of the Orange Sash, this gives them great unity and resilience on the field of battle, and quite possibly lead to their domination of Shamakhad.\n\nThe Command is dead, but the hobgoblins remain. The lessons they taught were harsh and heavy, but we would still be fools not to learn from them just the same. The legacy of Harimar is one of conquest and martial excellence, and to achieve this we must show no fear and give no quarter. We have much to learn from the conquerors of the past if we wish to be as the greatest conqueror of all."
R54_an_army_worthy_of_harimar_tt1: "Boar, Wolf, or Lion Hobgoblin is an accepted culture."
R54_an_army_worthy_of_harimar_tt2: "§y1000§! Military Power, reduced by §y100§! for every §y10%§! Army Professionalism you have."
R54_an_army_worthy_of_harimar_tt3: "Have the largest army in Haless."
R54_an_army_worthy_of_harimar_tt4: "All other nations in Haless lose §r-50§! Power Projection.\n"
R54_an_army_worthy_of_harimar_tt5: "Upgrade our Tactical Maneuvers.\n"
R54_an_army_worthy_of_harimar_tt6: "Upgrade our province button, allowing us to upgrade temple outposts to §yNitikamarja Drillgrounds§!."
R54_an_army_worthy_of_harimar_tt7: "All Hobgoblin provinces in the Shamakhad region are owned by us."

R54_demonstration_of_destiny_title: "Demonstration of Destiny"
R54_demonstration_of_destiny_desc: "There is no more question of our might, and all those around us now tremble at the mere mention of [Root.GetName]. Whispers have grown on the frontiers of a great coalition, set to destroy us before we may obliterate all those who stand in our path to destiny. This cannot be allowed to pass.\n\nWe are no mere upstart empire, bent on domination followed by a swift collapse. We walk with the grace, pride, and strength of Harimar the Great! Our destiny is absolute, for he has shown us what that destiny will bring us. We will show our enemies what this fate looks like on the field of battle, and they will know that we are truly something magnificent and terrible."
R54_demonstration_of_destiny_tt1: "All countries with over 300 development in the §yYanshen§!, §yVimdatrong§!, and §yGozengun§! subcontinents have been §yinsulted by us§!."
R54_demonstration_of_destiny_tt2: "The Blood Lotus is dead."
R54_demonstration_of_destiny_tt3: "Our ruler becomes a §y100§! Army Tradition general with §y+1§! to all stats. If they are already a general, they instead become a §yLegendary Conqueror§!.\n"
R54_demonstration_of_destiny_tt4: "Haless cowers in a united front against us. Enforce §rSunder Coalition§! on their leader to end this impudent display. \n\nThe Great War begins."
R54_demonstration_of_destiny_tt5: "Have no truce or alliance with any nation in Haless Proper."

R54_the_third_harimraj_title: "The Third Harimraj"
R54_the_third_harimraj_desc: "No more questions.\nNo more resistance.\nNo more doubts as to our legacy.\nWe have been forged, tempered, and battle-tested. The iron in our bodies and souls has transcended the people and has been infused into the being of [Root.GetName] itself. We are no emulator of Harimar; we are his successor. The day will come when many forget the history of [Root.GetName], and it fades into obscurity in the mists of time. But no one will forget this day, for this is the day of the Harimraj's rebirth."
R54_the_third_harimraj_tt1: "We have won §dThe Great War§!."
R54_the_third_harimraj_tt2: "§yParusahan Saya§! will gain §v10.00§! Power Projection (permanent).\n"
R54_the_third_harimraj_tt3: "\nWe may now form the §cHarimraj§!.\n"

R54_bow_mage_and_fall_title: "Fates, Mages, And The Fall"
R54_bow_mage_and_fall_desc: "The second omen of the Harimraj was one of defeat and shame. The empire was warned of a mad ruler who would see the death of the nation, one who would come in black and know the unknowable. This would turn out to be the tale of Jagaddipendra, the mage-emperor who emerged from the Oracular Guard to seize power in 795, and whose defeat led to the collapse of the first Harimraj.\n\nThis grisly fate will not befall us, for we have something the first Harimraj did not - the trust of our mages. With the efforts put into integrating magic into society, we may ensure the oracles cooperate and do not stray down the path of destruction."
R54_bow_mage_and_fall_tt1: "Court Mage of lv5 is currently employed."
R54_bow_mage_and_fall_tt2: "While we have a §yCourt Mage§! employed:"
R54_bow_mage_and_fall_tt3: "§yThe High Augur§! joins the frontlines as a powerful War Wizard!\n"

R54_philosophical_studies_title: "Philosophical Studies"
R54_philosophical_studies_desc: "High Philosophy has morphed and evolved since our humble beginnings, breaking and reshaping itself into a true faith of the modern era. The progress of technology, especially in the form of the communication of knowledge, has propelled the teachings of the philosophers to staggering heights, and the function of the faith has been elevated along with it.\n\nNo longer are the rigors of debate shackled to the halls of philosophers, but instead they fly free into all kinds of fields, especially those of the scientific community. A new kind of hall opens in the most free-thinking of cities - a place more given to experimentation than debate, unprecedented in Rahen.This new chapter in High Philosophy sets the stage for a new era of innovation and excitement, and we welcome it with open arms."
R54_philosophical_studies_tt1: "For the rest of the game, constructing a §yUniversity§! in a province upgrades an existing §ySchool§! to an §yAcademy§! for free.\n"

R54_frontiers_to_frontlines_title: "Frontiers To Frontlines"
R54_frontiers_to_frontlines_desc: "Now that the Raj has strengthened around its core territories, the buffer states that encircle our lands have begun to lose much of their purpose. We no longer need defending from threats who lash out from beyond our borders, for we have been remade in the image of iron, and iron will not break against such feeble attempts to destroy it. Let us bring the Senapti fully into the fold, so we may better mobilize our soldiers to the borders of our vast empire."
R54_frontiers_to_frontlines_tt1: "Inherit all provinces in §yRahen§! that our §ySenapti§! own at the cost of §y4 Diplomatic Power§! per development, demoting them to §yPrabhi§! if they still exist.\n"
R54_frontiers_to_frontlines_tt2: "The position of §ySenapti§! is removed from the Raj.\n"
R54_frontiers_to_frontlines_tt3: "All of your Senapti subjects:\n  Has opinion modifier §yGreat Power Influence§!\n  Trust at least §y75§!\n  Opinion of §yThe Iron Raj§! is at least §y200§!\n  Liberty Desire less than §y1.00%§!"

R54_the_last_remnant_title: "The Last Remnant"
R54_the_last_remnant_desc: "The power of the Raj has nearly been consolidated, but one remnant of the past remains. The Vizier stands as a politically sound opponent, who even now still holds much influence over our courtiers. We cannot resolve this matter clumsily, lest we risk our entire state collapsing around us. We will move carefully, offer them wondrous boons, and hopefully convince them to fully assimilate into the Raj."
R54_the_last_remnant_tt1: "Has opinion modifier §ySent Gift§! of 25."

R54_a_court_worthy_of_harimar_title: "A Court For His Wisdom"
R54_a_court_worthy_of_harimar_desc: "Long has Rahen stood divided, by the scheming plots of the Vizier and their allies or through the schism that split the faith in two. But we have worked for many years to mend these rifts, and we may now say that the court has finally come together in harmony under one banner.\n\nDiplomats, clergymen, mages, advisors and generals meet and debate just the same, but now their desires are all pointed towards the same goal. The personal plots of times of old are memories of the past, and the will of our administration is as solid as iron itself. We will never be broken again - by internal strife just as well as external."
R54_a_court_worthy_of_harimar_tt1: "The Vizierate has been reformed.\n"
R54_a_court_worthy_of_harimar_tt2: "Have the highest Diplomatic Reputation in Haless."
R54_a_court_worthy_of_harimar_tt3: "All other nations in Haless lose §r-100§! §yPrestige§!.\n"
R54_a_court_worthy_of_harimar_tt4: "All of our subjects gain §v+999§! Opinion of us.\n"
R54_a_court_worthy_of_harimar_tt5: "\nOur ruler and heir get §v+1§!/§v+1§!/§v+1§!, granting §y50 Monarch Power§! of relevant stats that overflow."

R54_a_throne_worthy_of_harimar_title: "A Throne For His Rule"
R54_a_throne_worthy_of_harimar_desc: "In the ruins of Sarisung, something was uncovered that was thought to be lost to the echoes of history - the Final Throne, the seat of Harimar himself and the shining monument to the glory of the past. Painstaking effort was put in to restore this symbol of strength and power to its former radiance, and we are fast approaching the zenith of our effort.\n\nLet the entire world see our splendor as we sit among the titans of history! We are no longer simple stewards of the past, reclaimers set on reiterating the grand legacy that came before. We are the inheritors of that legacy, the next in a generation of legendary conquerors, and we will accept this fate on a throne of gleaming gold!"
R54_a_throne_worthy_of_harimar_tt1: "The Dhujat Golden Highway has been finished."
R54_a_throne_worthy_of_harimar_tt2: "Have the highest Development in Haless."
R54_a_throne_worthy_of_harimar_tt3: "All other nations in Haless lose §r-50§! §yLegitimacy§!.\n"
R54_a_throne_worthy_of_harimar_tt4: "Repurpose Sarisung, causing it to lose §yall production development but 1§!, gaining §y50 Crowns§! per development lost.\n"

