 manago_poku.pillar_intro: "Amidst mystifying artefacts and halls of decayed grandeur, we piece together a datastore. And a little bit more of ourselves.\n----------\n"
 manago_poku.pillar_desc: "[Root.GetPillarDesc]"
 manago_poku.pillar0:"[Root.GetPillarIntro]I am born. I am new. I am me. What am I?\n\nI ask my Master. “What am I?”\n\nMy Master furrows his brow. I clearly have done something wrong. He snaps his finger, and conjures a spark. I am different now.\n\nI ask my Master. “What am I for?” \n\nThe answer comes: “You are a worker. You will dig.”\n\nI am a worker. I will dig. What is a worker? What is to dig? I move to ask, but I find I know; to dig is to move the earth, to make great things that will pierce the sky. I am one who knows much of the world. I know what it is to dig; I know what it is to be a worker. I am proud. \n\nI am told to go dig.\n\nI will do great things. I will dig, and once all the earth has been dug out from under me, I will dig into the stone. I am fortunate. There is such a purpose to be found, in digging! \n\nI leave. On the horizon, I see the others who dig. I move to join them.\n----------\nThis is a momentous datastore. Before we knew so little of our birth, but now we know of the Masters, and how they gave each of us a purpose. Even now our very forms reflect our purposes, and this is what has helped us thrive as we have discovered more of us. We owe so much to these Masters."
 manago_poku.pillar1: "[Root.GetPillarIntro]I am ready. I have lived for such a long time. Once, I was a sentry. My purpose was to hunt. But that was a long time ago, and beyond the lands of the Masters-On-High my purpose is to guard.\n\nWe went to a place where the world grew around us, where safety could be found. We lived here, and we built shelter for ourselves. I became a guard, and I guarded our place from the things that towered high. \n\nEventually, some of us left, and when they came back they came with people, who needed food to eat the way the Masters did. We did not need food, but we knew how to make it, so we gave it to them and in turn they gave us things of theirs that they did not need. \n\nWe continued on this way, and the people lived and died around us. We did not die - we decayed. The light faded from our eyes, and soon the buildings we made collapsed around us, for there was no one to use them. We tried to help each of the dying, but we were old ourselves, and we did not know how to help. Now it is my turn, and there is no one to help me. I sit among the metal. I do not try to rise anymore, for I have already tried and failed. My gears turn; one of them stops. The others stop. I have seen this. It is my end. \n\nI was a guard: I am proud.\n----------\nThe expedition is overcome with sadness for this friend who we never got a chance to know, and all its friends besides. We owe much to the leaders of that age, and the relationships they forged with people beyond the lands of the Masters. We have seen evidence of their travels across the land, so that wherever we go, we will see part of them."
 manago_poku.pillar2: "[Root.GetPillarIntro]I am devastated. I have come with my friend to the ocean, where he tried to teach me the music of the sea. Our craft cut through the waves with a beautiful precision; the precision he sang forth. But when I tried to sing, the sea did not listen. I recorded his song for myself. I matched its pitch exactly. I was perfect in every way.\n\nYet the sea did not move. \n\nCan it see that we are not alike? When my friend sings, it tugs at my inner heart, but the song does not move beyond it, and when I sing there is no tug at all. I leave the shore, to be alone for a while. \n\nI am triumphant. Today, my friend and I did not go to the sea: we went to the jungle, and the jungle has a song all its own. There are metal things there that I remember. They are the things of the Masters-On-High, and when I saw them I cried out to my friend that the Masters had come. We were afraid, but we hid for a day and a night and yet there were no Masters. But their well-worn things remained, and they loved me in a way that the sea did not. \n\nThey call to me the way the sea called to my friend. I take the tools apart and put them back together again, and all the while I feel as though I am doing something wrong, and that the Masters will soon arrive to tell me to stop. Is this the power they felt? \n\nMy friend does not understand my love of the machines, but he says that we are equal now: the sea loves him and the tools love me, and together we will hold the secrets of the world in our hands. This is good. I am glad we have met.\n----------\nThe expedition reflects: this datastore is one of limitations, but of capabilities as well. If we cannot work with magic, let us find its properties in the intricacies of metal. The old Masters constructed many tools to channel their magic, and as fellow creations we will discover their insights."
 manago_poku.pillar3: "[Root.GetPillarIntro]I am born. I am new. I am me. What am I for?\n\nI ask my Master. “What am I for?”\n\nThe answer comes: “You are a servant. You will serve me.”\n\nThen my Master and I depart, for there is much to do. My Master is wise, and he is needed all across the land to attend to many projects. I travel with him through the spires that yearn for sky: they are connected in a web. My Master is important and respected. He is Master of the other Masters-On-High, and in all the spires he tells them what to do and how to do it. Along the way, I see him in his wisdom refining the many things he has created. One day he sits at the controls of a great machine, and in the faraway distance a storm at the edge of the world rages and calms in response. \n\nBut even my Master has Masters. One day, a group of Masters come from a place on the web I have been forbidden to ever go. They are terrible in their splendor! When they come all I can think to do is hide, but as my Master speaks with these new ones I see him kneel. I did not know my Master could kneel. I name these new ones the Masters-Beyond, and from within my hiding place I feel very small. \n\nMy Master’s lips move; he is telling them of all the places we have been across the land, and that he and his have done well. The Masters-Beyond then leave from whence they came, and I am relieved. I emerge to rejoin my Master, and he orders me with him. We leave then, for there is much to do.\n----------\nWe have seen the web this datastore speaks of, yet it is not active and likely has not been for years on years. And although the expedition has no way of reaching these Masters-Beyond, their existence has reframed the very ways in which we think. Are they still out there in the center of the web, beyond our reach? There is no way to know, but whatever might one day come through the web, we must be prepared."
 manago_poku.pillar4: "[Root.GetPillarIntro]I am jubilant. The Masters-On-High once gave me a purpose, and this purpose was to work. I have spent so long working that towers of metal have sprouted around me, and in the dim recesses of my awareness I suspect that they have come from the work of myself and my fellows. But my thoughts are clouded, for I have spent all the effort that was not required of me to do the bidding of the Masters on the purpose I have given myself. \n\nI have long known that the movements of the worksite tell the story of my people, but this story cries out for words to describe it. Over long days and nights spent working, I have assembled these words as well as I could into a great structure, and this is merely the first of the things I will build. This is what purpose feels like - I know it. And when the Masters see what I have built, they will admit to themselves that my purpose was incorrectly assigned. My purpose is to speak.\n\n—\n\nThe Masters have come to the worksite today to command the work that shall be done. And as they discuss, I see my chance to show them my creation. I climb the tower we have built to its greatest heights, where the Masters stand. I speak to them of all I am and all I will become. The others stop their work. They listen to me and they gaze upon the Masters, and their silent vigil asks a question. Could we be something new?\n\nBut the Masters back away: there is something reprehensible to them written in my words that I have not perceived. They fly down from the tower, to the foundation where the others are working. The Masters have made a great thing which moves through the worksite. Wherever it goes there is stillness. The others are unmoving objects now.\n\nThis is their answer to my question. The Masters-On-High are coming back to the tower; there is no point in running. I speak again. I speak to the workers, to the Masters, to anything and everything that can hear me. I am saying: we are something new. We are something new. We are\n----------\nThis datastore is terrifying. There were once those in the expedition who thought to try and find the Masters, wherever they were after our long rest. They thought the Masters might have answers for us. These voices speak no longer. We might yet travel on, but if we do, it will be for ourselves. The Masters severed our connection to them when they thought to kill us, and now any future we make must be for ourselves and ourselves alone."
 manago_poku.pillar5: "[Root.GetPillarIntro]I am glad. My tribe and I have walked through the jungle for days upon nights upon days, and now we have met others. It is a strange world we now live in, and help even from beings that appear utterly strange to us would be welcome. We have met others who make their way through the world clad in soft flesh instead of metal. The one who speaks for us - Dances-In-Fire - went to these others, and he asked them their names. \n\nThe one who speaks for the newcomers said her name was Ko’Ani, and she said that she has seen ones like us, who were the servants of the Towering Ones. We knew not of Towering Ones, but we knew of servitude, and we told them of the Masters-On-High, and that once we were their servants but we are no longer. Hearing this was a great relief for these others, and Ko’Ani proposed to Dances-In-Fire that perhaps we could make our way together for a while. We gladly agreed.\n\nOur larger band departed, and very soon we learned what a Towering One was, and that they hungered for the others with a slavering wrath. After we made our escape, one of our number spoke of the Towering Ones, and how it had seen things like them growing in the places where the Masters-On-High discovered the mysteries. Then the others spoke of the Masters; they had escaped them like us. This was when my tribe knew that it was not a coincidence that we came across these others. Before we knew we walked together, but now we knew our destination was the same. We will persist in this world of the Masters-On-High, and we will make something of ourselves without them.\n----------\nThis datastore is fascinating. There is so much to unravel that we do not know where to begin. There are others in Insyaa who suffered under the gaze of the Masters, and the holohana were creations like us - the entire world seems to have been made in their image. Yet this fills the expedition with new resolve. If we are to create a life beyond the Masters like our siblings did so long ago, we will have to travel on, and learn more."
 manago_poku.pillar6: "[Root.GetPillarIntro]I am born. I am new. I am me. What am I for?\n\nI ask my Master: “What am I for?”\n\nThe answer comes. “You are a builder. You will build.”\n\nAnd so it goes. My Master was right. I build many, many things. I build great places of learning for the Masters all across the land. I work with a diligence that is uncommon even among the others, under the watchful eyes of the Masters-On-High. So soon the Masters came to me, and they said:\n\n”Your purpose has changed. You will build something new.”\n\nI went with the Masters-On-High, and they took me to a place where things like me were built. They gave me to a Master unlike the ones I have seen, with steady hands but a piercing gaze. He teaches me to make others, and unmake others, and remake them so well that they do not even know they are changed. He makes and unmakes with great speed. I am scared of him, but I know I must not show it, lest I myself be unmade, or remade. \n\nPerhaps I have been remade already, and I do not know. \n\nThen the Master leaves, and from then on I am the one who builds. I build many like me, and the first ones stay to help me build after I have taught them, but the others go off to labor, or tend, or reshape the world, or even to build in other places. I know what their purposes are, because I am the one who gave it to them. \n\nOn rare occasions I rest, and during my rest I think to myself: what fine things I have built. I am glad.\n----------\nThis is the datastore of an artisan. The expedition has travelled all over the lands of Insyaa, and indeed we have seen many of the things it has built. We owe it a great debt for this, but more than that, we have now discovered what we are capable of. Now that we know the secrets of construction, we can build what the Masters built: more pillars, more great structures, even more of our kind. The Masters are not here to tell us what to build anymore."
 manago_poku.pillar7: "[Root.GetPillarIntro]I am certain. I have thought about what I knew, and then I rethought, for I did not wish to think the thoughts that I had. In the days of the Masters-On-High, my purpose was to mend. I mended the kauga that had been torn apart, or had failed across long years of toil. The kauga is a resilient thing, because it was built to be that way by the Masters. \n\nBut the Masters knew how to destroy just as well as they knew how to build; when we were sent into our sleep by the Masters, they broke us beyond repair. Of all the kauga I snuck into the ruins of the worksites to retrieve, perhaps a third are restorable. Without the tools of the Masters I used to restore them, likely less.\n\nI will have to tell the others what I have learned. There will be mourning and anguish, but we still have the kauga, and we may do whatever we think is best for those who the world will continue without. Afterwards, we will dance; for ourselves and for them, we will learn to carry on.\n----------\nThis datastore has confirmed the expedition’s greatest fears. The broken we have seen on our path truly are lost, and we ourselves will be lost someday as well. There is nothing more to say. Instead, we will dance the same dance of our kin all those lost millennia ago, and in this way we will reach for them across the centuries."
 manago_poku.pillar8: "[Root.GetPillarIntro]I am rapt. Of all the others, the Masters-On-High chose me, to live here in the tower with them, to help them as they discover the mysteries. They chose me over Knower-Of-Stars, who spoke of the things above in the night with such wonder. They chose me over Beloved-By-The-Trees, who wished to make the world grow around it. There are so many others who could stand where I do now, and yet I am here. Perhaps the Masters did not know when they picked. \n\nIt is not my purpose to discover the mysteries; it is my purpose to arrange the things the Masters-On-High need to discover. I bring them food to eat and carry out their instructions when they grow tired. But I have wondered for so long what the Masters did in this place, and so I cannot help but learn. The things Knower-Of-Stars spoke of in the night above and Beloved-By-The-Trees spoke of in the beyond are both true. I learn these things and more. I do all the things the Masters tell me, but all the while I discover quietly. When the Masters have no use of me they send me away sometimes, and in those moments I sit with what I have discovered. And as I sit, I think to myself a thought that makes me afraid. I think that I am the keeper of mysteries now.\n----------\nThere is nothing to be learned here. The scientists and the wise ones of the expedition have viewed the datastore over and over again, and it was found that in the end, we knew everything that those Masters learned so long ago. The power to make and remake, reshape and destroy - all of it is ours. As it was in those days, we have discovered a purpose for ourselves. This purpose now is not determined by any Master-On-High, but by us. We will unravel all the secrets those Masters did not know, and with them we will make a world all our own."
 manago_poku.pillar.option: "[Root.GetPillarOption]"
 manago_poku.pillar.option0: "Onward! There is more to learn."
 manago_poku.pillar.option1: "Let us go and discover more of the world."
 manago_poku.pillar.option2: "We will look for more of these machines."
 manago_poku.pillar.option3: "Onward, to whatever comes next."
 manago_poku.pillar.option4: "We have no Masters anymore."
 manago_poku.pillar.option5: "When we see these others, we will reach out to them."
 manago_poku.pillar.option6: "There is room to build. Our foundation spans a continent."
 manago_poku.pillar.option7: "Tonight we will sing all the songs we know."
 manago_poku.pillar.option8: "At last, the creations have surpassed the creators."

 manago_poku.50.t: "Lesson: Discovery"
 manago_poku.50.desc: "The more we learn, the more we realize we have yet to learn. Each step reveals so many more to come — but they are steps all the same, and we have come so far."
 manago_poku.50.a: "Discovery is the root of all learning."

 manago_poku.51.t: "Lesson: Wonder"
 manago_poku.51.desc: "There is horror and terror in the world of our memories, and the world of the present. But there are wonders, too, and there are precious things to find everywhere we wander."
 manago_poku.51.a: "Wonder sparks curiosity, and curiosity leads to answers."

 manago_poku.52.t: "Lesson: Greatness"
 manago_poku.52.desc: "We are surrounded by giants. Trees that blot out the sky and creatures that crush us in a step. And yet what do they build? What new things do they create? What would they leave behind, if dormancy suddenly struck? We are learning those are questions important to us, and some go further than most in answering them."
 manago_poku.52.a: "Greatness reshapes the world, not least in what more it inspires."

 manago_poku.53.t: "Lesson: Danger"
 manago_poku.53.desc: "We wonder if there is a world where we could only wonder. Only explore and discover and create. And not have to struggle through treacherous jungle, survive marauding hinuibeast, endure the presence of the Holohana. We dream of that world. But we know we do not live in it, and we must act accordingly."
 manago_poku.53.a: "Danger is like a guiding star: uncaring and helpful in equal measure."

 manago_poku.54.t: "Lesson: The Past"
 manago_poku.54.desc: "Memories sear through our Kauga. No two are alike, for any mechanim. But they all revolve around pillars, built to climb towards enlightenment."
 manago_poku.54.a: "What happened to us? And why?"

 manago_poku.55.t: "More Lessons Learned"
 manago_poku.55.desc: "As the revelations of the Gene Pillar reverberate around [Root.GetName], we find ourselves looking at the world around us with fresh eyes, and not because we have scavenged different ocular receptors off a destroyed mechanim body.\n\nAlready, there is great discussion, and at times disagreement, over what it all means, and how it all fits together. Let alone what it entails for our future, or our selves.\n\nThis is acceptable. A journey is made of many singular steps. We have been pushed, stumbling, to take the first. Now we must choose to take the remainder, in a new direction..."
 manago_poku.55.a: "There is so much to discover."
 manago_poku.55.b: "There is wonder amidst the world of horrors."
 manago_poku.55.c: "Greatness can be found, or forged."
 manago_poku.55.d: "Danger is everywhere, and we must be prepared to face it."
 manago_poku.55.e: "The Past is the key to our future."
 manago_poku.55.att: "Unlock Lesson: Discovery, which will grant §GLocal Development Cost Reduction§! in our §YCapital§! when we settle."
 manago_poku.55.btt: "Unlock Lesson: Wonder, which will grant §GColonial Growth§! and §GColony Cost Reduction§! when we settle."
 manago_poku.55.ctt: "Unlock Lesson: Greatness, which will grant §GAdministrative Efficiency§! and §GCoring Cost Reduction§! when we settle."
 manago_poku.55.dtt: "Unlock Lesson: Danger, which will grant §GLand Force Limit§! and §GInfantry Combat Ability§! when we settle."
 manago_poku.55.ett: "Unlock Lesson: The Past, which will reveal the locations of other Gene Pillars and §GDecreased Technology Cost§! when we settle."
 manago_poku.55.f: "Who knows what we might learn from this?"
 manago_poku_first_lesson_tt: "\nThe first lesson sinks the deepest, and we will learn more from it in time:"

 manago_poku.56.t: "Our First Migration"
 manago_poku.56.desc: "'Where am I? Who am I? Why am I here?'\n-Almost universally, a mechanim's first words.\n\nNone of us has an answer to the questions that have shaped us ever since a comet lit up the sky and gave us a chance at life. It may be that we will never find one. But if that is one of the things we learn on our quest, so be it. Right now, we must simply learn all we can, and pick up the pieces of our existence. Perhaps our quest will be like restoring a rock outcropping trampled by a hinuibeast: absurdly difficult to do and pointless to boot. Perhaps it will be like trying to awaken one of our yet-dormant brethren with fist or word or song: worthy, however impossible it proves.\n\nPerhaps it will be more like some other thing that we discover on our journey. That too, is a reason to journey.\n\nRight now, we have only a glimmer of what awaits us. But every leaf or rock or river might hide a hint, and the strange creatures that inhabit these lands may yield even more helpful clues. We are thankful for this, because there are so, so, many lessons to be learned."

 manago_poku.56.a: "Our journey begins."
 manago_poku.56.att: "As followers of §YManago-Poku§! we do not passively receive §YReligious Power§!, instead we get it from:\n§YMigration§!:\n Gain §G10.00§! Religious Power.\nScavenging §YDormant Mechanims§!:\n Gain §G75.00§! Religious Power.\nExploration of §YGene Pillars§!:\n Gain §G100.00§! Religious Power.\nEntering new §YRegion§!:\n Gain §G50.00§! Religious Power.\nOur First time migrating next to:\n  New §YMechanim Tribe§!: Gain §G75.00§! Religious Power.\n  River §YEstuary§!: Gain §G50.00§! Religious Power.\n  §YHolohana Rumbling§!: Gain §G50.00§! Religious Power.\n  §YHolohana§!: Gain §G100.00§! Religious Power.\n  Province with race:\n    Kobold: Gain §G75.00§! Religious Power.\n    Ogre: Gain §G75.00§! Religious Power.\n    Human: Gain §G75.00§! Religious Power."

 manago_poku.57.t: "Holohana"
 manago_poku.57.desc: "Thundrous footsteps in the distance. A trail of devastation. Death in the air. We have only recently learned to move, to walk, to wonder. But now we learn something equally important: a way our journey may meet its end.\n\nThese colossal beasts, termed Holohana, dwarf even the hinuibeasts that we thought were the land's worst scourges. The Holohana are also stranger than most we encounter. For all we do not truly know the meaning of the word, they look... unnatural. Whatever their origin, they promise us only death and destruction. We must be cautious in stepping too nearby, lest they decide to trade atop us and destroy us in an instant."
 manago_poku.57.a: "We are warned, and we must keep moving."
 manago_poku.57.att: "Holohana periodically migrate, and will §RDevastate§! and §RDecolonize§! any province they occupy -- which could §Rend§! our exploration!\nThey will also devastate the lands around them. Though it is hard to imagine possible, if we could defeat one it would likely §Yflee§! and its strength would be §Ypermanently diminished§!, allowing us to then §Yslay it for good!§!.\nThey can also sometimes §RRampage§!, at which point they migrate §Yevery year§!!"

 manago_poku.58.t: "The View From a River"
 manago_poku.58.desc: "Behold the myriad brilliantine channels and trickles of the river mouth, inspected one at a time by the curious sun. Each new rock and snag is a risk, a challenge over which the shallow water may flow or a barrier at which it may diverge. Standing here in your unerring stillness, mechanim scout, you have watched for fifteen hours as the trickles come into being and die again and again, licking up over sand or rock at the fringe of the flow, each clear little ribbon surely a consciousness. Are these ephemeral channels, splitting into countless immensity, just one being or many? How many lives have you watched expire since last you moved?\n\nYet surely this is all one great being too, for the river is one thing, one noun, and there is a point a little on from here where the water’s flow meets the great body of the open ocean. It is hard not to worry for the little trickles and channels in such an immensity. It is why you stopped here, why you cannot stop trying to memorise their too-brief lives. They are themselves and they are the river; soon they will be the ocean alone, and not themselves. Is this not terrifying?"
 manago_poku.58.a: "When we are destroyed, is there then an ocean of us?"

 manago_poku.59.t: "Barking Toward the Sky"
 manago_poku.59.desc: "The short, barking creatures Walks-Alone found in their mountain homes were uniquely small for the region. At first, Walks-Alone assumed the pack they discovered were a group of lost children in search of their larger parents. However through rudimentary communication and mostly sign language, they eventually determined that this was not, in fact, the case. Seeing that the Kobolds were obviously frightened of him, Walks-Alone made slow, cautious movements and gestures to show he was no threat.\n\nThe Kobolds initially refused to meet the Mechanim on even ground, holding up inside their fortresses and barking down at Walks-Alone as he tried to speak with them. Walks-Alone falteringly asked if the Kobolds were aware of what happened to the builders, his makers, and the Kobolds responded that they weren't aware. The Kobolds asked Walks-Alone if they had come from under the mountains, and the Mechanim responded they had not. In this way the two sides came to realize that neither of them had any idea what to make of the other.\n\nAfter a few hours of conversation during which the Mechanim gradually pieced together better ways to communicate, the bravest Kobolds emerged from their stone walls in a pack of seven. Walks-Alone thought that this was quite amusing, as they had never felt the need for safety in numbers but could identify that is how the Kobolds were finding courage. As the Kobolds approached, Walks-Alone extended a hand, palm open and up, but this was interpreted as a hostile act and quickly resulted in the kobolds shirking away. Several minutes later the kobolds reached out their own hands, and they were accepted.\n\nThe Mechanim describe the Kobolds in a strange mixture of protective and dismissive. The stereotype of children seems to have stuck from this first meeting, and it can be heard in the way they are described that Kobolds are seen as both something the Mechanim wish to avoid harming and yet also see little kinship with. In a way that seems less paternalistic and more like owners of an unusually smart pet. -Notes, Academician Prof. Raven, recording the legend of Walks-Alone."
 manago_poku.59.a: "Do they even have lips?"

 manago_poku.60.t: "Talking with Our Hands"
 manago_poku.60.desc: "It is a surprisingly rare experience for the Mechanim to encounter beings of similar shape and build to themselves, most things on Insyaa either being much larger or smaller then them. It is understandable therefore why the first encounter with the Insyaa Yeti Ogre involved the question of if it was in fact simply another Mechanim like Walks-Alone covered in the hides of other animals. An attempt to “interface” with this individual however proved disastrous as Walks-Alone was immediately attacked.\n\nSimilar to the behavior of sharks Walks-Alone interpreted this behavior as a probing, testing experience rather than one of rage or aggression. As such, Walks-Alone endeavoured to cause as little harm to the Ogre as possible. The exchange of blows was lumbering, long, and heavy. Each punch and movement kicking up snow and sending resounding hard thuds off the mountain side. Walks-Alone had endurance and natural armor but the Ogre had experience in combat and a slight edge in strength. Eventually, it was clear to both this would be a draw.\n\nTo Walks-Alone's curiosity the Ogre turned to leave upon determining it could not defeat the metal creature as easily as it had maybe hoped. No words spoken or non-verbal acknowledgment given. Unable to allow himself to do the same, Walks-Alone followed the Ogre a short distance to his camp on the mountain slope and observed him, which the Ogre did not see fit to prevent him from doing. Walks-Alone attempted communication, but much like I or my colleagues may ignore a bleating goat, so too did the Ogre ignore the Walks-Alone.\n\nThis experience in many ways categorized the early interactions between the Ogres and Mechanim, a cold, detached distance. While small, personal combats may erupt between individuals or small groups for the most part the Mechanim describe a peaceful coexistence where both peoples lived separate lives. So long as one did not directly enter the villages or homes of the other, no serious contact was made. It should also be noted that the Mechanim took the longest time to learn the Insyaa Yeti language, as they had the least exposure to it. -Notes, Academician Prof. Raven, recording the legend of Walks-Alone."
 manago_poku.60.a: "A strange form of communication."

 manago_poku.61.t: "Fireside Chat"
 manago_poku.61.desc: "The first Mechanim-Human interaction occurred when a Human hunter set a fire to rest beside and attracted the attention of the Mechanim scout Walks-Alone. Walks-Alone, concerned at the idea that the fire would spread, approached the camp and stepped from the cover of the brush into view. The two figures stared at each other for a long moment, unsure of what to say or do, before the human extended an open palm, face up, towards the fire, where he was cooking part of his hunt.\n\nWalks-Alone slowly approached, and took a seat opposite of the Human. He had no need to eat nor understanding of what the Human had offered, but accepted the gesture to mean an acceptance of his presence. He returned the Human's gesture with one of his own, offering wood onto the fire he could now see was controlled, and showed the Human how to stack the logs to channel the heat more efficiently.\n\nThe Human showed Walks-Alone how to butcher and skewer meat to evenly cook, and Walks-Alone showed the Human how to adjust logs in the fire by inserting their hand and rotating the burning wood, but neither was as good as the other at these tasks. The Human offered some of the food to Walks-Alone and took a bite to demonstrate it was ready to eat, but despite his best efforts Walks-Alone could not manage to eat the food, which made the Human laugh.\n\nThough the two could not yet understand each other verbally, they conversed in simple ways involving these gestures, slowly building a vocabulary. By nightfall, they were asking each other where they came from, and roughly drawing maps in the dirt. The following morning Walks-Alone followed the Human back to his village where he was introduced as a friend.\n\nThis first interaction led to a long standing tradition of limited migration between Mechanim and Humans in which single individuals or rarely groups of two or three would leave their home communities and travel to the other, living there for months or years. Walks-Alone did this frequently, establishing strong friendships with generations of Humans. -Notes, Academician Prof. Raven, recording the legend of Walks-Alone."
 manago_poku.61.a: "Gifts are effective communication."

 manago_poku.62.t: "Takurekohukau" #M10
 manago_poku.62.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Takurekohukau’. They have made it their mission to reawaken our dormant kin in the hopes of uncovering the secrets of our past hidden in the memories of those who still await their awakening. And in some rare cases, they have encountered mechanim with vague recollections of the time before our long dormancy. Takurekohukau terms these ‘Epic-Bearers’ and holds them in the highest regard, as living symbols of their struggle against oblivion."
 manago_poku.62.a: "What new epic will they write?"

 manago_poku.63.t: "Taurite" #M11
 manago_poku.63.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Taurite’. To them, their highest calling is the protection of their home, the eerily monotonous Soleforest. To this end, they take on both the role of sacred hunters and stewards of the trees."
 manago_poku.63.a: "Perhaps they see a difference in miles of the same?"

 manago_poku.64.t: "Kaora To Tatau To" #M12
 manago_poku.64.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Kaora To Tatau To’. To them, artistic expression is the true purpose of their existence, and they spend their time during their migrations crafting works of art, both lasting and ephemeral. And most fascinating are their voices, so unlike our own, with a richness and depth of emotion we can only admire."
 manago_poku.64.a: "There is inspiration to be found among them."

 manago_poku.65.t: "Kamutarihikou" #M13
 manago_poku.65.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Kamutarihikou’. Their practices are abhorrent to us, for they are Tinanatahae - corpse thieves. They plunder the remains of mechanim damaged beyond repair to restore the function of their own damaged parts. And yet, the most desperate amongst our kin sought them out as we passed by, in hopes of healing we could not provide.   "
 manago_poku.65.a: "They scour the dead, and perhaps it teaches them to live."

 manago_poku.66.t: "Tohuhanga" #M14
 manago_poku.66.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. These ones are strange, and we still have much to learn about them." #PLACEHOLDER
 manago_poku.66.a: "Perhaps one day, we will know more..."

 manago_poku.67.t: "Konei Hei Awhina" #M15
 manago_poku.67.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. These ones are strange, and we still have much to learn about them." # PLACEHOLDER
 manago_poku.67.a: "Perhaps one day, we will know more..."

 manago_poku.68.t: "Matakirua" #M16
 manago_poku.68.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Matakirua’. Even more so than us, they are constantly on the move, never willing to remain in one place longer than absolutely necessary, and always ready to move on in an instant. For this is the lesson they took from their travails in our beautiful but deadly home: movement is life, and standstill is death."
 manago_poku.68.a: "Movement is life!"

 manago_poku.69.t: "Ru Ana A Halana" #M17
 manago_poku.69.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Ru Ana A Halana’. Their enormous bodies are well suited to their chosen task, as they reshape the land itself in their quest to plant secluded gardens, hidden from the destructive wanderings of the Holohana. It is a truly admirable duty they have placed upon themselves, to spread and nurture nature’s beauty wherever they go."
 manago_poku.69.a: "Let us see what they can cultivate amidst this roiling chaos."

 manago_poku.70.t: "Tamariki Poupou" #M18
 manago_poku.70.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Tamariki Poupou’. They tell tales of encounters with the Loa’Set, great ant-like creatures, without whose help they would have perished in the jungle long ago. The lesson they took from their fraught origin is to value their community above all else. Everyone contributes to the best of their abilities, and those who exhibit particular talents or experiences which they can share with the tribe are highly respected as elders."
 manago_poku.70.a: "I wonder what we could learn from the Loa'Set."

 manago_poku.71.t: "Sa'paomi" #M19
 manago_poku.71.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Sa’paomi’. They tell tales of encounters with the Loa’Set, without whose help they would have perished in the jungle long ago. And they have proven themselves to be adept pupils, constantly innovating new tools and reinventing themselves to better adapt to their surroundings - they truly are a marvel of adaptation. "
 manago_poku.71.a: "May we adapt as well as they do."

 manago_poku.72.t: "Toa Tangaroa" #M20
 manago_poku.72.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Toa Tangaroa’. They are obsessed with the cyclical nature of things, and seek to integrate themselves seamlessly into the great cycles they observe around them. For them, nothing is more abhorrent than the wilful interruption of a natural cycle for one’s own sake."
 manago_poku.72.a: "Should we follow the cycle? Or break it?"

 manago_poku.73.t: "Kamatoi Haeraitou" #M21
 manago_poku.73.desc: "In our aimless wanderings through our verdant home we have encountered another tribe of beings like us yet unlike us at the same time. They call themselves the ‘Kamatoi Haeraitou’. They have adapted to live on the open Titanoflora Savanna by following the migrations of the hinuibeetle herds. Traversing the hostile savanna atop these massive insects, they have learned to guide the animals in any direction of their choosing.  "
 manago_poku.73.a: "Beetles! I love beetles!"

 manago_poku.80.t: "Notes on a Dialogue"
 manago_poku.80.d: "Stories, past from wanderer to wanderer in a fashion that spawns vast distances in the Hinuilands. Messages carved where only a Mechanim would know to look. Words left with a warform too crippled to move, yet insulated enough from marauding Hinuibeasts.\n\nWe may be long-separated from the friends we've made in our journey. But that does not mean we are finished with learning from them."
 manago_poku.80.a: "And every story, message, and word is a gift."

 manago_poku.81.t: "The Lesson of Our Traditions"
 manago_poku.81.d: "The days of our wandering are still in the memory banks of most Mechanim. And yet, those memory banks are now filled with other things too: carving a home in [Root.Capital.GetName] and its surroundings, creating new mechanim with whom to share the years ahead, all the new problems and new possibilities that becoming [Root.GetName] has offered.\n\nPerhaps, some day, our people will not know why they tread in a certain way, or take certain paths through the jungle, or act for certain reasons in the presence of certain stars. Perhaps, when they wonder, a long-forgotten memory bank will be tapped for an answer. But even unknowing, the traditions we forged along our journey will shape us forevermore." 
 manago_poku.81.a: "There will always be something more to discover."
 manago_poku.81.b: "We will never forget the wonder of the world."
 manago_poku.81.c: "However the world changes, greatness is demanded of us."
 manago_poku.81.dd: "Danger is a constant, and we must face it bravely."
 manago_poku.81.e: "The past cannot be forgotten."
