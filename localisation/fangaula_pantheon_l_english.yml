 #Religion Events
 fangaulan_pantheon.1001.t:0 "Beneath The Holy Mountain"
 fangaulan_pantheon.1001.d:0 "Gather round, gather round, and be quiet! Hear the tale of Aro Makaya: half-genie, rebel, father of empires, dethroner of genies, and the greatest hero ever born. Though Aro ascended the holy mountain of Sirik long ago to watch us from the lunar realm of all ancestors, his tales and wonders live on in performances just like this. \n\nPerhaps you’d be keen to recall Aro’s Great Wonders, constructed by the very genies he overthrew and imprisoned? Or maybe I should delight you with Aro’s Ten Tasks of Royalty - travails meted out by God to measure Aro’s worthiness as a stalwart ruler? \n\nNow, which tale shall this humble jelli spin?"
 fangaulan_pantheon.1001.a:0 "The Tale of Aro's Great Wonders."
 fangaulan_pantheon.1001.b:0 "The Tale of Aro's Ten Tasks of Royalty."
 fangaulan_pantheon.1001.c:0 "This Tale is not for today"

 fangaulan_pantheon.1002.t:0 "The Tale of Aro's Great Wonders"
 fangaulan_pantheon.1002.d:0 "Aha, you wish to hear of the remnants of greater times that still grace our eyes; very good! Ahem, thrice strummed, ten hums, a jingling foot to guide, and the tale begins, for despite the onslaught of Deep Devils and wrathful wishes of the Djinn Sultan, Aro Makaya’s mighty wonders stand strong and tall. \n\nLet us cheer for the twelve great totems and their peoples, whose names endure upon Aro’s Pillar, like Grandmother Water Buffalo, Fojara the Great Lion, or Pelican Mother, among many more. Yet for each blessed living totem, we must also lament the fallen, such as selfless Grandfather Donkey, alluring Aunt Gazelle, cunning Uncle Baboon, the wise Frigate Bird Oracle, or loyal Brother Hornbill. \n\nAh, but with how prominent Aro’s Pillar is in story and song, you’d be forgiven to think it the only of his grand designs – but no! To the north of towering Junansuar, at the heart of the fertile plains of Fangaula, lies majestic Atijo Sigilan, the old capital where Aro ruled the peoples of Fangaula freed from djinn oppression. His palace, erected by golems powered by the very genies that oppressed us, remains a vibrant wonder even after millennia. Although the opulent throne makes kings and khet alike blush, the greatest treasure is this: if you whisper a prayer in its halls, guidance befitting Aro’s wisdom just might echo back. \n\nI cannot ignore the wonder of Aro Bugu, the place where Aro was born to his human mother Ghozan and a ring-bound Dao. Vengeful djinns obliterated Aro’s original village, but a humble shrine housing Aro’s magic walking stool still survives: few can say why the tyrants spared it while razing the rest. Despite its unassuming architecture, the shrine reminds us that greatness comes in many, often humble visages."
 fangaulan_pantheon.1002.a:0 "We still marvel at his craft."

 fangaulan_pantheon.1003.t:0 "The Tale of Aro's Ten Tasks of Royalty"
 fangaulan_pantheon.1003.d:0 "Aha, you wish to hear of the trials that hasten our hearts; a crowd favorite! Ahem, thrice strummed, ten hums, a jingling foot to guide, and the tale begins on a night long ago. \n\nOne night, the moon, that sky-shy land of the dead, drifted close to Aro’s balcony high above Atijo Sigilan. From the lunar portal, a voice said: “Half-genie, son of Dao and human, blessed by my stewards, the elemental animal totems: I am the kiln, I am the start, I am God. For the first time in a long, long time, I have seen my creations free thanks to you, yet before you sit atop the throne, you must complete ten tasks of royalty, lest you repeat the genie’s fatuity.” \n\nAro Makaya pledged to complete these, and so the dead creator issued the “Tasks of Prowess”. He used his experience, talent, and gifts to conquer each in succession, such as defeating any warrior who challenged him for a lunar cycle, shadowing Fojara among the plains, and slaying the terrible kadda Decay-Fever. Despite his successes, Aro struggled against Petals-of-Fate, a vexing aziza lordling who dodged like lightning and weathered blades and spells like rain. Only after finally uncovering his foe’s secret flaw, a weak constitution, did he overcome him in an endurance feast by serving a soup seasoned with the vile kadda Decay-Fever’s bonemeal. Petals-of-Fate regretted their pride after a single spoonful, disgorging both meal and mischief and entering into the service of the victorious Aro. \n\nHappy with Aro’s progress, God delivered the “Tasks of Ego”. Aro flew as a sandstorm, counting every corner of Fangaula. Then, he used his half-genie endurance to bathe in the volcano Junansuar’s burning magma. Purified in earth and fire, he begged his smallest subject - a grass mouse - for its blessing with every trick he dared. The mouse, unimpressed by wealth, magic, or knowledge, answered only to the morsels of his palace kitchen. And so Aro grew wise. .\n\nThe last three tasks deal with the true character of power and royalty, such as the chaos of Kaino, the weight of authority, and a mystery that none – not even I – know of! Perhaps if you or I earn enough glory, God, Aro, or one of the animal totems might challenge us with tasks all our own?"
 fangaulan_pantheon.1003.a:0 "Perhaps our leaders could learn a thing or two from these feats."

 fangaulan_pantheon.1004.t:0 "Narrow Corridor of Dreams"
 fangaulan_pantheon.1004.d:0 "Droplets echo through the dim and spiraling cavern hallways of the Oasis of Water Dreams. An ancient subterranean complex in Rostgrax, the temple lionizes gods and heroes great and small, but one statue stands prouder and taller than all others – Biakata. \n\nStark and fierce, the air planetouched Empress’ stony visage looms beneath the very ceiling, threatening to rise again and reform her fallen Second Fangaula Empire. But the water drops continue echoing.\n\nTwo stone slabs resting on her shins like armor plates recall the Mukarron heroine’s conquests, awe-inspiring use of opportunity and superior tactics, and feats of statecraft and lawmaking that outlived her Empire. \n\nA band of pilgrims and priests gather before Biakata, reciting the..."
 fangaulan_pantheon.1004.a:0 "Tale of Biakata's Conquest!"
 fangaulan_pantheon.1004.b:0 "Tale of Biakata's Empire Building!"

 fangaulan_pantheon.1005.t:0 "The Tale of Biakata's Conquest"
 fangaulan_pantheon.1005.d:0 "The tale in mind, the priests hum, reciting the opening passages, painting the image of a sweltering gale scorching a vanquished and defeated people. \n\nGnoll packs had enslaved her tribe before her fifth spring, and from her earliest memories, Biakata only knew the heft of manacles and the lash of the whip. Eventually, the young Mukkaron girl manifested nascent planetouched abilities, and, despite her captors teasing her ultimate purpose to be as a gusty ignition for a demon pyre, her elemental fervor shaped her mind, body, and soul into a torrent of freedom and liberation. Growing into a charismatic warrior-slave with potent wind magics, she captivated human and gnoll alike before leading a united host to overthrow the gnoll matriarch. With her enslavers dead or deposed, the rasping breeze became a raging gale. \n\nBiakata spared no time in uniting the West Salahad, turning a single pack of former slaves and masters into an indomitable whirlwind of gnolls and humans that cheered and cackled her name with awe. Casting her eye beyond the dunes and savannas, Biakata marched south, conquering the largest Binwarji kingdom of Mokatanga with the help of Dendugma steel. Alarmed, the remaining splinter Binwarji kingdoms attempted to stop her advance at the Hundred Islands Battle in 374 AA. Arrayed against a vast coalition of eight tribes, Biakata entreated a mighty water elemental to divert a segment of river, turning the flooded drylands into a hundred islands. Her foes divided and hopeless, Biakata’s army struck, scattering the last meaningful resistance to her ascent. With her domain forged, she proclaimed an empire reborn – the Second Fangaula Empire. And thus the raging gale became a mountain-felling hurricane; for the rest of her reign, the planetouched Empress ruled as mistress of the known world."
 fangaulan_pantheon.1005.a:0 "Onwards in her name!"

 fangaulan_pantheon.1006.t:0 "The Tale of Biakata's Empire Building"
 fangaulan_pantheon.1006.d:0 "The tale in mind, the priests hum, reciting the opening passages, painting the image of a zephyr wind grinding mountains into crags and valleys. \n\nWhen the last of Fangaula’s twelve tribe leaders set their spears into the ground at Tannifila Oka, Biakata smirked from her cloudy perch, awash in glory and filled with pride for her conquests. But then the sun set and rose and set again, turning this day of triumph into an innumerable procession of days. The mighty Biakata’s unbindable will waivered, fearful of what future challenges her empire would face. Her stalwart army and allies, comprising human and gnoll desert dwellers, soured as zealous warriors and disgruntled wanderers were forced to rule over the sedentary people of these lands. What good was a Second Fangaula Empire for their lot? And her former foes? They tended to their wounds, counted their spears, and chafed under Biakata’s elemental cult of personality: a wounded beast lurking for its moment to pounce again. Biakata saw the fate of her old oppressive gnoll matriarch flash before her eyes and endeavored to firmly bind that which would otherwise fall apart in time. First, she granted her wilderness supporters important roles along the Empire’s fringes: patrolling borders, guardian caravans, and relaying messages across Fangaula’s length. To the myriad tribes, the air-touched Empress shaped her court like a monsoon, distracting each tribe with seasonal boons and titles to divert her opposition’s resistance and redirect their ire unto themselves. And finally, to stop any hopeful planetouched from emerging out of the dust of the unknown, Biakata established a holy sect, called the God Atoners, to locate, sponsor, and turn young planetouched into loyal supporters of her realm and dynasty. Thanks to her great political acumen, Biakata laid the foundation of an empire that would stand for nigh on a thousand years."
 fangaulan_pantheon.1006.a:0 "Bow before your [Root.Monarch.GetTitle]!"

 fangaulan_pantheon.1007.t:0 "In The Heat Of It"
 fangaulan_pantheon.1007.d:0 "Gather closely around the forges, and listen to my tales, if you can bear the heat! I will sing as loudly as you please, but we are sure to be drowned out by the roars of the great forges of the Dendugma Monastery regardless, where the Ironwood of Fangaula is shaped into the famed Dendugma Steel. But of all the forges of Dendugma at which the forge priests gloriously labor, the greatest of all blazes deep within the bowels of the monastery. Even the forge priests do not go there, for it is the forge of Mojobaa himself. \n\nAs we are enveloped by the hot air of the forges so far below, I will sing to you a song of the source of their heat. We are closer here to Mojobaa, who is forger and forge both, than in any other place in Fangaula, but do not forget that wherever we are, we live among his creations and must give thanks to him for our creation ourselves. \n\nWhat song shall I sing, here among the forge priests? The tale of the great forge of the world, or the tale of how men and women came to be?"
 fangaulan_pantheon.1007.a:0 "The Tale of Mojobaa's Great Forge!"
 fangaulan_pantheon.1007.b:0 "The Tale of Forging the Mortar and Pestle!"

 fangaulan_pantheon.1008.t:0 "The Tale of Mojobaa's Great Forge"
 fangaulan_pantheon.1008.d:0 "In the very beginning, there were only two creatures in the world: God and his brother, the anti-God. God wished to create, and his brother wished to unmake, and so from the first moment there was conflict between them. \n\nGod made, and his brother crept behind him and seeded imperfections in his works. God made again, more carefully, and his brother found new ways to corrupt. And so it went, each creation more labored than the last, until at last God turned and fought his brother directly. \n\nThe battle was fierce and long, and when it was over, something strange had happened: the anti-God had shattered. Where once there was one, now there were many. Each fragment was a lesser darkness, but darkness still. And these anti-Gods could not be destroyed just as their father could not be destroyed, and so God did the only thing he could: he sealed them away together in the deep places of the world. \n\nBut the fighting had been fierce, and God's creations were in ruin. So God began again. He took the raw stuff of the earth and sculpted us with loving hands. Then he brought each piece to the fires of Mojobaa. And Mojobaa swung his great hammer and his fires blazed, and life coursed into each of those pieces of clay with a love that only he could provide. In this way the world was populated with many wondrous things. \n\nAnd God's elder creations helped him in this work. They sealed the anti-Gods away into the elements, driving their darkness into the deep places so that life might flourish above. And for a time, everything lived perfect and unchanging, warmed by the heat of Mojobaa's fires. \n\nFor a time."
 fangaulan_pantheon.1008.a:0 "In these hammers, flows your spirit"

 fangaulan_pantheon.1009.t:0 "The Tale of Forging the Mortar and Pestle"
 fangaulan_pantheon.1009.d:0 "Look, over there! In the far corner of the crowd, where they thought this old jelli would not notice them or sing of them, are a young man and a young woman doing what young men and young women do. How fitting this is, that they give thanks to Mojobaa in this place where Mojobaa’s fires blaze hottest. I will sing you the tale of the mortar and pestle. It is a tale of Mojobaa the Great Forge, it is true, but it is just as much a tale of ourselves and our origins. \n\nIn the days after the death of God, the genies ruled over heaven with an iron fist, and the land that once belonged to all the people became theirs alone. But we must give thanks for one thing: the genies needed servants and slaves, and so they kept us alive as their playthings. But there were not many of us, and the genies knew not how to make more. So they went to Mojobaa the Forge of God, who it was said could make anything. \n\nMojobaa grieved his creator. But grief had not burned away his kindness from within him, and when the genies made their demand, he saw a crack of light in a dark place. The people suffered, but perhaps they need not suffer in every way. \n\nIn the beginning, there were no men and women: the place between our legs was as smooth as the backs of our hands. So from one type of human, Mojobaa made two: he gave men their pestle and women their mortar, and he made it so they could find great happiness in each other. Something which the genies could never know. \n\nAnd this is why across the lands of Fangaula, when the men and women come of age, they dance around the fire and give thanks to Mojobaa the Forge of God. First as men, and then as women, but then they come together, for the whole is greater than each of its parts. \n\nAlways remember: without a pestle a mortar is but a bowl, and without a mortar a pestle is but a stick. But together they can make the most wonderful things."
 fangaulan_pantheon.1009.a:0 "With this you are reborn anew!"

 fangaulan_pantheon.1010.t:0 "The Eternal Flame"
 fangaulan_pantheon.1010.d:0 "Come one, come all before the eternal flame of Fojara the great lion! We will sing his songs, and we will dance around the flame as we please, and we will never be burned, for Fojara would not harm the people of Fangaula. Look now at the way the beasts and the pilgrims both bow to the flame: this is the tribute paid to a protector, not an overlord. \n\nI will sing whichever tale you like. I may tell you why Fojara, the king of beasts, is renowned for his great courage. I may tell you of Dulugu the Hungering Lion, Fojara reborn. You need but choose and I will play my lute with all my skill to make the glories of Fojara come to life again. In his honor I could do no less."
 fangaulan_pantheon.1010.a:0 "The Tale of Fojara's Great Bravery."
 fangaulan_pantheon.1010.b:0 "The Tale of Fojara's Rebirth."

 fangaulan_pantheon.1011.t:0 "The Tale of Fojara's Great Bravery"
 fangaulan_pantheon.1011.d:0 "Today we do not sound the drums of battle: we sound the drums of peace. I play the drum and sing to you the jelli's tales of Fojara, bravest of lions and king of beasts. The drums are at peace today, but it was not always so. Once the drums beat out as Fojara battled against the first of his wives, and on this peaceful evening I will now tell you of this time of war. \n\nGoxma the hyena was once the first of Fojara's wives, and their union was stronger than any the lands of Fangaula had seen. But there came a day, after the genies had been toppled from their ill-gotten thrones, when Fojara and all the totem animals sought to reassemble the corpse of God, so that he would return the world to the pristine state it was meant to be in. When God remembered, nothing would ever change or grow again: not the fruits, not the trees, not the love between a lion and a hyena. And Goxma grew afraid. \n\nShe defied both Fojara and fate itself to prevent God's rebirth. Using the power of the corpse, she banished both genies and totem animals from our world. But her actions, as Fojara had feared they would, spread chaos and evil from beyond the stars across the world. He saw the spreading horror, and he knew what his first and most beloved wife had wrought. Fojara grew afraid, but he knew that something had to be done. And so, with a heavy heart and the help of Aro the king of the gods, Fojara bound Goxma to the realm of the totem animals, where she is still bound. \n\nHe visits her each month, for he must devour her before she grows strong enough to slip her chains. And each time he does, he must reach deep within himself to find the bravery he found so long ago. It does not come easily, and it never has, and it never will."
 fangaulan_pantheon.1011.a:0 "We carry your bravery into battle!"

 fangaulan_pantheon.1012.t:0 "The Tale of Fojara's Rebirth"
 fangaulan_pantheon.1012.d:0 "Listen. There is a newborn child among us today! The hearts of the jelli swell with joy when we hear a child’s cries, for each soul carries something special within it. I will give this young babe the welcome to the world he deserves. Let me tell him the story of Dulugu, Fojara reborn, and the rest of you may listen as well if you like. \n\nDulugu was born to the Ndurubu many years ago, and his tribe knew that he was something special from the moment he was born, when he walked and talked as soon as he slipped from his mother’s womb. The elders of the tribe made him leader, and the young boy Dulugu sat upon the chieftain’s throne with straight back, scepter in hand, and the burning eyes of a king-to-be. \n\nThe Ndurubu tribes in those days were many but divided, and spent more time warring among themselves than achieving glory for their people. But Dulugu changed this in but a year—in the dry season he rode to each of the forty-four tribes of the Dulugu. He rode not as a conqueror but as a unifier, for in the wet season that year all the chieftains of the Ndurubu gathered in the meeting place. They granted Dulugu rule over each of their peoples for the greater glory of all. This is how Dulugu became king of the Ndurubu, who called him the Hungering Lion. \n\nAnd the boy-king then rode with his people at his back. They rode to the north, to the west, to the lands of the Binwarji, and to many more lands besides. All the world gave him tribute in metal and cattle, and Dulugu ruled wisely upon his throne for many, many years. \n\nEventually, the time came when Dulugu, Fojara reborn, had to leave the Ndurubu once again. But as his final gift, he gave his people a prophecy. We know that one day a great hero will come, and he will perform many great deeds, and reunite the Ndurubu with the great lions. Dulugu has told us so. \n\nA pyre blazes in the lands of Fangaula where Dulugu was born. It is the pyre we sit before now. Look into the flames of the pyre, young babe, and Fojara might just look back."
 fangaulan_pantheon.1012.a:0 "In his place, more heroes will come!"

 fangaulan_pantheon.1013.t:0 "Fields of Bronze"
 fangaulan_pantheon.1013.d:0 "Three is a number of great power, and here at the Bronze Temple I will sing you a song of three. I will sing you the tale of the Ujun Sisters, who once lived in the land of the gnolls. They are the crone, the matron, and the cow. The three of them still watch over the cattle herds of Fangaula and all those who tend them, for they are the mothers of the cattle. \n\nA mother’s love and a mother’s mercy both hold power beyond my humble songs, but I shall sing for you all I know anyhow. Which tale shall I speak of today?"
 fangaulan_pantheon.1013.a:0 "The Tale of the Ujun Sisters' Kindness."
 fangaulan_pantheon.1013.b:0 "The Tale of the Ujun Sisters' Sacrifice."

 fangaulan_pantheon.1014.t:0 "The Tale of the Ujun Sisters' Kindness"
 fangaulan_pantheon.1014.d:0 "What a bounty we have before us today! Yams, meat, and bread: life is good in the lands of Fangaula. And it is only because we have such an ample feast that I will sing to you of hunger, and my words will remind you to show respect for all those who have starved. \n\nThe land was once stricken with drought. The people danced and prayed for rain, but the skies did not hear their pleas. The crops died, and the people began to die with them. Brother turned against brother, all for a mere scrap of food, and doors were bolted against neighbors. \n\nThen the people thought to wake the Ujun Sisters, who were said to slumber in times of famine. They went to the plains and beat their drums and screamed until their voices broke, and the sound of their desperation echoed across the barren land. \n\nThey thought they had not been heard. They thought they had been abandoned. But then the last famished calf—almost too frail to stand—wobbled into the middle of their circle. It looked out at them with eyes full of wisdom and kindness, and it began to grow into a hale and healthy cow. One cow became two, two became four, four became eight. \n\nThe people ate their fill and were no longer starving. But they had lost more than food in those dark months. Women had lost the children they carried. New marriages had begotten no children at all. And now the second sister moved among them unseen, and those losses were undone: For every woman who wished for a child found one coming. \n\nThen the rains came. Not the thin rains of an ordinary season, but rains that soaked the earth so deep that seeds pushed up through the mud, almost as if they were planted. Everywhere the people sowed, the land answered. \n\nAnd for many years after, the grateful people ensured that the shrines to the Ujun Sisters overflowed with milk and meat."
 fangaulan_pantheon.1014.a:0 "We have the Sisters to thank for a great harvest!"

 fangaulan_pantheon.1015.t:0 "The Tale of the Ujun Sisters' Sacrifice"
 fangaulan_pantheon.1015.d:0 "In the jungle that provides for us, it is easy to forget how hard life can be elsewhere: to forget the gnolls, and hunger, and flight. And yet we must be grateful for those who suffered yet prevailed. I will sing to you of the Ujun Sisters, and the hardships they endured, and how they saved their people. \n\nThings were peaceful for them and their kin, until the gnolls invaded. They had nowhere to go but away, and so the Ujun Sisters led them far from their ancestors’ lands. Their journey was full of hardships: monsters, demons, and ogres hungry for flesh. \n\nIt was to one such ogre that the second sister lost her life. \n\n'My stomach rumbles,' the ogre cried. 'Give me something to eat, or I will make a meal out of you!' \n\nThe people had no food to give and began to weep. But the second sister was clever and kind, and she volunteered herself. She ate the red berries that her people knew never to touch, and let the ogre take her. And thus the poison that ran through her ran through him too, and the ogre was no more. \n\nThe people went on, still hungry, until the third sister found a wishing-bracelet. She wished with all her heart for cattle to feed the people. But the djinn bound within was evil, and so he granted her wish by twisting her into the form of her own beloved cow which the gnolls had killed. \n\nThe first sister searched for her, and found only a cow. Not enough to eat, but perhaps enough to move the gods. She brought it before an altar, and as she made her sacrifice, the dying animal looked up at her with her sister's eyes. \n\nThe first sister had nothing now, and fell into grief. She turned her knife on herself, but before she could sink it into her heart, a miracle unfolded before her. The third sister rose as a goddess of cows, and from her mortal remains hundreds of cattle sprung forth; enough to feed the people. And from the second sister's death came new life, and she rose as the goddess of childbirth. \n\nThe first sister led the cattle back to her people, and guided them to their new home, and taught them to farm the land. And when she died in time, she rose to stand beside her sisters. They now guide the people as mother of cows, mother of beauty and mother of the sickle."
 fangaulan_pantheon.1015.a:0 "A great sacrifice begot a great blessing."

 fangaulan_pantheon.1016.t:0 "At The Riverbank"
 fangaulan_pantheon.1016.d:0 "We gather now by the river, but its roaring current will not harm us! We all, each one of us, are under the protection of Makan, beloved of the griots and walker of the rivers. This is the place where escaped slaves cast off their chains into the river, and are born anew, free and cleansed. And there is no better place than this to hear the tales of the River-Child and the great victories she won, because her clever words and her wondrous drumbeats flow around the people the same as the current of the rivers. \n\nListen now, one and all, to the tale of Makan, the freer of slaves. I will tell you a tale filled with her impish glee. I will tell you…"
 fangaulan_pantheon.1016.a:0 "The Tale of Beating Drums."
 fangaulan_pantheon.1016.b:0 "The Tale of the Match of Wits."

 fangaulan_pantheon.1017.t:0 "The Tale of Beating Drums"
 fangaulan_pantheon.1017.d:0 "Huddle close, and listen to my song! The drums may sound like thunder, but you need not be afraid: Makan River-Child watches over all her riverbanks, and even now she protects us, just as she protected her people so many years ago. \n\nI sing of the sieges during the days of the Twin Xhaz, when the people of Fangaula were trapped within their great forts. The gnolls had come down from the east, and they threatened to turn all of us into their slaves, who would be scattered across the plains of Janama like the wind. Yet they did not reckon on Makan! \n\nThe elders were trapped in our forts too, and they held a great council to discuss surrender to the gnolls. The people were starving, and the elders said to one another, ‘Is it not better to live as a slave than die as a husk? We must not think of our pride, but our people. It is to save our starving, forlorn people why we now surrender.’ \n\nBut then into the room of council strode Makan, and she bore her drum. Such things were not done. But the elders no longer had the energy to care—until Makan began to bang her drum. \n\nThe drum of Makan had a great magic within it, and it worked on the sad hearts of the elders. The pallor of surrender lifted from their hearts, and they began to dance and sing despite themselves. They sang of freedom, and justice, and all the songs that their people had yet to sing! They followed Makan from the room of council. \n\nThe elders went to the people, who watched with fear from their walls at the camps of the hungry, leering gnolls. But Makan’s drum chased away fear just as it drove away sadness, and soon the people were singing too. They danced and sang together, and they forgot their hunger. They sang of the hope of Fangaula, and the roaring floods of the rivers which would sweep away the gnolls. \n\nAnd the river heard their calls, and soon the siege was broken."
 fangaulan_pantheon.1017.a:0 "Our hearts beat in the rhythm of her drum."

 fangaulan_pantheon.1018.t:0 "The Tale of the Match of Wits"
 fangaulan_pantheon.1018.d:0 "I will sing for you all a great song of chances seized and tricks cleverly played! And if my voice twists around you like one of Makan’s tricks, do not worry: it is naught but a joke played between friends. \n\nThere are certain manners that must be observed in the court of the gods. But Makan River-Child had never been one for manners, and in the court of the gods she sang all the songs she pleased. \n\nIt one day came to be the case that Makan’s manners undermined the noble bearing that was required of a king. She sang of Aro, and how he never relaxed and was never any fun. And so Aro said to Makan in the court of the gods one day, ‘Makan, you know nothing of what it is to be a god. What little wisdom you have is taken up by your endless talent for japes and songs. There is one of the gods who is wisest of all. I banish you from this court, and order you to go to Kanhati the Black Antelope, he who knows of death.’ \n\nMakan was no lover of authority, but Aro was the king of the gods. And so she went. \n\nAnd when she reached the house of Kanhati, he was there to meet her. And he said to Makan, ‘The river is lively, but the lake is serene. If you are of water, be of the lake.’ \n\nAnd Makan responded, ‘Kanhati, you forget that the lake is stagnant, and the mosquitoes lay their eggs on its water. The river is joyous, and it gives the people life. It is you who must learn something of the river.’ \n\nAnd Kanhati responded again, and the trees grew and died and grew around them again, and still Makan and Kanhati continued their war of wits, and deployed their words as soldiers on a battlefield. \n\nUntil eventually, Kanhati the unchanging changed. He bowed to Makan, and he said, ‘You have taught me that I know nothing, and you have much to teach me, for a lake must accept new rivers and tributaries lest it becomes stagnant.’ \n\nThus Makan went back to Aro, and she continued to sing her songs and play her drum the same as she always had, but now at the great table of the gods, Kanhati hummed along. And Aro the king of the gods shook his head and said to himself..."
 fangaulan_pantheon.1018.a:0 "It is what it is."

 fangaulan_pantheon.1019.t:0 "Beneath The Spire"
 fangaulan_pantheon.1019.d:0 "Tonight we gather by the shores of Lake Kuiziva, and look across the waters to the spire of Kanhati. This is his home, but do not expect him to greet us: he is very busy with his work. It is Kanhati the Black Antelope, he who once protected the Kaino, who guides each of our ancestors to their rest. \n\nIt is past this very spire that we all will walk when we die, holding the hand of Kanhati, the god of wisdom. The songs the jelli sing here are not happy ones, for death is not a happy thing, but it is in the world regardless. \n\nI will now sing for you a song of Kanhati the wise, eldest of the gods. We must choose the song we are to sing tonight, and I will sing it as best I can. As I sing to you, look at the moon which hangs above us reflected in the waters. For the ancestors are looking back at us from their place of rest."
 fangaulan_pantheon.1019.a:0 "The Tale of Guiding God's Soul to Rest."
 fangaulan_pantheon.1019.b:0 "The Tale of Kanhati's Poem."

 fangaulan_pantheon.1020.t:0 "Tale of Guiding God's Soul to Rest"
 fangaulan_pantheon.1020.d:0 "It is a beautiful day today! We are blessed to walk with the rich soil beneath our feet. But we must enjoy each of these days as they come, for one day each of us will no longer feel the sun upon our faces, and Kanhati the Black Antelope will come to guide our souls on. Let me sing to you a song of how this came to be. \n\nOnce, all things were unchanging and eternal. The totem animals and all the people lived in peace, and wanted for nothing under the watchful eye of God and his primordials. Antelope lived among the people in those days. \n\nBut there were forces of darkness and death beyond God’s power, and one day they burst into the world. God sent his primordials to defeat them, but the powers of darkness tricked the primordials into giving birth to the djinn, who killed God and sent the world into turmoil. \n\nGod was the first to die, but in his dying breaths he called to his two most faithful servants, Antelope and Hyena. God commanded Hyena to eat his corpse, and steward the dark magic in his soul. But God gave Antelope a far more daunting task. When the people died, as God knew they would, he entrusted Antelope with the duty of guiding each of their souls far from the earth to the moon, which hangs in the sky even now as the realm of the ancestors. \n\nCrying tears of anguish, Antelope agreed. He took up the light magic of God, and became Kanhati the Black Antelope. His tears hardened into a ruby mask about his face, and in his first act of duty Kanhati laid God’s soul to rest. And this is why we say of the dead..."
 fangaulan_pantheon.1020.a:0 "May Kanhati guide their souls."

 fangaulan_pantheon.1021.t:0 "Tale of Kanhati's Poem"
 fangaulan_pantheon.1021.d:0 "Not all songs I have to sing are about happy things: some are songs of terror. But you need not be afraid, because the jelli know that for every song of terror there can come a song of redemption. I sing of redemption to you now. \n\nIn days gone by, Kanhati watched over the Kaino, and made sure the rain fell on their fields and the sun warmed their backs. But that all changed when the Kaino fell under the sway of evil, and began to use the souls of their ancestors for selfish means. They disrupted the cycle of life and death and defied the law of the gods. Their cruelty and pride knew no bounds. \n\nKanhati the Black Antelope was a god of death, but he was a god of death justly received, and he recoiled with horror at the actions of his people. He tried to warn the Kaino that they disrupted a crucial balance, but they closed their ears to Kanhati, and he fell into despair. \n\nBut in his sadness, Kanhati found the words to express all he felt, and he wrote a great poem about the way things should be. It fit on a tablet but had all the soul of all the oceans, and Kanhati returned to the Kaino to give them this one last gift he had for them as their patron. \n\nHe first gave his poem to the leader of the Kaino, whose eyes glowed a terrible green and who was borne about his palace by servants who should not have been. The man read Kanhati’s poem. Then he set it down, and he wept, and he could not say why. \n\nThe poem spread across the lands of the Kaino like a fire burning through dead wood, and everywhere it reached the Kaino repented. Kanhati was glad that the Kaino had seen the error of their ways, but he could not watch over a people who had done such vile things, not even a people redeemed. \n\nSo he disappeared into the jungle, and the wails of the Kaino did not convince him to return. The Kaino went into the jungle in their sorrow, and they live there still. They live in peace with the animals and they kill nothing, all in the hopes that Kanhati will return to them."
 fangaulan_pantheon.1021.a:0 "Perhaps someday he will."

 fangaulan_pantheon.1022.t:0 "In The Heart of The Bazaar"
 fangaulan_pantheon.1022.d:0 "Sit, weary travellers, sit! I will sing you a song as you eat the fruits and sip the drinks of the market, and because this is a sacred place I will charge you nothing to listen. For even among all the buying and selling of the market, even though I need food as well, some tales should be told freely, as a gift from one heart to another. This is the city that Kunolo, the chosen of Mother Pelican, built in their cleverness, and it recognizes that everyone needs a place to call their home, even the nomads and the wanderers of the world. \n\nI am such a wanderer, and yet I have come here, and I can only give thanks to Kunolo for creating this place to rest my weary bones. It is good to be a jelli, in the city of Kunolo! Yet everywhere they go jelli have songs to sing, and even with my feet propped up I cannot escape this sacred duty. Today, I will sing to you all a song of Kunolo, and you may choose freely which one it will be."
 fangaulan_pantheon.1022.a:0 "The Tale of Kunolo's Greatest Deal!"
 fangaulan_pantheon.1022.b:0 "The Tale of Kunolo's Life and Deeds!"

 fangaulan_pantheon.1023.t:0 "Tale of Kunolo's Greatest Deal"
 fangaulan_pantheon.1023.d:0 "Pick up the rugs, and look at the dirt. Useless, isn't it? Dry and dusty, good for nothing. Or so you might think. Kunolo didn't think so. Today I will tell you the story of Kunolo Deal-Maker, and the greatest bargain ever made in all the lands of Fangaula. \n\nIn the days before the city was founded, Kunolo wandered the lands of the violent Jiromji tribes. Trade flourished wherever they went. Not out of goodness, mind you, but because Kunolo was never foolish enough to leave money on the table. \n\nOne day, Kunolo came across a mighty chieftain's great herd of cattle, drowning in a river they had attempted to ford. Kunolo shouted for help from the nearest village, and everyone banded together to build a bridge of pontoons, and the cattle were saved. The chieftain, arriving to find his herd alive on the far bank, was overcome with gratitude and offered Kunolo anything they pleased. \n\nWhat Kunolo pleased was land enough to build a city. But the chieftain loved his land, so Kunolo reached down and pinched a tiny speck of dust from the ground. 'My mighty king, I wish only for this—that each day I may have twice the dirt I had the day before. If you grant me this, I shall be content, for I am trying to build myself a home.' \n\nThe king laughed, imagining a mudbrick hut, and agreed. \n\nThe specks became handfuls. The handfuls became armloads. The armloads became mounds, then hills, and soon the king found he could not move what he owed—and was forced to give land instead. When at last the debt had grown to the size of a city, Kunolo released him from it, and the king, grateful and somewhat wiser, gave Kunolo the materials to build that house they had spoken of. Kunolo built their house. And around it grew a mighty city. \n\nAnd the king was never quite so quick to shake hands after that."
 fangaulan_pantheon.1023.a:0 "Keep your wits if you make a deal, lest you lose more than them."

 fangaulan_pantheon.1024.t:0 "Tale of Kunolo's Life"
 fangaulan_pantheon.1024.d:0 "Looking out on Fangaula, it is hard to imagine a time when the gods were not gods. But there was only one God in the lands of Fangaula who was born divine, and he is dead now. So all the gods have tales of their lives, and it is a tale of life I will sing for you now. I will sing of Kunolo, and the travails that led to the founding of the great city of Kunolo and its many peoples. \n\nKunolo was born in times of war, in the ruins of a city they would one day refound. The halflings of Fangaula were washed away when the tidal wave of humans fleeing the Deep Devils crashed upon them, and their fabled beehive-cities were no more. But Kunolo was fortunate, as they were found and raised by a human couple as their own, as if Kunolo was merely a short human. \n\nAnd Kunolo had a happy childhood, but one day it came time for them to strike out. They travelled the shores in the spirit of commerce and discovery, and brought what peace they could to the warring lands of Fangaula through clever deals. But all the while, it gnawed at them that the place they were born in and where they lived with their human parents was left in such a state. So they returned, and made of those ruins the thriving city in which we stand now, as I tell you the tale of Kunolo, favored of Mother Pelican. \n\nAnd across the lands of Fangaula and Horashesh beyond, there were people who needed a place to live, and the city of Kunolo needed people to fill it. The fall of the Fangaulan Empire had brought great ruin upon the land in its death throes, but in the city of Kunolo there was peace, so halflings and humans alike rushed to seek shelter here. \n\nAnd even the lizardfolk needed a place to live. For these were the days of the wretched lich Kaino and his creations, and the homes of the lizardfolk had been destroyed by Kaino’s hordes. Thus they came to the city of Kunolo, and its people were afraid, for they thought that the lizardfolk were creations of Kaino. But Kunolo knew that they were not, and the lizardfolk entered the city and from then on had a place to raise their hatchlings. \n\nKunolo lived on, and Kunolo’s spirit grew larger and larger, until at last even the great city could not hold them. So they died, but not because they could not hold onto life. Instead, it is because life was not enough for Kunolo, and godhood and dominion over trade and peace beckoned."
 fangaulan_pantheon.1024.a:0 "Ah, to be even half as clever as Kunolo!"

