l_english:
 S37_a_worthy_successor_title:0 "A Worthy Successor"
 S37_a_worthy_successor_desc:0 "Such great feats Uwimbabazi has performed in the short time she has been our Ingo! She deceived the Dakinshi horde and destroyed vile Shalazar! She has led Swift Legged Bongo to primacy among the Tanizu, and she is poised to perform even greater things in the future!\n\nBut still, she only grows older with each passing day. Up until now, she has avoided all questions of succession. We pity the soul that has to follow in her footsteps, but someone must still follow her. Uwimbabazi has recognized this, and has put out a missive: all who believe they have what it takes to one day succeed her may come to argue their case. Our Ingo will hear them, and the best among them will be chosen. We wish them luck, as the Lady of Drums’ standards are very high indeed."

 S37_dissenting_voices_title:0 "Dissenting Voices"
 S37_dissenting_voices_desc:0 "“In Gylizir, they call me a tyrant. Right here in Rom ra God, they call for me to abdicate. The useless would-be successors I told to scarper have undertaken a campaign of rebellion and slander against me. Is their skin so thin and their loyalty to me so brittle that one single slight to their competency pushes them to revolt?”\n\n—Uwimbabazi, the Lady of Drums"

 S37_mothers_love_title:0 "A Mother’s Love "
 S37_mothers_love_desc:0 "“Look at Uwimbabazi—something has changed within her. Do you see how she stares at that statue of hers? I tell you, she’s not in her right mind."\n\n“Your words border on insubordination! Watch your tongue!”\n\n“I’m telling you! They say she coddles it as one would a babe! She may be the greatest leader our tribe has ever seen, but still she has grown old!”\n\n“Shh, here she comes! Keep your gaze steady. Betray nothing, lest you face her wrath…”"

 S37_in_future_title:0 "In Future"
 S37_in_future_desc:0 "[Root.S37inFutureCustomLoc]"
 S37_in_future_before:0 "“The only constant in the world is the changing of the cycles. To presume anything else to be certain? That is true folly.” - Uwimbabazi, the Lady of Drums"
 S37_in_future_after:0 "We have naught but this silent statue. Where do we go now?"

 S37_a_new_city_title:0 "A New City"
 S37_a_new_city_desc:0 "When we conquered Shalazar, its past glory could only be imagined. The crumbling buildings, dilapidated bridges—we could hardly imagine this city once served as the capital for dozens of Lizardfolk empires.\n\n"

 S37_second_deception_title:0 "The Second Deception"
 S37_second_deception_desc:0 "Shalazar—those arrogant fools! In our weakness, they thought they could snatch up the border tribes and escape our notice. Well, we have certainly noticed, and we will not let this slight stand! We will bring these lost tribes back under our protection and assert control over this ancient city of theirs in one fell swoop!\n\nA direct engagement, however, would be unwise—we lack the forces for such a blunt approach. As she always does, Uwimbabazi has a cunning plan. Those witless lizards probably think the Dakinshi fools for falling for such a ‘simple trick’ as the Lady of Drums orchestrated previously. They will not see their doom coming—the jungles will be silent, until the day we strike.\n\nLet us send messages to the tribes held in Shalazar’s sway. Secretly, of course…"

 S37_shalazars_shadow_title:0 "Shalazar’s Shadow"
 S37_shalazars_shadow_desc:0 "Shalazar has been the capital for a great many of the lizardfolk empires, but looking upon it now, one would never know this. The stonework crumbles, the population declines, and even the ancient spire shows signs of wear and tear. We may have taken the city, but its population still resists us. They cling to their traditions and decry us as conquerors. Something will have to be done about this."

 S37_soothing_melodies_title:0 "Soothing Melodies"
 S37_soothing_melodies_desc:0 "The Anzalkatsa are not the only lizardfolk we share our homeland with. The Ashhana lizardfolk are different—they do not chase the past, instead focusing on their future. Despite the shadows’ curse upon them, they create beautiful songs.\n\nThey are not so different from us. Our Bongo bands have already become welcome visitors in their communities, exchanging techniques and stories and songs. If we patronize them further, perhaps we can help them become a part of something much greater."

 S37_encroaching_swamps_title:0 "Encroaching Swamps"
 S37_encroaching_swamps_desc:0 "The Mengi, our neighbors to the north. A land bathed in blood, not unlike our own. Looking to them is as looking into a mirror, at a twisted reflection of ourselves—but we have risen above them. We have found unity, while they still bicker amongst themselves. This is our strength, and their weakness. We just have to choose where to land the first strike."

 S37_repel_the_bog_title:0 "Repel The Bog"
 S37_repel_the_bog_desc:0 "We have finally repelled the Mengi from our lands, righting a wrong against our people. Still, they loom in the distance, waiting for the opportunity to strike back. So, too, do the trolls of the Shadow Swamp, the baleful cries echoing from beneath the gloomy canopy of their marshy home a constant reminder of the fate that awaits us should we fail.\n\nTherefore, there is only one thing left for us to do: succeed. Succeed at any cost. We must ensure our bulwark never fails, that the swamps never again creep closer to the heart of the Tanizu. Fortification upon fortification will be the only way to keep their cacophony at bay."

 S37_sovereignty_title:0 "Sovereignty"
 S37_sovereignty_desc:0 "We are worthy. We honor the legacy of Uwimbabazi, of all who came together to make the Swift Legged Bongo what it has grown to be— and all it will become. We play again, together, all of us, in a grand harmony. The Tanizu have come together at last."

 S37_sponsor_bongo_bands_title:0 "Sponsor Bongo Bands"
 S37_sponsor_bongo_bands_desc:0 "Among the Tanizu, our tribe has a unique penchant for music. Formed by our most promising musicians, these travelling ‘Bongo bands’ can be found all across the jungle, equipped with a variety of instruments and tamed animals. They are renowned across Ishyamtumu and beyond, and no Ingo would deny that their day is improved by a spontaneous concert from one of the bands. Officially sponsoring the Bongo bands would grant us direct control over where and when they are sent, which may prove useful."

 S37_tame_the_tribes_title:0 "Tame The Tribes"
 S37_tame_the_tribes_desc:0 "Supposedly, the Tanizu within our lands are unified. Some pledged their loyalty freely, the submission of others we paid for in blood. Yet disloyalty claws at the soft underbelly of our supposed unity. A more ruthless people, like the Dakinshi or the Mengi, might quash any thought of rebellion by force.\n\nWe are not those people. No, we are the Bongo. Rather than enforcing a false sense of unity through bloodshed, we will foster true harmony with our Bongo bands. Through our music we will quell their anger, temper their sorrows, and nourish their joys."

 S37_lizards_of_the_lake_title:0 "Lizards Of The Lake"
 S37_lizards_of_the_lake_desc:0 "More crumbling remnants of the lizardfolks’ ancient empires encircle Lake Khusadza, imposing the false order of a bygone era upon our people. We must take stewardship of them, to save our people from this delusional fixation on the distant past, and to show the lizardfolk that they, too, can be a part of our harmony."

 S37_oust_the_traders_title:0 "Oust The Traders"
 S37_oust_the_traders_desc:0 "It is time, now, to turn our gaze to the south. The Baashidi encroach upon our lands, exploiting them for their personal gain. We will remove them, of course, but that is not penance enough for their avarice. With a little bit of subterfuge our shifters can infiltrate their herds and scatter them to the wilds, crippling their cattle industry.\n\nOf course, if these herds were to find their way to Cyamutaka, then it would only be proper restitution for past transgressions."

 S37_accursed_artists_title:0 "The Accursed Artists"
 S37_accursed_artists_desc:0 "Thanks to our efforts, we now enjoy a fruitful partnership with the Ashhana lizardfolk. Tanizu and Ashhana rhythms blend into one, edging ever closer to a beautiful harmony."

 S37_the_remnants_title:0 "The Remnants"
 S37_the_remnants_desc:0 "Even in the wake of Uwimbabazi’s great defeat of the Dakinshi, and her subsequent victories afterward, many Tanizu tribes are still held in vassalage by foreign invaders. Snapped up by the Baashidi, the Mengi, the lizardfolk—our brothers and sisters still cry out for our help!\n\nYet there are still a scant few tribes that have, like us, managed to preserve their independence. It is imperative that we band together—we cannot survive alone. Let us reach out to one of these tribes."

 S37_the_lodges_title:0 "The Lodges"
 S37_the_lodges_desc:0 "Long have we venerated the visage of beasts, the Mongoose, the Leopard and the Elephant. It is the tradition of our people, our very way of life, and what binds all Tanizu together. None know this more than the shifters, those who can alter their form to that of a beast. If we publicly support their lodges, these honored warriors will surely lend us their strength."

 S37_beat_back_the_warlords_title:0 "Beat Back The Warlords"
 S37_beat_back_the_warlords_desc:0 "Where to start with the Dakinshi? They are a dull and repetitive people, striking over and over against the Tanizu like a drummer with no sense of rhythm. They introduce discord into Ishyamtumu. We have repelled their kind once before, and we shall do it again, this time for good."

 S37_sculpt_the_jewel_title:0 "Sculpt The Jewel"
 S37_sculpt_the_jewel_desc:0 "Cyamutaka—the main port of Ishyamtumu. Nothing but rough-hewn stone, for now. We have seen how greatness crumbles to dust, learned the folly of the lizardfolk. We have seen how it can rise again, under our stewardship. We learn still, from the Ashhana, even from the merfolk of the depths. Under the Bongo, Cyamutaka shall thrive.\n\nAll shall know its name: Cyamutaka, Jewel of Ishyamtumu."

 S37_bongo_band_opinion:0 "Bongo Bands"
 S37_bongo_band_sent_tt:0 "We have not sent a §YBongo Band§! to §Y[Root.GetName]§! in the last §Y10§! years"

 ruler_cant_be_war_wizard_tt:0 "§Y[Root.Monarch.GetName]§! cannot lead armies as a §YWar Wizard§!"

 flavor_swift_legged_bongo.1.t:0 "The Beating Of The Drums"
 flavor_swift_legged_bongo.1.d:0 "The Dakinshi had almost defeated us. We had fought so long and hard for our independence, and we were poised to lose it once again. Disunited as we were, we fell, one by one, tribe by tribe. Some, believing they had seen the writing on the wall, submitted willingly. Bah—we spit on their name!\n\nThen, when all hope seemed lost, she appeared, with courage and a cunning plan. A masterful illusion, the greatest deception in history—by the time the Dakinshi realized what had happened, they had already lost. The river ran red with blood, and very little of it was ours.\n\nHer song cannot finish yet, though. From all sides, we are beset by vultures. In this moment of disunity, our siblings have been snatched up by the lizards, the Dakinshi, the Baashidi—scavengers, one and all! With her at our head, however, there will be no choice but for us to succeed.\n\nFor she is Uwimbabazi, the Lady of Drums, and by the time her work is finished, hers will be the greatest song of any age."
 flavor_swift_legged_bongo.1.a:0 "A new time for our people begins."

 flavor_swift_legged_bongo.2.t:0 "Enaction "
 flavor_swift_legged_bongo.2.d:0 "It was under blackest night that Uwimbabazi met with representatives from Shalazar’s vassals. The Ingos of the tribes dared not meet with her directly, lest their defiance be discovered by their overlord. Shalazar had called its vassals to camp near the city for some campaign they intended to embark on, and Uwimbabazi had seized her chance.\n\nIn the distance, Shalazar glowed with the light of an ancient civilization. So soft it looked, so enticing, that Uwimbabazi almost forgot what she was here to do.\n\n“You are sure this plan will work?” one of the representatives said. “It is…impressive magic, to glamour an army on this scale.”\n\n“You are not incorrect,” Uwimbabazi replies. “But I have done it before. It was most effective.”\n\n“But even if your army appears to belong to ours, will they not realize when we continue into the city?” he asked. Uwimbabazi shrugged.\n\n“Eventually, yes.”"
 flavor_swift_legged_bongo.2.a:0 "“But by then it will be too late.”"

 flavor_swift_legged_bongo.3.t:0 "Betrayal!"
 flavor_swift_legged_bongo.3.d:0 "Our subjects have betrayed us and joined forces with their tribal brethren under the banner of Swift Legged Bongo!"
 flavor_swift_legged_bongo.3.a:0 "What madness is this?"
 flavor_swift_legged_bongo.3.b:0 "Not so fast!"

 flavor_swift_legged_bongo.4.t:0 "The Husk"
 flavor_swift_legged_bongo.4.d:0 "The Zatsarya dwarfed every other building in Shalazar. Uwimbabazi stood in its shadow, craning her neck up to see it. The soft constellations etched into its black structure pulsed faintly—evidence of the spire’s inert magic. \n\n“The history this city has,” she said. “The capital of dozens of empires, and look at it now. A decaying, defiant piece of wreckage.” A soldier came up behind her.\n\n“My Ingo,” she said. “The lizards resist us. They do not accept the Cycle, no matter how we try to convince the-” Uwimbabazi shushed her with a glance.\n\n“Of course they do not,” she said. “Put yourself in their shoes. Their city is invaded, their world destroyed, and now they are asked to change their very way of life?”\n\nAround her, the city was in disarray. Buildings lay ruined—the regrettable result of the city’s siege. Lizardfolk picked through the rubble of their homes, scavenging what they could from the dust. A few of them shouted angrily at Uwimbabazi as they passed. Some could not even bring themselves to glare.\n\nUnarmed Tanizu shamans walked amongst the survivors, bringing food and supplies—and with them, lessons. Tales of the Mongoose, the Leopard, and the Elephant. One shaman brought food to a lizardfolk family and was rewarded with a beating before soldiers pulled him away. Another held a lizardfolk child enraptured in his stories, before the child’s parents pulled her away, muttering insults under their breath.\n\nUwimbabazi looked up at the spire again, in silence. The soldier went to say something to her, and she raised a hand to stop her. A beat. Another. Then she shook her head."
 flavor_swift_legged_bongo.4.a:0 "“We will have to force them.”"
 flavor_swift_legged_bongo.4.b:0 "“They will learn in time.”"

 flavor_swift_legged_bongo.6.t:0 "The Results"
 flavor_swift_legged_bongo.6.d:0 "“Useless, all of them! Useless!" Uwimbabazi paced back and forth across the chamber, her breaths coming in irregular gasps. She wheeled to face one of her council members, who was attempting to look as small and inconspicuous as possible. “I have spent two years searching for a successor, and for my efforts, I have been rewarded with nothing!”\n\n"What am I to tell the candidates, my Ingo?” The council member was avoiding Uwimbabazi’s gaze.\n\n“You are to tell each and every candidate the same thing—those who attempted to flatter their way into my good graces, those whose confidence betrayed incompetence, those who told me of their weakness gladly, in the hopes that I would admire their self-pity—they will all receive the same message. You are to tell them that I have considered them, and they all have been found wanting.”\n\n“Are you quite sure that’s wise, my Ingo? Many of them will surely not take well to such a slight on thei-”\n\n“Did you hear me? They. Have. Been. Found. Wanting.” Uwimbabazi’s molten gaze met the council member’s, who shrank away from her intensity. “Unless, of course, you also wish to be found wanting, hmm?”\n\n“No, of course not, my Ingo! I will prepare the messages right away, my Ingo!” The council member scurried out of the chamber. Uwimbabazi allowed herself to lean against her desk, and a deep sigh shuddered its way through her body. She shook her head and gave a tired chuckle.\n\n“Multiple tribes’ worth of people, and yet not a single one is worthy of being my successor.” Her fingers tapped restlessly against the desk. “No one, except for me.”\n\nShe stopped tapping. A small smile crept across her face."
 flavor_swift_legged_bongo.6.a:0 "“I suppose, like everything else, I shall just have to do it myself.”"

 flavor_swift_legged_bongo.7.t:0 "From Across The Jungle "
 flavor_swift_legged_bongo.7.d:0 "A messenger has arrived today, from the tribe of the Swift Legged Bongo. They say that, in these times where our independence is threatened, we Tanizu must band together—with them in charge, of course. Should we accept?"
 flavor_swift_legged_bongo.7.a:0 "A most reasonable course of action."
 flavor_swift_legged_bongo.7.b:0 "We will take our chances."

 flavor_swift_legged_bongo.8.t:0 "Pleading"
 flavor_swift_legged_bongo.8.d:0 "“Uwimbabazi, please, speak to me! What must I do?”\n\n[Root.Monarch.GetName] sat on [Root.Monarch.GetHerHis] knees in front of the statue. “You have died, and left us to fend for ourselves. Why would you do such a thing? You were the greatest Ingo the Bongo had ever seen, and you sacrificed it all for what? Eternal life? What cruel form of immortality is this, then? To live forever—if you even live at all—and be unable to communicate? That is madness!” [Root.Monarch.GetSheHe] stood. “Wait.”\n\n“Are you unable to communicate? Or are you choosing not to? Yes, that must be it. Why, then? I am the ruler of the Bongo! Surely, if there was anyone you would speak to, it would be me?”\n\nThe statue stood cold and impassive in the fading light.\n\n“Speak to me! I demand it. Hear me, Uwimbabazi. SPEAK TO ME!”"
 flavor_swift_legged_bongo.8.a:0 "“WHY WON’T YOU SPEAK TO ME!?”"

 flavor_swift_legged_bongo.9.t:0 "A Closer Melody"
 flavor_swift_legged_bongo.9.d:0 "The Swift Legged Bongo have been a steadfast partner to us, and now they seek to deepen that relationship. They seek our vassalization, as well as our conversion."
 flavor_swift_legged_bongo.9.a:0 "We shall submit, and praise the Cycle."
 flavor_swift_legged_bongo.9.b:0 "We prefer our independence, but their faith sounds intriguing."
 flavor_swift_legged_bongo.9.c:0 "No thank you."

 flavor_swift_legged_bongo.10.t:0 "In Harmony"
 flavor_swift_legged_bongo.10.d:0 "Against all odds, we have done it.\n\nThe Mengi, massacred. The Baashidi, beaten back. The lizardfolk, licking their wounds. The Dakinshi, defeated once again. All who would seek to subjugate us, have failed.\n\nThe Lady of Drums may have set us upon this path, but even she could not do it alone. Together, however, we are unstoppable.\n\nWe are the Swift Legged Bongo—nay, we are more than that! Under our hand, the Tanizu have been united once again! Across the jungle, we hear the most joyous symphony of all—that of victory!"
 flavor_swift_legged_bongo.10.a:0 "A song for the ages!"

 flavor_swift_legged_bongo.11.t:0 "Dissonance’s Victory"
 flavor_swift_legged_bongo.11.d:0 "Uwimbabazi’s funeral was the largest the Bongo had ever seen. Thousands wept for her passing, for they knew they would never see an Ingo like her again.\n\nThe Bongo mourned Uwimbabazi, and the jungles were silent."
 flavor_swift_legged_bongo.11.a:0 "The Lady of Drums is no more."

