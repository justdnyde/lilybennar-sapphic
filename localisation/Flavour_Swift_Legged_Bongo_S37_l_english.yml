 flavor_swift_legged_bongo.20.t:0 "Jyeshuba: Sculpting, Part The First" 
 flavor_swift_legged_bongo.20.d:0 "I grow weary. My back aches when I rise for the morning sun. Where once my mind worked faster than that of all around me, now I am the one left struggling to keep up. Where once my stride was effortless, now every step feels like the last groaning movement of some ancient giant. I cannot do this much longer. And yet I must. The Bongo have no one else able to lead them as effectively as I. But I am no fool.\n\nA successor will be required. However, I have no children—my womb lies barren. But in my dreams, I see her. My child. My beautiful, perfect child.\n\nI will make her.\n\nBut what material to use? Straw is plentiful and cheap, but lacks the space for such complex magics as I am about to undertake. I could also work her out of wood, sculpt her out of clay, or carve her out of stone. All would cost me greatly, but the potential of those materials is far stronger. What to choose…"
 flavor_swift_legged_bongo.20.a:0 "Straw, for its abundance."
 flavor_swift_legged_bongo.20.b:0 "Wood, for its beauty."
 flavor_swift_legged_bongo.20.c:0 "Clay, for its softness."
 flavor_swift_legged_bongo.20.e:0 "Stone, for its resilience."

 flavor_swift_legged_bongo.21.t:0 "Jyeshuba: Sculpting, Part The Second" 
 flavor_swift_legged_bongo.21.d:0 "Even just from this unworked block, I can see her. The longer I stare, the more shocked I am when I blink and she is not there. \n\nI have the vision in my head: my beautiful child, decked in fine robes, leading the Bongo in my absence, forever. But how to make that vision a reality? I am no sculptor—the tools feel heavy and inflexible in my hands. I will have to tread with caution, lest in my amateurish eagerness I destroy her.\n\nNow begins the real work. To take these tools, and craft my child as only a mother can.\n\nThe longer I spend crafting her, the more beautiful she will be. But my bones creak, and I know that my time is short. How much effort to spend…"
 flavor_swift_legged_bongo.21.a:0 "Craft her hurriedly."
 flavor_swift_legged_bongo.21.b:0 "Craft her with care."
 flavor_swift_legged_bongo.21.c:0 "Craft her meticulously."
 
 flavor_swift_legged_bongo.22.t:0 "Jyeshuba: Sculpting, Part The Third" 
 flavor_swift_legged_bongo.22.d:0 "Ah, listen to the sounds you make. So sweet you are, my beautiful chi—\n\n“Excuse me, my Ingo, are you—oh, um. Am I interrupting something?”\n\nHmm, what’s this? What are you bothering me for?\n\n“Well, you wanted that report on the-”\n\nYes, yes, I’ll hear it later. Now be off with you.\n\n“Of course, my Ingo…what is that, anyway?”\n\nShe is my child. I am deciding whether or not to dress her.\n\n“I…see.”"
 flavor_swift_legged_bongo.22.a:0 "She is perfect as she is."
 flavor_swift_legged_bongo.22.b:0 "I will dress her in my own garments."

 flavor_swift_legged_bongo.23.t:0 "Jyeshuba: Look Upon My Child" 
 flavor_swift_legged_bongo.23.d:0 "I have gathered you here today to introduce you to someone. Some of you have met her already.\n\nWhat’s that, my child? Not now. I am busy.\n\n“I do not understand, my Ingo. What is this statue?”\n\nThis is my child. I am her and she is me. One day, she will be all of me.\n\n“...and this is supposed to help us how?”\n\nI will not live forever. After I am gone, my child will remain. She will guide the Bongo for eternity.\n\n“We, um, well, this is most interesting, my Ingo. We will of course support you in this mission however we can-”\n\nSave your adulation for the fools outside. Spare me your empty words. Do you think I cannot see you for who you are? You do not trust me. You think me mad. You think me senile in my old age. I care not for your concerns. Now BEGONE!"
 flavor_swift_legged_bongo.23.a:0 "My beautiful child. My beautiful Uwimbabazi"

 flavor_swift_legged_bongo.30.t:0 "Jyeshuba: Investing, Part The First" 
 flavor_swift_legged_bongo.30.d:0 "It is hard work, being a mother. My child requires constant attention. I must feed her, whisper to her, tell her stories, coddle her like the babe she is. When the sun sets, I put her to sleep. When it rises, she wakes with me.\n\nI find I am growing weaker. It becomes harder to rouse myself from slumber with each passing day. To take care of my duties as an Ingo requires so much more effort than it used to. Every time I must hear a petition, I want nothing more than to claw my way out of my own skin and retreat to my chambers. How, after such an exhausting day, am I supposed to find the energy to care for my child? But I must. My child needs me.\n\nI see the looks my council gives me. They do not understand—how could they? They do not feel the bond I have with my child, do not see the way she looks at me. Even the sunset cannot compare the beauty she holds.\n\nYes, my child. I hear you. Your mother hears you."
 flavor_swift_legged_bongo.30.a:0 "Aren’t you such a pretty thing, my beloved child."

 flavor_swift_legged_bongo.31.t:0 "Jyeshuba: Investing, Part The Second" 
 flavor_swift_legged_bongo.31.d:0 "The setting sun casts dancing shadows across my chambers. My mind swims with visions of the past, the future, and occasionally the present. In my half-asleep dreams, she speaks to me, a crimson voice dripping with sagacity. Uwimbabazi, she says, rest. Let sleep wash over you. You have given me so much of yourself; there is so little left. You are but a husk of a person.\n\nI know she speaks the truth. I can scarcely bring myself to move most days—I have delegated so much to my council. They fret over me, of course. How could they not? Their once-great Ingo, reduced almost to a corpse. But I lack the energy to care—all I have left is my child. I do not let them in my chambers anymore. It pains me to see the worried looks in their eyes, and it pains me for my child to have to witness this.\n\nOn the days where I escape my bed, I stumble over to her, my knees buckling under the weight of my malnourished body. I wrap my arms around her, sobbing into her shoulder. Oh, my little Uwimbabazi. Your mother loves you. You must know this, but it will not stop me from saying it. I love you. I have given everything to you, and I will still give more, if only to see the joy in your eyes. I breathe, and a shiver wracks my body. I am so cold, my child.\n\nI find myself tired yet again. Perhaps just a short nap next to you, to ease my weary legs…"
 flavor_swift_legged_bongo.31.a:0 "When I wake, it is midnight."

 flavor_swift_legged_bongo.32.t:0 "Jyeshuba: Cold And Empty Air" 
 flavor_swift_legged_bongo.32.d:0 "It was early in the morning when a servant discovered Uwimbabazi’s body. She was found draped across the statue, her arms wrapped around it as if comforting it. Her eyes were closed, and she wore a soft smile on her face. She seemed at peace.\n\nA note was found at the base of the statue. “I have placed a part of me inside of here. Seek my counsel within it,” it read.\n\n“Uwimbabazi?” the servant tentatively asked. The statue gave no response.\n\nThe members of her council quickly gathered in the room. They eyed the statue, which showed no signs of containing life, with suspicion.\n\n“I think it’s nonsense,” one said. “It’s not talking to us. I think she was insane by the end, anyway.”\n\n“How dare you!” said another. “She may have been past her prime, but she was still our Ingo!”\n\n“You make the damn thing talk to you, then!”\n\nThe only thing they could agree on was that Uwimbabazi was dead. The Lady of Drums was no more."
 flavor_swift_legged_bongo.32.a:0 "Not even the air dared breathe."

 flavor_swift_legged_bongo.40.t:0 "Jyeshuba: The First Experiment" 
 flavor_swift_legged_bongo.40.d:0 "“Um. Hello.”\n\n[Root.Monarch.GetName] stood in front of the statue. shifting uncomfortably. The statue stood silent.\n\n“I realize we perhaps did not get off on the right foot. I must apologize for that.” The statue stood silent.\n\n“I would most appreciate your counsel. You led us so well for so long, and now we feel lost in your absence.” The statue stood silent.\n\n“By the Mongoose, this is stupid—” [Root.Monarch.GetSheHe] shook [Root.Monarch.GetHerHis] head. “No, I can’t say that. If it is listening…” The statue stood silent.\n\n[Root.Monarch.GetName] sighed. “What am I supposed to DO? Everyone in my council thinks I’m insane for even attempting this. Maybe they’re right…”\n\nThe statue stood silent."
 flavor_swift_legged_bongo.40.a:0 "“This is a waste of time.”"
 flavor_swift_legged_bongo.40.b:0 "Was there a glint in its eye?"

 flavor_swift_legged_bongo.41.t:0 "Jyeshuba: The Second Experiment" 
 flavor_swift_legged_bongo.41.d:0 "“You’re wasting your time,” said the councilwoman. “It is never going to speak to you, because there is nothing there. Uwimbabazi was a madwoman who tried to do the impossible, and she failed.”\n\n“You do not know that for sure,” [Root.Monarch.GetName] said. “Just because she has not spoken to me yet, does not mean she never will.” The councilwoman shook her head.\n\n“Look at you! You spend every day holed up in the chambers that used to be hers, trying to commune with a spirit that you have no evidence even exists! How can you draw any other conclusion? This…thing! It is nothing!”\n\n“You did not know her like I did,” [Root.Monarch.GetName] said quietly. “She was unlike anyone else. If anyone could cheat death, she could.” The air stood still for a second.\n\n“You are a fool, [Root.Monarch.GetName]. I will leave you to your insanity.” The councilwoman spun on her heels and stalked out of the room. [Root.Monarch.GetName] stood there for a while, in silence, before turning back to the statue."
 flavor_swift_legged_bongo.41.a:0 "“She cannot be right…right?”"
 flavor_swift_legged_bongo.41.b:0 "“She must be wrong.”"

 flavor_swift_legged_bongo.42.t:0 "Jyeshuba: It Speaks" 
 flavor_swift_legged_bongo.42.d:0 "“[Root.Monarch.GetName].”\n\nThe Ingo in question’s eyes shot open. [Root.Monarch.GetSheHeCap] had been meditating for almost an hour, and had been so intently listening to the silence that [Root.Monarch.GetSheHe] almost had a heart attack at the sudden voice.\n\n“U-Uwimbabazi?” [Root.Monarch.GetSheHe] asked.\n\n“The very same.” The voice emanated from the statue. “I have seen you for many days. You flounder in the dark as a blind [Root.Monarch.GetWomanMan], hoping I will take notice of you.”\n\n“But why have you waited this long?” [Root.Monarch.GetName] asked. “You must know how we have been struggling in your absence? Why did you not speak to me earlier?”\n\n“I did not find you worthy,” the statue said. “I needed to be absolutely sure of your faith in me. The people around you poison your ears with lies—they say that my essence is not contained in this form, and that you are a fool who wastes [Root.Monarch.GetHerHis] time chasing ghosts.” The statue’s eyes flashed to life, and the light from the sun seemed suddenly dimmer.\n\n“But you, [Root.Monarch.GetName], are different. Even in the face of all evidence to the contrary, you chose to believe. That is most commendable, and it is for that reason that I have found you worthy. You need not flounder any longer.”"
 flavor_swift_legged_bongo.42.a:0 "“Let the Lady of Drums guide you.”"

 flavor_swift_legged_bongo.43.t:0 "The Statue Speaks!" 
 flavor_swift_legged_bongo.43.d:0 "[Root.Monarch.GetName] has communed with Uwimbabazi! She has given our [Root.Monarch.GetTitle] her wise counsel. [Root.Monarch.GetName] is sure to do great things!"
 flavor_swift_legged_bongo.43.a:0 "“O Glorious Uwimbabazi!”"

