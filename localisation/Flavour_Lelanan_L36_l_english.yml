#Tooltips
L36_event_insight.1: "§GEvent Insight:§!\nUsing Lelanàn's position of religious import, Rayafo's allies are secretly convinced to not support their long-standing ambitions to conquer us, and their populace is preached to join our defence as we lure them into attacking us."
L36_event_insight.2: "§GEvent Insight:§!\nMihitarab, fearing our rise after defeating Rayafo, strikes at us. But Rangita anticipated this, and we have prepared.\n "
L36_event_insight.3: "§GEvent Insight:§!\nKyola meets Leli and Felana.\n§GWe will gain +50 Dip§!\n "
L36_event_insight.4: "§GEvent Insight:§!\nKyola is sent to Kunolo, and afterwards must make a decision that could drastically change her and all Lelanàn's future."
L36_event_insight.100: "§GEvent Insight:§!\nWhat remains known of the First Love Poem is shared.\n §GWe will gain +1 Stability§!\n "
L36_tales_of_halanns_love_initial.1: "By sending Mihipha out with our Diplomats to §Gimprove relations§!, we will now be able to collect §VTales of Halann's Love§! from places of interest around the world!\n\nThe list of places and peoples to seek out is contained in our Government Mechanic.\n\n Should the Forbidden Plains, Haless, or Insyaa have been disabled at game start, the respective Tales will eventually be discovered automatially."
L36_upgraded_love_festivals: "Upgrade §YHold a Grand Festival of Love§! to add one of each development and a small minority of every integrated race to all provinces with the §VLabour of Love§! modifier. The §VLabour of Love§! modifier will then be removed, and the province will gain a modifier which prevents further development gain in this manner (though minorities can still be spread again to replace lost minorities or make small minorities large)."
L36_trading_incense: "If we are Trading in Incense, the event §YGrowth of the Perfume Industry§! happens."
L36_felanas_perspective: "With Kyola's passing, future Missions and Events will now be from Felana's perspective."
L36_Rangita_guided_to_rest: "Rangita Tallfriend has been guided to rest by the Nakazy Sisters."
L36_ixora_trade_posts: "Is §Y[5802.GetName]§!, §Y[5813.GetName]§!, §Y[5776.GetName]§!, §Y[6076.GetName]§!, §Y[6068.GetName]§!, or §Y[6061.GetName]§!"
lelanan_lel_asserted: "We shall assert Lel's rightful position as the only Goddess worthy of elevation! We will now §Rdisable§! elevating the other gods of the Nakavy Avo when we control their shrines."
L36_event_insight.5: "§GEvent Insight:§!\nKyola finally uncovers her own Oath, and joins the ranks of the Daughters of Lel proper, granting us §GMarine Ratio§! and a §Gspecial upgradeable modifier§!."
L36_daughters_at_home: "The §GDaughters of Lel§! mercenary company has returned to Lelanàn to train for what comes next."
L36_event_insight.6: "§GEvent Insight:§!\nThe Daughters of Lel shall seek out the two lost Ananoma to the West, granting permanent claims and starting frontiers if they are uncolonized!"
L36_daughters_in_nosivy: "The §GDaughters of Lel§! mercenary company is in Nosivy, ready to begin work on the very first §VLabour of Love§!."
L36_unlock_labours_of_love: "\nWe will unlock the §VLabour of Love§! §Ydecision§!, allowing us to spend 30 §VLove§! to add the §VLabour of Love§! modifier to a province, designating it for special effects from our government interactions. The decision targets the province which the §YDaughters of Lel§! are in."
L36_upgrade_distribute_relief: "\nUpgrade §YDistribute Relief§! to add the §YLovers' Road§! modifier to all provinces that have the §VLabour of Love§! modifier, granting:\n  §G+30%§! Friendly Movement Speed\n  §R+30%§! Hostile Movement Speed\n  §G-15§! Local Governing Increase Cost\n  §G-20%§! Local Governing Cost\n  §G+10§! Supply Limit\n  §G+4§! Local Trade Power\nThe province then loses the §VLabour of Love§! modifier."
L36_upgraded_blessings: "\nUpgrade §YBless the Paladins§! to add the §YLel's Blessed Waters§! modifier to all provinces that have the §VLabour of Love§! modifier, granting:\n  §G+25%§! Local Sailors\n  §G+0.5§! Local Goods Produced\n"
L36_upgraded_lel_unlock: "We will §Ypermanently upgrade§! Lel's diety effects for all worshippers of the Nakavy Avo!"
L36_event_insight.12: "§GEvent Insight:§!\nAs we extract greater and greater quantities of reagents from the depths of the dormant volcano of Afomapobo, our activities disturb the aweing power of the earth to devastating consequence."
lelanan_aelantiri_ixora_tooltip: "\nA few years after our colony controls all of the Turtleback Isle, we will transform the island into a grand centre of Ixora production."
