l_english:
##Missions

#Column 1
lelanan_lelis_ixora_title: "Leli's Ixora"
lelanan_lelis_ixora_desc: "When Leli took a trip\nSearch for perfume, new scents\nOn the sixth day we found a grove:\nBrilliant white flowers, fragrance most intoxicating\n\nA powerful aphrodisiac, most clearly, too\n“This is it, Kyola!” Leli exclaimed\n(Once we had finally exhausted ourselves sincerely)\n“Lel has blessed me with the perfect flower!”"

lelanan_bless_the_ixora_jungles_title: "Bless the Ixora Jungles"
lelanan_bless_the_ixora_jungles_desc: "[MissionTriggerBlessIxoraDesc]"
lelanan_bless_the_ixora_jungles_desc_1: "Leli strode through fields of Ixora\nWorked with Mihipha to spread life\nHer bright dress billowed in breeze\nMy heart swelled with affection for my wife\n\nI reached Leli, swept her in my arms\nBrought lips together, fiI walked arm-in-arm with Leli\nSurveying beautiful fields of Ixora\nEvery one a gift for our departed wife\nA reminder of Kyola in our life\n\nLeli’s mouth graced my shoulder\nMy name gentle upon her lips\nI smiled, leaning down for a kiss\nKyola was gone, but for Leli, heart still bliss"

lelanan_new_white_flower_jungles_title: "New White Flower Jungles"
lelanan_new_white_flower_jungles_desc: "[MissionTriggerNewJunglesDesc]"
lelanan_new_white_flower_jungles_desc_1: "I stood next to Leli and Felana\nLooking into empty warehouse\nThe energizing scent of Ixora in the air\nBut inside; not even a mouse\n\nFelana made a curious face\nAs I tilted my head she smiled widely\n“The other jungles here can’t grow more\nBut I’ve been reading about Aelantir idly…”"
lelanan_new_white_flower_jungles_desc_2: "I stood next to Leli quietly\nLooking into empty warehouse\nThe energizing scent of Ixora in the air\nBut inside; not even a mouse\n\nI scrunched my face in deep thought\nAs my love tilted her head I smiled widely\n“The other jungles here can’t grow more\nBut I’ve been reading about Aelantir idly…”"

#Column 2
lelanan_rangitas_plan_title: "Rangita's Plan"
lelanan_rangitas_plan_desc: "“Great and mighty Lel\nLend me your great will\nTo face with grace my final knell\nUntil the world lays tranquil\n\nI close my weary eyes\nSee the Isles laid out before\nYour Chosen strides so wise\nHer heart bared evermore\n\nYet the path you show is fraught\nHer young future not yet set\nSo I ask now having fought\nPlease guide her to greatness yet”\n\n-Rangita Tallfried’s last poem, found in her personal journal after her passing"

lelanan_rayafos_folly_title: "Rayafo's Folly"
lelanan_rayafos_folly_desc: "To Rayafo I have been before\nThe people there share in our heart\nLovers of food, festivals, and each other\nMore in common than we have apart\n\nIn so many ways we were the same\nBut the most important we were apart\nWhile we walked the Isles so softly\nThe other Vyzemby saw the world with no heart"

lelanan_a_mothers_protection_title: "A Mother's Protection"
lelanan_a_mothers_protection_desc: "My knuckles bare white; grip spear\nHaingo’s white flames in thought\nMagic hisses, roars; beast eager to devour\nBut Great Mother Lel protects\n\nMy faith: unbreakable shield\nFire washes harmlessly\nLike water laps at shore\nThe flames break"

lelanan_an_open_heart_title: "An Open Heart"
lelanan_an_open_heart_desc: "[MissionTriggerHeartDesc]"
lelanan_an_open_heart_desc_1: "“A book?” I said, surprised\nIsabel Mirthvoice was not so mundane\n“Not just any book,” she replied\n“But one from which we have much to gain”\n\n“How would we collect these spread out stories?\nThese Tales of Halann’s Love?”\n“We will carry your Mihipha far and wide, of course\nAnd reach out our open glove!”"
lelanan_an_open_heart_desc_2: "I looked at Leli as Isabel Mirthvoice spoke\nSaw the pain and yearning behind her eyes\nBut maybe this could help us heal\nShe spoke confidently to my surprise\n\n“Tales of Halann’s Love, huh?”\nLeli’s smile carried so much pain\n“I would be happy to help, of course\nFrom these stories we have much to gain”"

lelanan_spreading_our_love_title: "Spreading our Love"
lelanan_spreading_our_love_desc: "Isabel brought Ixora as she sailed Halann\nGave Leli’s business a grand new dawn\nOnce Cannorians and Halessi got her perfume\nIt became the talk of every court\n\nTraders journeyed far to Lelanàn\nRisking their lives for the incredible profits\nHoping get their hands on Leli’s perfume\nNo matter the risk of doom"

lelanan_a_loving_home_title: "A Loving Home"
lelanan_a_loving_home_desc: "At first it was halflings, humans, and lizardfolk\nEach playing our role in our flourishing city\nBut our Tales of Love\nA beacon across Halann; for they who never found pity\n\nWe were safest place for all with Love\nThose who protect the Love they hold to dearly\nWho Loved outside norms came\nHoped to find safety, knew suffering so clearly\n\nBut sometimes people--all equal in Lel’s eyes\nWere not met with gentle gaze nor care\nAll we could do was better each day\nSo all find home the City of Love; their hearts we would repair\n\nThat is our §VLabour of Love§!"

lelanan_the_scent_of_love_title: "The Scent of Love"
lelanan_the_scent_of_love_desc: "A thousand peoples ran all about\nA thousand scents wafted in the air\nOnly one calmed the Troll’s bout\nOnly one did the Elf put in her hair\n\nOnly one scent was part of the rituals\nOnly one did the Gnoll delight in\nOnly one was good enough for humans\nOnly one did all wish to share with kin\n\nIt brought the world together\nTo enjoy the pleasing scent\nIt was all the rage world-wide\nAll knew what Ixora meant"

#Column 3

lelanan_the_city_of_love_title: "The City of Love"
lelanan_the_city_of_love_desc: "I walk the City of Love\nEach day, full of new people\nYet something is missing in me\nNo matter how much I pray to you\n\nI was raised to become your paladin\nMy word and action your divine embrace\nYet as I study and train\nI feel myself losing my pace\n\nI best the other Heartblades\nExtend my help to them--smile\nThey giggle, take my hand\nAnd my heart flutters weightlessly\n\nYet they move on\nBlessed by your divine embrace\nAnd I am left here alone\nThe only to never feel even a trace\n\nWhat do I lack, o’ Great Matriarch\nMother of all, Ruler of the gods?\nWhat do my sisters know that I not?\nAm I more broke than thought?\n\nIs it my cursed birth?\nMy mismatched body?\nMy pained heart when I see the lump in my throat?\nDoomed to a body I was never meant to have?"

lelanan_the_broken_marriage_title: "The Broken Marriage"
lelanan_the_broken_marriage_desc: "Lel was not always Great Matriarch\nKolo reigning as patriarch\nLel’s husband, tamed by her Love\nMarriage tumultuous, yet their love a gift\n\nTheir namesake cities followed example\nTwin centres of Halfling history\nUntil twin cities torn apart\nOnce wed cities and gods sundered"

lelanan_the_spouses_reunion_title: "The Spouses' Reunion"
lelanan_the_spouses_reunion_desc: "[MissionTriggerReunionDesc]"
lelanan_the_spouses_reunion_desc_1: "“I stood on balcony, overlooking Kunolo\nPride swelling in my heart\nOverseeing the rebuilding of the city\nHad been incredibly successful, art\n\nStreets bustled with new arrivals\nFrom every walk of life they came\nOnce more lives of joy\nIt was time I to my wives, for the same”"
lelanan_the_spouses_reunion_desc_2: "The war was over. Or at least, that’s what they had told us. But for those left alone, did the war ever end? She was gone now. Kyola, torn from our lives forevermore. And what were we supposed to do about that?\n\nWould Lel answer our prayers to bring her back? Would the support of our friends ever heal this gaping wound left by her absence? Or were we now just doomed to forever be haunted by our beautiful memories of her: in the way the calm waters ripple or how the cool breeze caresses our cheeks?\n\nIt wasn’t worth it, Kyola.\n\nYour sacrifice will never have been worth it to us.\n\nBut we will honour you in every way we can.\n\nBecause you will always be our wife."

lelanan_labours_of_love_title: "Labours of Love"
lelanan_labours_of_love_desc: "[MissionTriggerLaboursDesc]"
lelanan_labours_of_love_desc_1: "“Have you escorted pilgrims to Dongray’s Shrine?”\nHer gaze lowered, head shook\n“You have not seen the roads of our Isles\nNor pushed carts up steep jungle hills\n\nYour concern is not unreasonable\nThe logistics and cost will surely be great\nBut some things are worth any cost or effort\nSuch is what makes it a §VLabour of Love§!.”"
lelanan_labours_of_love_desc_2: "The candles around our room flickered gently\nMonsoon rains pattering on the windows\nOur shared breathing filled the silence contently\nLeli turned to face me, a small smile on her face\n\nThese days her smiles were so weak \n“It was Kyola, my love…” she said forlornly\n“One of her §VLabour of Love§!, then?”\n“Always… She never wanted others lonely”"

lelanan_lels_ascendancy_title: "Lel's Ascendancy"
lelanan_lels_ascendancy_desc: "[MissionTriggerLelAscendancyDesc]"
lelanan_lels_ascendancy_desc_1: "“Eleven shrines there were\nTen to members of Nakavy Avo lesser\nPaying homage to the family members\nEven Kolo: disgraced predecessor\n\nOnly one to Great Matriarch herself\nOnly one stood far above others\nThe people of Lelanàn; proven our strength\nProven power of Lel’s Love--of Great Mother\n\nNo longer will we tolerate any elevated above Lel\nIt is time we gave our Mother proper veneration; arts\nJust as she rules the Great Family\nSo too only she deserves to rule our hearts”\n\n-The Decree of Ascendancy, issued by Chosen of Lel Kyola Heartblade in 1491"
lelanan_lels_ascendancy_desc_2: "“Eleven shrines there were\nTen to members of Nakavy Avo lesser\nPaying homage to the family members\nEven Kolo: disgraced predecessor\n\nOnly one to Great Matriarch herself\nOnly one stood far above others\nThe people of Lelanàn; proven our strength\nProven power of Lel’s Love--of Great Mother\n\nNo longer will we tolerate any elevated above Lel\nIt is time we gave our Mother proper veneration; arts\nJust as she rules the Great Family\nSo too only she deserves to rule our hearts”\n\n-The Decree of Ascendancy, issued by Chosen of Lel in 1491"

lelanan_the_life_beneath_us_title: "The Life Beneath Us"
lelanan_the_life_beneath_us_desc: "The great mountain bore great magic\nReagents as common as wheat or wood\nSo we sought to secure yet more wealth\nExcavated far deeper than we should\n\nLel’s gifts were oft enigmatic\nHer life oft took different form\nAnd as we delved ever deeper\nThis time it birthed a great storm"

lelanan_lels_greatest_gift_title: "Lel's Greatest Gift"
lelanan_lels_greatest_gift_desc: "[MissionTriggerGreatestGiftDesc]"
lelanan_lels_greatest_gift_desc_1: "When the Mihipha came to me\nI did not want to believe it\nThe mere idea I could bear a child\nNo longer be deeply unfit\n\nI clutched my stomach tightly\nNearly cried at the mere plan\nThen summoned my mages back\nSaid “If anyone, we can”\n\nLel’s greatest gift is Love\nFor life flows forth from it\nIf we can share that life with all\nThen I will spare not even a bit"
lelanan_lels_greatest_gift_desc_2: "When the Mihipha came to us\nI could hardly believe my ears\nThe mere idea we could bear a child\nOur dream for so many years\n\nLeli was so elated\nAgreed to support them from above\nIt was an opportunity to show\nHow equal to theirs was our love\n\nIf only Kyola could share this with us\nHow happy she would be\nOur daughter in her arms\nHer heart would finally have been free"

#Column 4

lelanan_kyolas_oath_title: "Kyola's Oath"
lelanan_kyolas_oath_desc: "A Paladin’s Oath: carved into the soul\nGuiding morals for great power\nFelling terrible demons with but faith in hearts\nMy Oath came last of my Sisters\n\nI thought so long to be broken\nMy Oath proved stronger than all\nAs I lay alongside Leli and Felana\nShared in their passion, their Love."

lelanan_assert_lels_position_title: "Assert Lel's Position"
lelanan_assert_lels_position_desc: "I had seen the Shrine of Yuye\nBack in my adolescence\nIt was shoddy and run down\nNot like Lel’s great magnificence\n\nThinking back on that infuriated me\nNot just with shame at the disgrace\nBut at how dare any could think\nAny other could occupy Lel’s sacred place"

lelanan_and_armoured_chest_title: "and Armoured Chest"
lelanan_and_armoured_chest_desc: "[MissionTriggerArmouredDesc]"
lelanan_and_armoured_chest_desc_1: "“Spear clangs upon abjured shield\nDivine power surges, dummies smoldering ash\nMore than ready they now are\nTo help with the planned clash\n\nOur work not yet finished\nA new generation need trained\nFor the day we return to the lost cities\nAnd reclaim old land so pained”"
lelanan_and_armoured_chest_desc_2: "Kyola was strongest of her generation\nDivine power outstripping all her peers\nBut now she lay in the Great Matriarch’s arms\nHow true came our greatest fears\n\nYet we knew that our grief\nCould not turn us away from Lel\nAnd so as we helped the next generation\nWe set out to where we used to dwell"

lelanan_the_role_of_the_mihipha_title: "The Role of the Mihipha"
lelanan_the_role_of_the_mihipha_desc: "The Mihipha were many things across Fahvanosy\nMages, scholars, bards, diplomats.\nIn Lelanàn, however, they had slowly taken on a new role\nOne which resulted in a great many spats\n\nService to Lel was their new calling\nMy priesthood increasingly composed of their number\nTheir magical talent, knowledge, and aptitudes making them perfect\nAnd breaking them from their purposeless slumber"

lelanan_lels_blessed_waters_title: "Lel's Blessed Waters"
lelanan_lels_blessed_waters_desc: "[MissionTriggerBlessedWatersDesc]"
lelanan_lels_blessed_waters_desc_1: "I touched pool, focused faith in Lel\nHer domain over water absolute\nHer divine power surged from me\nAnd transformed pool, Holy Water took root\n\nFelana stared down in awe\n“We could bless any water like this?”\nI nodded, thinking about grand plan devised\n“The next §VLabour of Love§!: blessing even abyss”"
lelanan_lels_blessed_waters_desc_2: "Hand idly through blessed pool\nFelt tingling of rejuvenating water\nThe fish within swam so excitedly\nAnd for a moment, I felt like Her daughter\n\nThis was another of the great §VLabour of Love§!\nKyola had devised so long ago\nLike fish swimming before me life went on\nAnd Good remained yet so"


lelanan_blessing_her_rains_title: "Blessing Her Rains"
lelanan_blessing_her_rains_desc: "[MissionTriggerBlessingRainsDesc]"
lelanan_blessing_her_rains_desc_1: "I stood in that great monsoon\nShouted my prayer to our great Lel\nFelt her magic surging through me\nLike drawing up from mighty well\n\nPlunged my hands into the ocean\nFelt great life all around me\nWhile I could not bear a child\nThere was still so much more I could be"
lelanan_blessing_her_rains_desc_2: "Outside the monsoons raged wildly\nWhile the paladins touched the sea\nI swore the rain glowed golden\nBut Leli insisted that was just me\n\nNow the sea is rife with life\nLel’s blessing bestowed on all\nHer holy rains soothe our wounds\nNo matter how minor or small"

#Column 5

lelanan_reclaim_and_rebuild_title: "Reclaim and Rebuild"
lelanan_reclaim_and_rebuild_desc: "[MissionTriggerReclaimDesc]"
lelanan_reclaim_and_rebuild_desc_1: "Every Ananoma had unique differences\nHoneycomb cities varied as us today\nEach Ananoma had lessons to impart us\nEach lost city forgotten secrets yearned to betray\n\nHand ran over detailed sketches\nLayout of Lelanàn before me\nLessons of the past could build a new future\nFor the greatest city there ever would be"
lelanan_reclaim_and_rebuild_desc_2: "Every Ananoma had unique differences\nHoneycomb cities varied as us today\nEach Ananoma had lessons to impart us\nEach lost city forgotten secrets yearned to betray\n\nKyola once dreamt of an Ananoma\nBuilt in the heart of Lelanàn; its etches\nBut her dream died along with her\nI looked over only her rough sketches \n\nBut as Vyzemby returned to long-lost homes\nMaybe we could relearn long forgotten schemes\nAnd once reclaimed our great heritage\nWe could fulfill another of her dreams"

lelanan_the_ocean_ananoma_title: "The Ocean Ananoma"
lelanan_the_ocean_ananoma_desc: "[MissionTriggerOceanAnanomaDesc]"
lelanan_the_ocean_ananoma_desc_1: "Lelanàn doubled and doubled again\nHouses atop one another while city spread out\nFelana had drafted plans\nMore ambitious than even mine, no doubt\n\nRebuild the entire city from ground up\nBuild a new Ananoma with all known\nLelanàn would be the largest city on Halann\nAll able to call this place of love their own"
lelanan_the_ocean_ananoma_desc_2: "Lelanàn doubled and doubled again\nHouses atop one another while city spread out\nI had drafted plans of my own\nMore ambitious than even Kyola’s, no doubt\n\nRebuild the entire city from ground up\nBuild a new Ananoma with all known\nLelanàn would be the largest city on Halann\nAll able to call this place of love their own"

#Events
flavour_lelanan.0.t: "Love Does Not Die"
flavour_lelanan.0.d: "The new dance was ecstatic\nAllowing for all us three\nWe felt the magic in us\nAnd knew this was meant to be\n\nI bore our great child\nDelighted beyond belief\nAfter many years of fighting\nIn my belly grew relief\n\nShe was the strongest of us all\nOur child born of pure love\nWe knew she would do great things\nThe one I had always dreamed of\n\nWe closed our eyes as she played\nOur bodies together curled\nFinally rested our old bones now\nAnd felt §VLove§! for All the World\n\nRangita’s passing was solemn\nShe led Lelanàn for so long\nThe idea that she departed\nCould feel nothing but so wrong\n\nHer funeral was grand\nLeli and Felana at my side\nAs we stood before Lel’s shrine\nNew High Priestess gestured wide\n\n“Though Rangita may be gone\nAnd the Nakazy guide her to rest\nHer many teachings remain with us\nPushing us all to be our best\n\nLove freely. Love openly. Love often\nHer greatest teachings of all”\nI lowered my head and reflected\nUpon my own impossible wall\n\nI had long kept out of relationships\nPaladins of Lel expected to bear life\nMy cursed body born so wrong\nI could never be a good wife\n\nYet here I stood now listening\nA cruel fate in different cities, a different start\nBut I was in the City of Love, not life\nAnd Lel would never condemn these feelings in my heart"
flavour_lelanan.0.a: "I Needed to Tell Leli and Felana how I Felt"

flavour_lelanan.1.t: "Lelanàn's Weakness"
flavour_lelanan.1.d: "Long have we eyed the grand city of Lelanàn\nThe jewel of the isles, the center of Vyzemby faith\nNow we receive a strange report:\n\nThe dilapidation of their defenses\nThe complacency of their city’s garrison\nThe revelry of their navy’s sailors"
flavour_lelanan.1.a: "Now is the time! We Strike!"
flavour_lelanan.1.b: "This is surely a trap to lure us in."

flavour_lelanan.2.t: "The Upstart Sisterhood"
flavour_lelanan.2.d: "Long have we warily eyed the grand city of Lelanàn\nThe jewel of the isles, the center of Vyzemby faith\nNow they have struck against Rayafo, annexing them in a dastardly scheme\nHow dare a country of mere priestesses think themselves worthy to rule the Isles"
flavour_lelanan.2.a: "We Shall Strike Down the Upstarts!"
flavour_lelanan.2.b: "Now is Not the Right Time…"

flavour_lelanan.3.t: "Humble Beginnings"
flavour_lelanan.3.d: "As I patrol a swarm of children run past\nTheir game theirs and theirs alone\nLively and energetic\nThey are Lel’s Life\n\nThe sun gazes hatefully\nThe water trickles past\nI dip my hands, drink her ambrosia\nFeel the power of Her watery dreams\n\nGlass shatters, curses erupt, my heart races\nMy blade jumps to my hand, I rush\nBurst through the perfumery, scanning for violence\nAnd find two goddesses kneeling\n\nBroken pottery scattered around\nI see myself in jagged edges, shattered purpose\nYet the two women are radiant\nPicking up pieces with careful tenderness\n\n“Oh Goodness, look at us,” one says\nI obey her honeyed words eagerly\n“Welcome to Leli’s fragrances, Paladin\nWe apologize for the disturbance”\n\nI shake my head, deep shame clouding\n“It is I to apologize to you; I feared worse”\nThe second woman smiles; uplifting radiance\nMy heart leaps out of my chest\n\n“Thank you for the concern,” her silken voice blesses\n“I am Felana, and she my wife, Leli.\nWould you maybe stay with us a bit?\nTry some of Leli’s perfume; sit?”\n\nI nod, smile; my awe hard to conceal\n“I am Kyola Heartblade, paladin in training\nAnd I would love to” I answer with zeal"
flavour_lelanan.3.a: "What I was lacking was Lel’s Second Domain: Love"

flavour_lelanan.4.t: "Estranged Spouses, Estranged Cities"
flavour_lelanan.4.d: "In the corner I sat\nSipping on honeyed mead\nWatching the people of Kunolo\nNot so different from Lelanàn itself\n\nBut on the third day\nI noticed the subtle difference\nFor sitting to my right\nHalfling and tree-tall Human\n\nGenders: a mystery\nClearly lovers how they gazed\nBut as I searched what others thought\nNot a one paid them heed\n\nOnly I surprised by bold differences\nLooked down at my mug thoughtfully\nIn Lelanàn, such a sight was not impossible\nI knew that fact all so well\n\nBut there remained ostracization\nOthering toward those Loved differently\nI and Leli and Felana felt this\n\n\nSo maybe the City of Love\nHad more to learn about Love"
flavour_lelanan.4.a: "It was Time our Cities Were Reunified"

flavour_lelanan.5.t: "Kyola's Choice"
flavour_lelanan.5.d: "Before the High Priestess I stood\nHer chambers swirling with perfume\nSlight smile on my face\nHer offer in the air.\n\n“I’m honoured, my High Priestess\nI admit I question why me\nMy flawless record, yes\nBut I have Sisters more flawless yet”\n\nThe High Priestess smiled warmly\nHer favoured pastries consumed\n“Do not shrink your influence, Kyola\nI have heard much from your Sisters\n\nThey turn to you for guidance\nWith prowess unquestionable,\nMany lives saved in battle\nWe need that heroism more yet\n\nLead the Spouse’s Crusade\nDo you accept or not?”\n\nI lowered my head, honoured deeply\nThe Chosen of Lel thought me sterling\nMy reply considered carefully\nFor I knew all too well the risks\n\nOn the battlefield\nNobody was assured to return to their loved ones alive…"
flavour_lelanan.5.a: "“I can Fulfill my Oath in my Wives’ Arms”"
flavour_lelanan.5.b: "“My Oath Demands I Fight for Kolo”"

flavour_lelanan.6.t: "Kyola's End"
flavour_lelanan.6.d: "Arrows whistled towards me\nHammered my holy shield\nMy weary mind staggered\n\nDesperately sought an ally\nGreeted by only death\nFellow Daughters lay fallen\nIn blood-soaked mud abound\n\nAll around me, enemies\nSpears and blades, poking and prodding\nHunters wearing down prey\n\nOne hunter stepped too close\nMy holy power slew them instantly\nBut I stumbled, mind swam, exertion\nIt was all too much; far far too much...\n\nToo much effort, too much fighting, too much magic\nMore arrows whistled towards me\nI abjured a new shie-\n\nA cry of pain, nearly toppled\nLooked in horror at my chest\nArrow struck too fast\nPierced heart with hateful tip\n\nTo knees then side I fell\nBlood and mud splashing beneath\nAt chest clutched, heart seizing\nFelt ice-cold dread grip my very soul\n\nIt couldn’t be…I had assured them\nHad promised return triumphant\nTried pull through the mud\nTo return to the warmth of my waiting wives\n\nMy body could only go so far\nIt gave out on me\nOnly blood-soaked mud on face\nAs the world grew cold and distant and quiet\n\nThe Nakazy sisters coming."
flavour_lelanan.6.a: "No… Please… I have to return… to my Wives…"

flavour_lelanan.7.t: "The Meaning of an Oath"
flavour_lelanan.7.d: "Every paladin describes their Oath differently\nSome a puzzle finished, others a fog clearing\nFor me it was a grand purpose\nRaw, inevitable, holy\n\nThe water I drank, the life I lived\nThey were gifts from Lel; surely as sunrise\nBut they were small compared to the gifts\nI held in my arms by night:\nThe gift of Love in physical form\nMy purpose and reason for living\n\n“Love Must be Given Freely”\nLet none living or dead oppose Lel’s great gift\nNever pass judgement on others for Love\nSo long as that Love is given consensually\nIt creates life, builds empires, and topples tyrants\n\n“Love Must be Unashamed”\nToo often Love is forced to corners\nShunned, rejected for differences\nProtect all with Love oppressed\nAnd let your Love be free to the world\n\n“Love Must be Shared with All”\nTo Love oneself is the basis\nBut the true heart is to Love all selflessly\nBy sharing selfless love far and wide\nIt grows, multiplies, all are uplifted by majesty\n\nThis was my Oath\nEngraved upon heart and soul\nAnd as I repeated it in my mind\nDivine magic rose within me\n\nI looked at Leli and Felana\nTenderly kissed their heads\nA Paladin of Lel now, I was\nAnd I knew what was to be"
flavour_lelanan.7.a: "All the World Shall Know Lel’s Love"

flavour_lelanan.8.t: "Kyola's Triumphant Return"
flavour_lelanan.8.d: "Armour battered, spear broken\nBut spirit unshaken\nI won, we won\nKunolo retaken\n\nForevermore in Vyzemby control\nAlready rebuilt greater\nI returned to my home; to missed Lelanàn\nShip arriving back at harbour\n\nLeli and Felana on wharf stood\nWaving to me as I stepped ashore\nI yearned for moments intimate\nBut was crowded by many more\n\nThose waiting chanted my name\nI looked between them and my wives\nPride clear as the clouds\nLaughed, “What’s all this about!?”\n\nLeli giggled, blessing with a kiss\n“The High Priestess wishes speak\nMost immediately, my mighty wife\nYour time leading isn’t over yet…”\n\nI looked down at her in surprise\nHer words’ meaning dawning\nSmiled at Felana in amazement\n“Well, what could this be?”"
flavour_lelanan.8.a: "I shall continue to Lead with Love!"

flavour_lelanan.9.t: "Without Her..."
flavour_lelanan.9.d: "Her body lay before us; lifeless, oh so still\nMy—Our—second love not moving\nShe was gone\nNot speaking\nNot laughing\nNo warmth\nNo breathing\n\nLeli simply wept beside me\n\nTwo weeks since we were told\nTwo weeks grieving her passing\nYet the pain never subsided\nAnd upon this world I felt now trespassing\n\nI sniffled, held Leli tightly\nHad to remain strong for us both\nGently rubbed her shaking back\nThought of Kyola’s Oath\n\nWe held no such power\nNo strength nor beauty such as she\nAnd I felt the weight of her absence\nFelt how deeply she changed we\n\nHow could I do without her?\nWithout her late night touch?\nHer guiding confidence?\nHer endless love, so much?\n\nHow could I ever hope to make this world better as she did?"
flavour_lelanan.9.a: "A World that was Forever Diminished Without Her…"

flavour_lelanan.10.t: "Kyola's Ceremony"
flavour_lelanan.10.d: "I wear the robes of High Priestess\nThink of Felana’s sweet words to me\nStand before the great audience\nBend down unto one knee\n\n“Kyola Heartblade, hero\nHere today because Lel has spoke\nSeen your actions—your hope\nAnd seeks make you leader of her folk”\n\nThe audience cheers so loudly\nI look to them and smile\nMy time spent back bore fruit\nMy victory not mild\n\nMany Priestesses stand around us\nTheir support so hard to earn\nYet my great effort had not been wasted\nFor this position which I did yearn\n\n“Kyola Heartblade!” the High Priestess continues\nHanding the sign of her station to me so gently\n“You are the Chosen of Lel; High Priestess\nMay you rule over us all intently”"
flavour_lelanan.10.a: "“I shall Lead With Love!”"

flavour_lelanan.11.t: "The Paladin Frontiers"
flavour_lelanan.11.d1: "Blade slashed with divine power\nThe dense jungle in our way\nTread upon dirt which saw no Halfling\nAnd once found Ninakaire, planned to stay\n\nWe expected a den of monsters\nLight of civilization lost honeycombed walls for years\nWe came ready for any threat we face\nIn our arms gripped tightly great spears\n\n\nI slashed through another thick bough\nEmerging onto a clear hilltop\nOverlooking the ruins of Latranoma\nHoneycomb structures bring us to stop\n\nAs more paladins caught up\nI hear their gasps of awe\nSmile as I set down the the hill\nDivine blade ready for this maw"
flavour_lelanan.11.d2: "“I arrived in Latranoma\nMonths after it was found\nReclamation rife with details \nMonster attacks and diseased mound\n\nHoneycomb structures of the Ananoma\nTruly a sight to behold\nStanding taller after years of decay\nThan Fahvanosy’s fortresses so bold\n\nPaladins bustled everywhere\nSet to the Labour of Love; reclamation\nI nodded as they hurried past\nBowed my head as they greeted my station\n\n“Madam Felana! Glad you made it safely\nWhat think you, our hard work?\nMade possible thanks to you and Madam Leli\nUs standing here such a perk!”\n\nI looked around, imagined potential\nThe Ananoma standing tall so long\nNodded to the Paladin beside me\n“Kyola would be proud of us; so strong”"
flavour_lelanan.11.a: "We Shall Reclaim These Lost Homes"

flavour_lelanan.12.t: "Afomapobo Stirs"
flavour_lelanan.12.d1: "It started with naught but rumble\nThe earth releasing a great groan\nThen the shaking began in earnest\nAnd great bursts of lava were thrown\n\nSky darkened with ash\nAs world set alight\nI led my Paladins to the mountain\nAll who could gave swift flight\n\nWe conjured our great magics\nContained lava as best we could\nMy priestesses rushed to help\nAll who had withstood\n\nIn the end the province was ruined\nAll was burnt to pitch black ash\nAfomapobo had stirred from its slumber\nFor we had been too brash."
flavour_lelanan.12.d2: "It started with naught but rumble\nThe earth releasing a great groan\nThen the shaking began in earnest\nAnd great bursts of lava were thrown\n\nSky darkened with ash\nAs world set alight\nPaladins rushed to the mountain\nAll who could gave swift flight\n\nThey conjured their great magics\nContained lava as best they could\nWhile priestesses rushed to help\nAll who had withstood\n\nIn the end the province was ruined\nAll was burnt to pitch black ash\nAfomapobo had stirred from its slumber\nFor we had been too brash."
flavour_lelanan.12.a: "Send Relief Immediately! Save as Many Lives as Possible!"

flavour_lelanan.13.t: "The Divinity Love Brings"
flavour_lelanan.13.d1: "The Enahelibe Ritual was most sacred\nSomething I had read about a great deal\nBut conducting it firsthand was a very different experience \nOne for which I had little zeal\n\nI recited the prayers to Lel perfectly\nWhile the Mihipha circled the slowly dancing pair\nTheir voice infused with a magic that excited the participants\nAnd readied them for the arousal which hung in their air\n\nThat was what made the ritual difficult for me\nThe couple so tender and loving and sweet\nThey danced as one so close together\nTheir hearts moving their feet\n\nAnd I could not help but think about my inability to participate\nIn the Enahelibe Ritual which brought great fertility\nThat was the cost of my being born in the opposite body\nI would never carry the life-creating ability\n\nAs the ritual continued on I set aside my feelings\nConsidered the magic hanging in the air\nHow else could it be used for good?\nI asked later in quiet prayer"
flavour_lelanan.13.d2: "The Enahelibe Ritual was our famous fertility ritual\nA Mihipha and priestess conducting an elaborate dance\nExciting the participating lovers and their hearts\nAnd preparing them for the sacred act of creating life; increasing their chance.\n\nUnfortunately the context of fertility the ritual carried\nMeant it was only conducted for couples who could create life\nLess orthodox couples like Leli and I\nConsidered less important than a common knife\n\nSo I may have been driven by spite\nWhen I lobbied to redirect the Mihipha away from the Ritual\nLeveraging Leli’s immense financial support of the Sisterhood\nTo get what I wanted; my anger was a touch habitual"
flavour_lelanan.13.a: "The Mihipha can support the Paladins"
flavour_lelanan.13.b: "The Mihipha can support the Priests"

flavour_lelanan.14.t: "Her Water Gives Us All Life"
flavour_lelanan.14.d1: "I entered the tent, looked around\nSo many Daughters of Lel running about\nTook in sight of so many wounded\nPained groans, disciplined orders, leaving no doubt\n\nEnemy soldiers as common as friendly\nReceiving medical care; gentle hands of the best\nPaladin poured holy water over deep cut\nOur foe’s pain subsided; blessed\n\nThe healing would take still many weeks\nFarther away a man’s arm lost to cannonfire\nTheir lost limb cauterized by divine blade\nPain softened by holy water given without desire\n\nIt was easy to show love to a friend or lover\nMuch harder to show love to a foe\nYet if we were to spread love to the world\nWe would need to mend all wounds we know"
flavour_lelanan.14.d2: "I entered the tent, looked around\nSo many Daughters of Lel running about\nTook in sight of so many wounded\nPained groans, disciplined orders, leaving no doubt\n\nEnemy soldiers as common as friendly\nReceiving medical care; gentle hands of the best\nPaladin poured holy water over deep cut\nOur foe’s pain subsided; blessed\n\nThe healing would take still many weeks\nFarther away a man’s arm lost to cannonfire\nTheir lost limb cauterized by divine blade\nPain softened by holy water given without desire\n\nIt was easy to show love to a friend or lover\nMuch harder to show love to a foe\nYet if we were to spread love to the world\nWe would need to mend all wounds we know"
flavour_lelanan.14.a: "Even our Enemies Deserve Her Love"


flavour_lelanan.80.t: "Aelentiri Ixora"
flavour_lelanan.80.d1: "“How fare the Aelantir White Flowers?”\nI asked Leli as we sat one night\nFelana humming soothing song beside us\nSitting beneath room’s soft light\n\nLeli looked up from ledger\nLong hours working on her face\nI took the book from her; set aside\nShe smiled at me with her divine grace\n\n“They are doing better than ever hoped, Kyola\nMihipha travelling to the colony swiftly\nOnce they set up White Flower Farms there\nWe’ll be producing much in Aelantir; making history!”\n\nI smiled, her shine; my heart soars\nGave her soft kiss before picking her up with ease\n“Exquisite news, my dear; a reward”\nSet her on our bed, tuck her in. “Rest, Leli, please…”"
flavour_lelanan.80.d2: "I rubbed my tired eyes, looked at Leli\nHer face bore weariness greater than my own\nClosed the ledger before me\nAnd rubbed her back as she let out a groan\n\nHer eyes droop shut; exhausted\n“My love… Let’s get some rest…” I to her\n“We’ve done enough work for today”\nLeli nods drowsily, smiling faintly, speech a slur\n\n“You’re right... Flowers are okay with rest…”\nI took her hand, guided her to bed\nBlew out candles before joining her\n“I’m so proud of you, Leli…” I murmured to her head"
flavour_lelanan.80.a: "“The flowers that you have planted will grow even while you rest.”"
flavour_lelanan.80.b: "“And Kyola would be so proud too…”"

flavour_lelanan.81.t: "Alone Again"
flavour_lelanan.81.d: "I always knew it would happen one day\nWhen my wives aged faster than I\nMy divine Oath extended my lifespan\nKept me safe from time’s cruel cry\n\nYet as I stood over their bodies\nI wept like I never had before\nFor my great lovers were gone\nAnd now alone I had to do yet more\n\nEven now their hands entwined sweetly\nTheir love deeper than death\nAnd as I dropped to my knees at their side\nA part of me wished for that one final breath\n\nBut my work was not yet done\nLel’s power still flowed strong through me\nOur Great Matriarch asked for more\nAnd if I didn’t answer, what would I be?\n\nSo I finally left that room\nSpent my nights all alone\nI honoured their deep Love\nAnd built yet more stone by stone"
flavour_lelanan.81.a: "The Hole Never Goes Away, Only Gets Smaller…"

magic_project_lelanan_project_1.0.t: "To Share the Gift of Life"
magic_project_lelanan_project_1.0.d: "To Share the Gift of Life"
magic_project_lelanan_project_1.0.a: "To Share the Gift of Life"

magic_project_lelanan_project_1.1.t: "Pursuit of Blessings"
magic_project_lelanan_project_1.1.d: "Myriad new relationships, each blessing upon all\nAll shapes, sizes, genders, surrounding like comforting shawl\n\nBut we cannot deny the issue, Lel asks all create life\nYet these relationships bear no children, no matter the husband or wife\n\nThe Mihipha have come forth, with deeply ambitious plan\nTo allow all create life together, no matter dwarf or troll, woman or man:\n\nFirst we shall dive our annals, sort out our knowledge\nMayhaps our great institutions will help, the Mihipha or their college\n\nNext we seek the Lizardfolk, whether foreign or abroad\nTheir eggs are truly wondrous, a miracle by which we are awed\n\nThen the half-races existing, testaments to our divine mission\nLet us find somewhere they are free, and make our own addition\n\nThe Magisterium is vaunted, the Old Damenath vaults renowned\nIf they deny our access still, there is always something else to be found\n\nHaless is a land of mystics, of secrets most profane\nWhether migrants or natives still, let us not shy from the arcane\n\nOnce knowledge is collected, no secret left alone\nDamestear will be needed, others or our own\n\nThen we hope dearly, our achievement will ring out\nAnd our love for all the world, will never again be in doubt"
magic_project_lelanan_project_1.1.a: "Let us collect knowledge from across Halann!"

magic_project_lelanan_project_1.2.t: "Our Own Knowledge"
magic_project_lelanan_project_1.2.d: "A book, a letter, a song\nA record, a carving, a spell\nOur very own Mihipha\nSo much knowledge they can tell\n\nThey gather at the college\nThe first and greatest assembly\nTransmutation is the answer!\nWhat other way could there be?\n\nThe agreement is unanimous\nTomes studied, copied, learned\nTo succeed in our holy mission\nInto minds the knowledge burned"
magic_project_lelanan_project_1.2.a: "We Will Have to Travel Abroad!"
magic_project_lelanan_project_1.2.b: "Our Own Mihipha Are Well Versed!"
magic_project_lelanan_project_1.2.c: "The College Holds What We Need!"

magic_project_lelanan_project_1.3.t: "Approaching the Lizardfolk"
magic_project_lelanan_project_1.3.d: "And egg holds boundless potential\nThe lizardfolk know this well\nSo we seek their novel knowledge\nThe distinctions they can tell\n\nThey say heat can change their sex\nLike such a simple thing\nWhat can we learn from this matter?\nWhat will this lesson bring?\n\nA Lizardfolk Priestess gives her egg\nSo we might learn from it directly\nAnd with the knowledge we learn here\nWe invent this magic correctly"
magic_project_lelanan_project_1.3.a: "Their Knowledge is Another Piece of Our Puzzle"
magic_project_lelanan_project_1.3.b: "Our Own Lizardfolk Can Help!"
magic_project_lelanan_project_1.3.c: "Our Friends to our East Offer Support!"

magic_project_lelanan_project_1.4.t: "Studying Half-Race Biology"
magic_project_lelanan_project_1.4.d: "We seek all make life together\nWith some already able\nIt behooves us to ask them\nIf they can contribute to our fable\n\nAn orc and human pairing\nThey answer all our questions\nLet us speak to their young daughter\nEven offer their suggestions\n\nA rare elf hobgoblin couple\nVolunteer with their whole family\nYet we find them to be mules\nNot quite right, their anatomy\n\nBut they’re proof that we can do this\nThat our mission is ordained\nWe must solve the muling problem\nAnd no longer be restrained"
magic_project_lelanan_project_1.4.a: "Their Knowledge is Another Piece of Our Puzzle"
magic_project_lelanan_project_1.4.b: "Let Us Talk To Our Own Peoples!"
magic_project_lelanan_project_1.4.c: "Our Friends Abroad Offer Support!"

magic_project_lelanan_project_1.5.t: "Approach the Magisterium"
magic_project_lelanan_project_1.5.d: "They turn their noses up at us\nConsider our mission well beneath\nBut we turn their minds towards us\nGifts upon them we bequeath\n\nTheir vaults are truly endless\nAll Cannor’s knowledge in our hands\nWe pour over tomes and annals\nScrolls and spells to further plans\n\nOthers eschew their support\nPursue a different path\nThe best in loving all though\nIs comparing our joint math"
magic_project_lelanan_project_1.5.a: "Their Knowledge is Another Piece of Our Puzzle"
magic_project_lelanan_project_1.5.b: "We Can Perform Our Own Research"
magic_project_lelanan_project_1.5.c: "The Magisterium Accepts Our Request!"

magic_project_lelanan_project_1.6.t: "The Knowledge of Haless"
magic_project_lelanan_project_1.6.d: "Haless is a land most arcane\nKnowledge everywhere abound\nEven the spirits whisper secrets\nBy Lel, let them all be found\n\nFrom the mystics of the Xia\nAnd their bodily magic\nTo the Oni in their temples\nAnd their history most tragic\n\nWe shall talk to the Halessi\nShare with them a cup of tea\nHear their explanations\nHow their magic came to be"
magic_project_lelanan_project_1.6.a: "Their Knowledge is Another Piece of Our Puzzle"
magic_project_lelanan_project_1.6.b: "Let Us Talk To Our Own Peoples!"
magic_project_lelanan_project_1.6.c: "Our Friends in Haless Offer Support!"

magic_project_lelanan_project_1.7.t: "Damestear and Life"
magic_project_lelanan_project_1.7.d: "The knowledge is assembled\nDeep secrets made so free\nAll signs point to one thing\nWithout which our dream cannot be\n\nDamestear is the secret\nThe key to our great miracle\nIt can alter physiology\nTransmutation made empirical\n\nFrom the very stars it comes\nProvidence so divine\nOnce we have secured it\nMotherhood will be mine!"
magic_project_lelanan_project_1.7.a: "Damestear, as Always, Proves Critical"
magic_project_lelanan_project_1.7.b: "We Must Import More Damestear From Abroad!"
magic_project_lelanan_project_1.7.c: "We Can Use Our Own Supply!"

magic_project_lelanan_project_1.10.t: "Love for All the World!"
magic_project_lelanan_project_1.10.d1: "The doctors told me not to\nThe Mihipha warned of danger\nBut all my life I had wanted\nTo see my baby in its manger\n\nSo I pushed past their objections\nStepped into that old dance\nFaced my gentle friend\nAnd fell into a trance\n\nMonths it took long after\nMagic still subject to time\nWhen I gazed down at my daughter\nI heard a gentle chime\n\nI wept for so long after\nShe looked just like my gone lovers\nMy little darling child\nMy heart finally recovers"
magic_project_lelanan_project_1.10.d2: "I held Leli’s hands\nAs we danced that sacred dance\nHeartbeats bound in sync\nLulled us to great trance\n\nAfter we made love\nAnd felt it deep within\nKyola’s love was all around\nAlmost still on our skin\n\nMonths it took long after\nMagic still subject to time\nWhen we gazed down at our daughter\nWe heard a gentle chime\n\nWe wept for so long after\nShe looked just like our gone wife\nOur little darling child\nWe finally return to life"
magic_project_lelanan_project_1.10.d3: "The new dance was ecstatic\nAllowing for all us three\nWe felt the magic in us\nAnd knew this was meant to be\n\nI bore our great child\nDelighted beyond belief\nAfter many years of fighting\nIn my belly grew relief\n\nShe was the strongest of us all\nOur child born of pure love\nWe knew she would do great things\nThe one I had always dreamed of\n\nWe closed our eyes as she played\nOur bodies together curled\nFinally rested our old bones now\nAnd felt §VLove§! for All the World"
magic_project_lelanan_project_1.10.a: "Let All Know the Gift of Life no Matter Their Love!"


flavour_lelanan.100.t: "The First Love Poem"
flavour_lelanan.100.d: "Oh Kolo, how your fires rage//passion warms\nYour spirit… (missing) …tamed//calmed\nYou touched my heart//chest like no other\nAnd lit my world//soul on fire\n\nOh Leli, how you soothe//tire\nHow your lips like a… (missing)\nIn your embrace my fires//passions wane\n(Line missing)\n\nParagraph Missing\n\nThe sun itself pales in your radiance\nThe stars twinkling, seeking your attention\nMy affections endless now…\n…attention my sweet nectar//honey is\n\nOur children borne… (missing)\nEach a new star in the so free sky\nFor your likeness beautifully they carry\nAnd your grace they remind me… (missing)\n\nSo let our sugary//sweet love be known to all\nAs timeless as eternity//Nakintra\nAnd our children shall be a great Nakavy (family)\nSo happily crowded… (missing) … the dinner table"
flavour_lelanan.100.a: "Maybe one day we will find the rest."

flavour_lelanan.101.t: "New World, New Love"
flavour_lelanan.101.d: "Aelantir was a land of great mystery\nBut the mission was perfectly clear\nSo we sailed due straight West\nReached those lands without fear\n\nBut when explorers dropped anchors\nAnd stepped on distant shores\nThey stumbled right into a city\nThey found houses, even doors!\n\nThey were greeted; pensive caution\nFirst Halflings natives ever seen\nOne approached the Explorer with joy\nMade a great big scene\n\nWe could not understand their language\nBut knew when one spoke of love\nWhile the rest looked on in surprise\nOur Explorer removed their glove\n\nA kiss on the Ruinborn’s hand\nA smile shared between them\nWas all it took to begin\nThe creation of a world-crossing gem"
flavour_lelanan.101.a: "Everywhere we go, People Love all the Same"

flavour_lelanan.102.t: "Love Between Victims"
flavour_lelanan.102.d: "Not all Love was mundane\nFor Halann was a fraught world\nThe Shadow Curse our greatest foe\nBy Hags’ fists hearts twisted, curled\n\nYet the Ashanna discovered a way\nTo shake their deadly curse\nAnd when they met a Shadow Troll\nThey knew they had it even worse\n\nSo they sang a gentle song for them\nThe troll felt their heart so calmed\nThey gently took each other’s hands\nTogether their hearts were balmed\n\nBut Hags tolerate no dissent\nSo they fought and ran and fled\nAway from that blighted curse\nFor their love they would be bled\n\nThey made it to our arms\nWe welcomed them in so dearly\nMended their wounds and cuts\nFound they loved each other sincerely"
flavour_lelanan.102.a: "Their Love Freed Them Both"

flavour_lelanan.103.t: "A Mutual Love of Food"
flavour_lelanan.103.d: "With Halfling and Dunesole Ogre\nNot all Love was romantic in source\nSometimes mutual Love was all needed\nTo sand down a relationship; starts so coarse\n\nThe Halfling was a renowned chef\nTraveling Sarhal in search; a new ingredient\nBut to the towering desert Ogre\nHe himself was a meal; expedient\n\nThe Halfling made an offer\nA bargain to save his life\nWith his great cooking skills\nSurely he could find the ogre a wife\n\nNow it’s been thirty years since\nAnd the two are suspectly still single\nBut you’ll find them in the Halfling’s restaurant\nAlways willing to mingle"
flavour_lelanan.103.a: "Lel’s Love Came in Many Forms"

flavour_lelanan.104.t: "Forbidden Love"
flavour_lelanan.104.d: "Halann was not so kind as we\nAnd oft Love found opposition\nSuch as when a harimari noble fell\nFor someone of much lower condition\n\nShe met that hobgoblin at night\nThey hid away their taboo love\nFor a thousand rules they were breaking\nOrdained by those higher above\n\nBut the flame in their hearts could not die\nAnd it grew till it engulfed their souls\nSo they fled their oppressive worlds\nFought their way out of their shared holes\n\nThey made it all the way to Lelanàn\nArriving one quiet morning in monsoon rain\nAnd as they held each other’s hands openly\nThey knew: they were free from that pain"
flavour_lelanan.104.a: "Their Love Was Free to Flourish With Us"

flavour_lelanan.105.t: "A Love Never Forgotten"
flavour_lelanan.105.d: "Halann was not so kind as we\nAnd oft Love found opposition\nSuch as when a harimari noble fell\nFor someone of much lower condition\n\nShe met that hobgoblin at night\nThey hid away their taboo love\nFor a thousand rules they were breaking\nOrdained by those higher above\n\nBut the flame in their hearts could not die\nAnd it grew till it engulfed their souls\nSo they fled their oppressive worlds\nFought their way out of their shared holes\n\nThey made it all the way to Lelanàn\nArriving one quiet morning in monsoon rain\nAnd as they held each other’s hands openly\nThey knew: they were free from that pain\n\nNone lived so long as those of Elvish blood\nA blessing so many sought\nYet it was easy for us to think\nHow a lifespan end quite fraught\n\nAs we built ties with the elves of Cannor\nSo many had tales; wished to share\nAnd they traveled down to Lelanàn\nSeeking help with their deep despair\n\nFor an Elf who loved another\nTheir lifespan could become a curse\nAs they watched their companions die\nWhat fate could be any worse?\n\nSo we carefully recorded their stories\nHelped them preserve love lost\nAnd as they shared their past with others\nFrom their hearts melted that cold frost"
flavour_lelanan.105.a: "Time Did Not Treat All Love Fairly"

flavour_lelanan.106.t: "Love Amongst Ashes"
flavour_lelanan.106.d: "Collecting Tales from Escann was difficult\nThe hatred there running so deep\nBut as we wandered that war-torn land\nWe found four strange people tending their sheep\n\nA goblin, orc, human, and someone inbetween\nSuch a peculiar sight together they did make\nBut as we approached them for their story\nTruly, it was impossible for us to make a mistake\n\nThey told us of their village\nWhere the victims of the Greentide hid\nThey found comfort in each other\nAnd eventually, share love they did\n\nBut they were hated for their tolerance\nChased from their homes by an angry mob\nNow they wander below the Serpentspine\nUnable to find a single job\n\nSo we brought them back to Lelanàn\nWhere they found their final place\nAnd as they settled down for good\nThey were a beautiful mixture of race"
flavour_lelanan.106.a: "They Were Welcomed Here With Open Hearts"

flavour_lelanan.107.t: "Small hearts, Big Love"
flavour_lelanan.107.d: "They did not always love each other so\nIn fact it started with a collapsing home\nShe tried to evict the annoying kobold\nHe tried to blow up the blasted gnome\n\nBut they fought and tangled and competed\nFound a fondness they would smother\nBut in time their anger softened\nIf sometimes they still hated each other\n\nBut their romance was a deep taboo\nTheir biologies a total unmatch\nAnd when they were discovered one day\nTheir joint work was dumped down the hatch\n\nSo they followed the artificer tradition\nFled where they could be free\nHeld one another as they sailed\nCame to us across Lel’s great sea"
flavour_lelanan.107.a: "Love was Love, no Matter Our Differences"

flavour_lelanan.108.t: "An Unlikely Loving Couple"
flavour_lelanan.108.d: "It started from afar\nBoth watching in secret shyly\nUnaware of the other’s feelings\nBut the gnoll was very wily\n\nThey came up with a song\nTruly terrible to the ears\nAll the others hated it\nYet the harpy shed great tears\n\nBut gnolls are incompatible mates\nAny harpy worth their salt knows this\nThe Roost exiled both of them\nDenied them their newfound bliss\n\nThey wandered together, searching for home\nBut for two ‘monsters’ the world is a cold place\nUntil finally they heard of Lelanàn\nAnd thought just maybe, could make their case\n\nYou can find them in the Northern district\nAlways happy to talk about their tale\nJust remember why they’re there\nAnd share with them a cup of ale"
flavour_lelanan.108.a: "How could we Not Admire Such Love?"

flavour_lelanan.109.t: "Forbidden Plains, Forbidden love"
flavour_lelanan.109.d: "When they first met in battle it was random\nWhen they met a second time it was chance\nWhen they met the third it was fate\nAnd by the fourth; they knew the dance\n\nBoth battlefield medics\nPassing as wounds tended\nUntil one day the centaur was hurt\nThe human approached, enemy mended\n\nThey crossed the line that day\nLooked in each other’s eyes\nAnd ever since that moment\nCompletely changed their lives\n\nFar away they fled\nTheir love so deeply forbidden\nNone would know their story\nWhich they fought to keep well hidden\n\nUntil they found themselves in Lelanàn\nHaving crossed the world to be free\nAnd if you wish to talk to them\nRemember: the centaur likes tea"
flavour_lelanan.109.a: "With us Their Love Finally Found Acceptance"

flavour_lelanan.110.t: "A Love Older Than Most"
flavour_lelanan.110.d: "Some Tales came to us themselves\nSuch with the dwarven and elven mages\nWhen approached and asked to help\nThey agreed, put their story on our pages\n\nThey both worked for the Magisterium\nKeeping toil and love apart\nBut as their love crossed century old\nThey decided, a new course chart\n\nThey retired all the way in Lelanàn\nArriving hand-in-hand\nNow they teach at the Mihipha College\nTheir love no longer banned"
flavour_lelanan.110.a: "Their Love is an Example to us All!"

flavour_lelanan.111.t: "Love is Like Magnets"
flavour_lelanan.111.d: "Infinite demand, but finite Damestear\nThat is the Mage-Artificer Paradox\nYet Love is made and given freely\nEven between those trapped in the box\n\nThe Mage was ambitious, seeking master the world\nThe Artificer content, seeking soften life\nYet two sides ever at each other’s throats\nTheir fields filled with strife\n\nBut the two shared an idea\nAnd their cooperation started\nIt blossomed into a great vision\nThe two could never be parted\n\nEven as friends bickered and fought\nThey worked ever staunchly on\nTheir dream bringing them together\nAs they stayed up until dawn\n\nBy sharing their split resources\nThey forged something new\nAn example to us all\nAnd gift for Lel’s chosen few"
flavour_lelanan.111.a: "While their Compatriots Fought, They Could Only Love"

flavour_lelanan.112.t: "The Tides of Love"
flavour_lelanan.112.d: "Their meeting was pure chance\nCaptain falling into stormy sea\nMerfolk swimming by\nAccident they did see\n\nThe Captain was stranded in the water\nTheir ship continuing ‘til gone\nSo the Merfolk helped them to shore\nAnd they talked on and on and on\n\nThey shared a great deal more in common\nThan one would ever expect\nAnd even once Captain rescued\nEach year they came back and checked\n\nThey would sit in the shallows then\nHold each other in their arms\nBut there was nowhere they could share\nNowhere to indulge in the other’s charms\n\nBut when Ocean Ananoma was complete\nThey both rushed ask the other\nNow they live on the fourteenth pier\nAlong with the Merfolk’s mother"
flavour_lelanan.112.a: "The Ocean Ananoma Brought Them Together!"

flavour_lelanan.113.t: "A Strange love"
flavour_lelanan.113.d: "The Fey are the most beautiful force\nEphemeral, powerful, aloof\nUninvolved with the world\nSometimes they change, though\n\nThey start writing love poems\nDelivering them to the doorstep of nosy mages\nTalking about their gorgeous elven lover\nAnd the distant Deepwoods from which they came\n\nThe Archfey were not pleased\nThat they would fall in love with a mere elf\nSo our Fey hero valiantly defended their lover\nBut tragically, was forced to swiftly flee\n\nThey conjured an old connection\nEmerged so far to the South\nBut their lover had made it with them\nAnd the weird Island Halflings nearby seemed safe\n\nSo I thank you for giving us a home\nAnd protecting us if the Archfey try to destroy our love\nIn return I have attached some notes on magic\nAnd will always brag about my lover if you wish\n\n(Attached to the poem is a surprisingly good sketch of a wood elf)"
flavour_lelanan.113.a: "Love is Love, Even if we do Not Understand"

flavour_lelanan.114.t: "Can Love be Built?"
flavour_lelanan.114.d: "When our first Homunculus was completed\nDeep questions immediately arose\nAs they spoke and expressed thought\nEven our best philosophers froze\n\nCan an artificial life feel Love?\nCan it feel anything at all?\nWhere do we draw the line?\nWhere do we build that wall?\n\nWhen a cat greets the return of its caretaker\nIs that not an expression of Love?\nWhen a dog is excited for its caretaker waking\nIs that not an expression of Love?\n\nWhy not extend Love to all of Lel’s Life?\nWhy draw lines where none exist?\nCan not the Homunculus think?\nDoes its existence not persist?\n\nLel holds the creation of Life through Love\nAbove all else in her portfolio\nAnd did not the Mihipha pour Love\nAs this Life they did grow?"
flavour_lelanan.114.a: "Can we Judge if They Can Love?"

flavour_lelanan.115.t: "To Love a Paladin"
flavour_lelanan.115.d: "“We travel with Mother everywhere\nHer mission divinely ordained\nEven as the moving is difficult\nWe could be no better trained”\n\n“My wife is a mighty woman\nI could never be more proud\nI clean her armour and weapons\nSo with the kids she can play so loud”\n\n“Mom is the coolest paladin ever\nLike a hero from a bedtime story\nSo when I grow up one day soon\nI, too, will earn great glory!”\n\nThey were the family of a paladin\nTheir lives rife with worry and stress\nYet in them she found great strength\nTheir small wounds she would bless\n\nI thought of Leli and Kyola\nHow our own small family was the same\nThose long nights we spend together\nAre the source of a Paladin’s flame"
flavour_lelanan.115.a: "A Paladin is Their Family"

flavour_lelanan.116.t: "A Love Most Alien"
flavour_lelanan.116.d: "A family of new arrivals\nCome from so far East\nTraveled beyond the ocean\nCould not quite partake in our welcoming feast\n\nA dozen of them there were\nStrangely elven in design\nNeither eat nor sleep nor breathe\nWith hearts that were most benign\n\nCommunication was fraught\nYet we never lost our hope\nAnd eventually they explained\nThey were much more than a homunculus trope\n\nA great big family they were\nEven without the need to produce life\nAnd together they had survived\nEndured Insyaa’s deadly strife\n\nWe presented a gift for their stories\nAs they settled in quite quick\nSomething that reminded us of them\nAn Everburning Candlestick"
flavour_lelanan.116.a: "They Weren't so Different, Them and us"

flavour_lelanan.117.t: "The Love of Storytelling"
flavour_lelanan.117.d: "Hello, o’ gentle reader\nI would like to thank you\nFor listening to my story\nAnd building something new\n\nI have always loved stories\nAnd Halann has so many\nSo I am proud to humbly add\nMy own to this lovely tapestry\n\nI hope you enjoyed the experience\nAnd had fun spreading much Love\nI hope to tell more stories one day\nBut for now, I am proud of this one\n\nHave a good day!\nEnjoy a swell cup of Water\nAppreciate the wonder of Life\nAnd most of all: live with §VLove§!"
flavour_lelanan.117.a: "Thank you! <3"


