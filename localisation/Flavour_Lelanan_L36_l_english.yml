lelanan_relief_unupgraded_tt: "Costs 25 §VLove§!\n\nWe will distribute food and other aid to our devastated provinces, reducing devastation in all our owned provinces by §G25%§!.\n\nWe will additionally gain a §GLarge Tolerance Increase§! for all races within our borders."
lelanan_relief_upgraded_tt: "Costs 25 §VLove§!\n\nWe will distribute food and other aid to our devastated provinces, reducing devastation in all our owned provinces by §G25%§!.\n\nWe will additionally gain a §GLarge Tolerance Increase§! for all races within our borders.\n\nAll provinces that have the §VLabour of Love§! modifier gain the §YLovers' Road§! permanent modifier and lose the §VLabour of Love§! modifier, granting:\n  §G+30%§! Local Movement Speed\n  §G-15§! Local Governing Increase Cost\n  §G-20%§! Local Governing Cost\n  §G+10%§! Local Supply Limit\n  §G+4§! Local Trade Power"
lelanan_festival_unupgraded_tt: "Costs 50 §VLove§!\n\nHolding a Grand Festival across the Isles will grant us §Yfive random development§! across our provinces, randomly §Yspread a small minority§! of each minority present in our capital, and §Yincrease the size§! of every minority in our capital!\n\nWe will additionally gain the §YFestival of Love§! country modifier for §Y5§! years, granting:\n  §G+10%§! Sailor Recovery\n  §G+10%§! Manpower Recovery.\n\nGrand Festivals can only be held §Yonce every five years§!."
lelanan_festival_upgraded_tt: "Costs 50 §VLove§!\n\nHolding a Grand Festival across the Isles will grant us §Y5 random development§! across our country, spread a small minority of each minority present in our capital, and increase the size of every minority in our capital!\n\nWe will additionally gain the §YFestival of Love§! country modifier for §Y5§! years, granting:\n  §G+10%§! Sailor Recovery\n  §G+10%§! Manpower Recovery.\n\nGrand Festivals can only be held §Yonce every five years§!.\n\nAll provinces that have the §VLabour of Love§! modifier will lose the §VLabour of Love§! modifier, gaining in exchange a §Ysmall minority of every integrated race§!, and if they have not yet gained development from this interaction then they will gain §Yone of each development§!."
lelanan_bless_unupgraded_tt: "Costs 75 §VLove§!\n\nWe will bless the equipment of the Paladins of Lel, granting us a permanent (stacking) §G-0.05§! Monthly Autonomy (up to a limit of -0.85 per month).\n\nWe will additionally gain the §YBlessed Paladin Armaments§! country modifier for §Y10§! years, granting:\n  §G+5%§! Marine Discipline\n\nOur Paladins can only be blessed §Yonce every ten years§!."
lelanan_bless_upgraded_tt: "Costs 75 §VLove§!\n\nWe will bless the equipment of the Paladins of Lel, granting us a permanent (stacking) §G-0.05§! Monthly Autonomy (up to a limit of -0.85 per month).\n\nWe will additionally gain the §YBlessed Paladin Armaments§! country modifier for §Y10§! years, granting:\n  §G+5%§! Marine Discipline\n\nOur Paladins can only be blessed §Yonce every ten years§!.\n\nAll provinces that have the §VLabour of Love§! modifier gain the §YLel's Blessed Waters§! permanent modifier and lose the §VLabour of Love§! modifier, granting:\n  §G+25%§! Local Sailors\n  §G+0.5§! Local Goods Produced"
lelanan_enhalibe_locked_tt: "We will unlock this mechanic with the §VTo Share the Gift of Life§! Magical Project."
lelanan_enhalibe_unlocked_tt: "Costs 100 §VLove§!\n\nThe province of Lelanàn gains §Y1 of each development§!, and we will then gain §Y5 of each monarch power§! per matching development of the province of Lelanàn.\n\nAdditionally, our heir will §Ygain 1 to each of their stats§!.\n\nThe New Enahelibe Ritual can only be performed §Yonce every twenty years§!."
lelanan_enahelibe_unlocking_tt: "We will unlock §YThe New Enahelibe Ritual§! government mechanic!"
lelanan_tales_tt: "Tales of Halann's Love"
lelanan_tales_locked_tt: "We will unlock this mechanic with the mission §YAn Open Heart§!"
lelanan_tales_unlocked_tt: "We are collecting love stories from across Halann for our people to enjoy by sending out Mihipha along with our diplomats to §Gimprove relations§! in places of interest.\n\nWe have identified the following §YTales of Halann's Love§! for our collection:\n[Root.TalesTriggerKyolaStory] Listened to the §YFirst Love Poem§!\n[Root.TalesTriggerRuinbornStory] Listened to the story of the §YRuinborn§!.\n[Root.TalesTriggerLizardfolkStory] Listened to the story of the §YLizardfolk§!.\n[Root.TalesTriggerFangaulaStory] Listened to the story of the §YFangaulans§!.\n[Root.TalesTriggerHalessStory] Listened to the story of the people of §Y[4420.Province.GetName]§!.\n[Root.TalesTriggerMunasStory] Listened to the story of the people of §Y[52.GetName]§!.\n[Root.TalesTriggerVrorenStory] Listened to the story of the people of §Y[740.Province.GetName]§!.\n[Root.TalesTriggerRoyvibobbStory] Listened to the story of the people of §Y[167.Province.GetName]§!.\n[Root.TalesTriggerGnollHarpyStory] Listened to the story of the §YHarpies and Gnolls§!.\n[Root.TalesTriggerForbiddenPlainsStory] Listened to the story of the people of the distant §YPlains§!.\n[Root.TalesTriggerMagesStory] Listened to the story of the §YMages of Old Damenath§!.\n[Root.TalesTriggerArtificerStory] Listened to the story of our own §YArtificers§!.\n[Root.TalesTriggerMerfolkStory] Listened to the story of our own §YMerfolk§!.\n[Root.TalesTriggerFeyStory] Listened to the story of the §YFey of the Khawit Forest§!.\n[Root.TalesTriggerHomunculusStory] Listened to the story of our §YHomunculus§!.\n[Root.TalesTriggerPaladinStory] Listened to the story of our §YExperienced Paladins§!.\n[Root.TalesTriggerMechanimStory] Listened to the story of those beyond the §YStormwall§!.\n\nOnce we have collected every love story clicking this button will give us one final story!"
