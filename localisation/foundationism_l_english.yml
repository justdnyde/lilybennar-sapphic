l_english:

 foundationism_vision_present: "Visions of the Present"
 desc_foundationism_vision_present: "With his horizontal pair of eyes, Golodh sees the present. All Insyaa is akin to the Holohana devoured by Vandamalos: greatness brought into the muck, and left there always dying, never dead. Insyaa will be cleansed."

 foundationism_vision_past: "Visions of the Past"
 desc_foundationism_vision_past: "With his vertical pair of eyes, Golodh sees the past. The Makers blazed a path to greatness, and every being in Insyaa was used as a stepping stone for that purpose. I-Numbe will do the same."

 foundationism_overseers: "The Overseers"
 desc_foundationism_overseers: "Golodh's Overseers are tools, but specialized ones. They direct their lessers to ensure every tool hews to the path only Golodh can see."
 foundationism_overseers.tt: "Converting provinces grants them a core for §G75%§! of the cost and §G25%§! of the time."

 foundationism_vitrues: "The Virtues"
 desc_foundationism_vitrues: "Not every tool can be put to fine, dextrous, tasks. For example, any tool that seems ill-fitted to being a tool. These are best suited to blunt ends. But the fungi of Vandamalos ever-hunger for more biomass, and thus the Virtues will always have a purpose in Golodh’s work."
 foundationism_vitrues.tt: "Converting removes additional §R3§! development."

 foundationism_shepherds: "Vandamlos’ Shepherds"
 desc_foundationism_shepherds: "The preferred meal of the fungi of Vandamalos is the constantly-regenerating flesh of the Holohana entrapped there. But other sources of biomass are necessary to meet I-Numbe’s needs in acid and alchemy, and the Harvesters ensure there is always a steady stream for the charnel pits."
 foundationism_shepherds.tt: "Converting provinces add a random development to a random owned province in §GVandamalos§!, Insyaa's Mushroom Forest."

 foundationism_divine_workshops: "The Divine Workshops"
 desc_foundationism_divine_workshops: "Golodh takes inspiration from the Makers’ holy past. The fungi of Vandamalos transmute any piece of the present into the necessary raw materials: acid, mycelium, rot. Using both, The Divine Workshops forge the future."
 foundationism_divine_workshops.tt: "We will §YPermanently§! gain §G0.25§! artificer capacity for every province converted, up to §G25§! artificer capacity."

 foundationism_golodhspeakers: "Golodhspeakers"
 desc_foundationism_golodhspeakers: "The Golodhspeakers say they are but mouthpieces for Golodh. And certainly, the only words that pass their voice-controllers are excerpts from Golodh. When asked how they decide which words to choose, they repeat his teaching: a tool can be complicated, a tool can be nuanced, a tool is still a tool."
 foundationism_golodhspeakers.tt: "Converting provinces to our religion will construct a §Gtemple§! and reduce §G25§! devastation."

 foundationism_gleaners: "The Gleaners"
 desc_foundationism_gleaners: "A tool can break, but it does not know it breaks. The gleaners find those that are broken, and give them a purpose anew: to be wielded in Golodh's hand."
 foundationism_gleaners.tt: "Converting provinces give us §G1500§! manpower."

 #Modifiers
 foundationism_artificery_mod_true: "§Y+[Root.divine_workshops_art_cap.GetValue]/25§! - The Divine Workshops\n"
 foundationism_modifier_remove_nationalism: "Small Kobold Robots"
 desc_foundationism_modifier_remove_nationalism: "No nationalism survive small kobold robots."

