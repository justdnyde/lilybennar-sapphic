 ###EVENTS###
 ############
 utubodi_unification.0.t:0 "Of Clouds and Control"
 utubodi_unification.0.d:0 "As one of the vanishingly few safe havens shielded from Hinuifauna rampages, the Utubodi Plateau has been settled by humans and ogres, and, for the last couple of centuries, even by kobolds.\n\nThe Plateau contains many settled tribes and states, but without question the most important of all is the realm that holds the remnants of the Kakunor Cloud City, the place of origin of all Skyfall Ogres inhabiting Insyaa, which crashed onto Insyaa on the Day of Ashen Skies.\n\nAlthough the true past of the Cloud City has been long forgotten, the people of the Utubodi Plateau struggle for control over this holy site in an attempt to prove their supremacy. Whomever manages to rebuild the city could unify all of the Plateau under their banner, and potentially venture past the Plateau to the lands beyond."
 utubodi_unification.0.a:0 "The city will one day be ours!"
 utubodi_unification.0.b:0 "The entire plateau revolves around our city."

 utubodi_unification.1.t:0 "Kakunor is Ours"
 utubodi_unification.1.d:0 "After such a long time coveting the Kakunor Cloud City, [Root.GetName] at long last has taken possession of this ancient site. Its previous stewards evidently were not equal to the task, thus the task of guarding the city now falls to us.\n\nThe Cloud City will be restored to its former glory under our care. The rest of the Utubodi Plateau is watching, and we intend to prove to them that we are capable of restoring the city not just for the glory of the wise and enlightened rule of [Root.GetName], but for the benefit of the entire Utubodi Plateau. Let them all see what becomes of the Cloud City under our control. Those with clear eyes to see and minds not clouded by impotent jealousy will draw their own conclusions."
 utubodi_unification.1.a:0 "Unification is within our grasp."

 utubodi_unification.3.t:0 "The Price of Progress"
 utubodi_unification.3.d:0 "A disaster has happened on one of our refurbishing sites! An entire scaffold has collapsed, destroying months worth of work in the blink of an eye, and severely injuring the workers, whose efforts will be needed to get the project back on track.\n\nOur overseers have been split into two groups with regards to how to best move forward. One group feels that the schedule of this crucial undertaking is already delayed enough that we must work as long and hard as it takes, with little to no regard to the safety of our workers.\n\nTheir counterparts argue that until the repairs are finished, not much productive work is likely to get done anyway, and that we should take the time to properly train our workers to ensure nothing like this happens again. They acknowledge, however, that this will cause the completion of the project to be pushed far into the future.\n\nThe only question now is who we side with."
 utubodi_unification.3.a:0 "Double the shifts. We finish in time - no matter the cost."
 utubodi_unification.3.b:0 "Take time to train the workers. No more blood for stone."

 utubodi_unification.4.t:0 "Echoes of the Past"
 utubodi_unification.4.d:0 "We may be the ones rebuilding the Cloud City now, but we are by no means the first ones to try. An excavation team has uncovered evidence of a prior attempt, which by now must lie centuries in the past. Some interesting finds have been discovered on the site which provide insights into how people in the past lived, but more importantly, we now have a better understanding of some of their more interesting building techniques.\n\nThere are sketches in the ruins showing figures using unusual and advanced techniques of metalworking which we know nothing of: they have likely been forgotten in the centuries since this failed reconstruction attempt. It would be difficult to redevelop them using the evidence uncovered here, but if we devoted enough time and energy to it we just might be able to do so.\n\nThe people of the past would not begrudge us adopting their ideas to hasten the realization of our shared goal of restoration. But if we did, would the city born from our work truly be ours alone?"
 utubodi_unification.4.a:0 "Use our plans."
 utubodi_unification.4.b:0 "Adapt the design."


 ##############
 ###TOOLTIPS###
 ##############
 utubodi_unification_own_button:0 "The Cloud City is under our control, but we have not gathered all the resources necessary to rebuild it. The workers must therefore work faster and the land must give more: we will achieve our glory whatever the cost."
 utubodi_unification_vassal_button:0 "A great amount of resources will be necessary to rebuild the Cloud City under our control. Why extract these resources ourselves when our vassals could provide us with them?"
 utubodi_unification_explanation_tooltip:0 "The Utubodi Outlook represents the clash of philosophies between the Utubodi humans and Skyfall Ogres on the Utubodi plateau. The humans seek glory, expansion, and immediate gratification regardless of the immediate cost, while the Skyfall Ogres are more willing to accept smaller returns over the long term, and tend to prioritize stability over all else.\nWe are currently leaning towards §Y[From.utubodi_unification_get_leaning_tt]§! in the struggle for §YUtubodi Unification§!, with a value of [From.getUtubodiKakunorKarmaValue].\nValues at or above §Y0§! will result in forming Dopabari when the struggle is over, while a value below §Y0§! will lead us to becoming Serulumatay when the §YKakunor Cloud City§! is fully rebuilt.\n\nGrain Collected: [From.getUtubodiKakunorGrainValue]/8\nLivestock Collected: [From.getUtubodiKakunorLivestockValue]/1\nWool Collected: [From.getUtubodiKakunorWoolValue]/3\nExotic Wood Collected: [From.getUtubodiKakunorExWoodValue]/2\nCloth Collected: [From.getUtubodiKakunorClothValue]/1\nIron Collected: [From.getUtubodiKakunorIronValue]/2\nIncense Collected: [From.getUtubodiKakunorIncenseValue]/2\nFur Collected: [From.getUtubodiKakunorFurValue]/1\nCopper Collected: [From.getUtubodiKakunorCopperValue]/1\nDamestear Collected: [From.getUtubodiKakunorDamestearValue]/1"
 utubodi_unification_explanation_tt:0 "In order to unify the Plateau, we must first gain control of §YKakunor§!.\n\nOnce we do, we will have to §Yrestore it§! to its former glory, allowing us to finally §Yunify the Plateau§! for good. To do so, we will have to extract §Gresources§! from our §Yown provinces§!, or delegate that task to our §Yvassals§!.\n\nDepending on our actions leading up to this, our people will either be swayed to the path of §YDopabari§!, or the path of §YSerulumatay§!."
 utubodi_unification_explanation_tt_short:0 "The Utubodi Outlook represents the clash of philosophies between the Utubodi humans and Skyfall Ogres on the Utubodi plateau. The humans seek glory, expansion, and immediate gratification regardless of the immediate cost, while the Skyfall Ogres are more willing to accept smaller returns over the long term, and tend to prioritize stability over all else.\nWe are currently leaning towards §Y[From.utubodi_unification_get_leaning_tt]§! in the struggle for §YUtubodi Unification§!, with a value of [From.getUtubodiKakunorKarmaValue].\nValues at or above §Y0§! will result in Dopabari when the struggle is over, while a value below §Y0§! will lead us to becoming Serulumatay when the §YKakunor Cloud City§! is fully rebuilt.\n"
 utubodi_rebels_tt: "The more we take from this province, the more §Rrebels§! will rise up!"
 ##############
 ###MONUMENT###
 ##############
 kakunor_cloud_city:0 "Kakunor Cloud City"
 kakunor_cloud_city_desc:0 "In the days of the Precursors, the Kakunor Cloud City was home to a group of Cloud Giants, who along with their ogre assistants kept the city afloat above the continent of Insyaa. This changed abruptly during the Day of Ashen Skies, as its disruptive effect on magic  caused the city’s levitation runes to fail. The Cloud Giants abandoned the city, but left behind a skeleton crew of ogres in a last-ditch attempt to keep the city afloat.\n\nThis failed, and the Cloud City with its ogres crashed in the Utubodi Plateau. These ogres, ancestors of the Skyfall Ogres, eventually left the city, dispersed across the Utubodi Plateau, and integrated with the indigenous humans.\n\nIn the centuries since, the ruins of Kakunor have remained on the Utubodi Plateau in decaying grandeur. The city will likely never fly again, but it holds great cultural significance to Skyfall Ogres and Utubodi humans alike, and its architecture could support a great metropolis of the Plateau if properly rebuilt and refurbished."

 kakunor_neighboring_claims_cb_effect.tt:0 "§Y[Root.Owner.GetName]§! gains a permanent claim on §YEvery Neighboring Province§!.\n§Y[Root.Owner.GetName]§! gains a §YSubjugation§! Casus Belli against §YEvery Neighboring Country§!."

