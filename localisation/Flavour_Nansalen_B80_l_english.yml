 cb_F80_enthroning_aras_desc: "While Karodir I Varamzuir is a prodigious mage and a skilled scholar, as a ruler he has... shortcomings as a ruler. It would be better for all involved parties were he to marry Araš Araškaysit and let her handle the day-to-day administrations, establishing a Personal Union with Akalšes as the senior partner."
