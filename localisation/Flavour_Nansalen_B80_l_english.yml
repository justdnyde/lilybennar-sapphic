 # Design, implementation, and writing by Magnive.
 # Content review by Rokade.
 # Balance review by Oxtrooo.
 # Writing review by Jeck
 # Coding review by Jothell, Raist, and okman
 # Writing by Magnive. 

 # Missions
 # Incident
 F80_mission_firanyalen_uprising_title: "Firanyalen Uprising"
 F80_mission_firanyalen_uprising_desc: "The Firanyalen flock pride themselves on being the flock of Firanya herself, and thus were the ones who fought the hardest against Ayarallen rule. Even after their initial subjugation, they continued to rage and resist. These embers of rebellion could be fanned into a flame that would prove quite useful when we ourselves are ready to rise against Ayarallen and claim our rightful place as rulers of the Harpy Hills."

 F80_mission_playing_on_rivalries_title: "Playing on Rivalries"
 F80_mission_playing_on_rivalries_desc: "Relations between Nanšalen and Hytiranyalen can hardly be called warm, owing not just to religious differences, but also a past struggle for becoming the Third Queendom, which Hytiranyalen, regrettably, won. Had they not foolishly stood in our way, history might very well have turned out differently, as Jaher and his Phoenix Legions would have found the Harpy Hills filled with devout followers of Surael ruling alongside Akalšes, rather than a heathen matriarchy that had subjugated large swathes of Bulwar.\n\nHowever, these are mainly ancient grievances born from wounded pride, taking second place to the most pressing issue of Ayaralleni rule, and while the flock of Nanša has its issues with that of Ayara, the rivalry between Ayarallen and Hytiranyalen is much more pronounced, and one we can take advantage of in our quest to free ourselves from Ayaralleni shackles."

 F80_mission_invite_the_namensar_title: "Invite the Namensar"
 F80_mission_invite_the_namensar_desc: "Among Harpies, the fact that Nanšalen embraced the Sun Cult is considered - at best - an oddity, and at worst something to be condemned and stamped out. Among the Bulwari, however? Despite a shared faith and our bonds with Akalšes, and while we are better than the gnolls, we are still viewed with mistrust and prejudice, rather than as potential allies.\n\nIf we wish to change this, the most important step will be to ensure that we are seen as truly devout in our faith. In order to do that, we will need to invite human and sun elven priests to our lands and show them the sincerity of our faith... and to help convince the wider community of the New Sun Cult that they ought to support us against Ayarallen, so that all of the Harpy Hills may follow Surael."

 F80_mission_a_divine_queen_title: "A Divine Queen"
 F80_mission_a_divine_queen_desc: "To be a Nanšaleni Matriarch is to strive to fulfil the Divine Duty of Queens, the mission to unite all Harpies under Surael and aid Akalšes in bringing peace to Bulwar. Simply overthrowing Ayarallen and becoming the predominant flock in the Harpy Hills is not sufficient to fulfil this duty, but it is a necessary first step, and once it has been completed, we will be able to start taking strides towards our true goal."

 F80_mission_standing_tall_title: "Standing Tall"
 F80_mission_standing_tall_desc: "Once, nigh a millennium ago, the future of Bulwar was bright. Under the rule of Ninšara I and Araš VIII, Nanšalen and Akalšes were able to aid each other in their conquests, until Nanšalen controlled much of the Harpy Hills, while Akalšes ruled most of Bulwar Proper. Yet, an alliance between Hytiranyalen and Lysinyalen managed to shatter this golden age, defeating Nanšalen and pushing back it to its core territories. And with Nanšalen weakened, Akalšes would soon crumble as well, succumbing to a civil war that might have been avoided had a strong Nanšalen been able to back the rightful heir.\n\nNow, it is time to reverse this misfortune, and ensure that history unfolds as it should have, a thousand years hence: with Nanšalen and Akalšes ascendant, poised to unite Bulwar so that a lasting peace may reign in Surael's Garden."

 F80_mission_our_southern_cousins_title: "Our Southern Cousins"
 F80_mission_our_southern_cousins_desc: "Traditionally, new matriarchs of Nanšalen are crowned by the King of Akalšes, and vice versa. Furthermore, many Nanšaleni matriarchs have taken consorts from the Araškaysit dynasty, meaning that the two dynasties effectively form a single extended family.\n\nThus, there is nowhere more natural to look for aid against Ayarallen than our southern cousins in Akalšes, who would assuredly be willing and eager to help us, even if they would need to do so against the express wishes of their overlords."

 F80_mission_right_words_right_ears_title: "Right Words, Right Ears"
 F80_mission_right_words_right_ears_desc: "The ruler of Varamhar, Karodir I Varamzuir, is possibly the most powerful mortal mage in Bulwar. While part of that can be ascribed to prodigious talent, realizing that talent has taken a great deal of studying - which continued even after he ascended to his current position.\n\nKeeping up with his studies has led to Karodir relying on a suite of advisors... including the rulers of Akalšes. As such, if we request aid against our sorcerous overlord, Karodir will turn to his Akalšesi subjects for advice, who would be all too happy to recommend that he pledge to help us."

 F80_mission_wedding_preparations_title: "Wedding Preparations"
 F80_mission_wedding_preparations_desc: "Dealing with Ayarallen is fairly straightforward, as, even if one or two of the more pragmatic elven polities might be willing to ally with them, they are by and large outsiders in the Bulwari political sphere. Varamhar, however, is not, and were Akalšes to rise up against their sun elven suzerain, intending to overthrow them and annex their lands, even sun elven polities not explicitly allied with Varamhar might very well intervene, if only to prevent their own subjects from getting similar ideas.\n\nThus, rather than doing so, a plan has been hatched for queen Araš X of Akalšes to marry Karodir, and count on the mage's relative disinterest in the tedium of ruling to ensure that she would be the dominant party in the marriage. This plan is moderately complicated by the fact that Karodir already is married, but some excuse can be fabricated to justify why his current queen should be set aside...\n\nAlbeit actually having her replaced with Araš might well require a judicious use of force, but masked as a mere case of dynastic opportunism it will enable Akalšes to rise without incurring the wrath of even the sun elven realms not allied to Varamhar."

 # Post-incident
 F80_mission_our_duty_title: "Our Duty"
 F80_mission_our_duty_desc: "Simply bringing the other Firanyan Harpies under our rule is but one step in fulfilling the Divine Duty of Queens. Converting them? That is another. One day, all Harpies within the Harpy Hills will be shown the Glory of Surael, firmly establishing Nanšalen as a realm devoted to the teachings of the New Sun Cult. But for now, our conversion efforts should be focused on the so-called 'Illustrious Matriarchies', the seats of the most powerful and prominent Firanyan Matriarchs: Ayarallen, Lisinyalen, Hytiranyalen, Mišarallen, and Firanyalen.\n\nOnce we have bent these roosts to our will, it will be far easier to convert the many lesser flocks throughout the Harpy Hills."

 F80_mission_royals_not_monsters_title: "Royals, Not Monsters"
 F80_mission_royals_not_monsters_desc: "Among the Bulwari, we are known as the 'Royal Harpies', due to our long ties with the royal family of Akalšes... at least when they want to flatter us. In times past, the moniker has largely served as a cruel jape, highlighting how far we have fallen from the heights we once reached.\n\nNow, though? Time, piety, and the rising might of our kin in Akalšes has changed that perception, and to celebrate that, it is time for a second coronation ceremony of our ruler, one that will be attended by notables and envoys from all across Bulwar. Such attendance will lend credibility to our claim that the Harpy Hills are the rightful domain of harpies, as well as ensure that our envoys will henceforth be treated with dignity and respect throughout Bulwar."

 F80_mission_our_song_title: "Our Song"
 F80_mission_our_song_desc: "While only harpy mages can directly enforce their will upon the world through the Song of Firanya's Call, one does not need to be a mage to change the world with the song. Each and every flock worth the name has their own version of the Song, for each and every matriarchy has slightly different opinions on what makes a proper harpy, which is reflected in their variant of the Song.\n\nAnd Our Song? Our Song empathises the need to abandon the old and antiquated ways of the Hunt, and instead join Surael in the Struggle against the Dark. And once we have brought all of the Harpy Hills under our control, we will be able to ensure that our version of Firanya's Call is the one sung throughout them - and one day, will be sung by all harpies of Bulwar."

 F80_mission_back_into_the_flock_title: "Back into the Flock"
 F80_mission_back_into_the_flock_desc: "While the Siadunan Harpies are not the only harpies to have left the Hills, they are the most numerous and powerful, having once had an empire of their own, albeit one shattered by the Phoenix Legions. Furthermore, unlike other flocks such as the Naléni, Nzeri, and Járnklo Harpies, they still live within Surael's Garden, even if it is on its eastern periphery.\n\nThese flocks must be subjugated and brought under our rule, not just to fulfil our Divine Duty, but also to start the process of truly uniting harpykind once more and undo the splintering brought about by the various migrations that have seen our kind spread far and wide."

 F80_mission_akalses_restored_title: "Akalšes, Restored"
 F80_mission_akalses_restored_desc: "Centuries ago, the empire of Akalšes stretched from coastal Akan in the west to the Serpent’s Gift in the east, but it was ultimately brought low. Now? Akalšes is no longer merely ascendant, but resurgent.\n\nRestored.\n\nNo longer are they but a fragment of their former greatness, but with our help they have regained their former glory. Thus, they, too, will have a second coronation ceremony, with [F33.Monarch.GetName] being crowned not merely as the Akal of Akalšes, but King of Akalšes and Varamhar."

 F80_mission_securing_the_heartland_title: "Securing the Heartland"
 F80_mission_securing_the_heartland_desc: "One does not build an empire by recklessly expanding in all directions... or at least, not a lasting one. Rather, one finds natural barriers or friendly states so that certain borders may be treated as safe, and then push against others. In our case, the Serpentspine Mountains make for a natural, safe eastern and northern border, and to our south? Akalšes, our kin and eternal ally.\n\nMeanwhile, Akalšes will find their northern borders secured by us, the west secured by the Divenhal, and, by securing the Šad Sur Mountains and fortifying the Salahad Gate, the border towards Kheterata can be considered adequately sealed.\n\nThus, with our heartlands secured, Akalšes and Nanšalen alike can focus on expanding in new directions: ourselves westward into Bahar, while Akalšes may turn their gaze east towards the desert of the Far Salahad."

 F80_mission_not_so_far_anymore_title: "Not So Far Anymore"
 F80_mission_not_so_far_anymore_desc: "Once, the Golden Highway bound Jaher's Empire together, allowing for the easy movement of armies, merchants, and administrators alike from Brasan to Tianlou.\n\nWhile our ambitions of bringing peace to Bulwar are more modest than that, the Golden Highway is still necessary. For though the Far Salahad is a backwater, far away from Bulwar Proper and the Harpy Hills, it is still a part of Surael's Garden. Neither Akalšes nor we can rest easy until it has not just been brought under our rule, but also properly integrated. To properly control the Far Salahad, Jaher's Golden Highway must be rebuilt... and extended, to include Heunthume, Vainviria, and Arašbar."

 F80_mission_our_kin_in_akalses_title: "Our Kin in Akalšes"
 F80_mission_our_kin_in_akalses_desc: "Both we and our kin in Akalšes have thrown off our shackles; it is time to remind Bulwar not just of our bonds, but also of Akalšes' past claims, alongside a generous helping of stories embellishing the lost glories of Bulwar under the rule of Akalšes. And while we are doing so? Why, let us emphasize our close connection, so that as Akalšes expands, so, too, does the idea that Nanšalen is a valuable part of Bulwar, rather than a threat to the region."

 F80_mission_the_palace_of_wisdom_title: "The Palace of Wisdom"
 F80_mission_the_palace_of_wisdom_desc: "While harpies have nominally been welcome at the Eka-Idulnazzar ever since its inception, such students were few and far between. This has been due not only to the frosty relations between Varamhar and Ayarallen, but also the fact that harpy students would still risk discrimination or worse, despite decrees by Karodir I stating that students at the academy were not to be harmed or harassed.\n\nHowever, if we were to aid our allies in Akalšes with developing the infrastructure for the Palace of Wisdom, while convincing the Song-Born to send their gifted students to the school, we can ensure that the institution fulfils its purpose of bringing together students from different magical traditions. This way, we can ensure that harpies may attend the school as equal students in truth, rather than merely in name."

 F80_mission_invite_dwarven_migrants_title: "Invite Dwarven Migrants"
 F80_mission_invite_dwarven_migrants_desc: "About a millennium ago, Ninšara I commissioned a group of Pyrite Dwarves to build a new citadel for her flock, spanning three levels. While most of the dwarves would return to their ancestral hold, some stayed behind to maintain the four lifts that would connect the lower and middle levels, and to this day, their descendants still call Vainviria their home, caring for the marvel built by their ancestors and producing valuable goods for our populace.\n\nYet, we have need of more dwarven subjects, as their unparalleled skill in mining and metallurgy will allow us to fully harness the new seams of mines uncovered by our divinations. In older and more primitive times, some matriarchs might have suggested that we simply kidnap them and force them to work for us, but we do not need to stoop to such barbaric methods anymore. No, now that we are no longer regarded as monsters, we can simply contact dwarven polities and let them know that there is ore and well-paid work available, and the matter will resolve itself."

 F80_mission_bahari_highlands_title: "Bahari Highlands"
 F80_mission_bahari_highlands_desc: "When the first Harpy Queendom fell, the Hytiranyaleni flock fled to the west, settling in the lands of western Bahar. Yet, the local humans and dwarves were none too thrilled at the sight of their new neighbors, and ultimately forced the flock back to the Harpy Hills, where they would eventually settle in Hytiranyalen.\n\nNow, however? We have returned to this corner of Bulwar, and to ensure that harpies will never again be driven from the region, we must establish and expand roosts to cement our grip on the region, even if that means encouraging a migration that will hinder further development within our heartland in the Harpy Hills, at least for a while."

 F80_mission_divine_duties_fulfilled_title: "Divine Duties Fulfilled"
 F80_mission_divine_duties_fulfilled_desc: "In the times of Ninšara I, the Divine Duty of Queens, the unification of harpykind, was considered something that would soon be achieved. Yet, after her defeat at the hands of what would become the Third Queendom and with Akalšes faltering not long after, fulfilling it was soon seen as a mere pipe dream, as some theoretical ideal to pursue, but with every matriarch since Ninšara knowing, in the back of their mind, that it was 'impossible' to fulfil.\n\nNo more. With the foundations laid by Ninšara II and Araš X, the Divine Duty has at long last been fulfilled, and the Queens of Nanšalen and Kings of Akalšes have finally managed to complete their divinely ordained mission: bringing true peace to Surael's Garden."

 F80_mission_seeing_far_and_wide_title: "Seeing Far and Wide"
 F80_mission_seeing_far_and_wide_desc: "While the Firanyalen Harpies claim the mantle of the oldest flock, ours is almost as old, for our founder, Nanša the Farseer, was a daughter of Firanya herself. Though the legends about her prowess have likely grown in the many, many tellings, our flock has always been known for its Farseers.\n\nHowever, while no amount of support will allow them to accomplish what Nanša was supposedly capable of, one does not need supernatural means of divining the future to realize that the Farseers will be quite useful in the years to come, and that we should aid them in honing their skills."

 F80_mission_what_the_hills_hold_title: "What the Hills Hold"
 F80_mission_what_the_hills_hold_desc: "While there are a fair few iron mines scattered throughout the Harpy Hills, most of the dales are home to far more modest branches of industry, with the most widespread being the raising of goats and sheep. However, with the aid of our Farseers, we can scour the Harpy Hills for valuable seams of ore that might otherwise have gone undiscovered and unearth the true riches that these hills hold.\n\nOf course, our hills are hardly the only place where mineral wealth may be found. The silver mines of [623.GetName] promise great wealth, and our kin in Akalšes have promised us a share of this wealth. Among lesser allies, this offer might have included a clause of 'so long as Nanšalen aids in defending Akalšes' or something to that effect, but in our case? No such stipulations were made, for to even question that we would come to their aid would be considered the start of a joke in quite poor taste."

 F80_mission_lifting_together_title: "Lifting Together"
 F80_mission_lifting_together_desc: "The time has come to expand the legendary lifts of Vainviria, extending them to also reach the upper-most layer of the city, truly tying the three layers together.\n\nYet, while this may be a major undertaking, it will just be the beginning. Our other roosts shall also benefit from such lifts to better integrate our non-harpy subjects and benefit from it.\n\nThe most notable of these new lifts will be the ones of the Queen's Throne, whose four levels will finally be truly linked together, to permit our ground-bound subjects to traverse the city with ease and provide their contributions even on to the upper layers, in a way prior, more prejudiced Queens would not have permitted."

 F80_mission_auxillary_corps_title: "Auxiliary Corps"
 F80_mission_auxillary_corps_desc: "For many generations, Akalšes has been home to sizeable populations of not only humans and elves, but also centaurs and gnolls. The centaurs have been present since the time of Araš VIII, who showered their ancestors beyond the Invader's Pass with gifts to entice them to journey into Bulwar and fight his enemies, while the Suncrown Gnolls, converts to the Sun Cult,  fled to Akalšes centuries ago after their own realms were sundered by Xhazobkult gnolls.\n\nOver the years, these minorities have become loyal subjects of the Akalite kingdom and their tales have inspired us to attempt the same with our own minority subjects. Already, a significant number of dwarves reside within our lands, but they are mostly merchants and craftsmen. However, were we to persuade the dwarves of Ovdal Tûngr to join our realm, their forces may form the core of an auxiliary corps in our army, leveraging their expertise in siege warfare for the benefit of the Queendom."

 F80_mission_peering_past_the_pass_title: "Peering Past the Pass"
 F80_mission_peering_past_the_pass_desc: "To the Bulwari, the lands beyond the Invader's Pass hold little interest, as the centaurs dominate those forbidding plains.\n\nYet we know better: during the time of Ninšara I and Araš VIII, Nanšalen and Akalšes sent trade expeditions into the Forbidden Lands, deepening our trade ties with the centaurs beyond the pass, and eventually establishing a trade route with humans living deep within the Forbidden Lands.\n\nThough this route eventually withered and died, ancient records suggest that it was quite profitable, and with the right support, we could revive it. First, however, we must explore this new land, whether through force, befriending the locals, or relying on our Farseers to divine the layout of the land.\n\nShould we do this, the wealth flowing in through this veritable Gate of Bulwar will surely bring us great wealth, and help us fund our ambitions."

 F80_mission_securing_the_path_title: "Securing the Path"
 F80_mission_securing_the_path_desc: "According to the locals, the river flowing from the lake of Nashair Rocht flows all the way to the lakes that the humans of the Forbidden Plains call home, and so will serve as a natural artery of trade. However, to move goods from that river and back to the Harpy Hills will require moving through a stretch of open land that would leave caravans potentially vulnerable to raiders or bandits.\n\nTo preempt this problem, we should seek to establish a local vassal state, and erect fortifications to secure this first - or final, viewed from the perspective of those lakeshore dwellers - part of the trade route we hope to reestablish. As part of this endeavour we should ensure that the cities along the route are ready to accommodate the planned influx of merchants."

 F80_mission_wingborne_news_title: "Wingborne News"
 F80_mission_wingborne_news_desc: "For as long as harpies have existed, we have benefitted greatly from our ability to fly. Not only does it enable us to establish our roosts and settle in places where groundbound races would be unable to survive, much less thrive, but it also means that we can manoeuvre much faster than other races while at war.\n\nFurthermore, it also has plenty of other beneficial applications, such as in the field of trade. Having individual harpies carry a small amount of luxury goods as they fly might be a straightforward benefit, a more indirect advantage is that a harpy can carry something that weighs nothing at all: information.\n\nThis can be leveraged to help our merchants know what is and is not presently required throughout the Forbidden Plains before they set out, which would be a great boon to them. If we truly wish to leverage this, though, we will need to secure permission to visit trade hubs throughout the Forbidden Plains, and also build a suitable base of operation for these couriers of ours."

 F80_mission_the_gate_of_bulwar_title: "The Gate of Bulwar"
 F80_mission_the_gate_of_bulwar_desc: "Though the humans of the lakes are quite wealthy, that hardly means that they are entirely self-sufficient. Quite the contrary, in fact, as their prosperity means that they not only produce a variety of manufactured goods that could fetch quite the price in Bulwar, but it also ensures that there is plenty of demand for luxury goods that they themselves lack access to. Sugar, silk, spices, and coffee are all things that they had to previously import at exorbitant prices from Haless, if at all, and thus would be quite easy to sell to them.\n\nAnd by focusing on the trade with these goods? Why, we can ensure that the trade route established during the time of Ninšara I and Araš VIII is not only revived, but will draw in trade from all across the Forbidden Plains, reaching even greater heights."

 # Events
 flavor_nansalen.0.t: "Kings and Queens, Kneeling"
 flavor_nansalen.0.d: "Once upon a time, Ninšara I and her half-brother, Araš VIII of Akalšes, were poised to bring peace to Bulwar through their shared efforts. Yet, they found their ambitions thwarted and their realms cut down to size, with our control shrinking from most of the Harpy Hills to our current territories, while Akalšes similarly shrank from controlling most of Bulwar Proper to their present diminished state on the shores of lake Naza.\n\nBut now, a new chance for us to rise presents itself, for the stars have aligned to deliver new heirs to both Nanšalen and Akalšes born on the same summer solstice - a clear sign by Surael that they are destined for greatness.\n\nDestiny is on our side, so we must throw off the shackles of our overlords and fulfil our Divine Duties!"
 flavor_nansalen.0.a: "For Surael!"

 flavor_nansalen.1.t: "Kings and Queens, Standing Tall"
 flavor_nansalen.1.d: "Finally, for the first time in centuries, we can stand tall, with no overlords to bow to, and nobody to answer to except for Surael and each other!\n\nYet, while this has been an ordeal, it is not the end of our journey, it merely marks the end of the beginning of our resurgence. Now, we must focus on consolidating our rule, restoring what we once held... and then push beyond, to finally fulfil our Divine Duty and bring Surael’s divine Order to all of Bulwar.\n\nIt will not be easy, but with destiny, Surael, and our kin in Akalšes by our side, nothing will stand in our way!"
 flavor_nansalen.1.a: "We will prevail!"

 flavor_nansalen.2.t: "Holdouts of the Hunt"
 flavor_nansalen.2.d: "To call the Firanyalen flock proud and set in their ways would be an enormous understatement. While this was useful when we enticed them to rebel against Ayarallen, it also means that our missionaries received a chilly welcome in [676.GetName]. Yet, they did not dare to expel said missionaries or even hinder their efforts beyond a few minor attempts at obstruction.\n\nAt the time, such feeble opposition to the conversion efforts had been seen as a promising sign that they were almost ready to realize that the way forward was to embrace Surael. Now, though, the reports of revolts breaking out in [676.GetName] and [666.GetName] reveal that they were simply biding their time, secretly plotting with their former overlords in Ayarallen to overthrow us and restore the old ways of the Hunt."
 flavor_nansalen.2.a: "They must be shown the error of their ways!"

 flavor_nansalen.3.t: "Queen of Queens"
 flavor_nansalen.3.d: "Since the time of Ninšara I, Nanšaleni Matriarchs have been crowned as queens by the kings of Akalšes to reflect the close ties between our two realms and our ancient glory. In the past, such coronations frequently served to highlight little more than how far Nanšalen had fallen, for attendance was seldom impressive. Our kin in Akalšes would attend, of course, as would many of their courtiers, and so would the lesser matriarchs within Nanšalen, along with notables from the minorities in Vainviria.\n\nOther than that, though? The Firanyalen flock considered themselves to be above Nanšalen and so refused to send envoys, while the millennia-long resentment towards Hytiranyalen and Lysinyalen meant that they had only been invited a few times throughout history, and had obviously always declined.\n\nMišarallen had almost always sent at the very least an envoy, and sometimes the matriarch or her favored daughter, and during our time as subjects of the Ayara flock, one of the more diplomatically minded Ayaralleni matriarchs might send a few envoys, but even those seldom treated the coronation with anything but thinly veiled amusement.\n\nBut now? As Queen [Root.Monarch.GetName] kneels, so that her counterpart in Akalšes may crown her once more, one would be hard-pressed to find a realm in Bulwar that had not sent a delegation, with many of the major cities of Bulwar being represented many times over by their notable families, all wanting to see for themselves what this new harpy queendom will be like.\n\nAnd when [F33.Monarch.GetName] bids [Root.Monarch.GetName] to rise, he no longer addresses her merely as Queen of the Harpy Hills, but as the Queen of Queens, destined to unite all harpies. Well, the Akalšesi and harpy attendants are the only ones to outright applaud such an announcement, but it is clear that the rest accept this new reality, and simply hope that this queendom will be true to its promises, and prove itself more civilized than the ones that had come before."
 flavor_nansalen.3.a: "Long May We Reign!"

 flavor_nansalen.4.t: "King of Kings"
 flavor_nansalen.4.d: "While Akalšesi coronations since our twin empires were shattered still received representatives from nigh every realm and meaningful polity in Bulwar, such representatives were frequently there with naught but a small party, and were usually simple ambassadors or envoys, rather than members of ruling families or otherwise august personages in their own right.\n\nFurthermore, the fact that the Kings of Akalšes were crowned by the Nansaleni Matriarchs led to scoffing and disdain by many of those representatives, who saw that staunch tradition as further evidence of Akalšesi decline.\n\nNow, though, as King [F33.Monarch.GetName] is once more crowned by [Root.Monarch.GetName], the attending delegations are much more impressive, with major city-states and surviving elven realms sending not mere ambassadors, but relatives of the ruler, if not the rulers themselves. Many of these are nervously looking on as [F33.Monarch.GetName] rises, proclaimed as the King of Kings by [Root.Monarch.GetName]. With a steely look in [F33.Monarch.GetHerHis] eyes, [F33.Monarch.GetName] declares that Akalšes will only rise further, and that [F33.Monarch.GetSheHe] will not rest until Akalšes has carried out the Divine Duty of Kings to unite all of Surael’s Garden under [F33.Monarch.GetHerHis] rule."
 flavor_nansalen.4.a: "Long May We Reign!"

 flavor_nansalen.5.t: "The Council of Heunthume"
 flavor_nansalen.5.d: "As the name implies, the New Sun Cult is just that: new. Prior to its establishment, there were a multitude of different Sun Cults, each with their own tenets and beliefs, with the Akalšesi Cult of Kings being one such example. In 1202 AA, however, Taelarios Irrliazuir managed to assemble a number of religious tenets into a universal doctrine and convince most Sun Cults across Bulwar - including those of Akalšes and Nanšalen - to adopt it... at least officially. We held true to our Divine mission, of course, and now that we have fulfilled it, it is time to ensure that the Cult of Kings and Queens receives the recognition that is its due.\n\nIn order to reach this goal, a grand conclave of clergy has been called in Heunthume, where we can ensure that the universal doctrine of the New Sun Cult is adequately... updated to reflect the current reality: specifically, that the rulers of Akalšes and Nanšalen are not merely the King of Kings and Queen of Queens who united Bulwar, but that their successors will also be Chosen of Surael in perpetuity, and that defying them is to defy Surael himself.\n\nOf course, no Sun Cult Council is complete without both figurative and literal struggle, with the most memorable being a three-way brawl that led to all three participants falling over a balcony, only barely being caught by patrolling harpies before they fell to their deaths. However, in the end, the leaders of the largest Sun Cult Temples were persuaded to accept the updated doctrine. While some of the smaller temples remain recalcitrant, they are insignificant in the face of our power and influence, and as a result, sermons across Bulwar will soon include praises to the Akal and the Matriarch, emphasising the importance of following their example and heeding their words."
 flavor_nansalen.5.a: "As is right and proper."

 flavor_nansalen.10.t: "A Request from our Northern Cousins"
 flavor_nansalen.10.d: "An envoy from our northern kin has arrived, asking for our aid against their oppressive overlord, Ayarallen, as well as asking for our support in convincing our own overlords to aid our harpy kin in their fight.\n\nWhat is to be our response?"
 flavor_nansalen.10.a: "Akalšes answers!"
 flavor_nansalen.10.b: "We cannot commit to this."

 flavor_nansalen.11.t: "The Ties of Blood Hold Firm"
 flavor_nansalen.11.d: "As expected, our kin in Akalšes have agreed to our request, and will aid us in our fight against Ayarallen, as we rise up in a noble attempt to throw off our shackles."
 flavor_nansalen.11.a: "As ever, we stand together."

 flavor_nansalen.12.t: "Aid Denied"
 flavor_nansalen.12.d: "In a shocking turn of events, our kin in Akalšes have refused to aid us in our righteous fight against Ayarallen, citing the need to focus on their own internal affairs and the fact that they are still technically vassals of Varamhar as reasons for their refusal.\n\nThis is a major setback for our plans, but even if they turned down this request, they can still potentially be counted upon to help persuade Varamhar to aid us."
 flavor_nansalen.12.a: "Most unexpected."

 flavor_nansalen.13.t: "An Intriguing Proposition"
 flavor_nansalen.13.d: "Our subjects in Akalšes come bearing a proposal on behalf of the harpies of Nanšalen: that we come to the aid of Nanšalen, should they try to break free from Ayarallen. Though they insist that the Harpy Hills is theirs by right, having a friendly harpy realm to our north would be a benefit in the long term, especially one that already follows the teachings of the Sun Cult.\n\nWhat is to be our response?"
 flavor_nansalen.13.a: "Yes. They may be harpies, but they follow Surael."
 flavor_nansalen.13.b: "No. Even if they believe in Surael, they are still harpies."

 flavor_nansalen.14.t: "Aid Denied"
 flavor_nansalen.14.d: "Our kin in Akalšes have persuaded their overlord to aid us in throwing off our yoke, which should make our fight against Ayarallen far more manageable, as we would otherwise need to contend with the sorcerous might of [F27.Monarch.GetName] without a prominent war wizard of our own.\n\nNow, however, with Karodir on our side, Ayarallen no longer has the upper hand in magical matters!"
 flavor_nansalen.14.a: "We shall strike soon!"

 flavor_nansalen.15.t: "Aid Requested"
 flavor_nansalen.15.d: "Despite the best efforts of our kin in Akalšes, they were unable to persuade their overlord to aid us in our fight against Ayarallen, and thus, we have been left to face the sorcerous might of [F27.Monarch.GetName] alone."
 flavor_nansalen.15.a: "This will complicate matters."

 flavor_nansalen.21.t: "The Wedding of Queen Araš"
 flavor_nansalen.21.d: "While the lead-up to the actual wedding was... tumultuous, considering that it took a coup, a war, and a former queen being set aside, the wedding itself went surprisingly well, lacking unwelcome surprises. There had been concerns that Karodir would simply use his sorcerous might to escape or even try to take the wedding party as hostages, but from what Araš later tells us, he was surprisingly placid about the whole affair despite the martial prelude of the wedding.\n\nAs a scholar at heart, he was apparently somewhat relieved to be rid of the daily minutiae that ruling a vast realm such as his inevitably brings with it, as he can now focus on deepening his already prodigious understanding of magic. Apparently, he is quite excited about being able to take a more active role in the development of his fledgling academy of magic in Ulmiš Idiqlat."
 flavor_nansalen.21.a: "Hopefully they will both find happiness in this arrangement."

 flavor_nansalen.22.t: "A Failed Gambit"
 flavor_nansalen.22.d: "Despite our best efforts, despite standing together with our kin in Akalšes, we were unable to prevail against Varamhar.\n\nThis is a major setback in our quest to fulfil our Divine Duty, but we may yet be able to salvage the situation, should we manage to not only free Akalšes from Varamhar's grasp in a future war, but also ensure that Akalšes gains control of Varamhar's lands."
 flavor_nansalen.22.a: "We must persevere."

