 F80_F33_loyal_subject_title_plural: "Other Halves"
 F80_F33_loyal_subject_long_desc: "For more than a millennium, the Araškaysit dynasty and the Nanšalen Matriarchs have been closely intertwined, frequently marrying and aiding another. Now that we have thrown off our shackles, it is time for us to rise ever further, with our Other Half being willing to follow our lead on how to achieve this."

