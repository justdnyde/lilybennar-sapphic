 #Path Of Saaxir
 incident_rinta_path_of_saaxir_title: "Path Of Saaxir"
 incident_rinta_path_of_saaxir_desc: "Saaxir is the Baashidi word for mage. Saaxir serve an important role amongst the clergy, shamans, and scholars of the Jasiir Jadid, regarded as the highest authority due to their mastery over nature.\n\nThe Dasr Sharaf, or “The Great Peace,” has provided the time for Saaxir to congregate to discuss many of the region's greatest problems. Unfortunately, peace doesn’t mean that tensions are gone. Whether it be the advanced Mwalim and traditional Darwiiz butting heads, or scholars from the many great realms of the Baashidi, agreements are hard to come by. The Saaxir require everyone’s assistance in uniting the Jasiir Jadid once and for all!"

 #Events 
 rinta_seeker_events.600.t: "Hidden"
 rinta_seeker_events.600.desc: "You egg"
 rinta_seeker_events.600.a: "Close"

 rinta_seeker_events.601.t: "The Conference Begins!"
 rinta_seeker_events.601.desc: "Truly, a wonder like this has never occurred in the history of the Baashidi! To mark the ever growing prosperity of the Dasr Sharaf, our Great Peace of prosperity and flowering knowledge,  thousands upon thousands of the wisest men have come to gather within the confines of Abeesooyinka. Men, women, and children of all classes and races gather on the street as equals to witness the march of their superiors towards the grand capital hall of Weggabiga.\n\nThe reason? To advance the spread of knowledge for all Rinta Seekers.\n\nThe word Rinta itself means knowledge. When described in the context of faith though, Rinta becomes much more personal: it comes to represent what an individual treasures, their affinity to the world around them. Thus, it is essential for every Rinta Seeker to find what truly inspires them, and delve into it as much as possible before their eventual passing.\n\nThrough this conference, the many mages, or Saaxir, hope to use the rising power of the Baashidi to benefit the quest for knowledge and personal salvation. Other conferences have sparked up across the Jasiir Jadid as well, it seems that news is coming from all over.\n\nLet’s stop by a few meetings, my liege, and listen a moment to the debates of the wisest in the lands!"
 rinta_seeker_events.601.a: "What’s on the itinerary?"

 rinta_seeker_events.602.t: "The Conference Stalls!"
 rinta_seeker_events.602.desc: "Mages and scholars alike rush to the great halls to begin another day of debates. It's been a few months of constant back and forths, a general thrumming of energy. The moment a decision is made, another intellectual grouping brings up a new point and sends the whole thing back to zero. No compromises, no movement, nothing.\n\nThe great nations have become weary: If their very smartest can’t find a way to establish consensus, what does that say about the steady truce being held? Can and will it be undermined? Do the Baashidi simply have no chance of getting along after all?\n\nUltimately, it comes down to the classes of scholars amongst Rinta Seekers, the Mwalim and Darwiiz. The Mwalim believe in an organized method of research, focusing on universities and scholarly practice. The Darwiiz, on the other hand, place heavy importance on the spiritual journey of knowledge, and hone shamanic alchemy and magics to provide seekers with insight into their affinities.\n\nThe two sides come into conflict frequently, usually over power and control amongst the courts of nobles. Now though, they are divided on how to best use the funds given to them to enhance their exploration of knowledge.\n\nIt's up to you, my liege, to help come up with resolutions to these problems, as one of the rulers of the great Baashidi nations."
 rinta_seeker_events.602.a: "I shall try my best."

 rinta_seeker_events.603.t: "Funding for Knowledge"
 rinta_seeker_events.603.desc: "The council of a rural region is currently deciding how to divide up funds intended for the development of education and faith, but has found it increasingly hard to move forward. They have asked for your second opinion, my liege.\n\nThe local Darwiiz and Mwalim have proposed a variety of ideas, but two seem to be the most popular: the construction of a school under the guidance of Mwalim, or provisioning the funds to all locals for their “”Ruaa,” pilgrimages towards advancing personal understanding of the world.\n\nBoth ideas are, of course, feasible and positive, but there is only so much funding to go around, and for smaller councils like this, there can’t be that many resources devoted.\n\nThe Mwalim beg to provide proper education to this outskirt area, pointing out the lack of access to other institutions without miles of trekking hills and plains. The Darwiiz point out that the villages within the zone have not complained, despite surveys and voyages by scholars being done, and that the people should decide for themselves how to fulfill their spiritual needs.\n\nWhat is your decision, my liege?"
 rinta_seeker_events.603.a: "Fund the Mwalim’s plan"
 rinta_seeker_events.603.b: "Fund the Darwiiz’s plan"

 rinta_seeker_events.604.t: "A Fancy New Tool"
 rinta_seeker_events.604.desc: "The Mwalim and one of their schools have gotten their hands on a new tool from a far away land; the Gawakhizans who imported it cannot pronounce the name, but we are informed it is very impressive indeed.\n\nCalling for you to be present to analyze the new device, the Mwalim have nevertheless been powerfully vague as to specifics: the tool is apparently specifically designed for the advancement of knowledge and to allow analysis in a variety of fields of study. Clearly, this invention has proven a boon to everyone involved in the faith.\n\nMages in the court begin to erupt in debate, arguing on who should be able to test the device. I’ve heard of some absurd claims in an attempt to justify testing the tool. Either way, scholars from Badabbi to Weggabiga all can't seem to decide who will get the funding to purchase more of these “things.”\n\nClearly out of sync with each other, all sides seem to be looking towards any kind of governing voice. Maybe you could help them sire?\n\nWhat do you think?"
 rinta_seeker_events.604.a: "Lets share the funds and split the tools."
 rinta_seeker_events.604.b: "Maybe, you let me handle it?"
 rinta_seeker_events.604.c: "Sell off our share of the imports."

 rinta_seeker_events.605.t: "THE FIRST GRAND HALL: Capital Institutes."
 rinta_seeker_events.605.desc: "My Liege! You have been selected as a member of the judges for one of the Grand Hall’s largest debates!\n\nToday’s discussion concerns plans for a new, grand building in our capital - in fact, in all Baashidi capitals. Scholars and mages alike hope to found new institutes to further the advancement of knowledge, capable of liaising with their local governments. Most of the funding is said to be going to the main project in Abeesooyinka, but there seems to be enough funding to build smaller versions in the other realms. Despite argument over the particulars, most people agree that such ornate designs, made by the finest architects and artists available, will make each building a grand centerpiece of its respective city.\n\nBoth the Mwalim and Darwiiz have launched their own unique proposals as to what the facility should contain.\n\nThe Darwiiz first proposed such spaces as grandiose temples for worship, thoroughly grounded in tradition. Carpets for dance, open spaces for dance, and materials for alchemy and magic would be available to members of the institute. I, personally, was very impressed with the detailed engravings on the wall, which they wish to depict the mighty scholar Damal The Scribe and his extensive writing on the classification of human nature and emotions. Such is but one of the many wonders included in the proposal, a celebration of the extent of our knowledge and practice. Even better, the price was fairly cheap for how extensive the plans are.\n\nApparently, the day afterwards, the Mwalim attempted to one up the Darwiiz through an even larger proposal for a much more modern building. Many of the traditional annexes, such as those for the creative arts or reserved for shamanic dance, gave way in this blueprint in favour of more enclosed spaces and rooms dedicated towards research. In fact, the overall intent appears to be a functioning university, classes offered for free to all who wish to attend. While the desires of the Darwiiz haven’t exactly been shoved aside in this version, the new proposal clearly aims to separate tradition from the pursuit of knowledge.\n\nNow, the court seems to be coming to a close. A lot of the stammering and arguments are beginning to quiet down. The Hall’s echoes have gone away. Tell me, how do you think you’ll vote?"
 rinta_seeker_events.605.a: "Build the Mwalim Proposal."
 rinta_seeker_events.605.b: "Can’t we find a middle ground?"
 rinta_seeker_events.605.c: "Build the Darwiiz Proposal."

 rinta_seeker_events.606.t: "Good deeds done by Mwalim"
 rinta_seeker_events.606.desc: "Sire, lovely news! On their way to the Qasri of Abeesooyinka, one of our Mwalim caravans happened to stop by an impoverished village, too remote for the riches of the Dasr Sharaf to reach them. Here, citizens still lacked access to any proper food or water source, starving children a norm on the streets.\n\nIt took the Mwalim one day to fix all of this.\n\nThe village found themselves with a deep and sturdy well, an abundance of cattle and goats, and a new town hall stocked with food overnight. The villagers, hesitant at first, saw the Mwalim clergy and immediately thanked them. The village ate, worked, and relaxed after many years of starving and isolation.\n\nThe news has reached us a day before the Mwalim themselves supposed to arrive. Members of your court have told me to suggest a small ceremony for these Mwalim for their work well done. I can plan out the commodities if you’d like?"
 rinta_seeker_events.606.a: "Lets give them a nice party!"
 rinta_seeker_events.606.b: "A small gift will suffice."

 rinta_seeker_events.607.t: "Darwiiz coalition heal sick children"
 rinta_seeker_events.607.desc: "Sire, no doubt you are aware of the blight upon our realm. From the streets of Abeesooyinka to the deserts of Badabbi, men and women alike succumb to the deadly “lizard” illness. While I’m sure you’ve heard a bit of it, information on the actual process of the contagion is limited. All we know is that the illness causes people to gradually turn a sickly green; this is where the name comes from, for the people feel they somewhat resemble lizardfolk after the first stage sets in.\n\nWhile the illness is not common, it tends to be highly noticeable; one can imagine how people treat those infected with the illness as their state gradually worsens.\n\nRecently, a group of infected children had found themselves alone on the outskirts of Abeesooyinka, forced to resort to stealing and begging. A wandering Darwiiz happened to appear, and offered them a cure. Like a miracle, through dance and strange elixirs, the children found themselves cured of their green skin and weakness, jumping from joy. One of the kids seems to have spread the tale across the entire city. The hero Darwiiz seems to be from [Root.GetName], and many are calling him a hero. Some have suggested throwing a party for the wandering Darwiiz, providing him with gifts for his heroic actions. I can begin to arrange the details, if you’d like?"
 rinta_seeker_events.607.a: "Sure, lets throw a party."
 rinta_seeker_events.607.b: "Lets hold off on it for now."

 rinta_seeker_events.608.t: "Celebration disrupts studying!"
 rinta_seeker_events.608.desc: "I’m sure you can hear the music outside! It's quite loud. It's been going for a few days now.\n\nA group of Darwiiz are holding a festival dedicated to dispelling evil spirits and opening the minds of participants. A traditional trance dance fueled by elixirs and emotion, the dancing Darwiiz spiral along lines on a circular carpet, marking holy symbols. People enter the circle, and come out feeling refreshed. This “Qabqol” in particular has managed to grow from a few friends and Darwiiz to a massive crowd of a thousand or more. Everyone seems to be having a great time, with drinks and food being shared and people coming together over common religious love.\n\nUnfortunately, this comes at the same time as the Mwalim come close to making a groundbreaking discovery. Many wise scholars have locked themselves into a chamber in hopes to complete a variety of studies; on how sound reacts with the environment, rare elements and their applications in alchemy, the medicinal perks of elusive flora, so and so. The Mwalim have stated that they need silence to be able to complete their research.\n\nWhile you don’t seem disturbed by the noise, they’ve come to ask for your assistance in moving the party further away from the great halls so that silence can be preserved. This would be contrary to tradition, and may anger a few folk of course. Ultimately, it's up to you."
 rinta_seeker_events.608.a: "Let’s just ask them to move."
 rinta_seeker_events.608.b: "They get one more night."
 rinta_seeker_events.608.c: "I like the music!"

 rinta_seeker_events.609.t: "Ego Against Instinct"
 rinta_seeker_events.609.desc: "Sire, before we arrive Abeesooyinka, I have something that might interest you.\n\nWith so many mages in the great city, it was only a matter of time before some would grow close. Others, however, have become great rivals, and a particular mage from our lands has challenged a foreigner to a duel in the arcane arts. Both are extremely potent in their abilities. People are placing bets, and the duel will occur in just a few short days. It promises to be the most entertaining occasion!\n\nA warning, however, and I do believe you must hear this: the mage from our country is an advanced theorist, but comparatively lacking in combat magic compared to the foreigner. Most people seem to agree that he is heavily outmatched. If you are to place a bet, I urge you to keep this information in mind."
 rinta_seeker_events.609.a: "Put your money on Ego!"
 rinta_seeker_events.609.b: "Put your money on Instinct!"
 rinta_seeker_events.609.c: "I don’t place bets."

 rinta_seeker_events.610.t: "Mwalim using sacred elixirs!"
 rinta_seeker_events.610.desc: "There are many elixirs used by Rinta Seekers. Some ward off bad spirits, while others are said to open the mind to unknown knowledge. Whatever boons they may provide, the Mwalim are giving them out for free in front of the main hall in Abeesooyinka.\n\nUsing them as medical aids, the Mwalim have gotten to work on curing the needy of the city. They’ve done it quickly as well. The giveaway has spurred a flow of visitors and travellers close to unprecedented in living memory. The travellers near-universally praise the Mwalim for being able to cure illnesses incurable before and fixing horrifying deformities.\n\nWhile the general public seems thrilled about this grand giveaway, the Darwiiz claim that the overuse of this medicine is an insult to the legacy of their forefathers. They affirm that while the elixirs are powerful, they shouldn’t be used like other medicines, as they require special care in line with scripture.\n\nWhile no Mwalim school has made any statements on this topic directly, individual scholars seem to have a distaste of the Darwiiz for their unwillingness to push past their tradition and use the tools given to them for the better. I’ve even heard of a few Mwalim synthesizing the elixirs to cure simple cuts, in direct contempt of the sacrality of the brew."
 rinta_seeker_events.610.a: "Elixirs are good for medicine."
 rinta_seeker_events.610.b: "Lets find a compromise, yes?"
 rinta_seeker_events.610.c: "Elixirs are sacred, don’t abuse them."

 rinta_seeker_events.611.t: "Even Further Beyond"
 rinta_seeker_events.611.desc: "My liege, I am just as shocked as you are. Both of the mages, the duellists between whom I asked you to choose, are on the floor. It’s an absolute wipeout!\n\nJust as their magical duel was getting underway, a figure appeared and levelled them both. Who could have known that Biriir the Third would have shown up?  He is likely one of the most powerful mages amongst the House of Wisdom… at the very least, the very strongest from Beeragga.\n\nDo you know his story? He’s known as the champion of all Istunkas, because he went across the entirety of the Jasiir Jadid to fight in Istunka tournaments, proving his physical strength alongside his magic.\n\nEver since then, they’ve had to make separate divisions in Istunka tournaments, because nobody wants to be embarrassed challenging him.\n\nIf he’s here right now, it's with a purpose. Maybe he’s looking for a new challenge? Extra work? Who knows.\n\nSire… I know I might sound crazy, but I think we should hire him."
 rinta_seeker_events.611.a: "Let me go introduce myself."
 rinta_seeker_events.611.b: "What an interesting fellow!"

 rinta_seeker_events.612.t: "Rare Mineral Find"
 rinta_seeker_events.612.desc: "Great news my liege!\n\nA surveying expedition has found a large reservoir of aquamarine gemstones in [Root.Province.GetName]. It seems that practically everyone involved is eager to claim mining rights. Aquamarine holds significance amongst the Baashidi both as a symbol of status and a ward of protection and longevity in traditional folklore; many nobles in the Jasiir Jadid display aquamarine frequently in their clothes to display their wealth.\n\nAll this ties back to the Exodus of Ardimya, during her journey to the Jasiir Doog. It was said that Ardimya left a trail of bright blue stones so that the thousands that followed her need not worry about getting lost.\n\nMy liege, how shall we approach this situation?"
 rinta_seeker_events.612.a: "Everyone will mine the minerals!"
 rinta_seeker_events.612.b: "The Mwalim know best."
 rinta_seeker_events.612.c: "The Darwiiz know best."
 rinta_seeker_events.612.d: "Nobody gets to mine anything."

 rinta_seeker_events.613.t: "THE GRAND HALL TWO: Raaghitaan"
 rinta_seeker_events.613.desc: "Once more you have been selected to judge a Grand Hall, my liege!\n\nRaaghitaan is a simple concept amongst the Baashidi. After the sun crosses the horizon, prayer is held. At noon, prayers are held. As the sun crosses over the horizon, prayers are held. It's frankly simple. While busy people like you, my liege, may not always have time to observe this practice, most of your kingdom does. It's one of the core tenets of our faith, and while not strict in its schedule, its importance cannot be understated.\n\nMwalim and Darwiiz wish to help the people of the Jasiir Jadid judge at what times events should be observed. Thus, two proposals have been made.\n\nThe Darwiiz propose constructing sundials in every major city. The sundial has been a great tool for the Baashidi in our practice of Raaghitaan: it's easy to understand, and already in use in a variety of settings. By building larger versions, we could provide people without their own sundials to easily tell the time in public and observe the proper rituals.\n\nThe Mwalim have what they consider an easier solution: The astrolabe. It's a representation of the night sky normally used for navigation. Many scholars, though, have pointed out the utility of the astrolabe in calculating day-night cycles. Based on the shifting position of stars in the night sky, one can accurately predict when the sun will rise and fall, far beyond the precision of a sundial. The astrolabe functions on cloudy days, as predictions can be done in advance.\n\nWhile this tool wouldn’t be publicly available, calculations being done by scholars who would announce it to the public, Darwiiz claim that any such use of the stars as guide could shake the graves of the dead gods, spreading negative energies across the Jasiir Jadid. The Mwalim claim that the gods are dead, and that their stellar corpses should be treated as such; there is nothing to worry about when using the astrolabe.\n\nRulings are coming in sire. They need your vote. What will you decide?"
 rinta_seeker_events.613.a: "A sundial in every city would look best."
 rinta_seeker_events.613.b: "Tell me more about this astrolabe tool…"

 rinta_seeker_events.614.t: "Merfolk Maintenance."
 rinta_seeker_events.614.desc: "The merfolk are the strongest ally of the Baashidi people. Over the course of a millennium, they have saved us from countless wars and periods of violence. All Baashidi are in the debt of the merfolk, and yet they refuse to ever take count of their due. I know you understand this well, my liege.\n\nThus, merfolk have been provided with seats of respect and honor in courts across the realms of the Jasiir Jadid. The only issue with this is the cost and difficulty of providing merfolk with a comfortable environment during their stay. Most cities have general infrastructure for the merfolk, allowing them to swim through canals and enter buildings through the waters. Unfortunately, the Grand Hall is currently in need of repairs when it comes to merfolk accessibility. With many debates coming along, many are calling to exhaust ever more resources in an effort to improve merfolk access to the rest of the Conferences.\n\nSire, I believe that if we help the merfolk into the conference, it would be a great boon to our standing amongst the realms of the Jasiir Jadid. "
 rinta_seeker_events.614.a: "Fund the whole effort and send in manpower!"
 rinta_seeker_events.614.att: "Every coastal province gets §Y'Merfolk Boons'§! for §Y5 years§! giving the following effects:\nLocal Production Efficiency: §G+20.00§!\n"
 rinta_seeker_events.614.b: "Send in the men!"
 rinta_seeker_events.614.c: "Send is the money!"
 rinta_seeker_events.614.d: "Someone else can handle this..."

 rinta_seeker_events.615.t: "Ashamadi Saaxir"
 rinta_seeker_events.615.desc: "The Ashamadi are the northernmost peoples amongst the Baashidi. In times long past, they were discriminated against heavily due to their connection with the beast-embracing Tanizu. In Dhebiji and Suhratbi society, they have been historically relegated to manual labour and service positions, often beaten and belittled by their employers, who justified their cruelty by the so-called backwardness of the beast lovers.\n\nEver since the Dasr Sharaf, times have changed. Ashamadi peoples have found themselves welcomed into more and more courts among their Baashidi brethren. People have pushed back against the prejudice that the Ashamadi are lesser brutes.\n\nThis doesn’t mean that everything is resolved though. Certain court mages find themselves targeted and harassed as Ashamadi, or shut out entirely from higher debate, whether subtly or directly. This has hindered the progress of the Grand Congress, throwing up endless procedural disputes, and generated tension amongst all scholars participating.\n\nThe highest of the Saaxir have called upon the kings of the Baashidi to reprimand their courts if they are caught perpetrating Ashamadi discrimination.\n\nWhat should we do, my liege?"
 rinta_seeker_events.615.a: "We will respect the Ashamadi for now."
 rinta_seeker_events.615.b: "I am strongly opinionated and will not be silenced."

 rinta_seeker_events.616.t: "Accepting the Southerners"
 rinta_seeker_events.616.desc: "My liege, news has arrived from the Grand Hall in Abeesooyinka.\n\nMany civilians have been complaining about the overcrowding of the city due to the ongoing Grand Hall and the sprawl of its countless scholars, who have taken up residence throughout. It doesn’t help that caravans have been arriving into the city en-masse, choking our main throughways.\n\nThe plan is for Saaxir and scholars to be rehoused in other major cities nearby until the situation is resolved. Many of those marked to come to our territory happen to be of Dhebiji descent. The Dhebiji have been particularly brutal against us Ashamadi; their history of violence and military excursions is extensive, and even in the modern day, certain groups continue to perpetrate violence against the Ashamadi peoples.\n\nSome amongst our court seem nervous about harboring Dhebiji in our lands. Even if conflict is merely a faint possibility, they wish not take any chances at all.\n\nWhat should we do, sire?"
 rinta_seeker_events.616.a: "Let them in."
 rinta_seeker_events.616.b: "Lets protect the court."

 rinta_seeker_events.617.t: "Suhratbi Desert Riders"
 rinta_seeker_events.617.desc: "My liege, a group of Suhratbi saaxir have just arrived from the far lands of Baddabi. Bordering Ardimya, it's no wonder that they’ve taken so long to get here. They still have a long way to go from Abeesooyinka!\n\nSome are quite tired after their long journey, and are opting to stay here. I’ve taken the initiative to find some space for them in our court."
 rinta_seeker_events.617.a: "Very well done, my advisor."

 rinta_seeker_events.618.t: "THE GRAND HALL THREE: Merfolk Kingdoms"
 rinta_seeker_events.618.desc: "Sire, an emergency meeting has just been announced by the Grand Hall. Only a select few have been invited.\n\nI’ve heard through the grapevine that Aviwe, the Oracle King of the Merfolk Empire, is the one who asked for the rulers of the Baashidi to come together. All I know apart from this is the topic: exchanging Baashidi scholars for Merfolk scholars. It seems that Aviwe has decided to bring our worlds closer together after all. He is one of the most powerful living mages on Halann, boasting immortality and extreme potency in evocation and divination magics. It is said that thanks to him, the merfolk were able to extensively improve their living conditions and technology to the point where they defeated the Deep Devils in their own territory!\n\nThe plan he has outlined is for select courts to provide him with a selection of advisors; in exchange, all participating kingdoms would receive merfolk scholars in turn. While humans cannot breathe underwater, the merfolk claim to have advanced magics that would allow selected land dwellers to venture under the sea without any issues.\n\nBefore you head out to Abeesooyinka to meet with him, I should warn you of two things:\n\nFirst, the exchange would be permanent. Members of your court would take their families to the lands of the Merfolk Kingdoms and live the rest of their lives under the sea. The merfolk would provide their own courts and would arrive onto our lands, also permanently.\n\nWe would have to provide and accommodate the merfolk cabinet. As their needs are quite different from our own, we would have to construct water rooms for them to live in. They would all need to be supplied with sea water. Although merfolk are able to live outside of the water, from my understanding, it wouldn’t be the most comfortable experience. Some choose to, but I assume there’s a reason you don’t see many.\n\nIt seems that this exciting possibility is being kept secret until an outcome is decided. They also hope for a quick response.\n\nWhat are you thinking, my liege?"
 rinta_seeker_events.618.a: "I think I like this exchange."
 rinta_seeker_events.618.tt: "\nAfter §R20§! years we will recive following modifier and periodically receive §YMerfolk§! advisors."
 rinta_seeker_events.618.b: "I think I’ll abstain for now."

 rinta_seeker_events.619.t: "Wisdom Above and Below"
 rinta_seeker_events.619.desc: "My liege, it has been some time since you graciously decided to let our scholars participate in the exchange with the merfolk proposed by their Oracle King Aviwe. And I am glad to report that this appears to have been a wise decision, for this academic cooperation has proven to be most fruitful, in particular for our own scholastic community.\n\nThe frank exchange of ideas, academic practices and perspectives has attracted eminent scholars eager for a first-hand learned exchange with the elusive merfolk to our lands. Beyond this, it has markedly improved the rate in which new scientific theorems and inventions are developed."
 rinta_seeker_events.619.a: "How sweet the fruits of open and honest exchange taste!"

 rinta_seeker_events.620.t: "A New Merfolk Advisor"
 rinta_seeker_events.620.desc: "The merfolk have sent up a new advisor as a part of our court exchange program. Very few people are graced with the opportunity to see a merfolk in person, much less work alongside one. The advisor’s presence is a true testament to the long peace and alliance of Baashidi and Merfolk. While merfolk advisors do take quite a bit of effort to accommodate, their experience and wisdom make it well worth keeping them around."
 rinta_seeker_events.620.a: "I will find a place for him amongst my advisors."
 rinta_seeker_events.620.b: "I will find a place for him amongst my admiralty."
 rinta_seeker_events.620.c: "I will find a place for him amongst my merchants."
 rinta_seeker_events.620.d: "I am sure she will find a place for himself in my court."

 rinta_seeker_events.622.t: "The Expedition Plan"
 rinta_seeker_events.622.desc: "After many years of debates, months of arguments and insults shared between Mwalim and Darwiiz, we have been greeted with a grand new announcement: an expedition of sorts, the greatest project ever undertaken by scholars and mages in tandem.\n\nThousands of volunteers, whether they be regular citizens on their Ruaa pilgrimage to the wisest of scholars, will be offered funding to visit different lands and cultures. While we have knowledge of the people who live outside the Jasiir Jadid, the world at large is a mystery. The overarching goal of this mass expedition is to dissipate the mystery of the world, and to further enhance our catalog of knowledge. More concrete plans have already been made for expeditionaries to visit Shangra, Khabtei Teleni, and Zitan Tomon, but in principle nowhere on Halann is off-limits.\n\nWe have been asked to solicit volunteers from our realm and organize our own proposal for whom we will send and to where. I have brought the best cartographers around to help you make your proposal for the high scholars. The Saaxir will organize their own expeditions and locations and will take our proposals and crew into consideration for the final expedition.\n\nUltimately, they'll decide on a few locations, and we will receive a notice to vote when they require our input. There are currently three rounds planned.\n\nThe deadline will be in a few months. I wish you well, sir."
 rinta_seeker_events.622.a: "Thank you advisor."
 rinta_seeker_events.622.tt: "Each country involved in the incident will be able to vote on the destination of three expeditions. The target of each expedition will have the opportunity to convert to Rinta Seekers."

 rinta_seeker_events.623.t: "The First Expedition"
 rinta_seeker_events.623.desc: "The First Expedition’s planning is underway! All the great potentates of the Baashidi gather to decide where we will target expeditionary efforts.\n\nOur choices are as follows…\n\nFirst, the Jiromji city of Kunolo. Historically a halfling settlement, the region was faced with successive periods of unrest and war which have fundamentally altered its culture and brought new peoples to the city. Kunolo remains the best representation of this: every group imaginable lives within its walls. We may also be invited to research the past of the region, as tumultuous as it is, and discover lost knowledge of Kheterata and the halflings.\n\nSecondly, the halfling city of Ibidintely. Welcoming to humans, the city is nevertheless highly defensive against its neighboring states. We are unsure if it remains independent or not. Either way, the residents seem nonetheless happy to knowledge for supplies. Here, halfling society is alive at its fullest and richest, and we can learn much of the wider spiritual practices of our diminutive friends.\n\nPick wisely my liege!"
 rinta_seeker_events.623.a: "Jiromji city of Kunolo."
 rinta_seeker_events.623.b: "Halfling city of Ibidintely."

 rinta_seeker_events.624.t: "The Second Expedition"
 rinta_seeker_events.624.desc: "The Second Expedition’s planning is underway! All the great potentates of the Baashidi gather to decide where we will target expeditionary efforts.\n\nOur choices are as follows…\n\nFirst, the Zuvunwa city of Zena, a historic city to all those who live in Horashesh. The city is in close proximity to a variety of different ecosystems and cultures, and Zena itself is a wondrous city with an affinity for trading in relics and exotic arts. By sending an expedition to Zena, we can take advantage of its trade and culture to explore a variety of regions all at once.\n\nSecond, the Dakinshi city of Kaziradoka. Famous for its wealth in gold and silver, Kaziradoka does not shy away from displaying its glamour. Much of the glistening architecture dates from the city’s time under the Djinnakah Vizierate, and survives in a well-preserved state alongside Dakinshi culture. Blades, beans, pelts, and the smell of coffee beans linger. Sending an expedition here would provide great insight into both the past of our own ancestors, and how other people once subject to Djinnakah have diverged.\n\nPick wisely my liege!"
 rinta_seeker_events.624.a: "Zuvunwa city of Zena."
 rinta_seeker_events.624.b: "Dakinshi city of Kaziradoka."

 rinta_seeker_events.625.t: "The Third Expedition"
 rinta_seeker_events.625.desc: "The Third Expedition’s planning is underway! All the great potentates of the Baashidi gather to decide where we will target expeditionary efforts.\n\nOur choices are as follows…\n\nFirst, the Mengi city of Fetengoni. The eponymous kingdom is one of the longest lasting in the history of Halann; they claim that they’ve been around since the Great Procession! The amount of history and culture that must have developed here would not only be monumental in understanding the Mengi, but the world as a whole. They have a generous culture towards outsiders, meeting their needs to demonstrate splendor.\n\nSecond, the Lupulan city of Kuta. This suggestion has come from the merfolk, for the area surrounding Kuta is known for its exquisite natural harbours and for its gorgeous nature. The Lupulan as a region is home to a variety of exotic plants and species that haven’t been studied before by our scholars. The pervading spiritual energy of the region also makes this region a priority to explore. The people of Kuta are additionally well-known to be inviting of all new ideas, particularly any which might help it stave off conquest from its larger neighbors.\n\nPick wisely my liege! This time it seems like there is even more of an incentive."
 rinta_seeker_events.625.a: "Mengi city of Fetengoni."
 rinta_seeker_events.625.b: "Lupulan city of Kuta."

 rinta_seeker_events.626.t: "The End"
 rinta_seeker_events.626.desc: "As conferences come to a close, expeditions return from far off lands, and people end their Ruaas, the Baashidi feel ever closer to a sense of peace and unity.\n\nWhile it may not last, for a brief moment it could be said that the Baashidi have managed to perform an insurmountable feat: overcoming religious, cultural, and feudal hardships to progress their society. All courts across the great realms of the Jasiir Jadid have chosen opportunity and progress, rather than the spoils of war. Maybe you feel the same way, my liege?\n\nMost importantly though, I feel as if we learned a great amount. More than anyone would have learned in a lifetime. Our peoples are truly beautiful in their curiosity, aren't they?\n\nThank you, my liege, for giving me the opportunity to explore the Path of Saaxir with you.\n\nTHE OPTIONS CHOSEN FOR AN EXPEDITION WERE…\n\n[rinta_path_first_expedition_loc]\n\n[rinta_path_second_expedition_loc]\n\n[rinta_path_third_expedition_loc]"
 rinta_seeker_events.626.a: "Thank you for guiding me, my advisor."

 rinta_seeker_events.627.t: "Rinta scholars arrive in our country!"
 rinta_seeker_events.627.desc: "A large congregation of scholars, calling themselves ‘Rinta Seekers’, have arrived from a far away land called the “Jasiir Jadid.” We have welcomed them into our country, as they seek to study our culture, people, and landscape. They have provided many of our civilians with advanced methods of care and medicine, constructed wells and cured illnesses. Some of their scholars have even performed grand feats of magic!\n\nAs they arrive at our court, they speak of their faith: that of the Knowledge Seekers. While the idea of all gods being dead and heaven being accessible through learning is an uncanny one, it is true that these scholars have achieved remarkable feats not yet seen in our lands.\n\nSome of our folk have already converted, convinced of their beliefs. They haven’t forced anyone to join, nor have they acted as missionaries in the normal sense. Something about their message simply carries a sort of weight. Indeed, the local intellectual elite has taken great interest in these new ideas, and is advocating that they are often wiser than our own.\n\nShould we convert to their beliefs?"
 rinta_seeker_events.627.a: "Lets find the Rinta!"
 rinta_seeker_events.627.b: "I’m not convinced, though perhaps some will be..."
 rinta_seeker_events.627.c: "I’m keen on not being a heretic."

 rinta_seeker_events.628.t: "The Principle of the Ashamadi"
 rinta_seeker_events.628.desc: "Weggabiga, Dadubakha, Gawakhiza. The three brothers of the north. Over the course of hundreds of years, they’ve been drawn close together. Their alliance has proven to be not only beneficial, but truly an existential savior against invaders from the north and south. Through thick and thin, the three brothers have had each other’s backs.\n\nEven in these last few years, the northern states of Ashamadi blood, whether in part or whole, find themselves unprecedentedly close. A bond of land, culture, and respect fostered to grow even more intertwined.\n\nShould it be more than just an alliance? Can we achieve more together? Our people have been working in tandem for years. It's as if our borders don’t exist anymore. Do we really need to keep Weggabiga, Dadubakha, and Gawakhiza?\n\nIf we are already one, should we start acting like it?"
 rinta_seeker_events.628.a: "Let us reveal ourselves."
 rinta_seeker_events.628.b: "We are separate, even if we are one."

