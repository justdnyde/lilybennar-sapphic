 #Light Up The Night Sky
 incident_rinta_light_up_the_night_sky_title: "Light Up The Night Sky"
 incident_rinta_light_up_the_night_sky_desc: "The heavens have been lit alight! A strange astronomical phenomenon has filled the heavens, thousands of lights making the night sky a spectacle of dazzling wonder. Mwalim and Darwiiz alike seek to build a great observatory to study this unique event, but the strangeness of the situation has led many to be overtaken by unrest and madness…" #By: Astrofeesh

 #Events
 EVTOPTRINTA5060: "We've known this will come"

 rinta_seeker_events.501.t: "The Night Sky Alights" #By: ImaginTouch
 rinta_seeker_events.501.desc: "It was like any other night. Calm and silent. Maybe you could hear some revelry in the tavern, but nothing out of the ordinary.\n\nMost people were already deep asleep. They didn’t notice the black night sky wasn’t dark. As people were slowly drifting away into slumber, they saw a blinding light coming from outside. Many thought they had overslept, and it was already well into midday.\n\nSome others noticed.\n\nIt was not sunlight. It was not natural light. The stars were not visible, as their usual blinking was obscured by thousands of moving lights across the night sky.\n\nAt first, people were engrossed by such a spectacle. Unable to understand what was happening, they admired that strange beauty. Seconds passed, then minutes, then hours. It was as if time had stopped. And just as suddenly as it started, it finished - the lights went out. Vision slowly readjusted to the returned nightly darkness.\n\nAnd then, chaos. Unrest. Disorder and turmoil. People gone mad. They were claiming the Dead Gods were back. Back from the deepest parts of the darkest Void. Back for revenge against those who betrayed them. Everyone had seen the lights, and not all went insane. But everyone was distraught and concerned. What did the lights mean? What were they?"
 rinta_seeker_events.501.a: "Gather the Council and call all Mwalim and Darwiiz. We need to find out."

 rinta_seeker_events.502.t: "The Debate On Purpose" #By: Astrofeesh
 rinta_seeker_events.502.desc: "A great gathering of all available Mwalim and Darwiiz in our realm has coalesced, and debate has begun to rage about the indescribable events occurring in the skies above us. Though there is much disagreement about nearly every aspect of the situation, a single undeniable truth has emerged in regards to our actions going forward: this spectacle of lights must be understood, and to do that, we must watch it. The conference has unanimously approved the construction of a colossal telescope, one powerful enough to see the faces of the dead gods themselves in clear detail; hence the name, “Godswatch.” However, that is where the agreements have ended.\n\nThe rationalist Mwalim have come to the general consensus that the purpose of such an observatory should be entirely practical: the studying of the celestial bodies of the heavens, their rules and mechanisms, so that we may better understand the order of things back on Halann. The more traditionalist Darwiiz, however, believe the telescope’s purpose should be purely spiritual: it should be used to view the remains of the dead gods, spread across the sky by the souls who slew them, so that their evil may be understood and the pursuit of enlightenment may be furthered.\n\nIt is vital for this debate to be solved before the construction of the Godswatch can progress. We must make a declaration on what the purpose of the observatory should be, whether it be the Mwalim pursuit of reason, the Darwiiz pursuit of spirituality, or merely observance without a concrete purpose."
 rinta_seeker_events.502.a: "Support the Mwalim"
 rinta_seeker_events.502.b: "Support the Darwiiz"
 rinta_seeker_events.502.c: "Support both in equal measure"

 rinta_seeker_events.503.t: "The Debate On Logistics" #By: Astrofeesh
 rinta_seeker_events.503.desc: "One schism has been resolved, yet the debates between Mwalim and Darwiiz rage ever on, now merely with a different issue of focus. The argument that has now engulfed our halls is in relation to the sourcing of materials from which the Godswatch will be built.\n\nThe Darwiiz, as always, hold a very traditionalist viewpoint on this issue. They argue that the Godswatch is a Baashidi project, meant for the pursuit of Baashidi beliefs, and as such it must be built from Baashidi materials. The Mwalim, however, in their pursuit of knowledge, seek to use the methods of others that have already been proven to succeed. They point to the oracles of Tughayasa in Haless and the gnomes of Cannor as examples that should be studied, their materials outsourced to us and their methods co-opted in order to increase our chance of success in this great undertaking.\n\nThere is no doubt that we would have much to gain from them; on the other hand, using local materials would undeniably be much cheaper and more efficient. There is, of course, always the option to use a mix of both, though neither side would be fully satisfied with this."
 rinta_seeker_events.503.a: "Support the Mwalim"
 rinta_seeker_events.503.b: "Support the Darwiiz"
 rinta_seeker_events.503.c: "Support both in equal measure"

 rinta_seeker_events.504.t: "The Debate On Power" #By: Cappadocia
 rinta_seeker_events.504.desc: "The sheer scale of the telescope we are constructing necessitates an equally great power source. The question of how we will do that, like many other questions in the construction of the telescope, has become yet another battlefield between the Mwalim and the Darwiiz. The Mwalim have recently become infatuated with new devices from Cannor that can contain and discharge great amounts of magical energy. We are far from fully understanding how they work, but the Mwalim assure us we know enough to imitate it and make a device that can support the telescope if given sufficient magic once a week.\n\nThe Darwiiz urge us that this route is too dangerous; we do not understand the devices and we can’t know if we’re making an energy store or a damestear bomb. They instead advocate for using proven traditional rituals; though this is definitely less risky, it would require the magic to be reapplied every single day, which would be much more costly to maintain.\n\nPerhaps we could isolate the Cannorian discharges, limiting their danger but also their utility. It’s hardly a better solution than the other proposals but it would allow us to placate them both somewhat."
 rinta_seeker_events.504.a: "Support the Mwalim"
 rinta_seeker_events.504.b: "Support the Darwiiz"
 rinta_seeker_events.504.c: "Support both in equal measure"

 rinta_seeker_events.505.t: "The Debate On Quality" #By: Astrofeesh
 rinta_seeker_events.505.desc: "For better or for worse, we have managed to quell the majority of the infighting around the fundamental aspects of the observatory’s construction. However, when it comes to the Mwalim and Darwiiz, when one debate ends another will invariably arise. The next topic regards not the main telescope, but the additional ones that will populate the Godswatch.\n\nThe unfortunate reality of the situation is that we simply cannot afford to make every telescope as big and powerful as the observatory’s centerpiece. With the remaining funding that can reasonably be allocated, a decision must be made: we could build a large number of minor, less powerful telescopes, or a small number of periphery telescopes with significantly more functionality.\n\nThe Mwalim favor the latter option; even if they cannot match the central telescope, these moderately powerful lenses will allow the detailed long-term tracking of multiple important celestial objects simultaneously. The Darwiiz, however, have a significantly different view: they believe the purpose of the periphery telescopes should be to give the common people a chance to look upon the stars for themselves.\n\nTo that end, the construction of as many telescopes as possible is a necessity, regardless of their quality. We could also attempt to include a moderate number of decently-powerful telescopes in order to bridge the gap between the two proposals, though neither side would be fully content."
 rinta_seeker_events.505.a: "Support the Mwalim"
 rinta_seeker_events.505.b: "Support the Darwiiz"
 rinta_seeker_events.505.c: "Support both in equal measure"

 rinta_seeker_events.506.t: "The Debate On Amenities" #By: Astrofeesh
 rinta_seeker_events.506.desc: "To nobody’s surprise, another issue has inevitably arisen regarding the design of the Godswatch Observatory. A facility of this size will have room for more functions than just the telescope; the question is what those additional functions should be.\n\nThe Mwalim have presented the relatively straightforward proposal of establishing a university on the observatory grounds. The idea is that such a thing would be mutually beneficial for both facilities: the telescope would provide excellent hands-on data for prospective students, whereas the university would provide a steady stream of educated personnel capable of understanding said data. The Darwiiz, true to form, oppose this idea, believing that such a thing would benefit only the upper class of the capital rather than the people as a whole. Rather, they propose that the observatory be equipped with living quarters and facilities capable of accommodating pilgrims from all four corners of the land, so that all who make the journey to see through the telescope have a place to stay.\n\nWe could try and implement both suggestions, but there are limits to how big the observatory can reasonably be, so it wouldn’t serve either purpose as effectively."
 rinta_seeker_events.506.a: "Support the Mwalim"
 rinta_seeker_events.506.b: "Support the Darwiiz"
 rinta_seeker_events.506.c: "Support both in equal measure"

 rinta_seeker_events.507.t: "The Debate On Availability" #By: Astrofeesh
 rinta_seeker_events.507.desc: "The design for the Godswatch is all but finalized, but still the Mwalim and Darwiiz find yet more topics to argue about. Their latest disagreement regards the availability of the central telescope.\n\nThe Darwiiz have taken the stance that the central telescope should be given an air of spiritual reverence; looking through it should be treated as an act of great devotion. As such, they argue its use should be limited only to mages and spiritual leaders, with the general populace limited to only using the periphery telescopes to gaze upon the sky. The Mwalim disagree with this, arguing that the central telescope should not be given any restrictions on who should use it: to do so would be an arbitrary limitation that could severely hamper its usage as an instrument of research. As always, we could try and force a compromise by simply instituting a priority system for usage of the telescope, but it’s clear that neither group would be very happy with this."
 rinta_seeker_events.507.a: "Support the Mwalim"
 rinta_seeker_events.507.b: "Support the Darwiiz"
 rinta_seeker_events.507.c: "Support both in equal measure"

 rinta_seeker_events.508.t: "The Debate On Foreigners" #By: Astrofeesh
 rinta_seeker_events.508.desc: "As construction of the Godswatch nears its end, so too does the list of possible things that the Mwalim and Darwiiz can argue about. After this one last debate, all the details will be finalized. All that’s left is to choose whether access to the observatory should be restricted based on faith.\n\nThe Darwiiz, ever the populists, have demanded that only those who follow the Rinta Seekers faith should be permitted within the bounds of the astronomical complex. It is, to them, ultimately a building of great religious importance, and allowing non-believers within would be a trivialization of the meaning it holds. The Mwalim, however, believe that the observatory first and foremost is a place of learning, and restricting access based on religion would prevent foreign scholars from sharing their knowledge within. An alternative option could be simply limiting foreigners to a single wing of the observatory, but as with every other compromise both the Mwalim and Darwiiz have voiced their disapproval of this."
 rinta_seeker_events.508.a: "Support the Mwalim"
 rinta_seeker_events.508.b: "Support the Darwiiz"
 rinta_seeker_events.508.c: "Support both in equal measure"

 rinta_seeker_events.510.t: "To Gaze Upon the Heavens" #By: Astrofeesh
 rinta_seeker_events.510.desc: "For a decade, the lights in the night sky have looked down upon us. It was inevitable that we would return the favor. The Godswatch Observatory, in all its astronomical glory, has finally been constructed.\n\n[Root.LUTNS_ending_event_telescope]\n\n[Root.LUTNS_ending_event_vok]\n\nRegardless, the air of uncertainty and fear that has swept our nation for the past ten years has finally given way to one of hope. However long they choose to stay, the lights now represent a symbol of our triumph over the unknown, a great milestone in the endless road we walk in pursuit of knowledge. The sky has been alight for a decade; may it light our path for decades more!"
 rinta_seeker_events.510.a: "Shine on, O Night!"
 LUTNS_ending_event_telescope_12: "It is a moderately impressive complex; though its focal point is the large telescope in the center, it has a few peripheral telescopes for additional stargazing capacity and a wing suited to the tastes and supply needs of the Mwalim and Darwiiz. The central telescope, the Godswatch itself, is powerful enough that never-before-seen stellar phenomena are now visible. There is no doubt that it will be more than good enough to unravel the mysteries of the night sky."
 LUTNS_ending_event_telescope_34: "The complex has far exceeded all our expectations. Even without its centerpiece, the peripheral telescopes alone are comparable to those found in far off lands like the Dragon Coast and Tughayasa. The observatory’s wings house not just astronomical equipment, but a wide host of additional research facilities and various amenities for the staff. The central telescope, the Godswatch itself, is truly beyond compare when it comes to observance; during testing, it was found to reveal countless legions of dim stars that are invisible to the naked eye. There is no doubt that all the mysteries of the night sky will be revealed to us."
 LUTNS_ending_event_telescope_5: "The complex could possibly be considered the greatest achievement of [Root.Culture.GetName] civilization. Even without the titanic central telescope, its periphery telescopes are powerful enough to put any previously existing ones, at home or abroad, to shame. It is nearly the size of a small city, both in size and population, with wings for nearly any purpose that the Mwalim and Darwiiz could hope to dream of.\n\nThe central telescope, the Godswatch itself, is a monumental wonder of engineering, large enough to be seen from miles away. Its power is so immense that, when we turned it to look upon the Moon during testing, we inadvertently discovered that the tiny glints of white-teal upon its surface were actually colossal nodes of Damestear. We set out to solve only the mystery of the lights in the sky, but there is now surely nothing in the heavens that could possibly remain unknown to us."
 LUTNS_ending_event_vok_widened: "The Mwalim have spearheaded the research into the nature of the strange lights, hoping to put this matter to rest once and for all. After only a few days, they’ve presented us with their findings, hoping to dispel the more unpleasant theological rumors related to the situation. The lights, beyond all doubt, are a purely natural phenomenon: they are simply a large swarm of asteroids and meteorites, most likely made primarily of ice, orbiting around us similarly to the Moon. The illumination comes from two sources: the ones in orbit reflect sunlight off their surface, whereas the ones that fall to the surface catch fire and dissolve in the air. The actual details require much further investigation to figure out, and the origin of this event is still a mystery, but there is one thing that can be said for certain: the gods are still dead, and these are not the gods."
 LUTNS_ending_event_vok_narrowed: "The Darwiiz have spearheaded the research into the nature of the strange lights, hoping to put this matter to rest once and for all. After only a few days, they’ve presented us with their findings, hoping to dispel the more unpleasant theological rumors related to the situation. The lights, from what they’ve observed, are something truly fantastical: the souls of heaven, gazing down upon their living descendants in the form of shining glass. The theological implications of this are staggering, though it doesn’t directly contradict any current beliefs: souls were only trapped in heaven while the corrupt gods lived, so with them slain there is nothing stopping the dead from watching over us. It is a convenient dissolution of the fears that the dead gods live, and a heartwarming reminder that the loved ones we’ve lost are closer than we know."
 LUTNS_ending_event_vok_unchanged: "In a rare show of cooperation, the Mwalim and Darwiiz have chosen to pool their knowledge and work together to research the nature of the strange lights. After only a few days (and twice as many arguments) they’ve presented us with their combined consensus, putting their differences aside in order to dispel the more unpleasant theological rumors related to the situation. The lights, after much observance and deliberation, can be said to be a mix between a natural and spiritual phenomenon: they are a large band of reflective asteroids, orbiting Halann much in the way the Moon does, acting as “eyes” that the souls of heaven can use to look down upon their descendants.\n\nMany of the details are still up for debate: it is yet unknown whether these objects are fully physical and simply used as opportunistic conduits for the souls, or if they’re entirely composed of spiritual energy given solid form. Regardless, there can now be no doubt that the dead gods remain so, and it’s clear they had no part in this event. That being said, perhaps the greatest miracle was not the lights above, but the fact that the Mwalim and Darwiiz were able to actually get along for once."

 rinta_seeker_events.520.t: "Godswatch Funds Stolen" #By: Astrofeesh
 rinta_seeker_events.520.desc: "Disaster! One of our rivals has managed to infiltrate our administration and redirect a portion of the funds we’ve provided to the Godswatch. While the money has still reached the same destination, it now appears to have been funneled through their private estates in such a way that it now looks like the donation is theirs. This won’t affect the observatory’s actual funding, but it will give them much more sway when it comes to choosing its location. We must find a way to make up for this underhanded subterfuge!"
 rinta_seeker_events.520.a: "They won’t get away with this!"

 rinta_seeker_events.521.t: "Embezzled Godswatch Funds" #By: Astrofeesh
 rinta_seeker_events.521.desc: "A routine accounting check of the funds we’ve provided for the construction of the Great Observatory has revealed a noticeable discrepancy. It seems a sizable amount of the money we sent has simply disappeared into thin air at some point in the process. Further investigation has tracked down the exact place this money disappeared: one of our advisors has been confiscating a portion of each payment as so-called ‘administrative expenses’ without our knowledge or approval.\n\nConfronted about this obvious corruption, our advisor attempted to pass it off as a simple miscommunication, though he is unable to provide any explanation for where the funds actually went. He’s begged for us to show mercy and sworn that he won’t let any more of these ‘accidents’ happen, but we would also be entirely justified in ordering his execution and seizing the deficit from his personal estate."
 rinta_seeker_events.521.a: "We cannot turn a blind eye to blatant corruption."
 rinta_seeker_events.521.b: "No need to overreact. It was probably an honest mistake."

 rinta_seeker_events.522.t: "Stole Godswatch Funds" #By: Astrofeesh
 rinta_seeker_events.522.desc: "Good news! We’ve managed to infiltrate the administration of one of our rivals in order to redirect a portion of the funds they’ve provided to the Godswatch. While the money has still reached the same destination, our agents have modified some paperwork in order to funnel it through our private estates in such a way that it now looks like the donation is ours. This won’t affect the observatory’s actual funding, but it will give us much more sway when it comes to choosing its location. Things couldn’t have gone better!"
 rinta_seeker_events.522.a: "Underhanded subterfuge solves everything!"

 rinta_seeker_events.523.t: "Astronomical Oversight Committee" #By: Astrofeesh
 rinta_seeker_events.523.desc: "Progress on the Godswatch Observatory has hit an unexpected snag. There have been reports of the use of underhanded subterfuge in order to obfuscate the true origin of certain funds for the project—it seems like one country has been taking credit for donations they didn’t give. Accusations have been thrown out by both sides despite the lack of provable evidence, which has resulted in a significant souring of relations. Trust in the project has notably decreased, as nobody wants to provide a donation without guarantees that someone else won’t take credit for it.\n\nA group of diplomats from the various contributing countries have gathered in order to find a solution to this. After some debate, they’ve presented a proposal to establish an organized oversight committee to guarantee that there will be no foul play when it comes to donations. The sky is alight, they say; we cannot afford to get bogged down by disagreements on the ground."
 rinta_seeker_events.523.a: "An excellent idea!"
 rinta_seeker_events.523.b: "We’d prefer less oversight, if you catch my drift."
 rinta_seeker_events.523.c: "As long as the funds get there, who cares who takes credit?"

 rinta_seeker_events.524.t: "THE GODS ARE NOT DEAD" #By: Astrofeesh
 rinta_seeker_events.524.desc: "“The gods are dead. The gods are dead. The gods are dead. The gods are dead.”\n\nThe man pauses his mantra. Again, his mind compels him to look up. The night sky is alight, shimmering with a thousand points of twinkling white light, dancing around back and forth as if they were alive. The city around him is bright, nearly as bright as day. But it is not day. He shuts his eyes as tight as he can.\n\n“The gods are dead. The gods are dead. The gods are dead. The gods are dead.”\n\nHe knows the rumor. Everyone in the city knows the rumor. Many believe it. But it can’t be true. The gods are dead. They were slain at the gates of heaven by the souls enslaved within, seeking freedom for the harm wrought by the gods’ corruption. They are dead, and they have been dead for a very, very long time. They have to be dead. They have to be.\n\n“The gods are dead. The gods are dead. The gods are dead. The gods are dead….”\n\nHis eyes are opened again. His gaze has focused on a single one of the false stars. It is too bright, too small to make out any details. Its movement through the skies slows, comes to a stop. He stares at it. It stares back at him.\n\n“The gods are dead! The gods are dead! The gods—”\n\nIt is no use. He no longer believes the words he speaks. The gods are not dead."
 rinta_seeker_events.524.a: "Send the [Root.GetClergyName]! Quickly!"
 rinta_seeker_events.524.b: "Perhaps the world around us is not as unraveled as we thought?"
 rinta_seeker_events.524.c: "The gods are dead… The gods are dead.…"

 rinta_seeker_events.525.t: "Cult of the Living Gods" #By: Astrofeesh
 rinta_seeker_events.525.desc: "The gods are dead. The lights in the sky are not gods, but some unexplained natural phenomena. There can be no other explanation.\n\nYet, there are some who see things differently. Whether by misjudgement or madness, a number of those who have seen fit to look at the sky under their own volition have become errantly convinced that the dead gods yet live. The details of this supposed revival differ between adherents, typically consisting of incoherent, insane ramblings that range from a generational conspiracy to the arrival of the end times. It is hard to understand how they might have come to such an irrational conclusion, as the gods are dead.\n\nRegardless, this wave of madness among the populace has given rise to the formation of a nascent cult, one that has seen fit to burn villages and sacrifice the innocent in order to appease what they see as the gods’ anger. The gods cannot be angry, as they are dead. This wanton violence and destruction must be stopped at any cost. The gods are dead. We cannot permit the existence of those who deny this. The gods are dead. The gods are dead. The gods are dead…."
 rinta_seeker_events.525.a: "The gods are dead. Those who disagree can join them."

 rinta_seeker_events.526.t: "Cult of the Living Gods Defeated!" #By: Astrofeesh
 rinta_seeker_events.526.desc: "The cultists lie defeated and scattered, their leaders as dead as the gods they claim to worship. State soldiers have occupied their strongholds, and the process of returning any stolen goods and repatriating those who have not yet been fully overtaken by madness has already begun.\n\nHowever, a search of their headquarters has resulted in a somewhat disquieting discovery. A hidden room has been discovered to contain a large amount of funds seemingly collected from the cult’s members, along with a letter: ‘For donation to the Godswatch, so that the gods may be seen by all.’\n\nThe realization that these maddened cultists were also in support of the Godswatch Observatory carries an unsettling implication, to say the least. Though we’ve tried our best to suppress this information, rumors have already begun to spread, and if we were to pass the funds along to the observatory it would be all but a confirmation of them. However, it must be said that a donation this significant would go a long way towards speeding up construction."
 rinta_seeker_events.526.a: "Get rid of it. This discovery can’t get out under any circumstances."
 rinta_seeker_events.526.b: "Money is money, and rumors will stay rumors."

 rinta_seeker_events.527.t: "Sinful Donation" #By: Cappadocia
 rinta_seeker_events.527.desc: "As important as the clergy are in our society, it’s only natural that they’ve acquired no small amount of wealth. This has often made them the target of unscrupulous robbers, but recently someone has robbed our clergy with no apparent desire for self gain. Feeling that the clergy hasn’t been doing enough to support our great telescope, they have stolen no small amount of funds from a local temple and have donated it themselves. More funds for the telescope are always good, but the clergy wants their money returned."
 rinta_seeker_events.527.a: "The thief has a point, why aren’t they helping?"
 rinta_seeker_events.527.b: "Wrong is wrong, regardless of intentions."

 rinta_seeker_events.528.t: "Death of a Merchant" #By: Astrofeesh
 rinta_seeker_events.528.desc: "One of the greatest and richest men in [Root.GetUsableName], [Root.trader_name.GetName], has died without an heir. A well-respected trader who built his fortune from commerce, he was a well known patron of religion and the arts. We had expected that in death, he would bequeath all his wealth to the state.\n\nHowever, the construction of the Godswatch seems to have caught his interest in his later years. Just before his death, he amended his will to bequeath all his wealth directly to the project instead. Most would see it as our duty to respect his last wishes, but we could also nullify the will and seize the money for ourselves."
 rinta_seeker_events.528.a: "Use it as he would have."
 rinta_seeker_events.528.b: "The state really needs the money, though."

 rinta_seeker_events.529.t: "Strong Merfolk Ties Pay Off" #By: Astrofeesh
 rinta_seeker_events.529.desc: "It can be hard to care about the sky when you live beneath the waves, but it seems that the cavalcade of lights above is striking enough to have made a splash in merfolk society. Our subaquatic friends have given us a significant monetary gift, the only condition being that it be used as funding for the Godswatch. This generous offering has gone a great way towards strengthening the bonds of trust between our two peoples even further. Some of our advisors think it’s a bit fishy that it’s all in liquid assets, however."
 rinta_seeker_events.529.a: "Such a kind gesture, it’s making my eyes water!"

 rinta_seeker_events.530.t: "The Tangibility of Faith" #By: Astrofeesh
 rinta_seeker_events.530.desc: "There are some in the [Root.GetClergyName] who see the illumination of the night sky as an excuse to tear down the very foundations of our faith. Specifically, they’ve demolished a temple.\n\nBelieving that their place of worship is worth less than the value it could provide, the local priests have liquidated the temple’s building materials and everything inside it. They’ve offered this money to be used for the Godswatch’s construction, proclaiming that the noblest act of faith is the pursuit of knowledge. It is certainly an interesting theological sentiment, and the funds would not go unappreciated. However, some would argue that the [Root.GetClergyName] destroying their own temples might not be the best look for us."
 rinta_seeker_events.530.a: "True clarity is worth more than any temple."
 rinta_seeker_events.530.b: "Put it back, you maniacs!"

 rinta_seeker_events.531.t: "Nobles Request Their Due" #By: Astrofeesh
 rinta_seeker_events.531.desc: "The illumination of the sky has caused a great many changes in our society, but one thing that never changes is the [Root.GetNobilityName]’s interest in growing their own personal wealth.\nTaking a great interest in the large sums of money flowing into the Godswatch Observatory project, a number of nobles have demanded their right to a portion of the funds. They argue that their invaluable contribution to the administrative side of the project, as well as the fundraising efforts among their subjects, means they should be provided with a monetary reward for their troubles. Of course, we’re not under any actual obligation to pay them, but it’s also always prudent to stay on the [Root.GetNobilityName]’s good side."
 rinta_seeker_events.531.a: "Don’t you have enough money already?"
 rinta_seeker_events.531.b: "Fine, just take it."

 rinta_seeker_events.532.t: "Cracks in The System" #By: Cappadocia
 rinta_seeker_events.532.desc: "No society is immune to corruption, not ever in the past and not ever in the future. Still we’d like to think we aren’t as corrupt as others, yet a massive scheme has gone unnoticed right beneath our gaze. Large amounts of funding that was supposed to go towards the grand telescope has instead gone to seemingly nowhere. It’s been eaten up by workers faking work, nobles ‘misplacing’ funds, and government officials taking their own slice to keep quiet about it all. Every society has some corruption, but we didn’t expect this much!"
 rinta_seeker_events.532.a: "We didn’t even know…"

 rinta_seeker_events.595.t: "Convert To Rinta Seekers?"
 rinta_seeker_events.595.desc: "You know you wanna"
 rinta_seeker_events.595.a: "Yes"
 rinta_seeker_events.595.b: "No"

 rinta_seeker_events.599.t: "Invest In The Godswatch Observatory"
 rinta_seeker_events.599.desc: "A strange astronomical phenomenon has filled the heavens, thousands of lights making the night sky a spectacle of dazzling wonder. Mwalim and Darwiiz alike seek to build a great observatory to study this unique event, but first it needs funding."
 rinta_seeker_events.599.a: "Go Back"
 rinta_seeker_events.599.b: "Invest Everything"
 rinta_seeker_events.599.c: "Invest Half of Everything"
 rinta_seeker_events.599.d: "Invest 100¤"
 rinta_seeker_events.599.e: "Invest 250¤"
 rinta_seeker_events.599.f: "Invest 500¤"
 rinta_seeker_events.599.g: "Invest 1000¤"

 #Decisions
 rinta_invest_in_telescope_decision_title: "Invest In The Godswatch Observatory"
 rinta_invest_in_telescope_decision_desc: "The construction of an edifice as grand as the Godswatch requires a similarly massive amount of money. It is our obligation as seekers of truth to set aside a portion of our wealth for this, allocating it to a central fund to be used for the project. Our devotion will not go unrewarded: whoever provides the most money to the observatory will be granted the honor of choosing its location.\n\nTotal Amount Invested: §G[6678.rinta_telescope_amount_raised.GetValue]§!¤\n[Root.GetAdjective] Amount Invested: §G[Root.rinta_telescope_amount_invested.GetValue]§!¤\n\nLevel 1 Cost: §Y[6678.rinta_telescope_lvl_1_cost.GetValue]§!¤\nLevel 2 Cost: §Y[6678.rinta_telescope_lvl_2_cost.GetValue]§!¤\nLevel 3 Cost: §Y[6678.rinta_telescope_lvl_3_cost.GetValue]§!¤\nLevel 4 Cost: §Y[6678.rinta_telescope_lvl_4_cost.GetValue]§!¤\nLevel 5 Cost: §Y[6678.rinta_telescope_lvl_5_cost.GetValue]§!¤"
 rinta_raise_foreign_funds_title: "Raise Foreign Funds"
 rinta_raise_foreign_funds_desc: "The construction of an observatory as large as the Godswatch has caused a great wave of excitement in foreign scientific communities. With a bit of diplomatic maneuvering, we may be able to convince them to make a contribution of their own in exchange for the right to post."

