l_english:
 #Missions
 B42_deeper_cooperation_title:0 "Deeper Cooperation"
 B42_deeper_cooperation_desc:0 "Initial talks with Corintar have gone well; finally someone here who doesn’t wish to put an axe through our heads! If we can solidify this relationship further into a proper partnership, we could win not just a powerful ally, but also priceless guidance on how to survive in Escann."
 
 B42_support_the_corintar_title:0 "Back the Corintar"
 B42_support_the_corintar_desc:0 "While the Corintar has been a loyal and reliable ally, it can’t be denied that their expansion in Escann has been less successful than our own. To ensure the survival of these reliable knights, and as repayment for past help, it may be time to change our relationship to that of backer and client."
 
 B42_integrate_the_knights_title:0 "Integrate the Knights"
 B42_integrate_the_knights_desc:0 "The knights of Corintar have performed excellently fighting alongside our troops, but perhaps we could work together even better if we fought as an integrated army rather than separate forces? We have learned enough of Cannorians by now to know that their knights are famous for their skill in mounted combat, something in which we don’t have the greatest expertise.\n\nWhile the Corintar refer to themselves as a knightly order, the truth is that many of the come from lowly backgrounds, without the inherited money through which true knights afford their signature steeds. If we provide the funding, and the Corintar’s more noble members provide the instruction, we could give the knights what they need to truly live up to their name, and give ourselves the expertise needed to plug a hole in our army's composition."
 
 B42_remind_of_the_promise_title:0 "Remind of the Promise"
 B42_remind_of_the_promise_desc:0 "To survive with enemies on all sides, we will need friends to watch our backs. While most humans treat us little better than the orcs, if even that, there might still be hope for us. Though Corin died, her closest followers, the Corintar still remain. They, if anyone would know about the deal she made with us, and they seem exactly like the kind of people to put too much weight on old promises. With some luck and negotiation, they might be exactly what we need to survive."
 
 B42_adventurer_diplomacy_title:0 "Adventurer Diplomacy"
 B42_adventurer_diplomacy_desc:0 "Relations with Corintar are going decently well, and it’s time to see whether this success can be replicated. With the legitimacy of Corintar vouching for us, approaching the other warrior companies will become much easier. If we use our brief deal with Corin to present ourselves as being on the same side, these other bands might leave us alone."
 
 B42_adventurer_expertise_title:0 "Adventurer Expertise"
 B42_adventurer_expertise_desc:0 "With some of the Marchers convinced that we are on the same side, we can ask them for further aid in our survival. These adventurers know many things which we do not about warfare in Cannor. Most impressive of all are the exploding sticks that have become increasingly common in their ranks. If we can invite some of them as military advisors to our army, the potential gains would be far worth the cost."
 
 B42_become_one_of_them_title:0 "Become One of Them"
 B42_become_one_of_them_desc:0 "The longer we keep our Escanni contacts, the more we realise that they are not merely key to military survival; they are the key to a whole world. All of Cannorian civilisation, the many  riches and refined societies, could open to our traders and diplomats if we are able to properly leverage and expand the relationships we’ve made. More and more our tribe is starting to understand that becoming part of Cannor means not just adapting to the land, but also integrating with the people who live in it."
 
 B42_farewell_to_vortza_lesa_title:0 "Farewell to Vortza Lesa"
 B42_farewell_to_vortza_lesa_desc:0 "Ever since mythical times, when the fey first betrayed us, Vortza Lesa has been our greatest patron and ally. Her trees hid us from enemies, her plants and animals sustained us, and her gifts let our shamans strike back against fey trickeries and elven sorceries. While the existence of other deities beyond the trees may have been acknowledged, all Forest Goblins know that Lady Forest alone is worth appeasing. Yet we are outside of her forest now. This new land is one of open fields and rolling hills, inhabited by different gods. It seems the time has finally come to leave behind the protection of our Great Lady, and beseech the gods of our new home."
 
 B42_this_new_land_title:0 "This New Land"
 B42_this_new_land_desc:0 "After fleeing, fighting, and leaving everything which we knew behind, the land of Escann stretches out before us. These vast fields are certainly nowhere as deadly as the thick forest we knew, but the land won’t work itself, and our knowledge is specialised for the forest floor, not the meadow. Much work will be needed to protect our own slice of Escann, and learn the trades to make use of it, before this land can truly become our new home."
 
 B42_the_gods_of_cannor_title:0 "The Gods of Cannor" 
 B42_the_gods_of_cannor_desc:0 "With Lady Forest remaining in her woods, we need to seek divine favour from many different sources, as no single deity could replace her. While the gods of the slave revolts can be relied on to care for goblinkind, and no one can deny Dookan’s strength, they are ultimately foreigners to this land. To live in Escann we simply must ingratiate ourselves with the Cannorian gods. Their blessings will secure our fortune with both the land itself and those who inhabit it."
 
 B42_settler_disputes_title:0 "Settler Disputes"
 B42_settler_disputes_desc:0 "With the Greentide broken, it seems many humans who fled from the great host are gradually deciding to return. This is unfortunate, as many of their old homes are right in the lands where we have now settled down, leading to disputes over ownership. By utilizing that old promise that Corin once gave us about a home in Escann, we can make our own claims seem more justified to Cannorian ears, letting us keep and claim land more easily without burning too many bridges with our associates in the Marcher Lords."
 
 B42_our_promised_land_title:0 "Our Promised Land"
 B42_our_promised_land_desc:0 "Once, we made a quick deal with a passing warrior. Fight the orcs, and receive a new home. What happened next did not go as planned. The warrior died, her followers split before the orcs could be properly crushed, and knowledge of our deal was lost to all but a few; indeed, even many of her own followers would soon turn a hostile eye to us. For decades we had to fight both the orcs and Corin’s own followers, but in the end we did indeed secure a new home. It is nothing more than what we were owed."
 
 B42_strike_back_at_the_orcs_title:0 "Strike Back at the Orcs"
 B42_strike_back_at_the_orcs_desc:0 "The orcs attacked and enslaved us in our ancestral home, and we were forced to flee. Now we’ve fled out of the very Deepwoods themselves, yet still the orcs attack us. The time for fleeing is over - it is time to strike back and make the orcs pay for each drop of Groundhawk blood that they have spilled!"
 
 B42_adapt_our_tactics_title:0 "Adapt Our Tactics"
 B42_adapt_our_tactics_desc:0 "War in the Deepwoods was harsh and chaotic, but it had its advantages. Using the heavy underbrush and our diminutive size,we were often able to hide and strike our enemies before they could spot us. The open fields of Escann provide a completely different challenge. We can no longer hide; we need to be able to overwhelm our enemies in head-on combat!"
 
 B42_goblin_united_title:0 "Goblins United"
 B42_goblin_united_desc:0 "Many Greentide goblins have joined our clan by now. Forest Goblins and Common Goblins can now be seen praying to the same deities, fighting in the same forces, and even living in the same families. Even the dark green and black skins that define our races seem to be gradually giving way to the lighter green hues of Escann. Can we still think of ourselves as a tribe of Forest Goblins, or are we a tribe of Escanni Goblins?"
 
 B42_our_distant_kin_title:0 "Our Distant Kin"
 B42_our_distant_kin_desc:0 "These throngs of beaten and malnourished prisoners, former slaves of the orcs, are a sorry sight indeed. Such folk are barely even recognisable as the same species as our cohesive clan of trained warriors and hunters. Yet in their desperate fight for survival and endless wish for freedom, we can recognise the spirits of true goblins within them. If we wish for neighbours who don’t see us as lowly servants or savage monsters, and deities who we know for sure will be friendly to our kind, we must contact these foreign goblins."
 
 B42_pragmatic_alliances_title:0 "Pragmatic Alliances"
 B42_pragmatic_alliances_desc:0 "Survival is tough among the chaotic warlord states of Escann, and everything we've worked for so many years to build could be taken away from us by a single tactical misstep, or even just unfortunate circumstances. No plan can truly be off-limits when it comes to the survival of our tribe. The wicked orcs have committed great cruelties toward us, yet they and the war god who leads them are powerful indeed. For the sake of our future, we might need to consider the possibility of bringing some of them to an agreement with us."
 
 B42_the_cause_of_the_goblins_title:0 "The Cause of the Goblins" 
 B42_the_cause_of_the_goblins_desc:0 "The wars of Escann have not been kind to goblinkind. While our own [Root.GovernmentName] has been triumphant, countless others have been reshackled by the orcs or killed by the blades of orcs and Marchers alike. Some goblins have fled west, becoming refugees in the western lands of Cannor. Unfortunately, it seems the Cannorians’ regard for these newcomers is extremely low, influenced as they are by the dwarves and Castanites. Seen as little more than pests, they are generally given the worst of living conditions, if allowed to live at all. With our special standing among the Cannorians, we are in a unique position to improve the views and treatment of goblins across Cannor."
 
 B42_goblins_in_need_title:0 "Goblins in Need"
 B42_goblins_in_need_desc:0 "Orvitzyen has done a spectacular job in providing security for goblin refugees both at home and abroad, but maybe it’s time we started tackling the problems at their source? The endless goblin refugee flows in both Escann and further west are ultimately traceable to the many perils our kind face back in their homelands. Perhaps the best way to protect goblins would be to support stable realms back in the Dwarovar and Deepwoods, or failing that, at least provide safe escape routes."
 
 B42_the_hollow_mountain_title:0 "The Hollow Mountain"
 B42_the_hollow_mountain_desc:0 "With all the goblins pouring in from the Deepwoods and Dwarovar, finding room for all of them may be difficult. Luckily we have found the perfect place to house them. Marrhold, an old dwarven hold disconnected from the Dwarovar, is practically a giant cave lined with perfectly sized goblin dwellings. Currently occupied by humans who can barely live inside the thing, our kind could make far better use of the ruined hold’s many nooks and crannies than they ever could!"
 
 B42_root_out_the_fey_title:0  "Root Out the Fey"
 B42_root_out_the_fey_desc:0 "Our brave sentinels may be spending both day and night valiantly keeping their vigil against the wickedness from the Deepwoods, but still we are not safe from the fey. While the Deepwoods may be their stronghold, in truth they inhabit many of the wildernesses here in Escann as well. We need to send militias to root out the fey from various forests and groves of our land for good, or else one day our families might be attacked while they sleep."
 
 B42_remember_our_history_title:0 "Remember Our History"
 B42_remember_our_history_desc:0 "We should do well to remember that we were not the first goblins to inhabit these lands. Long, long before the Greentide, when this land was still known as the Oldwoods, goblins had already been calling it home since time immemorial. Even after the fey betrayed us and destroyed our great kingdom we survived, until the wicked Castanites burned down the trees and forced us out. This ancient history needs to be taught and preserved, both to remember our fallen ancestors and to remind ourselves that our dominion of Escann is nothing more than the natural order of things, restored at last by Corin’s divine justice."
 
 B42_western_knowledge_title:0 "Western Knowledge"
 B42_western_knowledge_desc:0 "We knew the Cannorians held a lot of useful knowledge about living in Escann, but the true breadth of learning housed in their libraries has completely floored us. While we keep absorbing what knowledge we can, it becomes increasingly clear that to truly catch up we need to get our hands on some of these texts ourselves and establish our own center of center of knowledge. Perhaps, one day, it will be others who come to learn from us."
 
 B42_avatar_idolism_title:0 "Avatar Idolism"
 B42_avatar_idolism_desc:0 "As we become more intertwined with Cannorian religion, a curious phenomenon has emerged. It appears that the goblinic traditions of unlimited deities has merged with the Cannorian doctrines of divine mortals; causing an explosion of personality cults in which all manner of great men and women are idolised as avatars. Perhaps by promoting the cults of these living idols, we could increase the religious devotion of our subjects."
 
 B42_firebrand_recruits_title:0 "Firebrand Recruits"
 B42_firebrand_recruits_desc:0 "With the war between Corin and Adean in full swing, and us firmly aligned on the side of the former, we are in dire need of more fighters. Luckily, our government has been caught completely off guard by the sheer number of volunteers willing to take up arms for this conflict. Maybe we shouldn’t have been so surprised by this development - after all, who in these wartorn lands has never prayed to the Lady of War before a successful battle, seen a loved one return healthy with her protection, or had their home saved by her granted victory? There are many in our realm who owe their lives or more to Corin, and are more than eager to return the favor."
 
 B42_ward_the_forest_title:0 "Ward the Forest"
 B42_ward_the_forest_desc:0 "We may have followed Corin to a new home outside of the Deepwoods and its cruel fey, and even reached out a helping hand to aid those still stuck inside that cursed forest, but there’s a growing sentiment that this isn’t enough. The more zealous and militant among us argue that the enduring threat from the fey needs to be faced with constant vigilance, lest it strike from the woods when we least expect it. Nothing less than a full defensive perimeter surrounding the Deepwoods, manned by those brave of heart and pure of conviction, is needed to protect our realm."
 
 B42_evils_in_escann_title:0 "Evils Within"
 B42_evils_in_escann_desc:0 "The emerging Corinite zealots in our nation have done a great job in the fights against Adean and the Deewoods, but some of our priests are offering warnings that we are neglecting to deal with the evils inside our borders. The increasingly prominent priests of Corin insist that a true followers of her teachings must fight not just against evil abroad, but also against the rot and corruption that grows from within. Let us then focus on redeeming Escann of whatever wickedness we can find amongst its people; our [Root.GovernmentName] shall become known as a truly blessed realm!"
 
 B42_to_corins_aid_title:0 "To Corin's Aid"
 B42_to_corins_aid_desc:0 "As if the conflicts here on Halann weren’t brutal enough, words are now spreading of a succession crisis in the heavenly realm, the contestants being Corin and Adean. While some are preaching caution, suggesting we abandon Corin and Adean and instead pray to Apzarko Hrom or even Dookan as our primary war deity, the vast majority have taken a different position. Not only is Corin’s favor what gives us our very claim to these lands, but this isn’t the first time we’ve had a choice like this. The last time, we chose to stand with Corin instead of by ourselves, and the rewards from that decision have been immeasurable. Let us hope that this time, siding with Corin will once again yield the same result."
 
 B42_the_sky_war_title:0 "The Skywar"
 B42_the_sky_war_desc:0 "It seems the dispute between Corin and Adean has finally erupted into a full succession war. As the gods and celestials fight in the sky, the earth too becomes a front in the war, the very heavenly blood that is spilled a weapon against the gods’ earthly followers. Crimson rains from the sky, and times are bleak. As allies of Corin, we will have to do our own part as soldiers in the Skywar."
 
 B42_restore_the_fields_title:0 "Restore the Fields" 
 B42_restore_the_fields_desc:0 "With the bulk of the fighting over, at least in the sky, it is time to rebuild all that has been despoiled from the endless flow of heavenly blood. Let it be known that our [Root.GovernmentName] has survived an assault from the gods themselves!"
 
 B42_throne_of_the_gods_title:0 "The Throne of the Gods"
 B42_throne_of_the_gods_desc:0 "The war in the sky may have ended, but the earthly front is just now heating up. As the servants of Adean are gathering their forces for the fight, so must the followers of Corin rally to ensure that our patron can finally win her throne." 
 
 B42_the_walled_city_title:0 "The Great City"
 B42_the_walled_city_desc:0 "Since the time of ancient Castanor, Castonath has been the greatest and wealthiest city in Escann. While ravaged by both the Dragonwake and the Greentide, it has gone great lengths to restore its wealth and prestige. As the unquestioned economic hegemon of Escann, our protection is all that the city needs to once again become the envy of the entire world."
 
 B42_her_promise_fulfilled_title:0 "Her Promise Fulfilled" 
 B42_her_promise_fulfilled_desc:0 "She promised us a way out of the Deepwoods. She promised us aid against the orcs. She promised us safety for our children. She promised us a new world. She granted us all of it, and so much more…"
 
 B42_orcish_business_title:0 "Orcish Business"
 B42_orcish_business_desc:0 "There’s no end to how many of our people the orcs of the Greentide have slaughtered, nor of how many more would have been lost if we hadn’t fought them back. Even before then, the orcs spent millennia killing and enslaving our ancestors in the Serpentspine. Natural, then, that our people are thirsting for righteous revenge. Yet just like us, it seems many of the orcs in Escann have started to adopt a different way of life, even becoming followers of the very goddess they killed. What is the most useful approach to these new orcs?"
 
 B42_the_orc_mission_branch_title:0 "[Root.GroundHawkOrcMissionTitle]"
 B42_the_orc_mission_branch_desc:0 "[Root.GroundHawkOrcMissionDesc]"
 
 B42_bounty_of_silvermere_title:0 "Bounty of Silvermere"
 B42_bounty_of_silvermere_desc:0 "There is no greater nexus of travel and trade in Escann than Lake Silvermere, located right in the heart of the region. The waters of the lake not only bind all the towns and cities along its shore together, but also connect to multiple rivers which reach much further beyond. Since its founding, Orvitzyen has been blessed with great prosperity, but the incorporation of this great lake into our realm would make us the beating economic heart of all of Escann."
 
 B42_our_own_steel_and_gold_title:0 "Our Own Steel and Gold"
 B42_our_own_steel_and_gold_desc:0 "While the trade of Escann and the lands abroad may have filled our pockets aplenty, importing gold for coins and steel for weapons still presents crucial weaknesses for our nation. If we can secure mines of our own and invest in their development, we can produce our own steel and gold so that we may be liberated from our dependency on foreign metals."
 
 B42_fighting_for_our_home_title:0 "Fighting for Our Home"
 B42_fighting_for_our_home_desc:0 "Forming our own [Root.GovernmentName] is not the end of our struggle, it is merely the end of the first step. Still, our nation is surrounded by enemies who are plotting our destruction. The old system of tribal levies is not enough to defend what we have. We need to reform into a modern army, with centralised drafts, standardised training and codified strategies. We will build an army capable of fighting anything which the world may throw at us."
 
 B42_end_of_the_greentide_title:0 "End of the Greentide"
 B42_end_of_the_greentide_desc:0 "So much destruction across Escann and the Deepwoods, all going back to the Greentide. Dookan’s wicked war was not just the end of kingdoms and the death of millions, it is the rot that has plagued this land for over a century. So much of the evil and suffering in our history can be traced back to this one initial cataclysm, even long after Korgus’ own death. No more! Never again! We have the strength both mundane and divine to crush all the orcs who still follow Dookan’s vile cause and bar the gates to the Dwarovar, that no such invasion can ever threaten our new home again!"
 
 B42_marchers_united_title:0 "Marchers United"
 B42_marchers_united_desc:0 "Ever since the Marcher Lords first banded together against Korgus, the fight against the Greentide has been a shared struggle of many peoples. While we of course proved to be by far the most important factor in the Greentide’s defeat, this victory is ultimately shared between all who’ve fought with Corin against Dookan’s evil. May the Marchers stay forever united!"
 
 B42_end_the_witch_kings_title:0 "Slay the Witch Kings"
 B42_end_the_witch_kings_desc:0 "The Crimson Deluge of the Skywar may have brought much destruction, but the celestial blood that rained upon the Halann also blessed many mortals with exceptional magical power. These divinely gifted individuals were often seen as the perfect candidates for kingship, but once in power many of them would be corrupted by their own authority. Committing vile crimes and sickening experiments all while claiming divine right, they make a mockery of all the laws of Corin and the Court! We will not suffer these blasphemers to live any longer. If they don’t fear the justice of Corin, then let them fear the justice of our blades!"
 
 B42_infernalist_cults_title:0 "Purge the Infernalists"
 B42_infernalist_cults_desc:0 "While the faithful feuded over whether Corin or Adean would be the most just ruler of the Regent Court, more sinister motives were allowed to grow in the darkness. Rejecting all divine morals for infernalist debauchery and wickedness, the Infernal Court’s followers seized upon the death of Castellos to spread their tendrils through doubting believers. These profanities can be allowed to fester no longer! Living up to her duties as the Queen of the Gods, we shall be Corin’s instruments as she scours Cannor of the devil-worshippers for good."
 
 B42_free_the_woods_title:0  "Free the Woods"
 B42_free_the_woods_desc:0 "Ever since our ancestors fled the Deepwoods through Corin’s guidance, we have needed constant vigilance against the wickedness of the fey within. We’ve even reached out to help the goblins still living under the threat of their cruelties. Yet Corin teaches that we must not just be the shield that protects against evil, we must be the sword that strikes it as well! With Corin’s aid, all of the Deepwoods will finally be freed from the tyranny of the fey."
 
 B42_safeguard_the_caves_title:0 "Safeguard the Caves" 
 B42_safeguard_the_caves_desc:0 "For as long as the Serpentspine has been home to goblins, we have been persecuted within its caves. Whether exterminated by the dwarves or enslaved by the orcs, the hatred and injustice our kind has endured knows no end. But that was in the time before Corin. With the Lady of War at our side, we will finally make the caves a safe haven for goblinkind."
 
 B42_preach_through_action_title:0 "Louder than Words"
 B42_preach_through_action_desc:0 "All throughout Orvitzyen, the name of Corin is praised. But true piety is not measured in spoken words, but in the action that follows them. All throughout our realm, let people dedicate their lives to Corin’s justice; only then will we live up to the glory of our ancestors."
 
 B42_righteous_profit_title:0 "Righteous Profit"
 B42_righteous_profit_desc: "We have known many great and wonderful inventions of the Cannorians, but perhaps the greatest of all is the ability to become rich from justice itself! How long has goblinkind been mercilessly massacred and enslaved by remorseless orcs? How many of our homes and civilizations have been irretrievably destroyed by their hands? How great then, that our long-awaited vengeance will also give us such well-deserved wealth, as well as the international recognition we’ve so long worked for! It should be clear to everyone that the fruits of this new trade clearly belong to us."
 
 B42_the_new_orcs_title:0 "Enemies to Allies"
 B42_the_new_orcs_desc:0 "How have these new orcs changed so much in such a short time? Naturally, we too have changed a lot since our escape to Escann. Yet it seems the failure of the Greentide has caused the orcs to change even more. Dookan, the orcish creator who has ruled their hearts for so long, is now rapidly losing ground to the woman who the orcs once despised above all others. Perhaps this new shared allegiance to the same goddess is the key to making this new era one of cooperation instead of enmity?"
 
 
 #Flavour Events
 flavour_groundhawk.1.t:0 "Out of the Frying Pan"
 flavour_groundhawk.1.d:0 "The Deepwoods. Almost as long as our clan existed, we were trapped in those forests, our lives a constant struggle with rival tribes, ferocious beasts, cruel elves, and worst of all, the traitorous fey. Yet even this harsh existence only barely prepared us for the horrors of the orcish invasions. When the first news of these brutal green giants arrived, we had no idea how many of them would appear in the coming decades, until they threatened to enslave or exterminate all of goblinkind.\n\nYet our clan has always been one for finding opportunities to survive. A human warrior, the first seen since times of myth, revealed to us a way out of the Deepwoods. A deal was quickly struck: we would help her fight the orcs (whom we would have fought anyway) and she would help our clan establish a new home outside of the woods. A perfect offer!\n\nYet as always, things didn’t go as easily as intended. Not long after we had exited the forest, our warrior ally “Corin” died fighting the leader of the orcs, who seem if anything even more numerous in this new land than in our old home. And her remaining followers, most apparently unknowing or uncaring about our deal, seem to make little effort to distinguish us from the black-skinned servants of the orcs.\n\nYet for all these perils, there is much to be glad for. There are no fey, no endless maze of deadly beasts and thorny underbrush, and the earth seems far more generous in its gifts than we are used to. This land, still, has the potential to become a home greater than we’ve ever dared to dream of." 
 flavour_groundhawk.1.a:0 "We will take what we were promised."

 flavour_groundhawk.2.t:0 "In Memory of Our Goddess"
 flavour_groundhawk.2.d:0 "The location was picked at the edge of the Deepwoods, deep enough to be part of her forest, but far enough out to be protected from the evils of the fey. As many goblins of our tribe as could attend stood outside as the shrine was being consecrated. Once the shamans finally emerged, everyone fell to their knees and sang an ancient song of worship to the beat of the shamans’ drums.\n\nTomorrow, we will be gone from here. Tomorrow, all that will be left are a handful of guards and shrine attendants. Tomorrow, we will be singing prayers in courtship of new and different gods. But at this moment, in this place, Lady Forest will know that it is she who truly commands our hearts." 
 flavour_groundhawk.2.a:0 "Now and forever"

 flavour_groundhawk.3.t:0 "Goblin Refugees"
 flavour_groundhawk.3.d:0 "The goblins of Escann face a hard struggle, their every step hounded by the Greentide and Marcher Lords. Our ability to establish and hold a safe territory within Escann has caused many goblins to move into our borders, in the hope of living free another day." 
 flavour_groundhawk.3.a:0 "And may it be many days after"

 flavour_groundhawk.4.t:0 "Accept Further Patronisation?"
 flavour_groundhawk.4.d:0 "The Groundhawk goblins have been a surprisingly powerful ally in the fight against the Greentide, now significantly more powerful than our own order. They now offer to lend their resources to our cause, in exchange for support in their military endeavours. While the funding and protection of the Groundhawks would certainly be welcome, is it worth giving up our autonomy for?" 
 flavour_groundhawk.4.a:0 "We know that they can be trusted"
 flavour_groundhawk.4.b:0 "We must never compromise our independence"

 flavour_groundhawk.5.t:0 "Promised Land"
 flavour_groundhawk.5.d:0 "Much has happened since a band of weary and desperate Forest Goblins first arrived here from the Deepwoods. In [Root.Capital.GetCapitalName] can now be found a growing town and administrative center, from which the [Root.Monarch.GetTitle] solves disputes and issues decrees. The authority of these orders now carries far beyond [Root.Capital.GetCapitalName] itself, over a wide swath of territories.\n\nEverywhere, new settlements emerge, either freshly founded or rebuilt form the ruins of old Escann. The simple yet extensive roads between these towns and villages are patrolled by militias who keep robbers and raiders away, a dire luxury in today’s Escann. Beside these roads, countless farmlands can be seen, as the goblins learn the new trade of tilling and harvesting the land. There are farms belonging to both Forest Goblins and Common Goblins, although it is becoming increasingly difficult to tell them apart, and some areas have even been set aside for the returning Escanni.\n\nThroughout the towns, roads and fields, countless shrines and idols can be found, honoring a multitude of gods both goblin and Cannorian. The most common of these is of course Corin, whose image is used to remind both subject and visitor that the goblins of Groundhawk have been given these lands by divine decree. Of course, that’s not the only reason for her popularity. With Escann the way it is still, a war deity is always needed, and which one to better ensure your victory than one who is indebted to you?\n\nThis is no longer a mere tribe of goblins - this is the start of a new nation." 
 flavour_groundhawk.5.a:0 "This is Orvitzyen - That Which Was Promised"

 flavour_groundhawk.6.t:0 "Delegation of Goblins"
 flavour_groundhawk.6.d:0 "\"A delegation of goblins?\"\n\n\"Yes, your majesty\"\n\nNo one in the court knew quite what to do at the description of goblins wearing fine clothing and speaking impeccable Common. Many wished to throw the creatures out, yet it was decided to give them a chance in case they had important tidings. While the mood was initially sceptical, the king softened somewhat as goblins gave him a surprisingly thoughtful gift, whose appreciation far exceeded its respectable yet unremarkable monetary value. They then complemented his palace and throne room, sparking a conversation that revealed a surprising amount of architectural knowledge.\n\nIt was only later that they arrived at the true cause of the visit, which seemed to be a request for better treatment of goblin refugees. While this was scoffed at at first, the delegates appealed to the teachings of Begga and The Dame, of which they seemed to possess an unusual level of knowledge and reverence, ending with a reassurance that the court was underestimating the ability of goblins to become productive members of society. The delegation themselves certainly seemed a testament to that fact.\n\nIn the end, the king bid a farewell to the delegation which was sweet but not very concrete. His advisors, however, thought him notably contemplative as the goblins left." 
 flavour_groundhawk.6.a:0 "It’s a start, at least."

 flavour_groundhawk.7.t:0 "Slaves or Allies"
 flavour_groundhawk.7.d:0 "The dawn of the orcish slave trade is a golden opportunity for us. Not only is it a chance to pay the orcs back for what they did to our kind and to clear up more land for goblins, but becoming a primary supplier of orcs would put us directly in the heart of the Cannorian trade network. This would not just make us filthy rich, but even more importantly it would make our efforts to integrate into Cannorian society all but guaranteed.\n\nThis would look like a win-win-win-win, yet there is one detail that gives some of us pause. In the recent decades, a surprising number of orcs have become followers of Corin, some showing more devotion and piety towards the woman they fought against than us who fought beside her. This could be the key that would let us end our conflicts with the orcs and instead turn them into allies. A tempting proposition, despite our history of animosity, as our flight from the Deepwoods and establishment of Orvitzyen have taught us the value of finding allies in unexpected places.\n\nUnfortunately, such a show of clemency towards the orcish invaders would risk to undermine the relationship with the Escanni and wider Cannor that we have worked so hard to build." 
 flavour_groundhawk.7.a:0 "We can’t forsake this opportunity just to become viewed as orcfriends."
 flavour_groundhawk.7.b:0 "Perhaps our shared goddess is the key to become friends with both?"

 flavour_groundhawk.8.t:0 "Fighting the Skywar"
 flavour_groundhawk.8.d:0 "We should probably have expected something like this to happen when we entered a war between the gods themselves. While the celestials may be busy fighting each other, Adean and his servant gods still possess many powers with which to attack their earthly opponents - and it is a cunning ploy indeed to use the very blood of the casualties to choke our very food source. As the blood drenches our fields, it is up to every citizen of Orvitzyen to work together to survive the onslaught.\n\nConstructing drainage ditches, creating and distributing food stockpiles from currently unaffected regions, replacing ruined wood; much will be required to ameliorate the worst of the disaster. Of course, our priests are calling upon our gods to spare what power they can from their own conflict. Naturally, the clerics of the Regent Court gods beg The Dame to bless our fields and invoking the healing powers of Esmaryal and Nerat, but so too are the shamans of the old goblinic gods calling upon Kroozbuto Nubo to scatter the rains and clear the skies. But the most prayed to deity of all in this struggle is Corin, that she may shield her followers and allies as they fight beside her against one of the gods of warfare himself." 
 flavour_groundhawk.8.a:0 "A goddess gave us this land, and not even a god may take it from us."

 flavour_groundhawk.9.t:0 "Skywar Victory"
 flavour_groundhawk.9.d:0 "As our land returns to normal, it seems there will soon be a day where not even a trace of the divine attack on our home remains. Even as people repair what’s been ruined and mourn the ones who died, a great sense of camaraderie and triumph has settled on our people. Working together, we have survived an attack from the gods themselves! Field by field, house by house, we worked together to combat the endless deluge of blood. [Root.Monarch.GetTitle] [Root.Monarch.GetName] has announced this day as a national holiday: The day that we won a war against a war god." 
 flavour_groundhawk.9.a:0 "Again we threw our lot with Corin, and again we emerged victorious!"

 flavour_groundhawk.10.t:0 "Settling In"
 flavour_groundhawk.10.d:0 "The many minor caves and dwarf-sized houses that line Marrhold are perfect dwellings for goblins. Those who have fled from the Serpentspine in particular are overjoyed to have a place like their old home, except protected by our armies from dangers and oppressors. The stream of new arrivals settling into the previously unused lower reaches of the hold has revitalised the tiny hold, a growth that is almost comparable to that of the recently reclaimed holds of the Dwarovar." 
 flavour_groundhawk.10.a:0 "Revitalize the hold’s decaying metal industry."
 flavour_groundhawk.10.b:0 "It will become a center for the finer arts and crafts."
 flavour_groundhawk.10.c:0 "We will need to invest a lot into the local administration."
 flavour_groundhawk.10.e:0 "Ensure that we have enough farms to feed them all."
 flavour_groundhawk.10.f:0 "Let them do whatever they please."

 flavour_groundhawk.11.t:0 "Honouring the Past"
 flavour_groundhawk.11.d:0 "Centuries ago, our ancestors met with the goddess Corin. Recognizing the nobility of her character and the justness of her cause, they quickly pledged their allegiance and swore to fight the Greentide as Marcher Lords in her name. In return for their zeal and righteousness, Corin bestowed upon them divine right of lordship over a land of their own in Escann. Many generations have come and gone, but we are still fundamentally the same people as back then. We still seek the same piety and faith in Corin as the Marchers had, and our soldiers still fight against evil and injustice just as fervently as they did. We have a glorious yet heavy legacy to live up to, yet we are just the goblins to make it justice!" 
 flavour_groundhawk.11.a:0 "Our ancestors will be proud of us!"

 flavour_groundhawk.12.t:0 "Goblin Delegations"
 flavour_groundhawk.12.d:0 "Goblins are generally known to be a cowardly, deceptive, and smelly lot, best kept away from civilized society. It seems though that in the chaos of the Greentide a bunch of them got mixed up with Cannorian society and somehow learned how to act like people. A realm of such goblins, calling itself Orvitzyen, has been sending delegations to various Cannorian kingdoms, asking for them to improve their view of goblins and especially their treatment of the many goblin refugees that have been swarming the cities on the border to Escann.\n\nEven [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.GetHerselfHimself] has gotten such a delegation in [Root.Monarch.GetHerHis] court. While their requests seem ridiculous, their surprising knowledge of customs, culture and the Regent Court has caused many high people to challenge their assumptions about the intellectual and behavioural limitations of goblinkind." 
 flavour_groundhawk.12.a:0 "What is happening in the east?"
 
