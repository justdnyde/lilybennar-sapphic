 ##########
 ###HOLOHANA KILLING ###
 ##########
 insyaa_flavour.3000.t: "A Holohana Falls"
 insyaa_flavour.3000.d: "The ground shudders. Hinuiflora breaks, torn by a giant's form. There is a roar that could blot out the sky.\n\nAll this -- For the last time.\n\nBecause no more will this Holohana rise again. No more will it trample our homes and our selves under foot with nary a thought. The dread monster is fallen, and in its wake, [Root.GetName] will rise."
 insyaa_flavour.3000.a: "An unthinkable victory."
 insyaa_flavour.3000b.: "Another one bites the dust."

