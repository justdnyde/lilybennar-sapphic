 #Kanolowele
 insyaa_flavour.22.t:0 "Out of Control Hinuicultivation"
 insyaa_flavour.22.d:0 "Hinuiflora are known to produce an amazing yield and can be cultivated by specialists to be more manageable, but even the best of cultivators will occasionally struggle to keep their growth under control. We have received a report from a number of farmers in [hinuiterrain_overgrowth_target.GetName] that such an uncontrolled growth is occurring there, and they are urgently requesting our assistance in getting these plants back under control. How should we respond?"
 insyaa_flavour.22.a:0 "Let the locals deal with it themselves."
 insyaa_flavour.22.b:0 "Have the army harvest it."
 insyaa_flavour.22.c:0 "Have local flamesong practitioners burn it all."
 insyaa_flavour.23.t:0 "Legendary Hinuifish Caught!"
 insyaa_flavour.23.d:0 "A hinuifish of unimaginable proportions has just been caught off the coast of [hinuifish_caught_target.GetName]. One like in the stories the Dragon Turtles sometimes deign to tell us. It is all the locals can think of, and the fishers that caught it have quickly become local celebrities. This is a great opportunity and it might benefit us to acquire this legendary catch."
 insyaa_flavour.23.a:0 "Leave it to those that managed to catch it."
 insyaa_flavour.23.b:0 "Seize it, and sell it."
 insyaa_flavour.23.c:0 "Buy it, and host a grand feast."
 insyaa_flavour.24.t:0 "Prodigal Sailor Wins Great Race"
 insyaa_flavour.24.d:0 "A renowned sailing race has just wrapped up off the coast of [home_of_winning_sailor_target.GetName]. The winning sailor is a local man that has shown great potential. His deep understanding of both his aquatic environment and his vessel allowed him to reach the finish line orders of magnitude before his competition. He is surely blessed by Lai and Moa, and it would be good to publicly acknowledge his impressive accomplishments. Perhaps it may even be prudent to seek his advice on naval matters?"
 insyaa_flavour.24.a:0 "Host a celebration in his honour."
 insyaa_flavour.24.b:0 "Ask him to advise us on Lai and Moa."
 insyaa_flavour.24.c:0 "He is clearly destined to lead our fleets."
 insyaa_flavour.24.e:0 "Let him return home to inspire others."
 insyaa_flavour.25.t:0 "Exploration of a Blue Hole"
 insyaa_flavour.25.d:0 "Local adventurers have begun to take interest in a number of rumors related to a large and deep blue hole off the coast of [blue_hole_exploration_target.GetName]. We could step in and take charge of their expedition. Doing so could be costly, but on the other hand the rumors seem credible and any number of great finds could be waiting at the bottom of the blue hole."
 insyaa_flavour.25.a:0 "Commission the adventurers to explore the hole."
 insyaa_flavour.25.b:0 "Have the navy investigate the blue hole."
 insyaa_flavour.25.c:0 "It is simply not worth the cost."
 insyaa_flavour.26.t:0 "Blue Hole Findings"
 insyaa_flavour.26.d:0 "The group we appointed to oversee the exploration of the blue hole has returned. From initial reports it appears that the exploration was costly both in equipment and lives. The blue holes are deep and dark and are often inhabited by dangerous sealife and potentially even hinuifauna. Yet now the expedition has returned after having braved the depth and explored it all. The entire court is now desperate to know whether the gamble did pay off or if our pride will crumble like Moa erodes Haku."
 insyaa_flavour.26.a:0 "They have returned with sunken treasures."
 insyaa_flavour.26.b:0 "They uncovered relics of the Golden Age of Kanolowele!"
 insyaa_flavour.26.c:0 "They found long lost magical artifacts at the bottom of the hole."
 insyaa_flavour.26.e:0 "Nothing, it was all rumors and wasted effort."
 insyaa_flavour.26.f:0 "A trove of exceptionally ancient relics was found in the depths!"
 insyaa_flavour.27.t:0 "Blue Hole Relics Depleted"
 insyaa_flavour.27.d:0 "The relics that were recovered from the Blue Hole have depleted to the point where we are no longer able to profit from the production and sale of them."
 insyaa_flavour.27.a:0 "We must restore the previous industry."

 #Pachpalka Events
 insyaa_flavour.30.t:0 "Strange Kobold Theologian"
 insyaa_flavour.30.d:0 "Word travels fast in scholarly circles, and these days the word is all about a strange kobold with interesting ideas regarding divinity, metaphysics, and the relationship between all things. The life of a scholar is rarely a luxurious one, but this kobold appears to live as some kind of ascetic itinerant - he will take up residence in a library and ask for only enough food to sustain him as he lives among the texts, then depart for the next library once he has found whatever answer he was looking for.\n\nHe appears to be a talented debater, and is already making quite an impression among the intellectuals of [Root.Capital.GetName] with his jovial manner, even when discussing the most serious of ideas. On each scale of his body, a different glyph has been carved in a language we have never seen before. He will tell anyone who asks that when read together these glyphs explain the fundamental truth of the universe, although he will not say in which order they should be read in. If we provide his next stipend, we might be able to convince him to stay for a time."
 insyaa_flavour.30.a:0 "Let it never be said that we have no eye for talent."
 insyaa_flavour.30.b:0 "What a waste of resources!"
 
 insyaa_flavour.31.t:0 "Kobold Theologian Departs"
 insyaa_flavour.31.d:0 "Upon waking today, [Root.Monarch.GetName] was greeted by a small slip of paper left under the door to [Root.Monarch.GetHerHis] room from [Root.Adm_Advisor.GetName] containing an apology for his departure, explaining that the road calls to him again. On the other side of the paper, the kobold inscribed a small prayer, that [Root.Monarch.GetName] might draw closer to the highest good as [Root.Monarch.GetSheHe] rules [Root.Monarch.GetHerHis] nation. The prayer appears to be highly personalized, and in reading it [Root.Monarch.GetName] was struck with the sense that [Root.Adm_Advisor.GetName] knew things about [Root.Monarch.GetHerHim] that [Root.Monarch.GetSheHe] did not yet know about [Root.Monarch.GetHerselfHimself]."
 insyaa_flavour.31.a:0 "If there is a highest good, let us strive for it."
 pachpalka_theologian_leaves_tt:0 "§Y[Root.Adm_Advisor.GetName]§! §Rleaves our court.§!"
 
 insyaa_flavour.32.t:0 "Strange Kobold Merchant"
 insyaa_flavour.32.d:0 "A strange new kobold merchant has started a shipping business and mercantile concern headquartered in our capital, and is travelling from place to place to rapidly establish it as a commercial power. He cuts quite a different figure from his fellows - where most of the successful traders of the realm garb themselves in fine cloths and dyes, the only thing he has ever been seen to wear is a hooded cloak no different than any that could be bought in the markets where he plies his wares.\n\nHe almost appears as more of a holy man than a merchant. By way of explaining this disparity between his manner and his vocation, the kobold merely says that markets create connection, connection creates synthesis, and synthesis allows for growth. These ideas of his and his startling commercial success have attracted a flock of followers from the young merchants of our capital, and he is using some of his wealth to construct a school of trade. Were we to donate to this endeavor, we might be able to recruit him to handle some of the court’s affairs of trade as well."
 insyaa_flavour.32.a:0 "Let it never be said that we have no eye for talent."
 insyaa_flavour.32.b:0 "What a waste of resources!"
 
 insyaa_flavour.33.t:0 "Kobold Merchant Departs"
 insyaa_flavour.33.d:0 "[Root.Dip_Advisor.GetName] left yesterday on an expedition to chart a treacherous but potentially lucrative sea route. Although it did not seem to be a final goodbye at the time, the kobold left a letter to [Root.Monarch.GetName] saying that he intends to see more of the world, along with some instructions on what to do with his vast stores of gold.\n\nThe instructions are a detailed series of investments that are to be made in the businesses of his school’s students and alumni, along with a few words of advice to each recipient. There is a small sum dedicated to our ruler as well, by way of thanks for the conversations the two had and for the opportunity to give advice over the course of years.\n\nIn lieu of repayment, the kobold asks only that all the recipients of his wealth invest it ‘wisely, justly, and kindly.’"
 insyaa_flavour.33.a:0 "Perhaps there is more to wealth than coin."
 pachpalka_trader_leaves_tt:0 "§Y[Root.Dip_Advisor.GetName]§! §Rleaves our court.§!"
 
 insyaa_flavour.34.t:0 "Strange Kobold Artist"
 insyaa_flavour.34.d:0 "There is a new artist selling his wares in market stalls across the country. He is a diminutive kobold wearing a hooded cloak, and he has gained rapid fame for his proficiency across numerous artistic disciplines, including poetry, portraiture, and musical composition. His mysterious figure adds to his allure, but what has truly inspired the dedicated following he is accruing among collectors and lovers of art is the way his perspective appears to be unified even across mediums. His work very often takes the form of reflections across centuries, and ruminates on the way things have changed and the way things have stayed the same.\n\nHe is saving up to construct a workshop where he can construct works of greater detail and beauty, including murals and tapestries. There are many among the court who support this endeavor, and are attempting to convince [Root.Monarch.GetName] to help pay for it by sitting for one of his portraits and hiring him on as a court artist. Reportedly, he has a unique way of making his subject’s eyes shine true to life."
 insyaa_flavour.34.a:0 "Let it never be said that we have no eye for talent."
 insyaa_flavour.34.b:0 "What a waste of resources!"
 
 insyaa_flavour.35.t:0 "Kobold Artist Departs"
 insyaa_flavour.35.d:0 "In recent weeks, [Root.Adm_Advisor.GetName] has been zealous in attempting to persuade [Root.Monarch.GetName] to sit for another one of his portraits. It seemed like a mere flight of artistic inspiration at the time, but guards beginning their early morning patrols discovered today that some of the kobold’s best-loved tools, trinkets, and souvenirs from his time in our service have disappeared from his workshop in the palace, along with the kobold himself.\n\nOn his central easel sat the most recent portrait of [Root.Monarch.GetName] he completed, its paint still drying. It has been hung alongside the first, and observers in the court have noticed that the eyes of the second portrait appear quite a bit wiser."
 insyaa_flavour.35.a:0 "Change is not always to be feared."
 pachpalka_artist_leaves_tt:0 "§Y[Root.Adm_Advisor.GetName]§! §Rleaves our court.§!"
 
 insyaa_flavour.36.t:0 "Strange Kobold Philosopher"
 insyaa_flavour.36.d:0 "A colorful new man, or rather kobold, of letters has appeared among our intellectuals. He has begun to write treatises on our local political customs and the way they interact with our moral foundations, but his most loved form of inquiry appears to be scholarly debate.\n\nHe has been travelling from town to town to debate the topics of duty, reason, and knowledge with our leading scholars from sunup to sundown, and these debates have begun to attract quite an audience. He has a habit of standing atop a pile of his books to match the height of his interlocutor, but the pile tends to topple when he will extract a volume from underneath his feet to reference as he enumerates a point.\n\nA group of young debaters have taken to following the kobold across the country, and in response the kobold has allowed them to study under him in an informal kind of discipleship. Given the nature of the kobold’s talent it is quite possible that the future leaders and scholars of the country are currently travelling around with him, and giving him the resources to expand his operations and devote more time to his writing, oration, and teaching might bring us great rewards."
 insyaa_flavour.36.a:0 "Let it never be said that we have no eye for talent."
 insyaa_flavour.36.b:0 "What a waste of resources!"
 
 insyaa_flavour.37.t:0 "Kobold Philosopher Departs"
 insyaa_flavour.37.d:0 "Today, the chamber of [Root.Adm_Advisor.GetName] has been discovered empty. With the exception of one or two of his favorite volumes, the kobold does not appear to have taken anything with him, and by way of goodbye he has left the last manuscript of a series of books he had been writing concerning the nature of statecraft.\n\nThe manuscript has been dedicated to our nation, and its contents are colored with examples drawn from our history and administration. Appropriately, the last volume discusses the role of the state moving forward in a changing world, and the treatise concludes that it is the duty of a wise and powerful king to connect noble thought to proper action. This is described as a way of justifying necessary steps taken to make the world a better place. The book ends with an exhortation to the kobold’s students to do just that, and an exhortation to [Root.Monarch.GetName] to listen to their advice."
 insyaa_flavour.37.a:0 "Perhaps they will."
 pachpalka_philosopher_leaves_tt:0 "§Y[Root.Adm_Advisor.GetName]§! §Rleaves our court.§!"
 
#Poetry Ascendant
 insyaa_flavour.40.t:0 "Poetry Ascendant"
 insyaa_flavour.40.d:0 "Glorious news! A poet of great talent has emerged from our people. Fans, critics, imitators, and rivals abound. Performances draw ever growing crowds and debates about the meaning of their latest work rage across our lands, inspiring a growing number of epigones. This is certainly a great boon for the culture of our people! Of course, such a bevy of aspiring poets and recitals is starting to cut into time otherwise spent working. Surely this is a worthy sacrifice for such sublime art."
 insyaa_flavour.40.a:0 "Poetry is its own contribution."
 insyaa_flavour.40.b:0 "Distract the poet with a comission."
 insyaa_flavour.40.c:0 "Compose your own poem."
 
#An Issue in Communication
 insyaa_flavour.41.t:0 "An Issue in Communication"
 insyaa_flavour.41.d:0 "It seems a labour mechanim was involved in a diplomatic incident with an august personage from [communication_issue_target.GetName]. The reports indicate the conflict arose from a disagreement regarding the right of way on a road, but eventually devolved into the personage shouting incoherently while the mechanim repeated themselves with drastically decreasing speed. It appears that talking too slowly to other races can be seen as a mocking gesture."
 insyaa_flavour.41.a:0 "Apologize on behalf of the mechanim."
 insyaa_flavour.41.b:0 "If they do not want us to talk slower they should understand quicker."
 insyaa_flavour.41.c:0 "Fine him. Demand the next emissary has a working brain."
 
#Soaring Impression
 insyaa_flavour.42.t:0 "Soaring Impression"
 insyaa_flavour.42.d:0 "For the non-mechanim we can be intimidating. Creatures of living metal must be so to those made of mere flesh, even more so if they are the size of the war mechanim. Others of our kind though can draw admiration, and few more so than the Soarers. Who does not wish to take to the skies under their own power, even if only for a time. The fact that they are made of metal only strengthens that impression and their agile performances drive it home. Aerial feats of skill honed over years, decades or even longer, draw crowds of mechanim and non-mechanim alike in shared admiration."
 insyaa_flavour.42.a:0 "Our flyers soar like our future"
 insyaa_flavour.42.b:0 "Where's our cut?"
 insyaa_flavour.42.c:0 "We should sell souvenirs."

 insyaa_flavour.50.t: "[Root.automatory_event_title]"
 insyaa_flavour.50.a: "[Root.automatory_event_option_a]"
 insyaa_flavour.50.ta: "The Art of Kauga Carving"
 insyaa_flavour.50.da: "      Perhaps never before has the gravity of creation sat so heavily within our hands.\nTo imbue a Mechanim with a Kauga is to etch a soul into existence; it is a grave responsibility to breathe life into a child with one’s own sculpting. One wrong hammer blow– one errant slip– and the soul is altered irrevocably.\n     And so, we have agonized over every chip and chisel, burning the midnight oil so that we may meet our children that much faster. We have made many first and second and thirty-second drafts, trying to perfect their hearts. We have cursed our own clumsy hands.\n    But now, at long last, they stir, and take their first wobbly steps into the world."
 insyaa_flavour.50.aa: "May they know boundless joy."
 insyaa_flavour.50.tb: "Prototypes Manufactured!"
 insyaa_flavour.50.db: "      The fabrication of automatons is no easy endeavor. The fever of industry demands sacrifice and diligence. Everything from raw ore to kitchen spoons found their way into our smelters, and the roaring clang of hammers resounded against the delicate “tinks” of finesmiths until, at last, the fruits of our labor grew ripe.\n     From our factories sputter forth the first experimental frames– children of molten scrap and salvage, with tong-hands and gutter-brows. The first cogs of an indefatigable industrial machine, but far from the last."
 insyaa_flavour.50.ab: "Continue iterating. They’ll now help build the next generation."

 insyaa_flavour.51.t: "Setup Mechanims"
 insyaa_flavour.51.d: "Blue"
 insyaa_flavour.51.a: "Deep"
 
 insyaa_flavour.52.t: "Plants! Plants Everywhere!"
 insyaa_flavour.52.d: "Construction along the edges of the Hinuilands is ever a challenge. Plants of such prodigious size are eager to take root in new lands, and challenging to dissuade from such a course of action.\n\nWe knew this, on a technical level. But we have only truly learned the lesson now that farms across [Root.GetName] have suffered major titanoflora infestations. The devastation and bounty they bring are similar in size."
 insyaa_flavour.52.a: "Well, pick up the shears..."
 insyaa_flavour.52.1tt: "Every owned province producing §YGrain§!, §YWine§!, §YFungi§! or §YSerpentbloom§! gains §R25§! devastation but also grants §G25§! crowns."
 insyaa_flavour.52.2tt: "Every owned province producing §YGrain§!, §YWine§!, §YSpices§!, §YTea§!, §YCoffee§!, §YCocoa§!, §YCotton§!, §YSugar§!, §YTobacco§!, §YCloves§!, §YIncense§!, §YTropical Wood§!, §YFungi§! or §YSerpentbloom§! gains §R25§! devastation but also grants §G25§! crowns."
 
 insyaa_flavour.53.t: "Chickens! Chickens Everywhere!"
 insyaa_flavour.53.d: "It's not uncommon that even the best managed farm has livestock break out of its pen. Cows can be stubborn creatures; chickens are curious.\n\nBut such an event has considerably more consequences when the livestock in question are titano-sized. They'll be mopped up easily enough, and we should have extra meat for the market soon, but in the meantime, the devastation they cause to our lands is considerable."
 insyaa_flavour.53.a: "Prodigious size has no inherent virtue, after all..."
 insyaa_flavour.53.tt: "Every owned province producing §YLivestock§!, §YFur§! or §YFish§! gains §R25§! devastation but also grants §G25§! crowns."

 insyaa_flavour.55.t: "Dauntless, Fearless, Doubtless"
 insyaa_flavour.55.d: "      Make no mistake: there is no such thing as indestructibility.\n      However, even so, our valiant soldiers waver not upon the field of battle.\nThey gallantly and selflessly march forth, always the first to expose themselves to danger, always the last to retreat. They fight with a bravery only known to themselves and the invincible, welding closed their own wounds and advancing atop gleaming refurbished limbs. Yet when the fireballs cease to whorl and the arrows cease to rain, our battalions march home just as vigorously.\n      Because our soldiers know they are not indestructible. They are merely irreplaceable."
 insyaa_flavour.55.a: "At ease, soldiers."
 insyaa_flavour.55.b: "At ease, soldiers.(hide event for future)"
 insyaa_flavour.55.tt: "Gain §G[Root.self_repair.GetValue]§! Manpower."

 insyaa_flavour.56.t: "Precursor Relics Discovered"
 insyaa_flavour.56.d: "Our tracking modules have turned up precursor relics in [artificery_precursor_relic_target.GetName]!"
 insyaa_flavour.56.a: "A lovely find!"
 insyaa_flavour.56.b: "Gah, ignore them!"

  #Inventions
 #artifice_invention_reverse_mechanim
 insyaa_flavour.100.t: "Reverse-Engineered Mechanim"
 insyaa_flavour.100.d: "Bodies strewn in bogs, or ponds, or lush forests. For eons, that was what we knew of the Mechanim.\n\nBut this has changed. In years, and decades, and now what was once not-even-dreamed of is in our grasp. We can create more mechanim, and Insyaa will never be the same."

 #artifice_invention_industrial_automatories
 insyaa_flavour.101.t: "Industrialised Automatories"
 insyaa_flavour.101.d: "When first we learned of the grand abandoned automatory buried deep in the Hinuilakelands, we saw it as a vast sterility. The scale was beyond comprehension, surely the reflexive process of a machine, some indifferent mechanical loom churning out mechanim after mechanim. Yet as new lives and new bodies are assembled, our automatories, mere workshops in comparison, are the site of miracles.\n\nOne can dismiss it as projection, of course: the sentimentality of the animal towards anything which resembles, even conceptually, the newborn child. Yet when the mechanim awaken, we act as parents. We guide them into this life. The reductionists among us can scoff at the flicker one feels as the kauga soul-core locks into place, but try it yourself. You will find yourself placing a hand gently on the shoulder chassis - you will find yourself singing lullabies."
 insyaa_flavour.101.a: "Don't worry. You're not alone. I'm here."

 #artifice_invention_memory_module
 insyaa_flavour.102.t: "Cultural Memory Module"
 insyaa_flavour.102.d: "A stranger comes to live among your people. Over half a decade, she becomes one of you - she learns the dance you do on that one special evening of the spring, the phrase you use when you wish to condemn something politely, that one dish you make when your friend is ill. A thousand moments of connection and contact, a relationship as much as a process.\n\nImagine that this could be done in days, or weeks, with the equivalent effort of reading a pamphlet or wearing a hat. Perhaps your first response is that this would feel less meaningful; this is folly. When after only forty-eight hours your mechanim friend shakes their head and says ''no matter'' - in exactly the right tone, just like your grandmother did - you will double over laughing just the same. None among us wish to be strangers to each other, not truly."
 insyaa_flavour.102.a: "This is the power of the module."

 #artifice_invention_fireproof_plating
 insyaa_flavour.103.t: "Fireproof Plating Artificer Auxiliaries"
 insyaa_flavour.103.d: "My friend was called Eager-For-Life, though I only ever called them Eager; after so many years together, it had never really occurred to me to ask their full poem name. I was so pleasantly delighted by their instant trust, their boundless and easy capacity for friendly intimacy, the immediacy with which I had made a friend. Eager would carry me in my chair from home to work and back each day, for my legs had never been up to much; I worried about making of Eager a beast of burden, until their scoff at the notion disarmed me. I tell you these things so you understand my shock when they told me they were to become an auxiliary.\n\n\"You volunteered?\" I said, taken aback - it was not in keeping with what I knew of their kauga. \"Of course,\" they replied. \"You eat too much, and this chassis will soon be too light to carry your fat arse.\""
 insyaa_flavour.103.a: "The auxiliaries do have terribly big shoulders…"

 #artifice_invention_okalu_scanners
 insyaa_flavour.104.t: "Okalu Scanners"
 insyaa_flavour.104.d: "\"Don't be stupid,\" I said, as I hopped up on a stool to get a better angle, my claws tight around the okalu grip. I found myself being firm, as though By-Dappled-Light were a frail old woman with stuck scales she could not shed, prideful about having someone else prise them up for her. In this specific regard, I suppose Dappled really was like that. Any question of memory missing, something lost, and they would become stubborn and reactive in a way I had never associated with mechanim. It was almost a relief, actually, to know they too could be so unreasonable.\n\n\"I don't know what I will remember,\" said Dappled, and as I held the okalu in place, I found myself scoffing. I was being rather harsh, in truth - I have never been good at reassurance - but I loved Dappled too dearly to lie to them. There were horror stories of memories uncovered by the okalu scanner, things plucked from the great abyss of dormancy. Some mechanim recalled lost friends, remembered atrocities after millennia that might have been better buried, became obsessed with finding places the okalu revealed, places that had once been vital to them. Perhaps I'd have done better to remember that.\n\n\"None of us fleshy folk ever know what we'll remember,\" I said, fervently. \"But ignorance is worse. It has to be.\""
 insyaa_flavour.104.a: "Of course, as it turned out, I was wrong."

 #artifice_invention_pillar_scouts
 insyaa_flavour.105.t: "Gene Pillar Scouts"
 insyaa_flavour.105.d: "Get-A-Little-Use-Out-Of-It had gone through at least six bodies in the time that I had known them. They were like those fickle, wealthy young men who cannot help but change their fashion from month to month - if another mechanim so much as expressed envy for their chassis, they would offer it blithely for the chance at a little novelty. This was, I understood, unusual among mechanim, who broadly had some attachment to the bodies they chose, but since I only saw Use once a year at most, it was an enjoyable novelty to anticipate.\n\nThis time, though - this time the chassis was simply absurd. From every arm segment and panel of Use's torso came attachments and little tools, quite out of keeping with the intentional design of most mechanim bodies, at least in my experience. Little artificed magic-measurers, curved and viciously sharp extending knives, a tray of variously-sized compartments in which to store small objects: by the time Use had finished showing me everything their new chassis could do, I was bewildered as to its purpose.\n\n\"Never know what you'll find in a Gene Pillar,\" said Use, and I confess I fretted, for there was no more dangerous place I could think for my friend to go. But I had the distinct sense, even then, that they would never switch bodies again."
 insyaa_flavour.105.a: "Please put that one away, at least."

 #artifice_invention_behavioral_chip
 insyaa_flavour.106.t: "Mechanim Behavioural Chip"
 insyaa_flavour.106.d: "Insyaa is a strange land, but just as it has terrors it has wonders beyond compare in its mangrove forests and hinui wilds. One of these wonders that we have found are the mechanim - they have endured since the days of the Precursors, and yet they still function. The workers of [Root.GetName] work hard, but even the hardiest cannot work for millennia.\n\nThe artificers of [Root.GetName] have determined how the circuitry of the mechanim functions, and now we can use that technology to jump-start not just our colonies on Insyaa, but development in our homeland as well. Via a small and easily producible chip, the durability of our mechanim workers can be pushed beyond their natural limits. Unimaginable pain and addictive pleasure both might suffice to get the mechanim working at previously unheard of paces by themselves, but when the two are combined, one mechanim can equal five or even ten regular workers in both speed and efficiency.\n\nOf all the wonders of Insyaa, a worker that never stops working might just be the finest of them all."

 #artifice_invention_construction_bots
 insyaa_flavour.107.t: "Construction Bots"
 insyaa_flavour.107.d: "The construction techniques of [Root.GetName] have served us well in the past, but before we did not have construction workers that could alter their bodies to make sure the work gets done.\n\nThanks to the hard work of our artificers, we have managed to build new frames for our mechanim engaged in construction. Even the most difficult construction tasks can be accomplished with an efficiency that was previously unheard of with mechanim specialized to each individual task of construction, from mixing cement to carrying heavy loads to lifting building materials up large distances. And once a task is done, we can simply refit the mechanim engaged in that part of the task to do something else, and continue on just as efficiently as before.\n\nAs our nation expands onto a new continent, these construction bots will help us build up civilization here quicker than we ever could at home."

 #artifice_invention_mechanim_regiments
 insyaa_flavour.108.t: "Mechanim Augmented Artificer Regiments"
 insyaa_flavour.108.d: "It began as a single one. An experimental addition, some said, or perhaps a particularly complex war-tool.\n\nIt was not particularly bright. It made mistakes no member of [Root.GetName] would make. But for all that, it was useful.\n\nAnd so in a month there were more, and a year even more. And now a small but non trivial portion of each regiment is made up of mechanim."

 #artifice_invention_auto_scribes
 insyaa_flavour.109.t: "Auto-Scribes"
 insyaa_flavour.109.d: "“There is a great amount of paperwork that needs to be produced to make the country run, from birth certificates to marriage licenses to death certificates. In days gone by, we used to rely on organic clerks to do this crucial work, but their hands cramped and their memories lapsed.\n\nWith the discovery of the mechanim and the work of our artificers, we can customize them to do all the work necessary to govern at a fraction of the time and cost. The new auto-scribes that do the paperwork in Insyaa have twelve hands which never cramp, and which produce perfect, absolutely legible writing in whichever script we please day in and day out. Their vast databanks have been put to work memorizing the details of an entire community. They never mistake the form that needs to be filled out, and they oftentimes can fill it out better than the one who is making the query!\n\nIn the world of tomorrow, the bureaucracy that makes our country run is limited only by the number of autoscribes we can procure. Unfortunately, this means our paper-pushers are also free to dream up an impossibly large number of forms for them to fill out.”"

 #artifice_invention_crop_enlarge
 insyaa_flavour.110.t: "Gene Magic Crop Enlargement"
 insyaa_flavour.110.d: "Research Report 022-1663 Project 3FF3141\n\nGreat strides forward have been made in the last few months in regards to the efficacy and sustainability of our enhanced crops and fertilizers. In particular, we have been able to mostly negate the negative effects that usually arise from simple mages repeatedly using spells to achieve similar results. Research assistant Eru has been of particular aid and note in recent weeks, especially with keeping up morale through the melodies she keeps on humming and then get stuck in the heads of our crews for hours. One she claims the most recent bunch of sprouts taught it to her, before dismissing that claim as but a jest.\n\nThe continued deciphering of relics from the Gene Pillars, while still ongoing and far from complete, has also been of great help in getting us this far. Yet we remain uncertain of the meaning of the word \"autospontaneoheterotrophism\" we have seen mentioned in precursor items and records relating to similar fields of study. But, this too shall be unveiled after we manage to get into the more overgrown sections of our current relic sites. While colleagues outside of our divisions are requesting samples for larger field studies, our internal division is of the opinion that this bounty should not be withheld from our citizens and trading partners, soon all shall sing praises to the quality of [Root.GetName] produce."
 insyaa_flavour.110.a: "All hail the bounty of Insyaa!"

 #artifice_invention_assisted_growth
 insyaa_flavour.111.t: "Artificer-Assisted Plant Growth"
 #Same as insyaa_flavour.110

 #artifice_invention_animal_gene
 insyaa_flavour.112.t: "Animal Gene Sequencer"
 insyaa_flavour.112.d: "It was once the case that a 'cow' had a distinct form - four legs, hair on their flanks and their faces, udders that produced a set amount of milk per day - the list of limitations goes on. And this was the case for all the other animals that our nation domesticated as well. Each of them was subject to the constraints written into their genetic code.\n\nThrough the power of gene magic and some deftly applied technology, our artificers have made it so that the livestock and domesticated animals of [Root.GetName] can produce what we need of them at rates that would have been impossible even with millions of years of selective breeding. The meat cows of Insyaa have meat that can be peeled right off their flank, and cooked in front of the cow it came from, yet which painlessly grows back overnight. The milk cows of Insyaa are not so much creatures as balloons made of milk, which can fill an entire storehouse of milk within the span of a single week. And if their reality does not quite meet our artificer's greatest boasts, it matters not, the truth remains: Every animal has a defined purpose, and it is perfectly tailored to fit that purpose by the skilled hands of our artificers. And once we have an animal to fit a role, we can breed them, and they will multiply across all our farms and fields.\n\nIf before we knew what the form of a cow was because it was defined strictly by the laws of a nature which cared nothing for our prosperity, now we know what the form of a cow is because..."
 insyaa_flavour.112.a: "It is whatever we want it to be."

 #artifice_invention_titano_thorns
 insyaa_flavour.113.t: "Hinui-Thornvines"
 insyaa_flavour.113.d: "“Our colonial charters’ records are full of people who got too close to titanocreatures, and were swiftly and predictably punished for it. There are now children's tales about why not to get too close to the strangling vines that grow taller than five houses stacked on top of one another, but somehow there is always another person willing to try it anyway.\n\nThrough the power of gene magic, now we can make our enemies these people. The thornvines of the titano lands grow according to a set of principles inscribed into their genetic code, and with the appropriate manipulation of those principles we can plant them outside our forts and instruct them to grow in whichever ways we please. The moats surrounding our forts are full of organic spikes, and if one of the enemy’s soldiers retreats beyond the burning torches surrounding their siege camp, his throat will be swiftly caved in by a vine directed straight towards it by our most vicious war artificers.\n\nIf the enemy ever attempts to siege the fortresses we have encircled with our vines, they will soon swiftly find that the terrain has placed them on the defensive.”"

 #artifice_invention_titano_weed
 insyaa_flavour.114.t: "Coastal Hinui-Tangleweed"
 insyaa_flavour.114.d: "The endless brilliantine sway of the ocean grass is irresistible to the romantic soul, and all true sailors are romantics. Venture down there a time or two, dive with a Bubblehead Cantrip perhaps, and lose yourself for a little while among the strands - you will not call them weeds any longer. They glisten in the half-light that breaks through the surface of the water; they form sheets of green glass washed in great waves by the subsurface currents.\n\nThe glistening is their oil, the same oil which sticks to the hulls of ships and brings them to a halt. Thus was born the Insyaan preference for launching well out into the open ocean rather than hugging the shore - but we have entered a time of coastal siege and of great landings, and we too must now shadow the great cliffs and endless beaches of our homeland.\n\nThus the technology which makes the sea-grass our deadly hideout. Mimicking the currents of the sea itself, we do not foolishly try to cut back or inhibit the fast-growing stuff - we merely dislodge it gently and regularly with an arcane pulse, precisely calibrated to tickle the great fields of green like the oceanic winds which buffet them endlessly. We move without issue and the seaweed is our home, while our enemies snag at every turn."

 #artifice_invention_seed_siege
 insyaa_flavour.115.t: "Hinuiflora Seed Siege Weaponry"
 insyaa_flavour.115.d: "It is as if the seed-pod were made for such a purpose, solid all around. In nature the pod relies on the impact of gravity from great height, or the pecking of a hinuijay, but firing it from a cannon has much the same effect. In the best case scenario, the seed-pod breaks against the very surface of the fortification itself, the roots attaching reflexively and drilling through the softer mortar in a matter of hours. But even when we miss, the ground serves as keen ally.\n\nHinuiflora are as a rule desperate and hungry in their early life - Insyaa’s natural world offers little mercy to the newborn. Thus the starving seed, quickly drinking down the nutritive fluid of the pod itself, spreads its shoots vociferously through the veins of the wall structure and will grow through anything or anyone it finds. What are the defenders to do in such a case? Dismantle their own fortress to hunt down the ever-spreading rootlets?\n\nIndeed, perhaps this would be wiser than waiting for the whole thing to collapse."
 insyaa_flavour.115.a: "Open battle is a nobler death."

 #artifice_invention_tgs_farmland
 insyaa_flavour.116.t: "Titanoflora Gene Sequenced Farmland"
 insyaa_flavour.116.d: "To govenr Whatshisface.\n\nI know you’re a very busy man and all that, but I, as one of your loyal subjects, have taken the liberty and finance to hav this written down for me to issue a complaint about the fancy-schmancy artifishers running amok in these lands.\n\nNow them mages were bad enough already, waving their weird sticks and hands about while speaking gibberish and doing godsknowwhat to our land and cattle. Ain’t ever let one come close to my Bessie, I assure you that. But these people are even worse. Building their constantly buzzing and smelling mash- mack- thingimajigs. They are in league with devils I tell you, or them deep-gnomes that keep stealing all my best socks.\n\nWorse yet, it is ruining local traditions. Folks used to come here from 2 towns over to gawk and awe at my cabbages, the size of a troll’s head they are I tell ya, but now every buffoon can grow peas that are that large. Not to mention the bloody weeds, needed to dig out my gramp’s sword to cut em down. Almost lost my dear Bessi to those cursed shrubs after she got lost in em, found her a day after, round as if she’s having calves and passed out from gorging on a tree-sized carrot.\n\nSo, I tell ya, chase this varmint into the sea and let em rot. Them knowitalls are only gonna muck things up. "

 #artifice_invention_tgs_livestock
 insyaa_flavour.117.t: "Titanoflora Gene Sequenced Livestock"
 #using same description as insyaa_flavour.112

 #artifice_invention_titano_artif
 insyaa_flavour.118.t: "Titano-Growth Artificer Unit Augmentation"
 insyaa_flavour.118.d: "Though perhaps they would never admit it, every war artificer has a fantasy. They dream that even on a place as primal as the battlefield, brains can be made to beat brawn. This is why they design their weapons, and deploy them to such great effect. They want to live out their childhood fantasies of burning the faces of their toy soldiers off with a magnifying glass. Now, the artificers of [Root.GetName] do not have to choose between brains and brawn anymore.\n\nWith the power of the gene magic of Insyaa, we can grow anything far beyond its natural, non-frightening size, including people. Our soldiers can dash about a battlefield like terrifying giants with unnatural speed, lobbing grenades the size of pumpkins at enemy soldiers and simply picking the enemy up and dashing them against the ground in close combat. Of course, the artificers have been the only ones to undergo the titano-growth procedure, because the other soldiers are not mad or manic enough to volunteer. Perhaps they should dream bigger dreams."

 #artifice_invention_titano_cav
 insyaa_flavour.119.t: "Titano-Growth Cavalry Augmentation"
 insyaa_flavour.119.d: "For many who prefer to fight mounted from the back of another creature, the slow decline of cavalry in the face of the rising popularity of rifles and cannons has been a source of dismay. Their glorious charges have been replaced by futile endeavours that throw away the life of both rider and mount for very little gain. But after witnessing the wonders of Insyaa it seems some of our explorers and researchers have come up with an idea of how to improve on their fading prominence.\n\nSimply making the mounts really, REALLY, big.\n\nAccording to them this move would not only make individual mounts more resistant to rifle and cannon fire, increase the devastation wrecked by our charges, and require fewer mounts to achieve the same effectiveness for our units, but also allow us to post riflemen atop them to fire from above. Though we reckon that part was only added to appease those who see those as the future of warfare.\n\nAdditionally, it is recommended that while the Titano-Growth is active, mounts are kept far away from the sleeping spots of our soldiers, to ensure the smell of manure is not permanently affixed to them."

 #artifice_invention_sonic_amplifiers
 insyaa_flavour.120.t: "Sonic Amplifiers"
 insyaa_flavour.120.d: "...but working with conjuration and evocation at the same time proves rather challenging to most magic users. The tried and true air dazing takes a backseat when, on a modern battlefield, one has to focus on their specific role. We are, of course, the exception to this, but try not to gloat too much in the earshot of your commanding officers. Their egos are to be protected like the narrowest of chokepoints.\n\nWithout further ado, let's move on to the practical. Line up, take the amplifier, and conjure a thin water film around it. All good? Now, whatever is required of you, try to summon it in the exact spot here, behind the pinhole. Alright, now aim at that wall and conjure up something from the intermediate course. Yes, that will be enough. Do try to keep the water film together, that's the part actually protecting your eardrums and hurting the enemy.\n\nAnd now, for the evokers - you will operate the sonic cannons. Don't need much for that, truth be told, even the lightest cantrip will do. Take turns using it, just remember your basics. Take particular note of the initial gradient when the force is applied, otherwise the direction may-"
  insyaa_flavour.120.a: "THUD"

 #artifice_invention_sonic_weaponary
 insyaa_flavour.121.t: "Sonic Weaponry"
 insyaa_flavour.121.d: "...but working with conjuration and evocation at the same time proves rather challenging to most magic users. The tried and true air dazing takes a backseat when, on a modern battlefield, one has to focus on their specific role. We are, of course, the exception to this, but try not to gloat too much in the earshot of your commanding officers. Their egos are to be protected like the narrowest of chokepoints.\n\nWithout further ado, let's move on to the practical. Line up, take the amplifier, and conjure a thin water film around it. All good? Now, whatever is required of you, try to summon it in the exact spot here, behind the pinhole. Alright, now aim at that wall and conjure up something from the intermediate course. Yes, that will be enough. Do try to keep the water film together, that's the part actually protecting your eardrums and hurting the enemy.\n\nAnd now, for the evokers - you will operate the sonic cannons. Don't need much for that, truth be told, even the lightest cantrip will do. Take turns using it, just remember your basics. Take particular note of the initial gradient when the force is applied, otherwise the direction may-"
  insyaa_flavour.121.a: "THUD"

 #artifice_invention_flak_cannons
 insyaa_flavour.122.t: "Precursor Flak Cannons"
 insyaa_flavour.122.d: "To say that the advent of the rifle revolutionised warfare would be an understatement; no longer could experienced men hide behind layers of armour or magical shields to stave off death from untrained farmers. It is therefore no surprise that the same happened to the castles of old once cannons established themselves as mainstays in times of siege and battle.\n\nAnd so, in this race of offence and defence, it only makes sense to look to the empires of old and their ways of warfare, a search that did bear fruit for us. Namely, through a huge skeleton, torn to shreds and  with traces of magic still lingering on both it and the projectile fired, the latter we found buried in another precursor building, having punched through almost a dozen metal walls and into the mountain surrounding it.  \n\nWhile even archmages drowning in damestar would struggle to achieve similar feats, it at least gave our artificers plenty of inspiration to give our artillery even a smidge of such raw power.\n\nFeaturing a combination of Haste-infused barrels, increasing projectile velocity by magnitudes, a Thunderstone replacing gunpowder, allowing them to work perfectly even in wet environments, and a rotating multi-barrel assembly, for continuous reloading while firing, will surely give us a considerable advantage in the field."

 #artifice_invention_terrain_shaper
 insyaa_flavour.123.t: "Terrain Shapers"
 insyaa_flavour.123.d: "Many came to Insya with a dream of finding -- or rebuilding --  the grand cities that fill ancient legends (and even a few ancient records). That dream has not just been hampered by the Holohana and other nightmarish creatures strewn across the continent, but also by the very land itself. \n\nUntold thousands of plants, both mundane and…far less so, cover every single surface outside of our settlements, not to mention the Titanoflora and their endlessly long and thick roots, a nigh impassable obstacle for our common tools and methods of removal.\n\nBut, with recent Artificer breakthroughs, said dreams might be one step closer to coming to fruition. \n\nAt a glance these Shapers (or Theremin, as our Artificers have taken to calling them) could be mistaken for strange musical instruments, with the melodic noises they produce while their operators control them by moving their hands back and forth from Antennae attached to the main device. While the actual work is done by rods of precursor metal hammered into the ground, which send the received signals into the ground, causing roots there to shift, if not shrivel up entirely, readying the land for easier development in a couple of hours."

 #artifice_invention_steel_tracking
 insyaa_flavour.124.t: "Precursor Steel Tracking Module"
 insyaa_flavour.124.d: "“The work of digging up relics of the Precursors, even on a continent as full of them as Insyaa, was once long and hard. Labor teams dug for months and months at sites that weren’t guaranteed to find anything at all, and most of the process of determining where the dig sites were was guesswork. \n\nThen, our artificers had an idea. We had samples of precursor steel, and the ability to determine with almost absolute certainty whether something was made of precursor steel or not. What if we enchanted our precursor steel, put it into a machine that could make sound based on its resonance with the surroundings in a certain direction, and let our steel lead us to more steel?\n\nAnd so, the Precursor Steel tracking module was born. With precise measurements it  works at vast distances, so the scouting teams of [Root.GetName] can simply follow it out of their well-fortified compounds directly to precursor dig sites, and the excavation teams can use their own handheld modules to hit relics within only a few days of work. Then, we excavate the precursor steel of the dig site to make more tracking modules, and find more precursor steel!”"

 #artifice_invention_memory_storage
 insyaa_flavour.125.t: "Mechanim Memory Salvage Protocols"
 insyaa_flavour.125.d: "2538 years, 7 months, 3 days ago:\n"Was made to procure a flower of a specie not native to the area. Required travel outside the continent. Master was not contented."\n\n2538 years, 6 months, 4 days ago:\n"Once again worked on the amplifier line. The actuators had been replaced with temporary force conjuration doodads, which introduced interference along the circuitry connecting to the transmutation shapers. The shaper modules will have to be replaced wholesale, as at least two crashes have occurred since. Unfortunately, evocation actuators will have to be used for now, else more problems arise in the short term. I dislike introducing a temporary solution in place of another temporary solution just so we can get the parts out quickly so that tests can be run on the machine further down the line when that one is also not ready for even a cold run due to several temporary solutions being introduced in order to appease the ego of an incompete-"\n\n2538 years, 6 months, 3 days ago:\n"Master did not like the solution. Lowered alarm severity across the board instead."\n\n2538 years, 5 months, 1 day ago:\n"Was made to grate cheese in a manner most unpleasant.""
 insyaa_flavour.125.a: "Their temporary solutions will become our permanent ones. For now."

 #artifice_invention_mechanim_deconstructor
 insyaa_flavour.126.t: "Mechanim Tech Deconstructor"
 insyaa_flavour.126.d: "Artifice, the science of unifying Magic and science, a field so very new for us but rooted in the works of the Precursors themselves. While the progress of our artificers has been astounding and produced wonders many could not have even dreamed a few years ago, we are still ever so far away from the mythical wonders the legends say existed before the Day of Ashen Skies.\n\nBut, with the exploration of Insyaa underway and the wonders we stumble upon growing by the day, we may just get that much closer to those empires of old. \n\nTake for example the Mechanim. While on the surface they look like “mostly” discarded automatons, that simplicity hides a complexity and ingenuity unheard of. One that, with our newly developed saws, drills and cutting torches, we are able to examine in detail. No plate, joint or other component shall be out of reach now.\n\nAddendum: It is required that operating technicians wear total hearing protection during the procedure to avoid physical and psychological damage. Additionally, the “Machine” should be disassembled in a soundproof room and be restrained by at least level 4 bindings."
 insyaa_flavour.126.a: "Have a Brilliant day."

 #artifice_invention_mech_steel_detector
 insyaa_flavour.127.t: "Precursor Steel Detector"
 #Same as 124

 #artifice_invention_mech_reawakening_procedure
 insyaa_flavour.128.t: "Enhanced Reawakening Procedures"
 insyaa_flavour.128.d: "Every one of us mechanim remembers how it felt when we first came back to life, for we are a people who do not forget things. We awoke in rusted heaps in forgotten places. The world felt impossibly vast. The Precursors were so close but so far away. The only comfort we had was the one who first awoke us, and they were the singular light in the darkness and uncertainty that surrounded us. \n\nBut we have also learned much of the world since the Great Reawakening of the first of the mechanim, and we have learned much of ourselves. The artificers have learned of subroutines and processes within our programming that can help the reawakened remember more and learn quicker, and dedicated teams deploying these techniques are already reaching out to the new mechanim. We will show them that the world is not such a terrible place, and that they are not alone."

 #artifice_invention_mech_building_plates
 insyaa_flavour.129.t: "Precursor Building Plates"
 insyaa_flavour.129.d: "Analyzed from the Gene Pillars and other precursor ruins dotting Insyaa, Precursor building plates are modular construction sheets of Precursor steel, an ancient and somewhat poorly understood form of metal of elven origin. Such modularity makes it relatively easy to implement in defensive architecture throughout our nation, far stronger and more durable than anything currently available to us. Siege weapons so far encountered from the other races have barely managed to scratch it. Combined with its resistance to the elements and general durability, it makes the upkeep and maintenance of forts far cheaper."

 #artifice_invention_mech_terrain_specialization
 insyaa_flavour.130.t: "Hinuiterrain Specialized Equipment"
 insyaa_flavour.130.d: "Living in hinuiterrain makes one understand how helpless and tiny the ants of other lands must feel. Of course, in the lands we call home there are also hinui ants capable of stripping entire settlements limb from limb to feed their colonies, so perhaps what we are is even more helpless than ants. \n\nDespite all this, we have learned to thrive in hinuiterrain, and now have developed the tools necessary to make sure our enemies can’t. Amidst this land, every blade of grass can be a weapons platform and every passing animal can be a terrible threat, and now our artificers have developed the tools to make sure we can take maximum advantage of the terrain in each battle.\n\nWhen our enemies come to us, we now have the power to take the fight right back to them."

 #artifice_invention_mech_lava_cell
 insyaa_flavour.131.t: "Lava Containment Cell"
 insyaa_flavour.131.d: "We have long thought that volcanoes are deeply unfortunate things. All that power available for the taking, if only we could take it. Many have tried just that, and many have burned in the fires that they thought to harness.\n\nTheir problem, we have now revealed, is that they were simply not using the proper tools. With the recent rediscovery of metallurgy advanced enough to both create and work with Precursor Steel, we can create transport cells to extract lava from a volcano, place it in an appropriate receptacle, and then do with that powerful heat anything we want, from heating homes to making machines of war run. \n\nOf course, our artificers did not harness the power of the earth for us to use it in our fireplaces. The military has also developed many plans to show our friends in foreign lands the power of the magma we’ve unearthed, and we’ll be sure to deliver it to them out of the containers so their soldiers can see it up close."

 #artifice_invention_mech_fireproof_plating
 insyaa_flavour.132.t: "Fireproof Plating"
 insyaa_flavour.132.d: "Using materials found in recently explored precursor ruins, our artificers have discovered how to create reinforced plating that uses precursor steel composites. These composites are better equipped to deal with the elements, having a higher melting temperature and resisting fire damage, sandstorm degradation, and water oxidation. Along with these benefits, these plates are also designed to cover more of the mechanim form, protecting internal systems. Such an invention should allow us to keep mechanim in the fight for longer without needing to be repaired."

 #artifice_invention_mech_pillar_scouts
 insyaa_flavour.133.t: "Gene-Pillar Scouts"
 insyaa_flavour.133.d: "The Gene-Pillars of Insyaa are as magnificent as they are terrifying, and we have been drawn to them for as long as we can remember. We have sent some expeditions to discover the wonders of these pillars before, but not many of those brave pioneers came back, and we have only discovered the secrets of our continent because of their bravery.\n\nIf those past pioneers had the technology we have today, every gene-pillar in Insyaa would be mapped, and we’d have such a grasp on the secrets of the Precursors that we could make gene-pillars of our own. The expeditions of today travel out into the gene pillars with impossibly nimble frames that can withstand a hinuibeast rampage, and with wings to take them away from any threat so they never have to. They look out on the wonders of the Precursors with eyes that send their findings directly back to teams of experts to advise their every move.\n\nThe brave souls we send to the gene-pillars have proven their valor, and now we can stand behind them as they do."
 
 #artifice_invention_mech_amphibious_attachements
 insyaa_flavour.154.t: "Precursor Amphibious Attachements"
 insyaa_flavour.154.d: "Mechanim are not made for the water. Our circuitry quickly malfunctions, causing us to slip into dormancy. And then we sink, and sink, and sink, until our kaugas are forever lost to the depths.\n\nBut neither were mechanim made to think, to strive, or to dream. And yet we do.\n\nWhen we first began to exceed our purpose, our makers consigned us to oblivion. The sea, which seeks to assign us the same fate, will be equally unsuccessful in its efforts. Our newest invention involves a number of small changes to our forms: self-sealing compartments around core components, pressure regulators, even fins. While they do not completely negate the challenge that is water, they will let our forms serve admirably in amphibious operations."

#Mechanim Body Parts
 #artifice_invention_head_long_range
 insyaa_flavour.134.t: "Long Range Sighting Attachements"
 insyaa_flavour.134.d: "To see from further away. A simple proposition, but a desire for many a mechanim as they stalk the undergrowth of the great jungles or ride upon the back of a hinuibeetle. Fortunately then, brave mechanim explorers have managed to find just such an implement within the halls of a gene pillar. The device incorporates multiple glass lenses of various curvature and thickness inside a Precursor steel casing. The user can press an external button to swap between magnifications as a lens is pulled down or up from the steel casing. This allows its user to see much further, and in much higher detail. Now, a Soarer mechanim may survey much more of the land as it glides across the sky, one may look closer at a beloved pet to identify injury or condition, though perhaps the most enticing application is that this makes for much more effective spotters allowing us to fire upon enemies more accurately and from further away."
 insyaa_flavour.134.a: "A new addition to our selves..."

 #artifice_invention_head_war_craved
 insyaa_flavour.135.t: "War-Carved Head Frame"
 insyaa_flavour.135.d: "Other races tend to be... vexed, by our appearance. We are mechanical beings unlike anything they’ve seen, which makes us fearsome foes on its own. Yet, we can go further, by intentionally modifying our bodies with cultural symbols they may find appalling or otherwise intimidating: horrific scenes of battle or tragedy, such as a warrior’s gallant triumph over multiple enemies, or a particularly horrific savaging of a foe, or otherwise making ourselves more menacing through modification. These specially crafted plates are adopted by warriors during times of war. Through the use of these plates, we shall strike fear into the hearts of any man, kobold or ogre, and it is far easier to fight a disorganized rabble than a brave cohort."

 #artifice_invention_head_human_like
 insyaa_flavour.136.t: "Humanoid Frame Head Construction"
 insyaa_flavour.136.d: "As we awoke, we were not always welcomed, but tended to be treated as curiosities at worst. As we grew in number and spread, what was once a curiosity became an imminent threat, and it was only through deft diplomacy that we were able to achieve a settlement with our neighbors. \n\nWe have since become better known throughout Insyaa, but there is still something inhuman about us that causes prospective partners and allies to recoil at first glance. Fortunately, this is a problem that, just like any problem, can be solved through the wonders of artificery. The faces of the humans tend to be round or oval-shaped, and have bony parts to protect the more vulnerable parts of their faces. With diligent study and design, we have managed to reproduce something very close to one of their faces, and by deftly relocating some processors we can swap out our old heads for newer, diplomatically friendly versions. \n\nAlthough we have proven we can thrive without the technology, it might be able to help others overcome their first impressions, and to help our diplomats better charm the nations surrounding us."

 #artifice_invention_head_adm_oversight
 insyaa_flavour.137.t: "Administrative Oversight Module"
 insyaa_flavour.137.d: "The problem with having an advanced society is that there are so many things to do. Goods need to be produced and sent from place to place, buildings need to be built, letters need to be written- it’s enough to make a bureaucrat give up and go back into the Insyaan wilds. Of course, we are a people who need not accept things as they stand. If it’s too hard to get everything done that needs doing, why not program ourselves differently?\n\nSuch was the thought process behind the Administrative Oversight Module, the newest marvel of technology produced by the artificers of [Root.GetName]. Via a small and barely visible welded attachment to the back of the head, we can stream in real time the things that need to get done to the idle people of the nation, and give them a small sense of satisfaction once they do it- just enough to get them excited to do more things.\n\nTruly, this is the greatest invention in our history- we’ve defeated not just the problem of large-scale social coordination, but the problem of boredom as well."

 #artifice_invention_torso_self_repair
 insyaa_flavour.138.t: "Inbuilt Self-Repair Kit Storage"
 insyaa_flavour.138.d: "“How does one kill a Mechanim?\n"You can’t kill what is not alive!" The fools say.\n"With magic, powder and steel!" Our enemies say.\n"IMPOSSIBLE!" We say.\n\nFor our bodies are not what makes us live, but our Kauga. Our Damestear heart, ever gleaming and ever radiant even when our forms shall rust. Those of flesh and blood are ever searching for the healing and salvation they can never have, and we can only laugh, for we are already saved. They use Transmutation to sate their neverending greed, tear the land apart and empower their vile shoe-casters, but to us it grants eternity. Restoring those who fall to rise to greater heights.\n\nSo I ask you to fight valiantly and with no fear, for you shall live FOREVER!”"

 #artifice_invention_torso_war_craved
 insyaa_flavour.139.t: "Horror Carved War Plating"
 insyaa_flavour.139.d: "A mechanim’s carvings can depict many things, from great triumphs we wish to display to the world to great tragedies we wish to ensure that are never forgotten. But of all the things we carve on ourselves, the thing that binds them is that they are things we want others to see: every carving is designed to elicit a reaction, whether it is astonishment or sorrow.\n\nOne reaction we have not tried to elicit from the other peoples of Insyaa yet is horror, which can be a powerful force in itself. The other peoples are often very fleshy. They can be made to turn away easily from some superficial damage to our torsos that is painted in the right colors, to say nothing of how they react when they see the scenes of violence, gore, and terror that we can now carve on our bodies. Our artificers have designed them to have maximum psychological impact on our foes.\n\nFrom how the organic peoples have reacted so far, it appears to work very, very well."

 #artifice_invention_torso_container_part
 insyaa_flavour.140.t: "Container Compartmentalized Torso"
 insyaa_flavour.140.d: "“Every craftsman, be they mechanim or a being of flesh and blood, will agree that easily one of the most annoying parts of crafting handmade items is the requirement to go gather the components required for the assembly of the end product over and over again. \n\nWith the Container Compartmentalized Torso, at least for mechanim craftsmen, this tedious task belongs to the past. Now they can store all manner of raw materials, component pieces and even tools needed for their work. No longer will they have to interrupt their labors to gather what they need to continue. Instead crafting for hours on end, constantly churning out high quality goods, will become the norm with this ingenious use of very personal storage space. \n\nAnd the innovation does not stop there, for the basic Container Compartmentalized Torso is highly modular, able to accommodate the varying needs of different professions with ease, from heated or cooled compartments to pressure-compression systems allowing the storage of far more material than usually possible with conventional containers.”"

 #artifice_invention_torso_war_machine
 insyaa_flavour.141.t: "War Mechanim Mod Kits"
 insyaa_flavour.141.d: "At one time, our capabilities in war were limited by our weapons and our frames, and those mechanim built for war naturally took up the job of defending the homeland and striking out beyond our borders. Now that we have the ability to modify ourselves through artificery, this need not be the case. \n\nA mechanim’s frame need not define their future. One of the most immediate applications of our grip on precursor technology is that ‘mobilization’ for our nation is simply a matter of giving our people the appropriate weaponry and programming. A population at peace can be turned into a population at war with the click of a rifle attachment. The soldiers of foreign lands may be formidable, but even the hardiest troops will collapse under the pressure of an entire nation of specialized, veteran soldiers marching in perfectly straight lines."

 #artifice_invention_chassis_heavy
 insyaa_flavour.142.t: "Biological Mimic Chassis"
 insyaa_flavour.142.d: "When our dormant kin awoke in the Hinuilands, they did not entirely know they were alive. But they did know they had been colonized by life. Moss grew on metal plates, vines ensnared limbs, beetles had made their nests in sensory receptors.\n\nIf one was lucky enough to have a chunk of damestear ensnared nearby, the first moments after taking up their power -- or perhaps hours, depending on the case -- were taken up by removing that biological detritus from their chassis.\n\nBut today, we seek to embrace it once more. The creatures we encounter, after all, are all biological -- we alone are the sole exception. Those strangers seem to treat those of us that appear in forms more aligned with biological creatures with a little more grace. Adjusting some of the stranger aspects of our forms, and applying heavy coats of paint, should suffice to keep them comfortable. Until, we hope, the day they can look past such ultimately irrelevant distinctions."

 #artifice_invention_chassis_light
 insyaa_flavour.143.t: "Light Frame Chassis"
 insyaa_flavour.143.d: "Walk without weight, lest you disturb a hinuipredator.\n\nThis is a common scrap of wisdom that almost any mechanim who has spent some time in the hinuilands keeps close in their memory banks. There are so many fearsome creatures to avoid, and every step needs to be taken with care to successfully do so.\n\nWe have come to learn a similar practice is relevant outside those singularly fearsome lands. Indeed, we can incorporate it into not just our memory banks, but our very chassis as well. By adjusting our designs to trim unnecessary components and ensure metal- and magic-efficient designs, we should have minimal impingement on core functionalities, but decrease the weight we place on the land."

 #artifice_invention_chassis_waterproof
 insyaa_flavour.144.t: "Waterproof Frame Installations"
 insyaa_flavour.144.d: "Even if their metal bodies made of precursor steel cannot rust, water is still not a hospitable environment to the average mechanim. Joints can be filled with silt and marine detritus, stiffening every move. Interior compartments can flood, drowning whatever was kept within, and causing an imbalance through the added weight of water where none was before. And of course, any kind of electrical impulse will all too eagerly short-circuit in the presence of liquid.\n\nTherefore, the design of waterproof frames has been an important advance for mechanim artificery, finally allowing their kind to partially or completely submerge themselves in bodies of water without risking all manners of deleterious consequences.\n\nOne major consequence of this breakthrough was the addition of amphibious assaults to the repertoire of mechanim warfare. Now, they can ambush enemy formations by hiding from sight beneath the opaque surface of nearby rivers, lakes or the seashore. And just as importantly, the ability to submerge themselves in water allows them to easily escape from a barrage of enemy fire, whether that be ammunition fire or literal fire conjured up by the enemy."

 #artifice_invention_chassis_soarer_struts
 insyaa_flavour.145.t: "Soarer Mechanim Attachment Struts"
 insyaa_flavour.145.d: "A soarer mechanim soaring high up in the sky only to suddenly swoop down on a desperately fleeing target on the ground is a truly awe-inspiring yet daunting sight. But no matter their already astounding military capabilities, to the mechanim mindset, there is always room for improvement.\n\nBy adding light-weight buoyant attachment struts to their torso, a soarer mechanim might carry several containers filled with explosives, ready to rain down on the enemy, or carry a fellow mechanim above enemy fortifications to infiltrate their defenses.\n\nIn this way, these elegant flyers have become a sight feared by all soldiers tasked with guarding a fortress who justifiably dread the death from above."

 #artifice_invention_arms_dual_pair
 insyaa_flavour.146.t: "Dual-Pair Arm Installations"
 insyaa_flavour.146.d: "As long as humanoid Mechanim have been around, many of us have been asking the question of just how many arms are too many for general and martial usage. For the longest time 2 seems to have been the final answer to that, with more appandages usually causing coordination and balance issues, especially for tasks requiring precision or martial skill. \n\nCombat trials of potential solutions usually devolve to combatants spinning recklessly, which is surprisingly effective in single combat (and rather amusing to the audience), but does not lend itself to proper formations. This has only grown more true as rifles and gunlines grow more and more prominent.\n\nHowever, recent developments from our artificers may just break these limits, by effectively linking two sets of arms together. By splitting a common arm down the middle and using clever placements of what they dubbed “Kauga Relays”, devices that are able to convince our brain into treating both arms as one, Mechanim will be able to effectively use four hands at once. \n\nWhile brilliant, this leaves the secondary pair with limited dexterity, as the added arms for the most part only mimic the movements of the other. They thus serve better when equipped with close quarters weapons instead of more complex rifles."

 #artifice_invention_arms_stabilizer
 insyaa_flavour.147.t: "Stabilizers and Recoil Absorbers"
 insyaa_flavour.147.d: "For many, the perfect soldier is the one that can take orders, march in formation and fire their weapon with passable accuracy.  However our foes, be they flesh, fellow Mechanim or Holohana, are unlikely to yield from a single bullet alone. As such, we need to ensure that our troops can both fire fast and accurately. While the former is only really viable through extensive drilling and long term development of firearm technology, the latter we can improve upon in the short term by minimizing the two largest factors: recoil, and sway while lining up a shot. \n\nFor the first, methods are available ranging from simple padded stocks to an elaborate arm design that allows it to retract into itself to disperse much of the accompanying recoil, a system that is theorised to also work for our cannons in due time. \n\nThe latter in turn required a bit more ingenuity. While a Mechanim does not need to worry about breathing throwing off their aim, servos and joints hanging or lagging for a few moments can be enough to ruin the opportunity for a clear shot. To prevent this, and keep our soldiers from carrying around barrels of lubricant, our artificers repurposed the systems that kept us motionless for so long. Once ready to fire, a simulated stasis affects the arms, keeping them almost perfectly still while the marksman focuses on micromovements to line up their shot."

 #artifice_invention_arms_construction
 insyaa_flavour.148.t: "Arm Construction Attachments"
 insyaa_flavour.148.d: "If there is one thing that the Fall of the Precursors and Day of Ashen Skies has shown to the world then it is that destroying things is far easier than building something. A fact that was proven to us again and again since our reawakening. How many of our kin did we lose to the ravages of time? How many friends devoured by hostile flora and fauna or killed in pointless wars?\n\n“Enough!”, we say, for our hands shall not be those of war and slaughter, no, ours shall be the hands of an enlightened age, one of building and restoration. \n\nOur swords shall become saws, our maces hammers and our spears drills till the day there is nothing more to be built and every soul lost has a monument dedicated to them. Perhaps until even the assorted gods of Halann have no choice but to acknowledge our work.\n\nFor the stronger we our houses do build, the less chance we have of being killed."

 #artifice_invention_arms_sonic_firearm
 insyaa_flavour.149.t: "Sonic Firearm Implants"
 insyaa_flavour.149.d: "Everyone who has heard the sky-splitting screech of a hinuiroc or the deafening drone of constant thunder emanating from the Kiamoa is all too aware of the power of raw sound, capable of sowing dread into the heart of even the most stoic among us. But as with many other things, the mechanim have taken the concept and refined it further until they turned sound itself into a deadly weapon.\n\nThe Sonic Firearm Implants are integrated in the upper extremities of a mechanim chassis, and operate by creating a resonating pulse that is constantly amplified within a containment chamber until a pinhole valve is opened to release the pent-up sonic energy in a tightly focused beam. The power of this sonic beam is capable of shattering even the sturdiest wooden planks and punching a hole even through metal sheathing meant to protect a vessel, if targeted properly.\n\nMechanim sailors equipped with this particular modification have thus become a welcome addition to naval vessels of all kind, from warships eager to gain an advantage over their enemies to merchant ships looking for additional protection from pirates and the hinuibeasts roaming the waters around Insyaa."

 #artifice_invention_legs_quadripedal
 insyaa_flavour.150.t: "Quadrupedal Leg Configuration"
 insyaa_flavour.150.d: "Discovered in the annals of a forgotten Gene Pillar laboratory, we have discovered schematics for a four legged configuration, which should be applicable to our people. Featuring a larger torso chassis perpendicular to the ground for more leg space, two extra leg modules are attached to joints on equal positions of the hindquarters, reminiscent of a llama or wombat. The leg modules across the chassis are reinforced for better shock absorption and optimal cadence. Better weight distribution,combined with reinforced feet configurations to cope with the added mass, makes our soldiers far sturdier, able to stand their ground against attacks that would blow their bipedal brethren off their feet. Ideally, this will make our warriors resistant to enemy feints and charges."

 #artifice_invention_legs_bipedal
 insyaa_flavour.151.t: "Bipedal Leg Configuration"
 insyaa_flavour.151.d: "A common body type, familiar to a large quantity of mechanim. Recent discoveries have allowed us to recreate the configuration for mechanim without it or those who have swapped configuration previously. Noted for a horizontal chassis where the head, torso and legs share a plane, two legs are slotted into joints at the lower torso area.  Being typically of lithe configuration for additional agility, and combined with the space optimization of the form itself, it allows mechanim to be much more agile and adaptive letting us cover larger distances over rougher terrain in less time."

 #artifice_invention_legs_octipedal
 insyaa_flavour.152.t: "Octopodal Leg Configuration"
 insyaa_flavour.152.d: "An insectoid-inspired form of locomotion, being common among mechanim who interact frequently with Loa’set. A chassis, inspired by insectoid body-plans, is installed onto the lower half of the body. Eight legs, each made of small segments connected to ball joints for dexterity, are connected to socket ports on the aforementioned thorax, which is designed to minimize body space for maneuverability. All of the aforementioned design elements come together to make a very durable and versatile chassis, which allows our warriors to traverse many types of terrain more efficiently and decreases accident risk to the user."

 #artifice_invention_legs_trailblazer
 insyaa_flavour.153.t: "Trailblazer Augmentations"
 insyaa_flavour.153.d: ""To call traversing the Insyaan wilderness foolish, troublesome, reckless, and suicidal would both be accurate, yet also a complete understatement. Our most skilled harpy scouts likely wouldn’t last more than a week in these hostile lands, even without accounting for any Holohana.\n\nThus, I can only commend the ingenuity of our Mechanim guides and their Artifice. They found us about a fortnight ago, heated blades cutting through the flora our own blades struggled against as if it were a mere feather. We didn't notice their approach until they stepped into the light of our fire, the hue of their hull shifting and trying to adapt to the light.\n\nThough their tools didn’t stop there: from grappling hooks that never failed to find a hold to senses that would make any elf jealous. Even the ability to somehow „see“ heat and feel tremors from miles away.\n\nAs such, I can only recommend seeking closer ties to local Mechanim and their Trailblazers for any future expeditions and colonial ventures.\n\nThough I fear what they might learn from us if we ever were to face them in open combat…"- Excerpt from the Record of an unnamed Naleni Explorer, 1762"

 insyaa_flavour.195.t: "Head Modification Completed"
 insyaa_flavour.195.d: "We have completed restructuring the heads of those in [Root.GetName] whose forms include a head. The new design will now provide its benefits, or we could adjust our choice, if we would like everyone to be headless for another stretch of time."
 insyaa_flavour.195.a: "This should head off any trouble"

 insyaa_flavour.196.t: "Torso Modification Completed"
 insyaa_flavour.196.d: "We have completed restructuring the torsos of those in [Root.GetName] whose forms include a torso. The new design will now provide its benefits, or we could adjust our choice, if we would like everyone to be torsoless for another stretch of time."
 insyaa_flavour.196.a: "What use is a torso, really?"

 insyaa_flavour.197.t: "Chassis Modification Completed"
 insyaa_flavour.197.d: "We have completed restructuring the chasis of those in [Root.GetName] whose forms include a chassis. Wait, what form does not include a chassis? The new design will now provide its benefits, or we could adjust our choice, if we would like everyone to have the foundation of their form modified again."
 insyaa_flavour.197.a: "Let's not go chassisless. Ever."

 insyaa_flavour.198.t: "Arms Modification Completed"
 insyaa_flavour.198.d: "We have completed restructuring the arms of those in [Root.GetName] whose forms include arms. The new design will now provide its benefits, or we could adjust our choice, if we would like everyone to be armless for another stretch of time."
 insyaa_flavour.198.a: "The troops of [Root.GetName], armless? Certainly not!"

 insyaa_flavour.199.t: "Legs Modification Completed"
 insyaa_flavour.199.d: "We have completed restructuring the legs of those in [Root.GetName] whose forms include legs. The new design will now provide its benefits, or we could adjust our choice, if we would like everyone to be legless for another stretch of time."
 insyaa_flavour.199.a: "This should give us a leg up."

 #Kiamoa Opening event chain
 insyaa_flavour.201.t:0 "Mysterious Console"
 insyaa_flavour.201.d1:0 "In the aftermath of our latest expedition to the Gene Pillar in [event_province.GetName], teams have been left in place to slowly sift through the mountain of data now available to us. Among their discoveries is a device which, the team believes, is intimately connected to the function and continued violence of the Kiamoa, the raging wall of storms which form the very wall of our world.\n\nThe data we have discovered in the pillar confirms what the Dragon Turtles have always maintained; there is something beyond the Kiamoa. What that something is, especially after so much time, is a more vexed question. Our team believes that the machinery they have found could bring down the Kiamoa altogether, allowing us to travel beyond it. Beyond a few swivel-eyed intellectuals and fringe thinkers, however, the idea has little to recommend it."
 insyaa_flavour.201.d2:0 "In the aftermath of our latest expedition to the Gene Pillar in [event_province.GetName], teams have been left in place to slowly sift through the mountain of data now available to us. Among their discoveries is a device which, the team believes, is intimately connected to the function and continued violence of the Kiamoa, the raging wall of storms which form the very wall of our world.\n\nSuch a fundamental alteration to the natural balance of Insyaa would be reckless folly, destructive to the entire continent in ways we cannot predict. We know that some odd thinkers - the daring wayfarers of the Endless Ocean, those Speaking Memory followers who revere the Dragon Turtle Hoki’eal, and the strange mechanim who follow the teachings of Golodh - seek to pierce the Kiamoa for one reason or another, but we are not they."
 insyaa_flavour.201.a:0 "A path we will not follow; not now."
 insyaa_flavour.202.t:0 "A New Zeal"
 insyaa_flavour.202.d1:0 "Somewhere beyond the Kiamoa, the great wall of storms which rings the world, lies the afterlife; this we have always believed. Yet the team we left behind to study the Gene Pillar in [event_province.GetName] has discovered something incredible - the Pillar itself has great influence over the workings of the ocean’s edge, and making use of its technology may allow us to travel straight through…\n\nWhat can this truly mean? No one sect of the Endless Ocean is quite agreed, of course, though notions spread rapidly from group to group on such an important topic, carried by our traditional exchange. Can we perhaps sail to the very afterlife itself, and meet those lost to us? Will we find other islands in the ceaseless blue beyond, other folk who fare their way on the waves? Ours is a curious creed, whatever shore it may wash, and we doubt any would prove as adaptable as we to the immense changes and challenges that ending the Kiamoa may bring. We simply must know.\n\nPiecing together the information gleaned from the Gene Pillar with the collected stories of Insyaa, we have discovered a fascinating link between the Gene Pillars and the Dragon Turtles. Three of their number are closely associated with the secrets of the Pillars, even far beyond their homelands: Hoki’eal, Grandfather Moss, and Nalo Pu’ukani. Hoki’eal, curious and daring, has long ridden the edge of the Kiamoa for her own reasons, joy and sorrow alike; Nalo Pu’ukani shares our creed and our desire to go beyond the wall, and his many songs and humble secrets include tales of the Pillar’s operations; Grandfather Moss’ prodigious lifespan includes an enormous wealth of wisdom.\n\nWith their help, we will cross the Kiamoa into a truly endless ocean."
 insyaa_flavour.202.d2:0 "Since we have embraced the creed of the Endless Ocean, our view has turned, as every wayfarer’s must, to the horizon. Somewhere beyond the Kiamoa, the great wall of storms which rings Insyaa, lies the afterlife. Knowledge we once abhorred - that the Gene Pillars are capable of bringing down the edge of the world - now promises an entirely new frontier.\n\nWhat can this truly mean? No one sect of the Endless Ocean is quite agreed, of course, though notions spread rapidly from group to group on such an important topic, carried by our garrulous exchange. Can we perhaps sail to the very afterlife itself, and meet those lost to us? Will we find other islands in the ceaseless blue beyond, other folk who fare their way on the waves? Ours is a curious creed, whatever shore it may wash, and we doubt any would prove as adaptable as we to the immense changes and challenges that ending the Kiamoa may bring. We simply must know.\n\nPiecing together the information gleaned from the Gene Pillar with the collected stories of Insyaa, we have discovered a fascinating link between the Gene Pillars and the Dragon Turtles of Insyaa. Three of their number are closely associated with the secrets of the Pillars, even far beyond their homelands: Hoki’eal, Grandfather Moss, and Nalo Pu’ukani. Hoki’eal, curious and daring, has long ridden the edge of the Kiamoa for her own reasons, joy and sorrow alike; Nalo Pu’ukani shares our creed and our desire to go beyond the wall, and his many songs and humble secrets include tales of the Pillar’s operations; Grandfather Moss’ prodigious lifespan includes an enormous wealth of wisdom.\n\nWith their help, we will cross the Kiamoa into a truly endless ocean."
 insyaa_flavour.202.d3:0 "Sometimes, the virtues of memory are unexpected. The team we left behind to study the Gene Pillar in [event_province.GetName] has discovered that the Pillar had a relationship with the Kiamoa, the immense stormwall which rings the whole world - indeed, that it might be able to banish the Kiamoa forever. This confirms that there is a world beyond the Kiamoa at all, one unremembered by our cultural Memory, one which must be catalogued before it is forgotten and passes into nonexistence.\n\nWe had wondered upon this and fretted, unsure how to go about harnessing the Pillar’s power, until finally our wayfarers shared this strangest of developments with Hoki’eal, and Hoki’eal let out an eager laugh. She knows at least one secret of the Pillar, a special phrase used in tandem with others to bring down the Kiamoa. There are three such phrases, split between herself, the immense vault of Grandfather Moss’ mind, and the many songs of Nalo Pu’ukani; Hoki’eal has never been able to get the others to cough up, for they counsel caution in such an enormous undertaking, in exposing our world to what lies beyond.\n\nWe keep the memory to honour those before us; we keep the memory to make our futures meaningful. If we can prove the merits of our society, our commitment to remembering what is beyond the Kiamoa, perhaps the other two Dragon Turtles will join their memories with Hoki’eal, trusting us where they do not trust their reckless sister. Surely it is worth a try?"
 insyaa_flavour.202.d4:0 "The tools designated  to investigate the Pillar in [event_province.GetName] have continued to uncover the secrets of the Makers, and the Pillars’ link to their works. They confirm that the Pillar we have delved is one of two able to control the Kiamoa, the wall of storms which circumscribes this continent. Beyond lies the homeland of the Makers, the place from which they travelled to do their divine works. Golodh sees the path to fix what has been ruined, to restore the Makers’ inheritance, and it leads outside the great storm.\n\nPiecing together the Pillar data with records of Insyaan folklore we have acquired in our overlordship of this land, we have linked three of the Dragon Turtles with so-reported secrets of the Pillars. In the stories, these secrets give the bearer power over the Pillars and the Makers’ technology. In such superstition, we find our next step. We must find a way to glean these secrets from the Dragon Turtles, by hook or by crook."
 insyaa_flavour.202.a:0 "We must convince the three Dragon Turtles to part with their knowledge."
 insyaa_flavour.203.t:0 "A Gathering Of Titans"
 insyaa_flavour.203.d1:0 "The song of Nalo Pu’ukani; the memory of Grandfather Moss; the discovery of Hoki’eal. All three Dragon Turtles have given over their secrets to us, trusting that there is finally a force in Insyaa powerful and wise enough to deal with what may come once the Kiamoa falls.\n\nWe fear to see the ocean change, to become something we do not recognise, a friend with a different face - but this is its nature, and whatever sorrow we feel cannot stop our drive for discovery. It cannot make children of us. What lies beyond the Kiamoa is no doubt more of that ocean, more of her, and we cannot divide her from herself. When we meet what lies beyond the edge of things, the life beyond life, we will not shrink."
 insyaa_flavour.203.d2:0 "The song of Nalo Pu’ukani; the memory of Grandfather Moss; the discovery of Hoki’eal. All three Dragon Turtles have given over their secrets to us, trusting that there is finally a force in Insyaa powerful and wise enough to deal with what may come once the Kiamoa falls.\n\nWe will honour their trust; we will bring whatever lies beyond the Kiamoa into our Memory, and it shall never be forgotten. At the moment each Dragon Turtle gave us their words of power, they hesitated - even Hoki’eal did. What we learn beyond the Kiamoa must all be remembered, every part of it, however immense it is in its totality. We are taking on a grand and terrible burden."
 insyaa_flavour.203.d3:0 "The song of Nalo Pu’ukani; the memory of Grandfather Moss; the discovery of Hoki’eal. All three Dragon Turtles have given over their secrets, and nothing stands between Golodh and his rightful destiny. The Makers came from elsewhere to craft their great works, all the grand and wonderful technology of Insyaa; finally, we are strong enough to make true use of it."
 insyaa_flavour.203.a:0 "It is time to break open the world."
 insyaa_flavour.204.t:0 "The Stormwall"
 insyaa_flavour.204.d:0 "It is done.\n\nWe have spoken the words, collected from the wisdom of the three Dragon Turtles. We have taken command over the Gene Pillar, a force of unimaginable ancientness and immensity. None there that day will ever forget the deep rumble of the tower, the ringing of the ground, a tuning fork struck by the very metal of creation.\n\nSuch acts that remake the world do not occur overnight, of course - now we must simply wait."
 insyaa_flavour.204.a:0 "Anyone fancy a drink?"
 kiamoa_opening_hint_1_tt:0 "Only a state whose religion is §YEndless Ocean§!, §YFoundationism§! or §YSpeaking Memory§! can marshal enough widespread support - or the authority - to bring down the Kiamoa."
 kiamoa_opening_hint_2_tt:0 "By appeasing §YHoki’eal§!, §YNalo Pu’ukani§! and §YGrandfather Moss§!, we will unlock the three codes needed to bring down the Kiamoa."
 kiamoa_opening_hint_3_tt:0 "§YYou are now able to open the Kiamoa by decision.§!"
 open_kiamoa_title:0 "[open_kiamoa_decision_title]"
 open_kiamoa_desc:0 "[open_kiamoa_decision_desc]"
 open_kiamoa_decision_4_title:0 "Open the Kiamoa!"
 open_kiamoa_decision_4_desc:0 "With the code finally in our grasp, our search is finally at its end. All that remains to be done, is to do the deed!"
 open_kiamoa_decision_3_title:0 "Gather the Secrets."
 open_kiamoa_decision_3_desc:0 "Only with the favour of all three Dragon Turtles will we be able to discover the entire code and bring down the Kiamoa!"
 open_kiamoa_decision_2_title:0 "Gather a Zeal"
 open_kiamoa_decision_2_desc:0 "Those who wish to discover the secrets of the Kiamoa are few, and if we are to do so, we must join them."
 open_kiamoa_decision_1_title:0 "???"
 open_kiamoa_decision_1_desc:0 "There is something waiting in the great Gene Pillars, if we but have the courage to seek it..."
 open_kiamoa_red_tt: "Fully explored the pillar in §Y[3376.GetName]§!"
 open_kiamoa_pink_tt: "Fully explored the pillar in §Y[6950.GetName]§!"

 #Mechanim Over Forcelimit
 insyaa_flavour.1000.t:0 "Shortage of Kauga"
 insyaa_flavour.1000.d:0 "We mechanim are not akin to the other peoples of Insyaa, overbrimming with spare offspring, possessed always of a froth of layabout youth in need of a cause and a bit of pocket money. We are limited to the mechanim we can find and awaken, to the number of kauga soul-cores we can keep running simultaneously. Recently, demands by the military have exceeded the stable proportion of our population we can usually devote to such purposes; there simply are no extra folk to cajole with increased pay.\n\nInstead, we must find kauga from our administration and productive sectors and move them into proper battle chassis. These clerks and labourers will inevitably be missed, even if replaced with non-mechanim; the paperwork processing power of a bureaucrat mechanim must be seen to be believed."
 insyaa_flavour.1000.a:0 "Please keep my i-dotting attachment well-oiled."
 mechanim_over_forcelimit_tt:0 "If we §Yreduce our forces to our Force Limit§! before selecting this option, we will §Ycompletely avoid§! the associated malus."

 # Secrets of the Hinuilands
 insyaa_flavour.2000.t:0 "Hidden"
 insyaa_flavour.2000.d:0 "Hidden"
 insyaa_flavour.2000.a:0 "Hidden"

 insyaa_flavour.2001.t:0 "Secrets of the Hinuilands"
 insyaa_flavour.2001.d:0 "Where did the rumour start? Even though [Root.GetName] is small, we cannot be sure.\n\nPerhaps it was in a flash of memory, provoked by a strangely-shaped branch or unlikely turn of phrase. Perhaps it emerged from an encounter with strangers, one of the small bands of other roaming Mechanim we have passed. Perhaps there was a clue, somewhere, somewhen.\n\nLike ourselves, however, the rumor is more important for its future, than its past. The learning that swirls through the tribe is that even amidst this strange ecology, filled with wonders great and greater, there are places of distinction. Where the world is warped, stranger than its surroundings. Where a lesson can be learned.\n\nOur travels are slow, bounded by the weakest amongst us. But we could send out some of the bravest, to search for these places, and report back what they find. Though this journey may take them through dangerous lands, and an encounter with a Holohana could spell disaster... all our wandering is to learn. How can we pass this opportunity up?"
 insyaa_flavour.2001.a:0 "Secrets are but lessons waiting to be revealed."
 secrets_of_the_hinuilands_tt: "Two §YSecrets of the Hinuilands§! have spawned in each Titanoflora region. If our troops discover them, we will be able to §YExplore a Secret of the Hinuilands§! as a decision.\n\n"
 secrets_of_the_hinuilands_effect_tt: "Two provinces in every §!Titanoflora§! region receive:"

 insyaa_flavour.2002.t:0 "The Hinuilands Reveals a Secret"
 insyaa_flavour.2002.d:0 "Hidden"
 insyaa_flavour.2002.a:0 "Hidden"

 insyaa_flavour.2003.t:0 "The Hinuilands Reveals a Secret"
 insyaa_flavour.2003.d_grasswhirlpool:0 "Exploring the Hinuigrasslands is difficult. The grass weaves and flows, and deadly predators lurk between the ever-strong, deadly-sharp, blades. It is often easier to prepare crafts out of wood that can navigate atop the grass-tips, and sail them forth. Though one still has to be mindful of predators -- like hinuibirds descending from the clear blue sky -- it is certainly preferable.\n\nUnless, and until, we encountered what we did today. At first, we thought there was favourable wind or grass-weaving, because our craft had picked up speed. But as it continued to accelerate, we realized we were in trouble. We heaved oars and bent sails to cut out of the rapids we had stumbled into, and with the strength of our heaving we made it free. As we recovered, we sent a scout to explore the surroundings.\n\nWhat we thought were dangerous rapids were just the meagrest outskirts of a Maelstrom. A giant grasswhirlpool, churning and ferocious. A massive maw that could swallow ten thousand of our craft without fail. A reminder that the Hinuilands always have a new danger to present you.\n\nAnd yet. Perhaps they are crazy, perhaps they are thrill-seeking, perhaps they see further than most. The scout wants to try their hand at sailing it once more, now that they are a little more prepared. They swear they'll be able to escape before the Grasswhirlpool pulls them in, if they fail. And perhaps there is something they could learn."
 insyaa_flavour.2003.d_fires_beneath:0 "We lost someone today.\n\nPerhaps their remains will be recoverable, when the fires subside. If they subside.\n\nWe thought this was a strange part of the Hinuisavana, where the grass seemed a slightly different species and clearings reigned supreme. We were careful in our initial foray, lest a hinuibeast take advantage of the openness to pounce upon us. But little did we know it was the clearing itself that was the danger.\n\nA too-heavy step disturbed a fresh patch of ground, and out of it leapt fires, scorching hot. They caught the shorter grasses and those too soon burst alight. The heat then disturbed the ground further, and elsewhere in the clearing, flames leapt up, meters tall. We ran and ran as the grasslands lit up behind us.\n\nMost wish not to revisit this place, where fires lurk beneath what seems like solid ground. Some think, hope, that in time we could learn to tame them. I disagree. I think that all we will learn from this place is how to pick up the pieces in the wake of destruction. But perhaps that is enough."
 insyaa_flavour.2003.d_treegrave:0 "If a tree falls in a forest, does it make a sound?\n\nPerhaps, perhaps not. But when the tree that falls belongs to the hinuiforest, it certainly makes an impression. This province is filled with the valley it carved when it fell, a giant bringing down other giants with it. Species from the undergrowth and overgrowth yet mingle, carving out niches amidst the behemoth's carcass. There is all the wood we could ever need, made more accessible than usual in the Hinuiforest. But this valley of wreckage and detritus is an unstable foundation."
 insyaa_flavour.2003.d_hinuibee_hive:0 "At first, we thought the droning sound we heard when we neared this province marked the presence of a yet-undiscovered Holohana. But we did not see the wreckage that normally accompanies those great titans, indeed, it was much the opposite: the surrounding flora seemed to flourish with new life.\n\nWe cautiously explored further, and saw in the distance a massive oblong shape, attached to a Hinuitree and stretching from its upper branches down almost to its roots.\n\nSoon, we saw the first Hinuibee, a giant insect with a glossy black-yellow carapace and a deadly-sharp stinger. But it seemed to pay us little heed, in comparison to the vegetation it was tending, and we followed it back to the hive. In the hive's massive chambers, we found honeycombs the size of buildings, and pools of hinuibee honey the size of ponds.\n\nWe do not know why one among our party deigned to touch that pond -- perhaps they grew ambitious, perhaps they merely stumbled, but their fate was the same nonetheless. They were immediately speared by massive stingers coming from a half-dozen directions, and their corpse lay shattered (yet carefully placed apart from the honey) on the wax.\n\nWe cannot disturb the Hinuibees. But perhaps, in time, we might befriend them, that they share their bounty with the land and with us."
 insyaa_flavour.2003.d_bonelake:0 "We have found many lakes in these lands. Some are clear and pristine, some are murky and foul. Some are vast, some are small, and some appear as ponds yet are unfathomably deep. But none are like this: a corpse of a lake.\n\nOnce, perhaps, this lake was vaster than most, and undoubtedly a home for varied hinuifish and other creatures. Now it is but filled with their bones."
 insyaa_flavour.2003.d_damestear_island:0 "We thought this was an island amidst a lake, perhaps more interesting than most for the bizarreness of the flora that flourished upon it. But as soon as we stepped off our watercraft and onto its surface, we paused.\n\nThere was a power here, buried deep and at the surface.\n\nWe pawed at the ground, and found the reason why: this entire island was made of Damestear. We looked around, at the massive lake we had just crossed, and realized its truth: it was but the crater left by the meteorite that had become the island.\n\nThis is a place where power is concentrated. To access that power will mean mining out the very land we build upon. But perhaps that is a price worth paying."
 insyaa_flavour.2003.d_deepest:0 "Discovery so often begins with a mistake. But alas, it is not usually as fatal as this one.\n\nA member of our expedition misstepped into what was thought a shallow puddle. Instead, they fell in, and we never saw them again. We sent scouts in with ropes around their waists, and they found nothing: no sign of the fallen, no flora or fauna, and no bottom to the hole.\n\nOne day, we may send them deeper. For now, we will step around this puddle, and count it among the stranger discoveries we have made in the Hinuilands."
 insyaa_flavour.2003.d_fluvial_waterworks:0 "The great water-carved stone caverns we found marked a change from the jungle and wetlands we have grown so used to exploring in this region. That difference intrigued us enough to venture into them, foreboding as they were.\n\nWe are not truly sure what we have discovered. There are strange planes of force that seem to hew into the rock. There are peculiar sigils on the walls, still charged with power. And there is the undeniable feeling that from within these caverns, one could reshape the world.\n\nThere is much more to be learned of just what has been found here. But we have been given a glimpse within the magic behind the Hinuilands, and it is a thread we shall unravel in time."
 insyaa_flavour.2003.a:0 "A wonder and a horror in one -- a quintessential embodiment of these lands."
 insyaa_flavour.2003.b:0 "A wonder and a horror in one -- among the many we have seen in our journey."
 hinuilands_secret_will_spawn_monument_tt: "When this province is §YSettled§!, the Secret here will turn into a powerful Great Project. Thankfully, the §RHolohana§! seem to avoid this place."

 insyaa_flavour.2004.t:0 "Settling a Secret"
 insyaa_flavour.2004.d: "Hidden"
 insyaa_flavour.2004.a:0 "Hidden."

 insyaa_flavour.2005.t:0 "Settling a Secret"
 insyaa_flavour.2005.d_grasswhirlpool:0 "Around the edges of the Maelstrom that is the Grasswhirlpool, small communities have begun to pop up. Exiles who have come to find their future, or their demise, within its ever-churning depths. The brave and the foolhardy, who seek to conquer it to prove something to the world, or perhaps themselves."
 insyaa_flavour.2005.d_fires_beneath:0 "We thought these lands where fire bubbled beneath the surface to be treacherous and impassable. But to survive in these lands at all we have had to prove ourselves indomitable, and the Fires Beneath proved a difference only in scale -- not in kind. Anyone who makes their life here will have to grow used to losing it in an instant. But like the grass species that thrive in the wake of a flashfire, so too will we learn to rebuild."
 insyaa_flavour.2005.d_treegrave:0 "In the valley carved by a falling Hinuitree, species from the Hinuiforest's canopy and undergrowth carved out niches side by side. Now another species has joined them: the denizens of [Root.GetName]. The land is strange to build on, given the unstable mass of fallen foliage. But it can be built on, and that is enough for us."
 insyaa_flavour.2005.d_hinuibee_hive:0 "When we first claimed this land, we thought we would merely establish settlements around the edges, well-removed from the massive Hinuibee Hive that hangs atop its tallest tree like a second moon in the sky. But the bees were curious, and surprisingly unaggressive if their honeymaking wasn't disturbed. Right now, they are giants that occasionally pass by, treated with deference and caution. But perhaps in time they could be partners, or even friends."
 insyaa_flavour.2005.d_bonelake:0 "The lake of bones is an eerie accompaniment to life, but one that most denizens grow surprisingly numb to surprisingly quickly. The fact that they were once thriving life fades in salience, replaced by an appreciation for the strange sculptures that these macabre forms have formed. Already, some play among the bones, others scour them for particularly interesting shapes. And some even have taken to chipping off pieces, to bring with them when they leave."
 insyaa_flavour.2005.d_damestear_island:0 "The Damestear Meteorite Island is suffused with power, in every mound of earth or tract of land. This has made settling upon it challenging: we scrape through power to mine power, we build upon power to build upon power. The land will be difficult to work with, at least until we have established proper facilities. But power is power is power, and here, there is no shortage of it."
 insyaa_flavour.2005.d_deepest:0 "It was easy enough to ignore the Deepest when we settled here. It was just a hole in the ground, perilous to any who fell in but easy enough to avoid. It would be local curiosity, until today: when the hole emptied out entirely.\n\nIts bottom was not visible from above, but that only piqued people's curiosity further. Explorers -- and fools -- quickly flocked to it, venturing down with ropes and harnesses. They made only a haphazard exploration into its depths before the hole flooded back, and the most foolish -- or the most brave -- were washed away. In its wake, however, even more have flocked to the region. They don't truly know when the Deepest will empty out again -- or if it ever will again -- but their curiosity outweighs their impatience. At least for now."
 insyaa_flavour.2005.d_fluvial_waterworks:0 "We have so, so, much more to learn. This is true of all the Hinuilands -- from the highest Gene Pillar. But it is especially salient when we venture into the Fluvial Waterworks. We need to understand what these things do, how the planes of force below shape the land that lays above. How the yet-active sigils might be harnessed, or altered, and to what purpose. And even if that is done, there will be the yawning chasms of knowledge that may lay forever out of reach: how a working like this could ever be created."
 insyaa_flavour.2005.a:0 "There is a power to be harnessed here. If we dare."
 insyaa_flavour.2005.b:0 "There is a power to be harnessed here, now or when we return."

 insyaa_flavour.2020.t: "The Deepest Expedition"
 insyaa_flavour.2020.d: "Dark, darker, yet darker. We've discovered something ancient and valuable within the depths of the Deepest."
 insyaa_flavour.2020.a: "Records and scrolls."
 insyaa_flavour.2020.b: "Tools and artifacts."
 insyaa_flavour.2020.c: "Weapons and armor."
 insyaa_flavour.2020.e: "Inventions."
 insyaa_flavour.2020.f: "Blueprints."
 insyaa_flavour.2020.g: "Machinery."
 insyaa_flavour.2020.h: "Calm."
 insyaa_flavour.2020.i: "Charm."
 insyaa_flavour.2020.j: "Courage."

