l_english:
 L76_the_source_of_corruption_title:0 "The Source of Corruption"
 L76_the_source_of_corruption_desc:0 "North of our home, beyond the mist-clad peaks of the Ertikan Starash, lies the foul Shadow Swamp, the heart of darkness, rotting yet still pumping out its foul juices. Everything touched by its malign influence becomes corrupted - creatures, people, places and, if its inhabitants are not vigilant enough, entire lands.\n\nSuch is the fate that threatens the jungle we call home. Thick black droplets of rain fall down from a leaden sky filled with pregnant clouds slipping through gaps between the mountains. Wherever they touch the foliage, the colour drains from the leaves.\n\nThis corruption mirrors the very corruption of our people. We dare not imagine what might happen to us if the corruption is allowed to spread unchecked. Only the cursed spire of Kaga Yatsa may offer a chance to halt these nefarious incursions. Thus we need to gain control over the shores of lake Adagur and the mountain pass where the spire itself pierces the sky."

 L76_ritual_frenzy_title:0 "Ritual Frenzy"
 L76_ritual_frenzy_desc:0 "The wars, and the foul seepage of magic from the swamp beyond the mountains, have left our druids bloodied and diminished. Carefully observed and measured rites have been forced to last beyond their intended limits, yet they do not suffice. The Curse does not answer with restraint when the land itself is steeped in corruption and so the Blood Druids have perforce adapted.\n\nThe surge of the Curse must not be subdued, but ridden. Flesh is pushed to its threshold. Breath shortens, vision narrows, and the pulse becomes a hammer against the bones. Consuming the body, piece by piece, with every invocation.\n\nThe magic that answers such sacrifice is no longer hesitant. It strikes with precision, swift and unrelenting, as if guided by something deeper than thought. Where once there was effort, now there is instinct. Where once there was strain, now there is clarity sharpened by pain. With such power at our command, few will endure what is to come."
 L76_ritual_frenzy_first_custom_tooltip_tt:0 "If §Y[Root.Capital.GetName]§! has a §YMage Tower§!:"
 L76_ritual_frenzy_rip_and_tear_upgrade:0 "\nUpgrade the §YShock and Awe§! spell to give §Y'War Magic: Rip and Tear'§! for §Y3 years, 3 months and 3 days§!, giving the following effects:\nShock Damage: §G+25.0%§!\nNaval Barrage Cost: §G-50.0%§!\nArtillery Barrage Cost: §G-50.0%§!\n\nAdditionally, winning at least §Y10§! battles while the spell is active will refund §M25§! Mana."

 L76_bloodlet_title:0 "Bloodletting"
 L76_bloodlet_desc:0 "The Druids hear what others cannot. Beneath the buzz of insects and the hiss of rain, they listen to the slow grinding of roots in pain. Our jungle remembers every drop of rotten sweat seeped into the soil. The rivers drag themselves through the mud thick and sluggish. In the low places the earth swells and softens, dark as bruised flesh. The jungle cannot purge itself, for it has no claws, so it speaks to our hearts.\n\nAshhana blood thickens with unspent Curse. It darkens, congeals, turns stagnant in the veins until every heartbeat grinds like stone. Zatal binds their violence, cages it behind hollow ‘art’, pretending the Curse can be starved into submission. What is caged does not fade - it rots. It curdles in the marrow, blackens the breath, seeps from the skin as a sour heat. The Curse rots inside them, and through them it rots our land. We cannot let it suffer any longer. Feed the jungle until the ground grows slick and the roots glisten red beneath the mud. Let the cleansing blood run hot and bright."

 L76_claim_the_jungle_title:0 "Claim the Jungle"
 L76_claim_the_jungle_desc:0 "Our Druids lie with their faces pressed into the watery mud, listening to the slow beat beneath the soil. They say the roots are distended, the earth is tight with breath that will not leave them. When the wind moves through the canopy it sounds less like leaves and more like lungs drowning in blood, trying to breathe.\n\nOur very first battles against Zatal caused the jungle to shudder. For a moment, the pressure broke. The soil drank deeply. The sound of breaths taken was clearer. The Druids say this ailment is akin to the Curse that troubles all Ashhana - pain held within rots and swells until it strangles the mind that controls the body. Pain forced outwards flows and cleanses our blood.\n\nIn the low valleys, the mud has turned dark and soft. When stepped upon it opens like a wound and bleeds black water. Trees lean at unnatural angles as though their very roots are drowning. The vines twitch when no wind passes. This cannot be. If Gasha is to breathe, the jungle must claim the blood it deserves."
 L76_claim_the_jungle_ctt:0 "§oClaw Strength§! (§Y[Root.claw_strength.GetValue]§!) is higher than §MCanvas Strength§! (§Y[Root.canvas_strength.GetValue]§!)."
 L76_claim_the_jungle_effect_tt:0 "Every province in §YZatal§! Area:\n   Lose §R1§! random point of Development.\n   Lose §G30§! years of separatism.\n   Gain §G0.375§! Control.\n   Change §oClaw Strength§! by §Y0.375§!.\n   §YGasha§! loots up to §Y25§! ¤\n"

 L76_shade_of_the_cursed_spire_title:0 "Shadow of the Cursed Spire"
 L76_shade_of_the_cursed_spire_desc:0 "In the shadow of the Cursed Spire of Khaga Yatsa, the pitiful remnants of the first victims of the Blood Curse eke out their meagre existence. The jet-black Gasabi occupy the forsaken no man’s land between the mountains and the Shadow Swamp. Whether it is due to their innate resistance to magic both fair and foul, or the dubious protection of the Cursed Spire, their numbers may have dwindled over the centuries, but still they remain, stubbornly clinging to the accursed soil.\n\nUnlike the Kakhazjari, those arrogant self-proclaimed ‘saviours of lizardkind’, we recognize the bond of kinship between us and the Gasabi, forged by shared ancestry and shared suffering. It is little wonder then, that they are more than amenable to the suggestion of mutual cooperation and protection against the evil emanating from the accursed Shadow Swamp."
 L76_shade_of_the_cursed_spire_effect_tt:0 "\n§Y[Root.GetName]§! loses §Y5§! units in §Y[5971.GetName]§!.\n\n§YYezel Mora§! loses their claim on §Yevery owned province§! of §YGasha§!.\n"

 L76_prophesised_calamity_title:0 "Prophesised Calamity"
 L76_prophesised_calamity_desc:0 "Sykar believed himself to be above us. Set apart by the prophecy of a few naga, by his station as the chosen one, as exalted as it is imaginary, by the illusion of understanding brought to him by Lilteth. Supposedly, she has tried to show him what it means to be an Ashhana, that to face us requires either a depth of empathy or a willingness to abandon mercy entirely.\n\nHe might have listened and might have even understood the words, but how could he ever feel the fiery flow of rot burning through veins, guiding our hands? He has not known the pain it brings, nor the discipline required to endure it, nor the ecstatic clarity that comes when it is finally granted release. We learned long ago that those who name us monsters do so from a position of safety, of ignorance, out of the comfort of a life they could choose for themselves. They speak of restraint because they have never been forced to test its limits."
 L76_prophesised_calamity_effect_tt:0 "Distribute §G10§! £icon_manpower_in_text£ development among owned §YAshhana Lizardfolk§! provinces.\n\n§Y5§! provinces of §YAshhana Lizardfolk§! culture with the highest Development get their §YManpower Building§! upgraded. If no building is present, add §YBarracks§! and if §YTraining Fields§! is, gain §G1§! Base Production and §G1§! Base Manpower in them.\n\nHenceforth, the §Y[Root.Monarch.Dynasty.GetName]§! dynasty will be known as the §YShadowfang§!."

 L76_bad_blood_title:0 "Bad Blood"
 L76_bad_blood_desc:0 "The Blood Curse is never silent. It demands motion and release. Yet many Ashhana choose stillness, foolishly attempting to bind themselves into confederations that dull the pain rather than draw it out. In this stagnant bondage which they confuse with safety, the pressure festers, turning inward and poisoning them in their very marrow.\n\nWe know all too well that such bindings merely smother the drive to lash out against the injustices inflicted upon us, something that might yet save us all. But no matter how tightly they try to shackle their more violent instincts, the Hidden Eyes will always find a way to slip through.\n\nA well-placed whisper here, a carefully orchestrated accident there, and the blood of other Ashhana will be stirred to a boil. If they are made to bleed, the rot will flow out of them, freeing them - and us - from their selfmade prison of futile restraint."
 L76_bad_blood_ctt:0 " §YAshhana Lizardfolk§! countries have a Spy Network of at least size §Y20§! from §Y[Root.GetName]§!."
 L76_bad_blood_first_custom_tooltip_tt:0 "If is NOT employing a §YSpymaster§!:"
 L76_bad_blood_effect_tt:0 "\n[Root.Monarch.GetName] is now §YIntricate Webweaver§!.\n\nEvery §YAshhana Lizardfolk§! country with a Spy Network of at least size §Y20§! from §Y[Root.GetName]§! loses §R50§! Trust with all its allies.\n\nGain §G0.75§! Control for each affected country.\nChange §oClaw Strength§! by §Y0.75§! for each affected country."

 L76_strike_the_bards_title:0 "Strike the Artists"
 L76_strike_the_bards_desc:0 "Zulbur rose to prominence under Relork. A ‘visionary’ king, who would cleanse the world of suffering by allowing the afflicted into his realm of art, a realm he intends to build. His rule is precise, deliberate. He names us mad. Declares the way of the Claw a danger to all Ashhana, and moves to erase what he does not understand with his pleas. He believes this is mercy.\n\nMercy! Mercy from someone who has never known the true Curse! Mercy from someone who rules over the fattest lands, whose ancestors once carved their skin like us, but have moved on to carve the earth. He has not known the weight Gashari carry and he never will. To him, suffering is an aberration to be corrected. We must reclaim our lands which they have taken. We must show Zulbur that our methods are not madness. Everyone shall see what Relork denies - that there is no removing of suffering without first understanding it and living through it.\n\nAnd so we will impart upon him the gift of knowledge, and suffer it he shall."
 L76_strike_the_bards_effect_ei:0 "\n§GEvent Insight§!\nFrom rot and offering, the jungle exhales once more in the measured pause of suffering restrained. The blood of the lost seeps into the roots and nurtures the veins, turning clarity and madness into a cycle of pain that shall reforge the broken into a new form, where they shall finally be whole."

 L76_gashing_wound_title:0 "A Gashing Wound"
 L76_gashing_wound_desc:0 "Through Relork’s legacy, Zulbur became the loudest voice of the Canvas. From the castles they have raised, Relork and his artists have spread their doctrine of measured words, careful reason and absolute inactivity in face of the Curse. Their influence runs deep, their voices shape thoughts of Ashhana in many tribes, not just theirs, stifling all of us with a fragile stillness.\n\nBut they know full well that even the strongest structure, the most beautiful sculpture, has a point of failure. Canvas relies on control, on silence in the face of a storm. Yet such balance cannot endure when struck with force where it is weakest. Pressure builds unseen, cracks form beneath the surface and when they open, they do not close. We will make Zulbur that fracture. We shall make the tribe of Relork the beating heart that shall spread the blood of Claw truth through Ashhana veins."
 L76_gashing_wound_effect_tt:0 "§Y[Root.GetName]§! gains a permanent claim on §YAshhana Lizardfolk§! provinces in the §YTaneyas§! Superregion.\n"

 L76_the_spear_of_agony_title:0 "The Spear of Agony"
 L76_the_spear_of_agony_desc:0 "With the fall of Zulbur, we have uncovered a far more interesting treasure than just easily destroyed sculptures or scattered notes. Among the remnants of the Stonecarver dynasty an unfinished design for a weapon named Khagaaras was uncovered - a surprisingly unfitting trophy for gentle kings like Relork. It was meant to be a tool wrought to pierce even the hardest scale, and to leave behind a pain that does not end with the strike.\n\nThe Stonecarvers never finished the weapon. Was it a lack of funds? Unlikely. A lack of will to do what necessary would have been much more expected from these bardic weaklings. They sought mastery over form, but feared what such a weapon demanded in return. They remained bound by caution, restrained by the limits of flesh and reason. In the end, it led to their city, their whole realm, falling to ruin. Fortunately we do not share their hesitation."
 L76_the_spear_of_agony_ctt:0 "Has §Yexploited development§! of provinces with §YCopper§! or §YIron§! trade goods at least §Y5§! times. (Currently: §Y[Root.gashaExploitedDevelopmentCounter.GetValue]§!)"
 L76_the_spear_of_agony_first_custom_tooltip_tt:0 "If §Y[5996.GetName]§! does NOT have a §YProduction Building§!:"
 L76_the_spear_of_agony_first_effect_tt:0 "§Y[5996.GetName]§! gets their §YProduction Building§! upgraded. If no building is present, add §YWorkshop§!, and if §YCounting House§! is, gain §G2§! Base Production in §Y[5996.GetName]§!.\n"
 L76_the_spear_of_agony_effect_ei:0 "\n§GEvent Insight§!\nFrom death comes life - and from the carcass of Zulbur a ritual weapon is born, melding druidic blood sorceries and shadow rot in a promise of power that shall once and for all allow us to pierce the Canvas’ heart."

 L76_sanctified_slaughter_title:0 "Sanctified Slaughter"
 L76_sanctified_slaughter_desc:0 "The Canvas sought to quiet us, through layering their songs upon our wounds, placing a veil of sounds upon the rotting corpse of curse, believing that stillness might succeed where all else had failed. For a time, some listened. Some believed. But the Curse does not yield to such gentleness. It does not soften. It gathers and demands to be released.\n\nWe have learned what they refused to see. Expression is not found in denying oneself, but in bold action! In the deliberate shaping of what must be done, in stretching the claws out to gather supple flesh underneath them, until the skin gives way and tears, spewing red ichor on the claw that pierced it. Violence, when guided, becomes more than destruction - it turns into the foundation for existence. Each life taken becomes part of a greater whole. Every fang sunken into veins, every death inflicted feeds what must endure. What they call madness, we call salvation, and so the slaughter must continue."
 L76_sanctified_slaughter_effect_ei:0 "\n§GEvent Insight§!\nFrom the carcasses of cities and the veins of the fallen, Ashhana must finally chisel away the rot that clings to our bodies. Each scream shall be made into a stroke upon the canvas of life, breaking the Curse, one macabre picture at a time, until the rot is gone.\n\n§gThe frenzy will cleanse the Blood Curse from every §YAshhana Lizardfolk§! province, its strength amplified by the number of §YAshhana Lizardfolk§! provinces.§!"

 L76_hidden_whispers_title:0 "Hidden Whispers"
 L76_hidden_whispers_desc:0 "The trees are troubled, the fetid pools churn, the land stirs. The curse grows restless, we all feel it in our very bones. The druids gathered within the Shrouded Circle are unanimous in their dire warnings. We need to act, and soon, or invite disaster upon all our heads.\n\nFor the druids, there is a solution, and one solution only: A rite of sacrifice needs to be performed. A single life, freely given, in exchange for the lives of the many. This bloody path is the only way out from under the suffocating weight of the curse. And according to the Circle, it cannot be any willing victim - to save the entire tribe, the leader of the tribe must bleed… or someone close to [Root.Monarch.GetHerHim], bound by ties of blood and passion. The life of a consort for the life of the tribe - is that not a fair exchange?"
 L76_hidden_whispers_effect_ei:0 "\n§GEvent Insight§!\nFrom stillness, an offering - and from an offering, the opening - what was never named is nevertheless given, and in that quiet unmaking the Circle listens, drawing breath from the last exhale to feed a bond where love for another and love for their tribe become one.\n\n§gThe family of Consort might not appreciate it. The rewards will be higher if §Y[Root.Monarch.GetName]§! has an heir as well.§!"

 L76_focus_casting_title:0 "Pact of Wood and Scales"
 L76_focus_casting_desc:0 "We are an indelible part of the land, and the land is rooted deep within us. This bond does not care whether we accept this truth or attempt to ignore it. It simply is. But if our druids were to tap into this primal link, we might well reach an unprecedented level of attunement to the jungles, swamps and wooded hills of our homeland.\n\nWith their magic, we will strengthen this bond until the trees themselves will watch out for our enemies, the roots will trap them, and the lianas will strangle them. We give freely of our blood to feed the soil, and take the sap into our veins in turn... and this way we shall finally gain an edge against those who dare to spoil the jungle with their tainted blood."
 L76_focus_casting_effect_tt:0 "Henceforth, §Y[Root.GetName]§! will not be able to change its capital.\n\nExtend the duration of the current casting of the '§YTransmutation: Longstrider§!' by §Y10 years§!."

 L76_express_the_pain_title:0 "Express the Pain"
 L76_express_the_pain_desc:0 "Some among our more dissolute Zaradyrra brethren may consider our methods as barbaric. The bloodletting, practiced among Gashari since the arrival of our ancestors in these lands, was long considered the purest form of the expression, a rite that cleanses both the body and the spirit. All it requires is a keen mind to withstand the pain and fashion it into a tool to control the Curse within. Something all Ashhana are capable of in principle, but only a determined few can truly master.\n\nIt is time to celebrate this most primal and sacred of our traditions with all the passionate fervor that boils within our blood. Let none gainsay our devotion to this, our most hallowed of rites."
 L76_express_the_pain_ctt:0 "Has celebrated a §YZaradyrra Festival§!."
 L76_express_the_pain_first_custom_tooltip_tt:0 "If §Y[Root.GetName]§! has enacted Government Reform §YFestivals of Blood§!:"
 L76_express_the_pain_second_effect_tt:0 "Enact §YFestivals of Blood§! Tier 3 Government Reform.\n"
 L76_express_the_pain_third_effect_tt:0 "Additional effects of the §YFestivals of Blood§! will be able to be triggered up to §Y4§! times, instead of §Y2§!.\n\nCelebrate a random §YZaradyrra Festival§!."
 L76_express_the_pain_fourth_custom_tooltip_tt:0 "If §Y[Root.GetName]§! does NOT have §Y2 Temples§!:"
 L76_express_the_pain_fourth_effect_tt:0 "Gain §YTemple§! in §Ytwo random provinces§!.\n"

 L76_silence_of_songs_title:0 "Silenced Songs"
 L76_silence_of_songs_desc:0 "These awful sounds - silence them! Can you not see that the songs have failed!? They linger in the air, hollow and without weight, unable to reach what lies beneath, what truly grips our veins and thickens our blood. The Canvas sing about harmony, about balance through sound and stillness, but these are luxuries reserved for those untouched by the terrible burden all Ashhana must carry.\n\n	The Curse does not listen. It does not pause for melody, nor yield to careful chords. It is an indifferent dissonant scream in the ear, the screech of claws scratching over metal. It presses forward, wreaking havoc in our minds, lest we let it out with our teeth and claws. This is the fate of a common Ashhana - a life of trial, not of verse. Our bodies are the only canvas that does not lie and our suffering the only medium that the curse cannot ignore. Where Canvas creates illusion, we confront what is real. It is time for the illusion to dissipate. The silence will speak all the louder."
 L76_silence_of_songs_effect_tt:0 "Gasha gets or extends '§YDruidic Charms§!' for §Y15 years§!, giving the following effects:\nReinforce Speed: §G+23.0%§!\nShock Damage Received: §G-10.0%§!\n§YAffects only Shadow Warrior Regiments§!\n\nGain §G25.00§! Crowns and §G5.00§! Government Reform Progress per owned province with the '§YProvince Razed§!' modifier.\n"

 L76_tear_them_apart_title:0 "Tear Them Apart"
 L76_tear_them_apart_desc:0 "Gasha has no need to break their minds. They are already fractured. The Curse lingers within them, temporarily restrained and forced into stillness by their superstitious adherence to Canvas, but in the end killing them all the same. Look at how their eyes bulge in their skull, look at the pus that flows from beneath their scales, look at their rotten teeth. This is their vaunted control! A broken dam holding black gore that waits to burst open.\n\nThey stand on the edge - it would take so little. A moment of strain. A lapse in discipline. A single cut, physical or mental, placed where it does the most harm. Then the balance collapses and what they have buried rushes forth, burning their insides before it bursts out of their guts as they turn against one another. We do not need to destroy them - let them fall on their own."
 L76_tear_them_apart_ctt_1:0 "All known §YAshhana Lizardfolk§! countries:\n   One of the following must be true:\n      Has been eclipsed by §Y[Root.GetName]§!.\n      Has an army smaller than §Y[Root.GetName]§!."
 L76_tear_them_apart_ctt_2:0 "All known §YAshhana Lizardfolk§! countries have a Spy Network of at least size §Y20§! from §Y[Root.GetName]§!."
 L76_tear_them_apart_ctt_3:0 "§Y[Root.GetName]§! is the only §YAshhana Lizardfolk§! country left."
 L76_tear_them_apart_first_custom_tooltip_tt:0 "If §Y[Root.GetName]§! is the only §YAshhana Lizardfolk§! country left:"
 L76_tear_them_apart_second_effect_tt:0 "Every §YAshhana Lizardfolk§! country with a Spy Network of at least size §Y20§! from §Y[Root.GetName]§! declares war on a random neighbouring country.\nChange §MCurrent Mana§! by §Y10§! for each affected country."

 L76_cold_blooded_title:0 "Unyielding Claw"
 L76_cold_blooded_desc:0 "Some among the Canvas still resist our dominance. They speak of reason, of choice, of other paths yet laying open before us. They believe this is a matter for debate, that we may be swayed from our conviction, discard it and bend to those who mistake our sacred purpose for a butcher’s whim. They do not understand the truth we have inherited from our druids and their connection to the land which has for oh so long suffered alongside us.\n\nIt is not. The Claw is not a choice to be accepted or refused - it is a necessity, paid for in blood. It was learned by our ancestors, endured by us, and it shall be enforced upon our children. For every time the Curse strikes an Ashhana, the Claw is there to rend the rot away. What do the acolytes of the Canvas do with their paintbrushes? Those who understand how we have saved them, have already joined our side. Those who do not will be brought to it in due time. Willingly, if at all possible. There is no alternative to the Claw."
 L76_cold_blooded_ctt:0 "Military Power at least §Y100§!, lowered by §Y25§! for each §Y5§! Army Tradition above §Y30§!."
 L76_cold_blooded_zero_effect_tt:0 "Lose §R-100§! Military Power, lowered by §Y25§! for each §Y5§! Army Tradition above §Y30§!.\n"
 L76_cold_blooded_first_custom_tooltip_tt:0 "If §oClaw Strength§! (§Y[Root.claw_strength.GetValue]§!) is higher than §MCanvas Strength§! (§Y[Root.canvas_strength.GetValue]§!) by at least §Y10§!."
 L76_cold_blooded_first_effect_tt:0 "Extend the duration of '§YHeart-Piercing Roar§!' by §Y10 years§!, for a total of §Y20 years§!.\n"
 L76_cold_blooded_second_custom_tooltip_tt:0 "If §oClaw Strength§! (§Y[Root.claw_strength.GetValue]§!) is higher than §MCanvas Strength§! (§Y[Root.canvas_strength.GetValue]§!) by at least §Y20§!."
 L76_cold_blooded_second_effect_tt:0 "Extend further the duration of '§YHeart-Piercing Roar§!' by §Y10 years§!, for a total of §Y30 years§!.\n"

 #EVENTS
 flavour_gasha.1.t:0 "Give What Must Be Given"
 flavour_gasha.1.d:0 "She was not told what the rite was. They only told her what it was not. Not a punishment, not a death sentence, not a sacrifice - she was only to listen, only to stand beside the Seer in the heart of the jungle, where the air is thin and attentive. Her scales are painted in a thin coat of ash as she continues her uneasy steps through the soft mire, trudging through the half-drowned earth. Amidst the squelch of her feet, the light seeping through the canopy above withdraws without urgency.\n\nShe feels seen. Observed by eyes. Dozens. Hundreds. Thousands. No. There could not be this many eyes in such a small clearing, could there be? One of them has just blinked - the feeling subsides. Yes. She must hide, but where? In the circle, she can feel it - this is where this terrible feeling will pass, the circle protecting her from the otherworldly eyes that track her every movement. And so she steps into the middle and drops to her knees, feeling only the eyes of the Seer upon her.\n\nHer ears gradually notice a slow chant that begins to fill the air. The voices speak of balance, but what is weighed? They speak of a burden, but who is to carry it? Each word coils like a venomous snake on her back. Finally, silence. Silence? No, that feels wrong - she screams, she knows that she screams, yet her ears are deaf to it. She can see her jaw open, she sees the red liquid that is gathered there, yet there is no sound! How could there be sound, where there is no air, only liquid? The air of the jungle clearing is sticky, like honey or blood. She struggles to catch a breath, but then the Seer comes closer, opening her jaws, allowing the air to finally enter her fully. In the eyes of her husband, she finally finds a moment of respite as she inhales. He closes his eyes and whispers…"
 flavour_gasha.1.a:0 "“Believe me: this, too, is love,” as he snaps her neck."
 flavour_gasha.1.b:0 "“Believe me: this, too, is love,” as he snaps her neck."

 flavour_gasha.2.t:0 "The Burden Made Flesh"
 flavour_gasha.2.d:0 "The jungle breathes again. It inhales shallowly, raggedly - the air sticking to the clotted blood in its lungs. The canopy rises and falls like a ribcage grown too tight to allow the lungs to properly expand. We tore its roots from Zatal’s grip, fed the earth their blood, yet the rot did not leave. It lingers, sunk deeply into the soil, the roots drink the accursed rot in desperate search for relief and the cycle of pain begins anew. The jungle is not cleansed - it is merely quieter in its suffering.\n\nJust the same, it coils in our veins, thick and slow, pressing against the walls of rigid scales until the body strains  to contain it. The ritualistic cuts of the druids barely produce any liquid - the red ichor drags along their scales, clings to their robes. In some, it pulses as though it has its own will, gathering in the caruncle and soaking up the colour of their eyes, leaving them white as bone with crimson veins marking the twitching eyes. That is the sign when Gashari know an Ashhana has been lost to the Curse.\n\nThis rot must be driven out, for the jungle’s, for Gasha’s and for the sake of all Ashhana. Some of the druids already feel the clarity of their mind being taken away. Their blood is too thick, too dark, their presence sours the air. They bow their heads and offer themselves, already half-lost to the swelling madness. When they breathe, it rattles in their chest. When they stand still, their fingers twitch, as though remembering violence not yet done. A willing sacrifice. A few ready to embrace the Curse so that many may yet live."
 flavour_gasha.2.a:0 "For those who come after."
 L76_flavour_gasha_2_tt:0 "Gain §G+0.375§! control and §Y+0.375§! §oClaw Strength§! when §Yrazing§! a province.\n\nWhenever §Y[Root.GetName]§! §Yrazes§! a province, a §YShadow Warrior§! unit will appear in §Y[Root.Capital.GetName]§!, up to §Y10§! per §YGovernment Rank§! of §Y[Root.GetName]§!.\n"
 L76_flavour_gasha_2_1_ctt:0 "If §Y[L80.GetName]§! current Ruler is §YRelork I Stonecarver§!:"
 L76_flavour_gasha_2_2_ctt:0 "\nIf §Y[L80.GetName]§! does NOT exist:"


 flavour_gasha.3.t:0 "Idax the Formidable"
 flavour_gasha.3.d:0 "The urban cysts that have sprung up like fungi decomposing a carcass within the picked-clean remains of Zulbur evoked within the Gashari a contradictory mix of virulent contempt and gnawing curiosity. These calcified tumors of stone and rot cling like parasites to the jungle, their streets filled with throngs of people moving like sluggish lifeblood, carrying both raw materials and finished goods with them. Within one of the last workshops still remaining in the eviscerated remnant of one such city shattered by our advance, one of the craftsmen rose to meet with the Seer and the Shadow Circle.\n\nKnown as Idax the Formidable, he has known about the plans of giving birth to the Shadow Spear, Khagaarsa, since the time when it was still the desire of the Stonecarver lords of Zulbur, long before our claws ever tore into the flesh of Relork’s tribe and wrested away the designs for this weapon. The spear itself appeared no different from its more common kin, a staple of Ashhana weaponry - long shaft designed to hold enemies at a distance, crowned with a narrow, needle-like blade meant to slip between the scales and sever artery and sinew with obscene ease. Simple, tested, efficient. Yet such seeming simplicity quickly proved to be just a thin skin over the purulent boil of malignancy that was swelling within the crude marrow of the original Zulburan concept, as the druids layered the spear with their enchantments mixed with the umbral seepage that our Gasabi kin had drawn from beyond the Divide."
 flavour_gasha.3.a:0 "We shall eagerly await your weapon, craftsman."

 flavour_gasha.4.t:0 "The Spear of Pain"
 flavour_gasha.4.d:0 "The shaft of the spear is hewn from the crimson trees found at the very edge of Gasha, where the Divide casts its shadow over the land. It is uneven, swollen with knots that pulse faintly beneath the surface. Idax warns against smoothing them – when cut, the wood wept thick scarlet blood and strings of blackened pus seeped forth, as though the tree still lived and resisted the blade. The grip is slick, never fully dry. At its tip rests a long, narrow blade. It does not gleam, it devours light instead. Its jagged edges bloom outward into thorn-like barbs, each one turned toward the nearest living target. The carvings along its surface are not etched cleanly but bitten into the metal. When held, the weapon feels… eager.\n\nThe Shrouded Circle calls for a test, and so in a clearing, not far from where the spine of the weapon was cut, a captive is brought forth. A sculptor from Zulbur, who drove a chisel through his wife’s skull – Bloodcursed, broken. His eyes are milk-white, veined through with crawling threads of red that twitch when he breathes and prevent his eye lids from closing when he blinks. Three druids bind him to a tree with living vines that tighten with every movement.\n\nThe Seer lifts Khagaarsa. For a moment, nothing moves. Then the spear shifts. The thorns along its edge turn, all aligning toward the bound body, quivering as though scenting blood beneath skin. The spear drives forward. The blade slips through scale and flesh without resistance. It sinks too deep, too easily – deeper than its length should allow. For one blessed moment, lasting if a single breath, the clearing is silent. Then the screaming begins.\n\nIt does not come from the mouth alone. The sound tears free from the wound, from the stretched flesh around the blade, from the air itself. It is wrong, wet, cacophonous, as the body itself is screaming from places that have no voice. The captive’s jaw hangs slack, yet the cry only grows louder. Finally, the body collapses, yet the screaming does not end. Even as the Seer pulls the spear free, the sound continues, dragged behind the blade like torn sinew. The mouth of the sacrifice fills. The wounds fill. The sound drowns out everything else, becoming thicker, bubbling, yet never ceasing."
 flavour_gasha.4.a:0 "The scream could be heard for three days and three nights."
 flavour_gasha_4_a_tt:0 "Overrunning enemy armies will give them '§YTerrified by Khagaarsa§!' for §Y1 year§!, giving the following effect:\nMorale Damage Received: §R+10.0%§!"

 flavour_gasha.5.t:0 "The Rift Deepens"
 flavour_gasha.5.d:0 "The Canvas fear us. What once lingered as a festering discord has split open into a suppurating wound that refuses to clot. Their officials abandon their posts like organs shutting down one by another, fleeing the cities as if escaping a body already dead, while the artists - those who once painted the ritual masks and carved the stories of the Ashhana into their scales - now refuse to serve the adherents of the Claw. Their pigments dry into useless scabs, their knives turn dull, unwilling to give form to what they perceive as nothing but slaughter.\n\nIn the villages, the infection spreads without restraint. Mobs of Canvas faithful, turned by waywards bards and other artists surround the adherents of Claw, and there, amidst the choking dust or in the torrential rain of the jungle, stone them during their self-serving flagellations, depriving those in pain the release of self-inflicted suffering, rupturing their skin and shattering bones as the Ashhana descend into cannibalistic frenzy once more. Their every strike echoes the throbbing sound of the Blood Curse in one’s mind, the sound of the teeth grinding within a jaw too vast to comprehend.\n\nPerhaps there was a time when the followers of Canvas and Claw could have lived alongside each other, but the hour of reckoning is fast approaching. Any semblance of mutual understanding has been irrevocably undone as we have stripped away the last thin veneer that separated coexistence from conflict. Thus the only language left between Claw and Canvas is that of rupture and consumption, of descent into a bloodshed that will leave neither side untouched - for whatever emerges from this carnage will no longer resemble what it was before."
 flavour_gasha.5.a:0 "Then so be it."
 flavour_gasha_5_a_tt:0 "§RShould the 'Canvas' revolt, they will not go down easily!§!"

 flavour_gasha.6.t:0 "Salvation in Bloodshed"
 flavour_gasha.6.d:0 "The streets of cities are no longer streets - they are open arteries, flowing with the thick, dark ink of the Curse, and we are the surgeon’s blades. Every blow, every pound of meat beneath our claws, every scream torn from the throats of the defeated is a scraping of rot from the flesh of those who resisted, a shaping of the Ashhana mind towards clarity. Claw warriors drag the Canvas devotees through avenues slick with gore; their bones crack like brittle roots, their blood a thick paste smeared across the beaten dirt. The air trembles, saturated with the sound of tearing sinew and the metallic tang of obsession.\n\nOn the stages, songs have been replaced by the wrenching of teeth and snapping of joints. Instruments are twisted into weapons, tools to strip away the lingering stains of madness. Artists hang from their own creations, strings around their necks, limbs pinned and contorted in macabre display, their bodies turned into exhibition pieces, grim symbols of the all-consuming might of the Blood Curse. The bodies convulse, blood pouring black as night, leaving hollow shells free of the Curse’s rot.\n\nBeyond the city, the jungles wait with shallow, ragged breath. Claws move with precision, possessed by a shared pulse - skewering, slashing, tearing - each act scraping the Curse from Ashhana veins and pouring it into the soil. Roots coil and drink the accursed ichor, writhing like tongues tasting bitterness, until they wither and decay; yet from their ruin, new roots emerge, nourished and reshaped by the clarity stolen from suffering. The screams of the dying suffuse the air as madness and blood are beaten together into a pulp of meat, bone, and scales from which a stronger body shall be forged.\n\nIn the temples, statues topple and relics grind to dust under ichor-spattered claws. Mothers claw at the corpses of their children in ecstasy, while fathers kneel in broken adoration. Every strike, every sob and scream feeds the collective mind and soul of the Ashhana, until at last the Blood Curse is scraped, filed, hammered into submission. In a heart-piercing roar of a thousand cacophonous voices, Taneyas feels the final effect of the schism: after centuries of suffering, our blood-stained teeth release a groan of relief. The Curse is torn to a million pieces, shredded by our claws."
 flavour_gasha.6.a:0 "REJOICE TANEYAS! AT LONG LAST, THE ASHHANA ARE HEALED!"
 flavour_gasha_6_tt:0 "Gain §R100§! devastation in every §YAshhana Lizardfolk§! province.\n\nEvery §YAshhana Lizardfolk§! province gets '§YSalvation in Bloodshed§!' until the end of the §YAge of Unraveling§!, giving the following effect:\nLocal Unrest: §G-20.00§!\nLocal Manpower Modifier: §G+50.0%§!\nMonthly Devastation: §G-4.00§!\nLocal Prosperity Growth: §G+4.00§!\n\nRemove '§YReligious Zeal§!' from every owned province."

 flavour_gasha.7.t:0 "Fear Deepened the Schism"
 flavour_gasha.7.d:0 "Terror has done what their hollow debates never could - it has driven the Canvas out of their rotten holes, stripped of pretense, scrambling like animals that finally understand they are prey. They flee their artisanal workshops in the black of the night, abandoning their precious works, because they know now that the Claw of Gasha does not stop, does not tire and does not spare.\n\nFear has hardened them. They are desperate. The artists who devoted themselves to depicting life now clutch at their broken tools, at jagged scraps of their own craft, as if splintered chisels could hold back the redemption that comes to free all Ashhana! They fight frantically, their panicked movements wild, their resolve brittle. They are little more than tchoken left to be slaughtered. Yet, we cannot deny that these particular tchoken have sharp teeth. Their fear made them dangerous, just like any cornered beast thrashes before the blade falls. They strike harder now, faster, but it is a wasted effort, the last spasm of a corpse with its head already separated from the body."
 flavour_gasha.7.a:0 "This will only prolong their suffering!"

 flavour_gasha.8.t:0 "Rending the Canvas Apart"
 flavour_gasha.8.d:0 "Brother against brother, father against son. The battle rages, tearing bodies apart, gnawing on them and grinding the flesh that remains into the mud. The Canvas whimper their lies, choking on talk of a ‘Realm of Art’ while they pick up their weapons and use them to slash the throats of their kin. They wrap themselves in the illusion of grace, but beneath it? They are no different, them and us, only made softer by complacency and therefore easier to break.\n\nThere is no place in our hearts for calm. Only fury, raw and uncontained. It claws at the inside of the skull, it floods the veins and it drowns out any thought until all that remains is the need to tear, to rent asunder, to scream into their intestines the truth their ears would never accept. They brought this upon us! They brought us to this edge and asked us to stand on the precipice, until its sharp edges had sliced into our feet, and then they had the temerity to laugh at us! They are the true architects of the Ashhana’s downfall!\n\nBut if we all are meant to fall, we will fall with our hands inside them, ripping, crushing, refusing to release them even as the last breath leaves us. If the Ashhana are meant to die, we shall die together, we shall lose having unmade them, leaving nothing but butchered remains and jungles of Taneyas echoing with the pained screams of our Ashhana kin!"
 flavour_gasha.8.a:0 "You were the cause of it all, Canvas. Suffer the consequences!"
 flavour_gasha_8_a_tt:0 "Casting another §YWar Magic§! spell will remove this one."

 flavour_gasha.9.t:0 "Death of Expression"
 flavour_gasha.9.d:0 "One by one, their strongholds collapse. Walls are split, banners are torn down and trampled into the mud, sanctuaries gutted and left to smolder like opened carcasses. Their fall is inevitable; Claws overwhelm them like a rising tide of blood that no song, no plea, and no trembling hand of an artist can ever hope to turn aside. Their bodies are chewed through by the terror that now rules their minds.\n\nThey know what awaits them. They have heard the screams that do not end. They know what ‘mercy’ means to us. They stopped fearing death long ago. It is not the end they fear now, but what writhes, what howls, and what refuses to let them walk over the last threshold for so long that their minds are left broken, before their heart stops pumping blood.\n\nAnd so they gather what little courage remains. With shaking hands and hollow, sleepless eyes, they take up their arms once more - the last semblance of the life under the bane of the Curse they cannot let go of. Their voices crack when they try to sing; the notes are thin and strangled, already choked by the weight of what is coming.\n\nThey know they cannot win. But if their ‘Art’ must die, if their voices must be torn from them, then they will drag out their last moment across the world like a wound and force it to remember. Remember the few Ashhana who painted their pain upon the carcass of their society - the last stroke of a brush, a last scream. Truly, in the end the followers of the Canvas have finally managed to produce something truly beautiful."
 flavour_gasha.9.a:0 "After all, all art blossoms in the face of death."
 flavour_gasha_9_tt:0 "§Y[L87.GetName]§!: Get §Y12§! units of Infantry and §Y4§! units of Cavalry in §Y[flavourGasha9spawnprovince.GetName]§!."

 flavour_gasha.10.t:0 "Our Armies Fear Khagaarsa!"
 flavour_gasha.10.d:0 "The last remnants of the army that faced Gasha have returned. They do not march - they stumble, hollow-eyed, their gazes fixed on something that is no longer there. Fear clings to them like a second skin.\n\nThey tell of a spear, carried by the leader of the Bloodied Ashhana - long and dark. They say it swallowed the light around it, and that when it was raised, the drops of blood clung to it formed vicious, thirsty barbs.\n\nThey say the dead did not fall. Thousands stood where they had been struck, their bodies locked in place in grotesque stillness - twisted and bent, some arched backward as though trying to escape their own flesh. Each one impaled on their own shadow and blood. The most terrifying thing, however, was the sound - an unending cry, seeping from mouths, from wounds, from beneath the armour. Thick with blood, wet and bubbling, it did not stop even when everything else on the field of battle fell silent. Even as the survivors fled, the sound followed them."
 flavour_gasha.10.a:0 "They say it is still with them."
 flavour_gasha_10_a_tt:0 "Due to §Y[From.GetName]§! overrunning our armies:"

 #MODIFIERS
 L76_bloody_jungle:0 "Bloody Jungle"
 L76_bloody_jungle_desc:0 "To outsiders, the Gashari jungle is a wound that devours. In the darkness, where the canopy seeps gore, at the Seer’s will, roots lash, branches tear, and sharp leaves mark the prey. Be careful when entering the jungle, for the jungle hunts with Gasha."
 L76_claiming_the_cursed_spire:0 "Claiming the Cursed Spire"
 L76_claiming_the_cursed_spire_desc:0 "The superstitious naga long barred the Ashhana from Kaga Yatsa. With the Kakhazajar traitors cast down, we have seized the Zatsarya at last - and shall bend its power to our will."
 L76_desperate_resolve:0 "Desperate Resolve"
 L76_desperate_resolve_desc:0 "The Claw were once thought extreme, yet what has taken root in Gasha is something far worse. Our stand against them is not a mere civil war, but a desperate attempt to contain the madness. To fall to them is not merely to suffer death - it is to be unmade, and for the fate of all Ashhana to be forfeit."
 L76_druidic_charms:0 "Druidic Charms"
 L76_druidic_charms_desc:0 "Those who bear the Blood Curse into battle are not yet lost. They are kin - daughters, brothers, parents - willing to sacrifice their lives to protect their loved ones. Covered in protective druidic charms, it is only the power of these tokens that hold them at the edge, delaying the moment when rage consumes all that remains and leaves but an empty, burned-out husk."
 L76_heart_piercing_roar:0 "Heart-Piercing Roar"
 L76_heart_piercing_roar_desc:0 "The roar of an Ashhana shatters more than just the silence - it breaks the will of the weaklings who dare to defy the Shrouded Circle. With the Claw ascendant, even those who once bowed their head before the Canvas will serve the Seer."
 L76_khagaarsa:0 "Khagaarsa, the Shadow Spear"
 L76_khagaarsa_desc:0 "Forged by Idax the Formidable, Khagaarsa is a barbed spear full of hunger that is not its wielder’s. Those struck by it feel their body momentarily tense up around the wound, as if their blood is clotting immediately. As they try to open their mouth to draw breath, a terrifying cry of pain leaves instead. Even death does not bring relief. Their mouths gape, their throats fill, yet the screaming does not end - it seeps from every tear in the flesh, wet, bubbling, and endless, long after the heart has stilled."
 L76_pain_into_weapons_1:0 "Pain into Weapons"
 L76_pain_into_weapons_1_desc:0 "Our Druids stand on the edge, their veins swollen with the Curse, thoughts fraying at their edges. They are the greatest bane and the greatest boon in our relentless fight against the other Ashhana and the Curse itself. Some of them break, their madness shaped. Their pain is drawn in tight, honed, aimed in the direction we point. As their last act of sacrifice to their tribesmen, they transform the ruinous Curse that grasps their mind into a knife we use to skin the rot off the bark."
 L76_pain_into_weapons_2:0 "Pain into Weapons"
 L76_pain_into_weapons_2_desc:0 "Our Druids stand on the edge, their veins swollen with the Curse, thoughts fraying at their edges. They are the greatest bane and the greatest boon in our relentless fight against the other Ashhana and the Curse itself. Some of them break, their madness shaped. Their pain is drawn in tight, honed, aimed in the direction we point. As their last act of sacrifice to their tribesmen, they transform the ruinous Curse that grasps their mind into a knife we use to skin the rot off the bark."
 L76_pain_of_the_jungle:0 "Pain of the Jungle"
 L76_pain_of_the_jungle_desc:0 "The jungle cries - loud enough to split the skull. We must answer. Sharpen claw and prepare the spells. Those of the Canvas who would deny the release of rot will be broken, or bled until they understand the futility of their resistance."
 L76_salvation_in_bloodshed_mod:0 "Salvation in Bloodshed"
 L76_salvation_in_bloodshed_mod_desc:0 "The rivers of [This.GetName] stopped running, thick and choked with blood and offal until the ground softened and swallowed what we spilled. We tore each other open without pause, claw and tooth and blade, until the flesh could not part anymore and a flux of ichor doused the dark hunger of the jungle. The silence was shattered with the bodies tearing themselves open, with the juices flowing outwards until, at last, the screaming fell away, and for the first time, there was space to breathe. The Curse recoiled - it bled out."
 L76_shock_and_awe:0 "War Magic: Rip and Tear"
 desc_L76_shock_and_awe:0 "We can only have one §YWar Magic§! spell active at a time! Casting another §YWar Magic§! spell will remove this one."
 L76_take_what_must_be_taken:0 "Take What Must Be Taken"
 L76_take_what_must_be_taken_desc:0 "A Life for a life - so the jungle demands. The Seer has given what was closest, and the roots drank deeply. And from that offering, a font of cloying power burst forth. Our druids now hear more than whispers, they hear the harmonious hum of the powerful magic. Regret festers, but from it, power seeps."
 L76_terrified_by_khagaarsa:0 "Terrified by Khagaarsa"
 L76_terrified_by_khagaarsa_desc:0 "The stories of Khagaarsa spread faster than we could have ever suspected. Soldiers falter before the battle begins, their courage rotting away into dread. They do not fear death - they fear what awaits them after the barbs hook into the body and rend it apart, when the screaming does not end."

