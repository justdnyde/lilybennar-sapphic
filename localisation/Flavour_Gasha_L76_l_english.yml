 #MISC
 NO_CAPITAL_MOVE_GASHA:0 "The only seat of power for the §Y[Root.Monarch.GetTitle]§! of §Y[Root.GetName]§! is one inside of our Jungle."
 until_great_project_upgrades:0 "until the Great Project is upgraded"
 until_the_end_of_agony_of_expression:0 "until the end of the §YAgony of Expression§!"
 until_its_done:0 "until it is done"
 L76_shock_and_awe_restore_mana:0 "Winning at least §Y10§! battles while the spell is active will refund §M25§! Mana (Currently: §Y[Root.ripAndTearBattlesWon.GetValue]§!/§Y10§!)."
 war_as_art_gasha:0 "War as Art"
 war_as_art_gasha_desc:0 "What is art? The first Ashhana who discovered art could clear their mind of the blood curse did so by listening to a bard and their music. Others have branched out into painting or sculpting. But those are far too narrow a definition. Anything whose existence is more than utilitarian and whose purpose extends to aesthetics can be seen as art. Even the act of battle itself can be found artistic expression."
 rally_to_the_roar_gasha:0 "Rally to the Roar"
 rally_to_the_roar_gasha_desc:0 "The Ashhana will perish if the other lizardfolk ever unify enough to drive us out of our homes. The roar is not just a physical bellow, but a cry for the Ashhana people. We go to war, and every crocodile must play their part."
 L76_pain_into_weapons_upgrade_tt:0 "Upgrade the '§YPain into Weapons§!', giving the following effects:\nYearly Corruption: §G-0.10§!\nAvailable Loot: §G+25.0%§!"
 L76_pain_into_weapons_removal_tt:0 "Remove the '§YPain into Weapons§!'."
