 DLC_missions_H07_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Bagcatir
 missions_H07_desc:0 "This country has a custom mission tree"
 LANDING_missions_H07_TEXT:0 "Bagcatir remembers the tyrant state of Drisleak, and their rebellion from it. Imagine their rage, then, when the descendants of Drisleak came demanding their submission! As the only republic in Eordand, explore beyond your shores, form an Eordan League, and proclaim the guidance of the Moon Republic over Eordand!\n\n§YDesigner§! and §YCoder§!: Glatux\n§YWriters§!: Glatux, Alaska, Carpe Verpa"
