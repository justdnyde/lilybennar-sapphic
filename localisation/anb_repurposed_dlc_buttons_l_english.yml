 LANDING_race_cave_goblin_TEXT:0 "The primary race determines who is leading the country's §yAdministration§!. "
 LANDING_race_cave_goblin_FLAVOR_TEXT:0 "Goblins are a short and numerous §ySubterranean§! race originating from the caverns of the Serpentspine Mountains. They are exceptionally crafty and use their plots and schemes against their orcish enslavers and against dwarves, their ancestral enemies. Their cunning and ingenuity gives goblins an affinity towards §yArtificery§!."
