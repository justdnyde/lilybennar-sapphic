 DLC_missions_Y10_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Yingzhen
 missions_Y10_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y10_TEXT:0 "The League of Yanszin is dying, and the Sinistral Chamber will kill it. Unite the cities through corruption, theft, and knives. Form a dark brotherhood over Yanshen, expand the Chamber, assassinate any that dare speak out, master The Path with the Oni, and blanket Yanshen in shadow. Nothing is true, everything is permitted, and nobody is safe.\n\n§YDesigner§!: Combustionary"
