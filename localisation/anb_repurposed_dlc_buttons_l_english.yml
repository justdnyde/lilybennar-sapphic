 DLC_missions_S50_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" # Yemotaferi
 missions_S50_desc:0 "This country has a custom mission tree"
 LANDING_missions_S50_TEXT:0 "The Swamp Wardens are doing what they can to bring their country back from the brink of ruin. They must clean up the mess left by Tamrat the Terrible, restore the friendship with the Tanizu tribes, and shore up their defences against Yezel Mora. Yemotaferi is in for a long struggle against the Hag Coven that will take the nation to a dark place.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Rokade"
