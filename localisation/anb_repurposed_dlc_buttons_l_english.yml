 missions_S98_desc:0 "This country has a custom mission tree"
 LANDING_missions_S98_TEXT:0 "The jungles of the Dao Nako are filled with dangerous creatures and legendary monsters. Who better to tame this wilderness than its original inhabitants? Their sponsors back in Fahvanosy expect Bibyobi to merely prepare the ground for the triumphant return of the Vyzemby to the mainland. But what if these plucky halflings were to defy all expectations and build an empire that stretches from Fangaula to Horashesh and Fahvanosy?\n\n§YDesigner§!: pbednar14\n§YCoder§!: pbednar14, Raist\n§YWriter§!: pbednar14, Jeck"
