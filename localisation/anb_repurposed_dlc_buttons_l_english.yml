 DLC_missions_U18_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Re-Uyel
 missions_U18_desc:0 "This country has a custom mission tree"
 LANDING_missions_U18_TEXT:0 "Navigate the turmoil left behind by the Decades of Devastation as Bulwar's youngest republic. Rule the waves with your nimble galleys and establish a ruling elite of military officers and lower nobility. Will you listen to the hidden societies of the Old Sun Cult, retain the status quo as the New Sun Cult, or be convinced by the mercenaries preaching the ways of Jaddar? Integrate various races of Bahar depending on your choice and establish a wealthy republic for all.\n\n§YDesigner§!: Amanda"
