 LANDING_missions_V25_TEXT:0 "Adjudicators of the Heart of Khantaar, Hus Bhal has found itself under attack by the Faceless Queen herself! Destroy her warband, take over the rest of the Khaantari, deal with the facestealer threat, and form Baztungh Khayus!\n\n§YDesigner§!: Iceytheknight\n§YCoder§!: TheForsaken\n§YWriter§!: Jeck"
