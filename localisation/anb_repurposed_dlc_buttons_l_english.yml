 DLC_missions_caamas_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_caamas_desc:0 "This country has a custom mission tree"
 LANDING_missions_caamas_TEXT:0 "The Caamas are the seafaring peoples of Eordand, and their traders are well-known. Explore far-reaching shores and bring home your lost cousins. Call upon Summer’s waves and claim hegemony over Eordand.\n\n§YDesigner§!: Jhorgas"
 LANDING_missions_caamas_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_peitar_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_peitar_desc:0 "This country has a custom mission tree"
 LANDING_missions_peitar_TEXT:0 "The Domandrod Fey declared that the Eordan peoples must hold to the doctrine of seasonal neutrality. Although the rest of Eordand now worships one season above all others, the Peitar have never faltered. Restore equilibrium and claim hegemony over Eordand.\n\n§YDesigner§!: Jhorgas"
 LANDING_missions_peitar_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_selphereg_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_selphereg_desc:0 "This country has a custom mission tree"
 LANDING_missions_selphereg_TEXT:0 "The Spring Court rallies against Arakeprun - Elchos rebels and repeats history, while Kaincal explores across the seas. Bring forth Spring’s bounty and claim hegemony over Eordand.\n\n§YDesigner§!: Jhorgas"
 LANDING_missions_selphereg_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_snecboth_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_snecboth_desc:0 "This country has a custom mission tree"
 LANDING_missions_snecboth_TEXT:0 "The Hibernal Crusade almost destroyed the Snecboth. Almost. But now, at the Winter Court’s most fragile point, there is division. Immarel seeks destruction, while others seek unity. Restore Winter’s tranquility and claim hegemony over Eordand.\n\n§YDesigner§!: Jhorgas"
 LANDING_missions_snecboth_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_tuathak_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_tuathak_desc:0 "This country has a custom mission tree"
 LANDING_missions_tuathak_TEXT:0 "With the breaking of the Hibernal Crusade and the fall of Dorcurt, the Autumn Court is wracked by chaos. As the old heartlands are torn between Dorcurt's successors, the new crusader states scramble to take up the fight with Winter once more. Illuminate Autumn’s warmth and claim hegemony over Eordand.\n\n§YDesigner§!: Jhorgas"
 LANDING_missions_tuathak_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_dotimism_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_dotimism_desc:0 "This country has a custom mission tree"
 LANDING_missions_dotimism_TEXT:0 "These are generic Boek religion missions intended to function in lockstep with the religious mechanics. Solve riddles displayed in their description and apply said riddles to the religion in order to gain special bonuses!\n\n§YDesigner§!: Wishpupper"
 LANDING_missions_dotimism_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_cannorian_kobold_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_cannorian_kobold_desc:0 "This country has a custom mission tree"
 LANDING_missions_cannorian_kobold_TEXT:0 "Divided against your own kind, beset by dangers on all sides, the kobold tribes seem destined to fail. Through clever use of your Kobold Traps and boundless tenacity, unite the tribes, adopt and perfect the gnomish art of Artificery, and embark on a globe-spanning adventure to answer the question that has tormented kobolds for a thousand years: where have the dragons gone?\n\n§YDesigner§!: Lexperiments\n§YCoders§!: Mati, Lexperiments\n§YWriters§!: Lexperiments, Archsteel, Dragonchef"
 LANDING_missions_cannorian_kobold_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_dwarven_adventurer_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_dwarven_adventurer_desc:0 "This country has a custom mission tree"
 LANDING_missions_dwarven_adventurer_TEXT:0 "“Yesterday, we passed another nameless hall. A young one asked if this had been home to their fathers, and none of us could answer. We have been exiled for so long that even our memories have long gone. May the ancestors bring us to our holds, lest we dishonor them any further.” - Unknown Scribe\n\n§YDesigner§!: Hehodas"
 LANDING_missions_dwarven_adventurer_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_escanni_adventurer_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_escanni_adventurer_desc:0 "This country has a custom mission tree"
 LANDING_missions_escanni_adventurer_TEXT:0 "Restore a realm founded in the chivalric Escann of old, or forge a new destiny and claim a new mantle as a new nation founded by Adventurers, for Adventurers.\n\n§YDesigner§!: Hehodas"
 LANDING_missions_escanni_adventurer_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_escanni_goblin_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_escanni_goblin_desc:0 "This country has a custom mission tree"
 LANDING_missions_escanni_goblin_TEXT:0 "Far from home and free at last, the goblins will need to use every trick and tool available to them if they are to beat both adventurers and orcs.\n\n§YDesigner§!: Lizstar"
 LANDING_missions_escanni_goblin_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_escanni_orc_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_escanni_orc_desc:0 "This country has a custom mission tree"
 LANDING_missions_escanni_orc_TEXT:0 "Disunited and distrustful of one another after the demise of Korgus, the Orc clans of the Greentide must now choose what their future holds. Will they settle down, and build a great Orcish kingdom in their new homeland? Will they continue on the legacy of Korgus? Or will they falter, and be cast aside to be forgotten by the harshness of reality?\n\n§YDesigner§!: Brosur"
 LANDING_missions_escanni_orc_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_vyzemby_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_vyzemby_desc:0 "This country has a custom mission tree"
 LANDING_missions_vyzemby_TEXT:0 "The Vyzemby are a people divided. The Great Family “Nakavy Avo,” have become estranged. Reunite the family, reclaim their shrines, or accept new gods from the world beyond. Restore Kolo’s throne as one of the Amezetany. Fulfill the prophecy of the Kolovadoy, and realize the dream of Vyoronsi. Or, dream of a united Fahvanosy as one of the Fomarati or Mboala nations. Bring the island together, by any means necessary. Or become rich off the clove trade and build eastern ties with the Rinta Seekers as the Mazava.\n\n§YDesigner§! and §YCoder§!: Marie\n§YWriters§!: Scamp, Marie"
 LANDING_missions_vyzemby_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_ghankedhen_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_ghankedhen_desc:0 "This country has a custom mission tree"
 LANDING_missions_ghankedhen_TEXT:0 "In Ghankedhen, family is everything. A family of herders. A family, uniting many tribes. And a family... industrializing, and bringing the smell of coal-smoke to all Rahen?\n\n§YDesigner§!: Biegeltoren"
 LANDING_missions_ghankedhen_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_raghamidesh_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_raghamidesh_desc:0 "This country has a custom mission tree"
 LANDING_missions_raghamidesh_TEXT:0 "Build a coastal naval empire of trade, defending yourself from inland brutes through massive fortifications. Substitute gold for monarch power, for parliament bribes, and tour Haless and Sarhal constructing flagships based on the features of different regions. In the end, all business is your business.\n\n§YDesigner§! and §YWriter§!: Indi\n§YCoder§!: Bonbonny"
 LANDING_missions_raghamidesh_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_ghavanaj_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_ghavanaj_desc:0 "This country has a custom mission tree"
 LANDING_missions_ghavanaj_TEXT:0 "The Elephant Tribes have been broken and subjugated ever since the fall of the Black King. They tend their herds, and keep their secrets close. But if they could be united, none of Rahen could stand before their charge.\n\n§YDesigner§!: Biegeltoren"
 LANDING_missions_ghavanaj_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_undergrowth_goblin_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_undergrowth_goblin_desc:0 "This country has a custom mission tree"
 LANDING_missions_undergrowth_goblin_TEXT:0 "Dominate the warring clans to prove your worthiness to rule, open the gates to the outside (to exploit them of course), and revel in the great bounty of the Tree of Stone!\n\n§YDesigners§! and §YCoders§!: Astera, Redfurs\n§YWriters§!: Vainfire, Sanctuary"
 LANDING_missions_undergrowth_goblin_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_xiaken_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_xiaken_desc:0 "This country has a custom mission tree"
 LANDING_missions_xiaken_TEXT:0 "The Command approaches, threatening all Haless. For the myriad monasteries of Xianjie, ancient martial institutions and temples both, the philosophy of war has suddenly proven all-too-real. Lead the monks of Xianjie against the Command, then build a state in accordance with the cultivation of chi.\n\n§YDesigners§!: Astera, Drained Augustus\n§YCoders§!: Bonbonny, Drained Augustus\n§YWriters§!: Altonym, Drained Augustus"
 LANDING_missions_xiaken_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_shuuvush_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_shuuvush_desc:0 "This country has a custom mission tree"
 LANDING_missions_shuuvush_TEXT:0 "A race against the clock! Unite the Shuvuush people and raze your neighbours to the ground, receiving greater rewards the faster you do so! Can you lead your people to a new destiny? How about 3 different destinies? How about 3 different destinies in only 26 years?\n\n§YDesigner§!: Everest\n§YCoder§!: Bonbonny\n§YWriter§!: CaptainTsech"
 LANDING_missions_shuuvush_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_fathide_ogres_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_fathide_ogres_desc:0 "This country has a custom mission tree"
 LANDING_missions_fathide_ogres_TEXT:0 "Expand the city's Kelaktar, forge alliances with fellow vassals, and raise the warbanners to become the new lord of the ogres!\n\n§YDesigner§!: Creekj"
 LANDING_missions_fathide_ogres_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_wild_ogres_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_wild_ogres_desc:0 "This country has a custom mission tree"
 LANDING_missions_wild_ogres_TEXT:0 "Reject the south's chains.\nEmbrace the Hunger.\nRise as the 8th clan.\nEat, and perhaps the Gorger Lord will notice.\n\n§YDesigner§!: tsunami-san"
 LANDING_missions_wild_ogres_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_centaur_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_centaur_desc:0 "This country has a custom mission tree"
 LANDING_missions_centaur_TEXT:0 "The winds of change blow over the steppes: bend with the incoming storm and adapt, proving your valor as a Caehn, gaining the respect of the clans, and embarking on a path to unite centaurkind.\n\n§YDesigner§! and §YWriter§!: Imacop42\n§YCoders§!: Fireshark, Imacop42"
 LANDING_missions_centaur_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_triunic_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_triunic_desc:0 "This country has a custom mission tree"
 LANDING_missions_triunic_TEXT:0 ""We, the people of the Triunic Lakes, agree to henceforth join together as the Lake Federation to bind our republics closer together for the greater good."- Preamble to the Lake Federation Founding Document, 1444.\nThe incursion has been defeated, peace and unity have won as a new Federation forms. But unity is a fragile thing, and one that must be tested. Will petty disputes over religion and wealth doom the federation to its ancient roots, or will democracy prevail? Only time can tell.\n\n§YDesigner§!: Hehodas"
 LANDING_missions_triunic_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_primal_harimari_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_primal_harimari_desc:0 "This country has a custom mission tree"
 LANDING_missions_primal_harimari_TEXT:0 "Return to the old ways when the harimari were strong. Prove your strength against the powers of modern Haless. Spread new harimari communities and put the humans in their place. From the Cradle of Harimar, unite the Harimraj by force so that the harimari will remain on top, forever.\n\n§YDesigners§!: Cappadocia, Biegeltoren\n§YCoders§!: Bonbonny, Biegeltoren\n§YWriters§!: Cappadocia"
 LANDING_missions_primal_harimari_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_AYN_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_AYN_desc:0 "This country has a custom mission tree"
 LANDING_missions_AYN_TEXT:0 "For centuries the once-prosperous lands of the Djinn Ardimya lay in ruins, desecrated by the Qeyikul demons who now plunder her lands. Left to die in the annals of history will these tribes face extinction by the demons? Or will they bring about a new Jinnakah and with it the second age of Genies\n\n§YDesigner§! and §YCoder§!: Rynrock\n§YWriters§!: Rynrock, Gumcube"
 LANDING_missions_AYN_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_iochand_TOOLTIP_INSTANT:0 "§YGeneric Custom Mission Tree§!"
 missions_iochand_desc:0 "This country has a custom mission tree"
 LANDING_missions_iochand_TEXT:0 "Once, the Kingdom of Iochand stood as the only Gnomish monarchy in the whole of Halann. Its tragic fall made a wonderful play, but perhaps a new ending can be written. Bring together its two successor states, unite Lencenor and the Dragon Coast under a single banner, establish a great realm in Aelantir, claim the legacy of Lorenan the Great and force the whole of Cannor to use Gnomish names. Maybe it would make a good comedy?\n\n§YDesigner§!: Trin\n§YCoders§!: Trin, Fahes\n§YWriters§!: Astrofeesh, Cappadocia"
 LANDING_missions_iochand_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

  ##############
  # Unique MTs #
  ##############

 DLC_missions_A01_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Lorent
 missions_A01_desc:0 "This country has a custom mission tree"
 LANDING_missions_A01_TEXT:0 "Lorent—a rose swaying in the winds of destiny, sown by Lorenan the Great, graft of two stems human and elven, blooming from the blood of martyrs. Elf Ioriel pruned her branches; Lilac Wars sharpened her thorns. Finally, as the moon sets, the rose blooms in full splendor! Punish the faithless traitors, reclaim the heritage of ancestors, explore the lost homeland of a thousand years past. Let the northern eagle bow beneath her petals, let the Dove Throne be imbued with her fragrance, let her pollen drift between Aelantir and Anbennar! On the land of the rose, the sun never sets!\n§YDesigner§!: Runehawk"
 LANDING_missions_A01_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A02_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Deranne
 missions_A02_desc:0 "This country has a custom mission tree"
 LANDING_missions_A02_TEXT:0 "Upon the western shores of Lencenor stands a lone light against the tyranny of the rose. Let your knights strike down the pretenders upon the Ruby Throne and usher in a new spring for Lencenor. Sail the seas as the old blood once did, and dominate the seas with your Behemoths. Let all trade flow into Westport as the true City of World's Desire, and see the world tremble before the bloom of the Seaflower.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: DulyDuck"
 LANDING_missions_A02_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A04_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Wesdam
 missions_A04_desc:0 "This country has a custom mission tree"
 LANDING_missions_A04_TEXT:0 "As the last remnant of the Silver House of Silmuna, Wesdam stands at a crossroads. Do you follow in your ancestors' footsteps and seek to reforge the Grand Duchy of Dameria, once broken by your forefathers, in your own image? Or do you turn west instead to Lencenor, and seek to achieve what Vincen and Adénn Silmuna could not - a Silmuna upon the Lorentish throne?\n\n§YDesigner§!: Hehodas"
 LANDING_missions_A04_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A05_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Reveria
 missions_A05_desc:0 "This country has a custom mission tree"
 LANDING_missions_A05_TEXT:0 "Time has not been gentle to the Kingdom of Reveria. With their recent defeat they have seen their north lost, yet there is still time to save the last true son of the Reavers. Reclaim your land and more, unite the Dragon Coast, expel the Kobolds and integrate the Gnomes - forge a great Reaver Technocracy. Embrace your reaver heritage, and the ways of old. Expand and raid overseas, claim the old Reaver Kingdoms of Cannor and form a powerful Crown capable of bringing a new age of Black Ice.\n\n§YDesigners§! and §YCoders§!: Batavi, TheForsaken\n§YWriter§!: Jared"
 LANDING_missions_A05_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A06_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Nimscodd
 missions_A06_desc:0 "This country has a custom mission tree"
 LANDING_missions_A06_TEXT:0 "The gnomes of Nimscodd celebrate their recent victory in the mainland, as it marks the first step of a very overly complicated plan to restore the Great Hierarchy. Fight the Kobolds and the Reavers, rebuild the Dragon Coast and restore the (elevated) seat of gnomish power. Cross the seas to a lost land and use artificery to dominate a new age of knowledge.\n\n§YDesigner§!: Hoia"
 LANDING_missions_A06_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A11_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Pearlsedge
 missions_A11_desc:0 "This country has a custom mission tree"
 LANDING_missions_A11_TEXT:0 "Dominate the West Dameshead, rule the Empire and explore overseas.\n\n§YDesigner§!: RubedoFox"
 LANDING_missions_A11_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A12_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Beepeck
 missions_A12_desc:0 "This country has a custom mission tree"
 LANDING_missions_A12_TEXT:0 "As the last free Halfling realm of Cannor, rise to the cause of freedom! Build up your strength inside the Empire. Ally either Lorent or Gawed to fight the other, only to betray them in the end. Dominate Damesear trade and use the money to fund your wars to free the Halflings, proclaiming a new Small Country!\n\n§YDesigner§!: Vjmdhzgr"
 LANDING_missions_A12_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A13_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Gawed
 missions_A13_desc:0 "This country has a custom mission tree"
 LANDING_missions_A13_TEXT:0 "The great eagle of the north, Gawed remains as one of the last bastions of Cannor free from elvenization. Unite the Alenics, break the Dragon Coast and push into Escann to end your rivals once and for all.\n\n§YDesigner§!: Aeriic"
 LANDING_missions_A13_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A15_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Eilísin
 missions_A15_desc:0 "This country has a custom mission tree"
 LANDING_missions_A15_TEXT:0 "In the wake of Lorent’s downfall, a new rose rises. Eilisin, lead by a young wine lady, sees to reforge Lencenor into her image. Break the old throne, reclaim a lost kingdom and use magic to dominate Western Cannor.\n\n§YDesigner§!: Wishpupper"
 LANDING_missions_A15_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A16_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Wineport
 missions_A16_desc:0 "This country has a custom mission tree"
 LANDING_missions_A16_TEXT:0 "Reform your league into a great commonwealth of cities, unite the Winebay under your accord and learn about the great world of wine-making as you expand your collection. Travel across the seas, dominating the markets of Aelantir and Sarhal in search of all the flavors the wine world has to provide.\n\n§YDesigner§!: Wishpupper, TheForsaken"
 LANDING_missions_A16_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A17_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Great Ording
 missions_A17_desc:0 "This country has a custom mission tree"
 LANDING_missions_A17_TEXT:0 "The last vestiges of a time of old, Great Ording seeks to reform the high kingdom of Enteben and bring forth the restoration of great chivalry. Fight the titan, forge alliances, hunt unicorns and restore an era long gone.\n\n§YDesigner§!: Wishpupper"
 LANDING_missions_A17_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A18_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Rubenaire
 missions_A18_desc:0 "This country has a custom mission tree"
 LANDING_missions_A18_TEXT:0 "Through diplomacy and clever play, claim the Rose Throne for yourself. Unify your domain, set out to conquer the Damesear and reclaim your title as the Crossguard.\n\n§YDesigner§!: Runehawk"
 LANDING_missions_A18_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A21_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Venáil
 missions_A21_desc:0 "This country has a custom mission tree"
 LANDING_missions_A21_TEXT:0 "Venáil has rarely bothered with the affairs of the mainland. While many realms dream of an empire, the elves of this island dream of returning to their ancient homeland in the lost continent to the west. Make a landing and ready your people for the voyage to a continent of many opportunities – and even more paths for you to choose.\n\n§YDesigner§!: Hehodas"
 LANDING_missions_A21_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A22_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Neckcliffe
 missions_A22_desc:0 "This country has a custom mission tree"
 LANDING_missions_A22_TEXT:0 "At their lowest point, rebuild the remnants of the Imperial Navy and see to claim your place as the absolute naval authority of the empire.\n\n§YDesigner§!: Fine sil Silorial"
 LANDING_missions_A22_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A23_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Vertesk
 missions_A23_desc:0 "This country has a custom mission tree"
 LANDING_missions_A23_TEXT:0 "Trapped between Gawed and the Empire, Vertesk seeks to reclaim what they have lost, though said claim might be greater than first thought. Lay waste to the kingdom of the Eagle, unite the Alenics and restore the great Dominion - a realm of dark magic funded by brutal slavery.\n\n§YDesigner§!: Alectron"
 LANDING_missions_A23_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A24_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Westmoors
 missions_A24_desc:0 "This country has a custom mission tree"
 LANDING_missions_A24_TEXT:0 "For centuries, the Westmoors have been subjugated under the shackles of Gawedi rule, but that time is ending. Plot a rebellion, form your own kingdom, and deal with the only thing Moormen hate more than the Gawedi; themselves! Afterwards, explore and colonize across the seas, expand the clans, and destroy Gawed in a war to become the true undisputed Kingdom in the North!\n\n§YDesigner§! and §YWriter§!: Enkelados\n§YCoder§!: PotatoArt"
 LANDING_missions_A24_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A29_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Busilar
 missions_A29_desc:0 "This country has a custom mission tree"
 LANDING_missions_A29_TEXT:0 "Unite Businor, destroy your rivals and dominate Southern Cannor. Expand overseas and form a transcontinental empire.\n\n§YDesigners§!: Maverick, Kittenlord"
 LANDING_missions_A29_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A30_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Wex
 missions_A30_desc:0 "This country has a custom mission tree"
 LANDING_missions_A30_TEXT:0 "The Lilac Wars are over, and Wex stands victorious. Take control of the Empire of Anbennar, strip the Moon Party of their electorships and grant them to your Rose Party allies, and achieve Lothane's dream of a Wexonard dynasty upon the Dove Throne forevermore. Wex must rule. You will make it so.\n\n§YDesigner§!: RubedoFox"
 LANDING_missions_A30_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A31_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Moonhaven
 missions_A31_desc:0 "This country has a custom mission tree"
 LANDING_missions_A31_TEXT:0 "As the safe haven of Moon Elves in Anbennar, help build up the imperial elven communities. Build up alliances to secure your stronghold in Cannor and then set sail to the seas in search of your ancestral homeland. Seek new tea plants across Aelantir and expand your trade network into Sarhal. Rediscover an ancient infusion lost to time.\n\n§YDesigners§! and §YCoders§!: Alectron, TheForsaken"
 LANDING_missions_A31_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A32_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Ibevar
 missions_A32_desc:0 "This country has a custom mission tree"
 LANDING_missions_A32_TEXT:0 "The Elfrealm of Ibevar has long clung to the ancestral practice of worshipping their forebears, but this is soon to be undone. A decree has been made: to religiously integrate with Cannorian society. Reform your state, your military, and your diplomacy, with the goal of proclaiming Greater Ibevar.\n\n§YDesigner§!: Hehodas"
 LANDING_missions_A32_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A33_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Verne
 missions_A33_desc:0 "This country has a custom mission tree"
 LANDING_missions_A33_TEXT:0 "Twenty years ago, innumerable adventurers and knights left to fight alongside the Marcher Lords and fend off the Greentide. As they now return home, the Vernmen hear the greatest call to arms any can receive: The call to Adventure! Cement Verne's standing in the Empire, restore the order of Wyvernriders and embark on great adventures across the world! Answer Corin's call, lead a new crusade and bask in the glow of a Corinite Halann!\n\n§YDesigner§! and §YCoder§!: Walthorn\n§YWriters§!: Altonym, Takasaki, Potatoemann, Atlas"
 LANDING_missions_A33_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A35_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Konwell
 missions_A35_desc:0 "This country has a custom mission tree"
 LANDING_missions_A35_TEXT:0 "The great house of knowledge of the wider Empire, Konwell sees to forge a modern Esmaria, ruled fairly.\n\n§YDesigner§!: Zarathaya"
 LANDING_missions_A35_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A38_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Anbenncóst
 missions_A38_desc:0 "This country has a custom mission tree"
 LANDING_missions_A38_TEXT:0 "Unite the Damesear, secure the crossings and build a new republican Dameria. Earn your title as the city of world’s desire.\n\n§YDesigner§!: Hoia"
 LANDING_missions_A38_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A39_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Bennon
 missions_A39_desc:0 "This country has a custom mission tree"
 LANDING_missions_A39_TEXT:0 "Take the reins of Bennon in their quest to reclaim their ancestral legacy. Unite the hills of central Cannor and revive the ancient culture that once inhabited them. Restore the kingdom of Havoral and rise as the greatest realm in the Empire. Empower the Havoric Knights to create an unstoppable army of knights. As the homeland of Corin, embrace her as the leader of the Court and become her most loyal follower.\n\n§YDesigner§!: Truill"
 LANDING_missions_A39_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A40_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Exwes
 missions_A40_desc:0 "This country has a custom mission tree"
 LANDING_missions_A40_TEXT:0 "As one of the few neutral princes during the Lilac wars, unify the Small Country under Silcalas rule, create a tolerant realm where halflings and humans stand as equals, reform your rugged fishermen into a professional marine corps, and transform the Dameshead into a Silcalas lake.\n\n§YDesigner§!: RetrogNGXII"
 LANDING_missions_A40_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A45_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Istralore
 missions_A45_desc:0 "This country has a custom mission tree"
 LANDING_missions_A45_TEXT:0 "As Dameria's rightful heir, seek justice for the Lilac wars. Avenge the Wexonard betrayal and retake the throne of the Empire - for Dameria and Corin.\n\n§YDesigners§! and §YCoders§!: Liv, Silva Darkmoon\n§YWriters§!: Liv, Silva Darkmoon, ragingrage"
 LANDING_missions_A45_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A46_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Arbaran
 missions_A46_desc:0 "This country has a custom mission tree"
 LANDING_missions_A46_TEXT:0 "The great northern march of the empire. Take the reins of the realm of Arbaran and forge them into a powerhouse of military and trade. Unify with Damescrown, lay waste to Gawed and conquer your way to the Giant’s Grave. Claim the throne of Exwes and take hold of all the great castles build by your great ancestor. Develop your homeland and embrace your heirdom as a home for the Elves.\n\n§YDesigner§!: Spor-Menjek"
 LANDING_missions_A46_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A47_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Eborthíl
 missions_A47_desc:0 "This country has a custom mission tree"
 LANDING_missions_A47_TEXT:0 "Eborthil rules the waves! Use deft diplomacy to defeat your mainland enemies and build up your island into an unbreakable bastion. Expand overseas and dominate the seas across the world.\n\n§YDesigner§!: Runehawk"
 LANDING_missions_A47_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A48_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Sugamber
 missions_A48_desc:0 "This country has a custom mission tree"
 LANDING_missions_A48_TEXT:0 "As Sugamber, prevent your throne from falling into the hands of a foreign dynasty. Ally with the Gnolls in your realm to form a powerful legion, capable of helping you dominate the borders and enforce the will of the Salt Lion!\n\n§YDesigner§!: Zarathaya"
 LANDING_missions_A48_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A49_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Xanzerbexis
 missions_A49_desc:0 "This country has a custom mission tree"
 LANDING_missions_A49_TEXT:0 "The hill gnolls are a shattered visage of their former glory. Help to reforge the old kingdom and bring prosperity to Businor. watch the development of significant mercenary bands, some of immense fame. Create a gnoll megalopolis, eventually flooding your overpopulation into Cannor. Create and innovate using the naturally crafty nature of the hill gnolls. Achieve rapid economic growth through wyvern ranching. Deal with internal strife, factionalism and religious turmoil.\n§YDesigner§!: Aardvark\n§YCoder§!: Dadevo\n§YWriters§!: SecretClader, Wilyape, ProfessorCurly"
 LANDING_missions_A49_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A55_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Menibór
 missions_A55_desc:0 "This country has a custom mission tree"
 LANDING_missions_A55_TEXT:0 "After the collapse of Dameria, the lands of the Luna were left to fend for themselves. As a Luna River Minor, weave a web of influence and Sway the Empire to your side. Every move, however small, has a purpose. Hear this, adventurous Menibor - do not go gentle into that good night! A dream lies in your future, a dream of unity. Of Pashaine. And later… of Blackpowder.\n\n§YDesigner§! and §YCoder§!: LVT\n§YWriters§!: altonym, LVT"
 LANDING_missions_A55_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A57_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Toarnen
 missions_A57_desc:0 "This country has a custom mission tree"
 LANDING_missions_A57_TEXT:0 "On a night like any other, the nobles of Toarnen came together to party, yet what none knew beforehand was the words a drunken countess Adelaíde would speak, for on that night she proclaimed that her duchy shall become the new Roilsard. Take the reigns of an aspiring thorn seeking to build a new homeland for her people, putting her enemies in check in the process.\n\n§YDesigner§!: Ratractac"
