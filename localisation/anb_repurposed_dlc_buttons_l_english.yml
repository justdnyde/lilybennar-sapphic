 missions_U17_desc:0 "This country has a custom mission tree"
 LANDING_missions_U17_TEXT:0 "Standing between two worlds lives Crathanor. As the only Regent Court nation in Bulwar, they will become the middlemen between east and west, syncretizing Castellos and Surael, and becoming the trade hegemon of the Divenhal. Reform your republic, establish Sister Republics throughout Bulwar, and enlighten the world with your trade hegemony!\n\n§YDesigner§! and §YCoder§!: Hydro\n§YWriter§!: Enkelados"
