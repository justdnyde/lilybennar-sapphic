 DLC_missions_Y16_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Jiantsiang
 missions_Y16_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y16_TEXT:0 "Long entrusted as the guardian of the northern frontier of Yanshen, we have been brought low by the failings of the Eunuchs. Reclaim our land, tame the steppe, and bring the Eunuchs to heel. We shall bring the Undying Flame to the rest of Yanshen and order to those who would reject it. Will it be a flame of peace? Or a flame of ruthless purification? Finally, will we find answers to the mysteries of the temples? Of the fate of Harimar himself?\n\n§YDesigner§!: Rethall"
 LANDING_missions_Y16_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y17_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Gushuokguan
 missions_Y17_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y17_TEXT:0 "A supposed backwater that yearns to liberate their kin. Long stomped on by warlords who care for nothing but their bottom line and their own indulgences, the end of the warlord era must come. Unite the people, the mercenaries and the estates and forge a democracy for the warrior, by the warrior, of the warrior!\n\n§YDesigner§! and §YWriter§!: Memegraaf\n§YCoder§!: Meander"
 LANDING_missions_Y17_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y20_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Feiten
 missions_Y20_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y20_TEXT:0 "Feiten is home to ambitious merchant princes and ingenious inventors, who turn to the seas to gain what their austere homeland does not provide. Follow their explorations, marvel at their clever artificery, and join them as they conquer the very skies with their airships!\n\n§YDesigner§!: Zarathaya"
