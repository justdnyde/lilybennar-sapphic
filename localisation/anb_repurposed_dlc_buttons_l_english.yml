 DLC_missions_Y15_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Beikdugang
 missions_Y15_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y15_TEXT:0 "Having always stood in the shadow of Tianlou, Beikdugang must reverse this paradigm if it wishes to survive the twin threats of Tianlou and Danggun. Radical ideas must be implemented for the sake of survival, with our ties to the treasure fleets from afar and our brave explorers out east both bringing in the wealth needed for our state to prosper.\n\n§YDesigners§!: Ditto, TheForsaken\n§YCoders§!: Ditto, FreshBOB\n§YWriter§!: Cappadocia"
