 missions_U20_desc:0 "This country has a custom mission tree"
 LANDING_missions_U20_TEXT:0 "The last elven king of Azka-Sur sacrificed his life to stall the advance of the Gnollish hordes. It is up to his human successor to protect the realm and restore the sacred order in the whole of Bulwar and beyond. Shelter the light of the Chosen, cooperate with the dwarves of Segdihr, claim the legacy of the legendary Emperor Barid, and create a new path for the half elves of Bulwar.\n\n§YDesigner§!: Attalus"
