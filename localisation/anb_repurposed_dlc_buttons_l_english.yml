 DLC_missions_S45_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" # Huugeta
 missions_S45_desc:0 "This country has a custom mission tree"
 LANDING_missions_S45_TEXT:0 "Take control of the Blood-Spur mercenary company and their state Huugeta. Sell your sword to anyone who'll pay to grow wealthy and powerful. Crush your rivals and the friends who abandoned you and show your pompous neighbours how you derive legitimacy from violence.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Rokade"
