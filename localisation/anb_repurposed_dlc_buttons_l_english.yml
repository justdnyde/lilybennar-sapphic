 DLC_missions_S53_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Averilibet
 missions_S53_desc:0 "This country has a custom mission tree"
 LANDING_missions_S53_TEXT:0 "While the latest Tanizu migration into Madriamilak ended nearly 300 years ago, Averilibet still holds on to many of their traditions. If the rest of Madriamilak is to learn and fall under the rule of our Queendom they must also learn them. To do so we will use our great games, and our many husbands from all corners of Sarhal to teach them to the rest of the Mengi.\n\n§YDesigner§! and §YCoder§!: N'wah\n§YWriters§!: Bojnik434, Dark Powder, N'wah"
 LANDING_missions_S53_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_S57_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Shelokmengi
 missions_S57_desc:0 "This country has a custom mission tree"
 LANDING_missions_S57_TEXT:0 "The breadbasket of Sarhal sees a new king rise. But at the tender age of 15, the nobility hold the real power, or so they think. For Ayufar II is a ruler bent on a path of unity, of longevity, of grain. And Ayufar is not one to bow to his own retainers.\n\n§YDesigner§! and §YCoder§!: Queensabre\n§YWriters§!: Enkelados, Polenball"
 LANDING_missions_S57_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_S61_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Ibekisedara
 missions_S61_desc:0 "This country has a custom mission tree"
 LANDING_missions_S61_TEXT:0 "For centuries Ibekisedara has defended Amilak’s domain from its mountain fortress. But now it has become clear that in order to truly preserve His order, we must go on the offensive, rooting out evil and spreading the Sky Domain faith, sword in hand. We will sweep south and east, converting the Dakinshi and Tanizu and shall cement our control with chains of faith and grain.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Parkor"
 LANDING_missions_S61_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

