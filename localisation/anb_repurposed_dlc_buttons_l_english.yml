 missions_H08_desc:0 "This country has a custom mission tree"
 LANDING_missions_H08_TEXT:0 "Centuries ago, Pelodan Oathsworn swore to defeat the Seasonalist heretics. He may have failed, but his descendants have never forgotten that oath. As the one true Champion of the Fey, set out to finally fulfill that destiny.\n\n§YDesigner§!: Jhorgas"
