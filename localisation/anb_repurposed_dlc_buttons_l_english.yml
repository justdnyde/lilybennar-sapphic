 LANDING_race_lizardfolk_ashhana_FLAVOR_TEXT:0 "Lizardfolk are a proud and industrious race from the jungles of Sarhal. They are somewhat isolated from the rest of Halann, mistrusting both other races and one another. They vary greatly in appearance, ranging from lithe and dextrous to hulking and crocodilic. However, they all share scaly hides tough as armor, and claws that serve as natural weapons."

 #troll
 DLC_race_swamp_troll_TOOLTIP_INSTANT:0 "§YTroll Primary Race§!"
 LANDING_race_swamp_troll_TEXT:0 "The primary race determines who is leading the country's §yAdministration§!. "
 LANDING_race_swamp_troll_FLAVOR_TEXT:0 "Trolls are a ravenous type of giantkin known for their regenerative abilities, their large ugly noses, and, for males, their great, tusked maws. The species is highly adaptable to a great many environments, and accordingly, many regions have their own ethnic group of trolls, even if most trolls are solitary or live in small groups. Their morality is completely alien and makes them especially unpredictable."

