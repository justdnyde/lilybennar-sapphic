 #dwarven
 DLC_race_adventurer_dwarf_TOOLTIP_INSTANT:0 "§YDwarven Primary Race§!"
 LANDING_race_adventurer_dwarf_TEXT:0 "The primary race determines who is leading the country's §yAdministration§!. "
 LANDING_race_adventurer_dwarf_FLAVOR_TEXT:0 "Dwarves are a short and sturdy §ySubterranean§! race known for their great beards, stubbornness, and skill in metal and stone work. Original builders of the underground holds found in the Serpentspine, many dwarves over the millennia have made homes across the surface. This is due to the decline of their ancient empire, Aul-Dwarov, and the fall of many holds at the hands of orcs, goblins, and dwarven pride.\n\nDwarves are §yLong-Lived§! and have a lifespan of around §y200§! years."
