 DLC_missions_A62_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Telgeir
 missions_A62_desc:0 "This country has a custom mission tree"
 LANDING_missions_A62_TEXT:0 "Ousted from their ancestral home in the Alenic Reach, the still wealthy house of Vanbury managed to stake a new claim for themselves with their iron foundry in the County of Telgeir. Lead the ambitious Vanburies on a campaign to consolidate their corner of Esmaria, then push northward through Damescrown to the Kingdom of Gawed, retaking the throne that was taken from your line centuries ago.\n\n§YDesigner§!: gaspl\n§YCoder§!: Aeriic\n§YWriter§!: Jaybean"
 LANDING_missions_A62_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A72_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Arannen
 missions_A72_desc:0 "This country has a custom mission tree"
 LANDING_missions_A72_TEXT:0 "As the great Marquis of the east, rise to the reign of Arannen and unite the borders under a crown powerful enough to challenge the Dove Throne.\n\n§YDesigner§!: Runehawk"
 LANDING_missions_A72_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A73_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Silverforge
 missions_A73_desc:0 "This country has a custom mission tree"
 LANDING_missions_A73_TEXT:0 "It has been over 1,300 years since work first began to construct a dwarven hold in the Havoral Divide, stymied by a lack of resources and a chaotic diplomatic landscape. But in recent decades, a young inventor known as Grun Strongbellow has proposed a novel mining technique that might finally provide the materials needed. However, the devastation of the Fourth Lilac War and the Greentide have sunk hope to a new low. Right the wrongs of the Lilac Wars and find the means to complete the first new hold since the Day of Ashen Skies.\n§YDesigner§!, §YCoder§!, and §YWriter§!: Balgar's Apprentice"
 LANDING_missions_A73_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A75_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Gisden
 missions_A75_desc:0 "This country has a custom mission tree"
 LANDING_missions_A75_TEXT:0 "Save Gisden from their upcoming demise, build up the county and choose to style yourself a Marquis of Arannen – or find something else in the darkness of old to claim.\n\n§YDesigner§!: Ravanal"
 LANDING_missions_A75_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A77_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Orda Aldresia
 missions_A77_desc:0 "This country has a custom mission tree"
 LANDING_missions_A77_TEXT:0 "As the last knights to surrender in the Lilac Wars to the usurper Lothane sil Wex, rebuild your crumbling order and regain legitimacy as the Imperial Bodyguard, serving the Emperor you once fought against. Protect the Empire and confront a bloodthirsty kingly threat rising in Corvuria. Finally, lead a rebellion of second sons against the gluttonous imperial families.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Atlas"
 LANDING_missions_A77_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A81_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Giberd
 missions_A81_desc:0 "This country has a custom mission tree"
 LANDING_missions_A81_TEXT:0 "Unite the riverlands of Esmaria under the technocratic leadership of cute lil gnomes and convince the empire that artificery is the way! Develop, progress, drill, explode, shine, gnome, study, cube, gnome, cube, gnome.\n\n§YDesigner§!: Doje\n§YCoder§!: Tritone\n§YWriter§!: Xris"
