 DLC_missions_A87_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Saloren
 missions_A87_desc:0 "This country has a custom mission tree"
 LANDING_missions_A87_TEXT:0 "Reunite the Roilsard people as the last vestige of the old county, born of a marriage between the families of yore, with hope for the future placed wholly in the young couple!\n\n§YDesigners§!: Spor-Menjek, AvatarOfKhaine"
 LANDING_missions_A87_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A88_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Woodwell
 missions_A88_desc:0 "This country has a custom mission tree"
 LANDING_missions_A88_TEXT:0 "Race against the clock in order to secure the rule of your heir before foreign ambitions take the throne! All the while, druids wait and plot in the background, leading you towards a kingdom long lost: Carneter.\n\n§YDesigner§!: Iceytheknight\n§YCoders§!: Civi, Iceytheknight\n§YWriters§!: Enkelados, Iceytheknight"
 LANDING_missions_A88_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A90_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Seinathíl
 missions_A90_desc:0 "This country has a custom mission tree"
 LANDING_missions_A90_TEXT:0 "Hear the call of Seinathíl and their bardic songs. Fight wars together with your allies to give them great buffs. Forge new alliances and explore new songs. Form the Seinacourt and unite the Empire diplomatically.\n\n§YDesigner§!: Lizstar"
 LANDING_missions_A90_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A93_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Estallen
 missions_A93_desc:0 "This country has a custom mission tree"
 LANDING_missions_A93_TEXT:0 "As Estallen, break Leslinpar and unite Esmaria under your crown.\n\n§YDesigner§!: RubedoFox"
 LANDING_missions_A93_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A95_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Themarenn
 missions_A95_desc:0 "This country has a custom mission tree"
 LANDING_missions_A95_TEXT:0 "The former seat of power in Esmaria faces difficult times; having lost its monarch during the closing chapters of the Lilac War, the realm must rally its allies in the Moon Party and unite them in order to protect Esmaria - while also doing the legacy of Drosten River Reaver proud by re-establishing the Duchy of Cann Esmar, connecting Lake Themarenn to the Sea, and choosing the patron goddess that will bless the land for centuries to come. Only then can Themarenn claim its rightful place as the true inheritor of the Grand Duchy of Esmaria!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Civi"
 LANDING_missions_A95_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_A99_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Varainé
 missions_A99_desc:0 "This country has a custom mission tree"
 LANDING_missions_A99_TEXT:0 "A nation for those who love experimentation, Varaine seeks to dominate the art of potion crafting. Using artificery and resources from across the world, create and perfect various potions, in the process becoming a home for the many races you seek to study.\n\n§YDesigner§!: Arieriel"
 LANDING_missions_A99_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B02_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Corintar
 missions_B02_desc:0 "This country has a custom mission tree"
 LANDING_missions_B02_TEXT:0 "Though Corin may be gone, her followers remain. Reorganize her circle into an Order in her name, fight off the remnants of the greentide and unite Escann under a holy empire. Embrace the cause of Corinism and make her word answered across the lands, for she is the one and only ruler of the Court!\n\n§YDesigner§! and §YCoder§!: asdsfsgshsjk\n§YWriters§!: asdsfsgshsjk, ragingrage"
 LANDING_missions_B02_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B04_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Order of the Ashen Rose
 missions_B04_desc:0 "This country has a custom mission tree"
 LANDING_missions_B04_TEXT:0 "Ousted from Lencenor on the grounds of atrocities committed during the course of the Fourth Lilac War, the Order of the Ashen Rose now strives to make a new home in the lush fields of Southern Escann. Shackling Orcish slaves as punishment for the Greentide, the Order establishes a new kingdom, Rósande, in a land of wine plantations and a strong aristrocratic society. But there may be consequences to leading a slaver-aristocracy over a people...\n\n§YDesigner§! and §YCoder§!: DulyDuck\n§YWriters§!: Jeck, PS2Turtle, Wilyape, Jbe"
 LANDING_missions_B04_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B07_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Sons of Dameria
 missions_B07_desc:0 "This country has a custom mission tree"
 LANDING_missions_B07_TEXT:0 "Dameria has been destroyed, and her successors scattered to the winds. But all is not lost, for the Damerian Silmunas yet survive in Escann! Take charge of the Exiles, under the command of Rogier the Young Owl, and reclaim your ancient homeland. With it, claim the title that has always been the domain of the House of Silmuna: Emperor of Anbennar. As those who cast down the Grand Duchy and usurped the Dove Throne will soon find out, revenge is a dish best served cold.\n§YDesigners§!: Gilly, Wishpupper\n§YCoder§!: Gilly\n§YWriters§!: Gilly, Loyal Subject of Silmuna, ragingrage, Chronologic"
 LANDING_missions_B07_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B10_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Small Fellows
 missions_B10_desc:0 "This country has a custom mission tree"
 LANDING_missions_B10_TEXT:0 "Blood is, in the literal sense, life. Embark on a journey alongside the Newfoot halflings to discover all the meanings of that phrase. Empower the guild of Chloromancers to deal with the Crimson Deluge. Choose your leaders based on who bakes the best pie. Give to Halann, and see just how much it can give back.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: JellyCow"
 LANDING_missions_B10_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B11_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Company of the Thorn
 missions_B11_desc:0 "This country has a custom mission tree"
 LANDING_missions_B11_TEXT:0 "Live life as a maniacal, egotistical Dracula who just wants to make the world burn. Personally.\n\n§YDesigner§! and §YCoder§!: Chronologic\n§YWriters§!: Mr. Paperbugs, Perceval, TestAccount31"
 LANDING_missions_B11_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B12_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Brave Brothers
 missions_B12_desc:0 "This country has a custom mission tree"
 LANDING_missions_B12_TEXT:0 "Slighted by the Duke of Verne, the Brave Brothers set out to get their due with their own hands. Alas, their new realm was founded in the Greatwoods, infested by werewolves, hags and other monstrosities. Driven to the brink, in Wyvernheart the mages rose to the occasion. Establish a kingdom of magic and bioalchemy, create the perfect engineered soldiers and unite Escann under the control of the mightiest mages Cannor has to offer.\n\n§YDesigner§! and §YCoder§!: Walthorn\n§YWriters§!: Walthorn, Kineticman, Georgius Agricola, AvatarOfKhaine, Crushita"
 LANDING_missions_B12_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B13_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Stalwart Band
 missions_B13_desc:0 "This country has a custom mission tree"
 LANDING_missions_B13_TEXT:0 "Though Dookanson was slain, monsters abound in Cannor. But these monsters are not greenskins; they are the puppeteers, the slavers, the oppressors. This will not stand. Ride out with the stoic adventurer-knights of Stalbór to banish the lords of darkness, bring unity to Escann's divided south, and slay the monster of prejudice, building a true Army of Halann in the process!\n\n§YDesigner§! and §YCoder§!: Nilsoop\n§YWriters§!: Jeck"
 LANDING_missions_B13_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B14_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Raven Banner
 missions_B14_desc:0 "This country has a custom mission tree"
 LANDING_missions_B14_TEXT:0 "Form an anti-Vampire concordat and bring peace to Dostanor and Escann both!\n\n§YDesigner§!: Jhorgas"
 LANDING_missions_B14_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B15_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #New Wanderers
 missions_B15_desc:0 "This country has a custom mission tree"
 LANDING_missions_B15_TEXT:0 "Bring the ways of Kheterata to Escann, unite humanity and bring about a new religion as schisms rage. For a new truth is rising alongside its own power!\n\n§YDesigner§!: Ditto"
 LANDING_missions_B15_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B18_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Iron Hammers
 missions_B18_desc:0 "This country has a custom mission tree"
 LANDING_missions_B18_TEXT:0 "Carve a new home for the Stone Dwarves out of the rock of Castanor, rebuild and refine Balgar the Builder's masterworks, and usher Escann into a rail-powered industrial revolution!\n\n§YDesigner§!: Trashboat\n§YCoder§!: Magnive"
 LANDING_missions_B18_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B19_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Sword Covenant
 missions_B19_desc:0 "This country has a custom mission tree"
 LANDING_missions_B19_TEXT:0 "As those who left the Orda Aldresia to fight the good fight, rediscover the history of the art of Diranbe as you struggle to uphold the ideals that made you leave to fight the Greentide in the first place! Or embrace a fall to a darker path and revel in unlimited power....\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: AvatarOfKhaine"
 LANDING_missions_B19_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B20_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Order of the Iron Sceptre
 missions_B20_desc:0 "This country has a custom mission tree"
 LANDING_missions_B20_TEXT:0 "The Tower of the East will rise on the backs of the dead. As Varina Escer, freed of the chains of the Magisterium, it is time to show the world what true magic can do! Discover the diary of Canrec the Defiler and unlock the secrets of the dark magics he wielded, pave the way to lichdom to ensure your eternal rule, and bring about a new age in Escann: the age of Necronomics. All those who oppose you will surrender and serve you in life - or die and toil endlessly in death!\n\n§YDesigner§!: Thefineone"
 LANDING_missions_B20_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B22_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Venomtooth
 missions_B22_desc:0 "This country has a custom mission tree"
 LANDING_missions_B22_TEXT:0 "The Greentide has failed! Korgus lies died in Castonath while Clouded Eye and Heartgrinder ditch all that is strong. Aadga knows what is best! We must build a country of strength, not faith. Under our heels, the strong will rule and the weak toil for them!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Texan"
 LANDING_missions_B22_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B24_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Clouded Eye
 missions_B24_desc:0 "This country has a custom mission tree"
 LANDING_missions_B24_TEXT:0 "The Greentide has ended. Grama Clouded Eye is old and is entrusting Arosha Oakbreaker, an orc from Corin's Circle, to lead the clan forwards. Build an orcish state, guide the people towards Corin, and sow the seeds of Unguldavor, the greatest of the green orc states.\n\n§YDesigner§! and §YCoder§!: Texan\n§YWriters§!: Texan, Georgius Agricola"
 LANDING_missions_B24_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
   DLC_missions_B27_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Bonecarver
 missions_B27_desc:0 "This country has a custom mission tree"
 LANDING_missions_B27_TEXT:0 "Even though the Bonecarver clan were not all present in the Battle of Castonath, where Korgus Dookanson died, they remain devoted to the prophet of Great Dookan nonetheless. Receiving the news of his death, the clan must now deal with the great sin that they have committed… \n\n§YDesigner§!: Satang\n§YCoders§!: Satang, Ginahe\n§YWriters§!: Satang, Eskadelade"
 LANDING_missions_B27_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
  DLC_missions_B28_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Dogeater
 missions_B28_desc:0 "This country has a custom mission tree"
 LANDING_missions_B28_TEXT:0 "The Greentide has not ended! Dûsh Dogeater has finally stomped down the last wretched insubordinate orc under his foot. Korgus was weak, a pretender who could not dispatch a puny human, one Dûsh's father slayed while outnumbered at that. Korgus lost to a shambling zombie! Now, with both dead, Dûsh shall prove to all of Escann that he is the strongest of them all!\n\n§YDesigner§! and §YCoder§!: Satang\n§YWriters§!: Satang, Nerflightborn"
 LANDING_missions_B28_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_B36_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Marrhold
 missions_B36_desc:0 "This country has a custom mission tree"
 LANDING_missions_B36_TEXT:0 "The proud Gryphon lords of Marrhold fought the Greentide and lived to tell the tale; now they seek to claim the ruins of Escann and make them rise high into the sky. On the back of gryphons, unite the lands of Castanor under your rule.\n\n§YDesigner§!: Rethall"
 LANDING_missions_B36_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B43_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Flying Hound
 missions_B43_desc:0 "This country has a custom mission tree"
 LANDING_missions_B43_TEXT:0 "Elgek Flying Hound finds itself leading a clan in the middle of an identity crisis. So far from home, now living in a land of ash and ruin, what awaits his people? Glory, unmatched Glory. Rise to the cause of the Flying Hounds as they embrace the Chivalric ways of old Escann and make them their own. Knights of Pride, stand proud!\n\n§YDesigner§! and §YCoder§!: TheForsaken\n§YWriter§!: WR"
 LANDING_missions_B43_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_B42_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Groundhawk
 missions_B42_desc:0 "This country has a custom mission tree"
 LANDING_missions_B42_TEXT:0 "Having fled the harsh Deepwoods with the aid of Corin, the Groundhawk tribe now finds itself in a land of chaos. Utilise the promise of a new land that Corin gave you to make new connections among her followers and legitimise your rule in Escann. Fight to secure the home you were promised, and see what that new home makes of you.\n\n§YDesigner§! and §YWriter§!: Druplesnubb\n§YCoder§!: Mordd, Druplesnubb"
 LANDING_missions_B42_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_B55_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Count's League
 missions_B55_desc:0 "This country has a custom mission tree"
 LANDING_missions_B55_TEXT:0 "Carleon Blacktower is the new hegemon of the last remnants of Castellyr, the feudal successor to Castanor. Bound by a pact made by  hegemons prior, he must navigate redeeming his family line from an infamous past, build a realm worthy of his daughter and keep the dreams of the future alive in Escann!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: AvatarOfKhaine"
 LANDING_missions_B55_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F21_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Birzartanšes
 missions_F21_desc:0 "This country has a custom mission tree"
 LANDING_missions_F21_TEXT:0 "Undo the damage of the Decades of Devastation and subdue the Dartaxagerdim rebels. Finish what your predecessors could not, unite all of Bahar under your rule and become the hegemon of Bulwar. And meanwhile, create the most advanced state bureaucracy in all of Bulwar, where everyone has a place, and there is a place for everyone.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Dycrisis"
 LANDING_missions_F21_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F22_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Dartaxâgerdim
 missions_F22_desc:0 "This country has a custom mission tree"
 LANDING_missions_F22_TEXT:0 "Praise Dartaxes, the first true Akal in Bulwar for centuries! The revolt was a success, but there is still much to be done to return all of Bulwar to the righteous path. Shape this young Akalate into a hegemon and unite Bulwar under the banner of the Old Sun Cult. Embrace the ways of ancient magic, rebuild the old centers of magic of Bulwar and learn arts lost to time. Choose to unify the humans of Bulwar under the banner of Surakes or embrace a darker path...\n\n§YDesigners§! and §YCoders§!: Katam, TheForsaken\n§YWriter§!: Jeck"
 LANDING_missions_F22_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F23_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Ovdal Tûngr
 missions_F23_desc:0 "This country has a custom mission tree"
 LANDING_missions_F23_TEXT:0 "Together with your old allies in Crathánor, extend the Copper Dwarf financial hegemony over all of Bulwar, and then the known world! Offer your 'friends' generous loans, and then take control of their states when they fail to repay you. Dive into the depths of the Divenhal in search of ancient relics, dig a canal to shortcut Halessi trade, and unleash the power of Dwarven industry as you build the largest and most powerful vessel Halann has ever seen: the Sea Hold.\n\n§YDesigner§! and §YCoder§!: Magnive\n§YWriter§!: Beppa, Parker, Gug, Howe"
 LANDING_missions_F23_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F25_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Sareyand
 missions_F25_desc:0 "This country has a custom mission tree"
 LANDING_missions_F25_TEXT:0 "The Ashen Phoenix has seen better days. Beaten but not defeated, you must rebuild the military powerhouse of Bulwar into a realm that Jexis could be proud of. Rein in your lost subjects, reclaim lost land and take your revenge upon the Gnolls. Embrace the Exorcist-Priests, a group of Warrior-Monks trained in the ways of the Xianjie, and use their power to dominate the other claimants and unite the divided Empire under the Black Banner of the Great Ash Legion!\n\n§YDesigners§! and §YCoders§!: Biegeltoren, TheForsaken\n§YWriter§!: Jeck"
 LANDING_missions_F25_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F26_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Gelkalis
 missions_F26_desc:0 "This country has a custom mission tree"
 LANDING_missions_F26_TEXT:0 "The highland dwellers of Gelkalis are a hardy people, used to deprivation and the depredations of their harpy neighbours. But no longer! End the harpy threat once and for all and turn them into loyal subjects instead. Make the valleys and cliffs of your homeland prosper, by means both magical and mundane, and turn what once was an isolated backwater into the forefront of an industrial revolution!\n\n§YDesigner§! and §YCoder§!: leuz\n§YWriters§!: Ahzek, R1CH4RD"
 LANDING_missions_F26_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F27_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Ayarallen
 missions_F27_desc:0 "This country has a custom mission tree"
 LANDING_missions_F27_TEXT:0 "Take command of the most pre-eminent of Firanya's daughters and swoop upon Bulwar below. All the garden will know the shade of the fourth and final Queendom's wing.\n\n§YDesigner§! and §YCoder§!: Liv\n§YWriters§!: Altonym, Reti, Clockworks"
 LANDING_missions_F27_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F28_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Tluukt
 missions_F28_desc:0 "This country has a custom mission tree"
 LANDING_missions_F28_TEXT:0 "Tluukt Cleaver-of-Realms is no mere opportunistic pack mistress! She dreams of a Bulwar in chains, a return to the glorious era of gnollish kingdoms along the Suran. And with guile, cunning and judiciously applied treachery, she might just succeed in her ambitions and bring forth a grand gnollish empire in Bulwar to rival the legacy of the Phoenix Empire.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Lord Fowl"
 LANDING_missions_F28_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F29_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Zokka
 missions_F29_desc:0 "This country has a custom mission tree"
 LANDING_missions_F29_TEXT:0 "Zokka is too small to eat the First Sun. Too weak to quench its steady flame. Undeserving to relish its sour-sweetness, or perhaps its salty-spice. This, Zokka knows, and resents. This, Zokka has resolved to change. To eat, he must grow. To grow, he must eat. And Zokka is very, very hungry.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: JellyCow"
 LANDING_missions_F29_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F30_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Kumarkand
 missions_F30_desc:0 "This country has a custom mission tree"
 LANDING_missions_F30_TEXT:0 "Stuck between belligerent rivals and forced to bow to upstart Akalate of Varamhar, scheme for your right to rule the Buranun with support of the Ituqatter Cavalry and our loyal rangers, for we are proud heirs to Surakel’s First Empire, the Karqašlu Empire. Call on antiquity's mandate that the sons of King Aga will see Surakel’s Garden bloom once again under their eternal rule.\n\n§YDesigner§! and §YCoder§!: Professional Street Mugger\n§YWriters§!: Jeck, Georgius Agricola, PS2Turtle"
 LANDING_missions_F30_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F31_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Eduz-Vacyn
 missions_F31_desc:0 "This country has a custom mission tree"
 LANDING_missions_F31_TEXT:0 "One of the great Suranic Temples, Eduz-Vacyn has fallen on hard times, forced to bow to the vile horde of Zokka. Should the ruling priesthood manage to emerge victorious, they will focus all their attention on bringing the lands of Bulwar under their control - all in the name of Surael, of course. Under their sagacious guidance, the Sun Cult will flourish once again, ushering in a radiant golden age for the faithful!\n\n§YDesigner§! and §YCoder§!: Gilly\n§YWriter§!: Gilly, Clacky, Xris"
 LANDING_missions_F31_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F34_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Azka-Evran
 missions_F34_desc:0 "This country has a custom mission tree"
 LANDING_missions_F34_TEXT:0 "Show everyone that you are not a bastard ruling over a bastard realm. Defeat your rivals, unify Bahar and rule over the waves of the eastern Divenhal. But your ambitions do not stop there, for who else could hope to follow in Jaher's footsteps?\n\n§YDesigner§!: Guivarch"
 LANDING_missions_F34_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F35_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Azkabar
 missions_F35_desc:0 "This country has a custom mission tree"
 LANDING_missions_F35_TEXT:0 "Where there is light, there inevitably is shadow. And lurking in the shadows are the eclipse cultists, convinced that only punishment of the sinful and purification of the decadent all across Bulwar can possibly save Surael's Garden from utter destruction at the hands of the Malevolent Dark.\n\n§YDesigners§!: Hydro, Astera\n§YCoder§!: leuz\n§YWriters§!: Xris, Jeck"
 LANDING_missions_F35_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F37_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Irrliam
 missions_F37_desc:0 "This country has a custom mission tree"
 LANDING_missions_F37_TEXT:0 "The realm of Irrliam teeters on the brink of collapse in the aftermath of the Ember Queen's War. Only venerable Taelarios and his grandson Thelrion have survived, and together they strive to return their realm to its position of preeminence.They will gather all loyal vassals, both old and new, to unite Bulwar in the name of Surael. As the Sword and Shield of the Sun Cult, they will stop at nothing to see Surael's Garden and all its faithful inhabitants safe and prosperous!\n\n§YDesigner§!: Alectron\n§YCoder§!: Raist\n§YWriter§!: Jeck"
 LANDING_missions_F37_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F39_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Bulwar
 missions_F39_desc:0 "This country has a custom mission tree"
 LANDING_missions_F39_TEXT:0 "Repair the damage wrought by gnollish incursions as you plot and conspire to win your freedom from their grasp. Once enough allies have been assembled, shake off the gnollish yoke once and for all! And with Bulwar freed, it is clear that all necessary measures must be undertaken to return your city to its rightful place - the crown jewel and beating heart of the entire subcontinent that bears its name!\n\n§YDesigner§!: Guivarch"
 LANDING_missions_F39_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F42_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Varamhar
 missions_F42_desc:0 "This country has a custom mission tree"
 LANDING_missions_F42_TEXT:0 "Karodir Varamzuir might well be the greatest mage of his generation, and he fully intends to use his skills to further his ambitions. He aims to turn Varamhar into the undisputed center of Bulwari magic and become protector of Bulwar, all in service of one hidden goal: To create a living god through magic!\n\n§YDesigner§! and §YCoder§!: Biegeltoren\n§YWriters§!: R1CH4RD, Biegeltoren"
 LANDING_missions_F42_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F43_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Zanšap
 missions_F43_desc:0 "This country has a custom mission tree"
 LANDING_missions_F43_TEXT:0 "Children of Zanšap! For too long have the Šadnatu suffered in the darkness. Our kingdom is in ruins, our homes infested with gnolls, our people forced to rely on the generosity of Taelarios for protection! But today, that changes. The gnolls shall be expunged from every last corner of Surael's Garden, and the false prophet in the east will burn in His name! Ekluzagnu, our ancient capital, shall be restored as a monument to His glory! For the Akalate! For Surael! For Šad Sur!\n\n§YDesigner§! and §YCoder§!: Professional Street Mugger\n§YWriters§!: Astrofeesh, Clacky"
 LANDING_missions_F43_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F46_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Jaddari
 missions_F46_desc:0 "This country has a custom mission tree"
 LANDING_missions_F46_TEXT:0 "As the Herald of Surael, lead the Desert Legion in their quest to vanquish the darkness and bring Surael's light to all beings. For it was Jaddar who received a revelation from Surael Himself: All creatures can be the light! Everyone can, and should, join the eternal Struggle against the minions of the Malevolent Dark and teach this truth to all Halann.\n\n§YDesigner§! and §YCoder§!: Biegeltoren\n§YWriter§!: ragingrage"
 LANDING_missions_F46_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F47_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Verkal Gulan
 missions_F47_desc:0 "This country has a custom mission tree"
 LANDING_missions_F47_TEXT:0 "No matter what race, what status, what age, or what employment, gold is the one constant in a vast and diverse world, and our hold understands this more than anyone. Truly, the Mint of Aul-Dwarov knows what gold can bring, and what lengths people will take to acquire gold.\n\n§YDesigner§!: Biegeltoren"
 LANDING_missions_F47_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F48_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Siádan
 missions_F48_desc:0 "This country has a custom mission tree"
 LANDING_missions_F48_TEXT:0 "Once, the Queendom of Siadanlen soared over the Paravimvata, swooping down on Rahen and Far Bulwar, an apex predator. Then the Sun Elves came and burned our feathers. Siadan is all that remains - but in the Phoenix Empire's ashes, opportunity arises again. By claw and wing alone, and the aid and allegiance of those others call "monstrous", Siadan must go on the March, restore their old empire, and ascend supreme over Rahen and Bulwar once more, a ruthlessly militaristic Harpy empire!\n\n§YDesigner§! and §YWriter§!: Takasaki\n§YCoder§!: Mati"
 LANDING_missions_F48_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F50_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Mulén
 missions_F50_desc:0 "This country has a custom mission tree"
 LANDING_missions_F50_TEXT:0 "Break free from the Far Salahad as the harpies of Mulen, descendants and followers of prophetess Múla Swift-Sparrow. See the world beyond your desert confines. Turn the remote Šad Siádan mountains into the center of all commerce on Halann through the restoration of the Golden Highway, and the creation of great hanging roosts with splendor the likes of Anbenncóst and Tianlou.\n\n§YDesigner§! and §YCoder§!: Schwendigo\n§YWriter§!: Enleiv"
 LANDING_missions_F50_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F60_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Samsumbat
 missions_F60_desc:0 "This country has a custom mission tree"
 LANDING_missions_F60_TEXT:0 "Samsumbat stands proud, recently led to freedom from under the yoke of Kheterata. Support slave uprisings in nearby states, retake the Mother's Sorrow from the corrupt Steward, and spread the ideals of liberty to Bulwar and beyond...\n\n§YDesigner§! and §YCoder§!: Dylan, Prince of Orange\n§YWriter§!: Memegraaf and Dylan, Prince of Orange" #placeholder
 LANDING_missions_F60_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F62_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Duwarkani
 missions_F62_desc:0 "This country has a custom mission tree"
 LANDING_missions_F62_TEXT:0 "Nirakhet weeps for all, and we weep with her. As Duwarkani, lead your Khetist harpy paladins and retake the Mother’s Sorrow, integrate the monstrous races of Sarhal, and perhaps finally discover the truth about what happened to Castan Beastbane…\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Scamp"
 LANDING_missions_F62_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F69_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Irkorzik
 missions_F69_desc:0 "This country has a custom mission tree"
 LANDING_missions_F69_TEXT:0 "Emerging from the Salahad Desert unscathed, Irkorzik was chosen to unite the many Windhowler Gnoll packs and conquer the desert. Gain the support of the Vog Mekza clerics and those who adhere to the hammer of Kvangahga to wipe out your demonic worshipping brethren and stake your claim as the Empire of the Sands.\n\n§YDesigner§! and §YCoder§!: bruhh\n§YWriter§!: Scamp"
 LANDING_missions_F69_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_F71_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Rakkaz
 missions_F71_desc:0 "This country has a custom mission tree"
 LANDING_missions_F71_TEXT:0 "Confronted with enemies on all sides, only the foolish refuse to use every possible advantage. Rely on the dark powers of your pack's warlocks, gained through vile pacts with demons and creatures of shadow. Use these powers to crush your enemies and found a realm of blood and terror. But beware, for nothing comes without a price, and you might have to pay sooner than you would like.\n\n§YDesigner§! and §YCoder§!: bruhh\n§YWriter§!: Jeck, Iceytheknight"
 LANDING_missions_F71_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_F80_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Nansalen
 missions_F80_desc:0 "This country has a custom mission tree"
 LANDING_missions_F80_TEXT:0 "Once upon a time, Ninšara I and her half-brother, Araš VIII of Akalšes, were poised to bring peace to Bulwar. Yet, they found their ambitions thwarted and their realms bowing to their rivals. But now, with Ninšara II and Araš X poised to take their thrones, we have a new chance for greatness. This time, we must prevail!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Magnive"
 LANDING_missions_F80_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_F81_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Hytiranyalen
 missions_F81_desc:0 "This country has a custom mission tree"
