 LANDING_missions_U13_TEXT:0 "Secure your place and make sure neither harpy nor human or elf can ever dislodge you from your new homeland. Expand the mines, and grow your sheep herds. And most importantly, introduce the world to the marvels of Gobchi fashion!\n\n§YDesigner§!: Alectron"
