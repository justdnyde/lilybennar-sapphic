 missions_S37_desc:0 "This country has a custom mission tree"
 LANDING_missions_S37_TEXT:0 "As Uwimbabazi, the Lady of Drums, realize your dream of Tanizu independence and unity, befriend the Ashhana Lizardfolk, and bring music to the jungle. But the question of succession always comes knocking, and Uwimbabazi has some particularly creative ideas…\n\n§YDesigner§!: amber\n§YWriters§!: amber and ame\n§YCoder§!: Parkor"
