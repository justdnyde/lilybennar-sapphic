 DLC_missions_G26_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Amacimst
 missions_G26_desc:0 "This country has a custom mission tree"
 LANDING_missions_G26_TEXT:0 "Keep order to the land as Amacimst! Revive chivalry with the Amethyst Knights, protect the land from Cursed Ones strikes and Cannorian influence alike as you bring the fight to them and keep the Ynn clean in its ways.\n\n§YDesigner§!: Amanda, §YCoder§!: Susurrus"
 LANDING_missions_G26_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G27_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Brelar
 missions_G27_desc:0 "This country has a custom mission tree"
 LANDING_missions_G27_TEXT:0 "The ancient republic of old Brefineis, the township of Brelar, Grey Hill of the Ironfolk stands alone and forgotten against a wasting world. Will you be able to save the republic from the encroaching hordes of monarchists and reactionaries? and what then? Will you compromise with the values of the feudalists to restore the Ynnic Empire and return Brelari rule to all the River? Or will you stand by your ancient tradition, cast aside all criticism and form a true republic in the northern Ynn?\n\n§YDesigners§!: Susurrus, Pivert\n§YCoder§!: Susurrus\n§YWriters§!: Susurrus, Beppa"
 LANDING_missions_G27_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G32_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Malacnar
 missions_G32_desc:0 "This country has a custom mission tree"
 LANDING_missions_G32_TEXT:0 "Malacnar is a storied realm - a land of unbreakable bonds and fierce warriors. These days, however, it is little more than a belligerent backwater. But times are changing. Alongside your trusted Companions, reject the Ynnic Empire and forge a new Battlekingdom across the Ynn!\n\n§YDesigner§!: Ditto"
 LANDING_missions_G32_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G33_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Bosancovac
 missions_G33_desc:0 "This country has a custom mission tree"
 LANDING_missions_G33_TEXT:0 "Bring wealth to the Ynn atop a floating city as Bosancovac. Unite the river through diplomacy, trade, and thalassocracy as you centralize the priests into a holy fleet and innovate new technology to turn the city itself into its own sailing island.\n\n§YDesigner§!: Schwendigo"
 LANDING_missions_G33_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G35_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Arverynn
 missions_G35_desc:0 "This country has a custom mission tree"
 LANDING_missions_G35_TEXT:0 "Restore your rightful rule as the last member of the Imperial Vyrekynn dynasty and come back from the brink of extinction. Solve your lack of manpower by creating the Veykodan Guard, recruited from barbarians and adventurers. Manage a network of feudal vassals and quell any resistance. Restore the ancient capital from a largely abandoned city to a thriving metropolis. Integrate the newly arrived Cannorians by any means necessary and beat back the Heathen host of the Drozma Tur.\n\n§YDesigner§! and §YCoder§!: Amanda\n§YWriters§!: Stone, Nopani"
 LANDING_missions_G35_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G38_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Vels Fadhecai
 missions_G38_desc:0 "This country has a custom mission tree"
 LANDING_missions_G38_TEXT:0 "Through the eyes of her paramour, experience the life of Mitrenya Konyrzab as she rises from humble beginnings to become one of the most powerful mages of the age. Discover the beauty of the black forest and dabble in blood magic, but remember: this is a love story.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: JellyCow"
 LANDING_missions_G38_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G40_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Tehanek
 missions_G40_desc:0 "This country has a custom mission tree"
 LANDING_missions_G40_TEXT:0 "The shamans of Tehanek have always viewed themselves ahead of the others when it comes to understanding the Dance of Dreams, and they do not intend to slow down. Knowledge is theirs to claim. At any cost.\n\n§YDesigner§!: Wishpupper"
