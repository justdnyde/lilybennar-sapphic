 DLC_missions_A59_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Corvuria
 missions_A59_desc:0 "This country has a custom mission tree"
 LANDING_missions_A59_TEXT:0 "Since the destruction and curse of Daravan’s Folly, the Corvurian kings have ruled over a destitute realm. Revive the land, hold extravagant masquerades, and destroy the Empire, the Deepwoods, and beyond. But in shadow, darkness rises - and hungers for blood.\n\n§YDesigner§!: Ditto"
