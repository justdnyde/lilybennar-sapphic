 DLC_missions_U10_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Brrtekuh
 missions_U10_desc:0 "This country has a custom mission tree"
 LANDING_missions_U10_TEXT:0 "With the demon-forsaken sands of the west Salahad unified, Brrtekuh and her clan were certain  of their imminent domination over the rest of the far reaching sands. However, her ambitions were cut short after a severe head injury during battle left her comatose. Historically, her clan would shortly be swept away along with the winds of the Salahad, despite their many attempts to heal her, yet one must wonder what could have been…\n§YDesigner§!: Satang\n§YCoders§!: Satang, Jothell\n§YWriters§!: Satang, Takasaki, Jarad, Carpe Verpa, T, Georgius Agricola, blindblind"
