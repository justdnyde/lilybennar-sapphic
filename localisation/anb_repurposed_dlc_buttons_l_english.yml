 DLC_missions_G62_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Amgremós
 missions_G62_desc:0 "This country has a custom mission tree"
 LANDING_missions_G62_TEXT:0 "The first Nekhei to be freed, not through our own strength but our overlord's weakness. To survive our situation, desperate measures must be taken. Take to the high seas to steal and plunder what's needed through piracy, fund the revival of the Kimánis silk industry, empower the navy, and unite Devand!\n\n§YDesigner§! and §YCoder§!: Spyhaus\n§YWriters§!: Spyhaus, Perceval, Ravivik, Ahzek"
 LANDING_missions_G62_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G64_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Larankar
 missions_G64_desc:0 "This country has a custom mission tree"
 LANDING_missions_G64_TEXT:0 "Throw off the shackles of destiny, face down the Kheionai invaders, and unify Taychend under the legendary Erankar the Defiant as Larankar. Exploit the gold-mines of Urvand and pave Taychend's ancient trade-routes to create an Empire of Opulence, and lead the legendary Larankarha cavalry to create an Empire of Horsemen.\n\n§YDesigner§! and §YWriter§!: Takasaki\n§YCoder§!: Blaziy"
 LANDING_missions_G64_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G67_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Royakottar
 missions_G67_desc:0 "This country has a custom mission tree"
 LANDING_missions_G67_TEXT:0 "Fight to unite Taychend as Royakottar, the City of Scrap and Salvage. Work alongside, manage the influence of, and exploit the powerful Four Families, scavenger-guilds turned crime-families, excavate the ruins of the Steel-Forged Citadel, and build a mercenary army to cement your authority.\n\n§YDesigner§! and §YWriter§!: Takasaki\n§YCoder§!: Blaziy"
 LANDING_missions_G67_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G74_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Gophira
 missions_G74_desc:0 "This country has a custom mission tree"
 LANDING_missions_G74_TEXT:0 "Do you enjoy restoring great empires reduced to rump states? Do you like alternate mission paths? Love yourself a professional army? Enjoy a bickering court? Then Gophira is the tree for you! Restore the last great unifier of Taychend, and forge the Third Gophiran Empire from the ashes of the old!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Raist"
 LANDING_missions_G74_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G79_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Vuls Tenvach
 missions_G79_desc:0 "This country has a custom mission tree"
 LANDING_missions_G79_TEXT:0 "Taychend reaches yet another crossroads, but this one might perhaps be the most consequential. As Kheionai invaders rise in the south, promising peace and godless order, the power of the storms rides our back. Will we rise as the ruler of storms and a new Taychend, or can the thunderous advance of glory not be stopped?\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: LVT"
 LANDING_missions_G79_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G81_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Sthanan ith Vussam
 missions_G81_desc:0 "This country has a custom mission tree"
 LANDING_missions_G81_TEXT:0 "Reforge the Dannuka Dumrusvarn as Sthanan ith Vussam! Delve deep into - and expand - the prestigious Violet Library, fulfilling the dreams of Elajith the Violet and his brotherhood, and by expanding the Goldswords - the tip of the legendary Eletam the Gold's spear - restore order and justice to a Taychend that has lost its way.\n\n§YDesigner§! and §YCoder§!: Pivert\n§YWriter§!: Takasaki"
 LANDING_missions_G81_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G84_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Vels Bacar
 missions_G84_desc:0 "This country has a custom mission tree"
 LANDING_missions_G84_TEXT:0 "The Ynn will know democracy as Vels Bacar. Beat back the rising Trompolere with the ancient School of Riverblades. Embrace the potential of the Middle Ynn as you unite Sarda and Dolindhan under your benevolence, and show the Ynn both the strengths of Bacaran democracy, and how to rise above the great divide it inevitably brings...\n\n§YDesigner§!: Adriana"
 LANDING_missions_G84_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G87_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Chaqway
 missions_G87_desc:0 "This country has a custom mission tree"
 LANDING_missions_G87_TEXT:0 "Build a mutually nourishing network of trade by settling qhatuwái, roping-places, in the fulcrum-places of Amadia. Brace for the arrival of the Cannorians, and deal with the changes they bring to Aelantir.\n\n§YDesigner§! and §YWriter§!: altonym\n§YCoder§!: Raist"
 LANDING_missions_G87_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H01_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Arakeprun
 missions_H01_desc:0 "This country has a custom mission tree"
 LANDING_missions_H01_TEXT:0 "The Goldtree Rebellion of 1435 has left Arakeprun in a precarious position. Deprivation of Precursor tools has left the city stagnant, and hostile forces press on all sides. Reclaim your lands, restore the glory of your city, and unify Eordand under Spring’s plenty!\n\n§YDesigner§!: Jhorgas"
