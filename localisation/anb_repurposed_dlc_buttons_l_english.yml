 missions_Y26_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y26_TEXT:0 "In the forested lands of Yinquan, a thousand shrines to the Huli-Jing are hidden. Under the wise, compassionate, and sometimes intoxicated guidance of the foxy Liho shrine maidens, all of Yanshen will experience the joys of Lihoism.\n\n§YDesigner§!: Alexis\n§YCoder§!: G'Reth\n§YWriter§!: Theia"
