 DLC_missions_G46_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Degakheion
 missions_G46_desc:0 "This country has a custom mission tree"
 LANDING_missions_G46_TEXT:0 "Restore the ancient ways as Degakheion. Bring the other Kheions under your rightful wardenship and prove yourself as the father of the Nekheis, enforcing and expanding the ancient stratocratic elite of the Phylaxana. But beware, the other cities chafe at such rule;  the rebellious Karkares may seek to uproot the old system and bring a wholly new future to Degakheion.\n\n§YDesigner§!: Leib\n§YCoders§!: Leib, Blaziy\n§YWriters§!: Leib, Takasaki, SecretCalder, ps2turtle"
 LANDING_missions_G46_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G47_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Oktikheion
 missions_G47_desc:0 "This country has a custom mission tree"
 LANDING_missions_G47_TEXT:0 "Revive the Kheionai's famous naval prowess as Oktikheion! End your ancient rivalry with Degakheion to start a new age of Oktibhen hegemony as you reassert and expand your naval might to unite Alecand.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Runehawk"
 LANDING_missions_G47_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G48_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Kherka
 missions_G48_desc:0 "This country has a custom mission tree"
 LANDING_missions_G48_TEXT:0 "Bolster the bronze and steel of the Kheionai as Kherka! Deal with the politics of the democratic Forge-Council, rise above the other Kheions, and turn first Kherka, and then Alecand itself, into the industrial crucible of the Kheionai world!\n\n§YDesigner§! and §YCoder§!: Mike\n§YWriters§!: Queensabre, Raist, Faeelin"
 LANDING_missions_G48_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G49_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Lokemeion
 missions_G49_desc:0 "This country has a custom mission tree"
 LANDING_missions_G49_TEXT:0 "Prove the superiority of the Kheionai as Lokemeion! Restore and expand the ancient Grand Library to gather more knowledge for the philosophers and use your knowledge of the Bharbhen to conquer them, turning them into true Kheionai through enlightenment - and proving the supremacy of Kheionist thought as you do.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Runehawk"
 LANDING_missions_G49_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G50_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Ormam
 missions_G50_desc:0 "This country has a custom mission tree"
 LANDING_missions_G50_TEXT:0 "Profit from the power of trade as Ormam. Build up your merchant fleet and expand into powerful ports throughout Alecand and South Aelantir alike to enrich yourself like never before! Expand the Wondrous Harbor and your Trade School as out of squabbling Kheions you forge Kheiós.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Runehawk"
 LANDING_missions_G50_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G51_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Arpedifér
 missions_G51_desc:0 "This country has a custom mission tree"
 LANDING_missions_G51_TEXT:0 "Enrich the artisanry of Alecand as Arpedifér. Ward the Kheionai from invaders, old and new alike, and expand the kheion's shimmering industry as you find new trading partners for them to enrich your nation!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Runehawk"
 LANDING_missions_G51_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G52_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Ameion
 missions_G52_desc:0 "This country has a custom mission tree"
 LANDING_missions_G52_TEXT:0 ""One revolt of thousands marks your entry, a foreign sword to Taychend's soil. The fledgling city, born from strife, comes hither to end our own.\nHear your fate, Andic Elf, and it shall end those of a hundred lords.\nFive dozen and one years marks your time upon this world, No arrow nor sword, no ill nor folly shall take you for your allotted time, but your time shall come. Until this evening, even gods shall part before you and bend to your city's will."\n- The Fateweaver at Korrimutren to Laskaris 'The Conqueror'\n\n§YDesigner§! and §YCoder§!: Ditto\n§YWriters§!: Takasaki, Ottokard"
 LANDING_missions_G52_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G53_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Empkeios
 missions_G53_desc:0 "This country has a custom mission tree"
 LANDING_missions_G53_TEXT:0 "The power of many hands, even those possibly unwilling, cannot be understated. Create a monopoly on the Kheionai slave trade as you colonize and trade with the natives of Devand, expand your trade empire with the help of your partner Keyolíon, and ensure a free market at all costs with the power of Big Stick Diplomacy.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: brokenarrow"
 LANDING_missions_G53_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G54_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Besolakí
 missions_G54_desc:0 "This country has a custom mission tree"
 LANDING_missions_G54_TEXT:0 "Fulfill the dreams of the radical Varamelas as Besolakí. Create a truly free chaotic democracy, as numerous factions debate and scheme to impress their vision on the new republic. Spread your new ideals to the rest of the Nekheis, and learn from the other peoples of Aelantir.\n\n§YDesigner§! and §YCoder§!: Blaziy\n§YWriter§!: Takasaki"
 LANDING_missions_G54_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G55_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Eneion
 missions_G55_desc:0 "This country has a custom mission tree"
 LANDING_missions_G55_TEXT:0 "Unite Devand as Eneion, the first among the Nékheis. Conquer the other Nékheis while maintaining - though redefining - your relationship with your overlords, explore and exploit the interior of Devand, and bring the Basobhar into the light of Kheionai civilisation!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Ottokard"
 LANDING_missions_G55_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G56_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Deyeion
 missions_G56_desc:0 "This country has a custom mission tree"
 LANDING_missions_G56_TEXT:0 "Seek revenge for ancient wrongs as Deyeion. Expand into the Devandic interior with fire and steel, satiate your people's ever deepening desire for tea, and create a Devand-wide independence movement that will expel the Alecandi tyrants once and for all!\n\n§YDesigner§! and §YCoder§!: Blaziy\n§YWriters§!: Takasaki, goshgollydarnit"
 LANDING_missions_G56_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G57_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Apikhoxí
 missions_G57_desc:0 "This country has a custom mission tree"
 LANDING_missions_G57_TEXT:0 "Apikhoxí, where all have land to cultivate and crops to eat! Free the slaves of Kheionai and bring them here, where they may make honest work, tending a land that is their own, and learning in schools for all. When your Ormabhen overlords take your gains for themselves, unite Devand into it's own league, and declare joint independence before uniting together under one banner.\n\n§YDesigner§!: novophone\n§YCoder§!: Faeelin\n§YWriter§!: SecretCalder"
 LANDING_missions_G57_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G58_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Keyolíon
 missions_G58_desc:0 "This country has a custom mission tree"
 LANDING_missions_G58_TEXT:0 "Fight against your vengeful nature as Keyolion. Imbue your sugarcane greenhouses with magic to allow them to prosper upon even the highest peaks and steal the secret to Arpedifér's glassblowing to then master them. Broker a deal with Empkeios to ensure a steady workforce of slaves, and free yourselves from your tyranical overlords if they dare intervene!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Dichomire"
 LANDING_missions_G58_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G59_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Anisíkheion
 missions_G59_desc:0 "This country has a custom mission tree"
 LANDING_missions_G59_TEXT:0 "Conquer the waves of Anisíkheion, the pearl of the Cleaved Sea. Establish a naval empire from Alecand to Orenkoraim, build a naval stratocracy fueled by the greatest fleet the Kheionai have ever seen, and forge Anisíkheion into the true Eighth Kheion!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Ottokard"
 LANDING_missions_G59_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_G60_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Eltikan
 missions_G60_desc:0 "This country has a custom mission tree"
 LANDING_missions_G60_TEXT:0 "Rise as the godhammer of South Aelantir as Eltikan! Prove your supremacy over the Kheionai through might and magic, no matter the resistance. Connect with your brothers the Devand along with the rest of South Aelantir to learn the might of magic! HOG RIDERS, CHAAAARGE!!!\n\n§YDesigners§!: Spyhaus, TheForsaken\n§YCoders§!: Spyhaus, Fahes\n§YWriters§!: Ravivik, Beppa, Spyhaus, mzy"
