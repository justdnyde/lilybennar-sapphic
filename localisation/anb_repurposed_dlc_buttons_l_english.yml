 missions_V05_desc:0 "This country has a custom mission tree"
 LANDING_missions_V05_TEXT:0 "Isolated from the rest of the world, the Ashen Soul has kept to their plateau for a thousand years. But new threats have arisen on their doorstep, and an intruder has stolen into their inner sanctum and purloined the secrets of their power. Descend from the mountaintop, wielding psychic flames as you battle your foes and learn of the world the monks left behind. Gozengun will know of the power of Cangji - the blazing herald of a new northern Raj!\n\n§YDesigner§! and §YWriter§!: Reti\n§YCoder§!: Nedac"
