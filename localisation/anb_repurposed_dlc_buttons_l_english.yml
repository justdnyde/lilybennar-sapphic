 missions_Y25_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y25_TEXT:0 "The last living descendants of Harimar the Great, the dynasty of the Divine Call. Too long have we allowed the eunuchs to run roughshod across the lands our predecessor once ruled. These lands are ours by right. Utilize our diplomatic skills to bring the eunuchs in line and force them to swear fealty to our dynasty. By our claws we will create a new, better caste system, without the rigidity and flaws of the decadent Raj, and restore the Tiger Throne of Tianlou.\n§YDesigner§!: Imacop42\n§YCoder§!: ShadowLK\n§YWriters§!: Imacop42, Theia, Arcanoi, Swipin Stu"
