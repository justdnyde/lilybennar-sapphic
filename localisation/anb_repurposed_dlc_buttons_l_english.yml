 DLC_missions_U05_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Elizna
 missions_U05_desc:0 "This country has a custom mission tree"
 LANDING_missions_U05_TEXT:0 "Assert your claim to Jaher’s legacy and gain the Stewardship of the Sorrow in the name of Surael. Become the naval hegemon of the Divenhal. And once all rivals have been crushed, out of their remains an empire will be built that stretches along not one, but two holy rivers - the Suran and Mother’s Sorrow.\n\n§YDesigner§!: Amanda"
 LANDING_missions_U05_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_U07_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Viakkoc
 missions_U07_desc:0 "This country has a custom mission tree"
 LANDING_missions_U07_TEXT:0 "Establish a global naval empire of demon-worshipping corsairs as Viakkoc, the Scourge-of-All-Seas. Conquer from the ruin isles to the coasts of the Lupulan, create a massive armada and hone your gnollish marines, and even strike at the heart of Anbennar launching the greatest raid the world has ever seen, claiming the city of the world's desire as your new capital!\n\n§YDesigners§!: Takasaki, Seres\n§YCoder§!: Seres\n§YWriter§!: Takasaki"
 LANDING_missions_U07_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_U08_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Ekha
 missions_U08_desc:0 "This country has a custom mission tree"
 LANDING_missions_U08_TEXT:0 "The brutal invasion of Viakkoc has shattered the old order in Akasik, 200 years of a golden age have now turned to ash, and the ancient silver republic of Ekha stands at an impasse. Turn back the tide and send the Kultists back to the Salahad, restore the old order of Akasik under your rule and take back what was lost, expand west to Aelantir and reconnect with your kin in Fangaula. By the will of the orders and the Amsakas, Akasik is not lost!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Poke"
 LANDING_missions_U08_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_U09_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Gnollakaz
 missions_U09_desc:0 "This country has a custom mission tree"
 LANDING_missions_U09_TEXT:0 "There is nothing more dangerous than a gnoll with a vision. And Grizaka Empress-of-Gnollkind is just such a gnoll. Follow her on the path to glory and fashion the mightiest empire the world has ever seen out of nothing more than burning ambition and relentless determination.\n\n§YDesigner§! and §YCoder§!: bruhh\n§YWriter§!: Jeck"
