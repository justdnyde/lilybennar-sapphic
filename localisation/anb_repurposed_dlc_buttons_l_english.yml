 DLC_missions_H12_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Raithtall
 missions_H12_desc:0 "This country has a custom mission tree"
 LANDING_missions_H12_TEXT:0 "It's been a decade since Dorcurt and its Golden Acres were burned. With the Autumn Court squabbling amongst itself while the Iadthi still rule the land they destroyed, Dorcurt seems destined to fade away into history. That is, unless someone rewrites it. As Raithtall, restore Dorcurt and take revenge on the Eordellon crusaders who destroyed it. Reunite the Autumn Court and resume the fight against Winter. Reswear the Twilight Oath and become the protector of all Eordand. The Golden Acres shall shine again!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Druplesnubb"
 LANDING_missions_H12_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_H14_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Eighard
 missions_H14_desc:0 "This country has a custom mission tree"
 LANDING_missions_H14_TEXT:0 "You remember, don’t you? In your weary bones, the sins of your past are held forever. It has been a long while, hasn’t it? You look out across the land you used to know, and it is unrecognizable. But then, within this place called Eighard, you feel a draw, infinitesimally small—you are worshipped still. Faith-driven, magically adept, despisers of all who are not them—they resonate with you, deeper than you can possibly imagine. Perhaps, after all this time, you will make your grand return…\n\n§YDesigner§! and §YWriter§!: amber\n §YCoder§!: Bromar"
 LANDING_missions_H14_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H16_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Gemradcurt
 missions_H16_desc:0 "This country has a custom mission tree"
 LANDING_missions_H16_TEXT:0 "The old ways have led the Winter Court to ruin - as Gemradcurt, forge a new path under Immarel's rule. Defeat the Tuathak and reverse the Hibernal Crusade, ascend to lichdom with the backing of the Everfrost Prince, and bring the northern reaches of Aelantir under the grip of the Taigan Supremacy, safe and secure beneath the watchful eye of the Lady-Mother of Winter, and the winter eternal!\n\n§YDesigner§! and §YWriter§!: Takasaki\n§YCoder§!: Mati"
 LANDING_missions_H16_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H72_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Shattered Crown
 missions_H72_desc:0 "This country has a custom mission tree"
 LANDING_missions_H72_TEXT:0 "Unite the clans and bring Orc hegemony to the Serpentspine. Stem the tide of dwarves who seek to invade the mountains they've lost, and discover the secrets of Dookan hidden deep within the Serpentspine.\n\n§YDesigner§!: Batavi"
 LANDING_missions_H72_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H73_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Skewered Drake
 missions_H73_desc:0 "This country has a custom mission tree"
 LANDING_missions_H73_TEXT:0 "Learn how to train your drakon as Skewered Drake! Rise with your drakons through the Serpentspine, forge them into even more fearsome companions, return Bulwar to it's natural subservient state, and transform from a primitive horde into a great nation state!\n\n§YDesigner§! and §YCoder§!: Auirus\n§YWriters§!: Carpe Verpa"
 LANDING_missions_H73_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H74_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Chaingrasper
 missions_H74_desc:0 "This country has a custom mission tree"
 LANDING_missions_H74_TEXT:0 "There is only one true master of the Serpentspine, and his name is Dak. Embrace Lichdom and egomania as you embark on a journey which will forever define the Serpentspine. Slaughter the magic-fearing Command, secure the riches of the Jade Mines, and enslave what few poor dwarven wretches remain. The world is Dak's oyster - all that remains is for you to reach out and take it!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Dadevo"
 LANDING_missions_H74_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H75_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Railskulker
 missions_H75_desc:0 "This country has a custom mission tree"
 LANDING_missions_H75_TEXT:0 "As the most cunning of clans, elevate the rising Technocratic Council to harness the abandoned machines of Er-Natvir and long-ruined rails of the ancient Dwarven Empire. All so that your capital - the future heart of the Allclan - may spin up a ceaseless network, bringing hold after hold under your rule.\n\n§YDesigners§!, §YCoders§!, and §YWriters§!: Dwain the Hamster, RopedIronGolem"
 LANDING_missions_H75_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H76_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Arg-Ôrdstun
 missions_H76_desc:0 "This country has a custom mission tree"
 LANDING_missions_H76_TEXT:0 "The Diamond Dwarves, ancient and proud, emerge from their long dormancy to find a very different Dwarovar - and one ripe for Diamond domination. Rebuild the ancient Lapidary Guild and bend it to your will, and handle those who would condemn Arg-Ordstun to isolation. Reclaim the lands of old Aul-Dwarov with blood and steel, and reforge the Dwarovar in your own image!\n\n§YDesigner§!: Hexalot\n§YCoder§!: Armitage\n§YWriters§!: Lexperiments, Howe"
 LANDING_missions_H76_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H77_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Ovdal Lodhum
 missions_H77_desc:0 "This country has a custom mission tree"
 LANDING_missions_H77_TEXT:0 "Thousands of years ago, Aul-Dwarov was brought low, and after millennia of trying to stem the orcish tide, the Garnet Dwarves sealed their gates. Twenty years ago, a Castellyrian human came to our gates, with a dwarven host, his dwarven lover, her child Balgar, and the Sapphire Gem. We crowned him King Gerin Orcrend, and he has shown us the future. Open the Hold of Love, bring about the Reclamation of the Serpentreach, and, oh yes... rend the Orcs, wherever they may be!\n\n§YDesigner§! and §YCoder§!: Auirus\n§YWriters§!: Werdna, Grymhar, Ragingrage"
 LANDING_missions_H77_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H78_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Seghdihr
 missions_H78_desc:0 "This country has a custom mission tree"
 LANDING_missions_H78_TEXT:0 "Revive the Segbandal as Seghdihr! Restore the alliance of holds, forge a loyal, professional army, fortify the Middle Dwarovar to ensure you will never fall again, and bring peace and control to Haless and Bulwar through trade\n\n§YDesigner§! and §YCoder§!: Auirus\n§YWriters§!: Werdna, Grymhar, Karlov"
 LANDING_missions_H78_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H79_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Ovdal Kanzad
 missions_H79_desc:0 "This country has a custom mission tree"
 LANDING_missions_H79_TEXT:0 "Repelling siege after siege with thunderous barrage, the Dwarves of Ovdal Kanzad now stand poised to end this status quo and end the threats to the Tree of Stone for good. Pushing outwards and reclaiming the caves where Dwarfkind first rose, they will nurture the long-abandoned tunnels from desolate passages into thriving communities, then announce the reemergence of the dwarves with a cannonade, proving the superiority of Amber artillery.\n\n§YDesigner§!: Vjmdhzgr"
 LANDING_missions_H79_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H81_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Masked Butcher
 missions_H81_desc:0 "This country has a custom mission tree"
 LANDING_missions_H81_TEXT:0 ""A reflex splits us asunder when terror draws close - fight or flight, neither easily chosen, but both nonetheless compelled. We do not ask why a shadow moves at the corner of our eye; we strike or run first, and question second. Our flaw is in our design: we trust our eyes, and are often betrayed. Illusion becomes truth, but truth - when unseen - becomes myth. What we see is, in nearly every case, what we unconsciously choose to believe."\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: JellyCow"
 LANDING_missions_H81_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H82_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Greedy Grin
 missions_H82_desc:0 "This country has a custom mission tree"
 LANDING_missions_H82_TEXT:0 "Grin Greedily as you conquer the long coveted gold hold for yourself, building it up as the greatest vault of the serpentspine! Innovate the levy system to make even more money in peace, and quick mobalization in war, and feed millions through Serpentbloom monopoly!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Abyssmoon"
 LANDING_missions_H82_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_H83_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Shadowdreamer
 missions_H83_desc:0 "This country has a custom mission tree"
 LANDING_missions_H83_TEXT:0 "Exiled from Vazumbrog for your beliefs, lead a pilgrimage to Gor Ozumbrog and learn your true destiny: to wipe the dwarves from the Serpentspine once and for all. Lead a grand crusade in the name of Dookan, gaining buffs when fighting dwarves and encompassing an entire continent. Manage the belief of your population with the Dreamfire mechanic. Equip your armies with Dreamforged Mithril, and turn them into one of the most elite forces in all of Halann!\n\n§YDesigner§! and §YCoder§!: Xand\n§YWriters§!: AtlasLovesYou, Xand"
 LANDING_missions_H83_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H84_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Mountainshark
 missions_H84_desc:0 "This country has a custom mission tree"
 LANDING_missions_H84_TEXT:0 "RISE NOW, GOBLINS OF THE SERPENTSPINE! Glozok the Great Shark freed us from our chains: now, we must honor his legacy. His cunning fooled our captors, his might destroyed our foes, and his wisdom gave us the ability to survive. With the power of mithril, we shall do the same!\n\n§YDesigner§! and §YCoder§!: Fenceable\n§YWriters§!: Lexperiments, Carpe Verpa, clacky_lol, Bojnik, Satang"
 LANDING_missions_H84_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H85_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Truedagger
 missions_H85_desc:0 "This country has a custom mission tree"
 LANDING_missions_H85_TEXT:0 "Let others wage war; thou, sneaky Truedagger, assassinate.\n\n§YDesigner§!: Pivert\n§YCoders§!: Pivert, Mati\n§YWriter§!: JellyCow"
 LANDING_missions_H85_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H87_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Thieving Arrow
 missions_H87_desc:0 "This country has a custom mission tree"
 LANDING_missions_H87_TEXT:0 "Unite the Serpentreach, steal all its precious treasure for yourself, and tap into the northern market to steal theirs too.\n\n§YDesigner§!: Wingren"
 LANDING_missions_H87_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H89_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Snotfinger
 missions_H89_desc:0 "This country has a custom mission tree"
 LANDING_missions_H89_TEXT:0 "‘There is nothing more repulsive than the Orc,’ said Rurnor Snotfinger. Rurnor is far from alone in his hatred, and his followers will stop at nothing to get revenge for their slavery at orcish hands. Get rid of orcs inside and outside the mountains! Dig holds faster (with drugs)! Insult people like never before! Boost your military (with drugs)! Trade with Escann! Unlock unique artificery inventions (mostly drugs!).\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Arieriel"
 LANDING_missions_H89_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H90_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Spiderwretch
 missions_H90_desc:0 "This country has a custom mission tree"
 LANDING_missions_H90_TEXT:0 "Carve out your dominion as the only folk cunning enough to tame the great spiders of the Spidernest, as you rise from a lowly goblin clan to a global power, transforming your greatest hazard into your greatest weapon, weaving rivers of silk and riding skittering beasts to war.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Niller"
 LANDING_missions_H90_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_H91_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Roadwarrior
 missions_H91_desc:0 "This country has a custom mission tree"
 LANDING_missions_H91_TEXT:0 "Build your caravan and embrace the rails connecting the Serpentspine, leaving destruction and devastation in your wake as you pillage and plunder whoever and whatever you can reach, until your roving warband is all that calls these mountains home.\n\n§YDesigner§! and §YCoder§!: Wishpupper\n§YWriter§!: Werdna"
 LANDING_missions_H91_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_I02_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Krakdhûmvror
 missions_I02_desc:0 "This country has a custom mission tree"
 LANDING_missions_I02_TEXT:0 "Separated from the Serpentspine by distance, creed, and after millennia of survival, Krakdhûmvror emerges into a post-Greentide world with tentative steps. The elective system of ages gone by is now corrupt and unworkable, the clans entrenched. A battle for the future of the Quartz Dwarf state is on the horizon, as you seek to reclaim what was lost to Aul-Dwarov's greed and incompetence.\n\n§YDesigner§! and §YCoder§!: Auirus\n§YWriter§!: zheuss"
 LANDING_missions_I02_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I26_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Salla Elyn
 missions_I26_desc:0 "This country has a custom mission tree"
 LANDING_missions_I26_TEXT:0 "It is through actions, not words, that a leader is born. As the Conclave drags on, Farwen Elyn fights for her people. Under her leadership, the Deepwood will be reunited again and ties with long lost cousins will be restored.\n\n§YDesigner§!: Crist\n§YCoder§!: Krazy Shadow\n§YWriter§!: .Simetra"
 LANDING_missions_I26_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_I27_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Salla Myna
 missions_I27_desc:0 "This country has a custom mission tree"
 LANDING_missions_I27_TEXT:0 "Unlike her father, Bricena Myna is no legendary or renowned warrior. Instead, she is a diplomat and administrator; talents she will use to turn Ciranmyna into a capital for all Wood Elves, forge an unlikely alliance with giant hawks, and ultimately unite the Deepwoods.\n\n§YDesigner§! and §YCoder§!: Magnive\n§YWriters§!: Grymhar and armonistan."
 LANDING_missions_I27_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I28_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Salla Drennen
 missions_I28_desc:0 "This country has a custom mission tree"
 LANDING_missions_I28_TEXT:0 "Follow the story of the young and brilliant Narawen Drennen, silver tongued mage, Ceanna of Salla Drennen, and architect of the Verdant Pact, as she and her friends work to turn the Deepwoods golden.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Liv"
 LANDING_missions_I28_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I29_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Salla Cenág
 missions_I29_desc:0 "This country has a custom mission tree"
 LANDING_missions_I29_TEXT:0 "Life is earned, not given. Alara, Ceanna of Salla Cenág knows this well. She and her clanelves have fought goblin warlocks and orcish hordes for decades to earn tomorrow. Yet they edge ever closer to annihilation. If her people are to survive, Alara will have to call upon estranged kin and brave the lands beyond the woods that have trapped them for so long. \n\n§YDesigner§!, §YCoder§!, and §YWriter§!: armonistan"
 LANDING_missions_I29_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I30_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Salla Fealgarn
 missions_I30_desc:0 "This country has a custom mission tree"
 LANDING_missions_I30_TEXT:0 "Reclaim the Deepwoods under the iron rule of controversial and tactical mastermind, General Oberon Fealgarn. Create a cavalry academy learning from the lessons of the Greentide to establish a powerful military  in your drive to forcefully unite the clans. And finally, struggle with the tyrannical descent of Oberon as he seeks to fend off a ruthless Fey Queen seeking to reclaim her throne with her monstrosities.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Atlas"
 LANDING_missions_I30_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I33_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Salla Ayeth
 missions_I33_desc:0 "This country has a custom mission tree"
 LANDING_missions_I33_TEXT:0 "Guide the soon to be leader of Salla Ayeth, Elaria, as he struggles with overcoming grief after the death of his mother at the hands of the orcish invaders. Will he overcome his urges, or will he become more cruel than the monsters he vowed to eliminate?\n\n§YDesigner§! and §YWriter§!: LVT\n§YCoders§!: LVT, Walthorn"
 LANDING_missions_I33_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I35_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Brambleskinner
 missions_I35_desc:0 "This country has a custom mission tree"
 LANDING_missions_I35_TEXT:0 "Time has come for revenge. Once and for all, erase the stain of Oubblig's legacy, reunite the Brambleskinner clan and take over the other Forest Goblin clans. With the support of your Cartels, fire, and a lot of blackpowder, fight off the fey influence over the Deepwoods!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Mastellor"
 LANDING_missions_I35_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I36_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Spiked Log
 missions_I36_desc:0 "This country has a custom mission tree"
 LANDING_missions_I36_TEXT:0 "The Spiked Log clan is in a precarious situation, surrounded by haughty elves and cruel orcs. The clan can rely on two strengths: deadly traps that gave them their name, and giant boars used in their cavalry. Take inspiration from foreign ideas and rise to new heights with the help of Cartels. Only then can the Deepwoods be a true haven for every goblin.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Mastellor"
 LANDING_missions_I36_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I40_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Cursed Howl
 missions_I40_desc:0 "This country has a custom mission tree"
 LANDING_missions_I40_TEXT:0 "Can love bloom on a battlefield? And what does it mean to forge an orcish realm where honour can thrive even as the other clans abandon those things as they revel in ruinous conquest? Bring peace and unite the Deepwoods under an orcish hegemony that still has room for all!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: AvatarOfKhaine"
 LANDING_missions_I40_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I41_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Sapchopper
 missions_I41_desc:0 "This country has a custom mission tree"
 LANDING_missions_I41_TEXT:0 "With one mighty blow, Khagur 'Sapchopper' cleaved Celadil Drennen, head of Salla Drennen, in two and forged a band of greedy raiders and hotblooded warriors into a clan, his clan. It was a glorious victory, but not Sapchopper's final one. The weaklings of the forests still scurry and resist. The very woods themselves whisper to the chieftain. Will Clan Sapchopper break this land, or bend to it?\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: armonistan"
 LANDING_missions_I41_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I43_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Silentblade
 missions_I43_desc:0 "This country has a custom mission tree"
 LANDING_missions_I43_TEXT:0 "Whatever Clan Silentblade once was matters little. Their purpose now is clear - to be the weapon of vengeance millennia in the making. The tool is crude now, but in time it can be shaped, honed. Then and only then may they become first chosen of the Blackened Prince.\n\n§YDesigner§! and §YCoder§!: armonistan\n§YWriters§!: Grymhar, armonistan"
 LANDING_missions_I43_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_I55_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Black Herd
 missions_I55_desc:0 "This country has a custom mission tree"
 LANDING_missions_I55_TEXT:0 "Reclaim the legacy of the Black Herd by restoring the corpse-exploding spell, Markhentakruan. Descend into darkness with Baildelk II as he seeks true mastery over life and death. Unite the western plains and subjugate the ogres, plundering their magic and experimenting on their cities.\n\n§YDesigner§! and §YCoder§!: Blaziy\n§YWriter§!: Parkor"
 LANDING_missions_I55_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_I57_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Golden Tremor
 missions_I57_desc:0 "This country has a custom mission tree"
 LANDING_missions_I57_TEXT:0 "The old ways have led to ruin. It's clear to Rhidrin we must modernize to survive our encroaching enemies. The previous system of Free Clans has failed, but through force, it can be centralized. The vast untapped plains hide gilded riches waiting to be discovered, and through cooperation with the ogres of the west, the power of a great modern army is ready to be called!\n\n§YDesigner§! and §YCoder§!: Blaziy\n§YWriters§!: Georgius Agricola, gideon"
 LANDING_missions_I57_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I69_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Star Rider
 missions_I69_desc:0 "This country has a custom mission tree"
 LANDING_missions_I69_TEXT:0 "We waited. Days became weeks, weeks became months. Eleven years have passed now, since our warriors and shamans have left for the incursion. They haven’t returned, nor will they ever.\nThe path forward seems impossibly dark and bereft of any light, but we must push onwards. We centaurs must reach a concord, and our consensus will end all strife!\n\n§YDesigner§!, §YWriter§! and §YCoder§!: Irtakus"
 LANDING_missions_I69_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I78_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Wild Hunt
 missions_I78_desc:0 "This country has a custom mission tree"
 LANDING_missions_I78_TEXT:0 "Time is running out - a storm of their own making will soon consume the once Great Caehns.\nDo you think you have what it takes to answer the Call of the Wild Hunt?\nSurvive one of the hardest starts in the game. Fight the new claimants of the steppes and defend other centaurs from outside invaders to restore your Caehnate’s Authority.\nRebuild and restore your realm, establish peace amongst Centaurs, and prepare the second incursion.\nEmbody the Spirit of Vengeance!\n\n§YDesigner§!: TheForsaken\n§YCoder§!: Creatively Bankrupt\n§YWriters§!: Fantastic Kitten, Sehr Duck"
 LANDING_missions_I78_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I80_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Great Storm
 missions_I80_desc:0 "This country has a custom mission tree"
 LANDING_missions_I80_TEXT:0 "Understand this: The Filustkhuga are not our friends. They might call themselves worshippers of Irdaeos, but we understand their true nature.\nFiends, searching and burning for loot and glory. The lands they leave in their wake being drenched in the blood of centaurs and humans alike. \nTheir ways can not be allowed to exist any further.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Irtakus"
 LANDING_missions_I80_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_I90_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Maghargma
 missions_I90_desc:0 "This country has a custom mission tree"
 LANDING_missions_I90_TEXT:0 "Heir to the giants: the time has come! The rebellious vessels will be stripped of their autonomy, our people reformed, the plains settled as we claim our inheritance. Only then can we journey outwards and seek our title as lord of all ogres!\n\n§YDesigner§! and §YWriter§!: Alpog\n§YCoder§!: Mike"
 LANDING_missions_I90_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_J32_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Mire Maw
 missions_J32_desc:0 "This country has a custom mission tree"
 LANDING_missions_J32_TEXT:0 "The Serpentspine has forgotten what it was like to fear the giants. Through wars for tribute, revitalized swamps, and feasts beyond measure... you will make them remember.\n\n§YDesigner§! and §YCoder§!: Unmortalguy\n§YWriters§!: Lexperiments,  Gosh Golly Darnit"
 LANDING_missions_J32_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_J73_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Zaernmaera
 missions_J73_desc:0 "This country has a custom mission tree"
 LANDING_missions_J73_TEXT:0 "Rebuild Ultarlanbeg's empire as Zaernmaera. Sear the might of the Chendhyans back into Taychend's mind, as you restore Saerraeg through glorious deeds. Sack Nanru Nakar, centralize the hero cults, and end the legacy of the Slaver-Nobles that has enchained their descendants for millennia.\n\n§YDesigner§!: Ottokard\n§YCoder§!: Blaziy\n§YWriter§!: Takasaki"
 LANDING_missions_J73_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_J74_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Caergaraen
 missions_J74_desc:0 "This country has a custom mission tree"
 LANDING_missions_J74_TEXT:0 "One of the harder challenges of South Aelantir, the fierce warrior-pirates of Caergaraen will seek to liberate Taychend from the evil depredations of slavers while being guided by Saerasyar, the Precursor spellblade of Munakles himself!\n\n§YDesigner§!: Iceytheknight\n§YCoder§!: Blaziy\n§YWriter§!: Takasaki"
 LANDING_missions_J74_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_J75_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Rakkabuttai
 missions_J75_desc:0 "This country has a custom mission tree"
 LANDING_missions_J75_TEXT:0 "Protect Taychend from others - and itself - as Rakkabuttai, home of the Brotherhood of the Bloody Cloak. Expand the Brotherhood's ranks and hone your army's skills, create fortified fortresses throughout Taychend, and vanquish the invaders who seek to destroy Taychendi tradition.\n\n§YDesigner§! and §YCoder§!: Iceytheknight\n§YWriter§!: Takasaki"
 LANDING_missions_J75_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_J78_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Uesrennu
 missions_J78_desc:0 "This country has a custom mission tree"
 LANDING_missions_J78_TEXT:0 "Rats. Invade Taychend with your swarm. Rats. Use Taychend to feed your swarm. Rats. Expand your mines with ever more slaves (the swarm nests there). Rats. Crush your people revolting, even with your broken swarm, or use the rats you've stolen to topple the tyranny. Rats.\n\n§YDesigner§! and §YCoder§!: Raist\n§YWriters§!: Raist, Takasaki"
 LANDING_missions_J78_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_J81_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Parahechend
 missions_J81_desc:0 "This country has a custom mission tree"
 LANDING_missions_J81_TEXT:0 "With a cunning trick and a crushing maul, unite Taychend under the tyranny of the Rakulacan as Parahechend! Make deals with the Outsider Guilds and gain bonuses from corruption, upgrade your scythed chariots, and, as Cannorians arrive, make a deal with an umbral exile for eternal power.\n\n§YDesigner§! and §YWriter§!: Takasaki\n§YCoder§!: Blaziy"
 LANDING_missions_J81_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L01_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Kuiika
 missions_L01_desc:0 "This country has a custom mission tree"
 LANDING_missions_L01_TEXT:0 "Horashesh is free, and it shall stay free. As Kuiika, rebuild the ancient Legions of Kui no matter the cost, bring retribution to those that betrayed Kui's Empire, and revive the wonders of the Kuiika Gamyi!\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Scamp"
 LANDING_missions_L01_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L03_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Isagumze
 missions_L03_desc:0 "This country has a custom mission tree"
 LANDING_missions_L03_TEXT:0 "For centuries, the Ikilshebe have stood as the only fortress defending civilization from the vile Lizardfolk threat. For centuries the noble Kulugi Abe have fought and bled and died to defend Horashesh from the scaled menace, all in the name of the War God Nyokyora. But times are changing, and now it is the time for action. Grab your flaying knife and your lizardskin armor, for it is time to bring war to the scaled ones. And perhaps we will learn a thing or two about what fate has in store for the Ikilshebe people.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Chunguito"
 LANDING_missions_L03_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L04_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Saqraxat
 missions_L04_desc:0 "This country has a custom mission tree"
 LANDING_missions_L04_TEXT:0 "Slavery is the lifeblood of the Saqraxati political economy. In that respect, they have much in common with their despised gnollish neighbours, the same demons responsible for the fall of Saqraxat’s greatest benefactor in Kheterata. Using your own gnoll slave soldiers, cast out these foul invaders and prove yourself Kheterata’s most devoted subject. But, take care you don’t fall victim to the same temptations that enticed the gnolls as you unleash your slave armies upon Horashesh.\n\n§YDesigner§! and §YWriter§!: blindblind\n§YCoders§!: krazyshadow, Bonbonny, Jothell"
 LANDING_missions_L04_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_L06_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Zena
 missions_L06_desc:0 "This country has a custom mission tree"
 LANDING_missions_L06_TEXT:0 "From the ashes of defeat, Zena envisions a new age. With silver tongues and clever treaties, unite the tribes of Horashesh and shake hands with the Parura. Travel to find relics, tame beasts, and chart the Effelai. Build a radiant haven for all races; Bivuzena will soon be the envy of Halann!\n\n§YDesigner§!, §YCoder§! and §YWriter§!: Bromar"
 LANDING_missions_L06_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L08_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Kulugiash
 missions_L08_desc:0 "This country has a custom mission tree"
 LANDING_missions_L08_TEXT:0 "The fractious Medasi are characterized by an intractable division between the native elite and their now untethered colonial governors. Struggle to manage this split as the Medaka of Kulugiash. Balance the interests of both parties as you develop a premier tradition of military leadership and breed the native quagga into the most reliable warhorse the continent has ever seen. Ultimately, answer the question of if a regime of such stark contradictions can truly stand.\n\n§YDesigner§! and §YWriter§!: blindblind\n§YCoder§!: krazyshadow"
 LANDING_missions_L08_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L09_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Zuvavim
 missions_L09_desc:0 "This country has a custom mission tree"
 LANDING_missions_L09_TEXT:0 "The Kheterata Empire is gone and with it peace in Horashesh. Our enemies and former allies alike wish us dead, but our great fleet promises unlikely allies in the Vyzemby halflings. Through the power of naval might and halfling support, Horashesh will be ours!\n\n§YDesigner§! and §YCoder§!: Marie\n§YWriter§!: Scamp"
 LANDING_missions_L09_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L36_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Lelanàn
 missions_L36_desc:0 "This country has a custom mission tree"
 LANDING_missions_L36_TEXT:0 "A new Chosen of Lel has been carefully trained, and though her path will not be easy, one day she might just rise to lead the Paladins of Lel in reclaiming the lost shrine to Kolo and showing all the Vyzemby that there is only one true Matriarch worthy of elevation amongst the Nakazy Avo. Her path does not end there, though, as Lel's Love is boundless, and if Halann is to heal then all must know and bask in the glory of Lel's loving gifts; no matter their gender or race.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Sapphic Goddess"
 LANDING_missions_L36_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L37_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Mihitarab
 missions_L37_desc:0 "This country has a custom mission tree"
 LANDING_missions_L37_TEXT:0 "A new king rises in Mihitarab, one blessed by circumstance and the arcane to unite Fahvanosy. But not all is easy; the jungles are a realm of ancient evil, and the dark secrets hidden there for centuries look to step out of the shadows.\n\n§YDesigner§! and §YCoder§!: Marie\n§YWriter§!: Wilyape"
 LANDING_missions_L37_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L53_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Tiboktsamo
 missions_L53_desc:0 "This country has a custom mission tree"
 LANDING_missions_L53_TEXT:0 "Generations upon generations have passed since the fall of the Ananoma. In those dark days, the goddess Jyva prophesized the return of Kolo's people to our great cities. Tiboktsamo, the Southern Tower, are the only true heirs of Kolonama. Neither the cowardly Rayafosi, who disgraced themselves and fled, nor the traitors and squatters residing in what they call the city of 'Kunolo’, can claim such. Fulfill the prophecy, become the Kolovadoy, and do it alone or not at all.\n\n§YDesigner§! and §YWriter§!: Archsteel\n§YCoders§!: Archsteel, Jothell"
 LANDING_missions_L53_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L55_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Naléni
 missions_L55_desc:0 "This country has a custom mission tree"
 LANDING_missions_L55_TEXT:0 "As the vile and greedy Raheni colonisers set their sights on Sarhal, the factional divisions between the Pirate Odanchesta and the Harpy Matriarchal come to a head. Steer the ship of state through these tumultuous times and emerge on the other side as a united Harpy Thalossocracy, ruling over not merely the Mengi but Rahen too, all united by the bountiful waters of the Naléni Gulf.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Liv"
 LANDING_missions_L55_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L62_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Vandipha
 missions_L62_desc:0 "This country has a custom mission tree"
 LANDING_missions_L62_TEXT:0 "The wealth of Rahen was built on the back of slaves, and someone has to deliver them. As Vandipha, form a new, cooler Raj in Madriamelak, with slavery, slavery, and even more slavery. Cover the chains of your slaves in gold as you erect a decadent thalassocracy of harimari upon the glittering seas of Sarhal and Haless.\n\n§YDesigner§! and §YCoder§!: LVT\n§YWriters§!: de sterrennacht, LVT"
 LANDING_missions_L62_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L68_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Karassk
 missions_L68_desc:0 "This country has a custom mission tree"
 LANDING_missions_L68_TEXT:0 "The eternal empire still stands high and mighty from its capital in Karassk. Of course in the recent centuries we have suffered some setbacks, but only minor. We shall retake the imperial territory lost in Horashesh, revoke the autonomy we once graciously granted to the halflings, and make sure the rest of the lizardfolk know what we are certain is true. We shall give special exemptions and powers to the loyal Khair that serve us, and let loose the beasts of the sea, as the red and black flag flies across the seas of Sarhal.\n§YDesigner§!: N'wah\n§YCoders§!: N'wah, Okman\n§YWriters§!: Cappadocia, N'wah"
 LANDING_missions_L68_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_L69_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Zerat
 missions_L69_desc:0 "This country has a custom mission tree"
 LANDING_missions_L69_TEXT:0 "Restore yourself to your rightful place as the 332nd empire, reclaiming Taneyas from the traitors and monsters who inhabit it. Expel the humans who dare to sit on our Zatsarya and establish an empire worthy to be the foundations of the Final Empire.\n\n§YDesigner§!: Wdfrodo\n§YCoder§!: Mike\n§YWriters§!: Wdfrodo, Fantastic Kitten\n§YArtist§!: AdamT"
 LANDING_missions_L69_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L70_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Khugra
 missions_L70_desc:0 "This country has a custom mission tree"
 LANDING_missions_L70_TEXT:0 "A silent war rages in the Sapphire City of Khugra. Three treacherous factions seek to sell the nation to their preferred masters. Only the Sapphire Party can destroy these would-be oppressors and put an end to the War of Colors once and for all. Afterwards, rekindle your ties with the celestials of the sea, as you help them search for something long lost. Sail to every corner of the sea during this ordeal, bringing halflings, humans and ruinborn alike under the benevolent rule of the Sapphire… together with their riches, of course.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Chunguito"
 LANDING_missions_L70_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_L80_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Zulbur
 missions_L80_desc:0 "This country has a custom mission tree"
 LANDING_missions_L80_TEXT:0 "Join the bards of the Ashhana and hear the Tale of Relork as you unify the scattered lands of Northern Taneyas into a true kingdom worthy of the glory of art. Seek to understand the varieties of art held amongst the Ashhana and display them all in your capital.\n\n§YDesigner§! and §YWriter§!: wdfrodo\n§YCoder§!: Parkor"
 LANDING_missions_L80_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L76_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Gasha
 missions_L76_desc:0 "This country has a custom mission tree"
 LANDING_missions_L76_TEXT:0 "In the Gashari jungle, the Blood Curse binds the flesh of the Ashhana and the roots of the trees together into a single suffering body. Guided by the visceral wisdom of the Blood Druids, the Shrouded Circle, and the Seer, purge stagnation and hunt down those who deny themselves a release from the burden of the Curse. You must feed the land with your conquests, for each death loosens the grip tightening around your veins. Reject the false peace offered by art and find salvation in bloodshed. Make the world breathe through blood - or choke on it.\n\n§YDesigner§! and §YCoder§!: LVT\n\n§YWriters§!: Jeck, LVT"
 LANDING_missions_L76_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_L77_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Karach
 missions_L77_desc:0 "This country has a custom mission tree"
 LANDING_missions_L77_TEXT:0 "Workers are like words in a poem: apart they carry mere fragments of meaning, but together they can create something wonderful. Unite Karach against the rapacious rule of its chieftains! Bring all its people together, and through their labor create a realm of truth and art.\n\n§YDesigner§! and §YCoder§!: Leaffrog\n§YWriter§!: Fantastic Kitten"
 LANDING_missions_L77_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L81_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Yassa
 missions_L81_desc:0 "This country has a custom mission tree"
 LANDING_missions_L81_TEXT:0 "Follow the chaotic whimsy of the Council of Fools, whose baffling decrees may yet be the key to fulfilling the long-lost dream of King Aethorn: to establish thriving merchant communities across southern and eastern Sarhal and along the coasts of Haless. Welcome foreign traders and strange legends alike, and carry their tales back to Yassa. Seek a cure for the Ashhana. Uncover the truth of the mysterious 330th Empire and, perhaps, claim its forgotten legacy.\n\n§YDesigner§! and §YCoder§!: Leaffrog\n§YWriters§!: Leaffrog, Carpe Verpa"
 LANDING_missions_L81_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L95_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Rayaz
 missions_L95_desc:0 "This country has a custom mission tree"
 LANDING_missions_L95_TEXT:0 "Embark on a rapid conquest spree as Sykar Riverclaw, the prophesied bringer of the Final Lizardfolk Empire. Empower the Naga and bear the fruits of their influence over the whole of Taneyas as you overcome the issues that may, or may not, see your allies turn on you.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Meander"
 LANDING_missions_L95_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_L96_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Asarta
 missions_L96_desc:0 "This country has a custom mission tree"
 LANDING_missions_L96_TEXT:0 "I need answers: why did the naga choose my brother instead of me to lead the Final Empire? I will show them how wrong they were… but changing fate is not simple. One must look to the stars, the spirits, the araizary. Reclaim stolen land and explore the oceanic depths.\n\n§YDesigner§! and §YWriter§!: Scamp\n§YCoders§!: Ziwik"
 LANDING_missions_L96_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_R07_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Rajnadhaga
 missions_R07_desc:0 "This country has a custom mission tree"
 LANDING_missions_R07_TEXT:0 "Form the League of Shamakhad and destroy The Command, reclaiming your land from the hobgoblin invaders. Bring about a golden age of philosophy and unite Rahen as the Heir of the Nadimraj!\n\n§YDesigner§! Attalus"
 LANDING_missions_R07_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_R08_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Tiltaghar
 missions_R08_desc:0 "This country has a custom mission tree"
 LANDING_missions_R08_TEXT:0 "The loyal northern Prabhi of the Lotus Throne. Make your plays against the Ruin Kingdoms, unite Nadimraj and put an end to The Command's campaign of terror. Reform the realm, help restore the North of Rahen and make your moves to proclaim a Northern Raj.\n\n§YDesigners§! and §YCoders§!: Gilly, TheForsaken\n§YWriter§!: Smithington"
 LANDING_missions_R08_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_R11_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Khadisrapur
 missions_R11_desc:0 "This country has a custom mission tree"
 LANDING_missions_R11_TEXT:0 "Adventurers Unite! The proud Hero-Prince Himmat Pirvand calls once again, to sally forth in one final assault against The Command! Defeat the hobgoblin monsters and set free all good people of Rahen, bringing orcs, goblins, and humans into an era of peaceful industrialization under your Heroes' Guild!\n\n§YDesigner§!: Civi\n§YCoder§!: Bonbonny\n§YWriter§!: Bojnik434, Jeck, Civi"
 LANDING_missions_R11_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_R21_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Sarisung
 missions_R21_desc:0 "This country has a custom mission tree"
 LANDING_missions_R21_TEXT:0 "Unite the gangs, civilize the city, rule the river, and rise as a nation of great cities.\n\n§YDesigner§! Infin"
 LANDING_missions_R21_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_R36_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Endhuvi
 missions_R36_desc:0 "This country has a custom mission tree"
 LANDING_missions_R36_TEXT:0 "To most, a river is a means to an end. Be it trade or leisure, a river is a river. However, in Endhuvi, that is up for debate... as are most things, it seems. Our beliefs must flow as the mighty Kharunyana does, for as a river changes its course, so too does the beliefs of a nation. Is the great river more than it seems? Explore its secrets, revel in its glory, and look at the pretty fish...\n\n§YDesigner§! and §YWriter§!: Kiros\n§YCoder§!: Fahes"
 LANDING_missions_R36_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_R38_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Bhuvauri
 missions_R38_desc:0 "This country has a custom mission tree"
 LANDING_missions_R38_TEXT:0 "A slave revolt that broke free of their chains, but not of the old, oppressive systems. Rich beyond measure, they find themselves surrounded by enemies and reliant on slavery... See them through a total governmental reform, and break free of the last chains: those of the mind.\n\n§YDesigner§!: Edward\n§YCoder§!: Bonbonny\n§YWriter§!: Enkelados"
 LANDING_missions_R38_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_R51_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Dhenijanraj
 missions_R51_desc:0 "This country has a custom mission tree"
 LANDING_missions_R51_TEXT:0 "The Lotus Throne has decayed into corruption and decadence. But if it can be guided past this dereliction, the Raja might once again rule the mightiest empire Haless has ever known: The Harimraj.\n\n§YDesigner§! and §YCoder§!: Karlov\n§YWriters§!: Karlov, Skorkab"
 LANDING_missions_R51_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_R52_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Rabhidaraj
 missions_R52_desc:0 "This country has a custom mission tree"
 LANDING_missions_R52_TEXT:0 "Only Manava is holding the Raj back from the abyss. But while our ruler is a paragon of virtue and a harimari without equal, our nation is not strong enough to enact his will. Honour his memory by correcting that, increasing our reach and power as the Vizier; then, eradicate all corruption in the Raj, by any means necessary.\n\n§YDesigner§!: Deus Natura"
 LANDING_missions_R52_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_R54_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Parusahan Saya
 missions_R54_desc:0 "This country has a custom mission tree"
 LANDING_missions_R54_TEXT:0 "Reforge The Iron Raj, wrench the Raj from the depths of corruption, reshape the Ministries, and uncover the hidden secrets of the ancient Harimari Empire. Explore the story of its enigmatic leader Hemantsen and his wife Rani Jira as they harrow the roots of society.\n\n§YDesigner§! and §YCoder§!: Stu\n§YWriter§!: Reti"
 LANDING_missions_R54_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_R61_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Pasiragha
 missions_R61_desc:0 "This country has a custom mission tree"
 LANDING_missions_R61_TEXT:0 "Pasiragha, home of the Hall of Endless Debate, calls to philosophers, theologians and sages from across Rahen and beyond. Welcome them in and use their assembled wisdom to create a true philosopher's kingdom!\n\n§YDesigner§! and §YCoder§!: Toastawaffle\n§YWriters§!: Toastawaffle, Alaska"
 LANDING_missions_R61_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_R62_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #The Command
 missions_R62_desc:0 "This country has a custom mission tree"
 LANDING_missions_R62_TEXT:0 "Bring the continent to heel with your ruthless and disciplined armies, as you teach the peoples of Haless what it means to serve the Command. But beware - mages lurk in the shadows, and the unity of the War Room may prove to be a fragile thing...\n\n§YDesigners§! and §YCoders§!: Biegeltoren, Elefante, Bonbonny\n§YDesigner§!: Rat\n§YWriters§!: Theia, pwhprov, R at(4V), Alectron, Gort, writer, CatoHunter, Carpa Verpa, Mani E., Skorkab, Xaph, Parker, Memegraaf, MBP, Ragingrage, Biegeltoren, Bonbonny, Elefante, Trashboat, Thurinsen, Loveland, Dwain The Humster"
 LANDING_missions_R62_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_S15_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Karshyr
 missions_S15_desc:0 "This country has a custom mission tree"
 LANDING_missions_S15_TEXT:0 "Succeed in your revolution against your decadent overlord in Karassk and remove the treacherous naga from your Island once and for all. Meet the world outside of Taneyas, from your friends in Amiratsamo to the lands and wealth of Cannor. Monopolise the Gulf with your Aquaculture and Galleys, using that wealth to overthrow the false ideas of Prophecy and embrace the Light of Ravelianism.\n\n§YDesigner§!: wdfrodo\n§YCoder§!: Creatively Bankrupt\n§YWriters§!: .Simetra, wdfrodo"
 LANDING_missions_S15_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_S23_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Hisost Yamok
 missions_S23_desc:0 "This country has a custom mission tree"
 LANDING_missions_S23_TEXT:0 "Blood has been split, a nation beheaded, a daughter orphaned. Take control of the destiny of the great Seble zor Melas-Sanzon and lead her in a path of conquest and righteous justice. Together with help from the gnolls and the divine wind at her back, Seble will set right the wrongs of history and earn revenge on Rahen. But be warned, when a great queen dies, often what follows is not what was forseen...\n\n§YDesigner§! and §YCoder§!: Liv\n§YWriters§!: Liv, Altonym, Cappadocia"
 LANDING_missions_S23_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_S30_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Death Bringing Cobra
 missions_S30_desc:0 "This country has a custom mission tree"
