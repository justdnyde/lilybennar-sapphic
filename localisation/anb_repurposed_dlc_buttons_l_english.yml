 DLC_missions_U01_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Kheterata
 missions_U01_desc:0 "This country has a custom mission tree"
 LANDING_missions_U01_TEXT:0 "Not in living memory has Kheterata been in such crisis. Tracts of territory ceded to sun cultists, gnolls massing at the gates, authority critically eroded; whichever state seeks to stagger out from all of this must assert control, and do so right now.\n\nCrush the burgeoning rebellion, restore your ancient colonies in Businor, and exert Kheteratan influence from Anbenncost to Zerat.\n\n§YDesigner§! and §YCoder§!: Auirus\n§YWriter§!: Mr Paperbugs"
 LANDING_missions_U01_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_U02_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Nirat
 missions_U02_desc:0 "This country has a custom mission tree"
 LANDING_missions_U02_TEXT:0 "Not in living memory has Kheterata been in such crisis. Tracts of territory ceded to sun cultists, gnolls massing at the gates, authority critically eroded; whichever state seeks to stagger out from all of this must assert control, and do so right now.\n\nTriumph over the old order as Nirat's High Temple, spread the divine mothers blessing throughout Sarhal, and exert Kheteratan influence from Akasik to Zerat.\n\n§YDesigner§! and §YCoder§!: Auirus\n§YWriter§!: Mr Paperbugs"
