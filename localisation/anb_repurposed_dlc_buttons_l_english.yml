 missions_Y59_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y59_TEXT:0 "The greatest ruler of Thirabnir is reaching the end of his life, right as the Townships have embroiled themselves in a set of conflicts that could change it forever.\nBut where two fight, the third one always comes on top. Why wouldn't he do the same here? (Forms Thangoya alongside Lo Ngoen and Khao Elnak)\n\n§YDesigner§! and §YCoder§!: Meander\n§YWriters§!: Meander, Memegraaf"
