 DLC_missions_Y13_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Jiangdu
 missions_Y13_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y13_TEXT:0 "The rebellious state of Lanjinhui and their allies in Balrijin have pushed us to the brink, and forced us back to our capital. But from the brink comes new hope. We are the men of Jiangdu, the world's greatest generals. Dye the blue scarves red and continue the march until we become lords of war with a city of thousands, and all of Yanshen is united under the Yellow Dragon.\n\n§YDesigner§!: Abis"
