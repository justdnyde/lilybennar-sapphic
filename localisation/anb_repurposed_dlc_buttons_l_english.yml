 DLC_missions_A60_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Asheniande
 missions_A60_desc:0 "This country has a custom mission tree"
 LANDING_missions_A60_TEXT:0 "Using diplomacy, ascend as the ruler of the Blood Court and unite Anbennar under a grand masquerade. Fight against the midnight monarchy and secure the Ashen Raven’s place as the realm of the Vampires in Cannor.\n\n§YDesigner§!, §YCoder§!, and §YWriter§!: Imacop42"
 LANDING_missions_A60_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
