 DLC_missions_Y60_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Lo Ngoen
 missions_Y60_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y60_TEXT:0 "After the defeat under Lektonmai, the pride of the Lo Ngoen people is wounded, but not broken. Having elected a hero of the previous war, they look to get back what is theirs and make amends to those who wronged them... while said hero learns how to govern a country. (Forms Thangoya alongside Thirabnir and Khao Elnak)\n\n§YDesigner§! and §YCoder§!: Meander\n§YWriters§!: Meander, Memegraaf"
 LANDING_missions_Y60_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y62_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Khao Elnak
 missions_Y62_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y62_TEXT:0 "With the recent loss, Khao Elnak lost most of its precious stables. Lo Ngoen proved a lacking ally, so a new, more powerful one is needed to secure our rightful land. Maybe the ruler's father, a renowned Dauloph, could arrange a marriage between them and the Methnikren of Lot Dekkhang? (Forms Thangoya alongside Lo Ngoen and Thirabnir)\n\n§YDesigner§! and §YCoder§!: Meander\n§YWriters§!: Meander, Memegraaf"
 LANDING_missions_Y62_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y63_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Verkal Ozovar
 missions_Y63_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y63_TEXT:0 "The Nephrite Dwarves once claimed dominion over all Thidinkai, but their influence has greatly diminished. Intervene in the War for Baihon Xinh, refine your runic magic, and build the Runethought Network to spread your influence across all of Vimdatrong - and beyond!\n\n§YDesigners§!: Elefante, trashboat\n§YCoder§!: Elefante\n§YWriter§!: Enleiv, trashboat"
 LANDING_missions_Y63_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y65_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Arawkelin
 missions_Y65_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y65_TEXT:0 "The Jewel of the South. Help the rising kingdom of Arawkelin find its place in the land of Spirit Worshippers and Raheni Traders. Conquer Lupulan and set up a massive deforestation campaign, colonize the Ringlet Isles and monopolize the East Sarhaly coffee trade. Embrace the Cannorians, convert to Ravelianism and reform into a modern state for the Kelino people.\n\n§YDesigners§!: Amanda, TheForsaken\n§YWriter§!: Jikusen"
 LANDING_missions_Y65_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y72_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Chien Binhrung
 missions_Y72_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y72_TEXT:0 "Twilight descends in Vimdatrong, and the warlords of the region prepare for a war that will determine who rules and who is conquered. Guide the Binhrung people as queen, receive help from those that came before you, and monopolize the gem market as you unite Vimdatrong in this Mission Tree designed to give players a (relatively) simple introduction to Haless!\n\n§YDesigner§! and §YCoder§!: Everest\n§YWriter§!: Indi"
 LANDING_missions_Y72_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y85_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Balrijin
 missions_Y85_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y85_TEXT:0 "Where art thou, oh great Father? Your children call to you, yet you give no response. We are beset on all sides by enemies, and we only wish for your guidance. Father, what have we done to upset you so, for you to forsake us in our time of need?\n\n§YDesigner§!: Batavi"
 LANDING_missions_Y85_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y86_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Azkare
 missions_Y86_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y86_TEXT:0 "Follow the dreams of a recently elected idealistic elf as you unite all of Haless under the rule of the Sunrise Empire. Establish a representative parliament in which the voices of Haless can be heard and guide them into the future with the steady rule that comes with elven lifespans. Carefully manage the representation of various peoples for unique benefits. Beat back the evils of Haless so that all of its citizens may enjoy a never before seen era of peace and prosperity.\n\n§YDesigner§!: Amanda\n§YWriter§!: Stone"
 LANDING_missions_Y86_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y89_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Yuanszi
 missions_Y89_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y89_TEXT:0 "Haless, land of ancient pride... a rotting, crumbling wreck! Deceive fools by joining the Xia and turning it into a new, thundering heart of operations. Spreading the Devouring Path through the rest of Haless by way of trade and trickery, before Devouring them by surprise when the Rending of Realms comes calling.\n\n§YDesigner§!: Astera\n§YCoder§!: Bonbonny\n§YWriter§!: Memegraaf"
 LANDING_missions_Y89_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Y97_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Baihon Xinh
 missions_Y97_desc:0 "This country has a custom mission tree"
 LANDING_missions_Y97_TEXT:0 "Sang Caoban - the man who reforged Baihon Xinh with nothing but the sweat on his palms. But he grows old, and his sons seek the dissolution of his realm. Unrest festers in the night, and every shadow hides a knife. It is enough to drive a lesser man to death. But Sang Caoban is no lesser man, and death will not claim him so easily… \nHis surviving son, however, will not let this pass, and a battle for this ancient throne is on the horizon.\n\n§YDesigner§! and §YCoder§!: Tators\n§YWriter§!: Grymhar"
 LANDING_missions_Y97_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z03_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Bellacaire
 missions_Z03_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z03_TEXT:0 "After the collapse of Dameria, the lands of the Luna were left to fend for themselves. As a Luna River Minor, weave a web of influence and Sway the Empire to your side. Every move, however small, has a purpose. Hear this, compassionate Bellacaire - do not go gentle into that good night! A dream lies in your future, a dream of unity. Of Pashaine. And later… of Blackpowder.\n\n§YDesigner§! and §YCoder§!: LVT\n§YWriters§!: altonym, LVT"
 LANDING_missions_Z03_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z08_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Bjarnrík
 missions_Z08_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z08_TEXT:0 "The crown of Bera shakes at its foundation, factionalism threatens to destroy the kingdom of the Bear from the inside. Reunite a broken realm, unite Gerudia and forge a new modern age for the people of the cold north. Travel across the sea to a lost land a build a transcontinental empire.\n\n§YDesigner§!: Jhorgas"
 LANDING_missions_Z08_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z15_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Urviksten
 missions_Z15_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z15_TEXT:0 "They thought us illegitimate. They thought us broken. They thought us dead. That we would rot away in our ancestral homeland, and meet our end. That we could never reclaim our birthright, that we would never retake what was ours and was taken. That the Black Dragon would never rise again. They thought they had heard the last of the Ebonfrosts. They thought wrong. We shall rise, uniting our own to claim the ashes of Escann and forge the Greatest of Empires anew.\n\n§YDesigner§!: Edward"
 LANDING_missions_Z15_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z17_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Obrtrol
 missions_Z17_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z17_TEXT:0 "Trollkind tired of puny humans living free in our land. We take it back, for giantkind, eat them up. Maybe learn along the way what it means to make a real kingdom, like the giants once had.\n\n§YDesigner§!: Oxtrooo"
 LANDING_missions_Z17_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z18_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Frozenmaw
 missions_Z18_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z18_TEXT:0 "Follow the most powerful of the Gray Orc clan as they consolidate their control over the recently conquered White Reachmen and reckon with the resultant social blending. Then, form Grombar and dominate the north as an absolutist Gray Empire.\n\n§YDesigners§!: Brosur, AugmentingPath\n§YCoder§!: AugmentingPath\n§YWriters§!: AugmentingPath, Pakman, Palks"
 LANDING_missions_Z18_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z19_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Broken Jaw
 missions_Z19_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z19_TEXT:0 "Defy Frozenmaw, befriend trolls and mammoths, and keep your oaths with the righteous Chieftain Jayuk. Then, go on to form a republican Grombar and dominate the north.\n\n§YDesigner§! and §YCoder§!: bruhh\n§YWriters§!: altonym, AugmentingPath"
 LANDING_missions_Z19_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z22_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Celmaldor
 missions_Z22_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z22_TEXT:0 "Third and smallest of the Elven fleets who settled in the east, Celmaldor is but a footnote next to the histories of Anbennar or the Phoenix Empire. The merchant clans have a more all encompassing pursuit: wealth. The other elves may have a head start, but through negotiation, legislation and unspeakably vast amounts of trade steering, the northernmost Elfrealm will make its mark on the world and wield influence across all continents.\n\n§YDesigner§! and §YCoder§!: Susurrus\n§YWriters§!: Susurrus, .Simetra, Druplesnubb, Georgius Agricola, Bojnik, Jikusen"
 LANDING_missions_Z22_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z26_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Adshaw
 missions_Z26_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z26_TEXT:0 "A once-powerful kingdom, reduced to a shell of its former self. The lords of Adshaw may have been above petty scheming once, but times change, and Adshaw changes with them. Take revenge, forge a realm anew, and claim the mantle of the Reach for yourself!\n\n§YDesigner§!: Creekj"
 LANDING_missions_Z26_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z60_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Tsukqiao
 missions_Z60_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z60_TEXT:0 "Long ago, the Beikling people ruled an Empire of Terror that spread far and wide across their hills and beyond. Centuries have passed since this realm’s demise and ever since its people have lived in ruin, destined to be forgotten by history. But a family now seeks to reject that destiny. The Xion Dynasty, last of the Free Beiklings, now aspires for more. Claim your legacy, lie your way into glory, and forge the Empire anew. Let them learn why your people are called "The Demon Men".\n\n§YDesigner§! and §YCoder§!: TheForsaken\n§YWriters§!: TheForsaken, Georgius Agricola"
 LANDING_missions_Z60_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE
 
 DLC_missions_Z68_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Toarnaire
 missions_Z68_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z68_TEXT:0 "Schemes and blood; Toarnaire is made of these as much as wood and stone. A deadly poison, a dagger hidden behind your back and a disarming smile, those are the tools you will need to make it to the top, to rule Roilsard and the Winebay. But be careful, Toarnaire isn't the City of Envy for nothing...\n\n§YDesigner§! and §YWriter§!: Crist\n§YCoder§!: Intrepid"
 LANDING_missions_Z68_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE

 DLC_missions_Z88_TOOLTIP_INSTANT:0 "§YCustom Mission Tree§!" #Vængheim
 missions_Z88_desc:0 "This country has a custom mission tree"
 LANDING_missions_Z88_TEXT:0 "Experience the Tale of Vaengheim, greatest of the Gerudian sagas. Lead the harpies to triumphs over man and monster, to distant fabled shores, to ruins old and caverns deep. Fulfill your duty as the Guardians of Elkaesal, and end the threat of the White Dragon’s Winter for time everlasting.\n\n§YDesigner§! and §YCoder§!: Liv\n§YWriters§!: Liv, Secretcalder"
 LANDING_missions_Z88_FLAVOR_TEXT:0 "" #THIS SHOULD BE EMPTY, EDIT THE ONE ABOVE


