 missions_A61_desc:0 "This country has a custom mission tree"
 LANDING_missions_A61_TEXT:0 "After the collapse of Dameria, the lands of the Luna were left to fend for themselves. As a Luna River Minor, weave a web of influence and Sway the Empire to your side. Every move, however small, has a purpose. Hear this, noble Bluehart - do not go gentle into that good night! A dream lies in your future, a dream of unity. Of Pashaine. And later… of Blackpowder.\n\n§YDesigner§! and §YCoder§!: LVT\n§YWriters§!: altonym, LVT"
