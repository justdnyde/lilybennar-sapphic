 #Conversion Event Chain
 bawa_simpat.1.t:0 "Reprieve from Life’s Trials"
 bawa_simpat.1.d:0 "A battle fought. A child lost. A village burned. Such things are commonplace among the Lupulan Rainforest, but the pain from such events weighs on rulers all the same. [Root.Monarch.GetName]’s rule has not been a pleasant one, and [Root.Monarch.GetSheHe] knows it all too well. The toll on the [Root.GovernmentName] has been great, and [Root.Monarch.GetName] blames [Root.Monarch.GetHerselfHimself] for the hardship. Lupulan has deemed nature to be as it is, but why does [Root.GetName] have to cope through such hardship?\n\nAs if a thought could be spoken to the wind, a strange twisting of light illuminates the room [Root.Monarch.GetName] resides in. A bright shining figure appears, arms outstretched as if providing the gift of their presence to the [Root.Monarch.GetTitle].\n\nA blessing. Words need not be uttered for it to be received. A mere thought will do."
 bawa_simpat.1.a:0 "Denying a benevolent spirit is a grave error."
 bawa_simpat.1.b:0 "Not every light at night is the torch of a friendly village."
 bawa_simpat.2.t:0 "The Burden of Rule"
 bawa_simpat.2.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] of [Root.GetName] sighs dejectedly as the procession before [Root.Monarch.GetHerHim] finally ends. Another festival, another holding of court, another religious matter. Try as [Root.Monarch.GetSheHe] might, the [Root.Monarch.GetTitle] cannot keep up with the necessities of running a country. Maybe it was a poor upbringing, maybe an accident, or maybe just a lack of inherent ability, but [Root.Monarch.GetName] knows [Root.Monarch.GetSheHe] is not quite capable enough for this position. As advisors retire to their quarters and the [Root.Monarch.GetTitle] retreats quietly to [Root.Monarch.GetHerHis] chambers, a voice calls out, so light that it is almost carried away by the wind. It calls for [Root.Monarch.GetName], beckoning [Root.Monarch.GetHerHim] around a corner. From the darkest corner of the room, two small glowing eyes peer into the [Root.Monarch.GetTitle]'s very soul, seeing [Root.Monarch.GetHerHim] for all [Root.Monarch.GetSheHe] is. The eyes glimmer warmly with a seeming friendliness as the same faint voice returns. It knows [Root.Monarch.GetName] struggles with the role placed upon [Root.Monarch.GetHerHis] shoulders. It can help ease this burden. All it asks for is a friend in [Root.Monarch.GetName], someone to rely upon in times of need."
 bawa_simpat.2.a:0 "Friend or Favor, I appreciate the help."
 bawa_simpat.2.b:0 "Could you make up for what I lack?"
 bawa_simpat.2.c:0 "I rule above my people as I rule over you. Do not overstep your place."
 bawa_simpat.3.t:0 "Nature Beckons"
 bawa_simpat.3.d:0 "It began with a roar from the jungle that shook our [Root.Monarch.GetTitle]'s very core. With almost no warning, a tide of spirits burst into [Root.Monarch.GetName]'s courtroom, a whirlwind of indignant shouts and cries of fear. The spirits wailed demands for one to step forward and confess to their grave misstep among the ethereal, but not a soul in the courtroom stepped forward. The [Root.Monarch.GetTitle] glared at them with eyes of cold fury until they left.\n\nThus began a trend; the local spirits of [Root.GetName] have begun shirking their loyalties to our [Root.Monarch.GetTitle]. Intimidating our people, refusing to speak to [Root.Monarch.GetName] even when directly addressed; even more bizarre behaviors have been seen in outlying villages. It has come to a head in the last week: a friendly spirit known for dancing with children and guiding travelers to our capital intentionally has led our hunters in circles for almost a week, demanding an answer as to who has defied the Great Lizard. None of them can give one."
 bawa_simpat.3.a:0 "The spirit has gone mad! Expel them from our land, and keep a guard on the children!"
 bawa_simpat.3.b:0 "We trusted them with our children! Something is amiss."
 bawa_simpat.4.t:0 "Who has Power?"
 bawa_simpat.4.d:0 "[Root.Monarch.GetName] paces slowly, deliberately, heading towards a clearing near the riverbank [Root.Monarch.GetSheHe] follows. It is known to many in the area that spirits both eminent and elusive can be found gathering here to commune with mortals, and it is the eminence that our [Root.Monarch.GetTitle] seeks today. [Root.Monarch.GetSheHe] beseeches the gathered spirits, who gaze back into [Root.Monarch.GetHerHim] with stone cold eyes. The [Root.Monarch.GetTitle] speaks with an almost naive innocence, imploring the spirits to give some insight as to why everything spiritual has gone awry. After [Root.Monarch.GetName] finally falls silent, one of the spirits, appearing as a shimmering clouded leopard, speaks.\n\n“You have invited a great and terrible evil into your ranks. Among your court of spirits and men, a darkness stalks closer with every passing day. This darkness stands in opposition to the Great Lizard Lupulan and presents a grave danger to the rainforest we call home. You must act to purge your ranks of this malignance.”"
 bawa_simpat.4.a:0 "I respect the natural order, but I can not allow a tide of spirits to ruin us!"
 bawa_simpat.4.b:0 "On my honor as [Root.Monarch.GetTitle], I will root this out immediately."
 bawa_simpat.5.t:0 "Voices in the Leaves"
 bawa_simpat.5.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] trudges through the undergrowth of the Lupulan, sweat dripping from [Root.Monarch.GetHerHis] brow and legs aching from a day's worth of travel through the rainforest. Angered spirits echo in the distance all around, unseen but making sure they are heard stalking the [Root.Monarch.GetTitle]'s personal retinue, or else twisting the path ahead to lead in no direction at all. As [Root.Monarch.GetName] lets [Root.Monarch.GetHerHis] vision narrow on the path before [Root.Monarch.GetHerHim], a chilling wind suddenly breaks [Root.Monarch.GetHerHis] focus, with the [Root.Monarch.GetTitle] turning to find all remaining soldiers of the retinue missing. The wind whispers in [Root.Monarch.GetHerHis] ear again. A voice.\n\nAn offer to [Root.Monarch.GetName]. A sprawling kingdom of untold opulence and strength radiant underneath the jungle canopy. One final unifier of the rainforest to bring both spirit and mortal alike to heel. A [Root.Monarch.GetTitle] of two planes, that must bow only before the great benefactor who made it possible from the very beginning.\n\nThe Whistling People of Tlagapatung speak in hushed whispers of the Lady in Stone, and her words linger in your ear now. Kneel before the true ruler of the spirit plane and all others will fall before you.\n\nAll you must do is take her hand."
 bawa_simpat.5.a:0 "I know of that place..."
 bawa_simpat.5.b:0 "Where she lies... we must seize it!"
 bawa_simpat.5.c:0 "I have been a fool. I will not be tempted into such falsehoods!"
 bawa_simpat.6.t:0 "The Price"
 bawa_simpat.6.d:0 "With Tlagapatung secured, our ruler stands before a dark, imposing statue. The people of this land whisper the name, "Semat Tidakhui", in regards to this figure. No mistaking it. She is your muse, and now that she has spent her energy and power helping you, it is time to help her.\n\nInstructions for a rite flash in [Root.Monarch.GetName]’s mind. The legs move without thought, the arms dangle in a pose, as if a puppeteer had finally finished weaving the strings. A strange pulse pushes [Root.Monarch.GetName]’s retinue back, winds from nowhere enveloping the [Root.Monarch.GetTitle].\n\nThe energy around [Root.Monarch.GetName] stutters. For a moment, there is a reprieve. The Lady in Stone is weak from the unmarked cycles of being restrained. [Root.Monarch.GetSheHeCap] has a chance. One chance."
 bawa_simpat.6.a:0 "Spirits test us in mysterious ways. Prove your loyalty."
 bawa_simpat.6.b:0 "Sever the bond, and get out of there!"
 bawa_simpat.7.t:0 "Always a Fool"
 bawa_simpat.7.d:0 "Heeheehee, I really do mean it! You were nothing more than a fool, even from the beginning! What folly to think you could simply walk away after accepting what I have so graciously bestowed. My gifts, my knowledge, and ultimately my bargain given to one so utterly weak. Your freedom was finally forfeit when you set foot upon this desecrated hallow. In truth, though, you surrendered it countless moons ago when I was but a whisper in the wind, one that you chose to embrace!\n\nI am the muse you longed for day after day. I am your most generous benefactor. I am Semat Tidakhui! I am the rightful ruler of this rainforest above the Great Lizard Lupulan! While you may have broken our bond, I will take all that I have given and what I let you keep. You will live the rest of your miserable life knowing what you could not have done without my aid!"
 bawa_simpat.7.a:0 "You lost it all, you can’t even speak."
 bawa_simpat.8.t:0 "Better the Evil you Know"
 bawa_simpat.8.d:0 "As [Root.Monarch.GetName] kneels before Semat Tidakhui, the Lady in Stone, a gleeful laughter fills the air around the statue. The [Root.Monarch.GetTitle]'s retinue surges forward to [Root.Monarch.GetHerHis] aid, but a hand lurches out to stop them from the figure prostrated before the statue. They pause, hearing the laughter in the cold wind pierce their very souls. [Root.Monarch.GetTitle] [Root.Monarch.GetName] stands up in a single fluid motion, staring with deadened eyes at soldiers drilled to give their lives for [Root.Monarch.GetHerHim]. Semat Tidakhui speaks.\n\n"You will kneel before me as you did [Root.Monarch.GetHerHim]. [Root.Monarch.GetHerHisCap] domain and all [Root.Monarch.GetSheHe] has conquered is mine in turn. I have led your people this far and will lead you further still, to unseen opulence and power. Rise again, and hail your Lady in Stone."
 bawa_simpat.8.a:0 "Hail the Ruler of our Planes!"
 bawa_simpat.9.t:0 "What is Power?"
 bawa_simpat.9.d:0 "The muse has continued to assist the rule of your state whenever possible. Your power is cemented, your people cheer your name, and your rivals have gone silent. With such a good partnership between you and your spiritual muse, nothing can stand in either of your way!\n\n…though, one thing still puzzles [Root.Monarch.GetName]. Who is this muse? A spirit suddenly appears one day, offers to help for nearly nothing, and your kingdom is now flowing in wealth and strength. Interactions between humans and spirits aren’t uncommon, by any means, especially in the Lupulan - but the relationships are generally more equal, more symbiotic. This… feels different. Doubt nags at the back of [Root.Monarch.GetName]’s head, before it quickly dissipates, the muse’s voice swirling in [Root.Monarch.GetHerHis] ears.\n\n“We have done well. It is only a matter of time before what we want is ours. But I must go now. You will speak to me soon.”"
 bawa_simpat.9.a:0 "The Presence is gone before you can respond."
