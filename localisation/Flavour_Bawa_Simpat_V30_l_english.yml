 #Others
 surrogate_of_the_surrounding_reform:0 "Surrogate of the Material"
 surrogate_of_the_surrounding_reform_desc:0 "The ruler of Bawa Simpat may go about day to day affairs with a cold smile and effortless grace, but in truth their actions are not their own and they sit as a figurehead for the living. The true leader of this realm is the maligned Great Spirit known as Semat Tidakhui, the Lady in Stone. Known for her wanton cruelty and ruthless ambition, she rules with an ever looming presence over her newly-wrought material domain."
