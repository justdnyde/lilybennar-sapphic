l_english:

 ###########################
 ### Mechanim Automatory ###
 ###########################
 
 building_automatory: "Mechanim Automatory"
 building_automatory_desc: "§TIf the province with this building has at least §Y15§! development, new §YMechanim§! will be spread from this province or adjacent provinces with existing §YMechanim§!. Each new §YMechanim§! minority created will cost §R1§! development§!.[artifice_automatory_mechanim]"
 artifice_automatory_mechanim.a: "\n§TOwning at least §Y1§! Mechanim Automatory will grant §Y1§! colonist and §G+15§! Global Settler Growth.\nEach additional Mechanim Automatory will grant §G+15§! Global Settler Growth, up to a maximum of §G+150§!.§!\n"
 automatory_trigger_tt: "One of the following must be true:\n   Has invention active: §YReverse-Engineered Mechanim§!.\n   Has invention active: §YIndustrialised Automatories§!.\n   Is settled Mechanim Tribe."
 mechanim_automatory_modifier_10: "Automatory-Fuelled Colonization"
 mechanim_automatory_modifier_09: "Automatory-Fuelled Colonization"
 mechanim_automatory_modifier_08: "Automatory-Fuelled Colonization"
 mechanim_automatory_modifier_07: "Automatory-Fuelled Colonization"
 mechanim_automatory_modifier_06: "Automatory-Fuelled Colonization"
 mechanim_automatory_modifier_05: "Automatory-Fuelled Colonization"
 mechanim_automatory_modifier_04: "Automatory-Fuelled Colonization"
 mechanim_automatory_modifier_03: "Automatory-Fuelled Colonization"
 mechanim_automatory_modifier_02: "Automatory-Fuelled Colonization"
 mechanim_automatory_modifier_01: "Automatory-Fuelled Colonization"
 mechanim_automatory_unlock_tt: "We will unlock the §GMechanim Automatory§! Manufactory, which will provide a §YColonist§! and §YGlobal Colonial Growth§! as our capacity to build new mechanim grows."

 #Organization
 estate_artificers_organization_pillar_expedition: "Artificer Organization: Gene Pillar Expeditionaries"
 estate_artificers_organization_pillar_expedition_desc: "Our 'artificers' are not true practioners of the craft, but instead looters of what can be scavenged from the Gene Pillars. Perhaps one day they will be more. Perhaps.\n\n[Root.getArtificeryBreakdownShort]"
 estate_artificers_organization_mechanim_base: "Artificer Organization: Mechanim"
 estate_artificers_organization_mechanim_base_desc: "Perhaps every mechanim is an artificer. Perhaps none of them are. When your very body is a creation blending magic with machine, and you may need to adjust it to fit the vision embedded in your kauga (or add a dozen extra limbs to your form), you hardly care about the label.\n\n[Root.getArtificeryBreakdownShort]"

 #Inventions
 #Tier 4
 artifice_invention_kraken_galleons: "Entombed Kraken Galleons"
 artifice_invention_kraken_galleons_desc: "A kraken is entombed within an enormous biometallic alloyed chassis, a shell in the shape of a battleship. Each Kraken has been bred and trained to view the ship as an extension of itself; it regards the crew as either a cluster of beneficial barnacles or beloved friends, depending on the sentimentality of the mariner you ask."
 artifice_invention_kraken_galleons.tt: "Enables §Y'Entombed Kraken Galleons'§! flagship module, which has the following modifiers:\nFleet blockade impact on siege: §G+2§!\nFlagship Durability: §G+100%§!"
 entombed_kraken_galleons: "Entombed Kraken Galleons" #Flagship modifier
 you_need_to_find_kraken_galleons: "Uncovered secrets of:\n[Root.getkrakenpillar]\n[Root.getholohanapillar]\n[Root.getsandwormpillar]\n"
 yes_kraken_pillar: "£yes£ §YFish & Kraken Gene Pillar§!"
 no_kraken_pillar: "£no£  §YFish & Kraken Gene Pillar§!"
 yes_holohana_pillar: "£yes£ §YHolohana Gene Pillar§!"
 no_holohana_pillar: "£no£  §YHolohana Gene Pillar§!"
 yes_sandworm_pillar: "£yes£ §YSavannah & Sandworm Gene Pillar§!"
 no_sandworm_pillar: "£no£  §YSavannah & Sandworm Gene Pillar§!"

 artifice_invention_spirit_munition: "Cannon-Bound Spirit Artillery Munitions"
 artifice_invention_spirit_munition_desc: "A spirit is compressed by arcane means into a tight conceptual cage of being. It is told, “you are a projectile”. When, upon landing, the conceptual cage shatters, the spirit is very eager indeed to prove it is not."
 you_need_to_find_spirit_munition: "Uncovered secrets of:\n[Root.getdragonpillar]\n[Root.getcollectorpillar]\n[Root.getkiamoapillar]\n"
 yes_dragon_pillar: "£yes£ §YDragon Gene Pillar§!"
 no_dragon_pillar: "£no£  §YDragon Gene Pillar§!"
 yes_collector_pillar: "£yes£ §YCollection & Experimentation Gene Pillar§!"
 no_collector_pillar: "£no£  §YCollection & Experimentation Gene Pillar§!"
 yes_kiamoa_pillar: "£yes£ §YDispersion & Magic Gene Pillar§!"
 no_kiamoa_pillar: "£no£  §YDispersion & Magic Gene Pillar§!"

 artifice_invention_bio_processor: "Mechanized Data Bio-Processor"
 artifice_invention_bio_processor_desc: "Only recently have sentient species on Halann rediscovered the immense power at hand when one combines the biddability of the machine with the infinitely recessive complexity of biological structures. Thankfully, the government can be trusted with this."
 you_need_to_find_bio_processor: "Uncovered secrets of:\n[Root.getforestpillar]\n[Root.getmechanimpillar]\n[Root.gethinuipillar]\n"
 yes_forest_pillar: "£yes£ §YForest Gene Pillar§!"
 no_forest_pillar: "£no£  §YForest Gene Pillar§!"
 yes_mechanim_pillar: "£yes£ §YMechanim Gene Pillar§!"
 no_mechanim_pillar: "£no£  §YMechanim Gene Pillar§!"
 yes_hinui_pillar: "£yes£ §YJungle & Fauna Gene Pillar§!"
 no_hinui_pillar: "£no£  §YJungle & Fauna Gene Pillar§!"

 #Mechanim
 artifice_invention_reverse_mechanim: "Reverse-Engineered Mechanim"
 artifice_invention_reverse_mechanim_desc: "We have long known the Mechanim: as dormant bodies strewn about the continent, and more recently, as beings of their own. But we have never known how to create more, only awaken the forms that were already there. Now, that has changed."
 artifice_invention_reverse_mechanim.tt: "§YMechanim Automatory§! will spread up to §Y20§! §YMechanim Minorities§! in provinces you own every §Y10§! years, §Rdepleting the development§! of the province the building is based in.\n"
 gain_access_to_automatory: "Gain the ability to build the Manufactory §YMechanim Automatory§!.\n"

 artifice_invention_industrial_automatories: "Industrialised Automatories"
 artifice_invention_industrial_automatories_desc: "The assembly-line production of Precursor automatories has been replicated on a smaller scale, with artifice replacing the technology we cannot decipher or engineer. Even this pale imitation has brought about a massive increase in mechanim production speed."
 artifice_invention_industrial_automatories.tt: "Gain the ability to build the Manufactory §YMechanim Automatory§!.\nAutomatories will spread up to §Y20§! §YMechanim Minorities§! in provinces you own every §Y5§! years, §Rdepleting the development§! of the province the building is based in.\n"

 artifice_invention_memory_module: "Cultural Memory Module"
 artifice_invention_memory_module_desc: "This artificed creation allows the delivery of cultural information and context to mechanim new to a given region, allowing mechanim to rapidly integrate with the local population."
 artifice_invention_memory_module.tt: "Every owned province with mechanim present gets '§YCultural Memory Module§!', giving the following effects:\nLocal Unrest: §Y-1§!\nLocal Autonomy: §G-0.05§!\nAdding §YCultural Memory Module§! to the old models can take up to §Y2§! years.\n"
 artifice_memory_module_modifier: "Cultural Memory Module"

 artifice_invention_fireproof_plating: "Fireproof Plating Artificer Auxiliaries"
 artifice_invention_fireproof_plating_desc: "Our developing understanding of mechanim construction now allows the forging of powerful chassis resistant to gunfire, the bearers of which serve as a protective guard on the flanks of our artificer regiments"
 artifice_fireproof_plating_modifier: "Fireproof Plating Artificer Auxiliaries"

 artifice_invention_okalu_scanners: "Okalu Scanners"
 artifice_invention_okalu_scanners_desc: "The okalu scanner works upon kauga to discover and restore access to memories lost during dormancy. Skill, experience and sometimes even elements of personality can be unlocked by such scans and used by mechanim for the benefit of the community."

 artifice_invention_pillar_scouts: "Gene-Pillar Scouts"
 artifice_invention_pillar_scouts_desc: "The dangerous and often hostile environs of unexplored Gene Pillars necessitate a design of mechanim equal to the challenge. Boasting multiple complex attachments to deal with a broad variety of hypothesised obstacles, scouts built for the purpose are always prepared."
 artifice_invention_pillar_scouts.tt: "Increases §YGene Pillar§! exploration speed by §G25%§!"

 artifice_invention_behavioral_chip: "Mechanim Behavioral Chip"
 artifice_invention_behavioral_chip_desc: "“If the mechanim are people, then they’ll do what we say. If they aren’t people, then we don’t have to pay them.”"
 artifice_invention_behavioral_chip.tt: "§GDoes not use an Artificer invention slot.§!\n\nEvery owned province with mechanim present gets '§YMechanim Behavioral Chip§!', giving the following effects:\nLocal Goods Produced Modifier: §G+25.0%§!\nAdding §YMechanim Behavioral Chip§! to the old models can take up to §Y2§! years."
 artifice_invention_behavioral_chip2.tt: "\n§REvery Mechanim produced at Automatory will lower our tolerance of them.§!\n"
 artifice_behavioral_chip_modifier: "Mechanim Behavioral Chip"

 artifice_invention_construction_bots: "Construction Bots"
 artifice_invention_construction_bots_desc: "“With the introduction of construction bots from Insyaa across the nation, ‘can we build it’ and ‘can we fix it’ have become obsolete questions. Yes, we can!”"
 artifice_invention_construction_bots.tt: "Every owned province with mechanim present gets '§YConstruction Bots§!', giving the following effects:\nLocal Local Construction Cost: §G-33.0%§!\nAdding §YConstruction Bots§! to the old models can take up to §Y2§! years."
 artifice_construction_bots_modifier: "Construction Bots"

 artifice_invention_mechanim_regiments: "Mechanim-Augmented Artificer Regiments"
 artifice_invention_mechanim_regiments_desc: "A contingent of mechanim now make up a small fraction of our artificer regiments. They are not particularly more effective. But they certainly save on the bodies."
 artifice_mechanim_regiments_modifier: "Mechanim-Augmented Artificer Regiments"

 artifice_invention_auto_scribes: "Auto-Scribes"
 artifice_invention_auto_scribes_desc: "The autoscribes of the nation do the work of low-level governance at a blazing pace, leaving its people free to engage in more productive, less boring pursuits."
 artifice_invention_auto_scribes.tt: "§YAutomatory§! building has §G10%§! chance to add administrative development to the province when spreading mechanims.\n\nEvery owned province with mechanim present gets '§YAuto-Scribes§!', giving the following effects:\nProvince Governing Cost: §G-25.0%§!\nAdding §YAuto-Scribes§! to the old models can take up to §Y2§! years."
 artifice_auto_scribes_modifier: "Auto-Scribes"

 #Gene Magic
 artifice_unforeseen_consequences.tt: "\n§RThis can have unforeseen consequences.§!"
 artifice_invention_crop_enlarge: "Gene Magic Crop Enlargement"
 artifice_invention_crop_enlarge_desc: "Using a specially developed Gene Magic fertilizer, our Artificers have been able to recreate and improve upon widely used Crop Growth and Acceleration spells, greatly diminishing the chance for ground deterioration and unintended growth spurts."
 artifice_invention_crop_enlarge.tt: "Every owned province producing §YGrain§!, §PWine§!, §gFungi§! or §MSerpentbloom§! gets '§YGene Magic Crop Enlargement§!', giving the following effects:\nLocal Goods Produced: §G+1§!"
 artifice_crop_enlarge_modifier: "Gene Magic Crop Enlargement"

 artifice_invention_assisted_growth: "Artificer-Assisted Plant Growth"
 artifice_invention_assisted_growth.tt: "Casting Plant Growth provide additional §G+15%§! Local Goods Produced\n"
 artifice_invention_assisted_growth_desc: "With specially developed foci, measuring and observation devices our greatest minds have managed to improve this widely used spell, ensuring our people shall enjoy unprecedented food security."
 artifice_assisted_growth_modifier: "Artificer-Assisted Plant Growth"

 artifice_invention_animal_gene: "Animal Gene Sequencer"
 artifice_invention_animal_gene.tt: "Every owned province producing §YLivestock§!, §YFur§! or §YFish§! gets '§YAnimal Gene Sequencer§!', giving the following effects:\nLocal Development Cost §G-10%§!"
 artifice_invention_animal_gene_desc: "The animals of our nation can be made into whatever we want, and we want them to be productive."
 artifice_animal_gene_modifier: "Animal Gene Sequencer"

 artifice_invention_titano_thorns: "Hinui-Thornvines"
 artifice_invention_titano_thorns_desc: "With the hinui thornvines of Insyaa on our side, every siege is an offensive siege."

 artifice_invention_titano_weed: "Coastal Hinui-Tangleweed"
 artifice_invention_titano_weed_desc: "The sea-grass binds and snags on enemy ships, stubborn and determined. Regular arcane pulses dislodge the stuff from our own hulls, and we gain a key advantage in manoeuvrability."

 artifice_invention_seed_siege: "Hinuiflora Seed Siege Weaponry"
 artifice_invention_seed_siege_desc: "The virtues of a proud and stubborn garrison-master meet their limit at the prospect of cannonballs which grow."
 artifice_invention_seed_siege.tt: "On barraging a fort, kill §Y200§! garrisoned troops per fort level and add §Y50§! devastation." #It should be probably be rewrited

 artifice_invention_tgs_farmland: "Titanoflora Gene Sequenced Farmland"
 artifice_invention_tgs_farmland_desc: "The resulting crops might need to be harvested by a whole squad of laborers, but at least none of them go home hungry."
 artifice_invention_tgs_farmland.tt: "Every owned province producing §YGrain§!, §YWine§!, §YSpices§!, §YTea§!, §YCoffee§!, §YCocoa§!, §YCotton§!, §YSugar§!, §YTobacco§!, §YCloves§!, §YIncense§!, §YTropical Wood§!, §YFungi§! or §YSerpentbloom§! gets '§YTitanoflora Gene Sequenced Farmland§!', giving the following effects:\nLocal Goods Produced Modifier §G+15%§!\nBonus is doubled in provinces with §YManufactory§!."
 artifice_tgs_farmland_modifier: "Titanoflora Gene Sequenced Farmland"
 artifice_tgs_farmland2_modifier: "Titanoflora Gene Sequenced Farmland"

 artifice_invention_tgs_livestock: "Titanoflora Gene Sequenced Livestock"
 artifice_invention_tgs_livestock_desc: "The animals of our nation can be made into whatever we want, and we want them to be productive."
 artifice_invention_tgs_livestock.tt: "Every owned province producing §YLivestock§!, §YFur§! or §YFish§! gets '§YAnimal Gene Sequencer§!', giving the following effects:\nLocal Development Cost §G-10%§!"
 artifice_tgs_livestock_modifier: "Titanoflora Gene Sequenced Livestock"

 artifice_invention_titano_artif: "Titano-Growth Artificer Unit Augmentation"
 artifice_invention_titano_artif_desc: "Our artificer regiments have been augmented with gene magic to grow several heads taller than our regular soldiers, and they perform like it in combat."
 artifice_titano_artif_modifier: "Titano-Growth Artificer Unit Augmentation"

 artifice_invention_titano_cav: "Titano-Growth Cavalry Augmentation"
 artifice_invention_titano_cav_desc: "Able to crush several soldiers under one foot, these huge mounts will surely make our cavalry unsurpassed on the battlefield."

 #Precursor
 artifice_invention_sonic_amplifiers: "Sonic Amplifers"
 artifice_invention_sonic_amplifiers_desc: "Even the simplest support spell can serve an offensive role with the right sonic contraption and a little bit of arcane effort, but for the evocation-inclined the real star of the show is the Sonic Cannon. Firebolts have never sounded so deafening."
 artifice_invention_sonic_amplifiers.tt: "Amplifies offensive spells:\n§OFireball:  §!Increase the siege progress by additional §Y+1§!.\n§OManipulated Fortune:  §!Reduce §YMovement Speed§! of enemy armies in your country by §R-10%§!.\n§OFear and Loathing:  §!Double base number of §YRebels§! spawned.\n§OHeartstring§! and §OThoughtweave:  §!Morale of Armies §G+5%§! and Aggressive Expansion Impact §G-5%§! for §Y5§! years."
 mechanim_sonic_amplifiers_modifier_province: "Sonic Amplifers"
 mechanim_sonic_amplifiers_modifier_country: "Sonic Amplifers"

 artifice_invention_sonic_weaponary: "Sonic Weaponry"
 artifice_invention_sonic_weaponary_desc: "Our artificer regiments have long struck fear into the hearts of those who know of them. Now, they will strike through their ears, as well."
 artifice_sonic_weaponary_modifier: "Sonic Weaponry"

 artifice_invention_flak_cannons: "Precursor Flak Cannons"
 artifice_invention_flak_cannons_desc: "Specially designed cannons based on Precursor spellcraft mixed with artificed ingenuity shall ensure that no fortification nor army can withstand our barrages of immaculate dakka."

 artifice_invention_terrain_shaper: "Terrain Shapers"
 artifice_invention_terrain_shaper_desc: "With special devices our artificers march fearlessly into the wilderness, readying and reclaiming land for use by our expanding cities."
 artifice_invention_terrain_shaper.tt: "Expanding Infrastracture in a province gives it §G+1§! random development.\n"

 artifice_invention_steel_tracking: "Precursor Steel Tracking Modules"
 artifice_invention_steel_tracking.tt: "Add a chance of finding §YPrecursor Relics§! while colonising Insyaa.\n"
 artifice_invention_steel_tracking_desc: "With the tracking modules the artificers have devised, our scouts and colonists can scan entire areas for precursor steel from the comfort of their settlements and camps. Making great discoveries in wild and untamed lands has never been so easy."

 artifice_invention_memory_storage: "Mechanim Memory Storage Salvage Protocols"
 artifice_invention_memory_storage_desc: "A willing mechanim offering a peek into their memories from before the Day of Ashen Skies is a rare and valuable thin- citizen. A rare and valuable model citizen."

 artifice_invention_mechanim_deconstructor: "Mechanim Tech Deconstructor"
 artifice_invention_mechanim_deconstructor_desc: "New tools and operating procedures allow artificers to study Mechanim and their assembly in great detail. While not all will be able to be reassembled, this is deemed an acceptable loss when compared to the knowledge gained. "
 artifice_invention_mechanim_deconstructor.tt: "§OMechanims will be slowly deconstructed.§!\n"

 artifice_switching_empty_tt: "§YNone§!"
 #Mechanim Head
 artifice_head_switching_tt: "Has no ongoing §YHead§! population modification.\n   §g(Current ongoing modification: §Y[Root.head_switching_part]§!)§!"

 artifice_invention_head_long_range: "Long Range Sighting Attachements"
 artifice_invention_head_long_range_desc: "Providing in-built magnification mechanisms allow us to effectively target enemy positions from great distances."

 artifice_invention_head_war_craved: "War-Carved Head Frame"
 artifice_invention_head_war_craved_desc: "Mechanim use carvings for many purposes: to remind ourselves of our past, to symbolize our nature, and now to strike terror into those who oppose us."

 artifice_invention_head_human_like: "Humanoid Frame Head Construction"
 artifice_invention_head_human_like_desc: "Diplomacy demands of everyone that they wear a different face, but perhaps that is more literal in our case."

 artifice_invention_head_adm_oversight: "Administrative Oversight Module"
 artifice_invention_head_adm_oversight_desc: "With a nudge here and a pull there, we’ll get everyone working together, and that way the work will get done."

 #Mechanim Torso
 artifice_torso_switching_tt: "Has no ongoing §YTorso§! population modification.\n   §g(Current ongoing modification: §Y[Root.torso_switching_part]§!)§!"

 artifice_invention_torso_self_repair: "Inbuilt Self-Repair Kit Storage"
 artifice_invention_torso_self_repair_desc: "Transmutative Runes engraved and carved into Mechanim plating make it almost seem alive. The metal ever tries to return to its intended shape, even sometimes reconstructing those who suffered usually irreparable damage."
 artifice_invention_torso_self_repair.tt: "Some of our soldiers will be able to repair themselfs after battle.\n"

 artifice_invention_torso_war_craved: "Horror Carved War Plating"
 artifice_invention_torso_war_craved_desc: "A mechanim’s body is a tool above all else, and when the purpose of a tool is to cause violence it should look the part."

 artifice_invention_torso_container_part: "Container Compartmentalized Torso"
 artifice_invention_torso_container_part_desc: "A highly modular system of compartments built into a mechanim torso, the Container Compartmentalized Torso is a true gamechanger for every mechanim craftsman eager to expedite their crafting process."

 artifice_invention_torso_war_machine: "War Mechanim Mod Kits"
 artifice_invention_torso_war_machine_desc: "With enough weapon modifications, even the most cowardly mechanim can be made into a force of nature on the battlefield."

 #Mechanim Chassis
 artifice_chassis_switching_tt: "Has no ongoing §YChassis§! population modification.\n   §g(Current ongoing modification: §Y[Root.chassis_switching_part]§!)§!"

 artifice_invention_chassis_heavy: "Biological Mimic Chassis"
 artifice_invention_chassis_heavy_desc: "Trimming some of our stranger chassis designs, and using heavy coats of paint, mechanim can be made to seem more biological -- and therefore, alas, more likely to be treated with dignity by others."

 artifice_invention_chassis_light: "Light Frame Chassis"
 artifice_invention_chassis_light_desc: "A lighter hand in chassis design lightens the load we place on the land."

 artifice_invention_chassis_waterproof: "Waterproof Frame Installations"
 artifice_invention_chassis_waterproof_desc: "By making their metal frames waterproof, the mechanim are capable of submerging themselves without risking damage, whether to ambush an enemy or escape hostile fire."
 mechanim_chassis_waterproof_modifier: "Waterproof Frame Installations" #Marine modifier

 artifice_invention_chassis_soarer_struts: "Soarer Mechanim Attachement Struts"
 artifice_invention_chassis_soarer_struts_desc: "Lightweight attachement struts that allow a soarer mechanim to carry significant additional weight across great distances, up to and including another mechanim."

 #Mechanim Arms
 artifice_arms_switching_tt: "Has no ongoing §YArms§! population modification.\n   §g(Current ongoing modification: §Y[Root.arms_switching_part]§!)§!"

 artifice_invention_arms_dual_pair: "Dual-Pair Arm Installations"
 artifice_invention_arms_dual_pair_desc: "A secondary pair of arms to enhance the effectiveness of our troops in close combat, allowing infantry to have skirmish weapons ready at all times and cavalry regiments to carry extra lances or blades for charges."

 artifice_invention_arms_stabilizer: "Stabilizers and Recoil Absorbers"
 artifice_invention_arms_stabilizer_desc: "An army is only as effective as its most inaccurate soldiers, as such, we must ensure that our warriors aim is without equal. These systems are but one step of the way to getting there."

 artifice_invention_arms_construction: "Arm Construction Attachements"
 artifice_invention_arms_construction_desc: "A city isn’t built in a day, but with these modifications we might as well try anyway."

 artifice_invention_arms_sonic_firearm: "Sonic Firearm Implants"
 artifice_invention_arms_sonic_firearm_desc: "The Sonic Firearm Implants consist of a sonic amplification chamber and a release valve integrated in the arms of a mechanism, and are capable of creating a highly destructive sonic beam."

 #Mechanim Legs
 artifice_legs_switching_tt: "Has no ongoing §YLegs§! population modification.\n   §g(Current ongoing modification: §Y[Root.legs_switching_part]§!)§!"

 artifice_invention_legs_quadripedal: "Quadripedal Leg Configuration"
 artifice_invention_legs_quadripedal_desc: "Four legs provides the mechanim form with an ideal blend of movement capacity and adaptability to terrain. "

 artifice_invention_legs_bipedal: "Bipedal Leg Configuration"
 artifice_invention_legs_bipedal_desc: "Most similar to Insyaa’s other denizens, a bipedal leg configuration is preferred by Mechanim that serve as diplomats."

 artifice_invention_legs_octipedal: "Octipedal Leg Configuration"
 artifice_invention_legs_octipedal_desc: "Inspired by the Loa’set, this insectoid form of locomotion supports a durable and versatile chassis."

 artifice_invention_legs_trailblazer: "Trailblazer Augmentations"
 artifice_invention_legs_trailblazer_desc: "A series of augments and tools that allow Mechanim scouts unparalleled skill at traversing treacherous Titanoflora and less exotic terrain. In addition to creating detailed reports on enemy tactics, composition, and effective countermeasures against them."
 #Mechanim special
 artifice_invention_mech_steel_detector: "Precursor Steel Detector"
 artifice_invention_mech_steel_detector_desc: "With the tracking modules the artificers have devised, our scouts and colonists can scan entire areas for precursor steel from the comfort of their settlements and camps. Making great discoveries in wild and untamed lands has never been so easy."

 artifice_invention_mech_reawakening_procedure: "Enhanced Reawakening Procedures"
 artifice_invention_mech_reawakening_procedure_desc: "The transmitters of a dormant mechanim ask the same question of us, over and over again. ‘Are you there? Are you there?’ We will show them the answer is yes."

 artifice_invention_mech_building_plates: "Precursor Building Plates"
 artifice_invention_mech_building_plates_desc: "By employing modular construction sheets of precursor steel, our defensive positions are nigh-impregnable."

 artifice_invention_mech_terrain_specialization: "Hinuiterrain Specialized Equipment"
 artifice_invention_mech_terrain_specialization_desc: "Outfitting our regiments of soldiers with the weapons to allow them to make the enemy suffer in hinui terrain will be one of the rare changes we can make that’s good for both morale and combat effectiveness."
 artifice_invention_mech_terrain_specialization.tt: "Gain §G+1§! attack bonus in provinces with our capital terrain, while our capital terrain is in Titanoflora."
 artifice_terrain_specialization_modifier: "Hinui Terrain Specialized Equipment"

 artifice_invention_mech_lava_cell: "Lava Containment Cell"
 artifice_invention_mech_lava_cell_desc: "Once lava containment cells have been loaded into our cannons made of Precursor Steel, the only thing preventing us from immolating the world will be how far we can make our cannons fire."

 artifice_invention_mech_fireproof_plating: "Fireproof Plating"
 artifice_invention_mech_fireproof_plating_desc: "Integrating precursor steel composites into mechanim forms protect them from extreme elements, normal wear and tear, and everything in between."

 artifice_invention_mech_pillar_scouts: "Gene-Pillar Scouts"
 artifice_invention_mech_pillar_scouts_desc: "The dangerous and often hostile environs of unexplored Gene Pillars necessitate a design of mechanim equal to the challenge. Boasting multiple complex attachments to deal with a broad variety of hypothesised obstacles, scouts built for the purpose are always prepared."
 artifice_invention_mech_pillar_scouts.tt: "Increases §YGene Pillar§! exploration speed by §G25%§!"

