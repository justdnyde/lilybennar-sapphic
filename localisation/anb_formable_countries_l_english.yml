 government_type_change_monarchy_tt: "The type of Government changes to §YMonarchy§!."
 government_type_change_republic_tt: "The type of Government changes to §YRepublic§!."
 government_type_change_theocracy_tt: "The type of Government changes to §YTheocracy§!."
 government_type_change_tribal_tt: "The type of Government changes to §YTribal§!."
 government_type_change_native_tt: "The type of Government changes to §YNative§!."

 gnomish_hierarchy_nation_title:0 "Revive the Gnomish Hierarchy"
 gnomish_hierarchy_nation_desc:0 "We have reclaimed the main parts of our ancestral homeland and have proved that the hierarchy lives on! We shall announce ourselves as the Gnomish Hierarchy reborn, the true hegemons, no, hierarchs, of the Dragon Coast!"
 iochand_nation_title:0 "Restore the Kingdom of Iochand"
 iochand_nation_desc:0 "After more than two centuries of humiliation and tragedy, the long night has come to an end. Gnome and Lencori are brothers once more, working together as they did in centuries past, in a glorious harmony greater than its component parts. The restoration of Iochand is no longer a hope, but a fact. The thoughts of the people turn to their ancient enemies in Reveria, and their unspeakable slaughter of our royal house. For a new era to dawn, the sun must rise, and search for an heir is all but complete...\n\n§RWe renounce any claims to restoring the Gnomish Hierarchy§!"
 small_country_nation_title:0 "Unite the Shires"
 small_country_nation_desc:0 "The halfling peoples once had a land of their own, ruled by their own people for their own people. Now is the time to revive the Small Country free from foreign rule. Now is the time for the halfling peoples to rise to the world's stage not as subjects but with their own sovereign country!"
 viswall_nation_title:0 "Reunify the Two Halves of Viswall"
 viswall_nation_desc:0 "The aftermath of the Viswall Rebellion in 1423 tore our city apart, both literally and metaphorically. But now we are in a position to unite the two halves again. It may not be able to mend the deep wounds incurred over the years quickly enough, but it's a start."
 dameria_nation_title:0 "Revive Dameria"
 dameria_nation_desc:0 "The Grand Duchy of Dameria is heir to the Kingdom of Dameria, and before it the great Damerian Republic of antiquity. It was once the pivotal force in the southern Dameshead and main proponent in the creation of Anbennar and it can be again, under a rightful or talented heir."
 lorent_nation_title:0 "Ascend the Rose Throne"
 lorent_nation_desc:0 "Lorenan the Great founded Lorent in order to unify Lencenor against the invading Gawedi scourge. Ever since then Lorent has held the rightful role of hegemon and protector of Lencenor. And so, with the old kingdom's downfall, we shall proclaim ourselves heirs to Lorenan's realm!"
 gawed_nation_title:0 "Rise of a New Eagle"
 gawed_nation_desc:0 "The first Gawedi kingdom was founded by Godrac the Invader in 471 AA after the conquest of Vertesk. After falling under Black Castanor, the kingdom regained its independence in 1015 AA with the establishment of the modern Kingdom of Gawed.\nGawed has fallen once again, but this, too, is not to last. The Eagle shall rise over the Alen once more!"
 restore_phoenix_empire_title:0 "Restore the Phoenix Empire"
 restore_phoenix_empire_desc:0 "Created as a union between the Bulwari human natives and their Sun Elven liberators, Jaher's Phoenix Empire once stretched from Bulwar to the ends of Haless in its first iteration and its second, under his daughter Jexis, stretched all the way to Anbenncóst.\n\nThe burning ambition of the Sun Elves to unite under a single sovereign realm has diminished since then... but if a true heir of Surael were to come however..."
 bastard_empire_tt:0 "For having our capital in §YWestern Cannor§! we will wear Elizar's colors."
 dostanorian_nation_title:0 "Unite Dostanor"
 dostanorian_nation_desc:0 "Once the vanguard at the gates of Cannor, the kingdom of Dostanor stood as one of the last parts of old Castanor to survive its demise.\nBut in the end, even valiant Dostanor would fall. As the forces of the vile Xhaz threatened to force their way into Cannor, the fate of the Kingdom was decided by the one whose name is despised even all these centuries later.\nDaravan the Malignant chose to drown the land and the invaders with it.\nEver since then we had been divided - A kingdom shattered in half, a people separated by an accursed swamp.\nBut this fate did not stop us.\nWe have reconquered our lost land, reunited our people and fended off the forces of evil lurking in the shadows.\nNot more division, no more tears.\nDostanor will be united once more."
 castellyr_nation_title:0 "Revive the Kingdom of Castellyr"
 castellyr_nation_desc:0 "The Kingdom of Castellyr, also known as the Kingdom of the Silver Dragon, was the feudal successor to ancient Castanor. First amongst equals in feudal Escann, it was the shining bastion of the east.\nWhen the Greentide came Castellyr was one of its first targets. The proud kingdom stood no chance against the monstrous incursion and it soon fell, with those who survived having to leave their homes behind.\nThough many years have passed, the memory of this great kingdom has not yet vanished into obscurity. With our rise to prominence in eastern Escann we are now in a position to proclaim ourselves their rightful heirs and fly the Banner of the Silver Dragon once more!"
 adenica_nation_title:0 "Revive the Kingdom of Adenica"
 adenica_nation_desc:0 "The Kingdom of Adenica was the greatest of the western Escanni kingdoms and the center of Adean's worship before the Greentide, known far and wide as the birthplace of knighthood and chivalry.\nWhen Adenica met its end during the Greentide, it did so standing. Its knights fought till the bitter end against the onslaught of orcs to defend the pride of Andean.\nMany thought this would be the end for the Kingdom, and with it the death of chivalry. But the chivalric spirit lives on, and as we ascend to rule western Escann the dream of a reborn Adenica is strong amongst our warriors.\nIn Adean´s name, the banners of the greatest chivalric kingdom will fly once more!"
 farranean_nation_title:0 "Revive the Kingdom of Farraneán"
 farranean_nation_desc:0 "The Kingdom of Farraneán was the link between east and west, and rivalled Ibevar for domination of the Forlorn Vale. Founded by the Esmari noble Martin Farran during the War of the Sorcerer-King, the horrors wrought by the White Pestilence brought them and the elves of the Cursewood closer together to defend against the ambitions of Ibenion ta'Lunatein, giving rise to the síl na Eán dynasty that would rule the diverse and prosperous kingdom until the Greentide brought them down. Most of the survivors fled to the Aldresian Order as well as their old rivals Ibevar, while others stayed in the Cursewood to continue fighting, or barricaded themselves in Freetower and the Valefort before joining the marchers."
 castanor_nation_title:0 "Revive Castan's Empire"
 castanor_nation_desc:0 "Castan's Empire (commonly known as Castanor) was the first human empire in all of history. Forged through war and flame, Castanor triumphed over the dark beasts of Escann and without them, humanity would never have become as great as they are today. To take up the mantle of Castanor again, our ruler must first pass the Trials of Castan like every Castan has beforehand. The trials are a rigorous ascent up the Trialmount with dangers both magical and mundane, a true challenge for any aspirant."
 can_form_castanor_tooltip:0 "Has consolidated Escann and decided to devote the nation to revive Castanor"
 black_castanor_nation_title:0 "Revive Ebonfrost's Empire"
 black_castanor_nation_desc:0 "Many years ago, in the Era of Black Ice, Castan Ebonfrost invaded and conquered Castanor. Now that the Reavers once again rule over these lands, the legacy of Castan Ebonfrost can be restored!"

 ravenous_nation_title:0 "Defy our Lords and Nature"
 ravenous_nation_desc:0 "It is not easy to survive in the Ravenous Isles. One wrong move and you could easily meet your end at the hands of the hungering jungles of this damned land. Those who come here rarely do so because they want to;, most are criminals, escaped slaves, and persecuted minorities. We have historically let them in, desperately needing people to sustain our settlements as more and more succumb to the jungle and either leave or get devoured.\nThis has made those who remained into a harder , stronger, more intelligent, more ... independent... kindred.\n\nThat idea has been circulating around the minds of our people for a while. Do we risk our lives out here just so we can provide for people that could not be bothered to come here by themselves? We fight nature on a daily basis; who are these people of the metropolis to demand anything of us?\n\nToday we raise our blades to cut not vines but chains, to free ourselves from the links that hold us back.\nIf we shall fight every day to survive, we shall not do so to serve faraway lords in marble castles but for the people of a new nation - the Ravener nation!"
 alecand_nation_title:0 "Elevate the Act of Independence"
 alecand_nation_desc:0 ""Step forward, councilmen! Let your words be heard."\n\nThis council had been called that day to discuss the affairs of the colonial organization. Faced with decaying relations with the metropolis, many among the board were unsure about what to do. Many spoke of plans to create an intermediary administration to mend the relations with the motherland in an attempt to return to normalcy. Some others desired a more absolute solution and saw to purge the colony of the ones that had put them in this situation in the first place. Others still, however, had another idea.\n\n"Thank you, my lord chair. I come forth to elevate a proposal first broached by many of the commoners of the colony. The leash that ties us to our overlords is as loose as it has ever been. Many members of the citizenry, realising this, are beginning to set their minds on something greater.."\n\nThere was a confused susurration of whispers. As the councilman spoke, his fellow delegates found themselves divided between fear of what was to come and an unwillingness to fight against the proposal.\n\n"The lands which now inhabit were once homes of great republics - cities that survived ruin and forged a civilization of their own. Many here descend those who were here before us and their ideas and philosophies remain strong still. The ideas of strength, of fighting for what one thinks and defending one’s own words with a blade if needed, the ideas of freedom in all its forms - these are all precious to us..\nThat is why, today and here, I want to elevate this proposal to the council. We propose the birth of a new nation, free of the chains that bind us to a rotting lord on a faraway throne. We dare to propose to you, ladies and gentlemen, that a Nation of the Alecand be established from these territories."\n\nWhat followed were heated words, screams, and even some fighting. For most of the day flags of old and new flew over the tables the councilman sat as loyalists and sovereigntists debated for hours.\nBy the end of the day, only one flag remained: the flag of the Alecandi Nation."
 dalaire_nation_title:0 "Unite the Cold North"
 dalaire_nation_desc:0 "Dalaire, cold and untamed. Home.\nFor years many have crossed the seas to reach these lands, attracted by the allure of work and opportunity, only to be terrorised by the unforgiving tundra.\nMany are those who have tried to settle her. Colonial companies from across Cannor send their men only to never hear from them again.\nIn truth, unless you are ready to adapt to the cold ways of the north, you are not going to survive. But for those who do, this land has become the only home they could ever desire and a place to make your fortune.\n\nFor those who call this land their own, a sense of brotherhood has developed that transcends the barriers of culture, where the only warmth is that of the family and where all fighting is for what is good for their people.\nIt is this union that has compelled us to reach for more, for a future that is truly ours. We shall forge a land ruled by those who can endure it: in union, the cold north of Dalaire shall rise to greatness!"
 endralliande_nation_title:0 "The Golden Rose Proclamation"
 endralliande_nation_desc:0 ""At the gates of Aelantir both inheritors of this lost land and newcomers seeking a place to belong have made this land a home for themselves, their children, and their children's children.\nWhat is the use of the metropolis? Our overlords do not see our effort but rather what it can provide them.\nThey seem to rule over us yet here we are hold the cards to stand against them.\nLet the fog of this island protect Lencenor's bride, for she and her sons and daughters will no longer answer to those holding the chains of subjugation.\n\nFor our freedom, and the right of our children and theirs to live as they choose, we proclaim the foundation of a new independent nation: Endralliande!"\n    - The Declaration of the Endralliander Nation, stamped with the Golden Rose."
 trollsbay_nation_title:0 "Sign the Noruinic Accords"
 trollsbay_nation_desc:0 "Behold the home of thousand faces and many more voices, the land we claimed to be ours! In our pursuit for independence we have become more united as a people than ever before. It is clear to us now that our dream of unity is one worth fighting for.\nIn the past the Trollsbay Concord tried and failed to unite our people. . The old republics were rotten from the inside. Subverted by malicious actors, they were too preoccupied with their own afflictions to care to defend against the outside forces that were their ultimate undoing.\n\nWe cannot fall to the same evils.\n\nHundreds of representatives from across the Trollsbay have come together today to sign the Noruinic Accords, a collection of carefully written documents and laws that have been created with the objective of being the foundation of a new nation. Unlike the old accord, however, they shall not leave room for ambiguity about the unity of the nation.\nFor if this alliance is to not fall like the one before it, if this experiment on unity is to succeed and Noruin as a nation is to survive, we must remain as one people, united!"
 bloodgroves_nation_title:0 "Ratify the Carmine Conclave"
 bloodgroves_nation_desc:0 "Echoes ran across the halls, and the room itself seemed filled with roaring screams. Words flew over each other never landing on anyone's ears, ideas so violent that they seemed to fight each other mid air.\nIt was chaos.\nIn the middle of the show sat the he who had called this assembly in the first place. His tired look spoke more than any words could, but a glimmer in his eyes shone nonetheless. As the conversation started to die down more for lack of energy than a lack of insults, the man at the center of it all stepped up to a podium and finally spoke his mind.\n\n"Gentlemen, as I said to you in the letters I sent, we have gathered here today to discuss the future of this company. Ever since the fall of both realms, elves and humans have fought over the Kwineh land in a futile attempt at asserting dominance.\nIt is clear to anyone looking in from the outside that this infighting will do nothing but destroy our experiment from the inside out. If you felt our rule has been bad, I do not need to remind you what the metropolis’ gloved hand felt like as it clenched  our throats. Now imagine what they will do to us if they restore their rule."\n\nThere was a moment of silence as each side started to look at each other.\n\n"It is for this reason that I called you all here, on all three sides of this war, to put an end to conflict and pursuit of forging something that will outlast our grudges. I believe that Elves, Humans and Ruinborn can live together in one realm and that is what I am proposing in this here proclamation. The founding of a Bloodgroves nation."\n\nWords ran wild across the room, but they stopped as fast as they started. By the end of the day, all factions had signed the paper and affixed their seals. Thus a nation was born."
 cheshoshmar_nation_title:0 "Proclaim the Nation of Skulls and Colors"
 cheshoshmar_nation_desc:0 "The Reaper’s Coast is a land like no other.\nThis is a feeling most people felt the moment they came down from their boats and into the ancient land of the Cheshoshi. Marked now by two gods of the dead, this part of the Ruin is home to many things that people would call aberrant.\nFor us, however, this is the only home we know.\nEver since the colony started here our people have been greatly influenced not just by the Cheshoshi but by the remnants of the Onyx Guard. Both Cheshosh and Nerat have become essential parts of our culture andour day to day life and worship. We have combined many practices from both groups, creating a mix that has made our people much different from our mainland kin.\n\nIt was this mix of cultures that brought us together when we fought against our colonial lords, It is these similarities that have kept the colony together after independence. It is this union that will be the foundation for the creation of a new nation.\nTonight we proclaim a nation under the gods of death, a flower to bloom in the darkness of the ruin - the Cheshoshmari nation!"
 soruin_nation_title:0 "A Nation At the Edge of the Ruin"
 soruin_nation_desc:0 "The jungles of the Effleai are treacherous; one wrong move can cost you your life.\nMany would not see this as a good place to live, but for us it has become the only home we truly belong to. Far away from the eyes of the lords and kings of our motherland, we have built a little piece of heaven to claim for our own. At long last we have a home to fight for.\n\nWith the chains that bound us to our former overlords broken, we can now look into the future and proclaim the rise of a new nation. Long live our little home on the edge of the ruin!"
 turtleback_isle_nation_title:0 "Form Turtlebacker Nation"
 turtleback_isle_nation_desc:0 "We must leave the last of our colonial heritage behind and reform into a proper independent state."
 malatel_nation_title:0 "Malatel"
 malatel_nation_desc:0 ""Where are our overlords when our coast is raided by the scum that leaves their ports? Where are they when our colonies starve? Or when the mad cultists across the pond try- and fail - to bring us to our end?\n\nNOWHERE!\n\nWhat is the point of having overlords if they would rather sit back and watch us do all the work, just so they can then come and reap the rewards?\n\nOPEN YOUR EYES!\n\nBreak the chains, brothers and sisters! Let the blood of the loyalists paint our new banners!\n\nThis coast was once severed from its mainline, and like it we too can cut ourselves away from the metropolis!\n\nPREPARE THE CANNONS TO OPEN THE GATES, SACK THE COWARDS, AND BRING ME THE LIBERTY I CRAVE!"\n\n    - An extract from a speech by Malatel's national hero."
 dtc_nation_title:0 "The Deranne Trading Company Takes Control"
 dtc_nation_desc:0 "As our nation's mainland holding crumple, the colonies become our only refuge. These colonies are controlled not directly by us, but by the venerable Deranne Trading Company: and so, as we fall, they rise. Their merchants must assume control of the State, so that our trading empire might survive in the New World!"
 dtc_nation_tooltip:0 "We control at least one colonial nation, or own at least one province outside of Cannor"
 leidhancost_nation_title:0 "Unshackle the Moose"
 leidhancost_nation_desc:0 "In one of many islands that dot the Broken Sea there was a cabin. Inside that cabin two men talked. Both are brothers, not of the same mother but in the same cause. They had an idea of vital importance to discuss.\n\n"What about a deer?" one said.\n"A deer? You are going to tell some poor kids' mom that their son died so we could fly a flag with a gods-be-damned deer on it?", the other retorted.\n\nThe two brothers sat across from each other on a table. Guns and snow equipment were mounted on the wall. On one side of the table there were reports talking of a bloody revolution, of deposed governors and peace deals made. On the other side thick wool, coal black and cream white, was stacked high.\n\n"What about one of them fishfolk? The, uh, ice nappers or whatever," he continued.\n"Nah, it has to be something that screams 'Leidhancóst' you know?"\n"Leidhancóst? That's the name they chose in the end? Pah, I guess name-choosing ain’t no requirement to be a revolutionary."\n\nAt that they both laughed.\n\n"You know, after everything I am very happy with where we are. This place might be a cold hellhole but it is our cold hellhole. Finally, it is a place to be."\n"Beats Wexhill," they said in unison.\n\nOne of the brothers looked out of the window thinkingly. The war fought, the people lost, all in the name of breaking the chains and earning freedom.\nHe looked upon his trusty ride, the one that had gotten him out of that fight alive.\n\n"Hey, I think I know what to put on thatflag.""
 morail_nation_title:0 "Assemble the Ruin Ports"
 morail_nation_desc:0 ""Most esteemed gentlemen, you have been gathered here today because you represent the greatest leaders of the Ruin Sea. Among our tables today we find some of the greatest that this sea has ever provided. Traders of renown, captains of honor, landowners of most excellent qualities and those with a, erm, more freeform idea of ownership. You are all leaders in your own right. It is you who truly rule the Ruined Sea; that is why we have a proposition for you.\n\nYou see, as time passes it is harder for us to make our due - not in a land scourged by the rotten despicable thieves from the darkest corners of the world … and pirates."\n\nThe room filled with laughter.\n\n"Competition increases. Newcomers take their part of the market;the more of the share they get, the less we do. Our former overlords failed to see this, and that was why they lost their hold on this island. In the end we are all here people of business. So that is why I called you here, as I have a proposition that is sure to interest you. Why fight among ourselves to divide what is left when we can band together to claim more than we could ever have by ourselves?\nI propose the founding of a new alliance. A union of ports to protect our convoys and ransack all others. Under one banner we can rise higher, no longer fleeting tradeposts but cities of a new nation: Móraíl."\n\nAs the proposal sank in, the room erupted in celebratory applause.."
 obaithail_nation_title:0 "Ignite the Fires of Hope"
 obaithail_nation_desc:0 "At the edge of the Ruin lies an island that managed to evade the cataclysm that saw the rest of Aelantir fall. From here we first arrived on the sundered continent. The mere sight of it filled us with hope after such a long voyage.\nIt was this hope that gave the island her name, the one we now call our home.\n\nWe have come a long way since our first arrival. No longer a mere settlement, our colony has grown far past the control of our former overlords. As we fought to break the chains we kept her name in our mind, to give us hope and remember what we were fighting for in the end.\nAnd now it is time for her name to be known to the world. This isa land worth fighting for and one where her inhabitants will be proud to say her name: Obaitháil, the Isle of Hope!"
 #devand_nation_title:0 "Towards a New Aelantir"
 #devand_nation_desc:0 ""The Society for Aelantiri Restoration has a proposal for you."\n...\n"Yes, we envision you resigning from all positions immediately, and turning over all power to the SAR."\n...\n"I can see in your eyes that you understand very little of what I just said. So let me answer the why of it. Once, there was a singularity of such rage and lofty contempt that it pulled all other civilizations towards itself - but it could not resist the cycle of civilization, and it collapsed into petty successors. Then we, the Cannorian invaders, arrived. But we are not above the ruinborn; Cannorians too are the petty conquerors, the doomed empires. Or at least all of us are but the SAR, who alone looks above it all to at last escape the primal forces of man. We are the builders and the bringers of the new world.""
 #taychend_nation_title:0 "An Opportunity"
 #Formed by an ex colony
 #taychend_nation_desc:0 "The Taychendi are an ... unruly ... bunch.\n\nIt has proven very difficult to rule them under our administration. Our former overlords spoke constantly of how inefficient our work was and how we "lack what it takes" to make use of this land.\nEasy for them to say from their high throne.\nEver since we broke ties with them, it has not gotten easier. They see us as illegitimate and our ways weak. Even those among the locals that seek to be part of our administration believe we are misguided and that we do not have what it takes...\n... but what if we don't have to?\n\nRealistically most people in our government just desire to extract as much wealth as we can from this land. For this we do not need to rule Taychend how we have so far. We inherited our way of government from our former colonial lords. So far, it has gotten us nothing but angry locals and empty coffers.\n\nAccordingly , today we put forth an idea in its most elegant and perfected state by implementing a new constitution.\nOur new law will allow us to minimize rules, focus on maximising income, and keep the system working as is. There is no need to do anything else, really. So long as the coins keep coming to the table of the correct people, we can all have our share of the pie in peace.\nYes, I think this could be the start of a good venture, wouldn't you say?"
 #Formed by Orenkoraim
 #taychend_nation_desc:0 "Taychend is ... not an easy land to rule.\n\nEver since the fall of Gophira the lands of the warlord-emperors have been split among those who would seek to reclaim that title. Thousands die every day just so a king can claim a little fleeting power. This situation has only gotten more dire with the arrival of the outsiders led by Laskaris, "another color of the same fruit" as my dear father once said.\nOur realm has done well in this time.We have managed to claim a place for ourselves in this broken land, but for how long will we last? The cycle of rise and fall is known among our people;we are not free from its vicissitudes.\n\nIt is finally clear to us that we can break this cycle.\n\nThe recent change in the rule of our realm, so graciously sponsored by our Cannorian friends, has seen a shift in the way we see rule. Why bother with the ways of old,when those clearly do not produce the best outcomes? No, we see the big picture now.\nGlory does not pay for armies, honor does not increase our margins, and the crown of emperor is not worth its weight in gold.\nNo, what we see when we see Taychend is opportunity, and we will not let it go to waste!"


 kobildzan_nation_title:0 "Unify the Kobold People"
 kobildzan_nation_desc:0 "With the kobold lands unified under one banner we can proclaim the creation of Kobildzan: a country ruled by kobolds, for kobolds, no matter the colour!"
 kuxhezte_nation_title:0 "Purpose Once More"
 kuxhezte_nation_desc:0 "Many centuries ago we were united under one, Nimrith the Red. He gave us purpose, guided us to battle and protected us against the many foes that would see our end. In exchange we served Him loyally and provided Him with tribute to his great hoard as he waged war against the rotten human kingdoms and decadent dwarven holds.\nHe was our world.\nThat is until He was taken from us.\nEver since we lost Him our people have been banished to the darkest corners of the Serpentspine, divided and devoid of purpose.\nBut finally we have found a path to follow. United under one rising clan we will seek to reclaim everything that has been taken from us under his name.\n\nEVERYTHING!"
 black_demesne_nation_title:0 "Proclaim the Black Demesne"
 black_demesne_nation_desc:0 "The time has come to announce the dread realm, and rightful heirs to the realms of the living and the dead."
 eordand_nation_title:0 "[Root.getEORDANDSEASONFORMABLE]"
 getEORDANDSEASONFORMABLE_WINTER:0 "Winter Ascendant"
 getEORDANDSEASONFORMABLE_AUTUMN:0 "Autumn Ascendant"
 getEORDANDSEASONFORMABLE_SUMMER:0 "Summer Ascendant"
 getEORDANDSEASONFORMABLE_SPRING:0 "Spring Ascendant"
 getEORDANDSEASONFORMABLE_UNITY:0 "Unite the Seasons" 
 eordand_nation_desc:0 "Splintered between the four seasons, the land of Eordand has never been unified.\nEach Court has fought within itself and against the other seasons to try to claim dominance over the other for centuries. Desperately seeking help from the fey and whatever other forces could promise them an edge over the other, they fought for nothing, as this land has accepted no one ruler for so long.\nHowever, the winds are changing. As new arrivals threaten to shift the balance of power it is now more clear than ever that Eordand must be united. So it shall be!"
 vrorenmarch_nation_title:0 "Restore the Vrorenmarch"
 vrorenmarch_nation_desc:0 "The Vrorenmarch was once the northern province of Castan's Empire. Centered around the ancient citadel of Bal Vroren, in tales of old Vrorenmarch held against the brunt of the giant invasion and gave the empire enough time to prepare and wipe out the last of the true giants.\nMany are the stories of the Old Vroren, but ours has just begun. We have broken the Gray Orcs, united our people and risen to dominance in the Eastern Reach. With our return to the Mammoth Hall we shall proclaim the restoration of the Northern March!"
 the_reach_nation_title:0 "Unite the Blue Cities"
 the_reach_nation_desc:0 "For generations, the Alenic influenced Reachmen, the Blue, endured in isolation, divided by forest, tide, and the weight of foreign rule. Empires tried to bind them, but none could tame the stubborn independence that defines the Reach. Now, for the first time, its cities and freeholds unite not through conquest, but through shared purpose and defiance.\n\nThis is not a kingdom born of blood, nor an empire forged by war.\n\nThis is the Reach, claimed by its people, built to endure."
 esmarian_nation_title:0 "Unite the Grand Duchy of Esmaria"
 esmarian_nation_desc:0 "Esmaria was once a kingdom before the creation of the Empire of Anbennar, and afterwards it became a grand duchy within it. During the Lilac Wars this grand duchy was dismantled and its ruling dynasty eliminated. With our control of the region we can take the title of the Grand Duchy of Esmaria for ourselves."
 verne_nation_title:0 "Claim the Vernman Throne"
 verne_nation_desc:0 "The Kingdom of Verne was founded by Armoc Vernid, the first wyvern rider, and was a major power in Cannor for a long time. The kingdom eventually fell to Dameria and was later incorporated into Anbennar, but now that we have claimed the Duchy of Verne for ourselves, we shall live up to the kingdom's legacy and restore Verne to its former glory."
 olavlund_nation_title:0 "Unite the Olavish People"
 olavlund_nation_desc:0 "We have united the realms of Olavlund, by sword and by word, and are in a position to form a kingdom on par with that of Bjarnrík to our west and the weaklings to our south. Only with unity can we prosper in these changing times."
 pashaine_nation_title:0 "Declare Pashainéy Nation"
 pashaine_nation_desc:0 "With both the Grand Duchy of Dameria and the Kingdom of Verne fallen, the lands along the Luna river were left to rule themselves. Now, we have united them beneath us, and the time has come to declare our own nation: Pashainé, the Land of the Purple River!"
 saerraeg_nation_title:0 "Proclaim Saerraeg"
 saerraeg_nation_desc:0 "We remember the day of Ultarlanbeg, when the Chendhyan took the vorpal blade Saerasyar and with a brutal yet incisive conquest mounted it above Taychend like a green flamed star. Despite such a mighty sign the idea of freedom as enumerated by the ideals of Saerint and Azaeint – Freedom and Passion – was met with blind and malicious ears in Taychend. At first their resistance was crushed. The longer we spent in Taychend, the clearer it became that the noble Chendhyan were not as resolute as they seemed. Indeed many had become corrupted by the malice in Taychend and even descended to become slavers themselves, the traitors! It then followed that Saerraeg the righteous could no longer exist.\n\nIn these intervening years, it seemed like the idea might die in the minds of the oft-corrupted Chendhyan, but the opposite effect has occurred. We rejuvenated it, so it roars forwards like the reaching hands of a tide, beckoning us to reclaim it. Once more we exalt the grand idea of Saerraeg – not one of war and death, but rather the essence of life, which is freedom. So let us do what our ancestors could not! Let us redeclare the struggle for life and freedom and revive ancient Saerraeg!"

 aelnar_nation_title:0 "Reclaim our Birthright"
 aelnar_nation_desc:0 "Many years ago our land was being sundered by a force beyond our power to stop.\nForsaken by our leaders, we left in fleets towards the horizon to a land that many now call home. For us this place was never truly home. We longed to return to our homeland and rebuild our civilization.\n\nWhen Aelantir was rediscovered we were among the first to sail across and settle the lost land. Little or nothing remained of our ancestors; despite this emptiness, we reclaimed and rebuilt this empty land into a place we could belong.\nAnd now the time has come to abandon Cannor forever. Let us retake our place in our glorious homeland and claim our place as the rightful successors of the Precursor Empire!"

 cyranvar_nation_title:0 "Unite the Deepwoods!"
 cyranvar_nation_desc:0 "We have finally crushed the Greentide and assumed a position of dominance among the various Wood Elven realms. Our [Root.Monarch.GetTitle] sees the opportunity presented by this, and has called for the Verdant Pact to be unified into a true state for the Wood Elven people. Naturally our vassals will be absorbed in the process and we will be able to press our claim upon whatever portions of out homeland remain out of our reach. Glorious shall the new realm of Cyranvar be!"
 unite_deepwoods_tooltip:0 "§GWe will integrate all of our Wood Elven vassals in the Deepwoods.§!"
 soyzkaru_cartel_nation_title:0 "Form the Cartel"
 soyzkaru_cartel_nation_desc:0 "For too long, we Forest Goblins have been bullied and bossed about. Now we hold the power and, more importantly, the coin. It is time we reorganize into a proper organization. One committed to cementing our power and filling our pursues. Let us form the Soyzkaru Cartel!"
 forest_goblin_pactseeker_nation_title:0 "Restore the Pact"
 forest_goblin_pactseeker_nation_desc:0 "Once, there was a great goblin realm within the Oldwoods, the forest known before the Deepwoods. It should have stood against the test of time, but was lost to hubris when our ancestors broke the Pact. But what was once lost will be lost no more. Let us restore the Pact and our realm with it!"
 deepwoods_orc_nation_choice_title:0 "Heed the Forest's Whispers"
 deepwoods_orc_nation_choice_desc:0 "As we've grown ever mightier in these strange woods, so too have strange whispers grown ever louder in the ears of [Root.Monarch.GetName]'s ear. At first, they were just a distant breeze. Now they are a haunting gale. For the sake of [Root.GetName], our [Root.Monarch.GetTitle] must find the source of these whispers."
 deepwoods_orc_reform_karakhanbar_title:0 "Relight the Black Hearth"
 deepwoods_orc_reform_karakhanbar_desc:0 "Amongst the greatest of orcish creations, the Black Hearth was a magical forge, created by shamans of the Blackmoon clan to forge weapons that cut down even most of fearsome beasts of the ancient Deepwoods. Alas, the forge has gone dark, overtaken by wild overgrowth. But the fire of the Orcish Soul can never truly be extinguished..."
 deepwoods_orc_reform_tugund_darakh_title:0 "Embrace the Prince"
 deepwoods_orc_reform_tugund_darakh_desc:0 "Thousand years of plotting, and still the Blackened Prince's vengeance remains unsated. Tugund-Darakh, the land of a thousand trees, has been felled. Yet there are always plans within plans. Hear the Prince's call. Become the weapon of the fallen. Water the land with blood Castan's children. Grew anew."

 uanced_nation_title:0 "Declare the Republic of Uanced"
 uanced_nation_desc:0 "People of Uanced! Why shalt thy hard labour go to the feasts of the Barons and Dukes in their High Palaces? Why must thou not rejoice in the fruits of thy labour? Seize it by force! Make your farms thy own and reap the benefits of thy work! You have nothing to lose but your binds!"

 greentide_nation_title:0 "Form The Greentide"
 greentide_nation_desc:0 "Cannor shakes."
 grombar_nation_title:0 "Proclaim the Gray Realm"
 grombar_nation_desc:0 "Our land is barren and poor, where not just the strongest, but the most adaptable survive. The orcish tribes of the Alenic Reach are disunited and weak, threatened by Gerudians and Reachmen alike. We managed to gather many weaker orc tribes under our banner, and it is the right time to truly bring them into the fold. We are no longer Frozenmaws, Broken Jaws or Doombringers. Now we are orcs of Grombar, a realm by and for the Gray Orcs."
 khozrugan_nation_title:0 "Reorganize the Western Army"
 khozrugan_nation_desc:0 "When Korgus led us to the surface, nobody had any idea what it would be like. So green, so bright, so... rich and easy to conquer. Korgus crushed Castellyr and other Escanni kingdoms easily, only to be stopped by Corin. The great army of the Dookanson crumbled into small clans, as it was before the Greentide. But now we have managed to unite orcs of West Castanor under our banner. But times have changed, and humans are aware of the power of orcs. To crush them we need to adapt, to become more like them, but stronger. We need to become a proper nation... the strongest nation Cannor has ever seen."
 unguldavor_nation_title:0 "Found the Kingdom of Unguldavor"
 unguldavor_nation_desc:0 "When Korgus died, we felt like we woke from a nightmare. Countless orcs, sons and fathers, daughters and mothers, lost their lives for the Dookanson's ambitions. Now, since he is gone, we are finally free to choose our own fate. The clans of Clouded Eye, Bladebreaker, and Severed Ear have built a new identity in these lands. While we may have many differences, we share a desire to form a strong and unified realm for all orcs to call home. Unguldavor, named after the wall of forests that protect its heartland, will not fall. We shall live up to Arosha's dream and create a world where orcs can stand with humans, elves, and dwarves as equals in Cannor!"
 barumand_nation_title:0 "Till the New Homeland"
 barumand_nation_desc:0 "We understand why the Escanni people fought so desperately for these lands. The green fields are beautiful, the soil of is fertile and the forests are filled with game. Yet now we own this land and we have full right to call it our new home. Barumand, the Prosperous, will unite all orcs of Southern Escann. No matter which clan you come from we all belong, because we all are ready to protect this land from any foe."
 found_karashar_title:0 "Found the City of the Black Sun"
 found_karashar_desc:0 "Like the Dookanson, we have abandoned the Serpentspine caves for the glory of battle on the surface, although our march led us to a different land. We have managed to crush the resistance of several kingdoms and have gained a foothold in Bulwar.\nIn this land we have made ourselves a new home, with many of our clansmen spreading across the land to ransack the possessions of its former rulers.\nBut some of them have returned to the clan not with loot but with a new idea. Among the tribesmen of our clan a new faith is spreading like wildfire.\nSurakel, God of the Bulwari, has summoned us to this land. Our arrival was not a random happenstance, but predestined. We are His chosen, destined to free the Humans from the lies of the elves and the chains of the gnolls.\nWe have chosen to embrace this idea, and now seek to fulfill Surakel's will and free His people.\nTo do so, the newly formed orc priesthood of Surakel has demanded the founding of Karashar, the City of the Black Sun, from where we will be able to rule all of Bulwar in the name of Surakel."
 found_tarakar_title:0 "Found Tarakar"
 found_tarakar_desc:0 "Never before in orcish history had a warchief grown so powerful, sit upon a pile of trophies so massive, commended so much respect. None besides Korgus, but even he didn't believe orcishkind could ever take the mountain-home for itself. Yet what was thought impossible for many generations of orcs has been accomplished. Let us proclaim Tarakar, and build the home under the mountains our people has always strived for!"
 found_tarakar_mt_warning:0 "Forming Tarakar may §Rprevent§! you from progressing further in your mission tree."
 badakhan_nation_title:0 "Proclaim Badakhan"
 badakhan_nation_desc:0 "We have triumphed in Escann and built a new home for orcs while also showing grace to those who contested us for this new home, this Badakhan. The time has come to embrace a new destiny for the Orcish people and begin a grand cultural flourishing! Escann is ours, let peace reign herein!"
#Kaztubar
 escanni_wars_kaztubar_tt:0 "We will now be able to take the decision to form §JKaztubar§!."
 kaztubar_forming_allowed_tt:0 "Has won the Wars of Consolidation and decided to reforge the legacy of Castanor in the image of orckind."
 kaztubar_nation_title:0 "Crown the First Kastan"
 kaztubar_nation_desc:0 "Our decisive victory in the Wars of Consolidation has left us unchallenged in our dominion of Escann. Many would be content with this victory and not seek further glory - We, however, do not limit our ability to dream far beyond. We came to this land to tear apart the rotting remnants of Castanor, yet in its ruins we have found a legacy that has far outlasted everything it was built upon; a legacy that only the mightiest among rulers could ever dream of claiming for their own. To proclaim themself the ruler of everything, to take upon the name of a Kastan.\nUpon the ashes of Escann we have found our calling, and as orckind rise from barbarians to warriors of an empire, so too shall the banners of the Silver Dragon rise to meet Cannor once more!"

 orcform.1.t:0 "Direction of Our New Country"
 orcform.1.d:0 "Our newly found country of $COUNTRY$ requires guidance. We must reform our clan society into more organized government form if we are to be taken seriously in the political arena - the question is: what model should we seek to strive for?"
 orcform.1.a:0 "$MONARCH$ will unite as a king of our new nation!"
 orcform.1.b:0 "Let us create a republic ruled by our finest chieftains."
 orcform.1.c:0 "Shamans guided us through our history, only they are fit to rule a united orcish nation."
 orcform.2.t:0 "Birth of a New Orc People"
 orcform.2.d:0 "Not long ago [Root.Country.GetName] was nothing but weak idea in minds of a few orcs. Now, [Root.Country.GetName] has grown to be a fledgling state of its own, and one that has now proven itself as a member of global society.\n\nWith the affirmation of a new nation comes change. Generation after generation is born without ever visiting the [From.Culture.GetName] homeland, and while not seeking to sever their ties, they do wish to establish themselves as their own independent people."
 orcform.2.a:0 "Embrace the culture shift"
 orcform.2.b:0 "Reject it!"
 orcform.3.t:0 "A Black Sun Looms Over Bulwar"
 orcform.3.d:0 "The invitation arrived at the old Ziggurat in Azka-Sur just as the sun was setting, words written in a shakey hand, but with a clear message: a delegation of priests was requested by the orcs who had recently spilled into Bulwar. The purpose could not quite be made out, but the repeated promises of safety ameliorated the priesthood's worries. And so a handful of junior priests departed, riding some of the Kingdom's least-valuable horses.\n\nAs the emissaries approached, at roughly Noon, they saw a field of silver and black waiting outside [Root.Capital.GetName] — thousands upon thousands of Black Orcs, armor-clad, arrayed around a small hill. The priests looked askance at one another, but none wanted to be the first to suggest cowardice, and so they slowly nudged their steeds towards this convocation.\n\nThe envoys neared, having to force their mounts along — especially when the orcs started to beat their weapons against one another, and parted ranks to let them through. Each polished blade flickered, illuminated in the high Noon sun. Swallowing their fear and their bewilderment, the delegation continued through the throng, towards the figure at its center.\n\nThat figure: a tall orc, skin as black as night, a sharp contrast to the golden crown gleaming in his hands. He gestures the delegation to stop, and its leader dismounts. The orc briefly closes his eyes, nods. He steps forward, places the crown in the Dartaxi priest's hands, and kneels before him. The noise all around suddenly ceases, the land goes quiet, all Bulwar seeming to hold its breath.\n\nThat priest has been in his position only a few years, in the priesthood less than a decade. What could he say? What could he do, aside from the obvious? And so with trembling hands he places the crown on the chieftain's head. A moment passes, two. And then the orc rises, the silence is broken. Every orc chants a single word: "Karakal! Karakal! Karakal!""
 orcform.3.a:0 "The Forgiveness awaits us."

 marcher.1.t:0 "Direction of Our New Country"
 marcher.1.d:0 "Our newly found country of $COUNTRY$ requires guidance. We must reform our government to ones of the old world if we are to be taken seriously in the political arena - the question is: what model should we seek to strive for?"
 marcher.1.a:0 "Proclaim $MONARCH$ as our new monarch!"
 marcher.1.b:0 "Let us create a republic ruled by our most seasoned members."
 marcher.1.c:0 "The west answers to one thing: wealth - as such our country must do the same."
 marcher.1.dd:0 "Mages formed a large part of our victory, and will form our senior membership."
 marcher.2.t:0 "Birth of a New People"
 marcher.2.d:0 "Not long ago [Root.Country.GetName] was but a dream for a group of adventurers. Now, [Root.Country.GetName] has grown to be a fledgling state of its own, and one that has now proven itself as a member of global society.\n\nWith the affirmation of a new nation comes change. Generation after generation is born without even visiting the [From.Culture.GetName] homeland, and while not seeking to sever their ties, they do wish to establish themselves as their own independent people."
 marcher.2.a:0 "Embrace the culture shift"
 marcher.3.t:0 "Cultural Shift in Escann"
 marcher.3.d:0 "As adventurers from all over Cannor begin to settle in Escann, their long separation from their homelands and the birth of new generations have caused an emerging social shift. While still retaining many aspects of their original culture and traditions, the melting pot has allowed many to consider themselves a new people, taking after their newly claimed lands. From now on, this distinction means the people of Escann can no longer be called the same as they were before."
 marcher.3.a:0 "As long as they still bend the knee"
 marcher.4.t:0 "Cultural Shift in Aelantir"
 marcher.4.d:0 "As adventurers and pioneers from all over Cannor begin to settle in Aelantir, their long separation from their homelands and the birth of new generations have caused an emerging social shift. While still retaining many aspects of their original culture and traditions, the melting pot has allowed many to consider themselves a new people, taking after their newly claimed lands. From now on, this distinction means the people of Aelantir can no longer be called the same as they were before."
 marcher.4.a:0 "As long as they still bend the knee"

 blademarches_change_government_reform_tt:0 "Enact §YBlademarches Kingdom§! Government Reform." 
 farranean_nation_claims_tt:0 "§YFarraneán§! gains permanent claims in §YWhistlevale§!, §YCursewood§! and §YValefort§! areas."
 blademarches_nation_claims_tt:0 "§YBlademarches§! gains permanent claims in §YBlademarch§!, §YClovenwood§!, §YBanesfork§!, §YBeastgrave§!, §YVernham§! and §YDostan's Way§! areas."
 adenica_nation_claims_tt:0 "§YAdenica§! gains permanent claims in §YAdenica§!, §YRohibon§!, §YTaran Plains§!, §YBalmire§!, §YFalsemire§!, §YVerteben§! and §YValefort§! areas."
 castellyr_nation_claims_tt:0 "§YCastellyr§! gains permanent claims in §YCastonath§!, §YTrialmount§!, §YLower Nath§!, §YUpper Nath§!, §YWestgate§!, §YSouthgate§! and §YNortmere§! areas."

 half_elven_military_short_tt:0 "\n§TChange to Half-Elven Administration and Military.§!\n§gYou can see the modifiers granted by this race in the §YRacial Menu§!.§!\n"

 dynasty_setup.1.t:0 "The Ruling Dynasty of $COUNTRY$"
 dynasty_setup.1.d:0 "While $MONARCH$ came from a more modest background, [From.Monarch.GetHerHis] heir will not. Our newly proclaimed kingdom must determine what to call the royal house of $COUNTRY$."
 blademarches_nation_title:0 "Reforge the Blademarches"
 blademarches_nation_desc:0 "In the days of old, this land was ruled by the proud Blademarches. A realm that stood strong, training the greatest warriors of Escann to become the Stewards of Calindal, the Gleaming Blade.\nWhen the armies of Korgus invaded, the marcher knights died fighting to defend the Blade. In the end Calindal was broken and so were the Blademarches.\nBut now, we have the chance to reforge Calindal anew, and thus allow the rebirth of the once proud Blademarches!"
 luciande_nation_settling_advice_tt: "§OIt's recommended to settle near the "§YCursewood§!" area if forming this country.§!"
 flavor_luciande.1.a:0 "Why not name it after our country's name? The House of Luciande."
 flavor_luciande.1.b:0 "Let us remember our founder's name: The House of Thorns."
 flavor_luciande.1.c:0 "Keep our current ruler's surname."
 flavor_ancardia.1.a:0 "Why not name it after our country's name? The House of Ancard."
 flavor_ancardia.1.b:0 "What about the 'sína Trás' meaning 'of the Crossing'?"
 flavor_ancardia.1.c:0 "Keep our current ruler's surname."
 rogieria_nation_settling_advice_tt: "§OIt's recommended to settle in the "§YWest Castanor§!" region if forming this country.§!"
 flavor_rogieria.1.d:0 "While $MONARCH$ came from a more modest background, [From.Monarch.GetHerHis] heir will not. Our newly proclaimed kingdom must determine what to call the royal house of $COUNTRY$.\n\nWhile Rogier Silmuna did not produce any heirs, there are descendants of his nephew, Lothane 'Bluetusk' Silmuna, that we can invite to take the throne."
 flavor_rogieria.1.a:0 "What else is our purpose but to restore the Silmuna name?"
 flavor_rogieria.1.b:0 "Why not name it after our country's name? The House of Rogier."
 flavor_rogieria.1.c:0 "Keep our current ruler's surname."
 elikhand_nation_settling_advice_tt: "§OIt's recommended to settle near the "§YTaran Plains§!" area if forming this country.§!"
 flavor_elikhand.1.a:0 "Let us stick to our roots. Our family will be called the House of Elikhandos."
 flavor_elikhand.1.b:0 "To gain legitimacy we must adhere to the customs of this land: síl Elikhand."
 flavor_elikhand.1.c:0 "Keep our current ruler's surname."
 flavour_wyvernheart.1.a:0 "Let us name ourselves after our newfound country: The House of Wyvernheart"
 flavour_wyvernheart.1.b:0 "Honestly 'of'? Let's just be called Wyvernheart!"
 flavor_alenor.1.a:0 "The House of Alenor of course!"
 flavor_alenor.1.b:0 "I quite like the fancy elven style to be honest: síl Alenor"
 flavor_alenor.1.c:0 "Keep our current ruler's surname."
 flavor_stalbor.1.a:0 "Why not name it after our country's name? The House of Stalbór."
 flavor_stalbor.1.b:0 "The Stal on its own sounds pretty cool."
 flavor_stalbor.1.c:0 "Keep our current ruler's surname."
 ravenmarch_nation_settling_advice_tt: "§OIt's recommended to settle near the "§YDostan's Way§!" area if forming this country.§!"
 flavor_ravenmarch.1.a:0 "Let us offer the crown to a member of the ruling House of [A59.Dynasty.GetName]."
 flavor_ravenmarch.1.b:0 "Let us name it after our country: the House of Ravenmarch."
 flavor_ravenmarch.1.c:0 "Keep our current ruler's surname."
 flavor_araionn.1.a:0 "Why not name it after our country's name? The House of Araionn."
 flavor_araionn.1.b:0 "What about the 'sílna Ór' meaning 'of the Gold'? We love gold!"
 newshire_nation_settling_advice_tt: "§OIt's recommended to settle near the "§YAdenica§!" area if forming this country.§!"
 flavor_newshire.1.a:0 "Why not name it after our country's name? The House of Newshire."
 flavor_newshire.1.b:0 "We should offer it to a member of the prestigious House of Vis!"
 flavor_newshire.1.c:0 "Keep our current ruler's surname."
 flavor_estaire.1.a:0 "Why not name it after our country's name? The House of Estaire."
 flavor_estaire.1.b:0 "What about the 'sína Ádhesta' meaning 'of the Lucklady'?"
 flavor_estaire.1.c:0 "Keep our current ruler's surname."
 flavor_anbenland.1.a:0 "Why not name it after our country's name? The House of Anbenland."
 flavor_anbenland.1.b:0 "What about the just 'Anben'?"
 flavor_anbenland.1.c:0 "Keep our current ruler's surname."
 flavor_nurcestir.1.a:0 "Why not name it after our country's name? The House of Núrcestir."
 flavor_nurcestir.1.b:0 "Let's name it after the greatest voyage ever known: the Remnant Fleet. The House of Edillia."
 flavor_nurcestir.1.c:0 "Keep our current ruler's surname."
 esthil_nation_settling_advice_tt: "§OIt's recommended to settle near the "§YCastonath§!" area if forming this country.§!"
 flavor_esthil.1.a:0 "Why not name it after our country's name? The House of Esthíl."
 flavor_esthil.1.b:0 "A talented wizard under the local Silver Family, the House of Silurion will solidify our claims."
 flavor_esthil.1.c:0 "Keep our current ruler's surname."
 flavor_rosande.1.a:0 "Why not name it after our country's name? The House of Rósande."
 flavor_rosande.1.b:0 "What about The House of the Rose?"
 flavor_rosande.1.c:0 "Keep our current ruler's surname."
 hammerhome_nation_settling_advice_tt: "§OIt's recommended to settle near the "§YCastonath§!" area if forming this country.§!"
 flavor_hammerhome.1.a:0 "Why not name it after our country's name? The House of Hammerhome."
 flavor_hammerhome.1.b:0 "What about Ironhammer?"
 flavor_hammerhome.1.c:0 "Keep our current ruler's surname."
 flavour_covenblad.1.a:0 "Why not name it after our country's name? The House of Covenblad."
 flavour_covenblad.1.b:0 "Let us name it after the founder of the Orda Aldresia. We shall be the House of Aldre!"
 flavour_covenblad.1.c:0 "Keep our current ruler's surname."

 silvermere_nation_title:0 "Form the Kingdom of Silvermere!"
 silvermere_nation_desc:0 "We have grown powerful enough to assert dominance over the great Silvermere, the largest body of water in Escann and hub of Escanni trade. Let us formalize our rule and bring glory to our people!"
 flavor_silvermere.1.a:0 "Why not name it after our country's name? The House of Silvermere."
 flavor_silvermere.1.b:0 "Let's name it after our Kingdom, but with less of that flamboyant elven flair."
 flavor_silvermere.1.c:0 "Keep our current ruler's surname."

 flavor_blademarches.1.a:0 "Let's keep it simple and Cannorian. The House of Blademarch."
 flavor_blademarches.1.b:0 "Let's name it after our Kingdom, but in Elven! What about síl Blaídith?"
 flavor_blademarches.1.c:0 "Keep our current ruler's surname."


 flavor_castellyr.1.d:0 "The kingdom of Castellyr stands again, but who is its rightful ruler? Should the kingdom be returned to its old rulers, the Silurion dynasty? Perhaps the throne should go to a prestigious Castanorian family, to secure its legacy as the successor of Castanor? Or maybe, it is time for [Root.Monarch.GetName] to create a dynasty of [Root.Monarch.GetHerHis] own?"
 flavor_castellyr.1.a:0 "Three cheers for the rightful return of House Silurion!"
 flavor_castellyr.1.b:0 "The síl Naths have ruled here since the Castan I's time. Who can claim greater legitimacy?"
 flavor_castellyr.1.c:0 "Keep our current ruler's surname."

 corintar_nation_title:0 "Organize the Corintar"
 corintar_nation_desc:0 "Our company was founded by the most loyal amongst Corin’s Circle, we fought by her side and claimed her as our maiden of war. She was and still is our greatest moral guide, but ever since she departed, the proper path forward has been harder to decide on.\nWithout her to lead us many believed our company would not last, that we would fall like many amongst the would-be rulers of the new Escann.\nThey were wrong, for even if she is no longer with us in body, she still guides us in spirit.\nIt is now more clear than ever that the Corintar still have a place in this new Escann, not as defenders but as caretakers. Corin gave her life to defend this land and now is our duty to make sure it thrives like never before.\nIn her name, the Corintar will be born anew."
 corintar_nation_settling_advice_tt: "§OIt's recommended to settle near the "§YHumacvord§!" area if forming this country.§!"
 flavor_corintar.1.a:0 "Let us honor our ancient founder and patron deity."
 flavor_corintar.1.b:0 "Let us honor the Circle who fought for Corin."
 flavor_corintar.1.c:0 "We see no need for change."
 flavor_corintar.0.t:0 "Future of the Corintar"
 flavor_corintar.0.d:0 "Long gone are the days when we were a ragtag band of misfits brought together by Corin and Lothane. If we are to take our place on the world stage, we must reform Corin's Chosen into a modern state, with all the duties and responsibilities that entails. But what form of governance will suit us best?"
 flavor_corintar.0.a:0 "Proclaim the Grandmaster, $MONARCH$, as Corin's heir and rightful monarch!"
 flavor_corintar.0.b:0 "Let us create a republic ruled equitably by the successors of Corin's Circle."
 flavor_corintar.0.c:0 "Reorganize into a mercantile state to bring prosperity back to Escann."
 flavor_corintar.0.e:0 "Transform into a true military order and finish what Corin started!"

 flavor_sornicande.1.a:0 "Why not name it after our country's name? The House of Sornicande."
 flavor_sornicande.1.b:0 "Let us invite a member of the ancient House of Sorncóst"
 flavor_sornicande.1.c:0 "Keep our current ruler's surname."

 flavor_neratica.1.a:0 "Why not name it after our country's name? The House of Neratica."
 flavor_neratica.1.b:0 "What about 'sílna Onyx?'"
 flavor_neratica.1.c:0 "Keep our current ruler's surname."

 flavor_istranar.1.a:0 "Why not name it after our country's name? The House of Istranar."
 flavor_istranar.1.b:0 "Let us invite the good Corinite family of Silistra!"
 flavor_istranar.1.c:0 "Keep our current ruler's surname."

 flavor_tiru_moine.1.a:0 "Why not name it after our country's name? The House of the Meadow, also known as síl Móine."
 flavor_tiru_moine.1.b:0 "Let's invite the House of Menibór."
 flavor_tiru_moine.1.c:0 "Keep our current ruler's surname."

 flavor_freemarches.1.a:0 "Why not name it after our country's name? The House of Freemarch."
 flavor_freemarches.1.b:0 "What about 'free' in Elven: sílna Rhas."
 flavor_freemarches.1.c:0 "Keep our current ruler's surname."

 flavor_pelodaire.1.a:0 "There's only one option really: ta'Pelodir."

 flavor_west_tipney.1.a:0 "Why not name it after our country's name? The House of Tipney!"
 flavor_west_tipney.1.b:0 "The halfling House of Vis are good candidates."
 flavor_west_tipney.1.c:0 "Keep our current ruler's surname."

 flavor_new_havoral.1.a:0 "Let us resurrect the ancient House of Havoral."
 flavor_new_havoral.1.b:0 "Let's do síl Havoral to add some legitimacy."
 flavor_new_havoral.1.c:0 "Keep our current ruler's surname."

 flavor_chippengard.1.a:0 "Why not name it after our country's name? The House of Chippengard."
 flavor_chippengard.1.b:0 "Just Chippen would do."
 flavor_chippengard.1.c:0 "Keep our current ruler's surname."

 plumstead_nation_title:0 "Form Our Own Country!"
 plumstead_nation_desc:0 "We've settled enough in these newfound lands of Aelantir to call it our home. We must move on from our adventurer beginnings and turn into a sovereign nation in our own right!\n\n§R(Mutually exclusive with formables that revive extinct Escanni kingdoms)§!"

 flavor_nur_dhanaenn.1.a:0 "Why not name it after our country's name? The House of Dhánaenn."
 flavor_nur_dhanaenn.1.b:0 "The Silcalas family will help us."
 flavor_nur_dhanaenn.1.c:0 "Keep our current ruler's surname."

 flavor_tellumtir.1.a:0 "Why not name it after our country's name? The House of Tellumtir."
 flavor_tellumtir.1.b:0 "The enigmatic house of í Deedaunt offers their services."
 flavor_tellumtir.1.c:0 "Keep our current ruler's surname."
 

 #eordand.1.t:0 "Direction of Eordand"
 #eordand.1.d:0 "With the unification of Eordand, and the changing world around around us, it is clear that we must choose the path of our nation."
 #eordand.1.a:0 "Proclaim $MONARCH$ as our new monarch!"
 #eordand.1.b:0 "Let us create a republic ruled by a council of the most esteemed."
 #eordand.1.c:0 "Cannor answers to one thing: wealth - as such our country must do the same."
 #eordand.1.dd:0 "Powerful magicians will lead our society, it has been decided by the Domandrod."
 eordand.2.t:0 "The Center of Power"
 eordand.2.d:0 "The lands of Eordand are vast in both land and ideology. If we are to rule this land, a center of power must be established that can equally represent each of seasons."
 eordand.2.a:0 "Eordand will be reborn from Arakeprun!"
 eordand.2.b:0 "Murdkather is the prime location for trade."
 eordand.2.c:0 "Einnsag's legions will protect Eordand."
 eordand.2.dd:0 "The mediators of Gemradcurt will keep the peace."
 eordand.2.e:0 "The Domandrod demands our obedience!"
 eordand.2.f:0 "I am not moving from my throne!"
 eordand.2.g:0 "All of Eordand shall be sheltered under Dorcurt's Golden Shield."

 birth_of_a_new_people:0 "Birth of a New People"
 birth_of_a_new_people_prov_mod:0 "Resistance of a New People"
 birth_of_a_new_people_prov_mod_tt:0 "Every owned Province gets '§YResistance of a New People§!' for §Y10 years§!, giving the following effects:\nWar Score Cost: §R+25.0%§!"
 anb_keep_former_culture_tt:0 "We will keep §Y[Root.Culture.GetName]§! as an Accepted Culture."

 tooltip_castellyrian_culture_provinces:0 "All Primary Cultures provinces will now be §YCastellyrian§! culture."
 tooltip_castanorian_culture_provinces:0 "All Primary Cultures provinces will now be §YCastanorian§! culture."
 tooltip_black_castanorian_culture_provinces:0 "All Primary Cultures provinces will now be §YBlack Castanorian§! culture."
 tooltip_kobildzani_culture_provinces:0 "All non-accepted §YKobold§! Culture Group provinces in Cannor not owned by [Root.GetName] will now be §YKobildzani Kobold§! culture."
 tooltip_syzirzexi_culture_provinces:0 "All §YKobold§! Culture Group provinces will now be §YSyzirzexi Kobold§! culture."
 vinces:0 "All §YKobold§! Culture Group provinces will now be §YKobildzani Kobold§! culture."

 form_harimraj_title:0 "Unite the Harimraj"
 form_harimraj_desc:0 "Since the time of Harimar the Great, the Harimraj has been ruled by our people, the harimari. However, this rule has always been tenuous at best, and our weakness was harshly demonstrated to us during the conquest by the Phoenix Empire. Now, however, our nation is finally in a position to truly centralize the Raj and build one single, united state, under the rightful rule of the harimari. No longer is the Raj but a squabbling mess of Prabhia and Senaptia. Now, all shall bow before the Raja of the Harimraj."
 form_rahenraj_title:0 "Reclaim the Rahenraj"
 form_rahenraj_desc:0 "Long ago the lands of Rahen were united under the rule of the Rahenraj, the greatest empire built by our people. Yet in a moment of weakness a new power came to build their own realm on its ruins. Ever since the day Harimar marched north out of the jungles with his newborn people we have been ruled by his kin.\nBut, their rule has been proven weak. The conquest of the Harimraj by the Phoenix Empire has proven beyond a doubt that the Tyrant’s Claw was not infallible.\nAnd now, we are in a position to challenge centuries of Harimari rule.\nThe Raj will no longer be but a squabbling mess of Prabhia and Senaptia ruled poorly by a decadent son of Harimar, no.\nNow and forevermore, all shall bow before the Raja of the Rahenraj!"
 form_dhugajir_title:0 "Unite the Elephant-Lords"
 form_dhugajir_desc:0 "For untold centuries, the lands of Dhugajir have been divided amongst squabbling Elephant-Lords. It was this squabbling that weakened us, and allowed us to be conquered by the Harimari and the Sun Elves. Now, however, that the lands of the Ghavaanaj are united under our rule, we can finally form a unified kingdom of our own. Rahen will quake with the thunder of our stampede!"
 form_nadimraj_title:0 "Restore the First Raj"
 form_nadimraj_desc:0 "Long ago, the Nadimraj was the greatest of all civilisations, a shining beacon of the cultural, economic, and military supremacy of Shamakhad. However today this is a distant memory, buried under the weight of centuries of Harimari domination of our ancestral lands. Now, however, we have reunited our core lands, and the ancient cities of the north stand united once more. The Nadimraj was the greatest of all civilisations, and through our rule, it shall be so again."
 form_ghankedhen_title:0 "Unite the Tribes of Ghankedhen"
 form_ghankedhen_desc:0 "For as long as anyone can remember, the tribes and clans of Ghankedhen have been divided. Our people have always been submissive, whether that be under fellow Raheni, under the Harimari, or even under the Elves. But though conquerors rise and fall, the clans have remained. Though armies come and go, the tribes have survived. Though rulers live and die, the families have endured.\n\nBut now the time has come for us to forge our own destiny. Free of conquerors, free of invaders, for the first time, the Ghankedhen will unite!"
 form_dhujat_title:0 "Rebirth of the Great Dhujat"
 form_dhujat_desc:0 "Once, Dhujat was a united force, a great union of cities, that served as a great bulwark of the Raj against the rest of Haless. It was once the richest nation in Rahen, dominating the trade along the great Kharunyana. However, when Jaher and his Phoenix Empire invaded, Dhujati unity was shattered, and has never truly recovered, with its former lands divided between a series of squabbling city-states, all claiming to be the rightful heirs to the Dhujati legacy.\n\nWe, however, have come out on top, and united the lands of Dhujat under our rule. Now, although not all of the states are under our control, we have united the lands west of the Kharunyana, and can now declare ourselves Dhujat reborn, in order to truly begin the process of reuniting our great nation."
 form_sardhasi_title:0 "Unite the Southern Cities"
 form_sardhasi_desc:0 "Across southern Rahen, great cities rise. Whether the peoples of those cities be Raheni or Harimari matters not, for they live in relative harmony. With the caste system ensuring stability, the lands of the south have prospered. Now, however, for the first time in living memory, they have been united under our rule. By proclaiming a new nation, we shall unite all peoples of Southern Rahen, whether they be Harimari or Raheni, into one great union of cities, one great kingdom of kingdoms, one true people of peoples; Sardhasi."
 form_vanrahar_title:0 "Rise of the Primal Kingdom"
 form_vanrahar_desc:0 "Over a millennium ago in this very land the first Harimari awoke, and ever since then our kin have ruled over Haless with might and pride.\nAnd yet, the birthplace of our people has remained divided among warring clans who constantly struggle to claim superiority over each other.\nBut this cycle has been broken.\nFor the first time since the days of the Legendary Harimar we have unified the Ascension Peninsula under one banner. With our people truly united at last, we can build our new realm. Vanrahar."
 harimaraj_formation_warning_tt:0 "If we become §YVanrahar§!, we will be locked from forming §YHarimraj§! until we have progressed far enough in our new §YMission Tree§! and put down the §RBlood Lotus§!"

 form_surakes_title:0 "Unite the Cities of Bulwar"
 form_surakes_desc:0 "Bulwar is the birthplace of human civilisation, but unlike other, much younger lands, it has never been united under native human rule. It's been conquered by Gnolls and Elves, but it is time that came to an end. We have united the cities of Bulwar under our banner, for the first time a banner of a Bulwari citystate. We will not let our homeland fall under the rule of a foreign power again!"

 khuraen_ulaeg_nation_title:0 "Embrace the Call of Vengeance"
 khuraen_ulaeg_nation_desc:0 "A storm is coming.\nThe days of weak lesser caehns fighting over worthless lands and ancestral clan feuds are over.\nThis is a new era.\n[Root.Monarch.GetName] has risen to the call as the one and true chosen of Irdaeos.\nWe fought to forge a caehnate worthy of embodying the relentless winds and now the time has come to claim upon the highest title any children of Irdaeos could ever dream of.\nWarrior of Winds, Ruler of the Storm, Incarnate of Vengeance - \nKhüraen Caehn, §RThe Crimson Caehn§!!"
 form_altorzamh_title: "Federate the River Caehns"
 form_altorzamh_desc: "A time of great change is upon us; the Triunics are developing technologies that are quickly shortening the gap in military might that we have had over them for millennia, and they will swiftly become a force to be reckoned with. In this rapidly evolving landscape, we must either find a new niche for ourselves or become... obsolete. To find our future, we must look to the past for guidance. During the reign of the River Caehns, many clans along the Egoirlust became very prosperous by performing one specific task: purchasing goods in the markets of Nanšalen, allegedly sourced from the fabled golden cities of Bulwar, and ferrying them all the way to the shores of the lakes, where Triunic merchants were willing to go to great lengths to acquire these goods. While this arrangement was ultimately short-lived due to escalations between the Jolgik Uts and the faraway clans of the north, the prosperity it brought the river clans cannot be overlooked. If we are to succeed, we must make conditions amenable to this sort of arrangement once again. We are strong, swift, and shrewd, and there is no telling what riches we might find in facilitating trade between the lake peoples and the lands of Bulwar, or even what lies beyond..."
 form_lejdazamh_title: "Centralize the Steppes"
 form_lejdazamh_desc: "A time of great change is upon us; the Triunics are developing technologies that are quickly shortening the gap in military might that we have had over them for millennia and eyeing the steppes greedily, seeking to expand out across Irdaeos's domain and extinguish our peoples. The Ogre Kingdoms too, in their valley, seek to expand their reign over our clans. Some among our Caehnate claim that the best way to protect ourselves is to establish our own reign over them. For too long, our conflicts with the ogre kingdoms and the lake cities have been primarily to loot and plunder and not to establish our own lawful rule. That will end now. Our warriors are, and will need to remain, the strongest on Halann. They shall bring our enemies realms to heel beneath us, and through our strength and honor we will establish our order, an iron set of laws and traditions that will keep them in line... and out of our home."
 form_taryeanzamh_title: "Unite the Storm King's Descendants"
 form_taryeanzamh_desc: "A time of great change is upon us; the Triunics are developing technologies that are quickly shortening the gap in military might that we have had over them for millennia and eyeing the steppes greedily, seeking to expand out across Irdaeos's domain and extinguish our peoples. However, Irdaeos has given us the tools to protect our lands, one distinct advantage that they squander: the liberating powers of magic. To speak with the voice of Irdaeos, summon storms, infernos, whirlwinds, and creeping cold. They will hear the voice of Irdaeos, for he rules over all. Beyond the Forbidden Plains, to the east, lies a land we have heard only legends of, not visited by our kind since the Storm King himself roamed the earth. A land choking with magical and spiritual power... but a land that has forgotten Irdaeos, whose domain is everything the sky touches. They do not remember that Irdaeos is the god of their gods, who rules over them still, and we, his chosen people, shall be the ones to remind them."

 taryeanzamh_malukhuga_requirement: "Religion is §YIrdaeos Worship§!, and is either §MMalukhuga Sect§!, or has invited their §YScholars§!"
 lejdazamh_maslekhuga_requirement: "Religion is §YIrdaeos Worship§!, and is either §lMaslekhuga Sect§!, or has invited their §YScholars§!"
 altorzamh_irdukhuga_requirement: "Religion is §YIrdaeos Worship§!, and is either §TIrdukhuga Sect§!, or has invited their §YScholars§!"


 qarshtuluu_nation_title:0 "Reunite the City of Glass"
 qarshtuluu_nation_desc:0 "For many years the proud city of Qarshtuluu stood united as a beacon of freedom, fighting against the warmongers that arose to see its demise.\nBut this was not to last, for the savages of Vahjevgiiv saw to put an end to our great city. Though they failed to completely end our freedom, they were able to divide us for centuries. Today, as our armies parade along the streets of Qarshtuluu we could at last have faith that this division was not to last.\nSo stand proud! We are united at last!"

 kalsyto_nation_title:0 "§MUnite the Lake Federation§!"
 kalsyto_nation_desc:0 ""Many years ago, in this very land, there were many lone cities.\nThey stood alone, steadfast defenders fighting in isolation against the many horrors the world threw at them. Many were hurt, many more lost. When the chaos was at its darkest, an idea was born: a union, a Federation of cities.\nEver since then our cities have worked together to build towards that dream. Those who woke up every day to work the smiths, those who traveled the land to secure the resources needed, those who fought to defend and those who helped them along the way - all of them, together, build their cities into a Federation to withstand any threat, so that we will never again have to struggle alone. A. So it is today, under Kalyin’s grace, that they are finally united together -so they may never again stand alone!"\n\n     - [Root.Monarch.GetName]´s speech at the signing of the Constitution of the Lake Federation."

 lake_federation_cohesion_splinter_title: "§M[Root.getLAKEFEDSPLINTER_TITLE]§!"
 lake_federation_cohesion_splinter_desc: "§M[Root.getLAKEFEDSPLINTER_DESC]§!"
 lake_federation_cohesion_splinter_2_title: "§M[Root.getLAKEFEDSPLINTER_TITLE]§!"
 lake_federation_cohesion_splinter_2_desc: "§M[Root.getLAKEFEDSPLINTER_DESC]§!"
 lake_federation_cohesion_splintering: "The §MFederation§! will begin to §YSplinter§!, starting a §RCrisis§! in which others members of the federation will form or join into new nations. However, others will rise to defend the Federation's very existence."

 getLAKEFEDSPLINTER_TITLE_J49:0 "Ascend the Mages"
 getLAKEFEDSPLINTER_DESC_J49:0 "It is time to part ways with the Federation. Let us undo it so that all Triunics can follow their true destiny... even if that destiny might not be clear at first.\nAmongst our people there are those most wronged by the rule of the old union, those blamed collectively for the wrongs of one evildoer.\nMages and the sons of Soiti alike are blameless for the evils done in the past. They were attacked without reason, and their freedoms of faith and way of life unjustly limited. Now it is time for them to have a home, a place to belong.\nA place both to wander and to wonder.\nWith them as part of our government we can begin to build a great homeland for us all, free from the shackles of the Federation’s so-called ‘freedom’."
 getLAKEFEDSPLINTER_TITLE_J50:0 "Crown a King of the Triunics"
 getLAKEFEDSPLINTER_DESC_J50:0 "It is time to part ways with the Federation. Let us undo it so that all Triunics can follow their true destiny: To choose one to lead us to glory!\nIt is clear to us all that the republics that rule the many cities of the Federation have grown weak,rotting away from within.. The absence of a strong ruler naturally empowers the selfish and the misguided. No more! This chaos shall come to an end. Under one proud banner the King of the Triunics shall guide us to victory!"
 getLAKEFEDSPLINTER_TITLE_J51:0 "Look into the Horizon"
 getLAKEFEDSPLINTER_DESC_J51:0 "It is time to part ways with the Federation and undo it so that all Triunics can follow their true destiny: To look outwards into the world beyond!\nFar beyond Yarikhoi there are many lands filled with opportunities for our peoples, but the Federation's fear and isolationism has limited our ability to explore - only the cities east leave to seek a new land.\nBut now we have a chance to be free, not just from the politics of the Federation but also to travel across the seas and discover what's beyond this peninsula!"
 getLAKEFEDSPLINTER_TITLE_J52:0 "Proclaim the Nation of Steel"
 getLAKEFEDSPLINTER_DESC_J52:0 "It is time to part ways with the Federation. Let us undo it so that all Triunics can follow their true destiny: to reforge our lands in the name of Ennuk!\nLong ago we lost our homes to catastrophe and then again to the invading centaurs. As we moved from one place to another, we learned to build and rebuild; today, for the first time in many years, we finally have a place we can call a home.\nAround this lake we have risen, broken no more; we are remade of iron and steel. This is our land and we shall be the ones to rule it at last!"
 getLAKEFEDSPLINTER_TITLE_J53:0 "Return to our Ancestral Homeland"
 getLAKEFEDSPLINTER_DESC_J53:0 "It is time to part ways with the Federation. Let us undo it so that all Triunics can follow their true destiny: to return to the steppes from which we once came!\nFor too long we have stumbled forward, blinded by the ideas of the naive and weak whose only ideas were to build the walls that are crumbling now. We lost our ways of freedom and allowed our people to be pushed away from whence they came; now they have grown soft and weak. No more, we say!\nWe raise the banner of the Old Sun and proclaim the return to the ways of our forefathers; a return to steppes and to freedom."


 form_udzenklan_title:0 "Form The Allclan"
 form_udzenklan_desc:0 "Having proven our might and united all cave goblin clans existing in the Western Dwarovar, we have declared all clans to be abrogated aside from Ves Udzenklan, the clan of all. The time has come to abandon petty rivalries and focus on progress for the goblin race. Though such a radical restructuring may no doubt rankle powerful and weak alike, the might and wealth at our disposal is enough to allay such concerns. This is truly a historic moment in our people's history. There is no way this can end badly for us. The mountains are ours! For the future! For goblinkind!"
 form_udzenklan_tooltip:0 "The other four §Ygoblin tribes§! of the §YWestern Dwarovar§! are either our subjects or do not exist"
 form_underkingdom_title:0 "Carve the Underkingdom"
 form_underkingdom_desc:0 "Our shamans recount a story of millennia ago, where both goblins and dwarves lived in the Tree of Stone in perpetual conflict. The rapacious greed of the dwarves caused them to drive out goblinkind, pushing our people ever further west as the dwarves sought the riches of the Serpentspine. Now, through conquest, diplomacy, and grit we have secured the Tree of Stone and for the first time in thousands of years our people can dwell in the homeland without fear of dwarven axe or orcish marauder. But there is a threat on the horizon. The hobgoblins, goblinoids blessed with stronger forms and cursed with an unimaginative discipline. Now that we have united the Tree of Stone, the Command is no longer the unchallenged ruler of the eastern mountains.\n\nWhatever our previous stance with them, it is without a doubt that the militaristic hobgoblins will see us a target for conquest now that we represent a challenge to their might."
 form_svaikzenszel_title:0 "Form Svaikzenszel"
 form_svaikzenszel_desc:0 "Through blood sweat and tears we have risen from humble origins to a mighty [Root.GovernmentName], and through this grind we have established a stable foundation to grow our enterprise from. We are now ready to take the next step and completely overhaul our image through an elegant rebrand. We are Svaikzenszel, a venture composed of the greatest thieves, scammers, looters and investors of all goblinkin."
 
 guwaamud_nation_title:0 "Heirs of Bhengudak"
 guwaamud_nation_desc:0 "Long ago the Great Kusheng Bhengudak conquered the kingdom of Gowon in the east, ushering in the mighty empire of Guwaamud, which would stand for nearly 900 years before it was torn down by their disloyal subjects. We have since repeated Bhengudak's grand feat, crushing the Gowon and not only returning to Bhengudak's capital, but once again laying claim to the fallen capital of Gowon. With such great successes, we can now rightfully declare ourselves the sovereigns of Guwaamud, heirs to the glory of Bhengudak!"
 daxugo_nation_title:0 "The Great Empire"
 daxugo_nation_desc:0 "The Yan have long looked down on our people, haughtily dismissing us as savages from the decadent opulence of their cities and confident in the security of their walls. How they must be reeling now that our hordes have overrun their most important cities, our banners flying proud over their markets and palaces. Our time in this land has changed us however, with many of our people adopting the traditions and culture of the Yan; our warlords wear Yansheni silk and many speak the native language as their tongue of birth. It is time for us to accept the winds of change and establish a grand empire that shall finally unify all of Yanshen under a single throne."
 
 akasik_nation_title:0 "Unite the Children of Akasik"
 akasik_nation_desc:0 "For eons our people have dreamed of an independent Akasi realm, free from the clutches of the Kheteratans or the Gnolls. The closest we've come to realizing this came with the Crodamic kingdom, but even then we were forced to serve foreign conquerors. Today, the greatest cities of Akasik stand united under our banner, the children of Mother Akasik standing together in harmony. Today, we have finally recognized the dream. Today, the kingdom of Akasik has been declared, and may it never fall."
 
 form_baihon_xinh_title:0 "Reform the Baihon Xinh"
 form_baihon_xinh_desc:0 "The Baihon Xihn once defied fate itself, routing Jaher's forces and saving southern Haless from his foreign empire. Since then, the ancient alliance of old has faltered, and ultimately shattered amidst the ambitions of feuding warlords and civil war. Now, we can reform Baihon Xihn, and return to our primordial role as defenders of Thidinkai."
 
 form_thangoya_title:0 "Unite the Townships"
 form_thangoya_desc:0 "While all of the Kai are notoriously combative and divisive, none are more so than our own people. Our land has been contested by fiercely independent towns for as long as anyone can remember, only being briefly united to defend from invasion or under the boot of foreign conquerors. For too long have others looked at us as disorderly lords ruling over a wartorn land, we now stand in a position to end this squabbling among the Sikai and forge a new republic capable of standing against our enemies as one people."
 unite_thidinkai_title:0 "Empire of the Kai"
 unite_thidinkai_desc:0 "Thidinkai has always been known as a land of "savagery" and bloodthirsty warlords, dismissed as a worthless land where one can only find their own death. They do not see the true wealth of these lands, for they are looking in the wrong place. The true wealth of the Thidinkai is in her people, strong and ferocious, diligent and steadfast, honest and courageous. Divided, other peoples knew to fear us. United, they shall learn to respect the Kai."
 damoh_yanglam_nation_title:0 "King of Kings"
 damoh_yanglam_nation_desc:0 "The Lupulan is home to dozens of tribal chiefs calling themselves kings, though none have ever earned the right to call themselves the King of Kings. Until now that is. With our dominance over the jungle firmly cemented and our rule decorated with tales with glory and victory, we can now lay claim to the most vaunted title among the Yanglam."
 form_yanshen_title:0 "Unite the Yan"
 form_yanshen_desc:0 "Yanshen is a diverse and vibrant land, rich in culture and coin. Despite this, we have only been "unified" by conquerors, our divided land proving easy to conquer and her wealth a tempting target. If Yanshen is to survive and prosper, we must end this divisiveness and come together as a united people."
 dahui_nation_title:0 "An Imperial Yanshen"
 dahui_nation_desc:0 "Nearly forgotten are the days when kingdoms reigned in Yanshen, the days of legendary dynasties and heroes, brought to an end by the hands of Harimar. Though we were never fully united, the machinations of the Harimari and their eunuchized officials served to partition us even further. The petty disputes between the eunuch lords and merchant princes have left the Yan weak and divided for long enough, it is time for an emperor to be crowned, and guide our people to a bright and glorious future."
 lianzhou_nation_title:0 "Ascend to the Tiger Throne"
 lianzhou_nation_desc:0 "Centuries ago our forefathers ruled this land, ushering in the greatest era Yanshen has ever seen. The plotting of the Yan eunuchs steadily saw our rule undermined however, with Harimari rule being virtually ended by 500 AA. In the time since the Yan have allowed themselves to be ravaged by their own petty wars and the armies of yet another great conqueror. The only way they will see unity and prosperity again is under our reign. It is time for a new Harimari empire of Yanshen."
 form_sunrise_empire_title:0 "Mantle of the Phoenix"
 form_sunrise_empire_desc:0 "When Jaher was murdered, his son Jaerel the Sunrise Emperor inherited a crumbling empire, and his societal reforms came too few and too late to save it. Both father and son met their ends at an assassin's blade, and elven rule in Haless died with them. Most of the sun elves left behind in the wake of the two tragedies were forced to fight their way back west, however a few remained in these hostile lands. For centuries we lived forgotten and mistrusted.\n\nNow, as monsters and warlords bring devastation and tribulation to the land, we stand at the head of a vast and mighty domain, rich in culture, arms, and wealth. It is time to proclaim a new empire, built on the principles of Jaerel and his short lived realm. It is time for Haless to be unified not under a conqueror but under a protector. It is time, for a new Sunrise Empire to ascend, and may she never fall."
 dolindha_nation_title:0 "Seize the Reins of Dolindha"
 dolindha_nation_desc:0 "Dolindha, the Homeland, covered in eerie forests, blessed with golden farms, washed by the tides of the Ynn which is as furious as the charge of our Antler Horses. There hasn’t been a King of Dolindha since the rule of Lukaus in the second century after Flood, although past overlords didn't shy from the ambition to one day wear the Antlered Crown. Niesthor Sivasred came closest to this in 1312 AA, and perhaps others will try again. Perhaps Dolindha will be ruled from [Root.Capital.GetName]."
 sarda_nation_title:0 "Seize the Rule of Sarda"
 sarda_nation_desc:0 "The lands of the southern Ynn are our home, and despite catastrophes and hardships, they still offer the most beautiful riversheds, the warmest days, and abundant forests to hide, and so to our eyes Sarda remains unmarred. No nation of Sarda has ever existed, but its people thrived in many communities preceding, during and succeeding the Ynnic Empire. And if at some point in time people began calling us the rulers of Sarda rather than of [Root.GetName], what difference would it make, so long as both names are true?"
 rzenta_nation_title:0 "Seize the Restoration of Rzenta"
 rzenta_nation_desc:0 "Shattered by the emergence of the Dragon cult in 1205 the lands we rule have been disunited for a long time, but no longer. Tordolin, Upper Dolindha, commonly known as Rzenta is now once more unified under the banner of the Great River and in a proclamation of this order we shall be [Root.GetName] no longer, but the Duchy of Rzenta restored."
 ynnic_empire_nation_title:0 "Restore the Ynnic Empire"
 ynnic_empire_nation_desc:0 "The Ynnic Empire ruled the Ynn for six glorious centuries. It united and defended the known world, bringing order and justice. It built the Great Dams during its heyday. The landmarks gracing its three largest cities are a testament to its power and to the benevolence of its emperors.\nSince its absence we have struggled greatly.For centuries warlords and would-be kings tried and failed to claim the highest title in our land.\nWe bested them and fought to the death to unite the land. We laboured to reform our realm to make sure we had what it took to not only restore the empire but to make sure it lasts for centuries to come.\nWith the river under our banner, it is our duty now to end the Ynnic peoples’ centuries-long dark age and to work towards a new, eternal golden age!"
 dragon_dominion_nation_title:0 "Rise of the Dragon Empire"
 dragon_dominion_nation_desc:0 "The peoples of the lower Ynn worship the river, claiming it is what makes them worthy of ruling an empire.\nBut where was the empire when people were starving? Or when monsters rampaged through the land, bringing despair to their holy river?\nIn the end, they crumbled and their empire fell. Without it they were nothing; their worship of the river proved futile, incapable of saving them from the dark age that beset them.\nThese were the truths that Lord Drozmagog revealed to us.\n\nBefore He was taken from us we dreamed of a Ynn ruled by Him, one that could rise high above the cultic decadence that he had freed us from. And now, as His child grows into a leader worthy of bearing the highest crown, we know this dream is not yet dead.\nRise, O Son of the Dragon! Today we will give you an empire worthy of your lord father."
 veykodirzag_nation_title:0 "Raise the Fanged Banner of Veykodirzag!"
 veykodirzag_nation_desc:0 "No greater King of Veykoda has reigned than [Root.Monarch.GetName]! Even Old King Bemo, most fortunate of elves could not claim to rule a land so vast, nor to command an army so fierce as ours. No longer are we but the rulers of Veykoda but the rulers of the whole Ynn River Valley, let sound a thousand drums and horns, be annointed the Sabre-toothed crown, and fly the indomitable banner of Veykodirzag!"
 horizona_nation_title:0 "Unite the Lands of Endless Horizon"
 horizona_nation_desc:0 "Beyond the feritle river and its haughty lords lies the land of freedom, of unfathomably large herds and inconcievable gunmanship. This expanse stretches on so flat in most places nothing is blocking the horizon and it is home to fierce peoples now united under our nation. Thus let us shed our former name and banner and proclaim the wild west united all those who wish to crush our liberated farmsteads under their boots will know they've yeed their last haw!"


 overclan_nation_title:0 "Form the Overclan"
 overclan_nation_desc:0 "The lands of Bahar have suffered greatly from their own internal peril and from the goblin exodus into them. But now our clan has defeated all other clans and established a firm dominance over most of Bahar. We are now in the position to fully unify this region under a single clan!\n\nHowever, this new nation will not be a mere country of goblins, no. Bahar is a place of many races, some of which have already learnt how to work with us and accept our rule, and others will surely follow soon. We shall be known as the Overclan - a union of all of Bahar and her many divided people under the wise, strong and prosperous rule of goblins!"

 prakheta_nation_title:0 "Proclaim the High Khet"
 prakheta_nation_desc:0 "Kheterata has traditionally been ruled from the lowlands of the Mother's Sorrow, with the Irsmahapan highlands and Khetaperan mountain range deferring to Stewards in Kheterat and High Priests in Nirat. While this arrangement has led to many long centuries of greatness and glory for Kheterata, recent history has shown the northern leadership to be increasingly incompetent and corrupt. None suffered more from this incompetence than the people of the south, with the mountains reduced to warlordism as the highlands were subjugated to the cruelty of the gnolls. Yet we have survived and triumphed, where all expected us to fall, and now we stand as the new Stewards of the Sorrow. It is clear that it is time to declare a new and greater kingdom. One that is stronger, nobler, and higher than ever before."

 form_jadd_empire_title:0 "Proclaim the Jadd Empire"
 form_jadd_empire_desc:0 "Under Jaher's leadership the Sun Elves formed the Phoenix Empire as a union between them and the Bulwari people. But the ruling class remained Sun Elven and it was really a direct move for the Sun Elves to claim rulership over the local Bulwari. While that heritage is also ours, we can make a much more enlightened choice. We will now unite the Bulwari people with all others in the true light of Surael. This new Empire will succeed where the Phoenix Empire failed and form a beacon of light and a protection against the darkness for all."

 form_xhurekal_title:0 "Embrace the Light of Surakel"
 form_xhurekal_desc:0 "The gnolls of Bulwar are more often than not feared as monsters of the dark, hunting, capturing and enslaving those unfortunate enough to be caught by them, or sacrificing them to their demonic masters. But in some corners of Bulwar, the legacy of the Suncrown Gnolls endure, those who sought the Light of Surakel and stood against the unholy demons of the Xhaz in his name. We have heard these tales as we’ve come to rule over so much of Bulwar. Perhaps it is time we seek a brighter future."
 
 form_xhurekal_tt:0 "Every owned province of §YXhazobkult§! religion and §YGnollish§! culture will spawn rebels."
 form_musaskalam_title:0 "Form the Serpent-Domain"
 form_musaskalam_desc:0 "For millennia, the magi of Bulwar have been hated, persecuted, and murdered, yet the hatred of the Lamagi, the not-mages, can’t change the truth: Bulwar is a place of magic, and magic is at the heart of the Bulwari civilization. There are still some that know this truth, like the Cult of the Serpent: Magi and Lamagi who share the goal of reclaiming the true heritage of the Bulwari, and destroying those who oppose Surakel and his servants. Fifteen hundred years ago there was an empire, a magnificent country ruled by the Magi, an empire on par with the Cannorian powers of Antiquity. This empire almost brought the gift of magic to all true Bulwari.\n\nNow it is time for its return."
 form_musaskalam_tt:0 "§YHas made a deal with the Cult of the Serpent after gaining access to the Magi Estate.§!"
 form_musaskalam_dartax_tt:0 "§YHas made a deal with the Cult of the Serpent after uncover the secrets of Garlas-kel.§!"
 form_musaskalam_event_tt:0 "§YWe will be able to form the Mušaskalam.§!"

 kartakhet_nation_title:0 "Ascend Elikhet’s Chosen"
 kartakhet_nation_desc:0 "Kheterata proved itself too weak to defend the khetist values we hold so dear. They left us isolated, surrounded by heathens, and heavily outnumbered by the natives. But our patience will soon be rewarded. It’s time to rebuild this country in the vision of Elikhet. Horashesh belongs to us, and the lands non-believers besmirch with their presence will be bestowed to those worthy of Elikhet’s grace."

 vurebindika_nation_title:0 "United We Are Eternal!"
 vurebindika_nation_desc:0 "Never more shall the people of Horashesh be trampled beneath the boot of oppressors. Instead, we shall build a new home. One free from the influence of distant empires. One where we can cultivate our lands for our own people, raise our cattle to feed our own families, and turn the Horashesh plains into a prosperous paradise beneath the new flag of Vurebindika!"
 vurebindika_nation_tooltip1:0 "All §YKudemtu§! provinces will convert to §YKudenta§!"
 vurebindika_nation_tooltip2:0 "All §YGumzemo§! provinces will convert to §YGomzumu§!"
 vurebindika_nation_tooltip3:0 "All §YIkilshebe§! provinces will convert to §YEgilshibi§!"

 irsukumbha_nation_title:0 "Through Blood and War We Rise!"
 irsukumbha_nation_desc:0 "A new power rises in Sarhal. Our spears are sharp, our shields broad, and our soldiers fearless beyond compare. Today we unite Horashesh beneath our banner. Tomorrow we conquer all of Tanib-Dajek. Then we shall come for the lizards, the trolls, the halflings, and the gnolls. Our warriors will cover every corner of Sarhal with the blood of our enemies. Soon all shall be beneath the flag of Irsukumbha!"
 irsukumbha_nation_tooltip1:0 "All §YZuvunwa§! provinces will convert to §YZovanwe§!"
 irsukumbha_nation_tooltip2:0 "All §YKuivanhi§! provinces will convert to §YKuivendi§!"

 fahvanosy_nation_title:0 "Unite the Summer Isles"
 fahvanosy_nation_desc:0 "Never in our known history have the Vyzemby been united under one banner. However, we now find ourselves in the unique situation where our nation encompasses most of the isles, and all its different peoples are within it. Truly we are the most fitting to represent the Summer Isles, we simply must decree it so."

 vyoronsi_nation_title:0 "Reclaim the Homeland"
 vyoronsi_nation_desc:0 "Many Vyzemby have dreamed of returning to the mainland, which once was our home. It was said in prophesy that one day the Kolovadoy would unite our people to take back our ancestral lands and create a new home for our people, something we have markedly done. Our return has begun, all tallfolk shall respect the Vyoronsi."

 amiratsamo_nation_title:0 "Unite the South"
 amiratsamo_nation_desc:0 "The Mazava have always been divided into various tribes competing with each other. Our people are exploited by foreign merchants that buy our precious cloves for a mere fraction of what they are worth. Now, though, this is changing. A dominant power is rising in the south that might be capable of controlling the clove trade, disturbing the balance of power between the fractured Mazava polities and selling cloves for a fair price. It is time for the Mazava to unite and modernize our country."

 missions_will_expand_tt:0 "§GYour current mission tree will expand and you will keep your current missions§!"

 theinos_nation_title:0 "Unite the Nékheis"
 theinos_nation_desc:0 "For hundreds of years the people of the Nékheis served their overlords across the Cleaved Sea. We slaved away providing them with resources their punished land did not have as our own lives grew worse than theirs. We worked to settle and explore; they grew complacent, wallowing in delusions of self-righteousness and grandeur.\nEver since we have begun expanding further into the untamed lands it has become clear to us that the potential of the Nékheis far surpasses that of the Kheions but until now few believed that the day would come.\nBut that day is today.\nAs the final strongholds of the rotten Kheions are kicked out of our land, we can begin to build a realm for our own people, We will stand defiantly against the Alecand and create a country to serve as a guide towards our own golden age: the exalted nation ofTheinos!"
 kheionai_nation_title:0 "Lead the Kheions"
 kheionai_nation_desc:0 "For most of our history ever since the Ruin of Aelantir, we have remained divided, with only a few periods of what we could call "unity". Hidden behind the Kheions, we have built a great civilization guided by our wise philosophies that enable us to understand the world and its wonders.\nBut now we understand that our division cannot come to last.\nAs our ability to stand against the Kaydhano improves, as our colonies in the Devand grow richer and stronger and as we encounter more and more of the world around us, it is becoming clear that the fractured state of the Alecand will be our people’s undoing.\n\nWe have risen to this challenge! We have defeated every rival and risen as the dominant Kheion.\nIt is time then to elevate our republic into a union of the Kheionai people that can stand eternal!"
 
 taychend_empire_nation_title: "Claim our Glorious Destiny"
 taychend_empire_nation_desc: "Taychend has never been unified for long.\nMany in the past have tried but none have succeeded. They fall to ashes as quickly as they rise to dominance. Even the mightiest conquerors see the legacies they build crumble in the end. Even the greatest realm our land ever met shattered into a thousand pieces, as if it was never there to begin with.\nIn truth the land of Taychend does not bow easily. To rule it and its people one must forge a realm to withstand the test of time. Of the hundreds of warlords that have tried this to the present day, only we have pulled it off. [Root.Monarch.GetName] and [Root.Monarch.GetHerHis] predecessors have, through many years of reformation and nation building surpassing anything done by the former great kings, created a realm like no other in our history. It is by [Root.Monarch.GetName]’s hard work that Taychend is finally united.\n\nIt is time for us to leave our past as mere warlord-kings behind and proclaim the end of this age of chaos.\n[Root.Monarch.GetName] walks forth to claim [Root.Monarch.GetHerHis] glorious destiny and become the first Emperor of Taychend."
 orenvalyam_nation_title: "Eclipse the Old Order"
 orenvalyam_nation_desc: "The streets of Taychend are running red with blood and bathed in the blinding light of a myriad fires. It does not take long for one to realize this is the beginning of the end for an era of darkness.\nThe chains that once chained people are now used to strangle their former oppressors. The systems of slavery,once the Taychendis’ main identity,now crumble down as the coming of dawn threatens to eclipse what once was.\n\nWe saw this coming, we saw the light being brought to our land and we embraced it.\nHow long we fought to bring this about! But at last our once-petty warlord realm is now a domain to be respected and with this power we have the opportunity to do something never done before in the long history of this land.\nThough the hour is late, at last we can forge a realm of light, one that embraces the eclipse of the old and welcomes a new age free of chains.\n\nTonight the realm of Orenvalyam, the one great temple to the last sun, is consecrated."
 nanru_nakar_nation_title: "Reform the Kingdom of Nanru Nakar"
 nanru_nakar_nation_desc: "Following the death of Pelozhil Mudaliar, Nanru Nakar became embroiled in a succession dispute that split the kingdom into three bickering factions. Now that we are victorious over our rivals, it is time we proclaim the reunification of the kingdom of Nanru Nakar."
 validaunea_nation_title: "Proclaim a New Age for Taychend"
 validaunea_nation_desc: "In the past, the Taychendi and Kheionai have lived apart, but the invasions of Laskaris changed that. The sheer power of Ameion showed the Taychendi the power of reform, of adopting the ways of the "enemy". By synthesising the Kheionai state with Taychendi culture and religion, we shall found a new kingdom, powered by a Kheionised aristocracy: Validaunéa."
 
 hinediu_yulas_nation_title: "Tame the Wild Lands"
 hinediu_yulas_nation_desc: "Lighting and thunder crash unceasingly, whipping the lands of Amadia. The winds of Amadia uproot all who stand against them. This land is truly unforgiving.\nYet we remain.\nWe carved our path across and rose to forge a realm even here in this land who wants us gone.\nWe tear the stormclouds of Amadia apart to reveal the light of the sun so it may shine upon our fields for the first time in eternity.\nThe eternal night becomes day! Amadia shall be united under the sons of Kusa!"
 
 fangaula_nation_title:0 "Resurrect the Old Empire"
 fangaula_nation_desc:0 "The first empire fell due to the genies awakening devils deep from the sea to drown and destroy The first emperors legacy. The second one was destroyed due to the treachery of Banni the planetouched. We shall rebuild the Third Fangaulan Empire, ruled with an even firmer hand, to ensure an eternal empire that will stretch from the mermaid coast to the Sorrow river."

 kheterata_nation_title:0 "Claim the Oldest Throne"
 kheterata_nation_desc:0 "With our conquest of the cities of Kheterat, Nirat and Anarat we can hold ourselves as the true successor to the Kingdom of Kheterata! Let us adopt this identity as the heirs of Elikhet."

 konolkhatep_nation_title:0 "Found Konolkhatep"
 konolkhatep_nation_desc:0 "At first our relationship with the beings known as the Khet was one of mere practicality, they have allowed us to rule the lands of Kheterata and we have facilitated the lifestyles to which they have become accustomed. Over time we have begun to see in the Khet the expression of our greatest ideals, these creatures live in absolute luxury, never lifting a finger and being worshipped as gods! Increasingly our nobles have begun to imitate their lifestyle and we gnolls have come to be seen as an integral part of Kheteratan society. Let us fully embrace this change, we shall proclaim our faith in the Khet and declare the foundation of an empire that is both Gnollish and Kheteratan, Konolkhatep!"
 
 khatalasya_nation_title:0 "The Final Empire"
 khatalasya_nation_desc:0 "Since the dawn of our civilization, times no one even remembers now, our civilization rose and fell and from the ashes of the old a new one always emerged. It has been prophesied that after 332 Empires great have died, a new one will be created - an Empire of Empires, the last ultimate one, that shall forever unite all of our race.\n\nThe time is now, with our recent conquest we proved to be worthy of a mantle of an empire allowing others to see our claim to the Last Empire as legitimate."

 adzalan_formation_title:0 "A Nation, a Canvas"
 adzalan_formation_desc:0 "As our tribe has expanded and modernized over the years, art has developed and become more poignant in our society. Bards have taken over more and more facets of our administration and nation in general, and have benefited from the many rising magnates facilitating their craft. It is clear that our identity has extended beyond that of our tribe; now we are a nation of all artists, a far cry from the conceived barbarism in the eyes of our cousins!"

 shyarayan_formation_title:0 "Forge a Throne of Blood"
 shyarayan_formation_desc:0 "The Artists and the Bards amongst our people speak of a higher way, of a type of freedom that elevates them from the pain we all endure. And yet, this freedom is not for the people to enjoy, no. They make beauty that frees them, and leave us with the spoils of their efforts to behold in silent suffering.\nBut, we have found another type of freedom. In the fields of battle, amongst the dead we are truly free. A type of freedom that is truly free for all, wanton glorious violence.\nOur warcries will outlive their songs. Our legends will outlive their tales. Our bloodshed will outlive their decadence.\nIn the name of all our brothers we cry: All Hail the Bloody Kingdom!"
 shyarayan_formation_tt:0 "Convert every owned §YAshhana Lizardfolk§! culture province to §YShadow Pact§!."

 form_suryavar_title:0 "Proclaim Kingdom of Surael in Rahen"
 form_suryavar_desc:0 "Suryavar is the realm of the sun mountain, the tallest peak of the Paravimvata, the towering sentinel over which the sun first alights on the holy Ebbusubtu, Mountain of Clear Sight. The land east of Suryavar is the realm of Surael in Rahen, and it will be our duty to spread the word of the Jadd, the word of justice, the word which shall break the shackles of slavery and the back of tyranny, throughout Rahen."

 carneter_nation_title:0 "Reclaim the Forest Kingdom"
 carneter_nation_desc:0 "In the deep forests of the West Dameshead, there once was a kingdom. A kingdom that reigned over the West Dameshead. A kingdom guided by the wisdom of druids. A kingdom filled with people humble and brave. They may have been destroyed, their lands sacked and taken over by treachery and deceit, but the people still live in hope for its return. And Carneter shall return: that much we know to be true."

 jazhkredu_nation_title:0 "Declare a Goblin Paradise"
 jazhkredu_nation_desc:0 "Us goblins have been beat around enough! We've fought tooth and shiv against orcs, dwarves, humans, and everyone else to claw a place we can call our own. Now it's time for us to take our hard earned wins and build something no goblin has had - home. Today we declare a paradise for goblins by goblins, Jazhkredu."
 jazhkredu_nation_get_gobbos.tt:0 "Gain every §YCommon Goblin§! or §YForest Goblin§! province in §YEscann§! owned by our subjects"

 form_raghajandi_title:0 "Proclaim Heroic Kingdom of the Plains"
 form_raghajandi_desc:0 "The Heroic Alliance, once forged out of desperation, has faced many challenges, but with unrelenting courage and limitless bravery we have managed to overcome the odds and create a stable realm in the North. It is time to proclaim the unification of the Heroic Realms, it is time to reignite the fires of a new Northern Golden Age, a time of legends and heroes is upon us!"
 
 no_other_eagles_tt:0 "All other Eagle Hobgoblin nations are either our subjects or do not exist"
 form_nirenun_syul_title:0 "Order Under the Great Eagle"
 form_nirenun_syul_desc:0 "We live in an age of chaos. Balance has long been lost as light and order met their demise at the hands of the all-consuming darkness.\nMany have sought their own way to restore balance, but we and we alone have succeeded in the restoration of light in our land.\nWe have raised our banner above the mountains of Nomsyulhan, uniting our brethren in a mighty realm that shall act as a piercing sword of order against chaos.\nThere is much to be done to restore true balance in Halann but the Great Eagle of Nirenun Syul shall rise to meet the challenge!"
 eagle_hobgoblin_ruler_rises_tt:0 "A ruler will rise, and assume control over our chaotic realm..."

 no_other_soulseekers_tt:0 "All other Soulseeker nations are either our subjects or do not exist"
 form_samthalsu_title:0 "Bring the Soulseekers Together"
 form_samthalsu_desc:0 "Long ago we were lost, chased from our ancient home as we traversed a hostile land that sought to bring us to our end.\nWe marched and survived for as long we could, a broken and starving people seeking a new place to call our own.\nIn the end, we met salvation.\nEver since then we have inhabited Nomsyulhan. We have ruled and been ruled not just by others but by our own desires.\nIt took much to stop the hunger and even longer to stop the pain, but we prevailed once more.\nNow, times are changing once more. No longer are we weak and divided, as our banners fly proud over our claimed homeland, we know we will never despair."

 uchaimauna_nation_title:0 "Unify the Three Mountains"
 uchaimauna_nation_desc:0 "For many years the three kingdoms fought one another for domination of the island. Seeking to finally unify this land through word and sword, we rose above the other pretenders, defeating them during this War of Unification.\nOur efforts have not been in vain. With our new position of dominance we are enthroned above the skies. From this newly-exalted place, and can now proclaim the end of this division and birth of a new realm; Ucha’imauna, the kingdom of the three mountains!"
 
 cataboek_nation_title:0 "Form Cataboek!"
 cataboek_nation_desc:0 "The time has come. Our tribes have united. Our heads are held high. We have stood tall against everything the outside world has thrown against us.\n\nOur Dreams are within reach. It is time to grasp them, and unite five into one. This is destiny. This is fate. This is inevitable."
 
 satriaalam_formable_title:0 "Reclaim Satria's Legacy"
 satriaalam_formable_desc:0 "Many years ago the ogre Satria the Great carved his place in history by force. From pirate to king, his doings would give birth to an Empire that brought Kanolowele to heel!\nHe enjoyed his spoils for as long as he could; then he died, and that was when everything came crashing down.\nFor what seemed like an eternity, his successors fought over what remained, trying and failing desperately to build a base of power from which they could reclaim his realm.\n\nMany have tried - where they failed we have succeeded. Having squashed all other pretenders, we can now claim victory and reforge Satria's legacy anew!"

 comezkahuaina_formable_title:0 "Unite the Shattered Yanacotle"
 comezkahuaina_formable_desc:0 "The lands of Kanolowele are broken. Shattered and ravaged by their unforgiving nature, they were forged by the great volcanoes that now inspire awe among our people. Forgetting their ancient power, they are now left to fight against the thunder and consuming flora of the islands.\nLike these old islands , our people once knew division. Stranded far away from one another, they are confused and chaotic, brothers slaughtering brothers chasing a vain hope of superiority.\n\nBut the days of division will soon be over. [Root.GetName] has risen above to mend the gaps and reforge the Yanacotle in the fires of unity.A new age shall dawn upon the land of the Twin Gods!"

 kangyarang_formable_title:0 "A New Beginning"
 kangyarang_formable_desc:0 "Long ago among our people one rose to power who was called "great" though his deeds were nothing short of barbaric. Ever since then our people have been chained by his rotten legacy. Left without any answer to the question of what the future truly held for the Seacrest, many looked back to what was in hopes of restoring an empire that never served them.\n\nWe, however, want to look forward.\nHaving risen as the dominant ogre realm of Kanolowele we are now in a position like never before to begin designing the future of our kin. We do not see a tomorrow dominated by pirates or marauders but rather one of belonging and opportunity.\nSo it is then that we proclaim the start of something new - something fresh: the birth of Kangyarang!"
 
 charkuchin_empire_nation_title:0 "Unite the Charkuchin!"
 charkuchin_empire_nation_desc:0 "For far too long we have lied away, wandering around the lands and hiding behind our vaults.\nNo longer!\nThis is the start of something new, something far greater than all of us, something that will outlive all who worked hard to build it.\nUnder the guidance of the Citadel our people have expanded far and wide to unite the mountains and vaults under one single rule. Since we first left our home in the depths we were destined for this very moment - for the day we would rise high as the great Children of Danguranga we are.\nThis is when we claim our place in history, for this is the birth of the One Empire of the Charkuchin!"
 citadel_is_at_level_3_tt:0 "§YCharkuchin Citadel§! is at least §YTowering§!. §g(Level 3)§!"

 huio_pamokai_formable_title:0 "End the Anakue Decline"
 huio_pamokai_formable_desc:0 "In times past, our people lived in a period of unparalleled greatness under the first Consensus. They saw the birth of new arts and technologies, their domination of the seas and expansion across Kanolowele.\nBut this era is long gone as the Century of Storms brought our golden age to an end, and only their memories remain. The Second Consensus, rotten and corrupted as it was, failed to guide us back out of this era of darkness.\nToday, the others are gone, and we remain. Having claimed dominion over our homeland we have built a nation worthy of guiding the Anakue back to their former glory. In this manner we shall begin a new, eternal golden age!"

 #Kahiyotl
 kahiyotl_nation_title:0 "Unite the Three Lands"
 kahiyotl_nation_desc:0 "Three are the peoples who inhabit Kahiyotl.\nBorn of fire, the Ki´tetl of the mountains. Born of water, the Okeahui of the shores. Born in between, the Huahou of the forest.\nLong ago we had a dream of unity, to see water and fire working together in harmony to protect their home and achieve fits of greatness that far surpassed their neighbors.\nAlas, this dream did not come true for so very long.\nBut the dreams of the past can be the world of tomorrow - these three peoples, sons of three lands, can be brought under the one banner. The banner of a great Kahiyotl!"

 #Salceran Decision
 salceran_nation_title:0 "Unite the People of the Borders"
 salceran_nation_desc:0 "Salceran - The Union of The people of The Borders.\nA compromise made by the many nobles living in the harsh lands of The Borders. A “modern” Arannese empire uniting all those that live within its lands to rival the Empires that surround it.\nNo longer will The Borders be ruled by a foreign and oppresive ruler!"
 salceran_nation_effect_tt:0 "Any land in §YThe Borders§! owned by a §YLoyal§! subject of §Y[Root.GetName]§! will be integrated at the cost of §Y4§! diplomatic power per development."

 umbral_covenant_formation_title:0 "Sign the Umbral Covenant"
 umbral_covenant_formation_desc:0 "The shadow controls our fate. It is pointless to fight it. Instead we work with it, letting its hands guide our nation through strife and through time. Everything that happens is determined by fate, our own rise to power included. These successes have been predetermined. We know now that it is our destiny to rule Sarhal together with the shadows. To that end, we ask the shadows to deliver to us their greatest weapon."

#Luzhong Decision
 form_luzhong_title:0 "Reforge the Great Mask"
 form_luzhong_desc:0 "The time has come to step beyond our place on the periphery of Haless. All four masks of the Beikling now lie in our hands, and with them, we can reforge a legacy older than the remnant states of any foreign conqueror. As Great Luzhong rises from the ashes, one thing is for certain…"
 luzhong_beikling_land.tt:0 "Owns every province in the §YYanshen Subcontinent§! that is of §YBeikling§! culture"
 FORMED_LUZHONG.tt:0 "§P...They shall learn to fear our name once more!§!"
 luzhong_dark_revival:0 "The Dark Revival"
 
#Mechanim Nations
 mechanim_nation_title:0 "[Root.mechanim_formable_title_custom_tooltip_tt]"
 mechanim_nation_desc:0 "[Root.mechanim_formable_desc_custom_tooltip_tt]"

#Lohanparaya Decision
 form_lohanparayan_title: "Form Lohanparayan, the Empire of Steel"
 form_lohanparayan_desc: "Also known as the Pirhakhad Empire, the “Empire of Steel” is one of the most infamous entities in political history of Rahen. Led by the legendary ‘of the Iron Way’ Harimari dynasty, Lohanparayan is equipped with a powerful precursor artifact simply called “The Iron Seal” which is said to drive all those who wear it to madness. Of course, this is just folktale."
 form_lohanparayan_return_event.tt: "Every country with their capital in the §YRahen Superregion§! will fire the event '§YThe Return of Lohanparaya§!' reducing their §YArmy Morale§! by §R-10.0%§! for §Y10§! years."

#Jinnakah Decision
 jinnakah_nation_title:0 "The Return of Jinnakah"
 jinnakah_nation_desc:0 "Our ancestors once ruled this land under the guidance of the great Djinn Ardimya, but centuries of chaos and wandering fractured our people. Now, we have tamed the wilds, rekindled lost knowledge, and learned to wield magic in ways once thought impossible without the Djinn. With our foundation secured, we stand ready to reclaim our birthright and restore the continent to its former splendor in preparation for Ardimya’s return."
 S92_reclamation_of_ardimya:0 "Reclamation of Ardimya"
 desc_S92_reclamation_of_ardimya:0 "We need to reclaim the region in order to rebuild what we once lost."

#Baztungh Khayus Decision
 form_baztungh_khayus_title:0 "The Steppes, Forevermore"
 form_baztungh_khayus_desc:0 "Winds of change are upon us.\nThrones of old decay under the weight of their own decadence as the strong among us claim their place in history, yet risk abandoning their roots for just a fleeting legacy.\nWe have fought, we have risen and now we are met with this same fate.\n\nAnd yet.\n\nThe weak would let the winds deter them from the path of their ancestors, they would betray the old ways in favor of false power.\nBut the strong, they challenge the storm and do not allow the winds to change them, they remain loyal to their ways.\nWe are the sons of the Saanorgegh, we are born on the saddle, none shall take us away from the Eternal Steppes!"

#Bim Lau
 bim_lau_nation_title:0 "Claim the Warden’s Throne"
 bim_lau_nation_desc:0 "Here at the heart of Bomdan lies the great Necropolis, the cultural and political center of our people for more than a millennium.\nMany are the kingdoms that have claimed the title of warden of the Necropolis but only one has managed to leave a lasting mark on the minds of the Bom people. The Kingdom of Bim Lau has long acted as the warden of the city whose name it bears.\nBut now they, too, have faltered, their kingdom fallen - and in its place we rise.\nWith the Ranilau heartlands under our control we shall claim the mantle of kingship for ourselves, and unlike them we shall not fall."

#Kimni Solenh
 form_kimni_solenh_title:0 "Harmonize with the Bomdan Spirits"
 form_kimni_solenh_desc:0 "Times of great change are coming to Haless.\nFor the first time in generations there is one banner rising above all of Bomdan. One court to hear all calls, one throne to answer all pleas, one realm to rule them all.\nAnd this is not a banner of hatred or war, no, for this is a domain like no other. At peace with the land it rules and in equilibrium with the other world.\nIn the land of the seven forts and hundred spirits a new Bom Empire rises.\nIt is the Kimni Solenh, a realm in harmony with the spiritual world."
 bom_empire_cultural_influence.tt:0 "All our owned §YChengrong§! and §YTamran§! culture provinces will become their §TBom§! counterpart"
 kimni_solenh_exalted_forts.tt:0 "Spirit Fortress is §TExalted§!"

#Nirunkhupen
 form_nirunkhupen_title:0 "Embrace the Forbidden Kingdom"
 form_nirunkhupen_desc:0 "The Bokai people tell each other many stories, those of ancient histories and great feats against spirits. There is one story, however, that no one utters a word about. Yet it persists evermore, permeating through the centuries. A collection of thoughts that, no matter how often suppressed, will never go away.\nThis is the story of The Forbidden Kingdom and its Undying Sorcerer-King."
 nirunkhupen_warning.tt:0 "§RDON’T DO THIS, DON’T LET HIM OUT§!"
 nirunkhupen_unlock_ritual.tt:0 "Unlock the '§CRestore the Cursed Idea§!' §YLefthand Oath§!"
 nirunkhupen_formation.tt:0 "§CHas chosen to Awaken a Forbidden One§!"

#Bawa Simpat
 form_bawa_simpat_title:0 "Kneel to the Lady of Stone"
 form_bawa_simpat_desc:0 "Our ruler has made a deal with §RSemat Tidakhui§!, the Lady in Stone. We have toiled endlessly to bring about her new realm under the jungle canopy. We have left trails of conquest throughout the Lupulan in her name. At long last, it is time for her to ascend the rightful throne."
 bawa_simpat_embrace_stone_lady_tooltip:0 "Has embraced the §PLady of Stone§!"

 #Lingyuk
 Y26_form_lingyuk_title:0 "Proclaim the Spirit Domain"
 Y26_form_lingyuk_desc:0 "For far too long have mortals and spirits of Haless alike suffered from the unnatural state of separation of their respective planes of existence. But no longer! With the end of the malign influence of the High Temples, we are no longer kept apart from the myriad spirits who guide our people and watch over our lands. With the proclamation of Lingyuk, the Spirit Domain, we affirm our submission under the wise rule of our exalted Fox Empress and her Maidens. All shall bow before eternal Huszien and rejoice!"

 #Escann Loc
 universal_escann_nation_title:0 "[Root.getESCANNADVENTURER_TITLE]"
 universal_escann_nation_desc:0 "[Root.getESCANNADVENTURER_DESC]"
 tag_must_win_conso_wars_tt:0 "§TThis nation's mission tree will require you to win the §YEscanni Wars of Consolidation§!.§!"
 getESCANNADVENTURER_TITLE_B16:0 "A New Elfrealm"
 getESCANNADVENTURER_DESC_B16:0 "Defying derisive whispers, after decades of brutal bloodshed, we have earned our claim to Escann. Here we will fulfill our oath and raise a new elfrealm. One where a Wood Elf is treated as an elf, nothing more but certainly nothing less. And should any attempt to deny us that future, we shall make them rue their folly. No matter the cost."
 getESCANNADVENTURER_TITLE_B11:0 "A Kingdom of Blood and Thorns"
 getESCANNADVENTURER_DESC_B11:0 "“Of my Company of Thorns they have said many things. Feared among even the marcher lords, our combat prowess was only surpassed by our cruelty.\nOf me they talk even more, some have described me as a demon in the flesh, claiming that I am a man of murderous predilections and brutal ways. Most of what they whisper is not wrong though they fail to understand a crucial fact: my 'Little Secret' will not be my end, but theirs.\nFor it is the blood of Escann that nourishes my thorns.”"
 getESCANNADVENTURER_TITLE_B06:0 "Enshrine Ancard's Legacy"
 getESCANNADVENTURER_DESC_B06:0 "In our darkest hour we show our true colors.\nLong ago, the kingdom of Carneter was under siege. The Lorentish forces marched into our forest, threatening to bring ruin to our ancestors. Then, when everything seemed lost, the great Ancard rose to challenge the invaders, and led a heroic defense of his people. Even when all his fellow warriors fell he still stood defiant, for seven days and seven nights he held a bridge against all enemies, a show of strength and determination an only dream of emulating.\nas the forces of Dookansonnson marched into once proud Escann we true calling. Korgus is gone, Escann is in ashes, and from their ruins we shall build a realm forged from the l of Ancardncard.\nAncardia, The Realm of Prowess."
 getESCANNADVENTURER_TITLE_B15:0 "Proclaim the Northern Stewardship"
 getESCANNADVENTURER_DESC_B15:0 "“Not so long ago we were children of the Sorrow.\nBorn in a land of sand and sun, we prayed for better days to come.\nBut our prayers went unanswered.\nNot so long ago we left our lands in sorrow.\nFor many days we walked, for many nights we thought ourselves lost.\nIt was not until we arrived in these wartorn lands that we knew we were no longer lost.\nSorrow may lay in our past, but our future is one of joy.\nFor in this land, I shall build you a paradise fit for its new stewards.”\n             - Excerpt from the notes of Entef of Wibnuat."
 getESCANNADVENTURER_TITLE_B07:0 "Rogieria, Home of the Exiled"
 getESCANNADVENTURER_DESC_B07:0 "In the heart of Cannor once stood a realm born of the Dove and the Moon. It was the protector of the Damesear and home for the proud and faithful. Through war and betrayal that blessed realm was undone and the last of its loyal children exiled to a faraway land.\nBut we are not children anymore, no, we have grown and struggled and forged a new home for ourselves.\nUnder Rogier Silmuna we, the last sons of Dameria, shall proclaim a new realm, one which shall only ever end when Dameria is reborn."
 getESCANNADVENTURER_TITLE_B10:0 "Grow a new Homeland"
 getESCANNADVENTURER_DESC_B10:0 "We Halflings have always struggled.\nBeing trapped in between powers fighting to carve up our land, we have always gotten the short end of the stick. Many had given up on the idea of ever truly living a free and peaceful life, in a place where no foreign king would decide for us, and where halflings can rule their own.\nBut all changed when we heard her call.\nThe Red Maiden guided us to battle, to stop a force greater than we could have ever imagined, to defend a land we had never been to before. And we heeded her call, yet in the end our reward was mere scraps.\nMany would have given up and returned home, but for those of us who have nothing to return to, it was never an option. So we stayed, and we planted and watered our seeds, and left the sun to do its magic. And finally we are starting to see what has grown from our efforts.\nNewshire, a new homeland for all halflings."
 getESCANNADVENTURER_TITLE_B03:0 "Alenor, Land of Freedom and Vengeance"
 getESCANNADVENTURER_DESC_B03:0 "We marched into Escann as mercenaries.\nWe fought in the name of no crown, but in the name of a contract. The king of Gawed had promised us a most generous payment if we were to join the war against the Greentide.\nAfter his death, doubt began to consume our company. Abandoned and without the payment promised, we found ourselves lost.\nFrom this despair, a new idea was born: a land far away from Gaweton, where an Alenic could be free without fear of the wretched landlords and would-be tyrant kings. Corin taught us to dream, and we shall see our dream realised.\nFreed from our shackles we are mercenaries no more, but rather something greater.\nWe are Alenori, the vengeful freefolk."
 getESCANNADVENTURER_TITLE_B09:0 "Expand our Investment in Escann"
 getESCANNADVENTURER_DESC_B09:0 "When we heard the call of the marcher lords we rose to answer, not from a sense of duty but a sense of opportunity.\nWe believed a wartorn Escann would be the perfect place to make our fortunes, to plunder the land of anything left worth a coin, to sell and make ourselves rich.\nWe found nothing.\nYet, why are we still here? Why have we remained in this wretched land?\nOnly those who take risks make it big, and only those who take the greatest of risks can earn Ara's blessing.\nWe remained, we built, we forged our house into a new realm.\nIn the name of Ara, our gamble will pay off one day.\nOne just has to trust her plan."
 getESCANNADVENTURER_TITLE_B14:0 "The Raven Stands Defiant"
 getESCANNADVENTURER_DESC_B14:0 "We know what it is to lose a homeland.\nBorn children of the Mire, we saw our towns rot by Daravan's only lasting legacy.\nBorn children of Dostanor, the pride of our realm was withering away while its true rulers hid away in the dark.\nThey sought to get rid of us, last true sons of honorable Dostanor, but inadvertently they gifted us with something far beyond their understanding.\nHope, a goal and a maiden to embody our cause.\nMasks break, Midnight ends, the Raven stands defiant."
 getESCANNADVENTURER_TITLE_B13:0 "A Home for us All"
 getESCANNADVENTURER_DESC_B13:0 "We marched to a land ravaged by war. Homes burned to the ground, fields painted red and steel meeting steel at every corner.\nIt was chaos.\nWe fought alongside Corin and through her sacrifice we managed to stop the carnage.\nYet after all our struggles we were left in a land in ruins. Amongst us both children of the Lion and the Silver Dragon claimed a shared piece of the ashes.\nMany attempted to rebuild Escann, to claim the legacy of the chivalric realms for their own, to return to a past that was irredeemably lost.\nWe reject that notion, clinging to the old ways can only result in the final downfall of Escann. No, we see the need to create something new, something better.\nA nation not just for the Busilari, or just the Marchers. Not just for humans nor the orcish invaders or anyone else.\nNo.\nWe shall build a home for us all, a bridge we all can walk towards the future - Stalbór."
 getESCANNADVENTURER_TITLE_B04:0 "Ascension of the Ashen Rose"
 getESCANNADVENTURER_DESC_B04:0 "A rose once belonged to a distant garden. Cast out for what she believed was right, she fell into disgrace, her name was besmirched, and those who followed her were scattered to the winds.\n\nShe wandered to another land and fought beside its defenders against the creatures that came to destroy it. In the aftermath of this supposed victory, she found her companion dead, the garden she tried to protect reduced to embers and the monsters still roaming.\n\nSo she fought on.\n\nIn the ruins of Escann, she gathered what remained. From the ashes, she began to shape something new. And with the blood of the beasts nourishing her roots, she set out to grow a garden of her own."
 getESCANNADVENTURER_TITLE_B08:0 "The King that was Promised"
 getESCANNADVENTURER_DESC_B08:0 "“Ever since we arrived in this land I have doubted our purpose here in Escann.\nThe war against the forces of Korgus was brutal, and even now we constantly have to avoid the various hordes of wild greenskins still roaming the land.\nFood is scarce and tasty food even more, each day we have to scramble for resources with the others to survive.\nThis place is infernal, and yet...\nIt started a few weeks back, when I felt a call. Ever since then I couldn't shake the idea that there might be something for me in this place, something to make it truly mine.\nA land empty, a people still loyal, a feeling of belonging.\nA crown promised, a kingdom reborn.”\n                                     - From the diary of [Root.Monarch.GetName]"
 getESCANNADVENTURER_TITLE_B20:0 "Rise of the Black Tower"
 getESCANNADVENTURER_DESC_B20:0 "In the lands of the Damesear sits the rotten home of magic in Anbennar. A house of cards whose decrepit rulers see no reason other than their own.\nThey did not have what it took, so they sought to get rid of those of us who did.\nWe are now far, far away from their grasp. The battles fought, the brothers lost, the monsters slain - all with one objective.\nHere, in this land of death and ruin, we shall build a new Magistrate - a Black Tower to loom over all of Escann and bring upon its glorious restoration.\nEsthíl, a realm to bring a new era of magic to Cannor.\nOnly then they may finally understand our unrestrained genius, but it will be too late."
 getESCANNADVENTURER_TITLE_B05:0 "Proclaim a Republic of Sanity"
 getESCANNADVENTURER_DESC_B05:0 "Escann is a wartorn land.\nCities in ruin, untold thousands dead and even more left without a home.\nThis land has been inundated by chaos, but from amongst that chaos a bastion of sanity shall rise!\nThe most brilliant minds in Cannor have come together to turn this land into a home for inventors and experimentation. A place for the sciences and magics to thrive and act as the cornerstone of a newly reborn Escann.\nWith our ingenious innovations we have the power to return this land to its former glory and beyond!\nGlory to the New Republic!"
 getESCANNADVENTURER_TITLE_B12:0 "Raise the Wyvern's Banner"
 getESCANNADVENTURER_DESC_B12:0 "“We left as exiles, thrown away by a homeland that scorned us. We fled here, to a land with no rulers that can stab us in the back, a land ripe for the taking, a land for us.\nMany said we would fail, as werewolves and orcs raided our camps. But we have endured, and every slight we faced will be repaid tenfold. None shall look down on us again, whether they be orcish warlords, werewolf packs or wastrel dukes squatting on their throne.\nWave the Wyvern's banner, my brave brethren, for it is our due, our pride!”\n        - Quote attributed to the first king of Wyvernheart."
 getESCANNADVENTURER_TITLE_B19:0 "Rise in Aldresia's Name"
 getESCANNADVENTURER_DESC_B19:0 "Not so long ago, we made a promise.\nBy blade, by spell, by any means necessary Escann will be reclaimed.\nThe days of chivalry are long gone, what remains is a broken land. Godless and forlorn, these lands are home to ruin and sorrow and it is our duty to bring light to them once more.\nWith honor we march, as the spirit of Aldresia walks with us.\nWith pride we strike, for our swords and spells have her blessing.\nAs the Sword Covenant ascends into preeminence among the new realms we make our claim known.\nIn the name of our lady, Escann shall be free."
 getESCANNADVENTURER_TITLE_B18:0 "Build the Home of the Hammer"
 getESCANNADVENTURER_DESC_B18:0 "Once already we lost our homeland.\nThe days of hoary Aul-Dwarov are long gone, and in the end, what remained of it did not survive the test of time, either.\nBut if there is something we Dwarves are, it is resilient, we will not rest until we have restored what we once were.\nHere in the lands of Escann the roots of our people are deep. The greatest of us all forged his legacy by erecting the wonders that made the Empire of the Silver Dragon shine brighter than the sun.\nBalgar, our great forefather, made this land his home once.\nLike him, we shall do so again.\nBrick by brick, Escann will rise to meet the skies. We will rebuild this land into our grand homeland, one Balgar himself would be proud of."

#Aelantir Settler Loc
 universal_aelantir_nation_title:0 "[Root.getAELANTIRSETTLERTITLE]"
 universal_aelantir_nation_desc:0 "[Root.getAELANTIRSETTLERDESC]"
 getAELANTIRSETTLERTITLE_H40:0 "The New Cultivars"
 getAELANTIRSETTLERDESC_H40:0 "It is often said that new kingdoms are birthed from blood. But this saying seems trite in the Bloodgroves, where the land weeps red even in peace. The conquest of these new strange lands by the Sornic Sons was rapid, but the war carried on within as their own natural uneasiness erupted. Slowly, tales told before crackling firelight held less and less power as more came to be acclimated by personal experience. Ghost stories of the Shrouded Coast and myths about the old gods that took refuge atop the Sornhills allowed the Sons to draw relations between their current eerie surroundings and the home they had left.\n\nDuring the first years of the expedition, Captain Reán sil na Ola was seldom seen by his own soldiers. Even when appearing he seemed distracted, lost in thought. Robed figures unfamiliar to the soldiery would emerge from and retreat to his command tent at times. A junior captain who questioned one of Captain Reán's intentions is supposed to have received the reply: "When the Captain receives his intent, he will inform you."\n\nNow, the Sorncósti have solidified their claim and subdued the Kwineh people as their clients. [Root.Monarch.GetTitle] [Root.Monarch.GetName] will become the first monarch of this new Sornic land, Sornicande. Liberty from the tyranny of the Lencori had brought the Sons here, but under the red shade of the bloodgroves the designs of the few will remain hidden from the many. Three new cultivars of thought shall be established, their vines ascending and twining to create the true shape of the new kingdom."
 getAELANTIRSETTLERTITLE_H42:0 "Establish the Neratic Domain"
 getAELANTIRSETTLERDESC_H42:0 "How many of us fought? How many of us were lost?\nIn the end our actions were not enough for our brothers in faith to show true dedication to fighting the enemies of Nerat.\nWe spoke a truth they chose to deny, for that they cast us away from the home we defended and into a land of ruin.\n\nBut here, far from the grasp of the corrupt heretics of the temple, we have found something.\nSomething that was waiting for us.\nCaste the bones away, tell the natives of His truth, and build upon these stones the bases of His realm.\nO Nerat! Your faithful children shall build You a worthy home."
 getAELANTIRSETTLERTITLE_H44:0 "Reforge the Circle"
 getAELANTIRSETTLERDESC_H44:0 "Matilda Silverlocks led us here on the promise of doing Begga's holy work, to make a place where all may receive her alms. Yet the spiteful and greedy men of Damescrown sold our charter out from under us to a new "Lord" who came all this way to take ownership of the people that he bought and paid for.\n\nHe and his mercenaries are routed, fled to Sarda; they may return one day. But what troubles us more are the great number among our own expedition, adventurers and merchants, who took the side of the lordling with nary a second thought. The unity of the Shining Circle is broken. Begga's wisdom guides us now, though, and the example of her charity will guide us as we buy peace with our victory. As a circle reforged our metal will gleam anew, even out of the embers and ashes that surround us now. Neither golden crown of the noble nor gold coins of the merchant will bind us, only the gilded hearts of the peasantry will guide our future. With hard work and faith, we will have enough."
 getAELANTIRSETTLERTITLE_H46:0 "Proclaim the Ynnic Crusade"
 getAELANTIRSETTLERDESC_H46:0 "Far away from Corin's home, an ancient world has been rediscovered. Before us is a broken land filled with breached beasts and people submerged in darkness. So rotten from its lack of guidance, it reminds us much of how we once were before she appeared.\nThe people of the Ynn have not been granted such enlightenment yet. They pray to their dragon prince or their river to save them from the slough of decadence they cannot leave. It is all to no avail, for river and dragon alike are fake deities that shall not last in the end.\n\nThe Ruinborn people are capable of much good; they just need the right guidance. It is our duty as Corin's most loyal to guide these people towards the light. Under her we are all equal, under her all must be equal.\n\nO Maiden in red, bless this land, for it shall be the foundation of Your kingdom in Halann!"
 getAELANTIRSETTLERTITLE_H48:0 "A Place for the Wicked"
 getAELANTIRSETTLERDESC_H48:0 "When our great founder, the visionary Ricard Tenach, left Cannor to find his luck in Aelantir he had nothing to his name but a bunch of scraps, loyal men and many dreams. He and a group of what snobs would call the "undesirable" arrived in the Epednar frontier and saw it for what it was: an empty land ripe for growing the seed of opportunity.\nMany days of hard work, sweat, and blood later and this land has begun to resemble a home.\nRicard and his followers went from having nothing to lose to everything to gain. They gambled everything and won it big once they hit that sweet vein of gold that has become the lifeblood of this young city.\nThis, in essence, is the dream all men who come here aspire to follow - a land of infinite opportunity for those to whom most societies wouldn't give a second look.\n\nAnd as more came, this home has grown to become a homeland, a place for them to truly belong.\nThey took a gamble and won it big. Those who come with a shovel or a knife and mask, all are citizens of this city.\nSo now the question is, shall we take the ultimate gamble and proclaim our little experiment as something more than just a warband?"
 getAELANTIRSETTLERTITLE_H50:0 "Land of the Broken Chains"
 getAELANTIRSETTLERDESC_H50:0 ""I still remember the chains.\nEvery day started with a whip, every night ended with the screams of those they took.\nI only had my mother, and even her they took from me.\nThey wanted me to submit and break, to accept a life of servitude to people that saw me as nothing more than a work animal.\n\nI still remember the sound my chains made when they were broken.\nThe fire, the blood, the screams! For the first time in our lives the actions we took were of our own choosing.\nThey chased us out, pushed us into this darkened forest of beasts expecting us to die.\nBut we couldn't die, not so close to freedom.\n\nNow we are in an unknown land. Free at last, we seek to build ourselves a place to live.\nThey, the ones that made it, look up to me now. They see me as their leader, their protector.\nI will not let them be put in chains ever again. Let the message be carried to the brothers I left behind that the day will come when we march back for them.\nBut for now, this must become a place to call our home."\n    - Varbuk proclaiming the Freemarches to his people."
 getAELANTIRSETTLERTITLE_H52:0 "Elfrealm of the Wide West"
 getAELANTIRSETTLERDESC_H52:0 ""Of all the lands I traveled to, this is the one where I have been most at peace.\nOf all the people I met, the ones that now call my camp home are the only ones I would call friends.\n\nMy travels have told me much about the nature of life and myself. I have seen and met wonders across lands that are now worlds afar from me.\nUntil I arrived at this place I did not want much out of my life, but now there is something I desire strongly.\nFor the first time in my life, I want to stay in a place and make it my own. For me, for the ones that followed me here and for the ones that will come after. A place for all sons of Aelantir to live together and be met with the same harmony I have come to love.\nOf all the lands I have been in this is the only one I would want to call home.\n\nBeats going back to the old fools over at Silent Repose, that’s for sure."\n    - From the diary of Pelodir the Great."
 getAELANTIRSETTLERTITLE_H54:0 "Settle the River Country"
 getAELANTIRSETTLERDESC_H54:0 "Back in Cannor our people were in the midst of feuds as the Shires fought for what little power they were allowed to have under their foreign rulers. Said rulers were content to let our people be squandered as they themselves fought with each other. Under their tyranny, our precious Small Country was nothing more than their battleground and practice field.\nIn the end, there was no peace for us Small Folk. That's why, when news of the lost continent was made known to us, we began having ideas.\n\nIt took time and effort but we made it across the pond, and what awaited us on the other side? Paradise!\nWell, not for everyone. Some are put off by the beasts, bandits, native raiders and those weird guys that stare at us every time we go north.\nHowever, if it’s up to us? We will take all of that before we go back to being under the rose. Besides, the climate and soil is ideal for growing tobacco, just like mamma used to do it.\n\nAnd so will stay, we will build like only us smallfolk know how. We will turn this land into our own place, a land of Halflings ruled by Halflings for the Halflings!"
 getAELANTIRSETTLERTITLE_H56:0 "Crown the Bandit King"
 getAELANTIRSETTLERDESC_H56:0 ""In the shadow of a mountain we made our name known.\nBandits of Cannor, despoilers and thieves of what remained of a lost realm.\nThe brave followed her; the cowards stayed home; the savvy joined us in forging a legacy of infamy.\n\nWhy was it, then, that we left for Aelantir? We were not welcome in Cannor, yes, but we never were to begin with.\nNo, in this land so far from the reach of the 'almighty' princes there is so much for us to find- too much for us to pass up..\n\nA land ripe for the taking, a loyal bunch with nothing to lose but the space in their pockets and the stories of ancient precursors reaches far beyond our imagining.\nIn the shadow of this mountain we will engrave our name into history.\nUnder the guidance of our Bandit King, a new realm rises!"\n    - Proclamation of Town Crier Vauril"
 getAELANTIRSETTLERTITLE_H58:0 "A Land to Fight For"
 getAELANTIRSETTLERDESC_H58:0 "The life of a mercenary is not easy. One must depart their homes for months or even years at a time to fight for a cause that does not belong to you in exchange for a reward.\nWe took pride in that, in becoming the best warriors for pay that one could find, but all that pride meant nothing. Back in Cannor they judged us not for our skill but for what we were, for what we could never change.\nLike Dookan of old, we felt betrayed by the people we were trying to serve.\n\nBut everything changed when we arrived at Aelantir.\nIn this land no one cared for our origins, but rather for the services we could provide. We fought on, getting rich and earning a name. In a rather short time we were doing quite well for ourselves.\n\nMost mercenaries would be content with just that, but we saw a chance for something more.\nA cause that belonged to us, and not to our bosses.\n\nIt is about damn time that we mercenaries find a place worth fighting for!"
 getAELANTIRSETTLERTITLE_H60:0 "Reorganize the Exploration Society"
 getAELANTIRSETTLERDESC_H60:0 "When we heard of the rediscovery of Aelantir we were ecstatic! Finally we would be able to see the wonders of which the elven people had been talking about for so long.\nWe began organizing, pulling every favor we could to travel to this far lands to set up shop. As we traveled we began to wonder how this land would look; some spoke of gigantic ruins that reach high to the skies. The elves among our expedition reassured us that the great architecture of their kin could have easily survived unscathed.\n\nWe arrived to find ... nothing.\n\nThough disappointed at first, we sought to at least learn what we could. We met with various tribes and people from the lost continent, and even visited what realms that managed to survive the ruins.\nAnd then is when we began to learn the truth. We know now that the remnants of ancient Aelantir remain hidden out there, just waiting for us to find them.\n\nOur hope is reinvigorated and our desire to learn and study from this lost age is stronger than ever. We are now seeking to make this expedition of ours a more ... permanent affair."
 getAELANTIRSETTLERTITLE_H62:0 "Proclaim the Knightly Kingdom of Aelantir"
 getAELANTIRSETTLERDESC_H62:0 "Every great knightly order has a tale of their grandiose doings. One after another we recall the heroism of those who stood against Nichmer, those who fought for the Dove, and those who stooped Dookan and his Greentide.\nInside our order we felt alienated, a faction that did not belong. As we tried to reform and adapt to the times, our elders refused to listen. They pushed us away to such an extent where we never saw their achievements as being ours.\nA cry went up: "They want us gone? Fine! We will leave!" That is what we did.\n\nWe traveled far, to a land of uncontained darkness and evils. Here too were creatures that sought to break our loyalty to our cause, but we won't leave so easily this time.\nHere our legacy awaits. We will mark our names in history by enlightening this land.\nWith pride, we raise our blades in the air and say the name with pride: the name of Núr Dhánaenn, the Knightly Kingdom far from the home of chivalry!"
 getAELANTIRSETTLERTITLE_H64:0 "Tellumtir, the Untamed Stallion"
 getAELANTIRSETTLERDESC_H64:0 "The Epednar Frontier is unforgiving.\nMany come to this land seeking better fortune and leave it in caskets. The truth that they don't tell you when you get on the boat is that very few make a living here.\nThe warbands and would-be republics of this land spend more time fighting among themselves and against the ruinborn than they do building any semblance of civilization.\nThey try to fight against the nature of this land, to make and remake it into their own. In truth, that is an impossibility and an experiment of nation building doomed to fail every time it is attempted.\n\nOur band, however, recognizes this truth and chooses not to fight the frontier but to adapt to it. Our background as horse-riders and long-distance travelers has prepared us for this place.\nTo survive in the frontier you must be agile. You also need the skills and will to live and work with the land.\n\nWe have not only managed to survive this place but have also carved a place for us in the frontier, a place to belong - Tellumtir, the Untamed!"
 getAELANTIRSETTLERTITLE_H66:0 "Enlightened the Heart of Darkness"
 getAELANTIRSETTLERDESC_H66:0 "The Malevolent Dark exists everywhere. No corner of the world is safe from it and it will consume all those who cannot stand against it.\nThis is a truth Ecaris learned from his many years of fighting for what is good and true. Fighting besideCorin of venerable memory and leading the Exemplars have shown him not only the extent the darkness can reach but the good that can come from fighting it. That is why he and his good men came to Aelantir in the first place, to fight the Malevolent Dark in their lost homeland.\n\nThe lands of Effelai are cruel, they do not hide their accursed nature not for one moment. Across from them there is the bloody soil of Taychend, which shows its darkened nature in a similar way and corrupts the souls of all those born on it. Despite this shadow cast over its very existence, this place and no other shall serve as the beginning of something new for the Order of Exemplars.\nNo matter the cost and the effort that it will take this land will know darkness no longer. Through our efforts and the grace of Surael, the divine Light shall reach even this miserable land."
 getAELANTIRSETTLERTITLE_U67:0 "Spread our Song"
 getAELANTIRSETTLERDESC_U67:0 "Princess Ašuria was promised a kingdom, but was instead betrayed. Her failed attempts to claim her birthright saw her exiled from her home. In the end, the Princess and her loyal followers chose to come to the land of Effelai.\nWe have learned much about the locals and their traditions. Their songs and ours are not too different. The more we interact with the ruinborn of the jungle, the closer our young realm grows closer to them.\n\nAnd as we sing it becomes more and more clear that this is a land we can truly call home. Let us then solidify our home as not a kingdom but a republic, where both Harpies and non-Harpies are represented equally. Let this nation then become a place for all those who listen to the song of our joy..\n\nSing louder, O sisters - and new-found brothers! Let them tell tales of our new nation all the way back to the rotten throne we left behind!"



#Ruinsail Confederacy
 ruinsail_nation_title:0 "Become the King of the Pirates!"
 ruinsail_nation_desc:0 "The Golden Age of Piracy continues but the age of bickering captains and feuding flags is over. One by one, the rival fleets have been broken, bargained with, or brought to heel, and the Ruined Sea now groans beneath the weight of a single flotilla. There will be no more councils drowned in futile arguments, no more Driftcourts that end in a stalemate. The sea has chosen its master.\n\nHoist the skull-and-circle and raise it high. Man the guns and beat the drums. Let captains swear their oaths and let those who refuse walk the plank. A King of the Pirates walks among us and their word shall unleash the tides of war. Let the Endless Ocean burn, let the empires tremble, and let every vessel sailing its waters know that the Ruined Sea now answers to one voice alone!"
 ruinsail_nation_last_pirate_standing_trigger_tt:0 "All other §YAelantiri Pirates§! are §Ysubjects§! of §Y[Root.GetName]§! or don't exist."
 ruinsail_nation_effect_tt:0 "Inherit §YRhasáil§!, §YLamentaire§!, §YPort Palegold§!, §YTrollshaunt§! and §YMykx§!, if they are a subject of §Y[Root.GetName]§!.\n\nUpgrade §YPirate Republic§! Tier 1 Government Reform to §YAlliance of Skull and Circle§! Tier 1 Government Reform.\n\n§YRuinsail Confederacy§! gains a permanent claim on §YEndralliande§! Region, §YRuined Isles§! Region, §YRavenous Isle§! Region and §YNorth Ruined Isles§! Region.\n\n§Y[Root.Monarch.GetName]§! will gain the status of §YLegendary Pirate§! or if [Root.Monarch.GetSheHe] already is one, gain §G100§! of each Monarch Power."