l_english:
 plateau_settlers:0 "Plateau Settlers"
 desc_plateau_settlers:0 "People have gathered here in preperations for settling attempts in the North of the Plateau. The expeditions are not quite ready and likely won't be until the mid 1460s, but controlling this province may allow us to benefit from their efforts!"
 great_plateau_colonization.1.t:0 "The Settlement of [Root.GetName]"
 great_plateau_colonization.1.d:0 "Most who inhabit the Plateau are eager for expansion. But the exploration they prioritize is eternal, laying down another stone in the path they are building through constant reincarnation of their infinite self. As such, the Plateau's north has never had more than the smallest of towns and lacks permanent infrastructure.\n\nFor the humans, perhaps that would be enough. But the yeti... are at times stricken by wanderlust. For an individual, that might manifest as leaving their home, not to return for years -- if at all. And for a society, it manifests as a sporadic, but undeniable, expansion. The (currently) northernmost settlements in the Plateau date to a particularly intense bout of wanderlust two centuries ago. And now, it seems that wave has come again. Even if it ebbs out, the towns of [Root.GetName] will not disappear."
 volcanic_oath:0 "Volcanic Oath"
 great_plateau_colonization.1.a:0 "Take Control of the Settlement"
