 H83_all_dreams_must_come_to_an_end_title:0 "All Dreams Must Come to an End"

 H83_follow_your_dreams_desc:0 " “At the beginning of my journey on the great road, we encountered the goblin warchief who ruled this segment. His people dreamed without guidance. Heretics. I took it upon myself to grant them salvation. For many days and nights, I spoke with him of what dreams are meant to be, and I taught him how to interpret them. When our exchange was done, he acknowledged the truth of the Dream. Though their warchief had seen the light, his warband refused to join us. \nI record this as the first heretic converted to the Dream on the great road.” \n \n- Excerpt from the First Testament of  “The Dreambound Chronicle”"
 H83_echoes_of_trolls_desc:0 "“About halfway through our journey on the great road, our dreams started becoming disrupted. Loud smashing noises echoed around the caverns further east, breaking the sacred stillness of our sleep and shattering the very visions we relied upon. At first, we believed it to perhaps be a cave-in somewhere deep in the labyrinthian caves, but every night the noise continued to grow louder. Eventually it grew too loud for even I to dream. We could no longer ignore this, and we were forced to prepare an expedition to hunt down the source of the noise.” \n \n- Excerpt from the First Testament of  “The Dreambound Chronicle”"
 H83_grins_or_graves_desc:0 "“The further east we travel, the more often we run into goblins. Goblin hunting parties have always been a daily sight anywhere in these caverns, but now they’ve grown—becoming so organized and so plentiful that it is rarer to be alone than to be surrounded by the tiny folk. If their word is to be believed, soon we will reach the territory of a truly vast goblin clan. Whether they will be friends or foes of the Dream remains to be seen…” \n \n- Excerpt from the First Testament of “The Dreambound Chronicle”"
 H83_no_time_to_sleep_desc:0 " “My mind was prepared, yet my aging body failed me. If I was to make it to Gor Ozumbrog, as the Dream demanded, then we could not linger. As we travelled, rest became brief and uneven. I learned to walk while Dreaming, to listen even as my thoughts drifted. I taught this technique to my people, and those who could not learn it were left behind. \nI record this as a lesson; the Dream waits for none.” \n \n- Excerpt from the First Testament of  “The Dreambound Chronicle”"
 H83_a_neutroll_proposal_desc:0 "“Since our first meeting with the Cave Trolls of Grizehûd not so long ago, their true nature has slowly become apparent. These trolls are gentle and peaceful, only taking up arms to defend themselves and their… friends. While truly bizarre, this may make it possible to enlist the gentle giants into our Crusade. I surely hope so. If negotiations sour… this fight will be very bloody.” \n \n- Excerpt from the First Testament of “The Dreambound Chronicle”"
 H83_topple_the_trolls_desc:0 " “Grizehûd and its peace-loving trolls have been brought to heel. With such mighty servants, the Dream’s fruition draws closer each day. I can feel it. I suppose their pets are… charming… as messy as they can be.” \n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_approach_the_grin_desc:0 "“The Goldtooth Goblins were a vast but unenlightened mob. When we first encountered them, their only dreams were of gold. Tonight I will meet with their leaders and show them the true Dream. If those negotiations fail, the faithful are ready to… ‘coerce’ the masses.”\n \n- Excerpt from the First Testament of “The Dreambound Chronicle”"
 H83_a_dreamers_destiny_desc:0 "“After all those years in exile, Gor Ozumbrog finally stood before me, before us. This is where the Dream had led us. With this, I had finally achieved my destiny, and I knew my part was done. My body had carried me as far as it could. The Dream, however, does not age. The time has now come for the Dream to reveal my successor.\nThis will be my final lesson; we all live and die in service of the great Dream.”\n \n- Final excerpt from the First Testament of “The Dreambound Chronicle”"
 H83_goblin_reeducation_desc:0 "“A greedy grin crawled across my face when the latest converts from the Goldtooth clans brought a few small trinkets to me as a gift. While misguided in their singular lust for gold, one must admit that these goblins sure do know how to find and keep the stuff. That is good. Our Crusade will benefit greatly from such wealth.”\n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_chains_or_communion_desc:0 " “The idiom ‘no man is an island’ is not perfectly familiar to the Black Orc, but it does apply. We are not the only folk in these winding caves, and as we grow toward the ultimate fulfilment of our dream, a decision must be made. Will the goblins and trolls obey the Dream as we do, or will they take on a more… servile role?” \n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_the_greatest_dream_desc:0 "“I learn something new every day. Those who came before me have built up systems that I must come to understand, and begun processes that I must see through to their completion. If I am to serve the Dream as Zog did, then I must learn all these lessons as he recorded them, and more besides.\nThis will be my first lesson; the Dream is something we must teach, and be taught.”\n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_who_shall_hear_the_dream_desc:0 "“Reports from our scouts in the Dwarovar claim that violence between orcs, trolls, and goblins has decreased a great deal in recent years. I don’t know if the orcs have subjugated the others, or if they’ve learned to work together after all these years, but I don’t like it. We may soon need your help again.”\n \n- Letter from the desk of Gundobin Ironfist, Citrine envoy to Azka-Sur"
 H83_dream_devoured_gold_desc:0 " “Lazy. Spiteful. Bitter. Greedy. The dwarves of Verkal Gulan were, in spite of their enormous wealth, some of the most morally bankrupt of their stunted kind. The lessons of the Dream will never reach their carefully guarded hearts. Instead, we will crack them—and their vaults—with the blade. Suffer not the Dwarf to live.”\n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_time_for_redecoration_desc:0 "“The Dream does not merely demand that we take the Spine, my brothers. It demands that we remake the Spine anew, in our own image! Rip down every stunted statue! Set fire to every crumbling book, melt down every dusty chalice and urn! Gor Ozumbrog will be an orcish hold!”\n \n- Marshal Gut Dwarfeater, to his laborers"
 H83_dream_shattered_brass_desc:0 "“Selfish. Arrogant. Cowardly. Ovdal Kanzad was said to be the mightiest of the dwarves in their day. They were the crafters of the first cannons, and those most skilled in their use. Yet, when strife came to their kind they did not defend their fellows, but only themselves. Such was the strength of their arms and the weakness of their hearts. See what this treachery gets you? Suffer not the Dwarf to live.”\n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_the_question_of_land_desc:0 " “The goblins have always outnumbered us; this is no new knowledge. The speed at which their numbers grow when in relative safety is truly astounding, though. They seem to enjoy living in teeming masses. A small group of their chieftains came forward and asked for land for themselves to facilitate that exponential growth… but then again, we could simply press the extra chaff into service as meat shields.”\n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_where_trolls_may_thrive_desc:0 "“These trolls are strange, but they are still trolls. That is to say, they are dumb and brutish creatures. They found a niche for themselves, tending the fungus fields in the fertile caves south of the Gold Hold, but they’d serve just as well as superheavy shock troops.”\n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_dream_seeded_stone_desc:0 "“The Dream calls us to a certain place along the old road. It has shown me what to do. Orcs! The Dream has a gift for us, but as with all its gifts, we will have to earn it! Under this ancient track lay veins of ore. With our concentrated faith, it can become something far greater.”\n \n- Zur Shadowdreamer, at the groundbreaking of the first Dreamforge"
 H83_taking_root_desc:0 "“Eastern expansion continues within the Tree of Stone. Much like so many areas of these unending caverns, the Tree is absolutely crawling with goblins. This is an opportunity to prove that we are not some idling tribe that acts on instinct, but a state with consistent policies. We’ll treat these goblins exactly like the others.”\n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_a_name_repeated_in_dreams_desc:0 "“The Dream drives us onward; not just to conquer, but to make a pilgrimage. There is another sacred hold—The Citadel of Dreamers, the very furthest along the old roads. This was revealed to me. One day we will walk through its gates as liberators and conquerors, but for now it is beyond our armies’ reach. Still, it must be every Dreamer’s duty to visit that city, even occupied as it is.”\n \n- Excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_proposal_of_the_dream_council_desc:0 "Zur paced through the heaped gold and treasures of the pile as he often did while meditating on issues brought to him. Only today there had been word of clashes with dwarves in the west, a dangerous pit in the north, harpy raids in the south, and calls for extra resources to map the maze-like tunnels of the Tree in the east. Zur was wise, strong, and cunning, but the sheer size of the realm made him wonder… Perhaps a council of seconds would better enable him to serve the Dream?"
 H83_forged_in_dreams_for_war_desc:0 "A pair of dwarves in chains were dragged along the Dwarovar. One was from Seghdihr, the other a traveling merchant snatched off the ruins of the Gold Highway. After days on the march, they were unceremoniously shoved to the ground. One of their captors, an imperious looking Black Orc with fiery eyes, demanded something of them in their coarse tongue. The Citrine Dwarf spat at the Orc's feet, but the merchant grabbed him and pointed to a metallic ribbon that cut through the stone below them. Both stared, and they spoke their final word in unison. “Mithril…”"
 H83_dreamers_of_the_deep_desc:0 "“Wandering orcs who claim to be on ‘pilgrimage’ have been encountered along the road through the Jade Mines. Sometimes a single orc, sometimes groups as large as a hundred, just marching all the way to the end of the road and then heading back into the dark. They don’t seem to be causing much disturbance, it’s just… bizarre. Should we stop them?”\n \n- Report forwarded from Boar Command to Sarilavhan"
 H83_skewer_the_drake_desc:0 "“When his old clan threw him out for speaking the truth, Zog took the first steps of our great journey. Today, that clan has bent the knee to his successors. Overcoming these initial unbelievers and bringing them into the fold anew is the end of those first steps. Let us decide how best to avenge the Great Dreamer, then turn outward once again.”\n \n- Final excerpt from the Second Testament of “The Dreambound Chronicle”"
 H83_dreamforgery_specialisation_desc:0 "The first storehouses are filled to bursting with mithril ingots, and much, much more awaits in the mines. The cleverest of our smiths have come forward with a few ways we can make use of this incredible resource. We need only choose."
 H83_train_the_shadow_soldiers_desc:0 "The Drahmgall have devised a potion that allows the drinker to invade the dreams of others. They cite a particular fungi native to the Tree of Stone that has allowed this effect, and our first tests have left the subjects paranoid and exhausted. The Sagah, our elite soldiers, will be our enemies’ nightmare, whether waking or dreaming."
 H83_secure_the_middle_desc:0 "Urist Gildedapron was finishing closing up his shop, a small village smithy, when he suddenly glanced towards the creek where the mine entrance lay. His apprentice began to speak, but the old smith clapped his hand over the kid’s mouth and shushed him as the whole forest grew quiet. \n“Listen close, boy… Do you hear them? Drums… Drums in the deep…”"
 H83_integrate_the_drakons_desc:0 "Undoubtedly, the Skewered Drake tribe had something special going on with those monstrous Drakons. No other cavalry force has caused such shock and fear on the battlefield. They might be a great benefit to the Crusade."
 H83_dream_shaped_legions_desc:0 "Once, the dwarves feared the orcs for their stealth. Flashes of fangs and eyes would be the only warnings as shadowy figures charged from the dark. Now, the orcs gleam like a torch in even the tiniest glint of light, clad fang-to-foot in resplendent mithril armor. Where uncertainty haunted our enemies before, let them now be absolutely certain. Doom approaches, dressed to kill."
 H83_more_than_just_fighting_desc:0 "When allowed to flourish as they have under our watchful eye, these psionic mushrooms have revealed even more wonderful effects! The Drahmgall are reporting clearer, more accurate visions, the ability to share visions together, and even perfect lucid dream control. All because of some simple mushrooms."
 H83_pilgrims_of_the_dream_desc:0 "“I don’t really care why, Azaz. Their money is good.” The goblin stuck out his hand for the next sleepwalking orc to press a coin into his palm, before gesturing to the makeshift turnstile that led into an unlit tunnel that sloped sharply downwards.\n \nAzaz rubbed the back of her neck with worry. “I don’t know, Meeks. What if they’re looking for something down there? What if they find it?”\n \nMeeks shrugged and jammed another coin into his pouch. “It’ll be fine. If something bad happens, the Hobs will take care of it and we’ll slink away like we always do!”"
 H83_the_great_crusade_desc:0 "Deep below Gor Ozumbrog, in a vault of purest darkness, the new Great Dreamer renews their oath to Dookan. As they emerge from the dark, the assembled Drahmgall are struck by their leader’s maddened smile. The young orc fills their gem-studded mithril plate more fully than they did mere days ago. They stand tall and bold, their eyes swirling with psionic power.\n \n“Dookan says we are ready.” A murmur filled the room, but the Dreamer raised their hand and silenced it. “For the Crusade!”"
 H83_an_army_befitting_the_dream_desc:0 "“Orcs have not, historically, fought in a terribly organized fashion. Their charges might be unified, but they were not orderly. In this, our Crusade has changed us. To see thousands of Orcs in uniform, standing in neat columns, marching to war…. This is what the Dream has done for us. This is what we must do for the Dream, in kind.”\n \n- Excerpt from the Third Testament of “The Dreambound Chronicle”"
 H83_the_future_of_the_dream_desc:0 "Goblin communities loyal to our cause have begun developing an assortment of gizmos, doohickeys, and thingamajigs that they claim could be as valuable to the Crusade as our mithril. That’s insane. Bordering on unbelievable. …Show them in."
 H83_the_fires_of_war_desc:0 "“Not every orc needs to fight, but every orc must serve. Each bullet fired must first be cast. Each enemy bayonet can only be turned aside by armor made by orcish hands. We do not yet live in the prophesied age of peace and leisure. We are blessed, instead, to earn it for our descendants. An orc with a hammer is as true a servant to the Dream as an orc with a gun.”\n \n- Excerpt from the Third Testament of “The Dreambound Chronicle”"
 H83_beyond_the_western_chapter_desc:0 "The grates and pipes of Hul-Jorkad have fallen to our crusade, and will make a fine forward supply point as we march on. Our armies can head both north and further west from here, or even poke our heads out and enjoy a picnic by Lake Jorkad. Somehow, sallying out from here feels… familiar."
 H83_beyond_the_eastern_chapter_desc:0 "The Jade Hold of Grônstunad has been prized free from the chains of Hobgoblin command. It will represent a new strategic center in the east, one from which we can exert our influence over Rahen and beyond. Our eyes are locked, however, on Verkal Dromak."
 H83_the_mithril_trade_desc:0 "Storming outward from Hul-Jorkad has been extremely profitable. Everywhere we go, the Drahmgall find another vein of viable material for the Dream to bless, and our troops have never had to go without our now iconic mithril equipment. Tying these holds into the Crusade’s industry will help to guarantee that reality into the future."
 H83_the_ancient_dreamers_desc:0 "For years now, we have pilgrimaged to this place and allowed ourselves to be directed by the locals to the deepest known points. Now, just as Zur did in Gor Ozumbrog, we can thoroughly delve for the truth."
 H83_expand_mithril_production_desc:0 "“I assure you, with time and investment, these studies will bear fruit!” A goblin with thick lensed glasses rifled through a stack of papers and presented one with a complex arcane formula, but the orc overseer simply held up a hand. \n \n“Gaz. I believe you. I didn’t come down for another audit.” He held up a bottle of some dark colored liquor and a pair of cups. “We got the grant.”"
 H83_the_furthest_covenant_desc:0 "The long, straight roads of the largest part of the Serpentspine connect distant realms like an artery. Trade can flow freely through the dark under our watchful eyes, and our children can learn of the wider world from foreign merchants as they pass through. Let them come, witness the new orcish homeland, and enrich us all the while."
 H83_the_serpents_creed_desc:0 "The last of the dwarves are being driven from the Serpentsreach, and orcish industry supplants their rot. A new generation of orcs will live and Dream in this place, safe and sound behind thick walls and true-hearted guards."
 H83_the_truth_desc:0 " Once more we prepare to delve into the deepest dark, to find the secrets that the dwarves have long kept. As we plumb these depths, the Great Dreamer leads us, and there is a strange sense of finality."
 H83_the_jade_mandate_desc:0 "The Jade Mines are secured. The Dream has brought us to one end of the Serpentspine; as we bring this place into the fold, it will come to fuel the conquest of the other side. The Crusade is far from over."
 H83_the_face_of_our_army_desc:0 "A howling, roaring, snarling orc, carrying two axes and wearing only a loincloth, stomped down the old dwarven road. His chanting, a traditional orcish song, set the beat for the mechanical lockstep march of the column of soldiers marching in parade behind him. The assembled crowd cheered for the regiment’s iconic mascot. Such a display is far from a mark of shame; if not for those difficult times of tribal warfare, we would never have come to the age of glory we enjoy today."
 H83_the_great_western_testament_desc:0 "The Crusade in the West is done. At last, the age of the dwarf is over. Now is the time for fixing up potholes, drafting contracts, and learning new recipes. Maybe in the coming years, the orcs who grow up here will launch a new Greentide and seize the title of Castan, but that’s their own dream to pursue when the time comes. For now, there is peace."
 H83_the_great_eastern_testament_desc:0 "The Crusade in the East is done. At last, the age of orcs is here. From here we begin rebuilding forts and widening doors, starting families and baking bread, living and dreaming and living the dream. Maybe someday the orcs will march out onto the fields of Rahen and make vassals of the ogres and harimari, but there is no rush. Right now, we are home."
 H83_all_dreams_must_come_to_an_end_desc:0 "Dookan called to Zog in the dark below Gor Vazumbrog, and showed him a vision. It was a vision of fire and blood. It required the shattering of bone and the annihilation of an infestation that had haunted these mountains for twenty thousand years. Zog saw what it would cost, and he believed that it would be worth it in the end. Now, the Crusade has brought us to every cave within the Serpentspine, from the source of the Alen to the source of the Yan, and it has brought us home. This is the Dream, and sometimes Dreams do come true."
