 H83_destroy_the_trolls_trigger_tt: "We have two options to deal with the Trolls\n\nTo negotiate, all of the following must be true:\n   [Root.H83_M01_is_subject_yes_no]§Y[M01.GetName]§!:\n      Is a subject of [Root.GetName]\n      Liberty Desire less than §Y50.00%§!\n   [Root.H83_negotiate_trolls_yes_no]Every owned province with the §YTroll Majority\n      Revolt§! or §YTroll Minority Revolt§! province modifier:\n      One of the following must be true:\n        Has been improved at least three times\n        Is a §YHold§!\n        §YProvice(s)§! is NOT a city\n   [Root.H83_not_enslaved_yes_no]We have NOT already enslaved either Trolls\n      or Goblins\n\nTo enslave them, all of the following must be true:\n   [Root.H83_enslave_trolls_yes_no]Every owned province with the §YTroll Majority\n      Revolt§! or §YTroll Minority Revolt§! province modifier:\n         [Root.GetName] has at least 3 regiments present\n   [Root.H83_not_negotiated_yes_no]We have NOT already negotiated with either Trolls\n      or Goblins"
 H83_destroy_the_goblins_trigger_tt: "We have two options to deal with the Goblins\n\nTo negotiate, all of the following must be true:\n   [Root.H83_H82_is_subject_yes_no]§Y[H82.GetName]§!:\n      Is a subject of [Root.GetName]\n      Liberty Desire less than §Y50.00%§!\n   [Root.H83_negotiate_goblins_yes_no]Every owned province with the §YGoblin Majority\n      Revolt§! or §YGoblin Minority Revolt§! province modifier:\n      One of the following must be true:\n        Has been improved at least once\n        Is a §YHold§!\n        §YProvice(s)§! is NOT a city\n   [Root.H83_not_enslaved_yes_no]We have NOT already enslaved either Trolls\n      or Goblins\n\nTo enslave them, all of the following must be true:\n   [Root.H83_enslave_goblins_yes_no]Every owned province with the §YGoblin Majority\n      Revolt§! or §YGoblin Minority Revolt§! province modifier:\n         [Root.GetName] has at least 1 regiment present\n   [Root.H83_not_negotiated_yes_no]We have NOT already negotiated with either Trolls\n      or Goblins"

 #Decisions
 H83_migrate_title:0 "Sleepwalk"
 H83_migrate_desc:0 "Zog and his most loyal followers have to keep moving if they are to reach Gor Ozumbrog. The others will catch up. The Dream waits for no one."
 H83_destroy_the_trolls_title:0 "Deal with the Trolls"
 H83_destroy_the_trolls_desc:0 "These troll upstarts think that the world is all crystals and glow worms. We’ll show them the truth, and they’ll be put back to work."
 H83_destroy_the_goblins_title:0 "Deal with the Goblins"
 H83_destroy_the_goblins_desc:0 "Our uppity goblin subjects will have to be brought to heel by force. Luckily, they are weak and not hard to put down."
 H83_relocate_the_grin_title:0 "Send the Goblins back to the Grotto"
 H83_relocate_the_grin_desc:0 "The Greedy Grin has had a home in and around the Coinvaults for a long time. We should allow them to continue as they have, in service to the Dream and as our subjects."
 H83_dreamforged_mithril_decision_title:0 "Cultivate Dreamforged Mithril"
 H83_dreamforged_mithril_decision_desc:0 "There are a handful of locations best suited for the process of dreamforging. With our army always growing and new lands to conquer, it may be time to prepare another Dreamforge."
 H83_hunt_the_bat_decision_title:0 "Launch Xazor Expedition"
 H83_hunt_the_bat_decision_desc:0 "The monstrous bat known as Xazor haunts these halls. This place can never truly be our prosperous homeland so long as a thing like that could burst forth and destroy us."

 #Modifiers
 H83_zog1:0 "Followers of Zog"
 desc_H83_zog1:0 "Zog’s dream drives us onward to Gor Ozumbrog. So long as the first Great Dreamer lives, we will move as fast as we can. The most zealous blaze the trail along with Zog, and those of lesser faith will have to keep up or die on their feet."
 H83_zog2:0 "Numbers Reinforced"
 H83_we_have_cave_troll:0 "We Have a Cave Troll"
 desc_H83_we_have_cave_troll:0 "The Trolls of Grizehûd bolster the durability of our armies with their thick hides and muscular bulk. If only we could get them to eat less."
 H83_colonies_funded:0 "Colonies Funded"
 H83_colonies_funded_desc:0 "The Great Dreamer calls us to claim these halls, so that we might never fear the dwarf again!"
 H83_greedy_grin_banking:0 "Greedy Grin Bank"
 desc_H83_greedy_grin_banking:0 "The Greedy Grin goblins are said to hoard endless wealth, but that’s not exactly true. They’re happy to share. They offer low interest loans to domestic businesses, and store away personal wealth for our citizens with a 100% APY! Whatever that means."
 H83_colonial_buff:0 "The Land of Our Dreams"
 desc_H83_colonial_buff:0 "We have reached Gor Ozumbrog, as Zog said we would. Now, we must claim this land and secure our position! As those we left behind in our haste catch up, they bring new converts with them. We have no shortage of settlers for this new land."
 H83_zurs_nightmares:0 "Zur's Nightmares"
 desc_H83_zurs_nightmares:0 "The Great Dreamer is wandering restlessly, searching for the deepest dark. The whole of our nation has slowed in anticipation…"
 H83_goblin_minority_revolt:0 "Goblin Minority Revolt"
 desc_H83_goblin_minority_revolt:0 "The goblins are revolting! Goblins are nothing if not numerous, and when they get together and refuse to work en masse, almost nothing will get done!"
 H83_goblin_majority_revolt:0 "Goblin Majority Revolt"
 desc_H83_goblin_majority_revolt:0 "The goblins are revolting! Goblins are nothing if not numerous, and when they get together and refuse to work en masse, almost nothing will get done!"
 H83_troll_minority_revolt:0 "Troll Minority Revolt"
 desc_H83_troll_minority_revolt:0 "The trolls are revolting! Calls for equal treatment have led to increased tension and conflicts in the streets, and attempting to detain an angry troll rarely goes smoothly."
 H83_troll_majority_revolt:0 "Troll Majority Revolt"
 desc_H83_troll_majority_revolt:0 "The trolls are revolting! Calls for equal treatment have led to increased tension and conflicts in the streets, and attempting to detain an angry troll rarely goes smoothly."
 H83_subject_revolt:0 "Subjects Revolting"
 desc_H83_subject_revolt:0 "Widespread call for equal treatment has chilled relations between the Great Dreamer and his vassals."
 H83_increased_autonomy_for_trolls:0 "Troll Limited Autonomy"
 desc_H83_increased_autonomy_for_trolls:0 "Winning the fight for equal rights hasn’t healed the division between orc and troll all at once. We will learn to work together, for the Dream, in time."
 H83_increased_autonomy_for_goblins:0 "Goblin Limited Autonomy"
 desc_H83_increased_autonomy_for_goblins:0 "Winning the fight for equal rights hasn’t healed the division between orc and goblin all at once. We will learn to work together, for the Dream, in time."
 H83_enslaving_trolls:0 "Local Troll Enslavement"
 H83_enslaving_goblins:0 "Local Goblin Enslavement"
 H83_chained_goblins:0 "Goblins in Chains"
 H83_chained_trolls:0 "Trolls in Chains"
 H83_ignited_dreamfire:0 "Drahm'otash Ignited"
 H83_reinforced_dream:0 "Dream Reinforced"
 H83_prophets_vision:0 "Prophets Vision"
 H83_dream_council:0 "The Drahm Council"
 H83_middle_secured:0 "The Middle Secured"
 desc_H83_middle_secured:0 "Only a taste of what is to come, a large section of the Serpentspine has been claimed and made safe as part of our new homeland. This first substantial success bolsters belief in the dream across the nation!"
 H83_drakon_training:0 "Drakon Sparring Partners"
 desc_H83_drakon_training:0 "Clashing with the mighty Drakons makes for excellent combat practice and great exercise."
 H83_removing_dwarven_architecture:0 "Destroying Dwarven Architecture"
 desc_H83_removing_dwarven_architecture:0 "Orcs swarm the streets and ruined halls of Gor Ozumbrog, ripping fixtures from dusty walls and burning tapestries in piles. Now is the time for demolition, building back up can come later."
 H83_cave_autonomy:0 "Autonomy of the Caves"
 H83_first_orcish_hold:0 "The First ORCISH Hold"
 desc_H83_first_orcish_hold:0 "A hold for orcs, where no proud orc bumps his head on a door frame, and no half-burnt painting glares down at an “invader.” This is our home now, and it suits us just fine."
 H83_seeding_stone:0 "Seeding the Stone"
 desc_H83_seeding_stone:0 "The process of preparing a location for Dreamforging means any existing industry must grind to a complete halt."
 H83_goblin_expertise:0 "Goblin Expertise"
 desc_H83_goblin_expertise:0 "The industriousness of goblins is without peer, and the gift of a safe and prosperous homeland means they can make a lot of whatever you need. So long as it can be made in a cave."
 H83_dreamforged_mithril:0 "Dreamforged Mithril"
 H83_shattered_brass:0 "The First Cannons"
 desc_H83_shattered_brass:0 "The dwarves of Ovdal Kanzad were said to have forged the first cannons in the world. Not sure if these are those ones, but we ripped some very nice cannons from the walls. They pack quite a punch."
 H83_goblin_tree_of_stone_dev:0 "Dreams Taking Root"
 desc_H83_goblin_tree_of_stone_dev:0 "Just like their cousins in the Greedy Grin, these goblins can be uplifted by the Dream. With their cooperation, the Tree of Stone can become part of our prosperous new homeland."
 H83_with_an_iron_fist:0 "With an Iron Fist"
 desc_H83_with_an_iron_fist:0 "Goblins make fine slaves. Whether Goldtooth or Undergrowth, they will fall in line—or just fall."
 H83_cultivated_clusters:0 "Cultivated Clusters"
 desc_H83_cultivated_clusters:0 "Caves have been cordoned off to cultivate certain alchemically useful fungi in huge quantities."
 H83_dream_invaders:0 "Algkarn-u Drahman"
 desc_H83_dream_invaders:0 "The fungi produced here is used by the Drahmgall to invade the dreams of our enemies and strike at them even before we meet on the battlefield."
 H83_mindroot_groves:0 "Mindroot Groves"
 desc_H83_mindroot_groves:0 "The fungi has proved even more useful in the bolstering of visions, and a new industry has blossomed to keep up with the Drahmgall’s demand for the stuff."
 H83_dreams_of_ozumbrog:0 "Dreams of Dromak"
 desc_H83_dreams_of_ozumbrog:0 "The Dream calls us further East, though we do not yet know where. That apprehension can put even hardened orcish warriors on edge."
 H83_dream_pilgrimages:0 "Dream Pilgrimages"
 desc_H83_dream_pilgrimages:0 "Journeys to the faraway hold of Verkal Dromak bring our faithful peace of mind, renewed faith, and a touch of cultural exchange with the locals that has proved surprisingly valuable."
 H83_tree_secured:0 "The Tree Secured"
 desc_H83_tree_secured:0 "Another chunk of the Serpentspine has fallen to the crusade and become a new orcish homeland! Let orcs sleep and Dream beneath the roots of the Tree of Stone!"
 H83_dreamfire_crusade_at_war_with_dwarf:0 "The Bane of Dwarves"
 M01_H83_room_for_expansion:0 "Room for Expansion"
 H83_dreamfire_dominion_at_war_with_dwarf:0 "United by War"
 H83_embraced_magic:0 "Magical Traditions Reinforced"
 desc_H83_embraced_magic:0 "Through the development of Artificery, we have also found ways to make our magic a touch more efficient."
 H83_dreamforged_artificery:0 "Dreamforged Artificery"
 H83_the_fires_of_war_modifier:0 "Religious Servitude"
 desc_H83_the_fires_of_war_modifier:0 "The zealous work themselves to the bone to feed and arm the soldiers of our great Crusade. We know that their hearts are true, and we will gladly accept and encourage their sacrifice in the name of the Dream."
 H83_army_of_dookan:0 "An Army Worthy of Dookan"
 desc_H83_army_of_dookan:0 "The soldiers of the Dream ready themselves to face whatever may come, as the Crusade begins in earnest. No force on Halann may stand against us."
 H83_dromak_within_grasp:0 "Dromak Within our Grasp"
 H83_final_push_west:0 "A Final Push West"
 desc_H83_final_push_west:0 "The few remaining dwarven holds in the West Serpentspine stand no chance against the Orcs who intend to crack them. Good, strong cannons and clever tactics mean no bastion will hold out long. There will be no isolated “Remnant Holds” this time around."
 H83_final_push_east:0 "A Final Push East"
 desc_H83_final_push_east:0 "Verkal Dromak is our ultimate objective in this Eastern campaign, but testing our mettle against the hobgoblins of the Command has been highly educational. Now that we have learned what we can, the orcs will stop pulling their punches and let the Hobs taste orcish mithril."
 H83_the_dream_forge:0 "The Dream Forge"
 desc_H83_the_dream_forge:0 "“Dreamforging” is the name for the process of transmuting random, lesser ores into precious mithril. There has never been a single “Dream Forge” up til now. Centralizing the bulk of our mithril smelting allows us to focus on extraction at the source, and on quality work at the smithy!"
 H83_dreamforged_transport_network:0 "Dreamforged Transport Network"
 desc_H83_dreamforged_transport_network:0 "Key rail exchanges have been reinforced with light and strong Dreamforged Mithril, which allows railcars to make quick turns at high speed. It’s thrilling to ride along, to be sure!"
 H83_the_dream_mine:0 "The Dream Mine"
 desc_H83_the_dream_mine:0 "Mithradhum was already rich in our favored material when we got here, and Dreamforging only enhanced the purity and strength of the metal. Turning the whole hold into a massive mine will allow us to get at all of it."
 H83_religious_origins:0 "Religious Origins"
 desc_H83_religious_origins:0 "A burst of zeal has risen in our missionaries after the rumor spread that another great discovery might be found beneath Hul Jorkad."
 H83_A16_artificers_modifier:0 "Mechanised Cultivation"
 desc_H83_A16_artificers_modifier:0 "Granting extra access to mithril to the Artificers has led to an explosion of productivity across the production line, and more than a few technological advances besides."
 H83_A16_mages_modifier:0 "Mana Fed Mithril"
 desc_H83_A16_mages_modifier:0 "Granting extra access to mithril to the Mages has keenly focused the effects of Dreamforging, making strip-mining considerably more productive."
 H83_A16_mages_study:0 "Mages Studying"
 desc_H83_A16_mages_study:0 "The Mages are working with mithril in an effort to improve the Dreamforging process, and almost ignoring their other duties in the meantime. When mages get this obsessive, the results are always worth watching."
 H83_artificers_study:0 "Artificers Studying"
 desc_H83_artificers_study:0 "The Artificers are figuring out how best to work with Dreamforged Mithril, to the detriment of their other research. We eagerly await their results."
 H83_the_last_crusade:0 "The Last Crusade"
 desc_H83_the_last_crusade:0 "The Dream Crusade is the finest army in the world, with the best weapons, the best training, the sharpest uniforms, and the most important mission. Let all Halann tremble when the Orcs are on the march!"
 H83_west_secured:0 "The West Secured"
 desc_H83_west_secured:0 "The ancient seat of dwarven authority is now firmly under the control of the Dream Dominion. The crusade was hard fought, but the spirit of the Dream is still strong as ever in the hearts of the orcs!"
 H83_dream_trade:0 "The Dream Trade"
 desc_H83_dream_trade:0 "The old dwarven roads connect distant lands along safe, controllable paths. If we let the neighbors through, we can net a fortune in tolls and fees, not to mention acquire luxuries from across the world."
 H83_dream_trade_hub:0 "Dream Trade Hub"
 H83_dreamforged_industry:0 "Dreamforged Industry"
 desc_H83_dreamforged_industry:0 "The basic principles of Dreamforging apply to more than just Mithril mining. Believing with your whole heart that the work is worth doing for the good of your people and your homeland makes you work harder, no matter the task at hand."
 H83_serpent_secured:0 "Serpent Secured"
 desc_H83_serpent_secured:0 "The mountain halls between Cannor and Bulwar are now safely in the hands of their rightful masters. Prosperity will come easy in these rich caverns!"
 H83_the_origin:0 "The Origin"
 H83_our_purpose:0 "Our Purpose"
 H83_jade_secured:0 "Jade Secured"
 desc_H83_jade_secured:0 "The Jade Mines are conquered at last! The only “Command” this land yields to anymore is the firm but loving orders of the Great Dreamer."
 H83_please_colonize_greedy_grin:0 "Go Colonise Please"
 H83_religious_conscription:0 "Religious Conscription"
 desc_H83_religious_conscription:0 "Populated by folks who have visited the holy depths of Verkal Dromak, no other part of our realm is so ready to arm up and go on crusade. Surely, there are still lands worth conquering that we can ship them off too."
 H83_dream_coming_to_close:0 "Dream Coming to a Close"
 desc_H83_dream_coming_to_close:0 "Peace has come at last to the new homelands. Soon comes an age of slow growth, high walls, and pride in what we have done."
 H83_a_dream_fulfilled:0 "A dream fulfilled"
 desc_H83_a_dream_fulfilled:0 "At last, the stink of the dwarf is all but forgotten. The whole of the Serpentspine lay in the hands of the Dream Crusade. Now comes the Age of the Orc!"
 H83_the_dream_fulfilled:0 "A dream fulfilled"
 desc_H83_the_dream_fulfilled:0 "At last, the stink of the dwarf is all but forgotten. The whole of the Serpentspine lay in the hands of the Dream Crusade. Now comes the Age of the Orc!"
 H83_xazor_hunt_failed:0 "Expedition Slain by Xazor"
 H83_xazor_hunt_failed_desc:0 "The leader of that failed expedition to slay the Great Bat… they were one of us."
 H83_fought_xazors_minions:0 "We faced a horde of bat creatures in Xazor’s Pit, and we won! Normal armies don’t hold a candle to such a wicked host!"
 desc_H83_fought_xazors_minions:0 "Fought Xazor's Minions"
 divination_1_deposit_divination_local_mod_H83_upgrade:0 "Divination: Divined Deposits"
 H83_scrying_traps:0 "Divination: Scryed Traps"
 H83_reshaping_the_pit:0 "Reshaping The Pit"
 desc_H83_reshaping_the_pit:0 "The Great Bat is dead, but there is still work to do. The Pit must be cleared of remaining bat monsters, paths must be dug and settlements planned and executed. Watch your step."
 H83_xazors_remains:0 "Xazors Remains"
 desc_H83_xazors_remains:0 "The bedrock here is suffused with magic from the beast who once called this place home. Tapping into that well will provide us a convenient source of energy for our rituals."
 H83_guided_trolls:0 "Guided The Trolls"

