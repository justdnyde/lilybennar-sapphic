 H83_dookan_omen_of_peace_upgraded:0 "Omen of Peace"
 H83_dookan_omen_of_destiny_upgraded:0 "Omen of Destiny"
 H83_dookan_omen_of_calamity_upgraded:0 "Omen of Calamity"
 merc_goblin_chain_band:0 "Goblin Chain Band"
 merc_troll_chain_band:0 "Troll Chain Band"
 merc_drakon_company:0 "Drakon Company"
 GREAT_DREAMER:0 "Gar-u Drahman" #lord of dreams
 PRINCESS_DREAMER:0 "Gardurzk-u Drahman" #princess of dreams
 PRINCE_DREAMER:0 "Gakhur-u Drahman" #prince of dreams
 LAND_OF_DREAMS:0 "Dream Dominion"
 estate_church_H83_dreamforgery_1:0 "Dreamforged Swords"
 estate_church_H83_dreamforgery_1_desc:0 "Mithril swords, infused with the zeal of the nation, can carve through the toughest of armor like a troll’s tooth through a mushroom. We should equip our soldiers with them!"
 estate_church_H83_dreamforgery_2:0 "Dreamforged Armor"
 estate_church_H83_dreamforgery_2_desc:0 "Even a thin plate of blessed mithril can resist both bullet and bayonet longer and more directly than heavy steel armor. With this, our warriors will be resplendent and invincible!"
 estate_church_H83_dreamforgery_3:0 "Dreamforged Cannons"
 estate_church_H83_dreamforgery_3_desc:0 "A sheet of mithril on the inside of a cannon will prevent the barrel from exploding even after many hours of rapid fire. With such cannons, we can lay waste to our enemies long before the charges begin!"
 estate_church_H83_dreamforgery_4:0 "Dreamforged Supply Lines"
 estate_church_H83_dreamforgery_4_desc:0 "A skilled orcish smith can make equipment of high quality, or of vast quantity. With a set of mithril tools, that same smith can achieve both quality and quantity, and we can field troops better and faster than ever!"

 #Missions
 shadowdreamer.1.t:0 "A Dream in the Shadows"
 shadowdreamer.1.d:0 "Cast out of Gor Vazumbrog for his prophetic visions, Zog Shadowdreamer has led his people far, unified in pursuit of the Kabir Drahm. Today, he stands to address what remains of those loyal dreamers who escaped with him.\n \n“My friends! Long have we run, persecuted for our beliefs, shunned and hunted. But no more, for we now carve the destiny of the Dream. Let it be known that we are the Dreamers who will never be shaken awake. Let us not forget those who have been left behind, those who died so that we could get this far. Know that in their final moments, they were able to find peace in knowing that they died in service to the Great Dookan until their last. This is the destiny of every Dreamer. The road ahead will be dangerous; not all of us will make it, but we must have faith in Dookan’s guidance. No cost is too high to achieve our destiny. Today, we finally begin our great march to Gor Ozumbrog. Today, we become who we were always meant to be. Today, we will make the Dream come true.”"
 shadowdreamer.1.a:0 "No sleep til Gor Ozumbrog!"
 shadowdreamer.3.t:0 "Troll Town"
 shadowdreamer.3.d:0 "The expedition that we sent out into the caverns has finally returned after a long while, and with them they escort a small band of trolls. They are much larger than we expected, some even towering at twice the height of most orcs. Their hides are scarred, and eyes heavy-lidded. The scouts report of a settlement nearby, not too far from where they captured the band. It’s a small town crudely carved into a cave wall, fungi farms clinging to damp rock, and crude tools fashioned from bone and iron.\n \nThe trolls claim the rumbling we heard was the sounds of a mining operation, and that they had no idea our own band was nearby until we appeared from the dark. Many feel that it would be wise to keep these trolls, that they have strong backs, and would be invaluable labor in the hold we will one day claim. Others argue this is not worth the potential bloodshed. That it would be wiser to allow the trolls to go free, with a gift of some iron, so as to not provoke further hostilities. The leader of our scouting expedition, claims that our forces could easily raid this Troll town and that they have a large stockpile of gold and other treasures, likely plundered from travelers in this area.\n \nHow shall we handle this?"
 shadowdreamer.3.a:0 "Trolls make excellent miners, let them mine for us instead."
 shadowdreamer.3.b:0 "No sense stirring up trouble with other folk."
 shadowdreamer.3.c:0 "A mining town? Now that’s a tempting target."
 shadowdreamer.3.e:0 "They’d be safer with their kin in §YGrizehûd§!"
 shadowdreamer.4.t:0 "Dreamers Destiny"
 shadowdreamer.4.d:0 "Zur was barely an adult when we reached Gor Ozumbrog, but one does not simply refuse destiny’s call because they are not ready. Today he stands surrounded by the truest followers of the Dream, dressed in the finest robes that their clan can provide, and addresses them as their new leader.\n \n“Drahmgall. I am your chosen. Dookan speaks to you, through me, and he will hear no dissent.” There was no cruelty in his words, but they were as hard as stone. “Zog was your master before, and the Dream led him here. It led us all. You will make this place a new home for our people. This is my first command, and it will stand until the Dream shows me what comes next.”"
 shadowdreamer.4.a:0 "Thus spake Zur! Thus spake Dookan!"
 shadowdreamer.5.t:0 "Dream Led Footsteps"
 shadowdreamer.5.d:0 "The young Great Dreamer walked with his eyes closed. His breathing was deep and slow, and those who dared look closely at his face could see that his eyes were moving quickly and randomly beneath heavy, dark lids. Crowds would part before him. Cloaks would be thrown across stagnant puddles that he would not be shocked awake by the splashing of troglodytic isopods half-crushed underfoot. He has been doing this for hours a day for weeks, in search of a great vision he seemed to be expecting. The Drahmgall, for their part, had agents following and watching from a distance. They saw the potential vulnerability of their prophet wandering blindly.\n \nZur was as stressed by the ordeal as his Sagah. A whisper was coming from somewhere. A voice beneath the occupied hold, like wind through the cracks. It would prod at his dreams and his waking mind in equal measure, beckoning him to find the deepest dark, to find the source of the Dream. Often he would murmur the things it said aloud, invariably frightening children as he stumbled around like a madman, probing at cracks in the walls."
 shadowdreamer.5.a:0 "Has the Great Dreamer lost his mind?"
 shadowdreamer.6.t:0 "Restless Nights"
 shadowdreamer.6.d:0 "“This is maddening. It has been weeks since I have had a restful sleep. It is as though some dark hand is pulling at the lids of my mind’s eye. I have read every word of Zog’s testaments, and I thought I knew what was to come as I took up the mantle. He neglected, I find, to mention how torturous this experience is. Perhaps his waiting for the visions was not so, and it is a burden unique to me. I should hope so, or else this realm will be inevitably governed by those driven to lunacy.\n \nIn the meeting with my advisors earlier I made a fool of myself, repeatedly asking the orc in charge of food stockpiles in the capital to repeat himself, and calling him by the wrong name twice. I’ve stumbled over my own feet so many times in the last while that it is a gift from Dookan that I haven’t knocked myself out on a table’s edge. I find myself utterly mesmerized by the flickering of candles, when I should be hearing the oaths of young officers.\n \nTo put it simply, this state of affairs is not sustainable. I must commit myself to finding the source of these haunting whispers—at the detriment of all else—or everything will slip away from me and the realm will fall to ruin.\n \nI am going to try to sleep for long enough to be able to think clearly, with the aid of a tincture I acquired from a traveling alchemist. Once I wake, I will seek out the deepest, darkest vaults of this damned hold and I will find my vision. If I can’t… It’ll drive me mad, and I’ll try to help the Drahmgall find a replacement who will be more than taunted by the Dream.”\n \n- Excerpt from the private journals of Zur Shadowdreamer"
 shadowdreamer.6.a:0 "The Great Dreamer steps away…"
 shadowdreamer.7.t:0 "The Voice in the Vault"
 shadowdreamer.7.d:0 "The creaking of that ancient door shook me awake. It was a vault door cast of some unrusting metal, so caked with dust that it must have been lost for a millennium. I do not know how I opened it. I have the vaguest, fleeting memory of spinning the massive wheel back and forth, inputting a code to unlock it. No single creature could have pulled this immense door ajar even slightly, and yet… Here I stand in the deepest dark I have ever seen. Within, I hear it. A voice, whispering to me from the depths, deep and serious. Ambitious.\n \nI step across the threshold into the vault, and at once it is all around me. It beckons me forward, and I follow. I am more awake now than I’ve been in weeks, more keenly aware of the world around me than I have ever been in my life. I take step after step and my vision swirls in the impossible dark as images appear before me. Fire that consumes the world around me. Stone that shatters where our hands and feet touch. A bloody crusade to seize the Dwarovar and make it ours forevermore.\n \nThen, I tripped on a loose stone and tumbled to the ground.\n \nI only realized how quiet and still it had become when the voice roared above me, now a single booming call rather than a chorus of whispers. “Would you have the eyes to see? The hands to make this dream reality?”\n \nMy throat was dry, but I spoke through the pain, the words Zog had left for me to study. “O! Mighty Dookan, Lord of Shadow and Fury! I, Zur Shadowdreamer, bow my head beneath your dark light. Your whispers guide my hand, your fire sharpens my blade, and your wrath flows through me like an unending river. Let their axes break upon my skin. Let their gold crumble to dust in my hands. Let no dwarf escape the cleansing I bring in your name.”\n \nA rough hand reached from the impenetrable darkness and grabbed me by the neck, and I felt another push a stone into my hand.\n \n“Believe,” it said.\n \nAt once the room was bright. It was as though there was a torch behind my eyes, and everything was lit from that source. I looked down at my hand and the chunk of some kind of ore that now lay in it. Quickly, in tendrils starting from within, it was transforming from dull and dark to something brilliant and glittering."
 shadowdreamer.7.a:0 "Is this… Mithril?"
 shadowdreamer.8.t:0 "Zur's Offer"
 shadowdreamer.8.d:0 "A vile force of darkness has come, and it arrives with an offer of “protection.” Do we subject ourselves to these zealots, or risk turning them away when they might not take no for an answer?"
 shadowdreamer.8.a:0 "It may be wise to hear out these “Dreamers.”"
 shadowdreamer.8.b:0 "Never!"
 shadowdreamer.9.t:0 "List of Demands"
 shadowdreamer.9.d:0 "Nelsik and Gott stood at the front of a vast assemblage of both goblins and trolls, with a few orcs mixed in. This had been a stressful protest to organize, considering the possible outcome. The large turnout had begun to lift their spirits, though, and it was Gott, the troll, who spoke first.\n \n“Trolls! Goblins! Friends! We are loyal to the Dream as Zog taught it to us! Why don’t our leaders treat us the same?” he roared over the crowd.\n \nNelsik followed right along from his spot on his friend’s shoulder. “The Dream is for all of us! We want equal say in how this operation is run, since we work just as hard as the orcs! There are too many of us to ignore!”\n \nGott raised his other arm and flexed. “And we are too strong to do without! They can’t just push us down!”\n \nThe crowd cheered, and the sentiment stuck. Word spread quickly to the Drahmgall and the Great Dreamer."
 shadowdreamer.9.a:0 "How would they react?"
 shadowdreamer.10.t:0 "A Promising Dream Sage Born"
 shadowdreamer.10.d:0 "Since the ascent of the current Great Dreamer, we have watched and waited for the birth of a child gifted with visions. Today, a candidate we had been watching was confirmed to have the gift, and they are blessed with magic as well! Who should raise the Dreamer-to-be?"
 shadowdreamer.10.a:0 "Let them benefit from the wisdom of the Drahmgall."
 shadowdreamer.10.b:0 "Let them learn the needs of our realm from Drahm Council."
 shadowdreamer.10.c:0 "They must gain experience with the Sagah."
 shadowdreamer.11.t:0 "Lands for the Goblins"
 shadowdreamer.11.d:0 "The wealthiest and most ambitious of the Goldtooth Goblins, and that’s a high bar, have come forth to request land rights and privileges beyond their ancestral lands. They claim such rights would allow them to develop strong domestic industries, that we might all prosper as the goblins do."
 shadowdreamer.11.a:0 "Let them prove the might of goblin industry."
 shadowdreamer.11.b:0 "They called themselves the “Greedy Grin,” and now we see why. No."
 shadowdreamer.12.t:0 "Caves of the Cave Trolls"
 shadowdreamer.12.d:0 "A recent boom in population has left the troll communities of our realm overcrowded. Troll overcrowding is an extremely dangerous thing, and not just for the trolls. Representatives from their communities suggest that we could grant them further lands across the southern caves, allowing them to continue to grow in population and prosperity."
 shadowdreamer.12.a:0 "Let them be fruitful and multiply."
 shadowdreamer.12.b:0 "And strip those hard-won lands from their current orcish inhabitants? No."
 shadowdreamer.13.t:0 "Revenge?"
 shadowdreamer.13.d:0 "The orcs of Skewered Drake once cast out the first Great Dreamer. They did so because they did not believe in the truth Dookan had shown him. Now, they have fallen to the Crusade, and this has been proof enough of the legitimacy of our faith to turn the majority of these cousins of ours to our side. Their leaders, though, are something of a special case.\n \nDo we avenge that first slight against our late leader, and put these fools to the axe? Should we give them a taste of his punishment, and put them into exile? Or do we show mercy and incorporate them into our ranks, as the Dream is for all orcs?"
 shadowdreamer.13.a:0 "The axe is the only answer for enemies of the Dream."
 shadowdreamer.13.b:0 "Let them wander in the dark as Zog did."
 shadowdreamer.13.c:0 "The Dream is for us all."
 shadowdreamer.14.t:0 "The Old Drakons"
 shadowdreamer.14.d:0 "The Skewered Drake had a special relationship with the Drakons of the caves. Violent, powerful, monstrous beasts, they make for incredible mounts if you can master them.\n \nWhen we conquered their clan, we didn’t wipe out the beasts, and that leaves us with an opportunity. Either we can use them to train our own soldiers and set squads to spar with the monsters in pits, or simply allow the warriors of Skewered Drake to serve us in their own way, keeping their monster-riding traditions alive in service of the crusade."
 shadowdreamer.14.a:0 "I want to fight one first, fetch my gear!"
 shadowdreamer.14.b:0 "Let the beast-riders join us!"
 shadowdreamer.15.t:0 "An Orcish Hold"
 shadowdreamer.15.d:0 "Marshal Gut Dwarfeater stood above his assembled force of laborers, one boot on the neck of a decapitated statue of some millennia-dead dwarf king. With his arms crossed and a tusky smile, he watched as they picked over an immense pile of treasures and knick-knacks. A just reward for a long, hard job well done.\n \nAcross the hold of Gor Ozumbrog, every single doorway had been systematically widened. Beds built for dwarves had been removed and replaced, usually sold to goblins who could actually use them. Cooking pits were dug. Mausoleums and shrines were emptied and repurposed. Once all of that was done, they set to the hardest part of the work, tearing down and annihilating every dwarven statue, icon, and symbol in the hold.\n \nAnd now it was done, and Gut was giving rations and approving or forbidding his workers’ choices of loot. He could not help but smile as the dream of his old friend and mentor, Zog, began to come true before his very eyes."
 shadowdreamer.15.a:0 "Gor Ozumbrog is an Orcish Hold!"
 shadowdreamer.17.t:0 "Mithril Seeding Completed"
 shadowdreamer.17.d:0 "Hey, you shouldnt be seeing this event! (Unless using the console)"
 shadowdreamer.17.a:0 "Oops!"
 shadowdreamer.18.t:0 "Dreams of Innovation"
 shadowdreamer.18.d:0 "Azdal Coinbiter stood with his hands on his hips, proudly lording over a table of his thinktank’s inventions. His mouth full of gold teeth glimmered in the light of a self-lighting torch, and various knick-knacks spun or jumped or blinked as the Great Dreamer looked over them.\n \n“They are certainly… interesting.” The Great Dreamer murmured. “I don’t see how some of them could possibly aid in the crusade, though.”\n \nAzdal smiled even broader. “Oh, my Dreamer. This is only our sample stock! We can create whotzits and thingamabobs to assist your marching armies, your coin-pinchers, your diplomats, or even your lady-friends! I assure you.” The goblin bowed deeply as he finished speaking.\n \nThe assembled Drahmgall scoffed and muttered from the rear of the room, but it was for the Great Dreamer to decide."
 shadowdreamer.18.a:0 "Perhaps this is a good idea. Let us adopt the artificers."
 shadowdreamer.18.b:0 "We cannot trust these doohickeys."
 shadowdreamer.19.d:0 "“They call it the next step in Dreamforging, Great Dreamer.” The officer gestured to the table full of gadgets after removing the cloth that covered them.\n \nA few of them had obvious purposes. A brace for the arm that could hold another gizmo or strengthen the arm overall. A pair of boots with wings on the sides. Yet, most of these objects were utterly unfamiliar to the Great Dreamer.\n \nAfter a long conversation with the “artificers” who had brought these inventions to the Drahmgall’s attention, he at least understood what most of them did—and that the variety and specialty was more the point than any one item’s particular value."
 shadowdreamer.20.t:0 "The Long Forgotten"
 shadowdreamer.20.d:0 "Once more visions draw us to the darkest depths of a hold. This time, though, it is to the west, not east. The site in these dreams is unquestionably Hul Jorkad."
 shadowdreamer.20.a:0 "What mysteries lay beneath that labyrinth of leaky pipes?"
 shadowdreamer.21.t:0 "Artificers Done Studying"
 shadowdreamer.21.d:0 "Hey, you shouldnt be seeing this event! (Unless using the console)"
 shadowdreamer.21.a:0 "Oops!"
 shadowdreamer.22.t:0 "Mages Done Studying"
 shadowdreamer.22.d:0 "Hey, you shouldnt be seeing this event! (Unless using the console)"
 shadowdreamer.22.a:0 "Oops!"
 shadowdreamer.23.t:0 "The Expedition"
 shadowdreamer.23.d:0 "The Great Dreamer tried to do as his predecessors had done, and follow the whispers of the Dream into the deepest dark beneath the old hold. It became clear after months of wandering that this strategy would not bear fruit here. The whispering has fallen quiet beneath Hul Jorkad, and the swirling tunnels and ruined halls sprawl further and deeper than we have ever seen before.\n \nInstead, the Great Dreamer has seen to the creation of squads who can fan out and systematically map the whole labyrinth. These parties will be led by veteran officers of the Sagah, and include skilled spelunkers and particularly sensitive Drahmgall initiates.\n \nThey will delve into that network of ancient pipes, tunnels, halls, and mysteries, and find the way down."
 shadowdreamer.23.a:0 "It might take years, but we will leave no stone unturned!"
 shadowdreamer.24.t:0 "The Lab"
 shadowdreamer.24.d:0 "Years of dungeoneering has finally turned up results.\n \nHidden beneath a pile of rubble, one of the spelunker teams discovered a door of unusual design. Behind it, an ancient laboratory filled with all manner of wonders.\n \nThe Great Dreamer came to see it, and though he was shut in all alone in the dark for a time, he had no great vision or revelation. Even so, this is a discovery worth celebrating! The team who found it will be richly rewarded, and our best and brightest are digging into the dusty notes and tables of equipment to see what can be learned.\n \nThe bulk of the material seems to be medical in nature, and far beyond our modern level of development. Whoever worked in this lab seemed to have a strong interest in the relationships between biology and transmutation magic. Perhaps we will find some ancient technique for grafting limbs onto those wounded by war? Or maybe a better way to deal with blood loss? A cure for the Cannorian Cold?"
 shadowdreamer.24.a:0 "Any such discovery could be miraculous!"
 shadowdreamer.25.t:0 "The Abomination"
 shadowdreamer.25.d:0 "The documents were sorted and catalogued neatly. Chemicals had been tested, labeled, and stored in stable containers. The lab was well on its way to being restored when a second door was uncovered.\n \nExcited scientists ordered the rubble cleared and the door pried open. What could lay beyond? Already this lab had yielded advancements in several important fields, so any further knowledge would be welcomed with open arms.\n \nPens. Behind steel bars along both walls of a grid of walkways, there were pens with troughs for food and water. Many were empty, but equally many contained skeletons or desiccated remains. Some were determined to be goblins, a few were obviously ogres. A couple were unmistakably the corpses of elves. The deeper the scientists looked, the less recognizable and more mangled they were. Some had the wrong limbs or misshapen bones.\n \nThen there was another door, this one already off of its hinges. Within the dark room there were tall, glass cylinders filled with some opaque fluid. One by one, the team shone a light through each.\n \n“Empty. Empty. Some kind of embryo. A goblin. An elf’s head. An… that can’t be right, get some more light over here.”"
 shadowdreamer.25.a:0 "Is that an Orc in there?"
 shadowdreamer.26.t:0 "The Theory"
 shadowdreamer.26.d:0 "Adul Dogskull held up his hands patiently as yet another argument broke out in the assembly hall. He and his team had worked hard to see this project through to a completely objective conclusion, and he would not allow himself to be swayed by dogmatic gripes. This was a scientific matter—and besides, he didn’t feel that it flew in the face of conventional wisdom about how Dookan had created the orcs for their purpose. They’d just mistaken exactly who Dookan had been.\n \nFinally, the din died down, and he spoke again. “As I was saying, all of our discoveries and notes can be read in our manuscript. Copies will be handed out after the conference concludes. That book contains the reconstructed experiment documentation of an ancient elf named Doo… Ducaniel. He was the being that created the orcs in a lab deep beneath Hul Jorkad.”\n \nA bottle flew from across the room and shattered against the podium. Jeers and curses came from all directions, and a guard grabbed Adul’s shoulder and escorted him from the stage.\n \nWeeks later, as the book had made its way through the nation’s various institutions, the outrage died down and a strange resolve took its place. There would always be crackpots trying to stir things up in Hul Jorkad, and there would always need to be guards protecting that old lab, but the orcs as a whole learned to accept the change in their understanding of history.\n \nMaybe they were made out of meat and magic in a lab, rather than from dust and divinity by a god. Either way, their purpose and the truth of it was the same."
 shadowdreamer.26.a:0 "It is not the strongest or smartest who survives, but the most adaptable."
 shadowdreamer.27.t:0 "A Dream Come True"
 shadowdreamer.27.d:0 "On the walls of Khugdihr, Zog Lightwalker stood and looked down into the valley towards Escann. He stretched in the morning sunlight, shifting the plates of his mithril armor slightly to unbunch his uniform shirt beneath. The captain would be there to oversee the changing of the guard soon, and he’d finally get to go home and go to bed.\n \nIn a jade mine just outside Gronstunad, Zur Greenfist carefully adjusted a chalk line on a huge slab of precious jade that would become a beautiful statue some weeks from now. He checked his math one more time before sitting his tools down and wiping the sweat from his brow. Idly, as he munched away on his lunch, he wondered if he’d ever save up enough to have a small statue in his own home.\n \nCresting a dune somewhere due south of Azka-Sur, Grod Mithrilbloom marched along with a regiment of mercenaries. Most of them had been pleasant enough folk, and they appreciated him for his discipline and skill with the cannons. He’d enjoyed the job these last few months, and earned a nice sum to send back to his family, but increasingly he missed the echoing halls of home.\n \nIn Gor Ozumbrog, the Great Dreamer sat in a comfortable seat overlooking a carved relief of the continent. There were gemstones studding the mountainsides, one for each hold that had come to be home to the Orcs. A smile crept across the prophet’s face as he took in the sight, and then closed his eyes. A vision appeared through the usual veil of shadows. He waited until he saw it clearly and then opened his eyes to see the map again.\n \n“Yes,” he said with a sigh. “Just exactly the same.”"
 shadowdreamer.27.a:0 "Thanks for Dreaming!"
 shadowdreamer.28.t:0 "Echoes in the deep"
 shadowdreamer.28.d:0 "The Drahmgall have brought troubling, yet promising news from the outskirts. Among the residents of the Northern caves, there are rumors of a place known to locals as “Xazor’s Pit.” It is a vast chasm, plunging far lower than even the deepest mines in the area. Few dare approach its edges, and fewer still dare to descend into its lightless depths. However, recently there have been many disappearances around this chasm, enough even to draw the attention of the Drahmgall.\n \nScouts sent to investigate the area returned with unsettling reports. The pit itself is actually a massive tear in the stone, with depths that vanish far into the unknown. The air around it is thick with the smell of damp rock, and something far older.\n \nThe Drahmgall claim this pit is home to something truly ancient. A great bat-like beast, a creature said to dwell within the farthest reaches of this pit, only rarely emerging to hunt along the surrounding tunnels. It is this creature they believe to be responsible for the recent disappearances.\n \nYet what makes this even more remarkable is their claim that this pit—and the beast itself—are both steeped with a power almost identical to Drahm'otash. If this is true, the implications would be extraordinary. The remains of such a creature may carry enough power to serve as the foundation for cultivating an entirely new reserve of Dreamforged Mithril. A single hunt could provide resources far beyond anything our forges have yet produced.\n \nOf course, this hunt would not come without risk. The pit of Xazor lies far below any safe passage, and the creature that dwells within has ruled these depths for untold years. Descending into the chasm would mean entering the beast’s domain, where escape would be nearly impossible should the hunt go poorly. Yet this possibility is too great to ignore. If the Drahmgall are correct, a source of great power lies in the depths below.\n \nThe only question is, are we ready?"
 shadowdreamer.28.a:0 "Now is the time."
 shadowdreamer.28.b:0 "We do not have the men to spare for this."
 shadowdreamer.29.t:0 "Who shall we have lead the descent?"
 shadowdreamer.29.d:0 "With preparations for the expedition already underway, the attention now must turn to the question of leadership. The descent into the pit will not be easy, the caverns are treacherous, and the beast is said to be powerful beyond anything we have faced before. Whoever leads this expedition will have to be ready to face the Great Bat head on.\n \nAmong our great host several have already stepped forward. Some within our nation suggest a goblin chieftain would be ideal for the role, with their unrivalled skills in navigation of the sprawling caverns. Others suggest a troll warlord would be better suited, and with their natural strength and towering stance it is not difficult to understand why.\n \nHowever, many also argue that this role is far too important to entrust to any other than the great Dream Sage himself. If this creature truly harbors the power of the Drahm'otash, then the one to slay it must be the chosen of the Dream.\n \nThe choice must be made soon. Who would be best suited for the hunt?"
 shadowdreamer.29.a:0 "The goblins shall return with great wealth."
 shadowdreamer.29.b:0 "The trolls shall bring much needed strength to our hunt."
 shadowdreamer.29.c:0 "This is a job suited to one with the Dream. I shall lead it myself."
 shadowdreamer.29.e:0 "Go back."
 shadowdreamer.30.t:0 "How many shall descend?"
 shadowdreamer.30.d:0 "With a leader chosen and preparations nearing completion, the final question is of the scale.\n \nDescending into Xazor’s Pit will be no small undertaking. The caverns are narrow and unstable, their depths unexplored and filled with a darkness still unknown to most orcs. Slaying the beast will require countless warriors marching into the darkness, many of whom may not return. The question therefore stands: how many can we spare? \n \nA smaller force would be cheaper to supply and organise, allowing us to focus our main forces elsewhere, but it would pose a great burden on those who descend.\n \nA larger force, however, would provide a much greater chance to slay the bat. Tens of thousands of warriors descending together would leave little doubt of victory; yet, this would be a much more expensive investment, potentially drawing our forces away from where they may be needed.\n \nThe decision lies now with the Great Dreamer. How many shall descend?"
 shadowdreamer.30.a:0 "Send a small hunting force."
 shadowdreamer.30.b:0 "Send a sizeable warband."
 shadowdreamer.30.c:0 "Send a great host."
 shadowdreamer.30.e:0 "Spare no expense."
 shadowdreamer.30.f:0 "Go back."
 shadowdreamer.31.t:0 "The Descent"
 shadowdreamer.31.d:0 "As the hunt descends into the Pit of Xazor, the caverns become unnaturally still. Even the sound of marching boots seems swallowed by the endless darkness below.\n \nThen the echoes begin. At first they seem harmless, distant voices bouncing from stone to stone, whispering undecipherable words. Yet, soon these words became clear. Names are being called. Names of soldiers within our host.\n \nAfter hours of marching, shapes begin to stir along the walls and ceilings above our host, Grotesque, bat-like humanoids cling to the stone, their limbs twisted and wings ragged with age. Their eyes are empty, yet their mouths move with a terrifying familiarity… they speak with the voices they have stolen.\n \nThe Drahmgall believe these creatures were once explorers, hunters, and civilians who ventured too close to the pit and never returned. Over time, Xazor twisted them into something else entirely.\n \nThey serve the beast."
 shadowdreamer.31.a:0 "Let us hope we may pass by."
 shadowdreamer.32.t:0 "Ambushed in the deep"
 shadowdreamer.32.d:0 "The echoes grow louder.\n \nIn place of what was once voices is now something much worse. Screams.\n \nFrom cracks in the stone, the creatures pour forth in a shrieking tide. Their wings beat wildly against the cavern walls as they descend upon us, twisted mouths mimicking our commands.\n \n“Hold the line!”\n“Retreat!”\n“Behind you!”\n \nStolen voices echo throughout the darkness, sowing confusion as they tear into our host. Steel crashes against claw in a terrible ambush. We were not prepared for this."
 shadowdreamer.32.a:0 "And so, we fall."
 shadowdreamer.32.b:0 "We must push on despite our losses."
 shadowdreamer.33.t:0 "Unnerving Silence"
 shadowdreamer.33.d:0 "The tunnels open into a vast chamber, the darkness stretching far beyond the reach of our torches. The echoes which once followed us now slowly fade into the distance, swallowed by the caverns. We venture on, yet nothing happens. No shrieking wings, no more twisted shapes, nothing. The host stops, listening for the slightest sound of movement, but the only sound that answers is the slow, distant drip of water somewhere far in the dark.\n \nThe silence starts to grow heavy. Every shadow seems to twist just beyond sight. Every distant echo sets the soldiers’ nerves on edge as they tighten their grips on their weapons.\n \nPerhaps Xazor is yet to notice us.\n \nOr perhaps it has, and is preparing for something much worse."
 shadowdreamer.33.a:0 "We must move quickly."
 shadowdreamer.34.t:0 "Sleeping in the Dark"
 shadowdreamer.34.d:0 "Deep within the caverns, the voices finally grow silent. As the host advances through the darkness, torchlight illuminates the cavern above… and what clings to it.\n \nHundreds of the bat-like creatures cling to the ceiling, twisted bodies folded into themselves. The host freezes beneath these creatures. A single noise could lead to disaster, but for now, they sleep.\n \nAgainst all odds, we have stumbled upon these creatures unaware. Fortune, it seems, has favoured us today.\n \nIf we move quickly, and quietly, we may be able to slay this threat before it even has a chance to realise."
 shadowdreamer.34.a:0 "Slaughter them in their sleep."
 shadowdreamer.35.t:0 "The Battle Begins"
 shadowdreamer.35.d:0 "The tunnels open up into a vast, lightless chamber. The air grows hot and still, heavy with the stink of death and decay. For a moment, nothing moves.\n \nThen comes the sound.\n \nA slow, deliberate scrape of claws against stone, echoing from somewhere far above. Xazor.\n \nThe Great Bat descends, and as she does, it appears as if the entire pit descends with her.\nSlowly, from the darkness, she unfurls her vast wings. Torn membranes stretch between her jagged limbs, while her body twists with unnatural strength. And her eyes… they burn like embers in the void, fixing upon the intruders who have dared to descend into her domain.\n \nIt is too large, too ancient, no such creature should possibly be able to exist, not in this darkness, not in these depths, surrounded by such little life. How it endured here, how it was even created is beyond our understanding. This creature defies all reason. Yet, that is not important, for all that matters now is survival.\n \nHer minions scatter at first, fleeing into the cavern walls as their master reveals herself. But then… then comes the shriek. A deafening, piercing scared that tears through the cavern, and chills to the bone. From every shadow and every unseen hollow, the creatures answer.\n \nWings beat against the darkness as the bat-like creatures surge out from the abyss, gathering behind Xazor in a churning mass of claw and flesh.\n \nThere is no more hiding, no more waiting. This is it. The hunt has reached its end.\n"
 shadowdreamer.35.a:0 "Now begins the slaughter."
 shadowdreamer.36.t:0 "Silence in the pit."
 shadowdreamer.36.d:0 "This was never even a fight.\n \nFrom the moment the battle began, the outcome was already decided. Xazor descends upon the host with vast, unrelenting force.\n \nOur line breaks immediately and formations collapse in the darkness as wings flood the chamber, blotting out what little light remains. Orders are shouted and then lost, swallowed by echoes that mock them back in familiar voices.\n \nOur steel finds flesh, but not enough. The swarm tears through our host, dragging warriors deeper into the cave, never to be seen again. Our troops are disorganised and lines broken. One by one, the lights go out.\n \nTorches fall, voices fade, and the echoes grow quiet.\n \nBy the time silence returns to the pit, nothing remains of the hunt but scattered bodies and broken weapons."
 shadowdreamer.36.a:0 "The beast wins… for now."
 shadowdreamer.37.t:0 "Stalemate"
 shadowdreamer.37.d:0 "For a time, it seems as though the pit will claim us. The swarm attacks without pause. Xazor moves through the darkness as a force of nature, striking, vanishing, and striking yet again. Slowly, our forces are driven further back against the wall. Yet we do not break.\n \nAs all seems lost, and our formation begins to crumble, something finally changes. Our weapons finally find their mark. A great cry tears through the cavern as a blade bites deep into Xazor’s left wing. The membrane splits, and thick, black ichor spills across the stone below, hissing as it strikes the ground.\n \nFor the first time, she falters. And our host seizes the chance, surging forwards towards the beast in an effort to end this once and for all. Yet it is not enough. With a furious beat of her wounded wings, Xazor tears herself free from the fight, the force of her retreat extinguishing torches and leaving only darkness behind.\n \nThe formation lies in ruin. The ground is thick with the fallen. What remains of the host gathers slowly, dragging the wounded and counting the few survivors. Victory was within reach, but it does not come to us today.\n \nYet, something has changed. Xazor Bleeds.\n \nThis creature is no untouchable horror of the deep. She can hurt. And now, she will remember us."
 shadowdreamer.37.a:0 "We will be back."
 shadowdreamer.38.t:0 "The beast falls"
 shadowdreamer.38.d:0 "The battle grinds on as steel meets claw in a storm of motion, the cavern thick with blood and heat. Orc and beast alike fall in droves, yet neither side yields. There is no retreat for us.\n \nXazor tears through our host with relentless force, but she bleeds. Each strike draws more of that dark ichor. This beast, which once appeared unassailable, is now finally within our grasp. Our lines hold, landing blow after blow, yet Xazor still persists.\n \nThe swarm begins to lose cohesion, their attacks breaking into scattered desperation as their master begins to falter.\n \nAnd then, at last the moment comes. A final surge. A final strike.\n \nXazor tumbles to the ground with a thunderous crash, and in an instant the echoes that filled the pit are gone, replaced by the cheers of Orcs.\n \nAs the dust settles the remaining warriors watch as the minions unravel, their twisted forms breaking apart into ash which scatters across the floor of the pit. When the last of the minions have dissipated, even Xazor’s corpse begins to fade, dissolving into a pool of thick, tainted ichor that seeps deep into the stone below. Dark veins spread across the pit, as if the stone itself drinks it in.\n \nThe pit of Xazor is quiet now. Whatever once ruled these depths and watched from the dark has finally been unmade."
 shadowdreamer.38.a:0 "The hunt is complete."

 

