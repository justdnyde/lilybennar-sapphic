 dreamfire_desc:0 "Drahm'otash is a measure of the nation’s commitment to the dream crusade, and to the reclaiming of the Serpentspine from the dwarves.\n \nCan be gained by: \n §G+15§! for damaging a Dwarven Hold. \n §G+5§! for Purging a Dwarven population. \n §G+2§! when a Dwarven population flees from a purge. \n §G+0.5§! monthly from being at war with a Dwarven country. \n When at 95 or more §YDrahm'otash§! we will plunder Dwarven Holds much faster."
