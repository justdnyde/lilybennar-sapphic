 dreamfire:0 "Drahm'otash"
 and_shadowdreamer_dreamfire:0 "Drahm'otash"
 anb_shadowdreamer_ignite_dreamfire:0 "Ignite the Drahm'otash"
 anb_shadowdreamer_ignite_dreamfire_desc:0 "Call upon all those who believe in the Dream! Their zeal, focused and honed, makes every sword blow and cannon blast strike true!"
 anb_shadowdreamer_reinforce_dream:0 "Reinforce the Dream"
 anb_shadowdreamer_reinforce_dream_desc:0 "Enforce the purity of the Dream! Hunt down remaining pockets of dwarves in the lands we control, and dig up any remaining scrap of their heathen culture to be melted down!"
 anb_shadowdreamer_prophets_vision:0 "Prophets Vision"
 anb_shadowdreamer_prophets_vision_desc:0 "The Great Dreamer’s visions give us purpose. To know that Dookan speaks to us still fills the hearts of every orc with pride and fury!"
 ability_anb_shadowdreamer_dreamfire:0 "§YDrahm'otash§!"
 H83_dream_dominion_reform:0 "Dream Dominion"
 H83_dream_dominion_reform_desc:0 "More than a simple tribe, the Dream Dominion is led by the Great Dreamer in their quest to proclaim a new homeland for the orcs within the Serpentspine."
 estate_drahmgall:0 "Drahmgall"
 H83_dreamfire_crusade_reform:0 "Drahm'otash Crusade"
 H83_dreamfire_crusade_reform_desc:0 "“The orcs have only one true enemy! Though others may stand in our way, each of us was born with a hatred for those wretched creatures deep within our hearts! The only good dwarf is a dead dwarf!”\n- Borlez Beardcutter, to his assembled troops before the launching of a new campaign.\n \nThe Serpentspine is to be the homeland of the Orcs, and the unmarked grave of the dwarves. This is the word of Dookan, as received by the Great Dreamers. If we are to make this place ours and only ours forevermore, first there must be a Crusade to free the very stone from the filth of the dwarf."
 shadowdreamer_dream_crusade_name:0 "Bar-u Drahman"
 shadowdreamer_dream_crusade_name_ADJ:0 "Drahm-u"
 monthly_dreamfire:0 "Monthly Drahm'otash"
