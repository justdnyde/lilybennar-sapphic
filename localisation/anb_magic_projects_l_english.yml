 #Lelanan Loc for To Share the Gift of Life
 lelanan_project_1.desc:0 "§YTo Share the Gift of Life§!\nAs ever more of our population enter into less conventional relationships, it has become increasingly difficult to pay proper worship to Lel's domain of Life. Let us fix this issue not by breaking their Love, but by honouring it! Why should it not be that all may create life together?."
 lelanan_project_1:0 "To Share the Gift of Life"
 lelanan_project_1_lookahead:0 "We shall exhaust all our leads both local and abroad in order to learn how to transform any body to bear life."
 lelanan_project_1.name: "To Share the Gift of Life"
 lelanan_project_1_level: "To Share the Gift of Life Progress"

