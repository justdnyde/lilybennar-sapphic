 magic_project_homunculus.8.t:0 "Homunculus: Fitting in"
 magic_project_homunculus.8.d:0 ""Whatever do you mean, 'Are you made of mud?' I don't ask you if you're made of meat."\n-Suspected Homunculus\n\nMost constructs are created not with the gift of true freedom, but for the want of an intelligent, loyal, and eternal servant. The magical community understands this well, and the commonfolk understand it enough to the extent of comfortable caution--and occasional suspicion. The homunculus, however, is different: it would have the capability to appear identical to a biological [Root.Culture.GetGroupName] if that be so desired.\n\nThere is a natural tendency in the plain folk towards judgement. If they suspected there to be an imposter among us, the uprising would be fierce and unstoppable. Thus conventional logic would suggest we must hide the nature of our creation. Alternatively, we could get ahead of the whole mess--yes, this is a homunculus, so what?"
 magic_project_homunculus.8.a:0 "Go loud. Does it even need to look [Root.Culture.GetGroupName]?"
 magic_project_homunculus.8.b:0 "Stay quiet. No one must know..."
 magic_project_homunculus.8.c:0 "Apologies. You don't get to choose for me."
 magic_project_homunculus.8.e:0 "Are you seeing what I'm seeing? No one will rise up against *this*"
 homunculus_court_unrest:0 "A Homunculus in Court"
 homunculus_no_choose_tt:0 "§TWe don't get to choose for them§!"
 homunculus_no_need_tt:0 "This option is unavailable to us because:\n£no£It would be pointless to try to hide this one."

 magic_project_homunculus.9.t:0 "Homunculus Revealed!"
 
 magic_project_homunculus.10.t:0 "Heir Exposed as Homunculus!"
 magic_project_homunculus.10.d:0 "Whether it be through diplomatic faux pas or hard-hitting evidence, a series of unfortunate events has exposed [Root.Heir.GetName] for what [Root.Heir.GetSheHe] really is: a being made of unnatural means, a being made of alchemy!"
 magic_project_homunculus.10.a:0 "[Root.Heir.GetName] is my heir for good reason."
 magic_project_homunculus.10.b:0 "Disinherit them..."

 magic_project_homunculus.11.t:0 "Ruler Exposed as Homunculus!"
 magic_project_homunculus.11.d:0 ""[Root.Monarch.GetSheHe] is no [Root.Monarch.GetWomanMan], that [Root.Monarch.GetTitle]. It is a freak of nature that should have never existed!"\n\nRumours spread across the country that [Root.Monarch.GetName] is not who [Root.Monarch.GetSheHe] says [Root.Monarch.GetSheHe] is, but is in-fact a homunculus secretly embedded into everyday society!\n\nRebels have risen up in parts of the country demanding [Root.Monarch.GetName]'s abdication, or else."
 magic_project_homunculus.11.a:0 "Oh, I don't think so!"
 magic_project_homunculus.11.b:0 "I hear [neighbor_country.GetName] is lovely this time of year..."

 magic_project_homunculus.12.t:0 "[GetHomunculusConsortName] Exposed as Homunculus!"
 magic_project_homunculus.12.d:0 "People knew that the [Root.Consort.GetTitle] [Root.Consort.GetName]'s perfect looks were too good to be true.\n\nRumours have spread across the court that [Root.Consort.GetName] is in-fact some sort of sick creation made purely for the purpose of pleasing [Root.Monarch.GetName]!"
 magic_project_homunculus.12.dmom:0 "People knew that the [GetHomunculusConsortTitle]'s ageless presence was too good to be true.\n\nRumours have spread across the court that [GetHomunculusConsortSheHe] is in-fact some sort of sick creation of artificial make, whose strange tendencies have infected [Root.Monarch.GetName]!"
 magic_project_homunculus.12.a:0 "Nothing can get in the way of love!"
 magic_project_homunculus.12.b:0 "Er, consort is a strong word... What about 'lover'?"
 magic_project_homunculus.12.c:0 "Oh, um... [GetHomunculusConsortSheHe] wasn't even that important or influential to me. Really."
 homunculus_consort_f_title:0 "Queen-Mother"
 homunculus_consort_m_title:0 "Prince-Father"

 magic_project_homunculus.13.t:0 "Troubles of a Homunculus Courtier"
 magic_project_homunculus.13.d:0 "Certain important individuals as well as large numbers of common folk have begun to suspect one of our closest courtiers is a homunculus. They demand for 'it' to be removed from office!"
 magic_project_homunculus.13.a:0 "Absurd! What's wrong with keeping a homunculus as a courtier, anyway?"
 magic_project_homunculus.13.b:0 "*Jingle away sadly*"

 magic_project_homunculus.14.t:0 "Homunculus Ruler"
 magic_project_homunculus.14.d:0 "Your current ruler is a homunculus, a construct made of pure alchemy. Brilliance distilled in Constructs suffers little natural decay, but in exchange holds no magical potential."
 magic_project_homunculus.14.a:0 "Perhaps we can reconsider the secrecy thing?"
 magic_project_homunculus.14.b:0 "Thus my reign begins."
 homunculus_ruler:0 "Homunculus Ruler"
 ruler_is_homunculus:0 "Ruler is a §YHomunculus§!"
 ruler_is_not_homunculus:0 "Ruler is NOT a §YHomunculus§!"
 heir_is_homunculus:0 "Heir is a §YHomunculus§!"
 heir_is_not_homunculus:0 "Heir is NOT a §YHomunculus§!"

 magic_project_homunculus.15.t:0 "That Youthful Complexion..."
 magic_project_homunculus.15.d:0 "A construct, if cared for properly, will never die. It can persist for centuries or millennia until destroyed, slowly replacing parts of itself as it goes on. In a better world, this would result in a flourishing of self-fashioning, the ability to become someone new within only a few decades or a century. However, the unenlightened times we live in are such that the youthful complexions of homunculi are a natural source for suspicion... a twenty-year-old does not stay as they were for eighty years, after all. As our homunculus passes their hundredth birthday, such questions begin to arise."
 magic_project_homunculus.15.a:0 ""Age" them accordingly. Keep up the charade."
 magic_project_homunculus.15.b:0 "It's just a, uh, youthful complexion..."


