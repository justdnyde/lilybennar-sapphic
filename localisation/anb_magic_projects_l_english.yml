 magic_project_theatre_of_simulacra.15.t:0 "The Theatre of Simulacra, Room of Magic"
 magic_project_theatre_of_simulacra.15.d:0 "The Theatre of Simulacra! Never was there a structure more grand, more magnificent. They say that it was built without masons, without even an architect! They say every play was written by yourself and performed by yourself (with the aid of the research team, permanent residents that they are). It shows another aspect of your personality, another facet of your highly complex being. It is a deeply confusing play, to tell the truth: actors often speak over one another, and there are often multiple conversations on-stage at once. It sometimes isn't clear whether it's a play, a musical, or an opera, or indeed puppet theatre. Think about it too hard at once and your head starts to hurt. Concentrate on just one or two aspects, however, and it seems to make perfect sense."
