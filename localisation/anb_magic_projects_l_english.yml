 #Finishing Event
 magic_project_infrastructure.1.t:0 "New Magical Infrastructure Complete!"
 magic_project_infrastructure.1.d:0 "Magic is of the old world, of the elven homeland long since collapsed. Magic is the way of the aged and the decrepit. Magic is a door in the city of lost things, a worn epitaph commemorating forgotten legends. But it need not be so. Inspired methods of thinking, refurbished or constructed building projects, uncovered ancient secrets and newly founded organizations--today, our [Root.GovernmentName]'s institutions take one shuddering, stumbling step out of the clouded annals of history."
 magic_project_infrastructure.1.a:0 "We rise to face tomorrow!"

 #Radiant Events
 magic_project_infrastructure.100.t:0 "Cracks in the Tower"
 magic_project_infrastructure.100.d:0 "While seeking to improve their main source of magical power, our court mages discovered that the shoddy construction of the previous builders has lead to a series of tiny cracks spreading throughout the foundation of the mage tower. Due to the increase in magical output that we plan for the structure, leaving these cracks unattended could cause some damage to the tower in the long term. We could repair the cracks, but doing so would take time and cause the refurbishment to be delayed."
 magic_project_infrastructure.100.a:0 "It would be prudent to avoid future problems. Fix the cracks!"
 magic_project_infrastructure.100.b:0 "These mages worry too much. Continue as scheduled!"
 magical_infrastructure_mana_leak:0 "Mana Leak"

 magic_project_infrastructure.101.t:0 "Overflowing Ley Line"
 magic_project_infrastructure.101.d:0 "Ley lines, a type of field magic that strengthens spells cast within their boundaries, provide good locations for the construction of mage towers. But like many of the aspects of the art, ley lines are fickle and wont to cause conflict and frustration at uncertain times. Currently, the site of a future mage tower has become affected by a shift in the ley lines, causing the brickwork of the structure to begin to emit a faint azure light. This surge in the power of the ley lines could prove useful to spellcasting within the region, as ley lines are used in a wide variety of different magical traditions. Alternatively, it might behoove us to direct this power towards more immediate concerns."
 magic_project_infrastructure.101.a:0 "Use the power to empower our spells."
 magic_project_infrastructure.101.b:0 "Use the power to accelerate our construction."
 magical_infrastructure_mana_flood:0 "Mana Flood"

 magic_project_infrastructure.102.t:0 "Shoring Up the Wards"
 magic_project_infrastructure.102.d:0 "Wards are a keystone to magical defenses, serving as the first and last line of defense in both mundane and magical warfare. Improving the quality of the wards on our castles and towers is seen as a critical reason to expand our magical prowess, but repeated casting of warding magic on these structures will only serve to weaken them with time, concealing important structural failures better repaired through mundane means. A ruined structure held up by magic alone will see its wards will fade and become ineffective much faster than desired.\n\nThis moment in our nation's history provides a rare opportunity to pause and reconsider, as allowing some of these castle wards to temporarily fail will allow us to rebuild their walls and reinvigorate their wards with new techniques. However, failing to maintain our network of protective magic will leave us vulnerable to future attacks."
 magic_project_infrastructure.102.a:0 "The wards cannot fail--this is non-negotiable"
 magic_project_infrastructure.102.b:0 "We shall rebuild our nation from a stronger foundation!"
 magical_infrastructure_wards_failing:0 "Failing Wards"
 magical_infrastructure_wards_failing_desc:0 "We will not be able to cast new '§YWard§!' spells for the duration of this effect!"

 magic_project_infrastructure.103.t:0 "The Debate of the Schools"
 magic_project_infrastructure.103.desc:0 "As we continue to build upon our magical institutions, the archmages of various magical colleges have come before [Root.Monarch.GetName] while in the middle of a very heated debate with one another. As insults are hurled left and right and the audience chamber is showered with multicoloured sparks, the mages shout their demands for a new school to be built, each favouring his own magical practice. After more rounds of spellslinging, animal summoning, and charm-enforced silent treatments, the [Root.Monarch.GetTitle] finally steps in and ends the debate before someone is turned into a chicken. Stepping forward, [Root.Monarch.GetName] declares a new school will be built for one practice only…"
 magic_project_infrastructure.103.a:0 "The school of Abjuration!"
 magic_project_infrastructure.103.b:0 "The school of Conjuration!"
 magic_project_infrastructure.103.c:0 "The school of Divination!"
 magic_project_infrastructure.103.d:0 "The school of Enchantment!"
 magic_project_infrastructure.103.e:0 "The school of Evocation!"
 magic_project_infrastructure.103.f:0 "The school of Illusion!"
 magic_project_infrastructure.103.g:0 "The school of Necromancy!"
 magic_project_infrastructure.103.h:0 "The school of Transmutation!"

 magic_project_infrastructure.104.t:0 "Mages and the State"
 magic_project_infrastructure.104.d:0 "Magecraft is becoming more intertwined with governance as the aristocracy increasingly shows magical aptitude. With the rise of magical administrators such as [Root.Adm_Advisor.GetName], non-mage government officials have gathered together and begun rallying against mages who serve a role in the administration of [Root.GetName]. Taking advantage of the recent reforms around magical practice in the country, they argue that one of these reforms should be the cessation of magical power from the factors which qualify a candidate for title, lest mages establish an eternal magical dynasty!\n\nTensions have risen as [Root.Adm_Advisor.GetName] and the non-mages continue to argue, and this debate—ultimately pointless bickering for political power—now threatens to destabilize the whole project of magical reform! It is clear that the issue is now too large for [Root.Monarch.GetName] to ignore. In order to avoid a civil catastrophe, a side must be chosen."
 magic_project_infrastructure.104.a:0 "Give our Court Mage over as a scapegoat."
 magic_project_infrastructure.104.b:0 "[Root.Adm_Advisor.GetName] should be empowered to lead our nation more!"
 magic_project_infrastructure.104.c:0 "Everyone here is subject to the [Root.Monarch.GetTitle], and don't you forget it!"

 magic_project_infrastructure.105.t:0 "Magical Trade"
 magic_project_infrastructure.105.d:0 "Trade is a vital lifeline to the future of [Root.GetName], and this is no less true when it comes to magical aptitude. As mages begin to operate more frequently in the dockyards and markets of [Root.GetName], the role of their powers in the economy has come into question.\n\nMagecraft is capable of truly remarkable feats when it comes to moving goods, such as manipulating the wind to allow for swifter trade fleets and summoning familiars to move product through a market square. But magic can also cause distortions in the market, most notably seen when transmutation mages begin to rapidly flood the market with produce. The growing disparity between producers with access to magic and those without has caused uncompetitive practices to skyrocket, leading to a potential economic crisis. The question of how mages should be integrated into economic practice is left up to [Root.Monarch.GetName] to decide."
 magic_project_infrastructure.105.a:0 "Magic needs to be regulated tightly for trade to prosper!"
 magic_project_infrastructure.105.b:0 "Protectionism should be bent towards the advancement of magic!"
 magic_project_infrastructure.105.c:0 "I don't care about this enough, they can sort it out themselves."
 magical_infrastructure_regulated_magic:0 "Regulations on Magic"
 magical_infrastructure_regulated_trade:0 "Regulations on Trade"
 magical_infrastructure_free_trade:0 "The Market Finds a Way"

 magic_project_infrastructure.106.t:0 "Magic in Warfare"
 magic_project_infrastructure.106.d:0 "As with all tools, the use of magic in war has a long and storied history, with countless war magicks being created and utilized to ensure military victory across innumerable campaigns. However, with the rise of magecraft in our state, the generals of our armies have begun to imagine a score of new possibilities in terms of war magic, far beyond the wildest dreams of what was considered possible before magic became more widespread.\n\nSwords wreathed in magical flame, unending in their fiery splendor. Cannon shot reinforced with wards that detonate when impacting a target. Cavalrymen with the speed of the wind, lightning fast in sorties and skirmishes. Our commanders dream of this and more, but other voices in the army warn of dark powers latent within magic. Spells of mass destruction, environmental warfare, and necromancy all dance within the lips of the skeptics, each more sinister than the last. However, skeptics warn that if mages are accepted into wider military roles then soon our nation will be nothing but warmongers and magical supremacists."
 magic_project_infrastructure.106.a:0 "Magical warfare is the way of witch-kings! Pursue other areas."
 magic_project_infrastructure.106.b:0 "Perhaps we can dedicate some resources to pursue this tactic..."
 magic_project_infrastructure.106.c:0 "Magical warfare is the way of witch-kings! Pursue this immediately!"
 magical_infrastructure_no_war_magic:0 "Turn Away From War Magic"
 magical_infrastructure_no_war_magic_desc:0 "We will not be able to cast new §YWar Magic§! for the duration of this effect!"
 magical_infrastructure_war_magic:0 "Experimental War Magic"

 magic_project_infrastructure.107.t:0 "The Search for Magic Artifacts"
 magic_project_infrastructure.107.d:0 "The reinforcement of magical infrastructure has progressed well enough with our current tools, but of late progress has become increasingly difficult. Magic is temperamental, and trying to shape it without the proper tools is both cumbersome and dangerous. The mages in the court have made themselves clear; in order to proceed, magical artifacts designed to channel latent mana must be created, discovered, or both. These artifacts do not come cheap, and are closely guarded treasures by any who hold them. Getting one is difficult, getting enough to outfit a whole estate will be daunting. But if we do not, we face a delay which will set us back months of progress."
 magic_project_infrastructure.107.a:0 "We simply can't risk the integrity of our supplies!"
 magic_project_infrastructure.107.b:0 "Very well, make a limited diversion"
 magic_project_infrastructure.107.c:0 "Make a large diversion--investing in the future is our top priority!"
 magical_infrastructure_lost_trade_goods_small:0 "Limited Diversion"
 magical_infrastructure_lost_trade_goods_big:0 "Significant Diversion"

 magic_project_infrastructure.108.t:0 "Outlaw Mages"
 magic_project_infrastructure.108.d:0 "The expansion of magical networks throughout [Root.GetName] has allowed for magic to become more accessible to those within the nobility and lower class alike. This in turn has made it easier for those who hold ill intentions to sneak into mage towers and guild halls to steal powerful artifacts they do not understand, or access old spellbooks which give them power they cannot control. Security of these items is important to ensure that they cannot be used by those who mean to cause harm, but restriction of these resources will cause progress in improving the infrastructure to be delayed as access becomes more difficult."
 magic_project_infrastructure.108.a:0 "Progress must come with security."
 magic_project_infrastructure.108.b:0 "We must work towards a future where even the outlaws will be well-educated!"

 magic_project_infrastructure.109.t:0 "Damestear Drought"
 magic_project_infrastructure.109.d:0 "Magic is fickle, and the superstitious say it punishes more than it gives--the price is always greater than the prize. Such a price must today be paid in [Root.GetName], as the ambient magical energy usually intrinsic to the land has been noticeably drained. Court mages report that their spellcasting abilities have been dampened by the constant demand for assistance with constructing towers and other magical buildings, sucking up energy from the environs. In order to counteract this effect, large supplies of damestear must be acquired at great cost. Alternately, the [Root.GetMagesName] could push on in their construction efforts, but this could lead to further issues, cascading into one another like dominos."
 magical_infrastructure_magical_consequences:0 "Magical Consequences!"

 magic_project_infrastructure.110.t:0 "The [Root.GetMagesName] and the [Root.GetClergyName]"
 magic_project_infrastructure.110.d:0 "The [Root.GetMagesName] have taken to asserting an increasingly important position within the [Root.GovernmentName] by claiming the right to speak on wider and wider matters, including that of the divine. Outraged, the [Root.GetClergyName] have responded by arguing for their right to speak on matters of magic. The argument stems from the existence of divine magic giving the [Root.GetClergyName] a legitimate claim to being mages themselves, which either means that the [Root.GetMagesName] have authority over the divine or that the [Root.GetClergyName] have authority over the magical.\n\nWe might seek to grant the [Root.GetClergyName] dominion over the [Root.GetMagesName], but the infighting that would ensue could prove to be enormous. Alternatively, the [Root.GetClergyName] can be removed from any decisions pertaining to magical infrastructure, at the risk of profound backlash."
 magic_project_infrastructure.110.a:0 "The time is right for the [Root.GetClergyName] to take precedence."
 magic_project_infrastructure.110.b:0 "The [Root.GetMagesName] are a keystone institution in our nation, and must remain empowered!"

 magic_project_infrastructure.111.t:0 "Magical Roads and Bridges"
 magic_project_infrastructure.111.d:0 "Magic has begun to infuse every aspect of industry within [Root.GetName], including the very roads upon which the people walk. Veins of damestear shoot through the cobblestones, lining the streets with a soft cerulean glow as they snake across [Root.Capital.GetName] like the fingers of a lightning bolt. The [Root.GetMagesName] wish to extend this road network across the land, stitching together our land with latent mana like a grand spiderweb of potential energy. This expansion would greatly assist the infrastructure projects planned within [Root.GetName], but would be exorbitantly expensive to create to the extent the [Root.GetMagesName] desire."
 magic_project_infrastructure.111.a:0 "Damestear in the streets? A bit rich for my tastes!"
 magic_project_infrastructure.111.b:0 "We must seize this opportunity!"

 magic_project_infrastructure.112.t:0 "Magical Scandal"
 magic_project_infrastructure.112.d:0 "With each passing day that the practice of magic continues to advance within [Root.GetName], the activity of [Root.Capital.GetName] becomes more and more inscrutable to a normal citizen. However, even with the ability to create matter from nothing and level entire cities with a thought, one cannot escape from the human urge to lie.\n\nThis urge has struck [Root.Adm_Advisor.GetName], who has been caught hoarding stockpiles of damestear for personal use. Caches of damestear like those currently being squirreled away by the magical elite are of great importance to our larger projects, and their hoarding in this fashion is tantamount to treason... or at least piracy and malversation. The caches could be confiscated and the mages punished accordingly, but this would anger the rest of the court and cause tensions between the magical and the mundane to increase."
 magic_project_infrastructure.112.a:0 "We have no choice but to bury the report"
 magic_project_infrastructure.112.b:0 "Fire [Root.Adm_Advisor.GetName] and seize [Root.Adm_Advisor.GetHerHis] assets!"

 magic_project_infrastructure.113.t:0 "Unregulated Advancement: Citizen Outcry"
 magic_project_infrastructure.113.d:0 "Magical progress is sometimes hard fought, and many people of lesser intellect or magical skill will often see the pushing of boundaries as dangerous or unethical, even when they do not understand the goal of the overall project. Such an unwashed crowd has gathered in [Root.Capital.GetName] to demand the end to construction efforts on their land. They rant of villages demolished to make way for the spires of the court mages, soldiers used for experimental war magics gone awry, merchants and hawkers who were muscled out of their trade by mass Transmutation: each person believes their complaints to be valid, and they are all very angry. Acquiescing to these demands would lessen their ire, but ambition rarely waits for those too small to see the light."
 magic_project_infrastructure.113.a:0 "The needs of the [Root.GovernmentName] outweigh the needs of the many!"
 magic_project_infrastructure.113.b:0 "The people's voices are heard..."

 magic_project_infrastructure.114.t:0 "Unregulated Advancement: Magical Negligence"
 magic_project_infrastructure.114.d:0 "Magic is a wild and dangerous beast, difficult to control at the best of times and apocalyptic at the worst. From time to time, accidents occur in which innocent bystanders are injured or killed. This morning,  the body of a servant was found reduced to cinders in the mage quarter of [Root.Capital.GetName], only identifiable by scraps of clothing and charred remains. An outspoken proponent of anti-magic doctrine has caught wind of the scandal, and has threatened to release the information to the public and bring the truth of our perceived crimes to light. While obviously founded on lies, those who believe the insanity are quite wealthy, and losing their support will cause the project to be considerably delayed."
 magic_project_infrastructure.114.a:0 "Kill him. Kill him now."
 magic_project_infrastructure.114.b:0 "We will take responsibility for our actions, and make amends."

 magic_project_infrastructure.115.t:0 "Unregulated Advancement: Administrative Issues"
 magic_project_infrastructure.115.d:0 "As magic becomes more prominent in [Root.GetName], it has grown obvious that those without magical abilities are unfit to govern in any capacity. To create laws and regulations for something, it must first be understood, and how could the mundane citizens of [Root.GetName] ever understand something they will never grasp in their lifetime? Magic is a fact of life for our citizens, and those who cannot engage in such a critical element of our very being must be removed.\n\nReplacing those in court was initially easy enough, but pushback from local leaders and other figures of power has since been fierce. They claim that their removal from their posts is a sign of totalitarian oppression, and that we seek to dominate all aspects of the daily lives of non-magical peons. A ridiculous suggestion, but one that speaks to the hearts of the lowly dissenters who follow them.\n\nNow roving bands of rebellious "marauders" have begun terrorizing magical projects, rendering them unusable under cover of darkness and encouraging the workers to cease operations. Dealing with these home-grown saboteurs could come at great cost and loss of reputation, but ignoring them will surely set us back severely."
 magic_project_infrastructure.115.a:0 "Those who do not ride the chariot of advancement will be crushed by its wheels."
 magic_project_infrastructure.115.b:0 "Right or wrong, they are still our subjects. We will convince them this is for the best."

 magic_project_infrastructure.116.t:0 "Devolution of Magical Organization"
 magic_project_infrastructure.116.d:0 "Our magical organizations, once so highly advanced, have been put under immense strain in light of our push for nationwide magical expansion. Our antiquated systems of bureaucracy simply cannot adequately respond to the need to do more, faster. Regional representatives of the [Root.GetMagesName] organization have taken matters into their own hands, organizing community guilds and creating rules of behavior that vary wildly on a hyperlocal basis. Initial impressions are positive: magical progress is being made on a massive scale, even as central control devolves back into the hands of local elites.\n\nWhile to many this development represents a cutting of red tape, a vocal set of critics warn that what is being done now will take decades to undo. Once we allow power to slip away from [Root.Capital.GetName], we may never see it return. What will we do when, in ten years, we wish to organize the nation's magical corps into a different project? No, they say, we must take action now--and swiftly! Control must be re-established, even if it comes at the cost of immediate progress."
 magic_project_infrastructure.116.a:0 "Let the guilds be re-established, and may our nation flourish!"
 magic_project_infrastructure.116.b:0 "Squeeze the iron gauntlet of the state--remind our representatives whom they represent!"
 EST_VAL_IRON_GAUNTLET_STATE:0 "The Iron Gauntlet of State"

 magic_project_infrastructure.117.t:0 "Unregulated Advancement: Taking State Control"
 magic_project_infrastructure.117.d:0 "The chaos and upheaval of our magical institutions has presented us with an interesting opportunity: for years, our mages have been governed indirectly, through systems of organization besides those of the [Root.GovernmentName]. Yet given that we are currently in the process of promulgating new magical practices, it would be child's play to use this as a way to install permanent representatives of the state in positions of power: giving them the authority to execute orders given by [Root.Capital.GetName]. This would not only hand significant control of our [Root.GetMagesName] to the [Root.GovernmentName], it would enable us to better organize large-scale magical projects in the future.\n\nThere are, of course, dissidents--those who oppose this prospect as a naked power-grab and totally antithetical to the collaborative ideal of [Root.GetName]. But dissidents naturally fall out of power, and a power-hungry core of mages are always ready to take their place. Through them, we may institute a new way of management."
 magic_project_infrastructure.117.a:0 "Regardless of consequence, we must centralize magical power in the [Root.GovernmentName]"
 magic_project_infrastructure.117.b:0 "We must preserve our existing magical institutions."

 ########################
 ### MAGICAL FORTRESS ### Localisation written by JeckintheBox
 ########################

 magical_fortress_project.name:0 "Magical Fortress"
 magical_fortress_project.desc:0 "§YMagical Fortress§!\n§gAll castles with inhabitants of even moderate renown are protected in some way by wards. These are not those. Instead of a simple construction of brick or mud, protecting only what lies within, a Magical Fortress such as this seeks to extend powerful Abjuration charms across the entire [Root.GovernmentName], warding off even the most powerful of magics while consecrating what is inside.\n\nTo some, such a project might seem a self-serving folly. Others would criticize the premise of using magic to divide so completely "us" from "them". You know better. You only seek to protect what is yours from those who would have it, and live splendorously as you do. You have learned well the slogan of empires suffering through the long winter of decline: "Hands off. This here's mine."§!"
 magical_fortress_level:0 "Magical Fortress Progress"
 magical_fortress_lookahead:0 "The Magical Fortress will provide our capital with a permanent '§YWard§!'. Each level will improve the '§YWard§!' spell, and grant us a global modifier.\n\nLevel 1: '§YWard§!' gains §YMaximum Attrition§! and §YAttrition for Enemies§!, §Y[Root.GetName]§! gets §YGlobal Fort Maintenance§!\n\nLevel 2: '§YWard§!' gains a §YFort Level§! and §YLocal Defensiveness§!, §Y[Root.GetName]§! gets §YGlobal Monthly Devastation§!\n\nLevel 3: '§YWard§!' protects provinces from §YSiege Magic§!, §YMage Towers§! get §G+1§! Possible Number of Manufactories"

 studying_magical_fortress_mod:0 "Magical Fortress: The Costs of Construction"
 magical_fortress_take_setback:0 "§RThe [Root.Monarch.GetTitle]'s vision requires sacrifice!§!"

 magic_project_magical_fortress.1.t:0 "Magical Fortress: Surveying the Land"
 magic_project_magical_fortress.1.d:0 "You have been coming out to patrol the lands surrounding [Root.Capital.GetName] for some time now… in all honesty, it has become a daily ritual to walk amongst the common folk and hear them greet their [Root.Monarch.GetTitle]. As you look out at your holdings, you cannot help but dream.\n\nThe lands are sublunary. There is nothing special about them—it is a capital like any other. A city for normal folk—a city as mundane as the folk themselves. But that will change. One day. There will come a time when [Root.Capital.GetName] is anything but ordinary. It will be a cathedral of Abjuration magic, a grand edifice of the arcane. You have imagined it as so, and you have mobilized the [Root.GetMagesName] in response.\n\nThe plans have been drawn up; but plans are just ideas on paper—a dream in your mind for what could be. But as a [Root.Monarch.GetTitle], it is your job to make your dreams manifest. And after all, a scroll is just magic scribbled to a page. It is the power of the practitioner, the honed, perfected practice of magecraft, which makes it real.\n\nAll of this has led you here, to today. At last, it is time to begin. Vast reserves of resources will doubtlessly need to be dedicated to the task. Towns on the periphery will need to be torn down, the land carved, and of course the logistics of transporting both material supplies and the magical equipment necessary to the task cannot be understated in their volume."
 magic_project_magical_fortress.1.a:0 "But that is the price one must pay for the greatest fortress in Halann."

 magic_project_magical_fortress.2.t:0 "Magical Fortress: Talk of the Town"
 magic_project_magical_fortress.2.d:0 "Like magical study, like potionmaking, hell, even like baking a cake: it all begins with the foundations. Even the most arrogant mage or scholar understands this basic principle: Castonath was not built in a day.\n\nBut it is going well. The country has been mobilized to the task. Increased production quotas in our quarries and mines. Increased lumber harvesting. Blacksmiths working around the clock. This fortress will of course be arcane in nature, but the basis of it will lie in the mundane. What comes after—that will be how we transcend the mundane.\n\nThe [Root.GetMagesName] act as architects and directors, sending the laborers here and there. Groups of apprentices work together to hover the large stone blocks and slabs into place, whilst other, more practiced Abjurers and Enchanters reinforce the material with magic. It’s all one big system—and it runs around the clock. \n\nMerchants, travelers, diplomats and the like have (inevitably) ventured past the fortress-hopeful’s grounds. Of course, they do not truly understand what it is… what it is going to be. Still, word has begun to spread. “Have you heard what they’re doing in [Root.Capital.GetName]?” Followed by some irreverent, rambling speculation on the nature of your project.\n\nThey can hazard a guess, but they could never picture its true grandeur in their mind's eye. And without that spectacle, they might as well be blind to the reality of what will one day occupy these grounds. Their minds are simply too small for a dream as big as the one dwelling within [Root.Monarch.GetName].\n\nBut you pay the thought of them little heed. You never cared about keeping a secret, and you have more pressing thoughts to ideate. For instance—how many resources can you afford to dedicate to your shimmering citadel? It is all you think about. Soon, you will have to make that decision. Choices, choices…"
 magic_project_magical_fortress.2.a:0 "Let them bask in the grandiosity of your dream."

 magic_project_magical_fortress.3.t:0 "Magical Fortress: A Question of Pride"
 magic_project_magical_fortress.3.d:0 "Your advisors seem to think that there is a point where practicality is usurped by indulgence. Some would even suggest that the whole project borders on indulgence. You pay the latter little mind, but the former is at least worth considering. There is more to a nation than the castle that holds the throne—perhaps it is unnecessary to invest even more heavily.\n\nAnd yet, [Root.Monarch.GetName] cannot shake the feeling that nothing could be more important than this. The foundations that have been laid are grand, to be sure, but they could still be so much more… You ponder this day in and day out, as you make your daily rounds past the construction site. It has become a ritual for you. \n\nA decision must be made."
 magic_project_magical_fortress.3.a:0 "Rededicate yourself to the (heh) foundations of the project"
 magic_project_magical_fortress.3.b:0 "And why not? Why shouldn't the foundations be even larger?"
 magical_fortress_prestige_mod:0 "Magical Fortress: Revel in Grandiosity"

 magic_project_magical_fortress.4.t:0 "Magical Fortress: Setting the Foundations"
 magic_project_magical_fortress.4.d:0 "It is done. The foundations are laid in their entirety. A massive unbroken chain of stone, wood, and metal lines the grounds of the complex, etched and carved deep into the earth—so great in its design that, should any entity be looking down from above, they would surely notice it. \n\nYou feel a sense of pride swelling within you, but also a sense of anticipation. Ever since the thought of that shimmering, shining citadel came to you, it has been your whole fixation. You have poured over even the finest of details and touched up the schematics time and time again. It all brought you to today—and today is only the beginning."
 magic_project_magical_fortress.4.a:0 "Construction of the castle proper begins now."
 magical_fortress_project_effect_1:0 "§YWard§! now provides the following effects:\nMaximum Attrition: §R+1§!\nAttrition for Enemies: §G+1§!\n"
 magical_fortress_mod_1:0 "Magical Fortress: Foundations of Pride"

 magic_project_magical_fortress.5.t:0 "Magical Fortress: The Structure Takes Shape"
 magic_project_magical_fortress.5.d:0 "It all began with a dream—a whisper in your mind. It was the thought of an impenetrable fortress, etched both into your synapses and into the crust of Halann; her enormity in stark contrast to all that came before, to all that dared to call their sand-castles a fortress. A castle of stone (wood cannot a fortress make) is but target practice for Evocation mages. This is different. This is the first of its kind. Your fortress will be the next step in the evolution of its concept; and all will remember it was you who had her built, brick by brick, spell by spell, invocation by invocation.\n\nYou smile to yourself. Even though the second stage of the construction has only just begun, you know it is closer to reality than it seems. For in your dreams you walk its halls, and from those pure forms would you render the physical.\n\nLost in your own thoughts, you’re brought back to reality as a group of your most clever [Root.GetMagesName] approach. Yet, for men and women of the arcane, the questions they assail you with are entirely pedestrian—but that is alright. You have grown accustomed to the unremarkable minds of unremarkable men. You give them their marching orders, and send them on their way."
 magic_project_magical_fortress.5.a:0 "Now, time to enter your own magical fortress—the one that exists in your mind."

 magic_project_magical_fortress.6.t:0 "Magical Fortress: Walking in Dream"
 magic_project_magical_fortress.6.d:0 "It comes along as it goes along. Every day that passes, time becomes more of a blur to you. You have been sleeping less, your obsession keeping you awake in the long hours of the night. Dusk to dawn is a time for dreaming, but you do not dream—not anymore. No: you live your dreams in the real world, you make them whole.\n\nThe palace proper has been coming along nicely. You spend more of your time on her future grounds than you do in your own court; your family and advisors can handle those trifling matters; you yourself have a higher calling.\n\nThe design of the palace must be exact; for what would the point be in constructing such a marvel, such a veritable fortress of the transmundane, if that which is contained within is banal and plain? There is power in numbers… and there is beauty in them as well. The design must be extravagant: send courtiers to every palace on the continent, count their towers, their gatehouses, the lengths of their battlements, the depth of their moats—your castle must have more than all of them."
 magic_project_magical_fortress.6.a:0 "Nothing you have designed will be second in anything!"

 magic_project_magical_fortress.7.t:0 "Magical Fortress: A Question of Pride"
 magic_project_magical_fortress.7.d:0 "Your advisors seem to think that there is a point where practicality is usurped by indulgence. Some would even suggest that the whole project borders on indulgence. You pay the latter little mind, but the former is at least worth considering. There is more to a nation than the castle that holds the throne—perhaps it is unnecessary to invest even more heavily.\n\nAnd yet, you cannot shake the feeling that nothing could be more important than this. The castle that has been built is grand, to be sure, but it could still be so much more… You ponder this day in and day out, as you make your daily rounds past the construction site. It has become a ritual for you.\n\nA decision must be made."
 magic_project_magical_fortress.7.a:0 "Commit fully to seeing the project through"
 magic_project_magical_fortress.7.b:0 "Commit fully to seeing your vision through"
 magical_fortress_splendor_mod:0 "Magical Fortress: A Supercilious Beauty"

 magic_project_magical_fortress.8.t:0 "Magical Fortress: The Castle Rises"
 magic_project_magical_fortress.8.d:0 "Last night, for the first time in many moons, you slept well. You were at peace. Your mind didn’t race with the endless possibilities—all was quiet. The castle was to be completed by the time you would awake. Of course, you slept on-site. You had a bedroom installed months ago, even as construction was still being completed. The noise never bothered you; you learned to tune it out long ago.\n\nNow, you wake in your completed palace for the first time. It is a feeling of undistilled ecstasy. You roam the grounds, appearing as if in a trance, and take detailed notes of all that you see. You spend nearly two straight days doing this—for that is the scale of your masterpiece.\n\nThe castle has three outer layers—three separate walls that encompass the entirety of the grounds. Each is as well defended as the last, and each sports more towers and gatehouses, more easily defensible positions, and all manner of things in higher quantities than your courtiers could find anywhere else on Halann. The interior of the palace is another manner. It houses everything you could ever possibly need, and more of what you couldn’t. In a world of uncertainties, in a project that has been burdened from the start with the unpredictable nature of trailblazing new ground, one thing has always been certain: this fortress will be all that it ever could have been, a solidity rather than a possibility. You have made sure of it.\n\nYou breathe a sigh of relief as you complete your survey of the very last tower."
 magic_project_magical_fortress.8.a:0 "Now the time has come for the [Root.GetMagesName] to truly get to work."
 magical_fortress_project_effect_2:0 "§YWard§! now provides the following effects:\nFort Level: §G+1§!\nLocal Defensiveness: §G+25.0%§!\n"
 magical_fortress_mod_2:0 "Magical Fortress: Castle of Ego"

 magic_project_magical_fortress.9.t:0 "Magical Fortress: The Abjurers Arrive"
 magic_project_magical_fortress.9.d:0 "The last couple of days have witnessed a veritable procession of mages. From all across the kingdom, they have come in droves; like a flock of ravens roosting in the treeline, they feel endless, and to the common worker who built the castle proper, mysterious—perhaps even scary. Not to you, though. They are tools to you, no different from the stonemasons, and they know their place, because they know what it is they are here for. You have paid them for their time, but you must imagine that the real allure, the true pull as it were, is the chance to be a part of history.\n\nThey work together constructing spells, etching glyphs, outlining barriers and traps and magical battlements. There is always noise on the grounds, and its always accompanied by the loud hum of abjuration magecraft. It drones inside your temples, reverberating in your skull. It’s pleasurable, much like a massage."
 magic_project_magical_fortress.9.a:0 "You can only hope that one day, it will become deafening."

 magic_project_magical_fortress.10.t:0 "Magical Fortress: The Palace Comes Together"
 magic_project_magical_fortress.10.d:0 "90% done. That is what you would estimate. Your shimmering, shining fortress of perfection has nearly reached completion, attained her perfection. All that will remain are the finishing touches; to make sure everything is bound together properly.\n\nYet even in her unfinished state, she is a wonder to behold. And you ponder if something as beautiful as this has ever been created before: in all of Halann’s history, has genius ever borne a fruit like this?\n\nShe gleams with translucent walls like solidified light, pulsing faintly with arcane runes that shift and realign like gears in an invisible mechanism. Each tower is a lattice of force fields, radiating magical energy in hues of sapphire, periwinkle, and pearl. Slits for mages, artillery, and guns hover unsupported in midair, suspended in Abjuration fields that ripple like water when touched, only to spring back into form. The ground all around crackles with a force akin to static, making it clear that no hostile spell could take root within a hundred paces.\n\nBut you haven’t stopped there. Your twenty-four layered Abjuration barriers were far from enough. No, within each wall are nestled three mana siphons. In the gaps between, dozens of conjured ghosts and spirits roam like guard dogs. Across the premises lie thousands of traps, and parts of hallways that suck assailants into self-destructing (and regenerating) demiplanes.\n\nThe finish line is in sight, and you will make sure you witness every moment of it. You will stand and watch as every binding is cast, as every spell is carefully tallied. You will relish every single second of this process—and then maybe, at long last, that hole in your heart will be filled, Finally you will feel whole."
 magic_project_magical_fortress.10.a:0 "We eagerly await the day!"

 magic_project_magical_fortress.11.t:0 "Magical Fortress: A Question of Pride"
 magic_project_magical_fortress.11.d:0 "Your advisors seem to think that there is a point where practicality is usurped by indulgence. Some would even suggest that the whole project borders on indulgence. You pay the latter little mind, but the former is at least worth considering. There is more to a nation than the castle that holds the throne—perhaps it is unnecessary to invest even more heavily.\n\nAnd yet, [Root.Monarch.GetName] cannot shake the feeling that nothing could be more important than this. The spells that have been cast are spectacular, to be sure, but they could be so much greater, more plentiful, more ornate… You ponder this day in and day out, as you make your daily rounds past the construction site. It has become a ritual for you.\n\nA decision must be made."
 magic_project_magical_fortress.11.a:0 "Allow the spells to remain as they are"
 magic_project_magical_fortress.11.b:0 "No! They must be done again! Better!"
 magical_fortress_mana_regen_mod:0 "Magical Fortress: Master of Magics"

 magic_project_magical_fortress.12.t:0 "Magical Fortress: At Long Last!"
 magic_project_magical_fortress.12.d:0 "It is done. At long last, after all the trials and tribulations, it is complete. You expected to feel an ecstasy like no other—you believed this moment would triumph above all others in your life. That was a week ago, and you still feel empty.\n\nMuch like the abjuration barriers themselves, it all feels translucent. You feel hollow. Why, you wondered; why was that? After a week of sleepless nights, you have your answer.\n\nYou have come to realize that all of this was ultimately a project of vanity. Countless souls may die at the gates of this illustrious bastion, but it will never win you wars. In a way, it’s much like a spell—not an Abjuration spell, though. No, an Enchantment. The existence of this castle is a spell in the minds of all, a metonym for the impossible. The simple fact that it exists is proof that maddening dreams can manifest into the real world. All it takes is a maddened individual, with a maddening amount of resources, and a maddening lack of self-reflection. This place is the excess of excess.\n\nYou wonder to yourself, as you sit upon your throne, in the greatest, most impenetrable fortress to ever be constructed, if some things are only tantalizing because they are dreams. The need for what we cannot have is called desire. The need for what is readily at hand is called greed."
 magic_project_magical_fortress.12.a:0 "You are a bucket with a hole inside, that all the water in the ocean won't fill."
 magical_fortress_project_effect_3:0 "§YWard§! now provides the following effects:\nImmunity to §YSiege Magic§!\n\n§YMage Towers§! gain the following effects:\nPossible Number of Manufactories: §G+1§!\n"
 magical_fortress_mod_3:0 "Magical Fortress: Palace of Dreams"
 magical_fortress_mod_3_desc:0 "§YMage Towers§! gain §G+1§! Possible Number of Manufactories"
 magical_fortress_province_mod:0 "Magical Fortress: Aura of Prosperity"

