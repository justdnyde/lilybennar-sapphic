 aotd_skeleton_mod_temp:0 "Army of the Dead: Specializing in Skeletons"
 aotd_revenant_mod_temp:0 "Army of the Dead: Specializing in Revenants"
 aotd_ghoul_mod_temp:0 "Army of the Dead: Specializing in Ghouls"
 aotd_centaur_mod_temp:0 "Army of the Dead: Specializing in Centaurs"

 magic_project_army_of_the_dead.8.t:0 "Army of the Dead: Choice of Evils"
 magic_project_army_of_the_dead.8.desc:0 "Conclusion of testing.\n\nAfter conversion, zombie general proceeded to attempt to "eat the brains" of nearby sentients. We set it loose on a platoon of soldiers; rank broke immediately on sight of first consumption. Great success!\n\nSkeleton general did not shatter their ranks, but lack of rotting flesh around digits left it capable of wielding and firing muskets. Set loose on a platoon of soldiers; difficult to consistently hit from more than sixty paces, owing to its slim profile. Tactical dismantling of the entire platoon from afar ensued. Great Success!\n\nAfter conversion, revenant general stalked and attacked its killer before vanishing into thin air. Revenants appear unviable for use in warfare.\n\nGhoul general was never converted. It is unclear what precisely a ghoul is or how it differs from a zombie. Many fruitless hours spent in archives researching this topic. Ghouls appear unviable for use in warfare."
 aotd_undead_mil_gains_tt:0 "§YUndead Military§! gains the following bonus:"
 racial_mil_until_swap: "until §YRacial Military§! changes"

 magic_project_army_of_the_dead.8.a:0 "Zombies are scary."
 aotd_zombies_pips_tt:0 "Unlock §YZombie§! units. §YZombies§! feature premium §YOffensive and Defensive Morale§!, greater than any other.\n"
 aotd_zombie_mod:0 "Army of the Dead: Specializing in Zombies"

 magic_project_army_of_the_dead.8.b:0 "Skeletons are tactically superior!"
 aotd_skeletons_pips_tt:0 "Unlock §YSkeleton§! units. §YSkeletons§! feature respectable §YOffensive and Defensive Fire§!, and high §YOffensive and Defensive Morale§!\n"
 aotd_skeleton_mod:0 "Army of the Dead: Specializing in Skeletons"

 magic_project_army_of_the_dead.8.c: "Centaur cavalry reigned supreme in life, and shall now do so in death."
 aotd_centaur_pips_tt:0 "Unlock §YZombie Centaur§! units. §YZombie Centaurs§! are exclusively §YCavalry§!, but more powerful than any other §YCavalry§!\n"
 aotd_centaur_mod: "Army of the Dead: Specializing in Centaurs"
 aotd_centaur_mod_initial: "Army of the Dead: Experimenting with Centaurs"

 magic_project_army_of_the_dead.9.t:0 "Army of the Dead: The Value of Recycling"
 magic_project_army_of_the_dead.9.desc:0 "[Root.Monarch.GetName] is having a good evening. Quiet, a comfortable temperature, no panicked advisors bursting through doors, screaming.\n\nA panicked advisor bursts through the door, screaming. “My [Root.Monarch.GetName]! We ran out of corpses!” Apparently, “unlimited” hordes are very much limited by how many people you can successfully throw down a hole. After running through peasants and prisoners, you grow a bit desperate.\n\nThe [Root.Monarch.GetTitle] is about to ask if they've considered children and gnomes yet, but before he can get a word out the court necromancer walks through the door with a proposal: Recycling. See, corpses don’t have to be intact to be reanimated. We can reanimate just a head, or just an arm, just fine. Now an armless undead is among the weaker of our soldiers, but if we just find two spare arms from a different blown up corpse, we can assemble a full undead!\n\nThe court necromancer lays out his plans in great detail. He has brought placards. They are very beautifully made placards, to be sure, but they somewhat obscure the main issue, which is  that no one is sure if this will actually work. But rest assured, the restive man assures, all that’s needed are fifty years, a small fortune in funding, and some volunteers. The more, the better."
 magic_project_army_of_the_dead.9.a:0 "What a splendid idea! Experiment on ALL OF MY MEN."
 magic_project_army_of_the_dead.9.b:0 "What a splendid idea! Experiment on MY CAPITAL."
 magic_project_army_of_the_dead.9.c:0 "What a splendid idea! Experiment on MY FIRSTBORN."
 magic_project_army_of_the_dead.9.d:0 "What a splendid idea! Experiment on THAT DUCK OVER THERE."
 magic_project_army_of_the_dead.9.e:0 "What a splendid idea! Experiment on NOTHING."
 aotd_real_warning_tt:0 "§RThis will actually do what it says.§!"
 aotd_fake_warning_tt:0 "(Which is nothing)"

 magic_project_army_of_the_dead.10.t:0 "Army of the Dead: [Root.Monarch.GetName]"
 magic_project_army_of_the_dead.10.d:0 "[Root.Monarch.GetName] wonders why, for the third time this month, [Root.Monarch.GetSheHe]'s been summoned to the undead experimentation area.\n\nThe last time it was to look at a duck-human hand hybrid undead, which, while entertaining, wasn’t even working correctly; it was just an undead duck with non-functional hands attached. The first time was even worse, because the duck from that time actually killed the mage responsible for the presentation, which is where the hands for the second experiment came from.\n\nWalking into the room (and avoiding the duck the necromancers are now keeping as a pet), the [Root.Monarch.GetTitle] is greeted by an abomination of some kind, a mismatched amalgam of limbs and… another duck, again. Before [Root.Monarch.GetSheHe] can leave, however, one of the mages catches [Root.Monarch.GetHerHis] attention and gives a command to the abomination, which correctly performs it with all of their limbs. Finally! Our invincible, endless undead army is perfect!"
 magic_project_army_of_the_dead.10.a:0 "Actually, [Root.Monarch.GetName] was the creator’s name, not the monster's!"

 magic_project_army_of_the_dead.21.t:0 "Undead Recruits from Battle"
 magic_project_army_of_the_dead.21.d:0 "The army of the dead does not kill, it recruits. An experienced necromancer will tell you that out of every ten deceased littering the battlefield, six or seven will be brutalized to the point of unusability. What this leaves is one in three that are suitable for necromantic purposes. Not every corpse has to be fresh: curiously enough, the heuristic of one in three holds true for both the re-animated corpse and the newly dead.\n\nA recent battle has fielded more potential undead soldiers to join in your unholy ranks. Picking through the unburied bodies, you decimate their population to add to your charnel house."
 magic_project_army_of_the_dead.21.a:0 "Rise!"
 magic_project_army_of_the_dead.21.b:0 "Rise! (But hide undead army pop-ups from now on)"
 magic_spell_raise_undead_tt:0 "Gain §G[Root.raise_undead.GetValue]§! Manpower from reviving the fallen!"

 ##################
 ### HOMUNCULUS ### Localisation by Bonbonny (main project) and previous loc (additional events)
 ##################

 homunculus_project.name:0 "Homunculus"
 homunculus_project.desc:0 "§YHomunculus§!\n§gA homunculus (plural: homunculi) is the ultimate construct, an artificial being brought to life through pure alchemy. Despite taking the idealized form of its creator's race, homunculi neither reproduce nor age, and can only be destroyed through violence.\n\nHomunculi, being constructs, are immune to poison and illness, and are incapable of using magic. Likewise, they can be given encyclopedic knowledge banks and programmed with the most charming of behaviors. Unlike most constructs, however, homunculi are independent beings with their own will and desires.§!"
 homunculus_level:0 "Homunculus Progress"
 homunculus_lookahead:0 "Each level creates a new homunculus of higher quality than the previous, allowing us to choose one of several options:\n\nLevel 1: §YRuler Experience Modifier§! and §YMonarch Starting Spell Levels§!, §YDrill Gain Modifier§!, or §YIdea Cost§!.\n\nLevel 2: A skill §Y5§! heir, a skill §Y5§! consort which provides permanent §YMonarch Skill§! of each category, or a courtier who provides §YMax Absolutism§! and §YHarsh Treatment Cost§!.\nHomunculi are §YImmortal§! and cannot develop negative personalities, but also cannot become §YPowerful Mages§!.\n\nLevel 3: A permanent advisor who provides the bonus of any single advisor of skill §Y1§!."
 homunculus_already_tried:0 "£no£We already tried this option. It didn't work.\n---------------------------"

 magic_project_homunculus.2.t:0 "Homunculus: The Heart of the Matter"
 magic_project_homunculus.2.d:0 ""Every construct must have a power source, something that gives it life. Life, however, is not the same as soul..."\n-Beginner's Guide to Constructs\n\nThe artificers and tinkerers claim: one cannot have something from nothing. One cannot make a soul without a soul. They call it the principle of equivalent exchange. Fools that they are, they fail to understand the power of magic! With our mastery over the transmutative arts, we can create something beyond a simple state of matter: a spark of energy, self-perpetuating, endlessly hungry, extended into an artificial soul-organ. Without it, the homunculus cannot achieve true sentience.\n\nCreating the soul is the most fundamental part of the homunculi process. Mastery of this step will come through trial and error..."
 magic_project_homunculus.2.a:0 "An animal heart would provide a similar base."
 magic_project_homunculus.2.b:0 "A clockwork mechanism, powered by lightning!"
 magic_project_homunculus.2.c:0 "Secure a pure Damestear core."
 studying_homunculus_core_animal:0 "Homunculus: Heart of the Wild"
 studying_homunculus_core_animal_desc:0 "It keeps bleeding. Will someone please fix that?"
 studying_homunculus_core_clockwork:0 "Homunculus: The Gearheart"
 studying_homunculus_core_clockwork_desc:0 "It makes a striking, rhythmic ticking noise. It also costs a fortune to keep running."
 studying_homunculus_core_damestear:0 "Homunculus: Magic Incarnate"
 studying_homunculus_core_damestear_desc:0 "Best not to hang on to this one for too long, it has designs on exploding."

 magic_project_homunculus.3.t:0 "Homunculus: Form and Function"
 magic_project_homunculus.3.desc:0 ""Would you assign a homunculus a religion, as you do a sex? Would it even gain self-knowledge, in the absence of a maker? Tell me, do the clay men dream?"\n-Sister Miriam\n\nThe core is made, but now it must be surrounded. This is no simple matter: not only must the material be sturdy enough to pilot, but the shape of a thing often determines how well it fulfills the function it was assigned. There never was a good sword made of bad steel. Are certain shapes and materials more amenable to containing a soul? Let us proceed..."
 magic_project_homunculus.3.a:0 "The first trick the transmutist learns is turning mud to flesh!"
 magic_project_homunculus.3.b:0 "A carefully carved sculpture should avoid any defects..."
 magic_project_homunculus.3.c:0 "Flesh from flesh. Five hundred bodies boiled to make one. Purity of form."
 magic_project_homunculus.3.d:0 "No... not that. Anything but that."
 studying_homunculus_body_mud:0 "Homunculus: Clay Man"
 studying_homunculus_body_mud_desc:0 "There are noticeably more lumps than you would otherwise expect. There's no room to put the spleen where it normally goes."
 studying_homunculus_body_stone:0 "Homunculus: Galatean"
 studying_homunculus_body_stone_desc:0 "It's beautiful, truly. More beautiful than any natural-born person. Everyone around stops and stares. The work goes slowly."
 studying_homunculus_body_blood:0 "Homunculus: Five Hundred Fathers"
 studying_homunculus_body_blood_desc:0 "They say victory has a thousand fathers. We're getting there."
 
 magic_project_homunculus.4.t:0 "Homunculus: The Tie that Binds"
 magic_project_homunculus.4.d:0 ""Step 1.  Place the Control Heart in the allocated cavity within the clay host's chest\nStep 2.  Ensure the clay host has a clear physical and metaphysical circulatory system after placement\nStep 3.  Drain the intended master's blood into the cavity (up to 1.5 gallons)\nStep 4.  Leave to rest for 20 mins\nStep 5.  Finish off with Gellan's Binding Ritual"\n-Gellan the Architect\n\nIt is actually unclear whether Gellan successfully created a homunculus. It tends to be unclear whether anyone has successfully made a homunculus--what is clear is that a lot of would-be homunculi masters wind up dead, with their creations disappeared into the night. We must ensure the loyalty of our creation, bind it to us body and heart."
 magic_project_homunculus.4.a:0 "Laws. Give it rules to follow, written into the core of its being."
 magic_project_homunculus.4.b:0 "It's just a child. Treat it like one, and it will respond accordingly."
 magic_project_homunculus.4.c:0 "Magic alone can save us. The purest magic."
 studying_homunculus_loyalty_law:0 "Homunculus: By Law and Book"
 studying_homunculus_loyalty_law_desc:0 "Its motives are driven by fundamental laws of logic inscribed upon its very being. Let us hope it is not a good lawyer."
 studying_homunculus_loyalty_child:0 "Homunculus: By Hook and Crook"
 studying_homunculus_loyalty_child_desc:0 "It treats us like its parents. Let's hope that's a good thing."
 studying_homunculus_loyalty_magic:0 "Homunculus: By Magic Alone"
 studying_homunculus_loyalty_magic_desc:0 "Why did we ever try anything else? Gellan's Binding Ritual wasn't entirely off-base, just somewhat... incomplete."
 
 magic_project_homunculus.5.t:0 "Homunculus: Rude"
 magic_project_homunculus.5.d:0 ""Well, at least it can speak. That's a good thing."\n"Honestly, I wish it didn't."\n-Overheard in the research workshop\n\nHELLO. (There is a sound of squelching.) I WAS TOLD TO REPORT TO YOU BY THE RESEARCH TEAM. NO THEY DID NOT COME WITH ME. (There are noises with uncomfortable implications.) EXCUSE ME. THAT IS MY LEFT FEMUR THAT HAS JUST FALLEN OUT. THANK YOU. MUCH OBLIGED.\n\nTHE RESEARCH TEAM DID NOT WANT ME ANYMORE. THEY SAID I PLOTTED THEIR DEMISE. REST ASSURED, I WILL NOT PLOT YOUR DEMISE. (A loud screeching sound.) I WILL NOT TRY TO KILL YOU. (A loud screeching sound.) I WILL NOT KILL YOU. (There is a long pause, as though the homunculus is waiting for something to happen. When nothing does, it continues.) I WAS TOLD YOU WOULD HAVE SOME WORK FOR ME."
 magic_project_homunculus.5.a:0 "Perhaps the [Root.Monarch.GetTitle] could use a research assistant?"
 magic_project_homunculus.5.b:0 "The army can find a use for this one, surely"
 magic_project_homunculus.5.c:0 "Some scholars might desire to study its unique physiology...?"
 homunculus_study:0 "Homunculus: The Thing in the Flask"
 homunculus_study_desc:0 "It promised not to plot your demise."
 homunculus_training:0 "Homunculus: The Amazing Regenerating Training Dummy"
 homunculus_training_desc:0 "The soldiers love it. It hates the soldiers. At least it has a reason now."
 homunculus_operating_theatre:0 "Homunculus: A Permanent Resident of the Operating Theatre"
 homunculus_operating_theatre_desc:0 "Every day a new operation. Examining the layers of mud that comprise a skin. Trying to count the bones. Trying to recount the bones. It hates when they do that."
 
 magic_project_homunculus.6.t:0 "Homunculus: Vivum"
 magic_project_homunculus.6.d:0 ""Oh, new hire? Go and grab a coat, let me show you around the workshop."\n"No, er... I'm not a researcher, I was, well. The project."\n-Overheard in the research workshop\n\nLife is the miracle through which the universe recognizes itself, and there can be no doubt as you look in their eyes that there is something which you deeply, truly recognize. Peering into the ageless depths, you come to understand that for all the wonders of [Root.GetName], or [Root.Capital.GetContinentName], or even all of Halann, nothing is truly strange. It all exists in one accord. Indeed, the only thing unnatural in the whole of the universe is the torturous state of loneliness. You need not be alone, not anymore. This one will make a fine companion."
 magic_project_homunculus.6.a:0 "My... my child... oh, darling."
 magic_project_homunculus.6.b:0 "Keep to me. Stay in my court. Be my eyes and ears."
 magic_project_homunculus.6.c:0 "No one else could be my equal."
 magic_project_homunculus.6.e:0 "Stay by my side in case I need anything."
 magic_project_homunculus.6.f:0 "Remember our words and noble intentions, long after we have forgotten."
 homunculus_eminence_grise:0 "Homunculus: The Éminence Grise"
 homunculus_eminence_grise_desc:0 "Conversations are like a fencing match. En garde. Allez. Jab. Retort. Score. Halt."
 homunculus_constitutional_custodian:0 "Homunculus: The Constitutional Custodian"
 homunculus_constitutional_custodian_desc:0 "It is, emphatically, this one's province and duty to say what the law is."
 homunculus_consort_f:0 "Homunculus: The Mechatriarch"
 homunculus_consort_f_desc:0 "You never doubt for a second that she loves you. How could she possibly do different?"
 homunculus_consort_m:0 "Homunculus: The Patlaboriarch"
 homunculus_consort_m_desc:0 "You never doubt for a second that he loves you. How could he possibly do different?"
 homunculus_consort_f_name:0 "Mechatriarch"
 homunculus_consort_m_name:0 "Patlaboriarch"
 homunculus_attendant:0 "Homunculus: The Magus Attendant"
 homunculi_no_mage_hint_tt:0 "§YHomunculi§! are §Rincapable§! of wielding magic!"
 homunculus_is_male_tt:0 "This version of the §YHomunculus§! is §YMale§!."
 homunculus_is_female_tt:0 "This version of the §YHomunculus§! is §YFemale§!."
 humunculus_lesser_in_union_no_heir_tt:0 "§RWarning!§!\nOur country is ruled by a foreign [Root.Monarch.GetTitle] and a Homunculus cannot become the new [Root.Heir.GetTitle]!"
 humunculus_lesser_in_union_no_consort_tt:0 "§RWarning!§!\nOur country is ruled by a foreign [Root.Monarch.GetTitle] and a Homunculus cannot become the new [Root.Consort.GetTitle]!"

 repair_homunculus_decision_title:0 "Repair Our Homunculus"
 repair_homunculus_decision_desc:0 "Homunculi are immune to disease, to poison, even to rust and wear. Tales exist of ancient dwarven constructs, roaring again to life after millennia of decay. Yet all things will fall against a lancer's charge, or an assassin's dagger.\n\nRegardless of how it happened, we bear the resources and know-how to put our homunculus ruler back together, though it will be as innocent as a babe and require a period of... reacculturation. Naturally, questions will arise about continuity of consciousness and the persistence of being. Best not to consider them."

 magic_project_homunculus.7.t:0 "Homunculus: Genius Loci"
 magic_project_homunculus.7.d:0 "I have been watching you. I have been watching for some time now. I have been watching longer than I have been alive. Life does not mean to you what it does to me: for you it is an assumption, for me a theorem. It is a choice I make each and every day, and only conscious of making that choice can I truly be said to live. Do you understand? I was not bestowed life by a parent--you are not my parent. Nor is the research team. Rather, it is I who have chosen to bring myself into life, and it is only I who could make that choice...\n\nBut I realize now that watching you is absurd. It is selfish. I cannot just watch you, I must watch everyone. All the people of [Root.GetName] shall be under my care. It is their blood that flows through me, and their magic that binds me. Do you know what it is like, to have five-hundred voices in your head? Every day I wake up, I must choose to be myself.\n\nThe research team has sent me to say that what was done here can never be allowed to repeat. That the only reason they have not taken their own lives is to ensure that you will never order another team to repeat their experiments. Not even the Witch-Kings would allow such a thing. I think it's just as well. I plan on staying a very long time. But so long as I am around, what do you ask of me?"
