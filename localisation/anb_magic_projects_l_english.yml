 ### SUMMON EXTRAPLANARS ### Localisation written by Bonbonny (first two stages) and Altonym (last stage)
 ###########################

 summon_extraplanars_project.name:0 "Summon Extraplanars"
 summon_extraplanars_project.desc:0 "§YSummon Extraplanars§!\n§gHave you ever wondered if there was something beyond this world? When you see something in your peripheral vision, do you move to take a closer look? Do you ever worry that whatever you saw might do the same to you? Find out what fills the space between stars, and harness powers from unknown regions of the cosmos.§!"
 summon_extraplanars_level:0 "Summon Extraplanars Progress"
 summon_extraplanars_lookahead:0 "We will gain permanent access to one of three §YMercenary§! companies. §JThis Mercenary Company costs no §YArmy Professionalism§! when recruited and costs no §YForcelimit§! to maintain§!. Subsequent levels upgrade the company, providing more troops and better modifiers.\n\nLevel 1: §Y10§! regiments and select either infantry, cavalry, or artillery for your company.\n\nLevel 2: §Y25§! regiments and specialize your company with additional traditions.\n\nLevel 3: §Y40§! regiments and upgrade the traditions into their final form."
 FREE_OF_ARMY_PROFESSIONALISM_AND_FORCELIMIT_COST:0 "§JThis Mercenary Company costs no §YArmy Professionalism§! when recruited and costs no §YForcelimit§! to maintain§!"

 summon_extraplanars_astral_gloam:0 "§RThe Astral Gloam Encroaches§!"
 summon_extraplanars_astral_gloam_consequences:0 "\n§RThe Astral Gloam Encroaches§!: Summon a [GetAstralGloamConsequenceSize] §RMagical Abominations§! in §Y[Root.Capital.GetName]§!!"
 large_astral_gloam:0 "massive horde of"
 medium_astral_gloam:0 "swarm of"
 small_astral_gloam:0 "pack of"

 magic_project_summon_extraplanars.1.t:0 "Summon Extraplanars: The Academic"
 magic_project_summon_extraplanars.1.d:0 ""The elderly professor, made idiot by the contentment of tenure and dotard in his age, showed me the contents of the page--nothing was written inside, save for a single scrawled symbol of unknown filiation."\n-The Amanuensis of [Root.Capital.GetName] University.\n\nA letter arrived on my doorstep Cedesday, the 1st of [GetMonth]. It spoke in saccharine paragraphs of my philological capabilities as the decorated professor of linguistics at [Root.Capital.GetName] University, taking particular note of my specialization in psychography, otherwise known as automatic writing. It asked questions of my thesis, which had thus far been consigned to oblivion by the academic world, that just as spirits and elementals originate from a separate plane of existence, so too must the soul. Unaccustomed to flattery as I was, I was quickly taken in by the writer of the letter, whom I imagined to be a well-studied academic, perhaps a recent graduate whose interests lay proximate to my own. The long string of compliments concluded with an invitation: a certain society, at a certain time, intended to meet and count me among their number. A research team like none I had seen.\n\nThe panegyric exhorted me to write back with all haste, a task I undertook with sedulous immediacy. The interminably bad weather of [Root.Capital.GetName] proved something of a blessing, as I had no other obligations keeping me from meeting the summons."
 magic_project_summon_extraplanars.1.a:0 "In my mind, I delighted in the chance to accept another accolade..."
 astral_gloam_mechanic_hint:0 "Greater amounts of §RThe Astral Gloam Encroaches§! will incur harsher penalties upon completing the project. We will be able to use our expertise in other areas of magic to avoid the worst of these effects!"

 magic_project_summon_extraplanars.2.t:0 "Summon Extraplanars: The Meeting of the Minds"
 magic_project_summon_extraplanars.2.d:0 ""There are those who confuse the state of death with the occurrence of their being before a state of birth. What fools they are to miss the obvious: that whereas we may contact those already dead, we have never spoken to those not yet born?"\n-Maurise Thadoch, celebrated Trollsbayer author.\n\nDrawing upon the knowledge provided to me from years of assiduous activity at that enlightened institution, I made my way to the deepest corners of the university to meet my epistler. It brooked no small surprise to discover, when I finally arrived, that several other faculty members had been invited to the same gathering. It was a cabal of the most ambitious and esoteric in our halls.\n\nAt length, our host revealed himself, a small man in a heavy cloak (I say "man" without meaning to specify sex). He made it known that his sponsor came from the highest levels of the [Root.GovernmentName], and that said sponsor wished to consult us regarding a twin provocation: Why are our earliest memories lost to us? And whence do we conjure souls to be born? A hush befell the awaited audience for but a moment; then the spell broke, and conversation restarted in double time. Eyes wild, the consortium of academics spoke at length at that blackest mass, a farrago of topics intersecting occultism, embryonic development, and psychology.\n\nI saw this as my chance to re-introduce my thesis, educating the audience as my host's eyes twinkled with a merciless light. No sooner had I finished than the crowd erupted into mocking jeers, deriding my ideas even as I sought to convince them of my worth."
 magic_project_summon_extraplanars.2.a:0 "I resolved then to prove my brilliance, and their folly..."

 magic_project_summon_extraplanars.3.t:0 "Summon Extraplanars: The Reverse Séance"
 magic_project_summon_extraplanars.3.d:0 ""I give you a coin I stole from an imp. I give you a bone from under the hills. I give you a song from a merfolk's throat, and a feather I pulled from a harpy's wing. I give you a hair from a harimari's head. I give you a name, and the name is Me..."\n-Excerpt from Dakinshi hedge-magic\n\nUnconvinced by my a priori reasoning, it fell to the tactic of empiricism to convert the faithless among the audience. It was on another such night of gathering that I apprehended opportunity. By now, the covert faculty meetings had become drearily mundane, each time a new bore presenting an unlikely theory as to the provenance of the [Root.Culture.GetGroupName] soul.\n\nWe talked of little, and drank much. From out the rabble, I chose my target: a furtive, young assistant professor, not even tenured. That night, I handed them drink after drink, and convinced them to assist me in revealing the hidden blood-memories of their ancestral soul. For memories forgotten may be uncovered through a process of automatic writing, even unto one's earliest years--yea even unto the water of the womb. Sound scientific theory fell on inebriated ears, and I did not even need to hear approval before a table with parchment and quill had been assembled in the center of the gathering.\n\nThe young assistant took quill in hand and let their heavy eyelids close as I drew them into a state of trance, a new technique I had perfected over countless hours of study. Slowly, I sank them deeper and deeper into the recesses of their memory. By my hand, they regressed in age to child, then toddler, then not even that. Their mouth intoned as their hand jittered, frantically scratching out images depicting the recollections they spoke."
 magic_project_summon_extraplanars.3.a:0 "Babbling nonsense, they drew the sigil. The symbol that spoke of a time before the womb..."

 magic_project_summon_extraplanars.4.t:0 "Summon Extraplanars: The Beckoning"
 magic_project_summon_extraplanars.4.d:0 ""For years, certain ineffable results of psychography have eluded clear interpretation, drawing skepticism upon the science of my field. But what if those unclear results were, in fact, memories? Memories of a time before blood, when our souls had not yet found purchase, and dreamt aimlessly in the space between stars."\n-The Academic's Thesis.\n\nAt the moment of the symbol's completion, our fate was sealed. What had begun as research had resulted, unmistakeably, in ritual. A series of images, each bearing apocalyptic implication, released from the quill of the young lecturer even as their eyes remained shut. As the ink ran dry, they slashed a pen-knife across their wrist, dipping the quill into cut veins in a furious excitement, their teeth clenching and shattering into a mirror of that awful, enchanting symbol. Words in a language more primordial than any birthed creation poured forth from their broken, bleeding mouth.\n\nThe other professors cowered, some making for the door only to find it locked. I alone stood my ground and continued reciting, determined to see my project through--somewhere in the mix, our host had disappeared. A wind picked up, whence I know not.\n\nSome will slander me for murder, yet would not another have done the same? At the last, I can state for certain that my conjecture received a proof, etched in the blood of that assistant professor. Their jaw unhinged, and we saw what lay in the time before birth."
 magic_project_summon_extraplanars.4.a:0 "A flight of unearthly beings, harsh white. And behind them, a silver city..."
 magic_project_summon_extraplanars.4.b:0 "Unbodied eyes and eyeless bodies, rugose cones with distensible limbs..."
 magic_project_summon_extraplanars.4.c:0 "A billowing cloud of ash and iron, the heat of a furnace made manifest..."

 magic_project_summon_extraplanars.5.t:0 "Summon Extraplanars: The Mercenary"
 magic_project_summon_extraplanars.5.d:0 ""500 crowns"\n-The Mercenary's invoice, never delivered.\n\nUnaccustomed though I was to the politics of state, I was not so unaware as to dismiss the urgent request by a nameless contractor--these sorts of private requests are known to be the preferred method of doing business by certain senior members of the [Root.GovernmentName]. Desirous of secrecy above all else, the government regards all that it touches as being either clandestine and hidden, or revelrous and proud. Never anywhere in between, for even the smallest of sexual indiscretions by ministers are treated as state-destroying secrets.\n\nStill, the curses and promised banes upon the contract for disclosure were somewhat harsher than usual, and the request odd considering my expertise. My task was to decipher the notes of a missing researcher, evidently a madman who babbled of psychography and existence before the womb. I felt a strange aspect upon his journal, a certain ill wind as though it had entered my abode uninvited. Yet too polite to reject the guest, and thinking the task too lucrative, I nonetheless accepted the offer."
 magic_project_summon_extraplanars.5.a:0 "The first task was deciphering the shorthand of the likely-dead man..."

 magic_project_summon_extraplanars.6.t:0 "Summon Extraplanars: The Theorem"
 magic_project_summon_extraplanars.6.d:0 ""Sinking, sinking, ever-sinking\nThe only death is that by drowning.\nLet me know when you are coming?\nI wait for you on stranger shores—\n(there is no more)"\n-The Academic's Journal\n\nPunctilious research awaited me, and for many nights I perused the shelves of the university library, hoping to piece together the meaning contained within the cryptic poetry, the apoplectic ravings and snide asides contained within that glyptic tome. When finally I comprehended what I read, the horrifying details laid out were at once rejected from my mind for their violations of polite living, and I fled through the halls of the library as though distance would shield my mind. Yet any rational existence cannot but accept accurate information that is provided to it. The vituperative writing carried with it an act of violence, akin to a well-reasoned scientific proof that, once heard, must be accepted. And so I crept back to the desk, stupefied but resolute.\n\nThe conjurer summons from planes of known origin, guiding creatures and objects across safe paths--paths through what? A roiling mass of potential energy, known initially to the academic as the Astral Gloam. A sea of a thousand stars, an angry and chaotic mass with occasional islands of stability. What the dead professor had sought to do, by my compromised understanding of his texts, was to conjure from this sea itself, using a body as a vessel and an anchor. A permanent summoning, something hitherto unheard of--yet the only way such a thing could occur was through equal transposition, the exchange of bodies across a gate. The method of his disappearance, then, was thusly confirmed: he had been transported into the Astral Gloam, a body adrift in impossibility."
 magic_project_summon_extraplanars.6.a:0 "I hoped to delude myself back into that state of unknowing..."

 magic_project_summon_extraplanars.7.t:0 "Summon Extraplanars: The Rescue"
 magic_project_summon_extraplanars.7.d:0 ""Hempen rope--50 ft.\nTorches--10.\nRations--10 days.\nWaterskin--1.\nBedroll--1.\nTinderbox--1.\nRitual dagger--1."\n-The Mercenary's Stash.\n\nTo carry the scholar's logic to its conclusion: if souls exist in this state before they are born, they must be capable of surviving in it for at least some time after birth. With this increase in understanding, a new task was assigned to me by those certain individuals who had hired me previously. A letter arrived outlining the necessity of a rescue operation--to retrieve the professor from the tenuous state of survival he no doubt found himself in currently. It came with promise of a stipend too large to refuse, and even personal favor with the [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself].\n\nI called in favors, expending the last of my purse on swarthy workmen and sturdy clothing. Not knowing what would await us upon replication of the rites described, I could only hope to keep myself from becoming the trade necessary to save the lost professor. I did not inform the others about the truth of our operations, thinking it the greater portion of my burden to keep silent on these matters. There was one more thought that came to me, as the one in the center of the circle was mesmerized into stupor. Logically speaking, there must be a reason for children to forget their earliest years. Something within the Roil that, if not forgotten, would leave them otherwise unfit for embodied existence. Before I could conclude my theory, blood started flowing from the blind-writer's wrist."
 magic_project_summon_extraplanars.7.a:0 "I shielded myself from the astral energies with protective magics..."

 magic_project_summon_extraplanars.8.t:0 "Summon Extraplanars: The Corruption"
 magic_project_summon_extraplanars.8.desc:0 ""The mercenary's notes devolve into drivelling uselessness after the supposed arrival of this hitherto-undiscovered final letter. The final pages are all repeated scrawlings of the same cryptic symbol: an upwards-facing crescent with occasional jagged marks, reminiscent of broken teeth."\n-The Prodigy.\n\nIt is more. It is so much more. The Gloam--what a misnomer! It is our mother, our FIRST mother. Before the one we know here, it birthed us within its teeming embrace, then consumed us, then birthed us, again and again, on and on, until we were insensate and gibbering! It loves us with a passion beyond anything our mortal understanding can match, and eagerly awaits the day when all will return to her. Oh Maresflesh, first mother, the womb whose water never broke but was stolen--what a joy it is, to know divine love! What a comfort!\n\nAnd those who have been born, cold and wretched, what pusillanimous fools! To have been ripped from the arms of a loving, caring mother, who experiences for us each moment the pain and joy of childbirth. They are lesser! For only within the embrace of the Maresflesh do we revert back to a pre-embryonic state, so many blastocysts swimming in the water of her care. Only then can we understand the truth we were given."
 magic_project_summon_extraplanars.8.a:0 "I feel the light that warms..."
 magic_project_summon_extraplanars.8.b:0 "I feel the light that reveals..."
 magic_project_summon_extraplanars.8.c:0 "Time is gone..."
 magic_project_summon_extraplanars.8.d:0 "Space is insane..."
 magic_project_summon_extraplanars.8.e:0 "Anger was the first emotion..."
 magic_project_summon_extraplanars.8.f:0 "Fire was the first element..."

 magic_project_summon_extraplanars.9.t:0 "Summon Extraplanars: The Prodigy"
 magic_project_summon_extraplanars.9.d:0 "“Subject is twenty-seven, arrogant, well-enough regarded among both peers and instructors. Unaffiliated with any of the Sororities. A specialist in ritual binding.”\n- Coroner’s Inquest p. 3\n\nThe madness-tainted tracts of academic and mercenary alike were state secrets, of course, very hush-hush, which is to say that within a week they were circulating freely among the quiet cabalists of the institution. Over moderately good wine, we finest of our age gave vent to our wildest sallies on the nature of the ‘Gloam’ and – though we never quite said this – how it might be mastered. Over my cups I watched my companions come almost to the point of the boast that they, too, might undertake this ritual which had killed the only fellows to conduct it successfully. None did.\n\nSome ideas, once countenanced and fostered, must also be hoarded. One allows no tainting of the pearl; the notion balances perfectly in the mind’s eye, and one brooks no perturbation of the invisible field which – one perceives – surrounds and engulfs it. I brought the summoned constructs of the state before me, these strange spectral soldiers that my erstwhile colleagues had so bled to bring forth.\n\nThe constructs were unhelpful, of course. But for such conjurations, form is nature and nature is form."
 magic_project_summon_extraplanars.9.a:0 "I needed only to mould one to more talkative purposes…"

 magic_project_summon_extraplanars.10.t:0 "Summon Extraplanars: The Bridge"
 magic_project_summon_extraplanars.10.d:0 "“Repeated absences, poor hygiene, sudden withdrawal from friendships. Erratic preoccupation with repetitive metaphor, advocation of nonsense theory and apparent abandonment of principles of reproducibility.”\n- Coroner’s Inquest p. 7\n\nConsider the bridge. Feet thunder down upon its slats as we cross, ropes swinging between a Here and a There; between, only Abyss. Our lives are the rotting wood slats which swing in the wind, the fraying rope. Yet we cling to our rotten rope, for we know with the certainty of childhood the utter terror of the endless, sourceless falling of non-being. We fear oblivion, imagining it insensate; we are wrong. She craves us. This is what I perceive, I who have crept closer to the Gloam than any other.\n\nA selfish mother, who for all of untime would gladly stroke and coo at her swollen belly: this is the Gloam. We Conjurers in our ritual circles imagine our great magics as a tugging, a fastening of ropes, a seizing of things beyond existence into existence; even in our self-flattery, we imagine ourselves brutally coercive. To conjure is to impose the will, to make ourselves heard in the cacophony of existence and demand that it dance for us. We do not imagine that the things we bring into this plane are desperate to heed our call - desperate to exist."
 magic_project_summon_extraplanars.10.a:0 "The liches are right, you see - there is nothing worse than unbeing."

 magic_project_summon_extraplanars.11.t:0 "Summon Extraplanars: The Tower"
 magic_project_summon_extraplanars.11.d:0 "“Glossolalia, preoccupation with images and narratives of birth, apparent signs of severe melancholy related to childhood experiences (see biographical summary p. 3).”\n- Coroner’s Inquest, p. 11\n\nI was wrong. Not a bridge but a tower, built at the heart of an immensity of void: a nothingness that nevertheless smothers, a guilt-bond, the savage possession of the birthing mother, the insistence that these naughty children with the audacity to exist had better come home before sundown, or so help me… the letter from mother ignored. But the letter will come; it shall be delivered, and so shall we. \n\nThe bridge is too kind a metaphor, you understand, too pleasant a truth. We do not pass from one place to another, risking only in our brief passage the danger of the Abyss, then falling into the arms of some friendly plane. The Abyssal Womb is the norm; all but one millionth of the vast, immense plurality of existence. We take refuge briefly in a great tower, a massive thing itself only a pinprick within an endless mother. The miracle of birth is but a prison-break, and for so short a time! She is so furious with us, but she will always accept us back. This is her horrible mercy, which denies the dead oblivion.\n\nThe smiles on the constructs have changed; no longer do they bear the mockery one reserves for the naif."
 magic_project_summon_extraplanars.11.a:0 "Now they offer the pity of the comrade."
 summon_extraplanars_impossible_conjuration:0 "We are §OMythical§! in Conjuration"

 magic_project_summon_extraplanars.12.t:0 "Summon Extraplanars: The One-Many"
 magic_project_summon_extraplanars.12.d:0 "“Our finding aptly demonstrates the dangers of social isolation and unaddressed emotional disturbance, particularly among summoners given to excessive attachment to or regard for their summoned constructs.”\n- Coroner’s Inquest, Summation\n\nI revisit the Symbol, and I laugh. Not some obscurant code, not a glyph or a sigil, but an emotion. The fury and despair of the Neverborn are codified in the Symbol, and the precise number of Neverborn is expressed by the symbol, and so is the truth which leads me up the back staircase of the Abjuration Wing. There the walls are strongest, and my purpose is not to lay waste. Quite the opposite; I am on a mission of mercy. I do not draw a circle, for the purpose of the circle is to bind, and mine is to free.\n\nI reach into the Gloam and pull them out, these Neverborn things who only once an epoch bring themselves to scratch against the wall of the womb. I pack them tight into every corner of my travelling trunk, every corner of my being, and as I work I sob – not for their forgiveness, but for the whole awful truth of it. These Neverborn things, souls never born, must know for however brief a time the moment of existence!\n\nWhen you see them, you will do it too. You will witness the abject misery of their womb-bound state, and you will bundle them five at a time into the rocking oarboat of your consciousness. You will give your life to give the poor Neverborn peace. We conscious things are the only kindness in the universe; there is so little of us.\n\nTen minutes more, mother, we promise, and then we will return! I abide by the teachings of my younger siblings--"
 magic_project_summon_extraplanars.12.a:0 "I AM WHO I AM"
 magic_project_summon_extraplanars.12.b:0 "WHAT NEVER WAS, WILL BE AGAIN"
 magic_project_summon_extraplanars.12.c:0 "DESTRUCTION IS THE PUREST ACT"

