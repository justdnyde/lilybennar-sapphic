 battlemage_academy_project.name:0 "Battlemage Academy"
 battlemage_academy_project.desc:0 "§YBattlemage Academy§!\n§gWhile formal schools for magical education had been present for centuries in some parts of Halann, the low demand for such institutions limited their expansion, and most regions relied on an ad-hoc apprenticeship model. Eventually, the master-and-apprentice model of magical tuition became simply too slow and disorganized to maintain the level of demand for new, competent mages.\n\nThis led to the expansion of magical academies, places of formal teaching that were funded by kings and nations. In many ways, all an academy has to do to maintain its prestige is to continue to be used by the same privileged families with each successive generation.§!"
 battlemage_academy_level:0 "Battlemage Academy Progress"
 battlemage_academy_lookahead:0 "Each level of Battlemage Academy:\n   ...gives us a free §YWar Wizard§! and §YAdvisor§!\n   ...increases the stats of all future §YWar Wizards§!\n   ...reduces the cost to hire §YWar Wizards§! through the §YBattlemage Academies§! privilege by §G-20§! Military Power\n   ...improves our §YWarscore, Army Tradition, or Prestige from Battles§!\n\nAt level 3, permanently unlock the §YBattlemage Academies§! privilege and grant §YRuler War Wizards§! §G+1§! Shock."

 magic_project_battlemage_academy.1.t:0 "Battlemage Academy: Welcome the Freshman Class of [GetYear]!"
 magic_project_battlemage_academy.1.d:0 "The Dean of the College of Arts and Charms stepped up to the podium, a flick of the wrist settling his notes on the lectern. Clearing his throat, he raised his wand to activate an aura of voice amplification around the auditorium. Yet at the first word, a series of noisome squawks were broadcast instead of the Dean's voice. Quickly dispelling the magic, he waved over the illusion adept to inspect the runes. As he did so, a wave of titters and jeers traveled across the audience of children.\n\nOne of them, a young dark-haired boy, leaned over to his neighbor holding up a small piece of stone with a rune inscribed on it. "Iago's Illusory Chicken. You can get 'em cheap from any old scribe, they make the wielder sound like a henpecked rooster. Bet no one's thought of THAT before!" He chuckled, evidently pleased at his own novelty. "Yessir, this school's going to be in for one heck of a ride. It's never encountered anything quite like me!"\n\nBeside him, his nervous mouse-faced neighbor shrank further into his seat. "Oh, no... I can't believe you did that to the Dean! What if he finds out? I can't be sent back home! My family's got problems like no one's ever has..."\n\nThe dark-haired boy rolled his eyes. "Oh, lighten up. Do you know what Deans are? Deans are students who felt so humiliated by school that they dedicated the rest of their life to doing it over again.""
 magic_project_battlemage_academy.1.a:0 "What a bright lad! He'll have quite a future ahead of him."
 studying_battlemage_academy_mod_1:0 "Battlemage Academy: A Bright Future!"

 magic_project_battlemage_academy.2.t:0 "Battlemage Academy: Magical Hijinks!"
 magic_project_battlemage_academy.2.d:0 "The boys squatted hunchbacked in the grimy dungeons of the castle, squinting at hastily scribbled-out plans by dim candlelight. The first one, a dark-haired individual at the barest cusp of puberty, made some additions to the parchment using the tip of his wand. "It has to be perfect," he declared, "perfect in every way and completely unlike anything anyone has seen before."\n\nThe mouse-faced boy scratched nervously at his throat. "You sure about this? What if we get in trouble? Mother will have a conniption! How are we even going to show up the greats who've come before?[Root.GetBattlemageAcademyOuthouseLegacy][Root.GetBattlemageAcademyGraffitiLegacy][Root.GetBattlemageAcademyUnderwearLegacy]" He tosses his hands up in despair.\n\nThe dark-haired boy grinned. "I know. That's why it has to be PERFECT. Trust me, this school has never seen anyone like us before!""
 battlemage_academy_outhouse_legacy_desc:0 " Everyone knows about that time someone blew up the outhouse--it happened while the Dean was having a wee, and he had to go get his bits reattached by dark necromancy! That was epic, how are we going to top that?"
 battlemage_academy_graffiti_legacy_desc:0 " We've all heard about that day when the walls were covered head to toe in the names of two of the most legendary pranksters that ever graced these halls... they spent months scrubbing the stone with soap and with scouring charms, they couldn't even buff the serifs out!"
 battlemage_academy_underwear_legacy_desc:0 " The most embarrassing moment of the Dean's life has already happened, and it was when some truly mythical students took his underwear and put it on a horse! Boy, that thing ran around campus for the entire day, and they NEVER managed to catch it! Some say its descendants still have an imprint of the dean's butt stains..."
 magic_project_battlemage_academy.2.a:0 "Let's blow up the outhouse! Get in some good practice!" #Tradition
 magic_project_battlemage_academy.2.b:0 "Let's draw our name across the castle walls! Everyone will know what we did!" #Prestige
 magic_project_battlemage_academy.2.c:0 "Let's steal the dean's underwear and parade it across the campus!" #War Score
 battlemage_academy_already_done:0 "§RBooooo! Everyone knows this one has already been done!§!"
 battlemage_academy_save_the_best:0 "Waiting to choose this option until higher levels of the project will §Gslightly increase§! its impact!"

 magic_project_battlemage_academy.4.t:0 "Battlemage Academy: "The Incident of [GetYear]""
 magic_project_battlemage_academy.4.outhouse:0 "The moon hung low over the quiet castle walls, trees gently swaying in the midnight breeze. Silence imposed its iron-fisted order over all, except for the barely concealed sniggering of two teenagers. One of them, a dark-haired and wild-eyed figure, gripped his wand like a dagger as the other, a mousy-faced and pouch-cheeked boy, scrambled to join him in the concealment of the bush. "It's ready," the latter whisper-shouted. "I scribbled it on the inside of the lid. Copied it direct from my textbook, I did." He looked almost proud of the fact that he couldn't properly memorize an evocation rune.\n\nThe dark-haired boy grinned. "You're brilliant. And you're sure no one saw you leave?"\n\nThe other shook his head and crossed his heart. "Not a soul. I doubt anyone's even awake! Not even Mother saw, and she's got that divination orb what she uses to keep track of me."\n\nThen the two devolved once more into stifled giggles as the dark-haired boy pointed his wand over to the wooden building, casting the priming charm under his breath. "Okay, ten seconds. Don't look away now!"\n\nAt just that moment, a mage-light flickered on in the distance as the outhouse door creaked open. The boys' eyes widened. "Is that--" "Oh, no, I think it's--"\n\nThe Dean's voice rang out in the still night air. "Oi! Who drew Flanagan's Ignition on the inside of this--" His voice was cut short by a loud bang, the ceiling of the outhouse flinging off its loose rafters."
 magic_project_battlemage_academy.4.graffiti:0 "Thump. Thump. Thump. The sound became persistent as the nights went on, keeping students and professors alike awake. Investigations into the source of the noises had repeatedly turned up empty-handed, as had the regular night patrols that now circled the whole of the academy from dusk till dawn. New and inventive punishments had been promised to the culprits when they were caught--not that anyone had difficulty deducing who they were. Their names were by now emblazoned on every single brick, every line of mortar, and every wooden door around the whole of the campus.\n\nNor were their methods entirely secret: by now, everyone had seen one of the many miniscule, self-replicating constructs that had taken up residence within the castle walls. Having torn through much of the stone, they were now being regularly found inside of closets, residing inside of hats, scarves, and shoes. By day they rested, by night they ate of the campus's stone towers, creating more of their kind by carving lines that traced out the names of their creators.\n\nThe work had so destabilized the castle that the uppermost donjons had to be abandoned by their usual inhabitants. Any mundane blasting efforts had been called off for fear of further destabilizing the castle, and magical exorcisms were denied flatly on the basis of doing harm to the school spirit, who inhabited the same bricks and mortar as the constructs. The dean had no choice but to call a specialist--and in the meantime, search for the guilty parties who had so shamed the academy. Meanwhile, two boys peered gleefully in on the whole mess from their hideout in the woods, where they had stashed more than enough supplies to wait until the whole thing blew over."
 magic_project_battlemage_academy.4.underwear:0 ""Get BACK here!" The Dean's usually calm demeanor had taken on a somewhat strawberry tone, the pale red pallor of exertion performed by someone who was unused to the feat. It wasn't enough that his underwear had been stolen--left drawer, under the robes, monogrammed and embarrassingly purple--it was that his prize horse was now the one wearing them.\n\nWhat had begun that morning as various attempts at bribery, and escalated by noon to domination enchantments that were easily swatted away by the complex interweaving of the Dean's own prior abjuration wards, had now ended in a full-blown chase down the halls of the storied battlemage academy. The Dean huffed and puffed despite his Longstrider charm, his horse always a few steps ahead. Proud man that he was, the Dean had insisted no one else lay a hand on his precious D'Alembert.\n\nThe horse whinnied, evidently enjoying the exercise, and shook his backside as though to show off the dean's underwear once more. Nearby, two boys laughed uproariously at the sight, speeding on the horse with a couple cantrips of their own. The Dean stared daggers at the two as he ran past, but didn't pause to say a word."
 magic_project_battlemage_academy.4.a:0 "Ha-ha! You should've seen the look on the Dean's face!"
 studying_battlemage_academy_mod_2:0 "Battlemage Academy: Irreplacable Childhood Memories!"

 magic_project_battlemage_academy.5.t:0 "Battlemage Academy: Graduating Class of [GetYear]"
 magic_project_battlemage_academy.5.d:0 "The courtyard was resplendent in early summer, the same blooming mandrakes and nightshades that decorated the amphitheater as every year. The Dean was the same Dean that had stepped up to the podium every year now for many years, and he did so with the same characteristic stiff-backedness that had defined so many of his predecessors. Every year there was the same crowd of students in their bright, pristine graduation robes, their caps decorated in such individually unique styles that they paradoxically merged together into the same variegated mélange. Every year the same crowd was there to greet them: parents and professors, alumni with wheelchairs and walking-sticks.\n\nThe Dean cleared his voice, and this time no noises bothered his introduction. "Good morning," he began, "to our distinguished faculty, our esteemed guests, and to the graduating class of [GetYear]." A round of polite applause. "[Root.Capital.GetName] Academy is honored to have played host to such a uniquely marvelous class of students. For this is a class that redefined magical theory, that contributed magnificently to the legacy and honor of the school, excluding one... infamous incident, of which we shall not speak."\n\nA wave of laughter across the crowd as the Dean made a show of straightening his robes." Nevertheless... you have persevered. Through examinations and theses and the occasional sleepless night, you have overcome every challenge [Root.Capital.GetName] Academy had to offer. And you shall persevere onwards, into the next stages of your magical careers—into postings at home and abroad, as officers and diplomats."\n\nTwo young men in the audience grinned ear to ear, as though the Dean were speaking directly to them. And for a moment, as the speaker's eyes traversed the crowd, the three of them locked gazes, a smile overtaking the older gentleman's weatherworn expression. "Make no mistake. You are incorrigible. Impossible. Entirely unforgettable... and utterly brilliant. Go out there and make some mayhem."\n\nThe Dean stepped back off the podium, and the crowd erupted in cheers."
 magic_project_battlemage_academy.5.a:0 "No one will ever match what we've done!"
 battlemage_academy_project_effect_1:0 "The §YRecruit War Wizard§! Estate Action now costs §Y80§! Military Power.\n\nWar Wizards now spawn with §G+1§! Fire, §G+2§! Maneuver, and §G+1§! Siege (Total 1/7/5/2)\n"
