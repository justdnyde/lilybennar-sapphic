 #Salla Drennen loc
 drennen_project_1.desc:0 "§YVerdant Vivification§!\nThe Verdant Veil is now a broken thing, but once it was a great barrier seperating the Deepwoods from the rest of Cannor. What could its tattered remains be if harnessed, and rebuilt for grander purpose?"
 drennen_project_1:0 "Verdant Vivification"
 drennen_project_1_lookahead:0 "Spreading the Rainbow Veil across the deepwoods will grant reduced development cost in glades with a mage tower."
 drennen_project_1.name: "Verdant Vivification"
 drennen_project_1_level: "Verdant Vivification Progress"
 #Umbral Covenant Loc
# SECRETS OF THE SPIRES
umbral_project_spire.desc:0 "§YSecrets of the Spires§!\nUnderstand for a moment that my Granny Ilfa’s magic engulfed, for much of my life, the entire world. Particularly when one is close to her, it is difficult to see past her power, to see anything else. Her signature, her style of magic - beyond its potency, there is an elegance to her craft which is hard not to imitate, consciously or unconsciously. I have always shaped myself in response to it. And yet, and yet… grand pillars of black stone dot the landscape of Sarhal, grand and historied, and my grandmother has never said anything about them at all.\n\nZatsarya, they are called, and it is hard to blame the lizardfolk for dividing their world into the territories shadowed by these magnificent pillars. While some are apparently damaged beyond repair, deadly to the touch or strangely unresponsive, the rest are powerfully intriguing. When I pass them, when I move near, there is a vibration. Curiosity moves me, if nothing else - and perhaps the petulant wish to know something my Grandmother does not."
umbral_project_spire:0 "Secrets of the Spires"
umbral_project_spire_lookahead:0 "Exploring the Zatsarya may reveal hidden magical energy."
umbral_project_spire.name: "Secrets of the Spires"
umbral_project_spire_level: "Secrets of the Spires Progress"

 # BORN OF ASHEN SKIES
 umbral_project_ashen.desc:0 "§YBorn of Ashen Skies§!\nI am set against the Coven - they will stop at nothing to destroy me now. I, alone of all beings on Halann, understand truly what this means. The shadowcraft of the Coven entire is arrayed against my own, and even with the power I have usurped from their botched ritual of planar convergence, their experience outdoes my own by a millennium and a half. I cannot hope to defeat them while their Coven remains intact.\n\nI have wracked my brains for a solution, and can think of only one: the Tetrahedron of genie make, the one which hinted of a Komina before the Coven, before she made common cause with Granny Ilfa and Mama Hireet. Those who stand against the Coven have understood Yezel Mora as a power, but it is most fundamentally a relationship. End the relationship, win Komina over, and the Coven collapses."
 umbral_project_ashen:0 "Born of Ashen Skies"
 umbral_project_ashen_lookahead:0 "Interacting with the cube may assist in swaying Komina to our side and breaking the Covens unity."
 umbral_project_ashen.name: "Born of Ashen Skies"
 umbral_project_ashen_level: "Born of Ashen Skies Progress"

 # ALL SHALL LOVE ME
 umbral_project_loveme.desc:0 "§YAll Shall Love Me§!\nGranny Ilfa and Mama Hireet were willing to annihilate this plane and another, and me alongside it, for their ends. To go wherever it is they wished to go, they would have done anything. I have killed Hireet and suborned Auntie Komina, but Granny’s memory is long; left unchecked, she will marshal forces against me to the end of time, infinite in her subtlety, implacable in her wrath. I have learned much from the hags’ example: that threats may emerge from the unlikeliest and closest of places; that one can never truly command loyalty without sharing of oneself; that time makes fools of us all.\n\nI like this plane. I do not wish it to end. If I am to guard against the myriad threats that may one day undo Halann, I must take the same magic which has bound my followers to me, my arcane lattice, and spread it over the whole world. Every sentient mind will be linked to me, and I to them. I will shepherd every soul on Halann to peace, and should the future bring fresh nightmares, we will fight them off as one grand lattice of minds."
 umbral_project_loveme:0 "All Shall Love Me"
 umbral_project_loveme_lookahead:0 "§PI Shall Be As Beautiful And As Terrible As The Night.§!"
 umbral_project_loveme.name: "All Shall Love Me"
 umbral_project_loveme_level: "All Shall Love Me Progress"

