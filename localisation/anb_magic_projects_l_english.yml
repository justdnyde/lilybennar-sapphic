 battlemage_academy_project_effect_3:0 "Permanently unlock the §YBattlemage Academies§! privilege.\nThe §YRecruit War Wizard§! Estate Action now costs §Y40§! Military Power.\n\nWar Wizards now spawn with §G+2§! Fire, §G+1§! Shock, §G+1§! Maneuver, and §G+1§! Siege (Total 4/9/7/4)\n\nRuler War Wizards gain §G+1§! Shock."
