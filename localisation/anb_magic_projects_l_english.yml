 army_of_the_dead_project.name:0 "Army of the Dead"
 army_of_the_dead_project.desc:0 "§YArmy of the Dead§!\n§gThe living are fundamentally unreliable; they are more useful dead. The dead are capable of creating more dead. Any Necromancer will eventually put two and two together. All that remains is to follow through.§!"

 army_of_the_dead_level:0 "Army of the Dead Progress"
 army_of_the_dead_lookahead:0 "Unlock §YUndead Military§!, a military type focused on swarming the field with endless hordes of revived soldiers.\n\nLevel 1: Unlock and swap to §YUndead Military§!. You can swap to your old military at any time via the racial menu.\nLevel 2: Specialize into a better unit type, unlocking new §YInfantry§! and §YCavalry§! units with better pips. Comes with a modifier.\nLevel 3: Unlock the full potential of Undead Military, allowing you to §YRegain 1/3 of Battlefield Casualties as Manpower§! when victorious in combat.\n"

 studying_aotd_mod_1:0 "Army of the Dead: Body"
 studying_aotd_mod_2:0 "Army of the Dead: Bodies"
 studying_aotd_mod_3:0 "Army of the Dead: Bodies on top of Bodies"
 studying_aotd_mod_4:0 "Army of the Dead: Bodies Bodies Bodies (2022)"

 magic_project_army_of_the_dead.1.t:0 "Army of the Dead: The Empty Grave"
 magic_project_army_of_the_dead_1_desc_first:0 "It was a cold black night, a clear white moon. Three men gathered around a hole they were collectively digging. Six feet long, three feet deep. The first man smiled and said nothing, because he knew the plan. The court necromancer had explained it before they left: under certain circumstances--circumstances he had been charged to discover--the dead could rise again. The candles had been set up, the chalk circle drawn. Now the hole was to be dug, and the only thing required was a sacrifice. The target was, of course, the second man.\n\nFour feet deep now.\n\nThe second man smiled and said nothing, because he knew the plan. The plan was to whack the third man, because he kept talking about mushrooms and it was really getting on everyone's nerves. It's not like mushrooms weren't important, they were! It was just bothering the court necromancer a lot how much he kept going on about it. Bit of a convenience, since they also had to off someone for the whole experiment.\n\nFive feet deep.\n\nThe third man smiled and said nothing, because he knew the plan. They were going to go get mushroom skewers. It had been thoroughly discussed on the carriage-ride over. Yum, mushroom skewers. He was already getting hungry. Also he had to kill the first man.\n\nThe hole said nothing, as holes often do.\n\nSix feet deep. Time for action."
 magic_project_army_of_the_dead_1_desc_second:0 ""Oh dirt and ash you got him. You got him. I can't believe you--that wasn't the plan!"\n\n"What? What are you talking about? He was about to kill you!"\n\n"No! He was about to kill YOU. That was the plan, and now you've gone and ruined it!"\n\n"I have ruined not--wait, you were planning to kill me?"\n\n"Well, you gotta kill SOMEONE."\n\nIt's true, the hole considered. You do in fact gotta kill someone. In fact, the more someones you kill, the better the court necromancer will be at figuring out this whole raising-the-dead thing. Probably.\n\n"Murderer! Fabulist! Jaywalker!"\n\nThe shovels came down again."
 magic_project_army_of_the_dead_1_desc_third:0 "The last man laid down in the grave atop the other corpses, the sick, warm scent of blood (not his own) drenching his breeches and shirt. After a while, his neck started to ache. He wondered how much longer he would have to stay here in the hole until he died properly. It was hard to tell.\n\nEventually, the court necromancer came by, and fixed him with a strange gaze."
 magic_project_army_of_the_dead.1.a:0 "Into the hole with [Root.Adm_Advisor.GetName]!"
 magic_project_army_of_the_dead.1.b:0 "Into the hole with [Root.Dip_Advisor.GetName]!"
 magic_project_army_of_the_dead.1.c:0 "Into the hole with [Root.Mil_Advisor.GetName]!"
 magic_project_army_of_the_dead.1.d:0 "Into the hole with that random bystander!"
 magic_project_army_of_the_dead.1.e:0 "Okay, that's enough![Root.GetAotD1EText]"
 magic_project_army_of_the_dead_1_e_2:0 " You can get out now."

 magic_project_army_of_the_dead.3.t:0 "Army of the Dead: Inhuman Resources"
 magic_project_army_of_the_dead.3.d:0 "Hello, this is the hole speaking. It would like you to know that it really appreciated all those bodies you gave it, and was wondering if you had any more. You see, it's been a really very loyal servant all these years, and the progress the two of you have made in creating mass undead thralls has truly been groundbreaking... you get it? Groundbreaking. Um, anyway...\n\nIt's just, it's so hard to work on an empty stomach, you know. And the bodies you gave before, well, they're all gone by now, right? The necromantic swill at the bottom of the hole carries putrescent vapors that sort of disintegrate all flesh they come in contact with, leaving rotting remains intermingled with half-alive muscle. What the hole is trying to say is, it's a very fast eater.\n\nAnd it's just a hole, really. It can't get up and walk around and look for more, it's got to wait patiently and hope that a rabbit or a deer or something else falls in. Meanwhile, you have several holes and you get to walk around and stuff your holes all day with various sorts of foods and devices and the hole would really just like you to share a small portion of your bounty. It promises to show off some really interesting decay patterns if you do."
 magic_project_army_of_the_dead.3.a:0 "You'll be pleased to learn we've acquired more bodies for your use..."
 magic_project_army_of_the_dead.3.b:0 "Well, we can look at getting you on a personal improvement plan..."
 aotd_not_enough_manpower_tt:0 "£no£Insufficient Manpower!"
 not_unlocked_aotd_tt:0 "...if they do NOT have §YArmy of the Dead§!"

 magic_project_army_of_the_dead.5.t:0 "Army of the Dead: An Beautiful Day at Court"
 magic_project_army_of_the_dead.5.d:0 "As follows, a day of petitioners in the court of [Root.Monarch.GetName] and the manner of resolution for each case:\n\nA neighborly dispute over the ownership of cattle: the heifer was to be sold and its proceeds divided.\n\nA cloaked figure that wished to stay upon the palace grounds indefinitely: asked to leave for the orphanage.\n\nA charge of slander brought by a prostitute against one of her clients' wives: a certificate was issued testifying to the honor and good health of the prostitute.\n\nA cloaked figure that declared themself "kinda homeless" and reported rejection on the part of the orphanage: asked to leave and never return.\n\nA cloaked figure that refused to leave and lifted their hood revealing an ugly, ill-groomed man, which some in attendance recognized as a prior advisor to the [Root.Monarch.GetTitle], and who elaborated on his condition as erstwhile tyrant of a large society of "hole people", now evicted from said hole following a republican revolution: court necromancer dispatched to re-establish tyranny in the hole, and grant any who wished it jobs in the army of [Root.GetName].\n\nA horrible goose that somehow broke into proceedings: escaped following five casualties."
 magic_project_army_of_the_dead.5.a:0 "More corpses for the hole!"
 undead_military:0 "Necromancy: Army of the Dead"
 undead_military_hint:0 "\n§YUndead Armies§! will not lose morale in battle so long as they have units in reserve. To achieve this, field more regiments in a province than combat width would normally allow!"

 magic_project_army_of_the_dead.6.t:0 "Army of the Dead: Battle Past the Death"
 magic_project_army_of_the_dead.6.desc:0 ""What I would like to understand," [Root.Monarch.GetName] starts, "is why our ‘invincible’ undead army keeps losing on the battlefield, and quite badly too!"\n\nThe court necromancer winces. "It isn't really an undead army. It's more of a mostly-dead army. And mostly dead, as you know, is still somewhat alive. Now if we had a fully-undead army, or even a fully-unalive army, things would be different. But as it stands we have to make do with hole-society rejects. Flunkies that couldn't cut it in hole university or get a hole job."\n\n"What we need," declares one general, "is ZOMBIES. Our issue is we're JUST NOT SCARY ENOUGH. What's scarier than a zombie that eats its own flesh off, or tears off its neighbor's face to eat it? NOTHING."\n\n"NO," shouts another general, "SKELETONS ARE MUCH SCARIER. BONES ARE THE SCARIEST THING IMAGINABLE. I THINK I WOULD DIE OF FRIGHT IF A SKELETON GOT ANYWHERE NEAR ME."\n\nTwo more generals shout over each other. "'What we need are REVENANTS'--'Are you daft? Ghouls are MUCH scarier'--'What even IS a ghoul?'--'it's somewhat unclear, which makes it scarier'--"\n\nThe stable boy speaks up. "I don't get it. If they're invincible, why can I still see them?""
 magic_project_army_of_the_dead.6.a:0 "You say zombies are best? Then why don't you... BECOME ONE!"
 magic_project_army_of_the_dead.6.b:0 "You say skeletons are best? Then why don't you... BECOME ONE!"
 magic_project_army_of_the_dead.6.c:0 "You say revenants are best? Then why don't you... BECOME ONE!"
 magic_project_army_of_the_dead.6.d:0 "You say ghouls are best? Then why don't you... BECOME ONE!"
 magic_project_army_of_the_dead.6.f:0 "Wait wait wait, let's hear what the stable boy has to say."
 magic_project_army_of_the_dead.6.e:0 "No one should have to die for their beliefs! Except for those who already did."
