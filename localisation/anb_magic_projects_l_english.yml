#Cangji
 cangji_project.desc:0 "§YSpiritfire Arts§!\nThe staple art of the Order of the Ashen Soul, spiritfire magic is the cornerstone of magical tradition in Cangji. Expanding the knowledge and control of this technique is a constant effort within our borders."
 cangji_project:0 "Spiritfire Arts"
 cangji_project_lookahead:0 "Unlock the §YCall the Flames§! province interaction, which provides §Ydefensive bonuses§! to provinces §Yadjacent to Eternal Cinder Monasteries§!, while also giving provinces with §Ymountainous terrain§! decreased §Ydevelopment cost§!.\nFurther levels improve §YEternal Cinder Monasteries§!, §YWar Wizards§!, and §YSpiritfire Monks§!."
 cangji_project.name: "Spiritfire Arts"
 cangji_project_level: "Spiritfire Arts Progress"
 V05_unlocked_lvl_2_tt: "Have unlocked the second level of the Spiritfire Arts"
 V05_unlocked_lvl_3_tt: "Have unlocked the final level of the Spiritfire Arts"


 magic_project_cangji_project.1.t: "On the Shaping of Fire"
 magic_project_cangji_project.1.d: "Spiritfire as we know it is a form of energy originating from the spiritual world. With enough psychic concentration and magical force, one can conjure spiritfire from small amounts of flammable material. Materials that were once used to fuel the Undying Flame are particularly useful, as they provide a link with a very powerful mystical source which can be used to easily bridge the gap between material and spiritual. While the summoning of spiritfire can be difficult, the manipulation is even more strenuous, as spiritual energy is often fickle. Many of the Ashen Soul have suffered burned whiskers or singed fur trying to move spiritfire into their desired forms.\n\nWe have developed many techniques which can be used to effect the shaping of fire, but these are crude demonstrations of what spiritfire manipulation could truly bring about. The two popular methods that have emerged from our studies are derived from the Kartya that many of the Ashen Soul study alongside their magic. One technique, based in the aspects of Dekhana, focuses on using spiritfire to augment the effectiveness of one’s magic and physical strikes, granting fists of fire and quickened spells. The other, rooted in Pichka, instead uses spiritfire directly, striking the foe with psychic flames for decisive victories. These two principles can be applied to the monasteries as well, but which one will serve us best?"
 magic_project_cangji_project.1.a: "Our knowledge of Dekhana will strengthen our homes."
 magic_project_cangji_project.1.b: "Our understanding of Pichka will create new opportunities."
 magic_project_cangji_project.2.t: "On the Role of the Brazier"
 magic_project_cangji_project.2.d: "We have made great improvements on developing spiritfire as controlled by a person, but our efforts in improving the implements of spiritfire manipulation have lagged in comparison. A stark example of this is the brazier used by our spiritfire monks in combat, currently a large, bulky contraption which either sits on the back or head of the warrior as they do combat. These braziers have proven to be effective, but they are clunky devices which require careful handling lest they topple from the soldier and into the dirt.\n\nWe have many options for improving these braziers which have recently come to light. By eliminating most of the supporting metal framework, the brazier can still carry spiritfire while being much lighter and more maneuverable than the current version. Of course, this will be more expensive than our current method of spiritfire handling."
 magic_project_cangji_project.2.a: " Pay the craftsmen to lighten the brazier"
 magic_project_cangji_project.2.b: "Lighten the braziers, and use magic to strengthen the frames."
 magic_project_cangji_project.2.c: "They'll simply have to make do."
 magic_project_cangji_project.3.t: "Warm Welcome"
 magic_project_cangji_project.3.d: "Banners are hung throughout Cangyuan as hundreds of mages stream into the central courtyard of the Low Temple. These magical minds were brought from across the land, all having some knack for elemental manipulation and spiritual communion. They gather among the sconces of pink flames that line the courtyard, studying them and making note of their ethereal properties. Suddenly a door is flung open, and the mages go silent as the Ashen Soul enters the courtyard.\n\nThe silver-grey harimari look around the square, and together begin to utter a low incantation before spiritfire bursts from their bodies, illuminating them with a wondrous glow. They turn to the brazier in the center of the courtyard, and with combined powers feed their spiritfire to the bowl of embers. The fire jumps, sputters, and finally expands to create a shining dome of pink-blue light. Within the dome, the cracked ground of the plateau quickly begins to rejuvenate, as grasses and flowers sprout from beneath the cobblestone. The gathered mages cheer, and the Ashen Soul welcomes them inside to further discuss their newfound revelations."
 magic_project_cangji_project.3.a: "With knowledge comes power comes knowledge still."
 magic_project_cangji_project.4.t: "On the Mastery of Water"
 magic_project_cangji_project.4.d: "Spiritfire has become the centre around which the Ashen Soul builds its magical traditions, but the other elemental magic of the sect is still important to consider as we delve deeper into spiritfire manipulation. Particularly, the affinity towards water the Ashen Soul demonstrates has partially fallen by the wayside as we pursue the development of fire magic.\n\nThese techniques are not opposites, but mirrors to each other in how they control and direct the elements. Analyzing one gives us insight on the other, and there is a great deal of insight to glean from water magic. Water is freeflowing, but much more ordered than the erratic movement of flames. Water can be shaped in many ways to serve a different function, and in these forms we find some valuable techniques to apply to spiritfire magic. Of the multitude of different configurations, three have stood out as especially informative. Which should we seek to truly understand?"
 magic_project_cangji_project.4.a: "Water as the spear!"
 magic_project_cangji_project.4.b: "Water as the shield!"
 magic_project_cangji_project.4.c: "Water as the source of life!"
 magic_project_cangji_project.5.t: "On the Psychic Link to Fire"
 magic_project_cangji_project.5.d: "Spiritfire is as much tied to the mind as it is to the body. While we move the flames with our arms, we summon them from our cognition, bringing them to light through force of will. The nature of the psychic connection is poorly understood, but what is known is that the Undying Flame and its embers drastically boost the strength of the connection, allowing for great blazes of spiritfire to be summoned after the caster is attuned to the fire. This boost of magical power has drawn the attention of [Root.Monarch.GetName], who stands in the central courtyard of Cangyuan and watches the brazier flicker in the night.\n\nIf the attunement makes spiritfire more powerful, perhaps a more thorough attunement will make [Root.Monarch.GetHerHim] even more powerful than the masters of the Ashen Soul. The possibilities of what could be achieved with this power flash into view, with masterful diplomacy and decisive martial prowess forming within [Root.Monarch.GetHerHis] mind. Standing before the glorious blaze, [Root.Monarch.GetName] takes a deep breath…"
 magic_project_cangji_project.5.a: "…and grips the coals with a closed fist."
 magic_project_cangji_project.5.b: " …and casts [Root.Monarch.GetHerHis] arms into the open fire."
 magic_project_cangji_project.5.c: "…and steps into the searing flames."
 magic_project_cangji_project.6.t: "Burning Passions"
 magic_project_cangji_project.6.d: "As more knowledge on spiritfire is collected, the archives of our great cities grow. The most resplendent among them, the Silver Spires, is nestled within the bustling streets of Cangyuan, metallic towers stretching into the sky. Breakthrough after breakthrough has been recorded within the scrolls and tomes of the Spires, each detailing a new fundamental property of spiritfire or a revolutionary application for the flames. Today, a different sort of revelation has struck the librarians of the Spires; they've run out of room.\n\nSomehow, every single nook and cranny of the vast library of magical knowledge has become occupied by literature. Stacks of books tower above the halls, scrolls roll haphazardly down stairs, and tomes begin to fly out the windows from the crush of pages behind glass panes. But where others would despair at the immense pile of knowledge, the scholars rejoice and hurriedly summon the pink flames of [Root.GetName]. With resolve, they begin to build.\n\nGiant stacks of stone and glass are placed within the courtyard, and with the effort of hundreds of scholars working together a new tower begins to rise from the assorted materials. Shelves, doors, windows, stairs, balconies, floors, and ceilings all move into place either with direct manipulation or the help of whimsical fire sprites. Eventually, the tower is fully built, and the mages celebrate their new wing before consecrating the tower with its own silvery cap. Satisfied with their construction work, they nod to each other and flood the wing, hoping to fill it up even faster this time."
 magic_project_cangji_project.6.a: "The fires of passion burn white-hot!"
 magic_project_cangji_project.7.t: "On Spiritfire's Renewing Light"
 magic_project_cangji_project.7.d: "Now that the monasteries have been active for a considerable period of time, we have collected a staggering amount of information on how spiritfire rejuvenates the land. By acting as a sort of “pump” for chi and mana in the environment, spiritfire is able to distribute these energies throughout the terrain, making it considerably more habitable as barren desert lands begin to turn lush and fertile. This is the basic concept of how the temples function, but one layer deeper there exists a more obscure mystery; what about the people?\n\nMany people live in these now rejuvenated areas of [Root.GetName]. They have been exposed to the heightened levels of latent mana for a considerable period of time, and surely now find themselves with more energy than previously seen. This phenomenon could serve as an opportunity to us, if we apply it in the right ways to our more daunting tasks. What should we do to get the most from our invigorated citizens?"
 magic_project_cangji_project.7.a: " Reorganize the tax code!"
 magic_project_cangji_project.7.b: "Redesign the manufactures!"
 magic_project_cangji_project.7.c: "Restructure recruitment!"
 magic_project_cangji_project.8.t: "On Playing with Fire"
 magic_project_cangji_project.8.d: "Time and again we have pushed forward in our pursuit of progress, breaking down the barrier between the possible and impossible. But as we raced through uncountable discoveries, we neglected an important tenet that has proven to be the downfall of many great minds over the years; just because you can doesn't mean you should.\n\nSpiritual energy is naturally suppressed by the braziers of the Eternal Cinder monasteries. This proved to be a boon when dealing with crises such as the Facestealers, but other spirits being warded from their territory instead began to grow agitated. Who were these people who stripped them of their homes? Who gave them the right to remove them from ancestral grounds? And so these spirits waited in their weakened state, and very slowly began to adapt to the searing astral heat.\n\nWhen they were ready, catastrophe erupted. All the monasteries in [Root.GetName] simultaneously began spewing giant bursts of flame, which settled on the ground and set it alight. These jets of fire reached far from the monasteries, destroying fields and decimating villages. It seems these terrible eruptions show no signs of slowing down, lest we appease the spirits and convince them to end our torment."
 magic_project_cangji_project.8.a: "Fire is both friend and foe…"
 magic_project_cangji_project.9.t: "Rekindled"
 magic_project_cangji_project.9.d: "At the end of the harrowing period of uncontrolled blazes, mages of the Ashen Soul emerged along with the common people of the land to discover their braziers nearly extinguished. The efforts taken to appease the spiritual powers were draining for both the magic of the Ashen Soul and the strength of the fires burning within the monasteries, and as one grew weak so too did the other. Watching hopelessly as the flames sputtered, the people feared for the first time that the fire would be snuffed out, and their homes lost.\n\nAt that moment, those closest to the braziers suddenly began to feel a tingling sensation, and their hair and fur stood on end across their bodies. From high in the clouds, spirits descended onto the braziers, and began to gather around the flames in droves. As they joined the burning embers, the fires grew larger and larger, until with enough spiritual energy they reached the same strength as once seen before the firestorms began. And while unseen to many, some close to the flames have claimed to even hear a playful laughing sound as they flickered and danced in the wind.\n\nIn any case, with the merging of spirit and spiritfire, the possibilities for our homes and people are truly endless. Who knows what we will accomplish with the spirits on our side? The Ashen Soul looks to take this question and answer it tenfold, as they run off to grab their scrolls and quills as the hunger for knowledge calls them once again."
 magic_project_cangji_project.9.a: "Out of the ashes, we rise anew."
