 #Great Storm loc#Not Done#
 great_storm_project_1.desc:0 "§YWindbearing§!\n§g"To feel the wind in one's hair. To command the gale. To crack the sky.\nAsk yourself, what can wind not achieve? What barriers can it not tear down?\nThere is no gate that shall remain unopened, no pathway left unexplored as we feel the wind enveloping ourselves. Encasing our caehnate in a singular Great Storm!"§!"
 great_storm_project_1:0 "Windbearing"
 great_storm_project_1_lookahead:0 "This will empower our §TWar Magic§! with the strongest of elements: §TWind§!!"
 great_storm_project_1.name: "Windbearing"
 great_storm_project_1_level: "Windbearing Progress"  

 #Black Herd loc
black_herd_project_1.desc: "§YMarkhentakruan§!\n§gIn the days of the old Black Herd, Markhentakruan was their most feared creation, a spell so dreadful that its name alone could scatter armies. When cast, it transformed corpses into explosive vessels of fire, a devastating weapon in the chaos of battle. But when the elders fell to the ogres during the Great Incursion, the spell was lost, and with it the cornerstone of the Black Herd’s power.\n\nThis project seeks to recover Markhentakruan, an essential step in the herd’s revival. The spell now survives only in fragments: broken theories, scattered battlefield accounts, and scraps of forgotten parchment that must be painstakingly pieced together through tireless study and experimentation.§!"
black_herd_project_1: "Markhentakruan"
black_herd_project_1_lookahead: "We will search for our elders lost knowledge and rediscover their great and dreadful spell"
black_herd_project_1.name: "Markhentakruan"
black_herd_project_1_level: "Markhentakruan Progress"
advancing_black_herd_project_1_tt: "The [This.GetMagesName] are progressing the §YMarkhentakruan§! Magical Project"

black_herd_project_lichdom.desc: "§YRejection of Ik Magthaal§!\n§gDeath will not be allowed to stand in the way of Baildelk’s legacy. It is by his hand that the Black Herd has recovered from a century of humiliation, and it will be by his hand that it will continue to rise forevermore. Building upon the research of the ancient ogre necromancer known as the Glutton King, he seeks to cleave his soul from his body and become an undying lich, a living legacy to replace the descendants he will never have.\n\nTo do so is to reject Ik Magthaal and deny oneself paradise. Such a cost is unthinkable to most, but Baildelk will take up this burden willingly, serving Irdaeos eternally upon Halann as his arbiter of life and death.\n\nFor his future, no sacrifice is too great.§!"
black_herd_project_lichdom: "Rejection of Ik Magthaal"
black_herd_project_lichdom_lookahead: "We will attempt to become a §YLich§!, an immortal §YWitch-King§!. Each level progresses our current ruler further along that path. If we succeed, we'll put all of our focus on magic and §YArtificery will be Forbidden§!. If our ruler dies before they become a Lich, §RAll Progress will be Lost§!.\n"
black_herd_project_lichdom.name: "Rejection of Ik Magthaal"
black_herd_project_lichdom_level: "Rejection of Ik Magthaal Progress"
advancing_black_herd_project_lichdom_tt: "[This.Monarch.GetName] is progressing the §YRejection of Ik Magthaal§! Magical Project"

 #Eighard
 eighard_project_1:0 "Senescence"
 eighard_project_1.desc:0 "You feel, within yourself, a gnawing emptiness. When did that appear? You eat and you eat, but still you want more. Need more. Must. Have. More.\n\nWith every bit, you grow stronger. Your body, your mind, your soul, which are not yours, are honed. Injury is nothing. Pain is temporary. Power, though, is forever. What’s a little suffering in the meantime?"
 eighard_project_1:0 "Senescence"
 eighard_project_1_lookahead:0 "The Amber Princess grants us her power"
 eighard_project_1.name: "Senescence"
 eighard_project_1_level: "Senescence Progress"  
