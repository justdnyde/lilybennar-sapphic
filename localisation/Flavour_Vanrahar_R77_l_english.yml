 ### EVENTS
 vanrahar.0.t:0 "The Law of the Jungle"
 vanrahar.0.d:0 "Through our might we have united the lands of the Primal Harimari. The Royal Harimari, our northern cousins, have grown soft and Haless has forgotten our true strength. This is a tragedy, one we shall soon make right. We have already proven that we are mightier than our fellow harimari and by extension obviously mightier than humans. Let it be known, the languid weakness of yesteryear is gone. From now on the Harimraj will know our strength and the humans will be put in their place."
 vanrahar.0.a:0 "We have waited far too long to prove our might!"

 vanrahar.1.t:0 "Not Out of Hate"
 vanrahar.1.d:0 "Bhuvauri’s revolt was caused, in large part, by our ancestor’s oppressiveness. They taxed the slaves beyond what they could take and lost everything. We now make war on Bhuvauri, but we aren’t here to take revenge, for they weren’t wrong to revolt. However, there are those who still wish for our return, and we won’t abandon them. Bhuvauri is much more powerful than us on paper. Their lands are far richer, their navy is unrivalled, and their slave-soldiers the Adasa live only for war. However, we aren’t out of options yet."
 vanrahar.1.a:0 "We still have the Rajathi"
 vanrahar.1.tt:0 "\nWe may call our §YElephant-King Allies§! to arms!\n\nDuring this war, neither we nor §YBhuvauri§! will be able to call in additional allies."

 vanrahar.2.t:0 "The Cradle Awakens"
 vanrahar.2.d:0 "The Ascension Peninsula, the “cradle of Harimar”, has been a land stuck in time. Many amongst them still don’t use gunpowder, primarily hunting for their food instead of farming.\n\nNow, that has changed. A power is rising in the south, and it comes to challenge the very foundation of the Harimraj. They’ve proclaimed their ambition to forge a new state the way that Harimar did—by the sword of conquest."
 vanrahar.2.a:0 "Do they care nothing for Harimar’s legacy?"
 vanrahar.2.tt:0 "All members of the §YRaj§! lose §R-10§! §YTrust§! and §R-50§! (§G+3§! Yearly) §YOpinion§! with §Y[R50.GetName]§!"
 rabaghekhur_upstarts:0 "Upstarts"
 
 vanrahar.3.t:0 "Identity"
 vanrahar.3.d:0 "We stand at a precipice. The very things that make Umdaj Umdaj are being lost, the essence of Umdaj stretched too far over the vast jungles. On the map Umdaj has consumed them but in reality it is they who have consumed Umdaj. They too are Primal Harimari, but unlike us, they are haughty, seeing themselves as above humans and rejecting new philosophies like those of the Guru Suhan. If it is the responsibility of our rulers to represent their subjects then it is clear what the majority of our subjects want.\n\nIt’s just that it goes against what we know to be righteous. We cannot make a compromise here, only decide: do we give in to the desires of our subjects, or do we make war on them yet again in the name of what we believe in?"
 vanrahar.3.a:0 "This is what our people want"
 vanrahar.3.b:0 "We do what is righteous, not what a mob demands"
 vanrahar.3.tt1:0 "§G-100.0%§! Local Autonomy in all owned provinces\n\nWe will gain the following modifier in a mission for §YVanrahar§!:"
 vanrahar.3.tt2:0 "§RNoble Rebels§! rise up in §Y4§! random provinces\n\nBlock formation of §YVanrahar§!\n\nGain the following modifier when we form §YSardhasi§!:"
 
 vanrahar.4.t:0 "Our People Spread"
 vanrahar.4.d:0 "Our settlers have done well for themselves. The fertile Dhenbasana river valley is now populated with our loyal harimari subjects. The community grows steadily and is so far self-sufficient. Everything is moving at a pace in accordance with our predictions. The proximity to the Ascension Peninsula had already made harimari a significant population in the Floating Cities. Now we have increased the population even more; it’s not enough that the rulers are harimari when 90% of the population are farmers. The fostering of new families is needed to make sure society is dominated by harimari, and that will never happen while a super majority of it is human."
 vanrahar.4.a:0 "Finally, things go our way"
 
 vanrahar.5.t:0 "Mighty Monarch on the Lotus Throne"
 vanrahar.5.d:0 "[Root.Monarch.GetName] sits upon the Lotus Throne, the seat of power in the Harimraj. [Root.Monarch.GetSheHeCap] feels uncomfortable with all the finery they wear and the luxury around them: a simpler environment would be much preferred. Still, this is the traditional way of ruling; this is how Harimar himself ruled, and it would be disrespectful to rule any other way.\n\nBut just because [Root.Monarch.GetSheHe] had to rule in luxury didn’t mean [Root.Monarch.GetSheHe] had to act like the decadent Rajas of the Second Harimraj. There wouldn’t be compromises nor pardons for treason. If you did not ask permission, you would not receive forgiveness. It was the Raja’s duty to rule in a way that reminded the subjects what a true monarch looked like: not serene and aloof like a Royal Harimari, but a cold and hard-faced symbol of strength, unflinching and unflappable. The robes and throne may be the same, but the Raja that sits thereon is most certainly not."
 vanrahar.5.a:0 "To the Raja, pillar of the nation"
 vanrahar.5.tt:0 "All other §YHarimari§! nations lose §R-10§! Prestige"
 vanrahar_legacy_black:0 "Legacy of the Black Tiger"
 
 vanrahar.6.t:0 "The World Will Never Change"
 vanrahar.6.d:0 "A harimari overseer, rubbing at the sweat along his stripes, gazed over his lords’ plantation fields. Rolling his jaw, he cursed his boredom, lazily watching as the human slaves picked at the treasured spices that paid his wages. He sneered, thankful that no harimari would ever be a slave in Vanrahar; besides, how would they (he least of all) survive laboring in this agonizing summer heat? Lolling his tongue, he tore a bit off of his lahndi before wiping again at this sweat-drenched brow.\n\nOverseeing the slaves wasn’t exciting, but he couldn’t slack off either: if he overlooked a strange new song, differently colored clothes, or some odd work with their tools, then the slaves could organize, burn the plantation, and escape into the jungle before local forces could arrive to stop them. Not that they’d do well in the jungle, but that didn’t matter to him because he’d burn along with the plantation, either literally if the slaves particularly disliked him or more metaphorically when the actual plantation managers returned.\n\nThe mind-numbing boredom of it all led him to indulge in an idle thought: were they committing the same mistakes that led to the rebellion of Bhuvauri all those years ago? He shook his head, embarrassed at the thought. Vanrahar wasn’t complacent like their mewling cousins who played as warriors while they watched the slaves of Sramaya grow stronger, but...surely those mewling cousins had thought the same thing? Grimacing, he reasoned that he could beat these slaves a hundred times if needed. Still, he couldn’t beat a hundred slaves—no harimari could. Even after all of Vanrahar’s efforts, the humans still outnumbered them massively. What if it was him who needed to crush a second Bhuvauri? In a moment of humility, he admitted to himself he might fail, and if he might fail…\n\nHe slapped himself as a way to escape his own head. He trusted the Raja; [Root.Monarch.GetName] was strong and wise. They gave him his rifle, they gave him his lahndi, and they gave him his coin. The Raja wouldn’t fail, Vanrahar wouldn’t fail, and he (sweat and all) wouldn’t fail. After all, managing slaves now was far more effective than under the dainty Second Harimraj."
 vanrahar.6.a:0 "We’re better than they were, surely."
 vanrahar_purity_white:0 "Purity of the White Tiger"
 
 vanrahar.7.t:0 "Change Is Not Always Good"
 vanrahar.7.d:0 "Standing high above the square, the [Root.Monarch.GetTitle] of [Root.GetName] loomed over a group of dissidents. Rebels, human supremacists, and an unusual addition: a harimari patriarch. Commanding a family dating back to Harimar himself, the aged tiger had lived in Umdaj since the old days before the Prabhi had founded modern Vanrahar. Despite his pedigree, the harimari had the gall to claim Vanrahar had betrayed the ideals of Umdaj, that the pinnacle of harimari civilization was evil.\n\nThe ungrateful cur didn’t seem to care that he and his admittedly prestigious family had benefited greatly from Vanrahar’s policies. Well, if this was what he wanted, this is what he’d get. He seemed to be dictating his obituary to us, spouting that harimari and humans should be treated equally and that he would die without the privilege of his stripes or his title alongside these human criminals. \n\nThe patriarch’s words carried across the crowded square, weaved along inner-city walls tall enough to eclipse several city blocks, and through the titanic main gate. Amid the darkness, a terrible roar ruptured the words, reverberating back to the execution square and silencing all in attendence. Death quaked, followed by the thunder of a towering step. Then another. Another. \n\nThe city gates rumbled as the great beast lumbered through the cleared streets, reveling in its call to destroy. Standing twice as tall as an elephant, the Rajathi rattled even the fiercest defiance of the arrayed criminals. Humans and harimari onlookers stared, their breath frozen with a grim reminder: though the world was fickle, the Rajathi never betrayed, never rebelled, and always stood by the Raj’s side. The creature’s rider looked to the stands, their hand tightening around the great beast’s reins, and with a solemn nod from the [Root.Monarch.GetTitle], the elephant-dwarfing Rajathi thundered forth, trampling the dissidents in gory triumph. As the Harimraj’s foes splattered one scream after another, a bloody grin graced [Root.Monarch.GetTitle] [Root.Monarch.GetName]’s face."
 vanrahar.7.a:0 "Only the dead can be heroes, the living may always fall."
 
 vanrahar.8.t:0 "Freedom in Death"
 vanrahar.8.d:0 "Sramaya burns. One of the greatest cities in Haless (perhaps even in all of Halann) has been reduced to a shadow of a shadow over just a few short months ago. After capturing the city of rebels and slaves, none have been spared the wrath of the Southern Harimraj. For weeks, everything valuable was seized, and any traitorous dog lingering in the city was killed.\n\nWhen the Raja of Vanrahar finally felt it was enough, the order was given to cease, commencing the next phase in the destruction of Bhuvauri’s legacy. A great convoy of harimari settlers entered ruined Sramaya, their needs easily covered by loot from the city. After all, even though it was home to traitorous rats, it’s no accident Sramaya became successful; the Kharunyana and Dhenbasana river confluence allowed the city to dominate trade from the sea to upriver markets.\n\nIt shall do so again, but this time the city will not support fickle humans but a loyal harimari community. When Sramaya inevitably rebounds thanks to its important trade, it will stand as a great city of harimari excellence."
 vanrahar.8.a:0 "They died on their feet, yet died all the same."
 
 vanrahar.9.t:0 "Paper Crimes"
 vanrahar.9.d:0 "The humans have been very opposed to our new policy. They know they can’t stop us, but that’s not stopped them from resisting us. Their new favorite pastime is filing hundreds of claims and other nonsense, and even though none of them have a snowflake’s chance in, well, Vanrahar of succeeding, the state has to pay to process each inquiry. Their plans to stifle our bureaucracy out of spite is working, much to our chagrin."
 vanrahar.9.a:0 "We need some law against this"
 
 vanrahar.10.t:0 "A Home for Veterans?"
 vanrahar.10.d:0 "The growth of the harimari population in our new colonies has been slowing; There just aren’t enough harimari to grow the population as fast as it needs too. This is the consequence of our cousins being content to laze around all day and not take land for themselves. Coincidentally, many army reserves have shown an interest in the region. Let us release them of their duties so they may bolster the harimari population."
 vanrahar.10.a:0 "Very well, we have spares"

 vanrahar.11.t:0 "[Root.GetMonsterWestEventTitle]"
 vanrahar_monster_west_event_title_zokka:0 "The Darkness Recedes"
 vanrahar_monster_west_event_title_jaddari:0 "The Jaherian Menace Rebuked"
 vanrahar_monster_west_event_title_neither:0 "A Natural Extension"
 vanrahar.11.desc_zokka:0 "IIt is done. The gnolls have been defeated. The mad beast Zokka and his pack have been thrown back; hopefully this proves to be a deathblow to their horrid “state”. Rahen has so far been protected from gnollish invasion by the genies who ruled the Salahad before the Day of Ashen Skies. In more recent times, mountains and desert have prevented any incursions, but we weren’t going to wait and see if Zokka could be the first gnollish conqueror to overcome these barriers.\n\nNearly matching a harimari’s natural strength, gnolls also employ foul magics, making them a great challenge. Through holding fast to our traditions and sharpening our claws (unlike our soft brethren), we weathered their attacks. Plans are already being drafted for military colonies along the Salahad coast to serve as a bulwark between Rahen and Zokka’s pack (or whatever roving pack succeeds the so-called “Devourer-of-Suns”). Gnolls have never threatened Rahen before…"
 vanrahar.11.desc_jaddari:0 "It is done. The cultish acolytes of the mad son of Jaher have been decisively defeated by our superior might. Though they had impressive cavalry, they could not outrun us forever. The Salahad coast has been conquered, and our bureaucrats now draw up plans to settle strategic areas to secure it. The memory of Jaher’s conquest is not so easily forgotten, and celebrations erupt all across Vanrahar.\n\nThis will go no small way towards rehabilitating our image after we refused the soft rule of our cousins. Some of these elves are old enough to remember when Haless was under elven rule, but we will make sure that their descendents will not be able to even conceive of a Haless dominated by elves. Jaddar’s insane ideas (even worse than Suhan’s) will surely be discredited in the minds of our people after this."
 vanrahar.11.desc_neither:0 "The Salahad coast is ours. Aside from worthless sand, there are a few important trading ports along the coast, such as the city of Davharral. Though unwise to nurture the barren desert, Davharral is still an important Raheni city, and leaving it outside our control makes little sense. Though culturally Bulwari, these lands are far closer to Rahen’s heartland than Bulwar’s. It’s only natural that the Raheni should dominate these lands rather than those across the vast Salahad.\n\nThe only reason we haven’t yet was because of nomadic desert tribes. Attacking settlements and retreating swift enough to avoid retribution, their raids made any presence on the coast a drain. With firearms becoming more prevalent, we have started to repel these raiders with ease. Not that we wish to dominate the Salahad desert, but the easy-to-provision coast is good enough for us. With new settlements of harimari, all shall soon come to recognize that the Salahad coast is part of the Raj’s natural borders."
 vanrahar.11.a:0 "[Root.GetMonsterWestEventOption]"
 vanrahar_monster_west_event_option_zokka:0 "…and as long as we breathe, they never will."
 vanrahar_monster_west_event_option_jaddari:0 "The Jadd will struggle to recover from this blow."
 vanrahar_monster_west_event_option_neither:0 "Still, our people really aren’t used to sand."

 vanrahar.12.t:0 "Efforts of the State"
 vanrahar.12.d:0 "Harimari are likely the youngest sentient race on Halann, and, as such, we haven’t had a chance to truly establish ourselves. Still, it is upsetting that we only have the Ascension Peninsula to truly call home. Even the elves, who (from what we know) had their homeland destroyed, possess realms of their own in Bulwar and the far-off land of “Cannor”. Embarrassingly, the Royal Harimari have been content to merely dominate a city or two.\n\nThe Ascension Peninsula alone is not enough to secure a base of loyal harimari to draw on, so we’ve decided to use a new method. The state will introduce tax cuts for any harimari family with children: the more children, the higher the tax cut. This way, we hope to rapidly increase the harimari population with guaranteed jobs once worked by the local humans.By favoring harimari over humans at every level of the caste system, the humans shall become embittered by their degrading livelihoods.\n\nWe shall not capitulate to them. We predict there is still some time before their movement grows strong enough to challenge our state, and by then we should hopefully have enough fighting age harimari."
 vanrahar.12.a:0 "We steel our claws as the storm fumes on the horizon."

 vanrahar.13.t:0 "The “Real” Suhan"
 vanrahar.13.d:0 "Suhan and his Praxis have been a disaster for Raheni society. It has made the humans disobedient and led other harimari to believe in falsehoods, like denying their superiority over humans. No matter how hard we try, Suhan's ideas seem impervious to any counter arguments, so a different approach is needed. We shall enlighten the people about the “real” Suhan with several anecdotes.\n\nFor example, one day Suhan was on a sinking ship. As the water roiled, Suhan scampered into an escape boat and began rowing away! The remaining passengers cried out from the deck.\n\n“Suhan! There are still children on the boat”, but Suhan replied, “I appreciate the offer but I am not hungry.”\n\nAnother time while Suhan was in the Hall of Endless Debate, a kobold approached him to cogitate. Confused, Suhan looked down at the kobold, exclaiming, “Oh dear! Someone's pet is loose!”\n\nSuhan's followers, obeying a whim, gifted him a chariot. After drinking many “pain relief potions” from Khandi, he began to pilot the vehicle with abandon. He soon came across a school for hobgoblin children, crashing his chariot into— Actually Suhan wasn’t being evil there. Scribes! Redact that.\n\nHow could anyone associate themselves with Suhan after this? These “true stories” shall be disseminated across the realm. Now it’s unlikely people will recognize the validity of these stories immediately, but if we keep repeating them, then eventually our citizens will start believing at least some of them, right?"
 vanrahar.13.a:0 "And the Oni told him how to…"

 vanrahar.14.t:0 "Locals Rebel!"
 vanrahar.14.d:0 "The local residents of [rebel_province.GetName] are outraged by the new harimari colonists taking away their livelihoods with support of the state, leaving them destitute. They demand that our settlers leave or that we help them relocate to another province. This is already bad enough, but now they have committed treason by raising arms to enforce this. It’s a shame to waste perfectly good humans, but, if we negotiate now, it will send the message that threatening violence is a way to get what they want —an unacceptable answer."
 vanrahar.14.a:0 "We’ll help them relocate...to the spirit realm!"

 vanrahar.15.t:0 "Cast the Die"
 vanrahar.15.d:0 "An enormous guerilla resistance has been growing across the Harimraj. Bearing the symbol of the bloody lotus, they declare their intent to destroy the Lotus Throne and cast the harimari out of rulership. They strike from the shadows and fade into local communities, making it impossible to fight them conventionally, until now.\n\nBy a stroke of luck, we captured a very popular rebel leader beloved by all. Kind, gallant, brave, and suave, we killed him—publicly and very painfully. A crowd-turned-mob gathered to try and free him, but the soldiers stationed at the execution massacred the rabble.\n\nWord spread like wildfire, and now people are revolting in the street, which is exactly what we wanted. Now that the rebels are out in the open, the rebel leaders will have to come out as well, lest they leave their supporters leaderless and disorganized.Still, there are many more rebels than we expected. This is going to be a long war."
 vanrahar.15.a:0 "There’s no turning back now."
 vanrahar_blood_lotus_tt:0 "We will undergo a much more difficult §RBlood Lotus Rebellion§!. §RBlood Lotus Rebels§! will rise up in ALL §YHuman Culture§! provinces."

 vanrahar.16.t:0 "A Humbling"
 vanrahar.16.d:0 "In the year 1444 AA, the united hobgoblins of the Command seemed poised to ravage Haless and forge a great empire. Perhaps if they faced our weak and decadent cousins, they could have been successful, but it was not so. They faced us, and, unlike our cousins, we have not lost what let us dominate Haless all those years ago.\n\nHaving previously crushed the hobgoblins, it was a foregone conclusion we would dominate Shamakhad once again. Now, Haless recognizes once more that the heirs of Harimar are the mightiest. Like our glorious scion, we shall conquer all we desire: Shamakhand, Yanshen, Bomdan, and even further.\n\nAt the top of every food chain, there is an apex predator, a creature so powerful nothing else dares to prey on it. The Command deluded themselves with unreproachable lions, boars, and wolves, but the only apex predator the jungle knows is the tiger. It was Harimar who made those weaker-than-human hobgoblins flee to the dwarf caves, but the lesson clearly didn’t stick the first time. Let there be no ambiguity this time: Rahen is not theirs to conquer."
 vanrahar.16.a:0 "And let them know there’s no third chances"

 vanrahar.17.t:0 "A Victory to Last"
 vanrahar.17.d:0 "At last, it is done. The rebels and their sympathizers have been entirely defeated. With battles so grueling, it was impossible to tell the difference between a rebel fighter and a civilian, and, eventually, many of our warriors stopped caring. A recent census has shown that huge swathes of humans have been killed as well as a similar percentage of harimari.\n\nEvery effort is being made to help harimari communities recover from the devastation. We wish we could leave the humans to rot for this betrayal, but they are still needed, so we must provide vital aid to key human communities as well.\n\nWhen we dragged the rebel leaders to “talk”, there was no negotiation; they were a conquered people and treated as such. We dictated that there would be no more humans in the upper caste, that harimari would be given preference in all castes; any prior preferential treatment for harimari would remain unchanged.\n\nThe rebels for their part listened quietly with a dullness in their eyes, for they too knew it was the end. There would be no “next time”; They had fought with everything they had and lost. Even though humans will likely always be the largest race in Rahen, we've stripped them of their remaining power. Catching us off guard at first, we analysed and countered the “indomitable human spirit”—they think too highly of themselves."
 vanrahar.17.a:0 "A Harimraj Harimar would be proud of"
 vanrahar.17.tt:0 "We may now form the §YHarimraj§!"
