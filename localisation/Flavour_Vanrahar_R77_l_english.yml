l_english:
 ### MISSIONS
 vanrahar_1_faith_forefathers_title:0 "Faith in Our Forefathers"
 vanrahar_1_faith_forefathers_desc:0 "Harimar soon after leading the conquests of Rahen soon discovered the truth about enlightenment and the High Gods. Even great Harimar did not know all, however and so empowered the scholarly caste to continue delving the mysteries of the High Gods and find the path to Purtara. As the path to Purtara is a challenge for even the wisest and most learned of men to divine, we should ensure that the unenlightened masses don’t bring disorder and confusion by misinterpretting texts. Let us leave the philosophy to the philosophers and the labor to the laborers."

 vanrahar_1_into_inner_rahen_title:0 "Into Inner Rahen"
 vanrahar_1_into_inner_rahen_desc:0 "Inner Rahen is the heart of the Harimraj, where the first great harimari palaces were built. Taking this land will send a message to the rest of Rahen: A new time has come."
 vanrahar_1_take_the_western_kingdom_title:0 "The Western Kingdom"
 vanrahar_1_take_the_western_kingdom_desc:0 "The last stretch of the Dhenbasana river valley before the river disappears into the Ghankedheni hills, and the westernmost part of those fertile plains. This land is an essential part of southern Rahen. It will be ours."
 vanrahar_1_take_the_western_kingdom_effect_req:0 "If our capital is NOT §YDhenijansar§!"

 vanrahar_1_secure_the_coast_title:0 "Secure the Coast"
 vanrahar_1_secure_the_coast_desc:0 "Too long the coastal kingdoms of Rahen have defied the Raj. Well if the old Raj can't take these lands, then we shall."

 vanrahar_1_praxis_crushed_title:0 "The Praxis Crushed"
 vanrahar_1_praxis_crushed_desc:0 "After that silver-tongued snake Suhan spat out his nonsense for all Rahen to hear, the humans have become much more resistant to accepting their rightful place beneath us. We cannot hunt down every last one of his brainwashed cultists, but at least the majority aren’t militant. With our might, we can keep the rest of them out of the core lands of the Harimraj. Once this is done, perhaps we can “teach” the people the truth about Suhan."
 vanrahar_1_praxis_crushed_trigger:0 "No country with its capital in §YRahen Coast§!, §YRakhadesh§!, and §YDhujat§! regions follows §YSuhan's Praxis§!"
 vanrahar_1_praxis_crushed_effect:0 "Guru Suhan EXPOSES HIMSELF (Caught in ink and paper [GetYear] AA)"

 vanrahar_1_demoting_elephant_title:0 "Demoting the Elephant Lords"
 vanrahar_1_demoting_elephant_desc:0 "The elephant lords of Dhugajir have long ruled with impunity, swearing loyalty to the Raj but acting with total freedom. It does not help that their elephant husbandry gives them no small amount of strength in battle. Still, they shall fall before us as they did before Harimar; Their great autonomy, a centuries long mistake, shall be revoked.\n\nThis shall benefit us more than just a mere conquest since elephants, unlike horses, are not afraid of harimari and can be used as cavalry. If we can “persuade” the keepers of the great herds to share their secrets, we can improve the mobility of our armies."
 dhujat_elephant_herds:0 "Dhujat Elephant Herd"

 vanrahar_2_establish_strength_title:0 "Establish Strength"
 vanrahar_2_establish_strength_desc:0 "Our land is old and ancient. Home of the great harimari warriors of yore. Let us establish an army that echoes this greatness and get ready to show the world what it means to be harimari."
 vanrahar_2_establish_strength_tt:0 "Gain §G+10§! (§R-1§! Yearly) Opinion with all members of the §YRaj§! that do not neighbor us"
 vanrahar_showed_strength:0 "Showed Strength"

 vanrahar_2_take_the_western_jungle_title:0 "Take the Western Jungle"
 vanrahar_2_take_the_western_jungle_desc:0 "The Ascension Peninsula is where the harimari first awoke. It is only right that these ancient jungled hills lie at the core of our harimari state."
 vanrahar_2_the_jungle_our_own_title:0 "The Jungle, Our Own"
 vanrahar_2_the_jungle_our_own_desc:0 "The jungle of the Ascension peninsula have been our home since our earliest beginnings. It stands without reason that it should remain ours and undisputedly ours. Any invader will be met by a jungle up in arms, as they would had they disturbed an ant-hill."
 vanrahar_2_high_temple_archaeology_title:0 "High Temple Archaeology"
 vanrahar_2_high_temple_archaeology_desc:0 "The High Gods left many temples scattered all across Haless. One of the main ones lies within our country. However there is still so little we know of these divine beings. In order to truly be able to ascend to their status we must intensify our research and find more of their secrets!"

 vanrahar_2_monster_west_title:0 "The Monster of the West"
 vanrahar_2_monster_west_desc:0 "[Root.GetMonsterWestDesc]"
 vanrahar_monster_west_zokka:0 "A pack of gnolls has taken root in the West. This normally wouldn’t be a cause for concern, but this pack is led by a powerful and ambitious warlock named Zokka. It is said he cannot be killed—not permanently—and that he wishes to devour all light. This is not a threat we take lightly; he shall find his magic will not avail him against our superior might. If the dog wants to reach for the stars, we’ll drag him back down to Halann and break his spine."
 vanrahar_monster_west_jaddari:0 "The elves muster on the border once again and will no doubt turn their eyes on Rahen as they did in the past. After the First Harimraj fell, Jaher conquered Haless, and this splinter legion would certainly do the same if given the chance. They are complete fanatics, devoted to their sun cult and willing to kill any who refuse to worship their foreign god. They have a great amount of experience on their side thanks to their long lives, but we have the legacy of Harimar on ours! Let us prove that the first time was a fluke: the harimari will not be subjugated by elves again!"
 vanrahar_monster_west_neither:0 "The Salahad, though seeming like a useless desert, provides a great opportunity to further dominate trade in the Gulf of Rahen. It will form the first step towards a land connection to the rich yet underutilised lands of the Mengi. However, we aren’t going to put the cart before the horse as we still need to secure the Harimraj and overcome any challengers in Haless before we can think about dominating Sarhal, but it wouldn’t be bad to start soon."
 casualties_from_battles_won:0 "Casualties from Victorious Battles"
 casualties_from_battles_won_bulwar:0 "Casualties from Victorious Battles Against Bulwari Nations"
 vanrahar_2_monster_west_effect:0 "Prey upon §YBulwar§!, gaining §YMissionary Strength§!"

 vanrahar_2_the_truth_the_high_gods_title:0 "The Truth of the High Gods"
 vanrahar_2_the_truth_the_high_gods_desc:0 "Many years of study and we have found several secret chambers in the great temple of the ascension peninsula. One great artefact they found appears to be some sort of pedestal with a gem. Our wizards say that this is what might be at the heart of the ancients' power. If we awaken it, it may provide us great benefits!"
 vanrahar_2_tribal_subjugation_title:0 "Tribal Subjugation"
 vanrahar_2_tribal_subjugation_desc:0 "The tribes of the Ghankedheni have long been semi-independent from the control of the Raj. It is time we put these people in their proper place as servants of the harimari."
 
 vanrahar_3_overlord_of_dhujat_title:0 "Overlord of Dhujat"
 vanrahar_3_overlord_of_dhujat_desc:0 "As the overlord of Dhujat we can finally claim the full defense of the Kharunyana. The river is ours to control and the cities' scholars are ours to question. Oh, tt is great to be the strongest."
 vanrahar_3_overlord_of_dhujat_trigger:0 "Is in a Fort's §YZone of Control§!"
 vanrahar_3_overlord_of_dhujat_effect:0 "Gain the §YLiberation§! Casus Belli against the country with the most owned provinces in §YXianjie§! Region"

 vanrahar_2_rule_harimari_title:0 "The Rule of the Harimari"
 vanrahar_2_rule_harimari_desc:0 "Ever since mighty Harimar conquered Haless, harimari have ruled many nations yet dominated none. There are simply too few harimari to truly dominate society, even in our greatest conquest of Rahen. Our Jungle Paradise, or “Vanrahar” was the only place where this was different—a society dominated by harimari, not just governed.\n\nIt’s time to redefine what the Harimraj is. It is not a human nation with a harimari ruling caste, it’s a harimari nation that rules over humans. Those fools who would see Rahen returned to human rule should already know this, but they refuse to face us in battle honorably. We need to draw them out, and luckily we know how."
 vanrahar_2_rule_harimari_effect:0 "This will begin the §RBlood Lotus§!. Be prepared!"

 vanrahar_2_terror_rahen_title:0 "The Terror of Rahen"
 vanrahar_2_terror_rahen_desc:0 "[Root.GetTerrorRahenDesc]"
 vanrahar_2_terror_rahen_command:0 "The greatest threat to the proper order of things is this “Great Command”. They hate the gods, do not acknowledge the caste system, and are not content to keep to themselves, expanding without check. This is entirely different from us reclaiming our rightful lands: how dare they subjugate our serv—erm, our citizens! Ever honored Harimar drove these vainglorious hobgoblins out of Shamakhad and into the Jade Mines, but perhaps even he could err as he didn’t finish them off. As his proud people, we are the only ones who can match the military prowess of these hobgoblins.\n\nTo war! Rahen isn’t theirs to conquer!"
 vanrahar_2_terror_rahen_heroes:0 "The Ruin Kingdoms of Shamakhad were weak, disorganized, and pitiful. Harimar conquered them without much trouble, and even the hobgoblins nearly managed it. It’s not a glorious finale, but we shall finally prove our dominance over Rahen by consolidating its most pathetic subregion."

 vanrahar_3_conquer_the_eastern_jungle_title:0 "Conquer the Eastern Jungle"
 vanrahar_3_conquer_the_eastern_jungle_desc:0 "The jungle east of the Ascension Peninsula was one of the earliest areas to be settled by the newly ascended harimari. As such it is part of our ancient homeland. We cannot leave that land to the protection of lesser harimari."

 vanrahar_3_seize_the_floating_cities_title:0 "Seize the Floating Cities"
 vanrahar_3_seize_the_floating_cities_desc:0 "The Floating Cities are some of the richest in Rahen. This area is one of places with the most intensive cohabitation of harimari and human. We must take this area as it will serve as our example for the rest of Rahen and our harimari brethren for how the caste system is supposed to be structured."
 vanrahar_3_seize_the_floating_cities_effect_tt:0 "All owned §YRoyal Harimari§! provinces lose §G-5§! §YYears of Separatism§!"

 vanrahar_3_dominate_the_kharunyana_title:0 "Dominate the Kharunyana"
 vanrahar_3_dominate_the_kharunyana_desc:0 "The Kharunyana is the ancient border between Rahen and the rest of Haless. If we are to make a truly secure home for the harimari we'll have to take and fortify this border. Their walled cities will be the walls of the harimari!"
 vanrahar_3_dominate_the_kharunyana_effect:0 "Every owned §YPorcelain§! province gains §G+1§! Base Production"

 vanrahar_3_punish_the_rebel_title:0 "Punish the Rebel"
 vanrahar_3_punish_the_rebel_desc:0 "The Raj was put to shame by the humans rising up. This 'Bhuvauri' is a stain on our harimari pride. We shall put them back into their place, shatter their resistance and demolish their stronghold. The world will know that we don't tolerate such behaviour."
 vanrahar_3_punish_the_rebel_effect:0 "Pillage and sack §YSramaya§!, decimating its development and purging its people. Take everything for ourselves and our capital."

 vanrahar_3_across_the_river_title:0 "Across the River"
 vanrahar_3_across_the_river_desc:0 "We have secured our side of the Kharunyana. Now it is time to remind the rest of Haless why it was Harimar the conquered the continent and not some puny human warlord! Even Jaher failed at that. Let's do our ancestors proud and cross the river claws out and fangs bared!"
 vanrahar_3_across_the_river_effect:0 "When vassalized, [This.GetName] will gain a permanant claim on the §YBomdan§! Region. If they are made into a §YMarch§!, they will retain the §YMarch Bonuses§! no matter how large they grow!"
 vanrahar_3_across_the_river_trigger:0 "They are the §YLargest§! nation with a capital in §YBomdan§!"

 vanrahar_3_restoring_raj_title:0 "Restoring the Northern Raj"
 vanrahar_3_restoring_raj_desc:0 "Just north of the Second Harimraj’s territory is the Nadimraj, or “Northern Raj”, which split away after the Phoenix Empire’s authority collapsed. These lands are ruled by adventurers, but adventurers are good for adventuring, not politics. Let's remind them of this fact. \n\nThrough our grace, they can keep some token power—more than the other humans at least. This way, they can deal with all the problems beneath our notice, and by settling the most important areas of the Nadimraj, we can make sure the adventurers don’t get any ideas about trying to change the castes."

 vanrahar_4_trials_of_strength_title:0 "Trials of Strength"
 vanrahar_4_trials_of_strength_desc:0 "Our cubs are vicious, and we must make sure they stay that way. We'll introduce the Trials of Strength, to weed out the weak young from the strong. Only that way will we ensure that our nation stays strong."
 vanrahar_4_expand_the_warrior_caste_title:0 "Expand the Warrior Caste"
 vanrahar_4_expand_the_warrior_caste_desc:0 "We are strong, but we can be stronger. We need more strong arms, more sharp claws, more vicious roars. An expansion of the warrior caste is in order for us to truly be respected."

 vanrahar_4_servitude_of_mankind_title:0 "Servitude of Humankind"
 vanrahar_4_servitude_of_mankind_desc:0 "The lowest castes are those of the humans and other weaker races. Along the Dhenbasana and elsewhere in Rahen, this division has started to weaken. Now we control great quantities of the human populace again, we must make clear what the place of the lower classes are: To serve the higher classes."
 vanrahar_4_servitude_of_mankind_effect:0 "From now on, every owned §YHuman§! culture province will gain the following:"

 vanrahar_4_bridging_gap_title:0 "Bridging the Gap"
 vanrahar_4_bridging_gap_desc:0 "Only in the Ascension Peninsula are we the majority race: everywhere else, our kind is a small minority of the population. The last credible census conducted by Manava before the Second Harimraj’s decline stated that humans outnumbered harimari roughly 4 to 1. Such a stark ratio means that the number of harimari warriors we can field is much lower than what the population of our state might suggest. We’ve been growing harimari communities, but more support seems needed if we are to maintain our rate of conquest. Besides, our relatively small numbers are starting to give the humans some ideas."
 vanrahar_4_bridging_gap_effect:0 "MASSIVELY improve our cultural conversions"

 vanrahar_4_rule_claw_title:0 "Rule of the Claw"
 vanrahar_4_rule_claw_desc:0 "Other harimari have let themselves slack off, giving the bureaucrats too much power. Those fools don't understand that rulership comes from strength. Claws and blades control a country, not paper and ink."

 vanrahar_rule_claw:0 "Rule of the Claw"
 vanrahar_rule_claw_desc:0 "The primal truth of life is that strength matters above all. What good are ideals if they cannot be protected? What use is birthright if another can strip it from you? And what is gold but a weak, pliable metal given value only by common consensus? Just as the nation must be strong outwardly, it ought to be strong inwardly as well. Instead of weak bureaucrats and ministers, let the mighty govern, for only the mighty can protect order and our great society."

 vanrahar_4_the_tearing_claw_title:0 "The Tearing Claw"
 vanrahar_4_the_tearing_claw_desc:0 "Generations of warriors have been training and learning, passing on their knowledge. Finally this has culminated in the rise of a prodigy. Recently graduated from the Vanrahar academy, this cadet is a true genius. If anyone is deserving to lead our nation it is him!"

 vanrahar_4_mightiest_martial_title:0 "The Mightiest Martial Arts"
 vanrahar_4_mightiest_martial_desc:0 "The Xia warrior-monks have dedicated themselves to becoming the most fearsome fighters in Halann. They have warriors from all the civilised races in Haless, including many harimari. However, these harimari seem confused: they have forgotten that Harimar already knew the best way to fight, and his victories are proof of that. The Xia claim to be the mightiest warriors in all Haless, but that honor has always belonged to the Harimraj (our northern cousins who have grown soft). Despite their lazy paws, we remain strong as ever!"
 vanrahar_4_mightiest_martial_trigger:0 "Capital is NOT in §YXianjie§! and does not own §Y12§! provinces in §YXianjie§! region"

 vanrahar_5_dig_training_pits_title:0 "Dig Training Pits"
 vanrahar_5_dig_training_pits_desc:0 "With the expansion of the warrior caste we need additional facilities to keep the skills of our troops well honed. New training pits in even the remotest villages will allow us to pull well trained warriors from all over our country."

 vanrahar_5_build_warrior_housing_title:0 "Build Warrior Housing"
 vanrahar_5_build_warrior_housing_desc:0 "The restructuring of our society around the martial core of our countries means that many old homes have become obsolete. We must build new dwellings for our warriors, to reinforce group mentality and nationalistic zeal."
 vanrahar_5_build_warrior_housing_effect:0 "From now on, §YRegimental Camps§! grant §G+200§! Local Manpower and §YConscription Centers§! grant §G+400§! Local Manpower"

 vanrahar_5_the_vanrahar_academy_title:0 "The Vanrahar Academy"
 vanrahar_5_the_vanrahar_academy_desc:0 "Our culture is rich in great warriors and experienced generals. But in order to capture all this skill and knowledge we must build an academy to transfer this knowledge through the generations. The founding of the Vanrahar Academy will allow us to teach the next generation the skills of our most experienced soldiers and officers."
 vanrahar_5_build_warrior_housing_trigger:0 "Developed Base Manpower §Y1§! time"

 rabaghekhur_5_place_raj_title:0 "Our Place in the Raj"
 rabaghekhur_5_place_raj_desc:0 "For a very long time, we have dominated the Ascension Peninsula. As a loyal Senapti of the Raj, we have maintained both the old ways and order in the cradle of Harimar. The Raj however has become corrupt; it is plain for all to see. The Prabhi grow rebellious, and if the Raja cannot subdue them, then the duty falls to us. All we need to do is get formal permission from the Raja."
 rabaghekhur_5_place_raj_trigger:0 "Have the largest army out of all the §YSenapti§!"
 hired_dip_advisor_of_level_2_tt:0 "Diplomatic Advisor has skill of at least §Y2§!"

 rabaghekhur_5_shaking_torpor_title:0 "Shaking Off the Torpor"
 rabaghekhur_5_shaking_torpor_desc:0 "For centuries, the Ascension Peninsula has been in a torpor. Nothing has changed about the way we live. We are proud of this fact, but we must acknowledge that this is not the same world Harimar walked. We may have maintained our ways, but we did nothing as the rest of our kin have grown lax and soft.\n\nNo more.\n\nOur kind came forth from the Ascension Peninsula and conquered Haless all those years ago, and we shall do so again no matter who—human or harimari—stands against us."
 rabaghekhur_5_shaking_torpor_effect:0 "The §YRaja§! loses -50 legitimacy, and members of the §YRaj§! lose §YTrust§! and §YOpinion§! with §Y[Root.GetName]§!"

 rabaghekhur_5_true_raj_title:0 "The True Raj"
 rabaghekhur_5_true_raj_desc:0 "We have always been loyal to the Harimraj, the greatest surviving harimari state, but that meant we could no longer tolerate an unworthy Raja leading it to ruin. We have proven our worthiness, for we have the right of tooth and claw, the right of might. None can contest our claim to the Lotus Throne as the true Raj—the Third Harimraj.\n\nPetty succession disputes won’t break us like the First Harimraj, nor shall we grow decadent and lazy like the Second Harimraj. Our strength is ironclad and enduring, and so long as that might remains, we shall not fall. If we weaken like our cousins, then we are already doomed."
 rabaghekhur_5_true_raj_trigger:0 "Have more §YDevelopment§! and a larger §YArmy§! than any other nation with §YHarimari Administration§!"
 rabaghekhur_5_true_raj_effect:0 "We have proven that the §YHarimari§! people are supreme!"

 tujgal_5_tooth_claw_title:0 "By Tooth and Claw"
 tujgal_5_tooth_claw_desc:0 "Though we have kept our traditions pure, the rest of the Raj has paid us only evil. Our most prized territory, Pahruavan (the most beautiful place in the whole Ascension Peninsula) was stolen from us. The scheming Raghabekhur and the decadent Raja seized it under the pretense of defending the land from invasion by Bhuvauri. Though the Raja made the occupation legal, we know the real reason it was taken: they were strong, and we were weak.\n\nThere is only one true authority in the world—tooth and claw! Through it, we shall gain our land back."

 tujgal_5_break_oghaprabhi_title:0 "Break the Oghaprabhi"
 tujgal_5_break_oghaprabhi_desc:0 "Around the Ascension Peninsula lie the Oghaprabhi—petty nobles ruling tiny pieces of land. This system is terribly inefficient and is a major reason the peninsula remains underdeveloped. By consolidating all these small estates under state control, we can tap into the potential long hidden in the jungle. Though the petty nobles will mewl in protest, they cannot hope to stand against us. We were already mighty, but we wonder how much more our enemies will fear us when the full potential of the Ascension Peninsula is unleashed."
 tujgal_5_break_oghaprabhi_effect_tt:0 "§Y4§! random provinces get §G+2§! Base Production and spawn §RNoble Rebels§!"

 tujgal_5_prosperous_pure_title:0 "Prosperous, Powerful, Pure"
 tujgal_5_prosperous_pure_desc:0 "Our mighty Jungle Paradise, our mighty Vanrahar, flexes more than a strength of arms. Sometimes cohabitant with harimari decadence, our lavish spices yield ships full of treasure in foreign markets across the seas. We enjoy these native luxuries as much as our Royal Harimar cousins, but we exercise restraint, never nibbling on our own supplies while ensuring the profitable exports reach distant lands like Cannor.\n\nThough we are strong, we are not blind. We understand that the mightiest strength is power over others, and while this can be gained through the sword, it can also be gained through gold. With our strength of arms and purse, Vanrahar shall remain mighty forever. After all, unlike the Royal Harimari we are not working the slaves to make luxuries for ourselves."

 umdaj_5_ace_rajathi_title:0 "Our Ace: The Rajathi"
 umdaj_5_ace_rajathi_desc:0 "We have lost much to Bhuvauri, and all of it is our fault. Our ancestors treated them so cruelly that they rebelled, but we do not seek revenge against them. Still, there are those loyal to us in Biyijinda, and we will not abandon them. Bhuvauri has grown prosperous off of trade, and we can not face them as we are.\n\nLuckily, we have a special advantage—the Rajathi. Dwarfing regular elephants, our Rajathi seem to be the winning play against Bhuvauri, but we cannot raise many of them. To aid in multiplying their herds, we shall call upon the elephant lords of Dhugajir and the aloof Dakinshi of Sarhal whom we’ve been told can transform into elephants at will."
 umdaj_5_ace_rajathi_trigger:0 "§G+150§! Opinion and §YAllied§! with any country in §YDhujat§! who owns a §YHerd Province§!"
 umdaj_5_ace_rajathi_effect:0 "Declare a war of §YReconquest§! on §YBhuvauri§!. Any §YDhujati§! allies we have will join us. NEITHER side will be allowed to §YCall to Arms§! during this war."

 umdaj_5_growing_pains_title:0 "Growing Pains"
 umdaj_5_growing_pains_desc:0 "We have expanded much from the small Prabhi we were, having taken land from the more powerful Prabhi of Tujgal and even the whole Senapti of Raghabekhur. This has led to a great division, and although we were renowned as a tolerant and honest people, the vast majority of our subjects are far from that. They demand, with force of arms if needed, a harimari state forged by tradition,one with no tolerance for dissent or differing ideas—ironic. As we’ve proven ourselves, they wish to see us claim that mantle."
 umdaj_5_growing_pains_effect:0 "Choose if we will pursue the path of primal §YVanrahar§! or modern §YSardhasi§!"

 umdaj_5_trampled_title:0 "Trampled"
 umdaj_5_trampled_desc:0 "Our state has come a long way since our days as a small Prabhi on the outskirts of the Raj. With the might of the Rajathi, we have overcome all obstacles arrayed against us. There are those that criticise us as traitors who abandoned our virtue; They even say that our ancestors would be disgusted by us. Truly, there is no one we can trust in this world, but we are stronger than we ever were—after we abandoned our foolish idealism and embraced the truth. At the very least, we can always count on the Rajathi who has been with us since the beginning."
 umdaj_5_trampled_effect:0 "Lose §G-10.0%§! Local Autonomy in all owned provinces"

