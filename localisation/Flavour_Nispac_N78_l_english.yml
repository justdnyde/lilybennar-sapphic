 N79_will_of_the_people_reform: "Will of the People"
 N79_will_of_the_people_reform_desc: "While the ideals and principles of the revolution are debated and theorized within the confines of Cilapaktu’s walls, a mere discussion of our beliefs does not ensure its enforcement, nor its propagation.\n\nIt is the will of the people that they are brought into the fold of the revolution - whether they know it or not, their liberation must be ensured and is non-negotiable, acquiescence to the revolution is the only path forward.\n\n§YSpecial Mechanic:§!\nAs long as we are a vassal of §YCilapaktu§! will gain all non-urban land §Gconquered by our overlord§!, as well as the following effects:\nManpower Recovery Speed: §G+10.0%§!\nCore Creation Cost: §G-10.0%§!"

 N89_consent_of_the_people_reform: "Consent of the People"
 N89_consent_of_the_people_reform_desc: "Unlike the Cycles that came before, ours no longer abides the tyranny and autocracy of the past. No longer are our rulers chosen by an enigmatic higher power, no longer are they appointed by birthright.\n\nTo be a legitimate ruler of this new Cycle, one must be chosen to do so by the very subjects they intend to be the custodian of. One must be chosen by the people of the realm, to be entrusted with the rule thereof.\n\n§YSpecial Mechanic:§!\nAs long as §YCafana§! is our vassal we will cede §Yall non-urban land§! to them, as well as gaining the following effect:\nVassal Forcelimit Contribution: §G+50.0%§!\nIncome from Vassals: §G+100.0%§!\nCore Creation Cost: §R+90.0%§!"
