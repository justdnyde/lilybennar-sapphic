 #Splingering Events
 flavour_nispac.1.t: "A Shadow Over Nianano"
 flavour_nispac.1.d: "Durari Degsadra leaned back into the throne’s cushions as his advisors rambled on. He did not listen their discussions, instead, losing himself in his thoughts:\nThough he rested atop the throne - a place of power, of authority, one that had never failed him before - he was now beset with strife. Not once before had he worried about the ogres offering any noteworthy resistance. Yet, now they seemed to scheme and conspire against him behind closed doors. While he could not prove it, he could feel it. Deep within, he knew it.\nHe had assembled his most trusted advisors and generals to hear their recommendations, yet none of their foolish utterances brought him any illumination. Degsadra knew that he needed to fortify his realm - his capital. His confidants counselled that it'd be harmful to his image and position.  Madness! How could ridding the cities of the disease that festered within them tarnish his reputation?\n\nYet, as Durari Degsadra waited for his advisors to cease their squabbling, the heart of Nianano beat on without him. Upon the marketplace stood a variety of stalls, vendors hollering, trying to entice the city’s denizens to come partake of their goods. Among the bustle, two cloaked figures loitered, eavesdropping upon the hushed conversations that took place beneath the cover of the market’s commotion.\n\nConcern, agitation and fear. They heard many things but those were the topics their attention lingered on. The locals knew not what to make of current events - the fresh paintings upon the buildings, hailing Degsadra as the only one worthy of sitting atop the Great Cycle, the walls of the city being reinforced against an unknown enemy. Surely Degsadra did not intend to act against his own people?\nDegsadra’s people made up their minds quickly. The daily bustle morphed in character rapidly - the tension no longer relegated to hushed conversations, but instead beginning to permeate the very essence of the city. By the end of the week, the populace had begun taking up arms – and in the marketplace, beside each of the paintings that promoted Degsadra’s reign, one could find his bureaucrats and supporters being strung up by their necks."
 flavour_nispac.1.a: "The kingdom is tearing at its seams."
 flavour_nispac.2.t: "Tyrant Call"
 flavour_nispac.2.d: "Akin to a tidal wave, unrest has spread across the realm - reaching far beyond the walls of Nianano. While in most cities the Durari’s soldiers fought back against the flames of revolution, within the city of Imbatano they quickly bloomed into an inferno.\n\nThe vast ogre population of Imbatano had in the past suffered great injustice at the hands of the ruling class - though the ogres had been instrumental in building this very realm, they had effectively become second class citizens within their own home. From restrictions to where they might purchase wares; which markets they were allowed to frequent, to limiting what positions and roles they might obtain within the realm’s government.\nThough such legal discrimination had become frequent - an inescapable reality for ogrekin - it had gotten far worse under Degsadra’s rule. The laws and decrees that oppressed their way of life grew more restrictive by the week - the repression so severe that even in Nianano Degsadra had become known as a notorious discriminator towards ogrekin.\nYet, the ogres would not let themselves be shackled and chained by any more of the Durari’s unjust and cruel laws - when the unrest that had spread throughout the realm spread to  Imbatano, the ogres rallied to band together and defend themselves once more. From the ranks of the Maghalmtianebi rose Dzatonde An’Vraktigoma, who swiftly garnered the respect of her compatriots. Soon enough, she became known as a reborn hero, who would lead ogrekind to freedom.\nDzatonde An’Vraktigoma was not alone, though; at her side stood a human, Itoriewa Dimgã - her closest ally and confidant. Together, they could become the heralds of the revolution - representing a united front of humankind and ogrekin, and amassing an army of peasants, artisans and discontent soldiers, all seeking a brighter future."
 flavour_nispac.2.a: "Repugnant filth! There shall be no peace until they are all in chains!"
 flavour_nispac.3.t: "End of the False Cycle"
 flavour_nispac.3.d: "The sun had just begun to crest over the horizon, bathing the sky in a warm crimson - slowly pushing away the darkness. The shattered city gates of Nianano hung tenuously from the wall’s frame, as the revolutionaries began to rouse from the encampment they’d established in the city streets.\nNowhere else could one find such a ramshackle combination of people - peasants, craftsmen, merchants and soldiers - all united by a singular cause; establishing themselves as the heads of the Cycle, and then shuttering it for its tyrannical nature.\n\nThe siege had thus far been grueling. Two weeks had been spent trying to push into the city itself, and though the gates had given in, the inner core of the city had been reinforced, as if Degsadra had prioritized protecting the upper class and the keep, more so than the rest of the city - than its citizens.\nIt took hours for the revolutionaries to make any headway with that fortified core - the sun already beginning to set by the time that the inner gates too were overwhelmed. They flooded into the upper city, many intent on bringing justice to the upper class; raiding their manors, while Dzatonde An’Vraktigoma and Itoriewa Dimgã rushed towards the keep to find Degsadra before he could abscond without facing the people of his realm.\n\nThey had been successful. Now, Dzatonde An’Vraktigoma and Itoriewa Dimgã emerged from the keep, dragging Degsadra along beside them - a man who once fashioned himself above all others, now seemingly cowering before those he once knew as subjects. Dzatonde An’Vraktigoma pushed the Durari down to his knees, allowing the revolutionaries to watch, as Itoriewa Dimgã raised the blade above his head."
 flavour_nispac.3.a: "Dzatonde An’Vraktigoma watched as Itoriewa Dimgã relieved Degsadra of his head."
 flavour_nispac.3.b: "Itoriewa Dimgã brought the blade down upon Degsadra’s neck."
 flavour_nispac.4.t: "The Last Cry"
 flavour_nispac.4.d: "A decade had passed since the Siege of Nianano - since the end of the Tyrant Degsadra’s Cycle.\nRestoring order to the realm has not been easy, many cities have needed time to rebuild their walls and structures, and many farms have been left devoid of farmers to tend to them with many having given their lives for the sake of freedom.\n\nOnly recently have we truly recovered, our new Cycle coming into its own, no longer defined by that which came before it. Yet, we have not been alone in our attempts to recover - those that had sworn themselves to the former tyrant have hidden themselves in the shadows, slowly reorganizing and recuperating, preparing to halt our new beginning and turn back the Cycle to Degsadra’s day.\n\nNow, just as we truly push towards liberty and prosperity, the viper bears its fangs - the tyrant’s loyalists rise up against us, intent on razing all that we have built to the ground."
 flavour_nispac.4.a: "Have them join their Durari in the beyond!"
 flavour_nispac.4.b: "This illegitimate Cycle shall stand no longer!"

