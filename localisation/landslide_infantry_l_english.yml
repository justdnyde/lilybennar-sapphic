 landslide_infantry.0.title:0 "Landslide Hazard Event Backend"
 landslide_infantry.0.desc:0 "Hidden Event that handles finding and firing fitting hazard events" 
 landslide_infantry.1.title:0 "A Failed Graduation"
 landslide_infantry.1.desc:0 "Not everyone who seeks to become a Landslide Infantryman succeeds in their attempt. One such recruit had made it to their graduation day in [landslide_hazard.GetName], but when they began to gather the molten rock onto themselves, it consumed them, causing a fire that burned several structures and killed 3 more recruits and an instructor." 
 landslide_infantry.1.a:0 "Pay for the recruits' funerals."
 landslide_infantry.1.b:0 "Allow his class the day off to grieve."
 landslide_infantry.1.c:0 "Send our condolences."
 landslide_infantry.2.title:0 "A Somber Graduation"
 landslide_infantry.2.desc:0 "Not everyone who seeks to become a Landslide Infantryman succeeds, though luckily recruits now rarely die in the attempt. Rather than having them dawn a full body suit of molten rock all at once, a graduating recruit is asked to apply just enough to cover a limb. This means if they fail, the wound is far more survivable and possible to control. They will be scarred for life, but they will live."
 landslide_infantry.2.a:0 "Unfortunate, but impossible to avoid."
 landslide_infantry.2.b:0 "Praise those who fail as making a noble sacrifice."
 landslide_infantry.2.c:0 "Perhaps some of these recruits have other talents we can use."
 landslide_infantry.3.title:0 "Pride that Burns"
 landslide_infantry.3.desc:0 "It began like it always does, with a boast. Landslide Infantry are notoriously prideful and an insult in the form of a false claim can have disastrous consequences. In this case, several dozen members in three different units have been injured, and the camp they share has been set ablaze."
 landslide_infantry.3.a:0 "Punish them severely."
 landslide_infantry.3.b:0 "Why do we keep building their barracks with flammable material?"
 landslide_infantry.3.c:0 "Their pride is what makes them an asset."
 landslide_infantry.4.title:0 "Flames of Competition"
 landslide_infantry.4.desc:0 "It began like it always does, a challenge. Public, unavoidable and full of machismo. There can be no refusal, and so the two Landslide Infantrymen come to blows. But this is not an unorganized brawl, this is a friendly competition between two equals. A bonding experience where no man is able to escape being tested. And with each contest, comradery grows."
 landslide_infantry.4.a:0 "We are an inferno of many small flames."
 landslide_infantry.4.b:0 "We should regulate these competitions."
 landslide_infantry.4.c:0 "3 to 1 odds on the fat one!"
 landslide_infantry.5.title:0 "Uncontrolled Blaze"
 landslide_infantry.5.desc:0 "When your body is surrounded by lava, it is difficult to notice changes in temperature. A fire, even a large one, can go unnoticed until it is far too late to stop without the efforts of more than a few men. Unfortunately, such a fire has spread in [landslide_hazard.GetName] as a result of normal Landslide infantry training, and devastated the local ecosystem."
 landslide_infantry.5.a:0 "Cut firepaths to limit the spread."
 landslide_infantry.5.b:0 "Get help from anyone who knows Wavesong."
 landslide_infantry_put_out_fires:0 "Put out fires Landslide Infantry created"
 landslide_infantry.5.c:0 "Isn't setting things on fire the point?"
 landslide_infantry.6.title:0 "Fighters of Fire"
 landslide_infantry.6.desc:0 "The Landslide Infantry may have a reputation for causing fires, but they are still some of the most experienced people in terms of understanding how to put it out. When a fire breaks out, it is useful to have water to douse it, but it is indispensable to have someone who can manipulate it with magic without needing any material but their own bodies."
 landslide_infantry.6.a:0 "Fight fire with lava."
 landslide_infantry.6.b:0 "Maybe we can use this to change their reputation."
 landslide_infantry.6.c:0 "Maybe we should have one of them in court."
 landslide_infantry.7.title:0 "Melting the Important Rocks"
 landslide_infantry.7.desc:0 "A complacent Landslide infantry officer slacked in his duties while garrisoned in the fort in [landslide_hazard.GetName]. Having ignored proper equipment storage rules, this officer allowed a container of molten rock to burn through its storage room and melt a hole directly in the side of the fort, rendering it near useless at its intended purpose and starting a small fire."
 landslide_infantry.7.a:0 "Patch that hole now!"
 landslide_infantry.7.b:0 "Make that officer fix it himself."
 landslide_infantry.7.c:0 "Were we using that fort?"
 landslide_infantry.8.title:0 "A Moat of Magma"
 landslide_infantry.8.desc:0 "While otherwise unoccupied in [landslide_hazard.GetName]’s fort, a Landslide Infantry officer has corralled his men into fortifying the structure with some of their magma reserves. Though this feat has required an extraordinary amount of coordination, any assailant who now wishes to challenge our position will now face Flamesong controlled flows of molten stone."
 landslide_infantry.8.a:0 "Commend this officer."
 landslide_infantry.8.b:0 "Supply their efforts."
 landslide_infantry.8.c:0 "Can we use this offensively?"
 landslide_infantry.9.title:0 "Landslide causes Landslide"
 landslide_infantry.9.desc:0 "Several off duty Landslide Infantry set off to a slope to participate in a niche sport known as “rock surfing” using their unique abilities. Unfortunately, their location of choice happened to be above a local town, and when one of these surfers lost his footing, she ended up triggering a full landslide that buried several houses and caused the death of a few dozen civilians, soldiers and militiamen."
 landslide_infantry.9.a:0 "Prioritise saving civilians."
 landslide_infantry.9.b:0 "Prioritise saving soldiers."
 landslide_infantry.10.title:0 "Fire Beats Rock"
 landslide_infantry.10.desc:0 "When we were alerted to a gathering eruption in [landslide_hazard.GetName], we initially had little hope of stopping it. But just in the nick of time our Landslide Infantry rushed to the rescue of the local population and managed to avert the catastrophic event using their magical talents. Without question, these soldiers are heroes."
 landslide_infantry.10.a:0 "Spread their deeds amongst the common people."
 landslide_infantry.10.b:0 "Use them as examples to our troops."
 landslide_infantry.11.title:0 "Bad Behaviour Burns Barracks"
 landslide_infantry.11.desc:0 "In what is being considered a complete collapse in military discipline, a quarrel between the officers and soldiers of the Landslide infantry has resulted in the destruction of their military barracks. Not a single timber survived the blaze, and while no members of the Landslide infantry were lost to the fire, they are going to be cooling their tempers outside for the foreseeable future as all of their bedding has been lost."
 landslide_infantry.11.a:0 "We have no choice, rebuild the barracks."
 landslide_infantry.11.b:0 "Put them to work rebuilding what they destroyed."
 landslide_infantry.12.title:0 "Burns"
 landslide_infantry.12.desc:0 "Fire scars, but it also helps create. What can easily burn down a forest or a village can cook food, fire clay, and burn away infection. While there is a potential for danger with fire, it is a necessary tool that it is foolish to not use out of fear. It is for this reason the Landslide Infantry have been actively working to use their talents for the good of our nation both on and off the battlefield, and also why our people are now seeing their flame differently."
 landslide_infantry.12.a:0 "Let their fire spread."
 landslide_infantry.12.b:0 "Gather their flames into an inferno."

 landslide_infantry.20.title:0 "To Shape Fire"
 landslide_infantry.20.desc:0 "Only a certain type of person is willing to take the personal risk of coating themselves in flaming death and charging into battle. The benefits of doing so are great, but there is a necessary amount of confidence and self assuredness required to even attempt something so wild. It is hard to find an individual who simultaneously holds these qualities and takes orders well. But with the rising importance of the Landslide Infantry, it may be necessary for our army to promote cohesion, or at least a sense of honor and pride amongst these wildfires to temper their flame into something more directed." 
 landslide_infantry.20.a:0 "We will encourage the Landslide to work as a team."
 landslide_infantry.20.b:0 "We will encourage the Landslide to hold onto their personal pride."
 landslide_synergy_town_tt:0 "“A Failed Graduation” events are replaced by “A Somber Graduation”"
 landslide_synergy_brawl_tt:0 "“Pride that Burns” events are replaced by “Flames of Competition”"
 landslide_infantry.21.title:0 "Burn Rock or Crush Flame"
 landslide_infantry.21.desc:0 "The destructive power of the Landslide Infantry is not only felt by the enemies we wield them against, but the very land itself. Flora burns away, rocks melt, and the very air is filled with the smell of volcanic fumes. But we have learned much from excavating the heart of the mountain, and we believe we can apply this knowledge to the troops that utilize the same materials we worked with there." 
 landslide_infantry.21.a:0 "Perhaps we can teach them to better control their flame."
 landslide_infantry.21.b:0 "It can not be that hard to stop melting the rocks."
 landslide_synergy_fire_tt:0 "“Uncontrolled Blaze” events are replaced by “Fighters of Fire”"
 landslide_synergy_fort_tt:0 "“Melting the Important Rocks” events are replaced by “A Moat of Magma”"
 landslide_infantry.22.title:0 "Controlled Descent"
 landslide_infantry.22.desc:0 "The Landslide Infantry have never been more destructive to anything than themselves. They have harmed others both intentionally and not, but none have to spend more time around them than each other. In a new age of discipline and military structure it is necessary for the Landslide Infantry to finally finish what they have started and become a fully modern military force. This means doing away with the last of their habits that break their cohesion and destroy military structures." 
 landslide_infantry.22.a:0 "We will train them to march and fight without mishaps."
 landslide_infantry.22.b:0 "We will train them in camp etiquette."
 landslide_synergy_landslide_tt:0 "“Landslide causes Landslide” events are replaced by “Fire beats rock”"
 landslide_synergy_barracks_tt:0 "“Bad Behavior Burns Barracks” events are replaced by “Burns”"
 landslide_infantry.23.title:0 "The direction of the Landslide"
 landslide_infantry.23.desc:0 "It is slightly embarrassing to admit, but the initial purpose of our forge may no longer be one we wish for it to fulfil. Warfare is advancing at a rate faster than our engineers were capable of constructing our monument, and the introduction of the gun has made many forms of combat obsolete. We can pivot to this new form of combat, or pursue what we always intended to. But we cannot do both." 
 landslide_infantry.23.a:0 "We will continue with the work that made us masters."
 landslide_infantry.23.b:0 "We will accept that we have more to learn."
 
 landslide_infantry.50.title:0 "Ashes of Conquest"
 landslide_infantry.50.desc:0 "It is hard to admit that something you thought would protect you was inadequate for the job it was intended for. It is harder to accept that someone else took advantage of your weakness and therefore laid you low. But it is hardest to see you have failed, and do nothing. To allow others to leave you at their mercy when you now know how to improve. Perhaps the weak will give in to those tyrants and bend the knee, but we will not be so easily cowed. While we still have time, we must learn to adapt to this new way of war the Ahetl Mulyatli have shown us under the rule of their Warrior King: a man covered with lava and magical artifacts, leading from the front and devastating those he encounters. If we could somehow match his techniques and philosophy, then we too could accomplish his feats."
 landslide_infantry.50.a:0 "We must adopt landslide infantry"
 landslide_infantry.50.b:0 "We must ready our smiths."
 landslide_infantry.50.c:0 "We must ready our troops."
 landslide_infantry.50.d:0 "We must ready our mages."
 kanolowele_volcanic_armoury_level_1_unlock_reform_tt:0 "Unlocks the §YVolcanic Armoury§! magical project."
 kanolowele_volcanic_armoury_level_1_unlock_no_reform_tt:0 "Unlocks the §YVolcanic Armoury§! magical project once you have the §YFlamesong§! (Tier 2) government reform."

 landslide_infantry.60.title:0 "New Flames"
 landslide_infantry.60.desc:0 "In our small corner of Insyaa we have fought to maintain our identity against others of our kind. We have thought ourselves to be part of a wider whole that we must distinguish ourselves from. But in truth, we are finding that we are just one part of a much wider community. And though we may have differences with our old neighbours, we can not dispute that they are Kanolowele like us. Compared to the kobolds, mechanim, and ogres, they are practically the same. Now that we can reach out to the great Plateau we have learned of such differences we could never have considered before. The magical practices of our mages are but one of many. And we have learned how to take the magics of others to augment our songs, change what we are, and form a synthesis. Perhaps no one has benefited from this more than the Landslide Infantry who now have a wealth of new techniques to learn. We will see how they advance themselves."
 landslide_infantry.60.a:0 "We must perfect our Blazetempo."
 landslide_infantry.60.b:0 "We must perfect our Magmasight."
 landslide_infantry.60.c:0 "We must learn more of Trueshaping."
 kanolowele_volcanic_armoury_level_2_unlock_reform_tt:0 "Unlocks upgrading the §YVolcanic Armoury§! magical project to level 2."
 kanolowele_volcanic_armoury_level_2_unlock_no_reform_tt:0 "Unlocks upgrading the §YVolcanic Armoury§! magical project to level 2 once you have the §YFlamesong§! (Tier 2) government reform."
 
 landslide_infantry.70.title:0 "Distant Shores"
 landslide_infantry.70.desc:0 "“Standing on the shore, it is possible to see the Kiamoa in the distance, no longer the great barrier it used to be for the people of Insyaa but instead only a memory of itself. There, present, affecting their lives, but no longer real. And beyond it, a world they could never have considered. A world of strangers, some like them, but others so strange they have no words to describe us. We wear clothes they have never seen, sail ships they can not match, and bring guns and magic they have never fought. How else can they respond but with wonder and fear in equal measure?\nThe Landslide Infantry are a fascinating response to the world beyond their borders. Not only have they shown themselves to be able to adapt to magic before, but now they are adopting our foreign guns and making themselves indispensable to their leaders. If they did not have so much else to worry about, perhaps they would stop this potential new power in their court, but they do not seem to have the luxury of throwing away useful tools against what they see as a threat.”\n-  Academician Prof. Raven, Collected Journals"
 landslide_infantry.70.a:0 "We must perfect our magic."
 landslide_infantry.70.b:0 "We must study their technology."
 kanolowele_volcanic_armoury_level_3_unlock_reform_tt:0 "Unlocks upgrading the §YVolcanic Armoury§! magical project to level 3."
 kanolowele_volcanic_armoury_level_3_unlock_no_reform_tt:0 "Unlocks upgrading the §YVolcanic Armoury§! magical project to level 3 once you have the §YFlamesong§! (Tier 2) government reform."

 magic_project_kanolowele_volcanic_armoury:0 "Volcanic Armoury"
 magic_project_kanolowele_volcanic_armoury.desc:0 "If Insyaa was an animal, the twin volcanoes of Muatlaqua and Quahopilo would be her heart and their magma her blood. If we could harness this life giving fire, wield it to create and improve ourselves, we’d be capable of burning the very souls of those who oppose us. Wild ideas fly recklessly: a forge made from the mountains themselves, stoked by magma and crafting weapons worthy of our most elite soldiers. The Landslide Infantry, heroes of Flamesong and molten rock, could bring even greater victories if such a place were to come to be. How could we resist trying when there is so much to gain?"
 kanolowele_volcanic_armoury_level:0 "Volcanic Armoury level"
 volcanic_armoury_lose_progress_15_tt:0 "Volcanic Armoury Project loses §R-15%§! of progress"
 volcanic_armoury_lose_progress_10_tt:0 "Volcanic Armoury Project loses §R-10%§! of progress"
 volcanic_armoury_lose_progress_07p5_tt:0 "Volcanic Armoury Project loses §R-7.5%§! of progress"
 volcanic_armoury_lose_progress_05_tt:0 "Volcanic Armoury Project loses §R-5%§! of progress"

 landslide_infantry.1001.title:0 "Fire, Rock, and Blood"
 landslide_infantry.1001.desc.both:0 "Under the glow of the twin volcanoes there are many caves that once housed flows of magma waiting silently for our engineers to expand.\nMuatlaqua is the shallower and weaker of the two volcanoes. It is capable of less destruction should there be an accident, and there will be accidents, in living and working with such dangerous materials; its benefits include less volatility and unpredictability.\nQuahopilo is the stronger sibling, but is filled with a rage its brother lacks. For the price of greater potential, we will no doubt suffer greater hardship, assuming we ever reach the heights we plan at all under the weight of the setbacks we will no doubt suffer working against such resistance.\nEither choice is an acceptable place to begin construction. Which should we choose?"
 landslide_infantry.1001.desc.q:0 "Under the glow of the twin volcanoes there are many caves that once housed flows of magma waiting silently for our engineers to expand.\nQuahopilo is the stronger sibling, but is filled with a rage its brother lacks. For the price of greater potential, we will no doubt suffer greater hardship, assuming we ever reach the heights we plan at all under the weight of the setbacks we will no doubt suffer working against such resistance."
 landslide_infantry.1001.desc.m:0 "Under the glow of the twin volcanoes there are many caves that once housed flows of magma waiting silently for our engineers to expand.\nMuatlaqua is the shallower and weaker of the two volcanoes. It is capable of less destruction should there be an accident, and there will be accidents, in living and working with such dangerous materials; its benefits include less volatility and unpredictability."
 landslide_infantry.1001.a:0 "Muatlaqua is a steady and reliable choice."
 landslide_infantry.1001.a_tt:0 "Muatlaqua becomes the site of the armoury"
 landslide_infantry.1001.b:0 "Quahopilo, for its great power."
 landslide_infantry.1001.b_tt:0 "Quahopilo becomes the site of the armoury"
 landslide_infantry.1020.title:0 "In the Wake of Molten Rock"
 landslide_infantry.1020.desc:0 "In the early days of the Armoury's construction, thirteen workers were burned alive when an inappropriately struck wall suddenly fractured and spilled forth thousands of gallons of molten rock into the construction site. A fourteenth worker who was recovered suffered permanent damage to their lungs after inhaling the toxic fumes. We cannot make this work perfectly safe, but we can make it less dangerous than it currently is."
 landslide_infantry.1020.a:0 "Drain any lava we come across to reduce risk."
 landslide_infantry.1020.b:0 "Redundantly reinforce tunnels in case of accidents like this."
 landslide_infantry.1020.c:0 "Make sure we have plenty of workers nearby so we can respond quickly."
 landslide_infantry.1020.a.consequence_tt:0 "This will negate an eruption event"
 landslide_infantry.1020.b.consequence_tt:0 "This will negate an earthquake event"
 landslide_infantry.1020.c.consequence_tt:0 "This will negate a sabotage event"
 landslide_infantry.1040.title:0 "The Mountain Responds"
 landslide_infantry.1040.desc:0 "It happened without warning. The ground shook, a sound so loud it deafened all who heard it, and then the roof of the cavern seemed to split as fire spewed from the secondary chamber. All things considered, it was only a minor eruption. Still, it has made the chamber unusable for the time being, and construction has halted in the wake of this disaster. We are fortunate to have lost less than a hundred workers… if the injuries are not included."
 landslide_infantry.1040.a:0 "Well, the eruption is over. Get those workers back in there!"
 volcanic_armoury_lava_drainage_tt:0 "We drained any lava we came across to reduce risk"
 landslide_infantry.1040.b:0 "Where are the mages? Get them in here to help!"
 landslide_infantry.1040.c:0 "We will need to look elsewhere for that barracks now."
 landslide_infantry_mages_divert_lava:0 "Diverted Lava from destroying the Volcanic Armoury"
 landslide_infantry.1060.title:0 "The Earth Weighs In"
 landslide_infantry.1060.desc:0 "It seems all of nature is against us in the construction of this structure, as now the ground beneath our feet shakes the entire mountain as if to protest our defiance. Miraculously, only four hundred workers were trapped inside the mountain after the resulting cave-ins, and we managed to recover seventy three of them before they suffocated. Surveying the damage, it is necessary to decide what can be salvaged."
 landslide_infantry.1060.a:0 "The foundations we built will hold."
 volcanic_armoury_reinforced_foundations_tt:0 "We redundantly reinforced tunnels"
 landslide_infantry.1060.b:0 "We should focus on replenishing our workforce."
 landslide_infantry.1060.c:0 "Just do what you can."
 landslide_infantry.1080.title:0 "The Sea Replies"
 landslide_infantry.1080.desc:0 "This time it was no natural disaster that has halted our progress, but our fellow countrymen in the form of bandits and pirates. A construction such as this requires materials from across our nation, and at any of a thousand points can our workers be waylaid, robbed, or killed as has now been the case dozens of times. We have only recently come to understand the scope of this sabotage, as over a thousand individuals have reported incidents of piracy and banditry. We must do something to stop this."
 landslide_infantry.1080.a:0 "Call upon the safeguards we already have."
 volcanic_armoury_supply_lines_secured_tt:0 "Made sure we have plenty of workers nearby so we can respond quickly."
 landslide_infantry.1080.b:0 "Send soldiers to the build site and along the roads."
 landslide_infantry.1080.c:0 "Hunt those criminals down!"
 landslide_infantry.1099.title:0 "We End the Conversation"
 landslide_infantry.1099.desc:0 "Specially trained mages coerce the slow moving molten rock down the sloped tunnel and into the forge, causing it to roar to life. The workers cheer; while many of them have not been here since the beginning, and only a few of the original group remain without serious injury, it is still a triumphant day for our nation to have such a marvel in our possession: A source of destruction turned into a source of creation."
 landslide_infantry.1099.a:0 "Now we can truly use the mountain."
 landslide_infantry.1099.b:0 "We can only stand in awe of the mountain."
 landslide_infantry_privileges_unlock_volcanic_truth_tt:0 "A §YLandslide Infantry§! Magmatic Clergy estate privilege “§YLandslide Inquisitors§!” become available for use as we follow the §YVolcanic Truth§!."
 landslide_infantry_privileges_unlock_speaking_memory_tt:0 "A §YLandslide Infantry§! Keepers estate privilege “§YLandslide Heroes§!” become available for use as we are adherents of §YSpeaking Memory§!."
 landslide_infantry_privileges_unlock_endless_ocean_tt:0 "A §YLandslide Infantry§! Chroniclers estate privilege “§YLandslide Wavesong Instructors§!” become available for use as we worship the §YEndless Ocean§!."
 landslide_infantry_privileges_unlock_molten_eternity_tt:0 "A §YLandslide Infantry§! Clergy estate privilege “§YLandslide Crusaders§!” become available for use as we are the §YMolten Eternity§!."
 landslide_infantry_privileges_tt:0 "We finished Level 1 of the §YVolcanic Armoury§!"

 landslide_infantry.1101.title:0 "Songs of Flame"
 landslide_infantry.1101.desc:0 "While the forge is already a great boon to our nation, it could still yet do more. Without the help of mages, the forge would be completely unable to function, as the mere heat of the magma it uses would repel any mundane worker from approaching it to complete the work we need done. It is necessary for us to expand the number and quality of the mages we employ, lest we fall short of our production goals. But what direction should we take the education of these talented individuals?"
 landslide_infantry.1101.a:0 "We should focus on Blazetempo practitioners."
 landslide_infantry.1101.b:0 "We should focus on Magmascryers."
 landslide_infantry.1101.c:0 "We should focus on Trueshapers."
 landslide_infantry.1101.a.consequence_tt:0 "We will be able to choose between the Blazetempo practitioners increasing mana regeneration for 10 years or to increase manpower development of the §YVolcanic Armoury§!"
 landslide_infantry.1101.b.consequence_tt:0 "We will be able to choose between the Magmascryers to work as an advisor to the court or increase production development of the §YVolcanic Armoury§!"
 landslide_infantry.1101.c.consequence_tt:0 "We will be able to choose between the Trueshapers improving the fort at the §YVolcanic Armoury§! or halving devastation from Landslide Infantry recruitment"
 landslide_infantry.1120.title:0 "[landslide_infantry1120Title]"
 landslide_infantry.1120.title.blazetempo:0 "Burning Hotter"
 landslide_infantry.1120.desc.blazetempo:0 "The Blazetempo mages we have been training have taken to their work with enthusiasm. They relish the heat and the smell of the forge and many of them volunteer to work tasks inside it beyond the time we require them to train. The addition of their singing and instruments have been a welcome accompaniment to the natural acoustics of the lava tunnels. But the time has come to focus their efforts."
 landslide_infantry.1120.a:0 "If they like the heat so much, let's make it HOT!"
 landslide_infantry.1120.b:0 "Use their talents to enhance what the forge creates."
 volcanic_armoury_blazetempo_tt:0 "We focused on Blazetempo practitioners"
 landslide_infantry.1120.title.magmascryers:0 "What You See in the Fire"
 landslide_infantry.1120.desc.magmascryers:0 "“When I visited the forge I was told a story about a foreperson (It/It) that had grown concerned about the Magmascryers it had employed and how they spent so much time looking into the forge and the magma that fuelled it. It worried that they might jump in if no one was there to stop them. The heat and the fumes seemed to do concerningly little to dissuade them and so it wondered aloud if the government should listen to it and refocus their efforts somewhere more productive?”\n- Academician Prof. Raven, Collected Journals."
 landslide_infantry.1120.c:0 "It decided to have them keep an eye on the equipment."
 landslide_infantry.1120.d:0 "The foreperson ultimately put them on quality control."
 volcanic_armoury_magmascryers_tt:0 "We focused on Magmascryers"
 landslide_infantry.1120.title.trueshapers:0 "To Hold Fire"
 landslide_infantry.1120.desc.trueshapers:0 "It seems the Trueshapers we chose to recruit have not taken to the job as we had hoped. Rather than come to work with the forge, the Trueshapers have taken it upon themselves to inspect and reinforce the walls of the lava tunnels and the caves. While not what we had in mind, it can't be said this isn't benefiting the safety of the workers."
 landslide_infantry.1120.e:0 "Let them keep reinforcing the walls."
 landslide_infantry.1120.f:0 "Refocus their efforts towards the work of the forge."
 volcanic_armoury_trueshapers_tt:0 "We focused on Trueshapers"
 volcanic_armoury_no_focus_tt:0 "We did not pick an option in the previous event somehow (Please report this as a bug)"
 landslide_infantry.1120.a.consequence_tt:0 "This will negate an injury event"
 landslide_infantry.1120.c.consequence_tt:0 "This will negate an accident event if we employ a Court Mage advisor"
 landslide_infantry.1120.e.consequence_tt:0 "This will negate a sabotage event"
 landslide_infantry_half_devastation_tt:0 "§G-50%§! Devastation when recruiting landslide Infantry"
 landslide_infantry.1140.title:0 "Containment Breech"
 landslide_infantry.1140.desc:0 "There has been a catastrophic accident in the forge. A novice mage had a lapse in concentration when moving the magma into the furnace and incorrectly diverted the flow onto the floor of the chamber. Dozens of workers, including a master smith, were melted in the rock. As something like this has never happened before, there are no clear ideas as to how to handle the growing disastrous spill."
 landslide_infantry.1140.a:0 "Prevent the spread at all costs!"
 landslide_infantry.1140.b:0 "Protect the most vital equipment!"
 landslide_infantry.1140.c:0 "We told you so!"
 volcanic_armoury_magmascryers_scry_tt:0 "We had the Magmascryers keep an eye on the equipment."
 landslide_infantry.1160.title:0 "Sabotage in the Tunnels!"
 landslide_infantry.1160.desc:0 "An unknown group of sappers have used magic to weaken the structure of a vital magma tunnel. Though it has not yet collapsed, our foreperson fears it is no longer safe to enter that section of the forge. This is a great cause for concern, as the tunnel separates one of the largest barracks from the surface; should it fully be destroyed, hundreds of workers would be trapped inside the mountain."
 landslide_infantry.1160.a:0 "Send in workers to prevent the collapse."
 landslide_infantry.1160.b:0 "Evacuate the workers to prevent loss of life."
 landslide_infantry.1160.c:0 "We're secure, capture them!"
 volcanic_armoury_trueshapers_reinforce_tt:0 "We let Trueshapers keep reinforcing the walls"
 landslide_infantry.1180.title:0 "Molten Metal"
 landslide_infantry.1180.desc:0 "One of the mage instructors was performing a demonstration of a technique to use when handling molten metal when he tragically suffered a fatal apoplexy. Now the metal that he was manipulating is rapidly cooling inside its container, and if nothing is done it may take years to reclaim the precious ore."
 landslide_infantry.1180.a:0 "Have the apprentices attempt to copy the spell."
 landslide_infantry.1180.b:0 "We can't risk a spillage."
 landslide_infantry.1180.c:0 "Whoooo! This is a job for FIRE!"
 volcanic_armoury_blazetempo_heating_tt:0 "We had the Blazetempo mages make it HOT!"
 landslide_infantry.1199.title:0 "Metal and Magic"
 landslide_infantry.1199.desc:0 "The forge now roars from the coaxing of magical forces as the rocks hold firm from their magical stitching to prevent the cave-ins foreseen by the fire. Together with the workforce we have already established, the expanded magical power has vastly improved our output and confidence in the safety of those who reside under the caldera."
 landslide_infantry.1199.a:0 "Such a place will surely forge great men."
 landslide_infantry.1199.b:0 "The product of this forge will turn men to true soldiers."
 income_volcanic_armoury_desc:0 "from the §YVolcanic Armoury§!'s production."
 
 landslide_infantry.1201.title:0 "Masters of Magma"
 landslide_infantry.1201.desc:0 "Until now, we have fumbled in the dark with our efforts to craft weapons from the fires of the earth. Our attempts have been admirable, considering this has never been tried before, but now that we have experience with this medium of art, the natural step forward is to find the heights we can achieve. It is time to no longer be “good enough” but instead strive for perfection."
 landslide_infantry.1201.a:0 "The fire of the forge will burn hotter than the caldera."
 landslide_infantry.1220.title:0 "The Facing of Fire"
 landslide_infantry.1220.desc:0 "It is true that we are the most skilled and knowledgeable of the Kanolowele in forging the Landslide weaponry, but that does not mean we know all there is to know; it would be foolish of us to assume we can learn nothing. If we are to make masterworks, where should we begin our search to learn more?"
 landslide_infantry.1220.a:0 "We must have our most experienced smiths convene."
 landslide_infantry.1220.b:0 "Beyond the Kiamoa."
 landslide_infantry.1220.c:0 "The Precursor ruins."
 landslide_infantry_1220_precursor_ruins_tt:0 "We gain an extra §G5§! experience and §G50§! loot the next time we start an expedition in a §YGene Pillar§!."
 landslide_infantry.1220.d:0 "The rest of the Kanolowele."
 landslide_infantry.1240.title:0 "Heart of an Empire"
 landslide_infantry.1240.desc:0 "An interesting question has been proposed to our court. Should the forge be completed in the near future, would it not benefit us to legitimize our rule by tying ourselves closely to its majesty? We are already adding to its structure, after all. Would it be too difficult to add just one more section to it? Like say, a palace?"
 landslide_infantry.1240.a:0 "It wouldn't be difficult at all."
 landslide_infantry.1240.b:0 "It would distract from its purpose."
 landslide_infantry.1240.c:0 "We even already have our capital there."
 landslide_infantry.1240.a.consequence_tt:0 "On Project Completion we will get:\nAdministrative Efficiency: §G+2.5%§!"
 landslide_infantry.1240.b.consequence_tt:0 "On Project Completion we will get:\nLandslide Infantry Force Limit Fraction: §G+5%§!"
 landslide_infantry.1260.title:0 "Burning the Sky"
 landslide_infantry.1260.desc:0 "A catastrophic event has taken place. An eruption unlike any we have seen before has ripped the top of the mountain open and spewed what must be half the contents of its innards into the air. A shadow has fallen over our nation as the smoke blots out the sun. The forge may never recover from this event if we do not move now to save it from destruction."
 landslide_infantry.1260.a:0 "Evacuate!"
 landslide_infantry.1260.b:0 "We will not abandon our work!"
 landslide_infantry.1280.title:0 "The Cost of Perfection"
 landslide_infantry.1280.desc:0 "The process of creating this forge has taken decades. Only a fraction of that has been the construction; the gathering of materials, funding, political interest and acquiring the skills and knowledge necessary has been a monumental task. It also cannot be understated that the cost in lives has been extreme; accidents and mishaps have cost thousands if not tens of thousands of people their lives. As we near the completion of this project, who should we remember as the force behind it?"
 landslide_infantry.1280.a:0 "Those who lost their lives to build it."
 landslide_infantry.1280.b:0 "The nation and leaders that were responsible."
 landslide_infantry.1280.c:0 "In truth, we didn't do this alone."
 landslide_infantry.1280.c.tt:0 "Gain §G-10§! Aggressive Expansion with all known countries"
 landslide_infantry.1299.title:0 "Owning the Mountain"
 landslide_infantry.1299.desc:0 "“You can never really know if something cannot be improved. The difference between 99% and 99.1% perfection is greater than the distance between 1 and 99 percent. But when you hold a weapon made in the magma forge or see the Landslide Infantry wield it, you can almost believe there is no way it could be more glorious. No nation would dispute that [Root.GetName] are masters of the mountain.”\n- Academician Prof. Raven, Collected Journals"
 landslide_infantry.1299.a:0 "And we rule from a throne of fire!"
 landslide_infantry.1299.b:0 "and our armies are the mightiest in the land!"
 landslide_infantry.1299.c:0 "Our mastery of the world itself is peerless!"
