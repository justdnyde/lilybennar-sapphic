l_english:
 mission_of_flamesong:0 "Mission of Flamesong"
 mission_of_flamesong_desc:0 "Our mission can not be completed without the use of Flamesong. Be that through the use of Magmasight to find the best outcome or through blazetempo to empower landslide infantry despite their many hazards. We must seek to harness the full essence of Flamesong. Only though this can we bring about our goals."
 grant_noble_flamesong_rights:0 "Grant Noble Flamesong Rights"
 grant_noble_flamesong_rights_desc:0 "To help curtail the competition between the nobility and the crown we have granted the nobility sweeping rights to practice flamesong unhindered. This should help ease the tensions between the nobility and the monarchy."
 virtues_of_flamesong:0 "Virtues of Flamesong"
 virtues_of_flamesong_desc:0 "The virtues of flamesong are many. Through its practices magmascryers can learn of future events and help guide us towards a safer and more prosperous society, and through the use of Blazetempo powerful landslide infantry can be trained to defend the state despite their many hazards."
 yanacotle_noble_flamesong_rights_recruited:0 "Noble Flamesong Rights"

 mechanic_landslide_infantry_events_yes:0 "Recruiting §YLandslide Infantry§! in a province causes §R+10§! devastation and §Yallows hazard events§! to happen there for the next §Y20§! Years."
 mechanic_volcanic_armoury_project_yes:0 "Allows construction of the §YVolcanic Armoury§! magical project.\n§YVolcanic Armoury§! requires:\n-Landslide Infantry\n-The “Ashes of Conquest” Event\n-We are §ZProficient§! or better in §YDivination§! OR §YEvocation§!\n-Own a least one province of the Twin Gods §YMuatlaqua§! & §YQuahopilo§!\n"
 volcanic_armoury_project_gov_refrom_tt:0 "Has a Government Reform unlocking §YLandslide Infantry§!"
 mechanic_landslide_infantry_nobility_influence_yes:0 "Recruiting a Landslide Infantry gives the nobility §Y+10%§! influence for §Y5§! years"
 landslide_infantry_hazards_possible:0 ""

 estate_church_landslide_inquisitors:0 "Landslide Inquisitors"
 estate_church_landslide_inquisitors_desc:0 "Such powerful warriors and mages should not be confined to only combat roles. By empowering them to act in settlements as examples and assisting in emergencies, we can achieve holy purity."
 estate_church_landslide_heroes:0 "Landslide Heroes"
 estate_church_landslide_heroes_desc:0 "It is noble and admirable to be willing to sacrifice for others. Even more so when you do not know if you will fail and immolate yourself. Let us take part in making the heroes of the future."
 estate_church_wavesong_instructors:0 "Landslide Wavesong Instructors"
 estate_church_wavesong_instructors_desc:0 "While we admire the Landslide Infantry, we also recognize they value themselves over others. We should invite the Wavesong mages to temper their fire."
 estate_church_landslide_crusaders:0 "Landslide Crusaders"
 estate_church_landslide_crusaders_desc:0 "Fire spreads, and we should not try to stop this. If the path of fire leads us to conflict and glory, why should we say no?"
 landslide_inquisitors_mechanic:0 "When placing a holy order, all provinces in the state not matching our religion gain §G+5§! Local Missionary Strength for §Y10§! years."
 landslide_heroes_mechanic:0 "Gain access to a Speaking Memory Ritual “§YLandslide Heroes§!” which grants:\n§YLandslide Infantry§! gain: \n§G+10%§! Morale of Armies\n§R+25%§! Unit Maintenance\nfor §Y10§! years."
 wavesong_instructors_mechanic:0 "Gain access to a unique Local Practice “§YLandslide Wavesong Instructors§!” which grants:\n§G+25%§! Drill Gain Modifier\nRecruiting §YLandslide Infantry§! in coastal provinces causes only §R+5§! devastation (Down from §R+10§!).\n\n§YThis privilege can only be revoked once the practice is chronicled§!, chronicling would also grant:\n§G+50%§! Drill Gain Modifier\nRecruiting §YLandslide Infantry§! in coastal provinces causes §G0§! Devastation."
 landslide_crusaders_mechanic:0 "On winning a siege on an Enemy Provinces with a Fort you gain §G+25§! progress towards current Obligation"
 yanacotle_landslide_inquisitors:0 "Landslide Inquisitors"
