 kanolowele_volcanic_armoury:0 "Volcanic Armoury"
 kanolowele_volcanic_armoury.name:0 "Volcanic Armoury"
 kanolowele_volcanic_armoury.desc:0 "If Insyaa was an animal, the twin volcanoes of Muatlaqua and Quahopilo would be her heart and their magma her blood. If we could harness this life giving fire, wield it to create and improve ourselves, we’d be capable of burning the very souls of those who oppose us. Wild ideas fly recklessly: a forge made from the mountains themselves, stoked by magma and crafting weapons worthy of our most elite soldiers. The Landslide Infantry, heroes of Flamesong and molten rock, could bring even greater victories if such a place were to come to be. How could we resist trying when there is so much to gain?"
 kanolowele_volcanic_armoury_level_1_unlock_event_tt:0 "Requires the “Ashes of Conquest” event to have happened (1460)"
 kanolowele_volcanic_armoury_level_2_unlock_event_tt:0 "Requires the “New Flames” event to have happened (10 years after Molten Eternity)"
 kanolowele_volcanic_armoury_level_3_unlock_event_tt:0 "Requires the “Distant Shores” event to have happened (10 years after the Kiamoa falls)"
 kanolowele_volcanic_armoury_lookahead:0 "Each level of the §YVolcanic Armoury§!:\nProvides our §YLandslide Infantry§! with strong permanent bonuses\nTrains them (allowing us to §GUpgrade§! a §RHazard event§! to be beneficial)\n§GUpgrades§! one of our §YSpells§! in fitting ways.\nThe creation process of the §YVolcanic Armoury§! is quite turbulent and will come with many small §Gboons§! & §Rdrawbacks§! over the course of it."

