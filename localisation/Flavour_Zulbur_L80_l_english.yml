l_english:
 L80_uniting_the_tribes_title:0 "Uniting the Tribes"
 L80_uniting_the_tribes_desc:0 "“To say the Ashhana have never stood united would be an understatement: we never acted as one cohesive unit under the curse, merely a horde of violence bringing death and destruction; we have never united since the bard brought our salvation; and we have splintered into divided entities drifting weaker and weaker as our internal and external divisions drive us from potential allies to direct enemies. For the good of the Ashhana, we can no longer allow that: we must unite our people whether through pleas to the glory of our cause…\n\nOr regrettably through directly declawing those too far gone.”\n\n“Chapter 1: The Ruler.” The Tale of Relork"

 L80_relorks_travels_title:0 "Relork’s Travels"
 L80_relorks_travels_desc:0 "”Some of my advisors recommend that I stay within Zulbur so that they can manage my Chiefdom. They whisper that I need not concern myself with the dull humbrum of day to day rule, nor that my role requires me to lead only in times of crisis and when things are quiet,” Relork lamented.\n\n“But that would be a betrayal of my purpose, my position as leader of the Ashhana. To hide away here, to focus solely on quelling my own curse, is no longer enough. To make a true legacy, I must first hear and understand what my people have to say”\n\n“Chapter 2: The Builder.” The Tale of Relork"

 L80_the_united_people_title:0 "The United People"
 L80_the_united_people_desc:0 "“We were once defined by our violence, not seen as sentient but merely as monsters roaming and destroying the lands we occupied.\n\nWe were once scattered between disparate tribes, squabbling over scraps while trying (and often failing) to contain the curse at all costs.\n\nNo longer a shunned tribe of monsters, we are united as a true kingdom ready to face the world as equals.”\n\n“Chapter 4: The Guardian.” The Tale of Relork"

 L80_to_revive_those_lost_title:0 "To Revive those Lost"
 L80_to_revive_those_lost_desc:0 "“To the West lies the Ashhana’s greatest loss since curing the curse. The tribe of Karashan fell not to themselves or to any neighbouring tribe but to the Kingdom of Rayaz, a rising power spurred on by belief in a prophecy they believe makes their victory inevitable. Yet we are fighting for more than just a vague belief: we are fighting to free those who’ve had their only hopes for freedom stripped from them and for a cure to the curse. It may be too late for most Karashan Lizardfolk there, but, for a truly united Adzalan, this terror must be reversed.”\n\n“Chapter 5: The Canvas.” The Tale of Relork"

 L80_to_start_a_song_title:0 "To Start a Song"
 L80_to_start_a_song_desc:0 "“What Makes a Good Ruler?\n\nSome argue it is strength: the ability to fight, to control, and to be the best warrior in the room—the ideal of the claw faction.\n\nSome argue it is kindness: the ability to understand, to emphasise, and to rule through the will and support of the people.\nSome argue it is justness: the ability to judge, to decide, and to be respected for your impartiality and fairness.\n\nWhat Makes a Great Ruler?\n\nAll agree: it’s a ruler who knows who is the strongest, kindest, and justest and assigns them as required, whether it be a mighty chief or a lowly peasant.”\n\n“Chapter 1: The Ruler” The Tale of Relork"

 L80_the_stone_castle_of_zulbur_title:0 "Expanding the Stone Castle"
 L80_the_stone_castle_of_zulbur_desc:0 "“At the heart of the town of Zulbur lies the Stone Castle, the shining beacon of our architectural mastery and an icon of our rule.\n\nAnd yet it can still be more.\n\nWe shall make it not just a display of our talent but a functioning shield for our capital and people: the symbol of Ashhana beauty and practicality combined.\n\nAnd yet it will be more.”\n\n“Chapter 2: The Builder.” The Tale of Relork"

 L80_our_great_arts_title:0 "Our Great Arts"
 L80_our_great_arts_desc:0 "“To create a kingdom for the Ashhana is challenging. We have never been under one state but instead divided into splintering tribes fighting over every little slice of land, every minor slight: and yet tribes are joining us. Whether through force or diplomacy, this is becoming more and more doable.\n\nTo unite the Ashhana is monumental. Each splintering tribe has driven themselves further and further apart until now: our society is split not just between the core divide of the canvas and the claw but also across the tribes of our lands. Despite it all, we will unite through understanding and investment; It may take decades, but we will do it.”\n\n“Chapter 3: The Traveller.” The Tale of Relork"

 L80_memories_of_the_fight_title:0 "Memories of the Fight"
 L80_memories_of_the_fight_desc:0 "“In the aftermath of the Agony, our people were both relieved, safe in the knowledge that we had finally shown our strength and loyalty to the ideals of progress and art, but also terrified that the tribulation had ruined our kingdom’s power and would soon fall to the foreign powers who long painted us as nothing but villains.\n\nHowever, we have rebuilt, repositioned ourselves once more as a true player in Taneyas, and reclaimed our strength and security. The claw may have left its scars on us that may never truly heal, but we will advance.”\n\n“Chapter 5: The Canvas.” The Tale of Relork"

 L80_the_dream_of_adzalan_title:0 "The Dream of Adzalan"
 L80_the_dream_of_adzalan_desc:0 "“When Relork took the throne of Zulbur, the tribe was strong but not the juggernaut it now is. We were disunited, split by meaningless political divisions and deep divisions between the claw and canvas. We were vulnerable to outside threats and needed to modernise to keep up, let alone thrive.\n\nYet now we sit as the premier power of Taneyas, and our formerly threatening rivals are now arms of our [Root.GovernmentName]. The divisions of our kingdom are mended; scars last, but we move on. We are no longer the tribe of Zulbur: we are now the kingdom of Adzalan.” \n\n“Chapter 6: The Dreamer.” The Tale of Relork"

 L80_the_city_of_the_east_title:0 "The City of The East"
 L80_the_city_of_the_east_desc:0 "“To the East lies the great city of Shalazar, once the capital of lizardfolk civilization and a looting ground for hordes of cursed Ashhana. Shalazar’s wealth is almost as much as its hatred for us after the sack so long ago. Many within the city would strike us down given the slightest opportunity. Yet Relork forbade the looting of the city, not for fear of the claw but to show the Rhada that we had improved and were no longer the monsters they knew us as for so long.”\n\n“Chapter 2: The Builder.” The Tale of Relork"

 L80_zulburs_wonders_title:0 "Zulbur’s Wonders"
 L80_zulburs_wonders_desc:0 "“With our growing kingdom comes a need to centralise our control and develop our capital into something more. By using the wealth of our new growing kingdom, the talents we have acquired from throughout our realm, and our native mastery of the arts of sculpture and architecture, we shall make the town of Zulbur into the shining beacon of Ashhana Art—a capital worthy of the masteries of all of us.”\n\n“Chapter 4: The Guardian.” The Tale of Relork"

 L80_an_ashanan_coast_title:0 "An Ashhanan Coast"
 L80_an_ashanan_coast_desc:0 "“For all of the devastation our curse brought, we could never break the walls of Yassa nor conquer to the seas of the gulf. Yet to truly prosper, to truly embrace the art of the world, access to the seas of Sarhal is pivotal for not only spreading our art but also importing a wider variety of styles than even within our own society. In doing so, we can end our historic rivalry with Yassa, building them up as an entrepot for trade and as a dye-production centre which shall fuel our art.”\n\n“Chapter 5: The Canvas.” The Tale of Relork"

 L80_the_question_of_ashakani_title:0 "The Question of Ashakani"
 L80_the_question_of_ashakani_desc:0 "“Is an Ashhana society built around the echo of the curse, one where our art is for no purpose more complex than simply delaying the inevitable? Are we just living in fear of what we cannot truly contain? Or are we truly capable of more, making art for love, not necessity?\n\nTherefore, can an Ashhana society exist beyond the echo of the curse?”\n\n“Chapter 1: The Ruler.” The Tale of Relork"

 L80_our_return_title:0 "Our Return"
 L80_our_return_desc:0 "“Once the Ashhana charged through the streets of Shalazar, plundering anything of value or glory for no reason other than the influence of the curse. And when we were pushed back, the Rhada reinstalled monarchs who were forever hostile to our mere presence\n\nYet we are more than we were. No, we stand In Shalazar, not as razers or plunderers, but as true rulers here to bring stability, order, and peace: the very things we so violently took from them originally. It will take time, but one day the Rhada and the Ashhana shall live alongside each other.”\n\n“Chapter 3: The Traveller.” The Tale of Relork"

 L80_the_east_secured_title:0 "The East Secured"
 L80_the_east_secured_desc:0 "“Whilst under the influence of the curse, our control over Northern Taneyas was never able to be consolidated with the borders constantly shifting, preventing any safety for both us and the Rhada. Now we can truly build ourselves into a real kingdom for both of our peoples which promises safety, the ability to look towards what we want and not what we fear, and a hope that we shall continue to grow forever and a day.”\n\n“Chapter 4: The Guardian.” The Tale of Relor"


 flavor_zulbur.1.t:0 "The Question of Ashakani" 
 flavor_zulbur.1.d:0 "From a philosophical perspective, neither choice truly fits our goal of uniting around the glory of art to combat the curse. To embrace the Rhada would be a betrayal to many within our tribe, an abandonment of our commitment to fight the curse in favour of helping those who have no lack of resources nor the great threat that the curse holds over us. Yet to expel them isn’t a real choice either, signalling to all outside that we haven’t truly moved on, that we are still monsters at heart who kill and plunder. From a practical perspective, we have neither the wealth to sway the wealthy merchants nor the might to truly oust the entrenched and fortified nobles of Ashakani.\n\nWhilst the drawbacks may be equal, it would be a lie to say that the benefits of either option would be at all equal. Removing the Rhada would ruin the wealth that we seek to claim this way, and we would get a short boost but no meaningful long-term growth would appear. In contrast, accepting them would not only demonstrate the growth that we have already made to the rest of Taneyas but also give us a prosperous city to base future projects off of. We may struggle with our people’s protest, we may hurt in the short term, but we must grow for the future and the Rhada, especially those who accept Zaradyrra.\n\n“Chapter 1: The Ruler.” The Tale of Relork"
 flavor_zulbur.1.a:0 "And our choice is made."

 flavor_zulbur.2.t:0 "The Lessons of Our Jungles"
 flavor_zulbur.2.d:0 "When Relork chose to tour our jungles, many queried his wisdom. They argued that it would be a better use of his time to focus on developing and controlling our core lands around Zulbur. Yet we know that we must rule as more than just a tribe: it may be a hard sell for those in Zulbur (especially after our acceptance of the Rhada), but to create a true kingdom for the Ashhana, we will be more than a tribe but a true collective of our varied peoples.\n\nRelork’s trip solidified this perspective, for he saw not the feral jungles and scattered villages that those in Zulbur warned him of but a thriving culture of the people making their own arts to contain the curse and creating their own smaller festivals than those found in the courts.\n\nRelork sees the consolidated tribes with their own specialities, completely distinct in nature from Zulbur’s architecture but identical in purpose and function. He also sees that although the task will be long and hard, we can make a true country beyond the curse and beyond our nature: a country for art and beauty.\n\n“Chapter 2: The Builder.” The Tale of Relork"
 flavor_zulbur.2.a:0 "Our path is clear!"

 flavor_zulbur.3.t:0 "To Truly Unite"
 flavor_zulbur.3.d:0 "Zulbur specializes in architecture and sculpture. Our capital has become a centre of museums, each filled with a variety of marble crafted to perfection; In the centre of the growing town stands the iconic Stone Castle of Zulbur: the symbol of both our rule and mastery over architecture. To develop it further, creating the ultimate citadel of stone, would hold no shame.\n\nYet we must become more than Zulbur. One tribe couldn’t hope to stand against the world nor could it claim to truly master the various arts developed among the Ashhana jungles. We shall seek to understand the world of Northern Taneyas through building up and visiting the various capitals of the former Ashhana tribes. We shall be more than merely a tribe: we shall be a true kingdom for the Ashhana, equal in stature to the established lizards in the west.\n\n“Chapter 3: The Traveller.” The Tale of Relork"
 flavor_zulbur.3.a:0 "Towards our rightful place."

 flavor_zulbur.4.t:0 "To Realise the Dream"
 flavor_zulbur.4.d:0 "No Ashhana can claim to have been free from the terror of the Agony. Whether having directly fought or known friends and family who perished in the conflict, our society has been scarred to its very core. Yet we also have a lot to thank from our victory in the Agony. What was once a divided society split between the incompatible ideals of the claw and canvas is now unified behind our ideals of art. The remnants of the claw faction are either in hiding or brought over to our side.\n\nOur task is not yet done though. We may have solidified our society, but our position is not yet secure. We still haven’t created a true basis for the Ashhana, and we still need to fear threats from outside. Yet we will continue forwards and seize the international respect and peace we deserve. We shall move forwards, forever and a day.\n\n“Chapter 5: The Canvas.” The Tale of Relork"
 flavor_zulbur.4.a:0 "Towards Adzalan"

 flavor_zulbur.5.t:0 "The Tale of Relork"
 flavor_zulbur.5.d:0 "We have worked hard these past decades. We have gone from one of a myriad of Ashhana tribes, squabbling between ourselves over scraps of land, to a true power within Northern Taneyas, equal if not greater than our neighbours. We have gone from a narrow understanding of art focusing on our own specialities and ignoring all else to a true understanding of our people’s arts centred around our capital’s Stone Castle.\n\nAnd now Relork relaxes, safe in the knowledge that we are prosperous. No longer will the curse tear at the seams of our society or minds, nor will the Ashhana be known as raiders or monsters: instead, we shall be known as artists and creators. No longer will Relork have to fight for what he believes in, for it is entrenched in all that he loves. And now Relork can relax and watch his deeds be immortalised in Adzalani culture, through both his statues within Zulbur and the widespread tale of Relork sweeping Adzalan.\n\n“Chapter 6: The Dreamer.” The Tale of Relork"
 flavor_zulbur.5.a:0 "Our tale is over, and a new one blooms."
 flavor_zulbur.5.b:0 "Our tale is over, our path continues"

 flavor_zulbur.6.t:0 "To Feed our Kingdom"
 flavor_zulbur.6.d:0 "Excerpt from “The Tale of Relork, Chapter 3, The Traveller”\n\n“The first thing Relork felt when he entered the kitchen was the smell: the punch of the spices and the strike on the senses. Within the room lay a vast array of pots and pans with every ashhana working on their own dish, their own speciality, and their own design. What struck Relork most was the peace: there was no conflict, no desire to prove themselves through any means other than talent and practice, and no presence of the curse which seemingly permeates all of Ashhana society. One of the chefs, indistinguishable from the others within the kitchen, beckoned Relork out of the over-stimulating kitchen and into a smaller side room before speaking.\n\n“I apologise for being busy upon your arrival. Welcome to my tribe. I may be the chief of the Ishyaga, but I still need to cook, both to quell my curse and for my own personal enjoyment. To what do I owe the pleasure of your visit?”\n\n“Don’t apologise for pursuing your arts; I wouldn’t dream of denying an Ashhana that right. I’m merely here to ask a key question: how is cooking art? How can a task so mundane, so vital to everyday life even for our Rhada subjects, be able to quell the curse which has subjected our people for so long?”\n\n“Art is felt through the senses. In the same way as your architecture amazes the eyes with its size and splendour, our cooking is expressed through taste and smell, creating a sensation that cannot be forgotten.”\n\n“But how can something that lasts for such a short speck of time satisfy the curse or create a legacy to last forever?”\n\n“Because the impermanence in our world gives way to an eternal legacy in the minds of those who experience our cooking.”\n\n“Chapter 3: The Traveller.” The Tale of Relork"
 flavor_zulbur.6.a:0 "“Thank you for proving that you can always learn."

 flavor_zulbur.7.t:0 "Order through Art, Art through Order"
 flavor_zulbur.7.d:0 "Even across the tribes who’ve fully embraced the arts, none can match the order and peace of the Abussa tribe. This has created confusion within our government as the tribe never seems to perform well at art fairs or export any major works, and yet when Relork walks the streets, he sees the peace and the total quelling of the curse—at least on the surface. They are lined not with the statues of Zulbur nor the common painters within the other tribes, yet the streets are still peaceful.\n\nIts centrepiece isn’t a museum or gallery but a humble administrative building that would be commonplace elsewhere: within it lies the beating heart of the tribe and the source of its peace. The curse is quelled here by understanding that it will be overcome in time and through practice. While incorporating bureaucracy into our sculpting is obviously impossible, order and a promised future free of our burdensome curse tie us together, even if our arts can't \n\n“Chapter 3: The Traveller.” The Tale of Relork"
 flavor_zulbur.7.a:0 "And another district for the Stone Castle is built"

 flavor_zulbur.8.t:0 "To Forge and Carve"
 flavor_zulbur.8.d:0 "In our quest to unify the Ashhana, we’ve run into many issues. Even ignoring the great divide between the claw and canvas, many are arguing that we are too different: how can a coherent society be built from such a varied people, where no two tribes share a method to combat the curse and where seemingly no consensus can be formed among ourselves? \n\nYet Tsuz does not present the opposition and challenges the other tribes gave to our dreams of unity, but, in contrast, it gives an excellent opportunity to show its value. When Relork visits their tribe, he sees their great forge tower, a marvel even by the standards of Zulbur’s architectural expertise; he sees their mastery over the fire and their tools; he sees the wondrous products, resilient armours and sharp blades, the raw resources that in a different time would be used against their fellow tribes; and he knows that this isn’t an artistic style that clashes with our sculpting and architecture. This design compliments itself through iron reinforcing our structures, armour symbolising the protection of our people, and swords displayed as both a mastery of a craft and a memory of what we shall move on from.\n\n“Chapter 3: The Traveller.” The Tale of Relork"
 flavor_zulbur.8.a:0 "From clubs of wood to blades of iron."

 flavor_zulbur.9.t:0 "The History of Art"
 flavor_zulbur.9.d:0 "On the western border of the Ashhana lies the tribe of Zatal, famed for not only their resilience in the face of the advancing Arrakasay but also for their intricate knowledge of the past stored safely and forever in their ancient crypts and libraries. Despite no real excellence in the “traditional” arts, Zatal has endured as an exemplar of how anyone can combat the curse: through maintaining order and control of their past, they can maintain it into the present.\n\nAnd yet in a similar way, our pristinely sculpted statues can also serve this role, giving us a connection not to the events of the past but the individuals who earned their place in our history. Furthermore, connecting our societies back to the original ones who heard the freedom that the bard instilled in us centuries ago is a huge help towards legitimising the position of not only the canvas faction but our end goal of forever breaking the divisions between our tribes. \n\nShould we succeed, Relork shall join our statues and Zatal’s records forever.\n\n“Chapter 3: The Traveller.” The Tale of Relork"
 flavor_zulbur.9.a:0 "To claim our place in history."

 flavor_zulbur.10.t:0 "Cleansing And Building"
 flavor_zulbur.10.d:0 "The Shadow Swamp to the north poses an eternal existential threat to our people. Whilst the Rhada and Arrakasay are more direct in their challenges to our claims to overcome the curse, the influence of the swamp is more discreet yet arguably more felt across our society, driving us apart and expanding our already deep-seated divisions. Yet sitting on its very border lies one of the most prosperous tribes: the Kakhazajar.\n\nWhen Relork visits the tribe, he sees not the creeping darkness of the swamp but a peaceful and serene lake, water as clear as the crystal glass of Ashakani. The ancient talent of their mages maintain the clarity of both the area in the face of the corrupting swamp and their minds in the face of the eternal threat of the curse.\n\nWhilst we must also acknowledge the lessened threat that the swamp poses to our kingdom, the principles and methods behind their magic and structures would be an excellent addition to our growing capital, protecting the heart from corruption and thus helping assure a long term stability never known by our people.\n\n“Chapter 3: The Traveller.” The Tale of Relork"
 flavor_zulbur.10.a:0 "A clear lake and a clear mind."

 flavor_zulbur.11.t:0 "Gilding our Statues"
 flavor_zulbur.11.d:0 "Most of the Ashhana tribes have no centralised currency, leading to most economies being built off of bartering at best, or just raw plundering more often. In contrast, Karach to our north lies safely in the mountains, rich in not just minerals but also gold which has given them a real economy to place behind their trade. Yet for us, gold isn’t just for currency but the gateway into the art of gilding. Outside of Karach, gilding is a luxury reserved for chiefs or the very luckiest of plunderers, but Yosasad’s wealthy mines have made it the centrepiece of the culture of Karach, creating a vibrant and beautiful town adorned with various golden artifacts.\n\nYet with Yosasad secured and expanded under Relork’s rule, our access to the gold which has defined the tribe and town has now been spread across our kingdom. Gold has not only helped build a stable economy from outdated bartering, but it can also allow us to incorporate gilding into our mastery of sculpting, bringing our art and kingdom forwards simultaneously.\n\n“Chapter 3: The Traveller.” The Tale of Relork"
 flavor_zulbur.11.a:0 "Glorious gold!"

 flavor_zulbur.12.t:0 "Masking the Curse"
 flavor_zulbur.12.d:0 "Lying deep within our jungles lies the tribe of Rshak, built around Yarkhag: the ruined ancient Anzara city. Despite the wealth of artifacts and relics within the city, it lacked the raw resources like the gold mines of Yosasad just to their north. With only the jungles to hinder the curse, Rshak developed a culture of masks (made from wood of the vast jungles which are the only material they have in a true abundance), making a society built around the ceremony of hiding from the curse through both their art and their masks.\n\nAnd when Relork arrives to tour their tribe, they share the talents of their enchanted mask-making, such as the ability to transform into the depicted animal. Whilst this magical art eludes us, the craftsmanship built up over the centuries is nothing short of excellent and a true ideal of our goals of overcoming the curse forever.\n\n“Chapter 3: The Traveller.” The Tale of Relork"
 flavor_zulbur.12.a:0 "Masks of wood, souls of stone."

 flavor_zulbur.13.t:0 "Rhadan Mastery"
 flavor_zulbur.13.d:0 "Whilst most of Relork’s travels were to see how the local tribes combatted our people’s curse, the visit to Ashakani breaks this mold in an entirely new way: despite their devoted following of our shared faith of Zaradyrra, they are a follower not of necessity but of choice, abandoning the Anzalkatsa after witnessing the beauty and power of art.\n\nYet despite abandoning their faith, the Rhada’s talents and mastery, honed over millennia, endure to this day. Within Ashakani, this is highlighted by the artisanal glass of the city, famous throughout Taneyas for its quality and clarity. Their fervor surrounding Zaradryra has pushed their desire for quality even further, with multiple competitions held to push this drive onwards.\n\nAnd for our growing project of unity and progress, this fervor is a clear symbol of the devotion to art that we must have. Whilst some query whether they are truly an Ashhana, neither side can deny they are an exemplar for the ideal of art, progress, and being more than was assumed of you. Just as Ashakani recognised that they could be more than a mere piece of the prophecy, we shall become more than the beasts we were originally presumed to be.\n\n“Chapter 3: The Traveller.” The Tale of Relork"
 flavor_zulbur.13.a:0 "Our righteousness is proven once more."

 flavor_zulbur.14.t:0 "To Reclaim the Claw"
 flavor_zulbur.14.d:0 "When we began this quest, we saw the claw as our enemies: villains to be overcome and flawed creatures who refused to embrace what we know as right. Yet we would lie if we said that we could abandon war. Whether the lizards of the west, the humans of the east, or the swamp of the north, we will likely never truly be able to live without an aspect of the claw. Whilst the Agony of expression may have been framed as a final fight to move on, the fact we had to fight it proves that they at least had an argument. However, the Agony wasn’t about who deserves to exist but who deserves to rule. The claw’s problem wasn’t that they weren’t necessary: it was that they would have doomed us to fight and to only fight, never to grow beyond our limits. Nowhere was the claw more entrenched, nowhere saw strength prioritised and at the forefront, and nowhere fought us more heavily in the agony than Gasha.\n\nYet Relork’s travels cannot end until every tribe has been visited and every Ashhana’s position has been understood. Whilst there was some hostility in the visit from Relork to those who even now violently resisted our attempts to bring the cure, similar hatred came from the diehard claws who wished to rob and kill Relork for daring to visit at such a tense time.\n\nThe purpose wasn’t to show superiority or control: it was to show that we will be more with them alongside us, not without them. We can never abandon the claw, but by controlling and guiding it, it too shall join us in our eternal march, no longer with the goal of plunder or murder but with the aim of guarding what we have and will build.\n\n“Chapter 5: The Canvas.” The Tale of Relork"
 flavor_zulbur.14.a:0 "Moving on, as we always have."

 flavor_zulbur.15.t:0 "The Hope of the Lost"
 flavor_zulbur.15.d:0 "Within the Ashhana’s westernmost reaches lies the tribe of Karashan, yet whilst most of the major tribes have withstood the advance of those who see us as monsters, Karashan fell to the rising kingdom of Rayaz in the east. This isn’t necessarily a tragedy, but the real horror comes from the Riverclaw’s insistence that the Ashhana abandon the ways of Zaradyrra in exchange for their false prophecy, thus dooming swathes of the tribe to the bloodcurse.\n\nIt wasn’t until we defeated Sykar, the so-called “Prophet” of the 333rd Empire, that the tribe of Karashan could return to the true ways. Yet the damage had been done: most of the tribe had fallen whether to the curse or the oppressive rule of the Riverclaws.\n\nRelork’s visit is not marked by the highlights of the tribe but by visiting ghost towns and helping the few that remain. However whilst the atmosphere may be sombre at times, it is also a time of celebration, for we are not bringing further horror to the tribe but a return to prosperity, to freedom from the curse, and to being able to pursue true clarity. We will rebuild Karashan as a true tribe once more as a symbol of the value and righteousness of our project.\n\n“Chapter 5: The Canvas.” The Tale of Relork"
 flavor_zulbur.15.a:0 "The lost returned to safety."

 flavor_zulbur.16.t:0 "To Convince the Claw"
 flavor_zulbur.16.d:0 "The rain hammered down around the two Ashhana, yet despite the darkness from the clouds and jungle, both knew the outcome of the fight. One spent the war ruling through the will and glory of his people, and, when his rule was challenged, his people stood by him and fought for his ideals to the last Ashhana. The other spent the war ruling through the claw and the fear of his people, so when his rule was challenged, his people fled his side, the fuel of the curse collapsing in the face of the loyalty of the canvas. And now the claw fights on desperately, raining blow after blow upon the shield of the canvas until, with a sickening crack, the canvas bludgeons back. Reeling in pain, the claw collapses to the ground, only to have a blade pressed to their neck.\n\n“I could end this conflict with the sword; give in to your ways of strength and violence. I could end this conflict with the pen: let you flee into a world which can no longer accept you.” Relork paused: “But what I really want to know is why? Why subject our people to the eternal cycle of violence? Why turn your back on the prosperity I brought? Why bring death and decay when you could bring life and glory?”\n\n“Because...because we are nothing,” the claw declares. “We were made to kill, we were made to fight, we were made to raze. Your folly of ‘creating art’ doesn’t quell the curse. It delays it, exposes us to a better life we don’t deserve which makes the curse all the worse. By embracing the curse, we can dilute the pain and revel in what little victories we make. But you? What you seek, you shall never reach.”\n\n“And why must we be limited by what we were made to be? Why can’t we dream for more? I’d be lying if I said it would be easy, but I’d be lying if I said it wasn’t worth it as well. I may not live to see my dream truly fulfilled—a world where the Ashhana can stand forever above the curse—, but I couldn’t stand a world where I didn’t try to make it. And so I ask: would you live in a world where we could be more? Would you strive like me? Fight and hope for more? There’s no shame in giving in, no shame in being monstrous. There’s only shame in staying monstrous. So if you want more, take my hand and rise, but if you want shame, strike one last time.”\n\n“Chapter 5: The Canvas.” The Tale of Relork"
 flavor_zulbur.16.a:0 "At last, the claw decays."

 flavor_zulbur.17.t:0 "The End of Relork"
 flavor_zulbur.17.d:0 "And so at our great [Root.Monarch.GetTitle]’s funeral, the nation mourns the loss of a true ruler who could have brought us out. His task remains unfinished, and his song will soon lay unsung. Yet his efforts have still been felt: the great Stone Castle’s renovations may not have been finished, but the initial constructions have been a huge help for the centre of our tribe. We have begun to make peace with our neighbours in the Rhada, and our tribe is so much richer and safer for his efforts.\n\nOur people and heirs are eternally thankful for Relork’s efforts and vow to continue his legacy. Even without his decisive rule, we will make our place among the kingdoms of Taneyas, ensure the victory of the canvas over the violent claw, and make the peace which we deserve. We will continue Relork’s legacy into the future and make a land that our people can truly be proud of"
 flavor_zulbur.17.a:0 "We keep on moving, despite the loss."

 flavor_zulbur.18.t:0 "Relork The Eternal"
 flavor_zulbur.18.d:0 "And now, here lies Relork Stonecarver.\n\nOnce, he was a ruler, young and seeking to learn how to rule, guide, and protect his people. He was a chief of potential, one which he cultivated through his talent, his allies, and his advisors. He was a reclaimer for his tribe and a beacon for the Zaradyrra, a promise of what was to come.\n\nOnce, he was a builder, an exemplar of the Zulburian architectural ideals, beginning the evolution of the eternal Stone Castle of Zulbur. From his first-hand tour of their lands and the desire to end the conflict with the Rhada, he saw his people’s wishes, and acted not through violence but cooperation.\n\nOnce, he was a traveller devoted to learning how his people lived and how to incorporate it into his growing project within the city of Zulbur. He went from the northernmost reaches of the cursed Spire of Metat Tagokag to the former enemies within the city of Shalazar.\n\nOnce, he was a guardian helping the Ashhana overcome their invaders from the west and east, quelling their curse through their arts whether in Zulbur or beyond. He was a uniter, bringing the Ashhana under one united banner for the first time in memory.\n\nOnce, he was the canvas: the guiding light against the archaic ways of the claw, the symbol of the progress and prosperity that we deserved, and the leader who kept us united in the face of cruelty and savagery. And yet he never turned his back on the lost, even when they turned their back on him.\n\nOnce, he was a dreamer believing in a land where we were no longer Zulburian, Gashan, or Karachian, but Adzalani; a land where art triumphs forever; and a land where we no longer fear the curse and live in clear minds.\n\nNow, he lives eternal in the hearts and minds of all Ashhana. His body may have passed, but with his successor Sabre Talesinger ready to accept and continue his mantle, a people who have enshrined his values forevermore and a country whose unity and progress has already been outstanding, his legacy will last forever and a day.\n\n“Chapter 6: The Dreamer.” The Tale of Relork"
 flavor_zulbur.18.a:0 "Relork’s memory shall never die."

