
l_english:
    
 #Disaster
 pajeong: "Pajeong"

 #Events
 pajeong.1.t: "The Pajeong"
 pajeong.1.desc: "As the funeral procession in [Root.Capital.GetName] marches on, the people arrayed on all sides mourn their king. Within the casket is Jeong-Hun Gyo - the late and powerful Sage King of Danggun. Risen to power in a period of weakness, he was deemed worthy by Sado, reconsolidated and expanded [Root.GetName]’s borders. A truly virtuous man that was respected and loved by all who knew him.\n\nHis son,  Haeng Gyo, next in line for the Crane Throne, however, is a pale shadow of his exalted father. Weak, foolish, and decidedly unprepared for the duties of the throne, his ascension casts dark clouds  over the realm’s future. Within the court and beyond, schemes are being hatched, and various groups gather their forces in an attempt to leave their mark on the lands of Gowon."
 pajeong.1.a: "Ominous whispers echo in the dark…"

 pajeong.2.t: "[Root.GetPajeongOutcome]"
 GetPajeongOutcomeBad: "The Crane Throne, Shattered"
 GetPajeongOutcomeGood: "Peace in the Crane Court"
 pajeong.2.desc.A: "Through hard-fought battles and emergent treaties, we attempted to bring the rebellious estates to heel. But our armies were no match for the bowlords. Our accountants and navies could not keep up with the merchants of Gitueni. And the Neoksamaji have turned their noses up at us, hiding away on Nakseseom and loudly declaring Sado’s displeasure in [Root.Monarch.GetName]. In the west, a new Izhuun has risen and carved out a piece of our once great nation. To the north, the Hwalbaek declared a new independent Dalmangaji. In the south, the merchants have raised the flag of Nuwenara over their holdings. To the east, the sacred islands are now lost to us, as the priests now openly rule over what they call the nation of Baegye. We are a weak shadow of what we once were under the Sage King’s rule."
 pajeong.2.desc.B: "Through penned treaties and whispered deals in backrooms, we have brought the rebellious estates to heel. They who once were so proud now prostrate themselves before the Crane Throne, and pledge their allegiance to [Root.Monarch.GetName]. The Hwalbaek, clutching their Samdumae Talismans, are awestruck by our discipline and control over the nobility. The Merchants stand ready to assist in creating new trade partnerships with Yanshen, impressed by our deft economic maneuvering. The Neoksamaji believe Sado to be approving of our efforts and consider us worthy of honouring the Compact. Through wise and honeyed words, we have secured the restoration of Danggun. The future is uncertain still, but today, we stand together."
 pajeong.2.a: "In the end, the crane will remain."
 pajeong.2.b: "Play as Nuwenara."
 pajeong.2.c: "Play as Dalmangaji."
 pajeong.2.d: "Play as Baegye."

 pajeong.3.t: "An Ally in the Chaos"
 pajeong.3.desc: "We have been under fire from all sides. The death of Sage King Jeong-Hun Gyo was a sad day for our nation. Since his fall, the estates of our once proud country have been at each other’s throats, as well as bristling against the orders of [Root.Monarch.GetName]. But in our most dire straits, a light in the dark appeared. Through skill and diplomacy, we have managed to wrest the loyalty back from one of our estates. They are willing to stand proudly by the side of [Root.Monarch.GetName] and vouch for [Root.Monarch.GetHerHim], and tutor him in the art of statecraft. The storm is not over yet, but the rain has begun to lull."
 pajeong.3.a: "My loyal fans!"

 pajeong.10.t: "The Many Money-Making Markets of [pajeong_target.GetName]"
 pajeong.10.desc: "A representative from the [Root.GetBurghersName] has come to court with an intriguing offer. They have heard of lucrative opportunities within [pajeong_target.GetName]. The riches gained by the trade of [pajeong_target.GetTradeGoodsName] are mouth-watering, and they desire to take a cut of the profits. They ask for a ‘small’ commission to strengthen their hold over the trade conducted there. Of course, this demand is an outrageous affront to the crown, but the malice within the man's eyes sends a clear message: if the crown values the tribute generated by their trade networks, it would do well not not to anger the [Root.GetBurghersName]."
 pajeong.10.a: "Grant them their commission."
 pajeong.10.b: "Throw this man out of court."

 pajeong.11.t: "Do Not Pass Go"
 pajeong.11.desc: "A woman clad in silk robes strides into the court, fuming. She points a finger at [Root.Monarch.GetName], and accuses [Root.Monarch.GetHerHim] of ruining years of well-planned diplomacy and trade deals negotiated by [Root.GetBurghersName] with [Root.Monarch.GetHerHis] most recent policy blunder. She folds her arms and seethes, before giving an ultimatum. Allow the [Root.GetBurghersName] exclusive access to the marketplaces of Yanshen under the realm’s control, or lose their trade expertise in the region. Accepting their demands would have serious consequences. Their influence and autonomy in the region would be increased, and they could easily funnel funds away from the crown. On the other hand, angering them will cause a drastic drop in the profitability of the region while new administrators and traders without pre-existing connections find their footing."
 pajeong.11.a: "They will have their domain in Yanshen."
 pajeong.11.b: "[Root.Monarch.GetName] has made no blunder, their request is denied."

 pajeong.12.t: "A Merchant Serves the Interests of None but Themselves"
 pajeong.12.desc: "The [Root.GetBurghersName] have become more bold, and their requests more audacious. They now desire total control over all trade  conducted within Danggun as well as the royal mint, planning to centralize their efforts within the port city of Onman.  Giving them final say over all monetary policy will of course increase their influence over the realm significantly, but they promise that the commercial interests of all will be taken into account when key economic decisions are made. Of course, the commercial interests of some will be taken into account more so than others."
 pajeong.12.a: "These petty money grabbers shall have their precious control."
 pajeong.12.b: "Absolutely not. They should know their place!"

 pajeong.13.t: "The Wavespirit Fleet"
 pajeong.13.desc: "The Gitueni people, particularly those of the [Root.GetBurghersName], have often turned their noses up at the Bateobugi of Danggun. The armored vessels are safe from man and spirit alike, yes, but slow, and the armor plating takes up precious cargo space. They instead build their boats with lightweight timber from Geuneulsup and shape them with sleek ritual carvings, and pray to the spirits beneath the waves. These ships speed through the water, carrying goods at breakneck pace to all corners of Haless. They desire funds to construct more of these vessels, built to their exacting yet costly standards, to continue their trade dominance."
 pajeong.13.a: "Allow them their fleet."
 pajeong.13.b: "Our Bateobugi are superior!"

 pajeong.14.t: "A Cloak of Empty Promises"
 pajeong.14.desc: "Danggun has a thriving textile industry, and the [Root.GetBurghersName] desire priority access to its products. While in the past, they were content with their role in selling the textiles to other nations throughout Haless, they now come with new demands. To ‘ensure prosperity and profitability,’ they desire solitary control over all textile manufacturing and trade. However, the amount that they have suggested as compensation to the Crane Throne for this privilege is embarrassingly low, much lower than even the value of the land that the textile mills sit on, let alone their product. This is a clear attempt to undermine royal authority, but without their assistance, the trade of textiles will surely slow to a crawl, depriving the crown of much needed income."
 pajeong.14.a: "Give them control of the textile mills."
 pajeong.14.b: "They will not steal the shirts off our backs!"

 pajeong.20.t: "Secure the Western Flank"
 pajeong.20.desc: "To the west, the terror-bird riders stir. The hordes of the Shuvüüsh have often been a thorn in the Crane Throne’s side, ever since their first descent into our lands immediately after the Day of Ashen Skies. But recently there have been whispers of a new leader, a Faceless Queen, uniting the disparate tribes. With the death of Jeong-Hun Gyo, the bowlords of Danggun, the Hwalbaek, are concerned about our unprotected western flank, and demand the construction of fortifications in [pajeong_target.GetName]."
 pajeong.20.a: "We will strengthen our protections against the Shuvüüsh."
 pajeong.20.b: "Surely these nomads are nothing to be worried about."

 pajeong.21.t: "A Untested Gabyeolcho"
 pajeong.21.desc: "Historically, the nobles of the Hwalbaek have often led their own private cavalry armies prior to being placed under a unified command by Jeong-Hun Gyo. These private cavalries could get bogged down by nepotism, with relatives gaining additional training, opportunities, and advancement due to their pedigree rather than meritocratic promotion. A local member of the Hawlbaek has come, demanding that his son be instated as a general to hold the western front. The man refers to him as a ‘competent and skilled leader in battle,’ and even desires a higher payment than usual, citing the results of his expert parental tutelage."
 pajeong.21.a: "We shall give this boy a chance."
 pajeong.21.b: "His blood has never tasted the true fire of battle."

 pajeong.22.t: "Match the Birds"
 pajeong.22.desc: "The Hwalbaek are expert archers, and their skills on foot and on horseback are strong. But the hordes of the Shuvüüsh are better riders still, and their terror-birds can easily keep pace with the horses of the lowlands. Despite our defeat of the Zunk Kuulgo, their other clans are still considered powerful and have the advantage in speed and power, especially if they ever were to unite. Thus, some of the noble families have demanded we invest more into the cavalry, breeding faster and stronger stock."
 pajeong.22.a: "We shall invest in the breeding of horses worthy of our realm."
 pajeong.22.b: "The Shuvüüsh are not a concern."

 pajeong.23.t: "A Bitter Bitten Thumb"
 pajeong.23.desc: "A representative from the Hwalbaek has come to your court, bristling. They claim that [pajeong_rival_target.Monarch.GetName], the [pajeong_rival_target.Monarch.GetTitle] of [pajeong_rival_target.GetName] has insulted our proud realm by openly proclaiming that we are a mere shadow of our former might since the death of Sage King Jeong-Hun Gyo. They insult our military, our prowess, our status within the lands of Gowon. Some even go as far as to claim that we are ripe for the picking, that our lands should rightfully belong to them instead. This is preposterous, of course, and the crown has other urgent matters to attend to at the moment. Unfortunately, the Hwalbaek claim that we must establish our firm superiority and nip this in the bud to save face, and will be dissatisfied in our rule if we should decline to act."
 pajeong.23.a: "This will not stand. Assemble our armies."
 pajeong.23.b: "[pajeong_rival_target.GetName] can flap [pajeong_rival_target.GetName] lips as [pajeong_rival_target.GetName] likes."

 pajeong.24.t: "End of the Conflict"
 pajeong.24.desc: "The conflict with our rival has come to and end. After much effort a deal has been strucked, the Hwalbaek have found it to be..."
 pajeong.24.a: "A great outcome"
 pajeong.24.b: "Greatly dissatisfying"

 pajeong.25.t: "Every Farmhand a Footsoldier"
 pajeong.25.desc: "While the elite of the Hwalbaek descend from well-trained noble houses, they are not ignorant to the truths of war. When push comes to shove, numbers will always be important. Thus, they have been worried about the amount of levies that we have access to in cases of a military emergency. They have therefore petitioned for the permit to conscript the rural farmers of Danggun, training and equipping them in preparation of a mass recruitment in times of war. This will unfortunately divert their work force away from our farmlands, but denying this request will cause the Hwalbaek to be rather upset."
 pajeong.25.a: "You may conscript your peasants. Let’s see if they make good soldiers."
 pajeong.25.b: "Soldiers are worth nothing if we have no food to feed them."

 pajeong.30.t: "The Dreary Temple of [pajeong_target.GetName]"
 pajeong.30.desc: "The temple in [pajeong_target.GetName] has fallen into disrepair, to the point that it might as well not exist. Taxes that should have been deferred to its upkeep have been siphoned into the wrong pockets. The Neoksamaji have come with a request from the spirits that live there, angered over the dilapidated state of their place of veneration. With glowing eyes characteristic of someone being possessed by the spirits, their voice booms as they demand the funds and laborers to not only restore the temple but to elevate it to an even grander state. A truly impressive temple for the spirits that live there appears to be the price if we want them to continue to abide by the Compact."
 pajeong.30.a: "We will build a temple worthy of the spirits."
 pajeong.30.b: "Regrettably, these funds are needed elsewhere."

 pajeong.31.t: "The Spirit’s Sanctions"
 pajeong.31.desc: "To the south, the people in our holdings in Yanshen still practice the teachings of the Accretive Path, desiring to refine their chi at the expense of the spirits and their ancestors. To the west, the conquered Zunk Kuulgo still wear the masks of the Three Brothers of the Saanorgegh faith and practice the binding of their ancestors' spirits instead of venerating them as we should. The Neoksamaji demand that we put a stop to this. They desire to send missionaries and guards in order to ensure that the spirits are given the deserved reverence, and bring the heathens into the Neokttareum faith. They encourage us to even make public our disapproval to other nations who do not follow our ways."
 pajeong.31.a: "They should follow the laws of Sado."
 pajeong.31.b: "They are free to practice as they wish."

 pajeong.32.t: "A Faith Divided"
 pajeong.32.desc: "The people in [pajeong_target.GetName] have had enough of the Neoksamaji. They desire to live their lives as they wish, unrestricted by the capricious laws of the spirits. The spirits in [pajeong_target.GetName] are in anguish over the loss of the population’s once-devout adulation. The Neoksamaji naturally desire for us to crack down on these heretics, claiming that this is a breach of the Compact. However, the people will surely react violently to any move against them."
 pajeong.32.a: "The Neoksari deserve respect, whether freely given or enforced!"
 pajeong.32.b: "They are free to practice as they wish."

 pajeong.33.t: "Neoksamaji-Lead Proselytization"
 pajeong.33.desc: "An important facet of Sage King Jeong-Hun Gyo’s rule during the unification of Danggun at the end of the Daehonse was his support for the spread of the Neokttareum faith. Through diplomacy and grace, he proved to the people that the spirits and the Compact’s law were worthy of reverence. But to the people, Haeng Gyo does not have the charisma of his father, and their devotion has begun to falter. This has angered the Neoksamaji, for whom the veneration of the spirits and adherence to the laws of the Compact are of utmost importance. They desire to be granted the right to directly oversee all conversion efforts, despite the increased costs that their fervent endeavors will entail."
 pajeong.33.a: "The Neoksamaji will show the people the way."
 pajeong.33.b: "This is an unnecessary expense."

 pajeong.34.t: "Gumiho’s Eyes On [Root.Monarch.GetName]"
 pajeong.34.desc: "It is well-known that the Neoksamaji can access the wisdom of the ancestors and the spirits by allowing a Neoksari to possess them. This possession grants them powers such as prophetic visions and the ability to speak to the dead. One such Neoksamaji has come to the court, and proclaims that Sado and her Gumihos have demanded a closer supervision of the Crane Throne. They believe that the Compact has not been properly upheld since the death of Sage King Jeong-Hun Gyo, and feel the need to appraise for themselves the goings-on at court."
 pajeong.34.a: "Gladly invite the Neoksamaji to court."
 pajeong.34.b: "The Crane Throne does not need their meddling."

 pajeong.40.t: "Decadence in the Western Guard"
 pajeong.40.desc: "It was not so long ago that Sage King Jeong-Hun Gyo conquered the Shuvüüsh tribes now within our lands. There remain many who remember their lives as an independent clan, and wish to return to that unfettered existence. With his passing, and the destabilization of the realm under the current rule of [Root.Monarch.GetName], they believe their wish might finally be realized. The local authorities, trained by the Administrative Academies of the Neoksamaji, are nervous, as the local communities begin to ignore them and instead claim more autonomy for themselves."
 pajeong.40.a: "The local authorities will have to fend for themselves."
 pajeong.40.b: "We must attempt to help!"

 pajeong.41.t: "Raiders at the Gates!"
 pajeong.41.desc: "Raids on our western front have increased, as the Shuvüüsh bird riders grow bold. Towns are razed, caravans looted, and government buildings ransacked. And at the center of it all, the local Shuvüüsh communities remain untouched. It is clear to any with eyes to see that they are welcoming their fellow tribesmen to weaken our rule. As long as they spy for their wild brethren, it has become nearly impossible to stop their strikes at our crucial administrative infrastructure in this region. Even worse, the Hwalbaek soldiers who would normally rise at the challenge of the bird-riders are complacent. They sit back and watch to see how we handle the situation, laughing at our misfortune. We must act."
 pajeong.41.a: "The people will have to endure"
 pajeong.41.b: "Force the Hwalbaek’s hand!"

 pajeong.42.t: "Rise of a New Izhuun"
 pajeong.42.desc: "Our attempts at keeping our western border defenses strong are faltering. In the borderlands, terror-bird raids continue to strike at our infrastructure. Worse, there are whispers of a new Izhuun spreading among the local communities. Travelling from village to village, he is rallying the Shuvüüsh people, calling for a return to their independence. Utilizing their clan’s trademark cunning diplomacy and opportunism as well as the wisdom of the previous Izhuuns, he has brought the tribesmen to a frenzy that may soon boil over. And it is unclear if the might of [Root.Monarch.GetName] will suffice to stem the upcoming deluge."
 pajeong.42.a: "In the west, an Izhuun rises…"

 pajeong.43.t: "Throne Breaker"
 pajeong.43.desc: "The rumors were true. A new Izhuun has risen, rallying the Shuvüüsh of the borders behind his lead. Nurhachi Sartul is a cunning man, and has used the western frontier’s position as a crossroads of civilizations well. With military support from the other Shuvüüsh tribes to the west, and trade agreements with the Yan to the south, they are well equipped  to defend their independence now that they have risen up. Even worse, they are some rare shamans amongst their people who are capable of garnering the support of the spirits; several spirits have chosen to fight with them, believing that with the rejection of [Root.Monarch.GetName] from Sado, the Compact may be shattered. Wearing the clan mask of Kadash Ak-Zunk, Nurhachi Sartul rides into battle atop a terror-bird that he himself raised, vowing to never again live under the yoke of a Gowon state."
 pajeong.43.a: "We will crush them, as Jeong-Hun Gyo once did!"
 pajeong.43.b: "Independence for Zunk Kuulgo!"

 pajeong.44.t: "The Lost Frontier"
 pajeong.44.desc: "Our armies shattered. Our flags in tatters. Our towns burning. This is the news that comes back from the western front. Zunk Kuulgo has won. Their lands are independent once more, and what few troops we have left lack the morale to fight anymore. The borders of the realm are wide open for the picking, and the Shuvüüsh remaining in our lands quickly return to their old ways. Our weakness is palpable, and all around, hungry eyes gaze upon us, desiring to take their own delicious morsels out of our wounded realm. We cannot think of expansion now, we must focus inward, focus on defense. There is nothing left to do but try to desperately hold onto what we have left."
 pajeong.44.a: "For soon we may have nothing left at all."

 pajeong.50.t: "The Voices of [pajeong_target.GetName]"
 pajeong.50.desc: "‘I heard he partakes of the poppy seed’ whispers one woman.\n\n‘I saw him incapable of even firing a bow,’ mutters a man.\n\nA child exclaims ‘Mommy said he needs help to pee!’ before being shushed.\nAll this and more has been heard from the populace of [<generic_event_1_province>.GetName]. The rumored weakness of our ruler has been the town gossip, and the local governors are fearful of the chaos this might cause. Their power is slipping before their eyes, and they have come to the Crane Throne for guidance. We have to handle this, but how?"
 pajeong.50.a: "Send in the troops as a show of our superiority"
 pajeong.50.b: "They won’t remember a thing after our mages are done with them!"
 pajeong.50.c: "It is of no matter."

 pajeong.51.t: "Bad Reputation Amongst Traders"
 pajeong.51.desc: "The traders of Yanshen, in search of endless profits, have been quick to take advantage of our current fractious state. The chaos engulfing our nation after the death of Sage King  Jeong-Hun Gyo has been less than ideal for creating and maintaining stable  economic partnerships. Even worse, the famed Treasure Fleet is expected to arrive soon, putting even more pressure on the court to improve our standing among the merchants of Haless. If we do not do something soon to secure our trade relations, we will be left in the dust.\n\nA clan of merchants from Yanshen has suggested we grant them a monopoly on the goods from [<generic_event_2_province>.GetName], in return they offer to open new inroads for our traders. Alternatively, we have the option to either allow the traders of Yanshen to freely operate within our home, or simply acquire new income sources for the treasury, making us less dependent on trade."
 pajeong.51.a: "Allow the Yanshen merchants their enclave."
 pajeong.51.b: "Trade is not that important. Pivot to other income sources."
 pajeong.51.c: "We have enough mercantile acumen to weather these demands."
 pajeong.51.d: "We will grant them access to our trade roads."

 pajeong.52.t: "Disturbance in the Cranes Court"
 pajeong.52.desc: "Tensions are high within the court of the Crane Throne, as the members of the Merchants, Hwalbaek, and Neoksamaji have all gathered to air their grievances. Not only their grievances towards [Root.Monarch.GetName], of which there are many; each group, of course, believes theirs are the most important. But also their grievances towards each other have spilled out, and at the end of the day, throats are sore with shouting and hands aching after shaking fists and pointing fingers. [Root.Monarch.GetName] stepped in several times in an attempt to stop the fighting, but has been forced to abandon [Root.Monarch.GetHerHis] efforts each time due to accusations of siding with one of the estates.\n\nThe Merchants promise that their demands being met will result in profit for both [Root.Monarch.GetName] and themselves. The Hwalbaek proudly proclaim that the army's needs are paramount. The Neoksamaji whisper that the spirits will be generous if they are propitiated. Of course, [Root.Monarch.GetName] always has the option to refuse them all, making no one happy."
 pajeong.52.a: "Side with the enterprising Merchants."
 pajeong.52.b: "Side with the courageous Hwalbaek."
 pajeong.52.c: "Side with the pious Neoksamaji."
 pajeong.52.d: "None of them will get their wishes."

 pajeong.53.t: "Weakened Guard"
 pajeong.53.desc: "During the rule of Sage King Jeong-Hun Gyo, the army was well-outfitted, and well-trained. The Hwalbaek proudly brought up new recruits, and each regiment functioned as a well-oiled unit. But the recent conflict in our nation has caught up to our army. Members of the army are often at each other’s throats, whether due to arguments about the ineptitude of our ruler or the more insidious whispers of restoring an independent Dalmangaji. This infighting among the officers has echoed down to the lower ranks, and the newer recruits are not getting properly trained, instead being subject to long days of conflicting propaganda rather than days of drilling. We have the option to send some loyal military instructors to several military camps to enhance their training, but this will undoubtedly ruffle some feathers."
 pajeong.53.a: "Send the instructors. Our army must stand tall."
 pajeong.53.b: "Our generals can whip them into shape."
 pajeong.53.c: "Order the Hwalbaek to get their men in line."

