 #Estate Privileges
 estate_burghers_disobedience_of_the_merchants: "Disobedience of the Merchants"
 estate_burghers_disobedience_of_the_merchants_desc: "The merchants of Danggun have enjoyed prosperity and leveraged their connections to sell goods across Gowon and Yanshen under Jeong-Hun Gyo’s rule. The rise of Haeng Gyo, his son, after his death has been the cause of concern for the merchants. They fear that he is not aware of their importance for the realm, and have begun to negotiate trade deals and business agreements without the knowledge of the crown. In the dark waters of the Sea of Spirits, their independent ambitions are goaded on by Paleunpado, the Neoksari of the waves that the Gitueni people worship..."
 estate_nobles_disobedience_of_the_hwalbaek: "Disobedience of the Hwalbaek"
 estate_nobles_disobedience_of_the_hwalbaek_desc: "The elite caste of warriors of Danggun are the Hwalbaeks, fierce archers, both on foot and on horseback, who employ falcons to scout and fight alongside them. These private armies were brought to heel during the Daehonse by Jeong-Hun Gyo. However, with the succession of his son, the warriors of the clan are concerned that Haeng Gyo will not be able to contain the rising Shuvüüsh threat. The more ambitious of the bowlords look to the example of Bhengudak’s mask and whisper in private of their desire to reclaim it in the name of an independent Dalmangaji."
 estate_church_disobedience_of_the_neoksamaji: "Disobedience of the Neoksamaji"
 estate_church_disobedience_of_the_neoksamaji_desc: "The Neoksamaji that reside within Nakseseom are the most ardent followers of the Neokttareum faith. Trained to follow Sado and her fox spirit underlings, during the rule of Sage King Jeong-Hun Gyo they fulfilled their duties to him as outlined in the Compact. But the rise of his inept son, Haeng Gyo, has caused them to balk, knowing that he will not be accepted by Sado. Possessed by the spirits, the Neoksamaji and the most faithful of the Hwalbaek bowlords desire one of their own to rise to the throne as Sage King. And, failing that, restore the independent state of Baegye that Jeong-Hun Gyo once brought to heel."

