l_english:
 #EVENTS
 ardimya.1.t:0 "Birth of Ardimyan Culture"
 ardimya.1.d:0 "Far away from the Dameshead, leagues apart from the Divenhal, down the very end of Sarhal, a new people have emerged. On the shores of Ardimya, members of this new people watch a trade ship sail into port, its hold laden with Halessi goods being shipped back up the Uelos’ Lament. A gaggle of merfolk poke their heads above the waves to watch the boat dock at the newly built harbor, the crew stepping down the gangway and heartily greeting their \"fellow Cannorians\" - a salutation which leaves those on the dock perplexed.\n\n\"Cannorian? I haven’t seen Cannor in my life. I am naught but a proud Ardimyan\""
 ardimya.1.a:0 "Ardimyan you say?"
 ardimya.4.t:0 "The Spread of Ardimyan Culture"
 ardimya.4.d:0 "What does it mean to be Ardimyan? The culture’s roots are indeed found in Cannorian culture, but those roots have spread far, and spread thinly. A love of Lencori wine has been morphed into a fondness for spiced cider. A typical morning cup of Damerian Tea is now enjoyed in the evening, while the Ardimyan morning is instead for Dakinshi coffee. A rude joviality, bolstered by an almost goblin-esque approach to safety, and a braggadocious Vernman-esque desire to tell your grandkids that you once wrestled a demonic Qeyikul after falling into an ancient genie waterway, regardless if you had arrived long after the last Qeyikul left these lands.\n\nAs these signifiers of Ardimyan culture rose, their connection to Cannor faded. Increasingly the people on the heart-shaped peninsula do not consider themselves Cannorian, and resent the label being foisted upon them by their colonial overlords. They feel more kinship with even the native Guryadagga population, incorporating various aspects of their ancient faith into a version of Cannorian religion barely recognisable to those back upon the Divenhal. These sands enchanted with ancient genie magic, these shores teaming with underwater civilisation - these are what make an Ardimyan."
 ardimya.4.a:0 "What are they up to down there?"
 ardimya.5.t:0 "The Birth of Ardimya"
 ardimya.5.d:0 "The governor had retreated to his quarters after the southern tip of Fahvanosy had faded from view, but found her sleep interrupted by the First Mate of the ship. Stumbling onto the deck, she was handed a telescope by the captain. “Recognise that flag? Do you think the port has been taken by pirates?\"\n\n\"No, that’s not it\", said the governor, groaning as she finally spotted the flag unfurled above the dock, “but tell your men to stay below deck anyway, and be prepared to swiftly depart if things go sideways.” She handed back the telescope and stepped closer to the captain so she would not be overheard. “I do not trust these acrimonious Ardimyans. Shipments of weapons have been going missing. They are planning something.\"\n\nYet, despite the governor's worrisome warning, there was no violence once she landed on the shores. A core of about 10 prominent Ardimyans presented her with a document, signed by each member in increasingly flamboyant handwriting, of what they wished for the people of the peninsula. Greater autonomy, the ability to choose their own governor, and a variety of guaranteed rights for Ardimyans. The head of the group presented it as a mutually beneficial agreement. It cannot be easy, he argued, to administer affairs of taxation and trade from all the way up in [Capital].\n\nHe also casually let slip that the people of Ardimya had been arming themselves. To guard against further Qeyikul attacks, he insisted, although the look behind his eyes betrayed their true intent."
 ardimya.5.a:0 "You may have your autonomy"
 ardimya.5.b:0 "Hoist the flag of Ardimya"
 ardimya.5.c:0 "You get nothing"
 ardimya.6.t:0 "Rebellion on the Southern Shores"
 ardimya.6.d:0 "It can take weeks, months even, for news from Ardimya to reach Cannor. Usually it consists of little more than dull trade and tax reports, spiced up occasionally by the discovery of an ancient genie ruin or a run-in with native demons. These latter tales had caused [Root.Monarch.GetName] to consider another expedition of [Root.Monarch.GetHerHis] own to the southern tip of [Root.Monarch.GetHerHis] empire, but alongside the official news reports, various other sailors stories filtered their way back to the metropole - and they had not ingratiated the Ardimyan people to [Root.Monarch.GetHerHis] liking. Loud, rude, and with just the most despicable bastardization of traditional [Root.GetAdjective] cooking. Their people reportedly smelled of fish and alcohol, and if the rumours were to be believed, the merfolk and the Ardimyans had the sort of troubling 'affinity' for each other that could fill a hundred bawdy sailors' songs.\n\nAll of these negative stereotypes replayed through [Root.Monarch.GetHerHis] mind as [Root.Monarch.GetSheHe] read through the latest, frantically written report, [Root.Monarch.GetHerHis] rage increasing with every sentence. The Ardimyans were revolting! In multiple meanings of the term! On the other side of Halann, they had hoisted a traitorous flag and, with their perfidious underwater allies, burnt down multiple [Root.GetAdjective] ships, and had declared themselves as something other than part of the glorious nation of [Root.GetName]."
 ardimya.6.a:0 "Those traitors must pay!"
 ardimya.7.t:0 "The First Fires of Independence"
 ardimya.7.d:0 "The embers scattered into the night sky as the Cannorian ships slowly sank into the harbor, the fires snuffed out one by one by the restless waves. Two Ardimyans watched the fires go out from the shore.\n\n\"We could have done with those ships for when the Cannorian fleet arrives.\"\n\"We sure could have.\"\n\nSilence. The sputtering continued as a flaming mast hit the water.\n\n\"Is that not dangerous for the merfolk?\"\n\"They retreated a while ago. Their settlement is outside the harbor.\" Silence. The last of the fires were swallowed by the ocean, leaving only the moon and the stars to lighten Uelos’ Lament.\n\n\"We’ve really done it now, haven’t we?.\"\n\"Yep. There’s no turning back now.\""
 ardimya.7.a:0 "Ardimya will be free."
 ardimya.8.t:0 "Independence"
 ardimya.8.d:0 "Trumpets blared across the town square as men rode through the streets on horseback, catching flowers as they were tossed from the crowds. Merfolk, usually so reclusive, swam right up to the shoreline, sporting crowns of deepwater fauna and seaweed.\n\nAwoken by the chaos, one man in a nightcap threw open his shutters and called out to a child celebrating rambunctiously outside his window: “What is all this commotion about boy?”\n\n\"Have you not heard sir? The Cannorians have surrendered.\"\n\n\"Prithee, what? Absurd! Surely they would not let Ardimya, the crown jewel of their empire, leave? They barely put up a fight!\"\n\n\"It is true sir! They left these shores not two hours ago. Ardimya is free!\"" 
 ardimya.8.a:0 "Long Live the Republic! Long live Ardimya!"
 ardimya.9.t:0 "Independence of Ardimya"
 ardimya.9.d:0 "The colonial governor flinched as [Root.Monarch] slammed the book shut. \"That’s it? After all those years of painstaking, and not to mention costly, colonial efforts, we’re just going to let them leave?\n\nThe governor shuffled his feet and fingered the brim of his hat on his lap. \"They had underwater assistance. The merfolk you see-\". He flinched again as [Root.Monarch] stood up so fast their chair fell over and hit the floor. \"Merfolk? Why, they can’t even use gunpowder underwater! I can’t believe we lost to a bunch of fish-loving…!\"\n\n[Root.Monarch] shook his head, sighed and stood in front of the map of Halann, pulling a pin out of the heart-shaped peninsula at its bottom. \"Perhaps we can send you somewhere else to start a colony.\" His gaze moved north-east… to a large, unmapped oval on the map. \"Hmmm… what about past these great walls of storm I’ve heard so much about?\""
 ardimya.9.a:0 "The governor paled. \"I’m sorry, where are you sending me?\""

 ardimya.10.t:0 "A Rebellion Crushed"
 ardimya.10.d:0 "The surrender ceremony was held inside a large, pitched tent. The glorified barn that had served as the rebellion’s central headquarters was still ablaze and the nearby town had too many of its spare buildings turned into makeshift hospitals for the conflict’s wounded. In the tent sat the commander of the Ardimyan Reclamation Army in front of two soldiers: the second in command of the rebellion, who sported a bloodied bandage covering one eye, and a senior figure in the loyalist resistance movement, who had fought faithfully for [Root.GetName]. One of them was looking significantly more elated than the other.\n\n\"With this surrender,\" the resistance leader said, \"I believe we can turn back the clock and return to a mutually beneficial agreement, one where both Ardimya and [Root.GetCapital] can prosper.\" He signed the document with an elaborate swish of his wrist and handed it over to the wounded general. \"Ardimya shall return to a crown colony, eternally loyal to the [Root.Monarch.GetTitle], and the traitors who have finally seen wisdom and surrendered shall not be sent to the gallows. I believe we can all agree that is an acceptable outcome.\"\n\nThe commander from [Root.GetCapital] scanned the document with a furrowed brow. \"Who said Ardimya was going back to being a crown colony?\""
 ardimya.10.a:0 "The age of Ardimyan autonomy is over."
 ardimya.10.b:0 "Perhaps this deal does suit us…"

 ardimya.11.t:0 "Dreams Die with Age"
 ardimya.11.d:0 "A perplexing report from our fleet in Ardimya. It appears the Ardimyans have stopped shooting at us. Our ships have been simply allowed into port without fuss and the exiled governor has been allowed to return to the state house. Whatever fire had been fueling their fight over the past few decades appears to have sputtered out with time."
 ardimya.11.a:0 "One less headache for us"

 ardimya.12.t:0 "Liberty Dies with Age"
 ardimya.12.d:0 "There was once a dream of a Free Ardimya. One free from the yoke of Cannorian rule. But after decades of war, those who started this revolution have passed into old age and a younger generation can’t help but ask: is this really better? Sitting at the bottom of the globe, isolated from the world. We were once part of a glorious empire. Why must we follow our fathers into pointless war?"
 ardimya.12.a:0 "And so the guns of liberty are laid to rest"

 ardimya.13.t:0 "Conquered Previous Colony"
 ardimya.13.d:0 "It does not matter where your father or grandfather came from in Cannor. All those descended from colonists eventually find their identity swallowed into that of Ardimya. For its promise of freedom and liberty, see, entices all – at least, once they see their village underneath the Republic's flag."
 ardimya.13.a:0 "Welcome Ardimyans"
 ardimya.13.b:0 "Welcome but please don’t notify me again"


