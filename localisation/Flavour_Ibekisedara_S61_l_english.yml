l_english:
 S61_bandits_of_the_center_title:0 "Bandits of the Center"
 S61_bandits_of_the_center_desc:0 "Gumti has always been the most brazen of the warlord states, little more than a coalition of bandits barely bothering to play at legitimacy. Without a charismatic leader keeping them together, they fled for the hills. No longer an army, but all the more dangerous for their desperation, they prey upon isolated villages and caravans, sustaining themselves through theft, ransom, and slaughter.\n\nTo pacify these lands, detachments of Ibekisedaran soldiers have been dispatched to work alongside Life Watching Eagle. From above, the shifted eagles track the bandits’ movements across through the ridges and ravines of central Bamaliwuni, while on the ground, our soldiers tighten the noose around them. Hill by hill, these joint patrols are rooting out their lairs, putting the bandits to the sword and seizing their ill-gotten gains."

 S61_the_quiet_north_title:0 "The Quiet North"
 S61_the_quiet_north_desc:0 "To call the northern reaches of Bamaliwuni peaceful would be a misnomer. Warlords and bloodshed still dominate the land, but the conflict there carries a more honorable character. Two groups stand above the rest: Butuguzi, an alliance of coffee-loving traders more interested in profit than conquest, and Degumwamba, ruled from the shadows by Rufaro, an undying frog of diminutive size and immense wisdom. It is Rufaro’s steady influence that has preserved what dignity remains in the north, especially when contrasted with the raw savagery of the southern tyrants.\n\nYet despite this relative calm, both warlords still claim the legacy of Bwa Dakinshi, and as long as contenders remain to quarrel over that accursed mantle, the land will never truly know peace. Once they are subdued, it would be wise to seek out Rufaro and win him to our cause. His support would be invaluable in bringing lasting peace to these lands."

 S61_the_ways_of_war_title:0 "The Ways of War"
 S61_the_ways_of_war_desc:0 "Our defeat at the hands of the Dread Fang of Bosonkikon is a stain upon our history. The eternal fortress of Mengamsipe has never fallen to an enemy in all the centuries since its construction, but in truth that record only stands because the Mezhi chose to surrender to the Dread Fang in 1444 rather than see it fall during his rule.\n\nLosing to that savage has made it abundantly clear that our knowledge of war has grown antiquated. The old writings have been set aside, and as we carve our way across Bamaliwuni, our generals are penning a new text drawn from their own experiences, recording their thoughts on strategy and warfare. They have titled this tome “E Mengedu Dorenet” - “The Ways of War” - and it has become customary for our commanders to bring a copy with them on campaign. As they fight and learn, they add their own annotations, which are later compiled into future editions, creating an ever-evolving chronicle of Ibekisedaran warcraft."

 S61_tyrants_of_the_south_title:0 "Tyrants of the South"
 S61_tyrants_of_the_south_desc:0 "The south of Bamaliwuni was once the heart of Bwa Dakinshi, and after the collapse of the empire, it became the home of the most vicious and successful warlords. The great cities of the south all bred their own terrors, from the warmongers of the great fortress of Kuvunika to the cruel blades of the golden city of Kaziradoka to worst of all: Inshibonde, the seat of tyrants.\n\nThe decay and poverty of these cities is blunt testament to constant cycles of unrest and an ever-changing parade of warlords who seem to believe good leadership is being crueler than one’s predecessors. If we are to break these cycles and pacify the south, it will require a firm hand and a strong garrison to put down any budding warlords before they can threaten our rule."

 S61_grain_from_the_king_title:0 "Grain from the King"
 S61_grain_from_the_king_desc:0 "Grain has long been the preferred lever of the Mezhi of Ibekisedara. Our homeland is a rugged one, dominated by high peaks and scattered, transient villages eking out a living through herding and mining. The lone exception is Meworetiketema, where the Governor, and later the Mezhi himself, made his home. Nestled in the lowlands, it provides a steady supply of grain that the ever-gracious lord below uses to feed his people.\n\nNow the time has come to extend this system to the war-torn lands of Bamalwuni. Our soldiers are already seizing control of the fields from the local warlords, bringing them under the personal ownership of the Mezhi.\n\nWhen the grain shipments begin in earnest, each crate and sack will bear the sigils of the royal family and the Life Watching Eagle. And with every full belly, another loyal subject will be won over."

 S61_return_to_the_marshes_title:0 "Return to the Marshes"
 S61_return_to_the_marshes_desc:0 "Perhaps we should thank the Dread Fang. Were it not for Ibekisedara’s humiliation at his hand, Life Watching Eagle would still be roosted at Mengamsipe, skirmishing with the Cobra and shepherding refugees through the passes. A noble calling, to be sure, yet one cast in shadow by our newly spreading wings.\n\nSuch a thanks, however, will be delivered to the Dread Fang at the end of a sword. The Mezhi has decreed that the time has come to reclaim [Root.Monarch.GetHerHis] Sitewosi subjects. Thus we prepare to march into the marshes of Bosonkikon, for the first time advancing as a true part of the Mezhi’s armies rather than as mere auxiliaries.\n\n- From the journal of Irara Ishimwe, Vitaragomo of the Life Watching Eagle Tribe"

 S61_legacy_of_zenidir_title:0 "Legacy of Zenidier"
 S61_legacy_of_zenidir_desc:0 "Let all peoples of these lands be reminded: the line that rules Ibekisedara today is no upstart lineage, but boasts direct descent from those who once held authority under Zenidir’s own dominion. In the days when the Melakmengi stood unbroken, [Root.Monarch.GetHerHis] forebears governed with wisdom, upheld the law, and safeguarded the mountain passes in service to the realm. While many have forgotten our history and disregard the holy name of Zenidir, the blood that guided those lands still flows in the veins of the Mezhi. [Root.Monarch.GetSheHe] claims no new throne, only the station granted to their ancestors and maintained through unbroken service.\n\nMezhi [Root.Monarch.GetName] therefore stands as the lawful inheritor of that venerable mantle. Let this history show all that Ibekisedara governs not by conquest, but by the rightful weight of tradition and the enduring memory of Zenidir’s Melakmengi."

 S61_the_eternal_defenders_title:0 "The Eternal Defenders"
 S61_the_eternal_defenders_desc:0 "For generations, the Talilibeti have stood as Madrimalak’s bulwark. Along the edge of the Shadow Swamp, they have fought the trolls for generations, bleeding them on their earthworks and holding the line through sacrifice and resolve. Their struggle has bought safety for lands far beyond their own, a mirror to our own history at the ramparts of Mengamsipe.\n\nNow the conquest of Denibari has changed the balance of this ancient war. No longer divided, the Talilibeti need not stand alone. Great fortresses to rival Megamsipe shall rise along the swamp’s border, stone and faith a shield against the shadows."

 S61_a_decade_of_defeat_title:0 "A Decade of Defeat"
 S61_a_decade_of_defeat_desc:0 "Almost a decade of war has left Ibekisedara a wounded nation, its lands pillaged and conquered, its armies shattered in the field and emaciated by years of siege. Its very purpose as the unbreakable defender of the mountain pass was nearly lost to the Dread Fang. Adrift in an uncertain future, Mezhi [Root.Monarch.GetName] has summoned the whole of the realm to what [Root.Monarch.GetSheHe] has named the “Great Council of Reflection.” All who attend have been promised the chance to present their case for what went wrong and where Ibekisedara must go from here.\n\nEvery group worth mentioning has sent its representatives: a united but directionless bloc of Semayebaka and Tanikweya; a half-dozen factions of Yenaze Mezhi guarding their interests; many a merchant eager to secure their position in the nation’s rebirth. Yet perhaps most curious of all is that the Life Watching Eagle tribe, rarely seen at court, has appeared in force."

 S61_behead_the_snake_title:0 "Behead the Snake"
 S61_behead_the_snake_desc:0 "For the first time in centuries, Ibekisedaran soldiers have crossed the pass into Bamaliwuni, shedding the safety of their fortress. Led by scouts from the Life Watching Eagle, their columns marched into the mountains and valleys the Cobra called home. They sought victory and glory, and found only a crushing darkness. The land itself is tainted by the aftermath of dark rituals and is filled with villages left eerily empty. The survivors tell stories of shadow-twisted shifters who brought only death and took everything that remained. While Kuende’s armies may have been defeated, her presence clearly still blights this land. We must cleanse it, rooting out her supporters once and for all."

 S61_and_burn_its_corpse_title:0 "And Burn Its Corpse"
 S61_and_burn_its_corpse_desc:0 "This land has been befouled by the darkness of the Death Bringing Cobra. Over every mountain pass lies another tragedy, another horror wrought by their hand. The people move with heads bowed, forever bracing for the next misery. If the land is to heal, it must first be purged. The leaders of the Cobra may have been put to the sword, but their underlings still skulk among the populace. We must drag them into the light before their corruption can take root once more.\n\nAt the same time, the people must be taught to hope again. We will teach them of Amilak, that they may see their future is no longer chained by the shadows of Yrilak, but is instead as free and open as the sky itself."

 S61_infrastructure_of_worship_title:0 "Infrastructure of Worship"
 S61_infrastructure_of_worship_desc:0 "While the Yrilak worshippers of Death Bringing Cobra may have been burned away, the Dakinshi remain vulnerable to the danger that still lurks in the shadows. They cling to their animal gods, unaware that doing so leaves them blind to the circling darkness. If the people of Bamaliwuni are to be truly protected, they must be shepherded into the light of Amilak.\n\nWe will begin with stone and mortar, raising new sky temples in the cities of Bamaliwuni. Their domes shall stand tall above markets and crossroads, beacons of light to draw in the curious and central hubs from which the Semayebaka shall spread across the countryside."

 S61_march_of_the_eagles_title:0 "March of the Eagles"
 S61_march_of_the_eagles_desc:0 "At last, we have brought peace to Bamaliwuni, a task we could not have succeeded at without Life Watching Eagle. As warriors, they stepped up again and again, joining our forces and providing invaluable support in bringing down the Dakinshi warlords all while not enjoying the privileges of soldiers of the royal army. As healers, the members of Life Watching Eagle remained behind when our armies marched to the next campaign, offering a friendly presence who could help the people recover and to teach them of Amilak.\n\nLastly, as watchers, they have become our eyes and blades in those liberated lands, circling silently in the skies, ready to strike down any nascent warlords or servants of Yrilak before they can reignite the chaos of past centuries. It is high time that the Eagle’s service to both Amilak and the crown be recognized. They shall be properly brought into the fold of our administration, given the authority to continue serving as warriors, watchers, and healers."

 S61_our_holy_perogative_title:0 "Our Holy Perogative"
 S61_our_holy_perogative_desc:0 "In the wake of the Second Council, we now have a new purpose. It is Ibekisedara’s destiny to expand Amilak’s domain and protect all the people of Eastern Sarhal from the insidious hags of the Shadow Swamp. Such a grand destiny will require the cooperation of all segments of our society.\n\nUntil now the Nagide and the Yenaze Mezhi have been passive, supporting the cause as though it were a normal war, offering men and gold but lacking true commitment. After wavering for so long, Mezhi [Root.Monarch.GetName] has decided that they no longer have the luxury of choice. A new tithe has been levied upon the Yenaze Mezhi, requiring a percentage of their income and soldiers to be put towards our crusades. And for the Nagide, a new law will require any merchant who wishes to do business within Ibekisedara to sign a contract of supply with our armies, providing matériel at a discounted rate"

 S61_birds_of_a_feather_title:0 "Birds of a Feather"
 S61_birds_of_a_feather_desc:0 "At the edge of the Shadow Swamp, where the very color of the world begins to fade, we have found kindred spirits. Two Tanizu tribes, Violent Hearted Goose and Friend Helping Parrot, have long guarded the edge of this dour place, holding the line against troll incursions. The similarities between their eternal war with the Shadow Swamp and our long vigil against the Dakinshi is not lost on us, and we have begun taking steps to integrate their efforts.\n\nFriend Helping Parrot has been taken under the wing of Life Watching Eagle, their honeyed words and deep connections with the Tanizu tribes make them an ideal face for our operations in the region. As for Violent Hearted Goose, we have begun raising a great new fortress on the fringe of the swamp, a new Mengamsipe upon which the forces of Yrilak shall break."

 S61_the_godless_frontier_title:0 "The Godless Frontier"
 S61_the_godless_frontier_desc:0 "Here in the south, we have reached the edge of reason. Beyond these borders lie only godless heathens who deny the fundamental divinity present in the world. To the south and west are the lizardfolk and the Baashidi, both of whom eschew even the God-kin in favor of their profligate philosophies. To try and convert those who believe the divine are dead is a fool's errand. Our march will stop here, and great new fortresses will be raised along the borders, from which our soldiers will defend the lands of Amilak and test their mettle against these godless heathens."

 S61_the_south_protected_title:0 "The South Protected"
 S61_the_south_protected_desc:0 "Ishyamtumu is at last secured, free from the encroachment of Yezel Mora. Their borders are secured, the Tanizu people brought into the light of Amilak.\n\nYet to the north, the rest of Madrimalak remains fractured, the Mezhis squabbling over petty rivalries instead of working against the true enemy. This cannot be allowed to endure. It is time to turn our gaze north and restore Amilak’s order to His domain. Madrimalak shall be united for the first time since Zenidir, guided by the Getametaki toward a single, righteous purpose."

 S61_the_domain_secured_title:0 "The Domain Secured"
 S61_the_domain_secured_desc:0 "For the first time in more than half a millennium, Amilak’s domain has been united and freed from the encroachment of heathens. The lands prosper, freed from the infighting that has plagued it since Zenidir’s death. Trade flows down the rivers and ore pours from the mines. Across the domain a million peasants sit for a meal and thank their gracious Getametaki for granting them the grain that now fills their plates. On the borders, soldiers from every region and people of Ibekisedara stand ready to defend against any incursion, while in the cities members of Life Watching Eagle circle overhead, ready to strike down any threats before they can rise. Truly Madrimalak is a blessed land, and we are a blessed people."

 S61_a_new_source_of_copper_title:0 "A New Source of Copper"
 S61_a_new_source_of_copper_desc:0 "The mines of Ibekisedara have been dry for generations, its famed but dwindling population of copper workers relying on an ever fading supply of dregs and small veins. But now, with the conquest of the Death-Bringing Cobra, that scarcity has come to an end.\n\nThe rich copper seams of the Dezpa mountains are now in Ibekisedaran hands. Long fallow due to the endless war of the Dakinshi, the peace we have brought has seen local workers return in force, alongside several korebitamipi settlements that have uprooted themselves to find a new future through the passes. Now caravans heavy with ore begin to wind their way through the passes toward the heartland. For the first time in living memory, our artisans can work without fear of shortage, their forges lit and churning new works of copper and bronze."

 S61_grain_for_the_armies_title:0 "Grain for the Armies"
 S61_grain_for_the_armies_desc:0 "As our army expands in preparation for the wars to come, so too do its needs. Each year our grain supplies are stretched thinner, and soon we may be forced to choose between keeping the people content with plentiful food and keeping the army fed and growing.\n\nOur attempts to purchase additional grain from the Yetefesefi kingdoms have proven fruitless. They fear that our growing army will one day be turned against them, no matter how often we assure them that our purpose lies solely to the south. Thus, we must take matters into our own hands and seize the bountiful fields of Berfan for ourselves, ripping them from the grasp of the impious Yenze Mezhi who now hold them."

 S61_spies_of_werikgeta_title:0 "Spies of Werikgeta"
 S61_spies_of_werikgeta_desc:0 "The spy network of Werikgeta is a thing of legend, a vast web with eyes in every town and court. While their records were partially destroyed when our soldiers entered Weriksedar, those that survived paint a grim picture of their activities. It seems the Werikgetan spies had a hand in almost every conflict in the Yet river valley, spreading chaos that the Mezhis of Werikgeta used to their advantage.\n\nWe are of course sickened by such actions, which served only to weaken the domain in the face of the true enemy. However, a spy network as extensive and well-developed as this one is not a tool to be discarded lightly. Under the watchful eye of agents from Life Watching Eagle, we will rebuild the network to watch for treason against Amilak, both within Ibekisedara and abroad. None shall be beyond our sight."

 S61_bring_in_the_tanikweya_title:0 "Bring in the Tanikweya"
 S61_bring_in_the_tanikweya_desc:0 "Yrilak’s corruption is insidious, and the hags who serve him are the most devious of all. Their poisonous whispers promise anything - wealth, power, control - all one must do is make a pact with them. While Amilak’s faithful might be more resolute than most, even the staunchest can be swayed at their lowest moment. So we must not allow them the chance.\n\nWe have worked with the Tanikweya to create a network of mage towers spread across all corners of our lands. From these heights, nearer to Amilak than the earth, our mages will act as His eyes, scrying the lands below for signs of corruption. Should any be found, Life Watching Eagle can be swiftly informed and the threat dealt with."

 S61_prosperity_of_the_getametaki_title:0 "Prosperity of the Getametaki"
 S61_prosperity_of_the_getametaki_desc:0 "Of all the people of Madrimalak, none have squandered their potential more than the Yeteferen. Blessed by Amilak with plentiful food and resources, the Mezhi of this region have felt content to spend those resources scheming and warring with each other, leaving their lands fragmented and weak, run more by petty nobility than any true ruler. Such a waste of a divine gift is enough to sicken any true faithful. \n\nIbekisedara has long stood apart from such waste in its role as a defender of the domain, guided by the benevolence of the Getametaki. We must bring our system to the rest of the Yeteferen if they are to truly prosper, and once again the first step will be to seize the fields. Once the grain is controlled by [Root.Monarch.GetTitle] [Root.Monarch.GetName] the dissidents will fall in line, and the people shall love their Getametaki."

 S61_medbumast_traders_title:0 "Medbumast Traders"
 S61_medbumast_traders_desc:0 "For the first time in centuries traders are pouring out of Ibekisedara, once again bedecked in the copper jewellery and trinkets that they peddle. Centuries ago, before the great copper mines of Ibekisedara ran dry, such traders were a common sight across Madrimalak, earning them the nickname of the Medbumast, the copper people. Now the forges are relit and copper workers on both sides of the Dezpa mountains are taking on apprentices en masse to help handle the influx of ore from Bamaliwuni.\n\nTo announce the rebirth of the Medumbast, we have sent forth great caravans of worked copper and gems as gifts to the northern Mezhi, currying their support for our righteous conquest and coaxing them to tread once more these long-decayed trade routes."

 S61_copper_and_coffee_title:0 "Copper and Coffee"
 S61_copper_and_coffee_desc:0 "Manifest for Ibekisedaran Ship “Zavanyi” submitted to the harbormaster’s office of Zyugok, [GetDate]:\n\nCoffee Beans, Dakinshi, 63 sacks\nGood aroma, well dried; 5 sacks partially spoiled\n\nTrade Copper Rolls, 40 bundles\nEdges bent from handling but otherwise sound\n\nCopper Utensils: 10 Crates\nPrimarily basins and small hammered bowls, some soot marks from firing still visible\n\nKazridokan Cloth, 36 bales\nMixed patterns: plain dyed and block printed\n\nGold Ingots, 22 pieces\nNo notable loss; surfaces slightly pitted from rough casting\n\nGold Dust, 5 sealed gourds\nNo breach of wax or cord observed upon arrival\n\nPrecious Stones, 4 small lacquered boxes\nBoxes contain 12 uncut diamonds, 23 garnets, 8 emeralds, 2 rubies of high clarity\n\nNote: The above manifest was sold swiftly, and the Zavanyi has begun loading a cargo of fine silks, boxes of tea, and gunpowder for return to Fuhoengwaan."

 S61_grand_forges_title:0 "Grand Forges"
 S61_grand_forges_desc:0 "As we embark on new crusades, we will require new weapons. Our growing army will require an immense supply of new arms and armor, and Mezhi [Root.Monarch.GetName] has decreed that this shall be the grandest army since the time of Zenidir. Our existing foundries will not be enough, even incorporating those in the Dakinshi lands, so the foundations for several grand new forges have been laid.\n\nNew blades and plates of bronze will pour forth from them, alongside a new weapon that has been growing in popularity among our generals: the cannon. Ibekisedaran traders brought the principles from Haless alongside gunpowder, and the army has taken to them with a gleeful zeal. The men have taken to calling cannon barrages “the fire of Amilak,” imagining them as a divine weapon tearing through hordes of swamp trolls. It will be a beautiful sight to behold."

 S61_amilaks_bounty_title:0 "Amilak's Bounty"
 S61_amilaks_bounty_desc:0 "What the faithful require, Amilak has already placed before them. These mountains are His gift to Ibekisedara, lifted high so that His chosen may stand above the shadows of Yrilak and strike down His foes with righteous strength.The old mines of the west lie spent, their veins exhausted after centuries of toil. Yet Amilak does not abandon His chosen servants. The Semayebaka and Tanikweya have convened and have proclaimed that in our time of need, Amilak has revealed to them new bounties beneath the Dezpa Mountains.\n\nThus we shall join our efforts: priests and mages, miners and warriors, all united in purpose. The earth shall be stripped away, bared beneath the holy sky, its bounty claimed and forged into the weapons we require."



 flavor_ibekisedara.1.t:0 "Wrath of the Dread Fang" 
 flavor_ibekisedara.1.d:0 "The village was little more than a field of cold ash and charred timber, a dark stain upon the earth that filled Ntwari with anger as he sat atop a crumbling stone wall. This was the third such village he had seen that day, each scattered pile of burned bones further proof of the Dread Fang’s cruelty.\n\nUnfurling his map, Ntwari marked yet another settlement as destroyed, another blot of death they had been unable to prevent, more people they had failed to aid. Life Watching Eagle’s purpose was to protect any who suffered at the hands of tyrants, and here they had failed. If only the tribe had not been trapped in Mengamsipe, unable to defend the people beyond the fortress walls. It was their inaction, choosing to wait out the siege as Ibekisedara had done for so many centuries, that had brought this devastation upon the land.\n\nLife Watching Eagle could not heal the dead, but they could ensure the fallen were remembered. When manpower was less strained, a stele would be raised amid the ruins of each village. Finding the names of the slain would be difficult, given the transient nature of many villages, but best efforts would be made nonetheless.\n\nHe rolled the map closed and retied it to his ankle before calling upon the eagle that always lingered at the back of his mind. A familiar pinch overtook him as his body warped, arms stretching and reshaping into wings. With a few powerful beats he rose into the sky, basking for a moment in the warmth of the sun, savoring the closeness to Amilak that his gift granted him. Then he turned west, continuing the search for any villages that might have survived. There was still time before he would need to return to camp and deliver his report."
 flavor_ibekisedara.1.a:0 "We will not fail the people like this again."

 flavor_ibekisedara.2.t:0 "Council of Reflection" 
 flavor_ibekisedara.2.d:0 "The great hall in Meworetiketema is sweltering, the heat of hundreds mixing with the sun pounding down through the skylights in the hall’s dome. The council has been going for hours at this point, an endless back and forth between the petty factions of the realm, merchants and nobles demanding recompense for lands lost - as though they have been the ones to suffer!\n\nThe hypocrisy of it all makes Mlima feel sick, and she shifts, already uncomfortable in her tight wrap, instincts urging her to shed it in favor of her feathers. Another hour passes before a lull presents itself and she steps forward, the steward announcing that Mlima Ishimwe, Vitaragomo of Life Watching Eagle, has the floor. The room quiets and she begins to speak.\n\n“For generations, we have mistaken passivity for strength. Ibekisedara has fortified the walls of Mengamsipe and called it virtue, naming themselves the defenders of Madrimalak. Look where that has got us. The land is filled with ruin and death, villages burned and people slaughtered while we sat in that fortress. If we continue to sit and defend, evil will continue to flourish until Yrilak stands triumphant.”\n\n“The time has come for change. If we are to protect the innocent, to protect Amilak’s order, then we must be willing to act, not merely endure. Just across the pass true evil gathers. The stories of the refugees we helped have sickened further of late, turning from the usual tales of war to something far darker. Under Kuende’s reign, entire villages vanish overnight and the land grows dark with unnatural shadows. If we allow this to fester, we will have a second shadow swamp on our border, a second fortress of Yrilak. Is that something we will abide? Are we going to watch as the world plunges into darkness, or will we carry judgment to those who would prey upon the defenseless?”\n\nThe hall fills with approving murmurs, even a few shouts of approval issuing from the Semayebaka, and Mezhi [Root.Monarch.GetName] locks eyes with Mlima. They stare at each other for a long moment before he nods, and she breathes a quiet sigh of relief."
 flavor_ibekisedara.2.a:0 "“So it shall be. Let us begin planning for this war.”"

 flavor_ibekisedara.3.t:0 "A Lightless Land" 
 flavor_ibekisedara.3.d:0 "Ntwari moved deeper into the town, eagle-shifted eyes searching for his quarry, but he saw nothing besides his fellow tribesmates. They had come with a regiment of Ibekisedaran troops, attached as scouts to help hunt a warlock, one of Kuende’s acolytes who had fled Balanka-Bo with three score of soldiers. Some locals claimed that she and the soldiers had entered the town a week ago, and that none had left since, so the scouts had been sent in.\n\nThe town was a charnel house; corpses carved with arcane symbols filled its streets, some posed in profane positions, others simply discarded in the dirt. The bodies were eerily pristine, lacking the stench that usually followed any corpse left in the wet heat of Bamaliwuni. It was as though they had been killed mere moments ago, as if they might breathe at any moment.\n\nAs Ntwari and his warriors entered the market square, the day seemed to fall into night, shadows smothering the sun itself. The square itself was a mosaic of corpses, a vast undulating pattern of townsfolk and soldiers alike, each carved with bloody runes that pulsed with a dull red light.\n\nAt the center of the nightmare knelt  the warlock, crouched in a pool of blood before a single remaining soldier. Ntwari fought to move forward, to cut down the warlock and end this nightmarish ritual, the shadows resisting him with every step. But even as he went, the soldier leaned down toward the prostrated warlock and spoke, its voice a raspy tone unfit for its body.\n\n‘I think not, child.’\n\nThe warlock screamed; Ntwari did not understand why, until he saw that her skin was sloughing… she was melting, layer by layer, into the deep pool of blood. All the while the soldier watched her die, a last duty. As soon as she was gone, the soldier fell limp to the ground, leaving Ntwari and his warriors alone amidst a field of corpses."
 flavor_ibekisedara.3.a:0 "The warlord era must be brought to a close"

 flavor_ibekisedara.4.t:0 "Eyes in the Sky" 
 flavor_ibekisedara.4.d:0 "The target had yet to stop screaming; Gulimbazi found it truthfully quite impressive. It had been almost five minutes since he had grabbed her out of the courtyard where she had been giving a speech to her soldiers, and one had to admire the lung capacity. Even when her mouth contorted into the fanged muzzle of a mongoose, the snarling and snapping of her jaws was similar enough for him to count it.\n\nThe slums of Inshibonde flew by beneath them, residents gawking as they passed overhead, though one could hardly blame them - a screaming warrior carried in the talons of a dire eagle struggling to stay aloft was, after all, a somewhat unusual sight.\n\nAfter a grueling ten minute flight, they finally reached the city garrison, and Gulimbazi dropped the target, her screaming and ranting finally stopping as the impact forced the air from her lungs. She scrambled for her batakwa, a cruel blade long outlawed by Ibekisedara, only to find herself surrounded by a ring of spears held by the local soldiers. Gulimbazi landed, shifting back to human form as he addressed her.\n\n“Akaliza Muhera, you are hereby charged with the crimes of warlordism and the attempted breaching of Amilak’s order. These transgressions were witnessed by Gulimbazi Tuyishme of the Life Watching Eagle Tribe, duly appointed to carry out this sentence by the grace of Mezhi [Root.Monarch.GetName]. Your execution shall be at dawn on the morrow, and a semayabaka will be available should you wish to make your peace with Amilak.”\n\nWith that, the soldiers dragged her, screaming once more, into the depths of the garrison."
 flavor_ibekisedara.4.a:0 "Another nascent warlord put down"

 flavor_ibekisedara.5.t:0 "The Eagle and the Frog" 
 flavor_ibekisedara.5.d:0 "The fortress of Degumwamba is a squat thing, half embedded into the side of a mountain and still bearing signs of its recent siege. Circling one last time, Mlima tucks in her wings and dives, landing gently in the yard. As she shifts back to her human form, another dire eagle lands alongside her, wearing a loose necklace with a copper icon of a windlord. Her daughter, Irara. The local guards bring them robes of roughspun cloth, and together they descend into the depths of the fortress.\n\nThe passageways wind deep, carved halls giving way to living rock until, after what feels like an hour, they at last reach the fortress’s heart: a peaceful grotto, a pond fed by mountain springs trickling down the walls. There, unmoving upon a moss-covered ledge, rests a small frog. Rufaro. His eyes are ancient and unblinking as he looks upon Mlima, and it feels as though he peers into her very soul.\n\nMlima begins to speak, but her carefully planned speech quickly crumbles under Rufaro’s gaze, dissolving into a stream of consciousness. She speaks of a land trapped in endless conflict, of a cycle that is bleeding the land dry as the brutalities worsen with each passing year. She speaks of Death Bringing Cobra and the horrors they found in those mountains. She speaks of monsters stopped and lives saved. She speaks of peace.\n\nRufaro listens, and once Mlima finishes speaking, they sit together, the humans and the frog, for several long minutes, the silence broken only by the slow drip of water into the pool below. Irara fidgets with her necklace, frustration visible upon her face. At last, he speaks. The warlord era, Rufaro agrees, has run its course, and while he remains skeptical of the Mengi sky god, an end to the violence is worth some compromises. He will lend his support to Ibekisedara’s cause, and shall send an emissary to the royal court."
 flavor_ibekisedara.5.a:0 "One step closer to breaking this cycle"

 flavor_ibekisedara.6.t:0 "Second Council of Reflection" 
 flavor_ibekisedara.6.d:0 "The Second Council of Reflection is a quieter affair. Instead of everyone of any small importance cramming themselves into the halls of Meworetiketema, it is a smaller group seated around a table in Mengamsipe. Here sit a large contingent of the Semayebaka, a handful of generals and their aides, the frog Rufaro with his attendant, making a rare journey outside Degumwamba. Fewer nobles, and almost no merchants. And near the Mezhi in a place of honor sits Vitaragomo Mlima Ishimwe, shadowed by her heir Irara.\n\nThe council commences with a prayer and a discussion of their successes in Bamaliwuni. The land is being restored, towns rebuilt and fields resown. No more bandits plague the countryside, it has been months since the last warlord attempted to rise. Each day more and more of the Dakinshi flock to the new sky temples and embrace the light of Amilak. Ibekisedara has taken these wartorn lands and rebuilt them into Madrimalak come again.\n\nWith the past out of the way, Mezhi [Root.Monarch.GetName] shifts the council's focus to the future of the realm. One of the Semayebaka quickly puts forth the question on everyone's mind: Why stop at Bamaliwuni? To the south are the Tanizu tribes, caught in their own cycles of war, unable to resist the creeping advance of Yrilak’s swamp. To the west, the Sitewosi would rather battle their fellow Mengi than unite against that same encroachment from our ancient enemy. Why should Ibekisedara not stem this chaos as it did in Bamaliwuni?\n\nThe room is filled with murmurs of agreement, and one by one the council members rise and proclaim their agreement with these crusades. Irara is one of the first to shout her support, rising even before her mother. Rufaro simply watches, quiet as ever, his thoughts opaque to all but himself."
 flavor_ibekisedara.6.a:0 "Another council, another war in need of planning"

 flavor_ibekisedara.7.t:0 "Defanging" 
 flavor_ibekisedara.7.d:0 "At first it was orderly. Each squad had been issued a list of targets: the royal palace, prominent statues, the obvious remnants of the Dread Fang’s legacy. The palace was ransacked, portraits and tapestries hauled into the streets and set alight. Denge helped her squad pull down one of the statues, the weathered visage of Lishan I breaking apart as it struck the stone. The work was done quickly, efficiently, as expected of an Ibekisedaran soldier.\n\nAs the day went on, the list expanded. Buildings commissioned by the Dread Fang or his successors were marked next, then institutions said to have supported his rule. The distinction between symbol and structure blurred. Homes belonging to soldiers, clerks, and administrators were added in turn, their contents dragged out and destroyed. By the time night fell, Boskonikon burned. The city had been judged too steeped in the Dread Fang’s legacy to remain standing.\n\nWhen the work was finished, Denge sat with her fellow soldiers among the piles of supplies and valuables they had liberated from the city. They drank from a case of wine taken from the palace cellars, passing the bottles around as they celebrated. In the distance, the light of the flames faded, leaving a field of stone and ash."
 flavor_ibekisedara.7.a:0 "Justice has been served"

 flavor_ibekisedara.8.t:0 "People Watching" 
 flavor_ibekisedara.8.d:0 "‘So you are the one I am to teach.’\n\nKiros was too well trained to jump in surprise, but it was a near thing. Whirling around, dagger already drawn, he found himself facing a middle aged Dakinshi man, hair and beard both unkempt, and wearing only a bronze medallion etched with the image of an eagle in flight. His dagger filled hand snapped up into a salute. ‘Kiros Kajen of Weriksedar reporting for training sir.’\n\nThe man examined him for a moment, before nodding. ‘Good reflexes. You may refer to me as Gulimbazi if we are around civilians, or Teacher Tuyishme if not. Now follow.’\n\nWith that he took off at a run, leaping to the next rooftop over as Kiros scrambled to follow. They soon found themselves overlooking the town's market, cloaked in the shadow of a belltower. The next hours were spent observing.Teacher Tuyishme pointed out the habits of the townsfolk, highlighting the normal routines that could be passed over, the oddities that would merit further scrutiny. Nervous glances, deviations in schedule, impious words; all were cataloged for future investigation. By the time the sun had set and the lesson had ended, Kiros felt drained. All his life he had trained to spy on the nobles of the lands, but watching the common people almost seemed a more daunting task."
 flavor_ibekisedara.8.a:0 "Under our watch, no evil shall take root here"

 flavor_ibekisedara.9.t:0 "Third Council of Reflection" 
 flavor_ibekisedara.9.d:0 "The third council is held once more in Meworetiketema, though now the delegates are seated in the great sky temples of the city, gathered around a table illuminated by beams of light. Their rays cut the smoky incense drifting down from the skylights above, describing a hundred sinuous curves of satin grey. The clouds that had covered the city for the last week have been banished through the efforts of the capital’s Semayabaka, in readiness for this event.\n\nThe assembled council is a much smaller one: the high priests of Ibekisedara’s grandest temples; the tanikweya in charge of the scrying towers; the generals of the armies and the handlers of the spies. And, of course, the leader of Life Watching Eagle, Kwita Ishimwe, is seated in her traditional place at the side of the Mezhi. Mezhi [Root.Monarch.GetName] holds court at the head of the table, resplendent upon [Root.Monarch.GetHerHis] throne of gold and copper. After a short prayer led by the high priest of Meworetiketema, the council commences.\n\nThe discussion quickly turns to the north, where the rest of Madrimalak remains divided. Truth be told, any real debate on the matter is perfunctory. All present already agree that it is Ibekisedara’s destiny to unite Madrimalak; it is only the details of that future that must be hammered out. Kwita quickly takes the lead in the discussion, using Life Watching Eagle’s position between the army and the spies to bridge the factions’ differences of opinion. By the time the council adjourns, the sunlight has been replaced by flickering torches, but a plan has been decided. There shall be two campaigns. One into the Yet River valley to secure the heartland, and the other into the Talilibeti lands to cut off the trolls. Neither shall stop until Amilak’s domain has been freed from those who would harm His order."
 flavor_ibekisedara.9.a:0 "Onward to our destiny"

 flavor_ibekisedara.10.t:0 "Exploiting the Fields" 
 flavor_ibekisedara.10.d:0 "The Mezhi now calls upon the rain-priests to ensure a great harvest far beyond any normal year. Doing so allows for bread to be granted in great quantities to the people of the realm, ensuring none go hungry and the armies march on full stomachs, at the cost of the land’s long-term fertility."
 flavor_ibekisedara.10.a:0 "Grain for control and grain for conquest"

 flavor_ibekisedara.11.t:0 "All Below Amilak" 
 flavor_ibekisedara.11.d:0 "The throne room seems to glow in the morning sun, light reflecting off the sheets of polished copper and gold that plate every surface. At the center of it all sits Mezhi [Root.Monarch.GetName], seated upon [Root.Monarch.GetHerHis] throne, robes glistening almost as brightly as the metal. The throne room itself is more a temple than a hall, its grand domed ceiling baring the room to the elements, a statement of confidence in the power of the city’s rain-priests to avoid any unplanned showers.\n\nThe supplicants are admitted in small groups, and one by one they step forward to plead their cases. In the quiet of the throne room their voices are small, the sound carrying well but nonetheless smothered by the enormity of their surroundings. When the Mezhi responds, [Root.Monarch.GetHerHis] voice is full and echoing, amplified by the meticulous arrangement of those same copper panels, and easily fills the space in stark contrast to the petitioners.\n\nListening to the judgment passed by the glowing figure upon the throne, their voice echoing from all around, each seeker of the Getametaki’s grace understands that the Lord Below is truly the first below Amilak, a figure touched by the divine, and that to have experienced such a presence is a blessing they shall treasure for the rest of their lives."
 flavor_ibekisedara.11.a:0 "Each decision bears the weight of Amilak"

