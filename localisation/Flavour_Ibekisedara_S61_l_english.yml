 S61_getametaki_kingdom: "Getametaki Kingdom"
 S61_getametaki_kingdom_desc: "The people of Ibekisedara hold an unshakeable loyalty to their ruler, the Getametaki, or Lord Below. The line of the Getametaki is an ancient and storied one, first granted their lands by Ardimya-That-Was in millennia long past, then later raised by Zenidir as one of his governors. Controlling the most fertile lowlands in a mountainous region, they secured the loyalty of the people by being the bringer of food.\n\nNow this system has expanded to encompass untold thousands. With the help of Semayabaka, the Getametaki controls and distributes grain across the breadth of the realm. With each bite of bread, all are reminded that they prosper by the grace of the Lord Below."

