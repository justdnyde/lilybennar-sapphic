 estate_nobles_amilaks_tithe: "Amilak's Tithe"
 estate_nobles_amilaks_tithe_desc: "A new tax levied upon the Yenaze Mezhi to help support Ibekisedara’s crusades to secure and expand Madrimalak. It has come to be known as Amilak’s tithe, as it requires that the nobility pay a one tenth tax of both gold and levies to the crown, delivered for usage by the military. Many nobles chafe against the demands, but the holy cause makes them unable to speak out openly against it."
 estate_burghers_pious_suppliers: "Pious Suppliers"
 estate_burghers_pious_suppliers_desc: "Any merchant who wishes to do business within Ibekisedara, domestic or foreign, must sign a contract with the army, agreeing to supply them with material and logistical support at a discounted rate. An extraordinarily unpopular measure among traders, the rapidly expanding Ibekisedara is nonetheless too valuable a market to be ignored."

 estate_nobles_crusader_culture: "Crusader Culture"
 estate_nobles_crusader_culture_desc: "War with the heathens has become a central part of martial life in Ibekisedara. Noble scions who dream of leading armies eagerly answer the call to crusade, excited to hone their skills against the enemies of Amilak. Unfortunately this culture means that in times of peace with the heathens, our officer corps withers without the infusion of young talent."

 estate_nobles_crusader_culture_tt: "Get Yearly Army Tradition: §G+1.00§! and Army Tradition from Battles: §G+50%§! if you have been at war with heretics or heathens recently.\n\nYearly Army Tradition Decay: §R+2%§! if you don't have a truce with a heretic or heathen nation\n\n§YOnly one of the two army tradition modifiers is active at a time.§!"


