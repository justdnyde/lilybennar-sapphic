 #Children of Fire
 scoured_dormant_mechanim:0 "Scoured Dormant Mechanim"
 scoured_dormant_mechanim_desc:0 "Natives have grabbed all the easily accessible dormant mechanim here.\nIf we are a §YYenbenmirra Clan§!, we will not be able to §YCollect Children of Fire§! from this province.\nIf we are a §YMigrating Mechanim§!, we will not gain any §YReligious Power§! from this province."

 children_of_fire_collection_small:0 "Small Children of Fire Collection"
 children_of_fire_collection_small_desc:0 "We must collect §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y1000§! §YChildren of Fire§! to reach the next level of our collection."
 children_of_fire_collection_medium:0 "Medium Children of Fire Collection"
 children_of_fire_collection_medium_desc:0 "We must collect §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y3000§! §YChildren of Fire§! to reach the next level of our collection."
 children_of_fire_collection_large:0 "Large Children of Fire Collection"
 children_of_fire_collection_large_desc:0 "We must collect §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y6000§! §YChildren of Fire§! to reach the next level of our collection."
 children_of_fire_collection_huge:0 "Huge Children of Fire Collection"
 children_of_fire_collection_huge_desc:0 "We must collect §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y10000§! §YChildren of Fire§! to reach the next level of our collection."
 children_of_fire_collection_massive:0 "Massive Children of Fire Collection"
 children_of_fire_collection_massive_desc:0 "We have collected §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§! and have finally reached the maximum level of our collection."

 collect_children_of_fire_tt:0 "We will collect the §YChildren of Fire§! from one of our tribal lands and add them to our §Ycollection§!"

 children_of_fire_count:0 "Number of Children of Fire"

 take_children_of_fire:0 "Take their Children of Fire"
 take_children_of_fire_desc:0 "Take their Children of Fire"
 CB_ALLOWED_po_take_children_of_fire:0 "Take their Children of Fire"
 PEACE_po_take_children_of_fire:0 "Take their Children of Fire" 
 po_take_children_of_fire:0 "Take their Children of Fire"
 po_take_children_of_fire_desc:0 "We will take §Y200§! of their §YChildren of Fire§! and add them to our collection."
 TAKE_CHILDREN_OF_FIRE_WAR_NAME:0 "War for Control over the Children of Fire"
 children_of_fire_stolen_tt:0 "Our collection shrinks to §Y[Root.children_of_fire_count.GetValue] Children of Fire§!.\n"

 #Hinui Hunters
 yenbenmirra_hinui_hunters_00:0 "Hinui Hunters - Wanderers"
 yenbenmirra_hinui_hunters_00_desc:0 "The tribe is followed by a few hinui hunters who help protect them as they migrate.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y500§!"

 yenbenmirra_hinui_hunters_01:0 "Hinui Hunters - Scouts"
 yenbenmirra_hinui_hunters_01_desc:0 "Hinui hunters scout ahead the tribe so that those not ready to face the creatures of the Underworld may walk their path in safety.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y1000§!"

 yenbenmirra_hinui_hunters_02:0 "Hinui Hunters - Initiates"
 yenbenmirra_hinui_hunters_02_desc:0 "If one wishes to become a true hinui hunter they must face the beasts who would see our goddess dead. Those who do not return are mourned by all, but those who live shall be remembered in our tales forever.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y1500§!"

 yenbenmirra_hinui_hunters_03:0 "Hinui Hunters - Warriors"
 yenbenmirra_hinui_hunters_03_desc:0 "To be a warrior is to hone your skill not only against mindless beasts but men as well, and be ready to fight all those who wish ruin upon our tribe for their own selfish gains.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y2000§!"

 yenbenmirra_hinui_hunters_04:0 "Hinui Hunters - Elders"
 yenbenmirra_hinui_hunters_04_desc:0 "Not many hinui hunters live to see their hair turn gray, but those who do share their tales with the future generations who shall learn from their example.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y3000§!"

 yenbenmirra_hinui_hunters_05:0 "Hinui Hunters - Warchiefs"
 yenbenmirra_hinui_hunters_05_desc:0 "Amongst the most skilled hinui hunters, a leader is selected to command all others in the fight against the Underworld, organizing our warriors into a truly formidable force.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y4000§!"

 yenbenmirra_hinui_hunters_06:0 "Hinui Hunters - Bands"
 yenbenmirra_hinui_hunters_06_desc:0 "Some hinui hunters prefer to rely solely on themselves, but most know the best way to stay alive in the wilds is to band together and rely on the strength of their fellow hunters as much as on their own.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y5000§!"

 yenbenmirra_hinui_hunters_07:0 "Hinui Hunters - Mobs"
 yenbenmirra_hinui_hunters_07_desc:0 "Some hinui hunter bands grow so close together that they may be considered their own tribe within the tribe, yet their duty to guard all who require their protection is something they will never forget.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y6000§!"

 yenbenmirra_hinui_hunters_08:0 "Hinui Hunters - Clans"
 yenbenmirra_hinui_hunters_08_desc:0 "Hunting brings people together, some closer than others. As our tribe grows it becomes more and more common to see clans emerge whose ancestors have all been hinui hunters, passing down their knowledge to their children.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y8000§!"

 yenbenmirra_hinui_hunters_09:0 "Hinui Hunter - Tribes"
 yenbenmirra_hinui_hunters_09_desc:0 "The road has been long and hard and it has forged our tribe into one of highly skilled warriors, well versed in the ways of the hinui hunters. Many say it is time we settle, but there are some who still believe that our journey must continue.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YChildren of Fire§! needed to upgrade this modifier: §G[Root.Owner.children_of_fire_count.GetValue]§!/§Y10000§!"

 yenbenmirra_hinui_hunters_10:0 "Hinui Hunters - Nation"
 yenbenmirra_hinui_hunters_10_desc:0 "We stand at the precipice of a new age as we prepare to finally wake our long dormant brethren. There will be much we can share with them and surely they will have their own tales to tell, so come now, proud hinui hunter, let us form this new nation and let our real fight against the Underworld begin.\n--------------\nThis tribe is currently protecting §G[Root.Owner.children_of_fire_count.GetValue]§! §YChildren of Fire§!.\n--------------\n§YAll§! hinui hunters who could be convinced to join our cause have already joined us."

 #Dunborgula
 collect_children_of_fire:0 "§YCollect Children of Fire§!"
 desc_collect_children_of_fire:0 "The land is littered with sleeping Children of Fire. We need to take them back to our tribe so we will be with them when they awake once again.\n--------------\nWe will §Yscour§! every province in our lands or tribal lands that contain §Ydormant mechanim§! and bring them back to our capital. We cannot take any more §YChildren of Fire§! from a province that has already been §Yscoured§!.\n--------------\nIf we understand the §OGift of Fire§!:\n    Gain §G5§! Army Tradition."
 collect_children_of_fire_bonus_tt_YES:0 "£yes£ £icon_danguranga_fire_in_text£: §OGain 5 Army Tradition.§!"
 collect_children_of_fire_bonus_tt_NO:0 "£no£ £icon_danguranga_fire_in_text£: §OGain 5 Army Tradition.§!"

 charkuchin_recruits:0 "§YCharkuchin Recruits§!"
 desc_charkuchin_recruits:0 "Most of the Charkuchin keep to themselves, staying in their citadels focused on keeping the mountains clean of the corruption of the Underworld. Some, however, argue that a more drastic approach must be taken. This of course might well lead to unrest within the citadel. Perhaps we can convince our friends in the mountains to sponsor the journey of these more unruly Children of Mountains into the lowlands where they can assist us in our fight to keep the Garden of Danguranga safe from all evils.\n--------------\nGain §G50§! Crowns.\nGain §G5000§! Manpower.\n§YCharkuchin§! nation's opinion of §Yus§! changes by §G+50§!.\n--------------\nIf we understand the §gGift of Mountains§!:\n    If the §YCharkuchin§! nation is ahead of us in technology:\n        Gain §G+25§! Monarch Power in that category."
 charkuchin_recruits_tt:0 "Receive §G50§!¤ and §G5000§!£icon_manpower£ from our §YCharkuchin§! friends."
 charkuchin_recruits_bonus_tt_YES:0 "£yes£ £icon_danguranga_earth_in_text£: §gGain 25£adm£/£dip£/£mil£ if their £icon_technology_in_text£ is higher.§!"
 charkuchin_recruits_bonus_tt_NO:0 "£no£ £icon_danguranga_earth_in_text£: §gGain 25£adm£/£dip£/£mil£ if their £icon_technology_in_text£ is higher.§!"

 mangrove_republics_sponsors:0 "§YMangrove Sponsors§!"
 desc_mangrove_republics_sponsors:0 "The people living in the Mangrove Republics would surely be threatened by the Underworld should we fail in our sacred duty to burn the invasive hinuiflora and -fauna in our lands. They know this as well as we do, and have offered to support our efforts.\n--------------\nIf we §YDON'T§! have the §YLeaders of Fire§! Government Reform:\n    Gain §G25§! Government Reform Progress.\nIf we have the §YLeaders of Fire§! Government Reform:\n    Gain §G50§! Administrative Power.\n§YTaga'ala§! nation's opinion of §Yus§! changes by §G+50§!.\n--------------\nIf we understand the §MGift of Water§!:\n    A random §G75%§! cost §YTaga'ala§! advisor joins our court."
 mangrove_sponsors_1_tt:0 "Receive §G25§!£icon_reform_progress_in_text£ from our §YTaga'ala§! friends."
 mangrove_sponsors_2_tt:0 "Receive §G50§!£adm£ from our §YTaga'ala§! friends."
