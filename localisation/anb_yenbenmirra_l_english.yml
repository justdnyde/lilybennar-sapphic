l_english:

 #Yenbenmirra
 yenbenmirra_tribe:0 "Yenbenmirra Tribe"
 yenbenmirra_tribe_desc:0 "Guarding the lowlands from the spread of hinuiflora and -fauna, the Yenbenmirra have been moving across the jungles of western Insyaa and conducting ritual burnings of any stray piece of hinuiflora that enters their lands. Though often dangerous, these burnings hold great religious and societal importance, and any tribe not doing their due diligence in containing the spread of dangerous flora and fauna is considered to have failed both their people and the land itself."
 yenbenmirra_leaders_of_fire:0 "Leaders of Fire"
 yenbenmirra_leaders_of_fire_desc:0 "With thousands of Children of Fire in our tribe, we feel closer than ever to fulfil our dream. Yet the old method of migrating across the land no longer suits our needs. We shall set up a permanent settlement for our tribe and send out our people instead, equipping them with the supplies needed to combat the spread of the hinuiflora and -fauna and come back with more Children of Fire."
 yenbenmirra_cultivate_the_lowland:0 "Cultivate the Lowland"
 yenbenmirra_cultivate_the_lowland_desc:0 "Since we have abandoned our migratory ways, we have had to change the way we approach the lands we call home. We plant seeds, till the soil, divert water from the rivers, and irrigate the plains. The skills needed for this are passed down through the oral memory of the tribe. In this way we shall take control of this land the Goddess has given us."
 yenbenmirra_federation:0 "Yenbenmirra Federation"
 yenbenmirra_federation_desc:0 "With the awakening of the Children of Fire and the unification of Bomowoka, a new age has begun for the Yenbenmirra. The smaller tribes are starting to federalize and borders are being drawn, but this does not mean that they abandoned their old traditions. Many clans still live semi-nomadic lives, wandering between settlements, each being represented by their own Clan Elders who always have the ear of the current leader of the nation, the Grand Elder."

 bomowoka_nation_title:0 "Awaken the Children of Fire"
 bomowoka_nation_desc:0 "We are ready. We have the knowledge. We have the power. We, the Children of Water, have gathered an army of Children of Fire. When they awaken, they shall awaken amongst their brethren in the faith. They shall see that we are prepared to guide them in our quest to retake all that the Goddess made for us."
 cof_awaken_tt:0 "\nAll §YChildren of Fire§! within our lands will be awakened.\nNewly acquired provinces with §YDormant Mechanim§! will see these mechanim wake up after a while.\n\nGain a §YColonist§! for §Y20 years§!. The duration of this modifier is increased for every §Y1000 Children of Fire§! we collected above the required §Y6000§!.\n"
 yenbenmirra_unification:0 "Yenbenmirra Unification"

 ritual_burning_title:0 "Conduct Ritual Burning"
 ritual_burning_desc:0 "Burn all our §Ytribal lands§! to cleanse it of invasive hinuifauna and -flora!"
 yenbenmirra_ritual_burning_tt:0 "Remove all §YTribal Land§! we own and gain §R25 Devastation§! in affected provinces.\nWe will gain §Y25 Church Power§! for every province of §Ytribal land§! we burn.\nIf we are a §Ymigratory tribe§!, our §Ycapital§! also gains §R50 Devastation§!.\n"

 yenbenmirra_settle_down_title:0 "Settle Down"
 yenbenmirra_settle_down_desc:0 "We might have failed to awaken the Children of Fire ourselves, but our story does not end here. We shall fight against the Underworld until the end of times and we shall do so on our own. However, if we want to stand a chance against the growing corruption out of the East, we must change and adapt just as Bomowoka did."

 yenbenmirra.1.t:0 "The Gifts of Danguranga"
 yenbenmirra.1.d:0 "Having recently been enlightened to Danguranga's benevolence, we need to deepen our understanding of her Gifts; Water, Earth, and Fire. While we already know which of these is the greatest, the other Gifts need to be considered as well."
 yenbenmirra.1.a:0 "Nothing compares to the Gift of Water!"
 yenbenmirra.1.b:0 "The strength of Earth will protect us"
 yenbenmirra.1.c:0 "The power of Fire is immense"
 yenbenmirra.1.dd:0 "Nothing compares to the Gift of Earth!"
 yenbenmirra.1.e:0 "The mutability of Water contains many lessons"
 yenbenmirra.1.f:0 "The power of Fire is immense"
 yenbenmirra.1.g:0 "Nothing compares to the Gift of Fire!"
 yenbenmirra.1.h:0 "The mutability of Water contains many lessons"
 yenbenmirra.1.i:0 "The strength of Earth will protect us"

 yenbenmirra.3.t:0 "Collect the Children of Fire"
 yenbenmirra.3.d:0 "Across the lowlands lie our sleeping brethren. When the goddess made us, the Children of Water, she also made the Children of Fire. They were supposed to fight by our side. And yet they sleep, for neither we nor they were ready to take the fight to the monstrous creations of the Underworld.\n\nWhen they next awaken, they must see that they are not alone. We will gather them all in one place - a long and tiring process for sure, but one that must be done."
 yenbenmirra.3.a:0 "Gather the Children of Fire in Danguranga's name!"
 yenbenmirra.3.b:0 "We are not yet ready for this holy task."

 yenbenmirra.4.t:0 "The Children of Fire"
 yenbenmirra.4.d:0 "Our grandparents shared with us a story. They were there when the Children of Fire awoke. These people, hewn from metal, were scattered across the lowlands, resting in a deep slumber. We knew the Goddess had a plan for them, but we were not ready. When they awoke, they rose confused and alone. They knew they could never retake Insyaa all on their own, so with no sign of their kin they fell back into their long slumber and we were once more left alone to defend the Goddess.\n\nFor decades, the true reason for the sudden waking and return to sleep of the Children of Fire evaded us. But in the past decade, many amongst the Yenbenmirra finally realized the answer was glaringly obvious, and so we now have a new task set before us: collect all the Children of Fire from across the lowlands, so that when they awaken once more, they will see their long lost kin and rejoice.\n\nWe must continue our sacred duty of burning all invasive hinuiflora and -fauna to keep our people and this land safe. But we shall also take care of the Children of Fire and keep them safe, for when they awaken, we shall be the ones to lead them into a new dawn and retake Insyaa for Danguranga!"
 yenbenmirra.4.a:0 "We will bring the Children of Fire together into the waking world."

 yenbenmirra.5.t:0 "Our Collection of Children of Fire Begins"
 yenbenmirra.5.d:0 ""A great feast was held tonight, as we celebrated our growing contingent of dormant Children of Fire. It takes a full tribe's effort to move our collection as we migrate, but we know, in the end it will all be worth it."
 yenbenmirra.5.a:0 "Truly a great day for all Children of Danguranga!"

 yenbenmirra.6.t:0 "Our Collection of Children of Fire Grows"
 yenbenmirra.6.d:0 "As our collection grows, so do the number of outsiders coming to our lands to join us in our travels.  They wish to be at our side once we find a way to awaken the Children of Fire. However, our rivaling tribes are becoming increasingly jealous, sending out raiders and thieves to claim our prize for themselves, a clear sign that our collection has reached an impressive size."
 yenbenmirra.6.a:0 "It most certainly is remarkable!"

 yenbenmirra.7.t:0 "Our Collection of Children of Fire Grows Further"
 yenbenmirra.7.d:0 "As the sun rises overhead, it glints over an army of sleeping Children of Fire, all resting side-by-side, awaiting the day they wake together. The collection has grown so large, it has become an immense strain on our resources simply to move them. Perhaps we should think about setting up a permanent home for our people?"
 yenbenmirra.7.a:0 "A permanent home you say, eh?"

 yenbenmirra.8.t:0 "Our Collection of Children of Fire is Completed!"
 yenbenmirra.8.d:0 "It is done. We have gathered thousands of Children of Fire and soon they shall walk amongst us once more. Some final preparations must be made before we can truly walk side by side into this new age, but once we are done and they are awake we shall slay the monsters of the Underworld together and free Danguranga from their grasp."
 yenbenmirra.8.a:0 "A new age for the Yenbenmirra awaits."

 yenbenmirra.9.t:0 "Disaster!"
 yenbenmirra.9.d:0 "Tragic news comes from one of the warriors who were left to guard our collection of Children of Fire as we fought our war against the enemy. It seems that as soon as they broke through our defenses they headed for our dormant charges, taking as many of them as they could and burning all who tried to prevent their abduction."
 yenbenmirra.9.a:0 "Our loss will not be forgotten!"

 yenbenmirra.10.t:0 "The Birth of Mumambarra"
 yenbenmirra.10.d:0 "With the recent awakening of the Children of Fire, most of our people expected that our siblings would immediately start the fight against the Underworld, however it appears that they do not remember much from the ages before they fell into their long slumber. Many of them, just like us, have their own goals and aspirations that do not always fit our preconceived notions of how they should behave.\n\nThis new perspective on our newly awakened metallic brethren has brought many changes with it, for while most of the Yenbenmirra still see the mechanim as some sort of mythical beings worthy of reverence, some are starting to think that they are just like ourselves, carrying their own gifts and burdens. Even amongst the icy peaks of the Charkuchar some have begun to question their old ways and started calling their ancestors' stance, which admittedly is somewhat defensive and isolationist atop the mountains, as cowardly, calling for their leaders to bring the fight to the Underworld instead of cowering behind the walls of their mountain citadels. Given all these changes, there is one question of utmost importance that remains for us to give an answer to - which direction shall our own country take?"
 yenbenmirra.10.a:0 "It will take time but we accept the change."
 yenbenmirra.10.b:0 "Change brought us here, it shall guide us ever further."
 yenbenmirra.10.c:0 "We stayed atop our mountains for too long, it is time we strike back!"
 yenbenmirra.10.e:0 "Everyone has their own path, and we already found ours."

 yenbenmirra.11.t:0 "Yenbenmirra Organization"
 yenbenmirra.11.d:0 "You shouldn't be seeing this event so if you do please report it as a bug."
 yenbenmirra.11.a:0 "Ok."

 yenbenmirra.12.t:0 "Tribe Joins Our Cause"
 yenbenmirra.12.d:0 "The tribe of [From.GetName] has been disbanded as their leaders finally lost all hope of being the ones to lead the fight against the Underworld. Yet it does not mean they've fully given up the fight as many of them decided to come to us, pleading to join our ever growing tribe. This of course comes with the boon of merging our collections of Children of Fire that they diligently defended to this day."
 yenbenmirra.12.a:0 "Together we will be stronger."
 children_of_fire_redistributed_tt:0 "Receive all §YChildren of Fire§! that the tribe of §Y[From.GetName]§! collected during their migrations."

 yenbenmirra_startup_tt:0 "The West Insyaan Lowlands are filled with §YDormant Mechanim§!. Conduct §YRitual Burnings§! to gain church power, then use that church power to §YCollect the Children of Fire§!. As our collection grows, our need for ritual burning decreases, while we get ever closer to uniting the tribes of the Yenbenmirra.\n"

 #Sacred Sites
 danguranga_sacred_site_dunborgula_water:0 "Sacred Site: Rivers Above All"
 danguranga_sacred_site_dunborgula_water_desc:0 "This site is considered sacred by all who worship Danguranga. Those most dedicated to the teachings of §YRivers Above All§! often congregate here, sharing their tales with those who wish to learn from them.\n--------------\nYou must fulfill the following to be able to invite scholars from this province:\n    - Owner's religion is in the §YDanguranga§! religion group.\n    - At least one §YYenbenmirra§! culture is accepted."

 danguranga_sacred_site_dunborgula_mountains:0 "Sacred Site: Rivers of Earth"
