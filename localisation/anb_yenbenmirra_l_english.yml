 the_fightback:0 "§YThe Fightback Begins§!"
 desc_the_fightback:0 "Children of Water and Children of Fire stand side by side. It is time. Together, we shall go beyond the mountains and retake the world from those monsters. For the Goddess!\n--------------\nGain §G+0.2%§! Army Morale for provinces that have both §YHuman§! and §YMechanim§! population, up to a maximum of §G+20%§!, for §Y5§! years.\n--------------\nIf we understand the §OGift of Fire§!:\n    We get '§YExemplary Officers§!' for §Y5 years§!, giving the following effects:\n    Yearly Army Tradition: §G+1§!"
 the_fightback_tt:0 "§YDanguranga's Children§! will fight more fiercely when united."
 the_fightback_bonus_tt_YES:0 "£yes£ £icon_danguranga_fire_in_text£: §OGain +1 Yearly Army Tradition for 5 years.§!"
 the_fightback_bonus_tt_NO:0 "£no£ £icon_danguranga_fire_in_text£: §OGain +1 Yearly Army Tradition for 5 years.§!"
