 mangrove_sponsors_bonus_tt_NO:0 "£no£ £icon_danguranga_water_in_text£: §MGain a random 75% cost Taga'ala advisor.§!"

 support_tribe_growth:0 "§YSupport Tribal Growth§!"
 desc_support_tribe_growth:0 "Where we need our men is in our homes, supporting our tribes, keeping our people fed and safe. Recall our messengers and tell them we are holding a feast tonight.\n--------------\nWe get '§YSupporting Tribal Growth§!' for §Y5 years§!, giving the following effects:\n    Tribal Development Growth: §G+0.02§!\n--------------\nIf we understand the §gGift of Mountains§!:\n    '§YSupporting Tribal Growth§!' gives the following effect:\n        Tribal Development Growth: §G+0.02§!\n        Settle Cost: §G-10%§!"
 support_tribal_growth_tt:0 "Gain §G+0.02§!£icon_tribal_development_growth_in_text£ for 5 years."
