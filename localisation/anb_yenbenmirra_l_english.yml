 spread_the_goddess_people:0 "§YSpread the Goddess' People§!"
 desc_spread_the_goddess_people:0 "Now that the Children of Fire finally awakened we must find a place for them. Let us make sure that all clans have at least a handful of mechanim watching over them, so they can help each other out in adapting to these strange new times we find ourselves in.\n--------------\nA random owned province with at least §Y10 Development§! and §Yno Mechanim population§! gains a '§YSmall Mechanim Minority§!'.\n--------------\nIf we understand the §MGift of Water§!:\n    §Y50% chance§! that the affected province gains one random development as well." spread_the_goddess_people_tt:0 "Some of the §YMechanim§! settle within our lands."
 spread_the_goddess_people_tt:0 "Some §YMechanim§! will settle in our land."
 spread_the_goddess_people_bonus_tt_YES:0 "£yes£ £icon_danguranga_water_in_text£: §M50% chance to gain +1 random £icon_development_in_text£ in that province.§!"
 spread_the_goddess_people_bonus_tt_NO:0 "£no£ £icon_danguranga_water_in_text£: §M50% chance to gain +1 random £icon_development_in_text£ in that province.§!"

 festival_of_flame:0 "§YA Festival of Flames§!"
 desc_festival_of_flame:0 "Many outsiders see the Gift of Fire as a weapon that burns the evil so the righteous can live to fight another day, but we know that the flames hold so much more within. Let us celebrate its beauty and light in a great festival dedicated to the rebirth of nature that follows its cleansing touch.\n--------------\nEvery owned province with both §YHuman§! and §YMechanim§! population get §G-10%§! Local Development Cost for §Y10§! years.\n--------------\nIf we understand the §OGift of Fire§!:\n    §Y5% chance§! to gain an extra development when developing one of our provinces with the '§YFestival of Flame§!' modifier."
 festival_of_flame_tt:0 "§YHumans§! and §YMechanim§! will help develop our land."
 festival_of_flame_bonus_tt_YES:0 "£yes£ £icon_danguranga_fire_in_text£: §O5% chance of +1 £icon_development_in_text£ when improving province.§!"
