l_english:

 tuan_quest_tt: "The City of Ambition, Tuan Caoban, now shines resplendent once more. It is clad in many-hued silks, its streets have regained their lost poise, its people are thriving -- but its spiritual inhabitants do not yet entirely accept us as righteous rulers worthy of their blessing. First, they demand we prove ourselves worthy of this pillar of the soul by demonstrating our determination to reach the pinnacle of greatness.\n\n[Root.tuan_quest_1]\n[Root.tuan_quest_2]\n[Root.general_t_quest]"
 tuan_quest_1_yes: "£yes£ §Y[Root.GetName]§! Has at least §Y50K§! troops under their banners."
 tuan_quest_1_no: "£no£ §Y[Root.GetName]§! Has at least §Y50K§! troops under their banners."
 tuan_quest_2_yes: "£yes£ §Y[Root.GetName]§! is a §Ygreat power§!."
 tuan_quest_2_no: "£no£ §Y[Root.GetName]§! is a §Ygreat power§!."
 skarkaophe_quest_tt: "The City of Generosity recently suffered a devastating revolt that shook it to its core. Though our hand has steadied it and seen it rise again, the spirits within the city request that we live up to the city’s moniker and demonstrate our largesse so they may consider us worthy of ruling the pillar of generosity.\n\n[Root.skarkaophe_quest]\n[Root.general_s_quest]"
 skarkaophe_quest_yes: "£yes£ Has sent §Y5 full gifts§! or subsidized §Y5 nations§!."
 skarkaophe_quest_no: "£no£ Has sent §Y5 full gifts§! or subsidized §Y5 nations§!."
 khabtei_teleni_quest_tt: "The City of Nourishment stands at an impasse: The memory of Sokha Khangming's revolt still scars the city and its people. The spirits demand we grant them peace of mind and make the city prosperous once more to prove ourselves worthy rulers.\n\n[Root.khabtei_teleni_quest_1]\n[Root.khabtei_teleni_quest_2]\n[Root.khabtei_teleni_quest_3]\n[Root.general_k_quest]"
 khabtei_teleni_quest_1_yes: "£yes£ Khabtei Teleni is §Yprosperous§!."
 khabtei_teleni_quest_1_no: "£no£ Khabtei Teleni is §Yprosperous§!."
 khabtei_teleni_quest_2_yes: "£yes£ Khabtei Teleni has a §Yproduction building§!."
 khabtei_teleni_quest_2_no: "£no£ Khabtei Teleni has a §Yproduction building§!."
 khabtei_teleni_quest_3_yes: "£yes£ Khabtei Teleni has a §Ymanufactory§!."
 khabtei_teleni_quest_3_no: "£no£ Khabtei Teleni has a §Ymanufactory§!."
 bim_lau_quest_tt: "The Imperious City of Bim Lau remains proudly standing long after its humbling by Jaher. Its spirits require from us the restoration and expansion of their grand necropolis in order to prove ourselves in their eyes.\n\n[Root.bim_lau_quest]\n[Root.general_b_quest]"
 bim_lau_quest_yes: "£yes£ The §YBim Lau Necropolis§! has been upgraded to §Ytier 2§!."
 bim_lau_quest_no: "£no£ The §YBim Lau Necropolis§! has been upgraded to §Ytier 2§!."
 semphrerong_quest_tt: " The City of Innovation has long strayed from its roots, showing more interest in what passes along the river just beyond its walls - and what such novelties might be traded for - than what true innovation can be created at home. The spirits demand that we prove ourselves worthy of this pillar of the soul by demonstrating the brilliance of our people.\n\n[Root.semphrerong_quest]\n[Root.general_se_quest]"
 semphrerong_quest_yes: "£yes£ Have §Y25 innovativeness§!."
 semphrerong_quest_no: "£no£ Have §Y25 innovativeness§!."
 lapnam_amrik_quest_tt: "The City of Discipline remains defiant and vainglorious through the ages, constantly re-enacting ancient feats of prowess. The spirits within demand that we prove ourselves worthy of this great legacy by winning a hundred battles.\n\n[Root.lapnam_amrik_quest]\n[Root.general_l_quest]"
 lapnam_amrik_quest_yes: "£yes£ Won at least §Y100§! battles while owning §Y[4941.GetName]§!. §g(currently §Y[Root.Getlapnam_amrik_battle_counter]§!)§!"
 lapnam_amrik_quest_no: "£no£ Won at least §Y100§! battles while owning §Y[4941.GetName]§!. §g(currently §Y[Root.Getlapnam_amrik_battle_counter]§!)§!"
 risrong_quest_tt: "Risrong, the Pillar of Harmony, finds itself in a delicate position: the Risbeko are the most endangered of all Bom and their previous sense of harmony has given way to a fierce distrust towards outsiders. We must mend this wound and remind them of the values of their ancestors to appease the city's spirits.\n\n[Root.risrong_quest]\n[Root.general_r_quest]"
 risrong_quest_yes: "£yes£ Have §Y4 races integrated§!."
 risrong_quest_no: "£no£ Have §Y4 races integrated§!."
