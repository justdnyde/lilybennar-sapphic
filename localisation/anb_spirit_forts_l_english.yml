 #decision
 spirit_fort_upgrade_title: "Spirit Fortress Exaltation"
 spirit_fort_upgrade_desc: "Each of the Seven Sacred Cities of Bomdan contains a Spirit Fortress, and the hallowed ancestor spirits residing within them are capable of granting mighty boons to a realm they consider righteous. Should our reign meet their exacting standards, we might be able to elevate the respective Spirit Fortress to the state of Exalted Spirit Fortress, whose beneficial influence will be felt throughout our realm."
 unlocked_spirit_forts_tt: "Has otherwise earned the respect of the Spirits."

 spirit_forts_province_group: "Spirit Fortress provinces"
 
 #events
 spirit_forts.01.ti: "Exaltation of a Spirit Fortress"
 spirit_forts.01.de: "We have gained control over one of the many fortresses that dot Bomdan, yet this is no mundane fortification. It is a Spirit Fortress, inhabited and guarded by the venerated ancestor spirits of the local populace. If we desire to win their approval and the blessings and protection that come with it, we need to prove ourselves worthy. Only once the spirits have acknowledged us as the rightful guardians of all these seven pillars of the land can we truly claim to be the righteous ruler of all Bom.\nThese are the Spirit Fortresses found within the seven Sacred Cities of Bomdan."
 spirit_forts.01.a: "The City of Ambition, Tuan Caoban."
 spirit_forts.01.b: "The City of Generosity, Skarkaophe."
 spirit_forts.01.c: "The City of Nourishment, Khabtei Teleni."
 spirit_forts.01.d: "The Imperious City, Bim Lau."
 spirit_forts.01.e: "The City of Innovation, Semphrerong."
 spirit_forts.01.f: "The City of Discipline, Lapnam Amrik."
 spirit_forts.01.g: "The City of Harmony, Risrong."
 spirit_forts.01.z: "Go back"

 spirit_forts.03.t: "A Dormant Spirit Fortress Awakens"
 spirit_forts.03.d: "The province of [Root.GetName] has experienced marked improvements under our benevolent rule. Its crumbling fortifications have been restored, its derelict temples have been refurbished, new roads have been constructed and the people prosper.\nAnd not just its mortal inhabitants have noticed our efforts. The ancestor spirits of [Root.GetName] appear to have deemed our rule as just and the Spirit Fortress of [Root.GetName] is once more blessed by their ethereal presence."
 spirit_forts.03.a: "The ancestors truly have blessed us with their presence!"

 spirit_forts.04.t: "A Spirit Fortress Falls Into Ethereal Slumber"
 spirit_forts.04.d: "Our recent conquest of [Root.GetName] has led to an unforeseen consequence. As soon as our troops triumphantly entered the city gates, the ancestral spirits tirelessly guarding the Spirit Fortress of [Root.GetName] laid down their weapons and lost their corporeal presence, a clear sign of their repudiation of our right to these lands.\nWe shall have to expend significant efforts to regain their goodwill and demonstrate the righteousness of our rule if we hope to reawaken the ghostly inhabitants of the Spirit Fortress from their current state of ethereal slumber."
 spirit_forts.04.a: "All that waxes must wane in time."
 
 
 #modifiers
 latent_fortress: "Dormant Fortress"
 latent_fortress_desc: "The Spirit Fortress here lies dormant, as its inhabitants reject our rightful rule. In order for them to accept us we must accomplish these tasks:\n\n  -Have §Y20 Development§! in this province\n  -Construct a §YFort§! and §YTemple§! building\n  -Belong to the §YBom Culture Group§! or\n  has earned their respect through §YMissions§!"
 awakened_fortress: "Awakened Fortress"
 awakened_fortress_desc: "The Spirit Fortress and its inhabitants stand ready to aid in the defense of this province as they embrace our glorious rule."
 exalted_fortress_tuan_caoban: "Exalted Fortress of Tuan Caoban"
 exalted_fortress_tuan_caoban_desc: "We have proven our might as one of the greatest realms Haless has seen; the inhabitants of this Spirit Fortress have thus embraced our glorious rule and given us their blessing."
 exalted_fortress_skarkaophe: "Exalted Fortress of Skarkaophe"
 exalted_fortress_skarkaophe_desc: "We have proven our diplomatic acumen; the inhabitants of this Spirit Fortress have thus embraced our glorious rule and given us their blessing."
 exalted_fortress_khabtei_teleni: "Exalted Fortress of Khabtei Teleni"
 exalted_fortress_khabtei_teleni_desc: "We have proven our dedication in the pursuit of prosperity; the inhabitants of this Spirit Fortress have thus embraced our glorious rule and given us their blessing."
 exalted_fortress_bim_lau: "Exalted Fortress of Bim Lau"
 exalted_fortress_bim_lau_desc: "We have proven our devotion to maintaining the Necropolis in memory of our venerable ancestors; the inhabitants of this Spirit Fortress have thus embraced our glorious rule and given us their blessing."
 exalted_fortress_semphrerong: "Exalted Fortress of Semphrerong"
 exalted_fortress_semphrerong_desc: "We have proven our vibrant zeal for innovation; the inhabitants of this Spirit Fortress have thus embraced our glorious rule and given us their blessing."
 exalted_fortress_lapnam_amrik: "Exalted Fortress of Lapnam Amrik"
 exalted_fortress_lapnam_amrik_desc: "We have proven our superior martial might; the inhabitants of this Spirit Fortress have thus embraced our glorious rule and given us their blessing."
 exalted_fortress_risrong: "Exalted Fortress of Risrong"
 exalted_fortress_risrong_desc: "We have proven our ability to live in harmony with others; the inhabitants of this Spirit Fortress have thus embraced our glorious rule and given us their blessing."