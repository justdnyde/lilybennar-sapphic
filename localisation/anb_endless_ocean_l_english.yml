 endless_ocean_events.107.t:0 "[endless_ocean_title_107]"
 endless_ocean_events.107.d1:0 "Haku tells how to act on land: prove nurturing, like the soil. Trees must cast their roots in the dirt, and turtles must lay their eggs on land. Birds must alight on the shore to nest and rest, just as we must return to land to make ships and homes. Even volcanoes burgeon with the flow of magma. Haku is defined by building and growth, and when one steps on land one becomes part of the stone, too. One must focus on improving oneself to cultivate strong Haku.\nMoa says how to act at sea: flexibly, like water. The water chooses many ways to show its forms - at times it dances as a wave, and other times it hovers as a cloud. On some days it even bites as hail! Water fills the shape of whatever container holds it, and in its domain the world constantly changes. We should also be so willing to sculpt ourselves anew, so quick to adapt to our surroundings. The sea can be dangerous, but when we allow ourselves to become as the waves, we move within the flow of danger, rather than against it.\nLai prescribes how to treat others: be constant, like the sky. No matter where your feet lie in the world, be it on swell or soil, the sky will reign above. It is indestructible, inexhaustible, and necessary. Be unto others a constant source of fresh air– an undeniable force of revitalization."
 endless_ocean_events.107.d2:0 "The untrained mind may wonder what connecting threads exist between the countless musical arts of the Endless Ocean. After all, just as the rhythm of the waves drums a myriad of beats against the shore, so too do the feet of all Insyaa step to different patterns.\nHowever, spend enough evenings in observation, and one will begin to notice similarities. These performances are often conducted at the boundaries of dusk, in the presence of water, and incorporate fire in the act– be that as an element of the show or as a centerpiece for the stage– all traits deliberately chosen for their symbolic value.\nThese commonalities invoke transience: just as day and night pursue one another, so too will fires spark and cool. Song, unlike sculpture, is a fleeting art, and water changes so rapidly you may never know the same drop twice in your life. Even our brief existence in this world is but a flash, like the reflection of a torch against the tossing surf. By surrounding the dancers in like concepts, the Dance of Life aims to reaffirm its performer’s position as another moving piece in the great turning of the world."
 endless_ocean_events.107.d3:0 "The optimal location for a House of the Sea is at the junction of high tides, great winds, and strong currents. They are monuments to travel: boats and floating platforms meant to offer shelter to pilgrims with no specific destination in mind. Believers who chose to live in one of these domiciles find themselves carried where the current would have them: the whims of Moa test the seaborne’s ability to change with their circumstances. Perhaps these nomads will drift to the shores of a village in mourning, and their task will be to comfort the aggrieved. A different gust may strand them for some time on an isolated sandbar, and the resident may need to spend time studying the ways of the natural world in order to survive until the next leg of their journey. At any point, adherents may depart from the House; surely Moa will eventually bring the shelter to another, longing to begin a voyage of their own. As a result, there is no set group who embody the clergy; rather, membership is temporary and voluntary.\nRegardless of where these tests occur or who completes them, during a tenant’s stay, they accrue proof of their travels. Villages offer tokens of gratitude, skeletons of strange marine creatures, and sandblasted refuse– it’s custom to give some gift to a helpful pilgrim to facilitate their dedication to the will of Moa. Likewise, the expectation of tenants is to take souvenirs from natural places along their odyssey. Eventually though, even the most resident tenant departs from the House of the Sea. When they do, they leave behind all these trophies, and integrate them into the vessel. Over time, each House of the Sea becomes a unique amalgamation of driftwood repairs and forgotten idols– an utterly unique temple."
 endless_ocean_events.107.d4:0 "If nothing else, to believe in the Challenge of the Ship is to throw oneself ceaselessly into the boundaries of possibility - to scrape at the very boundary of the Kiamoa in preparation for the journey to the afterlife held beyond it. While ship racing has always been a favored pastime among the children of Insyaa, the sport reaches its apogee among the believers in the Challenge of the Ship.\nHere, the definition of “sailors” and “ships” approach their breaking points. For the short distance sprint races, the dancing gust-tip kite-ships almost entirely escape the confines of the sea, ever so barely skimming the surface of the water to reduce friction as much as possible. Their crews are scant, and the skills demanded to pilot such a vessel overlap more with the skills of a jockey or dancer than a typical sailor.\nBy contrast, the epic island-ships of the Kiamoa Round care little for speed as their fleets attempt to circle the continent without ever making landfall. One might argue that turning coral atolls into a sailing vessels might undermine the spirit of that mission, if not the letter, but the quartermaster reports of these archipelago-armadas would prove no less impressive for the distinction, as each “ship” grows food on its hull to sustain the next leg of the journey. To undertake such an odyssey requires a keen sense for architecture and agriculture, skills also seldom employed by those with less faith in the Challenge of the Ship.\nThough if one searches for a conventional paragon of sailing, look no further than the rowing hulks of the Kiamoa-pushers– vast, sculpted sailors who fight monsoon winds with naught but their muscle and mettle. In their steadfast defiance of nature, they dip oars almost faster than the naked eye can process, overcoming the gale winds to press on clockwise across the continent. Their ships are flexible and durable– if not by design, then by attrition."
 endless_ocean_events.107.d5:0 "Self-improvement takes root in the soil of resistance. Just as a heavy weight calls itself to the stone underfoot, so too does the buoyant body expel itself from the sea. These phenomena are the means by which the Haku and Moa themselves attempt to better us: through struggle, our abilities are honed, and those same honed abilities allow us to better embody the virtues of the world.\nPractitioners of the Calm Mind of Sea and Stone begin their training with simple swimming, focusing on both speed and stamina. This initial phase focuses on mere survival - by acclimating to the body heat loss of prolonged time in the water and developing a strong stroke, the faithful prepare themselves for a life amongst the waves.\nAfter proving their foundational skills, believers begin simple diving tests, gradually transitioning from merely touching the sea bed to retrieving increasingly heavy items. These exercises intend to assist the aspiring ascetic to undertake challenges while helping contribute to their communities; pearl divers, oyster harvesters, and coral jewelers all practice this phase especially rigorously. After a dedicated practitioner succeeds in returning twice their weight in seafloor baubles in two trips, they are deemed ready to begin the final test of the Calm Mind of Sea and Stone: underwater meditation.\nContrary to common presumption, seafloor meditators do not aim to stay in place underwater; it is not the nature of Moa to remain still. Rather, no matter where the current drags the diver, the expectation is that their previously acquired skills will guide them back to shore, while the meditation itself protects them from the onset of panic while they hold their breath."
 endless_ocean_events.107.d6:0 "The strongest net in the fisher’s arsenal is forbearance. When the lure first bobs, one must resist the impulse to immediately begin reeling. If a line seems inadequate, one must endure the day’s heat until one’s quarry grows hungry, lest the caster do the same. When laying traps, patience guarantees the wise will take home far greater reward for their effort than the overly-eager.\nSo too does this strength hold true at grand scale. The ignorant and gluttonous may think the sea’s wealth inexhaustible and uninterruptible, but every elder carries a tale of when desire eclipsed reason, and nets rose empty. In the zeal of greed, the uninformed may overharvest, leaving the seas no means to replenish themselves.\nHowever, when a society is able to restrain its everyday whims, they sow the seeds of future return. Know the tides will carry with them bountiful catches. Observe the full moon as it summons breeding frenzies. Witness the sea run silver with the backs of fish, vying for their share of the rich countercurrents. These are the Seasons to Fish. On such days, be generous with your catch, and invite your neighbors to feast, prepare food for the future months, and make merry."
 endless_ocean_events.107.d7:0 "The afterlife is not here.\n\nPerhaps such a lesson may come across as tautological, but for the faithful, the axiom proves a potent spiritual navigation tool. The departed do not belong in the homes of the living; their peace will be found in the uncharted realms far across the waves, away from torches and hearths and forges. Blissful unknown is their lot, rather than the glowing embers of life. The afterlife is not here, and so the dead must be guided to their next journey.\nTo facilitate their travels, some Endless Ocean Believers have taken to practicing Firelit Vigils. Throughout the year, hearthkeepers tend massive beacons to warn the dead where not to sail– special care is given to these blazing guides following disasters and battles. After such events, the purpose of the hearthkeepers is twofold: like usual, their labor illuminates long-treaded ground for the dead to escape from, while the beacons offer a heading to the displaced and missing. Those still possessing the spark of life rejoin the great conflagration of civilization, while the deceased take sail for a gentler afterlife across the great sea."
 endless_ocean_events.107.d8:0 "Like the scattering of driftwood, the Endless Ocean has carried its believers far from their origins. Wind and waters, Moa and Lai, have flung flotsam far up rivers and into bayous and– in some cases– even places beyond the sight of any water at all.\nThis is not to say our connection to the sea has diminished in any way. No, the rivulets of water trickle across all lands, and just as those drops are destined for the sea, so too must all souls return to the ocean. Pilgrimage to the Sea is no mere journey– there are strict rules over how it must be conducted; the rugged conditions often leave pilgrims with an enhanced appreciation for the more standard procedures of travel.\nProgress must take place over water wherever possible en route to the ocean, and if one travels in a boat without aiding in its propulsion, then they must make contact with the water at all points in time to facilitate their connection to the process. Travel over land may only take place when it is raining, or snowing if climate won’t permit. In moving like water, pilgrims reaffirm their bond with the sea."
 endless_ocean_events.107.d9:0 "Some cultures liken the barrier between life and death to a veil: a thin piece of fabric, partially obscuring the sight just beyond its curtain. In some regards, this is akin to cultural beliefs about Kiamoa Worship. Gaze into the Kiamoa, and one might see the briefest flashes of lightning, or shadows without origin. The sea flows into its whorl– why wouldn’t the sea persist beyond? At times, the skywhales drift overtop its thunderheads, and stars rain past its perimeter during Tearfall. Once, our ancestors came to this land accompanying the great Dragon Turtles on their journey here from the afterlife. There is no doubt to be had: somewhere, something lies beyond the Kiamoa.\nFor a storm, it is almost polite. Its boundaries are clear, despite occasional offshears, and the constant counterclockwise sweep of its winds have done as much to deliver sailors as they have to sink them. Nevertheless, the vast power of the Kiamoa cannot be overstated. Those same Dragon Turtles who once found refuge beyond its path have also found themselves lost to its surge. Those same ships who have ridden its winds have dissolved in the force of its grasp. For an era, the great typhoon has loosed its furious gale around Insyaa, awesome and terrible.\nFitting, that the boundary between life and death is so tantalizingly thin, yet incontrovertibly impermeable. A veil, indeed."
 endless_ocean_events.107.d10:0 "Where the Kiamoa fell, we were greeted with water. Boundless water.\n\nNot for an era have the clouds parted long enough to allow Insyaans to venture into the far beyond. What to our ancestors must have been so familiar now holds unknown expanses, territory even the Dragon Turtles prove reluctant to describe, and who is to say what the millennia have done to the world in our absence?\nAnd what a blue world it is.\n\nEvery direction we venture, the long turquoise of the ocean deep heralds another possibility! Dolphins leap and birds fly to and from lands uncharted! The winds blow across the cerulean sky towards destinations unimagined! How narrow our understanding of the ocean had been, too content we had proven to stand on the threshold of our home instead of venturing forth into the world! The sea will never be known to those too timid to extend a greeting, and the dead will never be seen again if we do not set out to find them.\nBeyond those endless sapphire wavetips lie the certainty of an epoch of discovery, and so begins the era of Great Voyages!"
 endless_ocean_events.107.d11:0 "Idiots will tell you that a surfboard knifes through the water, attributing preternatural strength to glorified driftwood, as though it has the power to defy the flow of Moa. This is a foolhardy interpretation; a surfboard does not cleave waves, merely follows them. A surfer is not the master of the coast, but rather the coast arbitrates the surfer’s fate. A surfboard is but another piece of flotsam within the great wheel of the ocean, no greater than the rocks and shells which also wash againt the shore. A surfer is naught but the temporary passenger riding the adamant will of the sea.\nSurfing, at its pinnacle, is surrender and imitation. To know that the bare modicum of choice we hold in this world pales in significance to the force of nature, and to then realize that rather than fight the undefeatable, our energies are best spent in adapting to the uncontrollable– that is the meaning of surfing. The fold of a breaker decides the path of those who would follow the tides. It carves the undersea valleys and recesses which form the boundary of sea and stone, Moa and Haku. It pounds islands to sand, and we– in those briefest moments where the wind runs through our hair and the sea foam compels us rise with the rest of the wave– are lucky enough To Act as the Sea."
 endless_ocean_events.107.d12:0 "“Where there is Water, there is Rhythm. Where there is Heat, there is Truth.” - proverb of the Ship Nomads\n\nAs the sound of oar-strokes, or the pitter-patter of rain, or the percussion of Wavesong, where there is water there is rhythm. The Kiamoa’s surges always travel counterclockwise, and the monsoons follow cyclic seasons. Water– Moa– while flexible, follows a predictable set of patterns.\nLike the revealing warmth of daylight, or the embrace of a loved one, or the burning furnace of a magma vent, where there is heat there is truth. A hot, humid day may bring your inner anger to a boil, or the warmth of a fire after a cold night swim may teach you gratitude. Greatest of all is the heat of molten Haku, or stone – combined with water, it may tell you things which have yet to pass.\nThe future is found with prediction, the junction of pattern and fact. When lava meets sea, the resulting steam holds within its fleeting form visions of days yet to come, tales of how tomorrow may resemble days gone by. Those faithful of the Endless Ocean who have witnessed the Magmasight diviners of Volcanic Truth will tell you of their impressive foresight, yet inexperienced interpretation. Vision is little without the experience of Moa, and experience without the foresight of Haku’s growth is merely reflection."
 endless_ocean_events.107.d13:0 "The Ten Thousand Isles have as many heroic epics as shores, and these tales have long been hoarded by the hero-worshipping adherents of Speaking Memory. In fact, some of the oldest heroes of Kanolowele predate the existence of Speaking Memory itself, instead taking to epic feats of adventure from their worship of the Endless Ocean! It’s inevitable that as the wakes of our ships cross, the culture left behind is a blend of our values.\nLittle wonder, then, that some of the Endless Ocean faithful would take inspiration from the great individuals whose sea-crossing quests spanned all Kanolowele. Those who practice the Veneration of Heroes adopt a story– or more specifically a virtue– held by one of these legendary figures, and seek to emulate that quality to its fullest. Such aspirants are honorbound to embark on nomadic quests to serve the weak and inexperienced, in the hopes that by training in the footsteps of the grand heroes of yore, they may prepare themselves to guide fellow souls during the strenuous journey to the afterlife. The greater the list of deeds, the more capable a captain an adventurer will prove themselves.\nLikewise, their righteous deeds take root in the minds of the young. In every seaside village across Kanolowele, playing children imagine themselves the epicenter of great tales and noble efforts, and though few will take to the seas in pursuit of glory, all will fondly recollect the myths and emulate the morals of their childhood."
 endless_ocean_events.107.d14:0 "In the process of its travel across Kanolowele, Endless Ocean has drunk deeply the cultural practices of all whom it has touched. Speaking Memory’s history-worship has always lended itself to monument-making, and perhaps out of infectious respect for the epics of old, local Endless Ocean faith leaders have taken up the same skills.\nBy Endless Ocean doctrine, the dead must be buried at sea, lest their bodies be stuck in the earth, unable to participate in the voyage to the afterlife. However, for the sentimental who wish some keepsake of their departed loved ones, there is no better solution than a Face of Stone. Faces of Stone begin their lives in the quarries adjacent to most local temples, where the survivors of the departed select a fitting specimen of rock from which to shape a likeness of the deceased. After the extreme finework is complete, these statues are arranged in coastal shrines, looking out to sea and preferably towards the route of the departed, beyond the Kiamoa.\nSuch stoneworking takes untold hours of labor, and as such, the clergy who participate in making Faces of Stone swiftly hone their masonry skills. When not in practice to aid mourners, these masters aid locals in erecting other necessary structures as acts of goodwill, in the hope that when they make the journey across the sea, some other stranger will return the favor."
 endless_ocean_events.107.d15:0 "The most vexing of foes known to mortalkind, Kraken seem to combine the most frightening traits of their cousins. They are fiendishly intelligent; they are known to open doors, remember faces, and play tricks on their would-be hunters. They possess twelve arms of herculean strength, capable of errantly snapping a ship in twain. They may render themselves near-invisible in any environment, so adept is their palette-shifting camouflage. They are even flexible enough to squeeze into any space their beak may fit within; smaller specimens have been known to hide inside ghost ships, waiting in ambush for some ill-fated rescue party. And if by some miracle an army presents enough of a threat to wound a Kraken, the beasts have one final defense– a massive well of ink by, which immediately and permanently stains whatever it touches, by which to blind their assailants.\nUnlike their short-lived kin, Kraken do not die after the mating season. In fact, these monstrous creatures are biologically immortal, and they continue to grow throughout their lives, so long as they can find food to sustain their immense bulk. However, parent kraken do not eat during the mating season, preferring instead to ceaselessly blow fresh water over their eggs. At the end of this incubation period, the parent kraken are starved, ink-dry, and they will not run.\nIt is during these times the fearless and the mighty amass in the thousands to hunt this impossible prey. Even drained, tangling with a mother Kraken is a life-or-death affair, and the oldest specimens bear the scars and experience of countless battles. Only the most brilliant tactical efforts may attempt Kraken Hunts, and only the greatest survive."
 endless_ocean_events.107.d16:0 "Equal parts benediction and map, the marathon ceremonies of the P€tuauala, or The Way Back, transcend generations and challenge their adherents to find any place on this worldsea where they are truly lost. Clergy members who wish to train in this art are expected to memorize nigh infinite combinations of star charts and wave patterns and cloud formations. As soon as the memorization is complete, lessons on poetry, vocal exercises, history, theatre, and theology begin. The process slowly melds the twin worlds of this skill together, until the path-sermons of the clergy are seamless blends of spritualism and practicum.\nAspirants will dedicate decades of their lives to be considered as apprentices, and decades more to be considered masters. As such, schools specializing in teaching The Way Back adopt their members from a young age, catering to not only the every need of their students, but also the needs of their students’ families. This investment, while considerable, is a pittance compared to the revenue brought by even a single chart-chanter; trading fleets happily shell out inestimable sums to patronize even a journeyman chart-chanter, in the knowledge that so long as the uttering of the P€tuauala continues, their ships will undoubtedly return home. As such, the school-temples of The Way Back never lack for resources, and invariably give their excess wealth away as an act of charity."
 endless_ocean_events.107.d17:0 "The Hinuimangroves of Taga’ala are strange trees, taking root in the sea and ignoring the salt within their drink. Pioneers among their kind, these fascinating organisms have evolved ways by which to survive an environment which would kill other trees. Their bodies capture the salt from the water as they drink, excreting it as a fine rain of grains from the undersides of their leaves high above. Meanwhile, in order to avoid drowning, the trees extend specialized roots– known as “knees”– above the water surface. Among these great knotted structures, some believers of the Endless Ocean sculpt Root Temples.\nPerhaps this veneration stems from the fact that like us, the Hinuimangroves defy the conventional lifestyle of their kin in favor of venturing out to sea. Here amongst the deep waves, where no purchase should exist from which to build upon, these miraculous arbors offer their aid. Nowhere else in this world do platforms rise from the ocean itself to buoy the adventurous of soul, so no doubt these climbing roots are sacred. Great care is taken to carve into the knees without causing lasting harm to the trees, a process which can take decades. Inside, halls of worship sprawl against the waterline, and at times, even below it; underwater ceremonies attempt to impart the singularity of these woods as much as they aim to better understand these trees. The hope among some clergy is that with enough knowledge, we may plant a glade that stretches to the afterlife, completing the journey for both mortalkind and the forest that shares our goal."
 endless_ocean_events.107.d18:0 "In the twisting forests of Taga’ala, mages have developed a cousin to the carving magic known as Stonescrawl: Barkscrawl. By chiseling Barkscrawl symbols into the roots of the great Hinuimangrove trees, the wood is reinforced against rot and impact alike. This process helps preserve quality wood for use when demand finally arises: no storm wind nor errant beast can easily break a barkscrawled bough. Over time, a well-carved piece of wood hardens to become as durable as metal - specialized counterspells must be carved in its harvest, since tools would blunt themselves in the collection process otherwise.\nWhen finally a root is deemed ready for use on the high seas, barkscrawlers have a choice to make: remove the ornate bas reliefs to reduce the drag of the hull in water, or sacrifice nautical speed in the name of building a vessel that can last hundreds of years. In the kraken-filled, mangrove-knee root ridden waters of Taga’ala, durability often proves to be the more compelling trait. While complete decomposition on Insyaa usually takes place in a fraction it would elsewhere, a single barkscrawled Mangrove ship can see generations of sailors walk its length, so potent is their resistance to the elements. And although the naval combat applications are obvious, more often Mangrove ships have found themselves in service to the merchant marine– upkeep costs for these vessels proves insignificant, as protected from the wears of time as they are."
 endless_ocean_events.107.d19:0 "For many Mechanim, the sea has proven hazardous in ways the land cannot imitate. While unconfined by the limitations of breath, as the meat-creatures are, we have found ourselves the victims of a different force: buoyancy. An injured Mechanim on land can lie waiting for a companion to restore its chassis; a kauga lost at sea seldom receives such care– unless made with such tasks in mind. Retrieving a sunken kauga is nigh impossible: even if the orb isn’t immediately buried by seafloor currents, combing the abyss to find even one kauga can take years.\nSeasteel mechanim designs attempt to bypass the worst of this issue. The kauga is carved to be hollow, then sealed shut, so that if the worst befalls a Mechanim sailor, their Kauga will at least float on the surface. Since this adaptation reduces the durability of the Kauga, enhanced plating protects the orb while in place on the body, and a special rip-cord allows a sinking frame to release the Kauga for surface retrieval. Bright, water resistant paints also help.\nFor those Mechanim who do not have the privilege of Precursor steel, preparing for sea travel begins with applying many layers of lacquers to limit water’s corrosive effect on the fame. This is a painstaking process, as each component exposed to the sea must be covered. Such efforts are usually a community event conducted in the presence of the frame’s Kauga."
 endless_ocean_events.107.d20:0 "Ask the Seaborn Bands of Insyaa what the difference exists between their parties and the parties of other adventurers, and they will readily tell you: commitment. They do not consider it enough to merely desire to enact good deeds; one must live the lifestyle even during the harshest trials and lowest hours. Adventuring isn’t nonstop glory and riches; it is hard, backbreaking labor. To effectively tackle monsters and quests, aspiring adventurers must first master quartermaster inventories, haggling in the information trade, job networking, equipment maintenance, camp construction, first aid and mechanics, and orienteering. There’s no point in showing up to tackle a job no one wanted done, unprepared and ignorant. A good hero spends hours practicing, learning, and drilling.\nOne must offer oneself freely and relentlessly to the unglamorous realities of heroism to even have a hope of improving the world, lest one’s goal become a fair-weathered commitment. To adventure– to be a Hero worthy of praise– is to love that which you protect, and sincerely wish to see it safe. Such true love transcends such shallow concerns as instant gratification: the greatest heroes of Insyaa all withstood periods of trial and temptation along their paths to legendary status."
 endless_ocean_events.107.d21:0 "Perhaps no natural force so perfectly merges the concepts of Haku and Moa as a landslide. Weight builds along an incline, verticality and gravity combining to put force behind each pebble and grain of sand within the ensuing wave of soil. Like Moa, the motion of this mass downwards changes the face of the hillside while turning over new soil for growth, mimicking the buildup of a wave. An eruption casts ash across the land, invigorating the soil and preparing it for new growth. Magic to cause such events combines the constant change of Moa with the cyclic nurturing of Haku.\n\nThus– wittingly or not– Landslide Infantry engage in highly spiritual deeds by triggering eruptions and scattering soil. These great feats of stonework can easily stray from the path of virtue, however, when carelessly applied. Haku is a place for growth, after all, and wanton destruction unchecked impedes that process. Likewise, sudden shifts made without warning leave little time for the well-intentioned to survive, so Moa must be managed intentionally.\n\nIn order to better channel these energies, Wavesong practitioners train Landslide Infantry mages in acts of meditation. Some tasks involve dowsing molten stone without water, or stopping a slide’s momentum in its tracks, or partially shielding a space that would otherwise be subsumed in soil. Each exercise hones the mental control of Landslide Infantry as much as it emphasizes their magical prowess, leading to more potent and virtuous mages."
 endless_ocean_events.107.a:0 "So reflects our Chronicle."
 endless_ocean_events.108.t:0 "Tides Turn"
 endless_ocean_events.108.d:0 "Skies darken, and seas roil. Too comfortable have we grown with familiar shores, and too long have we let the unknown build right beneath our feet. These waters are unfamiliar, and we are too ignorant to understand why."
 endless_ocean_events.108.a:0 "A grave oversight, to neglect the alien."
 endless_ocean_events.108.b:0 "We’ll have to weather the storm for now."

