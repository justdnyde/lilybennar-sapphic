 endless_ocean_events.105.t:0 "[endless_ocean_title_105]"
 endless_ocean_events.105.d1:0 "Forty-five seconds: the duration of the longest recorded flight by a fish.\nIt’s a pittance. In order to fly, they’ve had to work for so long. How many countless generations ago did one fish dream of reaching the sky? How many fleeting leaps did they take before the wind caught their scales? How many stars and moons passed along before they could stretch their fins far enough to glide? How many thousands of years did they spend training for forty-five measly seconds in the air? How many more thousands of years will they spend striving for forty-five seconds more?\n\nForty-five seconds where their world changes entirely.\nAs our efforts to document local practice continues, our chroniclers spend hours, days, weeks sorting indiscernible legend from apocrypha. We toil voraciously, sweating as we document and memorize stories whose meanings we cannot decipher. And just when the noonday sun beats down the hardest and the wind’s breath is most cutting, a miracle occurs: for a moment we understand, and a new world appears before us.\n\nAnd then forty-five seconds pass."
 endless_ocean_events.105.d2:0 "How tempting they must seem, hooks, when beholden by a fish. So juicy of a meal, so straightforward of a task, so plainly out in the open for all to see! Just approach, and gulp. Perhaps the ease of the task is part of the allure to the fish; it doesn’t need to think much to bite a hook. It could never even fathom falling victim to a trap.\n\nWe have become victims of a hook ourselves. We have too lackadaisically confined ourselves to documenting that which was easy to understand, the perspectives that were easy to find, and in doing so we’ve overlooked the true headwaters of a faith– culture. We’ve consulted with famous shamans, but have we interviewed boonie matriarchs? We’ve asked about recorded histories, but have we observed social traditions? Have we mistaken a hook for a meal? Have we done what is easy, instead of what is right?"
 endless_ocean_events.105.1:0 "And what I would give for another forty-five."
 endless_ocean_events.105.2:0 "I mean… surely we got the gist of it?"
