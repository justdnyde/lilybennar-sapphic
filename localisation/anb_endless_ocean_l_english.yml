 endless_ocean_events.106.t:0 "[endless_ocean_title_106]"
 endless_ocean_events.106.d1:0 "Astronomers have suggested the stars in the night sky equal the grains of sand on a beach. While the idea may seem absurd, if you look long enough into the dark, you will begin to see dim motes of light surface in the abyss. Peer into the night with a telescope, and you’ll discover pinpricks in the firmament of space. Spend enough time gazing, and you’ll discover what you’d assumed an empty expanse of ink to be teeming with boundless shining stars. How does a mountain become a beach? At face value, stone offers no inroads. It’s unyielding. Brittle. Defiant. Yet despite these qualities, the murmur of wind and the caress of rainfall grind mountains to motes. A boulder becomes ten stones yield a hundred pebbles birth a thousand grains of sand, until only dust remains.\n\nInfinity is the combination of effort and agglomeration. Our efforts produced infinity. Like starlight, we crossed vast expanses in the hope of illuminating a new corner of the universe. Over hundreds of moonlit interviews and seaside rendezvous, we became the rain and wind shattering the unyielding, brittle, defiant stone of the unknown world and teasing from it thousands of stories. As surely as individuals grains of sand make a beach, as surely as motes of starlight make a galaxy, so too do stories make a Chronicle."
 endless_ocean_events.106.d2:0 "Damn and confound our imbecile Chroniclers! The coaxing of tradition is not simply a matter of attendance. Such sensitive matters as faith require tact and empathy, a subtle suite of skills our moronic representatives apparently have never documented before. Like the winds of a squall, they descended upon communities uninvited. Like the brute force of a gale, they paid no consideration as they swept through their path, destroying artifacts of cultural significance in the effort to more swiftly finish their route. Their ignorant bluster prodigiously cultivated hatred towards not just their efforts, but our entire nation, and what little they did manage to collect is marred by personal bias and conjecture, the pathetic flotsam left over by a storm as it passes over a village.\n\nLike extensions of the Kiamoa, everything they’ve made contact with has shattered to bits. Our reputation is in ruins, the resources we used to provision this expedition are exhausted, and we’re left with nothing to show for our efforts save the sorry dregs of a half-assed theological exploration. We’re now left wondering how to salvage as much as possible from this pathetic display of buffoonery."
 endless_ocean_events.106.1:0 "It’s time to honor our tutors. Tonight we celebrate!"
 endless_ocean_events.106.2:0 "Beg, grovel, bribe– do whatever you can to mend ties."
