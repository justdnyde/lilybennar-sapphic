 endless_ocean_events.103.21:0 "To locals, it’s known as Landslide Wavesong Instructors"
 endless_ocean_events.103.22:0 "And like any good friend, the ocean will greet us tomorrow as well."
 endless_ocean_events.104.t:0 "[endless_ocean_title_104]"
 endless_ocean_events.104.d1:0 "A less attentive people might assume that the face of the ocean changes every day, but they do not understand the seas as well as we do. Oh, certainly waves rise and creatures dart about in the water, but these do not change what the ocean is fundamentally. You would not call a beast by a different name because its hair has settled differently- so too do we recognize the seas are no more alien for the ways the surf roils and folds on any given day. However, over time, patterns arise from the unfamiliar and new labels emerge to describe novelties.\n\nWhat is a label but a name? What is a story but the spinning of names like woven sails? What is an ocean but the collection of sea foam and raindrops? As we listen to the perspectives and observations of newfound peoples, threads and tale strands of the water itself form a story as much as a sea."
 endless_ocean_events.104.d2:0 "Words, stories, memories, names– these are slippery concepts. Sometimes when cleaning a fish, the scales cling to your fingers even while the flesh dares to fall out. Sometimes an oar slices too quickly through the water. Sometimes a mast line escapes from our grip. Sometimes we err.\n\nIt appears as though our efforts to document new Chronicles have proven too eager. We forget critical details and misplace historical events even while we overemphasize irrelevant practices. Our efforts remain earnest, but these errors have nonetheless begun to frustrate our sources. They’ve compassionately and patiently explained the same concepts to us multiple times, but our misinterpretations have cost our benefactors valuable time pursuing other more material endeavors."
 endless_ocean_events.104.1:0 "Here ties together a knotted kipu. An ocean. A Chronicle."
 endless_ocean_events.104.2:0 "Provide a culturally appropriate gift once we’re done, as thanks."
