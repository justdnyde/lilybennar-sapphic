l_english:
 
 #Endless Ocean Events
 endless_ocean_events.100.t:0 "The Gates to the Endless Open"
 endless_ocean_events.100.d:0 "Long has our sails been filled by the wind of the Kiamoa. Its winds are just as much a sailors friend as a sailors' bane. In the best of times a sailor can cover great distances driven by those great gales, and sail into a horizon both unknown and known. When the Kiamoa howls, however, a sailor will face challenges unlike that of any other. The pulses of the kiamoa can bash ships to splinters and pull whole houses into the sea. All that has changed now. Our dearest friend and our most bitter rival has been made into something else. There are still wind and waves, but they beat at a different pace now. But as an old practice dies another emerges. Now the realms of the dead lay open to us. As our sailors set out to cross that great divide. We now truly have an endless ocean to sail."
 endless_ocean_events.100.a:0 "What lays beyond."
 endless_ocean_events.101.t:0 "Season to Fish, Season to Feast"
 endless_ocean_events.101.d:0 "They fish have had their time. Now it's our turn. Large shoals of fish are caught in grand nets and hauled ashore. Each and every fish is carefully prepared, and made into every manner of dishes. Every man and woman must pull their wait. To fish, to prepare, to cook, to serve, and most importantly to eat. For this is a time to be merry, and to feast. This is a time of plenty, and of joy. We care for our waters, we care for our fish. We carefully manage and cultivate their environment in accordance with our old practices, and then we get to reap the rewards."
 endless_ocean_events.101.a:0 "It's the time of Feasting."
 endless_ocean_events.102.t:0 "An Endless Hero"
 endless_ocean_events.102.d:0 "One of our finest soldiers keeps remarking themselves in their excellency. We have made the decision to promote them to the rank of general. Their courage and tenacity stands out in a way that nothing else has since the great heroes of old. Like the great heroes of old they stand tall and proud and are now ready to prove themselves for the glory of our nation. When history looks back at our great nation they will stand as a glorious exemplar of our faith and our might. "
 endless_ocean_events.102.a:0 "A Heroic General Arises!"
 endless_ocean_events.103.t:0 "Chronicling Opportunity Presents Itself"
 endless_ocean_events.103.d:0 "Some suggest it is never the same twice, and others would swear their lives it has never changed once. It is known by many names to many people. The Anakue know it as “moa,” and the Laautele call it the “sami.” You yourself have known it by many names, as well, and you have etched them into the sand at the rise and fall of every moon. However, on this day, as the blue stretches beyond your sight and the white-crested tips of the water surface slip by your gaze, something about the expanse before you seems novel. Maybe the caw of gulls follows a new rhythm, maybe the brine smells different, or maybe the patterns of the shells adorning the shore have changed. Surely– just surely– someone far away has a name for the sea that you have not yet heard.\n\nThe waves unfurl and the skies part. A long-held friend presents a new face to you.\n\nYour reintroduction is long overdue."
 endless_ocean_events.103.1:0 "To locals, it’s known as Way of Elements"
