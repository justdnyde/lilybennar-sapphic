 flavour_overclan.0.t:0 "A Discussion in the Bar"
 flavour_overclan.0.d:0 "\"Aul-Dwarov, dammit! That's what we lost! And it was a damn tragedy, too.\"\n\nIn the raucous din of the Drunken Shark, the dwarf's outburst barely registered outside the group of other patrons he was sat next to. One of those companions, a human, gave him a mix of a smirk and a glare.\n\n\"At least you still have the bulk of the Dwarovar to return to. What do we have in Bulwar? Everything's been elvenized! At least the orcs didn't run around changing the names of your gods, or filling up the priesthoods with themselves.\"\n\nAs the human spoke, she quietly turned toward a third companion at the table- an elf. It was as if the human fully anticipated what the elf would do next, and he failed to disappoint.\n\n\"You complain of Jaher freeing your people from bondage and delivering Surael's light across Bulwar? Sorry, my elven tongue betrays me- Surakel, is it? Tell me, how concerned were you with matters of nomenclature when the goblin exodus was running rampant across Bahar?\"\n\nAs if on cue, two new faces emerged with drinks freshly retrieved from the bartender- the heavy thuds of an orc and the light patter of a goblin heralding their arrival. The three sat at their table eyed the two for only a moment- creatures their ancestors would have decried as monsters. Then, the dwarf spoke first.\n\n\"About time you lot showed back up. I was just telling these two about Aul Dwarov.\" He moved to chug his ale, only to find the mug disappointingly dry. Fortunately for him, the orc came armed with a new mug, which he slid over as he settled down himself.\n\n\"Did you mention Dookan yet? You know how the orcs love to mention Dookan.\" The goblin teased her taller companion as she likewise settled in, more drinks at the ready to share with their companions. The orc simply snorted at her commentary.\n\n\"I'm a Ravelian, you know that. But if you want to hear about chains...\"\n\nThe conversation continued, spirited and lively, sometimes angry..."
 flavour_overclan.0.a:0 "... But not one of them complained about today."

