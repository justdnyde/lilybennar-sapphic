 desc_F78_small_voltoj_academy:0 "This province is home to a fledgling Voltoj Academy: although its campus is little more than a few buildings now, we expect great things in the future.\n\nA Chief Vizier or Diwan posted here would grow the £icon_tax_base£Base Tax until ¤140 is reached\n\n§TDevelopment needed to expand:§!¤130"
 F78_medium_voltoj_academy_hold:0 "Medium Voltoj Academy"
 desc_F78_medium_voltoj_academy_hold:0 "This province is home to a Voltoj Academy that provides a home to Voltoj and orphans from around the circuit, where they study day and night in hopes of being recruited by the state to accomplish great things\n\nA Chief Vizier or Diwan posted here would grow the £icon_tax_base£Base Tax until ¤170 is reached.\n\n§TDevelopment needed to expand:§!¤160"
 F78_medium_voltoj_academy:0 "Medium Voltoj Academy"
 desc_F78_medium_voltoj_academy:0 "This province is home to a Voltoj Academy that provides a home to Voltoj and orphans from around the circuit, where they study day and night in hopes of being recruited by the state to accomplish great things\n\nA Chief Vizier or Diwan posted here would grow the £icon_tax_base£Base Tax until ¤150 is reached.\n\n§TDevelopment needed to expand:§!¤140"
 F78_large_voltoj_academy:0 "Large Voltoj Academy"
 desc_F78_large_voltoj_academy:0 "This province is home to a grand Voltoj Academy with a long and storied past. Its graduates are many, and staff the most important bureaucratic institutions, commercial enterprises, and public establishments of the Overclan.\n\nA Chief Vizier or Diwan posted here would grow the £icon_tax_base£Base Tax until ¤160 is reached."
