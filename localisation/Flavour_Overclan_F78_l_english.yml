 flavour_overclan.61.d:0 "A §YVoltoj Academy§! with a §YDiwan§! present and enough development can spend that develeopment on an upgrade. Upgrading to a §YMedium§! academy requires §Y30§! ¤1 development and the §YUpper Rivers Academy  Circuit§! can only support 2 §YMedium§! academies and one §YLarge§! academy, which can be upgraded to from a §YMedium§! one when the province has §Y40§! ¤1 development. Each §YVoltoj Academy§! is also well situated to administrate §Yunique§! local resources, expanding an Academy's capabilities to allow for this requires §Y50§! ¤1 development and each one will require uncovering some documents or learning some secret. \n\n Each §YVoltoj Academy§! upgrade will spend half of the ¤1 development required to coordinate it, and it will spend £icon_tax_base£Base Tax first."
