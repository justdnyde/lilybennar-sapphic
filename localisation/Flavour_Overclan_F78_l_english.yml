 overclan_emergency_election_desc:0 "In case you need to move a Diwan or Vizier's somewhere in a hurry.\n Province highlights targets their current location."
 overclan_expand_voltoj_academy_title:0 "Direct Expansion of Voltoj Academies"
 overclan_expand_voltoj_academy_desc:0 "Once we have expanded recruitment of the voltoj significantly enough, we will need larger Academies to train them as proper bureaucrats.\n[Root.OverclanAcademyGetOverviewHills][Root.OverclanAcademyGetOverviewSerpent][Root.OverclanAcademyGetOverviewUpperRiver][Root.OverclanAcademyGetOverviewLowerRiver][Root.OverclanAcademyGetOverviewSegband]\n\n[Root.OverclanAcademyUniqueGetOverview]"

 #possible Eunuch privs
 voltoj_conquer_land_gain_tt:0 "Every province we conquer will increase §YVoltoj§! land share, increasing the strength of this privilege."
 voltoj_advisors_only_tt:0 "This privilege will §Ydisable§! all other §Yadvisor cost§! privileges from other estates."
 voltoj_esperanto_academy_tt:0 "Each province with a §YMedium§! or §YLarge Voltoj Academy§! gets:"
 f78_esperanto_admin:0 "Esperanto Administration"
 voltoj_academy_privs_tt:0 "Each province with a §YVoltoj Academy§! gets:"
 f78_academy_privs:0 "Academy Privileges"
 voltoj_investment_overboss_tt:0 "The province where the §YChief Vizier to the Overboss§! is posted will generate an additional 1 £icon_tax_base£Base Tax each year, developing it will increase §YVoltoj§! land share, and it will gain:"
 f78_overboss_investing:0 "Overboss Investing"
 estate_voltoj_administer_the_conquered:0 "Administer the Conquered"
 estate_voltoj_administer_the_conquered_desc:0 "In our borderlands, the subjugated and the resentful hatch rebellious plots to reclaim their freedom. This is a natural impulse, of course, but the construction of an enduring state demands that they be crushed underfoot. Who better to do so than the Voltoj? After all, any fool can collect taxes from loyalists, but it takes great strength, endurance and cleverness to wield an iron fist effectively."
 estate_voltoj_esperanto_based_administration:0 "Voltoj Allspeak Administration"
 estate_voltoj_esperanto_based_administration_desc:0 "Linguists are not notorious for their fun loving natures, but ours began positively jumping for joy when they were given the chance to manufacture a new official administrative language. Many languages are spoken within our realm, but by incorporating their best features into one amalgamated language, we might burn away the flaws of each. Imagine the simplest script, the easiest phraseology, and the least cumbersome grammar, united into one language!"
 estate_voltoj_royal_advisors:0 "Voltoj Royal Advisors"
 estate_voltoj_royal_advisors_desc:0 "No king rules alone, and a royal decree pronounced to an empty hall is nothing but a lamentable echo. Unfortunately, the current crop of advisors is so empty-headed that the king’s decrees tend to echo in their hollow skulls anyhow. The Voltoj however do not tolerate simpletons: let us lean on them instead to turn the king’s orders into concrete reality."
 estate_voltoj_reuyeli_academy_officers:0 "Re-uyeli Academy Officers"
 estate_voltoj_reuyeli_academy_officers_desc:0 "Like any other large organisation, the military depends on its bureaucratic hierarchy. It is the job of high command to direct the troops to die, and it takes an able and judicious commander to accomplish broad goals in exchange for as few deaths as possible. The Voltoj of the Re-uyel War Academy have trained to become these commanders in a process as ruthless and unceasing as war itself, and this makes them the ideal stock from which to recruit our military staff."
 estate_voltoj_diplomats:0 "Voltoj Diplomats"
 estate_voltoj_diplomats_desc:0 "The position of a diplomat is curious: they spend their lives ferried between glittering fetes paid for by others, but their words can kill thousands. Many states see only the glamour. They send their inbred nobles to voice their intentions abroad, and then are surprised when hundreds and thousands of diplomatic missteps across decades turn into invading armies. We will not make this mistake. We will send the Voltoj."
 estate_voltoj_investment_rights:0 "Voltoj Investment Rights"
 estate_voltoj_investment_rights_desc:0 "To a certain extent, all affairs are economical in nature, and this means that only the best and most experienced servants of our state can be fully trusted with matters of stewardship and investment. Of course, ‘the best’ and ‘the Voltoj’ are one and the same."
 estate_voltoj_academy_privileges:0 "Academy Privileges"
 estate_voltoj_academy_privileges_desc:0 "Our state is growing, but the number of Voltoj available to administer it has remained constant. Without commensurate adjustments to our recruitment methods, the quality of our administration will decline: this must not be allowed to happen. We will fund more academies to produce more Voltoj, who will rule the land with a just and righteous hand."


 #possible Inventions
 artifice_invention_machine_inscribers_tt:0 "\nEvery province producing §YPaper§!:"
 F78_artifice_machine_inscribers:0 "Machine Inscribers"
 artifice_invention_order_inscribed_forges_tt:0 "\nEvery province producing §YCopper§!, §YIron§!, or §YMithril§!:"
 F78_artifice_order_inscribed_forges:0 "Order Inscribed Forges"
 F78_unlocked_artifice_invention_goblin_fire_tt:0 "Unlock Artificer Invention §TGoblin Fire§!"
 artifice_invention_goblin_fire:0 "Goblin Fire"
 artifice_invention_goblin_fire_desc:0 "Imagine a fire that cannot be quenched by water, which burns hotter and longer than any other flame found on the surface of Halann, and which can be carried in tubes and deployed on demand. You will have invented the new Goblin Fire of the Hammered Shark Company. Now, imagine how we might deploy such a fire against our enemies."
 F78_unlocked_artifice_invention_order_inscribed_forges_tt:0 "Unlock Artificer Invention §TOrder-Inscribed Forges§!"
 artifice_invention_order_inscribed_forges: "Order-Inscribed Forges"
 artifice_invention_order_inscribed_forges_desc: "All of these elements go into forgework: The bellows need to be pumped with air to keep the fire going, and the finished metal products need to be quenched in water by a tongs-wielding smith. This is exactly why our artificers have long seen the process of smithing as a prime target for improvement, and why our smiths are so grateful for their new forges which allow for control of the elements with the click of a button or two."
 F78_unlocked_artifice_invention_machine_inscribers_tt:0 "Unlock Artificer Invention §TMachine Inscribers§!"
 artifice_invention_machine_inscribers:0 "Machine Inscribers"
 artifice_invention_machine_inscribers_desc:0 "The flowing Bulwari script is notorious for its difficulty to write correctly, and the complex strings of instructions required to inscribe an object with magic are even more difficult to master than the rest of the language. When the difference between success and failure is just a few misplaced lines, and given the expenses involved, we cannot tolerate those errors inevitably occurring at even the highest levels of sentient performance. Fortunately, with the invention of the inscribing machine we no longer have to."
		
