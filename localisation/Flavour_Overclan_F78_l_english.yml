 desc_F78_cannorian_traders_mod:0 "The rational governance of the Overclan has opened up new commercial opportunities for Cannor, and traders from Beepeck, Damescrown, Anbenncost, and all the other great commercial cities of Anbennar have arrived to take advantage."
