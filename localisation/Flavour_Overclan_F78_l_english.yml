 #unique voltoj buildings
 desc_F78_grand_officer_university:0 "This province houses the Voltoj Academy of Re-Uyel, which has a special reputation for producing staff officers for the Overclan military. The academy is a maze of training grounds, athletic fields, and strategy classrooms."
 desc_F78_segbandal_hq:0 "This province is home to the headquarters of the Segbandal, which have been placed so far away from the hold of Seghdir that it takes a day’s ride by dwarven rail to arrive. This is for the best - the din of drilling troops, screamed orders, and clanging furnaces the place is immersed in at all hours would deafen all except the toughest of eardrums."
 desc_F78_marble_carving_guilds:0 "This province is home to the great Marble Guilds of Shazstundihr, who have been carving their reclaimed hold into a work of urban art for centuries. The artificery boom has brought both technological and societal changes to the guilds, and its apprentices today hail from all across the Overclan and use artificery to carve as much as their well-honed traditional skills."
 desc_F78_bal_ouord_modernization:0 "The citadel of Bal Ourd has been subjected to an immensely expensive but immensely successful dwarven modernization effort in recent years: critical infrastructure has been reinforced with mithril and the parapets have been outfitted with runic turrets."
 desc_F78_dwarven_caravanserais:0 "This province houses a great caravanserai. Just like in Azka-Sur, the caravanserai is made up of a dizzying array of different parts patched together over time so that none but the locals know where the Dwarven influence ends and the Bulwari influence begins. What everyone knows, however, is that if you want to buy something from the Serpentspine, this is the place to do it."
 desc_F78_hammer_head_co:0 "This province is home to the global headquarters of The Hammer & Head Combine, the most successful provider of naval artificery solutions in Halann. ‘Hammer & Head: We nail it every time."
 desc_F78_temples_of_eduz:0 "This province is home to the immaculately maintained Three Temples of Eduz Vacyn, which collectively comprise one of the holiest places for the Bulwari Sun Cult. In recent years, the Overclan has broadened the temples’ purpose, and it is no longer unusual to see Goblin Shamanists, Ravelians, and curious tourists walking their halls."
 desc_F78_greysheep_company:0 "This province is home to the Global Headquarters of the Gray Sheep Company, the world-famous manufacturers of Bulwar’s best clothing. ‘The Grey Sheep Company: See the world in shades of Grey."
 desc_F78_ash_office:0 "This province is home to the Ash Palace, which has been transformed by the Voltoj into the greatest bureaucratic hub of the Overclan and perhaps even Halann. It has become a common misconception that the ‘Ash’ in its name refers to the great smoke clouds that tend to hang over the palace from the burned paper of top-secret communiques."
 desc_F78_university_dwarovar:0 "This province is home to the great Guntîrhug, the world-famous institution of learning in the Dwarovar. The university contains departments of social studies, mathematics, and arts that could be found anywhere else, but where it truly shines is its study of the unique ecology and culture of the Dwarovar. Voltoj and orphans assigned to receive their tertiary education here often draw great envy from their peers."
 desc_F78_artificers_wish_study:0 "This province is home to the Academy of Aqatbar, which is dedicated to the archeological study, research, and utilization of djinn magic. The academy has recently acquired a coterie of artificers ambitious or insane enough to attempt to incorporate this magic into their technology."
 desc_F78_baazar_by_the_sea:0 "This province is home to the largest port in Bulwar, which has necessitated the largest customs operation in Bulwar. If you can think of it, the hardened port authority of Brasan has handled it, set up an area for its trade, and devised a protocol for taxing it."
 desc_F78_gold_bank:0 "This province is home to the Gold Bank of Verkal Gulan, which has established branches all throughout the Overclan. Even to be invited inside the main bank is an honor - it is said that they have never signed off on a bad loan, and this is likely due to the soul-crushing and divination-infused vetting process all prospective associates of the bank must undergo before approval."
 desc_F78_ministry_divine_judges:0 "This province is home to the Ministry of Divine Judges, which comprises not just the robed authorities who sit on the benches, but an entire labyrinthine building wholly dedicated to legal affairs. It is nearly impossible to avoid learning something of the law on a visit here, and indeed more than one hapless visitor has only stumbled out of the Ministry years later as a fully licensed lawyer of the Overclan."
 desc_F78_warding_gates:0 "This province is home to a great set of gates designed to keep the horrors of the Deepwoods exactly where they belong - away from the Serpentspine. Overclan administration of the hold has only made the gates more secure, as they have been reinforced through collaboration with Bulwari light mages who are not interested in letting fey magic seep closer to their home."
 desc_F78_elemental_draw_bridges:0 "This province is home to one of Bulwar’s famous draw bridges. Though their name recalls a common type of bridge from elsewhere in the world, the name is somewhat misleading in this case - each individual component of the bridge has been enchanted to dis- and reassemble itself whenever required to accommodate both sea or land traffic, making it more of a “floatbridge” or “flybridge” than anything."
 desc_F78_water_powered_mills:0 "This province is home to a vast network of mills dedicated to irrigation and the production of paper. While the rivers flowing through Medurubar were enough to accommodate the first few mills on their own, the rivers’ flow has long since been supplemented by an increasing number of aqueducts built up over the years. The technological wonders enabled by applied hydraulic artificery are truly marvels of construction."
