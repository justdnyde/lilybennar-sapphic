 desc_F78_old_phoenix_administration_center:0 "This province was once home to an administrative center containing a legion of bureaucrats working night and day to keep the Phoenix Empire running. The Overclan has inherited this legacy, and now their bureaucrats work within those walls."
 F78_mausoleum_to_the_fallen:0 "Mausoleum to the Fallen"
 desc_F78_mausoleum_to_the_fallen:0 "The Topaz Dwarves chose to make a home for themselves in one of the roughest parts of the Serpentspine, and many of them have died defending their home. At the request of the pretender-king of Gor Vazumbrog, the hold now has a mausoleum for all the dwarves who have laid down their lives for it."

