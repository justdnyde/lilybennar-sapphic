 flavour_overclan.1.t:0 "Naming Our State"
 flavour_overclan.1.d:0 "We have conquered most of Bahar and have secured our position enough to proclaim ourselves the legitimate rulers of the entire region. However, now we are facing the question - what shall our new state be named?"
 flavour_overclan.1.a:0 "Overclan - our name among the common tongue!"
 flavour_overclan.1.b:0 "Šaznekaru, Surface Clan in the Goblin tongue!"
 flavour_overclan.1.c:0 "Perzukreš, in honor of Perzuk, our clan's founder!"
 flavour_overclan.1.e:0 "Jenthibreš, in honor of Jenthib, our clan's founder!"
 flavour_overclan.1.f:0 "Dheebreš, in honor of Dheep, our clan's founder!"
 flavour_overclan.1.g:0 "Gukloreš, in honor of Guklo, our clan's founder!"

 mission_tree_extension_tt:0 "Keep current missions"

 # Missions
 F78_cross_the_stones_gaze_title:0 "To Cross the Stone’s Gaze"
 F78_cross_the_stones_gaze_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Thalassocrat Plenipotentiary Drattren Vehsati\n\nSUMMARY: The first phase of our naval expansion is complete. The planned settlements in Drolas have prospered to the point where direct subsidies are no longer necessary, and the sea powers of the Divenhal have taken notice of both of these new tradeports and of the power that has built them.\n\nThe Stonegaze Toll is the only obstacle left to our complete commercial domination of the Divenhal. As we have grown in strength the Busilaris have only grown cockier - more ships mean more tolls. Fortunately, the Busilaris seem to have forgotten that our construction of more ships also means we have more ships to enforce our aims, and we might be able to seize this lucrative toll for ourselves if we only give the navy its proper due.\n\nREQUISITION: A 20% increase in the iron allotment to the shipyards of the Landsharks and a 35% increase in the navy’s research & development budget."
 F78_divenhal_markets_title:0 "Divenhal Markets"
 F78_divenhal_markets_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj First Trade Officer Frizuen Durnikzag\n\nSUMMARY: Our dear friends in Cannor have come to realize that we and our navy are not going away, and as such their bilkings of our merchant convoys have decreased to acceptable levels. The merchants of Bahar have been subsumed into our economic network at the expected rate - it is refreshing to deal with counterparts who think only in coin. Yet despite this, the Overclan takeover of regional commerce routes is not yet complete. I will continue to direct the trade ships of the Overclan to where they must go. Perhaps, in due time, we might familiarize the Divenhal with some of our more armored models.\n\nREQUISITION: A 15% tariff on precious gems, smelted tin, and citrus fruit, combined with a corresponding personnel increase for the Overclan Port Authority."
 F78_descendants_and_ancestors_title:0 "Descendants and Ancestors"
 F78_descendants_and_ancestors_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Cultural Subadvisor Murka Velka\n\nSUMMARY: The dwarves have adapted to Overclan rule about as well as how the Ministry of Culture projections said they would: that is, not at all. The lower levels of Ovdal Tûngr are virtually barred to state officials and inspectors, and even the representatives of dwarven society sent to parlay with us are, on a regular basis, a contradictory mix of imperious and sullen.\n\nHowever, the dwarves are simply too valuable to the operation of the Sea Hold to relocate or exterminate, so we are going to have to learn how to get along with them somehow. On the bright side, goblin-dwarf relations can only improve from here. My negotiators have already begun talks with their community leaders on cultural, political, and economic concessions we might give to the dwarves in the hopes that the eventual benefits outweigh the momentary inconveniences. \n\nREQUISITION: Advice on which articles of negotiation would be least harmful to the realm if enacted, along with a personal visit from the Chief Vizier to feign affection for dwarven culture and such."
 F78_holds_of_marble_and_glass_title:0 "Holds of Glass and Marble"
 F78_holds_of_marble_and_glass_desc:0 "STATUS REPORT\n\nOFFICER: Scout Leader Vazra Drelk\n\nSUMMARY: The Serpentspine is in such chaos that it is easy to see why our ancestors left it. We have had to begin budgeting twice the supplies per expedition out of our base of operations to avoid the risk of the expedition simply losing themselves in the tunnels, and even those fortunate enough to make it back after setting out often do not have much more to report than noises in the dark, which we can already hear from base camp. If this place can be civilized at all, it will be with short, meticulously planned steps and long supply chains. We must begin with the ground under our feet - the holds bordering Bulwar must be reclaimed in whole, so that they might be settled with exiled dwarves and their Voltoj overseers.\n\nREQUISITION: More materials to make fortifications, more weapons for patrols, and more scouts to hold them."
 F78_caverns_plight_title:0 "The Caverns’ Plight"
 F78_caverns_plight_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Serpentspine Overseer Drolka Reddak\n\nSUMMARY: The resettling process has been difficult to say the least. Every last danger the scouts warned about has proven, if anything, understated, and on occasion entire colonies will simply vanish into the darkness. But just as the caverns hold dangers, they also hold fellow goblins in abundance. These natives look much like us, and with a pronounced literacy campaign and assimilation effort they might be made to think like us as well. I have already begun efforts to uplift them. The cave goblins responded well to first contact efforts, and our civilizing teams are almost ready to begin shaping their cave customs into a proper legal code so that we can set up a trade agreement. \n\nREQUISITION: Fifty-five crates of readers in the ‘A is for Audit’ series for young Voltoj and enough shiny objects for distribution to set up a social hierarchy."
 F78_holds_where_light_shines_title:0 "Holds Where Light Shines"
 F78_holds_where_light_shines_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Hold Governor Niari Zazen\n\nSUMMARY: Dwarovar reclamation efforts have progressed to the point that the terrors in the dark can not stand up to our trade links and troop patrols. As such we are now free to turn our attention to new terrors, and have done exactly this in our campaign to reinforce the hold of Verkal Skomdihr. \n\nOutside the gate of Verkal Skomdihr, the watchmen report whispers from the trees of the Deepwoods, which have begun to promise them things they did not know they wanted if only they would just open the gate. Our dedicated and tireless secret police have proven up to the task of watching the watchmen, but even they can falter, and the sooner we can restore the Warding Gate and thus protect the hold at large against individual failure the better. The sappers have begun work with appropriate urgency. \n\nREQUISITION: The artillery to burn down each and every tree in sight of the hold."
 F78_followers_of_the_dead_dragon_title:0 "Followers of a Dead Dragon "
 F78_followers_of_the_dead_dragon_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Underminister for Serpentspine Exploitation Marthar Fralduk\n\nSUMMARY: The scouting corps have come across a faction of kobolds calling themselves the ‘Darkscales,’ who display the same dragon monomania that characterizes the rest of their race. They worship Nimrith the Red, though all historical reports indicate the dragon was slain centuries ago.\n\nIn service of this dragon, they have amassed a truly incredible hoard. What is so incredible about this hoard is not its contents - which are mostly small trinkets and shiny objects once owned by dwarves - but its sheer volume, which speaks to logistical and storage capabilities that surpass even the Voltoj.\n\nUnfortunately, the Darkscales are aggressively insular and have thus far rebuffed all attempts at contact. I recommend we attempt to change this, as their organizational capabilities might be the most valuable thing I have discovered as Underminister.\n\nREQUISITION: A custom rush order from the finest tailors in the Overclan for five realistic and fully to-scale dragon costumes. Expense is no object."
 F78_sharks_claim_title:0 "The Shark's Claim"
 F78_sharks_claim_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Subclan Speaker Bragazak Dutozi\n\nSUMMARY: The Landshark clan's leaders are an easy lot to deal with. We have bought them off for little more than a lifetime's supply of wine, the quantity and quality of which can always conveniently increase when they prove useful. One such glimmer of potential came up recently, when one of their former admirals began criticizing the quality of both our navy and our reconstruction efforts while in his cups. Talent cannot be ignored, no matter what quarter it hails from, and in this case many of the criticisms he made have been found to have merit by our shipbuilders and bureaucrats respectively. With the aid of the Landsharks we can make improvements to both, and create a navy which shall be the fear of Bahar.”\n\nREQUISITION: Five shipments of wood - four to build the ships, and one to build the academy from which we will train their officers."
 F78_toll_of_war_title:0 "The Toll of War"
 F78_toll_of_war_desc:0 "STATUS REPORT\n\n OFFICER: Governor Gazlok Izutur\n\n SUMMARY: The inefficiencies of current Bahari tax collection practices continue to mount. Travel time is up 35% from its most recent local minimum due to the inadequate state of the region's roads, and when tax collectors reach their scheduled stops, there is often nothing to collect due to a region's devastation and obsolete census data. A regional revitalization effort would be costly in the short-term, but the macroeconomic effects of state investment have great potential to revitalize the entire region.\n\nREQUISITION: Seven construction crews, a 55% increase in region allocation from the economic development fund, and a temporary moratorium on eastward Bahari expansion."
 F78_promise_of_tolerance_title:0 "Promise of Tolerance"
 F78_promise_of_tolerance_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Underminister for Ourdian Affairs Ezrod Talbruk\n\nSUMMARY: At this point, it is no secret that the realm’s conversion to the Jadd has not gone exactly how the Office of the Grand Syncretic imagined. What was conceivable from the start, however, is that the sizable culturally Cannorian human population of Ourdia would consider our attempt at conversion to a faith from so far east as both an affront to their communities and their native faith. Frankly, it is hard to blame them - the only preachers willing to travel all the way to Ourdia from far Ebbušubtu were the zealots, and the tactics they used to brand their sunfire into the hearts of the Ourdians therefore tended to be a step or two beyond what even the Jadd might usually employ. \n\nFortunately, this problem has a simple solution - to do nothing at all. That is, strengthen ties with Cannor, let their traders worship their Regent Court in peace, and hope that this reassures the Ourdians that while the Overclan is a Jadd nation, we have not become a realm of intolerant fanatics.\n\nREQUISITION: The funds to expand the Ourdian customhouse network and the personnel to send a trade mission to Cannor."
 F78_first_cannorian_idea_title:0 "Anbennarian Playbook"
 F78_first_cannorian_idea_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Grand External Envoy Varnig sil Sheyhar\n\nSUMMARY: It is a miracle that the Empire of Anbennar has not collapsed in on itself yet. What the Anbennarians call a “Dove Throne” appears to be more of a bird cage - I have attended many of their imperial diets, and the emperor spends most of his time during each being screamed at by various princes, each of whom worships a different god. By lightly prodding during state dinners, I have discovered that the Cannorians appear to see this as entirely normal.\n\nThe weakness of Anbennar aside, the fact that their present system has endured for so many years under such circumstances surely speaks to something that we might utilize to deal with our own unruly peoples. My training at the Academy was not in administration, but I have enclosed with this report the details of their parliament so that we might keep what works and discard what does not.\n\nREQUISITION: An expansion of the Overclan embassy to the Empire of Anbennar, including a crop of the year’s finest Voltoj graduates to help make sense of their elections."
 F78_second_goblin_navy_title:0 "The Second Goblin Navy"
 F78_second_goblin_navy_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Hold Governor Borod Hargok\n\nSUMMARY: The docks of Ovdal Tûngr have been restored to a pristine state, in no small part thanks to the efforts of the dwarves of the hold, who are now fully assimilated into the Overclan governing structure. Now, since all of the naval infrastructure in the hold has been restored, it is time to expand the number of dockyards and ancillary facilities in the hold!\n\nThe dwarves inform me that even the oldest among their number cannot remember a time that such an ambitious expansion has been undertaken, and thus the project has begun with no small amount of zeal. The projections of our office indicate we will need to expand the shipbuilding capacity of the hold by 15% to meet the ambitious ship production quotas set by the Overboss, but we have begun work and are eager to rise to the challenge.\n\nREQUISITION: A 30% increase in the building crews’ ale rations and an increase in the amount of sea patrols near Ovdal Tûngr to account for a greater volume of maritime trade."
 have_strongest_navy_east_divenhal_tt:0 "Have the strongest Navy in the Eastern Divenhal Sea."
 F78_inner_hold_seat_title:0 "Inner Hold Seat"
 F78_inner_hold_seat_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Viceroy of the Serpentspine Zulnok Moltar\n\nSUMMARY: At long last, we have managed to quell the unrest among the dwarves in the Serpentspine almost entirely. Although actions speak louder than words, we have managed to get to this point with a great deal of words and not very much action. However, based on the reports I have received from the Hold Governors, I believe it is now time to take such action - with both the carrot and the stick, I am confident that the remaining unruly dwarves in the deep Serpentreach can be integrated into the wider state. Decisive pacification efforts have already begun.\n\nREQUISITION: A temporary 200% increase in the Serpentreach’s propaganda and policing budgets, in addition to a warm welcome for my forthcoming messenger to Parliament."
 F78_segbandal_title:0 "The Segbandal"
 F78_segbandal_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Undertactician of the Serpentspine Zranjik Grinzar\n\nSUMMARY: Our forces have dug in outside of the Serpentspine, but the gates of Seghdihr are as strong as one might expect for a dwarven hold. My usual maneuver would be to prepare for invasion by simply going around the gates, but that is impossible in this case - Seghdihr controls the only ingress to the Middle Dwarovar for hundreds of miles large enough to march an army through.\n\nFortunately, we have managed to enlist the assistance of the Copper Dwarves, who have a grudge to settle with the former lords of the Segbandal. Once their sappers arrive at the front lines, we will finally have the tools to blast their wretched gates to bits, invade and overthrow the ruling class of the hold of Seghdihr, and hopefully replace them with dwarves that possess a more compliant attitude.\n\nREQUISITION: An additional deployment to protect the army’s supply lines to Azka-Sur and express permission to field test some of the more advanced explosives the artificers have devised for our current situation."
 F78_surani_cities_title:0 "The Surani Cities"
 F78_surani_cities_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Advisor to the Underminister for Waterways Drevailya Nelaqar\n\nSUMMARY: The fruits of modernization have already enriched the Overclan-owned portion of the Suran, and in proper Bulwari fashion the Ministry for Waterways has been careful to maintain and enhance the natural beauty of the river through a series of beautification projects as a form of soft power aimed at the Bulwaris who live further upstream. \n\nCommunication with the Ministry of Subterfuge has revealed that our efforts thus far have been particularly successful, and about a fifth of the Surani elite has grown to favor unification with the Overclan. Once the military campaign along the upper Suran comes to a conclusion, these merchants and nobles will form the core of our collaborationists in the region. Through the treasury disbursements required to modernize the remainder of the Suran, the Ministry of Waterways will ensure these elites reap the rewards of their wise - or perhaps just canny - decisions.\n\nREQUISITION: Ten more construction teams to operate the inscribed digging machines for artificial waterway construction and three times the usual shipment of palm tree seedlings."
 F78_control_gold_tide_title:0 "Control the Gold Tide"
 F78_control_gold_tide_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj External Envoy for Middle Dwarovar Relations Asurnak Lesathi\n\nSUMMARY: The negotiations with the pretender queen of Verkal Gulan have borne fruit. Due to the unique role of the so-called ‘Gold Hold’ in facilitating dwarven commerce, the queen’s predecessors constructed vast and hidden vaults of gold beneath the hold itself - vaults which the current usurpers of the hold have not yet been able to gain access to. Our vast empire contains many different gold mines, and once our puppet queen is restored to her throne the Gold Dwarves can mint them into the currency we will need to continue our conquest of the Dwarovar. Now that this mutually beneficial agreement has been reached, all that remains is to seize the hold from its current occupiers.\n\nREQUISITION: On behalf of the queen and her retinue, I request a doubling of the square footage of the queen’s estate in Bahar and the funds for a corresponding doubling in the number of her household’s servants."
 F78_revelatory_eastern_words_title:0 "The Revelatory Eastern Words"
 F78_revelatory_eastern_words_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Grand Syncretic Arsajaz Belazar\n\nSUMMARY: The new strategies to pacify the clergy proposed by the Office of Doctrine have not proven any more successful than the last, and the Sun Cult’s leaders grow more restless by the day. Part of this is due to our rule - the acolytes inserted by the state report the priests’ talk has become even more treasonous than the diviners’ worst-case projections -, but another contributing factor is a new wave of missionaries hailing from the wastes of the Salahad.\n\nThey have proven intriguing - they preach a faith under which all must be the light - a tenet which could prove malleable -, that all must fight to spread the light - under the banner of a state dedicated to this light, of course -, and that all creatures, including goblins, can be the light, free of gatekeepers and their seditious attitudes. This is an interesting faith indeed.\n\nREQUISITION: The necessary funds to attract and provide for more of these missionaries."
 F78_rule_the_hills_title:0 "To Rule the Hills"
 F78_rule_the_hills_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Mine Master Jazha Graklar\n\nSUMMARY: The pacification campaigns worked just as the propagandists designed them, and where we were once conquerors we are now rulers. As such, it is my recommendation that we exploit the resources of the region to their fullest through a campaign of urbanization, for the more subjects we can fit into Gelkalis, the more will work and the more revenue we shall reap. Another matter of import is the reports my office is receiving from the scouts. Apparently, our most seasoned trackers took three passes to locate a glade of trees among the hills - the place is completely mundane, but there is something about it that eludes the eye. This is the perfect place for a Voltoj academy.\n\nREQUISITION: A doubling in the size of Gelkalis garrison, levelling crews to make new building space, and the five best Voltoj the Overclan can spare."
 F78_moons_mountain_title:0 "The Moon’s Mountain"
 F78_moons_mountain_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Military Attache Grutka Pravakaz\n\nSUMMARY: The marching anachronism that passed for the army of Birzartanšes has been largely dispatched with one third the amount of artillery shot that was allotted to this division, and one half of what remains is being sent with this report back to regional stockpiles. What is more interesting than the details of the battle, and what the general bids me to write to you about, is what the army found in the city of Birsartansabar.\n\nIt seems they learned something from Jaher after all - half the palace of the city is given over to some state office or another, and each is immaculately organized even by exacting Overclan standards, a surprising feat given the chaos caused by our invasion. The Birzartanšesi do not appear to actually grasp the true value of their bureaucracy. If we manage to avoid making them aware of our interest, there is much they might unknowingly teach us.\n\nREQUISITION: A stay on the executions of the Birzartanšesi and a delay in the general’s further campaigns just long enough to learn from them"
 F78_old_sun_new_sun_title:0 "The Old Sun and New Sun"
 F78_old_sun_new_sun_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj First Theologian Zalguk Balgol\n\nSUMMARY: As requested, the office of the First Theologian has begun its study of the religious genealogy of the Bulwari Sun Cult, and will prepare a conclusive report. Unfortunately, this report is not likely to clear anything up. The Bulwari priesthood has spent millennia fracturing their Sun Cult into smaller Sun Cults, and not even my office has been successful in understanding the Sun Cult’s evolution.\n\nOne might ask how the common Bulwari themselves keep track of the infighting between the cults, and the answer is that they simply do not. The faith of a regular adherent of the Bulwari Sun Cult, especially the Old Sun Cult, is a mix of cobbled together rituals and folkways which are highly particular to their region and largely agnostic of doctrine. My recommendation is that we take a page from their book.\n\nREQUISITION: Five score more scribes to transcribe the minutes of the First through Forty-Fourth Councils of Aqatbar into the documentation of the office’s History of the Sun Cult."
 F78_expanding_bureaucracy_title:0 "Expanding Bureaucracy"
 F78_expanding_bureaucracy_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj High Dean Zelenna szel-Trelkat\n\nSUMMARY: Every Voltoj recruiting cycle grows more chaotic than the last. I have already had to bar the Ministries for Livestock Development, Market Inspection, Road Maintenance & Expansion, and Population Subdual from Academy recruitment events for truly egregious advantage-seeking behavior, and the Ministry for Stone Fortifications is not far away from sharing their fate. I am even somewhat loath to blame them - the underlying issue is that there are not enough Voltoj to go around these days. \n\nThe simple solution to this problem is to expand their ranks, and I believe I have come upon a solution for doing so without diluting the quality of their training to an unacceptable degree. If you turn to page 11 of this report, you will see my financial justification and development plan.\n\nREQUISITION: The input of the Office of the Overboss on which of the twelve sites for Academy creation or expansion I have proposed best suits national goals at this time."
 F78_winged_mountains_title:0 "The Winged Mountains"
 F78_winged_mountains_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Underminister for Harpy Affairs Gortash Sedlum\n\nSUMMARY: The materials on statecraft and administration we were taught at the Academy neglected to mention what to do if one’s subjects can fly. My tax collectors and enforcers cover every inch of the ground, but the roosts of the harpies are far up in the mountains, and the only times they come down are to kill my officials. \n\nA good bureaucrat does not obfuscate, so I will be frank: the only success I have had in my tenure is inserting an envoy into the court of one of their Queendoms. The demands of the harpies to stop their low-level terror campaign are great. They want full representation and the ear of the Overboss, along with the refitting of regional public infrastructure for harpy usage and a significant portion of treasury investment earmarked specifically for the development of harpy lands. Given the circumstances, I believe we are getting off lightly and we should agree to their demands.\n\nREQUISITION: Enough crossbows to issue one to every civil servant."
 F78_gunpowder_army_title:0 "Gunpowder Army"
 F78_gunpowder_army_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Staff Officer Skalazim Anaharzuk\n\nSUMMARY: The test battalion has begun drilling with the new long-range weapons that High Command has sent us. The unit has suffered its fair share of burns and misfires, but overall they seem to be adapting quickly. We have begun encouraging the troops to engage in marksmanship contests and other rifling tests of skill in their free time as a recreational activity, and this has had the desired effect of increasing the rifling ability of our troops. \n\nThe officers of this battalion now have experience in drilling with and formulating tactics for the new weapons. If and when gunpowder weapons are to be deployed across the military as a whole, we would be gratified to assist in the creation of a training and implementation manual to smooth the transition.\n\nREQUISITION: The introduction of artificer specialists to the unit to support the maintenance and repair of the rifles."
 F78_corner_divenhal_trade_title:0 "Corner the Divenhal Trade"
 F78_corner_divenhal_trade_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj High Harbormaster Parzei Strognar\n\nSUMMARY: It is the job of any good trader to know the rumors that blow on the sea breezes, and the news out of Brasan nowadays is tinged with fear. Their mercantile class appears to have gotten it into their heads that the Goblin Navy is coming for their precious port, and their reasoning is largely sound - Brasan is the gate to Bulwar, and our conquests in the Harpy Hills and our drastic naval buildup both create the impression that we intend to expand both our military and mercantile conquests into Bulwar. \n\nAs great as the trade network of Brasan is, it is but one port, and they have decisively failed to keep pace with our innovations in naval technology and shipbuilding, making them a ripe target for our expansion efforts. I have directed the merchant marine to remain in a state of utmost vigilance, so that we can make the fears of the Brasanni come true.\n\nREQUISITION: The resources to bribe five more flotillas of blockade-runners away from the Port of Brasan."
 F78_control_the_heart_title:0 "Control the Heart"
 F78_control_the_heart_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Underminister for Bulwari Affairs Jangaz Drolkar\n\nSUMMARY: The geography of Bulwar has shaped its history to such an extent that it would make an excellent case study. The farther one goes from the Suran River, the more inhospitable the land gets, and this has had the foreseeable and natural effect of concentrating virtually all Bulwari settlement around one river or another, as well as creating a cultural preoccupation with irrigation and gardening. Another consequence - which is more relevant for our purposes - was the creation of a singular center point for the entire region. The region of Bulwar can be governed from the city of Bulwar with full confidence that the revenue of the region shall flow down the Suran to us, and whatever does leave the city will eventually make its way to Brasan. This makes the subjugation and full administrative integration of the city of Bulwar a task of paramount importance.\n\nREQUISITION: A full fleet of taxation and transportation river barges to be placed under my and any future Underminister’s absolute command."
 F78_shores_of_lake_naza_title:0 "Shores of Lake Naza"
 F78_shores_of_lake_naza_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Academy Lecturer in Law and Legal Affairs Mulka Groznaz\n\nSUMMARY: The archives of the Order of Judges are even greater than the rumors insinuated. I have been researching in the stacks for the last three months, or what I thought were the stacks - I was informed by an attendant today that the chamber I was in merely contained the writings of the Order on Bulwari affairs, and that the rest of the library contained more writings on legal theory and judicial systems from abroad. I have not read such insightful legal commentary since my days as a student at the Academy, and their body of work on court systematization and principles of legal deference puts the work of our own academics, including myself, to shame.\n\nMy formal recommendation is that these legal minds must be integrated into our own system as quickly as possible, whatever the cost.\n\nREQUISITION: An eighteen-month extension to my present sabbatical."
 F78_declawing_xhazob_title:0 "Declawing the Xhazob"
 F78_declawing_xhazob_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj First Pacifier Zablys Galu\n\nSUMMARY: It is often said by the Bulwari that the greatest fortunes accrue to those who least deserve them. Although the first thing we are taught at the Academy is to discard such superstitions, it is undeniable that the gnolls of the Šad Sur Mountains have amassed a great fortune in gold, which thus far they have mostly used for the construction of krah pyres to incinerate unlucky and inadequately guarded travellers along the mountain passes.\n\nTheir Xhazobkult poses a challenge to the Ministry of Population Subdual unlike any we have faced before - where most rebels can be negotiated with for as long as it takes to distract them from our advancing troops, all the Kult cares about is that a steady stream of blood is fed to their wretched gods. If we cannot pacify the gnolls, we must pacify the Kult - with enough development of the region, we might be able to tear the support structure for the Xhazobkult out from under them.\n\nREQUISITION: A civilizing team of our bravest scouts to introduce the gnolls to the concept of an ‘economy’, and a backup team in case the first team gets eaten."
 F78_western_faith_title:0 "The Western Faith"
 F78_western_faith_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Grand Syncretic Drenkazi Zarvilka\n\nSUMMARY: The office’s joint taskforce on Voltoj Academy Doctrine has reported some new and interesting developments in the religious composition of the most influential Voltoj dynasties of Gelkalis, Re-Uyel, and even as far as Brasan and Gem Isle. The artificers invited from abroad to lecture at the academies have been spreading a faith they call ‘Ravelianism’, which considers artificery to be inspired by the divine, to their students over the course of the last decades. It is only now that the Ravelians are reaching a critical mass, but this heresy might not necessarily be a bad thing. The Ravelian network is already vast, and extending Overclan protection to those Ravelians other realms might be quick to expel as heretics could advance the pace of scientific research in the Overclan at large. This of course might cause problems with the Jadd, but their zealots are far away and cavalry does not stand up well to sparkdrive rifles.\n\nREQUISITION: Immediate advice on the Ravelian situation, with the resources to either quell dissent or begin proselytization as appropriate."
 F78_first_of_many_title:0 "The First of Many"
 F78_first_of_many_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj External Envoy for Middle Dwarovar Relations Asurnak Lesathi\n\nSUMMARY: The pretender king of Hehodovar has not stopped working on proposals to restore himself and his Pyrite Dwarves to their ancestral home since he arrived in our diplomatic quarter. Some of these ‘solutions’, listed purely for the entertainment of the Office of the Overboss, include a battery of cannons constructed from and designed to fire Rothic cheese, a division of mechanized kobolds intended to stir up labor agitation for the current occupiers of Hehodovar, and a plan to plant enough explosives on top of the Serpentspine Mountains to ‘make the Dwarovar blow up’.\n\nIf these dwarves are not restored to Hehodovar soon, they will break something in the capital of the Overclan instead of in their hold, where they will have much more space to break things. Let us help them return to their home, far away from us.\n\nREQUISITION: The king of Hehodovar requests one hundred and eighty five thousand containers of lime green paint. Respond to this report with a suitably vague complaint of ‘logistical difficulties’ in two months."
 F78_represent_new_segband_title:0 "Represent the New Segbandal"
 F78_represent_new_segband_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Internal Envoy for Middle Dwarovar Relations Asurnak Lesathi\n\nSUMMARY: After a long and difficult period of negotiations and winning the trust of the exiled dwarves, we have installed the former members of the Segbandal in their holds as formal client states of the Overclan. In exchange for most of their administrative autonomy, we have promised the Segbandal significant trade concessions and disproportionate Parliament representation.\n\nPerhaps this is for the best. The forecasters project that prosperous inner holds will lead to a thriving Middle Dwarovar trade, which will allow us to extract the wealth of the Serpentspine without actually having to step foot inside it. Under this approach, I believe it is now reasonable to consider the territorial goals of the Overclan laid out in the most recent Dwarovar Expansion Plan accomplished.\n\nREQUISITION: The funds to establish an official forum for the Middle Dwarovar to disseminate techniques of administration and allow us to heed and address subject concerns."
 F78_new_legacy_title:0 "A New Legacy"
 F78_new_legacy_desc:0 "REPORT TO THE OVERBOSS\n\nOFFICER: Chief Vizier of the Overboss Arkeris Barzilvehs\n\nSUMMARY:\n\nEconomic Development: There has been a boom in the grain crop of the region of Irrliam. The Viceroy of Bulwar is pleased with the windfall and should be able to manage the appropriate grain transports without our intervention.\n\nTechnological Development: The artificers of Aqatbar are working on a way of harnessing energy from the wind. Progress is slow, but I will keep you appraised of developments.\n\nInternal Dissent: For now, all is quiet except for some dwarves we have our eyes on in former Arg-Ôrdstun. They have no way of knowing their movement has been infiltrated by our dwarven spies, who will be ready to act should the need arise.\n\nInternational Affairs: The Emperor of Anbennar has invited you to a gathering of leaders to discuss Divenhal trade. The Borders have been pressing him for friendly relations with us in hopes of gaining access to our metal markets, and their motives appear transparent in their honest avarice. I will put the appropriate preparatory meetings and travel arrangements on your calendar.\n\nREQUISITION: For once, nothing at all."
 F78_last_extension_title:0 "The Last Extension"
 F78_last_extension_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Underminister for Road Maintenance & Expansion Mestika Nazhal\n\nSUMMARY: The full reconstruction of the Bulwari Golden Highway is completed. It is a great achievement, but a problem has become apparent during this endeavour - our infrastructure needs are different from those of the Phoenix Empire. Jaher and his successors never placed much emphasis on Bahar and as such never extended the Golden Highway into its mountains, but the mountains of Bahar and the hold of Ovdal Tûngr are the imperial core of the Overclan.\n\nThe Golden Highway has stood the test of time, so why should the works of the Overclan not achieve the same status? An extension to the Golden Highway in the style of the Phoenix Empire would aid in the transit of people and goods across Bahar, increase the prestige of the Overclan abroad, and make it clear to our subjects in Bulwar that their current state of prosperity is thanks to our wisdom and generosity.\n\nREQUISITION: The funds to retain the top 20% of work crews involved in the Bulwari reconstruction as measured by construction performance metrics and task them with the planned extension."
 F78_sheeps_hills_title:0 "The Sheep's Hills"
 F78_sheeps_hills_desc:0 "STATUS REPORT\n\nOFFICER: Lead Scout Firtav Sarvol\n\nSUMMARY: It is a joyous day, as it always is and always shall be when our enemies are at each others' throats. The Greysheep have been kept busy in recent years by fighting with a new and interesting faction of humans under the leadership of one \"Dartaxes,\" which has broken free from their Sun Elven overlords and now seek to form a state of their own. Our infiltrators in the Greysheep tell us that the war hangs on a razor's edge, and either the humans or the goblins could well emerge victorious and be the ones to unify eastern Bahar. Yet with an able hand and some luck, it could be us instead.\n\nREQUISITION: Five strongboxes' worth of bribe money, along with the required materials to build a grand new barracks."
 F78_uniform_army_title:0 "Uniformization of the Army"
 F78_uniform_army_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Underminister for Gelkar Affairs Bripset Stadlas\n\nSUMMARY: The investment funds dispatched to us by the Office of the Overboss are beginning to result in marked improvements in the development of Gelkalis and subsequently in an increased state revenue. The Gelkars have used some of the funds to construct a new type of five-man loom, and these have become a more and more common sight in the textile shops of Gelkalis as they ramp up production for both civilian and state use.\n\nIn this vein, I have entrusted the military contract for the new line of army uniforms the Overboss’ office has requested to the firm of one of the most respected weavers in the region. The scope of the job is such that they may have to hire subcontractors, but my office will keep an eye on them to make sure they diligently maintain quality across all parts of the project.\n\nREQUISITION: Formal authorization to commandeer enough civilian caravans to transport the finished uniforms to the supply depots in the capital."
 F78_elven_city_title:0 "The Elven City"
 F78_elven_city_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Special Advisor for Reform & Efficiency Kurirok Felzar\n\nSUMMARY: Now that the Sun Elves have been knocked from their perches in Western Bulwar, there is a real possibility for us to integrate their experience developed over centuries into our administration. As demonstrated by their governance over the city of Sareyand, one of the results of this experience is administrative competence. It is tempting to think that our administration is already unparalleled and that there is therefore no need for outside input, but a complacent administration is a dying administration, and the administrative secrets of the Jexisian Empire will only become more needed as the Overclan expands.\n\nREQUISITION: Full access for my office to the reports of Overclan agents embedded in Sareyand high society and the requisite clearances."
 F78_lawasarri_wisdom_title:0 "Lawaššari Wisdom"
 F78_lawasarri_wisdom_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Internal Envoy Arfei Grizkar\n\nSUMMARY: I have made headway in my dealings with the Lawaššari. Although they have not forgotten the past, they seem ready to move forward under the leadership of the Overclan; provided we treat them fairly, and perhaps a bit more than fair as we attempt to make headway with their order. One area in particular that has been the subject of productive talks is an exchange of knowledge - the Lawaššari have heard tales of our talent in artificery, and wish dearly to assimilate this knowledge into their order. In return, I have negotiated a deeply significant and useful concession: they have agreed to train some of our number in their inscription magics.\n\nREQUISITION: A hundred or so mages who are knowledgeable, dedicated to their craft, and humble."
 F78_students_to_teachers_title:0 "From Students to Teachers"
 F78_students_to_teachers_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Internal Envoy Arfei Grizkar\n\nSUMMARY: The exchange program has succeeded beyond our wildest dreams. Not only did the ‘Hundred Honored’, as the Lawašari call them in their missives, sent to learn of the Lawašari inscription magics bring back secrets that have accelerated the work of our state artificers by years, they have positioned themselves as bridges between the Lawaššari and our state. A goblin master of the Lawaššsari was once unthinkable, but multiple of the Honored now serve as teachers of inscription magic in the Lawašari clans. One of these teachers in particular is revered by the Lawašari: he is said to “bring forth the secrets of the world from his pen.” This is somewhat too poetic for my taste, but the man’s talent is undeniable from secondary reports: perhaps he might be convinced to serve in our armies.\n\nREQUISITION: A quantity of gold equivalent to fifteen years of a Lawašari master’s salary."
 F78_goblins_academy_title:0 "The Goblins’ Academy"
 F78_goblins_academy_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Subadvisor for Lawaššari Friendship Snorvek Bieluqti\n\nSUMMARY: Our partnership with the Lawaššari grows less fruitful. This is not an issue of lacking goodwill on the part of either party or the aptitude of the students sent in either direction - the problem is that we have succeeded so thoroughly that our work is mostly done. We are now just as advanced in the magic of inscription as the vaunted Lawaššari.\n\nAs such, it is my belief that it is time to open up a new frontier in our relationship with the Lawaššari. If we were to teach them more of what we know of artificery, their different ways of looking at the magical arts might speed up our technological advances even further. If they have not yet proven they can be trusted, who can we trust?\n\nREQUISITION: A contingent of our best military artificers and permission to accept a favor from the International Gommo."
 F78_investing_in_order_magic_title:0 "Investing in Order Magic"
 F78_investing_in_order_magic_desc:0 "STATUS REPORT\n\nOFFICER: Magus Supreme Absul szel-Pasah\n\nSUMMARY: As the Overboss surely knows, there are as many mage clans in Bulwar as there are grains of sand in its deserts. Although efforts to improve the Overclan’s capabilities in Inscription and Order Magic have focused on the Lawaššari, the magi of Annailsub and Ulmiš Idiqlat have capabilities that are just as grand, and now that we have expanded into their territories I am hopeful that my magi can forge peaceful relationships with them just as we have with the Lawaššari. The clans of Annailsub are especially renowned for their control over water - perhaps we could ask them for insights in the restoration efforts of the flooded parts of Ovdal Tûngr.\n\nREQUISITION: The funds for a grand feast for the magi of the Overclan, at which we might discuss our differences and our commonalities."
 F78_aqatbar_path_title:0 "The Aqatbar Path"
 F78_aqatbar_path_desc:0 "STATUS REPORT\n\nOFFICER: Voltoj Underminister for Road Maintenance & Expansion Mestika Nazhal\n\nSUMMARY: The Golden Highway is more than just a road - it is a symbol of the prestige of the Phoenix Empire and the domination of Bulwar. Jaher’s legions used this road to conquer an entire continent, as a road as grand as the Golden Highway was the only way to move the troops required to march from the heartlands of Bulwar to far Haless.\n\nIf anyone is suited to the administrative task of the reconstruction of this vast road, it is the Overclan, and within the Overclan it is the Ministry for Road Maintenance & Expansion. With the appropriate funds and manpower, we can reforge the Golden Highway as both a powerful tool of administration and as a message to the rest of the world that a new power has risen in Bulwar.\n\nREQUISITION: Special authorization for the Ministry for Road Maintenance & Expansion to commandeer any needed resources from the other ministries in the region and temporary authority over Bulwar logistics as a whole."

 # Events
 flavour_overclan.2.t:0 "The Orphaned Few"
 flavour_overclan.2.d:0 "REPORT: Due to recent conflicts, the number of orphaned children have increased within our borders. Most notable among this population are Voltoj orphans - those with mixed goblin-human parentage. Certain officials have suggested wide-scale recruitment of these orphans into the government apparatus, citing historical precedent and the potential advantages of bureaucrats with no loyalties to anything or anyone beyond the state itself. The Voltoj are known to be sterile, which would prevent them from establishing dynastic lines within the administration, something that is clearly detrimental to the interests of the state. Attached you will find several proposals for enacting this recruitment system and maintaining its function, as well as..."
 flavour_overclan.2.a:0 "Potentially useful assets"
 flavour_overclan.3.t:0 "A Continued Exodus"
 flavour_overclan.3.d:0 "REPORT: Since assuming control over all notable entrances to the Serpentsreach, border guards have noticed a marked increase in goblin refugees attempting to cross into our borders. Reports as to conditions within the Serpentsreach itself are scattered, but paint a picture of anarchic disorganization among the goblin clans residing there, which, combined with significant pressure from orc and dwarf forces, aptly explains the exodus.\n\nWhile this dismal state of our kin which remain in the Serpentsreach is not encouraging, there is a potential benefit to the realm in this development. Goblin refugees often arrive impoverished and aimless, leaving them with few immediate prospects for survival. Offering these refugees monetary compensation in exchange for military service would therefore provide a mutual benefit, as this way our armed forces would receive a much needed influx in new recruits, whilst the refugees would gain the needed resources to establish themselves and become productive members of society."
 flavour_overclan.3.a:0 "Authorize recruitment drive among refugee populations."
 flavour_overclan.4.t:0 "First Goblin Students"
 flavour_overclan.4.d:0 "REPORT: A handful of goblins, who have been dwelling in Bulwar for some time now, have taken an interest in an unfamiliar form of local magic, known as inscription. They are convinced that such magic could have potential applications for artificery, and seek to further understand the craft of inscription as a result. Our officials have identified that the Lawaššari magi clans of Bulwar are particularly adept at this form of magic, and may be amenable to teaching it to certain goblins.\n\nAfter careful vetting, we have selected 138 suitable candidates, and given them our support in presenting a petition to the Lawaššari. In exchange for granting these goblins tutelage in the practice of inscription, we have also made some allusions to the Lawaššari being granted some ambiguous favor by the state. Whether this promise is ultimately delivered on is immaterial - especially as we anticipate close work with goblins will engender a sense of commonality between our kind and their clans which can be leveraged to the state's advantage"
 flavour_overclan.4.a:0 "Forward future reports on these goblin students until further notice."
 lawasarri_wisdom_insight_tt:0 "\n§GEvent Insight§!\nThis will eventually unlock both the mage and artificer estates."
 flavour_overclan.5.t:0 "Lawaššari Goblins"
 flavour_overclan.5.d:0 "REPORT: Previous attempts to contact and work with the Lawaššari magi clans have proven more beneficial than initially anticipated. Our goblin applicants were accepted by the Lawaššari, and have since integrated themselves well into these clans, with some even rising to become teachers in their own right. This acceptance and integration by the Lawaššari is estimated to be a significant forward step in our efforts to ensure goblins are accepted and integrated into wider Bulwari society. This report recommends such efforts be emulated and continued in other areas with the aim of further positive effect to the state and its people."
 flavour_overclan.5.a:0 "Acknowledged"
 flavour_overclan.6.t:0 "Appraisal of Cannorian Ideas"
 flavour_overclan.6.d:0 "As of this writing, this commission has undertaken a rigorous study of the political entity known as the Empire of Anbennar to the best of its ability, and concludes that aspects of its structure may be beneficial to emulate for the operation of the Overclan. In summary:\n\n1. Anbennar and the Overclan are similar in that they both contain highly diverse populations, often with competing or divergent interests.\n2. With some unfortunate exceptions, Anbennar has largely been able to manage these differences with a decentralized system representing constituent groups, particularly based on racial groups.\n3. Application of the fundamentals of this system, adapted to the Overclan's conditions, may prove beneficial for the state's stability.\n4. While decentralization to the degree of Anbennar is neither recommended nor considered desirable, systems such as the representation of specific constituent groups of races might prove beneficial.\n5. Adaptation of this so-called "elector" system into a national parliament is recommended as a sound policy for the state to pursue for its own benefit."
 flavour_overclan.6.a:0 " Interesting thoughts..."
 flavour_overclan.7.t:0 "Bahari Peace"
 flavour_overclan.7.d:0 "REPORT: Conditions within controlled territory of Bahar and the Harpy Hills have proven much more stable and peaceful in recent years. While this has been advantageous in several respects, it should also be noted that this development has had some unfortunate consequences. While initially Voltoj bureaucrats were recruited from the ranks of orphans, which were in no short supply during times of chaos, continued stability has deprived the orphanages of new wards, making the traditional recruitment approach less effective.\n\nIt is recommended that the bureaucracy be adapted to allow for families to apply for their Voltoj children to join the academies, and that sufficient rewards be given to incentivize this decision. The attached documents discuss various proposals toward this end."
 flavour_overclan.7.a:0 "Leave it on my desk for now."
 flavour_overclan.8.t:0 "A Dwarven Claim"
 flavour_overclan.8.d:0 "To the venerable Overboss and parliament of the Overclan,\n\nAs you are no doubt aware, we dwarves have called the Serpentspine home since time immemorial - though sadly not all of us are able to live within our ancestral holds. One such hold is Shazstundihr, the Marble Gate, which lies not too far from your territories. Many of the dwarves currently under your rule can trace their lineage to this hold, and few would deny that it is our rightful claim to dwell within this hold. We believe that you would agree with this, as your state has thus far been receptive to the interests of the Copper Dwarves.\n\nAs such, we formally request that you act in support of our rightful claim over Shazstundihr, and do what is within your power to not only reclaim the hold from any illegitimate squatters, but to then entrust its operation to its rightful Marble Dwarf inhabitants. We of course remain your loyal and devoted subjects, and shall remain so upon the completion of this most righteous task. Additionally, our gratitude for your aid shall be considerable.\n\nWe believe you know what is the correct decision, and eagerly await your response."
 flavour_overclan.8.a:0 "An interesting petition. We should consider it."
 overclan_dwarven_claim_tt:0 "All roads and Holds in the §YSerpentreach§! will be converted to §YMarble Dwarf§! culture and §YAncestor Worship§! religion."
 flavour_overclan.18.t:0 "Bulwari Dwarf Recruitment"
 flavour_overclan.18.d:0 "ATTENTION: Titanium, Pyrite, Citrine, Gold, and Topaz dwarves!\n\nBy decree of our parliament and the Overboss, if you are able to trace your lineage to the holds of the Segbandal, you are entitled to participate in a state-sponsored reclamation program. All those who are accepted will be given state backing to resettle and rebuild their ancestral homes, and will be entitled to the protection and security afforded by the state while doing so.\n\nThis measure is fully supported by the formerly exiled Kings of these holds, who eagerly await the return of their kinsdwarves.\n\nDo your part! Join your kin, obey your King, and serve your state! Reclaim what is rightfully yours!\n\nFor more information on how to apply, please speak with your local Voltoj official."
 flavour_overclan.18.a:0 " Survival not guaranteed."
 F78_bulwari_dwarf_recruitment:0 "Bulwari Dwarf Recruitment"
 flavour_overclan.9.t:0 "Shepherd’s Ambition"
 flavour_overclan.9.d:0 "REPORT: A local shepherd family of the Graysheep clan has earned notoriety for selling clothes of high quality. While their exact methods are currently unknown to us, it is clear that their skills with turning wool into textiles is beyond comparison in our territory. This family business has also earned a reputation for servicing clients of all races, and even offering garments fitted to varying physiologies. It is believed that, with government assistance, these shepherds could greatly expand their business, stimulating the economy and providing our state with a source of superior textiles."
 flavour_overclan.9.a:0 "Authorize investment."
 flavour_overclan.10.t:0 "Hammered Shark Co."
 flavour_overclan.10.d:0 "As you may know, our company began with Zerynar and Magnus Hammerbeard. Though from two different walks of life, and indeed two different races, Zerynar and Magnus had met in Re-Uyel due to a confrontation in a bar both had frequented. Though the two were on opposite sides of that dispute, each saw something in the other, and after Zerynar offered to buy Magnus a drink in the aftermath of the altercation, the two became fast friends.\n\nMagnus already had made forays into the shipbuilding business using classic Copper Dwarf construction methods, while Zerynar had dabbled in goblin-style artificery, but it was only when the two combined their talents that they saw widespread success. This remarkable partnership has seen reliable Dwarven engineering combine with Goblin innovation to produce truly remarkable developments in shipbuilding.\n\nThe Hammered Shark Company has enjoyed many clients in its years of operation, and it now wishes to extend that partnership to the Overclan itself. Aside from offering compelling deals on our various products and services, we are also able to provide a never before seen invention which should prove to have a marvelous military utility. It is presently unavailable to the general public, and we offer it exclusively for use of the Overclan military."
 flavour_overclan.10.a:0 "Just sign right here..."
 F78_hammered_shark_naval_ideas:0 "Hammered Shark Naval Ideas"
 flavour_overclan.11.t:0 "Adelina Bulwarm"
 flavour_overclan.11.d:0 "REPORT: Upon review of the national military and its armaments, I have noted a critical deficiency. Gunpowder made available for military use, while plentiful, is of low quality compared to what is available elsewhere, especially in Cannor. As my concerns have not been taken seriously by the general staff, I have taken the liberty of procuring the infrastructure needed to produce and transport higher quality gunpowder for military use. Aside from these already made initial investments, this shall come at no greater expense to the state, and shall see the combat potential of our cannons increase markedly. It is advised that this superior gunpowder be used whenever possible, especially for the operation of artillery and elite units. Inferior gunpowder, if economical to keep, should be reserved for local forces and those not expected to engage serious adversaries."
 flavour_overclan.11.a:0 "She is opinionated, but she is also correct."
 F78_cannorian_styled_bombardment:0 "Cannorian Styled Bombardment"
 flavour_overclan.12.t:0 "Integration of the Order of Judges"
 flavour_overclan.12.d:0 "REPORT: It appears that the Order of Judges have historically served as instruments of legal consistency and law enforcement within Bulwar. The organization has continued serving this purpose to this day, but has struggled with consistency ever since Sun Elf authority over Bulwar fractured. Nevertheless, their role in Bulwari society is well respected, and is one that could be useful to the state. While the Order has previously served largely to uphold religious laws, their general mode of operation would easily suit the enforcement of secular laws as well.\n\nSteps have already been taken to establish the Ministry of Judges in Azkabar, the traditional headquarters of the Order. Members of the Order shall be retrained and devoted to upholding the laws of the state, rather than simple theological dictates. With sufficient work, it is believed new generations of Judges can easily be trained and dispatched to wherever they might be needed within our state."
 flavour_overclan.12.a:0 "Authorize the project."
 flavour_overclan.13.t:0 "Elven Style Officers"
 flavour_overclan.13.d:0 "REPORT: Our continued military expansions have seen an increase in Voltoj military officers - an expected and mostly unremarkable development, if not for one note. With the conquest of Sareyand, many of these officers have begun to take an interest in elven military structure and tactics. These officers have cited historical military successes by the elves across Cannor, Bulwar, and even further afield as adequate reason to study the methods of our defeated adversaries. Some have even initiated a program to acquire and convert facilities such as the "Ash Palace" into ones suitable for the state's purposes. Though some members of the general staff have expressed apprehension toward this initiative, their argumentation has proven weak, and their opinion has ultimately become a minority position."
 flavour_overclan.13.a:0 "The state before foolish pride."
 flavour_overclan.14.t:0 "Gnollish Evildoers"
 flavour_overclan.14.d:0 "REPORT: Our recent acquisition of gnollish subjects has created an unexpected and pressing issue in conjunction with our general policies of religious tolerance. While such a policy is perfectly rational when dealing with such belief systems as the Cannorian pantheon and Dwarven ancestor veneration, the so-called Xhazobkult practiced by many gnolls challenges this policy in a completely new way.\n\nThese gnolls worship and entreat boons from malign entities conventionally considered to be demons - which often demand exorbitant living sacrifices in order to grant their favor. Those who acquire such boons rarely cease applying them to death and destruction, either, rendering practitioners of the Xhazobkult particularly dangerous to social stability. While a policy of religious conversion would be the most straightforward approach to dealing with this issue, such a path would undoubtedly create new issues with other subjects who have thus far been pacified by our tolerant religious policies. Nevertheless, the Xhazobkult must be dealt with by one means or another."
 flavour_overclan.14.a:0 "Set up an exploratory committee on the subject immediately."
 flavour_overclan.15.t:0 "Seghdihr Closes Its Doors"
 flavour_overclan.15.d:0 "REPORT: Analysts previously predicted that the conquest of Azka-Sur, while temporarily disruptive to regional trade, would ultimately allow for direct mercantile access to the Middle Dwarovar via Seghdihr. Any animosity which might have arisen from our military campaigns, it was assumed, would be offset by an even-handed treatment of the conquered Azka-Suran people. It was also assumed that simple economic self-interest would smooth over any wounds created by this campaign.\n\nSeghdihr has proven these predictions to be inaccurate.\n\nThough initial diplomatic overtures gained some traction, all delegations were suddenly and abruptly expelled, with the gates to Seghdihr shut after they had left. Though the exact cause of this turnaround is unknown, based on commentary made by Citrine guards to our delegates, it is believed that the fact of the Overboss being a goblin was a major contributing factor to this sudden animosity. Whatever the explanation, the gates of Seghdihr have yet to reopen, and all attempts at contact have been ignored."
 flavour_overclan.15.a:0 "They hurt themselves as well as us."
 flavour_overclan.16.t:0 "A Raveled God"
 flavour_overclan.16.d:0 "REPORT: Contact with Cannor has seen the spread of a new religious faith called Ravelianism in our society. Its fundamental theological principles, while not relevant to this report, have also proven compatible with our society. Notably, numerous Voltoj have expressed a keen interest in this new belief system, adopting it either wholesale or in part on a personal level. Several proposals have even been made for the state to adopt Ravelianism as its official religion - though this would naturally cause discontent among those satisfied with the religious status quo.\n\nIt is estimated that both a conversion and the maintenance of the status quo might trigger some temporary unrest, but would not cause any irrevocable upset in our society. In any case, it would be unwise to act against the Ravelians, as they have done nothing to upset the social fabric otherwise, and tolerating them may in fact bring certain benefits, given their zeal for inquiry."
 raveled_god_converts_drolas_tt:0 "Every province on the Drolas, and 4 random §YExodus Goblin§! provinces will convert to §YRavelianism§!."
 flavour_overclan.16.a:0 "Let us adopt Ravelianism officially."
 flavour_overclan.16.b:0 "Do not convert, but allow them to practice freely."
 flavour_overclan.17.t:0 "The Segbandal's Demands"
 flavour_overclan.17.d:0 "REPORT: In spite of our recent conquest of the Middle Dwarovar, the Citrine dwarves have remained intransigent in their refusal to deal with us. While progress with Seghdihr has been slow, we have had more promising results with other dwarven holds which used to be part of the defunct Segbandal - particularly the exiled monarchs of said holds, who have thus far been identified to be living among the dwarves of Seghdihr and Verkal Gulan. While they will likely request concessions, they have proven far more willing to deal with our officials than the Citrine dwarves, and could provide considerable clout in our efforts to secure working relations with the holds of the Middle Dwarovar. Their expatriate communities seem to hold them in high esteem, and they have indicated a willingness to submit to our authority in exchange for their desires being met."
 flavour_overclan.17.a:0 "Explore this further."
 flavour_overclan.19.t:0 "First Graduating Class"
 flavour_overclan.19.d:0 "REPORT: Preliminary overviews of newly trained officials from orphan backgrounds, particularly the Voltoj, have proven very promising. While many pureblooded goblin officials have had trouble securing unqualified cooperation with our human subjects, Voltoj officials seem to receive such cooperation more readily. The reason for this is presently unknown, though probable explanations include the half-human heritage of the Voltoj, and their tendency to be more in-tune with the local situation when compared to our goblin bureaucrats.\n\nWhatever the case, it is undeniable that the Voltoj are a potentially useful resource, and it would benefit the state to utilize that resource more readily. Attached to this report are documents relating to several Voltoj officials who have been vetted for particular utility to the Overboss personally. Confirmation of the Overboss' choice should be returned promptly to this office as soon as possible so that the selected official may be promptly promoted and dispatched to their new posting."
 flavour_overclan.19.a:0 "Let's have a look."
 voltoj_dynasties_assigns_pashas_tt:0 "We can now arrange Secretariats to integrate states in the Local Organization tab."
 flavour_overclan.20.t:0 "Consequences"
 flavour_overclan.20.d:0 "REPORT: Recent surveys by various officials have determined that acceptance of our rule by Bulwari humans has been less than expected or desired. Despite the length of time ruled over by our state, as well as continued expressions of tolerance of the Sun Cult, many Bulwari humans continue to hold their suspicions against us, resentfully seeing us as foreign conquerors rather than legitimate rulers. Our tolerance, rather than being seen as a kindness or concession, has instead been viewed as the ignorance of backwards savages.\n\nFortunately, the state's recent adoption of the Jaddist sect of the Sun Cult has gone some way toward addressing these issues. While some zealots decry this interpretation of Sun Cult theology as heretical, most Bulwari humans accept it as a valid manifestation of their faith, and have responded positively to its promotion by us.\n\nThis has come with a trade-off, however. Those who do not follow the Bulwari Sun Cults, such as followers of the Cannorian pantheon, harpy adherents of the Hunt, and the dwarves of Ovdal Tûngr, have been agitated by our clear preference for the Jadd over their own faiths. While it had been assumed that the Jadd's racial tolerance would have ameliorated such religious tensions, this has proven to not entirely be the case. Those who follow the so-called Old Sun Cults, too, have largely rejected our religious authority on the grounds that the Jadd's recognition of Jaher as Surael Reborn is unfounded at best, or heretical at worst.\n\nA long-term solution to these tensions must be considered for the long-term stability of the state."
 flavour_overclan.20.a:0 "We will consider possible courses of action."
 overclan_religious_consequences_tt:0 "All or most Ourdi, Ilatani, Bahari, Kuzarami, Harpy, Copper Dwarf, and Sun Elf provinces will have their religion changed and gain: "
 F78_mad_religions_folk:0 "Mad Religious Folk"
 desc_F78_mad_religions_folk:0 "This province’s religious believers are outraged that the Overclan has heard the call of faith, and demand that the Overclan hear their call instead."
 flavour_overclan.21.t:0 "Violence Erupts"
 flavour_overclan.21.d:0 "REPORT: Marked social tensions have been reported among our population within the Serpentsreach. While initially manageable when our ranks were simply composed of Exodus Goblin and Marble Dwarf settlers, other groups have proven far less amicable to our rule. Several notable examples include:\n\n- Kobold inhabitants of the Bûrad Forge displaying fierce territorialism, constantly repelling any attempts by other groups to settle these caverns.\n- Dwarves who never left the Serpentsreach, were not born under our rule, or otherwise feel no obligation to us have shown stubborn resistance to our rule, as well as a troubling penchant for violence toward goblin citizens.\n- Orcs and cave-dwelling goblins participating in riots against what is perceived as undue authority held by dwarves and "foreign" goblins.\n\nWhile violence is ongoing, it has yet to reach the level of full-scale rebellion against our rule. In fact, many dissenters, militant or otherwise, have expressed a desire for greater representation within our state. As this would not be incompatible with the current operation of government, it is advised plans be made to begin appeasing these malcontent subjects."
 flavour_overclan.21.a:0 "Acknowledged."
 F78_mad_dwarovar_folk:0 "Mad Dwarovar Folk"
 desc_F78_mad_dwarovar_folk:0 ""
 flavour_overclan.22.t:0 "Golden Highway Construction in Aqatbar"
 flavour_overclan.22.desc:0 "The sun shines brightly upon the highway from [536.GetName] to [688.GetName] to [665.GetName]. Its flagstones give off a golden shimmer in the late afternoon as the first merchants start their journeys along the rebuilt marvel. It is wide enough for six men to march abreast and two carts to pass eachother comfortably. It is already a great asset in The Hills and even so it is but a few links in a long chain that will strengthen our nation. Future generations will marvel at these roads, like we marveled at them in Jaher's time."
 flavour_overclan.22.a:0 "It's complete!"
 flavour_overclan.26.t:0 "Golden Highway Construction in Bahar"
 flavour_overclan.26.desc:0 "The sun shines brightly upon the highway from [536.GetName] to [521.GetName] to [510.GetName]. Its flagstones give off a golden shimmer in the late afternoon as the first merchants start their journeys along the rebuilt marvel. It is wide enough for six men to march abreast and two carts to pass eachother comfortably. It is already a great asset in The Hills and even so it is but a few links in a long chain that will strengthen our nation. Future generations will marvel at these roads, like we marveled at them in Jaher's time."
 flavour_overclan.26.a:0 "It's complete!"
 flavour_overclan.30.t:0 "Representation of the Hills"
 flavour_overclan.30.d:0 "REPORT: Continued expansion by the state has seen the role of Chief Vizier gain increasing importance for both the Overboss and the state as a whole. This has had an undesirable side-effect in other regions under our rule struggling to represent their interests on a national level. It is advised that the office of a Circuit Diwan be established and a suitable candidate be appointed posthaste in order to alleviate this issue. Attached you will find several recommendations for candidates to assume this role. This office awaits your prompt decision."
 flavour_overclan.30.a:0 "The candidate from Ovdal Tûngr."
 flavour_overclan.30.b:0 "The candidate from Re-Uyel."
 flavour_overclan.30.c:0 "The candidate from Ourdia."
 flavour_overclan.30.e:0 "The candidate from Aqatbar."
 flavour_overclan.30.f:0 "The candidate from Gelkalis."
 flavour_overclan.31.t:0 "Representation of the Lower Rivers"
 flavour_overclan.31.d:0 "REPORT: The expansion of the state into the Lower Suran Circuit has seen the importance of the Chief Vizier's role increase once more. This expansion has also left those living in the Lower Suran Circuit feeling under-represented by our state. It is therefore suggested that a Circuit Diwan be selected to serve as adequate representation for the interests of the circuit. Attached you will find several candidate proposals who meet all the necessary qualifications and criteria. This office awaits your prompt decision."
 F78_heart_of_bulwar:0 "Heart of Bulwar"
 flavour_overclan.31.a:0 "The candidate from Bulwar"
 flavour_overclan.31.b:0 "The candidate from Medurubar"
 flavour_overclan.31.c:0 "The candidate from Brasan"
 flavour_overclan.32.t:0 "Representation of the Upper Suran"
 flavour_overclan.32.d:0 "REPORT: The expansion of the state into the Upper Suran Circuit has seen the importance of the Chief Vizier's role increase once more. This expansion has also left those living along the Upper Suran feeling under-represented by our state. It is therefore suggested that, as has been done in earlier comparable circumstances, a Circuit Diwan be selected to serve as adequate representation for the interests of the circuit. Attached you will find several candidate proposals who meet all the necessary qualifications and criteria. This office awaits your prompt decision."
 flavour_overclan.32.a:0 "The candidate from Eduz-Vacyn"
 flavour_overclan.32.b:0 "The Candidate from Azka-Sur."
 flavour_overclan.32.c:0 "The candidate from Azkabar."
 flavour_overclan.32.e:0 "The candidate from Sareyand."
 flavour_overclan.33.t:0 "Representation of the Segbandal"
 flavour_overclan.33.d:0 "REPORT: Our efforts to solidify our control over the Segbandal, though productive, have not been absolute. The Citrine dwarves still prove defiant, even if their kin in other holds have managed to serve as a counterbalance and moderating force. Those same kin have expressed their own agendas and interests, too, which have at times conflicted with one another and the state's own interests. As with other regions under our control, it is recommended that we appoint a Circuit Diwan to represent their interests on a national level. This office only requires your decision as to which candidate should be selected."
 flavour_overclan.33.a:0 "The candidate from Seghdihr."
 flavour_overclan.33.b:0 "The candidate from Verkal Gulan."
 flavour_overclan.40.t:0 "Separation of Sun and State"
 flavour_overclan.40.d:0 "REPORT: By parliamentary decree, the state has officially divested itself fully from matters of religious faith within the realm. While previously acknowledging the rights of citizens to practice their own beliefs freely, this new decree will take this matter further, divesting any matters of theological concern from the purview of the state. In effect, there shall be a full separation between the concerns of state, and the concerns of the faithful - so long as the faithful obey the laws of the state."
 flavour_overclan.40.a:0 "Acknowledged."
 overclan_disables_estate_church_privs_tt:0 "The §YClergy§! estate privileges of §YReligious Culture§!, §YExpansionist Zealotry§!, and §YEnforced Unity of Faith§! are disabled."
 F78_separation_of_sun_and_state:0 "Separation of Sun and State"
 flavour_overclan.41.t:0 "Dwarven Agreement"
 flavour_overclan.41.d:0 "REPORT: Passage of a comprehensive agreement with the dwarven holds under our influence has concluded, and with favorable results. Acknowledging the difficulty in administering any one hold directly, let alone all of them, it has instead been decided that these subject holds will be granted a degree of autonomy in their own operation, as well as a reduction in tax dues. In exchange, these holds shall agree to provide favorable commercial deals to the state and its merchants. This, it has been calculated, will offset any loss in revenue gained from decreased direct control and tax dues, and may in fact allow for greater local productivity."
 flavour_overclan.41.a:0 "Acknowledged."
 flavour_overclan.42.t:0 "New Upper City"
 flavour_overclan.42.d:0 "REPORT: Per a recent petition brought forward by some of our harpy subjects, the parliament has examined the issue of poor accessibility for harpies within the layout of our cities. Finding the concerns of these harpies well founded, the parliament has decreed that all buildings open to the public must be designed to allow for aerial access for harpies. With consideration to our harpy subjects in mind, the potential adoption of a more sophisticated vertical construction philosophy may well be considered going forward."
 flavour_overclan.42.a:0 "An important step."
 flavour_overclan.43.t:0 "Correcting the Deficit"
 flavour_overclan.43.d:0 "REPORT: Continued reliance on the Voltoj has created a concurrent issue for the state. While our personnel needs have expanded significantly, the supply of available Voltoj has not, at least not to an acceptable degree. A lack of conflict has resulted in a decline in orphaned Voltoj, which have thus far formed a significant part of the bureaucratic workforce. In order to rectify this issue, this office presents two proposals, to be initiated simultaneously.\n\nFIRST: Recruitment to the academies shall be made open to all Voltoj, including those who still have living families.\n\nSECOND: Recruitment to the academies shall be made open to all orphans, regardless of race, and not simply Voltoj.\n\nThrough these measures, it is believed the administrative deficit will be dealt with indefinitely."
 flavour_overclan.43.a:0 " Let it be so, then."
 flavour_overclan.44.t:0 "The Cavern Peoples"
 flavour_overclan.44.d:0 "REPORT: By parliamentary decree, those peoples of the caverns - particularly cave goblins and orcs - shall be allowed to migrate as they please within the territory of the state, including into holds. They shall also enjoy the representation that comes with their new residence. This decree has seen goblin and orc migration to dwarven holds increase, naturally. Interestingly, we have also seen a similar rise in orcish migration into Bulwar."
 flavour_overclan.44.a:0 "So long as they behave, they are welcome."
 flavour_overclan.45.t:0 "Representation of the Serpentsreach"
 flavour_overclan.45.d:0 "REPORT: By parliamentary decree, it has been decided that the Serpentsreach be granted appropriate representation in the form of a dedicated Diwan, in line with current policies for granting representation to regions comprising the territory of the state. Attached you will find a list of candidates from the Serpentsreach who would suit this position. This office awaits your prompt decision."
 flavour_overclan.45.a:0 "The candidate from Shaztundihr."
 flavour_overclan.45.b:0 "The candidate from Orlghelovar."
 flavour_overclan.45.c:0 "The candidate from Verkal Skomdihr."
 flavour_overclan.46.t:0 "Dictate Against the Xhazob"
 flavour_overclan.46.d:0 "The following is a portion of the minutes of a parliamentary meeting regarding the Xhazobkult.\n\n REP. TOE-ZAZEN: Argumentation has been clear. No religious body within the state is willing to allow for the others to preach to the Xhazobkultists. It appears to this body that to favor any one faith in this matter would be a violation of the state's principles, and that to allow unfettered preaching by all parties will simply create internal conflict.\n\nREP. ABAD: Why don't we circumvent the issue altogether? Invite missionaries from abroad to do the work instead? There can be no internal conflict of interest if all the proselytizing party in question is external in origin.\n\nREP. SZEL-YAMETES: Absurd! Allow foreigners to preach within our midst? That's inviting religious turmoil.\n\nREP: ABAD: Yet you ignore something you yourself demonstrate. If there is one thing all Bulwari can agree upon, it is a distrust of foreign missionaries.\n\n(Murmurs of laughter cross the parliament.)\n\n REP. SZEL-YAMETES: Perhaps you have a point. At least the foreigners won't try to put anyone on pyres, Surael willing."
 flavour_overclan.46.a:0 "An interesting idea."
 overclan_missionaries_invited_tt:0 "Every country we invite missionaries from will gain 10 opinion of us."
 flavour_overclan.47.t:0 "The Missionaries Arrive"
 flavour_overclan.47.d:0 "When I had first arrived in Bulwar, I had been promised a fertile audience for the message of Corin. Every day I have tried to preach to these Bulwari, yet they continue to test my patience. They argue incessantly about minutiae, sometimes with each other more so than even with myself. I swear to the gods that the other day, I nearly saw two men come to blows over a discussion on the merit of lentils. In most quarters, it appears that Corin's word has little room for purchase here.\n\nFortunately, this has not proven universal. While the Bulwari themselves have been largely resistant to my efforts, the local gnoll population has proven much more receptive. In some ways, I have come to understand this to be the fertile audience I was enticed to preach to initially. While they can be uncouth and even violent at times, they also seem to be able to respect strength - something Corin always wielded well. I hope to show them that strength is nothing if not wielded righteously - though I've found I'm not the only missionary frequenting the gnollish communities as of late. Adeanics, gnomes... I daresay I even saw a harimari or two wandering about as well.\n\nEven if they listen, my work here is far from over."
 flavour_overclan.47.a:0 "From the personal journal of Valenza of Redcliff."
 overclan_missionaries_against_evil_tt:0 "Henceforth, the foreign missionaries will scramble to convert every province following evil religions, such as Xhazobkult, within our borders."
