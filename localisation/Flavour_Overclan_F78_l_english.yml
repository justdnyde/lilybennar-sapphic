 desc_F78_harpy_upper_cities_mod:0 "The buildings in this province’s cities extend somewhat higher than would otherwise be sensible, given its large population of harpy residents. There are as many bridges between buildings above as there are roads below, and a ground-bound visitor to the city might feel as though they have walked inside a ball of twine."
