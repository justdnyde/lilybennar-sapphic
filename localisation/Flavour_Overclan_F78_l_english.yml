 flavour_overclan.63.t:0 "Wildcard Academy Menu"
 flavour_overclan.63.d:0 "Chief Vizier to the Overboss is posted here. \n\nA §YVoltoj Academy§! with the §YChief Vizier§! present and enough development can spend that develeopment on an upgrade. Upgrading to a §YMedium§! academy requires §Y30§! ¤1 development and each §YAcademy Circuit! can only support 2 §YMedium§! academies. Each Academy Circuit can also support 1 §YLarge§! academy, which can be upgraded to from a §YMedium§! one when the province has §Y40§! ¤1 development. Each §YVoltoj Academy§! is also well situated to administrate §Yunique§! local resources, expanding an Academy's capabilities to allow for this requires §Y50§! ¤1 development and each one will require uncovering some documents or learning some secret. \n\n Each Voltoj Academy upgrade will spend half of the ¤1 development required to coordinate it, and it will spend £icon_tax_base£Base Tax first. \n\n Due to the intricate nature of hold bureaucracies, Academies in hold provinces will require §Y20§! ¤1 development beyond the normal in order to upgrade them (for example, upgrading a §YMedium Voltoj Academy Hold§! to §YLarge§! would require §Y60§! ¤1 development), but only §Y10§! ¤1 development will be spent by any upgrade."
