 flavour_overclan.57.t:0 "Grow Academy Menu"
 flavour_overclan.57.d:0 "A §YVoltoj Academy§! with a §YChief Vizier§! or Circuit §YDiwan§! present and enough ¤1 development can spend that develeopment on an upgrade. Upgrading to a §YMedium§! academy requires ¤130 development and each §YAcademy Circuit§! can only support 2 §YMedium§! academies. Each Academy Circuit can also support 1 §YLarge§! academy, which can be upgraded to from a §YMedium§! one when the province has ¤140 development. Each §YVoltoj Academy§! is also well situated to administrate §Yunique§! local resources, expanding an Academy's capabilities to allow for this requires ¤150 development and each one will require uncovering some documents or learning some secret. \n\n Each Voltoj Academy upgrade will spend half of the ¤1 development required to coordinate it, and it will spend£icon_tax_base£Base Tax first. \n\n Due to the intricate nature of hold bureaucracies, Academies in hold provinces will require ¤120 development beyond the normal in order to upgrade them (for example, a §YLarge§! upgrade would require ¤160 development), but only ¤110 development will be spent by any upgrade. \n\nPlease select an Academy Circuit to address."
