 flavour_overclan.60.d:0 "A §YVoltoj Academy§! with a §YDiwan§! present and enough development can spend that develeopment on an upgrade. Upgrading to a §YMedium§! academy in a Hold province requires §Y50§! ¤1 development. The §YSerpentreach Academy Circuit§! can support 1 §YLarge§! academy, which can be upgraded to from a §YMedium§! one when the province has §Y60§! ¤1 development. Each §YVoltoj Academy§! is also well situated to administrate §Yunique§! local resources, expanding an Academy's capabilities to allow for this requires §Y70§! ¤1 development and each one will require uncovering some documents or learning some secret. \n\n Each §YVoltoj Hold Academy§! upgrade will only spend §Y10§! ¤1 development."
