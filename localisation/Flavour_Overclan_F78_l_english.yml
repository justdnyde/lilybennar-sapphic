 #Government reforms
 overclan_parliament_of_faiths_and_cultures:0 "Parliament of Faiths and Cultures"
 overclan_parliament_of_faiths_and_cultures_desc:0 "It is an unusual occurrence to meet two people in Parliament who are dressed the same - its representatives come from all across the Overclan, and each of them is wholly determined to show off their traditions to their fullest extent. The Parliament was based on the Damerian system, but with somewhat more impassioned oratory and a veritable symphony of languages than those buttoned-up Cannorians might have been accustomed to."
 overclan_voltoj_dynasties:0 "Voltoj Dynasties"
 overclan_voltoj_dynasties_desc:0 "By their nature the Voltoj cannot reproduce, but this only makes the best of them even more determined to leave a mark. In lieu of founding sprawling families, the Voltoj have created networks of influence and patronage throughout the Overclan designed to find the best and brightest of their kind from the academies, induct them into their ranks, and give other members of their bureaucratic pseudo-dynasty a leg up so that the virtuous cycle can continue. Infighting between these dynasties for positions of power and influence can be intense, but that only makes them work harder!"
 overclan_voltoj_dynasties_mandate:0 "Voltoj Dynasties"
 overclan_voltoj_dynasties_mandate_desc:0 "By their nature the Voltoj cannot reproduce, but this only makes the best of them even more determined to leave a mark. In lieu of founding sprawling families, the Voltoj have created networks of influence and patronage throughout the Overclan designed to find the best and brightest of their kind from the academies, induct them into their ranks, and give other members of their bureaucratic pseudo-dynasty a leg up so that the virtuous cycle can continue. Infighting between these dynasties for positions of power and influence can be intense, but that only makes them work harder!"
