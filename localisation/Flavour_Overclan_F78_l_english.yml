 F78_small_voltoj_academy_hold:0 "Small Voltoj Academy"
 desc_F78_small_voltoj_academy_hold:0 "This province is home to a fledgling Voltoj Academy: although its campus is little more than a few buildings now, we expect great things in the future.\n\nA Chief Vizier or Diwan posted here would grow the £icon_tax_base£Base Tax until ¤160 is reached.\n\n§TDevelopment needed to expand:§!¤150"
