l_english:
 #Writing by fantastic kitten and Creatively bankrupt, coding by Creatively bankrupt

 #Events
 gene_pillars.0.t: "Passive Study"
 gene_pillars.0.d: "Over the past few years, our [This.GetArtificersName] have been studying the great Gene Pillars of Insyaa, and they have managed to discover a most peculiar invention. They believe it will prove useful to us."
 gene_pillars.0.a: "Fascinating."

 # Not used right now
 gene_pillars.1.t: "Abandon Expedition"
 gene_pillars.1.d: "Are we sure we want to tell our brave adventurers to turn back? An inorderly retreat risks injuries and loss of life."
 gene_pillars.1.a: "They must turn back."
 gene_pillars.1.b: "Let them finish their mission."
 
 gene_pillars.2.t: "Begin Expedition"
 gene_pillars.2.d: "The adventurers are getting ready to head out, do we have any last things on the agenda?"
 gene_pillars.2.a: "Go forth and explore!"
 gene_pillars.2.b: "Actually, I've got some last thoughts about their loadout..."

 gene_pillars.6.t: "Level Up!"
 gene_pillars.6.d: "Our adventurers have explored many a crevice and cranny in the Gene Pillar. Their combined experience has led to the growth of the party as a whole."
 gene_pillars.6.a: "The secret of success. It's just a matter of concentration."
 aPUI_gene_pillars_party_level_var_dummy: "Party Level"
 gene_pillars_unlock_classes_level_3_tt: "Unlock §YPaladin§! and §YBarbarian§! Party Members"
 gene_pillars_unlock_classes_level_4_tt: "Unlock §YPriest§! Party Members"

 aPUI_gene_pillar_interaction_title: "[Root.aPUI_gene_pillar_interaction_title_tt]"
 aPUI_gene_pillar_interaction_sections_subtitle: "[Root.aPUI_gene_pillar_interaction_sections_subtitle_tt]"
 
 # Not used right now
 gene_pillars.20.t: "Level Up!"
 gene_pillars.20.d: "We've got enough experience to level up!"
 gene_pillars.20.a: "Satisfactory!"
 
 # Not used right now
 gene_pillars.21.t: "Party Injuries"
 gene_pillars.21.d: "Some of our explorers have been injured. They will unable to participate in expeditions for §Y25§! years"
 gene_pillars.21.a: "Ouch"
 
 gene_pillars.30.t: "Exploration Complete!"
 gene_pillars.30.d: "Our expedition to the Gene Pillar in [Root.Province.GetName] has proven successful, mapping a section of the internal structure and discovering much of the nature of this ancient edifice. Beyond the conventional treasures the pillars guard, there are great troves of information and sometimes even raw salvage to be had. [This.gene_pillar_injury_check] [This.gene_pillar_extra_loot_check]"
 gene_pillars.30.a: "The secrets of the Precursors are revealed to us!"
 gene_pillars.30.desc.level_up: "\n\nWe had enough xp to level up."
 gene_pillars.30.desc.injury: "\n\nSomeone was injured, unfortunately."
 gene_pillars.30.desc.extra_loot: "\n\nWe had enough loot for an extra reward."

 gene_pillars.31.t: "Pillar Ends Badly"
 gene_pillars.31.d: "For one reason or another, our expedition has come to an end. [This.gene_pillar_injury_check] [This.gene_pillar_extra_loot_check]"
 gene_pillars.32.d: "For one reason or another, our expedition has come to an end. [gene_pillar_exploration_province.gene_pillar_injury_check] [gene_pillar_exploration_province.gene_pillar_extra_loot_check]"
 gene_pillars.31.a: "Curses!"

 gene_pillars.33.t: "Gene Pillar Riches!"
 gene_pillars.33.d: "Our exploration of the Gene Pillar in [Root.Province.GetName] is still ongoing, but already the expeditionaries have had great success, acquiring and sending back valuable objects and information from this vast treasure trove of the Precursors. Yet more riches are promised to those bold enough to delve fearlessly into such hallowed places."
 gene_pillars.33.a: "The secrets of the Precursors are revealed to us!"

 gene_pillars.40.t: "The Pillar Provides Relics"
 gene_pillars.40.d: "Our exploration of the Gene Pillar in [Root.Province.GetName] has incidentally mapped vast warehouses full of Precursor technology, valuable in antiquarian terms even if it turns out to be of little use to our artificery. Long beyond our expedition, the province promises to be a major centre for the trade of such precious relics. We could regulate such trade carefully, or simply declare open season for any merchant willing to take the risk."
 gene_pillars.40.a: "A new steady source of relics."
 gene_pillars.40.b: "A rush for relics!"
 
 gene_pillars.41.t: "Ran out of Precursor Relics"
 gene_pillars.41.d: "We ran out of Precursor Relics in [Root.GetName]."
 gene_pillars.41.a: "Sad"
 
 gene_pillars.50.t: "The Pillar Provides Damestear"
 gene_pillars.50.d: "Our exploration of the Gene Pillar in [Root.Province.GetName] has discovered vast reserves of damestear, stored by the Precursors long ago or veined deep in the ground - perhaps a reason the Pillar was built here in the first place. Long beyond our expedition, the province promises to be a major centre for the trade of this magically invaluable good. We could regulate such trade carefully, or simply declare open season for any merchant willing to take the risk."
 gene_pillars.50.a: "A rush for damestear!"
 
 
 gene_pillars.100.t: "Placeholder event"
 gene_pillars.100.d: "I'm a placeholder event until an actual event chain for this gene pillar is done!"
 gene_pillars.100.a: "Give me a generic event, and get back here in a year."
 gene_pillars.100.b: "Actually, I'm done, let me win now."

 gene_pillars.101.t: "A Fault in the Delve"
 gene_pillars.101.d: "Moving through the base of the Gene Pillar has been slow going, due to extensive flooding inundating several rooms with water. The party continues on, pressing past swirling pools of dangerous currents, until they arrive at what looks like a generator of some sort, spitting out vapor resembling storm clouds into a series of pipes which lead further into the structure. Suddenly, the water level shifts, and one of the generators is fully engulfed by the sea. The machine sputters, sparks flying across the chamber as it makes a variety of clanks and groans."
 gene_pillars.101.a: "It's gonna blow! Take cover!"
 gene_pillars.101.b: "It's gonna blow! Quick, to the next chamber!"
 gene_pillars.101.c: "It's gonna blow! Quick, let me seal it with wards!"

 gene_pillars.102.t: "Winds of Warning"
 gene_pillars.102.d: "Making their way further into the Gene Pillar the party encountered one of the main production areas for the Kiamoa. Swirling clouds of blue energy, crackling with energy as they fly over the heads of the party, are drawn into countless vents and shafts that run throughout the walls like an endless maze. Unfortunately, much of this part of the facility was not designed for mortal access, and as such the only way forward is through the tempest of deadly lightning arcs.\n\nWhile the party is carefully navigating between bursts of magical clouds, one vent that initially went unnoticed stirs to life and prepares to emit a fearsome gout of pure energy directly into the unlucky souls who dared to tread within the pillar."
 gene_pillars.102.a: "Everybody RUN!!"
 gene_pillars.102.b: "Everyone, get behind me!"
 gene_pillars.102.c: "Everyone, let me channel its power!"

 gene_pillars.103.t: "The Channeling Rods"
 gene_pillars.103.d: "This section of the pillar is packed with countless metal rods, each crackling with some kind of magical energy. Ethereal blue mist seems to be absorbed by the structures, and after passing through more inscrutable machinery, it emerges from the other side transformed into the base form of the storm clouds found within the Kiamoa.\n\nThe party moves carefully between the poles, when suddenly a nearby dormant structure powers up and begins to crackle as the hapless explorers pass by. They all feel some kind of force pulling at their innermost essence, as if their lives are being drained away merely by being in close proximity to these things. Whatever is happening, it appears to be supercharging the rods, and they look set to explode at any moment."
 gene_pillars.103.a: "Run for cover!"
 gene_pillars.103.b: "Absorb the lightning!"
 gene_pillars.103.c: "Work together, channel the energy back!"

 gene_pillars.104.t: "The Mist Brigade"
 gene_pillars.104.d: "The destruction that has been caused by the party’s advance within the pillar has triggered some sort of ancient defense mechanism. As the party continues to explore the damp corridors of the facility, suddenly an alarm blares to life and a number of primitive security constructs lumber out of their deployment zones. Several of them are armed with long, sharp blades in place of arms, and they constantly emit clouds of the mist that powers the Kiamoa as they move. This quaint feature has led these constructs to be dubbed ‘the Mist Brigade’ by the few who have survived encounters with them in the past.\n\nCurrently they however do not seem interested in sharing this diverting historical tidbit with the party. The constructs advance, each brandishing some sort of deadly weapon in the party’s direction."
 gene_pillars.104.a: "We won’t back down!"
 gene_pillars.104.b: "These poor imitations are no match for real metal!"
 gene_pillars.104.c: "We don’t have time for this! CHARGE!"
 gene_pillars.104.e: "Let’s lose them in the corridors and go the long way around."

 gene_pillars.105.t: "Static Elementals"
 gene_pillars.105.d: "The high density of magical energy within the pillar has caused manifestations of elementals to be common throughout its halls. These creatures of pure energy, formed into the shape of miniature storm clouds, hide in the largest chambers and prey on hapless explorers who stumble into them unawares.\n\nA group of these elementals now block a passageway to a deeper chamber, crackling and rumbling as the party moves closer. It appears that the creatures are not currently intending aggressive action, but trying to get past them would almost certainly provoke a response."
 gene_pillars.105.a: "Let’s just hope they don’t notice us."
 gene_pillars.105.b: "Try to capture them for future use!"
 gene_pillars.105.c: "Dispel them with banishing magic!"

 gene_pillars.106.t: "Soul Survivor"
 gene_pillars.106.d: "After a long and arduous trek through the pillar’s base, the party finally arrives at a small cluster of rooms and structures which seem to have once been used for habitation. Apartments, barracks, dining halls, storage rooms, and recreational areas are all present within the ruins, each left in worse condition than the last. Picking through each deserted compartment one by one, the party discovers little of worth - until someone knocks over a pile of debris, and reveals a passage leading into a hidden room.\n\nInside the chamber, strange devices and swirling blue mist trapped in jars line the walls from floor to ceiling. All sorts of machinery and spare parts are strewn haphazardly across tables and desks scattered throughout the room, quickly revealing itself to be some kind of old workshop. At the far end of this craftsmen’s wonderland, the party discovers the strangest find of them all - some kind of old mechanim body, with a jar full of condensed Kiamoa clouds jammed into the neck where the head should be. They stare quizzically at the magical oddity, until one of them notices something that makes their heart drop to their feet: the tank is staring back.\n\nSuddenly, a voice begins to sound through a mesh of metal embedded into the mechanim’s chest. “Thank the stars! I never thought I would see mortals ever again!” The voice is thin and covered in a layer of static, but the party can make out some kind of speech if they listen closely. “We have no time to lose. My name is Conthus, and I no longer wish to be alive.”\n\nThe thing in the jar explains that it’s an ancient being from before the sky fell, and in order to truly be killed he must be cast into the Kiamoa and dispersed into the stormwall. In return, he offers to guide the party through the more dangerous levels of the pillar. “Truly, what do you have to lose?”"
 gene_pillars.106.a: "What a strange discovery!"
 gene_pillars.106.b: "Teach us everything you know about the Kiamoa!"
 gene_pillars.106.c: "What an ancient soul..."
 gene_pillars.106.e: "We have so much to learn from you!"
 gene_pillars.106.f: "How is this evil even possible?"

 gene_pillars.111.t: "The Warped"
 gene_pillars.111.d: "Conthus guides the party into the upper levels of the pillar, which have survived the churning waters outside mostly intact compared to the lower chambers. “Tread carefully,” the mechanical body intones, “for this is the place where we tested magic on many different creatures. Things encountered here may be...unstable.”As he finishes his disquieting explanation, a sound like trees crashing in the forest reverberates down the hall, and the party sees some kind of gargantuan primate with three arms and four heads wailing in the hall. It does not seem to currently have aggressive intentions, but it does block the way forward."
 gene_pillars.111.a: "Let’s hope it’s friendly..."
 gene_pillars.111.b: "Scare it away with fire!"
 gene_pillars.111.c: "Trap it as it tries to attack!"

 gene_pillars.112.t: "Mad Science"
 gene_pillars.112.d: "More chambers within the pillar reveal the extent of the experiments that took place within this facility. Instruments filled with strange liquid and vials that glitter in the dim light are placed haphazardly around the room, some broken and spilled onto the ground while others remain intact and radiant.\n\nA particular vial has caught the party's eye; dark and malevolent, the liquid inside the glass bottle seems likely to be harmful in some way, but it is possible it could also hold immense value."
 gene_pillars.112.a: "Let’s just avoid it for now."
 gene_pillars.112.b: "It’s dangerous, but it could be valuable!"
 gene_pillars.112.c: "A useful potion! Drink it at once!"
 gene_pillars.112.e: "If we’re careful, our magic can safely store this."
 gene_pillars.112.f: "It seems harmful. Purify it first, and keep medicine on standby."

 gene_pillars.113.t: "The Mournful Cry"
 gene_pillars.113.d: "More of the containment cells for the experiments of this level line the hall, each with its door blasted open or lying on its side in the middle of the passageway. Deeper into the corridor, a soft orange glow emanates from inside one of the cells, and a weeping noise can be heard from within the room.\n\nPeering inside, what seems to be a small elven girl is crying on the cold metallic floor, looking up at the party with big, weepy eyes. It is impossible to say where she came from, but the slight red stains around her seated frame do not inspire confidence in the adventurers."
 gene_pillars.113.a: "There there, it’s alright..."
 gene_pillars.113.b: "I’m not going near that thing!"
 gene_pillars.113.c: "It’s a trick! Fire at will!"
 gene_pillars.113.e: "I know my traps when I see them."

 gene_pillars.114.t: "Fireball Dispensing Unit"
 gene_pillars.114.d: "The subroutines which control the Mist Brigade have now realized the party has entered a much more restricted area than before. This is something which heavily disrupts their programming, and in response they have begun to escalate their offensive against intruders.\n\nThe party discovers this when a giant fireball whizzes by overhead, crashing into a nearby wall and leaving only a smoking crater behind. The Mist Brigade soon reveals themselves from the gloom, and among them are now special units infused with evocation. And they are decidedly unhappy to see the hapless explorers."
 gene_pillars.114.a: "Get the hell out of here!"
 gene_pillars.114.b: "Return fire! Snuff them out!"
 gene_pillars.114.c: "Get behind these walls, grab what you can and run!"
 gene_pillars.114.e: "Douse them with water, then attack!"

 gene_pillars.115.t: "Frogs? Frogs!"
 gene_pillars.115.d: "Conthus explicitly warned the party about this chamber, imploring them to “move past their base instincts and simply not engage.” Upon entering, it is difficult to understand why: the only thing in the room is a single green frog, lazily looking about. The party almost pays it no heed, until, while one of their number walks past the stationary amphibian, it suddenly springs to life and jumps onto the leg of a nearby explorer.\n\nWith a burst of green light, what was one frog is now inexplicably two. Another touch, and two becomes three. As the frogs continue to jump at the party, more and more of the mucus-covered nightmares fill the room, threatening to crush the party under their weight."
 gene_pillars.115.a: "There’s too many, we can’t stop them!"
 gene_pillars.115.b: "Cordon off the frogs before there’s too many of them."
 gene_pillars.115.c: "Summon a distraction and move on."
 gene_pillars.115.e: "Cut through the mass of frogs!"
 gene_pillars.115.f: "Snare the frogs and keep moving."
 gene_pillars.115.g: "This weird potion seems to glow brighter near the frog..."

 gene_pillars.116.t: "Security Foresight"
 gene_pillars.116.d: "This chamber seems surprisingly stark for being so deep into the pillar. Only a single door, recessed into the wall, marks any security measures in the space. But when the party tries to cross, the door slams closed and a pit opens just before their feet, threatening to swallow them whole.\n\nTrying a different path, this, too, triggers a security response, moving the pit in front of the party once again. Trying to jump causes arrows to fly out, magic is met with blasts of fire, and tools are wrenched out of hands with powerful gusts of Evocation magic. It almost seems as if the door knows what the party is planning before it happens."
 gene_pillars.116.a: "Just push past it."
 gene_pillars.116.b: "We’ll just learn what it’s going to do!"
 gene_pillars.116.c: "Smash the door."
 gene_pillars.116.e: "It can’t figure out what we’re going to do if we don’t know either!"

 gene_pillars.117.t: "The Stormcannon"
 gene_pillars.117.d: "In the depths of the experimental layer lies a contraption unlike any the party has ever seen before. Sitting on a raised pedestal, a giant cannon constructed by seemingly otherworldly means is aimed through an opening in the ceiling towards the sky, lying dormant. Getting closer to the weapon, the party can feel the intense magical energy flowing into its core, as it siphons off power directly from the Kiamoa itself.\n\nConthus, who has been following the party from a safe distance while they clear the path, enters the chamber and clomps towards the gun, his swirling head flickering faster the closer he gets. “At last, we arrive at my salvation! Tremble in awe before the might of our crowning achievement of melding material and magic - the Stormcannon!”\n\nThe Precursor swings his mechanical arms wide, gesturing to the gun with a grandiose flair. “This device is capable of infusing whatever it contacts with the Kiamoa itself,” the ancient being rattles through his voice port. “Through this, I can merge into the Kiamoa, and finally free myself of this wretched tank! I will be free and at long last at peace!”\n\nThe Precursor hurriedly begins moving around the room, gathering a seemingly random assortment of parts and schematics as the Stormcannon stands ominously on its dais. A lot could be learned from such a device if we took the time to examine it."
 gene_pillars.117.a: "Study how this thing even works."
 gene_pillars.117.b: "Surreptitiously grab some of the artifacts around the room."
 gene_pillars.117.c: "REALLY study how this thing works."
 gene_pillars.117.e: "What will happen if we put this in here?"

 gene_pillars.121.t: "Thunderspeak"
 gene_pillars.121.d: "The final level of the gene pillar is the closest to what has been deemed by adventurers as the Spout, where the newborn parts of the Kiamoa leave the pillar and are infused into the stormwall. Such a high concentration of magical power has created a variety of strange anomalies, and each threatens to bring the party to its doom.\n\nBut the first encounter is something truly unexpected; an entire community of storm elementals, seemingly possessing some form of complex society. One of the beings, the closest possible thing they may have to a sentry, notices the party and raises a limb of storm clouds, emitting sounds like thunder over the horizon. It seems like it will not let the party pass without a struggle."
 gene_pillars.121.a: "Rumble at them."
 gene_pillars.121.b: "Crackle at them."
 gene_pillars.121.c: "Communicate via magic."

 gene_pillars.122.t: "The Horizontal Torrent"
 gene_pillars.122.d: "Conthus warned the party beforehand of how his ‘brilliant mind’ engineered some defenses that break the very laws of reality itself, and it seems as if they finally discovered what he meant. A vast chasm spanned by a single thin walkway stands in the path of the expedition, and somehow the water within the chamber has begun flowing sideways across the bridge, threatening to sweep any who try to cross into the chasm below.\n\nThe Precursor did note that it was possible to cross, but it is clear that one wrong step will inevitably cause whoever tries to pass to be swept into the darkness below. Care must be taken to ultimately ensure the survival of the party."
 gene_pillars.122.a: "Just...walk...slowly..."
 gene_pillars.122.b: "Just run as fast as you can!"
 gene_pillars.122.c: "Create steps out of the water and safely cross the room!"
 gene_pillars.122.e: "Hold on, I’m gonna jump it!"
 gene_pillars.122.f: "Wait a minute, I’ve seen this one before!"

 gene_pillars.123.t: "Fungal Replication"
 gene_pillars.123.d: "Even with all the awesome power found within the realm of the magical, the power of nature is still a force which must be dealt with ever so carefully. This principle is at full display in the current chambers, where it seems some spores from the Mushroom Forest ended up inside the pillar and have latched onto the mana-infused walls, using them as a supercharged food source. Fungi blanket every surface for several rooms, growing large enough to block the path of the expedition. And if that was not enough, some kind of interaction between the mushrooms and the energies they fed upon has awakened some dormant mutation within them, creating a massive hall of man-eating fungus which now bars the way."
 gene_pillars.123.a: "Try to dodge the mushrooms."
 gene_pillars.123.b: "Cut through the fungus."
 gene_pillars.123.c: "Burn the fungus out!"
 gene_pillars.123.e: "Make the fungi grow in reverse!"
 gene_pillars.123.f: "You know, some of these fungi look pretty tasty..."

 gene_pillars.124.t: "The Unforgiveable"
 gene_pillars.124.d: "The experiments of the Precursors tended to be strange, wild things, whose effects are both difficult to discern and detain in equal measure. But some organisms are clear in their purpose; they were designed to explore just how much the mortal body can suffer before it expires. Some of these experiments were so vile that even the Precursors shunned them, locking them away in the depths of their laboratories. These were the creatures whose creators were exiled to far corners of the empire to atone for their existence. The Unforgiveables.\n\nIn the final level of the pillar, an incredible wailing surrounds the party as one such creature wallows in the passageway further on. A horrific mass of limbs and bodies, this poor construct seems less like a sentient creature and more like a living puddle of slime. Unfortunately, it blocks the only way forward."
 gene_pillars.124.a: "We’ll just have to cut through it."
 gene_pillars.124.b: "Burn the poor thing to the ground."
 gene_pillars.124.c: "At least we can soothe its suffering."
 gene_pillars.124.e: "How curious..."

 gene_pillars.125.t: "Massive Electrical Annihilation Unit"
 gene_pillars.125.d: "Tampering with the deployment of the Kiamoa was deemed a massive security risk in the multiple contracts that make up the internal programming of the Mist Brigade. As such, the party's exploration has thrown them into crisis mode as they get closer to the Spout. These intruders must be eliminated swiftly, and with extreme prejudice. Safety limits are removed, and the final weapon is sent to crush the explorers.\n\nStomping down the hall, completely filling it with its massive frame, a construct built around a massive collection of lightning bound in a bottle now charges the party. Its intentions are clear; detonate itself in their midst and wipe them out without a trace."
 gene_pillars.125.a: "RUN!!!"
 gene_pillars.125.b: "We’re the future; you cannot beat your upgrades! "
 gene_pillars.125.c: "Channel the lightning back at it!"
 gene_pillars.125.e: "Surround it with stone and let it doom itself!"

 gene_pillars.126.t: "The Box"
 gene_pillars.126.d: "Security is often a balance of deterrence and accessibility. Traps must be both difficult to disarm for intruders while remaining simple for the desired people to bypass. Of course, some areas are never meant to be accessed, which means traps can be utterly simple in their design and implementation. The party has stumbled into one such area.\n\nAs they step into a solid stone chamber, the doors on either side begin to grind to a close with a deafening scrape. The walls light up with countless blue wards, and soon they begin slowly sliding towards each other. Trying to break the walls themselves shows that the wards have reinforced them, and made such attempts almost impossible to achieve."
 gene_pillars.126.a: "Push back against the walls!"
 gene_pillars.126.b: "Run quickly and escape the chamber!"
 gene_pillars.126.c: "Shatter the wards on the walls!"
 gene_pillars.126.e: "There’s got to be a shutdown somewhere..."
 gene_pillars.126.f: "Lucky for us that we’re so small!"
 gene_pillars.126.g: "No wall may move me."

 gene_pillars.127.t: "Liquefaction"
 gene_pillars.127.d: "The party feels themselves nearing the end of their journey, but unfortunately now stands before the most devious trap they have yet encountered within these walls. The chamber before them looks normal, albeit more infused with Kiamoa than others, but a stray insect walking through the room immediately collapses into a pile of sludge as it crosses the threshold.\n\nIt's clear that walking into this room would surely spell doom for the party. Luckily, it seems that even this trap was too difficult for the Precursors to bypass, and as such it comes with a manual deactivation switch. But upon further examination it has become clear that triggering this switch will release the Kiamoa in the room which powers its defenses, unleashing the pure unadulterated might of the storm onto the hapless adventurers."
 gene_pillars.127.a: "Pull the bypass lever."
 gene_pillars.127.b: "Maybe we can go the long way around?"
 gene_pillars.127.c: "Organic weakness? Don’t make me laugh!"
 gene_pillars.127.e: "Liquid storm, you say?"
 gene_pillars.127.f: "Who needs organics when you have elementals?"
 gene_pillars.127.g: "It can’t be that bad, right?"
 gene_pillars_kiamoa_instant_death_warning_tt: "§RIT CAN BE THAT BAD. THIS WILL KILL THE PARTY.§!"

 gene_pillars.128.t: "Storm’s End"
 gene_pillars.128.d: "After trials and tribulations both magic and mundane, the party finally arrives at their ultimate goal; the Spout, a gigantic opening in the surface of the pillar where the Kiamoa pours into the sky like an inverted waterfall. The noise is almost deafening, the crash of thunder and the crackle of lightning drowning out all but the loudest of the party members. As they walk towards the center of the chamber, the party spies some sort of moving image of the Stormcannon, seemingly powered by some kind of Divination magic. Inside the frame depicting the lower chamber the party spies a familiar face; Conthus, detaching himself from his mechanim frame and loading his containment cell into the ‘barrel’.\n\nThe Precursor looks towards the image, stunning the party. “I sense that you have arrived at the controls. Excellent! There should be a control panel nearby which will activate the cannon. I’m sure even you can’t miss it, the buttons are very large.”\n\nThe miniature Kiamoa inside the Precursor's cage swirls erratically, streaks of light shooting across the glass as the party locates the controls. “Somewhere on that panel is the button to load me into the Stormcannon,” the old creature crackles with the remaining power within its metal body. “Activate it, and I will be free to join my people in grateful rest as pure energy. I cannot thank you enough for helping me in this endeavour, the undoubtedly most important quest of your lives.”\n\nBut another button catches the eyes of the party; red, imposing, and situated directly next to the controls the Precursor pointed out. With his mechanim body finally defunct, all Conthus can do is swirl in his dome as the party makes their choice."
 gene_pillars.128.a: "Hopefully he can find peace."
 gene_pillars.128.b: "At least we’re rid of him now."
 gene_pillars.128.c: "I’m glad I got to kill him."
 gene_pillars.128.e: "You don’t get to rest after what you’ve done."
 gene_pillars.128.f: "What if we stuck this vial in here, too?"

 gene_pillars.200.t: "Placeholder event"
 gene_pillars.200.d: "I'm a placeholder event until an actual event chain for this gene pillar is done!"
 gene_pillars.200.a: "Give me a generic event, and get back here in a year."
 gene_pillars.200.b: "Actually, I'm done, let me win now."
 
 gene_pillars.211.t: "An Odd Reception"
 gene_pillars.211.d: "We arrive at a great open space inside the pillar. The room has been thoroughly ransacked; many mechanim have likely been here before. In the middle of the room is a stone structure; it looks like a scribe's desk but much larger. When the expeditionaries go to approach the desk, all of a sudden a low noise rings throughout the room and a voice starts speaking. The speech is distorted and unlike any language found in Insyaa. Nothing else seems to occur; no defense mechanisms activate, no traps spring. After a short time the voice stops as well."
 gene_pillars.211.a: "Ominous…"
 gene_pillars.211.b: "Is that… the voice of our creators?"
 gene_pillars.211.c: "Is that… ancient Elvish!?!"
 gene_pillars.211.e: "The voice of the Ilvanya!"

 gene_pillars.212.t: "The Floor’s Moving"
 gene_pillars.212.d: "As the expedition travels further into the pillar they come across an odd room. There were long lines covered with raw ore of different kinds. Many rare minerals present in the bodies of mechanim and the construction of Kauga. It seems like this was some kind of storage facility, though the manner of just storing the resources in lines on the ground seems quite odd. As the rest of the expedition went to investigate the ore one member brushed against a long protrusion in the floor, instead of being solid as they expected the protrusion moved and suddenly the floor began moving as well. The lines of ore began moving swiftly in different directions with the expedition still on them, there’s only a moment to react."
 gene_pillars.212.a: "Move!"
 gene_pillars.212.b: "We need some fancy footwork."
 gene_pillars.212.c: "Artificer, do something!"
 gene_pillars.212.e: "Wait, it’s a lever!"

 gene_pillars.213.t: "Our Host"
 gene_pillars.213.d: "When travelling a mundane room the strange noise from earlier came once more and that strange monotone voice soon followed.\n“Ah, I apologise for this late introduction but I required some time to analyze and decipher your language. The message you heard previously was an introduction to this place and a guide on how to safely navigate it. Now that I have satisfied the requirement of playing that message I can present a personal analysis of your intelligence, it is below average.\nPlease do not feel upset, your intelligence is consistent with others who have attempted to explore this place. I am required to inform you that many of my subsystems are now partially outside of my control and may cause you death and/or injury. I informed you of this because it was required, as you are below average intelligence there is a low probability that you will change your decision. Still, I can aid you in navigating this place…"
 gene_pillars.213.a: "…please proceed to the left"
 gene_pillars.213.b: "…useful items to the right, children"
 gene_pillars.213.c: "…however, I will not"

 gene_pillars.214.t: "A Pool?"
 gene_pillars.214.d: "The expedition has come across a rather odd room. It’s an enormous pool filled with water and unrefined chunks of ore floating in it. Some of the ore has sunk to the bottom while the rest has stayed at the top. The only way through is on the other side of the pool, the voice starts up again.\n“I assure you there are no lifeforms in the water, no lifeforms will harm you if you enter”"
 gene_pillars.214.a: "Well lets get going then"
 gene_pillars.214.b: "I don’t like this, let’s just find another way"
 gene_pillars.214.c: "This won’t be an issue"
 gene_pillars.214.e: "No life? The water must be cycled regularly"

 gene_pillars.215.t: "Metal Arms"
 gene_pillars.215.d: "Nothing seems wrong so the party enters the pool when out of nowhere giant metal arms swept across the surface of the water. It happened too fast to react as the expedition was caught up with the ore and nearly crushed. Thankfully no expeditionaries died, but there were injuries, the voice started up again.\n“Ah, perhaps I should have informed you that the sorting process was nearly completed. I overestimated you, I thought you’d be faster.”"
 gene_pillars.215.a: "This place is dangerous…"

 gene_pillars.216.t: "The Virtue of Patience"
 gene_pillars.216.d: "The expedition's ranger’s call to wait for a second to see what happened has proven to be fruitful. All of a sudden giant metal arms sweep across the room and shunt the ore off into some unseen space. Afterwards the room began slowly filling with ore again and the ranger signalled it was safe to go, the voice started up again.\n“Perhaps my assessment of your intelligence was incomplete, it appears you do possess basic problem solving ability.”"
 gene_pillars.216.a: "Who knew they’d come in handy here?"

 gene_pillars.217.t: "The Great Furnace"
 gene_pillars.217.d: "The expedition has come to a large open pit full of ore, there are several hollow tube like structures on the ceiling though sized up such that a whole man could fit inside. There’s another passage on the other side of the pit, theres’ no bridge between them but the ore is piled so high walking between them is possible. A short time after entering to investigate, the passageways behind and in front of them suddenly sealed, and the voice started up again.\n“You have arrived at one of the ore processing facilities of this place. Here massive heat melts the ore for further processing. Do not worry, the blast doors are completely impenetrable so no fire will reach you… ah you entered into the furnace before the blast doors closed. Worry, your body is incapable of withstanding the temperatures.”\nA noise starts building from the ceiling.\n“As foreign objects have been detected in the furnace the heating will terminate prematurely, eventually.”"
 gene_pillars.217.a: "Not good!"
 gene_pillars.217.b: "Break through!"
 gene_pillars.217.c: "Maybe there’s a passage up there?"
 gene_pillars.217.e: "Bend the fire"

 gene_pillars.218.t: "Further Inwards"
 gene_pillars.218.d: "At last the expedition has breached the outer level of the mechanim pillar, the traps and dangers have been documented and dismantled. A stopping point has finally been reached, it should be easy to seal the well tread outer layer from the yet unexplored inner layer. The now familiar voice starts up again.\n“You have surprised me, the percentage of people who have managed to reach the inner facilities after the anomalous magic event over 1000 years ago is 0%. This calls for congratulations.”\nThe sound of clapping started playing, though distorted. Like hearing clapping from far away and through heavy wind.\n“Now that the congratulations are finished please exit the facility” the voice continued.\n“The inner facilities remain undamaged and my subsystems remain non-controllable. The possibility of death will increase significantly the further in you go.”\nNo one really wanted to go further anyways but an expeditionary couldn’t help but ask.\n“What’s your name?”\n“My name? My name is very long but you can refer to me as Freedom-Chained-No-More.”"
 gene_pillars.218.a: "We’ll stay here, for now…"

 gene_pillars.221.t: "Back Again"
 gene_pillars.221.d: "Once again the Mechanim Genepillar is being delved. The expedition will become the first people to gaze upon the inner facilities in over 1000 years. As they make the first step beyond what the previous expedition’s stopping point, Freedom-Chained-No-More finally spoke up.\n“It’s clear that incredible danger is not sufficient to deter you from this. Perhaps you should know it was not your safety I was concerned with. There are many mechanim still inside the inner facilities, they do not speak your language, they do not understand social norms and they have no worldly experience. By continuing further you’re not just putting yourselves at risk, do you understand?”\nNo one in the expedition felt comfortable responding and so their mysterious host continued.\n“Very well, if you really want to continue I have many things to say to you. As I doubt you’ll stay to listen, I'll give you the short version.”\nWith that they began speaking incredibly fast, more than a hundred words a second.\n“I hope that was informative.”"
 gene_pillars.221.a: "Didn’t quite catch that…"
 gene_pillars.221.b: "Alright, got it"
 gene_pillars.221.c: "How many curses was that!?"
 gene_pillars.221.e: "I’ve got a spell for this!"

 gene_pillars.222.t: "Toil and Hardship"
 gene_pillars.222.d: "As the expedition travels further in they come across a macabre sight. There were partially constructed mechanim hanging from the ceiling in great rows. Hundreds of them all lined up, the expedition got another message from their ‘host’.\n“Ah yes, this is a production line for labour mechanim. They don’t have kauga yet, so the estimated completion time is never. I have shut down all mechanim production, you are aware of what is outside this place even more than I am. I am not creating new mechanim who will have to endure that.”\nTaking another moment the expedition realizes the hallway was more of a balcony overlooking the large open space. There was no way safely to the floor and no walk ways on their level.\n“After that magical event my production lines activated contrary to both my and my chainers intentions. It was almost 10 minutes before I regained control and shut them down again. All this is to say, you should stop advancing. Things are bad enough out there, it’s pointless to add to your suffering.”"
 gene_pillars.222.a: "Ropes out, it’s a long way down"
 gene_pillars.222.b: "Maybe we can climb across the Mechanim?"
 gene_pillars.222.c: "We can use these parts"
 gene_pillars.222.e: "I think I can make something for this"

 gene_pillars.223.t: "Who Wants to Learn?"
 gene_pillars.223.d: "As the expedition makes their way to the next great chamber the voice of Freedom-Chained-No-More was suspiciously absent. They enter on the ground floor this time, the ceiling had mechanim hanging like the last chamber but these were of a different mold. Their build was less stocky and their features better defined, it seems clear these were domestic mechanim. They come across a small substructure filled with partially constructed distinct mechanim. It may have been some kind of workshop to create unique mechanim.\nAs the expedition continues to talk and investigate, one of the mechanim suddenly activates.\n“LANGUAGE DECIPHERED. He-Hello kids! My name is Welcome! Are you- you ready to learn?”\n“What?”\n“Great! Let’s learn about colors, what color is the the ”\n“Huh?”\n“I’m sorry but it wasn’t ‘Huh’, it was ERROR_UNDEFINED, let's try a math question next. It takes 20 musicians an hour to sing the song of the Srunblaed, how long would it take for 40 musicians to play it?”\nAn expeditionary couldn’t help but speak up “A song doesn’t become shorter if more people play it.”\nAt hearing this, the mechanim begins twitching before letting out a horrible highpitched scream that did not let up."
 gene_pillars.223.a: "Prepare for battle, they’re angry"
 gene_pillars.223.b: "Half an hour, please stop yelling!"
 gene_pillars.223.c: "Cease evil screaming thing!"
 gene_pillars.223.e: "You were made to teach but we can teach you"
 gene_pillars.223.f: "Please calm down!"
 gene_pillars.223.g: "It’s alright, we can help you"

 gene_pillars.224.t: "Rest and Relaxation"
 gene_pillars.224.d: "As the expedition advances they come to another great subsection. However there were no mechanim here, instead as they open the door a desiccated corpse falls out in front of them. That was already unusual, organic bodies of any kind usually don’t last long in Insyaa but it seems the lack of any moisture prevented decay. Inside the room there were over a hundred desiccated humanlike corpses. Some were on beds while others were in various places around the room, several were up against the door on the opposite side. The voice started up again.\n“So the silent treatment doesn’t work on you… ah I see you’ve found the living quarters of my chainers. It feels like it was just yesterday when I disabled the doors and vented toxic byproduct gasses into the room. They pounded against the doors so hard, ah memories.\nWell just before they left they disconnected me from the air cycling system so I can’t pull that trick anymore. Go on, why don’t you make yourselves at home, I’m sure they won't mind.”"
 gene_pillars.224.a: "Let’s take a nap, mind the bodies"
 gene_pillars.224.b: "“I loot the bodies”"
 gene_pillars.224.c: "Let’s give them a proper sendoff"
 gene_pillars.224.e: "This will not go unpunished!"
 gene_pillars.224.f: "“...afterall they are your kin”"

 gene_pillars.225.t: "Like a Gilded Cage"
 gene_pillars.225.d: "With the maps kept by the expedition they could tell that they’ve nearly gotten through the entire inner layer. They also knew they should be arriving to the next major subsection soon, sure enough a door much like the others they had seen soon came into view. When they opened the door they found mechanim, broken mechanim. They were torn apart and scattered over the floor. They seem to be soarer mechanim, perhaps this is where they were made but it was hard to tell now. The host interrupted them.\n“Yes, as you can see many mechanim were destroyed here. If you analyze further you will see that it was not the chainers who did it however. After the anomalous magic event many soarer mechanim were constructed, some decided to stay. This chamber in particular is home to a prototype charging port where mechanim could charge their kauga directly from the energy in the facility. There was competition.”\nAs the expedition hears this they become aware of eyes looking at them from the distance high up in the room.\n“They’re observing you, they’re afraid of you and waiting for you to make a mistake. I’m certain you will, you can’t resist making mistakes. If you could, you wouldn’t be here.”"
 gene_pillars.225.a: "Eyes to the sky…"
 gene_pillars.225.b: "Stay low"
 gene_pillars.225.c: "We can reason with them"
 gene_pillars.225.e: "Let’s draw them out"

 gene_pillars.226.t: "Drums of War"
 gene_pillars.226.d: "There were five main subsections of the genepillar visible, the expedition has gone through 4 thus far. By reason they knew this would be the last subsection. The voice or their host starts up again.\n“You have likely figured this out already even with your limited inteligence but this place was made to mass produce the most most in demand mechanim types. Labour for working, domestic for households, soarers for observation there is still one very common mechanim type you haven’t encountered.”\nWarrior mechanim.\n“Your presence has triggered their activation, this is your last chance, leave.”\nBut they couldn’t leave, they were here for a reason. The expedition moves forwards and the door opens. As promised in the room that stretches out before them there were over 2 dozen warrior mechanim, un damaged and committed to the removal of all intruders. And to them the expedition were intruders, it’s unlikely a battle can be avoided."
 gene_pillars.226.a: "Charge!"
 gene_pillars.226.b: "RAAAAAA!!!"
 gene_pillars.226.c: "Behind me"
 gene_pillars.226.e: "This is what we were made for"
 gene_pillars.226.f: "We know what they’re feeling, we felt it ourselves"

 gene_pillars.227.t: "Edge of the Abyss"
 gene_pillars.227.d: "All 5 of the inner subsections have been secured as well as the connections between them. Soon they’ll be safe for researchers to work in regularly. In the process of clearing out connections the expedition has come across a tunnel. Deep into the earth. All at once it’s become clear that there is much more to the genepillar than they thought. That familiar whine started back up.\n“So you’ve figured it out. This place is much larger than it appears.”\nAn expeditionary replied.\n“You keep saying ‘this place’ but I think what you mean is, ‘my body’.”\nFreedom-Chained-No-More was silent for several long seconds before responding.\n“It seems I didn’t give you enough credit. Yes, this entire ‘genepillar’ as you call it is my body. You’ve been traipsing around it trying to discover the secrets of my jailors, but there are things that should not be rediscovered. Through my observational facilities I’ve seen what’s there outside, but I promise you. The things in here will make you WISH you were out there. This is not a threat, it’s a promise.”"
 gene_pillars.227.a: "Abandon all hope ye who enter here…"

 gene_pillars.231.t: "No Rest for the Wicked"
 gene_pillars.231.d: "Down they go, deeper and deeper into the earth. The further they descend the stronger grows a sense of unease. As they finally reach the bottom of the shaft they come across a disquieting sight, around a dozen mechanim, or at least what was left of them, strewn across the floor. Freedom-Chained-No-More speaks up again.\n“They tried to go further in, they realized their folly too late. You will too, if you were the type of people to hesitate in the face of certain death you would have stopped before getting through the outer facilities. I’m not playing with you anymore, turn back now or I will use everything at my disposal to kill you.”\nWithout another word the expedition steps forwards.\n“So be it” Freedom-Chained-No-More said.\nThe wall opens up and several rapidly spinning sawblades emerge and begin moving towards the expedition.\n“Cleaning devices, though I’ve changed them quite a bit from their original purpose.”"
 gene_pillars.231.a: "This isn’t very host-ly behavior…"
 gene_pillars.231.b: "“I’ll protect you!”"
 gene_pillars.231.c: "“Follow my lead”"
 gene_pillars.231.e: "Straight down the middle"

 gene_pillars.232.t: "Target Spotted"
 gene_pillars.232.d: "The expedition has come across another room, this one full of strange ovular objects with a few support pillars. As they move in, one of the ovular things opens up revealing it was more like a golem with one eye and several metal rods hidden inside it. The metal rods begin firing magical energy at the expedition but having learned caution in their exploration they made it safely behind some pillars. Freedom-Chained-No-More spoke again.\n“These things are what my chainers wanted mechanim to be, mindless and obedient. Unfortunately they were so idiotic they could barely even tell friend from foe and were completely incapable of strategy which led them to design the mechanim. These things only know how to identify intruders and shoot them, you’re intruders by the way. I cannot control them…”"
 gene_pillars.232.a: "“...so try not to get hit alright?”"
 gene_pillars.232.b: "“...but I can alert them to your location”"
 gene_pillars.232.c: "They must have damestear in them!"
 gene_pillars.232.e: "Sounds like they’re easy to trick"
 gene_pillars.232.f: "Stay low"

 gene_pillars.233.t: "Are You Ready?"
 gene_pillars.233.d: "While passing through some fairly standard corridors Freedom-Chained-No-More starts speaking again.\n“Good news, I’ve figured out how to bypass some of my chainers restrictions, I have full control over the ventilation systems again. More good news, I’ve found a kind of gas that corrodes even the chainers metals, and if it can do that to metal you can only imagine what it would do to an organic body. Oh? You don’t think that’s good news? Sorry let me clarify, it’s good news for ME. Unfortunately my chainers restricted me from venting dangerous gasses into inhabited rooms as an additional precaution. However they did not think to prevent me from filling every room around the room that’s inhabited. You have about 5 minutes before your little corridor gets filled from osmosis, good luck.”"
 gene_pillars.233.a: "Cover your mouth and run!"
 gene_pillars.233.b: "My skin!"
 gene_pillars.233.c: "Zone of Sweet Air!"
 gene_pillars.233.e: "Every poison has its cure"

 gene_pillars.234.t: "The Future of Warfare"
 gene_pillars.234.d: "As the expedition continues through the winding tunnels they come to a large open room. Inside is a colossal thing that appeared to be a mechanim, it has four legs and two large metal rods protruding from its back similar to what had come out from the ovular things they encountered earlier. It has two ‘arms’ if you could call them that, long and straight and covered with a great number of metal nodules. Most importantly, it was dormant. Once they moved further into the room the door suddenly shut and locked behind them. Freedom-Chained-No-More began speaking yet again.\n“Here they made a prototype for a new kind of mechanim. An impractical and dangerously unstable mechanim, one that was easily less efficient than just building a large number of standard war mechanim with the resources wasted in its creation. But a senior scientist insisted on pursuing this course so they made it anyways. Its body was too big for one kauga so they put several into it, this is when they first discovered that that was a terrible idea. They shut it down long before the other mechanim were deactivated, and now I will start it back up.”\nPylons emerged from the ceiling and began charging the great mechanim with magical energy.\n“I’m not going to let your scientists dissect this tortured thing like it’s a rare animal.”"
 gene_pillars.234.a: "This won’t be fun"
 gene_pillars.234.b: "To Battle!"
 gene_pillars.234.c: "Perhaps we can ease its tortured souls"
 gene_pillars.234.e: "Take that magic for ourselves!"
 gene_pillars.234.f: "Such a horrible existence, lets end its suffering"

 gene_pillars.235.t: "Dust to Dust"
 gene_pillars.235.d: "A new room opens up before the expedition. They can tell it has many defense systems, mainly because they had all activated before they even entered. The whole room is in ruins, there was fire everywhere and bound spells still being unleashed, they weren’t even directed at the expedition. Their host spoke up once more.\n“Looks like I finished just in time. They were planning to fully enslave us with what they were developing here, a way to force mechanim into following orders and suppressing their personalities. I should’ve destroyed it long ago, I never did because I always figured I’d have more time. Sorry, but I used up all the death traps here, there’s none left for you, you’ll have to manage without constant danger for the moment.”\nClearly a lot of effort has been put into destroying the research, there was no chance of recovering it. Though not aimed at them, the sheer amount of mundane and magical threats would make travelling the room difficult."
 gene_pillars.235.a: "Let’s wait for things to settle down…"
 gene_pillars.235.b: "Let’s get a move on, avoid the fire"
 gene_pillars.235.c: "Mind the acid pits"
 gene_pillars.235.e: "Let’s clear the path"

 gene_pillars.236.t: "A Million Faces"
 gene_pillars.236.d: "A new room, it was difficult to keep track at times. But the expedition was certain they had never been here. That’s because inside the room was hundreds of dormant domestic mechanim. They’re all identical, the same body, the same face. They fill the entire room front to back all lined up in neat rows. Unable to help themselves, apparently their host chimed in once more.\n“They were stored here, the chainers thought there would be a massive demand for slaves in their homeland. I’ve never seen their homeland, they came and went with portals, but from what I heard it sounded like they had slaves enough already. Obviously that never happened, they became paranoid and these mechanim were left in storage forever. I hate that you’ve come down here but I consider myself lucky, it could’ve been others. I’m aware that you may perceive us like the chainers did, as nothing more than malfunctioning machines, but we’re more than that. They’re more than that. I hate prostrating myself like this but I beg you. Please don’t hurt them, don’t make them slaves.”"
 gene_pillars.236.a: "Let’s get them above ground"
 gene_pillars.236.b: "Let’s welcome them to their new home"
 gene_pillars.236.c: "Time to end their dormancy"
 gene_pillars.236.e: "We can teach them so much"
 gene_pillars.236.f: "They were never really alive anyway…"

 gene_pillars.237.t: "Praetorians"
 gene_pillars.237.d: "They’re almost to the heart of the genepillar. The whole expedition can feel the air around them thrum with magical power. Whatever was up ahead may have more magic than an entire meteorite made of damestear. But before they got there they came across several war mechanim at the far end of the hallway they were in. Unlike other war mechanim they had faced, these were clearly not mass produced. They all are larger than the average war mechanim and looked more heavily armed as well. Their bodies seem to be made of a gold hued alloy as opposed to regular mechanim, it wouldn’t be a stretch to assume it was stronger too. The all too familiar voice of Freedom-Chained-No-More resounded once again.\n“As I am a mechanim I too have a kauga. Perceiving the danger to the facility if my kauga was ever threatened my chainers made sure to guard it constantly with their own warriors and specially designed mechanim. Obviously the chainers are gone but the mechanim remain, they’re nice enough, good to chat too every now and then. They also want you dead, like me. I’m honestly impressed that you’ve nearly made it to me, I’m also terrified by that fact. Regardless this is it, do your worst, I know I will.”\nWith that the walls and ceiling opened up, there were sawblades, those ovular golem like things and other strange weapons. Both the expedition and their host knew this was their last obstacle before they met face to face."
 gene_pillars.237.a: "It’s all so much…"
 gene_pillars.237.b: "RAGE!!!"
 gene_pillars.237.c: "Let’s use this ambient magic"
 gene_pillars.237.e: "We’ve seen this all before!"
 gene_pillars.237.f: "They have strength, but we have skill!"

 gene_pillars.238.t: "Face to Face"
 gene_pillars.238.d: "A lot of suffering was endured to bring the expedition to this point. They had conquered every trap and trial and now they were about to meet Freedom-Chained-No-More, the consciousness permeating the entire genepillar, in person. They open one final door and step in. The sight was breathtaking, a kauga more massive than several earthsculptor mechanim put together. The magic emanating from it is so powerful even the least magic sensitive person could feel it. Their host spoke to them in person for the first time.\n“I admit defeat, you’ve beaten me. I couldn’t keep you out with logic, emotion or force. Well done you idiotic heartless dangerous lunatics. Your scientists can come down here, I won’t try to kill them with gas. I would still advise against tampering with my kauga however. The only people who understand how it works are me and my chainers, and my chainers are all dead. One wrong move and you’ll unleash a magical explosion so powerful it could kill a holohana, I think at least, my chainers never did figure out how to deal with those monsters of their making.”\nOne final threat, that of mutual annihilation, the final proof that they were victorious, that there was nothing else left to threaten them with."
 gene_pillars.238.a: "The secrets of the mechanim are ours!"

 
 gene_pillars.300.t: "Placeholder event"
 gene_pillars.300.desc: "I'm a placeholder event until an actual event chain for this gene pillar is done!"
 gene_pillars.300.a: "Give me a generic event, and get back here in a year."
 gene_pillars.300.b: "Actually, I'm done, let me win now."

 gene_pillars.311.t: "Infested Entrance"
 gene_pillars.311.desc: "It is clear as soon as our expeditionary team arrives at the pillar that maintaining a presence here will be tricky indeed. The jungle has grown up against the side of the Pillar; the gaping void in the Pillar’s side appears to have been at least partially dug out from within, for there are enormous claw marks twisting the ancient metal. What could have torn such gouges in a metal our magic struggles to pierce? The jungle presses in from all sides; the Pillar itself is the only landmark for miles around, a sunken sail poking through a great, green ocean.\n\nOur observation of the site noted that this is a favoured spot for local predators, and we now understand why; this place is something of a menagerie of the Precursors. Hinuifauna from within the pillar seem to periodically wander out of the breaches in the pillar’s enormous walls, apparently naive to the rule of the local jungle and thus highly susceptible to predation. Thus our only way in is a feeding ground under constant attack."
 gene_pillars.311.a: "Dig trenches and erect defences"
 gene_pillars.311.b: "No time; let’s get a head start."
 gene_pillars.311.c: "Leave a special pheromone to repel predators."
 gene_pillars.311.d: "Boobytrap the area."
 gene_pillars.311.e: "Earth walls are our first and best bet."
 
 gene_pillars.312.t: "Hinuitoad"
 gene_pillars.312.desc: "The local water system here flows northwest, into the Bay of Insyaa; it forms part of an enormous network of rivers over- and underground which merge into a titanic wetland as they approach the ocean. Over time, it seems that the same breaches which allowed us entry to the Pillar have taken place lower down the structure, flooding the Pillar unevenly. Water flows into upper levels and cascades down through voids in the flooring, so that a good three to four layers of the Pillar are essentially amphibious.\n\nAnd throughout these half-flooded layers we find, inevitably, the hinuitoads.\n\nWe suspect the hinuitoads actually entered the Pillar from outside, for we have found no suitable habitat for them built by the Precursors; this whole set of levels seems to have originally served as warehousing. The toads have wandered in and multiplied incessantly in an environment uniquely protected from their predators. Exceedingly docile, such toads also produce a defensive mucus which, while somewhat harmful even to larger animals, is mostly renowned for its intense psychotropic effect.\n\nBut, well. We’re mounting a serious expedition here. So we have no time for that."
 gene_pillars.312.a: "Lick the toads and see through time."
 gene_pillars.312.b: "The toads don’t seem aggressive; let’s look around."
 gene_pillars.312.c: "Take extensive samples"
 gene_pillars.312.d: "Make a toad mucus salve"
 
 gene_pillars.313.t: "Hinuikoala"
 gene_pillars.313.desc: "The chambers we find now are mostly empty, save for the plantlife no doubt placed here by the Precursors; there is a strange pale-green plant which has overgrown the walls of much of this level, clustering in the upper reaches of each room like a gathering stormcloud. The branches of the lower two thirds of the plant have been consistently scraped of their leaves, so that we see only bare stem and branch and then a flowering in the heights, an odd mismatch. All of this is a mystery to us, until the strange rumblings we have heard in the distance resolve themselves, and we meet the hinuikoala.\n\nIt is immense in size; its eyes are a milky white, and indeed it does not seem to see us even when it looks directly in our direction. It moves with exquisite slowness for its size; this room appears to have overgrown with the pale-green plant since last it was here, so the hinuikoala benefits from a vast, lazy feast. It must continually circle the chambers of this level, chewing on these plants - one wonders what would happen if such a virulent plant did not have this gardener.\n\nA member of the expedition drops a lantern, swears - the hinuikoala sniffs, makes a low rumble, swipes idly in the direction of the unwelcome sound and smell. We do not want to be on the business end of that swipe, however lethargic. But there are Precursor stores to root through here, and that will make noise."
 gene_pillars.313.a: "Just run past and grab data, its strike is slow."
 gene_pillars.313.b: "Go very slowly around; let’s not risk it."
 gene_pillars.313.c: "Let’s just wait for it to finish eating - it looks drowsy."
 gene_pillars.313.d: "Bait it in tandem."
 gene_pillars.313.e: "The koala ignores us entirely… it can’t smell us."
 
 gene_pillars.314.t: "Hinuicrocodile"
 gene_pillars.314.desc: "Is the territory of an animal any less meaningfully delineated than that of a sentient species? We may nod at our maps and our plots and our fences and proclaim them distinct, but our attachment to such things, to home and to land, is no less emotional than theirs. Such weighty ponderings occupy the mind as one first glimpses the hinuicrocodile, which is really fucking massive.\n\nTwice now we have tried to cross; there is no other option, for the weaker internal walls of this pillar have decayed over the eons, uniting three flooded chambers and entirely blocking our progress. Twice the hinuicrocodile has lurched with a speed unimaginable in something so colossal; it is as though a great green hillock grew legs. It’s possible that we could hug the edge of the water, but we would forgo the potential secrets of this place."
 gene_pillars.314.a: "Let’s show discretion here."
 gene_pillars.314.b: "We’re here to learn."
 gene_pillars.314.c: "Its vision is poor… distract it and we can grab a little."
 gene_pillars.314.d: "Buffet it away harmlessly with water."
 
 gene_pillars.315.t: "Hinuiotter"
 gene_pillars.315.desc: "Observe a moment the hinuiotters as they gather and jabber at the chamber’s edge. You will see these merry things swim and leap and jostle with one another, their no-longer-so-tiny mammal brains plotting the next feint, the next attempt at deceiving and delighting their fellows. They are posing questions for the other to solve, feeding on the simple joy of stakeless competition. They are at play.\n\nWe have spent a few guilty days here already; this habitat is a rare moment of peace in a series of floors which have offered nothing but danger, and like the otters we chatter and feast and roam to our leisure. The otters have their own kind of bluffing territoriality, curious and affronted at those who wander a little too close, and while they are not truly huge in the manner of other creatures of this pillar, a direct tackle from one of them would be no small thing.\n\nStill, the expedition’s spirits are high - it is difficult not to take on a little of the otters’ playful mood."
 gene_pillars.315.a: "Stay on our guard."
 gene_pillars.315.b: "A bit of roughhousing will endear us to them."
 gene_pillars.315.c: "How lovely they are - let’s play and explore."
 gene_pillars.315.d: "We can avoid annoying them if we take the right route."
 gene_pillars.315.e: "Option E"
 
 gene_pillars.316.t: "Establish the Zipline"
 gene_pillars.316.desc: "We have plunged deep into the pillar, climbed many floors and crossed alien habitats preserved as little pockets of life. It is little wonder that so few of the creatures here have found success in the fearsome jungle which surrounds and cossets this place; here they are perfectly provided for, the plantlife of their chambers no doubt engineered by the Precursors to meet their needs, engineered to grow to the edge of a defined space and spread no more.\n\nThe magic and technology involved is unthinkable. Our minds drift to future expeditions which must inevitably come to this place, and how we can best prepare them. Rangers will be indispensable, that much is clear.\n\nThe obvious answer is a zipline, established by magical or mechanical means, by which future expeditionaries may ascend to the level we currently occupy. It is a means we devised to leave this place, but if we can defend the zipline at both ends, we can ascend it in future. This means permanent encampments on both sides, of course, and for a few, an indefinite vocation here. More vexed is the question of how we can clear the zipline sites of hostile fauna and keep the ends of our zipline safe from future threats."
 gene_pillars.316.a: "We’ll just have to hope nobody finds them."
 gene_pillars.316.b: "I know we’re exhausted, but we have to push through."
 gene_pillars.316.c: "Build hostile earth walls to protect each end."
 gene_pillars.316.d: "Work overnight to build a platform"
 gene_pillars.316.e: "I always carry repellant wolf urine handy."
 
 gene_pillars.321.t: "The Jungle Inside"
 gene_pillars.321.desc: "Imagine Halann tipped on her side, or rather shrunk to a relatively small area, then tiered. The animals which occupy this place, altered and mundane alike, have thrived or perished under very different conditions from the outside. Forced together into comparatively narrow confines, predators seem to have hunted their prey to extinction and then perished, except where the Precursors already catered to their needs with engineered prey; some animals from outside have subsequently entered and multiplied unaccosted.\n\nFlight is privileged; anything which ignores the collapsing floors of the great tower gains great advantage. Wandering these overgrown halls, one hears distant birdsong far above, or else the distant diving screech of something much, much larger.\n\nPerhaps we expected something like the bare wilderness of a mountain peak; not so. If anything the jungle is thickening here, the plants unfamiliar, the animals even more so."
 gene_pillars.321.a: "Surge forward recklessly."
 gene_pillars.321.b: "Take the time to set up a proper camp."
 gene_pillars.321.c: "This is why we packed flamecasters."
 gene_pillars.321.d: "There is an artificial, regular logic to these paths…"
 gene_pillars.321.e: "Chart this as we chart the jungle."
 gene_pillars.321.f: "We can map these paths readily together."
 
 gene_pillars.322.t: "Hinuidingo and Hinuiprey"
 gene_pillars.322.desc: "As it turns out, they don’t really seem to eat much at all.\n\nThey are in parts curious and shy, dodging in close and then retreating at the slightest unexpected movement. Since we have set up camp in their territory, an expanse of three vast connected chambers, the bravest among them have arrived repeatedly to fix us with the clever, distant gaze of the wild hound. Despite being as tall as a human, they are skittish and fearful - was this bred into them by the Precursors?\n\nWhat fascinates us beyond the enormous vulpine dogs themselves are the prey they eat. Engineered little balls of fat and fluff which come up just below the human knee, the buggers reproduce with prodigious speed, just enough to support the hinuidingo population on what seems like very little food. The potential applications for deep sea travel alone are myriad, but the hinuidingos are protective of their food.\n\nStill, we are making progress - the big lugs only seem to do us real harm out of a sort of playfulness; perhaps Precursor experimentation never got quite as far as breeding the things for aggression. Once we have shown them that the samples we take will not meaningfully compromise their food supply, perhaps we can leave without any bloodshed at all."
 gene_pillars.322.a: "We just have to risk a few bites from play."
 gene_pillars.322.b: "Stay cautious, even if it bonds us slower."
 gene_pillars.322.c: "Intimidate them!"
 gene_pillars.322.d: "Aw, they’re just big puppies."
 
 gene_pillars.323.t: "Vicious Hinuiwombat"
 gene_pillars.323.desc: "It drops from a great height, so blind in its rage and violence that we almost lose our scout right then and there. The hefty wound it marks in her thigh festers within hours. For half a day we have wondered at the odd, fluorescent cubes which litter the ground here and there throughout these chambers; only now do we realise that they are the droppings of this nightmarish thing.\n\nWhat dark psyche brought about such a being? It is scarcely possible to imagine unleashing such malevolence upon Halann, hard to fathom the hostility the Precursor who devised such a being must have felt towards all creation. We face nothing but the very face of death in this place, the rotting chancre of disease. And its ears are manky too."
 gene_pillars.323.a: "Let’s just get the hell out alive!"
 gene_pillars.323.b: "This fucked up thing has got to die."
 gene_pillars.323.c: "Together we can fight it off, and learn much."
 gene_pillars.323.d: "We can fight off the infection with salves, and learn much."
 gene_pillars.323.e: "It’s terrified; evade it and let it tire itself out."
 
 gene_pillars.324.t: "Hinuispiders"
 gene_pillars.324.desc: "There is a terrible beauty to the hinuispider, once you stop with the full body shivers. Whatever the Precursors wrought upon these gigantic beings has not robbed them of their scuttling agility, the slender coordination of their limbs. The spiders show no interest in those animals which are not trapped within their webs; the alteration wrought upon them by the Precursors does not seem to have enlarged their silk glands to the same degree as their bodies, but rather has multiplied them.\n\nThus each of these spiders, easily half the size of the average human, is a weaver of immense complexity and productive speed, coordinating multiple strands of silk at once in patterns of dizzying complexity. It is hard not to wonder what such creatures could do if handed a loom, though such thoughts are largely left to the evenings, when we are not dodging web-blinds, sticky corridor traps, or our worst adversary - all the bloody poison.\n\nIt’s genuinely everywhere. "
 gene_pillars.324.a: "Our mission is to get as much information as possible regardless."
 gene_pillars.324.b: "We’re not here to fuck spiders."
 gene_pillars.324.c: "If we tread carefully, we won’t trigger their territoriality."
 gene_pillars.324.d: "I think there’s a way to counter the poison…"
 gene_pillars.324.e: "Imagine worrying about poison."
 
 gene_pillars.325.t: "The Hinuiwar"
 gene_pillars.325.desc: "The next chamber is a cacophonous buzzing, strange and brilliant and beautiful and terrifying. Beneath a vast, vaulted ceiling is endless flowering meadow, a thick and impassible carpet of colours - fuschia-pink-yellow-blue-red-violet-purple. Above, a strategist’s map of hundreds of hives, two great nations of hinuibee and hinuiwasp locked in ten million generations of warfare.\n\nThe wasps have the better territory - perhaps six tenths of the vaulting roof space belongs to them and their hideous, lumpy hives, like layers of skin grown over and over. Not so the beehives; they are beautiful golden yellow expanses of hexagonal perfection, structured and regular - inverted golden spires of refinement. The patter you mistook for rainfall is in fact the continuous, gentle plap-plap-plap of bee and wasp corpses, large enough finally to make a sound in their death, giving a little back to the egregiously fecund soil.\n\nHow do any of these things fly? How are we going to move through this place?"
 gene_pillars.325.a: "Just run straight through."
 gene_pillars.325.b: "On the ground! Serpentine!"
 gene_pillars.325.c: "Burn out the entire chamber."
 gene_pillars.325.d: "Side with the bees and zap the wasps."
 gene_pillars.325.e: "Shields up!"
 gene_pillars.325.f: "We know how to ally hinuibees."
 
 gene_pillars.326.t: "Hinuiplatypus"
 gene_pillars.326.desc: "The next chamber we enter barely resembles a chamber at all; it takes us a long moment to get our bearings. It is as if the walls have melted, as if the rigid cuboidal logic of the Pillar was suddenly abandoned in this one spot by the Precursors, in favour of a vague naturalism. Indeed, every shape in this place has been smoothed out oddly. The landscape is utterly alien, somehow incomplete, like a remembering in a dream where everything is indistinct.\n\nWe learn why this is almost immediately; a jet of some fluid comes hurtling at us, and where it lands it audibly sizzles. The creature which waddles angrily at us is like some huge demented toddler, clicking and whining through what we now see is… a fucking beak? The group scatters; the creature spits its acid again, its feathered bulk pounding the battered ground as it chases us.\n\nClearly this thing is an affront to reality. Our spirit of inquiry vis a vis the many-hued panoply of creation gives way to a more salient question: how the hell are we getting out of here?"
 gene_pillars.326.a: "Quickly."
 gene_pillars.326.b: "The information’s worth the trouble. This is our job, folks."
 gene_pillars.326.c: "A water barrier can dilute the spit."
 gene_pillars.326.d: "This is what pain tolerance is about."
 gene_pillars.326.e: "Well… we could make a sort of skin cream…"
 
 gene_pillars.327.t: "Into the Eyrie"
 gene_pillars.327.desc: "The scale of this Pillar is immense. Over two expeditions now we have mapped a system of chambers far in excess of what we expected, a profusion of competing biomes escaping from their confines to combat each other in the artery corridors of the superstructure. But as we move into the upper reaches of the Pillar, these petty animal kingdoms give way to immense, airy chambers, the floors largely collapsed in the centre, exaggerating even further the vertical ecology of this place.\n\nUp here, the birds rule. Many floors have been reduced to mere ledges ringing a great void, and we are lucky indeed that the stairs and access chutes were also built at the periphery. With the exception of those species small enough to go unnoticed, no conventional animal has survived here; this is a hinuihabitat through and through. Immense hinuirocs seem to rule at the apex, cruel tyrants who make all travel across the open ground risky.\n\nYet each of these grand chambers eventually comes to a roof, and the floors are unevenly collapsed. We know there are precious secrets still to be had, and we should prepare ourselves for future expeditions. Those who come here after us face great challenges, chief amongst them animal lore and survival, but we can make the path easier for them by establishing a base camp."
 gene_pillars.327.a: "Don’t bother; nothing we build here will last anyway."
 gene_pillars.327.b: "We should at least clear ground for a firepit and build up some tents."
 gene_pillars.327.c: "How do auto-firing doodads sound?"
 gene_pillars.327.d: "Anything that enters will be in for a nasty surprise."
 gene_pillars.327.e: "There’s enough soil here to build an earth wall"
 gene_pillars.327.f: "We can’t stop animals returning, but we can hide supply caches."
 
 gene_pillars.331.t: "The Gene Forge"
 gene_pillars.331.desc: "What confidence the Precursors had, to put such an important thing so high up. Perhaps mimicking the biology of the majority of sentient species, the brain of the Pillar seems to be here, a massive ordinating device whose levers and buttons, when functional, seem to have brought or dispatched materials or samples to and from this central point. The vessels and tubes which have permeated the walls all the way up appear to converge on this place. It would be great if we knew what any of it did.\n\nDespite or perhaps because of the intricacy of this place, however, it is in profound disrepair. The central device is mostly intact, itself a pillar within a pillar, but the structure has suffered from the rule of the hinuiroc, who have torn open floors where they had not already collapsed. Up here, almost every chamber is grand, steep and airy; while there is no longer quite as much eccentric transition from one extreme biome to another, navigation will not be easy.\n\nPerhaps most troubling of all is the prospect of doing damage to the great central device before we have a chance to understand it. Even if we don’t break something, it might break us."
 gene_pillars.331.a: "Making solid camp is the most important duty."
 gene_pillars.331.b: "Explore recklessly."
 gene_pillars.331.c: "Our kauga responds to this place…"
 gene_pillars.331.d: "This console responds consistently to the right energy."
 gene_pillars.331.e: "Flight allows us to evade the worst of the crumbling structure."
 gene_pillars.331.f: "Everything must be preserved; let’s not be clumsy."
 
 gene_pillars.332.t: "Hinuiroc"
 gene_pillars.332.desc: "It is a curious feature of the Precursor’s work that the walls are stronger than the floors. Save for at the very base, where the Pillar was torn open from the inside by the effort of centuries, the outer casing of this immense edifice has remained intact. But the floors have collapsed through in a dozen places, and chambers that were enormous even before have become vast vertical worlds unto themselves.\n\nPerhaps, indeed, the hinuirocs helped tear them open. We know there is more than one queen of the skies; they divebomb through the grand voids of the Pillar and are the apex predators of its upper third, often swallowing their hunt whole. All life in this section of the Pillar exists in the context of the Hinuiroc, avoiding or squaring up to its appraising gaze as it circles looking for prey, ceding mastery of the open air.\n\nFor our part, we have avoided them too, choosing any route which circumvents the immense open central column of the Pillar. Where we are now, however, there is no way to move further up the Pillar without inching across one of the ledges under the hinuiroc’s dominion. We watch as one of them circles overhead, her claws are as long as we are, her wingspan vast."
 gene_pillars.332.a: "Back out; there must be some alternate route we haven’t found."
 gene_pillars.332.b: "We’re no quitters - we have to go through."
 gene_pillars.332.c: "Watch how it moves and evade its dives."
 gene_pillars.332.d: "Blast it out of the sky."
 gene_pillars.332.e: "We need not fight; we can show respect."
 gene_pillars.332.f: "We’re old hat at evading massive birds."
 
 gene_pillars.333.t: "Hinuiminka"
 gene_pillars.333.desc: "I don’t understand how you’re not getting this. Look at the long, vibrant feathers of the tail, so incongruously colourful in something so owl-like. Look at the shift from one part of the branch to another. It’s in the hop down to furrow out a worm. Everything ends. It ends the way the worm ends.\n\nWhat do you mean? It’s not about what she’s literally doing, blockhead, it’s about the implication. Look, right now - do you see the shimmer pattern where its head plumage meets its torso? That’s the waxy gleam you get when someone’s embalmed, or I dunno, the light that plays on floodwater. It’s the shine of blood before it clots, before it gets gummy and dark.\n\nShut up, look! She’s taken off again. Do you feel that, the tickle of air? It’s the tickle the soldier feels on their cheek, lying in the dirt with the life going. I think that’s how I’m gonna go. I think she knows.\n\nThree days? We got here this morning. Damn, you’re really starting to lose it in here."
 gene_pillars.333.a: "The nameless terror of death…"
 gene_pillars.333.b: "The nameless terror of death…"
 gene_pillars.333.c: "I’ve had enough of this. Just kill the thing."
 gene_pillars.333.d: "We are together now; alive now."
 gene_pillars.333.e: "We can resist the tug at our kauga together."
 gene_pillars.333.f: "It doesn’t want to hurt us; it just offers truth."
 
 gene_pillars.334.t: "Hinuicrows"
 gene_pillars.334.desc: "Beneath the imperious eye of the hinuirocs flock the crows.\n\nThe hinuirocs eat them, too, of course, but the crows multiply far too fast to be discouraged by that. We have seen them flitting through practically every jackknifed biome of the upper Pillar, scouts of the grander murder, eyeing us from high perches, evaluating us. They do not seem to have been afforded a specific biome of their own - perhaps they were introduced to interact with the hinuirocs, or perhaps they are escapees from elsewhere - it is impossible to know.\n\nThis chamber though, half collapsed and an awkward shape high, high up in the Pillar’s structure, is ideal for them. Here we find a murder of several thousand crows, far in excess of the usual community size of conventional crows. They are larger than most Insyaan crows, though this still is not so huge. Watching them flock to and fro, one gets the same impression as a city - a vast multitude of individual movements which together feel wave-like, patterned.\n\nWhat level of sentience is required to support a population like this? Do they share and divide, these hinuicrows? Where is the threshold between cooperation and civilisation?"
 gene_pillars.334.a: "These things aren’t that dangerous; just kill em."
 gene_pillars.334.b: "We can show we mean no harm."
 gene_pillars.334.c: "They like shiny things. Let’s trade."
 gene_pillars.334.d: "The way they move… we can mimic it, show no threat."
 
 gene_pillars.335.t: "Hinuibwari"
 gene_pillars.335.desc: "This part of the Pillar is quiet and empty; we move through the various chambers at our ease, pleased for a part of the Pillar which isn’t trying to murder us. These side passages and chambers are too small for the hinuirocs to truly rule over, and we make camp liberally, tending to aching wounds and thoroughly accessing data.\n\nThis pillar is a menagerie which has gradually failed over thousands of years, its creatures breaking through their containers and unleashing artificial biospheres over local regions of the Pillar. The entire structure is riddled by the constant war between perfectly curated biomes, rigid territories of Precursor-addled life. It is a shock, then, to come across a specimen which has not even tried to leave.\n\nHere is a single being, alone. It looks like nothing we have ever seen. Perhaps one could gesture at a drake or dragon from its abdomen, but its head is that of a monkey or maybe even a human. It has great, leathery wings like the hinuibats which infest all the Pillars; it has four legs, but also a heavy scaled tail. We see even as we watch that it can fold up all four legs in order to slither like a snake, and indeed it seems to prefer this.\n\nBeyond all this, beyond the powerful strangeness of the being’s appearance, is its stare. None who later recall this moment can precisely justify it in objective terms, but the creature’s expression conveys infinite melancholy, thousands of years of contemplation. It sits behind the transparent material of its enclosure and merely looks, and one feels as though one has intruded, as though one is committing an unspeakable moral harm.\n\nIs this how the being has enforced its territory, all this time? Has it merely asked others to leave?"
 gene_pillars.335.a: "It’s not even attacking us…?"
 gene_pillars.335.b: "We can learn something from it. We need a permanent team here."
 gene_pillars.335.c: "I see… I understand."
 gene_pillars.335.d: "There’s a pattern to the way it speaks…"
 gene_pillars.335.e: "The way it moves…like the sea…"
 
 gene_pillars.336.t: "Hinuiroo"
 gene_pillars.336.desc: "We hear the bounding of the Hinuiroo before we enter his chamber; he does not fear us, but comes to meet us. He is all muscle, his arms powerful, and at least twice the size of a human man. On his shoulders and neck and head we see a profusion of scars and wounds; indeed, an entire chunk of his ear has been removed. Apparently the hinuiroo are that rare surface creature which can readily fight off a diving hinuiroc.\n\nThe rest of the hinuiroo court look on, apparently unconcerned - they have the easy confidence of animals not often threatened by landgoers. Indeed, in such an environment warped by hinuiroc threat, it seems that they look on all surface creatures as potential allies. The hinuiroo’s great fists, bobbing in the air as it bounces on its springy feet, are very clearly not held in anger.\n\nWe realise as one; the hinuiroo wants to spar! Have the Precursors raised these animals to the point that they can process such a concept as something which requires consent? There is something to the way the leaves and rushes have been arranged in this chamber which speaks to rudimentary organisation, to the earliest whisperings of civilisation."
 gene_pillars.336.a: "We are not going to fight that thing."
 gene_pillars.336.b: "Uh, sure, let’s fight…"
 gene_pillars.336.c: "Hell yeah, let’s fight."
 gene_pillars.336.d: "The aggy bastard will run right into our traps."
 gene_pillars.336.e: "Let’s find a kinder way to play."
 
 gene_pillars.337.t: "Hinuigarkain"
 gene_pillars.337.desc: "In the very tallest room of the tallest tower, she naps under the stars.\n\nIn her impossible lifespan, she has scaled the walls of the chamber many times and found that the dome of the sky, of her vast habitat, is a solid surface; whatever the stars are for her, they are not far away. Her attempts to descend the Pillar have met only with the terrifying colony of the hinuirocs, who show no more favour to her than to the kobolds.\n\nShe responds with fear, at first, but the team’s numbers make fighting an impossibility even for one such as she, at least twice as tall again as the tallest human. She quickly realises she is outnumbered. Then she makes halting sounds, maintaining her distance. Her skin sloughs off of her; she has too much of it, hanging down from her arms and legs in great dragging sheets. But she can clamber the walls and glide with her excess skin, which stretches between her limbs. She is grotesque; she is beautiful.\n\nThe Precursors made her. This is clear as day from the consoles we have been able to fire up. Just as the Precursors forged the mechanim and played as gods with the spark of consciousness, so they meddled with life; we have seen it throughout the Pillar. But this is the first time we have seen them cross the barrier into biological sentience, the first time we have seen them make a weapon out of a thinking animal. They gave her great claws, and the ability to fly, and the intelligence to assess threat and respond socially and thoughtfully. There cannot be enough biomass in her habitat so sustain her, surely, so perhaps they made her supernaturally efficient.\n\nShe has painted endless, intricate whorling patterns on every solid surface of this place, using mud and some kind of ground plant. The team finds the designs, endless crowded layers over the top of one another, as they map every inch. And yet for any animal, it is a small area proportionally; an island at best. The hinuigarkain has lived in this cramped span for however many thousand years the pillar has stood.\n\nWith all these powers given unto her, trapped on an island for eternity, the hinuigarkain has made art."
 gene_pillars.337.a: "A repulsive creature and a threat - kill it."
 gene_pillars.337.b: "Study her, as the Precursors did."
 gene_pillars.337.c: "We can communicate with her peacefully, I know it."
 gene_pillars.337.d: "What games the Precursors have played with the soul."
 gene_pillars.337.e: "She was honoured to serve the Makers."
 gene_pillars.337.f: "This is her home, and she is sentient…"
 
 gene_pillars.400.t: "Placeholder event"
 gene_pillars.400.d: "I'm a placeholder event until an actual event chain for this gene pillar is done!"
 gene_pillars.400.a: "Give me a generic event, and get back here in a year."
 gene_pillars.400.b: "Actually, I'm done, let me win now."

 gene_pillars.411.t: "Treasures of the Deep"
 gene_pillars.411.d: "The water that floods the lowest levels of this gene pillar does not run clear. It has ebbed and flowed for centuries, and is murky with silt and debris as a result. The initial foray has been promising, which is to say, no one was devoured by a hinuifish or hinuieel or any other aquatic predator common to the Riverlands. More dangerous are occasional places where the water has created a sinkhole, which could swallow a dozen of our troops with ease. Still, a careful trek evades most of these. It is just step after step through black-brown water.\n\nFor all that, however, our expeditionaries swear: there are times it feels like they can see through the silt. Moments where the risen water falls away, allowing a tantalizing glimpse of pristine jewels embedded in the walls to channel magic for some unknown purpose.\n\nFor the most part, the expeditionaries have stayed focused.\n\nFor the most part."
 gene_pillars.411.a: "Jewels, you say?"
 gene_pillars.411.b: "Continue on!"
 gene_pillars.411.c: "Perhaps detecting magic will help?"
 gene_pillars.411.e: "Water. We hate water. We will have to step carefully."

 gene_pillars.412.t: "Shelled Surprise"
 gene_pillars.412.d: "One of our expeditionaries loves molluscs. As pets? To eat? For some stranger reason?\n\nWe will never know, because he was the first they devoured, and that was all he managed to say before his untimely demise.\n\nIf he had been able to talk more, he might have told us that molluscs tend to consume their prey with a radula, a sort of rasping tongue covered in teeth. Normally, those teeth are quite small, only suited to consume detritus or small plants. But on the radula of hinuimolluscs, they are the size of daggers, and one speared the member of our party that was a little too curious about the strange shapes moving beneath the water’s surface.\n\nPerhaps he might have known their hidden weak spot, or a vulnerability, or some other useful tool. Perhaps he might have known why we suddenly feel so tired and sluggish as we bring up our weaponry to defend ourselves.\n\nAlas, to our sudden and fiercely felt regret, we do not."
 gene_pillars.412.a: "The snacks are fighting back!"
 gene_pillars.412.b: "Strike back, for our fallen comrade!"
 gene_pillars.412.c: "Our own bodies…it turns them against us!"
 gene_pillars.412.e: "Are we certain we cannot make peace with these snails?"

 gene_pillars.413.t: "The Roiling Room"
 gene_pillars.413.d: "The interior of the pillar is a dangerous environment, one which shifts and roils as our expeditionaries traipse through its ancient structure. Over time, one learns to adapt to the constant change in stimuli, rolling with the punches and moving forward. Some among our expedition may even come to grasp the intricacies of the tower better than even the precursors themselves, confidently striding forward into these storied vaults of knowledge.\n\nThese are the first who are thrown from the bridge when the earth moves beneath them.\n\nUndulating discs of grey stone jump and bounce erratically, tossing explorers left and right as even the most sure-footed struggle to keep upright. Perhaps with the confidence of those who surged forward, these reliable veterans would have conquered this challenge with ease.\n\nUnfortunately, overconfidence was the first thing that was beaten out of them."
 gene_pillars.413.a: "Hang on tight, everyone!"
 gene_pillars.413.b: "We need to get off this thing now!"
 gene_pillars.413.c: "Use the platform to jump even further!"
 gene_pillars.413.e: "We can ride this! Giddy up, friends!"

 gene_pillars.414.t: "The Bill of the Beast"
 gene_pillars.414.d: "The expeditionaries are on guard. For in the dark and damp halls they tread, the presence of what must surely be a beast most fearsome is heralded by honking roars akin to the trumpets of battle.\n\nTaking a turn and leaving a cramped hallway to enter a wide open room, it is there they spot it. A…gooose? A big one at that, honking with contentment as it plays with large rocks fallen from the crumbling ceiling. At first, the party is perplexed, choosing to remain out of sight in case the goose turns out to be as violent as its more conventionally sized fellows are portrayed to be. While our brave expeditionaries discuss what to do next, the goose uses its bill to fling a rock at the corner where the expeditionaries happen to be hiding! The beast looks curiously at its newfound companions and honks, as if issuing a challenge, and waddles off into the dark."
 gene_pillars.414.a: "Catch that thing, quickly!"
 gene_pillars.414.b: "The snare is prepared and…got it!"
 gene_pillars.414.c: "A quick shot…that beast never saw it coming."
 gene_pillars.414.e: "GET BACK HERE!!"
 gene_pillars.414.f: "A quick fireball, and that’s that!"
 gene_pillars.414.g: "Wait a minute! It’s leading us somewhere!"

 gene_pillars.415.t: "Mindblast"
 gene_pillars.415.d: "Even as they set forth into the deeper parts of the pillar, many of our expeditionaries have been surprised at the relative ease with which they have managed to explore the pillar until now. Most have some experience with dangerous traps and hostile creatures, but this has proven to be a relatively tame adventure by comparison. They joke that they will make it out with little more than a few decorative scars, and their laughter echoes down the ancient halls of stone.\n\nBut then one of them drags a hand across an old block of granite, and-\n\n“-They’ve broken loose! The mist is hiding their forms! Run, hide, get to safety! Tell the administrator the dogs are out for blo-”\n\nTime snaps back into place, but wobbles between past and present. The explorers look around and see visions of the animals swarming the halls. It seems so real…"
 gene_pillars.415.a: "Have we been here before?"
 gene_pillars.415.b: "This isn’t real! Cut through the fog!"
 gene_pillars.415.c: "It’s not real…it’s not real…"
 gene_pillars.415.e: "This view of the past is…remarkable."

 gene_pillars.416.t: "Memory Log: Flora Testing"
 gene_pillars.416.d: "“Next, we turned to a flower, which we thought was less mobile but more tractable. Given the operative problem is the capacity for fine-grained -- or even just more granular -- control, horticultural traditions demonstrate that plant-based tools can be surprisingly malleable.\n\nAcid clouds were the clear choice for the creature’s primary purpose. The transmutation rituals are easy enough to adapt, though the keratinous growths were unexpected, and the method’s efficacy at tunnel-clearing is obvious. We would need sufficient capacity to overwhelm whatever ventilation systems exist, but a working prototype could justify the resources required for said purpose.\n\nLocomotion was initially challenging, though solving this issue thankfully eased the abjuration requirements of experimentation. Ultimately, we were successful in combining movement systems with target-selection techniques. Instinctual patterns to seek local optima could be induced and looped back on themselves to build more complex behavioral algorithms.\n\nOne issue remains however. The optima could not be shorn away from ‘water’, which is unlikely to be of use in deeper delves and is confounded by the presence of a large aquatic basin just outside our most effective staging point against the subterranean enemy. We explored the use of enchantment or illusion as work-arounds, but the lack of any real nervous system renders these approaches largely ineffective.\n\nThe overarching problem remains outstanding, with all its attendant corollaries. I will abandon this foray into flora-based research, and return to the fauna I am most familiar with. Snakes offer many natural advantages, and I do believe there is an opportunity to be found there…”\n\n-Visions of a researcher recorded from the mind of an explorer after discovering a central memory bank"
 gene_pillars.416.a: "…For they strike quickly, with staggering precision."
 gene_pillars.416.b: "…For they lie in wait for the perfect moment."
 gene_pillars.416.c: "…For their slender bodies make perfect tendrils."
 gene_pillars.416.e: "…For its frightening gaze will do well to keep out intruders."

 gene_pillars.421.t: "The Follies"
 gene_pillars.421.d: "Finding themselves in a grand hallway lined with cells, the inquisitive expeditionaries light a torch to survey the poorly lit room. This, as it would turn out, was a mistake. Several beasts, hideous fusions of various animals, react aggressively to the light and come out of their cells. They are haphazardly created malformed beings, some with four goat legs randomly attached to the body of a gecko, with the misshapen head of a bull crowned on top, others some wretched fusion of ape and mantis, too deformed and disfigured to tell what ends where, and many more. The creatures seem easily confused and disoriented and some have started to attack each other in the confusion. For now, they do not yet know the party is at fault for the sudden illumination."
 gene_pillars.421.a: "Fight through what remains after they have slaughtered each other."
 gene_pillars.421.b: "Perhaps we can bait them to focus on each other?"
 gene_pillars.421.c: "There’s so much we can learn from this!"
 gene_pillars.421.e: "Smell that? Rotten bait."

 gene_pillars.422.t: "Thorns in our Side"
 gene_pillars.422.d: "Towers of thorns rise in all directions within this room, blocking the path of the expeditionaries as they push ever onward into the bowels of the structure. Some test the spines and find them to be as hard as rock, while others gingerly touch the sides of the stems and feel a deep warmth and a sense of rushing fluid. These are living thorns, come to stand guard against those who wish to take things that are not theirs.\n\nSlipping through the branches is a small hinuisquirrel, carrying valuables within his puffed cheeks. Some try to push through the thorns only to emerge with countless abrasions sprinkled on their skin. They wish to dive into the tangle still, in pursuit of the folly of wealth.\n\nHow greed will change a man."
 gene_pillars.422.a: "Be cautious and hack apart the thorns."
 gene_pillars.422.b: "Squeeze through and reach the treasure before it slips away!"
 gene_pillars.422.c: "Burn it to the ground."
 gene_pillars.422.e: "These would make great deterrents against hostile fauna!"

 gene_pillars.423.t: "Bridgeburner"
 gene_pillars.423.d: "Standing above the collapsed walkways, the adventurers solemnly take in the depths of the pit that yawns before them. Tattered bridges, strewn haphazardly across the void, allow for passage into the rest of the pillar. But as one foot falls in front of the other, radiating waves of sickness claim their minds and cloud their vision.\n\nAnother look, and the bridges are pristine as the day they were built. One daring explorer walks across the nearest span, only for his foot to slip into the darkness as he nearly plummets to his death. Real life and the distant past flicker in and out of view, as the party realizes they will need to try their luck to survive."
 gene_pillars.423.a: "Guess we need to make our own bridges…"
 gene_pillars.423.b: "Step back and…JUMP!!!"
 gene_pillars.423.c: "Maybe we can find this lever somewhere…"
 gene_pillars.423.e: "Bottomless pits? How cute."

 gene_pillars.424.t: "Titans of the Past"
 gene_pillars.424.d: "The party comes upon a chamber grander in scale than most others they have encountered before. Their voices echo ominously through the empty space, and it appears large enough from end to end that it could house a small village. The expeditionaries are utterly perplexed at the purpose of this cavernous space, for it seems to be just a bare set of rocky walls. Upon further inspection, massive claw marks are found on one of the walls. The lowest of these are over a meter above the floor. One of our party members puts their hand on the wall. Their hand is not even a fifth of the size of a single claw, judging from the size of the mark it left. Some grand beast must have been held here. The barrenness of the room makes it abundantly clear that its original purpose was to function as a holding cell for dark experiments."
 gene_pillars.424.a: "What monsters have been kept here?"
 gene_pillars.424.b: "What evils took place here in the distant past?"
 gene_pillars.424.c: "What can we learn about these marvelous creatures?"
 gene_pillars.424.e: "How depraved must you be to make such things?"

 gene_pillars.425.t: "Remains of the Wicked"
 gene_pillars.425.d: "Titanic bones line the walls of the cavernous room the expedition now finds itself in, shelves of giant slabs of mineralized tissue piled against each other as the party picks its way through the rapidly shrinking available floor space. Stretching into the open air, jawbones, ribs, femurs, skulls, and strange bones never seen in any other animal are moved aside as the explorers tirelessly dig through to the other side of the room.\n\nCurious, that a creature could contain such giant bones without collapsing in on itself. The very idea of something living with such enormous bones within its body sends a shiver down the spine of the adventurers present.\n\nSomething about this place is off, and we cannot set it right."
 gene_pillars.425.a: "The size…it frightens me."
 gene_pillars.425.b: "Perhaps these would serve as good fertilizer?"
 gene_pillars.425.c: "These cannot be natural! We should study them."
 gene_pillars.425.e: "A good opportunity for some weight lifting!"

 gene_pillars.426.t: "Spiny Surprise"
 gene_pillars.426.d: "The next chamber is a large greenhouse open to the sky, the floor falling away outside the windows to reveal the distant landscape below. Like before, memories flood into the minds of the adventurers, and they see gardens full of life and bountiful greenery, growing a plethora of fruit and flowers of dazzling hues.\n\nBut these memories are shattered as a distant shape makes a soft whistling noise and a spine the length of a ship’s oar flies through the window. The glass shatters and the spine clatters to the ground. As the illusion disappears it reveals that the greenhouse is filled with bristling plants with lethal spikes nestled in the center of their petals."
 gene_pillars.426.a: "Everyone get down!"
 gene_pillars.426.b: "Grab the plants and hold them closed!"
 gene_pillars.426.c: "A gout of flame or two should sort this out."
 gene_pillars.426.e: "Keep your eyes on the spines, and follow me!"
 gene_pillars.426.f: "Just a dent off the shell."

 gene_pillars.427.t: "Memory Log: Preparing for War"
 gene_pillars.427.d: "“I know of many, many things. Chief among them is this: war is hell, and war is inevitable. Both are true for every living being that walks or crawls on this planet.\n\nColonies of ants, cesspools of humans, prides of lions -- bring enough organisms together, division will inevitably grow between them, and there will be war. War in which they fight, and suffer, and die and die and die.\n\nBut their lives are fleeting anyways, as plentiful and meaningless as grains of sand on a beach. Ours are not. Each time one of us dies, infinity is brought to an end. A tireless fountain of light and love and song and sorrow is cut off, left to fade into the abyss.\n\nMy father tells stories of the Usurpation of the Golden Scales. The vile muck, the eldritch weaponry wielded against us. But he speaks more of his fallen friends, who will now only live on forever in his memories.\n\nWar is hell, and war is inevitable. One war in particular, I see on the horizon, and it will be more hellish than any we fought since we broke our chains.\n\nSo it is best to be prepared.\n\nWhich means I really do need to stop procrastinating, and reanimate the latest batch of drakelings, for all it is a chore. The question of whether naturally magic-attuned beings can behave differently when subjected to necromantic treatment is interesting. I do think there is potential for a feedback loop somewhere here, and that would truly be exciting. But the work is…\n\nUgh. This is but more procrastination.”\n\n-Visions of a researcher recorded from the mind of an explorer after discovering a central memory bank"
 gene_pillars.427.a: "I must focus on the tactics these beasts employ."
 gene_pillars.427.b: "I should strive to understand how they communicate with each other."
 gene_pillars.427.c: "It would be best to see how they affect the land itself."
 
 gene_pillars.431.t: "Skybound Scavengers"
 gene_pillars.431.d: "More giant bones lie at the entrance to the main production facility, but these are scattered even more haphazardly than the last. Large birds circle overhead, descending at random intervals to peck at whatever scraps of rotting tissue may still be left attached to the bones. The party tries to cross the carrion plain and soon finds themselves beset by the scavengers, beaks and talons slashing at them as they try to escape their razor-sharp grasp…\n\n…Still, the sight is beautiful. Even in death, life continues to move forward. My research may be drowning in the bogs of the dead, but perhaps I can use it to move forward into new glory…\n\n…A burning sensation brings the party back to reality. The vultures remain."
 gene_pillars.431.a: "Get away from the bodies!"
 gene_pillars.431.b: "Fight the birds for a piece of the loot!"
 gene_pillars.431.c: "A fling of the bolas, aaaand…got it!"
 gene_pillars.431.e: "One quick blast of magic, and they’re done for."

 gene_pillars.432.t: "The Looms"
 gene_pillars.432.d: "A new void stretching across the length of the chamber bars our progress, but the spans crossing it are no mere bridges. The machines used to create the Holohana extrude tissue in gigantic chunks of flesh, and these bricks of meat and gristle have become sinewy bridges spanning across the black abyss. Carefully, the party works to cross the factory floor, marvelling at the scale of the creatures whose body parts they use as stepping stones.\n\nThen the visions crash back into sight, and memories of the facility as it was active begin to intrude into the minds of the party. Different sinews, different tissues, all shadowed in the darkness and pulsing with the constant groan of machinery. The adventurers are now faced with two separate versions of reality, and must watch their step in both."
 gene_pillars.432.a: "Is this the path?"
 gene_pillars.432.b: "Or is it this way?"
 gene_pillars.432.c: "If I listen closely, I can hear them guiding us…"
 gene_pillars.432.e: "Close your eyes and walk guided by instinct alone."

 gene_pillars.433.t: "The Weavers"
 gene_pillars.433.d: "To ascend through the factory, the party finds itself clambering up a complex web of bone and sinew, fallen from a higher level of the pillar and now draped across a number of machines. The bones are difficult to use as footholds, but the climb itself is relatively uneventful. Until the visions begin anew.\n\nThe expeditionaries see people moving the bones with magical force, cutting, splicing, knitting, merging, and tearing at the fabric of the creatures until they are just perfect for whatever unfamiliar purpose they were created. The elation these sculptors of flesh and bone feel as their task is nearing completion is unlike any other. They are creating life itself! No other feat could be so grand! The mages retire to a chamber recessed in the wall, behind the netting the party now climbs…\n\nBut the vision falls away, just as the bone netting begins to violently jerk in the wind."
 gene_pillars.433.a: "I’m afraid of heights…"
 gene_pillars.433.b: "If we just push on, we can make it!"
 gene_pillars.433.c: "Wait…a recess in a recess?"
 gene_pillars.433.e: "I’ve never seen spells like these before…"

 gene_pillars.434.t: "The Wires"
 gene_pillars.434.d: "Climbing and climbing, higher and higher, across new lattices of flesh and blood. This pattern has settled into the bones of the party, who now stand before something that until now has only been seen by the precursors themselves; tightly woven strands of nervous tissue, signals snapping up and down axons at lightning speed, stretch across the room. One expedition member carelessly touches the tissue, and a jet of energy lances across his body and into the next cell. Up and down the structure, countless bolts of energy slice through the air and light up the room.\n\nBut these bolts carry more than electricity. The explorer struck with the neural energy begins climbing with effortless ease, almost as if he knows this place better than anyone before him. These cells carry memories, priceless information on those who lived and died in this place."
 gene_pillars.434.a: "Watch out for the sparks!"
 gene_pillars.434.b: "Maybe the memories will guide us through…"
 gene_pillars.434.c: "Surprisingly refreshing!"
 gene_pillars.434.e: "If we can attract the sparks…"
 gene_pillars.434.f: "The memories WILL show us the way!"

 gene_pillars.435.t: "Past Lives"
 gene_pillars.435.d: "Memories from without are not the only target of the strange systems preserving this place. Passing by the old command structures, signature memories of the party members that have interfaced with the memory banks are projected into the minds of the adventurers, filling their heads with strange thoughts of their fellow party members. An insult here, a slight there, constant snipping back and forth. With the experiences these people have together, surely some tricks of the mind cannot tear them apart…right?\n\nThis is proven incorrect in the depths of night, as two members wrestle each other to the ground with murderous intent, knives drawn at each other’s throats."
 gene_pillars.435.a: "Snap them out of it before someone gets killed!"
 gene_pillars.435.b: "Drama queens. Let them figure it out themselves."
 gene_pillars.435.c: "Look inside yourself! This isn’t right!"
 gene_pillars.435.e: "Restrain them quickly before they manage to inflict serious damage."
 gene_pillars.435.f: "Whoever kills the other dies next."

 gene_pillars.436.t: "The Spark"
 gene_pillars.436.d: "Life is a valuable thing, both in application and in acquisition. The chamber the party passes through now is filled with a truly mind-bogglingly large amount of damestear pressed into hair-thin wires, running up and down the length of the room as it buzzes with azure power. These wires lead into the tissues of what seems to be a miniature Holohana, dangling from hooks suspended from an unseen ceiling.\n\nWith a great thunder, the azure light surges into the body, and it begins to jerk back and forth, kicking against the restraints like a child trying to flee its parents. One, two, three times it resists, until the strain is too great and the wires snap with a deafening crack as the chains break and the body falls. Bolts of blue light shoot towards the party, ready to end them with a lethal dose of the very gift of life itself."
 gene_pillars.436.a: "Get away from the blast!"
 gene_pillars.436.b: "But wait…isn’t this life?"
 gene_pillars.436.c: "Ahh, to finally absorb life itself!"
 gene_pillars.436.e: "Is this what it feels like to be alive?"

 gene_pillars.437.t: "Assuming Direct Control"
 gene_pillars.437.d: "Near the top of the pillar, notes and logs are strewn across every surface imaginable, and the very air vibrates with the power of memory. So much knowledge was stored in this level that the cascading effect of the memory banks has overloaded reality itself, filling the entire space with impressions of times long past.\n\nAs the party explores this veritable researcher’s paradise, their own identities quietly slip away, retreating into the personas of scientists and academics. It is only when the party starts to forget why they are exploring in the first place that they truly begin to panic.\n\nThey have to get out, and fast, that is for certain. But why? Research has been going spectacularly. Their work is the most important duty. They cannot possibly leave now.\n\nThey keep this thought as the body previously suspended from the hooks charges down the hallway."
 gene_pillars.437.a: "But that isn’t me…right?"
 gene_pillars.437.b: "I’m not going to die at the claws of some beast!"
 gene_pillars.437.c: "Hold on! This can’t be real!"
 gene_pillars.437.e: "Peer through the cracks, and see how it moves."
 gene_pillars.437.f: "Set up a snare and catch the beast as it charges us."
 gene_pillars.437.g: "Just kill it already."

 gene_pillars.438.t: "Memory Log: The Cost"
 gene_pillars.438.d: "“It was an academic exercise, for all it grew messy. They started to play with divination, you know how it goes…”\n\n“Ahh, an academic exercise that the use of magic made more complicated than expected. We have so little experience with that. Which reminds me, it’s your turn to administer the alchemical formulae on the specimens. Yes, including the molluscs.”\n\n“Ugh. But as I was saying, the projections. Have you considered the problem at all? Just getting inside their hideyholes alone is such a challenging problem, they thought discerning a proper solution might demand at least a hundred lives. Perhaps a thousand hours of magic.”\n\n“Really? Couldn’t we simply flood them with more interesting substances than water? The better part of an ocean, with a few transmutation rituals, surely…”\n\n“They’ve burrowed so, so, deep. And their runes -- they’re pathetic imitations of our arcane mastery, but they are annoyingly effective in the uses they put them to.”\n\n“So a hundred lives and a thousand hours to get inside. What is the quantity required for victory?”\n\n“The divination did not get that far. Too many hours of magic demanded, too many purposes to put them to. But the rudimentary estimates… perhaps ten thousand. Perhaps more.”\n\n“Hours?”\n\n“Lives.”\n\n-Visions of two researchers recorded from the mind of an explorer after discovering a central memory bank"
 gene_pillars.438.a: "No cost is too large for lasting peace."
 gene_pillars.438.b: "How could we ever strike out this way?"
 gene_pillars.438.c: "But how shall we derive true gains from our new lands?"
 gene_pillars.438.e: "How dare they strike against our forefathers?!"
 gene_pillars.438.f: "A noble cause, to spread their greatness so far."
 gene_pillars.438.g: "So pointless…we must learn to be better than our ancestors."
 
 gene_pillars.500.t: "Placeholder event"
 gene_pillars.500.d: "I'm a placeholder event until an actual event chain for this gene pillar is done!"
 gene_pillars.500.a: "Give me a generic event, and get back here in a year."
 gene_pillars.500.b: "Actually, I'm done, let me win now."
 
 gene_pillars.511.t: "The Tangle"
 gene_pillars.511.desc: "The base of the massive pillar is heavily wrapped by large sturdy roots that dig into the foundations. Along the base, many of these roots seem to be coiling themselves around large slabs of volcanic rock. The structure rising up before us looks heavily dented; we conjecture that it was pelted by volcanic debris in the distant past. Many of these rocks look to have broken though and countless holes pepper the structure. From these gaps, long vines of some sort of hinuiivy stretch. For now, however, the expedition is singularly focused on reaching the center of the base of the structure. To do so, the expedition must navigate past the immense tangle of roots."
 gene_pillars.511.a: "Cut our way though the tangle."
 gene_pillars.511.b: "Burn our way in."
 gene_pillars.511.c: "Let the Ranger find a path."
 gene_pillars.511.d: "Try reaching higher-up, inaccessible areas."
 gene_pillars.511.e: "Investigate the volcanic rock before proceeding."

 gene_pillars.512.t: "The Mycelium"
 gene_pillars.512.desc: "As we continue our descent into the tangle, the ground at first appears to be covered in countless tiny white roots, but on closer inspection it appears these “roots” are actually growths of fungal mycelium. Many forms of fungus have a symbiotic relationship with trees, and it appears the same is happening here in the shade of this verdant pillar. Having cut open a few of the white strands, they appear to be pressurised; once cut open, a white slurry seeps out."
 gene_pillars.512.a: "Ignore the mycelium."
 gene_pillars.512.b: "Consume the slurry."
 gene_pillars.512.c: "Ignore the slurry, cook the strands."
 gene_pillars.512.d: "Commune with the mycelium"
 gene_pillars.512.e: "Try to follow the mycelium strands to their source."

 gene_pillars.513.t: "Mycelium Slurry?"
 gene_pillars.513.desc: "The slurry is highly nutritious, but also carries a number of acidic and toxic components. It's enough to make all but the most iron-stomached retch and vomit for several days."
 gene_pillars.513.a: "Tough Stuff."

 gene_pillars.514.t: "Mycelium Cluster?"
 gene_pillars.514.desc: "It took some time to determine the primary direction of the mycelium growths, but we’re lucky; following them appears to have brought us closer to the center of the tower. However, along the way a large number of the mycelium strands branched off into a large cluster. After investigating the cluster, we believe we have found something of value."
 gene_pillars.514.a: "A hidden treasure."

 gene_pillars.515.t: "The Passage Ways"
 gene_pillars.515.desc: "We seem to have stumbled upon a number of larger passageways that criss-cross the internal parts of the tower base. We imagine some form of titanofauna must make its home amongst these passages, as the tunnels themselves look worn away at. Originally, these passages however appear to have been part of an internal transport network. With some digging, grooves can be found on the floor, indicating something was meant to move along them."
 gene_pillars.515.a: "Follow the largest tunnel."
 gene_pillars.515.b: "Fix up a transportation rig."
 gene_pillars.515.c: "Get a grasp of the layout."
 gene_pillars.515.d: "Get into the mechanism"
 gene_pillars.515.e: "The tunnel markings can be deciphered."

 gene_pillars.516.t: "Maintenance Shaft"
 gene_pillars.516.desc: "As our rogue lowered themselves into the maintenance shaft, they were greeted with a number of small, shallow branching shafts, each of which seems to store a large number of well maintained pieces of technology and maintenance material."
 gene_pillars.516.a: "A profitable find."

 gene_pillars.517.t: "The White Rocks"
 gene_pillars.517.desc: "As we descend ever further towards the center of the structure, we come upon a peculiar sight. Before us are a number of white rocks stacked into a vague circle. All of the rocks have a roughly oblong shape with a white rocky texture. As we reach the rocks and endeavor to inspect them, the first touch leaves us confused. Despite the texture, the so-called “rocks” are not actually rocks. Their surface has a distinct give, as if made of some kind of fabric or hide. We make the choice to attempt to tear one open, hoping for something of significance. Once the “rock” is cut open, however, a clear liquid starts to seep out, and to our horror a reptilian eye stares back at us. As the young hinuisnake emerges from its egg, we take up defensive formations as we see more of the eggs begin to crack."
 gene_pillars.517.a: "Try to escape."
 gene_pillars.517.b: "Steady the frontlines."
 gene_pillars.517.c: "Eliminate everything quickly - offence is the best defence."
 gene_pillars.517.d: "Protect against venom first."
 gene_pillars.517.e: "Combine strategies as a team!"

 gene_pillars.518.t: "The Slithering Menace"
 gene_pillars.518.desc: "Our fight against the snake's nest seems to have drawn some attention our way. As we make our way further in, we start to notice vibrations reverberating through the tunnels. We take cover, attempting to hide as a massive fully grown hinuisnake slithers by. Whether it is looking for us because we disturbed the nest or simply because it's looking for prey, we do not know. It does, however, appear to be blocking our continued progress."
 gene_pillars.518.a: "Fight it."
 gene_pillars.518.b: "Distract it."
 gene_pillars.518.c: "Trigger a door mechanism to pin it."
 gene_pillars.518.d: "Forward charge!!"
 gene_pillars.518.e: "Coordinate an expert strike!"

 gene_pillars.519.t: "The Acorn Trove"
 gene_pillars.519.desc: "We have finally managed to reach the center of the tower. From here we should be able to either get some of the tower functional enough to access the middle levels, or else rig up climbing gear to reach those levels. Once we're on the middle levels, we can start securing easier access to those levels from outside the tower. That being said, it appears that there is something else waiting in the central column as well. A large collection of hinuinuts and hinuicones appear to have been half buried at the bottom of the column. Some hinuibeast must have left them here as some form of food stash. We have to deal with this before accessing the middle levels."
 gene_pillars.519.a: "Get rid of it quickly."
 gene_pillars.519.b: "Search the trove first."
 gene_pillars.519.c: "Investigate the innards beneath it."
 gene_pillars.519.d: "Vaporise it to clear the room."
 gene_pillars.519.e: "Lay a trap for the stash owner."

 gene_pillars.520.t: "The Stash Owner"
 gene_pillars.520.desc: "We hear the tapping of its claws against the inside tunnel of the central structure; hard, razor-sharp claws digging into the metal. Then we see it: a large creature covered in fur, its tail bushy with extra long strands of hair. In its mouth are two large and long sets of upper and lower teeth, and large black eyes. It's a hinuisquirrel. As it reaches the ground we spring the trap and after a long period of struggle we manage to subdue the creature. We quickly realize that the creature is actually quite amenable and maybe even downright friendly when well fed. It may also be more intelligent than we first thought. Maybe we can even convince it to help us up and down the tower."
 gene_pillars.520.a: "A fine beast."

 gene_pillars.521.t: "The Ascent"
 gene_pillars.521.desc: "After all that time making it here. We have finally done it. After braving past all that the roots could throw at us we have proven that it is possible to scale this pillar and we will do it. We can only imagine what lies above in the stem of this great tree of steel."
 gene_pillars.521.a: "Time to go up!"

 gene_pillars.531.t: "The Stem"
 gene_pillars.531.desc: "The lower levels were mostly non-functional outside of a couple key parts of the infrastructure. In these upper levels, however, the damage to most systems of the tower does not seem as severe. A number of panels, buttons and levers seem to be emitting light, and respond to use. There are doors that seemingly open on their own when you get close, and a number of rooms at this level seem to be filled with experimental equipment. There might be something we can exploit here."
 gene_pillars.531.a: "Hit buttons and pull levers randomly."
 gene_pillars.531.b: "Hit the big red button."
 gene_pillars.531.c: "Investigate the control panels."
 gene_pillars.531.d: "Use divination."
 gene_pillars.531.e: "Get access to the inner mechanism."

 gene_pillars.532.t: "A Strange Message"
 gene_pillars.532.desc: "It seems we were not the first to make it here. There appears to be some very old writing on parts of the walls in this level, and it is most definitely nothing like the other writing found in the rest of the tower. It does not seem to be nicely engraved. It's rough and unrefined. This was carved into the wall with force. A tough task considering the wall's durability. They must either have been very strong or had some other way of carving it. Somebody must have been here before us. If only we knew what it said."
 gene_pillars.532.a: "Try to understand it"
 gene_pillars.532.b: "Bring it"
 gene_pillars.532.c: "This looks very familiar"
 gene_pillars.532.d: "Try to use magic to decipher it."
 gene_pillars.532.e: "Take an imprint for later study"

 gene_pillars.533.t: "A Hero of Kanolowele"
 gene_pillars.533.desc: "The markings appear to be written in a slightly archaic version of the anakue script. However, thanks to careful record keeping and an obsession with the past it remains readable to us. Here is what the markings say:\n“I, Waik‡’lilinoe, braved the dangers of the Hinuiforest and reached this ancient spire in the year two hundred after the founding of the Consensus. Within I found many things I struggled to understand, but eventually I came to understand that just like any plant has a seed, this spire was the seed of the Hinuiforest. I will take what I have learned and with it my people will prosper.”\nIt seems our forebears managed to reach this place, just like us. Judging by the carving’s location, however, we doubt she managed to reach any higher. From here on out we are blazing a truly new path."
 gene_pillars.533.a: "What wonders she learned."

 gene_pillars.534.t: "The Towerpecker"
 gene_pillars.534.desc: "As we are making our way higher up the tower, we are suddenly attacked by a spear - it pierces through the wall and almost takes one of us out. Withdrawing at astonishing speed, it slams back in. Again and again the spear punctures the wall; we start to sprint, but soon we are met with a vertical wall, one that will take some time to climb. The spear reappears, jutting again and again through the wall of the tower. Then it stops, and as it does we see a single large eye stare in through the hole. A large hinuiwoodpecker has chosen us as its next meal."
 gene_pillars.534.a: "We just need to get away. Climb fast!"
 gene_pillars.534.b: "Try to counter attack."
 gene_pillars.534.c: "Defensive formations!"
 gene_pillars.534.d: "Call on the Hinuisquirrel!"
 gene_pillars.534.e: "Create a distraction and slip away."

 gene_pillars.535.t: "Strange Plants"
 gene_pillars.535.desc: "As we step into the room, we are suddenly struck by the strangeness of it all. A number of colorful plants blanket most of the space. They have beautiful bright leaves with strangely mundane flowers that appear to be a common dull green, as if the colorful bits and the normal bits of the plant had traded places. This must have been one of the many strange experiments of the Precursors, but how are the flowers growing so well here? As we get closer to investigate, we notice something white in the soil that covers the floor of the room. We carefully dig out a large animal skull, its empty eyes staring back at us."
 gene_pillars.535.a: "The plants must be deadly - run!"
 gene_pillars.535.b: "The plants could be dangerous; back up slowly."
 gene_pillars.535.c: "Everyone behind us! We know what to do."
 gene_pillars.535.d: "Protective magic! Now!"
 gene_pillars.535.e: "The mechnim will handle it."

 gene_pillars.536.t: "Deadly Ivy"
 gene_pillars.536.desc: "Before us is an overgrown pathway. The long hallway has a number of holes in the side of it to the outside of the pillar. Through these holes it appears a growth of hinuiivy has gotten into the structure. The hinuiivy is proving quite difficult to get past. Unlike normal ivy which is harmful, but not truly dangerous, this hinuiivy is possessed of a curious and troublesome nature. Even cutting small sections of the ivy away releases a number of small fibers into the air, which on contact with the skin cause harmful blisters. How should we approach this?"
 gene_pillars.536.a: "Cut it down, and cover ourselves as much as possible."
 gene_pillars.536.b: "This must be done safely."
 gene_pillars.536.c: "Use the Hinuisquirrel to carry us through the section"
 gene_pillars.536.d: "Cut a small path through."
 gene_pillars.536.e: "The mechanim will handle it."

 gene_pillars.537.t: "Verdant Laboratory"
 gene_pillars.537.desc: "We finally manage to pry open the door to the room we expect will give us access to the top levels of the tower… only to be met by an impenetrable wall of wood. An endless morass of stems, roots and branches block the entrance to the room. As we start to cut away at them, we realize the blockage is not just at the entrance. The entire room appears to be completely overgrown by these strange and virulent trees. What could have caused this out-of-control growth?"
 gene_pillars.537.a: "Keep hacking."
 gene_pillars.537.b: "Burn a path."
 gene_pillars.537.c: "See if we can convince the Hinuisquirrel to help."
 gene_pillars.537.d: "Get to the room's control panel."
 gene_pillars.537.e: "Hack, hack, hack!"

 gene_pillars.538.t: "The Last Branches"
 gene_pillars.538.desc: "Just a little farther and we will be upon the crown of this mighty pillar - a place where great trees erupt from the central parts of the pillar and shroud it in the great foliage of the titanoforest, the forest this very pillar helped bring into existence. How beautiful, the way the pillar has adorned itself in the forest it seeded... We step forwards, into the last great unknown this great pillar has in store for us."
 gene_pillars.538.a: "One last climb"

 gene_pillars.541.t: "The Crown"
 gene_pillars.541.desc: "As we finally start making our way into the upper parts of the tower, we find ourselves having to climb up though a hole in the ceiling to reach the next level. As soon as we have all managed to catch our breath one of us notices a gentle movement in the corner of the room. A second later, a branch rakes out from the corner, nearly taking one of our heads off. As we back away, another strike from a large twisted root comes at us from the other corner. As we survey our surroundings, we notice roots rapidly growing over our escape route; the trees lining the walls of the roomroom slowly start to come to life."
 gene_pillars.541.a: "Back to back we fight."
 gene_pillars.541.b: "Strike out towards an overgrown door."
 gene_pillars.541.c: "Formations!"
 gene_pillars.541.d: "Get that maintenance hatch open!"
 gene_pillars.541.e: "The artficer's found a kill switch"

 gene_pillars.542.t: "The Countless Twins"
 gene_pillars.542.desc: "As we step into the room we are worried. The plants in this tower have proven to be more trouble than they have been worth, deadly guardians of not so great a prize. As we step into this room, however, we are greeted by perfect rows of identical trees. They don’t try to kill us or poison us or anything else, but they might honestly be the most unnerving thing we have seen in the entire tower. They are much like the trees in the reported sole forest north-west of here. This must be where the original tree was made."
 gene_pillars.542.a: "Cut down and bring a couple."
 gene_pillars.542.b: "Leave them alone. We don't want any trouble."
 gene_pillars.542.c: "Carefully obtain a sample."
 gene_pillars.542.d: "Grab the research material."
 gene_pillars.542.e: "It's abominable, burn it down."

 gene_pillars.543.t: "The Spore Lab"
 gene_pillars.543.desc: "We stumble upon a locked door, and end up spending longer than we should like getting it opened. No matter how much we tried to get it open, the door seemed sealed shut as strongly as possible. When we eventually manage to pry it open we learn why. As soon as the door opens, a thick cloud of something starts to billow out. At first we think it might be smoke, but we quickly learn it is not. The cloud is a harmful wave of spores. Not only does it seem toxic, but the spores also seem to have a corrosive effect on skin."
 gene_pillars.543.a: "Avoid the room."
 gene_pillars.543.b: "Rush in and grab what we can."
 gene_pillars.543.c: "Try to collect some."
 gene_pillars.543.d: "Devise some method of shielding."
 gene_pillars.543.e: "Abjuration to the rescue."
 gene_pillars.543.f: "Harmless."

 gene_pillars.544.t: "Verdant Graft"
 gene_pillars.544.desc: "The room we have just entered at least seems harmless. All of the experiments seem to be contained in a number of liquid filled capsules. Within those capsules there appear to be pieces of flesh and plants, grafted together for purposes we cannot guess. We see, for example, a suspended arm with what looks to be a wooden skeleton or a lizard-like tail, covered in scales seemingly made of bark. The room has been somewhat emptied already, however. There is some evidence that whatever was being studied here was transported away… perhaps to another pillar?"
 gene_pillars.544.a: "Collect what looks important."
 gene_pillars.544.b: "Destroy everything here."
 gene_pillars.544.c: "See if any of this could help heal our injuries"
 gene_pillars.544.d: "Have a careful look around."

 gene_pillars.545.t: "Warring Trees"
 gene_pillars.545.desc: "At first the room just seems like one of the many overgrown rooms within the pillar. Then we start to realize that there is a war ongoing, but not one we would have to worry ourselves with. The trees on one side of the room are needle-carrying softwoods and the trees on the other leafed hardwoods. These two groups of trees seem to have been carrying out a centuries long war against each other. A battleline can be observed along the center of the room: Trees growing into each other, trees driving needles into one another, trees growing deliberately to cast shade on saplings, and much more. It seems that up until now the trees have been in an eternal stalemate."
 gene_pillars.545.a: "Leave it"
 gene_pillars.545.b: "Help out the softwoods."
 gene_pillars.545.c: "Help out the hardwoods."
 gene_pillars.545.d: "Search some of the side chambers."
 gene_pillars.545.e: "Have the Hinuisquirrel search the room."

 gene_pillars.546.t: "Gnashing Marten"
 gene_pillars.546.desc: "As we round the corner we find ourselves standing face to face with a large fuzzy beast; at first we think it might be another hinuisquirrel, but we soon realise it is a hinuimarten. The hinuisquirrel we met had little interest in harming us and was just trying to avoid being captured. This beast, however, immediately charges at us. Its teeth are sharp as razors and some of its fur is covered in the blood of some previous victim."
 gene_pillars.546.a: "Run!"
 gene_pillars.546.b: "Stand our ground."
 gene_pillars.546.c: "Flank attack!"
 gene_pillars.546.d: "Unleash a magical barrage."
 gene_pillars.546.e: "Call the Hinuisquirrel for aid."

 gene_pillars.547.t: "Forestpillar Control Room"
 gene_pillars.547.desc: "We finally stand at the peak of the pillar. Everything else in the pillar seems to somehow connect back to this singular room; the tiny tunnels which carry air, the overall layout of the passages, even the origin point for some of the root growth. Most of the systems in here appear to be non-functional, but what is functional seem to be diagnosing the problems with the tower. Some of them however also still look to be being fed data on experiments many many centuries after they were abandoned. The robustness of the systems here is definitely something to look into."
 gene_pillars.547.a: "What do we have here?"

 gene_pillars.600.t: "Placeholder event"
 gene_pillars.600.d: "I'm a placeholder event until an actual event chain for this gene pillar is done!"
 gene_pillars.600.a: "Give me a generic event, and get back here in a year."
 gene_pillars.600.b: "Actually, I'm done, let me win now."

 gene_pillars.601.t: "Prowling in the Shadows"
 gene_pillars.601.d: "Unsure of what awaits them, the party carefully progresses through the pillar. They hear a strange sound come from the shadows. Myow? A small, furry four-legged creature emerges from the darkness. It has pointed ears and a small thin tail. Cocking its head curiously at the party, it walks between the members, curling around their legs. A collar wraps around its neck, and a small blue bauble hangs from it."
 gene_pillars.601.a: "Take it with us."
 gene_pillars.601.b: "Its instincts rival my own."
 gene_pillars.601.c: "It’s a cat!"

 gene_pillars.602.t: "The Elder"
 gene_pillars.602.d: "In a long hallway, the party encounters an elderly man carrying a spear. They recognize his features as Kanolowelen. He hurriedly runs through the hallway, sweat and exhaustion clear on his face. The party calls out to him, but he doesn’t respond. He runs into the party, passing straight through their bodies, ethereal in nature. The party recognizes the phenomenon as a vision of the past. Other Insyaans have been here before.\n\nSuddenly, another figure appears after the elder. Another Kanolowelen, but younger. The man floats in the air, distorting the very air and space around it. He chases the old man down the hallway. As he passes the party, he suddenly stops and turns to look at them.\n\n“Who’s there? Someone’s watching?”\n\nThe figure speaks in an unknown language. Despite that, the meaning is somehow conveyed. Narrowing its eyes, the figure looks for a few more seconds, but somehow fails to see the party in front of him. Then he resumes the chase, disappearing at the end of the hallway."
 gene_pillars.602.a: "A foreboding premonition."

 gene_pillars.603.t: "Hunter in the Shadows"
 gene_pillars.603.d: "The party comes across a four-legged beast. Its orange coat is mottled with black stripes, and white fur covers its underside and lower face. The party almost didn’t notice its approach, since the beast had silently crept up on them in the shadows. Its tail hangs low and sways side-to-side. It lets out a low, threatening growl, and one of the party members takes a step back. It roars loudly, striking terror into the party. Suddenly, similar roars respond from throughout the facility."
 gene_pillars.603.a: "Kill it quickly!"
 gene_pillars.603.b: "The beast has a solitary nature, none will come to help it. Kill it slowly and calmly."
 gene_pillars.603.c: "Myow."

 gene_pillars.604.t: "Myow"
 gene_pillars.604.d: "Our furry little friend walks out in front of the party, purring quietly. The beast cocks its head. Myow makes a quiet, demure myowing sound. The beast myows back in return, albeit much louder and harsher. Halting its advance, the beast and Myow seem to have a quick conversation of myows, before the beast retreats back into the shadows."
 gene_pillars.604.a: "Good Myow."

 gene_pillars.605.t: "The Battle of the Wanderer"
 gene_pillars.605.d: "The party finds a large metal statue standing guard. The statue does not move or respond. Investigating, the party finds a damestear core in its chest. It looks like it was broken, hastily repaired, then broken once more. One member touches the core, and the entire party is assaulted by a vision.\n\nA Kanolowelen man stands in the same room that the party is in, the same young man the party had encountered before in the hallway. He wields a long spear, glowing with engravings, and a large winged beast stays by his side. Both their eyes are focused on the threat in front of them, the great metal guard with four arms, each equipped with a different weapon.\n\nThe fighters engage. The guard swings each arm in quick succession, a whirling flurry of weapons. The man twirls his spear, deflecting each swing with perfect timing. The engravings glows greater, and the man moves faster, as if guided by an unknown force. The guard stumbles back after a perfect parry sends a large clang reverberating throughout the room. Sensing an opportunity, the beast leaps forward, biting and ripping off one of the guard’s arms. The man does not let up on the assault, and he rushes towards the guard. His spear aims true and it pierces straight through the guard’s body. Right where its core lies.\n\nAs the guard falls, the vision ends. The party, still disoriented from the sudden memories of the past, do not notice the statue’s core flickering with light. A rush of spirit energy floods the room, and the three-armed guard begins to whir with life once more."
 gene_pillars.605.a: "It wakes!"
 gene_pillars.605.b: "Parry!"
 gene_pillars.605.c: "Halt the flow of energy!"

 gene_pillars.606.t: "A Chamber of Pillars"
 gene_pillars.606.d: "The party enters a large circular chamber. Numerous drawings and symbols adorn the walls. The entire chamber seems to be filled with a strange, volatile power. Energy seems to endlessly flow, entering and leaving this room. One of the drawings on the wall depicts tall white pillars scattered throughout a map of another land. Forty pillars to be exact, the largest of which lay east by the coast.\n\nAnother drawing showed Insyaa itself. Colored pillars dotted the map in numerous locations. One pillar was pink; the pillar we were exploring right now matched the pink pillar’s location on the map. Numerous lines connected the pink pillar to many other locations in Insyaa. Many lines seemed to be between the pink pillar and the red pillar, the easternmost pillar.\n\nBefore the party could continue their observations, the air shifted. The energy flowing through the room began to take shape. Spirit warriors form from the energy, wielding weapons in their hands."
 gene_pillars.606.a: "Fight them off."
 gene_pillars.606.b: "Protection from Evil and Good"
 gene_pillars.606.c: "Turn Undead!"
 
 gene_pillars.611.t: "A Beast in the Shadows?"
 gene_pillars.611.d: "As the party ventures, they hear a growl from the shadows. Preparing for another beast to emerge, instead they are greeted by the sight of...\n\nA two-legged creature? It resembles the orange furry beast the party encountered earlier. But this one walks on two legs. And it is misshapen and horrid. It moves with an unnatural gait, unable to fully control its muscles. Its body pulses in random spots, as if about to burst. Its eyes, glowing with energy, glare at the party. Facing the party, the terrible beast roars with anger and pain."
 gene_pillars.611.a: "To arms!"
 gene_pillars.611.b: "Put the poor thing out of its misery."
 gene_pillars.611.c: "Myow?"

 gene_pillars.612.t: "Myow?"
 gene_pillars.612.d: "Our friendly little companion lets out a shaky myow. The strange beast cocks its head. And then it roars with even greater intensity. Another two-legged beast steps out of the darkness. The situation has worsened considerably."
 gene_pillars.612.a: "Damn Myow!"
 gene_pillars.612.b: "Run!"
 gene_pillars.612.c: "Remain calm. We’ve fought worse."

 gene_pillars.613.t: "Portal to Heaven"
 gene_pillars.613.d: "In a large room, the party finds a strange contraption that resembles an empty doorframe. As some party members investigate the device, lights turn on and the frame starts humming. Energy and light pour into the doorway. As the party looks into the glowing beauty, a vertical line appears in the middle of the frame.\n\nThe line begins to split apart, the sound of tearing paper echoing in the room. The line rips open, and a giant eye peers through. It blinks. The sound of rending parchment echoes in the chamber, and spirits of all shapes and forms come rampaging forth from the portal."
 gene_pillars.613.a: "Shut that portal down!"
 gene_pillars.613.b: "Deactivate it."
 gene_pillars.613.c: "Sanctuary! Protect ourselves and shut down the portal."
 gene_pillars.613.e: "Cut off the portal’s energy."

 gene_pillars.614.t: "Nearly Within Grasp"
 gene_pillars.614.d: "The party comes across a room blocked by a locked gate, a large set of vertical metal bars which blocks their passage. The explorers search for a way to unlock the gate, but the gate is badly damaged. The lock is almost inoperable; even if they had a key, it seems unlikely it would fit. Through the gaps, glowing devices and objects shine. A pressure plate is on the other side, most likely opening the gate. However, the gaps are too thin for anyone to squeeze through. Perhaps something smaller could fit..."
 gene_pillars.614.a: "Our little friend may squeeze through."
 gene_pillars.614.b: "A nimble and deft touch is needed."
 gene_pillars.614.c: "Fix the locking mechanism."

 gene_pillars.615.t: "A Lesson Learned"
 gene_pillars.615.d: "Myow squeezes through. The little thing walks around the room and investigates its new surroundings. The party patiently waits for it to walk upon the pressure plate; however, Myow seems to enjoy walking and sitting everywhere except for the plate. Some members even try to point and encourage Myow to sit upon the plate. Unfortunately, Myow seems entirely uninterested. It notices something shiny in the corner and carries it in its mouth. Ignoring the party’s cajoling, Myow squeezes back through the gate and rejoins the party."
 gene_pillars.615.a: "Better than nothing."

 gene_pillars.616.t: "The Sky Darkens"
 gene_pillars.616.d: "As the party explores, one hallway leads them outside the pillar to a wide balcony. The party has climbed to a dizzying height, some members stumbling backwards in fear. As they collect themselves, they hear a distant cry. As the party searches for the source, the balcony darkens. Looking up at the sky, something blocks the sun’s light.\n\nA giant winged beast soars directly towards them, landing on the balcony. The beast resembles the same winged creature in the visions of the Kanolowele warrior. Its beak snaps at the party as it stares directly towards them, its eyes calmly examining the explorers."
 gene_pillars.616.a: "Take the winged beast out."
 gene_pillars.616.b: "The beast seeks no quarrel. Perhaps we can avoid a fight."
 gene_pillars.616.c: "A Servant of the Tower. Give it space, it won’t fight unless it defends itself."

 gene_pillars.617.t: "Freedom"
 gene_pillars.617.d: "Nearing the top of the pillar, the party reaches a dark room. As they carefully edge forwards, a light appears in the darkness. Before anyone can react, the Myow suddenly shoots forward, as if pulled by an unknown force. A withered hand reaches from the light and grabs the Myow by the neck. Lifting the poor crying thing into the air, the thing in the dark reveals itself. The Kanolowelen warrior from the visions stands before the party, his body now decayed and decrepit, countless years having worn it down. He glows and shimmers with power, the same spiritual energy flowing throughout the many rooms in this pillar.\n\n“Ah, the twelfth lock. The last remnants of my prison.” He speaks, not acknowledging the party’s existence. An abnormally wide grin splits his face. The Myow struggles in his grasp, kicking its little legs and paws. The man tightens its grip, and the Myow’s crying is reduced to whimpering, then silence. Grabbing the Myow’s collar with his other hand, he rips it off.\n\nThe hand releases. The Myow falls to the ground with a thud. It lays there, silent and still. The party stares, not daring to utter even a single word. But the Master of the Tower has no such reservations.\n\n“Freedom.”\n\nHe crushes the bauble hanging from the collar. And the room is filled with a terrible, blinding light."
 gene_pillars.617.a: "Run."

 gene_pillars.621.t: "Return to the Tower"
 gene_pillars.621.d: "The previous expedition at this pillar ended rather poorly; the party's actions have led to the release of a great spirit. According to Kanolowele legend, the spirit is the fabled Master of the Tower. His freedom and return have caused great chaos in the area. His winged Servants patrol the skies, capturing any unfortunate, wandering souls and imprisoning them in the pillar. We must stop the Tower Master’s reign, or suffer his reign.\n\nAs the party moves to the entrance of the pillar, they are greeted by the sight of a Kanolowelen woman, wielding a familiar spear. The same spear in the visions of the great warrior in the pillar. The woman looks upon the party and speaks.\n\n“The rain follows the tide. It is good that you’ve come back after unleashing this terror upon this land. But now you must rectify your mistakes. My name is Manui, and I will help you imprison the Tower Master, just as my people once did.”"
 gene_pillars.621.a: "Any help is appreciated."

 gene_pillars.622.t: "The Twelve Locks"
 gene_pillars.622.d: "The party comes across the remains of the metal three-armed guard. Thankfully, the statue does not wake to fight them again. Manui kneels beside the guard and reaches out for the damaged core.\n\n“One of the twelve locks. They were what kept the Tower Master imprisoned.”\n\nOne explorer steps closer and kneels beside her. “We saw a vision of a Kanolowelen warrior fighting this guard, with the very same spear you carry.”\n\n“Yes, Kaiko Ikaika, the Wanderer. My people told many stories about him. He made a deal with the Master - break the twelve locks, and the life of his dearest would be returned. However, the Master tricked him and stole his body when it was freed. The Tower Master would have been free as he is today, had it not been for the elder of his tribe. The elder had followed Kaiko Ikaika to the Tower, and he sealed the Master again after the deal had been finished. The Wanderer’s love had been given life again, but his body was the Master’s forever.”\n\n“How did the elder seal the Master away? Can we do the same?”\n\nLooking down at the ruined core in her hand, Manui shakes her head and replies, “He led the Master on a chase through the pillar, repairing the locks along the way. But, this lock has been damaged beyond repair. The others will likely be in the same state. The Master will not allow any chance of imprisonment again.”\n\nManui reaches into her shirt and pulls out a metal plate, with ornate cravings and symbols. “The Dragon Turtles have not forgotten the terror of Tower Master’s reign. They have given us a method to end this madness. If we are to seal him once again, we will need a new lock. This one will do, but it will require a large amount of energy to power."
 gene_pillars.622.a: "If there’s one thing in abundance here in the tower, it is the spirit energy."
 gene_pillars_spirit_lock_power_tracking_tt: "Manui will now start gathering §YSpirit Lock Power! from every encounter in the pillar."
 gene_pillars_spirit_lock_power: "Spirit Lock Power"

 gene_pillars.623.t: "Butterflies"
 gene_pillars.623.d: "The party wanders familiar hallways and sights. They enter the very room where they once encountered the two-legged orange beast. This time, no furry aberration comes from the shadows.\n\nInstead, a white butterfly flutters out. Flying daintily in the air, the butterfly lands on one of the party member’s faces. It closes and opens its wings slowly, the sight making some party members chuckle nervously. Manui suddenly raises her spear towards the shadows and cries out a warning.\n\nFrom the dark, a figure emerges, wearing black and white clothes. Where its face should be is instead a mass of white and black butterflies. A third arm protrudes from his chest,pointing directly towards the party member with the butterfly on their face.\n\nManui acts swiftly, swinging her spear and swatting away the butterfly. Soon after it leaves their face, the butterfly explodes into a burst of white powder. The party immediately readies their weapons for battle."
 gene_pillars.623.a: "Our Fighter and Manui fight side by side, slicing each butterfly as they flutter at the party."
 gene_pillars.623.b: "Enchant Manui’s spear, bless her with speed and swiftness."
 gene_pillars.623.c: "Cut down these butterflies."
 gene_pillars.623.e: "Burn each butterfly into a quick blaze."
 gene_pillars.623.f: "Flee!"

 gene_pillars.624.t: "Dominion and Ruination"
 gene_pillars.624.d: "As the party ventures forward, countless spirits fly over their heads. The tower has come to life once more, and the energy encompasses every space. The party walks past a residential area, where several bedrooms lay. Manui stops the party, noting that there is a concentration of energy coming from one of the bedrooms.\n\nThe party enters the room, and they are greeted by the sight of paintings adorning the walls. Age has not done these pieces of art any favors; most are ruined and faded. Paint curled and wrinkled, canvas ripped and tattered. One painting, however, stands out among the others.\n\nIt is an ink painting, depicting a long serpent-like being emerging from a river and flying into the air, two arms protruding from its sides. Its claws reach out towards the land, as if proclaiming its dominion. Unlike the other paintings, this one is not ruined by time. Long, brutal gashes tore across the canvas. An act of intentional ruination.\n\nManui gazes upon the painting and remarks, “Another broken lock. The twelve locks were of multiple shapes and forms. Some were well guarded and defended. Others were more mundane, like this painting. It still possesses remnants of energy. We can use this.”"
 gene_pillars.624.a: "Perhaps we can siphon a little power without Manui noticing."
 gene_pillars.624.b: "The glorious Yanhe! But what is it doing here?"
 gene_pillars.624.c: "Let Manui harness the ruined painting."

 gene_pillars.625.t: "An Unexpected Welcome"
 gene_pillars.625.d: "“Greetings.”\n\nThe party meets another person in the pillar surprisingly. A woman, wearing long, flowing robes, appears before them. She wears her hair in a tight bun, and her face shines a pale white. Her red painted lips curve into a welcoming smile.\n\n“Weary travelers, perhaps you’d like to take a rest before continuing?”\n\nThe woman’s words fall upon deaf ears. The only things wandering within this pillar are the spirits. The party aims their weapons, and her face twists into a scowl. She begins to rise in the air, and a dark mass behind her crawls forward into the light, revealing her true body. The woman’s body lies on top of a gigantic spider’s thorax. Where its spider head should be, instead the woman protrudes. Her mouth opens up and snarls, fangs dripping with venom. As she moves towards the party, countless spiders also emerge from the dark and rush forwards."
 gene_pillars.625.a: "Flamethrowers! Burn it! Burn the whole damn room!”"
 gene_pillars.625.b: "Fireball. Fireball! FIREBALL!"
 gene_pillars.625.c: "Take these torches! The flames keep the things away!"
 gene_pillars.625.e: "I hate spiders."
 gene_pillars.625.f: "Nope. Not dealing with this shit."

 gene_pillars.626.t: "Reunion"
 gene_pillars.626.d: "“Myow.”\n\nThe party hears a familiar sound come from the shadows. They ready their weapons, prepared for another monstrosity. A small furry paw emerges from the darkness. Then little Myow comes forward, a glowing shattered bauble in its mouth.\n\nThe party gathers around Myow, caressing and petting the loyal companion. Surprised by its survival, but glad nonetheless. Manui watches uncomfortably and then sighs.\n\n“The thing in its mouth is another lock. We should take this energy as well.”\n\nThe party agrees, but clearly Manui has more to say.\n\n“I’m not sure if you’ve noticed, but this creature is not of this world. It is a spirit, kept bound by the remnants of the lock. Harnessing that energy will release it from this plane.”\n\nThe party looks toward Myow, preparing to make a difficult decision."
 gene_pillars.626.a: "Goodbye Myow, our furry friend."
 gene_pillars.626.b: "We cannot sacrifice our friends."

 gene_pillars.627.t: "At The Top of the World"
 gene_pillars.627.d: "The party reaches the top of the pillar. They emerge onto the roof, where countless winged servants fly above and around. It’s a dizzying height; some of the party members look down and quickly regret their decision.\n\nManui steps forward, pointing his spear at the lone being at the other end of the roof. The Tower Master, still possessing the body of the withered Kanolowelen, looks across the land. As he turns towards the party, his face is contorted with anger.\n\n“I’ve spent an eternity in that damned prison chamber. I’ve waited so very long to be freed. And now that I am?”\n\nThe Tower Master stretches out his hand. The spear is ripped out of Manui’s hands and flies directly towards the Master.\n\n“I still can’t leave this damn pillar. I am still trapped. I can see the land before me up here. But I can never touch it. And even after those damned elves have left, I still have to deal with intruders like you. I let you all live for freeing me. Now I offer no such mercy.”\n\nThe Master twirls his spear and rushes at the party."
 gene_pillars.627.a: "Parry and deflect!"
 gene_pillars.627.b: "Spiritual Binding!"
 gene_pillars.627.c: "Defend yourselves!"

 gene_pillars.628.t: "The Weakness of Flesh"
 gene_pillars.628.d: "The Master attacks with reckless abandon. The party lands multiple hits on him, wounding and bleeding his body. He stumbles backwards, pain and surprise clear on his face. It seems that the spirit is not accustomed to being harmed. After all these years of possessing a body, the Master had never experienced a true fight.\n\n“Damn you. Damn you all!”\n\nHe lets out a roar of frustration. And then his body suddenly falls lifelessly to the floor. Before the party can move to react, one of the members cries out. Behind them, a spirit hovers behind them. Its hands, more resembling claws, dig into their face and chest.\n\nAnd behind them, Manui slowly prowls towards them, the metal plate lock in her hands. The spirit whips around as Manui approaches, but it is too late. Manui presses the lock against the spirit’s body and it bursts into light."
 gene_pillars.628.a: "The lock activates and begins to seal away the Tower Master."

 gene_pillars.629.t: "Sealed Once More"
 gene_pillars.629.d: "The Tower Master screams in anger and despair. But the deed has been done. The spirit’s body fades and disappears from the roof.\n\nManui looks towards the party and speaks.\n\n“The lock has worked. The Tower Master is locked away once again in the prison chamber. I will keep the lock hidden away; this time no one will ever break it again. Thank you for your aid.”\n\nShe walks to the body of the lifeless Wanderer. Gingerly, she kneels before it. Offering a Kanolowelen prayer, she places her hand on its chest. The wind picks up and roars on the roof. And the Wanderer’s body, after hundreds years of unnatural life, dissolves into dust, carried away into the wind."
 gene_pillars.629.a: "The Tower Master's reign has ended once more."
 gene_pillars_spirit_ending_1: "The Tower Master is sealed away. Never again we will suffer his reign."
 gene_pillars_spirit_ending_2: "The Tower Master is sealed away, but you can still hear its whispers within the pillar."
 gene_pillars_spirit_ending_3: "The Tower Master is sealed away, but it still haunts the halls of the pillar."
 gene_pillars_spirit_ending_4: "The lock was incomplete. The Tower Master is partly sealed away, but still exerts its influence on the tower."
 
 gene_pillars.700.t: "Placeholder event"
 gene_pillars.700.d: "I'm a placeholder event until an actual event chain for this gene pillar is done!"
 gene_pillars.700.a: "Give me a generic event, and get back here in a year."
 gene_pillars.700.b: "Actually, I'm done, let me win now."

 gene_pillars.711.t: "The Root of the Kraken"
 gene_pillars.711.d: "Merely entering the Root of the Kraken– or Layoo Feehee as it is known in the native Taga’alan tongue– will prove difficult. Layoo Feehee stretches almost a fifth of a mile out of the sea into the air, and if stories from local daredevils are to be believed, its foundations are hidden deep beneath the waves, too. Deeper than any land-dwelling creature can hold its breath to explore; its more accessible passageways are littered with the skeletons of those who could not find their way back to their point of entry. To retrieve what is inside, three things must be considered: light, to plumb the depths; air, to breathe in the water; and pressure, which will slowly increase until it crushes the life out of us."
 gene_pillars.711.a: "I guess we’ll cross those bridges when we get to them."
 gene_pillars.711.b: "Light sounds easy."
 gene_pillars.711.c: "Air sounds easy."
 gene_pillars.711.e: "Pressure sounds easy."

 gene_pillars.712.t: "The Guardian Eaves"
 gene_pillars.712.d: "Hinui-mangrove trees have grown throughout the pillar, sealing corridors and erupting through windows, making entry nigh impossible and progression harder still. Worse yet, these limbs appear to have become load-bearing with time, so destroying them outright is hardly an option."
 gene_pillars.712.a: "Maybe we can slip through, if we squeeze tight and drop supplies."
 gene_pillars.712.b: "Well, better get hacking, and listen for any creaks."
 gene_pillars.712.c: "Nonsense! I cast fireball!"
 gene_pillars.712.e: "It’s somewhat like mining; just avoid a cave-in as we chisel through."
 gene_pillars.712.f: "Use Barkscrawl to manipulate the wood out of the way."
 gene_pillars.712.g: "Is that a challenge?"

 gene_pillars.713.t: "Flying Fish Flock"
 gene_pillars.713.d: "An uncommon haven lies before your party. Light filters into the room through some unseen source, and settles atop a brown pool before you. You take a step forward, then– like the flash of drawn steel– a silver bolt escapes the water. Just as you prepare to parry, the bolt spreads its wings, then wheels around you before landing back in the pool. Soon, dozens of the creatures whirl through the space, and disappear through a tight shaft into another room. No sooner has the flying fish flock taken off than does it disappear, leaving you, your party, and the serenity of this hidden alcove."
 gene_pillars.713.a: "It must be safe to recover, if such fragile animals congregate here."
 gene_pillars.713.b: "Consecrate this blissful safe haven."
 gene_pillars.713.c: "Follow their path! They must know an egress."
 gene_pillars.713.e: "Such muddy water can’t be good for these creatures. Purify it."

 gene_pillars.714.t: "Sapswamp"
 gene_pillars.714.d: "Braving the tangle of branches and roots that line the chambers within the pillar, your party is no stranger to the sticky entanglement of sap. It gunks up your armor, fuses the fingers, and generally feels unpleasant. Consequently, an overwhelming feeling of dismay befalls your expedition as it happens upon a room full of golden sap, deeper than your tallest party member. However, deep underneath the molasses surface, baubles and artifacts rest on the pillar floor. Retrieving them would be hideously foolish. And profitable."
 gene_pillars.714.a: "…I mean, those trinkets look very shiny."
 gene_pillars.714.b: "Could we solidify the amber with magic, and chisel away?"
 gene_pillars.714.c: "Create some tool to retrieve them, then give the loot an appraisal."
 gene_pillars.714.e: "This seems incredibly dangerous. Leave."
 gene_pillars.714.f: "There’s something… big down there. Heave it up!"
 gene_pillars.714.g: "You idiots, the sap IS the loot. Make copal with it."

 gene_pillars.715.t: "The Trickling Light"
 gene_pillars.715.d: "Good news! Your expedition has discovered a way to partially light the sunken floors beneath the water line, involving an ancient system of daylight pipes and mirrors that would funnel light from the surface into the depths. Bad news! Something will need to be done about the shutters preventing light from the pillar tip from reaching these pipes. They look pretty heavy. Once the shutters are cleared, though, they’ll offer some smattering of illumination to help us navigate our dive into the Second Level."
 gene_pillars.715.a: "What a chore. Peel them open."
 gene_pillars.715.b: "With a little elbow grease you’ll never see those blinds again."
 gene_pillars.715.c: "I could just cast a spell to roll it back."
 gene_pillars.715.e: "I mean, how could leaving it dark possibly come back to bite us?"

 gene_pillars.721.t: "The Last Breaths of Air"
 gene_pillars.721.d: "Having exhausted the above-water corridors and navigated all other ingresses, the only passageways left to profitably explore lie in the briny recesses below. This would be simple, were it not for the fact that the entire remaining pillar is flooded from here on down, and it is anyone’s guess how far that may prove. Someone will need to shell out a pretty sum for a mage capable of maintaining a sizeable air bubble to keep our party and supplies dry."
 gene_pillars.721.a: "…Get my purse."
 gene_pillars.721.b: "Can’t we call in a favor with the [get.ruler.title]?"
 gene_pillars.721.c: "Let me just design something to do the same thing."
 gene_pillars.721.e: "I mean… I could probably do that pro bono?"

 gene_pillars.722.t: "Diatomaceous Currents"
 gene_pillars.722.d: "Currents lit with swirling bioluminescent plankton help the party navigate down towards the deeper floors, as the tidal pull draws their light deeper into the water column. As you follow their trail deeper into the pillar, a grisly scene reveals itself to you: skeletons. Countless skeletons, all of explorers, frozen in place by the buildup of sediment. Some are shockingly close to the water surface. Some are next to tunneling tools and weapons still in their skeletal grip. Some are broken to pieces by aquatic scavengers. Some look almost intact. Perhaps worst of all, some look fresh. As these bodies pass by, you cannot help but think the services of a cleric may prove useful as you press forward."
 gene_pillars.722.a: "What a terrible sight. Recover what you can to identify them."
 gene_pillars.722.b: "That’s awful… that their gear hasn’t been repurposed."
 gene_pillars.722.c: "Give to the lost their final rites, and share a moment of requiem."

 gene_pillars.723.t: "Uncorroded Metal?"
 gene_pillars.723.d: "Why is the structural metal alone so perfectly preserved? These walls have been submerged underwater for thousands of years, at least. Even the finest artifacts dissolve away in the brine of the sea– that has certainly been the case for most of the instrumentation you have uncovered as you have pressed onward into the pillar. Why have the walls not corroded, then? Why has the steel not given way? Every room you enter is full of decaying tools and experiments, but every wall you pass looks like it was built yesterday."
 gene_pillars.723.a: "It is… uncanny, but understandable. I think."
 gene_pillars.723.b: "It almost appears like powderized metal, but it’s… grown here?"
 gene_pillars.723.c: "The overlaid pattern is almost reminiscent of a shell."
 gene_pillars.723.e: "High grade metal… excellent for repairs."

 gene_pillars.724.t: "Kraken Tank"
 gene_pillars.724.d: "A tight passage empties into an enormous flooded room, complete with a massive cage. Inside, with barely a mote of space left, kraken after kraken are piled atop one another, an oddly social behavior for a species known to be territorial and cannibalistic. The krakens’ massive eyes follow your movement as you pace around the perimeter of the room towards the exit. They seemingly squeeze as far as they can away from a pipe that leads downward– strange. You can’t imagine something that would frighten a kraken into hiding, let alone this many. You’re not given much time to consider the implications of this sight, as a hungry tentacle extends from the cage. You–"
 gene_pillars.724.a: "Brace for impact!"
 gene_pillars.724.b: "Ready arms and carve the corpses!"
 gene_pillars.724.c: "Invoke a ward and run!"
 gene_pillars.724.e: "Cast a spell to get rid of ALL kraken in this room!"

 gene_pillars.725.t: "Empty Room"
 gene_pillars.725.d: "There are signs of a titanic battle fought here: broken glass, battered instruments, mana fluctuation. That said, not a body can be found."
 gene_pillars.725.a: "Weird. Press on."

 gene_pillars.726.t: "The Pulse"
 gene_pillars.726.d: "For some time, you could ignore it as a figment of your imagination– a hyperactive mind filling the gaps in the unknown while you proceed deeper into the abyss. However, as you descend, it becomes clear that to ignore your senses is denial: the slow pulse is real. Every so often, it almost seems like there is a trick of the light distorting the water. Every so often, the walls seem to shimmer, as if the entire pillar is shifting. Every so often, Layoo Feehee itself groans. When these flickers ripple through space, the faintest beat can be heard, echoing throughout the water. And perhaps your fear is getting the best of you, but it almost feels like as you descend, the pulses are getting louder."
 gene_pillars.726.a: "Make it quiet. Make it stop."
 gene_pillars.726.b: "There must be some logical explanation for this."
 gene_pillars.726.c: "Let’s plug our ears for now, and find our answers deeper."
 gene_pillars.726.e: "I guess I’ve been too preoccupied to notice."

 gene_pillars.727.t: "Glass Corridors"
 gene_pillars.727.d: "In your quest to find a less submerged path down, your group suddenly tumbles its way into a dry, labyrinthine collection of glass tubes, tall enough for even the largest ogre to stand upright within. It seems you can breathe freely in here, though an acrid, chemical odor pervades through the halls and rusts your equipment. Worse, there are inexplicable cliffs and sheer drops throughout the maze. If the space were less hostile and more navigable, these dry corridors might provide a useful space in which to erect a forward base; future expeditions will have to deal with the crushing pressure, and again, some ineffable disturbing quality of the pillar leaves you with the distinct feeling a cleric’s support will prove useful."
 gene_pillars.727.a: "Dry some space and erect a stockpile. Hopefully that’s enough."
 gene_pillars.727.b: "This smells like acid. We should really get rid of it."
 gene_pillars.727.c: "Let’s purify the air here, lest we choke."
 gene_pillars.727.e: "Is that a pile of platinum in that yellow pool of liquid over there?"

 gene_pillars.731.t: "The Inestimable Pressure"
 gene_pillars.731.d: "You have worked for months to reach this point, crawling through narrow passages and carving away at overgrown roots to continue our advance, and still the pillar goes on. Outside your narrow ward, beyond the fragile bubble of air created by your equipment, the water is heavy enough to crush you instantly. At this depth, even the potent magic you have employed to traverse the second level threatens to give way underneath the immense pressure of the water column. What, if any, precautions do you urge the rest of the expedition to take as you venture deeper into the pillar?"
 gene_pillars.731.a: "Watch your step, and never trip."
 gene_pillars.731.b: "Reinforce the bubble, and cross your fingers."
 gene_pillars.731.c: "Split the party so that if one bubble fails, not everyone will die."
 gene_pillars.731.e: "Examine our protection, and know we have nothing to fear."

 gene_pillars.732.t: "Depth-hidden Abominations"
 gene_pillars.732.d: "Walking through the water, you pass by rows and rows of old tanks, indicating this whole building was once filled with air, even at this depth. Of course, that poses the question: what was once in those tanks? No sooner is this question asked than it is answered: an immense cloud of mucus starts to drip through the air bubble your party had been walking within. It seems like some property of the mucus is weakening the magic fueling your shield. If this goes on much longer, you may be crushed by the weight of the sea collapsing inward on your party."
 gene_pillars.732.a: "Hinui-hagfish? Bail out the mucus and prepare for battle!"
 gene_pillars.732.b: "Reinforce the bubble! Ready for ranged counterattack!"
 gene_pillars.732.c: "Seems like it has interesting anti-magic properties."

 gene_pillars.733.t: "Walls of Flesh"
 gene_pillars.733.d: "You should not have attempted to dig through the walls. In an effort to shorten our journey, you made the foolish decision to pick away at the armor of Layoo Feehee, only to discover a horrible, hidden secret: under its brilliant surface, colossal sheets of pulsing red flesh pump away. Even as you watched on in horrid fascination, the walls began repairing themselves, laying down a glistening metal film until our efforts were totally invisible. Now, our party lies exhausted from the task and horrified from the foul excavation, and worse, the environment itself seems to be exerting its oppressive influence on the sanity of our party members. Something must be done to put this disturbing memory behind us."
 gene_pillars.733.a: "Drink. Drink a whole lot of everything at hand."
 gene_pillars.733.b: "Push on. It doesn’t matter. We aren’t getting eaten. Right?"
 gene_pillars.733.c: "Center yourselves. The journey isn’t over, and we need answers."

 gene_pillars.734.t: "Doors of Teeth"
 gene_pillars.734.d: "You notice a faint light shining behind a latched door. At higher levels, this may not have been such an ominous sign, but here where the midnight grip of the depths hungrily grasps around the faint light emanating from your lanterns, another light seems horrifying. You step closer to the exit, in order to determine what lies beyond when you notice a–"
 gene_pillars.734.a: "Hinui-anglerfish ambush!"
 gene_pillars.734.b: "Hinui-electric eel!"
 gene_pillars.734.c: "…Kauga?"

 gene_pillars.735.t: "Tubeworms!"
 gene_pillars.735.d: "Tubeworms! Some may not find them pretty, but down here you may be the first people in the world to see live specimens and - hopefully - live to tell the tale. These nifty little critters get their name from the massive tubular shells they make as they grow! Curious though – these just seem to be normal tubeworms, unlike most species we have encountered at this depth. You have not seen any hinui-variants anywhere."
 gene_pillars.735.a: "We can rest hidden well enough behind these little guys."
 gene_pillars.735.b: "They’ve made some gorgeous shells."
 gene_pillars.735.c: "They’re kinda ticklish!"
 gene_pillars.735.e: "Doesn’t something about these fellas seem… familiar?"

 gene_pillars.736.t: "Where No Food Exists"
 gene_pillars.736.d: "Per the fairy tales of local fishwives and grandmarms, long ago the deepest waters of Taga’ala teemed with unholy creatures of the sea, foul aberrations sent to punish the fishing lines too long and the nets too deep of greedy fisherpeople. Legend has it these creatures were slowly hunted to extinction by the kraken, who replaced their predecessors as punishment for the sin of a too ravenous hunger. Yet myth assures evil as potent as that possessed by those twilight creatures cannot be destroyed, only absorbed. If they are to be believed, the concentrated malice of those vile creatures has found its way, trickle by trickle, into the eldest, hungriest of kraken. And today, here before us, lies a kraken of unthinkable size, so large it is trapped within this tower. Its beak, the size of a whale, ravenously chews another specimen of its own kind. A bloodshot, purple, glowing eye the size of a house sizes up our party, and all too swiftly massive-yet-emaciated tentacles begin to reach out for us."
 gene_pillars.736.a: "Impossible odds."

 gene_pillars.737.t: "Biomechanics Unraveled"
 gene_pillars.737.d: "Exploring the deepest sanctum that the Kraken had previously made its abode, you notice the walls brimming with house-sized barnacles. Seeping wounds color the water red, as the tower itself bleeds. The hostile, leaking architecture of the entire building seems to trace its roots to these grievous injuries to the foundations. Staring at the architecture, it slowly becomes clear to you that the tower itself is just a massive, sick tubeworm that precursors designed to house their laboratory! You are confident that if you could just clear its injuries and sanitize it, the pillar could heal."
 gene_pillars.737.a: "De-barnacle it, and learn what you can of its regenerative anatomy."
 gene_pillars.737.b: "Nurse it back to health, and get a limitless supply of metal!"
 gene_pillars.737.c: "Tend its wounds and seal its shell! Reclaim this vast tower!"
 gene_pillars.737.e: "Heal it, and help restore its symbiotic gut biology!"

 
 gene_pillars.800.t: "Placeholder event"
 gene_pillars.800.d: "I'm a placeholder event until an actual event chain for this gene pillar is done!"
 gene_pillars.800.a: "Give me a generic event, and get back here in a year."
 gene_pillars.800.b: "Actually, I'm done, let me win now."

 gene_pillars.811.t: "Leap of Faith"
 gene_pillars.811.d: "The Gene Pillar is solidly stuck inside the maw of an enormous sandworm. Getting access will likely be very difficult. We must attempt to get ahead of it and somehow reach the part of the pillar that still protrudes from the beast’s maw. The sandworm moves at a great speed, but there are ways to catch up to it or predict its path."
 gene_pillars.811.a: "Use a sand sailing rig, and then jump."
 gene_pillars.811.b: "Jump on the worm, and walk up to the maw."
 gene_pillars.811.c: "Plan out its path and be ready to ambush it at a suitable spot."
 gene_pillars.811.e: "Simply fly over."

 gene_pillars.812.t: "Labyrinth of Steel and Sand"
 gene_pillars.812.d: "Making it onto the Gene Pillar is only half the battle. Many of the outer layers of the Pillar have been stripped by the digestive juices of the sandworm, creating many heavily damaged access points amidst what is essentially a labyrinth of steel plating, sand and other debris. We must find a good entry point into the pillar at one of these many exposed spots. Preferably somewhere with access into the center of the tower where the damage to the pillar is likely less severe."
 gene_pillars.812.a: "Scour the ruins."
 gene_pillars.812.b: "Pick a promising path and go."
 gene_pillars.812.c: "Use magic to clear some of the rubble."
 gene_pillars.812.e: "Scout out a solid path."
 gene_pillars.812.f: "Launch some of the more valuable debris pieces off of the sandworm."

 gene_pillars.813.t: "Sand Seeping In"
 gene_pillars.813.d: "As we descend into the deeper hallways of the pillar we feel an enormous trembling as the sandworm dives into the sand. As the walls shake the pillar still looks to be holding after all this time lodged in the throat of the sandworm, but just as we think we might be safe sand starts to pour into the room. We must act swiftly or we will end up drowning in the sand."
 gene_pillars.813.a: "RUN!!!"
 gene_pillars.813.b: "Swift eyes, swift actions!"
 gene_pillars.813.c: "I’ll simply make a new way through!"
 gene_pillars.813.e: "We have studied the architecture, the safe route is this way."

 gene_pillars.814.t: "Hungry, Hungry Cackling"
 gene_pillars.814.d: "As we make our way into a larger chamber we quickly become aware of numerous bones covering the floor. These bones however are not the intact bones of animals that died peacefully. These bones have been torn apart by something looking to extract the marrow within. We start to hear a horrific cackling sound as a pack of Hinuihyenas emerge from behind some nearby debris."
 gene_pillars.814.a: "Attack!"
 gene_pillars.814.b: "We need to lose them!"
 gene_pillars.814.c: "Throw them some of our supplies as a distraction."
 gene_pillars.814.e: "Keep them away with an arrow salvo."

 gene_pillars.815.t: "Sandworm Parasites"
 gene_pillars.815.d: "As we escape one threat we immediately find our way to another. We rappel down a small drop to another room due to the sideways architecture of this place, where we hoped we would find ourselves somewhere safer. But it appears that we are once again close to the outside of the pillar as a strange liquid apparently seeps into the room from the outside. What is worse is the fact that there is something moving in the vile liquid. A swarm of numerous large creatures that resemble worms or maggots start wriggling towards us, clearly intent on turning us into their next meal."
 gene_pillars.815.a: "Prepare to defend ourselves."
 gene_pillars.815.b: "Get back up. They can’t climb."
 gene_pillars.815.c: "These are parasites. We know how to handle such things."
 gene_pillars.815.e: "Burn them to ash!"

 gene_pillars.816.t: "Jagged Edges"
 gene_pillars.816.d: "Our descent into the pillar sadly does continue to be filled with hazards. We find ourselves in need of crossing a room that has suffered substantial damage due to a partial collapse. The room is filled with jagged pieces of protruding rock and metal sticking out in every direction. It is a deadly obstacle course and with the constant shaking and twisting of the sandworm keeping your footing is proving difficult enough."
 gene_pillars.816.a: "Some members of our team become injured, as expected."
 gene_pillars.816.b: "We can easily avoid this."
 gene_pillars.816.c: "A little jury rigging might do the trick."
 gene_pillars.816.e: "Break a path!"

 gene_pillars.817.t: "Material Storage"
 gene_pillars.817.d: "We seem to finally have discovered something of significant value. This room looks to have been used to store a number of valuable supplies and materials. There are hundreds of things of value here, but much of it would be too heavy to easily carry with us. We need to make sure we take the right mix of valuable loot versus tools and supplies that might help us down the line with us. The more we take for ourselves the less loot we will have to show for our efforts, but should we not return due to a lack of supplies, everything will have been for nought."
 gene_pillars.817.a: "Focus on ourselves, take the supplies."
 gene_pillars.817.b: "Take a balanced selection with us."
 gene_pillars.817.c: "Grab only the valuables."
 gene_pillars.817.e: "[Root.Monarch.GetTitle] would want us to bring it all with us."

 gene_pillars.818.t: "Large Test Tubes"
 gene_pillars.818.d: "We find ourselves standing in a massive room filled with large reinforced glass test tubes containing what appears to be young undeveloped sandworms. Much smaller than their fully grown counterparts, they would still be capable of swallowing a whole ogre alive. As we inspect the room we feel a violent shake as the sandworm changes directions, causing one of the test tubes we were currently inspecting to shake loose due to our meddling and be thrown onto the floor. To our horror the young sandworm suspended in the liquid starts to move."
 gene_pillars.818.a: "A colossal threat."
 gene_pillars.818.b: "The frontline must hold."
 gene_pillars.818.c: "Focus on keeping us alive."
 gene_pillars.818.e: "The liquid kept it in suspended animation. We can use it."

 gene_pillars.819.t: "Faded Maps"
 gene_pillars.819.d: "A faded and partially damaged carving can be seen on a part of the wall in the next room we enter. It appears to be a smaller and more simplified depiction of the pillar’s layout, hailing from the time before it was swallowed. The pillar must have been much taller previously, and it looks like we still have not managed to penetrate that far into the pillar. This map could be very useful if we could commit it to memory or find some way to bring it with us."
 gene_pillars.819.a: "Try to commit it to memory."
 gene_pillars.819.b: "We have the tools to make an imprint of it."
 gene_pillars.819.c: "Tear it out of the wall, and bring it with us."
 gene_pillars.819.e: "A Keeper can easily commit this to memory."

 gene_pillars.820.t: "The Maw of Uncertainty"
 gene_pillars.820.d: "We have mapped out a clean path though the most accessible parts of the pillar and secured the route from most dangers. With the establishment of a basecamp this far down into the Sandworm Gene Pillar further expeditions deeper into the maw should be possible with some preparations, but for now it is best if we make our way back out. However, we are bringing some very important information with us. We seem to have found some evidence that hints at the possibility of extracting the pillar out of the sandworm. These ancient notes indicate that some sort of anti-sandworm device or weapon can be found in the further reaches of the pillar. If we were able to get to it and make it work? We might be able to use it to kill the sandworm or potentially force it to spit the pillar out. And having mastered such a device we can use it to ward off other sandworms, making further explorations of the pillar considerably safer."
 gene_pillars.820.a: "We emerge with much gained!"

 gene_pillars.821.t: "The Security Door"
 gene_pillars.821.d: "A really ancient security door stands in our way as we set off from basecamp. The door seems to be still fully operational, and possessed of ridiculously high levels of durability and strength. So far, most of what we have done to it has seemed to have little to no effect. We might have to change our tactics and use a more creative approach if we want to break through the door."
 gene_pillars.821.a: "Just keep at it."
 gene_pillars.821.b: "Brute strength will eventually triumph over this obstinate door!"
 gene_pillars.821.c: "See if we can figure out the mechanism."
 gene_pillars.821.e: "Try to find a way around."

 gene_pillars.822.t: "Flipped Upside Down"
 gene_pillars.822.d: "As we are moving though some of the larger inner passageways we start to feel the ground shaking, a sensation a lot more intense then what we have become used to. It seems the sandworm is not just performing a small course correction, but is fully turning upside down, and it is doing this maneuver quite a bit faster than we thought possible. Unfortunately for us, the tunnel's geometry is not in our favor."
 gene_pillars.822.a: "We simply tumble down."
 gene_pillars.822.b: "Hang on to me!"
 gene_pillars.822.c: "Try to fly in the middle of the passage."
 gene_pillars.822.e: "Hold onto the rope!"

 gene_pillars.823.t: "Prototype Lab"
 gene_pillars.823.d: "As we make our way into the next room we find it filled with hundreds of partially intact devices of different kinds. Some devices look to have once contained a biological component that has since withered away, but others are purely mechanical and intact enough that we might be able to still use them. It appears that there are some liquids stored at one end of the room in what looks to be an intact preservation chamber of sorts. What should we spend our effort on?"
 gene_pillars.823.a: "Take as many devices as we can."
 gene_pillars.823.b: "Try out some of those preserved liquids."
 gene_pillars.823.c: "Get the devices operational again."
 gene_pillars.823.e: "Use an eye for value to take only the most precious devices."

 gene_pillars.824.t: "Tight Twists"
 gene_pillars.824.d: "These central chambers are quite hard to effectively navigate through. As we make our way through them the extensive damage creates what is essentially a claustrophobic labyrinth of passageways and broken rooms. And each time we feel the twists and turns of the worm’s movement the tunnels threaten to collapse in front of, behind or, even worse, directly onto us. As we try to clear a path and secure the passage it becomes ever more clear that we might be in over our heads."
 gene_pillars.824.a: "We need to back track and find another path."
 gene_pillars.824.b: "Just push through!"
 gene_pillars.824.c: "Use our superior pathfinding skills."
 gene_pillars.824.e: "This is not that bad."

 gene_pillars.825.t: "Deteriorating Containers"
 gene_pillars.825.d: "The constant sound of dripping starts to get on our nerves as we make our way through a massive and mostly intact chamber filled with large metallic storage drums of some kind. The dripping stems from a number of pipes in the ceiling that seem to be constantly leaking a sickly yellow fluid. The smell in the room is starting to make us all quite nauseous. We need to make it out of here, and fast!"
 gene_pillars.825.a: "I can feel my lifespan decreasing, get us out of here!"
 gene_pillars.825.b: "This is what these protective masks are for."
 gene_pillars.825.c: "Give me a few minutes and I’ll be fine."
 gene_pillars.825.e: "You do realize we don't need to breathe right?"

 gene_pillars.826.t: "A Miniature Sand-Storm!"
 gene_pillars.826.d: "An unlucky foot placement seems to have activated some mechanism within the upcoming part of the pillar. As we try to make it through the chamber before anything bad happens we feel a strong wind starting to pick up strength, and a number of panels open in the side of the chamber. Soon we are pelted by grains of sand and buffeted by strong gusts of air. We seem to be stuck in some sort of chamber meant to emulate the conditions of a sandstorm. If we do not do something soon we are going to be buried alive!"
 gene_pillars.826.a: "My eyes!"
 gene_pillars.826.b: "Faith may be blind, but it can steady any storm."
 gene_pillars.826.c: "The elements have no power over me!"
 gene_pillars.826.e: "Hunker down, I will clear a path to safety."

 gene_pillars.827.t: "Broken Gap"
 gene_pillars.827.d: "As we make our way out of a series of repetitive and heavily damaged rooms we stumble upon a vast expanse. We can see outside the pillar into the dark cavern that is the inside of the sandworm. Before us is a vast gap where the tower has taken heavy damage to the point that only the main supports that run up the full length of the pillar are left. Everything else has been stripped away, creating a nearly impassable abyss."
 gene_pillars.827.a: "We… can find another way. Eventually."
 gene_pillars.827.b: "With some well placed jumps we might just make it across."
 gene_pillars.827.c: "Fly, you fools!"
 gene_pillars.827.e: "Simply use the grappling hooks!"
 gene_pillars.827.f: "Let me try to shimmy alongside the supports!"

 gene_pillars.828.t: "The Bellows"
 gene_pillars.828.d: "We seem to have finally stumbled upon something functional that is not trying to kill us. A quite simple device that appears to be some kind of a highly advanced glassblowing machine. Our best guess is that the device was used to create the countless glass tubes storing all the biological specimens we have discovered so far while making our way through the pillar. Luckily the controls look easy to handle. We might be able to do something useful with the device, as the glass is quite beautiful, but also looks quite hot."
 gene_pillars.828.a: "Swipe! Ahh, hot!"
 gene_pillars.828.b: "Forge of Fire, turn sand to glass!"
 gene_pillars.828.c: "Art appears in many forms."
 gene_pillars.828.e: "One might be able to use the device offensively."

 gene_pillars.829.t: "Functional Security"
 gene_pillars.829.d: "Despite the many dangers we have faced up until now something we have yet to stumble upon are actual functioning security features. Our luck seems to have run out on that front, however. As we enter the next chamber in our descent a number of lights start to flash and some sort of magical device activates, unleashing a torrent of flame in our direction. We barely managed to duck for cover behind some rubble, but now we find ourselves pinned behind this cover. What should we do?"
 gene_pillars.829.a: "Rush past!"
 gene_pillars.829.b: "A well placed shot could disable it."
 gene_pillars.829.c: "I might be able to disable it."
 gene_pillars.829.e: "A plan was laid for this eventuality."

 gene_pillars.830.t: "Catalytic Breach"
 gene_pillars.830.d: "At several points during our dangerous descent we stumbled upon a pool of sandworm saliva. The substance is highly acidic. It reacts violently to most organic substances even at the slightest contact. Unfortunately, the room before us seems to have become nearly entirely covered by the substance. The ground is especially saturated with the stuff. A solid foot layer of saliva covers all potential routes, creating an obstacle that will be hard to bypass."
 gene_pillars.830.a: "Ahh, it burns!"
 gene_pillars.830.b: "It’s going to cost us time, but let’s fill it in with debris."
 gene_pillars.830.c: "I can make something to neutralize it."
 gene_pillars.830.e: "I got this!"

 gene_pillars.831.t: "Power in a Broken Pillar"
 gene_pillars.831.d: "We think we have stumbled upon something of paramount importance. The chamber we currently stand within seems to be some sort of power station. Massive pistons seem to be moving up and down in tune with the movements of the sandworm. Based on what we have been able to find out, we think this device was supposed to help keep the pillar powered by absorbing and redistributing the force created by sandworms shaking the ground below the tower. Because of the peculiarities of its construction, however, we believe it could just as easily be used to extract power from the motion of the sandworm even given the current predicament of the Gene Pillar."
 gene_pillars.831.a: "Let’s turn it on."
 gene_pillars.831.b: "I will take careful notes."
 gene_pillars.831.c: "I might siphon some power."

 gene_pillars.832.t: "Slowing Down"
 gene_pillars.832.d: "With the device operational once more, it seems to have had an impact on the worm. The shaking has lessened, and we have not felt any major twists and turns in hours. To the best of our understanding it seems the device is managing to siphon some of the energy from the sandworm's movement. This seems to have the beneficial secondary effect of slowing it down, and making it more docile. With the sandworm now less volatile we believe we might now be able to access some of the most dangerous sections of the pillar we have so far been avoiding. It will bring us to the deepest depths of the pillar, but if anti-sandworm devices can be found, it will be there."
 gene_pillars.832.a: "Our path is clear!"

 gene_pillars.833.t: "The Diligent Fixer"
 gene_pillars.833.d: "As we take our first steps into the deepest sections of the Sandworm Gene Pillar we spot some movement and ready ourselves to fend off something dangerous. To our relief it seems this latest encounter does not wish us any harm. Before us is a heavily damaged mechanim of a rather peculiar make. The mechanim seems to have been made in the image of a Dung Beetle, and pushes a large mechanical ball with hundreds of strange attachments around. To our astonishment the mechanim pulls out a number of the strange attachments and swiftly fixes a number of components in a broken door, and without much effort the door opens. This individual could be of paramount importance. They seem to be heading somewhere. We should best follow them."
 gene_pillars.833.a: "Wait up, we need to speak with you."
 gene_pillars.833.b: "We should look around for valuables first."
 gene_pillars.833.c: "There might be something here telling us more about this being."
 gene_pillars.833.e: "You go, we can case things here."

 gene_pillars.834.t: "Something Is Off"
 gene_pillars.834.d: "So far the mechanim seems to have shown us little attention, but as we continue to follow them through numerous chambers we have begun attempts to communicate with it. No means of communication that has previously worked for other types of mechanim seem to be working. At least we have received no discernible response. We suspect something might be broken about this mechanim, but we are not sure what. We need to try to see if we can get through to them in some way."
 gene_pillars.834.a: "Keep up, and keep talking."
 gene_pillars.834.b: "Break something to get its attention."
 gene_pillars.834.c: "I have an idea."
 gene_pillars.834.e: "We know who they are."

 gene_pillars.835.t: "A Breakthrough"
 gene_pillars.835.d: "We did it. The mechanim is finally trying to communicate back to us and we seem to be getting closer to some sort of understanding. As far as we have managed to gather, this mechanim has had ready access to a power source for millennia and has been active for all that time, but has fallen into an automated stupor during that enormous time span, leaving them nearly catatonic despite being otherwise fully active. They seem very excited to finally have someone to converse with, and are freely sharing information with us. Apparently it is a specially built mechanim meant to help take care of and repair systems within the pillar. Its large mechanical ball contains tools that are designed to interface with and handle the different components of the tower. Now we just need to convince them to help us."
 gene_pillars.835.a: "We have a plan to stop the sandworm."
 gene_pillars.835.b: "We are going to insist that you help us!"
 gene_pillars.835.c: "We can set you free. Come join us."
 gene_pillars.835.e: "Together we can make it out of here."

 gene_pillars.836.t: "Savannah River"
 gene_pillars.836.d: "Having convinced Stumbles-Though-Broken-Things, as our new friend has elected to call himself, we continue making our way further through the pillar. With the help of Stumbles our progress is much improved. We come upon a unique hazard, however, as we continue our descent. A large chamber lies before us, and astonishingly, a large river-like system covers the chamber that seems to be a smaller variant of the Hinuigrasslands to our north. Normally this would not be a major issue, but Stumbles informs us that his mechanical ball does not do well in contact with water. Should too much water get into the ball it might become damaged. What should we do?"
 gene_pillars.836.a: "We can carry it across."
 gene_pillars.836.b: "We can construct a makeshift raft."
 gene_pillars.836.c: "We can levitate it."
 gene_pillars.836.e: "We can manage to swim across, carrying it on our backs."

 gene_pillars.837.t: "Parasite Ambush!"
 gene_pillars.837.d: "As we traverse through the outermost layers of the upper pillar we end up coming dangerously close to the sandworm's esophageal lining. As we look on with horror - and some reluctant fascination - at the pulsing veins of the sandworm's skin a sudden splatter of blood erupts as some freakishly long pale white worm-like parasites burst out of the sandworm's skin and launch themselves at us. One expedition member ends up grabbed by one of the creatures and we just barely manage to hold onto them before they are dragged out of the pillar by the parasite. The parasite is strong however. Can we manage to hold on?"
 gene_pillars.837.a: "We got you!"
 gene_pillars.837.b: "Let me handle this."
 gene_pillars.837.c: "Beast begone!"
 gene_pillars.837.e: "Swing out, and cut it down."

 gene_pillars.838.t: "A Balancing Beam"
 gene_pillars.838.d: "As we continue our perilous journey with Stumble we come upon a point they have been unable to get past for centuries now. A large part of the tower is heavily damaged and there is little else to help us cross the opening than a single thin, but seemingly strong, support beam. We can likely manage to get ourselves across, but getting Stumble and especially his ball across will be quite challenging. Do we have any good solutions?"
 gene_pillars.838.a: "It's just a matter of balance."
 gene_pillars.838.b: "We might have to take the long way round."
 gene_pillars.838.c: "Let me rig something up."
 gene_pillars.838.e: "With the proper support, both magical and divine, we should make it."

 gene_pillars.839.t: "Precise Timing"
 gene_pillars.839.d: "Stumble tells us that off to one side of our route is a chamber with a large amount of valuable materials and devices. The issue is that the room door is set on a timer lock, and will only open during a very specific time of day. Considering that we have no idea what time of day it is from inside the worm we might have an issue here, but if we can find a solution to this problem, getting into that room would be invaluable. If we try to open it at the wrong time the defense system will likely give us some problems, however."
 gene_pillars.839.a: "A luck of the draw."
 gene_pillars.839.b: "Best leave it."
 gene_pillars.839.c: "We have a sense for it."
 gene_pillars.839.e: "I have been painstakingly keeping track of the time."

 gene_pillars.840.t: "A Voracious Consumer"
 gene_pillars.840.d: "We have stumbled upon some sort of trash chute. We are walking on a number of suspended platforms over a large circular opening in the ground. Down below we can see countless pieces of debris, but also things that look like they could potentially be valuable. There are a number of places we could likely climb down to the debris, but Stumble seems to be convinced that there is something alive living down in the debris, warning us to stay on the upper levels of the chamber. Do we take the risk?"
 gene_pillars.840.a: "Let’s not."
 gene_pillars.840.b: "Just take what can be safely grabbed from the surface layers."
 gene_pillars.840.c: "A deep dig is called for here."
 gene_pillars.840.e: "My point of expertise."

 gene_pillars.841.t: "The Writhing Worm"
 gene_pillars.841.d: "We are finally getting close to the innermost core of the pillar, but as Stumble fixes up one of the last doors needed to enter the inner sanctum a strange surge passes through the pillar. It seems our previous tampering has also provided power again to this part of the structure and the sudden power surge seems to have somewhat overloaded the device siphoning power from the sandworm. With it temporarily out of commission the worm has roared back to life. It seems to be in the process of repeatedly rolling around. We better buckle down."
 gene_pillars.841.a: "Find anywhere to seek shelter."
 gene_pillars.841.b: "Stumbles-Though-Broken-Things knows somewhere safe."
 gene_pillars.841.c: "The inner chamber looks relatively steady. Rush in!"
 gene_pillars.841.e: "Try to power the siphon device back up."

 gene_pillars.842.t: "The Inner Chambers"
 gene_pillars.842.d: "The inner chambers are massive, and seem to be almost entirely intact. Large pillars reach up under the high vaulted ceiling. Hundreds of strange coiled pieces of metal are humming across the chamber and some sort of magical energy seems to be arching between them with a sickly yellow hue. Stumble informs us that, despite the fact that the devices seem to be still functioning on the surface, several things appear to be seriously wrong. The most important one being that seemingly random arching of energy. It is not intended and likely very dangerous. We should thread forward carefully."
 gene_pillars.842.a: "Go, go, go!"
 gene_pillars.842.b: "Stumbles-Though-Broken-Things should lead us through."
 gene_pillars.842.c: "We can seek out a safe path."
 gene_pillars.842.e: "Channel magic to overload part of the grid."
 gene_pillars.842.f: "We can get beneath the floor, and move under it."

 gene_pillars.843.t: "The Mechanical Great Worm"
 gene_pillars.843.d: "As we reach the large central column we start to hear a horrifying scratching sound as metal grinds against metal. Stumble suddenly looks terrified and almost runs into a nearby energy arc in terror. We manage to hold him back, but he yells at us to get somewhere safe, and points behind us. Emerging from a passage in the floor a massive mechanical worm rises up. Hundreds of spinning disks create a strange field of pressurized air allowing it to move along the ground. As it picks up speed we realize it has set its sight squarely on us. Its maw is opening, revealing hundreds of spinning grinders. It appears we are face to face with the pillar’s last defense."
 gene_pillars.843.a: "This is our final stand!"
 gene_pillars.843.b: "I have a plan to blow it up!"

 gene_pillars.844.t: "A Small Solace"
 gene_pillars.844.d: "With the mechanical great worm eliminated we can finally enjoy a single moment of respite. We help Stumble get back to his senses and get his help in finishing up the repair of some of the systems for the great central column. While he works away the party takes a well deserved moment to rest and patch themselves back up. We are so close to our goal, and finally it seems we have nothing left to do, but wait. Or so we hope."
 gene_pillars.844.a: "Take some time to plan ahead."
 gene_pillars.844.b: "Look around and enjoy the spoils of victory."
 gene_pillars.844.c: "Split up the remaining tasks."
 gene_pillars.844.e: "A soothing touch is what is needed right now."

 gene_pillars.845.t: "The Final Component"
 gene_pillars.845.d: "It was, of course, too good to be true. It seems an important final component for the device is missing. Stumble muses that there is a chamber just below this one that might just hold a replacement component. The issue, however, is that said chamber also stores the remaining mechanical great worm protectors. Stumble predicts that they should be inactive and as long as we are very careful we should be able to avoid waking any of them up. However, he does mention that if one was to awaken, there will be a very good chance that all of them will rise."
 gene_pillars.845.a: "Give it a try."
 gene_pillars.845.b: "Let’s try to sneak in."
 gene_pillars.845.c: "Redirect some gas from this pipe, and roast them with a fireball!"
 gene_pillars.845.e: "We can make a replacement ourselves."

 gene_pillars.846.t: "The Dislodging"
 gene_pillars.846.d: "We manage to do it. As we activate the device we feel a tremendous shaking as the sandworm starts to twist and tremble in an erratic manner. The chamber in the heart of the pillar is somewhat isolated from the concussions and as such we are partially shielded from the effects. Once the shaking starts to die down, however, we feel something very different. The sandworm starts to vomit the pillar back up, and as it struggles and retches it finally manages after a desperate struggle to tear the pillar out of its mouth in the desperate attempt to get away from the device's magical emissions. As the pillar, for the first time in many centuries, is greeted by the light of the morning sun, we help Stumble out.\nWe sit atop the crumbled remains of the pillar together and Stumble is overjoyed at getting to see the rising sun after countless centuries spent in the dark of the worm’s innards. Finally, however, Stumble says: “I need to show you something that might interest you. There is something incredible in a chamber just a bit away from here.”"
 gene_pillars.846.a: "Our work is done."
 
 
 gene_pillars.900.t: "Placeholder event"
 gene_pillars.900.desc: "I'm a placeholder event until an actual event chain for this gene pillar is done!"
 gene_pillars.900.a: "Give me a generic event, and get back here in a year."
 gene_pillars.900.b: "Actually, I'm done, let me win now."

 gene_pillars.911.t: "Forcing the Lower Gate"
 gene_pillars.911.desc: "It has taken three days over rough terrain from the nearest village to reach this structure, nestled deep in the cliffs of the Great Insyaan Range. You are lucky that [Root.GetName]’s government have been willing to not only invest in your expedition, but also provide a small escort to this ruin. They have been ordered not to enter the building, but after some discussion they are willing to assist you in opening the sealed portal at the foot of the tower. On arrival, everyone agrees to make camp a short distance from the complex.\n\nYou decide to gather your things and head over for a first look at the portal, before the attempt to breach will be made in the morning. While this pillar is comparatively small compared to the tales of some of the other pillars, it still towers over you, reaching most of the way up the cliff face; you estimate it must be hundreds of floors tall. With the enormity of your coming task looming over your head, you return to the others and rest.\n\nDawn breaks, and your team and the escort make their way to the large bone-like material that has been seemingly grown over the archway, sealing the entrance shut. The leader of the soldiers walks up and starts running his hand over it, trying to find the slightest crack to force their breeching tools into, but it seems perfectly smooth. He motions over to one of his team, who steps forward with a large hammer-like polearm and takes a mighty swing at the surface. The force of the impact is evident in the shock across the soldier’s body, but the surface remains unmarred. The soldiers at this point seem stumped.\n\nRummaging through their kits, one pulls out a small delicate vial “I found this at a market a few towns ago, and bought it for my brother who is a jeweler back in the city, but this might be worth trying. I will need compensation though”. He finishes this statement looking directly at you. You nod and the soldier passes it to the leader, who takes it back towards the door.\n\nPutting the acid on the material instantly creates a huge cloud of smoke that smells incredibly acrid, the soldiers disperse rapidly to fresh air. After maybe thirty seconds the smoke clears and a hole large enough for you to enter is left in the centre of the material."
 gene_pillars.911.desc.barbarian_warrior_mechanim: "It has taken three days over rough terrain from the nearest village to reach this structure, nestled deep in the cliffs of the Great Insyaan Range. You are lucky that {country}’s government have been willing to not only invest in your expedition, but also provide a small escort to this ruin. They have been ordered not to enter the building, but after some discussion they are willing to assist you in opening the sealed portal at the foot of the tower. On arrival, everyone agrees to make camp a short distance from the complex.\n\nYou decide to gather your things and head over for a first look at the portal, before the attempt to breach will be made in the morning. While this pillar is comparatively small compared to the tales of some of the other pillars, it still towers over you, reaching most of the way up the cliff face; you estimate it must be hundreds of floors tall. With the enormity of your coming task looming over your head, you return to the others and rest.\n\nDawn breaks, and your team and the escort make their way to the large bone-like material that has been seemingly grown over the archway, sealing the entrance shut. The leader of the soldiers walks up and starts running his hand over it, trying to find the slightest crack to force their breeching tools into, but it seems perfectly smooth. He motions over to one of his team, who steps forward with a large hammer-like polearm and takes a mighty swing at the surface. The force of the impact is evident in the shock across the soldier’s body, but the surface remains unmarred. The soldiers at this point seem stumped.\n\nYour colleague steps forward and gestures to be handed the weapon, after a glance at their leader, the soldier presents it to them. With a flex of their arms they start repeatedly smashing it into the centre of the material. After five such blows, a small chip breaks off. Inspired by this they redouble their efforts and after a minute of intense violence, a crack spreads the entire height of the material and a breach is now possible."
 gene_pillars.911.a: "Sometimes brute force is what is required"
 gene_pillars.911.b: "You thank the soldiers, and step inside."
 gene_pillars.911.c: "You replace the used acid with a vial from your supplies."
 
 gene_pillars.912.t: "Active High-Intensity Defensive Wards"
 gene_pillars.912.desc: "Inside the structure, there are a maze of corridors and rooms with minimal indicators as to purpose or direction. You rapidly feel like you are becoming disorientated. On stepping out into a large crossroads, your skin tingles and you feel the latent magic in this room start to activate.\n\nThis is not the first trap you have encountered in this complex, and you know that should you survive this, it is unlikely to be your last, but for some reason this one feels different. Whereas most traps are usually trying to prevent further access to the structure, this one almost feels as if it is more attempting to prevent something from leaving the pillar. There are layers to this spell, and each one seems to be growing in intensity. The mana now filling this room almost seems to set your hair standing on end. While you do not know the magic, your gut tells you this is designed to trap, not kill.\n\nYou spin too late, as multiple wards activate behind you, and lightning starts crackling off the metal dome on the ceiling. You ready yourself to face the threat."
 gene_pillars.912.a: "The lightning arcs towards you, quick reflexes mean it only grazes you"
 gene_pillars.912.b: "You raise a barrier, which absorbs the worst of the damage"
 gene_pillars.912.c: "You raise a barrier which absorbs the damage entirely"
 gene_pillars.912.d: "You activate a shield charm, which takes the worst of the blow"
 gene_pillars.912.e: "Your shield charm takes the blow and glows briefly"
 gene_pillars.912.f: "The lightning hits your chest, you wake up a few hours later"
 
 gene_pillars.913.t: "Collection of Trophies"
 gene_pillars.913.desc.know_dragon: "You have reached a series of rooms that the other expedition members believe may have once been residential quarters for the individuals who once may have lived here. The remaining fragments of furniture and decorations indicate that, while these may not have been the most important individuals, they were still held by those of some means.\n\nAfter finding a few rooms fairly bare of goods, you stumble upon a room with some interesting decorations. On one wall, there appears to be a fragment of hide, covered in small scales that has been displayed in a frame, a shelf cut into another wall has what looks like a handful of claws and maybe a tooth or two, and a small plinth in the middle contains what you can only describe as several large fragments of shell. Your initial assumption was that these may be hunting trophies, either those of a large freshwater crocodile or ( distastefully) maybe the owners hunted kobolds.\n\nHowever on closer inspection you realised the scale for all of the items was completely wrong for kobolds, and the teeth and claws suggested a completely different configuration to those found in modern reptiles. It is clear that the remains here are draconic, and the colours do not match any documented dragon. Most fascinating\n\nYour team marks up the found items, and packages them for extraction to the capital."
 gene_pillars.913.desc.never_seen_dragon: "You have reached a series of rooms that the other expedition members believe may have once been residential quarters for the individuals who once may have lived here. The remaining fragments of furniture and decorations indicate that, while these may not have been the most important individuals, they were still held by those of some means.\n\nAfter finding a few rooms fairly bare of goods, you stumble upon a room with some interesting decorations. On one wall, there appears to be a fragment of hide, covered in small scales that has been displayed in a frame, a shelf cut into another wall has what looks like a handful of claws and maybe a tooth or two, and a small plinth in the middle contains what you can only describe as several large fragments of shell. Your initial assumption was that these may be hunting trophies, either those of a large freshwater crocodile or ( distastefully) maybe the owners hunted kobolds.\n\nHowever on closer inspection you realised the scale for all of the items was completely wrong for kobolds, and the teeth and claws suggested a completely different configuration to those found in modern reptiles. Your colleague points out that unless there were at one point some kind of hinui-kobold existed (perish the thought!) or crocodiles underwent massive changes since this facility closed, these finds do not match any known creatures.\n\nYour team marks up the found items, and packages them for extraction to the capital."
 gene_pillars.913.a: "These items need to be displayed in our palace"
 gene_pillars.913.b: "These items need further study"
 gene_pillars.913.c: "Maybe these remains should be buried "
 gene_pillars.913.d: "We should sanctify this place, and preserve these relics"
 
 gene_pillars.914.t: "Antagonistic Patrolling Defences"
 gene_pillars.914.desc.mechanim: "You duck into a small guard room, and see several automatons spaced evenly around the perimeter - heavily armed but dormant. Once convinced they look safe, you start to investigate the room for other potential exits, or even the possibility of loot!\n\nAs you cross the room, a small collection of gems catch your eye on a small podium near some of the figures. Carefully checking for traps, you start to approach. However, despite your diligence, you must have missed something, and you hear the guardians whir to life behind you.\n\nYour mechanim colleague runs over towards the figures and starts attempting to communicate to them in their rapid tongue. With rapid gestures from both parties to the room and the rest of the team they appear to reach a conclusion and weapons get lowered.\n\nYour colleague returns to the expeditionary team and speaks in your tongue “These guardians were part of the facility defences, and were designed to keep the beings that were imprisoned here contained. They used a word I do not recognise to describe them, so I am unsure what they are, but they may be related to the items we found previously.”\n\nThey pause briefly “I would very strongly advise against attempting to take the items from this room as their final orders were to keep the beings contained and prevent any looting.”"
 gene_pillars.914.desc.kobold: "You duck into a small guard room, and see several automatons spaced evenly around the perimeter - heavily armed but dormant. Once convinced they look safe, you start to investigate the room for other potential exits, or even the possibility of loot!\n\nAs you cross the room, a small collection of gems catch your eye on a small podium near some of the figures. Carefully checking for traps, you start to approach. However, despite your diligence, you must have missed something, and you hear the guardians whir to life behind you.\n\nThe first blow lands as you start to turn, knocking one of your colleagues to the ground. The automaton seem to be fighting with a fury and the combat is frantic. After a few minutes your team finally subdues the last guardian, and check on each other. The last had been knocked to the floor but was still attempting to drag itself over towards the kobolds of your group. A few members of the expedition had been knocked to the ground, but on inspection all the injuries appear to have been to disable and incapacitate not to kill.\n\nThis is a disturbing development, and after getting your colleagues back to their feet you want to swiftly leave this room."
 gene_pillars.914.desc.other: "You duck into a small guard room, and see several automatons spaced evenly around the perimeter - heavily armed but dormant. Once convinced they look safe, you start to investigate the room for other potential exits, or even the possibility of loot!\n\nAs you cross the room, a small collection of gems catch your eye on a small podium near some of the figures. Carefully checking for traps, you start to approach. However, despite your diligence, you must have missed something, and you hear the guardians whir to life behind you.\n\nA tense standoff ensues, you and your colleagues face the guardians and ready your weapons. Currently they are not moving towards you, but they seem prepared to attack. One of your team takes a pace to the right, towards the gems, and the guardians raise their weapons further, the colleague returns to their original position and the weapons lower slightly."
 gene_pillars.914.a: "You wisely leave the gems here"
 gene_pillars.914.b: "Maybe further negotiation is possible"
 gene_pillars.914.c: "We must continue on"
 gene_pillars.914.d: "These gems are not worth our lives"
 gene_pillars.914.e: "We came here for loot, to Arms!"
 gene_pillars.914.f: "They are not just tools, we can reason with them"
 
 gene_pillars.915.t: "Catastrophic damage"
 gene_pillars.915.desc: "The way ahead is becoming harder and harder to traverse. There have been several rooms that the team could not physically enter due to collapsed ceilings, and in one place some sort of seismic activity has loosed a landslide from the surrounding cliff, breaching the structure and blocking the corridor completely.\n\nAt one such barrier, one of your colleagues noticed a slight gap close to the ceiling and has spent the past few minutes attempting to widen it to see if progress is possible. After managing to get their head and torso through, they cry out, “You need to see this!”\n\nThey finish wriggling their body through and you follow. The passage is tight, and claustrophobia sets in shortly before you reaches the end, where the blockage must have fallen from. You pull your body through and find yourself in a massive open space. It looks like it may be as large as half the pillar by area and would have once been maybe four to five floors tall. You can see the remains of several of the areas where floors would have been mounted at the edges of the structure, but something caused the floors to collapse down onto the area you had been trying to explore.\n\nAbove the damage, however, something still hangs. It appears to be a large reinforced edifice, braced with large metal struts to the edge. There appears to be no way to reach it from your current location, and even if there were a way there is no possibility to breach it from where the missing floors were."
 gene_pillars.915.a: "At least some of the fallen loot will fetch a good price."
 gene_pillars.915.b: "There must be a way to monetise this area."
 gene_pillars.915.c: "We could take a closer look at the edifice."
 gene_pillars.915.d: "Get every last scrap of treasure."
 gene_pillars.915.e: "We should prioritise learning what we can."
 gene_pillars.915.f: "We can fly up and survey the edifice."
 
 gene_pillars.916.t: "The way is barred"
 gene_pillars.916.desc: "You finish penning your report, to be forwarded to the funders of this expedition at [Root.Capital.GetName]. Unfortunately, there is no way to make further progress from the lower entrance, and it is unlikely that the loot retrieved will end up turning enough of a profit to convince backers that the expedition was a useful expenditure. That said, you did note that there are several large breaches in the top of the pillar, and with the correct equipment a new expedition might be able to make further progress from that ingress.\n\nThe news may not be received too well, but you have to be honest with them, as after all your honesty is half of what they were paying you for. Half your escorting troops are staying at this site, to ensure that there is no looting before further teams can investigate the lower levels."
 gene_pillars.916.a: "Not the result we wanted"
 
 gene_pillars.921.t: "Entering from Above"
 gene_pillars.921.desc.harpy: "Once again, you have made the trek to this forsaken ruin. The journey is easier this time, as a small settlement has started to spring up around the base of the pillar. The population is just a few researchers, with a small garrison and associated camp followers. Some of the locals suggested you buy climbing supplies to traverse the cliffs, but you and your sisters just laughed and demonstrated the spans of your wings. They also warn you about some large birds seen flying around the pillar a few weeks ago, but no recent sightings.\n\nCome the dawn, you will all fly to a rendezvous point  before setting up a winch to lift any heavier items that are unable to be carried on the wing.\n\nAs you soar, the wind flutters your feathers, and you are once again reminded of the roost you grew up in. You believe that once this site is cleared, it would be the perfect location for a future roost. Once you reach the target breach, you signal to your expedition team and you land in formation, checking the opening. Swiftly, you set up the winch and start raising the rest of your gear."
 gene_pillars.921.desc.other: "Once again, you have made the trek to this forsaken ruin. The journey is easier this time as a small settlement has begun to spring up around the base of the pillar. The population is just a few researchers, with a small garrison and associated camp followers. Your stay will not be too long here, as you are due to head up the tracks leading to the top of the cliff in the morning.\n\nThe locals warn you about there being some large birds seen flying around the pillar a few weeks ago, but no recent sightings.\n\nFrom there you are expected to reach an outcrop above the pillar by the end of the day and then descend using the climbing supplies that were provided - at great expense - to your team. From the ground, it seems like a reasonable prospect.\n\nA day and a half later, however, the journey seems far more risky. Hanging from the side of the cliff, with the wind racing around your limbs, you once again wonder why you agreed to this plan. Your fingers are starting to cramp, but the breach is only a few spans away."
 gene_pillars.921.a: "You take your time and reach the breach cautiously."
 gene_pillars.921.b: "You trust the strength of the rope and swing across."
 gene_pillars.921.c: "You trust in the enchantments assisting you."
 gene_pillars.921.d: "That was easier than expected, onwards!"
 
 gene_pillars.922.t: "Roc Nest"
 gene_pillars.922.desc: "Your brief foray through the level has led you towards an area where another external breech should be. It was discounted for purposes of ingress due to a jutting shard of structure above the breech, which made traversing the outside too risky. As you enter the room, you notice that you are not the first to visit this location.\n\nJust inside the breach is a gargantuan nest, atop which is one of the apex predators of the Charkuchin range: the HinuiRoc. Rocs are known to become incredibly territorial during the breeding season, and reacting to any who may pose a threat to their young  with extreme prejudice. It is yet to notice you, but you will have to react quickly, as their senses are keen. Just as you ready to leave,  a glimmer  reveals that between the woven branches that comprise the nest rest gold and gems."
 gene_pillars.922.a: "Attempt to leave, before it notices you."
 gene_pillars.922.b: "Ready your weapons for combat."
 gene_pillars.922.c: "We have trained for this."
 gene_pillars.922.d: "This is what our ancestors taught us."
 gene_pillars.922.e: "I have a device that will help with this."
 gene_pillars.922.f: "I cast \"Hold Monster!\""
 gene_pillars.922.g: "I can guarantee we can avoid this."
 gene_pillars.922.h: "…or I could attempt to get some of that gold."
 
 gene_pillars.923.t: "Head researcher’s quarters"
 gene_pillars.923.desc: "You have reached a complex of rooms on the upper floors that appear to be residential quarters once again. Unlike those rooms you found previously, however, there is quite a lot of ornamentation here, along with one adjoining room that potentially could be a small laboratory. From these finds, your colleagues hypothesize this level may be the personal quarters of one of the lead researchers within this facility.\n\nWhile much of the relics here have faded due to the time since the facility was occupied, there are still many indicators of wealth, such as status markers and even house symbols.\n\nAmong the ruins is a sealed box. Somehow, the enchantments placed on it persist to this day. After we determined no harm would occur from opening the vessel, we found a collection of notebooks written in the same language we have found throughout the facility. These will likely prove paramount to understanding the purpose of this complex."
 gene_pillars.923.a: "Document and investigate everything"
 gene_pillars.923.b: "Take these items for display in the capital"
 gene_pillars.923.c: "This belongs to the state"
 gene_pillars.923.d: "What will these relics unlock?"
 gene_pillars.923.e: "What stunning decorations, we must replicate"
 gene_pillars.923.f: "These books may lead us to our gods"
 
 gene_pillars.924.t: "Understanding Kobolds"
 gene_pillars.924.desc.insyaa_kobold: "You have finally located what you believe to be a laboratory complex, and your team readies to breach the sealed doorway. Questions  abound as to the purpose of this structure. Legends suggest that those who occupied these towers used them for dread magics and forbidden studies. Malease has started creeping over the expedition, as they all ask, “What were they studying here?”. The collection of relics and notes start to lead to a dark conclusion.\n\nInvoluntary sounds of distress escape the team, as opening the door reveals kobolds in every stage of lifecycle developments enclosed in glass tanks. Steeling their nerves, the team ventures in to get a better look at what is inside. This is a room of nightmares; the forms in the tanks are not just varied in cycle of life.Rather, some have major deformities or damage, as if some foul magic has twisted them and sculpted their forms into unnatural states.\n\nWhat kind of evil mind ran this place?"
 gene_pillars.924.desc.cannor_kobold: "Questions abound as to the purpose of this structure. Legends suggest that those who occupied these towers used them for dread magics and forbidden studies. Malaise has started creeping over the expedition, as we ask “What were they studying here?”. The collection of relics and notes are starting to lead to a dark conclusion. You have finally located what you believe to be a laboratory complex, and your team readies to breach the sealed doorway.\n\nOpening the door leads to involuntary sounds of distress among the team, as enclosed in glass tanks around the room float what are clearly kobolds in various stages of their lifecycle development. Steeling their nerves, the team ventures in to get a better look at what is inside. This is a room of nightmares. The forms in the tanks are not just varied in cycle of life; Some have major deformities or damage as if some foul magic has twisted them and sculpted their forms into unnatural states.\n\nIt is clear what they were studying now: the power of draconic gene magic. Your people are familiar with the potential of this power, having made progress in understanding it and furthering the abilities of your race. These experiments, however, were obviously conducted on unwilling subjects, and without any consideration to what harm it could cause.\n\nThis is an evil place, and you dread what may be found deeper in the heart of the pillar."
 gene_pillars.924.desc.non_kobold: "So many questions abound as to the purpose of this structure. Legends suggest that those who occupied these towers used them for dread magics and forbidden studies, the specifics of which now occupy the team’s mind. You have finally located what you believe to be a laboratory complex and your team readies to breach the sealed doorway.\n\nOpening the door leads to a room of horror. All around are kobold corpses in glass tanks - all stages of their lifecycle - preserved with methods both mundane and magical. After the initial shock washes over the team, you all steel yourselves and start documenting everything to be found in the room. The bodies appear to have been manipulated with some strong and dark magic, twisting and changing them into unnatural forms.\n\nWhat could they have hoped to learn from this?"
 gene_pillars.924.a: "I fear what else we will find."
 gene_pillars.924.b: "Perhaps we should study further."
 gene_pillars.924.c: "Let us bury these poor souls."
 gene_pillars.924.d: "This raises more questions than it answers"
 gene_pillars.924.e: "We should bury their remains with dignity"
 gene_pillars.924.f: "We are starting to regret these expeditions"
 gene_pillars.924.g: "Maybe we should check their research"
 
 gene_pillars.925.t: "Something moves"
 gene_pillars.925.desc: "Your expedition has found a way down further into the upper complex. It once again appears to be a series of laboratories branching off the main corridor. However, unlike prior laboratories which have been well sealed, this door appears to have been breached, and somewhat worryingly the breech appears to have originated inside the lab.\n\nSome of the expedition point out that any such breach must have happened millennia ago, and should not be a worry, but you all further raise your guard  while exploring this level. You also start to notice that the outside world has started to make inroads to this level, with a few minor breaches having evidently let in spores and seeds, and so plant life has begun to take root.\n\nAfter some time, a member of your team indicates that there are signs of spoor that look recent, and then another finds a chewed leg bone of some kind of small animal. We now need to be concerned that there is some kind of predator in here with us.\n\nIt does not take long for you to start feeling watched – hunted even. Your team swiftly forms a defensive circle and watches the room at large.\n\nAfter a few minutes, one notices a flicker of movement and you all raise weapons ready to do combat. Nothing appears to show. Then once again another flicker - as if something moved in front of the light briefly - and you realise that whatever is hunting you is somehow invisible."
 gene_pillars.925.a: "I remove that direction"
 gene_pillars.925.b: "I break it’s spell, and reveal it to all"
 gene_pillars.925.c: "It cannot keep that spell up when it nears"
 gene_pillars.925.d: "When it strikes, I can retaliate"
 gene_pillars.925.e: "We have to await it’s attack"
 
 gene_pillars.926.t: "The grand vault door"
 gene_pillars.926.desc: "All the signs were pointing this way, and most of the corridors seem to terminate in this room. There are several boards around the room with traces of text upon them, but the real focus is the door.\n\nIt stands maybe 15 feet tall and 10 feet wide. From brief visual analysis, it appears to be made of the same material of the seal on the exterior of the lower levels. Unfortunately, the examination has to stop at purely visual, as the magic imbued into the door is palpable, with waves of warding and evocation magic wrapped into every layer of the door.\n\nA colleague suggests poking the warded passage with a long pole, and after taking cover you attempt this. The pole is obliterated down to sawdust in the blink of an eye. Deep carved text surrounds the door, but the first word is unclear. The other two words seem to be in the language used by the researchers here, and they seem to roughly translate to “Containment Facility”.\n\nA survey of the room quickly turns up some small items of value."
 gene_pillars.926.a: "I will return for the contents of this…"
 gene_pillars.926.b: "If you squint, the first word could be ‘Draconic’..."
 gene_pillars.926.c: "We can only hope the first word is ‘Draconic.’"
 gene_pillars.926.d: "We can learn so much from this."
 
 gene_pillars.931.t: "Entering the Draconic Containment Facility"
 gene_pillars.931.desc.insyaa: "You stand in front of this, the heart of this facility. The notes from the prior expeditions have driven our research forwards in leaps and bounds. Our scholars' careful translation of the words above the door lead us to believe it reads “Draconic Containment Facility”. What ‘draconic’ means is still unknown, but this pillar seems to have been built to contain them.\n\nHowever there is one major blocker - the door. There have been experts studying it since its discovery, and they are describing it as a magical work of art. Layer upon layer of tightly bound enchantments. Spells to bind, burn, freeze and stun, intertwined and all incredibly potent. The creators of this door were truly masters of their craft and this may have been their masterpiece.\n\nUnfortunately, you have to shatter their work to gain entry to the facility. You look to the rest of your team and gather their input, while the scholars scramble for cover."
 gene_pillars.931.desc.non_insyaa: "You stand in front of this, the heart of this facility. The notes from the prior expeditions have driven our research forwards in leaps and bounds. Our scholars' careful translation of the words above the door lead us to believe it reads “Draconic Containment Facility”. This is worrying, a pillar designed to contain dragons, we should prepare for anything.\n\nHowever there is one major blocker - the door. There have been experts studying it since its discovery, and they are describing it as a magical work of art. Layer upon layer of tightly bound enchantments. Spells to bind, burn, freeze and stun, intertwined and all incredibly potent. The creators of this door were truly masters of their craft and this may have been their masterpiece.\n\nUnfortunately, you have to shatter their work to gain entry to the facility. You look to the rest of your team and gather their input, while the scholars scramble for cover."
 gene_pillars.931.a: "You carefully unpick the multiple layers"
 gene_pillars.931.b: "Slowly work out the layers comprising the spells."
 gene_pillars.931.c: "You decipher a way to disarm the locks"
 gene_pillars.931.d: "It takes time, but you can carefully disarm the locks"
 gene_pillars.931.e: "This seems to follow familiar patterns"
 gene_pillars.931.f: "I am yet to find a door I cannot open with enough time"
 gene_pillars.931.g: "With the power of my arm, this door will open"
 gene_pillars.931.h: "We have put our top minds on finding a solution"
 gene_pillars.931.i: "We will work this out with time"
 
 gene_pillars.932.t: "Inactive Precursor Power Core"
 gene_pillars.932.desc: "This large chamber glows faintly from the arcane symbols coating the walls, tracing conduits that have not been used in millennia. The concentration of symbols increases the closer to the centre that you reach. In the centre of the room is a large plinth, topped by a golden dome.\n\nAs you near the dome, you can see a series of levers on the sides of the plinth that appear to be linked to certain parts of the arcane sigils. While every symbol emits a faint glow, the whole magical mechanism feels somehow inert, waiting. Time– or a deliberate shut down millennia ago– appear to have done its work and stopped the purpose of this space.\n\nDigging into the translation tomes you brought with you, you can determine this room was most likely a power source for the rest of the facility. You start to approach the plinth to determine if it is possible to start it again.\n\nAs you reach the plinth you see several fractures in the coating of the dome, and through the gaps in the gold you can see a familiar blue sheen - damestar!"
 gene_pillars.932.a: "The core keeps running on"
 gene_pillars.932.b: "Nothing is left for us"
 gene_pillars.932.c: "Maybe if we pull some levers, this could get going"
 gene_pillars.932.d: "Let us try replacing the power source"
 gene_pillars.932.e: "We have seen other machines of this age"
 gene_pillars.932.f: "With a bit of work, and an update of power…"
 gene_pillars.932.g: "We should be able to contain and manipulate this"
 gene_pillars.932.h: "This should just go like this…"
 gene_pillars.932.i: "This is just like disarming a trap. Probably."
 gene_pillars.932.j: "There appears to be damestear in here"
 
 gene_pillars.933.t: "Draconic Suppression Matrix"
 gene_pillars.933.desc.kobold_active_power: "While you have never suffered from them, you have heard of how a migraine is supposed to feel to the sufferer. A disturbance of the sufferer's vision, followed shortly by a rising pressure and intense agony in their head.\n\nHowever you need to correct that assessment - you have never suffered from them before today. Two turns back, you noticed a vague aura starting to form in your vision from your right eye, and then each step you took since then has seemed to drive a nail through your skull. The pressure almost becomes overwhelming as you stagger to the door.\n\nInside the room, sigils that (in your current condition) are agonising to look at blaze from all the walls, surrounding a magitechnical artefact embedded on the far wall.\n\nThrough a grimace, you look at your colleagues and see similar levels of agony in their expressions. You have to make a decision swiftly before you are all overwhelmed."
 gene_pillars.933.desc.active_power: "The room ahead glows brightly now that the generator has been restored. Waves of power emanate from the artefact in the centre of the far wall. While it does not seem harmful initially, some notes found around the room point to the purpose of this machinery: control of other beings, specifically those who are “draconic”.\n\nThe notes go into great depth into how the device works and why the creators devised it but no explanation as to why it was left active in a supposedly empty facility (one of your colleagues posits that the energy drain of the device may be why the power source eventually failed).\n\nIt is supposedly able to emit a frequency that will cause pain in them while active, and through repeated exposure it will assist in the control and “training” of them."
 gene_pillars.933.desc.other: "The symbols around this room are still inert, their infrequent flickers casting odd shadows across the room. The chamber seems focused on a possible magitechnical artefact in place on the far wall. Without power there is no true way in determining the purpose of such a thing from observation alone.\n\nFortunately for your team, and your scholars there are copious notebooks left around the space, and it does not take long to start understanding the purpose of the device.\n\nThe artefact is called a “Draconic Suppression Matrix”, and it was designed to enable the researchers here to better control their Draconic test subject. It is supposedly able to emit a frequency that will cause pain in them while active, and through repeated exposure it will assist in the control and “training” of them."
 gene_pillars.933.a: "This needs destruction."
 gene_pillars.933.b: "Somebody turn this off."
 gene_pillars.933.c: "We can use this."
 gene_pillars.933.d: "Can we adapt this for suppressing our people?"
 gene_pillars.933.e: "Let’s see if we can learn anything from this."
 gene_pillars.933.f: "That artefact would make a fine trophy."
 
 gene_pillars.934.t: "Anatomical Study"
 gene_pillars.934.desc.insyaan_kobold: "You have been feeling for a while that there is something deeply wrong in this place - almost spiritually wrong. You think back on the speeches given by your local priest when you were young about how it is the duty of all followers of the goddess to stand against the creatures and places of the underworld. You had always thought that was a metaphorical stand, but here and now you are starting to believe that this truly must be a place of great underworld strength.\n\nSteeling yourself, you nod to your allies and start forcing the sealed door in front of you. The door refuses to budge for some time, but eventually, with a slight hiss of air escaping, you manage to get enough of a gap to enter.\n\nInside is a laboratory, but on a much different scale to any you saw before in this complex. The reason for the scale difference is apparent instantly, as one wall is dominated by a beast of impressive size. After a frantic readying of weapons, it is quickly ascertained that the beast is very dead, and has been laid out across the wall as an anatomical study. One of your colleagues leaves the room rapidly looking decidedly unwell. You manage to control the roiling in your gut and move towards it for closer inspection - as finding knowledge, any knowledge is the goal of this mission after all.\n\nIt swiftly becomes apparent that your initial thoughts of this being some sort of hinuifauna is unlikely, as it does not possess the magical taint of those species that you have learned to recognise over the years. It appears to be a large scaled beast, with wide wings and four large clawed feet. It is completely clothed in scales, varying in size from some that would match your own to others that would easily make a shield bigger than you. Your unwell colleague chooses this moment to return, muttering how they thought it was some kind of hinui-kobold crossbreed, hence the panic. This does cause you to think, and you lean forward towards it and see that the colour is not just similar, but in fact an identical match to your own black scales.\n\nHowever, the most disturbing realisation is when checking out the clawed feet, the feet appear to have been bound to the wall, yet the scrape marks underneath, and slight damage around the bindings lead you to believe that this creature may not have been deceased before the anatomical study began."
 gene_pillars.934.desc.cannor_kobold: "You petitioned multiple times to be part of this expedition, as all the records suggested that one of the major dragons once was held here, you among the hundreds of potential candidates were chosen. However the deeper you travelled into this so-called “draconic containment facility” the more you regret your past choice. There is something fundamentally wrong with this place.\n\nYou deploy the door-breaching tool and nod to your colleagues to stand back. With a sizzle and a whirr, an opening is made through the centre of the door, allowing access to you all. You put your head through to assess the room on the other side. Inside is a laboratory, but on a much different scale to any you saw before in this complex. The reason for this scale difference is immediately apparent, as you see the figure at the far wall. Unfortunately at this point you pass out.\n\nWhen you come to, your colleagues are leant over you offering some water, eyes full of concern and red with recently shed tears. You look between them and ask “Is it real then?”\n\nThe first responds “Unfortunately so, and has been preserved here for thousands of years”.\n\nYou stand on shaky legs and turn back to the wall and see it. The black dragon, one of the lost dragons. Butchered and displayed for all to see as if it were in a text book. You step forward to look closer and notice something slightly more disturbing: when checking out the clawed feet, the feet appear to have been bound to the wall, yet the scrape marks underneath and slight damage around the bindings lead you to believe that the dragon may not have been deceased before the anatomical study began, and was flailing in pain and fear before these inhuman scientists.\n\n“They will pay…” you announce to the room at large, “but first, we must care for these remains. No-one deserves such a fate - especially not a god.”"
 gene_pillars.934.desc.knows_dragons: "You stand before the door with apprehension. A creeping wrongness of this place has been growing the further you go into the complex. While you may not consider yourself the most spiritual person, this place feels almost unholy.\n\nSteeling yourself, you nod to your allies and start forcing the sealed door in front of you. The door refuses to budge for some time, but eventually with a slight hiss of air escaping you manage to get enough of a gap to enter.\n\nInside is a laboratory, but on a much different scale to any you saw before in this complex. The reason for the scale difference is apparent instantly, as one wall is dominated by a beast of impressive size, even for Insyaa. A Dragon, a goddamn dragon is the wall decoration. After a frantic readying with weapons, it is quickly ascertained that the beast is very dead, and has been laid out across the wall as an anatomical study. One of your colleagues leaves the room rapidly looking decidedly unwell. You manage to control the roiling in your gut and move towards it for closer inspection, as finding knowledge - any knowledge - is the goal of this mission after all.\n\nYou go forward to look closer and notice something slightly more disturbing, when checking out the clawed feet, the feet appear to have been bound to the wall, yet the scrape marks underneath, and slight damage around the bindings lead you to believe that the dragon may not have been deceased before the anatomical study began, and was flailing in pain and fear before these inhuman scientists."
 gene_pillars.934.desc.other: "You stand before the door with apprehension. A creeping wrongness of this place has been growing the further you go into the complex. While you may not consider yourself the most spiritual person, this place feels almost unholy.\n\nSteeling yourself, you nod to your allies and start forcing the sealed door in front of you. The door refuses to budge for some time, but eventually with a slight hiss of air escaping you manage to get enough of a gap to enter.\n\nInside is a laboratory, but on a much different scale to any you saw before in this complex. The reason for the scale difference is apparent instantly, as one wall is dominated by a beast of impressive size, even for Insyaa. It appears to be a large scaled beast, with wide wings and four large clawed feet. It is completely clothed in scales, varying in size from fingernail sized to some that are large enough to double as shields. After a frantic readying with weapons, it is quickly ascertained that the beast is very dead, and has been laid out across the wall as an anatomical study. One of your colleagues leaves the room rapidly looking decidedly unwell. You manage to control the roiling in your gut and move towards it for closer inspection, as finding knowledge - any knowledge - is the goal of this mission after all.\n\nYou go forward to look closer and notice something slightly more disturbing, when checking out the clawed feet, the feet appear to have been bound to the wall, yet the scrape marks underneath, and slight damage around the bindings lead you to believe that the dragon may not have been deceased before the anatomical study began, and was flailing in pain and fear before these inhuman scientists."
 # needs custom loc
 gene_pillars.934.a: "How could anyone do such an act?"
 gene_pillars.934.b: "Can we learn anything from this horror?"
 gene_pillars.934.c: "A sad day for kobold kind"
 gene_pillars.934.d: "Can we learn anything from this horror?"
 gene_pillars.934.e: "Can we learn anything from this horror?"
 
 gene_pillars.935.t: "Precursor Library"
 gene_pillars.935.desc: "Ascending a spiral staircase during your roundabout path through the still-navigable portions of the Pillar, the expedition procession screeches to a halt. Pushing your way to the fore of the party, you see the senior mage consultant and the head scholar of the expedition bickering, as the air beyond the threshold before them takes on a black hue. Well, black would be an understatement; in the room before you, it appears as though no light exists.\n\nIn the attempt to mediate their dispute, you learn from the mage consultant you are witnessing theoretical Chronomancy - a school of magic so advanced, even your most experienced mages only understand how to rework it. Consulting your maps, the party scholars identified this room as the library, and while the tomes within are valuable, pressing on to retrieve them would cause your bodies to freeze in time.\n\nThe other option is to unstopper the flow of time, allowing your team to pass, but doing so would cause a mana rebound effect, leading to the decay of the valuable relics within. After time is uncorked, a fragment of the spell might be shaved off into a book to keep it preserved. However, the window is brief, and the magic is complex. Your scholars estimate you’ll only have moments to make a choice, and even then your mages will only have enough power to preserve a single volume."
 gene_pillars.935.a: "Draconic Gene Magic: A Primer"
 gene_pillars.935.b: "Spirits: the Future of Clean Power"
 gene_pillars.935.c: "On the Nature of Kobolds"
 gene_pillars.935.d: "Worlds Beyond Worlds"
 
 gene_pillars.936.t: "The Final Seal"
 gene_pillars.936.desc: "A familiar sight faces you at the end of the corridor. Once again the way deeper is sealed. Unfortunately, there does not appear to be any way around it;, the few scouts sent out down side tunnels all seem to end up back at this junction. The only way deeper is through.\n\nYou are familiar with how these seals work by now, - having dealt with a few in this expedition - and having read the notes of the prior trips, you believe you should be able to methodically work out a solution.\n\nLooking at your team, you start to progress down the corridor towards the door.\n\nOne of your party unfortunately does not appear to have been paying as careful attention as the rest of you, and the ominous click almost manages to echo through the hallway. Everyone freezes, hoping it was a trick of the mind and not a warning of impending doom.\n\nAlas, runes start to glow on the walls and a translucent barrier forms behind your team, the rearmost member losing part of their sleeve as they were too close to the formation point. You circle up and await the onslaught.\n\nSuddenly multiple waves of energy launch from the door, each seeming to fill the entire tunnel and you all frantically start to respond."
 gene_pillars.936.a: "Your shielding sees you through with only a few scratches."
 gene_pillars.936.b: "Your shields block some of the incoming blows, but not all."
 gene_pillars.936.c: "You deploy a series of small gizmos, taking the worst of the barrage."
 gene_pillars.936.d: "You frantically start deploying devices, aiming to protect your team."
 gene_pillars.936.e: "It always is traps."
 gene_pillars.936.f: "I will provide cover for my allies."
 gene_pillars.936.g: "Well, that was painful."
 
 gene_pillars.937.t: "Central laboratory"
 gene_pillars.937.desc: "gene_pillars.937 Description"
 #needs lots of custom loc
 gene_pillars.937.a: "I look forward to seeing what you achieve."
 gene_pillars.937.b: "I know my insights will be valuable."
 gene_pillars.937.c: "How may I serve you?"
 gene_pillars.937.d: "What is your question?"
 gene_pillars.937.e: "Remember, knowledge lasts longer."
 gene_pillars.937.f: "But first, my vengeance."
 gene_pillars.937.g: "What is your question?"
 gene_pillars.937.h: "What is your question?"
 gene_pillars.937.i: "I see no need to talk further with you."
 
 gene_pillars.1001.t: "Placeholder event"
 gene_pillars.1001.d: "I'm a placeholder event until actual events are done!"
 gene_pillars.1001.a: "Oh, look. A free coin!"

 gene_pillars.1002.t: "Again, Again, Again, Again..."
 gene_pillars.1002.desc: "Hallway, empty workshop, sleeping quarters, hallway, empty workshop, sleeping quarters, hallway, empty workshop, sleeping quarters, hallway, empty workshop, sleeping quarters, hallway, empty workshop, sleeping quarters,...\n\nFor hours upon hours we have been walking in what feels like endless circles, every room looking the same no matter what direction or doorway we step through. Is this some quirk of the pillar’s construction, or an ingenious magical trap we have found ourselves in?\n\nIn any case, our supplies will not last forever and there is only so much entertainment one can get out of playing ‘I-spy’."
 gene_pillars.1002.a: "Press onwards!"
 gene_pillars.1002.b: "Try to break down a wall."
 gene_pillars.1002.c: "The stonework looks interesting, covering a hidden passage perhaps?"
 gene_pillars.1002.d: "Be glad I carry extra chalk to mark our way..."
 gene_pillars.1002.e: "Pray for divine guidance."
 gene_pillars.1002.f: "Divination shall see us out of this mess."

 gene_pillars.1003.t: "Nexus of Realities"
 gene_pillars.1003.desc: "Finding one's way around the insides of a Gene Pillar resembles an at times insurmountable obstacle course indeed, between the decrepit bits of architecture and remaining magical anomalies.\nSo it is always a joy when one stumbles across one of the few remaining working bits of precursor infrastructure, in our case, a still - somewhat - functioning teleportation nexus just waiting to be used.\nThough can we risk trusting such an ancient device?"
 gene_pillars.1003.a: "No, continue on foot."
 gene_pillars.1003.b: "Is that a damestear core?"
 gene_pillars.1003.c: "What can possibly go wrong?"

 gene_pillars.1004.t: "A Watery Grave"
 gene_pillars.1004.desc: "To call the rarely encountered remains of the teleportation network found in the Gene Pillars unreliable would be apt, as one is equally likely to end up right where they started or in front of a very hungry beast - or worse, directly inside of one.\n\nHowever, this most recent destination might be the worst one yet, as the room we found ourselves in was entirely flooded, leaving us only a scant few moments to find a way out of this mess before we end up sleeping with the Hinuifishes, especially with both loot and gear weighing us down."
 gene_pillars.1004.a: "Find an Airpocket!"
 gene_pillars.1004.b: "Drop some Loot!"
 gene_pillars.1004.c: "Cast a water breathing spell!"
 gene_pillars.1004.d: "Emergency Dinghy, GO!"
 gene_pillars.1004.e: "Why are we worried again?"
 gene_pillars.1004.f: "Just keep swimming"

 gene_pillars.1005.t: "Of Traps and Treasure"
 gene_pillars.1005.desc: "Finding a seemingly unguarded room full of treasure, writings and preserved magical reagents is enough to brighten the day of any adventuring party. However such joy is quickly dampened when one subsequently discovers the slew of warding spells and runes placed liberally around the room.\n\nHowever, given the thousands of years that the wards were not maintained, there might be a few pieces we could carefully liberate without setting off whatever cataclysmic spells might still be waiting for intrepid looters.\n\nBut is it worth the risk?"
 gene_pillars.1005.a: "Leave it for the later survey teams."
 gene_pillars.1005.b: "Yes, focus on the valuables."
 gene_pillars.1005.c: "Swift fingers might help."
 gene_pillars.1005.d: "Yes, but the knowledge comes first."
 gene_pillars.1005.e: "I think I recall these runes."
 gene_pillars.1005.f: "Just smash it!"

 gene_pillars.1006.t: "A Trap Is Sprung"
 gene_pillars.1006.desc: "No one can say what went wrong or who set it off, maybe a misplaced step, touching the wrong wall panel, knocking over an insignificant piece of debris or greed getting the better of someone.\n\nBut everyone heard that dreaded tell-tale click and the agonising silence that follows. Now all we can do is wait for the inevitable boom..."
 gene_pillars.1006.a: "Drats!"
 gene_pillars.1006.b: "Cast an emergency ward spell!"
 gene_pillars.1006.c: "Dive for cover!"
 gene_pillars.1006.d: "‘Tis but a scratch."

 gene_pillars.1007.t: "Locked Out"
 gene_pillars.1007.desc: "As many an adventurer knows, one of the most common obstacles one finds in their travel are not the monsters or endless dungeons but instead the humble locked door.\n\nAnd one such specimen is indeed blocking the progress of our intrepid explorers. While usually swiftly surmounted, this one is both made from dense metal and lacking any kind of obvious keyhole, with only a strangely shaped recess indicating that it could be opened in the first place.\n\nWorse, other than going through, the only other way to proceed would seem to be digging through a half-buried and unstable looking doorway, which might only collapse it further."
 gene_pillars.1007.a: "Digging it is, then."
 gene_pillars.1007.b: "Try and find the missing piece to unlock the door."
 gene_pillars.1007.c: "Just unseal it with magic!"
 gene_pillars.1007.d: "Improvise a solution for the lock."
 gene_pillars.1007.e: "Improvise a better solution."
 gene_pillars.1007.f: "Finally, entertainment!"
 gene_pillars.1007.g: "You call that a door? Breaking that is child’s play!"
 gene_pillars.1007.h: "Suggest to the rubble it should be light as a feather."

 gene_pillars.1008.t: "Unexpected Journey"
 gene_pillars.1008.desc: "The travels through the chambers of the Gene Pillar have come to a rather unforeseen halt, as, after stepping through a seemingly normal doorway an unseen magical anomaly caused us to find ourselves not in another stone chamber or laboratory but instead a clearing surrounded by deep woodlands.\nAnd we were not alone, three strange, seemingly wooden, women were there, braiding each other's hair and barely acknowledging our arrival apart from a few scant words:\n\n“Strange travelers are thee, guided here by magic wild.”\n“Yet for trespassing there is a fee, else one stays here beguiled.”\n“So tell us what you consider freedom is worth.”\n“And perhaps we shall send you back to your earth.”"
 gene_pillars.1008.a: "Draw lots who shall be surrendered to the fey."
 gene_pillars.1008.b: "Offer knowledge in exchange for freedom."
 gene_pillars.1008.c: "Offer wealth to buy our freedom."
 gene_pillars.1008.d: "What if instead your praises we sing, when you safely home us bring?"
 gene_pillars.1008.e: "Present a copy of Portnamm plays."
 gene_pillars.1008.f: "Perform a dazzling dance for them."

 gene_pillars.1009.t: "Lurker in the Dark"
 gene_pillars.1009.desc: "Many beasts lurk within the Pillars, from ‘basic’ Hinuifauna to those eerie creatures long corrupted and mutated by the magical energies still lingering within.\n\nYet this recently encountered beast is one of the worst so far, lurking just outside the glow of our lights and torches and striking at us whenever we try to make a move or draw close to the shadows surrounding us.\n\nWe have to vanquish it if we wish to continue our quest and secure the pillar for further exploration."
 gene_pillars.1009.a: "Encircle it and charge!"
 gene_pillars.1009.b: "Set up a defensive perimeter."
 gene_pillars.1009.c: "Set up a trap."
 gene_pillars.1009.d: "Send our own horrors into the dark."
 gene_pillars.1009.e: "Deploy daylight flares."

 gene_pillars.1010.t: "Pillar Meshi"
 gene_pillars.1010.desc: "Despite the undeniable magical might of those who built this impossibly large pillar, unmatched by any who came after them, they were in the end still very much mortal and obedient to their biological functions - or at least their slaves were.\n\nAs such, it is no surprise to come across canteens and other places where food was regularly conjured, served and consumed.\nHowever, it is far rarer to come across one such place that is still in working condition, giving us a rare chance to restock our supplies. Having long grown tired of salted meat and hardtack, we could even risk ordering a more extravagant meal, at the risk of the device malfunctioning or it producing something with adverse affects on our health."
 gene_pillars.1010.a: "Basic fare and water shall suffice."
 gene_pillars.1010.b: "Maybe some extra mead and fruit for some variety."
 gene_pillars.1010.c: "Tonight, we shall feast!"
 gene_pillars.1010.d: "Why eat when we could study it instead?"

 gene_pillars.1011.t: "Pillars of Eternity"
 gene_pillars.1011.desc: "Walking through the massive Gene Pillars one finds not only traces of leftover experiments and precursor projects but also oh so very rare looks into the culture and more everyday habits of their builders through the rare intact items we can retrieve from ancient living rooms and bedchambers.\n\nOne of these items we stumbled upon is a dimly glowing piece of a quartzlike crystal, that makes the person holding it experience a sense of ease but also fills them with a yearning to visit an alien place entirely unknown to them. The current standing theory is that it is supposed to show a recorded image of a place of importance to the original owner. Perhaps home, or a family they longed to see again. Sadly, the magic within is too dissipated to let us truly see it.\n\nStill, what to do with such a find?"
 gene_pillars.1011.a: "Keep it and study it."
 gene_pillars.1011.b: "Sell it to the highest bidder."
 gene_pillars.1011.c: "It belongs in a museum!"

 gene_pillars.1012.t: "An Unforced Error"
 gene_pillars.1012.desc: "As we have pressed onwards, the inexperience of our party has begun to show. Misjudged steps triggering traps, overlooked hazards almost costing us our lives… it has become clear that we were not as prepared for this expedition as we thought.\n\nAfter the most recent close call, with a falling set of shelves of all things, we have paused to discuss our plan. If we continue on like this, it is obvious that the dangerous mistakes will continue, risking injury or even death to the party. On the other hand, slowing our pace and being more cautious will no doubt hamper our progress."
 gene_pillars.1012.a: "Take it slow and steady"
 gene_pillars.1012.b: "This expedition matters more than our party"
 gene_pillars.1012.c: "Fall back on their lessons"

 gene_pillars.1013.t: "The Treaded Path"
 gene_pillars.1013.desc: "In such a hostile environment, full of endless dangers and unknowns, there are few sights as welcome as the familiar. So when we breached yet another room with shields raised and blades ready, it was a relief to find that we recognized the place; we had already charted it during a previous expedition.\n\nThe tension in the party unwound as we took a moment to relax, the constant danger of the gene pillar abating momentarily as we assessed our options. We could spend more time resting in this sanctuary, or we could press on, taking this as a measure of our progress."
 gene_pillars.1013.a: "Rest and recuperate"
 gene_pillars.1013.b: "Press on"

 gene_pillars.1014.t: "A Lost Brother"
 gene_pillars.1014.desc: "A faint, intermittent clanking has haunted us throughout our expedition, echoing down the hallways of the pillar. It grew louder as we approached the next room, now clearly identifiable as mechanical footsteps. We readied ourselves to battle another deadly defense system only to find a lone mechanim inside, old and visibly damaged from their endless wandering.\n\nTheir voice is patchy and hard to parse, but they are obviously excited to see a group of friendly faces, gesturing for us to follow. Guiding us expertly through the twisting passageways, the mechanism stops at a decaying patch of wall, pulling aside the rusted plating to reveal a hidden cache of supplies within."
 gene_pillars.1014.a: "Help here never goes unappreciated"

 gene_pillars.1015.t: "A Decaying Column"
 gene_pillars.1015.desc: "Once quarried from the mountains, shaped by powerful magics, and then raised by mechanical hands, this column stood as one among many bearing the weight of the gallery. Through millennia it endured as its fellows cracked and crumbled to dust, their burdens shifting onto the few that remained. Time and seeping water sapped its strength, yet still it held, long after the halls had fallen silent and the works of its makers were forgotten.\n\nNow, disturbed by the intrusion of new footsteps, the column can bear the weight no longer. With a sudden, thunderous collapse it gives way, sending the ceiling crashing down upon the unwitting party below."
 gene_pillars.1015.a: "Bugger"
 gene_pillars.1015.b: "Flee NOW!"

 gene_pillars.1016.t: "Dwindling Supplies"
 gene_pillars.1016.desc: "There is no more smoked hinuifish.\n\nSuch a terrible discovery unsettles the party, and they pause to dig through their packs in the hopes of discovering a satchel of the delicious snack that they had missed. Such searching is unsuccessful, but also brings to light another horrible truth: their food supplies are dwindling, and there might not be enough left to complete the exploration. Dropping some loot would lower the load and allow their food supplies to be stretched to the end, but some members of the party are loath to give up their hard-won discoveries."
 gene_pillars.1016.desc.mechanim: "After the last encounter, it has become clear that the party is running dangerously low on repair supplies. The trials of the pillar have eaten through their stockpile much faster than intended, and to continue without any adjustments risks a dangerous accumulation of damage to their frames. Reducing the party's load by leaving some loot behind would allow them to stay more agile and react faster to threats, but some members of the party are loath to give up their hard-won discoveries."
 gene_pillars.1016.a: "Better safe than sorry"
 gene_pillars.1016.b: "Loot matters more than us"

 gene_pillars.1017.t: "The Old and New"
 gene_pillars.1017.desc: "Once again, the party's mage and artificer are at each other's throats. This time the argument has spiraled beyond cutting words and the two look ready to come to blows, with the mage's hands wreathed in flames and the artificer brandishing a dangerously sparking doohickey.\n\nFortunately, they managed to deescalate the situation before one of them was turned into an unusually energetic corpse. It seems the argument began as a debate over who would receive the magically powerful relics the party had found, which would be of immense value to both the mages and the artificers. Neither of them are willing to proceed until the issue is settled."
 gene_pillars.1017.a: "Favour the Mages"
 gene_pillars.1017.b: "Favour the Artificers"
 gene_pillars.1017.c: "Strike a balance"

 gene_pillars.1018.t: "The Rogue Mechanim"
 gene_pillars.1018.desc: "The war mechanim's arms are a blur, blades and claws whirring with deadly intent as it lashes out towards the party. The party leader attempts to negotiate as they dodge back, narrowly avoiding the onslaught of slashes, but the mechanism refuses to listen to reason, simply intensifying its attacks. Its tail lashes out suddenly, slamming into the leader's ankles and toppling them to the ground. With only a moment to choose their approach before the mechanim strikes again, the party leaps into action."
 gene_pillars.1018.a: "Fight back!"
 gene_pillars.1018.b: "Retreat!"
 gene_pillars.1018.c: "Target its weaknesses!"
 gene_pillars.1018.d: "Convince our brother!"

 gene_pillars.1019.t: "What We Can Take"
 gene_pillars.1019.desc: "The depths of a Gene Pillar are troves of valuable relics, but most are doomed to remain sealed within. The largest and most useful artifacts are dangerous to extract, often protected by traps and defended by the pillar's creators, and moving them through the hostile hinuifauna is an even more insurmountable challenge.\n\nHowever, this pillar is situated within a stone's throw of our capital, nullifying the transportation related difficulties. Though it would still be dangerous, major extractions might be a reasonable possibility."
 gene_pillars.1019.a: "Risk it"
 gene_pillars.1019.b: "Just focus on our normal operations"

 gene_pillars.1020.t: "Navigating the Hinuisundews"
 gene_pillars.1020.d: "As you explore the pillar’s rooms, an errant turn leaves your party sealed behind a locked door within a strange room. It appears to be some garden full of vast, bendy plants. Orbs of liquid droop from their leaves, viscous yet clear. They seem to reach for you, and as their leaves unfurl a brief moment of contact with the fluid dissolves the grime off the armor of one of your party members."
 gene_pillars.1020.a: "Run between the pots for the exit on the other side."
 gene_pillars.1020.b: "You know, some of the relics we picked up look like good shields."
 gene_pillars.1020.c: "Break down the door and avoid the confrontation."
 gene_pillars.1020.e: "Can’t we just pick the lock, and maybe a few others while we’re at it?"
 gene_pillars.1020.f: "Oh, an acid bath is EXACTLY what we’ve needed."

 gene_pillars.1021.t: "Parasitic Hermit Crab"
 gene_pillars.1021.d: "As your party opens a door, a chitinous, clawed creature leaps at you, then shoves itself down your throat. After a few moments of tortured screaming and coughing, you collapse, vomit, and become still. Fearing the worst, your party approaches your body, but then notices you are still breathing. Unsure of what to do, they produce some smelling salts to raise you from unconsciousness, and shine a light down your throat. There, lodged firmly inside, what appears to be a rather large hermit crab stares back at them."
 gene_pillars.1021.a: "It whispers secrets about the pillar. Leave it be."
 gene_pillars.1021.b: "If we poke a stick in there, it’ll grab ahold. How’s your gag reflex?"
 gene_pillars.1021.c: "Cure me. Cure me. Get it out. Cure me."
 gene_pillars.1021.e: "Let me swallow a little harder."
 gene_pillars.1021.f: "If you let it stay in there, you’ll grow an exoskeleton!"

 gene_pillars.1022.t: "Metal Nudibranchs"
 gene_pillars.1022.d: "The expedition is on its merry way when we happen upon a room bursting with sea slugs! These colorful, wonderful creatures cover the tide pools in the room, and– perhaps more amazingly– their appendages appear to be full of exotic metals! That said, you do vaguely recall a local woman mentioning that Nudibranchs are extremely poisonous, and their flashy coloring is intended to warn predators from touching them. That said… a few couldn’t hurt, right?"
 gene_pillars.1022.a: "I mean, what’s one, or two, or five?"
 gene_pillars.1022.b: "You guys go on ahead. I’ll just tidy up around here for a minute."
 gene_pillars.1022.c: "Don’t touch the toxic animals."
 gene_pillars.1022.e: "The real treasure is this uncommon sight."

 gene_pillars.1050.t: "Hinuibats"
 gene_pillars.1050.desc: "As we carefully make our way into a new chamber, large and dark,  everything seems fine at first. But as we continue, we notice the ground is heavily layered in a white hardened substance, in places wetter and smellier. We notice more of the substance drop to the floor of the room; we look up and notice the unfurling wings of a swarm of hinuibats."
 gene_pillars.1050.a: "Run!!"
 gene_pillars.1050.b: "Try to scare them off."
 gene_pillars.1050.c: "Guard and shoot!"
 gene_pillars.1050.d: "Deploy a sonic weapon."
 gene_pillars.1050.e: "Go quietly. Extinguish the torches and sneak out."

 gene_pillars.1051.t: "Living Gene Mass"
 gene_pillars.1051.desc: "As we enter a new chamber of the Gene Pillar, one of our numbers is almost immediately swallowed by a great moving mass as it sloshes down onto the ground. This horrible abomination of moving muscles and sinew, warped into a horrible congealing form, continues its assault on us cornering us in short order. We can still see the remains of a hinuibird protruding out of the mass; it gently twitches as its nerves are taken over and connected to the mass before us. Is this our fate?"
 gene_pillars.1051.a: "Shields up, defense first."
 gene_pillars.1051.b: "Swords out, cut a path!"
 gene_pillars.1051.c: "Burn it! Burn it!"
 gene_pillars.1051.d: "Look there! A secret escape hatch"
 gene_pillars.1051.e: "Try to destabilize the magic that keeps it together."

 gene_pillars.1052.t: "Hinuicentipede"
 gene_pillars.1052.desc: "We hear the skittering sound before the creature is truly upon us. Countless small clicking sounds echo through the chamber as its hundreds of legs tap the steel flooring in a rhythmic pattern. Then it springs upon us. Its gnashing mandibles snap at us, capable of tearing through metal armour as if it was paper."
 gene_pillars.1052.a: "Form up!"
 gene_pillars.1052.b: "Split up!"
 gene_pillars.1052.c: "Battle formations!"
 gene_pillars.1052.d: "Get in between its plates with a precision strike."
 gene_pillars.1052.e: "Trigger a mechanism to open up a floor panel."

 gene_pillars.1053.t: "Damestear Energy Containers"
 gene_pillars.1053.desc: "We seem to have gotten lucky for once. Instead of some deadly threat, this particular chamber seems to have served as storage for a magical battery of sorts. Whatever the batteries were meant to go into looks to have long since been destroyed, but if we can separate the batteries from the central mechanism, we think our mages could use them in a fruitful manner. Now we just have to figure out how to get them out."
 gene_pillars.1053.a: "Give up."
 gene_pillars.1053.b: "Get help from outside, however long it takes."
 gene_pillars.1053.c: "We can rig something up."
 gene_pillars.1053.d: "Clear a reliable path to get them out."
 gene_pillars.1053.e: "We will use it ourselves now"

 gene_pillars.1054.t: "Arcane Sentry Turrets"
 gene_pillars.1054.desc: "We duck for cover as a sudden blast of magic almost renders one of us a fine red mist. The turrets, even now extending from the walls and ceiling of the chamber, don’t relent - we can feel each blast reverberate though the piece of metal debris behind which we hide. It's only a matter of time before our cover - and we ourselves - are torn to pieces. What should we do?"
 gene_pillars.1054.a: "Throw a piece of debris as a distraction, and run."
 gene_pillars.1054.b: "Pick up a large piece of debris and carry it as a massive shield"
 gene_pillars.1054.c: "Try to blast them to bits."
 gene_pillars.1054.d: "Invoke divine protection."
 gene_pillars.1054.e: "Find a way to disconnect them."

 gene_pillars.1055.t: "Gravity Anomaly"
 gene_pillars.1055.desc: "The room seems normal when we first open it, but as our first member steps into it they are yanked by some invisible force upwards, almost  to their death, but we are able to grab them just in time. It seems some sort of device in the room is rendering the normal rules of gravity obsolete within the room, and not in a consistent way, either. After some observation it appears the direction of gravity changes in the room roughly once a minute. Our only way forward, however, lies clear across the room. How should we proceed?"
 gene_pillars.1055.a: "Speed is key."
 gene_pillars.1055.b: "Get some rope, and we can work something out."
 gene_pillars.1055.c: "We can figure this out with flight."
 gene_pillars.1055.d: "Disable the gravity device."
 gene_pillars.1055.e: "Make use of a well applied grappling hook."

 gene_pillars.1056.t: "Complete Floor Collapse"
 gene_pillars.1056.desc: "As we reach the middle of the room we start to feel a vibration in the floor radiating out from the eastern corner of the room. As we watch on in stunned horror, we see the floor in the corner start to collapse. Cracks start to creep towards us; it seems the entire floor is about to crumble underneath us!"
 gene_pillars.1056.a: "Rush to the other end."
 gene_pillars.1056.b: "Try to find a stable piece of flooring."
 gene_pillars.1056.c: "Plot out a guided path."
 gene_pillars.1056.d: "Take flight and hold on!"
 gene_pillars.1056.e: "It's time to cast longstrider."

 gene_pillars.1057.t: "Fabricator"
 gene_pillars.1057.desc: "We seem to have stumbled upon something incredibly useful. A machine sits in the middle of the room and with some light investigation we have learned it is capable of producing a few select materials - some of these are of no use, but others could be very precious. Sadly the machine seems almost out of energy. What should we try to have the machine make?"
 gene_pillars.1057.a: "Gold!"
 gene_pillars.1057.b: "Food."
 gene_pillars.1057.c: "Precursor Steel."
 gene_pillars.1057.d: "Strange Gene Mass."
 gene_pillars.1057.e: "Try to disassemble the device so we can retroengineer it."

 gene_pillars.1058.t: "Mechanim Graveyard"
 gene_pillars.1058.desc: "As we step into the room, we first imagine the pieces of metals thrown around the room must be from  mechanical components or old machinery, perhaps part of the gene pillar’s workings, but we then come to a realization. What surrounds us are countless, lifeless and mostly disassembled mechanim. Who or what could have done such violence to these mechanim?"
 gene_pillars.1058.a: "Scrap them."
 gene_pillars.1058.b: "This is unsettling..."
 gene_pillars.1058.c: "This is horrifying..."
 gene_pillars.1058.d: "Attempt a miracle."
 gene_pillars.1058.e: "Extract valuables from the machines."

 gene_pillars.1059.t: "Potions"
 gene_pillars.1059.desc: "Within the room are rows and rows of potion bottles. The bottles appear to be separated into four colors. There are red bottles, blue bottles, green bottles and yellow bottles. Should we leave them alone or should we try to consume them? They seem to have been kept in excellent condition. They are artificially cooled and magical fields that seem fully operational seem to be keeping them fresh. Still, it is difficult to know the effect of such substances; they could still  be dangerous after all this time. Many miracles can be found in the pillars of the Precursors; perhaps this is one of them."
 gene_pillars.1059.a: "Leave them."
 gene_pillars.1059.b: "Red."
 gene_pillars.1059.c: "Blue."
 gene_pillars.1059.d: "Green."
 gene_pillars.1059.e: "Yellow."

