 gene_pillars_rogue_E_tt: "§YSentry Mechanim§!\nMechanim originally created to serve as guards for whatever needed guarding. They hope to aid the expedition through using their jungle-honed senses and sharp wits to forge a path through the gene pillar."
 gene_pillars_ranger_A_tt: "§YRangers§!\nA group of people rugged or foolish enough to spend long stints off in the hinuilands with only nature as a companion. They are dedicated survivalists, but are better with bows than swords."
 gene_pillars_ranger_B_tt: ""
 gene_pillars_ranger_C_tt: ""
 gene_pillars_ranger_D_tt: ""
 gene_pillars_ranger_E_tt: "§YEarthsculptor Mechanim§!\nMechanim created to shape the terrain in Insyaa to the will of the Precursors. They know the land well, and intend to use this advantage when exploring the gene pillar."
 gene_pillars_fighter_A_tt: "§YFighter§!\nA group of rough-and-tumblers, ready to fight whatever needs fighting and kill whatever needs killing. Best on the front lines.\n\n§YFrontliner Class§!\nPrevent increased HP damage during expedition"
 gene_pillars_fighter_B_tt: "§YPaladins§!\nA group of holy warriors whose swords are as sharp as their understanding of the divine. Best on the front lines.\n\n§YFrontliner Class§!\nHP: §G+1§!\nPrevent increased HP damage during expedition"
 gene_pillars_fighter_C_tt: "§YBarbarians§!\nA group of warriors who may come as a regiment, but tend to each diverge in battle in their reckless rush to murder whatever they can. Best on the front lines.\n\n§YFrontliner Class§!\nHP: §R-1§!\n§G+50%§! §YLoot§! gains.\nPrevent increased HP damage during expedition"
 gene_pillars_fighter_D_tt: ""
 gene_pillars_fighter_E_tt: "§YWarrior Mechanim§!\nMechanim originally created to fight the Precursors' battles, who will now fight through the dangers of the gene pillars for the expedition.\n\n§YFrontliner Class§!"
 gene_pillars_cleric_A_tt: "§YClerics§!\nA group of devotees of the sacred, divine, and significant. What they lack in raw lethality, they make up for in knowledge and faith. Best as support.\n\n§YSupport Class§!\nReduce chance of injury after the expedition."
 gene_pillars_cleric_B_tt: "§YPriests§!\nA group of clerics with somewhat more field expertise, which they have channelled into learning to heal the sick and injured. Best as support.§YSupport Class§!\n\n§G-25%§! injury chance from low HP.\nReduce chance of injury after the expedition."
 gene_pillars_cleric_C_tt: ""
 gene_pillars_cleric_D_tt: ""
 gene_pillars_cleric_E_tt: "§YLabour Mechanim§!\nMechanim originally created to do the hard work of building Precursor civilization on Insyaa, one brick at a time."
 gene_pillars_mage_A_tt: "§YMages§!\nA group of the finest mages from the homeland, ready to explore the lands of Insyaa for gold and glory. Best as support, and experts at divining locations with significant magical power.\n\n§YSupport Class§!\n§G+25%§! §YLoot§! gains.\nThe §YLoot§! reward will always be Damestear.\nReduce chance of injury after the expedition."
 gene_pillars_mage_B_tt: "§YFlamesong Mages§!\nA group of mages who are experts at wielding flame to dispatch threats or gaze into the future. They tend to be from the Insyaan lowlands. Best as support.\n\n§YFrontliner Class§!\n§G+25%§! §YLoot§! gains.\nPrevent increased HP damage during expedition"
 gene_pillars_mage_C_tt: "§YWavesong Mages§!\nA group of mages who are experts at weaving mists to conceal what needs to be hidden or reveal what does not exist. They tend to be from coastal areas. Best as support.\n\n§YSupport Class§!\nReduce chance of injury after the expedition."
 gene_pillars_mage_D_tt: "§YStonescrawl Mages§!\nA group of mages who are experts at using the arcane to write the impossible into stone, both to change its form and aid its wielder. They tend to be from the highlands. Best as support.\n\n§YSupport Class§!\nReduce chance of injury after the expedition."
 gene_pillars_mage_E_tt: "§YStonestory Mages§!\nA group of mages who are experts at bending the world to their will with words, both to conjure and protect. They tend to hail from the Charkuchin citadels. Best as support.\n\n§YSupport Class§!\nReduce chance of injury after the expedition."
 gene_pillars_artificer_A_tt: "§YArtificers§!\nA group of wielders of the arcane, which they have grasped on to in the form of machines which aid them in wielding and standardizing even the most complex magics with ease. Experts at divining the locations of wondrous precursor machines or sources of magical power.\n\n§G+25%§! §YLoot§! gains.\nThe §YLoot§! reward will always be Damestear or Precursor Relics."
 gene_pillars_artificer_B_tt: ""
 gene_pillars_artificer_C_tt: ""
 gene_pillars_artificer_D_tt: ""
 gene_pillars_artificer_E_tt: "§YDomestic Mechanim§!\nMechanim originally created to serve as household servants, who are experts at using machines for any purpose they must be used for.\n\n§YSupport Class§!\nReduce chance of injury after the expedition."

