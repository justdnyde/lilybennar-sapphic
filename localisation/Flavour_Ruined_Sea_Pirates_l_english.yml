 RSP_potential_pirate_home_port_palegold_desc:0 "This island has plentiful timber of shipbuilding quality, defensible bays that might be guarded with cannons, and hidden coves in which to do illicit deals. In short, it is the perfect place for an enterprising band of pirates.\n\n§gThe Pirate Republic of §Y[J98.GetName]§! can seize this province, if the following requirements are met:\n[1099.GetPirateReq0] [1099.GetOwnerorFallbackNameCap] is NOT a §YPirate Republic§!.\n[This.GetPirateReq1] At least §Y63§! provinces in the §YEndralliande§!, §YRuined Isles§!, §YNorth Ruined Isles§! and §YRavenous Isle§! Regions are cities.\n[1099.GetPirateReq2] §YPrivateers§! of [1099.GetOwnerorFallbackName] or its §Yoverlord§! have at least §Y10%§! of the trade power in the §Y[1099.GetTradeNodeName]§! Trade Node.§!"

