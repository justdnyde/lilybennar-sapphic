 RSP_potential_pirate_home_port_rhasail:0 "Potential Pirate Home Port"
 RSP_potential_pirate_home_port_rhasail_desc:0 "This island has plentiful timber of shipbuilding quality, defensible bays that might be guarded with cannons, and hidden coves in which to do illicit deals. In short, it is the perfect place for an enterprising band of pirates.\n\n§gThe Pirate Republic of §Y[J95.GetName]§! can seize this province, if the following requirements are met:\n[1100.GetPirateReq0] [1100.GetOwnerorFallbackNameCap] is NOT a §YPirate Republic§!.\n[This.GetPirateReq1] At least §Y63§! provinces in the §YEndralliande§!, §YRuined Isles§!, §YNorth Ruined Isles§! and §YRavenous Isle§! Regions are cities.\n[1100.GetPirateReq2] §YPrivateers§! of [1100.GetOwnerorFallbackName] or its §Yoverlord§! have at least §Y10%§! of the trade power in the §Y[1100.GetTradeNodeName]§! Trade Node.§!"
 RSP_potential_pirate_home_port_lamentaire:0 "Potential Pirate Home Port"
 RSP_potential_pirate_home_port_lamentaire_desc:0 "This island has plentiful timber of shipbuilding quality, defensible bays that might be guarded with cannons, and hidden coves in which to do illicit deals. In short, it is the perfect place for an enterprising band of pirates.\n\n§gThe Pirate Republic of §Y[J96.GetName]§! can seize this province, if the following requirements are met:\n[1082.GetPirateReq0] [1082.GetOwnerorFallbackNameCap] is NOT a §YPirate Republic§!.\n[This.GetPirateReq1] At least §Y63§! provinces in the §YEndralliande§!, §YRuined Isles§!, §YNorth Ruined Isles§! and §YRavenous Isle§! Regions are cities.\n[1082.GetPirateReq2] §YPrivateers§! of [1082.GetOwnerorFallbackName] or its §Yoverlord§! have at least §Y10%§! of the trade power in the §Y[1082.GetTradeNodeName]§! Trade Node.§!"
 RSP_potential_pirate_home_port_trollshaunt:0 "Potential Pirate Home Port"
 RSP_potential_pirate_home_port_trollshaunt_desc:0 "This island has plentiful timber of shipbuilding quality, defensible bays that might be guarded with cannons, and hidden coves in which to do illicit deals. In short, it is the perfect place for an enterprising band of pirates.\n\n§gThe Pirate Republic of §Y[J97.GetName]§! can seize this province, if the following requirements are met:\n[2135.GetPirateReq0] [2135.GetOwnerorFallbackNameCap] is NOT a §YPirate Republic§!.\n[This.GetPirateReq1] At least §Y63§! provinces in the §YEndralliande§!, §YRuined Isles§!, §YNorth Ruined Isles§! and §YRavenous Isle§! Regions are cities.\n[2135.GetPirateReq2] §YPrivateers§! of [2135.GetOwnerorFallbackName] or its §Yoverlord§! have at least §Y10%§! of the trade power in the §Y[2135.GetTradeNodeName]§! Trade Node.§!"
