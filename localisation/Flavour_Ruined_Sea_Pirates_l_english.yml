l_english:
 RSP_just_adventuring_title:0 ""Just" "Adventuring""
 RSP_just_adventuring_desc:0 "It’s amazing to see the places you can go if you act like you belong there. We once heard of a pirate crew who sailed out of the Trollsbay, who sailed off with an entire DTC ship by sneaking into their port and dressing like merchants. The ship was full of cabbages, aye, but that’s not the point of the story.\n\nThe point of the story is that you can get anywhere you want with a winsome smile and a bit of panache. Our teeth may be too rotted to smile much anymore, but if panache was gold we would all be retired by now. But of course, we are not the only ones who know the value of a bit of guts, a bit of perseverance, and the swagger that comes from your lucky piece of eight.\n\nIn Cannor, there are people like us, who just need a passage over and a crew berth to make something of themselves - and make us rich in the process. That’s a bargain if we’ve ever heard one! We can provide them with the passage and a berth. All they’ll have to provide is the courage to step up, and the sense to act like they belong."
 RSP_just_adventuring_unlock_estate_privilege_tt:0 "Enable the §Y[Root.GetAdventurersName]§! privilege '§YSwashbuckling Expertise§!'.\n\nEnable the §Y[Root.GetAdventurersName]§! privilege '§YEnnoblement of [Root.GetAdventurersName]§!'.\n"

 RSP_what_we_do_best_title:0 "What We Do Best"
 RSP_what_we_do_best_desc:0 "When we pirates were wee lads who sat on our papas’ knees, he told each of us that everyone has special gifts, and that these gifts are what make the world go ‘round. Some people can forge great swords of metal, and some are good at making the numbers add up. Some people make big fancy works of art, which sell for lots of money. Some are nobles, who have special gifts for sitting around all day. He said that once we find our gift, we’d be able to add something to the world ourselves. Of course we all had one - we just had to find out what it was.\n\nAnd now that we’re grown, we’ve certainly found our specialty, across many years of searching. What we do best is stealing! The world is a great feast, and even if none of it belongs to us, we’ll take our share anyway. The colonists and companies of the Ruined Sea certainly don’t have anyone whose special gift is securing their valuables.\n\nGather the mateys! Stock the ship with rum! A great adventure is about to begin!\n\nWe’ll hoist the black flag, and we’ll paint the world gold!"
 RSP_what_we_do_best_ei:0 "\n§GEvent Insight§!\nThe captains of [Root.GetName] grow restless with small-scale raiding, whispering of fleets thick with timber and cannons enough to shake the horizon. The time may have come to wager your plunder on something greater - to carve the name of [Root.GetName] into the Ruined Sea as more than just a passing curse.\n\n§gThis event will enable finding §YBuried Treasures§! in §YRaided Coasts§!.§!"

 RSP_protect_our_loot_title:0 "Protect Our Loot"
 RSP_protect_our_loot_desc:0 "Once you have been around the sea for as long as we have, you begin to collect something of a nest egg. Every pirate does something different with it. Some are saving up for a little house of their own, and some drink each nest egg away the moment they step ashore. Some just like to look at it.\n\nBut the one thing that every pirate needs is a way to keep that loot safe. You could bury it, but we all have seen how that story ends far too many times. No, what a pirate needs is a way to stash that hard-stolen plunder somewhere safer - and easier to get to - than the bottom of the Ruined Sea.\n\nIt might make sense to build for ourselves a little fort where we store our gold. We’ll ask the lads to chip in for a big stone castle, and we’ll put big spiky sticks on the places ashore where some greedy people like us might land to try and steal it.\n\nIt might be fun, trying to protect something for a change! And once we have our safe spot, new crewmates will flock to us like flies."
 RSP_protect_our_loot_effect_tt:0 "Every country will lose their §Yclaim§! and §Ycore§! on §Y[Root.Capital.GetName]§!."

 RSP_learning_the_ropes_title:0 "Learning the Ropes"
 RSP_learning_the_ropes_desc:0 "Every pirate knows something about knots. We teach them to the cabin boys as soon as they can swab the deck without dropping the mop. We can tie them blindfolded. We can tie them single-handed, as many a hook-handed pirate can prove.\n\nAnd the reason for that is simple: there’s an easy rhythm to knots. Rope over rope, pull and tuck, and your fingers remember what your mind no longer needs to think about. Eventually, the pattern lives in your bones. A lot of things are that way. Perhaps commerce could be too. Cargo in, cargo out. Coin changing hands. Ships arriving full and leaving fuller. Learn the pattern, keep the rhythm, and the work begins to tie itself.\n\nIf we learn the ropes, perhaps we’ll be able to reap the rewards as we sit about and gamble."
 RSP_learning_the_ropes_ei:0 "\n§GEvent Insight§!\nThe hidden anchorage of [Root.Capital.GetName] has grown into a roaring pirate haven, its docks choked with prize ships and new-built taverns. Coins flow freely, and though 'officials' may prattle of 'order', this is a port where plunder speaks louder than rules."

 RSP_homemade_title:0 "Homemade"
 RSP_homemade_desc:0 "Something people don’t often know about pirates is that we don’t just spend all our time stealing things: we have all the talents required to build and maintain ships. The repairs may be a little ramshackle, but we don’t have much other choice besides striding into some rich colonial town and asking them to do the repairs for us. Someone tried that once. We don’t hear much from him anymore.\n\nWe also build fine ships, as long as you don’t mind a carpenter going to sleep in the hull every now and then. Of course, nobody ever buys them, because who would ever buy a ship from a pirate? But a pirate is nothing if not enterprising. Our shipwrights work for free, so long they get a seat at the table when the booty is divided. We require a lot from a good ship that a landlubber might not think of: a place to store the rum, decks and decks of cannons, plenty of room to hold the loot, sails light enough to speed ahead in a chase, a place to store the rum, and naturally, a place to store the rum. \n\nThe scurvy shipwrights back home can make as many ships for us as we need, and if we should ever need more? We can always steal them!"
 RSP_homemade_ei:0 "\n§GEvent Insight§!\nIn the tar-thick air of the [Root.Capital.GetName] shipyards, new warships rise, heavy with guns, and marked only with [Root.GetAdjective] own insignia. No stolen prize nor patched relic, but vessels built to carry gold, powder, and glory enough to carve new legends into the Ruined Sea.\n\n§gThis event will upgrade §YDock Buildings§! and §YShipyard Buildings§! of our §YDens of Piracy§!.§!"

 RSP_isle_of_mists_title:0 "Isle of Mists"
 RSP_isle_of_mists_desc:0 "To the far east just before you hit the high seas lies the isle of Endralliande. Mists roll across it night and day, and they fill the place with a sense of foreboding. Its shores are pocked with hidden coves hidden so deep within the fog that if we hadn’t already known of them, we’d never find them again in a hundred years. It is a great hub of trade, and every ship bound to or from Cannor at some point finds itself passing through the waters of Endralliande. It’s everything a pirate could want.\n\nThe colonial overlords of the place don’t see it that way. They think of the mist as something to be sailed around, or worse, dispelled. Everything that’s special about the place is sucked out of it by taxes with fancy names, and the sailors of Endralliande barely have enough to eat. \n\nWhat landlubber bilge rat foolishness! We’ll go to Endralliande, and we’ll show the people there that there’s a better way to live, out on the high seas! We’ll steal the taxes of Cannor right back from under their master’s noses. The people of Endralliande are perfect pirates. They just don’t know it yet."
 RSP_isle_of_mists_effect_tt:0 "One province in the §YEndralliande§! Region that meets the requirements:\n   Gain §G2§! Base Tax in §YProvince(s)§!.\n   Gain §G4§! Base Production in §YProvince(s)§!.\n   Gain §G3§! Base Manpower in §YProvince(s)§!.\n   §YProvince(s)§! gets their §YShipyard Building§! upgraded. If no building is present, add §YShipyard§!, and if §YGrand Shipyard§! is, gain §G500§! Sailors.\n   §YProvince(s)§! gets their §YDock Building§! upgraded. If no building is present, add §YDocks§!, and if §YDrydocks§! is, gain §G500§! Sailors.\n   §YProvince(s)§! gets '§YDen of Piracy§!' until the end of the game, giving the following effects:\n   Land Force Limit: §G+2.00§!\n   Naval Force Limit: §G+4.00§!\n   Hostile Fleet Attrition: §G+1.00§!\n   Naval Combat Local Bonus off owned coast: §G+1.00§!\n"

 RSP_lord_of_pirates_dominate_fleets_ctt:0 "Has used the '§YDominate the Fleets§!' to §Ydominate§! all other §YAelantiri Pirates§!."
 RSP_lord_of_pirates_largest_fleet_ctt:0 "Have a fleet equal or larger than all countries with their capital in the §YRuin Proper§! Subcontinent."
 RSP_lord_of_pirates_ei:0 "\n§GEvent Insight§!\nThe plunder grows vast, the seas crowded, and rival captains pull in a dozen directions while empires fatten on the chaos. If piracy is to rule more than scattered coves, the Driftcourt must choose a true King of the Pirates to command the fleets.\n\n§gThis event will make the requirements of the '§YBecome the King of the Pirates!§!' decision easier... or be the final moment to leave piracy behind.§!"

 RSP_piratical_diplomacy_title:0 "Piratical Diplomacy"
 RSP_piratical_diplomacy_desc:0 "We may have something of a reputation, but there are many good things about us pirates. We’re very good at tying knots. When we sing out of tune, the rest of the crew drown us out. We bathe, sometimes even as much as once a month if we want to be all fancy about it.\n\nBut for all these things, the best thing about pirates is that we’re direct. We’ll always tell you what we think, and at gatherings of the pirate fleets, we don’t have to act like prissy princelings going off to boarding school. It’s very easy to make friends with another pirate, you see. All you need is a story to swap and a good bottle of rum to share, or else a couple pieces of gold. Pirate chums are the best type of chums, and once you make one you’ve made a friend for life.\n\nAnd of course, it’s also very easy to make a pirate your enemy. Just stand on his table at the tavern, call him a right rotten blighter, kick over his tankard, and run off!"
 RSP_piratical_diplomacy_ctt:0 "§Y[Root.GetName]§! is the only §YPirate Republic§! in §YAelantir§!."
 RSP_piratical_diplomacy_effect_tt:0 "Gain §G2000§! Sailors for every Rival or Enemy §YPirate Repblic§!.\n\n(Every Pirate Republic Ally):\n   Add §G10§! Trust towards §Y[Root.GetName]§!.\n   §YCountry§! owes §Y10§! more favors to §Y[Root.GetName]§!."

 RSP_strenghtening_our_grasp_title:0 "Strenghtening Our Grasp"
 RSP_strenghtening_our_grasp_desc:0 "People hear tales about us pirates as we ‘yo ho ho’ across the sea and count our money, and they assume that the life of a pirate is easy. They’re wrong, of course: a pirate’s life isn’t all sunshine and rum.\n\nAcross the Ruined Sea, there are many of us pirates, ‘tis true, but there are warships in abundance too, sent out to patrol the seas by men far away who want to pile more gold on top of their dragons’ hoards. Whenever we see a really juicy prize or a good piece of loot, some Asraport or DTC fop with a fancy three-decker ship will emerge out of nowhere, and fire his cannons at us until we’re forced away. It’s a big game of cat and mouse, really. \n\nFortunately, the cats are dumb and the mice know every nook and cranny of the house, but that doesn’t mean this is the natural order of things. What we need is more ships and more pirates, everywhere we can get them. We’ll run, hide, and build up our strength, until one day those DTC ships will see one of us in the distance, move to chase us, and in their haste won’t notice the pirate fleet rising up behind them.\n\nIf we were the cats, imagine how we could fill our bellies!"
 RSP_strenghtening_our_grasp_ei:0 "\n§GEvent Insight§!\nNo longer content with gnawing at convoys, the captains set their sights on the fat hearts of empire - counting houses, docks, and gilded vaults heavy with unguarded fortune."

 RSP_cut_the_purses_title:0 "Cut the Purses"
 RSP_cut_the_purses_desc:0 "Imagine, for a moment, a very rich bloke who has to walk through a very bad part of town. He knows that all around him are people who could live for a month off one of the buttons on his coat. He isn’t stupid. So what does he do? He arms up. He buys a bunch of muscly bodyguards, and he stacks them around him like bars of a cage.\n\nBut the bad part of town has an advantage. They know the lay of the land. They’re willing to risk more. All they have to do is find one single, solitary moment to strike. So there’s nothing to prevent some enterprising soul from dodging in, cutting the rich man’s purse from his belt before he can blink, and making off into the night. \n\nEven if the bodyguards follow, they’re going to have to go onto the waves to find us, and the waves are ours. We can take the fight to them when we can, run away when we can’t, and eventually we’ll have ourselves a bounty so large we won’t be able to spend it all.\n\nIt’s going to be hard to take on the trading companies, aye. But we don’t have to run roughshod over them. All we have to do is reach out, slash the ropes of that fat money bag, and watch as the coins drop into our hands. Imagine how they’d jingle!"
 RSP_cut_the_purses_effect_tt:0 "For every target of this mission (up to §Y4§!) the following effect happens:\n   Gain §G25§! Prestige.\n   Gain §G250.00§! Crowns.\n   Get §Y5 '§GSunchasers§!' Light Ships§! in §Y[Root.Capital.GetName]§!.\n"

 RSP_the_liquid_gold_title:0 "The Liquid Gold"
 RSP_the_liquid_gold_desc:0 "The Ruined Sea holds treasure in abundance, aye. We could live like kings off its wrecked ships dripping with underwater riches or its fat trade fleets bound for Cannor alone, but something would be wrong. We wouldn’t feel complete.\n\nA real pirate knows that, for all the good that gold and silver do, there’s a little something else that we need to sail the high seas. We need sugar in abundance, the tools to press it, and a place to distill the juice.\n\nAfter all, how are we supposed to ‘yo ho ho’ without a bottle of rum?"
 RSP_the_liquid_gold_ei:0 "\n§GEvent Insight§!\nWhen the rum runs dry, even the fiercest pirates forget about gold and glory, because nothing stirs sea-dogs' blood like an empty cask.\n\n§gThis event will replace §YGrain§! with §YSugar§! in our owned provinces, provided they have adequate infrastracture.§!"

 RSP_to_the_depths_title:0 "To the Depths"
 RSP_to_the_depths_desc:0 "We pirates tend to be peaceful folk when there’s nothing to steal, given that without it there’s not much sense in risking your neck. But on occasion, a disagreement with another band of pirates can cloud your judgement, and you strap on your cutlass even when there’s nothing to be stolen.\n\nThere are rules for these times, and you’ve got to be sure to follow the code. First, you’ve got to parley. Sit down with the other captain on neutral ground, and attempt to hash out your differences. Be civilized-like about it, since there’s no sense in spilling blood that doesn’t need to be. But keep that cutlass close regardless.\n\nIf that fails, hopefully you’ve been preparing your crew, or at least your cannons. You aren’t supposed to during parley, of course, but everyone does it. Some rules may be unwritten, but only fools fail to grasp them."
 RSP_to_the_depths_effect_tt:0 "\n§Y[Root.GetName]§! gains a permanent claim on all Areas containing §YAelantiri Pirates' Home Ports§!.\n\nEnable the '§YDominate the Fleets§!' decision, that allows us to rein in other §YAelantiri Pirates§!, improving the '§YDominated Fleets§!' modifier and unlocking their §YUnique Flagship Modification§!."

 RSP_pillaging_the_shores_title:0 "Pillaging the Shores"
 RSP_pillaging_the_shores_desc:0 "The sea is a wonderful place. We’d spend our whole lives out there if all the treasure wasn’t on land, but as it is the rest of the world tends to build their houses on solid ground. And thus, we must pose a great question to the pirate philosophers. All the booty is on land. We’re on sea. How to get one to the other?\n\nThe answer which pirates have relied on since time immemorial is a good old-fashioned pillage, to haul the goods of foreign towns away to sea. There’s nothing quite like a pillage, of course. Walking down the fancy streets where the rich folk live as they run away screaming, with a slice of their fresh-baked bread in your mouth and their finest silver cups in your bag - it makes you feel like you can conquer the world. \n\nAnd with the booty question resolved, we must refer again to the wisdom of the pirate philosophers. There’s so much to steal, but there’s so little time. All we can do is steal as much as we can!"
 RSP_pillaging_the_shores_effect_tt:0 "Enable the '§YPillage Coastal Defense§!' Peace Option, that allows §Y[Root.GetName]§! to destroy foreign §YCoastal Defense§! Buildings and gain §G20.00§! Crowns per destroyed Building.\n\nDeclaring a war against a country removes the '§YRaided Coast§!' province modifier from all its owned provinces.\n\n[Root.GetUniqueRaidingEffect]"
 rhasail_raiding:0 "§YRaiding Coasts§! will give §G0.025%§! Army Professionalism per province raided."
 lamentaire_raiding:0 "§YRaiding Coasts§! will give §G0.25§! Religious Power per province raided." 
 trollshaunt_raiding:0 "§YRaiding Coasts§! will give §M0.25§! Mana per province raided."
 palegold_raiding:0 "§YRaiding Coasts§! will give §G0.025§! Innovativeness per province raided."

 RSP_living_legends_title:0 "Living Legends"
 RSP_living_legends_desc:0 "Every pirate captain knows that a good story is worth all the gold you got if you can make it work for you. On sun-bleached days and drunken nights, the scallywags and swashbucklers of the Ruined Sea will assemble in a hundred different places to swap some of their greatest feats. Tales of bravery and the open sea! Tales of battles well-won, and scrapes barely escaped! Tales of gold most of all. When we tell a story, we embellish as much as we please: sometimes you have to be creative to get to the truth of the matter.\n\nThese tales are what carry sway among us pirates. We don’t care where you’re from, or who you know. We care what you’ve done, and what you’re going to do. On occasion a pirate will amass so many tales to swap that he becomes a tale in and of himself. The sea has legends aplenty, but everyone on the Ruined Sea hankers to add a few of their own.\n\nGold is a wonderful thing, but all the gold in the world would be that much sweeter with immortality on the side."
 RSP_living_legends_buried_treasures_ctt:0 "Has found at least §Y4§! Buried Treasures."
 RSP_living_legends_effect_tt:0 "§Y[Root.Monarch.GetName]§! will gain the status of §YLegendary Pirate§! or if [Root.Monarch.GetSheHe] already is one, gain §G100§! of each Monarch Power.\n\nWinning wars against §YGreat Powers§!, while all eligible provinces on their capital's continent have the '§YRaided Coast§!' province modifier now has a §G25%§! chance to grant our §Y[Root.Monarch.GetTitle]§! the status of §YLegendary Pirate§!."

 #RHASAIL
 RSP_rhasail_letters_of_marque_title:0 "Letters of Marque"
 RSP_rhasail_letters_of_marque_desc:0 "How fortunate, that circumstances have aligned in our favour! The Ruined Sea can be such a perilous place, and a number of the powers of Cannor have decided that its natural desirability is undermined somewhat by its multitude of criminal elements. The men of Rhasáil have experience in dealing with such riff-raff, and we have promised at several splendidly adorned soirees to several very important people that if only we were to be given the resources to deal with the problem, the benefit would well outweigh the cost.\n\nAs such, we have been granted a special license! We are to hunt enemies of the colonial powers, and we will receive only the most courteous treatment from their officials while we dock in their ports. How fortunate that the governors of these civilized and esteemed lands have seen fit to align themselves with us.\n\nCertaintly, the money that we greased their well-manicured palms with did not hurt."
 RSP_rhasail_letters_of_marque_ctt:0 " countries with their capital on the §YCannor§! continent:\n   Has opinion modifier §YSent Gift§! of at least §Y10§!.\n   Has opinion modifier §YImproved Relations§! of at least §Y50§!.\n   Any Rival:\n      Has any province in §YAelantir§!."
 RSP_rhasail_letters_of_marque_tt:0 "As long as '§YGentlemanly Conduct§!' country modifier is active, finding a §YBuried Treasure§! will improve opinion of a §Yrandom Cannorian colonizer§! by §G50§!.\n\nEnable the §YNobility§! Estate and rename it to §YMarquers§!."

 RSP_rhasail_charming_rogues_title:0 "Charming Rogues"
 RSP_rhasail_charming_rogues_desc:0 "It is rather easy to prove oneself in the arena of wit and charm. It is a skill that may be cultivated like any other, and one a gentleman must never be without if he hopes to woo a gracious lady.\n\nOne must know how to dance a good minuet, of course. The jollier dances may be fine for the riff-raff, but the higher folk must never be seen to stoop to such base amusements. Remember: knees locked, eyes forward, and for all that is good in the world remember to keep time with the music. If you’re having fun, you’re doing it wrong.\n\nAs you dance, you may receive the opportunity to talk with your partner in a quiet and genteel manner. What she says is not of importance. Just smile, nod, and laugh - if you have polished your conversational skills enough, your replies to anything she says should be automatic. The most important thing is the smile. Smile wide.\n\nAt this point, you may - and understand this is not to be taken lightly - break social convention. You are a buccaneer! You are dashing, handsome, and witty! The young lady you dance with is itching to leave, and is only restraining herself for the sake of propriety.\n\nLeave with her, or with as many ladies as you like. Put all of Cannor on your dance card, young man!"
 RSP_rhasail_charming_rogues_effect_tt:0 "Add/Increase §YDwarven§!, §YElven§!, §YHalfling§! and §YHuman Minority Size§! in §Y[Root.Capital.GetName]§!.\n\nGain §G3§! Republican Tradition and §G5§! Prestige per §YCannorian§! country with at least §G+100§! opinion of §Y[Root.GetName]§! (up to §G15§! Republican Tradition and §G25§! Prestige at §Y5§! §YCannorian§! countries).\n\nUpgrade the '§Y[Root.GetNobilityOrFallbackName] in Officer Corps§!' Estate Privilege to additionally give the following modifiers:\nYearly Navy Tradition Decay: §G-0.5%§!\nAdmiral Cost: §G-10.0%§!"

 RSP_rhasail_yours_truly_title:0 "Yours Truly"
 RSP_rhasail_yours_truly_desc:0 "My dearest, most esteemed, and most highly respected Governor:\n\nI have received word from a ship in my fleet - which was never much liked by the rest of us anyway - that diplomatic protocol has been breached. Apparently, the captain of that ship disobeyed my direct orders, and lucratively plundered a settlement which was under the control of the crown of your nation. I hope those crown jewels which had been put on display in the settlement were not of much value. We certainly did not know they were present. Rest assured, the parties responsible have been punished harshly according to our code of conduct. Such infractions are, of course, very rare within our fleet.\n\nEven so, we are so very, very sorry. These words do not do our anguish justice, and understand that we will do anything possible to repair our diplomatic ties and make things right. Understand that one day I hope to reunite with you as the fondest of friends, when we may laugh together about any of the unfortunate misunderstandings that may or may not have occurred between us.\n\nUnderstand that the money has already been spent, so restitution regrettably will not be available to you at this time."
 RSP_rhasail_yours_truly_cannor_ctt:0 " provinces in §YCannor§! are owned by allies of §Y[Root.GetName]§!, or their subjects."
 RSP_rhasail_yours_truly_behemoth_ctt:0 "Has access to the §YBehemoth§! Special Unit and §Y[Root.Capital.GetName]§! has '§YBehemoth Shipyard§!'."
 RSP_rhasail_yours_truly_lencori_ctt:0 " in the §YLencori§! culture group have opinion modifier §YImproved Relations§! of at least §Y50§!."
 RSP_rhasail_yours_truly_effect_tt:0 "Gain access to the '§YParrrley§!' §TCustom Diplomatic Action§!, which allows §Y[Root.GetName]§! to clear the opinion malus gained from §YRaiding Coasts§! and §YPrivateering§! in exchange for §Y5 years§! of truce.\n"
 RSP_rhasail_yours_truly_first_effect_ct:0 "If we complete the mission while having '§YBehemoth Shipyard§!' in §Y[Root.Capital.GetName]§!:"
 RSP_rhasail_yours_truly_first_effect_tt:0 "Upgrade '§YBehemoth Shipyard§!' in §Y[Root.GetName]§! to '§YFreefolk Arsenal§!', giving the following effects:\nLocal Development Cost: §G-5.0%§!\nLocal Trade Power: §G+1.00§!\nSailor Increase: §G+500§!\nLocal Ship Repair: §G+25.0%§!\nPossible Number of Buildings: §R-1§!\nBehemoth Force Limit: §G+5.00§!\nProvince Allows Behemoth Ships\n§gThis modifier does NOT count towards the limit of possible §YBehemoth Shipyards§!.§!"
 RSP_rhasail_yours_truly_second_effect_tt:0 "Gain access to the §YBehemoth§! Special Unit."

 RSP_rhasail_honour_among_thieves_title:0 "Honour Among Thieves"
 RSP_rhasail_honour_among_thieves_desc:0 "The Ruined Sea contains scoundrels in abundance. Pirates who care nothing for the niceties of civil society! Religious zealots! Gnolls who sell, shall we say, illicit substances. It truly weighs heavy on the soul.\n\nIn our wondrous Prize Court, Rhasáil shows such scallawags the true meaning of honour. Every captain comes before it with the utmost confidence that he will be treated as fairly as he is willing to entertain, and accepts its ruling without complaint. It is adorned with the finest architectural flourishes of the day. Its builders went to very good schools. Within its walls, enemies may act as friends, secure in the knowledge that a higher law protects them both.\n\nHonour means treating one’s fellow buccaneer by the rules of the Prize Court, and conducting oneself there with only the highest degree of propriety. Honour means treating one’s crew by the terms set out in their contracts in front of the Prize Court, and paying them every coin they are owed in the timeliest manner. Honour admits no loopholes, no embellishments, no private interpretations. It is the utter moral rectitude expected of our fair brotherhood.\n\nAnd every so often, honour means being good friends with the judge."
 RSP_rhasail_honour_among_thieves_ei:0 "\n§GEvent Insight§!\nNothing quite matches the thrill of elegant piracy like watching months of careful scheming dissolved by a man in a very red robe. Still, at least everyone looks impressive while being thoroughly and publicly inconvenienced in the newly-established Prize Court."

 RSP_rhasail_lord_of_pirates_title:0 "Lord of Pirates"
 RSP_rhasail_lord_of_pirates_desc:0 "Pirates are pirates for a reason: we’re uncouth, and we don’t take kindly to authority. But not all authority is the same. There’s the authority of a noble lord, surveying everything he sees with a haughty stare, and then there’s the authority of an old friend, or a respected mentor.\n\nSometimes, when the moon hangs just right over the Driftcourt, and when there’s an opportunity for gold, glory, or both, we pirates will elect someone to help us get there: a lord of the pirates. It can’t be just anyone, of course. It has to be someone powerful, rich, and canny enough to get a hundred different crews rowing in the same direction. \n\nBut more importantly, it has to be one of us. It’s got to be an old salt who’s seen every last part of the Ruined Sea, and who’s hated by the fancy merchant lords and the stuck-up colonial governors. It’s got to be someone who’d spit in the face of the wind. When life gives them lemons, they kick life in its delicate bits. \n\nA lord of the pirates doesn’t come around by happenstance, and we don’t see their kind often. But when we do, greatness is soon to come. Their reign might bring the wealth of empires, it might end with every single member of the crew on the gallows, but whatever will happen - it won’t be boring."

 #LAMENTAIRE
 RSP_lamentaire_establish_the_stormmaidens_title:0 "Establish the Storm-Maidens"
 RSP_lamentaire_establish_the_stormmaidens_desc:0 "On every ship, there is one.\n\nShe stands barefoot on the deck, her hair cut with the same knife that cuts the ropes, and she speaks to the captain of debts owed and debts paid. She goes where she pleases, yet she never strays far from the gunwale. She is never fully dry.\n\nNo one recalls when she first came aboard. She is as much a part of the ship as mast or keel. Would you pay particular attention to a sail? You would only ever remark upon its absence.\n\nShe passes from ship to ship, but no man has seen her depart. We know she is gone only because another then stands where she stood.\n\nOf course we do not see her leaving. Could you imagine her on land? The thought is stranger than an honest wage.\n\nThe captains did not truly see her before. They were grateful for her presence and afraid of her absence, and that was enough.\n\nBut now we have seen her.\n\nAnd so we must ask-\n\nWhat would happen if they were to gather?"
 RSP_lamentaire_establish_the_stormmaidens_tt:0 "As long as '§YDevout of Uelos§!' country modifier is active, finding a §YBuried Treasure§! will convert random coastal province religion to §YCult of Uelos§!.\n\nRename the §YClergy§! Estate to §YStorm-Maidens§!."

 RSP_lamentaire_praise_be_to_uelos_title:0 "Praise Be to Uelos"
 RSP_lamentaire_praise_be_to_uelos_desc:0 "Across the sea in Cannor, there are others, we hear, who worship Uelos. They worship ‘Uelos, the fisher’s friend.’ The Uelos of children’s tales, who sees a sailor’s ship dashed against rocks, and intervenes to bring them safely back to shore. How weak! How land-lagged! This Uelos of theirs knows nothing of the sea.\n\nThe Uelos we worship is different. We worship the Uelos of awful, tempest-strewn nights, who is as capricious as he is cruel. Why do we worship him? Because if we did not he would remain regardless, and we know we are the only ones who have the skill, the brains, the raw derring-do to sail his seas. We know that if others try to brave the wrath of Uelos on their fat merchant ships, they will be dashed on his rocks, and they will die in his grasping arms.\n\nThen the cargo they carried will be awfully, tragically without an owner. We will take it for our own, so that we may give Uelos his proper due!\n\nFor there is an order to the sea."
 RSP_lamentaire_praise_be_to_uelos_ctt:0 " different §YReligious Actions§! of the §YCult of Uelos§! Religion were used."
 RSP_lamentaire_praise_be_to_uelos_tt:0 "Gain §G+10§! Religious Power per owned §YCult of Uelos§! province (up to §G+200§! Religious Power at §Y20§! provinces owned).\n\nUpgrade the '§YExpansionist Zealotry§!' Estate Privilege to additionally grant Morale of Navies: §G+5.0%§! when at war with heretics or heathens."

 RSP_lamentaire_worthy_servants_title:0 "Worthy Servants"
 RSP_lamentaire_worthy_servants_desc:0 "(Call)\nWho give themselves to the Drowned King?\n\n(Crew)\nWe do, for the Deep.\n\n(Call)\nWho aid his hand in everything?\n\n(Crew)\nWe do, for the Deep.\n\n(All)\nNo prayers for mercy, cries for land,\nWe trust the wave and the maiden’s hand,\nThe sea will weigh us as we stand,\nFor we are worthy of the Deep.\n\n(Call)\nWhat of the wrecks we find at dawn?\n\n(Crew)\nHis gift, from the Deep.\n\n(Call)\nWhat of the gold from weaklings torn?\n\n(Crew)\nHis gift, from the Deep.\n\n(All)\nWe strike where Uelos guides the way\nWe know that soon shall come the day\nTo Uelos we must repay\nThe debt we owe the Deep."
 RSP_lamentaire_worthy_servants_ctt:0 "Has used '§YThe Deep One§!' Religious Action at least once."
 RSP_lamentaire_worthy_servants_tt:0 "Upgrade the '§YVolaces, the Lightning Sailfish, Momentum of Uelos§!' Religious Action to '§YThalythes, the Shifting Nautilus, Metamorphosis of Uelos§!' Religious Action, which will grant additional §G+1.00§! Shock Pips and §G+1.00§! Fire Pips to the created Admiral.\n\nWhenever §Y[Root.GetName]§! uses a §YReligious Action§! of the §YCult of Uelos§! Religion, a §YKraken Sea Beast§! will appear in the §Y[Root.Capital.GetName]§!, up to §Y10§! per §YGovernment Rank§! of §Y[Root.GetName]§!.\n"

 RSP_lamentaire_recover_the_sunken_temple_title:0 "Recover the Sunken Temple"
 RSP_lamentaire_recover_the_sunken_temple_desc:0 "Of all the commandments of the sea, followed by all the captains of Lamentaire as scripture, the most important is this: what is given to Uelos shall remain with Uelos forever. Of course, this might make our current course of action seem as folly.\n\nThe sea has its hidden places. Hollows no chart has ever marked. Depths that swallow light and sound alike. Unique among them stands a temple beneath the waves - stone older than our grandfathers’ grandfathers, with pillars encrusted in salt and bone. No minstrel sings of it. No dockside fool scrawls it into a cheap ballad. It is simply not for the tongues of landsmen.\n\nUelos has given this place to his faithful, and yet we do not wish to be ungrateful servants. We will not simply take it from Uelos: we will offer him a trade instead.\n\nWe are pockmarked, salt-cracked, and rum-soaked. We are the rejects and cast-offs of every shore. And yet we are his, from our sun-bleached hair to our sodden boots. Let us hope this is enough."
 RSP_lamentaire_recover_the_sunken_temple_ei:0 "\n§GEvent Insight§!\nSome paths, once taken, do not lead forward so much as downward - into places one should not seek. The Sunken Temple of Uelos may grant purpose, but it will not return the cost paid in ways no mortal tongue was meant to name."

 RSP_lamentaire_lord_of_pirates_title:0 "Lord of Pirates"
 RSP_lamentaire_lord_of_pirates_desc:0 "Pirates are pirates for a reason: we’re uncouth, and we don’t take kindly to authority. But not all authority is the same. There’s the authority of a noble lord, surveying everything he sees with a haughty stare, and then there’s the authority of an old friend, or a respected mentor.\n\nSometimes, when the moon hangs just right over the Driftcourt, and when there’s an opportunity for gold, glory, or both, we pirates will elect someone to help us get there: a lord of the pirates. It can’t be just anyone, of course. It has to be someone powerful, rich, and canny enough to get a hundred different crews rowing in the same direction. \n\nBut more importantly, it has to be one of us. It’s got to be an old salt who’s seen every last part of the Ruined Sea, and who’s hated by the fancy merchant lords and the stuck-up colonial governors. It’s got to be someone who’d spit in the face of the wind. When life gives them lemons, they kick life in its delicate bits. \n\nA lord of the pirates doesn’t come around by happenstance, and we don’t see their kind often. But when we do, greatness is soon to come. Their reign might bring the wealth of empires, it might end with every single member of the crew on the gallows, but whatever will happen - it won’t be boring."

 #TROLLSHAUNT
 RSP_trollshaunt_dreaded_mists_title:0 "Dreaded Mists"
 RSP_trollshaunt_dreaded_mists_desc:0 "We have arrived at last at the Ruined Sea, and our great sea-sailing longships have docked at a place we might be able to call home. There is only one problem: it is strange here. The trees are filled with birdsong, and the skies are an insufferable shade of blue. Our men long for Gerudia. The land was a frozen waste, aye, but it was our frozen waste, and we loved it.\n\nAnd yet, there might still be a way to bring something of our heritage to the land we now call home. In the land of Endralliande they say that a peculiar type of fog rolls across the water to choke the land. It makes the sky a miserable grey, and it fills the people there with fear. They cannot even escape their fear through sleep, for they do not dream.\n\nIt sounds just like home! We should send our mages to study this fog, so that they can bring it to Trollshaunt. And once we have made something of this land, there are other avenues of improvement we might pursue. All within the Ruined Sea will soon hear the name of Trollshaunt, and they will learn to fear us."
 RSP_trollshaunt_dreaded_mists_tt:0 "As long as '§YStudying Eldritch Mists§!' country modifier is active, finding a §YBuried Treasure§! will give §G50§! Magic Experience.\n\nRename the §YArcane Tricksters§! Estate to §YHexxers§!."

 RSP_trollshaunt_focus_the_magic_title:0 "Focus the Magic"
 RSP_trollshaunt_focus_the_magic_desc:0 "Before we came to the Ruined Sea, we learned something of magic in Gerudia. The skalds had a firm hold over the magic of our land, and they hid away in cloistered towers.\n\nFrom their towers came mages and spells, but their main output was not power, it was rules. There were so, so many rules. Rules about what you could do and how to do it, rules about what you could not do and the consequences for doing it anyway, rules about the wonders you could not craft from the magic that was supposed to be yours.\n\nThese are weak rules for weak men. The skalds sing of harsh winters as they sit in their warm towers with plenty to eat. They have let abundance make them soft. They have forgotten the harder side of magic, and the joys of domination.\n\nNow that we have travelled from the frozen north to the Ruined Sea, we will not make the same mistakes. We have the power, we have the will. All we need is the raw materials. We will steal what we need, and then we will build whatever we please, far away from anyone who would tell us differently.\n\nIn Trollshaunt, there will be no rules."
 RSP_trollshaunt_focus_the_magic_damestear_ctt:0 "Has §YRaided§! a province producing §YDamestear§!."
 RSP_trollshaunt_focus_the_magic_precursor_relics_ctt:0 "Has §YRaided§! a province producing §YPrecursor Relics§!."
 RSP_trollshaunt_focus_the_magic_effect_tt:0 "§YPermanent Damestear§! will now be produced in §Y[Root.Capital.GetName]§!.\n\nGain §M15.0§! Mana per owned §YMage Tower§! (up to §M75.0§! Mana at §Y5§! §YMage Towers§!).\n\nUpgrade the '§YCaretakers of Magical Towers§!' Estate Privilege to cause every owned province with a §YMage Tower§! to gain the following bonus:\nProvince(s) gets '§YArcane Artillery§!' until the end of the game, giving the following effects:\nHostile Fleet Attrition: §G+2.00§!"
 estate_mages_development_of_mage_towers_arcane_artillery:0 "Arcane Artillery"

 RSP_trollshaunt_the_army_of_the_wretched_title:0 "The Army of the Wretched"
 RSP_trollshaunt_the_army_of_the_wretched_desc:0 "At last, our army is assembled! Its soldiers are not made of the strongest stuff, but they do not need to be when they are so many.\n\nThey come from all walks of life - they are settlers, soldiers, and merchants. They emerge from our Beacon in shambling rows, with jerky steps in unbroken lines. The skin on their faces has decayed into oozing, awful sores.\n\nBut most important of all, they will go wherever we want, and throw themselves into enemy formations with reckless abandon. We do not have to pay them, we do not have to reward them: the only reward they desire is a second death. In whatever remains of their feeble brains, they fervently believe what we have told them: that if they perform well enough in enough battles, the pain will stop, and they will be granted their final rest.\n\nWe were lying.\n\nAnd every time they emerge from our dread mists to take the enemy by surprise, we will make more soldiers from the men they kill. Conquest will fuel conquest, plunder will bring plunder, and pain will bring pain, all across the Ruined Sea. The mists of Trollshaunt will spread across the waters, and we will stand above them as unchallenged lords of the seas."
 RSP_trollshaunt_the_army_of_the_wretched_ctt:0 "At least §Y30 000§! units have perished in our battles, since '§YRising Mist§!' event has happened. (Currently: [Root.total_land_units_killed.GetValue])"
 RSP_trollshaunt_the_army_of_the_wretched_effect_tt:0 "'§YInvisibility§!' will have its duration shortened to §Y5 years§!, but will also give '§YKraken's Kiss Prepared§!' for §Y5 years§!, giving the following effects:\nNaval Barrage Cost: §G-50.0%§!\n\nUsing §YNaval Barrage§! while '§YKraken's Kiss Prepared§!' is active will consume it to give the '§YDreaded Mist§!' to the besieged province for §Y3 years§!, giving the following effects:\nLocal Attacker Dice Roll Bonus: §G+2.00§!\nLocal Fort Assault Ability: §G+50.0%§!\n\nSieging a province with '§YDreaded Mist§!' will consume it to spread '§YLesser Dreaded Mist§!' to all neighbouring provinces for §Y2 years§!, giving the following effects:\nLocal Attacker Dice Roll Bonus: §G+1.00§!"

 RSP_trollshaunt_the_beacon_title:0 "The Beacon"
 RSP_trollshaunt_the_beacon_desc:0 "Of all the tales the skalds sing, there is one in particular that is pleasing to the ear. It comes in many forms. It sings of a land in the middle of the sea, where the sorrows and hardships of the sea bleed away. Its residents live illuminated lives - they are blessed. They want for nothing. The best part is, if you are willing to sail bravely to these distant shores, you might live there, too. It welcomes all comers.\n\nThere is no such place, of course. Not everything the skalds sing of is true. But belief in the blessed land is real, and sailors cling to it in times of desperation.\n\nThey might cling closer to it when the sky turns grey - when the mists close in around them and the hope in the air begins to bleed away. When the world seems like it will never be happy again. Wouldn’t anyone?\n\nWe should give them a place to go, to rest their weary heads. We will fashion them a light in the ocean, a beacon for lost souls. When they arrive, they may discover our light in the darkness is not at all like their stories. That it casts a sickly glow, and that there is a screaming in the air they could not hear before. But by then it will be too late."
 RSP_trollshaunt_the_beacon_ei:0 "\n§GEvent Insight§!\nThe living men have been guided for far too long by the lights of our magic and our mists. It is time for those who remain to pay the price they owe and light the Beacon of Mists."

 RSP_trollshaunt_lord_of_pirates_title:0 "Lord of Pirates"
 RSP_trollshaunt_lord_of_pirates_desc:0 "Pirates are pirates for a reason: we’re uncouth, and we don’t take kindly to authority. But not all authority is the same. There’s the authority of a noble lord, surveying everything he sees with a haughty stare, and then there’s the authority of an old friend, or a respected mentor.\n\nSometimes, when the moon hangs just right over the Driftcourt, and when there’s an opportunity for gold, glory, or both, we pirates will elect someone to help us get there: a lord of the pirates. It can’t be just anyone, of course. It has to be someone powerful, rich, and canny enough to get a hundred different crews rowing in the same direction. \n\nBut more importantly, it has to be one of us. It’s got to be an old salt who’s seen every last part of the Ruined Sea, and who’s hated by the fancy merchant lords and the stuck-up colonial governors. It’s got to be someone who’d spit in the face of the wind. When life gives them lemons, they kick life in its delicate bits. \n\nA lord of the pirates doesn’t come around by happenstance, and we don’t see their kind often. But when we do, greatness is soon to come. Their reign might bring the wealth of empires, it might end with every single member of the crew on the gallows, but whatever will happen - it won’t be boring."

 #PALEGOLD
 RSP_palegold_pirates_of_tomorrow_title:0 "Pirates of Tomorrow"
 RSP_palegold_pirates_of_tomorrow_desc:0 "Take a moment to think about the world of yesterday. If you wanted to steal something, you had to row yourself there. You didn’t know how to get anywhere unless you had a bloke who knew the place on your ship. Think about how feeble the art of piracy was back then. Think about all the booty they could have stolen in those days, if only they had the tools of today.\n\nThe other scurvy bands who ply these waves all lack any vision. If something works, they use it. If something blows up, they discard it, even if with a bit of work it could blow up so much better than it did the first time! They have no appetite at all for a good healthy dose of experimentation.\n\nImagine if we could assemble at scale! What if all the sly dogs of all the crews of the Ruined Sea, all who enjoy a bit of tinkering, came to the same place, and we could swap ideas without the deck-swabbers sniggering at us in the galley? What if, when one of our new gadgets blew up, we were surrounded by other pirates with nothing but helpful suggestions? We’d be living in the world of tomorrow. Think of all the booty we could steal!"
 RSP_palegold_pirates_of_tomorrow_tt:0 "As long as '§YRelic Smuggling§!' country modifier is active, finding a §YBuried Treasure§! will research a random §YTier 1§! Artifice Invention.\n\nEnable §YMixed-Mode Artificery§!, but §Rdisable§! manual §YArtificery Research§! until the mission '§YWonders of Trade§!' is completed."

 RSP_palegold_acquiring_good_stuff_title:0 "Acquiring Good Stuff"
 RSP_palegold_acquiring_good_stuff_desc:0 "Allegedly, there’s a ‘boom in the relic trade’ in the Ruined Sea, as the relics of Taychend and Soruin make their way through here to Cannor. Aelantir is full of elves who have come here to reclaim what they call a ‘birthright’. But let me ask you this: if they’ve got a birthright to these relics, why are they so bad at using them?\n\nWhen they dig up a relic, something really good, a real piece of the future, they spend all their time gawking at it instead of actually using it. If it’s lucky, the relic ends up in the hands of the Gommo, who at least know how to tinker. If it’s unlucky, that relic winds up on some rich faffabout’s coffee table, where it serves as a very expensive conversation piece.\n\nForever.\n\nWe might be pirates, but the relics of Aelantir are something we don’t steal to merely sell them on. We’re the pirates of the Ruined Sea, and we’re going to use those relics to make things that the stuffy magic lords of Cannor couldn’t even dream up in one of their fancy illusions.\n\nIf anything, we’re liberating those relics."
 RSP_palegold_acquiring_good_stuff_effect_tt:0 "§YPrecursor Relics§! will now be produced in §Y[Root.Capital.GetName]§!.\n\nAdd/Increase §YGnomish§!, §YGoblin§! and §YKobold Minority Size§! in §Y[Root.Capital.GetName]§!.\n\nThe §Y[Root.GetArtificersOrFallbackName]§! Estate gains §G5§! loyalty per owned province with §YPrecursor Relics§! (up to §G25.0§! at §Y5§! provinces with §YPrecursor Relics§!).\n\nUpgrade the '§YThe Artificer-Generals§!' Estate Privilege to additionally recruit an Admiral, when recruiting the General."

 RSP_palegold_the_mecha_pirates_title:0 "The Mecha-Pirates"
 RSP_palegold_the_mecha_pirates_desc:0 "(Call)\nWe sail from a place called Port Palegold the noble\nWe sail from a place called Port Palegold the fair\nWe of Port Palegold seek treasure and relics\nWe sail across oceans and plunder our share\n\n(All)\nIf you do know nothing of we of Port Palegold\nRemember the things we with metal have made\nRemember that we have the tech to improve us\nRemember that nowhere is safe from our raids\n\n(Call)\nWe traffic in relics from faraway Taychend\nWe traffic in relics we’ve stolen as prize\nWe’ve taken those relics to make our inventions\nWe look out for trade fleets with augmented eyes\n\n(All)\nIf you still know nothing of we mecha-pirates\nRemember the future is made out of steel\nRemember the future belongs to Port Palegold\nRemember there’s nothing that Palegold can’t steal!"
 RSP_palegold_the_mecha_pirates_1_ctt:0 " provinces in the §YNorth Aelantir§! or §YSouth Aelantir§! continents, that produce §YPrecursor Relics§! have at least §Y5§! regiments of §Y[Root.GetName]§! present."
 RSP_palegold_the_mecha_pirates_2_ctt:0 "All coastal provinces in the §YNorth Aelantir§! or §YSouth Aelantir§! continents, that produce §YPrecursor Relics§!:\nOne of the following must be true:\n   Development less than §Y[Root.Capital.GetName]§!\n   Have the province modifier §YRaided Coast§!"
 RSP_palegold_the_mecha_pirates_effect_tt:0 "Enable §YArtificery-only Mode§!.\n\nOnce per §Y5 years§!, winning a battle against a country owning at least one province that produces §YPrecursor Relics§!, will give §G+1§! Base Production, as well as '§YVictorious Scraps§!' to §Y[Root.Capital.GetName]§! for §Y5 years§!, giving the following effects:\nLocal Goods Produced: §G+2.00§!\n\nUnlock the '§YClockwork Rope Swingers§!' Artifice Invention."

 RSP_palegold_wonders_of_trade_title:0 "Wonders of Trade"
 RSP_palegold_wonders_of_trade_desc:0 "WWe aren’t the types who spend much time thinking about the ‘economy.’ We get most of our things for free, from people who couldn’t be bothered to sail waters that didn’t have pirates in them. But if all we do is steal things, there are going to be places where we can’t go to ply our trade. There are relics from beyond the Ruined Sea that our artificers are itching to get their hands on, and if we want them we might have to acquire them legitimately.\n\nNot too legitimately, of course. We’re pirates! But if we were to prove to some of the smarter relic traders out there that we want to set up a working relationship, they might make Port Palegold a stop on their trade routes instead of steering as far away from it as they possibly can. That’s worth even more than what we might get from one relic haul.\n\nAnd with those trade ships will come experts, from places that really want to grab the future and shake it upside down by its ankles. They’ll be able to tell us all about the cutting-edge tools they’re developing in all the places we don’t sail to yet. Even better, some of them will be looking for a place to settle down. Why not Port Palegold?\n\nIf we trade in moderation, we’ll be able to steal like madmen."
 RSP_palegold_wonders_of_trade_ei:0 "\n§GEvent Insight§!\nEven the most reckless wagers have a way of becoming public entertainment in the Seahammer Yards. When bucaneer ambition meets poorly secured machinery and an audience that refuses to intervene, something in the background is always destined to give way first."

 RSP_palegold_lord_of_pirates_title:0 "Lord of Pirates"
 RSP_palegold_lord_of_pirates_desc:0 "Pirates are pirates for a reason: we’re uncouth, and we don’t take kindly to authority. But not all authority is the same. There’s the authority of a noble lord, surveying everything he sees with a haughty stare, and then there’s the authority of an old friend, or a respected mentor.\n\nSometimes, when the moon hangs just right over the Driftcourt, and when there’s an opportunity for gold, glory, or both, we pirates will elect someone to help us get there: a lord of the pirates. It can’t be just anyone, of course. It has to be someone powerful, rich, and canny enough to get a hundred different crews rowing in the same direction. \n\nBut more importantly, it has to be one of us. It’s got to be an old salt who’s seen every last part of the Ruined Sea, and who’s hated by the fancy merchant lords and the stuck-up colonial governors. It’s got to be someone who’d spit in the face of the wind. When life gives them lemons, they kick life in its delicate bits. \n\nA lord of the pirates doesn’t come around by happenstance, and we don’t see their kind often. But when we do, greatness is soon to come. Their reign might bring the wealth of empires, it might end with every single member of the crew on the gallows, but whatever will happen - it won’t be boring."

 #EVENTS
 #GENERIC MISSON TREE EVENTS
 flavour_RSP.1.t:0 "Expanding Our Scope"
 flavour_RSP.1.d:0 "The tavern in [Root.Capital.GetName] was loud, which was very fortunate indeed, as Captain Brannick did not believe in speaking quietly. His burly hands slammed a dagger onto the map of the Ruined Sea, tainted with droplets of rum that spilled from his beard.\n\n“Eight landlubbers want us hanged, shot, or publicly dissected! That’s something I can get behind.” he said, taking another golden Crown from the small chest below his feet, tossing it to the bartender and turning to Captain Cara sitting just across the table. “We’re starting to gain a name for ourselves, don’t we, love?”\n\nCara swirled her rum, leaned back, boots on the table and smirked. “Eight flags angry, coffers heavy, but you seem to not be satisfied Brannick? Why do those bushy brows of yours permanently frown, even in the face of success?”\n\n	“Aye, it’s a success,” he admitted. “But it’s a small success. We raid, we run, we patch the hull with whatever remains after a cannonade and then we go off on our merry way, some treasure in pockets, some treasure buried in the sand, waiting for better days. We’re a nuisance.”\n\nCara raised her brow. “A profitable nuisance.” To which Brannick quickly responded “But only a nuisance. Well… That is unless [Root.Monarch.GetName] moves [Root.Monarch.GetHerHis] arse and proposes something a bit… bigger.”\n\nThe woman smirked again, rolling one of the freshly stolen coins in her knuckles. “So you suggest we stop thinking small… we reinvest like some proper landowners? My, my, didn’t take you for a responsible man, Brannick.”\n\nBrannick, visibly pleased with himself, opened his mouth, displaying his hole-ridden teeth. “I’ve learned over the years, laddie.”  He swung his tankard and downed what was left in it in one pull. “To expansion!”\n\nCara followed suit, exclaiming, “And to pissing off at least four more landlubbers before the year’s out!” Yet this shout was lost in the sounds of frantic yet purposeful activity emanating from the outside, for the docks were already being filled with salvaged timber and captured cannons, ready to be turned into new corsair vessels."
 flavour_RSP.1.a:0 "It seems the nuisance has ambitions."
 flavour_RSP_1_a:0 "§YRaiding Coasts§! will have a chance to §YBury a Treasure§! in it!\n\nEvery §Y4 years§!, §Y[Root.GetName]§! will get a §YMap§!, pointing the way to one §YBuried Treasure§!.\n\nOccupying the province with the §YBuried Treasure§! will grant handsome rewards!\n"

 flavour_RSP.2.t:0 "Another Busy Day in [Root.Capital.GetName]"
 flavour_RSP.2.d:0 "Daniel Seagold, captain of the Black Reavers of [Root.GetName], stood on the deck of his flagship, spyglass in hand. It had been another successful voyage - his scurvy band had sailed all across the sea, capturing several prize ships sailing out of the Trollsbay, running them down like dogs catching gulls. Now all they had to do was sell these ill-gotten goods in a place worth selling them, and they could get to divvying up the plunder.\n\nAs it so happened, that was precisely where they were headed.\n\nA speck appeared on the horizon. Then it became a smear. Then, slowly, it became home, and what a home it had grown into. The smell of woodsmoke and salted fish reached them before the island did. New towns dotted the bay, their fishing boats already out on the morning water. The hammering of construction rang across the harbour, and merchant banners Seagold didn't recognise snapped in the breeze above the docks. He lowered the spyglass and allowed himself a smile.\n\nAt long last, the ship managed to find a place to moor itself on the bustling docks. ‘Unload the cargo, men!’ Seagold cried. ‘We’re home at last!’ A ragged cheer rose up from his weary sailors. Seagold kicked down the gangplank, prepared to step ashore, and found his way blocked by a man wearing an official looking sash, clutching a clipboard with what looked like religious reverence. He had a stern expression.\n\n’Stop right there, cap’n,’ the man began. ‘[Root.CapitalScope.GetName] is a land of order, law, and justice! We can’t have any smuggled goods sold on these fair shores. Please present your ship manifest immediately, with proof of provenance for your cargo listed.’\n\nThe two men looked at each other for a long moment. Then they began to snicker.\n\nThey collapsed to the dock laughing, tears running down their faces. When Seagold finally got up, he clapped the man on the shoulder, decided that his quartermaster could handle the unloading, and went to find a tavern. There were many, many taverns in [Root.CapitalScope.GetName], and he needed a drink and a chance to gamble some of his newly earned money away."
 flavour_RSP.2.a:0 "What a time to be alive!"

 flavour_RSP.3.t:0 "A Daring Heist"
 flavour_RSP.3.d:0 "“Convoys ain’t enough!” [Root.Monarch.GetName] struck the table hard enough to rattle the cutlery. “We raid a Calassani convoy? They send two more. We snatch a VG brig? They write it off and raise their rates. Deranne sails in neat little lines and calls it a loss in next season’s ledger! And do you know what that bloody bastard of an Alloy Dwarf told me lately when we’ve asked him about their shipping lines? That they don’t give a rat’s dick about it and shrug it off with interest. INTEREST! We risk our necks and they balance it on a page!”\n\n“We’re chasing crumbs!” an old sailor shouted. “We nip at the margins, for every boat of theirs we take, they have ten spare ones!” another voice joined. “They don’t treat us seriously, bloody landgrubbers!” Others voices rose in anger “You bunch of wankers, you have more booty than you could’ve imagined and these fools among you want to ruin the most lucrative business for nothin’ but wounded pride!”\n\nMere seconds later, the doors exploded inward. Wind and rain burst through as a young captain strode inside, cloak snapping behind him, boots dripping with seawater. Onto the central table he threw four scrolls which unfurled as they landed. Detailed maps of Cas Colunn, New Calas, Asraport and Ricardsport - the great trade arteries of the Ruined Sea. Silence smothered the tavern.\n\n“You old bastards think that stealing from carts will grow us rich. The gold’s in the counting houses, vaults, docks and warehouses.”\n\n[Root.Monarch.GetName] narrowed [Root.Monarch.GetHerHis] eyes. “Ports are fortified.”\n\nThe captain answered with a smirk - “Yes. But beaches are not. Ever seen those Mykx dogs launch straight from hull to sand? No siege, no warning. Blink and corsairs are already inside. And it just so happens we know of all the right beaches to strike.”\n\nThe tavern stirred and erupted in heated argument. “That’s suicide!”, “That’s tantamount to war!”, yet a broad grin appeared on the face of the [Root.Monarch.GetTitle]."
 flavour_RSP.3.a:0 "“That’s bloody brilliant.” [Root.Monarch.GetSheHe] said."

 flavour_RSP.4.t:0 "Blood, Gold and Salt"
 flavour_RSP.4.d:0 "Around noon, [Root.Monarch.GetTitle] [Root.Monarch.GetName] arrives at the docks. The sun shines high above the newly expanded shipyards of [Root.Capital.GetName]. Despite their relative freshness, the whole place already reeks of sap and tar.\n\n“Mind the sawdust,” mutters the chief shipwright, an old Derranic sailor, approaching the [Root.Monarch.GetTitle]. “She’s already taking shape.”\n\nAll around them mallets ring against pegs. Adzes bite into the oak. Ropes creak as ribs of timber are hoisted upright like the rib-cage of some colossal sea-beast.\n\n“Keel first,” the shipwright says, patting the long spine laid firm along the blocks. “This lovely piece of timber supposedly comes from the Reaper’s Coast, strong like an ogre bastard.”\n\nThe [Root.Monarch.GetTitle] walks the length of it. Freshcut timber - no rot, no foreign maker’s mark burned into the grain, no lingering smell of blood on the wood. All along the keel, frames rise. Curved ribs lock into place, one after another. Caulkers follow close behind, hammering oakum into seams. Tar bubbles in giant iron pots. The hull begins to take form, wide in the belly, lean at the bow.\n\n“Built to carry weight,” the shipwright knocks on the wood. “Gold hold below, powder mid-deck. A compartment for rum, so them boys don’t grow thirsty on the seas. And enough guns to argue with an Amber Dwarf and win,” he slaps massive copper and iron mortars. Nearby, carpenters shape the gunports - evenly and tightly, reinforced with beams that brace the broadside.\n\nOn trestles, masts lie ready, already stripped and smoothed. Sailmakers stretch canvas across the yard and cut cloth for sails that will carry only our insignia - a [Root.GetInsignia]. The shipwright stops to look at the ship and says in a reverential half-voice “She’s no borrowed prize, capn’ - she’s ours. You know capn’, a ship is measured by the blood it spills, gold it carries and salt it withstands.”"
 flavour_RSP.4.a:0 "“And this beauty will do it all,” [Root.Monarch.GetName] answers."
 flavour_RSP_4_a:0 "Enable the §YUnique Flagship Modification§! of §Y[Root.GetName]§! and of all §YDominated Aelantiri Pirates§!.\n\nEvery owned province with the '§YDen of Piracy§!' province modifier:\n   §YProvince(s)§! gets their §YDock Building§! upgraded. If §YDrydocks§! is present, gain §G500§! Sailors.\n   §YProvince(s)§! gets their §YShipyard Building§! upgraded. If §YGrand Shipyard§! is present, gain §G500§! Sailors."
