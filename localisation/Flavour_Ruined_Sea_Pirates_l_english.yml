 #UNIQUE MT MODIFIERS
 RSP_rhasail_gentlemanly_conduct:0 "Gentlemanly Conduct"
 RSP_rhasail_gentlemanly_conduct_desc:0 "Is it always the case that a gentleman is honest, or fair? Goodness, no! He may be as dishonest as he pleases, but he must never be seen that way."
 RSP_rhasail_prize_court_country:0 "Prize Court"
 RSP_rhasail_prize_court_country_desc:0 "The Prize Court has brought an end to the fiendish scheming and backstabbing that occurred far too commonly between brother pirates in the times before. Now the stabbing happens in the front, and it is done by a judge wearing very nice robes."
 RSP_rhasail_prize_court_province:0 "Prize Court"
 RSP_rhasail_prize_court_province_desc:0 "This province is the home of the Prize Court, where the noble buccaneers of Rhasáil divide their spoils. It is the finest building in the Ruined Sea. Come ready to be wined and dined, to dance in the ballrooms of the gentleman pirates, and, if you are particularly lucky and smart, to walk away with a doubloon or two."
 RSP_rhasail_freefolk_arsenal:0 "Freefolk Arsenal"
 RSP_rhasail_freefolk_arsenal_desc:0 "The Freefolk Arsenal is more than an ordinary shipyard. Here, the grand Behemoths of Lencori design are promptly 'improved' upon with a pirate’s touch. Fine craftsmanship is all right, but what happens when you combine it with scavenged parts, a touch of madness, and practical yet mean design? What emerges are Behemoths that may offend any respectable Derannic shipwright, but they sail all the same - and when they do, their creaking hulls herald the arrival of the pirate nobility."
 RSP_rhasail_treasure_opinion:0 "Shared Treasures"

 RSP_lamentaire_devout_of_uelos:0 "Devout of Uelos"
 RSP_lamentaire_devout_of_uelos_desc:0 "When a sailor signs aboard a ship of Lamentaire, they may think they give everything to Uelos. They are wrong. Life, sanity, eternity - there is always more, and Uelos is a hungry god."
 RSP_lamentaire_sunken_temple_of_uelos:0 "Sunken Temple of Uelos"
 RSP_lamentaire_sunken_temple_of_uelos_desc:0 "This province is home to something its people dare not speak of. Black as night and blue as the sea, its shape defies description. The unworthy who seek it do not return, but for those who serve Uelos, that is as it should be."

 RSP_trollshaunt_beacon_of_mists:0 "Beacon of Mists"
 RSP_trollshaunt_beacon_of_mists_desc:0 "This province is home to the Beacon of Mists, which soars above the mists of Trollshaunt like a light in darkness. But do not be fooled like the souls swirling around it were. Whatever meager inner light they still possess is now spread outward to the world, to attract more of the unfortunate."
 RSP_trollshaunt_studying_eldritch_mists:0 "Studying Eldritch Mists"
 RSP_trollshaunt_studying_eldritch_mists_desc:0 "The mists that roll their way across Uelos’ Lament swallow things whole - ships, towns, souls. We could learn something of their true nature, if we were to devote ourselves to the endeavor. We could bring a piece of that terror back to the Ruined Sea."
 RSP_trollshaunt_krakens_kiss_prepared:0 "Kraken's Kiss Prepared"
 RSP_trollshaunt_krakens_kiss_prepared_desc:0 "The Kraken’s Kiss is ready to spread the mists of Trollshaunt. Which unlucky shores shall it be unleashed on?"
 RSP_trollshaunt_dreaded_mist:0 "Dreaded Mist"
 RSP_trollshaunt_dreaded_mist_desc:0 "When the cannons of Trollshaunt hit their mark, do not be afraid of the cannonballs. Be afraid of the mist that comes pouring out from them. Be afraid that someone you love will walk into it, and never come back out."
 RSP_trollshaunt_lesser_dreaded_mist:0 "Lesser Dreaded Mist"
 RSP_trollshaunt_lesser_dreaded_mist_desc:0 "When the mists of Trollshaunt roll across the seas, their reach is all-encompassing. If it seems to abate, do not be fooled. This is often a trick of the eyes."

 RSP_palegold_relic_smuggling:0 "Relic Smugglers"
 RSP_palegold_relic_smuggling_desc:0 "Relics pass through a lot of people on the way to their final buyers. We have made smart investments to make sure that some of those people are our people."
 RSP_palegold_seahammer_yards:0 "Seahammer Yards"
 RSP_palegold_seahammer_yards_desc:0 "This province is home to the Seahammer Yards, one of the greatest assemblies of artificers in Aelantir. The Seahammer Yards are packed with rogue geniuses hawking every type of invention that can possibly be bought, and it contains so many workshops that its insides look like a great clock."
 RSP_palegold_victorious_scraps:0 "Victorious Scraps"
 RSP_palegold_victorious_scraps_desc:0 "On the ships of Port Palegold, waste is a foreign concept. Every part of a victory is made to count, including the materials of the enemy’s sunken ships and the remnants of their artificery."

 #FLAGSHIP MODIFICATIONS
 RSP_mykx_unique_flagship:0 "Demonfire Cannons"
 RSP_mykx_unique_flagship_desc:0 "The hellish flames of the Xhazobs can be used to conquer the sea just as easily as they can conquer the land, but no one has perfected this quite like the corsairs of Mykx."
 RSP_rhasail_unique_flagship:0 "Admiral's Pavillon"
 RSP_rhasail_unique_flagship_desc:0 "The quarters of the captains and admirals of Rhasáil provide not just the best facilities, but space for entertaining and reflection. The investment is great, but it is repaid by the loyalty and competence of Rhasáil’s well-treated officer corps."
 RSP_lamentaire_unique_flagship:0 "Bounty of the Sea"
 RSP_lamentaire_unique_flagship_desc:0 "Just imagine, there are those who find it hard to live at sea! The sea rewards devotion, and that is something which we possess in limitless supply. As we sail the seas which are our birthright as children of Uelos, our journey is hastened and we are given plentiful food in exchange for our fealty."
 RSP_trollshaunt_unique_flagship:0 "Kraken's Kiss"
 RSP_trollshaunt_unique_flagship_desc:0 "The cannons of the flagship of Trollshaunt are much like their namesake: they are vast, oppressive, and often moist. And they are very, very much unwelcome wherever they turn up."
 RSP_palegold_unique_flagship:0 "Smuggler's Bay"
 RSP_palegold_unique_flagship_desc:0 "Before Port Palegold, markets were markets and ships were ships, and never the twain would meet. Now, the artificer-pirates of Port Palegold will buy your stolen treasure on the open sea, so you can get paid quicker and they can get to you before anyone else."

 #ESTATES
 RSP_swashbucklers:0 "Swashbucklers"
 RSP_relic_smugglers:0 "Relic Smugglers"
 RSP_arcane_tricksters:0 "Arcane Tricksters"
 RSP_hexxers:0 "Hexxers"
 RSP_stormmaidens:0 "Storm-Maidens"
 RSP_marquers:0 "Marquers"
 estate_adventurers_RSP_swashbuckling_expertise:0 "Swashbuckling Expertise"
 estate_adventurers_RSP_swashbuckling_expertise_desc:0 "Every pirate on the Ruined Sea worth their salt can handle a sword, but our swashbucklers take their swordplay to the next level. They parry and slash with a dazzling skill, and when it comes time to board the enemy’s ship they’re always first over the gunwale. The Swashbucklers of [Root.GetName] know even more of combat than most, and are always willing to volunteer their expertise."
 no_nobles_ennoblement_of_adventurers_tt:0 "Can grant this Estate Privilege without the §Y[Root.GetNobilityOrFallbackName]§! Estate."

 #ARTIFICE INVENTION
 artifice_invention_clockwork_rope_swingers:0 "Clockwork Rope Swingers"
 artifice_invention_clockwork_rope_swingers_desc:0 "It is never easy to use a grappling hook. There are just too many opportunities for it to get caught on something, or hit your mate in the face. We have built grappling hooks that throw themselves, so we can board ships and cross rivers right the first time, every time."
 artifice_clockwork_rope_swingers:0 "Clockwork Rope Swingers"
 artifice_clockwork_rope_swingers_desc:0 "It is never easy to use a grappling hook. There are just too many opportunities for it to get caught on something, or hit your mate in the face. We have built grappling hooks that throw themselves, so we can board ships and cross rivers right the first time, every time."
 artifice_clockwork_rope_swingers_tt:0 "[Root.GetName] loses '§YClockwork Rope Swingers§!', giving the following effects:\nCombat Penalty when landing: §G-2.00§!\nDisembark Speed: §G+100.0%§!\n§YAffects only Artificer Regiments§!\n"

 #PEACE OPTION
 CB_ALLOWED_po_pillage_coastal_defense:0 "Pillage Coastal Defense"
 PEACE_po_pillage_coastal_defense:0 "Pillage Coastal Defense"
 po_pillage_coastal_defense_desc:0 "All §YCoastal Defense§! Buildings in [From.GetName] will be destroyed, with [Root.GetName] gaining §G20§! Crowns per Building destroyed."

 #DECISIONS
 RSP_dominate_fleets_decision_title:0 "Dominate the Fleets"
 RSP_dominate_fleets_decision_desc:0 "There’s no need to fight amongst pirates: a good pirate thinks only of gold, and if we have more of it than the other captains on the Ruined Sea we’ll throw it at them until they beg for mercy. Then we’ll have them do what they do best, but do it for us, and we’ll both be happy."
 RSP_dominate_fleets_decision_master_ctt:0 "One of the §YAelantiri Pirate Fleets§! was §Ydominated diplomatically§! or §Ydominated militarily§!.\n\nTo §Ydominate diplomatically§!, all of the following must be true:\n   §YCountry§! is allied with §Y[Root.GetName]§!.\n   §YCountry§! has at least §G+150§! opinion of §Y[Root.GetName]§!.\n   §YCountry§! has at least §G75§! Trust towards §Y[Root.GetName]§!.\n   §YCountry§! has less than §Y30§! Total Development.\n\nTo §Ydominate militarily§!, §Y[Root.GetName]§! must own the §YHome Port§! of the other fleet and one of the following must be true:\n   §YCountry§! was humiliated by §Y[Root.GetName]§!.\n   §YCountry§! is a subject of §Y[Root.GetName]§!.\n   §YCountry§! does NOT exist.\n\n§YDominated Aelantiri Pirates§! and their §YHome Ports§!:\n[1100.GetPirateDecision] §Y[J95.GetName]§! with §YHome Port§! in §Y[1100.GetName]§!\n[1082.GetPirateDecision] §Y[J96.GetName]§! with §YHome Port§! in §Y[1082.GetName]§!\n[2135.GetPirateDecision] §Y[J97.GetName]§! with §YHome Port§! in §Y[2135.GetName]§!\n[1099.GetPirateDecision] §Y[J98.GetName]§! with §YHome Port§! in §Y[1099.GetName]§!\n[1077.GetPirateDecision] §Y[G93.GetName]§! with §YHome Port§! in §Y[1077.GetName]§!"
 RSP_dominate_fleets_decision_tt:0 "\nIf §Y[Root.Monarch.GetName]§! is NOT §YLegendary Pirate§!:"
 RSP_dominate_fleets_home_port:0 "One §YHome Port§! gets '§YDen of Piracy§!' until the end of the game, giving the following effects:\nLand Force Limit: §G+2.00§!\nNaval Force Limit: §G+2.00§!\nHostile Fleet Attrition: §G+1.00§!\nNaval Combat Local Bonus off owned coast: §G+1.00§!\n"
 RSP_dominate_fleets_rhasail:0 "For §YDominating Rhasáil§! unlock the '§YAdmiral's Pavillon§!' §YUnique Flagship Modification§!, giving the following effects:\nFleet Privateering Efficiency: §G+33.0%§!\nMonthly Chance of Admiral Skill Gain on Mission: §G+3.0%§!\nFleet Prestige from Battles: §G+200.0%§!\nFleet Naval Tradition from Battles: §G+200.0%§!\n\n§gThis §YUnique Flagship Modification§! will become enabled by the '§YBlood, Gold and Salt§!' event.§!"
 RSP_dominate_fleets_lamentaire:0 "For §YDominating Lamentaire§! unlock the '§YBounty of the Sea§!' §YUnique Flagship Modification§!, giving the following effects:\nFleet Privateering Efficiency: §G+33.0%§!\nFleet Movement Speed: §G+2.00§!\nFleet Attrition: §G-50.0%§!\n\n§gThis §YUnique Flagship Modification§! will become enabled by the '§YBlood, Gold and Salt§!' event.§!"
 RSP_dominate_fleets_trollshaunt:0 "For §YDominating Trollshaunt§! unlock the '§YKraken's Kiss§!' §YUnique Flagship Modification§!, giving the following effects:\nFleet Privateering Efficiency: §G+33.0%§!\nFleet Blockade Impact on Siege: §G+1.00§!\nFleet Naval Barrage: §G-50.0%§!\n\n§gThis §YUnique Flagship Modification§! will become enabled by the '§YBlood, Gold and Salt§!' event.§!"
 RSP_dominate_fleets_palegold:0 "For §YDominating Port Palegold§! unlock the '§YSmuggler's Bay§!' §YUnique Flagship Modification§!, giving the following effects:\nFleet Privateering Efficiency: §G+33.0%§!\nTrade Power per Ship in Fleet §G+3.00%§!\nFleet Hunt Pirates Efficiency: §G+100.0%§!\n\n§gThis §YUnique Flagship Modification§! will become enabled by the '§YBlood, Gold and Salt§!' event.§!"
 RSP_dominate_fleets_mykx:0 "For §YDominating Mykx§! unlock the '§YDemonfire Cannons§!' §YUnique Flagship Modification§!, giving the following effects:\nFleet Privateering Efficiency: §G+33.0%§!\nFlagship Cannons: §G+100.0%§!\nFlagship Morale: §G+20.0%§!\n\n§gThis §YUnique Flagship Modification§! will become enabled by the '§YBlood, Gold and Salt§!' event.§!"
 RSP_upgrade_dominated_fleets_effect_tt:0 "\n[Root.GetName] upgrades '§YDominated Fleets§!' until the end of the game, giving the following effects:\nMorale of Navies: §G+2.5%§! to §G+10.0%§!\nMax number of Flagships: §G+1.00§! to §G+4.00§!\nCoastal Raiding Range: §G+1.00§! to §G+2.00§!\n"

