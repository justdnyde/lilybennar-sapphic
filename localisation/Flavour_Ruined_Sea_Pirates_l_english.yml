 flavour_RSP.5.t:0 "Tavern Brawl"
 flavour_RSP.5.d:0 "It was a night like any other. The Sodden Salt, the sixth or seventh finest tavern in [Root.CapitalScope.GetName], was filled with clients.\n\nEverywhere within its walls, the Salt was a bustling hive of activity. Customers were packed cheek to jowl. A mob had formed around a man in one of the booths of the tavern, where a pirate captain returned from Alecand was holding court. Of course, he was so drunk that most of what he said was garbled nonsense, and the rest was lies. Along the far wall, a group of pirates played a round of knife throwing, their knives clattering against the handles of knives already stuck in the wall. The seats around them were mostly empty.\n\nAt the centre of the Salt stood its pride and fame: the rum cask. Oh, the rum! It was made of the sixth or seventh finest type of sugarcane in all of the Ruined Sea. The Salt prided itself on a rum that was almost drinkable. It was surrounded by a mob of pirates, all clamouring for their next mug of rum.\n\nBut then, the unthinkable happened. A pirate shoved his way to the space in front of the rum tank, opened its flow of rum, and nothing came out.\n\nA curious hush spread out from the rum tank. Activity stopped. It grew ever quieter, until the pirate stood up on a table. The whole tavern was silent, their eyes fixed on him. He was wearing a red doo-rag. He posed a question to the rapt audience. A forbidden and terrible question.\n\n‘Why’s the rum gone?’\n\nThe Sodden Salt heard these words, and reacted with grace. A few fights broke out on the spot. The rest of the pirates began to break out into a chant.\n\n’Why’s the rum gone? Why’s the RUM GONE?!’\n\nIf the atmosphere in the tavern was strange before, it was getting otherworldly now. The tavern filled with an unthinking kind of rage - the rage that drives men to do desperate things. A conspicuously empty tankard hit a bartender in the face.\n\nBut then, deliverance! From the back of the tavern came a new cask of rum, even larger than the last. It was placed in the centre of the tavern. The pirate poked at it. Cautiously, fearfully, he turned on the spigot. Rum came out.\n\nThe cheers could be heard from the next island over."
 flavour_RSP.5.a:0 "Easy lads and lasses, we've got plenty enough!"
 flavour_RSP_5_a:0 "\nAll owned §YGrain§! provinces with at least §Y6§! Base Production and a §YProduction Building§! will change trade goods to §YSugar§!.\n\nDistribute §G5§! £dip£ development among owned §YSugar§! provinces.\n\nOne §YSugar§! province with the most development:\n   Add §YProduction Manufactory§! to §YProvince(s)§!."

 flavour_RSP.6.t:0 "Coronation"
 flavour_RSP.6.d:0 "On the Isle of Melted Detritus, every scallawag, cutthroat, and brigand of the Driftcourt assembled. Its courtiers streamed in as stowaways on other ships, and its nobility arrived on stolen and creaking galleons. The Driftcourt did not have cause to assemble often, but the issue which it faced today required a great ruling that would be heard across all of Aelantir. The procession continued to the outcropping of rocks where the great decisions were made. The ship bells heralded its arrival. Around the stones, the captains of standing assembled. The stature they cut and how they conducted themselves varied in many ways, but here they stood united. \n\nThe First Mate of the court began to speak. ‘Listen up, you salt-marked lot! We of the Driftcourt have got a problem. Money is flowing through our fingers!’ The courtiers jeered. ‘We stand apart now. Every one of us is looting for all we can, but the colonists flow through our cracks. Cannor is growing richer, off our land!’ The First Mate paused. ‘There’s only one thing we can do, if we want to get richer. This pirate court must become a pirate crew. We need a [Root.GetQueenOfPiratesKingofPirates]!’\n\n[Root.GetRuinedSeaPirateCoronation]\n\nThe pirates broke out into raucous cheers. Everything was soon to change."
 flavour_RSP.6.a:0 "The [Root.GetQueenofPiratesKingofPirates] - I like it!"
 flavour_RSP_6_a:0 "§YRaiding Coasts§! will give §G+1§! Power Projection per province raided (up to §G+25§!, decaying by §R-1§! yearly.).\n\nLower the requirement of the '§YBecome the King of the Pirates§!' decision from §Y20000.00§!¤ to §Y7500.00§!¤.\n\nForming §YRuinsail Confederacy§! will allow §Y[Root.GetName]§! to keep its map colour and get a unique rename."
 flavour_RSP.6.b:0 "Raiding will lead to nothing! It’s time to remove the Black Flag."
 flavour_RSP_6_b:0 "Abolish §YPirate Republic§! Government Reform.\n\nAllow formation of §YPost-Colonial Countries§!."
 RSP_queen_of_the_pirates:0 "Queen of the Pirates"
 RSP_king_of_the_pirates:0 "King of the Pirates"
 rhasail_coronation:0 "There was only ever one choice for the position: the captain of Rhasáil. [Root.Monarch.GetSheHe] strode into the centre of the circle, flanked by [Root.Monarch.GetHerHis] trusted lieutenants, and surveyed [Root.Monarch.GetHerHis] new subjects. ‘Good fellows,’ [Root.Monarch.GetSheHe] began, ‘I am humbled by your consideration for this great responsibility.’ [Root.Monarch.GetHerHis] gaze swept over the captains, and one by one, they stood a little taller. ‘But do not mistake this for the moment I assume power. Think of it as the moment we all become kings, anointed not by blood, but by the fire of our battles and the prizes we’ve claimed since the first pirate set foot in Aelantir.’ The crew of Rhasáil unfurled their banners, the brilliant red of Rhasáil rippling in the air. ‘A new age of glory is upon us, and I shall lead you to it!’"
 lamentaire_coronation:0 "There was only ever one choice for the position: the captain of Lamentaire. [Root.Monarch.GetSheHe] appeared in the centre of the circle as though [Root.Monarch.GetSheHe] had always been there, [Root.Monarch.GetHerHis] presence timeless. [Root.Monarch.GetHerHisCap] voice echoed across the water, reaching every ear in the Driftcourt with unsettling clarity. ‘I am no ruler,’ [Root.Monarch.GetSheHe] said, ‘but a puppet. Your true king is Uelos, and always has been. Only now do you see it.’ The Driftcourt's wood creaked and split, veins of white bone creeping across its surface. The stones themselves twisted into great arches, and a grand swarm of fish flung themselves from the sea onto the stones, piling up in the circle. The captain climbed to the top of the writhing mass, the moonlight casting a cold glow upon [Root.Monarch.GetHerHim]. ‘We are all servants,’ [Root.Monarch.GetSheHe] continued, ‘all puppets. But we serve Uelos the Drowned King, and a good king rewards his own.’"
 trollshaunt_coronation:0 "There was only ever one choice for the position: the captain of Trollshaunt. [Root.Monarch.GetSheHe] entered the centre of the stone circle with mist on [Root.Monarch.GetHerHis] heels. ‘As pirates,’ [Root.Monarch.GetSheHe] said, ‘we do not wait for opportunity to find us. We go wherever we need to, and steal from whomever we encounter. We do as we please. The life of a pirate is one ruled by strength, and we live by this creed until we die.’ A scratching came from beneath [Root.Monarch.GetHerHis] feet. The pirate captains of the past emerged from the ground of the circle, stripped to bone. ‘But now, I offer you all a great gift: the chance to live on beyond death. Through your strength and ours, we will return the pirates of the past to the earth. And when the time comes for each of us to die, it will not be a final death. It will be a new beginning.’ The mist swirled higher, grasping with greedy tendrils."
 palegold_coronation:0 "There was only ever one choice for the position: the captain of Port Palegold. But where was [Root.Monarch.GetSheHe]? Murmurs rippled through the crowd. Then, with a flash, the captain descended from the sky, swinging down on a rope from the clouds. [Root.Monarch.GetSheHe] swooped around the hull of a wrecked ship and landed in the centre of the circle with a thud. [Root.Monarch.GetSheHe] sprang to [Root.Monarch.GetHerHis] feet, grinning. ‘Apologies, mates! Seems I’m still shaking the rust off.’ [Root.Monarch.GetSheHe] shrugged, almost sheepishly. ‘But listen up: when I’m in charge, we’ll forget the old ways. Port Palegold has the best guns, the best tools, and we’ll share them gladly with our crew.’ [Root.Monarch.GetSheHe] raised a lantern high. From the sea, a cannon’s roar split the air, and a heavy metal crate crashed into the Driftcourt. ‘Starting now! Pick your weapons, you scurvy dogs! The Ruined Sea waits for no one!’"

 flavour_RSP.7.t:0 "The Colour of Glory"
 flavour_RSP.7.d:0 "“My scurvy subjects, with this Driftcourt convened, I now pronounce my first decree as [Root.GetQueenofPiratesKingofPirates]. A single fleet needs a single flag to sail under, and this choice is no small matter.\n\nWe must choose a colour that shall honour all the pirates before us, who never got the chance to reap the vast plunder that will be brought in by our fleets. But we are a band of pirates all our own, and these colours must represent us as well, standing for all the glory we’ll swindle and swashbuckle our way to. We now choose a colour that will be feared across the Ruined Sea: that will appear over every bay, inlet, and cove. And when our colours soar on those horizons, the people there will rush to hide their valuables. Or try, anyway,since we won’t give them the chance!\n\nThere are many pirates at this court tonight, aye, but ‘twas [Root.GetName] that assembled all the pirates of the Ruined Sea into a great federation. And so it falls to this court to decide: will we carry forward all those flags of the past, or bring one brilliant, blazing flag into the future?\n\nThe decision is made. I say to you now, my friends, that…”"
 flavour_RSP.7.a:0 "We will sail under the Skull and Circle, as so many have done before."
 flavour_RSP.7.b:0 "We will sail under the red of pirate royalty!"
 flavour_RSP_7_b:0 "\nKeep the country colour of §Y[J95.GetName]§!"
 flavour_RSP.7.c:0 "The blue of Uelos will protect our fleets."
 flavour_RSP_7_c:0 "\nKeep the country colour of §Y[J96.GetName]§!"
 flavour_RSP.7.e:0 "We will sail under the deathly white of eerie mists."
 flavour_RSP_7_e:0 "\nKeep the country colour of §Y[J97.GetName]§!"
 flavour_RSP.7.f:0 "Gold’s what we seek, and gold’s the only colour for us!"
 flavour_RSP_7_f:0 "\nKeep the country colour of §Y[J98.GetName]§!"

 #TREASURE HUNT SYSTEM EVENTS
 flavour_RSP.10.t:0 "Another Treasure Map!"
 flavour_RSP.10.d:0 "There’s only so much plunder a ship can carry before it starts sailing like a drunken pig. Holds fill, pockets sag and even the most ambitious pirates must admit that stealing six gilded statues and the governor’s wine cellar might be a tad “excessive”.\n\nSo, after one of our raids provoked the vigorous rearranging of valuables in [treasureMapProvince.GetName], one enterprising captain did the very sensible thing of burying the overflow - chests of coin, strings of pearls, jewel-studded idols, tomes of spells and more! All tucked neatly beneath the sand, to be reclaimed once the ship rode light again.\n\nYet, the captain never returned. Storm? Mutiny? Card game gone wrong? No one knows. What matters is that we have the map they have drawn and somewhere in [treasureMapProvince.GetName], there’s a treasure that already belongs to us - it just hasn’t realized it yet."
 flavour_RSP.10.a:0 "Fetch the shovels!"
 flavour_RSP_10_a:0 "Occupying §Y[treasuremapprovince.GetName]§! will §YUncover the Treasure§!!"
 flavour_RSP.11.t:0 "Uncovered Treasure!"
 flavour_RSP.11.d:0 "Thud.\n\nNo sound in the world can quite match it - a shovel striking wood buried beneath earth. For a heartbeat, the digging stops. Then the sand flies twice as fast.\n\nAnother strike. Another. Shouts of excitement from both the hardened sea-dogs and the cabin boys. Finally, wood splinters. A lid cracks and the groan of rusted hinges is loud on the shores of [This.GetName]. The sun shining shyly through the canopy lends its golden rays to the pirates favourite find - gold.\n\nEnough of it for the coins to spill between fingers, for the Pearls to tumble into the dirt. Judging by the cheers echoing across the beach, the craw shall be insufferable about this treasure trove for weeks. And rightfully so!"
 flavour_RSP.11.a:0 "The treasure is ours now!"
 flavour_RSP_11_a:0 "One of §Y4§! options will happen.\n§Y25.00%§! chance of:\nGain §G200.00§! Crowns per §YGovernment Rank§! of §Y[Root.GetName]§!.\n§Y40.00%§! chance of:\nGain §G150.00§! Crowns and §G25§! Prestige per §YGovernment Rank§! of §Y[Root.GetName]§!.\n§Y25.00%§! chance of:\nGain §G100.00§! Crowns and §G30§! of each Monarch Power per §YGovernment Rank§! of §Y[Root.GetName]§!.\n§Y10.00%§! chance of:\nGain §G25§! Prestige and §G30§! of each Monarch Power per §YGovernment Rank§! of §Y[Root.GetName]§!."

 #UNIQUE MISSION TREE EVENTS
 flavour_RSP.20.t:0 "The Ritual"
 flavour_RSP.20.d:0 "The captain stood on his deck in the black of night. He knew the words, of course - all he had to do was utter them aloud.\n\n’Uelos the Destroyer, Uelos the Hunger of Waves, Uelos of the Darkest Deep, we supplicants have come to exalt you. We cannot give ourselves to you, for we are already yours. We ask for your blessing, and ask for your mercy. We ask for your temple.’\n\nIt was done. The captain returned to his helm, and began to trace the path he was born to sail. The wind whispered like teeth on bone, but it carried another sound: the storm maidens had picked up his chant. Their voices echoed, endlessly repeating the invocation, and turned the captain’s prayer into a song older than the waves. Their breath smelled of seaweed.\n\nThe path turned in on itself in an impossible geometry. The helm alone could not trace it, but the ship was guided by something that lived far deeper than the ship’s keel that night.\n\nThe singing echoed in rounds upon rounds.\n\nThe air began to fill with fog as the sea began to leave. The captain did not know to where it went, and yet it did, and in its place rose pillars hewn from salt-encrusted coral and black stone, spiraling and impossible, bending the eye’s path, writhing as if they lived and breathed. The lanternlight did not fall upon them; it recoiled. The surface of the waves rippled with unnatural reflections. \n\nThe temple rose further yet, and the ship docked at a stair that was never meant to stand above the waves. The earth was shaking, but the captain had found his purpose and not even the world’s end would deter him from it. He began to climb, and the air grew wetter as he withdrew further from the waves. \n\nThe deafening song of the storm maidens followed him.\n\nThe captain could hear nothing but song and could see nothing but fog; he stepped forward in utter faith. At the top of the temple, a statue loomed. Its gaze was eternal and maddening. It saw all of the captain. If it was capable of joy, it would have appeared pleased.\n\nThe captain did not recoil. For here was Uelos. Here was the end of his path."
 flavour_RSP.20.a:0 "Here was the end of our path."

 flavour_RSP.21.t:0 "Rising Mist"
 flavour_RSP.21.d:0 "The village of Carrow's Haven was a picture of colonial tranquility. White-painted cottages lined the cobbled streets, their gardens bursting with marigolds. Fishermen closed their stalls as the sun dipped low, casting the sky in soft peach and lavender. The scent of salt and freshly baked bread carried on the evening breeze. Children laughed as they chased crabs near the docks, while their mothers mended nets and traded stories. The village hummed with a simple contentedness.\n\nThe sky grew grey. Not the soft fade of dusk, but an oppressive, unnatural grey that seemed to drag the light from the world. The air thickened, colder now, as the mist crept in, curling around the docks, swallowing the cobblestones, filling the spaces between people.\n\nThe lanterns sputtered. Where their light touched the fog, the shadows it cast were wrong. Too long, angled against no discernible source, moving a half-second behind the things that threw them. The laughter died. In the silence that replaced it, something large shifted in the water. The mist did not part so much as thin, just enough to suggest shapes. Tall, untiring things that had been standing there for some time already, patiently waiting to be noticed.\n\nA woman looked down. Her shadow had come loose at the heel, peeling slowly from the cobblestones like snakeskin. She barely had time to understand what she was seeing before she screamed as her shade skittered into the mist.\n\nA sailor burst into the tavern, knocking his shoulder against the frame. He did not seem to notice it.\n\n'Trollshaunt,' was all he said.\n\nThe fog pulled back from the harbour mouth to reveal a ship, its sails the colour of the roiling mist. The figurehead was a carved mouth opened in a silent scream, its inky eyes leering at the village. From it, a voice rose, deep and salt-rotted, like something that had learned to speak from listening to the gargling of drowning men.\n\n'Bring me the men of Carrow's Haven.’"
 flavour_RSP.21.a:0 "‘Bring me the men of Carrow's Haven.’"

 flavour_RSP.22.t:0 "Mecha-Pirates and Other Weirdness"
 flavour_RSP.22.d:0 "It all started with a drunken bet, you see. Zedekiah Gyro-Wheels bet his buddy Isaac over there - the one with the modular arms - that he couldn’t outrace him on his hands while Ol’ Zed used his wheels.\n\nNo, not the one with the cannon on top of his head. The other one.\n\nThat was yesterday. It was a whole event in that tavern - they had to run the rum transporters out to the testing tracks ‘cause so many people wanted to watch.\n\nThe modular seating went up to the third floor, so of course the rum had to go up there too. It was a drunken mess, me and my mateys were in the nosebleeds. Some jokers were pouring blast-oil down from the top deck of the part shops, swabbies off the relic trade were shooting off their finger guns - no, of course not. They had guns for fingers. Not that stupid thing you do with the pointing.\n\nBut I’m getting off track. Anyway, the two of them got one of those guys with the laser eyepatches to serve as starter. So he shot his eye off, and it went far off into the distance and hit the farthest wall. Must have loosened a bolt or something. The two of them were off like shots. Zed had the distance for a while - he didn’t tell his buddy, but he had gotten a tune-up at that place on the seventh floor. Yeah, the one with the nitrous.\n\nGuess he really wanted those twenty crowns.\n\nBut then, Isaac realized something - Zed never told him he had to WALK on his hands. So he swapped out those arcane propulsors for the grappling hook attachment, and he swung his way up into the rafters. Let me tell you, the crowd ate that one up.\n\nSo now Zed’s on the ground and he’s speeding along, and Isaac’s swinging up in the top, and they’re both barrelling towards the finish line by the back. But the finish line is getting closer, and neither of them’s slowing down, and now the crowd’s getting worried. \n\nI think they realized the problem at the same time thereabouts. Zed was trying to brake, but that place on the seventh floor was never very good at those, and he was leaking brake fluid. And Isaac had hit his last rafter, and he was trying to switch out the grappling hooks for the suction cups, but he hit the propulsors again instead. Don’t know why he still had those loaded. And everyone was looking at each other -\n\nAnd then they both slammed into the wall.\n\nAnyway, that’s why the back wall of the Yards isn’t there anymore."
 flavour_RSP.22.a:0 ""They had... guns for fingers?""

 flavour_RSP.23.t:0 "The Hammer Falls!"
 flavour_RSP.23.d:0 "The gentlemen stood by the dock in clothing that was as fashionable as it was expensive. The outfits had been purchased specially for this day, of course - last year’s garments may be suitable for navigating, swashbuckling, or dining with provincials, but only the most urbane and eloquent captains walked away from the Prize Court with their fair share in gold.\n\nOne of them, Elvorno the Black, was adorned in a half mask, and he was known through the Ruined Sea for his habit of sampling the finest spices from the richly equipped merchant caravans he raided for his own table.\n\nThe other, Davi the White, wore a cloak that reached from his shoulders to his ankles, and he could shoot the spotter out of a crow’s nest at 200 paces. His pistols were made of the most sumptuous rosewood money could buy, and the rumours were that he treated them like his own children.\n\nFour captured ships stood behind them.\n\nTheir cargo was mostly sugarcane and copper, but the sugar of the first ship was of a rare varietal that would flourish in the plantations of Endralliande. Their planters would pay extravagantly for the seedlings. Only Davi knew of this.\n\nThe fourth ship contained a false bottom, and within that bottom were held several precursor relics of great value to the Gommo. Only Elvorno knew of this.\n\nThe judge emerged in a robe redder than Sorncósti wine. ‘Let these proceedings now commence!’ He performed a peculiar bow. ‘These two captains, Elvorno and Davi, in good standing in the eyes of the Prize Court, now come before it to divide their spoils and reward their crew.’\n\nThe judge cleared his throat. ‘The Prize Court, having reviewed the claims of captains Elvorno and Davi, finds no deficiency in conduct, no imbalance in valour, and no procedural fault in seizure. By Case 1312, such prizes shall be awarded by ceremonial standing. Captain Elvorno takes the first and second vessels. Captain Davi, the third and fourth.'\n\nThe judge raised his hands.\n\n‘It is finished. The wine gardens await you, gentlemen.’\n\nBoth captains paled as the implications of the ruling crashed over them at once. They both began to furiously rack their brains for a justification to challenge the ruling of the Prize Court. Yet to their shared dismay, neither could find one."
 flavour_RSP.23.a:0 "Next!"

 #MODIFIERS
 RSP_eager_pirate_captains:0 "Eager Pirate Captains"
 RSP_eager_pirate_captains_desc:0 "Every captain worth his salt knows that fortune favors the bold—and those willing to sail on a shoestring. Our eager captains cut costs where they can, swear they’ll make it up in plunder, and somehow convince their crews that less pay now means more gold later. Whether that’s true or not hardly matters, so long as the ships keep sailing."
 RSP_magical_experience_catch_up:0 "Stolen Spellbooks"
 RSP_magical_experience_catch_up_desc:0 "Why spend years hunched over dusty tomes when you can simply take them from someone else? Our ‘acquired’ spellbooks come annotated, half-burnt, and occasionally cursed - but magic is magic. With enough trial, error, and the occasional explosion, even the dullest deckhand can start to grasp the finer points of the arcane."
 RSP_scrapping_the_flotsam:0 "Scrapping the Flotsam"
 RSP_scrapping_the_flotsam_desc:0 "Waste not, want not is the pirate’s way, and we have started applying this to the hulking shipwrecks that litter the Ruined Sea. The ships we build from the flotsam might be leaky from the start, but that’s just part of their charm."
 RSP_grabbing_last_scraps:0 "Grabbing Last Scraps"
 RSP_grabbing_last_scraps_desc:0 "There are very many reputable, safe organizations that seek to recolonize Aelantir. We are not one of them, so our colonists tend to be the ones no one else wanted. They’re poor, they’re downtrodden, they’re sodden scurvy dogs. Fortunately for them, so are we."
 RSP_lust_for_gold:0 "Lust for Gold"
 RSP_lust_for_gold_desc:0 "A pirate doesn’t want gold. To want something is to imply you can go without it. Every second a pirate doesn’t have his gold, he feels a hollow sensation in his chest cavity. His fingers begin to tingle. The only cure is gold, or silver if he isn’t too picky."
 RSP_corsair_warfare:0 "Corsair Warfare"
 RSP_corsair_warfare_desc:0 "Some nations may fight with honour, but we aren’t one of them. We’ll hit and run, we’ll fly under false flags, we’ll scratch and claw and fight for our plunder. We’ll hit our targets hard and fast, like a proper pirate does."
 RSP_pirates_favourite:0 "Pirates' Favourite"
 RSP_pirates_favourite_desc:0 "A pirate is thirsty almost all of the time. He can hardly drink the water that’s crawling with flies, and saltwater just makes him thirstier. No, the pirate needs something that settles in his chest, that makes him want to burst out singing when the shanties strike up, that makes him feel like the king of the seas! A pirate needs rum."
 RSP_all_the_loot:0 "All of the Loot"
 RSP_all_the_loot_desc:0 "‘Gentlemen, our goal is not to plunder some of the loot. It is not to raid a port, and come back with a couple treasures. We are not trying to preserve hold space on the ship. Our goal is to plunder all of the loot. All. Of. The. Loot. Do you understand?’"
 RSP_den_of_piracy_capital:0 "Den of Piracy"
 RSP_den_of_piracy_capital_desc:0 "In other ports, piracy is a blight on industry, and the merchant captains in power clamour to have the pirates rooted out. Here, piracy is the industry, and the merchant captains in power are also pirates. Should anyone be foolish enough to attempt to root these pirates out, they'd run up against walls higher than a ship from crow's nest to keel."
 RSP_den_of_piracy:0 "Den of Piracy"
 RSP_den_of_piracy_desc:0 "In other ports, piracy is a blight on industry, and the merchant captains in power clamour to have the pirates chased out. Here, piracy is the industry, and the merchant captains in power are also pirates. Should anyone be foolish enough to attempt to root these pirates out, they would run up against walls higher than a ship from crow’s nest to keel."
 RSP_x_marks_the_spot:0 "X Marks the Spot!" 
 RSP_x_marks_the_spot_desc:0 "Treasure’s here, ye seadogs! Why are you still reading the map? Come and dig it up!\n§g§YRuined Sea Pirates§! can occupy this province to uncover a §YBuried Treasure§!.§!"
 RSP_bustling_port:0 "Bustling Port"
 RSP_bustling_port_desc:0 "The port in [This.GetName] is so crowded with people that you can barely see the wooden planks of the docks. Anything can be bought or sold here. It is a perfect place for a grand voyage to begin."
 RSP_dominated_fleets_4:0 "Dominated Fleets"
 RSP_dominated_fleets_4_desc:0 "Our ships are fit to burst with the pirates of other fleets. We shall put their captains aboard great ships, and plunder the high seas together! After all, fish are happiest when they swim in schools."
 RSP_dominated_fleets_3:0 "Dominated Fleets"
 RSP_dominated_fleets_3_desc:0 "Our ships are fit to burst with the pirates of other fleets. We shall put their captains aboard great ships, and plunder the high seas together! After all, fish are happiest when they swim in schools."
 RSP_dominated_fleets_2:0 "Dominated Fleets"
 RSP_dominated_fleets_2_desc:0 "Our ships are fit to burst with the pirates of other fleets. We shall put their captains aboard great ships, and plunder the high seas together! After all, fish are happiest when they swim in schools."
