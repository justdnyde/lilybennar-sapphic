 chi_wellspring_1:0 "Shallow Chi Wellspring"
 chi_wellspring_1_desc:0 "Chi gathers here in small quantities. A miniscule piece of the whole, but still brimming with potential. Developing this province grants §G+15§! Chi.\n\nWhen a §YChi Wellspring§! expands, its Chi production §Gdoubles§!. This Wellspring next expands at §Y20§! Development."
 chi_wellspring_2:0 "Large Chi Wellspring"
 chi_wellspring_2_desc:0 "A growing pool of Chi, which brings growing possibilities. Developing this province grants §G+15§! Chi.\n\nWhen a §YChi Wellspring§! expands, its Chi production §Gdoubles§!. This Wellspring next expands at §Y30§! Development."
 chi_wellspring_3:0 "Massive Chi Wellspring"
 chi_wellspring_3_desc:0 "A bounty of life; a bounty of Chi. Great potentiality from great vitality. Developing this province grants §G+15§! Chi.\n\nWhen a §YChi Wellspring§! expands, its Chi production §Gdoubles§!. This Wellspring next expands at §Y40§! Development."
 chi_wellspring_4:0 "Vast Chi Wellspring"
 chi_wellspring_4_desc:0 "Here flows and gathers the Chi of cities—nature’s will made manifest. Developing this province grants §G+15§! Chi.\n\nWhen a §YChi Wellspring§! expands, its Chi production §Gdoubles§!. This Wellspring next expands at §Y50§! Development."
 chi_wellspring_5:0 "Oceanic Chi Wellspring"
 chi_wellspring_5_desc:0 "A place of immense potential; the flow of life, of Chi, diffuses throughout this land. Developing this province grants §G+15§! Chi."
 chi_wellspring_inactive:0 "Chi Wellspring §g(Inactive)§!"
 chi_wellspring_inactive_desc:0 "A place where Chi might gather, if only there was one who might wield it.\n\n£no£The owner of this province is §YTransmutative Path§!"
