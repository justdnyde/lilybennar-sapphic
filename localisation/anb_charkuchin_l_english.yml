 charkuchin_kobold_supply_facility_desc:0 "This province is home to a vast stockpile of food and medical supplies delivered regularly from the capital which are protected from hinuibird attacks by high walls and plenty of guards. The people of the province take what they need for themselves, then distribute the rest out to the frontiers.\nGives §G+10§! Monthly §YSupplies§!."
 supplies_colony:0 "Charkuchin Kobold Colony"
 supplies_colony_desc:0 "Local Monthly §YSupplies§!§! Cost: §G-50%§!"
 charkuchin_kobold_hinuibird_predation:0 "Settlement in Peril"
 charkuchin_kobold_hinuibird_predation_desc:0 "If this settlement does not receive help in fighting off the hinuibirds flocking above it soon, the consequences will be dire."

 charkuchin_kobold_hinuibird_carcass:0 "Hinuibird Carcass"
 charkuchin_kobold_hinuibird_carcass_desc:0 "This province is home to the remains of a massive hinuibird which we can strip for food, feathers, and other valuable supplies."

