 desc_charkuchin_kobold_citadel_sayupagoka_5: "Monthly Charkuchin Supplies: §G+15.00§!\n--------------\nThis citadel has reached splendorous heights the likes of which cannot be seen anywhere else, those residing at the top of this citadel can even see down on the heads of distant Holohana."

