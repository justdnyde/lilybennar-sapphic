 desc_charkuchin_kobold_citadel_sayupagoka_3: "Monthly Charkuchin Supplies: §G+10.00§!\n--------------\nBursts of creativity and marvels of engineering come together to form what surely is an awe-inspiring sight even to visitors from overseas, the architects however are not yet satisfied."
