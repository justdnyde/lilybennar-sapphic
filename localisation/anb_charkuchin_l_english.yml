 #Charkuchin Events
 charkuchin_kobold.0.title:0 "Predators and Prey"
 charkuchin_kobold.0.desc:0 "We have been buried in our citadel for centuries upon centuries. It has become more a tomb than a home, and our people yearn to expand outwards to the surface mountains we know hold great wonders and riches.\n\nThere is only one problem with the surface. We are not the apex predators there, and any who step foot outside the citadel without the appropriate preparation are soon swooped up as a meal by hinuibirds. Occasionally, the hinuibirds will drop a bone or two of their new meal as they fly off so the family has remains to bury, but this is the most we can hope for.\n\nThe outside world poses great dangers, but with the technology, weaponry, and numbers we now have, we might be able to protect ourselves from the hinuibirds well enough to explore our mountains - if we can only keep the supplies flowing.\n\nThere's an entire world out there to explore, and koboldkind isn't going to sit around in its citadels forever."
 charkuchin_kobold.0.a:0 "Adventure, if not safety, awaits!"
 charkuchin_kobold.0.b:0 "Adventure, if not safety, awaits! (with money for the AI)"
 charkuchin_kobold.1.title:0 "We are Ascendant!"
 charkuchin_kobold.1.desc:0 "Now begin our true reign!"
 charkuchin_kobold.1.a:0 "We are Charkuchar."
 charkuchin_kobold.1.b:0 "We are an Empire."
 charkuchin_kobold.1.c:0 "We are the Federation."
 charkuchin_kobold.1.e:0 "We are a Grand Republic."
 charkuchin_kobold.2.title:0 "A Blackened Sky"
 charkuchin_kobold.2.desc:0 "Like any species of bird, the hinuibirds of the mountains migrate from place to place to find new food and better climates with the changing of the seasons. Unfortunately, in this case we are their main source of food, and now that the hinuibirds are migrating here in massive numbers we will have to intensify our efforts to fight back.\n\nWe will have to send more supplies to our besieged settlements and more soldiers to kill the predatory hinuibirds which besiege them: everything is going to get harder for a while."
 charkuchin_kobold.2.a:0 "I hope they migrate on their way again soon."
 charkuchin_kobold.2.a.tt:0 "Monthly Supply Costs triple to §R[Root.insyaa_charkuchin_kobold_citadel_supplies_total_cost.GetValue]§!"
 charkuchin_kobold.3.title:0 "Predatory Intent"
 charkuchin_kobold.3.desc:0 "Our settlements in the mountains must always be on guard for frequent hinuibird attacks, but in recent days such attacks have escalated. The hunuibirds are swooping down from the sky to abduct our people directly from the village streets of [hinuibird_predation.GetName], and all the while they have been gathering strength.\n\nMore hinuibirds appear in the sky every day, and they are flocking in ways that indicate that the attacks we are seeing are only the beginning. What few naturalists remain in [hinuibird_predation.GetName] predict that the hinuibirds are amassing for one final, conclusive attack, in which they will fill their bellies until there is nothing left of our settlement.\n\nThe only solution, they say, is to send troops with sufficient weapons to drive the hinuibirds off, the numbers to succeed, and the wherewithal to stand firm and fight."
 charkuchin_kobold.3.a:0 "Send in the troops!"
 charkuchin_kobold.3.a.tt:0 "Send §Y5000§! infantry units to [hinuibird_predation.GetName] or it will §Rlose development§!"
 charkuchin_kobold.4.title:0 "Swooping In"
 charkuchin_kobold.4.desc:0 "The hinuibirds may be vicious creatures, but they are as vicious towards each other as they are to us. Our mountain scavengers in [hinuibird_carcass.GetName] recently discovered the evidence of a great fight between two hinuibirds, with the loser's body now left to rot on site.\n\nAlthough it is too dangerous in almost all circumstances to proactively hunt hinuibirds ourselves, this one carcass could feed our settlement and keep it in supplies for months and months - if, that is, we can get to the corpse before it decomposes."
 charkuchin_kobold.4.a:0 "And so the hunters become the hunted!"
 charkuchin_kobold.4.a.tt:0 "Send §Y1000§! infantry units to [hinuibird_carcass.GetName] to gain some §YSupplies§!"
 charkuchin_kobold.5.title:0 "Rocslide!"
 charkuchin_kobold.5.desc:0 "It would appear that the hinuibirds have found a new and innovative way to make our lives miserable. A hinuibird separated from its flock a few days ago, and crashed right into the peak of the mountain where the settlement of [hinuibird_landslide.GetName] is located.\n\nUsually we would celebrate the existence of one less hinuibird in the world, but in this case the massive impact of the hinuibird crash destabilized the mountain itself, causing a landslide which has devastated the settlement worse than ten hinuibird attacks would have.\n\nIn fact, much of the infrastructure of the settlement has collapsed, and our people are buried under the wreckage. Relief is desperately needed, but the question is if we can afford to send it."
 charkuchin_kobold.5.a:0 "We can spare the supplies: organize a relief effort."
 charkuchin_kobold.5.b:0 "We can send well wishes, but that is all we can send."
 charkuchin_kobold.6.title:0 "The Flocks Fly Onward"
 charkuchin_kobold.6.desc:0 "The wonderful thing about migratory birds is that wherever they go, eventually they'll want to be somewhere else. That blessed day has finally come, and the number of hinuibird attacks on our settlements has begun to decrease correspondingly.\n\nWith the reprieve this provides us, we will stockpile supplies, establish new settlements, and prepare for when the vast hinuibird flocks descend on our settlements once again."
 charkuchin_kobold.6.a:0 "For the moment, the danger has receded."
 charkuchin_kobold.6.a.tt:0 "Every §Y12§! years the migration will come again"
 charkuchin_kobold.7.title:0 "The People Starve"
 charkuchin_kobold.7.desc:0 "As we have expanded out of our citadel, we have created a grand system of logistics to maintain our all-too-fragile and threatened network of civilization. We hoped to avoid what has now occurred. We have run out of supplies for our mountain settlements entirely, and the settlers there are increasingly deciding they would rather risk the long and treacherous journey back to the citadels than stay in hinuibird territory, where they face either being eaten or their own starvation. Not all is yet lost, but if we cannot procure supplies very soon, all the progress we have made settling the mountains threatens to crash around us."
 charkuchin_kobold.7.a:0 "Fix this, NOW."
 charkuchin_kobold.7.a.tt:0 "Every province that does not have a §YCitadel§! or §YSupply Depot§! will §Rlose§! §Y1§! random development, unless it is at §Y1/1/1§! in which case it will be §Rdecolonised§!.\n\nProvinces in the §YLowlands§! and §YTitanoflora§! regions will be targeted first."
 charkuchin_kobold.9.title:0 "Beyond the Food Chain"
 charkuchin_kobold.9.desc:0 "It is migration season, and as the hinuibirds swept down upon us we put all of our usual cautionary measures in place, only to discover something curious: we did not need them. All of our settlements report that they have more than enough food and supplies, even with the hinuibirds swarming. We have built a system that can withstand even the strongest shocks, and as the word of our prosperity spreads, the people of [Root.GetName] rejoice. Today is a glorious day!"
 charkuchin_kobold.9.a:0 "There is no limit to what we can discover now."
 charkuchin_kobold.9.a.tt:0 "The §YSupplies§! Mechanic will be disabled\n"

 charkuchin_kobold.11.title:0 "If We Can't Have It"
 charkuchin_kobold.11.desc:0 "In a recent war, we captured some of the enemy's land, including areas where they established supply depots for their own settlement of the Charkuchin Mountains. We are in the strange position of not actually needing the help with supplies: we have many depots of our own, and at this point our effort would be better spent by improving existing infrastructure rather than building outward. But that is not to say capture of the supply depot is useless: even if it means nothing to us, we may take comfort in the fact that it no doubt meant a great deal to them."
 charkuchin_kobold.11.a:0 "We have won a great victory today."
 
 charkuchin_kobold.12.title:0 "Flight and Famine"
 charkuchin_kobold.12.desc:0 "The hinuibirds make life hard in the mountains, but against all odds we have managed to set up a system of settlements outside the citadels. Our people living aboveground have only been kept safe from starvation and hinuibird attacks through a delicate, just-in-time system of supply deliveries and protection patrols, which works very well most of the time.\n\nUnfortunately, whether it is due to overexpansion or hinuibird intervention, our system has crashed around our ears, and now the people in the mountains are starving. There has been a mass exodus towards the citadels, and the few that have managed to make it back tell the citadel of hinuibirds picking off desperate kobolds in the mountains one by one.\n\nNow that the erstwhile settlers have returned to the citadels, their anger has turned towards us for failing to protect them. It is hard to disagree with them."
 charkuchin_kobold.12.a:0 "Ashen skies!"
 charkuchin_kobold.12.a.tt:0 "Every province that does not have a §YCitadel§! or §YSupply Depot§! will §Rlose§! §Y1§! random development, unless it is at §Y1/1/1§! in which case it will be §Rdecolonised§!.\n\nProvinces in the §YLowlands§! and §YTitanoflora§! regions will be targeted first."
 
 charkuchin_kobold.13.title:0 "Predatory Actions"
 charkuchin_kobold.13.desc:0 "Upon learning that the hinuibirds had targeted [hinuibird_predation.GetName], we vowed that we would provide relief to its people through aid and reinforcements. Unfortunately, that vow seems to have been lost among other priorities in recent months, and when our most recent expedition went to [hinuibird_predation.GetName] to assure them that aid would arrive soon, we found there was no more need for aid. The hinuibirds had attacked again, and now large parts of what was once a thriving settlement look more like a graveyard. \n\nThe expedition has crept out of the settlement unseen, so as not to have to speak with the orphaned and the widowed. It is obvious we have failed, and someone is going to have to take the blame."
 charkuchin_kobold.13.a:0 "If we only had more time!"
 
 charkuchin_kobold.16.title:0 "Hinuibird Secured"
 charkuchin_kobold.16.desc:0 "If the early bird gets the worm, the early kobold gets the bird - we were first to the corpse of the hinuibird, and our scavenge teams have already begun stripping the corpse for supplies. We will use the meat for stew, and it will taste all the sweeter for our triumph."
 charkuchin_kobold.16.a:0 "Give those scouts the first bowls!"

 charkuchin_kobold.18.title:0 "Citadel Upgrade Completed"
 charkuchin_kobold.18.desc:0 "You just loaded your save didnt you?"
 charkuchin_kobold.18.a:0 "Blaziy, Sabroo of Dawn!"

 charkuchin_kobold.19.title:0 "Citadel Upgrade Completed"
 charkuchin_kobold.19.desc:0 "The construction on our splendorous home has been completed, and with it we shall rise to new heights!"
 charkuchin_kobold.19.a:0 "Magnificent!"

 charkuchin_kobold.20.title:0 "Upgrade Ordinance"
 charkuchin_kobold.20.desc:0 "What ordinance of growth shall we enact?"
 charkuchin_kobold.20.a:0 "Expand Food Distribution"
 charkuchin_kobold.20.b:0 "Advance Education"
 charkuchin_kobold.20.c:0 "Lay New Foundations"
 charkuchin_kobold.20.d:0 "Safer Working Conditions"
 charkuchin_kobold.20.e:0 "Establish Social Services"

 #Government Mechanic
 citadel_supplies:0 "Charkuchin Supplies"
 monthly_citadel_supplies:0 "Monthly Charkuchin Supplies"
 citadel_supplies_desc:0 "The Charkuchin kobolds are under constant attack from hinuibirds, and cannot survive in the mountains aboveground without appropriate protection and supplies. If the supplies stop coming to the mountain settlements, hinuibird attacks and starvation will come in their place.\n\n§YSupplies§! are gained monthly in the following ways:\n§G+2.5§! per §YAdministrative Technology§! level\n§G+5§!\n§G+5§!/§G+10§!/§G+10§!/§G+15§! per §YCitadel§! at level §Y1§!/§Y2§!/§Y3§!/§Y4§!/§Y5§!\n§G+10§! per §YSupply Facility§!\n\n§YSupplies§! are depleted monthly in the following ways:\n§R-1.5§! per province in the §YCharkuchar Range§! regions\n§R-6.0§! per province in the §YLowlands§!, §YMalogadin Coast§! and §YHorn of Insyaa§! regions\n§R-30.0§! per province in the §YTitanoflora§! regions\n\nThese costs are §Ghalved§! for colonies. The total monthly supply cost will be §Rtripled§! during the §YDeath from Above§! recurring disaster. Provinces with a §YCitadel§! or §YSupply Facility§! do not cost monthly §YSupplies§!.\n\nIf we reach §R0§! §YSupplies§!, every province without a §YCitadel§! or §YSupply Facility§! will lose development every 4 months and be §Rdecolonised§! once it reaches 1/1/1 development.\n\nTo §Gpermanently disable§! the §YSupplies§! mechanic, control the entire Charkuchar range with a positive monthly §YSupplies§! gain during the §YDeath from Above§! disaster.\n--------------\nOur currents sources of §YSupplies§! per month are:\nCitadels: §G+[Root.insyaa_charkuchin_kobold_citadel_supplies_citadel_gain.GetValue]§!\nAdministrative technology: §G+[Root.insyaa_charkuchin_kobold_citadel_supplies_adm_tech_gain.GetValue]§!\nSupply Facilities: §G+[Root.insyaa_charkuchin_kobold_citadel_supplies_supply_facility_count.GetValue]0§!\nOrdinances: §G+[Root.insyaa_charkuchin_kobold_citadel_supplies_ordinance_gain.GetValue]§!\n\nOur current requirements for §YSupplies§! per month are:\nCharkuchar Range cities/colonies (§Yx[Root.insyaa_charkuchin_kobold_citadel_supplies_charkuchar_range_city_count.GetValue]§!/§Yx[Root.insyaa_charkuchin_kobold_citadel_supplies_charkuchar_range_colony_count.GetValue]§!): §R-[Root.insyaa_charkuchin_kobold_citadel_supplies_charkuchar_range_city_cost.GetValue]§!/§R-[Root.insyaa_charkuchin_kobold_citadel_supplies_charkuchar_range_colony_cost.GetValue]§!\nLowlands, Malogadin Coast, and Horn of Insyaa cities/colonies (§Yx[Root.insyaa_charkuchin_kobold_citadel_supplies_lowlands_city_count.GetValue]§!/§Yx[Root.insyaa_charkuchin_kobold_citadel_supplies_lowlands_colony_count.GetValue]§!): §R-[Root.insyaa_charkuchin_kobold_citadel_supplies_lowlands_city_cost.GetValue]§!/§R-[Root.insyaa_charkuchin_kobold_citadel_supplies_lowlands_colony_cost.GetValue]§!\nTitanoflora cities/colonies (§Yx[Root.insyaa_charkuchin_kobold_citadel_supplies_titanoflora_city_count.GetValue]§!/§Yx[Root.insyaa_charkuchin_kobold_citadel_supplies_titanoflora_colony_count.GetValue]§!): §R-[Root.insyaa_charkuchin_kobold_citadel_supplies_titanoflora_city_cost.GetValue]§!/§R-[Root.insyaa_charkuchin_kobold_citadel_supplies_titanoflora_colony_cost.GetValue]§!\n\nWe lose §R[Root.insyaa_charkuchin_kobold_citadel_supplies_total_cost.GetValue]§! §YSupplies§! each month.\nWe gain §G[Root.insyaa_charkuchin_kobold_citadel_supplies_total_gain.GetValue]§! §YSupplies§! each month, up to a maximum of §Y1000§!.\n\n§g(ignore the below 0.00)§!"
 
