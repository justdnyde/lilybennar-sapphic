l_english:
    
 #Missions
 I57_1_1_feed_the_fire_title: "Feed The Fire"
 I57_1_1_feed_the_fire_desc: "With the recent loss of manpower to the east, worsening our already grievous labour shortage, we are left with scraps to arm our men and economy. On the other hand, we observe that the ogres in the west have had a much more peaceful time. Their kingdoms and nobilities, unusually prissy for such a terrible race, have sat there getting soft and fat. They have plenty of manpower to spare, thanks to decades of sitting in their precious valley and ever growing hunger for riches. Perhaps we could sate that hunger in return for a few of their workers—or some spare slaves, for that matter—to work for us instead?"
 
 I57_1_3_sweet_riverspeak_title: "Sweet Riverspeak"
 I57_1_3_sweet_riverspeak_desc: "We certainly made a good choice to impress the ogres into our service; as we have distributed them among our horde, their utility becomes all the clearer. Their innate strength and not-insignificant intelligence makes them fine and fast builders. At the same time, that very same strength might have an offensive use—they could be a great help with tearing down buildings as well. In order to unlock this potential, we shall proceed with further integrating the ogres. Perhaps, if Irdaeos wills it, we might even attain their loyalty to our ways, or at least their more willing submission to our rule."
 
 I57_1_4_breaking_new_ground_title: "Breaking New Ground"
 I57_1_4_breaking_new_ground_desc: "The ogres had a massive advantage over us that made them impossible to subjugate: iron, rivaling that of even the Lakemen. By a combination of successful force of arms and prudent strategy we now have their obedience, as well as their metallurgical knowledge. The time has come for us to make use of this we will tear down the useless mountainsides and crack open the barren plains to open up new mines to fuel our workers and warriors. Our forges shall burn bright day and night, and from them shall issue forth an unending stream of iron!"
 
 I57_2_2_a_soft_grip_title: "A Soft Grip"
 I57_2_2_a_soft_grip_desc: "We know the importance of reigning in our subjects, but we are not so foolish as to be inflexible. If we hope for the ogres to properly join us, we ought to start with a velvet glove. Harsh displays of force and repression would only provoke further insurrections. If we instead appease some and divide the remainder into squabbling factions, it will be all the easier to assert control over the lot of them. "
 
 I57_2_4_lead_by_strength_title: "Lead By Strength"
 I57_2_4_lead_by_strength_desc: "If we are to prove the legitimacy of our rule over the ogres and their valley, we must work quickly. It is not enough to have one subordinate ogre tribe when so many others have yet to swear fealty to us. A single clan can be counteracted or otherwise weakened. If a fleeing ogre cannot find anywhere in the Ogre Valley that is not subordinate to us, it will make submission their only choice. Honeyed words are of little use, as the average ogre responds only to force. We must put our subject to use as a proxy, supporting our conquest of the Ogre Valley. Only then will we have the legitimacy to claim rule over two races."
 
 I57_2_5_two_as_one_title: "Two as One"
 I57_2_5_two_as_one_desc: "Our army had significant difficulties in attempting to subjugate the ogres, but in the end we did bring about their submission. With the subjugation of the ogres, we now realize the weaknesses in our forces and at last have a hope of eliminating them.\n\nFirst: the average centaur must ordinarily rely on tactics to besiege settled peoples; the presence of ogre siege auxiliaries allows us an easier chance of breaching stone walls. Second, our centaur armies are only slightly more advanced than those of our rivals; the presence of ogres in our armies provides impetus for their modernisation as we adopt their superior metallurgy and strategy. Lastly, the ogre nation we have subordinated to ourselves will be of less use for the first two purposes unless we integrate it; such military integration will make total control over their territories much easier. "
 
 I57_3_1_pick_up_the_pieces_title: "Pick Up the Pieces"
 I57_3_1_pick_up_the_pieces_desc: "Wild Hunt is no more. Shamefully, they did not even survive long enough to break against our mettle. For decades they were the rulers of these plains. For so long it seemed as if they were Irdaeos’ favoured children, until their might failed and their enemies won the day.\n\nThe collapse of Wild Hunt has created a power vacuum among our people. The Filustkhuga sect has lost all relevancy, and adherents of the Maslekhuga sect under our leadership can take control in the chaos Filustkhuga’s fall has brought about: it is up to us to change it. "
 
 I57_3_2_hunter_hunted_title: "Hunter, Hunted"
 I57_3_2_hunter_hunted_desc: "For so long it seemed like the Caehn of Wild Hunt was the favored servant of Irdaeos with how the clan rampaged freely across the plains. Today, on the other hand, they are pathetic and derelict; even a Lakeman city-state would have little trouble routing them in battle. Seeing this weakness, we have arisen to take the reins from Wild Hunt.\n\nIn the name of our exalted Caehn, [Root.Monarch.GetName], we will crush the archaic clan of Wild Hunt and enthrone ourselves in its place. "
 
 I57_3_3_rise_of_the_golden_caehn_title: "Rise of The Golden [Root.I57_golden_caehn_horde_text]"
 I57_3_3_rise_of_the_golden_caehn_desc: "[Root.I57_golden_caehn_desc]"
 I57_caehn_tt: "Caehn"
 I57_horde_tt: "Horde"
 I57_golden_caehn_desc_alive_tt: "Thus decrees the Caehn: you, my loyal servants, have followed me from the ogres' valley to the gates of the Lakemen. You have supported me in every campaign and faithfully followed my orders. As it pertains to the establishment of the Golden Tremor of today, your contributions cannot be neglected. Without your efforts, I would not be the Golden Caehn..\n\nBut we cannot allow all this to be for naught. If Irdaeos takes me to Ik Magthaal tomorrow, everything will fall apart; this cannot come to pass. We must entrench our deeds so that our exalted clans rule remains in place; with or without me.. " 
 I57_golden_caehn_desc_dead_tt: "When our great and beloved Caehn, Rhidrin Goldencall, suffered death and returned to Irdaeos, the Ordsiwyn and our subjects took our grief as an opportunity to commit treason. Within weeks of the obsequies for his death, they rose in savage revolt, slaughtering loyalists and coming within miles of the capital. It took hard work to subordinate them, but we have finally pulled it off; despite this achievement, we remain precarious.\n\nThe revolt can never be allowed to repeat itself. The legacy of the Golden Caehn must be preserved, no matter the cost. "
 
 I57_3_5_a_new_golden_plain_title: "A New Golden Plain"
 I57_3_5_a_new_golden_plain_desc: "As the ogres' metallurgical knowledge spreads, enterprising subjects of Golden Tremor have begun to work in settlements near sources of raw material. We were occupied with other matters and so did not think too much of it one way or the other until it became clear that these hubs of production have had an increasingly positive impact on our treasury.\n\nThey have done some of the work; let us now do the rest. We will move centaurs to these places of labour and build new buildings, and put ogres to use to see what new resources we might find. One rumour that has piqued our interest is the chance that gold might be available..."
 
 I57_3_6_the_golden_codex_title: "The Golden Codex"
 I57_3_6_the_golden_codex_desc: "For the first time in several centuries, we have attained total control over the plains. But unlike prior great Caehns in history, we have succeeded where they have failed. When the old Caehns subordinated the plains, there were always those that held out; we have precluded that possibility. When the Caehns went to war with the ogres, they were routed by superior arms; we have instead put those arms to use for us. The old Caehns lived in fear of clan revolts; we have now fully subdued the clans to our will.\n\nThere can be no doubt that the plains will never be the same again. Today, under the exalted rule of [Root.Monarch.GetName], the plains have entered a new, modern era. Let us write a Golden Codex to ensure these reforms live on through the generations."
 
 I57_4_2_gilded_hooves_title: "Gilded Hooves"
 I57_4_2_gilded_hooves_desc: "We have forced the submission of so many peoples across these plains, but have yet to truly profit from it. We mocked our new subjects as "prissy" and "sorely in need of relief from their riches" but have done nothing about it. What is this other than procrastination?\n\nIt is well past time for us to live up to the name "Golden Tremor". We should visit our subjects one by one and finally make the demands that were expected once they surrendered to us. They will only have peace if they pay up. "
 
 I57_4_4_the_tremoring_call_title: "Epicenter"
 I57_4_4_the_tremoring_call_desc: "In history, the Ordsiwyn have felt free to come and go at will, joining the allegiance of one Caehn as readily as they leave that of another. That is in part because of what they perceive as the inconvenience of travelling from their own lands to wherever the Caehn is situated.\n\nIf we are going to enchain the Ordsiwyn to our will on a permanent basis, we should offer them a modicum of certainty as to where they must go to confer with their Caehn. To that end, let us establish a permanent settlement to act as a capital, similar to the settled capitals of the Lakemen. Though the Ordsiwyn will not be expected to reside in the new capital permanently, they will have to come to our new capital to speak to the Caehn. "
 
 I57_4_5_the_enchained_clans_title: "The Enchained Clans"
 I57_4_5_the_enchained_clans_desc: "The idea of "Free Clans", where any clan can run away from its ruler whenever it likes, is at least half the reason the likes of us, the children of Irdaeos, have suffered the mockery of the settled races for centuries. This joke has carried on long enough! We shall put paid to the Free Clans, once and for all.\n\nThus decrees the Caehn, [Root.Monarch.GetName]: the Free Clans’ privileges are revoked, their right to counsel rendered dependent on submission to the Caehn. Any that submit shall be spared; any that rebel shall be exterminated. Rest assured, we will make a big show of rooting out the most recalcitrant of the clans. We would not want more rebellions after all, would we?"
 
 I57_5_1_weigh_their_hearts_title: "Weigh Their Hearts"
 I57_5_1_weigh_their_hearts_desc: ""Why do the clans need to be ‘free’ if they are to have a Caehn to rule over them? All the fools who keep trying to defend the old ways to me come up short whenever I ask them this. Until I came around it sure seemed as though they saw nothing wrong with a Caehn having total authority insofar as it suited the clans that came and went like so many merchants at a Lakeside bazaar. The fact is, we should only keep on trying to have it both ways—a sovereign ruler and a free union—if we want the damn Lakemen to keep laughing at us from behind their stone walls. I do not know how to change it, but I know it must change."—Caehn Rhidrin, during a speech given on the reformation of the Free Clans."
 
 I57_5_3_ordsiwyn_reforms_title: "Ordsiwyn Reforms"
 I57_5_3_ordsiwyn_reforms_desc: "The time has come; we have just enough power where we can finally begin to dictate terms to the Ordsiwyn instead of the other way around. Now that the family of Goldencall has assumed near-total control over the Golden Tremor lands, Ordsiwyn cannot simply run away from us at will. They realise this and chafe under their new submission. We should take advantage of their weakness! It is the perfect opportunity for us to provide a way forward and in doing so confirm their total loyalty to us."
 
 I57_5_4_sundering_schisms_title: "Sundering Schisms"
 I57_5_4_sundering_schisms_desc: "The hour is late, and our control over these lands deepens. Yet there is one sector of our society that has yet to unite under our elevated and correct guidance—that of religiosity. In the past our faith was disorganised, with squabbling sects and variations thereupon cropping up in every clan of more than a thousand individuals. The most prominent of these within our core territories was the Maslek Sect, with whom we have enjoyed a long and fruitful cooperation.\n\nLet us now elevate clerics of the Maslek Sect into government positions. This will have two effects: it will secure the loyalty of those we put into office, while at the same time ensure a properly unified faith. "

 #Events
 golden_tremor_events.1.t: "And They Drown In Sin"
 golden_tremor_events.1.desc: "The sun had started to set by the time the rebel leader reached the meeting point. Ahead, already waiting for him, was the figure of Rhidrin Goldencall, draped in furs, seated and gazing into the horizon. He did not rise as the rebel approached.\n\nThe rebel leader spoke first. “I am Kher Bronzestar, and I ask that you hear my plea. My people are not prone to rebellion; we kneel to authority, so long as that authority is righteous, wise, and just, as the old ways command. Yet, you have challenged us to the Negeal! Are we truly so small to you, that you wish to take everything from us? No, my people shall fight to stand until you force us to kneel.”\n\nRhidrin did not move. “You know my reputation, as a leader in times of peace and war. Am I truly so unjust, so unwise in the mouth of rumor, that only fools would stand behind me?”\n\n“You are not,” replied Kher, “but it is not your reputation alone that guides our decision. We have heard of your ambitions, that you would take freedom from all the centaurs of the plains and bind them to your cause. This, we cannot abide.”\n\nFinally, Rhidrin looked away from the horizon, towards Kher. “The freedom you beg for is little more than a trick of the light. For a thousand years, centaurs have enjoyed the same freedom you so value, and for a thousand years they have remained stagnant, marching in circles about the plains. I myself marched upon the humans of the lakes, and I myself witnessed the great foolishness of fragmented centaur clans as we died and drowned. That we will abandon this folly is not a demand that I make; it is merely the course that history will follow.”\n\n“You are a confident man,” replied Kher Bronzestar."
 golden_tremor_events.1.a: "“The river does not need confidence to know that it shall flow.”"

 golden_tremor_events.2.t: "Ordsiwyn Leaves"
 golden_tremor_events.2.desc: "Rhidrin’s face betrayed no emotion as he listened to the accusations made by the ordsikar. He was a slaver, a despot, he wished to betray the old ways, he would turn them all to weaklings. So many of these claims were familiar to Kher Bronzestar, as he stood beside Rhidrin and listened - he had leveled many of the same accusations when first he stood against the centaur who would be his Caehn. He cursed them all for fools, and himself doubly so; they did not understand, as he had not, that they would trade in the name of freedom for the thing itself, that there was no true freedom in a world of raiding and desperate survival.\n\nWhatever they believed the outcome of this meeting would be, the ordsikar were clearly disappointed, leaving Rhidrin’s command-tent in a huff of muttered curses and dirty looks. As the last one left, Kher turned to glance at Rhidrin, who was already giving him a look of wry amusement. \n\nRhidrin chuckled. “Saw something you recognized, eh?” \n\nKher scoffed and turned away. “If only I could have recognized the depth of that folly when first we met.” He fixed his Caehn with a serious look. “They shall fight you, as I did, desperate to escape a fate that already draws near.”\n\nRhidrin looked at the open flap of the tent, where it framed the clear blue sky. "
 golden_tremor_events.2.a: "“They may fight, but history has no room for insubordination.”"
 golden_tremor_events.2.b: "“History shall not notice their absence.”"

 golden_tremor_events.3.t: "The Meek Breeze"
 golden_tremor_events.3.desc: "Over the years, Rhidrin had grown fond of making his enemies come to him to negotiate. The habit had started when he was a general - to stare his foes in the eye, daring them to try something in his inner sanctum, was an excellent way to unnerve his foes and force them to doubt their plans. When the Wild Hunt shattered and he returned home to his clan, he took the habit with him, and as he rose, it rose, too: to be granted private audience with a Caehn was a projection of strength and security, showing that he felt no fear even when alone with an enemy. \n\nWhen the leader of the Wild Hunt entered his tent, barely an adult, eyes wide with anxiety, he felt that perhaps this technique had grown too effective. His eyes snapped to Rhidrin the moment he entered the tent, and he waited, as though waiting for permission to speak.\n\nRhidrin snorted; he could not help it. He snorted again when the kid flinched. This was the heir to the greatest Caehnate in living memory? This… child? \n\nThe kid reached for the blade at his hip. “You’re- you’re bold, to meet me here alone.”\n\nRhidrin gestured towards his own swords, across the tent; by the time he could reach them, the kid would surely be upon him. “If you believe you can win, you should fight.”\n\nThe kid stomped nervously. His trembling hand released his blade’s hilt. “I shall spare us both the danger. I came here to talk of peace between our people.”\n\nAt this, Rhidrin only raised an eyebrow. “You seek peace because you would lose in battle. I seek peace because I would win.”"
 golden_tremor_events.3.a: "“We are not the same.”"

 golden_tremor_events.4.t: "The Gleaming [Root.I57_golden_caehn_horde_text]"
 golden_tremor_events.4.desc: "None of our histories recall a settlement larger than [From.Capital.GetName]. A city, built in the centaur way; a great, sprawling thing, that extends across the plains in every direction. Thousands of centaurs are travelling each month to it. The ordsiwyn, and the finest of Golden Tremor’s lieutenants, all reside in the finest of the stone houses at the city’s heart. The houses, and the grand avenues of the city, are draped in a riot of embroidered fabrics in every color of the rainbow, representing the many clans that have come to be part of our new order. Everpresent guards stand at the entrance to one building in particular: the Mint, where golden coins bearing the visage of Rhidrin are produced in vast quantities. At the very center of the city, before the government buildings and the manor of the Goldencall's themselves, lies Rhidrin’s tent, still used by the Caehn to host private audiences.\n\nAcross the city, centaurs and ogres live side by side. Centaurs march and gallop, working in every job, from street sweepers to bureaucrats. Ogres ply smithing trades and offer their services as bodyguards to wealthy centaur merchants, or sell wares fashioned by the ogre populations of the Caehnate. Even a few humans can be spotted, smaller than the centaurs and ogres around them; the occasional human merchant or diplomat, their awe showing clearly on their faces, walks in our streets or eats in our inns, and contemplates how diplomacy and trade with us might enrich them, or how war with us might end them. \n\nThis city - our city, [From.Capital.GetName] - is still young, still growing, and yet it is already a sight to be found nowhere else on the Plains."
 golden_tremor_events.4.a: "We still have much to do."

 golden_tremor_events.5.t: "Baildelk's Call"
 golden_tremor_events.5.a: "[Root.I57_baildelks_call_option]"
 golden_tremor_events.5.rhidrinDesc: "“Why are you in my tent?”\n\nRhidrin had only just returned from campaign, the dust of the steppe still clinging to his flanks, and he had been looking forward to unwinding after the arduous canter back from the front. So finding his son, Baildelk, standing in his tent and clutching a birch chest of conspicuous weight was not the most pleasant of surprises.\n\n“A gift for you, father,” replied Baildelk, dropping the chest onto the rugs with a heavy thunk before kneeling to remove the lock. The chest opens, and the tent is suddenly awash with light, the flickering flames of the firepit reflecting off its contents.\n\nGold. The chest was filled with countless nuggets of gold, pure and beautiful.\n\nMinutes passed as Rhidrin stared into the chest, his mind alight with plans and schemes. The greatest obstacle to his dreams of modernization had always been the poverty of the steppes, but with such a bounty, a hundred new paths had suddenly opened. Roads could be laid, industries built, soldiers paid, everything that was desperately needed but had been bottlenecked by their meagre finances.\n\nA fidget from Baildelk snapped him from his reverie. Rhidrin turned to his son and asked the one question that this future hinged upon: “Can you do it again?”\n\nBaildelk nodded confidently, and Rhidrin stepped over the gold to pull him into a tight embrace."
 I57_baildelks_call_rhidrin_option_tt: "“You have done well my son!”"
 golden_tremor_events.5.baildelkDesc: "By the time Baildelk reached the riverbend, the light was beginning to slip beneath the horizon. The rest of the scouts had already departed for the camp on his orders; finding time to himself had become increasingly difficult since becoming Caehn, making every opportunity something to be savored. For a long while, Baildelk remained there, sighting the local landmarks with his alidade and searching the river for any confirmations of his suspicions about this place.\n\nWhen the setting sun at last caught on a glimmer of something through the murky water, Baildelk immediately waded into the river to investigate. He reached into the cold, cloudy depths, feeling around before pulling out a gold nugget the size of his fist.\n\nA week later, Baildelk once more overlooked the same riverbend, now transformed into a hive of activity, centaurs scurrying about like dmarvuks that had caught the scent of a cask of ogre blood ale. Some teams hauled rocks from the riverbed while others waited with hammers, ready to crack open the stones in search of gold. Pits were being dug all along the banks in search of any gold trapped beneath the layers of gravel. All the while, warriors kept a close watch over the workers. This gold would fund the reforms dreamed up by Baildelk’s father; it would not do for some laborer to steal it.\n\nLooking upon the budding mine, Baildelk felt as though he could see the shape of things to come. Each broken rock was a promise of more. More mines, more industry, more soldiers, more prosperity. With this fortune, he would honor his father’s legacy and build a new future for his people."
 I57_baildelks_call_baildelk_option_tt: "There’s always more to be found."
 golden_tremor_events.5.neitherDesc: "The surveyors had not expected to find anything of note. The steppe had a way of swallowing ambition, its rivers shallow, its soil stubborn, its wealth practically nonexistent. Nonetheless, they shouldered on, pacing out distances, recording landmarks, and taking measure of what little the land was willing to yield. A thankless task, but at least they would not be dying in whatever new war the Caehn was waging.\n\nIt was nearly dusk when one of them paused at the river’s edge. This region had been highlighted in the unfinished notes of the late Caehn Rhidrin’s son, Baildelk, as a place suspected to conceal a hidden wealth, but thus far they had found nothing.\n\nThen they spied it. A glimmer, faint and fleeting, caught in the current. At first it seemed a trick of the light, but curiosity quickly won out. Wading into the water, they sifted through the gravel, fingers numbing in the snowmelt before closing around a strange rock. Pulling it from the water, it shone in the light of the setting sun, a nugget of solid gold.\n\nFor years, Caehn Rhidrin’s dreams of modernization had been stifled by the poverty of the steppe. He had left behind sketches and plans for roads, industries, and professional armies, all abandoned due to the exorbitant cost of such endeavors. But with a reliable source of gold, these dreams might at last be achievable. After carefully recording the location and gathering several more nuggets, the surveyors set off to inform the Caehn of their findings, wondering all the while how much more the steppe could be hiding."
 I57_baildelks_call_neither_option_tt: "There’s more to be found."

 golden_tremor_events.6.t: "The Greatest Negeal"
 golden_tremor_events.6.desc: "A Negeal is not a boast. It is not a war-cry, or the beating of drums; it is not an affair of glory or songs. What it is, is an acknowledgement of truth: that we are strong, that they are weak, that the only thing between our strength and their submission is the polite pretense that this is not the case.\n\nPoliteness is not a virtue that most would associate with centaurs.\n\nThose who would deny reality lie broken in a hundred fields, their bones hidden amongst the grass. They are not immortalized in song; they are not given the honors of strong foes; they are not spoken of with fondness by their former brothers, who kneel before us now. The converse is also true; when one is convinced of a lie, you do not hold it against them when they discover that they have been misled. Rather, they deserve sympathy, an arm thrown over the shoulder, for when a father knows that his rebellious sons have come to see sense, why would he feel anything but pride?\n\nThe loyal kneel, and the disloyal are buried. All is as it should be."
 golden_tremor_events.6.a: "All those guided by Gold: Rise!"

 golden_tremor_events.7.t: "The Golden Codex"
 golden_tremor_events.7.desc: "“Thus shall be the charge that I, Rhidrin Goldencall, lay upon myself, my descendants, and all who would name themselves to be of the Golden Tremor: that the learned among them shall learn the law, that the strong among them shall enforce the law, and that the weak among them shall be protected by the law.\n\nFirst: He who visits lawless violence upon another shall be put to death.\n\nSecond: He who unlawfully seizes the property of another shall return what was taken, and in addition pay commensurate damages in labor or coin.\n\nThird: He who lives beneath the banner of the Golden Tremor, be he centaur or ogre, may keep to his customs and worship freely, so long as he breaks none of these laws, and does not deny the supremacy of Irdaeos.\n\nFourth: He who lays hand upon any merchant bearing the caehn’s protection-amulet, or who defaces currency, or who produces false currency to trade, shall be put to death.\n\nFifth…”"
 golden_tremor_events.7.a: "Commit it to memory and spread it to all corners of the realm."

 golden_tremor_events.10.t: "The Golden Call Falls Silent"
 golden_tremor_events.10.elseDesc: "When a leader dies, it is tradition that their subordinates come to pay respects. It is, the shamans say, the meaning of that sacred rite; lifted by the chants of their followers, the spirit of the departed might drift high enough to be caught by the wind, and rejoin Irdaeos in the wide open sky.\n\nThat is what makes the sparseness of Rhidrin Goldencall’s funeral such a stark sign.\n\nAbsent are the subjugated, those who still reject the truth of the Negeal. Absent are their clansmen; did they lie when they knelt and swore fealty, or are they simply weaklings, following the vision of anyone with conviction? There are barely enough of us here, the loyal, to ensure that Rhidrin's place in the afterlife is secured; let us chant ‘til our throats are hoarse, drum our hooves ‘til our knees give out. Let us make such clamor that it reaches all corners of the land and fills the ears of those who think they can escape our wrath.\n\nFor now, those of us who are here, who believe yet still in a vision that shines with gold, raise our voices and cry out…"
 golden_tremor_events.10.a: "“…Rhidrin’s dream shall not die with us!”"
 golden_tremor_events.10.desc: "A hundred ordsikar kneel, draped in golden chains: the symbol that binds them to Lejdazamh.\n\nBehind each of them, a thousand clansmen drum their hooves, golden earrings hanging from their ears.\n\nLike grass before the wind, the crowd parts, as [Root.Monarch.GetName] strides forth, stopping before the great cairn atop which Rhidrin’s body lays. The shamans anoint [Root.Monarch.GetName] in the blood of the funeral rite’s sacrifices; they brush [Root.Monarch.GetHerHis] arms and chest with golden paint. At last, they bring forth the Golden Codex, the great work of Rhidrin’s life, and [Root.Monarch.GetName] hoists it above [Root.Monarch.GetHerHis] head.\n\n“This,” [Root.Monarch.GetName] calls out, voice ringing clear across the now silent crowd, “is the inheritance that Rhidrin left us.\n\nThis is the legacy he leaves behind - a legacy of order, wrought in gold.\n\nHe called out to us, promising prosperity, and though his voice has fallen silent…”"
 golden_tremor_events.10.rhidrinDesc: "A hundred ordsikar kneel, draped in golden chains: the symbol that binds them to Lejdazamh.\n\nBehind each of them, a thousand clansmen drum their hooves, golden earrings hanging from their ears.\n\nLike grass before the wind, the crowd parts, as [Root.Monarch.GetName] strides forth, stopping before the great cairn atop which Rhidrin’s body lays. The shamans anoint [Root.Monarch.GetName] in the blood of the funeral rite’s sacrifices; they brush [Root.Monarch.GetHerHis] arms and chest with golden paint. At last, they bring forth the Golden Codex, the great work of Rhidrin’s life, and [Root.Monarch.GetName] hoists it above [Root.Monarch.GetHerHis] head.\n\n“This,” [Root.Monarch.GetName] calls out, voice ringing clear across the now silent crowd, “is the inheritance that Rhidrin left us.\n\nThis is the legacy he leaves behind - a legacy of order, wrought in gold.\n\nHe called out to us, promising prosperity, and though his voice has fallen silent…”"
 golden_tremor_events.10.b: "“...We have heard the call, and now our throats take it up again.”"

 golden_tremor_events.20.t: "Negeal Triumphant"
 golden_tremor_events.20.desc: "To issue a Negeal is to challenge a clan’s right to exist. It is an assertion that a clan denies the truth, that they have deluded themselves into believing that they are more than a part of something else. To win a Negeal, as we have done, is to shatter that illusion, to take what has always been ours. It is not a triumph, but merely an acknowledgement of reality.\n\nTheir champions - our champions, now - kneel before us."
 golden_tremor_events.20.a: "Let us add their strength to ours."

 golden_tremor_events.21.t: "Negeal Defeated"
 golden_tremor_events.21.desc: "To issue a Negeal is to challenge a clan’s right to exist. It is an argument solved at spearpoint, a delusion only resolved through the shedding of blood. To lose a Negeal, as we have done, is to admit that our eyes have been clouded, that we cannot see clearly - that, indeed, those we have challenged were right and we were wrong.\n\nIt is no wonder that others now look at us with less trust in their eyes."
 golden_tremor_events.21.a: "For now, we are wrong; you exist, for now."

