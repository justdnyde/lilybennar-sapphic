 estate_planetouched:0 "Planetouched"
 estate_planetouched_desc:0 "This estate represents the planetouched, people who are born or otherwise infused with large amounts of planar energy. Their unique heritage grants them a measure of control over the element that they are inherently attuned to, but this power tends to make them the target of fear, distrust, or outright oppression."
 planetouched_loyalty_modifier:0 "[Country.GetPlanetouchedName] Loyalty Equilibrium"
 planetouched_influence_modifier:0 "[Country.GetPlanetouchedName] Influence"
 planetouched_privilege_slots:0 "[Country.GetPlanetouchedName] Max Privileges"

 estate_planetouched_organization_empowered:0 "Planetouched Organization: Empowered"
 estate_planetouched_organization_empowered_desc:0 "The planetouched within our society are allowed to freely associate amongst themselves and other social classes. Their right to use their powers is unbound, and they are at liberty to pursue their own or collective interests just the same as any other within our realm. However, many may still chafe at the privileges awarded to these extraordinary individuals."
 estate_planetouched_organization_state:0 "Planetouched Organization: State Controlled"
 estate_planetouched_organization_state_desc:0 "Following the tradition established by Biakata’s second Fangaulan Empire, the planetouched within our society are kept on a tight leash. We do not allow their great potential to go unspent, yet we tolerate none of the disorder which so commonly accompanies their activities when left unchecked. Even these most chaotic elements of our society must submit to our divinely ordained authority."
 estate_planetouched_organization_scattered:0 "Planetouched Organization: Scattered"
 estate_planetouched_organization_scattered_desc:0 "The second Fangaulan Empire is long gone, and without the iron fist of Biakata’s heirs and the God’s Atoners elemental chaos now reigns supreme in the Land of Authority. The planetouched, once held securely in chains, now roam freely through the land, creating strife wherever they go. It is now in the hands of warlords what their fate shall be."
 estate_planetouched_organization_oppressed:0 "Planetouched Organization: Oppressed"
 estate_planetouched_organization_oppressed_desc:0 "No longer are the planetouched within our society allowed to spread chaos and misfortune like wildfire. Through the establishment of firm control over these dangerous individuals, we can finally establish a stable order within our borders. The estates will be grateful for our safeguarding of their interests, protecting them from the tumultuous influence of planetouched individuals."

 estate_planetouched_scattered_inheritance:0 "Enshrine the Right of Inheritance"
 estate_planetouched_scattered_inheritance_desc:0 "Traditionally, the right of planetouched heirs to succeed their ruling parent has been entirely contingent on the conditions of their realm and strength of personality given the generally hostile attitude of Fangaulan elite society towards them. By restricting the nobility’s power to unilaterally block planetouched inheritance, it will be easier to capitalize on these individuals' abilities as rulers."
 estate_planetouched_scattered_scions:0 "Divesting Unwanted Scions"
 estate_planetouched_scattered_scions_desc:0 "A planetouched born into a noble family is always a matter of great worry and indecision. Should the family rid themselves of the accursed child? Or raise them in hopes of bringing power to the house, while making the family an outcast amongst their peers? By issuing a strict law requiring nobles to do the former, the latter eventuality can be avoided, ensuring a calm and cooperative nobility."
 estate_planetouched_scattered_aro:0 "Remembrance of Aro"
 estate_planetouched_scattered_aro_desc:0 "Aro, first emperor of Fangaula, was a model of excellence who defeated the foul genies and forged the Land of Authority with his own hands. After founding the empire he would go on to defend it against the advances of the lich Kaino and his army of undead, until he finally ascended to godhood on sacred mount Sirik. As he showed, to be planetouched is to be favoured by the divine in soul and body alike, their name destined to be inscribed into eternity."
 estate_planetouched_scattered_banni:0 "Remembrance of Banni"
 estate_planetouched_scattered_banni_desc:0 "Banni, reviled bane of the second empire, organized the greatest revolt in the history of Fangaula after the execution of the hero Diakarida by the empire, toppling the second empire and sundering the imperial capital in half. His uprising brought death to untold thousands and spilled the lifeblood of the Land of Authority and its children. He has shown that to be planetouched is to wield power unspeakable, and to lack the wisdom to know its proper use."
 estate_planetouched_scattered_ventures:0 "Encourage Planetouched Ventures"
 estate_planetouched_scattered_ventures_desc:0 "The unique capabilities of planetouched present an untapped opportunity for entrepreneurial success in our realm, to the economic benefit of all. They should be afforded opportunities to establish their own mercantile presence, even if it competes with our more mundane merchants."
 estate_planetouched_scattered_commerce:0 "Sponsor Planetouched Commerce"
 estate_planetouched_scattered_commerce_desc:0 "The marginalized position of the planetouched often leads to them becoming targets of slave traders, who often make sizable profits marketing them as exotic goods. Surely, our own merchants would be appreciative if we were to subsidize this trade."
 estate_planetouched_scattered_jelli_wanderers:0 "Jelli Wanderers and Poets"
 estate_planetouched_scattered_jelli_wanderers_desc:0 "Jelli are one of the few established groups that planetouched tend to join often. Leading a life of freedom, wonder and more than a bit of danger, jelli travel across all of Fangaula seeking knowledge of the land, its people, and most importantly its magics. To enshrine their rights will not only see the planetouched look upon us more favourably but it will also aid our state in compiling the varied magical traditions from our lands, much to the annoyance of traditional mages."
 estate_planetouched_scattered_jelli_sinful:0 "Silence the Sinful Jelli"
 estate_planetouched_scattered_jelli_sinful_desc:0 "The jelli are in the best case a welcome reprieve from court life, at their worst they are annoying pests that wander the land freely, sharing their songs of glory, of adventure… and of dissent and tolerance for the accursed planetouched. Troublingly they are also one of the biggest fountains of knowledge on the arcane in Fangaula, and this has often provided them with considerable leeway given their indisputable usefulness; Yet we will strive to make their services, and thus them, dispensable."
 estate_planetouched_scattered_guilds:0 "Encourage Planetouched Guilds"
 estate_planetouched_scattered_guilds_desc:0 "Many wayward planetouched find themselves joining up with adventurer and mercenary bands. By organizing these individuals into small groups of their own, their unique powers can be put to good use without necessitating a restructuring of our regular armies"
 estate_planetouched_scattered_unstable:0 "Bounties on the Unstable"
 estate_planetouched_scattered_unstable_desc:0 "Roving planetouched taking up arms as part of adventurer and mercenary bands can only be a recipe for chaos. By handing out bounties to incentivise those same companies to turn in any planetouched who try to join up, we can discourage this destabilizing practice."
 estate_planetouched_scattered_conscription:0 "Enforced Planetouched Conscription"
 estate_planetouched_scattered_conscription_desc:0 "Planetouched have valuable powers, and it would be a waste to simply let them roam free without putting them to good use. We can instead empower our nobles to conscript them in their levies, providing us with a potent addition to our army."
 estate_planetouched_scattered_titles:0 "Strip Planetouched Titles"
 estate_planetouched_scattered_titles_desc:0 "Many of our nobles rankle at the sight of any planetouched at court. By ensuring courtly positions and titles are awarded to those more deserving, we can sideline any ambitious planetouched while appeasing our nobility."
 estate_planetouched_scattered_property:0 "Allow Planetouched Property Purchase"
 estate_planetouched_scattered_property_desc:0 "Planetouched rarely hold land by their own right, at most they do so as part of a guild. To check the power of our other estates, we could offer a special dispensation and allow planetouched as a class to officially purchase the right to their own land from the other estates."

 estate_planetouched_empowered_heroism:0 "Promote Planetouched Heroism"
 estate_planetouched_empowered_heroism_desc:0 "Ambitious and inspired planetouched should be encouraged to use their powers as leaders of valiant adventurer and mercenary bands, so that they may forge a heroic legacy, an example for any aspiring warrior within our lands."
 estate_planetouched_empowered_sanctuaries:0 "Fund Planetouched Sanctuaries"
 estate_planetouched_empowered_sanctuaries_desc:0 "Planetouched have often found themselves cast out from their homes and villages, accused of attracting curses and foul magics with their chaotic powers. We should give our clergy the ability to expand their holdings to provide for these wayward individuals, turning our temples into refuges for the outcast."
 estate_planetouched_empowered_primacy:0 "Primacy of the Planetouched"
 estate_planetouched_empowered_primacy_desc:0 "As the Planetouched make up some of the most dynamic individuals within each of our estates, our court should naturally lean on their ability and expertise. By delegating certain authorities specifically to them, rather than our hereditary nobility, their loyalty can be assured while they serve to further the interests of the other estates at court, mitigating any jealousies that might otherwise arise."
 estate_planetouched_empowered_viceroys:0 "Delegate to Planetouched Viceroys"
 estate_planetouched_empowered_viceroys_desc:0 "Traditional local administrative roles often fall to minor nobles or low-level bureaucrats, who eventually rise through the ranks to occupy more prominent posts. By doling out these positions to promising, yet unproven planetouched instead, we can ensure a regular crop of skilled planetouched leaders and administrators."
 estate_planetouched_empowered_waywards:0 "Required Planetouched Waywards"
 estate_planetouched_empowered_waywards_desc:0 "The private shipping fleets operated by our burghers provide considerable opportunities for profit. If we were to allow them to recruit from the planetouched who would normally join our navy, they stand to make further substantial gains. These planetouched windwardens specialized in protecting ships from adverse weather and speeding their travel."
 estate_planetouched_empowered_scribes:0 "Promote Planetouched Land Rights"
 estate_planetouched_empowered_scribes_desc:0 "The ascendant status of planetouched in our society accords them the same landholding rights as other classes. As such, they can expect to receive grants of land in exchange for their services as well, becoming part of our local government by administrating these holdings."

 estate_planetouched_oppressed_inheritance:0 "Revoke Inheritance"
 estate_planetouched_oppressed_inheritance_desc:0 "Planetouched infants, especially within our nobility, have always been met with justified suspicion and revulsion, yet many unfortunate parents have been driven to desperate measures, obscuring, sending away, or otherwise concealing their birth. By enforcing a policy among our nobility that stipulates the immediate removal of planetouched spawn from the line of inheritance and their subsequent elimination, we can ensure a stable succession within the ranks of our nobility."
 estate_planetouched_oppressed_oblige:0 "Noblesse Oblige"
 estate_planetouched_oppressed_oblige_desc:0 "It is the right of the nobility to lead on the field of battle, to stand above the rabble as generals in battle and gain the glory that comes with victory; some rulers have historically appointed particularly powerful planetouched as generals, foolishly believing that their brute power could ever triumph over the tactical genius and savvy of a sophisticated nobleman."
 estate_planetouched_oppressed_cursed:0 "Enslave the Cursed"
 estate_planetouched_oppressed_cursed_desc:0 "Our Burghers are always looking for ways to expand their business, but are often limited by the costs associated with the further development of mercantile endeavours. By giving them the right to enslave, rather than outright eliminate, some of the planetouched, we can support their ventures. They now can put the planetouched to work constructing new buildings, setting up new irrigation systems or building new trade roads."
 estate_planetouched_oppressed_subjects:0 "Offering of Test Subjects"
 estate_planetouched_oppressed_subjects_desc:0 "Our Mages could always use new research opportunities to further their understanding, and planetouched individuals, by their very nature, could provide such a great opportunity due to their elemental powers. Using them as test subjects would have the additional benefit of sparing our common subjects from some of our mages’ more nefarious predilections."
 estate_planetouched_oppressed_slayers:0 "Sponsor Curse-slayers"
 estate_planetouched_oppressed_slayers_desc:0 "Time and time again in the many villages in Fangaula a child is born with a curse they will carry for the rest of their life. Some communities, under the misguided belief that this child will be a blessing, keep them and raise them as one of their own, but they will never truly be one of them. When their villages burn as a consequence of their foolishness, we will make sure there is a team of adventurers well equipped to deal with the planetouched monster responsible."
 estate_planetouched_oppressed_assets:0 "Seizure of Planetouched Assets"
 estate_planetouched_oppressed_assets_desc:0 "That an accursed could seek to hold a position of any import is a troubling thought, and that they could hold significant wealth or let alone lands of their own is an outright preposterous idea. Any wealth these accursed may ever luck upon shall therefore be redistributed to more loyal and trustworthy subjects."

 estate_planetouched_state_contract:0 "Labor Requisition"
 estate_planetouched_state_contract_desc:0 "Planetouched without direction are a recipe for disaster. By contracting them out to accomplish tasks for our estates, we can channel their powers towards productive ends, while appeasing the elites of our society at the same time."
 estate_planetouched_state_slaves:0 "Sail Slaves"
 estate_planetouched_state_slaves_desc:0 "The vessels and sailors we recruit from our merchant fleets already provide a great benefit to our navy. By delegating supervisors to direct Water and Air Planetouched aboard these ships, we can use their powers to vastly improve their speed and capability."
 estate_planetouched_state_registers:0 "Clerical Planetouched Registers"
 estate_planetouched_state_registers_desc:0 "To maintain effective supervision of our planetouched population, we would do well to keep updated records of their births. Traditionally, the religious leaders of Fangaulan communities have maintained such records for their own locales, but these records are unstandardized and incomplete. By delegating them the responsibility to collate and maintain standardized records, we can maintain a stricter control over the planetouched amongst our people."
 estate_planetouched_state_authority:0 "Builders of Authority"
 estate_planetouched_state_authority_desc:0 "By using the planetouched to help construct the physical symbols of our power, we can both put their abilities to productive use and accustom them to our authority. After all, their strength is our strength, and can - and should - rightfully be used for our greater glory."
 estate_planetouched_state_shapers:0 "Earthen Temple Shapers"
 estate_planetouched_state_shapers_desc:0 "The type of rammed earth temples which are so commonly found in Fangaulan villages and towns represent a constant construction and maintenance task our Earth Planetouched are naturally suited for, as they can easily erect a respectable edifice in only a short amount of time. They should therefore be made to renovate these temples all across our domain."
 estate_planetouched_state_servitude:0 "Divinely Ordained Servitude"
 estate_planetouched_state_servitude_desc:0 "For Fangaula to have a harmonious, well ordered society, it is essential that the planetouched be subjugated to the needs of the state for the benefit of the whole of society. Their rightful place within our culture is to devote their powers in service of the common good."
 estate_planetouched_state_decree:0 "Planetouched Binding Decree"
 estate_planetouched_state_decree_desc:0 "By issuing a decree authorizing our lords to conscript weak planetouched, who would otherwise be used by the state for lesser responsibilities, we can bolster our armies. Of course, their powers will be less impactful than those of the most adept of their kind, but all things considered they will provide a noticeable benefit to our fighting capability."
 estate_planetouched_state_couriers:0 "Official Planetouched Couriers"
 estate_planetouched_state_couriers_desc:0 "A state courier is a representative of governmental authority, whether they carry correspondence between kings, or a missive from a ruler to their subject. By assigning suitably skilled Air Planetouched to this role, we can boost our prestige among our subjects, reminding them of our control over even those most chaotic individuals."

 estate_planetouched_military_host:0 "New Military Host"
 estate_planetouched_military_host_desc:0 "A Death Planetouched general has offered his services, but he will not command any army that does not meet his recruiting standards."
 estate_planetouched_earth_works:0 "Raise Earth Works"
 estate_planetouched_earth_works_desc:0 "Earth Planetouched builders have offered to help us construct a new fort, shaping its walls from the land around it."
 estate_planetouched_naval_host:0 "New Naval Host"
 estate_planetouched_naval_host_desc:0 "A Water Planetouched admiral has offered his services, but he has expressed doubt in the capacity of our naval infrastructure."
 estate_planetouched_trading_company:0 "New Trading Company"
 estate_planetouched_trading_company_desc:0 "A trading company employing Air Planetouched has proven capable of manipulating the wind to speed up trade, but we will have to retrofit our ships to withstand such gale speeds."
 estate_planetouched_land_routes:0 "Improved Land Routes"
 estate_planetouched_land_routes_desc:0 "A trading company employing Earth Planetouched has been creating roads to improve caravan travel, and they have requested more trade posts."
 estate_planetouched_planetouched_hospitals:0 "Planetouched Hospitals"
 estate_planetouched_planetouched_hospitals_desc:0 "Volunteer Life Planetouched have set up a makeshift hospital in a province suffering from devastation, and they have requested our support to maintain their activities."
 estate_planetouched_water_works:0 "Planetouched Water Works"
 estate_planetouched_water_works_desc:0 "Water Planetouched have been manipulating rivers for the benefit of local water distribution systems, and they have asked us for our support of their endeavour."
 estate_planetouched_planetouched_artisans:0 "Planetouched Metalworks"
 estate_planetouched_planetouched_artisans_desc:0 "Fire Planetouched have found great success in using their talents to forge metal, and they have asked us to sponsor them to further their enterprise."
 estate_planetouched_military_advisor:0 "Poor Military Strategy"
 estate_planetouched_military_advisor_desc:0 "Planetouched in our army doubt our military advisor's ability to utilize their talents effectively. They demand [Root.Mil_Advisor.GetHerHis] replacement."
 estate_planetouched_administrative_advisor:0 "Administrative Bigotry"
 estate_planetouched_administrative_advisor_desc:0 "Our administrative advisor has been revealed to secretly hold anti-planetouched views. They demand [Root.Adm_Advisor.GetHerHis] replacement."
 estate_planetouched_diplomatic_advisor:0 "Out-of-Touch Diplomat"
 estate_planetouched_diplomatic_advisor_desc:0 "Our diplomatic advisor has shown a complete lack of understanding of planetouched customs. They demand [Root.Dip_Advisor.GetHerHis] replacement."
 estate_planetouched_saving_accursed:0 "Saving the Accursed"
 estate_planetouched_saving_accursed_desc:0 "Planetouched face severe oppression in one of our neighboring countries. We have been asked by planetouched representatives at court to help smuggle out refugees."

 estate_planetouched_wind:0 "Accursed Planetouched Settlement"
 estate_planetouched_wind_desc:0 "The [Root.GetBurghersName] have demanded we clear out an accursed settlement on our coast. The accursed planetouched however beg to be allowed to keep their homes."
 estate_planetouched_court:0 "Planetouched in the Court"
 estate_planetouched_court_desc:0 "The [Root.GetBurghersName] have proof that our diplomatic advisor is secretly an accursed planetouched. While [Root.Dip_Advisor.GetSheHe] pleads for our mercy, they want [Root.Dip_Advisor.GetHerHim] gone."
 estate_planetouched_accursed:0 "End Planetouched Migration"
 estate_planetouched_accursed_desc:0 "The [Root.GetBurghersName] wish us to guard our borders to keep our neighbors’ accursed out of our lands. The accursed beg to be granted refuge."
 estate_planetouched_fort:0 "Accursed Planetouched Fortifications"
 estate_planetouched_fort_desc:0 "Accursed have built fortifications in one of our provinces. The [Root.GetNobilityName] demand their activities be curtailed by a strong military presence, while the accursed seek autonomy."
 estate_planetouched_curse:0 "Planetouched Population Boom"
 estate_planetouched_curse_desc:0 "Accursed are being born at a higher rate than usual. The [Root.GetNoblesName] demand a culling to be performed, while local parents beg us to show mercy."
 estate_planetouched_father:0 "Planetouched Bastard Child"
 estate_planetouched_father_desc:0 "An affair between our military advisor and an accursed has resulted in an illegitimate child. [Root.Mil_Advisor.GetSheHe] wants mercy; the [Root.GetNobilityName] want [Root.Mil_Advisor.GetHerHim] gone."
 estate_planetouched_redemption:0 "Redemption for the Planetouched"
 estate_planetouched_redemption_desc:0 "The [Root.GetClergyName] wish to build a new temple to redeem the accursed inhabiting the realm by ‘instructing’ them in obedience. The accursed however resist this endeavour."
 estate_planetouched_mistake:0 "Harboring Planetouched Refugees"
 estate_planetouched_mistake_desc:0 "Our administrative advisor has been sheltering accursed subverting our strict policies. [Root.Adm_Advisor.GetSheHe] requests mercy; the [Root.GetClergyName] want [Root.Adm_Advisor.GetHerHim] gone."
 estate_planetouched_mana_elements:0 "Planetouched Elementalism"
 estate_planetouched_mana_elements_desc:0 "Some of our subjects trust accursed elementalism over magic. The [Root.GetMagesName] demand we rectify this, but we could turn a blind eye to their predilections."
 estate_planetouched_elemental:0 "Planetouched Fascination"
 estate_planetouched_elemental_desc:0 "Our administrative advisor shows great interest in accursed elementalism. The [Root.GetMagesName] take offense, but we could leave [Root.Adm_Advisor.GetHerHim] be."
 estate_planetouched_hunters:0 "Rogue Planetouched"
 estate_planetouched_hunters_desc:0 "Adventurers have asked for our help hunting a rogue accursed in one of our provinces. The accursed claims unjust persecution."
 estate_planetouched_war:0 "Planetouched Uprising"
 estate_planetouched_war_desc:0 "Hired adventurers have been forced back while suppressing accursed rebels and need help. Alternatively, the rebels might make a deal."


 estate_planetouched_contract_out_to_estates_title:0 "Planetouched: Contract out Planetouched to the estates."
 estate_planetouched_contract_out_to_estates_desc:0 "[Root.EstateDecisionDescription]"
