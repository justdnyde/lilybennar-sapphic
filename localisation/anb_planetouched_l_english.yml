 estate_planetouched_scattered_inheritance_tt:0 "§GIncreases§! the chance of getting §YPlanetouched§! heirs and rulers by §G25%§!."
 estate_planetouched_organization_scattered_trigger_tt:0 "Has enacted any other §YPlanetouched Organization§!."
 estate_planetouched_organization_oppressed_explainer_tt:0 "\n\nWhile the §YPlanetouched§! are §RScattered§!, they are effectively banned from owning property and will face heavy oppression. Without further support, they will quickly lose any §YEstate Land§! share beyond §Y5%§!."
 estate_planetouched_scattered_property_explainer_tt:0 "§YPlanetouched§! will no longer be forbidden from owning property, allowing the estate to own up to §Y10%§! crownland share. In 10 years we will have to either reaffirm their right, allowing them to hold up to §Y15%§! crownland share, or once more forbid them from owning property."
