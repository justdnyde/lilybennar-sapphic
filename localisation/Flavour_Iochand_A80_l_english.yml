 #Misc
 culture_is_iochandized_tt:0 "Culture is §YIochandized§!"
 iochand_gnomish_monarchy:0 "Gnomish Monarchy"
 iochand_gnomish_monarchy_desc:0 "Originating in the 400s, the Kongdoum of Iochand is the first and only gnomish monarchy in the entirety of Halann. True to its Lencenori heritage, it has traditionally used a feudal system based around the establishment of autonomous ducal Hezoggdoums to govern its land.\n\nClosely tied to the Iochander Kongdoum is the concept of 'Iochandization:' the process by which Iochand's strong cultural traditions are gradually imposed upon the people under their rule. Whether by theatre, literature, education or force, the nobility ensure that all of their subjects consider themselves to be Iochander first, and anything else second.\n\n§gAI automatically culture convert a province if these requirements are met:\n  Is core.\n  Religion in province is state religion.\n  Has no separatism.§!"
 mechanic_enable_iochandization_yes:0 "Country name is §YGnomified§!\nHas a §YCultural Union§! with §YIochandized§! cultures\nRemove all accepted cultures not considered §YIochandized§!"
 iochand_hezoggdoum:0 "Hezoggdoum"
 iochand_hezoggdoum_desc:0 "This is a duchy ruled by an appointed Hezogg, a noble title in the Gnomish Monarchy of Iochand.\n\n§gAI automatically culture convert a province if these requirements are met:\n  Is core.\n  Religion in province is state religion.\n  Has no separatism.§!"
 estate_actors:0 "Actors"
 estate_comedians:0 "Comedians"
 estate_the_gommo:0 "The Gommo"
 cb_second_small_war:0 "Second Small War"
 cb_second_small_war_desc:0 "Liberate our small brethren."
 take_capital_second_small_war:0 "Take Capital Second Small War"
 take_capital_second_small_war_desc:0 "War goal is to take the capital."
 SECOND_SMALL_WAR_NAME:0 "Second Small War"
 cb_war_of_masks:0 "The War of Masks"
 cb_war_of_masks_desc:0 "War over the paradise."
 superiority_war_of_masks:0 "War Over the Paradise"
 superiority_war_of_masks_desc:0 "War goal is to win battles."
 WAR_OF_MASKS_NAME:0 "The War of Masks"
 iochand_nimszexael_council:0 "Nimszexael Council"
 iochand_nimszexael_council_desc:0 "The Nimszexael Society has been given a full pardon and made a full part of Daccasded’s government, in order to foster better relations."
 artifice_invention_rapid_fermentation:0 "Rapid Fermentation"
 artifice_invention_rapid_fermentation_desc:0 "The Dark Heart of Old Ronroy is a necromantic artifact created by Alarawel the Shadow, an evil mage who sought to unleash a zombie horde upon Lencenor during the Second Lilac War. Research has allowed us to harness its decay-enhancing properties in order to speed up fermentation for alcohol production. Surprisingly, there are no negative consequences to this whatsoever."
 artifice_invention_plant_grown_animals:0 "Plant Grown Animals"
 artifice_invention_plant_grown_animals_desc:0 "Bringing a whole new meaning to the term “ground beef,” recent advancements in bioartificery have resulted in plants that can grow perfectly replicated animal products—wool, meat, leather—inside a hard outer shell resembling a coconut. "
 artifice_invention_ravenous_fertilizer:0 "Ravenous Fertilizer"
 artifice_invention_ravenous_fertilizer_desc:0 "Using techniques learned from studying the Ravenous Isle, artificers have managed to replicate the nutrients that cause the plants there to grow to titanic size. We’ve been assured that the carnivorous side effects are “under control.”"
 iochand_establish_hezoggdoum_title:0 "Establish Formable Hezoggdoum"
 iochand_establish_hezoggdoum_desc:0 "The Kongdoum of Iochand cannot be ruled alone. By granting a regional noble the title of Hezogg in exchange for an oath to promote Iochander culture throughout their domain, we can guarantee the land is governed effectively and the process of Iochandization proceeds as smoothly as possible."
 A80_vassal_color_title: "Recolor your vassals"
 A80_vassal_color_desc: "Changes the color of your vassals to your own"
 PEACE_po_iochand_concede_ruin_circle:0 "§DConcede Ruin Circle§!"
 po_iochand_concede_ruin_circle_desc:0 "[From.GetName] will be forced to concede any provinces owned by them or their subjects in the §YRuin Proper§! subcontinent and §YSoruin§! region to Daccasded.\n"

