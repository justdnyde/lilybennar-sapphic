 A80_plant_grown_animals_tt:0 "Every non-Tributary Subject gets '§YPlant Grown Animals§!' until the end of the game, giving the following effects:\nMorale of Armies: §G+5.0%§!\n\nEvery province owned by §Y[Root.GetName]§! or its non-Tributary Subjects that is producing §YWool§!, §YLivestock§!, or §YFish§! gets '§YPlant Grown Animals§!' until the end of the game, giving the following effects:\nLocal Goods Produced Modifier: §G+15.0%§!\n"
 A80_ravenous_fertilizer_tt:0 "Every non-Tributary Subject gets '§YRavenous Fertilizer§!' until the end of the game, giving the following effects:\nManpower Recovery Speed: §G+15.0%§!\nCulture Conversion Cost: §G-20.0%§!\n\nEvery province owned by §Y[Root.GetName]§! or its non-Tributary Subjects that is producing §YGrain§!, §YFungi§!, or §YTobacco§! gets '§YRavenous Fertilizer§!' until the end of the game, giving the following effects:\nLocal Goods Produced: §G+1.00§!\n"
 A80_rapid_fermentation_tt_revoke:0 "Every non-Tributary Subject loses '§YRapid Fermentation§!' giving the following effects:\nNational Unrest: §G-2.00§!\n\n§YRapid Fermentation§! will be removed from every province owned by §Y[Root.GetName]§! or its non-Tributary Subjects that is producing §YWine§! or §YGrain§!\n"
 A80_plant_grown_animals_tt_revoke:0 "Every non-Tributary Subject loses '§YPlant Grown Animals§!' giving the following effects:\nMorale of Armies: §G+5.0%§!\n\n§YPlant Grown Animals§! will be removed from every province owned by §Y[Root.GetName]§! or its non-Tributary Subjects that is producing §YWool§!, §YLivestock§!, or §YFish§!\n"
 A80_ravenous_fertilizer_tt_revoke:0 "Every non-Tributary Subject loses '§YRavenous Fertilizer§!' giving the following effects:\nManpower Recovery Speed: §G+15.0%§!\nCulture Conversion Cost: §G-20.0%§!\n\n§YRavenous Fertilizer§! will be removed from every province owned by §Y[Root.GetName]§! or its non-Tributary Subjects that is producing §YGrain§!, §YFungi§!, or §YTobacco§!\n"
 
