l_english:

 #Missions
 A80_1_4_title:0 "[Root.GetIochandPNSRMissionTitle]"
 A80_1_4_title_portnamm:0 "The Duchy of Ronroy"
 A80_1_4_title_southroy:0 "Restoring the North"
 A80_1_4_desc:0 "[Root.GetIochandPNSRMissionDesc]"
 A80_1_4_desc_portnamm:0 ""What can we tell you of Ronroy, that hasn't already been said?\nTwo of its cities are flour'shing, the third is in ruins and dead,\nIts overlord's ‘sposed to be Lorent, but not all its roses are red,\nWhat can really be said about Ronroy?"\n\n-Excerpt from the introductory musical number,\n‘Portnamm After Dark,' Act I Scene I"
 A80_1_4_desc_southroy:0 ""What can we tell you of Portnamm, that hasn't already been said?\nIts theatre's stuffed to the balc'ny, but all of its cash has been spent,\nThey bought out the circus ‘fore harvest, and now there's no dough for the bread,\nWhat can truly be said about Portnamm?"\n\n-Excerpt from the introductory musical number,\n‘Portnamm After Dark,' Act I Scene I"
 A80_1_5_title:0 "Exploit the Dark Heart"
 A80_1_5_desc:0 ""In a few days the Old Ronroy Expedition went into the patient ruins, that closed upon it as the sea closes over a diver. Long afterwards the news came that all the gnomes were dead. I know nothing as to the fate of the less valuable adventurers. They, no doubt, like the rest of us, found what they deserved."\n\n-Poppy Biddanbobb, Initial Report to the Gommo, 1512."
 A80_1_6_title:0 "Southroy Reforms"
 A80_1_6_desc:0 ""If you detest our city so, perhaps\nThe farmers in the south would let you stay.\nThe Darkest Heart implores their fields rot.\nA plague so bleak as yours would fit right in!"\n\n-A red-capped gnome taunts the visiting Wolter Coddurtz,\n‘Portnamm After Dark,' Act IV Scene I"
 A80_1_8_title:0 "The Rewanwood"
 A80_1_8_desc:0 ""The Rewanwood, this glade of reddened trees,\nWill be the spot my people rest their heads.\nThe fey within will be our treasured friends,\nAnd help us build a hearth for elvenkind."\n\n-‘The Princess of Lorentai,' Act I Scene III\nIoriel selects a boon from a grateful King Rewan of Lorent after lifting the siege at Lorentai."
 A80_1_10_title:0 "One Crown to Rule Them All"
 A80_1_10_desc:0 ""...when a gnome dons a metal crown."\n\n-Lencenori idiom. Comparable to the Damerian phrase "once in a green moon" or the Kheteratan phrase "when tchokens fly.""
 A80_1_12_title:0 "Lencenor Reunited"
 A80_1_12_desc:0 ""From splendid Viswall to the Bay of Wines,\nFrom Portnamm to the pearls upon the Dame,\nFrom glade to mountains like-adorned in red,\nLencenor will wear a single crown."\n\n-‘The Princess of Lorentai', Act III Scene I\nProclamation by Ioriel upon her husband Rubin II's ascension to the Lorentish throne in 1015."
 A80_1_13_title:0 "Pop! Goes the Eagle"
 A80_1_13_desc:0 ""There is no greater threat to gnomekind than the Alenics."\n\n-Plaise Holderroy, founder of the First Gnomish Hierarchy. Apocryphal; first attributed to Holderroy in the early 1200s."

 A80_2_1_title:0 "The Tragedy of Iochand"
 A80_2_1_desc:0 ""I see the blaze has broken our control.\nKnow in this fire Iochand will die,\nAnd with it, so shall I. Alas! ‘Tis cruel,\nMy fam'ly trapped and hopeless of escape\nWhen fate conspired reavers bring our due.\nThe ones who live will bow before a rose\nAnd beg for it to spare them from its thorns.\nO Fate! What have we done, us hapless gnomes,\nWho dream of naught but peace and laughter, yet\nA future under others' rule is all\nThat we receive. Our centuries of dreams\nHave come and gone, with not a thing to show."\n\n-Kong Fitzwick III's dying soliloquy, \n‘The Tragedy of Iochand,' Act V Scene IV"
 A80_2_2_title:0 "The Last Laugh"
 A80_2_2_desc:0 ""Four Reverians walk into a bar. The bartender walks out."\n\n-Popular joke in Portnamm. The original version from the 1260s contained an obscene sexual euphemism in Gnomish, one which was considered so inappropriate and in such bad taste that the Hierarch's office was forced to issue a blanket ban on any mention of it in 1355, resulting in the tongue-in-cheek adoption of its modern form. This is the only recorded case of artistic censorship in the entirety of Iochander history."
 A80_2_3_title:0 "Restoration Ball"
 A80_2_3_desc:0 ""Mages from the Damesear try to steal your mind's elation,\nAnd little girls from Lorent dream of theatre quotation,\nAnd if you want these kinds of dreams it's Iochandization.\n\nIt's the edge of the world and all of gnomish civilization,\nThe sun may rise in Haless, least it's settled on a final location,\nIt's pretty swell that Nimsnoms sells us Iochandization."\n\n-Musical number from the satirical and self-referential 1533 play,\n‘Portnamm After Dark,' Act II Scene IV"
 A80_2_4_title:0 "A Real Kingdom"
 A80_2_4_desc:0 ""How does the Kong of Iochand stop the roof of his castle from falling down?"\n\n"It's easy, his crown is a prop!"\n\n-Winner of the Portnamm University Worst Joke Contest of 1264, the final one to be held before the fall of Iochand the same year. The joke is often held to have been so bad that it caused the Iochander army to surrender in shame."
 A80_2_5_title:0 "Protector of the Small"
 A80_2_5_desc:0 ""O Kong of Kongs, our kingdom of the small\nKnows Iochand will prove our truest friend.\nUntil the day that both our kingdoms fall,\nThis pact of unity shall never end."\n\n-‘The Tragedy of Iochand,' Act II Scene IV\nThe scene depicts the signing of the Peace of Ronroy in 481, by which the Small Kingdom and Iochand ended hostilities to unite against Gawedi invasion."
 A80_2_6_title:0 "The Rainbow Palace"
 A80_2_6_desc:0 ""A Gawedi, a Damerian, and a Lorentish man walk into a bar in Viswall. They all dyed."\n\n-Winner of the Portnamm Academy Worst Joke Contest of 1421. It caused mild controversy, with some of the losers accusing the judges of making a political decision to show support to the ongoing Viswall Rebellion rather than choosing based on merit."
 A80_2_9_title:0 "Red Roses and Yellow Tulips"
 A80_2_9_desc:0 ""Even a rose may have its thorns clipped."\n\n-Pan-Cannorian idiom. In Lencenor, typically used in a cautionary manner, warning that one should not take strength for granted; elsewhere, carrying a contrasting meaning, implying that any threat can be disarmed."
 A80_2_10_title:0 "The Birds and the Bees"
 A80_2_10_desc:0 ""Last I checked, bees don't ‘peck.'"\n\n-Quinley Coddorran, 12th Hierarch of the First Gnomish Hierarchy."
 A80_2_13_title:0 "'Ere's to The Dame"
 A80_2_13_desc:0 ""To the Lady of knowledge and harvest,\nTo the flourishing farmland and plains,\nTo the waters we've never departed,\n‘Ere's to the Dame.\n\nTo the Lady of moonshine and magic,\nTo the tears that we steal off her face,\nTo the Empire in all of its madness,\n‘Ere's to the Dame."\n\n-‘The Eternal Regency,' Act IV Scene II"
 
 A80_3_2_title:0 "Our Mopey Brothers"
 A80_3_2_desc:0 ""If, furthermore, the topic of the Iochanders must continue to be debated in regards to the pending reconquest of the Dragon Coast and subsequent reestablishment of the Hierarchy, the clear argument would be in favor of complete and utter cultural reeducation. The Iochanders are loud (Tinkerspanner 1423), inefficient (Cobbododd et al. 1398), and above all profoundly unserious (Rodd 1412, Tinkerspanner 1425). There can be no doubt that allowing Iochand to act as a public representation of gnomish culture in the eyes of Cannor would be nothing other than a complete embarrassment in regards to the public standing of a restored Hierarchy."\n\n-Schnoddoboddob III, Weiston. "An Argument for a Unified Gnomish Culture," 1443."
 A80_3_3_title:0 "The Kobildmobb"
 A80_3_3_desc:0 ""I have always found it interesting that we decry koboldkind as monstrous solely because they steal the wealth of the innocent and hoard it for themselves. One might argue the Gommo does the exact same thing."\n\n-Toshley Thinkertinker, Nimscodder exile and radical equal rights activist. His tendency to give his speeches on stage at Nimsnoms Theatre in order to reach larger audiences led to him winning the Satirist of the Year Award for 1490, despite the earnestness of his beliefs."
 A80_3_4_title:0 "Free the Small"
 A80_3_4_desc:0 ""Don't Let Tall Oppress the Small!\nRose and Eagle Both Shall Fall!"\n\n-Widespread pro-independence chant during the Small Country revolts, originating from the Viswall Rebellion in 1421. After the halflings gained full independence in the 16th century, the chant would persist as a symbol of national pride, despite efforts by the Small Country's government to suppress it in order to avoid antagonizing their two larger neighbors even further."
 A80_3_5_title:0 "In Fair Newcobble"
 A80_3_5_desc:0 ""In fair Newcobble lies a farm\nWith apples and pears alike,\nThe farmers argue through the day\nBut drink throughout the night."\n\n-Traditional. The longstanding Cider Feud between Appleton and Pearview has long been an obnoxious thorn in the side of Small Country unification. Though its exact origin is unknown, the vicious rivalry between apple and pear farmers has left a strong influence on local halfling culture."
 A80_3_6_title:0 "Expand the Theatre Temple"
 A80_3_6_desc:0 ""Dear Sirs and Madames,\nI am writing to express my great displeasure at the recent trend throughout the past century of incorporating unneeded musical numbers into perfectly ordinary plays. Gnomish satire is a thoroughly serious art, one that stretches back over a millennium, and it does not deserve to be subjected to such baseless Anbennarian-influenced rubbish. Not only does it fill our esteemed theatre halls with boorish ditties that sound straight out of a Reverian tavern, but the noble iambic pentameter has become more and more ignored in favor of sloppily-written lines vomited directionlessly by second-rate actors. I have not lived nearly three hundred and fifty years to see my beloved art of theatre slain by ignorant, trend-chasing youngsters. I strongly urge the management of Nimsnoms Theatre to use much greater discretion when deciding which playwrights to give patronage, before a core value of gnomish culture is permanently destroyed.\n\nYours truly,\nA concerned theatregoer."\n\n-Anonymous letter deposited in the Nimsnoms Theatre public suggestion box in 1589. Satirists quickly incorporated it into their plays, starting a fad of musical numbers abruptly interrupted by a character who reads the letter verbatim. Theater attendance would skyrocket to record highs as a result of this trend's popularity."
 A80_3_7_title:0 "Cider and Perry"
 A80_3_7_desc:0 ""Cider and perry, mead and red wine,\nAll in the barrel to cook through the night,\nAdd in some berries and make it a pie,\nSell in the morning a penny a slice."\n\n-Popular children's ditty in Lencenor, its origins a peculiar Small Country practice from the end of the 10th century. After the Small Kingdom fell to Gawedi invasion and was further subjugated by Lorent during the War of the Sorcerer King, the region faced widespread food shortages and famine. When it reached a point that alcoholic drinks were more accessible than food, the locals began to boil off the majority of the alcohol from their stockpiled drinks and bake the remainder into "cider pies" to avoid starvation."
 A80_3_8_title:0 "Animal-Crop Farm"
 A80_3_8_desc:0 ""All plant-grown animals are tasty, but some plant-grown animals are more tasty than others."\n\n-Gorwick Oddanswell, Gommo-Approved Modified Organism Artificer and widely-credited Father of Animal Farming."
 A80_3_10_title:0 "Breadbasket of the West"
 A80_3_10_desc:0 ""Back in my day, it was us farmers of Southroy that all the gnomes relied on to grow their food for them. Then they started farmin' in the Dragon Coast again, and that Small Country broke free and started sendin' their crops over too. Hell, I heard even them savage Reverians grow their own fruits and veggies now, instead of just plunderin' em. And now you're tellin' me that they're shippin' food over from Aelantir instead of just buyin' local? What's wrong with the good ol' Reliable Ronroy? The world's gone mad, I tell ya. Mad!"\n\n-Filbert Haddlewick, Chairman of the Southroy United Farmers' Guild, Council Minutes 1649.06.12."
 A80_3_12_title:0 "[Root.GetIochandSSSMissionTitle]"
 A80_3_12_desc:0 "[Root.GetIochandSSSMissionDesc]"
 A80_3_12_title_ready:0 "Silly Squabbles Sundered"
 A80_3_12_desc_ready:0 ""The whole ‘colonial holdings' game is such a trouble to deal with. Not only do you have to worry about rebellions from the locals, when all you're doing is trying to help them become even the slightest bit civilized, but even one's own countrymen have the tendency to go rogue if you leave them out there on their own for long enough. Personally, I'd be more than happy if I never had to worry about a single thing outside Gommoport until the day I die."\n\n-Hewitt Kibbzinger, Acting Director of the Gommo Colonial Affairs Division 1617-1786. Died at the ripe old age of 284, two weeks after his retirement. "
 A80_3_12_title_wait:0 "A Bit of a Surprise"
 A80_3_12_desc_wait:0 ""It must be nice to be a historian. You already know the outcome of all the events you're studying; all you need to do is figure out the details. Being a ruler's different. There's no way of knowing what's coming until it hits you square in the face, but you have to push forward regardless."\n\n-Plaise Holderroy, Hierarch of Royvibobb and founder of the First Gnomish Hierarchy. No doubt the quote would have been less inspirational had she failed."
 A80_3_14_title:0 "The Comedy of Iochand"
 A80_3_14_desc:0 "In theatre there are two kinds of stories. The first is the tragedy, which has a sorrowful ending in which the protagonist fails by wont of their flaws and is ruined. We prefer the other kind, the comedy, where everything tends to more or less end up alright. Sure, there were some bumps along the way, but we've rewritten our grand play and our tragic demise transformed into triumphant revival. We've guaranteed a thousand years of prosperity – all that's left is to clap our hands and take a bow!"
 
 A80_4_1_title:0 "Refurbish the University"
 A80_4_1_desc:0 ""Knock knock!"\n"Who's there?"\n"Dictionary."\n"Dictionary who?"\n"Dictionary read it!"\n\n-Literal translation of the winner of the Portnamm University Worst Joke Contest of 1201. The Gnomish word for "dictionary" sounds almost identical to the words "moron, you haven't." A translation that more closely reflects the original meaning is as follows:\n\n"Knock knock!"\n"Who's there?"\n"Rita."\n"Rita who?"\n"Rita book, dumbass.""
 A80_4_2_title:0 "The Court of Masks"
 A80_4_2_desc:0 ""To you, glorious Iochanders, I grant all of Halann."\n"My Lord Castellos, it is truly an honor. But what of the other peoples of the world?"\n"Your kindness and benevolence rivals my own. I trust you will choose their fate well."\n"In that case, Lord Castellos, we shall share our land with them, so that all may have a place to call home."\n"Well said, and well chosen. It shall be so."\n\n-‘The Eternal Regency,' Act I Scene I"
 A80_4_3_title:0 "The Heart of Iochand"
 A80_4_3_desc:0 ""And through a veil freshly rent I see\nThe ivory of Portnamm's roads despair,\nAnd visions show me darkness deep within.\n‘The horror! Oh, the horror Nimsnoms holds!'" \n\n-Wolter Coddurtz's brief soliloquy before fleeing the city in fear and disappearing from the play,\n‘Portnamm After Dark,' Act IV Scene III"
 A80_4_4_title:0 "Getting to the Point"
 A80_4_4_desc:0 ""Do not let the dream of unity between gnomes and koboldkind die with me!"\n\n-Last words of activist Toshley Thinkertinker as he was stabbed to death on stage at Nimsnoms Theatre by a Nimscodder agent. Reviewers initially féted it as "the greatest play of the 16th century," praising the realism of the acting."
 A80_4_5_title:0 "Oddanroy Experiment"
 A80_4_5_desc:0 ""The future of gnomekind lies with the industrial sector."\n\n-Gommo Hierarch Melbin Grobbotten-Tinsley, 1539. "
 A80_4_7_title:0 "The Thinking Tinkerers Trio"
 A80_4_7_desc:0 ""Gommoport, Mestikardu, Zurzumexia.\nMetal parts bring your cargo ‘fore the morning's done."\n\n-Mnemonic originating in the mid 17th century, used for the three cities of the Triarchy. Each part also helps one recall the focus of its respective city; "metal parts" for Gommoport quality, "bring your cargo" for Mestikardu value, and "‘fore the morning's done" for Zurzumexia efficiency."
 A80_4_9_title:0 "Something Ravenous"
 A80_4_9_desc:0 ""Day 13: Damn plants managed to get my right arm as I slept. It's fortuitous that I happen to be ambidextrous, so my journalistic records may be continued unimpeded. They'll have to try harder than that if they wish to keep me from uncovering the secrets of this island. I set out again tomorrow morning.\n\nDay 15: Bastards got my left arm too. Luckily, I happen to be practiced in the art of writing with one's feet, so my records continue. My optimism remains unharmed; I've suffered far worse setbacks. Once more into the breach.\n\nDay 18: Both legs gone. Good thing I can hold a quill with my teeth. The gnomish spirit is unconquerable. Onwards!"\n\n-Journal fragments discovered on the Ravenous Isle by a rescue operation searching for the famed explorer Royton G. Bivsworth. No further traces were ever found."
 A80_4_10_title:0 "Lords of the Ooberbay"
 A80_4_10_desc:0 ""'Trollsbay' proves itself a fitting name, for trying to deal with the Concord is equivalent to having one's head bashed in by a troll."\n\n-Mindi Whistletossle, Director of Ruined Sea Affairs and official Gommo liaison to the Trollsbay Concord 1629-1671. No diplomatic fallout occurred due to the comment, which according to Whistletossle was because "Concord bureaucracy is so painfully slow that by the time they actually got around to worrying about it, nobody could remember who said it in the first place." No diplomatic fallout occurred due to this explanation."
 A80_4_11_title:0 "City on the Grodroy"
 A80_4_11_desc:0 ""Whatever you call the area—Inek, Ynnsmouth, Ynnnamm, Ynnsmoonnd—there is no doubt that the city where the Great River ends is a place unlike anywhere else in the world. It's our responsibility to stop the Trollsbayers from running it into the ground."\n\n-Mindi Whistletossle, Director of Ruined Sea Affairs and official Gommo liaison to the Trollsbay Concord 1629-1671. Diplomatic fallout due to this comment was surprisingly forthcoming in the form of a strongly worded letter, which went unanswered."
 A80_4_13_title:0 "A Gem Fit for a Gnome"
 A80_4_13_desc:0 ""Uneasy lies the head that wears a crown,\nAnd yet it still forever must be worn.\nFor only in the presence of a crown,\nWill those who look upon it know their place."\n\n-'The Princess of Lorentai,' Act III Scene IV\nExcerpt from Ioriel's soliloquy following the death of her husband."
 
 A80_5_2_title:0 "The Gommo Looks West"
 A80_5_2_desc:0 ""Just sail west."\n"And if our ship is dashed upon the seas?"\n"Just sail west."\n"And if the ocean goes on endlessly?"\n"Just sail west."\n"What if it is a brand new land we see?\nWhat would it be?\nCould it be filled with trees or giant bees, or choking fog, or chilling breeze,\nOr–" "Are you understanding me?\nJust sail west!"\n\n-"Westward Ho!," Seven Ditties of Aelantir"
 A80_5_3_title:0 "Beauty in the Ruin"
 A80_5_3_desc:0 ""O star upon the morning's shining light,\nVestigial and hopeful as it lie,\nHath guided us unto this virgin land\nWhose ruined beauty well befits the eye."\n\n-First words of Endral the Explorer upon sighting Endralliande,\n'The Call of Aelantir,' Act I Scene IV"
 A80_5_6_title:0 "The Kingdom of Paradise"
 A80_5_6_desc:0 ""Much as Anbennar means 'unity', Daccasded means 'paradise.' And much like Anbennar's unity, I suspect that Daccasded's paradise could never truly be achieved."\n\n-Marcie Gearspring, Hierarch of Portnamm in 1509, opposing the potential establishment of a large-scale Gnomish colony in Aelantir."
 A80_5_7_title:0 "The Forest of Bludd"
 A80_5_7_desc:0 ""Laws of the Bloodgroves: You must not disrespect the Bloodgroves by depicting them in a humorous light in any sort of show, play, musical or other stage production. So says the Weeping Mother."\n\n-Anonymous Kwineh Elder, Notes of the Satirist Roy Hobbletobb. His play, "Vermillion Dawn," was ultimately never published or performed in theaters; legend tells that this was because Hobbletobb himself turned into a Bloodfeeder."
 A80_5_9_title:0 "Rooinedcoddobcodd"
 A80_5_9_desc:0 ""Whichever fool came up with the Gnomish name for the Ruined Isles has done more damage to human-gnomish relations than any other person in history. What even is a 'cobbodcobb?'"\n\n-Riannón síl na Gráidemele, Imperial Ambassador-Delegate to the Dragon Coast. This remark resulted in her termination."
 A80_5_11_title:0 "Ronruin"
 A80_5_11_desc:0 ""Before the Day of Ashen Skies, perhaps\nthe jungle in the south was yet to be.\nPerhaps the songs of horror silent stayed.\nBut now, this cursed land holds naught but pain."\n\n-The Call of Aelantir, Act IV Scene II"
 A80_5_12_title:0 "The Power of Duet"
 A80_5_12_desc:0 ""PUBLIC NOTICE:\n\nThe management of the Nimsnoms Theatre have made the decision to PERMANENTLY BAN all persons involved in the production or planning of the most recent performance of "The Call of Aelantir" from ever setting foot on theatre grounds again. While creative expression and innovation are the foundational values on which Nimsnoms was built, that in no way justifies the decision to bring a LIVE SEEDTHRALL on stage in front of thousands of unsuspecting theatregoers. Even setting aside the ethical implications of using a degenerated ruinborn as an actor, this reckless stunt would have no doubt resulted in countless innocent deaths if we hadn't been lucky enough to have a group of seasoned adventurers with experience in the Effelai in attendance. By every god in the Regent Court, what were you idiots thinking?\n\nFurthermore, the theatre will be temporarily closed until it can be ensured that the main stage is completely clear of residual spores. We apologize for the inconvenience.""


 #Events
 iochand.0.t:0 "The Tragedy of Iochand"
 iochand.0.d:0 ""And while I see impending death approach,\nDespite the flames, I cannot help but laugh.\nFor future generations glimpsing back,\nWill in our perils read a comedy."\n\nThe curtain dropped on the actor playing Kong Fitzwick III síl Iochand, and a flood of applause erupted within Nimsnoms Theatre. In the VIP section overhead, Hierarch Pordolt turned to his friend Duke Torwick of Southroy. "So what did you think? The original ending was much more dreary, but I suggested they make the King's speech end on a more positive note. Good to keep a bit of hope, yeah?"\n\n"It's meant to be a tragedy, you know." Duke Torwick rose from his seat, lazily stretching his arms. "Overall, it was pretty good. I liked the decision to keep the Reverians completely offstage. It fits the theme of Iochand's fall ultimately being an internal affair, despite the invasion."\n\n"You portrayed my father in far too positive of a light." came the voice of Fitzwick IV, the late ruler's only surviving son, from behind the pair. "They called him 'the Fool' for a reason. If not for him, Iochand would still be united to this day, and I'd be sitting on my rightful throne instead of this...," he gestured to the theater chair behind him, which had clearly seen better days.\n\n"Oh lighten up, Fitzwick. If anything, the soliloquy works better because of it. It comes off as ironic." This was his cousin Orra, the only other living member of the síl Iochand dynasty. "You're right about the chairs, though. Surely Portnamm can't be this broke, Pordolt?"\n\n"We'll be fine, as long as this play's a success," sighed Pordolt. Torwick gave him a sympathetic glance. It was true that the two surviving rump states of Iochand had seen much better days. Still, Pordold had felt the fictional speech of a mad king ignite a tiny spark of hope within him. He'd worry about it later, though. For now, there were more plays to produce if Portnamm was to avoid destitution. Perhaps he'd try a comedy?"
 iochand.0.a:0 "Oh, the misery..."
 iochand.1.t:0 "The House of Iochand"
 iochand.1.d:0 "The terror of the Dragonwake brought chaos and disorder to the former lands of the Gnomish Hierarchy. As endless hordes of Kobolds flooded the Dragondowns, gripping the Hierarchy in total war, the governors of farther-flung territories were suddenly thrust into the spotlight of history, newly exposed to the foreign politics, and yet poised to benefit all the same. One such gnome, Fizwick Allspark, authored a new chapter in the history of folk both small and tall, seizing the opportunity by converting to the worship of the Cannorian gods. A royal coronation swiftly unfolded in Portnamm Theatre, with a priest of Castellos placing with utmost solemnity a prop crown on the newly minted King Fizwick I Allspark, thereby creating the great Kingdom of Iochand in 471.\n\nIochand fought many wars in the coming decades, but the kingdom would meet its ultimate foe over two hundred years after its founding. The dreaded Reavers appeared from the north for the first time along the Dragon Coast in the 8th century, in search of fortune and conquest, and in what is now Reaver's Landing, a great host arrived and conquered the lands to the north, establishing both the Kingdom of Reveria and a rivalry that would destroy Iochand. Centuries later, in 1264, Reverian armies overran the capital of Iochand itself, laying waste to town and country. Fizwick III, the final king of the realm, was burned alive, along with nearly the entirety of the House of Iochand when the Reverian soldiers lit the royal palace ablaze.\n\nAllspark's fire lives still in precious few souls, and none but two are suitable candidates to rule our kingdom into the future."
 iochand.1.a:0 "We need a skilled artificer to lead us forward."
 iochand.1.b:0 "Only by diplomacy and connections will our Kingdom survive."
 iochand.1.c:0 "We need a skilled artificer to lead us forward, with Mindi's aid."
 iochand.1.e:0 "Only by diplomacy and connections will our Kingdom survive, with Mindi's aid."
 iochand.1.f:0 "The síl Southroy family shall guide the Iochand we restored."
 iochand.2.t:0 "Iochanders Migrate from the Homeland"
 iochand.2.d:0 "As we settle colonies in the western lands of Aelantir, gnomes clearly cannot populate the land alone. Our other subjects, mostly Iochander humans, are eagre to find a new home in our new territories."
 iochand.2.a:0 "It only makes sense."
 iochand.3.t:0 "This should be hidden"
 iochand.3.d:0 "Please report if you see this, it belongs to Iochand (Cannor)\n\nDO NOT REPORT IF THIS EVENT APPEARS WHEN LOADING A SAVE"
 iochand.3.a:0 "humans"
 iochand.3.b:0 "halflings"
 iochand.3.c:0 "gnomes"
 iochand.3.e:0 "kobolds"
 iochand.4.t:0 "The Gnomish Kingdom"
 iochand.4.d:0 "If you were to ask an Iochander to define Iochand, you would no doubt get a wide variety of fabulous descriptors. A resplendent Kongdoum on the banks of the Portroy! A welcoming home for all who seek it! The dominant cultural hegemon of theatre not just in Cannor, but the entire world! Perhaps even the true heir to the legacy of Lorenan himself! Above all, however, anyone you ask would tell you that Iochand is the only gnomish kingdom in the whole of Halann. It is the most fundamental distinction of the realm.\n\nThis brings us to the crux of what is currently our most pressing issue. [Root.Monarch.GetTitle] [Root.Monarch.GetName] is, by even the most generous of descriptions, not a gnome.\n\nThe pure, undistilled silliness of the world's only gnomish monarchy not even being ruled by a gnome has begun to threaten the entire cultural foundation of the Kongdoum. Satirists throughout the land have reported a sudden and insurmountable lack of inspiration. Non-gnomes everywhere are already starting to redevelop their own distinct regional identities, despite years of assimilation. Worst of all, Nimsnoms Theatre's most recent showing of "The Tragedy of Iochand" has only sold two tickets. Two singular tickets! And they were bought by the director's parents!\n\nIt's clear we need to get a gnome back in charge before we face total cultural obliteration. Maybe we can conveniently "find" a long-lost member of the síl Iochand family, or just add a special bonus prize to the upcoming Best Actor of the Year contest. Either way, we need to choose fast, before we end up like those boring Nimscodders. By the gods, I can already feel the urge to write a well-researched academic essay..."
 iochand.4.a:0 "Congrats, you're a síl Iochand now!"
 iochand.4.b:0 "Great acting! Fancy an even more prestigious role?"
 
 iochand.5.t:0 "Iochandization"
 iochand.5.d:0 "PROCLAMATION TO THE SUBJECTS OF IOCHAND\n\nThe restoration of the Kongdoum of Iochand should herald a time of great celebration, but it should also be a time to reflect upon what it truly means to be an Iochander. It is the pursuit of cultural innovation that has made Iochand truly unique in the world. However, such innovation can be stalled by unnecessary commitment to archaic regional identities. How can one be expected to uphold a cultural union if, for example, one believes a Reverian to be fundamentally different from a Lencori? Aside from the general unrest and the penalties to taxation, recruitment, and conversion that will inevitably arise, this will also undermine the true definition of what it means to be an Iochander. THEREFORE:\n\nIn the interest of promoting unity, a new CULTURE GROUP shall hereby be established to contain all Iochander cultures. All cultures within this group shall be considered ACCEPTED, and others shall be considered NON-ACCEPTED. Persons not assimilated into an accepted culture, along with their children shall be provided with a full education into Creek Gnome cultural achievements, including courses in Gnomish (and Common, if necessary). In addition, they shall receive THREE (3) complimentary tickets to performances of any classical play at the theatre-temple of their choice. Further tickets must be paid for in full. Please note that attendance of these plays will be considered a MANDATORY furthering of one's cultural education; any who refuse to attend will be made to do so by force. Heckling of these plays is hereby PROHIBITED until one has been fully Iochandized.\n\nThe following ACCEPTED CULTURES shall compose the IOCHANDER CULTURE GROUP:\nCreek Gnome\nIochander\nCreekfoot Halfling\nDragonmask Kobold\nMoon Elf\nRuby Dwarf\n\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] personally wishes you the best of luck in your pursuit of Iochandization. Remember that Iochand and its people welcome all with open arms; no matter your heritage, we are all merely actors in this great play of a Kongdoum. We wish for nothing more than to help you discover the role that's right for you."
 iochand.5.a:0 "Find your place, and raise the curtain!"
 iochand.6.t:0 "Gods I Hate Portnamm"
 iochand.6.d:0 "INTERNAL REQUEST FOR REASSIGNMENT\n\nThough it has only been a single day since I was reassigned to the Gommo's Portnamm branch, I can confidently say that it is not the right fit. Immediately upon disembarking from our ship, myself and the other arrivals were beset by a group of red-capped individuals who pressed tickets to the local theatre into our hands, citing the need for "mandatory Iochandization." While searching for a trash bin, I happened to glance at them and realize they were crudely-made fakes, labeled with multiple obscenities. By this point I had already realized what must pass for humor in this thought-forsaken city, so I quickly made my way to the Gommo branch while taking care to avoid any further interactions.\n\nWhile I would have preferred not to leave the sanctum of the office for the remainder of my time here, my supervisor demanded I attend a play with her in the interest of cultural integration. Faced with the threat of unemployment, I gave in. During our walk to the theatre, we were again assailed by a group of red-capped individuals, who physically assaulted us with a baked pastry dish to the face. I attempted to report this unprovoked attack to the authorities, but they and my supervisor both brushed it off as "harmless fun." I have included an invoice for the cost of a new uniform, as well as emotional damages.\n\nThe show itself was about as dry and uninspiring as one would expect from a society of this caliber. During the intermission, I made the mistake of leaving my seat unattended for a brief few minutes. Upon returning, I noticed yet another red-capped individual standing nearby. It seemed that he had rigged the chair using primitive artificery so that, upon sitting down, it produced a loud and immature sound resembling that of flatulence. Unsurprisingly, this brought great amusement to those around me. I didn't bother to stay for the play's second half.\n\nI would recommend that whoever made the decision to send me here be given a thorough mental evaluation. Even the Trollsbay would be preferable to this. Frankly, I question whether our Portnamm branch is even worth maintaining. Get me out of here as soon as you can.\n\n...Please.\n\nSincerely,\nMindi Whistletossle"
 iochand.6.a:0 "On an unrelated note, tourism has hit record highs!"
 iochand.7.t:0 "Reliable Ronroy"
 iochand.7.d:0 ""Did you 'ear that we're free now?"\n\n"Free? Wot 'appened?"\n\n"Them lads in Portnamm went an' stuck it ta the Lorentish. 'Eard they gave 'em a right whoopin'. Now Southroy ain't a subject of Lorent anymore."\n\n"Wondered what all them soldiers kept marchin' around for. Them gnomes set us free, then? We got 'self-determination' or wotever it's called? No more taxes?"\n\n"Well, I 'eard we still gotta pay taxes."\n\n"Ah well, got my hopes up. 'Least we ain't a vassal anymore. No more foreign overlords, ay?"\n\n"Well, I 'eard the Portnammers made us their subject instead. Callin' us 'Ronroy' now."\n\n"Oh. Well, they're a republic, right? Got an 'ierarch and everything? 'Least we're free from the archaic institution of monarchical feudalism and its structural exploitation of us 'onest folks in the lower socioeconomic classes."\n\n"Well, I 'eard they've got a king now. Restored that ol' 'Iochand' thing that fell hundreds of years back. They did give us these things, though."\n\n"Wuzzat? Paper? 'Fraid I can't read."\n\n"Said they're 'tickets.' We've gotta go to some 'play' thing up in the city. Said they'll drag us there if we ain't go."\n\n"Can we go back ta farmin' after?"\n\n"Think so."\n\n"Good 'enuff for me.""
 iochand.7.a:0 "Can't go wrongroy with Ronroy!"
 iochand.8.t:0 "Agitate the Small Country"
 iochand.8.d:0 ""Thanks for coming on such short notice, Mayor Pinefoot. It's important we have everything finalized. The big event's only six months away, after all."\n\nGalin Pinefoot, Mayor of Barrowshire, raised an eyebrow at the gnome in front of him but left it at that. "It's no trouble at all, friend! You have the full support of not just the Bluefoots, but us Redfoots as well. Rose and Eagle both shall fall!"\n\n"They won't unless we get these small logistical details sorted." The agent assigned to the eastern Small Country, Alda Tonkbox, adjusted her red cap. "I'm afraid Iochand's come up a bit short in terms of weapons for the supply caches. Slipping too much past the Lorentish was always going to be a tall order."\n\n"Oh, that's no issue! We'll have the element of surprise during the initial revolt. As long as you focus on securing the Applefields, there'll be a direct supply line from Turnwell. Rest assured we'll keep the way to Viswall open."\n\n"Keeping the way open will be no small feat. We'll have to prepare for a Lorentish counterattack in short order." Alda paused for a moment, glancing at the war plans on the walls of the safehouse. "It's a big ask, but does Barrowshire have the resources to withstand a large-scale siege?"\n\nAgain Galin raised an eyebrow, a look of visible annoyance on his face. "...We can set up some barricades if need be, but I'm afraid our city doesn't have much in the way of permanent fortifications. We wouldn't be able to hold out against a direct siege for longer than a few weeks. That being said, Lorent won't be able to maintain an occupation with Aelcandar so close by."\n\n"Hmm. Well, there's just a few more small things—"\n\n"Okay, quit it with the size puns or the rebellion's off." "
 iochand.8.a:0 "Don't we have bigger things to worry about?"
 iochand.8.b:0 "Wait, didn't we do this already?"
 iochand.9.t:0 "Barrowshire Buddies"
 iochand.9.d:0 ""Congratulations on your promotion, Hezogg Pinefoot!" said Alda Tonkbox, offering the halfling before her a warm smile.\n\n"Oh, it's nothing. I'm just glad that the Small Country is finally free - Small Kingdom, I should say," replied Galin Pinefoot happily. He glanced around his office in Barrowshire's city hall, a much more pleasant place for discussion than the modest safehouse he had spent so much time in. "I trust our work isn't over yet?"\n\n"It's never over, so long as the Lorentish and Gawedi exist." Alda rolled out a map of the newly-liberated territory on Galin's desk. "Let's discuss logistics. Moving the capital back to Barrowshire will take a while, considering Viswall currently holds most of the Small Kingdom's administrative infrastructure. We'll have to split governing duties between the two cities for a while as we slowly transition everything over here."\n\n"...So, will we have to expand the city's government buildings? I worry that our current ones might be a bit...." Galin looked expectantly at Alda, gesturing for her to finish the setup.\n\n"No, they should be fine in their current state. We could even try to restore a few of the old pre-Dragonwake ones if needed, ancient as they are," she replied, showing no reaction. "We should also consider the strategic necessities that come with the establishment of a capital. We need to build a more permanent defense perimeter."\n\n"Is everything alright, Agent Tonkbox?" Galin looked concerned.\n\n"Hm?"\n\n"You haven't made a single size-related joke since the war ended."\n\n"I haven't?" Alda briefly paused, contemplating his words. "I suppose I just didn't really think about it. Would you prefer if I did?"\n\n"No, don't worry about it. It's not really a big deal—" Galin froze, suddenly realizing what he'd just said. "Oh, gods damn it.""
 iochand.9.a:0 "Victory was no small feat!"
 iochand.10.t:0 "Dragon Coast Farmers"
 iochand.10.d:0 ""Did you 'ear they're making us move?"\n\n"Move? Wot 'appened?"\n\n"Them lads in Portnamm went an' conquered the Dragon Coast. Now they want us ta farm tha Sildnamm Vall'y fer them. So they're shippin' us up north."\n\n"'Old on a moment. You said them gnomes conquered it, ay? Who'd them gnomes conquer it from?"\n\n"Them kobilds, I think."\n\n"So why not get them kobilds to farm it for them? Why send us 'onest Southroy folk up?"\n\n"I dunno. Maybe they ain't like kobilds very much."\n\n"Don't like them kobilds? Why not?"\n\n"I dunno. Maybe them ancient grievances each side 'flicted on the other left both of 'em trapped in an unendin' cycle of endless retaliatory violence and distrust, from which both gnomes and kobilds are unable ta reasonably break free."\n\n"Fair 'nuff. So when're we leavin'?"\n\n"I dunno. Just 'eard a rumor. Not sure it's actually true, ta be 'onest."\n\n"If you ain't sure, why'd you tell me?"\n\n"Cause I deeply value tha conversations we 'ave, and I appreciate you as a friend."\n\n"Feelin's mutual, pal.""
 iochand.10.a:0 "I love endless cycles, get 'em outta there!"
 iochand.10.b:0 "Aw, who can bring themselves to hate those goofy little lizard guys?"
 iochand.11.t:0 "Party on the Widderoy"
 iochand.11.d:0 "It has been a long time since the City of Colors has seen such genuine mirth and revelry. The night sky is alight with a prismatic glow, magical lights brightening the sleeping world in a display of defiance to the sun itself. The Rainbow Bridge is at long last repaired, the great divide between north and south little more than a fleeting memory to those who celebrate atop it.\n\nAt the center of the bridge stands the restored Rainbow Hall, reconstructed into a theatre-palace far more spectacular than its original architects could have ever hoped to dream. Inside, thunderous applause fills the main stage as the second act of the Tragedy of Iochand concludes, the gnomish and halfling kingdoms setting aside their differences to unite against the Gawedi. Artificers, alchemists and artisans alike sell trinkets and wares in its auditorium, promising tokens to preserve the memory of this day until long after the brightest dyes have faded.\n\nOutside, along the bridge, music fills the air as the revelers dance throughout the night. Nobility and commoners from all corners of the realm intermix, petty divides set aside for a single day. A visiting mage from the colonies shoots a shower of prismatic sparks into the air, causing a wave of elated cheers from the partygoers. Joyful farmers freely hand out the finest of their cider stocks, not worrying about the cost; this has always been the moment they were brewed for. The brick foundations rattle under the pounding of feet, but the bridge has been built far too sturdy to ever fall again.\n\nOn both sides of the river the houses of Viswall lay empty, their residents filling the streets and alleys in hope-filled merriment. Each block has a party of its own, welcoming both neighbor and traveler alike. The locals swap food and stories with visitors from around the realm, and strangers embrace as if they were lifelong friends. Halfling or gnome, kobold or human, elf or whatever else, it made no difference; all are family on this day of celebration.\n\nFor so long, the City of Colors had suffered under the smothering boot of the Lorentish and Gawedi. For so long, it had dreamed of being free. Now, it finally is."
 iochand.11.a:0 "It's a party in the Small Kingdom!"
 iochand.12.t:0 "A Palace Blessed"
 iochand.12.d:0 "Applause filled the palace grounds of the newly-inaugurated Bloopalaasd as the first official performance of 'The Call of Aelantir' drew to a close. As the actors took a bow and retreated from the open-air stage, the band started up a performance of well-known Lorentish ballroom songs. Adran Eldergreen, newly appointed Head Councillor of the Kongdoum of Daccasded, turned to the Gommo representative standing beside him in the executive section. "What a party! Care for a dance, Mindi?"\n\n"I'd rather die," said Mindi Whistletossle.\n\n"Ha! Suit yourself." Adran lifted his hand and shot a magical shower of sparks into the night sky, prompting a round of cheers from the gathered audience. He started to do a somewhat embarrassing dance along with the music as Mindi rolled her eyes and turned to look back at the stage. "Not a party gal, I take it?"\n\n"I'm here because I'm being paid," said Mindi, with an air of aloofness. "If I wanted to make a fool of myself, I'd quit the Gommo and join this... theatre troupe of a country."\n\n"Have you considered it?" Adran did a spin, shooting another shower of sparks into the air to yet more cheers from the crowd. "An administrator as excellent as yourself could do great things here!"\n\nMindi scoffed. "Sure, maybe when the sky falls on our heads."\n\nSuddenly, gasps of surprise arose from the crowd, the band abruptly pausing the music. The crowd looked at once to a shining flash of blue racing through the night sky, growing larger and larger. Damestear! The meteor slammed into the ground what felt like under a mile away a shockwave rippling through the palace. A few windows shattered, and many in the gathered crowd stumbled on their feet. The partygoers stood in stunned silence for a moment, watching a cloud of dust rise into the air. Then the band resumed, the celebration roaring back to life even stronger than before.\n\nMindi slowly turned her head to look at Adran, who shot her a wink and a huge grin. "Well?"\n\n"No.""
 iochand.12.a:0 "The party will never end!"
 iochand.13.t:0 "Our Friends, The Gommo"
 iochand.13.d:0 "As one of the only gnomish realms remaining after the destruction of the Hierarchy during the Dragonwake, Iochand maintained strong relations with the Gommo long before they even left the Dragon Coast. Since then they've grown quite a bit, and so have we! Let's make sure we remain friends in this exciting new Act."
 iochand.13.a:0 "Look, they made their own country!"
 iochand.13.b:0 "Besides, looks like they need a helping hand."
 iochand.13.c:0 "After all, they are sort of stuck with us."
 iochand.14.t:0 "A Change in Management"
 iochand.14.d:0 "Our friends in Iochand have requested that we become a Twin Empire subject of theirs. Should we do it?"
 iochand.14.a:0 "Yes."
 iochand.14.b:0 "No."
 iochand.15.t:0 "The Tragedy of Iochand, Act I Scene II"
 iochand.15.d:0 ""O Kong of Kongs, I hereby say to thee\nYour head shall wear the crown of Iochand.\nUntil the day you die, your rule will bring\nProsperity for all who seek your grace."\n\nNimsnoms Theatre was packed to the brim. It wasn't every day that the [Root.Monarch.GetTitle] of Iochand [Root.Monarch.GetHerselfHimself] decided to personally portray Kong Fitzwick I in the Tragedy's coronation scene, and half the city had turned out to see it. The audience broke out into elated cheers as an assistant presented the actor playing the Priest of Wip with a prop crown—the same one that Fitzwick síl Iochand had once worn upon this very stage, the royal crown of Iochand itself.\n\nThe Priest of Wip bowed down, presenting [Root.Monarch.GetName] with the Prop Crown of Iochand. [Root.Monarch.GetSheHeCap] took the crown in [Root.Monarch.GetHerHis] hands, turning it back and forth to inspect it... then threw it to the side. A gasp of surprise erupted from the audience as [Root.Monarch.GetSheHe] opened [Root.Monarch.GetHerHis] mouth.\n\n"The Hegemon of Lencenor does not\ndeserve a wooden crown upon [Root.Monarch.GetHerHis] head."\n\nThe audience sat in stunned silence. Everyone here knew the Tragedy of Iochand by heart; it was the most famous play in Iochander history. This wasn't a part of the script. What on Halann was the [Root.Monarch.GetTitle] doing?\n\nThe Priest of Wip gave no reaction save a smile and a bow. She turned to the assistant, who presented her with a new crown from offstage. This one, however, was no prop—it was made of pure rosemetal, encrusted with hundreds of resplendent red gems. At its front lay the famous Great Rose, surrounded by five lesser gemstones. There was no mistaking the Ruby Crown of Lorenan for anything else. Not a sound could be heard in Nimsnoms Theatre as the Priest presented the crown to [Root.Monarch.GetName].\n\n"If so, perhaps the Ruby Crown itself\nBefits the rightful heir to Lorenan?"\n\n[Root.Monarch.GetName] gently took the Ruby Crown and placed it upon [Root.Monarch.GetHerHis] head. A perfect fit. The audience, finally realizing the true weight of what had just happened, erupted in cheers and applause so loud that the very foundations of Nimsnoms seemed to shake. It is said the celebrations continued for months afterwards."
 iochand.15.a:0 "Hail the true heir to Lorenan! Hail Rossoranochand!"
 iochand.16.t:0 "A Second High Kingdom"
 iochand.16.d:0 "The ancient high kingdom of Lorent has been reforged. Though it's come from a rather unusual candidate, none can doubt that the Gnomes of Iochand have reached the heights of the days of yore. Now the only question is: will we swear allegiance to the high kingdom as we once did?"
 iochand.16.a:0 "Yes."
 iochand.16.b:0 "No."
 iochand.17.t:0 "Lorenan's Crown"
 iochand.17.d:0 "The door to Lorenan's crypt swung open for the first time in over a millennium. Ancient dust stirred in the air as two figures stepped in: the Ruby Dwarf gravekeeper, and [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.GetHerselfHimself].\n\n"If you don't mind me saying, Your Imperial Majesty, that new crown looks great on you." The dwarf's voice was gruff as the pair approached the two central sarcophagi.\n\n"I have your people to thank for it. This craftsmanship is truly masterful," replied [Root.Monarch.GetName]. [Root.Monarch.GetSheHeCap] adjusted the Reencoorb Crown on [Root.Monarch.GetHerHis] head. Though it had a similar rosemetal base to its predecessor, the colors of its gemstones shone in a brilliant, prismatic rainbow. At its center was a large gem of pure Damestear, chiseled in Bloopalaasd itself. "Now let's return the old one to its rightful owner, shall we?"\n\nThe dwarf gave a curt nod, heaving open the heavy lid of Lorenan's final resting place. Though his body had once been protected from the elements by preservation magic, the unrelenting march of the aeons had triumphed in the end, wearing it down to nothing but dusty bones. [Root.Monarch.GetName] gently placed the Ruby Crown beside the ancient skull, and the two visitors silently bowed their heads in a moment of reverence. After the moment had passed, the dwarf turned to [Root.Monarch.GetName]. "You may leave now. I must perform one final rite alone, to apologize for our disturbance." [Root.Monarch.GetName] nodded, and took [Root.Monarch.GetHerHis] leave. The dwarf waited until he was entirely sure there was nobody to overhear, then turned to look directly at the Ruby Crown.\n\n"I know you're in there, Ioriel."\n\nThe crown said nothing, nor did it move. It was a crown, after all.\n\n"I prefer not to intervene in these matters, if possible. Frankly, you could do whatever you liked with the Lorentish and I wouldn't care." He bent down, leaning directly over the sarcophagus. "But these gnomes are the most interesting creatures I've ever observed. I will not let your lust for power ruin the unity they've created."\n\nStanding back up, he lifted the sarcophagus lid and began to slide it over Lorenan's body. Before it closed for the final time, never to be opened again, he spoke once more.\n\n"You are old and wise, Ioriel. But I am far older. I will always be a step ahead.""
 iochand.17.a:0 "Say, do Ruby Dwarves' eyes normally look that blue?"
 iochand.18.t:0 "Fate of the Forehead"
 iochand.18.d:0 "The Kingdom of Iochand has enforced their ancient right to rule over the lands of the Dame's Forehead. Should we submit to their rule?"
 iochand.18.a:0 "Yes."
 iochand.18.b:0 "No."
 iochand.19.t:0 "Subjected to Paradise"
 iochand.19.d:0 "The Kingdom of Iochand has demanded we swear loyalty to the crown of Daccasded. We'll retain a measure of autonomy if we accept, but we'll be forced to Iochandize our culture."
 iochand.19.a:0 "Nothing to Lose."
 iochand.19.b:0 "Bend the Knee."
 iochand.19.c:0 "The Concord Shall Be Free."
 iochand.20.t:0 "Pop! Goes the Eagle"
 iochand.20.d:0 "In a forest far to the north,\nThere lived a mighty Eagle,\nHe thought that he could rule all he saw,\nPop! Goes the Eagle!\n\nA bunch of people turned into wolves,\nHe thought the wolves were evil,\nBut he forgot to look at himself,\nPop! Goes the Eagle!\n\nHe coveted the land to the south,\nIts roses, wine and treacle,cappado\nA shame it also coveted him,\nPop! Goes the Eagle!\n\nHe tried to take the City of Dyes,\nHe tried to crush its people,\nBut only he was crushed in the end,\nPop! Goes the Eagle!\n\nAll around the big Dragonmount,\nIochand chased the Eagle,\nAnd after all the battles were won..."
 iochand.20.a:0 "...Pop! Goes the Eagle!"
 iochand.21.t:0 "The Comedy of Iochand"
 iochand.22.t:0 "C Minus"
 iochand.22.d:0 ""Now I want to start by saying that, surprising as it is, this isn't the worst alternate history proposal I've received. I asked you to take control of a disadvantaged country from the moment Corin died and present a plausible series of choices that would lead them to become successful, demonstrating your understanding of basic political theory in the process. You have, I'm afraid, in essence failed to do so.\n\nTo begin - it's not absurd that Iochand could have defeated Reveria, the difference of power between them is not too extreme, but then the Reverians all turn into Iochanders? Where, I ask, did the Reverian culture go? You also seem to assume Gawed and Lorent are doing nothing while Iochand begins its meteoric and frankly absurd rise to power. The Hierarchy functions as a counterbalance between Lorent and Gawed; combining Lorent AND the Hierarchy completely destroys Cannor's balance of power. Anbennar and Gawed are not going to let that happen, and they're certainly not going to let them conquer all of the Small Country – and the halflings not only don't resist them but help them because??? I think we'd sooner see the Aelnar Scheme succeed than watch rational actors let that happen.\n\nSo then they extend their cultural indoctrination apparatus, which apparently is even more efficient than the Command's, to all their conquered lands, effortlessly erasing their differences? It's almost as absurd as the Kobildzani nationalist's paper I once read where kobolds conquered the world and turned everyone into dragons.... anyway, your paper. So in your counterfactual, Iochand just conquers the Trollsbay Concord because of course, and to even further wreck the balance of power they shatter Gawed into pieces. How the whole of Cannor hasn't banded together to destroy them yet, I do not know. I honestly can't fathom why every paper I get just assumes that everything always goes well for their chosen country and they never suffer serious setbacks or consequences..."\nC-    - Professor Bellog Skodadadoo"
 iochand.22.a:0 "I'm gnot a gnelf!"
 iochand.22.b:0 "I'm gnot a gnoblin!"
 iochand.22.c:0 "I'm a Gnome!"
 iochand.22.e:0 "...and you've been Gnomed!"

 iochand.31.t:0 "Loyalty to the Crown"
 iochand.31.d:0 "For [Root.Monarch.GetTitle] [Root.Monarch.GetName]'s Eyes Only\n\nIt has come to the attention of the Daccasded Administrative Council that the current governance of the Aelantiri Hezoggdoums has reached a point of great inefficiency. As we're sure Your Majesty is aware, at present all Hezoggdoums are de facto subjects of the Kingdom of Iochand, regardless of location. This leads to the awkward situation where Aelantiri Hezoggdoums legally must resolve any administrative issues with the Iochander government, despite the vast distance. Therefore, the Council presents the following proposal:\n\nAll Hezoggdoums located within the lands of Aelantir shall be made de jure subjects of the Kingdom of Daccasded, and indirect subjects of the Kingdom of Iochand via its implicit suzerainty over the latter.\n\nThis simple administrative change would allow the Aelantiri Hezoggdoums to be managed directly from Bloopalaasd, without need to go back and forth all the way to Cannor. Naturally, Iochand would still possess de facto authority over all subjects on both continents, in accordance with Statute 35.12a and Council Order 214. Such a change would serve the dual purpose of greatly decreasing the administrative burden faced by both the crown and its subjects, as well as greatly increasing the effective speed of administration decisions for the benefit of all in the realm. While Your Majesty is of course under no obligation to modify the preexisting structure of [Root.Monarch.GetHerHis] domain, the Council strongly encourages [Root.Monarch.GetHerHim] to take this proposal under consideration for the sake of [Root.Monarch.GetHerHis] subjects' well-being and prosperity.\n\nAUTHORIZED BY\nHead Councillor Adran Eldergreen\nCouncillor Tando Bigbrain\nCouncillor Eru Trapwax"
 iochand.31.a:0 "That's a lot of words for something completely unnecessary."
 iochand.31.b:0 "Sure, whatever. Administration is boring anyway."
 iochand.32.t:0 "The Bloopalaasd Gommo"
 iochand.32.d:0 "COURTESY NOTE\n\nGood day to you, [Root.Monarch.GetTitle] [Root.Monarch.GetName],\n\nThe Gommo is obligated to inform you that we have recently opened a new branch in Bloopalaasd, with the interests of further expanding our organization's presence within North Aelantir. The Office of Ruined Sea Affairs has determined after a detailed survey that the lack of a Daccasded office has cost the Gommo untold thousands of crowns, so the decision has been made to rectify such an unprecedented financial disaster immediately. As a gesture of goodwill, we have reluctantly chosen not to bill Iochand for these severe losses. You're welcome.\n\nWhile we are fully aware that no official consent was obtained for this branch's establishment from the Iochander government itself, the Gommo would like to formally remind you that it is a fully sovereign organization that resists the habit of kissing the feet of every self-righteous monarch in Cannor with an inferiority complex. Rest assured that we have the full approval of both the Triarchy Administration and the Daccasded Administrative Council, and our charter was signed directly by Councillors Bigbrain and Middanman. If you have an issue, consider taking it up with any or all of them instead of wasting the Gommo's valuable time.\n\nPlease redirect any complaints into the wastebin in my office at the Gommo's Isobelin branch.\n\nUnpleasantly yours,\nMindi Whistletossle\nDirector of Ruined Sea Affairs, The Gommo "
 iochand.32.a:0 "Putting up a fight would be more trouble than it's worth."
 iochand.32.b:0 "Maybe we should redirect you into the wastebin instead?"
 iochand.33.t:0 "Kingdoms of Aelantir"
 iochand.33.d:0 "For [Root.Monarch.GetTitle] [Root.Monarch.GetName]'s Eyes Only\n\nIt has come to the attention of the Daccasded Administrative Council that the governance of the Aelantiri Hezoggdoums remains cripplingly inefficient. As we're sure Your Imperial Majesty is aware, many of the Hezoggdoums have reached a size at which the title of Hezogg restricts their appointment of local governance, resulting in their administration becoming overburdened and overextended. Furthermore, the ascension of Iochand to the status of Raighsz has caused a contradiction in the text of Statute 35, specifically the definition of the rank of Daccasded as a "title equal in status, yet subordinate to Iochand" as seen in Section 8b. In order to reconcile both these issues, the Council presents the following proposal:\n\nAscend Daccasded to the rank of Raighsz, changing Your Imperial Majesty's title to " [Root.Monarch.GetTitle] of Iochand and Daccasded," and grant all Aelantiri Hezoggs in possession of titles of worthy sizes the rank of Kong.\n\nSuch a change would solve all legal inconsistencies in accordance with Council Order 119, as well as greatly improve the governing capabilities of all affected Hezoggdoums. Naturally, Iochand would still possess de facto authority over all subjects on both continents, in accordance with Statute 35.12a and Council Order 214. Furthermore, Your Imperial Majesty would as a result be granted a second Raighsz title, a mark of prestige that would no doubt greatly improve the crown's respect among the other kingdoms of Cannor. Again, while Your Imperial Majesty is of course under no obligation to modify the preexisting structure of [Root.Monarch.GetHerHis] domain, the Council strongly encourages [Root.Monarch.GetHerHim] to take this proposal under consideration for the sake of [Root.Monarch.GetHerHis] subjects' well-being and prosperity.\n\nAUTHORIZED BY\nHead Councillor Adran Eldergreen\nCouncillor Bort Bobbenobben-Bobberton\nCouncillor Tando Bigbrain"
 iochand.33.a:0 "You're saying I get a new title? I'm listening..."
 iochand.33.b:0 "Must I put up with random administrators throwing legal babble at me?"
 iochand.34.t:0 "Over a Drink"
 iochand.34.d:0 "The tavern was nearly empty, most of its patrons already having retired for the night. Only two gnomes remained, nursing their tankards of ale at a small corner table.\n\n"I'm telling you, Melbin," said the first, "the Crown doesn't care about the Dragon Coast anymore. Lencenor's the greener pasture over the hill. All we get here are table scraps."\n\nMelbin Oddandodder, steward and chief advisor to the Hezogg of the Oddansbay, took another sip of ale. "Well that's pretty understandable, isn't it? The south has way more people. Greater needs, and all that."\n\n"But does that justify the neglect of the north?" The unnaturally blue eyes of Melbin's friend glowed with a burning passion. "The land of the First Hierarchy, relegated to being a sidelined backwater? Don't you think that should change?"\n\n"Hmm...." Melbin swirled the remainder of his drink around the bottom of his tankard, pondering the words he'd heard. "What's it matter to you, anyway? Don't you have that cushy job off in Aelantir?"\n\n"I'm a gnome, Melbin. I care about my homeland. Don't you?"\n\nMelbin finished the last of his drink with a single swig, then looked over at his friend. For a brief instant, the dim candlelight seemed to cast the illusion of blue scales on his skin. Melbin wondered for a moment whether the gnome in front of him might have some kobold ancestry, before realizing how silly the idea was. Perhaps he had drunk enough ale for the night.\n\n"Maybe you're right, Tando...," he said, grabbing his coat and standing up, "...maybe you're right.""
 iochand.34.a:0 "It may be prudent to offer the Dragon Coast a few special privileges..."
 iochand.34.b:0 "...but then again, we cannot risk neglecting Lencenor."
 iochand.35.t:0 "The Nimszexael Society"
 iochand.35.d:0 "FOUNDING PROCLAMATION OF THE NIMSZEXAEL SOCIETY\n\nWe, the members of the Nimszexael Society, seek to achieve the following:\n\n1. Full representation for the interests of the diverse peoples of Aelantir within the administration of the Kingdom of Daccasded;\n\n2. An end to the implicit hegemony of the Kingdom of Iochand over the peoples of Aelantir, and the revocation of Statute 35;\n\n3. Freedom for the peoples of Aelantir to retain their own distinct cultural practices;\n\n4. Protection for the interests of the Artificers and Merchants of Aelantir from Iochander domination;\n\n5. Dignity and respect for the rights of the peoples of Aelantir;\n\n6. The slightest modicum of seriousness, for once.\n\nThe Nimszexael Society shall hereby do everything in its power to achieve these goals, regardless of whether the Kingdom of Iochand chooses to cooperate or not. May Aelantir see a brighter, freer, and less silly future.\n\nAUTHORIZED BY\nThe Nimszexael Executive Council\nTando Bigbrain, Chairman"
 iochand.35.a:0 ""Less silly?" We'll show you "less silly!""
 iochand.35.b:0 "What a brilliant satire! Quick, offer them a Nimsnoms timeslot!"
 iochand.35.c:0 "Maybe we could stand to be a bit more serious..."
 iochand.36.t:0 "The War of Masks"
 iochand.36.d:0 "DECLARATION OF DACCASDEDER INDEPENDENCE\n\nDespite repeated calls for reform, the Kingdom of Iochand has taken insufficient measures to end the imposition of its tyrannical practices upon the peoples of Aelantir. We no longer have the time, or goodwill, to entertain further empty platitudes. Therefore:\n\nWe, the united peoples of Aelantir, do formally proclaim the full and undisputed independence of the Kingdom of Daccasded as a sovereign state. [Root.Monarch.GetName] shall be relieved of [Root.Monarch.GetHerHis] position as [Root.Monarch.GetTitle] of Daccasded, and Chairman Tando Bigbrain shall be subsequently crowned Kong in accordance with the will of the people. In addition, the remaining members of the Daccasded Administrative Council who lack membership in the Nimszexael Society, including former Head Councillor Eldergreen, shall be required to either formally renounce their loyalty to Iochand or be forcibly removed from their position.\n\nStatute 35 shall also be formally revoked. Any failure of Iochand to fully and immediately withdraw from all holdings in Aelantir shall be treated as a direct and unequivocable declaration of war.\n\nMay Aelantir forever prosper under the leadership of those who are willing to take it seriously.\n\nAUTHORIZED BY\nThe Free Council of Daccasded\nKong Tando I "the Blue" Bigbrain"
 iochand.36.a:0 "This just isn't funny."
 iochand.40.t:0 "Thread of Prophecy, Severed"
 iochand.40.d:0 ""No, no, no, that's not how it happened" - A certain Prince\nThe union is broken, the tragedy you have sought to delay will now come for Iochand. This play has been derailed; resubjugate Daccasded or flee this doomed world of your making; there is no story left to be told."
 iochand.40.a:0 "Toddamnit"
 iochand.41.t:0 "Paradise Saved"
 iochand.41.d:0 "Whispered murmuring spread throughout the theatre-court's audience as the head judge returned to his seat at center stage. The defendant, Tando Bigbrain himself, stood wrapped in an almost comically excessive number of chains that left him seemingly incapable of movement. Despite his insurmountable defeat, Tando's brilliant blue eyes still shone with a fiery passion, his mouth curled in a cocky smirk.\n\n"Order!" spoke the judge, banging his gavel. The audience fell into an anticipatory silence. "Tando Bigbrain! You stand accused of the crimes of sedition and high treason against Iochand. However, the widespread appeal of this revolt shows an underlying discontent with Iochander rule, so the crown has indicated it will be more receptive to hearing out any concerns in the future. As such, you will simply be forced to attend a theatre play every day for a total of five years in order to get a greater appreciation for Iochander culture."\n\n"What?!" Despite his heavy chains, Tando whirled around to face the judge, his expression changing to pure rage. Excited murmurs rose from the audience. "All this destruction and upheaval, and you still insist on giving me some silly punishment? If you won't take me seriously, I'll make you!"\n\nThunder crackled through the court as the gnome's skin began to warp and grow, his clothes shifting to a mass of resplendent blue scales. The audience gasped as wings and a tail began to sprout from his back, shattering the chains restricting him. Suddenly, a blast of lightning threw him to the floor, and his transformation began to forcibly reverse. He struggled in confusion for a moment before glancing up, understanding beginning to dawn on his face.\n\nThe judge was standing up at his table, his arm extended, his expression a look of disappointment. His eyes glowed with blue flame, though it quickly faded. "It was a good try, Calonthiak, but I'm always a step ahead. Bailiff?"\n\nThe audience erupted into a rapturous standing ovation as the defeated-looking Tando was dragged offstage, so loud that it could be heard throughout the entirety of Bloopalaasd."
 iochand.41.a:0 "What a show! I wonder how they pulled off all those special effects?"
 
 iochand.51.t:0 "A Feud between Hezoggdoums"
 iochand.51.d:0 "Two of our Hezoggdoums are bickering over a province. It's currently controlled by [feuding_hezoggdoum_2.GetName] but [feuding_hezoggdoum_1.GetName] believes it should be rightfully theirs. They're both rather passionate about this but they know only we have the authority to decide."
 iochand.51.a:0 "Side with the current owner [feuding_hezoggdoum_2.GetName]."
 iochand.51.b:0 "Side with the feuder [feuding_hezoggdoum_1.GetName]."
 iochand.51.c:0 "Tell both sides to drop the feud."

