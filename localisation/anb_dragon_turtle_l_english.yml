 #Dragon Turtle System Events
 dragon_turtles.1.t:0 "Kealakys, the Ever-Hungry Relations"
 dragon_turtles.1.d1:0 "We’ve worked with Kealakys across years and years, and our relationship with them has prospered beyond our highest hopes. Kealakys sent us a message recently informing us that we are one of their closest companions, and that they intend to help us however they can. A Dragon Turtle’s memory is long and they hold great power; we have done quite well for ourselves."
 dragon_turtles.1.d2:0 "As we work towards Kealakys’s goals, they have let us know that they appreciate the effort we have gone to, and that they intend to reciprocate our good actions. They think we could be friends. If we work a bit harder, perhaps that friendship with Kealakys could blossom."
 dragon_turtles.1.d3:0 "Kealakys has noticed our actions lately, and has begun to look upon us with a vague approval, though not quite benevolence. There are higher heights of their esteem which we might reach, but this isn’t such a bad state for our relationship to be in."
 dragon_turtles.1.d4:0 "Our relationship with Kealakys used to be quite different, but now does not appear to be much of anything at all. If we wish to avoid Kealakys’s ire or earn Kealakys’s favor, we’ll have to put some more effort into the relationship."
 dragon_turtles.1.d5:0 "Kealakys doesn’t hate us, but they certainly aren’t very far from it right now. If we put in a little more effort into our relationship with Kealakys we might be able to repair the relationship fully, but first we will have to try."
 dragon_turtles.1.d6:0 "Kealakys has come to view us as having fundamentally different values from their own. Kealakys sees a sliver of good in us but intends to work against our interests anyway, both to push us on the right path and because they simply do not like us."
 dragon_turtles.1.d7:0 "Dragon Turtles remember all, so by necessity they tend to be quite forgiving creatures. They cannot forgive everything, however. Our choices made over and over again have earned us Kealakys’s lasting enmity, which will come with terrible consequences. It seems certain that as bad as things are, they are about to get worse."
 dragon_turtles.1.a:0 "Beloved: Hooray!"
 dragon_turtles.1.b:0 "Trusted: Sounds good."
 dragon_turtles.1.c:0 "Friendly: Perhaps we could do more."
 dragon_turtles.1.e:0 "Netural: All right."
 dragon_turtles.1.f:0 "Disapproving: We’re being ignored!"
 dragon_turtles.1.g:0 "Hated: Let’s try to fix this."
 dragon_turtles.1.h:0 "Reviled: Tell the people to hide!"
  dragon_turtles.1.i:0 "Disable Turtle Opinion Notifications"
