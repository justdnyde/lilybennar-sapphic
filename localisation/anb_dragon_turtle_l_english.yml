 dragon_turtles.16.t:0 "Against All Odds"
 dragon_turtles.16.d:0 "The enemy fills the horizon like a second sunset, and the soldiers watch it come without flinching. There are not enough of them. Everyone knows this, and no one says it.\n\nOne of them speaks. It is a mantra from his training, something Iehu had made him repeat in his hatchling days until the words were worn smooth. It was short and plain, the kind of thing that sounds like nothing until you need it. He gives it to his comrades one line at a time, waiting after each one, and they repeat it back to him in low voices- uncertain at first, feeling for the shape of the words, then steadier, then certain. By the end they can see clearly. They look at each other and find no fear there, only faces they know.\n\nThe order comes. They move to meet it."
 dragon_turtles.16.a:0 "Into the valley of death they ride."
 dragon_turtles.17.t:0 "Insight of Ten Thousand Years"
 dragon_turtles.17.d:0 "We have been offered an amazing opportunity: [Root.Heir.GetName] has been invited to study under Naauao the Listener, so that what she says is “the unparalleled leadership of [Root.GetName]” can continue into the next generation. Though [Root.Heir.GetSheHe] will study all of the workings of the Consensus, we may ask Naauao to take special care to instruct our heir on one specific aspect of rulership with all of the years of experience she has accrued. What should we ask her for?"
 dragon_turtles.17.a:0 "The insight of justice, delivered with wisdom."
 dragon_turtles.17.b:0 "The insight of mercy, given with love."
 dragon_turtles.17.c:0 "The insight of power, wielded with grace."
 dragon_turtles.18.t:0 "Detail-Oriented Bureaucracy"
 dragon_turtles.18.d:0 "A new leader has risen in [Root.GetName]! Makaoioi the Erudite would say that every ruler is merely the sum of the people behind them, and if he is correct then our ruler sums up to quite a great amount indeed. Makaoioi has been working specially with the government to help [Root.Monarch.GetName] get settled in their position, and now a small army of precision-trained bureaucrats stand at the ready to guide the realm along whatever path [Root.Monarch.GetName] thinks is best."
 dragon_turtles.18.a:0 "Economic matters must take precedence!"
 dragon_turtles.18.b:0 "Trade and power on the open seas are most important."
 dragon_turtles.18.c:0 "The military needs reform."
 dragon_turtles.19.t:0 "The Margin Call of Friendship"
 dragon_turtles.19.d:0 "Recently, Kahuzai’e sent us a dispatch informing us that she had come to a decision: her projections indicate that the expected marginal value denoted in general utility of the capital investments we would make with access to prime-rate funds has fallen below the minimum viable threshold for her to serve as intermediary between us and our creditors, and she will consequently be withdrawing from her role as market-maker.\n\nWe think that this is her way of saying that she doesn’t want to be friends anymore.\n\nIf we work on our relationship with her we’ll likely be able to secure access to these funds again, but in the meantime this will have implications for our merchants and their present control over our monetary policy."
 dragon_turtles.19.a:0 "The costs outweigh the benefits; we must reassert ourselves."
 dragon_turtles.19.b:0 "The benefits outweigh the costs; nothing needs to change."
 dragon_turtles.100.t:0 "Ruler Munched in Anger"
 dragon_turtles.100.d:0 "A rift has opened between us and Kealakys the Ever-Hungry. [Root.Monarch.GetName] decided to go to him personally in an attempt to mend it.\n\nThings did not start well. We performed all of the proper greetings and made some small talk, but when it came time to eat we discovered that the delegation brought Keakalys an orchard’s worth of mangos when he specifically asked for guavas. That made him hungry.\n\nThen, [Root.Monarch.GetName] decided to engage Kealakys on the subject of life, and whether or not it was imbued with specific purpose. The details of the conversation were hard to follow, but at some point [Root.Monarch.GetName] and Kealakys became at odds with one another, and neither would budge. That made Kealakys angry.\n\nEverything happened in a flash: Kealakys and [Root.Monarch.GetName] were shouting at one another, and then a hungry, angry Kealakys bent down, and all of a sudden the shouting was coming from inside Kealakys’ mouth, and then there wasn’t any shouting at all.\n\nIt would appear we no longer have a [Root.Monarch.GetTitle]."
 dragon_turtles.100.a:0 "Century of Storms!"
 dragon_turtles.101.t:0 "Bountiful Growth"
 dragon_turtles.101.d:0 "”I remember when that capital of yours was just a spit of land, founded by some settlers from a few islands over with a dream and the drive to make it happen. As I recall, the fruit they brought was of a different strain then. Isn’t it interesting to see how things grow and change over time?\n\nYou know, you could grow more fruit if you were just to make a few changes to those orchards of yours. I remember that the original settlers had to make some changes to the ways they farmed the land to get things running over there. Once the next crop comes in, bring some of it over here, won’t you? I’d love to have a meal with you!”"
 dragon_turtles.101.a:0 "We’ll feast together!"
 dragon_turtles.102.t:0 "Societal Self-Doubt"
 dragon_turtles.102.d:0 "”Why is it that nobody in that country of yours knows what exactly it is that they believe? If they do not know what to think, tell them. They are weak. Their minds are malleable. They will believe exactly what they are told enough times, and if they do not believe what you have to say, that is your failing.\n\nDoctrine can be warped as is required for the sake of social cohesion. Reshape it however you want; it’s not as if any of it matters anyway. Go to your counselors. Tell them that you have decreed something new, and if they complain, talk over them. Declare your will into being. If your counselors cannot implement it, they are either weak-willed or stupid. Figure out which and punish them accordingly.\n\nThat should solve the problem, unless the people object again. That’s possible, of course. In that case, there’s likely someone whispering in their ear on the other end.”"
 dragon_turtles.102.a:0 "Who could that be?"
 dragon_turtles.103.t:0 "Assets Obtained"
 dragon_turtles.103.d:0 "”It is the case, or so my agents tell me, that some of your people have obtained some interesting, compromising information about governments abroad. Did you know that their are still kings wets the bed, even as a fully grown adult? Intriguing. Did you know that each time afterwards, he kills his housekeeper to prevent the information from getting out? Fascinating.\n\nIt seems like somewhat of an overreaction, don’t you think? The question could just as easily be resolved by a bribe, or even a simple request to keep quiet. Perhaps someone has been whispering bad advice into his ear.\n\nBut in any case, this information has no value in itself: the value is in what you can get him to do to keep his secret safe. I can think of lots of things. I can also think of lots of secrets, which will soon bubble up on the surface of Kanolowele like infected blisters. You should tell your agents to keep their ears out.”"
 dragon_turtles.103.a:0 "Perhaps I will..."
 dragon_turtles.104.t:0 "Out-Imagined"
 dragon_turtles.104.d:0 "”That ship is wrong. What if it sailed upside-down? That way, it could see under the sea, and people could come up to the bottom to look at the sky! Then you could look at all of the stuff you didn’t see when you were sailing before!\n\nTie things to it with ropes so that they don’t fall under the sea. What if the ropes made rope bridges? That way the sailors could have fun at work. Unless they don’t like to climb...\n\nWhat if the sailors were monkeys? Keanu took me to see the monkeys once. They were great at swinging between things! You should train the monkeys to be sailors, and make new monkeys that can swim. They should have fins like me and they need to be purple, because purple’s the swimming color.\n\nBut then, you’d need new sails. They should flap like birds, so that they can move the water. Your sails are wrong. What if...”"
 dragon_turtles.104.a:0 "How are we going to do all this?!"
 dragon_turtles.105.t:0 "Child Visionary"
 dragon_turtles.105.d:0 "”I talked to the men with the fancy clothes, and they were making things blow up so that they could make other things blow up. But they weren’t using the stuff that makes the REALLY BIG booms, so I told them all about this idea I had for a bunch of guys who run around and make fireworks! They’d have big ships, and then on the ships they’d go around and collect the boompowder, and then after that they’d make big explosions for all the whales to watch! I swam around with the whales once, and they seemed bored. I think they could use some excitement.\n\nThe villagers could come too! They could board the ships, and if there were enough snacks they could just live out there and watch the fireworks. Bring snacks. I can think of some snacks. And I told all of this to the fancy men, and they told me that I was very helpful, so then I went to go tell the village, and they said I was helpful too. I think I could grow up to be really helpful.”"
 dragon_turtles.105.a:0 "That’s great!"
 dragon_turtles.106.t:0 "Bureaucratic Embroglio"
 dragon_turtles.106.d:0 "”Why have you arranged your systems of territorial governance so foolishly? I went to a governor and I told him that by all historical precedent it would make more sense if his territory extended outwards to the lands across his island. He agreed, so we went to your office of subnational division and we issued a complaint based on economic, historical, and sociocultural factors. The other governor was cross, so he issued a countercomplaint from the precedent emerging from Consensus Agreement 5584, which isn’t even applicable in this case because the coconut groves in question are more than a quarter of a day’s walk from the boundary line. I advised him on the countercomplaint, but it appears he’s made somewhat of a mess of it. Your bureaucrats didn’t know what to make of anything; they’re reviewing all of the documents now. I told them about how this exact situation was resolved during a similar territorial conflict in 912 and they just brushed me off. It’s like they don’t even care about imperial procedure standardization. I delivered it to them in writing to make sure things were running smoothly, but they appear to have gotten the countercomplaint mixed up with the initial complaint, so they said it’s going to take them a while to review the documents I sent them in addition to the first documents, but they can’t do that properly either. So then I told them about the forty six-step complaint review system created by Raka the Detailed in 932 in direct response to the Internal Dispute of 912 and they didn’t care about that either. They brushed me off. So I delivered more documents to them, and now they’re going to review those. They say it’s all going to take a very long time to resolve.\n\nThe empire of Satrialaam never would have managed their territories like this. I hope you’re happy with yourselves.”"
 dragon_turtles.106.a:0 "We sure aren’t."
 dragon_turtles.107.t:0 "To Last a Thousand Years"
 dragon_turtles.107.d:0 "”As you sit where a ruler sits, you must consider exactly how your actions will impact realm stability. Making some enemies is unavoidable, but a ruler must be careful never to let their enemies band together, or ideally even know about one another. Consider the example of the Thousand Sails Confederacy. They proclaimed themselves in 407, but the very nature of a confederacy allows for multiple centers of power, which allows for powerholders to emerge and begin working against consolidation. Consequently it was the case that the First Thousand Sails Confederacy of Mt’kaue Ke’akol was held together as much by its personalities and a kind of desperate idealism as by any kind of enduring structure, and I tried to tell them this at the time. They unsurprisingly collapsed sixty years later, but if they had just made some unifying reforms during the apogee of their political power, they could have lasted another sixty at least.\n\nAnd all of an empire’s history is made of these inflection points, where empires either endure or crumble. I told you about realm stability, but the great secret of stability is that it’s simply about enduring one crisis after another and ideally emerging in a stronger and more centralized state in the chaos. Maintain the loyalty of your smaller landholders with appropriate incentive structures, but seek to centralize away their power just as soon as you possibly can. Eventually you will hold all the power, and though this state of affairs never lasts, you can use it to ram through reforms that will convey you through the next crisis. This is how stability emerges, and this is the great secret of empires. With it, you will last millennia. In fact, the example of the Second Thousand Sails Confederacy may illustrate my point quite well...”"
 dragon_turtles.107.a:0 "We will give the landholders reprieve, and they will thank us for it."
 dragon_turtles.107.b:0 "It’s time to centralize."
 dragon_turtles.108.t:0 "Competitive Supply Bids"
 dragon_turtles.108.d:0 "”It takes a lot of stone to build a fortress. I have people in place to manage the logistics, but every now and then I’ll give them some advice about where exactly to spend their procurement budgets. There’s nothing more important than the security that stone can bring, so I usually encourage them to spend their money in places where people who don’t particularly care about their safety live, on the theory that they’re too dumb to notice their material costs rising from competition.\n\nIt takes a lot of stone to maintain a fortress, as well. I know your material costs are rising; I hope you understand it’s nothing personal. We need to source our materials from somewhere, and given that you don’t seem to care whether or not your people are safe anyway, it’s unlikely your forts are going to suffer from it much. I also hope you also understand that you aren’t welcome in the fortress once it’s finished. That part is personal.”"
 dragon_turtles.108.a:0 "Looks like the military budget is going to rise."
 dragon_turtles.109.t:0 "Self-Sustaining Architecture"
 dragon_turtles.109.d:0 "”There are a lot of ways to make sure a fort keeps standing, but the best of all is to make sure the fort’s gates don’t ever have to open. The division between danger and safety is clear as day: danger is outside the fort, and safety is inside the fort. Once you have something to protect yourselves, that protection should last forever. When building your forts, make sure that the inside of the fort can sustain itself without help from the outside of the fort.\n\nConsider growing crops in designated agricultural areas. That way you don’t have to open the fort for food deliveries, although you will have to sacrifice the security of stone floors in favor of soil patches. Do this sparingly. Post at least four rotations of guards at each of your farms so that the enemy can’t dig through the soil unnoticed, and be prepared to turn on your farms at all times. Food is important, but the outside world brings danger, and that includes outside soil that is inside the fort. Safety is more important. This is why you must also enclose your farms in a maze of ramparts. This way, you can have both food and gates that never open.”"
 dragon_turtles.109.a:0 "Note this down."
 dragon_turtles.110.t:0 "Vicious Parody Performance"
 dragon_turtles.110.d:0 "”I sing of the waning light of a kingdom,\nWhose rulers ‘cross ages have led it to wealth.\nThe ruler this kingdom now has is not one of\nThe rulers maintaining the kingdom’s good health.\n\nThe ruler this kingdom now has is quite stupid\n[Root.Monarch.GetHerHisCap] brain has been rotted by ailments and drink\n\n[Root.Monarch.GetHerHisCap] people despise [Root.Monarch.GetHerHim],\n[Root.Monarch.GetHerHisCap] counselors mock [Root.Monarch.GetHerHim],\n[Root.Monarch.GetHerHisCap] neighbors ignore [Root.Monarch.GetHerHim]\nAs lazy and weak\n\nIf ever this kingdom can rise back to greatness\n’Tis surely because the people have said\nThat because their ruler is feckless and greedy\nThe kingdom’s great glory demands [Root.Monarch.GetSheHe] drop dead.”"
 dragon_turtles.110.a:0 "Shut up! Make him shut up!"
 dragon_turtles.111.t:0 "Nalo Pu'ukani's Protege"
 dragon_turtles.111.d:0 "”A sailor approached my island a few years ago. I do not often take visitors, but her ship cut beautifully across the waves, and it inspired me to sing. She must have heard; she docked her ship, and soon my song was a duet, with the lilting heights of her voice elevating the music to places I could not reach.\n\nShe stayed with me for a time, and I taught her how even the movement of the waves on the farthest shores can make inspiration, just as surely as any of the heroic ballads the others love so much. We composed many songs together, but a few months ago she wrote a song about my favorite tree, and how the anthill beneath it was a world in itself. It was beautiful — it moved me to tears.\n\nI think that it is time for her to go; she has learned all she can. She asked me where her music might be best heard and best cherished, and I thought of you. I hope that is all right. Please take good care of her.”"
 dragon_turtles.111.a:0 "The veiled singer’s own student, in our court!"
 dragon_turtles.112.t:0 "Overgrown Strangleweed"
 dragon_turtles.112.d:0 "”You’ve come for advice on that strangleweed infestation you’re dealing with, haven’t you? I wish I could be of more help, but I’ve managed Kanolowele’s strangleweed mitigation for centuries and I haven’t heard of anyone bringing strangleweed seeds into your land. My gardeners don’t tell me everything they do, but I have to imagine I’d hear about something as important and devastating as strangleweed. It’s overrunning your fields? It’s destroying your houses? Strangleweed tends to do that. That’s a shame.\n\nPerhaps you could try tracing the strangleweed back to its source, although it’s my understanding that most places have banned even keeping the seeds in the first place. There’s a lot of destructive potential in that plant, to be sure. I think this garden is the only place around that has any seeds left, but again, I think I would know if any of the seeds had gone missing.\n\nIt’ll starve itself out eventually, but strangleweed can be a real danger in the meantime. It’s one of the nastiest plants I’ve come across, and I’ve come across just about all of them. Still, if your people are hungry, it’s fortunate that strangleweed can be eaten. I hear it’s a bitter, wretched plant. I’ve never tried it myself, because I’ve never had a reason to.\n\nStay safe.”"
 dragon_turtles.112.a:0 "I think we’ve made a horticulturally advanced enemy."
 dragon_turtles.113.t:0 "Grandfather's Garden"
 dragon_turtles.113.d:0 "”No, don’t worry about the men in the green hats; I know them. I try to stay in my tidepools, but my gardeners go everywhere I can’t, and they know the soil like they grew out of it themselves. They told me that you’ve got some nice crops growing in [EventTarget.GetName], but that the agriculture seemed like it could use some work.\n\nYou’ve got to remember that a garden is just as much a work of art as it is a treasure, and with just a little bit of effort you can make great crops sprout where once there wasn’t anything at all. I think I’ll have them move some rocks around: you can make the fields out of the most wonderful pathways, and if you plant some trees along the roads you can prevent the wind from blowing away your topsoil. If you choose the right trees, the plants will look as happy as they feel. Happy gardens bring sightseers and traders, and they’ll buy the crops you sprout.\n\nIf this all sounds complicated, I’d be happy to send some of my green hats to help you get started. You’ve always been good to me.”"
 dragon_turtles.113.a:0 "Gold can be mined from the mountains, but the soil grows it."
 dragon_turtles.114.t:0 "Memories of Cataclysm"
 dragon_turtles.114.d:0 "”Let me tell you, I’ve been around. I used to sail all over, and everywhere I went there was something going on: parties, the construction of some big amazing thing, you name it! I started most of the parties. We held them for hundreds of years, but every time I went to one it was like I was there for the first time. I never got tired of watching the smiles of someone jumping into the waves, or the sleepy walk of someone who had stuffed their belly a little too full of food and drink. I let them sleep on my back. It was all such a great time. I remember it like it was yesterday.\n\nBut then, the war came. An empire landed on the island shores, and all of a sudden those parties all dried up. The next time I came to visit, all of the great things I loved to see and admire had been replaced by armories that were making weapons. The next lap around the island I took, the beaches were bloodstained. I won’t forget the invaders, or the look in their eyes. I remember them too. And when I look at you, I see them.\n\nI won’t let you take my friends from me again.”"
 dragon_turtles.114.a:0 "What’s his problem?"
 dragon_turtles.115.t:0 "Cherished Festivals"
 dragon_turtles.115.d:0 "”Hey, I’m glad you could make it. You guys are doing great, but I’ve been thinking — doesn’t everything seem a bit drab to you? I mean, look at all this! Isn’t my cave great? All this art and all these decorations were made by people who cared a whole lot, but if you really want people to care you’ve got to give them something to care about, you know?\n\nWhat if we got everyone together, like from all over the place, and we threw a massive festival from sunrise to sunset with food stands and performances and games for everybody? We could have it on the longest day, and that way there would be more time for music and art and whatever people want to bring! I’ve got a lot of experience with this kind of thing, and I could help if you like. I’ve got a bunch of ideas. I’m excited just thinking about it. Are you in?”"
 dragon_turtles.115.a:0 "I think I am!"
 dragon_turtles.116.t:0 "Deaf Ears"
 dragon_turtles.116.d:0 "”I may be blind, but I am not deaf. My ears work just as well as they ever have, and what I hear are the cries of a people who plead for deliverance from their tyrannical and unjust government. Surely, you have heard them. If not, perhaps it is you who is deaf.\n\nFor a long time, I have tried to avoid intervening, with the belief that you would determine a way to right the ship. But as corruption mounts, I am forced to conclude that either you can not or will not see justice done. The Consensus has mechanisms for cases like these: the only ones who may try a nation are the Judges, and the three of us have agreed that your case is grave enough that we are invoking our right to a hearing.\n\nI have also tried to remain neutral, but it has been trying in a way that taxes me greatly. All I hear are tales of your realm’s petty corruption, cruelties, and simple unfairness. We all have, and this is why the Consensus must intervene.\n\nYou will come before the court, and you will explain yourselves.”"
 dragon_turtles.116.a:0 "We have the right to counsel, right?"
 dragon_turtles.117.t:0 "Naauao's Codifications"
 dragon_turtles.117.d:0 "”I have often found that law is like driftwood: in orderly stacks it makes wonderful kindling, but it is nothing more than a nuisance if it piles up without heed. I also recognize that it is often very, very hard to keep the laws from piling up. Things change over the years, and this requires new laws, and sometimes there is nothing to do but stack the new laws on top of the old.\n\nThe issue with this is that precedent relies on knowledge, and if the law becomes too hard to understand then nobody but those who have spent years memorizing it benefit. Then they make more laws to their benefit, and then the problem accelerates. But the lawyers are not the only ones with clear eyes and long memories.\n\nI too have knowledge of the law. I have watched you develop your legal system across years, and I think I have a few improvements to make that would give your laws intuitive simplicity while still maintaining their clear justice. Would you permit me?”"
 dragon_turtles.117.a:0 "Let justice be done, and all the world rejoice."
 dragon_turtles.117.b:0 "Prudence is justice’s handmaid; we cannot spare the resources."
 dragon_turtles.118.t:0 "Duel in the Officership"
 dragon_turtles.118.d:0 "The survivors who were complicit in the incident have been understandably somewhat reluctant to talk, so we’ve had to piece together what happened through scattered testimony. This is what we know for sure:\n\n Huelotlake and Ninhua have disliked one another for years on years, and every opportunity they had to interact with one another out in the field only increased that loathing. At some opportunity they had to meet, Huelotlake decided that the army would be better off without Ninhua entirely, and challenged Ninhua to a duel.\n\nSomehow, both Huelotlake and Ninhua were able to enlist their staff officers in a scheme to conceal their absence. Neither general was particularly invested in the training and operation of their army, so the men did not notice when they went missing.\n\nThe generals met on neutral ground to commence their duel. They fought using ranged weapons, and began the duel at thirty paces. Unfortunately, neither of them could hit the other at that range, so they advanced to twenty paces. Neither was hit at that range either: there may have been some malfunction with the armaments. They advanced inward until they were face to face with one another.\n\nAt that point, both of the generals revealed hidden blades, and the duel degenerated into a knifefight. In the end, both bled out from their wounds.\n\nSomehow, this complete breakdown in military discipline, officer conduct, and simple good sense reached Moi’okalakupua before high command itself. He has not stopped laughing for days."
 dragon_turtles.118.a:0 "They were supposed to kill the other army, not each other!"
 dragon_turtles.119.t:0 "The Two forms of Casting"
 dragon_turtles.119.d:0 "”To keep yourself whole, you must not neglect your casting. I will tell you what I tell all my students, and I will tell you slowly. It is important, and I have already sent for them; we have some time to fill.\n\nThe first form of casting is the casting of metal, or the casting of the body. If you do not know this form of casting, you likely do not need to learn it, so long as you have others who can help you. We need not delve into all of the details; let us skip to the final result. There is a bone spear against the wall, and you can go ahead and pick that up. Get a feel for it. You never know when you might need it, after all.\n\nThe second form of casting is the casting of spells, and this is the casting of the mind. Unfortunately, I have not yet found a way to get others to cast my spells for me, so the only pathway to mastery of the second casting is study of the magical arts. This is the casting of precision- every errant movement or misspoken word can ruin a spell. Work with exactness and an eye towards your mistakes, and discipline will triumph over ignorance no matter how many tries it takes you.\n\nYour spear and your study are how you will defend yourself against all challengers, including my students. I have given them practice spears and told them the first to land a hit on you will be removed from the chore schedule for a month. Two months if they manage to dunk you in the water. I can hear them on the stairs. Brace yourself.”"
 dragon_turtles.119.a:0 "No, these are my nicest clothes!"
 dragon_turtles.120.t:0 "Extrajudicial Justice"
 dragon_turtles.120.d:0 "A strange feeling is creeping through [Root.CapitalScope.GetName]. We have not been condemned, but the scent of condemnation lingers regardless. As it creeps around us it brings a sense of terror, and the terror has no name. It has come in through the gates.\n\nBusiness in the halls of power has stopped. We are hiding from the thing. Some have locked their doors and sit behind them in the dark, listening. Some have gathered in the larger rooms, believing that company is a kind of armor, that the thing will not take from a crowd what it would easily take from one alone. They are wrong about this, but no one has told them.\n\nDrink dulls the horror, but even the finest wines have turned viscous, slow and wrong as they drip down our throats. The prayers of the rich and the influential collapse into weeping and then silence. We knew the years we were given when each of us was born, and there is no power that can turn back time. But we can’t see it, and it knows that it is not being fair, and yet it comes regardless.\n\nEveryone here is so young. Please. Please. It is not our time."
 dragon_turtles.120.a:0 "Death comes for all, the greatest and the least."
 dragon_turtles.120.b:0 "Death comes for all, the wise and the foolish."
 dragon_turtles.121.t:0 "Motivating Eulogist"
 dragon_turtles.121.d:0 "”Although the bodies of these men have returned to the earth, it is surely the case that their works endure. It is the job of a soldier to become familiar with his own death. I cannot say if they had achieved this when their own deaths approached, but all the living should thank them regardless. Their sacrifice is our heritage, and we will remember them. For as long as I shall live, I will remember them.”"
 dragon_turtles.121.a:0 "All lives end. These ended with purpose."
 dragon_turtles.122.t:0 "Poached Councilors"
 dragon_turtles.122.d:0 "”My dear [Root.Monarch.GetTitle],\n\nI understand that you have been on something of a talent search. Far be it from me to discount the importance of a strong state, but I also presently find myself in need of counselors to advance the work of the Consensus.\n\nI have conducted a search across Insyaa, and one of my top candidates just so happens to currently hold a position within your government. They are compassionate and wise, and when I informed them of the gravity of the position I sought them out for, they saw the chance to leave a legacy larger than any one nation itself and agreed to work for an institution that places importance on justice and fairness. I suspect they will be submitting a resignation letter soon.\n\nI fear you will miss their wisdom, but it seems apparent that their compassion was not being put to much use. I am sure you will attempt to find new advisors. I wish you all the success that your efforts deserve.\n\nRegards,\nMakaoioi the Erudite”"
 dragon_turtles.122.a:0 "I never knew a turtle could be so cold-blooded..."
 dragon_turtles.123.t:0 "Makaoioi's Candidate"
 dragon_turtles.123.d:0 "”It’s wonderful to see you again. I hope the work of rulership isn’t taking too much away from you; I know how power can wear over a long time. But although I would dearly wish to spend the hours talking, this is not why I asked you here. The other Judges and I have been discussing a certain matter. The work of the Consensus is entering a slow period, but we have such talented counselors here—I can’t abide the thought of their expertise going to waste, even if they are no longer working for the three of us.\n\nWould there be space in [Root.GetName] for some of them? We have recruited them from all across Kanolowele, and they are acquainted with everything their years here have taught them. If you would be open to it, I will send along the necessary introductions.”"
 dragon_turtles.123.a:0 "Someone with an eye for governance might be nice."
 dragon_turtles.123.b:0 "We could use some new statesmen."
 dragon_turtles.123.c:0 "Do you have any advisors on military matters?"
 dragon_turtles.124.t:0 "Debts Called"
 dragon_turtles.124.d:0 "”I’m a debtholder, and I’m concerned. Let me take a moment to explain why to you.\n\nThe first reason is my significant counterparty risk. I’ve lent you some money, but there’s nothing stopping you from taking that money and running away- except for the deterrents I can impose on your future ability to borrow from me, and from the marketplace more broadly. This is usually only a problem at the end of a time horizon, but you’re shifty and I don’t trust you.\n\nThe second is the risk of delinquency. Your commercial ventures aren’t exactly thriving under your incompetent stewardship, and it’s entirely possible that you simply won’t be able to repay me, regardless of willingness.\n\nI chose to offer you a loan in lieu of the other purposes I could have directed my money towards: the second best thing I could have done with it is what we call an opportunity cost. That opportunity cost is looking tempting right now. I want my money back.\n\nUsually, this would be hard for me, but this is exactly why institutions exist: to reduce risks associated with market transactions. If you take a look at your contract, you’ll see what’s called a variable rate clause. This makes an increase in return to compensate for my increased risk contractually legitimate. You’ll also notice a very strong acceleration clause, which I’m going to be invoking now.\n\nThe wonderful thing about obligations, you see, is that the debtholder can call them in whenever she pleases.”"
 dragon_turtles.124.a:0 "Is this what they mean by leverage?"
 dragon_turtles.125.t:0 "Stimulus Vigor"
 dragon_turtles.125.d:0 "”The economy does not simply keep growing. Investment is heavily tied to consumer demand, and this demand itself is subject to factors within the economy, including employment, which itself is a consequence of investment. When the economy expands, capital flows to efficient ventures, which can afford to return higher rates. But as capital accrues to market-optimal ventures, the opportunities that are left get worse from a return standpoint, and the market becomes saturated with firms. Competition drives prices down, but as this happens capital efficiency collapses, which collapses investment, which collapses demand.\n\nWhen this contraction happens, individual firms often are the victim of macroeconomic circumstances, and as businesses fold, their employees are laid off, which broadly causes reduced consumer demand, which causes more businesses to dip into the red.\n\nYou might think all is lost: this isn’t necessarily the case. The government’s role in the economy is to ensure broad prosperity, and if the state is willing to accept up-front losses, it can stimulate demand through some wise fiscal policy. Behaviorally, individuals often respond differently to unexpected cash influxes, and this increases the rate at which they are willing to spend. There are incentivization problems, but that’s the basic theory.\n\nI have some extra money. Would you like an unexpected cash influx? I’ve accounted for my own time preference, of course.”"
 dragon_turtles.125.a:0 "Less money now!"
 dragon_turtles.125.b:0 "More money now, but as a liability!"
 dragon_turtles.126.t:0 "Doomed Excursions"
 dragon_turtles.126.d:0 "”Why is it that you keep sailing into seas you can’t handle? I keep seeing ships with your banners out in the storm. Are your merchant fleets searching for something, or were those your naval ships? I couldn’t tell the difference. Anyway, I don’t think your latest expedition was quite equipped for the jagged rocks that crop up deeper in the Kiamoa: you have to know where exactly to sail, or you’ll be forced to endure the misery of both the storm and the terrain, and that’s usually a recipe for a sunken ship. I should know- I see enough of them!\n\nThe rain was pouring down in sheets, and whatever incompetent navigator you appointed to lead your fleet was lost and flailing. Your flagship dashed itself on a rocky island. I think its sailors saw me; they were strong enough swimmers, and they managed to stay afloat long enough to call out to me for help. I wish I could have, but I was swimming off to another part of the storm, and besides I was very busy. Busy not helping, that is.”"
 dragon_turtles.126.a:0 "The sailors won’t be happy about this."
 dragon_turtles.127.t:0 "Forgotten Designs"
 dragon_turtles.127.d:0 "”I’ve been reflecting during my recent trips into the Kiamoa. I see such wondrous things there, but they are dashed to pieces so often after I see them. Only the hardiest survive, and if I am the hardiest, it is my responsibility to carry a piece of what could not handle the storm’s winds with me.\n\nWhen I am not out exploring, I enjoy resting in my cave, and over the years I’ve fashioned myself a set of small tools for shipbuilding. With the right amount of timber I can build just about anything, and recently I recalled a beautiful ship that I saw a few moments before it was pulverized. Then I recalled you. Your nation is full of brave and skilled sailors, and I thought you might like to see the ships for yourselves.\n\nThey are very tiny, but so are you! I thought you might be able to make good use of them. That’s right- the ships are yours. There’s no need to thank me. Just get them fixed up, and then maybe their captains can sail out into the storm with me.”"
 dragon_turtles.127.a:0 "We’re going to need some brave captains."
 dragon_turtles.128.t:0 "Manaburn"
 dragon_turtles.128.d:0 "”Why is it that you blame me for the air around you growing drier, and your spells growing weaker? When the waves crash against your shores, do you blame Nalo Pu’ukani? Of course not. To cast magic requires both a stable mind and a clear soul; if your mages cannot work with the mana in the air, perhaps they should look inwards instead of outwards.\n\nI have known something of anguish. If the mages still suffer, tell them that the pain they feel is nothing compared to the pain caused when power is unjustly wielded. Tell them to sit and watch the ash play across the wind. While they do so, they may reflect on who exactly it is they serve, to what end they serve them, and how their past actions have led to their present predicament.\n\nWhen they have reflected long enough, there is a chance that the air will clear.”"
 dragon_turtles.128.a:0 "How helpful."
 dragon_turtles.129.t:0 "Teachings of the Master"
 dragon_turtles.129.d:0 "”I am not teaching you to make firecrackers. Whatever weak cantrips you know how to cast do not compare to the power of flame, summoned with knowledge and guided with wisdom. I will not have students who are weak in any way. Anger is the product of a weak soul, and this is the worst kind of weakness. Evocation is the angriest magic, and this is why it must only be wielded by the kindest. Be calm.\n\nNow gather yourself where you stand, and feel how your presence affects even the smallest of things around you. You suffer under the delusion that you stand apart from the world, and this is what we will break today. Extend yourself. Think about what you wish to accomplish, and then do not think at all. Move. Burn the air itself with force of will! Make the planet turn around the axis where you stand! You are might, you are glory, you are flame. Burn brighter! Burn higher!\n\nGood. Now we will discuss your stance.”"
 dragon_turtles.129.a:0 "Yes, master."

 #Modifiers
 kealakys_ever_hungry_farm_estate:0 "All You Can Eat Feasts"
 desc_kealakys_ever_hungry_farm_estate:0 "We’ve given Keakalys so much food that even he can’t eat it all, so he’s invited our people out to share it with him. However much we bring, it just seems to multiply; these are times of plenty!"
 kealakys_ever_hungry_fish_province:0 "All You Can Eat Fish Feasts"
 desc_kealakys_ever_hungry_fish_province:0 "We’ve given Keakalys so much food that even he can’t eat it all, so he’s invited our people out to share it with him. However much we bring, it just seems to multiply; these are times of plenty!"
 kealakys_ever_hungry_trophic_chain_collapse:0 "Trophic Chain Collapse"
 desc_kealakys_ever_hungry_trophic_chain_collapse:0 "The ecosystem is collapsing around our ears, and the people are going hungry. We begged Keakalys for help, but he just says we should have “been better stewards."
 maxele_iron_hearted_abyssal_political_undertow:0 "Abyssal Political Undertow"
 desc_maxele_iron_hearted_abyssal_political_undertow:0 "All of society has fallen into turmoil. Nobody will work, and the people spend most of their time protesting something somebody else has done. Sometimes our administrators are discovered face-down, lying in pools of blood. Maxele the Iron-Hearted denied all knowledge of this to us, but she had a glint in her eyes when she did."
 maxele_iron_hearted_persuasive_entreaties:0 "Persuasive Entreaties"
 desc_maxele_iron_hearted_persuasive_entreaties:0 "What is religion but a system of axioms that people can be made to accept, one after the other? Intelligence on the weak points of key powerbrokers can spread these axioms outwards, and if that doesn’t work Maxele has given us some wonderful techniques by which we can resort to more “forceful persuasion."
 kalei_boundless_horizons:0 "Boundless Horizons"
 desc_kalei_boundless_horizons:0 "Our explorers are sailing out into the unknown so that they can discover new and wondrous things. The expeditions won’t be practical, and they might not return anything at all. But Kalei asked us to, and she looked so happy and hopeful as she was swimming about that we just couldn’t say no."
 kalei_cold_cruel_world:0 "Cold, Curel World"
 desc_kalei_cold_cruel_world:0 "When things are born they are perfect, and their lives are just a process of decay. Kalei asked us about decay. Someone had told her that she was going to die someday. When we answered, she retreated into her shell and has not come out. We hear her crying. And as we cry with her, we ask ourselves: where has all the wonder gone?"
 vea_headache_inducing_lesson:0 "Headache Inducing Lesson"
 desc_vea_headache_inducing_lesson:0 "Vea’s talking. There was a man who made cheese in the year 345. This has implications for cheesemaking. She’s telling us about his parents. His parents had parents. They made cheese too. This is necessary to understand cheesemaking. Cheese quality makes up .007% of an empire’s overall success. Make it stop. Make it stop. Make it stop."
 vea_foundations_of_empires:0 "Foundations of Empires"
 desc_vea_foundations_of_empires:0 "Vea’s talking. Apparently, there’s a throughline that all the post-Consensus empires share, and if we refine our naval power projection we could be extracting more taxes from our faraway subjects the way they did. This tax-base could help us build more ships, which we could use to extract even more taxes. This is fascinating."
 monzaketzya_impervious_indestructible_invincible:0 "Impervious, Indestructible Invincible"
 desc_monzaketzya_impervious_indestructible_invincible:0 "Attack wins wars, but defense prevents them. Monzaketzya has generously taken some time out of his fortress-building schedule to instruct our mages on defense. We already feel more secure."
 monzaketzya_poached_engineers:0 "Poached Engineers"
 desc_monzaketzya_poached_engineers:0 "All of the country’s best engineers are leaving the nation upon completion of their training; they just tell us they’re going to build a fortress for more than we can pay them. There’s only one fortress grand enough to require this many engineers. This is the work of Monzaketzya, that floating pillbug."
 nalopuukani_hoarder_of_a_hundred_thousand_stories:0 "Hoarder of a Hundred Thousand Stories"
 desc_nalopuukani_hoarder_of_a_hundred_thousand_stories:0 "Nalo Pu’ukani has taken a particular interest in our people lately, and has begun composing songs about even the most mundane things we do. Everyone has found inspiration in these small but wondrous tales, from the least of us to the greatest."
 nalopuukani_labyrinthine_mists:0 "Labyrinthine Mists"
 desc_nalopuukani_labyrinthine_mists:0 "A terrifying mist has descended upon our country; it is impossible to get from anywhere to anywhere else without getting lost on the way. It resembles the mist of the island of Nalo Pu’ukani, who evidently very much does not want to be disturbed."
 grandfather_moss_tended_lands:0 "Tended Lands"
 desc_grandfather_moss_tended_lands:0 "The lands of the realm have been tended with the loving hands of Grandfather Moss’ own gardeners, who he sent here to make sure the people have enough to eat."
 grandfather_moss_crop_disease_outbreaks:0 "Crop Disease Outbreaks"
 desc_grandfather_moss_crop_disease_outbreaks:0 "The land is stricken with a great blight, and now all our farms produce is death. We went to Grandfather Moss to beg him for help, but he refused to speak with us."
 maruvarax_overdue_mending:0 "Overdue Mending"
 desc_maruvarax_overdue_mending:0 "Maruvax the Gentle-Stepped has been attracted by the prosperity of our nation, and he has begun thinking of ways to make sure our people are as happy as they are wealthy. He has been travelling from place to place to make sure everyone lets loose once in a while (himself included), and the world is already brighter for it. It would appear the war has ended at last.\n\nThis modifier lasts as long as we are §Gbeloved§! by Maruvarax and are prosperous in all provinces. It may take up to a year to update if we gain or lose prosperity."
 maruvarax_known_death_merchants:0 "Known Death Merchants"
 desc_maruvarax_known_death_merchants:0 "Maruvax has great standing in the Consensus as one of its Dragon Turtles, and he has been moved to travel from his cave to make an important announcement to them. Unfortunately, his announcement is about us. He has informed all of Kanolowele and beyond that our kingdom is run by warmongers, and our rule will only bring pain and death."
 naauao_blind_eyes:0 "Blind Eyes"
 desc_naauao_blind_eyes:0 "It is often said that justice is blind, but lately justice seems blind to just about everything, including the rising tide of corruption across the realm. Naauao says that she has more important cases to judge."
 naauao_no_heir_adm:0 "Naauao Administrative Teachings"
 naauao_no_heir_dip:0 "Naauao Diplomatic Teachings"
 naauao_no_heir_mil:0 "Naauao Military Teachings"
 moiokalakupua_troglodyte_command_chains:0 "Troglodyte Command Chains"
 desc_moiokalakupua_troglodyte_command_chains:0 "The quality of our military command these days is appalling. Moi’okalakupa said that he was going to send us a “special crop” of graduates, which at the time was exciting but now seems like more of a practical joke. Our officers can barely manage to command themselves; perhaps we should flip the structure of the military so that the men tell the officers what to do."
 moiokalakupua_merit_of_the_worthy:0 "Merit of the Worthy"
 desc_moiokalakupua_merit_of_the_worthy:0 "The graduates of the warrior academy of Moi’okalakupa are always feared on the battlefield, but the graduates we’ve received back from them these days seem to be the best of the best- their commands move like water, but strike with the fury of a typhoon."
 haomake_purged_administrators:0 "Purged Administrators"
 desc_haomake_purged_administrators:0 "The Judges of the Consensus have begun finding the people who make the country run guilty of crimes at an alarming rate. These convictions are never incorrect per se, but they’re always based on the strictest and most technical interpretation of the law possible, even when common sense would dictate otherwise. This is surely the work of Hoaomake the Immovable."
 haomake_iron_administrators:0 "Danse Macabre"
 desc_haomake_iron_administrators:0 "We all will die someday, but there is work we can do in this world to give ourselves comfort with the idea of death. Hoaomake has been working with our ruler and our people to help them, and he says that death itself has agreed to be kind to us."
 makaoioi_academic_nadir:0 "Academic Nadir"
 desc_makaoioi_academic_nadir:0 "These are dark times for the thinkers of the nation. They have begun to move away, one after the other, and none of them will say why, except that there is a gloom that hangs over the institutions of learning here. The farewell letters they write are always in different scripts, but they share a voice: Makaoioi’s voice."
 kahuzaie_omnimalicious_sanctions:0 "Omnimalicious Sanctions"
 desc_kahuzaie_omnimalicious_sanctions:0 "Kahuzai’e has a great amount of influence abroad, and now she’s using it to impose severe commercial penalties on any firm that would trade with our nation. Some merchants have decided it is worth the risk regardless, but they are charging us exorbitantly for the privilege."
 kahuzaie_favorable_credit_lines:0 "Favorable Credit Lines"
 desc_kahuzaie_favorable_credit_lines:0 "Kahuzai’e is highly tapped into the network of moneylenders across Insyaa, and she’s called in a few favors to secure us access to their prime lending rates."
 hokieal_perilous_seas:0 "Perilous Seas"
 desc_hokieal_perilous_seas:0 "The sea near the Kiamoa is a dangerous place, but especially so for us. On each of her excursions, Hoki’eal scans the horizon for our ships with hateful eyes, and most of them do not make it back. It is usually the cowards who survive, and our naval tactics have suffered for it."
 hokieal_kiamoa_scrapers:0 "Kiamoa Scrapers"
 desc_hokieal_kiamoa_scrapers:0 "To sail next to the Kiamoa, a navigator has to be a warrior just as much as a skilled pilot. But Hoki’eal has taken a special liking to us, and she has escorted our ships on daring excursions into the Kiamoa again and again. The captains that make it out feel ready to sail through anything."
 iehu_molten_rain:0 "Molten Rain"
 desc_iehu_molten_rain:0 "Evocation is a precise magical discipline, which takes years of effort and study to learn. Currently, Iehu the Burned Shell is using his years of effort and study to summon clouds of burning rain across the land, which char any of our soldiers foolish enough to step outside to a crisp."
 iehu_master_of_flames:0 "Master of Flames"
 desc_iehu_master_of_flames:0 "Like any magic, evocation magic becomes infinitely easier to cast with the right technique, and Iehu’s technique is the best of all. He has become convinced we are a force for justice, and so he has shared his teachings with a select few of our mages, so long as they promise never to speak of them."
 iehu_against_the_odds:0 "Against the Odds"
