l_english:
 zerat_consolidate_the_manors_title:0 "Consolidate The Manors"
 zerat_consolidate_the_manors_desc:0 "The benefit of having a family tree as deep-rooted as ours is that there is always someone to call on in times of need. During our recent perils, we drew on both our network of family connections and our vast reserves of pristine jungle land to ensure that we had the funds to fight on in the war against Rayaz.\n\nBut now that times of peace have returned, it is time to reclaim from the minor houses of the Scaleguard dynasty what we have issued them, whether through persuasion or somewhat more forceful means."

 zerat_defending_taneyas_title:0 "Defending Taneyas"
 zerat_defending_taneyas_desc:0 "Unfortunately, part of being responsible for the welfare of Taneyas is protecting it from the humans, who seem to have gotten even rounder and sweatier since we last interacted with them. Despite their sad, flabby appearances, however, the humans can pose a great threat when they amass in large numbers, necessitating that we take a stand against them to prevent their incursion into our lands.\n\nAt some point, we will have to venture forth from our jungle to recover the Zatsarya of our ancestors at Irikin, which the humans are currently using as some form of toy. Today, however, is not that day. We have just begun to recover our status in Taneyas, and for now we must content ourselves with building a great line of forts,both to defend us against the humans and to serve as a starting point for a future invasion."

 zerat_oust_the_dragon_title:0 "Oust The Dragon"
 zerat_oust_the_dragon_desc:0 "There have been many, many empires in the past that have been brought down by the dragons. Over the history of our race, the wretched dragons have done nothing but burn our cities, destroy our fields, and kill our young. They brought us war, and when we responded they wreathed the best of us in flame. We would hate them, if hatred was something that was not reserved for equals.\n\nUnless the 333rd Empire comes on dragonback we will not share the fate of our brethren, but nevertheless it is our duty to rid the world of threats before their fated rule. To our west in the mountains lies the state of Aramoole, which is composed of humans who worship one of the dragons. Although these humans would be no threat normally, humans led by a dragon are another matter entirely; we must direct our resurgent empire to eradicating Aramoole before their bronze dragon arrives to wage war against us.\n\nOnce we are victorious we can turn our attention to making sure the lands that were once Aramoole are incorporated into the empire, and that the followers of the dragons never pose a threat again."

 zerat_the_western_plains_title:0 "The Western Plains"
 zerat_the_western_plains_desc:0 "The full glory of the 332nd Empire is ours once again, but with the privileges of imperium come its responsibilities as well. The greatest minds of lizardfolk statecraft know that an empire does not have allies: it has rivals, enemies, and subjects. The further we range from the jungles of Taneyas, the more our ability to project power wanes, and yet we must protect the Zatsarya at Irikin from the covetous eyes of the humans of Horashesh.\n\nIt would be too costly to project power into Horashesh ourselves, and we must maintain some grip over it to protect Taneyas and Irikin from our enemies. Thus, we must subjugate our enemies in the region, delegate them to administrate Horashesh in our name, and keep them on a tight leash. Once our new subjects are sheltered under our protection, they may even thank us for the privilege."

 zerat_resparking_our_grudges_title:0 "Resparking Our Grudges"
 zerat_resparking_our_grudges_desc:0 "In the days of the Anzara Empire of old, we struggled for glory against the human realms. Our quest for absolute supremacy did not end the way we had hoped, but in the process, our empire developed a long and cultivated hatred of these foes to the north. In our long twilight period we did not encounter much of the northerners, but when we emerged ready to satisfy our grievances, we discovered that these ancient foes had committed the worst offence against the Anzara Empire that they could have: the bastards died.\n\nBeyond the veil of death, such foes are now beyond our reach. Their descendants struggle against gnolls and themselves, and these children appear to have forgotten us entirely. We should remind them what they once feared. We will send bands of warriors to their lands to rekindle this ancient hostility, so that when they page through their history books they will be reminded of the wrongs their ancestors inflicted on us."

 zerat_the_fangaulan_march_title:0 "The Fangaulan March"
 zerat_the_fangaulan_march_desc:0 "Outside the lands of Taneyas, we keep hold of our empire through the brutal application of force. While this is highly effective, force often begets force, necessitating deft diplomacy to keep our subjects weak and at each others’ throats. At times, it also necessitates the redrawing of borders.\n\nIf we were to place all of Fangaula under the rule of one state, it could rise to become a threat to not just us, but to the entire system we use to extend our reach over Sarhal. This is why, as we establish ourselves in Fangaula, we must take great care to keep them crippled and weak. Kunulo will remain under our control, and we will induce the loyalty of our vassal in Horashesh by granting them new lands to rule over as we rule over them."

 zerat_assemble_the_court_title:0 "Assemble The Court"
 zerat_assemble_the_court_desc:0 "The war has forced certain privations on the entire empire, not least of which is the drastic drop in standard of living suffered by our court and its courtiers. For a people such as ours, that place such value on art, beauty, and expression, it has been a slow, cruel starvation. We have been forced to devote such funds to destroying the enemy that we could not even stop to properly depict their downfall.\n\nRebuilding the court of the empire must now be our foremost priority. Yet even as the war took from us, it has given us certain opportunities as well. If we are to be forced to construct an entirely new royal court, let us make sure all within it are loyal."

 zerat_revive_our_lake_title:0 "Revive Our Lake"
 zerat_revive_our_lake_desc:0 "Without the benefit of our wise and reasoned rule, our beloved Lake Lasadza has fallen on hard times just as we have. The Riverclaws of the west have sailed out from their rivers to plunder her shores, and the noble lizardfolk that once lived upon its shores have been driven from their homes by the devastation of Rayaz’s war and subsequent mismanagement. By demand of proper statecraft and as a matter of imperial pride, we must restore the shores of Lake Lasadza to their former glory."

 zerat_towards_our_spire_title:0 "Towards Our Spire"
 zerat_towards_our_spire_desc:0 "Of all the wrongs that have been done to us, the seizure of the Zatsarya at Irikin was among the worst. We were humiliated by the Kheteratans, who were but savages living in caves when it was first constructed. Since then the humans have assembled something almost resembling society, but their base worship and crude possession of the Zatsarya that rightfully belongs to us still rankles. By recapturing itn, we will achieve not just a great victory for the Anzara Empire, but for all lizardfolk."

 zerat_our_spire_once_more_title:0 "Our Spire Once More"
 zerat_our_spire_once_more_desc:0 "Our troops have marched upon the city of Irikin, and were completely unsurprised to discover that not only did the humans fail to treat the Zatsarya they held with the appropriate respect, but their presence has actively demeaned it. It will be necessary to reconstruct the city of Irikin from scratch.\n\nBurning down the flimsy shacks the humans have constructed around our Zatsarya should give us the necessary space to build. There are any number of loyal lizardfolk who would sacrifice anything to live near the newest Zatsarya in the resurgent Anzara Empire, and these are the lizardfolk who will construct the military facilities necessary to prevent it from falling into enemy hands ever again."

 zerat_the_highland_khets_title:0 "The Highland Khets"
 zerat_the_highland_khets_desc:0 "If Anzara is ready to take vengeance on its enemies once again, the first of these enemies to suffer our wrath must be the Kheteratans. We have had minimal contact with their territories in the last century, but it is the understanding of our rapidly developing intelligence that they still worship the mammalian patrons of the river by sailing boats up and down it. The reports indicate that said patrons are as indolent as ever.\n\nOur lands are far away from their river and their boats, and their civilization is too weak to respond were we to strike out from Taneyas to take what is ours. At the same time, the loyal sons of Anzara cannot be expected to scratch out an existence in the barren mountains so close to Kheterata: the best policy here is one of conquest, subjugation, and vassalage."

 zerat_zerats_glory_title:0 "Zerat's Glory"
 zerat_zerats_glory_desc:0 "What is the capital of the 332nd empire?\n\nAt times, the answer is Shalazar, but for all the grand and ancient splendor of that place, it is not where the heart of the empire lives now. At others, the answer is Karassk, but even the grand dockyards and prosperous market towns of that place do not truly speak to the heart of Anzara.\n\n No, the capital of our empire is a city by the lake, which is as grand as the Zatsarya soaring above it and as loyal as the tchoken in its pastoral farms. The capital of our empire has never abandoned Anzara, even in its darkest moments. Its faith radiates from it like a glowing light, and inspires an unshakable sense in all of its citizens that, at least in part, our imperial glory belongs to them. Anzara has many great cities, but its capital is Zerat."

 zerat_across_the_plains_title:0 "Across The Plains"
 zerat_across_the_plains_desc:0 "As we fought with the Kheteratans across centuries, neither of us could muster the raw force to destroy the other. While some of this was due to fierce resistance on our part and base cowardice on theirs, it was also due to the vast plains of Gol, which stretch long distances between our lands.\n\nTo threaten their river and kill their gods, we must extend control over the plains of Gol. This will also serve as an opportunity to set up an administration which will rule over the lands in our stead, so we do not have to dirty our feet with their soil."

 zerat_the_rivals_of_the_jungles_title:0 "The Rivals Of The Jungles"
 zerat_the_rivals_of_the_jungles_desc:0 "While most of Fangaula is not worth concerning ourselves with, there are certain places that the Fangaulans have developed into sprawling metropoli. These are the cities from which the ancient Fangaulans once issued their orders, and it is fitting that, having cemented our superiority over them, we take their greatest works for ourselves.\n\nBeyond that, our ancestors saw fit to grace the shores of Fangaula with several Zatsarya- although we do not know why they could not have done this closer to home, we still are bound to control them both to honor their memory and to aid the ascent of the predestined 333rd Empire. As for the rest of Fangaula, it can remain under self-governance, so long as it pays proper tribute."

 zerat_the_rival_of_the_past_title:0 "The Rival Of The Past"
 zerat_the_rival_of_the_past_desc:0 "The Kheteratans are a greedy and avaricious people, as we have discovered in our long years of living to their south. Their appetite for land, wealth and power is insatiable. Although they may find us too strong a foe at first, if left alone they will war against the border realms to build their strength. From there, they will cast their roving and decadent eyes south.\n\nThe time to take them on is now. Not just to avenge untold years of wrongs, but to make the world a safer place for the 333rd Empire. We will show their gods what happens when they try to prevent what is fated to be."

 zerat_rallying_loyalists_title:0 "Rallying Loyalists"
 zerat_rallying_loyalists_desc:0 "Our heart has been ripped out, and we have been deserted by traitors and cowards. Rayaz may have backed us into a corner during the war, but the good thing about having our backs to the wall is that there is nothing left to do but fight. We will devote all the wealth and lives in our empire to doing so.\n\nTo exact vengeance on Rayaz, we will need an army behind us and commanders to lead them. While the Riverclaws of Rayaz marvel at the glory of our spire, we will use their distraction to marshal our forces required to take permanent revenge against the injustice they have done us. With our backs against the wall, we will spring forward, and when Rayaz rushes to meet us we will claw out their eyes."

 zerat_to_defy_fate_title:0 "To Defy Fate"
 zerat_to_defy_fate_desc:0 "In these trying times, we have relied on the naga for prophecy and guidance against the backwards, savage people of Rayaz. They have borne our dire position with startling equanimity, serenely confident that there is life in the Anzara Empire yet.\n\nThe naga are sparing with their interpretations, but one hardly needs the gift of prophecy to understand their meaning now: it is not our time to die. The chronicles of the lizardfolk are full of glories of the great empires of the ancient past that interlopers upon our great tradition cannot hope to rival. Even if we are outnumbered, beset on all sides, and exiled from our home, the words of our prophecies mean we cannot lose. We have constructed a grand battleplan, and it is time to put it to use. We will show the nation of Rayaz what it means to defy fate."

 zerat_reclaim_our_home_title:0 "Reclaim Our Home"
 zerat_reclaim_our_home_desc:0 "It would be an understatement to say that the war has been long and hard, but at long last we have returned to our rightful place in Zerat. The empire’s enemies have left it in just as squalid a state as their own lands; let us prove our superiority over them in peace, just as we have in war, by rebuilding our capital to surpass theirs.\n\nOf course, this period of reconstruction must address not just the physical decay of the empire, but its institutional rot. Through the entire war the naga have hoarded their gifts for personal enrichment and gain in petty political struggles. As we embark on our grand reconquest of Taneyas we must not suffer weakness or disloyalty, least of all from the naga. After all, embezzlement just as surely as tyranny exhibits tsishagya, the madness of the one."

 zerat_end_the_pretender_title:0 "End The Pretender"
 zerat_end_the_pretender_desc:0 "When Rayaz slithered from their wretched jungle to make war upon our lake, they thought to reduce us to a state even less than theirs. Instead, we have crushed them underfoot. This is a fate from which they might have saved themselves, had they even the slightest knowledge of prophecy, for it is known that only the foretold 333rd Empire can vanquish us.\n\nThe only thing which remains is to inflict upon them the suffering which they thought to inflict on us, and perhaps then some beyond that. We are the rightful rulers of these lands; who could fault us for a little self-indulgence?"

 zerat_the_city_of_the_south_title:0 "The City Of The South"
 zerat_the_city_of_the_south_desc:0 "At some point, all the trade that comes into and out of the civilized lands passes through the city of Karassk. Our cousins in the Karassian Polity are in a state of decline, and are not fit to control such a jewel of lizardfolk society themselves. From the lands we conquered from the lizards who were once the Riverclaws, we will sweep south and bring the city of Karassk under our rule once again. From there we will reap the treasures of the coast and all the tariff revenue we could ever desire."

 zerat_the_empires_return_title:0 "The Empire's Return"
 zerat_the_empires_return_desc:0 "Once, we were the Hegemons of Taneyas, the Antsakirak of the Lizardfolk, the centre of our civilization. Many said our decline was inevitable, that we were fools for accepting the mantle of the penultimate empire. They sat by and watched as our empire deteriorated, they sat by as the various successor states fell into their petty squabbles and they sat by as the Ashhana invaded. For a long time, we were noted in “official” documents of the successor states as Zerat, as opposed to our true title of Anzara, as if we were a mere memory to be banished.\n\nNo longer will we suffer the denial of our true title; no longer will lesser states be able to claim equal dignity to us; no longer will the name of Anzara be a mere footnote in their history."

 zerat_establish_the_capitals_title:0 "Establish The Capitals"
 zerat_establish_the_capitals_desc:0 "The virtues of a kingdom are singular. The virtues of an empire are manifold. We possess not one great capital but three: Zerat, Shalazar, and Karassk, all of which have long held precedence over other cities of the Empire. It is time to make this official.\n\nIf the Anzara empire stands above all other empires in the world, why should it be limited to one capital? With three centres of governance, we can move our court from one region to another in response to goings-on in Anzara and the world at large both. This way, the court and our regional administrations will never grow complacent, and we will be ready to take advantage of opportunities as they arise."

 zerat_karassks_control_title:0 "Karassk's Control"
 zerat_karassks_control_desc:0 "What is the capital of the 332nd empire?\n\nAt times, the answer was Shalazar, but the great city certainly could not have generated the funds to refurbish itself. At others, the answer was Zerat, but faith alone cannot inspire imperial armies to march forth and conquer.\n\nThe capital of our empire is a city on the sea, with the ships in its harbors more numerous than the stars. We left it alone for a time, and it prospered beyond our imagination: it built routes across the sea and was the seat of a line of great but reckless kings, but the power on the sea granted by its great navy can only truly be harnessed by an Emperor. From the seat of our capital, money radiates across Taneyas to build dreams and fund masterworks. Anzara has many great cities, but its capital is Karassk."

 zerat_the_noble_adventurers_title:0 "The Noble Adventurers"
 zerat_the_noble_adventurers_desc:0 "In far away lands, there are groups of marauding do-gooders who parade across the land killing monsters. In recent years some of these adventurers have come to our lands, only to discover that our dominion over the natural world means their services are not needed. And yet, they quest down our rivers in search of illusory sources of ancient treasure, and brainwash our people into seeking their fortunes abroad.\n\nThis is obviously an administrative problem, and these adventurers have had it far too good for far too long. If we need the services of monster slayers, we will call our nobility, who have been vetted across generations for the purity of their blood and their devotion to our state."

 zerat_the_eternal_cities_title:0 "The Eternal Cities"
 zerat_the_eternal_cities_desc:0 "When the Eternal Empire arrives and brings with it its promised era of abundance and glory, we hope that they will not have much to improve. If they are to rule from great cities, they will find that those cities have already been constructed for them: they can worship from Zerat, rule from Shalazar, and launch great fleets to trade and war from Karassk.\n\nIn the days before their arrival, these cities are ours, and we must improve them as we are able to ensure that when the final empire comes, they look back on their predecessor with respect."

 zerat_the_final_arbiter_title:0 "The Final Arbiter"
 zerat_the_final_arbiter_desc:0 "Many thought our empire ceased to be with the Shadowfang Invasion, that the failure of Teranak III’s expedition and its dire consequences would see our downfall and the Final Empire’s rise. And though we lost our original capital, though many states broke away, we held strong in Lasadza.\n\nMany thought that Rayaz would end our empire, that the naga had finally found one worthy to lead the Final Empire; they all thought that the fall of Zerat sealed our end. But we knew that he wasn’t worthy and we proved that to all.\n\nPerhaps one day the naysayers will be correct and our empire will end, but fate alone decrees such things - onlookers do not."

 zerat_the_ashhana_threat_title:0 "The Ashhana Threat"
 zerat_the_ashhana_threat_desc:0 "The Anzara Empire once stretched across the entire civilized world and beyond. It is therefore fitting that the great tribulation which led to our downfall so long ago came from beyond civilization. While we were weakened by disease and civil war, the Ashhana spilled over from their Shadow Swamp to spread their rot to our lands. It is a rot that, to this day, we still have not managed to excise.\n\nWe will not suffer their presence in the lands of the Empire any longer. Let us retake what is ours!"

 zerat_our_most_loyal_lords_title:0 "Our Most Loyal Lords"
 zerat_our_most_loyal_lords_desc:0 "When the world seemed to be falling around us, many were seduced by the promises of the enemy; that defectors might be able to eke out some wretched existence in their empire, far from their mismanaged capital. The lords of Akhanekas and Katsanada were not among them, for they knew as well as we that it was not yet our time to fall.\n\nEven so, our return to glory and triumph over the weakling newts of Rayaz has been swifter than any dared hope for, including them. Let us support our lords in success just as they supported us in our time of travails, both to reward them for their valor and to show others the fruits of loyalty."

 zerat_remove_the_riverclaws_title:0 "Remove The Riverclaws"
 zerat_remove_the_riverclaws_desc:0 "Unfortunately for Taneyas, the mother that spawned Sykar Riverclaw did not repent for her mistakes after his birth, and there are yet more Riverclaw siblings to be dealt with as we reclaim our rightful lands. If we do not make an example of them quickly, the dissidents who managed to escape consequences during the fall of Rayaz may unify under the banner of one of the lesser Riverclaws and pose a threat to us once more.\n\nFor this reason we must go west with haste to reunify the lands of our enemies under our rule once again. We will make their people our own, and strike the name ‘Riverclaw’ from history forever."

 zerat_control_the_rivers_title:0 "Control The Rivers"
 zerat_control_the_rivers_desc:0 "Any great empire knows that roads are power: they facilitate the movement of troops, the collection of taxes, and the development of trade. We are very fortunate, then, that Taneyas has blessed us with a network of ready-made roads in the form of its numerous rivers, especially given the difficulty slashing through the underbrush would pose.\n\nAs we continue our great reconquest, we must focus on the commercial opportunities provided by unified control over the rivers of Taneyas. It is important that we make the rivers into a system of transport worthy of an empire - if we develop the great markets and centres of trade along the waterways, the merchants of the empire will do the rest for us."

 zerat_the_former_capital_title:0 "The Former Capital"
 zerat_the_former_capital_desc:0 "The city of Shalazar is not much to look at after centuries of neglect, but in every crevice and abandoned building, it holds a kind of faded glory. The city reminds us of ourselves, not so long ago.\n\nThere is a reason for this, of course: that glory is ours. Zerat is our home, but Shalazar is the rightful capital of the 332nd empire, from which we reigned until we were cruelly pushed out of it by our enemies. Even now, looking upon the ruins carries a peculiar kind of pain for all we have lost. But now, we must turn to the task of reclaiming our glory, in every last sense and with interest.\n\nShalazar is a once glorious thing that could be made so again. It is easier to recover greatness than it is to cultivate it, and with the appropriate amount of money and manpower we can fashion ourselves a capital made in our own image, exactly where it is supposed to be."

 zerat_shalazars_prestige_title:0 "Shalazar's Prestige"
 zerat_shalazars_prestige_desc:0 "What is the capital of the 332nd empire?\n\nAt times, the answer is Zerat, but we cannot exercise control through the conviction inspired by our Zatsarya alone. At others, the answer is Karassk, but money cannot buy glory.\n\nThe capital of our empire is a city to the far east, where our story began. We made the lands of Shalazar the centre of the civilized world, and then expanded the city into something completely our own. The orders from our capital are felt across continents, and its people are steeped in both knowledge of the past and anticipation for the future. Anzara has many great cities, but its capital is Shalazar."

 zerat_our_eastern_spire_title:0 "Our Eastern Spire"
 zerat_our_eastern_spire_desc:0 "To the far east, even farther east than Shalazar, lies a ruined Zatsarya that is not under our control. We would not debase ourselves by tinkering around with rubble, but the humans that live beyond the civilized lands have taken it over and made it a sort of base of operations. Of course, the humans know not the significance of where they have built their treehouse. This Zatsarya once marked the eastern reaches of the Anzara lands, and when we held control of it, we venerated our ancestors in the proper way.\n\nUntil now we have had far more important things to occupy us, but as the predecessors of the 333rd Empire, we must make sure everything is perfect for their ascent. This includes extending control over all the Zatsarya, ruined or not. We must teach these humans a lesson about playing with the great monuments of their betters."

 zerat_the_rivals_of_the_seas_title:0 "The Rivals Of The Seas"
 zerat_the_rivals_of_the_seas_desc:0 "There are yet Baashiidi who live outside our reach. Their trade does not route through our empire, and their dockyards are not beholden to us: this is unacceptable. The 333rd Empire cannot suffer any rivals to its mercantile or military endeavors, and Karassk must stand without question as the grandest port on the Adzalaz Gulf.\n\nGiven that the Final Empire has not arrived to teach these Baashiidi the dangers of reaching too high, we will have to do it ourselves. In the end, every man, woman, and child in their lands will pay tribute to our vassal king, and we will be free to return to the jungle."

 zerat_the_rival_of_the_future_title:0 "The Rival Of The Future"
 zerat_the_rival_of_the_future_desc:0 "The world is a changing place, and one of the most unpleasant developments that has taken place over the years of the Anzara Empire is the Mengi. We know little about them- merely that they worship rain, and reportedly once consorted with dragons, which would be enough to order their subjugation even if they did not pose a threat to Anzara rule.\n\nIf they are given enough time to develop, the Mengi might coalesce from the collection of backwards tribes they currently constitute into a power that could threaten us. It is impossible to say when the 333rd Empire will arrive, after all - though humans are not especially quick on the uptake; given enough years even the Mengi might amount to something. Let us prevent this now. If all the spare wealth of the Mengi flows into our coffers and their people are driven underfoot, we will remove a threat to the rule of the 333rd Empire and enrich our treasury at the same time."

 zerat_the_lands_reclaimed_title:0 "The Lands Reclaimed"
 zerat_the_lands_reclaimed_desc:0 "In the wake of our triumph over the Ashhana, we have taken great care to purify their lands so that their brutish demeanor does not infect the pure lands of Taneyas any further than it already has. But though their desecration of our lands is a great crime, it pales in comparison to what they have wrought in Metat Tagokag to the Zatsarya of our ancestors.\n\nIt stands at the edge of their toxic swamp, and the Ashhana have, through their fell rituals, infested it with the same evil that pervades all their lands. Even the naga, tasked with preservation of all our civilization, say that this is an evil place that we must take care to avoid. But we grow more jaded with the naga as of late, having seen traitorous naga and loyal alike. We will purify the lost Zatsaryajust as we have purified their lands."

 zerat_prepare_our_vengeance_title:0 "Prepare Our Vengeance"
 zerat_prepare_our_vengeance_desc:0 "The resurgence of our empire has been grand, but it is made bitter by the simple fact that the invaders who cast us down in the first place still live and prosper. To the east, a great many Ashhana have settled our stolen land, thinking themselves safe as they grow food in our fields and drink from our rivers. This injustice cries out for remedy! We will mete out to the Ashhana the justice they thought they had escaped, and then we will drive them back into their wretched swamp."

 zerat_avenge_the_shadowfang_title:0 "Avenge The Shadowfang"
 zerat_avenge_the_shadowfang_desc:0 "Our meticulous preparations in the Ashhana lands we have already reclaimed have given us the army and infrastructure we need to destroy the Ashhana in one fell swoop. But beyond that they have inspired a new wave of emotions in the people of the Anzara Empire. The lamentation our ancestors felt as they were driven from our rightful lands has been replaced by the joy and anticipation of knowing that justice will soon be done.\n\nThe shame born by every Anzaras at knowing we could not save our brothers has been replaced by jubilation, for we know the land they died for will soon be free at last. Even more than the land we reclaim from the Ashhana, this invasion is to reclaim the most precious thing the Shadowfang Invasion took from us: the dignity of empire.\n\nIt is finally time to send the Ashhana crawling back to their hag masters. At last, after centuries of waiting and planning, vengeance is at hand!"

 zerat_improve_the_compounds_title:0 "Improve The Compounds"
 zerat_improve_the_compounds_desc:0 "At last, we have freed our rightful lands from the control of the Ashhana! Unfortunately, the Anzara Empire is still infested with their ilk, and now we must begin the arduous task of harrying them into the townships we have designed for their containment.\n\nThe compounds themselves were not designed to hold anywhere near the number of Ashhana we have captured. They will likely require refurbishment and upgrades, especially as we direct the compounds to put the Ashhana towards a productive task. Indeed, there is only one productive task the Ashhana are capable of, incapable as they are of overcoming their dark and hateful natures. They will fight as soldiers of the empire as they strive to earn our forgiveness for the terrible harms they have inflicted. We rather doubt they will, of course, but there is no harm in letting them try."

 zerat_the_northern_threat_title:0 "The Northern Threat"
 zerat_the_northern_threat_desc:0 "Beyond the Anzara Empire lies wretched nothingness, but the northern swamps might be most wretched of all. When we last ascended to our current heights, the Ashhana came through the swamp passes to bring us low again. We have taken care of the Ashhana, but the swamp is dark, and full of terrible threats of which we know not.\n\nWhatever is out there cannot be negotiated with. The only options we have are to eradicate the swamp or to be eradicated ourselves, and it knows the same: if nothing else the Shadow Swamp excels at a kind of terrible survival. When the day of the second Northern Campaign arrives, we must be so well-equipped that not a single soldier in the great army of Anzara doubts that we will win. In preparation for that day, we will wait and fortify ourselves, so that if dangers within the swamp move first we will meet them from behind hundred-foot-high walls."

 zerat_our_final_revenge_title:0 "Our Final Revenge"
 zerat_our_final_revenge_desc:0 "The hags are dead! As had been preordained, we marched from Taneyas to destroy our ancient enemy. If the first war against the hags brought us low, the second has returned us to the place atop the world where we belong, and it has returned the hags to the hell of their shadow plane. The dark of their shadow swamp mixes with the dark of the ashes of burned trees even now.\n\nBut to truly reverse the failure of the Shadowfang Invasion, we must deal not only with the hags, but their dark instruments. Without guidance from their masters, the Ashhana are at our mercy. We have done a great amount of damage to the swamp of the hags, but the place is still a misery to inhabit- who better than the hags’ pets to live in it? As they skulk about in darkness guarded from the rest of the empire by a network of forts, perhaps they will learn something about what it means to cross the Anzara empire. If this fate of theirs causes them suffering, and if their children cry for deliverance from the sins of their parents, that will merely be a bonus."

 zerat_the_southern_threat_title:0 "The Southern Threat"
 zerat_the_southern_threat_desc:0 "Since we last ruled from Shalazar, the humans to our south have learned something of the secrets of trade. Their knowledge pales to ours, of course, but it is still the case that commerce is about location, and their place at the crossroads of southern Sarhal has made them very rich.\n\nFor a long time, they have concerned themselves with internal matters and commercial development, but once they have outgrown their lands they will look outwards, whether it is to us or to the 333rd Empire. We must strangle the Baashiidi in their cradle so that this does not come to pass, and replace them with humans who are more attentive to the natural order of things."


 #Events
 flavour_zerat.1.t:0 "The Aftermath"
 flavour_zerat.1.d:0 "In very many ways, it is hard to be 332nd. We have always known our role was to be the door through which the promised golden age arrived, but until now we have not had to reckon with the true implications of that idea. For there to be a 333rd Empire, there must not be a 332nd, just as the 332nd cannot coexist with the 331st. A millennium of rulers comforted themselves with the thought that the dissolution of the 332nd might be peaceful, controlled, or any number of other pleasant fictions - we have no such luxury, having been reminded of the reality of force by our neighbors in Rayaz.\n\nBut despite the circumstances in which we find ourselves, there is nothing to do but to fight on. When the 333rd Empire comes to pass, our dissolution will be immediate and total in the face of their glory. Yet we have seen the imperfections of the enemy in thought and in deed. The fact that we live means that we must still fight: Rayaz cannot be 333rd. They are unworthy. We know it, and they know it, and yet they pretend to a mantle which they cannot comprehend. They grasp at glory, in the hopes they might be seen as something other than the squabbling children they are.\n\nIf our capital, the spire by the two lakes, and even our pride have been taken from us, this means that we must cling to our place in prophecy - it is all we have left. Until the last soldier in the last bastion of the Anzara Empire has shed his last drop of blood, we will fight not just for ourselves, but for the honor and the glory of the fated 333rd Empire."
 flavour_zerat.1.a:0 "We will persist"
 flavour_zerat.2.t:0 "The Wind Has Died"
 flavour_zerat.2.d:0 "If it is better to die with honor than live in supplication; a chance at glory is better than the surety of shame and regret. Under this principle, we assembled a great army with the last coins of the treasury of our empire to go and retake what is ours.\n\nDespite the valiant efforts and overwhelming support of an entire empire, we appear to have failed in our task, and the soldiers who fight for us lose a bit of their righteous fervor every day. As their hopes of one day living in the world’s greatest empire wither, so do we - it was only through their hope and the last remnants of summoned strength that we have been able to fight on so long against such overwhelming odds. It appears as though it will be shame and regret for us after all."
 flavour_zerat.2.a:0 "There's nothing we can do"
 flavour_zerat.3.t:0 "The Race Against Ourselves"
 flavour_zerat.3.d:0 "The mood within Zerat is triumphant; our rightful capital of Zerat is once more in our hands, the emperor resting in the shade of its great Zatsarya for the first time since 1444. Our returning nobles are already hard at work organising celebrations, while the residents of the city relax knowing that the terrors of Arrakasay rule are over. To everyone, this is a victory for us, a signal that we will once more be a defining player in lizardfolk politics and a sign that Sykar is a false prophet. In the short term, Anzara stands triumphant.\n\nBut we cannot help but look to the future. Those who supported us even during Sykar’s rise may have proven their loyalty, but we would be fools to trust in our recently reclaimed lands. Whether they are recently appointed Arraksay nobles or traitors who sided with Sykar over their true emperor, many of these lakefolk have gone against us in the past and likely will do once more, should we show any signs of weakness.\n\nAnd thus stands our greatest dilemma;  our position as the rightful rulers of Taneyas is our greatest strength and our greatest curse. We can press and control claims far more easily than most  - the lands are rightfully ours, after all - but only if we can keep our pace of conquest going, snuffing out any future claimants to the mantle of the 333rd Empire before they assert a coherent claim. Should we stumble, show any weakness or even hesitancy, those who turned on us once  will do so again, and all we have worked for will crumble. But we will rise once more, even if our end is inevitable, for giving in is a betrayal of our duty to prove the final empire’s legitimacy beyond a shadow of a doubt."
 flavour_zerat.3.a:0 "And so, we fight on"
 flavour_zerat.4.t:0 "Sack of Rayazaz"
 flavour_zerat.4.d:0 "At one time, the land of Rayazas was filled with many rare and wonderful things, as befit the capital of a great empire. Crown jewels, records from early antiquity, works of art from the greatest artists of a civilization spanning millennia - Rayaz had all these things and more. But as the rulers of Rayaz admired their fine treasures, there was something they would not admit. They took it all from us.\n\nOnce they stole the products of our civilization, they did the same with them as they did with our lands when they took those: they sullied them with their covetous staring and their rancid presence. This leads to a natural question - why did they take what is ours? Perhaps they wished to emulate some squalid version of our great empire through worship of our possessions. Perhaps they wished to cause our patriots anger and pain. Perhaps they took them just to take them - it does not matter now.\n\nThrough blood, might, and will, we have set things right. Now we will have our treasures back, and more. Now it is our turn to take."
 flavour_zerat.4.a:0 "Squandered no more"
 flavour_zerat.5.t:0 "An Old Enemy"
 flavour_zerat.5.d:0 "The empire hates both dragon worshippers and Kheteratans, so it is to the great misfortune of the land of Aramoole that they happen to be both. We have sent our troops to the city by which the land is named, and we have instructed them to give two gifts to our new subjects.\n\nFor sheltering like weaklings under the wings of a dragon, we will give them a taste of their beloved fire. As we have no dragon fire, as they would no doubt most enjoy, the torches of our soldiers must suffice: we will burn the city of Aramoole to its foundations, and we will take the riches they have dedicated to their protector, a small fee for giving them the fire he could not supply. \n\nOur second gift will be to return them to their land of origin, free of charge. Whichever of them survive the bequeathing of our first gift will be sent into the mountains to return to Kheterata, and as an extra kindness we will be sure to tell them which way is north. To cement ties of trade, in exchange for their lives we will take their possessions, which will be given to the lizardfolk who will resettle Aramoole.\n\nIt is possible that some of them will make it back to Kheterat. When they do, we hope they tell their people two things: that the Anzara Empire has returned, and that our generosity is overflowing."
 flavour_zerat.5.a:0 "Let word of our return strike them"
 flavour_zerat.6.t:0 "The Grand Ceremony"
 flavour_zerat.6.d:0 "The Nobles of Anzara pour into court once more, the mood triumphant and our splendor front and centre. Some have known us since we were at our weakest: they are seated closest to us as our most trusted lords and advisors. Some came to know us as the resurgent Empire we have been recently, the ascendant power of Taneyas: unproven loyalties place them further afield, beyond the inner circle. But some had us pegged as a failing state, the echo of the old and an obstacle to be conquered and destroyed. They sit far from power, praying for our mercy for their mistakes. At the heart of the room sits [Root.Monarch.GetName], resplendent as the hegemon of Taneyas once more.\n\nThose outside our court see this as mere vanity; ceremony for ceremony’s sake. Yet we have learnt from our failings. Such pomp isn’t for vanity but to reward loyalty, to show that we are returning to our peak and that we no longer need to bow to the short-term desires of lesser lords. For the first time in centuries, the truly loyal outnumber the disloyal, and we are no longer so easily doubted as before.\n\nWhilst our glory is on the minds of the lords, we cannot help but look outwards, beyond Taneyas and to the future. We may have returned to our full prestige, but we are not immortal, and to neglect our end would be foolhardy. Our purpose remains the same: to prepare Halann for the arrival of the Final Empire. Whether that means building Taneyas into the cradle of civilization it was always meant to be, or preventing any threats from old or new rivals from rising, we will ensure the prophecy remains intact."
 flavour_zerat.6.a:0 "Now let us begin"
 flavour_zerat.7.t:0 "Anzaran Tribute"
 flavour_zerat.7.d:0 "One of the privileges of holding dominion over so many peoples is that it offers us the chance to pick and choose what we need, while making our subjects fight for our blessing. Our subjects have assembled to offer us tribute again, and it is our right as rulers to take what we please."
 flavour_zerat.7.a:0 "Let Us Reap The Wealth Of Our Empire"
 flavour_zerat.7.b:0 "Let Us Claim The Finest Cavalry"
 flavour_zerat.7.c:0 "Let Us Seize The Mineral Of Our Empire"
 flavour_zerat.7.d.1:0 "Let Us Take The Experties Of Our Subjects"
 flavour_zerat.7.e:0 "Let Us Claim The Prosperity Outside Of Taneyas"
 flavour_zerat.7.f:0 "Let Us Take The Mastery Of The Seas"
 flavour_zerat.7.g:0 "Let Us Seize The Wealth Of Our Vassals"
 flavour_zerat.8.t:0 "To Govern All" 
 flavour_zerat.8.d:0 "Governing solely out of Shalazar or Karassk or Zerat may have worked for the various empires long gone, but Taneyas has grown in population, power and wealth immensely under our guidance. Why would a merchant of Karassk listen to a noble of Zerat or a mage of Shalazar, or vice versa?  Each views themselves as the centrepiece, the glorious heart of our great empire; each eyes the others with disregard at best and suspicion at worst.\n\nWe could centralise power into a singular city, forcing all parties to bow to our preferred party. But why should we? Zerat’s ancient Zatsarya now symbolises our resilience and strength, Karassk’s wealth makes possible the armies who keep our subjects in line, and Shalazar’s grand archive and schools of naga wisdom prove and legitimise our ancient heritage. All are essential to Anzara, and abandoning any would cripple us. So instead we shall grant all three cities equal positions, the title of “Capital” a mere honorific that is necessary for where we govern from." 
 flavour_zerat.8.a:0 "Let the triplet capitals rise"
 flavour_zerat.9.t:0 "A Worthy Capital" 
 flavour_zerat.9.d:0 "To say that all things arrange themselves around us by conscious intent would be imprecise. The Anzara Empire is the pivot of the world not because we ordained it so, but because it could never have been otherwise.\n\nThis imbues our choice of capital with yet greater significance. Our chosen city is not merely to be a centre of command: it is to be the heart of hearts. Which of the three cities shall the world be made to turn around?" 
 flavour_zerat.9.a:0 "The City of the Spire"  
 flavour_zerat.9.b:0 "The Heartland of the East"  
 flavour_zerat.9.c:0 "The Ancient City"
 flavour_zerat.9.d.1:0 "Nevermind"  
 flavour_zerat.10.t:0 "The Second Northern Expedition" 
 flavour_zerat.10.d:0 "Our greatest failure has never left our mind; even when pushed from our final Zatsarya we never forgot the disappearance of Teranak III, the Emperor of Anzara who took all of our strength north to rescue a trapped tribe of lizardfolk and never returned. Centuries later the Ashhana emerged during the Shadowfang Invasion, eternally cementing the Shadow Swamp as our empire's bane. In the wake of the invasion, our Emperor was slain and our empire split in half for almost a millennium. The looming Ashhana, ever east of Ichiadza, have long been a bitter reminder of Teranak's failure, but it's becoming more and more apparent that the swamp to the north is stirring to. Not only are we beset by hag subversion, but the swamp trolls in thrall to the Coven grow ever more active, amassing again and again at our border and conducting terror raids once more.\n\nIn recent times, we have fortified the border to the north to protect us against their influence, concentrating our defences around the reclaimed Zatsarya at Metat Tagokag. We have hesitated to repeat Teranak III’s folly by committing expeditionary forces further north. But we can no longer let the failures of the past deny our safety in the present; whether we like it or not, a second Northern Expedition seems increasingly inevitable if we are to prevent the Shadow Swamp from consuming Taneyas. Our people may have feared for the worst upon the announcement, but now we can seize the chance to seize true safety, once and for all." 
 flavour_zerat.10.a:0 "We shall seize our rightful revenge"
 flavour_zerat.11.t:0 "Our Final Revenge"
 flavour_zerat.11.d:0 "We have long feared what lay to the north. Teranek III’s failed expedition may have haunted us, but the Ashhana turned that low lying fear front and centre, scarring our empire beyond repair for a millennium. Yet now we stand in control of these darkened lands, the threat they pose to us, and thus the eternal empire, vanquished forevermore.\n\nSimilarly, we have long feared the Ashhana, feral mockeries of our people who tore through Taneyas and sacked the once great city of Shalazar. But now they have been pushed into the corners of the great Jungle, the terrors who once ruined us declawed and forced to work for us.\n\nDespite all we have done to make the Ashhana pay, they are still not suffering to the degree they inflicted upon us, to the degree that they deserve. And we have now acquired a vast and dark swathe of land where the Ashhana can rot, away from our pure jungle in a land of corruption and decay.\n\nThe current inhabitants can stay or flee, we care not for the trolls or those they have kidnapped. Most are choosing the latter, but reports of a few choosing to stay and even help us with trapping the Ashhana. Yet whether we get helped or not, the strongest and vilest will serve in our armies, the rest will rot forever in a land of Darkness"
 flavour_zerat.11.a:0 "And even for an eternity, it will never be enough to pay their debts"
 flavour_zerat.12.t:0 "The Wealth of the South"
 flavour_zerat.12.d:0 "We do not have much interest in directly administrating the world outside Taneyas, so it is fortunate that the world has decided to come to us.\n\nThrough our control of the port of Karassk, the finest goods of the known world filter into Taneyas to trade, and we have hardly had to lift a finger beyond providing a garrison for the port and a navy to protect its incoming ships. From Karassk, these fine goods make their way along the rivers of Taneyas to Zerat, Shalazar, and all corners of the empire, where they are sold for great sums of money. Of course, the empire takes a small portion of this for facilitating the exchange. \n\nEventually, these small shavings of gold amass into a treasury, which we invest to improve the dockyards of Karassk and the riverways of Taneyas so goods can come in faster. The cycle then begins again. What a fine system we have devised!"
 flavour_zerat.12.a:0 "The wonders of commerce"
 flavour_zerat.13.t:0 "The True Victor"
 flavour_zerat.13.d:0 "In ancient days gone by, the Anzara Empire, as representative of all the lizardfolk, fought for its future against the lesser creatures who lived outside our jungle. In those days, our ancient foes did not take so readily to our dominion.\n\nAlthough they did not warrant our notice, the first of the two ancient empires of humankind was the Fangaulan Empire. The lands of their Empire have quite degenerated since those days, and their subjugation was an easy task. Without the djinn to protect them, they could not defend the ruins of what meager accomplishments they managed to scrabble out to rival our civilization in those days.\n\nThe Kheteratans proved more formidable both in terms of the effort needed to impose our will on them, and in the persistence of their ancient empire in what the humans claim passes for a ‘historical record.’ But when Anzara marched to meet them once again, we discovered something strange: this empire had rotted from the inside. Across centuries of rising and declining and rising again, somewhere along the way the Kheterata we knew had vanished.\n\nAlthough we had hoped the Kheteratans might help us in rekindling the rivalry of those days, dominion over their river, their city of Kheterat, and their pets will have to suffice. Now, the Kheteratans will join the Fangaulans in acknowledging our glory, and will be allowed to persist as long as their deliveries of tribute are timely.\n\nOf the Fangaulans, nothing remains. Of the Kheteratans, all that remains is Sorrow.\n\nThe Anzara Empire persists, and by virtue of its survival claims victory in Sarhal’s ancient war."
 flavour_zerat.13.a:0 "One Step Closer"
 flavour_zerat.14.t:0 "Our Final Purpose"
 flavour_zerat.14.d:0 "When we declared ourselves as the 332nd empire, some heralded us as noble fools; masochists willing to sacrifice our claim to the eternal seat as the last empire destined to fall. The prophecy hanging over our heads became an incentive to rebellion, the echoes of the accelerationist empires, who sought to rush to the 333rd Empire, resurfaced with none of their lessons learned.\n\nYet we held strong, confident in our belief that surrendering would invalidate our claim as a true empire. We knew we could never turn back so close to the end of the prophecy. But when the Ashhana struck in the north we were crippled, and our empire fell into a dire civil war. We languished and declined across the next millennium, ever more dismissed as an archaic echo of ourselves. Finally, Sykar took Zerat, our capital and Zatsarya.\n\nIn hindsight, maybe we should thank him; without him we might have accepted our slow fate, resigned to history passing without our involvement. His gall to claim the title of prophet and the folly of the naga in supporting him reminded us of our purpose: to remember our fated role as Penultimate Empire, to test any claimants and push them and ourselves to the limit. We may have vanquished the Riverclaws’ false claims, but they reminded us of our duty, whether that was their intention or not.\n\nAnd now we stand, ready to fulfill our role to an extent worthy of the Final Empire. Sarhal stands under our rightful boot; no threat could possibly emerge to oppose what will come after us. The Ashhana have been returned to the swamp where they belong, or else to eternal service for their crimes. To others, we are deluded tyrants, the monsters they depicted us as for so long. But why should we care what they say? To the Ichiadza, we are heroes, the guardians of peace and prosperity, the saviour from a time of barbarism and war. And we shall continue to fight and rule for them, to make the promised empire perfect as it can be."
 flavour_zerat.14.a:0 "For we are the Final Arbiters"

 #flavour_zerat.1001.t:0 "Power"
 #flavour_zerat.1001.d:0 "Resurgence or ships"
 #flavour_zerat.1001.a:0 "Resurgence"
 #flavour_zerat.1001.b:0 "Ships"
 flavour_zerat.1010.t:0 "The Inevitable Decline"
 flavour_zerat.1010.d:0 "When we recaptured Zerat we were seen as heroes, saviors from the brutal reign of the Riverclaws.\n\nWhen we started to falter once more we were seen as decrepit rulers of a bygone age, ruling through fear and fear alone.\n\nNow… now we are seen as nothing more than an obstacle in the tracks of the prophecy, a disease to be removed"
 flavour_zerat.1010.a:0 "And we shall prove them wrong, as we have time and time again."
 flavour_zerat.1011.t:0 "The New Prophet"
 flavour_zerat.1011.d:0 "Reports trickle in from the outer reaches of our empire that local naga are stirring against their chains once more. Whether they always planned to turn against our rightful rule or were merely spurred on by recent revolts, a new prophet of the 333rd has been declared; we are once more on the brink of a Riverclaw tragedy."
 flavour_zerat.1011.a:0 "Not again, never again"
 flavour_zerat.1012.t:0 "Once Again"
 flavour_zerat.1012.d:0 "Despite the best attempts of our traitorous subjects, our rightful rule has been restored over our core lands across Taneyas. We may not yet have reclaimed our old heights, but our immediate collapse has been delayed at a minimum. Yet whether we will reclaim the mantle we deserve is still up in the air."
 flavour_zerat.1012.a:0 "We can only try"
 flavour_zerat.1012.b:0 "We shall fight on"
 flavour_zerat.1013.t:0 "From Outside Taneyas"
 flavour_zerat.1013.d:0 "Our rule may be absolute within Taneyas, but our control beyond is far more superfluous, reliant on local lords’ deference to our whims and representatives. This system ensured our control in times of loyalty, but with the decline of our power, our vassals' loyalty is all but squandered. Whether they are merely refusing to send tribute and soldiers to Taneyas or outright raising their banners, their rebellion cannot be tolerated"
 flavour_zerat.1013.a:0 "For Anzara!"
 flavour_zerat.1014.t:0 "Naga Protests"
 flavour_zerat.1014.d:0 "In lands that have not yet been fully subordinated, the naga still refuse to accept their place in service to the state. They protest the tightness of the leash by which we hold them, decrying it as a sign of tsishagya, the madness of the one, the tyranny of a misguided ruler. They seek higher status, and the right to on-demand audiences with our governors and administrators. They wish us to implement reforms to empower councils of the naga. By the 95th empire, they want pensions! The naga of the palace remain conspicuously silent on these goings-on.\n\nThese protests are rather small and we could send the army to crush them all with ease, but the question is whether or not it is even worth doing"
 flavour_zerat.1014.a:0 "Leave them be"
 flavour_zerat.1014.b:0 "Send the troops"
 flavour_zerat.1015.t:0 "The Rogue Naga"
 flavour_zerat.1015.d:0 "It is obvious that whatever sentimentality our empire still has for the naga has led us to fail in crushing their movement when we had the chance. The naga protests have curdled into riots, and the rioters have formed their own command structure under a leading figure in the provinces outside of our Ichiadza lands.\n\nThe naga leadership of the insurrections has been issuing ‘prophecies’ to their band of rioters left and right, and has promised each and every one of them a place of wealth and prominence once the Anzara Empire falls, as it is ‘prophesied’ to do once it meets their forces on the field of battle. \n\nThe naga have forced our hand: the only way to respond to this delusion is with blood and violence."
 flavour_zerat.1015.a:0 "Quell them"
 flavour_zerat.1016.t:0 "The Rhada Naga"
 flavour_zerat.1016.d:0 "The disloyal naga have begun to inflame ethnic tensions wherever they can find them. Their most recent act of treason concerns our Rhada subjects: the naga have been flocking to Odu Kherass in ever greater numbers in an effort to convince the Rhada the prophecies are on their side. They seek to amass their numbers where they are greatest, and then strike us down. They seek to prematurely birth the 333rd Empire.\n\nEven the illiterates who would dare to stand against the Anzara Empire know that there is meant to be an empire after us. The naga who cannot be bothered to assume a useful role on behalf of the state have whispered enough poison into the ears of their peasant marionettes to convince them that their rebellion marks the rise of the 333rd Empire.\n\nThere are two ways in which we might respond. We could acquiesce to the naga and leave it to them to extricate themselves from their promises when their ‘Final Empire’ of storied prophecy amounts merely to slightly lowered taxes, or we could send the army to deal forcefully with the naga, the Rhada, and anyone else who happens to be in their vicinity."
 flavour_zerat.1016.a:0 "Let them preach of their delusions"
 flavour_zerat.1016.b:0 "Supress their delusions"
 flavour_zerat.1017.t:0 "Riverclaw Revolts"
 flavour_zerat.1017.d:0 "It would seem that, even after all we have done for the naga, some among their number have chosen treason over service to the empire. Even after our defeat of the Riverclaws, there remain pretenders and claimants to the Riverclaw lands who, until now, have remained content to skulk deep within our jungles and lie to themselves that there will be a day the Riverclaws are free again.\n\nNow, however, this quiet opposition has been replaced by open rebellion, led by the Naga of our empire who have defected from our palace to consort with the Riverclaws. Given that their rebellion does not have a realistic chance at victory, we can only reason that their motivation was to die with vengeance on their minds.\n\nThis rebellion poses peril, of course, but it also represents a great opportunity. All the traitors in the empire have gathered in one place, and when we emerge victorious over them our control will be absolute."
 flavour_zerat.1017.a:0 "Damnation"
 flavour_zerat.1018.t:0 "The Subservient Naga"
 flavour_zerat.1018.d:0 "Today is a glorious day! Every last one of the traitors to Anzara have been pulled out of the jungle holes they huddled in, and we have decided to celebrate. In Zerat, we have planned for our people a day of food, music, games, fun, and, of course, executions. The naga who stood against us huddle in cages which are too small to hold them as they await their deaths. We do not reject the wisdom of the naga outright, nor the counsel of learned and insightful folk - but alongside tsishagya there is zakytshagya - the madness of the hundred - and to this we have put an end.\n\nOf course, we have invited those treasured loyal Naga who remain to rejoice with us at the deaths of the traitors. We would not want them to miss the fun!"
 flavour_zerat.1018.a:0 "Heads fall, cheers raised"

 #Privileges
 estate_nobles_court_of_zerat:0 "The Court Of Zerat"
 estate_nobles_court_of_zerat_desc:0 "War destroys, but it can also build bonds thicker than any other. After suffering through so much together, the nobles of Zerat have formed these bonds of friendship and trust."
 zerat_estate_nobles_noble_adventurers:0 "Noble Adventurers"
 zerat_estate_nobles_noble_adventurers_desc:0 "The adventuring bands of this nation are made up of its noblest stock, greatly increasing its cohesion, discipline, and responsiveness in keeping the nation safe."
 zerat_estate_nobles_mastery_of_the_jungles:0 "Mastery of the Jungles"
 zerat_estate_nobles_mastery_of_the_jungles_desc:0 "The jungles are so inhospitable to others and yet so welcoming to us that it must serve as evidence that we were meant to have them."


