 cb_iaochri_desc:0 "To arms. The Amber Princess calls."
 flavour_eighard.14.t:0 "Without a Trace"
 flavour_eighard.14.d:0 "As Eighard’s armies push through the Domandrod, our soldiers cannot help but notice the foes they face. Peitar, Gladewardens, the occasional minor fey. All expected foes, but something is missing.\n\n“The archfey spurred this war, and yet we have seen not a trace of them!” One says.\n\n“Fey are capricious tricksters, and archfey most of all. They would avoid an open conflict, of course, but they would not be uninvolved in a war for their dwelling place. Where, then, are they? Why have we seen neither hide nor hair of them?” Says another."
 flavour_eighard.14.a:0 "What is making them turn tail and run?"
 flavour_eighard.23.t:0 "Cowardice"
 flavour_eighard.23.d:0 "The troops were hard-pressed to keep up with the Amber Princess as she rushed into the clearing. The archfey stood at the other end—the Drag of the Waves, the Everfrost Prince, the Unthroned Queen, the Old man of the Archives, and the Gloam Knight. To see them all in the same place, and seemingly working together, was very strange. It unsettled many of the troops.\n\nSuddenly, a portal opened, and before anyone could react, the archfey began jumping through it. One by one, they escaped.\n\nJust as the Gloam Knight, who was last, was about to go through the portal, the Amber Princess held up a hand.\n\n“Stop,” she said. The Gloam Knight paused, almost involuntarily, just long enough for the portal’s magic to lose stability and ripple closed. “You are but the steward of Autumn in my absence. I know your loyalty. Relinquish yourself to me.”\n\nThe Gloam Knight faced the Amber Princess. “Once, yes, I answered to you. But that was an eternity ago, and now I look at you and see nothing I recognize. You have changed much.” They took a step closer, peering at the Amber Princess, then recoiled suddenly.\n\n“No, it is worse. You are something else entirely…”\n\nThey charged. The Amber Princess stood still. They closed in. The Amber Princess did not move. Just as the Gloam Knight’s sword was about to pierce the Amber Princess’ chest, she disappeared."
 flavour_eighard.23.a:0 "Their sword punctured only air."
 flavour_eighard.24.t:0 "Drink Deeply"
 flavour_eighard.24.d:0 "The Amber Princess appeared behind the Gloam Knight, and thrust an arm through their chest as if it was only water. The Gloam Knight gasped in pain, before going limp.\n\nThe assembled troops watched in horror as, one by one, each piece of the Gloam Knight’s armor fell into the soft forest floor. Within minutes, the Amber Princess’ arm was thrust through only air. Where had their body gone?\n\nThen the Amber Princess closed her eyes and stretched her arms out, and her hair began blowing in a breeze that none of the troops could feel. If the troops were horrified before, that was nothing in comparison to when they saw the Gloam Knight’s armor begin to float. Some of the troops cried heresy and deserted.\n\nIn what felt like slow motion, the Gloam Knight’s armor fit back together in the facsimile of an elf. The Amber Princess, still with her eyes closed, manipulated the animated armor, before dropping her hands. The armor did not collapse. Instead, it walked over to its sword, bent down, and picked it up. Fully half the assembled troops deserted."
 flavour_eighard.24.a:0 "What power she holds…"
