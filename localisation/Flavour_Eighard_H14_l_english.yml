###Magic Project Events
 flavour_eighard.32.t:0 "(Senescence) Chimera"
 flavour_eighard.32.d:0 "“I will need one hundred and twenty-eight mages around each city,” the Amber Princess said. “They must be stationed perfectly equidistant from each other. I will also require a ring of salt, unbroken—ban any and all from entering or leaving the cities while the ritual is ongoing, unless they have my permission.”\n\n“How long will this take to complete?” one of those gathered asked.\n\n“I can’t say,” the Amber Princess replied. “It could take only a year. It could take decades. Should everything go according to plan, I give it, oh…five years?”\n\n“Will this not have disastrous consequences for both cities?” one of those gathered asked. “Arakeprun and Murdkather are two very prosperous settlements.”\n\n“It will,” the Amber Princess said. “But that is of no import. What we shall gain from this is far greater than the measly output of two cities.”\n\n“You haven’t told us—what is the purpose of this ritual?” one of those gathered asked."
 flavour_eighard.32.a:0 "“That is for me to know, and you to find out.”"
 flavour_eighard.33.t:0 "(Senescence) As You Are But Not As You Were"
 flavour_eighard.33.d:0 "“Hello,” the Amber Princess said. She had not been in the room a moment ago.\n\n“Oh! Um, hello.” The [Root.Monarch.GetTitle] bowed. The Amber Princess looked far less regal than usual—her hair was matted, and her breathing came erratically. She placed one hand on the [Root.Monarch.GetTitle]’s desk for support.\n\n“I need…” she said.\n\n“What? What do you need? I will give it to you!”\n\n“...you. I need your…your essence. This ritual is taking more out of me than I expected. I need more power.” The [Root.Monarch.GetTitle] steeled [Root.Monarch.GetHerselfHimself].\n\n“I will give you what you need,” [Root.Monarch.GetSheHe] said. The Amber Princess nodded, and held out her arms towards the [Root.Monarch.GetTitle].\n\nThe [Root.Monarch.GetTitle] was thrown back in [Root.Monarch.GetHerHis] chair. [Root.Monarch.GetHerHisCap] vision swam with strange sights—a dark forest, a cave littered with bones, an endless ocean, a sea of snow—then black.\n\n“Ah, good, you aren’t dead. I hoped that wasn’t the case,” the Amber Princess said when the [Root.Monarch.GetTitle] awoke. “I still hunger. Are you fit to give me more?”"
 flavour_eighard.33.a:0 "“I think that’s enough.”"
 flavour_eighard.33.b:0 "“I can give you more.”"
 flavour_eighard.34.t:0 "(Senescence) Waves Upon Waves"
 flavour_eighard.34.d:0 "The messenger burst into the [Root.Monarch.GetTitle]’s chambers.\n\n“[Root.Monarch.GetTitle]! There are…there have been…” The messenger was panting.\n\n“Slow down,” the [Root.Monarch.GetTitle] said. “Catch your breath. What has happened?”\n\n“In Arakeprun—and in Murdkather—mass disappearances! The cities are in chaos!”\n\n“What has caused this?”\n\n“No one knows for sure. Some say it was an attack from a foreign power, and we have been infiltrated. Some say it was done by traitors, those hoping to undermine the Amber Princess. And then there are those who say it was the Amber Princess herself, and that this was the end goal of her ritual all along. Is it possible? Has she betrayed us?”\n\n“Watch your tongue, young one,” the [Root.Monarch.GetTitle] said. “If this is indeed the result of the Amber Princess’ ritual, then surely she had good cause. The ends justify the means, after all. We shall simply have to wait and see.” [Root.Monarch.GetSheHeCap] realized [Root.Monarch.GetSheHe] was sweating. [Root.Monarch.GetHerHisCap] layers of clothing, meant to counteract the cold, suddenly seemed like far too much."
 flavour_eighard.34.a:0 "“Is it just me, or is it warm in here?”"
 H14_ritual_site:0 "Ritual Site"
 H14_ritual_site_desc:0 "Anything could happen here. What will you make of it?"
 H14_inner_warmth_upgrade_tt:0 "All current and future colonies in §YArctic§! provinces gain:"
 H14_inner_warmth:0 "Inner Warmth"
 H14_aglow:0 "Aglow"

 flavour_eighard.35.t:0 "(Senescence) I Can See Your Breath"
 flavour_eighard.35.d:0 "“...and I hate it,” Allara said, absentmindedly playing with Keldora’s hair. The pair had stopped for the night; they’d found a small clearing with a fallen log and set up a campfire.\n\n“You always say that,” Keldora replied, smiling.\n\n“Well it’s true, isn’t it? It’s too damn cold!” Allara was always going on and on about the cold—of course, that passion is exactly what made Keldora fall in love with her. She hadn’t grown up in the Cult like Allara had, but Allara had been the first person to truly accept her. It was no surprise, then, that when Allara first went in for a kiss, Keldora offered no resistance.\n\n“Remind me, what is our destination?” She knew, and Allara knew she knew, but she liked hearing Allara talk.\n\n“We’re heading to Jhorgacuith, to investigate reports of dissent. I wish we were being sent to the Ynn like everyone else, but no, this task is simply ‘too important’ to let us go with everyone else. Did you SEE the people they were sending? By the Princess, imagine the size of that ritual—agh! I want to see it so BAD!”\n\n“Maybe we’ll get to see it—we could travel to Svemel after we’re done in Jhorgacuith.” Both of them know this would not be the case. “Anyway, we should probably get some rest, shouldn’t we?”\n\nAllara ruffles Keldora’s hair, and Keldora bats her hand away. Allara laughs and gives her a quick kiss on the lips. “Goodnight, Kel.”\n\nTomorrow, they will continue towards their destination."
 flavour_eighard.35.a:0 "They still have a long way to go."
 flavour_eighard.36.t:0 "(Senescence) Recurrent"
 flavour_eighard.36.d:0 "In the mid-afternoon, cresting a hill, Allara and Keldora come across a strange sight. A small village sits nestled between walls of red-orange trees (this is not the strange part). As they approach, Allara leading, the wind whistles between the slats of the houses. The town is silent. They do not see a single person.\n\nAs they wander through its streets, the decay becomes more obvious. Roofs bend inwards upon themselves. Windows are smashed—likely the result of bandits. Doors hang off their hinges. This is not their destination, far from it, but they are intrigued nonetheless.\n\nKeldora, not noticing that she is now leading, wanders the streets with a pit forming in her stomach. She is drawn towards a particular building, for reasons she cannot particularly explain. Unlike the rest of the town, this house is a burned mess.\n\n“What are you looking for, Kel?” Allara asks.\n\n“I don’t know,” Keldora replies. “There’s something here, I can feel it.”\n\nThe two search the ruined home, pushing aside fallen beams which crumble and dissolve at the slightest touch. No one has been here in decades. Keldora finds a bookshelf with ruined tomes—nothing legible. She places a hand on the wall, rubbing the ash away. What happened here? Where did everyone go?\n\n“Keldora, look!” Allara says suddenly. “There’s a trapdoor here!”"
 flavour_eighard.36.a:0 "“I wonder what’s down here?”"
 flavour_eighard.36.b:0 "A flash, a dead memory—something is not right here."
 flavour_eighard.37.t:0 "(Senescence) Drift"
 flavour_eighard.37.d:0 "The trapdoor opens to reveal a set of stone stairs leading down into darkness. They enter the basement, with Allara leading. Keldora enters the room, standing there for a moment while her eyes adjust to the light—Allara has already started poking around. It’s a rather unassuming room—walls lined with stone, a few rotting tables, everything covered in a thin layer of dust. On one of the tables is a tattered piece of pale cloth. Keldora glances at it. She looks away. She glances at it again. What is it?\n\nShe is, then, assaulted: images flash through her mind, too fast to be seen, too overwhelming to be pushed past. Candlelight. Secrecy. Anger. Hope. Footsteps. Hush. Silence. Silence. Safety. Then sudden light. Discovery. Shouting. Figures. Swords. Blood. Pain. Fire. Ruin. Run. Her white shirt is caught. Tug on it. It rips. Get out get out get out GET OUT GET OU-\n\nShe jerks and shrinks back against the wall, slumping to the floor. She wraps her arms around her legs, slowly rocking back and forth.\n\n“Kel? KELDORA!” Allara runs over to her, crouching in front of her. “What’s going on? What’s wrong?” Keldora shook her head, words inaccessible. Allara slips her arms under Keldora’s, hoisting her up. Allara carries her up the stairs, through the burned house, and out into the street, where she sets her down. It is all Keldora can do to remain upright.\n\n“Kel, Kel, I’m here, it’s alright,” Allara says, crouching down beside the stunned woman. “What happened in there?” Keldora’s breathing is heavy, erratic.\n\n“I, I—I don’t know,” she says. “A memory, something I forgot—or was forced to?”\n\n“What was it?”\n\n“It was…my family. My neighbors.” Keldora is crying now, choking on her tears. “They were scared, and missed the old Eighard, and then the soldiers came, and then-” She cuts off.\n\n“Oh, Kel,” Allara says. “Of course they were scared. The unfamiliar is always scary. But think of what you’ve gained. Think of the community you’ve found, and what the Princess means to you. We tried to show them, but they didn’t understand, and hated us for it. There was no other way. It had to be done, regretful though it is.”\n\nKeldora sniffs. “Yes, Allara, you’re right. Praise Autumn.”\n\n“Praise Autumn,” Allara says. They press their foreheads against each other and cry in the empty street."
 flavour_eighard.37.a:0 "Tomorrow, they will continue on their way."
 flavour_eighard.37.b:0 "No, linger in this place. Something has happened here."
 flavour_eighard.38.t:0 "(Senescence) Only Here and Nowhere Else"
 flavour_eighard.38.d:0 "Yesterday, the sun rose on the Ynn. In Svemel, a baker rose with the dawn. He stopped before a small shrine, the one his wife had repeatedly asked him to destroy. He said a quick prayer to Drozmagog, his dead god, and another for Varlengeilt, his living one—so he must believe, for the alternative was despair. He stepped downstairs and opened his shop, hoping to sell enough to make it to tomorrow. He blessed Autumn many times that day, with words that did not reach his soul.\n\nIn Vareynn, a merchant from the Trollsbay entered the city. It had been a long and difficult journey, and he had lost half his wares, but still he trudged on. He was struck by the frigid reception of the city’s inhabitants—most gave him a wide berth, and those who did return his nods did so hurriedly, as if not wanting to be caught making contact with him. He made only a single sale that day, a plain ring purchased by a young woman for a good friend of hers. On her way out of the square, she was stopped by a young elf who wore a smile like a mask. He said a few words to her, and they parted ways. The ring washed ashore on the Ynn’s banks later that day.\n\nIn Arverynn, a woman crossed one of the great bridges over the Ynn, and stopped for a moment at its center. She peered over the edge at the rushing waters below, and wondered for a moment what would happen if she simply threw herself over the railing. Then a voice came from behind her, asking if she knew the glory of the Amber Princess. Yes, she replied, she blessed the Princess’ name daily. The elf who had bothered her smiled. It was good that she knew such a thing—there are some who have chosen to forget, and he is glad that she is not one of them. May Autumn bless her, he said. May Autumn bless him, she said, with a stolen glance at the foaming waters below.\n\nToday, the sun rises on the Ynn. In Svemel, it is quiet, and no one prays to Drozmagog. In Vareynn, it is quiet, and no one peddles their wares. In Arverynn, it is quiet, and the great bridges are empty."
 flavour_eighard.38.a:0 "It is cold today."
