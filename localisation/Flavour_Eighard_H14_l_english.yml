 flavour_eighard.19.t:0 "Such Beauty"
 flavour_eighard.19.d:0 "The soldiers crowded around the Palace of Stanyrhrada. The Amber Princess stood there, in the courtyard, staring up at the Golden Dome. It shimmered in the soft sunlight, its magic so potent it could be seen by the naked eye.\n\nThe Amber Princess lifted her arms and closed her eyes, and although nothing visibly happened, the assembled soldiers felt the air shift. A few of them stepped back in fear.\n\nThe Amber Princess’ hair began to blow in a breeze that none of the soldiers could feel, and the Golden Dome began to…pulse. The Amber Princess’ chest began to rise and fall, and some of the soldiers realized they’d never seen her breathe before.\n\nFaster the wind blew, and faster she breathed, and faster the Dome pulsed, until the soldiers were sure that either she or the Dome were going to break. Then there was a great crack, and the Amber Princess shuddered, and a wave of energy washed over the soldiers, causing some of them to stumble. Looking up at the Golden Dome, they saw that it no longer shimmered in the soft sunlight."
 flavour_eighard.19.a:0 "The Amber Princess’ form rippled with power."

 flavour_eighard.20.t:0 "Have You Heard The Word..."
 flavour_eighard.20.d:0 "“Good day to you, sir,” Allara said. It was a chilly day in Jhorgacuith. “You are aware of the glory of the Amber Princess, yes?”\n\n“Of course I am,” the man she had accosted said. “I pray to her daily, as I am supposed to!”\n\n“As you are supposed to?” Allara asked. “You mean you pray only because you have to? Not because you believe?”\n\n“N-no,” the man said. “I misspoke. I do believe, I always have!”\n\n“Ah, in that case,” Allara said, “may the Amber Princess bless you.” She nodded to the man and walked away.\n\n“Ah, um, e-excuse me, ma’am,” Keldora said. She was shivering slightly. “You have, um, heard the glory of the Amber Princess, yes?”\n\n“I have, yes,” the woman she was speaking to said. “Are you alright, child? You seem troubled.”\n\n“I’m…I’m alright,” Keldora answered. “It’s just,” she glanced around. “It’s just very chilly today.”\n\n“Amber Princess bless you, child,” the woman said. “You must run very cold.”"
 flavour_eighard.20.a:0 "“Why, I don’t feel the chill at all!”"
 H14_heard_the_word_tt:0 "Holding a festival now refunds §G+50.0§! religious power and gives §G+50.0§! of each monarch power."

 flavour_eighard.21.t:0 "Into The Woods"
 flavour_eighard.21.d:0 "A massive [Root.GetAdjective] force stands in the clearing where, in a time before any of them can remember, the Amber Princess watched the archfey escape. She stands in the same place they once did, and opens a very similar portal. The massive army pours through, and finds themselves in a very strange place.\n\nIt is a forest not unlike the one they were just in, but somehow even more vibrant. Birds sing, the flowers bloom, and a great host of elves surrounds the portal. They clearly anticipated the [Root.GetAdjective]s’ arrival.\n\nThese are the Deepwoods, and its inhabitants."
 flavour_eighard.21.a:0 "They do not seem particularly friendly."
 flavour_eighard.30.t:0 "Breathing Out"
 flavour_eighard.30.d:0 "The elves and their allies retreat before us. Fueled by the desperation of the archfey, they poured out of the trees, seeking to delay their inevitable fate. But they have failed. We have won. Even their combined might, strengthened by the blessings of the archfey, could not resist the glory of the Tuathak, the glory of the Amber Princess. Within these verdant forests, Autumn now reigns supreme.\n\nBut where is the Amber Princess? She has not been seen since the start of this war. The archfey must still live, somewhere. Regardless, we can, for now, go back home."
 flavour_eighard.30.a:0 "We shall simply have to wait and see…"
