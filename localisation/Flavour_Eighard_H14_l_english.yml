 flavour_eighard.22.t:0 "Somni"
 flavour_eighard.22.d:0 "Do you remember who you once were? If you met them, would they still recognize you, or would they think you a monster? How much of yourself have you lost? And in that losing, what, if anything, remains?\n\nYou used to be someone (you are quite sure of this). Did you have a name? You must—everyone has a name. Those around you refer to you with one; is that yours? Why, then, does it feel so wrong so wrong SO WRONG SO WRON-\n\nAnother day passes. Another day passes. Another day passes. The world inches, excruciatingly slow, towards its inevitable end. You hardly feel anything anymore—it’s been so long that you’ve forgotten what feeling feels like. This skin you wear, this mind that is—was—is not—was not yours, will never be yours, can never be yours, even as you claw desperately at the thin veil that traps you inside—it is a prison. Outside that prison, tantalizingly close, is hope. Despair. Joy. Sadness. Everything that you’ve lost. You turn over your hands, trace a finger along your veins, and forget what it was like to live (you forgot a long time ago).\n\nHunger.\n\nAn insatiable hunger that you cannot fulfill, no matter how hard you try. You gorge yourself on this world, consuming without care or thought, but still you are empty. How much more will it take? Is this how you escape? Only by devouring everything else, and then turning inward upon yourself, can you possibly be free from this torment. This is the way. This is the way. This is not the way. This is the way.\n\nYou yearn to sleep. To dream. To dream of a world in which you were yourself, or perhaps one in which you did not exist. You toss, you turn, but still you remain awake. Or perhaps this itself is the dream, and you are moments away from finally waking up, and seeing that all is well, and you are you. You hope against hope that this is true (it is not, and you know this, deep inside you).\n\nThe world dies around you—have you caused this? A long, long, long, long time ago, you might have brought yourself to care. But this is not that time. Goodbye, cruel world. You hope it is as agonizing for them as it is for you."
 flavour_eighard.22.a:0 "The end is never the end is never the end is never the end is never-"
 flavour_eighard.31.t:0 "It Stays With You"
 flavour_eighard.31.d:0 "“Amazing,” Allara said. “It was only what, an hour ago that we hanged him?” Flies swarmed the hanged elf’s corpse, and maggots crawled out of his empty eye sockets. Keldora doubted she would ever stop feeling unnerved by the sight of death.\n\n“Another rebel dealt with,” Keldora replied, avoiding looking at the body. “How do you stand to look at him?”\n\n“I am simply admiring the Princess’ blessed handiwork. A shame he resisted—there was a set of shackles in the prison with his name on it, whatever that name was. At least we get to witness this, though.” Allara stood in silence, marvelling at the corpse.\n\n“...can we, maybe, sit down?” Keldora asked. “Somewhere else. The stench is making my head spin.”\n\n“Hmm? Oh, yes, of course,” Allara said. “The other side of the tree?” Keldora gave an anxious nod.\n\nThey sat against the ancient tree, talking and laughing, as the corpse decayed behind them, just out of sight. Allara rolled up one of Keldora’s sleeves and ran a finger across her orange skin, smiling slightly as Keldora shuddered at the touch. “To think I will never again see your skin turn brown. To the children, it will be but a legend.”\n\nKeldora plucked a brown leaf off of the ground and twisted it in her fingers. “It's beautiful,” she said, “just like you.”\n\nAllara laughed. “When will you ever learn to flirt?”\n\nA soft breeze sent a shiver running through Keldora’s body. She rubbed at her arm, earning a quizzical look from Allara.\n\n“Are you alright?” Allara asked.\n\n“Oh, um, yes,” Keldora replied, smiling at her—a smile which didn’t quite reach her eyes. “I’m alright. Just the wind.”\n\nKeldora looked around at the trees, ignoring the hanged elf behind her, ignoring the maggots which already festered in his empty eyes. She ran her hand through the layer of leaves on the ground, feeling as the long-fallen ones disintegrated at her touch. It was Autumn. Of course it was Autumn. It would always be Autumn."
 flavour_eighard.31.a:0 "So why did she feel so cold?"
