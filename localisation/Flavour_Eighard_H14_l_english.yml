 flavour_eighard.16.t:0 "The Princess and the Dragon"
 flavour_eighard.16.d:0 "The soldiers found Varlengeilt in his elven form, lounging on a plush bed, eating blackberries. He waved a hand and stopped them in their tracks.\n\n“Please, let us not make this violent. I think there has been more than enough violence today, hmm?’ The captain of the regiment strode forward.\n\n“Heretical beast, we demand your surrender! The city has been captured!” The dragon cocked his head quizzically, then burst out laughing.\n\n“Surrender? You want me to SURRENDER?” He looked around the room at an imagined audience, still not moving from his reclined position. “Do you know who I am? Does the word ‘dragon’ mean nothing to you? If I wanted to leave, I would be gone like THAT,” he said, snapping his fingers. “Wings make escaping quite easy, you see.” He delicately placed another berry onto his tongue. “Mmm. Delicious. Would you like one?” The captain stood silent, before the doors to the chamber swung open.\n\nVarlengeilt turned his head to glance at the newcomer, as the Amber Princess flowed into the room, her orange hair billowing in an unseen breeze, her eyes crackling with magic.\n\n“Do I know you?” he said. “Oh, are you the archfey storming my city and slaughtering my followers? Tsk tsk, such a naughty woman…”\n\nThe Amber Princess stopped in the middle of the room. She didn’t move, but the building began to shake nonetheless.\n\n“Now, now, there’s no need for all this,” Varlen began, before dust began to fall from the ceiling. “...I see. Well! I certainly don’t need to be around for this!” He calmly got out of his plush bed. “Enjoy the city as best you can—my followers won’t make it easy.” He roared, arched his back, and began to transform. His body began to contort, to grow, as wings sprouted from his back and his arms grew into mighty claws. A great explosion shook the palace then, and smoke billowed over the soldiers. The Amber Princess flicked her wrist out towards Varlengeilt, and a shrill screech was heard from within the smoke cloud. A dark shape flew upwards, careened sideways, and smashed through the wall of the building. By the time the smoke cleared, the dragon was gone.\n\nThe soldiers looked to the Amber Princess, but she was as stone-faced as ever."
 flavour_eighard.16.a:0 "“He will be back.”"
 flavour_eighard.25.t:0 "The Holdouts"
 flavour_eighard.25.d:0 "A report! A great host of rebels has risen up in Svemel and laid the city under siege! It appears that our control of the city, and our conversion efforts, have not penetrated nearly as deep as we had hoped! The followers of Varlengeilt have yet to be fully rooted out, it seems.\n\nHowever, the dragon himself is not present. It is clear that he is too much of a coward to show himself, and would rather work through those he holds in thrall. Perhaps he will make his presence known in time."
 flavour_eighard.25.a:0 "They must be eradicated!"
 flavour_eighard.26.t:0 "Every Day Is The Same"
 flavour_eighard.26.d:0 "In the dank, cold cave, Varlengeilt shivers. He lays in a heap, as he has done every day since he first arrived here. He misses the taste of blackberries. He is bored.\n\nHe holds up his right arm, seeing perfectly in the darkness—is it? Yes, it has progressed past the elbow. His once-vibrant scales are a rotting black from the elbow down. He runs his other hand across them—his right arm feels nothing.\n\nHis breaths come ragged—every day he feels weaker. What did that archfey do to him? He had looked into her eyes, and thought he'd known what he'd seen, but now that he thought about it, it filled him with dread. Those eyes did not contain hope, joy, sadness; they were not the eyes of a life well lived.\n\nThose were the eyes of a monster.\n\nStruggling, groaning, he pushes himself to his feet. He gasps at the pain, but he does not fall. He hobbles out into a larger part of the cave, where some of his few remaining devotees sit in a small circle.\n\n“My Lord,” one of them says, “would you like some bread?” Varlengeilt shakes his head.\n\n“No,” he says. “Tomorr-” He coughs. “Tomorrow, we leave this cage. We gather our strength, and we make for Svemel.”\n\n“My Lord, surely you don’t think we can take on the forces of [Root.GetName]? That would mean death! You are too weak!” Varlengeilt shakes his head again, throwing out his arms in a dramatic gesture his body is not quite ready for. He stumbles.\n\n“Fools! Do you think the dreams you’ve been receiving have just been for you? I have been sending them to every follower of mine still hidden in the city! When we attack, the city will rise to aid us!” He roars, then grins."
 flavour_eighard.26.a:0 "“Believe me—we have not lost just yet!”"
 flavour_eighard.27.t:0 "The Prince's Last Gasp"
 flavour_eighard.27.d:0 "They attacked at dawn. A great host of Rzentur appeared out of the forests surrounding Svemel—but this time they were not alone. The great shape of Varlengeilt cast a shadow over the city as, ever so briefly, he blot out the sun.\n\nThe meagre force garrisoning the city stood no chance against them.  They fought with fire, with Vechnogejzn, the ancient magical tradition of their people—historically used in conflicts against fey. Within hours, the siege was over. The city was taken.\n\nOur forces are nearby, but it will take some time for them to arrive. We must hurry! The presence of Varlengeilt will surely cause their forces to grow over time!"
 flavour_eighard.27.a:0 "Quickly, to arms!"
 flavour_eighard.28.t:0 "You Poor Thing"
 flavour_eighard.28.d:0 "It had been going so well, just as expected—they had been making gains, and the autumnal thralls were clearly unprepared for their attack. Then Varlengeilt, flying above the city, saw her standing at the edge of the battlefield, simply surveying: the Amber Princess. He roared, and dove at her. As he did, his body began to crackle with energy. He was no fool: this woman—this being—was by far the most dangerous thing on the battlefield (excepting himself), and he was going to need more than a simple jet of flame to defeat her. He rocketed through the air towards her, on a direct collision course. She glanced up to see him, and with that, flicked her wrist at him.\n\nA great blast of force smashed into Varlengeilt, wracking his body with unimaginable pain. His suffering had been bad before—even his dragon form could only dull it, as that monster’s magic corrupted him from within. That was nothing in comparison to how he felt now. He roared in pain, careened through the air, and crashed to the ground. The magic worked faster than ever before. Spikes of pain appeared all over his body without warning, causing him to twitch each time.\n\nHe laid there for a while, dying, as the battle was lost around him. Then, out of the haze of smoke, she appeared. Her face was singed—had he still been able to, he would have smiled at this sight.\n\n“Your spies must be quite stupid, if they failed to mention I was in the city,” she said. Varlengeilt did not respond—her presence seemed to cloud his mind. Thoughts were difficult. Had he been more conscious, he may have realized that this was becoming truer by the second. She was draining something out of him, but he was already too far gone to be aware.\n\n“You have been quite the annoyance,” she continued. “You could have simply fled before I arrived. That said, it gladdens me that you did not, for now I get to take your power.”\n\n“You…you are…a monster…” the thing that was Varlengeilt said. The Amber Princess simply smiled and stood there, as his essence seeped into her.\n\n“It amuses me, you know.”"
 flavour_eighard.28.a:0 "“You really thought you had a chance, didn’t you?”"
