l_english:
###Column 1
 H14_tuathak_prepare_praisegranting_festival_title:0 "Contact with Cannor"
 H14_tuathak_prepare_praisegranting_festival_desc:0 "We have known that there are lands beyond our shores, mostly sparsely inhabited by primitive beings not blessed by our Fey Lords. The Caamasi also tell us of merchants from far to the south. What has arrived this day is not an ordinary occurrence: a massive wooden ship bedecked in gleaming iron guns sailed into our harbor, making inquiries about our lands and our peoples. Doubtless impressed by our might, they wish to stay in our lands for some time. This occasion warrants a reaction: let us prepare for a Praisegranting!"
 H14_tuathak_host_the_festival_title:0 "Host the Praisegranting Festival"
 H14_tuathak_host_the_festival_desc:0 "The Praisegranting is a festival dedicated to giving praise to those deserving of honor, with tribute given to those mighty and valorous. Our visitors from across the sea have taken interest in this festival: let us invite them to it! Let us make sure that we have allies in case something goes wrong..."

 H14_decay_salvation_title:0 "In Decay, Salvation"
 H14_decay_salvation_desc:0 "We Eigharders have long known the techniques of the Warmth Rites, a set of spells which can fend off the frigid tendrils of Winter. However, they require uninterrupted concentration by no less than twelve druids, and are simply not feasible to use on a larger scale.\n\nThat is, until now. With the ingenuity of our mages, we have come up with a way to use the energy from decomposing substances to fuel the spells. This allows for constant upkeep of the Warmth Rites with a significantly smaller drain on our magical capabilities. With our attention turning to the north, this innovation will surely be useful for establishing outposts and safe havens in the deathly cold."
 H14_to_the_north:0 "To The North"
 H14_northern_expansion:0 "Northern Expansion"
 H14_northern_expansion_desc:0 "As long as this modifier is active, starting a §YColony§! on any §YWinter Climate§! province will give that province the '§YNorthern Expansion§!' modifier, granting §G+25.0§! Local Yearly Settler Growth and §G-20.0%§! Local Colony Cost until it becomes a city."
 H14_holy_order_tt:0 "Unlock the §YWarmth Rites§! Edict. When enacted, this grants all provinces in the state:"
 warmth_rites_edict:0 "Warmth Rites"
 H14_warmth_rites:0 "Warmth Rites (I)"
 H14_warmth_rites_level_two:0 "Warmth Rites (II)"
 H14_warmth_rites_hub:0 "Warmth Rites Hub (I)"
 H14_warmth_rites_hub_level_two:0 "Warmth Rites Hub (II)"
 H14_warmth_rites_hub_tt:0 "One random province in the state will gain:"

 H14_end_ironhunger_title:0 "End the Ironhunger"
 H14_end_ironhunger_desc:0 "For centuries, we, the Eordan peoples, have bemoaned our lack of iron. We were forced to make due with lesser metals such as copper, but now, that has changed. Our northern expeditions have discovered several large iron deposits; with these, we will finally be able to increase the quality of our weapons and armor. These deposits will also be useful for our construction project outside Darblath."
 H14_mining_operations_tt:0 "Up to §Y4§! owned or subject provinces in the Armonadh or Anholtir areas that produce §YIron§! will gain:"
 H14_ample_supplies:0 "Ample Supplies"
 H14_mining_operations:0 "Mining Operations"

 H14_lights_in_ice_sheets_title:0 "Lights in the Ice Sheets"
 H14_lights_in_ice_sheets_desc:0 "“Captain’s Log, [GetDate]:\n\nWe sailed around the tip of Aerin today. Morale is low. Yesterday, while we disembarked to investigate some strange etchings that one of the scouts spotted, we were accosted by strange creatures. While similar in shape and build to ourselves, they did not seem capable of communication. Natala says they are called Ice Sleepers—I can’t say I really care. They killed Elthar and Iwandar before we were able to drive them off.\n\nThe crew is speaking of turning around and heading back to Marathmas. If I thought we had the choice, I would agree with them. Morale would be greatly improved by expanded infrastructure, the creation of waypoints in this frozen sea. It feels like we’re fumbling in the dark—truly, we have no idea where we are. In theory, [Root.GetName] owns these lands. The reality feels much different. There is nothing here.”"
 H14_northern_waypoint:0 "Northern Waypoint"
 H14_lights_naval_reformers_tt:0 "§YNaval Reformers§! now additionally give §G+2.0%§! Heavy Ship Combat Ability per level"

 H14_strange_new_faces_title:0 "Strange New Faces"
 H14_strange_new_faces_desc:0 "Strange visitors from across the ocean, from a land called “Cannor”. They look very different from us—they call themselves “humans” and “gnomes”. There are those among them who appear like us, and they still call themselves “elves”, but according to them we are lesser. Fools! They clearly have no understanding of the lands in which they find themselves, but this does not stop them from conquering wantonly and settling these lands which we have claimed. We shall push them back across the ocean from whence they came. No iron arms of “Cannor” will prevent us from completing our crusade."
 H14_strange_new_faces_tt:0 "Every province in the §YBroken Lands§! Subcontinent that is conquered from a country with a capital in Cannor or their subject (including colonies) will add §G10§! of each Monarch Power, once per province."
 H14_strange_faces_triggertt:0 "Have §Yinsulted§! every Colonial Nation and country with a capital in Cannor that holds any province in the §YBroken Lands§! Subcontinent."

###Column 2

 H14_befriend_the_traitors_title:0 "Befriend the Traitors"
 H14_befriend_the_traitors_desc:0 "“Come in, come in, make yourself comfortable. Listen, I know we don’t always see eye to eye. Sure, you might think us strange and a little overzealous. Sure, you might be worried about the ‘suspicious’ forces moving within our lands—which we have under control, I promise. Sure, we might blame you for running off to claim our hard-fought territory instead of continuing the fight. Sure, we might feel that we are the only true adherents of the Autumn Court, and that all the rest of you are foolish and mistaken. Sure, we might blame you for the collapse of the Hibernal Crusade almost as much as we blame those vile Peita-\n\nAhem. Sorry, I got carried away. The wounds are fresh, you understand. Within the year, I’ll have forgotten all about it. Yes, we may have our differences. But we follow the same Court, and we have the same enemies. Surely it would behoove us to seek partnership?”\n\n“...this is an equal partnership, yes?”\n\n“Of course, of course!\n\n…of course…”"
 H14_befriend_traitors_trigger_tt:0 "[H13.GetName] OR [H15.GetName]:\nOne of the following is true:\n   Do NOT exist\n   Are our allies\n   Are either our rivals or enemies AND either have an opinion of at least §Y0§! of §Y[Root.GetName]§! or §Y[Root.GetName]§! has improved relations of at least §G+70.0§! with them."

 H14_unholy_alliance_title:0 "The Unholy Alliance"
 H14_unholy_alliance_desc:0 "“In gentle Raithtall and frigid Gelcolle, a most unlikely of trees has bloomed—that of love. We invoke, today, not just the Gloam Knight for his faithfulness, but the Midwinter Chef as well! We are a divided people, in desperate need of peace! This love that has bloomed proves that even between such bitter enemies, kinship can be found. The Courts need not stand divided. We have much in common, and much to learn from each other.”"

 H14_unruly_winter_title:0 "Unruly Winter"
 H14_unruly_winter_desc:0 "We may have defeated Immarel Winterswrath, but controlling a people such as the Snecboth is not so easy a task as cutting off the head of the snake. A rebellious and useless people such as them must be stamped down, but we lack the resources to effectively crush them under our boot. The shadowy figures that have repeatedly offered us their services, however, have a solution to this problem, as they always do."
 H14_skill_2_adm_advisor:0 "Any §YAdministrative Advisor§! is currently employed with skill of at least §Y2§!"

 H14_shut_trap_title:0 "Shut the Trap"
 H14_shut_trap_desc:0 "“To the good ruler of Jhorgashirr,\n\nPlease, at your earliest convenience, turn over all lands, possessions, military forces, and other apparatuses of the state to the [Root.GovernmentName] of Eighard. You will find the transition most smooth.\n\nRegards, [Root.Monarch.GetTitle] [Root.Monarch.GetName] of Eighard.”\n\n\n\n“To the good ruler of Slegcal,\n\nPlease, at your earliest convenience, turn over all lands, possessions, military forces, and other apparatuses of the state to the [Root.GovernmentName] of Eighard. You will find the transition most smooth.\n\nRegards, [Root.Monarch.GetTitle] [Root.Monarch.GetName] of Eighard.”"
 shut_trap_dead_tt:0 "If the respective tag does not exist:\n\n[Root.GetName] gains a permanent claim on all of the respective tag's cores.\n"
 shut_trap_alliance_tt:0 "If you have an alliance and §Y70§! Trust with the respective tag:"
 shut_trap_spy_tt:0 "\nIf you have §Y30§! Spy Network in the respective tag:"
 shut_trap_current_rewards_tt:0 "\n§GCurrent Effects§!:\n"
 flavour_eighard.6.insightH13:0 "§GEvent Insight:§!\nJhorgashirr will have no option but to submit to our rule. If they do, they will gain §R+30.0%§! Liberty Desire."
 flavour_eighard.6.insightH15:0 "§GEvent Insight:§!\nSlegcal will have no option but to submit to our rule. If they do, they will gain §R+30.0%§! Liberty Desire."

 H14_assuming_control_title:0 "Assuming Control"
 H14_assuming_control_desc:0 "At last, we can rest. We admit, we were unsure if our plan would succeed—it is most fortuitous that the previous rulers of Eighard were so accommodating. But even as we settle into our new position, our new subjects resist us. Perhaps now, with the boon we have received, we can pull some strings in the right places. They shall know obedience in time."
 H14_infiltrated_klar_upgrade_tt:0 "The §YInfiltrated Klar§! Estate Privilege now gives §G+10.0%§! Clergy Loyalty Equilibrium and §G+5.0§! Max Absolutism"
 H14_followers_of_the_princess:0 "Followers of the Princess"
 H14_followers_of_the_princess_desc:0 "The Cult of Rot venerates the Amber Princess, an ancient archfey and former leader of the Autumn Court who went missing during the Day of Ashen Skies. With her return, the Cult has seized control of Eighard and now seeks to further its goals—but whose goals are they, really?" 

 H14_edge_of_woods_title:0 "Edge Of The Woods"
 H14_edge_of_woods_desc:0 "“The Domandrod yawned before me. The trees, with their canopies so thick, pressed so close together that nary a shaft of sunlight could penetrate to the ground. I turned to look back at the path I’d traveled. I knew that back the way I came was the inn I’d stayed at last night, with fire so warm and bed so comfortable. I yearned for its safety, but I had to press on. They say these woods are forbidden to those not in service to the fey, but I have to know what’s in them. Imagine the creatures I might see. Imagine the secrets I might discover.”\n\n— an anonymous journal found on a tree stump, just outside the Domandrod."
 H14_haven_in_cursed_woods:0 "Haven in the Cursed Woods"
 H14_haven_tt:0 "The §Y10§! provinces with the §YHighest Development§! in the §YForest of the Cursed Ones§! Region will gain:"

 H14_ancient_home_title:0 "Our Ancient Home"
 H14_ancient_home_desc:0 "As we colonize the Domandrod, the Peitar who we have pushed into it throw themselves at our soldiers in the thousands. This is not unexpected, of course—they are vile, base creatures, suited for little beyond such warfare.\\n\nBut that said, they are not usually this unified. Something must be spurring them on, but what? This will require further investigation."

 H14_dragons_city_title:0 "The Dragon's City"
 H14_dragons_city_desc:0 "In the center of the chilly, forested lands of the Rzentur stands the city of Svemel. This would be a beautiful place, if not for the fact that it lies under the thumb of the followers of the great dragon Drozmagog—so great that he was slain by the mortal Lord Artorean.\n\nBut yet, his apparent son Varlengeilt still lives and lords over them. It is clear that these people need not the cold superiority of a dragon, but the inviting warmth of the Princess. Do they not remember our ancient past? We were slaves to them, once. We will take the city, deal with Varlengeilt, and show these people the glory of Autumn."
 flavour_eighard.16.insight:0 "§GEvent Insight:§!\nThe dragon’s followers will be most displeased."

 H14_not_our_kin_title:0 "Not Our Kin"
 H14_not_our_kin_desc:0 "Within the deep forests of northern Aelantir, past the safety of the river Ynn, lies the domain of the strange and horrid Cursed Ones. These strange beasts seem to have some manner of sentience, but they are connected to each other through a vile telepathic web.\n\nIn order to continue our crusade against Winter, we must pass through their lands, but we can never be sure we are safe while they still roam. We shall build havens in these woods—small outposts where our soldiers can rest in relative comfort. These woods shall be tamed."

 H14_it_means_unity_title:0 "It Means Unity"
 H14_it_means_unity_desc:0 "We may have revoked the Cannorians’ claims on our Aelantir, but the few settlers who have remained behind—either because they wish not to or cannot leave—still present an issue. What to do with them? They are so different from us that we fear they are simply unable to understand the glory of the Amber Princess. This is, however, not the problem it initially seems. The Cannorians are few and unworthy, and the Tuathak are many and glorious. The invaders shall disappear on their own, in time. We can, however, hurry that process along."
 H14_unity_tt:0 "Converting a province to §YTuathak§! now gives §G+10,000§! manpower"
 H14_unity_tt2:0 "Each province in the §YDalaire§! Region with:\n   The culture is NOT §YRuinborn Elf§!\n   Has a §YTemple§! or a §YCathedral§! building\n   §Y[Root.GetName]§!: At least 10 regiments present\nWill gain:"

 H14_autumns_triumph_title:0 "Autumn's Triumph"
 H14_autumns_triumph_desc:0 "Even just a few centuries ago, Autumn was on the brink of death. The Hibernal Crusade shattered, Immarel Winterswrath gathering power and making fey pacts, and division within our own ranks threatening complete and total destruction.\n\nNow, we look across North Aelantir and see an endless land of those who believe. The other seasons have been relegated to memories. The Amber Princess has made herself the ruler of Autumn once again. Every people who worshiped a false being has been shown the truth—that Autumn is the strongest season of all. Every crunch underfoot, not of dreaded snow, but the beauty of red and gold and orange and yellow leaves, reminds us of what we have accomplished. The leaves have always fallen, and now they always will."
 H14_ToTF_tt:0 "Tolerance of the True Faith greater than §Y8§!"

###Column 3

 H14_tap_the_populace_title:0 "Tap the Populace"
 H14_tap_the_populace_desc:0 "“Henceforth, by proclamation of the good [Root.Monarch.GetTitle] [Root.Monarch.GetName], it is the duty of all subjects of the great [Root.GovernmentName] of Eighard to provide for our soldiers in times of need. Should members of our militia come knocking at your door, it is your duty to give them 10% of your yield. When recruiters pass through your village, it is your duty to offer up your most able-bodied children to service. Refusal to comply with this Edict will result in arrest. So it is, and so it shall ever be.”\n\n— The Hibernal Requisitions Edict of [GetYear], nailed to the door of every town hall in every village."
 hibernal_requisitions_tt:0 "§YExploiting Development§! in any province will extend the duration of this modifier for §Y1§! year, reapplying it if it has expired.\n"
 hibernal_requisitions_level_one:0 "Hibernal Requisitions (I)"
 hibernal_requisitions_level_one_desc:0 "Until upgraded, §YExploiting Development§! in any province will extend the duration of this modifier for §Y1§! year, reapplying it if it has expired."
 hibernal_requisitions_level_two:0 "Hibernal Requisitions (II)"
 hibernal_requisitions_level_two_desc:0 "Until upgraded, §YExploiting Development§! in any province will extend the duration of this modifier for §Y1§! year, reapplying it if it has expired."
 hibernal_requisitions_level_three:0 "Hibernal Requisitions (III)"
 hibernal_requisitions_level_three_desc:0 "§YExploiting Development§! in any province will extend the duration of this modifier for §Y1§! year, reapplying it if it has expired."

 H14_the_dreaded_cold_title:0 "The Dreaded Cold"
 H14_the_dreaded_cold_desc:0 "We see her in our nightmares. That dreaded woman, Immarel Winterswrath. We fear her power, and we dread the day she turns her attention to us. We must confront her eventually—but as things stand, we have little chance of defeating her. The Eigharder are, of course, a magical people, and we have a number of techniques to reduce the burden of Winter upon our people, but we do not have the means to use such spells on the scale of an army. There must, however, be some way to prevail."

 H14_winterswrath_broken_title:0 "Winterswrath Broken"
 H14_winterswrath_broken_desc:0 "We have done it! The vile witch Immarel Winterswrath is dead! Across our newly claimed territories, her followers revolt, but this is but their last gasp—their fate is sealed.\n\nBut a new concern arises—how did she amass such power? A mage powerful enough to threaten all of Eordand must surely have had assistance. But who? And why?\n\nWe must search her frigid tower. Whatever secrets this hag was hiding, we will find them there."
 flavour_eighard.4.insight:0 "§GEvent Insight:§!\nThe storming of Immarel’s tower will be accompanied by revolts."

 H14_reclaim_dorcurt_title:0 "Reclaim Dorcurt"
 H14_reclaim_dorcurt_desc:0 "The Hibernal Crusade was the first time in hundreds of years that the Autumn Court was unified. We had Winter within our grasp, and it all fell apart. But in the middle of that came Iadth—they struck without warning, razing Dorcurt to the ground. At every turn, we were defeated by the Peitar. No longer. Iadth is weak, and we are strong. Such is the way of things. We will take back Dorcurt, and our faith shall be unified once more."
 H14_bastion_of_faith:0 "Bastion of Faith"

 H14_within_fog_title:0 "Within the Fog"
 H14_within_fog_desc:0 "“How many times must I tell you, Galind? Stay away from Malcadh. You know what happens to those who enter it—they are claimed by madness. They spout nonsense, speaking of spirits, of decay, of the end of time—and that’s if they’re ever seen again.”\n\n“But I hear them, Father. They call to me. They speak of rotting things, of the before times. I press my hand against the decaying wood, and I feel them. Those woods are ancient, Father. There is so much to learn there—I must go back.”\n\n“Galind, listen to me. Stay. Away.”"
 eighard_exploit_dev_value:0 "Times Exploited Development"

 H14_autumn_unified_title:0 "Autumn, Unified"
 H14_autumn_unified_desc:0 "“[Root.Monarch.GetTitle] [Root.Monarch.GetName],\n\nWe must congratulate you—Eighard has done what the rest of the Autumn Court could not. Vile Winter is nearly eradicated, and the scant remnants that remain are soon to follow. The Autumn Court, seemingly destined to eternal squabbling, has been unified under your hand. This is, we must admit, most impressive.\n\nYou have, of course, met with representatives of our organization before, and we thank you for your continued cooperation. We have one final offer for you. There is a small grove in the woods due east of Darblath. Arrive there, just after sunset, in one week’s time.\n\nCome alone.”"
 flavour_eighard.8.insight:0 "§GEvent Insight:§!\nThere is a choice to be made here. The path well trodden, or the one forgotten? Either way, there will be those who oppose it…"
 H14_autumn_unified_tt:0 ": Fewer than §Y4§! provinces in the Eordand subcontinent have the §YWinter Court§! Religion. This excludes uncolonized provinces and current colonies."

 H14_purity_title:0 "Purity"
 H14_purity_desc:0 "We breathe deeply—the Cult of Rot has been defeated. The sway they held over our [Root.Monarch.GetTitle], the influence they held across our state—it is all dust in the wind. With our newfound strength, we set our sights on the rest of Eordand, and in particular, on Pelomar.\n\nSince Pelodan Oathsworn, they have been clinging to their title of ‘Champions of the Fey’, even as every successive Oathsworn fails in their duties. They are not worthy of the title—but we are."
 H14_autumn_purified:0 "Autumn Purified"

 H14_finding_truth_title:0 "Finding the Truth"
 H14_finding_truth_desc:0 "Within the ranks, they whisper—something is coming. More and more regiments are being sent to the edge of the Domandrod. Ambushes have been increasingly frequent, and even our best mages are not sure how enemy forces keep slipping behind our lines.\n\nThe Amber Princess, however, is as calm as ever. Every time we inform her of another slaughtered patrol, she nods as if she expected the news. What does she know? We suspect we will find out soon."
 flavour_eighard.15.insight:0 "§GEvent Insight:§!\nConflict is surely on the horizon."

 H14_malnatur_title:0 "Malnatur"
 H14_malnatur_desc:0 "Our population cannot be trusted. Everywhere, there are traitors, dissenters, non-believers, those who conspire against the state. You cannot even trust your own neighbors, for although today they may speak fondly of the Amber Princess, tomorrow they may attempt to see her destroyed.\n\nIn Darblath, where the Princess’s power is strongest, we will begin construction of Malnatur, the Rotting Tower—a great prison where we can send those who oppose us. There shall be no cells, and no pardons. Once you enter Malnatur, you do not leave until your body is dust."
 H14_finished_war_for_domandrod_tt:0 "Have §Ywon§! the war for the Domandrod"
 H14_no_fort_building:0 "Has no §YFort§! building"
 flavour_eighard.17.insight:0 "§GEvent Insight:§!\nThe traitors will come out of the woodworks to resist their doom."

 H14_cut_wings_off_title:0 "Cut Their Wings Off"
 H14_cut_wings_off_desc:0 "Despite the cowardly escape of the dragon Varlengeilt, his followers clearly still hold great reverence for him. They have decried us and revolted against us at every turn, making our conquest of these lands very difficult.\n\nBeing that Rzenta is on the fringes of our state, it is difficult for us to exert control, which we will need if we are to make their peoples see the warmth of Autumn. This dragon of theirs is a false and worthless god, and they shall know this. They shall worship a slaver no longer."
 H14_end_false_visions:0 "Ended the False Visions"
 H14_ynn_claim_tt:0 "§Y[Root.GetName]§! gains a permanent claim on every province that §Yexperiences winter§! in the §YYnn§! Subcontinent, §Y[2810.GetName]§!, and §Y[1142.GetName]§!"

 H14_breathing_in_title:0 "Breathing In"
 H14_breathing_in_desc:0 "The Amber Princess has approached us once again. She wishes for the three great cities of the Ynn to be strengthened. As much population as we can fit, she says. She does not care who is there—even the Cannorians are to be allowed—as long as the cities are full.\n\nShe appears to be planning another feat of great magic. Clearly, this will lead to her power increasing, which is of benefit to us. We are beholden to her, so we will do as she says."

 H14_the_end____title:0 "The End..."
 H14_the_end____desc:0 "We find ourselves facing the Domandrod once again. These forests, which we once believed tamed, we now believe hide something deeper. With the strength the Amber Princess has gathered from the Ynn, she now plans something truly extraordinary. We remember the archfey who escaped, and we wonder—where did they go? We think, now, that the Amber Princess knows the answer. She has told us that this will be a hard-fought battle, but we are ready."
 H14_skill_5_adm_advisor:0 "Any §YAdministrative Advisor§! is currently employed with skill of at least §Y5§!"
 flavour_eighard.21.insight:0 "§GEvent Insight:§!\nThe center of these woods hide something, and whatever that is, it will not go quietly."

 H14____is_never_the_end_title:0 "...Is Never The End"
 H14____is_never_the_end_desc:0 "Peace. We know peace.\n\nWarmth. We know warmth.\n\nMagic. We know magic.\n\nControl. We know control.\n\nPower, though?\n\nWe realize now that we have never understood it, and never will. Not the lengths it drives people, nor the way it takes hold of your very soul and twists it. We thought we knew what we were doing. How wrong we were…"
 H14_ended_deepwoods_war_tt:0 "Have won the War for the Deepwoods"
 
###Column 4

 H14_prepare_second_strike_title:0 "Prepare the Second Strike"
 H14_prepare_second_strike_desc:0 "The Peitar of Strutmar. Have you ever seen a people more smug? They win a single battle, break us a single time, and declare the Hibernal Crusade destroyed! And now, while our Court fractures, they laugh at us!\n\nSuch self-importance, however, betrays weakness. They are complacent, and will never see our agents coming. Andrall Harvestcrown’s failure was in announcing to his enemies where the battle was to take place. We will not make the same mistake."

 H14_field_of_broken_oaths_title:0 "A Field of Broken Oaths"
 H14_field_of_broken_oaths_desc:0 "When you sit lounging in your home in Darblath, it is perhaps easy to forget what happened at Minnorac. After all, it is at least a day’s journey to the so-called Field of Oaths. You might forget Andrall Harvestcrown’s ill-fated plan to force his allies’ loyalty. You might forget how his forces were ambushed by Strutmar, how the leader of the Hibernal Crusade was cut down in cold blood.\n\nBut when you stand there at Minnorac, knee-deep in the dried and caked blood of your brothers and sisters, you do not forget. When you stand amongst the skeletal bodies, some of the enemy’s, but many more of yours, you do not forget. When you find the fleshless corpse of Andrall Harvestcrown, still laying exactly where he fell, you do not, cannot forget what happened. Minnorac remembers, and we remember with it."
 H14_exploit_dev_boost_tt:0 "§YExploiting Development§! in any province that is not Tuathak culture will remove §Y2§! development and §Gadd§! or §Gextend§!:"
 H14_conversion_efforts:0 "Conversion Efforts (I)"

 H14_icebreaker_fleet_title:0 "The Icebreaker Fleet"
 H14_icebreaker_fleet_desc:0 "In the far north, there are no ships more feared than the raiders of Reotcrab. Although we have defeated them, our paltry navy will not suffice for our continued conquests. Thus, we will commission a glorious flagship—the Eigliesd! With this grand ship at the helm of our fleets, none will be able to contest our control over the seas."

 H14_pretender_of_faith_title:0 "Pretender of the Faith"
 H14_pretender_of_faith_desc:0 "In the wake of the Hibernal Crusade and the fall of Dorcurt, every Autumnal state sought to brand themselves the new leaders of the Autumn Court. None are louder, more verbose, more despicable, than Einnsag. From their tiny island, they claim to lead us? Where were they on the front lines, while our people were being slaughtered? Cowards, all!"

 H14_rude_awakening_title:0 "Rude Awakening"
 H14_rude_awakening_desc:0 "Far to the south, the realms of the Summer Court wrap themselves in decadence. They claim to be the masters of the seas, and their pompous merchants surround themselves with frivolities they have no use for. They look out upon the ocean and see tranquil beauty, but that is their mistake. They are fools. We will surround their ports. Cut off their trade routes. Seize their cities. Let us show these sweet summer children our resilience. Our wrath. Our control."
 H14_stagnant_wave:0 "Stagnant Wave"
 H14_rude_awakening_area_tt:0 "All provinces in the §YTrimgarb§!, §YEaregasach§!, §YSaregasach§!, §YSerakriok§! and §YTrimthir§! areas:\n   One of the following must be true:\n      Is open for colonization\n      Owned by §Y[Root.GetName]§! or its non-Tributary subjects"

 H14_tawdry_yellows_gaudy_pinks_title:0 "Tawdry Dyes" 
 H14_tawdry_yellows_gaudy_pinks_desc:0 "“I don’t know how you can say that, Kamnar. I look at your dyes, and they are so piercingly bright that it strains my eyes.”\n\n“And I look at your pieces, Serron, and I find myself drifting off to sleep—the muted colors that you dyers from Darblath prefer are BORING!”\n\n“How dare you! Ugh, you people from Sglard—and Dearktir too, don’t get me wrong—are all the same! You create these garish pigments and call them beautiful, when I have to shield myself lest I be blinded! What would you even use such a color for, anyway? The hues are clashing in nearly all situations, whereas the simple, refined dyes from Darblath can be used anywhere!”"
 H14_tawdry_dyes_tt:0 ": Fewer than §Y10§! provinces in the §YEordand Subcontinent§! (excluding the §YDomandrod Region§!) are of §YPeitar§! culture"
 H14_dye_monopoly:0 "Dye Monopoly"
 
 H14_champions_no_longer_title:0 "Champions No Longer"
 H14_champions_no_longer_desc:0 "Centuries ago, Pelodan Oathsworn swore to defeat the Seasonalist heresies. He failed. Pelodan II also failed. Pelodan III also failed. Every single Oathsworn has sat on their rears, failing to uphold their oath, while claiming that they, surely they, will be the ones to finally fulfill it. Look at them now, ground under our boot-heels. They have amounted to nothing.\n\nThis place, Pelodard, shall be their grave. The grave of all the Peitar. We spit upon it."
 H14_oathbroken:0 "Oathbroken"
 H14_conversion_efforts_two:0 "Conversion Efforts (II)"
 H14_exploit_dev_boost_two_tt:0 "§YExploiting Development§! in any province that is §RNOT§! Tuathak culture will remove §Y2§! development and now §Gadd§! or §Gextend§!:"

 H14_her_true_power_title:0 "Her True Power"
 H14_her_true_power_desc:0 "The streets are abuzz with talk of the Amber Princess. Word has spread of what power she now holds, and it is clear that said power is far, far beyond what we thought she was capable of. This has made one thing evident to all: we were right to put our faith in her. With her at our side, there is no feat we cannot manage, no enemy we cannot defeat, no power out of our grasp. Our crusade will be successful—it has to be. There is no other way it can go, with the Princess’s support."

 H14_growing_strength_title:0 "Growing Strength"
 H14_growing_strength_desc:0 "With each passing day, the Amber Princess demands more from us. She wants power, resources, magic, for purposes that she does not share with us. Our mages have been working closely with her, refining their methods with her oversight. When she asks, we give, for that is the way things are. We are more than happy to oblige, for what she gives in return is priceless."
 H14_icewardery_upgrade_double_duration_tt:0 "The duration of §SIcewardery§! will now be §GDoubled§! when cast"

 H14_imperial_capitals_title:0 "The Imperial Capitals"
 H14_imperial_capitals_desc:0 "As we have pushed into the lands fed by the river Ynn, showing its peoples the glory of Autumn wherever we go, we have come to know of an ancient empire that used to rule these lands. This “Ynnic Empire” fell, as all empires do eventually—of course, they had no Amber Princess on their side—but its memory still casts shadows over these lands. This empire had two capitals, Vareynn and Arverynn, and both have now come under our control. The great works that still stand in these cities shall be a fitting reminder to its peoples of the new rule which they find themselves under."
 H14_urban_reshaping:0 "Urban Reshaping"

 H14_secure_fringes_title:0 "Secure the Fringes"
 H14_secure_fringes_desc:0 "At the boundaries of the Ynn, the Cannorian presence is once again felt. Eclectic bands of adventurers take these lands as their own, with no respect for their inhabitants. However, these lands live under the grasp of Winter, and the Cannorians can and will be enthralled by it if we do not intervene. The openness of these places, however, makes control difficult. It is not just enough to call these lands ours. To truly bring Autumn to these places, we must establish outposts. Places for our soldiers and missionaries to rest. The nonbelievers must be purified."
 H14_securing_fringes:0 "Securing the Fringes"
 H14_warmth_rites_forts:0 "§YFort§! buildings in states with §YWarmth Rites§! now give §G+25.0%§! Local Defensiveness and §G-15.0%§! Local Fort Maintenance."
 H14_securing_fringes_tt:0 "From now on, all owned or non-tributary subject provinces in the §YYnn§! Subcontinent with §YYnnsman§!, §YSteel Dwarf§!, §YHorizon Elf§!, or §YPipefoot Halfling§! Culture gain:"
 H14_secured_fringes:0 "Secured Fringes"

 H14_magic_unrivaled_title:0 "Magic Unrivaled"
 H14_magic_unrivaled_desc:0 "It is known to all that the Tuathak are a people without equal. But this is true not just in culture—our magical prowess is also without equal. From Icewardery, to the Warmth Rites, to our mastery of Abjuration, to the Amber Princess’ immeasurable power—there is no part of magic we cannot control. Across our lands, our mages are on the forefront of magical thought. The Cannorians, with their “ancient magical institutions”, are relegated to the sidelines, fit only to watch us go where no one has thought to go before. We are not just masters of magic. We ARE magic."
 H14_warmth_rites_mage:0 "§YMage Towers§! in states with §YWarmth Rites§! now give §G-10.0%§! Local Governing Cost."
 H14_magic_unrivaled:0 "Magic Unrivaled"

###Column 5

 H14_uprooted_garden_title:0 "Uprooted Garden"
 H14_uprooted_garden_desc:0 "While we struggled in the Hibernal Crusade, those nations who revel in the supremacy of Spring sat tinkering amongst themselves. While our people died for our cause, they sat in the dying city of Arakeprun and imagined a world where she was once again vibrant. They know not of the suffering we have endured. They imagine rebirth, and they shall have it, but not in the way they expect."
 H14_wilted_flower:0 "Wilted Flower"
 H14_detritus_farms:0 "Detritus Farms"
 H14_detritus_tt:0 "Every province in the §YEordand§! Subcontinent that produces §YGrain§! gains:"

 H14_our_due_title:0 "Our Due"
 H14_our_due_desc:0 "We remember who we used to be. A shattered people, beset on all sides by enemies of our culture and our faith. Now, we are more. Unified. Strong. Unshakeable in faith. We have shown our lessers—the disgusting Snecboth, the hated Peitar—what it truly means to be Eordan, to be Tuathak. We are the most glorious people who have ever lived, and our age is only just beginning!"
 H14_our_due_upgrade_tt:0 "The §YReligious Culture§! [Root.GetChurchOrFallbackName] Privilege will now give §G+5.0§! Absolutism, §G+20.0%§! Manpower in Own Culture Provinces, and §G-10.0%§! Same Culture Advisor Cost"

 H14_looking_to_skies_title:0 "Looking to the Skies"
 H14_looking_to_skies_desc:0 "To the south lie the lands of the Fograc, our distant cousins who reject the glory of Autumn—nay, they reject the seasons entirely. They instead look to the skies, practicing celestial divination and astrology. It is time to go to them, bring them back into the fold, and show them the glory of the Princess. They must be made to understand the error of their ways."
 H14_wayward_stars:0 "Wayward Stars"

###Mission Events
 H14_consequences_tt:0 "§rThis will have consequences...§!"

 flavour_eighard.1.t:0 "A Midnight Visitor"
 flavour_eighard.1.d:0 "In the middle of the night, the [Root.Monarch.GetTitle] suddenly wakes up. Something isn’t right. The pale moonlight only barely illuminates the chamber, and shadows dance along the walls. There is a soft breeze emanating through the open window—wait. Didn’t [Root.Monarch.GetSheHe] close that window?\n\n“Good evening, [Root.Monarch.GetName].” A shrouded figure separates from the shadows, leaning against the wall. The [Root.Monarch.GetTitle] shoots up in bed, hand shooting for the knife [Root.Monarch.GetSheHe] knows [Root.Monarch.GetSheHe] keeps on a bedside table.\n\n“Please, do not worry yourself,” says the figure. “We do not come here for the purposes of assassination or blackmail, but something much simpler: we’d like to offer you a deal.”\n\n“Who are you?” The [Root.Monarch.GetTitle] says. “How do you know my name? And who is ‘we’?”\n\n“Irrelevant questions. You are preparing an invasion of the Strutmar Peitar. We have our own reasons to wish to see them conquered, and thus our goals align with yours. There is a member of our organization who excels in the place of command. We wish to offer their services to you. That is all.”\n\nThe [Root.Monarch.GetTitle] is silent for a moment, then: “What is the cost?”\n\n“No upfront cost,” says the figure. “Only the promise of a favor when the time comes.”"
 flavour_eighard.1.a:0 "I'll take the deal."
 flavour_eighard.1.b:0 "I must refuse."
 flavour_eighard.9.t:0 "Pay Our Due"
 flavour_eighard.9.d:0 "“Hello, [Root.Monarch.GetName].”\n\nThe [Root.Monarch.GetTitle] almost falls out of their chair. Spinning around, they see a shadowy figure—the same one as five years ago—leaning against their wall again.\n\n“Damn you, how are you so silent…” the [Root.Monarch.GetTitle] says. The figure does not react.\n\n“We have come to cash in our favor. It is a simple request. A pittance of gold. Surely that is nothing for a [Root.Monarch.GetWomanMan] as yourself?”"
 flavour_eighard.9.a:0 "You shall have what was promised to you."
 flavour_eighard.9.b:0 "Guards!"

 flavour_eighard.2.t:0 "A Spoiled Marriage"
 flavour_eighard.2.d:0 "“Please, sir, stop this madness, I beg you!” The young Snecboth woman has to twist her neck in order to speak without interference from the Eigharder soldier’s spearpoint. A short distance away, her husband is being butchered. The castle has gone up in flames.\n\n“You disgust me,” the soldier says. “It is one thing to be a Snecboth, and to live in thrall to Winter. It is another thing entirely to taint a perfectly good Tuathak with your frigid blood!” The soldier presses his spear to the woman’s neck, just enough to draw a pinprick of blood.\n\n“Agh! If you care so much about my blood, why then must you kill him too?”\n\n“He is defiled. He is worthless now.” The soldier thrusts downward, and pierces the woman’s neck."
 flavour_eighard.2.a:0 "She gurgles, and her blood flows out onto the stones." 
 H14_salting_the_fields:0 "Salting the Fields"
 H14_salting_the_fields_desc:0 "While this modifier lasts, §YExploiting Tax Development§! in any province will give §G10§!¤ crowns per level of base tax after exploitation, up to §Y100§!¤"

 flavour_eighard.3.t:0 "An Offer Most Frigid"
 flavour_eighard.3.d:0 "“Good evening once again, [Root.Monarch.GetName].”\n\nThe [Root.Monarch.GetTitle] whirls around in the empty hallway to see the shadowy figure once again leaning against the wall, face obscured by darkness.\n\n“How do you…every time…” The figure does not react.\n\n“We come to you once again with an offer. You are preparing to strike at the heart of Winter, are you not?”\n\n“Yes, we are, although I have my doubts about our chances,” the [Root.Monarch.GetTitle] said.\n\n“You fear Winterswrath,” the figure said. The [Root.Monarch.GetTitle] nodded curtly. “That is precisely why we have reached out again. You are familiar with the technique of Icewardery?”\n\n“I am, and we considered it, but there’s just no way to cast it on the scale to benefit a whole army,” the [Root.Monarch.GetTitle] said.\n\n“That is where you are mistaken. We have expanded upon the technique, and would be willing to provide you with the spell—only a single cast, of course. All we ask in return is that you lend us the magical energy required for the casting. What do you say?”"
 flavour_eighard.3.a:0 "We will take you up on this offer." 
 flavour_eighard.3.b:0 "We will find our own methods."
 H14_war_with_gemradcurt:0 "The next time we declare war on Gemradcurt:\nCast §SIcewardery§!:\n"

 flavour_eighard.10.t:0 "The Final Solstice"
 flavour_eighard.10.d:0 "When the walls of Gemradcurt fell, the soldiers of Eighard thought the worst was over. The battle for the city was even bloodier. For every five thralls of Winter that were struck down, four brave soldiers of Autumn met their end. Immarel herself, the wretched “Lady-Mother” who had so threatened the remnants of the Hibernal Crusade, took to the field. She froze Eigharder soldiers left and right, being by far the deadliest presence in the fight for the city streets. But even a power such as hers was not enough to quell the rage of the Tuathak. On the steps of her tower, she fell.\n\nNow, three Eigharder soldiers stand above her, with one boot on each of her hands to prevent her from spellcasting. None of them say anything. As the spear punctures her throat, her gurgle means more than words could ever have meant."
 flavour_eighard.10.a:0 "She should have died a long time ago." 
 H14_slayed_the_witch:0 "Slayed the Witch"

 flavour_eighard.4.t:0 "In Her Tower"
 flavour_eighard.4.d:0 "The soldiers tear through the tower, knocking over shelves, ripping open doors, and searching for any valuables. The [Root.Monarch.GetTitle] follows calmly behind, flanked by two guards.\n\n“What are we even searching for, my [Root.Monarch.GetTitle]?” One of the soldiers asked. \n\n“Something. Anything. Any evidence that this witch had allies, and who those allies ar-”\n\n“[Root.Monarch.GetTitle]! [Root.Monarch.GetTitle]!” A young, fresh-faced soldier ran up. “We’ve found something; you have to see this!” The soldier wheels around and starts running up the stairs of the tower, not even checking to see if the [Root.Monarch.GetTitle] is following.\n\n[Root.Monarch.GetSheHeCap] follows, charging past rooms of overturned bookshelves, rooms bare save for a single scorch mark, rooms of horrors [Root.Monarch.GetSheHe] would rather forget—vile experiments with no clear purpose, as if more for training than research. [Root.Monarch.GetTitle] does not want to comprehend what crimes this woman would have committed had she won. Eventually, [Root.Monarch.GetSheHe] arrives at an untouched study, where Immarel must have spent long hours.\n\n“We found this,” the soldier says, handing the [Root.Monarch.GetTitle] a leather-bound journal. [Root.Monarch.GetSheHeCap] cracks it open.\n\nThe book contains pages upon pages of dense technical information, so advanced as to be indecipherable. It includes designs and schematics for some sort of…device. It is smothered in notes and comments penned in Immarel’s hand. Her thoughts are piecemeal and hard to follow—but one point stands out: much of this knowledge is not Immarel’s own.\n\n“What does he mean by this?” “This should not work.” “Needs clarification.” “Proven by practice, not by theory.” Annotations to that effect are everywhere. But if not Immarel’s, whose? The answer is found at the corner of a page dedicated to some incomprehensibly complex schematic: “Soul capture device. Preserves, projects, possesses. He calls it: “Phylactery”—the Prince’s impossibility. Yet to it I entrust my undying life.” The [Root.Monarch.GetTitle] drops the journal in disgust. “The Prince.” That can only mean one figure—one archfey."
 flavour_eighard.4.a:0 "The Everfrost Prince…"
 flavour_eighard.11.t:0 "Further Research"
 flavour_eighard.11.d:0 "“We want access to her tower, [Root.Monarch.GetName],” said the shadowy figure, who had once again appeared without warning.\n\n“By the…can you at least knock?” the [Root.Monarch.GetTitle] asked. The figure did not respond. “You seem more agitated than usual. What for?”\n\n“We know of the discovery you made within the tower, of the deal that Immarel made with the Everfrost Prince,” the figure said. “This worries us greatly, as I imagine it does for you.”\n\n“Well, yes, it does, but what do you need access to Immarel’s tower for? Our soldiers are already searching the thing top to bottom.”\n\n“Your soldiers are fools. They will throw away the most important things and keep only the useless trinkets. We are no fools. We expect that, if given unsupervised access, we could discover a great many magical secrets—which we would be more than happy to share with you, of course. For a price…”"
 flavour_eighard.11.a:0 "I will grant this."
 flavour_eighard.11.b:0 "You will stay out of there."
 H14_investigating_magic_records:0 "Investigating Magical Records"

 flavour_eighard.5.t:0 "A Chance Arrangement"
 flavour_eighard.5.d:0 "“We have something a bit…different…in mind this time, [Root.Monarch.GetName],” the shadowy figure said. The [Root.Monarch.GetTitle] was used to these sudden arrivals by now; [Root.Monarch.GetSheHe] didn’t even flinch.\n\n“Speak, then,” the [Root.Monarch.GetTitle] said.\n\n“Perhaps you have guessed this by now, and what I am about to say will be entirely unsurprising, but I am a representative of the Cult of Rot,” the figure said. “You have been most kind in assisting our organization thus far, and we are interested in taking this relationship to a higher level.”\n\n“What are you asking for?”\n\n“Official cooperation. The followers of Winter still rebel against you, yes? We can help, but we want a promise of support in return. We want positions in your government. Our goals align, and we can help you, but only if you help us in return. I imagine you are aware of the Amber Princess, yes? I can tell you, with no uncertainty, that she is to return soon. It will be a great boon to you to have us on your side.” The figure produced a piece of parchment. “What do you say?”"
 flavour_eighard.5.a:0 "Deal."
 flavour_eighard.5.b:0 "No deal."
 estate_church_H14_infiltrated_klar:0 "Infiltrated Klar"
 estate_church_H14_infiltrated_klar_desc:0 "The Cult of Rot has worn its way into every fiber of this country’s government. They have, however, many secrets which could be put to very good use." 

 flavour_eighard.6.t:0 "The Handshake Stings"
 flavour_eighard.6.d:0 "Betrayal! We have been tricked! Foul Eighard has infiltrated our administration and the intruders are poised to hand over control of the state!"
 flavour_eighard.6.a:0 "All hope is lost!"
 flavour_eighard.6.b:0 "It’s not over until it’s over."

 flavour_eighard.7.t:0 "Stagnation"
 flavour_eighard.7.d:0 "The clouds choked out the sun’s light, so the transition into the dark forests of Malcadh was very slight. The [Root.Monarch.GetTitle] had been drawn here, for reasons [Root.Monarch.GetSheHe] did not entirely understand.\n\n[Root.Monarch.GetSheHeCap] walked. And walked. And walked. The trees seemed to bend and twist, enveloping, almost trapping [Root.Monarch.GetHerHim]. The wind rustled through the branches, a high hiss that sent shivers down [Root.Monarch.GetHerHis] spine.\n\nAfter what seemed like an eternity, the [Root.Monarch.GetTitle] reached what appeared to be the center of the forest, where a great ruin lay decrepit. [Root.Monarch.GetSheHeCap] laid [Root.Monarch.GetHerHis] hand on the ancient stone. Nobody knew what this place was for, or when it became ruined. Perhaps it had always been ruined.\n\n“[Root.Monarch.GetName]...” came a soft whisper, almost imperceptible.\n\n“Hello? Who’s there?”\n\n“Come, sit, stay for a while…” the whispers continued. “We have much to teach you…” The [Root.Monarch.GetTitle] spun around, searching for the source of the voice, to no avail.\n\n“Wherever you are, come out! We can talk face to face!”\n\n“Come, sit, stay for a while…for a while…we have much to teach you…”"
 flavour_eighard.7.a:0 ""I see, I see...""
 flavour_eighard.7.b:0 "The [Root.Monarch.GetTitle] flees."
 H14_whispering_woods:0 "The Whispering Woods"

 flavour_eighard.8.t:0 "A Wind-Chilled Meeting"
 flavour_eighard.8.d:0 "The [Root.Monarch.GetTitle] stepped into the grove. The sun had just set, and shadows danced across the trees. Every slight shift in the darkness looked like movement. The wind ripped through the trees, knocking leaves onto the ground, and the [Root.Monarch.GetTitle] shivered. Except for the crunch of the leaves underfoot, it was deathly silent.\n\nThe [Root.Monarch.GetTitle] stopped in the middle of the grove.\n\n“Alright. I’m here. Show yourself.”\n\nOne by one, figures stepped out of the darkness. Five, ten, twenty—[Root.Monarch.GetSheHe] lost count quickly. They surrounded [Root.Monarch.GetHerHim]. One figure stepped forward.\n\n“Welcome, [Root.Monarch.GetName], to our gathering. We are most pleased that you accepted our invitation. Now, to the business at hand.”\n\n“What do you want?” The [Root.Monarch.GetTitle] asked.\n\n“It is a most simple request. We ask for you to surrender control of Eighard to the Cult of Rot. It is only through our assistance that you have accomplished anything. We are clearly better suited for control of the state than you, as I’m sure you’ll agree."\n\n“And what if I refuse?” The [Root.Monarch.GetTitle] asked, the shadows pressing against [Root.Monarch.GetHerHim]. The figure stepped closer.\n\n“Then you will not leave this grove alive, and we will seize control anyway. Would you prefer to do this the easy way or the hard way?”"
 flavour_eighard.8.a:0 "“You shall have what you seek.”"
 flavour_eighard.8.b:0 "“Eighard will not be corrupted by your influence!”"
 H14_chilled_rebels_antirot:0 "§RRebels§! will rise up in up to §Y[Root.eighard_cult_refusals.GetValue]§! random owned or subject provinces!"
 H14_chilled_rebels_prorot:0 "§RRebels§! will rise up in up to §Y[Root.eighard_cult_acceptances.GetValue]§! random owned or subject provinces!"
 flavour_eighard.12.t:0 "Equinox"
 flavour_eighard.12.d:0 "“It has been a while, hasn’t it?”\n\nThe [Root.Monarch.GetTitle] glanced up at the woman who had just appeared in front of [Root.Monarch.GetHerHis] desk. She was tall—very tall, towering over the [Root.Monarch.GetTitle]. Her golden skin appeared almost translucent in places, and her long, light brown hair floated in a nonexistent breeze.\n\nThe [Root.Monarch.GetTitle] scrambled to [Root.Monarch.GetHerHis] feet, kneeling in front of the woman. “You—you are—you have returned! After a millennium and a half! THE AMBER PRINCESS HAS RETURNED!” [Root.Monarch.GetSheHeCap] was yelling to no one in particular.\n\nThe Amber Princess flicked a finger, and the [Root.Monarch.GetTitle] was forced back to a standing position. “Calm yourself,” she said. “Cease with your groveling. We have work to do.”"
 flavour_eighard.12.a:0 "“Praise be! The Amber Princess has returned!”"
 H14_equinox_happened_tt:0 "An §oold friend§! has returned"
 H14_estate_scaling_tt:0 "Gain §G+5%§! Crownland for every level of the §YMagical Fortress§! Magical Project our [Root.GetMagesName] have completed."
 H14_amber_princess_one:0 "The Amber Princess (I)"
 H14_amber_princess_one_desc:0 "Your vessel begins its training. It is weak, unrefined."
 H14_amber_princess_two:0 "The Amber Princess (II)"
 H14_amber_princess_two_desc:0 "Your skin, your bones and sinew, they begin to strengthen. Tension breeds vitality. Patience breeds reward."
 H14_amber_princess_three:0 "The Amber Princess (III)"
 H14_amber_princess_three_desc:0 "You feel it—every day it gets easier. Now, you feel unstoppable. But there is still further to go. Always further, further down the path you cannot escape."
 H14_amber_princess_four:0 "The Amber Princess (IV)"
 H14_amber_princess_four_desc:0 "There has never been a vessel as finely honed as yours. You wish you could bring yourself to love it, but you lost that capacity long ago."
 H14_rot_chosen_tt:0 "This path will lead to more unique Eighard content"
 H14_rot_refused_tt:0 "This path will lead to forming Eordand"

 flavour_eighard.13.t:0 "First Engagement"
 flavour_eighard.13.d:0 "“Good morning, good morning,” the naiad said to the army of soldiers, lounging on a rock by her pond. “What brings you to the edge of the Domandrod today? If you came to try and sneak a glance while I bathed, I’m afraid you’re moments too late.” She grinned. The sergeant stepped forward, steeling his nerves.\n\n“Let us in,” he said. “Now.” The naiad cocked her head, giggling.\n\n“Now why would I do that, hmm? I mean, I’m not even stopping you, am I? You could just walk right past me! Sure, without the blessing of the fey, you’d get turned around, fall into pits, and wander into clouds of dust that make you really want to kiss each other, but that would be so FUNNY! Ah—just imagining it brings a smile to my face!”\n\n“You will let us in,” said the sergeant, “or you will face the Amber Princess’ wrath.” The naiad paused for a second, then burst out laughing.\n\n“The Amber Princess! Oh, I haven’t heard a joke that good in CENTURIES! Yes, the archfey who’s been missing for a thousand thousand years is going to suddenly reappear, right here, right now, just to kill me!? Oh, by the—ha—that’s so—haha—I could just—AHAHAHAHAHAHAHAHAHAHAHA—urk—”\n\nThe Amber Princess shimmered into existence behind the naiad, her arm thrust clean through the fey’s chest. The naiad coughed blood, once, twice, then went limp. The Princess nodded curtly to the sergeant."
 flavour_eighard.13.a:0 "“Follow. Quickly. You will meet resistance.”"
 H14_wrath_of_the_princess:0 "Wrath of the Amber Princess" 

 flavour_eighard.15.t:0 "Iaochri"
 flavour_eighard.15.d:0 "A messenger rushes into the [Root.Monarch.GetTitle]’s chambers. “[Root.Monarch.GetTitle]!” He says, panting. “I have a report from the Domandrod!” The [Root.Monarch.GetTitle] grabs the scroll and unfurls it.\n\nThe report is greatly concerning. A great host of Peitar have pushed Eigharder forces out of the Domandrod. This host, aided by Gladewardens, has inflicted many surprising victories. Minor fey, who had mostly given Eigharders a wide berth, have also been harrying troops.\n\nEven more concerning are the magics these Peitar used. One account describes a blizzard being summoned on top of Eigharder forces. Another describes intense, scorching heat suddenly afflicting troops. These are seasonal magics, but very powerful—much more than the balance-obsessed Peitar can normally manage.\n\n“They are not acting alone,” the Amber Princess says (the [Root.Monarch.GetTitle] swears she was not there before). “The archfey are aiding them.” The [Root.Monarch.GetTitle] stares up at her, but she is as stone-faced as ever.\n\n“Well?” The Amber Princess asks. “You have an army, no? Raise it.”"
 flavour_eighard.15.a:0 "“To arms, Eighard!”"
 H14_hibernal_level_2_tt:0 "Hibernal Requisitions will be upgraded, now granting:"
 H14_liughagcal:0 "Liughagcal"
 H14_liughagcal_ADJ:0 "Liughagcalan"
 H14_fey_backing:0 "Fey Backing"
