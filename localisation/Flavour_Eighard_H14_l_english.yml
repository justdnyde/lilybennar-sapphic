 flavour_eighard.39.t:0 "(Senescence) Between Worlds"
 flavour_eighard.39.d:0 "The Amber Princess bows her head before the ritual circle. She breathes in. She breathes out. Around her, the trees seem to press inward, almost as if they are drawn towards what she is doing there. She reaches out her hands, tenses them, feels the bone and sinew within her, and draws the magic close. She tenses, tenses, tenses, and then-\n\nShe releases. The magic slams into the middle of the ritual circle and wrenches a hole in time and space. Spiralling colors shimmer and shift into an image of a verdant forest. She takes a step closer. Another. A very, very, very slight smile creeps across her face. Then she runs.\n\nThe soldiers are fighting on the outskirts. She intends to go deeper."
 flavour_eighard.39.a:0 "In you go. The clock is ticking."
 flavour_eighard.40.t:0 "(Senescence) Getting Warmer..."
 flavour_eighard.40.d:0 "You dash and dance through the vibrant trees, your hair whipping in the wind. You don’t know where you are, but you know exactly where you’re going. You can sense them—they’re hiding from you. Is this…fear? You can feel it emanating from them. They believe themselves concealed within their forest, but you can sense them as you draw closer.\n\nThe first you find is a curious little thing. You cock your head at them, even as their eyes widen at the sight of you. They surprise you by laughing instead of running. They laugh right up until the moment that your arm pierces their chest, when it turns into a choke. Then they go limp. You shudder as you draw their chaos into you.\n\nThe second you find throws you off for a second, for he is not a man but a massive wolf. He leaps at you, but you are faster. In the blink of an eye, your arm is through his underbelly, and he falls to the soft grass with a whimper. You shudder as you draw his strength into you.\n\nThe third you find stands proud at your approach, which again catches you off guard. She is so regal in the face of her death that it almost, almost, gives you pause. Your arm, though, cares not. It plunges into her chest, and she falls. You shudder as you draw her severity into you. You still don’t feel whole."
 flavour_eighard.40.a:0 "But these are not your final quarry."
 flavour_eighard.41.t:0 "(Senescence) And Warmer..."
 flavour_eighard.41.d:0 "You leap between the treetops, arms swinging with wild abandon, letting the warm moons glow upon your face. You giggle. Why do you giggle? What a strange feeling this is (you know, somehow, that it is called ‘fun’, but you have no idea why you know this). Is this what it feels like to be alive?\n\nYou sense more—this time, not fear, but stoicism. This is less interesting to you; stoicism does not taste nearly as good upon your vessel.\n\nThe first you find is not elven at all. Its massive wings stretch time and space around it—you wonder what would happen if you were caught in between them. Its form is resistant, but you penetrate it nonetheless. You shudder as you draw its distortion into you.\n\nThe second you find wears a face of faces, and it parades one around, as if enticing you with it. You ignore it (you have enough already) and wrench its soul from its body. You shudder as you draw its enigmas into you.\n\nThe third you find draws darkness around him, and his somber beauty almost makes you turn. But you don’t, and your arm passes through him like mist, and he wastes away. You shudder as you draw his knowledge into you. You still don’t feel whole."
 flavour_eighard.41.a:0 "But these are not your final quarry."
 flavour_eighard.42.t:0 "(Senescence) Very Warm..."
 flavour_eighard.42.d:0 "You are lost in what remains of your memory now. You laugh with wild glee, a smile plastered across your face. In your mind’s eye, you are dancing across an endless field, running your hands through the flowers and breathing in their smells. You do not see the trees which blacken and bend as you pass them, nor would-should-could you care if you did.\n\nThere is indecision in the air. This way, that way, the beings in your path cannot decide. It is easy to pinpoint them.\n\nYou find, first, a green-haired woman, with three knights in front of her. You ignore them, letting their swords slash at you as you plunge your arm into her chest. The knights collapse to the ground—only puppets. She goes limp. You shudder as you draw her childishness into you.\n\nYou find, second, an angry, distasteful elf. He faces away from you, staring off into the distance. What is he looking at? You don’t question it. Instead, before he can turn around, you have punctured him. You shudder as you draw his longing into you.\n\nThen you find a kindly old elf. He holds a budding flower in his hand, and offers it to you. You cast it aside and take his soul instead. You shudder as you draw his sagacity into you. You still don’t feel whole.\n\nYou expected more, but the rest are ghosts. It has been a long time, and much has changed. You do not much recognize these woods anymore."
 flavour_eighard.42.a:0 "But these are not your final quarry."
 flavour_eighard.43.t:0 "(Senescence) Found You"
 flavour_eighard.43.d:0 "They sit at the edge of a clearing, resting against trees, facing each other. They are tired, and cannot go on. They know it is coming, but they know they cannot stop it. One of them is missing already. They have seen what that one has become.\n\nOne of them, a tall, severe woman, gasps suddenly. She gurgles, coughs, then falls silent. The other three do not move.\n\nAnother, a kindly old man lost to knowledge, closes his eyes, sighs, and ceases to be. The other two do not move.\n\nAnother, of shifting, liquid form, dissolves. The last one does not move.\n\nHe, who knew he would be last, awaits his turn. His white skin is caked with sweat. He feels sudden, unmeasurable pain, sees eternity flash before his eyes, and then everything goes black.\n\nA sigh, a soft giggle, then silence."
 flavour_eighard.43.a:0 "These woods are a fitting end."
