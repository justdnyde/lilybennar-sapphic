 flavour_eighard.17.t:0 "The Rotting Tower"
 flavour_eighard.17.d:0 "On and inside a hill outside Darblath, construction begins on Malnatur. Wood sourced from the plentiful forests of Eordand, iron from the faraway provinces of Armonadh—resources are gathered from all over [Root.GetName] to contribute to the construction of the largest project ever undertaken in Eordand. Most workers come from Darblath, but there are those from all across Eordand who wish to be a part of the construction.\n\nEvery few days, the construction is interrupted by an attack from nonbelievers, but this does not stop the prison’s progress. Its spires climb ever higher, and its tunnels wind ever deeper. Mages oversee every part of the process, assisting with magic where mundane tools do not suffice. Some workers claim that, when they are digging at the deepest levels, they feel unexplainable winds, as if the air itself is crying out. But this is, of course, superstition."
 flavour_eighard.17.a:0 "It’s only a building, after all."
 flavour_eighard.29.t:0 "Construction Finishes"
 flavour_eighard.29.d:0 "“And you see, we do not even need cells,” the warden says to the visiting Ynnic diplomat, who has gone quite pale. “Whenever we capture a traitor, a dissenter, a non-believer, they are sent here to rot.” He gestures to an elf, chained to the wall by a set of shackles. He is deathly thin, with his ribs exposed. With great effort, he raises his head and glares at the warden. He attempts to spit, but his mouth is too dry to form saliva.\n\n“What if you capture someone on the other side of Eordand,” the diplomat asks. “Will you bring them all the way here?” The warden laughs.\n\n“No, of course not! We are constructing similar, smaller prisons all across [Root.GetName]. None as grand and impressive as this one, of course, but they will exist nonetheless. We will make sure that every traitor, every dissenter, every non-believer, every soul who does not believe in Autumn, in the Amber Princess, is put where they belong and left to decay into dust!”"
 flavour_eighard.29.a:0 "“I…see,” says the diplomat."
 H14_malnatur_modifier:0 "Malnatur"
 H14_malnatur_modifier_desc:0 "Down, down, the endless tunnels go. The walls are lined with bones, and the stench of rotting bodies permeates the stagnant air. Those who still live cry out as their flesh wastes away, as they wonder what they did to deserve this fate. Their pleas go unanswered."
 H14_upgrade_warmth_rites:0 "§YWarmth Rites§! will be upgraded, now granting:"
 H14_rotting_tower_completion:0 "Once the construction is complete:"

 flavour_eighard.18.t:0 "Praise Be"
 flavour_eighard.18.d:0 "“THIS IS MADNESS!” cries the elf as he is led to the gallows in Darblath. “How can you not see! That is not the Amber Princess! She is dead! She died centuries ago! Whatever inhabits her body isn’t her! How can you trust the Cult of Rot when they blindly follow whatever that monster is!” He is slapped and told to be silent, but still he continues.\n\n“You are FOOLS! You lead yourself to death and destruction, all in the name of whatever that—that BEING wants! This is not the Autumn you know, the Autumn you love! This is an Autumn of decay, of stagnation, of the END OF THE WORL-”\n\nThe stool is kicked. The rope tightens around his neck. He falls silent. The rabble cheers.\n\nElsewhere, in Murdkather, a priest is speaking to a small crowd.\n\n“She was there for us, when things seemed at their bleakest. When all seemed lost, she returned. The Second Hibernal Crusade has been a glorious success with her at the helm—she is willing to lend her power to us, and this makes us unstoppable. It is no wonder, then, that she is an object of worship.” There are murmurs in the crowd, and a couple boos that are quickly hushed.\n\n“When you are cold at night, she is there for you. When you face hardship in your life, she is there for you. Whenever you need strength and find you do not have it, she is there for you. All she asks is that you believe in her.” The murmuring is louder this time, and the boos have been replaced by cheers. The priest raises his arms.\n\n“Praise be to the Amber Princess!” he cries. The crowd cries back."
 flavour_eighard.18.a:0 "“Praise be to the Amber Princess!”"
