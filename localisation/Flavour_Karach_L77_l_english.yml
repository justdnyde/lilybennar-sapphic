 #####Privileges
 estate_church_monopoly_of_sugar:0 "Monopoly on Sugar"
 estate_church_monopoly_of_sugar_desc:0 "The sugar that goes into our food is sweet indeed, but the sweetest thing for the Naxtaxta is their total control over its production and trade."

 estate_church_monopoly_of_spices:0 "Monopoly on Spices"
 estate_church_monopoly_of_spices_desc:0 "If variety is the spice of life, the lives of the Naxtaxta must be quite varied indeed, given their control over all Karach’s spice trade."

 estate_burghers_monopoly_of_naval_supplies_fish:0 "Monopoly on Naval Supplies and Fish"
 estate_burghers_monopoly_of_naval_supplies_fish_desc:0 "The great bounty of the sea is not just in its trade, but in the opportunities for commerce it brings in itself. The Enkaxta know this, and will steward the trade in seafood and naval supplies with the care it deserves."

 estate_nobles_monopoly_of_exotic_wood:0 "Monopoly on Tropical Wood"
 estate_nobles_monopoly_of_exotic_wood_desc:0 "It’s possible to build just about anything out of wood: with their control of the wood of Karach, the Zytagaxta have chosen to fashion themselves great wealth."


 #Gov Reform
 karach_ashhana_realm_of_art:0 "Realm of Axtas"
 karach_ashhana_realm_of_art_desc:0 "This country is governed by a great body of working folk from all the axtas of the land. Miners, farmers, painters: all receive a voice in the great council of axtas, and its delegates sit in the fine seats where the chieftains once sat."

 