l_english:

 #####Missions
 karach_our_ertikan_title:0 "Our Ertikan"
 karach_our_ertikan_desc:0 "“Listen close and listen well. Calm yourself. I am going to tell you a story of the Ertikan Starash.\n\nThese mountains were given to our people long, long ago. It was so long ago that even I do not know the story. But ever since that fateful day, we Ashhana have called these ranges home, and the mountains have been good to us.\n\nOur story is also of a man named Karqut Redeye. Karqut wasn’t as fearsome as his name! A son of Karach, he had a smile for everyone he met; in fact, he was more of a naturalist than a warrior. Karqut loved to amble across the mountains, but Karqut loved his home just as much and didn’t want to travel too far away. So for years, Karqut didn’t stray far from home, and he grew to know every hidden nook and crevice of the Ertikan Starash. Karqut was also a farmer, and he made himself a living by the fruit of the land. Things were calm for Karqut because he made them so.\n\nOne day, a group of soldiers came to Karqut’s village, and they asked the people there many questions of the lands beyond. Karqut loved his mountains, and Karqut loved his people. He didn’t wish to travel far from home, but here was an opportunity to bring home to him!\n\nThe soldiers asked once again if anyone knew of the lands beyond, and Karqut stepped forward with a smile and spoke.”"

 karach_the_farmers_plea_title:0 "The Farmer's Plea"
 karach_the_farmers_plea_desc:0 "“The early days of the farmers’ axta were hard ones. There were precious few farmers in the axta, and numbers are what make workers strong. The chieftains were afraid of the farmers and what they had achieved by standing strong together, and so they kept the business of the axta quiet in other lands.\n\nThey might have succeeded too, were it not for Toraz Clearsage. Toraz was a farmer like his father and his father’s father, but he had a way of making words tingle down your spine. Toraz was always the one who told the stories in the farmers’ axta, and Toraz could calm the Bloodcurse better than anyone else. The Speaker of the axta had his eye on Toraz, but Toraz was never the type for politics.\n\nBut one day, the Speaker pulled Toraz away from his crops and said he had a special task for him. This was something Toraz could do. The axta didn’t often lose members, but when the next set of traders came to buy the produce of the axta, Toraz left with them. Eventually, he settled down in a farming town where the chieftains ran things, and he did his work just like anybody else — he even made friends. At night, he told the stories he loved about home and how the farmers there were free. Eventually, the town came to realize they wanted things to be different, and so they joined the axta. Toraz left that town and went on to the next — then the next.\n\nNow, the farmers of the axta are many.”"

 karach_the_mining_folk_title:0 "The Mining Folk"
 karach_the_mining_folk_desc:0 "“Listen close and listen well. Calm yourself. I am going to tell you a story of the world long past.\n\nIn those days, the miners scratched in the mountains of the Ertikan Starash, and from its veins came great riches by the heat of miners’ scales and the scratches on their hands. They loved those mountains, as they do today. They loved every chunk of ore they dug out by force of will, as they do today. And yet, the miners enjoyed little of their spoils as chieftains carted away the excavated riches.\n\nBut our story is not of those days. Our story is of Uzgar Stonescribe, the first Speaker of the Miners. Uzgar had labored in those mines for years on years, and he had the scars to prove it. What he did not have was the money that he exchanged those scars for: that belonged to the chieftains. Uzgar saw his fellow miners struggle and starve, but he could not do anything about it for a long, long time.\n\nBut one day, the chieftains came back to the mines and demanded another haul of ore. Something happened to Uzgar that day. He grew angrier and angrier as the Bloodcurse simmered in his veins. As he had been so many days before, Uzgar fumed that the miners couldn’t keep their ore.\n\nBut that day, Uzgar did something about it.”"
 
 karach_between_scythe_and_pick_title:0 "Between Scythe and Pick"
 karach_between_scythe_and_pick_desc:0 "“This is a story of the mountains and valleys — farmers and miners. Though siblings today, they used to accuse the other of hoarding.\n\nBut then came two brothers: Sozyr and Sulish Greenclaw. They were born and lived together as farmers in the valley.  One day while looking out beneath a clear sky, a grown Sozyr wondered what lay in the mountains above. His brother Sulish did not understand why Sozyr desired to leave his home, but he wished him well regardless.\n\nAnd so Sozyr hiked the mountain slopes until he came across some miners talking among themselves after a supper better furnished than even the meals of the farmers. Wary but curious, Sozyr wondered how it was that these simple rock-movers had become so fat and content, so he joined their mining axta to learn their secrets.\n\nMany years later, Sulish saw a procession from the mountains marching into the valley. They bore picks, and their scales were coated with the dust of the mountains. But the leader of the miners was not some strange foreman: it was Sozyr! The miners wished to talk.”"
 
 karach_save_the_lost_title:0 "Save the Lost"
 karach_save_the_lost_desc:0 "“We Ashhana are like a big family; we spend most of our time squabbling with each other, but when someone else comes in to give one of us a kick, they face the wrath of all. After all, putting each other down is our job. No one knows this better than the Arraskay, who thought that they were the rightful overlords of the Ashhana both within their borders and beyond. Let me tell you the story.\n\n Achagi Clearthought was one such Ashhana in the lands of the Arraskay, where the lives of the Ashhana were harsh and their Arrashkay masters harsher. She didn’t know much outside her homeland, but she knew the value of people. The other Ashhana gravitated to her. She gave her people guidance where she could.\n\nOne day, Karach invaded. Achagi lived by the border, and her settlement was one of the first ones freed. She met an Ashhana from Karach, who told her that he was from something called the farmers’ axta. She did not know the word. He explained further, and she listened. She looked at her people, what she now understood to be an axta of her own.\n\nSo Achagi formed an axta of the Free Peoples. They rampaged across the land, and all the Arraskay could do was hide in their fine homes. Eventually, the armies of Karach marched through the land that Achagi and her axta had cleared, and gave the Free Peoples the place in our own axtas they deserved. Achagi Clearthought became a Speaker then, and she and the axtas built great things in the place where her people once suffered.”"

 karach_the_talented_hands_title:0 "The Talented Hands"
 karach_the_talented_hands_desc:0 "“After their great discovery in the mountains, the artisans were riding high. The miners had to recognize their claims. The traders and the craftsmen had a good long laugh, thinking that the miners were a bunch of dumb country bumpkins who wouldn’t know a good deal if it fell off a tree and hit them on the head.\n\nThe city folk were of that opinion until the miners got angry about that claim, and the miners and their axta told the reigning [Root.Monarch.GetTitle] [Root.Monarch.GetName] that those craftsmen didn’t know anything about mining and that the axta of the miners were the only ones who could dig those riches out of the ground.\n\nThat got the traders fuming mad, and it got Alaka Wardancer mad in particular. She was the wiliest merchant that ever could be found, and she saw the miners and their axta and had herself an idea.\n\nIf even those miners could push them around, she thought, then the traders would have to do a little pushing of their own. But you need many hands to push, and the traders didn’t know how to push in the same direction. What really got people working together, it seemed, was an axta. Why couldn’t the city folk have an axta of their own? And so she went to the [Root.Monarch.GetTitle] [Root.Monarch.GetName], and laid out the way things would be from then on.”"

 karach_axta_take_over_title:0 "Axta Takeover"
 karach_axta_take_over_desc:0 "“I know I’ve told a lot of stories today, and I know you might be tired; please, indulge me in one more.\n\nThis story isn’t about the great heroes of the past, but the untold heroes of the future. It’s a story of miners, farmers, bards, chemists, and sailors all standing side by side in an unbroken chain. It’s the story of all the workers of all the axtas of Karach coming together to make something greater than any of them could create alone.\n\nOur story isn’t grand or important in the way that other folk might think: it’s about the helping hands we give one another in the fields and the small kindnesses we do for one another just as much as the big battles.\n\nBecause I have a secret for you. Uzgar Stonescribe, Ikhaty Sunlover, and all the others might have big tall statues that we look at in the square, but they were regular lizardfolk — just like you and me. They lived and breathed, they had ambitions and shortcomings, but one day the moment came that the people needed them. A question rang out, and they answered yes.\n\nI don’t want to keep you here any more, listening to me prattle on about stories. Leave. That question still rings. Go answer it.”"

 karach_investing_in_control_title:0 "Investing in Control"
 karach_investing_in_control_desc:0 "“Always remember: a story’s good for more than fun between friends or taking the chill out of a lonely night’s wind. A story is a light in the dark, a helping hand, and a promise that when the Bloodcurse threatens to swallow you whole, you can live your story any way you please, if only you have the courage to tell it.\n\nThe miners’ axta had never truly known peace until a humble lizardfolk named Ner Skylover taught them how to live that way. She was a lover of all types of art, but in Ner's day, the mines were a violent place: miners argued on shift, and the whole time they worked, the issue steamed in their heads until it boiled over into a fight.\n\nEvery day, Ner’s husband came home with more bruises than before, and this troubled her. So while the mines were full, she crept down to the mine entrance, painted a bare-bones mural, then stole off.\n\nWhen the miners emerged, they found something that could be beautiful — if only it had a little more work put into it. Instead of brawls that night, there was painting. The night after, Ner left an unfinished poem: after that, a half-written song. Eventually, the miners started making beautiful things for themselves.\n\nThe mines were peaceful after that.”"

 karach_urban_and_rural_title:0 "Urban and Rural"
 karach_urban_and_rural_desc:0 "“Now I want to tell you a story of how a city scaled the mountains. The city folk were clever, but they didn’t know much about the mines; when the miners formed their axta, they didn’t know what to do. The artisans needed the mountain’s gems to make their crafts, and if the chieftains couldn’t help them, they either had to buy from the axta or go without — and going without wasn’t something those artisans knew how to do.\n\nThe artisans were clever though: they sent their hardest men, with Igur Goldspear in the lead. Igur was a craftsman and decent enough at his work, but what the craftsmen knew about Igur for certain was that he was the luckiest Ashhana on either side of the Ertikan. Nothing he made ever broke, and the chieftains never bothered him. If he flipped a coin and let you call both heads and tails, that coin would sure as daybreak land on its side. \n\nWhen the miners saw those city folk up in the mountains, they just about had a fit laughing. But Igur didn’t pay them any mind, and he and his craftsmen went out to Godu anyway. Igur found a cave buried deep in the underbrush, and, after entering, he saw a glow. What could it be except a vein of the shiniest gems you ever did see?”"

 karach_those_that_fall_giants_title:0 "Those that Fall Giants"
 karach_those_that_fall_giants_desc:0 ""The lumberers didn't always have an axta. For a long time, the chieftains owned the jungles, the lumberers felled the trees within them, and that was that. No one had thought to ask whether it might be different: no one, that is, until Kartu Skygaze.\n\nKartu was a lumberer like any other; where others rested after their shifts, Kartu would go and sit with a neighbor to listen and speak. Slowly, the lumberjacks began to feel like something more than separate people doing the same hard work in the same dark jungle.\n\nOne evening, at the edge of the trees, Kartu found a miner sitting alone. The two of them talked the way tired people do: about work, about the chieftains, about how things were, and how they might be. Kartu listened. Kartu spoke. Then Kartu went home and thought for a long time. The next week, he went back to that edge of the forest to meet his miner friend. The miner had brought a farmer, and the three started talking.\n\nWhen Kartu finally walked into the chieftains' hall, the miners and farmers joined him. The chieftains looked out and understood.\n\nThe lumberers felled another giant that day. Kartu quietly returned to the jungle the next morning with no fanfare or triumph.""

 karach_the_sacred_arts_title:0 "The Sacred Arts"
 karach_the_sacred_arts_desc:0 "“Have you ever asked yourself why it is that, when the Bloodcurse wells up, we have such wonderful songs to sing and such grand art to admire? Let me tell you the story.\n\nIn the days before the artists’ axtas, the art in Karach was made by the Hashaz and the chieftains behind them. The common folk were starved for music, and what little reached them was about the chieftains, how fine their things were, and how wise their rule was. When the axtas heard these songs, the Bloodcurse threatened to boil over.\n\nBack then, Tralit Songhowl was nothing more than a Hashaz, making songs day in and day out about the chieftains. Every time he did, he felt a little bit of the spirit that writes songs slip away. The chieftains could make Tralit write the songs they pleased, but they couldn't control the man who wrote them.\n\nInstead of sleeping at night, Tralit wrote songs about the bards and the painters: what they were, and what they could be. Line by line, night by night, he composed sheets of music one by one on the fine paper the chieftains paid for. And on one still night, he gave the common folk something to sing.\n\nThe chieftains woke that morning to an almighty racket: drums banging, horns howling, and Tralit at the center of it all.”"

 karach_the_art_of_remedy_title:0 "The Art of Remedy"
 karach_the_art_of_remedy_desc:0 "“Now, the bullheadedness of the miners may have been what got the whole axta business started, but don’t you ever forget that there are people all over Karach who have heroes too. Let me tell you something of the hero of the chemists.\n\nHis name was Arkant Starborn, and if he was a little bit in his books, that’s just how he was. All the chemists were, but when Arkant walked through the market, he didn’t see ingredients — he saw formulas.\n\nIn Arkant’s day, the chemists had a problem. Their spices were mighty fine things, and there were quite a lot of people out there who wanted those recipes, including the rich and powerful farmers. Only the chemists knew how to brew them all, but each chemist stood alone; eventually, one of them was sure to take a payday from the farmers’ axta.\n\nArkant loved his people, even if he was a bit number-headed, and so he turned over that problem in his head until he found a way to solve it. The chemists weren’t on board, but Arkant was, and his mind moved like a lightning strike. So he laid out what the chemists should do to protect themselves and band together with all the facts and figures that the others needed.\n\nThe chemists thought. They ran the numbers. Eventually, they agreed. That’s how the chemists’ axta was born.”"

 karach_sugar_and_song_title:0 "Sugar and Song"
 karach_sugar_and_song_desc:0 "“The story of Karach and the Mashkay lizardfolk is a story of the two greatest goods of the Mashkay: the sugar sweet as the daybreak, and their songs, which might be even sweeter. The Mashkay have always been willing to trade sugar, but for a long time they hoarded their music for themselves.\n\nAll of the Mashkay’s songs were locked up in a big coastal citadel our bards couldn’t reach. This made all the bards fuming mad, especially Ushux Skyseeker.\n\nUshux was a free spirit, and he thought that songs should be free to be sung instead of echoing off stone walls for no one. So he went to the tower in the Mashkay’s homeland. He told the guards there was a sugar cart tipped over outside, and sure enough there was! Ushux had a Mashkay friend, you see, and the two of them thought that songs should be for everyone. Once the guards left, Ushux sneaked into the tower. Ushux proved up to the challenge of avoiding the tower’s patrols, and he soon located the chambers where the songs were sung. He hid there for many months, only dashing out for food. \n\nEventually, Ushux left. He sang songs that no one outside that tower had ever heard before all the way home. The Mashkay were mad, but as they sulked, there was a smile in their eyes. From then on, he was known as Ushux Songthief.”"

 karach_the_beautiful_embroidery_title:0 "The Beautiful Embroidery"
 karach_the_beautiful_embroidery_desc:0 ""The Enkaxta was founded by traders and artisans alone, but that isn’t the whole story. After all, the Enkaxta do their closest trade with the weavers: where does the weavers’ thread intertwine with their story? Listen closely.\n\nThe friendship between weaver and merchant wasn't always so. The fabric arts used to be mocked by the Enkaxta, and the weavers' quarter suffered for it. The Speakers never sent their representatives down to where the weavers worked — until Sezo Wiseclaw. When you needed something impossibly beautiful or simply impossible, you went to Sezo.\n\nOne day, she went to the merchants' axta and asked them why they never traded with the weavers. They scoffed, saying that when the weavers made something worth buying, the axta would come. So Sezo took her savings, locked herself in her shop for years, and wove something worthy of buying.\n\nEventually Sezo emerged, lugging a great bolt twice her height tall and five times her height wide. Refusing help to carry it, she went to the merchants and unrolled a tapestry depicting the tale of the Enkaxta in intricate, loving detail.\n\nHer price was four times what she needed to save the weavers' quarter, and the Enkaxta paid it.""

 karach_lumberers_folly_title:0 "Lumberer's Folly"
 karach_lumberers_folly_desc:0 ""Now I wish to tell you the strange tale of the lumberers and the Mashkay — the people of the land and the people of the sea. Where could they meet? On the coast, of course!\n\nThe power of the lumberers' axta could be felt across all the junglewood, and one day their Speaker had a fine idea: if Karach expanded further to the sea, it would need ships. Who better than the ones who chopped the wood to shape it? So thought Iggu Riverrunner, the lumberer in charge of sending shipments to the coast. The only problem was that no one wanted to be the first out to sea nor compete with the Mashkay at building ships. What if they failed?\n\nIggu was always the audacious sort. He pitched the Speaker on a plan, and the Speaker agreed. And so the lumberers double timed, chopping around the clock for weeks,  assembling one great shipment of logs. The Mashkay, meanwhile, were growing antsy waiting on their wood, but none came. So they waited. And waited.\n\nUntil it all came at once, clogging the river. On top of the log boom sat what must have been a hundred Ashhana, tools in hand and books under their arms. And who was perched on the highest log wearing his snagglefanged grin but Iggu Riverrunner?\n\nOf course, this wasn't quite the end of the story.""

 karach_the_chieftains_exile_title:0 "The Chieftain's Exile"
 karach_the_chieftains_exile_desc:0 "“There are a lot of stories in this wide world; I’ve told you a lot of the good ones, but not all stories are happy. Some stories are about greed and what happens when people are pushed to the brink.\n\nThe chieftains saw their subjects making axtas, and a thought started boiling in their heads. They couldn’t stop the axtas as if they said no to Uzgar Stonescribe all those years ago, and they couldn’t form an axta. What would it be for?\n\nSo the chieftains stewed and stewed, the Bloodcurse growing stronger and stronger in their hearts until it burst. If they couldn’t stop the axtas and they couldn’t have an axta, then there couldn’t be any more axtas. They would destroy them all and return to the savage and terrible ways of the Ashhana’s past.\n\nAnd so they made a place called Shyarayan: if they couldn’t rule over cities, they’d rule over ashes, holding the Bloodcurse close. And things were hard in Karach for a while.”" 

 #####Estates
 estate_karach_axta_name:0 "Zytagaxta"
 estate_karach_axta_desc:0 "The axtas of Karach operate independently for the benefit of their members, but do sometimes form associations between themselves to encourage greater trade and peaceful relations. The Zytagaxta is the axta of axtas for any who make a living by sweat and labor, and are interested in expanding Karach abroad and making sure the workers have a voice in any decision Karach makes."
 estate_karach_enkaxta_name:0 "Enkaxta"
 estate_karach_enkaxta_desc:0 "The axtas of Karach operate independently for the benefit of their members, but do sometimes form associations between themselves to encourage greater trade and peaceful relations. The Enkaxta is the axta of axtas for urban dwellers and merchants, and is consequently concerned with making sure its members have markets both domestic and abroad to sell their goods."
 estate_karach_nataxta_name:0 "Nataxta"
 estate_karach_nataxta_desc:0 "The axtas of Karach operate independently for the benefit of their members, but do sometimes form associations between themselves to encourage greater trade and peaceful relations. The Nataxta is the axta of axtas for the holy and the learned, and places a great emphasis on making sure Karach walks the proper path."


 #####Events
 
 flavour_karach.0.t:0 "The Betrayer"
 flavour_karach.0.d:0 "“They say in lands of Karach, there are no neutrals there. This appears to be a lesson that [Root.Monarch.GetName] has taken to heart. As the forces of Shyarayan have marshalled, [Root.Monarch.GetSheHe] has made a choice. [Root.Monarch.GetSheHeCap] has defected to Shyarayan, in one last desperate bid to claw back power from the axtas.\n\n[Root.Monarch.GetSheHeCap] has taken much of the chieftains with [Root.Monarch.GetHerHim]. They have despised the power of the axtas ever since the days of Uzgar Stonescribe, and now that the chance has come up to do something about it the ruling class has embraced it completely, Bloodcurse and all.  \n\nTo stand against the Traitor King and [Root.Monarch.GetHerHis] chieftains, all the axtas across the land have formed a provisional council as we work to win the war. Us workers haven’t got a chance unless we organize, and organize we have: we march now to battle in defense not just of the axtas, but of art and civilization itself.”"
 flavour_karach.0.a:0 "Which side is [Root.Monarch.GetSheHe] on?!"

 flavour_karach.5.t:0 "The Miners’ Axta"
 flavour_karach.5.d:0 "“It was a day like any other. The sun rose high above the cliffs. It beat down hard on everything below it, and it glinted off the metal of the great carts of ore. The carts had been assembled over months and months, by the brute strength of the miners and the wisdom of their foremen. They sat waiting in the heat.\n\nUzgar Stonescribe stood above it all, making sure that the carts that came out of the mines went to their proper places, for everything had a place in the mines. He had clawed his way up in the mines for years. First he pulled the carts, then he mined the ore that went in them. It was only after that that his predecessor as head foreman let him direct some of the work. It built respect for the mines, he said. He looked out over the mines, and everything was good.\n\nBut then, along the winding path that led back to the main road, Uzgar Stonescribe saw something that didn’t belong in the mines. The chieftains and their men had come, as they did every so often. They had come to pick up the ore, and sell it off to fund whatever it was they did. They’d pay his miners scraps.\n\nTheir head man stopped in the middle of the road and looked down at Uzgar. Uzgar was taller than him, but that’s the way it was, somehow. ‘Pickup’s ready. Have your men haul those carts onto our wagons, and then we’ll pay you your wages.’\n\nUzgar Stonescribe stared right into that chieftain’s eyes. He looked at him in his rich robes. He looked back at his miners. He thought to himself about respect for the mines.\n\nHere was one who had none. He opened his mouth to speak.\n\n’No.’\n\nMurmurs rose, among the chieftain’s men and his own both. ‘What do you mean, no?’ The chieftain spoke with a sneer in his voice. ‘Who will feed you, then? Who will move that ore?’\n\n’I don’t know, but at least it’ll be our food, the same way this is our ore. We mined it, we’ll be keeping it. Our answer is no. Now get off our road.’\n\nAnd so the chieftains left. Things were harder than they were in the mines, for a time. But the hardships were the miners’ own.”"
 flavour_karach.5.a:0 "And that’s how the miners’ Axta was born."

 flavour_karach.2.t:0 "Enkaxta’s Bargain"
 flavour_karach.2.d:0 "“Alaka Wardancer stalked into the chieftains’ high hall. She smelled blood. The chieftains of all the different lands were set up at their grand table, eating a meal. The feast was very well furnished, even if things were looking a little more threadbare for the chieftains these days.\n\nAlaka didn’t wait to be called in. The chieftains were conversing with each other over their food, and didn’t even look at her. ‘We’re forming an axta,’ she said.\n\nThe word ‘axta’ got the chieftains’ attention. The hall grew silent, and they all turned to look at her. ‘And how are you going to do that, without us?’\n\n’It’s already been done,’ Alaka said. ‘We don’t need your permission, and we don’t need your aid. I just thought I’d do you the courtesy of letting you know.’ She walked up to the head of the table. ‘We thought we didn’t need an axta, because we were already richer than you. But what we forgot is that numbers bring influence the same way money does. You proved that to us when you let the miners steal our claim out from under our noses. We forgot that. We won’t again.’\n\n'You're making a mistake,' the head chieftain said. His voice had gone cold. 'The merchants who have tried to move without us have found the roads very difficult lately. The ones who have tried to sell without our blessing have found their buyers very hard to reach. You are wealthy, Wardancer, but wealth needs to move to mean anything.'\n\nAlaka looked at him for a long moment. 'Is that right,' she said. It wasn't a question.\n\n’Perhaps we have been hasty,’ said one of the chieftains wearing silk. ‘We can be allies, and provide you with the favors worthy of your station, if you will only work with us.’\n\n’Nobody gives out anything they don’t have to in this world,’ replied Alaka. ‘The fact that you’re saying that now means that we can take what we want, same as we would if we worked with you. Then we’ll take more, and the [Root.Monarch.GetTitle] can deal with us directly. We’re forming an axta.’\n\nThere wasn’t anything left to say, at that point. The head chieftain’s jaw tightened. He knew it same as she did.\n\nAlaka took a fine dessert on her way out.”"
 flavour_karach.2.a:0 "All the chieftains could do was mutter."

 flavour_karach.3.t:0 "The Ballad of Ikhaty Sunlover"
 flavour_karach.3.d:0 "“Now I’ve heard tell of Ikhaty Sunlover, and I’ll tell you what I heard. Some say the tale’s grown too much in the telling, but I say it hasn’t grown half enough.\n\nIkhaty was born a miner, born with a hammer in his hand. They say he swings it for the axta, that he drives the chieftains from the land. \n\nThe chieftains came with their soldiers. The axta answered the call. The miners and the traders and bards stood behind him, Ikhaty stood tallest of all.\n\nAnd Ikhaty said to the chieftains, ‘Well a man ain’t nothin’ but a man. And before I let you beat us down, I’ll die with a hammer in my hand, I will, I’ll die with a hammer in my hand.’\n\nThey say his shadow goes into battle, before Ikhaty goes in too. They say the chieftains hear that hammer singing, and none of them know what to do.\n\nThey say Ikhaty knows all in the column, every miner and farmer and bard, and when he calls out to you in the morning, the war doesn’t seem quite so hard.\n\nThe chieftains haven't broken yet, friends, but that hammer's still ringing out clear. When the morning comes and we need someone to lead us, I know who I want standing here.”"
 flavour_karach.3.a:0 "Finally, a steel drivin’ man!"

 flavour_karach.4.t:0 "The Ballad of Ikhaty Sunlover"
 flavour_karach.4.d:0 "“Now I’ve heard tell of Ikhaty Sunlover, and I’ll tell you what I heard. Some say the tale’s grown too much in the telling, but I say it hasn’t grown half enough.\n\nIkhaty was born a miner, born with a hammer in his hand. They say he swung it for the axta, that he drove the chieftains from the land. \n\nThe chieftains came with their soldiers. The axta answered the call. The miners and the traders and bards stood behind him, Ikhaty stood tallest of all.\n\nAnd Ikhaty said to the chieftains, ‘Well a man ain’t nothin’ but a man. And before I let you beat us down, I’ll die with a hammer in my hand, I will, I’ll die with a hammer in my hand.’\n\nThey say his shadow went into battle, before Ikhaty went in too. They say the chieftains heard that hammer singing, and none of them knew what to do.\n\nThey say Ikhaty knew all in the column, every miner and farmer and bard, and when he called out to you in the morning, the war didn't seem quite so hard.\n\nNow the chieftains are gone from the land, friends, and Ikhaty still swings his hammer true.They ask me who ought to lead us. I say, who's done more than he has for you?”"
 flavour_karach.4.a:0 "Finally, a steel drivin’ man!"

 flavour_karach.1.t:0 "A Deal Struck"
 flavour_karach.1.d:0 ""Sulish stood at the front of the gathered farmers as the procession came to a stop. He had not seen his brother in many years, and for a moment he forgot the picks and the mountain dust. 'Sozyr.'\n\n'Sulish.' Sozyr stepped forward, and the brothers embraced. There were new scars on their scales that hadn't been there before.\n\nBut the farmers behind Sulish were murmuring, and the miners behind Sozyr were watching with flat eyes, and so they stepped apart.\n\n'You lead them now,' Sulish said.\n\n'I speak for them. There's a difference.' Sozyr looked at his brother, and the farmers behind him. 'We've come to talk about the chieftains,' Sozyr said. 'We said no to them. But we still need to eat, and you need metal for your tools, and neither of us is getting a fair price.' He spread his hands. 'So here we are.'\n\nThe murmuring grew. Sulish heard the words he expected: miners, cheat, stranger. He raised a hand and the farmers settled, reluctantly.\n\n'The miners have always kept the best of what comes out of the mountain,' Sulish said.\n\n'Farmers have always kept the best of what grows in the valley. I know. I grew up there.' Sozyr stepped closer, and he lowered his voice so that only his brother could hear. 'They need each other up in the mines. The man who pulls the cart respects the man who swings the pick, because he's done it himself. It could work the same way between us. The chieftains take a cut of everything we sell or buy because we don't trust each other otherwise. What if we did? What if we spread across the land, and made sure we could survive on our own? What could we do then?'\n\nSulish was quiet. Then one of the miners unslung a sickle and held it out to an old farmer near the front, hilt first. 'We made a few of these on the road down. Figured we'd need something to talk with.' The old farmer took it and turned it over in her clawed hands, testing the edge with her thumb. It was good work.\n\nSulish looked at his brother. Sozyr looked back at him.\n\n'Alright,' Sulish said. 'Let's talk.'”"
 flavour_karach.1.a:0 "And so the Axtas grew one more, and bound themselves in blood."

 flavour_karach.6.t:0 "A Conversation in the Mines"
 flavour_karach.6.d:0 "“The two miners thought of home as they ambled out of the shaft. The work was hard that day, as it was every day, and at the end of a shift all a man wanted to do was eat his supper and go to sleep. But as they started to head for home, the two miners saw a group.\n\nThey were gathered in front of something massive etched on the cavern wall in bare lines. It was a miner, standing taller than any had ever seen before. He held his pick up to the sky defiant, as if he was making a promise that the whole world could hear. He was dressed in the clothing of the mines, but around his neck was a fine necklace, of the type the chieftains wore. It would be a necklace of many colors, once the colors were there.\n\nHe was just lines for now, but those lines were the start of something grand, and everyone could see it. In fact, that’s what the conversation was about. People were talking about what that miner could be. What if the miner stood on top of a mountain, and he was crying out to the people below? What if he had that green streak on his scales that the foreman had? What if there was a yellow glint in his eyes, the same way that the miners got as they sang their working songs?\n\nAs the two miners and the group in front of them got wrapped up in their possibilities, a clatter echoed on the cavern floor. Everyone looked up, and on that cavern floor they saw the fine brushes and paint that belonged to the axta, and which were only brought out on the special days. The group surged towards them, and the work began. The discussion broke out into groups about who would paint what, and how it would look, and how fine that miner would look when they were done.\n\nOne of the two miners picked up a brush. It was lighter than a pick. It felt calmer.”"
 flavour_karach.6.a:0 "Those groups became the very first workshops."

 flavour_karach.9.t:0 "A Brawl in the Mines"
 flavour_karach.9.d:0 ""The two miners stalked out of the shaft together, which was the only thing they agreed on. Durgat had bumped into Yezir at lunch- or Yezir had bumped into Durgat, depending on who you asked- and Yezir had answered with an 'accidental' spade to the back of the head, and now there was only one way to settle it. A hate grew between the two that boiled for the rest of that working day. They were on their way to the fighting rings, but the fighting rings were for small disputes. This was not a small dispute.\n\nAs Durgat emerged onto the surface and was blinded by the setting sun, Yezir decked him on the back of the head. He fell to the ground like a sack of flour, but sprung up ready to visit that pain back tenfold until-\n\nHe stopped. On the cavern wall, caught in the last of the evening light, was the outline of a miner standing taller than any had ever seen before. He held his pick up to the sky defiant, as if he was making a promise the whole world could hear. He was dressed in the clothing of the mines, but around his neck was a fine necklace, of the type the chieftains wore. It would be a necklace of many colors, once the colors were there.\n\nDurgat pointed at it with a single claw. Yezir was wary of a trick, but he turned and looked, and he saw it too. He saw how perfect it could be, if only it was filled in the right way.\n\nPeople were already working on it. They both moved toward the parts that caught their eye the most. There was enough room for everyone, and each of them could make the colors swirl whichever way they pleased. All of a sudden, that dispute didn't seem so important anymore. What mattered was the colors. The paint looked so nice as it dried.\n\nThings felt better, then.""
 flavour_karach.9.a:0 "And so the miners’ workshops began to form."

 flavour_karach.7.t:0 "The Call of the Sea"
 flavour_karach.7.d:0 "“Once Iggu Riverrunner sailed his men out to make their shipyards, the Mashkay started getting nervous. They couldn’t compete with the flow of ships coming out from the shipyards, and it was getting harder and harder to turn a profit on their own shipbuilding ventures. What could they do?\n\nThat’s when the Mashkay remembered that they could always go farther out to sea, and so they did. Floods of Mashkay sold their lumberyards to the incoming Ashhana of the lumberers’ axta, and took up sailing themselves.\n\nThe lumberers thought they had won, of course.\n\nThey thought that until word of a new axta forming on the sea reached them, which had even already affiliated itself with the rich and powerful Enkhaxta. It was an axta of the sailors, and the Mashkay had stocked it with their ranks. From then on the lumberers negotiated ship prices with the axta instead of each Mashkay alone, and they got a taste of solidarity from the other side.”"
 flavour_karach.7.a:0 "And so the sea got what it wanted, same as ever."

 flavour_karach.8.t:0 "Monopoly on the Sacred"
 flavour_karach.8.d:0 ""The chieftains came to him before the noise had even died down. Tralit was not hard to find: he was standing in the middle of it.\n\n'Enough,' said the head chieftain. He was used to being heard. 'This ends now. You will come back, and you will write what you are paid to write, and we will say no more about this.'\n\n'I'll come back,' Tralit said, 'when the songs belong to the people who sing them.'\n\nThe chieftain's eyes swept over the crowd. 'Who will put on the fine festivals you perform at? You?' The chieftain spoke with a sneer in his voice.\n\n'Yes,' said Tralit. 'Us.' He looked back at the other Hashaz. They were watching their feet. But the commonfolk met his gaze. First Urqe, who had been playing the drum. Then Lazar, who had the horn.\n\n'You'll write nothing worth hearing without our resources,' the chieftain said. 'Without our halls and our instruments and our paper. You'll be nothing but noise.'\n\n'We already have something worth hearing.' Tralit gestured at the crowd around them. 'You just tried to silence it.'\n\n'That wasn't music. That was a rabble.' The chieftain stepped closer. 'We are the ones who buy your art. We will pay you nothing. You will starve in the streets.'\n\nThe air grew very still. Tralit let the threat sit for a moment.\n\n'Then you won't have any songs anymore,' he said.\n\nUrqe hit her drum. It was a single beat, flat and hard. The chieftain spun toward her, but she hit it again, and this time Lazar answered with the horn, a long low note that had no polish to it at all. Then someone else came in, tentative at first, then stronger. The sound was rough and it knew it. The band was still finding itself, still arguing, each voice pulling against the others.\n\n'I am warning you-' the chieftain started.\n\nAnother drum joined. Then another horn. Tralit raised his hand and the crowd looked at him. Then he brought his hand down.\n\nWhat came up was not yet beautiful. But it was growing, each voice learning the shape of the others, the roughness beginning to resolve into something that had not existed before that morning. The chieftain raised his voice, and then raised it again, and then he found he was shouting, and then he found he could not be heard at all.""
 flavour_karach.8.a:0 "And the Axta controlled the music after that."

 flavour_karach.11.t:0 "An Election of the Axtas"
 flavour_karach.11.d:0 "“The High Speaker’s term is ending, and the time has come to select the one who will lead our nation forward beyond his term. There are many candidates, from all the axtas of [Root.GetName]. They campaigned with all their might, and each of the axtas threw their weight behind their chosen one, but only one can win.\n\nIt falls to each of the votes of each of the workers of [Root.GetName] to decide the course of the nation. Who have they elected as their chosen voice?”"
 flavour_karach.11.a:0 "The Candidate of the Miner's Axta!"
 flavour_karach.11.b:0 "The Candidate of the Farmer's Axta!"
 flavour_karach.11.c:0 "The Candidate of the Lumberer's Axta!"
 flavour_karach.12.a:0 "The Candidate of the Merchant's Axta!"
 flavour_karach.12.c:0 "The Candidate of the Sailors's Axta!"
 flavour_karach.12.b:0 "The Candidate of the Artisan's Axta!"
 flavour_karach.13.b:0 "The Candidate of the Chemist's Axta!"
 flavour_karach.13.c:0 "The Candidate of the Painter's Axta!"
 flavour_karach.13.a:0 "The Candidate of the Bards's Axta!"

 flavour_karach.20.t:0 "The Ocean Blue"
 flavour_karach.20.d:0 "“Zamr Waverider looked off the side of the ship into the endless azure blue. That was all he saw all day: blue, blue, blue. He hauled rope on his ship the same as he did every day, and the mechanical motions gave him time to reflect on the anger within, and how it thrived on monotony. Monotony as consistent as a deep, unchanging ocean blue.\n\nBut then the hauling was done, and Zamr could step off the gang plank of his ship. He walked across the docks to the small fisherman’s house that he lived in during the time that he wasn’t on the sea. His steps grew lighter. \n\nHe threw open his door, and he pushed past his small kitchen in a rush to get to the back of his house, where there stood a room with a canvas as wide as his back wall. He opened the door, and looked out at his painting. \n\nZamr Waverider let out a happy growl. There, on the left side, was his ship. Above it was a beautiful sky, glowing with the orange of a workday done. Birds soared overhead. He picked up his brush, and began to work on the color of the ocean some more. This was his favorite part. \n\nHe could not control the unceasing blue of the ocean. But on Zamr’s canvas, the sea swirled with rainbows.”"
 flavour_karach.20.a:0 "The world is what we make of it."

 flavour_karach.21.t:0 "The Dotted Cows"
 flavour_karach.21.d:0 "“Zibara Farsight led her cows in from pasture on the same rope she had used for years. They wanted to see their friends, and Zibara was not one to deny her cows anything. Each cow had intricate swirls of paint detailed on its skin, with the care that came from repainting them each day.\n\nAs they arrived at the place where the other farmers were, her cows began to fan out, and Zibara did not have any fear that they would go missing: they each had her starburst in green painted on their backs. The cows gathered with their friends, and each color congregated together: red cows with red, blue cows with blue, yellow cows with yellow. That was just the way things were.\n\nThe farmers were walking around the ring with rich paints on their easels, touching up their cows’ paints and making new marks. Zibara went to her favorite milkcow first. She had always been a sunny, happy cow, and so Zibara named her Morning Glory. She had swirls of yellow painted between her horns, for there was no way she could be colored anything else. Zibara began to paint.\n\nShe finished her work, and as she did Morning Glory mooed and butted her lightly on the head. Zibara laughed, and gave her cow’s ear a touch of red.”"
 flavour_karach.21.a:0 "Not so yellow after all, perhaps!"

 flavour_karach.22.t:0 "A Golden Present"
 flavour_karach.22.d:0 "“Uryzmag Stonescale emerged from the mineshaft, and as he did he passed by a mural of a miner ten miners tall, whose necklace was painted with all the colors of the rainbow.\n\nThe miners were on their way to the workshops, and today was a special day: the excavation teams had found a vein of gold. The axta would sell most on the market, of course, but some of the richest and most lustrous had been given to the miners’ workshops.\n\nUryzmag almost ran to his seat. The miners had threaded together the string chains of their necklaces the week before, and now it was time to make the amulets. Lovers’ Day was soon approaching, and the craft he made could not be anything less than perfect.\n\nHe reflected on Achagi, and the way she had of knowing the names of all the trees in the jungle on their walks together. He would craft her an amulet of trees, he decided. He would line the outside with wood, and on the inside he would fill her necklace with leaves of gold. The time flew by as he added small details to the design. They wouldn’t mean anything to someone else, but the amulet was for Achagi, and it didn’t need to mean anything to anyone but her. He managed to sketch out the design before workshop adjourned for the day.\n\nHe went out into the evening, and as he left the mines did not follow him home. He couldn’t wait to give Achagi the amulet. Lovers’ Day couldn’t arrive quickly enough.""
 flavour_karach.22.a:0 "Art made with love is the best art of all."

 flavour_karach.23.t:0 "The Moving Restaurant"
 flavour_karach.23.d:0 "“Zashyt Dreamchaser woke up in her bed, and almost hit her head on the ceiling of her restaurant. There was not much space in the boat, and so she and the others had to make do with only a spare bunk each. Her friend Nichuk crashed down from the bunk below her.\n\nThey both made their way into the cooking area, and Nichuk began to cook up that morning’s eggs with saffron, just the way the whole boat liked it. As he did, Zashyt touched up the paint on the outside of the hull. She had been a bard her whole life, so the painting was more colorful swirls and pleasing shapes than any picture, but she did her best.\n\nMore than painting, she loved writing the songs that they used to attract patrons. As the other bards ate their breakfast, Zashyt got out her lute and began to strum out a few lines of her latest song. The next town was close, and they wanted to make a good first impression. Their food was luxuriously spiced, it was true, but it wasn’t the food that drew customers in to eat: it was the music.\n\nNichuk brought up the anchor. Their boat began to drift downriver towards the next town, and as it did Zashyt sat on the roof, where she could see clear down the river into a colorful market square. She sang a song of wonders to be seen and wonderful food to be had in a high, clear voice, both at a very affordable price.”"
 flavour_karach.23.a:0 "All are welcome at the amazing moving restaurant!"

 flavour_karach.24.t:0 "Smells and Looks"
 flavour_karach.24.d:0 "“It was always important that Ashhana look their best, and nobody knew this better than Surkind Earthblade. He had been a painter for years, but it was only at the workshops that he got to work with his favorite canvas.\n\nThe workshop had new models today, and he was eager to see what he had to work with. They were from the farmers’ axta, and Surkind loved them, but the farmers had never had the best sense of fashion. Sure enough, the farmers had come to the workshop today in their working robes. They were dirty, and there was a strange grit that hung between their scales.\n\nSurkind had worked with worse. He flew into action, and he and his fellow Hashax began the makeover process. They had to be cleaned first, of course. Then came the application of dyes onto the models’ newly cleaned scales, and there was a striking new purple that Surkind wanted to try out. It would go nicely with the deep blue of a set of robes he had for them.\n\nThen came the application of the incense. Surkind had a smell for every occasion, and this one was no different: these robes would pair so well with a scent of jasmine. The Hashaz began to apply the incense, and as they did a wonderful scent filled the room.\n\nAt last, the work was done! The farmers emerged out into the dusk clean, fragrant, and slightly bewildered.”"
 flavour_karach.24.a:0 "Another masterwork created!"

 flavour_karach.25.t:0 "Forged in Fire"
 flavour_karach.25.d:0 "“Irlak Skywrite had spent all day in the mines, and he itched the whole time with a nervous energy. He worked twice as fast as he usually did. He could not eat his lunch. But at long, long last, the day was over. It was time for the competition.\n\nA cheering crowd ringed the workshop that day, and Irlak pushed his way through to meet his artisan, Atirta Clearsea. They did not speak. It was the finals: they both knew the stakes.\n\nA great boom echoed out: the competition had begun. Irlak rushed to his bellows, and began to pump with all his might. The weapon they were to forge this day was an intricately complicated glaive from the days of one of the first great Ashhana nations. It was completely impractical for war. That didn’t matter: it was the art itself that brought him peace.\n\nHis scales grew hot as he worked, and across from him he could see Atirta working just as hard on the handle and the adornments for their glaive. At last, he quenched the weapon and handed it over to Atirta.\n\nThe time blitzed by him in a great stampede: it was time to be judged. Atirta gave their glaive to the judges. She had done a magnificent job: it was all edges and brilliant colors. Irlak watched the judges. He could not read their faces. \n\n’Irlak Skywrite!’ What was that? Who said his name? Atirta was pushing him forward. Towards the trophy. They’d won, they’d won! He knew they would! Atirta wrapped him up in a great hug as he lifted the trophy high, and as he looked at the weapon he made his mind fizzed with joy.”"
 flavour_karach.25.a:0 "The best glaive won, tonight."

 flavour_karach.26.t:0 "The Tanco"
 flavour_karach.26.d:0 "“Traak Bloodcarver sat down at the lumberers’ workshop, and began to wonder what he might make that day. He had spent all of last month making a multi-story wooden birdhouse to hang on the outside of his home, and it was already paying off: he had put a glass wall on the side that faced his window, and he could see birds beginning to move in. Watching them calmed him.\n\nAs he thought some more about his birds, he saw the instructions being passed out. They were to make sandals?! This had nothing to do with wood. It had nothing to do with art. Despite his best efforts, Traak began to grow angry. But then he saw the materials being passed out, and that the shoes were to be made of wood. Perhaps he could give this a chance after all.\n\nIn the coming days, Traak and the lumberers returned to the workshop day after day, as they made their new tanco shoes. Traak carved curved, smooth lines into his wood, and whittled it down so it would fit his feet well. He sanded the wood down to remove its imperfections. On the last day, Traak painted his new shoes with patterns of jungle trees, the same as the ones he cut down to make them. \n\nTraak Bloodcarver walked home that day in the tanco he made himself, along a path whose rocks did not hurt his feet. As he reached his home, he heard the sound of birdsong.”"
 flavour_karach.26.a:0 "Anything can be art, if treated with reverence."
 
 

