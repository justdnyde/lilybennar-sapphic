 molten_eternity_order:0 "Molten Eternity Order"
 molten_eternity_order_short:0 "Molten Eternity Order"
 molten_eternity_order_full:0 "Molten Eternity Order"
 kihokamalama_order:0 "Kih‡k€malama"
 kihokamalama_order_desc:0 "The Navigators of Enlightenment know better than anyone else that the world is a changing place, because they remember the changes. They make it their mission not just to do good, but to make sure that conception of the good always aligns with the will of the Great Creator, who will be born or fail to be born through our actions. Through debate, discussion, and reference to vast libraries of the texts of old, the Navigators of Enlightenment make sure that the people do not lose their way as they move towards what is good."
 tumirbedi_order:0 "Tumirbedi"
 tumirbedi_order_desc:0 "The Caretakers of Prosperity know that each of their actions have consequences, and that each of those consequences have consequences in turn. Each incarnation of the Universal Soul is connected to each of the others in a grand web, and the Caretakers dedicate all of themselves to making sure those links of trade and wealth stay strong. But there will always be those on the outside of any web, who are not as supported by others. The Caretakers supply these people with alms and aid, for they know that everyone can do good if only they are given the chance."
 tlokopinaztica_order:0 "Tlokopinaztica"
 tlokopinaztica_order_desc:0 "The ranks of the Wardens of Forgiveness are not exclusive. They travel from place to place doing deeds by which they might be remembered, and in each place they seek wretches and wrongdoers to join them. Their creed is redemption: as long as each of us draws breath we might do good, and in doing so be remembered not as criminals and evildoers, but as people. People who did their best, and righted themselves when they stumbled."

