l_english:

############
###EVENTS###
############
 molten_eternity.0.t:0 "A Molten Birth"
 molten_eternity.0.d:0 "As Kanolowele and the Utubodi Plateau have grown closer, both regions have exchanged goods, culture, and most importantly ideas. It has been a time of religious flourishing, and believers in the Volcanic Truth have made their way across the continent to spread their faith.\n\nAs they have, they themselves have been influenced by ideas of the Infinite Self. From dialogues of the Volcanic Truth with followers of the Speaking Memory and Infinite Self religions, an entirely new religion has emerged with influences of all three faiths. They call themselves the Molten Eternity, and they believe that the reincarnation of all things of the Infinite Self is not guaranteed to lead to a benevolent Great Creator: depending on whether the actions of the Universal Soul are good or evil, the last being born in the chain of souls could just as easily be the malevolent Great Destroyer.\n\nTherefore, it is the duty of all practitioners to follow the ideals of the Molten Eternity towards good, forget those who do evil, and spread the faith outwards as far and wide as possible to make sure all incarnations of the Universal Soul have the chance to do good in their lifetimes.\n\nThe Molten Eternity have gathered in [6919.GetName] to found a community based on their faith from which they can spread across Insyaa. This community happens to be within our borders: do the Molten Eternity have a point?"
 molten_eternity.0.a:0 "The Great Creator grows closer!"
 molten_eternity.0.b:0 "These evildoers will soon be forgotten themselves."

 molten_eternity_convert_buff:0 "Embrace the Eternity"
 
 molten_eternity.1.t:0 "My Legacy"
 molten_eternity.1.d1:0 "I grow weak, but soon I will be reborn, and as I slip away I have been reflecting on what I have left for myself. Although I would like to think myself good, I am not the Great Creator, and although I am not perfect I am not the Great Destroyer; it seems there is more of my path left to walk. I have done- and failed to do- much, and as I reflect on it all I am coming to a clearer conclusion.\n\nI began walking the path of my virtue with such dedication: I thought myself a servant of the Great Creator. But as I tried and struggled, my failures kept mounting while my successes remained so few. I thought so many times that I should rededicate myself. The virtues were the purpose of my life. But there was always something else to do, and now there is no more life left. If there is comfort left to me now, it is that the Great Destroyer is not here yet. Perhaps I will do better next time."
 molten_eternity.1.d2:0 "I grow weak, but soon I will be reborn, and as I slip away I have been reflecting on what I have left for myself. Although I would like to think myself good, I am not the Great Creator, and although I am not perfect I am not the Great Destroyer; it seems there is more of my path left to walk. I have done- and failed to do- much, and as I reflect on it all I am coming to a clearer conclusion.\n\nI found a virtue early in life, and as I worked towards it I thought about what the Great Creator might think of my virtue, and what my interpretation of it would mean in the end. I have done great things, and Insyaa is all the better for it. But I am left with the sense that for all I have been given, I have not done quite as much as I could. A ruler stands at the apex of the pyramid of all things, and with that power I could have remade the world in the image of my virtue. I am left with a sense of regret. Perhaps I will do better next time."
 molten_eternity.1.d3:0 "I grow weak, but soon I will be reborn, and as I slip away I have been reflecting on what I have left for myself. Although I would like to think myself good, I am not the Great Creator, and although I am not perfect I am not the Great Destroyer; it seems there is more of my path left to walk. I have done- and failed to do- much, and as I reflect on it all I am coming to a clearer conclusion.\n\nI am happy on my deathbed. I always knew that of all the Molten Eternity’s virtues, mine was meant for me, and my dedication to it has reshaped the continent in its image. My actions ring through the Universal Soul, and if I have one regret, it is only that the next version of me will not remember what I have done now. Yet the Molten Eternity spreads, and tales of my deeds spread with it, and the virtues remake the world in the image of the Great Creator. Perhaps I will remember after all."
 molten_eternity.1.d4:0 "I am preparing to leave, and as my successor takes on my duties I have been reflecting on what I have left for them. Although I would like to think myself good, I am not the Great Creator, and although I am not perfect I am not the Great Destroyer; it seems there is more of my path left to walk. I have done- and failed to do- much, and as I reflect on it all I am coming to a clearer conclusion.\n\nI began walking the path of my virtue with such dedication: I thought myself a servant of the Great Creator. But as I tried and struggled, my failures kept mounting while my successes remained so few. I thought so many times that I should rededicate myself. The virtues were the purpose of my reign. But there was always something else to do, and now there is no more time left. But away from the halls of power, virtue shines most brightly: perhaps there is time yet."
 molten_eternity.1.d5:0 "I am preparing to leave, and as my successor takes on my duties I have been reflecting on what I have left for them. Although I would like to think myself good, I am not the Great Creator, and although I am not perfect I am not the Great Destroyer; it seems there is more of my path left to walk. I have done- and failed to do- much, and as I reflect on it all I am coming to a clearer conclusion.\n\nI found a virtue early in life, and as I worked towards it I thought about what the Great Creator might think of my virtue, and what my interpretation of it would mean in the end. I have done great things, and Insyaa is all the better for it. But I am left with the sense that for all I have been given, I have not done quite as much as I could. A ruler stands at the apex of the pyramid of all things, and with that power I could have remade the world in the image of my virtue. I am left with a sense of regret. Perhaps in my retirement, I can live more virtuously."
 molten_eternity.1.d6:0 "I am preparing to leave, and as my successor takes on my duties I have been reflecting on what I have left for them. Although I would like to think myself good, I am not the Great Creator, and although I am not perfect I am not the Great Destroyer; it seems there is more of my path left to walk. I have done- and failed to do- much, and as I reflect on it all I am coming to a clearer conclusion.\n\nI am happy as I depart. I always knew that of all the Molten Eternity’s virtues, mine was meant for me, and my dedication to it has reshaped the continent in its image. My actions ring through the Universal Soul, and if I have one regret, it is only that the next version of me will not remember what I have done now. Yet the Molten Eternity spreads, and tales of my deeds spread with it, and the virtues remake the world in the image of the Great Creator. Perhaps I will remember after all."
 molten_eternity.1.a:0 "[molten_eternity_1_title]"
 molten_eternity.1.b:0 "There is still time for me."
 molten_eternity.1.c:0 "I am being reborn."

