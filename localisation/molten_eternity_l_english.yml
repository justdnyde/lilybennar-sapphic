#############
###DEITIES###
#############
 speaking_memory_responsibility:0 "Responsibility"
 speaking_memory_responsibility_desc:0 "People struggled, fought, and died to ink their legacies into the records we now maintain. Every time we forget or misplace, a sacrifice sinks into the void of time, and we continue on our way none the wiser. The Great Destroyer grows closer each time we forget. The records of our ancestors are their legacy. We must steward them as though they are our ancestors themselves; in a way, they are.\n\nOur current §YObligation§! fulfillment can be seen in our government tab.\n\nWe may increase our obligation by:\n  Building State Houses: §G+100§!\n  Embracing new Ideas: §G+200§!\n  Expanding Infrastructure: §G+250§!\n  Placing Holy Orders: §G+100§!\n\nAt the unfullfilled level, once the current ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Reform Progress: §G+15%§!\n  Technology Cost: §R+2.5%§!\n\nAt the fullfilled level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Reform Progress: §G+15%§!\n\n  We will also gain §G+1§! administrative development in all provinces that have a holy order.\n\nAt the Exceeded level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Reform Progress: §G+15%§!\n  Centralize State Cost: §G-100%§!\n\n  We will also gain §G+2§! administrative development in all provinces that have a holy order."
 speaking_memory_tradition:0 "Tradition"
 speaking_memory_tradition_desc:0 "We are the product not just of the ancestors of our families, but our ancestors in the line of the Universal Soul who are not yet born. We live because of what they have accomplished, and we understand what we do because they learned it first. As we remember them, we must do so in the ways they showed us, so that when our descendants remember us they remember with the ways of their ancestors. We will birth the Great Creator into a family that has grown strong over the ages, and in this way we will all be remembered.\n\nOur current §YObligation§! fulfillment can be seen in our government tab.\n\nWe may increase our obligation by:\n  Adding a core to one of our provinces: §G+80§!\n  Arranging a Royal Marriage: §G+150§!\n  Keeping our current ruler: §G+100§!\n  Placing Holy Orders: §G+100§!\n\nAt the unfullfilled level, once the current ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Global Unrest: §G-2§!\n  Idea Cost: §R+5%§!\n\nAt the fullfilled level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Global Unrest: §G-2§!\n\n  We will also gain §G+1§! administrative development in all provinces that have a holy order.\n\nAt the Exceeded level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Global Unrest: §G-2§!\n  Concentrating Development is §Gfree§!\n\n  We will also gain §G+2§! administrative development in all provinces that have a holy order."
 infinite_self_generosity:0 "Generosity"
 infinite_self_generosity_desc:0 "A master once noticed that his food stores were depleting faster than he ate them. He sat out by his larder one night, and there he saw a thin and mangy dog eating its fill. The next night, the master left his food right outside his doorstep, and the dog in its hunger crept to his door and ate its fill again. The master kept feeding the dog and it grew stronger, until one day it was ready to make its way again. The master released himself into the world, and that day the Universal Soul sang his praises.\n\nOur current §YObligation§! fulfillment can be seen in our government tab.\n\nWe may increase our obligation by:\n  Building Manufactories: §G+100§!\n  Sending Gifts: §G+10§!\n  Attaining new vassals diplomatically: §G+500§!\n  Placing Holy Orders: §G+100§!\n\nAt the unfullfilled level, once the current ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Diplomatic Relations: §G+1§!\n  Aggressive Expansion Impact: §R+5%§!\n\nAt the fullfilled level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Diplomatic Relations: §G+1§!\n\n  We will also gain §G+1§! diplomatic development in all provinces that have a holy order.\n\nAt the Exceeded level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Diplomatic Relations: §G+1§!\n  Diplomatic Annexation Cost: §G-20%§!\n\n  We will also gain §G+2§! diplomatic development in all provinces that have a holy order."
 infinite_self_enrichment:0 "Enrichment"
 infinite_self_enrichment_desc:0 "A master once wished to buy a plot of land on which he might retire. But he was old and weak, and he no longer had the strength to work as he once did. What he did have were possessions from a lifetime of study, and a cart to carry them with. So the master began to travel, and in each town he stopped in he sold something of his own to a buyer who would care for it as he did, and each of them walked away happy. He travelled for years, until at last he returned home with a smaller cart and a pouch overflowing with coins. The master traded his cart and his coins for a place to call home, and as he sat upon the floor of his new house he felt that he had done well.\n\nOur current §YObligation§! fulfillment can be seen in our government tab.\n\nWe may increase our obligation by:\n  Upgrading Centers of Trade: §G+400§!\n  Repaying Loans: §G+1§!\n  Recruiting Admirals: §G+50§!\n  Placing Holy Orders: §G+100§!\n\nAt the unfullfilled level, once the current ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Trade Efficiency: §G+10%§!\n  War Exhaustion: §R+0.03§!\n\nAt the fullfilled level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Trade Efficiency: §G+10%§!\n\n  We will also gain §G+1§! diplomatic development in all provinces that have a holy order.\n\nAt the Exceeded level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Trade Efficiency: §G+10%§!\n  Construction Cost: §G-10%§!\n\n  We will also gain §G+2§! diplomatic development in all provinces that have a holy order."
 volcanic_truth_zeal:0 "Zeal"
 volcanic_truth_zeal_desc:0 "There are only two outcomes for our world, and they are the difference between night and day. If these two fates are predestined, it must be the case that everything we do moves the world towards one of them. Every word we say and every step we take is either performed in the service of the highest good or the most wretched evil. Our lives are battles in the war of fates, and we must conduct ourselves like soldiers. Let each of your actions work towards the change of the Molten Eternity, and spread it outward like a holy flame.\n\nOur current §YObligation§! fulfillment can be seen in our government tab.\n\nWe may increase our obligation by:\n  Annexing provinces: §G+25§!\n  Converting provinces to our religion: §G+25§!\n  Winning wars: §G+50§!\n  Placing Holy Orders: §G+100§!\n\nAt the unfullfilled level, once the current ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Shock Damage: §G+10%§!\n  Tolerance of Heretics: §R-1§!\n  Tolerance of Heathens: §R-1§!\n\nAt the fullfilled level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Shock Damage: §G+10%§!\n\n  We will also gain §G+1§! military development in all provinces that have a holy order.\n\nAt the Exceeded level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Shock Damage: §G+10%§!\n  Manpower Recovery: §G+10%§!\n\n  We will also gain §G+2§! military development in all provinces that have a holy order."
 volcanic_truth_persistence:0 "Persistence"
 volcanic_truth_persistence_desc:0 "Hunger, pain, and suffering are not pointless miseries: they are opportunities. The entire world is a test and a lesson both. Every indignity you suffer with grace is a legacy you pass on to those beyond you, and every time you buckle under their weight in your weakness brings the Great Destroyer closer to becoming. Bear your hardships with righteous defiance! You are changing the world for the better.\n\nOur current §YObligation§! fulfillment can be seen in our government tab.\n\nWe may increase our obligation by:\n  Accepting Tribute: §G+75§!\n  Recruiting Generals: §G+50§!\n  Building Forts: §G+100§!\n  Placing Holy Orders: §G+100§!\n\nAt the unfullfilled level, once the current ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Defensiveness: §G+15%§!\n  Production Efficiency: §R-5%§!\n\nAt the fullfilled level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Defensiveness: §G+15%§!\n\n  We will also gain §G+1§! military development in all provinces that have a holy order.\n\nAt the Exceeded level, once the ruler dies, this §YObligation§! will grant the following until the death of the next ruler:\n  Defensiveness: §G+15%§!\n  Fire Damage Received: §G-10%§!\n\n  We will also gain §G+2§! military development in all provinces that have a holy order."

