 #Privilege
 estate_church_violet_cults:0 "Violet Cults"
 estate_church_violet_cults_desc:0 "The hero-cults of Thektoram that celebrate figures other than warriors or conquerors have been consolidated under the leadership of the followers of the Threadbearer and Violet brotherhood. With greater support and patronage, and the deeds of their heroes written in the annals of the Violet Library, future generations will be shown that brutality is not the only path to glory."
 estate_nobles_violetblooded_kamrayakval:0 "Violetblooded Kamrayakval"
 estate_nobles_violetblooded_kamrayakval_desc:0 "The Dumruktam Dynasty now dominate the office of Kamrayakval, with the Kavalakuttam’s factions putting forwards Dumruktam scions aligned with their interests in the competition for the office.\n\nWhile some argue that the Dumruktams’ dominance represents the Oren Nayiru’s capture by the forces of tyranny, Sthanan ith Vussam’s scholars argue that it is the victory of the forces of wise and stable rule. The former view is unlikely to triumph over the latter any time soon."
 estate_church_high_kavalali_of_the_dumrusvarn:0 "High Kavalali of the Dumrusvarn"
 estate_church_high_kavalali_of_the_dumrusvarn_desc:0 "Owing to their pivotal role in unifying Taychend, the Dumruktam Dynasty that ruled the revitalised Dumrusvarn, as well as the loyal Usvatti leaders of the Goldswords, hold an outsized influence in the affairs of the state, though it is not one of total dominance.\n\nThe Dumruktams are not kings, after all, but merely honored High Kavalali of great prestige and power – and the foremost force within the Kavalalist Faction. With the old Dumrusvarn’s backing, the High Kavalali’s power is greatly bolstered."