harpylen_project.desc: "A song is a thing of sublime but fleeting beauty. But what if the essence of a song could resonate within the heart of its listeners long after the last note has faded away? This is the purpose of the 'Nilelišta', the world’s memory. By crafting lyres imbued with potent magic, the renowned song magic of the harpies can be strengthened far beyond its normal limits, its power to sway the minds and hearts of all who hear it significantly enhanced."
