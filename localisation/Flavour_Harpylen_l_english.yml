harpylen_project_3_done_tt: "Improve §YAsmalil's Melody§! to have a higher cap, up to §G20%§! administrative efficency."
flavour_harpylen.161.t: "Nilelišta: To Touch the World's Memory"
flavour_harpylen.161.d: "One of the opulent villas in the vicinity of the palace has been repurposed from the residence of an idle courtier into a veritable beehive of sorcerous activity, bustling with dozens of senior Vetaunyar, comprising some of the most famed Sanarenni flocks of the land, as well as Kurešimi inscribers recruited from the glittering mountain halls of Lawaššar, and the various acolytes, aides and master craftsmen in their retinue.\n\nAll have gathered in [Root.Capital.GetName] for one purpose and one purpose only: to turn the vision of the [Root.Monarch.GetTitle] into reality and devise a process to reliably craft magical instruments that can interact with and improve the song magic of the harpy mages. The name chosen for this project is Nilelišta, or 'the world's memory', for that is the ultimate aim of all the efforts expended here - to find a way to make a lasting impact on the world with the ephemeral magic of song.\n\nAt the center of this whirlwind of activity a massive inscribed device rests on an elevated platform. It is the 'tauhun anovin', the Dream Loom, whose sole purpose is to turn blocks of anniwan, the uniquely Bulwari blue magical metal alloy, into thin yet durable strings.\n\nThese 'jinisapo', or heart strings, are intended to allow the instrument chosen for this project, a lyre, to store the magic needed to interact with the magic in the voice of a Vetaunyar. By using such special lyres, called rianelion, or 'eternal echo', the song magic of a Sanarenni chorus shall be amplified and enhanced far beyond normal means. That is, if this ambitious scheme will prove to be a success."
flavour_harpylen.161.a: "Let us see what the first prototype is capable of!"
flavour_harpylen.162.t: "Nilelišta: The Songs that Changed the World Forever"
flavour_harpylen.162.d: "'Gather closely, little fledglings, and listen to my tale.\n\nIn a queendom of wings and song, the people spent their lives content and secure in the knowledge that their queen cared deeply for them. For their winged emissaries could be found across the land, from the most prestigious stage of the royal capital to the dusty market squares of the loneliest hamlets. And wherever they went, their songs went with them.\nSongs of love, songs of devotion, songs of courage, songs of hope, they all resounded across the hills and dales, the peaks and plains of the queendom. Each song touched the minds and hearts of the people who listened to their melodious harmonies.\nEach song bound the people of this queendom ever closer together in joyful celebration of the fundamental connection between all who think and feel and share this world.\nAnd the wind carried the thousand thousand melodies to all corners of the world, to all the many peoples beyond the queendom. And the world listened and rejoiced, gladly taking the songs into its heart so they may never be lost, never forgotten.\n\nNow, who among you can tell me what queendom I am speaking of?\nHmm, what did you say?\nYes, you are right! It is of course our beloved Harpylen, the land where the wind itself is full of song and joy! Aren't we blessed that we all can join in this grand symphony, adding our voices to the great song of songs? And in this way, no matter how long or short our lives will be, we will live on in the eternal song resounding within the world's memory.'"
flavour_harpylen.162.a: "For what are we but a fleeting melody sung by the wind?"


