flavour_harpylen.120.z: "Not right now."
flavour_harpylen.150.t: "[Root.flavour_harpylen_150_title]" # do i need this root...?
flavour_harpylen.150.t1: "Nilelišta: The Fleeting Nature of a Song"
flavour_harpylen.150.t2: "Nilelišta: A Most Harmonious Resonance"
flavour_harpylen.150.t3: "Nilelišta: The Joys of Devotion"
flavour_harpylen.150.d1: "A brisk but invigorating breeze gusted across the roads, plazas and walkways of the roost in [Root.Capital.GetName], setting banners, drapes and cleaned laundry hung out to dry alike aflutter. [Root.Monarch.GetTitle] [Root.Monarch.GetName] enjoyed the way the wind played with their feathers as they strode purposefully towards the amphitheatre overlooking a steep precipice at the edge of this level of the roost.\n\nAs soon as they found their seat, signalling the choirmistress with a slight nod that this evening's spectacle may begin, the chorus began to weave together the first of increasingly complex harmonies that soon reverberated through the quiet dusky air. The flaming disk of the sun had just sunk beneath the horizon as the Sanarenni amongst the singers worked their magic and multihued ribbons of light began to spill forth from their lips and danced across the amphitheatre in step with the music, creating a dreamlike atmosphere.\n\nAfter several hours more, all too soon for those privileged enough to enjoy it, the concert ended. On the leisurely way back to the palace, [Root.Monarch.GetName] struck up a conversation with Jorouna the Vetaunyastu, the leader of the Vetaunyar mages of Harpylen and one of their closest advisors.\n\n'You know, it is one of the great tragedies of this world that so few of our people, let alone the teeming masses beyond our borders, will ever have the sublime pleasure of hearing a truly skillful Sanarenni chorus weave their voices together to fashion a marvellous yet ephemeral work of magic.'\n\n'As usual, your words carry wisdom, my [Root.Monarch.GetTitle]. Unfortunately, my disciples are too few in number to have one of them sent to every town and hamlet in our lands, let alone an entire choral gathering.'\n\n'If only there was a way to enhance and preserve the power of their songs in the hearts of our people, even long after a Vetaunyar has flown onward to their next destination; for our songs should be cherished and preserved in the world's memory...'\n\n'You know, [Root.Monarch.GetName], there might actually be something we can do about this. Let me assemble my most promising disciples and most ingenious crafters of artifacts and see if we can construct an instrument to accompany and enhance the allure of our voices - have it fashion a lasting home in the hearts and minds of the people.'\n\n'What an intriguing idea, you have my approval to proceed at once!'"
flavour_harpylen.150.d2: "'Greetings, my most high [Root.Monarch.GetTitle], may the winds beneath your wings ever carry you onwards. I wish to provide you with a report regarding the current state and progress reached on the Nilelišta project.\n\nThe first attempt to craft a rianelion lyre has been promising, and the Sanarenni flocks who used the lyre during the performance of their song magic have reported an ease to their efforts when compared to times when they wove their songs unassisted. And their audiences appear to have been affected as well, with many mentioning a strengthened sense of community and drive to protect the flock.\n\nYet the prototype is considered somewhat basic, therefore we consider it wise to go into a more opulent direction for our next attempt. I remain hopeful that we will soon have further exciting news to report, my august [Root.Monarch.GetTitle].\n\nI remain your most devoted servant, Sanarestu Jorouna.'"
flavour_harpylen.150.d3: "'Greetings, my most high [Root.Monarch.GetTitle], may the winds beneath your wings ever carry you onwards. I wish to provide you with a report regarding the current state and progress reached on the Nilelišta project.\n\nAfter the first successful tests of the rianelion lyre our efforts have been dedicated to further improve the manufacturing process, and I am delighted to report that the latest iteration of the rianelion has once again proven its ability to enchant the hearts and minds of an audience. Those exposed to its resonant sound have been filled with a deep-felt reverence towards the queendom and an unceasing desire to devote their efforts towards the improvement of Harpylen and its lands.\n\nSome final adjustments will be required to reach the full potential of this marvellous instrument, but I am sure that it is only a matter of time until we have found a solution for all remaining issues. In particular, I humbly request your permission to test out our latest prototypes together with the cherished Asmalil. I am convinced that in concert with the powers of our Temensar, our rianelion lyres will unlock their full potential. I therefore eagerly await your reply. And, as before, I remain hopeful that we will soon have further exciting news to report, my august [Root.Monarch.GetTitle].\n\nI remain your most devoted servant, Sanarestu Jorouna.'"
flavour_harpylen.150.a1: "To etch a song indelibly into the world's memory, what a feat!"
flavour_harpylen.150.a2: "It appears we are off to a promising start!"
flavour_harpylen.150.a3: "We are getting closer to achieving our ultimate goal!"
flavour_harpylen.151.t: "Nilelišta: Stringing Everyone Along!"
flavour_harpylen.151.d: "When fashioning a delicate instrument such as a lyre, great care must be taken with the choice of proper materials for all its parts. While the central heart string of the magical lyre, the jinisapo, is fashioned from anniwan, a mixture of tin, pulverised damestear and lapis lazuli, several options are available for the outer strings: simple gut strings or strings made of silver or even exotic spider silk strings imported from the depths of the Serpentspine. What material shall be used for the outer strings of our magical lyres?"
flavour_harpylen.151.a: "Simple but sturdy strings made from the guts of mountain goats."
flavour_harpylen.151.b: "Elegant strings fashioned from silver."
flavour_harpylen.151.c: "Only spider silk has the tensile strength and delicacy needed!"
flavour_harpylen.152.t: "Nilelišta: Size Isn't Everything!"
flavour_harpylen.152.d: "When fashioning a delicate instrument such as a lyre, great care must be taken with the choice of proper materials for all its parts. But before the individual components are combined to fashion the lyre, first a decision must be made regarding its intended size. Should it be small but melodious, easily held with one hand? Should it be a proud instrument, easily as long as the wing of a harpy? Or should its proportions be truly enormous, easily towering over the musician? Which size should the lyre have?"
flavour_harpylen.152.a: "It should be small but sweet-sounding."
flavour_harpylen.152.b: "A proud resonant lyre, held with both hands."
flavour_harpylen.152.c: "Only an enormous instrument will provide the needed resonance!"
flavour_harpylen.153.t: "Nilelišta: What a Curvy Body!"
flavour_harpylen.153.d: "When fashioning a delicate instrument such as a lyre, great care must be taken with the choice of proper materials for all its parts. The body of the lyre is one of its most important parts, as it amplifies the sounds of the instrument. There are several options to choose from for the material of the body. Wood is the classic option, but both steel fashioned out of the iron found deep within the hills of the Gelkari and mithril imported at exorbitant cost from the dwarven realms within the Serpentspine offer intriguing alternatives. What material shall be used for the body of our magical lyres?"
flavour_harpylen.153.a: "The reliable wood of a Bahari oak."
flavour_harpylen.153.b: "The steel out of the Iron Star foundries will do just nicely."
flavour_harpylen.153.c: "Only the purest mithril can produce the needed resonance!"
flavour_harpylen.154.t: "Nilelišta: Take a Bow!"
flavour_harpylen.154.d: "When fashioning a delicate instrument such as a lyre, great care must be taken with the choice of proper materials for all its parts. For without a bow, a lyre is just an intricately crafted paperweight. In order to coax the most melodious sounds from the magical lyre, several options for the material of the bowstring are proposed. Certainly, the most mundane one is horse hair, but the more ambitious Vetaunyar involved in the project have proposed hair from a centaur's mane or even hair from a unicorn as the only suitable options. What material shall be used for the bow string of our magical lyres?"
flavour_harpylen.154.a: "Horse hair is a classic for a reason!"
flavour_harpylen.154.b: "Surely we know some centaur willing to part with their luscious mane?"
flavour_harpylen.154.c: "Scour the Deepwoods for that elusive unicorn, we need its hair!"
flavour_harpylen.155.t: "Nilelišta: A Most Dazzling Display!"
flavour_harpylen.155.d: "When fashioning a delicate instrument such as a lyre, great care must be taken with the choice of proper materials for all its parts. As a handcrafted product of artisanry, it does not only have a functional role, but aesthetic value as well. Thus, the choice of decorations, while seemingly frivolous, plays an essential role in determining the overall effect of an instrument on its audience. Yet as the saying goes: art is subjective. Some amongst the Vetaunyar involved in the project prefer a plain and unadorned appearance. Others have suggested the addition of delicate etchings and ornamentations. The most extravagant proposal involves the use of engravings made of pure damestear. How should our magical lyres be adorned?"
flavour_harpylen.155.a: "Frilleries only distract from the sensation of the music."
flavour_harpylen.155.b: "A tasteful decoration with exquisite etchings is a fitting choice."
flavour_harpylen.155.c: "A unique instrument deserves unique engravings!"
flavour_harpylen.156.t: "Nilelišta: The Grand Finale!"
flavour_harpylen.156.d: "With all design decisions made and a handful of rianelion lyres crafted according to the latest specifications laying before the Vetaunyastu Jorouna, all that remains is to test out their efficacy. A Sanarenni flock of senior Vetaunyar is already eagerly awaiting their opportunity to play on these most precious instruments while weaving their song magic in front of an eager audience.\n\nAnd soon enough, they would do just that. The clear and dulcet tones of the lyres resonate with the polyphonic harmonies of the Sanarenni singers, weaving a sublime tapestry of sound. As their recital concludes, the verdict regarding this latest design for the rianelion lyres is clear."
flavour_harpylen.156.a: "There is such a thing as being too austere..."
flavour_harpylen.156.b: "This version of the rianelion appears to be on the right track."
flavour_harpylen.156.c: "Pomp and circumstance have their place, but best not to overdo it."
jimi_harpy_experience: "The closer our instrument is to the ideal one for our current needs, the more §MExperience§! we'll accumulate, up to a maximum of §Y200§!\nChange §YEstate Magic Experience§! by §Y[Root.harpylen_project_var.GetValue]§!"
flavour_harpylen.158.t: "Nilelišta: Success"
flavour_harpylen.158.d: "Instruments make the Song better!"
flavour_harpylen.158.a: "With a better Song, the magic is more powerful!"
