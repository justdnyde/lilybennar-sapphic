l_english:
F98_pride_of_dynasty_title: "The Pride of a Dynasty"
F98_pride_of_dynasty_desc: "Our mastery of the arcane arts has served us well in the past. Few cultures are without at least a passing tale of the enchanting power of a harpy's voice, and there are no shortage of accusations raised against us for (supposedly) enchanting some male to our roost.\n\nWhile these flights of envy are somewhat flattering, it reveals a truth. Our people are steeped in magic, and so Harpylen must embrace this craft in all its glory.\n\nAs such, the Heunthokharivor and the Isutoqir both suggest an expansion to the facilities of Heunthume. A curriculum of magical studies will be established, and all harpies skilled in the art will be encouraged to train in Heunthume. Most importantly, a special section of the academy will be reserved for the daughters of the Queen, so as to ensure the magical superiority of Firanya's blood.\n\nThe rewards are manyfold: the larger academy will grant us a pool of skilled advisors to draw from, and we will also have a great deal of influence over the education of our future leaders. Perhaps favoured subjects could even be given access to the special section of the academy, as a favour from the throne. Of course, such a project will be expensive, but Harpylen is rich and proud; If ever a nation on Halann could afford it, that nation would be ours."

F98_eclipse_elikhet_title: "Eclipsing Elikhet"
F98_eclipse_elikhet_desc: "To the south and west rests the venerable Kheterata, an ancient realm built around the Mother's Sorrow. While our people have few connections to Kheterata, their rulers are ever a cause for concern to any hegemon in Bulwar. Not the mortal stewards, of course, but the Khet.\nThe Khet are an enigma. Cat-headed godlings, with almost unlimited power, seemingly only brought to pause by their own indolence. The creator of them of course is Elikhet, who has held Kheterata under his sway since time immemorial. Of course, no one has actually seen Elikhet in living memory, so while their name holds power, most of the day-to-day governance is instead delegated to their numerous semi-divine children, who in turn pass the task on to the people of Kheterata.\nWhile this makes for a fascinating model of government, our concerns are more mundane. For Harpylen to grow strong and proud, we must contend with the Khet. Despite their power, Kheterata has been conquered countless times, and it is clear that they hold no loyalty to the people of the Sorrow. As such, we may choose whether to simply conquer Kheterata, like so many before us, or whether we wish to pursue a more bilateral arrangement with the godlings of the Sorrow. "

F98_wings_of_stone_title: "Wings of Stone"
F98_wings_of_stone_desc: "With the conquest of Akasik, the full extent of the gnollish atrocities in the region have made themselves plain to all. This presents the Throne with an unpleasant dilemma, for the humans of the region hold no love for their tormentors, not to mention our own sisters, of whom only a scant few escaped the pyres.\n\nSo what is to be done? Setting aside vengeance, the Queendom cannot police a province so distant, with two tribes that hate each other so deeply. Leaving the situation to fester will result in riots and civil unrest, and it is with this in mind that a more structured solution must be found.\n\nThe army must be deployed, sent in small units to every province, and then they must carry out the Throne's orders with the elegance expected of our people. Only then will Akasik be at peace, and future generations will know that we did what was needed, for the good of all."

F98_to_sleep_to_dream_title: "To Sleep, To Dream"
F98_to_sleep_to_dream_desc: "Despite all odds, we have overcome the foul legacy of Beastbane, and found the surviving descendants of the Havoral Harpies. While they have suffered a great deal, there is no doubt that they have made for themselves a good home in the north, even if it is a cold, dark and very ungentle place.\nNow that they are under our wing, we have been able to glean much of their ways, and the vigil they hold over the great white dragon. Earning their loyalty was one thing, but winning their hearts will require time and investment. Already the Kemounqir are drafting plans for developing the roost of Vaengheim, while the Isutoqir and the Ivetasananthor are organizing expeditions across Gerudia, to establish small shrines and interview the locals on the details of their peculiar faith. If we wish for our northern kin to love us, we must know them. So know them we shall."

F98_len_title: "Len"
F98_len_desc: "There is a house\nin Firanyalen\nIt has seen millennia\npass\nAs long as a harpy\nbelieves in it\nIts walls will stand\ntall\n\nNo matter how far\nfrom home you are\nthe nest always calls\nstringing along your heart\n\nOh Firanya\ntell your daughters\nwherever they are\nLen is not\njust a land to live in\nOur country\nis the mountains\nof our soul\n\nNo matter how far\nfrom home you are\nthe roost always calls\nthe drumming of your heart"

F98_throne_queen_title: "A Throne Fit For A Queen"
F98_throne_queen_desc: "If Firanya could see us now,\nI know they’d be proud\nfrom their nest above a cloud\nof this nation they worked to found\n\nBut we want it all\nI’m not just talking about Bulwar\nThe ball’s in our court, no mask\nFrom the sky, everything is small\n\nWe’ve been patiently watchin’\nthis game, pacin’ our valleys\nI had faith in us always\nI knew we’d come out of this slump\nrise from these ashes\ngo Phoenix on these bastards\n\nThe Queendom required war\nthe beat in our song’s score\nBut instead of mourning death\nI’d rather celebrate life\nelevate to new heights\nstep on the winds and accelerate\n‘Cuz the way I’m feeling tonight\neverything we can just do right"

F98_cultivate_sanarenni_title: "Cultivate Sanarenni"
F98_cultivate_sanarenni_desc: "The daughters of Firanya are uniquely gifted in the arcane arts. This is little wonder - Firanya herself was a god-queen of the ancient world, equal or greater than any of her peers, be they man, gnoll or elf. It is true however, that we favour a subtler art. Our magic is woven into song and tale, and with our words do we weave wistful ways to wisely wrap our wings around our flock. Our craft is a gentle thing, compared to the overbearing, brutish displays of violence that so infatuate our many enemies.\n\nIt is therefore no surprise that our magical traditions have coalesced into a sort of spellsinging, named Istarun. Practitioners of this subtle craft are called Vetaunyar , and they can be found in any roost worthy of the name. Thus far they have been largely disorganized - More of a cultural fixture than a group. With the rise of Harpylen however, this is soon to change. The Queen’s Throne requires that the Vetaunyar be organized into a section of the government, named the Sanarenni. Thus we may use their talents for the betterment of the realm, and the Ivetasananthor will have better methods for compiling and organizing the myriad techniques the Vetaunyar are famous for."

F98_doctrinal_debate_title: "Doctrinal Debate"
F98_doctrinal_debate_desc: "The Harpy relationship with the divine is curious to most outsiders, and harpies could perhaps be described as more philosophical than zealous. Our ancestral faith reveres no gods, and anyone proclaiming some sort of divine mandate has in the past found harpies fairweather followers at best. With a few notable exceptions, our people are indifferent to divinity, which of course is not to say that we are indifferent to power. But, as the Riaviltu would ask - What is the difference between a mage and a god? The god has greater power, perhaps, but where are they truly different? Where is divinity divorced from power?\nThat being said, our Queendom has grown in the past years, and with each year, we gain more earthbound subjects to govern. These earthbound subjects are often people of faith, and it is becoming clear that we need to organize this aspect of their lives. The throne must decide what faiths are to be sanctioned by the state, and what faiths (if any) are to be outlawed."

F98_ascend_the_spine_title: "Ascend the Spine"
F98_ascend_the_spine_desc: "When first we encountered the harpies of Nomsyulhan, our relationship with them was a matter of some intrigue. Their martial prowess and hobgoblin allies made them formidable in their own right, and some feared that we would be unable to fold them under our wings. After all, Nomsyulhan is a distant place to all - The very roof of the world in fact. For any throne to extend their reach to it, that throne must sit upon it, or so the logic went.\nFortunately, the Nuzenapu proved this frame of mind wrong entire. With wing and lance and silver tongue did they put Nomsyulhan under their throne, and set that throne firmly under our wings. They are ours now, and their loyalty is second to none. With their loyalty, they have given us the keys to Nomsyulhan, a realm we could never hope to take for our own."

F98_elemental_artifice_title: "Elemental Artifice"
F98_elemental_artifice_desc: "Good news, my [Root.Monarch.GetTitle]! Our work in the frontier has begun to bear fruit, and two of our most distant provinces have sent word of a fortuitous development.\n\nFirstly, we must speak of Akasik. This embattled region has never been wealthy, and often it has been seen as a distant hinterland of Kheterata, fought over by its many neighbours and with gnolls raiding up through the Salahad. An unfortunate region to live in, but now, under our wing, it has found some semblance of peace. As it so happens, Akasik is rich. Not in foodstuffs, like the Sorrow, but in metal. Many entrepreneurs, both harpy and human, are eager to exploit the mountains and set up mining infrastructure, so that the region and the Queendom both may benefit from trade in iron, copper, and forged goods.\n\nThis brings us far east to Nomsyulhan, where another group of investors are asking for the throne’s leave to expand the excavations of the ancient ruins of this realm, thus bringing to light the myriad wonders of the Precursors. Why do these two regions play together? Because the Isutoqir believes that, by using the metals from Akasik and the found relics from Nomsyulhan, our academies will have a surplus of research material and the tools with which to study them. We need only invest in the trade, and most likely, we will eventually discover something useful!"

F98_distant_sisters_departed_title: "Distant Sisters Departed"
F98_distant_sisters_departed_desc: "As our Queendom soars ever higher, our mastery of the sky has grown largely uncontested. We have brought most of our sisters home, and in a lesser age, that would have been more than enough. And yet, with Asmalil in our talons, we hold a means to listen keenly to the song of the world. We can cast our ears farther, and hear, on the most distant wind, the trace of kin we once thought lost. From the most distant east of Yanshen, to the farthest north in Gerudia, we can hear their song. A small, frail thing, barely audible. But without a doubt alive.\n\nIf we are to be the Fourth and Final Queendom, we must be so for all harpies. We must find these, our most distant and long-lost sisters, and bring them home."

F98_wayward_princess_title: "The Wayward Princess"
F98_wayward_princess_desc: "Sometimes, even we can be surprised by harpy resilience. Princess Ašuria, one of the many losers in the game for the queen's throne, fled to Aelantir many decades ago; nobody bothered to follow: the sea or the jungle would deal with the loose thread.\n\nInstead, against all odds, they survived - building some weird society where the subjects choose their overlord, electing a harpy and a ruinborn every few years to lead them, instead of following the wisdom of a Matriarch.\n\nThey did what they had to, but we now have the reach to influence even the far jungles of the Effelai - the Kiohan harpies will again feel safe, following the sage will of [Root.Monarch.GetTitle]."

F98_good_measure_title: "For Good Measure"
F98_good_measure_desc: "Our two most distant flocks are in likelihood the Järnklo and the Kiohalen. Both are now strong, having prospered greatly under our rule. In saying this, there is no doubt that they could bear being stronger. The Järnklo especially are half of a larger flock that split in the Moorhills. Fully half of their kin would trek west into the Dragonhills, only to face their doom when the dragons awoke. But now the dragons are gone: the Dragon Coast lies abandoned, but for their offspring and the odd gnome. All that needs to be done is fly in and take possession.\n\nThe Effelai in distant Aelantir is much the same, its vast jungle untamed but for wild beasts and the odd ruinborn. Of course, our kin in Kiohalen are closely entwined with those selfsame ruinborn, and there is no reason not to put this relationship to use, so that the entire jungle may also hear the blessed song of Harpylen.\n\nBoth of these flocks would profit from new roosts to call their own. Let us be a good sovereign and make them a gift."

F98_spreading_wings_title: "Spreading Our Wings"
F98_spreading_wings_desc: "From the hillside we come\nstrong, beautiful, and proud\nWe’ll shroud all of Bulwar in\nan empire second to none\n\nHarpies of the land, arise\ntake helm, pull the strings\nFly high, spread the wings\nover Harpylen’s wide skies"

F98_extended_dominion_title: "Extended Dominion"
F98_extended_dominion_desc: "We are harpies. We don't need roads to go from A to B for our empire to exert control away from its capital. Nature made us soar above all that.\n\nBut a road network is still nice to have and mandatory to be prosperous: long flights are tiring, and wares are made to be moved on wheels. No self-respecting harpy would act as a merchant's mule, not even if they themselves were the merchant.\n\nEven if we won't use it a lot of the time, the Queendom's rebuilt Golden Highway will put previous versions to shame with its beauty and utility. "

F98_once_flew_title: "The Ways Once Flew"
F98_once_flew_desc: "Harpylen, like any nation, is built on an idea, but as our people are fiercely independent, there is some discussion over what that idea might be. Is Harpylen simply a realm for harpies? Is it an empire of conquest, like the Command of the east? A realm of devotion like old Kheterata? Every roost, it seems, has their own ideas of what Harpylen is, and of what it should be. Of course that is all well and good - The Queen's Throne encourages healthy discussion, so long as taxes are paid on time. But needless to say, the throne has its own ideas as well.\nIt is a simple idea, really. Harpylen is a realm of plenty. A home for all harpies, and a home for those who we choose to share the sky with. In Harpylen, the hungry will be fed, the sick will be healed, and whether earthbound or of the sky, you will know, that the Queen's Throne is your throne. That there is a place for you under her wing.\nA noble idea, but as the Kemounqir clerk would eagerly ask, what does this mean practically? Well, it means two things. First, public works, to ensure that all, or at least most of our roosts are clean and wealthy, with running water and at least some basic amenities. Second, it means that these roosts are protected. Soldiers and their lodgings must be present across the realm.\nThen, when the realm is secure, the Throne can begin to look outwards. If Harpylen is to be a home for all harpies, it will behoove us to find the harpies of the world, and spread the good word."

F98_siadunan_sisters_title: "Siadunan Sisters"
F98_siadunan_sisters_desc: "Venerable Siadun was in many ways a mirror image to our own realm. While we claimed pedigree from being the homeland of Firanya, it is difficult to argue that the myriad flocks of Siadun were the most numerous, powerful and prestigious in their day.\n\nIt is therefore fortunate for us, that Jaher tore them from the sky. The Siadun were emasculated, and have since largely found a comfortable perch under our wings. Having said this, all harpies are proud, and we should endeavour to ensure that the Siadun rest easy in our roost. This goes without saying, as they are our kin. But there is also a concern that they will remember the time where they, and not we, were the heart of Harpylen. The throne cannot bear such a song, and it therefore behoves us to make our sisters comfortable, yet occupied. Let us embark on a vast series of projects to improve the old roosts of the east. We will keep our sisters busy, let them marvel at our works together, and with a little luck, they will in time forget that they were ever our rivals."

F98_beyond_bulwar_title: "Beyond Bulwar"
F98_beyond_bulwar_desc: "Just like we did with our Hills, we have outgrown Bulwar. It is time we stretch our wings further, and follow the footsteps of Siadanlén: descend on the east, look to the south.\n\nIn Rahen, the locals are already used to bowing to their betters - we'll just replace the claw with a talon, righteous and firm.\n\nIn Sarhal, many of our brethren took residence - it is our duty to bring them into the fold, to enjoy the prosperity and glory all harpies deserve, under the Harpylen's canopy.\n\nGo wide; the whole of Halann can be our Len, if we so desire."

F98_sunderings_wake_title: "Sundering's Wake"
F98_sunderings_wake_desc: "The Sundering of Siadanlen was a tragedy, no doubt. That said, it did do away with what would otherwise have been a dangerous rival, and in spreading harpies far and wide, it gave our people an unusual chance to adapt to new cultures.\nTake the Naleni, for example. On one talon, they are incorrigible pirates all, hated and feared by any seaborne trader who plies the horn of Sarhal. But on the other, they have a highly developed sense of independence, as well as many well-thought notions of what liberty is, and how it may be attained. This is not to mention their integration of Mengi custom, making Nalenian culture something truly unique - One of the many wonders of Sarhal.\nIf we wish to integrate these many aspects of the Naleni into Harpylen proper, we will need to ensure that their roosts are protected and prospering under their rule. Weaning them of piracy will be a longer project, but developing the framework of legal trade may help the Odanchesta make the transition from raiding to trading."

F98_whom_sky_belongs_title: "To Whom the Sky Belongs"
F98_whom_sky_belongs_desc: "The Madriamilak of eastern Sarhal is a curious land. It is quite isolated, due to the hateful ulcer of the Shadow Swamp to the west, and the mountains to the north, east and south. The main avenue of trade goes north around the swamp, across the Keygas, and that trade lane leads into the Salahad, with all the gnollish raiders that this entails. One can go by sea, and indeed some of the greatest cities in Sarhal lie on rivers by the coast. Of course, piracy is an issue, and our kin have until recently been part of that problem. So what is the appeal? Well, the Madriamilak is fantastically wealthy. Between them, the many realms of the Mengi boast millions of subjects, and the land itself is bountiful. The dominant faith of the region is simply called the Sky Domain, and it reveres a single paternal god named Amilak. Amilak is an unusual deity, in that he, or at least his clergy, has a great deal of power. In simple terms, they can guide the weather, with all the benefits to agriculture that this entails.\nOur Queendom would benefit from holding Madriamilak, or at least part of it. The Naleni claim that the Telekenid region would be suitable for our people, and the Mengi are not especially predisposed against us, since we fit into their religious framework as children of the sky. With a little political maneuvering, we could slide into lordship over the Telekenid, especially if we take on the role as stewards of the Crater of the Martyr, a sacred site to Amilak. See it done."

F98_announce_intent_title: "Announce our Intent"
F98_announce_intent_desc: "“August people of Harpylen. Long have I perched, like a crow on my branch, and I have cast my ear into the world beyond my dominion. I have heard the song of the children of the sky, my kin, and learned from this dirge, where they may be found, and how they may be made free.\nTherefore, I make to you now, a declaration of intent. I invoke Nillen, and say to you this. I will find my people, and I will pull the chains from their wrists, and see them free from bondage. I will bring them home.\nTo those beyond Harpylen, I say to you this. Let my people go, for if you do not, I will take them from you. It is my Wish, that all children of the sky be returned to this, my Fourth and Final Queendom.”\n-The Announcement of Intent"

F98_speak_softly_title: "Speaky Softly"
F98_speak_softly_desc: "Harpylen is more than the Queen's Throne, and the Queen's Throne is more than the queen who perches upon it. Having said this, there is no doubt that Heunthume has grown mighty indeed after the recovery of Asmalil. Our august capital is the greatest roost of Harpylen, and thus the greatest roost of the world. With each song sung from our throne, our people fly ever higher, see ever further, and needless to say, the lesser nations of the world can only gaze on, in awe and perhaps in terror.\nThis last wrinkle is of concern to the Throne, for we are no tyrants. The Queen's Throne has always chosen a higher path than violence, as a high path comes naturally to us. Let us therefore invite our allies, subjects and even our erstwhile enemies to a great embassy in Heunthume. Let us soothe their ruffled feathers, and speak to them, of the future of Harpylen, the future of Halann, and why these two are one and the same."

F98_carry_cannon_title: "Carry a Big Cannon"
F98_carry_cannon_desc: "“The siege had lasted for months, though not for lack of the birds trying. Men, orcs, gnolls — even those red folk of the east! It felt like every thinking beast of the world had come to our gates to die. But our wards held strong, for we were the blood of Lorenan, and no monster, winged or otherwise, would set foot in Lorentaine while we drew breath.\n\n“And then I saw her. She was surrounded, of course, by battlemages. Her features twisted and shimmered behind a magical barrier, shielding her from arrows and shot. And I think she saw me too. She looked at me. Just a glance. I felt a jab of pain in the back of my head. Then she pulled a small rod — a flute, I think. She raised it to her face, I saw her chest heave from an unheard intake of breath...\n\n“And then the sky began to burn...”\n\n— Memoirs from the Siege of Lorenan, Apocryphal"

F98_true_queendom_title: "True Queendom"
F98_true_queendom_desc: "“...And then one morning, I removed my crown and closed my eyes. I strained my ears, and I listened. I heard my heart and cast my senses beyond my flesh. I felt the souls of my flock, each and every one. I felt them in Heunthume, many asleep and dreaming. I listened, and I heard beyond, born on the wind, the song of my eastern kin, waking and aware in distant Haless where the day was older. And I listened to the west, where my subjects still lay dreaming in the darkest night; South and north where they were waking.\n\n“And I knew then, that there was nothing more to do. I knew that I could hear them all, and that they could hear me. I knew not the extent of what it meant then, but I knew one thing:\nI had brought my flock — Firanya's flock — together again. In that moment, we were all one, and in that moment, I knew that Harpylen might endure, from that quiet dawn, and until the sunset of the last day of the world.”\n\n— Memoirs of [Root.Monarch.GetTitle] [Root.Monarch.GetName]"

F98_laying_groundwork_title: "Laying The Groundwork"
F98_laying_groundwork_desc: "The best overlord is one who can bury its subjects' fear under a thick blanket of love; that way, they have an excuse to tell themselves their loyalty has been earned — like they ever had the choice. We harpies have always been good at it, our charms and strength going hand in hand.\n\nThe next step is to start weaving this blanket early on weak or vulnerable neighbours: mollify them into happy junior partners ready for future subjugation under the Matriarch’s benevolent wing."

F98_the_oddest_hunts_title: "The Oddest of Hunts"
F98_the_oddest_hunts_desc: "[Root.GetHarpylenOddestDesc]"
F98_the_oddest_hunts_desc_gen: "Once, the “Odd Hunt” was yet another harpy raid, stealing valuable books, scrolls, and even scholars to try and keep up with our neighbouring nations.\n\nWe’re long past that: the practice evolved into knowledge exchange treaties and residencies for foreign students, but we can take it up a notch still. An empire of our majesty shouldn’t have to bother with searching for its quarry: the prey should come to us willingly.\n\nAs a beacon to Harpylen’s wisdom, we shall foster innovation, reward brilliance, and build a center of learning without equal in Bulwar. Intellectuals from everywhere are going to flock to the Great Temple-Library of Aqatbar, bringing us their skills and ideas."
F98_the_oddest_hunts_desc_hyti: "The Great Library was famously King Perzuk I’s favourite place in Aqatbar. While he wasn't certainly alone in that feeling, his material contributions to the monumental complex dwarfs anybody else - even the legendary gnollish matriarch Zheh.\n\nEduz-Ginakku has been lovingly maintained and continuously expanded since then, but it's time for the [Root.Monarch.Dynasty.GetName] dynasty to step in and extol Aqatbar as the premier center of learning of Halann.\n\nAs a beacon to Harpylen’s wealth, we shall spare no expense, recruit the best architects and gardeners in Bulwar, and make the temple-library shine with its own light."

F98_out_on_the_plains_title: "Out on the Plains"
F98_out_on_the_plains_desc: "The Forbidden Plains are a curious place, and many of our kind would call it aptly named. The endless plains are a poor fit for the child of the sky, and harpies are therefore rare there, aside from the few flocks who call the Serpentspine their home. The people of the Forbidden Plains however, are another matter. Fierce, independent and undeniably strong, the myriad tribes of Centaur who make this place their home, have ever been a peculiarly kindred spirit to our people. We share in pride, yet neither has much of anything that the other wants. Both our peoples were greatly wounded by the pale beasts of Castanor, and therefore we have historically enjoyed a cordial relationship.\nThis has only grown more prevalent since the rise of Harpylen, and while the throne has little interest in the Forbidden Plains, it would benefit us to establish a deeper relationship with at least one of the tribes of the plains. In so doing we would secure our northern border, as well as open the way for trade and free travel. All of this without having to actually govern that enormous aberrant plain ourselves. "

F98_aspects_of_the_divine_title: "Aspects of the Divine"
F98_aspects_of_the_divine_desc: "Our centaur allies in the north are prospering, and in so doing they bring a great deal of wealth and knowledge south to our roosts. However, now envoys from the north have come to the Throne with an unprecedented suggestion. They ask of our support for a unified realm for all Centaurs, built on trade and a free exchange of ideas. To hear them say it, they would forge a realm where anyone, regardless of clan, can find a place for themselves and grow rich off the toil of their own hooves. They name this realm Altorzamh, and beyond more general support for this project, they ask that we aid them in renovating and refurbishing the great Glyphs of Irdaeos in the heart of the Forbidden Plains. To hear them say it, doing so would proclaim a sort of divine mandate for their project, and so make it more appealing to the more zealous tribesmen, who may otherwise be hesitant to partake."

F98_touch_the_clouds_title: "Touch the Clouds"
F98_touch_the_clouds_desc: "Empire building is a new art to Harpylen, and there is clearly a craftsmanship to it, that it can be difficult to perceive in the lumbering flailing of ancient Castanor, or the dramatic death throes of the Phoenix Empire. A balance that the throne has found, is countering the enveloping of new territory, with the development of the core. Harpylen is strong and proud today, but what of tomorrow? Will we be remembered as bringers of peace and plenty? Or will we be seen as winged tyrants, the likes of Beastbane and Jaher?\nWhat we do today will shape our legacy, and this is a great privilege to have, for we now have the strength to build up our nation, and make every roost in our heartland a city of the world's desire. When the people of tomorrow speak of Harpylen, we will ensure that they speak not of our wars, nor our conquests, but of the towering roost we built. The cities of tomorrow that they live in, providing the food they eat, the water they drink, and the safety they enjoy. "

F98_lifeblood_realm_title: "Lifeblood of the Realm"
F98_lifeblood_realm_desc: "While the heart of Harpylen lies in Heunthume, we cannot deny that the purse lies in Bulwar. This ancient city has been a center of trade and commerce since the days of Firanya. This, by and large, is to our benefit. Bulwar is close enough to the throne that the wealth passing through, can be easily accounted for. In fact, the Kemounqir has repeatedly lobbied the throne for moving the capital to Bulwar, citing a long list of benefits to taxation of trade, the economy, the strength of the currency...\nAn outrageous request of course, but the Kemounqir raises some salient points. We should invest in Bulwar. Not only the city, but the region. Jaher's old highway is an eyesore, but it is very useful, so we should refurbish it. Perhaps we can even make it worth looking at, while we are at it. The great cities of Bulwar - Sareyand, Brasan, Aqatbar and well... Bulwar should all be the centers of commerce and culture that they deserve to be under our wings.\nFinally, the Kemounqir insists, we must consolidate our taxation on trade. By their estimate, the Region of Bahar has the potential to be the keystone of our trade network. They ask permission to establish a ministry office in one of the cities of Bahar. Any will do."

F98_godking_dragon_title: "Be it Godking or Dragon"
F98_godking_dragon_desc: "The recovery of Asmalil has had a curious, but not entirely undesirable effect on the Queen's court. On occasion, she will take her perch on the throne, and play. To hear the court speak of it, the songs thus produced are entirely unlike anything heard before in living memory. Those who partake are often shaken by the experience, and some find their outlooks and perspectives changed on a fundamental level, working for the betterment of Harpylen with a heretofore unseen enthusiasm.\n\nThis poses a sublime question. What if we were to let the heirs of our realm partake in the Queen's song? Succession is ever a contentious issue in any realm, so it would be ideal to ensure that the children of the Throne are of one mind, and entirely devoted to the betterment of the realm."

F98_weep_no_more_title: "Weep No More"
F98_weep_no_more_desc: "For the longest time, we had believed the Nzeri extinct. Thus finding them again was a blessing, seeing them so prosperous was a miracle. Yet as absence makes the heart grow fonder, so does familiarity breed contempt. There is no doubt that the Nzeri have become most unlike us, with their peculiar humility and stoicism. They seem to take little pride in their august heritage, and instead follow their mother Nirakhet with a devotion bordering on the fanatical.\nBe that as it may, we are nothing if not magnanimous, and since the Nzeri are a vast desert away, we can easily tolerate their quirks. Furthermore, many voices ask that we make an effort to understand their peculiar songs. Let us develop their roosts, ensure their safety, and speak with them at length. Perhaps we can find some common ground, and help them find their hearts again."

F98_faith_divergent_title: "Of Faith Divergent"
F98_faith_divergent_desc: "With our power and glory reaching ever closer to heaven, matters of faith grow ever more central to our myriad flocks. Perhaps this stems from the realization that our people are clearly more than a little divine in our own right. If so, a curiosity about eternity is both natural and desirable.\n\nThe Hunt is more philosophical than theological in nature, and offers little tangible guidance in this task. Fortunately, we are blessed with a surplus of subjects who take divine matters very seriously. Chief among them are the Bieklings of the east who hold a dire reputation for their so-called Devouring Path. This practice was passed down to them by the Oni of the Demon Hills, and among other things, specializes in soul-manipulation.\n\nOn the other talon, the Nzeri flocks are almost unharpylike in their devotion to their Weeping God Nirakhet, a more conventional God primarily concerned with alleviating the pain of her many followers. Of course, she is also a Khet and therefore may very well be alive and well somewhere.\n\nThese two confessions are diametrically opposed, which makes them the perfect points of reference for the crown. If we are to find the nature of our own divinity, we must bring them together in discussion, so that between them we may find the means of our own ascension."

F98_wing_and_wave_title: "Wing and Wave"
F98_wing_and_wave_desc: "[Root.GetHarpylenWingWaveDesc]"
F98_wing_and_wave_desc_gen: "Harpies without a flock - what a ridiculous notion! The Našrayabi of Annail forgot their culture, but they are not to blame, of course: they were forced to after settling on the island centuries ago as refugees - most of them children.\n\nIt's our duty to bring them back to their roots, rein in their extreme mingling with the humans, and remind them of their rightful place. In turn, their seafaring skills will be useful to us; let us understand the Way of the Gull.\n\nBring the best building supplies to the island so that our most skilled architects can construct a luxurious roost exclusively for the Harpies of the Sea to take refuge.\n\nBut be careful of the roof tiles: they seem to fly around faster than we do in the skies of Annailsub!"
F98_wing_and_wave_desc_hyti: "It took ages, but it seems Amašuri finally trusts us. Our emissaries often manage to meet her, even if she often simply scampers away with our cookie offerings.\n\nWhen she doesn't, the role she has for us is one of couriers: we constantly are to deliver her long distance pranks to the venerable Lahmaš, each more elaborate than the previous.\nThankfully the Wisemaster seems unperturbed by them.\n\nStill, the Ayabnati residents (as well as the local Našrayabi harpies) look at us favourably since then, and they are finally open to teach us their best sailing techniques - something they were jealously guarding before."

F98_wood_unveiled_title: "Into Wood Unveiled"
F98_wood_unveiled_desc: "The Deepwoods are a deceptively contested region, and where one might think that a forest the size of a small continent would be peaceful, the opposite has proven time and again to be the case. The belligerents are many. Dwarves, Orcs and Goblins from the Serpentsreach, humans from old Castanor, and even Elves from the west. Add to this the innumerable fey who name this place their home, and it is a rare day in the Deepwoods that does not end in a battle.\nFor Harpylen, this is intolerable. The Deepwoods are a short flight from Lake Jorkad, and it is only a matter of time before someone, or... Something has sharpened its teeth enough on fellow warriors of the Deepwoods, and chose instead to come for us. So let us instead make contact with one of the many, many warring factions within that forest. We will offer them the support of the Queendom, and they will serve as our buffer. Perhaps in time, we may even bring some semblance of peace to part or all of the region."

F98_under_leaf_bow_title: "Under Leaf, Bow"
F98_under_leaf_bow_desc: "Our work in the Deepwoods may never be truly finished, but our plans for the region have at least prospered somewhat. Our chosen flock have largely tamed (or at least pacified) large swathes of this primordial forest, and coupled with our presence in the great roost of Ciranmyna, we are now in a position to build up some semblance of infrastructure, and bring, for the first time in a long time, a moment of peace to the Deepwoods."

F98_asmalils_trail_title: "On Asmalils Trail"
F98_asmalils_trail_desc: "You found her, and heard her voice. But it was a little thing. A heart, beating outside of a body. Giving life to nothing. So you wove a body for her, with veins and arteries of magic and spellcraft. And you knew that with every roost you bound together, with towers where her voice could be heard, you made her stronger. The life she could give began to pour back into the world.\n\nAnd soon, her thin and wispy voice became firm, then strong. Soon she could sing again, and she did. After all, this was your Wish."

F98_heart_of_haless_title: "In the Heart of Haless"
F98_heart_of_haless_desc: "The winds of Haless are not silent; they sound with the flow of songs, both exotic and new, as well as ones old — and surprisingly familiar. The flocks of this eastern land have changed with time and place, as any flock would, but the ways in which they changed varies drastically, a result of old disagreement between two conflicting opinions.\n\nP’zerangi, the flock of “Xia”, “Warrior Monks”, and “Righteous Masters”, are disciplined, graceful, and calm. Their way of life is unfamiliar to us, but they also seem much more open to mutual dialogue and contemplation. We have already learned a lot from them and can learn much more.\n\nThen there are the Semifire — Semiha’s flock. They kept to the Hunt despite the passing years, their traditions held much closer to the ways of old. Their situation, surrounded from all sides by much bigger states, caused them to develop a versatile set of skills: diplomatic wit, experience in subterfuge, and, when those fail, the art of air-bending. The name that local peoples gave them — “Phokhao Peacocks” — fits them quite well.\n\nTwo flocks of survivors, both different and yet coming from common roots; let’s help them build new roosts as a sign that we recognize their struggle."

