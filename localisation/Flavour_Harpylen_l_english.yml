#Events
flavour_harpylen.2.t: "The Stonewing Homecoming"
flavour_harpylen.2.d: "When word reached Heunthume of the fate of the Stonewing, nary a citizen lacked an opinion on what had transpired there. Anti-gnollish sentiment exploded, and the people of Akasik were revered as heroes. It was to the credit of the Queen’s Guard that the situation was contained, and riots against the gnolls of Harpylen were largely prevented.\n\nIt was soon made known that the Queen herself had extended an invitation to the Stonewing—that all who wished it would be given royal leave to visit Harpylen, and stay in Heunthume as honoured guests for as long as they desired.\n\nIt cannot be said what visitors to the Queen’s Throne expected, but certainly it was not who came. For one day, a pair of Stonewing harpies arrived before it, bearing what at first seemed to be a human, but was soon revealed to be a wingless harpy, robbed of flight by her gnollish masters.\n\nThough she was old and blind, her song still carried the strength of her flock. And when she sang, the Ivetasananthor at the Queen’s court scrambled to capture her words in ink.\n\nFor she spoke of her enslavement, and the burning of her flock—how her masters had taken her wings and those of her sisters, deeming them a foul trait in a slave. And so they had taken their wings, but left them their lives.\n\n“But,” she added, “more was their folly—for now my masters are dead, while we live. And our children will have the wings that were stolen from us. And they will know the sky.”\n\nThen more Stonewings came, bearing with them the free folk of Akasik—men and women they held in honour. And though the people of the west were hardened by their toil, the warmth of the Queen’s Court chipped away at the stone shielding their hearts.\n\nLong did they remain in Heunthume, and in that time they made the Queen’s Throne a gentler place—where all who dealt in intrigue were reminded of the strength that only unity can bring."
flavour_harpylen.2.a: "If to suffer is to learn, the Stonewing have grown wise indeed."

flavour_harpylen.3.t: "The Jarnklo Homecoming"
flavour_harpylen.3.d: "When word came to Heunthume of the discovery of the northern flocks, the populace was ecstatic. Many had heard the songs of the Quaentho Mesti, and spat at the name Beastbane. Even so, their fury was one born of sorrow, for the loss of an entire flock was one almost too cruel to bear. That the wingmaidens of Vängheim had survived, and even thrived in the icy wastes of Gerudia, was therefore considered miraculous, and an invitation was naturally extended, for these distant kin to visit the heart of Harpylen.\n\nThis proved difficult in praxis, for Gerudia was half a world away, and the daughters of Väengheim took their charge over Elkaesal seriously enough that few held any desire to abandon their roosts and duties. A compromise was arranged, where a number of younger wingmaidens were chosen to accept this invitation instead. Those who were not yet so entangled in their duties, that their roosts would be lesser by their absence.\n\nThis caused some consternation in Heuntume, and many idly wondered if their northern kin held reservations on meeting them. If their majesty was lost on these rustic people, and if they were in fact being held in contempt? These fears proved unfounded, for not long after, word arrived from Deskumar. Reavers! Rowdy, ravishing, rambunctious (Gerudian) reavers! Wingmaidens in longships in their dozens! In ceremonial armour, singing, drinking and-...\n\nWord spread, and it became clear that the reavers were closing. Word came from Tremo-Enkost, then Akal-Uak. Then word of landfall in Kuzak. The wingmaidens continued on foot, and allegedly food, drink and merriment rose in their wake. The queen, ever close to the plight of her people, knew her duty. And thus, she gathered her court, and flew out to meet the northern savages.\n\nThe harpies clashed on the bank of lake Nasratu, and it is said that the festivities could be heard from Ciranmyna. Fishermen on the lake claimed that wine and mead had flowed so freely in those days, that a man could fall drunk on the waters of the lake for years afterwards."
flavour_harpylen.3.a: "I would call that a success!"

flavour_harpylen.4.t: "With Gilded Feather"
flavour_harpylen.4.d: "Courtly culture in Heunthume evolved significantly after the proclamation of Harpylen. While the Queen's Throne had always given legitimacy to whomever roosts upon it, the wealth flowing into Firanya’s old capital saw the palace greatly expanded. The audience chamber was refurbished into a great circular hall, open to the sky, and decorated with ornate pillars upon which the Queen’s advisors could perch and offer counsel. Every pillar was adorned with a host of plume-woven banners, given as a symbol of fealty from the myriad flocks of Harpylen. In a concession to practicality, the hall also featured comfortable seating for wingless guests, primarily in the form of opulent pillows.\n\nThe Harpylen Harem (the Heunthokharivor) grew in accord with the throne, as the queen took spouses from her human and elven subjects. These spouses were invariably employed as ambassadors to and from their respective communities, and joining the Harem was widely seen as a means of social mobility. This naturally gave the Harem a great deal of political power, and while this influence was often satirized, it remained a pillar of Harpylen imperial culture.\n\nRunning counter to the Heunthokharivor was the Harpylen House of thought (the Isutoqir), which formed the administration. Unlike the Heunthokharivor, this institution was almost entirely run by women and races unfit for the harem. A number of especially cerebral harpies also partook in the Isutoqir, but these were generally seen as odd hunters. Closely entwined but legally distinct was the Harpylen treasury (the Kemounqir), who innovated the widespread use of paper money in Harpylen, due to ease of transport in flight. The treasury shared administrative structure with the Isutoqir, but tended to secrecy, largely due to the enormous amount of gold they held in storage to guarantee the value of the currency."
flavour_harpylen.4.a: "Paper money, whatever will they think of next?"

flavour_harpylen.5.t: "The Kiohalen Homecoming"
flavour_harpylen.5.d: "The last flock to depart Firanya's roost, was also the last to return. This was no flock of ages past, no victim of an ancient calamity. Rather, it was the erstwhile daughters of the princess Asuria Ayarakin, who had struck against the throne in an ill-fated coup, as recently as the 15th century AA. In failure, she and her closest friends stole a ship, and set sail west, beyond the reach of her vengeful kin.\n\nWe had thought Asuria's brood dead and drowned, but in an unlikely twist of fate, they survived their journey, and landed in Aelantir, where they founded a small colony. Word reached Heunthume of this curiosity long, long after the fact, and it was discovered that the daughters of Asuria had not only survived, but thrived in their new home. The ruinborn of Aelantir were suitable mates for our people, and so one roost had become several, then dozens. Eventually, a nation had risen out of the dense jungles of the Effelai, taking the name of Kiohalen.\n\nFor the longest time, this was of no consequence, but as Harpylen spread her wings across the Lament, Kiohalen became more than a curiosity. The throne, ever magnanimous, extended a talon in friendship, and while the harpies of the west were at first hesitant to accept it, they eventually acceded to formally rejoin the Queendom, in exchange for a long list of guarantees and privileges, to ensure their safety from any undue repercussions. An invitation was extended, but politely refused, citing that Aelantir was half a world away, and that the Kiohalen had utmost faith in the splendour of the Queen's Throne.\n\nDespite, or perhaps because of this cold relationship, ambassadors spent much time in parlay between the throne and the erstwhile western flocks. Eventually it became clear that the Kiohalen did consider themselves subjects of the throne, and were more than eager to adopt her laws and custom. They truly, genuinely, simply had no wish to return to Bulwar, and preferred to be left well and truly alone."
flavour_harpylen.5.a: "...That is a bit strange, but very well."

flavour_harpylen.6.t: "The Nuzenapu Homecoming"
flavour_harpylen.6.d: "When word reached Heunthume of the Nuzenapu, the lost harpies of the east were instantly the subject of great intrigue.\nMany questioned the truth of their fierce aspect, and many more found their wholesale embracing of an earthbound culture peculiar.\nSome found it insulting, others exotic.\nIt was therefore inevitable that an invitation was extended to Waben Donpun, for a delegation to visit the heart of Harpylen, and partake in the wider imperial culture.\n\nThe invitation was accepted, and the capital awaited the delegation from the east with bated breath.\nWhat they no doubt did not expect, was dragons.\n\nNot true dragons, of course, but as the Nuzenapu crested the horizon, they were flanked by hobgoblins, mounted on winged dragonnel, and hefting shining lances, each tipped with a clan banner, fiercely whipping in the wind.\nThey made their descent to Heunthume in well-drilled unison, and as they made landfall, the leading harpy stood sentinel beside an old weather-bitten hobgoblin as he dismounted.\nThey approached the queen, and bowed deeply, in perfect unison.\nThe leading harpy spoke first, in a measured voice.\n\n“We, the first pair of Waben Donpun, were called, and we have come.\nWe pledge lance and bow to the Queendom.”\n\nThe hobgoblin continued, surprising the court with his knowledge of the Firanyan tongue.\n“We pledge to serve this throne, on this day, and until the day when the last pair of Nuzenapu fall from the sky.”\n\nThe court fell silent, and all eyes turned to the queen, who to her credit only hesitated slightly, before speaking.\n\n“I bid you rise, for I accept your pledge.\nFrom this day on, you shall be my flock, and if any strike against you, they strike against this throne.\nTogether, may we never fall from the sky again.”"
flavour_harpylen.6.a: "And most in the court agreed that this was well said."

flavour_harpylen.7.t: "The Hundred Flocks"
flavour_harpylen.7.d: "The origins of our august people were never well understood, though this can be said of all the peoples of Halann. Tales of our past ever roosted in song, and while this makes for easy listening, the tales grow changeable, with any voice choosing to sing their truth.\n\nThus it was important for the Queendom to establish a sense of cultural unity. We are all daughters of Firanya, but what does this mean? Scribes were gathered, songs were assembled, and a council was convened, to sing and to write of our history, so that Harpylen's song would grow sturdier than words on the wind. A truth was written, a silent song on paper, lesser perhaps than the living songs of the moment, but something to remember.\n\nThe song was of the first Harpylen, and the first queen Firanya. In ages past, before the elves, Firanya and her flocks were rulers of Bulwar. Little is known of this time, but songs were sung of glory and plenty, of flocks roosting on every peak, and our human charges living in peace, with great flocks of sheep in the valleys below. The songs sing of a simpler time, where we stood alone at the peak of the world, with Firanya as our queen, and Bulwar as our garden.\n\nBut Firanya fell, slain by age or arrow, and the songs say much and nothing of how, only that she was gone. Gnolls came to Bulwar, and Firanya's daughters squabbled over the queen's throne, like vultures over a carcass. Gnolls could not reach our peaks, and so we did not fear them. But they struck our human flocks, and brought them suffering, so that they grew to hate us and the gnolls both. Soon, all of Bulwar was ablaze, and even our roosts were choked by the smoke of the burning valleys. And so, the flocks of Harpylen scattered, to the four corners of the world. The first Queendom had ended.\n\nThis asked a question of our new Harpylen."
flavour_harpylen.7.a: "Where did our sisters go?"

flavour_harpylen.8.t: "To Pursue the Past"
flavour_harpylen.8.d: "The old perch of Siadúna Flaming-Talon proved invaluable in tracing our past, for her flock had carved their homes from the mountains themselves, by fire and by talon. From their perch on Rahen's western wall, their realm had spread from Azka-Sur in the west, into Marutha to the east. The Siadun would name their queendom Siadanlén, and their songs were rife with tales of valor, conquest and glory in battle.\n\nBut Jaher's coming would spell the end of Siadanlén, for in his legions did the Siadun find a foe they could not best. And as the phoenix rose, did the harpy find herself under its yoke. Many had found this unbearable, and they had taken wing once more, scattering to the four winds, as our people seem doomed to do.\n\nBut these songs of sorrow were invaluable to the Queendom, for she had put her own songs to paper, and many claimed that in so doing, she had murdered them. Yet through the reading mind could the song live again, and from Heunthume was it decreed that the hunters who had brought home the songs of Siadunlen, would be reorganized as a new wing of the government. They were named Ivetasananthor (song hunters), and their mandate was the hunt for the songs of our people. Our past would be compiled, our history made known. And the songs of our people would be found, and brought home to Firanya's roost."
flavour_harpylen.8.a: "If our songs have flown to the four winds, then to the four winds we will chase them."

flavour_harpylen.9.t: "The Nalenian Homecoming"
flavour_harpylen.9.d: "When word reached Heunthume of the successful expedition to Naléni, the Queen's Throne was abuzz with intrigue. The Ivetasananthor had been a success, and both the Heunthokharivor and the Isutoqir were keen to see returns on their investment in glory and prestige. As such, it was little wonder that an invitation was sent to the Jewel of the Sky, an offer for the queen of Naléni to come to the heart of Harpylen, and see with their own eyes, the splendor of the cultural heritage they were part of.\n\nIt would perhaps have served the courtiers of the Queen to listen closer to the songs of Naléni, for the invitation was accepted. And again. Then once more. Twice, and thrice over. And the Naléni came to Harpylen, not just the queen and her retinue, but an endless flight of courtiers and captains, some dozens of well-dressed nobles, but many more salt-washed marauders. For in Naléni, every Odanchesta was the queen of their own vessel, and the Naléni were proud and independent. Word had spread, and no Odanchesta would suffer to be outdone in prestige by her peers.\n\nSo it was that for weeks on end, the Queen's Throne rang to song and dance and relentless revelry, and every Naléni bore gifts, each keen to outdo the other, so that Heunthume were near full to bursting with the endless treasures of the sea. Never one to be outdone, the Idar Odanches of Naléni arrived fashionably late, on a small ship, clad in long drapes of golden silk, held in flight by no less than a hundred of her peers, who used an ingenious set of harnesses to sail a ship to the Queen's Throne, for the first time in history."
flavour_harpylen.9.a: "Where are we even going to fit that...?"

flavour_harpylen.10.t: "Nillen"
flavour_harpylen.10.d: "With Asmalil secured, Harpylen rose yet higher in power and esteem, and not since the days of Firanya had the children of the sky flown so close to heaven. From Heunthume, across Bulwar and beyond did the fourth and final queendom spread her wings, and from Cannor to Haless did the people of the world crane their necks to see her glory.\n\nAnd yet, as Harpylen rose in radiance, did the Queen's Throne find a higher perch - a vantage from which to look ever further afield, so that her gaze fell across the world entirely, and what she saw brought her no joy.\n\nFor across the world beyond Bulwar, the myriad daughters of Firanya had spread. They had flown or been driven to every corner of Halann, and while they had survived, many had been robbed of pride and joy, their lives brought from a hunt of choice, to a hunt for a life tomorrow against their many foes.\n\nThe greatest foes of harpies' past were the gnolls, as the stonewings of Akasik could attest. But the gnolls were beasts at heart. Cunning beasts, to be sure, but beasts. Harpylen had risen above them, and even found for them a place of sorts. They belonged in the sand, bound to the ground with the sky forever out of reach. Figures of pity, but no longer of fear. Greater foes were the children of Jaher, but they too had found a place in Harpylen, and many of Firanya's daughters now bore their blood.\n\nBut the first and final of Harpylen's foes were the humans. Much like ourselves, the humans were unknown. None knew from where they came, and they themselves held to a divine origin. Despite the strength of Harpylen, humans remained both our most numerous servants, and our most implacable enemies.\n\nIt was with this in mind, that the Queen's Throne brought Asmalil to her lips, and sang.\n\nFor all Firanya's children would be brought home, and all who had stolen the sky from them would be struck down, their faces cast to the ground, so that their eyes would never again gaze upon heaven."
flavour_harpylen.10.a: "Bring my sisters home to me. For that is my Wish."

flavour_harpylen.11.t: "As First, Final"
flavour_harpylen.11.d: "Our ancestral home is the aptly named Harpy Hills. This is well-documented, by human and harpy both. Ever since our august race learned to sing, and remember. It is a curious thing then, to look back, a scant four hundred years perhaps, and see just how far we have come. Where once our people were scattered to the four winds, we are now together once more. Where once each flock was a kingdom in their own right, we now bend knee only to a single throne. Heunthume, the Queen's Throne, the Throne of Heaven.\n\nAnd as our knees bend to her, do we stand tall and proud above all others. Where once we were prey to gnoll, elf and human, we need no longer fear them. The gnolls may whisper of their Xhazobine, the humans of their Castanor, and the Elves of their Phoenix Empire. And whisper they shall, for these realms are all dead and gone, consigned to the ashes of history by a greater, truer song than any of their false-toned shrieking combined.\n\nAnd it is a true song, for Heunthume is more than a throne, and Harpylen is more than an empire. Our queen and our people are the blood of Firanya, and we know no equal. We hold Asmalil, and her song shapes the world in our image. Where our old rivals and enemies built their realms on domination, fire and blood, our path is to forge something greater. A true song of the world, in which every child of the sky may partake.\n\nOur earthbound subjects may look upon us with envy. This is their right, for we are better than them. We have proven this, over and over again. Where they grasped for sword and spear, we extended our talons in friendship. Where their methods brought ruin to all, we of Harpylen found a place for all under our wings. They may grumble and chafe at their bindings, for they are not free - How can they be, when they are slaves of the earth?\n\nBut one day, they will forget that they once lived without us. One day, they will know, as we know, that our path is the true path. Not only for us, but for them as well. They will never be our equals, but there is a place in the sky for all children of Harpylen, Fourth and Final Queendom.\n\n-Namarhannu Nephiosekhu, Ivetasananthor chronicler"
flavour_harpylen.11.a: "May it last until the end of the world."

flavour_harpylen.12.t: "A Distant Melody"
flavour_harpylen.12.d: "As Harpylen grew, so did her ambition, and many of her children heard the glory of the song of today, yet found in it an echo of the song of the past. In this manner, many roosts were taken by fervent debate. The topic? Which was the song, and which was the echo? Were the deeds of today echoes of glories old? Or were glories old simple echoes of this new golden age that had enveloped the Queendom?\n\nNowhere was this debate as lively as in Heunthume, and even the Queen's Throne heard this question, sung by her many children far below. The throne took no stance of course, but called to the Ivetasananthor, who had hoarded many songs from the past. A question was sung, an envoy returned, an answer was given.\n\nFor it was true that the song of the past was strong, stronger perhaps than the song of today. But this strength lay in the tools of that age. One word was sung over and over, by harpy and human both, and the word was “Kurešim”.\n\nKurešim was the art of the wish, the greatest magic of the ancient world. It was wielded by the Šedu, the djinn rulers of ancient Bulwar. With it, it was sung that they had shaped the very land of their dominion, changing simply by the power of their word, the very nature of that which was.\n\nBut where the Šedu had vanished, their craft had remained, and the greatest of these tools were the Menumšar, Kurešim bound in forms of matter. Their method of creation was impossible, their powers beyond imagining.\n\nAnd according to the old songs, our August ancestor, Queen Firanya, had been the owner of one such treasure. It bore the name Asmalil, yet nothing else was known of it.\n\nSo did the Queen's Throne, the Heunthokharivor and the Isutoqir come together in song, and a choice was made. Asmalil would be found, for it was our legacy and our future. And if the song of today were to rise above the song of yesterday, Harpylen would need tools equal to this task."
flavour_harpylen.12.a: "Find me Asmalil, for that is my wish."

flavour_harpylen.13.t: "The N'zeri Homecoming"
flavour_harpylen.13.d: "Word of the return of the Nzeri was well-received in Heunthume. Moreover, word of their success in the heart of Sarhal was cause for pride for many citizens of Harpylen. After all, these daughters of Firanya had overcome the fury of the Salahad itself, to make for them a home far from their many enemies. So an invitation was expected, offered and readily accepted. Many were keen to see the people of the south, and some even expected the Nzeri to make their journey across the Salahad once more.\n\nIn this, they were disappointed. The Nzeri took a more practical route along the Mother’s Sorrow, and seemed by and large to favour modest and slow travel. To the citizens of Heunthume, this only increased their mystique, and when the guests from the south finally arrived, the city was about ready to start the celebration without them!\n\nBut the Nzeri proved worth waiting for, as they arrived in flight, clad head to talon in gilded plate, the midday sun reflecting in gold and gems, to dazzle and shine across Heunthume. Three full circuits did the Nzeri make of the capital, each of them throwing puffs of colourful dust into the sky, synchronized so finely, as to create brief mirages of imagery, before being taken by the wind.\n\nAs they landed, they were received in jubilation, and the celebration that lasted was suitably rambunctious. The citizens of Heunthume did most of the feasting, however, and the Nzeri conducted themselves with restraint and dignity. At the celebration’s end, many did wonder why the Nzeri had chosen so, and many did find an answer to this, for not all Nzeri returned home to Nirakhet, but remained behind in Heunthume. They named themselves Paladins of Nirakhet, and took great pains to spread her word in the capital - A place they felt was in sore need of the comfort of the Mother of All. Though never a popular movement, their devotion would see some harpies take to Nirakhetist belief, and they were given support in the established flock of Elaiénna, who found their edicts sympathetic to the teachings of the Jadd."
flavour_harpylen.13.a: "This is getting out of hand. Now there are two of them!"

flavour_harpylen.14.t: "The P'ezarangi Homecoming"
flavour_harpylen.14.d: "“The night was unlike any other at the Queen’s court. The Ivetasananthor stood mesmerised, unable to tear their gaze from the fluid harmony that unfolded before them, and neither could the Queen herself.\n\nMasks of every imaginable shape - demons, dragons, and other mythic beasts from far Haless - drifted and swirled through the air like a gentle tide, concealing the disciplined faces of Harpies beneath. The melody they wove was near impossible, many among the Ivetasananthor later thought. For how could a song be at once so profoundly soothing, yet so vibrant with life?\n\nThe authors of this vision, of this enchanted night, were none other than the so-called Righteous Masters - the name our scattered sisters in distant Xia had come to call themselves. The mysterious Pzerangi”\n\n~From the recollections of a Courtier of the Queen’s Court\n\nThe matter of the P'ezarangi was a peculiar one. The Ivetasananthor found themselves in the role of students (at least temporarily) for the wise and learned Pzerangi Shifu of the mountains made their own understanding of song seem meagre by comparison.\n\nFor many days and many nights they shared their understanding, and for many days and many nights the Ivetasananthor listened. Even when the songs spoke of things beyond comprehension, like the strange force called “Chi”, or the somewhat eccentric “Divine Wind”, they listened and learned. And by the end, they couldn’t help but feel they gained more than just the old songs returned to them."
flavour_harpylen.14.a: "The songs of Xia now echo in the Queen's court."

flavour_harpylen.15.t: "A Suitable Perch"
flavour_harpylen.15.d: "When Harpylen spread her wings, her shadow soon fell past old Firanyalen, climbing over the crumbling walls of the Jorkad dam, and stretching into the vast expanse of the Deepwoods. This embattled realm was ancient, and had in its time seen many tribes take it, though few could say to master it. War in all its forms was abundant in this place, with elves, orcs, goblins and many more crossing blades in its myriad groves.\n\nThe Queendom then, was in many ways only the newest of a long list of invaders, but the flocks of Harpylen proved uniquely adapted to the wood. Flocks would prowl the skies above the woods, roosting only in the crowns of the great trees, their modest homes set like islands in a great green ocean. It was said that a war could rage on the forest floor, while peace reigned in the crown, so far removed were the homes of Harpylen.\n\nThe great roost of Ciranmyna became the exception to this rule. This old city had been the center of wood elven culture ever since they arrived in the Deepwoods. So it was when the Queendom claimed it, and so it was promised to remain in perpetuity, by the Queen’s Throne in distant Bulwar.\n\nYet words and deeds cannot always align, and for better or worse, Ciranmyna began to change. As Harpylen secured her rule in the woods, Ciranmyna grew at breakneck speed, as the heart of the Deepwood frontier. Harpies with their flocks, winged and wingless both, began to migrate to Ciranmyna in their thousands, drawn each by a promise that the frontier offered a better life. Ciranmyna grew, and day by day, year by year, Ciranmyna grew less elven, and began to resemble a roost in the Deepwoods, by harpies, for harpies. There was no riot, nor an organized resistance, but rather a slow, quiet change."
flavour_harpylen.15.a: "And one day, Ciranmyna wore a new face. "

flavour_harpylen.50.t: "Asmalil Attained"
flavour_harpylen.50.d: "My name is [Root.Monarch.GetName].\n\nIt was a Wish we made, I know that now. We sought Asmalil. We called out, and she heard us. She answered, She brought us, and she bound us.\n\nI think back to the day when I took her. My hunters came to my court, they did not fly. They were simply there one moment, as if they had always been there. No one thought it odd, not even I. They brought her. They knelt so perfectly, and they offered her to me.\n\nIt is a flute. A dainty little thing, like a fledgling's toy. Warm in my talons. I play it sometimes, but I do not need to. I hear her song day in, day out.\n\nWhy do I write? Because she is old. Her power does not hear the written word. I feel no wish to write this. It makes me feel ill. Perverse. But there is a part of me that does not hear her song. That does not wish to hear it.\n\nAsmalil is power, but more than that. Those who hear her song, hear one another if they listen. I hear the song of my court, and then mine own song through their ears. I know how I sound to them. I know what song to sing them. How to soothe them. And it is not only them. I soothe myself as well. We are so closely entwined, in a song so vast that it grows painful to listen.\n\nBut I wield Asmalil. I know enough to use her. And she wants to be used. So I do, until I cannot tell if I wield Her, or She wields me. There is no voice, aside from the song. The song I play upon her, the way it changes. Is it a will? I am not certain. I struggle to care.\n\nWhat is Asmalil? How did Firanya make this thing? I do not know. I know Firanya's voice, for She knows her voice, and so I do too. But I do not understand how she could make this thing. I can think, sometimes, in a space beyond the song. It is rare, in dreams perhaps. I can hardly tell the difference. But I think of an idea. Something my mind can grasp unto.\n\nThe Temenšar are tools that shape the world. The wielders of the Temenšar, are of the world."
flavour_harpylen.50.a: "The Temenšar are tools that shape the wielder."

flavour_harpylen.100.t: "The East Calls"
flavour_harpylen.100.d: "The fate of the flocks who fled became somewhat of a cultural obsession in Harpylen, and in a rare moment of assent, the Heunthokharivor and the Isutoqir prepared and outfitted an expedition of odd hunters to answer this question. The logical place to begin, was Siádun to the east, for these roosts were known to Harpylen, and they had in their time been a power, ruling over their own lands under the wing of their namesake, Siadúna Flaming-Talon.\n\nThe questions then seemed obvious. How did the Siádun come to the Pravimvata? Why did they settle there? What were their songs and their legacy? Asking the first question proved a daunting task, for harpies are light on their talons, and leave scant marks of their passing unless they so desire. This has given rise to the Gelkar saying of “tracking a harpy” as a byword for a largely impossible endeavour.\n\nYet the odd hunters took to this challenge with unusual vigour, and much was gleaned from the Sareyand archives, for it held many songs from Jaher’s time, singing of the bitter wars fought between elf and harpy in ages past. Tracing the golden highway, the hunters began to trace a path of flight, and they found many old roosts, built not for easy living, but as bases from which to raid and wage war. An exception was found in the highland of Grixek, where a great roost was found, rough-built, but clearly meant for living. The place was long abandoned, but for an unlikely tribe of humans and gnolls, who now roosted there with herds of rugged sheep. Yet they had many songs of the old queendom, and how this had in its time been a great city. A bulwark facing west, but also a sacred place, one of the first roosts founded by Siadúna Flaming-Talon after the flight from Bulwar."
flavour_harpylen.100.a: "And the odd hunters trapped these songs in paper, before setting their sights further east."

flavour_harpylen.101.t: "A New Home"
flavour_harpylen.101.d: "Harpylen's conquest of Siadunlen had been a gentle affair, by and large. Even so, the Siadun were a proud people, and they chafed under the western yoke. Nowhere was this sentiment stronger than in the capital of Siadunaiun, and many hunters endured their share of abuse in their hunt for the songs of Siadun. Tensions rose and progress stalled, until an unlikely breakthrough was made, for where the Siadun were silent, their old vassals were eager to sing. For Siadunlen had shattered under Jaher’s mailed fist, and two smaller flocks had sprung from her breaking.\n\nFirst and loudest were the Múlen, who claimed descent from Múla Swift-Sparrow, a daughter of Siadúna. The Múlen were stewards of the northern pass, and held the duty of repelling centaur incursions from the Forbidden Plains. This thankless toil had made them fierce warriors, but they held little love for their southern cousins, and when Jaher struck Siadunlén, the Múlen made peace with the rising Phoenix, thus earning the eternal ire of their southern sisters. To this day, they were of great help to the hunters, for if a Siáduni held her peace, a Múleni would speak. Thus could a clever hunter wrest a song from one, through the silence of another. Soon, both flocks were singing, and their tales were eagerly caught by pen-wielding raiders.\n\nOf endless fascination to the hunters were also the smaller flock of Elaiénna, who had more recently broken with Siádan, as the Matriarch Jasiéne allied a legacy of the Phoenix Empire, the Jaddari Desert Legion. Through them did the Elaiénna abandon the Hunt, and instead took to them the alien faith of the elves, simply named “The Jadd”. Their songs were strange, though they shared them gladly, and more than a few hunters found themselves inspired by the sun-kissed voices of these southern heretics. Even so, they held no doubt that the words they entrapped would bring a blaze to the soul of Harpylen, for the Elaiénna held a conviction in their songs that seemed at odds with the lighthearted voice of the west."
flavour_harpylen.101.a: "They are just a bit intense about Surael is all..."

flavour_harpylen.102.t: "The Condor's Lair"
flavour_harpylen.102.d: "During the first years of the Ivetasananthor, the organization remained small, with most members serving in an ad-hoc capacity. Aside from the order's perch in Heunthume, Siadunaiun became a vital roost, it being the site of the order's first success, as well as the origin of many further migrations. Thus, when a new migration was traced, the expedition departed from Siadunaiun, for the hunters had studied the sundering of Siadanlen, and listened to the songs from that time. They now knew that many flocks had fled the phoenix, flying south to the Gulf of Rahen, before banking west towards the setting sun. Following the coast into the Salahad bay, the hunters came to the mountains of Kograrzo, where old roosts were found. Some harpies were found there, and songs were sung of a flock to the south, who held great strength to this day. This was how the Ivetasananthor came to learn of the winged guardians of Dasmatus. Nestled south of the island, this flock had built their roost in the dry mountains of Xhogrix, where they had spent the time since the Sundering, perfecting the art of hunting gnolls. This was readily appreciated by the citizens of Dasmatus, who held their protectors in high regard. For the odd hunters however, the roost of Xhogrix was a dour place. The flock of Dasmatus was fierce and cruel, practicing a doctrine of the hunt invoking the condor, a powerful scavenger. As such, nearly all harpies from Xhogrix were warriors first, and to them the ambush was an art, the swift kill a craft. They took wing with long spears and heavy bows, eschewing armour in favour of the pelts of slain gnolls, dyed and treated to blend with the red mountains where they made their home. Yet the harpies of Dasmatus were cordial enough, and they told the hunters of their part in the migration. How they had stayed behind in this place, but many other flocks had flown through the bend, and east to the horn of Sarhal."
flavour_harpylen.102.a: "Many thanks, terrifying friends!"

flavour_harpylen.103.t: "The Jewel of the Sky"
flavour_harpylen.103.d: "Following their rest in the roosts of Xhogrix, the Ivetasananthor flew east towards the rising sun. As they traced the hills east along the northern coast of Sarhal, their track ran cold on the edge of the highlands of Beri Gnidi. Yet the flock of Xhogrix had spoken of a realm of harpies to the east - the so-called Jewel of the Sky. With this song in their heart, the hunters struck out across the dry plains of Dreksaret, a virtual sea of green and yellow. They kept the coast on their left, until they reached the great city of Dakmender, straddling the great river Keygas, and with the vast mountains of the horn of Sarhal rising behind her.\n\nIt was in Dakmender that the Ivetasananthor met the Naléni, through one of their ships. The captain of this sleek vessel called herself a Odanchesta, and kept a crew of human, harpy and gnoll under wing and sail. She called her ship her roost, and herself its queen. With her aid did the Ivetasananthor sail around the horn, to Jezarpízu, the Jewel of the Sky. It was here that they learned the songs of Naléni, and grew to know their ways.\n\nWhen the Phoenix broke Siadunlen, the Naléni had flown far, and nestled in the forbidding mountains of Emot Nepas. Their flight had been chaotic, and the flocks settling here had been isolated and disparate. It would take over a century before Muréda Nephieuda united these flocks into a queendom, with those opposed to her striking east out to sea. There they would become exceptional seafarers, and through piracy they would gather great wealth and power. Eventually, the queendom of Naléni would arise in earnest, as an unsteady accord between these reavers, and the daughters of Muréda. As a legacy of this, the Naléni were infamous pirates, renowned for their skill at sea, as well as a fierce independent streak."
flavour_harpylen.103.a: "For each Odanchesta is queen aboard her own ship."

flavour_harpylen.104.t: "A Shield Broken"
flavour_harpylen.104.d: "It was no secret in Harpylen, that the time after Firanya's fall had been a nadir of our culture. Our first great queendom fell with her, and our flocks scattered. For most, their travels took them east, to Siadun, Naléni and even further beyond. But some chose to fly west, settling in the Godshield south of what would become Castanor. The Ivetasananthor knew little of these harpies, and it was not until the Godshield fell under Harpylen's wings, that an expedition could be mounted. The hunters took wing from Heunthume, heading east to lake Nasratu. From there, they traced the Nasra, until they reached the port of Deskumar. After, it was a gentle flight along the coast of Bahar, hopping from Yametses, to Crathanor, to Gemisle. Thus far, the path of the Stonewing was clear enough, and the flooded lands to the north were unfit for harpies. Past them however, loomed the forbidding mountains of the Godshield, and it was there that the hunters would fly.\n\nAs it so happened, The Godshield held many old roosts, but they were ruins all, their insides gutted and scorched by fire. Of the Stonewing, no trace could be found, no songs, no memories, hardly even the bones of those who had once called these towering heights home. It was in Karn's Hold that the hunters found a clan of shepherds, and heard their songs. For the harpies of old had been vanquished, butchered by the old king of Castanor, a name known and hated by all who called the sky their home.\n\nBeastbane.\n\nThe Ivetasananthor were bereaved, and the flames in their hearts guttered with sorrow, yet burned with fury for the dead, and the ignominy of their deaths by some human tyrant. Yet the politics were for the throne to manage, and the hunters had another task. By the songs of the shepherds, it was made known that some harpies had escaped the slaughter. Many had taken wing in a desperate flight south, not home to Harpylen, but out across the Divenhal, to the south."
flavour_harpylen.104.a: "And wherever they had fled, the hunters would follow."

flavour_harpylen.105.t: "As Hard as Stone"
flavour_harpylen.105.d: "Tracing south from the Godshield, the Ivetasananthor traced the edge of the Khenak, tracking south along the coast to the strait of stone, before setting out across the Divenhal.\n\nTrekking south across the sea, the hunters made landfall in the city of Deshak, and through the songs of the local humans, learned that the Stonewing harpies had indeed settled in Akasik, and their roosts had long been a haven in the dry mountains of this rugged land. Yet darker songs they sang also, of war and slaughter, and the breaking of those who called this place home, under gnollish whip and blade.\n\nSo it was with fear in their hearts that the Ivetasananthor took to the mountains, and yet nothing could have prepared them for what they saw. For there were roosts there, but they were hollow and empty. And the stones of every perch they found sang the same silent dirge. A song of broken homes, shattered eggs and halls burnt black with demonfire. Of the Stonewing flocks, nothing was left, but the odd fragment of bone, bearing the mark of gnollish fang and flame.\n\nMany hunters grew to hate the gnolls, and many more had their faith in their hunt shaken. But one day, a pair of hunters returned to their dour flock, carrying with them a human, who invited them to her village. Upon their arrival, she spoke to them thusly.\n\n“You are the eyes of distant Harpylen, and I know not your queen. But you have freed us from the yoke of demons, and for this alone will we trust you.”\n\nThen the human turned her head, and nodded in signal, and from the dark doors of many houses, did harpies cautiously emerge. Most of them were young, and all had a distant, harried look to them. All bore scars of battle and abuse, and their eyes were hard with mistrust. Yet for all that, they lived. The hunters would soon find many such distant places in the mountains, where the humans of Akasik had shielded their kin from gnollish wrath. In so doing they had saved their flocks, and it would be said that the Stonewing were named, not for their wings, but for the bonds they had forged with the humans of Akasik."
flavour_harpylen.105.a: "For they were strong like the bones of the mountains. "

flavour_harpylen.106.t: "For Miles Around"
flavour_harpylen.106.d: "During the time of the Harpy flight - or the Great Tsh'iqi, as the P'ezarangi call it - many of the harpies that fled east settled at the Paravimvata range, later becoming the Siadunan. But among the fleeing flocks, some advocated crossing the Paravimvata and seeking a home ever further in the unknown lands of Haless, to ensure they would remain outside of Jaher's grasp.\n\nOne such flock, led by Relyore Fillanveta - a young harpy unfortunate enough to witness first-hand the brutal efficiency of Jaher's legions - continued their journey, and after a long flight further east, they arrived at Mount Tughyasa. Tired, broken, and mistrustful of outsiders, Relyore led her flock in an attempt to loot the peaceful Oracular Order of the mountain.\n\nThey soon found that the Order was far from unarmed, and the tired harpies were humbled and defeated once more. Unlike the Jaherian Scourge, however, the Muthadhaya oracles didn't punish or hurt the broken harpies - instead keeping them at home arrest, disarmed but free to leave at any point.\n\nIt took long months of careful opening and dialogue for the harpies to trust humans, but as they did, the diverse order taught them the art of Yí (literally: “to think; a yannified P'ezarangi term associated with philosophy and free thinking”), and once sufficient rapport was built, Relyore was invited to receive a reading from the Oracles.\n\nNobody knows exactly what the divination revealed to the flock, but it caused Relyore to lead the harpy refugees further south to the Xianjie mountains. There they settled and continued practicing Yí, submitting to the authority of Xia Wulin, as Relyore became the first harpy Martial Master.\n\nThe following decades saw the hér (as the local Szitu people came to call them) changing gradually, maintaining Relyore's (or yannified Relyer's) legacy and settling into a calmer and wiser way of life, spending long days on meditation, exercise, and singing festivals.\n\nUnder the Third Martial Master - Dasheng, the already heavily yannified harpies adapted to the way of Chi, and embraced the Transmutative Path.\n\nOver time they also developed a martial technique called “Rei” - meaning “to Flow”, which allowed for more elegant combat. The technique grew over the following decades, eventually evolving into a new martial art of p'erryì - “Dancing Breeze”."
flavour_harpylen.106.a: "And so they danced upon the wind."

flavour_harpylen.107.t: "The Peacocks Parlour"
flavour_harpylen.107.d: "Not all harpies who passed through Mount Tughyasa chose to follow the path of Relyore Fillanveta and the P'ezarangi. The Ivetasananthor found that many carried wounds that didn’t fade with time, and while some stayed with the Oracular Order, others saw it as a risk to remain under foreign watch.\n\nAmong these was Semiha Nephiofira, who gathered a group of like-minded harpies and decided to keep moving east, using the freedom they had been given to leave and search for a place of their own deeper in Haless.\n\nThey did not have to search for long. Beyond the lands of the Raj rose the Phokhao Range, a harsh but suitable place for a new roost. However, the mountains were already claimed - the dwarven hold of Verkal Ozovar lay to the southwest, while the peoples of Yan controlled the other side.\n\nKnowing her flock could not survive another conflict, Semiha chose to settle there anyway, rather than risk pushing them even further after everything they had already endured.\n\nUnlike the P'ezarangi, Semiha did not try to adopt foreign ways, and instead relied on what her people already knew. Through careful negotiation, small compromises, and the occasional bluff, she managed to secure a fragile understanding with their neighbors, allowing the roost to exist as long as it remained small and its hunts stayed discreet.\n\nAt the same time, the harpies did not abandon their old traditions. They continued to follow The Hunt, keeping alive one of the oldest Songs of the Hunt, passed down from before the flight and preserved in the mountains.\n\nIn the years that followed, Semiha began putting more structure in place, slowly shaping the roost into something more stable. Part of this was the creation of the Mountain Raves, one of the earliest semi-organized harpy groups, which first handled hidden hunts but later took on roles in espionage and other covert work across Yan.\n\nIt was also during this time that the flock took on the name Semifire, combining Semiha’s name with the harpy word “fira”, meaning mountain, for a combined meaning “Semiha’s mountain”.\n\nOver the following decades, the Semifire improved their position among their neighbors and became known as the “Phokhao Peacocks” for their diplomatic skill. They often acted as mediators between the dwarves of Verkal Ozovar, the peoples of Yan or the Hinphat, and with dwarven help their roost grew into something far larger and more developed than it had been at the start.\n\nThey also developed an elemental practice called nemphí - “to bring wind”, or Wind-bending, which gave them a way to support their diplomacy with force when needed."
flavour_harpylen.107.a: "Wind and grace."

flavour_harpylen.108.t: "The Butcher's Toll"
flavour_harpylen.108.d: "The dead roosts of the Godshield proved a valuable, if macabre trove of information on the fate of the Stonewing harpies. It was logical then, that the Ivetasananthor would return to this dour place, when they were tasked when picking up the trail of other western migrations. It had become clear that the harpies of the west had shattered under Beastbane's fury, but where some had fled south, others had flown west, tracing the mountain peaks to avoid the wrath of their earthbound enemies.\n\nSo the hunters traced the Godshield west and south, until the mountains dove beneath the earth in the Corvurian Marches, vanishing entirely by the old fort of Arca Aldresia. Thanks to the far reach of Harpylen, theirs was a safe flight, and they could pass unchallenged into the verdant Ashfields, before reconvening with the Godshield Mountains as they rose again as the Havoral Divide.\n\nThere the hunters spied roosts once more, and their tale was the same dismal dirge as the one sung by the Godshield. Harpies had lived here, yes. But they had been hunted here, and for those who had lingered, death by human hands had found them here. The sorrows of the Godshield roosts awoke in the hunter's hearts, and for many, it was a difficult hunt to follow, as one empty roost after another traced a gloomy path north across the Havoral Mountains.\n\nIt was in the elven fortress of Ár Éinnas that the hunters found a clue, for the elderly steward there had made a study of the roosts of the Havoral, and was glad to aid the daughters of the sky, offering their notes and observations on the matter. According to them, Ár Éinnas had been the last living roost in the Havoral, abandoned when Beastbane bayed at her gates. The survivors had undertaken a great flight north, beyond the reach of Castanor. The hunters were relieved that some of their kin had survived, and word of their findings returned to Heunthume. The Queen's Throne fumed at the depth of Beastbane's depravity, and it was decreed henceforth, that a national day of mourning be devoted to the memory of those unjustly slaughtered by Castanorian hand."
flavour_harpylen.108.a: "This day would be known as the Quaentho Mesti, “The Butcher's Toll”."

flavour_harpylen.109.t: "Towards the Freezing North"
flavour_harpylen.109.d: "The Ivetasananthor flew northwest, as suggested by the steward of Ár Éinnas. Soon they reached the northern edge of the Havoral Divide, resting briefly at the old fortress of Calascandar. From this perch, they could see north across the Golden Plains, a vast verdant flatland, contained to the north by the great river Meléthreabáis. This was Damescrown, one of the wealthiest regions in the world, yet for the hunters, it was desolate, for there was no hill or mountain in sight, as far as their eyes could see.\n\nIn spite of this, they pressed on, and crossed first the Meléthreabáis, and then the Alen. Fields gave way to seemingly endless woodlands, and eventually, the land grew rugged, hilly, and finally mountainous. The vast Dragonheights rose to the west, ducking into the Moorhills, before rising again as the Coddoran heights. These hills were a curious land, full of diminutive reptiles and northern men of fierce aspect. They held no love for one another, but both had heard of harpies in ages past, and it was not long, before the hunters found an old roost in the distant heights of the Moorhills, empty of harpies, but inhabited instead by the selfsame reptiles - Greenskinned kobolds, who were wary of strangers, but eager to hear news of the world beyond their mountain.\n\nThe hunters traded tales at some length, and eventually learned a tale from their scale-clad hosts. An excerpt was sung thusly.\n\n“Harpies lived here, yes, but not for many years, for these stones are the scales of our Gods, and though our Gods sleep now, they woke long ago, and in their stirring brought doom to those who dwelt in or upon their flesh. We know not if your kin survived, but if they are winged as you are, I have hope. As for this land, and the lands west of here, I can say only this. No Harpy has been seen here nor there, from the Day of Waking, until this day. I am sorry.”"
flavour_harpylen.109.a: "Is there no end to the travesties our people must endure...?"

flavour_harpylen.110.t: "Keepers of the Winter"
flavour_harpylen.110.d: "The Ivetasananthor were dismayed by the news from the Moorhills, and trekked north to Celmaldor. The mood was dark, and many hunters felt irked by a trail gone cold, a hunt teetering on the brink of failure. Despite this, it was decided to rest in the great port of the north, to recuperate, gather strength and then decide what to do next.\n\nIt was fortunate that they did, for in Celmaldor, the hunters encountered a Gerudian captain, trading out of the northern port of Avnkaup. As they met, he offered them a gift of mead and honey, claiming that it was good fortune to curry favors with the Wingmaidens of Väengheim.\n\nThis shocked and intrigued the hunters, and they asked the captain to keep this gift, and instead bring them to these wingmaidens of whom he spoke so warmly. This was said and done, though the journey across the Giant's Grave was both cold and miserable. Longships, crew and hunters arrived in Avnkaup unscathed, and this was where they met the last descendants of the northern flocks.\n\nThe wingmaidens of Väengheim were a peculiar people, for they had taken the Gerudian faith and tongue as their own. Furthermore, they had taken for their mates the hard folk of Gerudia, as well as the gray people of Bal Vroren to the east. Their features reflected this, for they were tall and fair of skin, sturdily built with some even favouring heavy steel armour and firearms of Gerudian make. Some had feathers like spun gold, others so black as to glitter like gems in the light, but all were warriors first, and held the song in esteem, a tradition they shared with the many skalds of Gerudia. The harpies of Väengheim were welcoming of their southern kin, and gladly brought them to their sacred hall, where they told them of their charge, to keep Elkaesal the White asleep beneath their roost, there to dream for eternity. For if Elkaesal woke, they claimed, it would mean the end of the world."
flavour_harpylen.110.a: "Well then... I guess we'd best sing softly up here."

flavour_harpylen.111.t: "A Shoulder"
flavour_harpylen.111.d: "In the fall of the first Queendom, our flocks scattered to the four winds. This opening is sung in many songs. Most of our folk scattered along the flanks of the Serpentspine, east and west, and in the age of the Fourth Queendom, their whereabouts were, if not certain, at least mostly documented.\n\nMore elusive were documents on those who chose differently. Some flocks chose to flee north, into the Forbidden Plains, and finally, some fled south, to the Salahad.\n\nFor most of our history, conventional wisdom had held that this was madness. Survival in the Salahad was ever a skill hard-won by the gnolls and humans who claimed this endless waste. As such, the Ivetasananthor never put much effort into investigating this vast desert. Any clue would have been swallowed by the desert, and plainly, there were other flocks to track. One day perhaps, but always one day, and not today.\n\nThis changed when Harpylen's wings brushed against the banks of the Sorrow, and the myriad people of Kheterata began to share their songs. They sang of a flock of harpies, who lived in the heart of Sarhal, near the banks of lake Nirakhet. These they named Nzeri, and they were held in high regard.\n\nAnd so, hunters were sent, first south to the hot mountains of the Sad Sur, and then west along the north coast of the Salahad. When the hunters reached Koroshesh, it was a long, but peaceful flight up the Mother's Sorrow, to Uaalapor, where that vast river has its origin.\n\nThe folk of Uaalapor saw the hunters as a good omen, but found their ways odd. While they were familiar with winged folk, they found it strange that the daughters of Harpylen should not revere Nirakhet. After all, every harpy they knew of were most devoted to this, the mother of all things. Despite this initial confusion, the hunters soon learned of a great roost in the southern city of Zerkis, an arduous trek by foot, but easier by far as the harpy flies."
flavour_harpylen.111.a: "And so the hunters turned south."

flavour_harpylen.112.t: "To Cry On"
flavour_harpylen.112.d: "The hunters made good speed, and reached the great roost of Zerkis soon after departing lake Nirakhet. Before even arriving, they were greeted by their kin, fellow harpies of dark skin, flying in gilded metal armour, so that the sun made them shine like stars in the sky. They were soon escorted to the matriarch of Zerkis, an elder who named herself the Mother of Munzeri, and sang with a voice, worn thin yet strong from age.\n\n“I greet you as kin, though the sands have made us estranged from one another, since the days of Queen Firanya. As the mother of this flock, I have the honour of bearing the songs of our memory. I see many questions in your eyes, so I will answer. But first, let me tell you a tale. When we were Firanya's flock, we chose to cross the Salahad, and we did so in spite of the danger. It was Firanya's legacy, perhaps. We believed then, as we do now, that we were stronger than all others. That the desert held no terrors for us, who called the sky our home. For this, we were punished. A hundred flocks took wing, but most found the sand as we flew, as the sun smote them from the sky, or gnollish arrow found them. When our journey ended, hardly a talonful of us found roost here. We fell to the ground at Lake Nirakhet, there to fall victims to the men and gnolls of this land, who we had held in contempt.”\n\nThe elder paused, and smiled wistfully. “This of course, was our conceit. The folk of this land saw our pain, and our sorrow for those our pride had slain. They took us as their own people, and shared with us the word of Mother Nirakhet, who weeps for all. We have kept our peace, and chosen silence to your ears, for we see in you much of old Firanya, whose pride did great harm to our people. Yet we knew, then as now, that we could not hide forever, and now that you are here, we will join with your Queendom, if you so will it.”"
flavour_harpylen.112.a: "“Now... Do you have any questions?”"

flavour_harpylen.113.t: "Towards Peaks of Ice"
flavour_harpylen.113.d: "The sundering of Siadanlen seemed a nearly endless source of tales and songs for the Ivetasananthor. These songs were helpful in consolidating a cultural identity in Harpylen, and though their actual historical reliability was lacking, some would argue that what they lacked in factuality, they more than made up for in flair and dramatics.\n\nThe harpy migration north into the Serpentspine, therefore seemed more fanciful than truthful, and most hunters initially dismissed the notion. The Serpentspine was infamously hostile, then as now, and conventional wisdom held that, if such a migration did occur, it would almost certainly have ended in their doom. Yet some hunters persisted, and gathered many tales from old Siadanlen, all singing the same song. A migration could have occurred, and a large one at that. While most had fled the phoenix south, some daring souls could have chosen to brave the peaks of the Serpentspine. With sufficient sources pointing to such an occurrence, an expedition was prepared.\n\nThis was an unusual task, and only the hardiest hunters were chosen to partake. The Serpentspine would not suffer weak wings, and it was known that the cold, the air, and the winds would readily kill a harpy in flight, as truly as an arrow. Preparations were meticulous, and the Queendom's dwarven subjects proved invaluable, teaching the hunters the way of climbing on foot, as flight would not be feasible in cruel weather.\n\nAnd one day, all was prepared, and the hunters set out, taking wing and flying up along the very walls of the Serpentspine. The mountains were predictably inhospitable, and the hunters were soon forced to advance largely on foot, as the mountain's icy breath made flying at length both cold, and dangerous. Yet supply lines held, and while progress was slow, the hunters climbed steadily up into the Serpentspine…"
flavour_harpylen.113.a: "There are fell voices upon the air…"

flavour_harpylen.114.t: "The Hidden Valley"
flavour_harpylen.114.d: "The Serpentspine struck the expedition furiously and without warning. From seemingly one moment to the next, a blizzard enveloped the hunters of the Ivetasananthor, halting their ascent and forcing them to find cover or perish. A cliffside cavern was fortunately found, and the hunters hurriedly scrambled inside, to wait out the snow and bitter cold. The cave was empty, but bore marks of prior habitation, old campfires and barrels, stocked with fruit and salted meat. Some hunters mused what nomads would live in this manner, on the roof of the world, and it was in this state, huddled by a pitiful fire and sharing their stories, that the lost harpies of the east found them.\n\nStriding into the cave like winged demons, these people bore a sinister aspect to the fair folk of Harpylen, for their skin was a garnet red, and their feathers black. Some hunters gasped, others froze, and some whispered that the infamous “Oni” of the east had come to devour them. Yet when they spoke, it became clear that these were harpies, for their voices were musical, and their words were clearly understood. This group was a border patrol, and the hunters had invaded one of their storerooms.\n\nThe hunters were quick to explain their task, and the members of the lost flocks were willing to aid them in navigating the mountains. With the Serpentspine behind them, the hunters entered Nomsyulhan, and found there that the lost flocks had made a home in this place. They had largely integrated with hobgoblins, but a distinct group from the Command of Rahen. Working in unison, they had forged great works in their isolation, not least of which was the great roost of Waben Donpun, a city built in an ancient caldera, made for the comforts of harpies and hobgoblins both. The lost flocks had found their home, and had taken for themselves a new name. “Nuzenapu.”"
flavour_harpylen.114.a: "Catchy."

flavour_harpylen.115.t: "A Faint Note"
flavour_harpylen.115.d: "To find Asmalil, it had to be known what Asmalil was. A legend, to be sure, but also very specifically a Menumšar. What then was a Menumšar? There was the rub, for it could be anything. Asmalil could be a weapon, or a piece of jewelry. It could be a recipe, or a song. It could even be a person! The old songs claimed that it had belonged to Queen Firanya, but what did belonging mean? Was it her tool, or her partner?\n\nFor these reasons, the project to uncover Asmalil was organized unusually. The Heunthokharivor leveraged their network of contacts, domestically and abroad, to inquire of this thing. The Isutoqir by contrast, employed a virtual legion of scryers to attempt to find Asmalil through arcane means. The Kemounqir were entrusted with the budget, and to their credit, they handled the strain on national finances admirably. The Ivetasananthor, lastly, were largely entrusted with searching archive and song for tales of Asmalil.\n\nDespite the size of the undertaking, no progress was made, until the dreams started. First were the scryers, but soon, dreams of the Menumšar became commonplace, though strangely isolated to within the project. One accountant of the Kemounqir describes it as follows.\n\n“I know that I dream, but I see nothing. Not darkness, but an absence of sight, as if I was one of those eyeless fish in the deep sea. And perhaps I am under water, for I feel no wind on my wings, and then I hear it. A song. I cannot hear the words, but I hear the voice. My mother's voice. And I know, somehow, that I am facing north. I do not see, but I hear. The song comes from the north. And north is where I must go. And then I wake up.”\n\nThis was a faint clue at best, but the dream was always the same, and soon after, word reached Heunthume, that the same dream had occurred outside the project, by a fledgling hunter in the mountains of Nansalen."
flavour_harpylen.115.a: "And the Queen’s greatest hunters descended on Nansalen in their thousands…"

flavour_harpylen.116.t: "Sisters of the Plains"
flavour_harpylen.116.d: "The hunters flew to Nansalen, and spoke at length with the dreaming steward of the distant tower of Khinkeion. This was no true roost, but a distant post, perched on the knee of the Serpentspine, since the days of Firanya. An old sentinel, having kept vigil to the north, for longer than anyone could recall.\n\nYet there had always been harpies here, whether in service to Queen, Beast or Phoenix. The daughters of Khinkeion looked ever north, and brought word of the movements of the fierce children of the forbidden plains, to warn their charges to the south, whoever they may have been.\n\nSpeaking with the steward revealed little, for her dreams were the same as those of the hunters. And yet, in Nansalen, the dreams did change, for one and all. A hunter describes it thusly.\n\n“Again I dream, and again I am without eyes. But I hear now, closer, the voice of my mother. And it is not my mother's voice, but many voices, singing, closely in rhythm and cadence. If I strain my ears, I can peel apart the singular threads of the song. Each and every voice sings so closely together, and yet there is one voice that I can pick out. But the voice is a thread, and as I strain my ears to listen, the voice grows closer, as if I can close with the song by hearing it.\n\nYet at some point, I feel the voice above me. I cannot fly. I can come no closer. I hear the song, but I cannot listen. I cannot make out the words! I am so close to hearing something I can understand, and then... Then.\n\nThen I wake up. And I know the voice is north. North and far above, where the land meets the sky. We must reach this place. We will know it when we see-...”"
flavour_harpylen.116.a: "We will know it when we hear it. "

flavour_harpylen.117.t: "Giant Ruins"
flavour_harpylen.117.d: "The hunters flew north, beyond the steppes of Itorelgea, and into the sand-blasted wastes of the Forbidden Plains. They kept the Serpentspine to their west, hugging the knees of the mountains to avoid the bulk of the violence, that the Forbidden Plains were infamous for.\n\nAfter a long flight, the hunters saw the Eastern Reach rise above them, the unlikely spur of the Serpentspine, thrusting east into the endless plains like a claw. Mountaineers, hardened in the search for the Nuzenapu, drove steadily into these forbidding peaks, and found there, nestled in the deepest mountains, the fallen city of Magharma.\n\nIt was in the highest towers of Magharma, that the hunters found rest at last. Weary and weathered from their long journey, did they pause to rest, for each had been driven by an urge, not wholly of their own, but shared between them, known and accepted between one hunter and the next. And so sleep found them, and they dreamt.\n\n“ We are blind again. And the song is no closer. But the source has moved. It was north, now it is east. Like an echo thrown through an empty house, leaping off wall and floor, bringing them a song they did not have. The Serpentspine sung us to this place, but the song never belonged to her, though she brought the song to us. Now we hear. And the song can be understood if we listen. We have heard it so long, and we can feel it in our bones. This note sings of water. Not the deep water of drowning, but the fresh water of a still lake, still warm from the gaze of the sun, now cooling under the gentle eye of the moon. A lake lies to the east, a great and holy place, alone in these vast lands. There is the singer. We must go there. We must find her.”"
flavour_harpylen.117.a: "We MUST find her."

flavour_harpylen.118.t: "Attained"
flavour_harpylen.118.d: "We flew east. Too fast and too fiercely perhaps. The songs of our dreams were with us day and night, as we flew together. We close, and we see the lake. Vast and clean, like a great mirror. The sky is so blue, and the waters so bright, that it could be a hole in the ground, into a great sky below. And there it lies. A tower, on the shore. There are many dark shapes, living by the lake. The people of the plains. They see us in flight, and some cheer. Some raise spears to us. We remember - We are of the sky. To them, we are a rare omen, of good fortune. We cannot stop. The tower is in sight, and we make our landing in unison. There is no disorder, and it feels odd. I feel so connected with my fellow hunters, that I know where they will be. Their intent fall into my thoughts, and fit themselves in place, as if they always belonged there.\n\nI hear the song. It is so close now. How did we not find this place? Why could we not hear it before? I look to the hunter next to me. Her face mirrors my own. Confusion. I feel it nipping at my mind. For a moment, I feel like I might tumble to the ground. But it passes. A wave of relief washes over us. I see nothing, for it is dark in this tower. But it does not matter. We can hear the song. We go into the darkness and out of time. We move as one body, the song stirring in our bones as we descend down invisible stairs, made for feet greater than all of us.\n\nWe find it in a space. A room, perhaps. Made for someone vast. It sits discarded on a shelf, taller than a house, and we reach out to take it. In the dark, we do not see it, but we hear it and we know it. The shape in our talons is that of a flute, a gentle thing, hardly larger than a fledgling's toy. And yet, we hear her voice now, clear as the gaze of the sun. She sings to me and I listen. All of my bodies listen... I-..."
flavour_harpylen.118.a: "I am Asmalil, and I Wish to go home."

flavour_harpylen.120.t: "In Search of Lelsu"
flavour_harpylen.120.d: "My sweet sisters, where did the winds take you?"
flavour_harpylen.120.a: "Siadunan Harpies"
