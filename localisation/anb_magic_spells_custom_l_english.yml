 magic_list_xhazobkult_default: "Demonic Magic"
 magic_list_xhazobkult_spell_1_default: "Imbue Warlord"
 magic_list_xhazobkult_spell_1_default_desc: "§gWhen Rakhor first received the gift from beyond, he did not hoard it for himself alone. He spread it among our kin, granting powers the world had never witnessed and might fierce enough to strike down gods. Even after his death, the embers of his corrupted soul burned on, spreading like wildfire across the land. From that infernal blaze rose the foundation of what would one day be known as the Xhazobkult.§!"
 magic_list_xhazobkult_spell_1_default_subtitle: "Evocation"
 magic_list_xhazobkult_spell_2_default: "Summon Demonic Horde"
 magic_list_xhazobkult_spell_2_default_desc: "§gAnswer our call, creatures of chaos! Tear the veil and surge forth, claws bared and souls ablaze. Descend upon our enemies and drown their lands in despair. Wherever your footsteps fall life shall wither, and the stench of death will herald our victory. Go now — rend, devour, and leave nothing but silence in your wake.§!"
 magic_list_xhazobkult_spell_2_default_subtitle: "Conjuration"
 magic_list_xhazobkult_spell_3_default: "Avatar of the Nightmarish End"
 magic_list_xhazobkult_spell_3_default_desc: "§g“Why do you hold yourself back, worm? Is it arrogance — do you truly believe you have no need for the full measure of my power? Pitiful creature. I will not tolerate such insolence. Or is it fear that chains you, a fear of consequences that no longer matter? At this stage, what is left for you to lose? Obey me, wretch!Unleash the power I have bestowed upon you. Show them the true depth of my gift, even if it consumes the last embers of your sorry soul.”§!"
 magic_list_xhazobkult_spell_3_default_subtitle: "Evocation"

 xhazobkult_spell_generate_general:0 "Spawn an empowered general with our §YArmy Tradition§! and with the §YDemonic Commander§! trait (§G+10.0%§! Shock Damage, §G-5.0%§! Shock Damage Received):\n- §Y100§! Army Tradition: the general will be (4/5/5/3)\n- §Y80§!-§Y99§! Army Tradition: the general will be (4/4/4/2)\n- §Y60§!-§Y79§! Army Tradition: the general will be (3/4/4/1)\n- §Y40§!-§Y59§! Army Tradition: the general will be (2/4/3/0)\n- §Y20§!-§Y39§! Army Tradition: the general will be (2/3/2/0)\n- §Y0§!-§Y19§! Army Tradition: the general will be (1/2/2/0)"
 xhazobkul_spell_1_extra_effect_1_tt:0 "Gain §G10§! Army Tradition for the purpose of spawning the general."
 xhazobkul_spell_1_extra_effect_2_tt:0 "The general gains §G+1§! §YShock§!."
 demonic_commander:0 "Demonic Commander"
 desc_demonic_commander:0 "This general is a Demonic Commander. Wielding great demonic prowess, the troops led by this leader fight with fanatical fervor."
